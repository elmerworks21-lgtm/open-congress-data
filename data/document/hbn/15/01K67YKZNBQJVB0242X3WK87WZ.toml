title = "BIOMETRIC TECHNOLOGY"
long_title = "AN ACT REQUIRING ALL REGISTERED VOTERS WHOSE BIOMETRICS HAVE NOT BEEN CAPTURED TO APPEAR BEFORE THE ELECTION OFFICER OF THEIR PLACE OF REGISTRATION FOR PURPOSES OF HAVING THEIR PHOTOGRAPHS, FINGERPRINTS AND SIGNATURES CAPTURED THROUGH THE METHOD OF BIOMETRICS, FOR PURPOSES OF ENSURING THAT THE AUTOMATED FINGERPRINT IDENTIFICATION SYSTEM (AFIS) CAN BE UTILIZED TO CLEANSE THE RECORDS OF DOUBLE OR MULTIPLE REGISTRANTS"
scope = "National"
subjects = [ "Biometrics",]

