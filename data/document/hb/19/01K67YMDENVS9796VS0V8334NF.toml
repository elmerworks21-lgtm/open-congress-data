congress_website_title = "AN ACT DECLARING A CLIMATE CHANGE EMERGENCY AND ENHANCING RESILIENCY AND ADAPTABILITY TO THE EFFECTS OF CLIMATE CHANGE"
congress_website_abstract = "Aims to develop and implement solutions to adapt and mitigate the adverse impacts of climate change for the protection and preservation of people´s lives, livelihoods, and the environment. Declares the country in a state of climate emergency that stresses the need for the government to devise measures to stop human-caused global warming, limit its effects, and to mobilize funds for climate mitigation efforts. Pools different government agencies and private entities to immediately and efficiently coordinate in taking practicable measures to preserve and protect the environment. Declares a Climate Change Resiliency and Adaptability Summit to be held on the second week of September of every year which aims to collaborate efforts of various concerned agencies in environment preservation and protection."
