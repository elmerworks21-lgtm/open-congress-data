congress_website_title = "AN ACT GRANTING JURIDICAL PERSONALITY AND LEGAL CAPACITY TO THE BOARD OF THE FUND FOR RESPONDING TO LOSS AND DAMAGE DUE TO CLIMATE CHANGE"
congress_website_abstract = "Aims to enable the Board to enter into a host country agreement with the President, as head of State, and facilitate the operationalization of the Loss and Damage Fund. Grants the Board independence and freedom of action belonging to an international organization and the status, immunities, and privileges granted under the host country agreement entered into with the Government of the Republic of the Philippines (GOP). Exempts the Fund and the Board from payment of all taxes, duties, and other changes imposed by the GOP and local authorities on their property, operations, and transactions. Exempts the non-Filipino Fund officials and invited experts and observers form payment of income tax received fro the Fund regardless of currency used."
