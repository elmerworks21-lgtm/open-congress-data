congress_website_title = "AN ACT STRENGTHENING THE ESTABLISHMENT AND OPERATION OF ALL PUBLIC AND PRIVATE HIGHER EDUCATION INSTITUTIONS"
congress_website_abstract = "Seeks to strengthen the supervisory and regulatory role of the government in all public and private higher education institutions (HEIs) taking into consideration the complementarity of the public and private sectors in education, and guarantee their institutional academic freedom. Mandates the Commission on Higher Education (CHED) and other relevant government regulatory agencies to exercise reasonable supervision and regulation of all higher education institutions which includes imposing reasonable requirements, setting conditions, prescribing restrictions, and ensuring compliance. Fixes the criteria for the establishment of HEIs and sets the minimum requirements for their course offering. Grants incentives for high standards of quality for all HEIs that consistently demonstrate and adhere to standards of excellence."
