congress_website_title = "AN ACT PROHIBITING DISCRIMINATION ON THE BASIS OF SEXUAL ORIENTATION, GENDER IDENTITY OR EXPRESSION, OR SEX CHARACTERISTICS AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Seeks to protect individuals and communities that are at a greater risk of human rights violations based on sexual orientation, gender, identity or expression or sex characteristics (SOGIESC), including individuals and communities of diverse SOGIESC who are children, young, poor, persons with disabilities, indigenous peoples or persons of different ethnic background, or cultural background, and of various religious beliefs. Itemizes different unlawful discriminatory practices on the basis of SOGIESC and provides penalty thereof. Creates the SOGIESC Equality Congressional Oversight Committee (SECOC) composed of five (5) members each from the Senate and the House of Representatives. Establishes the Inter-Agency Council on SOGIESC Equality which shall be composed of several government agencies and organizations."
