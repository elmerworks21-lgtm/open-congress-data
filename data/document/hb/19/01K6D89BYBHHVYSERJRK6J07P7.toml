congress_website_title = "AN ACT MANDATING THE TEACHING OF TAX LITERACY, CONSCIOUSNESS AND RESPONSIBILITY IN INTERMEDIATE, SECONDARY, TECHNICAL-VOCATIONAL, AND TERTIARY EDUCATION"
congress_website_abstract = "Intends to develop a strong taxpaying culture, an age-appropriate, and well-structured curriculum on tax consciousness - to be adopted from elementary school to the college level as well as in all graduating classes in technical-vocational and tertiary education in both public and private schools, colleges, and universities. Proposes that the mandatory tax education shall be assumed by the DepEd in coordination with CHED and TESDA and in consultation with BIR, BOC; recognized tax experts, lawyers, and academicians; and local and national youth organizations. States provision on Tax Consciousness Week; the complementary role of parents; the inculcation of consciousness in youth development plans; and the creation of Tax Education Committee."
