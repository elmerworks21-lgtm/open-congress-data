congress_website_title = "AN ACT REGULATING THE ORGANIZATION AND OPERATION OF COMMUNITY FUND POOLING OR PALUWAGAN GROUPS AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Aims to regulate the paluwagan system by creating an independent agency to be known as the Community Paluwagan Administration which shall prescribe rules and regulations for the creation and registration of paluwagan, and shall exercise the power of supervision over registered paluwagans. Creates the Paluwagan Insurance Fund which aims to protect members of insured paluwagan in case of cessation of business. Grants tax exemption to any paluwagan in respect to a.) all income it receives, including interest on its deposits with any financial institution and loan transactions with members, b.) interest on member´s contribution with any paluwagan, c.) payment of value-added tax and documentary stamp tax, and d.) payment of local taxes."
