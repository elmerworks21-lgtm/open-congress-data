congress_website_title = "AN ACT AMENDING SECTIONS 134 AND 168 OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to address the issue that Sec.134 and Sec. 168 of the NIRC as amended were not synchronized by R.A. 10351 (Sin Tax Law of 2012) and later laws, but are still anchored to the old system of taxing alcohol as an ingredient. Proposes the following amendments to NIRC Code of 1997, as amended: “SEC.134 [Domestic]Denatured Alcohol. - Alcohol of not less than one hundred eighty degrees (180) proof (ninety percent (90%) absolute alcohol) FROM WHATEVER SOURCE INTENDED AS INGREDIENT IN THE MANUFACTURE OF DISTILLED SPIRITS, shall when suitably denatured LOCALLY and rendered unfit for oral intake, be exempt from the excise tax, . . .” “SEC.168. Denaturing Within Premises. - . . . the process of denaturing alcohol shall effected only within the [distillery] premises OF THE DOMESTIC DISTILLER AND COMPOUNDER OF DISTILLED SPIRITS WITH RECTIFYING FACILITIES . . .”"
