congress_website_abstract = "Seeks to create a Barangay Skilled Workers Registry which shall serve as a repository of skilled workers´ information. States that the Barangay Skilled Workers Registry shall contain information about skilled workers residing in its jurisdiction such as their names, addresses, contact information, skills or nature of services, and certifications, if any. Inclusion in the registry is purely voluntary and shall be free from any fee."
