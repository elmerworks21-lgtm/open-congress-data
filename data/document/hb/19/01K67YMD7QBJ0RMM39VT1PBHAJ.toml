congress_website_title = "AN ACT STRENGTHENING THE POWERS AND FUNCTIONS OF THE INTELLECTUAL PROPERTY OFFICE OF THE PHILIPPINES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8293, AS AMENDED, OTHERWISE KNOWN AS THE “INTELLECTUAL PROPERTY CODE OF THE PHILIPPINES”"
congress_website_abstract = "Intends to keep updated to technological advances, and adopt some of the current best practices in the international community, and fortify government efforts against piracy and counterfeiting. Defines “counterfeit goods” which deals with violating the rights of the owner of trademark validly registered with the Intellectual Property Office of the Phils. (IPOPHL) or already declared as a well-known mark by a competent authority; and “pirated goods” . . . which are produced, reproduced, disseminated, imported, removed, altered, substituted, . . . made available to the public, or protected material broadcasted or replicated without the consent of the right holder or person duly authorized by the right holder and which are produced, or replicated from an article where making of that copy would have constituted an infringement of copyright or related rights."
