congress_website_title = "AN ACT DECLARING THE PHILIPPINE STATE COLLEGE OF AERONAUTICS AS THE NATIONAL PROFESSIONAL INSTITUTION FOR AVIATION, RENAMING IT AS THE NATIONAL AVIATION ACADEMY OF THE PHILIPPINES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to strengthen the Philippine State College of Aeronautics (PhilSCA) by declaring it as the National Aviation Academy of the Philippines (NAAP) being the only premier government institution offering programs purely in aeronautics and aviation-related education. Mandates the NAAP to provide world-class academic and professional training to young Filipinos in the field of aviation and other related fields, offer advanced professional studies and specialization for aviation and other related courses, offer ladderized undergraduate and graduate professional programs in aviation, and provide deserving students greater access to aviation education, among others."
