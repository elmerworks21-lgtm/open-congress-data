congress_website_title = "AN ACT AMENDING SECTION 52 OF REPUBLIC ACT NO. 8435 OR THE AGRICULTURE AND FISHERIES MODERNIZATION ACT OF 1997"
congress_website_abstract = "Amends Section 52 of Republic Act No. 8435 as follows: \"Section 52. Farm-to-Market Roads The Department shall coordinate with the LGUs with its resident farmers and fisherfolk to identify priority locations . . . Construction of farm-to-market roads shall be a priority [investment] of the LGUs. [which shall provide a counterpart of not less than ten percent (10%) of the project cost subject to their IRA level.]\" Proposes not to require LGUs to use their IRA for FMR's construction since some LGUs solely rely on IRA for their revenue."
