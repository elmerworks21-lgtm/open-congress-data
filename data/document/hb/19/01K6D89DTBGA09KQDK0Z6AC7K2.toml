congress_website_title = "AN ACT TO PROVIDE GRANTS TO LOCAL GOVERNMENT UNITS FOR SUPERVISED VISITATION CENTERS"
congress_website_abstract = "Aims to protect children from the trauma of witnessing or experiencing violence or abuse during parent-child visitation exchanges. Provide safe havens for parents and children to promote continuity and stability. Defines family violence as any act or threatened act of violence, including any forceful detention of an individual, which - 1) results or threatens to result in physical injury, and is committed such person is or was related by blood or marriage or otherwise legally related or with whom such person is or was lawfully residing."
