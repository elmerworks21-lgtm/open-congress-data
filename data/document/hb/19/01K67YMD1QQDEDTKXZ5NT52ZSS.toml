congress_website_title = "AN ACT FURTHER EXTENDING THE PERIOD OF IMPLEMENTATION OF THE AGRICULTURAL COMPETITIVENESS ENHANCEMENT FUND (ACEF), AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8178, AS AMENDED BY REPUBLIC ACT NOS. 9496, 10848 AND 11203, ENTITLED: \"AN ACT REPLACING QUANTITATIVE IMPORT RESTRICTIONS ON AGRICULTURAL PRODUCTS, EXCEPT RICE, WITH TARIFFS, CREATING THE AGRICULTURAL COMPETITIVENESS ENHANCEMENT FUND, AND FOR OTHER PURPOSES\""
congress_website_abstract = "Seeks to continue to set aside the Agricultural Competitiveness Enhancement Fund up to the year 2028, after which the collection of duties from the Minimum Access Volume (MAV) mechanism and the setting aside of the amount collected for the purpose shall terminate. Mandates that the Fund be set aside and released for the increased productivity of farmers and fisherfolks, research and development on agricultural and fishery products of state universities and colleges, and for a comprehensive and attractive grant-in-aid program for agriculture, forestry, fisheries, and veterinary medicine education to promote the development of agriculture and fisheries."
