congress_website_title = "AN ACT EXPANDING THE COVERAGE OF ESPIONAGE, AMENDING FOR THE PURPOSE COMMONWEALTH ACT NUMBER 616 OR THE ANTI-ESPIONAGE LAW AND ARTICLE 117 OF THE REVISED PENAL CODE, AND PROVIDING HIGHER PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Defines “NATIONAL SECURITY” to include human and political security, health security, economic and financial security, food and water security, military and border security, socio-cultural security, environment and disaster security, energy security, maritime and airspace security, international security, informational and cyber security, transportation and port security. Seeks to address the evolving nature of security threats and the increasing sophistication of espionage tactics in order to effectively safeguard government information including matters relevant to the preservation and protection of national security.0 Proposes to enhance penalties and update definitions to align with contemporary security challenges to bolster the Philippines´ ability to preserve and protect its national security and sovereignty interests."
