congress_website_title = "AN ACT ESTABLISHING A FRAMEWORK FOR BLUE ECONOMY, PROMOTING STEWARDSHIP AND SUSTAINABLE DEVELOPMENT OF COASTAL AND MARINE ECOSYSTEMS AND RESOURCES"
congress_website_abstract = "Aims to transform our ocean-based industries into sustainable activities-our maritime economy into a low-carbon, blue economy. Defines several terms among others as follows: Blue economy refers to a practical ocean-based economic model using green infrastructure and technologies, innovative financing mechanisms, and proactive institutional arrangements . . . protecting our oceans and coasts and enhancing its potential contribution to sustainable development, . . .reducing environmental risks and ecological scarcities. Environmental-economic accounting refers to a systematic way to measure and report on stocks and flows of natural assets and resources - both biotic and abiotic, renewable and non-renewable - and ecosystem services, to determine the contribution of the environment to the economy and the impact of the economy on the environment. Ocean-based activities refer to activities undertaken in the ocean, e.g. fisheries and aquaculture, offshore oil and gas, mining, ocean energy, desalination, shipping and marine transportation, marine tourism, marine construction. Ocean-related activities refer to activities that use products from the ocean (e.g. seafood processing, marine biotechnology, chemicals, salt, etc.) and produce products and services for the ocean and ocean-based activities (e.g. ship building and repair, ports, tourist resorts, communication, maritime insurance and law, maritime technical services, etc.)"
