congress_website_title = "AN ACT EXPANDING THE PRIMARY JURISDICTION OF THE NATIONAL BUREAU OF INVESTIGATION, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10867, OTHERWISE KNOWN AS THE 'NATIONAL BUREAU OF INVESTIGATION REORGANIZATION AND MODERNIZATION ACT'"
congress_website_abstract = "Seeks to strengthen the NBI by expanding its primary investigative jurisdiction over certain types of cases that require its expertise, including cases involving rebellion, insurrection or terrorism; illegal recruitment; violations of environmental laws; cases involving falsification of documents; . . . threats to the security or assaults against the persons of media practitioners and activists . . . justices and judges; killing of the Ombudsman, and Chairpersons/Members of the Constitutional Commission; identification of victims in case of mass fatality incidents caused by human-instigated disasters."
