congress_website_title = "AN ACT DECLARING JANUARY 22 OF EVERY YEAR A SPECIAL WORKING HOLIDAY IN THE ENTIRE COUNTRY TO BE KNOWN AS \"NATIONAL FARMER'S DAY\""
congress_website_abstract = "Seeks to honor the strategic and indispensable role of farmers in the pursuit of a just, prosperous and democratic society. Mandates all heads of government agencies and instrumentalities, including government-owned and controlled corporations, especially those that are dealing directly with farmers as well as local government units, and employers in the private sector to encourage and afford sufficient time and opportunities for their employees to engage and participate in any activity conducted within the premises of their respective offices or establishments in support and sympathy to farmers across the country to celebrate “National Farmer´s Day.”"
