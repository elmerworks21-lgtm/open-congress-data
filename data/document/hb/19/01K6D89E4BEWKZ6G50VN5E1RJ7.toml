congress_website_title = "AN ACT REDEFINING THE TERM \"INDIGENT SENIOR CITIZEN AND APPROPRIATING FUNDS THEREFOR, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7432 ENTITLED, 'AN ACT TO MAXIMIZE THE CONTRIBUTION OF SENIOR CITIZENS TO NATION BUILDING, GRANT BENEFITS AND SPECIAL PRIVILEGES AND FOR OTHER PURPOSES\", AS AMENDED"
congress_website_abstract = "Seeks to make a more inclusive definition of “indigent senior citizen” by removing the physical requirements for the elderly to be entitled to a social pension: “(h) Indigent senior citizen refers to any elderly who is [frail, sickly or with a disability, and] without pension or permanent source of income compensation or financial assistance from his/her relatives to support his/her basic needs, as determined by the Department of Social Welfare and Development (DSWD) in consultation with the [National Coordinating and Monitoring Board] NATIONAL COMMISSION OF SENIOR CITIZENS (NCSC)."
