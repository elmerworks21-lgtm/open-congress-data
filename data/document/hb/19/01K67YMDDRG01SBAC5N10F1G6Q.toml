congress_website_coauthors_raw = ["MARIANO-HERNANDEZ, RUTH","ALONTE, MARLYN \"Len\" B.","GARCIA, PABLO JOHN F.","PRIMICIAS-AGABAS, MARLYN L.","DY, FAUSTINO \"INNO\" V A.","DALIPE, MANUEL JOSE M.","TULFO, RALPH RAFFY JR.","MARCOS, SANDRO","BULUT-BEGTANG, ELEANOR C."]
congress_website_committee_codes = ["0532","0542"]
congress_website_primary_keys = [6867]
congress_website_title = "AN ACT ENHANCING THE FISCAL REGIME FOR THE MINING INDUSTRY, AMENDING FOR THE PURPOSE SECTION 34(B), AND CREATING NEW SECTIONS 151-A, 151-B, 151-C, AND 151-D, ALL UNDER REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Aims for the following objectives: to enhance the equitable share of the government in the utilization of natural resources, to implement a rationalized fiscal regime for large-scale metallic mines, and to promote transparency and accountability in the management of resources derived from extractive industries. Proposes key provisions regarding the following: Royalty payments covering large-scale metallic mining operations within and outside mineral reservations and small-scale metallic mining operations; Margin-based windfall profits tax gained; Thin capitalization to avoid high interest expense deductions due to excessive debt financing, thereby reducing corporate tax liability; Ring-fencing to prevent consolidation of income and expenses of all projects by the same tax payer; Registration with the Mines and Geosciences Bureau and the Mining Board of concerned LGU to qualify for the awarding of a People´s Small-Scale Mining Contract; Reports on all sales and exportation of minerals, etc. to BIR, and essay reports from discharge ports to the DOF and the BIR; Fiscal transparency and accountability in the utilization of mineral resources, exempts related businesses, etc. from the application of confidentiality clauses of the NIRC, as amended."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=19&q=HBN-8937"

