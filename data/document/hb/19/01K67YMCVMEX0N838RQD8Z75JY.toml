congress_website_title = "AN ACT AMENDING SECTIONS 3 AND 4 OF REPUBLIC ACT NO. 10845, OTHERWISE KNOWN AS THE ANTI-AGRICULTURAL SMUGGLING ACT OF 2016 AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes amendments to consider as economic sabotage - large-scale agricultural smuggling involving TOBACCO, WHETHER MANUFACTURED OR UNMANUFACTURED, INCLUDING FINISHED PRODUCTS SUCH AS CIGARS, CIGARETTES, OR HEATED TOBACCO PRODUCTS WITH A MINIMUM EXCISE TAX AND VAT PAYABLE IN THE AMOUNT OF ONE MILLION PESOS (P1,000,000.00); and mandates that offenses for tobacco smuggling are non-bailable. Prescribes that THE PENALTY OF IMPRISONMENT OF NOT LESS THAN THIRTY (30) YEARS BUT NOT MORE THAN FORTY (40) YEARS AND A FINE OF TWICE THE FAIR VALUE AND THE AGGREGATE AMOUNT OF THE TAXES, DUTIES, AND OTHER CHARGES AVOIDED BY THE SMUGGLED TOBACCO, . . . shall be imposed on offenders as enumerated in the proposed Act. Related Law: Tariff and Customs Code"
