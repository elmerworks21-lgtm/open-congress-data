congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7925, OTHERWISE KNOWN AS THE “PUBLIC TELECOMMUNICATIONS POLICY ACT OF THE PHILIPPINES,” BY REQUIRING PUBLIC TELECOMMUNICATIONS ENTITIES AND INTERNET SERVICE PROVIDES TO INSTITUTE A REFUND MECHANISM FOR SERVICE OUTAGES AND DISRUPTIONS"
congress_website_abstract = "Seeks to require public telecommunication entities and internet service providers to provide a refund credit or bill adjustment on a prorated basis to customers who experience internet service outage of at least twenty-four (24) hours within a month. Proposes to add a new Section 20-A to Republic Act No. 7925, otherwise known as the “Public Telecommunications Policy Act of the Philippines”, to read as follows: SECTION 2 “SEC. 20-A. REFUNDS FOR INTERNET AND TELECOMMUNICATIONS SERVICES OUTAGES AND INTERRUPTIONS. . . . (B) THE REFUND CREDIT GRANTED UNDER THE CIRCUMSTANCES MENTIONED ABOVE SHALL LIKEWISE BE GRANTED TO CUSTOMERS SUBSCRIBING TO A SERVICE ON A PREPAID BASIS.”"
