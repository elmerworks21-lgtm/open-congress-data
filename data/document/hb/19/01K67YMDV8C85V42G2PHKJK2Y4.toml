congress_website_title = "AN ACT ENSURING GENDER-RESPONSIVENESS IN NATURALIZATION LAWS, AMENDING FOR THE PURPOSE SECTION 15 OF COMMONWEALTH ACT NO. 473, OTHERWISE KNOWN AS THE \"REVISED NATURALIZATION LAW\" AND SECTION 12 OF REPUBLIC ACT NO. 9139, OTHERWISE KNOWN AS \"THE ADMINISTRATIVE NATURALIZATION LAW OF 2000\""
congress_website_abstract = "Aims to ensure gender parity in our naturalization laws and to further enhance gender equality and equity. Provides that any woman who is now or hereafter be married to a citizen of the Philippines, or who might herself be lawfully naturalized shall have the option to become a citizen of the Philippines or retain her citizenship. Provides that if the applicant is a married woman, the approval of her petition for administrative naturalization will give her alien husband the option to become a Filipino citizen if he is otherwise qualified for naturalization or otherwise retain his citizenship."
