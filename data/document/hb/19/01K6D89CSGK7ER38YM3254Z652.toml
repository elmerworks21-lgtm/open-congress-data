congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 9184, OTHERWISE KNOWN AS THE \"GOVERNMENT PROCUREMENT REFORM ACT”, PROVIDING FOR THE MODERNIZATION, STANDARDIZATION AND REGULATION OF THE GOVERNMENT PROCUREMENT PROCESS AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to provide for the reform, modernization, standardization, and regulation of all government procurement - based on the principles of transparency, competitiveness, and accountability. Mandates the use of streamlined procurement processes and monitoring of procurement activities by the public; Proposes to upgrade the Philippine Government Electronic Procurement System (PhilGEPS) and establish the electronic bidding process."
