congress_website_title = "AN ACT DEFINING AND PENALIZING STREET DECEPTIVE SCHEMES AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines the terms “Palit-Pera” and “Bangga-Higa” which are exploitative actions involving deception that lead to financial harm to individuals and businesses. Also defines “street deception” as any scheme devised and conducted by an individual or group to deceive someone to obtain money or valuables such as those involving the “bangga-higa” or “palit-pera” methods, shall be deemed unlawful."
