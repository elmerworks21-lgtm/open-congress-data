congress_website_title = "AN ACT ESTABLISHING PUBLIC BASIC EDUCATION SCHOOLS IN GEOGRAPHICALLY ISOLATED AND DISADVANTAGED AND CONFLICT-AFFECTED AREAS, PROVIDING ACCESS ROADS LEADING TO LAST MILE SCHOOLS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to improve the quality and access to basic education of children in the far-flung, isolated, disadvantaged and conflict-affected areas, as well as those in Last Mile Schools, by investing on school infrastructures and roads leading to the said public schools. Defines Last Mile Schools as “public basic education schools with gaps in resources and facilities which are located in geographically isolated and disadvantaged and conflict-affected areas (GIDCA).” Provides the criteria in identifying a public school to be included among the Last Mile Schools."
