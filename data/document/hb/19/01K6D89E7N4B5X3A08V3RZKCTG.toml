congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 11223, OTHERWISE KNOWN AS THE \"UNIVERSAL HEALTHCARE ACT\""
congress_website_abstract = "Proposes to adjust the premium contribution rates for migrant workers and self-earning individuals to a more manageable level based on the income floor. Seeks to provide PhilHealth more flexibility in the collection of contributions by giving them additional powers to compromise, waive, or release interests or surcharges owed by employers, self-employed individuals, and migrant workers, regardless of the amount. Proposes to increase the age of PhilHealth dependents to 23 years old; and to authorize the President to suspend or defer contribution increases and/or income floor and income ceiling during national emergencies."
