congress_website_title = "AN ACT MANDATING THE DEPARTMENT OF EDUCATION TO INTRODUCE STRUCTURAL AND INSTITUTIONAL ADJUSTMENTS INTO THE K TO 12 CURRICULUM TO ACHIEVE GREATER EFFICIENCY AND SUCCESS ACROSS ALL KEY STAGES OF THE PROGRAM"
congress_website_abstract = "Introduces a broad range of provisions which are categorized as follows: a) teacher qualifications; b) class size/hours; c) curricular content review; d) instruction (including learning resources); e) convergence/synergy; f) general provisions. Proposes several detailed provisions among others as follows: master´s degree for teachers and intensified Science and Math instruction training; reduce class sizes, class hours, and time spent on schoolwork; English and Filipino as medium of instruction from Grade 4 onwards, standardized tests at the end of students´ 6th grade and senior year in high school as basis for promotion; only 5 subjects such as Math, Science, Language, Practical Life, and Sensory or Psychomotor activities to primary or elementary level; a Science H.S. to include agriculture and disaster preparedness; and Entrepreneurship subject to junior and senior high school. Proposes further that all companies shall be required to institute a Work Immersion Program to absorb senior high school students as internship or as OJT; removal of ranking and class standing or any parameter that promotes competition or comparison; conversion of homework to classwork; and self-paced weekly targets with teachers and the freedom to choose the tasks they will work on."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_19/HB00167.pdf"]

