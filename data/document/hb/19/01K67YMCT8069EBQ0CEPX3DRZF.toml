congress_website_title = "AN ACT PROVIDING PROTECTION TO CONSUMERS AND MERCHANTS ENGAGED IN INTERNET TRANSACTIONS, CREATING FOR THE PURPOSE THE ELECTRONIC COMMERCE BUREAU, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Intends to address concerns that will facilitate transactions and cross-border trade processes; Seeks to promote an environment founded on trust among consumers and merchants as a means to increase the number of e-commerce participants; Proposes to create an eCommerce Bureau to act as a virtual central unit tasked to receive and address consumer complaints on internet transactions, facilitate their speedy resolution by the respective agency, and track complaints referred to or initiated by the concerned agency - to ensure the speedy and appropriate action on those complaints, among other related powers and functions of the Bureau; Seeks to apply provisions in this Act to transactions related to Internet retail of consumer goods and services, online travel services, online media provider, ride-hailing services, and digital financial services; Discuss provisions regarding obligations of consumers and providers of RideHailing Services; On-line Dispute Resolution, and E-Commerce Phil. Truswork."
