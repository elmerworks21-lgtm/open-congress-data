congress_website_title = "AN ACT AUTHORIZING THE ACCRUAL OF EARMARKED REVENUES TO THE GENERAL FUND AND PRESCRIBING THE CONDITIONS UNDER WHICH SUCH FUNDS MAY BE USED FOR OTHER EXPENDITURES IN THE GENERAL APPROPRIATIONS ACT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines several terms among others as follows: EARMARKED REVENUES - are identified revenues required by statute to be used for designated activities, benefits, or purposes, and must be accounted for separately from the government´s general revenues.Â ONE FUND CONCEPT - means accrual of all income, fees, charges, assessments, and other receipts or revenues collected by gov´t offices/agencies to the General Fund of the NG and deposited in the National Treasury.Â SPECIAL ACCOUNTS IN THE GENERAL FUND (SAGF) - the fund whereby proceeds of specific revenue measures and grants earmarked by law for specific priority projects are recorded. Proposes that all earmarked revenues collected by any government . . . shall accrue to the General Fund of the National Government and shall be maintained as Special Accounts within the fund and may be temporarily utilized for other authorized expenditures under the GAA, provided that cash receipts from earmarked revenues are recorded as separate SAGFs and requires that any funds temporarily used for other authorized expenditures remain readily available to fulfill the eligible expenditures charged against the SAGFs when needed."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_19/HB11161.pdf"]
