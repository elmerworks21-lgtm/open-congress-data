congress_website_title = "AN ACT ESTABLISHING A NATIONAL FRAMEWORK FOR THE MANDATORY ENVIRONMENTAL INSURANCE COVERAGE OF ENVIRONMENTALLY CRITICAL PROJECTS"
congress_website_abstract = "Seeks to require Mandatory Environmental Insurance Coverage for owners and operators of environmentally-critical projects whose activities destroy or pose risks to the environment, the ecosystems and their constituent elements; Provides that said insurance shall guarantee sufficient funding coverage for the needed restoration and compensate for damages caused by their operations. Provides that Environmentally-Critical Projects (ECPs) shall include heavy industries, major manufacturing industries, major resource-extractive industries, major infrastructure projects, and other similar projects that could pose serious risks to people and the environment."
