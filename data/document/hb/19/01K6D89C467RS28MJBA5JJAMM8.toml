congress_website_title = "AN ACT PROVIDING FOR THE CRIMINALIZATION OF RED-TAGGING"
congress_website_abstract = "Defines “Red-Tagging as the act of publicly labeling, vilifying, branding, naming, accusing or caricaturing individuals, groups, or organizations of being state enemies, subversives, armed rebels, communists or terrorists, or fronts thereof, thereby implying of insinuating involvement or engagement in armed rebellion, acts of terrorism or any wrongdoing or criminal acts . . . Provided further, . . . a disputable presumption that it was committed with the use of public position and/or of public funds attaches. Provides for different forms of red-tagging; describes several offenses and their corresponding penalties which includes among others: punishment under R.A. 10353 ( Defining and Penalizing Enforced or Involuntary Disappearance; perpetual absolute disqualification to hold public office; or filing of administrative and civil cases."
