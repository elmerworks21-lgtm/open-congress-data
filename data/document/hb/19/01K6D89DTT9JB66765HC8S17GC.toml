congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 10592 ENTITLED “AN ACT AMENDING ARTICLES 29, 94, 97, 98 AND 99 OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE”"
congress_website_abstract = "Seeks to amend certain Articles and delete Article 98 of the Revised Penal Code to read as follows, among others: SECTION 1. . . “Article 29. Period of preventive imprisonment deducted from the term of imprisonment. - . . . SECTION 4. “Art. 99”¦Whenever lawfully justified”¦shall grant allowances for good conduct. THE SAID AUTHORITY TO GRANT ALLOWANCES FOR GOOD CONDUCT OR TO RELEASE PRISONERS SHALL NOT APPLY TO PRISONERS/INMATES SENTENCED TO LIFE IMPRISONMENT OR RECLUSION PERPETUA OR HIGH-RISK INMATES, WHOSE RELEASE DUE TO EXPIRED SENTENCES SHALL ONLY BE IMPLEMENTED UPON PRIOR APPROVAL OF THE SECRETARY OF JUSTICE.” Proposes to add a new section as Sec.7 to Republic Act No.10592, to read as follows: “Sec.7. RECIDIVISTS, HABITUAL DELINQUENTS, ESCAPEES AND PERSONS CHARGED WITH HEINOUS CRIMES ARE EXCLUDED FROM THE COVERAGE OF THIS ACT. PERSONS DEPRIVED OF LIBERTY WHO ARE GIVEN GOOD CONDUCT ALLOWANCE SHALL FORFEIT THE SAME IF HE/SHE COMMITS ANY CRIME, VIOLATIONS OF PRISON RULES OR ANY MISCONDUCT.”"
