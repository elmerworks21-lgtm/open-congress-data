congress_website_coauthors_raw = ["DALIPE, MANUEL JOSE M.","PRIMICIAS-AGABAS, MARLYN L.","ROMUALDO, JURDIN JESUS M.","DIONISIO, ERNESTO JR. M.","TOLENTINO, ANIELA","ESCUDERO, DETTE","SAKALURAN, PRINCESS RIHAN M."]
