congress_website_title = "AN ACT MANDATING AND INSTITUTIONALIZING ROLL-OVER DATA ALLOCATION SCHEME AND PROVIDING PENALTIES FOR NONCOMPLIANCE THEREWITH"
congress_website_abstract = "Requires all Internet Service Providers (ISPs) to implement a Roll-Over Data Allocation Scheme for their subscribers as follows: a.) For postpaid subscribers or users: The rolled-over data allocation shall be prioritized to be consumed in the preceding month provided that the unused data every month shall be rolled-over and accumulated up until the last month and that all unused data allocation for a year may be used and converted as rebates; b.) For prepaid subscribers or users and postpaid subscribers who avail of internet data package promo offers: 1.) Unused data allocation shall be rolled-over provided that the subscriber or user renews the subscription right after the lapse of the offer duration: 2.) The unused data allocation of subscribers or users who fail to renew subscription shall be reduced by twenty percent (20%) everyday until the subscription is renewed; and 3.) If the subscription is not renewed after five (5) days, all unused data allocation shall be considered consumed."
