congress_website_title = "AN ACT INSTITUTING A PROPERTY REGIME FOR COHABITING SAME SEX PARTNERS AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to establish legal frameworks governing property rights and obligations for LGBTQ+ (lesbian, gay, bisexual, transgender, and queer) or same-sex couples. Seeks to ensure equity and fairness in property division; defines property rights; outlines procedures for joint ownership; and addresses the dissolution of the partnership. Includes other provisions such as donations and gifts received by any of the parties during the cohabitation and personal debts, loans, and other financial obligations or liabilities incurred by any of the partners. Â"
