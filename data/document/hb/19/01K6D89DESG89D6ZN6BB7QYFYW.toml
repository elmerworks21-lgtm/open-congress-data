congress_website_title = "AN ACT STRENGTHENING THE TECHNICAL, VOCATIONAL AND LIVELIHOOD CURRICULUM FOR THE SENIOR HIGH SCHOOL AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to give senior high school diplomas and pertinent national certificates to the graduates of the Technical, Vocational and Livelihood (TVL) Curriculum for acquiring the competencies and skills necessary for employment so that various industries shall have confidence in securing their employment and provide equitable compensation. Provides for the roles of different government agencies such as DepEd, TESDA, DOLE, DTI, and other government agencies to achieve the objectives of this Act. Mandates the PCCI and ECOP to notify the TVL Council of the skills and expertise needed by their members and to encourage their respective members to participate in the Work Immersion as Partner Institutions who are able and willing to lend expertise and resources to the learners."
