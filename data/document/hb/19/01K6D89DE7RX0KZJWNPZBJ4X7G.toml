congress_website_title = "AN ACT ESTABLISHING AN ENTERPRISE-BASED EDUCATION AND TRAINING PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Defines several terms among others as follows: “Enterprise-based education and training program” refers to a practical work-related or workplace-related training program with compulsory related theoretical instructions conducted on the job and implemented within companies, which includes, among others, any of the following modalities: Apprenticeship, Learnership, On-the-Job Training, Practicum, Work Appreciation Program, Dual Training System, Internship, and In-Company Training. “Learnership” refers to a practical training, work-based or on-the-job program for approved learnable occupations, for a period not exceeding three (3) months. Only companies whose learnership programs are approved and registered by the TESDA can hire learners."
