congress_website_title = "AN ACT PROVIDING FOR A NEW PASSPORT LAW, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 8239, OTHERWISE KNOWN AS THE \"PHILIPPINE PASSPORT ACT OF 1996\""
congress_website_abstract = "Seeks to guarantee the compliance of Phil. Passports to international standards set by the International Civil Aviation Organization (ICAO) - utilizing the latest tamper-proof, personalization, and data management technology. Proposes to adopt the new biometric system and the submission of documents only issued or authenticated by the Phil. Statistics Authority (PSA); Seeks to provide a new type of “Emergency Passport” and the issuance of three types of “Travel Documents” for Filipinos with urgent travels; those who need to be repatriated; and for individuals considered as stateless persons, refugees, or asylum in the Philippines."
