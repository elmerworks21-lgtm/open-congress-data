congress_website_title = "AN ACT MODERNIZING THE BUREAU OF IMMIGRATION BY DEFINING ITS POWERS AND FUNCTIONS, FURTHER PROFESSIONALIZING ITS ORGANIZATION, UPGRADING THE COMPENSATION AND BENEFITS OF ITS OFFICIALS AND EMPLOYEES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to strengthen the organizational structure of the Bureau with expanded jurisdiction and streamlined powers and functions; to comply with the obligations and standards set by international law in the admission or exclusion of foreign nationals; to promote int´l order and justice by denying the use of Phil. Territory to persons who are engaged or likely to engage in terrorism, human smuggling and trafficking, criminal and other nefarious activities. Provides for an Immigration Trust Fund (ITF) for the modernization of equipment, facilities and offices, including capital outlay for new buildings and field offices; payment of employee benefits; and further professionalization of the employees. Intends to harmonize existing immigration rules and regulations pertaining to issuance of visas to foreign nationals."
