congress_website_title = "AN ACT GRANTING ADDITIONAL BENEFITS TO FILIPINO CENTENARIANS, RECOGNIZING OCTOGENARIANS AND NONAGENARIANS, AND APPROPRIATING FUNDS THEREFOR, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10868, OTHERWISE KNOWN AS THE “CENTENARIANS ACT OF 2016”"
congress_website_abstract = "Grants Filipino centenarians who reach the age of one hundred and one (101) years old a cash gift in the amount of One Million Pesos (P1,000,000.00) on their birthday. Provides all Filipinos who reach the age of eighty (80), eighty-five (85), ninety (90) and ninety-five (95) shall receive a letter of felicitation from the President and a cash gift of Twenty-Five Thousand Pesos (25,000.00) each. Provides that the amount for the implementation of this Act shall be included in the Annual General Appropriations Act."
