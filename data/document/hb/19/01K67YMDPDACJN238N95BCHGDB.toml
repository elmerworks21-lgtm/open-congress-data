congress_website_title = "AN ACT RATIONALIZING THE BENEFITS AND PRIVILEGES OF SENIOR CITIZENS AND PERSONS WITH DISABILITIES"
congress_website_abstract = "Seeks to consolidate benefits and rationalize existing provisions in the laws governing the rights and privileges of senior citizens and persons with disabilities for them to enjoy adequate social services, decent standard of living, and improved quality of life. Provides for the following privileges for senior citizens and persons with disabilities: a.) Twenty percent (20%) discount and exemption from the value-added tax (VAT) on goods and services, as provided under Section 4 of RA 7432 or the “Senior Citizens Act” as amended, and Section 32 of RA 7277 of the “Magna Carta for Persons with Disability,” as amended; b.) Special discount on purchase of basic commodities, which shall be applied on the final price of the goods or services after promotional offer or discount extended by business establishments; c.) Twenty percent (20%) discount and exemption from the VAT on the utilization of transportation services, including the payment of parking fees and the use of expressway and skyways; d.) Grant of fifteen percent (15%) discount on the monthly utilization of water and electricity supplied by public utilities applied on the first 100 kWh of electricity consumption and 30 cubic meters of water consumption per household; e.) Additional deduction from gross income of employers of senior citizens and persons with disabilities, equivalent to twenty-five percent (25%) of the total amount paid as salaries and wages; and f.) Exemption from fees on training for socioeconomic programs by government agencies."
