congress_website_title = "AN ACT AMENDING REPUBLIC ACT No. 8182 AS AMENDED BY REPUBLIC ACT No. 8555 AUTHORIZING THE AWARD OF A PROJECT TO THE BIDDER IN CASES WHERE THERE IS ONLY A SINGLE BIDDER, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to make the bidding process more efficient by reducing, if not totally eliminating, unnecessary or redundant procedures that are bottlenecks. Seeks to improve the absorption capacity of Official Development Assistance (ODA) grants and loans, and fast-track the implementation of any ODA-funded project with only a single bidder who satisfies certain requirements to cut down redundant procedures."
