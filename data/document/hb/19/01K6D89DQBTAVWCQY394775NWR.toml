congress_website_title = "AN ACT ESTABLISHING THE WASTE WORKERS´ HEALTH AND WELFARE PROGRAM AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines “Waste Worker” to refer to any person engaged in the collection, transportation, processing, and disposal of solid waste, and includes, but is not limited to, garbage collectors, waste pickers, recyclers, and landfill and dumpsite workers. Proposes to safeguard and promote the rights and welfare of waste workers in the country which shall include the ff. components: a) Registration and Monitoring System; b) Health Coverage and Benefits; c) Occupational Safety Training; d) Personal Protective Equipment; e) Educational Assistance; f) Financial Assistance."
