congress_website_title = "AN ACT PROHIBITING THE ONLINE PLACING OF BETS FOR ALL LOTTO GAMES"
congress_website_abstract = "Mandates that bets for all Lotto games shall only be done physically and only in authorized Lotto Outlets. Prohibits the online placing of bets thru mobile phones, laptops, tablets, personal computers and other similar gadgets for all Lotto games. Provides that any change in the system and procedures to play all Lotto games which have impact on revenue generation, livelihood of the lotto agents, and the charity mandate of the Philippine Charity Sweepstakes Office shall be made public to the affected stakeholders and subject to the approval of the Office of the President."
