congress_website_title = "AN ACT DEFINING THE CRIME OF SUBORDINATION OF PERJURY, AMENDING FOR THE PURPOSE ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE \"REVISED PENAL CODE\""
congress_website_abstract = "Seeks to add a new Article 184-A to Act No. 3815 to read as follows: “Article 184-A. Subordination of Perjury. - Whoever procures, coerces, or otherwise induces another to commit any perjury shall suffer the respective penalties provided in this section:Â Provided, That if the person responsible for the commission of this felony is a public officer or employee, or if the testimony results in the institution of a criminal action against another, the penalty shall be imposed in its maximum period: “ a) a fine not to exceed one million pesos; and b) perpetual absolute disqualification from holding any appointive or elective position in the government . . .”"
