congress_website_title = "AN ACT STRENGTHENING THE PHILIPPINE MERCHANT MARINE ACADEMY BY RENAMING IT AS THE PHILIPPINE NATIONAL MARITIME ACADEMY, EXPANDING ITS MANDATE, CURRICULAR OFFERINGS, AND THE COMPOSITION OF THE GOVERNING BOARD, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to rename the Philippine Merchant Marine Academy (PMMA) to Philippine National Marine Academy (PNMA) that shall provide holistic education and training for human resource development of maritime students, professionals, and leaders in support of maritime industry development, maritime law enforcement, and national security. Provides for the responsibilities, powers and functions of the PNMA. Mandates graduate of the merchant marine courses of the PNMA to serve in the government for an accumulated duration of at least four (4) years. Ensures the proper distribution of the cadets availing the quality education and opportunities in the PNMA by establishing a system by which every Congressional District is given the opportunity to send cadets governed by the principle of merit and fitness. Provides that the campuses in any part of the country may be established, subject to the approval of the Board of Trustees."
