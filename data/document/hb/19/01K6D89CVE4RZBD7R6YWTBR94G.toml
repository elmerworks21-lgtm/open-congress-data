congress_website_title = "AN ACT AMENDING SECTION 4 AND 9 OF REPUBLIC ACT NO. 7309 ENTITLED, \"AN ACT CREATING A BOARD OF CLAIMS UNDER THE DEPARTMENT OF JUSTICE FOR VICTIMS OF UNJUST IMPRISONMENT OR DETENTION AND VICTIMS OF VIOLENT CRIMES AND FOR OTHER PURPOSES\""
congress_website_abstract = "Aims to reasonably increase the compensation of victims of unjust imprisonment or detention and victims of violent crimes authorized under the law from P1,000.00 to P5,000.00 per month. Proposes that the maximum amount for which the Board may approve a claim shall not exceed P50,000.00 or the amount necessary to reimburse the claimant - the expenses incurred for hospitalization, medical treatment, loss of wage, loss of support or other expenditures directly related to injury, whichever is lower . . ."
