congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 10625 OR THE PHILIPPINE STATISTICAL ACT OF 2013, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes the conversion of the PSA into the Philippine Statistics Commission to enhance the effectiveness and credibility of the national statistical system - to reinforce its independence for faster decision-making processes. States that “THE PHILSTATSCOM SHALL HAVE THE SAME STATUS AS THAT OF A GOVERNMENTAL REGULATORY NATIONAL AGENCY ATTACHED TO THE OFFICE OF THE PRESIDENT WITH THE CHAIRMAN THEREOF BEING OF THE SAME LEVEL AS DEPARTMENT UNDERSECRETARY AND THE COMMISSIONERS THAT OF DEPARTMENT ASSISTANT SECRETARIES.\" Provides for the composition of the Board; qualifications; compensation, benefits, and privileges of the Chairman and the Commissioners; and proposes that there shall be an Executive Director to be known as the National Statistician who is a citizen of the Republic of the Philippines."
