congress_website_title = "AN ACT REQUIRING THE DECLARATION OF THE VALUE IMPORTED GOODS IN SHIPPING AND AIRLINE DOCUMENTS AND PROHIBITING FRAUDULENT ALTERATION OF CARGO MANIFEST, BILL OF LADING, AND AIRWAY BILL AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10863, OTHERWISE KNOWN AS THE \"CUSTOMS MODERNIZATION AND TARIFF ACT\""
congress_website_abstract = "Aims to significantly deter the use of commercial and shipping documents in smuggling and illegal importation activities. Seeks to ensure consistency of commercial documents transmitted and presented to Philippine authorities - the Pier Inspection Division or the Aircraft Operations Division and the District Collector of the Port, as the case may who are tasked to reconcile the hard copy of the cargo manifest with the electronic cargo manifest of a vessel from a foreign port."
