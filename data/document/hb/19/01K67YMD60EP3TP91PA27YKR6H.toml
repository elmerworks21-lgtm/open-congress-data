congress_website_title = "AN ACT PROMOTING ENTREPRENEURSHIP BY ESTABLISHING A SUSTAINABLE FINANCING PROGRAM FOR MICRO AND SMALL ENTERPRISES THROUGH THE PONDO SA PAGBABAGO AT PAG-ASENSO PROGRAM, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to promote the growth of micro and small enterprises (MSEs) by providing affordable, accessible, and simple financing programs, and initiated means to encourage entrepreneurial activities, and to ease the constraints and challenges to MSEs, particularly on access to financing. Institutionalizes the Pondo sa Pagbabago at Pag-asenso (P3) Fund which shall be lent out to qualified MSEs and shall be accessible through the Small Business Corporation (SB Corp.) and accredited partner financial institutions (PFIs) such as rural banks, thrift banks, development banks, cooperative banks, cooperatives, non-stock savings and loan associations, microfinance non-government organizations or lending companies. Provides that the loanable amount for individual loans shall be set and regularly reviewed by the MSMED Council which shall not exceed one percent (1%) per month for direct lending, and shall not exceed two and a half percent (2.5%) per month for lending through accredited PFIs, with no collateral requirement."
