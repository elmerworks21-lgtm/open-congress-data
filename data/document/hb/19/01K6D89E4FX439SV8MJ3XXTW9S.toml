congress_website_title = "AN ACT ESTABLISHING A SYSTEM PROTECTING THE COMMUNITY INTELLECTUAL RIGHTS OF INDIGENOUS CULTURAL COMMUNITIES/INDIGENOUS PEOPLES"
congress_website_abstract = "Seeks to address the following issues:Â there were numerous cases of indigenous handicrafts, symbols, and attires which have been replicated by commercial knitting machines that swarmed the markets; and there are misleading claims that the said products allegedly originated from the Indigenous communities are rampantly found in the e-commerce platforms. Proposes to entitle the ICCs/IPs of the full ownership, control, and protection from misappropriation, misuse, and false designation of origin of their community intellectual rights; Also proposes to recognize their rights to the restitution of their cultural, intellectual, religious, and spiritual property taken without their free, prior and informed consent or in violation of their laws, traditions, and customs, including the definition of corresponding penalties for the said violation/s. Provides for the coordination by the NCIP with the NCCA and IPOPHL on the registry of community intellectual rights, cultural property, and intellectual property rights; Also provides for other implementing agencies as follows:Â National Museum; National Library, National Historical Commission; National Archives; Cultural Center of the Phils.; Komisyon sa Wikang Filipino, Palawan Council on Sustainable Dev´t, DENR, DA, PITAHC, and civil society organizations."
