congress_website_title = "AN ACT CREATING THE DEPARTMENT OF DISASTER RESILIENCE, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes to create a separate Department of Disaster Resilience aimed at reducing the risk of all types of natural hazards and the harmful effects of climate change. Seeks to identify three (3) key result areas to be focused upon by the Department: Disaster Risk Reduction; Disaster Preparedness and Response; and Recovery and Building Forward Better. Proposes among others: the establishment of an Integrated Disaster Resilience Information System (IDRIS); the creation of an early warning system which shall make use of risk communication protocols; and the establishment of a Humanitarian Assistance Action Center (HAAC)."
