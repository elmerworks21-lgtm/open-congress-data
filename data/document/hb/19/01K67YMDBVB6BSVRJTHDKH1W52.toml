congress_website_abstract = "Grants judiciary officials with judicial rank, salary and privileges to all retirement benefits being received by their counterpart judges and justices under Republic Act No. 910, as amended by RA 9946. Entitles all those who compulsorily retired at the age of sixty-five (65) years prior to the effectivity of this Act including judiciary officials with judicial rank, salary and privileges, to receive the benefits under this Act, provided that the benefits granted shall be prospective."
