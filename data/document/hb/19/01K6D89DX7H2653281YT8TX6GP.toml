congress_website_title = "AN ACT AFFORDING MORE PROTECTION TO CONSUMERS OF FINANCIAL PRODUCTS AND SERVICES"
congress_website_abstract = "Seeks to address increasing consumer fraud, abuse and misconduct brought about by rapid development of complex financial products coupled with advanced technologies. Proposes to establish comprehensive financial consumer protection involving financial inclusion, financial education, good governance, and effective supervision. Provides for, among others, financial regulators such as Bangko Sentral ng Pilipinas, Insurance Commission and Securities and Exchange Commission, rulemaking, surveillance and inspection, market monitoring, enforcement and adjudication powers relative to consumer protection."
