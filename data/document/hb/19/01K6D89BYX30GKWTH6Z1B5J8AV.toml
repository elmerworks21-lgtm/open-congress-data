congress_website_title = "AN ACT INCREASING THE SOCIAL PENSION OF INDIGENT SENIOR CITIZENS AND APPROPRIATING FUNDS THEREFOR, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7432 ENTITLED, \"AN ACT TO MAXIMIZE THE CONTRIBUTION OF SENIOR CITIZENS TO NATION BUILDING, GRANT BENEFITS AND SPECIAL PRIVILEGES AND FOR OTHER PURPOSES\", AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Refers the term SOCIAL PENSION to the monetary grant from the government to support the daily subsistence and medical needs of senior citizens which SHALL NOT BE LESS THAN ONE THOUSAND PESOS (P1,000.00) PER MONTH. Seeks to make mandatory the entitlement of social pension to indigent senior citizens."
