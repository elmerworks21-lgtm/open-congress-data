congress_website_title = "AN ACT ALLOWING COLLEGE STUDENTS WITH UNPAID TUITION AND OTHER SCHOOL FEES TO TAKE THE PERIODIC AND FINAL EXAMINATIONS ON GOOD CAUSE AND JUSTIFIABLE GROUNDS"
congress_website_abstract = "Aims to protect and promote the right of all citizens to quality education and to take appropriate steps to make education accessible to all. Mandates all Higher Education Institutions (HEIs) to adopt appropriate policies to accommodate and allow students who have unsettled financial obligations due to emergencies, force majeure, and good cause or other justifiable reasons, to take the schedules periodic examinations provided, that the students executes a promissory note for the schedule of settlement of the outstanding financial obligation prior to the taking of examination and that any deferment of payment of unpaid balance shall not go beyond the semester, except when allowed by the HEI."
