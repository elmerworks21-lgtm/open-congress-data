congress_website_title = "AN ACT AMENDING ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE PENAL CODE, ARTICLE 310, TO INCREASE THE PENALTIES IN CERTAIN INSTANCES OF QUALIFIED THEFT"
congress_website_abstract = "Seeks to amend Chapter 3, Article 310 of Act No. 3815, also known as the Revised Penal Code, by increasing the penalties for some instances of qualified theft. SECTION 1 “Art. 310. Qualified Theft”¦THE PENALTY OF RECLUSION TEMPORAL IN ITS MAXIMUM PERIOD TO RECLUSION PERPETUA SHALL BE IMPOSED IF THE PROPERTY IS TAKEN ON THE OCCASION OF THE FOLLOWING OR IMMEDIATELY THEREAFTER: ”¦ANY OTHER CALAMITY NATURAL OR MAN-MADE; CIVIL DISRUPTION OR DISRUPTION, PUBLIC WANT OR EMERGENCY; AND ACCIDENTS INVOLVING LAND, SEA, AIR AND TRANSPORT”¦SHALL ALSO APPLY IF THE PROPERTY IS TAKEN FROM A VICTIM OF A CRIME COMMITTED BY ANOTHER, OR FROM PERSONS IN DISTRESS. THE PENALTY OF RECLUSION PERPETUA SHALL BE IMPOSED IF THE OFFENDER IS A LAW ENFORCEMENT AGENT OR OFFICER; A BARANGAY OFFICIAL”¦; A FIREMAN OF THE BUREAU OF FIRE PROTECTION”¦ENTRUSTED WITH A DUTY TO RENDER ASSISTANCE ON THE FOREGOING OCCURRENCES.”"
