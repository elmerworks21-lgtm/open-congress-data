congress_website_title = "AN ACT CREATING THE DEPARTMENT OF ECONOMICS AND DEVELOPMENT PLANNING, DEFINING ITS FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Mandates the DEDP to direct the government´s planning and investment programming processes towards sustainable and inclusive economic growth; equitable distribution of opportunities, income, and wealth; and increased productivity. Tasks the DEDP to prepare and recommend national economic development goals, policies, and programs - monitor their implementation, and shall take over the powers, duties, and functions of the National Economic Development Authority (NEDA)."
