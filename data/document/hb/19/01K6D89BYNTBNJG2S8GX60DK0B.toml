congress_website_title = "AN ACT MODERNIZING THE BUREAU OF IMMIGRATION BY DEFINING ITS POWERS AND FUNCTIONS, FURTHER PROFESSIONALIZING ITS ORGANIZATION, UPGRADING THE COMPENSATION AND BENEFITS OF ITS OFFICIALS AND EMPLOYEES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Provides for the following salient features of the measure: a) New, streamlined, and restructured Commission which shall be tasked to be a repository of all pertinent records of foreign nationals; b) Vests to the proposed Commission the authority to act on applications for administrative naturalization; c) Provides for a more extensive list of ineligible classes of aliens; d) Includes more visa categories and immigration privileges for foreign investors to attract more investments; e) Establishes guidelines in dealing with refugees, stateless persons, and asylees, consistent with the developments in international law; and f) Imposes stiffer penalties for the crime of trafficking of persons."
