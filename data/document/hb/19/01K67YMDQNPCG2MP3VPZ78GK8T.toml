congress_website_title = "AN ACT AMENDING SECTIONS 134 AND 168 OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Provides that alcohol of not less than one hundred eighty degrees (180Â°) proof (ninety percent (90%) absolute alcohol) from any source intended as ingredient in the manufacture of distilled spirits shall be exempt from the excise tax when denatured locally and rendered unfit for oral intake. Requires that the process of denaturing alcohol shall be effected only within the premises of the domestic distiller and compounder of distilled spirits with rectifying facilities."
