congress_website_title = "AN ACT ESTABLISHING THE PUBLIC SCHOOLS OF THE FUTURE IN TECHNOLOGY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to institute a PSOFT Program in all public elementary and secondary schools that shall adopt several principles as follows: A system of upgrading and replacing outdated technology; Maximize the use of ICT to aid learning; Technical support to maintain ICT and other technology; Develop educators to use ICT effectively in the classroom; and Balance between modern and traditional methods of teaching are equally utilized to obtain optimum learning outcomes."
