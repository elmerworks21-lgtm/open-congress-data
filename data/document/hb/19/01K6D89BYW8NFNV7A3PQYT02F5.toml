congress_website_title = "AN ACT PROVIDING FOR PROTECTION OF THE REMITTANCES OF OVERSEAS FILIPINO WORKERS"
congress_website_abstract = "Intends to protect the hard-earned money of OFWs against exorbitant fees charged by financial institutions that deplete the value of their remittances; and to provide them and their families with adequate education and training on financial literacy, such as financial planning and management of finances or savings. Proposes several provisions among others as follows: discount on remittance fees and tax deduction granted to establishments based on the cost of services to OFWs; requirement of posting of the peso equivalent of the currency to be exchanged; prohibition from raising remittance fees, including other prohibited acts."
