congress_website_title = "AN ACT STRENGTHENING THE PRICE SUPPORT SYSTEM FOR AGRICULTURAL PRODUCE, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7607, OTHERWISE KNOWN AS THE `MAGNA CARTA OF SMALL FARMERS´ AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes to establish a price support system for certain agricultural products, especially rice, corn, COCONUT, BANANA, MANGO, CASSAVA, CAMOTE, AND OTHER AGRICULTURAL PRODUCTS THAT THE SECRETARY OF AGRICULTURE MAY DETERMINE. . . States that “IT SHALL BE UNLAWFUL FOR ANY TRADER TO BUY THE AGRICULTURAL PRODUCTS AT A PRICE LOWER THAN THE CURRENT MINIMUM FLOOR PRICE. . .”; “ . . . THE SECRETARY OF AGRICULTURE SHALL ENCOURAGE TRADERS TO BUY AT THE MAXIMUM FLOOR PRICE OF THE AGRICULTURAL PRODUCTS THROUGH A TAX CREDIT SCHEME.”"
