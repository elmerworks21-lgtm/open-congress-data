congress_website_title = "AN ACT PROVIDING FOR A REVISED NATIONAL APPRENTICESHIP PROGRAM REPEALING FOR THE PURPOSE CHAPTERS I AND II OF TITLE II, BOOK II OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to prevent the circumvention of labor standards and laws and strengthen linkages with existing education-to-employment policies and programs. Proposes provisions regarding the following: TESDA as the overall policy-making and standards-setting body . . . supplemented by a Bipartite Plant Apprenticeship Committee in every enterprise; the vital role of contract; system of equivalency link to Technical and Vocational Education and Training (TVET) and formal higher education systems/ issuance of a national certificate of competency and training certificates; apprenticeship model and concepts (Dual Training System); apprenticeship period based on the skills´ complexity; allowance, insurance and exemption of completers from probationary period; framework for investigation of program violations/causes and the rules for program termination; penalties for unregistered programs; enterprise incentives (gross taxable income of Â½ of the labor training expenses; and abolition of Learnership Program."
