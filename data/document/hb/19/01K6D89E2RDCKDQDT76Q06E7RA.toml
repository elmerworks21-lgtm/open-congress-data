congress_website_title = "AN ACT ESTABLISHING A COMPREHENSIVE MEDICINE VOUCHER PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to address the long-standing problem of accessing medicines that are not available in government hospitals and formularies of the Government - establishes a mechanism for the accreditation of private pharmacies/health care medicine providers to ensure the availability of a wide range of essential/uncommon/quality medicines necessary for the treatment of all Filipinos (indigent individuals and families; informal sector workers; indigenous people and other vulnerable groups). Tasks the Philippine National Formulary under the DOH to administer the Medicine Voucher Program and provides safeguards to prevent fraud, abuse, and corruption in its administration."
