congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 8187 ALSO KNOWN AS THE PATERNITY LEAVE ACT OF 1996"
congress_website_abstract = "States that every MALE employee in the private and public sectors shall be entitled to a paternity leave of FOURTEEN (14) days with full pay. The male employee . . . shall notify his employer of the pregnancy of THE MOTHER OF HIS CHILD . . . PROVIDED, FURTHERMORE, THAT THIS BENEFIT IS OVER AND ABOVE THAT WHICH IS PROVIDED UNDER REPUBLIC ACT NO. 11210, OR THE “104-DAY EXPANDED MATERNITY LEAVE LAW” . . ."
