congress_website_title = "AN ACT INSTITUTING A NATIONAL COMPREHENSIVE FRAMEWORK ON RESILIENT HOUSING AND HUMAN SETTLEMENTS, APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes a national framework that will lay out a concrete plan whenever the country is adversely affected by national disasters and effects of climate change, and which shall serve as the basis for a mechanism for post-disaster housing and settlements rehabilitation and resiliency planning and response at all levels. Seeks to complement the provisions in Sec.5, I-(e) of R.A. No.11201 which is a mandate to the Department of Human Settlements and Urban Development (DHSUD) to formulate a framework . . . by identifying its components including a National Housing Resilient Agenda and priorities; a National Post-Disaster Housing Recovery Strategy and Rules and Guidelines for Rehabilitation, Reconstruction, and Relocation; Investment and Financing Requirements; and Institutional Arrangements, among others."
