congress_website_title = "UPGRADING AND STRENGTHENING THE PHILIPPINE MARITIME INDUSTRY TO MEET THE STRATEGIC NEEDS OF THE CHANGING INTERNATIONAL AND DOMESTIC MARITIME INDUSTRY AND ADDRESS THE ECONOMIC AND NATIONAL MARITIME DEFENSE SITUATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to upgrade and modernize the curriculum of the Philippine Merchant Marine Academy (PMMA) to ensure the production of quality graduates who are responsive to the needs of the country. Intends to address the economic and defense requirements of the country including Naval, Maritime Law Enforcement, and other Maritime Trade and maritime education and training development in reference to UN-IMO STCW requirements. Proposes that PMMA shall be engaged in the following academic areas: Marine Transportation (Major in Ship Management and Minor in Maritime Cyber Security; Marine Engineering (Major in Communications, Electrical, and Minor in Maritime Software Development; Operational Level Assessment of MARINA; Ship Management and Maritime Education; Research & Development; world economic and shipping trends, etc."
