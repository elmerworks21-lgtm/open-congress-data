long_title = "AN ACT INCREASING THE AUTHORIZED CAMPAIGN EXPENSES OF CANDIDATES AND POLITICAL PARTIES, AMENDING FOR THE PURPOSE SECTION 13 OF REPUBLIC ACT NO. 7166, ENTITLED, ''AN ACT PROVIDING FOR SYNCHRONIZED NATIONAL AND LOCAL ELECTIONS AND FOR OTHER ELECTORAL REFORMS, AUTHORIZING APPROPRIATIONS THEREFOR, AND FOR OTHER PURPOSES''"
scope = "National"
subjects = [ "Campaign Funds/Campaign Contributions/Campaign Expenditures", "Political Candidates", "Elections",]
congress_website_author_codes = ["G072","K044","K045","I059","K119","K086","K063","J024","I108","K053","K109","K011","K022","H038","K134","G059","K033","F016","K059","K104","G060","K061","J026","J028","K036","K058"]
congress_website_coauthors_raw = ["DALIPE, MANUEL JOSE M.","BULUT-BEGTANG, ELEANOR C.","GARDIOLA, TIRSO EDWIN L.","REVILLA, RAMON JOLO III B."]
congress_website_committee_codes = ["0532","0537"]
congress_website_primary_keys = [6580]
congress_website_title = "AN ACT INCREASING THE AUTHORIZED CAMPAIGN EXPENSES OF CANDIDATES AND POLITICAL PARTIES, AMENDING FOR THE PURPOSE SECTION 13 OF REPUBLIC ACT NO. 7166, ENTITLED, “AN ACT PROVIDING FOR SYNCHRONIZED NATIONAL AND LOCAL ELECTIONS AND FOR OTHER ELECTORAL REFORMS, AUTHORIZING APPROPRIATIONS THEREFOR, AND FOR OTHER PURPOSES”"
congress_website_abstract = "Increases the authorized expenses of candidates and political parties as follows: a.) For candidates - From ten (P10.00)) to fifty (P50.00) pesos for President and forty pesos (P40.00) for Vice-President; and from three (P3.00) pesos to thirty (P30.00) pesos for Senator, District Representative, Governor, Vice-Governor, Board Members, Mayor, Vice-Mayor, Councilor, and Party-List Representative for every registered constituent voter; and b.) For political parties - from five (P5.00) pesos to thirty (P30.00) pesos for every voter currently registered in the constituency or constituencies where it has official candidates. Mandates the Commission on Elections, in consultation with the Bangko Sentral ng Pilipinas, the National Economic and Development Authority, and the Philippine Statistics Authority, to make the necessary adjustments in the amount of authorized campaign expenses per registered voter as provided in this Act."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=19&q=HBN-8370"

