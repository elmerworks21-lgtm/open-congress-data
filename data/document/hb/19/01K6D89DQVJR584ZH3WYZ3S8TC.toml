congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE VIRTUAL LIBRARY, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to give all students access to digital versions of all textbooks and reading materials through DepEd to be gathered in the Philippine Virtual Library. Intends to reduce the costs associated with purchasing the necessary devices by recycling old but usable computers from government agencies and private organizations that will donate; it also stipulates that should the DepEd require assistance, they may approach the National Library of the Philippines to further increase the wealth of resources within the Philippine Virtual Library by adding more books and textbooks."
