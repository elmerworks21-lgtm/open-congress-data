congress_website_abstract = "Aims to promote a working environment with a higher levels of productivity, maintain industrial harmony, and promote the principle of partnership and shared responsibility in the relations between workers and employers. Seeks to reinforce labor productivity through 1.) the establishment of a Productivity Incentives Committee; 2.) the adoption of the productivity incentive programs; 3.) granting productivity incentives to employees; and 4.) providing a tax incentive to business establishments for granting incentives to employees."
