congress_website_title = "AN ACT PROVIDING FOR THE MODERNIZATION OF THE PUBLIC HEALTH EMERGENCY PREPAREDNESS AND RESPONSE CAPABILITIES, ESTABLISHING FOR THIS PURPOSE THE CENTER FOR DISEASE PREVENTION AND CONTROL, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to adopt an integrated and comprehensive approach to health development and give high priority to the allocation of material and institutional resources to protect public health by ensuring that the Philippine health system is well-prepared to forecast, prevent, monitor, and control diseases, injuries, and disabilities both of national and international concern. Transfers the following DOH Units to the CDC 1.) Epidemiology Bureau; 2.) Research Institute for Tropical Medicine: 3.) Sexually Transmitted Disease - Acquired Immune Deficiency Syndrome Cooperative Central Laboratory; 4.) Select functions of the International Health Surveillance Division of the Bureau of Quarantine; and 5.) Technical and standard setting functions of the Disease Prevention and Control Bureau including the Mental Health Division, Cancer Division and Oral Health Division."
