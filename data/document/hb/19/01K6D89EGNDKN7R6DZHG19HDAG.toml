congress_website_title = "AN ACT ESTABLISHING A COMPREHENSIVE SYSTEM FOR THE REGISTRATION AND LICENSING OF SOCIAL WELFARE AND DEVELOPMENT AGENCIES, ACCREDITATION OF SOCIAL WELFARE AND DEVELOPMENT PROGRAMS AND SERVICES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to set standards, register, license, accredit, and monitor social welfare and development agencies, service providers, group or organizations engaged in social welfare and development activities. Provides appropriate consultative mechanisms and necessary assistance to ensure their compliance with the set standards and cope with the challenges and demands providing social welfare and development services to the poor, vulnerable, the marginalized, the disadvantaged, and the underprivileged sectors of the society."
