congress_website_title = "AN ACT ESTABLISHING A NATIONAL ECONOMIC DECENTRALIZATION PLAN TO FACILITATE FURTHER GROWTH IN ALL REGIONS OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Progresibong Pilipinas Para sa Lahat ng Pilipino Act Seeks to create a Phil. Decentralization Committee to be chaired by the Executive Secretary with Secretaries of DPWH, DOF, DBM, DOTr, Director General of NEDA, Representatives from the League of Governors/ Cities, and experts from the private sector and the academe in several fields of expertise like urban planning and 7853management, supply chain management, and agro-business and industrial growth. Proposes several provisions, among others, regarding the following: a) periodic comprehensive studies focusing on challenges/opportunities for regional economic development; b) healthcare development program (establishment of Heart/Lung/Orthopedic Centers, Kidney Institute); c) Regional Centers of Excellence (education and skills development through DepEd, CHED, TESDA); d) relocation of National Government Agencies to enhance the delivery of goods and services; e) decentralization of procurement procedures for major NGA projects; f) tax incentives for industries outside NCR; and g) appropriations and periodic implementation."
