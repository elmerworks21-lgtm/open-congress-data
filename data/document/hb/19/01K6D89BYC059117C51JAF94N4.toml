congress_website_title = "AN ACT ESTABLISHING THE PILI INDUSTRY SUBSIDY FUND TO ENHANCE THE CULTIVATION, PRODUCTION, AND MARKETING OF PILI FOR DOMESTIC AND EXPORT TRADE"
congress_website_abstract = "Proposes to create an initial amount of Three Hundred Million (P300,000,000.00) subsidy fund which shall be replenished annually in the General Appropriations Act, and shall be administered by the Department of Agriculture, in coordination with the DOST and the DTI. Seeks to declare the Bicol Region consisting of the Provinces of Albay, Camarines Norte, Camarines Sur, Catanduanes, Masbate and Sorsogon as the Pili regional capital of the Philippines; and to acknowledged the “Pili Regional Research and Technology Development Center."
