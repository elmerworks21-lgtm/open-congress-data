congress_website_title = "AN ACT AMENDING SECTION 17, CHAPTER V, TITLE I, BOOK III AND SECTION 27, CHAPTER V, TITLE I (A), BOOK V OF EXECUTIVE ORDER NO. 292 OR THE ADMINISTRATIVE CODE OF 1987"
congress_website_abstract = "Amends some provisions, among others, to be read as follows: SEC.1 Sec. 17. Power to Issue Temporary Designation. - (1) The President may temporarily designate an officer already in the government service, appointment to which is vested in him by law, . . . (2) . . . (3) In no case shall a temporary designation exceed SIX (6) MONTHS. IN CASE OF VACANCY, THE PRESIDENT IS MANDATED TO FILL THE POSITION WITH A PERMANENT APPOINTMENT WITHIN THE SAID PERIOD. SEC. 2. Sec. 27. Employment Status - Appointment in the career service shall be permanent or temporary. x x x (2) Temporary appointment. - . . . PROVIDED FURTHER, THAT ON OR BEFORE THE EXPIRATION OF THE SIX-MONTH PERIOD FROM THE TIME OF VACANCY, A PERSON ISSUED WITH A PERMANENT APPOINTMENT SHALL FILL THE SAID VACANCY. A PERSON DESIGNATED AS AN OFFICER-IN-CHARGE (OIC) SHALL EXERCISE LIMITED POWERS WHICH ARE CONFINED ONLY TO FUNCTIONS OF ADMINISTRATION . . . THE OIC SHALL NOT BE DEEMED TO POSSESS POWERS INVOLVING THE EXERCISE OF DISCRETION TO ENTER INTO ANY LONG-TERM AND/OR HIGH-VALUE CONTRACTS OR AGREEMENTS . . ."
