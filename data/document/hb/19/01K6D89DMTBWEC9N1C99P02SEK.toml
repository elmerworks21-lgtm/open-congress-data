congress_website_title = "AN ACT PROVIDING FOR THE URBAN AND COUNTRYSIDE GREENING IN THE PHILIPPINES"
congress_website_abstract = "Intends to complement our National Greening Program to ensure sufficient greenery in urban and countryside areas - by making it mandatory for national agencies and LGUs to maintain forest parks and to plant trees and shrubbery in parks/plazas, public elementary school grounds, roads and other public open spaces where appropriate. Seeks to establish a National Greening committee headed by the DENR Secretary with respective Secretaries of the Department of Tourism, DILG, and the Department of Agriculture as members."
