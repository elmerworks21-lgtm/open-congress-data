congress_website_title = "AN ACT REGULATING THE ESTABLISHMENT AND USE OF ONLINE PHARMACIES IN THE PHILIPPINES"
congress_website_abstract = "Seeks to regulate the establishment and use of “eBotika” in the sale and distribution of drugs, medicines, and medical devices in the country. Aims to address several issues among others related to: 1) proliferation of illegal online sale of drugs and medicines and drug trafficking activities; 2) online sale of unregistered products such as medical devices, cosmetics and food supplements; 3) streamlined licensing process and regular monitoring of online pharmacy services; 4) a secure online platform, adequate inventory of pharmaceutical products and implementation of quality control measures; 5) verification of patient´s identity, etc. and electronic prescriptions; drug orders´ submission by multiple pharmacies; 6) patient´s medication profiles, confidentiality of their personal and sensitive information when transmitted over the internet, etc."
