congress_website_title = "AN ACT REGULATING THE USE OF TREATMENT TECHNOLOGY FOR MUNICIPAL AND HAZARDOUS WASTES, REPEALING FOR THE PURPOSE SECTION 20 OF REPUBLIC ACT NO. 8749, ENTITLED \"THE PHILIPPINE CLEAN AIR ACT OF 1999\""
congress_website_abstract = "Proposes to amend Sec.20 of R.A. 8749 or the Philippine Clean Air Act of 1999, and certain provisions from R.A.9003 or the Ecological Solid Waste Management with regard to the ban on incineration of waste. Intends to address the persistent garbage problem of the country by allowing the use of modern options using thermal treatment units employing a Waste-to-Energy (WTE) or energy-from-waste that process non-renewable waste to reduce environmental and health damages while generating sustainable energy."
