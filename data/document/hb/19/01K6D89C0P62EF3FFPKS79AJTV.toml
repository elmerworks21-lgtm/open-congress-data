congress_website_title = "AN ACT AMENDING SECTION 6, CHAPTER II, TITLE II OF PRESIDENTIAL DECREE #198, AS AMENDED"
congress_website_abstract = "Seeks to address a controversy in the province and cities of Cebu, particularly in localities served by the Metropolitan Cebu Water District (MCWD), with regards to the persons and entities to be held accountable for the undisputed failure of the water district to supply adequate water to its consumers. Proposes to allow and encourage the oversight function by the local governments on the performance of water districts because local officials have a large stake in the issue of water supply and sharper capacity because of their proximity to assess the problem than the central agency Local Water Utilities Administration (LWUA), which is mandated by law to administer and oversee water districts."
