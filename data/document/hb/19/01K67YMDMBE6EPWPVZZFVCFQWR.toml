congress_website_title = "AN ACT FURTHER PROMOTING ENTREPRENEURSHIP BY STRENGTHENING, EMPOWERING, AND ENHANCING THE FINANCING AND OTHER SUPPORT PROGRAMS FOR MICRO, SMALL AND MEDIUM ENTERPRISES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6977, AS AMENDED, OTHERWISE KNOWN AS THE “MAGNA CARTA FOR MICRO, SMALL AND MEDIUM ENTERPRISES (MSMEs)”"
congress_website_abstract = "Aims to promote, support, strengthen and encourage the growth and development of MSMEs in all productive sectors of the economy particularly rural/agri-based, MANUFACTURING, FINANCE AND SERVICES enterprises. Seeks to recognize the specific needs of the MSMEs and shall undertake to promote entrepreneurship, support entrepreneurs, encourage the establishment of MSMEs and ensure their continuing viability and growth and thereby attain countryside industrialization."
