congress_website_title = "AN ACT INSTITUTING POLICIES FOR THE PROTECTION AND WELFARE OF CAREGIVERS IN THE PRACTICE OF THEIR PROFESSION"
congress_website_abstract = "Aims to protect the rights of the caregivers towards a decent employment and income, and adheres to a policy of protecting caregivers against abuse, harassment, violence and economic exploitation. Enumerates prescribed pre-employment requirements for caregivers prior to the execution of the contract. Enumerates the duties of caregivers and the specific benefits that are due them. Prescribes the manner the employer may terminate the services of the caregiver at any time before the expiration of the contract."
