congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE AND RESPONSIVE CIVIL REGISTRATION AND VITAL STATISTICS SYSTEM"
congress_website_abstract = "Seeks to establish a more efficient and inclusive standardized and modernized civil registration system that shall be used as the evidence base for social, economic, and health policy. Defines the duties and powers of the Civil Registrar General and the City/Municipal Civil Registrar. Mandates the local civil registrar to maintain, keep, and preserve in a secured place the Books of registry where the acts, events, judicial decrees or orders concerning the civil status of persons are properly entered. Provides for a free registration of vital civil registry events including late registrations. Provides for mandatory continuing education and training program for Civil Registrars, Consul Generals, District Recorders, Circuit Registrars and their staff to ensure the efficient delivery of civil registration services. Establishes the Indigenous Peoples Civil Registration System (IPCRS) that is sensitive and appropriate to the unique cultural practices and identification systems of ICCs/IPs. Establishes the Barangay Civil Registration System (BCRS) where elected and appointed barangay officials shall be mandated to assist in the facilitation of civil registration within the area of jurisdiction. Mandates the digitalization of civil registration processes and the national register, local registers and other records."
