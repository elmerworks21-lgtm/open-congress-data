congress_website_title = "AN ACT PROMOTING THE GROWTH AND DEVELOPMENT OF SOCIAL ENTERPRISES AS A MEANS TO ALLEVIATE POVERTY, ESTABLISHING FOR THE PURPOSE THE POVERTY REDUCTION THROUGH SOCIAL ENTREPRENEURSHIP (PRESENT) PROGRAM, CREATING THE SOCIAL ENTERPRISE DEVELOPMENT COUNCIL, PROVIDING SUPPORT, BENEFITS AND APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to create an environment that encourages the development, growth and sustainability of social enterprises by providing them with programs, financial support, resources, and incentives - as they improve the quality of life of specific segments of the marginalized and vulnerable sectors of society - for them to become effective workers, suppliers, clients and/or owners. Intends to distribute to these sectors a substantive part of the wealth created by the Social Enterprises. Defines Social Enterprise (SE) as a mission-driven organization that creates wealth while contributing to social well-being and ecological sustainability. It can take the form of non-stock, non-profit corporations such as NGOs, POs, foundations, associations; cooperatives; and sole proprietorships, partnerships, and stock corporations."
