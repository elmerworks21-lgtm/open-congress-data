congress_website_title = "AN ACT PROVIDING FOR COMPREHENSIVE ATOMIC REGULATION, CREATING FOR THE PURPOSE, THE PHILIPPINE ATOMIC REGULATORY COMIISSION, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes to create the Phil. Nuclear Regulatory Commission (PNRC) under the DOST, to ensure the effectiveness of independent regulatory functions for control of all sources of ionizing radiation for the safety and security of the public and the protection of the environment. Proposes to address all the gaps and omissions under the current legislative framework in the areas of system of physical protection, safeguards, nuclear security, nuclear/radiological emergency preparedness and response, radioactive waste management, licensing of nuclear facilities, nuclear materials, and radioactive sources, including those in the PNRI, and transport of nuclear/radioactive materials."
