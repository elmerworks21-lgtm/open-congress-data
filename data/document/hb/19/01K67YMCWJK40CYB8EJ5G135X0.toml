congress_website_abstract = "Aims to encourage the utilization of environmental-friendly alternatives to plastic bags and to help fund the implementation of the \"Ecological Solid Waste Management Act of 2000\". Proposes to impose an excise tax of P20.00 for every kilogram of plastic bag removed from the place of production or released from the custody of the Bureau of Customs. Intends to help finance the projects of LGUs pursuant to Republic Act No. 9003."
