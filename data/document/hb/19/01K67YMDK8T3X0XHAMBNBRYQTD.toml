congress_website_title = "AN ACT PROVIDING FOR A FIVE-YEAR VALIDITY PERIOD OF THE PROFESSIONAL IDENTIFICATION CARDS OF ALL PROFESSIONAL UNDER THE PROFESSIONAL REGULATION COMMISSION"
congress_website_abstract = "Provides for a five (5) year validity period of the Professional Identification Cards issued by the Professional Regulation Commission (PRC) subject to the compliance with all the legal and procedural requirements for its issuance. Mandates the Information and Communication Technology Service (ICTS) and other concerned offices/divisions of the PRC to complete the necessary systems enhancement and other administrative processes, including the finalization of the revised assessment of annual registration fees within six (6) months from the effectivity of this Act."
