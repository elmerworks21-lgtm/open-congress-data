congress_website_title = "AN ACT CREATING COURT OF MARITIME APPEALS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES."
congress_website_abstract = "Seeks to address issues, disputes, or claims surrounding the maritime industry which may involve complex jurisdictional issues in a globalized context - the resolution of which requires technical expertise in the field of maritime law. Proposes that CMA shall be of the same level as the Court of Appeals - possessing all the inherent powers of a Court of Justice, and shall consist of a Presiding Justice and eight (8) Associate Justices”¦ Proposes that CMA shall exercise exclusive appellate jurisdiction to review by appeal - decisions on the following range of cases as follows: seafarer´s money claims (NLRC); vessel registration fees, tonnage fees, accreditation fees, safety certificates, certificates of public convenience, licenses, special permits or other matters administered by the MARINA; maritime safety and maritime environment laws (Phil. Coast Guard); and all actions in admiralty and maritime jurisdiction originally decided or resolved (RTC) . . ."
