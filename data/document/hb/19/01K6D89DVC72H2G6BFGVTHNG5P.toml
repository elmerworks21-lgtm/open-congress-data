congress_website_title = "AN ACT PROVIDING THE MAGNA CARTA FOR TAXPAYERS"
congress_website_abstract = "Intends to enhance protection of taxpayer´s rights, boost their trust and confidence in government revenue authorities, and improve tax compliance by educating them about their duties and responsibilities. Proposes to codify taxpayer´s basic rights for better taxpayer education and prevention of abuses and violations committed against them. Provides for taxpayers´ duties and responsibilities as follows: to comply with tax laws; to truthfully and timely disclose information; to lodge and submit required complete documents on time; to keep and make records available for examination; to cooperate with revenue authorities during tax audits; and to timely pay taxes."
