congress_website_title = "AN ACT EMANCIPATING AGRARIAN REFORM BENEFICIARIES FROM FINANCIAL BURDEN BY CONDONING UNPAID AMORTIZATIONS AND INTERESTS AND EXEMPTING PAYMENT OF ESTATE TAX ON AGRICULTURAL LANDS AWARDED UNDER THE COMPREHENSIVE AGRARIAN REFORM PROGRAM"
congress_website_abstract = "Aims to condone unpaid amortization amounts, interest payments, surcharges, and penalties of existing loans of agrarian reforms beneficiaries (ARBs) secured under the Comprehensive Agrarian Reform Program (CARP) thereby repealing Section 26 of RA No. 6657, as amended, Section 6 of EO No. 228, series of 1987, as well as the pertinent provisions of other agrarian laws. Mandates the Department of Agrarian Reform (DAR) to issue, whenever necessary, a Certificate of Land Ownership Award (CLOA), or any other title based on the applicable agrarian reform law; Provides that condonation shall lift all mortgage liens in favor of the National Government, as represented by the Land Bank of the Philippines (LBP), attached to the land acquired. States that awarded land subject to this Act shall not be sold, transferred, or conveyed except through hereditary succession, or to the government or to the LBP, or other qualified beneficiaries through the DAR, for a period of ten (10) years from the issuance of the Certificate of Condonation or the CLOA. Exempts the agrarian reform lands of ARBs, as estates, from the payment of estate tax. Mandates the dismissal, motu proprio, by the DAR or the court, of any pending administrative or judicial case involving the forfeiture by the DAR of the agrarian reform award solely due to the failure of an ARB to pay the thirty (30)-year amortization plus six percent (6%) annual interest. Disqualifies ARBs who are convicted by final judgment due to acts and omissions constituting violations of agrarian reform laws to avail of the benefits under this Act."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=19&q=HBN-6336"
