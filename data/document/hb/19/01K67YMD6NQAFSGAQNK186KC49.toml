title = "ANTI-CORRUPTION MECHANISMS IN THE OPERATION OF BANKS AND OTHER FINANCIAL INSTITUTIONS"
date_filed = "2023-03-06"
long_title = "AN ACT PROMOTING TRANSPAPRENT GOVERNANCE AND INSTITUTING ANTI-CORRUPTION MECHANISMS IN THE OPERATION OF BANKS AND OTHER FINANCIAL INSTITUTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 1405, ENTITLED AN ACT PROHIBITING DISCLOSURE OF OR INQUIRY INTO, DEPOSITS WITH ANY BANKING INSTITUTION AND PROVIDING PENALTY THEREFOR"
scope = "National"
subjects = [ "Anti-Corruption", "Bank Deposits/Bank Accounts",]
congress_website_author_codes = ["F092","K013","J082"]
congress_website_coauthors_raw = ["DALIPE, MANUEL JOSE M.","GUINTU, IVAN HOWARD A.","VALERIANO, ROLANDO M.","CHUA, JOEL","DIONISIO, ERNESTO JR. M.","TAMBUNTING, GUS S.","CUA, MIDY","MATIBAG, ANN AMB","OAMINAL, ANDO","RIVERA, BONG","REVILLA, RAMON JOLO III B.","SUAN, LORDAN","BULUT-BEGTANG, ELEANOR C.","ESCUDERO, DETTE","ROMUALDEZ, FERDINAND MARTIN G.","MARCOS, SANDRO","OLIVAREZ, EDWIN L."]
congress_website_committee_codes = ["0505","0532"]
congress_website_primary_keys = [16813]
congress_website_title = "AN ACT PROMOTING TRANSPARENT GOVERNANCE AND INSTITUTING ANTI-CORRUPTION MECHANISMS IN THE OPERATION OF BANKS AND OTHER FINANCIAL INSTITUTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 1405, ENTITLED “AN ACT PROHIBITING DISCLOSURE OF OR INQUIRY INTO, DEPOSITS WITH ANY BANKING INSTITUTION AND PROVIDING PENALTY THEREFOR”"
congress_website_abstract = "Includes the inquiry or examination made by the Bangko Sentral ng Pilipinas (BSP), in the exercise of its supervisory powers, as one of the exceptions to the prohibition to examine, inquire or look into deposits, provided that 1.) there is reasonable ground to believe that a fraud, serious irregularity or unlawful activity has been or is being committed by a stockholder, owner, director, trustee, officer or employee of an entity that is subject to the supervision or regulatory power of the BSP and; 2.) it is necessary to look into the deposit to establish such fraud, serious irregularity or unlawful activity. Provides that inquiry and examination of deposits shall be for the exclusive use of the BSP and shall not be made available to any person or entity, whether public or private, except to the Securities and Exchange Commission, Philippine Deposit Insurance Corporation, Anti-Money Laundering Council, Department of Justice, and the courts."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=19&q=HBN-7446"

