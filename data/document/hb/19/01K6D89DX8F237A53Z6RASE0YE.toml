congress_website_title = "AN ACT PROVIDING FOR THE MAGNA CARTA OF YOUNG FARMERS"
congress_website_abstract = "Seeks to address future critical shortage of farmers and the employment drop in agricultural sector - through increasing agricultural production and farming subsidies and incentivizing members particularly the youth. Aims to promote and fulfill the rights of young farmers in all aspects but not limited to their rights to food security, education, training and access to land; Establishes the National Young Farmers and Fisherfolks Council. Defines several terms among others, such as Agriculture, Eco-warriors, Food Security, and Organic Agriculture and others. Provides for the following provisions regarding the following: State as primary duty bearer; Non-Diminution of the Rights of Young Farmers; Linkage with SUC of choice; Access to Technology, Credit and Capital; Right to Resources for Food Production (land transfer tax exemptions; land and farm planning management); Nat´l Young Farmers Roadmap; Recognition and preservation of Cultural Identity and Indigenous Farming Traditions; strengthen Young Farmer Organizations; Legal Protection on Negotiations and Trade Partnership Agreements; Farm Insurance and others, etc."
