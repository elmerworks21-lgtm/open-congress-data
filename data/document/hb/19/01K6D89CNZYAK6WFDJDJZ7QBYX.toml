congress_website_title = "AN ACT ESTABLISHING A SUSTAINABLE RETIREMENT AND PENSION SYSTEM BY AMENDING PERTINENT LAWS ON THE RETIREMENT BENEFITS AND PENSION OF THE UNIFORMED PERSONNEL OF THE UNIFORMED SERVICES AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Seeks to reform the benefit and pension system in the uniformed service; Proposes to create a Uniformed Personnel Retirement Fund that shall be financed primarily through mandatory contributions from active members of uniformed service. Provides a rationalized adjustment of retirement benefits and pension; and an automatic review of pension and benefits two years after retirement and every two years thereafter."
