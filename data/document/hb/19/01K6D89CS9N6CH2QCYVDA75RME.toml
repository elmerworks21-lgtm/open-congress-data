congress_website_title = "AN ACT ESTABLISHING THE MAKABAYAN TRAINING PROGRAM, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to make the young generation more socially equipped for nation-building by instilling in them the love of country through the immersion of the students under the MTP, which will prepare them for war and any civil disaster, unrest, and other calamities. Proposes to make it mandatory for Grades 11 and 12 students under Senior High School to undergo MTP that shall form part of the curricula and shall consist of the following: The Reserve Officers´ Training Corps (ROTC); First Responders´ Service Training (FiRST); and Environmental and Community Service Training (EnCoST)."
