congress_website_title = "AN ACT CREATING THE OFFICE FOR INVESTOR FACILITATION AND PROTECTION AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to create and establish an independent authority attached to the Office of the President which shall: Act as a coordinator and integrator for the investor, the IPAs, etc. concerning business registration, permits, clearances, and endorsements; Acts as a protector by a) expeditiously resolving disputes between the investor and the IPAs, etc. with respect to the administration of investment incentives program and grant of the investment incentives; and b) interpret the contract re: grant of the particular incentives program and sees to it that its provisions are carried out and performed by the parties; Establishes a mandatory alternative to dispute resolution through consultation or consultative meetings and discussions before referring it to ADR."
