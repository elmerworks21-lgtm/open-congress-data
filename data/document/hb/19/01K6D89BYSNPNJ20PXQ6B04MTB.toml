congress_website_title = "AN ACT REVERTING FISHPONDS WHICH HAVE BEEN UNUTILIZED OR ABANDONED FOR A PERIOD OF THREE (5) YEARS TO FOREST LANDS, AMENDING FOR THE PURPOSE SECTION 43 OF PRESIDENTIAL DECREE NO.705 OTHERWISE KNOWN AS THE “THE REVISED FORESTRY REFORM CODE OF THE PHILIPPINES”"
congress_website_abstract = "Seeks to shorten the period to revert fishponds to forest lands from five (5) years to THREE (3) YEARS only. Proposes that the Department of Agriculture and the Department of Environment and Natural Resources shall jointly set guidelines for determining abandoned, undeveloped or underutilized fishponds . . . which shall be reverted into forestlands and to be rehabilitated."
