congress_website_title = "AN ACT PROVIDING FOR THE FULL AND EFFECTIVE IMPLEMENTATION AND ENFORCEMENT OF INTERNATIONAL MARITIME INSTRUMENTS OF WHICH THE PHILIPPINES IS A STATE PARTY"
congress_website_abstract = "Defines the term “domestication” as used in this Act, among others. Aims to address the risk faced by the country´s overseas shipping fleet being detained by other port states brought about by the government´s inability to fully and effectively implement international maritime instruments that the Philippines have ratified or acceded to. This contributes to the steady decline in the number of the country´s overseas shipping fleet. Provides that among these instruments are the mandatory conventions involving safety of life at sea (SOLAS 1974 and its Protocol); prevention of pollution from ships (MARPOL); load lines (LL 66 and its 1988 Protocol); tonnage measurement of ships (Tonnage 1969); and regulations preventing collisions at sea (COLREG 1972)."
