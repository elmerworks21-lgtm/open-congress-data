congress_website_title = "AN ACT EXCLUDING THE SERVICES PERFORMED BY EMPLOYEES OF RELIGIOUS ENTITIES FROM EMPLOYMENT SERVICES COVERED BY SOCIAL SECURITY SYSTEM LAW, AMENDING FOR THE PURPOSE REPUBLIC ACT NO.8282 OTHERWISE KNOWN AS THE \"SOCIAL SECURITY ACT OF 1997\""
congress_website_abstract = "Seeks to exlude from the coverage of R.A. No.8282, the “service performed in the employ of a foundation, association or corporation, organized and operated exclusively for religious purposes: Provided, that the employees . . . voluntarily perform their duties fully directly, and solely for religious activities . . .: Provided further, that said employees are active and devoted members of these religious entities: Provided, finally, that these entities provide said employees with decent housing and basic medical services, aside from the modest financial allowances they receive to support themselves and/or their families: . . ."
