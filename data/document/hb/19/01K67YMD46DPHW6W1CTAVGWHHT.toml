congress_website_title = "AN ACT MANDATING THE PHILIPPINE MERCHANT MARINE ACADEMY TO ADMIT ONE CADET FROM EACH CONGRESSIONAL DISTRICT EVERY SCHOOL YEAR TO COMPRISE ITS FRESHMAN CLASS"
congress_website_abstract = "Mandates the Philippine Merchant Marine Academy (PMMA) to select student applicant from each of the congressional districts in the Philippines to ensure that the entire country will be represented in each graduating class. Requires a cadet to pass the entrance examination and comply with all the admission requirements of the PMMA. Provides that three (3) cadets shall be selected for a province with only one (1) congressional district and upon determination of the PMMA there is no qualified applicant from a certain congressional district, a qualified applicant, irrespective of domicile, shall be considered for the slot."
