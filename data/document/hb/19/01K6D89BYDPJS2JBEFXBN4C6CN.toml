congress_website_title = "AN ACT INSTITUTING THE MEDICAL RESERVE CORPS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to establish an MRC under DOH composed of licensed physicians, medical students, graduates of medicine, registered nurses, and licensed allied health professional who may be called upon to assist the government in addressing the medical needs of the public during national or local health emergencies which require manpower support. Defines “Public Health Emergency” as stated in R.A.11332; Grants the President the power to mobilize the MRC nationwide in stipulated cases; Enlists the Armed Forces of the Phils. in the organization, training in disaster and emergency response, and complement the MRC logistics and manpower; Establishes mobilization centers in every province and city as needed."
