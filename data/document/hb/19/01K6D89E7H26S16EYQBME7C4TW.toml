congress_website_title = "AN ACT PENALIZING ILLICIT TOBACCO TRADE AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Defines \"Illicit tobacco trade\" as any practice or conduct prohibited by law and which relates to the production, shipment, receipt, possession, distribution, sale, or purchase of tobacco products, including vapor products and heated tobacco products, including any practice or conduct intended to facilitate such activity. Seeks to impose heavy and differentiated penalties based on the degree of involvement in illicit trade; establish a modem digital tracking and tracing system; form an inter-agency body to facilitate information sharing and collaborative enforcement among government agencies and stakeholders; broaden the scope of activities that fall under illicit tobacco trade; and strengthen monitoring by mandating the conduct of regular surveys to determine the size, volume, nature, and conduct of illicit trade. Related terms: electronic cigarette; e-cigarette"
