congress_website_title = "AN ACT TO FURTHER STRENGTHEN THE ANTI-MONEY LAUNDERING ACT, AMENDING FOR THE PURPOSE SECTIONS 3, 3(a), 3(b), 3(g), 3(i), 7, 7(5), 7(6), 7(7), 7(11), 9(a), 9(c), 10, 11, 14(c), 15, and 16; AND REPEALING SECTION 20 OF REPUBLIC ACT NO. 9160, OTHERWISE KNOWN AS THE “ANTI-MONEY LAUNDERING ACT OF 2001”, AS AMENDED"
congress_website_abstract = "Aims to amend Republic Act No. 9160, also known as the Anti-Money Laundering Act of 2001 (AMLA) to make it more effective in combating money laundering. Seeks to amend AMLA by a) including casinos, real estate brokers, art dealers, and motor vehicle dealers as covered persons; b) changing the nomenclature for the covered person “jewelry dealers” in precious metals and stones to “dealers” in precious metals and stones and including jewelry dealers as a separate covered person; c) clarifying the definition of covered transactions depending on the covered person; d) designating the BSP as the Supervising Authority of foreign exchange dealers, money changers, and remittance and money and money transfer businesses, for purposes of the AMLA; e) adding unlawful activities under Sec.3(i) of the AMLA, such as violations of firearms and ammunitions regulation act, cybercrimes, violations of strategic trade management act (re: weapons of mass destruction), and tax evasion; among others."
