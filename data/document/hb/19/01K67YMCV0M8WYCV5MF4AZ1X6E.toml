congress_website_coauthors_raw = ["TAMBUNTING, GUS S.","VILLANUEVA, EDUARDO \"Bro. Eddie\" C.","TAN, KEITH MICAH D.L. TAN","MERCADO-REVILLA, LANI","SALCEDA, JOEY S.","VILLARICA, LINABELLE RUTH R.","DALIPE, MANUEL JOSE M.","MACEDA, EDWARD VERA PEREZ","PRIMICIAS-AGABAS, MARLYN L.","REVILLA, RAMON JOLO III B.","ESCUDERO, DETTE","MARIANO-HERNANDEZ, RUTH"]
