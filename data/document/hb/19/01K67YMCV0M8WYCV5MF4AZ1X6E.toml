congress_website_title = "AN ACT INSTITUTING POLICIES FOR THE PROTECTION AND PROMOTION OF THE WELFARE OF WORKERS OR INDEPENDENT CONTRACTORS IN THE FILM, TELEVISION, AND RADIO ENTERTAINMENT INDUSTRY"
congress_website_abstract = "Mandates the work hours by the worker or talents shall not exceed eight (8) hours and overtime works shall not exceed more than twelve (12) hours in a 24-hour period. Provides for proper compensation and facilities, such as transportation and accommodation, for talents and workers working in location shoots, as well as social service benefits. Imposes penalties on a network or company that violates the provided working conditions."
