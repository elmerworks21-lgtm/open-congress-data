congress_website_title = "AN ACT ESTABLISHING THE NATIONAL CLEARANCE SYSTEM, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Tasks the PNP to be responsible for the implementation of the NPCS - PNP that shall formulate and adopt policies for the effective operationalization of the NPCS including, but not limited to, maintenance of a national record of all reported crime incidents, warrants of arrests, pictures and personal details of arrested and wanted persons, fingerprints and ballistic examination records and other relevant information. States that the National Police Clearance shall be the sole government certificate or document required in all PNP transactions for verifying the presence or absence of any criminal and/or derogatory records of the individual transacting with the PNP."
