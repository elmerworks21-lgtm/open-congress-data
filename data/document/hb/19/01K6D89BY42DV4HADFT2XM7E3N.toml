congress_website_title = "AN ACT ESTABLISHING THE NATIONAL FRAMEWORK FOR WATER RESOURCE MANAGEMENT AND CREATING THE DEPARTMENT OF WATER RESOURCES AND THE WATER REGULATORY COMMISSION, DEFINING THEIR MANDATES, POWERS AND FUNCTIONS, AND APPROPRIATINGS FUNDS THEREFOR"
congress_website_abstract = "Intends to address the fragmented and uncoordinated governance and maintenance of our water resources in order to provide accessible, affordable, safe and reliable potable water and proper sanitation services. Proposes to create a Department where all government agencies related to water shall be rationalized under it; to adopt the Integrated Water Resources Management (IWRM) as the strategic framework for policy-making and planning, etc.; and to create an independent Water Regulatory Commission that shall protect consumer welfare and reject abusive practices in the industry."
