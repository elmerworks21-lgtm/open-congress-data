congress_website_title = "AN ACT PROMOTING PHILIPPINE INDIGENOUS AND TRADITIONAL WRITING SYSTEMS AND PROVIDING FOR THEIR PROTECTION, PRESERVATION, AND CONSERVATION"
congress_website_abstract = "Seeks to promote, protect, preserve, and conserve the Philippine indigenous and traditional writing systems as a means to inculcate patriotism and social consciousness among the citizenry. Mandates the NCCA to be the lead agency in promulgating policy guidelines on the promotion of the writing systems and to protect, preserve, and conserve the writing systems as a national cultural treasures in accordance with R.A. No. 10066, otherwise known as the “National Cultural Heritage Act of 2009.”"
