congress_website_title = "AN ACT PROVIDING FOR A CIVIL FORFEITURE IN FAVOR OF THE STATE ANY UNLAWFULLY ACQUIRED REAL ESTATE PROPERTIES BY ANY FOREIGN NATIONAL"
congress_website_abstract = "Seeks to address thousands of aliens flocking to the country involved in Philippine Offshore Gaming Operators (POGOs) that became closely linked to criminal activities that include ownership of land/s. The issue of illegal POGOs led to the review of existing policies against foreign land ownership, establishing the necessary framework for better enforcement and allocation for public use - any real property acquired through successful forfeiture proceedings. Proposes several manners in the disposal of the real estate property: for agricultural land - shall be distributed to qualified farmers in coordination with DAR; for non-agricultural land - for the establishment of schools, hospitals, and other establishments for socialized services; or may be donated to the LGUs for social services facilities or to be turned over to the Privatization and Management Office of the DOF."
