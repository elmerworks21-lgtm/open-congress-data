congress_website_title = "AN ACT REPEALING ARTICLE 247 OF ACT NO. 3815, ALSO KNOWN AS THE REVISED PENAL CODE, ON DEATH OR PHYSICAL INJURIES INFLICTED UNDER EXCEPTIONAL CIRCUMSTANCES"
congress_website_abstract = "Proposes to repeal Article 247 of the Revised Penal Code regarding death or physical injuries inflicted under exceptional circumstances (committed by any legally married person to his/her wife/husband and by parents with respect to their daughters under eighteen years of age and their seducer. . . Seeks to address the stated provisions that runs counter with R.A. No.7610 (Special Protection of Children Against Abuse, Exploitation and Discrimination Act) and R.A. No. 9262 (Anti-Violence Against Women and Their Children Act of 2004) that proscribe corporal punishment to children and prohibit any form of violence against women."
