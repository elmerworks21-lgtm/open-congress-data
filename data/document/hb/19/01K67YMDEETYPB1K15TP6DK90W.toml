congress_website_title = "AN ACT PROVIDING THE MUSLIM FILIPINOS BETTER ACCESS TO SHARI´A COURTS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9997, OTHERWISE KNOWN AS THE “NATIONAL COMMISSION ON MUSLIM FILIPINOS ACT OF 2009”"
congress_website_abstract = "Seeks to allow the National Commission on Muslim Filipinos to act as a service provider for and in behalf of Muslim Filipinos to file and receive routine documents to the Shari´a Courts. Allows the creation of a digital platform in the pursuit of providing a paperless process on certain services of the Shari´a Courts. Allows the Philippine Statistics Authority and the Commission to coordinate on the collection of statistical data for Muslim Filipinos in the national, regional, provincial, city, and municipal levels and directs them to prepare an annual report on the Muslim Filipino population which includes population, annual births, marriages, and deaths."
