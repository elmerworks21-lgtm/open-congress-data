congress_website_abstract = "Aims to adopt measures that will continuously improve the knowledge, skills and competence, and ethical standards of midwives in order to raise the standards of the midwifery profession, improve the delivery of midwifery services to the public and enable midwives to discharge their public responsibility more effectively. Also seeks to promote and protect the midwifery profession, rights, and welfare, and provide better salaries and wage benefits to midwives."
