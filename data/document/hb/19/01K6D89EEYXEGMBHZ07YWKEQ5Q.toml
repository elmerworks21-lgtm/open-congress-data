congress_website_title = "AN ACT PROVIDING FOR A NEW CHARTER OF THE DEVELOPMENT BANK OF THE PHILIPPINES, REPEALING FOR THE PURPOSE EXECUTIVE ORDER NO. 81, DATED DECEMBER 3, 1986, OTHERWISE KNOWN AS “THE 1986 REVISED CHARTER OF THE DEVELOPMENT BANK OF THE PHILIPPINES\", AS AMENDED"
congress_website_abstract = "Seeks to strengthen the powers and functions of the Development Bank of the Philippines as the country´s premier government developmental financial institution that provides developmental financing and financial services necessary for the achievement of sustained economic growth. Provides for the composition as well as the powers and functions of the Bank which shall be vested in and exercised by a Board of Directors composed of nine (9) members as follows: a.) The Secretary of Finance as the ex-officio Chairperson of the Board; b.) The Secretary of the National Economic and Development Authority, as an ex-officio member; c.) Four (4) regular directors and three (3) independent directors to be appointed by the President of the Philippines in accordance with the appointment process and the Fit and Proper Rule under RA 10149.Exempts all collaterals, securities and loan guarantees and other accommodations granted by the Bank or its predecessors-in-interest from attachment, execution, stay order, or any other court processes, nor shall these be subject to insolvency proceedings unless all debts to the Bank have been previously paid. Prohibits the unauthorized exaction of fee, commission, gift, or charge of any kind for obtaining loans from the Bank."
