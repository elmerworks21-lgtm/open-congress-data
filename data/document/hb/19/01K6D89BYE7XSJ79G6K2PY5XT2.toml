congress_website_title = "AN ACT REQUIRING THE ESTABLISHMENT OF DIALYSIS CLINICS IN ALL NATIONAL, REGIONAL AND PROVINCIAL HOSPITALS AND PROVIDING FOR FREE DIALYSIS TREATMENTS TO INDIGENT PATIENTS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to address the kidney problem situation in the country especially for Filipinos living below poverty line by establishing a Dialysis ward or unit in all national, regional and provincial government hospital. Defines “Indigent Patient” to a patient whose combined annual family income does not exceed thirty thousand pesos (P30,000.00)."
