congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8293 OTHERWISE KNOWN AS THE “INTELLECTUAL PROPERTY CODE OF THE PHILIPPINES”, INCREASING ITS PENALTIES AND SANCTIONS, RATIONALIZING ITS POWERS AND FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to streamline all administrative procedures for the registration of patents, trademarks, and copyrights; to liberalize the registration on the transfer of technology; and enhance the enforcement of intellectual property rights. Proposes, among others, amendments to the following: the duration of the period when a certificate of registration shall remain in force and its renewal period; the sale or lease of an original work of painting or sculpture or the original manuscript of a writer or composer; and the corresponding penalties for infringement, and others."
