congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 11223, OTHERWISE KNOWN AS THE “UNIVERSAL HEALTH CARE ACT”"
congress_website_abstract = "Tasks the Health Technology Assessment Council to review and assess the amount for each benefit package and for the PhilHealth Board to adjust income thresholds based on health funding needs. Seeks to amend provisions regarding missed contributions´ interest and premium contributions, schedule of self-employed direct/self-earning contributors, and professional practitioners. Proposes that migrant workers´ premium contributions shall based on the income floor, with 50% of their contributions subsidized by the national government. Provides that unpaid contributions not be collected upon the return of distressed migrant workers. States that the President may suspend premium contribution increases in case of a national emergency, public health emergency, or state of calamity."
