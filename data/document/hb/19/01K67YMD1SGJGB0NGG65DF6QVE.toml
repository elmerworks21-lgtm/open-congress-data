congress_website_title = "ACT PROVIDING FOR THE ENABLING ENVIRONMENT TO FOSTER THE GROWTH OF PUBLIC-PRIVATE PARTNERSHIPS FOR INFRASTRUCTURE AND OTHER DEVELOPMENT PROJECTS"
congress_website_abstract = "Provides clear parameters on 1) government undertaking, 2) approval, procurement, and protest, and 3) fiscal rules on contingent liabilities. Promotes local autonomy in public infrastructure by including the joint venture framework as a PPP variant, and allowing LGUs to undertake their PPP projects provided there is no national government undertaking. Includes provisions as follows: National and PPP Projects approval procedures; Optimal allocation of risks; Fair competition and protection of public interest; Issuance of TROs and preliminary mandatory injunctions; Institutionalization of the PDMF; Policy on contract disclosure; Contract management and risk mitigation plan; Risk Management Fund; Electronic bid submissions; Conflict of interest prohibition; COA audit for transparency and accountability; Alternative sources of financing such as Green Financing, corporate or project bonds and securities, and other forms of capital market financing; Dispute Avoidance and Alternative Dispute Resolution Mechanisms; Land value capture strategies; wind-up and transfer measures; and penal provisions for strict compliance with the law."
