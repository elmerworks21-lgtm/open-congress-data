congress_website_coauthors_raw = ["DALIPE, MANUEL JOSE M.","PRIMICIAS-AGABAS, MARLYN L.","MASTURA, SITTIE SHAHARA I.","BULUT-BEGTANG, ELEANOR C.","RIVERA, BONG","OLIVAREZ, EDWIN L.","ROMUALDEZ, FERDINAND MARTIN G."]
