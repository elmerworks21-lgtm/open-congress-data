congress_website_title = "AN ACT INSTITUTIONALIZING INDUSTRY CLUSTER-BASED PROGRAMS AND PROJECTS THROUGH INTER-LOCAL COOPERATION AND PEOPLE´S PARTICIPATION"
congress_website_abstract = "Declares that the State shall encourage cooperation among LGUs . . . to institutionalize a program to strengthen people's participation in local development, enhance productivity, and guarantee income opportunities for all. Refers Industry cluster to the geographic concentration of competing but collaborating and independent businesses within a value chain of a broadly defined industry, from suppliers to end products . . . Proposes, among others - each industry cluster shall formulate an industry plan which shall include: List of products and services; Activities involved towards products/services' development; Role of each LGU in its development process; Assistance needed from other agencies and institutions; Sources of fund support; Projected income; Areas or gaps that must be addressed; Labor market study for product's development; and Identification of research or studies relevant to the products/services' development from academic institutions."
