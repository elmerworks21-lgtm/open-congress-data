congress_website_title = "AN ACT RECOGNIZING THE RIGHTS OF NATURAL ECOSYSTEMS, POPULATIONS, AND PROCESSES AND PROVIDING MECHANISMS FOR THE PROTECTION AND ENFORCEMENT THEREOF"
congress_website_abstract = "Seeks to recognize natural ecosystems, populations, and processes as legal entities sui generis entitled to certain inherent and inalienable rights, including rights to existence, regeneration, and restoration. Proposes to grant environmental activists the legal authority to petition our courts on behalf of the environment to promote, enhance and safeguard the rights of natural ecosystems, including populations of plant and animal species."
