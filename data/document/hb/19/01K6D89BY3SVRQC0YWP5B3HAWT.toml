congress_website_title = "AN ACT TO FURTHER DEVELOP CAPABILITY AND ESTABLISH EXPEDITIOUS TRANSFORMATION OF THE DEPARTMENT OF NATIONAL DEFENSE AND ITS BUREAUS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to provide a mechanism for the coordination of departments and agencies in addressing multi-dimensional facet of national defense and security, and to achieve a common understanding of its issues by providing the facility for consensus building and consultation processes; Proposes several provisions among others regarding: mandatory military service; the National Defense Council which mandates DND to exercise supervision and control over the AFP, Government Arsenal, Office of Civil Defense, Phil. Veterans Affairs Office (PVAO) and the National Defense University of the Phils.; management and control of defense real properties; functions of the Phil. Army, Phil. Air Force, and Phil. Navy; Women's Auxiliary Corps; Phil. Military Academy."
