congress_website_coauthors_raw = ["DALIPE, MANUEL JOSE M.","PRIMICIAS-AGABAS, MARLYN L.","DIONISIO, ERNESTO JR. M.","HERNANDEZ-ALCANTARA, CHARISSE ANNE C.","LEE, WILBERT T.","ADIONG, ZIAUR-RAHMAN ALONTO ADIONG","VARGAS, PM"]
congress_website_committee_codes = ["0532","E505","0504"]
congress_website_primary_keys = [144642]
congress_website_title = "AN ACT ENHANCING ANIMAL INDUSTRY DEVELOPMENT AND COMPETITIVENESS, STRENGTHENING THE BUREAU OF ANIMAL INDUSTRY, AND CREATING FOR THE PURPOSE AN ANIMAL COMPETITIVENESS ENHANCEMENT FUND"
congress_website_abstract = "Aims to advance the animal industry through robust regulatory and development institutions, adequate resources for production support especially for small farmers and producers, sound laws and regulation, effective coordination and collaboration with stakeholders, and credible standards and measures for safety and quality of animal products. Expands and reclassifies the Bureau of Animal Industry (BAI) into a line agency attached to the Department of Agriculture (DA), with regional and provincial offices whose creation is hereby authorized. Creates the Animal Competitiveness Enhancement Fund (AnCEF) with an annual appropriation of Twenty billion pesos (P20,000,000,000.00) following the effectivity of this act and ten (10) years thereafter. Establishes the Livestock Registry System (LRS) which shall have the master list of eligible beneficiaries of the AnCEF in consultation with farmers´ cooperatives and organization and local government units (LGUs). Provides the BAI, in consultation with the LGUs and stakeholders, the power to issue administrative orders and regulations for the conservation, preservation, management and sustainable development of the animal industry. Provides prohibitions and penalties for the violations of this Act."
