congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION OF GEOGRAPHICAL INDICATIONS FOR AGRICULTURAL OR NATURAL (UNPROCESSED OR WILD) PRODUCTS, PROCESSED PRODUCTS, WINES AND SPIRITS, OR ANY PRODUCTS OF HANDICRAFT OR INDUSTRY"
congress_website_abstract = "Seeks to safeguard our local producers´ superior quality of manufacturing and craftsmanship, and to protect consumers from disingenuous and substandard products that pose to be truly “Filipino-made.” Seeks to ensure that products sold in the market were indeed produced, grown, or manufactured in the places they were said to have been produced, grown or manufactured. Defines geographical indication as an identification of a good or product as originating in a territory, region, or locality, where a given quality, reputation, or other characteristic of the good is essentially attributable to its geographical origin and or human factors. Defines Evocation of a geographical indication as a term, sign, or other labelling or packaging device that presents a direct and clear link with the product covered by a protected geographical indication . . ."
