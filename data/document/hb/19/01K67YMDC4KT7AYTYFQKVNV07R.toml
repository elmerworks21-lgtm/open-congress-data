congress_website_title = "AN ACT INSTITUTIONALIZING THE PHILIPPINE ECOSYSTEM AND NATURAL CAPITAL ACCOUNTING SYSTEM, MANDATING ITS USE IN POLICY AND DECISION-MAKING, DESIGNATING THE AGENCIES RESPONSIBLE FOR ITS IMPLEMENTATION, PROVIDING INSTITUTIONAL ARRANGEMENTS AMONG RESPONSIBLE AGENCIES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Defines several terms among others as follows: Ecosystem - refers to all living things in a given area, as well as their interactions with each other; and with their non-living environments (weather, earth, sun, soil, climate, atmosphere); Natural capital - refers to the stock of renewable and non-renewable resources, including plants, animals, air, water, soils, and minerals, that provide a flow of benefits to people. It also includes ecosystem services such as air and water filtration, flood protection, carbon sequestration, pollination of crops, and habitats for wildlife. Provides for PENCAS framework that shall include, among others, a list of officially designated statistics on the depletion, degradation, and restoration of natural capital; environmental protection expenditures; pollution and quality of land, air and water; environmental damages; and genuine savings."
