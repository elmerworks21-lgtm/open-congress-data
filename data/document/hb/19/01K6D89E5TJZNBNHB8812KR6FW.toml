congress_website_title = "AN ACT PROVIDING AN AMBER ALERT SYSTEM TO PREVENT KIDNAPPING OF CHILDREN"
congress_website_abstract = "Defines AMBER (Abducted and Missing Child Broadcast Emergency Response) Alert System as a system that alerts the public regarding a missing child. Seeks to provide a rapid response mechanism designed to quickly disseminate information about the disappearance of a child who is at risk of death or serious injury. Proposes that the Department of Interior and Local Government (DILG) shall establish the Alert System in coordination with the Department of Justice (DOJ) and other relevant enforcement agencies, broadcast media entities, and social media platforms."
