congress_website_title = "AN ACT RECOGNIZING DIFFERENCE IN NEURODEVELOPMENT, UPHOLDING THE RIGHTS OF NEURODIVERGENT PEOPLE, AND INSTITUTING A NATIONAL CARE AND SUPPORT PLAN FOR NEURODIVERSITY"
congress_website_abstract = "\"Neurodivergent People's Rights Act\" Defines several related terms: “Ableism refers to the explicit and/or implicit systems of discrimination that give a person negative evaluations and inferior status on the basis of their disability and/or neurodivergent identity, while simultaneously privileging able-bodied or neurotypical people.” States that “All persons with neurodevelopmental disabilities shall be treated as Persons with Disability in accordance with the provisions of RA 7277\". Proposes to include in the PWD Registry Form of the DOH several conditions to be classified as neurodevelopmental disabilities as follows: 1. Autism Spectrum Disorder 2. Attention Deficit Hyperactivity Disorder 3. Down Syndrome 4. Cerebral Palsy 5. Global Developmental Delay 6. Intellectual Disabilities 7. Learning Disabilities 8. Motor Disorders 9. Communication Disorders l0. Other Neurodevelopmental Disorder."
