congress_website_abstract = "Refers “offshore gaming operation” to the offer or conduct of online games of chance or sports betting through the internet using a network and software program exclusively to offshore players or players located outside the Philippines. Enumerates and describes prohibited acts related to the offer or conduct of any offshore gaming operation in the country. Declares canceled - all visas and alien employment permits issued to foreign workers employed by POGOs.Â Seeks to prohibit the Bureau of Immigration from processing visas and alien employment permits. Provides for the liability of public officials and employees found guilty of prohibited acts related to POGOs; and for the forfeiture and confiscation of properties in favor of the government, whether they are used directly or indirectly in violation of this Act.Â"
