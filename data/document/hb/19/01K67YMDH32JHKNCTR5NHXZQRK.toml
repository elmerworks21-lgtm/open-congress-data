congress_website_title = "AN ACT ESTABLISHING A RENTAL HOUSING SUBSIDY PROGRAM FOR INFORMAL SETTLER FAMILIES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to provide informal settler families (ISFs) access to the formal housing market as an option to address the temporary relocation of displaced families due to natural and man-made disasters. Allocates a flat rental subsidy rate of Three Thousand Five Hundred Pesos (P3,000.00) for those living in Metro Manila and a rental subsidy rate to be determined by the DHSUD and the NEDA for those living in all other regions provided the rental subsidy shall not exceed the actual rent. Grants the rental subsidy to eligible beneficiaries until the date of completion of the permanent housing project intended for them or upon their actual transfer to the permanent housing project, whichever comes first."
