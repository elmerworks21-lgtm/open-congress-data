congress_website_title = "AN ACT AMENDING TITLE I, CHAPTER 3, OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES, PRESCRIBING ADDITIONAL GROUNDS FOR ANNULMENT"
congress_website_abstract = "Seeks to offer additional grounds for annulment of marriage as follows: a) five continuous years of separation, with or without a judicial decree of separation . . .; b) the commission of the crime of rape . . .; c) grounds for legal separation under Art. 55 of the Family Code or any other special law; provided that physical violence or grossly abusive conduct need not be repeated; provided that lesbianism and homosexuality shall not be a ground . . .; d) a final decree of absolute divorce validly obtained in a foreign jurisdiction."
