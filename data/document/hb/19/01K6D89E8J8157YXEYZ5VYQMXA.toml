congress_website_abstract = "Seeks to address the controversial issues surrounding the POGO operations in the country and the Chinese' deepening ties in the Philippines' critical infrastructure and utility companies. Authorizes the President to determine any foreign country to be adversarial or a threat to our national security and territorial integrity.Â Seeks to prohibit foreign adversary-controlled applications from app store operation in the Phils. and from “internet hosting services” in the country that support them. Defines the term “foreign adversary controlled application” as a website, desktop application, mobile application, or augmented or immersive technology application that is operated, directly or indirectly (including through a parent, subsidiary, or affiliate), by a covered company . . ."
