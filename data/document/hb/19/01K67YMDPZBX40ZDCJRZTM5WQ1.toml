congress_website_title = "AN ACT REGULATING THE OPERATION OF MOTORCYCLES-FOR-HIRE AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Intends to establish mechanisms and guidelines in regulating all the operational aspects of motorcycle-for-hire and to ensure the safety of the riding public. Requires all motorcycles intended to be used as a motorcycle-for-hire to be duly registered with the Land Transportation Office (LTO) which shall ensure the roadworthiness of all motorcycle-for-hire before their registration or renewal. Requires the operators of motorcycles-for-hire to have insurance coverage for the driver, rider, and third party. Mandates the Department of Transportation (DOTr) to prescribe the standards and specifications of motorcycles that may be allowed to operate as motorcycles-for-hire for the safety of the passengers and riders and the protection of goods. Grants the Land Transportation Franchising and Regulatory Board (LTFRB) the authority to issue franchises of motorcycles-for-hire in areas with existing and operating digital platforms. Allows the motorcycles-for-hire to operate using the digital platforms; or on designated areas of operation."
