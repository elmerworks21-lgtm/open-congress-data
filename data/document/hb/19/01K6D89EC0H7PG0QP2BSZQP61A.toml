congress_website_title = "AN ACT ESTABLISHING A NATIONAL GREEN BUILDING CODE AND RATING SYSTEM, PROVIDING INCENTIVES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Addresses the issue that building construction and urban development contribute to the world´s greenhouse gas emissions and energy consumption. Seeks to adopt sustainable practices in the construction of buildings by proposing a code and rating system that shall provide incentives to those who adopt sustainable practices to mitigate the effects of global warming. Describes Green Building as follows: increasing the efficiency with which buildings and their sites use energy, water, and materials, reducing impacts on the environment and human health; promotion and practice of sustainable site development; improvement of indoor air quality; use of efficient energy; improvement of water management; utilization of green materials; and the preservation of cultural heritage; a building whose design, construction, renovation is both resource-efficient and ecologically efficient."
