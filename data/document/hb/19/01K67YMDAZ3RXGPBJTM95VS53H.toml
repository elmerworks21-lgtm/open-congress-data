congress_website_title = "AN ACT PROTECTING THE RIGHTS OF INTERNALLY DISPLACED PERSONS AND PENALIZING THE ACTS OF ARBITRARY INTERNAL DISPLACEMENT"
congress_website_abstract = "Seeks to promote and protect the rights of IDPs in situations of armed conflict, generalized violence, clan wars, violations of human rights, implementation of development projects, natural, human-induced and human-made hazards; and to protect the rights of the victims of and non-combatants in armed conflict”¦ Defines “arbitrary internal displacement”; Enumerates the prohibited acts of arbitrary internal displacement; Sets up a system of providing financial assistance to IDP arising from arbitrary internal displacement; Provides for a mechanism to international humanitarian assistance. . . ; Designates the Commission on Human Rights (CHR) as the institutional focal point for the IDPS . . . ; and other provisions."
