congress_website_title = "AN ACT AMENDING ARTICLE 117 OF ACT NO. 3815, OTHERWISE KNOWN AS THE `REVISED PENAL CODE OF THE PHILIPPINES´, AS AMENDED, PUNISHING CONSPIRACY AND PROPOSAL TO COMMIT ESPIONAGE AND MISPRISION OF ESPIONAGE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes the penalty of RECLUSION TEMPORAL AND A FINE NOT EXCEEDING FIVE MILLION PESOS . . . NOR LESS THAN THREE MILLION PESOS . . . shall be IMPOSED upon any person who:Â 1. . . . AIDS OR INDUCES ANOTHER TO ENTER a warship, fort, or naval or military establishment or reservation or FACILITY OR CAMP OR INSTALLATION, to obtain any information, plans, photographs, or other data WHETHER of confidential nature OR NOT relative to the defense or SECURITY of the Philippine Archipelago, OR TO MILITARY TRAINING OR EQUIPMENT OF THE AFP; or 2. Being in possession, by reason of the public office he/SHE holds, of the articles, data, or information . . . , discloses their contents to . . . FOREIGN NATIONAL OR TO CRIMINAL SYNDICATES OR ELEMENTS TO THE INJURY OF THE PHILS . . . OR TO THE ADVANTAGE OF A FOREIGN NATION, . . .; OR 3. OBTAINS, RECEIVES, GATHERS, PASSES, OR CAUSES TO BE OBTAINED . . . , OR ATTEMPTS TO OBTAIN, . . . , IN ANY PLACE IN THE PHILS. INFORMATION OR DATA CONCERNING ANY VESSEL, AIRCRAFT, NAVAL STATION, MILITARY CAMP OR INSTALLATIONS OR FACILITIES, WORK OF DEFENSE, . . . OR OTHER INFORMATION OR DATA CONNECTED WITH OR RELATIVE TO NATIONAL DEFENSE OR SECURITY FOR THE PURPOSE OF DISCLOSING SUCH . . . TO A FOREIGN NATION OR ITS REPRESENTATIVE, . . . ; OR 4. LAWFULLY OR UNLAWFULLY HAVING POSSESSION OF THE INFORMATION OR DATA . . . WILFULLY COMMUNICATES, TRANSMITS OR ATTEMPTS TO COMMUNICATES . . . THE SAME TO ANY PERSON NOT ENTITLED TO RECEIVE IT."
