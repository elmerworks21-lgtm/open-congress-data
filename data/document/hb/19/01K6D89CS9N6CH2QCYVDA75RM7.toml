congress_website_abstract = "“Private Contractor Payment Amendment of the Ease of Doing Business Law” Seeks to amend the “Ease of Doing Business and Efficient Government Services Delivery Act” to include payments to contractors, consultants, and service/job order providers (in regular contracts, Public-Private Partnership projects, Joint Ventures, etc.) within the coverage and scope of Highly Technical Transactions that have a limit of a maximum of twenty (20) days payment period."
