congress_website_title = "AN ACT PROVIDING FREE LEGAL ASSISTANCE TO ANY OFFICER OR UNIFORMED PERSONNEL OF THE ARMED FORCES OF THE PHILIPPINES, THE BUREAU OF FIRE PROTECTION, THE BUREAU OF JAIL MANAGEMENT AND PENOLOGY, THE PHILIPPINE COAST GUARD, AND THE PHILIPPINE NATIONAL POLICE, FACING ANY CHARGE BEFORE THE PROSECUTOR´S OFFICE, COURT OR ANY COMPETENT BODY ARISING FROM AN INCIDENT RELATED TO THE PERFORMANCE OF OFFICIAL DUTY, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes several legal services to be included in the free legal assistance as follows: legal representation in all stages of civil, criminal, or administrative cases; legal advice or consultation; preparation of pleadings, motions, memoranda, and all other legal forms and documents; notarization of documents; and all other legal services and tasks as directed by the heads of the officers and uniformed personnel; Includes provisions among others: qualifications to avail of free legal assistance in cases involving service-related incidents; procedure to avail the services; the entitlement of government lawyer to payment for expenses; and the appearance of private counsel."
