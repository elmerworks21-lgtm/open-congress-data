congress_website_title = "AN ACT PROVIDING FOR THE MANDATORY INSTALLATION OF GPS TRACKING DEVICE IN ALL GOVERNMENT OWNED VEHICLES IN THE COUNTRY TO PROMOTE TRANSPARENCY, TO AID ADMINISTRATION OF JUSTICE AND TO PROTECT CITIZENS AND PUBLIC OFFICERS ALIKE AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Defines term \"Global Positioning System (GPS)\" to a space-based satellite navigation system that provides location and time information under all weather conditions, anywhere on or near the Earth where there is an unobstructed line of sight to four or more GPS satellites. Mandates the installation of GPS tracking devices to enable government agencies, institutions, and subdivisions to detect, monitor, and investigate the real-time movements of government-owned vehicles. This ensures that these vehicles are used for their legally designated purposes. Additionally, the GPS system aims to assist public officers in responding promptly to deter criminal activity, respond to emergencies, and aid in investigations. It also generates audit trails that expedite legal proceedings, alleviate congestion in court dockets, and support law enforcement in various interactions."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_19/HB10900.pdf"]

