congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NO. 2382, AS AMENDED, OTHERWISE KNOWN AS THE “MEDICAL ACT OF 1959”, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to amend Sections 6, 7, 8, 9 and 12 in the present law with the following provisions: the duration of the Doctor of Medicine degree will be at least 6 years, including the 1-year internship; enhancement of admission requirements without prejudice to the establishment of national eligibility examinations for medicine for admission to the MD degree; doing away with the requirement of reciprocity by resorting to the guiding principles and pillars of the WTO-GATS, other relevant international agreements, and mutual recognition arrangements being practiced globally. Includes additional provisions to address the apparent gaps brought about by international trends and developments and the impacts of globalization on the movement or mobility of medical students and professionals."
