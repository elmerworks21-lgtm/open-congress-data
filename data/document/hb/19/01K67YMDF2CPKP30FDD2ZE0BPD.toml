congress_website_title = "AN ACT PROTECTING THE RIGHTS OF ALL WORKERS, WORKERS´ ORGANIZATIONS, AND UNIONS FROM INTERFERENCE BY THEIR EMPLOYERS, PUBLIC AUTHORITIES OR THEIR AGENTS, AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Aims to protect and uphold the rights of all workers and promote their welfare, and to give full protection to labor, local and overseas, organized and unorganized. Prohibits any person to restrain, harass or coerce or unduly interfere with any private worker or workers´ association trade union center, federation, union, or labor or employees´ organization in the exercise of their rights to self-organization, or shall in any manner, commit any act in violation of the provisions of this Act. Prohibits any members of the AFP, CAFGU, PNP, NTF-ELCAC and other military and police forces to vilify, label, brand, red-tag, name or accuse workers´ organization or unions, labor leaders, members or organizers as subversives or terrorists or to harass or forcibly interrogate workers or union officials based on mere membership or affiliation to labor organization or unions. Provides penalties for the violation of this Act."
