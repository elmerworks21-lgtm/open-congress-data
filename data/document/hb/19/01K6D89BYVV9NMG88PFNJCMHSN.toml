congress_website_title = "AN ACT REGULATING THE IMPOSITION OF FEES FOR THE USE OF PARKING SPACES AND/OR FACILITIES PROVIDED BY OR LOCATED WITHIN SHOPPING MALLS, SCHOOLS, HOSPITALS, HOTELS AND SIMILAR ESTABLISHMENTS AND PRESCRIBING PENALTIES THEREOF FOR VIOLATIONS"
congress_website_abstract = "Proposes to prohibit the collection of parking fees within the first three (3) hours from the time of the customer´s entry to the parking premises of several establishments, and to Impose a regular fee if he exceeds the allowed free parking hours, provided that if the said customer purchase a product/s or service/s whose value is not less than P1,000.00, he can avail a discount rebate of 10% of the assessed regular parking fee."
