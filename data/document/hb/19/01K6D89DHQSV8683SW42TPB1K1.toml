congress_website_title = "AN ACT INSTITUTIONALIZING THE CONVERGENCE STRATEGY FOR SUSTAINABLE RURAL DEVELOPMENT AND PROVIDING THE IMPLEMENTING MECHANISMS THEREFOR"
congress_website_abstract = "Aims for the convergence of resources and expertise of NGAs (Departments of Agriculture/Agrarian Reform/Natural Resources, and the Department of Interior and Local Government) which shall work with national line agencies and GOCCs (NEA, NIA, and NFA), the academe, donor agencies, NGOs, POs, the rural community, and other relevant stakeholders - to develop a sustainable development plan, institutionalizing the National Convergence Initiative for Sustainable Rural Development (NCI-SRD). Provides that NCI-SRD shall promote integrated ecosystem management - taking into consideration the conservation, restoration, and protection of natural ecosystems and resources from ridge to reef. Proposes among others, for a defined constituency that shall focus on smallholder farmers, both agrarian reform beneficiaries (ARBs), and non-ARB, small fisherfolk, upland dwellers, and Indigenous Peoples (IPs); and for relevant measures for an enabling environment to encourage investment by the private sector, cooperatives and other NGOs."
