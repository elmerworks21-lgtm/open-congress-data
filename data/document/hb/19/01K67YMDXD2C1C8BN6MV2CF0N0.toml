congress_website_title = "AN ACT ESTABLISHING A NATIONAL POLICY FRAMEWORK FOR THE DEVELOPMENT, UTILIZATION, AND COMMERCIALIZATION OF ENERGY STORAGE SYSTEMS"
congress_website_abstract = "Aims to improve the reliability and flexibility of the Grid to accommodate the growing demand for sustainable renewable energy back up or ancillary sources of electricity such as solar and wind, as part of the country´s just transition plans; establish the necessary fiscal or non-fiscal mechanisms to encourage the development, utilization, and commercialization of energy storage systems in both Grid and off-Grid areas in the country; and help secure additional sources of power supply that shall meet the country´s growing demand. Enumerates the powers and responsibilities of different government agencies for the implementation and enforcement of this Act. Provides incentives for Integrated Renewable Energy (RE) Plant and Energy Storage System (ESS) such as: a.) The ESS developer may avail of the incentives Under Chapter VII of RA 9513 for its Integrated RE Plant and ESS; b.) Integrated RE Plants and ESS that use a combination of Conventional Plant/s and an ESS, the incentives shall be granted in proportion to and to the extent of the RE component utilized; and c.) the Integrated RE Plant and ESS, as applicable, shall have preferential dispatch, but it can choose to be registered as a schedule generating unit."
