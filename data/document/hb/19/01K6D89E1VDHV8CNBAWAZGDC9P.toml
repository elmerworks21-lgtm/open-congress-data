congress_website_title = "AN ACT AMENDING SECTION 5 OF REPUBLIC ACT NO. 4726 OTHERWISE KNOWN AS “THE CONDOMINIUM ACT”, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to address the foreign ownership limitation of condominiums that hinders the entry of investments in the country due to the confusion because of the presence of condominium units on the Foreign Investment Negative List. Proposes to amend R.A. No. 4726 to read as follows: “Section 5. Any transfer or conveyance of a unit or an apartment, office or store or other space therein, . . . PROVIDED THAT, IN INSTANCES WHERE THE CONDOMINIUM PROJECT DOES NOT OWN THE LAND UPON WHICH THE CONDOMINIUM STRUCTURE IS CONSTRUCTED, . . . THE FOREIGN NATIONALITY RESTRICTION, . . . SHALL NOT APPLY TO THE SALE OF THE CONDOMINIUM UNITS OF SUCH CONDOMINIUM PROJECTS. PROVIDED FURTHER THAT, ANY SALE OF SUCH UNITS WOULD BE SUBJECT TO THE TERMS AND LIMITATIONS OF THE RELEVANT LEASE AGREEMENT OVER THE LAND, ."
