congress_website_title = "AN ACT INSTITUTING REFORMS IN REAL PROPERTY VALUATION AND ASSESSMENT IN THE PHILIPPINES, REORGANIZING THE BUREAU OF LOCAL GOVERNMENT FINANCE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes to adopt a market-based Schedule of Market Values (SMV) to be used as a basis of local and national real property taxation - valuation or appraisal, whether taxable or tax-exempt, shall be based on prevailing market values where the property is situated according to prescribed valuation standards. Mandates the DOF to maintain valuation standards consistent with generally accepted international regulations and specifications; coordinates with BIR to review SMVs as prepared by the local government assessor; and provides technical assistance to government agencies, leadership, and policy direction to LGUs, uniform procedure on different transaction in the assessor´s office, and continuing research on valuation."
