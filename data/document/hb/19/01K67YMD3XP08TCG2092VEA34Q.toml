congress_website_title = "AN ACT PROVIDING FOR THE DEVELOPMENT OF SUSTAINABLE CITIES AND COMMUNITIES IN THE COUNTRY"
congress_website_abstract = "Aims to promote inclusive, resilient, and sustainable urban development, ensure the inclusive use of urban space for housing and livelihood, improve access to basic services, develop integrated public transportation systems and green infrastructures, protect ecosystems, and manage risks to climate change and disasters. Mandates all cities and municipalities with a majority of barangays classified by the PSA as urban areas to align their plans, programs and activities towards the full implementation of this Act. Tasks the Department of Human Settlements and Urban Development (DHSUD) in consultation with relevant government agencies, local government units, civil society organizations, the private sector and the academe to harmonize existing housing and urban development plans with this Act. Directs national agencies and local government units to ensure their genuine and adequate participation in urban, regional, spatial, and environmental planning."
