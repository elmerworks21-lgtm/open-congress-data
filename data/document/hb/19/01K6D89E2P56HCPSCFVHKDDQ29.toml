congress_website_title = "CONSUMER DATA RIGHTS ACT OF 2024"
congress_website_abstract = "Provides that the term “consumer data” encompasses financial and transactional data related to a consumer, whether recorded in a material form or not, that are collected, processed, and stored by data holders. Aims to address the evolving challenges posed by the increasing reliance on consumer data in our digital economy and ensures the establishment of a set of standards that guarantee consumer protection and benefits regardless of the data source. Aims to establish a comprehensive framework that fosters an environment of trust, transparency, and responsible data handling practices and intends to encourage competition and innovation among service providers, which is expected to drive improvements in products and services. Proposes to create an inter-agency and multi-sectoral Consumer Data Rights Commission (CDRC); to establish accountability mechanisms, including an accreditation process for data recipients that will be allowed to receive consumer data directly from other data holders with the consumer´s express informed consent."
