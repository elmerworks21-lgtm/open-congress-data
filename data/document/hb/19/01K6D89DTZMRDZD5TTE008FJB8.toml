congress_website_title = "AN ACT REGULATING THE OPERATION OF NON-MOTORIZED PUBLIC TRANSPORTATION IN CITIES AND MUNICIPALITIES"
congress_website_abstract = "Proposes several provisions to promote the safety, order, and efficiency in protecting drivers and passengers of non-motorized vehicles (e.g. trips by foot and bicycle) as follows: 1) enactment of an ordinance by the sanggunian panlungsod or sanggunian bayan - to regulate their operation; 2) LGU issuance of a permit to drivers or operators; 3) registration and identification system including the issuance of ID card and plate number for the driver or operator; 4) LGUs determination as regards to routes, terminals, operating hours, and fare structure; 5) safety standard gadgets, maximum speed limit, passenger limit; 6) prohibition to operate on highways or major thoroughfares; 7) cooperative membership and insurance coverage; 7) formulation of point system as basis for suspension or revocation of permit."
