congress_website_title = "AN ACT AMENDING SECTION 53 OF REPUBLIC ACT NO. 9184, OTHERWISE KNOWN AS THE \"GOVERNMENT PROCUREMENT REFORM ACT\""
congress_website_abstract = "Amends Sec.53 of R.A. No.9184 to read as follows: “Section 53. Negotiated Procurement - Negotiated Procurement shall be allowed only in the following instances: . . . IN ALL CASES OF NEGOTIATED PROCUREMENT, ALL SUPPLIERS, CONTRACTORS, AND CONSULTANTS ARE MANDATED TO SUBMIT DOCUMENTS TO PROVE THEIR FINANCIAL CAPACITY. THE PROCURING ENTITY SHALL ASCERTAIN THE FINANCIAL, TECHNICAL, AND LEGAL CAPACITY OF SUPPLIERS, CONTRACTORS, OR CONSULTANTS.”"
