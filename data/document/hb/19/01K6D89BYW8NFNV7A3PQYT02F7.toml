congress_website_title = "AN ACT FURTHER AMENDING REPUBLIC ACT NO. 4566, OTHERWISE KNOWN AS THE \"CONTRACTORS' LICENSE LAW\", AS AMENDED, PROVIDING FOR THE TYPES, ADDITIONAL CONDITIONS, AND REQUIREMENTS IN THE ISSUANCE OF A CONTRACTORS´ LICENSE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to prioritize Filipino contractors and workers in the construction industry which will enable them to engage in the business for multiple projects as long as such license remains valid. Provides that the foreign contractors may also engage in the construction business, but under a special license, and for a single specified undertaking only; that a regular license may still be issued under specific instances; that foreign contractors shall not be considered for the grant of license unless their country of States of Origin allows Filipino contractors to practice within their territory on the same bases as its subjects or citizens."
