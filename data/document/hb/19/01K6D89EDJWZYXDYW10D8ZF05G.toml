congress_website_title = "AN ACT PROPOSING AMENDMENTS ON REPUBLIC ACT NO. 11032, OTHERWISE KNOWN AS THE EASE OF DOING BUSINESS AND EFFICIENT GOVERNMENT SERVICE DELIVERY ACT OF 2018 FOR FURTHER EXPANSION OF ITS JURISDICTION AND OTHER MECHANISM"
congress_website_abstract = "Seeks to add definitions of Multi-stage System, Regulation, and Regulatory Management System; to add provisions regarding Multi-stage System as embodied in the IRR; to expand the Automatic Approval Mechanism; to expand Sec.11 in mandating streamlining procedures; to propose expansion of Anti-Red Tape Unit in the Civil Service Commission and Committee on Red Tape in covered government offices and agencies, etc. Defines Multi-stage System as the system adopted by government agencies or offices in the delivery of their government services that are highly technical in nature which consists of multiple components or stages that are required to be undertaken by the government agency or office and/or by their applicant or requesting party to deliver or obtain the final document applied for or requested.Â These stages involve activities such as, but not limited to, research, field trials, scientific methodology, and inter-government actions."
