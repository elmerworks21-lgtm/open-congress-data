congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7638, OTHERWISE KNOWN AS THE DEPARTMENT OF ENERGY ACT OF 1992"
congress_website_abstract = "Proposes that no DIRECTOR, . . . CONSULTANT, OR ANY OTHER OFFICER of any private company or enterprise primarily engaged in the energy industry shall be eligible for appointment as Secretary within two years from his retirement. . . Provides additional qualifications for appointment as Secretaries of the DOE - a person WITH AT LEAST TWO (2) YEARS OF ACTUAL WORK EXPERIENCE IN THE ENERGY SECTOR, AND WITH AT LEAST FIVE (5) YEARS OF ACTUAL AND DISTINGUISHED EXPERIENCE in any of the fields provided in the Act, including COMMERCE OR FINANCE . . . Lays down a prohibition on the candidates and their relatives within the third civil degree of consanguinity or affinity from holding any interest in energy-related companies during their term; Seeks to impose a two-year period during which former DOE appointees are barred from accepting positions and engagements with energy industry players after termination of their service in the government."
