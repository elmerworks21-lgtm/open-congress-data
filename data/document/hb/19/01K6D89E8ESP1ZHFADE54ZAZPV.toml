congress_website_title = "AN ACT RECOGNIZING THE CIVIL SOLIDARITY PACT OF COUPLES, PROVIDING FOR THEIR RIGHTS AND OBLIGATIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares that “the State shall give full support to the welfare and well-being of couples, regardless of gender, who are in a relationship and are denied their rights and obligations on account of absence of legal provisions that recognize their relationship and amply provide for their protection.” Defines Civil Solidarity Pact as a legal relationship between two persons, of either the opposite or same sex, established provided in this Act.Â Proposes, among others, that any person who enters into a civil solidarity pact shall be bound by the obligations and responsibilities, and enjoy the protections and benefits afforded by this Act; Seeks to recognize and respect the rights of partners; Enumerates requisites of the Civil Solidarity Pact; Provides for default property regime, pre-civil solidary pact agreement - its amendment or revocation, inheritance and adoption rights, dissolution and protection of children in such a case, etc. Â"
