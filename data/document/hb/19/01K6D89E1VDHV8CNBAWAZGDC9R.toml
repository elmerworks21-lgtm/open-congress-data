congress_website_title = "AN ACT AMENDING SECTION 461 OF REPUBLIC ACT 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, BY INCREASING THE LOCALLY GENERATED AVERAGE ANNUAL INCOME REQUIREMENT FOR THE CREATION OF A PROVINCE"
congress_website_abstract = "Proposes to increase the locally generated average annual income requirement for the creation of a province to Five Hundred Million Pesos (P500,000,000.00) Pesos. Proposes to amend Sec. 461, Paragraph (c) of the Code (Requisites for Creation) to read as follows: “The average annual income shall include the income accruing to the general fund, exclusive of special funds, THE INTERNAL REVENUE ALLOTMENT SHARE, trust funds, transfers, and non-recurring income."
