congress_website_title = "AN ACT PENALIZING FOREIGN INTERFERENCE IN THE PHILIPPINES AND CREATING THE COUNTER FOREIGN INTERFERENCE TASK FORCE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to penalize various methods whereby foreign agents and entities may interfere in the country´s political and governmental processes. Intends to safeguard national security and preserve democratic integrity by punishing individuals involved in malign actions serving foreign interests and prohibits support for foreign intelligence agencies to prevent their infiltration. Expands its scope to include harmful electronic communications and imposes obligations to internet service providers to block access to online messages that are prejudicial to national security and public safety. Proposes corresponding penalties to specific prohibited acts:Â intentional foreign interference; ”¦ involving targeted persons; reckless foreign interference; ”¦ involving targeted persons/foreign intelligence/by electronic communications; preparing or planning a conspiracy to commit; ”¦ proposal to commit foreign interference. Seeks to create the Counter Foreign Interference Task Force composed of National Security Adviser, Sec. of Justice, COMELEC, DFA, DILG, DND, DTI, DICT, DSWD, CHED, AFP, PNP, PIA, and the AMLA Council-Secretriat. Proposes extraterritorial application to persons covered by this measure, and on the authority of the Anti-Money Laundering Council over suspects of any of the crimes defined under this Act. Refers to several related laws as follows:Â “Anti-Wiretapping Law”; “Law on Secrecy of Bank Deposits,” as amended; “Foreign Currency Deposit Act”¦”, as amended; and “The General Banking Law of 2000”."
