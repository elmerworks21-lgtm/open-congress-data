title = "NATIONAL TREE PLANTING PROGRAM (AMENDMENTS, ARBOR DAY ACT)"
date_filed = "2023-07-03"
long_title = "AN ACT PROVIDING MECHANISMS THAT SHALL ENSURE THE EFFECTIVE IMPLEMENTATION OF A NATIONWIDE TREE PLANTING PROGRAM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10176, OTHERWISE KNOWN AS THE ''ARBOR DAY ACT OF 2012''"
scope = "National"
subjects = [ "Tree Planting", "Arbor Day",]
congress_website_author_codes = ["K036","K072","G013","D066","J038","J079","G072","I030","H092"]
congress_website_coauthors_raw = ["TAN, KEITH MICAH D.L. TAN","REVILLA, RAMON JOLO III B.","NISAY, JERNIE JETT V."]
congress_website_committee_codes = ["0532","B505"]
congress_website_primary_keys = [147776]
congress_website_title = "AN ACT PROVIDING MECHANISMS THAT SHALL ENSURE THE EFFECTIVE IMPLEMENTATION OF A NATIONWIDE TREE PLANTING PROGRAM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10176, OTHERWISE KNOWN AS THE “ARBOR DAY ACT OF 2012”"
congress_website_abstract = "Aims to rehabilitate denuded forests, improve soil fertility and land productivity, and reduce soil erosion by undertaking nationwide tree planting activities and providing effective measures for their maintenance and sustainability. Seeks to include the National Commission of Indigenous Peoples (NCIP) among the members of the Arbor Day Celebration Committee which shall be selected by the concerned local chief executive. Mandates the LGU, with the technical assistance from the DENR to identify the suitable areas to be planted to various species of trees and plants. Tasks the DILG to monitor the implementation of this Act and submit an annual report to the Congressional Oversight Committee on the areas identified in each LGU that are suitable to tree planting and reforestation."
