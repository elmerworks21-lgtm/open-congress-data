congress_website_title = "AN ACT INSTITUTIONALIZING THE CAREER PROGRESSION SYSTEM FOR PUBLIC SCHOOL TEACHERS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to institutionalize the Career Progression System for public school teachers to promote professional development and career advancement among public school teachers. Mandates the Civil Service Commission, Department of Education and Professional Regulation Commission to harmonize the qualification standards for teaching positions in all levels of the public school system. Authorizes the Department of Budget and Management to create new teaching position titles of Teacher IV, Teacher V, Teacher VI, Teacher VII, and Master Teacher V, and include the same in the Index of Occupational Services, Occupational Groups, and Salary Grades. Allows all incumbent Head Teachers to retain their positions and career progression line under the Current Career Progression, or otherwise apply for reclassification or retitling of their current position to the appropriate position under the Expanded Career Progression. Prohibits the demotion in rank and/or diminution of salary, benefits and other privileges of incumbent employees granted under existing laws, decrees, orders of any contract, agreement or policy between employee and employer upon the implementation of this law. Prescribes that teachers shall be promoted based on merit, fitness, and competence after a Comprehensive Performance Assessment."
