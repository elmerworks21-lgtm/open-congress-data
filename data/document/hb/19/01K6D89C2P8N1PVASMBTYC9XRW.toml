congress_website_title = "AN ACT PROVIDING FOR A WAGE EMPLOYMENT ASSISTANCE PROGRAM FOR DISPLACED AND/OR VULNERABLEWORKERS INSTITUTIONALIZING FOR THE PURPOSE THE TULONG PANGHANAPBUHAY SA ATING DISADVANTAGE/DISPLACED WORKERS (TUPAD) PROGRAM OF THE DEPARTMENT OF LABOR AND EMPLOYMENT, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Describes TUPAD as a community-based package of assistance that provides for a short-term emergency employment program for displaced, underemployed, and seasonal workers; a program that acts as a social safety net to assist displaced or vulnerable workers in the informal economy, providing them wage employment to mitigate the impact of calamities, disasters, and epidemics on their livelihoods. Aims to institutionalize the TUPAD program as a post-COVID intervention measure to help informal sector workers recover from economic displacement and loss of income due to enhanced community quarantine (ECQ) - whereby the DOLE is authorized to implement, motu propio employment projects in cases of massive displacements, define the eligibility of the qualified beneficiaries, and ensure the payment of at least a minimum wage rate for non-agricultural workers, among others."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_19/HB00839.pdf"]

