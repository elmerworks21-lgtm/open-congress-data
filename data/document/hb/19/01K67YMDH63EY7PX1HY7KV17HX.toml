congress_website_title = "AN ACT PROVIDING ADDITIONAL CRITERION FOR THE AVAILMENT OF THE UNPROGRAMMED APPROPRIATIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 11936 OR THE 2023 GENERAL APPROPRIATIONS ACT"
congress_website_abstract = "Aims to maximize the idle funds of the GOCCs and further help the national government´s requirements and fund the much needed unprogrammed projects. Seeks to amend Section 1 of the Special Provision of the Unprogrammed Appropriations of R.A. No. 11936 or the FY 2023 General Appropriations Act to read as follows: “Special Provision(s) 1. Availment of the Unprogrammed Appropriations. The amounts authorized herein for Purpose Nos. 1-2, 4-7 and 9-61 may be used when any of the following exists: (a) Excess revenue collections in any [one of the identified] TAX OR non-tax revenue sources from its corresponding revenue collection target, as reflected in the BESF; (b) New revenue collection or those arising from new tax or non-tax sources which are not part of, nor included in, the original revenue sources reflected in the BESF; [or] (c) Approved loans for foreign-assisted projects[.]; OR (D) FUNDS OF GOVERNMENT -OWNED OR -CONTROLLED CORPORATIONS DETERMINED TO BE IN EXCESS OF THEIR CURRENT ADMINISTRATIVES AND OPERATIONS EXPENSES, BENEFIT OBLIGATIONS, OR RESERVE REQUIREMENTS.”"
