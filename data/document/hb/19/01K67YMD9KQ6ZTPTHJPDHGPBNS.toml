congress_website_title = "AN ACT DEFINING THE CRIME OF TAX RACKETEERING, AND PROVIDING PENALTIES THEREOF, AMENDING FOR THE PURPOSE SECTION 257 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Aims to restore public credence and reliance on official receipts or invoices - that these are principal pieces of evidence for consummated transactions and are essential for tax compliance. Proposes for several provisions regarding the following: Defines tax racketeering as any coordinated scheme or operation to evade or defeat any tax imposed under the Tax Code through the fraudulent use of receipts, returns, and other records, with a minimum amount of Php10,000.000.00 in taxes avoided; Increases the penalties imposed for willfull attempts to evade any tax imposed . . .; Includes the acts of distributing, acquiring, using or aiding in the use of unauthorized, fake, or falsified transactions documents and other accountable forms as punishable. . .; Automatic revocation or cancellation of license and registration certificate if the offender is a CPA; Penalties upon conviction of tax racketeering; Public officials as an accomplice who aid and abet the commission of tax racketeering."
