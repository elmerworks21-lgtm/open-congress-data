congress_website_title = "AN ACT TO PROMOTE A 'LOW CARBON ECONOMY' BY ESTABLISHING THE GREENHOUSE GAS EMISSION CAP, EMISSION REDUCTION OFF-SETTING, CREDITING, AND TRADE SYSTEM IN THE PHILIPPINES TO REDUCE GREEN HOUSE EMISSIONS AND MITIGATE THE ADVERSE EFFECTS OF CLIMATE CHANGE"
congress_website_abstract = "Defines several key terms, including carbon credit or offset, climate change, emission cap/reduction/trading scheme, global warming, greenhouse gas, and the Paris Agreement on Climate Change. Proposes the implementation of greenhouse gas (GHG) emission caps on industrial and commercial establishments, individuals, and other entities that emit greenhouse gases. The specific limits will be determined by the DENR and the DOST. Entities will only be allowed to discharge a predetermined amount of specific greenhouse gases over a designated time period, with penalties for non-compliance. The proposal also encourages these entities to offset their GHG emissions by investing in and participating in GHG reduction projects which may include forestry initiatives, renewable energy projects, carbon dioxide capture and storage projects, and efforts to eliminate methane emissions. In return for their participation, these entities will receive GHG emission allowances, commonly referred to as \"carbon credits.\" The proposal also seeks to establish a trading system that allows GHG emission allowances or carbon credits to be sold, exchanged, purchased, or traded by any individual or entity."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_19/HB10633.pdf"]
