congress_website_title = "AN ACT PENALIZING DISOBEDIENCE TO THE WRIT OF HABEAS CORPUS AND OTHER ACTS AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to punish disobedience to the writ in four (4) instances: 1) a person who refuses or neglects to obey the writ; 2) a member of the court who knowingly recommits to prison a person already discharged; 3) a clerk of court who refuses without reason to issue a writ; 4) a person who intently transfers residence or transfers a person under his custody of restraint to elude the service of the writ."
