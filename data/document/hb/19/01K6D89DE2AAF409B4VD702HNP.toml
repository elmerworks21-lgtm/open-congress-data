congress_website_title = "AN ACT RECOGNIZING THE CAPACITY OF THE FILIPINO SPOUSE TO REMARRY WHEN EITHER SPOUSE HAS OBTAINED A FOREIGN JUDICIAL DECREE OF ABSOLUTE DIVORCE, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to amend Art.13 of the Family Code to read as follows: SECTION 1. “Art. 13. . . . the judicial decree of the absolute divorce OBTAINED BY THE EITHER SPOUSE DULY AUTHENTICATED BY THE PHILPPINE CONSUL IN THE COUNTRY WHERE THE DECREE WAS OBTAINED . . . “THE FILIPINO SPOUSE NEED NOT SEEK JUDICIAL RECOGNITION OR ENFORCEMENT OF THE FOREIGN JUDICIAL DECREE OF ABSOLUTE DIVORCE AND ITS REGISTRATION BY THE CIVL REGISTRAR SHALL BE SUFFICIENT FOR THE ISSUANCE OF A MARRIAGE LICENSE.”"
