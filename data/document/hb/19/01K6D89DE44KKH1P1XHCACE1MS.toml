congress_website_title = "AN ACT PROCLAIMING THE RIGHTS AND OBLIGATIONS OF PATIENTS, PROVIDING A GRIEVANCE MECHANISM THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Enumerates individual rights of patients as follows: Rights to - good quality health care and humane treatment, to dignity, to be informed of his rights and obligations, to choose physician/health institution, to an informed consent, to refuse diagnostic and treatment, to refuse participation in medical research, to religious belief and assistance, to privacy and confidentiality, to disclosure of, and access to information, to correspondence and to receive visitors, to medical records, to health education, to leave against medical advice, and to express grievances. Provides for societal rights of patients as follows: Rights to health, access to quality public health care, healthy and safe workplace, medical information and education programs, participate in policy decisions, access to health facilities, an equitable and economical use of resources, and quality health care in times of insolvency. Proposes several obligations and responsibilities of patients with regards to his/her medical care and/or personal behavior."
