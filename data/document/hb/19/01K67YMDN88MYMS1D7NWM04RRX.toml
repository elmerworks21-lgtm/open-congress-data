congress_website_title = "AN ACT STRENGTHENING THE EARLY CHILDHOOD CARE AND DEVELOPMENT SYSTEM, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Provides for alignment of ECCD programs with existing programs on maternal and child health and nutrition. Mandates the ECCD Council to ensure alignment of the ECCD curriculum with the basic education curriculum and programs for learners with disability, based on an understanding of learning progression and inclusive learning design. Reorganizes the ECCD Council, adding the Secretary of the Department of Interior and Local Government as ex-officio Vice Chairperson. Delegates more responsibilities to LGUs in the implementation of ECCD programs through the Local Schools Boards to mobilize resources for the establishment, clustering and management of child development centers. Creates an ECCD division in every city and municipality with their own design and implementation of its own organization structure and staffing pattern subject to the standards and guidelines prescribed by the Civil Service Commission. Mandates that the ECCD programs shall be financed through a combination of public and private funds."
