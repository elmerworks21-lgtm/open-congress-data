title = "AGRARIAN AND AGRICULTURAL LOAN RESTRUCTURING AND CONDONATION ACT"
date_filed = "2022-10-26"
long_title = "AN ACT PROVIDING FOR THE RESTRUCTURING AND CONDONATION OF UNPAID INTERESTS, PENALTIES, AND SURCHARGES ON LOANS SECURED BY FARMERS, FISHERFOLKS, AND AGRARIAN REFORM BENEFICIARIES FROM THE DEPARTMENT OF AGRARIAN REFORM, THE DEPARTMENT OF AGRICULTURE, THE PEOPLE’S CREDIT AND FINANCE CORPORATION, THE COOPERATIVE DEVELOPMENT AUTHORITY, THE NATIONAL FOOD AUTHORITY, AND THE QUEDAN AND RURAL CREDIT GUARANTEE CORPORATION"
scope = "National"
subjects = [ "Agrarian and Agricultural Loan Restructuring", "Condonation",]
congress_website_author_codes = ["K121","I066","D015","K059","J082","I040","J046","J012","J062","K043","F088","K021","I022","J066"]
congress_website_coauthors_raw = ["TAMBUNTING, GUS S.","VILLANUEVA, EDUARDO \"Bro. Eddie\" C.","SALCEDA, JOEY S.","HERNANDEZ-ALCANTARA, CHARISSE ANNE C.","BORDADO, GABRIEL JR. H.","MASTURA, SITTIE SHAHARA I.","PRIMICIAS-AGABAS, MARLYN L.","DALIPE, MANUEL JOSE M.","CASTRO, JANE T.","LEE, WILBERT T.","TAN, KEITH MICAH D.L. TAN","ROMAN, GERALDINE B.","RODRIGUEZ, RUFUS B.","SAKALURAN, PRINCESS RIHAN M."]
congress_website_committee_codes = ["0502","0532"]
congress_website_primary_keys = [1560]
congress_website_title = "AN ACT PROVIDING FOR THE RESTRUCTURING AND CONDONATION OF UNPAID INTERESTS, PENALTIES, AND SURCHARGES ON LOANS SECURED BY FARMERS, FISHERFOLKS, AND AGRARIAN REFORM BENEFICIARIES FROM THE DEPARTMENT OF AGRARIAN REFORM, THE DEPARTMENT OF AGRICULTURE, THE PEOPLE'S CREDIT AND FINANCE CORPORATION, THE COOPERATIVE DEVELOPMENT AUTHORITY, THE NATIONAL FOOD AUTHORITY, AND THE QUEDAN AND RURAL CREDIT GUARANTEE CORPORATION"
congress_website_abstract = "Seeks to provide farmers, fisherfolks, and agrarian reform beneficiaries the opportunity to regain access to government and commercial credit facilities through the condonation of unpaid interests, and surcharges on their existing loans obtained through government lending programs. States that condonation shall be limited to cases involving force majeure or market aberration, and shall, in no case be applied to cases resulting from the willful default of the borrower to pay such loans. States further that accumulated payments of not less than 5% of the loan principal shall have been paid at the time of the application for condonation and that, a graduation process shall be granted a one-time condonation only to encourage borrowing discipline and enhance credit worthiness."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=19&q=HBN-5702"
