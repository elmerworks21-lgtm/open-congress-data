congress_website_title = "AN ACT PROVIDING FOR THE MAGNA CARTA OF CHILDREN"
congress_website_abstract = "Seeks to codify existing legislation and harmonize it with the provisions of United Nations Convention on the Rights of the Child (UNCRC) to protect the rights of children. Embodies the four basic principles of the UNRC: the children´s right to non-discrimination, the best interest of children, their right to life and development, and their right to participation in all matters that affect them. Mandates all government offices, including local government units to adopt a comprehensive and integrated strategy through the development and implementation of laws, policies, regulatory instruments, administrative guidelines, and other appropriate measures to implement the provisions of this Act and other related laws and policies and uphold the rights of Filipino children and create an environment that would steer their growth and well-being in all aspects of life."
