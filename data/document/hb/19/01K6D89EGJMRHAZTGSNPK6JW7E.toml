congress_website_title = "AN ACT STRENGTHENING THE COMPETITIVENESS OF THE PHILIPPINE MOTOR VEHICLE MANUFACTURING INDUSTRY"
congress_website_abstract = "Aims to develop a comprehensive policy to accelerate the development of the Philippine Motor Vehicle Manufacturing Industry; ensure a balanced transition to open trade by fully developing its competitiveness capacities and promote greater participation in global value chains; promote the maximum scale integration of vehicle manufacturing and the manufacture of its parts and components; and integrate motor vehicle manufacturing into the overall transport sector policy to encourage objective market conditions for locally-produced vehicles in the expansion and upgrading of the country´s vehicle fleet. Authorizes the President of the Republic of the Philippines to approve a six-year National Motor Vehicle Manufacturing Development Plan prepared by the Board of Investments (BOI) in consultation with concerned stakeholders and endorsed by the Motor Vehicle Manufacturing Development Council which shall define the Industry´s annual and medium-term manufacturing and exports targets, key industry issues, and programs and strategies to support manufacturing and export thrusts. Creates the Vehicle Manufacturing Development Council that shall act as the central planning, coordinating and monitoring body and national advisory committee for the comprehensive and integrated policy on motor vehicle manufacturing industry development. Authorizes the Department of Trade and Industry, through the BOI, in coordination with the Fiscal Incentives Review Board (FIRB) and other pertinent government agencies, to recommend an incentive strategy that shall provide time-bound, targeted, performance-based and transparent fiscal support to integrated vehicle manufacturing and automotive supporting industries. Prioritizes the government procurement, lease or rental of domestically manufactured motor vehicles."
