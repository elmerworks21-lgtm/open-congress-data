congress_website_title = "AN ACT TERMINATING THE VISA UPON ARRIVAL SCHEME IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to address significant challenges and risks posed by obtaining visas at the port of entry in the Philippines - including potential national security threats, illegal immigration, and exploitation by human trafficking syndicates. Seeks to support the existing Philippine Immigration Act and the Anti-Trafficking of Persons Act and to strengthen the country´s commitment to a more secure travel; better control and monitoring of foreign national entry; and stricter screening processes and proper scrutiny to prevent the entry of individuals involved in illegal activities."
