congress_website_abstract = "Intends to address the growing concerns on energy security and global warming resulting from the use of conventional fossil. Defines several terms among others such as Hydrogen, Green Hydrogen, Renewable Energy Sources, Alternative Fuel, and Deuterium (an isotope of hydrogen that has one proton and one neutron on its nucleus and that has twice the mass of ordinary hydrogen, commonly known as “heavy water” and is used as fuel for nuclear fusion reactions)."
