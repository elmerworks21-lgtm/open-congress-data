congress_website_coauthors_raw = ["DALIPE, MANUEL JOSE M.","PRIMICIAS-AGABAS, MARLYN L.","DIONISIO, ERNESTO JR. M.","MARIANO-HERNANDEZ, RUTH"]
congress_website_committee_codes = ["0532","0537"]
congress_website_primary_keys = [106573]
congress_website_title = "AN ACT PROVIDING AN ADDITIONAL GROUND FOR CANCELLING THE CERTIFICATE OF CANDIDACY OF A CANDIDATE AND MAKING THE ACTS OF A NUISANCE CANDIDATE AN ELECTION OFFENSE, AMENDING SECTIONS 69, 261 (CC) AND 264 OF BATAS PAMBANSA BLG. 881, AS AMENDED, OTHERWISE KNOWN AS THE “OMNIBUS ELECTION CODE OF THE PHILIPPINES”"
congress_website_abstract = "States that the Commission on Elections may refuse to give due course to or cancel a certificate of candidacy if the intention of the candidate is to obtain money, profit, or any other consideration. Adds the following prohibited acts on candidacy and campaign: a.) to put the election process in mockery or dispute; b.) to maliciously or deliberately cause confusion among the voters by similarity of the names of the registered candidates; c.) to obtain money, profit, or any other consideration; or d.) by any other circumstances or acts which clearly demonstrate that the candidate has no bona fide intention to run for the office for which the certificate of candidacy has been filed and thus prevent a faithful determination of the true will of electorate. Prescribes a fine of Five Hundred Thousand Pesos (Php500, 000.00) for any person guilty of the election offense enumerated in this Act."
