congress_website_title = "AN ACT AMENDING SECTION 6 OF REPUBLIC ACT NO. 1379, OTHERWISE KNOWN AS “AN ACT DECLARING THE FORFEITURE IN FAVOR OF THE STATE ANY PROPERTY FOUND TO HAVE BEEN UNLAWFULLY ACQUIRED BY ANY PUBLIC OFFICER OR EMPLOYEE AND PROVIDING FOR THE PROCEEDING THEREFOR” AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to provide additional funding to the Office of the Ombudsman by giving it a 30% share of all properties forfeited by the government under R.A.No.1379. Provides that if the property is not in cash, it shall be sold at a public auction where the proceeds thereof after deducting the 30%, the remaining 70% shall accrue to the general fund."
