congress_website_coauthors_raw = ["CHAN, CINDI","ESTRELLA, ROBERT RAYMUND M.","EMANO, YEVGENY VINCENTE B.","FUENTEBELLA, ARNIE B.","UNABIA, CHRISTIAN S.","ABALOS, JONATHAN CLEMENT II M.","PALMA, WILTER Y.","PUMAREN, FRANZ","SUAREZ, DAVID \"Jay-Jay\" C.","VILLARAZA-SUAREZ, ANNA MARIE","DIONISIO, ERNESTO JR. M.","SAULOG, IRENE GAY F.","MAGSINO, MARISSA P.","QUIMBO, STELLA LUZ A.","CUA, MIDY","GUTIERREZ, RAMON RODRIGO L.","VILLAR, CAMILLE A.","PRIMICIAS-AGABAS, MARLYN L.","ACHARON, LORETO B.","FORTES, MANUEL JR. L."]
congress_website_committee_codes = ["0532","E505"]
congress_website_primary_keys = [16866]
congress_website_title = "AN ACT DECLARING LARGE-SCALE AGRI-FISHERY COMMODITIES, AND TOBACCO SMUGGLING, HOARDING, PROFITEERING, CARTELIZING, AND OTHER ACTS OF MARKET ABUSE AS ECONOMIC SABOTAGE, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10845, OTHERWISE KNOWN AS THE ANTI-AGRICULTURAL SMUGGLING ACT OF 2016"
congress_website_abstract = "Seeks to promote the productivity of the agriculture, fishery, and tobacco sectors to protect the Filipino farmers and fisherfolks from unscrupulous traders and importers, promote the affordability and stability of supply of food, agri-fishery commodities, and tobacco by preventing large-scale smuggling, hoarding, profiteering, cartelizing, and other acts of market abuse that manipulate prices and unduly restrain supply. Aims to impose higher penalties for large-scale smuggling, hoarding, profiteering, cartelizing, and other acts of market abuse of agri-fishery commodities or tobacco, and to public officials or employees who take part in, tolerate, or consent to the doing of the same, as a self-preservation measure to shield itself from the manipulative scheme of economic saboteurs, and to protect the livelihood of our farmers and fisherfolk to ensure their economic well-being and that of the consumers. Establishes the Anti Agri-Fishery Commodities and Tobacco Economic Sabotage Council which shall be under the Office of the President, with the President or his duly appointed permanent representative as the Chairperson."
