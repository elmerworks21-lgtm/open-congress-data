congress_website_title = "AN ACT INTRODUCING ADMINISTRATIVE TAX REFORMS, AMENDING SECTIONS 21, 22, 51, 56, 58, 77, 81, 90, 91, 103, 106, 108, 109, 110, 112, 113, 114, 115, 116, 128, 200, 236, 237, 245, AND 248, AND ADDING SECTIONS 312 AND 313 OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS “THE NATIONAL INTERNAL REVENUE CODE OF 1997”, AS AMENDED"
congress_website_abstract = "Institutionalizes a simplified tax returns and processes and introduces a medium taxpayer classification and the corresponding Bureau of Internal Revenue (BIR) special unit. Proposes to remove the distinction between sales invoice and official receipts, making the sales invoice as basis for VAT transactions. Mandates the creation of registration facilities for non-resident taxpayers and provides for a Taxpayer's Bill of Rights. Proposes to remove the required annual taxpayer registration fee payment worth P500.00."
