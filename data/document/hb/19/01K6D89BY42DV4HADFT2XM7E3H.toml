congress_website_title = "AN ACT PROMOTING THE DEVELOPMENT OF THE PHILIPPINE DOWNSTREAM NATURAL GAS INDUSTRY, CONSOLIDATING FOR THE PURPOSE ALL LAWS RELATING TO THE TRANSMISSION, DISTRIBUTION AND SUPPLY OF NATURAL GAS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Provides for several key provisions among others as follows: mandate the Department of Energy to be the lead agency responsible for the supervision and monitoring of the Industry and the regulation of the construction and operation of natural gas pipelines and related facilities for the transmission, distribution, and supply of natural gas; stipulates that the Energy Regulatory Commission shall have the sole regulatory responsibility for establishing the rates and related terms and conditions of service for the transmission and distribution, regasification and supply of natural gas; states the powers and responsibilities of the DENR, DOH, DTI (Bureau of Phil. Standards), and the Philippine Competition Commission (PCC)."
