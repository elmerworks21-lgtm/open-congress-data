congress_website_title = "AN ACT REGULATING THE USE OF TREATMENT TECHNOLOGY FOR MUNICIPAL AND HAZARDOUS WASTES, REPEALING FOR THE PURPOSE SECTION 20 OF REPUBLIC ACT NO. 8749, ENTITLED \"THE PHILIPPINE CLEAN AIR ACT OF 1999\""
congress_website_abstract = "Seeks to amend “The Philippine Clean Air Act of 1999” and “The Ecological Solid Waste Management Act of 2000” pertaining to the ban on the incineration of waste to reduce and resolve the garbage issue of every LGUs and minimize further damage to our environment and ecological system. Proposes to set the standards on the use of treatment technologies for the disposal of municipal and hazardous wastes, or for the processing of any waste material for fuel; Mandates the DENR to implement and enforce this Act, including the promotion and use of modern technology, environment-friendly and safe technologies for the treatment, utilization, and disposal of residual wastes. Provides for the roles of the DOST and the DOE; the responsibilities of owners and operators; the grant of incentives to investors and hosts of waste treatment programs."
