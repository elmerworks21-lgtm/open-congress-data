congress_website_title = "AN ACT INCORPORATING THE VALUE OF RESPONSIBLE, FAIR USAGE, AND ENJOYMENT OF SOCIAL MEDIA IN EDUCATION CURRICULA NATIONWIDE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to include social media in the curricula for primary and secondary education - to instill onto the youth and for students the virtues of discernment and critical thinking in their unavoidable daily immersion therein. Aims to specifically aid in the effective and efficient dissemination of information; help in shaping public discourse and opinion; help in fostering a more participative democracy; instill the importance of upholding truth and the veracity of facts, figures, and events therein; . . . etc. Proposes to include Social Media Awareness as part of the National Service Training Program (NSTP) - Literacy Training Service and Civic Welfare Training Service (CWTS)."
