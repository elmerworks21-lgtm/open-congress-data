congress_website_title = "AN ACT PROVIDING FOR A NEW PASSPORT LAW, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 8239, OTHERWISE KNOWN AS THE \"PHILIPPINE PASSPORT ACT OF1996\""
congress_website_abstract = "Seeks to mandate the issuance of passports using tamper proof and the latest data management technology; Simplifies the documentation requirements of the DFA - Office of the Consular Affairs, in conformity with existing laws and standards set by the International Civil Aviation Organization (ICAO); Implement a system wherein senior citizens may renew their passports without a personal appearance. Proposes to require the DFA to create different databases containing all current and previous passport and travel document records; a watch list containing the name of persons whose applications have been denied or revoked; names and information of persons who committed passport-related offenses."
