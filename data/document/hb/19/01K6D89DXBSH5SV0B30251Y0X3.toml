congress_website_title = "AN ACT MANDATING THE CREATION OF A COMMITTEE ON CLIMATE CHANGE FOR EVERY SANGGUNIAN"
congress_website_abstract = "Seeks to create a standing Committee on Climate Change in every LGU that will address their specific environmental concerns to lead to effective adaptation solutions tailored to a specific location. Provides that all matters relating to strategies, technologies, and innovation addressing climate change causes and impacts, including but not limited to avoidance and reduction of greenhouse gas emissions, climate risk management to enhance adaptive capacity and reduce vulnerability to climate risks, all matters relating to adaptation and mitigation, to enhance resilience, promotion of sustainable development including disciplines like disaster management/mitigation/risk reduction and preparedness, shall be within the scope of the Committee."
