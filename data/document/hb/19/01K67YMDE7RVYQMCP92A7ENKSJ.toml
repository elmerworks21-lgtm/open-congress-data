congress_website_title = "AN ACT INSTITUTIONALIZING THE EXPANDED TERTIARY EDUCATION EQUIVALENCY AND ACCREDITATION PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to strengthen the academic equivalency and accreditation system at the college level, including the validation of the knowledge and expertise derived by senior high school graduates, postsecondary technical-vocational graduates, and college undergraduate students from relevant work experiences and high-level, non-formal training in order to harness their full potentials. Defines Expanded Tertiary Education Equivalency and Accreditation Program (ETEEAP) as the alternative education program in the Philippines that allows working professionals who are either unable to finish their college education or were completely unable to advance into college for different reasons to earn a bachelor´s degree without going through the traditional schooling methods. Mandates the Commission on Higher Education (CHED) to be the lead agency in the implementation of the provisions of this Act and to accredit colleges and universities that seek to offer the ETEEAP as part of their academic program."
