congress_website_title = "AN ACT RATIONALIZING THE MANDATE OF THE POWER SECTOR ASSETS AND LIABILITIES MANAGEMENT CORPORATION, AMENDING FOR THE PURPOSE SECTIONS 4, 50, AND 51 OF REPUBLIC ACT NO. 9136, OTHERWISE KNOWN AS THE “ELECTRIC POWER INDUSTRY REFORM ACT OF 2001”"
