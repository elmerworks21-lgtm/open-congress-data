title = "PRIVATIZATION OF THE ANNUAL HAJJ PILGRIMAGE (AMENDING RA NO. 9997)"
date_filed = "2024-09-05"
long_title = "AN ACT PROVIDING BETTER SERVICES TO MUSLIM FILIPINO PILGRIMS THROUGH PRIVATIZATION OF THE ANNUAL HAJJ PILGRIMAGE, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9997, OTHERWISE KNOWN AS THE 'NATIONAL COMMISSION ON MUSLIM FILIPINOS ACT OF 2009'"
scope = "National"
subjects = [ "Hajj Pilgrimage", "National Commission on Muslim Filipinos",]
congress_website_author_codes = ["K027","D099","K052","I022","K002","K106","J011","H092"]
congress_website_coauthors_raw = ["REVILLA, RAMON JOLO III B.","PRIMICIAS-AGABAS, MARLYN L.","DIONISIO, ERNESTO JR. M.","ESCUDERO, DETTE","BARONDA, JULIENNE \"Jam\"","SUAN, LORDAN","EMANO, YEVGENY VINCENTE B."]
congress_website_committee_codes = ["0523","0532"]
congress_website_primary_keys = [17352]
congress_website_title = "AN ACT PROVIDING BETTER SERVICES TO MUSLIM FILIPINO PILGRIMS THROUGH PRIVATIZATION OF THE ANNUAL HAJJ PILGRIMAGE, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9997, OTHERWISE KNOWN AS THE “NATIONAL COMMISSION ON MUSLIM FILIPINOS ACT OF 2009”"
congress_website_abstract = "Provides that the National Commission on Muslim Filipinos (NCMF) shall represent the Philippine delegation and sign government to government agreements for the purpose of the Annual Hajj. Mandates the Bureau of Pilgrimage and Endowment (BPE) to ensure a successful annual Muslim pilgrimage to Mecca, Kingdom of Saudi Arabia by coordinating with the pertinent offices, monitor the booking of travel arrangements, such as flights and hotels, and processing of the pilgrim´s travel documents. Prohibits the BPE from the participation in the Administration of the Annual Hajj including the collection of fees, booking of hotels, procurement of foods, materials and supplies, arrangement of flights to and from the Kingdom of Saudi Arabia, or processing of visas. Gives the pilgrims the free choice of travel agencies, service providers and airlines for the Annual Hajj in the Kingdom of Saudi Arabia. Provides the BPE to accredit qualified and deserving sheiks/Hajj operators who are private individuals or entities that engages in facilitating, processing, and providing guidance to Muslim Filipinos for the annual Hajj."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=19&q=HBN-10867"

