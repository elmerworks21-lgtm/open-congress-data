congress_website_title = "AN ACT STRENGTHENING THE PROCEDURE FOR REGISTRATION OF VOTERS AND ADOPTING A SYSTEM OF ONLINE REGISTRATION, AMENDING FOR THE PURPOSE SECTIONS 2, 3, 8, 9, 10, 12, 13, 22, 23, 24, 27, 29, 32, 33 AND 45 OF REPUBLIC ACT NO. 8189, OTHERWISE KNOWN AS THE \"VOTER´S REGISTRATION ACT OF 1996\""
congress_website_abstract = "Intends to proscribe any actual or constructive restraint against the exercise of the right of suffrage to prevent disenfranchisement of voters; makes our electoral system more resilient to unexpected calamities, and provides the Filipino electorate and our government an efficient, convenient, and cost-effective mechanism for voter´s registration. Defines the term “disinterested witness”; proposes for the system of continuing personal or electronic filing of application for registration of voters, or through the official website of the Commission."
