congress_website_title = "AN ACT RESTRUCTURING THE ENERGY REGULATORY COMMISSION, AMENDING SECTIONS 38, 39, 40, 41, 43, 44, AND 46 AND REPEALING SECTION 42 OF REPUBLIC ACT NO. 9136, OTHERWISE KNOWN AS THE “ELECTRIC POWER INDUSTRY REFORM ACT OF 2001”"
congress_website_abstract = "Aims to establish a strong, independent, transparent, and accountable regulatory body; and the efficient and effective performance of the functions and mandates of the regulatory body to promote market competition in the electric power industry. Provides for the following: 1.) additional qualifications and requirements for ERC Commissioners to ensure board diversity; 2.) prohibitions and disqualifications for ERC Commissioners and their relatives to prevent conflict of interest; 3.) the separation of the Chairperson and CEO functions to assure balance of power; 4.) defined duties and responsibilities of the Chairperson, the Commission, and the Executive Director to increase individual and board accountability; 5.) open meetings during deliberations of the Commission to guarantee public transparency; 6.) access to information to enhance knowledge and education on regulatory matters affecting public welfare; and 7.) liabilities for violation of among, among others, open meeting and access to information provisions."
