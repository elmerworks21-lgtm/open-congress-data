congress_website_title = "AN ACT DECLARING OCTOBER OF EVERY YEAR AS THE NATIONAL ESPORTS MONTH"
congress_website_abstract = "Defines Esports as a form of organized multiplayer competition using video games, primarily between competitive gamers that includes the ability to perform in front of an audience, whether through an online platform, broadcasted on television, or at an in-person event. Mandates the Department of Education (DepEd), Commission on Higher Education (CHED), and the National Academy of Sports (NAS) to promote the commemoration of the esports month in schools nationwide, both public and private."
