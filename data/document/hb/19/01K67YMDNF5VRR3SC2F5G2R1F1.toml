congress_website_title = "AN ACT CONVERTING THE DR. EVA MACARAEG-MACAPAGAL NATIONAL CENTER FOR GERIATRIC HEALTH UNDER THE JOSE R. REYES MEMORIAL MEDICAL CENTER AS THE NATIONAL CENTER FOR GERIATRIC HEALTH AND RESEARCH INSTITUTE, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to protect and promote the right to health of senior citizens by ensuring holistic health services through the establishment of a geriatric specialty hospital and research institute. Grants the National Center for Geriatric Health and Research Institute (NCGHRI) the function to serve as an apex hospital or end-referral facility which shall specialize in geriatric health services; provide higher and up-to-date geriatric training for professionals, postgraduates, academics and allied healthcare providers especially from the geriatric specialty centers and; conduct cutting edge research studies on diseases related to old age for the development of policies, protocols, standards, and solutions for specialized health care, among others."
