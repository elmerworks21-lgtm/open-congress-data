congress_website_title = "AN ACT TO PROTECT MARINE MAMMALS AND ENSURE THEIR SURVIVAL FOR THE BENEFIT OF FUTURE GENERATIONS"
congress_website_abstract = "Seeks, among others, the following: To hasten the government´s response in undertaking management measures for critically endangered marine mammals such as Irrawaddy dolphins of Negros Occidental; to undertake research on the current status of other marine mammals in the country to be able to develop conservation plans as well as sustainable ecotourism projects; to clarify the law concerning the import/export of marine mammals; to fully explore the economic potential and benefit of dolphin/whale watching industry; to strengthen the role of scientists, conservationists as advisory bodies to government agencies, etc. Proposes to create the Marine Mammal Protection and Conservation Committee (MMPCC) with the following functions, among others, related to: research programs for conservation purposes; manuals and protocols for the rescue of stranded animals; manuals and guidelines for sustainable dolphin and whale-watching tours; technical assessments of rescued, stranded or rehabilitated marine mammals; conservation and management measures of critically endangered or vulnerable marine mammals; Marine Protected Areas and Networks and Marine Corridors; Important Marine Mammal Areas (IMMAs) as designated by the International Union for Conservation of Nature (IUCN) and the Marine Mammal Protected Areas Task Force (MMPATF)"
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_19/HB06679.pdf"]
