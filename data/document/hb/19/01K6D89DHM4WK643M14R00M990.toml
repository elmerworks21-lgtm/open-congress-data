congress_website_title = "AN ACT AMENDING THE PENAL CODE, ARTICLE 259 ON ABORTION"
congress_website_abstract = "Provides that the penalties imposed by law be meted out to their maximum, and the additional penalty of perpetual loss of license to practice profession - by the guilty individuals, be imposed. Proposes to exempt a woman on whom the abortion was performed - from criminal prosecution in exchange for her testimony against the physician, midwife, NURSE OR ANY OTHER HEALTH WORKER concerned."
