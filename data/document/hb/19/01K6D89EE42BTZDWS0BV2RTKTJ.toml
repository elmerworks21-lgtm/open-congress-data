congress_website_title = "AN ACT TO INCREASE FARM PRODUCTIVITY BY REDUCING LAND FRAGMENTATION"
congress_website_abstract = "Aims to address land fragmentation, which has resulted in decreased agricultural productivity and ongoing poverty in the sector. Includes easing restrictions on farm sizes, removing limitations on agricultural land transactions, and promoting a dynamic rural land market. Proposes the following: - Establishing a ceiling requirement for landholdings - Removing the need for Department of Agrarian Reform (DAR) clearances for ownership transfers - Eliminating the requirement for approval of land conversion from agricultural to non-agricultural use, among others."
