congress_website_title = "AN ACT PROVIDING FOR A NATIONAL DIGITAL TRANSFORMATION POLICY AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to ensure that every citizen will have an opportunity to understand ICT and develop the necessary skills for the digital age by providing a national framework for digital transformation with the adoption of information and communications technology (ICT) and digital competency in all forms of learning, and a national digital transformation and skills developments strategy. Proposes several provisions as follows: Digital Competence Framework for Citizens; ICT Competency Framework for Teachers; National Digital Transformation Strategy; Digital Inclusion; Digital Libraries and Learning flute; Digital Entrepreneurship; Digital Civil Service; Nat´l Digital Skills Dev´t Strategy; Digital Jobs; and Nat´l Digital Transformation Council."
