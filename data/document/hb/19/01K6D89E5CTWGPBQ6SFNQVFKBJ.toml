congress_website_title = "AN ACT PROVIDING STIFFER PENALTIES FOR VIOLATIONS OF PRESIDENTIAL DECREE NO. 705, AS AMENDED, OTHERWISE KNOWN AS THE \"REVISED FORESTRY CODE\""
congress_website_abstract = "Proposes to amend Sec.77 of PD 705 wherein a specific set of penalties independent of that imposed under Revised Penal Code Art. 309 (Theft) and Art.310 (Qualified Theft) - will be imposed to the following illegal activities: Sec. 77 - Cutting, Gathering, and/or Collecting Timber or Other Forest Products Without License; Sec. 78 - Unlawful Occupation or Destruction of Forest Lands and Grazing Lands; Sec. 80 - Illegal Occupation of National Parks System and Recreation Areas and Vandalism Therein; Sec. 81 - Destruction of Wildlife Resources Sec. 83 - Misclassification and Survey by Government Official or Employee; Sec. 85 - Coercion and Influence Sec. 86 - Unlawful Possession of Implements and Devices Used by Forest Officers; Sec. 87 - Payment, Collection, and Remittance of Forest Charges; Sec. 88 - Sale of Wood Products."
