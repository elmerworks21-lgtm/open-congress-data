congress_website_title = "AN ACT REGULATING THE PRACTICE OF THE AGRICULTURE PROFESSION IN THE PHILIPPINES, CREATING FOR THE PURPOSE A PROFESSIONAL REGULATORY BOARD FOR AGRICULTURISTS"
congress_website_abstract = "Aims to 1.) Provide examination, registration, and licensure of agricultural practitioners; 2. Supervise, control, and regulate the practice of the agriculture profession in the Philippines; 3.) Develop and upgrade the Bachelor of Science (BS) in Agriculture curriculum; 4.) Develop the professional competence of registered agriculturists through Continuing Professional Development (CPD); and 5.) Integrate the agriculture profession through membership of registered agriculturists in an accredited integrated professional organization."
