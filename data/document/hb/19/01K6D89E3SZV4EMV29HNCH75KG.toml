congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF LOCAL STUDIES CENTERS IN STATE UNIVERSITIES AND COLLEGES THROUGHOUT THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to ensure the preservation of our fellowmen´s interest in our local cultural heritage through establishing centers that aim to become pivotal in researching, documenting, conserving, and promoting the country´s rich cultural heritage, specifically at the grassroots level. Seeks to harness the academic and scientific capabilities of SUCs in exploring and preserving the Philippines´ history and culture to serve as leverage to become platforms for systematic study of local heritage. Proposes to provide copies of each publication for deposit at the Historical Data Bank of the National Historical Commission of the Phils. (NHCP), the National Library of the Phils., and the University of the Phils. Diliman Filipiniana Library. Tasks the DFA to purchase and disseminate copies of publications to all Sentro Rizal cultural centers in foreign service posts"
