congress_website_title = "AN ACT DEFINING ELECTRONIC VIOLENCE AGAINST WOMEN AND THEIR CHILDREN, PROVIDING PROTECTIVE MEASURES, AND PRESCRIBING PENALTIES FOR VIOLATIONS THEREOF, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9262, OTHERWISE KNOWN AS THE “ANTI-VIOLENCE AGAINST WOMEN AND THEIR CHILDREN ACT OF 2004”"
congress_website_abstract = "Intends to address the reported significant number of women encountering online gender-based violence in spite of the enactment of the Cybercrime Prevention Act and Anti-VAWC. Seeks to identify and categorize acts that will be considered online violence or ICT-related violence against women and children and enumerates the corresponding penalties thereto; Expands the coverage of protection orders and confidentiality policy to include measures against online dissemination of electronic violence-related materials."
