congress_website_title = "AN ACT PROVIDING PENALTIES FOR GENDER-BASED SEXUAL HARASSMENT IN THE WORKPLACE AND IN EDUCATIONAL AND TRAINING INSTITUTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 11313, OTHERWISE KNOWN AS THE “SAFE SPACES ACT”"
congress_website_abstract = "Imposes the penalty of prision correccional in its maximum period, or a fine of not less than two hundred fifty thousand pesos (P250, 000.00) but not more than five hundred thousand pesos (P500, 000.00) or both upon any person found guilty of any gender-based sexual harassment, at the discretion of the court. States that if the perpetrator is the head of the workplace or organization, the appointment of such person shall be deemed revoked upon conviction. Declares that an alien who commits gender-based sexual harassment in the workplace shall be subject to deportation proceedings after serving a sentence and/or payment of fines. Penalizes any public official or government employee who is found guilty of fomenting, promoting, or exhorting acts of sexual harassment, misogynistic, transphobic, homophobic, and sexist slurs, either verbally, in writing, or through digital or social media platform. Provides that if the perpetrator is the head of the educational or training institution or organization, the appointment if such person shall be deemed revokes upon conviction, and if an alien commits gender-based sexual harassment in an educational or training institution, said alien shall be subject to deportation proceedings after serving a sentence and/or payment of fines."
