congress_website_title = "AN ACT STRENGTHENING THE FINANCING SYSTEM FOR AGRICULTURE AND RURAL DEVELOPMENT IN THE PHILIPPINES, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 10000 OR \"THE AGRI-AGRA REFORM CREDIT ACT OF 2009\""
congress_website_abstract = "Seeks to address the issue regarding our poor farmers and those supposed target beneficiaries´ inadequate access to government-directed credit programs and their dependence on informal lenders who charge unreasonable interest rates. Seeks to institutionalize the zero interest loans and well-assessed and accepted loan maturity dates for payment that shall be in accordance with the farmer´s cash flows and the gestation and harvest period of the agricultural produce/activity/project being financed. Tasks the Land Bank of the Phils. (LBP) and the Development Bank of the Phils. (DBP) to continue to promote savings and credit in rural areas by offering affordable and accessible deposit products such as the basic deposit account for deposits and low to no interest rates for loans. Provides that lending cooperatives, microfinance institutions, retail banks, and rural and thrift banks shall apply minimum to zero interest rates for wholesale loans obtained from government banks."
