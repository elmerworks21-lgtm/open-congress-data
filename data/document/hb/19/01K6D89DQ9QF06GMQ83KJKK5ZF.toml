congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE AND RATIONALIZED GRANT OF REWARDS TO INFORMERS FOR THE DISCOVERY OF VIOLATIONS OF INTERNAL REVENUE AND CUSTOMS LAWS"
congress_website_abstract = "Seeks to incentivize individuals to report tax evasion and noncompliance to relevant authorities and ensure that the rewards should be proportionate to the information provided and the amount of tax recovered. Proposes specific provisions among others as follows: a) informer´s reward for the discovery of fraud related to the NIRC or violations of any of the provisions thereof; b) informer´s reward for the discovery and seizure of smuggled goods - equivalent to a percentage of the actual proceeds of the sale of such confiscated goods, or of the actual collection of additional revenues, etc. ; c) non-payment of informer´s reward (if there is nothing actually recovered or collected . . . ; d) confidentiality of informer´s identification; e) action in cases involving false of malicious information; f) automatic appropriation of all proceeds resulting from the recovery of revenues, surcharges, fees, and/or imposition of fine penalty, and/or from the sale of smuggled and confiscated goods."
