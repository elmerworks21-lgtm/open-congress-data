congress_website_title = "AN ACT RECLASSIFYING LEGITIMATE AND ILLEGITIMATE CHILD INTO MARITAL AND NONMARITAL CHILD, RESPECTIVELY, THEREBY AMENDING THE PERTINENT PROVISIONS OF THE CIVIL CODE, THE FAMILY CODE, AND OTHER RELEVANT LAWS"
congress_website_abstract = "Seeks to address the stigma attached to the use of the term “illegitimate child” when referring to a person born to unmarried parents. Proposes to amend provisions of relevant laws that use the term legitimate and illegitimate child to reclassify as “marital child” and “nonmarital child.\""
