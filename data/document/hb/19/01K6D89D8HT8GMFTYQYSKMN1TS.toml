congress_website_title = "AN ACT SUSPENDING THE IMPLEMENTATION OF THE USE OF MOTHER TONGUE AS THE MEDIUM OF INSTRUCTION FOR KINDERGARTEN TO GRADE 3 PROVIDED UNDER SECTION 4 OF REPUBLIC ACT NO. 10533, OTHERWISE KNOWN AS THE “ENHANCED BASIC EDUCATION ACT OF 2013”"
congress_website_abstract = "Seeks to address the lack of readiness and proper preparations that are necessary to implement the use of mother tongue as the medium of instruction for learners in Kindergarten to Grade 3. Suspends the use of mother tongue until the certification by the DepEd on the readiness of all school districts to implement the mother tongue curriculum and that the prescribed books, teaching materials, and supplies to support it are available. Tasks the DepEd to coordinate with the Komisyon sa Wikang Filipino (KWF) in developing books, teaching materials, and other supplies necessary in the implementation of the use of mother tongue within sixty (60) days from the effectivity of this Act. Provides automatic repeal of this Act upon the approval of Congress of the assessment report and the certification of DepEd to Congress on the readiness of all school districts to implement the use of mother tongue or first language as the medium of instruction for learners in kindergarten to Grade 3."
