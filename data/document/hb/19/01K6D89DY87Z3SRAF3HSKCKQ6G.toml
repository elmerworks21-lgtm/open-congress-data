congress_website_title = "AN ACT CREATING THE BARANGAY AFFAIRS AND DEVELOPMENT COMMISSION, DEFINING ITS POWERS AND FUNCTIONS, ESTABLISHING THE BARANGAY DEVELOPMENT FUND, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to reexamine the functions of the barangay not only as a political unit but also as an enabler of the community´s socioeconomic affairs. Seeks to equip barangays with necessary skills to manage their limited resources effectively, generate economic gains, and provide primary local services to their constituents. Proposes a Barangay Development Fund that will be utilized exclusively for the development projects and programs of the barangays, including subsidies to poor barangays for the honoraria of barangay officials and employees."
