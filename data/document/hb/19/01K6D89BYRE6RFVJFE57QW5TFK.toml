congress_website_title = "AN ACT PROVIDING STRONGER MEASURES FOR THE CONSERVATION AND PROTECTION OF WILDLIFE RESOURCES AND THEIR HABITATS, REPEALING FOR THIS PURPOSE REPUBLIC ACT NO. 9147, OR THE \"WILDLIFE RESOURCES CONSERVATION AND PROTECTION ACT\", AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes among others, the following provisions: The DENR shall have jurisdiction over all terrestrial plant and animal species including turtles and tortoises, wetland species, including crocodiles, waterbirds and all amphibians and the Dugong, Dugon or Dugong; the Department of Agriculture shall have jurisdiction over all declared aquatic critical habitats, all aquatic resources including all fishes, aquatic plants, invertebrates and all marine mammals, except Dugong; in the Province of Palawan, jurisdiction is vested on the Palawan Council for Strategic Development (PCSD) pursuant to R.A. No.7611 or the Strategic Environment Plan (SEP) for Palawan Act. Defines several terms among others such as biodiversity, critically endangered species, indigenous wildlife; invasive alien species, and critical habitat (an area outside protected areas under R.A. No.7586 or the National Integrated Protected Area System (NIPAS) Act, as amended by R.A. No.11038 or the ENIPAS, that are known habitats of threatened species and designated based on scientific data taking into consideration species endemicity and richness, and the presence of manmade pressures and threats to the survival of wildlife living in the area, among others."
