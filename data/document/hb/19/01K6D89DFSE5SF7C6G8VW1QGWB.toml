congress_website_title = "AN ACT REQUIRING THE PUBLICATION OF ANY FOREIGN AID AGREEMENT WITHIN ONE MONTH AFTER THE SIGNING THEREOF IN TWO NATIONAL NEWSPAPERS OF GENERAL CIRCULATION"
congress_website_abstract = "Intends to address the following issues: the country's development is still lagging behind those of many other nations in Southeast Asia despite its being a perennial recipient of foreign assistance; the perceived one among the primary causes of the wastage in foreign aid is the lack of transparency in its disclosures and the supposed beneficiary of the same; and the \"disturbing\" capacity of the country to meet commitments based on the Paris Declaration on Aid Effectiveness of 2010. Proposes that the publication shall include the agreement itself, the country or organization which is the source of the foreign aid, the amount involved, the beneficiaries thereof, the project or program covered, and the conditional ties attached thereat."
