congress_website_title = "AN ACT DEFINING THE CRIME OF TAX RACKETEERING, ADDING FOR THE PURPOSE A SECTION 157-A TO THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address the issue regarding the evasion of taxes by corporations using fictitious sales invoices or receipts involving false and anomalous purchases - called \"ghost receipts\" or the practice of \"ghosting the tax authority.\" Proposes to define the offense of tax racketeering as \"any coordinated scheme or operation to repeatedly or consistently evade or defeat any tax imposed under the National Internal Revenue Code through fraudulent use of receipts, returns, and other records, with minimum amount of Ten Million (P10,000,000.00) in taxes avoided or attempted to be avoided\"."
