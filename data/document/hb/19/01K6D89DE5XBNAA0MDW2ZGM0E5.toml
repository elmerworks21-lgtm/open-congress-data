congress_website_title = "AN ACT INSTITUTIONALIZING THE PAMBANSANG PABAHAY PARA SA PILIPINO (4PH) PROGRAM"
congress_website_abstract = "Proposes several provisions among others regarding the 4PH Program: further implement the development of 1,000,000 housing units every year . . . ; prioritize the lowest 30% income decile of the population and low wage earners as primary beneficiaries; strategies to make housing finance accessible and housing units affordable to the target beneficiaries. Provides for the roles and responsibilities of implementing agencies as follows: Department of Human Settlement and Urban Development (DHSUD); Home Development Mutual Fund (HDMF), participating Government Financial Institutions (GFIS) and Private Banks; National Housing Authority (NHA) and Social Housing Finance Corporation (SHFC); National Home Mortgage Finance Corporation (NHMFC); Participating LGUs, etc."
