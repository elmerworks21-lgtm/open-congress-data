congress_website_title = "AN ACT TO REFORM THE BUDGET PROCESS BY ENFORCING GREATER ACCOUNTABILITY IN PUBLIC FINANCIAL MANAGEMENT (PFM), PROMOTING FISCAL SUSTAINABILITY, UPHOLDING CONGRESS´ POWER OF THE PURSE, INSTITUTING AN INTEGRATED PFM SYSTEM, AND INCREASING BUDGET TRANSPARENCY AND PARTICIPATION"
congress_website_abstract = "Seeks to ensure the responsibilities of all government agencies to propose, execute and deliver committed results in the Appropriations Act in a timely, predictable and economical manner; to strengthen the integration of planning, budgeting, accounting, disbursement, performance management, etc.; and to ensure ample safeguards in managing public finances. Proposes to institutionalize the cash-based estimates in the proposed general and special appropriations; to reform the budget preparation process; to incorporate medium-term planning, particularly in infrastructure; to set safeguards for multi-year contracts to manage the availability of public resources and avoids contingent liabilities for government-initiated projects; to improve the management of liabilities, minimization of unanticipated contingent liabilities; and to provide for budgetary framework for clarifying the management of public resources in the aftermath of the COVID-19 pandemic."
