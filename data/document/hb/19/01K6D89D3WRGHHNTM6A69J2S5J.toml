congress_website_title = "AN ACT PROVIDING FOR A WAGE EMPLOYMENT ASSISTANCE PROGRAM FOR DISPLACED AND/OR VULNERABLE WORKERS INSTITUTIONALIZING FOR THE PURPOSE THE TULONG PANGHANAPBUHAY SA ATING DISADVANTAGE/DISPLACED WORKERS (TUPAD) PROGRAM OF THE DEPARTMENT OF LABOR AND EMPLOYMENT, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines and Institutionalizes the TUPAD PROGRAM as a social safety net designed to assist displaced and/or vulnerable workers and their families - and get them back on their feet by providing them wage employment if they fall on hard times due to disasters, epidemics, war, armed conflict, crises, economic shocks or income loss brought about by ill-health, disability, work-related accidents or injuries, unemployment, work displacements due to business closure, retrenchment, rightsizing, redundancy, technological advances, and other analogous causes."
