congress_website_title = "AN ACT INSTITUTING REFORMS IN REAL PROPERTY VALUATION AND ASSESSMENT IN THE PHILIPPINES, REORGANIZING THE BUREAU OF LOCAL GOVERNMENT FINANCE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to address the following systemic problems in real property valuation and assessment: rampant outdated valuations; cost overruns and foregone revenues due to low valuations used; multiple, overlapping valuations - no single agency responsible for ensuring that valuations are completed in accordance with international standards; and absence of a comprehensive real property electronic database. Seeks to adopt a market-based Schedule of Market Values (SMV) to be used as a basis for local and national real property taxation which will widen the tax base used for property and property-related taxes. Mandates the Bureau of Local Government Finance (BLGF) of the Department of Finance to lead and manage the implementation of the provisions of this Act."
