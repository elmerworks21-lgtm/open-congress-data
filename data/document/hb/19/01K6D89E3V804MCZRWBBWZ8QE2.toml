congress_website_title = "AN ACT ESTABLISHING INFORMATION AND COMMUNICATIONS TECHNOLOGY HUBS NATIONWIDE"
congress_website_abstract = "Seeks to strengthen Filipinos' information and technology literacy to create a more inclusive digital economy and to accelerate digital transformation in the Phil. Economy, increase job opportunities and foster a competitive ICT sector. Refers Public Telecommunications Entity (PTE) to any person, natural or juridical, government or privately engaged in providing telecommunications services to the public for compensation. Defines ICT HUB as a location where a PTE may provide ICT services with at least the minimum internet speed required by the NTC.Â Such services may include telecommunication services, broadband and convergence services, business processing, and data management."
