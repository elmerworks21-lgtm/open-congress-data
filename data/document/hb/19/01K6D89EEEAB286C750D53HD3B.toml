congress_website_title = "AN ACT REGULATING THE ALLOCATION AND UTILIZATION OF CONFIDENTIAL AND INTELLIGENCE FUNDS IMPOSING PENALTIES FOR MISUSE AND MISAPPROPRIATION"
congress_website_abstract = "Declares that “The state recognizes the need for the allocation and use of confidential and intelligence funds in government agencies with mandates that are directly related to national security, law enforcement, and intelligence operations, and other related critical functions requiring discretion . . .” Provides that the total allocation for confidential funds for any single agency, considering the population serviced, shall not exceed ten percent [10%} of the total annual budget of the agency . . . Provides for stricter requirements and guidelines for its utilization since the spirit of granting confidential funds is for confidential expenses for peace and order programs and public safety -"
