congress_website_title = "AN ACT STRENGTHENING THE SYSTEM OF FILING OF DELAYED REGISTRATION OF BIRTHS IN THE COUNTRY, AMENDING FOR THE PURPOSE ACT NO. 3753"
congress_website_abstract = "Seeks to amend Act No. 3753 (the Law on Civil Registry Status) to establish a formal system for the delayed registration of births. It introduces stricter guidelines and procedures for verifying the legitimacy of late applications. The amendment mandates that birth registration must occur within thirty (30) days of birth but allows for late registration if specific conditions are met. Additionally, it proposes requiring extra documentation, field visits, and interviews by local civil registrars. A mandatory ten (10) day public notice period for all late registration applications will also be implemented. This proposal seeks to emphasize the importance of the Philippine Statistics Authority´s Negative Certification of Birth Records as a required document to enhance the integrity of the civil registry."
