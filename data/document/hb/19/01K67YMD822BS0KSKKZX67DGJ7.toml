congress_website_abstract = "Seeks to simplify and update the publication requirements in the disposition of public agricultural lands under Commonwealth Act No. 141 and shortens the announcement of sale by publishing the proper notice once a week from six (6) to two (2) consecutive weeks. Removes the option of publishing the notice in Spanish or in the local dialect and increases the threshold of the land value that will require publication in the Official Gazette from Two Hundred Forty Pesos (P240.00) to Fifty Thousand Pesos (P50,000.00)."
