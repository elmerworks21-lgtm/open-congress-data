congress_website_title = "AN ACT UPGRADING AND CREATING ADDITIONAL POSITIONS IN THE OFFICE OF THE GOVERNMENT CORPORATE COUNSEL (OGCC), AMENDING FOR THE PURPOSE EXECUTIVE ORDER NO 878 DATED MARCH 4, 1983, AS AMENDED BY EXECUTIVE ORDER NO. 299 DATED JULY 26, 1987"
congress_website_abstract = "Proposes to augment the OGCC's workforce to sufficiently address the developing requirements and legal concerns of government corporate sector. Seeks to maintain OGCC´s effectiveness in addressing the legal needs of its clients particularly corporations which do not have internal legal departments. Proposes to strengthen the applicable laws and issuances of OGCC´s organizational structure to create new positions in its hierarchy and augment its present complement with an additional thirty-six (36) lawyer positions."
