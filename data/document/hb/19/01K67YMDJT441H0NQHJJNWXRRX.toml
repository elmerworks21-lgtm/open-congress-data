congress_website_title = "AN ACT PROVIDING FOR THE REVISED COOPERATIVE CODE OF THE PHILIPPINES"
congress_website_abstract = "Aims to encourage the private sector to undertake the actual formation and organization of cooperatives and create an atmosphere that is conducive to the growth and development of these cooperatives. Ensures the provision of technical and financial assistance, and other services to enable the cooperatives to develop into viable and responsive economic enterprises towards a strong cooperative movement, free from conditions that infringe upon the objectives and character of cooperatives. Recognizes the principle of subsidiarity under which the cooperative sector initiates and fosters, within their own ranks, cooperative promotion, organization, training, information gathering, audit and support services, with government assistance if necessary."
