congress_website_abstract = "Seeks to grant senior citizens and Persons with Disabilities (PWDs) a twenty percent (20%) discount and exemption from value-added tax, or the special discount on purchase of basic necessities and prime commodities, in addition to any prevailing promotional offers or discounts extended by business establishments. Aims to clarify that the discounts for senior citizens and PWDs shall be treated as part of deductible expense of business establishments."
