congress_website_title = "AN ACT ALLOWING THE INTERMENT OF FILIPINO SPORTS HEROES AT THE LIBINGAN NG MGA BAYANI"
congress_website_abstract = "Aims to honor and perpetuate the memory of the Filipino sports heroes who have led lives worthy of inspiration and emulation through generations. Refers to sports heroes as “Filipino athletes, amateur or professional, including athletes with disabilities, who have distinguished themselves in their particular field of sports, possessed good moral character and integrity, represented and brought honor and glory to the country by winning any medal in the Olympics or Paralympic Games or a World Championship.” Includes any Filipino athlete, coach, or trainer who were inducted into the Philippine Sports Hall of Fame pursuant to Republic Act No. 8757, entitled “An Act Establishing the Philippine Sports Hall of Fame and Appropriating Funds Therefor”. Requires sports heroes to be citizens of the Philippines or former Filipino citizens by birth who are naturalized in another country but re-acquired Philippine citizenship pursuant to Republic Act No. 9225 of the “Citizenship Retention and Re-acquisition Act of 2003”. Establishes a screening committee to determine and recommend qualified Filipino sports heroes. Mandates the PSC or the GAB to coordinate with the AFP to issue the interment directive and make the necessary arrangements for the interment service."
