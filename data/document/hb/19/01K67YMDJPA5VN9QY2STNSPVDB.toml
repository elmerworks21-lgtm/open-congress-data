congress_website_title = "AN ACT ESTABLISHING THE NATIONAL FRAMEWORK FOR WATER RESOURCE MANAGEMENT AND CREATING THE DEPARTMENT OF WATER RESOURCES AND THE WATER REGULATORY COMMISSION, DEFINING THEIR MANDATES, POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to ensure the provision of safe, adequate, affordable, and sustainable water supply and improved sanitation services, while maintaining the protection, preservation, and revival of the quality of the country´s water resources and ecological balance. Creates the Department of Water Resources that shall be the primary agency responsible for the comprehensive and integrated identification and mapping of all water resources, planning, policy formulation, and management of the ownership, appropriation, utilization, exploitation, development, and protection of water resources in the Philippines to ensure optimal use thereof. Establishes the Water Regulatory Commission which shall cover and apply for all service providers, whether private or public, providing or intending to provide water supply, including suppliers to subdivisions or other service providers, sewerage, or septage treatment and disposal services for domestic, residential, institutional, industrial or commercial use."
