congress_website_title = "AN ACT AUTHORIZING THE CITY OR MUNICIPAL CIVIL REGISTRAR AND THE CONSUL GENERAL TO CHANGE THE SEX AND THE NAME OF AN INTERSEX PERSON APPEARING IN THE CIVIL REGISTER WITHOUT THE NEED OF A JUDICIAL ORDER"
congress_website_abstract = "Seeks to address the unique circumstances of intersex individuals of legal age, by providing a straightforward and accessible legal process for them to change their sex and first names in the civil register without the need for a judicial order. Proposes to affirm the de jure rights of Filipinos with intersex conditions and acknowledges the importance of respecting an individual´s right to self-determination and privacy regarding their gender identity and personal information. (Note: Based on SC RP v. Jennifer (Jeff) Cagandahan´s (G.R.No.166676) secondary male characteristic diagnosed to have Congenital Adrenal Hyperplasia (CAH)"
