congress_website_title = "AN ACT INSTITUTIONALIZING THE ASSISTANCE TO INDIVIDUALS IN CRISIS SITUATIONS PROGRAM OF THE DEPARTMENT OF SOCIAL WELFARE AND DEVELOPMENT, PROVIDING PENALTIES FOR THE VIOLATION OF CERTAIN UNLAWFUL ACTS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to institutionalize a permanent national program that is financially and administratively capable of responding to the needs of Filipinos when dealing with an extreme circumstance. Provides each qualified beneficiary with financial, medical, transportation, food, material, and other assistance including disability support services, psychosocial support or intervention for dysfunctional families and their children who need trauma case and management, and legal consultation, based on the assessment of the social workers of the DSWD. Establishes an Integrated Program Delivery System for real-time data sharing between the DSWD and the LGUs in order to identify the assistance given to the Program´s eligible beneficiary for purposes of assistance augmentation and to prevent possible abuse of the assistance given to those in crisis situations. Establishes the Crisis Intervention Office (ICO) at the Central Office, Crisis Intervention Divisions at the field offices, and Crisis Intervention Units at the Social Welfare and Development satellite offices of the DSWD that shall monitor and evaluate the implementation of AICS Program and prepare the monitoring and evaluation report for submission to the Secretary of the DSWD. Provides unlawful acts and corresponding penalties to prevent abuse of the AICS program."
