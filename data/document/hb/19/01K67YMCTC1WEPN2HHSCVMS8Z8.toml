congress_website_title = "AN ACT REGULATING THE SALE OF CASKETS BY FUNERAL ESTABLISHMENTS TO ENSURE AVAILABILITY OF AFFORDABLE CASKETS, AND APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes that all funeral establishments shall at all times maintain available decent caskets with a price of not more than Twenty Thousand Pesos (P20,000.00). In case of unavailability, the establishment shall be obliged to offer one of any higher value but the indigent family or extremely poor family shall still pay an amount of not more than P20,000.00."
