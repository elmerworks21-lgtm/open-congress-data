congress_website_title = "AN ACT CREATING A SYSTEM OF PARTNERSHIP BETWEEN LOCAL GOVERNMENTS AND CIVIL SOCIETY ORGANIZATIONS THROUGH THE ESTABLISHMENT OF A PEOPLE'S COUNCIL IN EVERY LOCAL GOVERNMENT UNIT, PRESCRIBING ITS POWERS AND FUNCTIONS AND PROVIDING FOR ITS PARTICIPATION IN THE LOCAL SANGGUNIAN AND LOCAL BOARDS, COUNCILS, COMMITTEES, TASK FORCES OR SIMILAR WORK GROUPS"
congress_website_abstract = "Seeks to empower the people by providing them greater access and participation to governance through Civil Society Organizations (CSO). Mandates CSOs to have actively operated for at least one (1) year in the city or municipality where majority of its members reside, and must apply for accreditation with the local sanggunian upon submission of prescribed requirements. Provides for a creation of People´s Council, composed of accredited CSOs, in each local government unit (LGU) wherein members may participate in the conceptualization, implementation and evaluation of government activities, among others. Creates a Committee for the Accreditation of CSOs in all provincial, city and municipal sanggunians wherein two (2) representatives shall come from the People´s Council. Creates a Provincial People´s Council (PPC) recognized by the Sangguniang Panlalawigan and shall be composed of all representatives from the municipal and city People´s Councils within a province´s jurisdiction wherein a representative elected within their ranks shall sit as a member of the Sanggunian Panlalawigan and shall exercise the duties and powers of a Provincial Board member. Mandates barangays to provide information boards and suggestion boxes to be strategically situated in public places accessible to the people."
