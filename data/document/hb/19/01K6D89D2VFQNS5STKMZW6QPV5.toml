congress_website_title = "AN ACT TO RESTRUCTURE, RATIONALIZE, AND INTEGRATE THE GOVERNMENT´S LIVESTOCK INDUSTRY SUPPORT AGENCIES INTO THE PHILIPPINE LIVESTOCK AUTHORITY IN ORDER TO STRENGTHEN ITS DEVELOPMENT, PROTECTION, AND REGULATORY FUNCTIONS, INCLUDING THE PROMOTION OF DAIRY AND NATIVE ANIMALS, PROVIDE FOR A LIVESTOCK DEVELOPMENT FUND, AND FOR OTHER PURPOSES."
congress_website_abstract = "Proposes for a 10-year roadmap of programs and projects for the propagation, utilization, and development of the livestock industry across administrative regions which shall cover every aspect of the business beginning from the breeding and feeding of animals to entrepreneurship. Intends to activate under the PLA an Animal and Livestock Emergency Response Task Force (ALERT-TF); and to propose an initial fund for the purchase of facilities, socialized credit under the Small-hold Livestock Farm Modernization Program, research and development, international and local marketing assistance to small farmers, scholarship and human resource development grants for related courses, and infrastructure programs."
