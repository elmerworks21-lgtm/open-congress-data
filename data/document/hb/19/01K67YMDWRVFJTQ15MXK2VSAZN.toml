congress_website_abstract = "Seeks to impose heavy and differentiated penalties based on the degree of involvement in illicit trade on tobacco and other related products; establish a modern digital tracking and tracing system for the manufacturing, importation, storage, removal, distribution, and sale of tobacco and related products; form an inter-agency body to facilitate information sharing and collaborative enforcement among government agencies and stakeholders; broaden the scope of activities that fall under illicit tobacco trade; and strengthen monitoring by mandating the conduct of regular surveys to determine the magnitude of illicit trade."
