congress_website_title = "AN ACT REGULATING THE USE OF FINANCIAL ACCOUNTS"
congress_website_abstract = "Aims to protect the public from cybercriminals and criminal syndicates who target financial accounts, e-wallets, and other financial accounts, or lure account holders into perpetrating fraudulent activities. Identifies and defines certain punishable offenses such as money mule, social engineering schemes and economic sabotage. Mandates the BSP to have the authority to examine and investigate individual financial accounts, e-wallets, or other financial accounts which are involved in the prohibited acts and other offenses under Section 4 and 5 of this Act. Designates the Regional Trial Court as cybercrime court which shall have jurisdiction over the violation of the provisions of this Act including any violation committed by a Filipino national regardless of the place of commission.Mandates all relevant international instruments on international cooperation in criminal matters, arrangements agreed based on uniform or reciprocal legislation, and domestic laws for the purposes of investigations or proceedings concerning criminal offenses related to computer systems and data, or for the collection of evidence in electronic form of a criminal offense, shall be given full force and effect."
