congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7305, OTHERWISE KNOWN AS “THE MAGNA CARTA OF PUBLIC HEALTH WORKERS”"
congress_website_abstract = "Proposes a redefinition of the term \"healthcare workers,\"; bans age and disability discrimination and discrimination regarding political or religious affiliations, sex, sexual orientation and gender identity, civil status, age, or ethnicity; stipulates different administrative fees for national and local public health workers, and increases and expands the coverage of night-shift differentials, overtime rates, and allowances like hazard, subsistence, and laundry. Seeks to amend Republic Act No. 7305, otherwise known as “The Magna Carta of Public Health Workers” to read as follows: SECTION 2. “Sec. 3”¦shall include medical, allied health professionals, administrative and support personnel employed in NATIONAL GOVERNMENT AGENCIES (NGAs), INCLUDING SUCs, GOCCs, GFIs, AND LGUs HOLDING PERMANENT OR TEMPORARY STATUS; CASUAL OR CONTRACTUAL WHOSE SALARIES ARE CHARGED AGAINST PERSONNEL SERVICES (PS) LUMP SUM APPROPRIATION, RENDERING SERVICES ON FULL-TIME OR PART TIME BASIS AND WHOSE POSITIONS ARE COVERED OR OTHERWISE BY R.A. 6758, ALSO KNOWN AS THE “COMPENSATION AND POSITION CLASSIFICATION ACT OF 1989”, AS AMENDED.”"
