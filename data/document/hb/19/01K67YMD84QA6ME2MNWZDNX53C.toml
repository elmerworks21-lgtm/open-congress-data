congress_website_title = "AN ACT ESTABLISHING SPECIALTY CENTERS IN HOSPITALS UNDER THE DIRECT SUPERVISION AND CONTROL OF THE DEPARTMENT OF HEALTH, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to establish specialty centers in select hospitals under the direct supervision of the Department of Health (DOH) and shall prioritize for seventeen (17) specialty care including cancer care, cardiovascular care, lung care, renal care and kidney transplant, brain and spine care, trauma care, burn care, orthopedic care, physical rehabilitation medicine, infectious disease and tropical medicine, toxicology, mental health, geriatric care, neonatal care, dermatology care, ear, nose and throat care and eye care. Mandates the DOH to include the establishment of specialty center in the Philippine Health Facility Development Plan (PHFDP) which shall serve as a guide for investments funded by the national government to rationalize the distribution of capacity and capability of health facilities. Provides at least one (1) specialty center in every region within five (5) years upon the effectivity of this Act based on the top burden of disease and special needs in the area."
