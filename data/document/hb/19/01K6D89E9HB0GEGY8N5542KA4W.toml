congress_website_title = "AN ACT DECLARING THE PROVINCE OF PAMPANGA AS THE \"CULINARY CAPITAL OF THE PHILIPPINES\""
congress_website_abstract = "Aims to recognize the Province of Pampanga of its contribution to the dynamic and rich culinary history of the country. Mandates the Department of Tourism to feature and promote the Province of Pampanga as the “Culinary Capital of the Philippines” in all its regional and national promotion programs."
