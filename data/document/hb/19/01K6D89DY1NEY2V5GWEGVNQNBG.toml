congress_website_title = "AN ACT REORGANIZING THE NATIONAL ECONOMIC DEVELOPMENT AUTHORITY, REPEALING FOR THE PURPOSE REPEALING EXECUTIVE ORDER NO. 230 SERIES OF 1987 AND AMENDING EXECUTIVE ORDER NO. 292 SERIES OF 1987 APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to reorganize and institutionalize NEDA as a Department to serve as lead integrator of the country´s economic development programs and policies. Proposes for an Economy and Planning Council responsible for directing and providing overall policy direction on economic issues, and shall act as primary advisory bodies and principal coordinating mechanism to ensure that policy environment is conducive to inclusive and sustainable economic growth. Enumerates the different Committees of the EP Council regarding the following: Development Budget Coordination, Investment Coordination, Social Development, Infrastructure, Tariff and Related Matter, and National Land Use."
