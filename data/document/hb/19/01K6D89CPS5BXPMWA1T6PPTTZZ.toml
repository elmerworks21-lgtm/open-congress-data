congress_website_title = "AN ACT PROVIDING FOR A UNIFIED SYSTEM FOR SEPARATION, RETIREMENT, AND PENSION OF THE MILITARY AND UNIFORMED PERSONNEL (MUP) SERVICES OF THE REPUBLIC OF THE PHILIPPINES, CREATING THE MILITARY AND UNIFORMED PERSONNEL RETIREMENT FUND, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to provide a unified system for the separation, retirement and pension system of the military and the uniformed personnel as follows: Armed Forces of the Philippines (AFP), the Philippine National Police (PNP), the Philippine Coast Guard (PCG), the Philippine National Police (PNP), the Philippine Coast Guard (PCG), the Bureau of Fire Protection (BFP), the Bureau of Jail Management and Penology (BJMP) and the Bureau of Corrections (BuCor). Intends to ensure a sustainable, permanent, viable and acceptable solution to the “ballooning effect” budget of the current pension system without diminishing the benefits that the retirees and current active members are entitled to under existing laws."
