congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7925, OTHERWISE KNOWN AS THE \"PUBLIC TELECOMMUNICATIONS POLICY ACT OF THE PHILIPPINES\", BY REQUIRING PUBLIC TELECOMMUNICATIONS ENTITIES AND INTERNET SERVICE PROVIDERS TO INSTITUTE A REFUND MECHANISM FOR SERVICE OUTAGES AND DISRUPTIONS"
congress_website_abstract = "Seeks to address the poor quality of internet and cellular connectivity services riddled with service outages, disruptions, and interruptions. Proposes to provide a refund credit or a bill adjustment, on a pro-rated basis, to a customer who has experienced a service outage or disruption for an aggregate period of twenty-four (24) hours or more within a month. Provides that customers subscribing to a service on a pre-paid basis shall be granted a refund credit or bill adjustment but need not take any action to receive said refund."
