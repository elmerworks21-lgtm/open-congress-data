congress_website_title = "AN ACT ESTABLISHING THE MAHARLIKA INVESTMENT FUND, PROVIDING FOR THE MANAGEMENT, INVESTMENT, AND USE OF THE PROCEEDS OF THE FUND, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to create a Maharlika Investment Fund (MIF) which shall be sourced from the investible funds of the country´s top performing Government Financial Institutions (GFIs), from contributions of the National Government, from the declared dividends of the BSP and other sources of funds to promote economic growth and social development. Establishes an independent corporate body known as the Maharlika Investment Corporation (MIC) that shall act as vehicle for the mobilization and utilization of the MIF for investments in transactions that will enable to reap optimal returns on investments (ROIs) and govern and manage the Fund in accordance with the objectives and purposes of this Act. Provides for the initial capitalization to be sourced as follows: 1.) Land Bank of the Philippines - Fifty billion pesos (P50 billion); and 2.) Development Bank of the Philippines (DBP) - Twenty-five billion pesos (P25 billion). Enumerates allowable and prohibited investments by the Maharlika Investment Corporation. Mandates the creation of a Risk Management Unit (RMU) within the MIC to ensure that measures are taken to achieve a prudent balance between risk and reward in business activities, and that a risk-informed approach is observed with respect to the capitalization of the MIC."
