congress_website_title = "AN ACT PROHIBITING DISCRIMINATION ON THE BASIS OF ETHNICITY, RACE, RELIGION OR BELIEF, SEX OR GENDER OR SEXUAL ORIENTATION, LANGUAGE, DISABILITY, EDUCATIONAL ATTAINMENT, AND OTHER FORMS OF DISCRIMINATION, PROVIDING PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to prevent and criminalize various forms of discrimination that may be categorized as a crime against humanity and human dignity, based on several international declarations that promote the equal treatment of all people. Provides for corresponding penalties to such discriminatory acts as inflicting stigma, denial of education, political, civil, and cultural rights, right to work, access to goods and services, and the right to organize, inflicting harm on health and well-being, engaging in profiling, abuses by state and non-state agencies, and detention and confinement. Defines several terms: discrimination, profiling, stigma, vulnerable communities, and indigenous peoples, among others."
