congress_website_title = "AN ACT PROVIDING FOR THE MAGNA CARTA OF BARANGAY HEALTH WORKERS"
congress_website_abstract = "Aims to promote the welfare and well-being of barangay health workers and adopt an integrated and comprehensive approach to health development. Mandates the appointment of one (1) Barangay Health Worker (BWH) for every twenty (20) households who shall be under the supervision and control of the DOH. Provides incentives and benefits for all BWHs such as a.) Monthly honoraria in the amount of not less than three thousand pesos (P3,000.00) b.) Twenty percent (20%) discount on all items enumerated under Section 4(a) of Republic Act No. 9994 otherwise known as the “Expanded Senior Citizens Act of 2010” c.) Hazard allowance d.) Subsistence allowance e.) Transportation Allowance f.) One-time Retirement Cash Incentive g.) Training, Education and Career Enrichment Programs h.) Health Benefits i.) Insurance Coverage j.) Sick, Vacation and Maternity Leaves k.) Cash Gifts l.) Disability Benefit m.) Civil Service Eligibility n.) Free Legal Services; and o.) Preferential Access to Loan Facilities. HB06558 - CR 220 Aims to address the following systemic problems in real property valuation and assessment: rampant outdated valuations; cost overruns and foregone revenues due to low valuations used; multiple, overlapping valuations - no single agency responsible for ensuring that valuations are completed in accordance with international standards; and absence of a comprehensive real property electronic database. Seeks to adopt a market-based Schedule of Market Values (SMV) to be used as a basis for local and national real property taxation which will widen the tax base used for property and property-related taxes. Mandates the Bureau of Local Government Finance (BLGF) of the Department of Finance to lead and manage the implementation of the provisions of this Act."
