congress_website_title = "AN ACT INSTITUTIONALIZING AGRICULTURAL EXTENSION WORKERS IN ALL BARANGAYS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes that there shall be at least one (1) barangay agricultural extension worker (BAEW) with areas devoted to farming, raising of animals, and fishing with SG equivalent to Agricultural Technician 1 or Aquacultural Technician 1. Proposes that the BAEW in barangays without any farming or fishing activities to assist and encourage urban gardening to support community-based and household-based food production using rooftops, small spaces, and other vacant spaces. Proposes for BAEW´s accreditation and qualifications; duties and responsibilities; incentives and benefits including training, education, and career enrichment programs such as special training programs on agriculture entrepreneurship (marketing and value chain approach, disaster response and preparedness, etc.); and crash courses related to communal irrigation system; climate-smart agriculture; water management, climate-resilient crop varieties; livestock; climate-resilient fisheries; integrated multi-trophic aquaculture systems; pasturing in livestock and aquaculture feeding; and early warning system."
