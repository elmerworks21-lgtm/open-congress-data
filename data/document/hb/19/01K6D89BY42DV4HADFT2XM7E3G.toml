congress_website_title = "AN ACT ESTABLISHING EVACUATION CENTERS IN EVERY CITY AND MUNICIPALITY, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to establish a standard-based evacuation centers to decongest public schools and private facilities evacuation centers which shall be a permanent recourse in times of calamities and natural or man-made disasters such as typhoons, floods, storm surges, drought and other severe climate disturbances, as well as fire and the outbreak of illnesses and diseases. Provides for the following provisions: minimum requirements for every evacuation center such as location designation, structural and building capacity, amenities and accessibility; the role of the National Disaster Risk Reduction and Management Council (NDRRMC); and for the coordination with the DPWH and the DOST with regard to the design specifications, cost estimates, and construction details."
