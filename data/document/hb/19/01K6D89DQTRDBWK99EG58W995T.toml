congress_website_title = "AN ACT ESTABLISHING A TOTAL BAN ON THE IMPORTATION OF WASTES, PROVIDING MEANS FOR ITS ENFORCEMENT, APPROPRIATIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to address contentious instances of shipments of illicit garbage into the nation, establishes a total ban on the importation of wastes, processed waste and its by-products. Aims to uphold every Filipino's right to a healthy environment and prevent the worsening of our local trash problem and environmental pollution. Seeks to boldly convey to the foreign community that the Philippines is not a place where they can dump their garbage. Tasks the DOTr, in coordination with DFA, the BOC, and the Maritime Industry Authority (MARINA), to take control of the seized vessel and its return to the port of origin of the contraband waste cargo; Proposes to establish an Environmental Protection Desk at every port of entry; and Provides for relevant penal provisions of environmental and customs law: a) Ecological Solid Waste Management, b) Phil. Clean Air Act, c) Phil. Clean Water Act, d) Toxic Substances and Hazardous and Nuclear Wastes Control Act, and e) Customs Modernization and Tariff Act."
