congress_website_title = "AN ACT REQUIRING GOVERNMENT AGENCIES TO INDICATE THE BLOOD TYPE OF INDIVIDUALS ON THEIR IDENTIFICATION CARDS, CERTIFICATED AND LICENSES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes that an individual's blood type must be duly certified by a pathologist to guarantee its accuracy. Seeks to identify government-issued documents that shall bear the blood type of an individual as follows: ID issued by the SSS/GSIS; passport issued by the DFA; professional ID card issued by the PRC; birth certificate issued by the Local Registrar's Office or the PSA; driver's license issued by the LTO; firearms license issued by the PNP; and such other issuance of certificates, license or ID document after the effectivity of this Act"
