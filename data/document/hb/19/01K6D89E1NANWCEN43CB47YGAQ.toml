congress_website_title = "AN ACT ESTABLISHING THE NATIONAL EMERGENCY COMMUNICATION SYSTEM"
congress_website_abstract = "Seeks to facilitate coordination within the government for information sharing and dissemination - to hasten the conduct of preparation, response, and recovery efforts and delivery of public services to the affected population. Proposes to establish a communication system comprised of a national and regional network that would support voice, video, and data communication systems between and among NGAs and LGUs. Mandates every LGU to set up command and operation centers and ensures the 24/7 operation of command, control, and communication centers."
