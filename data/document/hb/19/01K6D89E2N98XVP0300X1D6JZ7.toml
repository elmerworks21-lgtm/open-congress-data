congress_website_title = "AN ACT AMENDING ARTICLES 333 AND 344, AND REPEALING ARTICLE 334, OF THE REVISED PENAL CODE, ELIMINATING GENDER BIAS IN ADULTERY AND CONCUBINAGE"
congress_website_abstract = "Proposes that Art. 333 of the Code be read as follows:Â “MARITAL INFIDELITY is committed by any married PERSON who shall have sexual RELATIONS with a PERSON OTHER THAN HIS or her SPOUSE, and by the SEXUAL PARTNER of the MARRIED PERSON knowing the LATTER to be married, even if the marriage be subsequently declared void.” “MARITAL INFIDELITY shall be punished by prision correccional in its medium and maximum periods.” . . . Provides for several instances when any person accused shall be exempt from criminal liability or the penalty next lower in degree than that generally provided shall be imposed, with the same penalty on the co-accused in the marital infidelity case. Proposes that Art. 344 replace the words adultery and concubinage with the word MARITAL INFIDELITY."
