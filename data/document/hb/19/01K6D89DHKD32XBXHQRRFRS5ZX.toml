congress_website_title = "AN ACT TO RATIONALIZE THE PHILIPPINE ENVIRONMENTAL IMPACT ASSESSMENT SYSTEM, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to rationalize the 1978 PD 1586 (Phil. Environmental Impact Statement (EIS) System, to resolve disagreements among project proponents, agencies, NGOs, and other stakeholders resulting from differences in the interpretation of the law. Proposes to require an Environmental Impact Assessment for specific projects - critical projects (CPs) or projects which have the potential to cause a significant adverse impact on the environment (heavy industries, major manufacturing industries, major resource extractive industries, major infrastructure projects, and others. Proposes that micro-, small- and medium-scale projects - be governed by local governments to integrate environmental safeguards in local permitting systems and/or complementary environmental assessment policies. Provides for programmatic EIA for a cluster of projects co-located in an area such as industrial estates, export processing zones, small-scale mining, livestock, aquaculture, and mariculture projects, . . ."
