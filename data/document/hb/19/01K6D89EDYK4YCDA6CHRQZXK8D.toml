congress_website_title = "AN ACT PROVIDING FOR RURAL EMPLOYMENT ASSISTANCE PROGRAM AND APPROPRIATING FUNDS THEREOF"
congress_website_abstract = "Grants employment assistance to a qualified head of family or an unmarried, single adult member of qualified poor households in rural areas identified by the National Household Targeting System for Poverty Reduction of the DSWS. Proposes for unskilled labor of 45 to 90 days of work, equal to the minimum wage set by the Regional Tripartite Wages and Productivity Board (RTWPB). Defines the terms poor, rural area, and unskilled labor.Â Enumerates employment activities or projects that require unskilled labor."
