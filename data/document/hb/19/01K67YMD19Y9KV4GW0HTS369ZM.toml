congress_website_title = "AN ACT ESTABLISHING A GREEN PUBLIC PROCUREMENT PROGRAM FOR ALL BRANCHES OF GOVERNMENT"
congress_website_abstract = "Defines green public procurement program as “a process whereby public authorities seeks to procure goods and services with reduced environmental impact throughout their life cycle when compared to goods and services with the same primary function that would otherwise be procured”. Aims to establish a Green Public Procurement (GPP) Program in all branches of government which shall implement a production in government procurement in accordance with the GPP Roadmap established by the Government Procurement Policy Board (GPPB) for the purpose, consistent with the governing principles of RA No. 9184, or the Government Procurement Reform Act."
