congress_website_title = "AN ACT RENAMING THE LITERACY COORDINATING COUNCIL TO NATIONAL LITERACY COUNCIL, STRENGTHENING ITS POWERS AND FUNCTIONS, EXPANDING ITS MEMBERSHIP STRUCTURE AND SUPPORT MECHANISMS, AND APPROPRIATING FUNDS THEREFOR, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 7165, AS AMENDED"
congress_website_abstract = "Aims to rename the Literacy Coordinating Council to National Literacy Council to strengthen the powers and functions, as well as expand the membership, structure and support mechanisms of the “Council.” Mandates the Council to closely coordinate with the Department of Education´s Bureau of Alternate Education (BAE) on programs and projects that are geared towards the universalization of literacy. Establishes the Local Literacy Council (LLCs) as support structures at the city, municipal, and barangay levels, which shall serve as the coordinating and advisory body at the local level on matters pertaining to the adoption and implementation of community-based measures for the propagation of literacy."
