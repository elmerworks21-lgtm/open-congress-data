congress_website_title = "AN ACT PROVIDING FOR STRONGER MEASURES TO PRESERVE AGRICULTURAL LAND AND REGULATE ITS CONVERSION TO NON-AGRICULTURAL PURPOSES"
congress_website_abstract = "Aims to minimize the unnecessary and irreversible conversion of agricultural land to non-agricultural uses, and ensure that national government policies and programs administered and implemented for the protection of agricultural land are compatible with the development plans of the local government units (LGUs). Mandates the DAR and the DA to conduct a regular review of existing laws and policies, administrative rules and regulation to determine whether the existing provision are in accordance with the provisions of this Act, and develop proposals and take appropriate action to bring government policies, programs and administrative activities into conformity to the purpose of this Act. Does not authorize the government to regulate the use of private agricultural land and affect the property rights of owners of such land. None of the provisions or other requirements of this Act shall apply to the acquisition or use of agricultural land for national defense purposes."
