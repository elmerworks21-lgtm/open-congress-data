congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF REDISTRIBUTING AND RECYCLING FOOD WASTE TO PROMOTE FOOD SECURITY"
congress_website_abstract = "Seeks to reduce food waste by promoting a National Zero Food Waste Campaign that shall entail various efforts to spread its awareness and information.Â Provides waste reduction strategies for food-related businesses, households, and local government units to assist in financing and redistributing edible food waste to food banks and recycling inedible food waste through waste management facilities. Defines several terms like “edible food waste” which refers to food discarded in the retail and consumption stages, determined to be fit for consumption based on standards set by the National Nutrition Council. Proposes to exempt from donor´s tax - food-related businesses that donate edible food to food banks, and shall be considered as an allowable deduction from their gross income. Â"
