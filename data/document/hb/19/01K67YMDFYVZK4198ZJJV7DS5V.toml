congress_website_title = "AN ACT FURTHER STRENGTHENING UNION ORGANIZATION AND DISALLOWING CANCELLATION OF UNION REGISTRATION, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Allows a federation, national union or industry or trade union center or an independent union to acquire legal personality and shall be entitled to the rights and privileges granted by law to legitimate organization upon NOTIFICATION OF ITS FORMATION. Reduces the number of minimum membership requirement for registration of independent unions from twenty percent (20%) to ten percent (10%). Entitles the local chapter the rights and privileges of a legitimate labor organization upon submission of its charter certificate to the Department of Labor and Employment. Mandates the Labor Relations Division in the Regional Office or the Bureau to act on all notices of union formation Underscores that union constitution and by-laws should govern the election of union officers."
