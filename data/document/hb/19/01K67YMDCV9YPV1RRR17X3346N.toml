congress_website_title = "AN ACT PROMOTING INCLUSIVE EDUCATION, ENTREPRENEURSHIP AND EMPLOYMENT FOR SUSTAINABLE DEVELOPMENT AMONG 4Ps ADULT BENEFICIARIES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 11310, OTHERWISE KNOWN AS THE “PANTAWID PAMILYANG PILIPINO PROGRAM (4Ps)”"
congress_website_abstract = "Seeks to provide Community Mobilization Grant of not lower than Five Hundred Pesos (P500.00) that shall be used to finance meals and transportation related to the availment of adult education per adult beneficiary of the adult education program. Encourages at least one (1) adult beneficiary to join and complete any of the following tracks of adult education: 1.) non-formal education through the ALS track of the Department of Education 2.) entrepreneurship track of the Department of Trade and Industry and Department of Social Welfare and Development; and 3.) employment track of the Technical Education and Skills Development Authority of their accredited private sector and civil society organizations. Gives priority to adult education beneficiaries in the availment of the modalities and intervention of the government programs after the completion of their selected track of adult education."
