congress_website_title = "AN ACT AMENDING SECTIONS 15 AND 16 OF ARTICLE V OF RA NO. 10611, OTHERWISE KNOWN AS THE \"FOOD SAFETY ACT OF 2013\""
congress_website_abstract = "Aims to address the issue regarding confusion among stakeholders in the meat processing industry - that they have to simultaneously deal with two regulatory agencies such as the National Meat Inspection Service (NMIS) under DA and the Food and Drug Administration under DOH in the manufacture of meat products. Proposes for the following amendments: “The DA shall be responsible . . . IN THE PROCESSING AND DISTRIBUTION OF MEAT PRODUCTS WHETHER LOCALLY PRODUCED OR IMPORTED; The DOH shall be responsible for the safety of processed and prepackaged foods, EXCEPT PROCESSED MEAT PRODUCTS; . . . The NMIS shall be responsible for meats AND PROCESSED MEAT PRODUCTS;”"
