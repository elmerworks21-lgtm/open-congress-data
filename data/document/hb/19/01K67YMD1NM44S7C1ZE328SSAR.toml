congress_website_title = "AN ACT CREATING THE PHILIPPINE CENTERS FOR DISEASE PREVENTION AND CONTROL, DEFINING THEIR POWERS AND FUNCTIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to modernize and reorganize our health system and adopt institutional reforms to protect the public from health risks. Creates the Philippine Centers for Disease Prevention and Control (CDC) which shall be the technical authority on forecasting, analysis, strategy, and standards development for the prevention and control of all diseases of public health importance and health security events, whether domestic or international in origin. Proposes among several others, the restructuring of the following offices of DOH units and transfer of functions to the CDC: the different units of the Research Institute for Tropical Medicine, The Health Laboratory Division, The Epidemiology Bureau, the Disease Prevention and Control Bureau, the Communications Office of the DOH which shall be a shared service among all DOH offices, including the FDA and CDC. States that the offices affected by the transfer of agencies shall also transfer human resource, applicable funds and appropriations, records, equipment, and property to the CDC subject to a multi-year transition plan. Removes the Health Technology Assessment (HTA) as a prerequisite to procurement of commodities for public health emergencies. Allows the President to direct the operations of any privately-owned establishment to perform functions and provide support services for public health emergency response."
