congress_website_title = "AN ACT INSTITUTIONALIZING AND ENHANCING THE SKILLS CERTIFICATE EQUIVALENCY PROGRAM OF THE CIVIL SERVICE COMMISSION AND THE TECHNICAL EDUCATION AND SKILLS DEVELOPMENT AUTHORITY"
congress_website_abstract = "Aims to institutionalize and enhance the Skills Certificate Equivalency Program (SCEP). Seeks to grant skills eligibility to holders of Technical Education and Skills Development Authority (TESDA) National Certificates (NCs), allowing them to enter the civil service. Emphasizes equal opportunities for technical-vocational graduates, the upliftment of middle-skilled workers, and the improvement of the image of technical and vocational education. Outlines the program´s implementation, coverage, and the roles of the Civil Service Commission (CSC) and TESDA in identifying relevant positions and converting NCs into appropriate skills eligibility."
