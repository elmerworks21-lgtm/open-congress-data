congress_website_title = "AN ACT ESTABLISHING THE AGRICULTURE INFORMATION SYSTEM IN ALL CITIES AND MUNICIPALITIES"
congress_website_abstract = "Aims to improve the country´s agricultural planning process through the establishment of a computer database that shall contain an up-to-date inventory of all agricultural commodities available in the various local communities, and where information on the demand is gathered simultaneously with the production data from farmers in every barangay as the platform for marketing nationwide. Mandates LGUs to gather and consolidate all pertinent data on the profile and demographics of farmers and buyers, and to store these in their respective AIS, and to facilitate the free registration of all farmers, fisherfolks, as well as buyers transacting within their respective area in the information system."
