congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE ATOMIC ENERGY REGULATORY AUTHORITY AND PROVIDING FOR A COMPREHENSIVE LEGAL FRAMEWORK FOR RADIATION PROTECTION, NUCLEAR SECURITY, SAFETY, AND SAFEGUARDS, AND PHYSICAL SAFETY IN THE PEACEFUL UTILIZATION OF NUCLEAR ENERGY IN THE PHILIPPINES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to harness the peaceful, safe, and secure use of atomic energy that will provide benefits to the Philippines in the fields of energy production, health and medicine, scientific research, agriculture, industry, education, and others; and prohibit the use of nuclear energy for non-peaceful uses. Establishes the Philippine Atomic Energy Regulatory Authority otherwise known as the Phil ATOM and provide for a comprehensive technical and legal safety framework for the utilization and application of Nuclear Energy in the Philippines."
