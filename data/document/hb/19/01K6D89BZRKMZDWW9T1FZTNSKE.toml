congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8974, ENTITLED \"AN ACT IMPOSING A MOTOR VEHICLE USER´S CHARGE ON OWNERS OF ALL TYPES OF MOTOR VEHICLES AND FOR OTHER PURPOSES,\" AS AMENDED BY REPUBLIC ACT NO. 11239"
congress_website_abstract = "Seeks to make the Motor Vehicle User´s Charge (MVUC) simpler and up-to-date by introducing the Motor Vehicle Road User´s Tax (MVRUT) in lieu of the MVUC. Aims to finance road infrastructure projects, modernization of public utility vehicles, and government programs for the prevention of road accidents. Imposes motor vehicle user´s tax for all private or for hire motor vehicles including government-owned vehicles and excludes motorcycles with or without sidecars from the MVRUT. Provides a multi-tiered structure and phased increase for three years and applying a single rate for all types of motor vehicles, whether private, government or for hire, in the fourth year."
