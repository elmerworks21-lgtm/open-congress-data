congress_website_title = "AN ACT CREATING THE COMMUNITY HEALTH WORKER EDUCATION AND TRAINING PROGRAM, INCREASING COMPENSATION AND OTHER BENEFITS FOR BARANGAY HEALTH WORKERS (BHW), APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to apply the provisions of this Act to all BHWs under Republic Act. No.7883; Defines “barangay health worker” as person who has undergone a training program under any accredited government or non-government organization. Includes provisions regarding accreditation and competency assessment; program cost and cost sharing for LGUS; Compensations based on PhilHealth utilization, mandatory continuing community-based health education; compensation and other incentives (monthly basic pay of P6,000.00; benefits under the Magna Carta for Public Health Workers; PAG-IBIG/GSIS/PhilHealth; burial and disability assistance)."
