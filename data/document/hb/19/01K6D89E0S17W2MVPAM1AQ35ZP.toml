congress_website_title = "AN ACT TO AMEND GENERAL BANKING LAW OF 2000 TO PROVIDE THE STANDARD OF DILIGENCE OF BANKS"
congress_website_abstract = "States that the standard of diligence for banks shall be intermediate diligence, which means the degree of diligence that is “more than the diligence of a good father of a family but less than extraordinary diligence. Proposes to amend Sec.6 of Republic Act No.8791 to describe the standard of diligence required of banks; Tasks the Bangko Sentral ng Pilipinas in providing additional guidelines pertaining to intermediate diligence."
