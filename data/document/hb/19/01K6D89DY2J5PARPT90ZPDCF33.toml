congress_website_title = "AN ACT CREATING THE DEPARTMENT OF ECONOMICS AND DEVELOPMENT PLANNING, DEFINING ITS FUNCTIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to institutionalize NEDA into a Department of Economics Development Authority (DEDP) and include Mindanao Development Authority (MinDA) as a member of the Council or NEDA Board. Seeks to push for the inclusion and funding of Mindanao priorities in the national planning and budgeting that shall improve the island-region´s productivity and enable it to contribute further to the country´s growth and development. Proposes several offices of the DEDP as follows: Macroeconomics; Trade, services, and industry; Agriculture, natural resources, and environment; Governance; Social development; Strategic foresight and futures; Innovation; Public investment; Social infrastructure; Connectivity infrastructure; etc."
