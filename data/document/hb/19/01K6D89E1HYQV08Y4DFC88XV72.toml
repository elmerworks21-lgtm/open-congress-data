congress_website_title = "AN ACT RATIONALIZING THE ANCESTRAL LANDS ADMINISTRATION AND ADJUDICATION PROCESS AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8371, OTHERWISE KNOWN AS \"THE INDIGENOUS PEOPLES' RIGHTS ACT OF 1997\""
congress_website_abstract = "Seeks to address fraudulent claims to ancestral domains and ancestral lands which undermine the IPs´ rights, leading to disputes and injustices, and the involuntary subjection of non-ICCs to customs not their own through the all-encompassing jurisdiction of the NCIP. Proposes to rationalize and re-organize the different functions of various government agencies in the issuance of the certificate of ancestral domain titles and certificate of ancestral land titles. Seeks to transfer the Ancestral Domains Office under the NCIP to the DENR and rename it as Ancestral Land Registration and Administration Office (ALRAO), 2`and create the Ancestral Lands Administration and Adjudication Board (ALAAB) to settle disputes concerning ancestral lands and domains administration and adjudication."
