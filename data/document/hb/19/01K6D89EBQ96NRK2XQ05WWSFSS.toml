congress_website_title = "AN ACT INSTITUTIONALIZING THE GRANT OF DIGITAL NOMAD VISAS, PROVIDING BENEFITS AND INCENTIVES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to institutionalize the grant of “Digital Nomad Visas” to encourage the entry of highly skilled foreign remote workers who generate income from outside the Philippines, enhancing the country´s economy, cultural exchange, and international cooperation; creates employment opportunities and fosters a dynamic digital innovation/ecosystem. Defines “Digital Nomad” as a foreign national who performs work remotely or engages in freelancing, consultancy, or business through digital platforms, without being locally employed by a Philippine entity. Provides that the “Digital Nomad” should not be engaged in any form of local employment or business activities that would compete with Phil. residents, among other eligibility requirements for visa application. Proposes for the duration and renewal of stay; application requirements; exemption from local income tax; rights and privileges; and visa revocation of specified foreign nationals."
