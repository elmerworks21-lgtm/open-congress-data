congress_website_title = "AN ACT REDEFINING THE CRIME OF ILLEGAL RECRUITMENT COMMITTED BY A SYNDICATE, AMENDING FOR THE PURPOSE ARTICLE 38 OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE \"LABOR CODE OF THE PHILIPPINES,\" AS AMENDED AND SECTION 6 OF REPUBLIC ACT NO. 8042, OTHERWISE KNOWN AS THE \"MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF 1995,\" AS AMENDED"
congress_website_abstract = "Aims to protect Overseas Filipino Workers (OFWs) from injustice committed against them by an illegal recruiter who forced them to carry out any illegal transaction, enterprise, or scheme. Seeks to amend the definition of syndicate by lowering the number of perpetrators from three to TWO PERSONS to qualify the act as illegal recruitment by a syndicate."
