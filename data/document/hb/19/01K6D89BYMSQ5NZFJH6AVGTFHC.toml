congress_website_title = "AN ACT PROVIDING FOR PARENT SUPPORT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to further strengthen filial responsibility and make it a criminal offense in case of flagrant violation thereof, as in abandonment of a parent in need of support. Such parent may file a petition for support before the court and pray for the issuance of a support order against their erring children. Proposes to establish Old Age Home for the elderly, sick or otherwise incapacitated parents in every province and highly urbanized cities."
