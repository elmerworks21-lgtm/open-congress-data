congress_website_title = "AN ACT INSTITUTIONALIZING THE CONDUCT OF IMPACT EVALUATIONS AS A COMPONENT OF GOVERNMENT PROJECTS, ACTIVITIES, SERVICES, AND POLICIES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to create and promote an active evaluation culture in government offices - guided by the National Evaluation Framework (NEPF). Proposes to create the National Policy Evaluation Council (NPEC) alongside the Program Evaluation Units (PEU) - to ensure and facilitate the proper application and execution of the NEPF; to conduct proper monitoring and safekeeping of evaluations and other research data; and to pursue the development of the institutional capacity for NPEF´s implementation. Aims to ensure the utilization, dissemination, and feedback of evaluation findings to enhance the design, planning, programming, budgeting, and implementation of public policies, strategies, programs, projects, and other interventions."
