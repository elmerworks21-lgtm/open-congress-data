congress_website_title = "AN ACT STRENGTHENING THE PROMOTION AND DELIVERY OF MENTAL HEALTH SERVICES IN BASIC EDUCATION THROUGH THE HIRING AND DEPLOYMENT OF MENTAL HEALTH PROFESSIONALS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to establish a Mental Health and Well-being Office in every schools division level, headed by a qualified Mental Health Professional, which is tasked to address the mental, emotional, and developmental needs of learners. Provides for the creation of a sufficient number of Guidance Counselors and Guidance Services Specialist positions within the schools division offices and in schools in order to attend to the needs of learners and personnel. Mandates the DepEd subject to the guidelines set by the CSC and the DBM for the hiring and deployment of Mental Health Professionals such that each public elementary, secondary, vocational institution, and offices in the different governance levels shall have mental health professionals or mental health service providers within five (5) years from the effectivity of this Act."
