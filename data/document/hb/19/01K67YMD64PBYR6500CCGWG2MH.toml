congress_website_title = "AN ACT EXPANDING THE SERVICES OF THE PHILIPPINE CROP INSURANCE CORPORATION AND ENCOURAGING PRIVATE SECTOR PARTICIPATION IN AGRICULTURAL INSURANCE, FURTHER AMENDING SECTION 1 AND SECTION 3.11 OF PRESIDENTIAL DECREE NO. 1467, CREATING THE PHILIPPINE CROP INSURANCE CORPORATION, AS AMENDED"
congress_website_abstract = "Aims to ensure protection of more Filipino farmers from financial losses arising from natural calamities, plant diseases, and pest infestation, and direct the resources of private sector entities consisting of cooperatives and farmer´s organizations, to invest in agricultural insurance. Proposes the expansion of the insurance services of the PCIC to all agricultural commodities, from the traditional palay crops to now include livestock, fisheries and aquaculture, agroforestry projects and forest plantations, and non-crop agriculture assets such as machinery, equipment, transport facilities, and other related infrastructures."
