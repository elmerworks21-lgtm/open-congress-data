congress_website_title = "AN ACT PROMOTING THE DEVELOPMENT OF THE PHILIPPINE DOWNSTREAM NATURAL GAS INDUSTRY, CONSOLIDATING FOR THE PURPOSE ALL LAWS RELATING TO THE TRANSMISSION, DISTRIBUTION AND SUPPLY OF NATURAL GAS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to provide a framework for the development of the Philippine Downstream Natural Gas Industry (PDNGI) that would serve as a pillar towards achieving the rapid development of the country´s natural gas sector. Defines the responsibilities of various government agencies and private entities to achieve this national goal. Provides for the following key provisions: 1.) the structure, operation and regulation of the Downstream Natural Gas Industry; 2.) transmission and distribution system and related facility; 3.) third-party access 4.) standards on product quality, facility, and safety practice 5.) responsibilities of the permit holder or operator 6.) incentives to PDNGI projects, as certified by the DOE 7.) promotion of competition; and 8.) fines and penalties to be imposed for the violation of the provisions of this Act. Mandates the Department of Energy to be the lead agency responsible for the supervision and monitoring of the Industry and the regulation of the construction and operation of natural gas pipelines and related facilities for the transmission, distribution, and supply of natural gas. Stipulates that the Energy Regulatory Commission shall have the sole regulatory responsibility for establishing the rates and related terms and conditions of service for the transmission and distribution, regasification and supply of natural gas."
