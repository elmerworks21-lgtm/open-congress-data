congress_website_title = "AN ACT PROVIDING FOR THE SAFE REOPENING OF SCHOOLS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Defines “safe reopening and safe operations of schools” as schools and learning establishments that are logistically prepared 1) to prevent the spread of COVID-19 among teachers, non-teaching personnel, and students and 2) to continue providing education at the same time, with the maximum protection for all individuals . . . Proposes specific programs to ensure the safe reopening of schools such as proper ventilation of learning spaces; on-campus health facilities and supplies; hiring of human resources for health; testing program for learners; medical fund for free treatment; hazard pay for teachers and education personnel. Provides for safe operations to include contact tracing of those who tested positive for COVID-19, its transmission, and prevention."
