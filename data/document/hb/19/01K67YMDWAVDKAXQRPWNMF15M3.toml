[meta]
bill_number = 11199
congress = 19
title = "ECONOMY, PLANNING AND DEVELOPMENT ACT"
date_filed = "2024-12-11"
long_title = "AN ACT REORGANIZING THE NATIONAL ECONOMIC AND DEVELOPMENT AUTHORITY (NEDA) INTO THE DEPARTMENT OF ECONOMY, PLANNING, AND DEVELOPMENT (DEPDEV), AND RECONSTITUTING THE NEDA BOARD INTO THE ECONOMY DEVELOPMENT COUNCIL, REPEALING FOR THE PURPOSE EXECUTIVE ORDER NO. 230, SERIES OF 1987, AND AMENDING EXECUTIVE ORDER NO. 292, SERIES OF 1987, AND APPROPRIATING FUNDS THEREFOR"
scope = "National"
subjects = [ "Economy, Planning and Development", "National Economic Development Authority (NEDA)",]
congress_website_author_codes = ["K095","C102","F057","J058","I051","K094","K043","K116","J015","J097","J033","J011","K002","J079","K018","I093","J066","K072","K001","J017","J073","K005","K137","K080","G050","K062","K114","J091","F068","F123","F076","K037","K123","K034","I030","I010","E031","F062"]
congress_website_coauthors_raw = ["DALIPE, MANUEL JOSE M.","LOYOLA, ROY M.","ROQUE, LAARNI","ARBISON, MUNIR","BARONDA, JULIENNE \"Jam\"","VARGAS, PM","ESCUDERO, DETTE","ROMUALDO, JURDIN JESUS M."]
congress_website_committee_codes = ["0516","0532","0536","0504"]
congress_website_primary_keys = [106470]
congress_website_title = "AN ACT REORGANIZING THE NATIONAL ECONOMIC AND DEVELOPMENT AUTHORITY, REPEALING FOR THE PURPOSE EXECUTIVE ORDER NO. 230, SERIES OF 1987, AND AMENDING EXECUTIVE ORDER NO. 292, SERIES OF 1987, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to reorganize and institutionalize the National Economic and Development Authority (NEDA) into the Department of Economy, Planning, and Development (DEPDEV) which shall serve as the lead integrator of the country´s economic program and policies. Establishes, operates and maintains a regional office in each region of the country, except the Bangsamoro Autonomous Region in Muslim Mindanao. Attaches different agencies to the DEPDEV for purposes of administrative supervision, policy coordination and policy and program coordination, and the Public-Private Partnership Center of the Philippines (PPPC) for budgetary purposes and administrative supervision. Establishes the Economy and Development Council (ED) headed by the President of the Philippines which shall serve as the executive collegial body responsible for directing and providing overall policy direction on economic matters. Establishes different Committees of the ED Council which shall be the main coordinating mechanism that ensures that the policy environment is conducive to promoting inclusive and sustainable growth. Provides separation and retirement benefits for employees who are separated from the service as a result of the consolidation and reorganization of the NEDA."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=19&q=HBN-11199"

