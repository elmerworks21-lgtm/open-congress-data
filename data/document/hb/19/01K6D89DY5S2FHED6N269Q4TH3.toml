congress_website_title = "AN ACT INSTITUTIONALIZING THE COMMUNITY-DRIVEN DEVELOPMENT (CDD) APPROACH AS A NATIONAL STRATEGY FOR INCLUSIVE GROWTH AND SOCIAL PROTECTION, ESTABLISHING FOR THE PURPOSE THE CDD KNOWLEDGE AND RESOURCE INSTITUTE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Defines several terms among others - Basic sectors refer to the disadvantaged sectors of Philippine society, including farmer-peasants, fisherfolk, workers in the formal sector including migrant workers, workers in the informal sector, indigenous peoples and cultural communities, women, persons with disability, senior citizens, victims of calamities and disasters, youth and students, children, urban poor, and members Of cooperatives. Refers Community Driven Development (CDD) as an approach that gives control over the development processes, decision-making, and resources to community members or groups and treats people as assets and partners in the development process while building on their institutions and resources. Seeks to enact programs that provide opportunities for the poor, vulnerable, and marginalized to participate in the designing, planning, budgeting, implementing, monitoring, and evaluating community programs, activities, and projects. Provides capacity-building opportunities for LGUs, civil society organizations (CSOs), and communities to ensure the proper use of the CDD approach in implementing local programs, projects, and activities."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_19/HB09376.pdf"]
