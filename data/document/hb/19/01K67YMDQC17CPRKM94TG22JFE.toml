congress_website_title = "AN ACT ADJUSTING THE MONTHLY PENSION BENEFITS OF RETIREES OF THE DEPARTMENT OF FOREIGN AFFAIRS"
congress_website_abstract = "Seeks to increase the monthly pension of retirees of the Department of Foreign Affairs (DFA) to be at par with the current pay scale enjoyed by those in active service. Applies to retired DFA officers and employees who receive a monthly pension from the GSIS and those who opted to retire under RA 1616 and have fully met the following qualifications: 1.) reached 65 years of age; 2.) served in the DFA for at least 15 years; and 3.) are Filipino citizens. Adjusts the monthly pension benefits of all retirees of the DFA to the existing rate, and any subsequent increase thereof, of the salary grade of the rank they held upon retirement. Provides conditions on the survivorship benefits in case a DFA retiree or personnel dies."
