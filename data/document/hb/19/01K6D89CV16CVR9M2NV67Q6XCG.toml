congress_website_title = "AN ACT REPEALING ARTICLE 247 OF THE REVISED PENAL CODE"
congress_website_abstract = "Intends to help prevent a parent from killing or inflicting any serious physical injury to his daughter under 18 years old and her seducer, who were caught in the act of sexual intercourse or immediately after. Intends also to avoid the legal spouse from murdering his spouse or lover, or both of them, who were caught in the act of sexual intercourse or immediately after. Proposes to repeal this discriminatory and unjust law which penalizes the offenders with a mere destierro, and aims to encourage parents and spouses to resolve intra-family problems in a non-violent manner."
