congress_website_title = "AN ACT UPGRADING AND CREATING ADDITIONAL POSITIONS IN THE OFFICE OF THE GOVERNMENT CORPORATE COUNSEL, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NO. 878, S. 1983, ENTITLED “REORGANIZING THE OFFICE OF THE GOVERNMENT CORPORATE COUNSEL”, AS AMENDED BY EXECUTIVE ORDER NO. 299, S. 1987, ENTITLED “MODIFYING EXECUTIVE ORDER NO. 878 DATED MARCH 4, 1983”"
congress_website_abstract = "Aims to strengthen the OGCC´s current complement to maintain the effectiveness in addressing the legal needs of its clients, particularly corporations which do not have internal legal departments. Creates new positions in its hierarchy and augment the OGCC´s present complement with an additional thirty-six (36) lawyer positions. Upgrades the rank, salary grades, privileges, and benefits of the OGCC lawyers is designed to keep them at par with the ranks, salary grades, privileges, and benefits of counterpart positions in the Department of Justice and its attached agencies, particularly those in the NPS, the PAO, and the OSG."
