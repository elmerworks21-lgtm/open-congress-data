congress_website_title = "AN ACT REGULATING THE USE OF ARTIFICIAL INTELLIGENCE AND AUTOMATION SYSTEMS IN THE LABOR INDUSTRY AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to develop transparent AI systems and governance policies, to ensure the passage of regulatory laws, and to invest in education and reskilling programs to help workers adapt to the changing landscape in the labor industry. Intends to promote labor augmentation as employers may deem beneficial in the workplace as an administrative tool or an integrated or complementary part to process workflows. Proposes to prohibit employers from making their decisions based solely on recommendations or results generated by AI or automated systems; to replace human workers, displacement, loss of security of tenure, or diminution of existing salaries and or benefits."
