congress_website_title = "AN ACT INSTITUTIONALIZING AND ENHANCING THE SKILLS CERTIFICATE EQUIVALENCY PROGRAM (SCEP) OF THE CIVIL SERVICE COMMISSION (CSC) AND THE TECHNICAL EDUCATION AND SKILLS DEVELOPMENT AUTHORITY (TESDA) AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to give equal opportunity to certified Technical Vocational Education and Training (TVET) graduates to enter the civil service; uplift the dignity of middle-skilled workers, and improve the image of technical vocational education in the country. Tasks the CSC and TESDA, in consultation with relevant stakeholders, to identify and regularly update the qualification standards requiring eligibility through appropriate TESDA-issued National Certificates."
