congress_website_title = "AN ACT IMPOSING CIVIL PENALTIES ON UNREASONABLE PRICE INCREASES FOR CRUDE OIL, RESIDUAL FUEL OIL, OR REFINED PETROLEUM PRODUCTS"
congress_website_abstract = "Defines “Unreasonable price increase” as any price increase that exceeds any concurrent increase in the production or operation cost of the energy-producing company directly related to the products for sale. Mandates the Department of Energy Secretary in coordination with DTI Secretary to issue regulations that - (1) . . . (2) . . . (3) Impose a civil penalty of not less than One Million Pesos but not more than Ten Million Pesos for each unreasonable price increase."
