congress_website_title = "AN ACT PROVIDING FOR THE PUBLICATION OF LAWS IN THE PRINT OR ONLINE VERSION OF THE OFFICIAL GAZETTE AND OF A NEWSPAPER OF GENERAL CIRCULATION"
congress_website_abstract = "Amends Art.2 of R.A. No.386 (Civil Code of the Phils.) to be read as follows: Art. 2. Laws shall take effect fifteen (15) days AFTER their publication IN FULL, in the PRINT OR ONLINE VERSION OF THE Official Gazette, AND in the PRINT OR ONLINE VERSION OF A newspaper of general circulation in the Philippines, unless A DIFFERENT PERIOD is otherwise PRESCRIBED TO RESPOND TO A NATIONAL EMERGENCY: PROVIDED, ”¦ Refers the term “LAWS” to all statutes enacted by Congress; all orders, proclamations, circulars, and other issuances promulgated by the President . . .; all rules and regulations promulgated to implement or enforce statutes pursuant to a valid delegation of legislative power”¦"
