congress_website_title = "AN ACT STRENGTHENING THE PEOPLE´S RIGHT TO INFORMATION"
congress_website_abstract = "Seeks to provide for mandatory disclosure of SALN declaration in the official website of several public offices; the disclosure of several public documents or records, among others as follows: annual budget, collections/disbursement, income/expenditures, procurement plan/list, items for bidding, procurement contracts, construction or concession agreements, private sector participation contracts in infrastructure and development projects, public funding to any private entity, licenses/permits/agreements for the extraction/utilization of natural resources, updated plantilla/unfilled positions, compromise agreements, audited financial statements, revenue allotments and expenditures, guarantees given to GOCCs, etc., utilization of IRA, Special Education Fund, Local Disaster Risk Reduction Management Fund, Local Development, Bilateral or multilateral agreements and treaties, loans from domestic and foreign financial institutions, loans, grants and donations for calamity-stricken areas."
