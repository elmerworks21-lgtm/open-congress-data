congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 10642 OTHERWISE KNOWN AS THE “PHILIPPINE LEMON LAW” AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines the term “critical nonconformity issue”. Seeks to make it easier for buyers of motor vehicles to avail of their rights by reducing the number of repair attempts required and by obligating the manufacturer, distributor, authorized dealer, or retailer to immediately replace the motor vehicle if found to have critical nonconformity issues. Proposes to mandate the immediate availability of parts, components, or assemblies for the defective vehicle for repair; Provides penalties for failure of the manufacturer, dealer, etc. - to provide either a reasonable transportation allowance or a service vehicle to the buyer for non-usage of the defective unit."
