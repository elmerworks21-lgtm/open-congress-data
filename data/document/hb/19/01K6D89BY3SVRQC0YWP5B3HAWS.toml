congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE VIROLOGY SCIENCE AND TECHNOLOGY INSTITUTE AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to conduct an in-depth studies on viruses and their potential disease-causing agents that affect people, plants, and animals in order to provide scientific bases for the treatment of viral diseases; Proposes to create the VIP as the premier research Institute in the field of virology which shall be a venue for scientists, research institutes, and other organizations to work collaboratively to study viruses of agricultural, industrial, clinical, and environmental importance."
