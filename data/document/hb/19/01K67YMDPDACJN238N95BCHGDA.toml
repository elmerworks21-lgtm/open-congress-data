congress_website_abstract = "Aims to enable senior citizens and persons with disabilities access and benefit from government services through user-friendly and tailored digital platforms. Mandates the Department of Information and Communications Technology (DICT) to incorporate dedicated sections within the e Gov PH Super App platform for senior citizens and PWDs which shall provide access to various national and local government services, informational resources on their rights and privileges, and link with various establishments for seamless access and interaction."
