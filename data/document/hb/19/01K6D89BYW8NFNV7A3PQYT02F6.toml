congress_website_title = "AN ACT REGULATING THE PRACTICE OF CIVIL ENGINEERING AND REPEALING FOR THAT PURPOSE REPUBLIC ACT NO. 544, AS AMENDED BY REPUBLIC ACT NO. 1582"
congress_website_abstract = "Aims to continually upgrade the level of competence of civil engineers through peer recognition of specialization; continuing professional development including research; and strengthening the accredited professional organization through 1) ensuring the capabilities of our aspiring civil engineers and monitoring the practice of present civil engineers; 2) widening the scope of licensure examinations to include a vital subject in the National Building Code; 3) allowing specialization in different areas in the practice of CE (CE Education; Construction Management and Engineering; Energy and Environmental Systems Engineering; Geotechnical Engineering; Hydraulic and Water Resources Engineering; Structural Engineering; Transportation Engineering, etc.)"
