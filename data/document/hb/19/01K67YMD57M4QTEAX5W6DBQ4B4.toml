congress_website_title = "AN ACT STRENGTHENING THE PROCEDURE FOR REGISTRATION OF VOTERS AND ADOPTING A SYSTEM OF ONLINE REGISTRATION, AMENDING FOR THE PURPOSE SECTIONS 2, 3, 8, 9, 10, 12, 13, 22, 23, 24, 29, 32, 33 AND 45 OF REPUBLIC ACT NO. 8189, OTHERWISE KNOWN AS THE “VOTER´S REGISTRATION ACT OF 1996”"
congress_website_abstract = "Seeks to establish a system of registration that ensures and guarantees a clean, complete, permanent, and updated list of voters, and adopts and make use of technologies that shall facilitate and allow the automated and online registration of voters. Provides for the list of documents as valid proof of residence to register as a voter. Prohibits the transfer of a voter´s registration to another barangay within one hundred twenty (120) days before a regular election and ninety (90) days before a special election. Provides for the cancellation of the registration records of those who have died as certified by the Philippine Statistics Authority (PSA) on a quarterly basis."
