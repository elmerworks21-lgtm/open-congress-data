congress_website_abstract = "Aims to grant private sector employees who have rendered at least one year of service an increase of yearly service incentive leave from five to ten days with pay. Excludes those employees who are already enjoying the benefit herein provided, those enjoying vacation leave with pay of at least ten days and those employed in establishments regularly employing less than ten employees or in establishments exempted from granting this benefit by the Secretary of Labor after considering the viability or financial condition of such establishment."
