congress_website_title = "AN ACT PROVIDING FOR ADDITIONAL DEVELOPMENTAL FUNDING FOR THE OFFICE FOR TRANSPORTATION SECURITY (OTS), STRENGTHENING ITS POWERS AND FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to provide additional developmental funding in the amount of P500,000,000.00 for the operation and administration of the OTS to ensure that the country fulfills its commitments to all transportation security programs, mandates and agreements. Aims to prevent weapons, explosives, other dangerous elements or devices, hazardous materials, and cargoes which may be used to commit an act of terrorism and the carriage or bearing of which is not authorized from being carried on board a public transport system."
