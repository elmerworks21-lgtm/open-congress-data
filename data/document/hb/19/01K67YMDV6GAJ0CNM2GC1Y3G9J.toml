congress_website_title = "AN ACT RATIONALIZING AND STRENGTHENING THE REGULATION OF COCKFIGHTING BY LOCAL GOVERNMENT UNITS, FURTHER AMENDING FOR THIS PURPOSE PRESIDENTIAL DECREE NO. 449, OTHERWISE KNOWN AS THE “COCKFIGHTING LAW OF 1974”, AS AMENDED, AND SECTION 4 OF PRESIDENTIAL DECREE NO. 1802, ENTITLED “CREATING THE PHILIPPINE GAMEFOWL COMMISSION”, AS AMENDED"
congress_website_abstract = "Aims to give local government units more teeth in regulating cockpits and cockfighting; empower LGUs to permit and regulate cockfighting during local fairs or expositions and special cockfighting during barangay fiesta to ensure the safety and well-being of the participants and the public and to allow the LGUs, including the barangay, to earn from them. Prohibits gambling of any kind on the premises of the cockpit or place of cockfighting during cockfights."
