congress_website_title = "AN ACT IMPOSING THE DEATH PENALTY FOR SPECIFIC CRIMES, REPEALING FOR THE PURPOSE REPUBLIC ACT No. 9346, ENTITLED “AN ACT PROHIBITING THE IMPOSITION OF THE DEATH PENALTY IN THE PHILIPPINES”, FURTHER AMENDING ACT No. 3815, OTHERWISE KNOWN AS “THE REVISED PENAL CODE” AND REPUBLIC ACT No. 7080, ENTITLED “AN ACT DEFINING AND PENALIZING THE CRIME OF PLUNDER”, AND AMENDING ACT No. 9165, OTHERWISE KNOWN AS THE “COMPREHENSIVE DANGEROUS DRUGS ACT OF 2022”, REPUBLIC ACT No. 8177, ENTITLED “ACT DESIGNATING DEATH BY LETHAL INJECTION”, AND OTHER PENAL LAWS"
congress_website_abstract = "Seeks to impose death penalty on the following crimes: a. as defined under Act No. 3815, otherwise known as the Revised Penal Code, as amended: 1. Treason 2. Qualified Piracy; 3. Rebellion or Insurrection; 4. Coup d´etat; 5. Malversation of public funds or property where the amount involved is seventy-five million pesos (Php75,000,000.00) or more; 6. Parricide; 7. Murder; 8. Rape; 9. Kidnapping and serious illegal detention; 10. Robbery; 11. Estafa when committed under the circumstances defined in PD No. 1689; and 12. Destructive Arson. b. unlawful acts defined and penalized under RA No. 9165, otherwise known as the Comprehensive Dangerous Drugs Act of 2002, in Sections 4, 5, 6, 8, 9, 10, 11 (1-8), 16, 19, and 20 thereof; c. plunder as defined under RA No. 7080, as amended; d. Carnapping as defined under RA No. 6539 e. Violation of RA No. 6235, otherwise known as the Anti-Hijacking Law. States that death penalty shall be executed either by a. firing squad; b. hanging; or c. lethal injection."
