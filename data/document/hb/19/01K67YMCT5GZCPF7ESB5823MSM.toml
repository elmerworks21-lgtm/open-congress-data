congress_website_title = "AN ACT PROVIDING FOR GOVERNMENT FINANCIAL INSTITUTIONS UNIFIED INITIATIVES TO DISTRESSED ENTERPRISES FOR ECONOMIC RECOVERY (GUIDE)"
congress_website_abstract = "Seeks to strengthen the capacity of Land Bank of the Phils. and the Development Bank of the Phils. to provide the needed assistance to micro, small, and medium enterprises (MSMEs), and other strategically important companies; Proposes to mandate that these GFIs expand their credit and rediscounting facilities to affected MSMEs in the agriculture, infrastructure, manufacturing, and service industries; Aims to create a special holding company to be a major player in the financial and capital markets by providing aid to strategically important companies with solvency/liquidity issues brought about by the COVID-19 pandemic and mandating LBP and DBP to maintain at least majority ownership over such SHC until they have recovered their investment."
