congress_website_title = "AN ACT ESTABLISHING A LEGAL SCHOLARSHIP AND RETURN SERVICE PROGRAM, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to address the lack of lawyers in the country by utilizing the beneficiaries of this Act through compulsory return service plan to provide legal services to all. Proposes to offer financial assistance to willing and deserving students enrolled in a Bachelor of Laws or Juris Doctor Program in a school recognized and accredited by the Supreme Court. Enumerates all inclusions in the said financial assistance and provides several conditions for the scholarship."
