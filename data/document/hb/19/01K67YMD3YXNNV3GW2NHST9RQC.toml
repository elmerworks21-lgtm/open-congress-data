congress_website_title = "AN ACT PROVIDING PROTECTION AND INCENTIVES TO FREELANCE WORKERS"
congress_website_abstract = "Seeks to recognize the right of freelance workers to protection from late or nonpayment of fees for services rendered. Mandates hiring party obtaining or retaining the services of a freelance workers to execute a written contract with the freelance worker before the services are rendered which shall be written In plain language, understood by both parties and shall include the services to be provided by the freelance worker, details of compensation and other benefits, period of employment, grounds for breach of contract, and any other condition that the DOLE may direct. Requires the payment of night shift differential and hazard pay to freelance workers. Enumerates unlawful practices of hiring party committed against the freelance worker and provides the necessary penalty thereof. Provides tax relief to freelancers provided under the National Internal Revenue Code of 1997, as amended and RA No. 9178 or the “Barangay Micro Business Enterprises (BMBEs) Act of 2002” and special assistance lane/desk in every BIR Revenue District Office."
