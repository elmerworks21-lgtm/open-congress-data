congress_website_title = "KABUHAYAN AT KAUNLARAN NG KABABAYANG KATUTUBO ACT"
congress_website_abstract = "Defines several terms such as ancestral domains, ancestral lands, Indigenous Cultural Communities/Indigenous Peoples, and others. Seeks to institutionalize a regular program for the agricultural development of ICC/IP in the country to ensure a sustained and sufficiently funded program for the development of ancestral domains that will contribute a lot to the country´s food security and uplift the lives of ICC/IP. Proposes to employ culturally sensitive, participatory mechanism, and gender transformative lens in implementing agriculture-fisheries development interventions in ancestral domains."
