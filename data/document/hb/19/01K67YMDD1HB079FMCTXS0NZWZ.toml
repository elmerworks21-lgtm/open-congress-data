congress_website_title = "AN ACT MANDATING THE FORMULATION, FINANCING, IMPLEMENTATION, MONITORING, AND EVALUATION OF A COMPREHENSIVE AND MULTI-YEAR \"TATAK PINOY\" (PROUDLY FILIPINO) STRATEGY, ESTABLISHING A TATAK PINOY COUNCIL, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to improve and diversify local enterprises and their linkages with value chains through strategy that shall include plans and programs relating to 1) manpower, 2) infrastructure, 3) technology and innovation, 4) investments, and 5) public fiscal management and government procurement. Seeks to establish a Council that has the authority to develop and monitor effective implementation of the TPS to include the identification of public-private initiatives and government support for each targeted sector. Intends to support and promote the production and offering of Filipino-made products, goods, and services of increasing diversity, sophistication, and quality by local enterprises - that are globally competitive and recognized as a world-class brand."
