congress_website_coauthors_raw = ["BENITEZ, JOSE FRANCISCO B.","LARA, JOSEPH \"Jojo\" L.","SINGSON-MEEHAN, KRISTINE","DE VENECIA, CHRISTOPHER V.P.","GONZALES, AURELIO \"Dong\" Jr. D","RAMA, EDUARDO JR. ROA","ESPARES, FELIMON M.","GARCIA, PABLO JOHN F.","BULUT-BEGTANG, ELEANOR C.","LUISTRO, JINKY-BITRICS","GOMEZ, RICHARD","PRIMICIAS-AGABAS, MARLYN L.","TAN, KEITH MICAH D.L. TAN","BOLILIA, LIANDA B.","MARIANO-HERNANDEZ, RUTH","BORDADO, GABRIEL JR. H.","VILLANUEVA, EDUARDO \"Bro. Eddie\" C.","GARIN, JANETTE L.","TEVES, JOSE \"Bong\" Jr. J.","MATIBAG, ANN AMB"]
