congress_website_title = "AN ACT RIGHTSIZING THE NATIONAL GOVERNMENT TO IMPROVE PUBLIC SERVICE DELIVERY, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to improve public service delivery by minimizing duplication, redundancy or overlapping in functions. Grants the President of the Philippines to rightsize the operations of the Executive Branch; creates the Committee on Rightsizing the Executive Branch which shall be given a three-year timeline to implement the rightsizing program. Provides option for the co-equal branches of government like the Legislative, the Judiciary, Constitutional Commissions, Commission on Human Rights, Office of the Ombudsman, and the Local Government Units to adopt the Rightsizing Program or design its own program. Provides retirement benefits and separation incentives for personnel who may be affected by the program."
