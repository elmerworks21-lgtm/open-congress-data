congress_website_title = "AN ACT PROVIDING FOR THE VENUE OF THE CRIMINAL AND CIVIL ACTION IN LIBEL CASES AGAINST COMMUNITY OR LOCAL JOURNALIST, PUBLICATION OR BROADCAST STATIONS"
congress_website_abstract = "Defines the terms “community or local journalist, publication or broadcast station” to a journalist or news medium that operates within a limited area of circulation or broadcast in a city, province, or region, as defined under existing laws. Seeks to address the excessive cost of litigation and inconvenience, with all sorts of pressures and threats afflicted to journalists, especially the community newspaper and broadcast practitioners and their organizations - with the intention of relieving them from the present rule venue of libel cases."
