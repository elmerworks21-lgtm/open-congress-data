congress_website_title = "AN ACT ESTABLISHING APEX HOSPITALS IN EVERY REGION OF THE COUNTRY AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Provides for the conversion into apex hospitals - regional hospitals that are general hospitals which have at least 500 beds and identified by the DOH to have full potential to operate as apex hospitals based on the Phil. Health Facility Development Plan. Proposes that all apex hospitals shall offer clinical services such as Family Medicine, Internal Medicine, Obstetrics and Gynecology, Pediatrics, and Surgery; and basic emergency care services such as Cardiology, Neurology, Oncology, Pathology, Pulmonology, Psychiatry, Rehabilitation Medicine, Urology, and other specialists as determined by the DOH."
