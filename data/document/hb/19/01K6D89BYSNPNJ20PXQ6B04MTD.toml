congress_website_title = "AN ACT CREATING THE PHILIPPINE CENTERS FOR DISEASE CONTROL AND PREVENTION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines several terms among others such as “Disease Surveillance”; “Epidemic/Outbreak; “Public Health Emergency”. Proposes that the Center shall be responsible for the tracking and monitoring diseases and risk factors among Filipinos - to inform policy and action at national and local levels; and shall be the focal point for the implementation at the local level of international health regulations and other international initiatives for global health security and outbreak response."
