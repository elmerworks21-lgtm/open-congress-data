congress_website_title = "AN ACT AMENDING SECTION 33 OF REPUBLIC ACT NO. 6975, OR THE “DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990” TO INCLUDE OTHER BACCALAUREATE DEGREES TO THE LATERAL ENTRY PROGRAM FOR LINE AND TECHNICAL OFFICERS"
congress_website_abstract = "\"Amended Provision of the Lateral Entry Program for Line and Technical Officers (Section 33 of R.A. 6975) to the Rank of Police Lieutenant\" Proposes to include other baccalaureate degrees in the Lateral Entry Program of the PNP; and to provide that the entry rank for technical professionals automatically starts at the initial rank of Police Lieutenant or Police Captain. Intends to fill up vacancies and to expand the opportunities to Police Non-Commissioned Officers (PNCOs) and Non-Uniformed Personnel (NUP) who are already in the service and are qualified for the position of Police Lieutenants."
