congress_website_title = "AN ACT PENALIZING THE PUBLICATION AND PROLIFERATION OF FALSE CONTENT ON THE PHILIPPINE INTERNET"
congress_website_abstract = "Proposes for the following provisions: 1) Registration of Social Media Accounts (presentation of valid government-issued ID/valid passport for aliens; parents´ or guardians´ documents and consent for minor media account user); 2) Confidentiality Clause (in accordance with the Data Privacy Act of 2012; written consent of the media account user in case of disclosure to unauthorized persons); 3) Disclosure of Information (. . . the account was or is being used in the commission of a crime or that it was utilized as a means to commit malicious, fraudulent or unlawful act, etc.); 4) Punishable Acts (personal online account or website containing false information; fictitious online account or website; deceiving content online in the guise of providing one´s service; financing activity employing false content online; etc.); 5) Counteractive Measures (authorizes the Office of Cybercrime of the DOJ to issue order to restrain the commission of the above-mentioned offenses) Other related terms: fake news; false/misleading information; fictitious identities; deceiving content; infodemic"
