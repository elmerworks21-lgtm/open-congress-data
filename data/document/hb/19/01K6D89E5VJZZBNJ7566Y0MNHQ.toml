congress_website_title = "AN ACT GRANTING HAZARD PAY TO PUBLIC PROSECUTORS EXPOSED TO HAZARDOUS SITUATIONS AND PERFORMING HAZARDOUS DUTIES RELATED TO ASSIGNED CASES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to grant a hazard pay of 20% of the basic monthly salary to prosecutors who are subject to conduct the inquest, preliminary investigation, and prosecution of complex and high-profile crimes concerning graft and corruption, dangerous drugs (narcotic drugs and psychotropic substances), firearms and ammunition, money laundering, terrorism, arms smuggling, human trafficking, and other crimes against national security and public order. Proposes that prosecutors exposed to hazardous situations, including an assignment in strife-torn or embattled areas, distressed or isolated situations, disease-infested areas - and areas declared under a state of calamity or emergency, will also be eligible for compensation."
