congress_website_title = "AN ACT PROMOTING OPEN ACCESS IN DATA TRANSMISSION AND PROVIDING ADDITIONAL POWERS TO THE NATIONAL TELECOMMUNICATIONS COMMISSION"
congress_website_abstract = "Seeks to promote the construction and development of reliable, affordable, open, and accessible data networks that transmit fast and quality information; Proposes to create an environment within the data transmission industry that is conducive to open, fair and innovation-propelled competition; Mandates interconnection among data transmission participants to avoid dominance by a single player or by a group of data providers; Intends to clarify the role of the National Telecommunications Commission to maximize the utilization of radio spectrum resources in the allocation and assignments of finite resources in the transmission of data; Provides NTC additional power to promote a more conducive environment for data networks."
