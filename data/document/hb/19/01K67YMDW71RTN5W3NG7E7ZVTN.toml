congress_website_title = "AN ACT REGULATING THE PRACTICE OF THE AGRICULTURE PROFESSION IN THE PHILIPPINES, CREATING FOR THE PURPOSE A PROFESSIONAL REGULATORY BOARD FOR AGRICULTURISTS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to put at par agriculture with other professions by regulating its practice thereby ensuring the continuing professional development of agricultural workers. Provides for the examination, registration, and licensure of agricultural practitioners; the supervision, control, and regulation of the practice of the agriculture profession in the Philippines; the development and upgrading of the Bachelor of Science (BS) in Agriculture curriculum; the development of the professional competence of registered agriculturists through Continuing Professional Development (CPC); and integration of the agriculture profession through membership of registered agriculturists in an accredited integrated professional organization."
