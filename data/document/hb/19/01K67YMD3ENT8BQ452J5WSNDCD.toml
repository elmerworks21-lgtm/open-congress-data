congress_website_title = "AN ACT GRANTING FULL INSURANCE COVERAGE TO ALL QUALIFIED AGRARIAN REFORM BENEFICIARIES OF THE COMPREHENSIVE AGRARIAN REFORM PROGRAM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6657, AS AMENDED BY REPUBLIC ACT NO. 9700, OTHERWISE KNOWN AS THE “COMPREHENSIVE AGRARIAN REFORM LAW OF 1988”"
congress_website_abstract = "Seeks to grant full insurance coverage for compensable losses to all qualified agrarian reform beneficiaries who are defined in Section 3(b) of the “Agri-Agra Reform Credit Act of 2009.” Covers the loses resulting from the natural calamities; plant diseases; pest infestations and loss of life or inquiry due to accident. Covers the following crops and other farming and fishery produce such as: 1. Palay, corn, sugarcane, high-value crops as defined in Section 4(b) of RA 7900 or the “High-Value Crops Development Act of 1995´, coconut, tobacco; 2. Crops or stocks in fisheries farms; 3. Livestock; and 4. Non-crop agricultural assets used In actual farming and reported to and certified by the DAR. Mandates the Secretary of the DA and the Secretary of the DAR to immediately include in their Departments´ Programs the operationalization of the insurance coverage."
