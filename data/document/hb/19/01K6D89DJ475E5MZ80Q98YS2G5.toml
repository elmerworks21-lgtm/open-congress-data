congress_website_title = "AN ACT ESTABLISHING GREEN LANES FOR STRATEGIC INVESTMENTS"
congress_website_abstract = "Establishes a One-Stop Action Center for Strategic Investments to streamline and expedite the issuance of permits, licenses, certifications, or authorizations. Characterizes Strategic Investments through the following: significant capital or investment, consequential economic impact, positive impact on the environment, and notable contribution to the balance of payments, with complex technical processes and engineering designs, and improvement in infrastructure capabilities. Includes, but shall not be limited to Highly Desirable Investment Projects recommended by the Fiscal Incentives Review Board; Foreign Direct Investments per implementation by the Foreign Investment Promotion and Marketing Plan; and Projects under the Strategic Investment Priority Plan (SIPP). Related Topics: Executive Order No.18; R.A. No. 9485, as amended by R.A. No. 11032 (Ease of Doing Business and Efficient Government Service Delivery Act of 2018); R.A. No. 11534, R.A. No. 11234 (Energy Virtual One-Stop Shop Act); Anti-Red Tape Authority (ARTA)."
