congress_website_title = "AN ACT EXPEDITING THE TITLING OF LANDS AWARDED UNDER THE COMPREHENSIVE AGRARIAN REFORM PROGRAM, LIFTING THE RESTRICTIONS ON THE UTILIZATION OF SUCH LANDS AS COLLATERAL FOR SECURING AGRICULTURAL LOANS, AND OTHER SIMILAR FINANCIAL INSTRUMENTS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to turn CARP-awarded lands into effective resource generation mechanisms to help farmers-beneficiaries improve their agricultural productivity through revitalizing the rural credit market.Â All agricultural lands shall be accepted as collateral by the registered owners as appearing in the Emancipation Patent, Homestead Patent, Free Patent, Certificated of Land Ownership Award, Original Certificate of Title, or Transfer Certificate of Title (TCT). Seeks to expedite the process of subdividing and titling of lands under the CLOA arrangement, thereby removing ownership uncertainties, and proposes that the subdivision and titling process shall prioritize a portion of land that represents the home lots of the farmer-beneficiaries."
