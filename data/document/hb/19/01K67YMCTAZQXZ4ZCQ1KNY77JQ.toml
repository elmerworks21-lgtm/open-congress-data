congress_website_title = "AN ACT REQUIRING THE REGISTRATION OF SUBSCRIBER IDENTITY MODULE CARDS"
congress_website_abstract = "Aims to regulate the sale and distribution of SIM cards to promote end-user accountability, prevent the proliferation of mobile phone scams and data breaches, and to assist law enforcement agencies in resolving crimes involving the use of mobile phone units. Proposes that every public telecommunication entity (PTE) or direct seller shall require the end user of a SIM card to present a valid ID document with photo; to accomplish and sign a control-numbered registration form; and an attestation by the end user that the person appearing before the direct seller is the same person who accomplished and signed the form and that the ID presented are valid and correct. Provides for other detailed requirements in the process of registration, providing penalties for non-compliance to any provisions of this Act."
