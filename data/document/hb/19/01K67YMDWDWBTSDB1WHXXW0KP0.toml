congress_website_title = "AN ACT PROVIDING EDUCATION PATHWAYS FOR BASIC EDUCATION STUDENTS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to ensure opportunities for Filipinos to attain maximum potential and enhance their employability by establishing inclusive education pathways that empower and equip the learners with the competencies that are necessary for college or employment. Provides two education pathways for completers of Junior High School: the University Preparatory Program under the Department of Education (DepEd) of the Technical-Vocational Program under the Technical Education and Skills Development Authority (TESDA). Mandates the DepEd to develop and implement a comprehensive curriculum for Grades 11 and 12 that prepares students for admission to colleges and universities and to include the University Preparatory Pathway in its education roadmap in collaboration with the CHED, colleges, and universities to guarantee alignment between curriculum and college admission standards. Mandates the TESDA and the industry boards, partners, experts, and practitioners, including small and medium enterprises, to develop and offer a variety of technical-vocational programs based on an industry-driver and industry-approved curriculum that is designed to equip students with practical skills and competencies that are at par with industry standards. Allows students who finished the technical-vocational program and successfully qualifying in the Philippine Educational Placement Test conducted by DepEd for Grades 11 and 12 or any equivalent assessment administered by the Dep Ed to enroll in colleges or universities and avail of the ladderized education program for educational advancement. Directs the DepEd and TESDA to maintain an educational support program including scholarships for their respective students that properly and sufficiently addresses the accessibility and availability of the pathways to the marginalized communities and learners."
