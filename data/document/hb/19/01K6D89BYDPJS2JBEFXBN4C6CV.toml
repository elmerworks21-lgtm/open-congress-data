congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF THE PHILIPPINE DNA DATABASE SYSTEM"
congress_website_abstract = "Seeks to institutionalize a national forensic DNA (Deoxyribonucleic Acid) database whose function is to produce matches between the suspected individual and crime scene bio-makers in order to: a. provide evidence to support criminal investigations which can lead to the identity of potential suspect/s in criminal investigation; b. assist in the identification of missing persons or unidentified human remains in times of accidents and calamities; and c. to establish paternity and other family relationships. Defines DNA profiling or DNA typing as a process where a minute sample of genetic DNA material is taken from a human tissue and is given a computerized numeric value in the form of a \"bar code\"."
