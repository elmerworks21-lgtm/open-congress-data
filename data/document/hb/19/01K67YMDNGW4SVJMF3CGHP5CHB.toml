congress_website_title = "AN ACT ALLOWING FOR ELECTRONIC REGISTRATION AND VOTING OVERSEAS, FURTHER AMENDING REPUBLIC ACT NO. 9189, OTHERWISE KNOWN AS THE 'OVERSEAS ABSENTEE VOTING ACT OF 2003', AS AMENDED BY REPUBLIC ACT NO. 10590, OTHERWISE KNOWN AS THE 'OVERSEAS VOTING ACT OF 2013', AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to expand the voting methods under existing laws and regulations to prevent voting disenfranchisement of OFWs and to further encourage them to exercise their right of suffrage. Allows registration and/or certification as an overseas voter by mail or by electronic means as may be determined by the Commission on Elections. Allows voting by mail or by electronic means in all posts abroad. Prohibits any person to steal, conceal, alter, destroy, mutilate, manipulate, or in any way tamper with the mail or electronic data or information containing the ballots for overseas voters."
