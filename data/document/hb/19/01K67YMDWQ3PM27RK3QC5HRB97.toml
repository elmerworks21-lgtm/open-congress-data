congress_website_title = "AN ACT PROHIBITING ANY ACTIVITY RELATED TO ONLINE COCKFIGHTING OR E-SABONG OPERATIONS AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Seeks to prohibit and penalize the following acts: 1.) Online, remote, or off-site wagering or betting on live cockfighting matches, events, and activities streamed or broadcasted live from cockpit arenas or premises where the activity is being held; 2.) place, receive or transmit a bet wager on live-streaming or broadcasting of live cockfighting matches, events or activities through online or other remote mode of betting; or 3.) Operate or maintain e-sabong betting platform. Declares invalid all permits and licenses of e-sabong operators issued by the Philippine Amusement and Gaming Corporation (PAGCOR) upon the effectivity of this Act. Mandates the National Telecommunications Commission, Cybercrime Division of the National Bureau of Investigation, Anti-Cybercrime Group of the Philippine National Police, Cybercrime Investigation and Coordinating Center of the Department of Information and Communications Technology, and other law enforcement agencies to monitor and block all existing and emerging e-sabong websites."
