date_filed = "2024-11-19"
long_title = "AN ACT RATIONALIZING THE SAFETY MEASURES AND PENALTIES RELATIVE TO THE OPERATION OF MOTORCYCLES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 11235, OTHERWISE KNOWN AS THE 'MOTORCYCLE CRIME PREVENTION ACT'"
scope = "National"
subjects = [ "Motorcycle Crime Prevention",]
congress_website_author_codes = ["J013","K033","G002","J086","K063","K024","J093","D025","C069"]
congress_website_coauthors_raw = ["PRIMICIAS-AGABAS, MARLYN L.","DIONISIO, ERNESTO JR. M.","TUPAS, RAUL \"Boboy\" C.","BOLILIA, LIANDA B.","REMULLA, CRISPIN DIEGO D.","LOYOLA, ROY M."]
congress_website_committee_codes = ["0532","E509"]
congress_website_primary_keys = [7206]
congress_website_title = "AN ACT RATIONALIZING THE SAFETY MEASURES AND PENALTIES RELATIVE TO THE OPERATION OF MOTORCYCLES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 11235, OTHERWISE KNOWN AS THE “MOTORCYCLE CRIME PREVENTION ACT”"
congress_website_abstract = "Seeks to balance the benefits derived from innocent motorcycle users with those who utilize the said vehicle to carry out crimes. Lowers the penalties for violation of RA No. 11235 or the Motorcycle Crime Prevention Act for failure to comply with the registration requirement and for driving a motorcycle without the required number plate. Requires the owner or possessor of motorcycle whose number plate is lost, damaged, or stolen to report the same to the LTO and the PNP through the Joint PNP and LTO Operations and Control Center within seventy-two (72) hours from discovery of such fact, and request a replacement number plate or be penalized by not more than Five Thousand Pesos (P5,000.00). However, if the lost, damaged, or stolen number plate or readable number plate is used with an offense penalized under the Revised Penal Code or special laws, the failure of the owner to report within three (3) days the fact of the loss, destruction or theft, shall subject the owner to a fine of not more than Ten Thousand Pesos (P10,000.00), among others. Requires owners of motorcycles with number plates not in conformity with the provisions of this Act, to renew their registration and apply for the required readable number plate not later than June 30, 2025 and requires the LTO to produce, release, and issue the number plates as required by this Act until December 31, 2025."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=19&q=HBN-11113"

