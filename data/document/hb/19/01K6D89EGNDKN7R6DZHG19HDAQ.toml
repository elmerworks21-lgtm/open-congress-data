congress_website_title = "AN ACT INSTITUTIONALIZING A MECHANISM FOR THE DECLARATION OF A STATE OF IMMINENT DISASTER, PROVIDING THE CRITERIA FOR ITS DECLARATION AND LIFTING, ENABLING ANTICIPATORY MEASURES, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Seeks to establish a systematic mechanism for declaring a State of Imminent Disaster that will enable the government to anticipate and respond effectively to impending disasters, thereby minimizing their adverse impacts on vulnerable communities and enhancing the country´s resilience to disasters. Provides criteria for declaring a State of Imminent Disaster, including objective indicators such as weather forecasts, hydrological data, geological assessments, and other relevant information. Allocates funds for implementing anticipatory measures, including pre-disaster preparedness activities, evacuation and sheltering facilities, emergency response training, and other necessary interventions. Outlines prohibited acts and imposes penalties for the violation of this Act."
