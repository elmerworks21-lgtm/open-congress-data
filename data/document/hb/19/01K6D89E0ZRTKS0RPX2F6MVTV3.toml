congress_website_title = "AN ACT AMENDING ELECTRIC VEHICLE INDUSTRY DEVELOPMENT ACT"
congress_website_abstract = "Seeks to amend Sec. 4 of Chapter 1 of R.A. No. 11697 to read as follows: (k) Electric Vehicle (EV) refers to a two-wheeled or four-wheeled vehicle or such other vehicles with at least one (1) electric drive for vehicle propulsion. . . . Proposes to amend Sec. 24 of Chapter IV of R.A. 11697: States that “That in the case of imported electric jeepneys and electric tricycles, the DOF, upon recommendation of the DTI, may suspend the exemption in order to protect local manufacturers. Provided further, That all EVs shall enjoy the Zero Percent Most Favored Nation (MFN) Tariff Rate for a period of five (5) years from the date of effectivity of this Act.”"
