congress_website_abstract = "Seeks to ensure the Department of Labor and Employment´s GIP continuity and to strengthen its implementation. Intends to provide opportunities for young Filipinos to engage in public service and contribute to national development through one year of valuable and substantial hands-on experience. Proposes for intern qualifications, their rights and benefits, and the Program´s appropriations."
