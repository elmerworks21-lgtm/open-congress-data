congress_website_title = "AN ACT RIGHTSIZING THE NATIONAL GOVERNMENT TO IMPROVE PUBLIC SERVICE DELIVERY"
congress_website_abstract = "Aims to improve public service delivery by minimizing duplication, redundancy, or overlapping in functions through designing an organizational structure that shall function effectively in the context of good governance and fiscal prudence; Intends to authorize the President to rightsize the Executive Branch while the Legislative, the Judiciary, the Constitutional Commissions, may likewise rightsize their respective offices; local Government Units may also rightsize their respective offices, subject to their financial capability while the Governance Commission for GOCCs (GCG) shall continue to exercise its authority under R.A. No. 10149."
