congress_website_title = "AN ACT SETTING STANDARDS FOR THE CONTRACTING OF LOANS AND GRANTS WITH BILATERAL AND MULTILATERAL PARTNERS, AMENDING FOR THE PURPOSE SECTIONS 2, 3, 4, 7, AND 9 OF REPUBLIC ACT NO. 8182, AS AMENDED BY REPUBLIC ACT NO. 8555, OTHERWISE KNOWN AS THE “OFFICIAL DEVELOPMENT ASSISTANCE ACT OF 1996”"
congress_website_abstract = "Allows blended Official Development Assistance (ODA) loans as long as they are covered by official national or international instruments in the nature of exchanges of notes, memoranda of understanding, or similar instruments. Mandates that in the case of bilateral ODA agreements, the donor government shall issue a guarantee covering at least seventy-five percent (75%) of the commercial component of the loan. Provides the condition that the bilateral or multilateral agency, or international or multilateral lending institution shall ensure the timely release of funds committed by such private or commercial institutions. Reduces the grant of element from twenty-five percent (25%) to fifteen percent (15%). Allows Local Government Units (LGUs) to be eligible for ODA loans provided that no contingent lability arising from ODA loans shall be incurred by the national government. Mandates that all ODA projects shall be subject to evaluation and approval of the NEDA - Investment Coordination Committee."
