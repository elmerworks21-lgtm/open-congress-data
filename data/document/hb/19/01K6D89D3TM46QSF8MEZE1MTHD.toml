congress_website_title = "AN ACT ESTABLISHING THE SCIENCE FOR CHANGE PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes to formulate the S4CP anchored on the Harmonized National Research and Development Agenda (HNRDA) to support the government´s development objectives, particularly those that aim to reduce poverty and empower the poor and vulnerable; induce rapid, inclusive, and sustained economic growth; promote the integrity of the environment; and enhance the country/s climate change adaptation and mitigation capability (DOST S&T Programs related to health, energy, agriculture/aquaculture/fisheries, industry, biotechnology/nanotechnology genomics, nutrition/food, natural resources, transportation, industrial/manufacturing/mining, disaster risk reduction, metrology/calibration/standards, technology transfer/commercialization, human resource development, etc.). Proposes new programs that shall be included in the S4CP related to the following: a) Defense & Security R&D; b) Space S&T; c) ICT Dev´t, Electronics & Artificial Intelligence; d) Strengthening of R&D and S&T Services through Infrastructure and HR Dev´t; e) S&T for the Creative, Tourism, and Services Industry; f) New and Emerging Technologies."
