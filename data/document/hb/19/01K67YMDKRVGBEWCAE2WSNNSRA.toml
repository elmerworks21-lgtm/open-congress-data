congress_website_title = "AN ACT GOVERNING CIVIL LIABILITY AND COMPENSATION CLAIMS FOR NUCLEAR DAMAGE, REPEALING FOR THE PURPOSE CERTAIN SECTIONS OF REPUBLIC ACT NO. 5207, OTHERWISE KNOWN AS THE “ATOMIC ENERGY REGULATORY AND LIABILITY ACT OF 1968”, AS AMENDED"
congress_website_abstract = "Aims to govern the civil liability and compensation for nuclear damage in case of a nuclear incident occurring in the territory of the Philippines or during carriage of nuclear material for which the operator is liable in accordance with this Act and the relevant international conventions to which the Philippines is a contracting party. Seeks to ensure that the country has a robust, comprehensive, and effective nuclear liability regime that provides clarity, fairness, and adequate compensation, upholding international best practices, complying with relevant international conventions, fostering cooperation with nuclear technology vendors, and enabling the responsible growth of the country´s nuclear energy program."
