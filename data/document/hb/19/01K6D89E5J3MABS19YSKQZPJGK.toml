congress_website_title = "AN ACT ESTABLISHING A POST-BACCALAUREATE SCHOLARSHIP AND RETURN SERVICE PROGRAM FOR DESERVING STUDENTS, AND APPROPRIATING FUNDS THEREOF"
congress_website_abstract = "Aims to provide financial assistance to deserving Filipino students in State-owned and controlled universities and colleges (SOCUCs) or from Private Higher Education Institutions (PHEIs) who want to pursue any post-baccalaureate or Post-Graduate degrees. Â Provides that they shall be graduates of an appropriate Bachelor of Science Program in the study of Technology, Engineering, Science, Law, or Business. Proposes to require recipients to render return service in the Philippines equivalent to at least one year for every scholarship year availed. Seeks to produce highly skilled professionals and ensures contributions to national development.Â Â Â Â Â"
