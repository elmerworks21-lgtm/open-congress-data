congress_website_title = "AN ACT PROVIDING PREFERENTIAL APPOINTMENT TO APPOINTIVE OFFICERS AND EMPLOYEES HOLDING VALID APPOINTMENTS TO THE NEW POSITIONS IN THE APPROVED STAFFING PATTERN FOLLOWING A GOVERNMENT REORGANIZATION, AMENDING FOR THE PURPOSE, SECTION 4 OF REPUBLIC ACT NO. 6656"
congress_website_abstract = "Seeks to amend Section 4 of R.A. No. 6656 by requiring agencies to exhaust all possible means to place in the approved reorganized structure the existing personnel in accordance with the order of preference. Allows placement of personnel to comparable positions that are next higher in rank rather than their previous positions or in case there are not enough comparable positions or next higher positions, to the positions next lower in rank provided that safety measures are in place to ensure safety of tenure of government personnel. Placement shall be done in phases in accordance with the Implementing Rules and Regulations promulgated by the Civil Service Commission."
