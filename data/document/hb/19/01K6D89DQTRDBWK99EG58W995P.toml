congress_website_title = "AN ACT PROVIDING FOR A NATIONAL DEFENSE ACT, TO FOSTER THE SUPPRESSION OF INSURGENCY AND OTHER SERIOUS THREATS TO NATIONAL SECURITY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to address the critical issues concerning our country's security and stability; Intends to bolster the national defense apparatus, enhance the capabilities of our armed forces, and ensure a swift and decisive response to insurgency and other threats to our national security. Proposes a Comprehensive National Defense Act that would set up the framework and mechanisms in coordination with several agencies (DILG, DND, AFP) in dealing with the complex issues and multi-dimensional aspect of national security and defense."
