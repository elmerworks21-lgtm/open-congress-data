congress_website_title = "AN ACT EXPANDING THE PROHIBITED ACTS OF DISCRIMINATION AGAINST WOMEN ON ACCOUNT OF SEX, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO.442, AS AMENDED, OTHERWISE KNOWN AS THE \"LABOR CODE OF THE PHILIPPINES\""
congress_website_abstract = "Aims to expand the prohibited acts of discrimination against women employees with respect to terms and conditions of employment solely on account of sex or CHARACTERISTICS OF HER SEX, WHETHER ACTUAL OR PRESUMED. Provides for the following as acts of discrimination: a.) Favoring a male employee over a female employee with respect to promotion, assignment, employment benefits, training opportunities, study and scholarship grants solely on account of their sex or characteristics of their sex, whether actual or presumed; b.) Favoring a male employee over a female employee with respect to dismissal of personnel or the application of any retrenchment policy of employer solely on account of their sex or characteristics of their sex, whether actual or presumed; c.) To deny any woman the benefits of employment or other statutory benefits under our laws by reason of her sex. Provides penalties on any employer who commits or attempts in any manner to commit any of the acts prohibited under this Act."
