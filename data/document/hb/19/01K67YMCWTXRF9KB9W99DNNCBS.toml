congress_website_coauthors_raw = ["BROSAS, ARLENE D.","CASTRO, FRANCE L.","MANUEL, RAOUL DANNIEL A.","VILLANUEVA, EDUARDO \"Bro. Eddie\" C.","DALIPE, MANUEL JOSE M.","MASTURA, SITTIE SHAHARA I.","ROMUALDEZ, FERDINAND MARTIN G.","BORDADO, GABRIEL JR. H.","MARIANO-HERNANDEZ, RUTH","SALCEDA, JOEY S.","SUAN, LORDAN","PRIMICIAS-AGABAS, MARLYN L."]
