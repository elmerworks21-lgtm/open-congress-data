congress_website_title = "AN ACT PROVIDING FOR PROTECTION OF THE REMITTANCES OF OVERSEAS FILIPINO WORKERS"
congress_website_abstract = "Aims to protect the remittances of the OFWs against usurious interest rates and exorbitant fees charged by financial institutions and provide them and their families adequate education and training on financial literacy to ensure a source of livelihood even after their overseas employment. Provides fifty percent (50%) discount on fees imposed by banks and non-banks financial intermediaries on OFW remittances to immediate family members. Requires all bank and non-bank financial intermediaries offering remittance services to OFWs to post in a conspicuous place within the establishment´s premises the Philippine peso equivalent rate of the foreign currencies being transacted. Prohibits all banks and non-bank financial intermediaries from raising their current remittance fees without prior consultation with the Department of Finance (DOF), Bangko Sentral ng Pilipinas (BSP), and the Department of Migrant Workers (DMW). Imposes penalties and fines for the violation of certain acts."
