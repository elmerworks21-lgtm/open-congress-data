congress_website_title = "AN ACT PROVIDING FOR THE BILL OF RIGHTS AND OBLIGATIONS OF TAXPAYERS, CREATING THE OFFICE OF THE NATIONAL TAXPAYER ADVOCATE, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes, among others, the following Taxpayer´s Basic Rights: Rights to information; to fair and faithful application of laws; to challenge the position of and be heard by revenue authorities; to present evidence and witnesses; to be represented by a qualified professional; to timely/ expeditious completion of tax audits; right against baseless assessment; to be given an opportunity for amicable settlement; to avail of installment payment; to recover actual costs/damages arising from judicial actions; and the right to privacy. Creates the Office of the National Taxpayer Advocate and provides for its powers, functions, and responsibilities; Provides accessibility of the Taxpayer´s Bill of Rights and Obligations, and its integration into Higher Education curriculum, and penalties for its violation/s."
