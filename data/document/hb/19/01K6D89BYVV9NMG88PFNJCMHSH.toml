congress_website_title = "AN ACT DEVELOPING THE PHILIPPINES´ NATURAL GAS INDUSTRY, AND APPROPRIATING FUNDS FOR THIS PURPOSE"
congress_website_abstract = "Defines several terms among others including Downstream Natural Gas Industry which refers to the business of importing exporting, re-exporting, shipping, transporting, processing, refining, storing, distributing, marketing, and/or selling natural gas. Takes into account the nearing expiration of the Malampaya concessions by 2024 wherein we still do not have any alternative either in imported or indigenous sources; that the supply can go as far as 2027 but it does not have enough gas to further expansion to provide the future natural gas requirements, particularly on the plan to expand the application of natural gas in industrial, commercial, residential, and transport sectors."
