congress_website_title = "AN ACT ENHANCING THE RENEWABLE ENERGY INDUSTRY THROUGH THE GREEN ENERGY AUCTION PROGRAM"
congress_website_abstract = "Defines Green Energy Auction Reserve Price or GEAR Price - to the maximum price offers in PhP/kWh set by the ERC pursuant to applicable laws . . . factoring other RE technologies, such as Floating Solar Projects and Offshore Wind Projects. Seeks to establish the Green Energy Auction to provide for the framework of the GEAP and a mechanism to facilitate the selection of eligible RE plants through competitive selection process. Tasks the Energy Regulatory Commission (ERC) to determine the Green Energy Auction Reserve Price (“Gear Price”) which will be the Feed-in-Tariff (FIT) ceiling for each round of the GEAP, where qualified participants may offer capacity generation for a rate not higher than the GEAR Price."
