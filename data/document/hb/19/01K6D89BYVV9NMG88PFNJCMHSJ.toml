congress_website_title = "AN ACT PROHIBITING CROSS-OWNERSHIP AS AMONG DISTRIBUTION UTILITIES AND GENERATION COMPANIES AMENDING FOR THIS PURPOSE SECTION 45 OF REPUBLIC ACT (RA) NO. 9136"
congress_website_abstract = "Proposes the following amendments to be read as follows: “SEC. 45. Cross Ownership, Market Power Abuse and Anti-competitive Behavior - ”¦ “To promote true market competition and prevent harmful monopoly and market power abuse, the ERC shall enforce the following safeguards: (a) . . . (b) . . . For the purpose of preventing market power abuse between associated firms engaged in generation and distribution, BY NO MEANS CAN DISTRIBUTION UTILITIES ENTER INTO BILATERAL POWER SUPPLY AGREEMENTS WITH ANY ASSOCIATED FIRM ENGAGED IN GENERATION, WHETHER DIRECT OR INDIRECT. THIS SHALL NOT PREJUDICE CONTRACTCTS ENTERED INTO PRIOR TO THE EFFECTTIVIY OF THIS ACT . . .THE IMPLEMENTING RULES AND REGULATIONS OF THE ACT IS TO BE ADJUSTED ACCORDINGLY WITHOUT REDEFINING “CONTROL” AS DEFINED IN THIS SECTION . . ."
