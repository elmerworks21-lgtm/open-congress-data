congress_website_abstract = "Aims to ensure that the rights of the young farmers and fisherfolks are recognized, protected and promoted by involving the youth in nation building and rural development and providing them access to knowledge, information and education, land, new sources of financial services and capital, green jobs and participation in policy dialogue. Establishes the Young Farmers and Fisherfolk Challenge Program that shall support and empower the young farmers to be active partners in food security and agricultural development and modernization."
