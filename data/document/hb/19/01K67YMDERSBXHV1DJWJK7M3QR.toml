congress_website_primary_keys = [141947]
congress_website_title = "AN ACT MANDATING ALL CORRECTIONAL, CUSTODIAL, AND DETENTION FACILITIES TO IMPLEMENT A CONTRABAND DETECTION AND CONTROL SYSTEM, AND PROVIDING PENALTIES FOR POSSESSING, INTRODUCING, OR AIDING AND ABETTING THE ENTRY OF CONTRABAND INSIDE SUCH FACILITIES"
congress_website_abstract = "Aims to implement stringent measures to regulate the entry of persons and things in correctional, custodial, and detention facilities, to prevent the entry of contraband inside such facilities, and to provide sanctions for violations of rules and regulations regarding the entry of contraband in these facilities. Establishes the Contraband Detection and Control System (CDCS) that shall include the use of modern technology, devices, or units such as handheld and walk-through metal detectors, X-ray scanners, and K9 units to assist in the implementation of this Act. Requires visitors and other persons entering the facilities to accomplish a registration form and present valid identification cards (ID) before or during the actual visit. Enumerates the prohibited acts and the appropriate penalties for violation in accordance with the provisions of this Act. Proposes to prohibit several items inside correctional, custodial, and detention facilities, among others: Any ammunition, firearm, weapons (R.A.10591); Explosives or incendiary devices (P.D. 1866, as amended by R.A. 09516); Dangerous drugs, illegal substances. . . & other paraphernalia (R.A.9165); Dangerous or deadly weapons; Alcoholic or intoxicating beverages; Cigarettes and other tobacco products (heated tobacco products (HTP), nicotine/non-nicotine, vapor/vaporized products (R.A. 11900), all forms of currency and monetary instruments; Electronic communication devices (cellphones, laptops, personal computers, digital devices); Signal jammers/devices (radio signals and transmissions); Luxury items (appliances, gambling/gaming equipment, jewelry); Object that is capable of threatening the safety, security, or health of persons . . . capable of aiding/executing the escape from such facilities. Proposes to prohibit several items inside correctional, custodial, and detention facilities, among others:"
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=19&q=HBN-9153"

