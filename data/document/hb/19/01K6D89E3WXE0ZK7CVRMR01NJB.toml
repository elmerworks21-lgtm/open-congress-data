congress_website_title = "AN ACT EXEMPTING CRITICAL MEDICAL PRODUCTS, ESSENTIAL GOODS, INPUTS, RAW MATERIALS, AND EQUIPMENT FROM TAXES, DUTIES, AND OTHER FEES DURING PUBLIC HEALTH EMERGENCIES"
