congress_website_title = "AN ACT PROVIDING FOR A REVISED APPRENTICESHIP PROGRAM REPEALING FOR THE PURPOSE CHAPTERS I AND II OF TITLE II OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Aims to provide the youth with skills and access to employment and provide enterprises with a mechanism to ensure a continuous supply of skilled workers. Proposes to incorporate the involvement of the Technical Education and Skills Development Authority (TESDA) as the primary Technical Vocational Education and Training (TVET) authority; to set the duration of training according to the complexity of the skills to be learned; to provide for the issuance of training completion certificates; and to provide for a training allowance and disability and/or accident insurance."
