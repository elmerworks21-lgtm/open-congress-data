congress_website_title = "AN ACT INSTITUTIONALIZING THE PARTICIPATION OF CIVIL SOCIETY ORGANIZATIONS IN THE ANNUAL NATIONAL BUDGET PROCESS AND PROVIDING EFFECTIVE MECHANISMS THEREFOR"
congress_website_abstract = "Defines CSO as a non-government organization (NGO), cause-oriented group, people's organization, cooperative, trade union, professional association, faith-based organization, media group, indigenous people's movement, which monitors, government projects, engages in policy discussions, and actively participates in collaborative activities with the government. Intends to institutionalize people's involvement in budget discussions at all levels of government and provides full play to the people's right to participate in all levels of social, political, and economic decision-making without undermining the capacities of elected representatives in creating a budget that is needed by a particular locality"
