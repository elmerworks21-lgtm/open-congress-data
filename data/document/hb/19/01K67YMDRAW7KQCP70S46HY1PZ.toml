congress_website_title = "AN ACT PROVIDING FOR CHEAPER AND MORE ACCESSIBLE INTERNET FOR ALL"
congress_website_abstract = "Aims to establish a policy and regulation that shall reduce to zero the spectrum user fee (SUF) paid by telecommunications entities to the national government; promote the acceleration of internet use in the country, and the expansion of Wi-Fi technology and infrastructure in unserved and underserved areas; encourage and empower the small players in the industry to provide affordable internet services; and adopt a license-free, zero USF policy in accordance with international best practices."
