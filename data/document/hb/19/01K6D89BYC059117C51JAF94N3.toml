congress_website_title = "AN ACT PROVIDING FOR A NATIONAL POLICY PREVENTING ADOLESCENT PREGNANCIES, INSTITUTIONALIZING SOCIAL PROTECTION FOR ADOLESCENT PARENTS, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Proposes among others the following provisions: Development and implementation of the National Program of Action and Investment Plan for the prevention of adolescent pregnancy; Information and Service Delivery Network for Adolescent Health and Development or ISDN for AHD; Mandatory establishment of functional local “Teen Centers” for Adolescent Health and Development; Community-based and culturally-sensitive Comprehensive Adolescent Sexuality Education (CASE); Promotion of adolescent male involvement in the prevention of early and unintended pregnancies; Residential care facilities for disadvantaged women."
