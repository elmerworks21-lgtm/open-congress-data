congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 9502, OTHERWISE KNOWN AS THE “UNIVERSALLY ACCESSIBLE CHEAPER AND QUALITY MEDICINES ACT OF 2008”, FOR THE PURPOSES OF EXPANDING COVERAGE AND PROMOTING THE USE OF GENERIC MEDICINES"
congress_website_abstract = "Proposes for the expansion of the list of drugs and medicines that are subject to price regulation, which shall include, inter alia: (A) All drugs and medicines indicated for treatment of chronic illnesses and life threatening conditions, such as, . . . RHEUMATOID ARTHRITIES; . . . (F) ALL DRUGS AND MEDICINES INDICATED FOR TREATMENT OF . . . COMMON COLD, COUGH, BODY PAIN, MIGRAINE, AND DIARRHEA; (G) VITAMINS AND MINERAL SUPPLEMENTS . . . VITAMIN C, VITAMIN E, IRON SUPPLEMENT, FOLIC ACID; (H) ALL DRUGS AND MEDICINES INDICATED FOR EPIDEMICS AND SEASONAL ILLNESSES, . . . DENGUE, CORNAVIRUS, LEPTOSPIROSIS; . . ."
