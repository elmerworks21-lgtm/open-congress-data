congress_website_title = "AN ACT REGULATING FOREIGN PROGRAMMING THROUGH THE GRANTING OF LANDING RIGHTS, DESIGNATING THE NATIONAL TELECOMMUNICATIONS COMMISSION AS THE APPROPRIATE REGULATORY BODY AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines several terms such as Cable TV Operator, Foreign Program/Programmer, and Landing Right, etc. Landing Right - the right to transmit in/into the territory of the Philippines a particular foreign program/foreign channel, granted to the programmer from whom it originates after the said programmer's proper application is duly filed with and approved by the Commission. Proposes that NTC shall be vested with jurisdiction over and regulation of all foreign programs, including the power to grant, renew and revoke Landing Rights; and the authority to resolve all disputes between foreign programmers and cable TV operators."
