congress_website_title = "AN ACT INSTITUTING A NATIONAL CITIZENS SERVICE TRAINING PROGRAM IN ALL PUBLIC AND PRIVATE TERTIARY EDUCATION INSTITUTIONS, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 9163, OTHERWISE KNOWN AS THE “NATIONAL SERVICE TRAINING PROGRAM ACT”, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to train and mobilize for the youth´s holistic development; institutionalize their vital role in nation-building; encourage their early involvement in public and civic affairs; and develop a citizenry that is ready to defend the State in personal and military service. Establishes the National Citizens Service Training Program (NCST) which shall be implemented by the CHED in all Higher Education Institutions (HEIs) and by the TESDA in all Technical-Vocational Institutions (TVIs) in consultation with the Department of National Defense. Mandates the administration of NSTP to all students enrolled in undergraduate degree program in all public and privates HEIs and at least two-year programs in all TVIs in the Philippines. Mandates NCST to be a requisite for graduation of covered tertiary education students, however, the CHED or TESDA, based on the rules recommended by the NCST Technical Panel, shall, prescribe alternative NCST Programs to address students with special needs and persons with disabilities. Establishes a Reserve Officers´ Training Corps (ROTC) Program, an optional four (4) year military training program designed to provide military training to students enrolled in undergraduate degree programs in HEIs who have expressed interest or shown potential to be officers of the AFP Regular and Reserve Force (Citizen Armed Force).Provides maximum penalty for any abuse, corruption, hazing, torture, data privacy rights violation, or violation of human rights committed in direct or indirect relation to the implementation of this Act."
