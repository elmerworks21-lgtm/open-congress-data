congress_website_title = "AN ACT ADOPTING A 30-YEAR NATIONAL INFRASTRUCTURE PROGRAM"
congress_website_abstract = "Proposes to cover major infrastructure projects of the National Government (NG) - the fields of transport and logistics, energy, water resources, information and communications technology, social, and agri-fisheries modernization and food logistics infrastructure - including projects under Public-Private Partnership (PPP) schemes and partnerships with Local Government Units. Provides for priority initial list and brief description of core national projects which focuses on pipeline infrastructure; Tasks NEDA and DBM to see to it that the total annual budget allocation is at least five percent (5%) of the Gross Domestic Product, consistent with the long term expenditure framework and the budget ceilings set by the Development Budget Coordinating Committee; Provides for the use of applicable modern technology in the planning, procurement, and implementation of projects in the Program."
