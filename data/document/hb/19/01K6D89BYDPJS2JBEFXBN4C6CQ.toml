congress_website_title = "AN ACT STRENGTHENING DRUG PREVENTION AND CONTROL, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9165, AS AMENDED, OTHERWISE KNOWN AS THE “COMPREHENSIVE DANGEROUS DRUGS ACT OF 2002”"
congress_website_abstract = "Provides for, among others - a legal presumption of who is considered as the importer, financier, and protector or coddler of illegal drugs as well as legal consequences for importers and financiers, and their protectors or coddlers. Defines “chemical substance dependence” and seeks to penalize negligent lessors of properties used as clandestine laboratories. Refers “dangerous drugs” to the following: 50 grams or more of shabu, cocaine, cocaine hydrochloride, opium, heroine, morphine, marijuana resin or oil, or other dangerous drugs such as ecstasy, among others."
