congress_website_title = "AN ACT CREATING THE OFFICE OF COMMUTER AFFAIRS, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to establish the Office of the Commuter Affairs that shall oversee the welfare of the riding public, address their concerns, and extend the necessary assistance. Provides for the powers and functions of the said Office as follows: Assist the riding public and monitor providers to ascertain that there are safety precautions and measures installed; Coordinate with government agencies responsible for and dealing will all kinds of road, rail, air, and maritime transportation; Inspect road stations, rail stations, seaports, and airports; Monitor transport facilities to ensure that they provide appropriate access to all persons with disability; Performs accident reconstruction of road crashes and train accidents; Assist in the investigation of aviation and maritime accidents; and Establish a command center communication facility to disseminate helpful information regarding traffic situations, public safety and the like."
