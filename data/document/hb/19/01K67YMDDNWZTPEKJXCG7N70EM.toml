congress_website_title = "AN ACT PROVIDING FOR A NATIONAL POLICY IN PREVENTING ADOLESCENT PREGNANCIES AND INSTITUTIONALIZING SOCIAL PROTECTION FOR ADOLESCENT PARENTS"
congress_website_abstract = "Seeks to establish the Adolescent Pregnancy Prevention Inter-Agency Council which shall serve as the policy-making body responsible for the formulation and implementation of policies and program that shall provide family-oriented, adolescent-friendly sexual and reproductive health programs, centered on the prevention, counseling, and post-delivery care of adolescent pregnancy, through the development of coherent, rational, unified, effective and efficient structures, systems, and mechanisms for social protection program in the adolescents with health and development concerns primarily on sexual and reproductive health. Develops an evidence-based National Medium-Term Plan for the Prevention of Adolescent Pregnancy which shall serve as the national framework for inter-agency and inter-sectoral collaboration and resource allocation at all levels, to address the various health, cultural, socio-economic, and institutional determinants of adolescent pregnancy. Mandates all provinces and chartered cities to organize and operationalize an Information and Service Delivery Network (ISDN) for Adolescent Health Development (AHD) consisting of different government agencies and NGOs, institutions, and facilities disseminating information and services to adolescents within their locality. Provides for the roles and responsibilities of different concerned agencies in accordance to their mandates and in relation to the implementation of this Act. Designates February of every year as the month for raising public awareness on preventing adolescent pregnancy and conduct of nationwide communication campaign."
