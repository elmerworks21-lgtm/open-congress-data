congress_website_title = "AN ACT ENHANCING THE FINANCIAL LITERACY OF OVERSEAS FILIPINO WORKERS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to mandate free and consistent financial literacy training seminars for OFWs such as Pre-Departure Orientation Seminar and series of Post-Arrival Training Seminars with the help of the Department of Finance (DOF), Department of Migrant Workers (DMW), and Overseas Workers Welfare Administration (OWWA). Proposes to educate OFWs on the following: budgets and actual expenditures of government institutions; credit information on micro-small-scale enterprises; liens on real estate and movable collaterals used to secure loans; and financial products (stocks, bonds, insurance, and mutual funds) available in the market."
