congress_website_title = "AN ACT RATIONALIZING, STRENGTHENING THE POLICY AND DEFINING THE EMERGENCY MONITOR VEHICLES AMENDING FOR THE PURPOSES SECTION NO. 3(b) and SECTION NO. 43 OF REPUBLIC ACT 4136, AS AMENDED BY REPUBLIC ACT 10930 AS AMENDED BATAS PAMBANSA BLG. 398 AND EXECUTIVE ORDER NO. 1011 OTHERWISE KNOWN AS THE LAND TRANSPORTATION AND TRAFFIC CODE"
congress_website_abstract = "Proposes for the following amendments: SECTION 2. Section 3 (b) of Republic Act No. 4136 . . . (b) “Passenger automobiles” shall mean all pneumatic-tire vehicles of types similar to those usually known under the following terms: . . . EMERGENCY MOTOR VEHICLES MEANS MARKED POLICE AND LAW ENFORCEMENT VEHICLES; STATE-OWNED and PRIVATELY-OWNED AMBULANCE, BLOOD, ORGAN, OR TISSUE DELIVERY VEHICLES; VOLUNTEER FIRE AND RESCUE VEHICLES; EMERGENCY MEDICAL SERVICES SYSTEMS VEHICLES. . . . (d) THE DRIVER OF EMERGENCY VEHICLES IN THE EXERCISE OF THEIR OFFICIAL DUTIES SHALL BE AUTHORIZED TO COUNTER-FLOW OR USE EXCLUSIVEY DESIGNATED PRIVATE OR PUBLIC ROAD SECTIONS OR LANES."
