congress_website_title = "AN ACT AMENDING FURTHER REPUBLIC ACT NO. 6975, OTHERWISE KNOWN AS THE “DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990” AND REPUBLIC ACT NO. 8551, OTHERWISE KNOWN AS THE “PHILIPPINE NATIONAL POLICE REFORM AND REORGANIZATION ACT OF 1998”"
congress_website_abstract = "Proposes amendments to Sec.37 of R.A.No.6975 wherein Performance Evaluation System shall be administered in accordance with . . . and a code of conduct THAT MUST INCLUDE MORAL VALUES, SPIRITUAL PRINCIPLES AND BIBLICAN STANDARDS OF DISCIPLINE . . . Provides that the evaluation system SHALL be administered in such a way as to foster the improvement of individual efficiency and behavioral discipline . . . , INDIVIDUAL HONESTY, INTEGRITY, LOYALTY TO THE CONSTITUTION AND RESPECT TO THE RULE OF LAW . . . Proposes to include among the powers and functions of the Commission: the “CONDUCT MOTU PROPIO AN INVESTIGATION ON ANY POLICE UNIT FOUND INEFFICIENT OR INEFFECTIVE, AND IMPOSE THE CORRESPONDING SANCTIONS/S . . .; . . . THE PROGRAMS ON EDUCATION AND TRAINING SHALL INCLUDE VALUES FORMATION AS WEL AS MORAL AND SPIRITUAL DISCIPLINE; . . . AND REPORT SUCH PERFORMANCE (local chief executives) TO THE SECRETARY OF THE DILG AND TO THE OFFICE OF THE PRESIDENT; Monitor and investigate MOTU PROPIO UPON COMPLAINT police anomalies and irregularities WHICH SHALL INCLUDE CRIMINAL ACTIVITIES. Amends among others - general qualifications for appointment of an officer or member of the PNP: . . . AND MUST HAVE ATTENDED AT LEAST A CUMULATIVE TWENTY-FOUR (24) HOURS VALUES FORMATION PROGRAM . . . FOR THEIR MORAL AND SPIRITUAL FITNESS. Proposes amendments regarding qualifications for promotion; and provides an explanation as to when an ADMINISTRATIVE CASE and CRIMINAL CASE IS CONSIDERED PENDING . . ."
