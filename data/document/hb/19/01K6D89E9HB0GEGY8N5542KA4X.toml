congress_website_title = "AN ACT ESTABLISHING THE CARBON RIGHTS ACT, PROVIDING FOR THE OWNERSHIP, TRANSFER, AND BENEFIT-SHARING OF CARBON CREDITS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Refers \"carbon rights\" to the legal entitlements associated with the benefits derived from activities aimed at avoiding, reducing, or removing carbon emissions. These rights are related to the outcomes of such actions and are not classified as natural resources. Carbon rights encompass the ownership, transfer, and trading of carbon credits resulting from these activities. Defines \"carbon project\" as any initiative, activity, or program that leads to the reduction, removal, or avoidance of carbon dioxide (CO2) or other greenhouse gas (GHG) emissions, thus generating carbon credits. Aims to establish a comprehensive, clear, and robust legal framework that will encourage private sector investments in carbon projects, which include: 1. Nature-Based Solutions (NBS) such as: - Afforestation, reforestation, and revegetation - Improved forest management - Reduced emissions from deforestation and forest degradation - Wetland restoration and conservation - Mangrove restoration - Soil carbon sequestration 2. Technology-Based Solutions, including: - Renewable energy projects - Energy efficiency projects - Carbon capture and storage - Waste management projects 3. Hybrid Projects, which integrate: - Renewable energy and agroforestry - Sustainable agriculture with biogas production. The framework will delineate carbon rights for Nature-Based Solutions (NBS) carbon projects applicable to: - Lands under public domain - Private lands and Indigenous Peoples' lands (ancestral domains) - Areas with overlapping jurisdictions. Additionally, the framework specifies the roles and mandates of various agencies, including the Climate Change Commission, the Department of Environment and Natural Resources (DENR), the Department of Agriculture (DA), the Department of Energy (DOE), and the Department of Transportation (DOTr)."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_19/HB10635.pdf"]

