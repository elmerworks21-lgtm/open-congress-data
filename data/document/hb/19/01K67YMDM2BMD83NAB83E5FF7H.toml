congress_website_title = "AN ACT”¯ FURTHER AMENDING REPUBLIC ACT NO. 7836, OTHERWISE KNOWN AS THE “PHILIPPINE TEACHERS PROFESSIONALIZATION ACT OF 1994” AS AMENDED BY REPUBLIC ACT NO. 9293"
congress_website_abstract = "Seeks to widen the nomination for the members of the Board of Professional Teachers by including the Teachers Education Council (TEC), Department of Education (DepEd), accredited association of public and private schools and school administrators, Commission on Higher Education (CHED), Technical Education and Skills Development Authority (TESDA) and accredited association of teachers. Mandates the Professional Regulatory Commission (PRC) to issue the appropriate rules to govern the practice of Members of the Board to ensure that no conflict of interest shall arise in their functions related to the conduct of the licensure examination and release of the results. Recognizes the probationary employment in private basic education schools pursuant to DOLE-DECS-CHED-TESDA Order No. 1 series of 1986 to teach prior to acquiring the necessary certificate and license subject to certain conditions. Proposes additional academic qualification for applicants who will take the licensure examinations for teachers and the requirement of a refresher course for those who have failed to pass the licensure examination for three times."
