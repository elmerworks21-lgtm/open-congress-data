congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF LEARNING CITIES, MANDATING COMPLIANCE WITH THE KEY FEATURES THEREOF, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Defines Lifelong Education as “all types of systematic educational activities other than regular school curriculum, including supplementary education, basic literacy education for adults, ability enhancement education, culture and art education, and citizen´s participation education.” Proposes for the following provisions: Mandates the DepEd, CHED, and TESDA to jointly create a master plan for establishing Learning Cities; In coordination with the DILG, may designate a locality as a Learning City; and Heads of LGUs designated as Learning Cities shall be required to guide and support activities for the promotion of lifelong education whether initiated by the LGU or private lifelong educational institutions."
