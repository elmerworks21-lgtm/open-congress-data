congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE PROTECTED DESIGNATION OF ORIGIN AS GEOGRAPHICAL INDICATIONS OF PRODUCTS SAFEGUARDING AUTHENTICITY AND PROMOTING REGIONAL HERITAGE AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to safeguard the integrity of products originating from specific geographic regions to ensure that they are produced according to methods and standards that contribute to their distinctiveness and reputation rooted in the region´s cultural heritage. Explains that PDO is a form of geographical indication that legally defines and regulates the origin of traditional products - to help consumers identify and trust the quality and authenticity of these products while also providing economic benefits to local producers."
