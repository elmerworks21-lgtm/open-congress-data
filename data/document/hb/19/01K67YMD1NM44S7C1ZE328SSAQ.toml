congress_website_title = "AN ACT CREATING THE HEALTH EMERGENCY AUXILIARY REINFORCEMENT TEAM UNDER THE DEPARTMENT OF HEALTH AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Establishes the Health Emergency Auxiliary Reinforcement Team (HEART) under the Department of Health (DOH) to augment the health workforce in times of disasters, public health emergencies and health threats which shall be composed of the following individuals who shall voluntarily register with the DOH: a.) Licensed professionals in the fields of medicine, nursing, medical technology, and other allied health fields; b.) Graduates of medicines and allied courses and medical students who have completed a one-year internship and who have not been issued licenses to practice their profession but may be issued a limited and special authorization to render medical services pursuant to RA 2382 or the Medical Act of 1959; and c.) Other health support workforce, including barangay health workers. Grants the President of the Philippines to order the nationwide mobilization of the HEART to augment the health workforce in case of a declaration of a state of public health emergency, state of calamity, and other threats to public health."
