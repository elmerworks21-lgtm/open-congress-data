congress_website_title = "AN ACT PROHIBITING THE INCLUSION OF AUTOMATIC OR PRE-SELECTED ADD-ONS TO ONLINE TRANSACTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7394, OTHERWISE KNOWN AS THE \"CONSUMER ACT OF THE PHILIPPINES\""
congress_website_abstract = "Aims to uphold the Filipino consumer´s right to make informed choices by proposing additional circumstances to determine whether an act or practice is unfair and unconscionable: “F) THAT THE SELLER OR SUPPLIER EMPLOYS AGGRESSIVE MARKETING PRACTICES INCLUDING AUTOMATIC OR PRE-SELECTED ADD-ONS TO ONLINE TRANSACTIONS THAT SIGNIFICANTLY CONSTRAIN OR IMPAIR THE CONSUMER´S FREEDOM OF CHOICE WITH REGARD TO THE PURCHASE OF A PRODUCT OR SERVICE, AND CAUSE THE CONSUMER TO MAKE UNITENDED EXPENSES OR ENTER INTO A TRANSACTION DIFFERENT FROM THE ONE THAT THE CONSUMER INTENDED, OR A TRANSACTION THE CONSUMER WOULD NOT HAVE AVAILED OF IF CHOICES WERE PRESENTED.”"
