congress_website_title = "AN ACT EXPANDING THE COVERAGE OF THE SENIOR CITIZENS PRIVILEGES AND BENEFITS, FURTHER AMENDING REPUBLIC ACT NO. 7432, AS AMENDED, ENTITLED “AN ACT TO MAXIMIZE THE CONTRIBUTION OF SENIOR CITIZENS TO NATION BUILDING, GRANT BENEFITS, AND SPECIAL PRIVILEGES AND FOR OTHER PURPOSES”"
congress_website_abstract = "Amends Sec. 2 of RA 7432, as amended, by defining medicines and food supplements. Includes online sales on the twenty percent (20%) discount on medicines, professional fees of attending physicians, licensed professional health workers, medical and dental services, dental services, diagnostic and laboratory fees, medical facilities, outpatient clinics, and home care services including payments made through health maintenance organizations or insurance companies. Grants twenty percent (20%) discount in Transport Network Vehicle Services (TNVS), payment of toll fees in skyways, and expressways, and golf and country clubs. Grants fifteen percent (15%) discount on the monthly utilization of water and electricity supplied by public utilities which monthly consumption does not exceed two hundred kilowatt hours (200 kWh) of electricity and fifty cubic meters (50 m3) of water, provided that the billing statement is under the name of the senior citizen. Grants eight and a half percent (8.5%) special discounts on the purchase of basic necessities and prime commodities provided that the total amount of purchase shall not exceed five thousand pesos (Php5,000.00) per calendar week without carry-over of the unused amount. Grants twenty-five thousand pesos (Php25,000.00) death benefit assistance to the nearest surviving relative of a deceased senior citizen. Exempts senior citizen from the Unified Vehicular Volume Reduction Program and parking fee. Grants twenty percent (20%) discount on traffic fines."
