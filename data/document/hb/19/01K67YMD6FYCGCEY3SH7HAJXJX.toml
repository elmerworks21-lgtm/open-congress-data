congress_website_title = "AN ACT INSTITUTIONALIZING AN ENTERPRISE-BASED EDUCATION AND TRAINING PROGRAM TO STRENGTHEN TECHNICAL-VOCATIONAL EDUCATION AND TRAINING AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to establish a national enterprise-based training and education system for the middle-level manpower that is competency-based, including an off-and-on-the job training program and involving the active participation and cooperation of employees, workers, industry, and the government. Institutionalizes the Enterprise-Based Education and Training (EBET) Program that shall cover practical work-related or workplace-related training programs with compulsory related theoretical instructions and shall include training modalities or schemes. Mandates TESDA to establish a registration mechanism and assign an office that shall process all EBET program applications, including the applications for registration of civic groups, association, organization, industries, TVET providers, and government institutions which desires to participate in the EBET program. Grants tax exemptions to all grants, bequests, endowments, donations, and contributions made to and to be used actually, directly and exclusively by the participating training institution."
