congress_website_title = "AN ACT INSTITUTIONALIZING THE SHARED SERVICE FACILITIES PROJECT FOR MICRO, SMALL, AND MEDIUM ENTERPRISES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6977, AS AMENDED, OTHERWISE KNOWN AS THE “MAGNA CARTA FOR MICRO, SMALL AND MEDIUM ENTERPRISES”"
congress_website_abstract = "Aims to introduce government interventions to elevate and upscale the products being sold and exported by the country by institutionalizing the Shared Service Facilities (SSFs) project of the Department of Trade and Industry. Creates additional SSF-Fabrication Labs (SSF-Fab Labs) in every province in order to encourage and assist our MSMEs in adopting new and innovative technologies in the manufacturing process which should improve the quality of the products as well as its market reach."
