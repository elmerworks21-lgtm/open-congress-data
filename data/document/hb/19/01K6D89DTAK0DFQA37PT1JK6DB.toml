congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 10644, OTHERWISE KNOWN AS THE GO NEGOSYO ACT” BY EMPOWERING NEGOSYO CENTERS TO ACT AS RURAL EXPORT CENTERS AND PROVIDING EXPORT-RELATED INFORMATION AND SERVICES TO RURAL MICRO, SMALL AND MEDIUM ENTERPRISES"
congress_website_abstract = "Seeks to expand the services of the Negosyo Centers and empower them as Rural Export Centers to cater to neglected rural businesses because of their distance from trading and commercial centers. Proposes that these Negosyo Centers will provide helpful information and resources to rural businesses that will aid in promoting and exporting their products."
