congress_website_title = "AN ACT CREATING THE DEPARTMENT OF DISASTER RESILIENCE, DEFINING ITS MANDATE, POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to create a new Department which shall be the sole policy-making and advisory body on disaster risk and vulnerability reduction and management and build better forward as a post-recovery and post-rehabilitation mechanism. Proposes among others the abolition of the existing National Disaster Risk Reduction Management Council, while the assets and personnel of the Office of Civil Defense under the DND shall be transferred to the proposed Department."
