congress_website_title = "AN ACT REINSTITUTING ABSOLUTE DIVORCE AS AN ALTERNATIVE MODE FOR THE DISSOLUTION OF MARRIAGE"
congress_website_abstract = "Defines absolute divorce as the judicial dissolution of a marriage or the termination of the bond of matrimony where the spouses return to their status of being single with the right to contract marriage again. Defines other terms among others as follows: abandonment, alimony, bigamous marriage, child custody, court-assisted petitioner, domestic or marital abuse, irreconcilable differences, marital infidelity, psychological incapacity, sex reassignment surgery, transgender, and transsexual."
