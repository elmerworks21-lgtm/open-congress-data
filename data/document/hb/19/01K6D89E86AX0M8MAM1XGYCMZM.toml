congress_website_title = "AN ACT ESTABLISHING THE INSTITUTIONAL FRAMEWORKS FOR PHILIPPINE GOVERNMENT DATA OWNERSHIP, MANAGEMENT, AND NATIONAL DATA GOVERNANCE POLICY, FOR THE PROTECTION, AND PROMOTION OF TRANSPARENCY, ACCOUNTABILITY, AND DATA SECURITY OF GOVERNMENT-HELD DATA RESOURCES, AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Defines the term “Data” to encompass any information, including but not limited to personal data, non-personal data, statistical data, research findings, reports, and any other data collected, generated, or processed in the course of fulfilling a contract with the government. Address the importance of data collected by contractors through the implementation of programs and projects, in partnership with the government, and establish government ownership over such data collected. Proposes DICT to create a comprehensive National Data Governance Framework Policy which shall establish guidelines and standards for data governance and which shall outline procedures for data sharing, access, and dissemination in accordance with R.A.10173 or the Data Privacy Act of 2012, as amended. Stipulates prohibitions against contractors asserting proprietary rights or engaging in actions compromising data integrity, security, or confidentiality."
