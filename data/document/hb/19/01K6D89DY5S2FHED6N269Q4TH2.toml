congress_website_title = "AN ACT DEFINING AND PENALIZING ACTS OF ROAD RAGE AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines “Road Rage” as the aggressive, hostile, or violent behavior in traffic or on the road by a motorist that may include the following: wild gesturing at the other concerned party or any of his/her passengers; cursing or using foul language or any form of verbal insults; any physical attack at another or an attempt thereof, reckless driving; any form of threat or intimidation; any use of force against another person/s; and other analogous circumstances, . . ."
