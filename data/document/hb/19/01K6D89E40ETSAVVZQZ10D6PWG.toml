congress_website_title = "AN ACT STRENGTHENING THE COMMISSION ON HUMAN RIGHTS (CHR) AS A NATIONAL HUMAN RIGHTS INSTITUTION (NHRI) AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to address constraints that CHR encounters - hindering it from fully aligning with the Paris Principles or the “Principles Relating to the Status of National Human Rights Institutions” Aims to bolster the CHR by ensuring effective, expanded structural, operational, and functional independence, meeting the minimum requirements set by the Paris Principles.Â Seeks to guarantee full fiscal autonomy to facilitate prompt, immediate, and unrestricted discharge of its duties. Outlines the general powers and functions of the Commission, granting it full authority to act on complaints or initiate proceedings independently in all instances of human rights violations; Empowers CHR to issue injunctive reliefs and legal measures."
