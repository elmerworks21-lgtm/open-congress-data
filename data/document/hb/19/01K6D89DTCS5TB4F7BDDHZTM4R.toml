congress_website_title = "AN ACT STRENGTHENING ANTI-AGRICULTURAL SMUGGLING MEASURES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10845, OTHERWISE KNOWN AS THE ANTI-AGRICULTURAL SMUGGLING ACT OF 2016, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to establish a National Anti-Smuggling Council and Task Force and lengthen the detention period for those suspected of being smugglers. Seeks to amend the title of RA10845 to read as follows: AN ACT DECLARING LARGE-SCALE AGRICULTURAL SMUGGLING, HOARDING, PROFITEERING, AND CARTEL AS ECONOMIC SABOTAGE . . . Proposes to insert Section 3A after Section 3 of RA10845 to read as follows: Section 3A. . . Hoarding, profiteering, or cartel, . . . as they involve sugar, corn, pork, poultry, garlic, onion, carrots, fish, and cruciferous vegetables, in its raw state, or which have undergone the simple processes of preparation or preservation for the market, with a minimum amount of one million pesos (P1,000,000.00), or rice, with a minimum amount of ten million pesos (Plo,000,000.00), as valued by the Bureau of Customs (BOC) for imports or by the Department of Agriculture for domestically produced commodities, shall constitute economic sabotage."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_19/HB08781.pdf"]
