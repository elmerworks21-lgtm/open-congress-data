congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 10029, OTHERWISE KNOWN AS THE \"PHILIPPINE PSYCHOLOGY ACT OF 2009\" AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address the prevalence of mental health challenges among Filipinos and the limited number of psychology professionals. Underscores the urgent need to transform mental health care by moving away from custodial care in psychiatric hospitals - to mental health services that are integrated in general health care, community mental health services, and services beyond health sector Proposes to expand the functions of psychology professional referred to as “psychometricians” in RA 10029, with appropriate regulations, in order to maximize their contributions to mental health. Proposes to replace the term “psychometricians” with “registered associate psychologists” to reflect their expanded functions. Proposes to increase the required internship/practicum hours for both the registered associate psychologists and registered psychologists, and to change some of the licensure examination subjects. Seeks to update RA 10029 to be complementary with the provisions and goals of the Philippine Mental Health Act of 2018 (RA No. 11036), other local legislations, international standards, and the national thrust towards a more integrated and comprehensive approach to Phil. Mental health care."
