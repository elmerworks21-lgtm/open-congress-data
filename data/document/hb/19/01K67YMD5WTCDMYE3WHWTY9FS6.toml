congress_website_title = "AN ACT ESTABLISHING EVACUATION CENTERS IN EVERY CITY AND MUNICIPALITY, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to establish an evacuation center in every city and municipality in the country which shall provide immediate and temporary accommodation for people who have evacuated or displaced from their homes due to disasters, calamities or other emergency events such as typhoons, floods, storm surges, drought and other severe climate disturbances, as well as fire, and the outbreak of illness and diseases that present imminent danger to life and property. Mandates the NDRRMC to be the lead implementing agency of this Act and to make a priority list of LGUs needing evacuation centers. Provides requirements for the establishment of evacuation center such as: a.) location designation; b.) structural and building capacity; c.) suitability and capacity of premises; and d.) amenities and accessibility."
