congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF THE REPUBLIC ACT. NO. 9520, OTHERWISE KNOWN AS THE PHILIPPINE COOPERATIVE CODE OF 2008 TO FURTHER STRENGTHEN THE COOPERATIVE MOVEMENT IN THE COUNTRY AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes for the following provisions: to grant tax exemption to cooperatives dealing with non-members and with accumulated reserves and undivided net earnings of MORE THAN TEN MILLION PESOS; to improve the policy on the use of the cooperatives´ reserve fund, community development fund, and optional fund; the use of reserve fund for any loss that it may incur due to pandemic, state of emergencies and force majeure; removes the limitation in the use of community development fund also to the community outside their areas of operation; expands the use of optional funds for the benefit of the members and employees during an exceptional circumstance such as a pandemic or crisis; increases the required paid-up capital and shorten the period of application for registration; and provides guidelines of the proper remedy when the Cooperative Development Authority issues dissolution orders against them."
