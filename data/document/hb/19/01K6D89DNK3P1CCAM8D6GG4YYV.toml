congress_website_title = "AN ACT PROVIDING FOR THE FRAMEWORK FOR THE CONDUCT AND REGULATION OF ASSISTED REPRODUCTIVE TECHNOLOGY (ART) AND SURROGACY PROCEDURES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes to establish a regulatory Commission to oversee the practice of ART and surrogacy to ensure that all parties involved in these procedures are fully informed of their rights and responsibilities - that appropriate safeguards are in place to protect the interests of all involved especially the child, and to ensure that accurate data are available on the number and outcomes of these procedures. Proposes that a child born out of surrogacy procedure shall be deemed to a biological child of the intending couple and shall be entitled to all the rights and privileges available to a natural child."
