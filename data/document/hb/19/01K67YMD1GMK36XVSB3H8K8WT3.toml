congress_website_primary_keys = [138381]
congress_website_title = "AN ACT PROVIDING FREE LEGAL ASSISTANCE TO ANY OFFICER OR UNIFORMED PERSONNEL OF THE ARMED FORCES OF THE PHILIPPINES, THE BUREAU OF FIRE PROTECTION, THE BUREAU OF JAIL MANAGEMENT AND PENOLOGY, THE PHILIPPINE COAST GUARD, AND THE PHILIPPINE NATIONAL POLICE, FACING ANY CHARGE BEFORE THE PROSECUTOR´S OFFICE, COURT OR ANY COMPETENT BODY ARISING FROM AN INCIDENT RELATED TO THE PERFORMANCE OF OFFICIAL DUTY, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Provides legal assistance to any officer or uniformed personnel of the AFP, BFP, BJMP, PCG, or PNP facing criminal, civil or administrative charge or case involving service-related incidents before a prosecutor´s office, court, administrative body, or any competent body or tribunal. Entitles government lawyer the payment of actual travel and other expenses, including Special Counsel Allowance, subject to existing laws, rules and regulations. Allows officer or uniformed personnel of the AFP, BFP, BJMP, PCG, or PNP to be provided with private counsel at the expense of the government, when necessary, as determined by the Chief of Staff of the AFP, the Chief of the BFP, the Chief of the BJMP, the Commandant of the PCG, or the Chief of the PNP. Applies to all officers and uniformed personnel of the AFP, BFP, BJMP, PCG, or PNP who have pending cases involving service-related incidents before the prosecutor´s office, the courts, or any-quasi-judicial or administrative body."
