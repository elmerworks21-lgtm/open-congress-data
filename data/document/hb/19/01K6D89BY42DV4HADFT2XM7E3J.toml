congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 9184, OTHERWISE KNOWN AS THE \"GOVERNMENT PROCUREMENT REFORM ACT\" AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes for the following provisions: mandatory inclusion of the procurement plan and purchase priority in the annual development plan, the inclusion of the list of requirements in the posting and publication of the invitation to bid, upgrading the Philippine Government Electronic Procurement System (PhilGEPS) and establishment of the electronic bidding process. Seeks to introduce Best Value Procurement (BVP); adoption of Global Open Data Contracting Standards; promotion of Sustainable Public Procurement; support to Inclusive Public Procurement, which incentivizes the participation of MSMEs in government procurement; and institutionalization of a Procurement Academy, among others."
