congress_website_title = "AN ACT ESTABLISHING THE AGRICULTURE INFORMATION SYSTEM IN ALL CITIES AND MUNICIPALITIES"
congress_website_abstract = "Aims to improve the country´s agricultural planning process by establishing a computer database with an up-to-date inventory of all agricultural commodities available in the various local communities - where information on the demand is gathered simultaneously with the production data from farmers in every barangay as the platform for marketing nationwide. Mandates LGUs to gather and consolidate all pertinent data on the profile and demographics of farmers and buyers - to store these in their respective AIS, and to facilitate the free registration of all farmers, fisherfolks, and buyers transacting within their corresponding areas in the information system."
