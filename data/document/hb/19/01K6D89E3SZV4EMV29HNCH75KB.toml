congress_website_title = "AN ACT INSTITUTIONALIZING THE DEPARTMENT OF SOCIAL WELFARE AND DEVELOPMENT SUSTAINABLE LIVELIHOOD PROGRAM (DSWD-SLP)"
congress_website_abstract = "Describes SLP as a community-based capability-building program for poor, vulnerable, and marginalized households and communities that aims to help improve their socio-economic conditions through accessing and acquiring necessary assets to engage in and maintain thriving livelihoods; to ensure that current and existing Pantawid Pamilyang Pilipino Program (4Ps) households/National Household Targeting System for Poverty Reduction (NHTS-PR) Listahanan and the Magna Carta of the Poor (RA11291) - identified individuals, groups and sectors can access resources and establish micro and small scale enterprises that could help support basic subsistence of the household or secure a source of income through basic employment; and to enhance and harness the inherent entrepreneurial skills and potentials of said target individuals by providing additional capital."
