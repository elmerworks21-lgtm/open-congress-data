congress_website_title = "AN ACT MODERNIZING THE BUREAU OF IMMIGRATION BY DEFINING ITS POWERS AND FUNCTIONS, FURTHER PROFESSIONALIZING ITS ORGANIZATION, UPGRADING THE COMPENSATION AND BENEFITS OF ITS OFFICIALS AND EMPLOYEES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to comply with the obligations and standards set by the international law in the admission or exclusion of foreign nationals. Promotes international order and justice by denying the use of Philippine territory to persons who are engaged or likely to engage in terrorism, human smuggling and trafficking, criminal and other nefarious activities. Harmonizes existing immigration rules and regulations pertaining to issuance of visas to foreign nationals. Seeks to upgrade the qualifications and raises salaries of immigration service officers and personnel to be at least at par with other government agencies under the Department of Justice. Creates an Immigration Trust Fund (ITF) which shall be sourced from thirty percent (30%) of the immigration fees, fines and penalties, and other income that may be collected by the Bureau for the effective implementation of this Act, provided it does not exceed One billion two hundred million pesos (P1,200,000,000.00) every year."
