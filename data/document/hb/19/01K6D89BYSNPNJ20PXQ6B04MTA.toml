congress_website_title = "AN ACT PROVIDING FOR A FREE ANNUAL MEDICAL CHECK-UP FOR FILIPINOS AND APPROPRIATING FUNDS THEREFORE"
congress_website_abstract = "Seeks to entitle all Filipino citizens (by virtue of their membership in PhilHealth mandated under “Universal Health Care Law”), to a free medical check-up in any government hospital, that shall include blood sugar and cholesterol tests. Laboratory and diagnostic tests shall be expanded, subject to the availability of PhilHealth funds."
