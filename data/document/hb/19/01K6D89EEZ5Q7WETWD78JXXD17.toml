congress_website_title = "AN ACT AMENDING SECTIONS 4 AND 9 OF REPUBLIC ACT NO. 7309, ENTITLED “AN ACT CREATING A BOARD OF CLAIMS UNDER THE DEPARTMENT OF JUSTICE FOR VICTIMS OF UNJUST IMPRISONMENT OR DETENTION AND VICTIMS OF VIOLENT CRIMES AND FOR OTHER PURPOSES”"
congress_website_abstract = "Proposes to amend the amount of compensation that victims can receive for up to P50,000.00 per month, to raise the maximum amount of claims to P500,000.00, and introduce a provision that automatically reviews the compensation amounts every three years. States that “THE BOARD SHALL . . . REVIEW AND WHEN NECESSARY ADJUST THE AMOUNT OF THE AWARD CEILING . . . TAKING INTO ACCOUNT THE PRESENT CONSUMER PRICE INDEX AS PUBLISHED BY THE PHILIPPINE STATISTICS AUTHORITY (PSA) AND OTHER RELEVANT ECONOMIC INDICATORS, . . . Seeks to increase the subsequent annual funding to THREE PERCENT (3%) of the net income of the PAGCOR and THREE PERCENT (3%) of the proceeds and sales and other disposition and military camps in Metro Manila by the Bases Conversion and Development Authority."
