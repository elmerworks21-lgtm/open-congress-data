congress_website_title = "AN ACT ADJUSTING THE MINIMUM AMOUNT FOR DEATH INDEMNITY, MORAL AND EXEMPLARY DAMAGES UNDER REPUBLIC ACT NO. 386 OR THE CIVIL CODE OF THE PHILIPPINES"
congress_website_abstract = "Amends Article 2206 of the Civil Code to read as follows; “Art. 2206. The amount of damages for death caused by a crime or quasi-delict SHALL BE AT LEAST THREE HUNDRED THOUSAND PESOS, even though there may have been mitigating circumstances. THE COURT, IN ITS DISCRETION, MAY AWARD A HIGHER AMOUNT, BASED ON THE RATE OF INFLATION AND THE CIRCUMSTANCES OF EACH CASE, . . .\" Amends Article 2216 of the same Act to read as follows: “Article 2216. No proof of pecuniary loss is necessary in order that moral, nominal, temperate, liquidated or exemplary damages, may be adjudicated. The assessment of such damages . . . PROVIDED, THAT THE AMOUNT OF MORAL AND EXEMPLARY DAMAGES SHALL BE AT LEAST TWO HUNDRED THOUSAND PESOS IN CASE OF DEATH RESULTING FROM A CRIME OR QUASI-DELICT. THE COURT, IN ITS DISCRETION, MAY AWARD A HIGHER AMOUNT BASED ON PREVAILING CIRCUMSTANCES AND THE RATE OF INFLATION.”"
