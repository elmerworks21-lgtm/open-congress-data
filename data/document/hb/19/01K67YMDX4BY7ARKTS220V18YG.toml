congress_website_title = "AN ACT PROVIDING FOR THE RIGHTS OF INFORMAL AMBULANT VENDORS"
congress_website_abstract = "Aims to recognize the significant contribution of informal ambulant vendors to the economy, safeguard their livelihoods, and promote their welfare. Requires all informal ambulant vendors to register with the city, municipality, or barangay where they are vending or intend to vend within the territorial jurisdiction of such city, municipality or barangay. Provides the rights of informal ambulant vendors such as 1.) Right to renewal of registration as informal ambulant vendors for such designated vending place, subject to said person´s continued qualifications as an informal ambulant vendor; 2.) Right to security of tenure in the designated vending place as assigned by the concerned LGU; c.) Right to be recognized in other LGUs upon securing a prior certificate from the other LGU; and d.) Right to social protection and safety nets, labor markets programs, and social welfare interventions such as social security, health care, and insurance. Mandates the City or Municipal Mayor to establish a Local Inter-Agency Council through an appropriate local ordinance which shall be responsible for coordinating efforts to ensure the security and protection of registered informal ambulant vendors. Provides that registered informal ambulant vendors shall not be arbitrarily deprived of their vending sites nor their stall demolished without due process of law. Requires all registered informal ambulant vendors to comply with basic health and safety standards to be established by the concerned LGU in coordination with the Local Inter-Agency Council in accordance with RA 11058."
