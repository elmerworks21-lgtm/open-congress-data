congress_website_title = "AN ACT ESTABLISHING AN ACADEMIC RECOVERY AND ACCESSIBLE LEARNING PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to ensure that all learners who are struggling in their lessons shall attain the most essential learning competencies especially in reading, mathematics, and science. Covers the Most Essential Learning Competencies (MELCs) under the K to 12 Basic Education Curriculum covering the subjects of Language and Mathematics for Grades 1 to 10, and Science for Grades 3 to 10. Mandates tutors under the ARAL program to be responsible for conducting the lessons to ensure the learners´ attainment of the MELCs of the respective subjects. Prescribes that tutorial sessions shall be conducted under the following delivery modes: a. face-to-face tutorials; b.) online tutorials; and c.) blended learning, where a specified number of tutorial sessions include online and face-to face tutorials. Exempts grants, bequests, endowments, donations and contributions to the ARAL Program of the DepEd from the payment of the donor´s tax and the cost of which shall be considered as an allowable deduction from computation of the income tax of the donor in accordance with the provisions of the National Internal Revenue Code of 1997, as amended."
