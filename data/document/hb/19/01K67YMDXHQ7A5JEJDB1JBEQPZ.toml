congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE FISCAL AUTONOMY FOR THE JUDICIARY, CREATING FOR THE PURPOSE THE JUDICIARY TRUST FUND"
congress_website_abstract = "Seeks to affirm and strengthen the constitutional mandate and powers of the Judiciary as a co-equal branch of government. Establishes the Judiciary Trust Fund for the use and operation of the Judiciary particularly to grant or augment allowances and other benefits to members and personnel of the Judiciary and to finance the acquisition, maintenance, and repair of office equipment and facilities. Grants the Chief Justice of the Supreme Court to administer and allocate the Judiciary Trust Fund and to approve and authorize disbursements and expenditures of the same in accordance with the guidelines set in this Act and its implementing rules and regulations. Authorizes the Chief Justice of the Supreme Court to realign the budget from one expense account to another, except the Capital Outlays, or from one functional unit or category to another, without the need for the approval of the Department of Budget and Management (DBM). Authorizes the Supreme Court to determine the number and positions of court personnel necessary for the effective functioning of the Judiciary, within the limits of approved appropriations and guided by constitutional and legislative policies on hiring and compensation. Incorporates the budget proposal prepared by the Supreme Court in the National Expenditure Program (NEP) without any revision."
