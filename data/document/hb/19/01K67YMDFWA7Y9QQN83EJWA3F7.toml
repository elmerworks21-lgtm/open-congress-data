congress_website_title = "AN ACT REINSTITUTING ABSOLUTE DIVORCE AS AN ALTERNATIVE MODE FOR THE DISSOLUTION OF MARRIAGE"
congress_website_abstract = "Provides key provisions regarding the following: Grounds upon which a petition for absolute divorce may be filed (legal separation Art.55 of the Family Code, as modified; separation of the spouses in fact for at least five (5) years . . . , and reconciliation is highly improbable; Psychological incapacity; Irreconcilable differences; Domestic or marital abuse to include act under VAWC); dissolution by the proper matrimonial tribunal . . .; Summary Judicial Proceedings; expeditious and affordable court proceedings; Overseas Filipino petitioner´s priority of hearing; 60-day cooling-off period; care and custody of minor children and those under seven (7) years of age; protection of the spouses´ respective legitime, termination and liquidation of the conjugal partnership of gains or the absolute community, and alimony. . .; presumptive legitime to the common children; appointment of a competent third party administrator for absolute community or conjugal partnership property; conversion of pending petitions”¦ into absolute divorce without paying filing fees; pre-nuptial, reconciliatory phase or cooling-off counseling, and postnuptial programs and activities; assistance to victims of abuse through a community-based women´s desk; DSWD with DOJ, PCW, the NYC as implementors."
