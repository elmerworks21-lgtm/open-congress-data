congress_website_title = "AN ACT AMENDING ARTICLE 2180 OF REPUBLIC ACT NO. 386, OTHERWISE KNOWN AS THE CIVIL CODE OF THE PHILIPPINES, TO INCLUDE ACADEMIC EDUCATIONAL INSTITUTIONS"
congress_website_abstract = "Seeks to amend article 2180 of the Civil Code to read as follows: “Article 2180. The obligation imposed by article 2176 is demandable not only for one´s own acts or omissions, but also for those of persons for whom one is responsible . . . Lastly, teachers or heads of establishments of arts and trades OR ACADEMIC EDUCATIONAL INSTITUTIONS shall be liable for damages caused by their pupils and students or apprentices, so long as they remain in their custody . . .”. Note: “Article 2176. Whoever by act or omission causes damage to another, there being fault or negligence, is obliged to pay for the damage done”."
