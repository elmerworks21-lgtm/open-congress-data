congress_website_title = "AN ACT STRENGTHENING THE MECHANISM FOR LAND USE DEVELOPMENT AND INFRASTRUCTURE PLANNING AND BUDGETING FOR STATE UNIVERSITIES AND COLLEGES (SUCs), AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 11396, OTHERWISE KNOWN AS THE ``SUCs LAND USE DEVELOPMENT AND INFRASTRUCTURE PLAN (LUDIP) ACT”, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to improve the manner by which state universities and colleges (SUCs) formulate their respective land use development and infrastructure plans (LUDIPs) which covers a five-year period and shall contain priority infrastructure projects. Provides that the preparation and implementation of the LUDIP shall be a requirement for the approval of infrastructure projects in SUCs. Mandates the CHED to include the LUDIP of each SUC in a five-(5)-year comprehensive LUDIP for all compliant SUCs within one (1) year from the receipt thereof and submit it to Congress and other government agencies concerned to guide the allocation of funds for the land use and infrastructure projects of the SUCs on an annual basis. Mandates all government department, agencies, offices, and instrumentalities to extend all possible assistance and cooperation to all SUCs in the preparation of their LUDIP."
