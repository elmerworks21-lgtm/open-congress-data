congress_website_title = "AN ACT REGULATING AVIATION PRACTICES FOR THE PROTECTION OF PASSENGERS, AND PENALIZING ACTS IN VIOLATION THEREOF"
congress_website_abstract = "Seeks to protect air passengers from unfair practices and deceptive machinations in the aviation industry that violate their rights; Aims to address unjust practices to avoid personal inconvenience, missed opportunities, and economic consequences that the passengers may have to endure. Proposes several guidelines and procedures regarding overbooking, rebooking, canceled flights, delayed flights, refunds, travel funds, and damaged, delayed, and lost luggage. Enumerates specific reasons when an air passenger can be denied boarding; Provides for several processes and corresponding compensation when a passenger can be denied boarding due to overbooking either voluntarily or involuntarily."
