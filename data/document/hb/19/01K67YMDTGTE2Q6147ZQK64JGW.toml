congress_website_title = "AN ACT PROVIDING FOR FREE FREIGHT SERVICES IN THE TRANSPORTATION OF RELIEF GOODS TO CALAMITY-STRICKEN AREAS"
congress_website_abstract = "Aims to strengthen existing mechanisms to facilitate quick responses to the demands and needs of the citizens during disasters and emergencies. Directs the National and Regional Logistics Cluster led by the Office of Civil Defense (OCD), in coordination with the Department of Transportation (DOTr) and in partnership with the Philippine Postal Corporation (PPC), freight companies, common carriers, private carriers, freight forwarders, and other companies providing logistic services in the Philippines to provide freight services to duly registered relief organizations in the transportation of emergency relief goods and donated articles to areas declared to be in a state of calamity by the President or by a local government unit (LGU). Grants common carriers, private carriers, and other logistics companies mandated to provide free freight services for the transportation of relief goods one hundred percent (100%) additional deduction from gross income of the amount of the cost incurred for the service provided, including the actual cost of salaries and allowances of personnel directly involved in transporting the relief goods."
