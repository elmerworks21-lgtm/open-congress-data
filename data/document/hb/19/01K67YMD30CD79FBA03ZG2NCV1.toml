congress_website_title = "AN ACT PRESCRIBING THE GUIDELINES FOR THE ESTABLISHMENT AND OPERATION OF LOCAL UNIVERSITIES AND COLLEGES"
congress_website_abstract = "Aims to prescribe mandatory guidelines on the establishment of local collages and the conversion of local collages into universities to achieve a standard and integrated system of higher education, provide the appropriate direction in their governance, and ensure that they will deliver quality and relevant education to students. Provides for the establishment of a local Higher education institution (HEI) to be known as a local college or dalubhasaan to be operated by the LGU through an ordinance duly enacted by the sanggunian with consultation with the Commission on Higher Education. Grants the CHED to exercise supervisory power to monitor, inspect, evaluate, and provide assistance to local universities and colleges and to devise ways and practices that will ensure that the LUCs will remain committed to the delivery of quality education to its students. Provides for the leadership structure of the Local Higher Education Institutions and Local Universities and Colleges and their duties and powers of the Board."
