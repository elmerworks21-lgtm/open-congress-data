congress_website_title = "AN ACT CREATING THE WEST PHILIPPINE SEA AUTHORITY, PRESCRIBING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to create a government office that will have primary jurisdiction over the development, conservation and utilization of all resources in the West Philippine Sea Exclusive Economic Zone to maximize the region's potential for generating revenue from the capture of fish and related products, processing and marketing of all fisheries and aquatic products, marine energy exploration and development, coastal and marine tourism within its jurisdiction. Proposes strategies in developing the region and all its natural riches and provides for the powers and functions of the Authority, among others."
