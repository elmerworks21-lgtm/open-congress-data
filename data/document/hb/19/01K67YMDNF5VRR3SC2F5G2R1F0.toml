congress_website_title = "AN ACT PROVIDING FOR THE REDEVELOPMENT OF CONDOMINIUMS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 4726, AS AMENDED, OTHERWISE KNOWN AS \"THE CONDOMINIUM ACT\""
congress_website_abstract = "Aims to establish livable communities that provide equitable, inclusive, and resilient opportunities for the improvement of human well-being while contributing to the economic viability of the community; ensure the safety and integrity of existing and future condominium developments to protect the public against hazards of aged buildings that pose threats to the owners and the general public and; establish rules for the maintenance, repair, reconstruction, and redevelopment of condominium projects, ensuring that the property rights of unit owners are respected while addressing the needs of the community and improving the overall quality of life of Filipinos."
