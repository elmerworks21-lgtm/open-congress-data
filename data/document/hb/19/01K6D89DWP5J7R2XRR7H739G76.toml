congress_website_title = "AN ACT TO ENHANCE CITIZENS' ACCESS TO GOVERNMENT INFORMATION AND SERVICES BY REQUIRING ALL GOVERNMENT OFFICES TO ADOPT PLAIN LANGUAGE IN ALL ITS WRITTEN COMMUNICATIONS TO THE PUBLIC, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims for a more responsive, accessible, and understandable government communication with the public founded on principles of transparency, public participation, and collaboration; Intends to provide an effective engagement and understanding in all government offices to adopt the use of plain language in English, Filipino and or other regional languages Proposes that documents written in plain language that are inherently complex and, therefore, more accessible to all, including those with limited literacy skills; Seeks to include the Anti-Red Tape Authority, Governance Commission for GOCCs (GCG), DILG, AND PIA among the agencies that the CSC is mandated to collaborate with in implementing this Act."
