congress_website_title = "AN ACT CONFIRMING AND DECLARING THE VALIDITY OF EXISTING TRANSFER CERTIFICATES OF TITLE AND RECONSTITUTED CERTIFICATES COVERING FRIAR LANDS"
congress_website_abstract = "These friar lands cover approximately 164,127 hectares in Laguna, Bulacan, Cavite, Bataan, Cebu, Rizal, Isabela, and Mindoro. Seeks to address controversies involving the validity of the acquisition of these friar lands and the integrity of the Torrens system. Aims to resolve the issue that friar lands records and Torrens titles have suffered damage or loss due to wars, floods, fires, and other force majeure events to the prejudice of the present title holders."
