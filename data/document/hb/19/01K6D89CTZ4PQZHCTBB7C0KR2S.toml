congress_website_title = "AN ACT EXPANDING THE GROUNDS OF REMOVAL AND/OR CANCELLATION OF PARTY-LIST REGISTRATION, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO 7941, OTHERWISE KNOWN AS \"AN ACT PROVIDING FOR THE ELECTION OF PARTY-LIST REPRESENTATIVES THROUGH THE PARYT-LIST SYSTEM, AND APPROPRIATING FUNDS THEREFOR,\" OR THE PARTY-LIST SYSTEMS ACT"
congress_website_abstract = "Proposes to amend Sec.6 of the Party-List Systems Act to read as follows; Sec. 6. Removal and/or Cancellation of Registration. - The COMELEC may motu propio or upon the verified complaint of any interested party, remove or cancel, after due notice and hearing, the registration of any national, regional, or sectoral party, organization, or coalition on any of the following grounds: . . . ITS REGISTERED NAME, INCLUDING ITS NAME ON THE BALLOT, IS CONFUSINGLY SIMILAR OR IS A PERCEIVABLE COLORABLE IMITATION OF THE NAME OF AN ALREADY REGISTERED PARTY-LIST."
