congress_website_title = "AN ACT INSTITUTIONALIZING AND STRENGTHENING THE NATIONAL CYBERSECURITY INTER-AGENCY COMMITTEE CREATED UNDER EXECUTIVE ORDER NO. 95 (S.2019), RENAMING IT TO NATIONAL CYBERSECURITY COUNCIL, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to address the growing challenges posed by cyber threats in the country and provide for the mandatory reporting of data breaches by government institutions and GOCCs. Proposes to rename the National Cybersecurity Inter-Agency Committee into the National Cybersecurity Council (NCC), which shall be the primary authority responsible for cybersecurity-related matters. Provides for NCC´s functions, among others:Â assessment of the country´s cybersecurity vulnerabilities; capacity building in response to cybersecurity threats and emergencies; security protocols´ regular update in the storage, handling, and distribution of all forms of digital and electronic documents and communications; a public-private partnership in the field of information sharing involving cyberattacks, threats and vulnerabilities to cyber threats."
