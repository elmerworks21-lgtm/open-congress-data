congress_website_title = "AN ACT EXPANDING EMPLOYMENT OPPORTUNITIES FOR SENIOR CITIZENS AND PROVIDING ADDITIONAL INCENTIVES TO PRIVATE ENTITIES, FURTHER AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7432, AS AMENDED, ENTITLED “AN ACT TO MAXIMIZE THE CONTRIBUTION OF SENIOR CITIZENS TO NATION BUILDING, GRANT BENEFITS AND SPECIAL PRIVILEGES AND FOR OTHER PURPOSES”"
congress_website_abstract = "Aims to provide available job opportunities to senior citizens who have the qualifications, capacity, and interest to be employed. Provides private entities who shall employ senior with an additional deduction from their gross income equivalent to twenty-five percent (25%) of the total amount paid as salaries and wages, benefits, and trainings provided to senior citizens subject to the provision of Section 34 of the NIRC, as amended. Mandates the Department of Labor and Employment, in coordination with Technical Education and Skills Development Authority (TESDA), Department of Trade and Industry (DTI) and the Civil Service Commission (CSC) to assess, design, implement, monitor and evaluate training programs that provide skills and welfare or livelihood support for senior citizens. Directs all government agencies and instrumentalities, including government-owned and controlled corporations, local government units, and government hospitals to waive fees and charges from senior citizen jobseekers such as police clearance certificate, NBI clearance, barangay clearance, medical certificate from a public hospital, birth certificate, marriage certificate, proofs of identification, and other documents issued by the government that may be required by employers from job applicant."
