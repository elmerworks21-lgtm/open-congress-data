congress_website_coauthors_raw = ["DALIPE, MANUEL JOSE M.","GARCIA, PABLO JOHN F.","GALEOS, EDSEL","DIONISIO, ERNESTO JR. M.","ROBES, FLORIDA \"Rida\" P.","PRIMICIAS-AGABAS, MARLYN L.","LOYOLA, ROY M.","MARCOS, SANDRO","RODRIGUEZ, LEO","MERCADO-REVILLA, LANI","BARONDA, JULIENNE \"Jam\"","TARRIELA, ODIE","ROMUALDO, JURDIN JESUS M.","MATIBAG, ANN AMB","SUAREZ, DAVID \"Jay-Jay\" C.","ADIONG, ZIAUR-RAHMAN ALONTO ADIONG"]
congress_website_committee_codes = ["0532","K503"]
congress_website_primary_keys = [138763]
congress_website_title = "AN ACT CREATING A SUSTAINABLE FISCAL FRAMEWORK FOR THE PENSION SYSTEM OF THE MILITARY AND UNIFORMED PERSONNEL, PROVIDING MECHANISMS FOR THE DISPOSITION OF GOVERNMENT ASSETS FOR THE PURPOSE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to secure and guarantee the sustainability of the pension system for the Military and Uniformed Personnel (MUP) by establishing a fiscal framework that supports their funding requirements. Provides for the following, among others: 1. monthly retirement pay of fifty percent (50%) of the base pay and longevity pay of the grade next higher than the permanent grade last held by the personnel in case of twenty years in active service with an increase by two and one-half percent (2.5%) for every year of active service beyond twenty years to a maximum of ninety percent (90%) for thirty-six years of active service and over; 2. MUP who separate and resigns from the service before reaching twenty (20) years of satisfactory active service shall receive a separation pay equivalent to one month base pay plus longevity pay of the permanent grade of MUP holds at the time of separation for every year of active service; 3. Subjects the pension of retired MUP and survivorship pension of survivors to an automatic indexation of not exceeding fifty percent (50%) of the increase in the base pay of the MUP in active service holding the same rank during the same year. Provides for two (2) MUP trust funds such as a.) Armed Forces of the Philippines (AFP) Trust Fund; and b.) Uniformed Personnel Services (UPS) Trust Fund. Grants assistance to indigent pensioners which shall be financed out of the AFP Trust Fund and the UPS Trust Fund. Exempts MUP Trust Funds, its assets, revenues, including all accruals, and benefits paid from all taxes, assessments, fees, charges, or duties of all kinds."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=19&q=HBN-8969"
