congress_website_title = "AN ACT AMENDING SECTION 5 OF REPUBLIC ACT NO. 9367, OTHERWISE KNOWN AS THE \"BIOFUELS ACT OF 2006\""
congress_website_abstract = "Declares it the policy of the State to protect the public interest by providing reasonably-priced petroleum products to consumers . . . to ensure the delivery of affordable fuel to the public. Seeks to reduce the retail pump price of fuel by allowing the President to suspend the implementation of Sec.5 of RA No.9367, or any part thereof, through an E.O., for a period not longer than one (1) year, if as a result of such implementation, the price of blended gasoline and/or diesel engine fuels will be higher by at least five percent (5%) compared to pure gasoline and/or diesel engine fuels."
