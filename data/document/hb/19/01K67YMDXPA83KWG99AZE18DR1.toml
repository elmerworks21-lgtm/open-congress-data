congress_website_title = "AN ACT PROMOTING INVESTMENTS IN LOW CARBON ECONOMY, ESTABLISHING FOR THIS PURPOSE A CARBON EMISSION PRICING FRAMEWORK AND IMPLEMENTATION MECHANISM TO ACHIEVE LOW CARBON AND CLIMATE-RESILIENT ECONOMIC DEVELOPMENT"
congress_website_abstract = "Aims to achieve the country´s national climate targets by instituting a comprehensive carbon emission pricing framework and implementing mechanisms that drive greenhouse gas (GHG) emissions reduction, enhance climate resilience, and foster sustainable economic growth. Institutionalizes the Philippine Greenhouse Gas Inventory System (PGHGIS) designed to enable Philippines to transition towards a climate-resilient pathway, promoting the avoidance, reduction, and removal of emissions for sustainable development. Mandates the Climate Change Commission (CCC) to institutionalize the National Integrated Climate Change Database and Information Exchange System (NICCDIES) as the primary platform for climate change and resilience information. Establishes the Nationally Determined Contribution (NDC) which shall serve as the Philippines´ long-term roadmap for GHG mitigation and climate resilience, outlining the country´s commitments to reducing emissions and adapting to climate impacts. Establishes a comprehensive Monitoring, Reporting, and Verification (MRV) system to track mitigation outcomes and the accomplishments of the NDC. Mandates all covered enterprises to prepare a decarbonization plan aligned with the objectives to limit global temperature rise to below two degrees Celsius (2Â°C) above pre-industrial levels, with the goal of achieving net-zero emissions by 2050. Provides the methodology for pricing carbon emissions based on mitigation cost component and preventive resilience cost component. Requires all covered enterprises to submit an Annual Compliance Report to the DENR containing emissions baseline and reduction progress, reduction activities and outcomes, emissions allowance and excess emissions, allocation of decarbonization funds, and future plans."
