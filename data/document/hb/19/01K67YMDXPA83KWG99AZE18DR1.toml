congress_website_coauthors_raw = ["DALIPE, MANUEL JOSE M.","PRIMICIAS-AGABAS, MARLYN L.","DIONISIO, ERNESTO JR. M.","VIOLAGO, JOSEPH GILBERT F.","ESCUDERO, DETTE"]
