congress_website_title = "AN ACT IMPROVING THE DELIVERY OF SOCIALIZED HOUSING PROGRAMS, AMENDING FOR THE PURPOSE SECTIONS 10, 18, AND 20 OF REPUBLIC ACT NO. 7279, OTHERWISE KNOWN AS THE \"URBAN DEVELOPMENT AND HOUSING ACT OF 1992\", AS AMENDED BY REPUBLIC ACT NO. 10884, OTHERWISE KNOWN AS THE \"BALANCED HOUSING DEVELOPMENT PROGRAM AMENDMENTS\""
congress_website_abstract = "Amends Section 10 of RA 7279 as amended by RA 10884 by including the direct purchase and unsolicited proposals as provided under the Public-Private Partnership (PPP) Act as modes of land acquisition and creation of socialized housing programs and projects. Amends Section 18 by providing that owners or developers of proposed Housing Development Projects specified in the Framework plan shall be required to develop an area for socialized housing equivalent to at least fifteen percent (15%) of the Total Project Area or cost for subdivisions or villages and at least five percent (5%) of condominium or vertical housing area or project cost. Amends Section 20 by providing the manner and more mode of incentives to the private sector for the purpose of Socialized Housing to encourage greater private sector participation and further reduce the cost of housing units for the benefit of the underprivileged and homeless."
