congress_website_title = "AN ACT INSTITUTIONALIZING AND EXPANDING THE NATIONAL EMPLOYMENT RECOVERY STRATEGY TO A JOBS CREATION PLAN AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Intends to recover the labor market adversely affected by the pandemic - creates the Inter-Agency Council (IAC) for Jobs and Investments that shall formulate the Job Creation Plan (JCP) with clear action components, success measures, and performance indicators regarding the following: Micro, Small and Medium Enterprises ( M S M Es; unskilled workforce (youth and women); job and skills mismatch; employer/other private sector organizations/industry stakeholders that offer technology, upskilling, and reskilling; apprenticeship and other similar activities geared towards the improvement of the workforce; the transition of workers from the informal to the formal economy through business registration assistance; priority sectors, key and emerging industries and other areas with high employment potential to encourage domestic investment and financing direct investment; active labor market policies, and progress (job matching services/digitalizing to reach more workers; participation/representation of the youth, women, and workers in the informal economy; social security and welfare benefits to workers in the informal economy; ethical and fair recruitment to protect the rights of migrant workers; national reintegration program for documented and undocumented OFWs.)"
