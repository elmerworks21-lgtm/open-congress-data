congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE ENVIRONMENTAL ASSESSMENT SYSTEM"
congress_website_abstract = "Seeks to resolve confusions and disagreements among project proponents, agencies, non-government organizations and other stakeholders resulting in the interpretation of PD 1586 of 1978 or the Philippine Environmental Impact Statement (EIS) System. Establishes the Environmental Assessment System (EAS) which shall cover Strategic Environmental Assessment (SEA) and Environmental Impact Assessment (EIA). The EAS shall be implemented for identifying, analyzing, evaluating, and managing any policy, plan, or program which has the potential for significant adverse impact on the environment. Retains, but streamline and rationalize, the current EIS System for projects deemed critical or tend to pose significant adverse impact on the environment such as heavy industries, major manufacturing industries, major resource-extractive and -intensive industries, and major infrastructure projects."
