congress_website_coauthors_raw = ["BOLILIA, LIANDA B.","GOMEZ, RICHARD","KHONGHUN, JEFFERSON F.","ATAYDE, ARJO","COLLANTES, MARIA THERESA V.","PRIMICIAS-AGABAS, MARLYN L.","DIONISIO, ERNESTO JR. M.","ABANTE, BIENVENIDO M.","DY, FAUSTINO \"INNO\" V A.","PUMAREN, FRANZ","VIOLAGO, JOSEPH GILBERT F.","VILLAFUERTE, LUIS RAYMUND \"LRAY\" JR. F.","BARONDA, JULIENNE \"Jam\"","NOLASCO, RAMON JR. C.","TUPAS, RAUL \"Boboy\" C.","LOYOLA, ROY M."]
congress_website_committee_codes = ["0522","0532"]
congress_website_primary_keys = [144495]
congress_website_title = "AN ACT FIXING THE TERM OF OFFICE OF BARANGAY AND SANGGUNIANG KABATAAN OFFICIALS AND CHANGING THE TERM OF OFFICE FROM THREE (3) YEARS TO SIX (6) YEARS, AMENDING FOR THE PURPOSE SECTIONS 42 AND 43 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AS AMENDED"
congress_website_abstract = "Sets the synchronized Barangay and Sangguniang Kabataan elections on the second Monday of May 2029 and every six (6) years thereafter. Extends the term of office of Barangay officials and Sangguniang Kabataan from three (3) years to six (6) years. Prohibits elective Barangay official to serve for more than two (2) consecutive terms in the same position. States that voluntary renunciation of the office for any length of time shall not be considered as an interruption in the continuity of service for the full term for which the elective Barangay official concerned was elected. Prohibits elective Sangguniang Kabataan official to serve for more than one (1) term. Provides that all incumbent Barangay and Sangguniang Kabataan officials elected last October 30, 2023 shall remain in office unless sooner removed or suspended for cause."
