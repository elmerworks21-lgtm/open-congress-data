congress_website_title = "AN ACT EXPANDING THE PURPOSES AND APPLICATION OF THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE SECTIONS 100 AND 272 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Proposes to prioritize in the annual school board budget, provisions for the a) construction/ maintenance of administration offices, assembly halls, laboratories and improvements; operation and maintenance; school uniforms; early childhood care and development program, among existing others. Seeks to allocate the proceeds of the additional one percent SEF Tax on real property for the following, among others: construction/maintenance of different facilities and school´s improvement; payment of compensation and other benefits to teaching and non-teaching personnel”¦; necessary extension classes; acquisition and titling of school sites; transport vehicles, equipment, and apparatus; books, periodicals, teaching aids, and instructional materials; educational researches, conferences, etc., sports development, other expenses necessary or incident to the operation and maintenance of public schools which are not sufficiently provided for in the regular appropriation of the Department of Education."
