congress_website_abstract = "Seeks to shield customers from criminal groups and online thieves who prey on bank accounts, e-wallets, and other financial accounts or seduce account holders into engaging in fraudulent activity. Intends to prohibit money mules, account takeover, phishing, and other social engineering schemes and declares the large-scale commission of such crimes as a form of economic sabotage."
