congress_website_title = "AN ACT CREATING A SUSTAINABLE FISCAL FRAMEWORK FOR THE PENSION SYSTEM OF THE MILITARY AND UNIFORMED PERSONNEL, PROVIDING MECHANISMS FOR THE DISPOSITION OF GOVERNMENT ASSETS FOR THE PURPOSE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Declares that the State shall ensure that there shall be an adequate, robust, and well-managed insurance system that shall adequately and sustainably support the needs of the military and uniformed personnel and their dependents; Proposes reforms to address several long-standing issues in the design of the MUP system related to the following: disability pension, mandatory contributions, fund administrator of MUP pension, pension indexation, other sources of funding, and tax treatment of the MUP Trust Fund."
