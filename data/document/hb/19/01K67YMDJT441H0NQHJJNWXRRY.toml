congress_website_title = "AN ACT PROVIDING FOR THE REVISED GOVERNMENT AUDITING CODE OF THE PHILIPPINES"
congress_website_abstract = "Provides for several key provisions in relation to the following topics: powers and functions of its officials and auditors; specialization of duties and responsibilities of each sectors?/auditors; custodial responsibility of the auditor using the digital copies of audited vouchers, etc.; competency-based capacity building/continuing education and participation in international institutions for audit and accounting fields; use and admission of electronic collection/ receipts/payments and other digitized transaction audit trails; jurisdiction over private entities and authority to examine public utilities and accounts of Public-Private Partnership (PPP); power of the Commission to adjudicate money claims against the government . . .; capacitates the Civil Society Organizations (CSOs) to help auditors . . . and monitoring projects that are located in remote/critical areas; accountability of an officer holding cash; institutionalizes the responsibility to submit report on the status of the finances of the country; disposal of unserviceable property of the government; limitations on cash advances, transfer of funds and advance payments; bonds for the accountable officer entrusted with the custody of government funds or property; internal control system to measure the capacity of the auditee in protecting government funds and property entrusted to him; penalties for impeding or delaying the efficient conduct of audit."
