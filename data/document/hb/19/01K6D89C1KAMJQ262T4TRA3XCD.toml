congress_website_title = "AN ACT CREATING THE ANTI-DRUG ABUSE COUNCILS (ADACS) IN ALL PROVINCES, CITIES, MUNICIPALITIES, AND BARANGAYS THROUGHOUT THE COUNTRY."
congress_website_abstract = "Proposes to employ a rehabilitative approach in dealing with the prevalence of illegal drug use to allow Persons Who Use Drugs (PWUDs) to have a decent life and a bright future. Tasks LGU to monitor anti-illegal drug programs and to serve as an information gathering organization for illegal drug use in their locality and make them responsible for the assessment, counseling, and referral of PWUDs who surrendered for treatment and rehabilitation to their facilities. Proposes medical, reformatory, and community-based drug rehabilitation programs and provides for the different duties and responsibilities."
