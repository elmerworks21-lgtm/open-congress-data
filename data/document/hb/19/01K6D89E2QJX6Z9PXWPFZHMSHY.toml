congress_website_title = "AN ACT AMENDING SECTION 240, ON ELECTIONS RESULTING IN TIE, OF BATAS PAMBANSA BLG. 881, AS AMENDED ALSO KNOWN AS THE OMNIBUS ELECTION CODE OF 1985"
congress_website_abstract = "Intends to do away with the practice of coin tossing/drawing of lots as tie-breakers in election cases resulting on a tie by transmitting the FINAL RESULTS TO THE SANGGUNIAN CONCERNED. . . SHALL HOLD A SPECIAL SESSION THREE DAYS AFTER RECEIVING THE TRANSMITTAL FROM THE BOARD OF CANVASERS at which the SANGGUNIAN shall BREAK THE TIE BY A MAJORITY VOTE and shall proclaim as elected the candidate who WILL be CHOSE BY THE VOTE OF A MAJORITY OF ALL MEMBERS OF THE SANGGUNIAN, . . . . . . FOR DISTRICT REPRESENTATIVE OR DISTRICT SANGGUNIAN MEMBER, ONLY THE MEMBERS OF THE SANGGUNIAN OF THAT DISTRICT WILL BE ALLOWED TO VOTE. IN CASES OF SENATORS, THE DULY ELECTED 23 SENATORS WILL VOTE AMONG THEMSELVES ON WHO WIL BE THE LAST SENATOR WHO WILL COMPLETE THEIR ROSTER."
