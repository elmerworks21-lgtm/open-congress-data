congress_website_title = "AN ACT INSTITUTIONALIZING THE NATIONAL POLICY ON ACCESS, AND BENEFIT-SHARING FROM THE UTILIZATION OF PHILIPPINE GENETIC RESOURCES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to implement our commitment to the Nagoya Protocol; Defines several terms such as Biopiracy, Bioprospecting, Biotechnology, Clearing house, and Genetic resources, among others: Genetic material refers to any material of plant, animal, microbial or other origin containing functional units of heredity. Proposes to create an Inter-Agency Committee on Genetic Resources and Associated Traditional Knowledge to harmonize, integrate, enhance, implement, and monitor our compliance with treaty, statutory and regulatory provisions on access and benefit sharing (ABS) and utilization of Philippine genetic resources."
