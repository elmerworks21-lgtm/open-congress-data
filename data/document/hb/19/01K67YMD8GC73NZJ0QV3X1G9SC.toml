congress_website_title = "AN ACT DECLARING THE MARITIME ZONES UNDER THE JURISDICTION OF THE REPUBLIC OF THE PHILIPPINES"
congress_website_abstract = "Seeks to establish the legal bases by which social, economic, commercial, and other activities may be conducted thereat. Delineates the territorial sea, contagious zone, exclusive economic zone, continental shelf, and extended continental shelf which will clear the exclusive rights and sovereign rights, as well as obligations, in each maritime zones. Provides for the necessary flexibility in the passage of subsequent laws pertinent to the rights and obligations to which Philippines is entitled and may exercise over its maritime zones."
