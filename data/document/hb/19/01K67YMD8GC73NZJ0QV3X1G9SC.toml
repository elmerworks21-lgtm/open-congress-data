congress_website_coauthors_raw = ["DALIPE, MANUEL JOSE M.","CASTRO, JANE T.","ROQUE, LAARNI","REVILLA, RAMON JOLO III B.","ACHARON, LORETO B.","VILLANUEVA, EDUARDO \"Bro. Eddie\" C.","REGENCIA, CELSO G.","ROMUALDEZ, FERDINAND MARTIN G.","MARCOS, SANDRO","FORTES, MANUEL JR. L.","ROBES, FLORIDA \"Rida\" P."]
congress_website_committee_codes = ["0513","0532"]
