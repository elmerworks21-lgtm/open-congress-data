congress_website_abstract = "Aims to liberalize the lease of lands by foreign investors; establish greater stability and predictability in long-term lease contracts for foreign investors; extend the maximum allowable lease period for foreign investors to ninety-nine (99) years, subject to certain conditions and requirements and; protect the rights of foreign investors by ensuring that lease agreements are honored and providing recourse for disputes."
