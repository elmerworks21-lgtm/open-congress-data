congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE CONSOLIDATION OF AGRICULTURAL LANDS, TITLING OF UNTITLED AGRICULTURAL LANDS, PROVIDING FOR POST-HARVEST FACILITIES TO RICE FARMERS, ESTABLISHING IDENTIFICATION SYSTEM TO LAND OWNER/FARMER AND AGRICULTURAL TENANTS AND FOR OTHER PURPOSES"
congress_website_abstract = "Tasks the DENR-Land Management Bureau to undertake a ten (10)-year program for the purpose of mapping, surveying, consolidating, and titling of all untitled agricultural land on a per province undertaking. Proposes to establish a state-of-the-art rice milling facilities and palay drying equipment in every province and provides state-of-the-art agricultural equipment and machinery to aid local farmers in producing a high variety of rice."
