congress_website_title = "AN ACT ACCORDING EQUAL RIGHTS TO WIVES AND HUSBANDS IN THE PHILIPPINES BY AMENDING ARTICLE 333, 334, AND 344 OF THE REVISED PENAL CODE"
congress_website_abstract = "Seeks to do away with gender-based discrimination by punishing acts of marital infidelity committed by either spouse. Provides that adultery and concubinage shall thereafter be sexual infidelity and maintaining a paramour, respectively. States that “ `PARAMOUR´ SHALL INCLUDE ANY PERSON WHO COHABITS WITH A MARRIED PERSON UNDER CIRCUMSTANCES WHERE THEY ASSUME AND EXERCISE TOWARD EACH OTHER THE RIGHTS AND PRIVILEGES WHICH PROPERLY BELONG TO PERSONS MARRIED TO EACH OTHER."
