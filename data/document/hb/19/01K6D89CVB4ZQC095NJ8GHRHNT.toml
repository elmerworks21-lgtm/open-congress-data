congress_website_title = "AN ACT ALLOWING THE DIRECT IMPORTATION OF SUGAR BY SUGAR-DEPENDENT BUSINESSES IN THE FOOD AND BEVERAGE INDUSTRY, AMENDING EXECUTIVE ORDER NO. 18 SERIES OF 1986"
congress_website_abstract = "Defines the terms “direct importation” and “sugar-dependent business.\" Intends to ensure that any importation will only address the needs of the food and beverage industry to protect sugar planters, millers, and consumers as well as to prevent any price spikes in the market. Proposes to “PRESCRIBE RULES AND REGULATIONS THAT MAY ALLOW THE DIRECT IMPORTATION OF SUGAR BY SUGAR-DEPENDENT BUSINESSES IN THE FOOD AND BEVERAGE INDUSTRY TO ADDRESS EMERGENCY SITUATIONS.\""
