congress_website_title = "AN ACT INSTITUTING A NATIONAL LAND USE POLICY, PROVIDING THE IMPLEMENTING MECHANISMS, CREATING FOR THE PURPOSE THE NATIONAL LAND USE COMMISSION, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to provide a policy for the rational and just allocation, utilization and management of our land resources including the parameters that will guide planning at the national and local levels. Proposes for the following: Provides a national framework for the development of the country´s land to ensure their optimum use, consistent with sustainable development principle; Creates the National Land Use Commission/Office; Establishes the composition of NLUC; Harmonizes existing rules and regulations governing the management of land resources; Addresses the vital issues of agrarian reform, climate change, national database and geo-hazard mapping and disaster risk reduction and management; Incentives and awards to LGUs that regularly updates their comprehensive land use plan, etc."
