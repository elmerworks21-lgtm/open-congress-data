congress_website_title = "AN ACT IMPOSING STIFFER PENALTIES FOR FALSIFICATION OF CERTIFICATES OF LAND TITLE OR ANY APPLICATION, DEED, INSTRUMENT OR SUPPORTING DOCUMENT, REASONABLY CONNECTED WITH AND CALCULATED TO CAUSE THE ISSUANCE OF A CERTIFICATE OF LAND TITLE, CLASSIFYING THE SAME AS HEINOUS OFFENSE INVOLVING ECONOMIC SABOTAGE IF THE VALUE OR AGGREGATE VALUE OF THE LAND IS AT LEAST TEN MILLION PESOS (P10,000,000.00), AMENDING FOR THE PURPOSE ARTICLES 171 AND 172 OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS, THE REVISED PENALCODE AND FOR OTHER PURPOSES."
congress_website_abstract = "Seeks to remedy and stop the nefarious practice of anomalously titling of land by increasing its penalty. . . Seeks to refer Certificate of Land Title to evidence of ownership issued pursuant to the order of the court over registered land or the muniment of title issued by a government administrative agency for the conveyance of some portion of public domain. It includes, but it is not limited to the Original Certificates of Title (OCT), Transfer Certificates of Title (TCT), Certificate of Land Ownership Awards (CLOA), Land Patents, Sales Patents, Homestead Patents, and Free Patents."
