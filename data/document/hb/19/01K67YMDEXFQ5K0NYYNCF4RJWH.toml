congress_website_committee_codes = ["0532","0542"]
congress_website_primary_keys = [13901]
congress_website_title = "AN ACT INSTITUTING REFORMS TO ENHANCE THE EFFICIENCY AND DYNAMISM OF THE PHILIPPINE CAPITAL MARKETS, AMENDING FOR THE PURPOSE SECTIONS 22, 24, 25, 121, 127, AND 190 OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Aims to boost the capital markets and the investment competitiveness of the Philippines, and create equality in the tax treatment of debt and stock securities by instituting the following: 1.) Reduction of the stock transaction tax from 0.6% to 0.1%; 2.) Reduction of the dividends tax to non-resident aliens from 25% to 10% to harmonize the cash and property dividends rate; 3.) Reduces the tax on Philippine Charity Sweepstakes and lotto winnings from 20% to 10%; and 4.) Reduces the documentary stamp tax on horse race ticket or PCSO lottery ticket from 20 % to 10%"
