congress_website_title = "AN ACT MANDATING SALARY OFFER TRANSPARENCY IN JOB ADVERTISEMENTS, PROHIBITING INQUIRY ON EMPLOYEE´S SALARY HISTORY, PROVIDING PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address the issue of wage inequality and promote more equitable and just compensation practices. Mandates covered employers, particularly private entities with ten or more employees, to disclose the minimum and maximum salary ranges for advertised job positions, promotions, or transfer opportunities. Seeks to ensure transparency in salary offers, prevent discrimination, and promote equality in employment opportunities."
