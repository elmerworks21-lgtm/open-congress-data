congress_website_title = "AN ACT STRENGTHENING THE FUNCTIONS OF THE NEGOSYO CENTERS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10644, OTHERWISE KNOWN AS THE “GO NEGOSYO ACT”"
congress_website_abstract = "Includes the following functions of the Negosyo Centers: 1.) the acceptance and facilitation of all registration application for business permits, licenses, other government requirements of MSMEs; 2.) to institutionalize the Mentor ME Program aimed at coaching the mentee-micro small enterprises on the different aspects of business operations. and 3.) the implementation of programs and services aimed at providing information and resources to rural business related to the marketing and exporting of their products or services to international markets for Negosyo Centers located outside highly urbanized cities and Metropolitan areas. Institutionalizes the Business Counsellors who have been trained to provide business registration assistance, business advisory services, and business information and advocacy to MSMEs in the Negosyo Centers. Mandates Negosyo Centers as rural export centers."
