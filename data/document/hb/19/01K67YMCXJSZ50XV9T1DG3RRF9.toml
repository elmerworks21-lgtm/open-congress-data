congress_website_title = "AN ACT DECLARING THE SIXTEENTH DAY OF MAY OF EVERY YEAR A SPECIAL WORKING HOLIDAY TO BE KNOWN AS THE NATIONAL EDUCATION SUPPORT PERSONNEL DAY"
congress_website_abstract = "Aims to declare the sixteenth (16th) day of every year a special working holiday in recognition of the observance of World Education Support Personnel Day. Encourages the heads of national government agencies, government-owned and controlled corporations involved in education, local government units, and employers in the private sector involved in education to allow their respective personnel to participate in any related activity to be held within the premises of their respective offices or establishments."
