congress_website_title = "AN ACT ESTABLISHING THE PUBLIC SCHOOLS OF THE FUTURE IN TECHNOLOGY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to establish the Public Schools of the Future in Technology (PSOFT) to provide Filipino students with the benefits of technological innovations which will prepare them for the challengers of future economic and employment realities. Aims to a.) establish an Interagency Taskforce to craft and implement the road map for the PSOFT; b.) institutionalize a program for the integration of digital technology and innovation in public basic education through the PSOFT Road Map; c.) identify key components of the PSOFT Road map; and d.) provide a public-private partnership (PPP) mechanism to facilitate the attainment of the objectives of the PSOFT Road Map."
