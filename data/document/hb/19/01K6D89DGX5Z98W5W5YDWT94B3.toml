congress_website_title = "AN ACT ESTABLISHING ENVIRONMENTAL UNITS IN EVERY LENDING INSTITUTION TO ASSESS THE ENVIRONMENTAL COMPONENT OF LOAN APPLICATIONS"
congress_website_abstract = "Seeks to encourage lending institutions to adopt a corporate environmental policy to support environmental protection and sustainable development and to mitigate credit risks arising from the adverse impact of loans and other projects for financing in the environment. Proposes several provisions, among others, regarding the following: a) compliance with the Environmental Impact Statement System under P.D. No. 1586 of any loan or related funding applications. . .; b) conformity with environment laws of projects which is the subject of financing applications and collateral offered as security (the basis for approval of loan accounts with environmental impact); c) periodic monitoring reports of DENR of projects/collateral; d) integration of environment assessment report into the project proposal and or loan application."
