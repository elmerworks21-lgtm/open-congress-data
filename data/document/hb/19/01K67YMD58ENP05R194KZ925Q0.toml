congress_website_title = "AN ACT CREATING A VAT REFUND MECHANISM FOR NON-RESIDENT TOURISTS, ADDING FOR THE PURPOSE A NEW SECTION 112-A TO THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Seeks to grant non-resident tourist a value-added tax (VAT) refund on goods purchased from accredited retailers in the Philippines if such goods are to be shipped out of the country within sixty (60) days from the date of the purchase, and the value amounts to at least Three Thousand Pesos (P3,000.00). States that the threshold may be adjusted considering the administration cost for the refund, the consumer price index, or other market conditions, as determined by the Secretary of Finance and upon the recommendation of the Secretary of Tourism and the Commissioner of Internal Revenue."
