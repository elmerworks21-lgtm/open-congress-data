congress_website_title = "AN ACT AUTHORIZING THE CITY OR MUNICIPAL CIVIL REGISTRAR AND THE CONSUL GENERAL TO CHANGE THE SEX AND THE FIRST NAME OF AN INTERSEX PERSON APPEARING IN THE CIVIL REGISTER WITHOUT THE NEED OF A JUDICIAL ORDER, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 9048 AND REPUBLIC ACT NO. 10172"
congress_website_abstract = "Proposes to insert a new Section No. 2 on the “Declaration of Principles” which encompasses topics related to the efficient and accessible civil registration system, the right to privacy, self-determination, and non-discrimination under the Equal Protection Clause and Bill of Rights provisions . . . Defines/redefines the term/s “clerical or typographical error\"; “sex characteristics”; andÂ “intersex” [an umbrella term used to describe a wide range of innate bodily variations in sex characteristics.Â Intersex people are born with physical sex characteristics such as sexual anatomy, reproductive organs, hormonal patterns, and/or chromosomal patterns) that do not fit the typical definition of male and female bodies. States that “For intersex people, the correction of sex and/or first name shall be made de jure applicable due to the inborn nature of their medical condition; Provided, that they are of legal age.”"
