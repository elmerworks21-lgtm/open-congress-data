congress_website_title = "AN ACT INTEGRATING A COMPREHENSIVE STUDY OF PHILIPPINE HISTORY DURING WORLD WAR II INTO THE HIGHER EDUCATION CURRICULUM"
congress_website_abstract = "Seeks to highlight the role of national heroes in the historical development of the country and educate the youth on the values of patriotism and nationalism and preserve for posterity the stories on the great struggle and heroism of Filipino soldiers who fought the Japanese occupational forces World War II. Mandates the Commission on Higher Education (CHED) in close collaboration with the Philippine Veterans Affairs Office-Department of National Defense (PVAO-DND) to develop a program to execute and implement the provisions of this Act. Encourages all higher education institutions to keep in their libraries adequate books, resources, and references materials on World War II as it transpired in the Philippines."
