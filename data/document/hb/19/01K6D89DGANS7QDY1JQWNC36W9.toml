congress_website_title = "AN ACT STRENGTHENING FURTHER THE ELECTRIC POWER INDUSTRY AMENDING FOR THE PURPOSE SECTIONS 1, 5, 6, 7, 8, 9, 20, 21, 22, 23, 26, 30, 34, 35 AND 37 OF REPUBLIC ACT NO. 9136, OTHERWISE KNOWN AS THE “ELECTRIC POWER INDUSTRY REFORM ACT OF 2001”"
congress_website_abstract = "Seeks to, among others, widen the sources of energy, encourage investors in the power industry, and modernize the distribution sector. Proposes several features, among others, the following: Energy Storage System; sales of generated power shall be value-added tax zero-rated; alignment of transmission sector to Public Service Act; Transco, power of an eminent domain; small off-grid areas/Transmission Dev´t Plan; transmission wheeling charges; Wholesale Electricity Spot Market (WESM) Governance Arm/Independent Market Operator; Universal Charge alignment with Murang Kuryente Act; PSALM Corp´s corporate life; Electric Cooperatives; National Power Corporation to adopt alternative and cost-effective technologies; and declaration of electric power crisis."
