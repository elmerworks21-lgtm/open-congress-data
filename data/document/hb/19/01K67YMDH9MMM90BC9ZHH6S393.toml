congress_website_coauthors_raw = ["DALIPE, MANUEL JOSE M.","BORDADO, GABRIEL JR. H.","PRIMICIAS-AGABAS, MARLYN L.","ESCUDERO, DETTE","LOYOLA, ROY M."]
congress_website_committee_codes = ["0529","0532"]
congress_website_primary_keys = [13604]
congress_website_title = "AN ACT PROHIBITING THE DEVELOPMENT, PRODUCTION, STOCKPILING, AND USE OF CHEMICAL WEAPONS, PROVIDING FOR THEIR DESTRUCTION, AND IMPOSING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Seeks to prohibit the State and all persons from developing, producing, manufacturing, acquiring, possessing, stockpiling, retaining, or using chemical weapons or engaging in any other activities prohibited under the Chemical Weapons Convention. Designates the Anti-Terrorism Council (ATC) as the Philippine National Authority on Chemical Weapons Convention (PNA-CWC), to be headed by the Executive Secretary as Chairperson. Provides penalties and sanctions for any person who violates this Act. In case the violation is committed by any partnership, corporation, association or juridical entity, the registration and license to operate shall be cancelled and revoked permanently and will be held criminally liable. Mandates the PNA-CWC to forfeit any chemical weapon found anywhere in the territory or in any other place under the jurisdiction of the Philippines to be destroyed or disposed of in accordance with existing environmental regulations or related applicable laws. Provides the mechanisms for the declaration, verification and inspection of toxic chemicals and their precursors."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=19&q=HBN-9571"

