congress_website_title = "AN ACT ESTABLISHING A “ONE TOWN, ONE TOURIST ATTRACTION PROGRAM” TO PROMOTE TOURISM AND SUSTAINABLE ECONOMIC DEVELOPMENT AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Tasks the DOT, DPWH, DICT, AND DENR, in partnership with the LGUs to provide the following assistance to cities and municipalities as regards to: a) identification of tourist destinations and cultural attractions; b) tourism action plan and program c) tourism roads, including the surrounding road networks; d) workshops/capability building re: potentials and opportunities of tourism for residents; e) securing permits, parameters and creation of a system to protect the environment andÂ preserve the culture and way of life of the locals; and f) tools and platform for promotion including multimedia campaigns, and local/international travel fairs. States that DOT and other agencies implementing OTAP shall prioritize cities and municipalities without tourism programs; provides that those with natural tourist destinations (caves, falls, rock formations, beaches and sanctuaries, and manmade structures) with potential tourist appeal, or those with unique and interesting cultural events and practices (unique fiesta celebrations, food hubs, and parades) may also receive appropriate assistance."
