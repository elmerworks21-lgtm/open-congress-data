congress_website_title = "AN ACT PROVIDING FOR THE FAIR USE OF THE INTERNET AND SOCIAL MEDIA FOR THE HOLDING OF FREE, ORDERLY, HONEST, PEACEFUL AND CREDIBLE ELECTIONS"
congress_website_abstract = "Seeks to regulate the use of internet and the social media as a lawful election propaganda. Empowers the COMELEC in the monitoring of partisan political activities and sets parameters in holding e-rallies and livestreams. Mandates contractors and business firms to submit certified true copies of all contracts, reports and receipts, and other documents, accompanied by all its digitization copies, to the COMELEC. Requires every person or firm to whom any payment for electoral expenditure has been made to file a written report within thirty (30) days after the conduct of the election which shall contain required information, accompanied with the official receipts issued to the person with whom the contractor or business firm had transacted. Authorizes the COMELEC to promulgate and furnish all political parties and candidates and all concerned entities the rules and regulations for the implementation of this act, consistent with the criteria established in Article IX-C, Section 4 of the Constitution and Section 86 of the Omnibus Election Code."
