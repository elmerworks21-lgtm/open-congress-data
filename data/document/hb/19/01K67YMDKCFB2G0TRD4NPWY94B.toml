congress_website_coauthors_raw = ["ACHARON, LORETO B.","ROMUALDO, JURDIN JESUS M.","BULUT-BEGTANG, ELEANOR C.","ESPINA, GERRYBOY JR. J.","REVILLA, RAMON JOLO III B.","PRIMICIAS-AGABAS, MARLYN L."]
congress_website_committee_codes = ["0532","0542"]
congress_website_primary_keys = [132635]
congress_website_title = "AN ACT ENHANCING PHILIPPINE TAX INCENTIVES, AMENDING FOR THE PURPOSE SECTIONS 27, 28, 112, 292, 293, 294, 295, 296, 297, 300, 301, 309, 310 AND 311, AND ADDING A NEW SECTION 295-A IN THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to reconcile disparities between the Corporate Recovery and Tax Incentives for Enterprises (CREATE) Act and its implementing rules and regulations. Aims to a.) Improve the equity and efficiency of the corporate tax system by lowering the rate, widening the tax base, and reducing tax distortions and leakages; b.) Develop a more responsive and globally competitive tax incentives regime that is performance-based, targeted, time-bound, and transparent, and can be customized to optimize economic opportunities and trends; c.) Provide support to business in their recovery from unforeseen events such as outbreak of communicable diseases or a global pandemic, and strengthen the nation´s capability for similar circumstances in the future; and d.) Create a simpler, fairer, and more equitable tax system that will allow for inclusive growth and generation of jobs and opportunities in all the regions of the country, and ensure access and ease in the grant of these incentives especially for applicants in least developed areas."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=19&q=HBN-9794"

