congress_website_title = "AN ACT INSTITUTING THE MAGNA CARTA OF FILIPINO MIGRANT WORKERS"
congress_website_abstract = "Defines “Filipino Migrant Worker”:Â a Filipino who is to be engaged, is engaged, or has been engaged in a remunerated activity in a country of which the said person is not an immigrant, citizen, or a permanent resident, or is not awaiting naturalization, recognition or admission, whether land-based or sea-based regardless of status; excluding a Filipino engaged under a government-recognized exchange visitor program for cultural and educational purposes.Â For this Act, a person engaged in remunerated activity covers a person who has been contracted for overseas employment but has yet to leave the Phils., regardless of status, and includes “Overseas Contract Workers”.Â This term is interchangeable with “Overseas Filipino Worker”. Proposes for the amalgamation of the laws and decrees that intend to give more rights and privileges to migrant workers; Seeks to address certain loopholes and uncertainties for a stronger and more harmonious relationship between departments and agencies tasked with safeguarding the conditions of migrant workers. Incorporates provisions that will pave the way for better working conditions and vigilant compliance with the rules and regulations that address the welfare of migrant workers and will prevent if not minimize the occurrence of certain violations and abuses committed against OFWs."
