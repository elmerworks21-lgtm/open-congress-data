congress_website_title = "AN ACT INSTITUTIONALIZING AND ENHANCING THE ROLE OF PARENT-TEACHER AND COMMUNITY ASSOCIATIONS IN PROMOTING THE WELFARE AND PROTECTING THE RIGHTS OF CHILDREN, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 603, OTHERWISE KNOWN AS THE “CHILD AND YOUTH WELFARE CODE”"
congress_website_abstract = "Requires every Early Child Development Center and Basic Education school to organize a Parent-Teacher and Community Association (PTCA) which shall be composed of parents, parent-substitutes, teacher, community development workers, and a duly recognized community group. Mandates the PTCA to assist the provincial, city, municipal and other local authorities, and school officials in the advocacy of and implementation of programs and activities that protect the rights and the welfare of children and; to closely work and coordinate with school officials, student councils, local councils for the protection of children, stakeholders, and other concerned authorities, in implementing a holistic development for children."
