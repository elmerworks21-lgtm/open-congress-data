congress_website_title = "AN ACT GRANTING DISCOUNTS ON CERTAIN TRANSACTIONS TO OVERSEAS FILIPINO WORKERS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8042, OTHERWISE KNOWN AS THE \"MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF 1995,\" AS AMENDED"
congress_website_abstract = "Proposes a minimum discount of 20% on several processing fees for necessary documents that OFWs must pay before their departure to alleviate their financial strain, and provide them immediate relief and enable them to retain more of their hard-earned money. Proposes to add a new section labeled as Section 36-A after Section 36 of RA 8042, to read as follows: SECTION 1. “SEC. 36-A. DISCOUNTS. - THE OVERSEAS FILIPINO WORKERS ARE ENTITLED TO THE FOLLOWING DISCOUNTS: (A) AT LEAST 20% DISCOUNT ON THE PASSPORT ISSUANCE AND RENEWAL FEES; (B) . . . ON CLEARANCE AND OTHER CERTIFICATION FEES . . . ; (C) . . . ON ALL PHILIPPINE RELATED DOCUMENTS REQUIRED FOR OVERSEAS EMPLOYMENT; AND (D) . . . ON PLACEMENT FEES.”"
