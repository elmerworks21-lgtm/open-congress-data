congress_website_title = "AN ACT STRENGTHENING AND AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 10845, OTHERWISE KNOWN AS THE ANTI-AGRICULTURAL SMUGGLING ACT OF 2016, AND FOR OTHER PURPOSES"
congress_website_abstract = "“Anti-Agricultural Economic Sabotage Act of 2023” Declares large-scale agricultural smuggling, hoarding, profiteering, cartel, and other acts of market abuses as economic sabotage and preventing these abuses of market power practices to manipulate the prices and unduly restrain the supply of agricultural goods. Proposes that large-scale agricultural hoarding, profiteering or cartel . . . that involve sugar, corn, pork, poultry, garlic, onion, carrots, fish and cruciferous vegetables . . . with a minimum amount of P1 million or rice, with a minimum amount of P10 million, as valued by Department of Agriculture . . . , shall constitute as an economic sabotage."
