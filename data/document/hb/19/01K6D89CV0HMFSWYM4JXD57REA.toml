congress_website_title = "AN ACT PROVIDING FOR WOMEN EMPOWERMENT AND OTHER PURPOSES"
congress_website_abstract = "Aims to address the issue of prevailing inequality between men and women in availing opportunities in public governance; increase the share of women´s role in decision-making, and address the discrimination experiences by women in the field of public service. Proposes the reservation for qualified women, based on a specific percentage and classification - appointive positions in the national and local, and provides penalty for non-compliance. Proposes provisions regarding women in duly-accredited political parties; women in the AFP; an all-female unit in all police stations to attend to victims of rape, battering, incest, and other crimes against women and chastity; inclusion in a human resource development program, gender and development orientation, training, seminars among others; and scholarships, grants, fellowships, and training in the national or local government."
