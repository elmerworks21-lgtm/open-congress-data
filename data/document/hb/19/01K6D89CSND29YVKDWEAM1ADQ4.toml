congress_website_title = "AN ACT DEFINING GOOD CONDUCT AND PROVIDING CONDITIONS IN THE GRANT OF GOOD CONDUCT TIME ALLOWANCE, FURTHER AMENDING FOR THE PURPOSE ARTICLE 97 OF ACT NO. 3815, OTHERWISE KNOWN AS THE “REVISED PENAL CODE,” AS AMENDED BY REPUBLICT ACT NO. 10592"
congress_website_abstract = "Refers GOOD CONDUCT to the conspicuous and satisfactory BEHAVIOR of detention or convicted PRISONER consisting of active involvement in REHABILITATION programs which include adoption of restorative justice among others, productive participation in authorized work activities, or accomplishment of exemplary deeds, ownership of the crime and earnest efforts to seek forgiveness from the victims and their families, and exemplary compliance with institutional disciplinary rules and regulations. Proposes that criteria in the evaluation and credit of GOOD CONDUCT TIME ALLOWANCE shall be used by the Director of the Bureau of Corrections, the Chief of the Bureau of Jail Management and Penology, and/or the jail warden in granting allowances for good conduct."
