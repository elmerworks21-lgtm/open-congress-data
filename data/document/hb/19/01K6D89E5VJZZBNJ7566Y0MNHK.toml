congress_website_title = "\"AN ACT STRENGTHENING THE PHILIPPINE CROP INSURANCE CORPORATION (PCIC) BY INTRODUCING A MARKET-BASED REFORM ON AGRICULTURAL INSURANCE, AND FOR OTHER PURPOSE\""
congress_website_abstract = "Defines several terms such as Agroforestry, Crop Rotation, Ecosystem, etc. Defines “Forest Gardening as “multi-layered crop farming” or low maintenance and sustainable method of food production based on woodland ecosystems, incorporating fruit and nut trees, shrubs, herbs, vines, and perennial vegetables that yield directly useful to humans and a system of agroforestry that creates a diverse, productive, healthy, ecologically-sound and sustainable system of land use. Seeks to transform farmers into multi-crop agripreneurs and help them build productive farming communities and produce high-quality crops;Â Intends to maximize land use, utilize idle lands, and inspire the youth toward sustainable agriculture."
