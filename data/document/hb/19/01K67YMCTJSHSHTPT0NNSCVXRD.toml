congress_website_title = "AN ACT PROVIDING ENHANCED PROTECTION, SECURITY, AND BENEFITS FOR MEDIA WORKERS"
congress_website_abstract = "Seeks to ensure that media workers will be granted humane condition of work, living wage, and comprehensive benefits package at par with the current benefits enjoyed by the labor force both in government and private sector. Aims to establish a News Media Tripartite Council whish shall serve as a link among various stakeholders, provide a platform where media workers and employees can agree upon mutually beneficial policies that will promote the interests of the media industry, and serve as avenue to express the aspirations, discuss their programs or settle conflict. Mandates additional insurance benefits to media workers."
