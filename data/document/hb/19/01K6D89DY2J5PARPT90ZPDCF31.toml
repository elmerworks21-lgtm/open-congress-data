congress_website_title = "AN ACT RECOGNIZING THE CIVIL EFFECTS OF CANONICAL OR CHURCH DISSOLUTION, OR DECLARATION OF NULLITY OF MARRIAGE"
congress_website_abstract = "Aims to recognize the validity and civil effects of marriages enjoined by the law of the Roman Catholic Church including all other established churches and duly recognized religious denominations. Proposes key provisions related to the following: the same effects as a decree of divorce, annulment, or dissolution of marriage ruled by a competent Philippine Court; determination of the status of children of said marriages; partition on the properties of the spouses; custody of the common children; and the delivery of presumptive legitime. . ."
