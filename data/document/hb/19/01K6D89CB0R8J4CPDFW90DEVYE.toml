congress_website_title = "AN ACT INSTITUTIONALIZING AND EXPANDING THE NATIONAL EMPLOYMENT RECOVERY STRATEGY (NERS) TO A NATIONAL EMPLOYMENT ACTION PLAN, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "“Trabaho Para sa Lahat ng Pilipino Act” Intends to institutionalize and expand the NERS to become the NEAP, which shall be the country´s employment recovery and generation masterplan. Proposes to reconstitute the NERS Task Force as the Inter-Agency Council for jobs and Investments, or IAC that will focus on developing employment recovery and job creation in specific industries and emerging sectors, such as but not limited to construction, tourism, agriculture, IT and business process management, and manufacturing."
