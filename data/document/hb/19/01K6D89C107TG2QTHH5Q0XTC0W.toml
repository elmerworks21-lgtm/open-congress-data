congress_website_title = "AN ACT CREATING THE \"COUNCIL FOR THE BUILT ENVIRONMENT,\" APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to ensure that all practicing Built Environment Professionals can meet the minimum requirements to safeguard the life, health, property, and welfare of the public. Aims to create a “Council” of the built environment to 1) advise on policy matters concerning the interests of the public in the built environment; and (2) oversee the regulation and facilitate collaboration and cooperation of Built Environment Professions."
