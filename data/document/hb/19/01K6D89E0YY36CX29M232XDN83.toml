congress_website_title = "AN ACT PROTECTING GOOD SAMARITANS WHO PROVIDE ASSISTANCE TO THOSE IN NEED"
congress_website_abstract = "Defines the term “Good Samaritan” as an individual who voluntarily and in good faith provides reasonable assistance to another person in need of emergency care, assistance, or aid. Intends to establish legal safeguards and protection from liability for any unintentional harm that may occur due to the Good Samaritan´s action. Proposes that immunity from liability shall extend to actions such as administering first aid, cardiopulmonary resuscitation (CPR), using an automated external defibrillator (AED), or any other reasonable assistance expected to a person with similar training and experience."
