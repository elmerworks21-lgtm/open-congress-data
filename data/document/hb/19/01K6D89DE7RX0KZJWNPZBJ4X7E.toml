congress_website_title = "AN ACT PROMOTING CORPORATE FARMING AND PROVIDING INCENTIVES THEREFOR"
congress_website_abstract = "Seeks to encourage the private sector in the capitalization of agricultural ventures through a program that will allow firms or partnerships to join into management contracts in producing rice or corn with any farmers´ group (farmers´ associations, cooperatives, and agrarian reform communities (ARCs). Defines Corporate Farming as the direct ownership or lease of farmland by corporations or partnerships to produce agricultural goods for their employees or the open market. Proposes several provisions regarding the following: a) Corporate Farming Contract or Joint Venture; b) Product Disposition or its Monetary Equivalent; c) Farmers as Project Employees (not less than minimum wage, membership in SSS and PhilHealth; d) Program Administration (DA and DAR as liaison conduit with gov´t agencies); e) Incentive Package ( exemption from customs and duties on the importation of agricultural inputs (seeds, fertilizers, agricultural machinery, and other implements; VAT on the importation of agricultural inputs; exemption from capital gains tax who sells/transfers idle agricultural land); f) Other Incentives (loans extended by banks)."
