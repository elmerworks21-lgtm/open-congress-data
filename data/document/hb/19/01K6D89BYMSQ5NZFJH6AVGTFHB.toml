congress_website_title = "AN ACT INSTITUTING BUDGET REFORM THAT WILL ENSURE THE EQUITABLE DISTRIBUTION OF FUNDS FOR BOTH THE NATIONAL AND LOCAL GOVERNMENT UNITS FOR THE PURPOSE OF PROMOTING VILLAGE EMPOWERMENT, ENABLING THEM TO BE AN EFFECTIVE INSTRUMENT IN ATTAINING INCLUSIVE GROWTH, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to institutionalize a rational and equitable budget distribution for LGU development with a more systematic, targeted and rigorous balance of the budget from national agencies to local governments. Proposes that the “Local Development Fund” (LDF) shall be divided among the different political subdivisions solely for developmental projects, activities and programs (PAPs) based on the approved Comprehensive Development Plans (CDPs). Seeks to appropriate adequate funds for “Local Government Academy” (LGA) to provide LGUs with the necessary tools in undertaking effective planning and proper implementation of their PAPs in accordance with their CDPs."
