congress_website_title = "AN ACT RATIONALIZING GOVERNMENT INTERVENTIONS IN LABOR DISPUTES BY ADOPTING THE ESSENTIAL SERVICES CRITERIA IN THE EXERCISE OF THE ASSUMPTION OF JURISDICTION OF THE SECRETARY OF LABOR AND EMPLOYMENT, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Grants the Secretary of Labor and Employment to assume jurisdiction over the labor dispute causing or likely to cause strike or lockout in an industry engaged in essential services which if interrupted would endanger the life, personal safety or health of whole or part of the population and decide the same within fifteen (15) days after such assumption. Requires minimum service or operation of the affected industries engaged in essential services to ensure the proper and adequate protection of the life, personal safety and health of their patients for the duration of the labor dispute."
