congress_website_title = "AN ACT INSTITUTIONALIZING SMARTER APPROACHES TO REINVIGORATE AGRICULTURE AS AN INDUSTRY (SARAI), AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Defines “Integrated Crop Monitoring and Forecasting” as “the collection of critical information services produced by advanced computer and digital technologies, such as remote sensing, geospatial mapping, and machine learning, used to enable climate-smart decision-making in agriculture. Seeks to establish a National Integrated Crop Monitoring and Forecasting Center at the University of the Philippines Los Banos Laguna, which will serve as a hub for advanced agricultural monitoring, crop forecasting, and data-driven decision-making to enhance farm productivity and resilience."
