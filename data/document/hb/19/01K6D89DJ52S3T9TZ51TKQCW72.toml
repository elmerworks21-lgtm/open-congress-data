congress_website_title = "AN ACT ESTABLISHING THE FISCAL REGIME FOR THE MINING INDUSTRY"
congress_website_abstract = "Proposes provisions regarding the following: royalty payments of 3% on gross output of large-scale metallic mining operations within mineral reservations, graduated rates on the profit margin of large-scale metallic mining operations outside mineral reservations, and 1/10 of 1% of gross output of small-scale metallic mining operations; margin-based windfall profits tax gained on all mining operations; registration of small-scale miners with the Mining Board and the Mines and Geosciences Bureau; ring-fencing which prevent the consolidation of income and expenses of all mining projects by the same taxpayer; thin capitalization - so that businesses will not depend on excessive debt funding; exemption of mining contractors from the confidentiality clause of the NIRC of 1997, as amended; institutionalizes the Phil. Extractive Industry Transparency Initiative (PH-EITI); and the creation of a Natural Resource Trust Fund from the revenues collected from the margin-based royalty."
