congress_website_title = "AN ACT PENALIZING THE CONVERSION OR CAUSING THE CONVERSION OF IRRIGATED AND IRRIGABLE LANDS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6657, AS AMENDED, OTHERWISE KNOWN AS THE COMPREHENSIVE AGRARIAN REFORM LAW OF 1998"
congress_website_abstract = "Proposes to amend the CAR Law by proposing additional prohibitions as follows: “(J) THE ACTUAL PHYSICAL OR LEGAL CONVERSION OR CAUSING THE PHYSICAL OR LEGAL CONVERION OF IRRIGATED AND IRRIGABLE LANDS BY: Penalizes any person who directly and indirectly PARTICIPATES/INDUCES THE LANDOWNER OR FARMWORKER/APPLIES FOR AND FACILITATES THE APPLICATION/ISSUANCES OF NECESSARY DOCUMENTS/APPROVES AND CAUSE FOR THE APPROVAL OF THE APPLICATION/WHO BENEFITTED from the conversion. Defines irrigated lands and describes the physical features of irrigable lands suitable for the conduct of agricultural activities. Provides for penalties to any person who violates the provision of this Act and states that: “IF THE OFFENDER IS A PUBLIC OFFICER, THE OFFENDER SHALL SUFFER THE ADDITIONAL PENALTIES OF REMOVAL FROM OFFICE AND PERPETUAL, ABSOLUTE DISQUALIFICATION TO HOLD PUBLIC OFFICE.”"
