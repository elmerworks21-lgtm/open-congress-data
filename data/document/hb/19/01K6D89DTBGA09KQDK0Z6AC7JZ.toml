congress_website_title = "AN ACT AMENDING REPUBLIC ACT 386, ALSO KNOWN AS THE CIVIL CODE OF THE PHILIPPINES, ARTICLE 1032, ON UNWORTHINESS TO SUCCEED"
congress_website_abstract = "Seeks to include parents who induce their sons to lead corrupt or immoral lives - in the list of people who are disqualified or incapable of succeeding by reason of unworthiness. Proposes to amend Article 1032 of Republic Act No. 386, also known as the Civil Code of the Philippines to read as follows: SECTION 1 “Art. 1032 . . . incapable of succeeding by reason of unworthiness: . . . Parents who have abandoned their children or induced (their daughters) THEM to lead a corrupt or immoral life, or attempted against their virtue;"
