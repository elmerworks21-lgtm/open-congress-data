congress_website_title = "AN ACT INSTITUTING REFORMS IN LAND ADMINISTRATION"
congress_website_abstract = "Seeks to address the below par performance of government agencies undertaking land administration functions such as land surveys, mapping, classification, titling, disposition, and registration. Proposes to consolidate and streamline within a single agency - land administration powers and functions that are dispersed across the DOJ´s Land Registration Authority and Registries of Deeds and the DENR´s Lands Management Bureau, Land Management Services in the regional, provincial, and community offices, NAMRIA, and CARP Secretariat and its field offices. Proposes to create the Land Administration Authority (LAA) with powers and functions related to: functions of geodetic and geophysical surveys, land classification surveys, mapping, aerial photography, remote sensing, management of resource information, and research development thereof; specific limits of forest lands and national parks; all alienable and disposable lands of the public domain and other lands, including foreshore and marsh lands; the remaining Friar Lands; lands of patrimonial property of the NG . . .; original titles to land issued . . . and subsequent dealings of registered lands under Land Registration Act and Property Registration Decree; all types of land surveys including surveys per CA No.141, CARL, IPRA and UDHA."
