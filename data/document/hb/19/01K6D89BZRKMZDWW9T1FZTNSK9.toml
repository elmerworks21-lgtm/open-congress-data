congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE ATOMIC REGULATORY FRAMEWORK, CREATING FOR THE PURPOSE THE PHILIPPINE ATOMIC REGULATORY COMMISSION, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to create a single, independent nuclear regulatory body to focus on the control and peaceful uses and applications of atomic energy. Proposes to cover the fundamental principles of nuclear law according to current international standards and addresses all the gaps and omissions identified in the old Republic Act No. 5207 in the areas of physical protection, safeguards, nuclear security, nuclear/radiological emergency preparedness and response, radioactive waste management, transport to nuclear/radioactive materials, and licensing of nuclear facilities, materials, and radioactive sources. Intends to modernize the nuclear civil liability and compensation regime in line with internationally-accepted levels; Proposes, among others, to cover areas of nuclear and radioactive material applications and requires a well-structured legal framework necessary in meeting the technical and management standards designed to protect public health, safety, and security and the integrity of the environment."
