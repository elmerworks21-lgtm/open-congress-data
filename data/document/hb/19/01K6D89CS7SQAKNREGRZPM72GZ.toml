congress_website_title = "AN ACT INSTITUTIONALIZING THE LEGAL FRAMEWORK FOR ENSURING THE AVAILABILITY, ADEQUACY, ACCESSIBILITY, AND SAFETY OF FOOD FOR ALL FILIPINOS"
congress_website_abstract = "Enumerates State´s obligations to protect and fulfill the Filipinos´ right to adequate food and lays out specific percentage targets on the reduction of hunger, ultimately aiming for the zero incidence of forced hunger within a ten-year period; Creates the Commission on the Right to Adequate Food under the Office of the President. Seeks to clarify institutional responsibilities of the different line agencies to address the following areas of concern: a) food availability, stability and adequacy; b) food quality and safety; c) determination of the standards on the minimum amount of food for any person suffering from hunger or under nutrition; c) physical and economic access to food; and d) well-functioning distribution, processing and market systems."
