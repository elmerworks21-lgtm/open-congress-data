congress_website_title = "AN ACT AMENDING SECTION 29 OF REPUBLIC ACT NO. 11861 ALSO KNOWN AS THE EXPANDED SOLO PARENTS WELFARE ACT"
congress_website_abstract = "Amends Sec. 10 of R.A. No. 8972 as amended by Sec. __ of R.A. No. 11861 to be read as follows: Sec.10. Child Minding Centers. The DOLE and the CSC shall promote and encourage the establishment of appropriate child minding centers within the workplace, or in accessible locations to the workplace or residence of the solo parent. PROVIDED THAT NGAs WITH MORE THAN 300 EMPLOYEES, INCLUDING GOCCs, AND PRIVATE EMPLOYERS WITH 200 OR MORE EMPLOYEES, ARE REQUIRED TO ESTABLISH CHILD MINDING CENTERS TO ACCOMMODATE THEIR EMPLOYEES´ CHILDREN WHO ARE AGED 7 YEARS AND BELOW . . . Other related terms: day care centers"
