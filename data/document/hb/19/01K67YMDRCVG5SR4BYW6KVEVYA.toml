congress_website_title = "AN ACT EXEMPTING INCENTIVES, REWARDS, BONUSES AND OTHER FORMS OF EMOLUMENTS RECEIVED BY NATIONAL ATHLETES AND COACHES FROM TAXES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10699, OTHERWISE KNOWN AS THE \"NATIONAL ATHLETES AND COACHES BENEFITS AND INCENTIVES ACT\""
congress_website_abstract = "Seeks to encourage donations to fund training and competition-related expenses of national athletes by granting donors incentives in the form of tax exemptions and deductions from gross income. Provides that all donations, gifts, endowments, and contributions made prior to the competition itself must be used exclusively for training and competition-related expenses to qualify for tax exemptions. The period for availing the exemption from donor´s tax and deductibility from gross income is within one year before the international sports competition and three months after. States that exemptions provided cover incentives, rewards, bonuses, and other emoluments, as well as donations, gifts, endowments, and contributions received by the national athletes and coaches starting from January 1, 2024."
