congress_website_coauthors_raw = ["PRIMICIAS-AGABAS, MARLYN L.","DIONISIO, ERNESTO JR. M.","TOLENTINO, ANIELA","ESCUDERO, DETTE","LEE, WILBERT T.","MERCADO-REVILLA, LANI"]
congress_website_committee_codes = ["0532","I504","0504"]
congress_website_primary_keys = [7038]
congress_website_title = "AN ACT STRENGTHENING THE PHILIPPINE DISASTER RISK REDUCTION AND MANAGEMENT SYSTEM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10121, OTHERWISE KNOWN AS THE \"PHILIPPINE DISASTER RISK REDUCTION AND MANAGEMENT ACT OF 2010\""
congress_website_abstract = "Designates the Secretary of the Department of Public Works and Highways (DPWH) as the Vice Chairperson for Infrastructure Resilience. Proposes that depending on the concern that needs to be addressed and corollary to the function of each Office of the Vice Chairperson, their corresponding agency shall be the lead government instrumentality in exercising the powers and jurisdiction of the Council. Ensures the entry and participation of the youth sector in the country´s risk reduction and management system. Limits the requirements in the process of requesting, allocating, and disbursing funds for the repair, rehabilitation, or construction of infrastructures devastated by calamities."
