congress_website_title = "AN ACT INSTITUTIONALIZING THE OPEN ELECTRONIC LEARNING SCHOOL SYSTEM IN THE PHILIPPINES, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes an ELearning or Cyber Education as an alternative mode of learning - aims to cover public secondary and tertiary educational institutions with existing distance learning programs and all other such institutions that shall later be authorized as qualified. Defines Open Electronic Learning School or ELearning as a system of delivering educational services . . . utilizing print, radio, television, and computer-based communications, satellite broadcasting, teleconferencing, and other multimedia learning and teaching technologies that allow students to study on their own without having to regularly attend class in conventional classrooms."
