congress_website_title = "AN ACT PROVIDING FOR PROTECTION OF THE REMITTANCES OF OVERSEAS FILIPINO WORKERS"
congress_website_abstract = "Seeks to protect the rights and interests of OFWs regarding their foreign funds transfers. Proposes that bank and non-bank financial intermediaries providing discounts on remittance fees shall be granted tax deduction based on the cost of services they rendered to OFWs. Proposes to protect OFWs foreign exchange remittances against usurious interest rates and exorbitant fees. Requires that OFWs and their families undergo education and training in financial literacy such as financial planning and managing finances or savings."
