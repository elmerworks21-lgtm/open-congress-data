congress_website_title = "AN ACT ESTABLISHING THE INDIGENCY IDENTIFICATION SYSTEM"
congress_website_abstract = "Seeks to provide an efficient and accessible ID system to identify and verify indigent individuals - to ensure equitable access to essential government services, social protection programs, and benefits intended. Authorizes DSWD to determine the qualifications and criteria to categorize an indigent Filipino and establishes specific required documents to prove their status. Proposes functional uses of Indigency ID card in all transactions requiring the identity, status, birth, and all other personal circumstances (social services, passport, and driver´s license, GSIS, SSS, PhilHealth, HDMF services and benefits, NBI, courts, prosecutor and police clearances, learning institutions admission, employment purposes, senior citizens benefits and privileges, banking and financial institutions, voting identification, etc.)"
