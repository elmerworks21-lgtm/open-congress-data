congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 9136, OTHERWISE KNOWN AS THE ELECTRIC POWER INDUSTRY REFORM ACT OF 2001"
congress_website_abstract = "Seeks to ensure the quality, reliability, security, and affordability of the supply of electric power, to enhance the inflow of private capital, and broaden the ownership base of the power generation sector. Proposes to amend Sec. 28 of EPIRA, to decrease from 25% to 15% of the voting shares of stock - the holdings cap for persons, natural or juridical, in a distribution utility and their respective holding company. Seeks also to amend Sec. 47 of EPIRA to authorize the government through the National Power Corporation (NPC) or any other GOCC to generate and sell power/electricity from renewable energy sources. Seeks to ensure the quality, reliability, security, and affordability of the supply of electric power, to enhance the inflow of private capital, and broaden the ownership base of the power generation sector."
