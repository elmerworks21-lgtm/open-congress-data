congress_website_title = "AN ACT AMENDING SECTIONS 144, 145, 147 AND 263-A OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to discourage illegal trade practices on tobacco products, heated tobacco products and vapor products to support the sustainability and growth of legitimate enterprises while ensuring receipt of government revenue through just and equitable taxes. Seeks to lessen the burden on the legitimate businesses, level the playing field, discourage illegal trading practices, ensure fair competition in the market, and strengthen national security. Allows legitimate businesses to recapture their market share by granting a suspension of one year to the annual automatic increase of five percent (5%) tax imposed among tobacco products, heated tobacco products, vapor products, cigars, and cigarettes. Provides a unified tax rate for all vapor products emphasizing that the distinction between salt nicotine and freebase or conventional nicotine no longer has a valid basis thus substantially addressing the problem of misdeclaration by unscrupulous traders."
