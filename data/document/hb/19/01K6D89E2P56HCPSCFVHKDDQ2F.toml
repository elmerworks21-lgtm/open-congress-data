congress_website_title = "AN ACT PROVIDING FOR A FRAMEWORK FOR CIRCULAR ECONOMY TO PROMOTE SUSTAINABLE PRODUCTION AND CONSUMPTION, AND NATIONAL ECONOMIC SECURITY"
congress_website_abstract = "Intends to address the country´s lagging behind in terms of environmental sustainability based on the latest ranking on performance indicators on ecosystem vitality (e.g. biodiversity, water resources), environmental health (e.g. air quality, waste management), and climate change. Proposes an economic paradigm shift for a sustainable development that balance the needs of the environment and the economy through transition to circular economy. Defines circular economy as an economic model of creating value by extending product lifespan through improved design and servicing, and relocating ways from the end of the supply chain to the beginning. This intends to efficiently utilize resources by its continual use, and aims to retain the highest utility and value of products components and materials at all times, through sharing, leasing, reuse, repair, refurbishment, and recycling in an almost closed loop. Describes embracing circularity through reimagining how we design, produce, and consume goods; creating products that are durable, repairable, and ultimately recyclable, to minimize waste, reduce raw material extraction, and foster regeneration in both natural and human-made ecosystems."
