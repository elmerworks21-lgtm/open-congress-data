congress_website_title = "AN ACT PROVIDING FOR THE COMPREHENSIVE REGULATORY AND LEGAL FRAMEWORK FOR COLLECTIVE INVESTMENT SCHEMES"
congress_website_abstract = "States that a Collective Investment Scheme is any arrangement whereby funds are solicited from the investing public and pooled together for the purpose of investing, re-investing, and/or trading in securities or other investment assets or different classes thereof as allowed under this Law. Proposes to establish a comprehensive regulatory and tax framework to enable CIS and all the participants therein to play a key role in the development of the capital market through the promotion of investor protection and growth of pooled investments and capital development. Intends to encourage participation of the best-qualified fund managers/investment advisers; broaden participation by Filipinos in ownership of securities/other investment assets; equal protection to investors in all similar CIS, imposing the requirements and providing same competitive environment; and responsible investing through the dissemination of information on the opportunities and risks involved."
