congress_website_title = "AN ACT PROHIBITING LOCAL GOVERNMENT UNITS FROM INTERVENING IN THE IMPLEMENTATION OF NATIONAL GOVERNMENT PROJECTS"
congress_website_abstract = "States that “No local government unit shall intervene, obstruct, delay, or otherwise impede the implementation of any national government project, including but not limited to infrastructure projects, health programs, and education programs.” Provides that the prohibition shall not apply in cases where the assistance of the LGU is specifically requested by the NGA or office in charge of the project . . ."
