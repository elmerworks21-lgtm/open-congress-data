title = "ARCHIPELAGIC SEA LANES IN THE PHILIPPINE WATERS"
date_filed = "2023-09-04"
long_title = "AN ACT ESTABLISHING THE ARCHIPELAGIC SEA LANES IN THE PHILIPPINE ARCHIPELAGIC WATERS, PRESCRIBING THE RIGHTS AND OBLIGATIONS OF FOREIGN SHIPS AND AIRCRAFT EXERCISING THE RIGHT OF ARCHIPELAGIC SEA LANES PASSAGE"
scope = "National"
subjects = [ "Archipelagic Sea Lanes",]
congress_website_author_codes = ["I051","K094","K043","K116","F057","H057","F008","J086","K072","K138","K001","K085","D061","K005","K088","K092","J002","I070"]
congress_website_coauthors_raw = ["VILLANUEVA, EDUARDO \"Bro. Eddie\" C.","PRIMICIAS-AGABAS, MARLYN L.","REVILLA, RAMON JOLO III B.","MARIANO-HERNANDEZ, RUTH","BORDADO, GABRIEL JR. H.","CASTRO, JANE T.","ROMUALDO, JURDIN JESUS M."]
congress_website_committee_codes = ["0513","0532"]
congress_website_primary_keys = [17102]
congress_website_title = "AN ACT ESTABLISHING THE ARCHIPELAGIC SEA LANES IN THE PHILIPPINE ARCHIPELAGIC WATERS, PRESCRIBING THE RIGHTS AND OBLIGATIONS OF FOREIGN SHIPS AND AIRCRAFT EXERCISING THE RIGHT OF ARCHIPELAGIC SEA LANES PASSAGE"
congress_website_abstract = "Aims to minimize the routes and areas that shall be utilized and accessed by foreign vessels and foreign registered aircraft for the archipelagic sea lanes passage. Defines Archipelagic Sea Lane Passage as “the exercise of the rights of navigation and overflight in the normal mode solely for the purpose of continuous, expeditious, and unobstructed transit between one part of the high seas or an exclusive economic zone (EEZ) and another part of the high seas or an EEZ.” Provides the rights and obligations of foreign ships and aircraft when exercising the right of archipelagic sea lanes passage."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=19&q=HBN-9034"

