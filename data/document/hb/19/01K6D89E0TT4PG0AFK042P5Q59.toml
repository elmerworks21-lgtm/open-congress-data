congress_website_title = "AN ACT CREATING THE PHILIPPINE RENEWABLE ENERGY CORPORATION, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Refers the term RE resources to energy resources that do not have an upper limit on the total quantity to be used . . .These include, among others, biomass, solar, wind, geothermal, ocean energy, and hydropower, with internationally accepted norms and standards on dams, and other emerging RE technologies. Provides that the Corporation shall promote and undertake research development, . . . and commercial application of new, renewable, non-conventional, and environmental-friendly energy sources and other natural, non-fossil fuel . . . Proposes to abolish the PNOC-Renewables Corporation (PNOC-RC); to exclude the Agus and Pulangui Hydroelectric Power Plant Complexes and other hydroelectric facilities from among generation assets that will be privatized, pursuant to the Electric Power Industry Reform Act (EPIRA), their ownership shall be transferred to and operated by the Corporation . . ."
