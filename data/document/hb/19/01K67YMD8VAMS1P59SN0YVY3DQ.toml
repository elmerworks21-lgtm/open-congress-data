congress_website_title = "AN ACT ESTABLISHING AN AGRICULTURE INFORMATION SYSTEM IN ALL CITIES AND MUNICIPALITIES"
congress_website_abstract = "Proposes the establishment of a computer database that shall contain an up-to-date inventory of all agricultural commodities available in the various local communities. Intends for AIS to serve as a database where information on the demand for specific agricultural commodities is gathered simultaneously with the production data from farmers in every barangay and shall serve as the platform for marketing agricultural products nationwide. Aims to facilitate the free registration of all farmers, fisherfolk, and buyers transacting within their respective area in the system; to mandate the LGUs to consolidate all pertinent data on the profile and demographics as farmers and buyers and to store these in the respective AIS."
