congress_website_title = "AN ACT CREATING THE PHILIPPINE LIVESTOCK AUTHORITY, PROVIDING FOR ITS POWERS AND FUNCTIONS, A LIVESTOCK DEVELOPMENT FUND, AND OTHER PURPOSES"
congress_website_abstract = "Seeks to address the steady growth of meat imports to the detriment of local producers and other allied industries. Proposes to merge the Bureau of Animal Industry, Phil. Carabao Center, National Dairy Corp., and National Meat Inspection Service to form the Phil. Livestock Authority. Provides for livestock development for allocation to shared service facilities; socialized credit under the Small-hold Livestock Farm Modernization Program; research and development, capability building, and technology transfer activities under the Livestock Farm Technology Support Programs, among others."
