congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 10845, OTHERWISE KNOWN AS THE ANTI-AGRICULTURAL SMUGGLING ACT OF 2016, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to amend certain provisions in the Act and insert a new Section 3A after Sec. 3 to be read as follows: “SECTION 3A. LARGE-SCALE AGRICULTURAL HOARDING, PROFITEERING, AND CARTEL AS ECONOMIC SABOTAGE. - . . . AS DEFINED IN SEC. 5 OF R.A. NO. 7581, INSOFAR AS THEY INVOLVE SUGAR, CORN, PORK, POULTRY, GARLIC, ONION, CARROTS, FISH, AND CRUCIFEROUS VEGETABLES, . . . WITH A MINIMUM AMOUNT OF ONE MILLION PESOS (P1,000,000.00), OR RICE, WITH A MINIMUM AMOUNT OF TEN MILLION PESOS (P10,000,000.00), AS VALUED BY THE BUREAU OF CUSTOMS (BOC) FOR IMPORTS OR BY THE DEPARTMENT OF AGRICULTURE FOR DOMESTICALLY PRODUCED COMMODITIES, SHALL CONSTITUTE ECONOMIC SABOTAGE.”"
