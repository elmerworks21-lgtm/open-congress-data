congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8479, OTHERWISE KNOWN AS THE \"DOWNSTREAM OIL DEREGULATION ACT OF 1998\""
congress_website_abstract = "Seeks to empower and strengthen the current capacities of the Phil. Competition Commission (PCC) in preventing, investigating, and prosecuting cases of unfair trade practices in the industry. Proposes to abolish the DOE-DOJ Task Force which has been previously vested with the authority to prosecute anti-competitive behavior; and to authorize the President to reduce or suspend fuel excise tax rates when fuel prices breach a threshold. Amends Sec. 11 of RA No. 8479 to be read as follows: “Section 11. Anti-Trust Safeguards. - To ensure fair completion IN THE DOWNSTREAM OIL INDUSTRY, ANY FORM OF ANTICOMPETITIVE BEHAVIOR, INCLUDING ALL INSTANCES OF CARTEL AND MONOPOLISTIC CONDUCT, SHALL BE DEALT WITH IN ACCORDANCE WITH THE RELEVANT PROVISIONS OF REPUBLIC ACT NO. 10667, OTHERWISE KNOWN AS THE PHILIPPINE COMPETITION ACT.”"
