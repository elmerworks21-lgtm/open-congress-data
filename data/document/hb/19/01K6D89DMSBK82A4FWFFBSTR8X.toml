congress_website_title = "AN ACT PROVIDING TAX CREDITS AS AN ADDITIONAL MODE OF PAYMENT FOR THE ACQUISITION OF RIGHT-OF-WAY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10752, OTHERWISE KNOWN AS “THE RIGHT-OF-WAY ACT”"
congress_website_abstract = "Proposes to add a new section as Sec.5-H to the Right-of-Way Act, to read as follows: (H) THE PROPERTY OWNER SHALL HAVE AN OPTION TO AVAIL OF TAX CREDITS ON REAL PROPERTY TAX . . . SHALL BE DOCUMENTED AS A TAX CREDIT CERTIFICATE (TCC) WITH THE BUREAU OF INTERNAL REVENUE (BIR) WHICH SHALL BE IMPLEMENTED UNDER THE FOLLOWING GUIDELINES: (1) . . . MAY BE MADE AS A PARTIAL OR FULL MODE OF PAYMENT . . .; (2) . . . MAY BE USED AGAINST ANY OTHER TAX LIABILITY . . .; (3) . . . MAY BE TRANSFERRED THROUGH A SALE . . . TO A THIRD-PARTY . . ., WHO MAY USE THE TCC AGAINST ANY OTHER TAX LIABILITY"
