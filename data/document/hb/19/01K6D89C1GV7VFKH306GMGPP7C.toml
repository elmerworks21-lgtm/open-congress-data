congress_website_abstract = "Proposes to amend the essential and formal requisites of a valid marriage specifically the provision that the contracting parties must physically give their consent before solemnizing officer. Thus, the legal meaning of \"presence\" or\" personal appearance\" must now be liberally construed to include virtual presence or presence through videoconferencing."
