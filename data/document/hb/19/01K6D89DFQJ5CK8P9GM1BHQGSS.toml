congress_website_title = "AN ACT ESTABLISHING THE INSTITUTE FOR STRATEGIC STUDIES AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address urgent scientific and continuing policy research and strategic studies as bases in dealing with our fundamental and critical international and national concerns like significant technical advances in communications, information, and transportation; large-scale military confrontation; competition for resources; outstanding territorial conflicts; continuing insurgency; and local communist movement. Provides that strategic studies by a group of selected scholar-members shall conduct strategic research on national and international concerns, formulate various policy options on various national issues, and 3) recommend appropriate actions to support such policies and strategies."
