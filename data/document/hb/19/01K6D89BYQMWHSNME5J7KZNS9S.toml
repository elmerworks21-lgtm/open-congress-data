congress_website_title = "AN ACT ESTABLISHING THE NATIONAL FRAMEWORK FOR WATER RESOURCE MANAGEMENT AND CREATING THE DEPARTMENT OF WATER RESOURCES AND THE WATER REGULATORY COMMISSION, DEFINING THEIR MANDATES, POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes among other various provisions that the Department shall exercise administrative supervision over several agencies for policy and program coordination, monitoring, and evaluation: Local Water Utilities Administration (LWUA); Metropolitan Waterworks and Sewerage System (MWSS); National Irrigation Administration (NIA). Proposes further that several offices (their functions, and personnel) shall be completely subsumed under the Department, as follows: National Water Resources Board; River Basin Control Office; Manila Bay Coordinating Office; Water Resources Management Division of the Bureau of Soils and Water Management of the Department of Agriculture; Water Supply and Sanitation Unit of the DILG; and the Water Quality Management Section of the Environmental Management Bureau of the DENR."
