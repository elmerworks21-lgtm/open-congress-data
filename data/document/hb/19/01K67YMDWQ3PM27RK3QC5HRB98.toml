congress_website_title = "AN ACT MANDATING THE PHILIPPINE POSTAL CORPORATION TO ADOPT A MODERNIZED ZONE IMPROVEMENT PLAN CODE SYSTEM"
congress_website_abstract = "Mandates the Philippine Postal Corporation (PHLPOST) to adopt and institutionalize a modernized alphanumeric Zone Improvement Plan (ZIP) Code that shall be compose of: two (2) alphabetic characters (A-Z), representing the province; and five (5) Arabic numerals (0-9), representing the city or municipality and barangay. Directs the PHLPOST to update its website´s ZIP Code Locator that shall allow the public to search with ease the ZIP Code of a certain barangay and vice versa. Provides a thirty-six (36) months transitory period from the effectivity of this Act for all national government agencies, local government units, government-owned or -controlled corporations, and private sector entities to update their database using the new ZIP Code System."
