congress_website_abstract = "Proposes to institutionalize an income classification system that is reflective of the financial capability of LGUs by mandating the Department of Finance to issue the classification/reclassification standards of provinces, cities, and municipalities. Provides for the automatic reclassification computation; and guidelines on personnel services for reclassification from fourth or lower income class to higher income classes."
