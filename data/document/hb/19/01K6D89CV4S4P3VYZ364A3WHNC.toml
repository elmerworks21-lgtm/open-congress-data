congress_website_title = "AN ACT INSTITUTIONALIZING AN INSTALLMENT PAYMENT SCHEME ON BASIC UTILITY BILLS DURING CALAMITIES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to cover all residential electric, water, communication, and connectivity bills and shall apply when a state of calamity is declared. Proposes for the following: a mandatory moratorium on all residential utility bills for the first three (3) months of a state of calamity; the moratorium may be extended after the first three (3) months of a state of calamity, subject to the determination of the President or the local sanggunian; and installment payment for the deferred liability, without interest, accruing a month after the cessation of a state of calamity."
