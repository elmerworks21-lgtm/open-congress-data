congress_website_abstract = "Aims to provide the right of access to medical cannabis intended for the treatment and medication of qualified patients with debilitating and non-debilitating medical conditions. Creates the Medical Cannabis Office which shall formulate, develop, and establish a comprehensive, integrated, and unified rules and regulations on medical cannabis use and strategy to ensure its safety, accessibility, affordability, and availability, among others. Enumerates prohibited acts and provides penalties for violation thereof."
