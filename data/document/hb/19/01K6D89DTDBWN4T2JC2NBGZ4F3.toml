congress_website_title = "AN ACT ESTABLISHING PANGARAP CENTERS IN ALL LOCAL GOVERNMENT UNITS IN THE COUNTRY AND PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to create a One-Stop Shop for all state-controlled provident funds and other legally required benefit institutions in each and every legislative district of the nation to reduce the burden of complicated registration, contribution collection, loan application processing, and release of loans and pensions, among other processes. Provides that each Pangarap Center shall consist of duly designated representatives from the Home Development Mutual Fund (HDMF), Government Service Insurance System (GSIS), Social Security System (SSS), Philippine Health Insurance Corporation (PhilHealth) and the Department of Migrant Workers (DMW)."
