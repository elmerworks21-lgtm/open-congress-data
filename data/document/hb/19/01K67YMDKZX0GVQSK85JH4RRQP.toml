congress_website_title = "AN ACT ALLOWING THE DEPARTMENT OF EDUCATION THE FLEXIBILITY TO DETERMINE THE PEDAGOGICAL APPROACHES TO BE IMPLEMENTED IN THE BASIC EDUCATION CURRICULUM, AMENDING FOR THE PURPOSE SECTION 5 OF REPUBLIC ACT NO. 10533, OTHERWISE KNOWN AS THE “ENHANCED BASIC EDUCATION ACT OF 2013\""
congress_website_abstract = "Seeks to amend Section 5 of Republic Act No. 10533 by providing the curriculum shall employ the approach deemed most effective by the Department of Education to ensure mastery of knowledge and skills after each level, provided, that the curriculum and approach shall be subject to periodic review of not less than once every five (5) years, unless compelling circumstances necessitate an earlier period, to determine their relevancy and effectiveness in achieving the educational goals."
