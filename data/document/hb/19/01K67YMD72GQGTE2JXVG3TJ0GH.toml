scope = "National"
subjects = [ "Real Estate Investment Trust (REIT)",]
congress_website_author_codes = ["F057","J079"]
congress_website_coauthors_raw = ["DALIPE, MANUEL JOSE M.","BORDADO, GABRIEL JR. H.","REVILLA, RAMON JOLO III B.","ROMUALDO, JURDIN JESUS M.","BULUT-BEGTANG, ELEANOR C.","VILLARICA, LINABELLE RUTH R."]
congress_website_committee_codes = ["0532","0536"]
congress_website_primary_keys = [135746]
congress_website_title = "AN ACT PROVIDING FOR A REINVESTMENT FRAMEWORK FOR REAL ESTATE INVESTMENT TRUST (REIT) SPONSORS OR PROMOTERS, AMENDING FOR THE PURPOSE SECTIONS 3, 8, AND 9 OF REPUBLIC ACT NO. 9856, OTHERWISE KNOWN AS “THE REAL ESTATE INVESTMENT TRUST (REIT) ACT OF 2009”"
congress_website_abstract = "Requires that any proceeds realized by the sponsor or promoter from the sale of REIT shares or other securities issued in exchange for income-generating real estate transferred to REIT and any money raised by the sponsor or promoter from the sale of any of its income-generating real estate to the REIT, in any real estate, including any redevelopment thereof, or infrastructure projects in the Philippines, must be reinvested in the Philippines within one (1) year from the date of receipt of proceeds or money by the sponsor or promoter. Mandates the REIT to submit a reinvestment plan to the Exchange and the Commission upon registration and to annually secure a certification from the Commission that it is compliant with its reinvestment plan."
