date_filed = "2023-12-04"
long_title = "AN ACT ESTABLISHING A FRAMEWORK FOR BLUE ECONOMY, PROMOTING STEWARDSHIP AND SUSTAINABLE DEVELOPMENT OF COASTAL AND MARINE ECOSYSTEMS AND RESOURCES, REORGANIZING AND RENAMING THE NATIONAL COAST WATCH SYSTEM AS THE NATIONAL MARITIME MONITORING SYSTEM, AND PROVIDING FUNDS THEREFOR"
scope = "National"
subjects = [ "Maritime Zone",]
congress_website_author_codes = ["J015","I020","C100","J043","K018","K134","J066","J028","K068","K035","I042","H057","J122","I051","K094","K043","K138","I034","F083","K047","K072","K051","F061","I019","J012","G013","K114","I056","K030","K089","K102","K140","K101","J118","J077","K079","F027","F076","K039","J079","C102","J091","G006","J108","G072","K060","K054","G059","J041","K022","K080","K008","I109","K025","K026","J127","J058","I070","J093","J033","K059","K095","K061","F068","J017","K120","K016","J105","K083","K024","K066","K053","D013","I037","K034","J027","K062","K027","K005","K029","I041","K055"]
congress_website_coauthors_raw = ["VILLANUEVA, EDUARDO \"Bro. Eddie\" C.","LUISTRO, JINKY-BITRICS","TAN, KEITH MICAH D.L. TAN","BOLILIA, LIANDA B.","BORDADO, GABRIEL JR. H.","TEVES, JOSE \"Bong\" Jr. J.","CARI, CARL NICOLAS C.","PLEYTO, SALVADOR A.","BARONDA, JULIENNE \"Jam\"","BARBA, ANGELO MARCOS"]
congress_website_committee_codes = ["0532","0536","0542","0504"]
congress_website_primary_keys = [92947]
congress_website_title = "AN ACT ESTABLISHING A FRAMEWORK FOR BLUE ECONOMY, PROMOTING STEWARDSHIP AND SUSTAINABLE DEVELOPMENT OF COASTAL AND MARINE ECOSYSTEMS AND RESOURCES, REORGANIZING AND RENAMING THE NATIONAL COAST WATCH SYSTEM AS THE NATIONAL MARITIME MONITORING SYSTEM, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Aims to consolidate all interventions in a single framework that promotes a whole-of-nation approach to sustainably develop, manage, protect and preserve our marine and costal resources. Mandates the formulation of a Policy Framework on Blue Economy which shall serve as the basis for marine spatial planning, determination of investments to develop modern physical infrastructure and build an enabling environment for blue economy to prosper, and enhance maritime domain awareness and enforcement of economic and environmental regulations within our maritime zones. Provides an Integrated Marine and Costal Area Management (IMCAM) that shall be the framework to address human impacts on marine and costal ecosystem, and for promoting its conservation and sustainable use. Directs the National Maritime Council, through working groups created for the purpose, to prepare five-year and ten-year development plans for priority strategic and sustainable ocean-based or ocean-related industry, in accordance with the Policy Framework and in consideration of the existing development plans and strategies formulated by agencies involved in coastal and marine protection and development. The Council shall also designate sea lanes and air routes, suitable for the continuous and expeditious passage of foreign ships and aircrafts through or over the archipelagic water and the adjacent territorial sea and require the foreign ships exercising the right of innocent passage to use such lanes and traffic separation schemes in accordance with the UNCLOS."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=19&q=HBN-9662"

