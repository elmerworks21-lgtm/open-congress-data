congress_website_title = "AN ACT SETTING THE CEILING INTEREST RATES ON LOANS, FORBEARANCE OF MONEY, GOODS OR CREDIT, OR ANY MONETARY OBLIGATIONS, AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Seeks to address the influx of loan applications to private and public lending institutions where these entities imposed unconscionable interest rates and penalty fees or unjust terms and conditions and abusive lending practices. Prescribes (12%) maximum on stipulated interest rate per annum, including commissions, and premiums, on secured loan or forbearance of any money, goods, or credits - while there shall be a ceiling rate of (24%) for interest rates expressly provided for unsecured loans or forbearances . Includes as “juridical persons” the following, but not limited to: lending company (RA 9474), financing company (RA 8556), banks (RA 8791), credit card companies, pawnshops, investment houses, savings and loan associations, mortgage companies, insurance companies, cooperatives, operators of Online Lending Platforms (OLPs) as defined under SEC Memo Circular No.10, series of 2021, and other related institutions already regulated by law."
