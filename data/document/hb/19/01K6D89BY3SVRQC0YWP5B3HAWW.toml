congress_website_title = "AN ACT CREATING THE DEPARTMENT OF DISASTER RESILIENCE, DEFINING ITS MANDATE, POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes to create a Department that will have a full-time focus on natural hazards and disasters, which is characterized by unity of command, a science and ICT-based approach, and the capacity to take charge of three key result areas: disaster risk reduction; disaster preparedness, and response; and recovery, rehabilitation and building forward better; Provides among others, some key elements and features of the proposed Department regarding the take-over capacity of any private utility; rationalized fund-use and fast and responsive procurement; highly specialized functions, and highly-skilled personnel requirements (scientists, environmental and/or urban planners, civil engineers, and public finance specialist); and institutional partnership with LGUs, NGOs, and academia."
