congress_website_title = "AN ACT STRENGTHENING THE BASES CONVERSION AND DEVELOPMENT AUTHORITY AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7227, OTHERWISE KNOWN AS “THE BASES CONVERSION AND DEVELOPMENT ACT OF 1992”, AS AMENDED"
congress_website_abstract = "Seeks to extend the term of Bases Conversation and Development Authority (BCDA) for another fifty (50) years upon the expiration of its original term, and may be further extended by law. Increases the authorized capital of BCDA from P100 billion to P400 billion which may be fully subscribed by the Republic of the Philippines and funded either in cash or property. Declares residential land and residential mixed-use land identified by the BCDA in its Master Development Plans for the economic zones identified and defined under RA 7227, as amended, as alienable and disposable. Provides that area to be classified as alienable and disposable subject to sale shall not be more than 5% of the total land area of each economic zone, the proceeds from the sale shall accrue to the Conversion Authority."
