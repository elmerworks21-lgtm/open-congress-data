congress_website_title = "AN ACT FURTHER AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NO. 7836, OTHERWISE KNOWN AS THE “PHILIPPINE TEACHERS PROFESSIONALIZATION ACT OF 1994” AS AMENDED BY REPUBLIC ACT NO. 9293"
congress_website_abstract = "Seeks to widen the nomination for the members of the Board of Professional Teachers by including the Teachers Education Council (TEC), DepEd, accredited association of private schools and school administrators, and CHED - in choosing nominees in addition to the accredited association of teachers. Proposes for the following: Issuance of appropriate rules by the PRC that will govern the practice of members of the Board to avoid conflict of interest in the conduct of licensure examination and release of results; recognition of the probationary employment of a teacher as an exception to the requirement of professional license in the practice of teaching subject to certain conditions; additional academic qualifications for applicants who will take the licensure examination for teachers; requirement of a refresher course for those who have failed to pass the licensure examination for three times."
