congress_website_title = "AN ACT CREATING THE PHLIPPINE VELODROME, AMENDING SECTION 23 OF REPUBLIC ACT NO. 6847, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to create a world-class facility - the new Philippine Velodrome in Tagaytay City, where Filipino cycling athletes can improve their training and performance, to be a venue for grand cycling events, both local and national competition. Proposes that the new Philippine Velodrome in Tagaytay City shall be lodged to the local government of Tagaytay City and revert the ownership and control over the Quezon City Velodrome to its local government."
