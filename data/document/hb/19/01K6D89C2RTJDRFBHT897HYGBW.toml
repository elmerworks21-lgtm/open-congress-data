congress_website_title = "AN ACT AMENDING ARTICLE 19 AND ARTICLE 39 OF RA NO.7394 OTHERWISE KNOWN AS THE “CONSUMER ACT OF THE PHILIPPINES”, INCREASING ITS PENALTIES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to increase penalties to any person who shall violate any provision of Article 18 regarding the following consumer products concerns: a) safety and quality standards including performance or use-oriented standards, codes of practice and methods of tests; b) products quality evaluation including safety, performance and comparative utility; c) associated unreasonable risks of injury to the public; d) research on quality improvement and investigation into causes and prevention of product related deaths, illness and injuries; and e) to assure the consistency of standardized products. Proposes further the increase of penalties for any unlawful acts related to consumer products: those that are not in conformity with and applicable quality or safety standard promulgated in this Act; those which has been declared as banned by a rule in this Act; those relating to notifications of substantial product hazards and to recall, repair, replace or refund unsafe products; and compliance with rule of prohibiting stockpiling."
