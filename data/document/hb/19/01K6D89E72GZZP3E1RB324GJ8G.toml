congress_website_title = "AN ACT STRENGTHENING THE WORKERS' RIGHT TO STRIKE, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to authorize a group or a legitimate representative of workers to file the notice of, and to go on strike in cases of unfair labor practice constituting union busting and in the event that there is no legitimate labor organization to file the same. Removes dismissal and imprisonment as penalty in violation of orders, prohibitions or injunctions, and direct participation by union officers in illegal strike."
