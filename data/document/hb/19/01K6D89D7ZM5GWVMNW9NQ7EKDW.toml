congress_website_title = "AN ACT CREATING THE NATIONAL AGRARIAN REFORM ADJUDICATION COMMISSION, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to create an independent body composed of a Chairman and fourteen (14) Commissioners, who shall all be appointed by the President upon recommendation of the DAR Secretary; Provides for the qualifications of the commissioners to ensure the appointment of qualified and competent persons. Provides that NARAC has jurisdiction over all agrarian disputes, including the determination of just compensation - sits en banc only in promulgating rules of procedure and formulating policies. Proposes that each division has Provincial Agrarian Reform Adjudicators (PARADs) which have original jurisdiction over all agrarian disputes; Provides the decisions of the PARADS are appealable to NARAC and thereafter to the Supreme Court. . ."
