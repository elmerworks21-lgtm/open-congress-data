congress_website_title = "AN ACT PROVIDING FOR THE MAGNA CARTA OF CHILDREN"
congress_website_abstract = "Seeks to establish children´s right to life and survival, including health care, protection against child labor, drugs, sexual exploitation, armed conflict and displacement, deprivation of liberty, harmful social and cultural practices, street situation, emergency and calamities, refugee status, identity matters, right to development; right to participate concerning family, education, play, recreation, sports, and cultural activities, media, situation of violence, and child participation in national and international platforms, among others. Proposes institutionalizing the Federation of Local Children´s Association (FLCAs) - to establish the Ombudsman for Children and the Phil. Commission on Children and facilitate the Philippine National Children´s Conference."
