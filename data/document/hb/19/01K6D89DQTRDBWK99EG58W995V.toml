congress_website_title = "AN ACT AMENDING SECTION 5 OF REPUBLIC ACT NO. 10752, OTHERWISE KNOWN AS “AN ACT FACILITATING THE ACQUISITION OF RIGHT-OF-WAY SITE OR LOCATION FOR NATIONAL GOVERNMENT INFRASTRUCTURE PROJECTS AND FOR OTHER PURPOSE”"
congress_website_abstract = "Seeks to address the delays in the computation and especially of payment of just compensation as a primary cause of delay in accelerating the implementation of government projects. Proposes to give property owners the choice of receiving compensation in the form of tax credits which is advantageous for the economy, the environment, etc. ; Encourages them to engage in a negotiated sale with the government instead of going through the drawn-out and arduous process of expropriation."
