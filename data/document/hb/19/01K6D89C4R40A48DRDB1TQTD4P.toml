congress_website_title = "AN ACT AMENDING SECTION 12 (A) OF REPUBLIC ACT NO. 7610, OTHERWISE KNOWN AS “SPECIAL PROTECTION OF CHILDREN AGAINST ABUSE, EXPLOITATION AND DISCRIMINATION ACT”, AS AMENDED BY REPUBLIC ACT NO. 9231"
congress_website_abstract = "Aims to provide a uniform time in which children are not allowed to work by prohibiting all minors under eighteen (18) years of age, from working between eleven o´clock in the evening to seven o´clock in the morning (11PM to 7AM). Seeks to remove the current staggered time by removing the differentiation between age groups, and allows those in the creative industries (including child actors) to maximize their available working hours, while still providing special protection to children and preventing conditions prejudicial to their development."
