congress_website_title = "AN ACT INSTITUTING THE MEDICAL RESERVE CORPS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to produce and call on the needed manpower to expand the country's human health resources in times of disasters and public health emergencies through the mobilization of a medical reserve force fully trained to supplement the existing health care system; Propose to include in the Medical Reserve Corps, licensed physicians (retired/non-practitioners in a hospital setting); medical students who have completed their first four years of their course, graduates of medicine, and registered nurses with a limited and special authorization to render medical services pursuant to the Medical Act; and Licensed allied health professionals."
