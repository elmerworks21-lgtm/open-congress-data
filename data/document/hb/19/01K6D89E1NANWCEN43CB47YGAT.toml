congress_website_title = "AN ACT PROMOTING ENTREPRENEURSHIP BY ESTABLISHING A SUSTAINABLE FINANCING PROGRAM FOR MICRO ENTERPRISES THROUGH THE PONDO SA PAGBABAGO AT PAG-ASENSO PROGRAM, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to ensure the availability and accessibility of microfinancing to micro-entrepreneurs such as market vendors, sari-sari store owners, and stall owners by institutionalizing the P3 Program. Proposes the following:Â the beneficiaries of the P3 Fund shall be micro enterprises as defined under R.A.No.6977 (Magna Carta for Micro, Small and Medium Enterprises( MSMEs), as amended; the Small Business Corporation (SB Corp.) shall handle the fund delivery through direct lending and lending through accredited Partner Financial Institutions (PFIs) which shall be limited to rural banks, cooperatives, micro-financing institutions, or lending companies. Provides the features of the P3 Fund among others:Â interest rate shall not exceed 2% per month and no collateral requirement from the P3 Fund beneficiaries."
