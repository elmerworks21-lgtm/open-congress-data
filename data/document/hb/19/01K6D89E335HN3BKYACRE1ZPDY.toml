congress_website_title = "AN ACT CREATING ANTI-DRUG ABUSE COUNCILS IN ALL PROVINCES, CITIES, MUNICIPALITIES, AND BARANGAYS THROUGHOUT THE COUNTRY AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Aims to create mechanisms where a health-based approach on drug addiction can be implemented in the grassroots. Creates Anti-Drug Abuse Council (ADAC) which shall be composed of local officials and representatives of various community organizations that shall spearhead the planning and implementation, and monitoring of all local anti-drug abuse programs, projects and activities. Mandates all local government units consisting of provinces, cities, municipalities, and barangays to create or organize their respective ADACs."
