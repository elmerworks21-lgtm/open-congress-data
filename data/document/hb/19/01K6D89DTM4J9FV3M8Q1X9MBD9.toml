congress_website_title = "AN ACT ESTABLISHING THE FISCAL REGIME FOR THE MINING INDUSTRY"
congress_website_abstract = "Seeks to optimally utilize our minerals by bridging the gaps in our current laws and regulations. Intends to create a fiscal regime that allows a more equitable revenue-sharing between the government and mining industry that strikes a balance between environmental protection, societal benefits, and our socioeconomic agenda. Proposes for several provisions among others related to the following: 1) Limitation of interest expense deductions for contractors; 2) Royalty taxes for large-scale metallic mining operations within and outside mining reservations; 3) Royalty tax for small-scale metallic mining operations; 4) Margin-based windfall profits tax on income from mining operations before corporate income tax; 5) Treatment of each mining operation as a separate taxable entity; 6) Fiscal regime under financial or technical assistance agreements, etc. 6) Registration with the Mines and Geosciences Bureau (MGB); 7) Disposition of Royalties for the Natural Resource Trust Fund."
