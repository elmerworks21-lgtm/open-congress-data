title = "COCKPIT REGULATION LAW OF 2024"
date_filed = "2025-01-08"
long_title = "AN ACT PROHIBITING THE ESTABLISHMENT AND OPERATION OF COCKPITS AND OTHER STRUCTURES OR FACILITIES FOR HOLDING COCKFIGHTS WITHIN A RADIUS OF FIVE HUNDRED LINEAL METERS FROM ANY EXISTING RESIDENTIAL OR COMMERCIAL AREA, SCHOOLS AND OTHER EDUCATIONAL INSTITUTIONS, CHURCH BUILDINGS AND OTHER PLACES OF WORSHIP, AND HOSPITALS, AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
scope = "National"
subjects = [ "Cockpit Regulation Law",]
congress_website_author_codes = ["E003","F027","K032","K063","G002","E045","G059"]
congress_website_coauthors_raw = ["DALIPE, MANUEL JOSE M.","PRIMICIAS-AGABAS, MARLYN L.","DIONISIO, ERNESTO JR. M.","ORTEGA, FRANCISCO PAULO V.P.","KHONGHUN, JEFFERSON F."]
congress_website_committee_codes = ["0514","0532"]
congress_website_primary_keys = [135862]
congress_website_title = "AN ACT PROHIBITING THE ESTABLISHMENT AND OPERATION OF COCKPITS AND OTHER STRUCTURES OR FACILITIES FOR HOLDING COCKFIGHTS WITHIN A RADIUS OF FIVE HUNDRED LINEAL METERS FROM ANY EXISTING RESIDENTIAL OR COMMERCIAL AREA, SCHOOLS AND OTHER EDUCATIONAL INSTITUTIONS, CHURCH BUILDINGS AND OTHER PLACES OF WORSHIP, AND HOSPITALS, AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Prohibits the following when done or conducted within a radius of five hundred (500) lineal meters from any existing residential or commercial area, school or other educational institution, church building or other place of worship, or hospital: 1.) Construction, operation or managing of a cockpit or other building, structure or facility intended to be used for holding cockfights; and 2.) The betting or collecting bets in or participating in any other manner in the conduct of a cockfight. Declares it also illegal, prohibited, and punishable under this Act the following: 1.) Approving, issuing, or facilitating in any manner the approval or issuance, of permits to construct, make or erect, cockpits, or other buildings, structures or facilities intended for holding cockfights within the prohibited place; and 2.) Approving, issuing or facilitating in any manner the approval or issuance of permits to conduct or hold cockfights in such cockpits, buildings, structures or facilities or other prohibited place. Prohibits government employees and public officials from committing any of the prohibited acts provided by this Act."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=19&q=HBN-11253"

