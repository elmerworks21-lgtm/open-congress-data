congress_website_title = "AN ACT IMPOSING A MOTOR VEHICLE ROAD USER'S TAX ON NON-CONVENTIONAL VEHICLES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8794, ENTITLED \"AN ACT IMPOSING A MOTOR VEHICLE USER'S CHARGE ON OWNERS OF ALL TYPES OF MOTOR VEHICLES AND FOR OTHER PURPOSES\""
congress_website_abstract = "Seeks to impose the same tax rates on non-conventional vehicles as those imposed for light cars. Classifies symmetrically arranged three-wheel vehicles, light quadricycle, and heavy quadricycle as non-conventional vehicles. Imposes the motor vehicle road user´s tax (MVRUT) in lieu of the motor vehicle user´s charge (MVUC) on non-conventional vehicles."
