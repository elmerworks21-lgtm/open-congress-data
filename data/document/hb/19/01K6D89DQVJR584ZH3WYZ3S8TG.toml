congress_website_title = "AN ACT ESTABLISHING A KADIWA NI ANI AT KITA CENTER IN EVERY CITY AND MUNICIPALITY AND KADIWA NI ANIT AT KITA STORES IN EVERY BARANGAY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to establish a KADIWA Center and Stores at the city or municipality and barangay level which will implement the modalities of such programs like KADIWA Retail Selling, KADIWA on Wheels, KADIWA Online, and e-KADIWA for fisherfolks and food producers to be able to distribute their products on a continuous and wider scale and the consumers to have a regular and intermittent access to their goods for such efficient and effective measure of direct marketing scheme by the Department as a solution to food security."
