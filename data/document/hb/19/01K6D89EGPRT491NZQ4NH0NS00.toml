congress_website_title = "AN ACT STRENGTHENING THE CONSTITUTIONAL RIGHTS OF GOVERNMENT EMPLOYEES TO SELF-ORGANIZATION, COLLECTIVE BARGAINING AND NEGOTIATION, PEACEFUL CONCERTED ACTIVITIES, AND USE OF VOLUNTARY MODES OF DISPUTE SETTLEMENT"
congress_website_abstract = "Aims to protect the rights of government employees to organize, bargain collectively, and resolve disputes through voluntary means. Excludes the Members of the Armed Forces and Philippine National Police from the right to self-organization. Exempts legitimate employee organizations, federations, and confederations from income tax on their properties and donations. Ensures funds are appropriated for implementing collective bargaining agreements across all government branches and agencies. It establishes the Public Service Labor Relations Board (PSLRB) to oversee these processes and ensures that employee organization are supported and protected under the law."
