congress_website_coauthors_raw = ["DELOS SANTOS, ALFRED C.","DALIPE, MANUEL JOSE M.","REVILLA, RAMON JOLO III B.","PRIMICIAS-AGABAS, MARLYN L."]
congress_website_committee_codes = ["0532","I501"]
congress_website_primary_keys = [7033]
congress_website_title = "AN ACT MANDATING GOVERNMENT AGENCIES AND LOCAL GOVERNMENT UNITS TO ALLOCATE AT LEAST 25% OF THEIR BUDGET FOR FURNITURE AND FIXTURES FOR PRODUCTS MADE OF ENGINEERED BAMBOO AND OTHER BAMBOO-BASED COMMODITIES"
congress_website_abstract = "Seeks to recognize bamboo as a sustainable alternative to conventional materials, such as wood and steel. Directs all agencies, departments, bureaus, offices and instrumentalities of the national government, as well as local government units (LGUs) to allocate a minimum of twenty-five percent (25%) of their annual furniture and fixtures budget for the procurement of engineered bamboo and bamboo-based products. Mandates the Philippine Bamboo Industry Development Council to implement programs, conduct annual fairs or exhibits, develop a plan and program to increase the production of bamboo, identify government lands that may be planted with bamboo, work with SUCs with academic programs on forestry and agriculture to develop courses on the propagation of bamboo, and monitor the compliance of government agencies and LGUs."
