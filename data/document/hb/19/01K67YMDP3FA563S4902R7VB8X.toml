date_filed = "2024-04-24"
long_title = "AN ACT MANDATING GOVERNMENT AGENCIES AND LOCAL GOVERNMENT UNITS TO ALLOCATE AT LEAST 25% OF THEIR BUDGET FOR FURNITURE AND FIXTURES FOR PRODUCTS MADE OF ENGINEERED BAMBOO AND OTHER BAMBOO-BASED COMMODITIES"
scope = "National"
subjects = [ "Bamboo Industry",]
