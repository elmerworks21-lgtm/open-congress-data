congress_website_title = "AN ACT REGULATING THE USE OF TREATMENT TECHNOLOGY FOR MUNICIPAL AND HAZARDOUS WASTES, REPEALING FOR THE PURPOSE SECTION 20 OF REPUBLIC ACT NO. 8749, ENTITLED “THE PHILIPPINE CLEAN AIR ACT OF 1999\""
congress_website_abstract = "Aims to regulate the use of thermal and other treatment technologies for the disposal of municipal and hazardous wastes, or for the processing of any waste material for fuel which shall be designed and operated to meet the standards established pursuant to this Act and its implementing rules and regulations. Mandates the Department of Environment and Natural Resources (DENR) to be the lead agency responsible for the implementation and enforcement of this Act and the Department of Energy on relevant regulations pertaining to waste-to-energy facilities. Mandates the Local Government Units (LGUs) to facilitate the establishment of waste treatment facilities within a region, province, or strategically clustered LGUs, in consonance with their respective ten-year solid waste management plans. Tasks the Department of Science and Technology (DOST) to undertake the necessary verification of the technology that will be used for the treatment or waste processing projects. Grants fiscal and non-fiscal incentives to registered investors and hosts of waste treatment programs."
