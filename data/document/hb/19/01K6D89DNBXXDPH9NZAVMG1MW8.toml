congress_website_title = "AN ACT PROVIDING FOR A NATIONAL FRAMEWORK FOR THE GROWTH AND DEVELOPMENT OF DIGITAL CAREERS IN THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for State´s role in promoting careers and jobs enabled and supported by the Internet, ICT, digital technology and tools, and systems that allow a person to interact directly with companies, service users, and end-users through remote and virtual services and systems. Intends to ensure that workers in the online freelance industry or short-term contracts are protected and are included under the labor laws - institutionalizing their employment standards and enhancing their competitiveness through access to relevant training, skills development, and scholarship opportunities. Includes several provisions, among others relating to the following: Roles of DICT, DepEd, CHED, TESDA, DOLE, DTI, DILG; E-Readiness of LGUs; Skills Map; Digital Libraries and Learning Hubs, and others."
