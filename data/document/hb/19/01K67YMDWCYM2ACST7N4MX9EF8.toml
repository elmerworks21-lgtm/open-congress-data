congress_website_title = "AN ACT STRENGTHENING THE LEGAL EDUCATION BOARD, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7662, OTHERWISE KNOWN AS THE \"LEGAL EDUCATION REFORM ACT OF 1993\", AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to undertake reforms in the legal education system that shall require the proper selection of law students, maintain quality among law schools, and require legal apprenticeship and continuing legal education. Creates the Commission on Legal Education (CLED) which shall formulate development plans, policies, priorities and programs on legal education and research, and implement the same under the provisions of this Act, or in the absence of such provisions, to recommend to the Legislative Branch appropriate remedial legislation. Provides that law schools may not operate unless accredited by the CLED, and accreditation of law schools may be granted only to those recognized by the government and whose charters or articles of incorporation expressly or impliedly authorize them to offer law courses. Creates the Legal Education Fund (FUND) which shall be under the control of the CLED and to be used exclusively for the improvement and strengthening of legal education in the entire country."
