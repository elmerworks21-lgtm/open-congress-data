congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1621, OTHERWISE KNOWN AS THE \"ANTI-FENCING LAW\""
congress_website_abstract = "Seeks to address the non-concomitant adjustment of the penalties provided under PD 1612 upon the enactment of RA 10951 (AN ACT ADJUSTING THE AMOUNT OR THE VALUE OF PROPERTY AND DAMAGE ON WHICH A PENALTY IS BASED, AND THE FINES IMPOSED UNDER THE REVISED PENAL CODE, AMENDING FOR THE PURPOSE ACT NO. 3815, OTHERWISE KNOWN AS “THE REVISED PENAL CODE”, AS AMENDED). Proposes that the penalties for fencing be adjusted based on the penalties for theft and robbery under RA 10951 (since fencing is an accessory crime of Theft and Robbery) with a corresponding penalty based on the value or amount of the property taken by the offender."
