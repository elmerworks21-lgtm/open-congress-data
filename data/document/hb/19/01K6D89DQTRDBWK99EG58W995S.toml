congress_website_title = "AN ACT ESTABLISHING AN “ADOPT-A-WILDLIFE SPECIES PROGRAM” AND PROVIDING INCENTIVES THEREFOR"
congress_website_abstract = "Seeks to identify and mitigate all possible threats to biodiversity/endangered species like urbanization, declining water quality, natural extinction, pollution, overexploitation, and climate change. Intends to encourage the adoption of wildlife species by local communities under guidelines to be jointly promulgated by the DENR, the DA, and the DOF with active participation by the LGUs, NGOs, POs, civil society groups, and private individuals. Refers biodiversity to the variety of living species on Earth, including plants, animals, bacteria and fungi - more specifically refers to all of the species in one region or ecosystem)"
