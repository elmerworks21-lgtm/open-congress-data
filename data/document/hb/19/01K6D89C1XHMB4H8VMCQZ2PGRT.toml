congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 10912, OTHERWISE KNOWN AS THE CONTINUING PROFESSIONAL DEVELOPMENT ACT OF 2016"
congress_website_abstract = "Redefines the term CPD Credit Unit to include PROFESSIONAL WORK EXPERIENCE to the value of an amount of learning that can be transferred to a qualification achieved . . .; Also redefines the term Quality Assurance to include INFORMAL, SAFE-DIRECTED, AND WORK-PLACE BASED LEARNING . . ., and Defines several terminologies among others such as competency, portability, recognition of prior learning, professional work experience, and specialty training. Proposes several amendments regarding the following: a) upgrading of qualifications toward career progression and specialization; b) appropriating qualification title attained based on PQF qualification level; c) professionals who were covered by mutual recognition agreements (MRAs); d) qualification assessment standards for every level of qualification or standards of practice indicated in their respective career progression and specialization; e) DOLE to coordinate and undertake the updating and revision of concerned private entities; f) qualification title under their respective career progression and specialization program to be included in the Phil. Standard & Occupational Classification (PSOC) and the Index of Occupational Services (IOS), position titles and salary grades of the Position Classification and Compensation System of the Government; g) provision regarding OFWs professionals."
