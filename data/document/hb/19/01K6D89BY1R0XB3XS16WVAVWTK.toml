congress_website_title = "AN ACT INSTITUTIONALIZING THE TRANSITION OF THE GOVERNMENT TO E-GOVERNANCE IN THE DIGITAL AGE, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to establish an integrated, interconnected, and interoperable information, resource sharing, and communications network through several provisions enumerated and discussed in this Act regarding the following: the Role of the DICT; the Integrated Government Network (re: paper-based workflows, etc.); the Phil. individual Information Database and Civil Registration System; the Public Service Directory; the Service Portal for Individuals and Business (government frontline services, online payment system, citizen's concerns center, cooperation of government agencies and LGUs, etc.); the Online Public Service; the Phil. Citizen Connect Program (free internet access for the public, provision of internet-capable devices in all barangays; the Government Websites and E-Bulletin Boards; Data Information Security; Phil. Infrastructure Management Corp.(PIMC); and the ICT Academy."
