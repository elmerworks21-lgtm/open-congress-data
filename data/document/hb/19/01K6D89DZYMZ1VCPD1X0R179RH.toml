congress_website_title = "AN ACT PROVIDING FOR THE REVISED NATIONAL POLICY ON NUTRITION AND DIETETICS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Defines “low-carb, high-fat diet” as a dietary approach characterized by reduced carbohydrate intake and increased consumption of healthy fats.Â “Fat” includes that found in saturated oils and mono-unsaturated oils but excludes that found in poly-unsaturated oils and trans fat. Proposes for the following:Â promotion program about principles, benefits, and risks; public awareness campaigns, educational materials, and guidelines; comprehensive portal about healthy diet to mobile, tablet, laptop, desktop, etc.; dietary options and recommendations into national dietary guidelines and public nutrition programs; information and resources for implementation; research funds into its effects and safety including potential long-term health impacts; monitoring and reporting dietary trends and health outcomes; review/revision of the conventional “food pyramid”; support to local food producers and retailers. Mandates the display of nutritional information on food products, menus, signages, menu boards, and online displays of food establishments."
