congress_website_title = "AN ACT MODERNIZING THE PHILIPPINE POSTAL CORPORATION AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to enable PhilPost to be a competitive provider of mail delivery services with an extensive coverage across the country. Proposes the following: Phil Post shall serve as the primary delivery service provider of government offices and agencies. Ensures security of data and communication in a manner that is consistent with the Data Privacy Act of 2012; Seeks to adopt technology-driven business solutions and offer on-demand courier services with real-time tracking features."
