congress_website_primary_keys = [14013]
congress_website_title = "AN ACT MANDATING THE PROPER INSTALLATION AND MAINTENANCE OF OVERHEAD ELECTRIC DISTRIBUTION, COMMUNICATION LINES, AND STRUCTURES BY ALL ELECTRIC DISTRIBUTION, CABLE, AND TELECOMMUNICATIONS COMPANIES FOR PURPOSES OF PUBLIC SAFETY AND GOOD HOUSEKEEPING"
congress_website_abstract = "Seeks to mandate all electric, cable, and telecommunications companies to conduct periodic inspections of their respective utility line installations to ensure strict compliance with the standards and regulations provided under the Philippine Electrical Code. Directs all cities and municipalities through their respective city or municipal engineers of the DPWH in the case of national roads, to ensure that every utility company, within their territorial jurisdiction, complies with the provision of this Act. Creates a Monitoring and Service Team to perform the immediate and necessary clean-up operation and maintenance of overhead electric distribution lines, cables, utility poles, equipment, and accessories in compliance with this Act."
