congress_website_coauthors_raw = ["DALIPE, MANUEL JOSE M.","REVILLA, RAMON JOLO III B.","PRIMICIAS-AGABAS, MARLYN L.","DIONISIO, ERNESTO JR. M.","BARONDA, JULIENNE \"Jam\"","LEE, WILBERT T.","DELOS SANTOS, ALFRED C."]
