congress_website_title = "AN ACT STRENGTHENING ASSISTANCE TO FARMERS, FISHER FOLKS AND AGRARIAN REFORM BENEFICIARIES BY INSTITUTIONALIZING DIRECT CREDIT SUPPORT TO SAID SECTORS, AMENDING REPUBLIC ACT NO. 3844 OR THE AGRICULTURAL LAND REFORM CODE"
congress_website_abstract = "Proposes to establish the AGRICULTURAL BANK of the Philippines (AGRIBANK) that shall allocate ten percent (10%) of its regular loan portfolio (net of loans to the BSP interbank loans and availments from domestic bills purchase line) to qualified agricultural sector beneficiaries. Provides that the said facility shall solely finance agricultural projects according to the provisions of Sec.4 of RA.No. 10000 (AGRI-AGRA REFORM CREDIT ACT OF 2009). States that all loans extended through this socialized credit window shall qualify as part of the bank´s compliance with the Agri-Agra Law and shall extend through farmers´ and fisherfolk´s cooperatives/organizations or associations or federations; non-agricultural cooperatives; cooperative banks; rural/thrift banks; agri-business firms or anchor firms. . .; NGOs; foundations, etc."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_19/HB01564.pdf"]
