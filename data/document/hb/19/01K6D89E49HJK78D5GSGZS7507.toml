congress_website_title = "AN ACT PROVIDING THE MAGNA CARTA FOR TAXPAYERS"
congress_website_abstract = "Seeks to provide increased protection of taxpayers´ rights in complying with their obligation to pay national and local taxes to the government. Creates the Office of the National Taxpayer Advocate (ONTA) which shall protect the rights of taxpayers in terms of representation of low-income taxpayers who have dispute with Revenue Authorities, provide education, and engage in regular information and communication programs on tax laws, to ensure that the public is properly apprised thereof. Integrates the Taxpayers´ Bill of Rights and Obligation in all public and private higher education curriculum."
