congress_website_title = "AN ACT CREATING A NEW VISA CATEGORY FOR DIGITAL NOMADS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Refers “Digital Nomad” to individuals who travel freely while working remotely using digital technology. Proposes to grant a Digital Nomad Visa to an alien who works in the Philippines but is employed in another country upon application to the Bureau of Immigration for a period of twelve (12) months, renewable for another twelve (12) months, subject to the requirements provided for in this Act."
