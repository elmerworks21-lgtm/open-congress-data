congress_website_title = "AN ACT ACCELERATING PUBLIC SECTOR INVESTMENTS IN LOCAL INFRASTRUCTURE, ESTABLISHING FOR THE PURPOSE THE LOCAL BUILD, BUILD, BUILD PROGRAM, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address the inadequate infrastructure system at the local level that impairs the ability of LGUs to implement programs and projects effectively within their respective jurisdictions. Seeks to accelerate public infrastructure spending at the grassroots level by establishing a national strategy for providing intensive investment in all provinces, cities, municipalities, and barangays. Proposes for the construction, upgrading, or improvement of buildings and other infrastructure; roads and bridges; drainage, flood mitigation, and flood control systems; local transport infrastructure; agricultural and irrigation facilities; education/health/social welfare/ infrastructure; housing and resettlement projects; water supply and sanitation/jail and prison/public enterprise/local electrification and other projects to be identified by the DILG."
