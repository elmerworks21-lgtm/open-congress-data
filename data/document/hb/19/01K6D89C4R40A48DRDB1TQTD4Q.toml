congress_website_title = "AN ACT DECLARING THE MONTH OF OCTOBER OF EVERY YEAR AS “NATIONAL ESPORTS MONTH” AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines Esports as a form of multiplayer competition using video games, primarily between competitive gamers that includes the ability to perform in front of an audience, whether through an online platform, broadcasted on television, or at a physical event. Aims to raise awareness and appreciation to the global Esports (digital sports) industry to foster self-discipline, teamwork, and excellence for the development of a healthy and alert citizenry."
