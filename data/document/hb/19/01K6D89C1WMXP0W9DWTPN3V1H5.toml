congress_website_title = "AN ACT AMENDING SECTION 61 OF REPUBLIC ACT 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Proposes amendments based on the concept of devolution, where a component city is within the administrative and disciplinary jurisdiction of the province where it is geographically located. States that a verified administrative complaint against any erring elective official shall be prepared as follows: (a) A complaint against any elective official of a province, a highly urbanized city (,) OR an independent component city (or component city) shall be filed before the Office of the President; (b) A complaint against any elective official of a COMPONENT CITY OR municipality shall be filed before the Sangguniang Panlalawigan whose decision may be appealed to the Office of the President . . ."
