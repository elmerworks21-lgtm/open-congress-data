congress_website_title = "AN ACT ORDAINING A NATIONAL POLICY OF FREE HOUSING THROUGH USUFRUCT, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for a usufruct structure housing program - aims to allow beneficiaries to use the property as usufructuaries while the State retains ownership and title. Mandates NHA, the LGUs, and other government agencies engaged in housing in the distribution of housing units to qualified beneficiaries for free through contracts of usufruct. Proposes the following: qualified beneficiaries (underprivileged/homeless and government employees without known real property), inclusion/period/prohibition of/on usufruct, and financing, ownership, and management in implementing the program."
