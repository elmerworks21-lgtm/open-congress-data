congress_website_title = "AN ACT EXPANDING THE COVERAGE OF ESPIONAGE, AMENDING FOR THE PURPOSE COMMONWEALTH ACT NUMBER 616 OR THE ANTI-ESPIONAGE LAW AND ARTICLE 117 OF THE REVISED PENAL CODE, AND PROVIDING HIGHER PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Proposes to amend laws on espionage to make them adapt to the current situation in light of evolving global security threats, technological advancements, and the changing nature of espionage activities. Seeks to address numerous threats from foreign intelligence services, terrorist organizations, and cybercriminals through comprehensive protection against espionage and related offenses. Refers “NATIONAL SECURITY” as human & political security; health security; economic & financial security; food & water security; military & border security; socio-cultural security; environment & disaster security; energy security; maritime & airspace security; international security; informational & cyber security; transportation and port security. Defines “CLASSIFIED MATTER AND/OR INFORMATION” to include everything regardless of its physical character or electronic form, classified as “top secret”, “secret”, “confidential”, and “restricted”. . . documents, equipment, projects, books, reports . . .Â and all other products or substances that fall within the general term “matter”. Information transmitted orally is considered a “matter” for security purposes. Amends provisions to punishable acts with their corresponding penal provisions"
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_19/HB10988.pdf"]

