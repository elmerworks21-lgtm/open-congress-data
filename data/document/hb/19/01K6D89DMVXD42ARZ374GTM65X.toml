congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF AN ONLINE INFORMATION CENTER ON RECALL, PROHIBITION, DEFECT AND OTHER SAFETYRELATED DATA ON CONSUMER PRODUCTS AND MOTOR VEHICLES"
congress_website_abstract = "Seeks to protect consumers from substandard or hazardous products, to prevent fraudulent, deceptive and unfair business practices in the marketplace, and to provide information to help consumers to spot and avoid them. Aims to establish a Product Safety Online Information Center with website features related to the following matters: List of all valid and existing product recalls, prohibitions, bans, defect notices, . . .; Alerts on latest recalls . . . and other safety announcements; Simple, plain-language explainers of recalls, . . . in English, Filipino, and other local languages or dialects . . . Platform for reports and complaints . . . through labels, ID nos., batch and lot numbers, vehicle ID nos., etc.; Contact information of manufacturers, retailers, distributors and other related businesses; Integration with existing consumer complaint and grievance procedures of the implementing agencies, etc."
