congress_website_title = "AN ACT REPEALING THE RESERVA TRONCAL PROVISION PROVIDED FOR UNDER ARTICLE 891 OF THE REPUBLIC ACT NO. 386, OTHERWISE KNOWN AS THE NEW CIVIL CODE OF THE PHILIPPINES"
congress_website_abstract = "Repeals Art. 891 of the Civil Code which states that: The ascendant who inherits from his descendant any property which the latter may have acquired by gratuitous title from another ascendant, or a brother or sister, is obliged to reserve such property as he may have acquired by operation of law for the benefit of relatives who are within the third degree and who belong to the line from which said property came. Aims to address issues regarding Reserva Troncal as follows: it entails and encumbers property; it prevents the free circulation of property; it clusters the successional system of legitimes and of intestate succession; it penalizes marriage and legitimate family relations."
