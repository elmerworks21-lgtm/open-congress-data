congress_website_title = "AN ACT INSTITUTIONALIZING THE PAMBANSANG PABAHAY PARA SA PILIPINO PROGRAM, IDENTIFYING OTHER SOURCES OF FUNDING AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Tasks the Department of Human Settlement and Urban Development (DHSUD) to implement the “Program”; Enumerates the roles, functions, and responsibilities of DHSUD, LGUs, NHA, SHFC (Social Housing Finance Corporation), HMDF, Participating GFIS and Private Banks and NHMFC (National Home Mortgage Finance Corporation (NHMFC). Provides for the following objectives:Â one million housing units every year; priority primary beneficiaries; strategies for accessible and affordable housing finance; Support to LGUs; and Private sector participation. Proposes several provisions as follows:Â program components (site identification, housing design/construction, financing, beneficiaries, and subsidy amortization and interest); amortization and interest subsidy fund (PAGCOR, portions of Metro Manila military camps, fund sources from Public Estates Authority, Ill-gotten wealth not previously set aside, Loans, Grants and Donations (local/foreign), Alienable Public Lands in urban areas, Forfeited Customs Bonds)."
