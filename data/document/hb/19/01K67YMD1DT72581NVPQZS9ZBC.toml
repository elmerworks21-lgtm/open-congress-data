congress_website_title = "AN ACT PROTECTING THE RIGHT OF THE PEOPLE TO FREEDOM OF RELIGION IN THE PHILIPPINES GUARANTEED UNDER SECTION 5, ARTICLE III OF THE CONSTITUTION"
congress_website_abstract = "Aims to protect and uphold the right of every Filipino to freely choose and exercise one´s religion and beliefs and to act and live according to one´s conscience as guaranteed under Section 5, Article III of the Constitution and other international human rights instruments. States that the right of every person to freedom of religion, or the free exercise thereof and liberality of conscience can be denied, regulated, burdened, or curtailed only if it can be demonstrated that: a. The free exercise of religious freedom or conscience of a religious group or individual results to violence or inflicts or poses to inflict direct or indirect physical or material harms or danger on other people, or infringe on their own freedom of religion or conscience; and b. It is necessary to protect public safety, public order, health, property and good morals. Provides penalties for any person, natural or juridical, who violates this Act."
