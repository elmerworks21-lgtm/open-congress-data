congress_website_title = "AN ACT TO AMEND THE PARTNERSHIP PROVISIONS OF THE NEW CIVIL CODE"
congress_website_abstract = "Seeks to exclude corporations from participation as partners within the classical partnership framework outlined in the Civil Code. Proposes to enjoins corporations to establish joint ventures guided by the prevailing corporate laws or general contract law to clarify the legal landscape and promote greater legal clarity and consistency. Proposes to amend Art.1767 of Republic Act No. 386, which partly read as follows: “Corporations shall not be eligible to form a partnership under Title IX; however, corporations may be allowed to form contractual or corporate joint ventures . . .”"
