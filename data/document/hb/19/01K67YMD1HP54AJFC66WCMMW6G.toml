congress_website_title = "AN ACT PROVIDING FOR A NEW PASSPORT LAW, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 8239, OTHERWISE KNOWN AS THE “PHILIPPINE PASSPORT ACT OF 1996”"
congress_website_abstract = "Seeks to harmonize the current passport law with domestic laws and international agreements affecting passport application and issuance. Provides for the issuance of passports or any travel document to any citizen of the Philippines or individual with the latest tamper-proof, personalization, and data management technology. Prescribes for minimum requirements for the application and issuance of passports and other travel documents to enhance and protect the unimpaired exercise of the right to travel. Seeks to provide for the “Emergency Passport” to be issued to Filipinos who have been previously issued with a regular passport but for any reason cannot apply for or be issued a regular passport. Provides senior citizens and persons with disabilities a 50% discount for the processing and replacement of their passports. Improves the consular services of the DFA by allowing it to charge no more than 50% of the current fees relating to the processing or issuance of passports requiring special consideration, waiver, or issuance beyond office hours."
