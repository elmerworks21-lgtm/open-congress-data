congress_website_title = "AN ACT INSTITUTIONALIZING THE POSITION OF ECONOMIC AND INVESTMENT PROMOTION OFFICER IN LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE “LOCAL GOVERNMENT CODE OF 1991”"
congress_website_abstract = "Provides for the qualifications of the municipal, city, and provincial economic and investment promotion officer such as a college degree holder preferably in Economics, Business Administration/Management, and must have acquired experience in economics or investment policy making or management or related field. Tasks the promotion officer to take charge of the following: Local investment and incentives code; Local economic and investment promotion policies, projects, and activities; Promotion and marketing of the LGU as an investment location; Business potentials of the LGU to prospective investors; Generation of investments and other matters relative to economic development; Local economics database, etc."
