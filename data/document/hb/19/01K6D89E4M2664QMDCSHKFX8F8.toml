congress_website_title = "AN ACT ESTABLISHING A COMPREHENSIVE DEFENSE PACKAGE FOR THE REPUBLIC OF THE PHILIPPINES, TO PROMOTE A FAST AND MASSIVE MILITARY BUILD-UP,TO FOSTER MODERN ASSETS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to establish at least one food security cold storage facility center for agricultural products in every province to ensure the preservation and safety of perishable agricultural products, such as crops, fruits, vegetables, and meat, and improve food security. Provides that existing structures, facilities, and equipment could be improved to effectively serve as a defense package in compliance with rules and regulations set by the National Security Council (NSC), AFP, DND, and subject matter experts."
