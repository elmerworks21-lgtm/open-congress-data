congress_website_title = "AN ACT AUTHORIZING EXEMPTION FROM IMPOSITION OF VALUE-ADDED TAXES (VAT) ON THE ELECTRICAL BILLINGS OF RESIDENTIAL HOUSEHOLDS WITH A TOTAL MONTHLY CONSUMPTION OF 200KWH AND LESS"
congress_website_abstract = "Aims to mitigate the burden to consumers of costly electricity, especially those living below the poverty line, the poor and marginalized sector of the community. Intends to address the fact that “an electricity bill is riddled with various components with additional VAT imposition - . . .Except for universal, and feed-in-tariff allowance charges, the rest of the components include the imposition of VAT. Under the TRAIN Law . . ., a twelve percent (12% VAT) is imposed on the sale of electricity, transmission by any entity, including the National Grid Corporation of the Philippines, and distribution companies, including electric cooperatives."
