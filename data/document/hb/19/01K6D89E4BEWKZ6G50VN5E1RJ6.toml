congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 11235, OTHERWISE KNOWN AS THE \"MOTORCYCLE CRIME PREVENTION ACT\""
congress_website_abstract = "Defines the term: “radio frequency identification system (RFID) sticker; Proposes several amendments regarding registration of motorcycles in the case of new ownership; in the subsequent sale or disposition of a motorcycle on a cash basis/installment or “assume balance” basis; and in the case of repossessed motorcycles. Proposes for the following: installation of an RFID sticker, a small scanner-readable RFID sticker, and the data contained in the RFID sticker installed in the front of the motorcycle."
