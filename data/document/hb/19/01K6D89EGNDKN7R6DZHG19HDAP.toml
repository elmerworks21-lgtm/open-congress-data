congress_website_title = "AN ACT ESTABLISHING A NATIONAL PROGRAM FOR THE MALUNGGAY INDUSTRY, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to accelerate the growth and development of the malunggay industry to improve investment climate, boost competencies and efficiency of agribusiness, promote malunggay as a source of livelihood, and maximize its utilization for health and nutrition. Establishes a Malunggay Industry Development Committee that shall be composed of different government agencies, SUCs, farmers´ group and the private sector. Authorizes the Committee to formulate a five-year Malunggay Framework for Development which shall serve as a guide for a harmonized and collaborative implementation of policies, programs and projects for the advancement, industry-wide development, and inclusive growth of the Philippine Malunggay Industry. Mandates the Committee, in consultation with all the industry players, to prepare the Malunggay Industry Roadmap which shall be updated every five (5) years."
