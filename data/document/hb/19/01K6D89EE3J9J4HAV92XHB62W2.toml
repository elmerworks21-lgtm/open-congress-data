congress_website_title = "AN ACT IMPOSING SOLIDARITY CONTRIBUTION ON THE MOST AFFLUENT FILIPINOS FOR THE BENEFIT OF PUBLIC HEALTH AND CLIMATE CHANGE RESILIENCY"
congress_website_abstract = "Proposes a solidarity contribution based on net worth as of December 31 each year, with corresponding rates outlined in a provided table. Provides that a Solidarity Contribution Return be filed, which must include total assets, liabilities, and net worth. The amount payable will be divided into installments over several periods and specific dates. Furthermore, the assessment and collection of this contribution will follow the same procedures as those for income, estate, and donor´s taxes as specified in the National Internal Revenue Code (NIRC). The revenues generated from this contribution will be allocated exclusively for the following purposes: a) Universal Health Care Act; health expenditures, including hospitals and medical facilities; education and training for medical students in public universities; additional doctors for public hospitals; Disaster Calamity Quick Response Funds; and financial support for local government units (LGUs) to assist evacuees displaced during climate disasters."
