congress_website_title = "AN ACT ESTABLISHING A SOCIALIZED AND LOW-COST HOUSING LOAN RESTRUCTURING AND CONDONATION PROGRAM"
congress_website_abstract = "Aims to make available at affordable cost decent housing and basic services to underprivileged and homeless citizens. Condones all socialized and low-cost housing loans with the NHA and SHFC that have at least three (3) months of unpaid monthly amortizations for a period of twenty-four (24) months after the issuance of the implementing rules and regulations of this Act. Authorizes the NHA and SHFC to continue the loan restructuring and condonation program notwithstanding the lapse of twenty-four months application period. Allows restructuring of housing loans and the assumption of payment of outstanding loan by the legal heirs and successors-in-interest. Provides incentives to all accounts which monthly amortization are paid on time."
