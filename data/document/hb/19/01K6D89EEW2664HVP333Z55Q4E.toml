congress_website_title = "AN ACT ENSURING THE FUNDAMENTAL EQUALITY OF MEN AND WOMEN UNDER THE LAWS ON MARRIAGE AND FAMILY RELATIONS, AMENDING FOR THE PURPOSE ARTICLES 14, 96, 124, 211 AND 225 OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE \"FAMILY CODE OF THE PHILIPPINES\""
congress_website_abstract = "Seeks correct the inequitable and unfair situation under the current law which mandates that the decision of the father should prevail on matters relating to marriage and family relations. Mandates that either parent, or guardian, or the person who has legal charge of either or both contracting parties for marriage between the ages of eighteen and twenty-one shall give consent to the marriage. States that any act of administration of the community property and conjugal partnership by either spouse without the consent of the other shall be unenforceable until it subsequently ratified by the non-consenting spouse and that in case of disagreement, the spouses shall make earnest efforts to settle their differences. Provides that the State shall consider the best interest of the family, damages and expenses of litigation in deciding the case of spouses who fail to enter into compromise regarding the administration of community property and conjugal partnership. States that any exercise of guardianship by either parent of the minor child without the consent of the other shall be unenforceable until it is subsequently ratified by the non-consenting parent and that in case of disagreement, either parent shall have recourse to the court within five (5) years from the date the contract was entered by the parties or upon knowledge of the non-consenting parent, whichever comes later."
