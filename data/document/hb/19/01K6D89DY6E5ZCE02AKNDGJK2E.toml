congress_website_title = "AN ACT ESTABLISHING A NATIONAL POLICY FOR THE DEVELOPMENT, UTILIZATION, AND COMMERCIALIZATION OF ENERGY STORAGE SYSTEMS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to address the country´s continuing dependence on fossil fuels despite the enactment of R.A. No. 9513 or the “Renewable Energy Act of 2008”. Seeks to establish general incentives to foster development, utilization, and commercialization of ESS in both on-grid and off-grid areas; to streamline licensing and permitting processes needed for the operation of ESS, aligned with the Energy Virtual One-Stop Shop (EVOSS) Act, etc. Defines several terms among several others: “Energy Storage System” or “ESS” refers to a facility capable of absorbing energy directly from the Grid or distribution system, or from an RE Plant connected to the Grid or Distribution System and storing it for a time period, and injecting stored energy when prompted, needed to ensure reliability and balanced power system. Provides that ESS shall manage the variability of renewable energy sources and help the country´s electric power sector."
