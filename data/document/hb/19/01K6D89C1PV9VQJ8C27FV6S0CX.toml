congress_website_title = "AN ACT AMENDING SECTION 13 OF REPUBLIC ACT NO. 3019 AS AMENDED, ENTITILED THE “ANTI-GRAFT AND CORRUPT PRACTICES ACT”"
congress_website_abstract = "States that “Any incumbent public officer against whom any criminal prosecution under a valid information under R.A. No. 3019, as amended, or under Title 7, Book II of the Revised Penal code or for any offense involving fraud upon government or public funds or property . . . shall be suspended from office FOR A PERIOD NOT EXCEEDING NINETY (90) DAYS: PROVIDED, THAT IN CASE SUCH ELECTED PUBLIC OFFICER IS NO LONGER CONNECTED WITH THE OFFICE WHEREIN THE OFFENSE CHARGED WAS COMMITTED, THE PREVENTIVE SUSPENSION ORDER SHALL NO LONGER BE IMPLEMENTED."
