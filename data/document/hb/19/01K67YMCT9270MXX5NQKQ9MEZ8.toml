congress_website_title = "AN ACT ESTABLISHING AN ON-SITE, IN-CITY, NEAR-CITY, OR OFF-CITY LOCAL GOVERNMENT RESETTLEMENT PROGRAM FOR INFORMAL SETTLER FAMILIES IN ACCORDANCE WITH A PEOPLE´S PLAN AND MANDATING THE IMPLEMENTING LOCAL GOVERNMENT UNIT, JOINTLY WITH THE DEPARTMENT OF HUMAN SETTLEMENTS AND URBAN DEVELOPMENT, IN CASES OF NEAR-CITY OR OFF-CITY RESETTLEMENT, TO PROVIDE OTHER BASIC SERVICES AND LIVELIHOOD COMPONENTS IN FAVOR OF THE RECIPIENT LOCAL GOVERNMENT UNIT, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7279, AS AMENDED, OTHERWISE KNOWN AS THE “URBAN DEVELOPMENT AND HOUSING ACT OF 1992”"
congress_website_abstract = "Seeks to institutionalize inclusive growth through an LGU-led resettlement program that recognizes the people's right to the city where off-city resettlement shall only be resorted to when near-city resettlement is not feasible and must satisfy the requirements of adequate and responsive consultation prior to relocation; Provides for social preparation activities for beneficiaries and for the institutionalization of a people's plan developed by the beneficiaries in coordination with the implementing LGU."
