congress_website_title = "AN ACT ENSURING WOMEN´S EQUAL RIGHTS IN MARRIAGE AND FAMILY RELATIONS, AMENDING ARTICLES 14, 96, 124, 211, AND 225 OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE “FAMILY CODE OF THE PHILIPPINES”"
congress_website_abstract = "Seeks to amend provisions of the law/s that deny women equal decision-making power concerning family and property matters that perpetuates gender inequalities and limit women's autonomy. Intends to address issues regarding the decision to grant or withhold consent to the marriage of children, administration and enjoyment of community property or conjugal partnership, and parental authority over the person and legal guardianship over the property of common children."
