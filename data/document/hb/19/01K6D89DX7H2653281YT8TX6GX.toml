congress_website_title = "AN ACT STRENGTHENING THE CYBERCRIME PREVENTION MEASURES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10175, OTHERWISE KNOWN AS THE \"CYBERCRIME PREVENTION ACT OF 2012\""
congress_website_abstract = "Proposes to widen the scope of computer-data related offenses and allow for the prosecution of more key players involved in the commission and proliferation of cybercrime offenses, such as principals by inducement. Provides that any party who suffers damages caused by the commission of the offense, either directly or indirectly, may initiate the prosecution of the offender. Seeks to amend R.A. NO.10175 regarding the following: Definitions of service provider, subscriber´s information, and identifying information; Descriptions of cybercrime offenses; and other offenses regarding the aiding or abetting in the commission of cybercrime."
