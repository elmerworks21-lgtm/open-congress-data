congress_website_title = "AN ACT PROVIDING FOR A 30-YEAR NATIONAL INFRASTRUCTURE PROGRAM"
congress_website_abstract = "Aims to establish a sustained vital infrastructure projects to be undertaken and implemented by concerned national government agencies and GOCCs in the field of transport (roads, ports, airports, transport projects within the supply chain, infra provision, policies, environmental standards, etc., funds through asset management, different transport mode and healthy competition, “user-pays” principle, engineering enforcement and education, shift from private to public transport esp. on mass transport, inter-island shipping, inc. RORO, infrastructure in support of agriculture, tourism, trade and industry; energy (power generation, electricity costs, natural gas industry, renewable energy such as wind and solar, electricity transmission, services to unelectrified off-grid, island, remote, and last-mile communities; energy efficiency and conservation); water resources (fragmented management, master plans and multipurpose projects as irrigation, power, supply and flood control, investments in water supply, sewerage, and sanitation, flood control in major river basins and urban centers combining engineering intervention works with non-structural measures: land use management, watershed conservation, and flood info and warning systems), ICT (digital infra to complement the national broadband plan, address the gaps in connectivity, e-government for e-governance, system enhancement, climate-smart and resilient, ICT operators service obligations and performance standards, cost of broadband thru infra sharing policies, direct gov´t investment in network infra, broadband network and free wifi programs to be transitioned to private sector, permits for cellular towers, cable laying & network deployment, access to satellites, 5G or higher generation and technology social (Schools for the Future, modern health facilities, preventive care against diseases, social housing and resettlement, Solid Waste Management, prison infrastructure/jails, and agri-fisheries modernization and food logistics. Proposes several general provisions regarding the following: attainment of long-term development vision; ensures consonance with the National Physical Framework Plan and Land Use Plan, and Regional Development Plans; initial list of priority core national projects based on a) Phil. Dev´t Plan, 2017-2022 NEDA; b) Flagship Projects; and c) Programs and Studies of DPWH, DOTr, DOE, DICT, DepEd, DOH, BCDA, NIA, MWSS, among others; prioritizes projects based on effectiveness in meeting gov´t objectives; economic feasibility; social inclusion; environmental sustainability; security; public access; and technical readiness for implementation. . . ; private sector participation; asset preservation and maintenance; climate change adaptation, disaster resilience, and updated safety, health, and environmental standards against calamities and other hazards; infrastructure-related research and development; multi-sectoral, multi-modal and area-wide development; complete functional structures, and continuity in funding and implementing multi-year projects."
