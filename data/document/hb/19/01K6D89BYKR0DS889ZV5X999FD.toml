congress_website_title = "AN ACT DEFINING AND PROTECTING ELDERLY FROM ABUSE, PROVIDING PENALTIES THEREFORE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to provide senior citizens who are victims of violence, with protection and the necessary assistance to ensure their personal safety and security. Defines “violence against the elderly” to any type of violence or abuse, whether physical abuse or violence, sexual, psychological or emotional abuse, material or financial exploitation, and neglect, inflicted upon an elderly individual."
