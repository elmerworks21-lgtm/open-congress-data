congress_website_title = "AN ACT PROVIDING FOR A TRANSPARENT FOOD SECURITY SYSTEM, ESTABLISHING FOR THE PURPOSE AN AGRICULTURE INFORMATION SYSTEM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Promotes the concept of digitalization in agriculture as an appropriate technology to promote and fast-track digital platforms in the food value chain beneficial to both producers and consumers. Mandates the Department of Agriculture to establish a synchronized agriculture information system to give the government access to accurate real-time agricultural information in order to enhance transparency in the food security system. Provides a dynamic online computer database where information on the demand for specific agricultural and fisheries commodities is gathered and uploaded simultaneously with the production data from farmers in every barangay; a merger and synchronization of agricultural data from different sources into a cohesive database designed to facilitate linkages from place of origin or from farm to local and global markets."
