congress_website_title = "AN ACT PROVIDING PREFERENCE TO DOMESTIC BIDDERS PARTICIPATING IN GOVERNMENT PROCUREMENT PROJECTS, AND FOR OTHER PURPOSES."
congress_website_abstract = "Institutionalizes the Certification Program of Domestic Bidders to encourage all local suppliers and manufacturers (particularly those in the countryside); and also serves to provide assurances that the government is one with all industries and sectors in supporting local labor and products that will definitely contribute to the realization of the goals of the Tatak Pinoy campaign. Refers Domestic Bidder to any person or entity offering unmanufactured articles, materials or supplies of the growth or production of the Philippines, or manufactured articles, materials, or supplies manufactured or to be manufactured in the Philippines substantially from articles, materials, or supplies of the growth, production, or manufacture, as the case may be, of the Philippines."
