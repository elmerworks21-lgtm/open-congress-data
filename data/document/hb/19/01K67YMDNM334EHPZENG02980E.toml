congress_website_title = "AN ACT PROTECTING SENIOR CITIZENS FROM VARIOUS FORMS OF FRAUD THROUGH INFORMATION DISSEMINATION AND PROVIDING MECHANISMS THEREFOR"
congress_website_abstract = "Seeks to protect senior citizens from various forms of fraud using mail, telecommunications and other modern means of communication. Mandates the Department of the Interior and Local Government (DILG), through the local government units, to educate the senior citizens and their families and caregivers within their respective jurisdictions, general information on mail, telemarketing, and internet fraud targeting senior citizens and on how and where to report fraud. Directs the Department of Information and Communications Technology (DICT) to provide the necessary technical assistance to the DILG, National Commission of Senior Citizens (NCSC) and the concerned government agencies on the development of a website and an online platform to facilitate coordination and sharing of information."
