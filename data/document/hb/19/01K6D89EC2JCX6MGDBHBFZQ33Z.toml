congress_website_title = "AN ACT CLASSIFYING AND PENALIZING EXTRAJUDICIAL KILLING AS A HEINOUS CRIME, PROVIDING REPARATION FOR THE VICTIMS, AND STRENGTHENING THE MECHANISM FOR ITS PREVENTION"
congress_website_abstract = "Seeks to classify and penalize extrajudicial killings as a heinous crime, ensuring that any individual, regardless of rank or position, who is found guilty of participating in, authorizing, or condoning such acts will face appropriate criminal penalties. Defines EJK as any killing other than that imposed by the State pursuant to the provisions of the Constitution on heinous crimes or a deliberate and arbitrary killing of any person not authorized by a previous judgment pronounced by a competent court affording all the judicial guarantees which are recognized as indispensable by civilized peoples.Â It may be committed by a public officer, person in authority, agent of a person in authority, or any person who is acting under the actual or apparent authority of the State (killing of individuals without judicial proceedings or legal authority) Aims to strengthen the legal framework for investigating, prosecuting, and punishing those responsible for these heinous acts and proposes to create the EJK Claims Board which aims to provide reparations to victims of EJK and create mechanisms to address, investigate and prevent cases of EJK."
