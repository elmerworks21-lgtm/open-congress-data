congress_website_title = "AN ACT PROVIDING FOR A PHILIPPINE MEDICAL ACT, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 2382, AS AMENDED, OTHERWISE KNOWN AS THE MEDICAL ACT OF 1959"
congress_website_abstract = "Seeks to provide for the following: 1.) Standardization, upgrading and regulation of the basic medical education, medical internship, and postgraduate medical education and training; 2.) Licensure and the registration of physicians; 3.) Supervision and regulation of the practice of medicine; 4.) Integration of the medical profession under one national professional organization of physicians; and 5.) Upholding preventive, promotive and curative disease prevention and promotion of health, patient welfare and patient safety as the primary consideration in the practice of medicine and promoting competence, moral values, and professional ethics of members of the medical profession."
