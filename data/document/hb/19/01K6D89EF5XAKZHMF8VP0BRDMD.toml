congress_website_title = "AN ACT AMENDING SECTIONS 144, 145, 147 AND 263-A OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to grant a suspension of one year to the automatic annual increase of five percent (5%) of tax imposed among tobacco products, heated tobacco products, vapor products, cigars, and cigarettes. Intends to lower the price gap between a legitimate cigarette product compared to illicit cigarettes to encourage consumers to shift to purchasing legitimate products. Seeks to address the proliferation of mislabeled vapor products to evade the imposition of higher taxes, resulting in millions of excise taxes lost by illicit traders and the growing threats of illicit tobacco trafficking/smuggling."
