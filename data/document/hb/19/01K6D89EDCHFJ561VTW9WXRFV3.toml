congress_website_title = "AN ACT LIBERALIZING THE LEASE OF LANDS BY FOREIGN INVESTORS, ESTABLISHING THE STABILITY OF LONG-TERM LEASE CONTRACTS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7652, OTHERWISE KNOWN AS THE “INVESTORS´ LEASE ACT”"
congress_website_abstract = "Seeks to liberalize land lease policies to attract foreign investors, stimulate industry growth, and create more jobs. Proposes amendments regarding the following: aggregate period of the lease contract; foreign investor´s approved or registered investment qualifications; lease contract registration; conditions for registration of long-term lease contract registration; leasehold right as security for a loan; operative act of the long-term lease contract as against the third persons, registration in accordance to PD 1529, and non-subjection to collateral attack; sublease consent/requirements; termination of lease contract; penal provision for contracting parties for any contract made or executed in violation of prohibited acts; criminal liabilities of responsible officers in case of corporations or partnerships; applicability of penalties to all sublease contracts."
