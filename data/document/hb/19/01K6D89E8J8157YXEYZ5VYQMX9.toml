congress_website_title = "AN ACT EXPANDING THE GROUNDS FOR ANNULMENT OF MARRIAGE AND LEGAL SEPARATION, UNDER ARTICLES 45 AND 55 AND OTHER RELATED PROVISIONS UNDER ARTICLES 46, 48, 55, AND 57 OF EXECUTIVE ORDER NO. 209, OR THE FAMILY CODE OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to amend the family code whereby a marriage may be annulled for any of the following causes, existing at the time of marriage OR APPEARED AFTER THE MARRIAGE:Â either party - was of unsound mind . . . ; Â was physically incapable of consummating the marriage with the other . . . ;Â was afflicted with a sexually-transmissible disease . . . Proposes additional grounds for annulment of marriage related to the following:Â psychological incapacity; homosexuality/lesbianism and sex reassignment surgery or transition; serious physical violence or grossly abusive conduct; moral pressure to change religious or political affiliation; to induce to engage in prostitution and gambling; final judgment sentencing to imprisonment. . . ; drug addiction, habitual alcoholism or chronic gambling; contracting a subsequent bigamous marriage; marital infidelity or perversion or having a child with another person . . . attempt against life; or abandonment without justifiable cause . . ., etc. Provides that the FAMILY COURT shall assist the INDIGENT AND UNDERPRIVILEGED PETITIONER FOR THE FREE LEGAL SERVICES OF THE PUBLIC ATTORNEY´S OFFICE. Proposes to amend existing grounds and adopt other grounds for a petition for legal separation, some of which are similar to causes for annulment."
