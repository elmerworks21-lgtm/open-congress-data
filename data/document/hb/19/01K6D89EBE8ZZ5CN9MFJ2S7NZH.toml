congress_website_title = "AN ACT ESTABLISHING A NATIONAL TUTORING PROGRAM"
congress_website_abstract = "Seeks to establish a learning intervention to improve the literacy and numeracy rates among our elementary students (giving priority to those who belong to the marginalized and underserved communities); and to provide short-term employment and educational opportunities for financially struggling college students. Aims to address the below baseline level of proficiency in mathematics and the very low passing rate in the expected minimum reading standards for primary learners. Provides that tertiary level students qualified as tutors shall receive stipend and academic credit or other educational benefits as determined by their respective institutions. Proposes that tutors under this Program for two (2) semesters shall be deemed to have completed the Literacy Training Service under the National Service Training Program (R.A. No.9163)."
