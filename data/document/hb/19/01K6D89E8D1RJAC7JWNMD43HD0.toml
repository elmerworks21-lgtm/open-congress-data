congress_website_title = "AN ACT ELIMINATING GENDER DISCRIMINATION IN CERTAIN CRIMES, AMENDING FOR THE PURPOSE ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS “THE REVISED PENAL CODE”"
congress_website_abstract = "Proposes to amend Act No.3815, as amended to be read as follows: “Art. 247.Â Death or Physical Injuries Inflicted Under Exceptional Circumstances. - Any legally married person who, having surprised THE ERRING spouse in the act of committing sexual intercourse with another person, shall kill any of them or both of them in the act or immediately thereafter, . . . If THE INNOCENT SPOUSE shall inflict upon them physical injuries or any other kind, THE INNOCENT SPOUSE shall be exempt from punishment. These rules shall be applicable, under the same circumstances, to parents with respect to their CHILDREN under eighteen years of age, and their seducers, while the CHILDREN are living with their parents. Any person who shall promote or facilitate the prostitution of THE SPOUSE OR CHILDREN, or shall otherwise have consented to the infidelity of the other spouse shall not be entitled to the benefits of this article.” “Art. 333.Â MARITAL INFIDELITY is committed by any married PERSON who shall have sexual RELATIONS with ANY PERSON OTHER THAN THE SPOUSE and by SUCH OTHER PERSON who has knowledge of THE MARRIAGE OF THE SEXUAL PARTNER . . . “"
