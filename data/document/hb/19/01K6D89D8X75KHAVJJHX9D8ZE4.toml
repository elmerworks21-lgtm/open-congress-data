congress_website_title = "AN ACT CREATING THE COUNCIL FOR THE BUILT ENVIRONMENT, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines the following terms among others: Built Environment means the field within which the registered professional practice; Built Environment Professions means the following professions: Architecture, Interior Design, Landscape Architecture, Environmental Planning, Geodetic Engineering, Civil Engineering, Electrical Engineering, Mechanical Engineering, Sanitary Engineering, Master Plumber, Electronics Engineering, and Real Estate Services. Intends to ensure that practicing Built Environment Professionals can meet the minimum requirements of safeguarding the life, health, property, and welfare of the public."
