congress_website_title = "AN ACT MAINSTREAMING THE USE OF BAMBOO AS A SUSTAINABLE MATERIAL FOR THE BUILT ENVIRONMENT"
congress_website_abstract = "Seeks to establish a comprehensive regulatory framework for the integration of bamboo as a sustainable material for the built environment in the Philippines. Tasks relevant agencies and stakeholders with developing the Bamboo Architectural Code (BAC) and Bamboo Structural Code (BSC) which shall include guidelines and standards for the sustainable use of bamboo, aesthetics, safety, environmental impact, and cultural consideration. Encourages public awareness campaigns, educational programs, and incentives for bamboo cultivation. Integrates bamboo-related education into higher education curricula and continuing education for architects, interior designers, and engineers."
