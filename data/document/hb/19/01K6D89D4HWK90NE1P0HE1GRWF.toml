congress_website_title = "AN ACT CREATING THE “COUNCIL FOR THE BUILT ENVIRONMENT,” APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to help professionalize and promote synergy and cooperation among the built environment professions such as architecture, interior design, landscape architecture, environmental planning, geodetic engineering, civil engineering, electrical engineering, mechanical engineering, sanitary engineering, master plumber, electronics engineering, and real estate services. Proposes to create a council that shall have administrative supervision on these Built Environment Professions and shall have the powers and functions of policy advisory, oversight, and collaborative platform."
