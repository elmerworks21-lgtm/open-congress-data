congress_website_title = "AN ACT MANDATING PUBLIC TELECOMMUNICATIONS ENTITIES AND INTERNET SERVICE PROVIDERS TO INSTITUTE A REFUND MECHANISM FOR SERVICE OUTAGES AND DISRUPTIONS, PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Aims to provide regulations on internet and telecommunications services offered by public telecommunications entities (PTEs) and internet service providers (ISPs) to ensure that the interest and welfare of its people and the consuming public are protected and upheld. Requires PTEs and ISPs to provide a refund credit on a pro-rated basis to a customer who was adversely affected by an internet service outage or interruption for an aggregate period of twenty-four (24) hours or more within a month, except when the reason for such outage is due to scheduled maintenance which should be notified 48 hours prior to the scheduled maintenance and should not exceed 48 hours in a month, a fortuitous event, or acts of third party or subscriber. Provides penalties for the violation of this Act."
