congress_website_title = "AN ACT PROVIDING FOR ENHANCED BENEFITS, WELFARE, AND REINTEGRATION OF REPATRIATED FILIPINO MIGRANT WORKERS INTO THE PHILIPPINE ECONOMY, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to help Overseas Filipino Workers (OFWs) find local entrepreneurial, educational, and employment opportunities should they choose to settle permanently in the Philippines. Provides returning OFWs with access to financial literacy training and seminars, as well as the necessary capital to start their own businesses once they decide to do so. Proposes the following initiatives: - Business-oriented capacity-building training - A financing/loan program for OFW-owned micro, small, and medium enterprises (MSMEs) - Job fairs for civil service-qualified OFWs - Assistance from the Technical Education and Skills Development Authority (TESDA) and the Commission on Higher Education (CHED) - Programs for qualified and highly skilled OFWs to teach in academic institutions, among others."
