congress_website_title = "AN ACT AMENDING REPUBLIC ACT 7305, OTHERWISE KNOWN AS THE MAGNA CARTA OF PUBLIC HEALTH WORKERS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes several provisions among others (health worker´s allowances, welfare benefits, rights and privileges, and protection and safety): Includes in the definition of “health workers” personnel in HEALTH OFFICES; medical, allied health professionals, admin/support personnel employed IN NATIONAL GOVERNMENT AGENCIES (NGAs), INCLUDING SUCs, GOCCs, GFIs, LGUs AND ALL OTHER GOV´T INSTRUMENTALITIES regardless of their employment status; . . . Provides that ALL public health workers SHALL BE GRANTED SECURITY OF TENURE AND THEY shall not be SEPARATED OR terminated FROM THE POSITIONS THEY ARE CURRENTLY HOLDING except for JUST cause . . . Proposes for a NURSE-TO-PATIENT RATIO IN GENERAL WARDS, ICUs, and IN THE COMMUNITY LEVEL, and tasks the DOH to PERIODICALLY UPDATE THE SAFE HEATH WORKER-TO-PATIENT/POPULATION RATIO."
