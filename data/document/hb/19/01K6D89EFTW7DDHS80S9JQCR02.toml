congress_website_title = "AN ACT ESTABLISHING THE FRAMEWORK STRATEGY ON SUSTAINABILITY REPORTING COVERING ENVIRONMENTAL, SOCIAL, AND GOVERNANCE (ESG) CONSIDERATIONS, INSTITUTIONALIZING ASSURANCE THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines “Environmental, Social, and Governance (ESG) Reporting or Sustainability Reporting” - an organization´s practice of reporting publicly on its material economic, environmental, and/or social impacts in accordance with globally accepted standards as adopted by the Securities and Exchange Commission. Seeks to promote and integrate ESG principles into corporate business practices by establishing a robust framework and sustainability reporting program to guide companies in assessing and disclosing non-financial and financial aspects of their ESG initiatives and programs; Intends to align with globally recognized standards on the integration and connection of sustainability and financial information."
