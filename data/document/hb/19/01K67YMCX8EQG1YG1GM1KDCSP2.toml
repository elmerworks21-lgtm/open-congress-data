congress_website_title = "AN ACT POSTPONING THE DECEMBER 2022 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9164, AS AMENDED BY REPUBLIC ACT NO. 9340, REPUBLIC ACT NO. 10632, REPUBLIC ACT NO. 10656, REPUBLIC ACT NO. 10923, REPUBLIC ACT NO. 10952 AND REPUBLIC ACT NO. 11462, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to postpone the December 5, 2022 barangay and sangguniang kabataan elections to the first Monday of December 2023 to relieve the Commission on Elections (COMELEC) from the burden of having to conduct two elections in one year and to give them ample time to prepare for the next election. Provides that the term of office of the barangay and sangguniang kabataan officials elected on the first Monday of December 2023 elections and subsequently thereafter, shall commence at noon of January 1 next following their election. Provides that all incumbent barangay and sangguniang kabataan officials remain in office until their successor shall have been duly elected and qualified, unless sooner removed or suspended for a cause."
