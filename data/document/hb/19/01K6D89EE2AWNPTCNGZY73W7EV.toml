congress_website_title = "AN ACT REFORMING THE SHARE OF LOCAL GOVERNMENT UNITS IN THE INTERNAL REVENUE ALLOTMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to combine the National Tax Allotment (NTA) share for both cities and municipalities to address the fiscal imbalance between them and benefit the smallest and poorest municipalities. Seeks to amend Sec.285 of the LGC of 1991, to read as follows: “Section 285. Allocation to Local Government Units. - . . . (a) Provinces - Twenty-three percent (23%); (b) Cities AND MUNICIPALITIES - FIFTY-SEVEN PERCENT (57%); AND (c) BARANGAYS - TWENTY PERCENT (20%)"
