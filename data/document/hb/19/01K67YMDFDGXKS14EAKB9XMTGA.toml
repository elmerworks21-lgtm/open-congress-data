congress_website_title = "AN ACT EXPANDING THE USE OF THE LEGAL ASSISTANCE FUND AND THE AGARANG KALINGA AT SAKLOLO PARA SA MGA OFWS NA NANGANGAILANGAN (AKSYON) FUND, AMENDING FOR THE PURPOSE SECTION 26 OF REPUBLIC ACT NO. 8042, OTHERWISE KNOWN AS THE \"MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF 1995,\" AS AMENDED, AND SECTION 14 OF REPUBLIC ACT NO. 11641, OTHERWISE KNOWN AS THE “DEPARTMENT OF MIGRANT WORKERS ACT”"
congress_website_abstract = "Seeks to widen the scope of use of the Legal Assistance Fund from the time of the commencement of the investigation, detention, arrest or indictment all the way to the trial proper up to all levels of appeal a distressed overseas Filipino can avail. States that the rules on the utilization of the Legal Assistance Fund shall apply similarly to the Agarang Kalinga at Saklolo Para sa mga OFWs na Nangangailangan (AKSYON) Fund. Mandates the Department of Foreign Affairs to extend legal and other forms of assistance to OFWs in countries and territories where there are no Migrant Workers Offices yet."
