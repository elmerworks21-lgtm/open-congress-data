congress_website_title = "AN ACT PENALIZING THE SMUGGLING OF FOREIGN CURRENCY AND OTHER MONETARY INSTRUMENTS IN BULK INTO OR OUT OF THE PHILIPPINES"
congress_website_abstract = "Requires any person or entity engaged in period transfer of bulk currency under money service business to register with the Bangko Sentral ng Pilipinas (BSP). Requires incoming or outgoing passengers bringing in or out of the Philippines foreign currencies or foreign currency-denominated bearer monetary instruments in excess of Ten Thousand US Dollars (US 10,000.00) or its equivalent to accomplish the Currencies Declaration Form and Customs Baggage Declaration Form. Mandates the Bureau of Customs (BOC) to submit the declaration to the AMLC within twenty-four (24) hours upon receipt thereof for purposes of conducting an investigation. Enumerates certain acts as evading the currency declaration requirement. Allows the BOC to immediately seized the foreign currency or foreign currency-denominated bearer monetary instrument upon discovery of the fraud pursuant to Section 1113 of RA No. 10863, otherwise known as the Customs Modernization and Tariff Act (CMTA). Criminalizes bulk cash smuggling."
