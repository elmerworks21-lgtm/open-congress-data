congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA OF TRICYCLE DRIVERS AND OPERATORS AND INSTITUTIONALIZING THE MECHANISMS FOR ITS IMPLEMENTATION"
congress_website_abstract = "Seeks to mandate a uniform rules which provides cities and municipalities the power to regulate the operation of tricycles and grant permits subject to the guidelines prescribed by the Department of Transportation (DOTr), Land Transportation Office (LTO), and the Land Transportation Franchising and Regulatory Board (LTFRB). Provides a simple system and procedure for registration and issuance of Motorizes Tricycle Operators Permit (MTOP). Mandates LGUs to establish a Tricycle Sector One-Stop Shop which shall handle all transactions and processing of the business permit applications within their respective jurisdictions. Enumerate the rights and benefits of workers in the tricycle sector. Seeks to provide and extend affordable insurance, social security and health care coverage to the tricycle sector. Provides a policy on impounding of tricycles."
