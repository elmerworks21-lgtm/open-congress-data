congress_website_title = "AN ACT REQUIRING PERSONNEL OF THE BUREAU OF FIRE PROTECTION TO BE CERTIFIED MEDICAL FIRST RESPONDERS AND EMERGENCY MEDICAL TECHNICIANS, AMENDING FOR THE PURPOSE SECTION 4 OF REPUBLIC ACT NO. 11589, OTHERWISE KNOWN AS THE “BUREAU OF FIRE PROTECTION MODERNIZATION ACT\""
congress_website_abstract = "Seeks to enhanced the capability of the Bureau of Fire Protection (BFP) personnel in providing emergency medical and rescue services and ensure operational readiness of the emergency medical services (EMS) team on duty. Mandates the Regional Director to designate at least one (1) Emergency Medical Technician who shall undergo and complete the Fire Basic Recruit Course (FBRC) which shall provide the fundamental knowledge and skills necessary to meet the minimum standards of fire personnel competence, including advanced first and emergency first response. Requires BFP personnel designated as Emergency Medical Technician to be duly certified as Emergency Medical Technician in addition to their training and certification as Medical First Responder."
