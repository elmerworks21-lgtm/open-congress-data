congress_website_coauthors_raw = ["DALIPE, MANUEL JOSE M.","BORDADO, GABRIEL JR. H.","PRIMICIAS-AGABAS, MARLYN L.","ROMUALDO, JURDIN JESUS M.","REVILLA, RAMON JOLO III B."]
