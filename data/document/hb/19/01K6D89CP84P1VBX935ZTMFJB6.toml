congress_website_title = "AN ACT RECOGNIZING INDIVIDUALS, GROUPS AND ORGANS OF SOCIETY THAT PROMOTE AND PROTECT HUMAN RIGHTS AND FUNDAMENTAL FREEDOMS, PROVIDING PROTECTION, SECURITY, BENEFITS AND WELFARE, APPROPRIATING FUNDS THERFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines Human Rights Defender to any person (State or non-State Actor) _ who accepts the universality of human rights as defined in the Universal Declaration of Human Rights, who promotes and protects human rights, including but not restricted to the elimination of apartheid, all forms of racial discrimination, colonialism, foreign domination or occupation, aggression or threats to national sovereignty, national unity or territorial integrity and from the refusal to recognize the right of people to self-determination and the right of every people to exercise full sovereignty over its wealth and natural resources through peaceful means unless provided for by law”¦"
