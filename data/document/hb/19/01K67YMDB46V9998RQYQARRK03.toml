congress_website_coauthors_raw = ["DALIPE, MANUEL JOSE M.","SALCEDA, JOEY S.","CASTRO, FRANCE L.","CASTRO, JANE T.","BORDADO, GABRIEL JR. H.","ABANTE, BIENVENIDO M.","BARBA, ANGELO MARCOS","MARIANO-HERNANDEZ, RUTH","ROQUE, LAARNI","RIVERA, BONG","GOMEZ, RICHARD","ROMUALDEZ, FERDINAND MARTIN G."]
congress_website_committee_codes = ["0532","E505","0504"]
congress_website_primary_keys = [138833]
congress_website_title = "AN ACT REVITALIZING THE SALT INDUSTRY, CREATING A COMPREHENSIVE PLAN FOR ITS DEVELOPMENT, PROVIDING INCENTIVES TO SALT FARMERS, PRODUCERS AND EXPORTERS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to revitalize the salt industry through appropriate technology and research, and adequate financial, production, marketing, and other support services , attain increased income for salt farmers and salt producers and achieve salt self-sufficiency. Establishes the Philippine Salt Industry Development Roadmap (“Roadmap”) which shall include programs, projects, interventions and incentives for the development and management, research, processing, utilization, modernization business development, and commercialization of Philippine salt. Mandates the Department of Agriculture to ensure that salt is a priority commodity to be produced locally in areas or regions identified in this Act, as well as in the development plan for the salt industry. Provides incentives to investors in salt farm development and salt processing facilities. Requires all salt produced or manufactured in the Philippines shall be labeled as “Made in the Philippines” in a prominent and conspicuous manner on the product, its packaging, and accompanying documentation, and shall comply with the requirements of RA 7394, otherwise known as the “Consumer Act of the Philippines.”"
