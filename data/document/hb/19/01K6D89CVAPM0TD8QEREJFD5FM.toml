congress_website_title = "AN ACT MANDATING PRIVATE HIGHER EDUCATION INSTITUTIONS TO WAIVE THE COLLEGE ENTRANCE EXAMINATION FEES TO UNDERPRIVILEGED GRADUATING HIGH SCHOOL STUDENTS AND HIGH SCHOOL GRADUATES BELONGING TO THE TOP TEN PERCENT (10%) OF THEIR GRADUATING CLASS"
congress_website_abstract = "Mandates all private higher education institution to waive college entrance examination fees to underpriviledged graduating high school students and high school graduates belonging to the top ten percent (10%) of the graduating class who are applying for college admission. Provides qualifications for a student to become eligible as beneficiary under this Act, as follows: a) Must be a natural-born Filipino citizen; b.) Must be a graduating high school student or a high school graduate who belongs to the top ten percent (10%) of their graduating class and seeks to be admitted to a private higher education institution within the country; and c.) Must belong to a family whose combined income falls below the poverty threshold, as determined by the NEDA and DSWD. Imposes sanctions to any official or employee of a private higher education institution or other individuals who violate Section 4 of this Act and impose disciplinary sanctions for a repetition of the same offense, pursuant to its powers under Section 8 (e) of RA No. 7722, otherwise known as the “Higher Education Act of 1994.”"
