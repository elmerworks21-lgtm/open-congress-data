congress_website_title = "AN ACT GRANTING COMPASSIONATE LEAVE OF FIVE (5) DAYS WITH FULL PAY TO ALL EMPLOYEES IN THE PRIVATE AND PUBLIC SECTORS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to respect the significance of the deeply ingrained family values in Filipino culture and acknowledges the need for workers to tend to their families in difficult circumstances. Intends to increase staff morale, enhance satisfaction with work, productivity, and general wellness, as well as to promote family support and bonds. Proposes to grant compassionate leave benefits of five (5) days to all employees in the public and private sectors that they may use if they need to attend to critical family matters such as illnesses and death of immediate family members or relatives within the 3rd degree of consanguinity or affinity."
