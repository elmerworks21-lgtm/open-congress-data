congress_website_title = "AN ACT PROVIDING FOR A FREE FINANCIAL EDUCATION TO OVERSEAS FILIPINO WORKERS AND THEIR FAMILIES"
congress_website_abstract = "Mandates all OFWs, either land-based or sea-based, to undergo mandatory continuously updated financial education or literacy training seminars as a pre-departure and post-arrival seminar in order to promote financial responsibility among OFWs and their dependents. Provides free mandatory financial education or literacy training programs for OFWs and their families with the Department of Migrant Workers as the lead agency, in coordination with the Overseas Workers Welfare Administration (OWWA), the Department of Finance (DOF), the Bangko Sentral ng Pilipinas (BSP), the Department of Interior and Local Government (DILG) and all the barangays under it, and the accredited PDOS providers across the country, including the embassies or consulates, whichever may be available, in the countries of destination."
