congress_website_coauthors_raw = ["ABANTE, BIENVENIDO M.","VILLARICA, LINABELLE RUTH R.","YU, DIVINA GRACE","MARIANO-HERNANDEZ, RUTH","YU, JEYSEL VICTORIA C.","RIVERA, BONG","BORDADO, GABRIEL JR. H.","SUAN, LORDAN","PRIMICIAS-AGABAS, MARLYN L.","CAGAS, JOHN TRACY F."]
congress_website_committee_codes = ["0532","C501"]
congress_website_primary_keys = [169503]
congress_website_title = "AN ACT STRENGTHENING THE CONSERVATION AND PROTECTION OF PHILIPPINE CULTURAL HERITAGE THROUGH CULTURAL MAPPING AND AN ENHANCED CULTURAL HERITAGE EDUCATION PROGRAM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10066, OTHERWISE KNOWN AS THE \"NATIONAL CULTURAL HERITAGE ACT OF 2009\""
congress_website_abstract = "Aims to further strengthen the safeguarding and protection of heritage in the country. Seeks to amend Republic Act No. 10666 to 1.) revise, include and adopt terms and provisions as deemed fit to the current landscape of the cultural industry; 2.) mandate local government units (LGUs) to conduct a cultural mapping program for their respective areas for both tangible and intangible, and natural and built heritage, utilizing the results of the program as a framework for culture-based governance; and 3.) revise and enhance the scope of cultural education in the country."
