congress_website_committee_codes = ["0530","0532"]
congress_website_primary_keys = [131995]
congress_website_title = "AN ACT PROVIDING ADDITIONAL GUIDELINES IN THE ACQUISITION OF RIGHT-OF-WAY, SITE, OR LOCATION FOR NATIONAL GOVERNMENT INFRASTRUCTURE PROJECTS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10752, OTHERWISE KNOWN AS “THE RIGHT-OF-WAY ACT”"
congress_website_abstract = "Seeks to ensure prompt payment of just compensation to owners of real property acquired for national government infrastructure projects for the expeditions acquisition of the required ROW. Proposes several provisions with regards to the following: ROW Action Plan; Depth for subterranean properties affected by subterranean infrastructure projects; ROW acquisition of areas within ancestral domains and untitled lands; Current market value or zonal value as basis for compensation; Inclusion of replacement cost of machinery, income loss, disturbance compensation, and inconvenience allowance in determining compensation allowance; Need for a licenses PRC independent property appraisers; Increase of payment of the negotiated price; and sanctions for violations of the provisions of this Act."
