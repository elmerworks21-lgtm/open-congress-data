congress_website_title = "AN ACT LIMITING THE CAP OF PHASING OUT SYSTEM LOSSES TO CONSUMERS, AMENDING FOR THIS PURPOSE SECTION 10 OF REPUBLIC ACT NO. 7832"
congress_website_abstract = "Intends to address the fact that the Philippines ranks as having the highest electrical rate per kilowatt-hour in the whole ASEAN region, more particularly residential users. Seeks to entirely prohibit distribution utilities from passing on non-technical system losses to consumers and to mitigate the impact of technical system losses to the minimum - Components of System Losses include technical losses (losses inherent in the physical delivery of electrical energy) and non-technical losses (not related to the physical characteristics and functions of the electrical system, and are caused primarily by human error, whether intentional or not - like pilferage)."
