congress_website_title = "AN ACT PROVIDING FOR A TWO HUNDRED PESOS (P200.00) ACROSS-THE-BOARD DAILY INCREASE IN THE SALARY RATES OF EMPLOYEES AND WORKERS IN THE PRIVATE SECTOR"
congress_website_abstract = "Seeks to increase the daily rate of all minimum wage workers in the private sector, regardless of employment status, including those in contractual and sub-contractual arrangements, whether agricultural or nonagricultural by Two hundred pesos (P200.00) per day. Provides incentives to small enterprises to assist in their compliance with the wage increase. Exempts the Barangay Micro Business Enterprises (BMBEs) from the coverage of the Minimum Wage Law as provided by RA 9178. Allows the following establishments to apply exemption from the compliance with the minimum wage increase: a.) retail or service establishments regularly employing not more than ten (10) workers; and b.) establishments adversely affected by natural calamities or human-induced disasters. Provides penalties to any person, corporation, trust, firm, partnership, association, or entity violating any provision of this Act."
