congress_website_title = "AN ACT ALLOWING SINGLE-PARTY CONSENSUAL MONITORING BY LAW ENFORCEMENT OFFICERS"
congress_website_abstract = "Aims to allow our law enforcement officers to record oral conversations between them and the persons subject of their investigations provided that the former are parties to such conversations Defines “Consensual Monitoring” as the “interception by an electronic device of any communication via ICT tools primarily: landline phones, smartphones, and cross platform messaging applications available through smartphones . . . Viber, Telegram, WhatsApp, Instagram, Facebook Messenger, Signal, Skype, Slack, WeChat, Snapchat, Wire, and Line, where a law enforcement officer who is a party to the oral communication has given prior consent to the monitoring or recording . . . Seeks to strengthen law enforcement organizations and guarantee that using these recordings as evidence will lead to successful prosecution and conviction of criminals."
