congress_website_title = "AN ACT INSTITUTIONALIZING INSTALLMENT PAYMENT SCHEME ON BASIC UTILITY BILLS, AND FOR OTHER PURPOSES"
congress_website_abstract = "“Three-Gives Law” Seeks to institutionalize a three (3) equal monthly installment payment scheme on basic utility bills, including electric, water, internet, cable, and telephone bills, upon an official declaration of a State of Calamity. Proposes a moratorium in the payment or collection of all residential utility bills and prohibits holders of public utility franchises and all service providers from exacting payment or from disconnecting the service due to non-payment within such period. Proposes that in the case of electric cooperatives, there shall be a moratorium in the payment or collection to government instrumentalities during the entire duration of a state of calamity."
