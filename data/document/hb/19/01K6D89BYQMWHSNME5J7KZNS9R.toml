congress_website_title = "AN ACT PROVIDING INCENTIVES FOR PRIVATCARPOOL IN ORDER TO REDUCE TRAFFIC CONGESTION IN THE COUNTRY"
congress_website_abstract = "Aims to reduce the use of vehicles to lessen the impact of the grave foreseen or anticipated traffic congestion problem in Metro Manila brought about by several factors. Proposes to give out several incentives to people who would initiate carpooling or car sharing as follows: free or 50% discounts on parking fees, 20% toll fees in any expressway; 20% gasoline and other petroleum products discounts; and exemption from the ColorCoding Scheme."
