congress_website_title = "AN ACT GRANTING JURIDICAL PERSONALITY AND LEGAL CAPACITY TO THE BOARD OF THE FUND FOR RESPONDING TO LOSS AND DAMAGE IN THE PHILIPPINES"
congress_website_abstract = "Seeks to support the creation of the Fund for Responding to Loss and Damage (“L&D Fund”) to assist developing countries that are particularly vulnerable to the adverse effects of climate change in responding to economic and non-economic loss and damage . . . Proposes that the Board shall be granted juridical personality with the legal capacity to contract, acquire and dispose of property, institute legal proceedings, enter into hosting arrangements with the World Bank . . . etc."
