congress_website_title = "AN ACT CREATING A NATIONAL POLICY ON SUSTAINABLE URBAN MOBILITY AND THE USE OF ALTERNATIVE SUSTAINABLE MODES OF TRANSPORTATION"
congress_website_abstract = "Aims to boost the use of alternative sustainable modes of transportation and urban mobility by encouraging the use of bicycles, e-bikes, kick scooters, electric scooters, and other similar products. Proposes for the following: new urban road design, construction of bike lanes and bike and alternative sustainable modes of transport parking areas, provision of alternative sustainable modes of transportation for government employees and private sector employees"
