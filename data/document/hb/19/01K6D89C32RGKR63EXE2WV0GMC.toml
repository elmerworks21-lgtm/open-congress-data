congress_website_title = "AN ACT AMENDING TITLE V, SECTION 470 (A), (B) AND SECTION 471 (A) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Proposes that the appointment of City Treasurer and Assistant City Treasurer shall be vested in the Governor of the province or the Mayor of the city or municipality concerned considering that the Code itself provides that administrative supervision is lodged with the governor of the province, as the case may be - thus, direct supervision should include the power to appoint the treasurer and the assistant treasurer, so that the governor or the mayor shall have the power to discipline, suspend or dismiss erring treasurers."
