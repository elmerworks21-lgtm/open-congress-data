congress_website_title = "AN ACT PROVIDING FOR MANDATORY INSURANCE COVERAGE AND BENEFITS FOR ALL LINE WORKERS"
congress_website_abstract = "Seeks to mandate that all line workers shall be entitled to life and accident or disability insurance benefits in accordance with the classification standards which provides for a minimum required coverage of P200,000.00 for small distribution utilities up to P1,000.000.00 for mega large distribution utilities, and P2,000,000.00 for transmission or grid operator. Provides that employers of line workers shall also grant additional mandatory benefits: Retirement benefits, Mortuary assistance, Disability benefits, and reimbursement of actual medical expenses in case of death, accident sickness, disability or injury sustained by the line workers in the line of duty."
