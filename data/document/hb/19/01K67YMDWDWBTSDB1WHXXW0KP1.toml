congress_website_title = "AN ACT ESTABLISHING THE PRIVATE BASIC EDUCATION VOUCHER PROGRAM, PROVIDING FOR THE CREATION OF THE BUREAU OF PRIVATE EDUCATION, AND APPROPRIATING FUNDS THEREFOR, REPEALING FOR THE PURPOSE SECTIONS 2, 3, 4(2), 4(3), 5, 6, 7, 12, 14, AND 15 OF REPUBLIC ACT NO. 8545, OTHERWISE KNOWN AS THE \"EXPANDED GOVERNMENT ASSISTANCE TO STUDENTS AND TEACHERS IN PRIVATE EDUCATION ACT\", WHICH AMENDED REPUBLIC ACT NO. 6728, OTHERWISE KNOWN AS THE \"GOVERNMENT ASSISTANCE TO STUDENTS AND TEACHERS IN PRIVATE EDUCATION ACT\""
congress_website_abstract = "Covers all private basic education institutions that receive government assistance in the form of vouchers for qualified students, teachers and schools. Provides criteria for voucher assistance for students and schools. Mandates the Department of Education to establish, operate and maintain a system and mechanism for monitoring program outcomes to ensure accountability of participating recognized private basic educational institutions. Provides other forms of assistance to teachers and qualified recognized private education schools. Allows schools participating in the basic education voucher program to increase tuition on the condition that seventy percent (70%) of the amount of tuition increases shall go to the payment of salaries, wages, allowances, and other statutory benefits of teaching and non-teaching personnel and twenty percent (20%) of the tuition increases shall go to the improvement or modernization of buildings, equipment, libraries, laboratories, gymnasia and similar facilities and to the payment of other costs of operation. Establishes the Inset Fund in the DepEd to provide for training programs for the upgrading of knowledge and teaching competencies in critical subject areas and for the modernization of teaching techniques and strategies, and the Teacher´s Salary Subsidy Fund. Creates the Bureau of Private Education to serve as the focal office for the administration, supervision, and regulation of all matters relating to private basic education institutions, including government assistance and subsidies."
