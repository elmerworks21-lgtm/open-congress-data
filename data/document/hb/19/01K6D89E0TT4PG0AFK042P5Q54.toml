congress_website_title = "AN ACT ESTABLISHING MEASURES TO PROTECT BUYERS FROM ONLINE SCAMMERS"
congress_website_abstract = "“Online Scammer Accountability Act” Seeks to define several terms such as online scammer, buyer, and online store. Seeks to criminalize various forms of online scams and clearly defines the scope of prohibited activities such as false advertising or misrepresentation of products or services; non-delivery of purchase items; delivery of counterfeit or misrepresented goods; unauthorized use of personal or financial information; and other deceptive or fraudulent practices (fraudulent product listings, phishing schemes, etc.)."
