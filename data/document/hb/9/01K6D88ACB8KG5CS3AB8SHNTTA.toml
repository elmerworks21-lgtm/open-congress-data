congress_website_title = "AN ACT PRESCRIBING HIGHER AND SIMULTANEOUS PENALTIES OF PRISON TERM AND FINE FOR VIOLATIONS OF GAMBLING LAWS WHENEVER THE OFFENDER IS THE MAINTAINER, CONDUCTOR, BANKER OR GAMBLING LORD, AND ADDITIONAL PENALTY IF THE OFFENDER IS A POLICE OR MILITARYOFFICER PERSONNEL OR local government OFFICIAL AMENDING FOR THE PURPOSE SECTION 1 OF PRESIDENTIAL DECREE NO. 1602"
congress_website_abstract = "States that if THE SCOPE OF THE OFFENDER'S GAMBLING OPERATION IS PROVINCEWIDE, THE PRISON TERM TO BE IMPOSED SHALL BE PRISION MAYOR IN ITS MAXIMUM PERIOD. Increases, likewise, the penalty of a fine, from [P400.00] to FIVE THOUSAND PESOS (P5,000.00) if the offender is a police or military officer. * * *"
