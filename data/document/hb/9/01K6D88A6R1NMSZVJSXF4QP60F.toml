congress_website_abstract = "\"Thrift Banks Act of 1993\" Defines the meaning of the term \"THRIFT BANK\"; seeks to give thrift banks more incentives and to relieve them from some of their restrictions. Provides for these concerns: (1) organization; (2) powers; (3) officers; (4) exemptions and incentives; and (5) government assistance. * * *"

