congress_website_title = "AN ACT CREATING AN ECOLOGY TRUST FUND FOR THE REHABILITATION OF OUR ENVIRONMENT AND HAZARDOUS WASTE SITES AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates all corporations, partnerships and individuals engaged in mine exploration and/or logging activities to contribute to the proposed Fund; sets the amount of contribution to an amount not exceeding ten percent of the annual gross income of said corporation, partnership and individual; places the Fund under the control of the Pollution and Adjudication Board."

