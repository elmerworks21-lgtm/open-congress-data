congress_website_title = "N ACT INCLUDING THE SERVICES RENDERED IN GOVERNMENT OR PRIVATE AGENCIES OR COMPANIES IN THE COMPUTATION OF THE RETIREMENT BENEFITS OF GOVERNMENT AND PRIVATE EMPLOYEES, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SEVENTY-SIX HUNDRED NINETY-NINE, ENTITLED \"AN ACT INSTITUTING LIMITED PORTABILITY SCHEME IN THE SOCIAL SECURITY INSURANCE SYSTEMS BY TOTALIZING THE WORKERS' CREDITABLE SERVICES OR CONTRIBUTIONS IN EACH OF THE SYSTEMS\""
