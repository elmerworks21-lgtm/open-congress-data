congress_website_title = "AN ACT AMENDING SECTION 26 OF REPUBLIC ACT 1161, OTHERWISE KNOWN AS THE SOCIAL SECURITY LAW, SPECIFYING AND EXPANDING THE PORTION OF THE SSS 'RESERVED FUND' TO PRIMARILY, DIRECTLY, AND LIBERALLY BENEFIT THE LABOR FORCE, AND FOR OTHER PURPOSES"
