congress_website_title = "AN ACT FURTHER AMENDING PRESIDENTIAL DECREE NO. 1467, AS AMENDED, OTHERWISE KNOWN AS THE CHARTER OF THE PHILIPPINE CROP INSURANCE CORPORATION (PCIC), IN ORDER TO MAKE THE CROP INSURANCE SYSTEM MORE STABLE AND MORE BENEFICIAL FOR THE FARMERS COVEREDTHEREBY ANDD FOR THE NATIONAL ECONOMY AS A WHOLE"
congress_website_abstract = "\"Revised Charter of the Philippine Insurance Corporation\" Provides that the Philippine Crop Insurance Corporation shall be ATTACHED TO THE DEPT. OF AGRICULTURE. Expands the coverage of the insurance protection given to farmers; defines clearly the share of the government in the premium subsidy to farmers. Proposes an additional provision on UNAPPROPRIATED AND/OR UNRELEASED PREMIUM SUBSIDY. * * *"
