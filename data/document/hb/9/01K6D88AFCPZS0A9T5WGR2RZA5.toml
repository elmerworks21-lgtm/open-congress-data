congress_website_title = "AN ACT AMENDING ARTICLES 213, 214, 215, 217 AND 223 OF THE LABOR CODE, AS AMENDED"
congress_website_abstract = "Mandates that the nominees to the National Labor Relations Commission (NLRC) should come from the ranks. Mandates further that the employer who REFUSES TO REINSTATE a dismissed or separated employee as ordered by the labor arbiter SHALL BE ORDERED TO PAY DOUBLE BACK WAGES from the date of such refusal. * * *"
