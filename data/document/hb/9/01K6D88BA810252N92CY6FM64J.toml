congress_website_title = "AN ACT TO PROVIDE FOR THE DIRECT ALLOCATION OF FUNDS TO THE LOCAL GOVERNMENT UNITS CONCERNED FOR THE MAINTENANCE, REHABILITATION OR REPAIR OF THEIR RESPECTIVE ROADS OR HIGHWAYS, AMENDING FOR THE PURPOSE SECTION 17(C) OF THE LOCAL GOVERNMENT CODE OF1991"
congress_website_abstract = "States that the AMOUNT OR FUND ALLOCATED TO THE DPWH FOR THE MAINTENANCE, REHABILITATION OR REPAIR OF ROADS/HIGHWAYS SHALL BE DIRECTLY ALLOCATED TO THE RESPECTIVE PROVINCE, MUNICIPALITY OR CITY. States, further, that failure to transfer the Fund totheir respective barangays within the required period without any justifiable cause shall be a ground for dismissal from the service of the Provincial, Municipal or City Treasurer concerned."

