congress_website_title = "AN ACT PROHIBITING THE IMPORTATION, MANUFACTURE, SALE, OFFER FOR SALE, PROMOTION, GIVING AWAY, TRANSPORTING OR ANY OTHER MODE OF DISTRIBUTION OR TRANSFER OF BANNED CHEMICALS, COSMETICS AND PHARMACEUTICAL PRODUCTS AND/OR BANNED DRUGS, OR INGREDIENTSTHEREOF, AND PROVIDING PENALTIES FOR THE VIOLATION THEREOF"
congress_website_abstract = "Directs the Secretary of Health to furnish all drug manufacturers a list of all products in the country which contain banned chemicals; directs the Secretary of Health, likewise, to publish a list of all banned drugs. Penalizes the person found guilty of violat- ing this Act with six (6) to 14 years imprison- ment and a fine of P50,000.00 to P100,000.00. * * *"

