congress_website_title = "AN ACT DEFINING \"UNRESTRICTED RETAINED EARNINGS\" AND ADDING ONE SECTION TO BATAS PAMBANSA BILANG ANIMNAPU'T WALO, OTHERWISE KNOWN AS THE CORPORATION CODE OF THE PHILIPPINES FOR THE PURPOSE"
congress_website_abstract = "Adds the following paragraph to Section 137 of the Corporation Code of the Philippines: \"SECTION 137-A. UNRESTRICTED RETAINED EARNINGS DEFINED. - THE TERM \"UNRESTRICTED RETAINED EARN- INGS\", AS USED IN THIS CODE, MEANS THE NET ACCUMULATED REALIZED EARN- INGS OF THE CORPORATION, NOT RE- SERVED OR SET ASIDE BY IT FOR A CORPORATE PURPOSE OR PURSUANT TO A LEGAL OR CONTRACTUAL REQUIREMENT CALLED FOR OR ARISING FROM ITS BUSINESS OR INTRA VIRES TRANSAC- TIONS, INCLUDING BUT NOT LIMITED TO GAINS FROM SALES OR ITS FIXED AS- SETS, TREASURY SHARES AND OTHER PROPERTY.\" * * *"
