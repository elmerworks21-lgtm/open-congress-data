congress_website_title = "AN ACT PROVIDING FOR THE PLACING ON PROBATION OF PERSONS CONVICTED FOR THE FIRST TIME OF ILLEGAL POSSESSION OR USE OF PROHIBITED AND REGULATED DRUGS AND INDIAN HEMP"
congress_website_abstract = "Proposes to add the following new section to Section 27, RA 6425 or the Dangerous Drugs Act of 1972: \" SECTION 27-A. APPLICATION OF THE PROBATION LAW OF 1976. - NOTWITHSTANDING THE PROVISION OF PARAGRAPH (A) OF SECTION NINE OF THE PROBATION LAW OF 1976, ANY PERSON CONVICTED FOR THE FIRST TIME FOR VIOLATION OF SECTION EIGHT AND SIXTEEN OF THIS ACT SHALL BE PLACED ON PROBATION UPON HIS APPLICATION THEREFOR WITH THE COURT OF ORIGIN. HOWEVER, THOSE WHO ARE ALREADY SERVING THEIR SENTENCE MAY AVAIL OF THE PROVISIONS OF THIS ACT WITHIN ONE YEAR FROM APPROVAL THEREOF.\""

