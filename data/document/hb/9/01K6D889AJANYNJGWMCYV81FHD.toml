congress_website_title = "AN ACT CREATING THE COMMISSION ON INDIGENOUS CULTURAL COMMUNITIES AND ANCESTRAL DOMAIN, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Mandates protect and promote the interests of indigenous cultural communities; prescribes the powers and functions of the Commission. Provides for other areas of concern, such as: (1) domain delineation; (2) information dissemination; (3) development programs for the communities; (4) review of existing titles; and (5) delineation process. Abolishes, therefore, the Offices for Northern and Southern Cultural Communities."
