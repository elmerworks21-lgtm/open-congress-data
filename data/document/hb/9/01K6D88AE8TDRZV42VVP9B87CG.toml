congress_website_title = "AN ACT PROVIDING FOR TAX EXEMPTION OF COMPENSATION INCOME DERIVED DURING THE TAXABLE YEAR BY A NON-RESIDENT CITIZEN FROM SOURCES WITHOUT THE PHILIPPINES AMOUNTING TO TWENTY THOUSAND U.S. DOLLARS (US$20,000), AMENDING FOR THE PURPOSE SECTIONS 21 AND44 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "States that \"GROSS COMPENSATION INCOME\" shall mean INCOME ATTRIBUTABLE TO SERVICES PERFORMED BY SUCH CITIZENS DURING THE PERIOD PRESCRIBED IN SECTION 20 (e) OF THE NATIONAL INTERNAL REVENUE CODE.\""
