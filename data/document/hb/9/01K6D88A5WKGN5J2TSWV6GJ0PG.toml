congress_website_title = "AN ACT AMENDING ARTICLE 135, 136 AND 137 OF THE LABOR CODE (P.D. 442 AS AMENDED) SO AS TO EXPAND THE PROHIBITED ACTS OF DISCRIMINATION AGAINST WOMEN ON ACCOUNT OF SEX, AGE, ETHNIC ORIGIN OR BELIEFS"
congress_website_abstract = "Considers the following as PROHIBITED ACTS OF DISCRIMINATION AGAINST WOMEN: (1) To deny any woman the benefits of employment by reason of her sex, age, ethnic origin or beliefs; (2) To accept or deny membership in a union for women employees by reason of her sex, age, ethnic origin or beliefs; (3) Failure of the employer/union to prevent or act upon complaints of sexual harassment of women employees. * * *"
