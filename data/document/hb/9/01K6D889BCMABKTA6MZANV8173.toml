congress_website_title = "AN ACT PROVIDING SUBSIDY TO PRIVATE HOSPITALS AND CLINICS WHICH ADMIT FOR CONFINEMENT AND TREATMENT INDIGENT PATIENTS UNDER EMERGENCY CASES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Defines an \"indigent patient\" as one with no income, no means of support or job, no relatives, or a breadwinner whose illness forces him to stop working, or one with a monthly income of not more than P1,500. Provides government subsidy to hospitals which treated indigent patients admitted on emergency cases."

