congress_website_abstract = "\"Philippine National Police Code of Ethics and Professional Conduct.\" Sets the following objectives of this Act: (1) public accountability of those who are au- thorized to implement the laws; (2) the impor- tance of human rights; (3) providingemphasis on legal, moral and humane processes; (4) civilian respect for authorities; and (5) to guard the guardians of our people's rights. * * *"

