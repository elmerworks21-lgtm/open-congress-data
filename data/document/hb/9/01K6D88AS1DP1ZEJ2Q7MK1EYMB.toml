congress_website_title = "AN ACT AMENDING SECTION 16 OF \"THE EDUCATION ACT OF 1982\" BY REQUIRING APPLICANTS TO SECURE A LICENSE FOR A TEACHING POSITION IN PUBLIC AND PRIVATE EDUCATIONAL INSTITUTIONS WHETHER IN THE FORMAL OR INFORMAL SYSTEM IN ALL LEVELS OF THE EDUCATIONAL SYSTEM"
congress_website_abstract = "Applies to all applicants for a teaching job, as well as the teaching personnel, both in formal and informal systems in public and private schools. Requires these applicants TO SECURE A LICENSE TO TEACH FROM THE DECS AFTER COMPLYING WITH PRESCRIBED CONDITIONS; provides for these concerns: (1) preliminary requirements; (2) procedure for securing license; (3) exemptions; and (4) evaluation. * * * 4"

