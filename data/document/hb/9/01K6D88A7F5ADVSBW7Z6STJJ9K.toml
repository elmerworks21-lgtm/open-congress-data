congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE AIR POLLUTION CONTROL POLICY, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Clear Air Act of 1993\" Substantiates the State's policy comprehensive air pollution control for protection of public health. Provides for (1) the role of local government units toward this end; (2) air quality improvement action plan; (3) strategy for implementation of said action plan; (4) air pollution research and development programs; (5) public education and information campaign, etc. * * *"
