congress_website_title = "AN ACT STRENGTHENING BASIC EDUCATION BY IMPROVING ITS QUALITY, MAKING IT MORE RELEVANT AND ACCESSIBLE TO ALL, CREATING FOR THIS PURPOSE THE DEPARTMENT OF BASIC EDUCATION, DEFINING ITS ORGANIZATIONAL AND MANAGEMENT STRUCTURE TO ACHIEVE EFFICIENCY ANDEFFECTIVENESS OF OPERATIONS, AND APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Basic Education Act of 1993\" Defines the term \"BASIC EDUCATION\" as that which brings the child to a point where he can be an autonomous learner, one who is self-reliant and creative; defines other terms used in this Act. Seeks to provide a RELEVANT basic education to out-of-school youth, illiterate women and small subsistence farmers. * * *"

