congress_website_title = "AN ACT REPEALING SECTION 6 OF REPUBLIC ACT 7648, RELATIVE TO THE GRANT OF SUBSIDY BY THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION (PAGCOR) TO THE NATIONAL POWER CORPORATION (NAPOCOR)"
congress_website_abstract = "Refers to that provision of RA 7648 which mandates the PAGCOR to set aside 10% of its annual aggregates gross earnings as subsidy to the NAPOCOR for the next five (5) years; seeks the REPEAL of this provision considering the solution of the poweer crisis and the profits earned by the NAPOCOR."

