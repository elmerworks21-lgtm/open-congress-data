congress_website_title = "AN ACT GRANTING TO ANY PERSON WHO INVENTS OR DISCOVERS AND ASEXUALLY REPRODUCES ANY DISTINCT AND NEW VARIETY OF PLANTS THE RIGHT TO OBTAIN A PATENT THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Grants any person who invents or discovers and asexually reproduces any distinct and new variety of plant, the special privilege to exploit, produce and benefit from such discovery and reproduction. Grants the person the use and sale of the plant reproduced, to the exclusion of others and the right to obtain a patent with a term of seventeen (17) years for such invention or discovery and reproduction. * * *"
