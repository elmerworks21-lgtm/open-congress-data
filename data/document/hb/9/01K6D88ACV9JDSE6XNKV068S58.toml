congress_website_title = "AN ACT GRANTING AN ADDITIONAL ACROSS THE BOARD TAX EXEMPTION FOR PUBLIC SCHOOL TEACHERS, AMENDING FOR THE PURPOSE SECTION 2(2) (A) OF REPUBLIC ACT 7167, OTHERWISE KNOWN AS 'AN ACT ADJUSTING THE BASIC PERSONAL AND ADDITIONAL EXEMPTIONS ALLOWABLE TO INDIVIDUALS FOR INCOME TAX PURPOSES TO THE POVERTY THRESHOLD LEVEL, AMENDING FOR THE PURPOSE SECTION (29), PARAGRAPH (L), ITEMS (1) AND (2) (A), OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes the following additional paragraph to Section 2, RA 7167, As Amended: \"(2) ADDITIONAL EXEMPTION A) Taxpayers with dependents. x x x x B) Additional Tax Exemption for Public Schoolteachers. THE PUBLIC SCHOOLTEACHERS SHALL BE ACCORDED AN ACROSS THE BOARD TAX EXEMPTION IN THE AMOUNT OF TWENTY THOUSAND PESOS (P20,000.00) FOR MARRIED INDIVIDUAL AND THE AMOUNT OF FIFTEEN THOUSAND PESOS (P15,000.00) FOR SINGLE INDIVIDUAL OR MARRIED INDIVIDUAL JUDICIALLY DECREED AS LEGALLY SEPARATED WITH NO QUALIFIED DEPENDENTS.\" * * *"
