congress_website_title = "AN ACT LEGALIZING THE GAME OF \"JUETENG\", PROVIDING REGULATIONS THEREFOR"
congress_website_abstract = "\"Jueteng Regulation Act of 1992\" Provides for the creation of a LOTTERY REGULATORY BOARD (LRB) under the Philippine Charity Sweepstakes Office; states the func- tions and powers of the LRB. Prohibits the operation of jueteng by any private entity; requires that the winning numbers be made known to the public. * * *"
