congress_website_title = "AN ACT DECRIMINALIZING VAGRANCY AND PROSTITUTION FOR CHILDREN AGED EIGHTEEN (18) YEARS AND BELOW, AMENDING ARTICLE TWO HUNDRED TWO OF THE REVISED PENAL CODE AND PROVIDING REHABILITATION PROGRAMS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to amend Art. 202 of the Revised Penal Code by redefining \"VAGRANTS and PROSTITUTES\" as used in this Law; states that the definition SHALL NOT APPLY TO CHILDREN EIGHTEEN (18) YEARS OF AGE OR BELOW, WHO SHALL BE CONSIDERED VICTIMS, NOT OFFENDERS."

