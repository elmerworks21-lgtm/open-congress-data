congress_website_title = "AN ACT AMENDING THE PERTINENT PROVISIONS OF PRESIDENTIAL DECREE NUMBER FOUR HUNDRED FORTY-TWO (442), AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, ON ILLEGAL RECRUITMENT, PROVIDING PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
