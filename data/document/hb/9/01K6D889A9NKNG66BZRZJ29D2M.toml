congress_website_title = "AN ACT GRANTING FIVE HUNDRED PESOS MONTHLY ALLOWANCE TO ALL BARANGAY TANODS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Grants a monthly allowance of Five Hundred Pesos (P500.00) to all barangay tanods. Entitles a barangay unit to enlist the services of a maximum of ten (10) barangay tanods whose names and dates of service shall be properly recorded and forwarded to the municipal authorities by the barangay secretary or the barangay captain. * * *"

