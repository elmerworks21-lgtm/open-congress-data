congress_website_title = "AN ACT INCREASING THE RETIREMENT PENSION OF JUSTICES AND JUDGES, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED NINE HUNDRED TEN ENTITLED 'AN ACT TO PROVIDE FOR THE RETIREMENT OF JUSTICES OF THE SUPREME COURT AND OF THE COURT OF APPEALS, FOR THE ENFORCEMENT OF THE PROVISIONS HEREOF BY THE GOVERNMENT SERVICE INSURANCE SYSTEM, AND TO REPEAL COMMONWEALTH ACT NUMBERED FIVE HUNDRED AND THIRTY-SIX' AS AMENDED"
congress_website_abstract = "States that the monthly pension of justices and judges shall be SEVENTY PERCENT (70%) OF THE MONTHLY SALARY, EMOLUMENTS AND OTHER FRINGE BENEFITS OF THE INCUMBENT JUSTICE OR JUDGE. States, further, that this pension SHALL BE MADE IN JANUARY OF EACH YEAR. * * *"
