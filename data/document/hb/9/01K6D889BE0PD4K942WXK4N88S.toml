congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A NATIONAL REFERENCE AND IDENTIFICATION SYSTEM IN THE PHILIPPINES AND CREATING THEREFOR THE NATIONAL REGISTRATION COORDINATING COMMISSION"
congress_website_abstract = "Establishes a national identification and reference system which would assign a permanent number for life to every Filipino and foreign national residing in the country. Directs the National Registration Coordinat- ing Commission to prepare the system form which shall contain the name, age, date and place of birth, citizenship, name of spouse, name of parents, permanent and temporary residences and such other information as may be required. * * *"
