congress_website_title = "AN ACT REORGANIZING THE BUREAU OF IMMIGRATION HEREINAFTER TO BE KNOWN AS THE BUREAU OF IMMIGRATION AND NATURALIZATION, DEFINING ITS ORGANIZATIONAL STRUCTURE, AND THE POWERS AND FUNCTIONS THEREOF, PROVIDING A SPECIAL APPROPRIATIONS THEREFOR, AND FOROTHER PURPOSES"
congress_website_abstract = "\"Philippine Immigration and Naturalization Act of 1993\" Highlights these salient features: (1) effective decentralizati on of the Bureau`s functions through the creation of IMMIGRATION AND NATURALIZATION DISTRICTS; (2) establishment of TRAVEL CONTROL DISTRICTS with jurisdiction over international airports; (3) legalization of residence and naturalization of qualified foreign nationals; (4) granting the Bureau prerogative to determine and recognize claims of citizenship. * * *"
