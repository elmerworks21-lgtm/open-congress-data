congress_website_title = "AN ACT PROVIDING FOR THE RIGHTS OF THE ACCUSED AND PERSONS UNDER INVESTIGATION FOR THE COMMISSION OF A CRIME, PROVIDING FOR CIVIL AND CRIMINAL PENALTIES IN CASE OF VIOLATION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Contains innovations intended to ensure that certain rules for the protection of the accused are strictly observed. Provides for other concerns, such as: (1) lenient requirements for release on one's own recognizance; (2) prohibition on undue publicity that may adversely affect the outcome of or conduct of the criminal proceedings; and (3) criminal sanctions against public officers committing forms of violence upon the person(s) arrested or under custodial investigation. * * *"

