congress_website_title = "AN ACT TO ESTABLISH A NEW SYSTEM OF PERSONNEL MANAGEMENT FOR MILITARY PERSONNEL OF THE ACTIVE FORCE OF THE ARMED FORCES OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"AFP Personnel Management Act of 1992\" Defines terms for purposes of this Act; highlights significant provisions on: (1) Composition, strength and grade distribution of the AFP active force; (2) Appointment of regular officers, PMA cadets andreserve officers; (3) Professional development, utiliza- tion and promotion of officers; (4) Efficiency and separation board; and (5) Retirement and separation benefits."

