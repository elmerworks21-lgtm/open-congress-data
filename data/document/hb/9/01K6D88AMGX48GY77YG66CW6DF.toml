congress_website_title = "AN ACT AMENDING SECTION 5 OF REPUBLIC ACT NUMBERED SIXTY NINE HUNDRED FIFTY-SEVEN, ENTITLED \"AN ACT AUTHORIZING THE FINANCING, CONSTRUCTION, OPERATION AND MAINTENANCE OF INFRASTRUCTURE PROJECTS BY THE PRIVATE SECTOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to encourage greater participation from the private sector in the infrastructure development program of the country. Adds the following provision to Section 5, RA 6957: \"IN THE EVENT OF A FAILURE IN PUBLIC BIDDING AS PROVIDED HEREIN, NEGOTIATED CONTRACT SHALL BE EXECUTED FOR NATIONAL/LOCAL GOVERNMENT PROJECTS . . . PROVIDED, THAT THE PROJECTS DO NOT REQUIRE ANY GOVERNMENT FUNDING OR GUARANTEE.\" * * *"

