congress_website_title = "AN ACT PENALIZING VIOLATIONS OF THE RIGHTS OF A PERSON CHARGED WITH AN OFFENSE OR SUSPECTED OF THE COMMISSION OF AN OFFENSE"
congress_website_abstract = "Penalizes Failure to (a) inform the accused person of his constitutional right to remain silent during the investigation; and (b) retain the services of a legal counsel; (2) Use of force, threat or intimidation to extract information; and (3) Detention of the accused in secret detention places."

