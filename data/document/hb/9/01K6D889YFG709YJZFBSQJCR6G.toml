congress_website_abstract = "\"Police Professionaliza tion Act of 1992\" States that beginning 1995, no person shall be eligible for appointment or accepted for employment in the PNP unless he is a graduate of the PNP Academy. Seeks to strengthen and expand the PNP Academy as the primary and central police training school in the country for the recruitment and training of potential members and officers of the PNP. * * *"

