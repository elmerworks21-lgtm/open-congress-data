congress_website_title = "AN ACT ENSURING PAYMENT OF RETIREMENT BENEFITS TO GOVERNMENT EMPLOYEES ON THE DATE OF THEIR RETIREMENT"
congress_website_abstract = "Ensures benefits due to those who are optionally or compulsorily retiring from the government service, by requiring that the processing be accomplished not later than 60 days before the retirement date."
