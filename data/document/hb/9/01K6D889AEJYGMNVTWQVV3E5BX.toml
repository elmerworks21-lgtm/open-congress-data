congress_website_title = "AN ACT REQUIRING THE ONE HUNDRED PERCENT (100%) USAGE OF INDIGENOUS COCO-BASED CHEMICALS AS SURFACTANTS AND PROHIBITING THE IMPORTATION OF RAW MATERIALS AND FINISHED PRODUCTS IN THE SOAP AND DETERGENT INDUSTRY, AND PENALIZING VIOLATIONS THEREOF"
