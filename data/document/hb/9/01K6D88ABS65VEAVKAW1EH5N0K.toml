congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED SEVENTY-FIVE ENTITLED AN ACT ESTABLISHING THE PHILIPPINE NATIONAL POLICE UNDER A REORGANIZED DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT, AND FOR OTHER PURPOSES (Provides for the creation of the Philippine National Fire Service (PNFS) in lieu of the [Bureau of Fire Protection]"
congress_website_abstract = "Creates the PHILIPPINE NATIONAL FIRE SERVICE (PNFS) in lieu of the Bureau of Fire Protection. Provides for these concerns: (1) Powers and functions of the Service; (2) Organization, operations and administration of the Service; (3) Support services; (4) Qualification standards for members of the PNFS; and (5) Rank classification in the Service."
