congress_website_title = "AN ACT SETTING THE CAPITALIZATION REQUIREMENT OF STOCK BROKERAGE FIRMS, AMENDING FOR THE PURPOSE SECTION NINETEEN OF BATAS PAMBANSA BILANG 178"
congress_website_abstract = "Requires a TWO-MILLION PESO bond for an applicant as a BROKER, and a ONE-MILLION PESO bond in the case of a dealer. States that a MINIMUM PAID-UP CAPITAL OF P1 M shall be required of every applicant, which shall be INCREASED ANNUALLY thereafter as follows: P130 M for 1996 P160 M for 1997 P200 M for 1998 P250 M for 1999 P300 M for 2000. * * *"

