congress_website_abstract = "Mandates the termination of cases WITHIN A PERIOD OF THREE (3) MONTHS FROM THE FIRST DAY OF TRIAL; mandates that criminal cases SHALL COMMENCE WITHIN THREE (3) DAYS FROM DATE OF ARRAIGNMENT. Allows postponement of trial, but NOT to exceeda total of seven (7) days from the entire duration of the trial. * * *"

