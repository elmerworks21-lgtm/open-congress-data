congress_website_title = "AN ACT PROVIDING FOR A SHORTER PERIOD FOR AN ABSENTEE TO BE PRESUMED DEAD, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED THREE HUNDRED EIGHTY-SIX, OTHERWISE KNOWN AS THE CIVIL CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to amend Article 390 of Ra 386, Civil Code of the Philippines, by declaring that after an absence of [seven] FOUR years, a person shall be presumed dead for all purposes; states, further, that the absentee shall not be presumed dead for the purpose of opening his succession until after an absence of [ten] FIVE years; states, likewise, that if a person who disappeared after the age of [seventy-five] SEVENTY years, an absence of [five] THREE years shall be sufficient in order that his succession may be opened. * * *"

