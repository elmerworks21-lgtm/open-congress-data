congress_website_title = "AN ACT REVISING THE JURISDICTION OF THE COURT OF APPEALS, AMENDING FOR THAT PURPOSE SECTION NINE OF BATAS PAMBANSA BILANG 129, KNOWN AS THE JUDICIARY ACT OF 1980, AS AMENDED"
congress_website_abstract = "Vests the Court of Appeals with exclusive jurisdiction TO REVIEW, REVISE, REVERSE, MODIFY, OR AFFIRM ON APPEAL OR CERTIORARI all final judgments, decisions, orders or awards of Regional Trial Courts and quasi-judicial agencies. Empowers theCourt of Appeals to CONDUCT HEARING and TO GRANT and CONDUCT NEW TRIALS OR FURTHER PROCEEDINGS. * * *"
