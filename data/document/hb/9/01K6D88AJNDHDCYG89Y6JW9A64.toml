congress_website_title = "AN ACT INSTITUTING THE DANGEROUS DRUGS ACT OF 1993"
congress_website_abstract = "\"Dangerous Drugs Act of 1993\" Seeks to institute a new dangerous drugs law with these features; (1) increased penalties for violations of the Dangerous Drugs Law; (2) prescribed procedure in the confiscation and forfeiture of the proceeds of the crime; (3) provision on the of role of students and schools in the fight against prohibited drugs; (4) modified structure and powers of the Dangerous Drugs Board. * * *"

