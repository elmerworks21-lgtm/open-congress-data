congress_website_title = "AN ACT LIBERALIZING THE ENTRY AND SCOPE OF OPERATIONS OF FOREIGN BANKS IN THE PHILIPPINES, AMENDING FOR THE PURPOSE RA 337, OTHERWISE KNOWN AS THE GENERAL BANKING ACT"
congress_website_abstract = "Allows members of the board of directors of a bank to the extent of the foreign participation in the equity of said bank. Allows foreign banking corporations to establish branches in the Philippines subject to regulation by the Monetary Board. Provides for the percentage of foreign- owned voting stocks in a bank."
