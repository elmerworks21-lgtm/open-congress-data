congress_website_title = "AN ACT ESTABLISHING A NATIONAL SOCIAL HEALTH INSURANCE PROGRAM AND REORGANIZING THE PHILIPPINE MEDICAL CARE COMMISSION FOR THE PURPOSE AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"National Social Health Insurance Act of 1994\" Aims to provide a viable means of helping the people, particularly the poor, pay for comprehensive health care services; proposes two (2) types of this health insurance program: (1) for all SSS/GSIS-covere d employees, persons; and (2) all Filipino citizens officially classified as \"living in poverty.\""
