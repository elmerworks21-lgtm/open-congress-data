congress_website_title = "AN ACT REPLACING QUANTITATIVE IMPORT RESTRICTIONS ON AGRICULTURAL PRODUCTS, EXCEPT RICE, WITH TARIFFS, AND ADOPTING ORDINARY CUSTOMS DUTIES AS THE SOLE MEASURES FOR PROTECTING AGRICULTURAL PRODUCERS"
congress_website_abstract = "\"Agricultural Protection Tariffication Act of 1995\"; Actualizes the policy of the State to make the country's agricultural sector efficient and globally competitive. Proposes, therefore, the use of tariffs in lieu of non-tariff restrictions to protect local agricultural products."
