congress_website_title = "AN ACT PROVIDING INCENTIVES FOR TOP MANAGEMENT POSITIONS IN GOVERNMENT SERVICE, AMENDING FOR THE PURPOSE SECTION NINE OF REPUBLIC ACT NUMBERED SIXTY-SEVEN HUNDRED AND THIRTEEN, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Government Top Management Service Incen- tives Act\" States that Cabinet secretaries, undersec- retaries and other public officials holding positions of the same rank shall receive a salary of P300,000.00 and P240,000.00 per annum, respectively.Requires the public official holding such positions to execute a \"BLIND TRUST\", effective during his tenure in office, in favor of any person other than his spouse or any of his children who is not a public official or em- ployee. Definesthe meaning of the term \"BLIND TRUST\". * * *"
