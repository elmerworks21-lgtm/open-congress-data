congress_website_title = "AN ACT TO HELP POOR STUDENTS PURSUE THEIR EDUCATION BY ENCOURAGING THEIR EMPLOYMENT DURING SUMMER AND/OR CHRISTMAS VACATIONS, THROUGH INCENTIVES GRANTED TO EMPLOYERS, PROHIBITING AND PENALIZING THE FILING OF FRAUDULENT OR FICTITIOUS CLAIMS AND FOR OTHER PURPOSES"
