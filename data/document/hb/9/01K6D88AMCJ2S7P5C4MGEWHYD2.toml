congress_website_title = "AN ACT ALLOWING FILIPINO CITIZENS RESIDING OR WORKING ABROAD TO EXERCISE THEIR RIGHT OF SUFFRAGE DURING NATIONAL ELECTIONS"
congress_website_abstract = "States that --- \"SECTION 1. Filipino citizens residing or working abroad and possessing all the qualifications and none of the disqualificatio ns of a voter and who have dutifully paid their income taxes shall be allowed to cast their votes in the Phil. Embassies or Consulates nearest their places of residence during national elections.\" * * *"
