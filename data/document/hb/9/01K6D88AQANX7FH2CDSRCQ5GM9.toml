congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED SEVEN THOUSAND ONE HUNDRED AND EIGHTY-ONE, ENTITLED AN ACT EXTENDING THE LIFE OF THE COMMITTEE ON PRIVATIZATION AND THE ASSET PRIVATIZATION TRUST"
congress_website_abstract = "Seeks to extend the life of the COMMITTEE ON PRIVATIZATION (COP) and the ASSET PRIVATIZATION TRUST (APT) for a period of three (3) years from 1994, with the President's option to extend it further for another two (2) years; REPEALS the loss recovery provision of RA 7181; reiterates the prohibition and strict observance of the noninjunction clause of Proclamation No. 50."
