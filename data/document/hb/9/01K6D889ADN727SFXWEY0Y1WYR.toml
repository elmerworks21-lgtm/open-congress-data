congress_website_title = "AN ACT PROMOTING VOLUNTARY BLOOD DONATION, PROVIDING FOR AN ADEQUATE SUPPLY OF SAFE BLOOD, REGULATING BLOOD BANKS, AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "\"Blood Services Act of 1992\" Provides for the promotion of voluntary blood donation through a well-organized public education campaign, as well as the establishment of blood collection centers in hospitals and designated places. Regulates blood services by requiring the registration and issuance of a license for the operation of a blood bank, and prescribing maximum fees for the provision of blood. * * *"
