congress_website_title = "AN ACT PROVIDING FOR A NEW QUEDAN SYSTEM IN THE MARKETING OF PALAY, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes a NEW system for marketing farmer's produce --- (1) The NFA shall determine the flow price for the palay; (2) NFA shall buy from the farmers their palay crops, and (3) a QUEDAN shall be issued for the REMAINING BALANCE, payable within 60 days for the time the palay is delivered to the warehouses."

