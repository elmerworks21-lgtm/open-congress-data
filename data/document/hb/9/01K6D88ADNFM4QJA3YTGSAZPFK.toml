congress_website_title = "AN ACT AUTHORIZING PROVINCIAL OFFICES OF THE BUREAU OF FISHERIES AND AQUATIC RESOURCES TO GRANT FISHPOND LEASE AGREEMENTS,AMEN DING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED SEVEN HUNDRED AND FOUR, AS AMENDED, ENTITLED THE FISHRIES DECREE OF 1975"
congress_website_abstract = "States that --- \"SEC. 24-A. APPROVAL OF FISHPOND LEASE AGREEMENTS. FISHPOND LEASE AGREEMENTS (FLAs) INVOLVING FISHPONDS UNDER SECTION 25 ... AND FISHPONDS UNDER SEC. 27 SHALL BE PROCESSED AND APPROVED BY THE BUREAU OR BY ANY OF ITS REGIONALOR PROVINCIAL BRANCHES HAVING JURISDICTION OVER THE AREA WHERE THE FISHPOND IS LOCATED.\" * * *"

