congress_website_title = "AN ACT INCREASING THE PENALTY FOR THE CRIME OF ABANDONMENT OF PERSONS IN DANGER AND ABANDONMENT OF ONE'S OWN VICTIM, AMENDING FOR THE PURPOSE ARTICLE 275 OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "Seeks to INCREASE the penalty for the crime of abandonment of one's own victim, such as: (1) ARRESTO MAYOR IN ITS MAXIMUM PERIOD and a FINE of P5,000.00 for failure to render assistance although one is able to do so: and (2) ONE-YEAR SUSPENSION OF ONE'S DRIVER LICENSE as an additional penalty for the crime. * * *"
