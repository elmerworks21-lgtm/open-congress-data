congress_website_title = "AN ACT PROHIBITING THE WITHDRAWAL OF INSURABILITY OF A BANK UNDER RECEIVERSHIP BY THE PHILIPPINE DEPOSIT INSURANCE CORPORATION, REPEALING FOR THE PURPOSE SUBSECTION (H), OF SECTION SIX AND SECTION SEVEN OF REPUBLIC ACT NUMBERED SEVEN THOUSAND FOUR HUNDRED, AMENDING THE CHARTER OF PHILIPPINE DEPOSIT INSURANCE CORPORATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to REPEAL certain provisions of RA 7400, the Revised PDIC Charter, which allow the Corporation to terminate the insured status of a bank for refusal and/or failure to pay assessments required to be paid for violation of a cease and desist order issued by the Corporation, or failure to correct certain unsafe and unsound practices."

