congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF STUDENT DORMITORIES, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Student Dormitories Act of 1993\" States that it shall be the obligation of private and public colleges and universities to establish student dormitories for qualified students; defines \"QUALIFIED STUDENTS\" for this purpose. States that the establishment of these dormitories shall either be VOLUNTARY or MANDATORY, and that income derived from their operation shall accrue to the benefit of the college or university concerned. * * *"
