congress_website_title = "AN ACT ASSIGNING ONE (1) REGIONAL TRIAL COURT IN EACH JUDICIAL REGION EXCLUSIVE JURISDICTION TO TRY, HEAR AND DECIDE CASES INVOLVING HEINOUS CRIMES TO BE KNOWN AS SPECIAL COURT FOR HEINOUS CRIMES AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the JURISDICTION of the proposed Court; designates the Supreme Court as the sole authority to choose the special courts for this purpose. Provides likewise for (1) the maximum period for terminating cases; (2) form, finality and enforcement of decisions; and (3) transfer of cases. * * *"

