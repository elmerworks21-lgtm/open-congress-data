congress_website_title = "AN ACT LIMITING THE RECOVERY BY A CREDITOR TO THE PROCEEDS OF FORECLOSURE SALE OF THE MORTGAGED PROPERTY AS PAYMENT OF THE PRINCIPAL OBLIGATION AMENDING FOR THE PURPOSE ARTICLE 2087 OF THE CIVIL CODE OF THE PHILIPPINES"
congress_website_abstract = "Provides that if the price of the sale of the mortgaged property is less than the amount of the obligation, the creditor shall not be entitled to recover the deficiency. * * *"
