congress_website_title = "AN ACT RECOGNIZING OR GRANTING CAREER EXECUTIVE SERVICE ELIGIBILITY TO CERTAIN FIRST GRADE ELIGIBLES AND PROTECTING THEIR RIGHT TO SECURITY OF TENURE"
congress_website_abstract = "Applies to the following: (1) Those who acquired FIRST GRADE eligibility before PD 1 (Sept. 24, 1972); (2) Those who, before August 12, 1990, acquired FIRST GRADE eligibility, received presidential appointments and served for at least 5 years; and (3) Those who, before August 12, 1990, acquired FIRST GRADE eligibility, received presidential appointments and served for at least 10 years. * * *"
