congress_website_title = "AN ACT GRANTING SALARY INCREASE TO ACTIVE MEMBERS OF THE ARMED FORCES OF THE PHILIPPINES AND THE PHILIPPINE NATIONAL POLICE PERSONNEL AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes a ONE HUNDRED PERCENT (100%) salary increase to active members of the AFP and the PNP personnel, based on the following rates: (1) 40% in the first year; (2) 30% in the second year; and (3) 30% in the third year. * * *"
