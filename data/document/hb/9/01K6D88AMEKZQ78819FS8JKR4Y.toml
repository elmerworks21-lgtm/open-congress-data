congress_website_title = "AN ACT PROVIDING FOR THE PROCLAMATION OF A LONE CANDIDATE FOR ANY ELECTIVE PUBLIC OFFICE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to ensure that each and every elective position in the executive and legislative branches of government is occupied at all times. Mandates that in the event only one candidate files a certificate of candidacy for any public office, exceptthe presidency or vice-presidency , such candidate shall henceforth be proclaimed the winner. * * *"
