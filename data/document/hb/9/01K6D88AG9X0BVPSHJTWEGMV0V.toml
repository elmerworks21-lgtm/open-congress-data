congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF PRESIDENTIAL DECREE 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED, TO ENHANCE WORKERS' PARTICIPATION IN THE DETERMINATION OF APPRENTICESHIP PROGRAMS AND TO SAFEGUARD WORKERS' RIGHT TO GAINFUL EMPLOYMENT"
congress_website_abstract = "States that any apprentice who is retained after the period of apprenticeship SHALL BE CONSIDERED A REGULAR EMPLOYEE; states, likewise, that the wage rates of apprentices shall in NO case be LESS THAN THE STATUTORY MINIMUM WAGE. Directs the beneficiary establishment to provide living allowance sufficient to cover the apprentice's meals, transportation and other incidental expenses. * * *"
