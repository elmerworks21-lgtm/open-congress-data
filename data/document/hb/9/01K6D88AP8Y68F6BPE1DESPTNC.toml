congress_website_title = "AN ACT RECLASSIFYING THOSE PERSONS IN AUTHORITY WHO DIRECTLY CAUSE OR ORDER THE DESTRUCTION OR CONCEALMENT OF VITAL EVIDENCES FOR HEINOUS CRIMES AS ACCOMPLICES, AMENDING FOR THE PURPOSE ARTICLE 18 OF THE REVISED PENAL CODE, AS AMENDED"
congress_website_abstract = "Adds the following paragraph to Art. 18 of the Revised Penal Code: \"THOSE PERSONS IN AUTHORITY, LIKE MEMBERS OF THE JUDICIARY AND LAW ENFORCEMENT AGENCIES AND OTHER PUBLIC OFFICIALS, WHO DIRECTLY CAUSE OR ORDER THE DESTRUCTION OR CONCEALMENT OF VITAL EVIDENCE OR EVIDENCES FOLLOWING THE COMMISSION OF A HEINOUS CRIME, SHALL LIKEWISE BE CONSIDERED ACCOMPLICES.\" * * *"
