congress_website_title = "AN ACT PROVIDING FOR THE ELECTION OF PARTY-LIST REPRESENTATIVES THROUGH THE PARTY-LIST SYSTEM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Party-List System Act\" Defines the term \"PARTY-LIST SYSTEM\" as the system of enlisting organized groups of persons pursuing the same ideology, political ideas, or platform of government for purposes of representation in the legislature.\" Seeks to elect to the Congress of the Philippines representatives from duly registered and accredited political parties and sectoral organizations throughout the country."
