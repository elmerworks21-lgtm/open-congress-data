congress_website_title = "AN ACT RESTORING THE PENAL SANCTIONS AND AUTHORIZING THE IMPOSITIONS OF ADMINISTRATIVE FINES FOR VIOLATIONS OF THE LABOR CODE OF THE PHILIPPINES AND ITS IMPLEMENTING REGULATIONS AND STANDARDS"
congress_website_abstract = "Declares that any violations of the Labor Code of the Philippines shall be punished with a fine of not less than P1,000.00, but not more than P10,000.00, or imprisonment of not less than three (3) months, but not more than three (3) years. Mandates the DOLE Secretary, through the regional offices, to impose administrative fines where the violations of the regulations and standards are not serious or willful. * * *"

