congress_website_title = "AN ACT INCREASING THE SALARIES AND GRANTING OTHER BENEFITS TO BARANGAY OFFICIALS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes to give salaries to barangay offi- cials as follows: (1) barangay captain P3,000.00 (2) barangay councilman 1,500.00 (3) barangay treasurer 1,000.00 (4) barangay secretary 1,000.00 (5) KB chairman 1,000.00 (6) barangay tanod 1,000.00 Provides, likewise, for the officials acci- dent insurance, free medical services and medi- cines and free tuition and matriculation fees for their children. * * *"

