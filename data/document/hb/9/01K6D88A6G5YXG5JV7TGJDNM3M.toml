congress_website_title = "AN ACT GRANTING RETIREMENT, PENSION AND OTHER BENEFITS UPON REACHING RETIREMENT AGE OR EARLIER SEPARATED FROM THE SERVICE ALLOWED UNDER EXISTING LAWS, TO ALL OFFICIALS AND EMPLOYEES OF THE NATIONAL AND LOCAL GOVERNMENTS, EITHER APPOINTIVE OR ELECTIVE, INCLUDING THOSE OF THE GOVERNMENT-OWNE D AND CONTROLLED CORPORATIONS WHO HAVE RENDERED AN AGGREGATE ALTHOUGH NON-CONTINUOUS AND BROKEN PUBLIC SERVICE FOR AT LEAST TEN (10) YEARS UPON A RECONSTITUTION OF THEIR SERVICE RECORDS AND OTHER PERTINENT DOCUMENTS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the creation of a GOVERNMENT EMPLOYEES FUND (SGEF) to pay the benefits under this proposed measure; explains the mechanics for the reconstitution of service records as provided in this Act. Prescribes penalty for deliberate misrepresentati on of facts in the reconstitution of service records. * * *"

