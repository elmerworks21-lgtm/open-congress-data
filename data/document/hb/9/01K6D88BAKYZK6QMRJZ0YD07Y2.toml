congress_website_title = "AN ACT FURTHER STRENGTHENING VOLUNTARY ARBITRATION AS A PREFERENTIAL MODE OF LABOR DISPUTE SETTLEMENT, AMENDING FOR THE PURPOSE ARTICLES 260, 261, 262-A, 262-B AND 277(F) OF PD 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Proposes certain AMENDMENTS to PD 442, the Labor Code of the Philippines, as amended, such as on the following areas oif concer: (1) designation IN ADVANCE of a voluntary arbitrator; (2) jurisdiction over cases of termination or workers covered by collective bargaining agreements, productivity schemes or mandated wage increases; (3) fees of voluntary arbitrators; and (4) allocation of the Special Voluntary Fund. * * *"
