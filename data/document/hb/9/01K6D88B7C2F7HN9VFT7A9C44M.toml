congress_website_title = "AN ACT AMENDING SECTION SIXTY THREE OF REPUBLIC ACT NUMBERED SIXTY SIX HUNDRED AND FIFTY SEVEN (R.A. NO. 6657), OTHERWISE KNOWN AS THE COMPREHENSIVE AGRARIAN REFORM LAW OF NINETEEN EIGHTY EIGHT, PROVIDING THAT THE AGRARIAN REFORM FUND (ARF) SHALL BECOME A REVOLVING FUND TO FINANCE THE IMPLEMENTATION OF THE CARP, AND FOR OTHER PURPOSES"
