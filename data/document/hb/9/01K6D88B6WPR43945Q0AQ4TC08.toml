congress_website_title = "AN ACT AMENDING SECTION 7 OF REPUBLIC ACT NO. 6713, OTHERWISE KNOWN AS \"AN ACT ESTABLISHING A CODE OF CONDUCT AND ETHICAL STANDARDS FOR PUBLIC OFFICIALS AND EMPLOYEES,\" BY PROHIBITING THE USE OF BODYGUARDS OR OTHER SECURITY PERSONNEL AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes the inclusion of the following provision as one of the PROHIBITED ACTS under RA 6713: \"(e) USE, MOBILIZE, OR EMPLOY BODYGUARDS OR OTHER SECURITY PERSONNEL FOR ANY PURPOSE WHATSOEVEREXCEP T MEMBERS OF THE PHILIPPINE NATIONAL POLICE WHO ARE DULY AUTHORIZED AND ASSIGNED TO SUCH PUBLIC OFFICER OR EMPLOYEE WHICH IN NO CASE SHALL EXCEED TWO MEMBERS OF SAID PNP. IN CASE OF VIOLATION OF THIS SUBSECTION, THE PENALTY OF NOT LESS THAN 6 YEARS IMPRISONMENT AND A FINE OF P100,000.00 SHALL BE IMPOSED.\" * * *"

