congress_website_title = "AN ACT GRANTING THE PRESIDENT THE POWER TO INSTITUTE A REORGANIZATION PROGRAM IN ORDER TO STREAMLINE THE OPERATIONS OF GOVERNMENT AND TO EFFECT DECENTRALIZATIO N AND NATIONAL DEVELOPMENT, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NUMBERED TWO HUNDREDAND NINETY-TWO, OTHERWISE KNOWN AS THE ADMINISTRATIVE CODE OF 1987"
congress_website_abstract = "Provides that such reorganization SHALL NOT BE MADE MORE THAN ONCE EVERY TEN (10) YEARS. Provides, further, that the same SHALL NOT BE DONE DURING A PERIOD OF ONE (1) YEAR IMMEDIATELY PRECEDING A LOCAL OR NATIONAL ELECTIONS. * * *"
