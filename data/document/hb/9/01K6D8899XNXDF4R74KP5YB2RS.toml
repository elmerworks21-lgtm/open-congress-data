congress_website_abstract = "Provides for (1) creation of a special drug court in each judicial region in the Philippines, (2) the qualifications and appointment of the Special Drugs Court judge, and (3) other related concerns. States that said courts shall exercise exclusive original jurisdiction over all cases arising from violations of the Dangerous Drugs Act of 1972. * * *"

