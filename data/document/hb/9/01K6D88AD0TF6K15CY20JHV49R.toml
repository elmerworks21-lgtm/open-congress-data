congress_website_title = "AN ACT PROVIDING FOR A GRANT OF LONGEVITY PAY TO ALL OFFICIALS AND EMPLOYEES OF THE GOVERNMENT, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Applies to those who have completed at least TEN (10) YEARS OF CONTINUOUS AND SATISFACTORY SERVICE. Defines \"LONGEVITY PAY\" as referring to a monetary award equivalent to one (1) percent of the salary grade allocation for every three (3) years of service. * * *"
