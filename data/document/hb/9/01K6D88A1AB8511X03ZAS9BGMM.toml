congress_website_title = "AN ACT AUTHORIZING THE NATIONAL POWER CORPORATION TO SET UP, MAINTAIN AND OPERATE ELECTRIC POWER GENERATION AND TRANSMISSION FACILITIES IN THE SMALL ISLANDS OF THE PHILIPPINE ARCHIPELAGO AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Small Islands Electrification Program\" Appropriates the sum of ONE BILLION SEVEN HUNDRED FIFTY MILLION PESOS (P1,750,000,000 .00) for this purpose. Requires the use of indigenous resources for the infrastructure needs of the Program, whenever practicable; requires, likewise, that the public be consulted and educated by the National Power Corporation on the nature and aspects of the Program. * * *"

