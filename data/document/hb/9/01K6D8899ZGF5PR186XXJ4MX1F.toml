congress_website_title = "AN ACT AUTHORIZING THE CARRYING OF LICENSED FIREARMS OUTSIDE OF RESIDENCE, CREATING THE FIREARMS REGULATORY BOARD AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Firearms Regulation Act\" Seeks to provide fullest protection to the public in the pursuit of their legitimate concerns. Allows a qualified person more than two (2) firearms and to carry not more than one (1) firearm outside of his residence.States the qualifications and conditions for carrying firearms; identifies those disqualified from carrying firearms under this Act. * * *"
