congress_website_title = "AN ACT AMENDING SECTION 16 OF PRESIDENTIAL DECREE 1177 BY ENSURING THAT BASIC EDUCATION GETS THE HIGHEST BUDGETARY PRIORITY"
congress_website_abstract = "Declares that: \"The Department of Culture and Sports (DECS) shall receive the highest budgetary priority, fifty percent (50%) of which shall be appropriated for basic education. The share of the DECS in the total budget for the succeedingyears shall not be diminished compared with the budget of the previous years and shall in fact be increased in proportion to the number of enrollees in basic education.\" * * *"

