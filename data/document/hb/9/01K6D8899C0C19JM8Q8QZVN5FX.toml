congress_website_title = "AN ACT INTEGRATING ALL EXISTING ALLOWANCES OF THE UNIFORMED MEMBERS OF THE ARMED FORCES OF THE PHILIPPINES AND THE PHILIPPINE NATIONAL POLICE IN THEIR BASIC PAY"
congress_website_abstract = "Seeks difficulties of retirees from the Armed Forces of the Philippines (AFP) and the Philippine National Police (PNP) by integrating all existing allowances in the basic salary of the uniformed personnel, thus, insuring that retirees will receive a larger pension through an increased base pay."
