congress_website_title = "AN ACT PROVIDING FOR THE MANNER AND DATE OF ELECTION OF SECTORAL REPRESENTATIVES TO LOCAL SANGGUNIANS AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates that there shall be ONE (1) sectoral representative from the women and the workers sectors; and one (1) from any of the following; urban poor, indigenous cultural communities, disabled persons or any other sector to be determined by the local sanggunians; mandates, likewise, that this election shall be held within 90 days before the conduct of the next local elections and that the candidates shall be voted AT LARGE."

