congress_website_title = "AN ACT DECLARING EVERY SECOND SUNDAY OF DECEMBER AS NATIONAL CHILDREN'S BROADCASTING DAY"
congress_website_abstract = "Seeks to arouse consciousness and greater involvement by all those concerned in the promotion of the social well-being and general welfare of Filipino children. Urges all TV and radio stations nationwide to allocate at least a minimum of one (1)-hour ait time to programs exclusively for, on, or about children."
