congress_website_abstract = "\"Comprehensive Juvenile Justice System\" Applies to youth offenders over nine(9) years of age, but under 18 years old at the time of the commission of the offenses. Aims to: (1) promote the rehabilitation of youth offenders; and (2) prevent the commission of offenses by the youth. * * *"

