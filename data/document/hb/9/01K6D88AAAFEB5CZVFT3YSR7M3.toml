congress_website_title = "AN ACT AMENDING SECTION 285 OF REPUBLIC ACT NUMBERED 7160 OTHERWISE KNOWN AS THE 'LOCAL GOVERNMENT CODE OF 1991' (Provides a revised formula in determining the revenue allocation to local government units)"
congress_website_abstract = "Provides the following formula in determining the share of local government units in the internal revenue allotment: (1) Population --- [50%] 40% (2) Land area --- [25%] 40% (3) Equal Sharing - [25%] 20% Provides, further. that on theFIRST YEAR of the effectivity of this Code, and up to the THIRD YEAR and thereafter, the \"population and equal sharing\" scheme shall be adjusted accordingly. * * *"
