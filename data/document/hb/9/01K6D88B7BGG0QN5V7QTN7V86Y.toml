congress_website_title = "AN ACT ESTABLISHING THE PRE-NEED PLAN CODE"
congress_website_abstract = "Contains these features: (1) Subjects all pre-need plan companies to the supervision and regulation of the SEC; (2) Mandates the establishment by pre-need plan companies of a TRUST FUND for guaranteed benefit and services; (3) Mandates these companies to set aside 5% of their trust fund for direct lending to Countryside and Barangay Business Enterprises (CBBE) under RA 6810."
