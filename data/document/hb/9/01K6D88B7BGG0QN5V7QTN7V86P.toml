congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED FOUR HUNDRED NINETY-THREE, ENTITLED: \"AN ACT TO PROHIBIT THE USE OR CONFERRING OF MILITARY OR NAVAL GRADES OR TITLES BY OR UPON PERSONS NOT IN THE SERVICE OF THE ARMED FORCES OF THE PHILIPPINES OR THE PHILIPPINE CONSTABULARY, TO REGULATE THE WEARING, USE, MANUFACTURE AND SALE OF INSIGNIAS, DECORATIONS, AND MEDALS, BADGES, PATCHES AND IDENTIFICATION CARDS PRESCRIBED FOR THE SAID ARMED FORCES OR CONSTABULARY, AND FOR OTHER PURPOSES\""
congress_website_abstract = "Seeks to INCREASE the penalty for the illegal conferment of military, naval or police grades and titles; prohibits COMPLETELY the possession and use of badges, patches and IDs prescribed to the AFP and the PNP by unauthorized personnel."
