congress_website_title = "AN ACT CREATING A RENT APPEALS BOARD"
congress_website_abstract = "Proposes the creation of such Board in each municipality or city; provides for the (1) composition; (2) compensation; and (3) jurisdiction of the Board. Prescribes the duties and functions of the Board, as well as the manner by which an appealmay be made. States that the decisions of, and all evidences received by the Board shall be open to the public for inspection. * * *"

