congress_website_title = "AN ACT REORGANIZING THE INSURANCE COMMISSION AS A COLLEGIAL BODY AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Insurance Commission Regulation Act of 1990\" Declares the Insurance Commission REORGANIZED as a collegial body for the administrative supervision of the Department of Finance, composed of a chairman and two(2) associate commissioners. Provides for (1) qualifications, term of office and powers of the officers; (2) organizational setup; (3) powers and functions of the Commission; (4) hearings and procedures; and (5) collection of fees. * * *"
