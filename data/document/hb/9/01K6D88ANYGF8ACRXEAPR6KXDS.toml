congress_website_title = "AN ACT AMENDING SECTION 20 OF PRESIDENTIAL DECREE NUMBERED 1638, AS AMENDED BY PRESIDENTIAL DECREE NUMBERED 1650, OTHERWISE KNOWN AS THE ARMED FORCES OF THE PHILIPPINES RETIREMENT LAW"
congress_website_abstract = "Amends Section 20, PD 1650 as amended, to read as follows: \"Sec. 20. An officer with less than twenty (20) years of active service separated under Sections 10, 11, 12 or 16 OR AN ENLISTED PERSON WITH LESS THAN TWENTY (20) YEARS OF ACTIVESERVICE HONORABLY SEPARATED, shall be entitled to a separation pay equivalent to one (1) month base pay and longevity pay of the permanent grade he holds for every year of active service.\" * * *"
