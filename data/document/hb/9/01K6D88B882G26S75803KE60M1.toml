congress_website_title = "AN ACT PRESCRIBING URGENT RELATED MEASURES TO EFFECTIVELY CARRY OUT AGRICULTURAL DEVELOPMENT IN THE COUNTRYSIDE TO ADDRESS THE IMPLICATIONS OF THE GENERAL AGREEMENT ON TARIFFS AND TRADE ON THE ECONOMY THROUGH THE ACCELERATION OF THE INTEGRATED IRRIGATION PROGRAM AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Irrigation Crisis Act of 1994\" Intends to adopt adequate and effective measures to address agri-cultural development in the light of the implication of the GATT. Provides authority to the President of the Republic of the Philippines to enter intonegotiated contracts for the construction, repair, improvement or maintenance of irrigation projects and facilities."
