congress_website_title = "AN ACT GRANTING PRIORITY WATER RIGHTS TO PROVINCES, CITIES OR MUNICIPALITIES WHERE SPRING, CREEKS, RIVERS, PONDS OR LAKES ARE LOCATED"
congress_website_abstract = "Declares that --- \"SECTION 1. - Priority rights - Priority water rights for use in irrigation projects, water impounding and similar constructions shall be granted to the Province, City, Municipality or Barangay where the body of fresh water/creeks, ponds, lakes, rivers are located.\" Declares, further, that adjoining areas shall be entitled to USE THE EXCESS WATER for irrigation, etc. * * *"

