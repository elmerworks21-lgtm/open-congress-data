congress_website_title = "AN ACT AMENDING ARTICLE 294 AND 295 OF THE REVISED PENAL CODE IN ORDER TO PRESCRIBE THE DEATH PENALTY FOR SOLDIERS OR POLICEMEN WHO COMMIT THE CRIME OF ROBBERY"
congress_website_abstract = "Specifies and defines the kind of robbery committed by soldiers or policemen. Mandates that the DEATH PENALTY SHALL BE IMPOSED IF THE ROBBERY IS COMMITTED BY ANY MEMBER OF THE ARMED FORCES OF THE PHILIPPINES OR THE PHILIPPINE NATIONAL POLICE, WHETHER THE OFFENDER IS STILL IN THE SERVICE OR HAS BEEN DISCHARGED THEREFROM. * * *"
