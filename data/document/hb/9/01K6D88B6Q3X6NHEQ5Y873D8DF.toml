congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A SYSTEM OF COMMUNITY INTELLECTUAL PROPERTY RIGHTS PROTECTION"
congress_website_abstract = "\"CIRPA 1994\" (Community Intellectual Property Rights Protection Act); introduces three (3) new principles re intellectual property protection: (1) State recognition of the original rights of indigenous communities and local farmers over innovationsthey have developed; (2) Community ownership of traditional knowledge regarding seeds, plant genetic materials, and other life forms; and (3) Registration and documentation of traditional knowledge as a form of intellectual property protection. * * *"

