congress_website_title = "AN ACT REGULATING THE ACTIVITIES OF PRE-NEED COMPANIES IN THE INTEREST OF THE PUBLIC"
congress_website_abstract = "Requires any pre-need company to obtain a CERTIFICATE OF AUTHORITY for that purpose from the Insurance Commission. Provides, likewise, for the following: (1) Qualifications of Officials; (2) Examination of Books and Records; (3) Actuarial Review; (4) Administration and Penal Sanctions, etc."
