congress_website_title = "AN ACT RATIONALIZING THE IMPORTATION OF SUGAR IN ANY FORM AND FOR OTHER PURPOSES"
congress_website_abstract = "States the conditions under which sugar in any form may be imported; directs the Sugar Regulatory Administration to establish a system of pro rata sugar import quota allocation for the national sugar producers. Mandates that 10% of the gross profit from sugar importation be held in trust to benefit the sugar workers. * * *"
