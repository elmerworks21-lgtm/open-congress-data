congress_website_title = "AN ACT AMENDING SECTION 35 (b) OF RA 6975 SO AS TO PROVIDE FOR ENVIRONMENTAL PROTECTION, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Establishes police units tasked to protect the environment. Identifies these police units as: (1) Maritime; (2) police intelligence; (3) police security; (4) criminal investigation; (5) special action force; (6) narcotics; (7) aviation security; (8) traffic management; (9) medical and dental; and (10) civil relations. * * *"
