congress_website_title = "AN ACT REQUIRING ALL GOVERNMENT OFFICES TO FURNISH THE GOVERNMENT SERVICE INSURANCE SYSTEM (GSIS) WITH UPDATED SERVICE RECORDS OF THEIR COVERED EMPLOYEES, AND THE GSIS TO KEEP SERVICE RECORDS OF ITS MEMBERS, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
