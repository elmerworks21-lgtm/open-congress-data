congress_website_title = "AN ACT AUTHORIZING THE PHILIPPINE NATIONAL POLICE ACADEMY TO ESTABLISH BRANCHES IN MINDANAO AND THE VISAYAS AND OTHER PARTS OF THE COUNTRY, AMENDING FOR THE PURPOSE PRESIDENTIAL DECEREE NUMBERED SEVENTEEN HUNDRED AND EIGHTY, OTHERWISE KNOWN AS THE \"PHILIPPINE NATIONAL POLICE ACADEMY CHARTER OF 1981\" AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes a NEW section to be added to PD 1780, the PNP Academy Charter of 1981, which shall read as follows: \"SECTION 5 - A. AUTHORITY TO ESTABLISH BRANCHES. THE ACADEMY IS AUTHORIZED TO ESTABLISH, WHEN DEEMED NECESSARY, BRANCHES IN MINDANAO AND THE VISAYAS AND OTHER PARTS OF THE COUNTRY.\""

