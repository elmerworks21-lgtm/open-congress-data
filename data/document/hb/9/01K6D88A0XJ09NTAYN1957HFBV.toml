congress_website_title = "AN ACT RE-DEFINING THE FELONY OF PROSTITUTION, PROVIDING STIFFER PENALTIES FOR LAW ENFORCERS WHO ACT AS CO-PRINCIPALS FOR PROSTITUTES AND PENALIZING ANY PERSON WHO HIRES THE SERVICES OF ONE, THEREBY AMENDING ARTICLE TWO HUNDRED AND TWO OF THE REVISED PENAL CODE FOR THE PURPOSE"
congress_website_abstract = "States that --- ANY LAW ENFORCER, POLICE OR MILITARY OFFICER WHO FACILITATES THE FELONY OF PROSTITUTION EITHER AS A CO-PRINCIPAL BY DIRECT PARTICIPATION, INDUCEMENT OR INDISPENSABLE COOPERATION SHALL SUFFER THE PENALTY OF TWO YEARS IMPRISONMENT AND A FINE OF TWENTY THOUSAND PESOS (P20,000.00) AND SHALL NOT BE ELIGIBLE FOR PROBATION. ANY OTHER PERSON WHO USES OR HIRES THE SERVICES OF A PROSTITUTE SHALL SUFFER THE PENALTY OR ARRESTO MAYOR AND A FINE NOT EXCEEDING TWENTY THOUSAND PESOS (P20,000.00). * * *"
