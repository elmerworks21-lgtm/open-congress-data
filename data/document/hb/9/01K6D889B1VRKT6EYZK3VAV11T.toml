congress_website_title = "AN ACT PRESCRIBING CERTAIN CONDITIONS IN THE INVESTIGATION AND TRIAL OF CASES INVOLVING THE CRIME OF RAPE"
congress_website_abstract = "Prescribes the following conditions in the investigation and trial of rape cases: (1) Complaints be assigned to a policewoman investigator; (2) Investigation be conducted privately; and (3) No publicity shall be made on the details of the case. ** *"
