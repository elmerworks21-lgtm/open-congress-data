congress_website_title = "AN ACT TO STRENGTHEN TEACHER EDUCATION IN THE PHILIPPINES BY ESTABLISHING CENTERS OF EXCELLENCE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines a \"CENTER OF EXCELLENCE\" as referring to a public or private college, institute or school, existing by itself or within a school, and engaged in the formal and nonformal education of teachers. Prescribes the criteria for identifying schools as centers of excellence; designates the UP College of Education and the Philippine Normal College as national centers of excellence. * * *"
