congress_website_title = "AN ACT RE-DEFINING THE TERMS \"INDIGENT AND LOW INCOME LITIGANTS\" AS USED IN SECTION TWO OF REPUBLIC ACT SIX THOUSAND AND THIRTY FIVE"
congress_website_abstract = "Refers Stenographer to Give Free Transcript of Notes to Indigent and Low-Income Litigants and Providing Penalty for the Violation Thereof\" Redefines the term \"INDIGENT OR LOW-INCOME LITIGANT\" as anyone who has no visible means of support or whose income does not exceed FIVE THOUSAND PESOS per month."

