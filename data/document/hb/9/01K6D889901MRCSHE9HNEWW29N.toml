congress_website_abstract = "Amends Executive Order No. 106 by restruc- turing the medical care benefits to medicare beneficiaries covered by the Social Security System (SSS) and the Government Service Insur- ance System (GSIS) to not less than the rates specifically indicated in this Act. States that the increase of medical care benefits shall not require any increase in the rate and amount of contribution. * * *"
