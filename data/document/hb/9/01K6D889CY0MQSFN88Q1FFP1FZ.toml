congress_website_title = "AN ACT ESTABLISHING AN AGRO-INDUSTRIAL HIGH SCHOOL IN THE MUNICIPALITY OF SAN NARCISO, PROVINCE OF ZAMBALES, TO BE KNOWN AS THE SAN NARCISO AGRO-INDUSTRIAL HIGH SCHOOL, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Declares that - \"ARTICLE 110. WORKER'S MONETARY CLAIMS: A FIRST LIEN OVER HIS EMPLOYER'S ASSETS IN CASE OF BANKRUPTCY. - ANY PROVISIONS OF THE GENERAL OR SPECIAL LAW TO THE CONTRARY NOTWITHSTANDING , A WORKER'S UNPAID WAGES AND OTHERMONETARY CLAIMS SHALL CONSTITUTE A FIRST LIEN OVER ANY AND ALL ASSETS OF HIS EMPLOYER. SUCH UNPAID WAGES AND OTHER MONETARY CLAIMS SHALL BE PAID IN FULL BEFORE THE CLAIMS AND OTHER LIENS IN FAVOR OF THE GOVERNMENT AND OTHER CREDITORS MAYBE PAID.\" * * *"
