congress_website_title = "AN ACT PROVIDING FOR THE STANDARDIZATION OF LIQUIFIED PETROLEUM GAS CYLINDER TANKS AND REGULATOR HEADS, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Mandates that the cylinder and regulator heads of liquefied petroleum gas (LPG) shall be standard sizes and design; directs all manufacturers of LPG cylinder tanks and regulator heads to CONVERT their tanks/regulator heads in accordance with the prescribed size WITHIN SIX (6) MONTHS upon issuance of the standard sizes/design by the Bureau of Product Standards. * * *"

