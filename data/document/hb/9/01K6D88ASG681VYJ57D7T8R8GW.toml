congress_website_title = "AN ACT AMENDING SECTIONS 44 (2) AND 44 (3-C-1) OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, RELATIVE TO THE FILING OF INCOME TAX RETURN BY INCOME-EARNING INDIVIDUALS"
congress_website_abstract = "Exempts certain individuals from the filing of income tax return, such as (1) individuals whose income consists of interest, prizes, winnings, royalties, etc.; (2) alien employees connected with multinational corporations; (3) alien employees of offshore banking units; and those (4) engaged in petroleum exploration. * * *"

