congress_website_title = "AN ACT INCREASING THE MONTHLY BASE PAY OF UNIFORMED MEMBERS AND CIVILIAN EMPLOYEES OF THE PHILIPPINE NATIONAL POLICE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Declares uniformed members of the PNP in the active service, with the rank of Police Officer I, shall be FIVE THOUSAND PESOS. Provides for a corresponding and proportionate increase in the pay pf Police Officer II and higher; states thatthe minimum monthly base pay of the PNP shall be TWO THOUSAND PESOS."
