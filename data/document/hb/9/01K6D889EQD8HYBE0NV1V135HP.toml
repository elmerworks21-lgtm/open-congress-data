congress_website_title = "AN ACT AMENDING SECTION 10 OF REPUBLIC ACT NO. 6948 OTHERWISE KNOWN AS 'AN ACT STANDARDIZING AND UPGRADING THE BENEFITS FOR MILITARY VETERANS AND THEIR DEPENDENTS', BY INCREASING THE MONTHLY OLD PENSION OF VETERANS FROM FIVE HUNDRED PESOS (P500.00)TO ONE THOUSAND FIVE HUNDRED PESOS (P1,500.00)"
congress_website_abstract = "Amends Section 10, RA 6948 to read follows: \"SECTION 10. ELIGIBILITY - A veteran who is at least sixty-five (65) years old shall be paid an old-age pension of One Thousand Five Hundred (P1,500.00) Pesos monthly unless he is actually receiving a similar pension for the same consideration from other government funds or from the United States Government.\" * * *"
