congress_website_title = "AN ACT AMENDING SECTION 17(e) AND 17(h) OF THE LOCAL GOVERNMENT CODE OF 1991 AND ARTICLE 28 OF ITS IMPLEMENTING RULES AND REGULATIONS, BY PROVIDING FOR A FIVE-YEAR PERIOD OF DEVOLUTION (Gives national agencies/office s 5 years within which to devolve to local government units the responsibility to provide basic services and facilities.)"
