congress_website_title = "AN ACT PROVIDING INCENTIVES TO MULTINATIONAL CORPORATIONS FOR THE ESTABLISHMENT OF PROCESSING PLANTS FOR AGRICULTURAL RAW PRODUCTS"
congress_website_abstract = "Defines the term \"multinational corporations\" as used in this Act; grants the following incentives to such corporations; (1) exemption from the payment of all local fees, taxes and licenses; (2) exemption from customs duties; (3) tax credit equivalent to 100% of the value of internal revenue taxes on machineries, equipment, etc. budget from a domestic manufacturer, etc."

