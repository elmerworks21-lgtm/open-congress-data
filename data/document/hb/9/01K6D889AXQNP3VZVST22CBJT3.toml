congress_website_title = "AN ACT STRENGTHENING THE ANTI-DUMPING MEASURE, AMENDING FOR THE PURPOSE SECTION THREE HUNDRED AND ONE OF THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES (P.D. NO. 1464) AS AMENDED"
congress_website_abstract = "Defines the meaning of terms, such as \"FAIR VALUE\", \"HOME CONSUMPTION PRICE\", and \"PURCHASE PRICE.\" Defines the power and functions of the Secretary of [Finance] TRADE AND INDUSTRY with regard to a prima facie case of dumping; states the factors that shall be considered in determining whether the domestic industry is being threatened with injury. Identifies who shall defray expenditures incurred in dumping cases; directs the Secre- taries of TRADE AND INDUSTRY AND FINANCE and the CHAIRMAN OF THE TARIFF COMMISSION to pro- mulgate all rules and regulations covering their respective functions. * * *"
