congress_website_abstract = "Includes, but is not limited to, jueteng, masiao, small-town lottery (STL) and daily double. Provides for these essential concerns: (1) nature and terms of franchise; (2) conditions for the grant of franchise; (3) use of earnings from the franchise; and (4) penal sanctions. * * *"
