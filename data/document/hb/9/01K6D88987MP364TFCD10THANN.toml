congress_website_abstract = "Directs agencies of the national and local governments to create a Welfare Fund to give benefits to members. Increases the tax exemption for every dependent child from P3,000 to P6,000. Converts leave credits to cash and pro- vides housing for employees. Directs the Civil Service Commission to prescribe the rules implementing this Act."

