congress_website_abstract = "Defines CORPORATION\" primarily to extend assistance in the creation, expansion and modernization of productive enterprises. States that such a corporation SHALL NOT be considered a bank, but organized in the form of a stock corporation. Provides for these concerns: (1) corporate power; (2) regulatory authority; (3) incentives for investors; (4) required vote for certain commitments."
