congress_website_title = "AN ACT ADOPTING A CIVIL SERVICE CODE OF THE PHILIPPINES AND FOR OTHER PURPOSES (change of Ctte. Referral from Civil Service to Ctte. on Revision of Laws as per j. 21, Sept. 1 & 4, 1992)"
congress_website_abstract = "Contains the following salient features: 1. shortening of the adjudication process and faster disposition of administrative cases; 2. granting government employees the right to strike under cer- tain conditions; 3. enhancement of employee welfare benefits; adoption of welfare program for retirees; 4. grant of a 3-day paternity leave to married male employees; 5. adoption of a rewards and incen- tives system; and 6. additional protection and benefits for government employ- ees. * * *"
