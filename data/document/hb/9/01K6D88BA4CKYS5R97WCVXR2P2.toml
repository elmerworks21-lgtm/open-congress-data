congress_website_title = "AN ACT PROVIDING FOR GOVERNMENT EQUITY INVESTMENT IN COUNTRYSIDE PRIVATE BANKS TO FACILITATE CREDIT FINANCING FOR RURAL DEVELOPMENT AND AGRICULTURAL EXPANSION, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"The Countryside Development Credit Financing Act\" Directs the Phil. National Bank to subscribe for and in behalf of the government to the shares of stock of any countryside private bank in an amount not exceeding 49% of the capital stock of the said bank to provide supplemental capital to the bank; defines the term \"countryside\" for this purpose."

