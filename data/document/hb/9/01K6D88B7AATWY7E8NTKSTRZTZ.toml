congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED TWO HUNDRED TWENTY-SIX, OTHERWISE KNOWN AS \"AN ACT PROHIBITING THE USE OF THE EMBLEM, OFFICIAL SEAL, AND THE NAME OF THE UNITED NATIONS FOR COMMERCIAL PURPOSES\", AND FOR OTHER PURPOSES"
congress_website_abstract = "Refers to the use of the emblem, official seal and the name of the UNITED NATIONS which is prohibited by law; seeks to increase the penalty for the violation thereof from [a fine of not more than P1,000.00 or imprisonment for not more than one (1) year] to a FINE OF NOT MORE THAN P6,000.00 or IMPRISONMENT NOT EXCEEDING SIX (6) YEARS. Empowers the SEC to cancel and revoke existing registrations of organization using the emblem, seal or name of the UN."
