congress_website_title = "AN ACT REQUIRING MANDATORY AND IMMEDIATE INVESTIGATION OF CASES OF SHOOTOUTS AND OTHER FORMS OF EXTRA-JUDICIAL KILLINGS INVOLVING POLICE OFFICERS, AGENTS OR ANY MEMBER OF THE LAW ENFORCING AGENCIES OF THE GOVERNMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Directs the Commission on Human Rights to conduct a mandatory investigation of such shootouts and killings WITHIN 24 hours from knowledge of the incident or receipt of said report. States that the Commission's investigation shall be separate and independent of any other investigation by concerned agencies. * * *"
