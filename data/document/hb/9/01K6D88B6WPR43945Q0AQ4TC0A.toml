congress_website_title = "AN ACT ALLOWING MARRIED OR LEGALLY SEPARATED WOMEN TO USE THEIR MAIDEN FIRST NAME AND SURNAME, AMENDING FOR THIS PURPOSE ARTICLE THREE HUNDRED SEVENTY AND THREE HUNDRED SEVENTY TWO OF REPUBLIC ACT NUMBERED THREE HUNDRED EIGHTY-SIX, AS AMENDED, OTHERWISE KNOWN AS THE CIVIL CODE OF THE PHILIPPINES, AND ARTICLE 63 OF EXECUTIVE ORDER 209 SERIES OF 1987 OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "States that in case of legal separation, the wife [shall] MAY EITHER continue using her name and surname employed before the separation OR USE HER MAIDEN FIRST NAME AND SURNAME; states, likewise, that the WIFE SHALL HAVE THE OPTION TO CONTINUE USINGHER NAME BEFORE THE LEGAL SEPARATION OR HER MAIDEN FIRST NAME AND SURNAME. * * *"

