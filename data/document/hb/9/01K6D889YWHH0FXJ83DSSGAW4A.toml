congress_website_title = "AN ACT PROVIDING ASSISTANCE TO WOMEN ENGAGING IN SMALL BUSINESS ENTERPRISES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Applies Philippines who are at least 18 years; provides for the grant of loans, equal to the value of the female entrepreneur's daily inventory of goods, at the rate of 6% per annum. States the other requirements for the grant of such loans; directs the Bureau of Small and Medium Business Development (DTI) to issue the implementing guidelines for this Act."
