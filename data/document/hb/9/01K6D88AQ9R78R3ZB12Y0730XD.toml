congress_website_title = "AN ACT PROVIDING BENEFITS FOR EARLY RETIREMENT AND VOLUNTARY SEPARATION FROM THE GOVERNMENT SERVICE, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Applies employees, regardless of age, who have rendered at least three (3) years of government service; excludes certain personnel. Prescribes the benefits, as well as additional benefits, under this Act; prescribes, likewise, the period of applicability and effectivity of the incentive benefits."
