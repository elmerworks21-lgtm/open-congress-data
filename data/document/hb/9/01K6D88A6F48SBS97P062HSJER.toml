congress_website_title = "AN ACT PROVIDING FOR ANTITRUST PENALTIES"
congress_website_abstract = "\"Antitrust Act of 1993\" States that every contract, combination in the form of trust or otherwise. or conspiracy, in restraint of trade among several parties or with foreign nations is declared ILLEGAL. Penalizes the violation of the preceding provision; states that any person injured in his business by reason of the violation of this Act may sue and shall recover three-fold the damages sustained by him and the cost of the suit."

