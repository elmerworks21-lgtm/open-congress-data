congress_website_title = "AN ACT PRESCRIBING CERTAIN MEASURES NECESSARY AND PROPER TO EFFECTIVELY AND DECISIVELY ADDRESS THE ENERGY SHORTAGE"
congress_website_abstract = "\"Energy Crisis Act\" States those laws that are declared SUSPENDED for a period of one (1) year from the effectivity of this Act. Imposes a SURCHARGE ON POWER RATES at the rate of 200% per kilowatt hour in excess of 500 kw hours; empowers the President to reorganize the National Power Corporation."
