congress_website_title = "AN ACT AMENDING TITLE IV AND SECTIONS 237 AND 238 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED (Prepares amendments designed to widen the tax base of the VAT and enhance its administration)"
congress_website_abstract = "Proposes several amendments designed to WIDEN THE TAX BASE OF THE VAT and enhance its administration, such as: (1) subjecting owners of cinematographic films to the VAT; (2) lifting the VAT exemption on services rendered by actors, actresses and professional athletes; and (3) adoption of a single method in computing the VAT."
