congress_website_title = "AN ACT PROVIDING THAT ALL CRIMINAL CASES SHALL BE TERMINATED AND DECIDED BY THE TRIAL COURTS WITHIN SPECIFIC PERIODS"
congress_website_abstract = "Aims to clear criminal dockets by speedy disposition of cases by requiring trial courts to terminate cases as follows: (1) capital offenses -- within one (1) year; (2) noncapital grave offenses -- within 8 months (3) light offenses -- within 4 months; and (4) a plea of guilty -- within 15 days. * * *"

