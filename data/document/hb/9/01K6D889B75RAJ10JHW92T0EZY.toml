congress_website_title = "AN ACT DEFINING THE CRIME OF NON-COOPERATION OR CONCEALMENT OF KIDNAPPING FOR RANSOM AND PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Concealment of Kidnapping for Ransom Act\" Defines the crime of concealment and/or noncooperation in such cases as the refusal or failure of the victim's families/repres entatives to report (1) any information regarding identity, vehicles used;address, safehouse, etc. of the kidnappers; (2) proposals for payment of ransom; (3) development or progress in the negotiations with the kidnappers, etc. Provides for these concerns: (1) penalties (2) special mitigating circumstances; (3) protection and assistance to kidnap victims. * * *"

