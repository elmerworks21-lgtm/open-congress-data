congress_website_title = "AN ACT GRANTING INCENTIVE TO THE SHIPBUILDING AND SHIP REPAIR INDUSTRY AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides shipbuilding registered with the Maritime Industry Authority: (1) exemption form import duties and taxes; (2) exemption from value-added tax. Provides, likewise, a tax relief period for shipbuilders and ship repairers, depending on the size of their fixed capital investment."
