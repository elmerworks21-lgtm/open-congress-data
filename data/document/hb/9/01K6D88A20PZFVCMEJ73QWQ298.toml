congress_website_title = "AN ACT CREATING A SPECIAL COURT TO BE KNOWN AS 'THE NEW PEOPLE'S COURT,' PROVIDING FOR ITS JURISDICTION, AND FOR OTHER PURPOSES"
congress_website_abstract = "States that the proposed COURT shall exercise exclusive original jurisdiction over all cases involving ILL-GOTTEN, ACQUIRED, APPROPRIATED or UNEXPLAINED WEALTH by public officials, employees, their nominees, dummies, agents, subordinates and other business associates, amassed or acquired BEFORE AND AFTER FEBRUARY 25, 1986."

