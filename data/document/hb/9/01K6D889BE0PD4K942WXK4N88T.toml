congress_website_title = "AN ACT INTEGRATING ALL ENERGY AGENCIES AND ACTIVITIES OF GOVERNMENT UNDER A DEPARTMENT OF ENERGY, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Energy Integration and Development Act of 1992\" Creates the Department of Energy and thereby authorizes the transfer of powers, functions, appropriations, rights, obligations, assets, liabilities, records, equipment, property and personnel of the Office of Energy Affairs and all other agencies or government units whose func- tions and powers have been assumed by the Depart- ment. * * *"
