congress_website_title = "AN ACT PROVIDING FOR THE LEGAL FRAMEWORK AND MECHANISMS FOR THE CREATION, OPERATION, ADMINISTRATION , AND COORDINATION OF SPECIAL ECONOMIC ZONES IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Special Economic Zone Act of 1993\" Seeks primarily to \"transform selected areas in the country into highly developed, geographically dispersed agro-industrial , commercial, banking and financial centers, where highly trained workers and efficient services will be available to commercial enterprises.\" Prescribes the criteria for the establishment of an ECOZONE; declares the ECOZONE as a separate customs territory and free port; provides the governing structures, powers and functions of the ECOZONE Authority and the Administrator. * * *"
