congress_website_title = "AN ACT GRANTING REASONABLE ALLOWANCE AND BENEFITS TO VOLUNTEER BARANGAY HEALTH WORKERS AND APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Barangay Health Workers Incentives and Benefits Act of 1994\" Provides said workers free legal services to in connection with their work, as well as free hospitlaization , laboratory tests and treatment for illnesses. Provides, likewise, second grade eligibility to those who render five (5) years of continuous service as barangay health worker."
