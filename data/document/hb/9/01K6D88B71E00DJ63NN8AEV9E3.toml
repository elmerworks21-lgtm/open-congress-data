congress_website_abstract = "\"Law Introducing Legal and Procedural Reforms in the Electoral System\"; contains provisions that will institute reforms on importantproced ures and requirements provided in existing laws, thereby strengthening the electoral system, such as on : (1)accreditation of political parties; (2) contributions received and expenditures; (3) distribution of ballots; (4) canvass of returns; (3) preparation of cartificates, etc."

