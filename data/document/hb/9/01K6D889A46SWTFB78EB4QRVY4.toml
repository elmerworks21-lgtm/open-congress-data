congress_website_title = "AN ACT INCREASING THE MONTHLY PENSION OF GOVERNMENT RETIREES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Increases government retirees who are receiving pensions of P250.00 or P400.00 under the provisions of retirement laws to ONE THOUSAND PESOS (P1,000.00) per month. Directs the President and General Manager of the Government Service Insurance System (GSIS) to adopt a scheme whereby increases of such pensions be made at least once every two (2) years, taking into account the current peso value and the total amount of pension received."
