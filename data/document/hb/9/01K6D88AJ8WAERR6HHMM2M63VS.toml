congress_website_title = "AN ACT PROVIDING INCENTIVES FOR THE VOLUNTARY DIVESTMENT OF FOREIGN EQUITY AND INVESTMENT OF ALL CORPORATIONS DOING BUSINESS IN THE PHILIPPINES WITH FOREIGN EQUITY AND INVESTMENT, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SEVENTY FORTY-TWO (RA7042), OTHERWISE KNOWN AS THE FOREIGN INVESTMENTS ACT OF 1991"
congress_website_abstract = "Provides mandatory divestment of foreign equity: (1) a guarantee for any price differential which cannot be shouldered by the Filipino counterpart; (2) prioritization in the availment of loans for government financial institutions; and (3) exemption from taxes of all divestment transactions."

