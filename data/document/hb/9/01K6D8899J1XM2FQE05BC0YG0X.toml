congress_website_title = "AN ACT PROVIDING FOR THE MASSIVE REHABILITATION OF PHILIPPINE FORESTS FOR A PERIOD OF TEN (10) YEARS"
congress_website_abstract = "\"Forest Rehabilitation Act of 1991\" Seeks to undertake a massive 10-year rehabilitation of the State's forest ecosystem. Provides for these areas of concern: (1) inventory of forest products in transit; (2) deputation of forest officers. (3) funding and scope of reforestation; and (4) sanctions against officers and employees. * * *"
