congress_website_title = "AN ACT REORGANIZING PAGASA IN ORDER TO FURTHER STRENGTHEN AND ENHANCE ITS CAPABILITY FOR THE MITIGATION OF THE EFFECTS OF NATURAL CALAMITIES CAUSED BY TYPHOONS AND OTHER SEVERE ATMOSPHERIC, GEOPHYSICAL AND SPACE PHENOMENA AND FOR OTHER PURPOSES, BYFURTHER AMENDING PRESIDENTIAL DECREES NO. 78, DATED DECEMBER 9, 1972 AS AMENDED BY P.D. 1149 AND P.D. 1753"
congress_website_abstract = "Authorizes the PAG-ASA to modernize existing meteorological, geophysical, astronomical and space monitoring facilities and to draw up a scientific program that will straighten its weather modification, typhoon moderation and natural disaster reduction research and development capability. Directs further the PAG-ASA to establish an INDEPENDENT METEOROLOGICAL TELECOMMUNICATI ONS, as well as radio stations to disseminate related information. * * *"
