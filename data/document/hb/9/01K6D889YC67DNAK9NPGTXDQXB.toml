congress_website_title = "AN ACT AMENDING SECTION 31 OF PRESIDENTIAL DECREE NO. 1177 SO AS TO PROVIDE FOR AUTOMATIC APPROPRIATIONS ONLY FOR DEBTS AND GOVERNMENT GUARANTEES WHICH HAVE BEEN DULY APPROVED BY CONGRESS, PROVIDING PROCEDURES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates agreements with government guarantees shall be presented Congress and shall be deemed not consummated until after these have been duly approved. Mandates, further, that any foreign debt and/or government guarantee contract not presented to Congress for approval shall be deemed null and void."

