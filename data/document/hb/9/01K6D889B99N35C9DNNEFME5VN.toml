congress_website_title = "AN ACT DEFINING AND GUARANTEEING PUBLIC SECTOR UNIONISM IN THE PHILIPPINES, AMENDING FOR THE PURPOSE ARTICLE 244 OF PRESIDENTIAL DECREE NUMBERED FOUR HUNDRED AND FORTY TWO, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Public Sector Unionism Act of 1992\" Grants government employees the right to strike and to collectively bargain. Exempts, however, the following services from coverage of this Act: (1) AFP; (2) PNP; (3) civil defense agencies; (4) Civil Aeronau-tics Administration; (5) national security and health agencies. Spells out clearly the limitations of such strikes by government employees. * * *"

