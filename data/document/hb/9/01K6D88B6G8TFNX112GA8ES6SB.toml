congress_website_title = "AN ACT ESTABLISHING A WOMEN'S CRISIS CENTER IN EACH CONGRESSIONAL DISTRICT, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to attend to the needs of marginalized and disadvantaged women, aged 18 to 59 years, who are victims of involuntary or forced prostitution, of sexual abuse, battered and abused women victims of illegal recruitment, and women in detention; prescribes the various services to be rendered by the Center; provides, likewise, a program for rehabilitation, development and protection of women. * * *"

