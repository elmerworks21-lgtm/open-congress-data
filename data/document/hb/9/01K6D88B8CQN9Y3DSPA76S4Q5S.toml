congress_website_title = "AN ACT PRESCRIBING URGENT RELATED MEASURES NECESSARY AND PROPER TO EFFECTIVELY ADDRESS THE WATER CRISIS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Water Crisis Act of 1995\" Allows the President to enter into negotiated contracts for the construction, repair, rehabilitation, improvement or maintenance of waterworks systems, projects and facilities. Prescribes the requirement for such contracts. Empowers the President to REORGANIZE the MWSS and the LWUA, including local water districts formed by the LWUA; states that this authority shall be for a period of three (3) years from the effectivity of this Act."
