congress_website_title = "AN ACT INSTITUTING INCOME SECURITY FOR WORKERS BY PROVIDING THEM UNEMPLOYMENT BENEFITS IN CASE OF INVOLUNTARY UNEMPLOYMENT CONTINGENCIES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Covers worker members of the SSS and the GSIS for the past five (5) years or those who have contributed a minimum of sixty (60) monthly contributions prior to dismissal, separation or termination from service. Provides for these concerns: (1)unemployment benefit and qualifications ; (2) reporting requirement; and (3) penalty for violation. * * *"
