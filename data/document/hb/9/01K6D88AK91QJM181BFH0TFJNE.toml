congress_website_abstract = "\"AIDS Control Act of 1993\" Declares it the responsibility of the Dept. of Health to formulate and operate a program for the control of AIDS. Provides for these concerns: (2) Requirement on Donation or Sale of Blood, Tissue or Organ; (2) MarriageRequirement; (3) AIDS and HIV Tag; (4) Deportation of Infected Aliens; (5) Special Protection of Health Workers, etc. Provides penalty for violation of this Act. * * *"

