congress_website_abstract = "\"MTRCB Reorganization Act of 1994\" Contains these salient features: (1) Increases the Board Composition from [32] to 37; (2) Recommends a Staggered term of office for the Board officials; (3) Provides representation of society's various sectors; (4)Sets a standardized compensation package for its officers and employees."

