congress_website_title = "AN ACT ABOLISHING THE PRESIDENTIAL COMMISSION ON GOOD GOVERNMENT AND TRANSFERRING ITS POWERS AND FUNCTIONS TO THE DEPARTMENT OF JUSTICE AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides a 30-day transition period during which the PCGG shall continue in a hold-over capacity until further orders from the Secretary of Justice. Provides further that trial of sequestration cases shall be terminated within three (3) yearsfrom the date of the approval of this Act. Delineates the rights of registered owners of sequestered properties and those of the government. * * *"
