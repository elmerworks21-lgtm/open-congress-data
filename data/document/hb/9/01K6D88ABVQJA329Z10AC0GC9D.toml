congress_website_abstract = "\"Career Executive Service (CES) Testimonial Eligibility Act\" Applies to the following CES positions: Those appointed (1) before the Feb. 1986 EDSA People Power Movement; (2) early during Pres. Aquino's reorganization; (3) after Pres. Aquino's reorganization; (4) by the President from July 1, 1992 to date; and (5) who shall be appointed by the President thereafter from within the career service. * * *"
