congress_website_abstract = "\"Philippine Center for Non-Formal Educa- tion Act of 1992\" Seeks to elevate nonformal education to the level of importance as that of formal education. Creates the Philippine Center for Non- Formal Education, out of the existing programs, assets and resources of the University of Life Complex, Pasig, Metro Manila, and the University of Life Foundation, Inc. States the specific functions of the Center. * * *"

