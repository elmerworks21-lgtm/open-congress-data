congress_website_abstract = "\"Farm Machineries Manufacturing Program (EMMP) Act of 1995\"; states the following objectives of the EMMP: (1) development of a viable farm machineries manufacturing industry; (2) technology transfer and development; (3) employment generation; (4) toprovide a reasonable consumer price of farm machineries; and (5) foreign exchange savings and earnings."

