congress_website_title = "AN ACT ESTABLISHING THE JUDICIAL ACADEMY OF THE PHILIPPINES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "States that within six (6) months approval of this Act, a JUDICIAL ACADEMY OF THE PHILIPPINES shall be established, to be administered by the UP Law Center. States that the Academy shall provide specialized legal education in the formof seminars and workshops for incumbent judges; requires all members of the judiciary to undergo an annual seminar of not more than seven (7) days. * * *"
