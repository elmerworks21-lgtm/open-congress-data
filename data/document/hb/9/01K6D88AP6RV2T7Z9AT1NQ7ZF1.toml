congress_website_title = "AN ACT STRENGTHENING THE PHILIPPINE COCONUT AUTHORITY, INCREASING THE SMALL COCONUT FARMERS' PARTICIPATION IN, AND THEIR BENEFITS FROM, THE COCONUT INDUSTRY, AND BOLSTERING THE INDUSTRY'S DEVELOPMENT, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED FOURTEEN HUNDRED AND SIXTY-EIGHT, AS AMENDED, OTHERWISE KNOWN AS THE REVISED COCONUT INDUSTRY CODE"
congress_website_abstract = "Declares the SMALL COCONUT FARMERS, TILLERS, WORKERS AND OWNER-CULTIVATO RS of the coconut industry as direct participants in its development and growth. Encourages the formation of INDEPENDENT ORGANIZATIONS FREE FROM DOMINANCE OR PATERNALISM BY GOVERNMENT, LANDLORDS OR OTHER INDIVIDUALS OR GROUPS. Prescribes the composition of the governing board of the Phil. Coconut Authority; outlines the assistance program for small coconut farmers; provides for a COCONUT INDUSTRY REHABILITATIONAND DEVELOPMENT FUND. * * *"

