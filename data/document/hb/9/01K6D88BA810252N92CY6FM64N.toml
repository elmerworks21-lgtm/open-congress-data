congress_website_title = "AN ACT TO AMEND SECTIONS 27, 29 AND 30 OF BATAS PAMBANSA BILANG 129, OTHERWISE KNOWN AS THE JUDICIARY REORGANIZATION ACT OF 1980 (Increases the number of the Metropolitan Trial Courts of the National Capital Region)"
congress_website_abstract = "States that the Metropolitan Trial Courts of the National Capital Region shall be composed of ONE HUNDRED SEVENTY-FIVE BRANCHES; states, further, that in every city not part of the Metropolitan areas, there shall be AT LEAST TWO (2) BRANCHES OF MUNICIPAL TRIAL COURTS."

