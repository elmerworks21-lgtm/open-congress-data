congress_website_title = "ACT TO PROVIDE A COMPREHENSIVE PROGRAM AGAINST WIFE BEATING, INCREASING PENALTIES FOR HABITUAL OFFENDERS THEREOF, AND FOR OTHER PURPOSES (Battered women)"
congress_website_abstract = "Defines the meaning of the term \"HABITUAL WIFE BEATING\"; prescribes the three (3) options open to a wife who is a victim of habitual wife beating, as well as her rights and privileges. States the penalty imposable on a husband found guilty of habitual wife beating. * * *"
