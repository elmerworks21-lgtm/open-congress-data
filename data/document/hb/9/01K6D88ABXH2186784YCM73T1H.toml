congress_website_title = "AN ACT PROVIDING FOR THE PREVENTION AND CONTROL OF THE SPREAD OF THE HUMAN IMMUNODEFICIENC Y VIRUS (HIV) AND ACQUIRED IMMUNE DEFICIENCY SYNDROME (AIDS), PRESCRIBING PENALTIES FOR VIOLATION THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"AIDS Control Act of 1993\" Provides for the creation of PREVENTION AND CONTROL DIVISION in the Dept. of Health; prescribes the powers and duties of the Division. Provides, likewise, for these related concerns: (1) information dissemination campaign on AIDS; (2) regulation on the issuance of working permits to hospitality girls; (3) establishment of a Central AIDS Registry; (4) regulation of blood banks; and (5) penalties for violation of the provisions of this Act. * * *"

