congress_website_title = "AN ACT AMENDING ARTICLE 248(e) OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AND FOR OTHER PURPOSES (Affiliation of members of religious sects in any labor organization)"
congress_website_abstract = "Seeks to restore in the Labor Law following portion of the Industrial Peace Act which accords the guarantee of the constitutional right to freedom of religion: \"It shall be unfair labor practice for an employer ... to discriminate in regard to hire ... or discourage membership in any labor organization ... but SUCH AGREEMENT SHALL NOT COVER MEMBERS OF ANY RELIGIOUS SECTS WHICH PROHIBIT AFFILIATION OF THEIR MEMBERS IN ANY SUCH LABOR ORGANIZATION.\" * * *"
