congress_website_title = "AN ACT PROVIDING FOR AUTOMATIC PROMOTION OF GOVERNMENT OFFICIALS AND EMPLOYEES UPON RETIREMENT FROM THE GOVERNMENT SERVICE AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates that --- : \"Section 1. Automatic Promotion.- All government officials and employees who are eligible for compulsory retirement shall be granted automatic promotion equivalent to one grade level higher than his position at the time ofretirement. For this purpose, the adjusted salary grade level of the retiree shall be used as basis for the computation of his retirement benefits.\" * * *"

