congress_website_title = "AN ACT IMPOSING A TAX ON THE SALE OF SHARES OF STOCK LISTED AND TRADED THROUGH THE LOCAL STOCK EXCHANGE, AMENDING FOR THE PURPOSE THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, BY INSERTING A NEW SECTION AND REPEALING CERTAIN SUBSECTIONS THEREOF (Stock Transaction Tax)"
congress_website_abstract = "Declares that --- \"SEC. 124-A. LEVIED, ASSESSED AND COLLECTED ON EVERY SALE, BARTER, EXCHANGE, OR OTHER DISPOSITION OF SHARES OF STOCK LISTED AND TRADED THROUGH THE LOCAL STOCK EXCHANGE A TAX EQUIVALENT TO ONE HALF OF ONE PERCENT (1/2 OF1%) OF THE GROSS SELLING PRICE OR GROSS VALUE IN MONEY OF THE SHARES OF STOCK SOLD, BARTERED, EXCHANGED OR OTHERWISE DISPOSED WHICH SHALL BE PAID BY THE SELLER OR TRANSFEROR: PROVIDED, HOWEVER, THAT ANY GAIN DERIVED FROM THE SALE, BARTER, EXCHANGE OR OTHER DISPOSITION OF SUCH SHARES OF STOCK SHALL BE EXEMPT FROM THE TAX IMPOSED IN SECTION 21(d), 24(e)(2), 25(a)(6)(C), AND 25(b)(5)(C) OF THIS CODE: PROVIDED, FURTHER, THAT SUCH GAIN SHALL LIKEWISE BE EXEMPT FROM THE REGULAR INDIVIDUUAL OR CORPORATE INCOME TAX IMPOSED BY THIS CODE: PROVIDED, FINALLY, THAT THE SELLER OR TRANSFEROR SHALL FILE THE TAX RETURN AND PAY THE TAX THEREON WITHIN THIRTY (30) DAYS FROM DATE OF SALE OF TRANSFER OF SUCH SHARES OF STOCK.\" * * *"
