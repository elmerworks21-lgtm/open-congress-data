congress_website_title = "AN ACT TO PREVENT THE SPREAD OF ACQUIRED IMMUNITY DEFICIENCY SYNDROME (AIDS), PROVIDING FOR ITS VIOLATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"AIDS PREVENTION ACT OF 1994\" Contains these provisions: (1) requirements of an AIDS clearance certificate from persons entering the country to work or as a tourist; (2) AIDS testing for expatriates, tourists and workers; and (3) deportation for person found violating this Act."

