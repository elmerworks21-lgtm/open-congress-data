congress_website_title = "AN ACT FURTHER AMENDING PRESIDENTIAL DECREE NO. 1869, AS AMENDED, RELATIVE TO THE CAPITALIZATION, THE BOARD OF DIRECTORS AND THE DISTRIBUTION OF GROSS REVENUES OF THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION (PAGCOR)"
congress_website_abstract = "States that the capital stock of PAGCOR shall be ONE BILLION PESOS (P1 B), to be fully subscribed by the Government of the Republic of the Philippines. Proposes amendments to certain provisions of PD 1869, the PACGOR Charter, such as on: (1)the Board of Directors; and (2) the distribution of gross earnings."

