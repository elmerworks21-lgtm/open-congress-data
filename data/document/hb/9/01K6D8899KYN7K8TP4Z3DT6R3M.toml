congress_website_title = "AN ACT IMPOSING TEN PERCENT (10%) TAX ON THE VALUE OF COMMERCIAL OR BUSINESS ADVERTISEMENTS IN RADIO, TELEVISIONS, NEWSPAPERS, MAGAZINES AND THE LIKES AND FOR SUCH OTHER PURPOSES"
congress_website_abstract = "Defines \"COMMERCIAL OR BUSINESS ADVERTISEMENTS. \" Imposes a tax of ten percent (10%) against all advertisers on the cost or value of all commercial or business advertisements through television, radio, newspaper, magazines and the like. Exempts advertisements by the government and legal notices not intended as commercial or business advertisements from the coverage of this Act."

