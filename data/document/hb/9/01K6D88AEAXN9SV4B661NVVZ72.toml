congress_website_title = "AN ACT CREATING THE CORPORATE HOUSING AUTHORITY, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR, GRANTING PRIVILEGES, AMENDING SECTION SIXTY FIVE (65) OF REPUBLIC ACT NUMBER SIX THOUSAND SIX HUNDRED FIFTY-SEVEN (6657) OTHERWISE KNOWN AS THE 'COMPREHENSIVE AGRARIAN REFORM LAW OF THE YEAR ONE THOUSAND NINE HUNDRED EIGHTY-EIGHT (1988)' AND CERTAIN PORTIONS OF REPUBLIC ACT NUMBER SIX THOUSAND EIGHT HUNDRED FORTY-SIX (6846) OTHEWISE KNOWN AS THE 'SOCIAL HOUSING SUPPORT FUND ACT', AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Corporate Housing Act of 1993\" Designates the proposed CORPORATE HOUSING AUTHORITY as the sole entity to undertake low- cost subdivision housing development among corporations. Defines \"CORPORATE HOUSING\" under this Act; states the conditions for mandating corporations to institute a subdivision housing development program. Seeks to remove the legal impediments that hinder the execution of the shelter program. * * *"

