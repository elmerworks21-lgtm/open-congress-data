congress_website_title = "AN ACT CREATING CRIMINAL TAX COURTS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes to create CRIMINAL TAX COURTS with the same level as the Sandiganbayan and possessing all the inherent powers of a court of justice. Proposes to establish said Courts in Luzon, Visayas and Mindanao, specifically in Metropolitan Manila, Cebu and Davao City; prescribes the composition and jurisdiction of these Courts. * * *"

