congress_website_abstract = "\"Children's Television Act of 1993\" Seeks to enhance the education of children; considers the sectoral needs and conditions in the development of educational policies and programs. Establishes the NCET or National Council for Children's Educational Television which is tasked primarily to review and classify children's TV programs; prescribes other functions of the NCET. * * *"
