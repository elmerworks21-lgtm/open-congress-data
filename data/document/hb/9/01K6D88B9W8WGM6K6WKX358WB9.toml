congress_website_title = "AN ACT ADJUSTING THE RETIREMENT PAY OF MEMBERS OF THE GOVERNMENT SERVICE INSURANCE SYSTEM (GSIS) AND OF THE SOCIAL SECURITY SYSTEM (SSS)"
congress_website_abstract = "States that the retirement pay of all RETIRED GSIS and SSS members shall be adjusted EVERY YEAR in proportion to the buying power of the Philippine peso, but not lower than ten percent (10%) of the rate of pay during the preceding year."

