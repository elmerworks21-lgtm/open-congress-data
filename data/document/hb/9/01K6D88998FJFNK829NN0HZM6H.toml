congress_website_title = "AN ACT PROVIDING BENEFITS FOR EARLY RETIREMENT AND VOLUNTARY SEPARATION FROM THE GOVERNMENT SERVICE, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Applies to all regular and employees appointed to permanent positions, regardless of age, who have rendered service for three (3) consecutive years. Offers the following benefits: (1) One and one-fourth-mont h salary for every year of service for less than 20 years of service; (2) One and one-half-month salary for every year of service for 20 years of service; and (3) Return of GSIS personal contri- butions on retirement only and the corresponding share of the government with interest. * * *"
