congress_website_title = "AN ACT AMENDING SECTION 39 OF REPUBLIC ACT 7077 SO AS TO INCLUDE ON AN OPTIONAL BASIS, A VOLUNTARY CIVIC WORK OR COMMUNITY IMMERSION AS PART OF BASIC ROTC AND/OR CITIZEN MILITARY TRAINING"
congress_website_abstract = "States that --- \"THE TWO YEARS BASIC ROTC SHALL INCLUDE A MAXIMUM OF ONE (1) ACADEMIC YEAR FOR VOLUNTARY CIVIC WORK AT THE OPTION OF A STUDENT, AND A MINIMUM OF ONE (1) ACADEMIC YEAR FOR THE MILITARY TRAINING COMPONENT. SAID CIVIC WORK SHALLNOT EXCEED 50% OF THE NECESSARY BASIC ROTC TRAINING PERIOD.\" * * *"

