congress_website_title = "AN ACT AWARDING TO VICTIMS OF CRIMES DEPICTED IN A MOVIE, BOOK, NEWSPAPER, MAGAZINE, RADIO OR TELEVISION PRODUCTION OR LIVE ENTERTAINMENT, OF ANY KIND, OR ANY OTHER FORM OF COMMERCIAL EXHIBITION, THE PROCEEDS DUE TO THE CRIMINAL WHOSE STORY OF THE COMMISSION OF A CRIME OR CRIMES IS DEPICTED IN SAID EXHIBITION, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7309 AND INVALIDATING PARAGRAPH 3, SECTION 9 THEREOF"
