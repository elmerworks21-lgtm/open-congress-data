congress_website_abstract = "Tasks the newly reorganized NBI to integrate, undertake, and considerate all activities and programs relating to investigative services. States that appointments to positions in the different investigative divisions of the NBI be limited to membersof the Phil. Bar and/or Certified Public Accountants."
