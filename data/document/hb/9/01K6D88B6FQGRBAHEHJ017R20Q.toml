congress_website_title = "AN ACT PROHIBITING THE MANUFACTURE, DISTRIBUTION OR USE OF NON-BIODEGRADAB LE PLASTIC BAGS AND OTHER NON-BIODEGRADAB LE MATERIALS AS PACKAGING, CONTAINERS OR WRAPPERS FOR ANY CONSUMER PRODUCT AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Explains \"NONBIODEGRADAB LE MATERIALS\" as those referring to inorganic materials with chemical and physical properties which prevent them from being immediately decomposed; penalizes the person found guilty of violating this Act with six (6) monthsto two (2) years imprisonment, or a fine of P50,000.00 to P200,000.00; gives the concerned corporations or person one (1) year from effectivity of this Act to stop the production, distribution or use of nonbiodegradabl e materials. * * *"

