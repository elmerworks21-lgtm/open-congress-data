congress_website_title = "AN ACT AMENDING SECTION 68, ARTICLE IX OF BATAS PAMBANSA BILANG 881, AS AMENDED, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES, BY PROVIDING THE COMMISSION ON ELECTIONS WITH ADDITIONAL MECHANISMS TO CHECK THE REAL CITIZENSHIP OF CANDIDATES FOR ELECTIVE OFFICE"
congress_website_abstract = "Proposes included in Section 68 of the Omnibus Election Code: \"BEFORE, UPON OR AFTER THE FILING OF HIS CERTIFICATE OF CANDIDACY, THE DEPARTMENT OF FOREIGN AFFAIRS, THE COMMISSION ON IMMIGRATION AND DEPORTATION, OR THE OFFICE OF THE SOLICITOR-GENER AL, MOTU PROPIO, OR AT THE FORMAL AND WRITTEN REQUEST OF THE CHAIRMAN OF THE COMMISSION, SHALL FURNISH AND CAUSE TO BE FURNISHED THE NECESSARY PAPERS AND DOCUMENTS TO ESTABLISH THE REAL CITIZENSHIP OF THE PERSON SEEKING TO BECOME ACANDIDATE FOR AN ELECTIVE PUBLIC OFFICE.\""
