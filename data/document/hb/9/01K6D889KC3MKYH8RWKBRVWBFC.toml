congress_website_title = "AN ACT PROVIDING FOR THE REWRITING OF PHILIPPINE HISTORY, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED FORTY-THREE HUNDRED AND SIXTY EIGHT"
congress_website_abstract = "Directs the National Historical Commission to REWRITE Philippine history by GIVING EMPHASIS on national heroes WHO EXERTED MUCH EFFORT TO ATTAIN INDEPENDENCE AND NATIONALISM FREE FROM FOREIGN SUPPORT. Directs the Commission, likewise, to MAKE ACRITICAL EVALUATION OF PHILIPPINE PRESIDENTS SO THAT THOSE WHO HAVE DONE MORE HARM THAN GOOD BE STRICKEN OFF FROM PUBLIC ADULATION."

