congress_website_title = "AN ACT STRENGTHENING FURTHER THE DISTRIBUTION AND PAYMENT OF THE SERVICE CHARGES IN FAVOR OF THE WORKERS BY PROVIDING PENAL SANCTIONS FOR VIOLATIONS THEREFOR AMENDING FOR THIS PURPOSE ARTICLE 96 OF THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Provides these penalties for violation of this proposed measure: (1) a fine not exceeding P25,000.00; and imprisonment of not less than one (1) year, but not more than five (5) years. Excludes, likewise, the convicted offender from entitlement to the benefit of the Probation Law."

