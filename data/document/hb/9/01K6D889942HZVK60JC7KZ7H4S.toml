congress_website_title = "AN ACT DEFINING THE SOURCES AND USES OF THE OIL PRICE STABILIZATION FUND, SETTING ITS MAXIMUM AND MINIMUM LEVELS, AND PROVIDING FOR AN AUTOMATIC PRICE ADJUSTMENT MECHANISM FOR THE PRICE-REGULATED REFINED PETROLEUM PRODUCTS, AMENDING FOR THE PURPOSEPRESIDENTIAL DECREE NUMBERED NINETEEN HUNDRED FIFTY-SIX, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines the sources and uses of the Fund, such as from ANY DECREASE IN THE INDUSTRY AVERAGE PESO LANDED COST OF CRUDE OIL FROM THE REFERENCE PESO LANDED COST OF CRUDE OIL AS LAST FIXED BY THE ERB. Provides for an automatic price adjustment mechanism for the price-regulated refined petroleum products; seeks to minimize political intervention in oil price adjustment deci- sions."

