congress_website_title = "AN ACT INCREASING THE MINIMUM WAGE OF HOUSEHELPERS, AMENDING FOR THIS PURPOSE ARTICLE 143 OF P.D. NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes the following minimum wage rates for househelpers: (1) P750.00 --- for househelpers in highly urbanized cities and municipalities, like Manila, Quezon, Pasay, Navotas, San Juan, etc.; (2) P600.00 --- in other chartered and first-class munic- ipalities; (3) P500.00 --- in other municipalities."
