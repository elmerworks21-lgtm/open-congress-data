congress_website_abstract = "Declares the following as HEINOUS crimes: treason; murder; parricide; rape under certain specified circumstances; kidnaping and serious illegal detention under certain circumstances; robbery under certain circumstances; piracy; carnapping under certain circumstances; hijack- ing of an airship. Includes (1) importation of prohibited drugs; (2) sale, administration, delivery, distribution and transportation of prohibited drugs; (3) manufacture of prohibited drugs; (4) maintenance of a den, dive or resort for pro- hibited drugs. * * *"

