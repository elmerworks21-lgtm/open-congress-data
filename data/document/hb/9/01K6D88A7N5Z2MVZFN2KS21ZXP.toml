congress_website_abstract = "Applies to all taxi operators and drivers as accredited and certified by the DOTC. States the incentives under this Act, such as the privilege to import tax-free surplus or brand new engines. Provides for a master plan which includes, among others, the (1) phaseout of dilapidated taxis and (2) a compensation system for taxi drivers. * * *"

