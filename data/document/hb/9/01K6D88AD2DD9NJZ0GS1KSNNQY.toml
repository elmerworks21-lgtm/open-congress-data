congress_website_title = "AN ACT AMENDING SECTION 5, 10 AND 11 OF REPUBLIC ACT 6948 (\"Veterans Act of 1993\" allows a veterans who reaches the age of 70 to be automatically eligible for TOTAL DISABILITY BENEFITS)"
congress_website_abstract = "\"Veterans Act of 1993\" States that a veteran who reaches the age of SEVENTY (70) WILL BE AUTOMATICALLY ELIGIBLE FOR TOTAL DISABILITY BENEFITS, including his spouse and unmarried minor children. Entitles the veteran's surviving spouse to a monthlypension worth [P500.00] ONE THOUSAND PESOS (P1,000.00); entitles the veteran who reaches the age of 65 to a monthly old-age pension of [P500.00] ONE THOUSAND PESOS. * * *"
