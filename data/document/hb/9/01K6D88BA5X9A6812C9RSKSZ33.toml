congress_website_title = "AN ACT TO PROMOTE AND DEVELOP THE SEED INDUSTRIES OF THE PHILIPPINES, AND TO INSURE THE AVAILABILITY OF HIGH QUALITY SEEDS OF SUPERIOR CROP VARIETIES FOR NATIONAL AGRICULTURAL PRODUCTION"
congress_website_abstract = "\"Philippine Seed Act\" Tasks the Bureau of Plant Industry with the supervision and control of the production and testing of seeds; provides for seed quality control; creates the SEED CERTIFICATION AND QUALITY CONTROL DIVISION to solely supervise andcontrol seed testing laboratories; prescribes the duties and functions of the Division."

