congress_website_title = "AN ACT PROVIDING FOR UNIFORM TAXATION SYSTEM FOR THE HORSE RACING INDUSTRY TO INCREASE THE REVENUE-EARNING POTENTIAL OF THE GOVERNMENT EMPLOYMENT GENERATION OF THE HORSERACING INDUSTRY"
congress_website_abstract = "\"Horse Racing Revenue Act of 1995\" Proposes a uniform and singular tax system for the horse racing industry through the imposition of one (1) racing tax on betting tickets at the rate off 8% for every one-peso ticket or a fraction thereof; authorizes the importation of horses for racing purposes for a period of five (5) years from effectivity of this Act."

