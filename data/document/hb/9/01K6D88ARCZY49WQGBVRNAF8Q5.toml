congress_website_title = "AN ACT REGULATING HARBOR PILOTAGE SERVICES AND THE CONDUCT OF HARBOR PILOTS IN ALL PORTS IN THE PHILIPPINES AND FOR RELATED PURPOSES"
congress_website_abstract = "\"Pilotage Service Act of 1993\" Defines \"PILOTAGE SERVICE\" as the act of conducting/mane uvering a vessel to/from berth to anchorage. Seeks to ensure efficient pilotage service at all times; provides for (1) establishment of pilotage districts nationwide;(2) accreditation of harbor pilots; (3) establishment of a pilots' organization; (4) penalties for violation of any provision of this Act. * * *"

