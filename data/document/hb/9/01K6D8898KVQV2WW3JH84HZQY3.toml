congress_website_title = "AN ACT PROVIDING FOR LONG-TERM LEASE OF PRIVATE LANDS TO FOREIGN INVESTORS"
congress_website_abstract = "\"Long-Term Lease Act of 1992\" Grants a long-term lease on private lands to foreign investors for the purposes of put- ting up industrial estate facilities, assembly or processing plants, agri-business enter- prises, mass housing and land development, and or other priority productive endeavors. Increases the maximum leasehold period from twenty-five (25) to fifty (50) years, renewable for another forty-nine (49) years. * * *"
