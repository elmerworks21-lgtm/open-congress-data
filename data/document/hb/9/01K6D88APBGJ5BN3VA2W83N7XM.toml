congress_website_title = "AN ACT TO PROVIDE A UNIFORM MANDATORY PERIOD FOR PRELIMINARY INVESTIGATION"
congress_website_abstract = "States that preliminary investigation shall be conducted and terminated within a period of FIFTEEN (15) DAYS upon receipt by the investigating prosecutor of the affidavits of the complainant and his witnesses. States that FAILURE to observe the mandatory periods which are NONEXTENDIBLE shall constitute a ground for suspension or removal."

