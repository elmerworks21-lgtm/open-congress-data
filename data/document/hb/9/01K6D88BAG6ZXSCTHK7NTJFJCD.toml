congress_website_title = "AN ACT AMENDING SECTION 8 OF R.A. 7227, OTHERWISE KNOWN AS THE BASES CONVERSION AND DEVELOPMENT ACT OF 1992, PROVIDING FOR THE DISTRIBUTION OF PROCEEDS FROM THE SALE OF PORTIONS OF METRO MANILA MILITARY CAMPS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to reduce the allocation for the development of the former baselands and redistribute the same to sectors which have more need of the money. Provides that the redistribution of funds shall include the following: (a) increase in the allotmentof the AFP modernization plan; (b) increase in the allotment of the National Shelter Program; (c) allocation for health insurance; the BOT program; the Bureau of Prisons, pensions of veterans, etc."
