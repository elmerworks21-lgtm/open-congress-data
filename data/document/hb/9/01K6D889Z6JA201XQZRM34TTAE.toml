congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC AND UNEQUIVOCAL RENUNCIATION OF ANY FOREIGN CITIZENSHIP, PERMANENT RESIDENT OR IMMIGRANT STATUS OF ALL PUBLIC OFFICIALS AND EMPLOYEES, WHETHER ELECTIVE OR APPOINTIVE, IMMEDIATELY UPON TAKING THE OATH OF OFFICE ANDPROVIDING STIFF PENALTIES FOR THE CHANGING OF THEIR FILIPINO CITIZENSHIPS DURING THEIR TENURE"
congress_website_abstract = "Seeks to substantiate the provision (Art XI, Section 18) which states that: \"Public officers and employees owe the State and this Constitution allegiance at all times, and any public officer or employee who seeks to change his citizenship oracquire the status of an immigrant of another country during his tenure shall be dealt with by law.\" * * *"
