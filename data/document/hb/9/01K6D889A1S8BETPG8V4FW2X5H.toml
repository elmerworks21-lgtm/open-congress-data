congress_website_title = "AN ACT ABOLISHING THE NATIONAL COLLEGE ENTRANCE EXAMINATION (NCEE), REPEALING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED ONE HUNDRED FORTY-SIX, AND INTRODUCING IN LIEU THEREOF A NON-QUALIFYING APTITUDE EXAMINATION"
congress_website_abstract = "Repeals otherwise known as the \"National Entrance Examination Act\", thus abolishing the said examination and in lieu, authorizes the conduct of a nonqualifying aptitude examination. Describes the substitute test as a diagnostic examinationto be conducted in the third year level."
