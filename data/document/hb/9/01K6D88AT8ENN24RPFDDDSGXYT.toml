congress_website_abstract = "\"The Capital City of the Philippines Act\" Proposes a gradual transfer of seat of government with the Office of the Chief Executive, the Senate and the Supreme Court transferred to Quezon City. Creates the CENTRAL ECONOMIC COORDINATING OFFICE to serve as the center of economic planning and implementation towards this goal; prescribes the duties, powers and functions of the Office. * * *"

