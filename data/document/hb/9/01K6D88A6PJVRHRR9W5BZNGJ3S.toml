congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF AGRO-PROCESSING VENTURES AND OTHER AGRI-BASED INDUSTRIES BY COOPERATIVES IN PARTNERSHIP WITH PRIVATE ENTREPRENEURS/I NVESTORS THROUGH GOVERNMENT INITIATIVE AND PROGRAM, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "\"ENTRECO - OP ACT OF 1993\" Offers a program whereby farmers and private entrepreneurs can be partners and share in the benefits derived from this corporate-style of farming. Authorizes government financial institutions to grant these entreco-op corporations soft loans at reasonable terms; exempts the same from payment of all forms of taxes, fees and duties. * * *"

