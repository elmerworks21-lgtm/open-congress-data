congress_website_title = "AN ACT AMENDING ARTICLE 94 OF REPUBLIC ACT NO. 7394, OTHERWISE KNOWN AS THE CONSUMER'S ACT OF THE PHILIPPINES"
congress_website_abstract = "Aims to be more specific in the prescribed SIZE AND LOCATION of the health warning statements on smoking, issued under Art. 94 of RA 7394. States that the warning statement SHALL BE LOCATED ON ONE OF THE SIDE PANELS (of cigarette packs) IN LEGIBLE TYPE-SIZE LETTERS OF ANY COLOR, PROVIDED THEY ARE 3mm IN SIZE. * * *"
