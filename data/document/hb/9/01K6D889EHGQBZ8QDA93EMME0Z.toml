congress_website_title = "AN ACT MANDATING THE MASSIVE PRODUCTION OF MINERALS FOR EXPORT TO SPEED UP THE ECONOMIC RECOVERY OF THE COUNTRY"
congress_website_abstract = "Directs the Department of Environment and Natural Resources to develop a mining program; delegates the Bureau of Mines to manage the mining operations and tasks the Department of Trade and Industry to market the mineral products. Aims togain fast and added income to the country by developing the following mines: gold, chromite, copper, silver, nickel, manganese, zinc, cement, sand and gravel, marble, white clay, coal, guano, adobe, limestone, perlite and phosphate rock. * * *"
