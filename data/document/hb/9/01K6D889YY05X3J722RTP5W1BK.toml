congress_website_title = "AN ACT EXPANDING THE JURISDICTION OF METROPOLITAN TRIAL COURTS, MUNICIPAL TRIAL COURTS AND MUNICIPAL CIRCUIT TRIAL COURTS, AMENDING FOR THE PURPOSE THE 'JUDICIARY REORGANIZATION ACT OF 1980'"
congress_website_abstract = "States that Regional Trial Courts exercise exclusive original jurisdiction over certain cases, such as: (1) WHERE THE VALUE OF THE PROPERTY OR INTEREST THEREIN EXCEEDS FIVE HUNDRED THOUSAND PESOS; and (2) WHERE THE DEMAND OR CLAIM EXCEEDS FIVE HUNDRED THOUSAND PESOS, etc. States, further, that all cases triable by the Metropolitan Trial Courts, Municipal Trial Courts and Municipal Circuit Trial Courts SHALL BE SUMMARY IN NATURE. * * *"

