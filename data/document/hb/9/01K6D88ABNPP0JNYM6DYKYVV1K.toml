congress_website_abstract = "\"Philippine Clear Air Act of 1993\" Designates the Environmental Management Bureau (DENR) as the primary government agency to implement the provisions of this Act; directs the EMB to establish a comprehensive air pollution management plan and control program. Provides for these areas of concern: (1) Strategy for Implementation; (2) Public Education and Information Campaign; (3) Recordkeeping, Monitoring, Inspection by the DENR; etc. * * *"
