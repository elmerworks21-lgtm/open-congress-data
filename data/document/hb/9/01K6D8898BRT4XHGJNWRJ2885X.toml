congress_website_title = "AN ACT FURTHER AMENDING THE PROVISIONS OF PRESIDENTIAL DECREE NO. 442 ON ILLEGAL RECRUITMENT AND PROVIDING FOR THE FILING OF ILLEGAL RECRUITMENT CASES IN THE PLACE OF RESIDENCE OR WORK OF THE COMPLAINANT VICTIM"
congress_website_abstract = "Declares that the criminal and action for damages in cases of illegal recruitment shall be filed simultaneously or separately with the proper court of the province or city where any of the offended parties actually resides at the timeof the commission of the offense. Provides penalties for violation of any of the provisions of this Act by any licensee, nonlicensee, corporation or partnership. * * *"
