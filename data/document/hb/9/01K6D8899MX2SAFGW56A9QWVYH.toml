congress_website_title = "AN ACT PROVIDING FOR INCENTIVES TO THE SHIPBREAKING INDUSTRY"
congress_website_abstract = "\"The Shipbreaking Industry Incentives Act of 1988\" Defines \"shipbreaking\" as the dismantling of uneconomical or non-serviceable ships, for the purpose of recovering useful steel, recycling of iron and steel, and the rehabilitation and repair of usable machineries, instruments and devices. Exempts from the payment of customs duty and value-added tax the importation of ships and other marine structures for breaking, as well as the sale of any vessel of Philippine registry. * * *"
