congress_website_title = "AN ACT PROVIDING THAT THE DEPARTMENT OF PUBLIC WORKS AND HIGHWAYS SHALL HAVE EXCLUSIVE JURISDICTION, SUPERVISION AND CONTROL OVER ALL INFRASTRUCTURE FACILITIES AND PUBLIC WORKS PROJECTS INCLUDING SPECIALIZED PROJECTS UNDERTAKEN BY GOVERNMENT-OWNE DOR -CONTROLLED CORPORATIONS AND SUCH OTHER PROJECTS FALLING UNDER THE RESPONSIBILITY OF OTHER AGENCIES AS DIRECTED BY THE PRESIDENT OF THE PHILIPPINES OR AS PROVIDED BY LAW"
congress_website_abstract = "Declares that the Dept. of Public Works and Highways shall be the SOLE engineering and construction arm of the government for the purpose of ensuring the safety of all infrastructure facilities and securing for all public works and projects the highest efficiency and the most appropriate quality in construction."

