congress_website_abstract = "\"Career Legislative Service Act\" Seeks to professionalize , upgrade strengthen the work force of the Congress. Prescribes the composition of the Career Legislative Service, namely: (1) the CAREER EXECUTIVE SERVICE OFFICERS (CESO); (2) the CAREER LEGISLATIVE SERVICE OFFICER (CLSO); and the SUB- CAREER LEGISLATIVE OFFICERS AND EMPLOYEES (SCLOE). * * *"
