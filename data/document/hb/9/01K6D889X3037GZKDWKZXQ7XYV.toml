congress_website_abstract = "Defines clearly the meaning of the term \"OPTIONAL RELIGIOUS INSTRUCTION.\" States that parents have the option to request for such instruction and that the request be in writing. Provides for other areas, such as: (1) Parent-Guardian Application; (2) Designation of Religious Teachers; (3) Provision of Teaching/Learni ng Materials; (4) Duration of Classes; and (5) Schedule and Size of Religion Classes. * * *"
