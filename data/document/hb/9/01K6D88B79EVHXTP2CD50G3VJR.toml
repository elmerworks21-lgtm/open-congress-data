congress_website_title = "AN ACT TO ESTABLISH A PRIVATE SECTOR INFRASTRUCTURE DEVELOPMENT FUND TO ENCOURAGE PRIVATE SECTOR INVESTMENT AND PARTICIPATION IN INFRASTRUCTURE PROJECTS, PROVIDING FOR ITS ORGANIZATION AND MANAGEMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "States that the primary purpose of the Private Sector Infrastructure Development Fund (PSIDF) is to provide financial services and facilities to private infrastructure developers/oper ators of large scale infrastructure projects by extending them loans and other credit accommodations. Prescribes the powers, privileges and immunities of the Fund, including its organization and management."

