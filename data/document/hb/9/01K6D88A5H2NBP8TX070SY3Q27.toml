congress_website_title = "AN ACT ESTABLISHING THE RULES TO GOVERN THE ADOPTION OF FILIPINO CHILDREN BY FOREIGNERS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Foreign Adoption Act of 1992\" Explains the meaning of the term \"FOREIGN ADOPTION\" under this proposed measure; tasks the Dept. of Social Welfare and Development with the central authority to implement the adoption program. Contains provisions on: (1) role of the DSWD in the Program; (2) adoption procedure; (3) requirements for adoption; (4) qualifications of the adopting party; and (4) adoption costs; etc. * * *"
