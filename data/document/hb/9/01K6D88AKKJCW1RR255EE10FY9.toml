congress_website_title = "AN ACT REDEFINING THE JURISDICTION OF THE SANDIGANBAYAN, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED SIXTEEN HUNDRED AND SIX, AS AMENDED, ENTITLED \"REVISING PRESIDENTIAL DECREE NO. 1486 CREATING A SPECIAL COURT TO BE KNOWN AS 'SANDIGANBAYAN' AND FOR OTHER PURPOSES"
congress_website_abstract = "Redefines Sandiganbayan by providing that this special court shall have EXCLUSIVE AND ORIGINAL JURISDICTION over graft cases committed by those occupying high positions in government and in the military. Provides, further, that regular courtsshall try graft cases committed by lower-rank officials."
