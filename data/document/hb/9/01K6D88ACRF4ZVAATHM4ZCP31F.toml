congress_website_title = "AN ACT PROVIDING FOR THE CONFIRMATION OF WORLD WAR II MILITARY SERVICES"
congress_website_abstract = "Creates a MILITARY SERVICE CONFIRMATION BOARD under the AFP, which is tasked to pass on the application for confirmation of military service. Contains provisions on: (1) composition of the Board; (2) application by survivors; (3) fraudulent claims; (4) decisions of the Board; (5) grant of Deserving Guerilla Status, etc. * * *"
