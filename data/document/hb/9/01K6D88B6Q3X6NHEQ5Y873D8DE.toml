congress_website_title = "AN ACT PROHIBITING THE APPOINTMENT OF RETIRED MILITARY PERSONNEL TO CIVILIAN POSITIONS IN THE GOVERNMENT, INCLUDING CABINET POSITIONS, WITHIN TEN YEARS FROM DATE OF RETIREMENT, RESIGNATION OR SEPARATION FROM SERVICE"
congress_website_abstract = "Declares that retired officers and employees of the AFP SHALL NOT be appointed to any civilian position in the government, including Cabinet positions, whether temporary, contractual or casual within ten (10) years from the date of their retirement, resignation or separation from service. * * *"

