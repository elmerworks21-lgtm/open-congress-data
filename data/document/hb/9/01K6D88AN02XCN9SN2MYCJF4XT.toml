congress_website_abstract = "\"Elderly Benefits Act of 1993\" Applies to persons who are 65 years of age and over; provides special benefits and discount privileges in these areas: (1) use of sports complexes; (2) purchase of food, appliances, and equipment; (3) entry to movie houses; (4) transportation fares; and (5) clothing purchases. * * *"

