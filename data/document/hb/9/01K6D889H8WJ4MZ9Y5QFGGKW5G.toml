congress_website_title = "AN ACT PROVIDING FOR THE PAYMENT IN PART OF THE SUBSCRIPTION OF THE GOVERNMENT OF THE REPUBLIC OF THE PHILIPPINES TO THE CAPITAL STOCK OF THE NATIONAL POWER CORPORATION OUT OF THE OIL PRICE STABILIZATION FUND, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED NINETEEN HUNDRED FIFTY-SIX, AS AMENDED"
congress_website_abstract = "Provides for the payment in part of the subscription of the Government to the capital stock of the NAPOCOR; mandates the NAPOCOR to utilize said payments to finance its capital expenditures for energy projects only."
