congress_website_title = "AN ACT AMENDING ARTICLE 184 (E) OF EXECUTIVE ORDER NUMBERED 209 OTHERWISE KNOWN AS THE 'FAMILY CODE OF THE PHILIPPINES'"
congress_website_abstract = "Includes the following as potential adoptive parents for Filipino children: (1) A RESIDENT ALIEN WHO HAS BEEN LIVING IN THE PHILIPPINES FOR AT LEAST THREE (3) YEARS; OR (2) A FORMER FILIPINO NATIONAL ADOPTING A NONRELATED CHILD. * * *"
