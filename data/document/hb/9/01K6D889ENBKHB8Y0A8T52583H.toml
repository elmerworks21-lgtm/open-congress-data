congress_website_title = "AN ACT EXCLUDING COMMERCIAL LIVESTOCK, POULTRY AND SWINE RAISING, AQUACULTURE INCLUDING SALTBEDS, FISH PONDS AND PRAWN PONDS FROM THE CLASSIFICATION OF COMMERCIAL FARMING, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-SIX FIFTY-SEVEN, OTHERWISE KNOWN AS THE COMPREHENSIVE AGRARIAN REFORM LAW OF NINETEEN HUNDRED AND EIGHTY EIGHT"
congress_website_abstract = "Advances the following reasons for excluding under the coverage of the agrarian reform law livestock and aquaculture farming: (1) Land is not the primary resource; (2) It is not an agricultural activity; (3) The output is not the fruit of the land; (4) There are no tillers nor tenants; (5) Workers are paid fixed wages rather than crop shares. * * *"
