congress_website_title = "AN ACT PROVIDING FOR ABSENTEE VOTING BY FILIPINO CITIZENS WORKING AND/OR RESIDING OUTSIDE OF THE PHILIPPINES"
congress_website_abstract = "\"Absentee Voting for Overseas Filipino Act of 1993\" Defines terms used in this Act; applies to Filipino citizens working abroad for the past six (6) months prior to any election, plebiscite, referendum or recall. Prescribes the rules and regulations governing absentee voting. * * *"
