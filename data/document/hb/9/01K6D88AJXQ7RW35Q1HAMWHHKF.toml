congress_website_title = "AN ACT INCREASING LABOR SECTOR REPRESENTATION IN THE BOARD OF TRUSTEES OF THE WELFARE FUND FOR OVERSEAS CONTRACT WORKERS AND PROVIDING FOR THE QUALIFICATION OF SUCH REPRESENTATIVES , AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED SIXTEEN HUNDRED AND NINETY-FOUR, AS AMENDED"
congress_website_abstract = "Provides for THREE (3) REPRESENTATIVES for the labor sector to sit in the WELFUND'S Board of Trustees; allows these representatives to serve for a term of two (2) years without reappointment. Requires the representatives to have at least two(2) years experience as overseas contract workers and must belong to duly accredited organizations of overseas contract workers. * * *"
