congress_website_title = "AN ACT GRANTING ADDITIONAL ALLOWANCES AND OTHER BENEFITS TO ALL BARANGAY HEALTH WORKERS/COMMUNI TY BASED HEALTH WORKERS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Provides for the REGISTRATION of all barangay health workers/communi ty based workers; provides that a community health worker shall receive a monthly allowance of P1,200; health workers in remote areas, P1,500. Provides, likewise, for insurance,medical benefits and transportation allowances for these workers. * * *"
