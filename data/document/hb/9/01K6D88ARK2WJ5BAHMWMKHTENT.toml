congress_website_title = "AN ACT TO FURTHER STRENGTHEN THE SECURITY OF TENURE CLAUSE OF THE WORKERS BY ENTITLING THEM, IN CASES OF ILLEGAL DISMISSAL, TO DAMAGES EQUIVALENT TO AT LEAST THEIR BACKWAGES FOR THE ENTIRE PERIOD OF SUCH ILLEGAL DISMISSAL"
congress_website_abstract = "States that an employee who is unjustly dismissed from work shall be entitled to DAMAGES EQUIVALENT TO AT LEAST his full backwages, inclusive of allowances, WITHOUT QUALIFICATION OR DEDUCTION AS TO HIS INTERIM INCOME EARNED DURING THE PERIODOF HIS ILLEGAL DISMISSAL. * * *"

