congress_website_title = "AN ACT REGULATING THE TRADE OR EXPORT OF ENDANGERED AND THREATENED WILDLIFE SPECIES, BOTH FLORA AND FAUNA, WHETHER ALIVE OR DEAD, PROVIDING PENALTY THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines the terms \"ENDANGERED SPECIES\" and \"THREATENED SPECIES\" as used in this Act. States that UNLESS CONVERED BY A PERMIT, it shall be UNLAWFUL for any person to trade, export or reexport fish or wildlife or plant of whatever species, alive or dead, belonging either to the endangered or threatened species."
