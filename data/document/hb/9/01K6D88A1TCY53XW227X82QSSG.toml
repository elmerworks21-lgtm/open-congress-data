congress_website_title = "AN ACT ESTABLISHING A SYSTEM OF COMPULSORY CONTRIBUTION FOR HOUSING AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Home Development Fund Act of 1992\" Describes the proposed FUND as a PROVIDENT SAVING SYSTEM for employees, private and public, supported by a MATCHING CONTRIBUTION BY THEIR RESPECTIVE EMPLOYERS, with housing as the primary investment. Proposesthe following scheme of contributions: (1) Employees earning not more than P1,500.00 --- 1% (2) Employees earning more than P1,500.00 --- 2% (3) All employers --- 2% of the monthly fund salary of all concerned employees. * * *"

