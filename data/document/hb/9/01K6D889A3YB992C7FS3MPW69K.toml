congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC RELEASE TO THE LOCAL GOVERNMENT UNITS (LGUS) OF THEIR TWENTY PER CENTUM (20%) SHARE OF THE NATIONAL REVENUE TAXES, AMENDING SECTION 282 PARAGRAPH B OF THE NATIONAL INTERNAL REVENUE CODE FOR THIS PURPOSE"
congress_website_abstract = "Authorizes the Internal Revenue chiefs of the local government units to DEDUCT FROM THE ANNUAL INTERNAL REVENUE TAX COLLECTIONS AN AMOUNT EQUIVALENT TO THE PERCENTAGE fixed in this Act, AND TO REMIT THE SAME TO THE LOCAL GOVERNMENT UNITS UNDERSUCH REGULATIONS AS MAY BE PROMULGATED BY THE SECRETARY OF FINANCE AND THE SECRETARY OF LOCAL GOVERNMENT. Provides also for the allocation to the barangays of P1 M from the National Internal Revenue Tax collections. * * *"
