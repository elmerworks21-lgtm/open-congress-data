congress_website_title = "AN ACT PROVIDING FOR THE LEGALIZATION OF STAY IN THE COUNTRY OF CERTAIN ILLEGAL ALIENS"
congress_website_abstract = "\"Alien Legalization Act of 1992\" Applies to aliens who entered the country before February 2, 1987, and without record of admission for permanent residence; prescribes the requisites for application to be legalized; identifies those who cannot apply. Penalizes violation of this Act."
