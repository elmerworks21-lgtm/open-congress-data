congress_website_title = "AN ACT PROVIDING FOR PROCEDURE IN OIL PRICE INCREASE, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NUMBERED ONE HUNDRED SEVENTY-TWO, CREATING THE ENERGY REGULATORY BOARD"
congress_website_abstract = "Provides that all hearings, investigations and proceedings of the ERB shall be conducted in the city or the municipality centrally accessible to all concerned. States that the ERB shall determine the necessity for any price increase of oil products after hearings; states, further, that NO PRICE INCREASE shall be affected unless the petitioners and the oppositors are given the opportunity to be heard. * * *"
