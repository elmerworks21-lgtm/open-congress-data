congress_website_abstract = "\"Book Publishing Development Act\" Seeks to provide a comprehensive NATIONAL BOOK POLICY and implement a viable NATIONAL BOOK DEVELOPMENT PLAN; states, therefore, the national policy on book publishing, such as: (1) To promote the development ofindigenous authorship in the vernacular languages; (2) To inculcate the concept of intellectual property ownership and seek the enforcement of copyright laws, etc. * * *"
