congress_website_title = "AN ACT FURTHER AMENDING ACT NO. 3135, AS AMENDED BY ACT NO. 4118, AND REPEALING CERTAIN PROVISIONS OF EXECUTIVE ORDER NO. 80, EXECUTIVE ORDER NO. 81, REPUBLIC ACT NO. 337, AND REPUBLIC ACT NO. 720 IN ORDER TO PROVIDE A UNIFORM PROCEDURE IN EXTRAJUDICIAL FORECLOSURE OF REAL ESTATE MORTGAGES"
