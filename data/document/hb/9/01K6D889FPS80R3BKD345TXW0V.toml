congress_website_title = "AN ACT CHANGING THE BASE OF INCOME TAXATION FOR CORPORATION, FROM NET INCOME TO GROSS INCOME, AMENDING FOR THE PURPOSE SECTIONS 24, 25, 27 AND 29 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "Defines the term \"TAXABLE INCOME;\" states what shall be allowed as DEDUCTIONS; states, further, that a corporation SHALL BE SUBJECT TO A TAX EQUIVALENT TO THREE PERCENT (3%) OF THE TAXABLE INCOME DERIVED DURING EACH TAXABLE YEAR FOR THE FIRSTFIVE (5) YEARS FROM INCORPORATION, AND FIVE PERCENT (5%) THEREAFTER FROM ALL SOURCES WITHIN AND WITHOUT THE PHILIPPINES. * * *"
