congress_website_title = "AN ACT TRANSFERRING THE MANAGEMENT, ADMINISTRATION AND OPERATION OF MUNICIPAL PORTS TO THE LOCAL GOVERNMENT UNITS WITHIN WHOSE TERRITORIAL JURISDICTION THE SAME ARE SITUATED REPEALING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED FIVE HUNDRED AND FIVE, AS AMENDED"
congress_website_abstract = "Declares that the powers and functions of the Philippine Ports Authority (PPA) shall devolve upon the provincial, city or municipal government concerned. Empowers the local government units concerned to undertake the collection of fees, the grant,issuance, revocation and withholding of licenses and permits for the use of the ports. * * *"

