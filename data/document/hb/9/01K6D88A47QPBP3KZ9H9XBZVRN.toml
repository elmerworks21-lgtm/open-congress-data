congress_website_title = "AN ACT DEREGULATING CERTAIN PUBLIC SERVICES, AMENDING FOR THE PURPOSE COMMONWEALTH ACT NO. 146, AS AMENDED, AND FOR OTHER PURPOSES (Redefines the term \"PUBLIC SERVICE\" to exclude certain activities from the coverage of the Public Service Law or CA 146)"
congress_website_abstract = "Excludes the following from the activities classified as \" public service\" under the existing Public Service Law: (1) express service; (2) shipyard, marine railway, marine repair shops, wharf or dock; (3) ice plant, ice refrigeration (4) canal, irrigation systems; and (5) petroleum. * * *"
