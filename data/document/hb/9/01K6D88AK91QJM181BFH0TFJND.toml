congress_website_title = "AN ACT AMENDING R.A. 6758 OTHERWISE KNOWN AS THE SALARY AND ALLOWANCE STANDARDIZATION LAW SO AS TO PROVIDE FOR A NEW SALARY GRADE FOR PUBLIC ATTORNEYS"
congress_website_abstract = "Declares that ALL PUBLIC ATTORNEYS WHO HAVE ACQUIRED PERMANENT STATUS OF APPOINTMENT SHALL RECEIVE SALARIES IN ACCORDANCE WITH THE FOLLOWING SCHEDULE: Public Attorney 1 --- Grade 25 Public Attorney 2 --- Grade 26 Public Attorney 3 --- Grade 27 Public Attorney 4 --- Grade 29 Grants the public attorneys representation and transportation allowance, as follows: Public Attorney 1 --- P2,200 Public Attorney 2 --- P2,700 Public Attorney 3 --- P3,200 Public Attorney 4 --- P3,700 * * *"
