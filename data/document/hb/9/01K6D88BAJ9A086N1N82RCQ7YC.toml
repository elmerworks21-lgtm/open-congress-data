congress_website_title = "AN ACT REMOVING FROM THE DEPARTMENT OF LABOR AND EMPLOYMENT (DOLE) THE ADMINISTRATION AND SUPERVISION OF THE PHILIPPINE OVERSEAS EMPLOYMENT ADMINISTRATION (POEA) AND THE OVERSEAS WORKERS WELFARE ADMINISTRATION (OWWA)"
congress_website_abstract = "Provides for the creation of a COMMISSION exclusively for overseas Filipino workers, to be created by virtue of an Executive Order. Declares the administration of the POEA and the OWWA as hereby REMOVED FROM the Dept. of Labor and Employment; statesthe goals and objectives of this proposed measure, such as the expeditious and efficient management of all matters related to overseas Filipino workers. * * *"

