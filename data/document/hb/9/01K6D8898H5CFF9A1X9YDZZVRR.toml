congress_website_title = "AN ACT TO ENHANCE THE PROMOTION AND MARKETING OF PHILIPPINE TOURISM AND INTERNATIONAL TRADE, AND FOR OTHER PURPOSES(Withdr awal of principal author - Hon. Miguel Romero per memo dated 09/22/93)"
congress_website_abstract = "\"Philippine Trade Reorientation Act of 1992\" Provides for the creation of the PHILIP- PINE INTERNATIONAL TOURISM, TRADING AND EXPORTS CORPORATION which will be solely responsible for the improvement, enhancement, and interna- tional marketing of Philippine tourism; pro- vides for the composition, qualifications, duties and functions of the Board of Directors of the proposed Corporation. Establishes a BUREAU OF FOREIGN TRADE AND TOURISM within the Dept. of Foreign Affairs; transfers the duties and functions of certain existing offices to the proposed Bureau. * * *"
