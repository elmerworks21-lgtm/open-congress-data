congress_website_title = "AN ACT STRENGTHENING THE PROVISION ON 'LABOR-ONLY' CONTRACTING BY PROVIDING PENALTY FOR THE VIOLATION THEREFOR, AMENDING FOR THIS PURPOSE ARTICLE 106 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE 'LABOR CODE OF THE PHILIPPINES'AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines clearly what \"LABOR-ONLY CONTRACTING\" means. Penalizes any person violating the provisions against labor-only contracting with a P5,000.00 to P20,000.00 fine, or with imprisonment for two (2) to five (5) years. Prescribes, likewise, a corresponding penalty if the offender is an alien. * * *"
