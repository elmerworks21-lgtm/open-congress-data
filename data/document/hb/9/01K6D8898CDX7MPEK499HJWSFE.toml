congress_website_title = "AN ACT PROHIBITING POLITICAL DYNASTIES"
congress_website_abstract = "\"Anti-Political Dynasties Act of 1992\" Defines the term \"POLITICAL DYNASTY.\" States that no person shall succeed in any public office, be elected or appointed to any elective or appointive office, nor shall assume any elective office where hisfamily member or relative is the incumbent or is occupying an elective or appointive position. Does not apply to the elective office for vice mayor, members of the Sangguniang Panlung- sod or Bayan, Punong Barangay and members of the Sangguniang Barangay. States further that no elective or appoin- tive officials shall be eligible for appointment or designation to any public office after his tenure. * * *"
