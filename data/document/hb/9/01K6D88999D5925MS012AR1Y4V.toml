congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 265, AS AMENDED, TO ESTABLISH A CENTRAL MONETARY AUTHORITY WHICH SHALL BE KNOWN AS THE CENTRAL BANK, DEFINING ITS ROLE, RESPONSIBILITIE S, OBJECTIVES AND POWERS IN THE ADMINISTRATION OF THE MONETARY, CREDIT AND BANKING SYSTEM, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to establish an INDEPENDENT CENTRAL MONETARY AUTHORITY, a BODY CORPORATE known as the Central Bank of the Philippines. Provides that the Central Bank shall provide the policy direction in the country's banking, money and credit system; contains other significant provisions intended to make the CB \"more independent and less accommodating to the national government.\""
