congress_website_title = "AN ACT AMENDING SECTION 59, ITEM 2, PARAGRAPH 2, CHAPTER 8 OF EXECUTIVE ORDER NO. 292, ADMINISTRATIVE CODE OF 1982, BOOK V, CIVIL SERVICE COMMISSION (Puts in an EXEMPTION to the rule on nepotism in the ADMINISTRATIVE CODE)"
congress_website_abstract = "Refers Administation Code, which deals on NEPOTISM; seeks to include the following provision as an EXEMPTION to the rules on nepotism: \"NEITHER SHALL IT BE APPLICABLE TO A RELATIVE EMPLOYEE WHO HAD BEEN IN THE SERVICE FOR MORE THAT FIVE(5) YEARS PRIOR TO HIS PROMOTIONAL APPOINTMENT EITHER IN RANK OR IN SALARY.\""
