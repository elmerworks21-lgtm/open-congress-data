congress_website_title = "AN ACT CONSTITUTING THE JOINT LEGISLATIVE-EXE CUTIVE DEVELOPMENT COUNCIL, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares it the policy of the State to develop a self-reliant and independent national economy effectively controlled by Filipinos. Prescribes the composition of the Council, states the functions thereof, as well as the Council's priority concerns."
