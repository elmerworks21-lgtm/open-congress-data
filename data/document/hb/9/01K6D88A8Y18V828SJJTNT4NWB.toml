congress_website_title = "AN ACT AMENDING SECTIONS 13 AND 30 OF REPUBLIC ACT NO. 545, OTHERWISE KNOWN AS AN ACT TO REGULATE THE PRACTICE OF ARCHITECTURE IN THE PHILIPPINES"
congress_website_abstract = "States that --- \"A FOREIGNER ARCHITECT OR PERSON WHO IS NOT AUTHORIZED PRACTICE ARCHITECTURE IN THE PHILIPPINES BUT SHALL STAY IN THE COUNTRY FOR MORE THAN TWO (2) MONTHS, IN CONNECTION WITH ANY BUILDING/STRUCT URE /EDIFICE OR LAND DEVELOPMENT PROJECT, SHALL BE DEEMED TO BE ENGAGED IN THE UNAUTHORIZED PRACTICE OF ARCHITECTURE. FOR THIS PURPOSE, THE BOARD OF ARCHITECTS SHALL ISSUE THE RULES AND REGULATIONS TO ACHIEVE THE OBJECTIVES OF THIS PROVISION.\" Penalizes the architect found violating this Act with imprisonment and a fine of not less than P200,000.00 to not more than P5 Million, including perpetual disqualificatio n to practise architecture. * * *"
