congress_website_abstract = "\"Agriculture Education Reform Law of 1993\" Provides for the structure and components of the proposed NATIONAL AGRICULTURE EDUCATION SYSTEM (NAES) in the national, regional and provincial levels. Prescribes the functions and other roles of theinstitutions involved in the System; provides for the creation of the AGRICULTURE EDUCATION DEVELOPMENT COUNCIL (AEDEC) which shall carry out the policies and the implementation of the System. * * *"
