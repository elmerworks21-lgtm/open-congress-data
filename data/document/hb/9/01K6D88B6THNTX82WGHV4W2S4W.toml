congress_website_title = "AN ACT AMENDING SECTION 20 OF PRESIDENTIAL DECREE NUMBERED 1638, AS AMENDED BY PRESIDENTIAL DECREE NUMBERED 1650, OTHERWISE KNOWN AS THE ARMED FORCES OF THE PHILIPPINES RETIREMENT LAW AND SUBSECTION (a) SECTION 27 OF COMMONWEALTH ACT NUMBERED 1, OTHERWISE KNOWN AS THE NATIONAL DEFENSE ACT"
congress_website_abstract = "States that REENLISTMENT in the AFP regular force shall be for a term of five (5) years; states, further, that an officer with less than 20 years of active service or AN ENLISTED PERSON WITH LESS THAN 20 YEARS OF ACTIVE SERVICE HONORABLY SEPARATED,shall be entitled to a separation pay equivalent to one (1) month base pay, and longevity pay of the permanent grade he holds for every year of active service. * * *"
