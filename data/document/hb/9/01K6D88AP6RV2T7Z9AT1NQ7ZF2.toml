congress_website_title = "AN ACT BANNING THE MAINTENANCE AND/OR USE OF PRIVATE ARMIES AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines \"PRIVATE ARMIES\" as used in this Act; penalizes the violation of this Act with a fine of P50,000 - P250,000, or imprisonment of from six (6) years to eight (8) years. Prescribes corresponding penalties for these types of offenders: (1) government official/employ ee; (2) juridical person; and (3) alien. * * *"
