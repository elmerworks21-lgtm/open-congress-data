congress_website_title = "AN ACT PROVIDING FOR THE PRIVATIZATION AND INDEPENDENCE OF WATER DISTRICTS, AMENDING FOR THE PURPOSE THE PROVINCIAL WATER UTILITIES ACT OF 1973, AS AMENDED"
congress_website_abstract = "Provides for the creation of independent and locally controlled private corporations in the form of water districts; states that such districts shall have the powers, attributes and properties of a private corporation. Provides for the mannerby which facilities and properties shall be transferred to said water districts in order for these to function independently. * * *"

