congress_website_title = "AN ACT REQUIRING COMMERCIAL AND INDUSTRIAL ESTABLISHMENTS TO RESERVE AND TO EMPLOY AT LEAST FIVE PERCENT (5%) OF THEIR WORKFORCE PERSONS WITH DISABILITIES (PWDs)"
congress_website_abstract = "Covers commercial and industrial establishments employing at least 100 persons, inclusives of casual, contractual and regular workers; defines \"PERSONS WITH DISABILITIES (PWDs)\" as those suffering from a mental, physical or sensory impairment whichrestricts their ability to undertake normal activities; provides penal sanctions."

