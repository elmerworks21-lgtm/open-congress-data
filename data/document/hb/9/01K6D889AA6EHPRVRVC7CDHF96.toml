congress_website_title = "AN ACT PROHIBITING THE DETENTION OF PATIENTS IN HOSPITALS AND MEDICAL CLINICS ON GROUNDS OF NON-PAYMENT OF HOSPITAL BILLS OR MEDICAL EXPENSES"
congress_website_abstract = "Allows patients financially unable settle their medical bills to leave the hospi- tal/medical clinic subject to the execution of a promissory note on the unpaid obligation. Imposes a fine of P5,000 - P15,000 or imprisonment of one (1) month - six (6) months on the hospital officer or employee who vio- lates the provisions of this Act directly or indirectly. * * *"
