congress_website_title = "AN ACT GRANTING TAXPAYERS TAX CREDIT FROM REAL PROPERTY TAXATION TREES OF ALL KINDS AND PLANTS OF ECONOMIC VALUE, AMENDING FOR THE PURPOSE SECTION 234 OF THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Covers trees of all kinds and plants of economic value, when it reaches a viable height of at least two(2) meters. Proposes the following RATE of tax credit or rebate on trees and plants: (1) premium Phil. trees - not more than P=3.00 each; (2) fruit trees and bamboo - not more than P=1.50 each; (3) coconut, coffee, etc. - P=0.25 each. Declares that the MAXIMUM TAX CREDIT SHALL NOT BE MORE THAN THE REAL ESTATE TAX PAYABLE ON THE LAND. * * *"
