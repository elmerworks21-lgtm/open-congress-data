congress_website_title = "AN ACT TO AMEND RA NO. 291, AS AMENDED OTHERWISE CITED AS THE ARMED FORCES OFFICER PERSONNEL ACT OF 1948 (Institutes significant reforms in the PROMOTION SYSTEM of the military)"
congress_website_abstract = "Amends Republic Act no. 291 by limiting the authorized number of officers of the promo- tion lists which shall not exceed the following percentages of the officer strength authorized for the Armed Forces: 1/2 per centum in the grade of general; 4per centum in the grade of colonel; 10 per centum in the lieutenant colo- nel; 16 per centum in the grade of major; 20 per centum in the grade of captain; and 48 1/2 per centum in the combined grades of first and second lieutenants. * * *"

