congress_website_title = "AN ACT PROVIDING FOR BENEFITS AND PRIVILEGES TO SOLO PARENTS AND THEIR CHILDREN AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Solo Parents Welfare Act\" Directs the DSWD, the DECS and the DOH to implement the proposed program for solo parents. Defines the meaning of the term \"SOLO PARENT\"; provides for these concerns: (1) criteria for support; (2) livelihood development services; (3) family counseling services; and (4) educational, medical and housing benefits. * * *"

