congress_website_title = "AN ACT INSTITUTING REFORMS IN THE PACKAGING INDUSTRY, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates the Bureau of Product Standards (BPS) of the Department of Trade and Industry to formulate mandatory standards in food packaging; prescribes the powers and functions of the BPS. States the reasons why TESTING of products shall be conducted; states, likewise that packaging used for exported products shall be EXEMPT from payment of the VAT. Provides for the establishment of a NATIONAL PACKAGING CENTER which shall cater to the needs of packaging producers and users. * * *"

