congress_website_title = "AN ACT DECLARING ILLEGAL LOGGING A HEINOUS CRIME AND IMPOSING THE DEATH PENALTY FOR THE COMMISSION THEREOF"
congress_website_abstract = "Declares illegal logging a heinous crime and imposes the death penalty for the commis- sion thereof. Includes in the crime of \"illegal logging\" only the cutting of trees by unlicensed indi- viduals, corporations or other juridical persons, or bylegitimate loggers cutting beyond the limit prescribed by their licenses and if the commercial value of the confiscated logs is more than P100,000.00. * * *"

