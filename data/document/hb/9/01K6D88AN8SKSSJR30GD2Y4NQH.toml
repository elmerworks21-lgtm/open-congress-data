congress_website_title = "AN ACT TO CREATE THE OFFICE OF THE UNDERSECRETARY OF DEFENSE FOR VETERANS AND RESERVE AFFAIRS, PRESCRIBING ITS FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims mandate of providing immediate and adequate care, benefits and other forms of assistance to all veterans and AFP retirees. Abolishes, therefore, the PHILIPPINE VETERANS ASSISTANCE COMMISSION created under PD 244; renames the Philippine Veterans Affairs Office as PHILIPPINE VETERANS ADMINISTRATION. States the powers and functions of the Undersecretary of Defense for Veterans and Reserve Affairs."
