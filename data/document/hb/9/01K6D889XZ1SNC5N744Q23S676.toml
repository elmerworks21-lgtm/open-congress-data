congress_website_title = "AN ACT PROTECTING SMALL AND MEDIUM INDUSTRIES AGAINST UNDUE EXPLOITATION, PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Defines the meaning of the term \"SMALL AND MEDIUM INDUSTRIES (SMI)\" for this purpose. Prohibits the issuance of purchase orders (POs), which are payable at a period exceeding 30 days, after the items ordered are fully delivered and received by the buyer. Provides, however, that the buyer be required to pay the supplier a SURCHARGE for each day of default in payment. * * *"
