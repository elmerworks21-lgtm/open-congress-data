congress_website_title = "AN ACT CONSERVING, PROMOTING AND POPULARIZING THE NATION'S HISTORICAL AND CULTURAL HERITAGE AND RESOURCES, AS WELL AS ARTISTIC CREATIONS BY EXACTING A PERFORMANCE FEE FROM FOREIGN PERFORMERS AND ALLOCATING THE PROCEEDS THEREOF TO THE NATIONAL COMMISSION ON CULTURE AND ARTS, AND FOR OTHER PURPOSES"
congress_website_abstract = "“The Singers Equity Act” Requires foreign performers to pay charges to be known as the Equity Fee - charged on a foreign performer a free equivalent to fifteen (15%) percent of his total talent fee for the privilege of performing in the Philippines, the proceeds of which shall be allocated to the National Commission on Culture and Arts, the extant government agencies charged with promoting arts and culture."
