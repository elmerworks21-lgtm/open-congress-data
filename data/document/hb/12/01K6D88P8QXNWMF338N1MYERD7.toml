congress_website_title = "AN ACT PROVIDING FOR THE CONTROL AND ERADICATION OF RABIES, PRESCRIBING PENALTIES FOR VIOLATION THEREOF, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Anti-Rebies Act of 2002\". Rabies, a fatal viral disease affecting the nervous system, remains a public health problem in the country. Approximately 300 to 450 Filipinos die of rabies every year. The bill provides for the implementation of a Nationwide Rabies Prevention and Control Program to be undertaken by the Departments of Agriculture, Health, Interior and Local Government and Education as well as by local government units with the assistance of non-government organizations. The Program aims to eliminate rabies and eventually declare the Philippines rabies-free."
