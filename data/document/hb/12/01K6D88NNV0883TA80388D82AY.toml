congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 717, ENTITLED `PROVIDING AN AGRARIAN REFORM CREDIT AND FINANCING SYSTEM FOR AGRARIAN REFORM BENEFICIARIES THROUGH BANKING INSTITUTIONS'"
congress_website_abstract = "The bill seeks to correct the decline in agricultural production loans by REDIRECTING the use of the Agri-Agra Fund to favor the small farmers. The proposed amendment to PD No. 717 reads: TO INVEST OR DEPOSIT THEIR LOANABLE FUNDS FOR AGRICULTURAL AND AGRARIAN REFORM CREDIT WITH GOVERNMENT FINANCIAL INSTITUTIONS AND RURAL BANKS FOR THE PURPOSE OF RE-LENDING SUCH LOANABLE FUNDS TO FARMERS AND AGRARIAN REFORM BENEFICIARIES. TO PROMOTE A FUNCTIONAL TIE-UP BETWEEN COMMERCIAL BANKS AND RURAL BANKS,ALL LOANS OF RURAL BANKS REDISCOUNTED WITH COMMERCIAL BANKS SHALL BE DEEMED AS COMPLIANCE WITH P.D. 717."

