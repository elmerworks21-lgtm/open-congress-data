congress_website_abstract = "This bill seeks to authorize the punong barangay to possess and carry firearm within the territorial jurisdiction of his barangay without the need of a license and/or permit to possess or carry firearm. He shall also be allowed to possess and carryfirearms outside the territorial jurisdiction of his barangay only in the lawful exercise of the right to HOT PURSUIT."
