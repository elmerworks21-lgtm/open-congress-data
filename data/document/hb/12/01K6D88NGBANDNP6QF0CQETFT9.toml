congress_website_abstract = "This bill seeks the amendment of R.A. 5680, An Act Creating the Board of Physical Therapists and Occupational Therapists, for the purpose of upgrading and upgrading the competence, knowledge, skills and attitudes of the Filipino occupational therapists and physical therapists to make them globally competitive and nationally accessible to the disabled population of the Philippines."
