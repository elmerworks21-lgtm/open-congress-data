congress_website_title = "AN ACT TO CURTAIL ENTERTAINMENT MEDIA PIRACY IN THE PHILIPPINES, FOR THIS PURPOSE, REORGANIZING THE VIDEOGRAM REGULATORY BOARD INTO THE ENTERTAINMENT MEDIA REGULATORY AND ANTI-PIRACY BOARD, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Entertainment Media Anti-Piracy Act\". This bill substantiates the State policy to ensure the protection of intellectual property rights, thereby creating an environment conducive to the growth and development of all business industries, including the entertainment and related industries. The State declares that entertainment media piracy in all forms is inimical to economic growth and public interest. The State, therefore, shall institute the means to curtail entertainment media piracy in allforms."
