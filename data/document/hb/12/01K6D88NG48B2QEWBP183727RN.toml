congress_website_title = "AN ACT TO RATIONALIZE THE ADMINISTRATION AND ENFORCEMENT OF ALL LAWS ON OCCUPATIONAL SAFETY AND HEALTH STANDARDS AND ENVIRONMENTAL PROTECTION AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposes to identify the lead agency which will be responsible for coordinating and overseeing the activities of all agencies that are involved in the promotion of occupational safety and health standards and environmental protection programs. It also seeks to authorize the lead agency, after consultations with participating agencies and sectors concerned, to prescribe administrative fines in cases of violations of such standards and regulations."

