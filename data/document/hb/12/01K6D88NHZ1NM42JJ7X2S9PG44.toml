congress_website_title = "AN ACT MAKING THE RESERVE OFFICERS' TRAINING CORPS (ROTC) OPTIONAL FOR ALL STUDENTS IN ALL COLLEGES AND UNIVERSITIES, AMENDING THEREBY PERTINENT PROVISIONS OF REPUBLIC ACT NO. 7077, OTHERWISE KNOWN AS `AN ACT PROVIDING FOR THE DEVELOPMENT, ADMINISTRATION, ORGANIZATION, TRAINING, MAINTENANCE AND UTILIZATION OF THE CITIZEN ARMED FORCE OF THE ARMED FORCES OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "Section 14 of Republic Act 7077 is hereby amended to read as follows: \"Sec. 14. Optional Military Registration and Training. - All male citizens between the ages of eighteen (18) and twenty-five (25) years who are not reservists shall have the option to register for a Community Service Development Instruction or a Military Instruction. Registration shall take place in suitable registration places to be prescribed by the city or municipal government between the dates of April First and Seventh commencing one (1) year after the effectivity of this Act. Biennal registrations shall be held during the same period in succeeding years."
