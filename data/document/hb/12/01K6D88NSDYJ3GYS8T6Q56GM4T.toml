congress_website_title = "AN ACT AMENDING SECTION 31 OF REPUBLIC ACT NO. 6770, OTHERWISE KNOWN AS `THE OMBUDSMAN ACT OF 1989', AS AMENDED, ALLOWING LAWYERS TO ACT AS SPECIAL INVESTIGATOR OR PROSECUTOR ON BEHALF OF THE OMBUDSMAN"
congress_website_abstract = "The Ombudsman may utilize the personnel of his office and/or designate or deputize any fiscal, state prosecutor or lawyer in the government services and any private lawyer to act as special investigator or prosecutor to assist in the investigation and prosecution of certain cases. Those designed and deputized to assist him herein provided shall be under his supervision and control."
