congress_website_title = "AN ACT AUTHORIZING THE NATIONAL TELECOMMUNICATI ONS COMMISSION (NTC) TO REGULATE, CONTROL AND MONITOR THE SALE OF SUBSCRIBER INFORMATION MODULE (SIM) PACKAGES OF CELLULAR PHONES AND PRESCRIBING PENALTIES FOR ANY VIOLATION THEREOF"
congress_website_abstract = "The National Telecommunicati ons Commisstion (NTC) is hereby authorized to regulate, control and monitor the sale of subscriber information module (SIM) packages of cellular phones in order to identify the true and real owners thereof. > Every cellular phone dealer shall issue an invoice for each sale of SIM package. The invoice state name and address of the purchaser or subscriber, the kind, standard and serial number of the particular SIM package purchased or subscribed."
