congress_website_abstract = "This proposed measure shall apply to government personnel retired under R.A. 660, P.D. 1146, R.A. 7699 who are 70 years or older. > Salient provisions of this bills are: (1) Special Additional Basis for Computation for Retired Public School Teacjers; (2) Change of Mode of Retirement; (3) Additional Benefits for Pensioners 70 years or older; (4) Grant of Career's Allowance; and (5) Survivors Benefits."

