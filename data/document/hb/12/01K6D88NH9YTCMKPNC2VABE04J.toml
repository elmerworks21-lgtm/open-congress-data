congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A CONGRESSIONAL DISTRICT OFFICE IN EVERY POLITICAL DISTRICT IN THE PHILIPPINES, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The district Members of the House of Representatives , as distinguished from those from the party-list, represent a definite political subdivision - the District. He is a local leader, inasmuch as he represents the interests of his constituents in the halls of congress and before departments and agencies of government. But he is also a national stakeholder, in that, in performing his duties he is not limited to promoting only parochial concerns and can take up issues and causes thataffect other localities or the entire country as well. With all these concerns on his burden, it is not surprising that the Congressman is, perhaps, the most visited public official, especially when he is in his district."

