congress_website_title = "AN ACT PROVIDING INSURANCE BENEFITS TO BARANGAY TANODS, CREATED OR APPOINTED IN EACH BARANGAY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6942, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to include barangay tanods created or appointed in each barangay under the insurance coverage for government officials as enshrined in Republic Act No. 6924. Rationale: Even though exposing themselves to various hazards and sometimesrisking and even sacrificing their lives as they perform their duties, these barangay tanods are deprived from sufficient protection from the government and are not receiving the proper recognition they truly deserved.> To correct this fact, barangay tanods should be given an insurance benefits of their courage, sacrifices and unrelenting effort in assisting barangay officials in the achievement of their mandated duties and responsibilitie s."

