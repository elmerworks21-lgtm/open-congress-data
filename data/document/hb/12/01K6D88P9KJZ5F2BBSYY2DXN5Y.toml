congress_website_title = "AN ACT REDEFINING THE CRIME OF SEXUAL HARASSMENT AND EXPANDING ITS COVERAGE, PROVIDING STIFFER PENALTIES FOR VIOLATORS THEREOF, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SEVENTY-EIGHT SEVENTY-SEVEN, OTHERWISE KNOWN AS ANTI-SEXUAL HARASSMENT ACT AND FOR OTHER PURPOSES"
congress_website_abstract = "Reports indicate that sexual harassment cases remain common place. They also reveal that government agencies, schools and private companies still have to comply with the requirements in RA 7877 (Anti-Sexual Harassment Act)for these institutions to formulate guidelines on sexual harassment and convene a Committee on Decorum to process complaints. To strengthen the law and make it more effective, the bill proposes to redefine the crime of sexual harassment and expand its coverage to include those that occur in situations outside the work and education environments."

