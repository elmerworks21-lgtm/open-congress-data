congress_website_title = "AN ACT PROVIDING HIGHER COMPENSATION TO VICTIMS OF UNJUST IMPRISONMENT OR DETENTION AND VICTIMS OF VIOLENT CRIMES, AMENDING FOR THE PURPOSE SECTION 4 OF REPUBLIC ACT NO. 7309, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill provides that those who were unjustly imprisoned or detained for less than five (5) years shall be entitled to receive P1,000.00 for every month of such imprisonment. However, for those who where imprisoned for more than five (5) years areentitled to claim P2,000.00 for every month of such imprisonment or detention. While the compensation for the victims of violent crimes is increased from P10,000.00 to P100,000.00 considering the high cost of hospitalization and medical treatment.>The bill likewise, provides for psychiatric and medical treatment in any government hospital for those victims of unjust imprisonment and violent crimes for them to recover from their psychological or emotioal trauma."
