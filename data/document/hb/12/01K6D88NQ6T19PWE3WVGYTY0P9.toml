congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1185, OTHERWISE KNOWN AS THE `FIRE CODE OF THE PHILIPPINES', PROVIDING FOR THE EFFECTIVE IMPLEMENTATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "It is imperative that Congress institute measures which shall strengthen the accountability of the public officers entrusted with the duty of implementing the Fire Code. Public interest demands that stricter penalties shall be imposed, not only uponthe owner, administrator, occupant or persons responsible for the condition of the building, structure and their premises or facilities, but also to the public officers concerned. The country can never afford to experience the same fatal tragedy onaccount of a public officers' negligence, malfeasance or misfeasance to his duties. >This bill proposes to amend the Fire Code of the Philippines by providing not only administrative sanctions, but criminal penalties as well, to the acts or omissionss of a public officer, when the same, either through negligence or malice resulted to, or failed to prevent the loss of life and/or damage to property."

