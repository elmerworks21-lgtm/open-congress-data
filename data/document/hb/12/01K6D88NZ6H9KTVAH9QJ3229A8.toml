congress_website_title = "AN ACT PROVIDING FOR A NATIONAL MEDICAL CHECK-UPS FOR CARDIOVASCULAR DISEASES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: In the Philippines, chronic rheumatic heart disease, followed by CARDIOVASCULAR DISEASES (CVD), is among the common heart-related causes of death among adult patients in general hospitals. Data at the Philippine Heart Center and the Department of Health show that the prevalence of coronary heart disease is now one among the top 5 leading causes of death in the country. > The high incidence of cardiovascular diseases has prompted the Cardiology specialists of the Philippines to propose that all persons, both children and adults undergo regular check-ups."

