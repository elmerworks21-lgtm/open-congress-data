congress_website_title = "AN ACT CREATING A ROAD DEVELOPMENT AUTHORITY, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "There is hereby created a body corporate to be known as \"Road Development Authority\", which shall be attached to the Office of President and charged primarily for the construction and/or rehabilitation, maintenance and operation of selected and desirable infrastructure projects that complement the overall national development efforts, where there are no takers from the private sector. The principal office of the Authority shall be located in Metropolitan Manila, but it may establish offices elsewhere in the Philippines as may become necessary for the proper and efficient conduct of its business."
