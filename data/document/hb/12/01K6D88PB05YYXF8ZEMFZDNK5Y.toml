congress_website_title = "AN ACT REQUIRING ALL OWNERS OR OPERATORS OF TELEVISION NETWORKS OR STATIONS AND PRODUCERS OF TELEVISION NEWS PROGRAMS TO BROADCAST THEIR NEWS PROGRAMS WITH SUBTITLES AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Television and motion pictures are the most popular means of communication in the world. They influence the lives of many people. Unfortunately, individual with hearing impairment are denied the opportunity to fully enjoy and appreciate watching television or viewing a film. This bill seeks to require all franchise holders, operators and producers of domestic television stations and television programs, home video programs and motion pictures to air their programs and films with closed captions for the benefit of the hearing impaired."
