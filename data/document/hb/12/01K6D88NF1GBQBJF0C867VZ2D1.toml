congress_website_title = "AN ACT ESTABLISHING A CREDIT ASSISTANCE PROGRAM FOR OVERSEAS WORKERS"
congress_website_abstract = "An overseas contract worker with a valid contract through/from an accredited employment of the POEA may avail of a loan of not more than Fifty Thousand Pesos (P50,000.00) from the Overseas Worker Welfare Administration (OWWA) to defray the living expenses of his family during the first months of absence as well as recruitment expenses including placement fees, documentation costs and plant tickets. Mode of payment and sanctions are, likewise, provided."
