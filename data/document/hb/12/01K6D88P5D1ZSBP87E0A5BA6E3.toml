congress_website_title = "AN ACT TO STRENGTHEN AND REFORM THE SANGGUNIANG KABATAAN, AMENDING FOR THAT PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Sangguniang kabataan Reform Law of 2002.\" This bill seeks to amend RA 7160 to strengthen and reform the Sangguniang Kabataan. This bill will, among others: (1) grant the SK at least twenty percent (20%) of the general fund of the barangay; (2)grant the SK Chairman a monthly honoraria or salary corresponding to that received by other members of the Sanggunian in which he sits as an Ex-officio Member and the SK Kagawads a monthly honoraria equivalent to ten percent (10%) of the honorarium received by the SK Chairman; and (3) grant the SK the power to prescribe the term of office, manner of election, removal, suspension and disciplinary action of the officers and members as government by the Constitution and By-laws of the Sangguniang KKabataan."
