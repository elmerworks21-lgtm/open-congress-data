congress_website_title = "AN ACT AMENDING SECTIONS 61, 62, 63 AND 65 OF REPUBLIC ACT NO. 6975 PLACING FOR THE PURPOSE THE PROVINCIAL JAILS UNDER THE JURISDICTION OF THE BUREAU OF JAIL MANAGEMENT AND PENOLOGY (BJMP) APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The jail bureau shall exercise supervision and control over all provincial, sub-provincial, district, city and municipal jails. [The provincial jails shall be supervised and controlled by the provincial government within its jurisdiction, whose expenses shall be subsidized by the national government for not more than three (3) years after effectivity of this act.] Jails do not include detention centers located and being maintained by the Armed Forces of the Philippines (AFP) and Philippine National Policy (PNP) camps."

