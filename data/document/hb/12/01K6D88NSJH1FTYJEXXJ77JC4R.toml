congress_website_title = "AN ACT IMPOSING PENALTIES FOR THE REPLICATION AND DISTRIBUTION OF COMPACT DISCS, VIDEO COMPACT DISCS AND SIMILAR FORMATS BELONGING TO THE SAME CLASS WITHOUT AUTHORITY OF THE COPYRIGHT HOLDER"
congress_website_abstract = "Rationale: Unauthorized reproduction of local and foreign audio and video materials has become widespread and unabated in the Philippines today. One can avail of a compact disc or video compact disc at a price of fifty pesos or less, a fact, whichis inimical to the national interest. As a result of this endemic piracy, the entire entertainment industry, consisting of film and music production has suffered a drastic fall in sales revenues, resulting in unemployment and falling capital investment."
