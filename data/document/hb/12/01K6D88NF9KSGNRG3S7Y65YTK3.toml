congress_website_title = "AN ACT CREATING THE DEPARTMENT OF INFORMATION TECHNOLOGY DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Recognizing the importance of and in keeping pace with the upsurge of modern information technology, the creation of a Department of Information Technology is expedient in response to our country's need for effective governance, successful business and world competitiveness . It will also pave the way to functional streamlining that will address the new phenomenon of the convergence and other emerging technologies such as broadcast, other telecommunicati ons and computers."

