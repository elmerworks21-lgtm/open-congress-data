congress_website_title = "AN ACT INSTITUTIONALIZ ING NEWBORN SCREENING AS PART OF ROUTINE NEWBORN CARE IN NATIONWIDE HEALTH DELIVERY SYSTEM OF THE PHILIPPINES"
congress_website_abstract = "\"Newborn Screening Act of the Philippines of 2003\" The right of the newborn to be provided proper health care finds anchor in the 1987 Constitution. This bill proposes to institutionaliz e a National Newborn Screening System that is comprehensive,integrative and sustainable, and will facilitate collaboration among government and non-government agencies at the national and local levels, the private sector, families and communities, professional health organizations, academic institutions and non-governmenta l organizations. It shall ensure that every baby born in the Philippines is offered the opportunity to undergo newborn screening and thus be spared from heritable conditions that can lead to mental retardation and death if undetected aand untreated."
