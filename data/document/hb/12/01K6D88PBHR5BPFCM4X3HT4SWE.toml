congress_website_title = "AN ACT AMENDING SECTION 34 (h) OF REPUBLIC ACT NO. 4136 OR THEREBY REQUIRING THE MANDATORY COMPLIANCE BY ALL MOTORCYCLE OPERATORS, DRIVERS, RIDERS AND/OR PASSENGERS TO WEAR SAFETY HELMETS"
congress_website_abstract = "\\\"Motorcycle Helmets Use Act of 2004\\\". Motorcycle helmets are specifically designed to cushion and protect motocycle riders' heads from the impact of a crash and thereby prevent or at least minimize brain injuries. This bill renders as unlawful for any motorist, without reasonable and verifiable excuse, to operate or drive and ride on any motorcycle on all roads without wearing a safety helment of an approved type. It also stipulates the minimum safety standards which must be conformed with by all manufacturers and distributors of safety helmets."
