congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NO. 7077 TO MAKE THE RESERVE OFFICERS' TRAINING COURSE (ROTC) AN OPTIONAL RATHER THAN A MANDATORY COURSE FOR STUDENTS ENROLLED IN COLLEGES, UNIVERSITIES AND OTHER SIMILAR INSTITUTIONS OF LEARNING ANDFOR OTHER PURPOSES"
