congress_website_title = "AN ACT CHANGING THE NOMENCLATURE OF THE MEMBERS OF THE CUSTODIAL FORCE OF THE BUREAU OF CORRECTIONS AND ADJUSTING THEIR SALARY GRADES ACCORDINGLY AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Bureau of Corrections Custodial Force Act of 2003\\\". This bill proposes that the present title \\\"Prison Guard\\\" attached to the ranks of the Custodial Force of the Bureau of Corrections be changed to \\\"Corrections Officer. The proposed title, \\\"Corrections Officer\\\", conforms to the idea that the correctional world is no longer the punitive and vindictive type but more on human understanding motivated by hope and justice. the bill also seeks to adjust the salary grades of the members of the Custodial Force to the same level being enjoyed by the uniformed personnel of the Philippine National Police, the Bureau of Fire Protection, the Bureau of Jail Management and Penology and by public school teachers."

