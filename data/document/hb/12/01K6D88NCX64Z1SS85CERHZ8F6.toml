congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC PROMOTION OF GOVERNMENT EMPLOYEES UPON THEIR COMPULSORY OR OPTIONAL RETIREMENT, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "All government officials and employees upon their compulsory or optional retirement from the government service shall be granted automatic promotion equivalent to one rank higher than her/his position at the time of retirement. For this purpos, theadjusted salary grade level of the retiree shall be used as basis for computation of his/her retirement benefits."

