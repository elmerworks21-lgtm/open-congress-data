congress_website_title = "AN ACT IMPOSING A TEN PERCENT (10%) COMPUTER EDUCATION TAX ON RECEIPTS (EXCLUDING VALUE-ADDED TAX) FROM CELLULAR PHONE CALLS TO BE BORNE BY CELLULAR PHONE COMPANIES, CREATING A SPECIAL COMPUTER LITERACY EDUCATION FUND FOR PUBLIC SCHOOLS, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposes to impose a fifty-centavo tax on everu call charged by a cellular company to its subscribers to start-up and finance the computer literacy education program in public schools nationwide. Our public schools should very well producequality and computer-litera te graduates. It is the call of the times, our youth need not lag behind their counterparts in the private schools and other countries so as to maintain the high literacy level our people should have in this era of Information Technology."

