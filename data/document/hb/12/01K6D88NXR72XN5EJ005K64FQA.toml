congress_website_title = "AN ACT PROVIDING ADDITIONAL EXEMPTION OF TWENTY THOUSAND PESOS (P20,000.00) FOR MARRIED INDIVIDUALS WHOSE SPOUSE IS A NONWORKING SPOUSE, AMENDING FOR THE PURPOSE SECTION 35(A) OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE TAX REFORM ACT OF 1997"
congress_website_abstract = "Rationale: Many non-working spouses are college graduates and some have college units but opted not to work and decided to stay home to take of the childre. These people value their family very much instead of working to earn more money. Just as theState recognizes the Filipino family as the foundation of the nation, it is but fitting to provide these citizens (the non-working spouses who take care of the family) a tax relief by granting them additional individual tax exemption of P20,000.00."

