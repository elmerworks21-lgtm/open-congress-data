congress_website_title = "AN ACT PROHIBITING PROVIDERS OF ELECTRIC LIGHT, HEAT AND POWER, AND WATER SUPPLY FROM CHARGING CUSTOMERS WITH EXPENSES OTHER THAN THE AMOUNT CORRESPONDING TO THE REASONABLE VALUE OF THE PUBLIC SERVICE RENDERED"
congress_website_abstract = "\\\"Fair Public Services Act of 2004\\\". This bill seeks to protect consumers from arbitrary increases in the rates of essential services and utilities. It prohibits providers of electric light, heat and power, and water supply from charging customers with service charges and with expenses other than the amount corresponding to the reasonable value of the public service rendered."

