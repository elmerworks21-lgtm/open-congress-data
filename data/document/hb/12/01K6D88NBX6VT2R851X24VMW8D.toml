congress_website_title = "AN ACT PROVIDING FOR THE PROCLAMATION OF ELECTED CANDIDATES WHEN NINETY PERCENT (90%) OF THE VOTES IN ANY PROVINCE, CITY OR MUNICIPALITY HAVE ALREADY BEEN CAST, AMENDING FOR THE PURPOSE SECTION 6 OF BATAS PAMBANSA BLG. 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: Experience shows that during the 1987, 1992 and 1995 elections, proclamation of elected Senators, Members of House of Representatives and local officials was marred with delays because of the failure of elections, particularly in some towns in Mindanao. The whole nation was held hostage to said special elections. Thus, this bill seeks to authorize the canvassing of returns and proclamation of winners of the electoral race when at least ninety percent of the votes in any province, city or municipality have already been cast. Under the measure, special elections shall no longer be called and the canvass and proclamation will proceed accordingly. This will greatly avert practice of candidated to engage in massive fraudulent and corrrupt activities to get votes from the remaining electorate."
