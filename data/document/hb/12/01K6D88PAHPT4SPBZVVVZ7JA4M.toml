congress_website_title = "AN ACT PROVIDING FOR THE ABOLITION OF JOB ORDER SCHEME OF EMPLOYMENT IN THE GOVERNMENT, INCLUDING GOVERNMENT-OWNED OR -CONTROLLED CORPORATIONS, TOGETHER WITH THE CONTRACTUALIZATION SCHEME OF EMPLOYMENT IN PRIVATE COMPANIES, FIRMS AND CORPORATIONS"
congress_website_abstract = "The job order scheme of employment is, basically, temporary in nature and is dependent upon the presence of a job order. Once the job is completed, employment is automatically terminated. This scheme has been abused by local government units and the practice has likewise been adopted by private firms. This bill seeks to abolish the job order scheme of employment in the government, including government-owned or controlled corporations, together with the contractualization scheme of employment in private companies, firms and corporations."

