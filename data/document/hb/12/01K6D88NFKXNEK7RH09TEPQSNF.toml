congress_website_title = "AN ACT REQUIRING BLOOD BANK INSTITUTIONS, HOSPITALS OR HEALTH FACILITIES TO CONDUCT PRELIMINARY BLOOD EXAMINATIONS ON ALL BLOOD DONORS PRIOR TO THE ACT OF DONATION, PRESCRIBING STIFFER PENALTIES FOR VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "All government and privately-owned commercial blood banks, hospitals or health facilities shall be required to conduct thorough preliminary blood examinations on all blood donors prior to the act of donation. Any result which indicates positive contamination of any dreaded virus or disease in blood samples of a prospective donor shall be reported immediately to proper authorities of the Department of Health (DOH)."
