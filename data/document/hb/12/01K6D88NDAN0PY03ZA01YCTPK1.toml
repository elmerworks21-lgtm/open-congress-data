congress_website_title = "AN ACT REVERTING TO THE NATIONAL GOVERNMENT THE DISCHARGE OF BASIC AGRICULTURAL FUNCTIONS AND RESPONSIBILITIE S DEVOLVED TO LOCAL GOVERNMENT UNITS AND AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: The recent passage of Republic Act No. 8435, otherwise known as the Agriculture Modernization Act of 1997, makes it imperative that the Department of Agriculture, the lead department tasked to implement the law, for its monitoring and data gathering requirements, shall have complete administrative control and supervision over all personnel in the field level that are involved in agriculture and fishery, in order that all effectively implement and achieve the objectives of the Agriculture and Fishery Law."
