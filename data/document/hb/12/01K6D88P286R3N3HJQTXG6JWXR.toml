congress_website_title = "AN ACT AMENDING SECTIONS 6, 11, 21, 34, 47, 50 AND 51 OF THE REPUBLIC ACT NO. 9136, OTHERWISE KNOWN AS THE ELECTRIC POWER INDUSTRY REFORM ACT OF 2001"
congress_website_abstract = "Rationale: Inordinately expensive power charges have inflated the already rising Filipino cost of living. The national clamor against the imposition of the Purchased Power Adjustment must be addressed not only by executive initiatives but by legislation mitigating the impact of said Purchased Power Adjustment or in the provinces, the Power Cost Adjustment. Hence, there is a need to review and amend of the electric Power Industry Reform Act of 2001.> This bill proposed amendments to RA No. 9136,the Electric Power Industry Reform Act of 2001."
