congress_website_title = "AN ACT TO REGULATE AND MODERNIZE THE PRACTICE OF CHEMISTRY IN THE PHILIPPINES, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 754"
congress_website_abstract = "\"Chemistry Law of 2002\". The proposed new Chemistry Law seeks to INTRODUCE the following important CHANGES: (1) Update the definition of the professional practice of chemistry; (2) Redefine the scope of the professional practice of chemistry; (3) Redefine the practice of the chemical technician; (4) Rationalize the relationship between chemistry and related professions.; (5) Strengthen the linkage between the training of chemists and the professional practice of chemistry; (6) Strengthen the authority of the Board of Chemistry to supervise chemistry laboratories and other entities which practice chemistry to ensure that the minimum quality standards are maintained; (7) Introduce a requirement for Continuing Professional Education (CPE) forr the continuous training of professional chemists; and (8) Bring the new law in line with the new PRC law of 2000."

