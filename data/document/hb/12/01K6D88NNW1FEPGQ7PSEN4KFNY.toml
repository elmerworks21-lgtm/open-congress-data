congress_website_title = "AN ACT INCLUDING LIQUEFIED PETROLEUM GAS (LPG) IN THE LIST OF BASIC NECESSITIES AS DEFINED UNDER SECTION 3 OF REPUBLIC ACT NO. 7581, OTHERWISE KNOWN AS THE PRICE ACT OF THE PHILIPPINES"
congress_website_abstract = "Section 3, paragraph (1) of Republic Act No. 7581 is hereby amended to read as follows: >\"SEC. 3. Definition of Terms. - For purposes of this Act, the term: (1) \"Basic necessities\" includes: rice, corn, bread; fresh, dried and canned fish and othermarine products, fresh pork, beef and poultry meat, fresh eggs; fresh and processedmilk; fresh vegetables; root crops; coffee; sugar; cooking oil; salt; laundry soap; detergents; firewood; charcoal; LIQUEFIED PETROLEUM GAS (LPG); candles; and drugsclassified as essential by the Department of Health;"
