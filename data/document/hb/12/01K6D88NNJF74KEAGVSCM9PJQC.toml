congress_website_title = "AN ACT GRANTING A LUMPSUM BENEFIT AND OTHER ASSISTANCE SERVICES TO SURVIVORS OF WORLD WAR II VETERANS WHO HAVE DIED PRIOR TO THE ENACTMENT OF REPUBLIC ACT NO. 6948, AS AMENDED"
congress_website_abstract = "Dependent of World War II veterans who have died prior to the enactment of Republic Act No. 6948, as amended, shall be granted the following benefits and assistance services: (1) A lump-sum benefit amount to P30,000.00; (2) Hospitalization , medicalcare and treatment at the Veterans Memorial Medical Center following the provisions of Section 15, Republic Act No. 6948, as amended; and (3) A Philippine flag to honor the deceased veteran. > \"Dependents\" for this purpose refer to the surviving spouses or children following the law of succession."

