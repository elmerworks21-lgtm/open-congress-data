congress_website_title = "AN ACT PROVIDING FOR A SEPARATE COMPENSATION SCHEME FOR LAWYER POSITIONS IN THE OFFICE OF THE SECRETARY OF JUSTICE, DEPARTMENT OF JUSTICE, THEREBY EXEMPTING THE SAID POSITIONS FROM REPUBLIC ACT NO. 6758, OTHERWISE KNOWN AS THE SALARY STANDARDIZATIONLAW"
congress_website_abstract = "Any provisions of law to the contrary notwithstanding , all lawyer positions under the Office of the Secretary of Justice, which shall include but not limited to the Secretary, Undersecretarie s, Assistant Secretaries, members of the National Prosecution Service and members of the Legal Staff shall be exempt from the coverage of the Salary Standardization Law Republic Act No. 6758.> The Secretary of Justice is hereby authorized to prepare a compensation structure for said lawyer positions whichshall be based on a comprehensive job analysis and audit of actual duties and responsibilitie s and shall be comparable with the prevailing compensation plan in practice of the legal profession in the private sector. Such compensation plan shall besubject to the approval by the President."
