congress_website_abstract = "\"Computer Education Act of 2002\". This bill seeks to allow our educational system the proper environment to keep pace with global modernization. Through integrating computer education into the elementary and high school curricula , it will hope toensure that computers, CD Roms, Internet access and other advanced tools of communication and instruction shall be as common to Filipino classrooms as they are in most of modernized areas all over the world."
