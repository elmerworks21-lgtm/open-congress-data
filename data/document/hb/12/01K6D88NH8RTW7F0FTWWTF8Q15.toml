congress_website_title = "AN ACT STRENGTHENING BASIC EDUCATION, REDEFINING THE ORGANIZATIONAL AND MANAGEMENT STRUCTURE OF THE DEPARTMENT OF EDUCATION, CULTURE AND SPORTS, THEREBY RENAMING IT INTO DEPARTMENT OF EDUCATION, ESTABLISHING STANDARDS IN THE GOVERNANCE OF BASIC EDUCATION, PROVIDING FOR THE SCHOOL IMPROVEMENT FUND APPROPRIATING FUNDS, THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill endeavors to reorganize the present Department of Education, Culture and Sports (DECS) in order to usher in a better organized and systematic machinery in the administration, implementation and delivery of carefully planned programs and projects of basic education. With the reorganization of the DECS, the Department is envisioned to be a more efficient and effective organization in ensuring a quality and responsive basic education and produce upright and more productive individuals inthe new millenium."

