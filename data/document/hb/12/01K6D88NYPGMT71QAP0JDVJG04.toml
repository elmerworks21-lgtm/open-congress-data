congress_website_title = "AN ACT RECOGNIZING THE RETENTION OF PHILIPPINE CITIZENSHIP BY THOSE WHO ACQUIRED FOREIGN CITIZENSHIP, GRANTING THEM DUAL CITIZENSHIP, THE RIGHT TO VOTE, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Dual Citizenship Act of 2002\". This bill seeks to remedy the apparent unjust treatment suffered by our expatriates and overseas workers and their families who are considered second class citizens in their own homeland by extending them dual citizenship and enabling them to enjoy full civil and political rights such as the right of suffrage/or to voted for public office under certain conditions. > It is the policy of the State that natural-born Filipino citizens are not automatically deprived of their Philippines citizenship by their acquisition of another foreign citizenship. They continue to be Filipino citizens with dual citizenship."
