congress_website_title = "AN ACT MANDATING THE COMPULSORY INCLUSION IN THE CURRICULUM OF ALL SECONDARY SCHOOLS, PUBLIC OR PRIVATE, OF A SUBJECT ON \\\"LOCAL GOVERNANCE AND THE LOCAL GOVERNMENT CODE\\\", AND FOR OTHER PURPOSES"
