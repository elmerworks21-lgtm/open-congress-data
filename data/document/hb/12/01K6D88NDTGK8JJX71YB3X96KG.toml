congress_website_title = "AN ACT PROHIBITING AND PENALIZING THE EMPLOYMENT OF CHILDREN IN ANY PUBLIC OR PRIVATE UNDERTAKING OR OCCUPATION WHICH IS CONSIDERED HAZARDOUS TO THEIR LIFE, SAFETY, HEALTH AND MORALS, OR WHICH UNDULY INTERFERES WITH THEIR NORMAL DEVELOPMENT AND FOROTHER PURPOSES"
congress_website_abstract = "Rationale: It is a well-known fact that, in the Philippines and even in other advanced countries, a signifcant number of chidlren are indiscriminatel y made to participate in economic activities at very young ages. Unscrupulous employers take advantage of their predicament -- luring them to work in industries which are clearly hazardous even by adult standards, where they are practically forced to be engaged in every imaginable work and labor under questionable working conditions. While a few of these children have learned to disengage themselves from the grips of those abusers, the greater number have succumbed to the ill effects of such premature, hazardous and misguided employment."
