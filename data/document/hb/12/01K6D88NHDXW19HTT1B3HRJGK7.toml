congress_website_title = "AN ACT REQUIRING ALL FRANCHISE OF GRANTEES USING WIRES AND CABLES IN THE OPERATION OF THEIR BUSINESS WITHIN THE PHILIPPINES TO PLACE THEIR WIRE AND CABLE CONNECTIONS UNDER THE GROUND, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "\"Undergriund Wiring Act of 2001.\" Rationale: It is hereby declared to be the policy of the State to protect and safeguard the interests of the public against the hazard posed by aerial wire and cable installations of public utility firms, especially during and after the occurrence of natural calamities such as typhoons and earthquakes and such other similar catastrophies."

