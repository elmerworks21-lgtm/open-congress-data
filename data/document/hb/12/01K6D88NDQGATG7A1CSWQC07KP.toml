congress_website_title = "AN ACT REGULATING THE OWNERSHIP, POSSESSION, SALE, IMPORTATION AND USE OF CHAIN SAWS, PENALIZING VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It takes more than fifty (50) years to grow a Phiilippine mahogany tree into harvestable size but it takes less than five (5) minutes to fell and buck the same tree into logs with the use of a chainsaw. A chainsaw, therefore, becomes a handy tool for illegal loggers and even professional kaingineros to advance their trade. Skilled operators of chainsaws use the machine not only for cutting down trees but also for sawing the logs into tablon or rough lumber."
