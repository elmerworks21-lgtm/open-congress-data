congress_website_title = "AN ACT COMPELLING INTERMEDIATE GRADE SCHOOLERS, SECONDARY AND COLLEGE STUDENTS TO DO COMMUNITY WORK AS PART OF THEIR CURRICULUM AND AS PREREQUISITE FOR GRADUATION"
congress_website_abstract = "All intermediate grade schoolers, secondary and college students are hereby required to do community work as part of their school curricula and as pre-requisite for graduation. Community work refers any task or toil in helping others in the community in ways such as cleaning out parks, ponds, planting trees, helping others to read, or improving communal playgrounds and other similar actions for the welfare of the community."
