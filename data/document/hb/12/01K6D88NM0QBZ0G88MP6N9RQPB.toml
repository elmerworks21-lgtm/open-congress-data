congress_website_title = "THE MAGNA CARTA FOR SENIOR CITIZENS"
congress_website_abstract = "This bill seeks to integrate into a national comprehensive plan socio-economic and political rights of older persons. It also aims to create a \"National Council for the Welfare of Senior Citizens (NCWSC).\" This Council shall act as a central authority that would direct, coordinate and integrate the planning, management and implementation of all activities, national and local, public and private, pertaining to the welfare and rights of the elderly, in a manner which will ensure maximum and efficient utilization of human and natural resources."
