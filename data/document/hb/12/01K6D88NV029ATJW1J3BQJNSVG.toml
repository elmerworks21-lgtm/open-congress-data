congress_website_title = "AN ACT EXTENDING FOR A PERIOD OF FIVE (5) YEARS ENDING ON DECEMBER 31, 2005 THE FILING OF APPLICATIONS FOR FREE PATENT AND JUDICIAL CONFIRMATION OF IMPERFECT TITLE TO ALIENABLE AND DISPOSABLE LANDS OF THE PUBLIC DOMAIN UNDER CHAPTERS VII AND VIII OFTHE PUBLIC LAND ACT (CA 141, AS AMENDED)"
congress_website_abstract = "In order to attain social justice in all phases of national development, especially in agriculture, it is necessary that farmers and settlers be given all the changes to acquire clean and clear titles to the lands they have cultivated and settled in. Thus, they can continue their stewardship of such lands with confidence, assured that whatever they put into these lands - time, money and efforts - shall redound to their benefits. Such confidence may, in turn, make them more resourceful and moreindustrious. One way to give them confidence is to extend the period for filing application for free patent and judicial confirmation of imperfect title to alienable and disposable lands of the public domain to another five years ending on December 331, 2005."
