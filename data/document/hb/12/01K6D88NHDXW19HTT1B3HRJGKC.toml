congress_website_title = "AN ACT TO ACHIEVE SELF-RELIANCE IN THE COUNTRY'S ENERGY REQUIREMENTS THROUGH THE EXPLOITATION OF NON-CONVENTIONA L ENERGY RESOURCES SUCH AS, BUT NOT LIMITED TO, BIOMASS, SOLAR, WIND, MICROHYDRO AND OCEAN ENERGY PROVIDING INCENTIVES FOR DEVELOPERS, MANUFACTURERS AND USERS OF NON-CONVENTIONA L ENERGY SYSTEMS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Non-conventiona l Energy Program Act of 2001.\" Rationale: In the Philippines there is an inexhaustible energy sources such as, but not limited to, biomass, solar, wind, microhydro and ocean energy which can bring eocnomic, social, and environmental benefits to the country. To achieve self-reliance in the country's energy requirements, there is a need to exploit these non-conventiona l energy resources."

