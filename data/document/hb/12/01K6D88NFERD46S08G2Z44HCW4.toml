congress_website_abstract = "In keeping with the constitutional mandate and addressing the needs of the elderly, this proposed bill seeks to formulate a national comprehensive plan and delineate the socio-economic and political rights of older persons, which emphasizes their empowerment, dignity, self-reliance, care, rehabilitation and productivity aging."
