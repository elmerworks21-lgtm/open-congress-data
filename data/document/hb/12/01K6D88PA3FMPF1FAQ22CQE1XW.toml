congress_website_title = "AN ACT AMENDING TITLE FOUR OF BOOK FOUR OF THE LABOR CODE OF THE PHILIPPINES PROVIDING FOR WOMEN AND GENDER EDUCATION IN THE WORKPLACE"
congress_website_abstract = "A citizenry aware and enlightened on women's rights, welfare and development and gender equality is better equipped to promote and protect women, prevent crimes against women and eliminate gender and sex discrimination and inequality. The bill seeks to require every employer to give their workers and employees free annual education seminars on women's rights, welfare, development and gender equality, R.A. 7877 (anti-Sexual Harassment Act of 2003) and R.A. 9208 (Anti-Trafficking in Person Act of 2003) in the workplace."

