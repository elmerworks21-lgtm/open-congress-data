congress_website_title = "AN ACT LOWERING RETIREMENT AGE OF GOVERNMENT EMPLOYEES, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED EIGHTY-TWO HUNDRED AND NINETY-ONE, OTHERWISE KNOWN AS THE REVISED GSIS ACT OF 1997"
congress_website_abstract = "Rationale: The present retirement age of sixty five and sixty years for government employees could hardly be rewarding to them since they would no longer enjoy the fruits of their retirement. At that age, retirees would either be too old, too weak or too sickly. Reaping the rewards of his government service at a much earlier age enables the retiree to have a better chance of starting a new career. A younger retiree can prepare himself for a new life such as venturing into his own business or further utilizing his talent for private enterprise. His economic value would be much higher rather than if was sixty-five years of age."

