congress_website_title = "AN ACT TO PROVIDE FOR A COMMUNITY SERVICE PROGRAM FOR CONVICTED PRISONERS, CREATING FOR THE PURPOSE COMMUNITY SERVICE CAMPS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Community Service Program Act.\" Rationale: Exposure to almost normal conditions outside of these prison walls is an opportunity for the convicts to see a better side in life and for the community to benefit from the labor that these convicts can contribute to society. These can also help the convicts as time spent outside the prison walls prevents them from become hardened criminals. It is the hope of the proponent that convicted offenders of less grave offenses need not serve their sentencesin prison but in Community Work Camps where their services can become beneficial to the community and assure the convicts rehabilitation and integration into society."

