congress_website_title = "AN ACT AMENDING ARTICLE 96, CHAPTER 3, AND ARTICLE 124, CHAPTER 4, TITLE IV OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "The following is the proposed amendment to Article 96 and 124 of the Family Code: \"The administration and enjoyment of the community property shall belong to both spouses jointly. In case of disagreement, the husband's decision shall prevail ONLY IF THE COMMUNITY PROPERTY WAS OBTAINED THROUGH HIS SOLE EFFORTS; BUT IF THE MAJOR PORTION THEREOF OR ITS VALUE IS DERIVED FROM THE WIFE'S RESOURCES AND EFFORTS, HER DECISION SHALL PREVAIL, subject to recourse BY ANY OF THE SPOUSES for any proper remedy, which must be availed of within THIRTY DAYS (30) from the date of the contract implementing such decision."
