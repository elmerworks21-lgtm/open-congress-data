congress_website_title = "AN ACT EXTENDING THE PRESCRIPTIVE PERIOD FOR RECTIFICATION OF SIMULATED BIRTHS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8552, OTHERWISE KNOWN AS THE DOMESTIC ADOPTION ACT OF 1998"
congress_website_abstract = "Rationale: It is the fact that most \\\"adoptions\\\" in the Philippines have been and continue to be handled trough \\\"simulation of birth\\\". It is estimated that there are several hundred thousand Filipinos who have been \\\"informally: adopted in this manner. In these cases, because the assumed filiation under simulated births has no legal basis, the child, though no fault of its own, is deprived of the benefits and legal protection afforded by law to legally adopted children.> For this reason, the approval of this bill is earnestly sought."
