congress_website_title = "AN ACT IMPLEMENTING THE CONSTITUTIONAL PROVISION GUARANTEEING EQUAL ACCESS TO OPPORTUNITIES FOR PUBLIC SERVICE"
congress_website_abstract = "Rationale: Until date, however, equal access to opportunities for public service has remained a promise unfulfilled. The equally qualified potential appointees of Visayas and Mindanao have always been discriminated of appointments invital offices ofgovernment. >This bill provides that \"As far as practicable, all other officials and employees shall likewise be recruited proportionately from the provinces and cities of their origin.\""

