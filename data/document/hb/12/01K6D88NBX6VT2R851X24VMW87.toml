congress_website_title = "AN ACT PROVIDING FOR UNIFORM RETIREMENT BENEFITS FOR ALL GOVERNMENT OFFICIALS AND EMPLOYEES, PRESCRIBING PROCEDURES IN THE PROMPT PAYMENT THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: There is NO single law which governs the retirement of government officials and employees. Thus, retirement claims and benefits are embraced under several laws. One law covers the members of the Judiciary , another for the uniformed personnel of the Armed Forces of the Philippines, still another one deals with officials of the Constitutional bodies such as the Commission on Election, and still there is another law for the rest of the government workers. These laws, though providing two modes of retirement, optional and compulsory, provide DIFFERENT benefitical features and ages for retirement. Thus, the proposed bill is more in keeping with the principle of EQUITY and justice, for government personnel, whether on the top echelonn or a mere rank-and-file, are part of the government force who render service to the same institution with dedication, honesty and integrity."

