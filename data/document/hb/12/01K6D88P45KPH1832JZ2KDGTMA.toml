congress_website_title = "\"THE BUDGET IMPOUNDMENT CONTROL ACT OF 2002\""
congress_website_abstract = "This bill seeks to establish stronger legislative monitoring of fund releases by reviewing the impoundment of funds by the Executive Department to ensure timely implementation of government programs and projects. It also reasserts congressional control over the budget by centralizing and buttressing its budget-related mechanisms and thus providing limitations on the practice of presidential impoundment of funds."

