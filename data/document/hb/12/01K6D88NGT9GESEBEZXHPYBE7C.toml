congress_website_title = "AN ACT MANDATING ALL MOBILE AND LANDLINE TELEPHONE COMPANIES OPERATING IN THE PHILIPPINES TO REGISTER UNDER THE DEPARTMENT OF TRADE AND INDUSTRY (DTI) AND BUREAU OF INTERNAL REVENUE (BIR) ALL MANUFACTURED OR IMPORTED PREPAID CARDS PRIOR TO THEIR SALE AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Rationale: The sale of prepaid cards for cellular and landline telephones in the Philippines has been largely unmonitored by the Bureau of Internal Revenue. These can conveniently be bought fromm any business establishment without the benefit of records and/or receipts. These transactions, therefore, escape the imposition and payment of the proper taxes thus depriving the government of much needed revenue."

