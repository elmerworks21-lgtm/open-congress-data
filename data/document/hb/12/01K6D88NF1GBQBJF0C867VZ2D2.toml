congress_website_title = "AN ACT INCREASING THE PENALTY FOR ILLEGAL RECRUITMENT COMMITTED BY ANY PERSON WITHOUT LICENSE OR AUTHORITY, AMENDING TITLE II, ARTICLE 7 OF THE REPUBLIC ACT NO. 8042, OTHERWISE KNOWN AS THE OVERSEAS MIGRANT WORKERS' ACT AND FOR OTHER PURPOSES"
congress_website_abstract = "As we continue to suffer from the lack of employment opportunities in our shores and as we continue to promote overseas employment for our people, we likewise need to continue to strengthen our laws on illegal recruitment. This bill mandates the increase of penalty of illegal recruitment without license or authority, amending the Overseas Migrant Worker's Law."
