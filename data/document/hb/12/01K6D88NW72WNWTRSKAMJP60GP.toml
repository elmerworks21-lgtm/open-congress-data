congress_website_title = "AN ACT AMENDING SECTIONS 2, 3, 4, 5, 6, 7, 12 AND 13 OF REPUBLIC ACT NO. 7662, ENTITLED `AN ACT PROVIDING FOR REFORMS IN LEGAL EDUCATION, CREATING FOR THE PURPOSE A LEGAL EDUCATION BOARD AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Ra No. 7662 was enacted in 1993 primarily to give flesh to the declared State policy to uplift the standards of legal education. And yet, a reading of the law would reveal certain provisions that go beyond the ambit of education of aspiring lawyers and into the sphere of education of persons duly licensed to practice the law profession. These provisions do not only expand the purpose of the law - these also impinge on matters that might render their implementation constitutionaly infirm. > Events have likewise overtaken the implementation of the law. However, for a smooth implementation of the law, its objectionable provisions must be corrected. Immediate amendment of Republic Act No. 7662 bodes well for the attainment of the aiims for which it was enacted."

