congress_website_title = "AN ACT EXEMPTING ANY PERSON WHO SELLS ANY REAL PROPERTY TO THE GOVERNMENT OR ANY OF ITS POLITICAL SUBDIVISIONS OR INSTRUMENTALITI ES FROM THE PAYMENT OF CAPITAL GAINS TAX AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Certainly, one of the principal reasons why owners of lands and buildings are not enticed to sell their real properties to the government lies in the fact that under our present laws, these transactions are subject to the payment of capital gains tax on gains realized from said transactions. > Therefore, in order to encourage private owners to sell their real properties to the government; and for the government to utilize them as offices in the case of buildings, or for the construction of schools, hospitals, and other infrastructure projects in the case of lands, this representation proposes to exempt any person, natural or judicial, who sells any real property to the government or any of its political subdivision or instrumenntaliti es, from the payment of capital gains tax."

