congress_website_title = "AN ACT TO DIMINISH PATRONAGE POLITICS BY PROHIBITING SOLICITATION FROM AND THE GIVING OF FINANCIAL ASSISTANCE BY PUBLIC OFFICIALS OUTSIDE OF THEIR OFFICIAL FUNCTIONS, PROVIDING PENALTIES FOR VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Anti-Patronage Politics Act of 2003\\\". Granting patronage and soliciting special favors outside of official duty corrupts both the populace and the politician. The measure seeks to prohibit solicitations from and the giving of financial assistance by public officials outside of their official functions in order to diminish the system of patronage politics. It proposes to sanction private citizens who solicit unofficial favors from government personnel and heads and also to sanction public officials who give dole outs outside of their mandated duties. The bill distinguishes gifts of nominal value offered as tokens of friendship from items that are expressly prohibited by law."

