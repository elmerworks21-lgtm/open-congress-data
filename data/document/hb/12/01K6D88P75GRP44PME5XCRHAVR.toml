congress_website_title = "AN ACT PROVIDING FURTHER BENEFITS TO MEMBERS OF THE ARMED FORCES OF THE PHILIPPINES THROUGH THE \"SALUDO SA SUNDALO\" PROGRAM AND PROVIDING THE MECHANICS FOR ITS IMPLEMENTATION"
congress_website_abstract = "\"Saludo Sa Sundalo Act.\" Active members of the Armed Forces, stationed in combat area, shall be entitled to the following benefits: (a) The grant of 15% discount from restaurants, wet markets, supermarkets and rice dealerships anywhere in the country. (b) A discount of 20% on all purchases and admission fees from amusement and entertainment centers; (c) A discount of 15% on economy and business passenger class air transportation fees charged by private airlines. Twenty-five percent (25%) on all economy, special economy, and tourist passenger classes or their equivalent on sea transportation fees charged by private shipping lines, and 50% on all land transport passenger fees charged by bus and taxi companies; and (4) A discount of 15% onall medicines purchased at private drugstores. > The benefits under this program will be extended to qualified personnel for two (2) months for every month spent in the combat zone."

