congress_website_title = "AN ACT AMENDING SECTION 68 OF THE BATAS PAMBANSA BLG. 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "Any ELECTED OFFICIAL [candidate] who, in [an] A PROPER action or protest in which he is a party is declared by final decision of a competeent court guilty of, or found by the Commission of having (a) given money or other material consideration to influence, induce or corrupt the voters or public officials performing electoral functions; (b) committed acts of terrorism to enhance his candidacy; (c) spend in his election campaign an amount in excess of that allowed by this Code; (d) solicited, received or made any contribution prohibited under Sections 89, 95, 96, 97 and 104; or 15(e) violated of any Sections 80, 83, 85, 86 and 261 paragraphs d, e, k, v, and cc, sub-paragraph 6 (f) OR BEING A PERMANENT RESIDENT OR AN IMMIGRANT TO A FOREIGN CCOUNTRY REFUSED OR FAILED TO WAIVE HIS STATUS AS A PERMANENT RESIDENT OR AN IMMIGRANT TO A FOREIGN COUNTRY IN ACCORDANCE WITH THE RESIDENCE REQUIREMENT PROVIDED FOR IN THE ELECTION LAWS, shall be disqualified from holding the office."
