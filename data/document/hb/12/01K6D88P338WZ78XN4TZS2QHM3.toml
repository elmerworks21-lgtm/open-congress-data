congress_website_title = "AN ACT PUNISHING THE MALPRACTICE OF ANY MEDICAL PRACTITIONER IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Medical Malpractice Act of 2002\". Any medical practitioner who performs any act constituting medical malpractice or the illegal practice of surgery shall be punishable by imprisonment or fine or both and, in all instances, the cancellation of the license to practice medicine. Additional provisions are on: (1) Who may file a complaint; (2) Effect of Pardon; (3) Penalties, etc."
