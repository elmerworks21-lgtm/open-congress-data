congress_website_title = "AN ACT PROHIBITING THE IMPORTATION OF SECOND-HAND OR USED APPLIANCES AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Rationale: The importation of the second-hand or used appliances in particular, floods the local market with expensive but defective goods or its durability or quality has greatly diminished. Yet, local consumers prefer these imported goods over thelocal manufactured appliances because of the orientation among many Filipinos that \"Anything that is foreign is superior.\" Consequently, the importation of used appliances gives rise to unfair competition with domestic manufacturers."
