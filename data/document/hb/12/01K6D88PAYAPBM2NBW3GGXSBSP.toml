congress_website_title = "AN ACT RECOGNIZING THE RIGHTS OF LESBIANS AND GAYS, PROVIDING MECHANISMS FOR THE PROTECTION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Magna Carta for Lesbians and Gays\\\". Despite many international and national legal prohibitions, discrimination against cultural minorities, children, women, migrants, the disabled and people who have other sexual orientation is still pervasive in our society. Discrimination is much more glaring in the case of gays and lesbians who are often portrayed in the tri-media as second class citizens. They are forced to live with harassment, neglect, exploitation and indifference. This bill aims to promote the interests, rights and welfare of Filipino lesbians and gays by guaranteeing their rights to equal opportunity and treatment in employment; access to public services and accommodations; education; primary health care; and access to military, police and other similar institutions."
