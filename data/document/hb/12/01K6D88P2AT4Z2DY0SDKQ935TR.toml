congress_website_abstract = "All persons traveling abroad shall be allowed to bring with them goods worth not exceeding FIVE THOUSAND US DOLLARS (US$5,000.00) and exempt from taxes, fees or other charges. For the purpose of this Act, the term \"goods\" shall refer to items not expressly prohibited by law to ve exported by nature or public policy."
