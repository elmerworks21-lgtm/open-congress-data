congress_website_title = "AN ACT CREATING THE NATIONAL MONITORING AND SURVEILLANCE COORDINATING COUNCIL, DEFINING ITS POWERS AND FUNCTIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Our country is haunted by environmental problems which is multi-faceted. Among them are forest denudation, unabated illegal fishing which destroys marine life, loss of soil fertility, water and air pollution and inadequate water disposalsystem, to name a few. These problems deprive the future generations of a health environment, all because of economic development. These geo-political and economic developments uerscore the urgent need for a surveillance and monitoring system to arrest the emerging threat to our national security and environment and prevent unredeemable losses."

