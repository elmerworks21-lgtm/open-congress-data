congress_website_title = "AN ACT TO PROVIDE COMPENSATION, REIMBURSEMENT FOR HOSPITALIZATION EXPENSES, AND OTHER BENEFITS, TO CIVILIANS CAUGHT IN THE CROSSFIRE BETWEEN REBELS AND THE MILITARY, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Civilian Compensation Act of 2002.\" This bill aims to establish a Civilian Compensation Fund which shall be administered by the Commission on Human Rights. > Any civilian who is killed or injured in the crossfire between rebels and the military shall be entitled to: (a) an indemnity in the amount not exceeding Thirty Thousand Pesos (P30,000.00), in case of death; and (b) a reimbursement for the necessary expenses incurred for hospitalization , medical treatment, loss of wage, and the like, incase of injury. In case said civilian is compelled by the military to leave his or her residence prior to a military campaign, the Commission shall provide emergency housing, food and medical benefits to said civilian and in case said civilian incurss material loss, the Commission shall indemnify the former the necessary amount to cover said loss."
