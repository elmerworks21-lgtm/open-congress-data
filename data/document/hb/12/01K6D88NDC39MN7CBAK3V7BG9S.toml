congress_website_title = "AN ACT AMENDING ARTICLE 1691 OF THE CIVIL CODE OF THE PHILIPPINES AND ARTICLE 147 OF THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "If the house helper is under the age of eighteen years and is qualified for SECONDARY EDUCATION UNDER EXISTING RULES AND REGULATIONS OF THE DEPARTMENT OF EDUCATION, CULTURE AND SPORTS, the head of the family, IN KEEPING WITH THE FINANCIAL CAPACITY OF THE FAMILY, shall give an opportunity to the house helper for at least SECONDARY EDUCATION. The cost of such education shall NOT be a part of the house helper's compensation, unless there is a stipulation to the contrary."

