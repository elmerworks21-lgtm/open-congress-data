congress_website_title = "AN ACT GRANTING RETIRED MEMBERS OF THE GOVERNMENT SERVICE INSURANCE SYSTEM THE FULL VALUE OF THEIR CONTRIBUTIONS TO THE SYSTEM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8291, OTHERWISE KNOWN AS `THE GOVERNMENT SERVICE INSURANCE SYSTEM ACT OF 1997'"
congress_website_abstract = "The main objective of this bill is to grant the GSIS members who will retire from the service the total GSIS contributions of the member and the employer, including the interest earnings of the said contributions. To accomplish this objective, thisbill introduces the concept of \"FULL VALUE OF CONTRIBUTIONS\" which shall be used as the basis for the payment to the retirees of their lump sum and the basic monthly pension benefits which are likewise redefined in this Bill."
