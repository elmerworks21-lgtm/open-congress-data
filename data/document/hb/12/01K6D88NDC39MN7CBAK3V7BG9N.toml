congress_website_title = "AN ACT AMENDING THE QUALIFICATIONS OF MEMBERS OF THE PROSECUTION STAFF UNDER THE CHIEF STATE PROSECUTOR AND ASSISTANT CHIEF STATE PROSECUTORS"
congress_website_abstract = "Rationale: There are just too many criminal cases filed and too few prosecutors to handle these cases. The pressure of resolving the endless number of cases is further aggravated by the imposition of deadlines. A clogged criminal docket and an impending deadline are consequently irresistible ingredients for a miscarriage of justice. I submit that an effective way of preventing such miscarriage of justice is by simply filling the depleted ranks with more prosecutors. > It is thus submitted thatthis nationwide problem of a depleted prosecutor-forc e can now be remedied by DECREASING the present five-year-actua l-practice requirement to three years."

