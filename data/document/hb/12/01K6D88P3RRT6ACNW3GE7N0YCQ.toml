congress_website_title = "AN ACT PROVIDING FOR A MANDATORY AND CONTINUING HUMAN RIGHTS EDUCATION FOR ALL BARANGAY TANODS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Mandatory and Continuing Human Rights Education Act of 2002.\" All barangay tanods in the country shall undergo a mandatory and continuing human rights education to be conducted on a regular basis by the Commission on Human Rights which time, date and place of education shall be determined jointly by the Commission on Human Rights and the Sangguniang Barangay concerned."
