congress_website_title = "AN ACT ESTABLISHING A PROVIDENT PERSONAL SAVINGS PLAN KNOWN AS THE `PERSONAL EQUITY AND RETIREMENT ACCOUNT'"
congress_website_abstract = "This proposed measure seeks to introduce the Personal Equity and Retirement Account (PERA) which we hope will be accepted as an essential and valuable tool in encouraging savings for our people's retirement years. A PERA is a savings plan to achieve a comfortable and financially-sec ure retirement through a sound investment and planning scheme. Through a PERA, one is encouraged to save because certain contributions to the savings funds are deductible from the taxable income, and earnings of said savings are sheltered from taxation as they grow and are taxed only upon their withdrawal from PERA."
