congress_website_title = "AN ACT REDUCING TO FIFTEEN PERCENT (15%) THE AMUSEMENT TAX ON GROSS RECEIPTS FROM ADMISSION FEES OF THEATERS, CINEMAS, CONCERT HALLS, CIRCUSES AND OTHER PLACES OF AMUSEMENT, AMENDING FOR THE PURPOSE SECTION 140 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The entertainment industry, saddled as it is with numerous and heavy taxes, is on the brink of economic collapse and loss of identity. The reduction of the amusement tax on theaters, cinemas, concert halls, circuses, and other places of amusement will encourage economic growth and efficiency of the Philippine entertainment industry, the creation of new jobs, exports, and consumers' accessibility to a wide range of new media content and services at competitive prices. It will encourage investments and innovations, including research and devleopment. It will foster competition and an increased reliance on market forces utilizing Filipino creative resources, thus contributing to the Filipino identity."
