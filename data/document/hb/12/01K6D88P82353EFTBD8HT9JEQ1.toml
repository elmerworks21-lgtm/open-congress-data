congress_website_title = "AN ACT CREATING A WORLD TRADE ORGANIZATION (WTO) AFFAIRS STRATEGY OFFICE (WTO-ASO) UNDER THE OFFICE OF THE PRESIDENT AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Trade liberalization has strangled many local industries particularly those in the agricultural sector. Trade liberalization revolves around the World Trade Organization (WTO) which is the final forum for international trade disputes. The WTO hasa set of detailed and complex rules and regulations. This measure proposes the creation of a WTO Affairs Strategy Office (WTO-ASO) under the Office of the President with the following tasks, among others:>>a. to formulate a set of policies to be adopted by the government concerning WTO matters and affairs, its rules of engagement; >>b. to conduct a continuing research and study on WTO issues and concerns and their effect on the Philippine economy; and >>c. to review existing laws and economicpolicies of the government in relation to global developments."

