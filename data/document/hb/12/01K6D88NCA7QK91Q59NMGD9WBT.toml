congress_website_title = "AN ACT TRANSFERRING THE POWERS AND FUNCTIONS OF THE OFFICE OF THE GOVERNMENT CORPORATE COUNSEL (OGCC) TO THE OFFICE OF THE SOLICITOR GENERAL (OSG)"
congress_website_abstract = "This bill seeks to ABOLISH the Office of the Government Corporate Counsel (OGCC). Rationale: This Act will minimize the unnecessary duplication and overlapping of agency functions. The transfer of powers and functions by the OGCC to the OSG, will lead to a more efficient execution of functions and at the same time it will generate budgetary savings which can be utilized to implement other priority projects and programs of the government."
