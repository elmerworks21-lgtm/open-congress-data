congress_website_title = "AN ACT AMENDING ARTICLE 177 OF EXECUTIVE ACT NO. 209, OTHERWISE KNOWN AS THE FAMILY CODE, AS AMENDED BY EXECUTIVE ORDER NO. 227"
congress_website_abstract = "Article 177 of the Family Code provides that \\\"only children conceived and born outside of wedlock of parents who, at the time of the conception of the former, were not disqualified by any impediment to marry each other, may be legitimated\\\". This means that a child born outside of wedlock may carry an illegitimate status all his/her life if, at the time, of his conception, his/her parents were disqualified by any impediment to marry each other and even if the parents are later on allowed under the law to marry. Such situation would be unjust to the child. This bill seeks to address such a situation by amending Article 177 to provide that \\\"CHILDREN CONCEIVED AND BORN OUTSIDE OF WEDLOCK OF PARENTS MAY BE LEGITIMATED.\\\""

