congress_website_title = "AN ACT ESTABLISHING MULTIDISCIPLINA RY CANCER TREATMENT FACILITIES AND SPECIALIZED UNITS IN EVERY GOVERNMENT MEDICAL CENTER IN ALL REGIONS OF THE COUNTRY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Cancer patients fr the rural areas find it difficult to avail of treatment facilities, as they are concentrated in Metro Manila. Hence, for the purpose of meeting the health care needs of the people of the entire country, a cancer centershould be established in all regional medical centers of the Philippines. The center must be geographically central to all provinces and easily accessible to patients."
