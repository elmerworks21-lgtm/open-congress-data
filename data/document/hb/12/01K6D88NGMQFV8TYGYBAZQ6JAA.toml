congress_website_title = "AN ACT AMENDING SECTION 26 (2) OF REPUBLIC ACT NUMBERED SIX THOUSAND SEVEN HUNDRED SEVENTY, OTHERWISE KNOWN AS `THE OMBUDSMAN ACT OF 1989', IN RELATION TO SECTION 12 OF REPUBLIC ACT NUMBERED THREE THOUSAND NINETEEN, AND FOR OTHER PURPOSES"
congress_website_abstract = "The proposed amendment to RA No. 6770 reads as follows: \"The Office of the Ombudsman shall receive complaints from (any source in whatever form) ANY PERSON DULY IDENTIFIED AS AN ACCUSER WHICH MUST BE VERIFIED AND UNDER OATH concerning an official act or omission. It shall act on the complaint immediately provided that the complaint is substantially true and well-founded and if it finds the same entirely baseless, it shall dismiss the same and inform the complainant of such dismissal citing thereasons therefore. If it finds a reasonable ground to investigate further, it shall first furnish the respondent public officer or employee with a summary of the complaint and require him to submit a written answer within seventy-two hours from receeipt thereof: PROVIDED, HOWEVER, THAT DURING THE PENDENCY OF THE CASE, THE OFFICE OF THE OMBUDSMAN OR ANY PRINT-MEDIA FOR THAT MATTER SHALL NOT PUBLISH THE CASE COVERED BY THE COMPLAINT. If the answer is found satisfactory, it shall dismiss the case"
