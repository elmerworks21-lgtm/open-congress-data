congress_website_title = "AN ACT LIMITING THE COVERAGE OF STATUTORY RAPE TO AN OFFENDED PARTY WHO IS NOT A PROSTITUTE, AMENDING FOR THE PURPOSE PARAGRAPH 1(D), ARTICLE 266-A OF CHAPTER THREE, TITLE EIGHT OF THE REVISED PENAL CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It has been observed that statutory rape is being utilized as a defense and a mode of extortion by parents and pimps of prostituted children against the offender. Thus, the intent of the proposed bill to curb this incongruity by limitingthe coverage of statutory rape only to victims who are not prostitutes nor prostituted children."
