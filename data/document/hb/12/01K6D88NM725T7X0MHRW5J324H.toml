congress_website_title = "AN ACT AMENDING SECTION 2 AND SECTION 3 OF PRESIDENTIAL DECREE NO. 717, OTHERWISE KNOWN AS THE AGRI-AGRA LAW AND FOR OTHER PURPOSES"
congress_website_abstract = "The proposed amendments shall maximize the use of the Agri-Agra fund for the benefit of small farmers, fishermen and small enterprises with capitalization less than Five Hundred Thousand Pesos (P500,000.00). Likewise, the provision which allows banks divert the ten percent (for agrarian reform) for the purchase of government securities is repealed in order to ensure that the beneficiaries of this Act will have ample funds to avail of."
