congress_website_title = "AN ACT GRANTING THE SANGGUNIANG BODIES, EXCEPT BARANGAY SANGGUNIAN, OF LOCAL GOVERNMENT UNITS THE POWER OF CONTEMPT IN THE EXERCISE OF THEIR DISCIPLINARY FUNCTIONS OVER ELECTIVE LOCAL GOVERNMENT OFFICIALS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Section 63 of RA No. 7160, the Local Government Code, as amended to read as follows: >Any abuse of the exercise of the power of preventive suspension shall be penalized as abuse of authority. PROVIDED, HOWEVER, THAT LOCAL OFFICIALS AND EMPLOYEES WHOFAIL TO COMPLY WITH DECISIONS, ORDERS, OR RULINGS OF THE CONCERNED LOCAL SANGGUNIANG BODY, EXCEPT SANGGUNIANG BARANGAY, IN THE EXERCISE OF ITS DISCIPLINARY FUNCTIONS OVER ELECTIVE LOCAL OFFICIALS, AND ANY PERSON WHO REFUSES TO COMPLY WITH ANY OF ITSLAWFUL ORDERS IN CONNECTION THEREAT SHALL BE LIABLE FOR CONTEMPT OF SUCH LEGISLATIVE BODT.\" > Another paragaraph is all added, and shall read as follows: >\" THE LOCAL SANGGUNIANG BODIES SHALL HAVE THE POWER TO ISSUE SUBPOENA AD TESTIFICANDUM AND SUBBPOENA DUCES TECUM FOR THE PRODUCTION OF DOCUMENTS AND RECRODS PERTINENT TO INVESTIGATIONS AND INQUIRIES CONDUCTED BY THEM IN ACCORDANCE WITH THEIR AUTHORITY TO DISCIPLINE LOCAL ELECTIVE OFFICIALS.\""
