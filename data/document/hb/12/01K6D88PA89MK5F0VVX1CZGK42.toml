congress_website_title = "AN ACT CREATING THE GOVERNMENT ASSET MANAGEMENT AUTHORITY, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Government Asset Management Act of 2003\\\". The bill seeks to centralize the privatization and disposition of non-performing assets of the government by creating an independent body to be known as the Government Asset Management Authority (GAMA). The GAMA shall primarily handle the privatization and disposition of the non-performing assets of the government. It also provides for the transfer of the management and disposition of surrendered assets from the Presidential Commission on Good Government to the GAMA."
