congress_website_title = "AN ACT AMENDING ARTICLE 26 OF EXECUTIVE ACT NO. 209, OTHERWISE KNOWN AS THE FAMILY CODE, AS AMENDED BY EXECUTIVE ORDER NO. 227"
congress_website_abstract = "Article 26 of the Family Code provides that \\\"when a marriage between a Filipino citizen and a foreigner is validly celebrated and a divorce is thereafter validly obtained abroad by the alien spouse capacitating him or her to remarry, the Filipino spouse shall have the capacity to remarry under Philippine law\\\". The law is unclear whether the same right is granted to a Filipino citizen whose spouse was a Filipino citizen at the time of the celebration of the marriage but subsequently acquired a foreign citizenship at the time or prior to obtaining a valid divorce. This measure seeks to extend the same right granted under Article 26 of the Family Code to a Filipino citizen whose spouse, although originally also a Filipino citizen, subsequently acquires foreign citizenship and obtains a valid divorce."

