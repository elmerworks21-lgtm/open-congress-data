congress_website_title = "AN ACT GRANTING HAZARD PAY TO ALL DULY APPOINTED MEMBERS OF BARANGAY TANOD BRIGADES AND APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Barangay tanods bridges have been organized to assist the government in maintaining peace and order in their barangays. They conduct nightly patrols, even during inclement or bad weather, thereby exposing their lives and limbs to danger.> The amount necessary for the effective implementation of this Act shall be charges against the appropriations of the Department of Interior and Local Government (DILG) under the current General Appropriations Act. Thereafter, such sum as may be necessary for its implementation shall be included in the annual budget of the local government unit concerned."

