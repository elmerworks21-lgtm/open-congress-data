congress_website_abstract = "Under this proposed bill all trucks, such as stake, platform, trucks for gravel and sand, and others of the same configuration including the van and tanker types, provided that the gross vehicle weight exceeds 4,500 kilograms, shall be exempted fromthe Public Service Act and the regulations of the Land Transportation Franchising and Regulatory Board (LTFRB). > The basic registration fees for private trucks with a gross vehilce weight (GVW) of 4,500 kilograms and more shall be the following: First 4,500 kgs............ ..P3,000; On excess of 4,500 kgs GVW...P25/100 kgs."
