congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF THE OVERSEAS FILIPINO BANK AND FOR OTHER PURPOSES"
congress_website_abstract = "The purposes in establishing the Overseas Filipino Bank are: (1) To encourage the overseas Filipinos to remit foreign earnings through the bank system; (2) To assist the overseas workers in providing for the efficientg channels in the remittance oftheir earnings from their foreign work stations to their local beneficiaries in the Philippines; and (3) To encourage savings among the overseas Filipino workers and their families from their earnings abroad, and at the same time extend credit facilities to them."
