congress_website_title = "AN ACT STRENGTHENING THE ROLE OF THE VERNACULAR AND FILIPINO IN FUNCTIONAL LITERACY AND PROVIDING GUIDELINES FOR ITS CLASSROOM USE"
congress_website_abstract = "In Grades One, Two, and Three of the elementary level, the vernacular shall be the language of instruction for all subjects with Filipino as a separate subject and the auxiliary language of instruction. Filipino shall continue to be taught as a separate subject until the fourth year of secondary education. In Grade Three, English as a foreign language shall be introduced as a separate subject and shall continue to be taught as a separate subject until the fourth year of secondary education. In Grade Four, Filipino shall be the language of instruction and shall continue to be the language of instruction for all subjects, except English, until the fourth year of secondary education."

