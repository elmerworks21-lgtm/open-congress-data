congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1069, KNOWN AS THE `PHILIPPINE EXTRADITION LAW', RATIONALIZING THE EXTRADITION PROCEEDINGS"
congress_website_abstract = "Under this proposed measure, NOT IMMEDIATE ARREST shall be made on any Filipino citizen, residing in his own country, before a final dtermination that such citizen is extraditable. If extradition is ganted, no articles found in possession of the accused who has been arrested may be seized provided that such articles are alleged to have intimate relation to or are the products of the crime or crimes for which the accused is sought to be extradited and there is reasonable ground to believe this to be true."

