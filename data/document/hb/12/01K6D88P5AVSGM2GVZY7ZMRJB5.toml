congress_website_title = "AN ACT CREATING THE NATIONAL LAND TRANSPORTATION AUTHORITY, DEFINING ITS POWERS AND FUNCTIONS, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Land Transportation Authority (NLTA) Act.\" This bill seeks to create the National Land Transportation Authority which shall absorb and merge the functions of the Land Tranportation Office (LTO) and the Land Transportation Franchising and Regulatory (LTFRB) as the primary policy planning, programming, coordinating, implementing, regulating and administrive entity of the government in the promotion, development and regulation of a dependable network of land transportation systems."

