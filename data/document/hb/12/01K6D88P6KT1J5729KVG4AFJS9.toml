congress_website_title = "AN ACT PROVIDING FOR A CAP ON PUBLIC DEBT IN ORDER TO ENSURE LONG-TERM FINANCIAL SUSTAINABILITY THROUGH FISCAL DISCIPLINE"
congress_website_abstract = "\"Debt Cap Act of 2003.\" This bill states that within five (5) years from the enactment of this proposed measure into law, the consolidated outstanding debt of the National government and of government-owne d and/or controlled corporations shall notexceed, at any one time, an amount equivalent to 100 percent of the country's nominal Gross Domestic Product and within another five years and thereafter, said outstanding debt shall not exceed 80 percent of the country's Gross Domestic Product: PROVIDED, That in no case within this second five year period will level of outstanding debt exceed 100 percent of Gross Domestic Product."

