congress_website_title = "AN ACT INCREASING THE MONTHLY INCOME BENEFITS FROM THE SOCIAL SECURITY SYSTEM FOR MEMBERS AND PENSIONERS WHO SUFFER FROM WORK-RELATED ILLNESS, OR HAVE DIED AS A RESULT OF WORK-RELATED CAUSES"
congress_website_abstract = "Through the years, the benefits from the Social Security System (SSS) have not increased substantially and have even depreciated because of worsening economic conditions and the corruption of government officials who have manipulated the SSS funds. An increase in the benefits granted by the SSS would provide workers some relief from the effects of the economic crisis. This bill proposes to grant a 25% across-the-board increase in the monthly income benefits for work-related illnesses, disability and death as a result of work-related causes with the proviso that no additional premium contributions shall be assessed upon the employees and the employers."

