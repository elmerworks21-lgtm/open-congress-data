congress_website_title = "AN ACT CRIMINALIZING ENFORCED OR INVOLUNTARY DISAPPEARANCE AND FOR OTHER PURPOSES"
congress_website_abstract = "Definition of Enforced or Involuntary Disappearance. For purpose of this Act, enforced or involuntary disappearance shall be deemed to occur when a person is arrested, detained or abducted against his/her will or otherwise deprived of his/her liberty by officials of different branches or levels of Government, or by organized groups or private individuals acting on behalf of, or with support, direct or indirect, consent or acquiescence of the Government, followed by a refusal to disclose the fate or whereabouts of the person concerned or a refusal to acknowledge the deprivation of his/her liberty, which places such person outside the protection of the law. Other provision of this bill are: (1) Penalties for the Act; (2) Compensation to Nextt-of-Kin; (3) Rehabilitation of Reappeared Victim."
