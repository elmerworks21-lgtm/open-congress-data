congress_website_title = "THE EQUAL EMPLOYMENT OPPORTUNITY ACT OF 2001"
congress_website_abstract = "Rationale: A survey of existing laws reveals the lack of comprehensive legislation which touch on undue discrimination against women, members of certail religious, regional or ethnic groups, the elderly, homosexuals, and disabled. Sometimes, even Filipinos workers are discriminated in their own country on account of their race. > Aside from the broad pronouncement in the Labor Code, no further protection is provided against discrimination on the basis of race or creed. There appears to be an absence of laws which afford protection for the other marginalized groups.> This bill seeks to expand the coverage of legal protection against discrimination on the basic of the above attributed from the time of pre-employment and labor relations and ppromotion to supervisory and managerial positions. It also provides the mechanisms for the implementation of the same."
