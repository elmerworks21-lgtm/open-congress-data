congress_website_title = "AN ACT INCREASING THE PENALTY IMPOSED AGAINST POLLUTERS OF NAVIGABLE WATERS BY AMENDING SECTION 7 OF PRESIDENTIAL DECREE NO. 979 PROVIDING FOR THE REVISION OF PRESIDENTIAL DECREE NO. 600 GOVERNING MARINE POLLUTION"
congress_website_abstract = "Rationale: Presidential Decree No. 979 states that it is the policy of the state to prevent and control the pollution of seas by the dropping of wastes and other matter which create hazards to human health, harm living resources and marine life, damage amenities, or interfere with the legitimate uses of the sea within the territorial jurisdiction of the Philippines. Section 7 of Presidential Decree No. 979 is hereby amended to read as follows: >Section 7. Penalties for Violations. - Any personwho violates Section 4 of this Decree or any regulations prescribed in pursuance thereof, shall be liable for a fine of not less than [Two hundred pesos nor more than Ten thousand pesos] FIVE MILLION PESOS or by imprisonement of not less than [thirtyy days] EIGHT YEARS AND ONE DAY nor more than [one year] TWELVE YEARS or both such fine and imprisonment, for each offense, without prejudice to the civil liability of the offender in accordance with existing laws."

