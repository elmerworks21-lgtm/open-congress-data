congress_website_title = "AN ACT PROVIDING FOR THE MAINTENANCE AND ADMINISTRATION OF THE PHILIPPINE MARINE CORPS AS A SEPARATE MAJOR UNIT OF THE PHILIPPINE NAVY, PRESCRIBING ITS MISSION AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The Philippine Marines Corps, hereinafter referred to as the Corps, shall be administered and maintained as a separate major unit of the Philippine Navy, and shall be specially trained and equipped for the effective discharge of its mission and functions. The Corps shall be headed by a Commandant who shall be a Flag Officer."

