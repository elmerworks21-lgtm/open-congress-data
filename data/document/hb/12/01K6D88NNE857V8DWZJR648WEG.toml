congress_website_title = "AN ACT PROVIDING AFFORDABLE HEALTH CARE SERVICES THROUGH THE HEALTH MAINTENANCE ORGANIZATIONS (HMOs), REGULATING THEIR OPERATIONS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The Department of Health, in close coordination with other agencies of the government, is hereby empowered to supervise and regulate the operations of HMOs and all other entities offering health care services that fall under the definition of HMO inaccordance with Section 4, paragraph (g) of this Act. After registering with the Securities and Exchange Commission, said entities shall secure a license to operate as an HMO from the Department of Health. Existing HMOs at the time of the effectivity of this Act shall likewise secure a license to operate from the Department of Health, in accordance with the Transitory Provisions provided herein.> The Department shall issue the license to operate within thirty (30) days from the submission of thhe complete application and requirement prescribed by the DOH and the implementing rules and regulations of this Act."
