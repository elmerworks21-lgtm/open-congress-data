congress_website_title = "AN ACT PROVIDING FOR A MORE RESPONSIVE AND COMPREHENSIVE REGULATION FOR THE PRACTICE, LICENSING AND REGISTRATION OF ENVIRONMENTAL AND SANITARY ENGINEERS IN THE PHILIPPINES, AMENDING FOR THE PURPOSE OF REPUBLIC ACT NO. 1364, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Revised Environmental and Sanitary Engineering Act of 1999\". Rationale: The existing Sanitary Engineering Law that aims to protect public health and the environment has become outdated. Hence, there is an urgent need for a new law to enable the professionals to be more effective in dealing with today's environmental and public health problems. > The Commission on Higher Education realizes the need to update the Environmental and Sanitary Engineering Law RA 1364 in order to prepare the practitioner to a globally competitive professional in the field of Environmental and Sanitary Engineering. It is likewise noteworthy to mention that schools or universities offering Sanitary Engineering have change their curriculum title to Environmental annd Sanitary Engineering, consistent with the objective of commission of Commission on Higher Education."

