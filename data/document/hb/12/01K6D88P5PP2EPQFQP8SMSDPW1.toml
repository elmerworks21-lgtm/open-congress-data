congress_website_title = "AN ACT ALLOWING CANDIDATES FOR PUBLIC OFFICE TO RAISE FUNDS THROUGH INCOME GENERATING EVENTS FOR THEIR ELECTION CAMPAIGN AND INCREASING THE AGGREGATE AMOUNT THAT A CANDIDATE OR POLITICAL PARTY MAY SPEND FOR AN ELECTION CAMPAIGN, AMENDING FOR THE PURPOSE THE `OMNIBUS ELECTION CODE'"
congress_website_abstract = "This bill seeks to amend Section 97 of BP 881, as amended, otherwise known as the 'Omnibus Election Code of the Philippines' by allowing persons who are candidates for public office to raise campaign funds through income generating events such as holding dances, lotteries, cockfights, games, boxing, bouts, bingo, beauty contests, entertainment, or cinematographic , theatrical or other performances PROVIDED THAT THE AMOUNT OF FUNDS RAISED SHALL NOT EXCEED THE AGGREGATE AMOUNT THAT A CANDIDATE ORREGISTERED POLITICAL PARTY MAY SPEND FOR AN ELECTION CAMPAIGN, AS LIMITED UNDER SECTION 100 OF THE OMNIBUS ELECTION CODE."

