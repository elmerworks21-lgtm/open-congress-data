congress_website_title = "AN ACT PROVIDING FOR AN INCREASE IN THE SALARIES OF PUBLIC OR GOVERNMENT SECTOR EMPLOYEES AND IN THE STATUTORY MINIMUM WAGE AND SALARY RATES OF EMPLOYEES AND WORKERS IN THE PRIVATE SECTOR AND FOR OTHER PURPOSES"
congress_website_abstract = "All workers and employees in the public and government sector shall receive an increase of ten percent (10%) in their monthly salaries. > The statutory minimum wage rates of workers and employees in the private sector shall be increased by One Hundred Twenty-Five Pesos (P125.00) per day. Provided, that those already receiving above the minimum wage shall have an increase of One Hundred Twenty Pesos (P120.00) per day."

