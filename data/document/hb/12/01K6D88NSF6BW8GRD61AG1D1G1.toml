congress_website_title = "AN ACT PREVENTING AND PENALIZING COMPUTER FRAUD, ABUSES AND OTHER CYBER-RELATED FRAUDULENT ACTIVITIES, AND CREATING FOR THE PURPOSE THE CYBER-CRIME INVESTIGATION AND COORDINATING CENTER, PRESCRIBING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDSTHEREFOR"
congress_website_abstract = "\"Anti-Cyber Crime Act of 2001\". It is the objective of this Act to protect and safeguard the integrity of computers, computer systems, computer networks, computer servers, database, and the information and data stored therein from computer users who resorted to computer fraud, abuses and other cyber-related fraudulent activities, by providing penal sanctions to the perpetrators and creating a coordinating body which shall coordinate, collate and synergize efforts of all law enforcement agencies in combatting cyber crimes."
