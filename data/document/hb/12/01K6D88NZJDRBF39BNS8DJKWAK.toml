congress_website_abstract = "The increase of the annual budget of the said hospitals will surely alleviate the burden of the hospitals and enable them to accommodate a greater number of people. This bill will also give such hospitals the opportunity tp upgrade and modernize equipment facilities to effectively cater to the medical needs of the people. Such being the case, the government would be able to lessen the health related problems of the country."
