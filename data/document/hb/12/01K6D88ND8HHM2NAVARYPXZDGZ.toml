congress_website_title = "AN ACT TO GRANT MONTHLY PENSION TO GOVERNMENT RETIREES UNDER REPUBLIC ACT NO. 1616 WHO HAVE REACHED THE AGE OF SEVENTY-FOUR (74), APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: In A survey conducted of retirees who opted to retire under Republic Act No. 1616 revealed that a majority of this class of retirees have been living in abject poverty, and many of them have to depend on doleouts from close relatives andfriends. Aged government personnel who retired need monthly pension because at their late age their opportunities of earning is already almost nil."
