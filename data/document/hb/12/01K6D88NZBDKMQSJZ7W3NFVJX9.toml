congress_website_title = "AN ACT PROVIDING GOVERNMENT ASSISTANCE TO MADRASAH EDUCATION SYSTEM, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Fund Assistance to Madrasah Education Act of 2002\". The Madrasah curriculum shall be enriched and harmonized to make it compatible with the curriculum of the formal education system. Equivalency, learning accreditation, experience-base d learning and other innovative education approaches shall be utilized in order to make possible the smooth transition of learners from the Madrasah education system to the formal education system and vice-versa. > Forms of assistance shall consist of the following: (1) Nutrition and Feeding Program for Young Children; (2) Classroom Facilities such as desks, tables, chalkboards and other basic classroom needs; (3) Textbook Assistance Fund; (4) Scholarship Grants to deserving students; (5) Education Loan Funnd; (6) In-Service Training Fund for teachers; and (7) Scholarship Grants to children of teachers."
