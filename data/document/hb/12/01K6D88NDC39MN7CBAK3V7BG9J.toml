congress_website_title = "AN ACT GRANTING FARMERS, FISHERMAN AND ENTERPRISES WITH CAPITALIZATION NOT EXCEEDING FIVE HUNDRED THOUSAND PESOS (P500,000.00) MORE ACCESS TO CREDIT FACILITIES, AMENDING FOR THIS PURPOSE CERTAIN PROVISIONS UNDER PRESIDENTIAL DECREE NO. 717, OTHERWISE KNOWN AS THE AGRI-AGRA LAW AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: An amendment is necessary to redirect the Agri-Agra fund's use in favor of small farmers who, due to lack of capitalization, are left out because of the high credit risk. Left hanging without sufficient capitalization, the small farmer orfishermen is prone to low agricultural production. The amendment will MAXIMIZE the use of the Agri-Agra fund for the benefit of small farmers, fishermen and agricultural enterprise with less than five hundred thousand pesos capitalization."

