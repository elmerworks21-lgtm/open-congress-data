congress_website_title = "AN ACT GRANTING PROFESSIONAL LICENSE TO TEACHERS WHO HAVE RENDERED AT LEAST TWO (2) YEARS OF EFFICIENT SERVICE IN HIGH RISK AREAS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Special Professional License Privilege for Teachers in High Risk Areas.\" \"HIGH RISK AREAS\" are those places in the Philippines where terrorism, kidnappings and insurrection are commonplace. All non-licensed teachers, as of the approval of this actand henceforth, who shall have rendered a total of at least two (2) years of efficient service in high risk areas may be granted professional license."
