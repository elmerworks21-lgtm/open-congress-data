congress_website_title = "AN ACT CREATING A NATIONAL LAND USE CODE, PROVIDING IMPLEMENTING MECHANISMS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The country has NO Land Use Code that will serve as a sustainable growth map for both public and private investors. A land use code is necessary for targeting and delineating areas open for investment in line with the country's development plans. There is a need for certain lands to be set aside to establish \"agricultural reserves\" for food security. It will also help resolve conflicts arising from various economic uses of lands versis the housing needs of the population."
