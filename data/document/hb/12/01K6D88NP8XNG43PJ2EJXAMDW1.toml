congress_website_title = "AN ACT AMENDING SECTION 31 OF REPUBLIC ACT NO. 7166, OTHERWISE KNOWN AS `AN ACT PROVIDING FOR SYNCHRONIZED NATIONAL AND LOCAL ELECTIONS AND FOR ELECTORAL REFORMS, AUTHORIZING APPROPRIATIONS THEREFOR, AND FOR OTHER PURPOSES' TO INCLUDE HAZARD ALLOWANCE AND LIFE INSURANCE BENEFITS AS ADDITIONAL BENEFITS FOR MEMBERS OF THE BOARD OF ELECTION INSPECTORS AND OTHER OFFICIALS"
congress_website_abstract = "The Board of Election Inspectors SHALL BE ENTITLED TO ONE THOUSAND PESOS (P1,000.00) AS HAZARD ALLOWANCE EACH FOR SERVICES ON THE DAY OF ELECTION. THEY SHALL BE COVERED BY AN INSURANCE POLICY FOR DEATH OR INJURY SUSTAINED WHILE IN THE PERFORMANCE OFTHEIR DUTY, OR BY REASON THEREOF: PROVIDED, THAT IN CASE OF DEATH, THE AMOUNT OF ONE HUNDRED THOUSAND PESOS (P100,000.00) SHALL BE PAID TO THEIR PRIMARY BENEFICIARIES, AND IN THE ABSENCE THEREOF, TO THEIR LEGAL HEIRS: PROVIDED, FURTHER THAT IN CASEOF ANY INJURY, THE DEPARTMENT OF EDUCATION, CULTURE AND SPORTS OR THE COMMISSION SHALL PROVIDE FOR THE SCHEDULE OF COMPENSATION WHICH, IN NO CASE, SHALL BE LESS THAN TEN THOUSAND PESOS (P10,000.00), NOR MORE THAN ONE HUNDRED THOUSAND PESOS (P100,000..00).> PRIMARY BENEFICIARIES AS MENTIONED IN THIS ACT SHALL REFER TO THE LAWFUL SPOUSE, AND THEIR CHILD/CHILDREN. IN THE ABSENCE THEREOF, TO PERSONS, WHO UNDER EXISTING LAWS, ARE ENTITLED TO SUCCEED."

