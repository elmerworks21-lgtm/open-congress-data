congress_website_title = "AN ACT REQUIRING ALL CIGARETTE AND CIGAR MANUFACTURERS AND DISTRIBUTORS TO SCIENTIFICALLY DETERMINE AND TRUTHFULLY PRINT, ON EACH BOX OR PACK OF CIGARS OR CIGARETTES THAT THEY MANUFACTURE, DISTRIBUTE OR SELL WITHIN THE COUNTRY, THE LEVELS OF NICOTINE, TAR AND CARBON MONOXIDE THAT COULD BE INHALED IN SMOKING A STICK OF CIGAR OR CIGARETTE, AND PROVIDE PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Rationale: The purpose is to enable smokers or potential smokers to at least know precisely how much nicotine, tar and deadly carbon monoxide could be imbibed in smoking cigars or cigarettes. Such information may provide fair warning on the health risks of smoking as well as provide data on the amount of toxins spread by smokers on so-called secondary smoke."
