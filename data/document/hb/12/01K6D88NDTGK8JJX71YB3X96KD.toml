congress_website_title = "AN ACT SETTING ASIDE TWENTY-FIVE PERCENT (25%) OF THE LOCAL GOVERNMENT UNITS' CALAMITY FUNDS FOR PREPARATORY ACTIVITIES, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991, AS AMENDED"
congress_website_abstract = "With the proposed measure, the amount to be set aside would be used for preparatory activities such as: the dissemination of information on what to do before, during and after the calamity; for the LGUs to pinpoint, reinforce and strengthen relocation centers; for procurement of medicines, blankets, food and other basic necessities; and for other steps to be undertaken to minimize, if not prevent, loss of lives and damage to properties."

