congress_website_title = "AN ACT ALLOWING A FARMER-BENEFICI ARY TO MORTGAGE HIS RIGHT TO FARM LAND AWARDED TO HIM, WITHOUT LOSING HIS SECURITY OF TENURE AND PROVIDING THAT THE CERTIFICATE OF LAND OWNERSHIP AWARD ISSUED TO HIM UNDER THE COMPREHENSIVE AGRARIAN REFORM PROGRAM SHALL BE ACCEPTED BY BANKS AND OTHER FINANCIAL INSTITUTIONS AS COLLATERAL FOR LOANS, AMENDING FOR THE PURPOSE SECTIONS TWENTY-SEVEN AND SEVENTY-ONE OF REPUBLIC ACT NUMBERED SIXTY-SIX HUNDRED AND FIFTY-SEVEN, OTHERWISE KNOWN AS THE `COMPREHENSIVE AGRARIAN REFORM LAW OF 1988,' AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: In spite of laws enacted to implement agrarian reform in the country, the distribution of land to the landless farmers has yet to realize its goals. There are instances when farmer-benefici aries' titles or rights to the land were canceled due to the absence of tillers. Many farmer-benefici aries were forced by circumstances to mortgage their rights for temporary period, even on conditions that the mortgagee shall take over the possession and cultivation of the land. It doesn't seem reasonable and equitable to cancel the title or rights of a farmer beneficiary who, by necessity, temporarily abandons the land awarded to him. Thus, this bill."
