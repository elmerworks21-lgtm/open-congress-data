congress_website_title = "AN ACT POSTPONING THE BARANGAY ELECTIONS IN MAY 2002 TO THE SECOND MONDAY OF MAY 2004, AND FOR OTHER PURPOSES"
congress_website_abstract = "The regular elections in May 2002 for punong barangay, sangguniang barangay members and the sangguniang kabataan chairman shall be postponed to the second Monday of May 2004. Thereafter, regular elections for the said barangay officials shall be held every after four years. The incumbent punong barangay, sangguniang barangay members and sangguniang kabataan chairman shall continue to hold office until their successors are duly elected and qualified. > Should the scheduled barangay elecitons next year be reset to 2004, synchronized with the Presidential and local elections, the government will have more savings that could be spend for the construction of farm-to-market roads and/or for the purchase of automated ballot machines."
