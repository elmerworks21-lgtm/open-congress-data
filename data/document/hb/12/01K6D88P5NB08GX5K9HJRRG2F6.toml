congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE HAZARDOUS AND NUCLEAR WASTES MANAGEMENT, PROVIDING PENALTIES FOR VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Hazardous and Nuclear Wastes Management Act of 2002.\" This bill proposed to cover hazardous substance once they become wastes. It shall formulate a national toxic and hazardous waste management framework based on a national toxic and hazardous waste status report prepared by the relevant government agencies. This national framework shall embody the policies and objectives necessary, among others to develop hazardous waste management plans; to maximize the generation of toxic hazardous waste; promulgate guidelines for hazardous waste collection, transport, separation, recovery and disposal practices and systems; to promote a national research and development program for improved hazardous waste management and resource conservatiion techniques; and to direct manufacturers of chemical substances and mixtures to develop an adequate data on the effect of these on health and environment."
