congress_website_title = "AN ACT TO GRANT FINANCIAL BENEFITS, INCLUDING INTERNAL REVENUE ALLOTMENT SHARES, TO BARANGAYS CREATED OR TO BE CREATED BY LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE SECTION 285 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENTCODE OF 1991"
congress_website_abstract = "The Local Government Code grants certain local government units (LGUs) the authority to create barangays thus relieving Congress from the burden of such legislative acts. However, these barangays created or to be created by the LGUs are deprived ofthe financial benefits provided by the national government, like the internal revenue allotment (IRA) share. This measure aims to cure this flaw in the law by allowing barangays created or to be created by LGUs to receive financial benefits from thenational government including IRA shares."

