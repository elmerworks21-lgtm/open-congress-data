congress_website_title = "AN ACT CREATING THE NATIONAL SUGAR DEVELOPMENT COUNCIL, THEREBY INSTITUTIONALIZ ING THE SUGAR DEVELOPMENT PROGRAM OF THE PHILIPPINES"
congress_website_abstract = "There is hereby created a National Sugar Development Council (NSDC) under the Office of the President of the Philippines hereafter referred to as the Council, which shall continue production schemes nationwide for the purpose of optimizing the use of sugarcane lands and other idle lands for maximum productivity and profit. > The Council shall formulate a comprehensive and integrated sugar development program and create structures to integrate all sugar development initiatives, and oversee its implementation."

