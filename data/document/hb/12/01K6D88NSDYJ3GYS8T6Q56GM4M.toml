congress_website_title = "AN ACT INCREASING THE YEARLY ALLOCATION FOR SCIENTIFIC AND TECHNOLOGICAL ACTIVITIES (STA)"
congress_website_abstract = "\"Science and Technology Funding Act of 2001\". > Signicant provisions of the bill are as follows: (1) The DOST Secretary shall identify priorities for Research and Development (R&D) and Scientific and Technological (S&T) capability development programs and prepare the corresponding budget thereto. (2) Appropriations pertaining to R&D in the natural, agricultural, technological and engineering sciences of various departments, bureaus, offices agencies, State Universities and Colleges (SUCs) shallbe aligned with S & T priorities as identified by the DOST. (3) A special fund for research and development to be known as \"R&D FUND\" shall also be created and constituted from the following sources: a) Allocation of 1% of GNP for S&T activities; b)) All unused R&D allocations; c) All income derived from R&D."

