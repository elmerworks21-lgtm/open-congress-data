congress_website_title = "AN ACT STRENGTHENING THE COOPERATIVE CODE OF THE PHILIPPINES, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED AND THIRTY-EIGHT"
congress_website_abstract = "Rationale: Cooperative devleopment plays a large role in the ultimate realization of national economic development. It is for this reason that the Constitution recognizes the indispensable role of cooperatives in Philippine development and progress.By definition, cooperatives provide individuals an opportunity to work together and share in the development of their own communities and ultimately, their own lives. Thus, there is a need for a legislative measure to insure that the laws governingthe organization and function of cooperatives truly address the needs of the people."
