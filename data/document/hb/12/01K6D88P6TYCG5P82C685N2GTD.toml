congress_website_title = "AN ACT GRANTING TAX AMNESTY COVERING UNDERPAID INCOME, GIFT, ESTATE, VALUE-ADDED TAX, PERCENTAGE AND EXCISE TAXES FROM 1993 TO 2002"
congress_website_abstract = "\"Tax Amnesty Law of 2002.\" This Act covers Income, Gift, Estate, Value Added Tax, Percentage and Excise taxes provided for under the National Internal Revenue Code (NIRC), as amended, from Janury 1, 1993 to December 31, 2002. > Any taxpayer may avail of the tax amnesty provided in this Act except those with pending cases before any tribunal or any quasi-judicial body involving violations of the NIRC and/or covering ill-gotten or unexplained wealth and those already under investigation by concerned government bodies on or before December 31, 2002. Taxpayer who avails of this amnesty shall be exempt from any liability for the particular tax and period applied for."
