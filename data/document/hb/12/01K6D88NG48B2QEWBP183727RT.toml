congress_website_title = "AN ACT PROVIDING FOR A MORE EQUITABLE SHARE IN FAVOR OF LOCAL GOVERNMENT UNITS (LGUs) IN THE PROCEEDS FROM THE DEVELOPMENT AND UTILIZATION OF THE NATIONAL WEALTH, AMENDING SECTIONS 289, 290, 291 AND 293 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "\"SEC. 289. Share in Proceeds from the Development and Utilization of the National Wealth. Local government units shall have an equitable share in the proceeds derived from the utilization and development of the national wealth within their respective areas, including sharing the same with the inhabitants by way of direct benefits. \"NATIONAL WEALTH' SHALL BE DEFINED AS ALL. NATURAL RESOURCES SITUATED WITHIN THE PHILIPPINE TERRITORIAL JURISIDCTION INCLUDING BUT NOT LIMITED TO LANDS OF PUBLIC DOMAIN, WATERS, MINERALS, POTENTIALS ENERGY SOURCES, GAS AND OIL DEPOSITS, FOREST PRODUCTS, FLORA AND FAUNA, FISHERY AND AQUATIC RESOURCES, ALL QUARRY PRODUCTS, AND OTHER RESOURCES WHICH CAN BE EXTRACTED AND UTILIZED.\""
