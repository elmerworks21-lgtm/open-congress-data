congress_website_title = "AN ACT GRANTING FRANKING PRIVILEGES TO SANGGUNIANG BARANGAYS"
congress_website_abstract = "The franking privilege is hereby granted to Sangguniang barangays. For this purpose the Sangguniang barangays shall be exempt from the payment of postage on any mail matter they send to government agencies and officials, both local and national: Provided, That this exemption shall only be available to assist and expedite the conduct of the official businesses, activities and duties of the Sangguniang barangays, and shall not be utilized for matters which are purely personal or politically partisan."
