congress_website_title = "AN ACT CREATING THE DEPARTMENT OF HOUSING AND URBAN DEVELOPMENT, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The State shall undertake a continuing program of urban land reform and housing which will make available at affordable costs decent housing and basic services to underprivileged and homeless citizens. Towards this end, the government shall, in cooperation with the private sector, actively pursue the provision of housing to the people as a means of attaining a socially just society. The government shall regard housing not as a mere provision of shelter but as a cyclic process by which economic activity may dynamically be induced.> The government shall likewise pursue an urban development that directly responds to the welfare, health, and safety of the public."
