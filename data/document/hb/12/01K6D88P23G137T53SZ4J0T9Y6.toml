congress_website_title = "AN ACT GRANTING ALL FILIPINO EMPLOYEES AND WORKERS NATIONWIDE RECEIVING LESS THAN FIFTEEN THOUSAND PESOS (P15,000) MONTHLY WAGE AN EXEMPTION FROM INCOME AND WITHHOLDING TAXES"
congress_website_abstract = "\"Income and Withholding Tax Exemption of 2002\". A tax exemption from income and withholding taxes shall be granted to all Filipino employees and workers nationwide receiving less than Fifteen Thousand Pesos (P15,000.00) monthly wage in view of the rising costs of living in the country. > Any vioaltion of the provisions of this Act shall be penalized with a fine of not less than P50,000.00 and not more than P200,000.00 depending on the gravity of the offense."
