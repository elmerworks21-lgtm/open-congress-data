congress_website_title = "AN ACT REQUIRING EDUCATIONAL INSTITUTIONS AND COMMERCIAL ESTABLISHMENTS TO ACTIVELY COOPERATE AND ASSIST THE NATIONAL GOVERNMENT IN THE SELECTION AND FORMATION OF PHILIPPINE NATIONAL TEAMS THAT WILL COMPETE IN ALL INTERNATIONAL SPORTS COMPETITIONS AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Educational institutions and commercial establishments which maintain athletes and teams participating in professional or amateur sports competitions, are hereby required to actively cooperate and assist the National Government in the promotion anddevelopment of a strong and competitive national team by allowing their athletes or players to participate in the selection and formation of national teams in all international sports competitions.> Such educational institutions and commercial establishments are tasked to assist in the identification, recruitment and training of gifted and talented athletes on their areas of expertise to ensure a wide base for the selection of national ahtletes who will represent the country in international spoorts competitions."
