congress_website_title = "AN ACT REVISING REPUBLIC ACT NO. 382, OTHERWISE KNOWN AS `AN ACT TO REGULATE THE PRACTICE OF VETERINARY MEDICINE IN THE PHILIPPINES'"
congress_website_abstract = "\"The Philippine Veterinary Medicine [and Surgery] Act of [1998] 2001\". Rationale: The importance of animals to man makes imperative the regulation of the profession of those entrusted to manage the country's animal health, to protect man from animaldiseases and ensure public nutrition through increased animal production. The protection of public health requires the assurance that veterinarians dedicate their attention to health services. RA No. 382 (Regulating the Practice of Medicine and Surgery) has been in force for almost forty (40) years now. The Law needs modification to make it more responsive to present-day demands."
