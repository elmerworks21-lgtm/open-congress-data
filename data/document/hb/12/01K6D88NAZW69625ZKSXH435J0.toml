congress_website_title = "AN ACT AMENDING SECTIONS 285 AND 286 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, PROVIDING FOR AN EQUITABLE DISTRIBUTION OF THE INTERNAL REVENUE ALLOTMENT (IRA) TO LOCAL GOVERNMENT UNITS"
congress_website_abstract = "The share of local government units in the internal revenue allotment shall be allocated [in the following manner:] BEGINNING IN 1996 AFTER DEDUCTING THERE FROM THE COSTS OF DEVOLUTION, OTHERWISE KNOWN AS GUARANTEED FUND. THE GUARANTEED FUND SHALL BE DISTRIBUTED AND REMITTED DIRECTLY TO THE LOCAL GOVERNMENT UNITS CONCERNED AND THE NET OR BALANCE OF THE INTERNAL REVENUE ALLOTMENT SHALL BE ALLOCATED IN THE FOLLOWING MANNER: (a) Provinces - Twenty-three percent (23%); (b) Cities - Twenty-three percent (23%); (c) Municipalities - [Thirty-four percent (34%))] THIRTY-PERCENT (30%); and (d) Barangays - Twenty percent (20%): Provided, however, That the share of each province, city and municipality shall be determined on the basis of the followingformula: (a) Population DENSITY -Fifty percent (50%); AND (b) [Land Area - Twenty-five percent (25%) and] POVERTY INCIDENCE - FIFTY PERCENT (50%)."

