congress_website_title = "AN ACT ESTABLISHING THE NATIONAL PALM OIL DEVELOPMENT AUTHORITY, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to establish a NATIONAL PALM OIL DEVELOPMENT AUTHORITY. The concept and the objective is to assist both the businessmen and farmers engage in the business of palm oil to expand its operations by providing them sufficient informationand technology. It shall likewise provide a one-stop shop which shall facilitate the processing and documentation of all paper requirements necessary for the credit facilities. From the record, it is clear that the palm oil industry has been considered as one of the major sources of national income of the government in the form of business taxes."
