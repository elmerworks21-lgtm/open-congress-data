congress_website_title = "AN ACT PROVIDING A SYSTEM OF ABSENTEE VOTING AND REGISTRATION FOR QUALIFIED FILIPINOS ABROAD AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "All Filipinos abroad, not otherwise disqualified by law who are at least eighteen (18) years of age regardless of their location, work category and residency status abroad, may register as a voter. Any person, who on the day of registration may nothave reached the required age but who, on the day of election shall possess such qualification, may register as a voter."
