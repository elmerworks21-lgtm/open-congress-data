congress_website_title = "AN ACT PROHIBITING THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION (PAGCOR) TO ENTER INTO OPERATING AND/OR MANAGEMENT CONTRACTS WITH ANY OTHER COMPANY OTHER THAN THE EXISTING ONES INCLUDING THE OPERATION, INSTALLATION OF SLOT MACHINES IN SHOPPING MALLS, ARCADES, CENTERS, HOTEL LOBBIES, LRT STATIONS AND SIMILAR PLACES, PROHIBITING GOVERNMENT OFFICIALS AND EMPLOYEES AND ANY OTHER FILIPINO RESIDENTS WHOSE INCOME FALLS BELOW TWO HUNDRED THOUSAND PESOS (P200,000.00) PER ANNUM FROM ENTERING CASINOS,AND LIMITING THE TIME OF CASINO OPERATIONS FROM 8 A.M. UNTIL 12 MIDNIGHT, AMENDING FOR THE PURPOSE SECTIONS 10, 11(1), AND 14(2)(3B)(4A) OF PRESIDENTIAL DECREE NO. 1869 CONSOLIDATING AND AMENDING PRESIDENTIAL DECREES NUMBERED 1067-A, 1067-B, 1067-C,1339 AND 1632, RELATIVE TO THE FRANCHISE AND POWERS OF THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION (PAGCOR) AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Allowing the PAGCOR to operate or install slot machines in public places such as shopping malls, arcades, centers, hotel lobbies, LRT stations and any other similar places would turn our country into a gambling republic.> Gambling simplybreeds corruption, greediness, and immorality among gamblers especially those who run these vices."

