congress_website_title = "AN ACT PROVIDING FOR THE REGIONALIZATION OF THE DEPARTMENT OF EDUCATION, CULTURE AND SPORTS PAYROLL SERVICE DIVISION AND PROVIDING FOR FUNDS THEREFOR"
congress_website_abstract = "The IBM-Payroll Service Division of the Department of Education, Culture and Sports shall be decentralized by establishing a Payroll Service Division (PSD) unit in every regional office of the Department. The REGIONAL PSD shall process, print and distribute the salary checks of public secondary and elementary school teachers including those of non-teaching personnel."
