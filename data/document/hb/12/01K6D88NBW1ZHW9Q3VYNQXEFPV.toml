congress_website_title = "AN ACT FURTHER STRENGTHENING THE HOME DEVELOPMENT MUTUAL FUND AND FOR OTHER PURPOSES"
congress_website_abstract = "Main thrusts of this proposed measure aimed at STRENGTHENING the PAG-IBIG FUND are as follows: (1) Re-statement of the tax-exempt status of the Fund; (2) Provisions on FUND coverage, generation and contribution rates; (3) Power of the Board of Trustees as the ultimate policy determinant; (4) More teeth to the enforcement power of the FUND."

