congress_website_title = "AN ACT AMENDING SECTION 28, ARTICLE TWO, CHAPTER 3 OF THE LOCAL GOVERNMENT CODE OF 1991 (REPUBLIC ACT NO. 7160)"
congress_website_abstract = "The extent of operational supervision and control of fire protection unit shall be governed by the respective Local Government Unit. > This bill seeks to amend Section 28 of the Local Government Code of 1991 (Republic Act No. 7160) in order to transfer the supervision and control of fire protection unit to respective Local Government Unit. Thus, preventing the occurrence again of the deadliest fire in Quezon City, the Manor Hotel in August 2001 which killed 75 people and injured 41 more; the Ozone Disco fire in 1996 which killed 162 people and injured 112 others; and the Lung Center fire where more than 20 people died."

