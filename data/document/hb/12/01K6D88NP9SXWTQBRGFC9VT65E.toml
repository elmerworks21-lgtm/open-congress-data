congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF HUMAN RIGHTS ACTION CENTERS IN ALL THE LEGISLATIVE DISTRICTS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The incidence of human rights violation have considerably decreased since the creation of the Commission on Human Rights under the administration of former President Corazon C. Aquino as embodied in the 1987 Constitution, but due to lack of manpowerand adequate resources, there are still a number of isolated cases of human rights violations especially in the rural and remote areas where the government could not provide for enough protection for the people to enjoy a just and humane life. In acivilized society like the Philippines, violations of human rights have no place and should be curved by the State at all cost. > This bill will provide the necessary assistance to the people who have been victimized by government officials and emplloyees. This will encourage them to report cases of violation to the Human Righst Action Center that will provide them the necessary legal assistance, protection and security."
