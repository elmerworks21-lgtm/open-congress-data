congress_website_title = "AN ACT RATIONALIZING THE ACQUISITION, USE, OPERATION AND MAINTENANCE OF GOVERNMENT MOTOR VEHICLES"
congress_website_abstract = "This bill seeks to update and codify the various laws, including administrative issuances and jurisprudence on the acquisition, use, maintenance and disposal of motor vehicles or transport equipment. Through the years, the misuse of government vehicles and the notoriety of procurement of luxury vehicles by government agencies have alarmed the public that four lead agencies on public trust i.e., the Civil Service Commission, the Commission on Audit, the Ombudsman and the Philippine National Police, were constrained to issue Joint Circular 2000-01 delineating their responsibilitie s in implementing the law, rules and regulations on the proper use of government vehicles."

