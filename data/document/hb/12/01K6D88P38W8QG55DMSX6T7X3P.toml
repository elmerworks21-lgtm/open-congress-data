congress_website_title = "AN ACT GRANTING TAX INCENTIVES TO OWNERS OF COMMON CARRIERS WHICH HABITUALLY ENGAGE IN TRANSPORTING FOOD AND NON-FOOD AGRICULTURAL PRODUCTS"
congress_website_abstract = "Owner of common carriers which habitually engage in transporting food and non-foodagricul tural products shall be entitled to exemption from tax on 25% of itsotherwise taxable income for each year. They engage in transportation. > Any owner of a common carrier who shall avail of the incentive granted herein shall be required to attach in his income tax return, a certification from the Department of Transportaion and Communications that is engaging in transporting food and non-food agriculturalproducts from the rural areas to capital towns and cities in the country."

