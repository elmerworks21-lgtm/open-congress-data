congress_website_abstract = "Compensation of Barangay Health Workers. In addition to the benefits and incentives authorized under Republic Act No. 7883, accredited barangay health workers may be granted compensation in the form of honorarium in an amount not exceeding Four Thousand Four Hundred Pesos (P4,000.00) per moth or the current equivalent minimum rank for Salary Grade I in the city or municipality to which the barangays belong."
