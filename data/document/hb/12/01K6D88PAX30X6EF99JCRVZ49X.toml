congress_website_title = "AN ACT TO AMEND PRESIDENTIAL DECREE NO. 1949, ENTITLED \\\"ESTABLISHING A JUDICIARY DEVELOPMENT FUND\\\" AND FOR OTHER PURPOSES"
congress_website_abstract = "In order to democratize the use of the Judiciary Development Fund (JDF), the measure proposes to increase the apportionment for the cost of living allowance of the members and personnel of the Judiciary from 80% to 90% of the JDF and to proportionately lower from 20% to 10% the allocation for the acquisition, maintenance and repair of office equipment and facilities in court where the legal fees were collected. The bill also seeks to transfer the administration and allocation of the JDF from the Chief Justice to the Supreme Court. The Supreme Court shall have the exclusive power and duty to approve the authorized disbursements and expenditures of the JDF in accordance with set guidelines."
