congress_website_title = "AN ACT PENALIZING THE LAUNDERING OF MONETARY INSTRUMENTS, AUTHORIZING THE EXAMINATION OF BANK RECORDS, CREATION OF THE FINANCIAL TRANSACTIONS AND REPORTS ANALYSIS CENTER OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to criminalize laundering and sets up to fight the illegal recycling of dirty money from crime, drugs and corruption. One of the salient features of this bill is the grant of authority to the Ombudsman and the secretaries of the Department of Justice and Finance and the Central Bank Governor to examine the bank records or accounts of laundering suspects or defendents under certain conditions and the creation of the Financial Transactions and Reports Analysis Center of the Philippines."
