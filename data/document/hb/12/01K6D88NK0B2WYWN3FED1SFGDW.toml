congress_website_title = "AN ACT PROVIDING FOR THE MANDATORY AUTOPSY OF ANY PERSON WHO DIED IN A VIOLENT, SUSPICIOUS, QUESTIONABLE, UNUSUAL AND/OR UNNATURAL MANNER, THE CONDITIONS FOR THE PROPER ISSUANCE OF THE DEATH CERTIFICATE OF SAID PERSON AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Autopsy Act of 2001\". The State shall, in the interest of law, justice and public order, conduct a mandatory or compulsory forensic autopsy in cases of death due to violence, or suspicious or questionable or unusual or unnatural casues. > The autopsy shall be conducted in a manner that will ensure the proper determination of the cause, manner and other surrounding circumstances of death, and must rule out every other possible and conceivable contributing cause. The standards and procedures inthe conduct of the autopsy shall be contained in the rules and regulations issued pursued to this Act."
