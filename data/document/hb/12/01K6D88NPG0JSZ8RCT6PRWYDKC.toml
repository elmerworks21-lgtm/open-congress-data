congress_website_title = "AN ACT INCREASING THE PENALTIES FOR ILLEGAL LOGGING AND PENALIZING ILLEGAL IMPORTATION, SALE, RE-SALE, PURCHASE AND POSSESSION OF CHAINSAWS, AMENDING FOR THIS PURPOSE SECTION 68 OF PRESIDENTIAL DECREE NO. 705, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The nation had reeled from the devastating effects of denuded forests. Throughout the country, thousands of lives and billions of pesos of properties were lost to flashfloods. We could still remember what happened to Ormoc and Nueva Ecija. > It is therefore of extreme urgency to add more teeth to our present forstly law by penalizing not judt the illegal possession of chainsaws but also it illegal importation, sale, re-sale and purchase. this measure could surely discourage indiscriminate exploitation of our dwindling forest reserves."
