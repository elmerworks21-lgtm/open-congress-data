congress_website_title = "AN ACT IMPLEMENTING THE MANDATORY AND PERIODIC DRUG TESTING UNDER THE SUPERVISION OF THE DEPARTMENT OF HEALTH, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Mandatory and periodic blood testing shall cover the following: (a) Applicants for marriage license. - The blood testing for applicants for marriage license shall be an additional requirement before the issuance of aforementioned license to: (1) determine the fitness of the contracting parties; (2) avoid cases of separation and annulment of marriages based on ignorance of a contracting partner due to lingering illness of the other; and(3) avoid further spread of genetic deficiencies and other diseases; and (b) Applicants for Overseas Employment. - No persons shall be issued overseas employment certificate unless he undergoes a comprehensive blood test every before departure for overseas employment and upon arrival therefrom."

