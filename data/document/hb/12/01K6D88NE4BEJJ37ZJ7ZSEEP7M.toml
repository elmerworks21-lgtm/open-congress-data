congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 4226, OTHERWISE KNOWN AS THE `HOSPITAL LICENSURE ACT'"
congress_website_abstract = "Rationale: More than 20 years have passed since its enactment the provisions of the R.A. 4226 \"Hospital Licensure Act\" are rendered absolute and \"without teeth\". Its penal provisions are weak in charter, thus, hospitals found violating the same havemanaged to continue operating by merely paying a fine the amount of Five hundred pesos (P500). Moreover, the Bureau of licensing and Regulation (BLR) does not exercise quasi-judicial functions over violations of the Act."
