congress_website_title = "AN ACT INSTITUTING A NATIONAL LAND USE POLICY, PROVIDING THE IMPLEMENTING MECHANISMS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"National Land Use Act of the Philippines\\\". The measure sets the policy in the formulation of the national physical framework plan and the guidelines and criteria in allocating land to different uses. Through the implementing mechanisms prescribed in the bill, the State should be able to establish the scale of priorities of land use based on the assessment of the demands of various sectors especially those who will be most affected by inappropriate land use. It provides for the creation of theLand Use Policy Council which shall exercise the current powers and responsibilitie s of the National Land Use Committee (NLUC) and the powers and functions pertaining to land use vested by law to the Housing and Land Use Regulatory Board (HLURB)."
