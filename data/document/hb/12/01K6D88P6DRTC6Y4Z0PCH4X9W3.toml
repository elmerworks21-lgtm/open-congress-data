congress_website_title = "AN ACT PENALIZING THE RECYCLING AND RETITLING OF FILMS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Movie Recycling Law of 2002.\" This bill prohibits any person, producer, movie distributor, cinematographer to recycle, retitle and/or distribute or knowinglin permit another to recycle, retitle and distribute any motion picture previously exhibited with the intent to mislead the viewing public into believing that such recycled or retitled film is newly-produced. Any violation of this Act shall be punishable with a minimum fine of Five Hundred Thousand Pesos (P500,000.00) or the total national gross receipts of the exhibited recycled or retitled motion picture, whichever is higher."
