congress_website_title = "AN ACT STRENGTHENING THE PHILIPPINE COCONUT AUTHORITY BY WAY OF INCREASED SMALL COCONUT FARMERS AND FARM WORKERS' PARTICIPATION IN THE DEVELOPMENT OF THE COCONUT INDUSTRY"
congress_website_abstract = "\"Coconut Industry Development Act of 2001\". This proposed measures substantiates the State policy to: (1) ADOPT THE NECESSARY MEASURES THAT WILL ARREST THE SERIOUS PROBLEMS THAT BESET THE COCONUT INDUSTRY, THREATENING ITS VIABILITY; (2) PROMOTE THERAPID INTEGRATED DEVELOPMENT AND GROWTH OF THE COCONUT AND OTHER PAL OIL INDUSTRY IN ALL ITS ASPECTS AND TO ENSURE THAT THE COCONUT FARMERS, SPECIALLY THE SMALL COCONUT FARMERS, TILLERS, WORKERS AND OWNER-CULTIVATO RS WHO COMPRISE THE OVERWHELMING MAJORITY OF THE PEOPLE IN THE COCONUT INDUSTRY, BECOME DIRECT PARTICIPANTS IN, AND BENEFICIARIES OF, SUCH DEVELOPMENT AND GROWTH; AND (3) TO PROMOTE AND INSTITUTIONALIZ E THE PARTICIPATION OF NON-GOVERNMENT ORGANIZATIONS AND PEOPLE'S ORGANIZATION IN THHE COCONUT INDUSTRY DEVELOPMENT PROCESS."
