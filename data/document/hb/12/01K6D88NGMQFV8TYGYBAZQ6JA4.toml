congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF THE INDETERMINATE SENTENCE LAW, AS AMENDED, BY PROVIDING FOR THE MANDATORY PAROLE OF PRISONERS WHO SHALL HAVE SERVED AT LEAST TEN(10) YEARS OF HIS/HER SENTENCE WITH GOOD BEHAVIOR"
congress_website_abstract = "Rationale: It is a fact that penal institutions throughout the country are over-congested because of the rapid increase in criminally and confinement of criminals in detention and prison cells. To decongest our already congested detention and prison cells, there are two alternatives that should be done by the government, namely: (1) build, upgrade and expand more existing ones and (2) deconggest the penal institutions by accelerating the parole program. The first alternative will be very expensive but certainly, the second alternative will be very much economical."
