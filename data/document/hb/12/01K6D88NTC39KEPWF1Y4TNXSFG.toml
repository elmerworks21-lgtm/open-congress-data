congress_website_title = "AN ACT PENALIZING TRAFFICKING OF WOMEN AND MINORS"
congress_website_abstract = "\\\"Anti-Trafficking of Women and Minors Act\\\". Trafficking of women and minors for prostitution and slavery is a worldwide phenomenon controlled by moneyed syndicates and in some cases, are aided by corrupt public officials. It is a business that rakes in an estimated amnount of at least $17 billion annually. Trafficking is a form of violence against and inviolation of women's and children's human rights and dignity and it is the State's responsibility to protect them against any form of exploitation and oppression. It is incumbent upon the State to promote the well being and total development of its constituents, especially the women and children who are most vulnerable to exploitation and abuse. And as a signatory to various internationall agreements and conventions against the trafficking of persons, women and children, the country needs to back its commitment with concrete action."
