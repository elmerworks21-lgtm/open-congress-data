congress_website_title = "AN ACT INSTITUTIONALIZ ING THE POSITION OF TOURISM OFFICER WITH THE RANK OF HEAD OF OFFICE OR DEPARTMENT, MANDATING THE ESTABLISHMENT OF A TOURISM DEPARTMENT/OFFI CE IN ALL LOCAL GOVERNMENT UNITS, AND FOR THIS PURPOSE, AMENDING THE LOCAL GOVERNMENTCODE OF 1991"
congress_website_abstract = "All government units are hereby mandated to institutionaliz e the position of Tourism Officer as a regular item in their respective units. Such position shall have the rank equivalent to head of office or department. The Tourism Officer shall be under the direct supervision of the Chief Executive of the local government unit. > All local government units are hereby mandated to establish a Tourism Department or Tourism Office in their respective units. Such Department/Offi ce shall be organizedto support the efforts, plans and programs of the Tourism Officer."
