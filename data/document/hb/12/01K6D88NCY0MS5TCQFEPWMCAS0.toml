congress_website_abstract = "Any provision to the contrary nothwithstandin g, it shall be unlawful for any person to manufacture, possess, store, produce, trade or distribute nuclear weapons within the Philippine territory. It shall also be unlawful for any war vessel of foreign registry to pass to and from Philippine territorial waters if said vessel stores nuclear weapons in said vessel."

