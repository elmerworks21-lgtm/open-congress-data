congress_website_title = "AN ACT REDUCING THE INCOME TAX RATES OF INDIVIDUAL TAXPAYERS, AMENDING FOR THE PURPOSE CHAPTER III, SECTION 24 (A)(1)(c) OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Rationale: What this proposal intends to do is to jumpstart demand in the economy by empowering the consumer with more purchasing power. This can be done by increasing their take home pay through lower tax rates and hence, lower deductions from their income. A demand-led growth in these crucial times is indeed the way to go. There would be a multiplier effect on overall economic growth because this proposal affects virtually all persons earning income."
