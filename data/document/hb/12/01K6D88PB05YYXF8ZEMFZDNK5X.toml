congress_website_title = "AN ACT AMENDING SECTION 261 OF BATAS PAMBANSA BLG. 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "In the past elections, it has been the practice of the New People's Army (NPA), its members and allied organizations to demand or extort money or other valuable considerations from candidates running for public office in exchange for \\\"permits to campaign\\\" and the like. The \\\"permit to campaign\\\" would allow candidate to campaign freely inside the NPA's claimed \\\"territories\\\". This practice goes against the principles of human rights, political freedom and of electoral reform. This measure seeks to render much practice on electoral offense under our electoral laws (Batas Pambansa Blg. 881)"
