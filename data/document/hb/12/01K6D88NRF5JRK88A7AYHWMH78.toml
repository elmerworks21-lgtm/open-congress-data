congress_website_title = "AN ACT ESTABLISHING A FREE MEDICINE ASSISTANCE PROGRAM FOR THE POOR AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "\"Free Medicine Assistance Act of 2001\". There is hereby established a Free Medicine Assistance Program, hereinafter referred to as the \"Program,\" to be administered by the Department of Health through its authorized government hospital in each particular congressional district, to be known as the health district, in coordination with the Department of Social Welfare and Development. >The Program shall be limited to eligible beneficiaries to be identified by the Department of Health through thegovernment hospital in the health district in coordination with the Department of Social Welfare and Development. The implementing rules and regulations shall see to it that the intended beneficiaries come from the ranks of the poorest of the poor, tthe Program being strictly a poverty alleviation measure."

