congress_website_title = "AN ACT AUTHORIZING THE CONDONATION OF PENALTIES ON DELINQUENT SOCIAL SECURITY CONTRIBUTIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "Notwithstanding the provisions of Sec. 30 of R.A. No. 1161, as amended by R.A. No. 8282, any employer who is deliquent or has not remitted all contributions due and payable to the Social Security System (SSS) may, without incurring the prescribed penalty: (1) Remit all such delinquent contributions within a period of twelve (12) months from effectivity of this Act; and (2) Submit in writing a proposal to pay in installment such delinquent contribution within a period of six (6) months from theeffectivity of this Act. > Provided: That the employers shall submit together with his remittance or installment proposal the corresponding correction list."
