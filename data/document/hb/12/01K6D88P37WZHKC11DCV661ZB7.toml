congress_website_title = "AN ACT GRANTING INCENTIVES TO SALT MANUFACTURERS TO ENCOURAGE PRODUCTION OF ADEQUATE SUPPLY OF IODIZED SALT"
congress_website_abstract = "\"Additional Salt Incentives Act of 2002\". (ASIN act). This bill grants the following incentives to the salt industry: (1) Salt manufacturers/p roducers as defined in R.A. No. 8172 shall be exempt from the coverage of R.A. No. 6657 or the Comrehensive Agrarian Reform Law (CARL) by removing salt beds from the list of private lands that can be taken over for purposes of agrarian reform, in order to ensure adequate areas for sal production; (2) Iodized Salt manufacturers and Iodized salt importersshall be exempt from paying the Value Added Tax (VAT) on iodized salt, in order to encourage the continuous availability of iodized salt for human and animal consumption; and (3) Importers of iodizing equipment and iodides shall be granted exemptionfrom customs duties."
