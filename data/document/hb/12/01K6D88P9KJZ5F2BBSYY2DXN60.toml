congress_website_title = "AN ACT PROMOTING BREASTFEEDING BY ESTABLISHING AND MAINTAINING LACTATION STATIONS IN WORKPLACES FOR WORKING MOTHERS PROVIDING PENALTIES FOR ITS VIOLATION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Breastfeeding Promotion Act of 2003\\\". Studies have shown that breastfeeding means better health for babies. Aside from government and private hospitals, there are no facilities outside of the home where a mother can comfortably and privately breastfeed their babies. This bill mandates the establishment of lactation stations in workplaces for nursing female employees. The lactation station must be private, clean and well-ventilated and must have a lavatory for hand-washing, refrigeration for storage, and comfortable seats."
