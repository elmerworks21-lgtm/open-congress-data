congress_website_title = "AN ACT ESTABLISHING A FARM MACHINERIES MANUFACTURING PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This bill seeks to provide for the establishment of a Farm Machineries Manufacturing Program. A comprehensive program that shall introduce mechanized farming to boast production is very important. It is through the Farm Machineries Manufacturing Program that this idea could be achieved. Local manufacturers shall be encourages to enter into a joint venture with foreign companies that shall assist and train then with the view of enabling them to maximize the utilization of local materials in their products."

