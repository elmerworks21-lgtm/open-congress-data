congress_website_title = "AN ACT MANDATING THE ELIMINATION OF CHILD LABOR POLICY AS A REQUIRED BARGAINING CLAUSE IN COLLECTIVE BARGAINING AGREEMENTS, AMENDING FOR THIS PURPOSE THE PERTINENT PROVISIONS OF THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "There is hereby inserted after Article 260 of Presidential Decree No. 442 as amended, otherwise known as the \"Labor Code of the Philippines\" a new Article 260-A which shall read as follows: \"ART 260-A. ELIMINATION OF CHILD LABOR; REQUIRED BARGAINING CLAUSE. - THE PARTIES TO A COLLECTIVE BARGAINING AGREEMENT SHALL INCLUDE THEREIN A PROVISION PROHIBITING CHILD LABOR AND PROVIDING SANCTIONS FOR ITS VIOLATION.\""

