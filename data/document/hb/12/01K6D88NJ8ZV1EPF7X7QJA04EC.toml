congress_website_title = "AN ACT INSTITUTING A CHILDREN'S WELFARE FUND FOR THE PROTECTION AND REHABILITATION OF ABANDONED ABUSED AND SEXUALLY EXPLOITED CHILDREN, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7610, OTHERWISE KNOWN AS \"THE SPECIAL PROTECTION OF CHILDREN AGAINST CHILD ABUSE, EXPLOITATION AND DISCRIMINATION ACT\""
congress_website_abstract = "It shall be the policy of the State to recognize the vital role of the youth in nation-building . Towards this end, it shall promote and protect their physical, moral, spiritual, intellectual and social well-being. There shall be incorporated afterSec. 30 of R.A. No. 7610 to read as follows: SEC. 31. CHILDREN'S WELFARE FUND FOR ABANDONED, ABUSED AND SEXUALLY EXPLOITED CHILDREN. - IN ORDER TO EFFECTIVELY PROTECT AND REHABILITATE CHILDREN WHO ARE VICTIMS OF ALL FORMS OF ABUSE AND SEXUAL EXPLOITATION, THERE IS HEREBY ESTABLISHED A PROTECTION AND REHABILITATION FUND FOR ABUSED AND SEXUALLY EXPLOITED CHILDREN IN THE AMOUNT OF ONE HUNDRED MILLION PESOS (P100,000,000.0 0) TO BE KNOWN AS CHILDREN'S WELFARE FUND, TO BE CONSTITUTED FROM THE FOLLOWWING SOURCES: 1) P50 M - National Treasury; 2) P30M - President's Contingency Fund; and 3) P20M - PCSO."
