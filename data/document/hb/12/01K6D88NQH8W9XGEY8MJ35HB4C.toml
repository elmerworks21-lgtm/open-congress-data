congress_website_title = "AN ACT PROVIDING FOR THE RETIREMENT, DEATH DISABILITY AND OTHER BENEFITS OF PROSECUTORS, PROVINCIAL/CITY FISCALS AND THEIR ASSISTANT, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Retirement Law of the National Prosecution Service\". This Act shall apply to Prosecutors, Provincial/City Fiscals and their Assistants who are appointed or designated by the President under Presidential Decree No. 1275, as amended. >Rationale:Existing laws DO NOT adequately provide for the retirement of members of the National Prosecution Service despite their roles as the partner of the Judiciary in the dispensation of justice and as an indispensable component of our criminal justice system, being at the forefront in the investigation and prosecution of criminal cases. Existing economic conditions have rendered inadequate benefits under the existing retirement laws thus necessitating an expanded and improved retirement law and the ggrant of other benefits to prosecutors/fis cals commensurate to the risks and hazards of their work."
