congress_website_title = "AN ACT ESTABLISHING A PROVIDENT PERSONAL SAVINGS PLAN KNOWN AS THE PERSONAL EQUITY AND RETIREMENT ACCOUNT (PERA)"
congress_website_abstract = "\"Personal Equity and Retirement Account\". This measure aims to promote the capital market development and savings mobilization by establishing the legal and regulatory framework of retirements plans comprised of voluntary personal savings and investments. Contributors to the personal equity and retirement account (PERA) shall retain ownership of the funds placed therein, including all the earnings of such funds. The PERA Investment Vehicles (common trust fund, mutual fund, annuity contract or pre-need pension plans dedicated solely for PERA purposes) shall be granted tax exemption privileges."
