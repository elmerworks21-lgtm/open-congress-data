congress_website_title = "AN ACT INCREASING THE PENALTY FOR KILLING, WOUNDING, CAPTURING OR TAKING AWAY OF THE EAGLE AND/OR DESTROYING ITS HABITAT, DISTURBING OR TAKING AWAY OF THE BIRD'S NEST OR EGGS, AMENDING FOR THE PURPOSE SECTION FIVE OF REPUBLIC ACT NUMBERED SIXTY-ONEHUNDRED AND FORTY-SEVEN"
congress_website_abstract = "Rationale: The Philippine Eagle is a symbol of all life in the rain forest. Just as this bird depends on the rain forests to survice, the earth's survival likewise lies on the preservation of the forests. If the eagle disappears, it means the support forest has disappeared. The survival of the eagle means the survival of our race. > Following is the proposed AMENDMENT to Section 5, RA No. 6147: \"SEC. 5. Any person violating any provision of this Act shall be punished by a penalty of [prision correccional] PRISION MAYOR or by a fine of not less than [six hundred][(P600. 00)] TEN THOUSAND PESOS (P10,000.00) nor more than (One) FIFTEEN THOUSAND PESOS [(P1,000.00) (P15,000.00), or by both such imprisonment and fine at the discretion of the coourt. In case of any subsequent offense, the Court shall impose both the imprisonment and the fine. In case of insolvency , the corresponding subsidiary imprisonment shall be imposed upon the offender.\""
