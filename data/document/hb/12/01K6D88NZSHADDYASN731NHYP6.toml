congress_website_title = "AN ACT STRENGTHENING THE RIGHT TO SECURITY OF TENURE, PROVIDING PENALTIES FOR VIOLATIONS THEREOF, AMENDING PERTINENT PORTIONS OF THE LABOR CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "The amendments intended to strengthen the right to security of tenure of employees deal on the following: (1) When employment is deemed \"regular\"; (2) Entitlement of a contractrual employee to all rights and privileges; (3) Coverage of specific projects/undert akings for a fixed period; and (4) When an employee is dismissed to just or authorized cause."

