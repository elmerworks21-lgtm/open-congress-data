congress_website_title = "AN ACT CREATING THE CENTER FOR LEADING-EDGE EDUCATIONAL TECHNOLOGIES, PROVIDING FOR ITS ORGANIZATIONAL STRUCTURE, POWERS AND FUNCTIONS, AUTHORIZING THE APPROPRIATION OF FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Charter of the Center for Leading-Edge Educational Techniques.\" This bill seeks the establishment of a Center for Leading-Edge Educational Technologies (CLET) which will bring together the academic, technological and economic forces that, only in consort, can advance the educational promise of affordable materials for use in these emerging technologies. To be able to do this, we need to train people to be CLET experts and acquire a critical mass of equipment and software, centrally located inhigh-technology facility."

