congress_website_title = "AN ACT INSTITUTING THE DANGEROUS DRUGS ACT OF 2001 REPEALING REPUBLIC ACT NO. 6425, AS AMENDED"
congress_website_abstract = "Rationale: Dangerous drugs and their abuse by increasing number of people specially the young are reaching epidemic proportions. The fight against drug addiction is hampered by the outdated law R.A. 6425 which is now inadequate. This bill was thoroughly discussed in the 11th Congress and in fact was approved by the House. However, due to lack of time this was not taken up in the Senate due to the impeachment proceedings."
