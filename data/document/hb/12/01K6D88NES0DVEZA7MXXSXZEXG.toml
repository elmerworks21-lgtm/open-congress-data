congress_website_title = "AN ACT PROVIDING THAT A SUBJECT IN PARAPSYCHOLOGY BE INCORPORATED IN THE SCHOOL CURRICULA OF ALL PRIVATE AND PUBLIC HIGH SCHOOLS AND COLLEGES IN THE COUNTRY"
congress_website_abstract = "This bill seeks to include parapsychology in the curriculum to enable the youth to widen their educational horizon and perspectives. It will help them understand occurrences or phenomena outside the natural order of things. Likewise, parapsychologyas a subject in the curriculum will enable individuals with this natural ability to develop their psychic and extraordinary powers for their over-all advancement."
