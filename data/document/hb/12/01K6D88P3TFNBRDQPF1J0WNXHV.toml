congress_website_title = "AN ACT UPGRADING THE SALARY GRADE LEVEL OF THE SCHOOLS DISTRICT SUPERVISORS FROM SALARY GRADE NINETEEN (19) TO SALARY GRADE TWENTY-FOUR (24)"
congress_website_abstract = "Rationale: At present, school district supervisors are inadequately compensated, considering that in general, before they become as such, they have to go through the rigid administrative processes and experience first as a teacher, and later as a school principal. Their salary is much lower that the salary of a school principal. Technically, the salary grade of a district supervisor is salary grade (SG) - 19, while that of a secondary school principal is SG - 21, or to steps higher. > This billseeks to ensure that schools district supervisors are commensurately compensated. Enactment of this measure is earnestly requested."
