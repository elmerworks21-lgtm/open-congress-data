congress_website_title = "AN ACT STRENGTHENING AND VESTING THE BUREAU OF FOOD AND DRUGS WITH QUASI-JUDICIAL POWERS AND FOR OTHER PURPOSES, AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED THIRTY-SEVEN HUNDRED AND TWENTY, OTHERWISE KNOWN AS THE \"FOODS, DRUGS AND DEVICES, AND COSMETICS ACT\""
congress_website_abstract = "Rationale: The Law (RA 3720) which created the Food and Drugs Administration (FDA), as amended by RA 7394 (Consumer Act of the Philippines), failed to clothe the Bureau with the power or authority to administer the law and the rules and regulationsissued pursuant thereto effectively. The existing laws further failed to clarify the extent of the Bureau's regulatory powers making it hesitant and therefore ineffective to implement existing rules and regulations perceived to be beyond the Agency'srule-making authority."
