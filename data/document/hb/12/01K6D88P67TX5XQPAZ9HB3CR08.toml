congress_website_title = "AN ACT PROVIDING FOR THE APPOINTMENT OF A FULL-TIME COMMISSIONER AND THE EXECUTIVE DIRECTOR IN THE COMMISSION ON THE FILIPINO LANGUAGE, AMENDING FOR THE PURPOSE THE COMMISSION ON THE FILIPINO LANGUAGE ACT"
congress_website_abstract = "This bill seeks to amend RA 7104 otherwise known as the Commission on the Filipino Language, by reducing the full-time Commissioner to only one to promote efficiency and simplicity in the discharge of its functions. On the other hand, the designation of the Director General shall be changed to Executive Director who shall be a member of the Bar."

