congress_website_title = "AN ACT PROVIDING FOR A GRANT OF REWARD TO INFORMERS OF VIOLATIONS OF REPUBLIC ACT NO. 7080 AND/OR REPUBLIC ACT NO. 1379 AND FOR OTHER PURPOSES"
congress_website_abstract = "Any person, who voluntarily gives vital information supported by competent evidence not yet in possession of any government investigating agency, concerning ILL-GOTTEN WEALTH of any public official or employee, which materially accounted for or aided in the recovery of the said proeprty in favor of the State and/or the conviction of the guilty party in accordance with the provisions of Republic Act No. 7080 and/or Republic Act No. 1379, shall be entitled to a reward equivalent to twenty-five percentum (25%) of the value of the ill-gotten wealth actually collected or recovered."

