congress_website_title = "AN ACT DEFINING ORGANIZED CRIME, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Organized Crime Act of 2001\". Rationale: This bill substantiates the policy of the State to protect our people from organized crime and other transnational crime, and to that end, strengthen the laws and the government's capabilities to effectively deter, prevent, suppress and prosecute acts relating to organized crime. The State shall join international community in preventing and combating transnational organized crime.> Salient provisions of this bill are as follows: (1) Enumeration ofPROHIBITED ACTIVITIES under this measure; (2) Creation of the NATIONAL ANTI-ORGANIZED CRIME COMMISION; (3) JURISDICTION OF THE REGIONAL TRIAL COURTS; (4) CONFISCATION AND SEIZURE; and (5) MUTUAL ASSISTANCE AMONG STATES."
