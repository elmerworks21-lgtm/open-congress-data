congress_website_title = "AN ACT TO AMEND REPUBLIC ACT NO. 340, AS AMENDED, WHICH ESTABLISHED A UNIFORM RETIREMENT SYSTEM FOR THE ARMED FORCES OF THE PHILIPPINES"
congress_website_abstract = "Section 3 of this Act provides for the payment of benefits to survivors of retired military personnel but it specifically excludes from entitlement to such benefits the widow of a retired officer or enlisted man if her marriage to the officer or enlisted man was contracted after his retirement from the military service. This provision is unfair to widows who married their husbands when these men were already advanced in years and therefore needed more companionship, care and attention."
