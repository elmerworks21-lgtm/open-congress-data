congress_website_title = "AN ACT ESTABLISHING THE BOOKS FOR THE BARRIOS PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "It is the policy of the State to give the Filipino youth, particularly in remote areas, the chance for upward mobility through education not only by listening but also reading. Towards this end, all public schools and libraries in remote barangays shall be provided with books under the Books for the Barrios Program."
