congress_website_title = "AN ACT PROVIDING FOR BLOCK VOTING IN THE ELECTIONS FOR PRESIDENT, VICE-PRESIDENT, GOVERNOR, VICE-GOVERNOR, MAYOR AND VICE-MAYOR"
congress_website_abstract = "This bill provides that the vote for the President shall be considered a vote for the Vice-President. Likewise, the vote for the Governor and Mayor shall also be considered a vote for the Vice-Governor and Vice-Mayor, respectively, PROVIDED, that both candidates shall be running under the same political party or aggrupation. > This proposed measure aims to achieve harmonious relationships which in turn will result in the achievement of a more unified leadership and devotion to solving the problems of the administration."
