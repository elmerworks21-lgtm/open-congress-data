congress_website_title = "AN ACT IMPOSING A SEVEN PERCENT (7%) COMPUTER EDUCATION TAX ON RECEIPTS (EXCLUDING VALUE-ADDED TAX) FROM CELLULAR PHONE CALLS TO BE BORNE BY CELLULAR PHONE COMPANIES, CREATING A SPECIAL COMPUTER LITERACY EDUCATION FUND FOR PUBLIC SCHOOLS, AND FOR OTHER PURPOSES"
congress_website_abstract = "There shall be levied, assessed and collected on receipts (excluding value-added tax) from cellular phone calls a computer eduction tax amounting to seven percent (7%) to be borne by each cellular company from the effectivity of the Act. Receipts from cellular phone calls shall mean revenues made by cellular companies from prepaid cellphone cards, text messaging service, post-paid calls and other services using the cellular network. This tax shall be in addition to, and separate from the incomeand value-added taxes a cellular company remits to the bureau of Internal Revenue."
