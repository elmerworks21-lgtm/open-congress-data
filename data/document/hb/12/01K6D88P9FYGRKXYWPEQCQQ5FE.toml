congress_website_title = "AN ACT REGULATING HARBOR PILOTAGE SERVICES AND THE CONDUCT OF HARBOR PILOTS IN ALL PORTS IN THE PHILIPPINES AND FOR RELATED PURPOSES"
congress_website_abstract = "\\\"Pilotage Service Act of 2003\\\". Pilotage plays a vital and complementary role in the efficient operation of ports. However, the Philippines still has to pass a pilotage act that would regulate this maritime activity in accordance with international principles of pilotage specially with respect to the pilot's liability in the event of damage to property or death and injury to persons caused by a vessek under pilotage. This measure seeks to institutionalize prevailing practices in pilotage service, rationalize pilotage fees and other charges, and define the legal relationship between the harbor pilots and pilotage organizations."
