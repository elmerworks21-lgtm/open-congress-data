congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION AND PRESERVATION OF PHILIPPINE CULTURAL HERITAGE AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Cultural Heritage Law of 2002\". This bill seeks to protect, preserve and promote the nation's cultural heritage, its properties and its histories, in order to conserve the ethnicity of local communities and of the nation as a whole. Similarly, it aims to establish and strengthen cultural institutions, and to protect cultural workers and assure their professional development and well-being."
