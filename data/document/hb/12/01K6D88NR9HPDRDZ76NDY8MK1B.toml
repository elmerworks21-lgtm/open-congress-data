congress_website_title = "AN ACT UPGRADING THE MINIMUM SALARY GRADE LEVEL OF TEACHERS FROM SALARY GRADE 10 TO 19"
congress_website_abstract = "Public school teachers are among the most underpaid workers in our society. The low salaries received by our public school teachers have been a major disincentive for them to improve their skills in teaching and pursue further education and training. In addition, the public schools have failed to attract the best and the brightest students from the top colleges and universities because of the low salary levels, preventing our public education system from benefiting from the knowledge and expertise of qualified teachers."

