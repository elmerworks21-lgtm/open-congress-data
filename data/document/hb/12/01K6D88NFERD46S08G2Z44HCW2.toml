congress_website_title = "AN ACT CREATING THE PHILIPPINE DRUG ENFORCEMENT ADMINISTRATION, DEFINING ITS POWERS AND FUNCTIONS, AND ABOLISHING THE DANGEROUS DRUGS BOARD CREATED UNDER REPUBLIC ACT NO. 6425, OTHERWISE KNOWN AS `THE DANGEROUS DRUGS ACT OF 1972' FOR THIS PURPOSE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Creation and Mission of the Philippine Drug Enforcement Administration. - An agency is hereby created to be known as the Philippine Drug Enforcement Administration (PDEA), hereinafter referred to as \"PDEA\", which shall provide the national policy and program direction on drug control and shall be responsible for the efficient and effective enforcement of all laws on prohibited and regulated drugs and other controlled substances."

