congress_website_title = "AN ACT PROVIDING FOR THE REDUCTION OF THE FIVE (5)-YEAR QUALIFICATION PERIOD FOR THE PROSECUTION STAFF EXCLUDING THE CHIEF STATE PROSECUTOR AND THE THREE (3) ASSISTANTS CHIEF STATE PROSECUTORS, AMENDING FOR THE PURPOSE SECTION 3 OF PRESIDENTIAL DECREE NO. 1275"
congress_website_abstract = "The Chief State Prosecutor, the three Assistants Chief State Prosecutors, [and the members of the Prosecution Staff] shall be selected from among qualified and professionally trained members of the legal profession who are of proven integrity and competence and have been in the actual practice of the legal profession for at least five (5) years prior to their appointment or have held during like period, any position requiring the qualifications of a lawyer. THE ACTUAL PRACTICE OF THE LEGAL PROFESSION REQUIREMENT HOWEVER, FOR THE OTHER MEMBERS OF THE PROSECUTION STAFF ASIDE FROM THE ABOVE-MENTIONED POSITIONS IS ONLY THREE (3) YEARS."

