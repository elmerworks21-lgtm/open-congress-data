congress_website_title = "AN ACT PROVIDING THAT ONLY PROOF OF OWNERSHIP SHALL BE REQUIRED IN SHIPPING ANY MOTOR VEHICLE, MOTOR VEHICLE ENGINE, ENGINE BLOCK, CHASSIS OR BODY FROM ONE ISLAND TO ANOTHER, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-FIVE HUNDRED AND THIRTY-NINE, OTHERWISE KNOWN AS THE \"ANTI-CARNAPPIN G ACT OF 1972\""
congress_website_abstract = "This bill seeks to amend Republic Act No. 6539, otherwise known as the Anti-Carnapping Act of 1972, by doing away with the requirement of securing a clearance from the Philippine Constabulary (now Philippine National Police) before transporting a motor vehicle, motor engine, engine block, chassis or body from one island to another."

