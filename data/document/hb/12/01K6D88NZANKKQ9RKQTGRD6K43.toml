congress_website_title = "AN ACT PROVIDING FOR AN EXTENTION OF THE REGISTRATION OF MEMBERS OF THE KATIPUNAN NG MGA KABATAAN (SK) FOR THE PERIOD APRIL 8 TO APRIL 14, 2002"
congress_website_abstract = "Rationale: In connection with the scheduled May 2002 Sangguniang Kabataan Elections, a general registration was conducted last December 10-26, 2001 of members of the Katipunan ng mga Kabataan, pursuant to COMELEC Resolution No. 4713. Registration turnout was minimal. > Accordingly, the most common problems encountered were the inaccessibility of the designated registration centers which were done at the municipal or city Comelec Offices, depriving the youth living in far-flung barangays the chance to vote; and the short proximity of time between the period of information dissemination and actual inclusive dates of registration."
