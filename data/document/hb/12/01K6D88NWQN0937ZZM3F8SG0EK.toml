congress_website_title = "AN ACT INCREASING THE AMOUNT OF SUPPLIES WHICH MAY BE PROCURED BY LOCAL GOVERNMENT UNITS THROUGH PERSONAL CANVASS, THEREBY AMENDING FOR THE PURPOSE SECTION 367 OF REPUBLIC ACT NO. 7160"
congress_website_abstract = "SECTION 1. Section 367 of Republic Act No. 7160, otherwise known as the Local Government Code of 1991, is hereby amended to read as follows: \"SEC. 367. Procurement through Personal Canvass. - [Upon approval by the Committee on Awards] [p]Procurementof supplies may be affected after personal canvass of at least three (3) responsible suppliers in the locality by a committee of three (3) composed of the local general services officer or the municipal barangay treasurer, as the case may be, the local accountant, and the head of office or department for whose use the supplies are being procured. [The a]Awards [shall be decided] MADE UNDER THIS SECTION SHALL NOT BE SUBJECT TO REVIEW by the Committee on Awards.\""
