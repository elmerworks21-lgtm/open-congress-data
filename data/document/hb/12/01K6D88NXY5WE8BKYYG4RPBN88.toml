congress_website_title = "AN ACT AMENDING SECTION 6, TITLE I OF EXECUTIVE ORDER NO. 248, PRESCRIBING RULES AND REGULATIONS AND NEW RATES OF ALLOWANCES FOR OFFICIAL LOCAL AND FOREIGN TRAVELS OF GOVERNMENT PERSONNEL"
congress_website_abstract = "The travel expenses of government personnel regardless of rank and position shall be in the amount of [three hundred pesos (P300.00)] ONE THOUSAND PESOS (P1,000.00) per day divident into two (2) components: (1) Travel Allowance of [Two Hundred Pesos(P200.00)] FOUR HUNDRED PESOS (P400.00) which will cover the cost of meal, inland transportation and other incidental expenses; and (2) Hotel Room/Lodging Rate at [One Hundred Pesos (P100.00)] SIX HUNDRED (P600.00_ PESOS."
