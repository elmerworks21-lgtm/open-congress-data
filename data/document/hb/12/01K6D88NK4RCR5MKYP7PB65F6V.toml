congress_website_title = "AN ACT RE-IMPLEMENTING THE SYSTEM OF ATTRITION, PROVIDING FOR OPTIMUM UTILIZATION OF PERSONNEL IN GOVERNMENT SERVICE, PROVIDING PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Attrition\" is the reduction of personnel as a result of resignation, retirement, dismissal in accordance with laws, death or transfer to another office. Within five (5) years from the approval of this Act, no appointment shall be made fo fill vacated career positions in any government office as a result of attrition. >The system of attrition shall cover the National Government and all its instrumentaliti es or agencies including government-owne d and/or controlled corporations, and governmentfinancial institutions receiving subsidies from the national government."
