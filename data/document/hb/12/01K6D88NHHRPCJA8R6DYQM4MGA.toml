congress_website_title = "AN ACT REGULATING THE EDUCATION AND LICENSURE OF PHYSICIANS AND THE PRACTICE OF MEDICINE IN THE PHILIPPINES, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 2382, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Medical Act of 2001.\" This proposed measure shall govern the: (a) the standardization , upgrading, and regulation of medicine courses including internship training; (b) the examination for registration and licensure of Physicians; (c) the supervision, control and regulation of the practice of medicine; (d) the integration of the medical profession; and (e) the development of the professional competence of physicians through continuing professional education in accordance with the guidelines set by the Professional Regulation Commission."
