congress_website_title = "AN ACT INCREASING THE COMPENSATION OF WATER DISTRICT BOARD MEMBERS AND PROVIDING SECURITY OF TENURE FOR GENERAL MANAGERS OF WATER DISTRICTS, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 198, OTHERWISE KNOWN AS THE PROVINCIAL WATER UTILITIES ACTOF 1973"
congress_website_abstract = "SECTION 1. Section 13 of P.D. No. 198, as amended, is hereby amended to read as follows: SEC. 13. Compensation - Each director shall receive a per diem, to be determined by the Board, for each meeting of the Board actually attended by him, but no director shall receive per diems in any given month in excess of the equivalent of the total per diem of four meetings in any given month. [No director shall receive other compensation for services to the district.] > Any per diem in excess of [P50] P150 shall be subject to the approval of the Administration. IN ADDITION THERETO EACH DIRECTOR SHALL RECEIVE ALLOWANCES AND BENEFITS AS THE BOARD MAY PRESCRIBE SUBJECT TO THE APPROVAL OF THE ADMINISTRATION."
