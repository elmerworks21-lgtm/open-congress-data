congress_website_title = "AN ACT INSTITUTING A MARITIME CODE, THEREBY REVISING AND CONSOLIDATING ADMIRALTY AND MARITIME LAWS TO MODERNIZE THE MARITIME INDUSTRY, PROMOTE AND REGULATE MERCHANT MARINE ACTIVITIES, RATIONALIZE THE ORGANIZATION AND FUNCTIONS OF GOVERNMENT AGENCIESRELATED TO ADMIRALTY AND MARITIME MATTERS, AND INSURE THE PROTECTION OF THE MARINE WEALTH IN THE PHILIPPINE TERRITORY"
congress_website_abstract = "\"Maritime Code of the Philippines.\" This bill seeks to correct the various problems affecting the maritime sector. It is now time to put an end to the fragmentation and overlapping of functions of the different government agencies and create a bodythat will be the main and central agency concerned with maritime administration in this country."

