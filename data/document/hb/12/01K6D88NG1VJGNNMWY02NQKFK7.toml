congress_website_title = "AN ACT TO AMEND REPUBLIC ACT NO. 8239, OTHERWISE KNOWN AS THE PHILIPPINE PASSPORT ACT OF 1996"
congress_website_abstract = "The proposed amendments to the Philippine Passport Act of 1996 will affect the following: (1) An applicant who does not have a birth certificate either because his fact of birth has never been registered or because of the loss of his certificate ofbirth; (2) A married woman who changes her surname as a result of a change in status; and (3) Naturalized citizens, minors aliens, government officials and senior citizens."
