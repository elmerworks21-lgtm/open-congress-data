congress_website_title = "AN ACT REQUIRING THE MANDATORY LABELING OF FOOD AND FOOD PRODUCTS CONTAINING GENETICALLY-MOD IFIED ORGANISMS AND FOOD PRODUCED BY GENETIC ENGINEERING TECHNOLOGIES, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED THREE THOUSAND SEVEN HUNDRED AND TWENTY, OTHERWISE KNOWN AS THE FOOD, DRUGS AND DRUG DEVICES AND COSMETICS ACT, AND REPUBLIC ACT NUMBERED SEVEN THOUSAND THREE HUNDRED AND NINETY-FOUR, OTHERWISE KNOWN AS THE CONSUMERS' ACT OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Genetically Engineered Food Right to Know Act.\" Rationale: In line with the Constitutional mandate for the State to \"protect and promote the right to health of the people and instill health consciousness among them.\" and the Constitutional right of the Filipino people \"to a balanced and healthful ecology in accord with the rhythm and harmony of nature,\" it is hereby declared the policy of the State to ensure that the Filipino people are provided with safe food and food products that will notput their health at risk and place the environment in jeopardy."
