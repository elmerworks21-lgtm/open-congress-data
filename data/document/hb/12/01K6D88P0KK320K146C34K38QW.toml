congress_website_title = "AN ACT PENALIZING ANY PERSON DRIVING A MOTOR VEHICLE UNDER THE INFLUENCE OF ANY KIND OF ALCOHOLIC BEVERAGES"
congress_website_abstract = "\"Anti-Drunk Driving Act of 2002\". It is the policy of the State to minimize if not totally eliminate injuries and death due to accidents caused by persons driving any kind of motor vehicle while under the influence of any kind og alcoholic beverages. > It shall be unlawful for any person to drive a motor vehicle while under the influence of alcohol. A person shall be considered under the influence of alcohol if it shall be established that he has a Blood Alcohol Concentration of 0.06% or more."
