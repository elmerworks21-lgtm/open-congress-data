congress_website_title = "AN ACT DECLARING AND REAFFIRMING THE COCO LEVY FUNDS AND ASSETS AS PUBLIC FUND AND CREATING THE PRESIDENTIAL COCONUT INDUSTRY DEVELOPMENT COUNCIL FOR PURPOSES OF MANAGEMENT THEREOF"
congress_website_abstract = "\"Coco Levy Funds and Assets Are Public Funds Act of 2001\". Rationale: The nature of the funds has been the subject of a legal battle between the government and the private corporations and entities utilizing the coco levy funds. As a consequence, the funds could not be utilized and were in fact not used for the benefit of their true owners, the coconut farmers. It is ironic that after almost fifteen (15) years, the cases related to the coco levy scam had never been concretely resolved in our courts to the great disadvantage of millions of small coconut farmers and farm workers from whom the levy was collected.> This bill was filed for Congress to finally declare and affirm the coco levy funds and assets as public funds so they can be accesssed and appropriate programs could be funded for the benefit of their true owners and of the entire industry."
