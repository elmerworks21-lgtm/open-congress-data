congress_website_title = "AN ACT TO GUARANTEE THE FREEDOM OF ACCESS TO INFORMATION FOR ALL JOURNALISTS, MEDIA PRACTITIONERS, AND CITIZENS OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The State adopts and implements a policy of full PUBLIC DISCLOSURE of all its transactions volving public interest. The right of the people to information on matters of public concern shall be recognized. Subject to the limitations provided in this law, access to official records, and to documents, and papers pertaining to official acts, transactions, or decisions, as well as to government research data used as basis for policy development, shall be afforded the citizens. The Statealso recognizes the vital role of communication and information in nation building."
