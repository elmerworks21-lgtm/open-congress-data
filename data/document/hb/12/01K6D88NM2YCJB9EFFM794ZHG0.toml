congress_website_title = "AN ACT PROVIDING LEGAL ASSISTANCE TO MEMBERS OF THE ARMED FORCES OF THE PHILIPPINES AND THE PHILIPPINE NATIONAL POLICE CHARGED FOR SERVICE-CONNECT ED OFFENSES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The Secretary of National Defense and the Secretary of the Interior and Local Government may authorize lawyers of their respective departments to provide legal assistance and representation to any member of the Armed Forces of the Philippines and the Philippine National Police who is facing charges before fiscals and courts for any offense arising from or connected with the performance of his official duties. Should government lawyers be not readily available, lawyers from the private sectors may be hired to provide such legal assistance."
