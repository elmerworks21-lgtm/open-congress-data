congress_website_title = "AN ACT FURTHER AMENDING SECTION 13 OF REPUBLIC ACT NO. 3019, OTHERWISE KNOWN AS THE ANTI-GRAFT AND CORRUPT PRACTICES ACT"
congress_website_abstract = "Any incumbent public officer against whom any criminal prosecution under a valid information under this Act or under Title 7, Book II of the Revised Penal Code or for any offense involving fraud upon government or public funds or property whether asa simple or as a complex offense and in whatever stage of execution and mode of participation, is pending in court, shall be suspended from office, EXCEPT WHEN HE IS ALREADY OCCUPYING AN OFFICE WHICH IS NOT TASKED WITH THE CUSTODY OF DOCUMENTS THATMAY BE USED AGAINST HIM NOR EXERCISES DIRECT OR INDIRECT ADMINISTRATIVE SUPERVISION OVER SUCH PERSONS SO TASKED OR OTHER WITNESS FOR THE PROSECUTION. > THE PREVENTIVE SUSPENSION SHALL BE FOR A PERIOD OF NOT EXCEEDING NINETY (90) DAYS. IT SHALL BE IMPPOSED ONLY AFTER ARRAIGNMENT: PROVIDED, THAT SHOULD THE PROSECUTION'S PRESENTATION OF EVIDENCE BE TERMINATED PRIOR TO THE LAPSE OF THE PREVENTIVE SUSPENSION PERIOD, THE SUSPENSION SHALL AUTOMATICALLY BE LIFTED."
