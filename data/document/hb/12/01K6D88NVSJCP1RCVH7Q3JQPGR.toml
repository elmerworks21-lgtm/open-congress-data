congress_website_title = "AN ACT PROHIBITING A PERSON WHO IS A PERMANENT RESIDENT OR IMMIGRANT OF A FOREIGN COUNTRY FROM BEING APPOINTED TO ANY PUBLIC OFFICE OR POSITION, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED EIGHT HUNDRED SEVEN (P.D. NO. 807), OTHERWISE KNOWN AS THE CIVIL SERVICE DECREE OF THE PHILIPPINES"
congress_website_abstract = "SECTION 1. Section forty-four (44) of Presidential Decree Numbered Eight Hundred and Seven (PD 807) is hereby amended to read as follows: \"NO PERSON WHO IS A PERMANENT RESIDENT OR IMMIGRANT OF A FOREIGN COUNTRY SHALL BE ELIGIBLE FOR APPOINTMENT TOANY OFFICE OR POSITION IN THE GOVERNMENT, OR IN ANY GOVERNMENT-OWNE D OR-CONTROLLED CORPORATION, UNLESS IT IS SHOWN BY CLEAR EVIDENCE THAT HE HAS MADE AN IRREVOCABLE WAIVER OF HIS STATUS AS A PERMANENT RESIDENT OR IMMIGRANT OF FOREIGN COUNTRY BEFORESUCH APPOINTMENT.\""
