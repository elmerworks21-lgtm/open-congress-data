congress_website_title = "AN ACT PROVIDING FOR GREATER FISCAL AUTONOMY IN FAVOR OF LOCAL GOVERNMENT UNITS (LGUs) IN THE CHOICE OF DEPOSITORY BANKS, AMENDING SECTION 311 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Local treasurers shall maintain depository accounts in the name of their respective local government units with banks DULY ACCREDITED AS SUCH BY THE BANGKO SENTRAL NG PILIPINAS [preferably government-owne d] located in or nearest their respective areas of jurisdiction. Earnings of each depository account shall accrue exclusively thereto."
