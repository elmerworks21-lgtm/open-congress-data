congress_website_title = "AN ACT PROMOTING THE WELFARE OF THE PHILIPPINE COAST GUARD BY INCREASING, INTEGRATING AND RATIONALIZING THE BASE PAY AND OTHER BENEFITS OF ITS OFFICERS AND ENLISTED PERSONNEL, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Magna Carta of the Philippine Coast Guard.\" This bill seeks to put the Philippine Coast Guard Uniformed Personnel under the auspices of the Department of Transportation and Communications but shall not be covered by the Civil Service Commission. Every uniformed personnel of the PCG shall undergo corresponding PCG eligibility examination. > This bill also provides remuneration, welfare, health care and injuries benefits such as cost of licing allowances, medical health care program, educationalbenefit, housing assistance program, compensation for physical and mental injuries sustained in the course of duty, leaves and retirement benefits, among others."
