congress_website_title = "AN ACT PRESCRIBING THE USE OF PHILIPPINE TROPICAL FABRIC FOR OFFICIAL UNIFORMS OF PUBLIC OFFICIALS AND EMPLOYEES AND FOR OTHER PURPOSES"
congress_website_abstract = "House Bill 5977 proposes to require the use of tropical fabrics for the official uniforms of government officials and employees. This will provide an impetus for the growth of the Philippine tropical fabrics industry and provide employment in the countryside."
