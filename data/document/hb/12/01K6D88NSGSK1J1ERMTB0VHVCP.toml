congress_website_title = "AN ACT EXTENDING THE PERIOD FOR FILING APPLICATION FOR ADMINISTRATIVE LEGALIZATION (FREE PATENT) AND JUDICIAL CONFIRMATION OF IMPERFECT AND INCOMPLETE TITLES TO ALIENABLE LANDS IN THE PUBLIC DOMAIN UNDER CHAPTER VII AND CHAPTER VIII OF COMMONWEALTHACT NO. 141, AS AMENDED, UNTIL DECEMBER 31, 2010"
congress_website_abstract = "A deadline to avail for legalization (free patent) was set by Republic Act No. 107 until December 31, 1957. This deadline was again re-set since there were many who were not able to apply. The last deadline was on December 31, 2000 and yet many still failed to apply. This bill seeks to provide for another extension of until December 31, 2010. Approval hereof is earnestly sought in line with the government thrust for agricultural modernization."
