congress_website_title = "AN ACT INSTITUTING THE DANGEROUS DRUGS ACT OF 1999 REPEALING REPUBLIC ACT NO. 6425, AS AMENDED"
congress_website_abstract = "This bill contains AMENDATORY provision to RA No. 6425, the Dangerous Drugs Act of 1972, such as: 1. Provision for the increase in Board Membership by involving a wider spectrum of the government strata and non-government participation in the policy-making arena; 2. Provision for a single definition of Dangerous Drugs, which covers both prohibited and regulated drugs. 3. Provision for a definition of Dangerous Drugs Preparations, which includes Precursors and Essential Chemicals, as well as control mechanisms for the licit trade of such, and penalties for violation thereof; 4. Provision for the increase of penalties and fines for unlawful importations of dangerous drugs and dangerous drug preparations; 5. Provision for the increase of penaalties and fines of illegal possession of certain dangerous drugs in quantities above specified limits; etc."
