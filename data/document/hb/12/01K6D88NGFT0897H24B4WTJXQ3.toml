congress_website_title = "AN ACT MAKING THE APPOINTMENT OF THE ENVIRONMENT AND NATURAL RESOURCES OFFICER MANDATORY IN THE PROVINCIAL, CITY AND MUNICIPAL GOVERNMENTS, AMENDING FOR THE PURPOSE SECTIONS 443, 454, 463 AND 484 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: The vigilance of a community in protecting the environment could never be more magnified with the direction of an able environment and natural resources officer who will ensure the protection of the environment and the preservation and enhancement of our natural resources. The position of the environment and natural resources officer should therefore be co-opted with the other mandatory positions in the organizational structure of the provincial, city and municipal government."
