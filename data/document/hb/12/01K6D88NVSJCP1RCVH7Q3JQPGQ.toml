congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE \"TAX REFORM ACT OF 1997\""
congress_website_abstract = "This bill refers to the officers and employees of the BIR. Rationale: However, much to our dismay, employment in the service of the Filipino people is once again beginning to be not so enticing. This is because some of our laws that safeguard the employment of these important resources are being mocked by some top level government bureaucrats in the guise of exigencies in service. Our laws on transfers, details, and re-assignments, are being used to serve personal interests - interests that instill corruption as well as nepotism in the very core of public service and welfare. > This bill seeks to address these issues."
