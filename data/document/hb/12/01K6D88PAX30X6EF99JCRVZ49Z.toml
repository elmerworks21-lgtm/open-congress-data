congress_website_title = "AN ACT PROVIDING FOR THE UPGRADING OF THE RATES OF COMPENSATION OF THE OFFICERS AND EMPLOYEES OF THE JUDICIARY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"Judiciary Compensation Restructure Act of 2003\\\". R.A. 9227 granted special monthly allowances equivalent to 100% of their basic salaries to justices and judges. However, court officers and employees, who perform the bulk of the tasks needed to dispense justice, were not given any additional allowance or increase in their salaries. This has caused widespread demoralization in the ranks of court personnel. This bill seeks to provide for the upgrading of the rates of compensation of the officers and employees of the Judiciary by one salary grade."
