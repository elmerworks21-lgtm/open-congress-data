congress_website_title = "AN ACT TO AMEND SUBSECTION (C) OF SECTION SEVENTY-THREE AND SECTION SEVENTY-FOUR OF REPUBLIC ACT NUMBERED SIX THOUSAND SIX HUNDRED AND FIFTY-SEVEN, OTHERWISE KNOWN AS THE `COMPREHENSIVE AGRARIAN REFORM LAW OF 1988,' AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to amend Section 73 (c) and Section 74 of Republic Act No. 6657, otherwise known as the \"Comprehensive Agrarian Reform Law of 1988\" and consider as protected areas for food production all agricultural lands with existing irrigation facilities or with funding commitment for an irrigation facility. For this purpose, therefore, it shall be prohibited and non-negotiable for conversion into non-agricultura l uses, such residential or those agricultural lands having funding commitment for an irrigation facility. Such conversions have brought about adverse effects on our food security and food production program of the government, particularly rice."
