congress_website_title = "AN ACT PENALIZING THE REFUSAL OF FUNERAL PARLORS AND MORGUES TO RELEASE THE REMAINS OF A DECEASED FOR BURIAL, CREMATION AND OTHER APPROPRIATE RITUALS DUE TO MONETARY REASONS"
congress_website_abstract = "\"The Burial Right Act of 2001\". In all cases, it shall be lawful for any proprietor, president, director, manager or any other officer or employee of a funeral parlot or morgue to refuse, disallow, or to cause the disallowance of the release of theremains of a deceased intended to be buried, cremated, or to be disposed in an appropriate ritual because of reasons pertaining to monetary commitments. It shall also be unlawful to request, solicit, demand, or accept any deposit any other form of advance payment has a prerequisite for the acceptance of the remains in such funeral parlot or morgues."

