congress_website_title = "AN ACT PROVIDING FOR DEBT-RELIEF MEASURES TO REHABILITATE FINANCIALLY DISTRESSED ENTERPRISES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Corporate Recovery Act\". Rationale: Many businesses are now in the dumps, and are hoping for the enactment of a measurwith a comprehensive approach to the complex problems that beset them, especially when they can no longer pay their outstanding obligations as they come due. Their debts, in other words, is their most immediate concern.> Adjudication of cases involving financially distressed companies were based on the out-dated Insolvency Law passed in 1909 and the suspension of payments and rehabilitation provisions in the Presidential Decree 902-A. However, while the Securities and Exchange Commission (SEC) has recently adopted rules governing petitions for suspension of payment and rehabilitation of financially distressed companies, itts has been hampered by inadequacy of laws concerning such cases. Lacking a set of procedural rules to govern these cases, the courts too have no choice but to apply the antiquated procedures of the Insolvency Law."
