congress_website_title = "AN ACT AMENDING SECTIONS 5, 6 AND 7 OF REPUBLIC ACT NO. 7459, ENTITLED `AN ACT PROVIDING INCENTIVES TO FILIPINO INVENTORS AND EXPANDING THE FUNCTIONS OF THE TECHNOLOGY APPLICATION AND PROMOTION INSTITUTE, APPROPRIATING FUNDS THEREFOR, AND FOR OTHERPURPOSES"
congress_website_abstract = "Investors, as certified by the Filipino Inventors Society and confirmed by the Screening Committee, INCLUDING THEIR HEIRS, ASSIGNEES OR TRANSFEREES OF THEIR INVENTIONS, SHALL BE EXEMPT FROM LICENSE AND PERMIT FEES OF ANY KIND OR CHARACTER IMPOSED BYTHE GOVERNMENT, WHETHER NATIONAL OR LOCAL IN APPLICATION FOR A PERIOD OF TEN (10) YEARS FROM THE DATE OF REGISTRATION OF THEIR INVENTIONS; AND SHALL LIKEWISE, FOR A PERIOD OF TEN (10) YEARS FROM THE DATE OF THE FIRST SALE OF THEIR INVENTIONS INCLUDING THE END PRODUCTS DERIVED THEREFROM IN COMMERCIAL SCALE, BE ENTITLED TO CERTAIN TAX EXEMPTIONS."

