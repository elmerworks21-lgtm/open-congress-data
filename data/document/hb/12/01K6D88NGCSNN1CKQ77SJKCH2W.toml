congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7610 OTHERWISE KNOWN AS THE SPECIAL PROTECTION OF CHILDREN AGAINST CHILD ABUSE, EXPLOITATION AND DISCRIMINATION ACT, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to amend RA No. 7610 (Child Abuse, Exploitation and Discrimination Act) in this direction: (1) Declaring cases involving children below twelve (12) years old shall automatically require a hold order for those accused to prevent themfrom feeling abroad; and (2) Law enforcers and members of the Judiciary and Justice Department found guilty of violations including willfully abetting these crimes or causing or assisting in the plight of those accused shall be meted out the maximumpenalty. This bill once passed into law, will help deter those in government who would conspire to allow the pedophiles to run free from justice."
