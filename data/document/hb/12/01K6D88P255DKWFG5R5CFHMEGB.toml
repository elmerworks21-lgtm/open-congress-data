congress_website_title = "AN ACT STRENGTHENING THE LOCAL DEVELOPMENT COUNCIL, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The Local Development Councils (LDCs) as provided for under R.A. No. 7160, otherwise known as the Local Government Code should be an effective avenue for coordinating local development within the territorial jurisdiction of local government units.> This bill seeks to compel local chief executives to convene and organize their respective LDCs. Support for the early enactment of this measure is earnestly requested."

