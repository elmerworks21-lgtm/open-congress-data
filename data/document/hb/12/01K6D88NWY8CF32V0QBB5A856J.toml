congress_website_title = "AN ACT ALLOWING THE USE OF INCINERATORS IN BURNING MUNICIPAL, BIOMEDICAL AND HAZARDOUS WASTES, AMENDING FOR THE PURPOSE SECTION 20 OF REPUBLIC ACT NO. 8749, ENTITLED `AN ACT PROVIDING FOR A COMPREHENSIVE AIR POLLUTION CONTROL AND FOR OTHER PURPOSES'"
congress_website_abstract = "This bill seeks to adopt urgent and effective measures to address the nationwide garbage crisis especially in Metro Manila, which adversely affects the health and wellbeing of the people and its environment. It would also serve as a viable option insolving the indisrciminate disposal of garbage and other solid waste materials in Metro Manila. > Private contractors or entities, to be known as solid waste management Service Providers, that qualify after competitive bidding shall be awarded management contracts or concessions for the provisions of solid waste management and development in Metro Manila."

