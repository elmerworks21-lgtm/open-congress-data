congress_website_title = "AN ACT AFFORDING PRECTION TO WORKING WOMEN, STRENGTHENING THEIR RIGHTS TO EMPLOYMENT OPPORTUNITIES IN BOTH PRIVATE AND PUBLIC SECTORS AND STRENGTHENING THE PROHIBITION ON DISCRIMINATION AGAINST WOMEN WITH RESPECT TO THEIR EMPLOYMENT"
congress_website_abstract = "This bill seeks to EXPAND the coverage of legal protection against gender discrimination from the time of pre-employment and human resources development to the time of actual employment and labor relations and promotions to the executive level. Italso provides the mechanisms for the implementation of the same. Furthermore, this bill seeks to expand this statutory protection against discrimination of women workers by providing that all personnel actions in all branches, subdivisions, instrumentaliti es and agencies of the government, including government-owne d and controlled corporations with original charters shall be made free from any discrimination based on sex."

