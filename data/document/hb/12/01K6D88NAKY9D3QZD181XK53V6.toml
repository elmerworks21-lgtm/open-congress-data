congress_website_title = "AN ACT RECOGNIZING THE RETENTION OF PHILIPPINE CITIZENSHIP FOR THOSE TO BE NATURALIZED IN A FOREIGN COUNTRY, RECOGNIZING DUAL CITIZENSHIP, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Citizenship Retention Law of 2001.\"> No Filipino citiezen who has voluntarily sought or opted to be naturalized in a foreigm country shall be deemed to lose his Philippine citizenship. Philippine citizenship shall, likewise, not be lostmerely by operation of the law of another country whereby citizenship of that country is conferred on that person without any voluntary act on his or her part."
