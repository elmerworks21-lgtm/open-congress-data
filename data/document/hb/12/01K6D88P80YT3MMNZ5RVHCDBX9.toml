congress_website_title = "AN ACT ABOLISHING THE PUBLIC ESTATES AUTHORITY CREATED PURSUANT TO PRESIDENTIAL DECREE NO. 1084 (s. 1977), AS AMENDED BY EXECUTIVE ORDER NO. 654 (s. 1981), TRANSFERRING ITS POWERS, FUNCTIONS, RESPONSIBILITIE S AND ASSETS TO APPROPRIATE GOVERNMENT DEPARTMENTS AND AGENCIES AND FOR OTHER PURPOSES"
congress_website_abstract = "In line with the government's program to streamline its operations in order to improve the delivery of vital public services at the least possible cost, the abolition of the Philippine Estate Authority (PEA) is sought under the bill. It also transfers the power to reclaim land, including foreshore and submerged areas to the Department of Environment and Natural Resources. Likewise, all rights, assets, liabilities, privileges, records, equipment and property of the PEA in connection with estatedevelopment, infrastructure, building construction and construction management projects shall be transferred to the Department of Public Works and Highways; and those in connection with the construction, maintenance and operation of toll ways and tolll facilities shall be transferred to the Philippine National Construction Corporation."

