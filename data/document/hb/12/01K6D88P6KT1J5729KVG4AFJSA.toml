congress_website_title = "AN ACT CALLING FOR A CONSTITUTIONAL CONVENTION FOR THE EXPRESSED PURPOSE OF REVISING THE EXISTING 1987 CONSTITUTION, OR FORMULATING AMENDMENTS TO IT FOR THE APPROVAL OF THE ELECTORATE, PROVIDING FOR QUALIFIED REPRESENTATION PER LEGISLATIVE DISTRICTAND OTHER DETAILS PERTAINING TO THE HOLDING OF THE CONVENTION, AND APPROPRIATING FUNDS THEREFORE AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Constitutional Convention Act of 2003.\" Rationale: The country is presently besieged with opinions from the public and private sectors, as well as from various agencies of the government, on the propriety of introducing amendments to, or rewritingor substantially changing the 1987 Constitution of the Philippines. It may be a coincidence however, that the fundamental law of our land has constantly and glaringly been attached with this proposal every time there is a nearing of a change in the administration. It is inevitable therefore that the public would counclude that a politically motivated conspiracy exists, and it is to this end that the author of this bill proposes a Constitutional Convention be assembled to put this matter to rest..> The Constitutional Convention proposed herein shall be composed of a delegate per legislative district in the country. They shall be duly qualified and voted simultaneous with the synchronized elections in 2004. The delegates to the Convention sha"
