congress_website_title = "AN ACT PROVIDING FOR A THREE (3)-YEAR MORATORIUM ON ALL LOW-COST HOUSING LOANS WITH ANY OF THE GOVERNMENT INSTITUTIONS AND AGENCIES INVOLVED IN THE NATIONAL SHELTER PROGRAM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8501"
congress_website_abstract = "All unpaid LOW COST HOUSING LOANS from any of the government institutions and agencies involved in the National Shelter Program of the Government, including but not limited to the Government Service Insurance System (GSIS), Social Security System (SSS), Home Development Mutual Fund (Pag-ibig Fund), National Home Mortgage Finance Corporation (NHMFC), and the National Housing Authority (NHA), are hereby GIVEN A THREE-YEAR MORATORIUM: Provided, That all due and demandable arrearages composed of the principal and interest are restructed and paid within the remaining period of the loan."
