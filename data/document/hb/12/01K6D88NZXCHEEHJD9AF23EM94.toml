congress_website_title = "AN ACT PROVIDING STIFFER PENALTIES ON ILLEGAL GAMBLING, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED SIXTEEN HUNDRED AND TWO, AS AMENDED"
congress_website_abstract = "The proliferation of illegal gambling activities throughout the country has been observed to be constantly on the rise and along with it, social ills such as drug addiction, crimes against person and property, and borked family relations. The penalties imposed by the present laws have become inadequate or obsolete to discourage, if not stop, these noxious activities. The imposable penalties on illegal gambling are already impractical, ineffective, and unresponsive to the present norms of conduct and behavior of society because laws on the matter were enacted more than two decades ago. > The penalties for illegal gambling must be INCREASED."
