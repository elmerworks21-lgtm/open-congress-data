congress_website_title = "AN ACT TO LIBERALIZE PHILIPPINE CIVIL AVIATION AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Since 98% of visitors to the Philippines arrive and express cargo services can only be maintained by air transport, civil aviation has become a vital infrastructure for establishing access to the Philippines. By providing \"highways in theskies\", it links our country to world thereby facilitating our participation in the mainstreams of tourist traffic movement, and the flow of trade and investments. Without such links, we are faced with the dire prospects of economic stagnation arising from isolation.> To ACCELERATE the process of LIBERALIZATION, this bill seeks to: (1) alter the Civil Aeronautics Board (CAB) Composition, and streamline its procedures; (2) declare a civil aviation policy; and (3) impose policy guidelines and dirrections for CAB to observe and implement."

