congress_website_title = "AN ACT DIRECTING THE DEPARTMENT OF ENVIRONMENT AND NATURAL RESOURCES TO SPEED UP THE CLASSIFICATION OF THE REMAINING UNCLASSIFIED LANDS, THE RECLASSIFICATIO N OF THOSE CLASSIFIED LANDS THAT ARE NO LONGER SERVING THE PURPOSE FOR WHICH THEY HAVE BEENCLASSIFIED; AND THOSE THAT WERE MISCLASSIFIED; PROVIDING THE STRATEGIES AND TIME FRAME THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It is the policy of the State to attain a desirable ecological balance that will preserve the country's valuable forest ecosystem, prevent environmental disaster and sustain for the succeeding generations the natural wealth of the nation.The completion of the classification and reclassificatio n of the lands of the public domain is therefore necessary in order for the government to determine the boundaries of permanent forestlands and other areas of the public domain for the propermanagement, protection and conservation of the forest resources."

