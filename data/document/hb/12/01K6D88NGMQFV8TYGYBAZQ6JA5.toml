congress_website_title = "AN ACT PROVIDING FOR TRANSPARENCY IN THE BUDGET PROCESS, AMENDING FOR THE PURPOSE SECTION THIRTY-ONE OF PRESIDENTIAL DECREE NUMBERED ONE THOUSAND ONE HUNDRED SEVENTY-SEVEN, OTHERWISE KNOWN AS THE BUDGET REFORM DECREE, AS CODIFIED UNDER SECTION TWENTY-SIX, BOOK VI OF EXECUTIVE ORDER NUMBERED TWO-HUNDRED NINETY-TWO, ALSO KNOWN AS THE ADMINISTRATIVE CODE OF 1987; AND REPEALING PROVISIONS OF LAWS AUTHORIZING AUTOMATIC APPROPRIATIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "Section thirty-one Presidential Decree No. 1177 as codified in Section twenty-six, Book VI, of Executive Order Numbered two hundred ninety-two, is hereby amended to read as follows: \"Sec. 31 [Automatic] Appropriations. - All expenditures for (a) personal retirement premiums, government service insurance and other similar fixed expenditures, (b) principal and interest on public debt (c) national government guarantees of obligations which are drawn upon [are automatically appropriated] SHALL BE SUBJECT TO THE REGULAR ANNUAL CONGRESSIONAL APPROPRIATIONS: Provided, That no obligation shall be incurred or interest made from funds thus [automatically] appropriated except, as issued in the form of regular budgetary allotments.\""

