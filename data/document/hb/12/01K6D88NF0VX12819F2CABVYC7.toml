congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE WATER POLLUTION CONTROL POLICY AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Clean Water Act of 2001\". This bill seeks to provide for a comprehensive water pollution control policy. It shall cover all water resources such as inland surface waters, ground waters, wetlands, coastal and marine waters within the Philippine territory and area of responsibility. It shall also cover all potential sources of water pollution."
