congress_website_title = "AN ACT PROVIDING FOR THE ALLOCATION OF THE $683 MILLION MARCOS DEPOSIT HELD IN ESCROW AT THE PHILIPPINE NATIONAL BANK AS A SPECIAL BASIC EDUCATION FUND TO HELP FINANCE THE MUCH NEEDED AND URGENT PRIORITY BASIC EDUCATION PROGRAMS OF THE NATIONAL GOVERNMENT"
congress_website_abstract = "The measure provides for the allocation and conversion of the approximately US$683 million Marcos deposit being held in escrow at the Philippine National Bank into a Special Basic Education Fund to be administered by the Department of Education. The fund shall be used, over and above existing budgetary allocations of the Department of Education, for the construction; repair and rehabilitation of schoolbuildings; acquisition of new school armchairs, desks and textbooks; hiring of new public school teachers; and increase in the salaries of all public school teaching and non-teaching personnel."
