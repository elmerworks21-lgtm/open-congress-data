congress_website_abstract = "It is the objective of this Act to penalize money laundering, a scheme resorted to by perpetrators of organized crimes and criminal syndicates to hide the proceeds of their illegal activities, by strengthening the legal tools in the evidence-gathering process, establishing enforcement programs to combat it, and providing penal sanctions and remedies to deal with money laundering activities."
