congress_website_title = "AN ACT ESTABLISHING A PRIVATE-HOSPITA L DEVELOPMENT PLAN AND PROVIDING ASSISTANCE TO PRIVATE HOSPITALS BY GRANTING THEM INCENTIVES"
congress_website_abstract = "Rationale: There are at least seventy percent (70%) privately owned hospitals around the country. These hospitals provide better services compared to government owned ones. > To help these private hospitals maintain and continue delivering quality service to our countrymen, this bill proposes a Private Hospital Development Plan which will be jointly formed with the Secretary of Health, proper government agencies and non-government organization. This plan shall oversee the much needed facilities, human resources and other needs of the private hospitals. This plan also grants tax incentives to qualified private hospitals only."
