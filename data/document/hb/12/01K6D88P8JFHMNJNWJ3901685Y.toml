congress_website_title = "AN ACT ENSURING SECURITY OF TENURE FOR AGRARIAN REFORM BENEFICIARIES OVER LANDS AWARDED TO THEM UNDER THE COMPREHENSIVE AGRARIAN REFORM PROGRAM, PROVIDING GUIDELINES FOR THE CANCELLATION OF LAND OWNERSHIP AWARDS, PENALTIES FOR VIOLATIONS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "There is an alarming number of cancellations of Emancipation Patents (EPs) and Certificates of Land Ownership Awards (CLOAs) issued to farmer beneficiaries under the land reform program of the government. These cancellations were mainly because thesubject pieces of land were erroneously covered under PD 27 and Ra 6657. Many EPS and CLOAs were canceled even after the farmer beneficiaries have paid the required amortization for the lands awarded to them. This bill seeks to reaffirm that EPs andCLOAs are land titles under PD 1529. It provides the prescriptive period for the filing of petition for the cancellation of EP and CLAOs. It also provides for compensation to landowners whose lands were erroneously covered by land reform programs."
