congress_website_title = "AN ACT PROVIDING FOR THE ADJUSTMENTS IN THE MONTHLY CONTRIBUTIONS OF PHILHEALTH MEMBERS, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SEVENTY-EIGHT HUNDRED AND SEVENTY-FIVE, OTHERWISE KNOWN AS THE `NATIONAL HEALTH INSURANCE ACT OF 1995,' AND FOR OTHER PURPOSES"
congress_website_abstract = "Despite the noble intention of the National Health Insurance Act of 1995, the Philippine Health Insurance Corporation (Philhealth) covers only 5% to 10% of the total expenses fore reasonable care while ther est of the expenses is shouldered by the member himself. As a result, most Filipinos afflicted with serious illnesses either die from lack of proper hospital care or become saddled with debts. This is due to the fact that Philhealth's funding comes mainly from the contribution of all employers, formal sector employees and the self-employed, the maximum contribution being only PhP125 a month. This bill seeks to provide for adjustments in the monthly contribution of Philhealth members to allow a more reasonable coverage in case a membeer is hospitalized."

