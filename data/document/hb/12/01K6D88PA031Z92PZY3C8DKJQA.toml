congress_website_title = "AN ACT APPROPRIATING FIVE BILLION PESOS (P5,000,000,000.00) FROM THE SWISS DEPOSITS OF THE LATE PRESIDENT FERDINAND E. MARCOS FOR THE COMPENSATION OF THE PEOPLE OF THE SUGAR INDUSTRY, AMENDING SECTION 2 OF REPUBLIC ACT NUMBER 7202, OTHERWISE KNOWN AS THE SUGAR RESTITUTION LAW, AND FOR OTHER PURPOSES"
congress_website_abstract = "RA 7202 (Sugar Restitution Law) aimed to revitalize the sugar industry and to recompense sugar producers who suffered losses due to corrupt practices of the concerned agencies like the PHILEX, NASUTRA and PHILSUCOM. It provided that the restitution to the sugar industry would be sourced from funds recovered by the Presidential Commission on Good Government (PCGG). However, since its enactment, the government has not taken any tangible action to rehabilitate the industry and to provide compensation to the sugar producers. This bill seeks to appropriate Ph 5 billion from the Swiss deposit of the late Pres. Ferdinand Marcos which have been forfeited in favor of the Republic of the Philippines to provide restitution to the sugar industry."
