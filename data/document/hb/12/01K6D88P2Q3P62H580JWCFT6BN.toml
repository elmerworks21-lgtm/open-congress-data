congress_website_title = "AN ACT PROVIDING FOR THE DUTY OF THE SECRETARY OF LABOR OR HIS DULY AUTHORIZED REPRESENTATIVES TO INCLUDE THE NAMES OF THE AFFECTED EMPLOYEES IN THE INSPECTION REPORT ISSUED PURSUANT TO THEIR EXERCISE OF THE VISITORIAL POWER OVER BUSINESS ESTABLISHMENTS, AMENDING FOR THE PURPOSE ARTICLE 128 OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "The Secretary or his representatives are given this so-called 'visitorial power' to enable them to protect laborers from the abuses of their employers and to authorize them to take remedial steps to address violations of labor standards laws. Shouldviolations be found, the Secretary or his representative should provide the employer with an 'Inspection Report' which, under the law must contain a statement of the violations committed. Furthermore, the Inspection Report should inform the employerthat he has the opportunity to correct his mistakes and to take the necessary steps to remedy the situation with his affected employees."
