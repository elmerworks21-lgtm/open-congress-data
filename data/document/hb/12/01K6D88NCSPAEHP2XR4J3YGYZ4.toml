congress_website_title = "AN ACT PENALIZING ANY PERSON, ORGANIZATION OR COMPANY WHICH POLLUTE CREEKS, LAKES AND RIVERS"
congress_website_abstract = "This bill seeks to penalize any person, group, organization or corporation polluting creeks or rivers. Any person who unlawfully discharges oil, noxious, or toxic gaseous and liquid substances and other harmful substances shall be liable, for the first offense, to a fine of not less than five thousand pesos (P5,000.00) but not more than ten thousand pesos (P10,000.00) for the second offense to a fine of not less than ten (10) thousand pesos but not more than fifteen (15) thousand pesos; and, for the third offense, to a fine of not less than fifteen (15) thousand pesos but more than twenty (20) thousand pesos."
