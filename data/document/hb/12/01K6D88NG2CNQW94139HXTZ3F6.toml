congress_website_title = "AN ACT PROMOTING AND ENSURING EQUAL EMPLOYMENT OPPORTUNITIES IN THE PHILIPPINES, ESTABLISH AN EQUAL EMPLOYMENT OPPORTUNITIES AUTHORITY, PROVIDING PENALTIES FOR VIOLATIONS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to lay emphasis on the ensuring of equal employment opportunities for all citizen of the Philippines and eliminate the too liberal provisions allowed in other countries relative to accomodating people of varying political options, race, national origin, and the like, which the Philippines is still obviously unprepared to handle. Said bill addresses these concerns: - equal access to information on job vacancies - equal opportunity to be hired - objective evaluation of qualifications for specific job requirements - equal pay for work of equal value - equal access to training/schola rships - equal access to promotion - equal access to merit increases and other benefits - objective job performance evaluation/asse ssment"
