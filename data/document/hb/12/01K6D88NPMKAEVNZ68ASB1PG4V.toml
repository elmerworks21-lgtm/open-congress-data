congress_website_abstract = "MOnthly benefits of barangya officials shall be increased as follows: (1) Punong barangay - [P1,000.00] THREE THOUSAND PESOS; (2) Sangguniang barangay members, treasurers, and secretary - [P600.00] ONE THOUSAND EIGHT HUNDRED PESOS [P1,800.00] and ONE THOUSAND FIVE HUNDRED PESOS (P1,500.00) for the lupong tagapamayapa barangay tanod, barangay health workers and social workers."
