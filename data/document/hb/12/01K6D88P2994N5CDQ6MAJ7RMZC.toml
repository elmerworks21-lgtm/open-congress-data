congress_website_title = "AN ACT CREATING THE DEPARTMENT OF INFORMATION AND COMMUNICATIONS TECHNOLOGY, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "With the recent developments, the need for an agency that will regulate the flow of information into, out of, and across the country cannot be over emphasized. The creation of the Department of Information and Communications Technology will ensure telecommunicati on services in all areas nationwide. It will foster widespread use and application of computer and electronics system and the development of an integrated plan for a nationwide information and communications technological industries that will complemente and support the expansion, development and maintenance of the nationwide computer and telecommunicati ons network."

