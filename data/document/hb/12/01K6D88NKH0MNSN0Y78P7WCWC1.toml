congress_website_title = "AN ACT CLARIFYING ISSUES ON PARALLEL IMPORTATION AND DISTRIBUTION OF FOOD PRODUCTS AND MEDICINES IN THE COUNTRY"
congress_website_abstract = "Importation into, and marketing in the Philippines of food products and medicines shall be allowed, regardless of whether or not the same is covered by any exclusive distributorship agreement between the manufacturer and its exclusive distributor, provided, that the same passes through proper registration with the Bureau of Food and Drugs of the Department of Health, with the Bureau of Customs of the Department of Finance, and with the Department of Trade and Industry. The Act of importation into, and distribution in the Philippines of food products and medicines by persons or entities other than the exclusive distributor, shall not be considered as an act of unfair competition nor an infringement of the intellectual property rights of thhe latter."

