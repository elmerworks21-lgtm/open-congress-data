congress_website_title = "AN ACT MANDATING ALL AGENCIES IN THE EXECUTIVE DEPARTMENT TO SUBMIT A POVERTY ALLEVIATION IMPACT STATEMENT (PAIS) IN THE PROPOSED BUDGET OF EACH DEPARTMENT FOR CONSIDERATION IN THE ANNUAL GENERAL APPROPRIATIONS ACT"
congress_website_abstract = "Rationale: Amelioration of the lot of the poor should be a principal yardstick of all government activity, from planning all the way to execution. This should be part of the bureaucratic consciousness. Pro-poor considerations should be integrated into all planning and execution by government. > The Poverty Alleviation Impact Statement (PAIS) should address the two core issues that are associated with poverty problem - income generation and income enhancement. Such a statement should accompany all budgeted program and project proposals presented to Congress so that as early as budget preparation, poverty alleviation considerations are imbued in the bureaucratic mindset."

