congress_website_title = "AN ACT AMENDING SECTION 46 OF REPUBLIC ACT NO. 8749, OTHERWISE KNOWN AS THE CLEAN AIR ACT"
congress_website_abstract = "The bill proposes to exempt two-year old vehicles for commercial use and three-year old vehicles for private use from the smoke emission test (SET) requirement prior to registration. The SET requirement would be burdensome and irrelevant for ownersof two or three-year old vehicles since the engine, motor and other parts of these vehicles are usually still in good condition and are not yet defective. It is most unlikely that these vehicles will emit black and dangerous smoke."
