congress_website_title = "AN ACT DECLARING MARCH EIGHT OF EVERY YEAR AS A NONWORKING SPECIAL HOLIDAY, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED FORTY-NINE ENTITLED 'AN ACT TO DECLARE MARCH EIGHT OF EVERY YEAR AS A WORKING SPECIAL HOLIDAY TO BE KNOWN AS NATIONAL WOMEN'S DAY'"
congress_website_abstract = "Rationale: Declaring March 8 as non-working special holiday will encourage all women from all sectors nationwide to organize meaningful activities to celebrate that day and to actively engage and participate in such activities. It will be a day of commemoration of the endless efforts and contributions of Filipino women for national freedom, civil liberty, equality and human rights."
