congress_website_title = "AN ACT INCREASING THE MONTHLY PERSONNEL ECONOMIC RELIEF ALLOWANCE (PERA) AND ADDITIONAL COMPENSATION ALLOWANCE (ACA) GRANTED TO GOVERNMENT EMPLOYEES FROM FIVE HUNDRED PESOS (P500.00) TO ONE THOUSAND PESOS (P1,000.00) EACH, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The government has to function efficiently to mitigate if not eliminate poverty by motivating its employees in the national plantilla positions to work harder. Their current net take home pay is complemented with a measly P1,000.00 personnel economic relief allowance (PERA) subsidy per month, to provide for additional expenses. This amount should be increased to P2,000.00 to reasonably assist government workers in their basic needs and other expenses."

