congress_website_title = "AN ACT GRANTING THE MEMBERS OF THE LUPONG TAGAPAMAYAPA MONTHLY HONORARIUM IN THE AMOUNT OF ONE THOUSAND PESOS (P1,000.00), AMENDING FOR THE PURPOSE SECTION 406 OF THE `LOCAL GOVERNMENT CODE OF 1991'"
congress_website_abstract = "Rationale: The system of amicably settling disputes (PD No. 1508) at the barangay level has promoted the speedy administration of justice and has strengthened the family as a basic institution. The success of the implementation of the Decree could not have been possible without the dedication of the hardworking members of the Lupong Tagapamayapa who sacrificed their time and efforts so that peace and order would reign in the barangay. These barangay officials deserve recognition and support."
