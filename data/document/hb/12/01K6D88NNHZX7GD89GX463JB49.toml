congress_website_title = "AN ACT TO RATIONALIZE THE COMPOSITION AND FUNCTIONS OF THE NATIONAL LABOR RELATIONS COMMISSION THEREBY AMENDING ARTICLES 213, 214, 215 AND 216, BOOK 5, TITLE II OF THE LABOR CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Some of the amendments proposed in this bill are as follows: (1) Composition of the NLRC from [fourteen (14)] to TWENTY-THREE (23) members; (2) The Commission may sit en banc or in [five (5)] EIGHT (8) divisions; (3) THE COMMISSION AND ITS EIGHT (8)DIVISIONS SHALL BE ASSISTED BY THE LABOR ARBITRATION OFFICERS IN ITS APPELLATE AND ADJUDICATORY FUNCTIONS WHOSE TERM SHALL BE CO-TERMINUS WITH THE COMMISSIONERS WITH WHOM THEY ARE ASSIGNED. THE LABOR ARBITRATION OFFICERS SHALL BE MEMBERS OF THE PHILIPPINE BAR, THEY SHALL RECEIVE ANNUAL SALARIES AND SHALL BE ENTITLED TO THE SAME ALLOWANCES AND BENEFITS AS THOSE FALLING UNDER SALARY GRADE TWENTY SEVEN (SG 27). THERE SHALL BE AS MANY LABOR ARBITRATION OFFICERS AS MAY BE NECESSARY FOR THE EFFECTIVEE AND EFFICIENT OPERATION OF THE COMMISSION BIT IN NO CASE LESS THAN THREE (3) ASSIGNED TO THE OFFICE OF THE CHAIRMAN AND EACH COMMISSIONER; and (4) Labor Arbiters shall have the SAME allowances, retirement and other benefits as that of the judges of"
