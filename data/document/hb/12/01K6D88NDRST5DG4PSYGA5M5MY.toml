congress_website_title = "AN ACT ESTABLISHING FOREST MANAGEMENT, UTILIZATION, CONSERVATION AND PRESERVATION CENTERS IN PROVINCES INHABITED PREDOMINANTLY BY MEMBERS OF INDIGENOUS CULTURAL COMMUNITIES FAMILIES"
congress_website_abstract = "Rationale: Indigenous cultural communities in the country have proven their effectiveness in such efforts through the employment of indigenous customs and practices. Thus, the establishment of forest management centers in provinces predominantly populated by members of indigenous cultural communities. This aims to enhance forest rehabilitation, protection, and conservation by building on indigenous practices of doing the same."

