congress_website_title = "AN ACT PROVIDING FOR THE INCLUSION OF BASIC ECONOMIC SUBJECTS AS PART OF THE CURRICULUM OF THE MILITARY AND POLICE COURSE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Coup d'etat, as an act of destabilization against the duly constituted government and its authorities, gravely affects our political and economic stability. In the interest of our nation's political and economic stability, This measure proposes to include basic economic subjects (Micro Economics 101 and Micro Economics 102)in the curriculum of military and police courses to provide their personnel with an understanding on the effects of destabilization acts and activities on the economy."

