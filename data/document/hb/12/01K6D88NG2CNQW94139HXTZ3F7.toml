congress_website_title = "AN ACT PROMOTING AND ENSURING EQUALITY IN THE EDUCATIONAL SYSTEM"
congress_website_abstract = "\"Gender Equality in the Educational System.\" Rationale: It is hereby declared the policy of the State to promote the equality of men and women through the elimination of stereotyping of the roles of both sexes in our social and cultural norms. Pursuant thereto, the State shall provide gender equality in the educational system. The Department of Education, Culture and Sports shall be responsible primarily for examining all the curricula and learning materials with a view to removing sex-bias and to develop non-sexist resources and curricular materials."

