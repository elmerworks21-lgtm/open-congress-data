congress_website_title = "AN ACT ESTABLISHING AN EMERGENCY PREPAREDNESS PLAN TO PREVENT AND SUPPRESS THE SPREAD OF EMERGENCY INFECTIOUS DISEASES AND OTHER EPIDEMICS"
congress_website_abstract = "\"Infectious Disease Emergency Preparedness Act of 2003\" A number of countries affected by the SARS (Severe Acute Respiratory Syndrome) epidemic have resorted to voluntary and compulsory isolation and quarantine measures as part of the effort to prevent the spread of SARS. This measure authorizes isolation and quarantine as measures to control infectious diseases even before those who are infected enter the country. It establishes an emergency preparedness plan to prevent and suppress the spread of infectious diseases and other epidemics. It also authorizes the arrest, apprehension, detention or conditional release of individuals to prevent the introduction, transmission or spread of suspected infectious diseases. The roles of the concerrned government agencies are also defined in the bill. Furthermore, the bill provides for a notification and reportorial system for the prevention and suppression of the spread of emergency infectious diseases."
