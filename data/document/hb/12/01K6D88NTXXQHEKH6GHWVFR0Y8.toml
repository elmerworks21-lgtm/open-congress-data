congress_website_title = "AN ACT DECLARING AS ALIENABLE AND DISPOSABLE FOREST LANDS WITH A SLOPE OF BELOW NINETEEN DEGREES AND OCCUPIED AND TILLED BY FARMERS FOR AT LEAST TEN (10) YEARS"
congress_website_abstract = "Forest lands with a slope of below nineteen degrees and occupied and tilled by farmers for at least ten (10) years are hereby declared alienable and disposable lands. For this purpose, the Department of Environment and Natural Resources shall identify the areas which shall be classified as alienable and disposable."

