congress_website_title = "AN ACT PROVIDING FOR SURVIVORSHIP BENEFITS TO SURVIVING SPOUSE OF RETIRED JUSTICE-PENSIONER WHO DIES WHILE RECEIVING HIS MONTHLY PENSION, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED NIN HUNDRED TEN, AS AMENDED, ENTITLED \\\"AN ACT TO PROVIDE FOR THE RETIREMENT OF JUSTICES OF THE SUPREME COURT AND OF THE COURT OF APPEALS, FOR THE ENFORCEMENT OF THE PROVISIONS HEREOF BY THE GOVERNMENT SERVICE INSURANCE SYSTEM, AND TO REPEAL COMMONWEALTH ACT NUMBERED FIVE HUNDRED AND THIRTY SIX\\\""
congress_website_abstract = "The Government Service Insurance System and the Philippine Veterans Affairs Office grant survivorship benefits to qualified beneficiaries upon the death of an old-age pensioner or a member receiving monthly income benefit for permanent disability. Identical benefits are also being given to the members of the constitutional commissions. The bill proposes that survivorship benefits be extended also to the surviving spouse of a retired justice-pensioner who dies while receiving his monthly pension. The proposed survivorship benefit shall be equivalent to 80% of the amount received by the retired justice-pensioner until the surviving spouse remarries or dies."

