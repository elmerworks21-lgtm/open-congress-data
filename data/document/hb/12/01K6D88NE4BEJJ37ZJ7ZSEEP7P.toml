congress_website_title = "AN ACT DECLARING SQUATTING SYNDICATE, PROFESSIONAL SQUATTING AND LARGE-SCALE LAND GRABBING AS HEINOUS CRIMES AND PROVIDING THE IMPOSITION OF THE DEATH PENALTY THEREFOR"
congress_website_abstract = "Rationale: Since the advent of urbanization, squatting has been a pervasive that society had to contend with. The proliferation of squatters in the suburbs motivated the late President Ferdinand E. Marcos to promulgate Presidential Decree 722 or theAnti-Squatting Law. It is sad to note, however, that from the end of the Marcos regime to the assumption of then President Corazon C. Aquino, the squatting menace has grown and is still with us."

