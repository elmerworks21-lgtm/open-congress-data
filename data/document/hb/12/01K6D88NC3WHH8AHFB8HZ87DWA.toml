congress_website_title = "AN ACT ENHANCING ECONOMIC COORDINATION, ADOPTING THE APPROPRIATE MECHANISM THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: This bill is anchored on the dictum that economic goal setting should properly involve the Congress, the Governor and Monetary Board of the Bangko Sentral ng Pilipinas (BSP) as well as the National Economic Development Authority (NEDA) headed by the President. In the process, we may achieve better synchronization of monetary and fiscal policy or at least minimize the negative implications of their divergence. Moreover, it should similarly provide flesh to the mandate of accountability and transparency of the BSP."
