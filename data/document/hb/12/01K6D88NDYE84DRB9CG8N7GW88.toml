congress_website_title = "AN ACT PROVIDING FOR THE LEGITIMATION OF CHILDREN BORN TO PARENTS BELOW MARRYING AGE, AMENDING FOR THE PURPOSE THE FAMILY CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "This bill proposes to amend Article 177 of EO No. 209, as follows: \"Art. 177. Only children conceived and born outside of wedlock of parents who, at the time of the conception of the former, were not disqualified by any impediment to marry each other, EXCEPT BY IMPEDIMENT OF BEING UNDERAGE, may be legitimated.\""
