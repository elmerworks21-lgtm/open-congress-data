congress_website_title = "AN ACT PROVIDING FOR THE UPGRADING OF THE SALARY OF SCHOOL DISTRICT SUPERVISORS OF THE DEPARTMENT OF EDUCATION FROM SALARY GRADE NINETEEN (19) TO SALARY GRADE TWENTY-FOUR (24) AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The present salary grade of a school district supervisor is salary grade 19. This salary grade assigned to district supervisors is five (5) grades lower than that of an assistant school division superintendent who is his immediate superior. A school district supervisor has, ironically, a salary grade two (2) steps lower than the salary of school heads or principals that he supervises."

