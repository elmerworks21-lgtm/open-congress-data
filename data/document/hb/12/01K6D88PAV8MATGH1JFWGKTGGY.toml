congress_website_title = "AN ACT DECLARING NOVEMBER TWENTY-FIVE OF EVERY YEAR AS NATIONAL CONSCIOUSNESS DAY FOR THE ELIMINATION OF VIOLENCE AGAINST WOMEN"
congress_website_abstract = "On November 25, 1960, the Mirabal sisters, who were involved in activities against the Trujillo dictatorship in the Dominican Republic, were assassinated in an \\\"accident\\\". Since their death, the sisters have become the symbol of the victimization of women. As far back as 1999, women organizations in the country have commemorated November 25 as the International Day Against Violence Against Women with consciousness raising activities highlighting the issues of violence against women. These activities were centered mainly in key cities. To foster a nationwide observance, this bill proposes to declare November 25 of every year as a National Consciousness Day for the Elimination of Violence Against Women."

