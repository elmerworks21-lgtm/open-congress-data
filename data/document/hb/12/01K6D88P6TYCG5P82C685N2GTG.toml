congress_website_title = "AN ACT PROVIDING FOR A FIVE (5)-YEAR EMERGENCY SCHOOLBUILDING PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"School Building Act of 2002.\" This bill mandates the Department of Education (DepEd) to undertake the following: (1) Fifteen thousand (15,000) additional classrooms every year, for a period of five (5) years, to address the classroom backlog in various parts of the country; (2) One elementary school in every barangay which does not have a public elementary school at the time of the passage of this Act; and (3) One high school in every town which does not have a public high school at the time of passage of this Act.> An amount of Fifteen Billion Pesos (P15,000,000,00 0) shall be set aside for the Emergency School Building Fund. It shall be used for school building and classroom construction, repair and rehabilitation for a period of five ((5) years as mandated in this Act."

