congress_website_title = "AN ACT INSTITUTING THE DANGEROUS DRUGS ACT OF 2001 REPEALING REPUBLIC ACT NO. 6425, AS AMENDED"
congress_website_abstract = "\"Dangerous Drugs Act of 2001.\" This bill seeks to STRENGTHEN the existing law on Drugs, RA No. 6425, with the following AMENDMENTS: (1) Single definition of \"dangerous drugs\", covering both prohibited and regulated drugs; (2) INCREASED penalties and fines for unlawful importation; illegal possession; (3) Increase in board membership; (4) Mandatory drug testing for applicants of driver's license permit to carry firearm, etc."
