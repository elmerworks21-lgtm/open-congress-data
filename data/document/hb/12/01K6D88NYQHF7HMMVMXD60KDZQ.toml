congress_website_title = "AN ACT AMENDING SECTIONS 29 AND 30 OF REPUBLIC ACT NO. 8042, OTHERWISE KNOWN AS THE MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF 1995, AND FOR OTHER PURPOSES(RE: COMPREHENSIVE DEREGULATION PLAN ON RECRUITMENT ACTIVITIES)"
congress_website_abstract = "The following amendments to Sections 29 and 30 of Ra No. 8042 are proposed: Sec. 29. Comprehensive Deregulation [Plan] on recruitment Activities. - [Pursuant to a progressive policy of deregulation whereby the migration of workers becomes strictly amatter between the worker and his foreign employer. The DOLE, [within one (1) year from] UPON the effectivity of this Act is hereby mandated to [formulate] UNDERTAKE a [five-year] comprehensive deregulation [plan] on recruitment activities taking into account labor market trends, economic conditions of the country and emerging circumstances which may affect the welfare of migrant workers."

