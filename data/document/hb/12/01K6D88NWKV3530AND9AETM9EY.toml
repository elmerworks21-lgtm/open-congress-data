congress_website_title = "AN ACT AUTHORIZING THE RELEASE OF RETIREMENT, SEPARATION PAYS AND OTHER BENEFITS WITH INTEREST FOR RETIRING OR RESIGNING GOVERNMENT OFFICIALS AND EMPLOYEES WITH ADMINISTRATIVE, CRIMINAL AND CIVIL CASES WHO ARE EVENTUALLY EXONERATED OR CLEARED THEREFROM"
congress_website_abstract = "It is the policy of the State to give ample protection to government officials and employees who, in the diligent performance of their duties and responsibilitie s, are exposed to all hazards and harassment. > Pursuant to the above declared policy,retiring or resigning government officials and employees with administative, criminal or civil cases who eventually are exonerated or cleared therefrom shall receive their retirement or separation pay and benefits with added compounded interest for that period from their retirement or separation date to the date of the promulgation of the decision on their cases."
