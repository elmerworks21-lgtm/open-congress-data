congress_website_title = "AN ACT TO RECOGNIZE AND REWARD THE CONTRIBUTION OF OVERSEAS FILIPINO WORKERS TO NATION BUILDING, GRANT THEM BENEFITS AND SPECIAL PRIVILEGES AND FOR OTHER PURPOSES"
congress_website_abstract = "In recognition of the invaluable contribution of Overseas Filipino Workers (OFWs) or the \\\"Makabagong Bayaning Pilipino\\\" to economic growth and nation building, the bill seeks to grant them and their dependents certain rights and privileges. The proposed privileges are in the form of discounts like those enjoyed by senior citizens, and free services. It also proposed to allow private establishments to claim tax credits for the privileges or discounts extended to OFWs and their dependents."
