congress_website_title = "AN ACT REPEALING SECTION 60 OF REPUBLIC ACT NO. 9136, ENTITLED `AN ACT ORDAINING REFORMS IN THE ELECTRIC POWER INDUSTRY, AMENDING FOR THE PURPOSE CERTAIN LAWS AND FOR OTHER PURPOSES'"
congress_website_abstract = "Rationale: Section 60 of RA No. 9136 states that debts of rural electric cooperatives to the NEA shall be assumed by the PSALM Corporation. This mean that the financial obligation of rural electric cooperative which are private are to be borne by the PSALM Corporation, a public corporation. Hence, this proposed measure to repeal the provision."
