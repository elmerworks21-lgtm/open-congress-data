congress_website_title = "AN ACT AUTHORIZING THE REORGANIZATION OF THE EXECUTIVE BRANCH AND OTHER RELATED PURPOSE"
congress_website_abstract = "Rationale: There is a need to review government's role vis-a-vis the people's aspirations for freedom from want, from hunger, from ignorance, from fear and from disease. There is a need to review how government can make rights and freedom in a democracy become secure foundations upon which the people can participate fully and actively in the building of a democratic society. There is a need to give flesh to the ideal that government be a visible, competent, efficient and accessible partner of the people both in their daily quests for survival towards a better life and in bringing to fruition their hopes for a more confident future."
