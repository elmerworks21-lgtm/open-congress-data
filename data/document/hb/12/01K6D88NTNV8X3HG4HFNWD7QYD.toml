congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A GUIDANCE COUNSELING CENTER IN EVERY BARANGAY IN THE PHILIPPINES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Gabay Buhay Community Center Act of the Twelfth Congress.\" The proposed Center aims to: (1) Provide guidance counseling service to the victims of harassment, spouse abuse, parental abuse, rape and all other gender and family related violence; (2)Promote and provide leadership in community awareness of the fight against domestic and gender violence; (3) Conduct regular developmental guidance counseling training and seminars to local barangay officials and volunteers."
