congress_website_title = "AN ACT AMENDING SECTIONS 4 AND 6, PARAGRAPH (C) OF REPUBLIC ACT NO. 6972, OTHERWISE KNOWN AS THE `BARANGAY-LEVEL TOTAL DEVELOPMENT AND PROTECTION OF CHILDREN ACT,' AND FOR OTHER PURPOSES"
congress_website_abstract = "The measure seeks to amend Sections 4 and 6 of RA 6972, INCREASING the allowance of day care workers to P2,000 and mandating the Sangguniang Bayan or Sangguniang Panglungsod to create one mandatory position of Barangay Day Care Worker in every barangay. The day care worker should be of legal age, at least a high school graduate, accredited by the DSWD and has undergone a training or orientation seminar on the nature of his/her functions."

