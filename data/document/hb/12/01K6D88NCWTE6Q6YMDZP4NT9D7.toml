congress_website_title = "AN ACT EXPANDING THE PROHIBITED ACTS OF DISCRIMINATION AGAINST WOMEN ON ACCOUNT OF SEX, AMENDING FOR THE PURPOSE ARTICLES 135 AND 137 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "The proposed measure seeks to amend Articles 135 and 137 of the Labor Code (PD 442, amended) so as to expand the prohibited acts of discrimination against women that it shall be unlawful for any employer to deny any woman the benefits of employmentor other statutory benefits under our laws by reason of her sex, age, ethnic origin or beliefs or relations by affinity or consanguinity."
