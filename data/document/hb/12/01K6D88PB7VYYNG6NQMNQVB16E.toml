congress_website_title = "AN ACT DECLARING THE FILING OF A CERTIFICATE OF CANDIDACY FOR ANOTHER OFFICE A VOLUNTARY RENUNCIATION OF ELECTIVE OFFICE PRESENTLY HELD"
congress_website_abstract = "The Constitution mandates that all public officials must serve the people with utmost loyalty and not trifle with the mandate which they have received from their constituents. However, both Section 67 of BP 881 and RA 9006 have institutionalized the practice among elective officials of turning their backs from the mandate they received from the people. The bill seeks to consider any elective officials to have voluntarily renounced his/her present elective office upon the filing of a certificate of candidacy for another office."
