congress_website_title = "AN ACT PROVIDING FOR THE LEGITIMATION OF CHILDREN BORN TO PARENTS BELOW MARRYING AGE, AMENDING FOR THE PURPOSE THE FAMILY CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Art. 177 of EO No. 209 (Family Code) is hereby AMENDED to read as follows:> \"Only children conceived and born outside of wedlock of parents who, at the time of conception of the former, were not disqualified by any impediment to marry each other, EXCEPT BY IMPEDIMENT OF BEING UNDERAGED, may be legitimated.\""
