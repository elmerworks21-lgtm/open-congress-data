congress_website_title = "AN ACT PROVIDING FOR FINANCIAL MANAGEMENT REFORMS TO PROMOTE THE EFFICIENCY AND PRODUCTIVITY OF SCIENTIFIC AND TECHNOLOGICAL ACTIVITIES (STA)"
congress_website_abstract = "This bill shall provide a financial management system that is relevant and flexible to the peculiar concerns and fiscal requirements of S & T activities.> The bill provides for the following: (1) Under the bill, appropriations pertaining to researchand development (R&D) in the natural, agricultural, technological and engineering sciences for various departments, bureaus offices or agencies shall not be released without the recommendation of the DOST Secretary to ensure alignment with nationalS&T priorities; (2) The bill empowers the DOST Secretary to realign funds, regardless of source, intended for scientific and technological activities to meet the requirements for personal services, maintenance and operating expenses, and capital outllay upon approval by the head of agency or donor whenever appropriate; (3) The DOST is also authorized to use income from the sale of developed technologies, fabricated equipment and publications, licensing fees, and fees from technical services, etc"

