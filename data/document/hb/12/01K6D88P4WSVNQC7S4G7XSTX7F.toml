congress_website_title = "AN ACT ENSURING A HIGHER STANDARD OF PROTECTION AND PROMOTION OF THE WELFARE OF MIGRANT WORKERS BY AMENDING THE FIFTH PARAGRAPH OF SECTION 10 OF REPUBLIC ACT NO. 8042, OTHERWISE KNOWN AS THE `MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF 1995'"
congress_website_abstract = "It is the intention of this bill to establish a higher standard of protection and promotion of the welfare of migrant workers and Filipinos in distress. Under the fifth paragraph of Section 10 of RA 8042, an overseas worker who has been terminated from employment without just, valid or authorized cause as defined by law or contract shall be entitled to the full reimbursement of his placement fee with interest at twelve percent (12%) per annum, plus his salaries for the unexpired portion of hisemployment contract or for three months for every year of the unexpired term, whichever is less. In order to give higher standard of protection and promotion of the welfare of the migrant worker, the phrase \"whichever is less\" should be changed to \"wwhichever is higher.\""
