congress_website_title = "AN ACT REQUIRING THE REGISTRATION OF ALL BUYERS OF PREPAID SUBSCRIBER IDENTITY MODULE (SIM) PACKS FOR CELLULAR TELEPHONES AND REQUIRING PUBLIC TELECOMMUNICATI ON COMPANIES TO KEEP RECORD OF THESE BUYERS FOR THE PURPOSE OF AIDING LAW ENFORCEMENT AGENCIES IN THE INVESTIGATION OF A CRIMINAL OR ILLEGAL ACTIVITY AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Rationale: The latest trend in telecommunicati ons has provided much convenience for everyone. Business transactions have definitely been made more efficient and effective since the advent of the mobile cellular phone technology. However, access tothe technology through the purchase and use of Prepaid Subscriber Identity Module (SIM) Packs has been too easy and uncontrolled. Unscrupulous individuals have taken advantage of this unregistered sale of SIM packs to hide themselves behind an untraceable number to mask the pursuit of their illegal or criminal activities to the deteriment of many Filipinos. > The proposed bill aims to address the inability of law engorcement agencies to track down criminals or individuals using mobile phones astools in the commission of a crime or in many cases, to harass, to communicate threats, to send ransom demands or simply, to make an obscene phone call or send an obscene text message."
