congress_website_title = "AN ACT CRIMINALIZING TRAFFICKING IN PERSONS SPECIALLY WOMEN AND MINORS, PROVIDING PENALTIES FOR ITS VIOLATIONS, AND INSTITUTING POLICIES TO COMBAT TRAFFICKING IN PERSONS SPECIALLY WOMEN AND MINORS THROUGH THE DEVELOPMENT OF LOCAL AND APPROPRIATE SOCIO-ECONOMIC ALTERNATIVES, AND ESTABLISHING THE NECESSARY INSTITUTIONAL MECHANISMS FOR ITS PREVENTION, AND PROTECTION AND SUPPORT OF TRAFFICKED PERSONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "An immediate concern is the fact that there is no Philippine law that clearly defines trafficking as a crime. This bill addresses this concern by declaring trafficking as a crime and imposing appropriate penalties on traffickers. This bill also aims to provide opportunities for the coordination of efforts by government agencies, NGOs and people's organizations toward a more effective approach at combating trafficking in persons specially women and minors. >This bill includes provisions that provide guidelines on the: (1) Development of local and appropriate economic and social alternatives to address poverty in urban and rural poor communities. (2) Role of local government units, people's organizations and NGOs at the grassroots level incombating trafficking persons in urban and rural poor communities."
