congress_website_title = "AN ACT GRANTING INCENTIVES TO SUBDIVISION HOMEOWNERS ASSOCIATIONS TO DEVELOP AND MAINTAIN FORESTED AREAS WITHIN THEIR SUBDIVISIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Green Parks Act of 2001.\" This bill seeks to expand the area to be devoted to the preservation of the ecological balance of nature. In reserving a whole area for such activity, and by getting the community members involved, it is hoped that there would eventually be a sincere appreciation for a healthy, clean and natural environment."
