congress_website_title = "AN ACT RESTRUCTURING, RE-ALLOCATING PROSECUTION POSITIONS AND STRENGTHENING THE NATIONAL PROSECUTION SERVICE AND PROVIDING ADDITIONAL FUNDS THEREFOR"
congress_website_abstract = "\"National Prosecution Service Act of 2001.\" Rationale: Government prosecutors are in the forefront of the fight against criminality. They have the principal task of determining the existence of probable cause and providing the commission of crime beyond reasonable doubt. They perform work akin to judges of the courts. > This bill seeks to address the need for the effective delivery of prosecutorial services nationwide with amendatory provisions, such as on: (1) Organization and structure of theNational Prosecution Service; (2) Qualification of prosecution Officers and Compensation; (3) Functions of the Regional State Prosecution Officers; as well as of the provincial, city prosecutor, etc."

