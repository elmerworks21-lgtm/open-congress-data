congress_website_title = "AN ACT PROHIBITING LOCAL CHIEF EXECUTIVES FROM MAKING TEMPORARY APPOINTMENT AND/OR DESIGNATIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "Local chief executives of provinces, cities, municipalities and barangays shall not make temporary appointments and/or designations for any person to perform the functions of any office, appointment to which is vested in him/her by Republic Act No.7160, or more popularly known as the \"Local Government Code of 1991.\" and other laws.> In case there exists a temporary vacancy in any office referred to in Section 1 hereof, local chief executives may make the necessary temporary appointments and/ordesignations for a non-renewable period of six (6) months from the time any temporary vacancy occurs."

