congress_website_title = "AN ACT CREATING THE POSITION OF BARANGAY POPULATION WORKER, GRANTING BENEFITS THERETO, AMENDING FOR THE PURPOSE THE `LOCAL GOVERNMENT CODE OF 1991,' AS AMENDED, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The creation of the office of Barangay Population Worker will strengthen the government's capacity to seek new information on population concerns. The Barangay Population Worker shall be tasked to conduct studies on reproductive technologies currently in use, and collect, analyze and disseminate basic data on population principles and development. With this, a factual basis for understanding the interrelationsh ip of population, socio-economic and environmental variables is established."
