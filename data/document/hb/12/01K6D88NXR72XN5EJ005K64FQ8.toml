congress_website_title = "AN ACT GRANTING ADDITIONAL PRIVILEGES AND INCENTIVES TO DISABLED PERSONS SIMILAR TO THOSE ENJOYED BY SENIOR CITIZENS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7277, OTHERWISE KNOWN AS THE MAGNA CARTA FOR DISABLED PERSONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Over the years we see many persons with disability that try to make a living despite of their physical handicap. Others are lazy and do not seel to care about their future and just rely on their parents or relatives for their living. It is but fitting that the state should give persons with disability additional privilege and incentives similar to those enjoyed by senior citizens. > This bill seeks to grant 20% discount from all establishments, 10% discount in the purchase of medicines, exemption from the payment of individual income taxes, and full medical and dental services in government establishments, among others."

