congress_website_title = "AN ACT EXTENDING THE TERM OF BARANGAY OFFICIALS AND THE SETTING OF THE DATE OF THE ELECTION OF BARANGAY OFFICIALS, AMENDING REPUBLIC ACT NO. 9164"
congress_website_abstract = "The government spends billions of pesos during the holding of elections. To enable the government to save valuable funds, this bill proposes the holding of synchronized barangay and sangguniang kabataan elections to be set on the last Monday of October 2007 and every five (5) years thereafter. It also proposes to extend the term of office of all barangay and sangguniaang kabataan officials from three (3) years to five (5) years."
