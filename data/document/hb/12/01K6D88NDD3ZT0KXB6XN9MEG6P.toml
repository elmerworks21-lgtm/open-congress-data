congress_website_title = "AN ACT DECLARING THE RIGHTS OF PATIENTS AND PRESCRIBING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "\"Magna Carta of Patient's Rights.\" Rationale: The Philippine Constitution, in Section 1, Article XIII, states that the Congress shall give the highest priority to the enactment of measures that protect and enhance the right of all people to human dignity. Towards this end, it is hereby declared the policy of the State to ensure and protect the rights of patients to decent, humane and quality health care."
