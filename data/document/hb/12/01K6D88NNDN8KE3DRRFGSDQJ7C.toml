congress_website_title = "AN ACT PROVIDING FOR THE RIGHTS OF THE ACCUSED AND PERSONS UNDER INVESTIGATION FOR THE COMMISSION OF A CRIME, PROVIDING FOR CIVIL AND CRIMINAL PENALTIES IN CASE OF VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: There is an urgent need to codify a comprehensive set of safeguards for the protection of every person accused, arrested or undre investigation for the commission of a crime pursusant to the Bill of Rights, the pronouncement of the Supreme Court thereon and the rules of procedure and other applicable laws. These safeguards will complement the anti-crime campaign of the government and temper it with buit-in procedures to balance the drive vis a vis the basic rights of individuals before the law. >The bill contains innovations to effectively ensure the observance of certain rules for the protection of the accused or persons arrested or under investigation for the commission of crime."
