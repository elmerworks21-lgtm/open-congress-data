congress_website_title = "AN ACT CREATING A SPECIAL TASK FORCE IN THE DEPARTMENT OF JUSTICE TO APPREHEND PERSONS WITH PENDING WARRANTS OF ARREST AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: For the effective and expeditious dispensation of justice, a special task force should be created and charged with the obligatory task to serve the warrants of arrest and detain the persons thus arrested. As envisioned, this special taskforce is composed of selected personnel on detail from the different agencies of the government and under the direct supervision of the SEcretary of Justice. This task force will have enough resources and more competent personnel to track down and effect services of warrants of arrest to the persons concerned."

