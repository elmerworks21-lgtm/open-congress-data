congress_website_title = "AN ACT TO PREVENT THE COLLAPSE OF THE AGRICULTURE AND FISHERIES MODERNIZATION ACT (AFMA) OF 1997 BY AMENDING SECTION 112 OF REPUBLIC ACT NO. 8435"
congress_website_abstract = "Rationale: In 1995, Congress created the Congressional Commission to review and assess the state of Philippine agriculture. This resulted, among others, in the enactment of R.A. No. 8435, otherwise known as the \"Agriculture and Fishereies Modernization Act of 1997.\" In order to empower the agriculture and fisheries sectors to develop and sustain themselves, the amount of Twenty Billion Pesos (P20 B) was appropriated as an initial funding for the first year of the implementation of the agriculture and fisheries modernization program and an additional amount of not less than Seventeen Billion Pesos (P17 B) annually for the next six (6) years of its implementation. > However, though huge amount have been appropriated, miserable amounts were rreleased annually. In order to prevent the collpse of the Agriculture and Fisheries Modernization Act, this Bill seeks to extend the annual mandated financial support for another three (3) years. Immediate approval hereof is earnestly sought."
