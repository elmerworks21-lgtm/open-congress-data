congress_website_title = "AN ACT PROVIDING FOR BOARD, LODGING AND HOUSING BENEFITS TO EMPLOYEES AND PERSONNEL IN ECOZONE ENTERPRISES, AMENDING FOR THE PURPOSE SECTION 37 OF REPUBLIC ACT NO. 7916, OTHERWISE KNOWN AS `THE SPECIAL ECONOMIC ZONE ACT OF 1995,' AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to grant board, lodging and/or housing benefits to ECOZONE employees and personnel. It aims to redress the primary quandary of an ECOZONE employee who has been forced by circumstances to be away from the comforts of his home. It likewise addresses the need of a similar employee who may have long wanted to have a place, proximate to where he works, his new home, but may not afford to buy it. In a simple way, it seeks to balance the welfare of these laborers with their employers."
