congress_website_title = "AN ACT REQUIRING PUBLIC OFFICIALS AND EMPLOYEES TO SUBMIT A WRITTEN PERMISSION OR WAIVER IN FAVOR OF THE OMBUDSMAN TO LOOK INTO ALL DEPOSITS OF WHATEVER NATURE WITH BANKS OR BANKING INSTITUTIONS BOTH WITHIN AND OUTSIDE THE PHILIPPINES INCLUDING INVESTMENT BONDS ISSUED BY THE GOVERNMENT OF THE PHILIPPINES, ITS POLITICAL SUBDIVISIONS AND INSTRUMENTALITI ES, AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Rationale: Previous laws, such as those requiring the submission of statements of assets and liabilities, providing forfeiture in favor of the state of property unlawfully acquired, a code of conduct and ethical standards, and even that providing for the creation of the Office of the Ombudsman have proven insufficient and somewhat still lacking if we are to base its success on the absence or lack of acts of corruption in government. It is for this reason that this bill was filed. To add to those laws which, in one way or the other, seek to tighten the noose on grafters by requiring an even greater amount of transparency among public officials and employees."

