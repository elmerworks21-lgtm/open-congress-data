congress_website_title = "AN ACT INCREASING THE MONTHLY RETIREMENT PENSION OF ALL SOCIAL SECURITY SYSTEM (SSS) RETIREES TO A MINIMUM LEVEL OF SIX THOUSAND (P6,000.00) PESOS UNDER AN ECONOMIC ADJUSTMENT PENSION PROGRAM"
congress_website_abstract = "This bill shall provide for the adjustment of Social Security System monthly pension to Three Thousand Pesos (P3,000), provided that in the succeeding years upon approval of this Act, said amount will be increased annualy by not less than One Thousand Five-Hundred Pesos (P1,500) until the total monthly pension shall be at least Six Thousand Pesos (P6,000) per month."
