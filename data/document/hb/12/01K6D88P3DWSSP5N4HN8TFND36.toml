congress_website_title = "AN ACT DECLARING ALL FORMS OF SMUGGLING AS ECONOMIC SABOTAGE AND PROVIDING PENALTIES THEREOF"
congress_website_abstract = "Economic sabotage means any act or activity which undermines, weakens or renders into disrepute the economic system or viability of the country or tends to bring about such effects to include, but not necessarily limited to, the following offenses:trafficking, all forms of smuggling including technical smuggling, counterfeiting, blackmarketing or mass movement of local or foreign currency in violation of existing laws and regulations, price manipulation to the prejudice of the public especially in the sale of prime commodities in violation of price control laws, tax evasion, bank swindling and violation of land reform laws. > The gravity of the effects of all forms of smuggling has gone bad to worse. the losses in revenue and tax collectiion cannot anymore be ignored. Smuggling must now be considered as form of economic sabotage because of its effects on the economy."
