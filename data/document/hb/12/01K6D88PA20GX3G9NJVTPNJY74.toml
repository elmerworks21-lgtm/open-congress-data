congress_website_title = "AN ACT DEFINING AS A CRIME THE ACT OF DRIVING A MOTOR VEHICLE WHILE UNDER THE INFLUENCE OF LIQOUR AND/OR PROHIBITED DRUGS AND PROVIDING GRADUATED PENALTIES THEREFOR"
congress_website_abstract = "\\\"The Anti-Drunk Driving Act of 2003\\\". This bill seeks to minimize injuries and death due to accidents caused by persons driving or operating any kind of motor vehicle while under the influence of any kind of alcoholic beverage and/or prohibited drugs. Under the proposed measure a person shall be considered driving \\\"drunk\\\" if/she has a blood alcohol concentration (BAC) level of 0.6% or more. It also grants an implied consent for the conduct of BAC test by a person who drive or operates a motor vehicle on public streets and higheays or quasi-public areas. It also provides penalties for violation of the proposed measure."
