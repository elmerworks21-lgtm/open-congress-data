congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 123 OF 1947, STRENGTHENING THE REGULATORY CAPACITY OF THE DEPARTMENT OF HEALTH IN QUARANTINE AND INTERNATIONAL HEALTH SURVEILLANCE"
congress_website_abstract = "\"Bureau of Quarantine Act of 2003\". The recent outbreak of SARS (Severe Acute Respiratory Syndrome) has caught many countries flat-footed including the Philippines. This measure proposes to strengthen the Quarantine Law and to change the name of the Bureau of Quarantine Service to the Bureau of Quarantine and International Health Surveillance. It provides for a command and control structure which would not only prevent the outbreak of contagious diseases like SARS from spreading into the country but it also oversees matters such as information dissemination, coordination of responses and other necessary powers in the event that quarantine fails."
