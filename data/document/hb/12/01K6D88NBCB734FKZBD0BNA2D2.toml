congress_website_title = "AN ACT UPGRADING THE MINIMUM SALARY GRADE LEVEL OF PUBLIC SCHOOL TEACHERS IN ELEMENTARY AND SECONDARY LEVELS FROM GRADE 10 TO GRADE 18 AND AUTHORIZING THE APPROPRIATION OF FUNDS THEREFOR"
congress_website_abstract = "It is the policy of the State to give highest budgetary priority to education and ensure that teaching will attract and retian its rightful share of the best available talents through adequate remuneration and other means of job satisfaction and fulfillment. In pursuance of such policy, this Act provides for the upgrading of teachers' salaries commensurate to their educational attainment and professional preparation that require them to finish a Bachelors degree and to pass the Professional Board Examination for Teachers and considering that teachers are the major components of the education process."
