congress_website_title = "THE SECURITIZATION ACT OF 2001"
congress_website_abstract = "The proposed bill seeks to rationalize the tax, legal and regulatory regime governing asset-backed securities. A well-developed and functioning securitization market will provide the government with an alternative means of generating revenues, equipthe private sector with other options to raise fresh capital and diversity rick. More importantly, the development of an active and liquid market for mortgage-backed securities would make home mortgages more affordable and accessible."
