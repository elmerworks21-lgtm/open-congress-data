congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A NATIONWIDE SCHOLARSHIP PROGRAM FOR INDIGENOUS PEOPLES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Education is one of the basic keys for sustainable economic development of the marginal sector of our society who are in need of government assistance and social services. One way of ensuring economic upliftment and social mobility is through the provision of opportunities, particularly to the less privileged, who through deserving, may not be able to complete their schooling due to poverty."
