congress_website_title = "AN ACT ADOPTING COMMUNITY SERVICE AS AN ALTERNATIVE PENALTY FOR CERTAIN OFFENSES IN LIEU OF DEPRIVATION OF LIBERTY OR PAYMENT OF FINE"
congress_website_abstract = "\"Community Service Law of 2001.\" \"Community Service\" a type of penalty in lieu of imprisonment or fine by which the offender at any time before conviction and sentence is released subject to conditions imposed by the court and to the supervision ofthe community service officer. For purpose of this bill, community service shall, include but shall not be limited to tree planting, street sweeping, participation in livelihood and environmental rehabilitation projects and other government assistedprojects for the welfare of the community."
