congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 6971, ENTITLED `THE PRODUCTIVITY INCENTIVES ACT OF 1990,'AND FOR OTHER PURPOSES'"
congress_website_abstract = "Rationale: The concept of productivity is a management process that is attributed to employees' high performance work ethic or attitude or practices that yield positive performance results on the part of the industry. These work attitude or practices include, among others, employee involvement, self-managing works teams, empowerment, information sharing and access, and training and development. There is a need to better off and open information access to the greater number of workers and the continuous holding or giving of extensive training and workshops to broaden employees capabilities. It is also worthwhile to capitalize on opening up access to a participative style of management paving the way to giving selected employees the opportuunity to participate in decision-making that directly and indirectly affect them. Adopting an appropriate reward system for all would ensure high performance work ethic, attitude and practices. That further will ensure the reinforcement of improved p"
