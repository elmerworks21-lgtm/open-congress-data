congress_website_title = "AN ACT REQUIRING REAL ESTATE DEVELOPERS TO PLANT AT LEAST FIFTY (50) SHADY TREES FOR EVERY HECTARE OF THE SUBDIVISION PROJECT THEY ARE DEVELOPING AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "This bill proposes that real estate developers should be required to plant at least fifty (50) shady trees per hectare of the subdivision/res idential area being developed. This will provide ecological balance and add up to the aesthetic appearanceof the place. It will also prove to be of great help in preventing natural disasters such as flooding and landslides such as what we have witnessed in some residential areas recently."
