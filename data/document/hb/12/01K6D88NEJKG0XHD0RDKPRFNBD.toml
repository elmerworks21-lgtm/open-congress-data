congress_website_title = "AN ACT REGULATING THE PROPER USE OF HANDHELD RADIOS AND MOBILE TELEPHONES WHILE DRIVING ANY KIND OF VEHICLES, PRESCRIBING PENALTY THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "An act shall constitute a violation to the provision of this Act when the driver uses and/or operates his/her handheld band radio and/or mobile telephone in the course of driving in any private or public street, road or highway; Provided, That the act of using or operating the handheld band radio and/or mobile telephone is simultaneously done while the driven vehicle is in motion. This, however, is subject to certain requirements."
