congress_website_title = "AN ACT TO INSTALL FAX MACHINE UNITS IN ALL CITIES AND MUNICIPALITIES THE PHILIPPINES"
congress_website_abstract = "Rationale: The bill proposes the installation of fax machine units in all cities and municipalities in the country to solve the communication barrier between the local governments and the National Government. With its implementation, it is expectedthat prompt and effective delivery of basic goods and services may be carried out and ultimately lead to the growth and prosperity even in obscure and distant cities and municipalities all over the country."
