congress_website_title = "AN ACT INSTITUTING A NATIONAL PARA-LEGAL SYSTEM IN THE BARANGAY LEVEL"
congress_website_abstract = "With the institution of a national para-legal system such problem could be minimized even in the lower courts, such as the Municipal Trial Courts and Municipal Circuit Trial Courts. A non-lawyer may be allowed to appear before such courts to represent a party litigant but with authority from the Supreme Court. It is envisioned that the System would function well with the participation of respected persons in the barangay who shall guide and assist the members of the community in their court problems. The institution of a NATIONAL PARA-LEGAL SYSTEM could minimize such problem."

