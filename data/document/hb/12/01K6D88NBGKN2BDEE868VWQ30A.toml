congress_website_title = "AN ACT PROVIDING FOR THE REGULATION OF THE ORGANIZATION AND OPERATIONS OF INVESTMENT COMPANIES"
congress_website_abstract = "\"Investment Company Act of 2001.\" The purpose of this Act is to establish a comprehensive scheme of regulation to permit investment companies to serve their role in the capital formation process, and at the same time promote the applicaiton of fiduciary principles in the management and supervision of mutual funds and high standards of professionalism by their distributors and others who provide services to them and seek to prevent abuses and protect the interests of the public who are investorsin such companies."
