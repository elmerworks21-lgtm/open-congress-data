congress_website_title = "AN ACT PROVIDING FOR THE PROMOTION OF BIO-ORGANIC FARMING IN THE PHILIPPINES"
congress_website_abstract = "The bill seeks to implement a comprehensive program that will promote bio-organic cultivation and production methods among farmers and it and encourages research and development in the said field. > The bill provides for the following: (1) The Department of Agriculture (DA) shall take the lead role in the program, supported by all service agencies in their respective areas of concern; (2) Organic input producers shall be provided with financial, technical, marketing and other services and resources of the government; (3) The Bio-Organic Farming Authority/Commi ssion shall be created to be headed by an Executive Director;and (4) The Executive Director is empowered to call upon any government agency for assistance in the performance of his ttasks and to initiate criminal and/or administrative actions under the penal provision of this Act."
