congress_website_title = "AN ACT AMENDING SECTION 223 OF ACT NO. 3815, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "This measure proposes to impose a stiff penalty on jail guards and other persons who consent, connive or allow, by negligence, a prisoner in his custody or charge, to escape from the clutches of law. Hopefully, this would deter those who are charged with the custody of prisoners, more specifically high profile detention prisoners, from allowing them to escape."

