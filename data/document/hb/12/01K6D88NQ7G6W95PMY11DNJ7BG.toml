congress_website_title = "AN ACT REPEALING THE PROVISIONS ON VAGRANCY AND AMENDING THE DEFINITION OF PROSTITUTES AS PROVIDED IN ARTICLE 202 OF THE REVISED PENAL CODE"
congress_website_abstract = "Rationale: The law on vagrancy is out of date. Vagrants should be looked upon as victims of their ill circumstance, not as common criminals who should be rounded up and used as milking cows by rogue law enforcers. The present law has been used as apretext in violating the rights of individuals. Law enforcers at present have sweeping powers to apprehend and detain people whom they deem as vagrants. In many cases, individuals' right to freedom of movement is violated in the process. >This bill also amends the definition of prostitute to include not only \"women\" but also \"any person\" who \"for money or profit, habitually engages in sexual intercourse or lascivious acts\"."
