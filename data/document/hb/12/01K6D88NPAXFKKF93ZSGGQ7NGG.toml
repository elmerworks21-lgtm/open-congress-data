congress_website_title = "AN ACT REQUIRING ALL CANDIDATES FOR ELECTIVE POSITIONS IN GOVERNMENT AND ALL APPOINTIVE PUBLIC OFFICIALS TO UNDERGO MANDATORY AND PERIODIC DRUG TESTING"
congress_website_abstract = "This bill seeks to require all candidates for any elective position, as a prerequisite to the filing of their certificates of candidacy, and all appointive public officials in the upper echelon of the bureaucratic hierarchy to undergo drug test. > There is no graver threat than drug traffickers and drug users infiltrating the mainstream of the government bureaucracy. The government must implement a policy that would effectively detect and prevent drug users and abusers from entering the mainstream of public service. Hence, the State must ensure that only competent, qualified and drug-free people are elected and/or appointed to public office."
