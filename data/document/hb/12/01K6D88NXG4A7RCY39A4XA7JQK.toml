congress_website_title = "AN ACT AMENDING SECTION 1 OF PRESIDENTIAL DECREE NUMBERED SIXTEEN HUNDRED TWO, ENTITLED `PRESCRIBING STIFFER PENALTIES FOR GAMBLING', AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Despite the unrelenting efforts of the Philippine National Police in their drive against the proliferation of illegal gambling, the social menace is not just lurking around the corner, it is staring at us in the eyes - that despite the existence of a law that imposes \"stiffer\" penalties to supposed violators and perpetuators of the things that contribute to our society's moral decay, bookie operations are rampant, jueteng is much visible, and so on. > This bill seeks to expand as well as respond with the changing environment."
