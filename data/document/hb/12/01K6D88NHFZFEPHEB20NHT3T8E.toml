congress_website_title = "AN ACT PROHIBITING ALL ELECTED AND APPOINTED GOVERNMENT OFFICIALS AND EMPLOYEES FROM PLAYING IN CASINOS AND OTHER SIMILAR ESTABLISHMENTS OPERATED BY THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION, OR BY OTHER SIMILAR GOVERNMENT-OWNE D OR -CONTROLLED CORPORATION AND THEIR FRANCHISE HOLDERS, AND PROVIDING PENALTIES FOR THE VIOLATION THEREOF"
congress_website_abstract = "All elected as well as appointed government officials and employees, regardless of rank, designation, and status of employment, are hereby prohibited from playing in casinos and other similar establishments operated by the Philippine Amusement and Gaming Corporation (PAGCOR) or by other similar government-owne d or controlled corporations and their franchise holders. Such ban shall include entry inside casino premises during the establishment's business hours."
