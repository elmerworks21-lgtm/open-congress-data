congress_website_title = "AN ACT CREATING A NATIONAL STUDENT LOAN BOARD TO IMPLEMENT A NATIONAL STUDENT LOAN PROGRAM FOR THE POOR, DEFINING ITS IMPLEMENTING GUIDELINES, RULES AND REGULATIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"National Student Loan Program for the Poor Act of 2002.\" There is a great need to provide a national student loan program to assist the poor and the needy by giving them access to tertiary education. Under this proposed measure, a mandatory monthlycontributions shall be made by persons within specific income brackets and that such fund collected shall go into the national student loan fund."

