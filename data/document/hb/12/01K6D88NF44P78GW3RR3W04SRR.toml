congress_website_title = "AN ACT ALLOWING GRADUATES OF CRIMINOLOGY FROM ANY ACCREDITED PHILIPPINE SCHOOL OF CRIMINOLOGY TO BE ENLISTED AND APPOINTED AS MEMBERS OF THE PHILIPPINE NATIONAL POLICE WITHOUT NEED OF TAKING THE QUALIFYING ENTRANCE EXAMINATION AS REQUIRED FOR BY SECTION 32 OF REPUBLIC ACT NO. 6975, OTHERWISE KNOWN AS THE DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990"
congress_website_abstract = "Rationale: Records have it that the country today is in dire need of the services of additional policemen not only because of the prevailing crime rate but also because we are way below the standard on \"police and population ratio\".> Year in and year out, our accredited criminology schools turn out hundreds of graduates who have undergone four year of training in criminology thereby making them a rich source of future policemen. Presently, however, this source has not been fully utilized."
