congress_website_title = "AN ACT TO PROVIDE PROTECTION TO NEW PLANT VARIETIES, ESTABLISHING A NATIONAL PLANT VARIETY PROTECTION BOARD AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The State recongizes that an effective intellectual property system in general and the development of new plant variety in particular is vital in attaining food security for the country. To this end, it shall protect and secure the exclusive rights of breeders with respect to their new plant variety particularly when beneficial to the people for such periods as provided for in this Act."
