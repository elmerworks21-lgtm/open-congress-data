congress_website_title = "AN ACT ABOLISHING THE PREPARATORY RECALL ASSEMBLY AS A MECHANISM OF RECALL OF LOCAL ELECTIVE OFFICIALS, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "This bill aims to amend Sec. 70 of Ra 7160 by providing that; (1) Recall may be initiated by the registered voters of the local government unit to which local elective official subject to such recall belongs: (b) Recall of any elective provincial, city, municipal or barangay official SHALL be validly initiated upon petition of at least thirty percent (30%) of the total number of registered voters in the local government unit concerned during the election in which the local official sought to berecalled was elected; and (c) A petition of a recall of an elective Sangguniang Kabataan official shall be validly commenced by a petition of at least fifteen percent (15%) of the total number of voters registered in the roster of the Katipunan ng KKabataan during the election in which the Sangguniang Kabataan sought to be recalled was elected in the locality."
