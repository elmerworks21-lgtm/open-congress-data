congress_website_title = "AN ACT STRENGTHENING MEDICAL NEUTRALITY, REPEALING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 169, AS AMENDED"
congress_website_abstract = "Rationale: The physician's oath commands him to treat any person in distress regardless of the latter's creed, color, religion or nationality. If compliance to Presidential Decree would jeopardize his patient's life, then a physician has all the rights to rage against such instruction. > PD No. 169 required physicians and medical practitioners to report their treatment of any person for physical injuries to the nearest government health authority."
