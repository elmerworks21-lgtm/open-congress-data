congress_website_title = "AN ACT CREATING THE ANTI-DISCRIMINA TION BOARD, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "There is hereby created the Anti-Discrimina tion Board which shall be imbued with investigatory and prosecutional powers over complaints for discrimination based on sex or sexual orientation. The Board shall also serve as the coordinating body for all the efforts of the government towards the elimination of discriminatory practices based on sex or sexual orientation. The Board shall exist for twenty-five (25) years but such period may be extended by the President."

