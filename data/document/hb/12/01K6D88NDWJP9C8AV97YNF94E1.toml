congress_website_title = "AN ACT INSTITUTIONALIZ ING THE NON-FORMAL EDUCATION ACCREDITATION AND EQUIVALENCY (NFE A&E) SYSTEM, APPROPRIATING FUNDS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "The role of non-formal education (NFE) in the development of the literacy and vocational skills of drop-outs and out-of-school youth has been acknowledged as one of the major avenues to uplift the socio-economic condition of the masses. The non-formal education learning center will serve as the specific venue for conducting non-formal education sich as basic literacy education, vocational skills training, values development and other socio-cultural activities. The NFE learning center will alsoserve as the community library."
