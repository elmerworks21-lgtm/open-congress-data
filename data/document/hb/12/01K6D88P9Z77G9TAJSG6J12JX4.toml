congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 9164 TO EXTEND THE TERM OF OFFICE OF BARANGAY OFFICIALS AND RESET THE DATE OF BARANGAY ELECTIONS"
congress_website_abstract = "This measure seeks to reset the holding of barangay elections to every five years and to extend the terms of office of barangay officials from three years to five years. The proposed term extension would give incumbent barangay officials a chance to provide better services to their constituents and to realize and complete their plans and programs for their barangays. Furthermore, a longer term of office will keep politics in the barangat level at a minimum."
