congress_website_title = "AN ACT ESTABLISHING HEALTH, RECREATION AND AMUSEMENT PARKS TO CATER TO THE ELDERLY, RETIREES AND THE DISABLED SECTOR IN EVERY CONGRESSIONAL DISTRICT IN THE COUNTRY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The National Park Development Authority in coordination with the Department of Health (DOH) shall undertake the establishment of health, recreation and amusement centers to serve all congressional districts aimed to cater specifically to the elderly, retirees and the disabled sector. The Department of Health shall provide the Doctors, Physical Therapists, nurses, as well as the necessary medical equipments, materials and supplies necessary to accomplish the policy established herein."
