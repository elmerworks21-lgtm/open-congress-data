congress_website_title = "AN ACT GRANTING RETIREMENT BENEFITS TO ALL ELECTED AND APPOINTED BARANGAY OFFICIALS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Every punong barangay, sangguniang barangay member, chairman of the kabataan barangay, barangay secretary, barangay treasurer and members of barangay tanod brigades shall be provided with retirement benefits under a retirement plan to be administered and managed by the Government Service Insurance System (GSIS). > A barangay official, who has reached the age of sixty-five (65) years old and has at least twenty (20) years of government service, shall be retired. Upon retirement, he shall be entitled to receive retirement benefits."
