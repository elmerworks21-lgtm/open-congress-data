congress_website_abstract = "Principally, the proposed Center shall be tasked to: a. To provide skills training services to develop the individual skills of residents of the municipality for employment and for small scale entrepreneurshi p; b. To provide the necessary knowledge, technology and training that will cover all aspects of livelihood production such as furniture making, handicrafts, ceramics, garments, pottery, ornamental plants, decor making, wood carving and agri-business production such as poultry, fishery, hog and cattle raising."

