congress_website_title = "AN ACT EXTENDING THE MANDATED FUNDING SUPPORT FOR AGRICULTURAL AND FISHERIES MODERNIZATION AND PROVIDING SPECIFIC FUNDING ALLOCATION FOR STRATEGIC AGRICULTURAL AND FISHERIES DEVELOPMENT ZONES (SAFDZ), AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8435,OTHERWISE KNOWN AS THE AGRICULTURAL AND FISHERIES MODERNIZATION ACT (AFMA)"
congress_website_abstract = "This bill seeks to (a) mandate the Department of Budget and Management (DBM) to include annually in the next [six (6)] NINE (9) years, in the President's program for expenditures for submission to Congress, and release, an amount not less than Seventeen Billion Pesos (P17,000,000,00 0.00) as support for Agricultural and Fisheries Modernization Act (AFMA) to allow the modernization program to proceed; and (b) provide specific funding allocation for the development of Strategic Agricultural and Fisheries Development Zones (SAFDZ) being the centerpiece of the program."

