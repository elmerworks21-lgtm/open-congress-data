congress_website_title = "AN ACT ABOLISHING THE PROFESSIONAL REGULATION COMMISSION AND TRANSFERRING ITS POWERS AND FUNCTIONS TO THE CIVIL SERVICE COMMISSION"
congress_website_abstract = "The powers and functions of the Professional Power Corporation (PRC), if abolished, together with all its real and personal property, shall be transferred to the Civil Service Commission (CSC). All Commissioners of the PRC shall be deemed separatedfrom the service, unless reappointed to appropriate positions in the CSC. Officials and employees of the PRC may be absorbed by the CSC on the basis of merit and fitness provided, that those who shall be separated from the service as a result of theabolition shall be paid the equivalent of one-month basic salary for every year of service. Those retirable from the service shall receive the retirement benefits to which they may be entitled under existing laws."
