congress_website_title = "AN ACT PENALIZING THE COMMISSION OF ACTS OF TORTURE AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Torture Act of 2001\". Under this proposed measure, the term \"TORTURE\" is defined, and is further classified into (1) PHYSICAL, (2) MENTAL/PSYCHOLO GICAL, and (3) PHARMACOLOGICAL , each with their corresponding forms. Corresponding penalties are likewise provided."

