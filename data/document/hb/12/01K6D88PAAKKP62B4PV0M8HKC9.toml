congress_website_title = "AN ACT STRENGTHENING THE POLITICAL PARTY SYSTEM AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "\\\"Political Party Act of 2003\\\". The bill provides for the institutionalization of national parties and the creation of a state fund for registered national parties. The state fund shall be used exclusively to augment the campaign expenditures and the program operations of the national parties. The bill also defines political turncoatism and sets the prohibition and penalties that will be imposed on elective officials found guilty of political turncoatism."
