congress_website_title = "AN ACT GRANTING CIVIL SERVICE ELIGIBILITY UNDER CERTAIN CONDITIONS TO A GOVERNMENT EMPLOYEE WHOSE STATUS OF APPOINTMENT IS CASUAL OR CONTRACTUAL AND WHO HAS RENDERED A TOTAL OF TEN (10) YEARS OF EFFICIENT SERVICE"
congress_website_abstract = "Casual and contractual employees of the government are part of the civil service. The measure seeks to grant the appropriate civil service eligibility to casual or contractual employees who have continously rendered at least 10 years of service in the government in order to qualify him/her for a permanent appointment in the service."
