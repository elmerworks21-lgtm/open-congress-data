congress_website_title = "AN ACT PROHIBITING THE DETENTION OF LIVE OR DEAD PATIENTS IN HOSPITALS AND MEDICAL CLINICS ON GROUNDS OF NONPAYMENT OF HOSPITAL BILLS OR MEDICAL EXPENSES"
congress_website_abstract = "Any officer or employee of the hospital or medical clinic responsible for releasing patients, who violates the provisions of this Act shall be punished by a fine of not less than Five Thousand (P5,000.00) Pesos but not more than Fifteen Thousand (P15,000.00) Pesos or imprisonment of not less than one (1) month but not more than six (6) months, or both such fine and imprisonment.> The proposed bill seeks to prevent the undesirable practice of hospitals and medical clinices of preventing the release of fully recovered and/or dead patients for non-paymen, either partially or fully, of hospital bills."
