congress_website_title = "AN ACT AMENDING EXECUTIVE ORDER NO. 209 AS AMENDED BY EXECUTIVE ORDER NO. 227, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES, THEREBY LIMITING MARRIAGE TO NATURAL BORN MALES AND NATURAL BORN FEMALES"
congress_website_abstract = "Rationale: Due to recent developments in the field of medicine, science and technology, it is now possible to alter or altogether change a person's sexual organ to make it appear as that of the opposite sex. A man can now change his penis into a vagina, and for a woman, vise versa. With this, we have directly challenged the laws of God, the laws of nature and even the laws of man. Recently, a celebrated case involving a marriage between a man who had a sex change operation with another man broke grounds in Philippine law. This bill seeks to amend the Family Code to prohibit such marriages."

