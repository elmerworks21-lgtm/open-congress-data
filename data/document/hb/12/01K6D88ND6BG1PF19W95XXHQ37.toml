congress_website_title = "AN ACT ESTABLISHING AN OPTIONAL RESERVED OFFICERS' TRAINING CORPS (ROTC) PROGRAM FOR ALL EDUCATIONAL INSTITUTIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "In preparing selected students for commissioned service in any regular branch of the Armed Forces of the Philippines (AFP) pursuant to law, all existing Reserved Officers' Training Corps (ROTC) programs, organized into one or more units at any educational institution authorized to grant baccalaureate degrees, shall be optional for all college students. ROTC units in colleges and universities shall continue with ROTC training in accordance with this Act."
