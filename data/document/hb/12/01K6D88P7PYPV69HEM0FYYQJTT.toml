congress_website_title = "AN ACT RATIONALIZING THE COMPENSATION BENEFITS AND OTHER PRIVILEGES AND INCENTIVES FOR THE MEMBERS OF THE NATIONAL PROSECUTION SERVICE AND THE OFFICE OF THE CHIEF STATE COUNSEL IN THE DEPARTMENT OF JUSTICE, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill aims to raise the level of competence and ensure the integrity of the prosecutors and state counselors and to improve the compensation scheme for members of the National Prosecution Service (NPS) and the Office of the Chief State Counsel (OCSC) in the Department of Justice. The increase in salaries and the granting of additional incentives and privileges to the members of the NPS and the OCSC will place them at par with those in other government agencies and in the private sector. Ifpassed into law, it will attract the best and the brightest lawyers to join and make a career in the NPS and the OCSC. It will deter the prosecutors and state counselors from being entangled in the web of corruption."
