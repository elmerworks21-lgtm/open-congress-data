congress_website_title = "AN ACT PROVIDING FOR THE TOTAL ELECTRIFICATION OF ALL OFF-GRID BARANGAYS IN THE COUNTRY, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"Off-Grid Barangay Electrification Act of 2003\\\". The electrification of all barangays using new and renewable energy systems is envisioned to spur socio-economic growth in the countryside thus enhancing the quality of life in these areas. While the electrification program has been in the government's thrust for over 30 years now, its completion remains unrealized due to financial and geographical constraints. This bill seeks to appropriate one hundred million pesos (PhP100,000,000.00) to fund the electrification program of an estimated 1,978 off-grid barangays nationwide. This represents 35.5% of the total unenergized barangays in the country."
