congress_website_title = "mN ACT ADDRESSING THE SYSTEM OF PROSTITUTION, IMPOSING PENALTIES ON ITS PERPETRATORS, PROVIDING PROTECTIVE MEASURES AND SUPPORT SERVICES FOR ITS VICTIMS, AMENDING FOR THE PURPOSE THE REVISED PENAL CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Prostitution must be approached in its entirety, interrogating both the structural mechanism and the ideological justifications which uphold it. In addressing prostitution, the Government must address the contradictions in policies which, in effect,reinforce the system of prostitution. The adult-child divide must be removed and women and children in prostitution must be decriminalized alike. The goal of minimizing if not totally eradicting prostitution, must be directed against establishmentsand male customers who control and profit from the business of prostitution. Policies and programs must be developed that will address the problems of women in prostitution, provide them protection, penalize those who control, perpetuate, and benefitt from the business of prostitution, address the factors in general that perpetuate prostitution, and serve to eradicate prostitution in the long term."

