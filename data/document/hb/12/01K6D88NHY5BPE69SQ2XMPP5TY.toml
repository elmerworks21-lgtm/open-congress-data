congress_website_title = "AN ACT PROVIDING FOR ADEQUATE AND EFFECTIVE REFORM OF TRAVEL AND EQUITABLE DISTRIBUTION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Allocation of the Proceeds of Travel Taxes. The present tirty-six percent (36%) allocation of the Philippine Tourism Authority (PTA) from the revenue derived from the travel tax is hereby increased gradually to seventy percent (70%) within a periodof ten (10) years from the effectivity of this Act."
