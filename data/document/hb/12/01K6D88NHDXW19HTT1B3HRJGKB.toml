congress_website_title = "AN ACT PROHIBITING THE USE OF PLASTIC BAGS, STYROFOAM, ALUMINUM FOILS AND NON-BIODEGRADAB LE MATERIALS, PRESCRIBING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Any provision of existing law to the contrary notwithstanding , the use of plastic bags, styrofoam, aluminum foils and non-biodegradab le materials as packaging materials of goods sold by sari-sari stores, groceries, market vendors, sidewalk vendors, hawkers, department stores and similar establishments is hereby prohibited."

