congress_website_title = "AN ACT DECLARING THE RIGHTS OF PATIENTS AND PRESCRIBING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "\"Magna Carta of Patient's Rights.\" Rationale: In the Philippines, there is yet a law to be created to protect, promote and depend the rights of patients. We hear horrifying stories of patients who died or are further injured in hospitals as a result of negligence and incompetence of their supposed healers. The Professional Regulatory Commission confirmed increasing complaints of medical malpractice numbering more than a hundred as of 1993. The cases include lack of skills, foresight and diligence, misdiagnosis, wrong medication, wrong blood transfusion, adverse effects of anaesthesia and medicine prescribed and administered by health care providers. It is imperative that health authorities, hospital owners and health care providers mustt recognize and promote patients rights."

