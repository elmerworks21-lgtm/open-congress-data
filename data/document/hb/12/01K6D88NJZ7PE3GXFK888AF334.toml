congress_website_title = "AN ACT PROVIDING FOR THE CONTINUOUS OPERATION OF HIGH SCHOOLS WHICH HAVE BEEN UPGRADED OR CONVERTED INTO COLLEGES"
congress_website_abstract = "Without prejudice to existing laws, all high schools which have been upgraded or converted into a college shall continue to operate and be absorbed in the college, particularly in the localities where there is no other existing secondary school until such time that a new secondary school shall have been established: Provided, That the positions, rights and security of tenure of the personnel employed therein under existing laws prior to absorption shall not be impaired."

