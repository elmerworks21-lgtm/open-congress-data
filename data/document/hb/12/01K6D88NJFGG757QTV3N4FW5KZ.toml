congress_website_title = "AN ACT ESTABLISHING A NATIONAL CRIME DATABASE"
congress_website_abstract = "Rationale: In support of the government's efforts to address crime-related activities, there is a strong need to adopt a measure that will maintain an accurate national criminal record database. With the establishment of the database, police investigations can be fast-tracked, which means better quality services for the public. > Our nation depends on police officers to efficiently implement laws that seek to establish and maintain peace and order. The identification of criminal elements is a step forward in resolving hard to unravel cases."

