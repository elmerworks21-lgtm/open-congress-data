congress_website_title = "AN ACT PROHIBITING THE DETAIL OR ASSIGNMENT OF MILITARY PERSONNEL IN CIVILIAN OFFICES AND PUBLIC UTILITIES AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "No military personnel shall be assigned or detailed to take over the functions of any civilian post in any civilian office or agency of the government as well as in public utilities and in government-owne d and-controlled corporations except in times of war or other national emergency. Service of military personnel in civilian offices or agencies of the government and in government-owne d or-controlled corporations and/or their subsidiaries, as well as in public utilities are hereby terminated."

