congress_website_title = "AN ACT ESTABLISHING A MANDATORY QUARANTINE PROGRAM FOR THE PREVENTION AND SPREAD OF THE SEVERE ACUTE RESPIRATORY SYNDROME (SARS) AND OTHER HIGHLY-CONTAGIO US DISEASES AND FOR OTHER PURPOSES"
congress_website_abstract = "The \"opening of borders\" and the availability of global air , land and sea travel have made nations hostage to all kinds of viruses, bacteria and diseases. Our emphasis on international tourism and the balikbayan porogram has made it prudent to establish policies and programs that will protect us from such kinds of deadly diseases. This bill seeks to prevent the introduction and/or spread of the Severe Acute Respiratory Syndrome (SARS) and other diseases . It inroduces certain safeguards to prevent the spread of SARS and other diseases, such as mandatory quarantine and other programs. It provides penalties in cases of violation of the safeguard measures."
