congress_website_title = "AN ACT DISQUALIFYING PERSONS CHARGED WITH AND DETAINED FOR OR CONVICTED OF NON-BAILABLE OFFENSES FROM FILING A CERTIFICATE OF CANDIDACY FOR OR HOLDING ANY LOCAL OR NATIONAL ELECTIVE POSITION"
congress_website_abstract = "This measure seeks to amend Section 12 of Batas Pambansa Bilang 881, otherwise known as the Omnibus Elections Code, to include, among other disqualificatio ns, persons who have been charged of and detained or convicted of non-bailable offenses likemurder, rape and other heinous crimes which carry the penalty of reclusion temporal or higher. More specifically, the bill proposes that such persons shall not be alllowed to file a certificate of candidacy and to hold any local or national electiveoffice."

