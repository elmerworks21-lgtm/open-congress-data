congress_website_title = "AN ACT INSTITUTING PHILIPPINE OPEN UNIVERSITY IN ALL STATE COLLEGES AND UNIVERSITIES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "It is hereby a declared policy of the State to further democratize higher educational opportunities for our people especially the less privileged in which they shall be able to study independently by relying on various educational media and where said students shall not be required to attend regular classes in conventional classrooms. Thus, those employed in offices, factories, as well as other places of work, to earn a higher degree of learning."

