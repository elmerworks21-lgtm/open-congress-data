congress_website_title = "AN ACT CONSOLIDATING THE MAPPING FUNCTION AND BUDGET UNDER THE OFFICE OF THE NATIONAL MAPPING AND RESOURCE INFORMATION AUTHORITY (NAMRIA)"
congress_website_abstract = "This bill seeks to consolidate the mapping budget of various departments of the government and centralizing such function under the office of the National Mapping and Resources Information Authority (NAMRIA). It has been observed, however, that there are other government agencies which still do their own mapping service resulting to duplication of efforts and costs. In consonance with Executive Order No. 192, it is proposed that mapping work and the budget therefor be centralized for a more efficient and effective geographic information service, considering that NAMRIA is well equipped to do the job."
