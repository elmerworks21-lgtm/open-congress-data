congress_website_title = "AN ACT PROVIDING FOR THE PROMOTION OF BIO-ORGANIC FARMING IN THE PHILIPPINES"
congress_website_abstract = "This bill seeks to check the ill effects of chemical farming through the promotion of \"bio-organic farming\", an agricultural production system that relies on biological means of conditioning and enriching the soil under the supervision of Bio-organic Farming Commission. This Commission is envisioned to propagate bio-organic cultivation and production methods among the farmers and encourage research and development in this field of agricultural production. Corollary, it is intended to aid in solving problems related to industrial waste and community garbage disposal."
