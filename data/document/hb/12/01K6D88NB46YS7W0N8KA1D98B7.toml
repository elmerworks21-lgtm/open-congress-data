congress_website_title = "AN ACT RATIONALIZING THE TAX SCHEME FOR MANUFACTURERS, PRODUCERS OF GOODS, ASSEMBLERS AND PROVIDERS OF SERVICES"
congress_website_abstract = "This measure is designed to rationalizE the tax burdens imposed by different tax laws which affect Philippine businesses. It sets a maximum ceiling of 50% of Gross Sales as the maximum amount tax a business has to pay the National Government every fiscal year. It provides a disciplinary mechanism on taxation by which the competitiveness of local enterprises is preserved and at the same time allowing for reasonable revenue collection.> It provides a starting point for the bonafide rationalization of the whole taxation system towards the end of a strong, vibrant, and competitive economy."

