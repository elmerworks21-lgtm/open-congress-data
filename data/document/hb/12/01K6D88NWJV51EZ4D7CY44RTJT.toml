congress_website_title = "AN ACT GRANTING A PERIOD ENDING DECEMBER 31, 2010 OF FILING APPLICATIONS FOR ADMINISTRATIVE LEGALIZATION (FREE PATENT) AND JUDICIAL CONFIRMATION OF IMPERFECT AND INCOMPLETE TITLES TO ALIENABLE AND DISPOSABLE LANDS OF THE PUBLIC DOMAIN UNDER CHAPTERVII AND CHAPTER VIII OF COMMONWEALTH ACT NO. 141, AS AMENDED, COMMENCING JANUARY 1, 2001"
congress_website_abstract = "Rationale: Free patent is the most affordable means by which a legitimate claimant can acquire a title over the land he is lawfully occupying. This is different from the other mode of titling which is through judicial proceedings where the private individual has to undergo the rigors of court proceedings and has to contend with the litigation expenses that usually accompany this mode of land titling.> Statistics shows that there are still 65 municipalities that have not been cadastrally surveyed while 368 are on-going and have not been completed. It will be disservice to our citizen if they will not be given the opportunity to file free patent application just because the period has not been extended."
