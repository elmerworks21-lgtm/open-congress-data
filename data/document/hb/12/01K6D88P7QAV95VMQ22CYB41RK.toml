congress_website_title = "AN ACT REQUIRING THE CONCURRENCE OF THE LOCAL SCHOOL BOARD ON THE ASSIGNMENT OF DIVISION SUPERINTENDENTS , DISTRICT SUPERVISORS, SCHOOL PRINCIPALS AND OTHER SCHOOL OFFICIALS, AMENDING FOR THE PURPOSE SECTION 99 (d) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Section 99 of the Local Government Code mandates the Department of Education to consult the local school board on the assignment of division superintendents , district supervisors, school principals and other school officials to a particular government unit. The term \"shall consult\" has triggered a legal controversy between local officials and a Department of Education appointee. House Bill 5862 seeks to give a crystal clear meaning to this ambiguous provision by requiring the concurrence of the local school board on the appointment of the aforementioned officials."
