congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A DRUG REHABILITATION CENTER IN EVERY LEGISLATIVE DISTRICT OF THE COUNTRY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The bill proposes to establish a drug rehabilitation center in every legislative district of the country. This would give every drug dependent access to medical facilities for his treatment and rehabilitation including after-care and social integration process. In line with the obligation of the State to look after the welfare of its people, the government should see to it that users/abusers of dangerous drugs are given an opportunity to rejoin the mainstream of society."
