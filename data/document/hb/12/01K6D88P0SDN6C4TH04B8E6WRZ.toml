congress_website_title = "AN ACT TO STRENGTHEN THE SCIENCE AND TECHNOLOGY POPULARIZATION PROGRAM THROUGH THE ESTABLISHMENT OF SCIENCE CENTERS THROUGHOUT THE PHILIPPINES AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "\"Science Centers Act of 2002\". This bill intends to strengthen the science and technology popularization program by enhancing the development of regional and provincial science centers. These will serve as the local centers for community science andtechnology education, information and communication among the youth and general population. It shall have the major compoments: (1) Youth Development; (2) Science Communication Outreach; (3) Continuing Research and Development Program (R&D); (4) Interactive Exhibits Development Program; (5) Science and Tecnology for the Masses; (6) Support for the Existing and Establishemt of New Science Centers; (7) External-intern al Linkage and Networking Program; and (8) Manpower Capability Building Program"
