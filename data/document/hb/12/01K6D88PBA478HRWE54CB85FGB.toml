congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF PRESIDENTIAL DECREE NUMBERED SIXTEEN HUNDRED AND NINETY FOUR (P.D. 1694), AS AMENDED, CREATING THE WELFARE FUND FOR OVERSEAS WORKERS"
congress_website_abstract = "The Overseas Workers Welfare Administration (OWWA) Fund was created to provide social and welfare services to overseas Filipino workers (OFW), including insurance coverage, legal assistance, placement assistance and remittance services. It consists primarily of contributions from OFWs and the fees and charges imposed by the Philippine Overseas Employment Authority on said workers. Unfortunately, information has filtered out that certain OWWA transactions have been unfavorable for OFWs. This bill seeks to grant OFWs greater participation in the administration and management of funds through their representation in the Board of Trustees. It also requires prior approval of the OFWs for all transactions and disbursements involving the OWWA Fund."
