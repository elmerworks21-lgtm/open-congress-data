congress_website_title = "AN ACT PROVIDING FOR A LIVING WAGE TO EMPLOYEES AND WORKERS IN THE PUBLIC AND PRIVATE SECTORS, ESTABLISHING THE MECHANISM AND PROPER STANDARDS THEREFOR, REPEALING REPUBLIC ACT NUMBERED 6727, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Living Wage Act of 2001.\" Among the salient features of this bill are: (1) Full-time employees and workers in the public and private agricultural and nonagricultural sectors shall receive a living wage equivalent to the cost of living for a familyof six (6); (2) Congress shall set the minimum standards for \"basket of goods\" in determining the cost of living equivalent of the living wage; (3) Congress shall initially determine the living wage rates which shall thereafter be set by the LivingWage Commission proposed to be created under the bill, etc."
