congress_website_title = "AN ACT REORGANIZING THE NATIONAL POLICE COMMISSION, STRENGTHENING ITS POWERS AND FUNCTIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"National Police Commission Act of 2003.\" As proposed in this Act, NAPOLCOM shall be placed under the Office of the President, composed of a Chairperson with a rank equivalent to a Cabinet Secretary and four regular commissioners, each with a rank equivalent to an Undersecretary. > NAPOLCOM shall take charge of police operations involving public safety, administer affairs concerning police education, police communication, criminal identification, criminal statistics and police equipment, and coordinate matters realted to police administration."

