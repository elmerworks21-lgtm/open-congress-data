congress_website_title = "AN ACT AMENDING SECTION 66 OF BATAS PAMBANSA BILANG 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "This bill mandates any government official holding the position of Department Secretary down to the Director level or their equivalent in the Armed Forces of the Philippines, the Philippine National Police and the Government Owned and Controled Corporations, who intends to run for an elective position, to resign from his office two (2) years prior to the filing of his certificate of candidacy. > Failure to resign from his office within the period shall ake him ineligible to run for public office."
