congress_website_title = "AN ACT PROMULGATING THE PHILIPPINE NATIONAL STANDARDS FOR DRINKING WATER, PROVIDING PENALTIES FOR VIOLATIONS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "To ensure safety, this bill mandates that water supplied to the public must meet the requirements established by the Philippine National Standards for Drinking Water. The Secretary of Health shall have the primary authority to enforce the PNSDW. The bill aims to compel water suppliers to comply with the national standards by providing a reasonable period for compliance and by meeting out penalties of P3,000-P10,000 for the first offense, and P10,000-P20,000 or revocation of license for subsequent offenses."

