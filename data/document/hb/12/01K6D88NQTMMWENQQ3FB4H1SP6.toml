congress_website_title = "AN ACT MANDATING LOCAL GOVERNMENT UNITS TO APPROPRIATE IN THEIR ANNUAL BUDGETS AT LEAST TEN PERCENT (10%) OF THEIR ANNUAL INTERNAL REVENUE ALLOTMENTS FOR LOCAL HEALTH PROGRAMS AND SERVICES AND FOR OTHER PURPOSES"
congress_website_abstract = "Section 287 of Republic Act No. 7160, as amended, is hereby further amended to read as follows: >\"Sec. 287. Local HEALTH AND Development Projects. - Each local government unit shall appropriate in its annual budget no less than twenty percent (20%)AND TEN PERCENT (10%) of its annual internal revenue allotment for development projects AND HEALTH PROGRAMS AND SERVICES, RESPECTIVELY. Copies of the development plans AND HEALTH PROGRAMS AND SERVICES of local government units shall be furnished theDepartment of THE Interior and Local Government AND DEPARTMENT OF HEALTH, RESPECTIVELY.\""
