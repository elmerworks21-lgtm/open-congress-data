congress_website_title = "MAGNA CARTA FOR CUSTOMS BROKER PROFESSION"
congress_website_abstract = "Rationale: It is the national policy to give priority to attention to the pursuit of the Customs Broker profession, which will be beneficial to the country in general, and to the economy in particular. > The Government shall provide a program to setup a climate conducie to the practice of the profession, give encouragement and support to students who may want to pursue a career in customs brokerage or customs brokers or customs administration, and maximize the capability and potential of our Filipino customs brokers and the entire customs brokerage business through incentives and other forms of assistance and support."
