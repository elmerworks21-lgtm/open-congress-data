congress_website_title = "AN ACT FURTHER STRENGTHENING CONSUMER RIGHTS IN THE PHILIPPINES, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SEVENTY-THREE HUNDRED AND NINETY-FOUR OTHERWISE KNOWN AS THE `CONSUMER ACT OF THE PHILIPPINES'"
congress_website_abstract = "Rationale: It is the policy of the State to protect the interest of the consumer, promote his general welfare and establish standards of conduct for business and industry. This policy gave birth to the enactment of Republic Act No. 7394, otherwiseknown as the \"Consumer Act of the Philippines\". The enactment of the law demonstrates the government's commitment to protect the consumer against hazards to health and safety, deceptive, unfair and unconscionable sales acts and practices. The law also provides for the promotion of the right of consumers to information and education, product safety, and access to product that they need. Focusing at the same time on the involvement of consumers representatives in the formulation of social and econnomic policies. >Nine years after the passage of the Consumer Act however, the consumer rights advocate are discovering the flaws of the law. The developments in technology and globalization of the market due to the liberalization of retail trade an"

