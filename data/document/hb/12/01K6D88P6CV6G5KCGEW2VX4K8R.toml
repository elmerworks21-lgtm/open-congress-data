congress_website_title = "AN ACT ALLOWING AN INTERNATIONAL CARGO VESSEL TO SHIFT CONTAINERS OF ANY FOREIGN LINES AND THE TRANSSHIPMENT OF CARGO HEADED TO AND FROM ANY PHILIPPIN OUTPORT, AMENDING FOR THE PURPOSE \"THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES\""
congress_website_abstract = "\"Philippine Export and Import Freight Shipping Assistance Act of 2003.\" The Tariff and Customs Code of the Philippines, as amended, is further amended by LIMITING THE RIGHT TO ENGAGE IN THE PHILIPPINE COASTWIDE TRADE TO VESSELS CARRYING A CERTIFICATE OF PHILIPPINE REGISTRY. It also states that coastwide trade shall not embrage or cover the goods, articles, commodities or merchandise classified or designated as foreign cargoes. > Section 1009 of the same Code is also amended by providing clearance to foreign trade to unload foreign cargoes to and from principal ports of entry/sub-ports in the country through the following instances: (1) allowing an international cargo vessel to shift empty containers of any foreign lines if said vessel reguularly calls at Manila and proceeds to Philippine out ports; and (2) allowing transshipment by any international vessel of cargo coming from or headed for a foreign port and from any Philippines out port."

