congress_website_title = "AN ACT DEFINING THE CRIME OF BETRAYAL OF DUTY IN THE CUSTODY OF PRISONERS, PROVIDING FOR ADDITIONAL RULES ON THE IMPRISONMENT, DETENTION, CONFINEMENT AND CUSTODY OF PRISONERS AND DETAINEES, SPECIFYING ADDITIONAL WORK AND RESPONSIBILITIES OF GOVERNMENT PERSONNEL CHARGED WITH THE CUSTODY OF SUCH PRISONERS AND STATING THE PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "In many instances, a government official or employee commits the crime of betrayal of duty in the custody of prisoner because the penalty for such act is light and the inducement of a bribe is too great. A guard who frees an inmate not only participates post litem to the commission of the crime of the offender but also turns traitor to the government and to the laws he has sworn to protect. The bill seeks to define the crime of betrayal of duty in the custody of prisoners and provide stiffer penalties on the official or employee who has charge of the prisoner."

