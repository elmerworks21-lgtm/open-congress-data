congress_website_title = "AN ACT STRENGTHENING THE SECURITY OF TENURE OF THE GOVERNMENT EMPLOYEES, PARTICULARLY THOSE WHO ARE WORKING IN THE LOCAL GOVERNMENT UNITS, THEREBY AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6656"
congress_website_abstract = "\\\"Civil Service Security of Tenure Act of 2003\\\". The proposed measure aims to institutionalize the whole government bureaucracy without any fear of political vindication and removal. It will strengthen the security of tenure of employees in the government service particularly those who are in the local government units. It also seeks to impose penalties on thoese who attempt to corrupt the government service in the guise of reorganization."
