congress_website_title = "AN ACT TO RATIONALIZE THE ADMINISTRATION AND ENFORCEMENT OF ALL LAWS ON OCCUPATIONAL SAFETY AND HEALTH STANDARDS AND ENVIRONMENTAL PROTECTION AND OTHER PURPOSES"
congress_website_abstract = "Rationale: Studies show that there are a number of government agencies, both national and local, that are involved in the administration and enforcement of occupational safety and health and environmental protection laws. It appears that these agencies are authorized by existing laws to participate in the implementation of these concerns.> Studies moreover show that there is no single lead agency that coordinates and oversees the implementation of the national program on occupational safety andhealth and the environmental protection thereby resulting in the fragmented administration of said programs."
