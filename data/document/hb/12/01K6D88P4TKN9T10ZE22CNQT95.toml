congress_website_title = "AN ACT PROVIDING FOR STIFF PENALTIES TO THE CRIME OF INFIDELITY OF PUBLIC OFFICERS IN THE CUSTODY OF PRISONERS, AMENDING FOR THE PURPOSE ARTICLE 223 AND 224 OF THE REVISED PENAL CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Any public officer who shall consent to the escape of a prisoner in his custody or charge, shall be punished: (1) By THE UNSERVED TERM OF THE PRISONER WHO ESCAPE, if the fugitive shall have been sentenced by final judgment to any penalty; (2) By PRISION MAYOR in its minimum period, in case the fugitive shall not have been to finally convicted but only held as a detention prisoner for any crime or violation of law."
