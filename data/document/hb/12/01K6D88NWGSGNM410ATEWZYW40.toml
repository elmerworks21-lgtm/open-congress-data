congress_website_title = "AN ACT TO ESTABLISH THE CENTER FOR MARITIME AND OCEAN AFFAIRS (MOAC), APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The proposed MARITIME AND OCEAN AFFAIRS CENTER shall, among others: (1) Promote the development of national capabilities and institutions, including human resources, for maritime and ocean affairs; (2) Initiate steps to harmonize and/or update domestic legislation and rules and regulations with international agreements or non-binding instruments to which the Philippines is a party; (3) Create and maintain a central database on maritime and ocean affairs; and (4) Embark on activities necessary to raise the natinal archipelagic consciousness, and communicate and publicize in a coordinated manner, national maritime and ocean interests and issues."

