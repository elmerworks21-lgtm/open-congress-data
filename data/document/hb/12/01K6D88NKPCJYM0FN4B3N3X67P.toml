congress_website_title = "AN ACT DEFINING THE ARCHIPELAGIC BASELINES OF THE PHILIPPINE ARCHIPELAGO TO INCLUDE THE KALAYAAN ISLAND GROUP AND TO CONFORM WITH THE PROVISIONS OF THE UNITED NATIONS CONVENTION ON THE LAW OF THE SEA, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 3046,AS AMENDED BY REPUBLIC ACT NO. 5446"
congress_website_abstract = "The proposed bill seeks to amend R.A. No. 3046 as amended by R.A. No. 5446 by drawing straight baselines on the outermost points of the outermost islands of the Kalayaan Island Group (KIG) and joining them with the baselines defined under R.A. No.3046, as amended, with some amendments to conform with the criteria set under Article 47 of the Convention on the Law of the Sea. The establishment of new baseline laws of the Philippines is necessary as it shall serve as basis from which to draw the12 mile territorial sea, the 24 mile contiguous zone and the 200 mile Exclusive Economic Zone (EEZ) as provided under the UNCLOS (United National Convention on the Law of the Sea)."
