congress_website_title = "AN ACT INCLUDING THE INSERTION OF OTHER PARTS OF THE BODY INTO THE GENITAL OR ANAL ORIFICE OF ANOTHER AS ADDITIONAL FORM OF SEXUAL ASSAULT, AMENDING FOR THE PURPOSE THE ANTI-RAPE LAW OF 1997"
congress_website_abstract = "This bill states that RAPE is committed by any other person who, under any of the circumstances mentioned in paragraph 1 hereof shall commit an act of sexual assault by inserting his penis into another person's mouth or anal orifice or any instrument or object OR OTHER PARTS OF THE BODY into the genital or anal orifice of another EXCEPT WHEN THE PERSON IS PERFORMING MEDICAL, CLINICAL OR SCIENTIFIC DUTY OR OTHER PROFESSIONAL OBLIGATION AND WITH THE CONSENT OF THE VICTIM."
