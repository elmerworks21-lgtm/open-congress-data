congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8042, ENTITLED `AN ACT TO INSTITUTE THE POLICIES OF OVERSEAS EMPLOYMENT AND ESTABLISH A HIGHER STANDARD OF PROTECTION AND PROMOTION OF THE WELFARE OF MIGRANT WORKERS, THEIR FAMILIES AND OVERSEAS FILIPINOS IN DISTRESS, AND FOR OTHER PURPOSES"
congress_website_abstract = "This proposed measure seeks to: (1) Strengthen the protection of the rights and welfare of migrant workers provided in R.A. 8042; (2) Proposes that since it is the duty of the government to provide full employment for its labor force, it should render free its services to Filipinos who are working abroad and to continue its regulatory functions to curbe illegal acts committed against them; and (3) Address the situations of women, children and seafarers - sectors which were not given particularattention in R.A. 8042."
