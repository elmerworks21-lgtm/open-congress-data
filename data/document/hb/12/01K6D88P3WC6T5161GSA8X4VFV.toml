congress_website_title = "AN ACT INCREASING THE PENALTIES FOR THE OFFENSE OF BRIBERY, AMENDING FOR THE PURPOSE ARTICLES 210, 211 AND 212 OF THE REVISED PENAL CODE, AS AMENDED"
congress_website_abstract = "Rationale: Bribery is the most pervasive form of graft and corruption praticed by public officers in the course of official duties. As defined, it is the act of offering, giving, receiving, or soliciting of any thing of value to influence action asan official or in discharge of legal or public duty. > This bill seeks to amend Articles 210, 211 and 212 of the Revised Penal Code, as amended, by increasing the imposable penalties for the crime of bribery."
