congress_website_title = "AN ACT TO STRENGTHEN THE PROVISIONS OF THE NATIONAL SERVICE LAW THEREBY ALLOWING EACH CITIZEN TO SELECT THE TYPE OF MANDATORY SERVICE, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Each citizen who is enrolled in any post-high school education, whether degree or non-degree, shall render national service training as a pre-requisite to his graduation or completion from such degree or non-degree course or curriculum. In order topromote the effective use of the citizen force, the citizen undergoing shall be afforded the chance to select the type of national service training he is to undertake, regardless of where he is enrolled."
