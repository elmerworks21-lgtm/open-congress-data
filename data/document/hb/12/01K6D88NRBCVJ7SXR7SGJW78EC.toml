congress_website_title = "MAGNA CARTA OF THE PHILIPPINE NATIONAL POLICE"
congress_website_abstract = "This bill clearly defines the basic rights and privileges as well as the salaries and benefits that should rightfully accrue to the general membership of the PNP. Provisions for programs on continuous education and training are also included all geared towards the development of a professional PNP. >Some of the significant provisions of the bill include the following: streamlining and downsizing of the PNP organization, establishment and maintenance of a continuous PNP Development Programs, redefinition and clarification of the duties and responsibilitie s of police officers and the grant of basic rights to the PNP personnel."

