congress_website_title = "AN ACT RATIONALIZING THE COMPENSATION OF JUSTIICE, JUDGE, LAWYER POSITIONS, AND ALL OTHER EMPLOYEES OF THE JUDICIARY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "To enable the judicial branch of the government to recruit and retain the best and the brightest personnel, the bill proposes to grant all justices, judges, lawyers and other employees of the judiciary additional compensation in the form of a special allowance. The special allowance shall be initially equivalent to twenty-five (25%) of the basic salaries of the said covered positions to be raised until it is equivalent to one hundred percent (100%) of their salaries over a period of time to bedetermined by the Department of Budget and Management, the Supreme Court of the Philippines and the Civil Service Commission."

