congress_website_title = "AN ACT AMENDING SECTION 450 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill imparts greater significance to the said State policy by exempting capital towns of provinces from the income requirements in the event that said towns apply for conversion into component cities, thereby amending Section 450 of R.A. No. 7160. However, said towns shall continue to comply with the requisites on land area, which should be a contiguous territory of at least 100 sqyare kilometers, subject to the exemption provided in paragraph (b) of Section 450; and population, which should be not less than 150,000 inhabitants, as prescribed in the same section of R.A. 7160."
