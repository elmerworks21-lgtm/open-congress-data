congress_website_title = "AN ACT AMENDING SECTION 10 OF REPUBLIC ACT NO. 6728, OTHERWISE KNOWN AS GOVERNMENT ASSISTANCE TO STUDENTS AND TEACHERS IN PRIVATE EDUCATION (GASTPE)"
congress_website_abstract = "This bill intends to provide a mechanism whereby different sector of our educational system can equally exercise their rights to express their positions in any proposed increase in the rate of tuition and/or other school fees. Furtheremore, apart from financial statements, the school administration is required to submit expansion and wage increase plans for faculty and non-faculty members. among others. With these, it is hoped that the informed participation of all the affected sectors can besolicited and considered before a major decision such as a tuition fees increase can be made."
