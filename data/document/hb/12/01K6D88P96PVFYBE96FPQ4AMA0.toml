congress_website_title = "AN ACT REGULATING THE LEASING OF PARKING LOTS TO CONSUMERS WITHIN AND AROUND THE PREMISES OF ENTERPRISES ENGAGED IN WHOLESALE AND/OR RETAIL TRADE, PROVIDING PENALTIES THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Free Parking Law of 2003\\\". In many cases, large shopping complexes do not provide free parking facilities for their customers thereby inconveniencing them and burdening them with additional expense. Oftentimes, these shopping malls are also engaged in the business of leasing parking spaces. The bill aims to regulate the leasing of parking spaces to customers within and around the premises of commercial enterprises engaged in wholesale and/or retail business by mandating the provision of free parking facilities for customers for a specified period of time. This is in line with the policy of the State to protect the interest of the public by providing a safe, secure and conducive shopping environment."

