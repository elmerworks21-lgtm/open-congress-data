congress_website_title = "AN ACT PROVIDING FOR A MANDATORY PERIOD TO RELOCATE SQUATTERS, GRANTING DISTURBANCE FEE AND TAX EXEMPTION TO OWNER OF ILLEGALLY OCCUPIED RESIDENTIAL LAND, AND PENALIZING VIOLATION THEREFOR"
congress_website_abstract = "\"Landowners Protection Act of 1999.\" This bill seeks to provide a mandatory period in the relocation of squatters and to grant tax exemption to illegally occupied residential lands. It also seeks to compensate the landowners in case of failure of the local government unit concerned to act on the request for assistance to evict illegal occupants within the prescribed period."
