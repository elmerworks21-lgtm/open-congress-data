congress_website_title = "AN ACT REQUIRING PRIVATE INDUSTRIAL ENTERPRISES TO ISSUE REGULAR APPOINTMENTS TO PHYSICIANS EMPLOYED THEREIN AND PROVIDING PENALTIES THEREOF"
congress_website_abstract = "Within sixty (60) days from the approval of this Act, employers of private industrial enterprises or firms are required to issue regular appointments to physician employed therein. Upon their appointment, the physicians shall thereafter be considered as regular employees in accordance with existing laws."
