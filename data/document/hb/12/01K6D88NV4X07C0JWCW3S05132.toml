congress_website_title = "AN ACT STRENGTHENING THE INTERNAL AFFAIRS SERVICE FOR THE PHILIPPINE NATIONAL POLICE, AMENDING FOR THE PURPOSE TITLE V OF REPUBLIC ACT NUMBERED EIGHTY-FIVE HUNDRED AND FIFTY-ONE ENTITLED, `AN ACT PROVIDING FOR THE REFORM AND REORGANIZATION OF THE PHILIPPINE NATIONAL POLICE, AS AMENDED' APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The passage of Republic Act 8551 (PNP Reform and Reorganization Act of 1998) creating the Internal Affairs Service of the PNP has been viewed positively as the much needed catalyst in the PNP reforms, particularly in the aspect of discipline. However, unfolding events have manifested the inadequacy of the law for the Internal Affairs Service to enable it to fully perform its mandated functions as the watchdog agency of the PNP. > Under this bill, the function of the IAS TO SERVE AS AN INDEPENDENT, IMPARTIAL AND OBJECTIVE INSTITUTIONAL WATCHDOG AGENCY FOR THE PHILIPPINE NATIONAL POLICE is underscored. The bill, likewise, contains provisions AMENDING certain provisions of RA No. 8551, such as on: 1. Qualification requirements forthe IAS Head; 2. Appointments; Promotions; 3. Disciplinary decisions; and 4. Appeals."

