congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE COMMISSION ON ECONOMIC DIPLOMACY IN ORDER TO STRENGTHEN ECONOMIC DIPLOMACY AS A STRATEGY IN PHILIPPINE FOREIGN POLICY, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "With this proposal, the PHILIPPINE COMMISSION ON ECONOMIC DIPLOMACY (PCED) is established with the primary responsibility of developing and formulating policies and strategies on economic diplomacy and implementing them in order to generate foreignexchange and employment, project a good image of the country, and enhance the marketability of its products with support, assistance and cooperation of the local public and private sector, foreign governments and institutions and international traders."
