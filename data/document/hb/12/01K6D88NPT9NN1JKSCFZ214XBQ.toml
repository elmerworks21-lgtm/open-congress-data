congress_website_title = "AN ACT DEFINING DOMESTIC VIOLENCE, PROVIDING PROTECTION MEASURE AND PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: There is NO existing law which penalizes as a SEPARATE and DISTINCT CRIME repeated physical violence or grossly abusive conduct in the home.> This bill defines and penalizes acts which constitute \"domestic violence\" and provides for immediate relief to victims thereof through the issuance of \"protection orders\". The procedure for the issuance of such protection orders is also provided."
