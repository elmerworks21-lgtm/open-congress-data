congress_website_title = "AN ACT ALLOCATING THE COLLECTIONS FROM THE TRAVEL TAX TO THE PHILIPPINE TOURISM AUTHORITY, AND FOR OTHER PURPOSES"
congress_website_abstract = "The Travel Tax was originally envisioned and promulgated for the purpose of promoting travel and tourism, development of tourist attractions and to provide financial assistance to private tourism enterprises. However, due to the enormous laws passedwhich provided for the allocation of funds mainly from Travel Tax collections, the source of funding of the Philippine Tourism Authority was greatly diminished, thus, resulting to the delayed delivery of basic support services to the tourism industry. Moreover, tourism marketing and promotional activities were very much hampered due to the lack of funding from the Philippine Tourism Authority. This bill is a curative legislation. It seeks to remedy a malady brought about by the dearth of fundsin the coffers of the government."
