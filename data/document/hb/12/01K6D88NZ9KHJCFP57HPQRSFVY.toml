congress_website_title = "AN ACT DECLARING A TEMPORARY MORATORIUM, THE EFFECTIVITY OF WHICH SHALL BE HEREIN PRESCRIBED, ON THE APPREHENSION, SEIZURE AND CONFISCATION OF PIRATED COMPACT DISCS, VIDEO COMPACT DISCS, AND CASSETTE AND VIDEO CASSETTE TAPES IN THE COUNTRY FOR THE PURPOSE OF ASSURING EQUITABLE ACCESS TO ENTERTAINMENT, PARTICULARLY OF THE POOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Emergency Equitable Access to Entertainment Act of 2002\". A temporary moratorium is hereby declared on the apprehension, seizure and confiscation of pirated compact discs, video compact discs, and cassete and video cassete tapes in the Philippines.> The DEPARTMENT OF TRADE AND INDUSTRY (DTI) is hereby mandated to immediately undertake a comprehensive, industry-wide assessment of the pricing mechanism prevailing over the entertainment industry, in respect to production, distribution and marketing of compact discs, video compact discs and cassette and video cassette tapes in the country. It shall submit the results of such assessment to Congress, within the first year of the implementation of this Act, so that appropriate legislation can bee introduced to rationalize prices in the entertainment industry."
