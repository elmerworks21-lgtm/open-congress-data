congress_website_title = "AN ACT INSTITUTING POLICIES ON THE PREVENTION OF TRAFFICKING IN WOMEN AND MINORS, ESTABLISHING THE NECESSARY INSTITUTIONAL MECHANISMS FOR THE PROTECTION AND SUPPORT OF VICTIMS OF TRAFFICKING, AND PROVIDING PENALTIES FOR VIOLATION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Anti-Traffickin g - Filipino Women and Minors Act of 2001\". This bill provides a comprehensive approach in the prevention of trafficking of women and minors. (1) It defines the national policy regarding various acts of trafficking. (2) It guarantees a higher level of protection, rehabilitation of the victims of prostitution, sexual servitude and other forms of exploitation in our society."
