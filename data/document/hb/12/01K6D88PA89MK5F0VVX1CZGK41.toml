congress_website_title = "AN ACT CREATING TRI-SERVICE ACADEMIES FOR THE MAJOR SERVICES COMMAND OF THE ARMED FORCES OF THE PHILIPPINES AND APPROPRIATING FUNDS THEREOF"
congress_website_abstract = "\\\"Tri-Service Academies Act\\\". The bill aims to lessen, if not eradicate, the baneful effects of the 'mistah' system in the Philippine military by establishing separate academies that would shape the men and women who would eventually lead the major services of the military without sacrificing the quality of future officers produced. It proposes the creation of the Philippine Army Military Academy (PAMA), Philippine Air Force Military Academy (PAFMA) and the Philippine Naval Military Academy (PNMA). The Tri-Service Academies shall provide a two-year officer course that shall embody the academic and training needs of the Major Services Command."

