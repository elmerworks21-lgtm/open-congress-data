congress_website_title = "AN ACT GRANTING MATERNITY LEAVE BENEFITS TO UNMARRIED PREGNAT WOMEN IN GOVERNMENT SERVICE AND IN PRIVATE SECTOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Maternity Leave Act of 2002.\" This bill states that any unmarried pregnant woman who is in government service, or in any of its instrumentaliti es including government owned or controlled corporation, and in the private sector, irrespective of herstatus of appointment, and who has rendered an aggregate service of at least six (6) months, shall be entitled to a maternity leave of at least two (2) weeks prior to the expected date of delivery and four (4) weeks after normal delivery or unintentional abortion with full pay based on her regular or average weekly wages."

