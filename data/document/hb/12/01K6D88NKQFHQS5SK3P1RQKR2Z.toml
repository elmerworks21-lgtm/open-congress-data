congress_website_title = "AN ACT IMPOSING A THREE PERCENT CARDIOVASCULAR TAX ON THE RECEIPTS (EXCLUDING VALUE ADDED TAX) FROM CIGARETTE SALES TO BE BORNE BY CIGARETTE MANUFACTURERS, CREATING A CARDIOVASCULAR HEALTH FUND, AND FOR OTHER PURPOSES"
congress_website_abstract = "There is hereby created a Special Cardiovascular Health Fund, which shall be known as the \"Cardio Fund\", and hereinafter referred to as Special Fund, to be constituted from the proceeds of the tax, to be known as the \"Cardio TAx\" imposed in SectionFourt of this Act to promote a comprehensive heart and lung health program adopted to the needs of the citizenry through the promotion of cardiovascular health and provisions for the research, development and procurement of the latest techniques andtechnology for the proper prevention, treatment and recuperation of smoking related illnesses."
