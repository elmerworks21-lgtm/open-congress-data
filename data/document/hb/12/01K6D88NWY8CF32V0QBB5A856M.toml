congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6425, AS AMENDED, OTHERWISE KNOWN AS THE DANGEROUS DRUGS ACT OF 1972, BY IMPOSING STIFFER PENALTIES FOR VIOLATIONS THEREOF, STRENGTHENING ENFORCEMENT PROCEDURES AND EXPEDITING HEARING OF DRUGS CASES"
