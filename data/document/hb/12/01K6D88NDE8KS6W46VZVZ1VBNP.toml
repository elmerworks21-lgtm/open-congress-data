congress_website_title = "AN ACT CREATING MINI-FOREST RESERVES FOR EVERY MUNICIPALITY"
congress_website_abstract = "\"2001 Act of Compulsory Mini-Forest Reserves for Municipalities. \" Rationale: Rapid deforestation being a national concern, cannot be adequately addressed by the Administrative agencies alone. Any serious success in addressing this concern would necessarily include the indispensable support of local governments. The proposed bill seeks to complement the DENR-led reforestation projects by galvanizing the nationwide efforts of municipal local governments. In creating together small but permanentmini-forest reserves, this alliance of efforts may bear fruit and better address the problem at hand."
