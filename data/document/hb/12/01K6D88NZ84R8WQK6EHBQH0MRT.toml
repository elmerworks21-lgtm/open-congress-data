congress_website_title = "AN ACT ESTABLISHING THE MARITIME AND OCEAN AFFAIRS CENTER AS AN ATTACHED AGENCY OF THE DEPARTMENT OF FOREIGN AFFAIRS, PROVIDING FOR ITS FUNCTIONS AND RESPONSIBILITIE S, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Empowering MARITIME AND OCEANS AFFAIR CENTER (MOAC) through a legislative charter shall enable it to meet the urgent requirement of the ocean and maritime interest of the country. It will be a step towards harnessing the benefits of our national wealth and at the same time, work for its protection. > For the promotion, protection, maintenance of national unity, sovereign, territorial integrity, maritime and sustainable and environmentally sound development of our country's ocean andmarine resources, the establishment of the Maritime and Oceans Affairs Center is sought."

