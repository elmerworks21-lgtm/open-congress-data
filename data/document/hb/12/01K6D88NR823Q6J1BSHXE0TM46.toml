congress_website_title = "AN ACT GRANTING RETIREMENT BENEFITS TO ELECTIVE AND APPOINTIVE BARANGAY OFFICIALS"
congress_website_abstract = "In addition to the benefits granted to barangay officials under existing laws and regulations, the Punong Barangay, Barangay Kagawad, President of Sangguniang Kabataan, Barangay Treasurer and Barangay Secretary, as well as other barangay officials and workers who may hereafter be mandatorily elected or appointed by provision of law, who have rendered a total of ten (10) years or more of government service, six (6) of which as barangay official or worker, shall be ENTITLED FOR LIFE TO A MONTHLYRETIREMENT PENSION in the amount of one-half of his last honorarium or highest monthly honorarium, whichever is higher."

