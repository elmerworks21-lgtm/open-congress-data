congress_website_title = "AN ACT REGULATING THE PRACTICE OF PSYCHOLOGY, CREATING FOR THIS PURPOSE A PROFESSIONAL REGULATORY BOARD OF PSYCHOLOGY, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Psychology Act of 2003\" This bill provides for the creation of the Professional Regulatory Board of Psychology with the power to administer the licensure examination for psychologists and psychometrician s. It mandates the integration ofpsychologists and psychometrician s into one accredited national organization. It provides the right to provileged communication to psychologists and psychometrician s, protecting them from being examined as to any communication or information without the consent of the client."
