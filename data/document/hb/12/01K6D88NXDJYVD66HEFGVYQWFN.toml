congress_website_title = "AN ACT TO PROMOTE THE EFFICIENT AND EFFECTIVE DELIVERY OF CONVERGING COMMUNICATIONS SERVICES (convergence)"
congress_website_abstract = "\"COVERGENCE\" refers to the progressive integration of segments of the information and content industries, including telecommunicati ons, broadcasting, electronic commerce and data processing, into a single economic market based on distributed digital technology. > This bill, therefore, aims to propose a policy on convergence of the various technologies and means of communications and a long term strategic national development plan for the Philippines communications program. > In summary, it proposes the national policies and objectives for the promotion of convergent technology, as well as specific policies on aspects which shall effect the implementation of the same. It also proposed the rights of users as well as institutional responsibiilitie s to make the national convergence program viable. Finally it provides for penal provisions for violators."
