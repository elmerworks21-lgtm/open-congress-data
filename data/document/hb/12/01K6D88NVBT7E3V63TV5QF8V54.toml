congress_website_title = "AN ACT MANDATING THE RESEARCH OF LOCAL HISTORIES AND INTEGRATING SUCH FINDINGS INTO THE ELEMENTARY AND SECONDARY CURRICULUM OF EVERY MUNICIPALITY AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Local Histories Research and Curriculum Integration Act of 2001\". Rationale: At present, the Philippine educational system has integrated history into the curriculum mostly in the context of national events. So much emphasis has been given on personalities and events at the national capital and other major cities in the country. Yet we hardly know the very history of our own village or municipality. The present curriculum in history obviously lacks the necessary information at the local level. This dent of information has consequently created a gap in the political consciousness of our youth. Thus this bill."

