congress_website_title = "AN ACT AMENDING EXECUTIVE ORDER NO. 122-A, AS AMENDED BY EXECUTIVE ORDER NO. 295, OTHERWISE KNOWN AS THE ACT CREATING THE OFFICE ON MUSLIM AFFAIRS"
congress_website_abstract = "Rationale: In the past years, the conduct of Hajj was marred with irregularities and charges of mismanagement as aired in various complaints from Muslim pilgrims. The perennial problems encountered ranged from the failure of intending pilgrims tojoin the Hajj citing administrative lapses by responsible government agency, the amount of fees required, delays in the processing and issuance of travel documents, to airline and billeting accomodations, among others. This bill seeks to address these problems."
