congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE WATER QUALITY MANAGEMENT POLICY AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Clean Water is one of the most basic necessities of life. However, as we approach the next millennium, nature's filter system cannot recycle and generate clean water as fast as necessary to sustain and preserve life. There is an urgent need to enact a law that will provide a framework of policies that will help ensure that our entire water system is rehabilitated, protected and allowed to regenerate clean water. This bill, therefore, seeks to provide for a comprehensive water qualitymanagement policy to addres this critical need."
