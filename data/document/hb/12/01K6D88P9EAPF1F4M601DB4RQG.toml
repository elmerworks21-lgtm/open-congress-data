congress_website_title = "AN ACT INSTITUTING A FEEDBACK MECHANISM IN THE ARMED FORCES OF THE PHILIPPINES (AFP) AND THE PHILIPPINE NATIONAL POLICE (PNP), CREATING FOR THE PURPOSE THE AFP/PNP WELFARE AND AFFAIRS OFFICE, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "To enable our military and police personnel to perform their duties with utmost loyalty, the integrity of the military and police institutions must be upheld and the welfare of their personnel must be protected. Their concerns and grievances must be addressed and resolved with dispatch and sincerity. The recent rebellion by junior military officers reflects the prevailing sentiments and grievances within the military and police organizations. The bill seeks to provide a feedback mechanism in the AFP and the PNP with the creation of the AFP/PNP Welfare and Affairs Office which would serve as the channel for the airing of legitimate grievances and concerns of both military and police personnel."

