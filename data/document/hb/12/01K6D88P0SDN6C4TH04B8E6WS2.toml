congress_website_title = "AN ACT REQUIRING THAT ALL LIQUOR BOTTLES CARRY A WARNING ON THE BOTTLE ITSELF OR ON THE LABEL THAT ALCOHOL DURING PREGNANCY IS HAZARDOUS TO THE LIFE AND HEALTH OF THE UNBORN CHILD"
congress_website_abstract = "Rationale: It is an established and undisputed fact that taking or consuming alcohol during pregnancy causes harmful effects on the unborn child. These harmful effects of the child include the following: (1) head face deformities; (2) major organ system malfunctions resulting in heart defects, ear infections hearing loss and the like; (3) central-nervous system dysfunctions causing mental retardation and hyperactivity; and (4) arrested growth both before and after birth. > In a country with ahigh birthrate, it is wise that a law be enacted to provide information on the effect of alcohol consumption to the unborn child. This bill seeks to require all liwuor bottles to carry a warning that alcohol intake during preganancy is hazardous to llife and health of the unborn."
