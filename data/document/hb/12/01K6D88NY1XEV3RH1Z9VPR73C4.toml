congress_website_title = "AN ACT MANDATING THE ESTABLISHMENT OF THE ARMED FORCES OF THE PHILIPPINES OFFICERS TRAINING PROGRAM, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "A training program for future officers in the Armed Forces of the Philippines shall be established for each of the major branches: The Army, Air Force and the Navy. Five students for every branch shall be admitted into the program every year, sent into a reputable university at the choice of the General Headquarters to complete any relevant four-year course. Full scholarship shall be granted to the qualified candidates covering tuition fees, board and lodging, meals, transportation, clothing and laundry plus a monthly allowance equivalent to the salary of a duty sergeant, all to be provided by the administering branch."
