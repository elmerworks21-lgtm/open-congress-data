congress_website_title = "AN ACT TO SET ASIDE THE FORTY PERCENT (40%) SHARE OF LOCAL GOVERNMENT UNITS FROM THE VALUE-ADDED TAX (VAT) COLLECTED BY THE BUREAU OF CUSTOMS (BOC) FOR THE BUREAU OF INTERNAL REVENUE (BIR) TO AUGMENT THE FUNDING EXCLUSIVELY FOR BASIC HEALTH CARE SERVICES AND FACILITIES DEVOLVED TO PROVINCES AND HIGHLY URBANIZED CITIES"
congress_website_abstract = "The forty percent (40%) share of local government units from the Value Added Tax (VAT) collected by the Bureau of Customs for the Bureau of Internal Revenue is hereby set aside to augment the funding exclusively for basic health care services and facilities devolved to provinces and highly urbanized cities.> The share of each provice or higly urbanized city, with devolved health care services and facilities, shall be distributed equitably on the basis of population within its territorial jurisdiction."

