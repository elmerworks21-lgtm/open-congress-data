congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 692, OTHERWISE KNOWN AS THE REVISED ACCOUNTANCY LAW"
congress_website_abstract = "\"The Accountancy Law of 2002.\" This bill aims to strengthen the Accountancy Profession in the Philippines. It provides: (1) the standardization and regulation of accounting education; (2) the examination for registration of certified public accountants; and (3) the supervision, control and regulation of the practice of accountancy in the Philippines."
