congress_website_title = "AN ACT EXEMPTING FROM INCOME TAXATION THE INITIAL THREE (3) YEARS SALARY OF SCHOOL TEACHERS, BOTH IN PUBLIC AND PRIVATE ELEMENTARY AND SECONDARY"
congress_website_abstract = "It is necessary that certain incentives be given by government to new teacher during their first three years of services. Giving exemptions from payment of income tax during the first three years of employment could be added incentives that will notonly help solve the problem of teacher shortage but also improve the quality of elementary and secondary education in public and private schools."

