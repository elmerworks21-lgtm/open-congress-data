congress_website_title = "AN ACT CREATING A NATIONAL TRANSPORTATION SAFETY BOARD, PRESCRIBING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Transportation Safety Act of 2001.\" This bill substantiates the policy of the State to: (a) Conduct independent accident investigations; (b) Support safety programs based on continuing and objective reviews of causes or reasons for unsafely; and (c) Appraise and assess operating practices and regulations of government agencies involved in the transportation sector, insofar as they affect safety, and where appropriate, shall initiate, coordinate, formulate, or promulgate safety improvement standarnds for the observance and implementation by the concerned government agencies and/or private entities. >To give flesh to the above policy, this bill seeks to create the NATIONAL TRANSPORTATION SAFETY BOARD."
