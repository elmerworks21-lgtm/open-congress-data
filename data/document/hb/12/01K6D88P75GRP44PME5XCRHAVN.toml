congress_website_title = "AN ACT PROHIBITING DRIVERS OF MOTOR OR NON-MOTOR PRIVATE AND PUBLIC VEHICLES FROM SMOKING AND/OR USING CELLULAR PHONE WHILE DRIVING AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "\"No Smoking and Non-Use of Cellular Phone While Driving Act of 2003.\" This proposed measure aims to provide for the proper way to secure and protect the drivers, passengers of motor and non-motor vehicles and pedestrians from vehicular accidents. Any violation of this Act shall be penalized by a fine in the amount of One Thousand Pesos (P1,000.00) for the first violation; Two Thousand Pesos (P2,000.00) for the second violation; and Five Thousand Pesos (P5,000.00) and suspension of driver's license for a period of fifteen (15) days for the third and succeeding violations."
