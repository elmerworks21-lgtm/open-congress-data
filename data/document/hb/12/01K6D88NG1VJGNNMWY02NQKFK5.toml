congress_website_title = "AN ACT CREATING THE MASS TRANSIT AUTHORITY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Mass transit, like the Light Rail Transit has proven to be one of the most efficient modes of transportation. In order to come up with a more efficient transport system, a separate body would be created to study and formulate not only immediate measures but also long-term solutions to the problems of transportation."
