congress_website_title = "AN ACT AMENDING SECTIONS 70, 71 AND 74 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Sections 70, 71 and 74 of the Local Government Code deal with the RECALL PROCESS. This bill is filed in order to improve the recall mechanism as mandated in the 1991 Local Government Code. The right to recall shall be vested solely on the people and not on the Preparatory REcall Assembly composed of only the officials in the local government unit concerned."
