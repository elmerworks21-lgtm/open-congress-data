congress_website_title = "AN ACT DISQUALIFYING FROM FILING A CERTIFICATE OF CANDIDACY FOR ANY POSITION IN ANY NATIONAL OR LOCAL ELECTION PERSONS CHARGED WITH AND DETAINED FOR OR CONVICTED OF NON-BAILABLE OFFENSES"
congress_website_abstract = "Any person who has been declared by competent authority insane or incompetent, or has been sentenced by final judgment for subversion, insurrection, rebellion or for any offense for which he has been sentenced to a penalty of more than eighteen months or for a crime involving moral turpitude, shall be disqualified to be a candidate and to hold any office, unless he has been given plenary pardon or granted amnesty: Provided, that if a person seeking elective office has been charged with and detained for or convicted of an offense which is not bailable under existing laws, he shall ipso facto be disqualified from filing a certificate of candidacy for any office, notwithstanding the pendency of the case or any appeal from the judgment of convviction before any court of competent jursidiction."
