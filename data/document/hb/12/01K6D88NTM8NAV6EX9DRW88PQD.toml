congress_website_title = "AN ACT INTEGRATING THE STUDY OF ENVIRONMENTAL PROTECTION IN THE SCIENCE SUBJECT IN THE EDUCATIONAL CURRICULUM OF ALL LEVELS IN ALL PRIVATE AND PUBLIC EDUCATIONAL INSTITUTIONS"
congress_website_abstract = "Rationale: In order that our aim to protect life and to live in an environment friendly place, the government must pass upon to the youth the task of preserving our environment. This will include to inculcate and educate upon the young minds of theyouth the need to perpetually protect and care for their environment if they are to enjoy and appreciate the beauty and splendor of our remaining natural resources."
