congress_website_title = "AN ACT CREATING SPECIAL REGIONAL TRIAL COURTS TO TRY CASES OF VIOLATIONS OF THE DANGEROUS DRUGS ACT OF 1972 AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: As the Court vested with general jurisdiction, the Regional Trial Courts are burdened and clogged with cases of various nature. As a result, drug related cases brought before the Regional Trial Courts would remain pending for a long period of time, in contravention with the provisions of the Dangerous Drug Act of 1972, as amended."

