congress_website_title = "AN ACT PROVIDING THAT SUBSCRIPTION TO THE SUBSCRIBER INVESTMENT PLAN OF THE PHILIPPINE LONG DISTANCE TELEPHONE COMPANY BE VOLUNTARY, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED TWO HUNDRED AND SEVENTEEN"
congress_website_abstract = "In line with the objective of spreading ownership among a wide base of the people, the concept of telephone subscriber self-financing is hereby adopted whereby a telephone subscriber MAY, ON A VOLUNTARY BASIS, finance(s) part of the capital investments in telephone installations through the purchase of stocks, whether common or preferred stock of the telephone company."
