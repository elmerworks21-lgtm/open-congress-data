congress_website_title = "AN ACT PENALIZING THE LAUNDERING OF MONETARY INSTRUMENTS, AUTHORIZING THE EXAMINATION OF BANK RECORDS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The need for the enactment of a statute to check the problem posed by the laundering of money used for illegal activities is a must. In particular, the need has been recognized in regard to the drugs menace, hence, this response, in a common effortas we march in step with the rest of the civilized world in confronting a universal problem. Such dirty money, as it were, must be interdicted everywhere and not given any harbor of hospitality anywhere. Laundering will be criminalized. The authorities, particularly the Ombudsman and the Secretaries of Justice and Finance and the Central Bank Governor will also be authorized to examine the bank records or accounts of laundering suspects or defendants under certain conditions."
