congress_website_title = "AN ACT PROVIDING FOR MAGNA CARTA FOR THE PHILIPPINE NATIONAL POLICE"
congress_website_abstract = "The provisions provided in this proposed legislation are focused on the basic rights, privileges as well as other benefits of the general membership of the PNP which they rightfully are entitled to enjoy. Also included are programs for continuous education and training and adequate salary and benefits. This proposed Magna Carta of the Philippine National Police attempts to properly address the existingloophol es and inadequacies of the present system and laws governing the PNP structure, organization and operation. In another context, this bill serves as a framework for the professionaliza tion of the PNP."
