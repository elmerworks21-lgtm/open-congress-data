congress_website_title = "AN ACT GRANTING LOCAL SANGGUNIANS, EXCEPT SANGGUNIANG BARANGAY, THE POWER TO CONDUCT INQUIRIES, IN AID OF LEGISLATION, TO ISSUE SUBPOENA AND TO PUNISH FOR CONTEMPT ANY PERSON WHO REFUSES TO OBEY SUCH PROCESS, AMENDING FOR THE PURPOSE SECTIONS 447, 458 AND 468 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "The bill seeks to amend Sections 447, 458 and 468 of the Local Government Code in order to empower the local sangunians, except the sanguniang barangay, to compel the attendance of witnesses in the conduct of investigation, in aid of legislation, and to punish for contempt any person who refuses to obey such process. Any person who refuses to obey the subpoena or refuses to be sworn to or answer inquiries when lawfully required to do so by the local sangunians, in connection with its legislative functions, shall be adjudged in contempt."
