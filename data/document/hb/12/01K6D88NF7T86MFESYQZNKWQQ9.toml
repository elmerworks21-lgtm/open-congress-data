congress_website_title = "AN ACT MANDATING ALL LOCAL CIVIL REGISTRARS WITHIN THE COUNTRY TO CAUSE AMENDMENT OF CERTAIN PORTION IN THEIR RESPECTIVE PRESCRIBED FORMS OF MARRIAGE LICENSE APPLICATIONS BY PROVIDING FOR THE INSERTION OF PRECAUTIONARY LANGUAGE FOR THE PERUSAL AND GUIDANCE OF APPLICANTS THEREOF"
congress_website_abstract = "SECTION 1. Thal all Local Civil Registrars within the country are mandated to cause amendment of certain portion in their respective prescribed forms for marriage license applications by providing for the insertion of preacutionary language. > The application for a marriage license shall contain the following statement:> \"THE LAWS OF THE PHILIPPINES AFFIRM YOUR RIGHT TO ENTER INTO THIS MARRIAGE AND AT THE SAME TIME TO LIVE WITHIN THE MARRIAGE FREE FROM VIOLENCE AND ABUSE. NEITHER OF YOU IS THEPROPERTY OF THE OTHER. PHYSICAL ABUSE, SEXUAL ABUSE, AND ASSAULT OR ANY FORM OF VIOLENCE OF A SPOUSE OR OTHER FAMILY MEMBER, AS WELL AS OTHER PROVISIONS OF THE CRIMINAL LAWS OF THE PHILIPPINES, ARE APPLICABLE TO SPOUSES AND OTHER FAMILY MEMBERS ANDVIOLATIONS THEREOF ARE PUNISHABLE BY LAW.\""

