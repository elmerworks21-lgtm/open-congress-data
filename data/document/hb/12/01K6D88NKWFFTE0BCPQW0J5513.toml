congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 5173, ESTABLISHING THE PHILIPPINE COAST GUARD AS A SEPARATE AND DISTINCT SERVICE AND ATTACHING THE SAME TO THE DEPARTMENT OF TRANSPORTATION AND COMMUNICATIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The transfer of the Philippine Coast Guard will entail the amendment of RA 5173. Under the DOTC, the PCG can concentrate on its functions on Maritime Safety Administration, Maritime Environmental Protection, Maritime Search and Rescue, and Maritime Law Enforcement. The DOTC has proposed an integrated approach to the country's maritime safety and water transportation development program by placing all agencies with relevant functions under one (1) office."
