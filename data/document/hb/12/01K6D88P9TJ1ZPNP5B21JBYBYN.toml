congress_website_title = "AN ACT FURTHER AMENDING SECTION 109 (m) OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "This bill seeks to exempt educational services of private educational institutions accredited by the Technical and Skills Development Authority (TESDA) from the ambit of the value-added tax (VAT). The Tax Reform Act of 1997 exempted from the coverage of the VAT only private educational institutions accredited by the Depatment of Education and the Commission on Higher Education. The exclusion of private technical-vocational schools accredited by the TESDA from the VAT exemption is discriminatory, unjust and anti-poor."
