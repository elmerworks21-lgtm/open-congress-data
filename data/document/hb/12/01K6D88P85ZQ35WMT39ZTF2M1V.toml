congress_website_title = "AN ACT AMENDING SECTION 263 OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AND FOR OTHER PURPOSES THEREOF"
congress_website_abstract = "Recently, business groups urged that there should be a no strike-no lockout clause on economic issues in collective bargaining agreements (CBAs)to induce potential investors to operate in the Philippines. As a general rule, a compromise to the rightto strike is unconstitutiona l and illegl and should not be tolerated. However, due to the need to keep or find employment, laborers and workers are usually compelled to agree to extremely unfavorable conditions. What is occuring in practice and issanctioned by jurisprudence is that the right to strike is not absolute and may be stipulated in CBAs of employees and labor unions. This bill seeks to regularize such occurrence and provide the conditions under which workers may agree to a \"no striike\" clause."

