congress_website_abstract = "\"corporate Fraud Accountability Act of 2002.\" Whoever knowingly executes a scheme or artifice: (1) To defraud any person in connection with any security registered under Section 8 of the Securities Regulation Code (RA 8799); (2) To obtain by meansof false or fraudulent pretencese, representations , or promises, any money or property in connection with the purchase or sale of any security registered under Section 8 of the Securities Regulation Code shall be fined hereunder imprisoned for notmore than 30 years, or both."
