congress_website_abstract = "\"Pre -Need Plan Code of the Philippines.\" This bill seks to establish a Pre-Need Plan Code that shall govern the operation of firms which sell pre-need plans. It provides a Plan Holders' Protection Fund which shall be used for payment of claims remaining unpaid due to insolvency of such company."
