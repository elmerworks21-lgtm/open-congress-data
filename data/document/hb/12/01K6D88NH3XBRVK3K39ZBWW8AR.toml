congress_website_title = "AN ACT ENTITLING THE CHILDREN OF TEACHERS AND EMPLOYEES EMPLOYED IN PUBLIC AND PRIVATE INSTITUTIONS OF HIGHER EDUCATION TO FREE TUITION AND OTHER FEES"
congress_website_abstract = "Rationale: It is declared the policy of the State to provide other economic benefits to teachers and employees of public and private schools, colleges, universities and post-secondary vocational and technical institutions by extending to their children free tuition and fees in the educational institution where either or both of them are employed. This new benefit shall form part of the economic package already being received by the teachers and the employees on account of their employment withthese institutions. This policy is more in keeping with the commitment to help alleviate the difficulties encountered by said teachers and employees in sending their children to these institutions because of the prohibitive cost of college educationn nowadays."

