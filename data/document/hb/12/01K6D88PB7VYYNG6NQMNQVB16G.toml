congress_website_title = "AN ACT EXTENDING THE TERM OF OFFICE OF BARANGAY OFFICIALS AND RESETTING THE DATE OF BARANGAY ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9164"
congress_website_abstract = "This bill seeks to reset the term of office of all barangay officials from three years to five years for the following reasons: a) to give incumbent barangay officials a chance to provide better services to their constituents; b) to enable incumbent barangay officials to complete their plans and programs; and c) to keep politics to a minimum."
