congress_website_title = "AN ACT AMENDING SECTION TWENTY-NINE OF BATAS PAMBANSA BLG. ONE HUNDRED TWENTY-NINE, OTHERWISE KNOWN AS THE JUDICIARY REORGANIZATION ACT OF 1980"
congress_website_abstract = "This bill aims to provide access to higher education for the poor through the creation of a National Student Loan Board, an extension on a nationwide basis of the cross-subsidy program of the University of the Philippines known as the Socialized Tutition and Financial Assistance Program (STFAP). > Specifically, monthly contributions shall be made by persons within specific income brackets that will go into a National Students Loan Fund. These contributions will be graduated, say from one-half percent to four percent of income, according to income bracket."
