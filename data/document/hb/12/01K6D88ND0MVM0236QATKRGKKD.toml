congress_website_title = "AN ACT TO PROVIDE A COMPREHENSIVE PROGRAM AGAINST WIFE CRUELTY, INCREASING PENALTIES FOR OFFENDERS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Wife Cruelty Act\". This measure seeks to impose a penalty one degree higher than that provided for by the Revised Penal Code for such offense, especially such as will result in the infliction of physical injuries on the wife, further taking into consideration the aggravating circumstance of the use of superior strength. This bill also provides for the right of the wife to take refuge in government social centers and to eject the habitual wife beater from the conjugal home."
