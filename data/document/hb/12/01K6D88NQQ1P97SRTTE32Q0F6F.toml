congress_website_title = "AN ACT PROHIBITING SMOKING, SELLING, PEDDLING OF CIGARETTES OR ANY SIMILAR PRODUCT IN STREETS, PUBLIC PLACES, PUBLIC CONVEYANCES AND IN ENCLOSED PUBLIC PLACES BY ANY PERSON BELOW EIGHTEEN (18) YEARS OF AGE, PROVIDING PENALTIES FOR VIOLATIONS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "It shall be UNLAWFUL for any person below eighteen (18) years of age to smoke, sell, peddle cigarettes, or any similar products in streets, public places, public conveyances and in enclosed public places. >It shall be unlawful for any person to sell, or distribute, gratuitously or otherwise, to a minor any cigarette or any other tobacco product, or who uses, avails or contracts out the services of a minor in any undertaking or occupation for profit or by any consideration. It shall not be a defense for the person selling that he/she did not know or was not aware of the real age of the minor. Penal sanctions are hereby provided."
