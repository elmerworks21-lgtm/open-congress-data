congress_website_title = "AN ACT GRANTING SPECIAL BENEFITS TO GOVERNMENT PERSONNEL RETIRED UNDER REPUBLIC ACTS NUMBERED 660 AND 1616 AND PRESIDENTIAL DECREE NO. 1146 WHO ARE SEVENTY (70) YEARS OR OLDER, BY PROVIDING NEW PROCEDURES IN THE COMPUTATION OF MONTHLY PENSIONS, ANDFOR OTHER PURPOSES"
congress_website_abstract = "In line with the provisions of Section 9 of Executive Order No. 389, and considering the \"phase-out\" process of Ra 1616, retirees under this law who retired compulsorily at age 65 years, and those who retired optionally at a younger age, but were also qualified to retired under RA 660 or PD 1146, shall be given the option to change the mdoe of their retirement to either RA 660 or PD 1146, and thereafter, shall receive the monthly pension provided under such laws. However, the five-year lump-sumamount that the retiree is entitled to receive under RA 660 or PD 1146 which was kept by the GSIS when he opted to retire under RA 1616, shall not be paid to him, but remitted instead, directly to the last employer of the retiree, as partial reimburrsement of the amount previously paid to him under Ra 1616. The difference between the amount apid to him under RA 1616 and the amount remitted under this Section, shall be considered as the benefit referred to, under Section 6 of this Act. The retir"

