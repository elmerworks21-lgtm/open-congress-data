congress_website_title = "AN ACT TO DEFINE AND PENALIZE CONSPIRACIES AND COMBINATIONS IN PUBLIC BIDDINGS, PREVENT ILLEGAL SCHEMES AND FRAUDS ENSURE FAIRNESS AND FREE COMPETITION, AND SAFEGUARD THE INTEREST OF THE GOVERNMENT"
congress_website_abstract = "\"Competitive Public Bidding Act of 2001.\" This bill defines and penalizes conspiracies and combinations among public bidders. It endeavors to protect the interest of the government, as well as public funds, by adopting appropriate measures to prevent illegal schemes, fraudulent acts, collusion, conspiracy, monopoly and unfair competition in public bidding process. It also relaxes the strict rules of evidence in order to make the prosecution of conniving bidders easier."
