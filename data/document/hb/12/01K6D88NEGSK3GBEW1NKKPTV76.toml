congress_website_title = "AN ACT INSTITUTIONALIZ ING FREE PUBLIC PREPARATORY EDUCATION, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Free Public Preparatory Educations means that the children from five (5) to six (6) years old enrolled in day care centers established, administered, maintained and funded by national and local government units, and those public preparatory schoolswhich may be established by law, shall be free from payment of tuition and other school fees. These qualified children shall finish one (1) year of schooling before they are admitted to Grade I."

