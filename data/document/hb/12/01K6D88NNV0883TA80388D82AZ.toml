congress_website_title = "AN ACT AMENDING PARAGRAPH (a) OF THE PENAL PROVISIONS OF GSIS ACT OF 1997 (R.A. 8291)"
congress_website_abstract = "Section 1. Paragraph (a) of the Penal Provisions, is hereby amended to read as follows: (a) The official or employee who fails to include in the annual budget the amount corresponding to the employer and employee contributions, or who fails by morethan thirty (30) days to remit the amount from the time such amount becomes due, or to deduct the monthly contributions of the employee shall suffer the penalties of imprisonment from ten (10) years and one (1) day to twelve (12) years and a fine ofnot less than ten (10) thousand pesos but not more than thirty (30) thousand pesos. In addition, he or she will suffer absolute perpetual disqualificatio n from holding public office and from practicing any profession or calling licensed by the govvernment."
