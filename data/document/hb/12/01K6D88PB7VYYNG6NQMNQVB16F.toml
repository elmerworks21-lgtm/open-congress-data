congress_website_title = "AN ACT DECLARING AN ELECTIVE OFFICIAL IPSO FACTO RESIGNED FROM HIS ELECTIVE OFFICE UPON THE FILING OF HIS CERTIFICATE OF CANDIDACY"
congress_website_abstract = "In order to strengthen the provisions of the 1987 Constitution on the accountability of public officials and to level the playing field in the political arena, this bill seeks to declare any elective official whether national or local, running for any public office other than the elective position he is holding in a permanent capacity, ipso facto resigned from his office upon the filing of his certificate of candidacy. However, during presidential elections, members of Congress who are constitutionally bound to proclaim the President and the Vice President, who filed their certificate of candidacy for elective positions other than their incumbent elective positions, shall be deemed resigned at noon on the 30th day of June next following the presidential elections."
