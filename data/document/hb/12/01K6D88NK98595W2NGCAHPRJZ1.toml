congress_website_title = "AN ACT LOWERING THE COSTS OF MEDICINES AND HEALTH CARE IN THE PHILIPPINES BY EXEMPTING THE SALE, IMPORTATION, PROCESSING, REPACKING OR MANUFACTURING OF MEDICINES; PHARMACEUTICAL PRODUCTS; MEDICAL AND DENTAL AND HOSPITAL EQUIPMENT; AND RAW MATERIALSTO BE USED IN THE MANUFACTURE THEREOF, FROM ALL DUTIES AND TAXES"
congress_website_abstract = "Rationale: With the elimination of these duties and taxes, the costs of goods directly related to health care will be lowered and the manufacturers and distributors can then pass on the benefit to the Filipino consumer. This will eventually translate into a lower cost of health care for all Filipinos."

