congress_website_title = "AN ACT AMENDING SECTIONS 67 AND 77 OF BATAS PAMBANSA BLG. 881, OTHERWISE KNOWN AS THE \\\"OMNIBUS ELECTION CODE\\\""
congress_website_abstract = "The Omnibus Election code sanctions the substitution of candidates who died, are disqualified or have withdrawn their candidacy until noon of election day. This result in confusion among the voters over the abrupt change in the record of candidates. The measure seeks to impose a period within which substitution may be effected. It proposes to require the substitute candidate to file his certificate of candidacy not later than thirty days before the day of the election. The bill also pushes for the automatic relinquishment of office upon filing of this certificate of candidacy of any elective officials, whether national or local, running for any office, including for President or Vice-President, other than the one which he/she is holding in a permanent capacity."

