congress_website_title = "AN ACT PROVIDING FOR THE REORGANIZATION OF THE NATIONAL POLICE COMMISSION AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Police Commission Act of 2002.\" This proposed measure intends to reorganized the National Police Commission (Napolcom) which shall take charge of police operation relating to the public safety of the nation, administer the affairs concerning police education, police communication, criminal identification, criminal statistics, police equipment, as well as coordinate the affairs concerning police administration. The Commission shall be composed of a Chairman who shall have a rank equivalent to the Secretary of the Cabinet and four (4) regular members who shall have a salary equivalent to that of an Undersecretary. The term of office of members of the Commission shall be seven (7) years without reappointment. > The Commission shallestablish, operate and maintain regional, provincial and district offices to be headed by regional, provincial and district directors, respectively, who shall implement the policies and programs of the Commission in their respective offices."
