congress_website_title = "AN ACT INCREASING PRIVILEGES FOR SENIOR CITIZENS, AMENDING FOR THE PURPOSE SECTION FOUR (4) OF REPUBLIC ACT NO. 7432, OTHERWISE KNOWN AS `AN ACT TO MAXIMIZE THE CONTRIBUTION OF SENIOR CITIZENS TO NATION BUILDING, GRANT BENEFITS AND SPECIAL PRIVILEGES AND FOR OTHER PURPOSES'"
congress_website_abstract = "This bill seeks to increase the 20% discount available to Senior Citizens to 40%. By maximizing this privilege, our dear elderly will be able to enjoy the value of whatever economic or monetary resources they have saved to sustain while enjoying their retirement years. The cost of goods and services especially medicines have become prohibitive and beyond the purchasing power of the sector who mainly rely on their monthly retirement stipend."
