congress_website_title = "AN ACT INSTITUTIONALIZ ING THE NON-FORMAL EDUCATION ACCREDITATION AND EQUIVALENCY (NFE A&E) SYSTEM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Non-Formal Education (NFE) Act of 2003\". This measure seeks to enable out-of-school youth and adults to acquire reading, writing and numeric skills to help them improve their economic status and make them function more effectively in society. Itoffers an alternative pathway of learning and certification by which out-of-school youth and adults can earn an educational qualification comparable to the formal elementary and secondary school systems."
