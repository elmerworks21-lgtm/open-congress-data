congress_website_title = "AN ACT GRANTING EXEMPTION FROM INCOME TAXES ON ALL FORMS OF MONEY CLAIMS AWARDED AS A RESULT OF A LABOR DISPUTE"
congress_website_abstract = "Rationale: In situations where the employee is laid off because of a labor dispute or the employer commits an unfair labor practice, it is always the employee who is at a disadvantage position. During the lengthy process of litigation, the laborer has no work and no pay.> This bill, therefore, provides that all forms of money claims arising from employer-employ ee relations which had been awarded as a result of labor dispute shall be exempted from income tax."

