congress_website_title = "AN ACT PROVIDING FOR THE CREATION, ORGANIZATION AND OPERATION OF COOPERATIVE BANKS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Cooprative Banking Act of 2003\\\". In order to make much-needed capital readily accessbile to marginalized sectors in the countryside, this bill seeks the establishment and creation of cooperative banks which shall be owned and controlled by cooperative organizations. Cooperative banks shall primarily provide financial, banking and credit services to cooperative organizations and other sectors that may be considered marginalized. Cooperative banks registered under the proposed act and under the Cooperative Code shall be given the privileges and incentives granted to rural banks, private development banks, commercial banks and all other banks to rediscount with the Bangko Sentral and with other government banks."
