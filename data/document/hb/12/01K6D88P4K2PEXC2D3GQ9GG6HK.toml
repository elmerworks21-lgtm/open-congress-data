congress_website_title = "AN ACT EXEMPTING CERTAIN SERVICES FROM THE VALUE-ADDED TAX, AMENDING FOR THE PURPOSE THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "This bill seeks to exempt the following sale of services from the value-added tax: (1) Services rendered by banks, non-bank financial intermediaries, finance companies, and other financial intermediaries not performing quasi-banking functions; (2) Services performed as actors or acresses, talents, singers and emcees, radio and television broadcasters; choreographers, musical radio, movie television and stage directors; (3) Services performed as professional athletes; and (4) Servces performed in the exercise of profession or calling (including brokers) and professional services rendered by registered general professional partnership."
