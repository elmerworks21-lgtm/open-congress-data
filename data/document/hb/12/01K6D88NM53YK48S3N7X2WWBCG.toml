congress_website_title = "AN ACT AMENDING THE CHARTER OF THE PHILIPPINE CHARITY SWEEPSTAKES OFFICE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to REDIRECT a portion of the charity fund of the Philippine Charity Sweepstakes Office to particular government institutions that can implement social welfare and health programs to the fullest. This proposed measure mandates that the Department of Health and Department of Social Welfare and Development receive fifteen (15%) and ten (10%) percent share, respectively, of the charing fund of the Philippine Charity Sweepstakes Office to finance its proprity programs, including thecontinuation of existing ones. This way, better coordination between agencies will be attained and continuity of long-term programs will be ensured."
