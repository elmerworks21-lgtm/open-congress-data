congress_website_title = "AN ACT ORDAINING THE DEVELOPMENT OF NATURAL GAS DELIVERY INFRASTRUCTURE AND CONSOLIDATING FOR THAT PURPOSE ALL LAWS RELATING TO THE TRANSPORTATION, DISTRIBUTION AND SUPPLY OF NATURAL GAS AND FOR OTHER PURPOSES"
