congress_website_title = "AN ACT TO DETER AND ELIMINATE THE TRAFFICKING OF PERSONS, ESPECIALLY WOMEN AND MINORS, ESTABLISHING THE NECESSARY INSTITUTIONAL MECHANISMS FOR THE PROTECTION AND SUPPORT OF VICTIMS OF TRAFFICKING, PROVIDING PENALTIES FOR ITS VIOLATIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Trafficki ng of Persons Act of 2001.\" The State shall give highest priotrity to the enactment of measures and development of programs that will promote human dignity. Persons especially women and minors shall be afforded protection against violence and exploitation, and definite measures will be taken to eliminate the trafficking in persons especially women and minors. > It shall likewise, be the policy of the State to promote an active and visible policy of mainstreaming gender perspective in all efforts aimed at addressing the attendant issues to migration and violence against persons especially women and minors. > Special recognition is given to the vulnerability of women and minors and it shall afford special protection to them.>> Specific measures will be instituted, not only to support trafficked persons especially women and minors, but more importantly, to mitigate pressures for involuntary migration and servitude of persons especially women and minors."
