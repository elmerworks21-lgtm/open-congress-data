congress_website_title = "AN ACT ALLOCATING THE AMOUNT OF ONE BLLION PESOS (P1,000,000,000 .00) FROM THE AGGREGATE EARNINGS OF THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION FOR THE MAINTENANCE OPERATION OF THE PHILIPPINE DRUG ENFORCEMENT AGENCY"
congress_website_abstract = "The drug problem in the country has reached alarming proportions. It now affects the whole nation. This bill provides for an additional funding of PhP 1.0 billion for the maintenance and operation of the Philippine Drug Enforcement Agency (PDEA). The fund shall be sourced from the aggregate gross earnings of the Philippine Amusement and Gaming Corporation. This would enable the PDEA to effectively carry out its programs and projects to combat the drug menace."

