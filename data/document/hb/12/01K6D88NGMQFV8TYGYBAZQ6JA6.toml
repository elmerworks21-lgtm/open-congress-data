congress_website_title = "AN ACT ESTABLISHING THE `GALING PINOY' AWARD PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The condition of the Filipino entrepreneurs and the workers to the development of the country's economy must be recognized and rewarded. There is a need to focus national attention to their invaluable contributions to the economy and thecountry as a whole and provide attractive incentives to bolster their competitiveness . They deserve motivation and recognition which can take the form of giving them honors, privileges, and cash awards."

