congress_website_title = "AN ACT CREATING THE POSITION OF TOURISM OFFICER IN ALL PROVINCES, FIRST CLASS MUNICIPALITIES AND CITIES, OR MUNICIPALITIES AND CITIES WHERE TOURISMS IS CONSIDERED A MAJOR LOCAL INDUSTRY, AND DEFINING ITS QUALIFICATIONS, POWER AND DUTIES, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE"
congress_website_abstract = "Among the major problems affecting the tourism industry is accessibility to basic tourism information and services and lack of a comprehensive approach to its development, resulting in low tourist arrival. In 1999, the Philippines ranked fifth amongASEAN members in terms of visitor arrivals with 2.2. million tourists. It lagged behind Thailand (8.7 million), Malaysia (7.9 million), Singapore (6.9 million), and Indonesia (4.3 million). > This bill seeks to address these issues by creating the position of tourism officer in all provinces, first class municipalities and cities, or municipalities and cities where tourism is considered a major local industry."

