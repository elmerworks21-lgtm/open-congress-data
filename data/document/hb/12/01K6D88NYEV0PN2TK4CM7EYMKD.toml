congress_website_title = "AN ACT DECLARING ALL IRRIGATED AND IRRIGABLE AGRICULTURAL LANDS AS PROTECTED AREAS FOR AGRICULTURE, BANNING ITS CONVERSION FOR USES OTHER THAN AGRICULTURE, AND AMENDING FOR THE PURPOSE SECTION 20 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE"
congress_website_abstract = "\"National Protected Areas for Agriculture (NPAA) Law\". Rationale: The pre-requisite to the attainment of food security is the availability of irrigated and irrigable agricultural lands. But this is threatened by land conversions. From 1989 to 1993 alone, a total of 109,000 hectares of irrigated land have been converted into industrial, commercual and residential uses. If the trend is not arrested, the country will soon face the prospect of irretrivably losing agricultural land, a primary, non-renewable and non-replenishab le resource.> Agricultural lands, must thus be secured not only to provide food and long-term food security to an ever-growing population, but also to provide green and breathing spaces for rapidly expanding urban centerss."

