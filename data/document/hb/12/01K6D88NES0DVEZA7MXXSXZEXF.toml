congress_website_title = "AN ACT PROHIBITING SMOKING IN PUBLIC TRANSPORTATION AND BUILDINGS, AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Smoking is strictly prohibited in public transportation and buildings. For purposes of this bill, smoking shall include cigars and cigarette smoking and pipe smoking or any device creating cigarette or tobacco fumes. Any person who violates this bill shall be punished by imprisonment of not less than five or more than ten (10) days or a fine of not less than Five Hundred Pesos (P500.00) nore more than One Thousand Pesos (P1,000.00) or both such imprisonment and fine at the discreation of the court."
