congress_website_title = "AN ACT ESTABLISHING A COST SHARING SCHEME TO PROVIDE FOR A HOSPITAL CARE PROGRAM IN LOCAL GOVERNMENT UNITS AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to institutionaliz e a local health delivery system among local governments to solve the problem of access to medical care. The will require local government units to establish a cost sharing scheme that will provide hospitalizationservices to their constituents. The system will not only provide hospitalization but also include blood typing of all residents for easy access to blood donors and establish a perfect system of identity of all citizens of the country."
