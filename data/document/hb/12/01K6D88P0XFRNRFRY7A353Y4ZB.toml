congress_website_title = "AN ACT AMENDING SECTION 27 OF REPUBLIC ACT NO. 8792, OTHERWISE KNOWN AS THE ELECTRONIC COMMERCE ACT"
congress_website_abstract = "The proposed AMENDMENT to Section 27 of RA No. 8792 shall read as follows: \"SEC. 27. Government Use of Electronic Data Messages, Electronic Documents and Electronic Signatures. - Notwithstanding any law to the contrary, [within two (2) years from the date of effectivity of this Act,] all departments, bureaus, offices and agencies of the government, as well as all government-owne d and-controlled corporations, that pursuant to law require or accept the filing of documents, require that documentsbe created, or retained and/or submitted, issue permits, licenses or certificates of registration or approval, or provide for the method and manner of payment or settlement of fees and other obligations to the government.\""
