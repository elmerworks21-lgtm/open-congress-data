congress_website_title = "AN ACT INCREASING THE ALLOWANCES/HONO RARIA OF AND GRANTING RETIREMENT BENEFITS TO ALL BARANGAY OFFICIALS AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE `LOCAL GOVERNMENT CODE OF 1991'"
congress_website_abstract = "In recognition of the invaluable service rendered by barangay officials, this bill seeks to increase the minimum monthly allowances/hono raria from One Thousand Pesos (P1,000.00) to Six Thousand Pesos (P6,000.00) for barangay captains and from Six Hundred Pesos (P600) to Three Thousand Pesos (P3,000.00) for the sangguniang barangay members, barangay secretaries, and barangay treasurers. It also grants retirement benefits to all barangay officials who have served at least nine (9) years of cumulative service a lump sum retirement benefit equivalent to seventy-five percent (75%) of their monthly allowance/honor arium per year of service."

