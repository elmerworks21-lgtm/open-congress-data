congress_website_abstract = "This bill proposes the appointment of a person to help uplift the living condition of the disadvantaged sector of our society. The position of SOCIAL WELFARE AND DEVELOPMENT OFFICER calls for one familiar with multi-faceted services on social welfare. Thus, the need to appoint duly licensed social worker for this purpose."
