congress_website_title = "AN ACT CREATING THE POSITION OF TOURISM OFFICER IN ALL PROVINCES, CLASS `A' MUNICIPALITIES AND CITIES, OR MUNICIPALITIES AND CITIES WHERE TOURISM IS CONSIDERED A MAJOR LOCAL INDUSTRY, AND DEFINING THEIR QUALIFICATIONS, POWERS AND DUTIES"
congress_website_abstract = "This bill seeks to strengthen the role of the local government units in the tourism industry through the creation of the position of tourism officer in all provinces, Class \"A\" municipalities and cities, or municipalities and cities where tourism isconsidered a major local industry. > The creation of the position of Tourism Officer will ensure the proper delivery of basic tourism services in local government units which is essential in order to address the aforementioned problems and thus fully develop our country's tourism potentials."
