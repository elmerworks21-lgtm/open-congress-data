congress_website_title = "AN ACT PROVIDING FOR THE INCLUSION OF THE DULY ELECTED PRESIDENT OF THE LEAGUE OF MUNICIPALITIES AS EX-OFFICIO MEMBER OF THE SANGGUNIANG PANLALAWIGAN CONCERNED, AMENDING FOR THE PURPOSE THE `LOCAL GOVERNMENT CODE OF 1991,' AS AMENDED"
congress_website_abstract = "THE DULY ELECTED PRESIDENT OF THE LEAGUE FOR ALL COMPONENT MUNICIPALITIES SHALL BE AN EX-OFFICIO MEMBER OF THE SANGGUNIANG PANLALAWIGAN CONCERNED AND SHALL SERVE AS SUCH ONLY DURING HIS TERM OF OFFICE AS PRESIDENT OF THE LEAGUE OF COMPONENT MUNICIPALITIES, WHICH IN NO CASE SHALL BE BEYOND THE TERM OF OFFICE OF THE SANGGUNIANG PANLALAWIGAN CONCERNED.> This bill seeks to include the duly elected president of the League of Municipalities as ex-officio member of the Sangguniang Panlalawigan concerned."
