congress_website_title = "AN ACT PROVIDING FOR A NATIONAL IDENTIFICATION SYSTEM, DEFINING ITS COVERAGE AND APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Given the recent turn of events and the current alarm over terrorist acts, there is a need to establish a national identification system. Moreover, it provides for an effective method of solving the perennial problem of red tape in government bureaucracy. It facilitates in the acquisition of records for a short period of time. Criminal activities are easily monitored and the perpetrators apprehended and prosecuted without delay. Public documents can now be accessed immediately for itshall contain data such as taxpayer's identification number, NBI records, driver's license, voter's identification and the like."
