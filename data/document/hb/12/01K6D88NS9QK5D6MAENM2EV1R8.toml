congress_website_title = "AN ACT REQUIRING ALL REGISTRANTS OF ALL TYPES OF VEHICLES TO PLANT AT LEAST FIVE (5) TREES IN A PLACE DESIGNATED BY THE DEPARTMENT OF ENVIRONMENT AND NATURAL RESOURCES (DENR) IN CONSULTATION WITH THE LAND TRANSPORTATION OFFICE(LTO)"
congress_website_abstract = "Registrants of all types of land motor vehicles shall, as a prerequisite to registration, be required to plant at least five (5) trees in a place to be designated by the Department of Environment and Natural Resources in consultation with the Land Transportation Office within thirty (30) days from the actual registration with the Land Transportation Office."

