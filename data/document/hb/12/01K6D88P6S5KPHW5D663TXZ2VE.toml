congress_website_title = "AN ACT CREATING A SYSTEM OF REWARD AND OTHER INCENTIVES FOR PERSONS WHO COULD HELP IDENTIFY, LOCATE, PROVIDE INFORMATION, TESTIFY AND PROSECUTE VIOLATORS OF REPUBLIC ACT NO. 3019, OTHERWISE KNOWN AS THE ANTI-GRAFT AND CORRUPT PRACTICES ACT, AND OTHER CRIMINAL OFFENSES COMMITTED BY REASON OF THE FUNCTION OF PUBLIC OFFICE AND APPROPRIATING FUNDS THEREOF, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 3019"
congress_website_abstract = "This bill seeks to amend Republic Act No. 3019 by providing a reward mechanism for informants of crimes committed by reason of public office. This reward mechanism provides incentives such as cash rewards, protection, security and other benefits forordinary citizens to participate in the government's fight against graft and corruption. It also grants not only the participants of the crime discharged as state witnesses, but also the most guilty one, the opportunity to redeem themselves by cooperating with the Office of the Ombudsman."

