congress_website_title = "AN ACT ESTABLISHING A CIVIL SERVICE CODE OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: There is an urgent need to UPDATE existing laws, decrees, letters of instructions, executive and other administrative issuances relative to the civil service to conform with the realities necessary to fully advance the professionalism ofthe government bureaucracy. To this end, there is an apparent need to repeal, modify and/or amend existing laws, decrees, letters of instructions, executive orders and other administrative issuances relative to the needs of the present system of civil governance."

