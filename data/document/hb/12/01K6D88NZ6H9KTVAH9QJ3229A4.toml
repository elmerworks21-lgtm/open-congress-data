congress_website_title = "AN ACT ESTABLISHING YOUTH CENTERS IN ALL FIFTEEN (15) REGIONS OF THE COUNTRY, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Youth Center Act of 2002\". Rationale: These proposed Centers shall be envisioned as transient shelters, lodging facilities and skill training centers for those who are in need of immediate assistance and attention. These centers shall also serve asa one-stop youth activity center that can provide lodging, recreation facilities, and most importantly, provide livelihood and skills training, community service and voluntary work. These centers shall be treated as extension offices of the regionalof the Council for the Welfate of Children and Youth, Department of Social Welfare and Development."
