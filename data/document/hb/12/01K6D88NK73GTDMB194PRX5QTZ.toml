congress_website_title = "AN ACT PROVIDING FOR AUTOMATIC MEMBERSHIP OF PROFESSIONALS TO THEIR RESPECTIVE ACCREDITED PROFESSIONAL ORGANIZATIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The State shall promote and protect various professional disciplines, unify and strengthen the bond amongst all professionals, and encourage their active involvement in organizations which serve as vehicles for nurturing the standard of practice of the profession thereby ensuring the contribution of professionals in uplifting the general welfare and development of the nation. In the pursuit of these obejectives, the State shall require the automatic membership of professionals to their respective accredited professional organization."

