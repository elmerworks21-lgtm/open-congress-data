congress_website_title = "AN ACT MANDATING THE USE OF THE AUTOMATED TELLER MACHINE (ATM) TECHNOLOGY IN THE CONDUCT OF NATIONAL OR LOCAL ELECTORAL EXERCISES, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This measure mandates the Commission on Election (Comelec) to use the Automated Teller Machine (ATM) technology in the conduct of electoral exercises. The system shall involve the use of a voter's card containing the voter's PIN number and an automated machine equipped with a biometric identification system which shall further determine the identity of the voter. The voter's card shall be inserted or otherwise introduced in an appropriate manner into the machine, after which the voter electronically registers his vote. A printed copy of such transaction shall immediately be generated by the machine, which the voter signs. After signing the same, the voter shall drop the printed and signed copy of his vote in the designated ballot box. > Frrom the polling place, the machine is electronically linked to a main server in designated counting centers, thereby electronically transmitting the vote to the latter.> In case of systems failure, the printed and signed copy of the vote shall consti"

