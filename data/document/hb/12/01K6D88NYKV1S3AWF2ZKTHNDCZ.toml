congress_website_title = "AN ACT TO PROMOTE THE DEVELOPMENT OF PHILIPPINE DOMESTIC SHIPPING"
congress_website_abstract = "\"Domestic Shipping Development Act of 2002\". This bill seeks to substantiate the policy of the State to: (1) Promote Filipino ownership of vessels operated under the Philippine flag; (2) Attract private capital investment in the shipping industry; (3) Effect the upgrading of existing domestic merchant marine ______ to international standards; and (4) Ensure the continued viability of domestic ship operators."
