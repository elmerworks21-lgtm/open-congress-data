congress_website_title = "AN ACT INSTITUTING PARTIAL DEREGULATION OF THE DOWNSTREAM OIL INDUSTRY, AMENDING FOR THE PURPOSE SPECIFIC SECTIONS OF REPUBLIC ACT NUMBERED EIGHTY-FOUR HUNDRED AND SEVENTY-NINE, OTHERWISE KNOWN AS THE `DOWNSTREAM OIL INDUSTRY DEREGULATION ACT OF 1998,' AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to institute partial deregulation in the downstream oil industry by allowing the government to re-impose control over the pricing of oil products and thus protect consumers from oligoly pricing. A partially deregulated industry wouldprovide safegurads against oligopolistic dominance, price fixing and overpricing through an effective automatic pricing mechanism."

