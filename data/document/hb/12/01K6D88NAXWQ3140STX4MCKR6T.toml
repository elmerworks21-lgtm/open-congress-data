congress_website_title = "AN ACT PROVIDING FOR THE MEMBERSHIP OF DULY-ELECTED PRESIDENTS OF THE FEDERATION OF BARANGAY KAGAWADS IN THE MUNICIPAL, CITY AND PROVINCIAL SANGGUNIANS, AMENDING FOR THE PURPOSE SECTION 508 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "SANGGUNIAN MEMBERS OF BARANGAYS SHALL FORM A NATIONAL FEDERATION, WITH CHAPTERS AT THE MUNICIPAL, CITY, PROVINCIAL AND METROPOLITAN POLITICAL SUBDIVISION LEVELS, THE DULY ELECTED PRESIDENTS OF THE FEDERATION AT THE MUNICIPAL, CITY AND PROVINCIAL LEVEL, INCLUDING THE COMPONENT CITIES AND MUNICIPALITIES OF METRO MANILA SHALL SERVE AS EX-OFFICIO MEMBERS OF THE SANGGUNIANG BAYAN, SANGGUNIANG PANLUNGSOD, AND SANGGUNIANG PANLALAWIGAN, RESPECTIVELY. THEY SHALL SERVE AS SUCH ONLY DURING THEIR TERM OF OFFICE AS PRESIDENTS OF THE FEDERATION CHAPTERS, WHICH IN NO CASE SHALL BE BEYOND THE TERM OF OFFICE OF THE SANGGUNIANG CONCERNED."
