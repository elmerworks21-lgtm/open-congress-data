congress_website_title = "AN ACT RECOGNIZING THE POTENTIALS OF THE FILIPINO YOUTH TOWARD NATION BUILDING, PRESCRIBING THE FREE EXERCISE OF CERTAIN RIGHTS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Magna Carta for Youth\". Rationale: All efforts shall be exerted by the State to remove any form of prejudices against the youth. The State shall continue to extend full support for the youth's total well-being and for their consequent recognition as \"the nation's only hope for the future\". Government in all levels shall adopt policies ensuring their empowerment, emancipation, self-reliance and development through the enhancement of their skills and potentials that will enable them to compete favorably for available opportunities, become significant contributors to national progress and foster more meaningful, productive and satisfying life."
