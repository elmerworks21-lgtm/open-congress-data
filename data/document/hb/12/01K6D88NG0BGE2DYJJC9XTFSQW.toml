congress_website_title = "AN ACT CREATING THE SCIENCE AND TECHNOLOGY FUND AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Science and Technology have been recognized as the engines of growth for national development and progress. In recognition of the crucial role of science and technology in the country's drive for NIChood status the 1987 Constitution accords strong support for the development of this sector. The proceeds of the Science and Technology Fund shall be specifically utilized for capital outlays which are aimed at the realization of the following S & T thrusts: (1) Human Resource Development(HRD); (2) Institution development through upgrading of research laboratories; (3) Accelerating research and development (R&D); (4) Intensification of information and communication program and infrastructure; and (5) Enhancement of technology transffer and other technical services."
