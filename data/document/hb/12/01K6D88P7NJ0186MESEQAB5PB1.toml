congress_website_title = "AN ACT GRANTING MORE PRIVILEGES AND BENEFITS TO SENIOR CITIZENS, THEREBY AMENDING REPUBLIC ACT NO. 7432 AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill proposed to extend more privileges and benefits to senior citizens to wit: (a) that the services provided to senior citizens by institutions and establishment wholly-owned and/or operated by the government be given free of charge; (b) that all institutions, establishments and individuals catering full-time to the needs of senior citizens be given tax benefits/incent ives; and (c) that an express lane exclusively for senior citizens be opened in all institutions, whether public or private."
