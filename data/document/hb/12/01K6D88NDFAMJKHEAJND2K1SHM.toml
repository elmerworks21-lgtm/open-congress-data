congress_website_title = "AN ACT AMENDING SECTIONS 285 AND 286 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, PROVIDING FOR AN EQUITABLE DISTRIBUTION OF THE INTERNAL REVENUE ALLOTMENT (IRA) TO LOCAL GOVERNMENT UNITS"
congress_website_abstract = "This bill seeks to CORRECT the INEQUITY in distributing the IRA to LGUs by introducing poverty-sensiti ve factors in the IRA formula in lieu of population, land area and equal sharing. These are: population density, poverty incidence and the incomeclass of LGUs. Studies show that these factors, if used to calculate for IRA shares of LGUs, would favor poorer provinces, cities, muicipalities ad barangays."
