congress_website_title = "AN ACT DEVOLVING THE MANAGEMENT, OPERATION AND MAINTENANCE OF ALL MUNIPAL OR TERTIARY PORTS IN THE PHILIPPINES FROM THE PHILIPPINE PORTS AUTHORITY TO LOCAL GOVERNMENT UNITS"
congress_website_abstract = "The management, operation and maintenance of all municipal or tertiary ports in the Philippines, including revenue collection and all other activitiess relevant thereto, is hereby transferred from the Philippine Ports Authority to Local Government Units. > It is the policy of the State as emobodied in the Local Government Code, that the local government units shall enjoy genuine and meaningful local autonomy to enable them to attain their fullest development as self-reliant communities and makethem effective partners in the attainment of national goals."
