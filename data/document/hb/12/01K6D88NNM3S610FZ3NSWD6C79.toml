congress_website_title = "AN ACT CREATING THE PHILIPIINE OVERSEAS WORKERS BANK, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to further enhance the investment potentials of overseas workers while at the same time aims to address their financial needs and concerns. It provides for the establishment of a banking institution for Filipino overseas workers, tobe known as the Philippine Overseas Workers Bank, to augment their income-generati on capabilities as investors thereof. Added to this, it enjoins the government to provide the necessary financial assistance that will tremendously sustain the validity of the proposed bank."

