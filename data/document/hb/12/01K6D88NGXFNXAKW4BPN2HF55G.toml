congress_website_title = "AN ACT AUTHORIZING THE ESTABLISHMENT OF A PHILIPPINE BUSINESS REGISTRY DATABANK"
congress_website_abstract = "Rationale: At present, there is no mechanism in the Philippines for generating and maintaining a high-integrity and sustainable business database that is truly national in scope. There are efforts to address these needs, but they are fragmented, and suffer from lack of program sustainability, formats and integrity. Thus, there is a need to establish a unified, reliable and sustainable mechanism in the form of a Philippine Business Registry Databank (PBRD)."
