congress_website_title = "AN ACT TO PROMOTE THE DEVELOPMENT, UTILIZATION AND COMMERCIALIZATI ON OF RENEWABLE ENERGY SYSTEMS USING INDIGENOUS RESOURCES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Renewable Energy Act of 2002\". It is an imperative for the country to take advantage of its vast indigenous energy, resources to mitigate dependence on imported fuel leading to acceleration of countryside development and reduction of ruralpoverty. These are renewable energy resources, which include biomass, solar, wind, goethermal, hydro and ocean energy, and other emerging energey sources using new technologies. Most are abundantly but not fully utilized. This bill seeks to promoteproduction, commercializati on and utilization of renewable energey systems using indigenous resources to support the sustainable economic growth of the country. Specifically, the bill aims to promote self-reliance, sufficiency and security in the coountry's energe requirement both in electric powera nd fuel; advance rural energization, poverty eradication, and social equity; stimulate economic development in the countryside and promote the protection of environment."
