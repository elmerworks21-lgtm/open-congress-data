congress_website_title = "AN ACT BANNING THE SALE OF CIGARS AND CIGARETTES TO MINORS"
congress_website_abstract = "Prohibited Acts. - (1) It shall be unlawful for any person to sell or entertain the purchase of cigarettes or cigar products to a minor; (2) It shall be unlawful for a minor to sell cigarettes or any tobacco product; and (3) It shall be unlawful fora minor to smoke cigarettes."
