congress_website_title = "AN ACT STRENGTHENING THE SANGGUNIANG KABATAAN, AMENDING SECTIONS 308 AND 309 OF CHAPTER 2; SECTIONS 423, 430, 433, 434 AND 435 OF CHAPTER 8, AND SECTIONS 436 AND 437 OF CHAPTER 9, TITLE V OF REPUBLIC ACT NO. 7160, AND FOR OTHER PURPOSES"
congress_website_abstract = "Some of the provisions in RA 7160 that were amended by this bill focused on: 1) allocating a separate funding to the SK organizations and its officials, to be provided initially through the National Budget; 2) granting more powers to the SK officials especially in the management of their affairs; and 3) improving the SK's processes and procedures in its operations, thereby making the SK officials primarily responsible for their decisions and autonomous to local government unit/s concerned."
