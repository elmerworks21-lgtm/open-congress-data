congress_website_title = "AN ACT PROVIDING A MINIMUM FLOOR PRICE AS BASIS FOR THE DISPOSITION OF PROPERTY SUBJECT TO SALE AT THE BUREAU OF CUSTOMS, BY ADDING A NEW SECTION 2601 (A) UNDER PART 5, TITLE VI, BOOK II OF THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "The Bureau of Customs shall determine the minimum floor price of articles for disposal based on certain requirements, such as: (a) expenses of appraisal, advertisement and sale; (b) duties except in the case of abandoned and forfeited articles; (c)taxes and other charges due the Government; (d) Government storage charges; etc."
