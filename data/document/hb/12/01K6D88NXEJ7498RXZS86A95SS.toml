congress_website_title = "AN ACT TO PROMOTE THE DEVELOPMENT OF THE FOOTWEAR, LEATHER AND TANNERY INDUSTRIES, PROVIDING INCENTIVES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Footwear, Leather and Tannery Industries Development Act of 2002.\" Rationale: The footwear, leather and tannery industries are three of the oldest industries in the country. Inextricably linked, a particular industry's problem tend to affect the others. Of late, these industries have been threatened by the influx of imports of competing products. Their problem is compounded by the lack of support services like marketing and brand protection for its manufacturers.> This bill aims to ensure notjust the survival but thedevelopment of said industries under a globalized environmen. It shall create a policy environment that will foster stronger linkages between these sectors by giving incentives for skills training and capital equipment acquissition and ensuring a ready market by requiring government employees to patronize products made by these domestic industries. It shall likewise encourage these industries to tap the export market to contribute to the country's dollar earnings."
