congress_website_abstract = "This bill intends to streamline , improve and strengthen the entire disaster management system in the country. It also aims to create a more self-reliant and more effective Disaster Management Council to lessen the dependence of local governments on the national government for rescue and relief operations. It will also provide benefits for volunteers who may experience casualties in line of their duty."
