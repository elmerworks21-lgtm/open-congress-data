congress_website_title = "AN ACT PROVIDING REGULAR COMPENSATION TO ELECTED BARANGAY OFFICIALS, AMENDING FOR THE PURPOSE THE \"LOCAL GOVERNMENT CODE OF 1991,\" AS AMENDED, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This bill seeks to provide a regular compensation to elected barangay officials such as the Punong Barangay, the Sanguniang Barangay members and the Sanguniang Kabataan Chairman. The rationalization of their compensation aims to promote a high levelof performance among the concerned officials, improve administration and ensure the stability and strength of the barangay as the basic political unit of government."

