congress_website_title = "AN ACT PROVIDING FOR RELIEFS FROM AND EXECUTION OF FINAL DECISIONS AND AWARDS OF THE NATIONAL LABOR RELATIONS COMMISSION AND THE LABOR ARBITERS THEREBY AMENDING FOR THE PURPOSE ARTICLES 223 AND 224 OF THE LABOR CODE"
congress_website_abstract = "This bill seeks to ELIMINATE one (1) layer of appellate body -- the Court of Appeals in relation to the decisions of the National Labor Relations Commission. This additional layer of appeal affects the entire workforce of the country. >This bill provides that IN CASE A MOTION FOR RECONSIDERATION IS FILED, THE DECISION SHALL BE EXECUTORY AFTER TEN (10) CALENDAR DAYS FROM RECEIPT BY THE PARTIES OF THE RESOLUTION OF SAID MOTION. The bill likewise provides that DECISIONS, RESOLUTIONS OR AWARDS OF THE NATIONAL LABOR RELATIONS COMMISSION SHALL BE UNAPPEALABLE AND REVIEWABLE ONLY BY THE SUPREME COURT ON CERTIORARI UNDER RULES 65 OF THE RULES OF COURT SOLELY ON QUESTIONS OF LAW OR JURISDICTION."
