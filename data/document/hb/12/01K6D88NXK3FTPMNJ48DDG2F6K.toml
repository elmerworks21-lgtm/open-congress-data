congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NO. 6425, OTHERWISE KNOWN AS THE DANGEROUS DRUGS ACT OF 1972, AS AMENDED, BY REDUCING THE QUANTITY OF DRUGS INVOLVED AS A BASIS OF IMPOSING STIFFER PENALTIES FOR THE VIOLATION THEREOF AND BY PROVIDINGAWARDS OR INCENTIVES TO THE INFORMANT"
congress_website_abstract = "This bill has two (2) objectives: (1) First it seeks to reduce the quantities of prohibited drugs, particularly \"shabu\" or synthetic cocaine, in the application of penalties as provided in Section 20 of Republic Act No. 6425, as amended, othereiseknown as the Dangerous Drugs Act of 1972. (2) Secondly, there is the Provision of a system of rewards and incentives to the informants in the prosecution of the violation of the said law."
