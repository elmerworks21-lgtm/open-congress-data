congress_website_title = "AN ACT AMENDING ARTICLE THREE, SECTION 20 OF REPUBLIC ACT NO. 8749, OTHERWISE KNOWN AS `THE CLEAN AIR ACT', FOR THE PURPOSE OF ALLOWING LIMITED USE OF INCINERATORS IN SOLVING THE GARBAGE PROBLEM IN THE COUNTRY"
congress_website_abstract = "The Clean Air Act, RA No. 8749, is amended as follows: \"SEC. 20. LIMITED ban on Incineration. - Incineration, hereby defined as the burning of municipal, biochemical and hazardous wastes, which process emits poisonous and toxic fumes, is hereby prohibited: Provided, however, that the prohibition shall not apply to STATE-OF THE-ART INCINERATORS USING MODERN TECHNOLOGY WITH A TOLERABLE LEVEL OF TOXIC FUMES EMITTED IN THE PROCESS OF BURNING WASTE, THE USE OF WHICH IS SUBJECT TO PRIOR APPROVAL OF THE CITY GOVERNMENT TASK FORCE CREATED FOR THE PURPOSE TAKING INTO CONSIDERATION THE SAFETY OF THE ENVIRONMENT AND THE HEALTH OF THE PEOPLE: Provided further, that the prohibition shall not apply to traditional small scale method of community/neigh boorhood sanitation \"siga\", traditional, agricultural, cultural, health and food preparation and crematoria: x x x.\""

