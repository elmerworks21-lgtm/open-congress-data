congress_website_title = "AN ACT AMENDING SECTION 8 OF REPUBLIC ACT NO. 8189, OTHERWISE KNOWN AS AN ACT PROVIDING FOR A GENERAL REGISTRATION OF VOTERS, ADOPTING A SYSTEM OF CONTINUING REGISTRATION, PRESCRIBING THE PROCEDURES THEREOF AND AUTHORIZING THE APPROPRIATION OF FUNDSTHEREFOR"
congress_website_abstract = "Section of RA 8189 is hereby amended to read as follows: > The personal filing of application of voters shall be conducted daily in the office of the Election Officer during regular office hours. Provided however, that the Election Officer with theconcurrence of the Members of the Election Registration Board, are authorized to conduct the system of continuing registration outside the Office of the Election Officer, in a specified time and designated place, in cases of island barangays and other strategic areas here it is more convenient for the voters to register. No registration shall, however, be conduted during the period starting one hundred twenty (120) days before a regular election and ninety (90) days before a special election."

