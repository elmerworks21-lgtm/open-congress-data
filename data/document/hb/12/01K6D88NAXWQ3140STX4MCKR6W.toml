congress_website_title = "AN ACT PROVIDING FOR THE STRENGTHENING OF NON-FORMAL EDUCATION BY CREATING ITEMS FOR DISTRICT NON-FORMAL EDUCATION COORDINATORS AND TEACHERS AND FOR OTHER PURPOSES"
congress_website_abstract = "The position of district NON-FORMAL EDUCATION COORDINATOR is hereby created in every school district in the Philippines. Elementary grade teachers who are actually designated and performing the duties and functions od a district non-formal educationcoordinator shall have the rank and privileges of an elementary school principal, subject to adjustments approved by the Department of Budget and Management (DBM)."
