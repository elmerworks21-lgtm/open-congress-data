congress_website_title = "AN ACT LOWERING THE RETIREMENT AGE FOR PUBLIC SCHOOL TEACHERS FROM SIXTY (60) TO FIFTY-FIVE (55) YEARS OLD AND FOR OTHER PURPOSES"
congress_website_abstract = "Any public teacher, upon reaching the age of fifty five (55) years but not beyond the compulsory retirement age of sixty (60) years, and has served at least twenty (20) years as a public school teacher, may retire and shall immediately be entitled to all the retirement benefits provided for under the existing laws. >Our public school teachers deserve to enjoy the fruits of their labors. Lowering their compulsory retirement age to 55 years will ensure that our teachers will have the opportunityto fully utilize their benefits and enjoy their life free from the pressures of their job. Thus, for humanitarian reasons, the passage of this bill is earnestly requested."

