congress_website_title = "AN ACT TO SUPPLEMENT COMMONWEALTH ACT NUMBERED ONE HUNDRED EIGHTY-SIX, AS AMENDED, REPUBLIC ACT NUMBERED THREE HUNDRED AND FORTY, REPUBLIC ACT NUMBERED NINE HUNDRED AND TEN, AS AMENDED, AND PRESIDENTIAL DECREE NUMBERED ONE THOUSAND ONE HUNDRED FORTY-SIX, AND FOR OTHER PURPOSES"
congress_website_abstract = "Any person who has served in any branch of the government service either in the national government, Judiciary, Armed Forces of the Philippines, the Philippine National Police or government-owne d and/or controlled corporation shall be credited forthe length of service actually rendered upon reinstatement to another branch of service: Provided, That if the person has retired and subsequently reinstated in another branch or in the same branch of service, he shall be entitled to a retirement benefit equivalent to certain specified rates."

