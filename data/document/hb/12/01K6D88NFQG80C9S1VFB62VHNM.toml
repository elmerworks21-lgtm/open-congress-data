congress_website_title = "AN ACT PROVIDING FOR THE INCLUSION OF THE MINORITY FLOOR LEADER OF THE SANGGUNIAN CONCERNED IN THE MEMBERSHIP OF THE LOCAL SCHOOL BOARDS, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: It is a well known fact that the Minority in any Sanggunian represents the other side in the community. They are the fiscalizers in the disbursement of funds and promulgation of laws in the Sanggunian and their presence in the Local School Board will give added assurance that the administration of this Special fund is subjected to the scrutiny and safeguard that it deserves. Also, this will help promote the general support to programs formulated by the Board and will contribute to asound local governance."

