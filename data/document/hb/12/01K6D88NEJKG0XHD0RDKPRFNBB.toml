congress_website_title = "AN ACT TOTALLY BANNING LOGGING OPERATIONS FOR THE NEXT TWENTY-FIVE (25) YEARS"
congress_website_abstract = "It shall be unlawful for any person to cut, fell or destroy any tree standing on any forest, timber land, forest reserve or watershed within the next twenty-five (25) years from the approval of this Act. This prohibition shall not apply to trees grown in legitimate commercial tree farms."
