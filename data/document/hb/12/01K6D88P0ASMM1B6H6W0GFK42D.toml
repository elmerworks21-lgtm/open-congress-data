congress_website_title = "AN ACT GRANTING TWENTY PERCENT (20%) DISCOUNT ON ELECTRICITY, WATER AND TELEPHONE BILLS OF SENIOR CITIZENS WHOSE INCOME DOES NOT EXCEED ONE HUNDRED TWENTY THOUSAND PESOS PER ANNUM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7432, OTHERWISE KNOWN AS `THE SENIOR CITIZENS ACT'"
congress_website_abstract = "Explanatory Note: As used in this Act, the term \"senior citizens\" shall mean any resident of the Philippines at least sixty (60) years old, including those who have retired from government offices and private enterprise, and has an income of not more than ONE HUNDRED TWENTY THOUSAND (P120,000.00) [Sixty Thousand (P60,000.00) pesos per annum, subject to review by the National Economic and Development Authority (NEDA) every three years.\" > This bill proposes the grant of TWENTY PERCENT (20%) DISCOUNT relative to the utilization of ELECTRICITY, WATER AND TELEPHONE, INSTALLED IN THEIR HOMES, in addition to the discounts already granted to senior citizens."
