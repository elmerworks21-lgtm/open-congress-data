congress_website_title = "AN ACT PROHIBITING DISCRIMINATION ON THE BASIS OF SEXUAL ORIENTATION AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "For purposes of this Act, sexual orientation refers to the choice of or the focus given by a person to another as the object of affection and/or sexual energies, such other person not necessarily belonging to the opposite sex, as in the case of homosexuals. >This bill states certain DISCRIMINATORY PRACTICES, such as: >(a)Denying access to public service, including military service; >(b) Including sexual orientation in the criteria for hiring, promotion, etc. >(c) Denying access to medical and other health services; >(d) Refusing admission to educational institutions; >(e) Denying application for license; etc."
