congress_website_title = "AN ACT TO ENSURE PUBLIC ACCESS TO OFFICIAL INFORMATION AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Right to Information Act of 2003.\" Rationale: The people's right to official information is not only a political imperative. It is also essential in economic life. A free flow of official information results in better government polices. It provides the institutional foundation for a more responsive government planning by enhancing the capacity of the public to provide timely feedback to government. The availability of official information widens the base for the generation of more knowledge about key development issues, not only by researchers and academic institutions, but also by the public at large. > This Act, therefore, seeks to (a) put in place a uniform, simple, speedy and effective means of enforcing the right to information;; (b) provide a clear penalty for the unlawful denial of access to official information; and (c) clarify further the scope of the guarantee by defining its coverage."
