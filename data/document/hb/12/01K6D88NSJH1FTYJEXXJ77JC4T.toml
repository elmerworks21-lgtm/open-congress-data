congress_website_title = "AN ACT FURTHER STRENGTHENING THE HOME DEVELOPMENT MUTUAL FUND AND FOR OTHER PURPOSES"
congress_website_abstract = "In order to STRENGTHEN the Home Development Mutual Fund, this bill proposes the following: 1. Removal of the Thirty-two Percent (32%) corporate tax assessed on the Fund; 2. Grant of authority to deal direclty and actively engage in portfolio management to maximize the Fund's viability; 3. Adjustment in the employer's contribution to the Fund at the rate of TWO PERCENT(2%) of the monthly pay of the member; and 4. EXEMPTION of the Fund for the coverage of the Salary Standardization Law."

