congress_website_title = "AN ACT REQUIRING CAR COMPANIES TO PUT UP SUB-ASSEMBLY PLANTS FOR THE LOCAL MANUFACTURE OF CERTAIN CAR OR AUTO PARTS"
congress_website_abstract = "Car manufacturing is undubtedly a profitable industry raking millions of millions in profits. However, since the motoring public buy their car or auto parts at prices that are not well within their financial capacity, the author of this bill envisions that if the car companies could be indeed be required to set up sub-assembly lines with the use of local raw materials and local labor, then it will not only generate employment opportunities but it will significantly lower the prices of these caror auto parts."

