congress_website_title = "AN ACT TO PROMOTE AND REGULATE THE CABLE TELEVISION SERVICES IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Cable TV Act of 2001\". Laws governing our CATV Industry are one of those than need legal remediation. Seriously confronted with legal interrogatives brought on by contradictions among the laws governing the industry, the growth potential of the CATV industry is greatly stifled. This bill seeks to address such concerns by laying down the legal basis not only for the entry of capital, acquisition of state-of-the-ar t CATV technology, transmission, programming and production, but will also rationalize government regulation on the industry through clear delineation of the powers of the regulating body and by the formulation of provisions specific and categorical to the industry."
