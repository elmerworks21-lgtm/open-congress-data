congress_website_title = "AN ACT ESTBALISHING THE PRE-NEED PLAN CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: The proliferation of pre-need corporations has raised questions on the industry's financial capabilities specifically on its ability to provide security to its investors and planholders. There is a need to regulate the industry to protectits investors and planholders from fraud by pre-need corporations. There is likewise a need to regulate the industry to protect it from unscrupulous pre-need corporations who may take advantage of the good name of honest members of the industry. There is a need to provide regulatory standards within the industry to ensure a level playing field to enable potential purchasers true freedom of choice. Finally, there is a need to strengthen government's regulatory capabilities to insure that the inndustry serves its purpose, does not become a forum for abuse."
