congress_website_title = "AN ACT ESTABLISHING FOR EACH REGION A FIVE (5) HECTARE ARBORETUM, DECLARING IT AS PROTECTED AREAS FOR ECOLOGICAL PRESERVATION, ALLOCATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "There shall be established in each region, under the direct supervision of the Department of Environment and Natural REsources, a five (5) hectare arboretum which shall be declared as protected areas for the purpose of ecological preservation. The National Capital Region (NCR), the Autonomous Region of Muslm Mindanao (ARMM) and the Cordillera Autonomous Region (CAR) shall be included in the regions where this Act shall be implemented."
