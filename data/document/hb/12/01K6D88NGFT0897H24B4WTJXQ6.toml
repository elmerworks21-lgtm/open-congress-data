congress_website_title = "AN ACT PROHIBITING THE PRODUCTION OF FILMS THAT DEPICT THE LIFE STORIES OF CRIMINALS FOR COMMERCIAL PURPOSES AND FOR OTHER PURPOSES"
congress_website_abstract = "It is the policy of the State to uphold the rule of law and demand compliance therewith by enforcing penalties. The State shall prohibit the production of films depicting the life stories of criminals, thereby depriving them of the opportunity to profit from their misdeeds by selling the film rights of their life stories. The State shall likewise, penalize unscrupulous film producers who glorify criminals by producing films that draw bias towards the criminal and in the process depriving the movie goind public the right to an intelligent, decent, respectable and wholesome entertainment."
