congress_website_title = "AN ACT CREATING THE NATIONAL AGRARIAN REFORM ADJUDICATION COMMISSION, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Despite the good intentions behind its creation, the DARAB is beset with serious structural flaws, specifially, with respect to its composition and its capacity to effectively discharge its mandated tasks. To remedy this situation, this bill proposes to create the NARAC which shall have jurisdiction over all agrarian disputes. Its adjudicatory functions shall be exercised through five (5) divisions, acting independently of each other."
