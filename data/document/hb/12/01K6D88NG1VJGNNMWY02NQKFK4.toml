congress_website_title = "AN ACT ALLOWING NATURAL-BORN CITIZENS OF THE PHILIPPINES WHO HAVE LOST THEIR FILIPINO CITIZENSHIP TO RETAIN CERTAIN RIGHTS AND PRIVILEGES, SUBJECT TO CERTAIN CONSTITUTIONAL LIMITATIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Erswhile Filipino Citizens' Reacquisition of Rights and Privileges of 2001.\" Some of the rights and privileges include: (a) Opertions of rural banks; (b) Engaging in retail business; (c) Operation of registered overseas shipping; (g) Contracts for the supply of materials, equipment, goods and commodities for the government; (h) Engaging in customs brokerage business."
