congress_website_title = "AN ACT INSTITUTING A COMPREHENSIVE `KAUNLARAN NG KABATAAN AT MAMAMAYAN DEVELOPMENT PROGRAM' TO PROMOTE THE PHYSICAL, INTELLECTUAL AND SOCIAL WELL-BEING OF YOUNG PEOPLE AND APPROPRIATING FUNDS THEREOF"
congress_website_abstract = "The bill proposes to establish a comprehensive Youth Development Program. It seeks to promote the involvement of the youth in the character building and development activities for a civic efficiency, self-improvemen t and economic well-being. The programs are composed of various components such as: sports development, scholarship, livelihood training and cooperative organization. These areas of development will provide our youth the necessary opportunities to discover their social and economicpotentials to become self-reliant, productive and responsible citizens of the country."
