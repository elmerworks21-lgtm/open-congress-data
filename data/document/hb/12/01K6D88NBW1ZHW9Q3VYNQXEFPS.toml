congress_website_title = "AN ACT STRENGTHENING THE PHILIPPINE COAST GUARD AND VESTING IN IT THE PRIMARY RESPONSIBILITY OF ENFORCING MARITIME SAFETY RULES AND REGULATIONS AS WELL AS ANY OTHER MATTER RELATED TO THE PERFORMANCE OF SAFETY OF LIFE AND PROPERTY FUNCTIONS WITHIN PHILIPPINE TERRITORIAL WATERS AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Time and again, our inter-island vessels have been overloading on cargo and passengers, and this contributed to a number of sea tragedies. The tragedies notwithstanding , the overloading continues unabated because of greed for profits/money on the part of the shipping lines and the persons responsible for overseeing violations against loading capacities and limits. In the same manner, these inter-island vessels have been sailing without the necessary equipment and paraphernalia mandated by the safety of the vessels and their cargo passengers. Thus, this bill."

