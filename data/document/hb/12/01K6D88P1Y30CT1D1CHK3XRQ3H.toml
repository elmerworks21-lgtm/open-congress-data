congress_website_title = "AN ACT ESTABLISHING A GLOBAL AGRICULTURAL LIBERALIZATION EQUITY MECHANISM FOR FARMERS BY SUBSIDIZING THE PRICE DIFFERENTIAL BETWEEN INTERNATIONAL AND DOMESTIC INPUTS TO AGRICULTURAL PRODUCTION, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"GALE Act of 2002 - Global Agricultural Liberalization Equity\" . It is the intention of this bill to make the agriculture industry competitive so the government does not have to import rice, sugar and corn. The support will come in the form of allotting sufficient financial support that will cover the price differential of agricultural inputs such as seeds, fertilizers, fuel as well as the high interest rates of loanable funds."
