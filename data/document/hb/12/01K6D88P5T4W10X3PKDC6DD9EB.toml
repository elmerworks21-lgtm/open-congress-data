congress_website_title = "AN ACT RESTRUCTURING THE EXCISE TAX ON AUTOMOBILES, AMENDING FOR THE PURPOSE SECTION 149 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED(MOTOR VEHICLES)"
congress_website_abstract = "this bill aims to address the inequities, complications and inefficiencies in the taxation of the automobile industry by: (1) Redefining the term \"automobile\" by including into ta tax net automobiles with 10 or more seating capacity including the driver; (2) Removing the engine displacement and differentiation according to fuel type used in the structure and the adoption of a simple value-based taxation; (3) Exempting special purpose vehicles like ambulance, hearse, etc. for social and/or other policy considerations; and (4) Indexation of the net manufacturer's price every two years or when an extraordinary inflation or deflation of the currency will occur."
