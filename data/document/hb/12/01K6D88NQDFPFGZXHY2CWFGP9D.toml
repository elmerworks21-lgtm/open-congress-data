congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AND PROVIDING FOR THE RATIONALIZATION OF WAGE LEVELS ON A NATIONAL OR INDUSTRIAL BASIS"
congress_website_abstract = "After twelve years of experience, serious questions have been raised regarding the effectiveness of these Regional Tripartite Wage and Productivity Boards in formulating and prescribing fair and equitable wage rates at the regional level. Their ability and that of the National Wage and Productivity Commission itself to quickly respond to changes in the prices of oil, transport and basic commodities have been put into question. This bill, therefore, seeks to REPLACE the system of wage fixing atthe NATIONAL LEVEL that takes into account, among others, COUNTRY CONSIDERATIONS. Wage fixing authority is therefore vested in the NATIONAL WAGES AND PRODUCTIVITY COMMISSION."
