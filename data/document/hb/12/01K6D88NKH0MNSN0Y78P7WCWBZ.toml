congress_website_title = "AN ACT REPEALING THE PROVISIONS ON VAGRANCY AND AMENDING THE LAW ON PROSTITUTION AS DEFINED AND PENALIZED IN ARTICLE 202 OF THE REVISED PENAL CODE"
congress_website_abstract = "Article 202 of the Revised Penal Code is hereby REPEALED. The following amendment is therefore proposed: Prostitutes - Penalty. - For purposes of this article, MEN and women who, for money or profit, VOLUNTARILY AND habitually indulge in sexual intercourse or lascivious conduct, are deemed to be prostitutes. Any person found guilty OF ENGAGING IN PROSTITUTION AS DEFINED IN THIS ARTICLE shall be punished by DESTIERRO or a fine RANGING FROM 1,000 TO 3,000 PESOS, OR BOTH, IN THE DISCRETION OF THECOURT, and in case of recidivism, by PRISION CORRECCIONAL or a fine ranging from 3,000 TO 5,000 PESOS, or both, in the discretion of the court."

