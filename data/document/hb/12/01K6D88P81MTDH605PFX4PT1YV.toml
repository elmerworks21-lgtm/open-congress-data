congress_website_title = "AN ACT STRENGTHENING THE REGULATION OF RADIATION FACILITIES AND OF MEDICAL, HEALTH AND RADIATION DEVICES, ESTABLISHING THE BUREAU OF DEVICES AND RADIATION HEALTH AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Devices and Radiation Health Act of 2003\" At present there are approximately 3,500 x-ray facilities and 5,000 radio frequency and microwave radiation facilities nationwide. There are also about 10,000 types of medical, health-related and radiationdevices. This is a multi-billion dollar industry that needs to be regulated because their products affect human health. Moreover, there is also the global movement toward harmonization of device regulation. Hence there is a need to strengthen the Department of Health's regulatory mandate on device regulation. This bill proposes to strengthen the regulation of radiation facilities and radiation devices, and the regulation of medical and health related devices."

