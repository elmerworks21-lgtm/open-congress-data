congress_website_title = "AN ACT INSTITUTING THE DANGEROUS DRUGS ACT 2001, REPEALING REPUBLIC ACT NO. 6425, AS AMENDED"
congress_website_abstract = "The proposed Dangerous Drugs Act of 2001 seeks to update the existing law on drugs. This bill is a comprehensive legal framework for combatting the drug menace. It also strengthens the Dangerous Drugs Board by involving more government units as wellas nongovernment participation in policy-making. > This bill also provides for a single definition of dangerous drugs (both prohibited and regulated) and defines dangerous drugs preparation with corresponding penalties. Capital punishment is also mandated on those found guilty in possession of 15 grams of \"shabu\", down from the unusually high 200 grams."
