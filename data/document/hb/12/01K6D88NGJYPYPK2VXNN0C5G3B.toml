congress_website_title = "AN ACT EXEMPTING FROM INCOME TAXATION CERTAIN RENTALS ON RESIDENTIAL/APA RTMENT OR OTHER DWELLING UNITS, ALLOWING THEM TO BE DEDUCTIBLE FROM TAXATION FIXED INCOME OF THE TENANTS OR INDIVIDUALS WHO PAY SAID RENTALS"
congress_website_abstract = "Rentals or leases paid during a taxable period by tenants or individuals for occupancy of residential/apa rtment or dwelling units shall be exempted from internal revenue tax and shall be deductible from their taxable fixed income earned during thesaid taxable period: Provided, that the amount of rentals or leases covered by such exemption shall not exceed Five Thousand Pesos (P5,000.00) per month for those residing within Metro Manila, Two Thousand Five Hundred Pesos (P2,500.00) per month forthose residing outside of Matro Manila: and Provided, further that such payments are duly covered by valid rental or lease contract agreement/s for occupancy of the residential/apa rtment or dwelling unit/s and by official receipts indicating paymennt of rentals/leases for purposes of establishing authenticity of claims for tax exemptions."

