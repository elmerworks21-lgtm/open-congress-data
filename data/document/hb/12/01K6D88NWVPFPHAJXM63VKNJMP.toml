congress_website_title = "AN ACT DEFINING TERRORISM, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The very grave threat to the Filipino people posed by violent terrorist acts is documented by the events during the past months as well as the past few years. The attack has prompted the international community to talk about a global effort to eradicate terrorism. We join the call for an international effort to deprive terrorists of their extra-territori al sanctuaries. This is not America's war alone. This is civilized society's war against terrorism. The local terrorists have strengthened themselves by linking up with, and getting support from, international terrorist organizations.> The grave threat to the security of our people - terrorism must be addressed effectively. Our law enforcement agencies must be provided with suffficient tools and training to counter this present-day menace. The proposed bill is designed to improve the substantive provisions of our penal laws to directly address terrorism including the movement of suspected foreign terrorists and their vario"
