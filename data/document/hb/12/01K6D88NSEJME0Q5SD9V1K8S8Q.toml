congress_website_title = "AN ACT REQUIRING THAT ALL LIQUOR CARRY A WARNING ON THE BOTTLE ITSELF OR ON THE LABEL THAT ALCOHOL DURING PREGNANCY IS HAZARDOUS TO THE LIFE AND HEALTH OF THE UNBORN CHILD"
congress_website_abstract = "Rationale: It is now established by studies and researches that drinking alcohol during pregnancy causes serious physical and mental conditions in the fetus. The result on the infant is now known as FETAL ALCOHOL SYNDROME (FAS). Unlike drugs such as barbiturates or opiates, alcohol can attack virtually any of the body's cells. The FAS is entirely preventable. All a mother has to do is to stop drinking during pregnancy, or even better not to drink at all before, during and after pregnancy, particularly when breastfeeding. Beer, wine and hard liquor all have the sane effect."
