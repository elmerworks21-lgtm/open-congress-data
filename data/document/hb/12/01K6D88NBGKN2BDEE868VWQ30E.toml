congress_website_title = "AN ACT PROVIDING FOR ADDITIONAL BENEFITS TO SENIOR CITIZENS, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SEVENTY-FOUR HUNDRED AND THIRTY-TWO"
congress_website_abstract = "This bill proposes that inasmuch as the Municipal Federation of Senior Citizens Association has now organized themselves into a Provincial Federation of Senior Citizens Association, there is a need to establish an Office of the Senior Citizens Affairs (OSCA) in the Office of the Governor and City Mayor to be headed by a Provincial Board Member and a City Councilor, respectively. > Due to the high cost of funeral services, there is also a need to include among the privileges now enjoyed by senior citizens, a 20% discount on purchases of funderal services (on a pre-need basis) to lessen the burden of the family left behind by the elderly when he passes on."
