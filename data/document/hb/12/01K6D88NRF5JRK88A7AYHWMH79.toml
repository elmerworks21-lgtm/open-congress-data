congress_website_title = "AN ACT REQUIRING THE PARALLEL TRANSLATION IN THE FILIPINO LANGUAGE OF THE LABELS, INSTRUCTIONS AND LITERATURES OF DRUGS AND MEDICINES MANUFACTURED, DISTRIBUTED OR SOLD IN THE PHILIPPINES AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "This Act shall cover all the drugs and medicines that are manufactured, distributed or sold within the territory of the Republic of the Philippines. >It shall be mandatory for all manufacturers and distributors in the Philippines to provide a parallel translation in the Filipino language of all the labels, instructions and literatures in the bottle, box or pack of drugs and medicines before sale to the public."

