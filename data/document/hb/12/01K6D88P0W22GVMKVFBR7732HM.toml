congress_website_title = "AN ACT PROVIDING FOR A NATIONAL REFERENDUM ON THE SECOND MONDAY OF JULY, IN THE YEAR TWO THOUSAND AND THREE, TO SUBMIT TO THE ELECTORATE THE MATTER OF WHETHER OR NOT AMENDMENTS TO, OR REVISION OF, THE CONSTITUTION SHOULD BE UNDERTAKEN AND BY WHAT MANNER, AUTHORIZING APPROPRIATIONS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It is the policy of the State to submit to the electorate any question of grave national interest, recognizing that sovereignty resides in the people and all government authority emanates from them. It is also the policy of the State to assure that any amendments to, or revision of, the Constitution shall be undertaken in the manner prescribed by law."
