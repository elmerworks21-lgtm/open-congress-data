congress_website_title = "AN ACT ALLOWING THE IMPORTATION OF LIVE ANIMALS, MEAT AND MEAT PRODUCTS ONLY FROM ZONES DECLARED BY THE OFFICE INTERNATIONAL DES EPIZOOTIES (OIE) AS \"FMD (FOOT AND MOUTH DISEASE) FREE ZONES WHERE VACCINATION IS NOT PRACTICED\""
congress_website_abstract = "Recognizing that the livestock industry has the potential for engendering the development of the countryside and enhancing food security, and serving as an instrument for employment generation and economic growth, it is hereby declared the policy ofthe State to promote the ERADICATION of foot and mouth disease through the prevention of the entry of additional FMD serotypes into the country."
