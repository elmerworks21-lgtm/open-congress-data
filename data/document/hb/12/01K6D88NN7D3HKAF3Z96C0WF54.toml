congress_website_title = "AN ACT CREATING THE PHILIPPINE OIL CORPORATION, DEFINING ITS POWERS AND FUNCTIONS, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The Philippine Oil Corporation, Domicile and Term. - There is hereby created a body corporate to be known as the Philippine Oil Corporation, hereinafter referred to as the \"Corporation\" which shall monitor and control the country's requirements forrefined petroleum products and shall integrate the refining, marketing and distribution functions to meet the domestic oil requirement. The principal office of the Corporation shall be determined by its Board of Directors. It may establish such officers, agencies, subsidiaries, branches or correspondents in the Philippines or abroad as its business operations would require. The Corporation shall have a term of fifty (50) years from the creation hereof, which shall be deemed renewed for an equall period unless sooner dissolved by law."
