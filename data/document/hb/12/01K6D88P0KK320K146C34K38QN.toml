congress_website_title = "AN ACT PROVIDING SUBSIDY TO PRIVATE HOSPITALS AND CLINICS WHICH ADMIT FOR CONFINEMENT AND TREATMENT INDIGENT PATIENTS UNDER EMERGENCY CASES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Any provision of law to the contrary notwitstanding hospital expenses of indigent patients admitted and confined in private hospitals and clinics under emergency cases shall be subsidized by the government. > Any person who shall avail of the financial assistance granted under this Act shall apply for an indigent identification card with the Department of Social Welfare and Development upon submission of proof of indigency as provided under Section 1 hereof.> The hospital concerned shall transmit monthly billings to the Department of Health of the total emergency admission fee extended to emergency patients under this Act which shall include the relevant information regarding the patient and the facilities extended."

