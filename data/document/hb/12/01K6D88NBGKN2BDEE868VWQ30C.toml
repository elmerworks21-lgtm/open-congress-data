congress_website_title = "AN ACT ESTABLISHING A NATIONAL TOURISM POLICY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This bill substantiates the State policy to (1) ensure the development of Philippine tourism that is for and by the Filipino people, conserving and promoting our heritage, national identity and sense of unity; (2) recognize tourism development as integral to the national socioeconomic development efforts to improve the quality of life of the Filipino people, receiving the appropriate attention and financial support necessary for the growth of this industry; and (3) promote a tourim industry that is ecologically sustainable by maintaining a balance between economic devleopment, environment and natural resource protection."
