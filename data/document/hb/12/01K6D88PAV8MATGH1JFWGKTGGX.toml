congress_website_title = "AN ACT TO LIBERALIZE THE OPERATIONS OF RURAL BANKS AMENDING FOR THAT PURPOSE REPUBLIC ACT NO. 7353, OTHERWISE KNOWN AS THE 'RURAL BANKS ACT OF 1992'"
congress_website_abstract = "To provide adequate credit facilities to farmers and merchants, or to cooperatives of such farmers and merchants; and to promote rural savings, the bill seeks to liberalize the operations of rural banks by introducing the following amendments, among others, to the Rural Banks Act of 1992: a) consider rural banks which have extended 8% of loan portfolio to small enterprises as being in full compliance of the small and medium credit mandatory allocation provided in RA 6977, as amended by RA 8289; b) liberalization of the nationality requirement to allow former Philippine nationals to acquire capital stock in rural banks; c) exemption of rural banks from the independent capital requirement; d) exemption of rural banks from the payment of gross receipts tax or value-added tax for a period of ten years."
