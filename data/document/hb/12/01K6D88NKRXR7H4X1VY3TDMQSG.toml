congress_website_title = "AN ACT TO EXEMPT TO THE MEMBERS OF THE JUDICIARY, INCLUDING THE CHIEF JUSTICE AND THE ASSOCIATE JUSTICES OF THE SUPREME COURT, AND THEIR PERSONNEL FROM THE COVERAGE OF REPUBLIC ACT NO. 6758, OTHERWISE KNOWN AS THE SALARY STANDARDIZATION LAW"
congress_website_abstract = "Rationale: Private law practice is undeniably a lucrative job. There is no wonder why private lawyers all over the country and even internationally get good pay and are in the upper economic strata of society. The economic returns, however, of those lawyers who by their own free volition preferred to trudge the road to public service in the administration of justice in our society are undeniably very low. From this vantage point, we can see the huge economic disparity that the members of our judicial branch of government and their staff have suffered and forego compared with those in the private practice."
