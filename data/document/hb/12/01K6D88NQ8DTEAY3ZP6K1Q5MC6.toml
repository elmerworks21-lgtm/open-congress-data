congress_website_title = "AN ACT PROVIDING FOR REASONABLE COMPENSATION AND BENEFITS FOR THE LOSS OF LIVES, INJURIES AND DAMAGES TO PROPERTY SUFFERED BY NON-COMBATANT INDIVIDUALS IN THE COURSE OF OPERATIONS BY THE MILITARY, POLICE AND/OR OTHER LAW ENFORCEMENT AGENCIES AND FOROTHER PURPOSES"
congress_website_abstract = "Rationale: It is the sacred duty of the State to preserve peace and order and to protect the society by ensuring the proper enforcement of the Constitution and other national laws. But in the course of performing this mandated duty, it is sometimesinevitable that damages are inflicted upon innocent civilians and non-combatants in the form of physical injuries, even death, and destruction of property. > Compensation and Rehabilitation of Non-combatant Victims. The law enforcement agency/ies conducting the operation, the Department of Social Welfare and Development, the Department of Health, the corresponding government hospital and the local government unit concerned shall provide immediate relief to non-combatant individuals who are victtims of operations of the military, police and/or other law enforcement agencies. However, whatever amount a particular local government unit might shell out to fulfill the intent of this Act shall be reimbursed by the Board. >The Board, upon favorab"

