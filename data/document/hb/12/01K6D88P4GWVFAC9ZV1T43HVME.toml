congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NO. 2640, OTHERWISE KNOWN AS `AN ACT TO CREATE A PUBLIC CORPORATION TO BE KNOWN AS THE VETERANS FEDERATION OF THE PHILIPPINES, DEFINING ITS POWER AND FOR OTHER PURPOSES'"
congress_website_abstract = "This bill seeks to recongize the Veterans Federation of the Philippines as a NON-PUBLIC, NON-GOVERNMENT ORGANIZATION. It also relieves the Secretary of National Defense of the responsibility of managing a purely civilian organization so taht he canconcentrate on his primary governmental function of ensuring the security of the country."

