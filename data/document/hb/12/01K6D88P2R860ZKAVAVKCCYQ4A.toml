congress_website_title = "AN ACT EXEMPTING POP, ROCK OR SIMILAR CONCERTS FROM THE PAYMENT OF AMUSEMENT TAX ON GROSS RECEIPTS, AMENDING FOR THE PURPOSE PARAGRAPH (c), SECTION 140 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: The author of this bill explains: It is our position that, Local Government Code's (RA 7160) imposition of an amusement tax on thirty percent (30%) of the gross receipts from admission fees to pop, rock and similar concerts is counter tothis constitutional mandate. Paragraph (c) of Section 140 of the said law states that, \"The holding of operas, concerts, dramas, recitals, painting and art exhibitions, flower shows, musical programs, literary and oratorical presentations, except pop, rock, or similar concerts shall be exempt from the payment of the tax herein imposed.\" It is to be noted that \"pop, rock, or similar concerts\" are not exempt from the payment of the amusement tax. The imposition of the said tax to these live concerrnts discourahes the organizers and the artists from holding concerts in various venues nationeide in the effort to promote Filipino talents, culture and values."

