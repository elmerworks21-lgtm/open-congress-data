congress_website_title = "AN ACT DEFINING AND PENALIZING THE CRIME OF ENFORCED OR INVOLUNTARY DISAPPERANCE AND FOR OTHER PURPOSES"
congress_website_abstract = "Victim of enforced or involuntary disapperanace shall have the absolute right to immediately inform his/her family, relative, lawyer/s or a human organization by all means that are available and expeditious on his/her whereabouts and condition. Anyperson keeping, arresting or detaining a victim of enforced or involuntary disappearance or who shall learn or have information of such fact shall have the duty to immediately report in writing on the circumstances and whereabouts of such victim to the nearest government authorities as well as the victim's family, relatives, lawyer's or to a human rights organization by the most expedient means. > The penalty of reclusion perpetual shall be imposed upon any person who committed enforced or involluntary disapperance. The penalty of reclusion temporal shall be enforced on those who attempt to commit enforced or involuntary disapperance but without having participated therein either as principals or accomplices took part subsequent to its comm"

