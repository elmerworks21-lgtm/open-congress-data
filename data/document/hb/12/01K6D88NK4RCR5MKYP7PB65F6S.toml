congress_website_title = "AN ACT DEFINING COMPUTER CRIMES, PROVIDING PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Computer Abuse Act of 2000\". This bill outlaws the following: (1) Illegal access to computers, computer systems, computer networks, computer servers, and database; (2) Obtaining information on the financial records of a customer of a financial institution without the proper authorization: (3) Obtaining, publishing, and giving out the password to another persons's account; and (4) Unleasing computer viruses."

