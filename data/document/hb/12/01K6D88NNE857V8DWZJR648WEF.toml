congress_website_title = "AN ACT PROVIDING FOR THE MAINTENANCE AND SUPPORT OF ELDERLY MEMBERS OF THE FAMILY AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Elderly Support Act of 2001\". Children shall maintain and support their father and/or other direct ascendants who are \"in need\". > Where an elderly member claims to be in need of financial and other support, he/she may, by himself/herself or through a representative of the Department of Social Welfare and Development (DSWD) or by counsel, file a petition in court for his/her maintenance and support for any or all of his/her children.> Upon trial, the elderly member shall be represented by a lawyer from the public attorney's office and shall be exempt from all charges and legal fees."

