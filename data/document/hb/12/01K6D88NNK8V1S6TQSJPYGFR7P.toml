congress_website_title = "AN ACT RESTORING THE EFFECTIVITY OF C.A. 542 ENTITLED 'AN ACT TO CREATE A CORPORATION TO BE KNOWN AS THE GIRL SCOUTS OF THE PHILIPPINES, AND TO DEFINE ITS POWERS AND PURPOSES,' AS AMENDED BY REPUBLIC ACT NO. 4375, PRESIDENTIAL DECREE NO. 720, AND EXECUTIVE ORDER NO. 267 SERIES OF 1987 AMENDING FOR THAT PURPOSE EXECUTIVE ORDER NO. 495 SERIES OF 1991 BY EXCLUDING FROM ITS COVERAGE SAID CORPORATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "The continuity of the existence of the Girl Scouts of the Philippines as a corporation created by law under Commonwealth Act 542, as amended is hereby authorized and affirmed. Said corporation shall continue to exercise and enjoy the same functions, powers, privileges, and benefits as are granted to it under Commonwealth Act 542, as amended and all other applicable laws."
