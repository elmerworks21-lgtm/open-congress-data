congress_website_title = "AN ACT PROHIBITING ALL RETIRED AND ACTIVE MILITARY AND POLICE PERSONNEL, INCLUDING OFFICERS, FROM BEING APPOINTED IN A CONCURRENT OR ANY OTHER CAPACITY TO THE POSITIONS OF SECRETARY, UNDERSECRETARY, HEAD OR MEMBER OF GOVERNING BODIES OF GOVERNMENT-OWNED OR -CONTROLLED CORPORATIONS AND AGENCIES AND OTHER EQUIVALENT POSITIONS"
congress_website_abstract = "Civilian bureaucracy has been militarized since the late Pres. Marcos appointed military men to civilian positions. This practice has been continued to ensure the loyalty of the military. However, military theorists argue that \\\"the blurring of the line between civilian and military tasks results in the weakening of civilian institutions\\\". The measure seeks to disqualify all military and police personnel, including officers, from being appointed in a concurrent or any other capacity to the positions of secretary, undersecretary, head or member of governing bodies of government-owned or controlled corporations and agencies and other equivalent positions. The prohibition shall also apply even after the military or police officer has been separated from service including retirement."

