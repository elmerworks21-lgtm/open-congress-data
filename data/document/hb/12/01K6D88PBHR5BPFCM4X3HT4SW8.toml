congress_website_title = "AN ACT AMENDING SECTION 32 (H) OF REPUBLIC ACT NO. 4136 THEREBY REQUIRING THE MANDATORY COMPLIANCE BY ALL MOTORCYCLES TO AUTOMATICALLY TURN ON AND RIDE WITH THEIR HEADLIGHTS ON AT ALL HOURS OF THE DAY ON ALL ROADS"
congress_website_abstract = "\\\"Automatic Headlights On for Motorcycles Act of 2004\\\". For the safety of all motorcycle drivers and passengers and the commuting public, all motorcycle drivers are mandatorily required to run or ride on all roads with their headlights turned on at all times of the day. It further requires manufacturers, assemblers and distributors to ensure that automatic headlights on system, device or mechanism are properly installed prior to distribution and sale of said vehicles."
