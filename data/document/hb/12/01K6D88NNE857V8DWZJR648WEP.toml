congress_website_title = "AN ACT MAKING APPLICABLE TO LAWYERS IN THE PUBLIC ATTORNEY'S OFFICE OF THE DEPARTMENT OF JUSTICE, THE RETIREMENT BENEFITS UNDER REPUBLIC ACT NO. 910, AS AMENDED"
congress_website_abstract = "The retirement benefits provided under Republic Act No. 910, as amended, are hereby extended to the lawyers in the Public Attorney's Office (PAO) of the Department of Justice, provided that the retirement age for PAO lawyers shall remain at sixty-five years, and that for one who would avail of optional retirement, he shall have attained the age of sity years and has rendered at least twenty years service in the Government, the last five of which shall have been continuously rendered in the Public Attorney's Office."

