congress_website_title = "THE MAGNA CARTA FOR SENIOR CITIZENS"
congress_website_abstract = "This bill seeks to integrate into a national comprehensive plan socio-economic and political rights of older persons. Salient provisions of this proposed measure, all directed towards the delivery of services to our senior citizens, are as follows:(1) Opportunity for Employment and Re-Employment; (2) Access to Formal and NonFormal Education; (3) Health and Social Services; (4) Free Postal Charges, as well as (5) Political and Civil Rights."
