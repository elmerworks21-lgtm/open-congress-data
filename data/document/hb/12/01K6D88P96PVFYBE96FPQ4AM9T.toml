congress_website_title = "AN ACT REQUIRING PERSONNEL OF THE ARMED FORCES OF THE PHILIPPINES (AFP) ASSIGNED IN COMBAT OPERATIONS TO UNDERGO REGULAR PSYCH0LOGICAL TEST AND THERAPY"
congress_website_abstract = "It is a sad reality that a number of our solders in the field are afflicted with the so-called \\\"war mentality\\\" that they perceive all people as enemies. Under this situation, they sometimes commit human rights violation. The bill seeks to require all members of the Armed Forces of the Philippines, particularly those assigned in combat operations, to undergo psychological testing and therapy. With this measure, \\\"war shocked\\\" soldiers can be identified and required to undergo rehabilitation in order to prevent them from committing abuses on innocent civilians."

