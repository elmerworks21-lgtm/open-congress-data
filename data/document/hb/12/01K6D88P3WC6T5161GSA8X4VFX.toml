congress_website_title = "AN ACT STRENGTHENING THE POLITICAL PARTY SYSTEM"
congress_website_abstract = "\"Political Party Act of 2002\". Rationale: It is imperative that political party system should be strengthened if we want to develop achieve genuine political development and democratization . We have to enact laws to prevent the system of ward politics and political chameleons that we have today.> This bill envisions to change the norm of having political butterflies during and after the election period."
