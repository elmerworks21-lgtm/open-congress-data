congress_website_title = "AN ACT INCREASING THE SPECIAL GROUP TERM INSURANCE COVERAGE FOR THE MEMBERS OF THE ARMED FORCES OF THE PHILIPPINES, INCLUDING THE MEMBERS OF THE PHILIPPINE NATIONAL POLICE, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 352, AS AMENDED BY PRESIDENTIAL DECREE NO. 1965, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The members of the Armed Forces of the Philippines and the Philippine National Police, being primarily responsible for the preservation of peace, order and security of the country, are exposed to dangers of life and limb in their tasks ofsuppressing the activities of insurgents and lawless elements. The Special Group Term Insurance coverage of P12,000.00 is indeed very inadequate for the protection and security of the members and their families."

