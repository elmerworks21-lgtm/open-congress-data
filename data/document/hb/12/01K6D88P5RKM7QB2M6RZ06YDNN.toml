congress_website_title = "AN ACT TO UPGRADE THE MINIMUM SALARY GRADE LEVEL OF PUBLIC SCHOOL TEACHERS FROM SALARY GRADE TEN (10) TO NINETEEN (19)"
congress_website_abstract = "Public school teachers are mont the underpaid workers in our society. Despite the fact that they are considered as molders of our children's future, public school teachers receive only less than ten thousand pesos a mont each for their basic salary.> This bill seeks to upgrade the salary grade level of public school teachers from Salary Grade 10 to 19. This increase in salaries will greatly help motivate our teachers to strive for excellence in their field and improve the quality of educationin public schools."

