congress_website_title = "AN ACT AMENDING THE REPUBLIC ACT NO. 6971, OTHERWISE KNOWN AS `THE PRODUCTIVITY INCENTIVES ACT OF 1990'"
congress_website_abstract = "Rationale: RA No. 6071 (Productivity Incentives Act of 1990) is recognized as one of the policy strategies adopted by the government to create an environment conducive to productivity improvement. However, it is widely ignored because of its seemingly unrealistic provisions. This bill, therefore, seeks to AMEND the Law."
