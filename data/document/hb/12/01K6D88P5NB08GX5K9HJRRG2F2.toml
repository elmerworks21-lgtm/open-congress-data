congress_website_title = "AN ACT PROVIDING FOR A PRO-ACTIVE PROGRAM TO BE CONDUCTED BY THE DEPARTMENT OF SOCIAL WELFARE AND DEVELOPMENT TO PREVENT THE OCCURRENCE OF INCESTUOUS RAPES, OTHER FORMS OF DOMESTIC VIOLENCE AND FOR OTHER PURPOSES"
congress_website_abstract = "There shall be established by the Department of Social Welfare and Development (DSWD) a pro-active program for the prevention of the crimes of incestuous rapes and other forms of domestic violence centered upon the community welfare officers and other responsible barangay officials and person within the community. > The DSWD shall conduct information campaigns for the dissemination of information relative to the prevention of the commission of such acts. A primer on incestuous rapes and other forms of domestic violence, its detection, prevention and prosecution shall be prepared by the DSWD through any of its designated bureaus that shall contain steps that have been studied, formulated and recommended to be undertaken for the protection oof victims of these crimes."
