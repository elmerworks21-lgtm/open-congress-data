congress_website_title = "AN ACT CREATING THE SCIENCE AND MATHEMATICS EDUCATION DEVELOPMENT FUND"
congress_website_abstract = "The objective os this Act is to create a fund to: (1) promote strengthened program in science and mathematics education at the basic and teacher education levels to attain international competitiveness ; (2) focus teacher development on meeting thedemand of quality science education to cope with a scientifically and technologically oriented society; (3) hasten the development of higher order thinking skills among the citizens and empower students and teachers for global competitiveness ; and (4) promote science consciousness and develop a science culture for the country."

