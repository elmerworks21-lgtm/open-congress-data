congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA OF STUDENTS"
congress_website_abstract = "This bill aims to promote further the students' rights and welfare and to enhance their role and potentials towards social change and development. Among other fundamental rights of the students already enshrined in the Constitution, the Magna Cartaof Students guarantees the students' right to be represented in policy-making bodies of the school, to govern its own activities, to discipline its own rank and be accorded due process in disciplinary proceedings. Moreover, the bill provides for penalties to any person who shall willfully interfere with, restrain or coerce any student in the exercise of his or her right guaranteed under this Act."

