congress_website_title = "AN ACT REQUIRING INDUSTRIES ENGAGED IN THE EXPLOITATION OF NATURAL RESOURCES TO GIVE PREFERENTIAL EMPLOYMENT TO LOCAL RESIDENTS, AMENDING FOR THE PURPOSE THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "This bill seeks to provide employment in communities where extractive industries are engaged in the development and exploitation of natural resources. More often than not, these extractive industries such as mining, quarrying, cement manufacture, logging, generation for power by steam (geothermal) or water (hydro-electric ) cart off the national wealth without even sharing their profits in the form of benefits with local residents. In fact, in most cases, these extractive industries, after they had taken away the natural wealth of these communities, left these communities poorer than before the extraction of their wealth."

