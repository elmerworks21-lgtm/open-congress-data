congress_website_title = "AN ACT ALLOWING NATURAL-BORN CITIZENS OF THE PHILIPPINES WHO HAVE LOST THEIR CITIZENSHIP TO RETAIN CERTAIN RIGHTS AND PRIVILEGES RESERVED FOR FILIPINO CITIZENS"
congress_website_abstract = "Under this measure, former Philippine citizens may retain certain rights and privileges, such as: (1) operation of rural banks, registered overseas shipping; (2) engaging in retail trade, rice and corn indusatry, customs brokerage business; (3) practice of certain professions, etc."
