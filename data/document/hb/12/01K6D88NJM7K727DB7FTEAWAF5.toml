congress_website_title = "AN ACT CREATING THE DEPARTMENT OF HOUSING AND URBAN DEVELOPMENT, RATIONALIZING THE ORGANIZATION AND FUNCTIONS OF GOVERNMENT AGENCIES AND CORPORATIONS RELATED TO HOUSING AND URBAN DEVELOPMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Among the objectives of this bill are: (1) to rationalize the structure, powers and functions of the different housing and urban development agencies; (2) to integrate all housing and urban development policies, plans, programs and projects o various government corporations and agencies to expedite delivery of decent, affordable and sustainable housing and urban development programs and projects to underprivileged and homeless citizens; and (3) to undertake a comprehensive and continuing program of urban development and housing which will make available at affordable cost decent housing and basic services to under privileged and homeless citizens."
