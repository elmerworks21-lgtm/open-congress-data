congress_website_title = "AN ACT INSTITUTIONALIZ ING THE PHILIPPINE CENTER ON TRANSNATIONAL CRIME, STRENGTHENING AND REDEFINING ITS ORGANIZATION AND OPERATIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Center on Transnational Crime Act of 2001\". Rationale: The growing sophistication of transnational crime demands a concerted, synchronized and focused effort from all law enforcement, intelligence and concered agencies of the government.However, due to seemingly duplication, rivalry and unorchestrated efforts of law enfocement agencies, there is a need to link, coordinate the missions, functions and responsibilitie s of the various supporting agencies to effectively address the transnational crime. The individual efforts of the concerned agencies should harmoniously complement one another."
