congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 337, AS AMENDED, OTHERWISE KNOWN AS THE GENERAL BANKING ACT, REQUIRING BANKS, AND OTHER FINANCIAL INSTITUTIONS TO SECURE CERTIFICATION FROM THE BUREAU OF INTERNAL REVENUE ON THE AUTHENTICITY OF DOCUMENTS REQUIRED FORLOAN APPROVAL PRIOR TO GRANTING SUCH, AND FOR OTHER PURPOSES"
congress_website_abstract = "The attached bill intends to improve the collection of taxes by minimizing tax evasion. It proposes that the amount of loans granted by banks and other financial institutions be based on audited financial statements that have been certified by theBureau of Internal Revenue (BIR) as the same set submitted to them. This scheme encourages borrowers to declare their true income so that they can avail of bigger loan amounts. Government, on the other hand, can increase tax collection thus eliminating the need to impose new tax measures."

