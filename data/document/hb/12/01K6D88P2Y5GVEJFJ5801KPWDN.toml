congress_website_title = "AN ACT PROHIBITING THE DETENTION OF DEAD PATIENTS IN HOSPITALS AND MEDICAL CLINICS ON GROUNDS OF NONPAYMENT OF HOSPITAL BILLS OR MEDICAL EXPENSES"
congress_website_abstract = "No hospital or clinic shall be allowed to detain the remains of a patient who dies in the hospital or clinic and they shall not withhold or deny the issuance of the corresponding death certificate and other pertinent papers upon the execution of a promissory note covering the unpaid obligation. In case of deceased patient, the corresponding death certificate and other documents required for internment and other purposes shall be released to any of his surviving relatives executing the promissory note."
