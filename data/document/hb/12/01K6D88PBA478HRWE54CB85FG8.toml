congress_website_title = "AN ACT PROVIDING FOR THE MEMBERSHIP OF DULY -ELECTED PRESIDENTS OF THE FEDERATION OF BARANGAY KAGAWADS IN THE MUNICIPAL AND CITY SANGGUNIAN BODIES, AMENDING FOR THE PURPOSE SECTION 508 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "The proximity of the sanggunian barangay members to their constituencies makes their role in the formulation of municipal and city development plans very strategic. This measure seeks to provide for the ex-officio membership of duly-elected presidents of the federation of barangays in the sanggunian bayan or sanggunian panglungsod. They shall serve as such only during their term of office as presidents of the federation chapters."
