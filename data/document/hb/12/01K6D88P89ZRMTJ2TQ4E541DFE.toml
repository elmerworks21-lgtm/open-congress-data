congress_website_title = "THE MAGNA CARTA FOR OLDER PERSONS"
congress_website_abstract = "\\\"Magna Carta for Older Persons\\\". This bill grants older persons a comprehensive package of protective rights and benefits to afford them adequate health care and lift them into the mainstream through socio-economic and political oppportunities as regard their employment, education, housing, telecommunicati on and transport accessibility, availment of livelihood assistance and voting participation. It expressly prohibits discrimination against older persons in areas of productive participation in the exercise of their rights and privileges. It grants tax incentives to entities which promote the welfare of the elderly."
