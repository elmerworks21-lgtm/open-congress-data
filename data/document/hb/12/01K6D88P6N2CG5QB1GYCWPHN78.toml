congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7941, OTHERWISE KNOWN AS THE \"PARTY LIST SYSTEM ACT\""
congress_website_abstract = "This bill seeks to amend the Party-List System Act by (1) ensuring that the party-list election is limited to groups with special concenrs and interest; (2) proposing that the registration of party-list be completed in as short a period of tome as possible; (3) proposing a system of allocating seats for the qualified party-list organization to ensure that more if not all of the available seats are occupied; (4) discouraging nominees to change affiliation while they are seated; and (5) encouraging widespread education of the voters regarding the party-list system."
