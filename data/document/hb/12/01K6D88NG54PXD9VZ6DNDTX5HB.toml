congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED SIX THOUSAND SEVEN HUNDRED SIXTY-EIGHT, OTHERWISE KNOWN AS `AN ACT INSTITUTING A BALIKBAYAN PROGRAM', BY PROVIDING ADDITIONAL BENEFITS AND PRIVILEGES TO BALIKBAYAN, AND FOR OTHER PURPOSES"
congress_website_abstract = "Some amendments proposed in this bill include: (1) Increase of current balikbayan purchase limit from US$1,000.00 to US$2,000.00; (2) Making the balikbayan shopping privilege available only at all government-owne d and-controlled duty free ships; (3) Extending the balikbayan shopping privilege from forty-eight (48) hours to seven (7) days; (4) Adding a tax-free purchase in the amount of US$2,000.00 or its equivalent in Philippine peso and other acceptable foreign currencies for the exclusive purchase of livelihood tools and equipment which can also be claimed by immediate family members even while the balikbayan is still abroad; (5) A new provision establishing a Balikbyan Program Council is added into the proposed bill; and (6) Allows thee balikbayan and OFWs to purchase goods in Philippine peso."
