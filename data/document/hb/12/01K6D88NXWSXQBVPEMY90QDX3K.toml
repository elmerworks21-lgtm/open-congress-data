congress_website_title = "AN ACT PROVIDING FOR THE MODERNIZATION OF THE SCHOOL HEALTH AND NUTRITION PROGRAM (SHNP) OF THE DEPARTMENT OF EDUCATION, CULTURE AND SPORTS, AUTHORIZING THE APPROPRIATION OF FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "The proposed SCHOOL HEALTH AND NUTRITION PROGRAM (SHNP) shall have the following thrusts: (1) The development of an efficient and effective health care delivery sysatem among schools; (2) The development, evaluation and application of appropriate methods and procedures in preventive health care; (3) The development of reforms in the management of human and material resources; and (4) The acquisition and upgrading of appropriate equipment and technology."
