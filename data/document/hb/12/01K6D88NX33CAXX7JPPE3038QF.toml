congress_website_title = "AN ACT EXEMPTING PAUPER LITIGANTS AND THOSE SIMILARLY SITUATED FROM POSTING BAIL WHEN CHARGED WITH NON-CAPITAL OFFENSES AND BE RELEASED ON RECOGNIZANCE OF THE PUNONG BARANGAY WHERE HE/SHE RESIDES OR OF ANY RESPONSIBLE PERSON RESIDING IN THE SAID BARANGAY"
congress_website_abstract = "\"Pauper Litigants Welfare Act of 2001\". Rationale: The Constitution assures all persons, except those charged with capital offenses when the evidence of guilt is strong, that they shall, before conviction, be entitled to bail by sufficient suretiesor be released on recognizance as may be provided by law. However, fourteen and a half years after its effectivity, these constitutional provisions have never been fully realized as no enabling legislation has yet been enacted. > This bill seeks to relieve pauper litigants, or those similarly situated, the economic burden of posting bail when charged with non-capital offenses and be released on recognizance of the Punong Barangay of the barangay where he/she is resides, or of any responsible perrson residing in the said barangay."
