congress_website_title = "AN ACT BANNING THE CHAIN DISTRIBUTION PLANS OR PYRAMID SALES SCHEMES AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SEVENTY-THREE HUNDRED AND NINETY-FOUR AND FOR OTHER PURPOSES"
congress_website_abstract = "Pyramiding companies are merely sales structures devised to recruit people who want to make fast money, where the value of the product or the customer base is questionable. They usually offer products with no real value and operate on the principleof making payments for recruiting others. When the inevitable saturation occurs, the people at the bottom in the pyramid run out of prospects to join the organization and lose money. Unless and until the operation of these \"chain distribution plans or pyramid sales schemes\" are completely banned, their activities will continue to undermine the operation of legitimate multi-level marketing companies and, by and large, affect the country's economy."
