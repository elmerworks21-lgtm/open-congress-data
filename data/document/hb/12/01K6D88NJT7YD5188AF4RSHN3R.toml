congress_website_title = "AN ACT PRESCRIBING THE USE OF PHILIPPINE TROPICAL FABRIC FOR OFFICIAL UNIFORMS OF PUBLIC OFFICIALS AND EMPLOYEES"
congress_website_abstract = "It is the policy of the State to instill patriotism and nationalism among the people, especially public officials and employees, who shall at all times be loyal to the Republic and the Filipino people, promote the preferential use of locally manufactured goods that utilize local resources, adopt measures that help make them competitive and thus generate wider employment and greater benefits to the country.> Pursuant to the above policy, the use of Philippine tropical fabrics is hereby prescribed for official unforms of government officials and employees and for other purposes which require the use of fabrics in government offices and functions."

