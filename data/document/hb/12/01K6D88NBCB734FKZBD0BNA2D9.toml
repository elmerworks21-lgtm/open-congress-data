congress_website_title = "AN ACT STRENGTHENING THE CONSTITUTIONAL RIGHT TO SECURITY OF TENURE"
congress_website_abstract = "This bill seeks to correct the significant omissions and loopholes in our laws by amending relevant sections in our Labor Code. Specifically, it seeks to: (1) render the misclassificati on of regular employees into other kinds of employees as an unfair labor practice and provide penalties thereof; and (2) harmonize the laws on subcontracting and regular employment. Through these, we hope to secure and strengthen the Constitutionall y guaranteed right of our workers to security of tenure."
