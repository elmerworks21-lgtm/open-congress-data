congress_website_title = "AN ACT REQUIRING CERTAIN GOVERNMENT INFRASTRUCTURE PROJECTS TO BE IMPLEMENTED BY LOCAL GOVERNMENT UNITS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Emergency Employment Act of 2002.\" Subject to the provisions of Section 4 of this Act, all infrastructure projects of the government with costs of one million pesos (P1,000,000.00) or less shall be implemented by the local government units where the projects are located; Provided, however, that this Act shall be applicable only to infrastructure projects funded under the General Appropriations Act of the years 2002 through 2008. > employment opportunities resulting from the implementation of these projects shall be available to all qualified Filipino citizens. The employer-employ ee relationship between the local government unit and the inhabitants shall be governed by the Labor Code and other pertinent labor laws, rules and regulation."
