congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8189, OTHERWISE KNOWN AS `THE VOTER'S REGISTRATION ACT OF 1996' TO PROVIDE FOR THE HOLDING OF PERIODIC GENERAL VOTERS' REGISTRATION AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The continuing system of voter's registration established by R.A. No. 8189, otherwise known as the Voter's Registration Act of 1996, has spawned the massive and widespread disenfranchisem ent of legitimate voters as demonstrated in regular and special elections held since the enactment of the law. Unless remedied, the situation could erode the people's faith in the electoral process and thus weaken the strongest pillar of our democratic system of goverment. > The bill seeks to provide that remedy by requiring that a general registration of voters be conducted by the Commission on Elections (COMELEC) periodically but only prior to a presidential election rather than before any regular or special election."

