congress_website_title = "THE MAGNA CARTA FOR OLDER PERSONS"
congress_website_abstract = "This bill is premised on a number of principles, principally one of which is older persons are part of Philippine society, thus the State shall give full support to the improvement of the total well-being of the elderly and their full participationin society. Toward this end, the State shall adopt policies ensuring the health, rahabilitation and self-reliance of older persons."
