congress_website_title = "AN ACT PROHIBITING THE ESTABLISHMENT OF POLITICAL DYNASTIES"
congress_website_abstract = "Any person who has a political dynasty relationship with an incumbent elective official is disqualified from running for any elective public office within the same city and/or province where incumbent elective public official is also running. Provided, that the incumbent elected public officials covered by this Act shall not include that of barangay official, city or municipal councilor, and provincial board member; Provided further, that the elective public offices covered by this Act shall not include the positions earlier mentioned."
