congress_website_title = "AN ACT FIXING THE SPECIFIC LIMITS OF FORESTLANDS AND NON-FORESTLANDS FOR THE PURPOSE OF PROTECTING, CONSERVING AND ENHANCING THE FOREST RESOURCES OF THE COUNTRY TO ATTAIN ECOLOGICAL BALANCE"
congress_website_abstract = "Rationale: To date, there is no law fixing the total area in the country as forestlands. It is imperative that a specific area for forestlands be established, otherwise, lands previously considered forests will gradually vanish. Unless we set a boundary beyond which lands established as forestlands can no longer be diminished the time will come when we will wake up to find no more forests left in the country."

