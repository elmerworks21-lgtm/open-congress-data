congress_website_title = "AN ACT PROVIDING FOR OPTIMUM PERFORMANCE IN REVENUE COLLECTION THROUGH LATERAL ATTRITION AND GRANTING OF SPECIAL INCENTIVES AND REWARDS FOR EXEMPLARY SERVICE IN REVENUE-GENERAT ING AGENCIES OF GOVERNMENT AND FOR OTHER PURPOSES"
congress_website_abstract = "Despite the very important mandate and roles the BIR and BOC have, the two agencies had enjoyed notoriety of sorts for so long. These two, along with the Bureau of Immigration (BID), the Land Transportation Office (LTO) and other revenue-generat ingagencies are often perceived as milking agencies of grafters and corrupt officials and employees. It is this situation that this bill aims to address. The issue of graft and corruption in revenue-generat ing agencies and/or local government units must be acted upon resolutely, however radically."
