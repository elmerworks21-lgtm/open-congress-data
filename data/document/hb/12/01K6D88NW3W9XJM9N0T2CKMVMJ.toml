congress_website_title = "AN ACT PROVIDING FOR THE MAGNA CARTA FOR SOCIAL WORKERS AND SOCIAL WELFARE AND DEVELOPMENT WORKERS"
congress_website_abstract = "This bill seeks to institutionaliz e social work as a distinct profession in recognition of its contribution to nation building.> In performing this profession, socil workers work hand in-hand with their co-social welfare development workers in social welfare and development works. These co-workers include, among others, psychologists, lawyers, day care workers, houseparents, drivers and clerks all of whom collectively share the same hazards and sacrifices in the delivery of social welfare services to the public."
