congress_website_title = "AN ACT ESTABLISHING A NATIONAL PROGRAM FOR FILIPINO GIFTED CHILDREN AND SCIENCE-ORIENTE D YOUTH, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Gifted Children and Science-Oriente d Youth Act.\" Rationale: Global estimates indicate that 3% of any given population is gifted. Therefore, in population of 12.4M elementary school children and 5.06M high school students, there should be 374,246 gifted elementary school students and 151,985 gifted high school students. Because of the absence of a concerted program to identify and nurture them, these gifted children are deprived of the opportunity of challenging and appropriate instruction which bring out their best. The national program for these special children focuses on their early identification and nurturance, A center for the Gifted Children and Science Oriented Youth shall be established at the University of the Philippines tocoordinate the national program."
