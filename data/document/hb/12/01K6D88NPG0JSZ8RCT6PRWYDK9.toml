congress_website_title = "AN ACT DECLARING THE EXEMPTION OF THE JUDICIARY FROM THE COVERAGE OF REPUBLIC ACT NO. 6758, OTHERWISE KNOWN AS THE SALARY STANDARDIZATION LAW"
congress_website_abstract = "Rationale: Corruption at all levels viciously undermines the integrity of the Judiciary. It compromises public faith and confidence in a system whose moral authority is its very foundation. The Judiciary has also been criticized for its sluggish disposition of cases. Also a major facotr contributing to the overwhelming case load is the lack of judges in many branches all over the country. This situation is disturbing considering the staggering number of active cases in our courts. Our judges and their staff are overworked and yet they do not receive a commensurate increase in their salaries. With the increase in work load, it is expected that Judiciary personnel should also received an increase in their salaries and benefits but such is noot the case. > It is the conviction of this representation that this problem can be partly addressed if we allow the Supreme Court to fix the salaries of judges and court personnel to a higher level that what is enjoyed today."
