congress_website_title = "AN ACT ESTABLISHING THE MAGNA CARTA FOR COUNTRYSIDE AND BARANGAY BUSINESS ENTERPRISES (CBBEs), GRANTING EXEMPTIONS FORM ANY AND ALL GOVERNMENT RULES AND REGULATIONS AND PROVIDING INCENTIVES AND BENEFITS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to re-establish the benefits and incentives granted to CBBEs in R.A. 6810. Further, it proposes additional provisions which will address the operational problems that restricted the effective and efficient implementation of the law.The complementary benefits will include: access to credit, marketing, technology and research, and affordable fees and charges."
