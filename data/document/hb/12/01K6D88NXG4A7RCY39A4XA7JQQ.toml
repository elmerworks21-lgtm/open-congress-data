congress_website_title = "AN ACT PROVIDING FOR THE MANNER AND DATE OF ELECTION OF SECTORAL RESPRESENTATIVE S TO THE LOCAL SANGGUNIANS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Local Sectoral Representation Act of 2001\". There shall be three (3) sectoral representatives each in the Sangguniang Panlalawigan, Sangguniang Bayan and Sangguniang Panlungsod who shall be elected pursuant to this Act: one (1) from the women sector; one (1) from the workers; and one (1) from any of the following sectors: the urban poor, indigenous cultural communities, disabled persons and elderly, which may be determined by the sangguniang concerned not later than one (1) year prior to the holding of the next local elections: Provided, that, in the case of Sangguniang Panlalawigan, any of the sub-sectors of the workers may be considered as the second the third sector; Provided further that, the total number of elective positions in thelocal sanggunians shall not exceed the number of seats prescribed by law except in provinces, and in cities where sanggunian members are elected per district as provided by law. >"
