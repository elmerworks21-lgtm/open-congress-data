congress_website_title = "AN ACT STRENGTHENING MEDICAL ETHICS BY REPEALING PRESIDENTIAL DECREE NO. 169, AS AMENDED BY EXECUTIVE ORDER NO. 212, WHICH REQUIRES ANY ATTENDING PHYSICIAN OF ANY HOSPITAL, MEDICAL CLINIC, SANITARIUM OR OTHER MEDICAL ESTABLISHMENTS OR ANY MEDICAL PRACTITIONER WHO HAS TREATED ANY PERSON FOR SERIOUS OR LESS SERIOUS PHYSICAL INJURIES TO REPORT THE FACT OF TREATMENT"
congress_website_abstract = "Rationale: The obligation imposed by Executive Order 212 upon medical practitioners to report cases of physical injuries, tends to discourage them from carrying on their medical functions because of the risk that they might be implicated in the process. As a result, medical practitioners who are in a position to help those in need hesitate to do so.> To eliminate the apprehension felt by medical practitioners because of the requirement in law, this bill seeks to repeal P.D. 169, as amended by Executive Order 212. This will enable our physicians to pursue the vows set forth in the Hippocratic Oath whereby all those in need are to be treated regardless of class, creed or ideology."
