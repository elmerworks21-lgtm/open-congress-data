congress_website_title = "AN ACT LIMITING THE NUMBER OF FILIPINO-FOREIGNER PLAYING IN ANY PROFESSIONAL BASKETBALL LEAGUE IN THE PHILIPPINES TO TWO FOR EACH TEAM"
congress_website_abstract = "Most of our youth dream of becoming basketball players in the Philippine Basketball Association (PBA). However, the presence of Filipino-foreigners playing in the PBA has greatly diminished the chances of home-grown talents to become players in the PBA. Furthermore, the presence of Filipino-foreigner players has led to demoralization among full-blooded Filipino players who receive considerably lower professional fees than the Filipino-foreigner players. This bill seeks to limit the number of Filipino-foreigner players in the professional basket leagues in the Philippines to two per basketball team to minimize the undesirable effects of the proliferation of Filipino-foreigner players."
