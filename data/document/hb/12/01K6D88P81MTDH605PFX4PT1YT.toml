congress_website_title = "AN ACT RECOGNIZING THE EXISTENCE OF BARANGAY PUROKS NATIONWIDE, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "As the basic political unit, the barangay serves as the primary planning and implementing arm of government policies and programs in the community. Due to the various functions reposed on barangays, the Local Government Code also empowers the sanguniang barangay to form community brigades and such other positions necessary to carry out the purposes of the barangay government. In pursuance of this mandate, practically all barangays have organized the puroks composed of a purok leader and seven purok kagawads. These puroks assume, wtihin their jurisdiction, the role of barangay. However, these purok leaders and kagawads are not even recognized as barangay officials or persons in authority. >>This bill seeks the recognition of the existence oof the puroks by considering them as barangay officials in order for them to receive the rights, benefits and privileges accorded to barangay officials."
