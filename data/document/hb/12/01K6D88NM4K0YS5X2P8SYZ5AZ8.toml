congress_website_title = "AN ACT PROVIDING REASONABLE COMPENSATION AND BENEFITS FOR THE LOSS OF LIVES, INJURIES AND DAMAGES TO PROPERTY SUFFERED BY NON-COMBATANT INDIVIDUALS IN THE COURSE OF MILITARY OR POLICE OPERATIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "Where the death of a non-combatant individual occurs in the course of a lawful military or police operation, the State shall pay the sum of Fifty Thousand Pesos (P50,000.00), by way of death benefits, to the legal heirs of the victim.> Where injuryis cause to a non-combatant individual in the course of a lawful military or police operation, the State shall pay the victim the cost of hospitalization and other realted and consequential damages resulting from such injuries to be determined by therepresentative of the government and the victim or his legal heirs and representative/ s. > Where damage to property of a non-combatant individual is cause in the course of lawful military or police operation, the State shall pay the amount correspoonding to the assessed value of the property lost or destroyed or the amount mutually agreed upon by the parties."
