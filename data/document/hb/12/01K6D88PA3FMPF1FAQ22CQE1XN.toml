congress_website_title = "AN ACT INCREASING THE PENALTY FOR ABORTION, THEREBY AMENDING FOR THE PURPOSE THE REVISED PENAL CODE AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill proposes to impose the penalty of reclusion perpetua upon any person who intentionally causes an abortion under the following circumstances: (a) whenever a woman shall practice an abortion upon herself or shall consent that another person should do so; (b) whenever abortion is committed by the parents of the pregnant woman or either of them, and they act with the consent of said woman for the purpose of concealing her dishonor; (c) whenever any physician or midwife who, taking advantage of their scientific knowledge or skill, shall cause an abortion or assist in causing the same; and (d) whenever any pharmacist who, without proper prescription from a physician, shall dispense any abortive."

