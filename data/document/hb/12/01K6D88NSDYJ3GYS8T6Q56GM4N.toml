congress_website_title = "AN ACT PROVIDING FOR THE EXEMPTION OF FIXED INCOME EARNERS FROM THE FILING OF INCOME TAX RETURNS, AMENDING FOR THE PURPOSE SECTION 51, PARAGRAPH 2 (C) OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE TAX REFORM ACT OF 1997"
congress_website_abstract = "Rationale: It is submitted that the work involved for both taxpayers and the government in the filing of these returns would be considerably lessened if fixed income earners were exempted from the filing of income tax returns. Since their income taxes are already withheld by their employers, the filing of income earners, the certificates of withholding income may serve as proof of income, in lieu of income tax returns. > The exemption of fixed income earners from the filing of income tax returns would help the BIR meet its objective of simplifying and streamlining the country's entire tax of collection system. This would also contribute towards the improvement of the overall efficiency of the BIR."
