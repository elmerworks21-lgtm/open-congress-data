congress_website_title = "AN ACT DECLARING DECEMBER 10 OF EVERY YEAR AS \"HUMAN RIGHTS DAY\""
congress_website_abstract = "\"Human Rights Day Act.\" This bill seeks to declare December 10 of every year as a special working holiday to be known as \"Human Rights Day\" to instill awareness and foster promotion and respect for basic rights and individual freedom. > It encourages government offices, military establishments, schools and other agencies and establishments in both public and private sectors to celebrate this observance with appropriate activities, ceremonies and programs that demonstrate the national commitmentto the Universal Declaration of Human Rights, Bill of Rights and the promotion and protection of human rights."
