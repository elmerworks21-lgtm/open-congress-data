congress_website_title = "AN ACT REPEALING REPUBLIC ACT NUMBERED 9136, OTHERWISE KNOWN AS THE ELECTRIC INDUSTRY REFORM ACT OF 2001"
congress_website_abstract = "Two years after the passage of the Energy Power Industry Reform Act (EPIRA), consumers remain at the mercy of local electricity monopolies, their independent power producers (IPPs) and foreign IPPs. Consumers are burdened with various charges passed on by the IPPs through the National Power Corporation and power distributors like MERALCO. This bill proposes the repeal of RA 9136 or the EPIRA."
