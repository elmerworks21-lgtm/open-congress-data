congress_website_title = "AN ACT INSTITUTIONALIZING NEWBORN SCREENING AS PART OF ROUTINE NEWBORN CARE IN NATIONWIDE HEALTH DELIVERY SYSTEM OF THE PHILIPPINES"
congress_website_abstract = "\\\"Newborn Screening Act of the Philippines of 2003\\\". Newborn screening is a public health prevention program for screening, detecting and treating newborns for inherited conditions that can lead to mental retardation and death if undetected and untreated. It gives newborns a chance to lead normal lives if the detected conditions are diagnosed and treatment is begun early in life. The bill ensures that every newborn has access to newborn screening for certain inherited conditions that can result in mental retardation, services health complication, or death if left undetected or untreated."
