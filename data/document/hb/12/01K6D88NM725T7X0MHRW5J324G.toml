congress_website_title = "AN ACT GRANTING APPROPRIATE CIVIL SERVICE ELIGIBILITY TO ELECTED LOCAL GOVERNMENT OFFICIALS AND FOR OTHER PURPOSES"
congress_website_abstract = "Civil service eligibility may be granted to the following elected government officials: (1) Provincial Governor (2) Vice Governor (3) Regular member of the Sangguniang Panlalawigan (4) City Mayor (5) City Vice Mayor (6) Regular members of the Sangguniang Panlungsod (7) Municpal Mayor (8) Municipal Vice Mayor (9) Regular members of the Sangguniang Bayan (10) Sectoral Representatives to the various Sanggunins. Officials cited under the preceding Section must have rendered an aggregate service ofat least five (5) years in the local government unit they have served."
