congress_website_title = "AN ACT TO LIBERALIZE THE OPERATIONS OF RURAL BANKS AMENDING FOR THAT PURPOSE REPUBLIC ACT NO. 7353, OTHERWISE KNOWN AS THE NEW RURAL BANKS ACT OF 1992 AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The rural banks play a major role in socio-economic development of the countryside, as more than eighty percent (80%) of rural banks' clients are within the poverty line. The rural Banks Act of 1992 or Republic Act No. 7353 was passed inrecognition of the need to make credit available and accessible in the rural areas. Due to political and economic crisis, rural banks have not recovered, remained in the state where they were in the 1980's and the poverty in the countryside widened.> This bill claims to resolve the issues, plug the loopholes, decrease financial cost of borrowers and re-direct the flow of funds to the countryside that diluted the real intent of R.A. 7353."
