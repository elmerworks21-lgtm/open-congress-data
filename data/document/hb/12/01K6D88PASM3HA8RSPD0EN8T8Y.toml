congress_website_title = "AN ACT RATIONALIZING FURTHER THE POWER OF ASSUMPTION OR CERTIFICATION OF LABOR DISPUTES BY THE SECRETARY OF LABOR AND EMPLOYMENT BY LIMITING THE EXERCISE THEREOF TO INDUSTRIES FULFILLING ESSENTIAL SERVICES, AMENDING FOR THIS PURPOSE ARTICLE 263(g) OF THE LABOR CODE OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "The right of workers to strike has been emasculated by the power granted to the Secretary of Labor, under Article 263 (g) of the Labor Code of the Philippine, to assume jurisdiction over labor disputes causing or likely to cause, in his opinion, a strikeor lockout in an industry deemed to be indispensable to the national interest. The bill aims to rationalize this virtually unfettered discretion granted to the Secretary of Labor to assume jurisdiction over labor disputes by limiting such power to those work establishments that may truly be considered as fulfilling essential services such as hospitals, water supply and electrical services, the lack of which would endanger life or public safety."

