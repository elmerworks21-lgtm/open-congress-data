congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 8560, OTHERWISE KNOWN AS THE PHILIPPINE GEODETIC ENGINEERING ACT OF 1998, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposed AMENDMENTS to certain provisions of RA No. 8560, the Philippine Geodetic Engineering Act of 1998, such as: (1) The submission of survey plows of subdivided, consolidated and/or consolidated subdivision titled properties to the concerned government agencies FOR NUMBERING AND PROJECTION ON GOVERNMENT BASE MAPS AND FOR RECORDS PURPOSES ONLY; (2) ALLOWING registered JUNIOR GEODETIC ENGINEERS to register as geodetic engineers WITHOUT completing the Bachelor's Degree in Geodetic Engineering, subject to certain conditions; and (3) REPEAL of Section 24, and instead allow certain corporations to engage in CONSULTING SERVICE."
