congress_website_title = "AN ACT INSTITUTING A CONGRESSIONAL MEDAL OF HONOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill creates a Congressional Medal of Honor to recognize members of the Armed Forces of the Philippines (AFP) and the Philippine National Police (PNP) who exhibited uncommon valor and distinguished themselves above and beyond the call of duty.> The recipient of the Congressional Medal of Honor shall be entitled to promotion to the next higher rank, and shall include the grant of P100,000.00 to the awardee or to his next-of-kin."
