congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8436, ENTITLED `AN ACT AUTHORIZING THE COMMISSION ON ELECTIONS TO USE AN AUTOMATED ELECTION SYSTEM IN THE MAY 11, 1998 NATIONAL OR LOCAL ELECTIONS AND IN SUBSEQUENT NATIONAL AND LOCAL ELECTORAL EXERCISES, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The enactment into law of Republic Act No. 8436 which provides for an automated system of counting and canvassing of votes is a milestone in institutionaliz ing reforms in the Philippine electoral system. There is a need however, to amend the present law based on the lessons gained from the pilot-testing of the system particularly with respect to some legal and procedural aspects of the law.> This bill was filed by this representation during the Elevent Congress (HB No. 6261) and reported outby the Committee on Suffrage and Electoral Reforms. Other procedural and legal amendments are, likewise, introduced in this bill."

