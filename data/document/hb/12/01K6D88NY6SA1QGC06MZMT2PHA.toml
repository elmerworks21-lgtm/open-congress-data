congress_website_title = "AN ACT CREATING THE PHILIPPINE RUBBER AUTHORITY, DEFINING ITS POWERS AND FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It is imperative now that the government should give the appropriate support to the industry considering the potential growth of the rubber industry as more and more uses of the product are discovered. The outlook for producers of naturalrubber is bright in the short and long-term basis. If given the proper support, the projected increase in trend and stable position of natural rubber in the world market may provide an excellent potential for local producers to tap."

