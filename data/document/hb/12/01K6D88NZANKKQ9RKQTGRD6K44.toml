congress_website_title = "AN ACT BROADENING THE SCOPE OF UNLAWFUL PRACTICES OF MATCHING FILIPINO WOMEN FOR MARRIAGE TO FOREIGN NATIONALS TO INCLUDE VARIOUS SCHEMES MADE AVAILABLE THROUGH THE INTERNET, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 6955"
congress_website_abstract = "Rationale: In this Information Technology Age, practically any type of information can be made available for anyone with access to the worldwide web or the internet.> The Philippines is no stranger to the mail-order bride schme that exposed these schemes as another version of human trafficking. People operating these mail-order bride services market Filipino women to foreigners like one sells a price of meat. This mail-order bride scheme has not extended to the electronic technology. Thus, thebirth of the so-called electronic mail-order brides or e-mail order brides."
