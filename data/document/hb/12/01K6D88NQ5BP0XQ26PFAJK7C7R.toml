congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1869, EXPRESSLY EXCLUDING JAI-ALAI GAMES FROM THE FRANCHISED ACTIVITIES OF THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION"
congress_website_abstract = "The attached bill seeks to expressly exclude jai-alai games from the franchised activities of the Philippine Amusement and Gaming Corporation (PAGCOR) by an express amendment of Presidential Decree No. 1869, the PAGCOR charter. >The basic principle, conceded by all legislators, is that the permit or franchise for the operation and regulation of any form of gambling is a legislative prerogative. In other words, gambling - in this instance jai-alai - being a prohibited activity can only allowedby clear and express provision of law. >The proposed legislation will settle with finality the issue of authority of PAGCOR to operate and manage jai-alai games."

