congress_website_title = "AN ACT DECLARING THE CONFERMENT OF MASTERAL AND DOCTORATE DEGREES AS EQUIVALENT TO FIRST GRADE AND SECOND GRADE CIVIL SERVICE ELIGIBILITY, RESPECTIVELY"
congress_website_abstract = "Rationale: By virtues of Republic Act No. 1080, the bar examinations and the examinations given by the various boards of examiners of the Government are declared as civil service examinations. Hence, those who passed these examinations may be appointed into the civil service without the necessity of passing the civil service examinations, except those positions requiring highly specialized knowledge not covered by the ordinary board examinations. > This bill aims to grant the same privilege toholders of masteral and doctorate degrees recognizing their educational competence and fitness for appointment into the civil service by reason of their having completed post graduate studies which, I believe, is equivalant to the passing of the baror board examinations."
