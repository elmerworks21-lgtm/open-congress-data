congress_website_title = "AN ACT MANDATING THE AUTOMATIC RELEASE OF THE SHARE OF THE BARANGAY IN THE PROCEEDS OF NATIONAL TAXES AND TAXES ON THE UTILIZATION AND DEVELOPMENT OF THE NATIONAL WEALTH, AMENDING FOR THIS PURPOSE SECTION 286, CHAPTER 1 AND SECTION 293, CHAPTER 2, TITLE 3, BOOK II, RESPECTIVELY, OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991 AND FOR OTHER PURPOSES"
congress_website_abstract = "The share of each local government unit shall be released, without need of any further action, directly to the provincial, city, municipal or barangay treasurer, as the case may be, on a quarterly basis within five (5) days after the end of each quarter, and which shall not be subject to any lien or holdback that may be imposed by the National Government, AND LIKEWISE THE SHARE OF THE BARANGAYS SHALL NOT BE SUBJECT TO ANY LIEN OR HOLDBACK THAT MAY BE IMPOSED BY PROVINCIAL, CITY OR MUNICIPAL GOVERNMENT, for whatever purpose."
