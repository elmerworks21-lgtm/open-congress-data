congress_website_title = "AN ACT CREATING THE FILIPINO ACADEMY OF ARTS AND LETTERS, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The Constitution provides that the State shall foster the preservation, enrichment and dynamic evolution of a Filipino national culture based on the principle of unity and diversity in a climate of free artistic and intellectual expression. Arts and letters shall enjoy the patronage of the State, and the State shall conserve, promote and popularize the nation's historical and cultural heritage and resources, as well as, artistic creations. The State shall encourage and support researches and studies on the arts and culture. Pursuant to these constitutional provisions, it is the policy of the Act to provide meaningful incentives to those engaged in arts and letters, give due recognition to outstanding achievements in the same fieeld, and organize the country's artists and writers into a community, receiving State support but free from government interference in managing its own affairs."

