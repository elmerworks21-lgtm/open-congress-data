congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA OF SOCIAL WORKERS"
congress_website_abstract = "This bill seeks to uphold the rights and privileges of social works employed by the government through the creation of a Social Work Management Consultative Council. Society owes a great debt to social workers who dedicate their lives to a career ofhelping others. This bill is but a modest gesture in acknowledgement of that invaluable contribution to national development."
