congress_website_title = "AN ACT AMENDING SECTION 285 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, PROVIDING FOR THE REDUCTION OF THE INTERNAL REVENUE ALLOCATION (IRAs) OF HIGH-INCOME LOCAL GOVERNMENT UNITS (LGUs) BY EIGHT PERCENTAGE (8%) FOR THE BENEFIT OF LOW INCOME LGUs"
congress_website_abstract = "To make the present system of IRA allocation more responsive to the needs of low-income LGUs, this bill proposes to reduce the IRAs of high-income LGUs for the benefit of low-income LGUs. The reduced IRA will be allocated in proportion to populationdensity, poverty incidence, and income class of LGUs, in lieu of land area and equal sharing."
