congress_website_title = "AN ACT ESTABLISHING A COMPREHENSIVE JUVENILE JUSTICE SYSTEM AND DELINQUENCY PREVENTION PROGRAM, CREATING THE OFFICE OF JUVENILE JUSTICE AND DELINQUENCY PREVENTION UNDER THE DEPARTMENT OF JUCTICE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This proposed bill seeks to provide for a comprehensive juvinile system which shall, among other, increase the age of criminal responsibility from nine (9) to twelve (12) years old.>The bill also incorporates the principle of restorative justice whereby the emphasis is on rehabilitation and reintegration rather than retribution for children committing crimes which are punishable by a sentence of six (6) years and below."
