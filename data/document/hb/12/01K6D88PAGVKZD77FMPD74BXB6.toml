congress_website_title = "AN ACT IMPOSING A HIGHER PENALTY FOR THE CRIME OF PERJURY, AMENDING FOR THE PURPOSE ARTICLE 183 IN CHAPTER TWO, TITLE FOUR, BOOK II OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Recently, there have been cases where so-called witnesses came out and issued affidavits or statements under oath accusing certain personalities of high profile crimes, only to retract and deny the veracity of their previous statement in the middle of the investigation. The bill seeks to impose a higher penalty upon any person who knowingly issues untruthful statements under oath or false affidavits in the course of an investigation or inquiry in any tribunal other than in a judicial proceeding."

