congress_website_title = "AN ACT INSTITUTIONALIZ ING PRE-SCHOOL EDUCATION, INCREASING THE MONTHLY COMPENSATION OF DAY CARE WORKERS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Pre-school Development Act of 2001\". Rationale: Child educators agree that starting educators at pre-school age has substantial benefits to the learner and to society. By contributing to better academic performance, pre-schooling helps reduce the number of repeaters, hence we cut back on educational expenditure. > It is hereby declared to be the policy of the State to provide for a unversal early childhood or pre-school education that promotes effective social, intellectual and skills stimulation and value-formation for children from 3-5 years old with the end-view of amply preparing them for formal elementary schooling."
