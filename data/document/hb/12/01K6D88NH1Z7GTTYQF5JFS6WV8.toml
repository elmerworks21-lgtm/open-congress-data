congress_website_title = "AN ACT PROVIDING GREATER PROTECTION TO LOCAL INDUSTRIES THROUGH THE IMPOSITION OF ANTI-DUMPING DUTY, AMENDING FOR THE PURPOSE SECTION 301, PART 2, TITLE II, BOOK I OF THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES, AS AMENDED BY REPUBLIC ACT NO. 8752"
congress_website_abstract = "The bill seeks to address the many weaknesses found in the Anti-Dumping Law Act of 1999 (Republic Act 8752) viewed by certain quaters of industry to only work to the detriment of local producers. It restores the method/steps necessary to determinethe normal value of the article/s subject of a dumping protest which was removed when R.A. 8752 superseded RA 7843 (Anti-Dumping Law of 1994). The bill removes the posting of a surety bond by an affected industry or interested party when it files a complaint or petition against dumping. It deletes the provision in the Tariff and Customs Code of the Philippines which allows the Tariff Commission to decide whether or not to impose a definitive anti-dumping duty."

