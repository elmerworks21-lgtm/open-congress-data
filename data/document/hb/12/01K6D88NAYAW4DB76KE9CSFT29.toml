congress_website_title = "AN ACT PROVIDING BENEFITS TO DEPENDENTS OF PUBLIC SCHOOL TEACHERS, AMENDING FOR THESE PURPOSES REPUBLIC ACT NUMBERED FORTY-SIX HUNDRED SEVENTY (REPUBLIC ACT NO. 4670), OTHERWISE KNOWN AS THE MAGNA CARTA FOR PUBLIC SCHOOL TEACHERS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The Magna Carta for Public Schoolteachers had failed to provide benefits to the DEPENDENTS of teachers. Thus, this bill seeks to grant ADDITIONAL benefits to teachers by giving their dependents the right to scholarship grants, free medical treatment and pension in case of disability of the teachers. In addition, it also encourages teachers to form cooperatives in their own municipalities to help promote their economic welfare."

