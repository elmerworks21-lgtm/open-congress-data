congress_website_title = "AN ACT AUTHORIZING LOCAL GOVERNMANET UNITS TO APPLY THE SHARE OF THE PROCEEDS DERIVED FROM THE DEVELOPMENT AND UTILIZATION OF HYDROTHERMAL, GEOTHERMAL, AND OTHER SOURCES OF ENERGY FOR ELECTRIFICATION OF OTHER AREAS WITHIN THE PROVINCE WHERE THE SOURCE OF ENERGY IS LOCATED, AMENDING FOR THE PURPOSE SECTION 294 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Section 294 of RA No. 7160 is proposed to be amended as follows: \"Section 294. Development and Livelihood Projects. - The proceeds from the share shall be appropriated by their respective sanggunian to finance local development and livelihood projects: Provided, however, that at least eighty percent (80%) of the proceeds derived from the development and utilization of hydrothermal, geothermal and other sources of energy shall be applied [solely] FOR ELECTRIFICATION OF OTHER AREAS WITHIN THE PROVINCE OR to lower the cost of electricity in the local government unit where such a source of energy is located.\""
