congress_website_title = "AN ACT PROVIDING THAT THE RESPONSIBILITIE S, FUNCTIONS AND PERSONNEL OF THE DEPARTMENT OF AGRICULTURE DEVOLVED TO THE LOCAL GOVERNMENT UNITS BE REVERTED TO THE NATIONAL GOVERNMENT"
congress_website_abstract = "Rationale: The devolution of basic services and facilities of the Department of Agriculture to the Local Government Units (LGUs) under Republic Act No. 7160, has financially over-burdened the budget of the LGUs, resulting in the inefficient performance of specific functions and responsibilitie s of the LGUs. The group that suffers most as a consequence of such devolution are the personnel of the Department of Agriculture. Much to the desire of the LGUs to accommodate the devolved personnel andgive them what is due them under the law, they can give only what they can, considering their meager resources and the budgetary limitations set by the Department of Budget and Management. > This bill, therefore, seeks to revert to the national goverrnment the devolved functions and responsibilitie s as well as personnel of the Department of Agricutlure from the Local Government Units."

