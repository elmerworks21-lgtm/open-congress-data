congress_website_title = "AN ACT PROVIDING INCENTIVES TO INDIVIDUALS WHO PROVIDE INFORMATION LEADING TO THE RECOVERY OF ILL-GOTTEN WEALTH RELATED TO THE PLUNDER LAW AND/OR REPUBLIC ACT NO. 1379 AND FOR OTHER PURPOSES"
congress_website_abstract = "Any person, who voluntarily gives vital information supported by competent evidence not yet in possession of any government investigating agency, concerning the ill-gotten wealth of any public official or employee, which materially accounts for or facilitates in the recovery of such property in favor of the State in accordance with the provisions of Republic Act No. 7080 and/or Republic Act No. 1379, shall be entitled to a reward-incentiv e equivalent to ten percent (10%) of the value of the ill-gotten wealth actually collected or recovered."

