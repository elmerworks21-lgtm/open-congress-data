congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION OF LAYOUT-DESIGNS (TOPOGRAPHIES) OF INTEGRATED CIRCUITS, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF REPUBLIC ACT NO. 8293, OTHERWISE KNOWN AS THE INTELLECTUAL PROPERTY CODE OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Layout-Design\" is synonymous with \"topography\" and means the three-dimension al disposition, however expressed, of the elements, at least one of which is an active element, and of some or all of the interconnection s of an integrated circuit, or such a three-dimension al disposition prepared for an integrated circuit intended for manufacture. Rationale: The reasons for assuring protection of lay-out designs of integrated circuits are: (1) to reward the creator; (2) to provide incentive for thecreation."
