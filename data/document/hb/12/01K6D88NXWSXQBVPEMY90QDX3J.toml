congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION AND CONSERVATION OF ENDANGERED AND THREATENED SPECIES OF FISH, WILDLIFE AND PLANTS OF THE PHILIPPINES, AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "This bill seeks to protect and conserve the endangered species of fish, wildlife and plants of the Philippines. Forest denudation is one major reason for the imbalance in the ecosystem. The problem of forest destruction is very much related to wildlife protection because most of the wildlife use the forest for their habitat. Without the forests, there will likewise be no food source for them."

