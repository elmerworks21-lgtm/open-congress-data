congress_website_title = "AN ACT DEFINING `APPROVED, CERTIFIED AND ACCREDITED COURSES/SUBJECT S' OPENED AND/OR OFFERED BY ACADEMIC INSTITUTIONS AND IMPOSING STIFFER PENALTY FOR VIOLATIONS THEREOF"
congress_website_abstract = "\"Courses Accreditation Act of 2001\". The State shall regulate the rights of students against academic institutions that exploit their innocence, powerlessness and timidity. It is therefore its paramount responsibility to safeguard their welfare andinterest and secure them from selfish and profiteering interest of such institutions. Toward this end, the State shall regulate the operations of academic institutions and their tendencies toward indiscriminate offering and/or requiring of courses/subject s to students that are unnecessary and irrelevant to the latter's academic pursuit."

