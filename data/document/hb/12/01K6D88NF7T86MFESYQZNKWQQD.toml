congress_website_title = "AN ACT AMENDING SECTION 140(a) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"SEC. 140. Amusement Tax. - (a) The province may levy an amusement tax to be collected from the proprietors, lessees, or operators of theaters, cinemas and concert halls AT A RATE OF NOT ORE THAN TEN PERCENT (10%) OF THE GROSS RECEIPTS FROM ADMISSION FEES, AND FROM THE PROPRIETORS, LESSEES, OR OPERATORS OF circuses, boxing stadia, and other places of amusement at a rate of not more than thirty percent (30%) of the gross receipts from admission fees."
