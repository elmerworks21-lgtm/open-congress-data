congress_website_title = "AN ACT AMENDING ARTICLES 215 AND 216 OF THE LABOR CODE OF THE PHILIPPINES, AS AMENDED, BY UPGRADING THE SALARIES, ALLOWANCES AND RETIREMENT BENEFITS OF LABOR ARBITERS AND THE COMMISSIONERS OF THE NATIONAL LABOR RELATIONS COMMISSION AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Since they perform an important part in the maintenance of industrial peace and in the adjudication of justice in the workplace, it is fitting that Labor Arbiters enjoy equality in rank with judges of the Municipal Trial Courts (MTC). Appropriate retirement benefits must likewise be accorded them to enable them to enjoy the fruits of government service long after they have been served it with their best years."
