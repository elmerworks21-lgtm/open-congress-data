congress_website_title = "AN ACT RECOGNIZING DUAL CITIZENSHIP OF FOREIGN NATIONALS WHO WERE FILIPINOS OR WHO WERE OF FILIPINO ANCESTRY, UNDER CERTAIN CONDITIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8171, AND FOR OTHER PURPOSES"
congress_website_abstract = "SECTION 1. Section 1 of Republic Act No. 8171 entitled, \"An Act Providing for the Repatriation of Filipino Women Who Have Lost Their Philippine Citizenship by Marriage to Aliens and of Natural-Born Filipinos.\" is hereby amended to read as follows: \"Section 1. NATURAL-BORN FILIPINOS WHO HAVE LOST THEIR PHILIPPINE CITIZENSHIP, INCLUDING THEIR MINOR CHILDREN, ON ACCOUNT OF POLITICAL OR ECONOMIC NECESSITY, OR WHO ACQUIRED FOREIGN CITIZENSHIP UNDER THE PRINCIPLE OF JUS SOLI OR BY REASON OF BIRTH ANDFilipino women who have lost their Philippine citizenship by marriage to aliens [natural-born Filipinos who have lost Philippine citizenship, including their minor children, on account of political or economic necessity] may reacquire Philippine cittizenship through repatriation WITHOUT RENOUNCING THEIR FOREIGN CITIZENSHIP[in the manner provided, in Section 4 of Commonwealth Act No. 65, as amended]; Provided, That the applicant is not a: x x x"
