congress_website_title = "AN ACT EXEMPTING THE INCOME AND RECEIPTS FROM LOANS USED TO FINANCE AGRICULTURALLY BASED AND/OR LOCATED ACTIVITIES AND BUSINESSES FROM TAXES"
congress_website_abstract = "All income and receipts from loans used to finance agriculturally based, related and/or located activities and businesses shall be exempted from all taxes, including gross receipts and income tax. Given this opportunity, our farmers will be able touse the savings from the exemption to uplift their production. This will also raise their social and economic standard."
