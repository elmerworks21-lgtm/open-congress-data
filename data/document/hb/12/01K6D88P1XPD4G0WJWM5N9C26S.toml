congress_website_title = "AN ACT ESTABLISHING THE PILI DEVELOPMENT AUTHORITY, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Pili (Canarium ovatum) is said to be one of the fruit trees indigenous to the Philippines which can be developed into a major export crop for the country. > With its taste comparable to that of other popular nuts in the world like macadamia and walnut, pili nuts become an important ingredient in many confectionaries and bakes products. In the foreign market, pili nuts are exported mainly to Australia, Guam, Canada and the United States. > Furthermore, the pili tree is suitable for reforestation, being an excellent windbreaker. It can also be used as an ornamental tree for landscaping purposes. Its bark can be a source of resin in chemical-based products like varnish, lacquers and perfume. Its pulp is edible and nutritious, makinng it a major delicacy in some restaurants around the country. Its shell can also be made into key holders, bracelets and other ornaments."
