congress_website_title = "AN ACT INCREASING THE MONTHLY ALLOWANCE OF A BARANGAY DAY CARE WORKER FROM FIVE HUNDRED PESOS (P500) TO THREE THOUSAND PESOS (P3,000.00) AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED AND SEVENTY-TWO"
congress_website_abstract = "So much of the training in the Day Care Centers is given by volunteer workers or persons who receive pitiful allowances, never enough to make ends meet, never sufficient an an incentive for them to give their best in training our young children. Itis therefore, imperative to increase the allowance of Barangay Day Care Workers in accredited day care centers from the measly sum of \"not less than P500.00 pesos\" under R.A. 6972 to a minimum of P3,000.00."

