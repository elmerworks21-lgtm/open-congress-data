congress_website_title = "AN ACT FURTHER AMENDING ARTICLE 83 OF THE REVISED PENAL CODE, AS AMENDED BY SECTION 25 OF REPUBLIC ACT NO. 7659 (NON-INFLICTION OF DEATH SENTENCE)"
congress_website_abstract = "The proposed amendment reads as follows: Article 83. Suspension of the execution of death sentence- the death sentence shall not be inflicted upon a woman while she is pregnant or within one year after delivery, nor upon any person over seventy years of age. In this last case, the death sentence shall be commuted the penalty reclusion perpetua the accessory penalties provided in Article 40. In all cases where the death sentence has become final, the records of the case shall be forwarded immediately by the Supreme Court to the Office of the President for possible exercise of the pardoning power, AFTER WHICH NEITHER A MOTION FOR RECONSIDERATION SHALL BE ENTERTAINED NOR ANY RESTRAINING ORDER BE ISSUED IN RELATION THERETO."

