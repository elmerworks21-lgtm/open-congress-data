congress_website_title = "AN ACT GRANTING DULY ELECTED BARANGAY CHAIRPERSONS A MINIMUM MONTHLY COMPENSATION CORRESPONDING TO SALARY GRADE TEN (10) AS PRESCRIBED UNDER REPUBLIC ACT NO. 6758, OTHERWISE KNOWN AS THE SALARY STANDARDIZATION LAW"
congress_website_abstract = "\"Punong Barangay Compensation Act of 2001.\" Rationale: This bill is crafted in the premise that while Barangay Chairpersons, as heads of the country's basic political units, called the Barangay, play significant and critical roles in nation-building, the State somehow does not give in return the right and proper compensation due them. It is noteworthy that among the other duties that they are accountable with is the enormous and innumerable responsibilitie s of maintaining the smooth, effective and efficient operations of their respective political units. They act as heads of the primary planning and implementing agencies of government programs, projects and activities."
