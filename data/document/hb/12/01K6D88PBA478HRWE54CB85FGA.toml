congress_website_title = "AN ACT MANDATING THE REGULAR REMITTANCE OF PREMIUM CONTRIBUTIONS OF BARANGAY OFFICIALS TO THE GOVERNMENT SERVICE INSURANCE SYSTEM (GSIS)"
congress_website_abstract = "By virtue of the Barrio (now barangay) Officials Insurance Fund created under the administration of the Government Service Insurance System (GSIS), barangay officials and sanggunian members receiving regular salaries are now covered by compulsory life insurance. However, in the past few years, several incidents have occurred wherein barangay officials were not able to collect any insurance claim from the GSIS because of the failure of the Department of the Interior and Local Government (DILG) to remit contributions to the GSIS. The bill proposes to charge the DILG with the duty to remit insurance premiums to the GSIS in behalf of the barangay officials. Furthermore, the DILG, as the employer of the barangay officials, is mandated to remit the monthly contribution due from an employer."

