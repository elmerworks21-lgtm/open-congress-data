congress_website_title = "AN ACT RATIONALIZING THE OWNERSHIP AND OPERATION OF TELECOMMUNICATI ON STATIONS OPERATED BY GOVERNMENT AGENCIES AND INSTRUMENTALITI ES, INCLUDING LOCAL GOVERNMENT UNITS AND GOVERNMENT OWNED OR-CONTROLLED CORPORATIONS, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NUMBERED FIVE HUNDRED FORTY-SIX, SERIES OF 1979"
