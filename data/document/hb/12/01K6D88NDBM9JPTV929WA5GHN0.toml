congress_website_title = "AN ACT AMENDING SECTION 24 OF REPUBLIC ACT NO. 6770, OTHERWISE KNOW AS `THE OMBUDSMAN ACT OF 1989'"
congress_website_abstract = "Rationale: As a general rule, there is nothing improper in suspending an officer pending his investigation. But there is something wrong when the power to suspend becomes a tool of oppression. This power is most apparent in Section 24 of Republic Act No. 6770 which part provides: \"The preventive suspension shall continue until the case is terminated by the Office of the Ombudsman but not more than six months without pay.\""

