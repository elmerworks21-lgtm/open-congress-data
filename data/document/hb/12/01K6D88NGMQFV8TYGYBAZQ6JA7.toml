congress_website_title = "AN ACT PROVIDING FOR THE PROMOTION OF A CITY OR MUNICIPAL TRIAL COURT JUDGE TO THE POSITION OF A REGIONAL TRIAL COURT JUDGE UPON RETIREMENT AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This bill takes note of the plight of city and municipal judge by providing that they shall be promoted to the rank of a Regional Trial Court judges upon their retirement. Thus, with their upgrading pension, they will be able to live a life with dignity after devoting the fruitful years of their lives to the dispensation of justice."

