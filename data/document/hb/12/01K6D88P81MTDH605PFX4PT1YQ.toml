congress_website_title = "AN ACT MANDATING THE USE OF UNLEADED GASOLINE AS FUEL IN ALL LAND TRANSPORTATION MOTOR VEHICLES"
congress_website_abstract = "\"Unleaded Gasoline Use Act of 2003\" Lead is a major environmental health hazard. Exposure to even low levels of lead has been found to have an adverse impact on public health particularly on the intellectual development of children. According to Jitendra Shah of the World Bank, a large part of the lead poisoning problem can be attributed to the use of lead in gasoline. The benefits of doing away with leaded gasoline are immediate and measurable, and far outweigh the costs. >>The bill seeks the mandatory use of unleaded gasoline as fuel in all land transport motor vehicles. Unleaded gasoline is a clearer fuel than diesel or leaded gasoline and is estimated to be cheaper compared to petrolem products prevailing in the market."

