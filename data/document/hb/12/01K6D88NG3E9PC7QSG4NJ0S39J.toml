congress_website_title = "AN ACT PROVIDING FOR A MORE RESPONSIVE AND COMPREHENSIVE REGULATION FOR THE REGISTRATION, LICENSING AND PRACTICE OF ELECTRONICS ENGINEERS AND ELECTRONICS TECHNICIANS, REPEALING REPUBLIC ACT NO. 5734 AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The State recognizes the importance of electronics engineering in nation building and development. The State shall therefore develop and nurture competent, virtuous, productive, and wellrounded Professional Electronic Engineers, Electronic Engineers and Electronic Technicians whose standards of practice and service shall be excellent, qualitative, world-class and globally competitive through inviolable, honest, effective and credible licensure examinations and through regulatory measures, programs and activities that foster their continuing professional education."
