congress_website_title = "AN ACT EXPANDING THE LIABILITIES OF INDIRECT EMPLOYERS IN JOB CONTRACTING, COVERING OTHER BENEFITS DUE THEIR EMPLOYEES, FOR THIS PURPOSE, AMENDING ARTICLE 106 OF PRESIDENTIAL DECREE 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "IN THE EVENT THAT THE EMPLOYEES OF THE CONTRACTOR OF SUBCONTRACTOR HAVE RENDERED AT LEAST ONE YEAR OF SERVICE TO THE SAME EMPLOYER, WHETHER OR NOT SUCH EMPLOYMENT IS CONTINUOUS, SUCH EMPLOYER SHALL ALSO BE JOINTLY AND SEVERALLY BE LIABLE WITH THE CONTRACTOR OR SUBCONTRACTOR FOR THE PAYMENT OF THE EMPLOYEES' BENEFITS, INCLUDING, BUT NOT LIMITED TO THEIR SEPARATION OR RETIREMENT BENEFITS, PROVIDED, THAT THE LIABILITY OF THE INDIRECT EMPLOYER SHALL BE LIMITED ONLY TO THE PERIOD THAT SUCH EMPLOYEERENDERED SERVICES TO THE SAID INDIRECT EMPLOYER, THE AVAILMENT AND GRANT OF SEPARATION, RETIREMENT AND OTHER BENEFITS SHALL BE IN ACCORDANCE WITH EXISTING LAWS."
