congress_website_abstract = "\"Maternity Leave Act of 2002\". Any employee who is permanently or temporarily appointed in government service, or in any of its instrumentaliti es including those owned or controlled corporation, in addition to the vacation and sick leave which theymay enhoy and who has rendered an aggregate service of at least six (6) months, shall be entitled to a maternity leave of at least two (2) weeks prior to the expected date of delivery and four (4) weeks after normal delivery or unintentional abortion with full pay based on her regular or average weekly wages."
