congress_website_title = "AN ACT INCREASING THE PENALTY FOR UNAUTHORIZED ALTERATION OF ELECTION RETURNS AND FOR OTHER PURPOSES"
congress_website_abstract = "Any law to the contrary notwithstanding , any member of the Board of Election Inspectors or Board of Canvassers who tampers, increases, or decreases the votes received by a candidate in any election after the announcement of the results thereof in the polling place, unless so ordered by the Commission on Elections or a competent court, shall be criminally liable for serious election offense and if found guilty, shall: (1) Be punished with imprisonment of not less than six years and one day butnot more than twelve years; (2) Be dusqualified for holding public office; and (3) Be deprived of the right of suffrage."

