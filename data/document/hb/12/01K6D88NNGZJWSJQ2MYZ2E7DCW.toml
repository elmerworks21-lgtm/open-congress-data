congress_website_title = "AN ACT EXPRESSLY RECOGNIZING THE CANON LAWS OF THE ROMAN CATHOLIC CHURCH, AS WELL AS THE LAWS OF OTHER CHRISTIAN RELIGIOUS ORGANIZATIONS OR DENOMINATIONS"
congress_website_abstract = "Realizing the significance of the \"equal protection clause\" of the constitution, it shall be the declared policy of the State to recognize the Canon Laws of the Roman Catholic Church, as well as the laws of other Christian religious organizations ordenominations including the Moslem religion registered under and by virtue of existing laws, pertaining to the marriage contracted in the country or elsewhere. > Pursuant to this policy of the State, a marriage hereinafter declared to be null and void by the Roman Catholic Church or its matrimonial tribunal, and or any duly authorized officer of any other Christian religious organization or denomination including the Moslem religion shall be considered null and void by the State."
