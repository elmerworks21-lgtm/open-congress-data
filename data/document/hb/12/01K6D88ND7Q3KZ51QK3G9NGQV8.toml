congress_website_title = "AN ACT PROMOTING A SMOKE-FREE ENVIRONMENT BY REGULATING THE PRODUCTION, MANUFACTURE, LABELING, ADVERTISEMENT AND SALE OF TOBACCO PRODUCTS, AND ESTABLISHING A TRUST FUND THEREOF"
congress_website_abstract = "Rationale: It is the Policy of the State to protect the populace from hazardous products, which is essential for the enjoyment by all the people of the blessing of democracy. The government shall promote a smoke-free environment with the penultimate objective of regulating tobacco products inasmuch as these products remain to be the major threat to people's health and to the environment."
