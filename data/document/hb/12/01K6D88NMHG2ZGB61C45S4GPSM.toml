congress_website_title = "AN ACT EXEMPTING RURAL ELECTRIC COOPERATIVES FROM THE COVERAGE OF THE REAL PROPERTY TAX, AMENDING FOR THE PURPOSE SECTION TWO HUNDRED AND THIRTY-FOUR OF REPUBLIC ACT NUMBERED SEVENTY-ONE HUNDRED AND SIXTY, OTHERWISE KNOWN AS THE `LOCAL GOVERNMENT CODE OF 1991,' AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Under PD No. 269, Rural Electric Coppratives (RECs) are exempted from paying all forms of taxes. However, with the advent of the R.A. No.7160 and the Cooperative Code, the various Local Government Units (LGUs) have strated imposing localtaxes, especially real property taxes, on the RECs who have not registered with the Cooperative Development Authority (CDA). The assessment almost often runs into the millions of pesos annually. Hence, the RECs have no choice but to pass on the sameto their consumers. The practice therefore, is eventually reflected on the power rates the consumers pay every month. Hence the consumers are obliged to pay a great deal more.> The bill seeks to amend the Local Government Code by exempting the RECs ffrom the coverage of real property taxes. True, the LGUs will be deprived of income, but this deprivation will in the long term spare the consumers from paying higher power rates and redound to the benefit of everyone concerned."
