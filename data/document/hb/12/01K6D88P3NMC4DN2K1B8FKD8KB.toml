congress_website_title = "AN ACT INCREASING THE REGIONAL TRIAL COURTS, METROPOLITAN TRIAL COURTS, MUNICIPAL TRIAL COURTS IN CITIES AND MUNICIPAL TRIAL COURTS, AMENDING FOR THE PURPOSE `THE JUDICIARY REORGANIZATION ACT OF 1980,' AS AMENDED"
congress_website_abstract = "This bill seeks to increase the number of branches of (a) the Regional Trial Courts in all the judicial regions; (b) the Metropolitan Trial Courts in the National Judicial Region; and (c) the Municipal Trial Courts in certain cities and municipalities. The bill has the following other salient features: (1) The bill allots at least one Regional Trial Court for every city; and (2) It likewise provides for Municipal Trial Courts in newly-created cities, and additional branches of the Regional Trial Courts, Metropolitan Trial Courts and Municipal Trial Courts in the different cities."

