congress_website_title = "AN ACT REQUIRING ALL GOVERNMENT AGENCIES THAT PROVIDE FRONTLINE SERVICES TO PROVIDE THE PUBLIC INFORMATION ON HOW TO ACCESS SUCH SERVICES FROM THEIR RESPECTIVE OFFICES"
congress_website_abstract = "President Gloria Macapagal-Arroy o, on the other hand, pledged in her First State of the Nation Address that her administration would fight all forms of inefficiencies and corruption in the government. > Despite these pronouncements, there is stillpervasive corruption in the Philippine government and bureaucracy. In fact, in a study funded by the Asia Foundation in 1999, roughly twenty-two percent (22%) of the respondents said that they have been personally asked for money by a government official at some point to speed up a transaction."
