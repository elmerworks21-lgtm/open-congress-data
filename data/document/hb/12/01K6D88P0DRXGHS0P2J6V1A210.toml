congress_website_title = "AN ACT STRENGTHENING THE POLITICAL PARTY SYSTEM OF THE PHILIPPINES"
congress_website_abstract = "Political Party Act of 2002\". Rationale: Political parties play a pivotal role in our society. They serve not only as critical supporting machinery of our current crop of nationbuilders, but also an essential nesting ground of future Filipino political and economic leaders. > The goal is to strengthen our political party system to help develop and achieve genuine political development and democratization . We have to provide definitive guidelines to reengineer and re-invent our current system of traditional politics. We have to institute rules to discourage political chameleons and butterflies, and render them endangered, if not extinct political species. Finally, we have to establish policies that could help revitalize our existing majorpolitical parties, and make them more responsive to the needs of their members and their constituents as well."
