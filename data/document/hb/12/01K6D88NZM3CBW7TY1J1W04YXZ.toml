congress_website_title = "AN ACT DECLARING THE MONTH OF JULY OF EVERY YEAR AS `TREE PLANTING MONTH'"
congress_website_abstract = "Rationale: Tree planting is just one of the several steps to combat the perennial problem of forest denudation and the consequent flooding of low-lying areas during the wet season of the year. > To protect human lives and prevent economic losses engendered by natural disasters, thereis an urgent need to preserve our forest especially those which are landslide prone areas. Planting trees in these areas will surely save our side of the planet earth from further degradation and thus provide a better place for future generation of Filipinos."

