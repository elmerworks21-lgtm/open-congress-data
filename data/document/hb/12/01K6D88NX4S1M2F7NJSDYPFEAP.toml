congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA FOR PUBLIC SOCIAL WELFARE AND DEVELOPMENT WORKERS"
congress_website_abstract = "The State shall promote and improve the social and economic well-being of social welfare and development workers, their living and working conditions, and terms of employment. It shall develop their skills and capabilities to make them more responsive to the needs and problems of their clients, and better equipped in delivering social services and programs. The State shall otherwise encourage those with proper qualifications and excelent abilities to remain in social welfare and development work in both government and non-government service. > This legislative measure seeks to institutionaliz e social work as a distinct professional in recognition of their contribution to nation building."
