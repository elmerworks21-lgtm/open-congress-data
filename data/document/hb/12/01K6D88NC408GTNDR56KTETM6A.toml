congress_website_title = "AN ACT PROVIDING FOR THE REGULATION OF THE ORGANIZATION AND OPERATIONS OF INVESTMENT COMPANIES"
congress_website_abstract = "Rationale: Investment companies, which include mutual funds, contribute to the development of the capital market by pooling money from a large group of investors who have similar objectives. To strengthen the role of investment companies in the capital formation process, government needs to provide a favorable framework in which said companies can operate to facilitate the flow of investment capital and broaden participation in securities ownership by Filpinos."

