congress_website_title = "AN ACT GRANTING THE MAGNA CARTA FOR HOMEOWNERS' ASSOCIATIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Magna Carta for Homeowners' Associations\\\". Homeowners' associations, in their own little ways, aim to improve the quality of life of their respective members. The bill aims to recognize, support and enhance the role of homeowners' associations in society the nation and the economy. It seeks to remove the ambiguities concerning the role, rights and powers of homeowners' associations by defining and delimiting the same. It also defines the relationship between members and officers of the association, between homeowners' associations and local government units, and between homeowners' associations and concerned government agencies."
