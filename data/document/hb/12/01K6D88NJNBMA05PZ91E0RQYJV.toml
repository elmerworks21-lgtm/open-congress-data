congress_website_title = "AN ACT TO ASSURE MEANINGFUL DISCLOSURES OF THE TERMS OF RENTAL-PURCHASE AGREEMENTS, INCLUDING DISCLOSURES OF ALL COSTS TO CONSUMERS UNDER SUCH AGREEMENTS AND TO PROVIDE CERTAIN SUBSTANTIVE RIGHTS TO CONSUMERS UNDER SUCH AGREEMENTS"
congress_website_abstract = "Rationale: There is a significant number of consumers engage in rental-purchase transactions. Unfortunately, these transactions have taken place, in many instances, without adequate disclosures and other protections to consumers. > Hence, this billseeks to protect consumers by requiring meaningful disclosure of the terms of rental-purchase agreements and providing certain substantive rights to consumers who enter into rental-purchase agreements."
