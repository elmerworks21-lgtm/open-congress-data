congress_website_title = "AN ACT MANDATING THE PAYMENT OF RETIREMENT BENEFITS TO GOVERNMENT OFFICIALS AND EMPLOYEES NOT LATER THAN THE EFFECTIVE DATE OF THEIR RETIREMENT, AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "SECTION 1. A new section is hereby inserted in Presidential Decree No. 1146 otherwise known as \"The Revised Government Service Insurance Act of 1977,\" as amended, to read as follows: \"SEC. 13-B. PAYMENT OF RETIREMENT BENEFITS. - PAYMENT OF ALL RETIREMENT BENEFITS TO WHICH A RETIREE IS ENTITLED SHALL BE PAID NOT LATER THAN THE EFFECTIVE DATE OF HIS RETIREMENT, PROVIDED ALL REQUIREMENTS ARE SUBMITTED TO THE SYSTEM AT LEAST THIRTY (30) DAYS PRIOR TO SAID EFFECTIVE DATE.\""
