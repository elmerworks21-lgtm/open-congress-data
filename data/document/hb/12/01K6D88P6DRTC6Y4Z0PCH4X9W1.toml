congress_website_title = "AN ACT STRENGTHENING THE NATIONAL NUTRITION PROGRAM, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Nutrition Act of 2002.\" This bill seeks to strengthen the National Nutrition Program in order to protect and promote the right to health of the people as guaranteed by the Constitition. Specifically, this proposed measure aims to strengthen the National Nutrition Council (NNC) as the policy-making body on nutrition; provide a policy environment conducive to nutrition improvement; provide mechanisms, strategies and approaches in implementing programs and projects to improve nutritionalstatus and eradicate malnutrition and hunger, and insure participation and cooperation of the NNC-member agencies, other National Government Agencies (NGAs), Non-Governmenta l Organizations (NGOs), People's Organizations (POs), and the private sectoor in an integrated manner for the promotion of the nutritional well-being of the population."

