congress_website_title = "AN ACT TO AMEND SECTION 3, PARAGRAPH (A), SECTION 7 PARAGRAPHS (A) AND (B), SECTION 10 AND SECTION 12 OF REPUBLIC ACT NO. 7471, OTHERWISE KNOWN AS AN ACT TO PROMOTE THE DEVELOPMENT OF PHILIPPINE OVERSEAS SHIPPING"
congress_website_abstract = "This bill seeks to amend R.A. No. 7471, otherwise known as \"An Act to Promote the Development of Philippine Overseas Shipping\" signed on May 5, 1992, by then President Corazon C. Aquino by providing a clearer definition of the term \"Philippine Overseas Shipping\" to reflect the other aspects of the overseas shipping business.> In the proposed bill, the term \"Philippine Overseas Shipping\" is being modified to cover all aspects of shipping and shall mean the \"operation of a Philippine shipping enterprise in the overseas trade of any type of Philippine registered ship for any kind of shipping operation, which shall inclide, but shall not be limited to the transport of goods and/or passengers, chartering and the purchase and sale of the ships,except when the ship is operated solely between ports in the Philippines.\""
