congress_website_title = "AN ACT EXEMPTING THE SALE AND IMPORTATION OF ALL TYPES OF AGRICULTURAL AND FISHERIES INPUTS, EQUIPMENT AND MACHINERY FROM THE COVERAGE OF THE VALUE-ADDED TAX (VAT)"
congress_website_abstract = "Rationale: Given the general weakness in the external sector, it is imperative for government to rethink its policies and seek domestic sources of growth. The agricultiral sector holds the strongest potential for the country to withstand the possible effects of a global recession in the wake of a US invasion in Afghanistan and accordingly, more incentives for our farmers and agri-based industries are in order.> This bill is geared towards that end. It seeks to exempt all types of agriculture and fisheries inputs, equipment and machinery form the coverage of the value-added tax (VAT)> It is a twin measure to another bill which provides for the exemption of the same from the payment of tariff and duties."
