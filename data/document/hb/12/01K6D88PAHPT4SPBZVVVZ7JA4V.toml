congress_website_title = "AN ACT TRANSFERRING THE PHILIPPINE COAST GUARD TO THE DEPARTMENT OF TRANSPORTATION AND COMMUNICATIONS AS AN ATTACHED AGENCY AND REDEFINING ITS ORGANIZATION AND PERSONNEL ADMINISTRATION"
congress_website_abstract = "The bill seeks to establish the Philippine Coast Guard (PCG) as a distinct, armed, uniformed and commissioned service attached to the Department of Transportation and Communications. The transfer is seen to enhance efficiency in the delivery of public service to the maritime sector and spur economic growth in the maritime industry and the coastal areas. It aims to promulgate and develop a coordinated and well-structured maritime program and eliminate fragmentation, overlapping and duplication of maritime safety functions."
