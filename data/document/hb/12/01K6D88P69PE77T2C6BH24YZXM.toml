congress_website_title = "AN ACT SUPPLEMENTING REPUBLIC ACT NO. 7080, OTHERWISE KNOWN AS THE 'ANTI-PLUNDER ACT'"
congress_website_abstract = "A new section supplementing Section 3 \"Competent Court\" shall be affixed as Section 3-A and shall read as follows: \"SECTION 3-1. Special Arrangements. The court may, either motu propio or upon motion of the accused, in the interest of national security and public order, undertake special security arrangements with the PNP, the military and other concerned agencies, and elect other means of restraint, including \"House Arrest,\" pending trial. Provided, That such special arrangements for securityand restrain shall cease in the event that the conditions for their imposition no longer exist. > The Sandiganbayan shall determine the actual existence of such impending danger to national security and public order.\""
