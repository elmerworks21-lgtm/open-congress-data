congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7309, ENTITLED `AN ACT CREATING A BOARD OF CLAIMS UNDER THE DEPARTMENT OF JUSTICE FOR VICTIMS OF UNJUST IMPRISONMENT OR DETENTION AND VICTIMS OF VIOLENT CRIMES AND FOR OTHER PURPOSES"
congress_website_abstract = "The following may file claims for compensation before the Board: (1) ANY PERSON WHO HAD BEEN APPREHENDED AND ARRESTED BY VIRTUE OF A WARRANT OF ARREST ISSUED BY A JUDGE, OR WITHOUT A WARRANT WHILE UNDERGOING INVESTIGATION, AND/OR WHILE UNDER DETENTION, WAS SUBJECTED TO BRUTALITIES AND TORTURES COMMITTED BY POLICE, MILITARY AND OTHER LAW ENFORCEMENT AGENCIES AND THEREBY SUFFERED INJURIES AS CERTIFIED BY A LICENSED DOCTOR OR HOSPITAL, OR AS TESTIFIED TO IN A SWORN STATEMENT BY THEIR COUNSEL, RELATIVE NBI INVESTIGATOR, OR ANY OFFICIAL, OR SUPPORTED BY PHOTOGRAPHS, VIDEOS, AND OTHER DOCUMENTARY OR PHYSICAL EVIDENCE; AND (2) ANY PERSON UNJUSTLY IMPRISONED ON ONE CHARGE BUT HAS SEVERAL OTHER CASES PENDING AGAINST HIM AND IS CONVICTED OF ANY ONEOF THE LATER."
