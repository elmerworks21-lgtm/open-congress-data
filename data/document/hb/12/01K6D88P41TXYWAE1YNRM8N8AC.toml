congress_website_title = "AN ACT ESTABLISHING A REWARDS FOR INFORMATION CONCERNING TERRORISM PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "There is hereby established a Rewards for Information Concerning Terrorism Program under the Department of Justice to be administered by the Secretary of Justice, which is authorized to grant rewards to individuals who furnishes information leadingto: (1) the arrest or conviction of any person or persons for the commission of an act of terrorism as defined in this Act, within the territorial jurisdiction of the Philippines; (2) the arrest or conviction of any person or persons for conspiring or attempting to commit an act of terrorism as defined in this Act, within the territorial jurisdiction of the Philippines; (3) the prevention, frustration, favorable resolution of an act of terrorism as defined in this Act, within the territorial jurrisdiction of the Philippines; and (4) the prevention of entry into the territorial jurisdiction of the Philippines of any person or persons known or suspected to be terrorists or members of any terrorist organization."
