congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A REGIONAL OFFICE OF THE VIDEOGRAM REGULATORY BOARD IN EVERY REGION OF THE COUNTRY AND APPROPRIATING FUNDS THEREOF"
congress_website_abstract = "Rationale: The proliferation and unregulated circulation of videogram have greatly prejudiced the operatios of moviehouses and theaters. It has caused a sharp decline in theatrical attendance thereby resulting to substantial losses in government revenue. The unregulated activities of videograms establishments have also effected the viability of the movie industry resulting to wide displacement and unemployment due to the shutdown of numerous moviehouses and theaters."
