congress_website_title = "AN ACT PROVIDING GOVERNMENT ASSISTANCE IN THE FORM OF SCHOLARSHIP GRANTS TO THE YOUTH ENGAGED IN AGRICULTURE TO MAXIMIZE PRODUCTIVITY, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Government assistance should not be limited to students so that they will have access to quality education, but must be extended likewise to the youth who are in the agrarian reform land grants, tree farms, forest projects, and agriculture-rel atedprojects.> This bill proposes that youth will receive orientation to science and technology in agriculture beginning at the elementary level. At the secondary level, they will actually enhance productivity and already improve the quality of life of the student-worker in the countrside. At the tertiary level, the youth scholar becomes a student-manager -entrepreneur with his college degree as the farm or entperise funding."
