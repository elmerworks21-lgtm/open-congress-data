congress_website_title = "AN ACT AUTHORIZING DUAL CITIZENSHIP TO AMERICANS AND OTHER FOREIGN CITIZENS WHO ARE FORMER FILIPINOS OR OF FILIPINO ANCESTRY UNDER CERTAIN CONDITIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "Dual citizenship is hereby authorized for former Filipinos who acquired American citizenship or any other foreign citizenship, or being a descendant and/or of Filipino ancestry; Provided, however, that their country grants a reciprocal right to Filipino citizens similarly situated; Provided, further, That these Filipino expatriates will register their intent to reacquire, or acquire, as the case maybe, their Filipino citizenship with the Bureau of Immigration expressing therein their loyalty and allegiance to the Republic of the Philippines."
