congress_website_title = "AN ACT PRESCRIBING HIGHER AND SIMULTANEOUS PENALTIES OF PRISON TERM AND FINE FOR VIOLATIONS OF GAMBLING LAWS WHENEVER THE OFFENDER IS THE MAINTAINER, CONDUCTOR, BANKER OR GAMBLING LORD, AND ADDITIONAL PENALTY IF THE OFFENDER IS A POLICE OR MILITARYOFFICER OR PERSONNEL OR A LOCAL GOVERNMENT OFFICIAL, AMENDING FOR THE PURPOSE SECTION 1 OF PRESIDENTIAL DECREE NO. 1602"
congress_website_abstract = "This bill seeks to increase the fine and prison term for illegal gambling, simultaneous and higher if the culprit is a man in uniform or a government official. Current penalties for this violation are proverbial slaps on the wrist, virtual incentives for gambling to proliferate."
