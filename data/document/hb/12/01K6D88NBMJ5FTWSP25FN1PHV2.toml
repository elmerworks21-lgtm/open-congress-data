congress_website_title = "AN ACT ESTABLISHING A CIVIL SERVICE CODE OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "The proposed Code seeks to address the deeply-rooted problems besetting the public service, among which are: graft and corruption ; red tape; violations of employee rights, specifically the right to security of tenure and the right to due process oflaw; violations of the merit and fitness principle; partisan political activities; inadequate employee benefits and privileges; organization ineffectiveness and unnecessary delays in frontline services delivery."

