congress_website_title = "AN ACT PROVIDING FOR THE DISPOSITION OF SMUGGLED AGRICULTURAL GOODS, AMENDING FOR THIS PURPOSE CERTAIN PROVISIONS OF TARIFF AND CUSTOMS CODE, AS AMENDED"
congress_website_abstract = "This bill adds the following provision regarding PROPERTY SUBJECT TO SALE under Section 2601 of the Tariff and Customs Code: ANY AGRICULTURAL PRODUCT COVERED BY SCHEDULES I AND II OF THIS CODE SUBJECT TO FORFEITURE IN FAVOR OF THE GOVERNMENT, PROVIDED THAT IN ALL SUCH CASES INVOLVING SAID AGRICULTURAL PRODUCTS, THE NATIONAL GOVERNMENT AGENCY CONCERNED THROUGH THE DEPARTMENT OF AGRICULTURE AND FOOD OR ANY OF ITS ATTACHED AGENCIES SHALL BE GIVEN THE AUTHORITY TO DISPOSE OF THE SAME THROUGH LOCALDISPOSITION OR RE-EXPORTATION, WHICHEVER SHALL BE TO THE BEST INTEREST OF THE GENERAL PUBLIC AND THE LOCAL PRODUCERS. THE BUREAU OF CUSTOMS SHALL TRANSFER CUSTODY OF THE SAME TO THE NATIONAL GOVERNMENT AGENCY CONCERNED WITHIN FIFTEEN DAYS FROM THE TIIME THE FORFEITURE HAS BECOME FINAL AND EXECUTORY."
