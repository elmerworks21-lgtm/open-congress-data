congress_website_title = "AN ACT TO PENALIZE PATIENTS ABSCONDING PAYMENT OF MEDICAL BILLS PROFESSIONAL AND MEDICAL FEES FROM A PRIVATELY-OWNED HOSPITAL, AMENDING FOR THE PURPOSE ARTICLE 315 (2)(E) OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS `THE REVISED PENAL CODE', ANDFOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to further amend Article 315 (2) (e) of Act No. 3815, otherwise known as \"The Revised Penal code\", as amended by penalizing those who fraudulently or feloniously abscond or refuse to pay their hospital bills and medical professionalfees, after obtaining credit, hospital accommodation or medical and professional service, or by obtaining or surreptiously removing any part of his/her baggage or belongings from a hospital to avoid payment of hospital and medical professional fees."
