congress_website_title = "AN ACT PROHIBITING THE MANUFACTURE, MARKETING OR DISTRIBUTING OF TOBACCO PRODUCTS WITHIN FIVE (5) YEARS AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "\"Cigarette/Ciga r Cessation Act.\" The following acts shall be prohibited upon the effective date of this Act: (1) The planting and growing of tobacco crops; (2) The distribution or selling of tobacco leaves; (3) The manufacture, distribution or marketing of cigars, cigarettes and similar tobacco products; and (4) The promotion or advertising of tobacco products. > This bill mandates the National Tobacco Administration to recommend to tobacco farmers alternative crops suitable to replace tobacco as a crop, within three (3) years from approval of this Act."
