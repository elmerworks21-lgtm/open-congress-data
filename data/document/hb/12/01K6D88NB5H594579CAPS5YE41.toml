congress_website_title = "AN ACT TO REGULATE THE CABLE TELEVISION INDUSTRY IN THE PHILIPPINES, PROVIDING IMPLEMENTING MECHANISMS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: At present cable TV is classified under the broadcast industry although some sectors claim that it belongs to the telecommunicati ons sector. But cable TV can neither be classified as public utility or media. It can not be considered public utility because its facilities are used more as support structures to complement the transport system of telecommunictio ns, If the definition of media is to be strictly followed. it can not be also classified as such. Media are means of communication with wide range of influence while cable TV covers only a limited number of users who pay for the service. > The proposed bill on cable TV tries to resolve this issue by recognizing it as a SEPARATE and DISTINCT industry meant to supplement andcomplement the telecommunicati ons and broadcast sectors."
