congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT, OPERATION AND MAINTENANCE OF INFORMATION TECHNOLOGY AND COMPUTER LITERACY CENTERS IN ALL THE DEPARTMENT OF SCIENCE AND TECHNOLOGY, PROVINCIAL OR REGIONAL OFFICES AND FOR OTHER PURPOSES"
congress_website_abstract = "There shall be established an Information Technology and Computer Literacy Centers in all the Department of Science and Technology Provincial or Regional Offices in the country. The Centers shall provide basic computer literacy programs, advanced courses and continuous training to its enrollees and provide opportunities for employment if possible to those who finish the course(s)."
