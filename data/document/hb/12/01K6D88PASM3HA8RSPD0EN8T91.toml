congress_website_title = "AN ACT DECRIMINALIZING LIBEL, AND FOR SUCH PURPOSE REPEALING ARTICLES 353, 354, 355, 356, 357, 360, 361 AND 362 OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
