congress_website_title = "AN ACT INSTITUTIONALIZ ING A MECHANISM FOR THE IMPLEMENTATION OF THE CONSTITUTIONAL RIGHTS OF WORKERS TO A LIVING WAGE, ESTABLISHING THE NATIONAL LIVING WAGE COMMISSION, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Family Living Wage Act of 2001.\" For purposes of this Act, employees and workers who are considered to be regular wage earners shall be entitled to enjoy the family living wage. The State shall institutionaliz e a mechanism to implement a fairer,more acceptable and constitutionall y guaranteed wage system based on the current family living standard of employees and workers in the public and private sectors. Employees and workers in public and private sectors shall be entitled to receive a family living wage equivalent to the daily cost of living of an average Filipino family which average size shall be determine by the National Statistics Office (NSO) and the Commission on Population (POPCOM) as it may be deemed necessary."
