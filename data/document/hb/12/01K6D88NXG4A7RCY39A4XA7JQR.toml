congress_website_title = "AN ACT REQUIRING THE MANDATORY TEACHING OF HUMAN RIGHTS IN ALL PRIVATE AND PUBLIC SCHOOLS AND FOR OTHER PURPOSES"
congress_website_abstract = "All public and private schools shall include in their curricula the subject of human rights. No public or private schools shall be establish or allowed to operate unless human rights subjects are included in its curricula. > The Department of Education, Culture and Sports, in consultation with the Commission on Human Rights, shall take immediate steps to formulate courses on human rights curricual at all levels of education and training in both private and public schools in the country, adapting the scope and treatment of all subjects or courses on human rights to the respective educational levels."
