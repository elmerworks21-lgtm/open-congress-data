congress_website_title = "AN ACT ESTABLISHING A REPRODUCTIVE HEALTH CARE ACT, STRENGTHENING ITS IMPLEMENTING STRUCTURES, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Reproductive Health Care Agenda of 2001\". This bill seeks to establish an Integrated National Policy and Program on Reproductive Health that recognizes women's reproductive rights, gender equality and ensures universal access to reproductive health, services, information and education. This bill, recognizes the basic right of all individuals and couples to decide freely and responsibly the number, spacing and timing of their children and the right to make decisions concerning reproductionfree of discrimination, coercion and violence."
