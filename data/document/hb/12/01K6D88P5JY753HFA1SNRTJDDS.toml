congress_website_title = "AN ACT GRANTING RETIREMENT BENEFITS TO ALL ELECTIVE OR APPOINTIVE BARANGAY OFFICIALS WHO HAVE RENDERED A CONSECUTIVE PERIOD OF NINE (9) YEARS OR THREE (3) TERMS OF PUBLIC SERVICE IN THE BARANGAY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This proposed measure seeks to grant all elective and appointive barangay officials who have rendered a consecutive service of nine (9) years or three (3) years of public service in the barangay and has opted for retirement a monthly pension for life amounting to not less than sixty-five percent (65%) of the monthly average honoraria, allowances and other emoluments authorized by law or barangay, municipal or city ordinance."

