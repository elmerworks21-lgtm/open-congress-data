congress_website_title = "AN ACT PROHIBITING EDUCATIONAL INSTITUTIONS WHICH OFFER COURSES REQUIRING PROFESSIONAL EXAMINATIONS FROM COMPELLING THEIR GRADUATES TO TAKE REVIEW CLASSES AND/OR PRE-LICENSURE EXAMINATIONS IN THE EDUCATIONAL INSTITUTION OF WHICH HE IS A GRADUATE ANDPROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Any provisions of existing laws, rules and regulations to the contrary notwithstanding , it shall be UNLAWFUL for any educational institution offering courses/program s requiring professional licensure examinations to compel their graduates to takereview classes and/or pre-licensure examinations or refresher courses in the educational institution of which the student is a graduate."
