congress_website_title = "AN ACT PROHIBITING THE PRESENTATION TO THE PRESS OR PUBLIC OF SUSPECTS IN CRIMINAL INVESTIGATIONS BEFORE CASES ARE FORMALLY FILED AGAINST THE SUSPECTS"
congress_website_abstract = "It shall be unlawful for any person to present publicly or in a press conference any suspect who is being investigated by a government office for possible criminal liability before formal charges are filed against him or her unless there is a written consent by the suspect with the assistance of a counsel. Anyone who has custody of the suspect cannot divulge the identity of the suspect in his or her custody prior to the filing of formal charges in court. > This bill, however, does not apply tosuspects who are at large or for whom warrants of arrest have been issud. Their names and photographs can be provided to the public for dissemination in order to facilitate their arrest."

