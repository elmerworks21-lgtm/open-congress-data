congress_website_title = "AN ACT AMENDING ARTICLE 264(e) OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "The right of workers to strike and engage in other concerted activities is blunted by the proscription against obstructing free ingress to or egress from the employer's premises for lawful purposes. A strike or any concerted action is rendered inutile when the employer is able to surreptitiously transfer raw materials or equipment or even scabs during labor disputes. The bill proposes to strengthen the rights of workers to strike and at the same time protect the rights of persons who are strangers to the labor dispute. It declares as unlawful for an employee to remove from or bring into the business premises machines or other equipment, raw materials, documents and other papers connected with the employer's business, and other items analogous to the foregoing."
