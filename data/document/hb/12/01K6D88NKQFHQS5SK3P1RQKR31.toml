congress_website_title = "THE MAGNA CARTA FOR OLDER PERSONS"
congress_website_abstract = "This bill seeks to integrate into a national comprehensive plan and delineate the socio-economic and political rights of older persons to empower them that they may retain their dignity as they grow old and to provide for their self-reliance, care and rehabilitation to foster their capacity for a more meaningful and productive aging. The bill seeks to grant older persons their rights and privileges regarding their employment, education, health, social services, housing, telecommunicati ons accessibility, political and civil rights."
