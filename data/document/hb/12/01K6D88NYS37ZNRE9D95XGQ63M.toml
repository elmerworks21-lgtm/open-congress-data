congress_website_title = "AN ACT REQUIRING ALL MASS MEDIA FACILITIES TO ALLOCATE A CERTAIN PORTION OF THEIR AIRTIME OR SPACE FOR PUBLIC SERVICE AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "All broadcast media facilities are hereby required to allocate at least two (2) hours airtime a day, and all print media facilities are required to allocate a certain space for write-ups, on public service programs designed to propagate slogans andmoral boosting ads that will uplift the morale of our people, give impetus to good governance, raise the awareness of the people on spiritual and humane values, and project the good image of our country to foreign investors."

