congress_website_title = "AN ACT TO PROHIBIT THE USE OF OWWA EMERGENCY REPATRIATION FUND FOR THE REPATRIATION OF UNREGISTERED AND ILLEGAL OVERSEAS FILIPINO WORKERS (OFWs), AMENDING FOR THE PURPOSE SECTION 15 OF REPUBLIC ACT NO. 8042, AND FOR OTHER PURPOSES"
congress_website_abstract = "The Overseas Workers Welfare Administration (OWWA), in coordination with appropriate international agencies, shall undertake repatriation of REGISTERED AND LEGAL workers in cases of war, epidemic, disasters of calamities, natural or man-made, and other similar events without prejudice to reimbursement by the responsible principal or agency. However, in cases where the principal or recruitment agency cannot be identified, all costs attendant to repatriation shall be borned by the OWWA."
