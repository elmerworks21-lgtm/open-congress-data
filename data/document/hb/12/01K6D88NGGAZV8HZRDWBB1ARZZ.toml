congress_website_title = "AN ACT FURTHER STRENGTHENING VOLUNTARY ARBITRATION AS A PREFERENTIAL MODE OF LABOR DISPUTE SETTLEMENT, AMENDING FOR THE PURPOSE ARTICLES 260, 261, 262-A, 262-B AND 277 (F) OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "This bill seeks to amend five (5) articles of PD 442 (Labor Code) on matters, such as the following: (1) the selection of the voluntary arbitrators or a panel of Voluntary Arbitrators; (2) the redefining jurisdiction of the body to hear cases of termination of workers, productivity schemes or wage distortions arising from legislated or mandated wage increases; (3) meting out providing sanctions against erring arbitrators; (4) determining the fees of the arbitrators; and (5) providing subsidy for unions that cannot shoulder the fees of the arbitrators."
