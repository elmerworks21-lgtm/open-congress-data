congress_website_title = "AN ACT ALLOWING FIFTY PERCENT (50%) OF THE TOTAL VALUE ADDED TAX (VAT) PAID AS DEDUCTION FROM THE INCOME TAX"
congress_website_abstract = "Rationale: This bill enhance the taxpayers awareness on the importance of demanding receipts in all transactions they enter into and thereby increase tax collections. The government may be earning so much from already existing tax colleciton systembut the projection is that collection will still increase because business establishments will have records through receipts in all their sales. This will minimize if not eradicate practice of businessmen to cheat the government by not showing the actual sales."

