congress_website_title = "AN ACT PROHIBITING DISCRIMINATION AGAINST FILIPINO EMPLOYEES AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF p"
congress_website_abstract = "Rationale: This unfair treatment directed at Filipino teachers at the International School is discrimination of the reverse kind. It is directed by foreigners against Filipinos on Philippine soil - a sad legacy of a colonial past still being perpetuated by former colonialists. Under the norms of present day civilization, there is NO superior or dominant race of people, there is NO preferred or rimary class of citizens. To give different compensation based not on merit or seniority or experiencebut solely on race and nationality is illegal, oppressive and unjust."
