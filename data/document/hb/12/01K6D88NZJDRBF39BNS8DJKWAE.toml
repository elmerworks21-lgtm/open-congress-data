congress_website_title = "AN ACT ACCELERATING THE DEVELOPMENT OF AN INTEGRATED MASS TRANSPORT AND RAILWAY SYSTEM AND CREATING THE NATIONAL RAILWAY AUTHORITY, PRESCRIBING ITS POWERS, FUNCTIONS AND DUTIES"
congress_website_abstract = "\"National Railways Act of 2002\". There is hereby created a National Railway Authority (NRA) which shall be primarily responsible for the preparation of a Master Development Plan for a national mass transportation and railway system, including its component regional, provincial, and metropolitan railway systems; the construction, development, operation, maintenance of railway systems, and the financing thereof through borrowings from multi-lateral agencies, BOT or other forms of private financing schemes. The preparation and implementation of the Master Development Plan shall be undertaken with the active and meaningful participation of the private sector, including non-governmenta l and people's organizations, and affected local communitiees."
