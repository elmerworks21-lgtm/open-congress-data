congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS ON THE INCOME REQUIREMENT FOR THE CREATION OF LOCAL GOVERNMENT UNITS UNDER REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "R.A. 9009 increased the income requirement for the creation of municipalities into cities from PhP 20 million to Ph100 million while the income requirement for the creation of provinces and highly urbanized cities remained at PhP 20 million and Ph 50 million, respectively. The bill seeks to correct this imbalance in the income requirement by excluding the internal revenue allotment (IRA) shares in the computation of local income. It further maintained the income requirement for the conversion of municipalities into cities at P 20 million as stipulated in the Local Government Code provided only locally generated incomes are included in the computation of the income requirement."
