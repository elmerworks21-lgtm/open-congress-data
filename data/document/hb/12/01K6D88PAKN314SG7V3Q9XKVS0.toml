congress_website_title = "AN ACT PROVIDING FOR A MANDATORY CLEARANCE FOR ALL GOVERNMENT OFFICIALS UPON THEIR RETIREMENT FROM PUBLIC OFFICE, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Honorable Dismissal of Government Officials Act of 2003\\\". This measure seeks to grant retirement benefits to any government official who retires from public service, pursuant to existing rules and procedures, provided that he/she has no pending criminal, civil or administrative case. It likewise requires the issuance of a certificate of honorable dismissal to all retiring government officials by the Civil Service Commission, Office of the Ombudsman and the Department of Justice, upon the completion of his/her accountability clearance and clearance of no pending case. Any retiring government official without a certificate of honorable dismissal shall be barred from receiving his/her retirement benefits."

