congress_website_title = "AN ACT PROVIDING FOR THE REORGANIZATION OF THE NATIONAL POLICE COMMISSION AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Police Commission Act of 2003.\" This bill has the following salient features: (1) the placing of the NAPOLCOM under the Office of the President; (2) authorizing the NAPOLCOM to take charge of police operations relating to public safety ofthe nation and to administer the affairs concerning police education, police communication, criminal identification, criminal statistics and police equipment; (3) providing for the creation of NAPOLCOM District Offices corresponding to the Congressional districts; (4) the placing of the existing PNP Internal Affairs Service (AIS) under NAPOLCOM's Internal Affairs Bureau (IAB); (5) authorizing the Mayor, as deputy of the NAPOLCOM, to order the Chief of Police in a way he sees fit to ensure peancee and order in his locality, and (6) authorizing the Provincial Governor, as NAPOLCOM deputy, to command the PNP Provincial Director."

