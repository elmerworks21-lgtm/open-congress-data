congress_website_title = "AN ACT PROVIDING FOR THE REGULARIZATION OF EMPLOYEES, PROHIBITING CONTRACTUAL OR LABOR-ONLY CONTRACTING FOR REGULAR POSITIONS, PROVIDING PENALTIES FOR VIOLATION THEREOF, AMENDING FOR THE PURPOSER ARTICLES 280 AND 281 OF THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "This bill seeks to amend Articles 280 and 281 of the Labor Code to make sure that all workers would come to enjoy the benefits of regularization when due. This would give workers the necessary boost in their daily toil. This would prevent unscrupulous employers from getting around the law just to deny workers the benefits of regularization. This bill seeks to correct the lopsided disarity of economic interest between the employer and employee to promote social justice in the labor front."
