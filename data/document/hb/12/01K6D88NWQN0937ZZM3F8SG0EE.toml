congress_website_title = "AN ACT PRESCRIBING THE PROCEDURE IN THE SEIZURE AND CONFISCATION OF PROHIBITED DRUGS, AMENDING FOR THE PURPOSE SECTION 36 OF THE DANGEROUS DRUGS ACT"
congress_website_abstract = "Rationale: The rise in drug incidence is a result of rampant drug peddling due to the seemingly inadequate provisions and inappropriate sanctions under existing laws. As a consequence, drug proliferates in the market. In the face of this growing drug menace, the only logical choice is to adopt a stronger policy on drugs if we are to preserve law and order and promote peace in our society.> This bill prescribes the PROCEDURE in the CUSTODY of seized prohibited and regulated drugs. It, likewise,mandates the IMMEDIATE DISPOSITION OR DESTRUCTION THEREOF."
