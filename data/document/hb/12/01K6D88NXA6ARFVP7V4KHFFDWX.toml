congress_website_title = "AN ACT PROVIDING INCENTIVES FOR THE DEVELOPMENT OF MACHINES AND TECHNOLOGY THAT WILL IMPROVE THE PRODUCTIVITY OF RURAL WOMEN WORKERS"
congress_website_abstract = "Any person who shall develop machines and technology that will improve the productivity and rural women workers shall be entitled to the following incentives: (1) Financial grant from the Department of Science and Technology for the fabrication of the model. (2) Exemption from all forms of taxes, duties, fees or imports that may be imposed on the machines and other technological inventions and/or the parts necessary, for their completion. (3) Availament from government banks of collateral freeloans for mass productions of the machines and other technological inventions."

