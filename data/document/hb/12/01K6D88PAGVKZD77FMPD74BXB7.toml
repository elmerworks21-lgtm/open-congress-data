congress_website_title = "AN ACT GRANTING BARANGAY CAPTAINS OR THEIR DULY AUTHORIZED REPRESENTATIVE/S AUTHORITY TO CONDUCT QUARTERLY INSPECTIONS OF BUSINESS ESTABLISHMENTS WITHIN THEIR JURISDICTION"
congress_website_abstract = "\\\"Barangay Business Inspection Act of 2003\\\". R.A. 7160 grants local government units, including barangays, the responsibility of protecting its inhabitants from any form of illegal activity. This bill aims to encourage the punong barangay, sangguniang barangay members and members of the lupong tagapamayapa as well as those persons deemed in authority in each barangay, to expose illegal activities such as prostitution and white slavery, the manufacture of illegal drugs, pirated CDs, VCDs, DVDs, clothing apparel and cigarettes, within their jurisdiction. It grants the barangay captain or his duly authorized representative the authority to conduct inspections of business establishments within their territorial jurisdiction."
