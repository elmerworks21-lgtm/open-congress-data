congress_website_title = "AN ACT CREATING AND ESTABLISHING THE EMERGENCY MEDICAL SERVICES SYSTEM (EMSS) IN THE PHILIPPINES, DEFINING ITS NATURE, FUNCTIONS AND RESPONSIBILITIE S, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This proposed bill seeks to institute an Emergency Medical Services System (EMSS) in the Philippines. This system will serve as a chain of coordinated services that will provide QUALITY EMERGENCY CARE to those who are ill or injured. Under the EMSS,a call for help is processed quickly and efficiently. The basic life saving techniques and advanced life support measures are delivered early to the patient and properly and immediately transported to the appropriate health facility."
