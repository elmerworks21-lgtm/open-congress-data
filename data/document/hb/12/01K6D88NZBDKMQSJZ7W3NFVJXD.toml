congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED SEVENTY-EIGHT THIRTY-TWO, AS AMENDED, OTHERWISE KNOWN AS THE `ANTI-ELECTRICI TY AND ELECTRIC TRANSMISSION LINES/MATERIALS PILFERAGE ACT OF 1994'"
congress_website_abstract = "Pilferage is defined as stealing in small quantities. However, an accumulation of small quantities would mean big quantities, and translate to big losses for the victim. Electricity and electric power transmission lines or materials pilferage is rampant in the country particularly6 in the urban centers. > It is on this premise that the undersigned has filed the measure seeking to increase the monetary reward given to any person who shall report to the proper authorities any act that would constitute electric power transmission lines/materials theft."
