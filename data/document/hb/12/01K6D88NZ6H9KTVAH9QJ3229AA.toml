congress_website_title = "AN ACT GRANTING THE RIGHT TO FRANCHISEES TO DEVELOP THE RURAL AIRPORT INFRASTRUCTURE NETWORK IN THE PHILIPPINES FOR COMMERCIAL AND OTHER PURPOSES"
congress_website_abstract = "The provisions of this act shall be available to any congressional franchise holder (Franchisee) engaged in rural air transport operating any type of fixed or rotary wing, land or sea type of aircraft. > Any Franchisee may construct, manage, operateand/or maintain any rural airport in any part of the Philippines in order to eventually make each municipality regularly accessible or within easy reach of the principal and proximate urban areas with at least 100,000 population."
