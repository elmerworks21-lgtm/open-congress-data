congress_website_title = "AN ACT ESTABLISHING AN INTEGRATED POPULATION AND DEVELOPMENT POLICY, STRENGTHENING ITS IMPLEMENTING STRUCTURES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This bill proposes that the State ultimately recognize the interdependence between population, development and environment. It is a policy that aims to integrate all the facets of this interrelationsh ip into policies and programs that aim to achieve poverty eradication, economic growth, food security, sustainable patterns of consumption and production, women empowerment and sustainable development."
