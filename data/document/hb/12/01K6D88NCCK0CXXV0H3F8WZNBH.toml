congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE COAST GUARD AS A SEPARATE AND DISTINCT SERVICE ATTACHED TO THE DEPARTMENT OF TRANSPORTATION AND COMMUNICATIONS, FURTHER AMENDING REPUBLIC ACT NO. 5173 AS AMENDED AND FOR THE OTHER PURPOSES"
congress_website_abstract = "Rationale: To effect the original intent of the Philippine Coast Guard, there is a need to amend Republic Act No. 5173 to separate the PCG from the PN (Philippine Navy) and attach the same to the Department of Transporttion and Communications (DOTC). The proposed transfer will achieve the original intentions of having a unified and integrated approach to the country's maritime safety and water transport development programs. It seeks to complement earlier safety and water transport developmentpograms. It seeks to complement earlier efforts under Executive Order 477 s. 1998 which transferred to the Philippine Coast Guard to the Department of Transportation and Communications. Indeed, with this proposed bill, the PCG would be able to fullyconcentrate on its functions toward Maritime Safety Administration, Marine Environmental Protection, Maritime Search and Rescue and Marine Law Enforcement."
