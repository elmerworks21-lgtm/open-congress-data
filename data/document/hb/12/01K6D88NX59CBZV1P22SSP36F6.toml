congress_website_title = "AN ACT PROVIDING FOR THE CONSTRUCTION OF A PUBLIC RESTROOMS IN DESIGNATED AREAS IN THE CITIES AND TOWNS OF THE COUNTRY AS WELL AS ALONG THE NATIONAL HIGHWAYS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "It is ironic how the government can boast of various gargantuan infrastructure undertakings when in fact, it could not even do the same when it comes to providing public restrooms. For instance, such areas as mass transit stations, waiting sheds, parks and public highways are severely lacking in toilet facilities. Most public places in the country do not even have one. Hence, this proposed measure. > This bill also intends to humanize the penal sanctions in certain local ordinances which provide for stiffer penalties of fine or imprisonment simply because the supposed offender is answering the call of nature."
