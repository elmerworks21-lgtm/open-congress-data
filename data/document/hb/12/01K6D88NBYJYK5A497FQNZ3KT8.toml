congress_website_title = "AN ACT ALLOWING A FARMER-BENEFICI ARY TO MORTGAGE HIS RIGHT TO THE LAND AWARDED TO HIM, FOR A PERIOD OF TWO (2) YEARS WITHOUT LOSING HIS SECURITY OF TENURE, AMENDING FOR THE PURPOSE SECTION TWENTY-SEVEN OF REPUBLIC ACT NUMBERED SIXTY-SIX HUNDRED ANDFIFTY-SEVEN, OTHERWISE KNOWN AS THE `COMPREHENSIVE AGRARIAN REFORM LAW OF 1988,' AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to amend Republic Act No. 6657 by allowing a farmer-benefici ary, who has not yet fully paid the value of the land awarded to him under the Comprehensive Agrarian Reform Program of the Government, to mortgage his rights thereto to any person within a period of not exceeding two (2) years. In order to ensure the farmer-benefici ary's capability to keep his right of ownership over his land and thus enchance the spirit of the Comprehensive Agrarian Reform Law, this bill provides that the farmer beneficiary shall NEITHER LOSE his security of tenure NOR BE EJECTED from the land, within the period of the mortgage, provided he regularly pays the amortization due to the Land Bank of the Philippines."
