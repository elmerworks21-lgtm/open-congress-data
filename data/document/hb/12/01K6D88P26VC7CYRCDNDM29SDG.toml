congress_website_title = "AN ACT PENALIZING THE UNREASONABLE DELAY IN THE PAYMENT OF RETIREMENT GRATUITY OR REFUND OF RETIREMENT INSURANCE PREMIUMS, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED EIGHTY-TWO HUNDRED NINETY-ONE"
congress_website_abstract = "ANY RESPONSIBLE GSIS OFFICER OR EMPLOYEE WHO FAILS, REFUSES OR UNREASONABLY DELAYS IN THE PAYMENT OF RETIREMENT GRATUITY OR REFUND OF RETIREMENT INSURANCE PREMIUMS SHALL, UPON CONVICTION BY FINAL JUDGMENT, SUFFER THE PENALTIES OF IMPRISONMENT FROM SIX (6) MONTHS AND ONE (1) DAY TO SIX (6) YEARS, AND A FINE OF NOT LESS THAN TEN THOUSAND PESOS (10,000.00) BUT NOT MORE THAN TWENTY THOUSAND PESOS (P20,000.00), AND IN ADDITION SHALL SUFFER ABSOLUTE PERPETUAL DISQUALIFICATIO N FROM HOLDING PUBLIC OFFICE AND FROM PRACTICING ANY PROFESSION OR CALLING LICENSED BY THE GOVERNMENT."

