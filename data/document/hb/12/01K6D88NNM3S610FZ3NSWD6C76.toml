congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF ABSENTEE VOTING BY QUALIFIED FILIPINOS ABROAD"
congress_website_abstract = "All Filipinos abroad who are, or have previously been, registered voters in the Philippines, not otherwise disqualified by law, at least eighteen (18) years of age on the day of election, may vote in all national elections for president, vice-president, senators, and party-list representatives in their temporary residence abroad."
