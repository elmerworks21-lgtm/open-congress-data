congress_website_title = "AN ACT INCREASING THE PENALTIES FOR ILLEGAL GAMBLING AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED SIXTEEN HUNDRED AND TWO, ENTITLED 'PRESCRIBING STIFFER PENALTIES ON ILLEGAL GAMBLING'"
congress_website_abstract = "The penalties being imposed on illegal gambling under the present laws have become ineffectual. The bill seeks to address the social ills brought about by illegal gambling by imposing stiffer penalties and fines to effectively deter, if not stop, civilians, government officials and men in uniform from engaging in and drawing others into this illegal activity. It stipulates the imposition of both fines and imprisonment as penalties for violations of the proposed act."
