congress_website_abstract = "The measure provides for an incentive scheme for prosecutors and prosecution attorneys of the National Prosecution Service, state counsels in the Office of the Chief State Counsel as well as undersecretarie s and Assistance Secretaries in the Department of Justice which would be commensurate to their positions and functions. The incentive scheme also includes a proposal to base the retirement benefits of prosecutors, prosecution attorneys, state counsels in the Office of the Chief, attorney inthe Technical Staff Undersecretarie s and Assistant Secretaries on the highest salary received, inclusive of all allowances."
