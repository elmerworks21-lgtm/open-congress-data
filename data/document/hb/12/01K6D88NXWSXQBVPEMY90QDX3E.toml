congress_website_title = "AN ACT AUTHORIZING THE CREATION OF SPECIAL PURPOSE ASSET VEHICLES TO ALLOW INVESTMENT IN, AND ACQUISITION OF NON-PERFORMING LOANS, REAL ESTATE AND OTHER ASSETS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Creates a legislative framework to encourage private Sector investment into the non-performing loans and assets of Philippine banks. It is an extraordinary measure enacted for the limited purpose of alleviating the temporary NON-PERFORMING ASSETS (NPAs) problem and thus has a limited effective period. This bill facilitates the creation of SPECIAL PURPOSE ASSET VEHICLE (SPAV) established to acquire non-performing assets, including loan assets and real and other properties, currently burdening the financial sector."
