congress_website_title = "AN ACT REORGANIZING THE FERTILIZER AND PESTICIDE AUTHORITY AND EXPANDING ITS POWERS AND DUTIES, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED ONE THOUSAND ONE HUNDRED AND FORTY-FOUR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill also attempts at establishing a special trust fund for the development of the industry - specifically to subsidize, during emergencies, the purchase of such fertilizers and pesticides needed by the farmers, as well as to serve as an investment fund for the full development and integration of the industry from top to bottom, with the farmers, in the end, overseeing their own progress through the judicious management and utilization of this initial resource base."

