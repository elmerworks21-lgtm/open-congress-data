congress_website_title = "AN ACT AUTHORIZING THE RELEASE OF FUNDS DIRECTLY TO THE SANGGUNIANG BARANGAY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT ACT OF 1991"
congress_website_abstract = "Rationale: Section 329 of R.A. 7160, otherwise known as the Local Government Code of 1991, states that \"ten percent (10%) of the general fund of the barangay shall be alloted for the Sangguniang Kabataan.\" This statutory mandate, however, is more often honored in the breach than in its enforcement because most Sangguniang Barangays generally consider it wiser to use scarce financial resources on projects and activities that are deemed \"of greater benefit to the barangay\" than SK concerns. Thus, funds which are, by law intended for the youth are channeled to other purposes."
