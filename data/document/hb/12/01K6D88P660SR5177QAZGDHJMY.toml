congress_website_title = "AN ACT PROHIBITING THE DETENTION OF PATIENTS OR THE REMAINS OF PATIENTS IN HOSPITALS AND MEDICAL CLINICS ON GROUNDS OF NON-PAYMENT OF HOSPITAL BILLS OR MEDICAL EXPENSES"
congress_website_abstract = "Patients who have fully or partially recovered but are financially incapable to settle in part or in full their hospitalization expense, shall be allowed to leave the hospital or medical clinic upon the execution of a promissory note covering the unpaid obligation. Said note shall be secured by either a mortgage or by a co-maker, acceptable to the hospital management, who will be jointly and severely liable with the patient for the unpaid obligation. In case of a deceased patient, the remains and corresponding death certificate and other documents required for interment shall be released to any of his surviving relatives executing the promissory note."
