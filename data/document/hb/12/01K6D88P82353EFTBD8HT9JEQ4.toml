congress_website_title = "AN ACT PROVIDING SPECIAL PROTECTION AND PRIVILEGES TO MEMBERS OF MASS MEDIA AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Media Welfare and Protection Act of 2003\" Freedom of expression is heralded as man's birthright. It is constitutionall y protected and guaranteed. Corollary to freedom of expression is the right to be informed on matters of public concern. Protection of rights invested by the Constitution on the mass media. However, in the exercise of its duty, members of the media often put their lives in danger. The fact that most members are underpaid makes them susceptible to corruption. This bill seeks to grant them special protection and provide additional benefits and incentives to enable them to fully discharge their constitutional obligation with maximum dedication and professionalism ."
