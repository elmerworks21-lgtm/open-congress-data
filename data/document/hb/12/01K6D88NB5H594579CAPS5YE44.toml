congress_website_title = "AN ACT POSTPONING THE BARANGAY ELECTIONS AND REALIGNING THE APPROPRIATIONS OF THE BARANGAY ELECTIONS FOR THE COMPUTERIZATION OF THE NATIONAL AND LOCAL ELECTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The regular elections for punong barangay, sangguniang barangay members, and the sangguniang kabataan chairman shall be POSTPONED to secondy Monday of May 2005. Thereafter, regular elections for barangay officials shall be held every five years. The incumbent punong barangay, sangguniang barangay members and sangguniang kabataan chairman shall continue in office in a hold-over capacity until their successors shall have been duly elected and qualified in the next regular elections."
