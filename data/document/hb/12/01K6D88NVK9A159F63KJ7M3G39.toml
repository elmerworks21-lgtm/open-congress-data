congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 7471, OTHERWISE KNOWN AS AN ACT TO PROMOTE THE DEVELOPMENT OF PHILIPPINE OVERSEAS SHIPPING"
congress_website_abstract = "This bill redefines \"Philippine Overseas Shipping\" as the ACQUISITION, CHARTERING, OPERATIONS, SALE OR SCRAPPING OF A SHIP TO BE REGISTERED OR ALREADY REGISTERED UNDER THE PHILIPPINE-FLAG AS THE CASE MAY BE, BY A PHILIPPINE SHIPPING ENTERPRISE FOR OVERSEAS TRADE except when the vessel is operated solely between ports in the Philippines. >The bill, likewise, EXTENDS for another FIFTEEN years the grant of EXEMPTION from the payment of income tax by a Philippine shipping enterprise."
