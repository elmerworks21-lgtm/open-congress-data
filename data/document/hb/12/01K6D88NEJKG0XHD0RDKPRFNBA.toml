congress_website_title = "AN ACT TO REWARD INFORMANTS WHO HELP IDENTIFY, LOCATE AND RECOVER ANY ILL-GOTTEN WEALTH OF THE LATE PRESIDENT FERDINAND E. MARCOS, AND HIS WIDOW, IMELDA R. MARCOS AND OTHER DEFENDANTS/RESP ONDENTS IN ILL-GOTTEN WEALTH CASES WHEREVER LOCATED AND BY WHOMSOEVER HELD AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: One of the reasons for the dismal record of recovery of the PCGG is that it never seemed to have gotten the support of the people. From the looks of it, if PCGG was left to its own devices, it would probably find the recovery process getting rougher as years pass by with very little tangible results to prod it to go on or even justify its continued existence. Perhaps, by adopting a system of reward for those who provide the government with credible and relevant information on the whereabouts of the Marcos hidden or ill-gotten wealth, the people might just get their hands on it sooner than later."
