congress_website_title = "AN ACT PROVIDING FOR THE REHABILITATION AND MODERNIZATION OF ALL DOMESTIC AIRPORTS IN THE COUNTRY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Most of the country's airports are in need of rehabilitation and upgrading to bring them at par with international standards. Inadequate infrastructure like navigational aids, airport facilities, and air traffic control services, and outmoded radar technology devices are among the aggravating factors which impeded the efficient and safe operation of domestic aircrafts needed to develop a viable and dependable air transportation network.> The continuous and growing demand for air travel makes its imperative for the government to undertake a measure that would promote a nationwide air navigation facilities modernization."
