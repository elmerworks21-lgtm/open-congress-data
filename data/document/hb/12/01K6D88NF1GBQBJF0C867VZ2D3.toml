congress_website_title = "AN ACT TO PROMOTE THE AGRICULTURE INDUSTRY, STABILIZE PRICES OF AGRICULTURAL PRODUCTS AND ENHANCE FOOD SECURITY THROUGH THE EFFECTIVE PRODUCTION, PROCESSING, MARKETING AND DISTRIBUTION OF AGRICULTURAL PRODUCTS, RATIONALIZING AND RESTRUCTURING FOR THE PURPOSE, ALL EXISTING GOVERNMENT ORGANIZATIONS IN AGRICULTURAL PRODUCTION, DISTRIBUTION, MARKETING AND OTHER SUPPORT PROGRAMS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Agricultural Markeing Act of 2001\". This bill aims to achieve the best administration of market development programs for agricultural commodities and food products and ensure a fair return to producers as well as an adequate flow of agricultural products to consumers. It seeks to prevent inefficient and wasteful methods of distribution and to assist in preventing shortages and managing surpluses of agricultural commodities, so as to maintain efficient domestic markets and prevent imbalances from causing undue, excessive and destabilizing fluctuations in the prices of agricultural commodities."

