congress_website_title = "AN ACT PROVIDING FOR THE PROMOTION OF BIO-ORGANIC FARMING IN THE PHILIPPINES"
congress_website_abstract = "Rationale: Bio-organic farming is defined as a system of agricultural production which avoids the use of chemical or inorganic farm inputs, pesticides, weedicides and feed additives, and relies on biological means of conditioning and enriching the soil and of controlling pests.> It would be to the advantage of our environment , out economy and iltimately our people, to adopt this measure providing for the promotion of bio-organic farming in the Philippines."
