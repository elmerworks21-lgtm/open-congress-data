congress_website_title = "AN ACT AUTHORIZING THE TRANSFER OF SENTENCED PERSONS TO OR FROM FOREIGN COUNTRIES"
congress_website_abstract = "This bill seeks to authorize the Secretary of Justice to receive the custody of a Filipino sentenced abroad or cause the transfer of an alien serving sentence in Philippine penitentiaries in accordance with the provisions of the transfer of sentenced persons treaties between the Philippines and another country. It provides for a procedure in securing the consent of sentenced persons and the verification of such consent. It also provides for the administrative costs attendant to the transfer ofsentenced Filipino prisoners."
