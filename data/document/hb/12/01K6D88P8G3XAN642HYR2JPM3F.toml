congress_website_title = "AN ACT PROHIBITING THE DETENTION OF LIVE OR DEAD PATIENTS IN HOSPITALS AND MEDICAL CLINICS ON GROUNDS OF NONPAYMENT OF HOSPITAL BILLS OR MEDICAL EXPENSES"
congress_website_abstract = "The bill seeks to prevent the undesirable practice of hospitals and medical clinics of preventing the release of fully recovered or dead patients due to non-payment of hospital/medica l bills. This practice results in a prolonged and more expensivestay in the hospital of financially distressed patients. Said detention, in a sense, constitutes a deprivation of liberty on the grounds of financial incapacity. This bill allows underprivileged patients to leave the hospital upon the execution of aduly secured (either by mortgage or by a guarantee of a co-maker) promissory note. It also imposes a penal sanction for any violation of the proposed act."
