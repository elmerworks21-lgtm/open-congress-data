congress_website_title = "AN ACT MANDATING THE PHILIPPINE CHARITY SWEEPSTAKES OFFICE (PCSO) TO ALLOCATE TWENTY PERCENT (20%) OF ITS TOTAL NET EARNINGS FROM SWEEPSTAKES AND LOTTO DRAWS FOR LABORATORY, DIAGNOSTIC AND SURGICAL EQUIPMENT OF REGIONAL, PROVINCIAL, CITY AND DISTRICT HOSPITALS THROUGHOUT THE COUNTRY"
congress_website_abstract = "The Philippine Charity Sweepstakes Office (PCSO) shall allocate at least twenty percent (20%) of its total annual net earnings from sweepstakes and lotto draws for the procurement, distribution, installation, maintenance, and operation of laboratoryand diagnostic equipment of regional, provincial, city and district hospitals throughout the country. > In the allocation of such equipment, the PCSO shall give highest priority to regional, provincial, city and district hospitals giving highest priority to the fourth, fifth, and sixth class provinces."
