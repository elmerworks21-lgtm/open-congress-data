congress_website_title = "AN ACT DECLARING AS NATIONAL POLICY THE FREEDOM OF THE FILIPINO FROM ONEROUS, UNREASONABLE AND UNCONSCIONABLE DEBT OR OBLIGATION, REPEALING FOR THE PURPOSE SECTION 31 (b) OF PRESIDENTIAL DECREE NO. 1177 AND SIMILAR LAWS, DECREES, EXECUTIVE AND ADMINISTRATIVE ORDERS, AND CIRCULARS"
congress_website_abstract = "Rationale: The Filipino has suffered for long, and suffered bitterly from the burdens of those debts or obligations which have eaten up as much as thirty to forty percent of the annual national budget, made conveniently and contemptibly by the automatic appropriation provision in Presidential Decree No. 1177, specifically Sections 31 (b) thereof, and similar laws, decrees, executive and administrative orders, or circulars. Section 31 (b) of Presidential Decree No. 1177 and similar laws, decrees, executive orders, administrative orders, or circulars, are hereby repealed."

