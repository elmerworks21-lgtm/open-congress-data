congress_website_title = "AN ACT TO RATIONALIZE THE COMPOSITION AND FUNCTIONS OF THE NATIONAL LABOR RELATIONS COMMISSION, THEREBY AMENDING ARTICLES 213, 214, 215 AND 216, BOOK V, TITLE II OF THE LABOR CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Significant provisions of this bill are: (1) The NLRC shall be composed of the Chairman and [fourteen (14)] TWENTY-THREE (23) members; (2) Labor arbiters shall be given their respective salas at the arbitration level; (3) Labor arbiters shall receive the SAME allowances, retirement and other benefits and privileges as that of the Regional Trial Court Judges."
