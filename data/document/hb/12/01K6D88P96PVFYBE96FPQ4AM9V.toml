congress_website_title = "AN ACT TO INSTITUTIONALIZE SKILLS DEVELOPMENT PLANNING AT THE LOCAL LEVEL, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Institutionalization of Local Skills Development Planning Act of 2003\\\". The bill intends to institutionalize skills development planning at the local government units. Concerned national agencies, the local government, non-government organizations, the industry, the technical vocation institutions, socio-civic groups and other members of civil society shall be tapped to attain this objective. Also, the skills plan would encompass development activities like need assessment, labor market information, skills and entrepreneurial trainings, incentives mechanisms, among others."

