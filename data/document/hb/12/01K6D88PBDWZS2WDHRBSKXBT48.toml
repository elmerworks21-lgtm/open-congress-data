congress_website_title = "AN ACT PROVIDING FOR THE EXPEDITIOUS CANVASS OF THE VOTES FOR THE OFFICES OF PRESIDENT AND VICE PRESIDENT PURSUANT TO THE MANDATE OF THE CONSTITUTION, ARTICLE VII, SECTION 4, BY PRESCRIBING A SEPARATE CERTIFICATE OF CANVASS FOR SAID OFFICES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7166 ENTITLED \\\"AN ACT PROVIDING FOR SYNCHRONIZED NATIONAL AND LOCAL ELECTIONS AND FOR ELECTORAL REFORMS, AUTHORIZING APPROPRIATIONS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "With the decision of the Supreme Court to nullify and void the contract with the Mega Pacific eSolutions for the purchase of automated counting machines for the 2004 elections, the Commission on Election (COMELEC) has to revert to the manual system of voting, counting and canvassing of votes. Because of the tedious process involved, fears have been raised that no President and Vice President may be declared by 12 noon on 30 June 2004. To expedite the canvassing of votes for President and Vice President, the bill prescribes the preparation of a separate certificate of canvass for said offices. Hence, the canvass for said offices shall be undertaken separately from the canvass for Senators, House members, party-list representatives and local elective officials."
