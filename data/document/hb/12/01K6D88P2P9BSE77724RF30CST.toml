congress_website_title = "AN ACT GRANTING SINGLE UNMARRIED WOMEN WITH CHILDREN SAME BASIC PERSONAL EXEMPTION AND ADDITIONAL EXEMPTION FOR DEPENDENTS AS ENJOYED BY MARRIED WOMEN, AMENDING FOR THE PURPOSE THE NATIONAL REVENUE CODE OF 1997"
congress_website_abstract = "Section 35 of the National Internal Revenue Code of 1997 as amended by adding a NEW subsection to read as follows: Sec. 35. Allowances of Personal Exemption for Individual Taxpayers. - > (A) In General - For purpose of determining the tax provided in Section 24(A) of this Title, there shall be allowed a basic perosnal exemption as follows: \"For single individual or married individual judicially decreed as legally separated with no qualified dependents - P20,000; \"For head of family\" - P25,000;\"For each married individual\" - P32,000; \"FOR EACH UNMARRIED WOMAN WITH CHILDREN\" - P32,000"

