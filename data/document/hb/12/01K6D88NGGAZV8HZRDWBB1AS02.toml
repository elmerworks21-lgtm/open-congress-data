congress_website_title = "AN ACT TO STRENGTHEN LOCAL ENVIRONMENT PROTECTION BY MAKING THE APPOINTMENT OF AN ENVIRONMENT AND NATURAL RESOURCES OFFICER MANDATORY FOR PROVINCIAL, CITY AND MUNICIPAL GOVERNMENTS, AMENDING FOR THE PURPOSE SECTION 484 (A) OF REPUBLIC ACT NO. 7160,OTHERWISE KNOWN AS THE `LOCAL GOVERNMENT CODE OF 1991'"
congress_website_abstract = "The fragiles situation of our ecology alone should have prodded past policymakers to make its protection the number one priority of government. But in the so-called Magna Carta of local governments, the designation of the officer responsible or thecare of the environment was not given paramount importance. In case of oversight, if not insensitivity, the naming of an environment and natural resources officer was reduced into an option. This bill attempts to correct this oversight by making it mandatory for city, provincial and municipal governments to appoint an environment and natural officer was reduced into an option. > This bill attempts to correct this oversight by making it mandatory for city, provincial and municipal government to aappoint an environmental and natural resources officer."

