congress_website_title = "AN ACT REDUCING THE QUANTITIES OF PROHIBITED DRUGS AS A BASIS IN THE APPLICATION OF PENALTIES, AMENDING FOR THE PURPOSE THE DANGEROUS DRUGS ACT OF 1972, AS AMENDED"
congress_website_abstract = "The proposed amendment to the Dangerous Drugs Act of 1972 is as follows: \"Section 20. Applications of Penalties Confiscation and Forfeiture of the proceeds for offenses under Sections 3, 4, 7, 8 and 9 of Article II and Sections 14, 14-A, 15 and 16 of Article III of this Act shall be applied if the dangerous drugs involved is in any of the following quantities: (1) [40] 20 grams or more of opium; (2) [40] 20 grams or more of morphine; (3) [200] 10 grams or more of shabu or methamphetamine hydrochloride; (4) [40] 20 grams or more of heroine; (5) [750] 350 grams or more of indian help or marijuana; (6) [50] 25 grams or more marijuana resin or marijuana resin oil; (7) [40] 20 grams or more of cocaine or cocaine hydrochloride."
