congress_website_title = "AN ACT PROVIDING FREE MEDICAL SERVICES TO RETIRED FILIPINO GOVERNMENT PERSONNEL IN GOVERNMENT-OWNE D AND -OPERATED HOSPITALS AND FOR OTHER PURPOSES"
congress_website_abstract = "All retired Filipino government personnel shall be given free medical services in government-owne d and -operated hospitals. In reality, upon the retirement of these public servants, they are left with insufficient support and benefits that slowly devaluate. While the costs of living through their retirement increase, financial support to answer to their medical needs decrease in value as well."

