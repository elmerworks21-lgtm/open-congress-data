congress_website_title = "ACT PROVIDING FOR A SCHOOL NUTRITION PROGRAM"
congress_website_abstract = "\"Child Nutrition Act of the Philippines.\" This bill aims to safeguard the health and well-being of the nation's children, encourage the domestic consumption of agricultural and other foods in order to meet more effectively the nutritional needs of our children. It seeks to established a School Nutrition Program who shall initiate, maintain and expand a system of distribution of milk and fortified snack foods to public elementary school entrants for a minimum of 120 feeding days, 5 times a week;and vitamin supplements for a period and in such dosages as may be determined by the Department of Health. > Incentives shall be given to local dairy cooperatives, private agricultural companies and other institutions donating food, milk, juices, viitamin supplements or other similar products provided that the donation is duly approved by the Secretary of Education, in case of vitamin products, and the Secretary of Health, in case of vitamin products."
