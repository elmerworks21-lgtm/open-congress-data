congress_website_title = "AN ACT PROVIDING AN ALTERNATIVE MODE OF TAX PAYMENT BY CORPORATIONS, AMENDING FOR SUCH PURPOSE SECTION 56 (A) OF THE NATIONAL INTERNAL REVENUE CODE OF 1997"
congress_website_abstract = "The proposed bill seeks to introduce an alternative scheme in the payment of corporate income tax, whereby corporations may satisfy 20% of their taxes payable per taxable year by undertaking, completing, and subsequently transferring to the nationalgovernment and/or local government units infrastructure and other developmental projects, donating equipment, or giving other grants, all of the foregoing to be identified in a list drawn up by the Office of the President."
