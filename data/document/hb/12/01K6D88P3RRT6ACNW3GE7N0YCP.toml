congress_website_title = "AN ACT PROVIDING BENEFIT PACKAGE FOR ALL BARANGAY TANODS IN THE COUNTRY AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Tanod Benefit Package Act of 2002.\" Every barangay is hereby mandated to ensure that each of its Barangay Tanod shall be given the following benefit package: (1) Insurance; (2) Honorarium; (3) Medical subsidy; and (4) Such other bonuses and incentives which may be given by virtue of a municipal/city or barangay ordinance. > All children of a barangay tanod shall be free from tuition and other school fees in all public schools and the State Colleges or Universities within the Region where the barangay is located."

