congress_website_title = "AN ACT CREATING THE NATIONAL PROGRAM FOR FILIPINO GIFTED CHILDREN AND SCIENCE-ORIENTE D YOUTH, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Gifted Children and Science_Oriente d Youth Act.\" This bill aims to: (1) Identify the gifted Filipino children and sience-oriented youth at the earliest age possible; (2) Establish a Center for the identification and nurturance of Filipino gifted children and science-oriente d youth; (3) Provide scholarship grants and other forms of assistance for identified Filipino gifted children and science-oriente d youth; and (4) Provide funds for research ad development, curriculum development, trainingof parents, teachers and other personnel and the necessary infrastructure to carry out the objectives and programs in nurturing of the identified Filipino gifted children and science-oriente d youth."

