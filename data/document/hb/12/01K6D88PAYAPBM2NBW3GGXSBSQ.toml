congress_website_title = "AN ACT APPROPRIATING THE SUM OF FIVE BILLION FIVE HUNDRED TWENTY-FIVE MILLION THREE HUNDRED FIFTY- TWO THOUSAND PESOS (P5,525,352,000.00) AS SUPPLEMENTAL APPROPRIATION FOR FY 2004 AND FOR OTHER PURPOSES"
congress_website_abstract = "The proposed bill seeks to authorize a supplemental appropriations for FY 2004 in the total amount of P5,525,352,000,00 to find the following: a) Dept. of Foreign Affairs - The implementation of the Overseas Absentee Voting Act of 2003 (RA 9189) - PhP 100,000,000.00 b) Dept. of National Defense - AFP upgrading of salaries of the uniformed personnel of the Armed Forces of the Philippines pursuant to RA 9166 - Php 2,200,000,000.00 c) Commission of Elections - The holding of the 2004 national and local elections - 3,225,352,000.00"
