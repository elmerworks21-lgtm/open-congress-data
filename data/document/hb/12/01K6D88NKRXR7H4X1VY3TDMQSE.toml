congress_website_title = "AN ACT PENALIZING THE EMPLOYMENT OF CHILDREN IN ANY PUBLIC OR PRIVATE UNDERTAKING OR OCCUPATION WHICH IS CONSIDERED HAZARDOUS TO HIS/HER LIFE, SAFETY, HEALTH AND MORALS, OR WHICH UNDULY INTERFERES WITH HIS/HER NORMAL DEVELOPMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill classifies \"HAZARDOUS OCCUPATIONS\" for children, Rationale: R.A. No. 7658 (\"Prohibiting the Employment of Children Below 15 years of age in Public and Private Undertakings\") has notably failed to cover the need of prohibiting the employment of children in the 15-17 age category from all forms of hazardous and exploitative occupations and activities. This bill seeks to fill the deficiencies."
