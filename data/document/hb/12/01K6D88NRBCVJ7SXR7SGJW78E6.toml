congress_website_title = "AN ACT REGULATING DIGGINGS AND EXCAVATIONS BY COVERING OR COMPLETING THE FIRST 20 METERS OF WORK BEFORE PROCEEDING TO THE NEXT, PROVIDING PENALTIES FOR VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to protect the public from the inconveniences of diggings in any road, street, pathway and similar places not mentioning the risk it posed on the lives of the persons. To ensure strict compliance thereof, this bill makes it mandatory for the diggers or excavators concerned to excavate, cover and if possible, finish the first 20 meters of their work before proceeding to the next and thereafter."

