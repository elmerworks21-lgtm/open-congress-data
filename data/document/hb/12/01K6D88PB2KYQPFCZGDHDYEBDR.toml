congress_website_title = "AN ACT ABOLISHING THE TWENTY PERCENT (20%) FINAL WITHHOLDING TAX IMPOSED UPON THE AMOUNT OF INTEREST FROM ANY CURRENCY BANK DEPOSIT AND YIELD OR ANY OTHER MONETARY BENEFIT FROM DEPOSIT SUBSTITUTES AND FROM TRUST FUNDS AND SIMILAR ARRANGEMENTS AMENDING FOR THE PURPOSE SECTION 24 (B)(1) OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Savings generation is the most convenient and inexpensive way of raising capital. However, depositors are dissuaded from putting their money in the bank because of the withholding taxes imposed on interest earnings and the low interest rates on savings deposits. This bill seeks to abolish the twenty percent (20%) final withholding tax imposed on the interest earnings of any currency bank deposit and yield or any other monetary benefit from deposit substitutes and from trust funds and similar arrangements. The proposed act will help spur economic growth by generating more investment capital sourced from savings deposits."

