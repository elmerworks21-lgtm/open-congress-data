congress_website_title = "AN ACT PROVIDING FOR THE RETENTION OF CITIZENSHIP BY PHILIPPINE CITIZENS WHO ACQUIRE FOREIGN CITIZENSHIP, AMENDING FOR THE PURPOSE COMMONWEALTH ACT NO. 63, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Citizenship Retention Act of 2001.\" Any provision of law to the contrary notwithstanding , natural-born citizens of the Philippine who become naturalized citizens of a foreign country are hereby declared to have re-acquired their Philippine citizenship upon the effectivity of this Act, unless, by their free, willful and voluntary act, they previously renounced under oath their Philippine citizenship before a Philippine consular official abroad or any public officer authorized to administer anoath."
