congress_website_title = "AN ACT TO REGULATE THE PRACTICE OF PSYCHOLOGY, CREATING FOR THIS PURPOSE A PSYCHOLOGY BOARD, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Institutions and organizations have recognized the vital role of psychology. As a result, corporations and government institutions are now able to create programs that address stress and other hazards in the workplace. Schools and other institutions of learning are able to put into place counseling programs that enhance the learner's intellectual and emotional stability. Penal institutions likewise are able to draw on psychology's vast resources in order to prepare inmates for theireventual reintegration into society. Yet for all its significance and advances, psychology has remained unregulated."
