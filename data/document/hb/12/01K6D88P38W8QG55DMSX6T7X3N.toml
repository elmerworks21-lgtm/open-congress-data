congress_website_title = "AN ACT REQUIRING ALL BEACH RESORT OWNERS/MAINTAIN ERS TO CONSTRUCT AND MAINTAIN WATERWORKS AND SEWERAGE SYSTEMS, SANITARY COMFORT ROOMS, FIRST AID FACILITIES AND PROVIDE LIFEGUARD SERVICES, PRIOR TO THE ISSUANCE OF PERMITS AND LICENSES TO OPERATE BYTHE LOCAL GOVERNMENT UNITS CONCERNED, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "All beach resort owners/maintain ers accredited by the Department of Tourism (DOT) shall, before a permit can be issued by a local government unit, construct and maintain waterworks and sewerage system that will provide potable water to the public and ensure the proper disposal of waster materials therein. In addition, beach resot owners are rerquired to maintain sanitary comfort rooms, first aid and lifeguard facilities and other amenities.> Any beach resort owner or maintainer who fails to comply with this Act within one hundred twenty (12) days after the approval thereof, shall upon conviction, be penalized by a fine of not less than Fifty Thousand Pesos (P50,000.00) nor more than One Hundred Thousand Pesos (P100,000.00) without prejudiice to the suspension of his license to operate the resort until compliance thereof."
