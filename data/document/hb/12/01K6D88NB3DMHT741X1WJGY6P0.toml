congress_website_title = "AN ACT CREATING THE DEPARTMENT OF FORENSIC MEDICINE UNDER THE PHILIPPINE GENERAL HOSPITAL, DEFINING ITS FUNCTIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The proposed bill seeks to establish a Department of Forensic Medicine under the government-run Philippine General Hospital for the purpose of providing impartial and unbiased scientific and technical investigative services to an accused in a criminal case or to any private interested party. It also aims to upgrade crime laboratory facilities in the country in order to improve the examination of physical evidence involved in crimes."

