congress_website_title = "AN ACT AMENDING ARTICLE 16 OF EXECUTIVE ORDER NO. 209, AS AMENDED BY EXECUTIVE ORDER NO. 227, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES, MAKING IT MANDATORY FOR ALL COUPLES TO UNDERGO COUNSELLING PRIOR TO THE ISSUANCE OF A MARRIAGE LICENSE"
congress_website_abstract = "\\\"Mandatory Marriage Counselling Act\\\". This bill provides for a mandatory pre-marriage counseling for all marriage applicants regardless of age. The proposed requirement is aimed at educating couples on the rigors of marriage and how to cope with the challenges they will encounter throughour their married life. The bill also mandates the Department of Social Welfare and Development, in cooperation with the Commission on Population, the Department of Health, the Department of the Interior and Local Government, and representatives of concerned churches and religious sects, to develop a pre-marriage counseling module that will serve as a model for all marriage counseling sessions that will be conducted by government accredited marriage counselors."
