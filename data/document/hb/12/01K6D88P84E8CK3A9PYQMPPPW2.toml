congress_website_title = "AN ACT PROVIDING FOR RELIEFS FROM AND EXECUTION OF FINAL DECISIONS AND AWARDS OF THE NATIONAL LABOR RELATIONS COMMISSION AND THE LABOR ARBITERS, AMENDING FOR THE PURPOSE ARTICLES 223 AND 224 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "As provided under the bill, decisions of the labor arbiters are appealable to the National Labor Relations Commission (NLRC). Subsequently, decisions onwards or resolutions of the NLRC, except those on certified cases, shall be appealable only to the Supreme Court on certiorari under Rule 65 of the Rules of Court solely on question of law and/or jurisdiction. This eliminates one layer of the appellate process which is the Court of Appeals."
