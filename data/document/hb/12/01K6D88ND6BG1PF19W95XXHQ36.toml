congress_website_title = "AN ACT EXPANDING THE DEFINITION OF PIRACY, MAKING IT A TRANSNATIONAL CRIME AND INCREASING THE PENALTY FOR QUALIFIED PIRACY, THEREBY AMENDING ARTICLES 122 AND 123 OF THE REVISED PENAL CODE AND FOR OTHER PURPOSES"
congress_website_abstract = "Section 1. Article 122 of the Revised Penal Code is hereby amended to read as follows: \"ART 122. Piracy in general and mutiny in the high seas or in Philippine waters. - The penalty of reclusion perpetua shall be inflicted upon any person who, on ORFROM the high seas, or in Philippine waters, shall attack or seize a vessel AT SEA OR ANCHORED IN PORT OR A COMMUNITY or, not being a member of its complement nor a passenger, shall seize the whole or part of the cargo of said vessel, its equipment,or personal belongings of its complement or passengers."
