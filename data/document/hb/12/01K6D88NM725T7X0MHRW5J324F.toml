congress_website_title = "AN ACT REPEALING PRESIDENTIAL DECREE NO. 217, AS AMENDED, ENTITLED `ESTABLISHING BASIC POLICIES FOR THE TELEPHONE INDUSTRY, AMENDING FOR THE PURPOSE THE PERTINENT PROVISIONS OF COMMONWEALTH ACT NO. 146, AS AMENDED, OTHERWISE KNOWN AS `THE PUBLIC SERVICE ACT', THE FRANCHISE OF THE PHILIPPINE LONG DISTANCE TELEPHONE COMPANY UNDER ACT NO. 3426, AS AMENDED, AND ALL INCONSISTENT LEGISLATIVE AND MUNICIPAL FRANCHISES INCLUDING OTHER EXISTING LAWS"
congress_website_abstract = "In 1973, President Ferdinand Marcos issued Presidential Decree 217, establishing the basic policies for the telephone industry. The decree aimed to attain an efficient telephone service for as wide an area as possible at the lowest reasonable cost to the subscriber.> The expansion of telephone service is not longer a problem, as there are authorized telephone service providers in all the regions of the country. It is on this premise that this bill is seeking to repeal PD 217."

