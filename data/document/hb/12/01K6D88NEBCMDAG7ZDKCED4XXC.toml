congress_website_title = "AN ACT INSTITUTING A PROGRAM FOR THE CONTINUING EDUCATION OF COLLEGE TEACHERS, AMENDING FOR SUCH PURPOSE REPUBLIC ACT NO. 7784, OTHERWISE KNOWN AS `AN ACT STRENGTHENING TEACHER EDUCATION IN THE PHILIPPINES BY ESTABLISHING CENTERS FOR EXCELLENCE, CREATING A TEACHER EDUCATION COUNCIL FOR THE PURPOSE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "ALL PRIMARY, SECONDARY AND COLLEGE TEACHERS SHALL UNDERGO TRAINING IN PROFESSIONAL EDUCATION, GENERAL EDUCATION AND TEACHING METHODS IN THEIR FIELDS OF SPECIALIZATION AT LEAST ONCE EVERY FIVE (5) YEARS TO BE HELD DURING SCHOOL BREAKS. ANY TEACHER WHO FAILS TO UNDERGO OR COMPLETE THE SAID TRAINING SHALL NOT BE GIVEN ANY TEACHING LOAD FOR A PERIOD OF FIVE (5) YEARS FROM THE DATE OF COMPLETION OF THE NEXT TRAINING. THE RESULTS OF THE TRAINING PROGRAM SHALL ALSO BE THE BASIS FOR THE PROMOTION OF TEACHERS AND THE AMOUNT OF TEACHING LOADS TO BE ALLOCATED."

