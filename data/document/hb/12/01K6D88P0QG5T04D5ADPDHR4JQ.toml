congress_website_title = "AN ACT AMENDING CERTAIN PORTIONS OF PRESIDENTIAL DECREE NUMBERED ONE THOUSAND SIX HUNDRED AND TWELVE, OTHERWISE KNOWN AS THE ANTI-FENCING LAW OF 1979"
congress_website_abstract = "This bill aims to propose a system of tracking and monitoring the circulation of all stolen goods and properties in any given locality. It seeks the cooperation and participation of the police in listing and recording all complaints concerning all stolen goods, articles, items or objects within an immediate are or vicinity. Important information must be included and circulated and posted in all pawnshops, thrift shops or in any establishment engaged in the buying and selling of used and secon-hand articles."
