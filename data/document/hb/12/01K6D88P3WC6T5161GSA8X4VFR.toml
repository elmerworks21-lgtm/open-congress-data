congress_website_title = "AN ACT PROTECTING THE RIGHTS TO LABOR OF THE WORKERS OF INTERNATIONAL RICE RESEARCH INSTITUTE (IRRI) AS ENSHRINED IN THE 1987 CONSTITUTION, AMENDING FOR THE PURPOSE ARTICLE 3 OF THE PRESIDENTIAL DECREE NO. 1620, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to ensure the protection of the basic rights of the workers of the International Rice Research Institute (IRRI). The bill once enacted into law will correct an injustice done to the workers who have been deprived of their labor rights since the signing of the Marcos edict on 19 April 1979 which granted IRRI immunity from any penal, civil and administrative proceedings."
