congress_website_title = "AN ACT GRANTING CERTAIN INCENTIVES TO RESIDENT FILIPINOS WHO WILL TRAVEL TO DOMESTIC TOURIST DESTINATIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "A full discount of twenty-five percent (25%) shall be given to students, senior citizens, the disabled and the unemployed Filipinos, deductive from its total bill representing transportation, accommodation and meal expenses. On the other hand, employees with a net income of not more than Four Hundred Fifty Thousand Pesos (P450,000.00) shall be given a twenty percent (20%) discount considring their ability to pay."
