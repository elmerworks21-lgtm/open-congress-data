congress_website_title = "AN ACT CREATING A DEPARTMENT OF MARITIME AFFAIRS, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The Philippine Merchant Marines both domestic and international are in a sad and sorry state. A very low priority has been given for maritime development by past administrations and our maritime potential has never been fully exploited. > The most urgent need to create a comprehensive, sound and up-to-date policy that would govern a specific maritime field of interest for the government to immediately focus on the growth and development requirements of our maritime industry. These requirementscan only be effectively addressed through the creation of the Department of Maritime Affairs."
