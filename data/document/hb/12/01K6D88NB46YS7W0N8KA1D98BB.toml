congress_website_title = "AN ACT TO SPUR THE PLANTING OF A BILLION TREES THROUGH COMPLEMENTARY TREE PLANTING PROGRAMS OF THE DENR AND VARIOUS GOVERNMENT AGENCIES, LOCAL GOVERNMENT UNITS AND COMMUNITIES, SCHOOLS AND UNIVERSITIES, AND CIVIC AND NON-GOVERNMENTA L ORGANIZATIONS,PROTECTING THE REMAINING NATURAL FORESTS AND FOREST PLANTATIONS, AND CREATING A FUND THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Billion Trees Act of 2001.\" All sectors of society will be mobilized for this tree planting, particularly national government agencies, the upland, lowland, and coastal communities, LGUs, NGOs, private landowners and corporations, and indigenous peoples. At least one million hectares of open and denuded public forest lands, private lands, and idle portions of alienable and disposable lands will be planted with forest and fruit tree species for the first five years."
