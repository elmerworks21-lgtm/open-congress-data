congress_website_title = "AN ACT PUNISHING ANY OFFICER OR EMPLOYEE OF THE LAND TRANSPORTATION OFFICE WHO IS RESPONSIBLE FOR REGISTERING A STOLEN MOTOR VEHICLE, INSERTING FOR THE PURPOSE, A NEW SECTION BETWEEN SECTIONS FIFTY-SEVEN AND FIFTY-EIGHT OF REPUBLIC ACT NUMBERED FORTY-ONE HUNDRED THIRTY-SIX"
congress_website_abstract = "ANY OFFICER OR EMPLOYEE OF THE LAND TRANSPORTATION OFFICE WHO IS RESPONSIBLE FOR THE REGISTATION OF A STOLEN VEHICLE SHALL BE PUNISHED BY A FINE EQUIVALENT TO THE MARKET VALUE OF THE STOLEN MOTOR VEHICLE REGISTERED OR IMPRISONMENT OF NOT LESS THAN ONE YEAR, OR BOTH, IN ADDITION THERETO, IF FOUND GUILTY, SUCH OFFICER OR EMPLOYEE SHALL BE DISMISSED FROM THE SERVICE WITH PREJUDICE TO REINSTATEMENT OR REEMPLOYEMENT IN THE GOVERNMENT SERVICE AND THAT ALL BENEFITS OR PRIVILEGES HE MAY BE ENTITLED SHALL BE FORFEITED."
