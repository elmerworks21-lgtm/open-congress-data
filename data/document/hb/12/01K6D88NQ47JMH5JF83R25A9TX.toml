congress_website_title = "AN ACT FURTHER STRENGTHENING THE HOME DEVELOPMENT MUTUAL FUND AND FOR OTHER PURPOSES"
congress_website_abstract = "The HOME DEVELOPMENT MUTUAL FUND created by PD No. 1752 is sought to be amended as follows: (1) The Fund's tax-exempt status should be restated. (2) The powers of the Board of Trustees should be further expanded. (3) The Fund should be exempted from the Salary Standardization Law. (4) The enforcement power of the Fund should be strengthened."

