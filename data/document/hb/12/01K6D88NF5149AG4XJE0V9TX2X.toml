congress_website_title = "AN ACT ESTABLISHING THE FORENSIC SCIENCE INSTITUTE IN THE UNIVERSITY OF THE PHILIPPINES SYSTEM, DEFINING ITS FUNCTIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The bill seeks to establish a Forensic Science Institute in the University of the Philippines System for the purpose of providing competent, scientific and modern technical services and advance medical facilities for the detection and investigationof crimes. It also aims to enhance the capability of existing forensic laboratories and training of personnel involved in the criminal justice system and who are also directly involved in forensic investigation in order to upgrade their skills and tojeep up with the latest advances and procedures in forensic science."

