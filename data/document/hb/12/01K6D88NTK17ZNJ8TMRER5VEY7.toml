congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NO. 7165, AND FOR OTHER PURPOSES(RE: AMENDING THE LITERACY COORDINATING COUNCIL)"
congress_website_abstract = "RA No. 7165, the Literacy Coordinating Council Act, is amended as follows: \"SECTION 5. THE COUNCIL SHALL HAVE A SECRETARIAT THAT SHALL PROVIDE ADMINISTRATIVE AND TECHNICAL SERVICES. THE SECRETARIAT OF THE COUNCIL SHALL BE HEADED BY AN EXECUTIVE DIRECTOR WHO SHALL BE ASSISTED BY A DEPUTY EXECUTIVE DIRECTOR, TECHNICAL RESEARCH AND OTHER SUPPORT STAFF TO BE HIRED SHALL BE DETERMINED BY THE COUNCIL AND THE EXECUTIVE DIRECTOR, SUBJECT TO EXISTING LAWS, RULES AND REGULATIONS ON BUDGETING AND THE REVISED COMPENSATION AND POSITION CLASSIFICATION SYSTEM. >The administrative and research staff shall be detailed from the existing personnel of the Department of Education, Culture and Sports (DECS) without prejudice to the designation AND/OR APPOINTMEENT by the Council of such additional staff members as it may deem necessary for the proper discharge of its functions and responsibilitie s, OR MAY BE HIRED BY THE COUNCIL IN CASE THE DECS CANNOT SPARE ANY OF ITS PERSONNEL.\""
