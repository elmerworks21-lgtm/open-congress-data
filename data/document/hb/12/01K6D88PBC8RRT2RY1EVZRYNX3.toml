congress_website_title = "AN ACT ESTABLISHING THE LIVELIHOOD AND TECHNOLOGY RELATED LOAN CONDONATION ACT OF THE PHILIPPINES"
congress_website_abstract = "\\\"Livelihood and Technology-Related Loan Condonation Act of 2004\\\". The bill proposes to condone all penalties and surcharges imposed upon all livelihood and technology-related loans granted by government financing institutions upon filing of the restructuring application. The proposed condonation act shall cover all due and demandable arrearages composed of the principal and interest outstanding as of the effectivity of the condonation program. The proposed act shall not cover accounts without an amortization due payment since the loan take-out and accounts that have been foreclosed with the sheriff's certificate of sale already issued."
