congress_website_title = "AN ACT TO CONDONE PENALTIES ON DELINQUENT SOCIAL SECURITY CONTRIBUTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 1161, AS AMENDED BY REPUBLIC ACT NO. 8282, AND FOR OTHER PURPOSES"
congress_website_abstract = "The provisions of Section 30 of R.A. No. 8282, notwithstanding , any employer who is delinquent or has not remitted all contributions due and payable to the Social Security System (SSS) may, without incurring the prescribed penalty, remit in full such delinquent contributions within a period of twelve (12) months from the effectivity of this Act, or submit in writing a proposal to pay in installment such delinquent contributions within a period of six (6) months from the effectivity of this Act. The employer shall submit together with his remittance or installment proposal the corresponding collection list."
