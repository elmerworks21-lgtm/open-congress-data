congress_website_title = "AN ACT INCREASING THE MEMBERS OF THE AGRARIAN REFORM ADJUDICATION BOARD, AMENDING SECTION 13 OF EXECUTIVE ORDER NO. 129-A, OTHERWISE KNOWN AS THE REORGANIZATION ACT OF THE DEPARTMENT OF AGRARIAN REFORM, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The Department of Agrarian Reform Adjudication Board (DARAB), created under Executive Order No. 129-A, is the quasi-judicial body with the primary jurisdiction of hearing and determining all agrarian disputes except those pertaining to the determination of just compensation and resolution of criminal offenses arising from the implementation of agrarian laws. DARAB, however, is confronted with an enormous backlog of cases. To date, there are approximately 9,000 pending cases on agrarian disputes, about one-third (1/3) of which are on appeal. Given the increasing volume of agrarian cases, it appears that the present composition of the DARAB, and its procedure for resolving appealed cases in no longer adequate."

