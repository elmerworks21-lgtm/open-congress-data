congress_website_title = "AN ACT PROVIDING THAT THE SCHEDULE OF FAIR MARKET VALUES OF REAL PROPERTY SHALL BE PREPARED BY THE LOCAL ASSESSMENT COUNCIL AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Before any general revision of property assessment is made pursuant to the provision of this Title, there shall be prepared a schedule of fair market values by the [provincial , city and the municipal assessors] LOCAL ASSESSMENT COUNCIL OF EACH PROVINCE CITY OR MUNICIPALITY [the municipalities within Metropolitan Manila Area] for the different classes of real property situated in their respective local governent units for enactment by ordinance of the sanggunian concerned. The schedule of fairmarket values shall be posted in the provincial capitol city or municipal hall and in two other conspicuous public places therein. > THE LOCAL ASSESSMENT COUNCIL SHALL BE COMPOSED OF THE PLANNING AND DEVELOPMENT OFFICER, ASSESSOR, A REPRESENTATIVE FRROM THE SANGGUNIAN AND A REPRESENTATIVE FROM THE PRICATE SECTOR OR NON-GOVERNMENTA L ORGANZIATIONS REPRESENTED IN THE LOCAL DEVELOPMENT COUNCIL."

