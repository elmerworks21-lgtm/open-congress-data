congress_website_title = "AN ACT REQUIRING THE NATIONAL GOVERNMENT TO ALLOCATE A MINIMUM OF TWO PERCENT (2%) OF THE TOTAL GROSS NATIONAL PRODUCT FOR SCIENTIFIC AND TECHNOLOGICAL RESEARCH AND DEVELOPMENT"
congress_website_abstract = "This bill seeks to allocate a minimum to two percent (2%) of the country's total gross national product for scientific and technological research and development activities. By so proposing, it lends substance to the constitutional provision which mandates government to give priority to research and development. It likewise, that by giving momentum to R&D activities, we will be able to sustain economic growth."

