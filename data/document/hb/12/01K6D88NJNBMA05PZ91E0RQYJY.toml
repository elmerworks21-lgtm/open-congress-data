congress_website_title = "AN ACT REQUIRING ADVERTISEMENT OF ALCOHOLIC BEVERAGES TO BEAR HEALTH WARNINGS"
congress_website_abstract = "\"Sensible Advertising Act\". Alcoholic beverages in the Philippines do not provide for healthy warning hence there is a significant need to fill the void. This bill addresses this need by providing specific health warnings in advertisements through magazine, newspapers, brochures, and promotional display as well as those made through radio, television, broadcasting or other electronic means."
