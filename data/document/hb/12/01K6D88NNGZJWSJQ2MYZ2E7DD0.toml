congress_website_title = "AN ACT PROVIDING FOR A SEPARATION BENEFIT TO GOVERNMENT OFFICIALS AND EMPLOYEES AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: This bill seeks to resolve the inequality by officials and employees of the government who are separated from the service through not fault of their own but as a result of reduction in force for lack of work or funds, or for a change inthe scope or nature of an agency's program or abolition of an agency or office or its functions and acitivities integrated with those of another agency. > this refers to an official or employee who has rendered at least TEN (10) years or LESS than twenty (20) years of service in the government."

