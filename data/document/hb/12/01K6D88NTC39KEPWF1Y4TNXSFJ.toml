congress_website_title = "AN ACT TO AMEND REPUBLIC ACT NUMBERED THREE THOUSAND FOUR HUNDRED FIFTY-SIX, AS AMENDED BY THE REPUBLIC ACT NUMBERED FOUR THOUSAND ONE HUNDRED SEVENTY-SEVEN, OTHERWISE KNOWN AS `INTERNAL AUDITING ACT OF 1962'"
congress_website_abstract = "The \"Internal Auditing Act of 1962\" has not been fully implemented. Partial implementation only came into being after the issuance of Administrative Order No. 278 dated April 28, 1992 by President Corazon C. Aquino. The organization of internal audit services in the government offices, agencies and local government units have also been hampered due to the absence of internal audit service organizational structures and positions in the government. The amendments mandates the concerned government agencies to promulgate within a prescribed period the implementing rules and regulations of the Internal Auditing Act and to organize Internal Audit Services and create Internal Auditor posiitons in the government as deemed necessary to fully impleement the provisions of the Internal Auditing Act."
