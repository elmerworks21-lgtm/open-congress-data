congress_website_title = "AN ACT TO FURTHER STRENGTHEN CONSUMER PROTECTION BY AMENDING FOR THIS PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NO. 7394, OTHERWISE KNOWN AS THE CONSUMER ACT OF THE PHILIPPINES"
congress_website_abstract = "This bill seeks to make NATIONAL CONSUMER AFFAIRS COUNCIL (NCAC) a truly independent body as intended by law. By placing it under the Office of the President, it shall have the power to: (1) prepare its annual budget for submission to the DBM; (2) create other positions as may be necessary in furtherance of its mandate; and (3) assume the authority to represent consumers in their claims and complaints invovlding violations of the Consumer Act."

