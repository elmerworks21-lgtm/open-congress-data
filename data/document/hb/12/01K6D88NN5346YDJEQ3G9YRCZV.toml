congress_website_title = "AN ACT REGULATING THE LABELING, SALE AND ADVERTISING OF CIGARETTES AND OTHER TOBACCO PRODUCTS, PROHIBITING SMOKING IN PUBLIC CONVEYANCES AND ENCLOSED PUBLIC PLACES, PROVIDING FOR VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Comprehensive Tobacco Regulation Act of 1998.\" Rationale: Notwithstanding the fact that the tobacco industry is a major source of revenue of the government, the drive against smoking should be supported. But since tobacco is not a prohibited item,its use must be regulated. It is, therefore, the purpose of this bill to propose a \"Comprehensive Tobacco Regulation Act\" that endeavors to cover all aspects in order to safeguard public health while at the same time ensuring the rights of smokers."
