congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED SEVEN THOUSAND ONE HUNDRED AND SIXTY, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Aside from yielding gains and good results, the seven (7) years of the Local Government Code implementation have also brought to light some gaps, inconsistencies , rigidities, weaknesses, or simple oversights in the code itself. The pastseven years have also occasioned changes in LGU conditions that call for adjustment in the policies that the Code provides. All these require looking again at the Code proposing amendments where necessary. >The proposed amendments seek to address these concerns: (1) RELATIONS AND PRINCIPLES (2) DEVOLUTION/POWE RS AND FUNCTIONS (3) REVENUE SOURCES AND FISCAL MANAGEMENT (4) STRUCTURES AND SYSTEMS (5) POPULAR PARTICIPATION"

