congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 8435, OTHERWISE KNOWN AS \\\"AN ACT PRESCRIBING URGENT RELATED MEASURES TO MODERNIZE THE AGRICULTURE AND FISHERIES SECTORS OF THE COUNTRY IN ORDER TO ENHANCE THEIR PROFITABILITY, AND PREPARE SAID SECTORS FOR THE CHALLENGES OF GLOBALIZATION THROUGH AN ADEQUATE, FOCUSED AND RATIONAL DELIVERY OF NECESSARY SUPPORT SERVICES, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The enactment of the Agriculture and Fisheries Modernization Act (AFMA) effectively deprived the agro-processors of the importation incentives they enjoyed under the Investment Priorities Plan (IPP) such as the duty-free importation of equipment, the availment of equivalent tax credits for locally procured equipment and tax holidays. Believing that agro-processors enjoy these incentives under the AFMA, the Board of investments excluded agro-processors from the IPP. The lost incentive resulted in a decline in investment in agro-processing activities from 2001 until the present. This measure seeks to restore the incentives program, specially the duty-free importation of capital equipment, to the agri-business sector."

