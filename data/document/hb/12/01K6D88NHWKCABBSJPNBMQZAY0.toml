congress_website_title = "AN ACT REGULATING THE MAINTENANCE, ESTABLISHMENT OR CONSTRUCTION OF FUEL DEPOTS AND WAREHOUSES, OR STORAGE OF OTHER FLAMMABLE OR HAZARDOUS CHEMICALS OR SUBSTANCES, AND FOR OTHER PURPOSES"
congress_website_abstract = "This Act shall cover all future and existing publicly and privately-owned fuel depots and warehouses or storage of flammable or hazardous chemicals and substances. These shall include places or establishments not normally intended for such storage or deposits but are actually used for the purpose on a temporary or permanent basis. The movable character of the depot, warehouse or storage shall not remove the same from the coverage of this Act. No such depot, warehouse or storage shall be maintained, established, or constructed within a dangerous distance from a populated area or area classified as residential. Conversely, areas within the same radius from such depot, warehouse or storage shall not be classified as residential nor shall acctually be used as such. The distance shall vary depending upon the volume and nature of the stored fuel, substance, or chemical."

