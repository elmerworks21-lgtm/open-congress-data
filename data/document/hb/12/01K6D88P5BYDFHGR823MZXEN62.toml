congress_website_title = "AN ACT PROVIDING FOR THE ABOLITION OF THE DEPARTMENT OF BUDGET AND MANAGEMENT, AND THE CREATION OF A BUDGET OFFICE UNDER THE OFFICE OF THE PRESIDENT AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Budget Office Act of 2002.\" This bill seeks to abolish the Department of Budget and Management (DBM) and create a new office under the Office of the President which shall be known as the `BUDGET OFFICE', which shall take over the powers and functions of the DBM. > The author of this proposed measure believes that budget administration, systems and processes need improvement. This bill endeavors to improve these functions through a simplified structure in budget management. It is expected thatsuch simple institution tasked in budget administration will result in a more focused fiscal directions."
