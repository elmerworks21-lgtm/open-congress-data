congress_website_title = "AN ACT INSTITUTING A PUBLIC SCHOOL TEACHERS SCHOLARSHIP PROGRAM, AND FOR OTHER PURPOSES"
congress_website_abstract = "The grantee of the scholarship program under this Act shall be entitled to financial assistance which may include tuition and other school fees, outright grant for prescribed textbooks and essential school supplies, transportation expenses and monthly living allowance: Provided, however, That in the granting of financial assistance, the availability of funds, purchasing power of the peso and rate of financial assistance given under other government scholarship programs must be considered."

