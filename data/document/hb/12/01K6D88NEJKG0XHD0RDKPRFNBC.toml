congress_website_title = "AN ACT REQUIRING THE TEACHING OF HUMAN RIGHTS AS MANDATORY IN ALL PUBLIC AND PRIVATE SCHOOLS AND FOR OTHER PURPOSES"
congress_website_abstract = "All public and private shools shall include human rights courses in their curricula. No school shall be established or allowed to operate unless this requirement is complied with. The Department of Education, Culture and Sports, in consultation withthe Commission on Human rights, shall formulate courses on human rights to be taught as separate courses or incorporated in existing subjects now being taught in all levels of education throughout the country."

