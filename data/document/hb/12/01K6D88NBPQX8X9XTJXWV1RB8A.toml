congress_website_title = "AN ACT AMENDING SECTION TWENTY-SEVEN OF THE TAX REFORM ACT OF 1997 AND HEREBY IMPOSING A TAX ON INTEREST INCOME AND CAPITAL GAINS OF THE GOVERNMENT SERVICE INSURANCE SYSTEM (GSIS) AND SOCIAL SECURITY SYSTEM (SSS)"
congress_website_abstract = "Rationale: The incomes of the GSIS and the SSS, both from contributions and investments are EXEMPT from all taxes. The tax exemption of the SSS and the GSIS give them an advantage over other investment houses and pension funds when they participatein the capital market. The tax exemption gives them higher profits in their investments and this allows them a wider room in making deals. To level the playing field, this bill proposes to tax the investment of the SSS and GSIS. They will be subject to taxes such as capital gains tax and stock transaction tax, 20% final tax on deposits just like any other corporation."

