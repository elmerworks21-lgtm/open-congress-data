congress_website_title = "AN ACT PROVIDING FOR THE RATIONALIZATION OF SALARIES OF OFFICIALS AND EMPLOYEES OF GOVERNMENT-OWNE D OR CONTROLLED- CORPORATIONS AND GOVERNMENT FINANCIAL INSTITUTIONS EXEMPTED FROM THE COMPENSATION AND POSITION CLASSIFICATION SYSTEM"
congress_website_abstract = "This bill allows all officials and employees of government-owne d or-controlled corporations and government financial institutions which, by virtue of their Charters, are exempted from the Compensation and Position Classification System, to receivecompensation of more than twice the salaries of equivalent ranks and positions in other government agencies. > Incumbent officials and employees who are receiving compensation exceeding the standardized salary rate as provided in the Compensation andPosition Classification System, but not more than twice the salary of equivalent rank or position in other government agencies, at the time of the effectivity of this Act, shall continue to receive such compensation: Provided, That subsequent increaases shall be in accordance with the salary prescribed under this Act."
