congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA FOR PUBLIC SOCIAL WELFARE AND DEVELOPMENT WORKERS"
congress_website_abstract = "This bill is premised to these State policy which states: The State shall --- (1) promote and improve the social and economic well-being of public social welfare and development workers, their living and working conditions and terms of employment; (2) developed their skills and capabilities in order that they will be more responsive and better equipped in delivering social services and programs, and (3) encourage those with proper qualifications and excellent abilities to join and remain in government service."
