congress_website_title = "AN ACT ESTABLISHING THE PARAMETERS OF ECONOMIC, SOCIAL AND CULTURAL RELATIONS BETWEEN THE PEOPLE OF THE PHILIPPINES AND THE PEOPLE OF TAIWAN"
congress_website_abstract = "Rationale: In view of the adoption of the Philippines of its one-China policy pursuant to the Joint Communique dated June 9, 1975 between the Republic of the Philippines and the People's Republic of China and the absence of formal diplomatic relations with the authorities on Taiwan, Congress finds it necessary to establish the parameters for a closer and more active interaction between the people of the Philippines and the people on Taiwan in the areas of economics, trade, commercial, cultural,social and othr mutually beneficial relations."
