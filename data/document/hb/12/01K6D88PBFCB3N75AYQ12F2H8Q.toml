congress_website_title = "AN ACT AUTHORIZING THE COURTS TO ALLOW THE POST-CONVICTION INTRODUCTION OF RESULTS OF DNA TESTING AS EVIDENCE, PROVIDING GUIDELINES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The DNA Act of 2004\\\". Perpetrators of crimes can be placed at a crime scene through blood stains, hair, body tissues and other biological evidence gathered and properly preserved. This bill seeks to authorize the courts to allow the post-conviction introduction of the results of DNA (deoxyribonucleic acid) testing as evidence for the purpose of identifying the real offenders and exonerating the wrongfully accused or convicted. The use of forensic DNA analysis allows a more certain and rapid identification of an offender."

