congress_website_title = "AN ACT ALLOWING TUITION FEES PAID FOR THE EDUCATION OF CHILDREN DEDUCTIBLE FROM GROSS INCOME OF INDIVIDUAL TAXPAYERS"
congress_website_abstract = "The proposed amendment to Section 29 of the National Internal Revenue Code reads as follows: (N) DEDUCTION ALLOWABLE FROM THE GROSS INCOME OF FILIPINO INDIVIDUAL TAXPAYERS - IN COMPUTING THE TAXABLE INCOME OF A FILIPINO INDIVIDUAL TAXPAYER, REGARDLESS OF WHETHER OR NOT HE IS A COMPENSATION INCOME EARNER, ENGAGED IN BUSINESS OR TRADE, OR IN THE PRACTICE OF PROFESSION, THERE SHALL BE ALLOWED A DEDUCTION IN HIS GROSS INCOME FIFTY PERCENT (50%) OF THE TOTAL AMOUNT PAID FOR MATRICULATION FEES FORTHE EDUCATION OF HIS CHILDREN IN ANY GIVEN YEAR WHICH SHALL IN NO CASE EXCEED THE AMOUNT OF TWENTY THOUSAND PESOS (P20,000.00) SUBJECT, HOWEVER, TO THE FOLLOWING CONDITIONS: >1) THE INDIVIDUAL TAXPAYER MUST HAVE ENROLLED HIS CHILDREN OF SCHOOL AGE, BBUT NOT OVER TWENTY FOUR (24) YEARS OLD, IN ANY OF THE PUBLIC OR PRIVATE SCHOOLS RECOGNIZED BY THE GOVERNMENT WHERE PHILIPPINE HISTORY, GOVERNMENT AND CIVICS ARE CAUGHT AS A PART OF THE SCHOOL CURRICULUM.; 2) THE CHILDREN ARE TAKING ELEMENTARY, SECON"
