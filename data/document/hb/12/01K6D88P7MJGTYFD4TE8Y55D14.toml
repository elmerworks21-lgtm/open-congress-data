congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8436, ENTITLED `AN ACT AUTHORIZING THE COMMISSION ON ELECTIONS TO USE AN AUTOMATED ELECTION SYSTEM IN THE MAY 11, 1998 NATIONAL OR LOCAL ELECTIONS AND IN SUBSEQUENT NATIONAL AND LOCAL ELECTORAL EXERCISES, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES'"
congress_website_abstract = "Republic Act No. 8436 authorizes the COMELEC ot use an automated election system for voting, counting and canvassing of votes. Section 2 (2) of the law defines a Counting Machine as \"a machine that uses an optical scanning/mark-s ense reading device\" or any similar advanced technology to count ballots, otherwise known as the \"Optical Mark Reader (OMR) counting machine.\" > With the prohibitive cost of using optically marked ballots (at present estimated to cost P25.00 per ballot vis-a-vis P10.00per ballot when it was first used in the ARMM elections), the bill seeks to delete the requirement under R.A. 8436 for the use of an OMR counting machine and allow the use of an electronic device that uses appropriate advanced technology to count bballots. It further allows for the storage of electronic data via compact disc drives and compact discs. Finally, it authorizes the COMELEC to acquire necessary materials by purchase, lease or otherwise to allow flexibility under budget constraints."
