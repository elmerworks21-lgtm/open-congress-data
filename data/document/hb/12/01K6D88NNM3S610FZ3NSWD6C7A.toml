congress_website_title = "AN ACT GRANTING INCOME EXTENDERS TO PUBLIC ELEMENTARY AND HIGH SCHOOL TEACHERS AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill shall apply only to public elementary and high school teachers in the active service. Certain INCOME EXTENDERS proposed are: (1) Fare discounts; (2) Price discounts on rice and corn; (3) Lower rates of loan interests; (4) Free tuition andmatriculation fees for their children; and (5) Preference in receiving educational loans."
