congress_website_title = "AN ACT EXPANDING THE COVERAGE OF RAPE CRISIS CENTERS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8505"
congress_website_abstract = "\\\"Women and Children Crisis Survivors Assistance and Protection Act of 2003\\\". Violence against women and children is one of the pervasive forms of human rights abuse in our society. Victims are often forced to endure situations of violence due to the lack of services that will support the decision to resist violence. Shelter, employment, child care support, medical and legal assistance and psychological counseling are the common immediate needs of survivors of violence. These can be provided by crisis center or shelter, community-based organizations, non-government organizations and government agencies. The bill seeks to expand the coverage or rape crisis centers (established under RA 8505) to include victims of other forms of gender violence such as trafficked, prostituted and/or exploited women."

