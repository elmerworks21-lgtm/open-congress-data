congress_website_title = "AN ACT CLASSIFYING ELECTION OFFENSES, AND PROVIDING STIFFER PENALTIES FOR VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: INCREASING the penalties for election offenses, as well as the immediate and decisive prosecution thereof, would serve as a deterrent against electoral fraud and violence. If enacted into law, this vital piece of legislation would contribute to the professionaliza tion and democratization of our political structures towards meaningful economic and social reforms in Philippine society. In the main, this bill seeks to impose upon the offender the penalties of prision correctional andprision mayor which have the same number of years of imprisonment for serious and less serious election offenses, respectively, under the Election Code of 1978."
