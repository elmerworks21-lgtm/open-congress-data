congress_website_title = "AN ACT PROVIDING THAT ALL CONTRACTUAL AND CASUAL EMPLOYEES IN THE GOVERNMENT SERVICE BE PAID THEIR CORRESPONDING WAGES DURING SPECIAL PUBLIC HOLIDAYS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Raionale: All contractual and casual employees work under the principle of \"no work, no pay.\" During non-working special public holidays when tenured employees are paid a full day's wage, said \"marginalized\" employees do not enjoy the same privilege. This situation may very well be seen as unfair, considering that they too are burdened by the same problems confronting the regular employees such as the rising cost of living, basic health care and decent education for their children. This practice runs counter to the government's declared policy aforementioned, and aggravates the already impoverished state of most Filipino families."

