congress_website_title = "AN ACT FURTHER AMENDING REPUBLIC ACT NO. 8291 AMENDING PRESIDENTIAL DECREE NO. 1146, OTHERWISE KNOWN AS THE `REVISED GOVERNMENT SERVICE INSURANCE ACT OF 1977', AS AMENDED"
congress_website_abstract = "This bill proposes that all years credited for initial retirement, resignation or separation for which corresponding benefits have been awarded, shall be included for purposes of computation of service in case an official or employee is reinstated in the government service with the option given to the said employee to choose under what law he will retire. However, this is subject to the condition that the benefits received upon initial separation or retirement prior to his reinstatement, shallbe deducted from the benefits he shall receive from his subsequent retirement."
