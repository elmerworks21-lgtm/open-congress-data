congress_website_title = "AN ACT TO PREVENT UNAUTHORIZED PERSONS FROM HAVING ACCESS TO FIREARMS"
congress_website_abstract = "\"Firearms Access Prevention Act.\" This proposed measure seeks to impose a ban on unauthorized persons from having access to firearms. In this Act, punishable acts related to unauthorized access to firearms and the indiscriminate use of them are also defined and imposed the penalties of both imprisonment and a fine of not more than one hundred thousand pesos. This stiff penalty to such violation is conceived to institutionaliz e a deterrence in the furtherance of the commission of crimes related to what is prohibited in this Act. To further institutionaliz e a system of safekeeping of firearms a secure gun storage or safety device is urged to be used by firearms owners."
