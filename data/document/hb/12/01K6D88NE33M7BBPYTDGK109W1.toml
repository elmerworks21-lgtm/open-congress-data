congress_website_title = "AN ACT TO PREVENT, DETECT, PROSECUTE AND PUNISH MONEY LAUNDERING AND THE USE OF FACILITIES IN THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Money Laundering Act of 2001.\" This bill seeks to address the urgent need to define the crime of money laundering, provide the sanction and penalties and institutions and individuals convicted with the crime of money laundering, and mandates the supervising authorities such as the Bangko Sentral ng Pilipinas, the Securities and Exchange Commission and the Insurance Commissioner with the powers to investigate and pursue individuals and institutions suspected of money laundering."
