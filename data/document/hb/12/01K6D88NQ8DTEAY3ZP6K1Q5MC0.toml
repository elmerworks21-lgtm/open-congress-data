congress_website_title = "AN ACT APPROPRIATING A PORTION OF THE FEES COLLECTED FROM DEPARTING INTERNATIONAL PASSENGERS AT THE NINOY AQUINO INTERNATIONAL AIRPORT TO ACCRUE TO THE DEPARTMENT OF TOURISM AND FOR OTHER PURPOSES"
congress_website_abstract = "Appropriation of a Portion of the NAIA Departure Fee. The amount of FIFTY PESOS (P50.00) which forms part of the passenger service fee presently being charged by the Manila International Airport Authority (MIAA) from all departing international pssengers at the NAIA and is currently being held in trust by the MIAA, shall accrue to the Department of Tourism (DOT), which shall have the authority to allocate and disburse the same for its tourism promotions, marketing and development related projects subject to existing government accounting and auditing rules and regulations."

