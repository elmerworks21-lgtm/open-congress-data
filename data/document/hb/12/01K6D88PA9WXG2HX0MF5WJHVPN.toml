congress_website_title = "AN ACT PENALIZING CHILD PORNOGRAPHY IN CYBERSPACE"
congress_website_abstract = "\\\"Child Protection in Cyberspace Act of 2002\\\". The measure seeks to address the need to protect our children and the youth from child pornography in the internet. It proposes to impose penalties for the following acts: (a) the act of designing or creating any site on the internet containing child pornography; (b) the act of hosting a site on the internet containing such material; (c) the act of circulating material constituting child pornography through e-mail or through internet chatrooms; (d) possession of an electronic file, whether contained in any form of computer disk or drive, containing material constituting child pornography; and (e) the use of any material, notwithstanding any artistic or aesthetic merit it may contain, for allegedly an educational, scientific or medical purpose."
