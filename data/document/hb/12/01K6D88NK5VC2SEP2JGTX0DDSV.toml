congress_website_title = "AN ACT CREATING AND ESTABLISHING THE INSTITUTE FOR STRATEGIC STUDIES"
congress_website_abstract = "Rationale: The need for policy research and strategic studies could not be more compelling than at the present time. Domestic and international, political, economic, and other developments of profound significance present tremendous challenges to the country. > Strategic studies work has to be done by a group of select scholar-members who, among other things, shall (1) conduct strategic research on national and international concerns; (2) formulate various policy options on various national concerns; and (3) recommend the appropriate actions to support such policies and strategies."
