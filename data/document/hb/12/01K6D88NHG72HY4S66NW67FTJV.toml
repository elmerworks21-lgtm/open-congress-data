congress_website_title = "AN ACT CREATING THE INSTITUTE OF PHARMACEUTICAL SCIENCES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: In addition to generic medicines, the Philippines has started to produce medicines using native plants as raw materials. However, the pharmaceutical industry needs serious and continuous scientific research in order for the pharmaceutical industry to be competitive. This bill seeks to bring about such research to enable the country to establish its own pharmaceutical industry based on solid study and scientific research, so that the country will not be dependent on foreign sourcesfor its health well-being."

