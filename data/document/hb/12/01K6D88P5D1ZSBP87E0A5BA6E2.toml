congress_website_title = "AN ACT TO LIBERALIZE THE OPERATIONS OF RURAL BANKS, AMENDING FOR THAT PURPOSE REPUBLIC ACT NO. 7353, OTHERWISE KNOWN AS THE NEW RURAL BANKS ACT OF 1992, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Rural Banks Act of 1991.\" Rationale: The rural banks play a major role in socio-economic development of the countryside, as more than eighty percent (80%) of rural banks' clients are within the poverty line. They keep the rural sectors at pace withcurrent economic trends and development, injecting dynamism to the rural areas through the motion of entrepreneurshi p, food production, livelihood projects, values formation, training and new forms of economic activities in the provinces. They mobilize small savings and provide rural workers access to credit in order to give them opportunity to improve the quality of their life. The Rural Bankers Act of 1992 or RA No. 7353 was passed in recognition of the need to make credit available and acceessible in the rural areas but due to political and economic crises, rural banks have not recovered, remained in the state where they were in the 1980's and the poverty in the country widened. > This amendatory bill aims to resolve the issues, plug t"
