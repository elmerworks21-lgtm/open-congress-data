congress_website_title = "AN ACT ABOLISHING THE SANGGUNIANG KABATAAN AND AMENDING RELEVANT PROVISIONS OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND IN LIEU THEREOF, PROVIDING FOR THE ELECTION OF A YOUTH SECTOR REPRESENTATIVE IN THE VARIOUS LOCAL GOVERNMENT UNITS"
congress_website_abstract = "Rationale: It has been almost ten (10) years since the formal establishment of the Sangguniang Kabataan. And yet there are serious doubts whether it has been able to mobilize the youth to help carry out the national vision and program. In short, ithas failed to become the mainstream youth organization that government envisioned it to be. Its role as the principal vehicle of the Filipino youth in fulfilling its sectoral goals was put to naught. So much time, resources and energy were wasted."
