congress_website_title = "AN ACT ESTABLISHING THE CONSULTING SERVICES BOARD IN ORDER TO UPGRADE AND PROFESSIONALIZE THE CONSULTANT SERVICES IN THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Consulting Service Board Law of 2004\\\". Consulting services, whether established by consulting firms or by individual consultants are essential to the country's sustained development. However, the government has not provided the necessary agency to professionalize consulting services, to put them in equal footing with their foreign counterparts and make them more competitive in the global market. This bill seeks to establish the Consulting Services Board tasked to professionalize the standing of Filipino consultants to put them in equal footing with their foreign counterparts in the practice of their profession not only in the country but also elsewhere."

