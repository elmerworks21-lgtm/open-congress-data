congress_website_title = "AN ACT REVISING REPUBLIC ACT NO. 6239, OTHERWISE KNOWN AS THE FORESTRY PROFESSION LAW"
congress_website_abstract = "Rationale: Republic Act 6239, otherwise known as the Forestry Profession Law was enacted into law on 19 June 1971 and is, therefore, about 28 years old. Expectedly, its provisions include items that have outgrown their relevance to government and the 7,000 professional Filipino Foresaters in the country today.> The approval of the proposed revision is urgent and highly desirable in order to enable the professional Filipino foresters to effectively address the vaious demands of their clientele and accordingly react to social and political issues and critical environmental concerns besetting the country today. The Filipino Forester's role in sustainable development will be enhanced and the mechanism for the growth of the profession will be iinstitutionaliz ed in this porposed Act."
