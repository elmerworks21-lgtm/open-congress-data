congress_website_title = "AN ACT AMENDING SECTION 90, PERTAINING TO THE PRACTICE OF PROFESSION, OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991(LOCAL OFFICIALS'PRACT ICE OF PROFESSION)"
congress_website_abstract = "Rationale: Many of these elective local government officials are compelled to give-up their lucrative practice of profession to their personal detriment. On the other hand, it is still possible to allow them a limited practice of their profession that will not be detrimental to their functions as local government officials. This bill seeks to carve out that middle ground by distinguishing among the different local goverment officials and defining to what extent they may practice their profession."
