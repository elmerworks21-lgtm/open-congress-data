congress_website_title = "AN ACT ESTABLISHING THE AGRICULTURAL GUARANTY CORPORATION, PRESCRIBING ITS POWERS, FUNCTIONS AND DUTIES, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Among others, the proposed AGRICULTURAL CREDIT GUARANTY MECHANISM aims to: (1) To enhance the capability of low-income groups to acquire agricultural equipment, post harvet facilities, fertilizers, agriculture chemicals and other support mechanismsand facilities which shall render affordable such acquisitions; (2) To provide for a strong and sustainable agricultural credit program with complimentary support systems, which will pump prime, build-up and strengthen available sources of cheap andlong-term capital for agricultural development; (3) To encourage the flow of private funds for agricultural development and provide credit facilities and guarantee mechanism through a viable system of mortgage and credit quaranty; and (4) Serve the aagricultural requirements of all the underprivileged and those small farmers especially those who are not members of any funding agencies such as the Government SErvice and Insurance System (GSIS) and Social Security System (SSS)."

