congress_website_title = "AN ACT GRANTING TAX AMNESTY ON ALL UNTAXED INCOME/WEALTH AND UNPAID TAX LIABILITIES FOR THE TAXABLE YEAR 2002 AND PRIOR YEARS"
congress_website_abstract = "\"The Tax Amnesty Act of 2003.\" This proposed measure seeks to grant a tax amnesty that shall cover all national internal revenue taxes and customs duties for the taxable years beginning January 1, 1986 to December 31, 2002. > A taxpayer, whether natural or judicial with no Income Tax Assessment may avail of the tax amnesty by filing on or before June 30, 2003 an amnesty return declaring his or its untaxed wealth, income or increase of networth earned or realized in taxable years from January 1,1986 to December 31, 2002, and pay the amount according to the tax amnesty rate and schedule of payment provided in this Act. > A taxpayer, whether natural or judicial, with no Excise Tax, Value Added Tax or other Business Tax Assesments, may also aavail of the tax amnesty by filing on or before June 30, 2003 an amnesty return declaring his untaxed or undeclared gross sales or receipts on which the excise tax, value added tax or other business tax should have been paid for taxable years beginni"

