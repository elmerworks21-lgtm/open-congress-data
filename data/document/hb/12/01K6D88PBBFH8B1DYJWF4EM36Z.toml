congress_website_title = "AN ACT ESTABLISHING AN EDUCATION TRUST FUND FOR GRANTEES OF GSIS AND SSS MEMBERS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Education Trust Fund Act\\\". The measure seeks the creation of the Education Trust Fund to ensure the accessibility and affordability of education to all citizens particularly the underprivileged. It extends to the grantees of members of the Government Service, and Insurance System (GSIS) and the Social Services System (SSS) equal opportunity to quality education at today's costs through an anti-inflationary Pre-Need Education Plan Program."
