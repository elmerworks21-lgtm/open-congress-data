congress_website_title = "AN ACT PROVIDING FOR A STUDENT LOAN PROGRAM, ESTABLISHING THE STUDENT LOAN FUND TO BE ADMINISTERED BY THE LOCAL GOVERNMENT UNITS AND APPROPRIATING FUNDS THEREFOR"
