congress_website_title = "AN ACT TO GRANT MUNICIPAL GOVERNMENTS THE EXCLUSIVE AUTHORITY TO ISSUE ENVIRONMENTAL CLEARANCE CERTIFICATE (ECC) FOR THE ESTABLISHMENT AND OPERATION OF A POULTRY OR PIGGERY BUSINESS"
congress_website_abstract = "In order to maximize food production to sustain the needs of the population, growth of which outpace food supply, municipal governments shall be granted exclusive authority to issue environmental clearance (ECC) for the establishment and operation of a poultry or piggery business, the capital investment of which shall not exceed one million pesos (Php 1,000,000.00)"
