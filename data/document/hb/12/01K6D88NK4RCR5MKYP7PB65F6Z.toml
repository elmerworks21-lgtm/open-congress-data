congress_website_title = "AN ACT PROVIDING FOR A MINIMUM SUBSISTENCE ALLOWANCE FOR BARANGAY HEALTH WORKERS, AMENDING FOR THE PURPOSE SECTION 6(B) OF REPUBLIC ACT NO. 7883, ENTITLED `AN ACT GRANTING BENEFITS AND INCENTIVES TO ACCREDITED BARANGAY HEALTH WORKERS AND FOR OTHER PURPOSES su"
congress_website_abstract = "ACCREDITED Barangay health workers who render service within the premises of isolated barangay health stations in order to make their services available [at any and all times] ALL THE TIME SPECIFICALLY DURING CALAMITIES IN THEIR AREA OF RESPONSIBILITY, shall be entitled to a monthly bsistence of allowance, which shall be computed in accordance with the prevailing circumstances as determined by the local government concerned, BUT SHALL IN NO CASE LESS THAN ONE THOUSAND FIVE HUNDRED PESOS (P1,500.00)."

