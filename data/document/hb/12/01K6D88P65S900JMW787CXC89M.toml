congress_website_title = "AN ACT PROVIDING COMPENSATION TO PERSONS WHO ARE KILLED OR INJURED WHILE COMING TO THE AID OR RESCUE A VICTIM AND/OR TRYING TO PREVENT A COMMISSION OF A VIOLENT CRIME, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7309, AND FOR OTHER PURPOSES"
congress_website_abstract = "It is the intention of this bill to provide compensation to any person who was injured or killed while coming to the aid or rescue of a victim and/or trying to prevent a commission of a violent crime. Compensation shall be based on the extent of injury or incapacity sustained by such person. > Passage of this bill will give courage and security to all citizens in the performance of their civic duty to help in the restoration of peace and order in the country."
