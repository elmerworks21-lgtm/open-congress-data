congress_website_title = "AN ACT RENAMING THE DEPARTMENT OF AGRICULTURE AS THE DEPARTMENT OF AGRICULTURE AND FISHERIES"
congress_website_abstract = "Rationale: The country's coastal waters is seven (7) times bigger that its land area, yet development efforts have been mostly channeled to crop and livestock production. The perceived neglect of the fisheries sector gives rise to the filing of thisbill. > The bill aims to give emphasis to the importance of the fisheries sector by renaming the Department of Agriculture as the Department of Agriculture and Fisheries. The inclusion of the word \"Fisheries\" in the name of the Department shall ensure that the fisheries sector will always receive equal attention being given to the agriculture sector."
