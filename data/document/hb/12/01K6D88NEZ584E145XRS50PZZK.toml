congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION OF WOMEN AGAINST HABITUAL WIFE BEATING, AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "It is the policy of the State to promote and protect the welfare of women, and preserve their dignity as human person. towards this end, the government shall protect women against habitual wife beating from their spouse. Habitual wife beating shallbe prohibited whether or not there is provocation on the aprt of the victim. For the purpose of this Act, habitual wife beating shall mean the infliction of physical injuries by the husband upon his wife for at tleast (2) times within a period of one(1) year, regardless of whether or not the spouse are living together."
