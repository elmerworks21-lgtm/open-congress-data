congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF PRESIDENTIAL DECREE NUMBERED EIGHTEEN HUNDRED AND SIXTY-NINE, OTHERWISE KNOWN AS PAGCOR CHARTER ENTITLED \"CONSOLIDATING AND AMENDING PRESIDENTIAL DECREE NUMBERED 1067-A, 1067-B, 1067-C, 1399 AND 1632, RELATIVE TOTHE FRANCHISE AND POWERS OF THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION (PAGCOR) AND FOR OTHER PURPOSES\""
congress_website_abstract = "This bill, seeks, among other things to: (1) Allow PAGCOR to operate in ECONOMIC ZONE established by law; (2) Fund LIVELIHOOD PROGRAMS; (3) Create INTEGRATED recreation and sports DEVELOPMENT PROGRAMS. > This bill likewise proposes amendments related to (1) Program's CORPORATE POWERS; (2) powers and functions of the Board of Directors; (3) Scope of franchise; and (4) tax incentives."

