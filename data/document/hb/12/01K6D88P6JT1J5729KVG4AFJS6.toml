congress_website_title = "AN ACT RESTRICTING THE USE OF GOVERNMENT VEHICLES TO OFFICIAL USE, PROVIDING CERTAIN EXEMPTIONS AND PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Government Vehicle Utilization Act of 2993.\" This bill prohibits (1) the use of government office vehicles for security back up provided for designated government officials; (2) use of government vehicles for personal purposes; (3) repairs, maintenance or fuel allocation for vehicles assigned to any public officials or employees used by them for purposes other than official and authorized; and (4) reimbursement of costs or allocation if the vehicles used do not bear the appropriate markings, appropriate license plates, and are not currently registered."
