congress_website_title = "AN ACT IMPOSING A STIFFER PENALTY FOR THE CRIME OF ILLEGAL USE OF UNIFORMS OR INSIGNIA, AMENDING FOR THE PURPOSE ARTICLE 179 OF THE REVISED PENAL CODE"
congress_website_abstract = "The penalty of [arresto mayor] PRISON CORRECTIONAL AND ITS MINIMUM AND MEDIUM PERIODS shall be imposed upon any person who shall publicly and improperly make use of insignia, uniforms, or dress pertaining to an office not held by such person or to aclass of which he is not a member."
