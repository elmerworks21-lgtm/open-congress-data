congress_website_title = "AN ACT CREATING THE INFORMATION TECHNOLOGY AUTHORITY, DEFINING ITS POWERS AND FUNCTIONS, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Information Technology Act of 2002\". Rationale: It is an undeniable fact that in recent years, there has been rapid development in the field of information technology in the whole world. It is also a well-known fact that Filipinos, with our aptitude and skills, are rated very high in this area internationally . > It is because of this swift technological development in information technology and the potential of the Filipino people in this domain that several sectors have clamored for a distinct institution that will give information technology focus and primary importance. In this regard, President Gloria Macapagal Arroyo, also in her SONA, asked Congress to enact a law to create a Department of Telecommunicati ons and Information."
