congress_website_title = "AN ACT AMENDING PARAGRAPH THREE, ARTICLE TWENTY-NINE OF ACT NUMBERED THIRTY-EIGHT HUNDRED FIFTEEN, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "\"SECTION 1. Paragraph 3 of Article 29 of Act Numbered 3815, otherwise known as the Revised Penal Code as amended, is hereby amended to read as follows: 'Whenever an accused has undergone preventive suspensions for a period equal or more than the possible (maximum) MINIMUM imprisonment of the offense charge to which he may be sentenced and his case is not yet terminated, he shall be released immediately without prejudice to the continuation of the trial therefore or the preceding on appeal, if the same is under review; PROVIDED, HOWEVER, THAT IF THE ACCUSED IS ABSENT WITHOUT JUSTIFIABLE CAUSE AT ANY STAGE OF THE TRIAL, THE COURT MAY, ON MOTU PROPIO, ORDER THE REARREST OF THE MACCUSED; PROVIDED, FINALLY THAT, RECIDIVISTS, HABITUAL, DELINQUENNTS, EXCAPEES, AND PERSONS CHARGED WITH HEINOUS CRIMES ARE EXCLUDED FROM THE COVERAGE OF THIS ACT.' In case the maximum penalty to which the accised is destierro, he shall be released after thirty (30) days of preventive imprisonment.\""
