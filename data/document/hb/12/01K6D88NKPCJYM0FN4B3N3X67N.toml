congress_website_title = "AN ACT LOWERING THE NUMBER OF YEARS BEFORE GOVERNMENT EMPLOYEES APPOINTED ON PROVISIONAL OR TEMPORARY STATUS ARE GRANTED CIVIL SERVICE ELIGIBILITY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6850 AND FOR OTHER PURPOSES"
congress_website_abstract = "Section 1 of Republic Act No. 6850 is hereby amended to read as follows: \"Section 1. All government employees [as of the approval of this Act] who are holding career civil service positions appointed under provisional or temporary status who have rendered at least a total of [seven years] FIVE (5) years of CONTINUOUS efficient service may be granted the civil service eligibility that will qualify them for permanent appointment to their present positions."
