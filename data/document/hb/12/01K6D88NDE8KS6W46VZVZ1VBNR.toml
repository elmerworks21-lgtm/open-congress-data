congress_website_title = "AN ACT TO AMEND CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED EIGHT HUNDRED SEVENTY-SEVEN, OTHERWISE KNOWN AS THE `PHILIPPINE NURSING LAW,' AS AMENDED"
congress_website_abstract = "Rationale: Republic Act No. 877 or the Philippine Nursing Law was approved in 1953. Its amendatory act, R.A. 4704, was approved IN June 1966. Since then, there has been no amendatory decrees, act or executive order, besides the Professional Regulations Act, which affected and regulated the nursing profession in line with the constitutional mandate for government to regulate and supervise the profession in the country."
