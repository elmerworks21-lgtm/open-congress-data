congress_website_title = "AN ACT ABOLISHING THE PRESIDENTIAL COMMISSION ON GOOD GOVERNMENT"
congress_website_abstract = "In line with the cost-saving efforts of the new dispensation, this measure proposes to abolish PCGG and its functions transferred to existing government agencies. The authority to investigate and prosecute ill-gotten wealth cases shall now be vested with the Department of Justice and the authority to dispose recovered assets shall now be transferred to the Asset Privatization Trust (APT)."

