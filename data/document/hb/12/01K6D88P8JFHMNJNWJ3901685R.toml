congress_website_title = "AN ACT ESTABLISHING THE NEW LABOR CODE OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"New Labor Code of the Philippines\". The proposed labor code reinforces the narrow orientation of the Constitution to afford full protection to labor based on employer- employee relationship. It seeks to achieve the following objectives, among others:>>a) to provde for a more effective regulation of recruitment and placement activities with the restoration of the regulatory functions of the Philippine Overseas Employment Administration; >>b) to ensure humane conditions of work - increase the service incentive leave from 5 to 10 days, grant male workers paternity leave of 7 days with pay and grant the right to family and medical leave of 4 weeks without pay every every year when the worker and his family is suffering from serious illness;>>> and c) to afford workers the fullest possible exercise of their constitutional rights to self-organizati on, collective bargaining, peaceful concerted activities and the right to strike according to law."

