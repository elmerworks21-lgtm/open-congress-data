congress_website_title = "AN ACT DECLARING A NATIONAL POLICY ON PEACE ZONES"
congress_website_abstract = "\\\"The Peace Zones Policy Act of 2004\\\". Mindanao has in recent times, witnessed the mushrooming of community-based \\\"peace zones\\\" also known as \\\"sanctuaries of peace\\\" and \\\"spaces for peace\\\". A peace zone is a people-initiated, community-based arrangement in a geographical area which the residents themselves declare to be off-limits to armed conflict to protect civilians, livelihood and property. Furthermore, peace zones comprise a major grassroots constituency in the pursuit of peace processes in the national level. This bill seeks to establish the basic and specific policies that shall govern peace zones."

