congress_website_title = "AN ACT DECLARING SEPTEMBER 21 OF EVERY YEAR AS \\\"NATIONAL DAY OF REMEMBRANCE\\\" IN HONOR OF OUR MARTYRS AND HEROES WHO VALIANTLY STOOD UP TO THE MARCOS DICTATORSHIP"
congress_website_abstract = "\\\"National Day of Remembrance Act\\\". In remembrance of the trials and tribulations of the martial law era which should never be forgotten so they shall never be repeated and in honor of the Filipino heroes and martyrs who stood up to the authoritarian rule of the late Pres. Marcos, the bill proposes to declare September 21 of every year as a special working holiday to be known as the \\\"National Day of Remembrance\\\"."

