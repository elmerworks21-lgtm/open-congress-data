congress_website_title = "AN ACT ESTABLISHING A CENTER FOR FILIPINO GIFTED CHILDREN AND SCIENCE-ORIENTE D YOUTH, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Global estiamtes indicate that 3% of any given population is gifted. Therefore, in population of 12.4M elementary school children and 5.06M high school students, there should be 374,246 gifted elementary school students and 151,985 gifted high school students. Because of the absence of a concerted program to identify and nurture them, these gifted children are deprived of the opportunity of challenging and appropriate intruction which bring out their best."

