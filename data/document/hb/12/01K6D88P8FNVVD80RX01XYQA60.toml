congress_website_title = "AN ACT ESTABLISHING THE PUBLIC HEALTH EMERGENCY COUNCIL AND PROVIDING POWERS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Emergency Health Powers Act\". In the light of new and emerging threats, including emergent and resurgent infectious diseases and terrorists attacks involving the use of chemical, biological or nuclear agents, it is a must that a set plan is established to counteract such emergence or resurgence of contagion. This bill seeks to create a Public Health Emergency Council which would have the primary responsibility to draw up a battle plan against a public health emergency and implement the same.It aims to give us a fighting chance against biological, chemical or nuclear health threats through preparation, management and disposal."

