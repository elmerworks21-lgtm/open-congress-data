congress_website_title = "AN ACT GRANTING PERMANENT RESIDENCE STATUS UNDER CERTAIN CONDITIONS TO VIETNAMESE REFUGEES THROUGH A SOCIAL INTEGRATION PROGRAM"
congress_website_abstract = "Upon the effectivity of this Act, Vietnamese refugees who arrived in the Philippines as asylum seekers, betweeen January 1, 1989 to December 31, 1995, are hereby granted permanent residence status upon compliance with the requirement thereunder. Consequently, they shall not be prosecuted for crimes defined under Commonwealth Act No. 613, otherwise known as the Immigration Act of 1940."
