congress_website_title = "AN ACT PROVIDING MEASURES TO ENSURE PEDESTRIAN SAFETY AND CONVENIENCE"
congress_website_abstract = "\"Pedestrian Safety Law\". This bill aims to address four different but related areas of public concern: (1) the worsening traffice conditions in our cities; (2) the corresponding congestion along our sidewalks; (3) the guarantee of safe and convenient public access for all pedestrian, especially the disabled; and (4) the absence if adequate relief for pedestrians who suffer damage as a result of hazards to passage along our roads and sidewalks."
