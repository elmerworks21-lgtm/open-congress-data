congress_website_title = "AN ACT PROVIDING FOR WOMEN EMPOWERMENT AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Women Empowerment Act of 2004\\\". The measure seeks to accelerated and enhance the equal participation and representation of women in politics and governance. It provides for the allocation of 33% of appointive positions in the national and local government service. It requires all duly accredited political parties to reserve at least 33% of their official party slate to women in the national and local elections from the provincial, municipal, city to barangay levels. It mandates all military institutes to reserve at least 33% of its ranks to women. Furthermore, it allocates at least 33% of scholarships, grants, fellowships and trainings in the national and local government, either in the Philippines or abroad, for qualified women."
