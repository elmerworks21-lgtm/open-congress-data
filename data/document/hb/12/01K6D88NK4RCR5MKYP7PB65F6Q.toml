congress_website_title = "AN ACT DECLARING UNFAIR TRADE PRACTICES AS ACTS OF ECONOMIC SABOTAGE"
congress_website_abstract = "This bill declares the folloaing as ACTS OF ECONOMIC SABOTAGE: (1) Smuggling - Outright importation of goods without the corresponding documents for the purpose of evading taxes and duties due pursuant to the provisions of Section 104 of the Customs and Tariff Code, as amended; (2) Technical Smuggling - The importation of goods by falsification of classification of the tariff headings in the import and release documents for the purpose of paying duties and taxes lower than those prescribed bythe Tariff and Customs Code; (3) Misclassificati on of Importation - Importation of goods and materials using documents declaring such goods other than as properly classified in the Tariff and Customs Code; (4) Dumping - Importation of goods and mateerials at prices below the commercial prices in the source country, as defined in Sec. 301 of the Tariff and Customs Code of the Philippines; and (5) Other Unfair Trade Practices - Any other act of importation resulting in reduction of taxes and duti"
