congress_website_title = "AN ACT TO SUPPORT THE DEVELOPMENT OF A CAPITAL MARKET TO STRENGTHEN THE COMPETITIVENESS OF SMALL, MEDIUM & NEW TECHNOLOGY ENTERPRISES (SMEs/NTEs), AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill aims to assist small, medium and new technology enterprises (SMEs/NTEs) in obtaining their financing requirements from the developing capital market in the country. In particular, this measure proposes the establishment of a stock exchangethat will cater to SMEs/NTEs. A Small and Medium Enterprises Stock Exchange (SMEX) can be the equities market of growing businesses that may still not meet the capitalization requirements for public listing by the Philippine Stock Exchange (PSE). Public listing in the SMEX may well provide SMEs/NTEs with a cheap and steady pool of funds for their business requirements."
