congress_website_title = "AN ACT AMENDING CERTAIN PROVISION OF REPUBLIC ACT NO. 8282, OTHERWISE KNOWN AS \\\"AN ACT FURTHER STRENGTHENING THE SOCIAL SECURITY SYSTEM THEREBY AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 1161, AS AMENDED, OTHERWISE KNOWN AS THE SOCIAL SECURITY LAW\\\" BY LOWERING THE MONTHLY RATE OF PENALTY IMPOSED TO EMPLOYERS ON DELAYED REMITTANCE OF CONTRIBUTION FROM THREE PERCENT (3%) PER MONTH TO ONE-HALF PERCENT (1/2%) PER MONTH OR SIX PERCENT (6%) PER ANNUM"
congress_website_abstract = "The present penalty of 3% per month for delayed remittance of contributions to the Social Security System (SSS) is onerous for companies that are financially distressed. This measure proposes to lower the penalty rate imposed on employers for delayed remittance of contributions to the SSS from 3% per month to 1/2% per month computed from the date the contribution falls due until paid."

