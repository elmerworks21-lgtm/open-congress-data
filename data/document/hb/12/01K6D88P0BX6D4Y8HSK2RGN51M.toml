congress_website_title = "AN ACT MANDATING THE ALLOCATION OF ONE-HALF (1/2) OF THE TEN PERCENT (10%) OF THE GENERAL FUND OF THE BARANGAY SET ASIDE FOR THE SANGGUNIANG KABATAAN FOR PUBLIC ELEMENTARY AND HIGH SCHOOLS IN THE BARANGAY TO AUGMENT THE APPROPRIATIONS FOR THEIR MAINTENANCE AND OPERATING EXPENSES, AMENDING FOR THE PURPOSE SECTION 329 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "The proposed measure seeks to allocate one-half (1/2) of the ten percent (10%) of the general fund of the barangay set aside for the sangguniang kabataan for elementary and high schools in the barangay for their maintenance, such as, but not limitedto, repair of leaking roofs, clogged toilets, sewerage systems, pathwalks, electrical, water systems; painting of walls due to vandalism, purchase of electric bulbs, electric fans, etc., amending for the purpose Section 329 of Republic Act No. 7160,otherwise known as the Local Government Code of 1991."

