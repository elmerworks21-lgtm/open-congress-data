congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC RETENTION BY THE BARANGAY OF ITS SHARE OF FIFTY PERCENT (50%) IN THE COMMUNITY TAX COLLECTED BY SAID BARANGAY, AMENDING FOR THE PURPOSE SECTION 164 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENTCODE OF 1991"
congress_website_abstract = "This bill provides that the barangay treasurer RETAIN the fifty percent (50%) share of the barangay in the community tax collected and REMIT the share of the city or municipality within ten (10) days after the end of each month."

