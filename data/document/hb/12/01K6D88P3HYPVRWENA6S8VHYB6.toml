congress_website_title = "AN ACT MANDATING MULTINATIONAL AND DOMESTIC MANUFACTURING CORPORATIONS TO ALLOCATE ONE PERCENT (1%) OF THEIR NET ANNUAL CORPORATE INCOME FOR SCIENTIFIC AND TECHNOLOGICAL RESEARCH AND DEVELOPMENT"
congress_website_abstract = "This bill seeks to oblige multinational and domestic manufacturing corporations to allocate one percent (1%) of their net annual corporate income for scientific and technological R & D activities. By so proposing, it hopes to lend substance to the constitutional provision which mandates govenrment to give priority to research and development. It likewsie hopes that by giving momentum to R & D activities, we will ensure sustained economic growth."
