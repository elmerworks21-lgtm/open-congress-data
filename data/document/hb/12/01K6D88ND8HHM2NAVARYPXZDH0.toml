congress_website_title = "AN ACT GRANTING DIFFICULTY DIFFERENTIAL TO GOVERNMENT EMPLOYEES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: This proposal for a difficulty differential seeks to encourage government workers to go where they are most needed. In return for additional incentives, it is hoped that qualified teachers, doctors, nurses and other government functionaries would be more visible in the underserved countryside. At the same time, this bill seeks to reward the pioneering few who comtinue to labor in far-flung and difficult-to-re ach communities, unmindful of the dangers and hardship that go with workingwith less-privileged Filipinos."

