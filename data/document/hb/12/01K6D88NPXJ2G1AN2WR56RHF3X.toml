congress_website_title = "AN ACT PROVIDING FOR A MORE RESPONSIVE SYSTEM OF CIVIL REGISTRATION"
congress_website_abstract = "\"New Civil Registration Act of 2001\". Rationale: To date, documents concerning the civil status of persons such as certificate of birth, death, marriage, and court decrees and orders have become essential instruments to the Filipinos. The basic lawthat governs our civil registration system, Act No. 3753, is already 68 years old. The Act is a good law but numerous changes have taken place since it took effect on February 27, 1931. The need for the new system of registration in the Philippineshas become long overdue and urgent."
