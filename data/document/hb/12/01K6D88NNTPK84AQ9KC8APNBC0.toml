congress_website_title = "AN ACT PROVIDING FOR A FIVE-YEAR EMERGENCY SCHOOLBUILDING PROGRAM APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: It is the declared policy of the State to establish, maintain, and support a complete, adequate and integrated system of education relevant to the needs of the people society. Towards this end, it is imperative that there be a complete elementary school in every barangay and a complete high school in every town, in order that primary and secondary education be made available and accessible to all citizens in all geographic areas of the country. In the choice of location of school buildings, the economics principle of comparative advantage shall always be adhered to. The bill provides for an Emergency School building fund amounting to 15 billion pesos which will be released and utilized for a period of five years. The Five-Yeaar School Building Program targets to eliminate the classroom shortages for a definite period of time."

