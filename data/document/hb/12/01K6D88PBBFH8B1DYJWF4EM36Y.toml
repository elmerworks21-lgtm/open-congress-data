congress_website_title = "AN ACT PROHIBITING THE PUBLICATION, SALE, DISTRIBUTION, IMPORTATION AND EXHIBITION OF OBSCENCE AND PORNOGRAPHIC MATERIALS AND THE PERFORMANCE OR EXHIBITION OF INDECENT ACTS IN PUBLIC AND PROVIDING PENALTIES FOR VIOLATION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Anti-Obscenity and Pornography Act of 2004\\\". The bill aims to diminish, if not totally eradicate, the public demonstration of sexual acts and the distribution, sale and production of pornographic materials in order to safeguard the morality of society. It provides a clearer definition of what constitutes the crimes of obscenity, indecency and pornography. It also identifies and mandates the regulatory and self-regulating bodies to ensure the effective implementation of the proposed act."
