congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7082, ENTITLED, 'AN ACT FURTHER AMENDING ACT NO. 3436, AS AMENDED, ENTITLED 'AN ACT GRANTING TO THE PHILIPPINE LONG DISTANCE TELEPHONE COMPANY A FRANCHISE TO INSTALL, OPERATE, AND MAINTAIN A TELEPHONE SYSTEM THROUGHOUT THE PHILIPPINE ISLANDS,' CONSOLIDATING THE TERMS AND CONDITIONS OF THE FRANCHISE GRANTED TO THE PHILIPPINE LONG DISTANCE TELEPHONE COMPANY, AND EXTENDING THE SAID FRANCHISE BY THE TWENTY-FIVE (25) YEARS FROM THE EXPIRATION OF THE TERM THEREOF AS PROVIDED IN REPUBLIC ACT NO. 6146'"
congress_website_abstract = "RA 7925 (Public Telecommunicati ons Policy Act of the Philippines) liberalized the telecommunicati ons industry and allowed multiple operations by local service providers in partnership with firms of varying nationalities. Section 23 of RA 7925 granted equal treatment to all telecommunicati on companies by allowing them to enjoy the same type of favor, advantage and exemption or immunity. However, the Supreme Court (SC) in the case of PLDT v Davao City, et al, ruled that the grant of tax exemption to one telecommunicati on company should not be construed to mean that said exemption can be enjoyed by another telecommunicati on company. This bill seeks to cure and correct the interpretation made by the SC and seeks to re-enact PLDT's previouus tax exemption to conform to the SC's decision and level the playing field."
