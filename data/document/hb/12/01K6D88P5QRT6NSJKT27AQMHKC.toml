congress_website_title = "AN ACT PROVIDING FOR THE CREATION AND ESTABLISHMENT OF SMALL CLAIMS COURTS IN THE PHILIPPINES, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Small Claims Court Act.\" There shall be established all over the country, small claims courts that shall exercise exclusive original jurisdiction over all civic actions where the value of the personal property or amount of the demand does not exceed One Hundred Thousand Pesos (P100,000.00). > The hearing and disposition of any small claims action shall be informal without strict application of tules of evidence, the object being to dispense justice promply between the parties. The Rules of Procedure in Small Claims Courts, including the time and duration of sessions, shall be determined by the Supreme Court."

