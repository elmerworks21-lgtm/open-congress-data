congress_website_title = "AN ACT INCREASING THE PENALTY FOR THE KILLING, WOUNDING OR TAKING AWAY OF THE EAGLE AND/OR DESTROYING, DISTURBING OR TAKING AWAY OF THE BIRD'S NESTS OR EGGS, AMENDING FOR THE PURPOSE SECTION FIVE OF REPUBLIC ACT NUMBERED SIXTY-ONE HUNDRED AND FORTY-SEVEN"
congress_website_abstract = "Rationale: The Philippine Eagle is a symbol of all life in the rain forest. Just as this bird depends on the rain forests to survive, the earth's survival likewise lies on the preservation of the forests. If the eagle disappears, it means the support forest has disappeared. The survival of the eagle means the survival of our race."

