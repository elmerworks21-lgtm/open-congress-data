congress_website_title = "AN ACT TO EXPEDITE THE ARRESTS OF SUSPECTED CRIMINALS BY AUTHORIZING ELECTED BARANGAY OFFICIALS TO EXECUTE AND TO AID IN THE EXECUTION OF WARRANTS OF ARREST AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Barangay Officials' Police Power Act of 2001.\" Any provision of law to the contrary notwithstanding , all duly elected barangay officials are hereby authorized to: (a) execute and/or severe warrants of arrest; (2) assist and coordinate with law enforcement agencies and officers in the execution and service of warrants of arrest, issued by the Supreme Court, Court of Appeals, Sandiganbayan, Regional Trial Courts, Metropolitan Trial Courts, and Metropolitan Circuit Courts in the manner providedhereinafter and within their respective territorial jurisdictions without prejudice to the execution amd service of such warrants of arrest by all other law enforcement agencies and officers: Provided, That the duly elected officials of the Sangguniaang Kabataan are exempted from such mandate."
