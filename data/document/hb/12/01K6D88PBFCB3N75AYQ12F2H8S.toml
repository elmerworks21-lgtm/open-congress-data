congress_website_title = "AN ACT DEFINING COMMERCIAL HANDLINE FISHING AND PROVIDING REGULATIONS FOR UTILIZATION OF COMMERCIAL HANDLINE FISHING VESSELS, AMENDING FOR THE PURPOSE 'THE PHILIPPINE FISHERIES CODE OF 1998'"
congress_website_abstract = "Handline fishery is a traditional fishing method being practices in the Pacific for a thousand years. Using only hook and line, it is considered both environmentally safe and prudent in terms of fish resource management. Handline fishing for large tunas is an important component in the economy of MIndanao. To give more importance to traditional fishing practices and to small fishermen, this bill seeks to amend certain provisions of the Fisheries Code of 1998 by defining handline commercial fishing and handline commercial vessel."
