congress_website_title = "AN ACT ABOLISHING THE THREE HUNDRED AND ONE (301) DAYS CRIMINAL PROHIBITION TO REMARRY AND ALLOWING THE REMARRIAGE OF A WIDOW OR A SEPARATED WOMAN FORTY (40) DAYS AFTER THE DEATH OF HER HUSBAND OR THE ANNULMENT OR DISSOLUTION OF HER PREVIOUS MARRIAGE, AMENDING FOR THE PURPOSE ARTICLE 351 OF ACT NO. 3815 AS, AMENDED, OTHERWISE KNOWN AS THE \\\"REVISED PENAL CODE\\\""
congress_website_abstract = "The Revise Penal Code penalizes a woman who marries within 301 days from the date of the death of her husband and a woman who, her marriage having been annulled or dissolved, marries before the expiration of the period of 301 days after the date of the legal separation. This provision of the law is intended to prevent confusion with regard to filiation and paternity. Advances in medical technology now allow the detection of pregnancy almost to the time of its inception. This measure seeks to remove this discriminatory act against women by repealing the 301 days prohibition to remarry and reducing the same to 40 days in fealty to customs and traditions."
