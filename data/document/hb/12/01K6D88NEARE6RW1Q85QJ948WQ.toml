congress_website_title = "AN ACT EXPANDING THE COVERAGE OF THE NATIONAL HEALTH INSURANCE PROGRAM BY INCLUDING THEREIN HOME CARE AND REHABILITATION SERVICES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7875, OTHERWISE KNOWN AS THE `NATIONAL HEALTH INSURANCE ACT OF 1995,' AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: With the fast changing social and economic environment environment, our country is faced with the problem of meeting the health needs of its increasing population. Hence. there is a need to develop a less expensive but comprehensive and continuing care and rehabilitation program for patients upon their discharge from the hospital to a more suitable and familiar environment-the home."
