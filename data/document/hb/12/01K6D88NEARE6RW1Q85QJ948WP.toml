congress_website_title = "AN ACT RENAMING THE NATIONAL HISTORICAL INSTITUTE (NHI) TO NATIONAL HISTORICAL COMMISSION (NHC), INSTITUTIONALIZ ING REORGANIZATION THEREOF, PROVIDING FOR IMPROVEMENT AND STRENGTHENING ITS POWERS AND FUNCTIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This bill proposes to change the name of the Naitonal Historical Institute (NHI) to National Historical Commission thereby institutionaliz ing reorganizationa l changes and strengthening its mandate as the country's primary institution responsible for the preservation and promotion of Philippine history. Considering the financial limitations of the organization, this bills seeks to professionalize and streamline the prevailing bureaucratic structure of the NHI by decreasing the number of peopleconstituting its Board and designating the Board's Chairperson to act in concurrent capacity as the NHC Executive Director."

