congress_website_title = "AN ACT ALLOWING LATE REGISTRANTS TO REGISTER THEIR BIRTH EITHER IN THE OFFICE OF THE LOCAL CIVIL REGISTRAR OF THE PLACE OF THEIR RESIDENCE OR IN THE PLACE OF THEIR BIRTH"
congress_website_abstract = "This bill requires all late registrants to submit to the office of the local civil registrar a declaration by either parent or a responsible member of the family or a relative, or any person who has knowledge of the birth of the late registrant, accompanied with an affidavit describing the circumstances surrounding the delayed registration. > Any person required to make a declaration for registration, who deliberately makes false statements in the birth form or who violates rules or regulationwhich may be issued pursuant to this Act, shall be punished by a fine of not less than Five Thousand Pesos (P5,000.00) or imprisonment of not less than three (3) months nor more than six (6) months, or both, in the discretion of the Court."
