congress_website_title = "AN ACT ESTABLISHING A MANPOWER AND SKILLS TRAINING CENTER IN EVERY LEGISLATIVE DISTRICT IN THE PHILIPPINES, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "It shall be the State's declared policy to promote, sustain and develop a reservoir of Filipino technical and skilled workers and craftsmen in all fields. It is within this premise that the maintenance of manpower and skills training centers shall be established all over the country. The training center shall provide and equip Filipino, especially workers and out-of-school youth, with the appropriate skills training and technology transfer as may be determined by the Technical Education and Skills Development Authority (TESDA), and subject to internationally -accepted standards."
