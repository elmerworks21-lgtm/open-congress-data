congress_website_title = "AN ACT CLARIFYING GOVERNMENT REGULATION AND SELF-REGULATION WITHIN THE COOPERATIVE SECTOR OF COOPERATIVES ENGAGED IN FINANCIAL SERVICES, AND DEFINING THE RESPONSIBILITIES, POWERS AND FUNCTIONS OF COOPERATIVES AND COOPERATIVE FEDERATIONS ENGAGED IN SAVINGS, CREDIT AND OTHER FINANCIAL SERVICES, AMENDING THEREFOR REPUBLIC ACT NO. 6938, OTHERWISE KNOWN AS THE COOPERATIVE CODE OF THE PHILIPPINES, AND REPUBLIC ACT NO. 6939, CREATING THE COOPERATIVE DEVELOPMENT AUTHORITY"
congress_website_abstract = "\\\"Financial Service Cooperative Act\\\". While the Cooperative Code provides a special chapter on credit cooperatives, its treatment of the financial service operations in this type of cooperative is not substantial. The bill seeks to establish the regulatory framework needed and the financial discipline required of savings and credit cooperatives and financial service cooperatives. It also sets the framework for the amalgamation of savings and credit cooperatives and financial service cooperatives to make them more competitive with major banks and financial institutions. It proposes the creation of the Financial Service Cooperative Commission to undertake the regulation and supervision of savings and credit cooperatives, financial service cooperatives and financial service cooperative federations."

