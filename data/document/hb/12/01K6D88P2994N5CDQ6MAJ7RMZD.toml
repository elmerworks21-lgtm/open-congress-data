congress_website_title = "AN ACT ESTABLISHING THE ARTISTS CAREER SERVICE, RECOGNIZING THE SPECIAL QUALIFICATIONS OF ARTISTS IN GOVERNMENT, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposed that artists be encouraged to pursue civil service careers through (a) the recognition by law that the evidence of their talent and the ways they have developed it should be the principal bases for the selection, appointment, promotion and other personnel movement of artists, and (b) the creation of the Artists Career Service (ACS) for the very best of these artists civil servants.> The first objective of this bill is to structure the career path of artists and their promotion and rewards system. The second objective is to create an Artists Career Service and thus address a problem faced by the most accomplished among the artists in the civil service."
