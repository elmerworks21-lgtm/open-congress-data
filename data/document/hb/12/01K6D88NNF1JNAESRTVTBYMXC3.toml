congress_website_title = "AN ACT EXEMPTING (P50,000.00) SAVINGS DEPOSITS AMOUNTING TO FIFTY THOUSAND PESOS OR LESS FROM WITHHOLDING TAX, AMENDING SECTION 21 (C)(1) OF THE NATIONAL INTERNAL REVENUE CODE THEREBY AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Small Deposits Exemption Law\". Upon the passage of this law, all Savings Deposits in any banking or quasi-banking institutions amounting to FIFTY THOUSAND PESOS (P50,000.00) or less shall be exempted from withholding taxes as required by the National Internal Revenue Code. >The beneficiaries of this bill are the poor in the society. It seeks to equalize the purchasing power between the rich and the poor by not unduly depriving them of the use of the interests which their deposited money earnsfrom the banking system."
