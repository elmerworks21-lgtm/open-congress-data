congress_website_title = "AN ACT PROVIDING INCENTIVES TO PUBLIC SCHOOL TEACHERS WHO ARE ASSIGNED OUTSIDE OF THEIR TOWNS AND PROVINCES, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Any public schoolteacher who is assigned to a town other that his own, shall, in addition to his basic salary and benefits under the Salary Standardization Law, be entitled to One Thousand Pesos (P1,000.00) monthly as incentive allowance.> Any public schoolteacher who is assigned to a town of another than his own, shall, in addition to his basic salary and benefits under the Salary Standardization Law be entitled to receive Two Thousand Pesos (P2,000.00) a month as incentive allowance."

