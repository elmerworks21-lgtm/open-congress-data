congress_website_title = "AN ACT ABOLISHING THE SANGGUNIANG KABATAAN AND CREATING THE BARANGAY YOUTH COUNCIL IN LIEU THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The Sangguniang Kabataan (SK) is the primary target of any local official seeking a higher post. These traditional politicians spread venom, and the youth comprising the SK become contaminated. Their innocense is lost, and is replaces bythe practices of old, which are the same practices we have repeatedly rejected. > The question now is how do we protect the youth? The solution is quite simple. First, the SK must be abolished. The wisdom in this lies in the fact that the SK has become both a tool and a vehicle for the proliferation of corruption. Cut of this avenue, and we cut off the deadly tentacles of the umprincipled politician."
