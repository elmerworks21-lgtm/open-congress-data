congress_website_title = "AN ACT PROVIDING FOR THE PROCLAMATION OF THE CANDIDATE THE NEXT HIGHEST NUMBER OF VOTES FOR THE SAME POSITION AS THE ELECTED CANDIDATES FOR THE POSITION IN CASES OF CANCELLATION OF CERTIFICATE OF CANDIDACY OR QUO WARRANTO CASES OR ANY DISQUALIFICATIO N PROCEEDINGS IF THE CANDIDATE CREDITED WITH THE HIGHEST NUMBER OF VOTES IS DISQUALIFIED OR DECLARED NOT QUALIFIED"
congress_website_abstract = "This bill seeks to provide for the proclamation of the candidate obtaining the next highest number of votes for the same position as the elted candidates for the position in cases of cancellation of certificate of candidacy or quo warranto cases orany disqualificatio n proceedings if the candidate credited with the highest number of votes is disqualified or declared not qualified accordingly. > Allowing the proclamation of the candidate who obtained the next highest number of vote in a elective position, in the event that the candidate obtaining the highest number of votes has been disqualified or declared not qualified will hopefully harmonize jurisprudence on election laws."
