congress_website_title = "AN ACT GRANTING ALL EMPLOYEES OF ALL BRANCHES, SUBDIVISIONS, INSTRUMENTALITIES AND AGENCIES OF THE GOVERNMENT, INCLUDING GOVERNMENT-OWNED OR -CONTROLLED CORPORATIONS WITH OR WITHOUT ORIGINAL CHARTERS THE RIGHT TO ENGAGE IN PEACEFUL AND CONCERTED ACTIVITIES INCLUDING THE RIGHT TO STRIKE, AMENDING FOR THE PURPOSE ARTICLE 244 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "The right of government employees to self-organization differs significantly with that of private sector employees. While Executive Order No. 180, series of 1986, grants government employees the right to form and join organizations of their own choosing, it does not, however, grant government employees the right to collective bargaining and to engage in concerted activities including the right to strike. To correct this discrimination against government employees, the bill grants all employees of all branches, subdivisions, instrumentalities and agencies of the government, including government-owned or controlled corporations with or without original charters the right to engage in peaceful concerted activities, including the right to strike, for purposes of collective bargaining for their mutual benefit and protection."
