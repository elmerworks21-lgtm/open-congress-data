congress_website_title = "AN ACT INSTITUTING POLICIES AND MEASURES FOR THE PREVENTION, CONTROL AND TREATMENT OF SEVERE ACUTE RESPIRATORY SYNDROME (SARS), PROVIDING FUNDS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "The measure aims to institute policies and measures to immediately control, prevent and treat SARS (Severe Acute Respiratory Syndrome) through the implementation of a comprehensive information program and education campaign. It also proposes to establish a SARS Isolation Center and an Airport Quarantine Area, and the creation of a Philippine national SARS Council. A comprehensive SARS monitoring program or \"Bantay SARS\" shall likewise be established under the Department of Health (DOH). It also proposes a system for reporting and contact tracing vis-a-vis other health related intelligence activities by the DOH."
