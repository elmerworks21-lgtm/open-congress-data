congress_website_title = "AN ACT REDUCING THE WATER RATES AND CHARGES FOR WATER USERS IN THE BARANGAY HOSTING THE WATER SOURCE WITHIN A WATER DISTRICT THEREBY AMENDING PRESIDENTIAL DECREE NO. 198, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Sec. 37, chapter IX, Title II of Presidential Decree No. 198 as amended, is hereby further amended to read as follows: \"Sec. 37. Rates and Charges. - Water-A district may sell water under its control, under schedules of rates and charges as may be determined by the Board, to any and all water users within the district [.]: PROVIDED, THAT SUCH RATES AND CHARGES APPLICABLE TO THE WATER USERS IN THE BARANGAYS HOSTING THE WATER SOURCE SHALL BE 20% LOWER THAN THE RATES AND CHARGES APPLICABLE TOTHE OTHER WATER USERS WITHIN THE DISTRICTS."
