congress_website_title = "AN ACT CREATING THE DEPARTMENT OF HOUSING AND RESETTLEMENT, ABOLISHING THE EXISTING HOUSING AGENCIES, DEFINING ITS POWERS AND FUNCTIONS, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Department of Housing Act of 2001\". Rationale: In order to focus assistance on the poor and the less fortunate, there is hereby created a Department of Housing and Resettlement which shall be primarily tasked to develop and implement a comprehensive housing and resettlement program for the benefit of the greatest number of Filipinos, including, but not limited to, relocation assistance services, land development, home financing and housing standards."
