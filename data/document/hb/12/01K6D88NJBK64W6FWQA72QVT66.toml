congress_website_title = "AN ACT INCREASING THE PENALTIES FOR VIOLATIONS OF THE ANTI-CARNAPPING LAW, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-FIVE HUNDRED AND THIRTY-NINE, AS AMENDED BY SECTION TWENTY OF REPUBLIC ACT NUMBERED SEVEN THOUSAND SIX HUNDRED FIFTY-NINE, OTHERWISE KNOWN AS AN ACT PREVENTING AND PENALIZING CARNAPPING"
congress_website_abstract = "Rationale: Recently, carnapping has become rampant in Metro Manila as well as in other provinces. Many times car owners suddenly discover that the vehicle they left securely locked in a parking area vanished without a trace. And the situation has worsened through the course of time - carnappers have become bolder and have performed carnapping feats that would have been once upon a time impossible. It is no longer safe for the common citizen to leave his vehicle on a guarded parking area such as that in the airport, shopping center or church. The luxury car models have become too enticing for the carnappers and the plain ones are irresistibly easy for the taking. Carnappers have become bolder. By increasing the penalties for violating thhe Anti-Carnapping Law, this bill will serve as a deterrent to those who continue to engage in this dangerous trade."

