congress_website_title = "AN ACT REQUIRING WOMEN'S AND GIRLS' HUMAN RIGHTS AWARENESS PROGRAMS IN MEDIA, PROVIDING INCENTIVES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Women's and Girls' Human Rights Awareness Program in Media Act of 2003\\\". Broadcast media, specially television and radio programs, plays an important role in raising people's awareness. Therefore, it is their obligation to propagate good values through responsible programming. This bill proposes that a significant portion of air time of all the programming of the broadcast media be devoted to the promotion, protection and advocacy of women's and girls' rights, welfare, development and gender sensitivity and equality."

