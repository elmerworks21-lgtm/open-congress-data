congress_website_title = "AN ACT AMENDING SECTIONS 51 AND 52, BOOK OF EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE ADMINISTRATIVE CODE OF 1987"
congress_website_abstract = "Rationale: To prevent the scenario of a government official who is unable to fulfill his duties for long and almost indefinite periods of time, it is hereby proposed that Section 51 and 52, Book V of the Administrative Code of 1987 be amended to LIMIT the scope of preventive suspension to a maximum and unqualified period of sixty days upon the issuance of such suspension by the discplining authority."
