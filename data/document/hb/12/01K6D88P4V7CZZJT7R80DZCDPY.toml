congress_website_title = "AN ACT IMPOSING A HEAVIER PENALTY AGAINST PUBLIC OFFICERS CHARGED WITH THE CUSTODY OF PRISONERS, AMENDING FOR THE PURPOSE ARTICLES 223 AND 224 OF THE REVISED PENAL CODE"
congress_website_abstract = "This bill punishes any public officer who shall consent to the escape of a prisoner in his custody or charge: (1) BY THE SANE PENALTY IMPOSED UPON THE FUGITIVE if the fugitive shall have been sentenced by final judgment to any penalty. (2) BY A PENALTY LOWER THAN ONE DEGREE TO THE MAXIMUM PENALTY IMPOSABLE upon the fugitive in case the fugitive shall not have been finally convicted but only held as a detention prisoner for any crime or violation of law or municipal ordinance.> If evasion of theprisoner shall have taken place through the negligence of the officer charged with conveyance or custody of the escaping prisoner; said officer SHALL SUFFER THE PENALTY LOWER THAN ONE DEGREE TO THE PENALTY IMPOSED UPON THE ESCAPEE."
