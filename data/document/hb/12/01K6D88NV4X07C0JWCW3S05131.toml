congress_website_title = "AN ACT TO PROMOTE THE DEVELOPMENT OF BREWERY-MANUFAC TURING AREAS IN THE PHILIPPINES"
congress_website_abstract = "The proposed bill seeks to allocate twenty percent (20%) of the proceeds of the excise taxes on locally manufactured or produced brewery products to the host area or local government unit where the brewery plant is located. This share of the host area or local government unit will be taken from the incremental revenue collected from the excise tax on brewery products. The amount allotted to the host area or local government unit shall be used to finance local development projects such as infrastructure development, livelihood enhancement and environmental protection programs which shall be undertaken by registered cooperatives and organizations and the local government unit itself."

