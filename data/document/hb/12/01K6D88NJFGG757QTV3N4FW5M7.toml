congress_website_title = "CARPARK REGULATION LAW OF 2001"
congress_website_abstract = "All officials, employees and agents of governmental offices, and owners, representatives and agents of commercial and business establishments, such as but not limited to, shopping malls, hotels, restaurants and similar businesses, are hereby prohibited to collect or charge any fee for the use of parking spaces located within the premises of these public and private establishments. No permit shall be issued for the contruction of business and commercial establishments without a sworn statement from owners that ample parking space and facilities are made integral part thereof and made available to the public free of charge as provided in Section 1 of this Act."
