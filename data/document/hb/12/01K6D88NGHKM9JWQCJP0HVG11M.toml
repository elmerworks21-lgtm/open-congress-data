congress_website_title = "AN ACT STRENGTHENING MEDICAL NEUTRALITY BY REPEALING PRESIDENTIAL DECREE NO. 169, AS AMENDED BY EXECUTIVE ORDER NO. 212, WHICH REQUIRES ANY ATTENDING PHYSICIAN OF ANY HOSPITAL, MEDICAL CLINIC, SANITARIUM OR OTHER MEDICAL ESTABLISHMENTS OR ANY MEDICAL PRACTITIONER WHO HAS TREATED ANY PERSON FOR SERIOUS OR LESS SERIOUS PHYSICAL INJURIES TO REPORT THE FACT OF TREATMENT"
congress_website_abstract = "Rationale: This bill seeks to repeal the decree which requires physicians and medical practitioners to report their treatment of any person for physical injuries to the nearest government health authority. By compelling physicians to make such notifications, Presidential Decree No. 169, later amended by the Aquino-era Executive Order No. 212, clearly treats at the time-honored patient-doctor confidentiality of relationship. The physician's oath commands him to treat any person in distress regardless of the latter's creed, color, religion or nationality. That the patient's well-being and recovery, in the order of prioties precede none. If compliance to PD 169 would jeopardize his patient's life, then a physician has all the rights to rage aagainst such intrusion."

