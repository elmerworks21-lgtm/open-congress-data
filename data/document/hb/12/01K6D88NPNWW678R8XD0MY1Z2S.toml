congress_website_title = "AN ACT FURTHER AMENDING CERTAIN SECTIONS OF PRESIDENTIAL DECREE NO. 1146, OTHERWISE KNOWN AS `THE REVISED GOVERNMENT SERVICE INSURANCE ACT OF 1977', AS AMENDED"
congress_website_abstract = "The proposed amendment to PD No. 1146 refers to the computation of service during retirement, resignation or separation. It States: AN EMPLOYEE WHO HAS BEEN PREVIOUSLY SEPARATED OR RETIRED FROM THE SERVICE SHALL BE GIVEN FULL CREDIT FOR SERVICES RENDERED BY HIM PRIOR TO HIS REINSTATEMENT FOR PURPOSES OF DETERMINING HIS/HER RETIREMENT OR SEPARATION BENEFITS, ANY PROVISION OF THE LAW TO THE CONTRARY NOTWITHSTANDING THE AMOUNT OF GRATUITY PREVIOUSLY RECEIVED UPON HIS SUBSEQUENT SEPARATION OR RETIREMENT."
