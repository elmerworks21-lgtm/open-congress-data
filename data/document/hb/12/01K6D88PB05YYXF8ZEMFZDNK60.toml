congress_website_title = "AN ACT PENALIZING MALL AND STORE OWNERS ENGAGING IN THE SALE OF CONTRABAND PRODUCTS"
congress_website_abstract = "Piracy and smuggling of product is not only hurting the country's image internationally but it also affects our local performers and manufacturers. Smuggling and pirated goods distort normal pricing mechanisms and affect market forces. To clamp down on these illegal activities, the bill seeks to impose penalties to store/stall owners who engage in the sale of contraband products and to mall owners who tolerate their tenants to engage in the sale of pirated and smuggled goods."

