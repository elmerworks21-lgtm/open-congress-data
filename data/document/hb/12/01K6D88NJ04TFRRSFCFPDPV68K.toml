congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NO. 7432 ENTITLED `AN ACT TO MAXIMIZE THE CONTRIBUTION OF SENIOR CITIZENS TO NATION BUILDING, GRANT BENEFITS AND SPECIAL PRIVILEGES AND FOR OTHER PURPOSES'"
congress_website_abstract = "This bill seeks to amend certain sections of Republic Act No. 7432 otherwise known as \"An Act To Maximize the Contribution of Senior Citizens to Nation Building, Grant Benefits and Special Privileges and for other Purposes\", particularly the provisions on the qualifications for one to be considered a \"senior citizen\", the provision for additional benefit in terms of discount on funeral services and the involvement of the provincial, city and municipal governments in the effective implementationof this Act."
