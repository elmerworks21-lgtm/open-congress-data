congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NO. 7696, OTHERWISE KNOWN AS `AN ACT STANDARDIZING AND UPGRADING THE BENEFITS FOR VETERANS AND THEIR DEPENDENTS'"
congress_website_abstract = "RA 7696 grants, among others, educational benefits to direct descendants of veterans. Because of the large number of veterans and their beneficiaries who availed of this benefit, the Philippine Veterans Affairs Office (PVAO) has accumulated more than PhP 102 million in unpaid school bills to different educational institutions as of FY 2002. Lately, the PVAO has resorted to the issuance of letters of guarantee of payment to all concerned schools during enrolment or examination periods due to thedecreasing budgetary appropriations being allocated for this purpose. This bill seeks to provide for an alternative mode of payment for matriculation and other fees to proprietary educational institutions which accomodate PVAO scholars. This would pput an end to the perennial problem of lack of funds to cover said benefit."

