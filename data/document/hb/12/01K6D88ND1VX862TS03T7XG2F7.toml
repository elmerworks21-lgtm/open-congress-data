congress_website_title = "AN ACT PRESCRIBING GUIDELINES IN THE PROCUREMENT AND DISTRIBUTION OF TEXTBOOK AND SUPPLEMENTARY MATERIALS FOR PUBLIC SCHOOL, PROVIDING PENALTIES THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It is recognized that textbooks and supplementary materials are the most effective instruments in the development of the intellectual, spiritual, moral technical and cultural well-being of the grade school children and high school students. Toward this end, the Government shall formulate and adopt a sound policy in the procurement of textbooks and supplementary materials to ensure an adequate supply of such quality produced educational materials."

