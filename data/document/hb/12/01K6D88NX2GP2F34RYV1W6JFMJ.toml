congress_website_title = "AN ACT CREATING THE DEPARTMENT OF INFORMATION TECHNOLOGY AND COMMUNICATIONS, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Recognizinf the important role of Information and Communications Technology (ICT) in national development, there is a need to have a concerted effort between the government and the business sector to pursue an ICT development strategy forthe country. The business sector will play the lead role in driving ICT development. The government, on the other hand, will provide an efficient and effective business environment, regulatory framework, and the services needed for ICT to develop and thrive.> Therefore, there is a need for a bill that will create a Department of Information Technology and Communications (DITC) which will be responsbile in providing the policy and legal environment and the institutional mechanisms that will prommote the development of ICT in the country. This Department will also ensure the availability of enabling factors such as infrastructure support, financial resources and qualified/skill ed human resources, etc."
