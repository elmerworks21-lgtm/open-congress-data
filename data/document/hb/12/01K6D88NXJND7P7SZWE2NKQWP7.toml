congress_website_title = "AN ACT ESTABLISHING A COMPREHENSIVE JUVENILE JUSTICE SYSTEM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This bill applies to all youth offenders who are nine years but under eighteen years of age at the time of commission of the offense punishable under existing penal laws.> This bill aims to: (1) Promote the correction and rehabilitation of youth offenders; (2) Provide opportunities for the reformation of youth offenders; (3) Prevent commission of offenses by the youth; and (4) Develop the youth as responsible citizens."

