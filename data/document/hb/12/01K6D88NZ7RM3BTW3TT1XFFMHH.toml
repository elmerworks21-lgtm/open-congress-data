congress_website_abstract = "\"Inventors and Inventions Incentives Act of 2002\". The bill aims to rationalize current efforts to develop and promote inventiveness in the country, as well as to encourage Filipino investors to come towards with new gadgets and technologies. The bill, likewise, aims to provide inventors with (1) financial incentives; and (2) technical, legal and business assistance."
