congress_website_title = "AN ACT PROVIDING FOR THE MANNER OF AMENDMENTS TO THE CONSTITUTION THROUGH PEOPLE'S INITIATIVE, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6735 OR THE PEOPLES'S INITIATIVE AND REFERENDUM ACT"
congress_website_abstract = "Rationale: The system of initiative cannot be allowed to wither. It is reflective of the people's desire and a testament to our commitment to people empowerment. Thus we should heed the challenge posed to us by then SC Justice Hilario Davide, \"...the system of initiative... should no longer be kept in the cold; it should be given flesh and blood, energy and strength. Congress should not tarry any longer in complying with the constitutional mandate."
