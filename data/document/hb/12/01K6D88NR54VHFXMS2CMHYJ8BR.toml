congress_website_title = "AN ACT CREATING THE BUREAU OF DISTANCE EDUCATION AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "For the purpose of this Act, distance education is defined as an educational process in which a significant portion of the teaching is conducted outside of the confined of the formal classroom set-up where student-teacher contact is normally required, and such contact is effected through communicaiton with the aid of printed visual materials video, radio or other similar means of communication.> There is hereby created the Bureau of Distance Education in the Department of Education, Culture andSports, which shall be charged with the responsibility of formulating policies and guidelines, and coordinating and monitoring the curricula, activities and functions of all corresponding schools with a view to ensuring their effectiveness in providding quality education."

