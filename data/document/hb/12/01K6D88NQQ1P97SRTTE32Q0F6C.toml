congress_website_title = "AN ACT TO ACCELERATE THE DEVELOPMENT OF IDLE AND UNDERUTILIZED AGRICULTURAL LANDS AS A MEANS TO GENERATE RURAL EMPLOYMENT"
congress_website_abstract = "\"Rural Employment Generation Act of 2001\". The Department of Agriculture (DA) shall undertake the implementation of the Rural Employment Generation Program (the \"Program\") and shall ensure the implementation of this Act and its purposes, including the determination of areas to be planted. > DA shall undertake the development of a total of 845,000 hectares of idle or underutilized agricultural land, to be planted to hybrid corn, cassava and high value commercial crops (\"HVCC\") over a period of two years, as follows: >Year 1 - Year 2; Hectares Planted - Hectares Planted; Corn - 404,000 - 613,000; Cassava - 20,000 - 88,000; HVCC - 185,000 - 194,000."

