congress_website_title = "AN ACT AUTHORIZING GOVERNMENT HOSPITALS TO UTILIZE ALL INCOME FOR THEIR MAINTENANCE AND OTHER OPERATING EXPENSES AND FOR OTHER PURPOSES"
congress_website_abstract = "Government hospitals are hereby authorized to utilize their income from pharmacy laboratory, operating room and nursery for the maintenance and other operating expenses of the hospital. Expenditures under this Act shall be subject to existing auditing rules and regulations. In addition, it shall submit quarterly report to the DOH their statement of income and expenditures."
