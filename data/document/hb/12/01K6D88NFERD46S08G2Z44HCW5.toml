congress_website_title = "AN ACT INSTITUTING A PHILIPPINE MARITIME AND OCEANS POLICY AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Oceans Act of 2000.\" Rationale: The body of work and knowledge on both the social and natural dimensions of the ocean and marine structure has much more room for improvement. There is an urgent need to collect new data, update existing information, and analyze these with a perspective that is relevant to the country's interests and aspirations concerning the oceans. There is also an urgent need to consider the world environment as well. Globalization and modern technology threatenthe oceans and seas. We must stand guard."
