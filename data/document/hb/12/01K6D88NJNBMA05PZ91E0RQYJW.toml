congress_website_title = "AN ACT TO PROVIDE FOR A SYSTEM OF ABSENTEE VOTING FOR QUALIFIED FILIPINOS ABROAD AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "All Filipinos abroad and dependents when residing with them who have all the qualifications and none of the disqualificatio ns of a voter, shall have the right to register and to vote by absentee system. They shall include the following: (1) Contract workers employed in foreign countries; (2) Employees of the Philippine Government assigned in foreign countries; (3) Filipino citizens who are legal immigrants or temporary residents of foreign countries; and (4) Member of the Armed Forces assignedto a foreign country.> For the first time that the system will be implemented, qualified Filipinos abroad shall vote in national elections only."
