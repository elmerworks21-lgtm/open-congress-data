congress_website_title = "AN ACT PROHIBITING THE COLLECTION OF CONTRIBUTION FROM TEACHERS AND STUDENTS IN ALL LEVELS OF BOTH PUBLIC AND PRIVATE SCHOOLS AND PROVIDING PENALTIES FOR VIOLATION THEREFOR"
congress_website_abstract = "The sale of tickets and collection of contributions and/or solicitation by any person/persons, whether voluntary or otherwise, from teachers, parents and students in all levels of both public and private schools at any time of the school year is prohibited: Provided, however, that this prohibition shall not cover voluntary fees in the Red Cross, Girl Scouts of the Philippines and the Boy Scouts of the Philippines. Penalties for violation of this Act are provided."
