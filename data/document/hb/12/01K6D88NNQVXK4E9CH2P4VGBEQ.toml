congress_website_title = "AN ACT AMENDING THE SANGGUNIANG KABATAAN PROVISIONS IN REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to modify certain provisions in the Code to strengthen the SK. It was filed upon the request of the Sangguniang Kabataan National Federation. The bill will, among others: (1) grant the SK a twenty percent (20%) share in the general fund of the barangay; (2) grant SK members, other than the chairman, an honoraria of not less than Three Hundred Pesos (P300.00), which will be equitably based on their attendance at the regular and special sessions of the sanggunian; and (3) allow the mayor to fill-up the vacancies in the sanggunian, other than for the position of Chairman, by the appointment of a replacement recommended by SK concerned."

