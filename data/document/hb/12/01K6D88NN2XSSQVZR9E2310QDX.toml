congress_website_title = "AN ACT REGULATING THE PRACTICE OF MICROBIOLOGY IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to regulate the profession of microbiology in the Philippines to make it effective in rendering a specialized service to the people. Those with degree in microbiology are employed as quality control personnel in the manufacture of foods, pharmaceuticals , drugs, cosmetics, food additives and flavorings: as professional researcher in research institutes, biotechnology laboratories and in hospitals. It is imperative that the practice of microbiology be regulated considering that microbiology is becoming a popular course among students and is generating job opportunities for graduates."

