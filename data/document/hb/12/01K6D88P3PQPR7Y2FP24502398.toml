congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8972 OR OTHERWISE KNOWN AS THE `SOLO PARENTS' WELFARE ACT OF 2002,' PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "ANY VIOLATION OF THE PROVISION OF THIS ACT DECLARED TO BE UNLAWFUL OR PENAL IN NATURE SHALL BE PUNISHED WITH A FINE OF NOT LESS THAN TWO THOUSAND PESOS (P2,000.00) NOR MORE THAN TWENTY THOUSAND PESOS (P20,000.00), OR IMPRISONMENT OF NOT LESS THAN THREE (3) MOTNHS NOR MORE THAN THREE (3) YEARS, OR BOTH SUCH FINE AND IMPRISONMENT AT THE DISCRETION OF THE COURT. > IN ADDITION TO SUCH PENALTY, ANY ALIEN FOUND GUILTY SHALL BE SUMMARILY DEPORTED UPON COMPLETION OF SERVICE OF SENTENCE."

