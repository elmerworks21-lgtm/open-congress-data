congress_website_title = "AN ACT CREATING THE COOPERATIVE DEVELOPMENT AUTHORITY TO PROMOTE THE VIABILITY AND GROWTH OF COOPERATIVES AS INSTRUMENTS OF EQUITY, SOCIAL JUSTICE AND ECONOMIC DEVELOPMENT, DEFINING ITS POWERS, FUNCTIONS AND RESPONSIBILITIE S, RATIONALIZING GOVERNMENT POLICIES AND AGENCIES WITH COOPERATIVE FUNCTIONS, SUPPORTING COOPERATIVE DEVELOPMENT, TRANSFERRING THE REGISTRATION AND REGULATION FUNCTIONS OF EXISTING GOVERNMENT AGENCIES ON COOPERATIVES AS SUCH AND CONSOLIDATING THE SAME WITH THE AUTHORITY, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Revised Charter of the Cooperative Development Authority\". Rationale: RA No. 6939 created the COOPERATOVE DEVELOPMENT AUTHORITY in 1990 despite the dedication and valiant efforts of its officials and personnel, particularly those assigned to man its various Extension Offices, the Authority has encountered tremendous difficulties and obstacles in the pursuit of its mission to promote the viability and growth of cooperatives.> The reason lies in the failure of Republic Act No. 6939 to provide the authority the adequate development and regulatory powers, not to mention adequate financial resources.> The bill seeks to strengthen the development and regulatory powers of the CDA in order to ensure that the Authority will be more responsive to tthe challenges of the future. Thus, the bill introduced the concept of Cooperatives Development Council and the Cooperative Adjudicatory Board in the CDA."
