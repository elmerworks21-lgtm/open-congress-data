congress_website_title = "AN ACT REGULATING THE PRACTICE OF REAL ESTATE SERVICE IN THE PHILIPPINES, CREATING A REAL ESTATE COMMISSION AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This bill seeks to do away with the duplication of jurisdictional responsibility in the direction and management of activities of real estate brokers and allied professionals who must strictly adhere to a National Code of Ethics the Commission willadopt; and most importantly, will ferret out the unauthorized practitioners who control practically 75% of the real estate transactions in the Philippines which consequently had jeopardized the stability of this industry as it had victimized real estate buyers."
