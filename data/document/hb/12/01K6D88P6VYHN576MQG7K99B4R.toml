congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE PSYCHOLOGICAL AND SCHOLARSHIP PROGRAM FOR CHILD SOLDIERS, CREATING A SPECIAL TASK FORCE ON CHILD SOLDIERS, APPROPRIATING FUNDS THEREFORE AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Child Soldier's Act of 2002.\" This bill defines \"child soldiers\" as children who are direct or indirect participants to armed hostilities either as combatants, spies, guards, guides, lookouts, porters, garden workers, messengers or similar capacities. > Child soldiers who are rescued or surrendered shall be turned over, within twenty-four hours, to the nearest Field Office of the Deaprtment of Social Welfare and Development for protective custody and case evaluation. Immediate treatment shallalso be provided to the children wounded or suffering from any illness. This Act prohibits tactical interrogation by military and police authorities to such children unless permitted in writing by the Regional Director of the DSWD execising custody oover them. > Children who are already undergoing psychological/p sychiatric rehabilitation shall also be admitted into a scholarship program to resume their studies. Their scholarship shall cover reasonable allowances for subsistence, books, transpor"
