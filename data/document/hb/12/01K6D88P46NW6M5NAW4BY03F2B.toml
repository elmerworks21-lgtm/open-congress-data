congress_website_title = "AN ACT REQUIRING ALL RADIO STATIONS WITH MUSICAL FORMAT PROGRAMS TO BROADCAST A TOTAL OF FIFTY PERCENT (50%) OF MUSIC PLAYED IN EVERY CLOCKHOUR ORIGINAL PILIPINO MUSIC (OPM), AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Original Pilipino Music Act of 2002\". There shall be a gradual increase of Original Pilipino Musical compositions to be played or broadcast over the airwaves, by radio stations with musical format programs, to reach a total of Fity (50%) percent oftotal number of songs played every clock hour within a three (3) year period. The schedule of the gradual increase shall be the following: (1) For the first year from the date of the effectivity of this Act, an increase of THIRTY (30%) PERCENT of total osngs played per clockhour shall be Original Pilino musical compositions; (2) For the second year rom the date of the effectivity of this Act, an increase of FORTY (40%) PERCENT of total songs played per clockhour shall be Original Pilipino musiccal compositions; and (3) Within the third year from the date of the effectivity of this Act, the total increase of FIFTY (50%) PERCENT of the total songs per clockhour shall be Original Pilipino musical compositions."
