congress_website_abstract = "This bill seeks to institutionaliz e the opening of Night High School classes using existing high school and elementary school facilities throughout the country. The purpose of this bill is to address the recurreing problem of lack of school buildings and other facilities and teachers for public secondary education. Because of the lack of secondary schools, the number of out-of-school youth and dropouts has increased."

