congress_website_title = "AN ACT ENTITLING THE WORKER THE OPTION TO BE PAID SEPARATION PAY IN LIEU OF REINSTATEMENT IN ILLEGAL DISMISSAL CASES WHERE REINSTATEMENT IS ORDERED, AMENDING FOR THE PURPOSE ARTICLE 279 OF THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "In illegal dismissal cases, Article 279 of the Labor Code provides remedies available to the workers, namely: reinstatement and entitlement to full backwages. This bill broadens this provision by allowing payment of separation pay in lieu of reinstatement - another alternative available to illegally dismissed employees under Article 279 of the Labor Code."
