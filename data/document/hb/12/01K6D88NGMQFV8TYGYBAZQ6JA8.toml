congress_website_title = "AN ACT PROVIDING FOR THE ORGANIZATION OF COOPERATIVES FOR FRY GATHERERS, SMALL SCALE FISHERMEN AND SMALL FISHFARMERS"
congress_website_abstract = "\"Fry gatherers\" refers to an individual, usually self-employed, who is engaged in the catching, gathering or collecting of fish fry with the use of nets, traps, or other fishing gears for the purpose of selling them. \"Organization of Cooperatives\" refers to fry gatherers, small-scale fishermen and small fishfarmers shall be organized as cooperatives and be registered under Republic Act Numbered Six Thousand Nine-hundred Thirty-nine under the supervision of the Cooperative Development Authority."

