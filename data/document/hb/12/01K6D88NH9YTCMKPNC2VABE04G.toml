congress_website_title = "AN ACT REGULATING THE PRACTICE OF PHYSICAL THERAPY IN THE PHILIPPINES, THEREBY REPEALING REPUBLIC ACT NO. 5680, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The State recognizes the importance of physical therapists in nation building. Hence, it shall develop and nurture competent, virtuous, productive and well-rounded physical therapist whose standards of practice and services shall be excellent, qualitative, world-class and globally competitive through inviolable, honest, effective and credible licensure examinations and through regulatory measures, programs and activities that foster their professional growth."
