congress_website_title = "AN ACT AMENDING SECTION 36 OF REPUBLIC ACT NO. 8189, ENTITLED 'AN ACT PROVIDING FOR A GENERAL REGISTRATION OF VOTERS, ADOPTING A SYSTEM OF CONTINUING REGISTRATION, PRESCRIBING THE PROCEDURES THEREOF AND AUTHORIZING THE APPROPRIATION OF FUNDS THEREFOR AND FOR OTHER PURPOSES'"
congress_website_abstract = "This bill aims to adopt a validation system for the registration of voters in order to preserve the integrity of the permanent list of voters. It mandates all registered voters to appear before the Election Registration Board of the City of Municipality where they are registered for validation of their registration within the period and in the manner prescribed by the Commission. The failure of any registered voter to appear for validation shall result in the annulment of his/her registration and shall constitute a waiver of his/her right to vote without prejudice to the application of section 8 of RA 8189."

