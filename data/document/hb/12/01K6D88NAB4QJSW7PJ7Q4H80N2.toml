congress_website_title = "AN ACT ADOPTING THE GROSS INCOME TAXATION FOR CORPORATIONS AND INDIVIDUALS ENGAGE IN TRADE OR BUSINESS AND/OR PRACTICE OF PROFESSION, AMENDING FOR THE PURPOSE PERTINENT PROVISIONS OF TITLE II OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposes a GROSS INCOME APPROACH in taxing the business income derived by individuals and corporations. Rationale: By shifting to gross income taxation, the areas of discretion are minimized. Tax examiners need to validate only the accuracy of the taxpayer's declared gross sales/receipts and \"cost of goods sold\" or \"cost of sales/services\" . It would lessen paper work of both the taxpayer and tax examiner as substantiation requirements will be significantly reduced. As it will be easier to comply with, more taxpayers will be encouraged to file their returns. And with more taxpayers in the tax net, tax collection will consequently increase."
