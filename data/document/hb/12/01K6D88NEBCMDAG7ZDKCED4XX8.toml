congress_website_title = "AN ACT TO PROMOTE AND ENCOURAGE THE FORMATION AND OPERATION OF PRIVATE NONPROFIT EMERGENCY RESCUE UNITS (RE: GOOD SAMARITAN ACT OF 2001)"
congress_website_abstract = "\"Good Samaritan Act of 2001.\" This bill seeks to address the confluence of constitutional concerns for public safety, health, and, in general, the value of human life by making it a State policy to promote and encourage the formation and operation of private non-profit emergency rescue units, and prescribing the mechanics for government assistance and support."
