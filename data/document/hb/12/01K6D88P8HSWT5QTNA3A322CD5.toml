congress_website_title = "AN ACT REGULATING THE PRACTICE OF MINING ENGINEERING IN THE PHILIPPINES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 4274"
congress_website_abstract = "\"Philippine Mining Engineering Act of 2003\". The Mining Engineering Law (RA 4274) which was enacted in 1965, urgently needs to be amended and updated to make the law more realistic and relevant to the current practice of Mine Engineers in the country. The bill seeks to promote and recognize the importance of the Mining Engineering profession in nation-building . It underscores the need to develop competent, globally competitive and well-rounded Mining Engineers through regulatory measures, programs and activities."

