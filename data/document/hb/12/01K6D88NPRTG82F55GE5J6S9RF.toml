congress_website_title = "AN ACT TO REQUIRE THAT FOOD, MEAT AND POULTRY PRODUCTS THAT CONTAIN GENETICALLY-ENG INEERED MATERIAL BE LABELED ACCORDINGLY"
congress_website_abstract = "\"Genetically Engineered Food Right to Know Act\". The State shall enforce compulsory labeling and fair packaging to enable the consumer to obtain accurate inforation as to the nature, quality and quantity of the contents of consumer products and to facilitate his comparison of the value of such products.> \"Genetically engineered Material\" means material derived from any part of a genetically engineered organism., without regard to whether the altered molecular or cellular characteristics of theorganism are detectable in the material."
