congress_website_title = "AN ACT PROVIDING FOR THE DEVOLUTION OF THE CONTROL, MANAGEMENT AND OPERATION OF MUNICIPAL OR TERTIARY PORTS FROM THE PHILIPPINE PORTS AUTHORITY TO LOCAL GOVERNMENT UNITS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Municipal Ports Act of 1998.\" This bill seeks to devolve the power and authority in the control, management and operation of municipal ports, including the power or revenue collection, from the Philippine Ports Authority to local government units.Such devolution of authority is in consonance with the declared policy of the State, as embodied in the Local Government Code, that local government units shall enjoy genuine and meaningful local autonomy to enable them to attain their fullest development as self-reliant communities and make them effective partners in the attainment of national goals."
