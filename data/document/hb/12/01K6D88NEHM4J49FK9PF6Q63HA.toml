congress_website_title = "AN ACT AMENDING SECTION 284 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS \"THE LOCAL GOVERNMENT CODE OF 1991\", AND FOR OTHER PURPOSES"
congress_website_abstract = "\"SEC. 284. Allotment of Internal Revenue Taxes - Local government units shall have a share in the national revenue taxes based on the collection of the third fiscal year preceding the current fiscal year as follows: (a) On the first year of the effectivity of this Code, thirty percent (30%); (b) On the second year, thirty-five percent (35%); and (c) On the third year and thereafter, fifty percent (50%)."
