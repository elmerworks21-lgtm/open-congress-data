congress_website_title = "AN ACT PROHIBITING THE CLONING OF HUMANS AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "\"Human Cloning Prohibition Act of 2002.\" It shall be declared unlawful for any person, group or organization to conduct all forms of cloning of human being, which is considered as irresponsible, unethical and immoral act and which degrades the value ans dignity of man. it is also prohibited to conduct any scientific, medical and technological research and study that will in effect lead to the cloning of human being.> The prohibitions provided for in this Act shall cover foreigners and foreignorganizations who are residing or stationed in the country."

