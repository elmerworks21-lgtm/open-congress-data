congress_website_title = "AN ACT ESTABLISHING A NATIONAL IDENTIFICATION SYSTEM IN THE PHILIPPINES"
congress_website_abstract = "Any person residing in the Philippines shall, within one hundred eighty (180) days after the approval of this Act, apply for the registration and issuance of an identification card with a permanent serial number, at the office of the Local Civil Registrar of the city, municipality or province where he/she resides. >The person, parent or legal guardian of a minor child or an incompetent person shall, within one hundred eighty (180) days after the approval of this Act, file such application withthe office of the Local Civil Registrar of the city, municipality or province where he/she resides. In case of a newborn child, the parent or legal guardian shall register such child within sixty (60) days after birth. >No accredited official of aforeign government recognized by the Republic of the Philippines, or member if his/her official staff and family, shall be required to have an identification card."
