congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7323, OTHERWISE KNOWN AS THE SPECIAL PROGRAM FOR EMPLOYMENT OF STUDENTS (SPES), TO INCREASE THE INCOME REQUIREMENT FOR COVERAGE THEREIN, PROVIDING A NONDIMINUTION AND AUTOMATIC INCREASE CLAUSES FOR ITS BUDGETARY ALLOCATION AND PENALIZING THOSE WHO DISHONOR THE EDUCATION VOUCHERS"
congress_website_abstract = "Section 1 of R.A. No. 7323 otherwise known as the \"Special Program for Employment of Students (SPES), is hereby amended to read as follows: x x x For purposes of this Act, poor but deserving students refer to those whose parents' combined incomes, together with their income, if any, do not exceed [thirty six thousand pesos (P36,000.00) per annum] THE ANNUAL POVERTY THRESHOLD LINE FOR A FAMILY OF SIX (6) FOR THE PRECEDING YEAR AS MAY BE DETERMINED BY THE NATIONAL ECONOMIC DEVELOPMENT AUTHORITY (NEDA). Employment should be at the Labor Exchange Center of the Department of Labor and Employment (DOLE)."
