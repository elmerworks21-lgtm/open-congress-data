congress_website_title = "AN ACT ABOLISHING THE DEATH PENALTY, REPEALING FOR THIS PURPOSE REPUBLIC ACT NO. 7659, AND FOR OTHER PURPOSES"
congress_website_abstract = "The death penalty is hereby abolished and in lieu thereof, the penalty of reclusion perpetua shall be imposed. Rationale: Capital punishment is not the only way to protect society from its vilest elements. Life imprisonment without the possibility of parole is a punishment that may fulfill the qualifications of being severe and isolating the most dangerous criminals, and it is an option that must be studied."
