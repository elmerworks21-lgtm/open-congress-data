congress_website_title = "AN ACT INSTITUTING THE DANGEROUS DRUGS ACT OF 1999, REPEALING REPUBLIC ACT NO. 6425, AS AMENDED"
congress_website_abstract = "Significant provisions of this bill are: (1) It reduces the minimum amount of dangerous drugs involved in the commission of an offense as punishable under the law, as it more clearly defines unlawful acts and provides for stiffer penalties therefor.(2) It also establishes proper procedures for the administration of drug tests for those applying for driver's licenses, permits to carry firearms and employment, whether public or private, domestic or overseas. (3) It likewise identifies ways on how schools, non-government agencies and the public in general can participate in the campaign against dangerous and illegal drugs."
