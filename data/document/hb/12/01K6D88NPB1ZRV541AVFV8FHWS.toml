congress_website_title = "AN ACT ESTABLISHING A HEROES MULTIPURPOSE HALL AND PROVIDING FOR THEIR ADMINISTRATION AND MAINTENANCE"
congress_website_abstract = "It is proposed that a Heroes Hall be established such that there will be at least one (1) accessible facility in every region and major island where our veterans and military personnel can conduct their affairs to advance the cause of this sector.In this way, the government is demonstrating its lasting gratitude to all the men and women who offered their precious lives to preserve the country's sovereignty."

