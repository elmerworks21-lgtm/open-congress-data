congress_website_title = "AN ACT GRANTING THE RIGHT TO FRANCHISEES TO DEVELOP THE RURAL AIRPORT INFRASTRUCTURE NETWORK IN THE PHILIPPINES FOR COMMERCIAL AND OTHER PURPOSES"
congress_website_abstract = "A Rural Airport is, as used in this Act, any runway, take-off and landing are or seaway, not exceeding 1,200 meters in length, with a total land area not exceeding 20 hectares, which may be accessed by any type of aircraft rated by its manufacturersto utilize said facilities. Such airports are those that, due to their remoteness, lack the presence and continuous operations of any government regulatory body. Such an airport shall be so certified as a regular rural destination by any Franchisee.> The establishment of a private rural airport infrastructure will encourage economic activity in the hinterlands, by serving not only as transportation hubs but also as industrial, commercial and service centers which will provide countryside emplooyment to uplift the rural standards of living."
