congress_website_title = "AN ACT AUTHORIZING THE BANGKO SENTRAL NG PILIPINAS (BSP), PHILIPPINE DEPOSIT INSURANCE CORPORATION (PDIC) AND BUREAU OF INTERNAL REVENUE (BIR) TO LOOK INTO DEPOSITS OF ANY BANKING INSTITUTION, THEREBY AMENDING REPUBLIC ACT NO. 1405, AND FOR OTHER PURPOSES"
congress_website_abstract = "All deposits of whatever nature with banks or banking institutions in the Philippines including investments in bonds issued by the Government of the Philippines, its political subdivisions and its instrumentaliti es, are hereby considered as of an absolutely confidential nature and may not be examined by any person, government official, bureau or office, except [upon written permission of the depositor,] BY EXAMINERS FROM THE BANGKO SENTRAL NG PILIPINAS (BSP), PHILIPPINE DEPOSIT INSURANCE CORPORATION (PDIC), AND BUREAU OF INTERNAL REVENUE (BIR) SOLELY FOR SUPERVISORY AND TAX AUDIT PURPOSES, or upon order of a competent court in cases of bribery, or dereliction of duty of public officials, or in cases where the money deposited or invested iis the subject matter of the litigation."

