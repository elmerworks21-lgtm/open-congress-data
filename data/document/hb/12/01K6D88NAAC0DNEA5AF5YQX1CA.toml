congress_website_title = "AN ACT REQUIRING THE CONCURRENCE OF THE SANGGUNIANG PANLALAWIGAN OR PANLUNGSOD, AS THE CASE MAY BE, FOR THE ESTABLISHMENT OF TERMINALS, OUTLETS OR AUTHORIZED AGENTS OF ANY GAME OF CHANCE"
congress_website_abstract = "This bill states that NO lotto terminal, jai-alai off fronton station, bingo outlet or any authorized agent of any game of chance shall be established in any part of the province or city without the concurrence of the sangguniang panlalawigan or sangguniang panlungsod, as the case may be, of the local government unit concerned. Any person found guilty of violating the provisions of this Act shall suffer the penalty of not exceeding one (1) year, and a fine of fifty thousand pesos (P50,000.00) at the discretion of the court."
