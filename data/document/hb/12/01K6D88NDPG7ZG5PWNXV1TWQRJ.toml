congress_website_title = "AN ACT PROTECT AND PROMOTE THE HEALTH OF THE PEOPLE THROUGH THE PREVENTION, CONTROL AND ABATEMENT OF AIR POLLUTION CAUSED BY SMOKE-BELCHING VEHICLES, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 1181, AND FOR OTHER PURPOSES"
congress_website_abstract = "In line with this constitutional mandate, this bill proposes the imposition of an additional requirement before a vehicle's registration will be allowed or renewed. The requirement of subjecting the vehicle to a smoke belching test for its initial registration and every year thereafter will minimize, if not totally eradicate, air pollution caused by smoke-belching vehicles."

