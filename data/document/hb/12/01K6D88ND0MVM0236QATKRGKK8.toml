congress_website_title = "AN ACT INSTITUTING A CHILDREN'S WELFARE FUND FOR THE PROTECTION AND REHABILITATION OF ABANDONED, ABUSED AND SEXUALLY EXPLOITED CHILDREN, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7610, OTHERWISE KNOWN AS `THE SPECIAL PROTECTION OF CHILDREN AGAINST CHILD ABUSE, EXPLOITATION AND DISCRIMINATION ACT'"
congress_website_abstract = "The proposed FUND is intended to: A) PROVIDE PROTECTION AND ASSISTANCE TO ABANDONED OR ABUSED OR SEXUALLY EXPLOITED CHILDREN; B) ESTABLISH, OPERATE AND MAINTAIN SUCH FACILITIES NECESSARY TO REHABILITATE SUCH CHILDREN; (C) PROVIDE BASIC EDUCATION; AND (D) ASSIST THE STATE IN COMBATTING AND CURTAILING ALL FORMS OF CHILD ABUSE."

