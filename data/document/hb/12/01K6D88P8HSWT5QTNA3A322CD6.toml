congress_website_title = "AN ACT REORGANIZING THE NATIONAL FOOD AUTHORITY INTO THE NATIONAL FOOD CORPORATION, REDEFINING ITS POWERS AND CREATING THE FOOD DEVELOPMENT AND REGULATORY ADMINISTRATION, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Food Authority Reorganization of 2003\". The National Food Authority (NFA) is mandated to ensure food security in staple cereals during calamities and emergencies, and stability of staple cereal supply and prices. However, for as long as farmers do not have easy and adequate access to irrigation, affordable credit, low-price farm inputs, basic post harvest facilities and reliable structures like farm-to-market roads, food security in staple cereals through self-sufficienc y will be difficult to achieve. To enable the NFA to meet its mandate, this bill proposes to strengthen the NFA financially and structurally so it will develop into a strong Food Development and Regulatory Administration and a State Trading Enterprise."
