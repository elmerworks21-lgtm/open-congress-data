congress_website_title = "AN ACT RATIONALIZING THE PARTY-LIST SYSTEM OF REPRESENTATION IN THE HOUSE OF REPRESENTATIVES , AMENDING FOR THE PURPOSE SECTION 5 AND SECTION 10 OF REPUBLIC ACT NO. 7941, OTHERWISE KNOWN AS THE `PARTY-LIST SYSTEM ACT'"
congress_website_abstract = "One of the proposed amendments to RA No. 7941, the Party-list System Act, is: \"PROVIDED, THAT A POLITICAL PARTY SHALL NOT BE REGISTERED UNLESS IT IS ABLE TO SHOW PROOF THAT ITS CONTITUENCY IS SPREAD OVER THE GEOGRAPHICAL TERRITORY OF AT LEAST A MAJORITY OF THE REGIONS, OR AT LEAST A MAJORITY OF THE PROVINCES OR CITIES COMPRISING A REGION, AS MAYBE APPROPRIATE IN EACH CASE; AND PROVIDED FURTHER, THAT A SECTORAL PARTY, ORGANIZATION OR ANY COALITION THEREOF SHALL NOT BE REGISTERED UNLESS IT IS ABLE TO SHOW PROOF THAT IT REPRESENTS THE INTEREST AND CONCERNS OF AT LEAST THREE HUNDRED THOUSAND FILIPINO CITIZENS BELONGING TO OR SITUATED IN THAT SECTOR IT SEEKS TO REPRESENT.\""
