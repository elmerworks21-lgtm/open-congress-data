congress_website_title = "AN ACT TO ESTABLISH AND MAINTAIN AN OFFICE OF VETERANS AFFAIRS IN THE PHILIPPINE EMBASSY IN THE UNITED STATES OF AMERICA, PRESCRIBING ITS FUNCTIONS, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The legislative measure is being refiled again because of our firm belief that our veterans who fought valiantly and with honor along side the American Forces during World War II should be given adequate support in their battle for legitimate claims with the United States government.> With the onset of a new administration both in the Philippines and in the United States, it is hoped these legitimate claims of our aging veterans will be vigorously pursued with the establishment of this Office and perhaps, finally convince the United States government to address the unresolved claims conclusively."
