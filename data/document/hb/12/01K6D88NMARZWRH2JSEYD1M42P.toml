congress_website_title = "AN ACT COMPLYING WITH THE CONSTITUTIONAL MANDATE TO RENDER A MEASURE OF JUSTICE TO THE VICTIMS OF HUMAN RIGHTS VIOLATIONS AS A CONSEQUENCE OF THE PROCLAMATION OF MARTIAL LAW, AND THEREAFTER, BY COMPENSATING THEM AND FOR OTHER PURPOSES"
congress_website_abstract = "All bona fide victims of human rights violations, such as salvaging, disappearances, torture, rape, unlawful arrest, indefinities detention without charges, and the like are entitled to compensation as a matter of constitutional right. > Any personwho, as a consequence of the proclamation of martial law, was injudtly arrested, detained or convicted, or tortured, maltreated, abused, and the like, from September 21, 1972 to February 25, 1986, or thereafter, may file a claim under this Act."

