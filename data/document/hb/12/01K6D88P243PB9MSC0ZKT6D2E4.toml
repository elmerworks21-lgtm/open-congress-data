congress_website_title = "AN ACT UPGRADING THE MINIMUM SALARY GRADE LEVEL OF PUBLIC SCHOOL TEACHERS AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Any effort to modernize the education system must begin with its most vital component - its teachers.> With the present 10,000 monthly pay of public schoolteachers being drastically reduced after tax and other deductions, scores of teachers are forced to deal with loan sharks in order to tide their families over until the next pay check. Some are even obliged to take part-time jobs just to make ends meet to provide for their family's basic needs. Nowadays, a teacher's compensation isnot proportionate to the heavy bulk of responsibility he/she has to carry as an educator. This bill proposes to UPGRADE Teacher I level from [SG IV] to SG 18."

