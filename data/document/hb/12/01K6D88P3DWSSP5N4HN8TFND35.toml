congress_website_title = "AN ACT TO INSTITUTIONALIZ E THE USE OF ALTERNATIVE DISPUTE RESOLUTION SYSTEM IN THE PHILIPPINES AND TO INCORPORATE THE PHILIPPINE CENTER FOR ALTERNATIVE DISPUTE RESOLUTION, AND FOR OTHER PURPOSES"
congress_website_abstract = "The term \"ALTERNATIVE DISPUTE RESOLUTION SYSTEM\" means any process or procedure used to resolve a dispute or controversy, other than by adjudication of a presiding judge of a court or an officer of a government agency, as defined in this Act, in which a naeutral third party participates to assist in the resoultion of issues, which includes arbitration, mediation, conciliation, early neutral evaluation, mini-trial, or any combination thereof.> This bill is the solution to the problem of the almost one million cases presntly jamming the lowest to the highest courts, which has een a major impediment to Philippine democracy."
