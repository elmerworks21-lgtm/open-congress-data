congress_website_title = "AN ACT ESTABLISHING A MOSQUE BUILDING FUND FOR MUSLIM FILIPINOS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Mosque Building Fund of 2003.\" This bill seeks to establish Fund which shall be utilized in the construction of Mosques for our Muslim countrymen, especially for the Muslim communities who are not in Mindanao and who do not have decent places of worhsip. The Fund shall be raised from the contributions of the employers of Muslim employees and from voluntary contributions from other persons."

