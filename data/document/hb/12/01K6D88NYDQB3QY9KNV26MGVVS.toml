congress_website_abstract = "The National Food Authority shall determine the floor price for the palay which shall assure the farmers or producers a fair return on their investment and procure and buy from the farmers their palay crops payment for which shall be seventy-five percent in cash and a quedan shall be issued for the remaining balance which shall be paid within sixty days from the time the palay is delivered to its warehouses or within such time as may be agreed upon by the NFA and the farmers/produce rs."
