congress_website_title = "AN ACT DEFINING AND PENALIZING CRIMES AGAINST INTERNATIONAL HUMANITARIAN LAW AND OTHER SERIOUS INTERNATIONAL CRIMES, ADOPTING CORRESPONDING PRINCIPLES OF CRIMINAL RESPONSIBILITY, OPERATIONALIZING UNIVERSAL JURISDICTION, DESIGNATING SPECIAL COURTS AND FOR RELATED PURPOSES"
congress_website_abstract = "\\\"Philippine Statute on Crimes Against International Humanitarian Law and Other Serious International Crimes\\\". It is the policy of the State to adopt the principles, rules and regulations of the Hague Convention and the Geneva Conventions on warfare and international humanitarian law to form part of the law of the land. This measure seeks to consolidate these principles, rules and regulations in one comprehensive law in regard to the domestic penal aspect of serious international crimes. It also seeks to define the international crime of genocide, crimes against humanity, war crimes and other crimes against international humanitarian law and to impose penalties for the commission of such crimes."
