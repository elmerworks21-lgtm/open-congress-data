congress_website_title = "AN ACT ENHANCING THE ADMINISTRATION OF JUVENILE JUSTICE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER RELATED PURPOSES"
congress_website_abstract = "\"The Juvenile Justice Act of 2001\". This bill intends to provide a just and more humane system of treating juvenile offenders in society through a comprehensive and integrated approach toward rehabilitating the delinquency. In consonance with the provision of the UN Convention on the Rights of the Child and the UN Standard Minimum Rules for the Administration of Juvenile Systems, this bill pursues an effort at emphasizing on the need of rehabilitating and reintegrating the juvenile offender into the mainstream of society as in contrast to the traditional-med ieval approach of stressing solely on the punitive aspect of the offender's delinquent act."
