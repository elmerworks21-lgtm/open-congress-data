congress_website_title = "AN ACT GRANTING COMPULSORY LIFE INSURANCE COVERAGE TO ACCREDITED BARANGAY HEALTH WORKERS, AMENDING FOR THE PURPOSE THE `BARANGAY HEALTH WORKERS' BENEFITS AND INCENTIVES ACT OF 1995"
congress_website_abstract = "This bill seeks to grant compulsory life insurance coverage to accredited barangay health workers. Since barangay health workers do not receive monthly compensation but only honoraria, allowances and such other emoluments as authorized by law, the national government and the local government unit concerned shall pay the monthly premium contributions on a fifty-fifty (50-50) basis."

