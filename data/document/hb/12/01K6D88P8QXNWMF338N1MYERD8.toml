congress_website_title = "AN ACT REQUIRING CERTAIN TOURISM-ORIENTE D ESTABLISHMENTS AND TOURIST WORKERS TO SECURE ACCREDITATION FROM THE DEPARTMENT OF TOURISM AS A PREREQUISITE TO THE ISSUANCE OF LICENSE OR PERMIT TO OPERATE BY LOCAL GOVERNMENT UNITS"
congress_website_abstract = "In line with the primary thrust of government of develop and promote the Philippines as a world-class tourist destination and venue for international conventions, tourism establishments and tourist workers shall be required to maintain the minimum standards set forth in the rules and regulations promulgated by the Department of Tourism (DOT) based on international levels of quality and efficiency. The measure proposes to require tourism-oriente d establishments and tourist workers to secure accreditation from the DOT as a prerequisite to the issuance of license, permit to operate or conduct business relative to tourism. It also seeks the creation of an Accreditation and Monitoring Committee in all provinces, cities and municipalities whichh shall evaluate tourism establishments and workers for purposes of accreditation."
