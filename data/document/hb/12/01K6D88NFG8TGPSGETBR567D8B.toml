congress_website_title = "AN ACT AUTOMATICALLY INCLUDING RETIRED SCHOOL TEACHERS TO BENEFIT FROM SALARY INCREASES GRANTED TO IN-SERVE TEACHERS, EFFECTING CORRESPONDING ADJUSTMENTS IN THEIR RETIREMENT PENSION"
congress_website_abstract = "\"Retired Public School Teachers' Special Bonus Act of 2001.\" Rationale: One sector of society, however, that has been left to make do with their diminutive income are the retired public and private school teachers. After devoting their prime years and talents to the education of the nation's children and future leaders, these poor teachers retired from service, many of them with much regret. They have given the best years of their lives to service for an educated citizenry that would take overthe various aspects of national life."

