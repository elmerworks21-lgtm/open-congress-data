congress_website_title = "AN ACT MANDATING THE CREATION OF WOMEN AND CHILDREN PROTECTION UNITS (WCPU) IN ALL HOSPITALS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Women and Children Protection Units Act.\" This bill intends to adequately aid these hapless victims of abuse by creating a Women and Children Protection Unit in all hospitals of the country, both private and public. It hopes to provide a specific area for crisis interventions and comprehensive programs to ensure round-the-clock and continued care and concerns for women and children victims and survivors of violence."
