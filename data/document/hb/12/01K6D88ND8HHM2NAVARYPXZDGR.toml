congress_website_title = "AN ACT PROHIBITING GREEN CARDS HOLDERS FROM BEING APPOINTED TO ANY PUBLIC OFFICE, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED EIGHT HUNDRED SEVEN, OTHERWISE KNOWN AS THE CIVIL SERVICE DECREE OF THE PHILIPPINES (pd 807)"
congress_website_abstract = "NO GREEN CARD HOLDERS SHALL BE ELIGIBLE FOR APPOINTMENT TO ANY OFFICE IN THE GOVERNMENT, OR IN ANY GOVERNMENT OWNED OR CONTROLLED CORPORATION, UNLESS IT IS SHOWN BY CLEAR EVIDENCE THAT He/she MADE AN IRREVOCABLE WAIVER OF THAT STATUS OR THAT HE HASSURRENDERED HIS GREEN CARD TO THE APPROPRIATE U.S. AUTHORITIES."

