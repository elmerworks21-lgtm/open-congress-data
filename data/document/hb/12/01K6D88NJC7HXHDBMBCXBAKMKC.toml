congress_website_title = "AN ACT BANNING THE SMOKING OF CIGARS AND CIGARETTES IN PUBLIC AREAS AND PUBLIC CONVEYANCES, MANDATING THE MANNER FOR ITS INFORMATION CAMPAIGN AND IMPOSING PENALTIES IN VIOLATION THEREOF"
congress_website_abstract = "\"No Smoking Act of 2001\". Smoking of cigars, cigarettes, tobacco pipes and the like are hereby prohibited in all government buildings, public schools, air-conditioned rooms of buildings such as shopping malls, hospitals, medical clinics, movie houses, hotels, restaurants, recreational places and public conveyances such as public utility jeepneys, FX taxi cabs and other van type vehicles used as \"service\" ferry boats and public buses."
