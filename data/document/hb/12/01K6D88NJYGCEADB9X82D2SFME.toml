congress_website_title = "AN ACT GRANTING SPECIAL BENEFITS TO GOVERNMENT PERSONNEL RETIRED UNDER R.A. 660, R.A. 1616, AND P.D. 1146, WHO ARE 70 YEARS OR OLDER, BY PROVIDING NEW PROCEDURES IN THE COMPUTATION OF MONTHLY PENSIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Despite the commendable adjustments of the GSIS with regard to the retirement benefits taht they give, it is sad to note that they still fall short of the expected outcome. As a result, retirees are left with very few financial options tocope up with their day-to-day affairs. This bill proposes to improve the mannter of computing the monthly pension of retirees by referring to the salary schedule introduced in the Executive Order No. 389 as one of the bases. This bill also aims to change the modes of retirement of those who have retired under RA 1616 and are presently 70 years old or older."
