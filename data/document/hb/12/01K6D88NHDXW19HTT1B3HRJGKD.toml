congress_website_abstract = "\"Sec. 285. Allocation to Local Government Units. - The share of the lovcal government units in the internal revenue allotment shall be allocated STARTING IN 2001. AFTER DEDUCTING THEREFROM THE COST OF THE DEVOLVED FUNCTIONS AND PERSONNEL, AND THE COST OF THE CITY-FUNDED HOSPITALS. EXCLUDING CAPITAL OUTLAYS, THE TOTAL COST SO DEDUCTED SHALL BE DISTRIBUTED AND REMITTED DIRECTLY TO THE LOCAL GOVERNMENT UNITS CONCERNED AND THE NET OR BALANCE OF THE INTERNAL REVENUE ALLOTMENT SHALL BE ALLOCATED inthe following manner: (a) Provinces - Twenty-three percent (23%); (b) Cities - Twenty-three percent (23%); (c) Municipalities - Thirty-four percent (34%); (d) Barangays - Twenty percent (20%): Provided, however, That the share of each province, citty, and municipality shall be determined on the basis of the following formula: (a) Population - Fifty-FIVE percent [50%]55%; (b) Land Area- Tewnty [five] percent [25%] 20%; (c) Equal sharing - Twenty-five percent (25%): Provided, further, That the s"
