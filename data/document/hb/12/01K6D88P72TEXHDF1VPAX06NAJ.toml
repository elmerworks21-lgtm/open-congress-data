congress_website_title = "AN ACT INCREASING WOMEN'S PARTICIPATION IN ELECTIVE AND APPOINTIVE POSITIONS IN GOVERNMENT"
congress_website_abstract = "\"Gender Balance in Political Participation and Representation Act.\" This bill has the following purposes: (1) Ensure women's access to political and decision-making representation ; (2) Promote women's active and full participation in the electoraland political process; and (3) Institutionaliz e reforms in the recruitment, selection, and appointment procedures in all levels of government positions."
