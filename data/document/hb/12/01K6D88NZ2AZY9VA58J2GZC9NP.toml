congress_website_title = "AN ACT REQUIRING LOCAL GOVERNMENT UNITS TO SET ASIDE NOT LESS THAN THREE PERCENT (3%) OF THE TOTAL REVENUE FROM REGULAR SOURCES OF THE PRECEEDING YEAR AS LUMP SUM APPROPRIATION TO FINANCE REFORESTATION PROGRAMS AND PROJECTS, AMENDING FOR THE PURPOSESECTION 324 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: Most local government units have been very deficient in coming up with and implementing reforestation programs for their respective localities. Clearly, there is lack of political will and most local officials have treated the problem ofthe fast disappearance of trees, with sheer apathy.> This bill seeks to mandate all local government units to set aside not less three percent (3%) of the total revenue from regular sources of the preceeding year for reforestation programs and projects. Setting aside at least three percent (3%) of the LGUs total revenue from regular sources of the preceeding year, ensures the LGUs ecological viability and enhances the country's resource sustainability."
