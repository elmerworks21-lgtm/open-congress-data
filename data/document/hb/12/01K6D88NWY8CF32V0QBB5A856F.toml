congress_website_title = "AN ACT TO CURTAIL OPTICAL MEDIA PIRACY, PROVIDING PENALTIES FOR VIOLATIONS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Optical Media Act of 2001.\" \"OPTICAL MEDIA shall refer to any prerecorded or recordable medium or device on which digital information, including any fixation of sound, images, or any combination of both, or software code, is stored, including various disc formats any technical variation now known or still to be devised in the future, which may be accessed and read using a lens scanning mechanism employing a high intensity light source such as a laser. > It is the policy of the State to ensurethe protection of intellectual property rights by creating an environment conducive to the growth and development of all business industries; that optical media piracy in all form is inimical to economic growth and public intrest; and that therefore,, the State shall institute the means of curtail all forms of optical media piracy."
