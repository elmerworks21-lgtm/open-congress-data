congress_website_title = "AN ACT TO REGULATE THE PRACTICE OF PSYCHOLOGY, CREATING FOR THIS PURPOSE A PROFESSIONAL REGULATORY BOARD OF PSYCHOLOGY, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Salient provisions of this proposed measure includes: (a) the examination for registration and licensure of psychologists and psycholetrician s; (b) supervision, control and regulation of the practice of psychology as a separate profession in the delivery of services of high quality in the Philippines; (c) the integration of psychologists and psychometrician s; (d) the development of the professional competence of psychologists and psychometrician s through continuing professional education inacordance with the guidelines set by the Professional Regulation Commission."
