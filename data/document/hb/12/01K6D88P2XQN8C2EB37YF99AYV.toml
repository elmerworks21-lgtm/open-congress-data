congress_website_title = "AN ACT ABOLISHING THE DEATH PENALTY REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 7659, ENTITLED, `AN ACT TO IMPOSE THE DEATH PENALTY ON CERTAIN HEINOUS CRIMES, AMENDING FOR THE PURPOSE THE REVISED PENAL CODE, AS AMENDED, OTHER SPECIAL PENAL LAWS, ANDFOR OTHER PURPOSES'"
congress_website_abstract = "The death penalty is hereby abolished and in lieu thereof, the penalty of reclusion perpetua shall be imposed. Rationale: In this light, it is about time we rethink our alternatives and act not out of fear but adbance from a genuine understanding ofthe situation. Let us finally realize that justice must likewise be tempered with mercy in order for genuine repentance and change to have a chance to propser. Hence, emphasis must be placed on restorative justice rather than reributive justice. Fallen characters should best be molded and not merely stripped of their humanity by banishing and condemning them to death."
