congress_website_title = "AN ACT IMPROVING THE ADMINISTRATION OF JUSTICE BY UPGRADING THE SALARIES OF THE JUDGES OF THE METROPOLITAN TRIAL COURTS, MUNICIPAL TRIAL COURTS IN THE CITIES, MUNICIPAL TRIAL COURTS, MUNICIPAL CIRCUIT TRIAL COURTS, AND SHARIA'H CIRCUIT COURTS AND CERTAIN COURT OFFICERS OF THE JUDICIARY AND FOR OTHER PURPOSES"
congress_website_abstract = "Notwitstanding the provisions of law to the contrary, all metropolitan trial courts judges, shall enjoy all the compensation, allowances, and benefits under Salary Grade 29. The judges, however, of municipal trial courts, municipal circuit trial courts and municipal trial courts in cities shall enjoy the compensation, allowances and benefits under salary grade 28."
