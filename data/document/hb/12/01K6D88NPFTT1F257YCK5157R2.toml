congress_website_title = "AN ACT STRENGTHENING THE POLITICAL PARTY SYSTEM BY PROHIBITING POLITICAL TURNCOATISM, PROVIDING PENALTIES THEREFOR AND REPEALING FOR THE PURPOSE SECTION SEVENTY-ONE OF BATAS PAMBANSA BLG. EIGHT HUNDRED EIGHTY-ONE, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "Any person holding and elective public office who is found guilty of political turncoatism as defined under this Act, after due notice and hearing, shall not be qualified for any elective position in any election immediately following the expirationof his term of office. > A candidate, other than the incumbent elective public official, who is likewise found guilty of political turncoatism, after due notice and hearing befire the Commission on Elections, shall not be qualified to run for any elective public office immediately following his change of political party affiliation. > In either case, any candidate, whether an incumbent elective public official or not, shall not be qualified to assume or hold any elective public office within thhe term of office immediately following the date of the elections from which he was disqualified to participate in violation of this Act."
