congress_website_title = "AN ACT LIMITING THE CONSTRUCTION AND OPERATION OF GIANT SHOPPING MALLS AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Construction and operation of giant shopping malls in any city or municipality shall be limited to not more than one (1) mall for every 150,000 inhabitants. Provided, that shopping malls which are already existing or operating prior to approval of this Act shall not be covered thereby."
