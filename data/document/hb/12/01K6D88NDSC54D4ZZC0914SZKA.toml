congress_website_title = "AN ACT ESTABLISHING A STUDENT FINANCIAL ASSISTANCE PROGRAM FOR STUDENTS OF ECONOMICALLY DISADVANTAGED FAMILIES AND AUTHORIZING THE APPROPRIATION OF FUNDS FOR THE PURPOSE"
congress_website_abstract = "The term \"economically disadvantaged but deserving students\" who are qualified under this program shall mean those students of underprivileged families falling below the poverty line as determined by the National Economic and Development Authority (NEDA), who have the ability to continue and finish a degree course. > The beneficiaries under this program shall be entitled to a reasonable monthly stipend depending on costs of licing in a particular educational institution, free tuition, book allowance and other miscellaneous fees to be determined by the administering agency."
