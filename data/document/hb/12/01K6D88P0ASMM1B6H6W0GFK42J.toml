congress_website_title = "AN ACT GRANTING SENIOR CITIZENS WHOSE INCOME IS NOT MORE THAN ONE HUNDRED TWENTY THOUSAND PESOS (P120,000.00) PER ANNUM, TWENTY PERCENT (20%) DISCOUNT ON ELECTRICITY, WATER AND TELEPHONE BILLS, AMENDING FOR THE PURPOSE SECTIONS 2 AND 4 OF REPUBLIC ACT NO. 7432, ENTITLED `AN ACT MAXIMIZING THE CONTRIBUTION OF SENIOR CITIZENS TO NATION BUILDING, GRANT BENEFITS AND SPECIAL PRIVILEGES AND FOR OTHER PURPOSES'"
congress_website_abstract = "The bill proposes to grant senior citizens whose income is less than One Hundred Twenty Thousand Pesos (P120,000.00) per annum, twenty percent (20%) discount on their electricity, water and telephone bills, amending for the purpose Sections 2 and 4of Republic Act No. 7432, otherwise known as the \"Law maximizing the contribution of senior citizens to nation building, grant benefits and special privileges. > Rationale: Senior citizens are now in the twilight years of their lives and most of them, having retired from work, have no sufficient income to support their families, particularly at this time when prices of commodities have skyrocketed beyond the reach of minimum wage earners."
