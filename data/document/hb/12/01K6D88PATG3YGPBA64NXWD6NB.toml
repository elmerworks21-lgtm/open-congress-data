congress_website_title = "AN ACT DECLARING DIRECT AND TECHNICAL SMUGGLING AS ACTS OF ECONOMIC SABOTAGE, PRESCRIBING PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "To minimize the incidence of smuggling and technical smauggling, the measure seeks to declare the acts of outright/direct smuggling and technical smuggling of a minimum aggregate amount or value of Ph 1.0 million as acts of economic sabotage. It provides for penalties such as: a) fine equal to the value of the smuggled articles; b) fine equal to the aggregate amount of the taxes, duties and other charges avoided; c) imprisonment of a minimum eight years and one day; and d) confiscation of the smuggled articles. The measure further grants the Bureau of Customs additional powers for the disposition of the confiscated goods."
