congress_website_title = "AN ACT EXTENDING COLLEGE SCHOLARSHIP ASSISTANCE TO THE DEPENDENTS OF THE ACTIVE MEMBERS OF THE POLICE, MILITARY, FIRE AND JAIL BUREAU"
congress_website_abstract = "Rationale: Due to the limited budget of the government, it is unfortunate, however, that the men and women in the active service receive only meager salaries despite their devoted service to the citizenry. Constrained by their compensation, they areconsequently unable to afford a college education for their children. In recognition of the valiant service of these uniformed personnel, and in order to assist them in providing their children a tertiary education, this bill proposed that a collegescholarship assistance be extended to their dependents."

