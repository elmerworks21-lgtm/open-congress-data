congress_website_title = "AN ACT AMENDING SECTIONS 2, 4, 7 AND 8 OF REPUBLIC ACT NO. 7432 (1992) ENTITLED \\\"AN ACT TO MAXIMIZE THE CONTRIBUTION OF SENIOR CITIZENS TO NATION BUILDING, GRANT BENEFITS AND SPECIAL PRIVILEGES AND FOR OTHER PURPOSES\\\" AND FOR OTHER PURPOSES"
congress_website_abstract = "Our senior citizens, most of whom are retirees and have very little means to support themselves, have been most adversely affected by the country's continuing economic difficulties. This bill seeks to amend RA 7432 by reducing the income requirement threshold to qualify for entitlements under the law to PhP 120,000 per annum. It also provides for the extension of additional benefits for senior citizens such as the grant of discounts on legal, medical and other allied services extended by private service providers."

