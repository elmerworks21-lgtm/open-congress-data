congress_website_title = "AN ACT REQUIRING GOVERNMENT-OWNED AND -CONTROLLED CORPORATIONS (GOCCs) TO PUBLICLY DISCLOSE THEIR FINANCIAL PERFORMANCE AND THE BUDGETARY SUPPORT SUCH GOCCs RECEIVE FROM THE NATIONAL GOVERNMENT AND/OR NATIONAL GOVERNMENT UNITS, PROVIDING PENALTIES THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Transparency and Accountability in the Government Corporate Sector Act of 2003.\\\" While the right to public information and access records is enshrined in the Constitution, access to public information, records and policy research remains to be problematic. The bill aims to require all government-owned and controlled corporations to make a public disclosure, regularly and fully, on their financial performance and the budgetary support they received from the national and/or local government units."
