congress_website_title = "AN ACT PROVIDING FOR A MANDATORY COURSE IN HUMAN RIGHTS FOR ALL OFFICERS, MEMBERS AND TRAINEES OF THE ARMED FORCES OF THE PHILIPPINES (AFP), THE PHILIPPINE NATIONAL POLICE (PNP), THE NATIONAL BUREAU OF INVESTIGATION (NBI), AND OTHER LAW ENFORCEMENTAGENCIES AND FOR OTHER PURPOSES"
congress_website_abstract = "The Armed Forces of the Philippines (AFP), the Philippine National Police (PNP), the National Bureau of Investigation (NBI), the Bureau of Jail Management and Penology (BJMP), the Bureau of Corrections (BuCor), and other law enforcement agencies shall include the study of human rights as an integral part of the education and training of all trainees/propse ctive members of such agencies. > No trainee and/or prospective member of the AFP, PNP, NBI. BJMP, BuCOR and other law enforcement agenciesshall be admitted into the service without passing a comprehensive examination on human rights to be administered by the Commission on Human Rights (CHR)."
