congress_website_title = "AN ACT GRANTING EXEMPTION TO THE HEALTH PROFESSIONALS EMPLOYED IN GOVERNMENT SERVICE FROM THE COVERAGE OF REPUBLIC ACT NO. 6758, OTHERWISE KNOWN AS THE SALARY STANDARDIZATION LAW"
congress_website_abstract = "This bill seeks to exempt from the coverage of RA 6758, otherwise known as the Salary Standardization Law, the health professionals employed in the Government. It is in keeping with the declared policy of the State to provide equal pay for equal work that this bill is filed. It is also with the intention to keep the good men and women as well as to attract the best and the brightest in the health profession.> The term Health Professionals shall include but not limited to Doctors, Nurses, Physical Therapists. Midwives, Medical Technologists, Dentists, and other personnel involved in direct health services delivery."
