congress_website_title = "AN ACT DECLARING CALAMANSI JUICE AS THE NATIONAL HEALTH DRINK"
congress_website_abstract = "The calamansi fruit has long been a staple item in the Filipino dining table. It is used as an ingredient in food dips, a clavoring for dishes and a healthful juice drink. Studies have shown that calamansi is one of the best sources of Vitamin C. This measure seeks to declare calamansi juice as the \"National Dealth Drink\". Its adoption as a National Health Drink will promote calamanasi to its rightful lofty billing as a very good fruit juice."
