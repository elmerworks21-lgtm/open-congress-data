congress_website_title = "AN ACT REGULATING THE PRACTICE OF OCCUPATIONAL THERAPY IN THE PHILIPPINES THEREBY REPEALING REPUBLIC ACT NO. 5680, OTHERWISE KNOWN AS 'THE PHILIPPINE PHYSICAL AND OCCUPATIONAL THERAPY LAW', AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "The bill creates the Professsional Regulatory Board of Occupational Therapy under the administrative supervision of the Professional Regulation Commission, defines its powers and functions for the regulation of the practice of the profession. It mandates the integration of occupational therapists into one (1) accredited national organization. It also provides foreign reciprocity of the profession."
