congress_website_title = "AN ACT GRANTING ADDITIONAL RETIREMENT BENEFITS TO MEMBERS OF THE JUDICIARY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 910, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The existing retirement laws covering the Justices of the Supreme court, the Court of Appeals and other members of the Judiciary are indecently LOW and UNRESPONSIVE to the rapidly changing economic conditions. The proposed bill seeks to upgrade these retirement benefits and redefine the retirement condition on the length of service to the government. In the computation of benefits under the existing law, the basis in all cases is the salary of the Justices plus the highest monthly aggregate of transportation, living and representation allowances which he was receiving at the time of his retirement (compulsory or optional), resignation or death."

