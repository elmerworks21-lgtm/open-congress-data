congress_website_title = "AN ACT AMENDING SECTION 1801 OF THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES"
congress_website_abstract = "The measure proposes to require all shipping lines, shipping companies, freight forwarders, consolidators, break bulk agents and their agents and sub-agents, and arrastre contractors to state in bold, prominent and comprehensible characters the words \\\"Customs law requires filing of entry within thirty (30) days from date of discharge of last package from the vessel or cargo is deemed forfeited in favor of the government and shall be disposed of in accordance with law\\\" in each and every Notice of Arrival sent to the owners, importers, consignees or other interested parties. This shall serve as the \\\"due notice\\\" referred to in the Tariff and Customs Code of the Philippines."
