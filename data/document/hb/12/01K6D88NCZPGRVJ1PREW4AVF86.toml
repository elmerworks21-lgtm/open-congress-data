congress_website_title = "AN ACT AMENDING SECTION 70 (d) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991 BY REDUCING THE PRESENT REQUIREMENT FOR INITIATING RECALL FROM TWENTY-FIVE PERCENT (25%) TO TWENTY PERCENT (20%) OF THE TOTAL REGISTERED VOTERS DURING THE ELECTION OF A CONCERNED OFFICIAL"
congress_website_abstract = "With the increasing incidence of local government officials being linked to illegal activities such as murder and illegal gambling, there is a need to amend the provisions for recall of local officials in the Local Government Code. The present requirement of tenty-five percent (25%) of registered voters needed to initiate the recall procedure is unrealistic since it is a requirement that is very difficult to meet. This requirement actually prevents the people from exercising their lawful remedy of the people to recall an erring local official."
