congress_website_title = "AN ACT AMENDING ARTICLE 34 OF THE FAMILY CODE OF THE PHILIPPINES OR EXECUTIVE ORDER NO. 209"
congress_website_abstract = "Article 34 of the Family Code of the Philippines or Executive Order No. 209, is hereby amended to read as follows: \"Article 34. No license shall be necessary for the marriage of a man and woman who have lived together as husband and wife for at least 5 years and without any legal impediment to marry each other. The contracting parties shall state the foregoing facts in an affidavit before any person authorized by law to administer oaths: PROVIDED, THAT IN CASE EITHER OR BOTH OF THE CONTRACTINGPARTIES ARE BETWEEN THE AGES OF EIGHTEEN AND TWENTY-ONE, OR BETWEEN THE AGES OF TWENTY-ONE AND TWENTY-FIVE, THEY SHALL FURTHER STATE IN THE AFFIDAVIT THAT THEY COMPLIED WITH THE REQUIREMENTS ON PARENTAL CONSENT OR PARENTAL ADVICE PROVIDED FOR UNDERARTICLE 14 OR 15, AS THE CASE MAY BE. The solemnizing officer shall also state under oath that he ascertained the qualifications of the contracting parties and found no legal impediment to the marriage."
