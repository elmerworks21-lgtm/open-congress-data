congress_website_title = "AN ACT REQUIRING CELLULAR TELEPHONE COMPANIES/MANUF ACTURERS TO PUT WARNING LABELS ON THEIR CELLULAR TELEPHONE PRODUCTS TO REMIND USERS THAT PROLONGED USE CELLULAR TELEPHONES CAN BE HAZARDOUS TO ONE'S HEALTH"
congress_website_abstract = "SEction 15, Article 2 of the 1987 Constitution states, \"The State shall protect and promote the right to health of the people and instill health consciousness among them.\" > This bill seeks to require cellular telephone companies/manuf acturers to place warning labels on their mobile phone products before this products are sold to the public. Such mandatory requirement is a result of reports and studies showing radiation from cellular phones triggers chemical processes in the body which may bedamaging and could couse headaches, tumors and even brain cancer."
