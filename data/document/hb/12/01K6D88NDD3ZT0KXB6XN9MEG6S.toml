congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF MICROSCOPY CENTERS IN EVERY BARANGAY THROUGHOUT THE COUNTRY, THE ACQUISITION OF ADDITIONAL MICROSCOPES, THE EMPLOYMENT OF ADDITIONAL MICROSCOPISTS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Early detection through microscopy is crucial to the control of diseases. In a country such as ours, where the morbidity is high and widespread, particularly in the rural areas, provisions for basic health facilities on early health intervention become as necessary as the tools of production that help sustain life."

