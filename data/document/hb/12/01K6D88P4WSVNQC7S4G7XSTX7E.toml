congress_website_title = "AN ACT UPGRADING THE SALARY GRADE LEVEL OF THE SCHOOLS DISTRICT SUPERVISORS FROM SALARY GRADE NINETEEN (19) TO SALARY GRADE TWENTY-FOUR (24)"
congress_website_abstract = "Presently, the District Supervisor's Salary Grade is nineteen (SG 19) while the Salary Grade of a Secondary School Principal is 21 (SG 21). It is obvious that the Schools District Supervisors are being discriminated against by receiving a salary lower than that of what is being received by the School Principals which are under the supervision of the former. > This bill seeks to correct this anomaly by upgrading the Salary Grade of Schools District Supervisors from Salary Grade Nineteen (SG 19)to Salary Grade Twenty-Four (24)."
