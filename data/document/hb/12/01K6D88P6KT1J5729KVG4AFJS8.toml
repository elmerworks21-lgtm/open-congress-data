congress_website_title = "AN ACT AMENDING SECTION 109, CHAPTER I, TITLE IV OF PRESIDENTIAL DECREE NO. 1158, AS AMENDED, UP TO REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE, AND FOR OTHER PURPPOSES THEREOF(RE: VAT ON FILM INDUSTRY)"
congress_website_abstract = "Rationale: The imposition of ten percent (10%) Value-added Tax (VAT) increases the amount of tax paid by the members of the film industry to a grant total of thirty percent (30%) of their income. It runs contrary to the policy of the State to support and develop the local film industry. The imposition of 10% VAT is another disincentive to the film industry to produce films of superior quality and to enhance the skills and talents of Filipino artists anf fil, producers. To precent the dying filmindustry from going down further and to promote the development and growth of the local film industry, this bill seeks to exempt the members of the film industry and the other individuals in the same category from the imposition of the 10% Value-addded Tax."

