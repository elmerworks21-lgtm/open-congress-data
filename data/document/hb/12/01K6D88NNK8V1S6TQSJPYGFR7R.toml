congress_website_title = "AN ACT ESTABLISHING A COLLEGE EDUCATION TRUST FUND FOR CHILDREN OF GSIS AND SSS MEMBERS"
congress_website_abstract = "There is hereby established in the Government Service Insurance System and the Social Security System a special trust fund called the \"College Education Trust Fund\" to ensure the college education of the children of the Members of both System. > Theamount of premium to be paid to the College Educaiton Trust Fund by the Member shall be, in accordance with the schedule of payments to be provided by the System concerned taking into consideration certain criteria."
