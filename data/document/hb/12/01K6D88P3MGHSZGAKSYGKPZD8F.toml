congress_website_title = "AN ACT CREATING THE NATIONAL ENVIRONMENTAL MANAGEMENT AUTHORITY, DEFINING ITS POWERS, FUNCTIONS AND RESPONSIBILITIE S, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Environmental Management Authority (NEMA) Act.\" Rationale: Environmental problems in the Philippines are multi-faceted forest denudation, destruction of marine life, loss of soil fertility, urban air and water pollution, and inadequate wastes disposal systems are environmental problems that rob us and the future generations of a clean and health environment.> This bill therefore, proposes the creation of the National Environmental Management Authority (NEMA), an environmental watchdogwhich shall be responsible for the conservation of the country's environemnt and resources, regulation of environmental impact occasioned by human activities, and control and abatement of environmental pollution."

