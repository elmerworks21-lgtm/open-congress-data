congress_website_title = "AN ACT PROVIDING FOR THE STANDARDS FOR THE TRAINING AND PRACTICE OF REHABILITATION MEDICINE AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The past decade witnessed the growth and expansion of Rehabilitation Medicine as a specialty in the medical field. For one, the number of trainees, graduates, certififed diplomates and fellows has increased tremendously. Alongside, is thefast pace at which rehabilitation centers have sprouted throughout the country with the noble goal of providing accessible delivery of expert rehabilitative care to Filipinos suffering from neuromusculoske letal, cardiovascular, pulmonary, and othersystem disorders which produce temporary or permanent disability.> To ensure that rehabilitation centers will function with utmost competence, it is the goal of the proposed bill to set standards for both the training and practice of RehabilitationMedicine as well as standards for the technical and operational aspects of rehabilitation centers and/or units."
