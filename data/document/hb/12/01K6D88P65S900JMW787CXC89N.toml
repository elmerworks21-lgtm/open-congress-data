congress_website_title = "AN ACT PROVIDING FOR ADDITIONAL MEMBERS OF THE BOARD OF TRUSTEES OF THE NATIONAL MARITIME POLYTECHNIC, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 1369"
congress_website_abstract = "This bills calls for additional members of the National Maritime Polytechnic Board of Trustees to make the governing body more responsive to the requirements of its mandate. > The additional members shall be composed of the following: (a) The Chairman, House Committee on Higher and Technical Education; (b) The Chairman, Senate Committee on Education, Arts and Culture; (c) The Chairman, Commission on Higher Education (CHED); and (d) The Regional Director, Region VIII, National Economic and Development Authority (NEDA)."

