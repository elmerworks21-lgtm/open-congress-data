congress_website_title = "AN ACT TO ESTABLISH A HIGHER STANDARD OF PROMOTION AND PROTECTION OF THE RIGHTS AND WELFARE OF FILIPINO OVERSEAS SEAFARERS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Overseas Seafarers Act\". Rationale: Today's so-called unsung heroes or modern day economic warriors have greatly contributed to our national coffers. In fact, they are the reason for our country's staying afloat in the middle of severe economic crisis.> Of this total amount, the Filipino seafarers remitted $2.3 billion to the country, posting the only increase in remittances among all overseas Filipino workers. Indeed this marginalized sector of OFWs is a vital cog in sustaining the much-needed dollar reserves of our country. > It is precisely because of the sheer number of current Filipino seafarers and the outbound student apprentices that legislative measures are considered imperative to ensure their safety, protect their rights and prromote their welfare."

