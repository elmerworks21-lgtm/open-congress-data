congress_website_title = "AN ACT PROTECTING THE USER OF THE AUTOMATED TELLER MACHINE (ATM) FROM ROBBERY AND OTHER VIOLENT CRIMES"
congress_website_abstract = "\"Safe ATM Act of 2001\". Security Measures and Liability. All ATMs shall be situated in an enclosed area where the clients are given ample privacy to conduct their respective business. At least one (1) security guard shall be provided within the immediate vicinity of the ATM. Provided that the banking institution which fails to provide adequate security measures will be held solidarily liable for any loss or damage committed by the person or persons responsible for the robbery or violent crimecommitted within ten square meters from the location of the ATM."
