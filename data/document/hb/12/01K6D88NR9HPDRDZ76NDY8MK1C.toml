congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE AIR FORCE ACADEMY (PAFA) AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Women victims are often forced to endure situations of violence due to the lack of services that will support the decision to resist violence. This problem is very prominent among victims, or survivors, of domestic violence who feels theneed to leave their homes but are restrained from doing so by the absence or lack of financial resources, child care support and shelter. Many actually think that they do not have much choice in the situation but to suffer in silence and solitude, resulting in serious physical and psychological consequences. > This Act shall be known as \"Women and Children Crises Survivors Assistance and Protection Act of 2001\"."
