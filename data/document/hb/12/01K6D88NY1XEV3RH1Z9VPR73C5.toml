congress_website_title = "AN ACT PROVIDING FOR PUBLIC LIABILITY INSURANCE FOR THE PURPOSE OF PROVIDING IMMEDIATE RELIEF TO PERSONS AFFECTED BY ACCIDENT ARISING FROM THE OPERATIONS OR INCIDENTAL TO THE OPERATIONS OF ESTABLISHMENTS, ENTERPRISES, PUBLIC UTILITIES AND VEHICLES,BUILDINGS, MACHINERY AND THEIR ACCESSORIES"
congress_website_abstract = "\"Public Liability Insurance Act of 2001\". Rationale: The main point of contention in major disasters and tragedies is the issue on public liability: who are primarily liable for damages for the loss of lives and destruction of properties? Concernedentities often pass the blame to others. the most common defense used to escape liability is to declare them as accidents or call the disasters as the \"acts of God\" or force majeure. This defense usually deflects the responsibility and liability fromthe owners or operators and their agents and servants. > To address this concern, this public utility law must be enacted to hold owners and operators directly and primarily responsible for injuries and damages arising from the operation or incidenttal to the operation of their enterprise, establishments, property, personnel and their accessories."
