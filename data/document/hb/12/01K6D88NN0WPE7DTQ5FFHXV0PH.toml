congress_website_title = "AN ACT REQUIRING PRIVATE CONTRACTORS DOING PUBLIC WORK PROJECTS TO EMPLOY INDIGENTS WHO ARE IN THE ROSTERS OF THE DEPARTMENT OF SOCIAL WELFARE AND DEVELOPMENT (DSWD), AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-SIX HUNDRED AND EIGHTY-FIVE"
congress_website_abstract = "Rationale: With this amendment, we will be able to give jobless indigents in different areas where the project will be undertaken the opportunity to work and earn a living in a decent and honest way. Considering the increase in the number of the unemployed, there is a need for the government to require contractors awarded public works prohects by the government to hire not only from those qualified unemployed bona fide and actual residents in the place where the projects is located but also tohire indigents who are in the rosters of the DSWD."

