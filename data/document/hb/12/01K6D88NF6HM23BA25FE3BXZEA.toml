congress_website_title = "AN ACT TO AMEND SECTION 220 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE `LOCAL GOVERNMENT CODE', AND FOR OTHER PURPOSES"
congress_website_abstract = "REAL PROPERTY CLASSIFIED AS RESIDENTIAL SHALL NOT BE REASSESSED MORE OFTENER THAN ONCE EVERY TEN (10) YEARS, AND THAT EACH REASSESSMENT SHALL NOT EXCEED TWENTY PERCENT (20%) ON LAND AND TEN PERCENT (10%) ON BUILDINGS AND OTHER STRUCTURES:AND PROVIDED, FINALLY, THAT IN CASE OF VIOLATION OF THIS PROVISION, A PENALTY OF PERPETUAL DISQUALIFICATIO N TO HOLP PUBLIC OFFICE OR A FINE OF NOT EXCEEDING THREE HUNDRED THOUSAND PESOS (P300,000.00) OR BOTH DISQUALIFICATIO N AND FINE IN THE DISCRETION OF THECOURT , SHALL BE IMPOSED."

