congress_website_title = "AN ACT RAISING THE PENALTIES FOR THE COMMISSION OF THE CRIME OF INFIDELITY IN THE CUSTODY OF PRISONERS, AMENDING FOR THE PURPOSE ACT NO. 3815, OTHERWISE KNOWN AS THE REVISED PENAL CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Any public officer who shall consent to the escape of a prisoner in his custody or charge, shall be punished; (1) by PRISION MAYOR in its medium and maximum periods and perpetual ABSOLUTE disqualificatio n, if the fugitive shall have been sentencedby final judgment to any penalty; (2) by PRISION MAYOR in its minimum period and temporary ABSOLUTE disqualificatio n IN ITS MAXIMUM PERIOD TO PERPETUAL ABSOLUTE DISQUALIFICATIO N, in case the fugitive shall have not been finally convited but only held as detention prisoner for any crime or violation of law or municipal ordinance; and (3) by PRISION CORRECIONAL in its maximum period to PRISION MAYOT in its minimum period and temporary ABSOLUTE disqualificatio n IN ITS MAXIMUM PERIOD TO PERPETUALL ABSOLUTE DISQUALIFICATIO N if the evasion of the prisoner shall have taken place through the negligence of the officer in charged with the conveyance or custody of the escaping prisoner."
