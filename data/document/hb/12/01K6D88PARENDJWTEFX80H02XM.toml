congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE MEDIATION CENTER FOR COURT-ANNEXED MEDIATION CASES, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Philippine Mediation Center Act\\\". Since its creation in 2001 through a Supreme Court resolution, the Philippine Mediation Center (PMC) has been successful in promoting court-annexed mediation as an effective alternative dispute resolution mechanism in de-clogging court dockets. Areas with PMC units have registered high settlement rates. However, the effectiveness of court-annexed mediation is limited by the small number of PMC units across the country. This bill seeks to institutionalize and constitute a permanent PMC in order to make court-annexed mediation available to the general public."
