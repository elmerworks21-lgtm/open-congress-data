congress_website_title = "AN ACT GRANTING ACCELERATED DEPRECIATION DEDUCTION FOR INCOME TAX PURPOSES, AMENDING FOR THE PURPOSE SECTION 34 (F) FO THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "PLANT, MACHINERY AND EQUIPMENT THAT ARE REASONABLY NEEDED AND ACTUALLY USED FOR THE PRODUCTION AND TRANSPORT OF GOODS AND SERVICES MAY BE DEPRECIATED USING A DEPRECIATION RATE TWICE AS FAST AS THE NORMAL RATE: PROVIDED, HOWEVER, THAT THIS METHOD ISAVAILABLE ONLY TO PLANT, MACHINERY AND EQUIPMENT DEPRECIATED UNDER THE STRAIGHT LINE METHOD; AND PROVIDED, FURTHER, THAT THE TAXPAYER NOTIFIES IN WRITING THE COMMISSIONER OF INTERNAL REVENUE AT THE BEGINNING OF THE DEPRECIATION PERIOD AS TO WHAT DEPRECIATION RATE ALLOWD THEREUNDER SHALL BE USED BY IT."

