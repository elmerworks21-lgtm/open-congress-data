congress_website_title = "AN ACT CREATING A SPECIAL BASIC EDUCATION FUND, PROVIDING FOR A MECHANISM FOR ITS ADMINISTRATION AND SOURCES OF FUNDING INCLUDING THE IMPOSITION OF ADDITIONAL CHARGES AND TAXES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: To provide assistance to basic education, this bill proposes the cretion of a Special Basic Education Fund that shall be exclusively spent to improve and maintain the quality of basic education. The fund shall be in addition to the existing Special Education Fund provided for under R.A. No. 5447 which was created as a financial support to education as a whole."

