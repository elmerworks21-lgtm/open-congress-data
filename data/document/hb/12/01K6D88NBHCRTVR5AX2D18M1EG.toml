congress_website_title = "AN ACT EXEMPTING FROM THE VALUE-ADDED TAX CERTAIN SALE OF SERVICES, AMENDING FOR THE PURPOSE THE TAX REFORM ACT OF 1997"
congress_website_abstract = "This bill seeks to EXEMPT the following services from the VAT: (1) Services rendered by banks, non-bank financial intermediaries, finance companies and other financial intermediaries not performing quasi banking functions; (2) Services performed asactors or actresses, talents, singers and emcees; radio and television broadcasters; choreographers; musical, radio, movie television and stage directors; (3) Services performed as professional athletes; and (4) Services performed in the exercise ofprofession or calling and professional services performed by registered general professional partnership."
