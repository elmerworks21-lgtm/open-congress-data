congress_website_abstract = "\"Household Services Protection Act of 2001\". This Act shall cover all public and private employees in agricultural and non-agricultura l sectors. > Any person is hereby prohibited from willfully causing force or intimidation or harassment or insinuation or any sort of proposal to compel and convince any person under one's charge to render services in payment of debts personally incurred by said person or his/her kin or any person or agency who has taken custody over the employee."
