congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF THE OVERSEAS FILIPINO BANK AND FOR OTHER PURPOSES"
congress_website_abstract = "The Bank shall have its principal office in Metro Manila, and in order to effectively address the banking needs of the overseas workers, their families and the banking public in general, its shall establish branches all over the country and to service the remittance requirements of the migrant workers, remittance centers shall be established in strategic locations where there are concentrations of overseas Filipinos."

