congress_website_title = "AN ACT RATIONALIZING THE HOUSING SECTOR, CREATING THEREBY THE DEPARTMENT OF HOUSING AND URBAN DEVELOPMENT, DEFINING ITS STRUCTURE, PROVIDING FOR ITS POWERS AND FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The shortfall in housing stems from one major problem: government and its inability to put its act together. The sheer number of agencies tasked with addressing the problem has indiscriminatel y resulted in the duplication of functions and made for a policy environment that is described, at best, as incoherent. Towards this end, it proposes the creation of the Department of Housing and Urban Development."
