congress_website_title = "AN ACT AMENDING THE CRIME OF ILLEGAL DISCHARGE OF FIREARMS"
congress_website_abstract = "This bill seeks to penalize any person who discharges his/her firearm with no apparent and justifiable reason with arresto mayor in its maximum period. Any member of the Armed Forces of the Philippines or para-military units or the Philippine National Police or any law enforcement agency or penal institution, who, not in the performance of official duty, commits the same act, shall suffer the penalty of prision correccional in its minimum and medium periods."

