congress_website_title = "AN ACT OFFICIALLY ACKNOWLEDGING THE HEROISM OF BISHOP GREGORIO AGLIPAY"
congress_website_abstract = "Rationale: In celebration of the Centennial of the 1896 Philippine Revolution, it is but proper to officially acknowledge the heroism of Bishop Gregorio Aglipay. There is no more proper and fitting way for the Filipino people and our country to give our tribute to the revolutionary priest who painstakingly fought for our independence. It is because of him that we are reaping the fruits of an independent Philippines."
