congress_website_title = "AN ACT ESTABLISHING AN ANTI-ILLEGAL RECRUITMENT CENTER IN EVERY DISTRICT NATIONWIDE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The proposed ANTI-ILLEGAL RECRUITMENT CENTER is tasked to: a) disseminate information to job seekers or \"would ne OFWs\" on acts of illegal recruitment and placement; b) disseminate list of license recruitment/pla cement agencies in every municipalities and all barangays by utilizing all and every means available; c) receive complaints of victims of illegal recruitment and placement; d) submit reports and coordinate with the national offices of the Department of Labor and Employment, PhilippineOverseas Employment Administration, National Labor Relations Commission and the Department of Justice on cases of illegal recruitment and placement, etc."

