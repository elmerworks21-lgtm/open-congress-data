congress_website_title = "AN ACT TO BE KNOWN AS `THE MARITIME LIENS AND SHIP MORTGAGE ACT OF 2002"
congress_website_abstract = "Rationale: The Mortgage Law has not helped ship owners to gain access to more affordable financing because foreign banks, generally, do not accept a mortgage over a vessel constituted under Philippine law. There, apparently, is a problem in the concurrence and preference of credits as provided in the law. There are presently no laws governing this sector of the industry as this has always been viewed as part of ship owning and ship operation. > Thus, this proposed measure."

