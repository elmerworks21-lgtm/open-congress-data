congress_website_title = "AN ACT INCREASING THE RATE OF COMBAT DUTY PAY OF OFFICERS AND ENLISTED PERSONNEL OF THE ARMED FORCES OF THE PHILIPPINES"
congress_website_abstract = "The 1987 Constitution provides that the Armed Forces of the Philippines (AFP) is the protector of the people. Its mission is to secure the sovereignty of the State and the integrity of the National Territory. On the other hand, the governmentis constitutionall y bound to promote professionalism in the AFP by providing adequate remuneration and benefits to its members.>> The bill aims to improve the welfare and living conditions of concerned officers and enlisted personnel of the AFP. It intends to upgrade the existing combat duty pay of military personnel by 25% of the base pay of a Private and its equivalent in the Philippine Air Force and the Philippine Navy, subject ot automatic adjustment in case of salary increases."
