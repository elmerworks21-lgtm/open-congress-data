congress_website_title = "AN ACT TO PROMOTE THE PROTECTION AND CONSERVATION OF THE NATIONAL HERITAGE, THE CREATION OF A NATIONAL HERITAGE COMMISSION AND PROVIDING PENALTIES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Heritage Act of 2001\". Rationale: Knowing our heritage would serve as an anchor amidst the chaos that modernization brings. By preserving our heritage, we keep our integrity as a people, for our heritage is a foundation upon which we canbuild our present, as well as our future. Heritage plays an important role in national destiny, only by knowing our collective strength as a people can we be prepared to meet the challenges posed by globalization. Towards this end, a NATIONAL HERITAGE COMMISSION is hereby created and tasked to establish national principles, standards and policy for the identification, recording and management of heritage resources, among others."

