congress_website_title = "AN ACT REGULATING THE PRACTICE OF PLUMBING ENGINEERING IN THE PHILIPPINES"
congress_website_abstract = "Rationale: Some forty years ago, 1955, Congress enacted R.A. 1378, otherwise known as the Plumbing Law, which regulates the trade of master plumbers. High School graduates with five years plumbing experience used to dominate the trade. With the advent of high-rise buildings, theirs numbers are dwindling but sustaining. Master plumbers with engineering expertise are coming about. Since then, the law has become outmoded with provisions that do not harmonize with the times."

