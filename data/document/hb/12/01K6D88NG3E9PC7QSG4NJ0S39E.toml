congress_website_title = "AN ACT SUSPENDING THE OPERATION OF REPUBLIC ACT NO. 7077, ENTITLED `CITIZEN ARMED FORCE OR ARMED FORCES OF THE PHILIPPINES RESERVISTS ACT', WITH RESPECT TO THE PROVISIONS ON THE RESERVE OFFICERS' TRAINING CORPS PROGRAM FOR THE SCHOOL YEARS 2001-2002, 2002-2003 AND 2003-2004"
congress_website_abstract = "The operation of Republic Act No. 7077 with respect to the provisions on Reserve Officers' Training Corps (ROTC) program is suspended for the School Years 2001-2002, 2002-2003, and 2003-2004. All students who are graduating in any Baccaulaureate degree on October 2001 until March 2004 are hereby exempted from taking the ROTC: Provided, That after the lifting of the suspension, students who have only three (3) semesters or less left remaining in their academic subjects before their graduation shall undergo the program corresponding to the aforesaid number of remaining semester or semesters."
