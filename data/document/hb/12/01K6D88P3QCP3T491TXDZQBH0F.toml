congress_website_title = "AN ACT DECLARING EVERY TWENTY-THIRD DAY OF JANUARY A SPECIAL NONWORKING HOLIDAY IN THE COUNTRY"
congress_website_abstract = "This bill seeks to declare every twenty third day of January a special non-working holiday in the country.> Filipinos should commit to their collective memory the historic date of January 23, 1899. This was the day the First Pilippine Republic alsoknwon as the Malolos Republic, was inaugurated, amidst colorful ceremonies at the Barasoain Church."
