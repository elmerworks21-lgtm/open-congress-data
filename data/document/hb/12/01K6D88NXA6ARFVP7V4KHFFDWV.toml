congress_website_title = "AN ACT REQUIRING PRIVATE EMPLOYERS TO ESTABLISH AND PROVIDE SLEEPING QUARTERS AND/OR FACILITIES FOR THEIR FEMALE EMPLOYEES AND FOR OTHER PURPOSES"
congress_website_abstract = "The provisions of existing laws to the contrary notwithstanding , all private employers shall establish and provide sleeping quarters and/or facilities for their female employees and permit them to use such quarters after their working hours. Provided, that their working hours ends between eight o'clock at night to six o'clock in the morning of the following day."
