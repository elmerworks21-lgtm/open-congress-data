congress_website_title = "AN ACT ALLOWING THE DIRECTORS OF LOCAL WATER DISTRICTS TO RECEIVE OTHER ALLOWANCES AND/OR BENEFITS AND PROVIDING SECURITY OF TENURE TO GENERAL MANAGERS OF LOCAL WATER DISTRICTS, AMENDING FOR THE PURPOSE SECTIONS 13 AND 23 OF THE \\\"PROVINCIAL WATER UTILITIES ACT OF 1973\\\", AS AMENDED"
congress_website_abstract = "P.D. 198 (Provincial Water utilities Act of 1973) expressly prohibits directors of local water districts (LWDs) from receiving other compensation for services rendered to the district. Directors of LWDs are granted a per diem of fifty pesos only for each board meeting actual attended but not more than four meetings for each month. P.D. 198 also provided that the LWD's general manager who is appointed by the Board of Directors, shall serve at the pleasure of the board. While the general manager has full supervision and control of the operation of local water facilities, with the power and authority to appoint the personnel of the district, he does not enjoy security of tenure. The bill seeks to provide security of tenure to general managers and allow directors to receive other allowances and/or benefits commensurate to their responsibilities and at par with the present cost of living."

