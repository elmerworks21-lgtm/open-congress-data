congress_website_title = "AN ACT MANDATING THE BUREAU OF INTERNAL REVENUE TO MAKE PUBLIC TAX PAYMENTS OF INDIVIDUALS AND CORPORATIONS, AMENDING FOR THE PURPOSE SECTION 20 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "THE COMMISSIONER SHALL, ON OR BEFORE MAY 31 FOLLOWING THE CLOSE OF EACH CALENDAR YEARM PREPARE AND ALLOW PUBLICATION IN BOOK FORM A REPORT OF ALL INDIVIDUAL TAXPAYERS AS WELL AS BUSINESS ENTERPRISES WHICH HAVE FILED THEIR TAX RETURNS WITH THE BUREAUDURING THE YEAR. THE REPORT SHALL CONTAIN, BUT SHALL NOT BE LIMITED TO THE FOLLOWING: (1) TAXABLE INCOME; (2) NAME OF BUSINESS ENTERPRISE; (3) TYPE OF BUSINESS, CORPORATION, PARTNERSHIP, SOLE PROPRIETORSHIP; (4) GROSS SALES/RECEIPTS DURING THE YEAR;(5) AMOUNT OF TAXES PAID BY TYPE OF TAX; AND (6) PRESUMPTIVE INPUT TAX."

