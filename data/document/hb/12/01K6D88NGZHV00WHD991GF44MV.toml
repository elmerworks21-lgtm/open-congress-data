congress_website_title = "AN ACT REQUIRING ALL APPOINTIVE OFFICIALS FROM BUREAU DIRECTOR UP TO DEPARTMENT SECRETARY AND THEIR EQUIVALENT IN THE GOVERNMENT SERVICE TO UNDERGO DRUG TESTS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "All appointive officials from Bureau Director up to Department Secretary and other appointive officials who are of equivalent rank to the foregoing officials are required, under the supervision of the Department of Health, to undergo drug tests before assumption of office. The foregoing officials who are already in the government service shall undergo the required tests within six (6) months from the date of effectivity of this Act and every year thereafter."
