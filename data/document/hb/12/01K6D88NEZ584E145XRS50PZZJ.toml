congress_website_title = "AN ACT PROMOTING BREASTFEEDING BY ESTABLISHING AND MAINTAINING LACTATION STATIONS IN WORKPLACES FOR WORKING MOTHERS, PROVIDING FOR ITS VIOLATION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Breastfeeding Promotion Act\". It is hereby mandated that lactations shall be established in workplaces for nursing female employees, which must have a lavatory for hand-washing, refrigeration for storing and comfortable seats. > Subject to such regulations as the Secretary of the Department of Labor and Employment (DOLE) may presribe, nursing female employees are given reasonable time during working hours to express their milk in the lactation station in their workplace, which time shall beconsidered as compensable hours worked."
