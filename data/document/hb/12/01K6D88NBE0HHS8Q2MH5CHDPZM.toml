congress_website_title = "AN ACT EMPOWERING LOCAL GOVERNMENT UNITS (LGUs) TO MONITOR THE ENFORCEMENT OF LAWS, RULES AND REGULATIONS ON ENVIRONMENTAL PROTECTION AND CONSERVATION OF NATURAL RESOURCES"
congress_website_abstract = "\"Local Initiative on Environmental Protection and Conservation of National Resources Act of 2001.\" Rationale: The objective of this bill is to establish coordination between the national and local governments in the implementation of national laws on environmental protection and conservation of natural resources.> This bill shall involve all local governments nationwide and shall cover the implementation of all national laws on environmental protection and conservation of natural resources."

