congress_website_title = "AN ACT PENALIZING THE OFFENSE OF PRESENTING TO THE PUBLIC SUSPECTS WHO ARE WRONGFULLY ACCUSED WITHOUT DUE PROCESS"
congress_website_abstract = "\"Anti-False Witness Act.\" This bill seeks to punish erring government officials who label persons as suspsects to an offense or crime, even if they have not yet been formally charged by the courts. It is high time that the perpetrators of such a system of \"swift justice\" should pay the price of putting innocent persons in the hot seat and permanently destorying their name and dignity."
