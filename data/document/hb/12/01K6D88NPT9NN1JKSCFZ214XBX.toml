congress_website_title = "AN ACT TO ESTABLISH THE LEGAL AND REGULATORY FRAMEWORK FOR SECURITIZATION AND THE DEVELOPMENT OF ASSET-BACKED SECURITIES MARKET IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"SECURITIZATION \" means the process by which assets are transferred from the holder thereof to a buyer and the issuance and offer of securities which depend, for their payment, on the flow of income from the assets so transferred.> The country needsa law on securitization. The proposed Securitization Act provided for the simplication of the multi-layered taxation system on asset-backed securities by removing taxes such as VAT on the transfer of the asset to Special Purpose Vehicles (SPV), Documentary Stamp Tax (DST) on initial and subsequent transfers of mortgages ot SPV and investors and the gross receipts tax."
