congress_website_title = "AN ACT INCREASING THE ALLOWABLE PERSONAL AND ADDITIONAL EXEMPTIONS OF INDIVIDUAL TAXPAYERS, AMENDING FOR THE PURPOSE SECTION 35 (A) AND 35 (B) OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE TAX REFORM ACT OF 1997"
congress_website_abstract = "Section 35(a) and 35(b) of Republic Act 8424 or the Tax Reform Act of 1997 is hereby amended to read as follows: \"Section 35. Allowance of Personal Exemption for Individual Taxpayers. (a) In general - For purposes of determining the tax provided inSection 24(a) of this Title, there shall be allowed a basic personal exemption as follows: 'for single individuals or married [P20,000.00] P48,000.00 individuals judicially decreed as legally separated with no dependents'; 'for head of family' [P25,000.00] P54,000.00; 'for each married individual' [P32,000.00] P64,000.00. In the case of married individuals where only one of the spouses is deriving gross income, only such spouse shall be allowed the personal exemption. (b) Additional Exemption ffor Dependents - There shall be allowed an additional exemption of [Eight Thousand Pesos (P8,000.00)] Sixteen Thousand Pesos (P16,000.00) for each dependent not exceeding four(4). The additional exemption for dependents shall be claimed by only one"

