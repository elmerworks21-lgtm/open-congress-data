congress_website_title = "AN ACT AUTHORIZING THE DEPARTMENT OF EDUCATION TO INCLUDE VEHICLE TRAFFIC EDUCATION AS PART OF THE EDUCATIONAL CURRICULUM IN THE ELEMENTARY AND SECONDARY LEVEL, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Traffic congestion is one of the major problems of the country. Very often the safety of the riding public, particularly students, are compromised. There is, therefore, a need to educate children on how to protect and safeguard themselves when on the road. The bill seeks to authorize the Department of Education to include vehicular traffic education as part of the educational curriculum in the elementary and secondary levels. The institutionalization of vehicular traffic education shall instill personal discipline and develop good values among the studentry."

