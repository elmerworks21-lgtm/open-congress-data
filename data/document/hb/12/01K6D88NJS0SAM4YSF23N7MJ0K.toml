congress_website_title = "AN ACT INCLUDING INSULAR WATERS AS CRITERION IN THE COMPUTATION OF INTERNAL REVENUE ALLOTMENT, AMENDING FOR THE PURPOSE THE `LOCAL GOVERNMENT CODE OF 1991', AS AMENDED"
congress_website_abstract = "This bill seeks to include insular waters surrounding coastal or island local government units (LGUs) in the computation of the Internal Revenue Allotment (IRA) of said LGUs. This portion of local territories form a vast area which may spell the difference of opportunities among LGUs. This territoral juridiction abounds with fishes, corral and other marine life or in some cases, with valuable oil deposits which are potential great sources of income for LGUs."

