congress_website_title = "AN ACT PRESCRIBING THE GEOGRAPHICAL REQUIREMENTS IN THE BIDDING AND AWARDING OF CONTRACTS FOR GOVERNMENT INFRASTRUCTURE PROJECTS, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 1594"
congress_website_abstract = "In addition to the legal, technical and financial requirements, the bill prescribes a geographical requirement to prospective contractors who may be prequalified to offer a bid or tender for government infrastructure projects. With this requirement, project contractors based in Luzon may be qualified to undertake government infrastructure projects within Luzon only. The same requirement shall hold true for contractors based in the Visayas and Mindanao. Certain projects may still be undertakenby contractors not based within a particular island group where the project is to be implemented provided certain conditions are met."

