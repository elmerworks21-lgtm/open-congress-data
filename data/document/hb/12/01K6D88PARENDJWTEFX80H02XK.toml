congress_website_title = "AN ACT TO EXTEND THE UTILIZATION PERIOD OF THE AGRICULTURAL COMPETITIVENESS ENHANCEMENT FUND, AMENDING SECTION 8 OF REPUBLIC ACT NO. 8178, ENTITLED \\\"AN ACT REPLACING QUANTITATIVE IMPORT RESTRICTION ON AGRICULTURAL PRODUCTS, EXCEPT RICE, WITH TARIFFS, CREATING THE AGRICULTURAL COMPETITIVENESS ENHANCEMENT FUND, AND FOR OTHER PURPOSES"
congress_website_abstract = "The Agricultural Competitiveness Enhancement Fund (ACEF) which was created under R.A. 8178, was granted a life span of nine years. However, the ACEF was not disbursed according to the intended purpose but instead the money collected for the ACEF from 1996 to 1998 was utilized for budgetary support. The measure urges the extension of the utilization period of the ACEF by ten years to enable the government to provide the agricultural and fishery sectors the opportunity to use the funds to strengthen their development activities. The availability of the ACEF will relieve farmers of the need to secure other funds for their competitive enhancement activities."

