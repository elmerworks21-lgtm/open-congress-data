congress_website_title = "AN ACT INSTITUTING THE DANGEROUS DRUGS ACT OF 2001 REPEALING REPUBLIC ACT NO. 6425, AS AMENDED"
congress_website_abstract = "This bill seeks to institute a new dangerous drugs law thereby repealing Republic Act 6425 otherwise known as the \"Dangerous Drugs Act of 1972\". As indicated in the reports of the Dangerous Drugs Board, over the past years, the existing law no longer effectively addresses the battle against drugs. What we need is a new dangerous drugs law that will provide a strong deterrence against the proliferation of dangerous drugs in our country."
