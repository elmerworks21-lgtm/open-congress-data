congress_website_title = "AN ACT TO PREVENT AND PENALIZE ACTS OF TERRORISM AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Terrorism Act of 2002\". This bill substantiates the policy of the State that acts of terrorism be considered as heinous crimes against humanity, and that conspiracy as well as proposal to commit the same and membership in a terrorist organization or association be regarded as criminal offenses.> The bill also provides for: (1) Creation of an ANTI-TERRORISM COMMISSION; (2) Acts which constitute terrorism; (3) Penalties; (4) Authority to conduct secret searches; to intercept and undertake surveillance, etc."
