congress_website_title = "AN ACT PROVIDING JUDGES OF LOWER COURTS THE SAME RETIREMENT PRIVILEGES GRANTED TO JUSTICES OF THE SUPREME COURT, COURT OF APPEALS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 910 AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to amend RA 910, otherwise known as the Judiciary Retirement Act, by including the JUDGES OF THE LOWER COURTS from the retirement benefits granted to the Justices of the Supreme Court and Court of Appeals. > Having spent the best years of their lives in the service of our country, it is just worthy to give them the same privileges granted to their fellow members of the Bench."
