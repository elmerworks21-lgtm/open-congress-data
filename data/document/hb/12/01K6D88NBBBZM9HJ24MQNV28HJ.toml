congress_website_title = "AN ACT REQUIRING EMPLOYERS TO INFORM THEIR EMPLOYEES OF THEIR RIGHTS TO SOCIAL WELFARE BENEFITS, COLLECTIVE BARGAINING AGREEMENTS OR COMPANY POLICIES UNDER EXISTING LAWS IN WRITING ON THE FIRST DAY OF THEIR EMPLOYMENT AND EVERY TIME A PARTICULAR CONTIGENCY OCCURS"
congress_website_abstract = "Notwithstanding any law to the contrary, every employer must inform his employee in writing, on the first day of his employment and every time a compensable contingency occurs, of the benefits available to the latter under existing laws, collectivebargaining agreements, company policies and practices and employment contracts, arising from employer-employ ee relationship. If the employer fails or refuses to so notify the affected employee as required herein, the employer shall be liable to payto such employee, by way of damages, the amount equivalent to the benefits which said employee would otherwise be entitled to, and without prejudice to the right of said employee from recovering the same benefits from the appropriate entity includingg his employer. For purposes of this Act, the employer, in coordination with the appropriate national agencies whenever applicable, shall conduct periodic orientation seminars."
