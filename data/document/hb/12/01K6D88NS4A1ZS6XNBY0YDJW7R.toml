congress_website_title = "AN ACT EXEMPTING FROM TAX OVERTIME PAY OF WORKERS"
congress_website_abstract = "\"Tax Exemption of Overtime Pay Act of 2001\". Overtime pay received by workers from their employers shall not be included in gross income and shall be exempt from all forms of tax. > Instead of taking away from every worker a portion of his overtimepay through taxation, it is better for him to take it home ans spend it for his family's basic needs. It is also a good form of incentive since during an overtime a worker us made to work longer than his usual hours."
