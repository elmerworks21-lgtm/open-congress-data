congress_website_title = "AN ACT REGULATING THE PRACTICE OF ENVIRONMENTAL PLANNING, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED ONE THOUSAND THREE HUNDRED AND EIGHT, ENTITLED `LAW REGULATING THE ENVIRONMENTAL PLANNING PROFESSION IN THE PHILIPPINES', AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Environmental Planning Practice Act\". The measure provides a more responsive and comprehensive regulation for the registration, licensing and practice of Environmental Planning in the light of local and international developments in the field. It provides for a more precise definition of the practice of Environmental Planning. It seeks to regulate the practice of foreign Environmental Planning, including the issuance of Special/Tempora ry Permits, when applicable. The measure also proposes aContinuing Professional Education (CPE) to make professional globally competitive."

