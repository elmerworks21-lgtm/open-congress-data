congress_website_title = "AN ACT TRANSFERRING THE POWERS OF THE PROVINCE TO ISSUE PERMITS AND IMPOSE TAXES ON SAND, GRAVEL AND OTHER QUARRY RESOURCES TO THE CITY OR MUNICIPALITY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF1991"
congress_website_abstract = "The permit to extract sand, gravel and other quarry resources, shall be issued exclusively by the city or municipal mayor pursuant to the ordinance of the Sangguniang Panlalawigan.> The proceeds of the tax on sand, gravel and other quarry resourcesshall be distributed as follows: (1) Province - Thirty percent (30%); (2) Component City or Municipality where the sand, gravel and other Resources are extracted - Thirty percent (30%); and (3) Barangay where the sand, gravel and other quarry resources are extracted Forty percent (40%)."
