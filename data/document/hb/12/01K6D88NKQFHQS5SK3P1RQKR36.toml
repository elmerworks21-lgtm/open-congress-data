congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF TECHNICAL WITH INFORMATION TECHNOLOGY SCHOOLS IN ALL THE REGIONS OF THE PHILIPPINES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "It is expedient, therefore, that government provide our high school graduates with a better and affordable option in the matter of technical education. With the establishment of technical and information technology schools in all regions in the country that will offer free and/or affordable technological education to high school graduates, we will be ensuring a continuous generation of highly-trained graduates at par with the best in the world."
