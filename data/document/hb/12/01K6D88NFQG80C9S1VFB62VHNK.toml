congress_website_title = "AN ACT INCREASING THE ALLOCATION FOR THE SPECIAL EDUCATION FUND, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Section 235, Chapter 5 of Republic Act Numbered SDeventy-one Hundred and Sixty, otherwise known as the \"Local Government Code of 1991\" is hereby amended to read as follows: \"Chapter 5. - Special Leaves on Real Property Sec. 235. Additional Levy on Real Property for the Special Education Fund (SEF).- A province or city or a municipality [within the Metropolitan Manila Area] may levy and collect an annual tax of [one] TWO percent [(1%)] (2%) on the assessed value of real property which shall be an addition to the basic real property tax. The proceeds thereof shall exclusively accrue to the Special Education Fund (SEF) IN ACCORDANCE WITH SECTION 7 OF REPUBLIC ACT NUMBERED FIFTY-FOUR FORTY-SEVEN."

