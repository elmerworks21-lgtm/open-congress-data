congress_website_title = "AN ACT STRENGTHENING THE FUNCTIONAL AND STRUCTURAL ORGANIZATION OF THE COMMISSION ON HUMAN RIGHTS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Commission on Human Rights Act of 2001\". This bill seeks to strengthen the Commission by providing an effective and expanded structural and functional organization to meet the demands of human right cases here and abroad. By providing the commission with prosecutorial powers over a delineated forms of human rights violations, it is hoped that the Commission will be able to meet the rising demands from victims human rights violations and the general public for an effective and speedy resolutionof all human rights cases filed with CHR."
