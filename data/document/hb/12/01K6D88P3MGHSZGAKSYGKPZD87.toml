congress_website_title = "AN ACT GOVERNING THE ESTABLISHMENT, OPERATION AND REGULATION OF LENDING COMPANIES"
congress_website_abstract = "\"LENDING COMPAY REGULATION ACT OF 2001.\" Rationale: The upsurge of Lending Company (LCs) is expected to continue unabated as evidence by the continuous registration of new LCs with Bangko Sentral ng Pilipinas (BSP) and some Non-Bank Financial Institutions (NBFI) is converting into LCs. this may be partly attributed to the relatively free and unregulated operational NBFIs. Common complaints on LCs cover high lending rates, non0disclosure of all charges on loans and non-issuance of official receipts. > In view of their growth in numbers and the significant LCs have in the economic activities of the general public, the enactment of a law that would regulate their establishment and operations appears imperative."
