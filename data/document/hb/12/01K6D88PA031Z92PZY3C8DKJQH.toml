congress_website_title = "AN ACT ESTABLISHING AND STRENGTHENING THE SHARI'A DISTRICT COURT SYSTEM IN THE AUTONOMOUS REGION IN MUSLIM MINDANAO AND IN THE AREAS OUTSIDE THE SAID AUTONOMOUS REGION, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 1083, OTHERWISE KNOWN AS THE MUSLIM CODE OF PERSONAL LAWS OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Presidential Decree 1083 or the Muslim Code of Personal Laws of the Philippines granted legal recognition to the validity of the personal laws of Filipino Muslims and established a Shairi'a Court District System where cases involving these laws may be ventilated and adjudicated upon. In view of the increase in Filipino Muslim population, this bill seeks to establish an expanded and separate Shari'a District Court System in the Autonomous Region in Muslim Mindanao (ARMM) and in the areas outside the ARMM."
