congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC SUCCESSION OF THE ASSOCIATE APPELLATE JUSTICE WHO IS FIRST IN PRECEDENCE TO POSITION OF PRESIDING APPELATE JUSTICE OF THE COURT OF APPEALS IN CASE OF VACANCY AND THE REMOVAL BY IMPEACHMENT OF THE MEMBERS THEREOF, AMENDING FOR THE PURPOSE THE JUDICIARY REORGANIZATION ACT"
congress_website_abstract = "In case of a vacancy in the Presiding Appellate Justice, THE ASSOCIATE APPELLATE JUSTICE WHO IS FIRST IN PRECEDENCE SHALL BE APPOINTED TO THE POSITION. [or in] In the event of [his] The absence or inability OF THE PRESIDING APPELLATE JUSTICE to perform the powers, fuctions, and duties of his office, the Associate Appellate Justice who is first in precedence shall perform his powers, functions ad duties until such disability is removed [,]. [or another Presiding Appellate justice is appointed and qualified.]"
