congress_website_abstract = "\"Selective Repudiation of Fraudulent Loans Act.\" Section 2 of this bill states that: SECTION 2. The following loans are hereby repudiated by the Republic of the Philippines on the ground of fraud in accordance with the Vienna Convention on the Law on treaties: (1) The Bataan Nuclear Power Plant loan; and (2) Other loans determined fraudulent by the Presidential Commission on Good Government"

