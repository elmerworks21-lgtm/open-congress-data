congress_website_title = "AN ACT TO REGULATE THE ESTABLISHMENT OF NONGOVERNMENTAL ORGANIZATIONS AND SIMILAR ORGANIZATIONS AND FOR OTHER OTHER PURPOSES"
congress_website_abstract = "\"Peoples' Organization Act of 2002.\" Many non-governmenta l, community based or sectoral organizations have been formed with different objectices and purposes. Since they are participating in state concerns, it is imperative that the Sate must knowthem. > this bill directs every Non-governmenta l Organization (NGO), Peoples' Organization (PO) or civil association to register the organization with the Securites and Exchange Commission, specifying the name or organization, its objective/purpo ses, the members at the time of registration, office and branches, financial supporters abd means of sustaining operations."
