congress_website_title = "AN ACT PROVIDING FOR THE INCLUSION OF INDUSTRIAL ESTATES IN THE DEFINITION OF CONDOMINIUM, AMENDING FOR THE PURPOSE THE CONDOMINIUM ACT AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The proposed amendment to INCLUDE the INDUSTRIAL ESTATE in the definition of a CONDOMINIUM will create a significant incentive to Filipino and foreign businessmen to invest more in industrial estates. It will provide more flexibility inplanning for the optional utilization of space consistent with the requirements of their operations. Buildings and other structures within the industrial estates can be used as collateral for loans and therefore, improve the cash-flow position of domestic firms. This will likewise eventually attract local and foreign investors."

