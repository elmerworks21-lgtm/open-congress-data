congress_website_title = "AN ACT PROVIDING FOR THE REGISTRATION OF VETERINARY DIAGNOSTIC LABORATORY WITH THE BUREAU OF ANIMAL INDUSTRY, PROVIDING FOR THE QUALIFICATIONS OF MANAGERS AND SUPERVISORS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The proprietors of existing livestock and poultry enterprises are now aware of the value and necessity of rapid and accurate diagnostic tests as tools in forestalling bigger losses during outbreaks of diseases in their farms. Accordingly,there is now a great need for veterinary diagnostic services. At present, government facilities and resources cannot cope up with the increasing demands. Hence, certain individuals have set up diagnostic purposes. Even individuals, knowledgeable about laboratory diagnosis but not own any livestock farm, have put up such diagnostic laboratories to meet the needs of the industry."
