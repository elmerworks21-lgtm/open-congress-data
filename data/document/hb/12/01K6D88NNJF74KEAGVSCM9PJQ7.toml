congress_website_title = "AN ACT INCREASING THE OLD-AGE PENSION OF WORLD WAR II VETERANS, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 6948 AS AMENDED"
congress_website_abstract = "A World War II veteran shall be paid an old-age pension monthly for life, unless he is actually receiving a similar pension for the same considertion from other government funds or from the United States government. The amount of the monthly old-agepension shall be according to the veteran's age as shown below: AGE; Monthly Old-Age Pension 65-69 years -- Five Thousand Pesos (P5,000.00); 70-74 years -- Ten Thousand Pesos (P10,000.00); 75-79 years -- Fifteen Thousand Pesos (P15,000.00); 80-89years -- Twenty Thousand Pesos (20,000.00); 90 above -- Thirty Thousand Pesos (P30,000.00."
