congress_website_title = "AN ACT REDEFINING THE TERM `VETERAN' THEREBY AMENDING FURTHER REPUBLIC ACT NO. 6948, AS AMENDED"
congress_website_abstract = "The term \"VETERAN\" is REDEFINED as follows: \"(a) Veteran - any person who IS A WAR VETERAN OR A VETERAN OF MILITARY CAMPAIGN. A WAR VETERAN IS any person who rendered military service in the land, sea or air forces of the Philippines during the Revolution against Spain, the Philippine-Amer ican War and the World War II, including Filipino citizens who served in Allied Forces in the Philippine territory and foreign nationals who served in the Philippine forces. A VETERAN OF MILITARY CAMPAIGN IS ANY PERSON WHO BECAME PART OF THE PHILIPPINE EXPEDITIONARY FORCES SENT TO THE KOREAN WAR; or who rendered military service in the Armed Forces of the Philippines and has been honorably discharged or separated AFTER HAVING AVAILED OF ITS MANDATORY AAND/OR OPTIONAL RETIREMENT PROGRAM, or sooner separated due to death or disability arising from a wound or injury received or sickness or disease incurred in line of duty while in the active service for at least fifteen (15) years;\""
