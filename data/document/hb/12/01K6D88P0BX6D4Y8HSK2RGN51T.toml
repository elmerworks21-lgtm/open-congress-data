congress_website_title = "AN ACT TO AMEND CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED SEVENTY-FOUR HUNDRED AND THIRTY-ONE, OTHERWISE KNOWN AS THE `RADIOLOGIC TECHNOLOGY ACT OF 1992'"
congress_website_abstract = "Rationale: In the interest of regulating the practice of Radiologic Technology in the Philippines, Republic Act Numbered 7431 was approved into law in 1992. Nearly a decade has passed since and although the spirit and basic framework of the law remains essential, certain provisions therein have proven to be rather unnecessary and even conflicting with the very intent and meaning to upgrade the practice of radiologic technology in the country.> In addition, certain amendments to the scope of examinations in radiologic and x-ray technologists is proposed to promote more practical subjects with corresponding modified weights which, in turn, shall hope to assure much advancement and elevation of the academic standards of the radiologic technollogy profession."
