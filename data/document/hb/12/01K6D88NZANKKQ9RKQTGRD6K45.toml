congress_website_title = "AN ACT CREATING THE PHILIPPINE INTERNATIONAL AIRPORT AUTHORITY, DEFINING ITS POWERS, FUNCTIONS AND RESPONSIBILITIE S AND ABOLISHING THE MANILA INTERNATIONAL AIRPORT AUTHORITY"
congress_website_abstract = "\"Charter of the Philippine International Airport Authority\". Rationale: To ensure an integrated manner of operating international airport terminals, and to avoid conflicting polices and programs on international flight operations, it is necessary tocreate a single authority to handle the operations of all international airport all over the country which shall cover all other international airport terminals in the country with the exception of the Mactan-Cebu International Airport."

