congress_website_title = "AN ACT PROVIDING FOR THE RETIREMENT BENEFITS OF JUSTICES AND ALL JUDGES IN THE JUDICIARY, FURTHER AMENDING FOR THE PURPOSE SECTION ONE OF REPUBLIC ACT NUMBERED NINE HUNDRED AND TEN, AS AMENDED"
congress_website_abstract = "Under the GSIS Act of 1997, a member of the Government Service Insurance System (GSIS) is eligible for retirement benefits when he/she has rendered at least fifteen (15) years of service and is at least sixty (60) years of age at the time of retirement. To align the retirement benefits for justices and judges with that being offered under the GSIS Act of 1997, this bill seeks to reduce to fifteen (15) years of service the eligibility of a justice or judge who retires at the compulsory age of seventy (70) years to entitle him to receive the basic monthly pension for life starting at the end of the five-year guarantee period."
