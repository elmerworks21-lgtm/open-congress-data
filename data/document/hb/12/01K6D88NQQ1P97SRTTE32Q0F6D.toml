congress_website_title = "AN ACT MANDATING THE ESTABLISHMENT OF AN ORGANIC FARMING TRAINING AND PRODUCTION FACILITY IN EVERY AGRICULTURAL BARANGAY IN THE COUNTRY AND ESTABLISHING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Organic farming is a traditional practice that our forefathers had known since precolonial era. It is a farming system that is cost-free and environment-fri endly, a system we so badly need if we want to revitalize the sagging agricultural economy of the country. >This bill seeks to encourage our farmers to revert to that system in order to significantly cut on agricultural cost as well as to save the degenerating natural environment in the countryside."
