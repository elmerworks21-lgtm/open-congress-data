congress_website_title = "AN ACT REQUIRING ALL GOVERNMENT ISSUED IDENTIFICATION CARDS, CERTIFICATES AND LICENSES TO INCLUDE A PORTION INDICATING THE BLOOD TYPE OF THE HOLDER THEREOF AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "\\\"Blood Type Identification Act of 2003\\\". Statistics show that many accident victims die or suffer physical disabilities or complications because much-needed blood can not be transferred to them at once. This bill aims to require all government issued identification cards, certificates and licenses (e.g. SSS card, GSIS card, birth certificate, driver's license, firearms license, professional license, etc.) to indicate the blood type of the owner-holder thereof. With the information, blood transfusion delays caused by blood type ignorance can be prevented."

