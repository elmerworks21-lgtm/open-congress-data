congress_website_title = "AN ACT ESTABLISHING AGRICULTURAL EXPERIMENTAL STATIONS IN EVERY PROVINCE AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The proposed AGRICULTURAL EXPERIMENTAL STATIONS is tasked --- (1) To conduct original researches or variety experiments on the physiology of plants and animals; (2) To study the diseases to which these plants and animals are commonly exposed and toprovide remedies therefor; (3) To study the capacities of different trees and plants for the in acclimation; and To study soild in relation to agricultural productivity."

