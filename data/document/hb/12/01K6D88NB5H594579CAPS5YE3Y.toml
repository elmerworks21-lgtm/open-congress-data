congress_website_title = "AN ACT TO REENGINEER THE GOVERNMENT BUREAUCRACY BY CREATING THE JOINT LEGISLATIVE-EXE CUTIVE COMMISSION ON GOVERNMENT REENGINEERING, PROTECTING THE AFFECTED CIVIL SERVANTS WITH ATTRACTIVE SAFETY NETS UNDER A VOLUNTARY DIS-ENGAGEMENT PROGRAM, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Because of the ralatively large amount of details and particulars of any proposed government regoranization, there is a strong clamor for a transparent, well-studied and comprehensive plan. The proposed bill provides for a multi-year program of bureaucratic re-engineering to allow for thorough study and public consultations (which agencies and government functions are vital and necessary and which ones are not). Result of the study shall be announced well in advance to prevent surprise. Define dis-engage?"

