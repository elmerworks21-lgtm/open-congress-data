congress_website_title = "AN ACT CONVERTING THE DEPARTMENT OF AGRICULTURE INTO THE DEPARTMENT OF AGRICULTURE AND FISHERIES"
congress_website_abstract = "The conversion of the Department of Agriculture into the DEPARTMENT OF AAGRICULTURE AND FISHERIES would ensure the implementation of the government's policies and programs toward self-sufficienc y in fish and aquatic products. It will not only address the problem of the increasing domestic demand for fish and aquatic products but also our export on these products, thus boosting the country's dollar revenues."
