congress_website_title = "AN ACT FURTHER STRENGTHENING THE HOME DEVELOPMENT MUTUAL FUND AND FOR OTHER PURPOSES"
congress_website_abstract = "The Home Development Mutual Fund of Pag-Ibig Fund is the country's premier housing funcing agency today. Yet despite its strong financial situation it still cannot adequately cope with the staggering housing backlog in the country, estimated at 3.8million housing units and increasing by a quarter of a million housing units every year. There is an imperative need to strengthen its powers under its charter so that the Fund can meet the challenge of providing financing for the government's national shelter program."

