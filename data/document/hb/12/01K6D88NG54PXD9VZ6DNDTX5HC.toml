congress_website_title = "AN ACT CREATING THE DEPARTMENT OF CULTURE, ARTS AND NATIONAL HERITAGE DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to create the Department of Culture and National Heritage separate from the Department of Education, Culture and Sports (DECS). Under this Act, the bll provides police powers in the new Office which shall function and exercise extra-legal and quasi-judicial powers to prosecute criminal cases relative to violations of laws pertaining to the promotion, protection and preservation of culture and national heritage."
