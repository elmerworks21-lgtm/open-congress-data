congress_website_title = "AN ACT REGULATING HARBOR PILOTAGE SERVICES AND THE CONDUCT OF HARBOR PILOTS IN ALL PORTS IN THE PHILIPPINES AND FOR RELATED PURPOSES"
congress_website_abstract = "Inspite of the general mandate of the Philippine Ports Authority (PPA), there is a need to provide and clearly define pilotage services. Thus, this bill which seeks to provide a mechanism for determining: a) pilotage rates and b) extent of maritimeliability of harbor pilots. There is likewise a need to establish in clear and unequivocal manner the basis for the imposition of not less than 10% government share from gross receipts from harbor pilotage operations or services."
