congress_website_title = "AN ACT PROVIDING FOR A THREE (3)-YEAR DEBT MORATORIUM FOR ALL COMMERCIAL LOANS OF SMALL AND MEDIUM ENTERPRISES THAT ARE NEARING FORECLOSURE AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: This measure would allow small and medium-scale enterprises some breathing space for them to survive the crisis our country is facing. The three-year debt moratorium is expected to abate the burden of these enterprises in order not to close shop and further aggravate the already alarming rate of unemployment. They will not be forced to pay their monthly amortization for a period of three years from the effectivity of this Act."

