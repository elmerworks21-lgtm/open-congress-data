congress_website_title = "AN ACT TO AMEND REPUBLIC ACT NO. 8436, ENTITLED \\\"AN ACT AUTHORIZING THE COMMISSION ON ELECTIONS TO USE AN AUTOMATED ELECTION SYSTEM IN THE MAY 11, 1998 NATIONAL OR LOCAL ELECTIONS AND IN SUBSEQUENT NATIONAL AND LOCAL ELECTORAL EXERCISES, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES\\\""
congress_website_abstract = "Considering that there are only 1,991 automated counting machine (ACM) units available for use in the May 2004 national and local elections and considering that there are 192,109 clustered precincts nationwide, prudence dictates that automated counting and canvassing of votes be concentrated in selected and priority areas only. This bill proposes to implement the automated election system in selected and priority areas where there is a heavy concentration of voters taking into consideration the adequacy and security of the ACMs. It further proposes that in areas not covered by the system, the elections for both national and local positions be done manually."
