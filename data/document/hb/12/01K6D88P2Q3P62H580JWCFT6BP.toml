congress_website_title = "AN ACT PROVIDING APPROPRIATE EDUCATION TO SPECIAL CHILDREN OF INDIGENT TO LOW INCOME BRACKET FAMILIES"
congress_website_abstract = "\"Special Children's Education Act of 2002.\" This bill seeks to provide to the special children belonging to indigent to low income bracket families, education that is appropriate to their capabilities. The school shall provide the necessary training, skill development and basic education commensurate to the mental capabilities of the physically and mentally retarded childre in order to help them cope with the experiences of everyday life and allow them to join the mainstream of society."

