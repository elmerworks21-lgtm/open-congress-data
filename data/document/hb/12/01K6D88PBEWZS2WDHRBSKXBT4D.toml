congress_website_title = "AN ACT TO FURTHER PROMOTE ENTREPRENEURSHIP AND SUPPORT THE DEVELOPMENT OF MICRO, SMALL AND MEDIUM ENTERPRISES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6977, AS AMENDED, OTHERWISE KNOWN AS THE MAGNA CARTA FOR SMALL ENTERPRISES"
congress_website_abstract = "The bill seeks to amend the Magna Carta for Small Enterprises to promote entrepreneurship and strengthen assistance programs for small and medium enterprises. It accords explicit recognition to micro enterprises thereby providing them greater access to financing and credit resources. It redefines micro, small and medium enterprises (MSMEs) based on asset size: for micro - less than PhP 3.0 million, for small - PhP 3.0 - 15.0 million, and for medium -PhP 15.0 million."
