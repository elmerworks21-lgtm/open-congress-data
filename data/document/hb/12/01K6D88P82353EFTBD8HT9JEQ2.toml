congress_website_title = "AN ACT TO PROMOTE AND ENHANCE PUBLIC SAFETY BY PROHIBITING CRANK CALLS TO ALL EMERGENCY HOTLINES AND PROVIDING PENALTY THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Crank Calls Act\" The government and other organizations have initiated various hotline programs to make the delivery of basic services accessible at all times. However, research has shown that instead of meeting the purpose of these programs,their use and primary function are hindered by crank call made by irresponsible callers. This bill shall prohibit crank calls made to all emergency hotlines. Persons caught making crank calls, and other forms of illegitimate calls shall be punishedwith an imprisonment of six months, a fine of PhP5,000 and the severance of the caller's telephone line and/or blockage of his mobile line."

