congress_website_title = "AN ACT INCREASING THE RATE OF BASE PAY OF OFFICERS AND ENLISTED PERSONNEL OF THE ARMED FORCES OF THE PHILIPPINES"
congress_website_abstract = "This bill seeks to increase the base pay of officers and enlisted personnel of the Armed Forces of the Philippines to be at par with the rate of pay of members of the PNP of equivalent rank. This proposed increase in pay will definitely go a long way in improving the living condition of military personnel and thus enhance professionalism in the AFP."
