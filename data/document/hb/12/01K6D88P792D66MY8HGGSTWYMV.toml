congress_website_title = "AN ACT PROVIDING FOR THE RETENTION OF PHILIPPINE CITIZENSHIP BY NATURAL-BORN FILIPINO CITIZENS WHO ACQUIRE FOREIGN CITIZENSHIP, AMENDING FOR THE PURPOSE COMMONWEALTH ACT NO. 63, AS AMENDED, AND FOR OTHER PURPOSE"
congress_website_abstract = "This bill seeks to allow natural-born citizens of the Philippines, who have lost their citizenship by naturalization in foreign country, to retain their Filipino citizenship with a condition that they register their intent to retain their Filipino citizenship and to manifest their loyalty and allegiance to the Republic of the Philippines, without renouncing their foreign citizenship, with the Bureau of Immigration. Likewise, the bill provides that these Filipino expatriates who qualify for dualcitizenship, shall be granted the same status, right, privileges and responsibilitie s as Filipino citizens and with full civil and political rights."

