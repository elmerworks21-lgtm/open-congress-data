congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, BY ADDING ARTICLE XXI AND INSERTING SECTION 490-A, PROVIDING FOR THE POSITION OF A TOURISM OFFICER IN EVERY PROVINCE, CITY AND MUNICIPALITY"
congress_website_abstract = "Republic Act 7160, otherwise known as the Local Government Code of 1991, is hereby amended by adding Article XXI which provides for the position of a TOURISM OFFICER in every province, city and municipality. The Tourism Officer shall: (1) formulatemesures to ensure the delivery of services and the provision of adequate facilities for tourism development and promotion; (2) conduct studies, researchers, and training programs necessary to evolve plans and programs for implementation; (3) integrate and coordinate all tourism development plans and studies; and (4) develop tourism plans and strategies and implement the same."

