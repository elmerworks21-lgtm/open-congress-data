congress_website_title = "AN ACT PROVIDING A SYSTEM FOR INSURING THE FUNDING OF FINANCIAL BENEFITS AND PRIVILEGES EXTENDED TO PUBLIC SERVICE WORKERS BY LAWS, EXECUTIVE ORDERS, ADMINISTRATIVE ORDERS, MEMORANDUM CIRCULARS AND OTHER ADMINISTRATIVE ISSUANCES"
congress_website_abstract = "This bill substantiates the policy of the State that all laws and administrative issuances providing financial benefits and privileges to public service workers shall indicate the specific sources of fundings therefore and specific dates of effectivity thereof. Where no sources of fundings are indicated in a proposed bill seeking to provide financial benefits and privileges to public service workers, the said bill shall not be calendared for deliberations by either House of Congress until suchsources are specified."
