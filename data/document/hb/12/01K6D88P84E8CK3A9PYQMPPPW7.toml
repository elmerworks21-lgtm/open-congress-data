congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED SEVENTY-EIGHT THIRTY TWO, AS AMENDED, OTHERWISE KNOWN AS THE 'ANTI-ELECTRICI TY AND ELECTRIC TRANSMISSION LINES/MATERIALS PILFERAGE ACT OF 1994'"
congress_website_abstract = "The measure proposes certain amendments to RA 7832, 12 amended, to wit:>>a. the expansion of the coverage of illegal use of electricity to include tilting of electrical meters which is a common method of stealing electricity;>>b . the expansion of the scope of theft of electric power lines and materials to include distribution lines, materials and equipment;>>c. an increase in the monetary reward given to any person who reports to the proper authorities any act that would constitute electric power lines/materials theft; and>>d. an increase in the penalty for electric power lines/materials theft."
