congress_website_title = "AN ACT AMENDING SECTION TWO HUNDRED NINETY-NINE OF PRESIDENTIAL DECREE NUMBERED SIX HUNDRED TWELVE, AS AMENDED, OTHERWISE KNOWN AS THE INSURANCE CODE"
congress_website_abstract = "This bill seeks to amend Section 299 of the Insurance Code by lifting the one-year term limit of the agent's license and giving it a lifetime validity until otherwise shortened for cause. This amendment is aimed at unburdening the administrative laod both of the Insurance Commission and the insurers by extending the term of license so that agents can concentrate more on the business of selling insurance products and, consequently, further spur the growth of the insurance industry."

