congress_website_title = "AN ACT TO STRENGTHEN THE REGULATORY FUNCTIONS OF THE PHILIPPINE OVERSEAS EMPLOYMENT AGENCY (POEA) IN REGARD TO FILIPINO OVERSEAS EMPLOYMENT, REPEALING FOR THE PURPOSE THE DEREGULATION AND PHASE-OUT PROVISIONS OF SECTIONS 29 AND 30 OF REPUBLIC ACT NO. 8042, OTHERWISE KNOWN AS THE MIGRANT WORKERS AND FILIPINO OVERSEAS ACT OF 1995, AND FOR OTHER PUR POSES"
congress_website_abstract = "The entire deregulation and phase-out provisions of Sections 29 and 30 of Republic Act No. 8042 is hereby repealed.> Deregulation will reduce government's responsibility to that of a provider of information regarding the situation of the receiving country where an OFW intends to work, and in case the OFW still decides to work overseas, the responsibility to protect his or her rights is left in the hands of the OFW himself or herself."
