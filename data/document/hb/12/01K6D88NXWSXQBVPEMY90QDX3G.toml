congress_website_title = "AN ACT INCREASING THE PENALTIES FOR ELECTION OFFENSES, AMENDING FOR THE PURPOSE ARTICLE XXII, SECTIONS 264 AND 265 OF BATAS PAMBANSA BILANG 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: Since the objective of election is to choose who are truly the representatives of the pople, various measures have been taken to safeguard the conduct of election. One such measure is provided in Section 27 (b) of the \"Electoral Reform Law of 1987\" which makes it an election offense for any member of the board of inspectors or board of canvassers to tamper with, increase or decrease the vote received by a candidate or to refuse, after proper verification and hearing, to credit votesor deduct such tampered votes. The penalties provided for the offense, as provided Section 264 of the Omnibus Election Code is one to sux years of imprisonment, without probation. However, the measure has not deterred the commission of this offense.It even appears that there is an increasing use of this fraudulent method to win election.\"Opera tion dagdag-bawas\", which figuratively describes the method, was perceived to have been used during the 1992, 1995, 1998, and 2001 elections. > This bill"
