congress_website_title = "AN ACT AMENDING ACT NO. 4103, AS AMENDED, OTHERWISE KNOWN AS THE INDETERMINATE SENTENCE LAW"
congress_website_abstract = "Penal laws are viewed as reformatory, retributory and a deterrent. However, these objectives becomes irrelevant in the case of septuagenarians since their reformation and rehabilitation would be of no value to themselves, their family and even to society unless they are given a chance to live with their families. This measure aims to make prisoners who are seventy five (75) years of age or above eligible to parole provided that there is a reasonable probability that such prisoner will remain at liberty without violating the law and that such release will not be incompatible with the welfare of the society."

