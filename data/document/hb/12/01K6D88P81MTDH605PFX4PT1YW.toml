congress_website_title = "AN ACT APPROPRIATING THE SUM OF FOUR HUNDRED MILLION PESOS (P400,000,000.0 0) AS ADDITIONAL FUNDING FOR THE HOLDING OF ABSENTEE VOTING FOR OVERSEAS FILIPINOS IN 2004 PURSUANT TO REPUBLIC ACT NO. 9189, AND FOR OTHER PURPOSES"
congress_website_abstract = "The Overseas Absentee Voting Act of 2003 was given a measly allocation of PhP400 million for its operations involving more than 10 million qualified overseas voters. This bill seeks to remedy such deficiency by providing a supplementary budget of another PhP400 million. Such amount will avoid the disenfranchisem ent of our voters abroad and will ensure that the law is implemented according to its spirit and letter."
