congress_website_title = "AN ACT IMPOSING STIFFER PENALTIES ON PHARMACIES AND DRUG STORES WHICH REFUSE TO HONOR SENIOR CITIZENS CARD ISSUED BY THE GOVERNMENT"
congress_website_abstract = "In addition to the appropriate penalties provided under Republic Act No. 7432, the owner, manager and/or employee of any pharmacy and drug store who refuses to honor the senior citizen card issued by the government shall, if found guilty, be punished with a fine of not less than One Thousand Pesos (P1,000) nor more than Five Thousand Pesos or imprisonment of not less than one (1) month nor more than six (6) months or both such fine and imprisonment at the discretion of the court."
