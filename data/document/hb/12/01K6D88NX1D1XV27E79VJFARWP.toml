congress_website_title = "AN ACT PROVIDING FOR THE MANNER AND DATE OF ELECTION OF SECTORAL REPRESENTATIVES TO THE LOCAL SANGGUNIANS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Local Sectoral Representation Act of 2001\". Rationale: For the past ten years since the enactment of the Local Government Code there has been a marked increase by civil society in local governance. This augurs well in instilling greater accountability in governance, but also in promoting innovative governance in partnership with an empowered civil society. The implementation of local sectoral representation is an important institutional mechanism for attaining this objective."
