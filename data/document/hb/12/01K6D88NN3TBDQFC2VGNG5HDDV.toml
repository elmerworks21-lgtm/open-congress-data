congress_website_title = "AN ACT PROHIBITING THE USE OF GOVERNMENT AMBULANCES IN NON-EMERGENCY CASES OR ITS NON-USE BY REASON OF MATERIAL CONSIDERATION OR POLITICAL DISCRIMINATION AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "This bill states what are considered PROHIBITED ACTS with regard to the use of government ambulances. Any violation of the prohibited acts enumerated under Section 2 hereof shall be penalized by suspension without pay for fifteen (15) days for the first offense and termination from the service for the second offense with forfeiture of retirement benefits. If the infraction was made with the knowledge and or participation of the Local Chief Executive in the case of local government units or withthe Directors of government hospitals, they shall also be penalized with a suspension for thirty days (30) without pay for the first offense and removal from office with forfeiture of retirement benefits for the second offense."
