congress_website_title = "AN ACT INTENSIFYING THE PRODUCTION, PROCESSING, MARKETING AND DISTRIBUTION OF RICE AND CORN, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Rice and Corn Industry Development Act of 2002.\" This bill provides for a systematic and phased building and rehabilitation of our rice and corn industry by providing mechanisms to attract private investments in modern farming technology and facilities; increase credit access and subsidy to farmers; additional irrigation systems; and provisions that would arm our farmers with other competitive enhancement measures."
