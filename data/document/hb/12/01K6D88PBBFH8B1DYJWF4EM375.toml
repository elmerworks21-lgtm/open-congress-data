congress_website_title = "AN ACT POSTPONING THE MAY 10, 2004 NATIONAL AND LOCAL ELECTIONS TO MAY 20, 2004"
congress_website_abstract = "The bill seeks to postpone and reset the national elections for president, vice president and senators; and the local elections for members of the House of Representatives and all local government officials scheduled on May 10, 2004 to May 20, 2004. The postponement is being sought in the light of the Supreme Court decision to void the public bidding undertaken by the Commission on Elections (COMELEC) for the acquisition and purchase of automated counting machines for the automation of the national and local elections. Election experts say that the COMELEC needs at least 120 days to prepare for manual elections."

