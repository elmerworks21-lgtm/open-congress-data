congress_website_title = "AN ACT PROHIBITING CERTAIN LOCAL OFFICIALS TO FILL THE VACANCY IN THE OFFICES OF THE GOVERNOR OR MAYOR AND VICE-GOVERNOR OR VICE-MAYOR AMENDING FOR THE PURPOSE SECTION 44 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: Section 44 of the Local Government Code delineates the line succession in case of vacancy in the offices of the governor or mayor, the vice-governor or vice-mayor and the sanggunian member. It is however, silent as to whether the official, who is next in the line of succession, can fill the very same vacant position he is prohibited by law to serve beyond three (3) consecutive term limits. This situation may sow confusion if not chaos in some areas where intense political rivalry isprevailing among opposing camps. This bill seeks to amend the aforementioned provision in the Local Government Code to provide a crystal clear mandate on succession."
