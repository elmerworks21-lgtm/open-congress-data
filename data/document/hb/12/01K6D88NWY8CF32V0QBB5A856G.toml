congress_website_title = "AN ACT RENATIONALIZING HEALTH SERVICES DEVOLVED TO LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF THE LOCAL GOVERNMENT CODE OF 1991, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Re-Nationaliza tion of Health Services and Facilities Act of 2001;\" This bill seeks to: (1) To prevent the further deterioration of the delivery of health services by government hospitals and primary health care services; (2) To alleviate the marginalized sector of society from their sad situation who depend to a large extent, on health services provided by government hospital and health centers; and (3) To improve the social and economic well-being of devolved health workers who comprise ourhealth manpower responsible in attending to the pople's health needs."

