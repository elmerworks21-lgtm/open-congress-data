congress_website_title = "AN ACT ESTABLISHING THE PRE-NEED PLAN CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: It is the policy of the State to regulate the establishment of pre-need companies and to place their operation on a sound, efficient and stable basis to derive the optimum advantages from them in the mobilization of savings and to preventand mitigate, as far as practicable, practices prejudicial to public interest and the protection of planholders."
