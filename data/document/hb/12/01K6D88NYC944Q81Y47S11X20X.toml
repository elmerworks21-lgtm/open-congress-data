congress_website_title = "AN ACT CREATING THE CHARTER OF THE LOCAL GOVERNMENT ACADEMY (LGA), AMENDING FOR THE PURPOSE EXECUTIVE ORDER NO. 262, OTHERWISE KNOWN AS `THE REORGANIZATION ACT OF THE DEPARTMENT OF LOCAL GOVERNMENT AND FOR OTHER PURPOSES' AND REPUBLIC ACT NO. 6975,OTHERWISE KNOWN AS `THE DEPARTMENT OF INTERIOR AND LOCAL GOVERNMENT ACT OF 1990', PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Among the functions of the proposed LOCAL GOVERNMENT ACADEMY are: (1) Design and implement training and human resource development programs for local government units, executives and functionaries and the DILG personnel that will ultimately effect institutional development and organizational effectiveness; (2) Assist the DILG in promulgating policies, rules and regulations and other issues relative to human resource development and training for LGUs; (3) Establish and maintain a mechanism to enable LGUs to access technical as well as financial assistance in building institutional capabilities to respond to the needs of local governance within the framework of local autonomy; and (4) Develop a corps of efficient, effective and competent LGAA staff provided with all the remuneration and benefits needed for their enhancement and satisfaction."
