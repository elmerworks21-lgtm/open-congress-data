congress_website_title = "AN ACT REORGANIZING THE COAST AND GEODETIC SURVEY DEPARTMENT OF THE NATIONAL MAPPING AND RESOURCE INFORMATION AUTHORITY, AN ATTACHED AGENCY OF THE DEPARTMENT OF ENVIRONMENT AND NATURAL RESOURCES, AND TRANSFERRING IT TO THE DEPARTMENT OF TRANSPORTATION AND COMMUNICATIONS TO BE KNOWN AS THE BUREAU OF COAST AND GEODETIC SURVEY, DEFINING ITS ORGANIZATIONAL STRUCTURE, POWERS AND FUNCTIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"Bureau of Coast and Geodetic Survey Reorganization Law of 2003\\\". Under the present set-up, the Coast and Geodetic Survey Department (CGSD) is under the National Mapping and Resource Information authority (NAMRIA) which is attched to the Department of Environment and Natural Resources. The CGSD is mandated to conduct geodetic,geophysical, topographic, hydrographic and oceanographic surveys of all Philippine water and the enture archipelago. However, growth and development of the CGSD is hampered because it has to compete for scarce resources with the other divisions under the NAMRIA. This bill proposes to reorganize the CGSD to be known as the Bureau of Coast and Geodetic Survey and to transfer the same to the Department of Transportation and Communications."

