congress_website_title = "AN ACT INCREASING THE MONTHLY INCOME BENEFITS FOR WORK-RELATED PERMANENT DISABILITY AND DEATH OF WORKERS AND EMPLOYEES"
congress_website_abstract = "To protect the spendable income of workers and pensioners from the ill-effects of world-wide inflation, actuarial studies must be undertaken with a view to upgrading the income benefits for work-related permanent disability and death of workers andemployees. This measure proposes an additional 25% across-the-boar d increase in the monthly income benefits for work-related permanent disabilities and death of employees, without requiring additional premium contributions from the employers and employees."
