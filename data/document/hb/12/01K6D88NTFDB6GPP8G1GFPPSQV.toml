congress_website_title = "AN ACT PROVIDING DUE COMPENSATION TO ELEMENTARY SCHOOL TEACHERS HANDLING `MULTI-GRADE CLASSES'"
congress_website_abstract = "Rationale: Comparatively, a school teacher who handles a multi-grade class encounters greater difficulty and responsibilitie s than a school teacher who handles a single-grade class, in terms of consolidating and integrating multi-level instructions/ma terials in the different learning areas, lesson plans/exercises and examinations within one class session. Despite the differences in the scope of and degree of responsibilitie s, however, at present, a school teacher handling a multi-grade classreceives the standard monthly remuneration given to all teachers who do not engage in multi-grade instructions. This bill thereby endeavors to resolve such disparity."
