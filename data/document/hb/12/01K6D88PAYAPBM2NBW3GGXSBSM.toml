congress_website_title = "AN ACT STRENGTHENING VOLUNTEERISM AND ITS INSTITUTIONALIZATION AS A STRATEGY FOR NATIONAL DEVELOPMENT AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Volunteer Act of 2003\\\". Over the years, the government has recognized the merging role of the voluntary sector as an effective partner in national and international development undertakings. This bill seeks to strengthen volunteerism in the country by establishing a conducive policy environment that will provide the venue for its promotion, advocacy and institutionalization in the various sectors in order to harmonize the diverse volunteer efforts into an effective partner for national and international development."

