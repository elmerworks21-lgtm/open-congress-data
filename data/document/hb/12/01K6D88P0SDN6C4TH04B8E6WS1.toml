congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NUMBERED FOUR HUNDRED FORTY-TWO (PRESIDENTIAL DECREE NO. 442), AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, BY DELETING ARTICLE 130 AND 131 THEREOF"
congress_website_abstract = "Rationale: Articles 130 and 131 of the Labor Code of the Philippines refer to NIGHTWORK PROHIBITIONS AND EXCEPTIONS regarding women workers. > Mor eeffective utilization of potential woman force in the developing countries like the Philippines necessitates increasing women's work-participat ion rates and channeling female labor into genuinely productive tasks. Hence, if the nightwork prohibition provisions still in effect, untowards result would prejudice women workers. Therefore, Article 130 and 131 of the Labor Code of the Philippines should be deleted."

