congress_website_title = "AN ACT PROVIDING FOR REASONABLE COMPENSATION AND BENEFITS FOR THE LOSS OF LIVES, INJURIES AND DAMAGES TO PROPERTY SUFFERED BY NON-COMBATANT INDIVIDUALS IN THE COURSE OF OPERATIONS BY THE MILITARY, POLICE AND/OR OTHER LAW ENFORCEMENT AGENCIES AND FOROTHER PURPOSES"
congress_website_abstract = "Rationale: A military, police and/or other law enforcement agencies' opertion to suppress rebellion or to pursue and/or apprehend criminal elements, no matter how cautiously conducted, invariably causes damages upon innocent civilians and non-combatants. Unfortunately, there is no existing government mechanism that compensate for these damages that come in the form of physical and/or psychological injuries, death and/or destruction of properties. Hence, the proposed bill seeks to fill in this void in order to prove to the citizenry that the government means no harm to them and that such damages are inevitable consequences of the government's duty to defend itself and protect its pople."

