congress_website_title = "AN ACT PROVIDING FOR A THREE (3)-YEAR MORATORIUM ON THE FORECLOSURE OF MORTGAGE OF HOUSING UNITS TO ANY OF THE GOVERNMENT INSTITUTIONS AND AGENCIES INVOLVED IN THE NATIONAL SHELTER PROGRAM"
congress_website_abstract = "There shall be a moratorium on the foreclosure of mortgage of housing units with any of the government institutions and agencies involved in the National shelter Program for a period of three (3) years from the effectivity of this Act. During this period, interest on outstanding balances on such housing units shall be suspended. After this period, homeowners may be allowed to pay their monthly amortization according to the payment scheme subsequently devised for this purpose by the National Home Mortgage Finance Corporation."
