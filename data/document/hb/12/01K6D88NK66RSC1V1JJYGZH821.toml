congress_website_title = "AN ACT AMENDING ARTICLES 213, 215 AND 216 OF THE LABOR CODE OF THE PHILIPPINES, AS AMENDED, BY UPGRADING THE SALARIES, ALLOWANCES AND RETIREMENT BENEFITS OF LABOR ARBITERS AND THE COMMISSIONERS OF THE NATIONAL LABOR RELATIONS COMMISSION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Labor Arbiters are judges, who are better equipped with training, experience and background to handle labor controversies, in the Philippines labor justice system. They adjudicate the very sensitive issues between labor and management. Since, they perform significant role in the maintenance of industrial peace and in the adjudication of justice in the workplace, it is fitting that Labor Arbiters enjoy equality in rank with the judges of the Regional Trial Courts. Appropriate retirement benefits must likewise be accorded them to enable them to enjoy the fruits of government service long after they have served it with their best years."

