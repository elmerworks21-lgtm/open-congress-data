congress_website_title = "AN ACT CHANGING THE PROCESS FOR RECALL ELECTIONS, AMENDING FOR THE PURPOSE SECTIONS 70 AND 71 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE `LOCAL GOVERNMENT CODE OF 1991'"
congress_website_abstract = "Republic Act No. 7160, otherwise known as the Local Government code of 1991, is hereby amended by providing that: (a) Recall may be initiated [by a preparatory recall assembly or] by the registered voters of the local government unit to which the local elective official subject to recall belongs; and (b) Recall of any elective provincial, city, municipal, or barangay official may [also] be validly initiated upon petition of at least twenty five percent (25%) of the total number of registered voters in the local government unit concerned during the election in which the local official sought to be recalled was elected."
