congress_website_title = "AN ACT GRANTING CAREER SERVICE PROFESSIONAL OR SUBPROFESSIONAL TO THE PUNONG BARANGAY, THE SANGGUNIANG BARANGAY MEMBERS, THE BARANGAY TREASURER AND SECRETARY, THE SANGGUNIANG KABATAAN CHAIRMAN AND THE SANGGUNIANG KABATAAN MEMBERS"
congress_website_abstract = "The Local Government Code provides that barangay officials shall be entitled to appropriate civil service eligibility on the basis of the number of years of service to the barangay. In the Rules Governing the Grant of Eligibility to Sangguniang Barangay Officials issued by the Civil Service Commission, the above officials including the Sangguniang Kabataan (SK) chairmen shall be considered appropriate for appointment to first and second level positions provided they meet the requirements for the position. Elected officers must have rendered at least three years of service and appointive officials must render the same number of years of service. This bill seeks to grant career service professional eligibility to Barangay officials and SKchairmen and civil service subprofessional eligibility to SK members."
