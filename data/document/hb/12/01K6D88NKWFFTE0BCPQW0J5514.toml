congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED FORTY-TWO HUNDRED TWENTY-SIX (REPUBLIC ACT NO. 4226), OTHERWISE KNOWN AS THE `HOSPITAL LICENSURE ACT'"
congress_website_abstract = "\"Hospital and HEALTH SERVICE ESTABLISHMENTS Licensure Act.\" This bill seeks to STRENGTHEN RA NO. 4226 (Hospital Licensure Act) by increasing the penalties of any violation of the Act and by vesting the Bureau of Licensing and Regulation (BLR) withthe authority to hear and decide administrative cases and close down erring hospitals. It also seeks to allow the BLR to utilize its revenues to improve its capability to carry out its mandate."
