congress_website_title = "AN ACT EMPOWERING THE NATIONAL WATER RESOURCES BOARD TO PRESCRIBE PENALTIES FOR VIOLATIONS OF PRESIDENTIAL DECREE 1067, OTHERWISE KNOWN AS THE WATER CODE OF THE PHILIPPINES, AMENDING FOR THIS PURPOSE ARTICLES 82, 90, 91 AND 94 OF PRESIDENTIAL DECREE NO. 1067"
congress_website_abstract = "Water is one of the basic needs of man hence water resources must be protected and efficiently managed to sustain its limited supply. To control and regulate the utilization, exploitation, development, conservation and protection of water resources, the National Water Resources Council (later renamed Board) (NWRB) was created. Considering that the Water Code was enacted in 1976, the penalties provided therein have become outdated and ineffectual. This bill aims to give the NWRB the power to fix the penalties for violations of the Water Code."

