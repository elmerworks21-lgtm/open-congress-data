congress_website_title = "AN ACT GRANTING ADDITIONAL INSURANCE BENEFITS TO ALL PUBLIC SCHOOL TEACHERS, PROVIDING FUNDS FOR THE PAYMENT OF ITS PREMIUMS, AND FOR OTHER PURPOSES"
congress_website_abstract = "In addition to the insurance benefits given to teachers by the Government Service Insurance System (GSIS) under Republic Act No. 8291 a term insurance coverage to all public school teachers providing the following benefits shall be granted: (a) death benefits of two hundred thousand pesos (P200,000.00) to all teachers who are in active service; (b) burial expenses of fifty thousand pesos (P50,000.00) to all teachers who are in active service; and (c) reimbursement of actual medical expenses ofall teachers, whether retired or in the active service, but not to exceed one hundred thousand pesos (P100,000.00)."
