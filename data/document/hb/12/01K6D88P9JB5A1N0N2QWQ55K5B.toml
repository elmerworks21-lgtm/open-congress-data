congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 9164 TO EXTEND THE TERMS OF OFFICE OF BARANGAY OFFICIALS AND RESET THE DATE OF BARANGAY ELECTIONS"
congress_website_abstract = "The holding of election for barangay officials every three (3) years have proven to be very expensive for the government. Furthermore, it gives politicians a chance to interfere in the barangay elections thereby creating an unstable peace and order situation in the barangays. This bill proposes to extend the terms of office of barangay officials from three (3) years to four (4) years and, consequently, set the barangay election very four (4) years."
