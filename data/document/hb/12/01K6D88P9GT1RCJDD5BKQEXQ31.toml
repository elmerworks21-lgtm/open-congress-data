congress_website_title = "AN ACT CREATING THE NATIONAL LAND ADMINISTRATION AUTHORITY, RATIONALIZING THE ORGANIZATION AND FUNCTIONS OF GOVERNMENT AGENCIES RELATED TO LAND ADMINISTRATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"National Land Administration ACt of 2003\\\". The bill seeks to reform the existing land registration system under the Torrens system. It aims to strengthen the Torrens system, streamline and simplify proceedings and issuance of Certificate of Title using automated machines. It provides for the creation of the Land Administration Authority (LAA) which shall be the primary agency of the government that will prepare, integrate, coordinate, supervise and implement plans, programs, projects and activities relative to land administration functions. The offices of the Land Management Bureau, Land Management Services, Land Registration Authority, National Mapping and Resource Information Authority, DENR CARP National Secretariat and the LRA-CARP shall be integrated under the LAA."

