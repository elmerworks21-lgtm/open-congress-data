congress_website_abstract = "This bill seeks to appropriately grant senior citizens as defined and identified under Republic Act No. 7432, otherwise known as the SENIOR CITIZEN'S ACT, such domestic franking privileges on ordinary mails, registered mails, registered mails with return card, printed matters, book parchlet, small packets and parcels, provided they are addressed to local and national officials."

