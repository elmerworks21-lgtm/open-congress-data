congress_website_title = "AN ACT PROVIDING STIFFER PENALTIES FOR INFIDELITY IN THE CUSTODY OF PRISONERS, AMENDING FOR THE PURPOSE ARTICLES 223 AND 224 IN CHAPTER FIVE, TITLE SEVEN, BOOK II OF ACT NUMBERED THIRTY-EIGHT HUNDRED AND FIFTEEN, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to increase the penalty for the crime of infidelity in the custody of prisoners by public officers, to with: (a) for the crime of conniving with or consenting to evasion under Art. 223 of the Revised Penal Code (RPC) - prision mayor in its maximum period and perpetual absolute disqualification, without eligibility for parole or probation; and (b) for the crime of escape and evasion through negligence under Art. 224 of the RPC - prision mayor in its minimum period and perpetual absolute disqualification, without eligibility for parole or probation. It proposes to cover all types of prisoners, namely: a) detention prisoners, b) prisoners sentenced by the lower courts, and c) prisoners convicted by final judgment, and punish them with like penalties."
