congress_website_title = "AN ACT PROVIDING FOR THE MECHANISM TO DESIGNATE NATIONAL PERFORMING ARTS COMPANIES IN CLASSICAL AND CONTEMPORARY BALLET; ORCHESTRAL MUSIC; CHORAL MUSIC; AND THEATER, RESPECTIVELY, DEFINING THEIR RESPECTIVE FUNCTIONS AND RESPONSIBILITIE S, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to provide the mechanisms for identifying and declaring a particular performing arts company as to national performing arts company either in: classical and contemporary ballet; orchestral music; choral music; and theater. This billalso provides for the benefits and incentives that a performing arts company will receive once it is declared as the national performance company in its field."

