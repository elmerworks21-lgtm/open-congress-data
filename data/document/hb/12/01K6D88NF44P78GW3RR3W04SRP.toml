congress_website_title = "AN ACT MAINTAINING THE PRESENT PROGRAM ON THE DEPLOYMENT OF SKILLED AND UNSKILLED MIGRANT WORKERS ABROAD INTENSIFYING AT THE SAME TIME THE GOVERNMENT'S SKILLS DEVELOPMENT PROGRAM, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED EIGHTY HUNDRED AND FORTY-TWO, OTHERWISE KNOWN AS THE MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF 1998"
congress_website_abstract = "The State recognizes that the ultimate protection to all migrant workers is the possession of skills. Pursuant to his, [and as soon as practicable], the government shall [deploy and/or allow the deployment only of skilled Filipino workers] LAUNCH ANATIONWIDE SKILLS DEVELOPMENT PROGRAM TO ADEQUATELY PREPARE FILIPINOS FOR EMPLOYMENT HERE OR ABROAD."

