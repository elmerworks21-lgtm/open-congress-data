congress_website_title = "AN ACT PROVIDING FOR A NATIONAL HOMELOTS DISTRIBUTION PROGRAM"
congress_website_abstract = "\"Comprehensive National Homelots Distribution Act of 2002.\" The lands covered by this Act shall be distributed to residents of the barangay where the land is located belonging to the lower income classes. Priority shall be given to landless and underprivileged residents who are already occupying said lot for two or more years.> The Housing and Urban Development Coordinating Council (HUDCC) shall formulate financing program to assist the beneficiaries acquire their homelots and build affordablehouses. It shall consider existing programs and develop other financing schemes in coordination with the Home Guarantee Corporation and other government financial institutions to fast track the distribution of homelots and acquisition of affordable hhousing for the beneficiaries."
