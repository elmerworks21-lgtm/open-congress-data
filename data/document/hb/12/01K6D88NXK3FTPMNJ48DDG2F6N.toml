congress_website_title = "AN ACT AMENDING SECTION 290 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991(RE: SHARE OF LGU's IN THE UTILIZATION AND DEVELOPMENT OF THE NATIONAL WEALTH WITHIN THEIR JURISDICTION)"
congress_website_abstract = "The Local Government Code is AMENDED as follows: Local government units shall, in addition to the internal revenue allotment, have a share of 40% of the gross collection derived (by the national government) from the preceding fiscal year from miningtaxes, royalties, forestry and fishery charges, and such other taxes, fees or charges, including related surcharges, interests, or fines, and from its share in any co-production, joint venture or production sharing agreement in the utilization and development of the national wealth within their territorial juridiction: Provided, that persons natural or juridical engaged in the utilization and development of the national wealth, shall pay directly the abovementioned 40% of their national wealthtaxes to the host local government units and the remaining 60% to the national government."
