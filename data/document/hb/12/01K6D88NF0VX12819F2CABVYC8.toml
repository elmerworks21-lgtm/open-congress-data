congress_website_title = "AN ACT INCREASING THE INTERNAL REVENUE ALLOTMENTS (IRA) OF LOCAL GOVERNMENT UNITS, (LGUS) IN PROVIDING FOR ITS EQUITABLE DISTRIBUTION, AUTHORIZING ITS AUTOMATIC RETENTION, AMENDING FOR THE PURPOSE SECTION 284, 285 AND 286 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991 AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill calls for the amendment of the Local Government Code by increasing the allotment in the internal revenue taxes of local government units. From the present forty, it will be increased to sixty percent at a rate of five percent per annum over a period of four year effective the immediately proceeding fiscal year.> The bill likewise seeks equitable distribution of the IRA after the deduction of the costs of devolution. Finally, it mandates the automatic retention of the IRA such that theLGU will have immediate access to all the funds it needs for its operations."

