congress_website_title = "AN ACT DECLARING AUGUST 21 OF EVERY YEAR AS THE SENATOR BENIGNO \\\"NINOY\\\" AQUINO NATIONAL HOLIDAY AND FOR OTHER PURPOSES"
congress_website_abstract = "The death of Ninoy Aquino on August 21, 1983 sparked a fearless show of support from the entire Filipino nation for the cause of peace, freedom and democracy. This measure seeks to declare August 21 of every year as Senator Benignot \\\"Ninoy\\\" Aquino Day to be commemorated as a national holiday."

