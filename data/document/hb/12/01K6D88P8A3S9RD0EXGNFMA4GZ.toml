congress_website_title = "AN ACT STRENGTHENING THE ANTI-PIRACY LAW, AMENDING FOR THE PURPOSE SECTION 9 OF PRESIDENTIAL DECREE 1987"
congress_website_abstract = "Inspite of laws and penalties, film and music piracy has reached an alarming level. Piracy has caused the decline in revenues of legitimate entertainment business owners which could have helped them power back money into the economy. This bill seeks the imposition of stricter penalties against violators of PD 1987 to give more teeth to the government's campaign against piracy and thereby protect the legitimate entertainment media industry. It proposes to impose on violators, upon conviction,a mandatory penalty of six months and one day to three years imprisonment and a fine of not less that PhP500,000 but not more than PhP1.0 million."

