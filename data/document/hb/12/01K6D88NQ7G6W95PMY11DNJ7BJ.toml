congress_website_title = "AN ACT PROHIBITING GOVERNMENT OFFICIALS AND EMPLOYEES TO HOLD TWO OR MORE FULL TIME POSITIONS IN THE GOVERNMENT OR ANY SUBDIVISION, AGENCY OR INSTRUMENTALITY THEREOF INCLUDING GOVERNMENT-OWNE D AND -CONTROLLED CORPORATIONS OR IN PRIVATE ENTITIES ANDPRESCRIBING PENALTIES THEREFOR"
congress_website_abstract = "Unless otherwise allowed by law or by the primary functions of his position, no appointive government official or employee shall hold two or more full time positions in the government or any subdivision, agency or instrumentality thereof, includinggovernment-owne d or controlled corporations or their subsidiaries or in private agencies or institutions. Any government official or employee found guilty of violating this Act shall be punished by a fine of not less than the amount equivalent to six months salary nor more than twelve months salary, or suspension of not less than thirty days to dismissal from the service, or both such fine and suspension or dismissal."
