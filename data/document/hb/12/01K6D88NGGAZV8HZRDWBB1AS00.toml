congress_website_title = "AN ACT INCREASING THE BENEFITS OF RETIRED GOVERNMENT EMPLOYEES, AMENDING FOR THE PURPOSE COMMONWEALTH ACT NUMBERED ONE HUNDRED EIGHTY-SIX, AS AMENDED"
congress_website_abstract = "Under this bill, government employees who retire under either RA 660 or PD 1146 would be receiving six (6) year-annual lump sum instead of the usual five (5) year annually. Further, the basis of the monthly annuity to be subsequently received is proposed to be the highest monthly salary rate received prior to retirement in lieu of the existing provision which provides that the basis of the annuity is the average monthly salary received during the last three years of service."
