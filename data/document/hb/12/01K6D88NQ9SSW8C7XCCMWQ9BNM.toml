congress_website_title = "AN ACT DEFINING DOMESTIC VIOLENCE, PROVIDING PROTECTION MEASURES AND PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "The crime of Domestic Violence shall refer to any act or series of combination of acts which result in or likely to result in physical, sexual or psychological harm or suffering, including threats of such acts, coercion, assault, harassment or arbitrary deprivation of liberty, committed against any member/s of the family or household. >(1) PHYSICAL VIOLENCE shall include acts constituting physical injuries as defined in Title Eight, Chapter Two of the Revised Penal Code. (2) PSYCHOLOGICAL VIOLENCE shall include acts causing or likely to cause mental or emotional suffering on the victim, or to control the victim's actions or decision including but not limited to: >a. intimation or harassment; b. denial of access to the victim's child; c. ddamage to property of the victim; d. public ridicule or humiliation including, but not limited to, repeated verbal abuse; e. stalking which includes willfully, maliciously and repeatedly following or harassing another person in reasonable fear for th"
