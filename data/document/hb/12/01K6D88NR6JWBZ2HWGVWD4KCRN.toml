congress_website_title = "AN ACT PROVIDING ADDITIONAL RETIREMENT BENEFITS TO THE MEMBERS OF THE JUDICIARY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 910, AS AMENDED, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to increase retirement benefits and shorten the required length of service in the government. Under this proposed measure, monthly pensions are computed based on the highest monthly salary, highest monthly longevity pay and highest monthly aggregate of transportation, living , and representation allowances at the time of retirement, resignation or death. In case of an increase in salary for the same position, the monthly pensions of retired members of the judiciary are automatically increased."

