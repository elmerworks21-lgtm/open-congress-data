congress_website_title = "AN ACT UPGRADING THE MONTHLY BENEFITS OF WORLD WAR II VETERANS, THEIR SPOUSES AND UNMARRIED MINOR CHILDREN"
congress_website_abstract = "A duly recognized veteran of World War II shall be paid a monthly pension in lieu of the monthly old-age and administrative total disability pensions unless he/she is already receiving a similar pension for the same consideration from other government funds or from the United States government. >The rate of this monthly pension shall be based on the age of the veteran following the table below: Age of the Veteran Monthly Pension Rate 75 - 79 P6,700.00 80 - 89 P7,700.00 90 and above P8,700.00 The spouse and unmarried minor children of the said veteran shall each be entitled to Five HUndred Pesos (P500.00) while the veteran is still living."

