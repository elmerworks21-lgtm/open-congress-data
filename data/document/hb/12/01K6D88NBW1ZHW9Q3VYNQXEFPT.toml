congress_website_title = "AN ACT EXPANDING THE PROHIBITED ACTS OF DISCRIMINATION AGAINST WOMEN ON ACCOUNT OF SEX, AMENDING FOR THE PURPOSE ARTICLES 135 AND 137 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "This bill seeks to ELIMINATE sex-based discrimination in employment by PENALIZING AN EMPLOYER WHO FAVORS A MALE EMPLOYEE OVER A FEMALE EMPLOYEE, WHETHER THROUGH NOTICES, ANNOUNCEMENTS OR ADVERTISEMENTS FOR EMPLOYMENT OR IN THE ACTUAL HIRING OR ADMISSION OF WORKERS."
