congress_website_title = "AN ACT ESTABLISHING PROFIT-SHARING IN ALL BUSINESS ENTERPRISES, INCLUDING GOVERNMENT-OWNE D AND CONTROLLED CORPORATIONS"
congress_website_abstract = "Rationale: It is the policy of the State to provide labor a fair share of the fruits of production, rationalize income inequalities, expand economic opportunities and pursue economic and social progress, growth and stability by establishing an equitable system of profit-sharing in all business enterprises, including government-owne d and-controlled corporations and entities."

