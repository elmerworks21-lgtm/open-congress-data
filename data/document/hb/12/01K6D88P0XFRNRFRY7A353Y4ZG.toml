congress_website_title = "AN ACT ESTABLISHING THE SPECIAL HEALTH FOR ALL FUND TO BE USED BY THE LOCAL HEALTH BOARDS FOR THE IMPROVEMENT OF HEALTH CARE SERVICES IN THEIR RESPECTIVE LOCAL GOVERNMENTS, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "The proposed SPECIAL HEALTH FOR ALL FUND shall be used excluding for the following: (1) Upgrading of facilities and equipment of local hospitals, rural health clinics, lying-in clinics, emergency hospitals, puericulture centers, nursing homes, hospices and such other health institutions found in the local areas; (2) Hiring, training and/or continuing education of health workers, caregivers, volunteer health workers and other ancillary personnel employed by the local governments in their healthinstitutions; (3) Building of new health institutions, such as secondary hospitals, specialty clinics or care centers in the local areas; (4) Purchase of needed medicines and medical supplies at the lowest costs in accordance with law; and (5) Establlishment of mobile emergency lifelines or quick-response medical and paramedical teams to respond to disasters, emergencies and other life-threatenin g situations in the community."

