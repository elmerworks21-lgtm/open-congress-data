congress_website_title = "AN ACT PROVIDING A NATIONAL RADIOLOGICAL EMERGENCY PREPAREDNESS AND RESPONSE PLAN FOR RADIOLOGICAL/NU CLEAR ACCIDENTS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This proposed measure aims to establish an organized emergency response capability for timely, coordinated action of Philippine authorities in an peacetime radiological accident or emergency caused by the release of radioactive materials including power reactors and fuel reprocessing plants that contain large quantities of radioactive materials resulting from the fission of nuclear fuels used in the production of thermal energy."

