congress_website_title = "AN ACT PROVIDING FOR THE REHABILITATION AND IMPROVEMENT OF ALL IRRIGATION FACILITIES THROUGHOUT THE COUNTRY, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED AND SEVENTY-EIGHT, ENTITLED `AN ACT TO PROMOTE RURAL DEVELOPMENT BY PROVIDING FOR AN ACCELERATED PROGRAM WITHIN A TEN(10)-YEAR PERIOD FOR THE CONSTRUCTION OF IRRIGATION PROJECTS'"
congress_website_abstract = "This bill seeks to reemphasize government's commitment to its responsibility in implementing programs that will encourage and motivate farmers to increase agricultural production. A way to achieve this is by providing an efficient and modernized irrigation system facilities throughout the country."

