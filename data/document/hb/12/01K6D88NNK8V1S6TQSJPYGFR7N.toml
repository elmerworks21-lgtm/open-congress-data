congress_website_title = "AN ACT REQUIRING ALL GOVERNMENT AND PRIVATE HOSPITALS, MEDICAL CENTERS, CLINICS, INFIRMARIES, PUERICULTURE CENTERS TO EXTEND FREE MEDICAL AND DENTAL ASSISTANCE TO INDIGENT CHILDREN"
congress_website_abstract = "All government and private hospitals, medical centers, clinics, infirmaries or puericulture centers duly licensed to operate as such, are hereby required to render medical and dental services to indigent childre, regardless of whether or not they are in danger of dying and/or may have suffered physical injuries requiring immediate medical attention."

