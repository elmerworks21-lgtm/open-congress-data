congress_website_title = "AN ACT AMENDING SECTION 31 OF REPUBLIC ACT NO. 6770 OTHERWISE KNOWN AS `THE OMBUDSMAN ACT OF 1989,' AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It is urgent and imperative that if we are to win the war against corruption and erring public officials, that the prosecutorial arm of the State, the Ombudsman, be reinforced by authorizing the deputization of private lawyers as prosecutors under the direct supervision and control of the Ombudsman. The need to reinforce the prosecutorial arm of the State against crimes committed by public officers has become more pronounced in light of how the commission of these crimes, or how theproceeds of similar or different crimes are hidden, have become more sophisticated and complex."
