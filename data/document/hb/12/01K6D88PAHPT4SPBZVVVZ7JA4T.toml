congress_website_title = "AN ACT REGULATING THE USE OF LOCAL GOVERNMENT UNITS' INTERNAL REVENUE ALLOTMENT (IRA), AMENDING FOR THE PURPOSE THE \\\"LOCAL GOVERNMENT CODE OF 1991,\\\" AS AMENDED"
congress_website_abstract = "The local government units (LGUs) are allotted a share in the national internal revenue taxes to ensure that LGUs have the means to support the expenditure responsibilities arising from the devolution mandated under R.A. 7160. This bill seeks to put a stop to the practice of LGUs of using their internal revenue allotment (IRA) as collateral for loans. The practice of using the IRA as a collateral for loans effectively ties up a portion of the IRA. This can result in the delayed payment of salaries and wages and the lack of funds to cover operating expenses."

