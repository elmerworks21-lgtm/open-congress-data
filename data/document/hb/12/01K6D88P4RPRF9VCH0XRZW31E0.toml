congress_website_title = "AN ACT GRANTING PERMANENT RESIDENCE STATUS TO THE REMAINING VIETNAMESE NATIONALS (RVN) THROUGH A SOCIAL INTEGRATION PROGRAM"
congress_website_abstract = "\"The Social Integration Act of 2002 for the Remaining Vietnamese Nationals.\" This bill seeks to grant permanent residence status to qualified Vietnamese Refugees and asylum seekers in the Philippines. > The social integration of the Remaining Vietnamese National shall be effective upon completion of the following: (1) Application with the Bureau of Immigration; (2) Payment of integration fees to a duly licensed commercial or universal bank accredited by BIR as auhtorized to received income taxpayments; (3) The integration fees paid by the RVN's shall be in lieu of all immigration fees ad fines, which he or she may have previously incurred; (4) Submission of a medical certificate from a government hospital stating that the applicant is nott a user of prohibited drugs; (5) Verification by the Bureau of Immigration of the truth and veracity of the of the RVN's documentary submissions."
