congress_website_title = "AN ACT AMENDING SECTION 5 OF REPUBLIC ACT NO. 776, OTHERWISE KNOWN AS THE CIVIL AERONAUTICS ACT OF THE PHILIPPINES, AS AMENDED BY PRESIDENTIAL DECREE NO. 1462 AND EXECUTIVE ORDER NO. 217"
congress_website_abstract = "\"SEC. 5. Composition of the Board. - The Civil Aeronautics Board shall composed of the Secretary of THE DEPARMENT OF TRANSPORTATION AND COMMUNICATIONS or his designated representative as Chairman, THE SECRETARY OF THE DEPARTMENT OF TOURISM OR HIS DESIGNATED REPRESENTATIVE AS VICE-CHAIRMAN, the Assistant Secretary for Air Transportation of the Department of Transportation and Communications [as Vice-Chairman], the Commanding General of the Philippine Air Force and [two (2)] THREE (3) members tobe appointed by the President of the Philippines. They shall hold at the pleasure of the President.> No member of the Board shall have any pecuniary interest in, or own any stock or bond of, any civil aeronautics enterprise. > (As amended by Presidenntial Decree No. 1462 and Executive Order No. 217)"

