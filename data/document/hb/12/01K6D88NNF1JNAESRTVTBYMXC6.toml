congress_website_title = "AN ACT PROVIDING INSURANCE BENEFITS TO BARANGAY TANODS AND INCREASING THE AMOUNT OF THE COVERAGE OF INSURANCE BENEFITS OF LOCAL GOVERNMENT OFFICIALS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6942 AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The barangay officials and the barangay tanods are in the forefront of carrying out the programs and projects of the government, in the delivery of basic services and in the maintenance of peace and order in the community. They are the vital link inthe development of the countryside, especially in the far flung barangays and communities.> In view thereof, it is but just and fitting to include BARANGAY TANODS in the coverage of Republic Act Numbered 6942 as proposed in due recognition of the coverage, sacrifices and unrelenting efforts of our barangay officials especially the barangay tanods."

