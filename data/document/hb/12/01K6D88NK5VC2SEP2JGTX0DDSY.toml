congress_website_title = "AN ACT EXEMPTING ALL AGRICULTURAL LANDS WITH NOT LESS THAN TEN PERCENT (10%) AND NOT MORE THAN THIRTY PERCENT (30%) PLANTED TREES FROM THE COVERAGE REPUBLIC ACT NO. 6657, OTHERWISE KNOWN AS THE COMPREHENSIVE AGRARIAN REFORM LAW AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The object of this measure is to protect our ecology and the future by requiring planting of more trees, even in agricultural lands. These trees would be able to provide for our lumber needs in the future and thus prevent logging in the forests. It gives the assurance that upon the full implementation of the Comprehensive Agrarian Reform (CARP), these agricultural lands would not be barren lands instead would be potent source of forest resources."
