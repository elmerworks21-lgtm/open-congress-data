congress_website_title = "AN ACT EXEMPTING FROM ANY AND ALL TAXES THE AMOUNTS AND SIMILAR BENEFITS THAT WILL BE GIVEN TO AND RECEIVED BY HUMAN RIGHTS VICTIMS AS COMPENSATION UNDER THE JUDGE MANUEL REAL DECISION, AND ALL THOSE SIMILARLY SITUATED"
congress_website_abstract = "Rationale: One significant accomplishment that the victims obtained in their efforts to seek justice was the decision in their favor rendered by Judge Manuel Real of the United States in a class suit litigated therein in behalf of more than nine thousand (9,000) sufferers, or their heirs, specifically mandating compensation for damages and injuries suffered. Until today, no such compensation has yet been made. Any such compensdation is not income. At most, it will be only rehabilitative or restorative, but may in fact never approximate the depth and the magnitude of the injury or suffering."

