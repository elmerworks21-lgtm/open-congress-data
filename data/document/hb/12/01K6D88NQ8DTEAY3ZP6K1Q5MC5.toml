congress_website_title = "AN ACT PROVIDING FOR MANDATORY TRAINING ON HUMAN RIGHTS FOR ALL OFFICIALS AND EMPLOYEES IN THE EXECUTIVE, LEGISLATIVE AND JUDICIAL BRANCHES OF GOVERNMENT INCLUDING GOVERNMENT-OWNE D AND/OR -CONTROLLED CORPORATIONS AND LOCAL GOVERNMENT UNITS AND FOROTHER PURPOSES"
congress_website_abstract = "Inclusion of Human Rights Courses in Government Training Programs. All branches of government, including government-owne d and/or controlled corporations (GOCCs) and local government units (LGUs), shall include the study of human rights as an integral part of the education and training of all their officers and employees, giving priority to those units involved in the administration of justice, intelligence work and maintenance of peace and order. > All government-owne d or -financed traininginstitutions shall include in their curricula a regular course on human rights."
