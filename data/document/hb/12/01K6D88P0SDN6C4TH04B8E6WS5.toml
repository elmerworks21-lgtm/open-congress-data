congress_website_title = "AN ACT GRANTING THE RIGHT TO FRANCHISEES TO DEVELOP THE RURAL AIRPORT INFRASTRUCTURE NETWORK IN THE PHILIPPINES FOR COMMERCIAL AND OTHER PURPOSES"
congress_website_abstract = "Rationale: Our government places the highest priority on poverty alleviation, particularly in the countryside. Rural development is the necessary strategy to do so and maximum private sector participation is ideal to achieve it. The establishment ofa private rural airport infrastracture will encourage economic activity in the hinterlands, by serving not only as transportation hubs but also as industrial, commercial and service centers which will provide countryside employment to uplift the rural standards of living."
