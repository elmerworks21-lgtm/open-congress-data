congress_website_title = "AN ACT ESTABLISHING A NATIONAL PROGRAM FOR FILIPINO GIFTED CHILDREN AND SCIENCE-ORIENTE D YOUTH, PROVIDING FUNDS THEREFOR"
congress_website_abstract = "\"Gifted Children and Science-Oriente d Youth Act.\" This bill shall have the following objectives: (1) Identify the gifted Filipino children and science-oriente d youth at the earliest age possible; (2) Establish a Center for the identification and nurturance of Filipino gifted children and science-oriente d youth; (3) Provide scholarship grants and other forms of assitance for identified Filipino gifted chidlren and science-oriente d youth; (4) Provide fund for research and development, curriculum development, training of parents, teachers and other personnel to carry out the objectives and programs of the identified Filipino gifted children and science-oriente d youth; (5) Provide incentives to government institutions and the private secttor that will participate in the implementation of this Act; and (6) Establish and maintain linkages with national and international institutions involved in programs on giftedness."

