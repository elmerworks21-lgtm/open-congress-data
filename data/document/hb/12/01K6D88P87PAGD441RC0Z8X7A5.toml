congress_website_title = "AN ACT GRANTING PERMANENT RESIDENCE STATUS TO THE REMAINING VIETNAMESE NATIONALS THROUGH A SOCIAL INTEGRATION PROGRAM"
congress_website_abstract = "\\\"Social Integration Act of 2003 for the Remaining Vietnamese Nationals (RVNs)\\\" This measure seeks to grant residnece status to qualified RVNs in the country through social integration program. These people will now have protection under our existing laws which will shield them from manipulation, harassments, abuse and possible deportation. Moreover, their children will become eligible for further education in the country."
