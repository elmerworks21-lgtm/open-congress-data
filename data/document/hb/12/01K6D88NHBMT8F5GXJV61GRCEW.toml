congress_website_title = "AN ACT TO PROMOTE, REQUIRE AND ENSURE THE PRODUCTION OF AN ADEQUATE SUPPLY, DISTRIBUTION, USE OF AGRICULTURAL CHEMICALS AND FERTILIZERS IDENTIFIED BY THEIR ACTIVE INGREDIENT AND/OR GENERIC NAMES"
congress_website_abstract = "\"Agricultural Generics Act of 2001.\" This proposed measure seeks to promote and encourage the use of generic names in the importation, manufacture, distribution, marketing, advertising, promotion and recommendation of pesticides and fertilizers to farmers. This system will ensure the adequate supply of these farm inputs at the lowest cost possible to the farmers. More choices will be available to them."
