congress_website_title = "AN ACT CREATING THE DEPARTMENT OF FISHERIES AND OCEANS, PROVIDING FOR THE TRANSFER OF POWERS AND FUNCTIONS OF THE DEPARTMENT OF AGRICULTURE ON FISHERY MATTERS TO SAID DEPARTMENT AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: According to the National Statistics Office, the population of the Philippines is estimated to reach 77.925 million by the year 2001. The total projected domestic requirements for fish will be 3 million metric tons to adequately feed ourpeople. The Philippines only ranks number 13 in world catch of fish, crustaceans and mulls behind our Asian neighbors and other countries. Tailand, Korea, and Taiwan have already surpassed us in fish production and technology. Mr. Edgardo G. Sarrosa, Chairman of the Chamber of Fisheries and Aquatic Resources complains that there is now some 18 major agencies of the government dealing on fishery matters but there is no consolidated efforts to project fisheries as a food source considering that iit contributes some 82 billion pesos yearly to the Philippine economy. Hence there is an imperative need for a strong and separate Department of Fisheries and Oceans so that the Philippines will be at par with our Asian neighbors."

