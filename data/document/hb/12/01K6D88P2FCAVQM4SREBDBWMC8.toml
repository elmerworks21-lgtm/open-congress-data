congress_website_title = "AN ACT CREATING THE OVERSEAS FILIPINO WORKERS (OFWs) MEDICAL CENTER DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The creation of an overseas Filipino Workers Medical Center is hereby proposed to promote and advanced the medical welfare of our Overseas Filipino Workers' (OFWs). As the State affirms the OFWs' health and medical needs for a suitable environment, it shall provide the proper venue to address these needs. > As hundreds of thousands of Filipino men and women work with sweat and blood in foreign lands to assure a better life for their families back home, the creation of an Overseas Filipino Workers Medical Center will be a gift to our modern-day heroes. It will finally give them the medical security and confidence that their welfare and interests are being safeguarded."
