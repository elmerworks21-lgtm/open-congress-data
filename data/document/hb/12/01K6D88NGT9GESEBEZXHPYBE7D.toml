congress_website_title = "AN ACT ESTABLISHING A YOUTH ENQUIRY SERVICE (YES) PROGRAM IN ALL CONGRESSIONAL DISTRICTS"
congress_website_abstract = "Rationale: Many young people need help in taking responsibility for their own lives. Through successful counseling they may develop the power and ability to do so. Youth information and counseling work play a vital role inhelping young people faceup to a wide range of problems which may confront them in their daily lives. Youth Enquiry Service seeks to offer information, advice and counseling to a cross-section of young people, as a contribution to their personal, social and vocational development."
