congress_website_title = "AN ACT MANDATING A NATIONWIDE RABIES VACCINATION AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "It is hereby mandated that there shall be a nationwide rabies vaccination program. Rabies vaccination services shall include all necessary procedures that shall prevent the spread of the rabies among domesticated animals and stray cats and dogs as determined by the Secretary of Agriculture through a department circular."
