congress_website_title = "AN ACT GRANTING EQUAL RIGHT TO WIVES AND HUSBAND, AMENDING FOR THE PURPOSE ARTICLES 333, 334 AND 344 OF REPUBLIC ACT NO. 3815, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "Rationale: Under the Revised Penal Code, Articles 333 and 334 define the felonies of adultery and concubinage, respectively. Their modes of committing are evidently different. The woman in an adultery case incurs a heavier penalty than the husband in a concubinage case. The marital infidelity of the husband is not treated as a felony unless the attendant circumstances in the felony of concubinage are present, creating therefore, a disadvantageous position on the part of the wife. Thus the needto amend Articles 333 and 334 of the Revised Penal Code to make the Code attuned to the fundamental equality before the law of women and men."

