congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE COAST GUARD AS A SEPARATE AND DISTINCT SERVICE ATTACHED TO THE DEPARTMENT OF TRANSPORTATION AND COMMUNICATIONS, FURTHER AMENDING REPUBLIC ACT NO. 5173, AS AMENDED AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Coast Guard Law of 2001\". The Philippine Coast Guard (PCG) is hereby established as a distinct, armed, and uniformed commissioned service attached to the Department of Transportation and Communications hereinafter referred to as the \"DOTC\". As provided for in this bill-- >1. PCG will have the ability to pursue programs and projects in coordination with the private sector and foreign financing agencies and institutions for its development. 2. The PCG would create a more effective policy and program coordination and implementation of concerns affecting the maritime industry and maritime society. 3. It would enhance efficiency in the delivery of public service to the maritime sector. 4. Develop and promulgate a coordinated and welll-structured maritime program and eliminate fragmentation, overlapping and duplication of maritime safety functions."
