congress_website_title = "AN ACT REORGANIZING AND STRENGTHENING THE PUBLIC ATTORNEY'S OFFICE (PAO), AMENDING FOR THE PURPOSE PERTINENT PROVISIONS OF THE ADMINISTRATIVE CODE OF 1987"
congress_website_abstract = "THE PUBLIC ATTORNEY'S OFFICE SHALL BE PLACED UNDER THE ADMINISTRATIVE SUPERVISION OF THE DEPARTMENT OF JUSTICE.> IT SHALL INDEPENDENTLY DISCHARGE ITS MANDATE TO RENDER FREE OF CHARGE, LEGAL REPRESENTATION ASSISTANCE, AND COUNSELING TO INDIGENT PERSONS IN ADMINISTRATIVE, LABOR, CIVIL AND CRIMINAL CASES AFTER IT IS DETERMINED THAT THE INTEREST OF JUSTICE WILL BE SERVED THEREBY.> IN THE EXIGENCY OF SERVICE, THE PAO MAY BE CALLED UPON BY PROPER AUTHORITIES TO RENDER SUCH SERVICES TO OTHER PERSONS,SUBJECT TO EXISTING LAWS, RULES AND REGULATIONS."
