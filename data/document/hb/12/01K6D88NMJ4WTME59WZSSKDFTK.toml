congress_website_title = "AN ACT TO MANDATE THE ELIMINATION OF CHILD LABOR POLICY AS A REQUIRED BARGAINING CLAUSE IN COLLECTIVE BARGAINING AGREEMENTS, AMENDING FOR THE PURPOSE ARTICLE 260 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "This bill seeks to AMEND the present provisions of the Labor Code which allows in the Collective Bargaining Agreements the employment of children. Specifically, this bill seeks to promote every effort to eliminate child labor policies in sald laborlaw. Although Republic Act No. 6710 already provides enough prohibitions, among other acts, the employment of children below fifteen (15) years of age, this bill supplements by adding that said prohibition be required and included during the negotiation of the Collective Bargaining Agreements (CBAs)."
