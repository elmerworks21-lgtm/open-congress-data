congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED EIGHTY-FOUR HUNDRED AND TWENTY-FOUR, AS AMENDED, OTHERWISE KNOWN AS THE `TAX REFORM ACT OF 1997', AND FOR OTHER PURPOSES(RE: MATRICULATION FEE AS DEDUCTION FROM TAXPAYERS' GROSS INCOME)"
congress_website_abstract = "This bill provides for additional exemption for individual taxpayers and qualified dependents by allowing a deduction in the taxpayer's gross income consisting of: (1) 20% of the total amount paid by the taxpayer for matriculation fee for the preceding year, which deduction shall in no case exceed the amount of P25.000.00 provided that: (a) the taxpayer is officially enrolled during the preceding school year in any educational institution duly recognized by CHED and TESTA; (b) the taxpayer is official enrolled in a vocational or tertiary course; and (c) the annual income of the taxpayer shall not exceed three hundred thousand pesos (P300,000.00). > (2) 25% of the total amount paid by the taxpayer as matriculation fee for the education of hhis children, not exceeding four (4) for the preceding school year, which deduction shall in no case exceed the total amount of P50,000.00 provided that: (a) the individual taxpayer must have officially enrolled his qualified dependent children in an"
