congress_website_title = "AN ACT PROHIBITING THE GLORIFICATION OF GUNS AND VIOLENCE IN MOVIE, TELEVISION, RADIO, PRINT MEDIA AND OTHER SIMILAR MEDIUM AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "The glorification of gunds and violence in movie, television, radio, print media and other similar medium shall be prohibited. For the purpose of this Act, the term \"glorification\" shall mean: the portrayal of the use of gunds or the act of violenceas an approved and accepted normal or ordinary way of life; or when the presentation is given a favorable aspect, dignifying the violent act and showing that its portrayal is worthy of praise and emulation."
