congress_website_title = "AN ACT MANDATING THE FULL IMPLEMENTATION OF THE NATIONAL HEALTH INSURANCE PROGRAM' COMPULSORY COVERAGE FOR ALL FILIPINO RESIDENTS, AMENDING FOR THE PURPOSE REPUBLIC ACT 7875 OTHERWISE KNOWN AS THE \\\"NATIONAL HEALTH INSURANCE ACT OF 1995\\\", AND FOR OTHER PURPOSES"
congress_website_abstract = "The Philippine Health Insurance Program (Program) was created to provide health insurance coverage and to ensure affordable and accessible health care services to all citizens. However, according to PhilHealth, the nationwide membership to the Program, including approved beneficiaries, is merely 6,334,320 members. This number is dismally low considering that the Program projected the entire Philippine populace for its membership. The bill provides for a mandatory coverage of all citizens of the Philippines under the Program and for its full and complete implementation."
