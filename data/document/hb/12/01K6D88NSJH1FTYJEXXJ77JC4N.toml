congress_website_title = "AN ACT TO OPEN LOAN WINDOWS FOR FILIPINO MIGRANT WORKERS, AMENDING FOR THE PURPOSE OF SECTIONS 6 (A) AND 21 OF REPUBLIC ACT NO. 8042, OTHERWISE KNOWN AS THE MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF 1995"
congress_website_abstract = "\"The Loan Windows for Filipino Migrant Workers Act of 2001\". This bill substantiates the policy of the State to see to it that Filipino migrant workers shall have access to loans needed by them to finance their deployment abroad. >In addition, thisproposed measure seeks to open up loan windows not only of Government Financial Institutions (GFIs) but also private money lenders, so as to assist our poor, unemployed countrymen to land gainful jobs abroad. In effect, it will also activate the practically moribund Loan Guarantee Fund. In the process, it is hoped that illegal recruitment will also be curbed as workers will have to go to the legitimate route in order to avail of the loans."

