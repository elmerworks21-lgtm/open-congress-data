congress_website_title = "AN ACT GRANTING GRATUITY PAY TO BARANGAY OFFICIALS THEREBY AMENDING SECTION 393 OF THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "All barangay officials, both elected and appointed, shall be entitled to One Thousand Pesos (P1,000.00) for every full year of service as gratuity pay upon his/her severance from government service provided that the official shall have rendered at least three (3) years of continuous service in the barangay; Provided finally, that all cities or municipalities shall allocate funds for this purpose in its annual budget."

