congress_website_title = "AN ACT REQUIRING MANDATORY DRUG TESTING FOR ALL APPLICANTS FOR EMPLOYMENT IN ANY GOVERNMENT OFFICE, INCLUDING GOVERNMENT-OWNE D OR -CONTROLLED CORPORATIONS, AND IN PRIVATE INDUSTRIES AND OFFICES, AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "This bill seeks to introduce a new approach to address the problem by requiring all applicants for employment, both in the government and in the private sector to undergo drug testing. Passing the drug testing is a mandatory requisite for employment. To give more teeth to the implementation of this proposed measure, this bill seeks to penalize persons responsible for hiring employees without passing the mandatory drug testing."
