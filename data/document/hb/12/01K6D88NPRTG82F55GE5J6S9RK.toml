congress_website_title = "AN ACT PROVIDING FOR A THREE (3)-YEAR MORATORIUM ON THE FORECLOSURE OF MORTGAGE HOUSING UNITS TO ANY OF THE GOVERNMENT INSTITUTIONS AND AGENCIES INVOLVED IN THE NATIONAL SHELTER PROGRAM"
congress_website_abstract = "There shall be a moratorium on the foreclosure of mortgage of housing units with any of the government institutions and agencies involved in the National Shelter Program for a period of three (3) years from the effectivity of this Act. > The Housingand Urban Development Coordinating Council shall issue rules and regulations to implement the provisions of this Act within thirty (30) days from the approval hereof."
