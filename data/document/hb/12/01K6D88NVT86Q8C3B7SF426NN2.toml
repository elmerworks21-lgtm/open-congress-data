congress_website_title = "AN ACT REVISING REPUBLIC ACT NO. 382, OTHERWISE KNOWN AS `AN ACT TO REGULATE THE PRACTICE OF VETERINARY MEDICINE IN THE PHILIPPINES'"
congress_website_abstract = "This Act provides for and shall govern: (1) THE ADMINISTRATION AND CONDUCT OF LICENSURE EXAMINATION, REGISTRATION, AND LICENSING OF VETERINARIANS; (2) THE SUPERVISION AND REGULATION OF THE PRACTIVE OF VETERINARY MEDICINE; (3) THE INTEGRATION OF VETERINARIANS UNDER THE EXISTING ACCREDITED VETERINARY PROFESSIONAL ASSOCIATION; AND (4) THE DEVELOPMENT OF THE PROFESSIONAL COMPETENCE OF VETERINARIANS THROUGH CONTINUING PROFESSIONAL EDUCATION IN ACCORDANCE WITH THE GUIDELINES SET BY THE PROFESSIONALREGULATION COMMISSION."
