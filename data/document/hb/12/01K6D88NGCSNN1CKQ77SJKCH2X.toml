congress_website_title = "AN ACT GRANTING FREE MEDICAL AND HOSPITALIZATION BENEFITS TO INDIGENT FILIPINO WOMEN SUFFERING FROM WOMEN'S DISEASES, ILLNESSES AND INJURIES DUE TO VIOLENCE INFLICTED ON WOMEN, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Women's Medical and Hospitalization Benefits Act.\" Free medical and hospitalization benefits shall be granted to indigent Filipino women suffering from women's diseases, such as cancer of the reproductive organ, cancer of the breast and pregnancy-relat ed diseases; illnesses and injuries due to violence inflicted on women. For this purpose, a special ward shall be established in all provincial and district hospitals."
