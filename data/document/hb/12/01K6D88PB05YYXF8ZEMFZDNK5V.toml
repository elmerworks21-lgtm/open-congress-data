congress_website_title = "AN ACT DECLARING AN ELECTIVE OFFICIAL IPSO FACTO RESIGNED FROM HIS OFFICE UPON THE FILING OF HIS CERTIFICATE OF CANDIDACY"
congress_website_abstract = "Ra 9006 (Fair Election Practices Act) allows any elective public official to run for any public office other than the one he is holding without the risk of losing said office. This is contrary to the constitutional edict for all public official to serve the people with utmost loyalty and not trifle with the mandate which their constituent have entrusted to them. This bill seeks to declare any elective official whether national or local, running for any public office other than the one he is holding as ipso facto resigned from his office upon the filing of the certificate of candidacy."

