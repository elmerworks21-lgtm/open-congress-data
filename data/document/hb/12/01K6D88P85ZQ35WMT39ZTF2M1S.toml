congress_website_title = "AN ACT REGULATING THE PRACTICE OF CUSTOMS BROKERS PROFESSION IN THE PHILIPPINES, CREATING FOR THE PURPOSE A PROFESSIONAL REGULATORY BOARD FOR CUSTOMS BROKERS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"Customs Brokers Act of the Philippines\\\" The measure seeks to regulate the licensing and practice of the customs broker profession. It defines the scope of the practice of of the customs broker profession to cover services in the form of consultation, teaching, preparation of Customs reguisite documents for imports and exports , declaration of Customs duties and taxes and related services. It strengthens the profession through the institution of a continuing professional educational system. It provides for the creation of the Professional Regulatory Board for Customs Brokers."
