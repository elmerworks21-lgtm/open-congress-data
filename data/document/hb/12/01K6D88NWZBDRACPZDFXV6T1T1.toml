congress_website_abstract = "The bill is to supplement the existing centers by establishing lodging houses, which will cater to the needs and welfare of senior citizens while traveling. It will be a significant contribution to the series of action taken by the government. Further, it will encourage the elderly to travel and see the scenic spots in the country and thus promote local tourism."
