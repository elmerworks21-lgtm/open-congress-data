congress_website_title = "AN ACT INSTITUTING A NATIONAL LAND USE POLICY, PROVIDING THE IMPLEMENTING MECHANISMS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill provides for the following areas of concern: (1) Establishment of crucial priorities for land use, especially areas to be protected for ecological purposes and areas to be developed and protected from conversion to ensure food security; (2) Adoption of measures to promote land development, discourage land speculation and generate revenues; (3) Conduct of a National Base Mapping and Geohazard Mapping Program to effectively provide adequate and up to date information necessary for landuse planning; and (4) Adoption of a bottom-up approach to land use planning."
