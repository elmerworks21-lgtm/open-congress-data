congress_website_title = "AN ACT TO FURTHER PROMOTE ENTREPRENEURSHI P AND SUPPORT THE DEVELOPMENT OF MICRO, SMALL AND MEDIUM ENTERPRISES, AMENDING FOR THE PURPPOSE REPUBLIC ACT NO. 6977, AS AMENDED, OTHERWISE KNOWN AS THE MAGNA CARTA FOR SMALL ENTERPRISES"
