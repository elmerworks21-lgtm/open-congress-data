congress_website_title = "AN ACT PROVIDING FOR A CHAMBER OF COMMERCE AND INDUSTRY SYSTEM, PROMOTING ORDER, EFFICIENCY, AND EFFECTIVE DELIVERY OF SERVICES BETWEEN AND AMONG CHAMBERS OF COMMERCE AND INDUSTRY, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to promote the growth of chambers of commerce and indusatry (CCIs) nationwide. Presently, there is NO chamber of commerce and industry system for all business and economic sectors. Chambers have thus uncontrollably mushroomed acrossthe country with overlapping and duplication of functions and services resulting in inefficiency, and inability to provide value-added services for their members, among others."

