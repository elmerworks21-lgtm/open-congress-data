congress_website_title = "AN ACT ESTABLISHING THE ARTISTS CAREER SERVICE, RECOGNIZING THE SPECIAL QUALIFICATIONS OF ARTISTS IN GOVERNMENT, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The Artists Career Service is a system of recruitment, career progression, recognition and reward of artists in the public service, and a means of selecting, developing and retaining a pool of highly qualified and productive artists personnel. Members of the Service, from the first, second and third levels, shall be granted eligibilities corresponding to the regular career service."

