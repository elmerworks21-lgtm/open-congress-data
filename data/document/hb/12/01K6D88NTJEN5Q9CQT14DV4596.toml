congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE BUSINESS REGISTRY DATABANK, AND FOR OTHER PURPOSES"
congress_website_abstract = "Creation of Philippine Business Registry Databank. - There is hereby created a Philippine Business Registry Databank (PBRD) which shall be the main repository of information on business enterprises in the Philippines. It shall provide business information and training support services, promote trade and investments, and promotions through electronic networking, as well as facilitate business partnerships among local entrepreneurs and their foreign counterparts."
