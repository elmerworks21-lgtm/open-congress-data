congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NUMBERED FOURTEEN HUNDRED AND SIXTY-SEVEN, AS AMENDED BY REPUBLIC ACT NUMBERED EIGHTY-ONE HUNDRED AND SEVENTY-FIVE, OTHERWISE KNOWN AS THE CHARTER OF THE PHILIPPINE CROP INSURANCE CORPORATION, IN ORDER TO EXPAND THE INSURANCE PROGRAM THEREIN PROVIDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "The purpose of this bill is to amend the existing mandate on crop insurance system, which will provide more financial resources to support the Philippine Crop Insurance Corporation (PCIC). In addition, the proposed bill expands the coverage of theinsurance being extended to farmers. This bill seeks to insure the fisherfolks as well. Through this, the State could well declare that it is truly extending all possible access to financial assistance to our farm workers and fisherfolks to help them to develop and produce enough to meet our local food consumption."
