congress_website_title = "AN ACT FURTHER AMENDING PRESIDENTIAL DECREE NO. 198, AS AMENDED, OTHERWISE KNOWN AS `THE PROVINCIAL WATER UTILITIES ACT OF 1973'"
congress_website_abstract = "The amendment to Section 2 of PD No. 198 states: > RELIABLE, AND ENVIRONMENTALLY SOUND WATER AND WASTEWATER DISPOSAL SYSTEMS SHALL BE PROVIDED TO AS MANY POPULATION CENTERS OF THE PHILIPPINES AS MAY BE FEASIBLE AND SUSTAINABLE WITH INTEGRATED FACILITIES THROUGH LOCAL WATER DISTRICTS THAT ARE EXISTING OR MAY HEREINAFTER BE FORMED. THE WATER DISTRICTS SHALL BE ORGANIZED TO BE AUTONOMOUS , LOCALLY CONTROLLED, WITH PUBLIC AND/OR PRIVATE CAPITAL, AND OPERAATED AS EFFICIENTLY AS POSSIBLE IN THE FORMAND MANNER AS MAY BE MOST APPPROPRIATE TO THE LOCAL CIRCUMSTANCES TO EXTEND THE BENEFITS OF MUNICIPAL WATER SYSTEMS TO AS WIDE AS SEGMENT OF THE NATION AS POSSIBLE, AND AT THE EARLIEST TIME, THE NATIONAL GOVERNMENT SHALL FUND, ADMINISTER AND CHANNELFINANCIAL, TECHNICAL, AND OTHER FORMS OF ASSISTANCE TO LOCAL WATER DISTRICTS THROUGH A NATIONAL ENTITY WHICH SHALL ALSO BE RESPONSIBLE FOR AND HAVE AUTHORITY TO PROMULGATE AND ENFORCE RULES AND REGULATIONS TO ASSURE THE EVOLUTION OF WATER DISTRICTS I"
