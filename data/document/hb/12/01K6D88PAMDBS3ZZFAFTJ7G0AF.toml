congress_website_title = "AN ACT PENALIZING DISCRIMINATION AGAINST WORK APPLICANTS"
congress_website_abstract = "In line with the policy of the State to promote full employment and equal work opportunities, this bill declares as unlawful for any company, agency, institution, industry including hotels, restaurants, and similar establishments to discriminate against any person for employment because of height , skin, color, physical feature and age. It proposes to penalize any establishment which requires work applicants to meet any physical requirement that are not work related with a fine of not less than Ph50,000 and not more than Ph100,000 for its first offense and for its second offense, the revocation or cancellation of its business permit or license, in addition to the fine."
