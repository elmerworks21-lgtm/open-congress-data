congress_website_title = "AN ACT TO PRESERVE AND REHABILITATE THE FOREST BY BANNING ALL LOGGING OPERATIONS IN PRIMARY AND SECONDARY GROWTH FORESTS AND RAINFORESTS, CREATING FOR THE PURPOSE A TASK FORCE FOR THE PRESERVATION AND REHABILITATION OF FORESTS, AND FOR OTHER PURPOSES"
congress_website_abstract = "It shall be unlawful for any person to cut, fell or destroy any tree or engage in any logging operation, in primary and secondary types of forest, for a period of thirty-five (35) years from the effectivity of this Act.> Commercially planted trees for commercial and/or industrial purposes are EXEMPTED from this ban. Provided, that such trees are not located in primary and secondary forests or rainforests."
