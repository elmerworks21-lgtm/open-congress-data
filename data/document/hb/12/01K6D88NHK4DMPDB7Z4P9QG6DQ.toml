congress_website_title = "AN ACT REVERTING TO THE NATIONAL GOVERNMENT THE DISCHARGE OF BASIC HEALTH SERVICES DEVOLVED TO LOCAL GOVERNMENT UNITS (LGUs) AND AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "\"Renationalizat ion of Devolved Health Services and Facilities Act.\" The objectives of this Act are: a) To prevent the further deterioration of government health services and facilities brought about by devolution; b) to provide essential health services to the people, especially the sick, the poor and marginalized sector of society; c) to improve and uplift the morale, social and economic well-being of devolved health workers; and d) to develop a professional health manpower that is responsiveto the people's health needs and problems."

