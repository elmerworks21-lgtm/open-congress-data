congress_website_title = "AN ACT TO INTERCONNECT THROUGH THE INTERNET ALL GOVERNMENT AGENCIES, PROVINCES, CITIES AND MUNICIPALITIES IN THE PHILIPPINES"
congress_website_abstract = "This bill proposes the interconnection through the internet of all government agencies, provinces, cities and municipalities all over the country to solve this perennial problem of lack of communication facility. A faster and efficient dissemination of information and participation in the discussion of important issues affecting not only the country but also in their locality would then ensue."

