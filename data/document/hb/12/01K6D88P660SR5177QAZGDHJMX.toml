congress_website_title = "AN ACT GRANTING AN ACROSS THE BOARD SALARY GRADE INCREASE OF PUBLIC LEARNING FACILITATORS, INCLUDING NON-TEACHING POSITIONS IN THE NATIONAL, REGIONAL, DIVISION, SCHOOLS DISTRICT` AND SCHOOL LEVEL, PROVIDING FUNDS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "The salary grade level of all public learning facilitators in the national, regional, division schools district and school level, including non-teaching positions is hereby proposed to be upgraded by two (2) levels. Said increase shall be differentiated in accordance with the qualifications and length of service rendered by teachers and shall take priority over other non-educational and non-agricultura l budgetary allocations."

