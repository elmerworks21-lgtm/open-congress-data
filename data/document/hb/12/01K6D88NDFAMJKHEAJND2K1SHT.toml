congress_website_title = "AN ACT LIMITING THE AUTHORITY OF THE DEPUTY OMBUDSMAN FOR THE ARMED FORCES TO THE INVESTIGATION AND PROSECUTION OF COMPLAINTS AGAINST UNIFORMED MEMBERS OF THE ARMED FORCES OF THE PHILIPPINES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6770, OTHERWISEKNOWN AS \"THE OMBUDSMAN ACT OF 1989\""
congress_website_abstract = "Rationale: This bill seeks to limit the authority of the Deputy Ombudsman for the Armed Forces to investigate and prosecute uniformed members of the Armed Forces of the Philippines. > The military organization is peculiar. It has its own customs, traditions, practices, and code of conduct. It is clothed with the responsibility of security the state. All these set it apart from the ordinary civilian life."
