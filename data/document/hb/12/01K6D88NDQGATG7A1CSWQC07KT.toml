congress_website_title = "AN ACT ESTABLISHING PUBLIC RECREATIONAL PARKS IN MAJOR URBAN AREAS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to establish at least one (1) public recreational park in every major urban center including, but not limited to, Metro Manila, Metro Cebu and Metro Davao. Such public recreational park shall comprise a picnic arrea and such other outdoor and indoor sports, health and recreational facilities as may be determined by the administering body hereafter designated in consultation with the appropriate government agencies, and workers' and employees groups."
