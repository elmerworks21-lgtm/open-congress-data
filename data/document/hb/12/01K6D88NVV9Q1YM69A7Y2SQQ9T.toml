congress_website_title = "AN ACT ESTABLISHING A NATIONAL IDENTIFICATION SYSTEM IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "There shall be established a national identification system for all citizens of the Philippines to serve as their official identification as citizens wherever they reside. Rationale: Philippine citizens do not have a single piece of an identification document that can serve them in all transactions. At present, they are required to present two or more identification cards. To institute a uniform, nationally accepted identification system this bill is being filed to solve the need.> Approval ofthis bill earnestly sought."
