congress_website_title = "AN ACT PROVIDING SENIOR CITIZENS EXEMPTION FROM THE TWENTY PERCENT (20%) FINAL WITHHOLDING TAX ON INTEREST INCOME FROM PHILIPPINE CURRENCY BANK DEPOSIT"
congress_website_abstract = "Rationale: Senior citizens have lost the vigor to engage in business or any gainful occupation due to their age. They only venture themselves in banking business by way of depositing their money which they received after retirement from service (retirement benefits), hoping to earn from the privilege interest rate provided by the banking institutions, in which the interest income is the only appropriate income for them to sustain daily life. Hence, approval of this measure is earnestly sought."

