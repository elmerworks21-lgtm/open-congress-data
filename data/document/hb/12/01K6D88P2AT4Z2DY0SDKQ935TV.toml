congress_website_title = "AN ACT MANDATING THE NATIONAL POWER CORPORATION TO ENSURE THE OPTIMUM UTILIZATION OF POWER SUPPLY WHICH THE GOVERNMENT HAS GUARANTEED TO PURCHASE FROM INDEPENDENT POWER PRODUCERS (IPPs), PROVIDING A POWER REBATE SYSTEM IN FAVOR OF THE CONSUMERS, ANDFOR OTHER PURPOSES"
congress_website_abstract = "\\\"Power Rebate Act of 2002\\\". The Energy Regulatory Commission shall formulate a mechanism wherein residential and industrial consumers will be allowed access to unused energy at no added cost. Furthermore, it shall adapt a system that will ensure that all generated power will be utilized. >With the ends that a more efficient distribution of power will aid in improving the lives of Filipinos, the immediate and favorable passage of this bill is earnestly requested."
