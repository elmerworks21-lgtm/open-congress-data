congress_website_title = "AN ACT REGULATING ADVERTISEMENTS OF LIQUOR AND ALCOHOLIC BEVERAGES, CIGARETTES AND OTHER TOBACCO PRODUCTS IN PRINT, ELECTRONIC AND BROADCAST MEDIA, PROVIDING PENALTIES FOR VIOLATIONS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "All advertisements of liquor and alcoholic beverages shall contain the advise: \"GOVERNMENT WARNING\" EXCESSIVE ALCHOL INTAKE MAY RESULT IN LIVER DISEASE AND DEATH.\" or its translation in Filipino or other dialects, such advise occupying not less thanten percent (10%) of the total area of the advertisement for print and outdoor advertising.> All advertisements of cagarettes and tobacco products shall contain a warning statement not less than ten percent (10%) of the total area of the advertisement for print and outdoor advertising stating: \"GOVERNMENT WARNING: CIGARETTE SMOKING IS DANGEROUS TO YOUR HEALTH\" or its translation in Filipino and other dialects.> This bill, likewise, states the PROHIBITIONS related to said advertisements."
