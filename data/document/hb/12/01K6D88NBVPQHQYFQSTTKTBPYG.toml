congress_website_title = "AN ACT EXEMPTING VOLUNTEER FIRE ASSOCIATIONS FROM PAYMENT OF CUSTOMS TARIFFS AND DUTIES IN THE IMPORTATION OF FIRE TRUCKS AND SPARE PARTS THEREOF"
congress_website_abstract = "Fire trucks and spare parts consigned to volunteer fire associations shall be exempted from payment of import tax and duties. Volunteer fire associations shall refer to non profit, non government civic organizations duly registered with the Securities and Exchange Commission established for purposes of fire prevention and protection and rendering emergency medical assistance to fire victims which are accredited by the Bureau of Fire Protection."

