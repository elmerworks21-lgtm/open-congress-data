congress_website_title = "AN ACT TO ENSURE PUBLIC ACCESS TO OFFICIAL RECORDS, DOCUMENTS AND ANY OTHER INFORMATION OF PUBLIC CONCERN"
congress_website_abstract = "\"Freedom of Information Act.\" This bill mandates the executive, legislative and the judicial branches of the government; the local government units; all departments, agencies and instrumentaliti es of the Republic of the Philippines, including government-owne d or controlled corporations and government financial institutions as well as their respective subsidiaries; state colleges and universities; and individual public officers and employees to disclose and make available for public scrutiny sources of official information and matters of public concerns and public interest EXCEPT when it is established by substantial evidence in a court proceeding or court process that the purpose of the examination is to abet or promote or commit criminaal acts defined and/or enumerated in existing statues or to engage in sheer and idle curiosity."
