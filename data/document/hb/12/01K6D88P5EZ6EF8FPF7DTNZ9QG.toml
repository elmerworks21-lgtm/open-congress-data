congress_website_title = "AN ACT UPGRADING THE SALARY GRADE LEVEL OF THE SCHOOLS DISTRICT SUPERVISORS FROM SALARY GRADE NINETEEN TO SALARY GRADE TWENTY-FOUR"
congress_website_abstract = "It takes a great deal of teaching experience and administrative training before one get to be a School District Supervisor. It would therefore be only reasonable that this position be adequately compensated or at the very least be provided with a salary grade commensurate with the responsibilitie s connected with the said position.> This bill seeks to increase the salary grade level of all Schools District Supervisors from the present Salary Grade 19 to the proposed Salary Grade 24."

