congress_website_title = "AN ACT CREATING THE RANK OF FIRST CHIEF MASTER SERGEANT/FIRST MASTER CHIEF PETTY OFFICER IN THE ENLISTED RANKS OF THE ARMED FORCES OF THE PHILIPPINES (AFP), APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to create the grade of First Chief Master Sergeant/First Master Chief Petty Officer (E-10) as a component part of the non-commissione d grades of the Armed Forces of the Philippines and which shall be held by the AFP Command SergeantMajor for a maximum term of three (3) years. > A First Chief Master Sergeant/First Master Chief Petty Officer shall receive a monthly base pay equivalent to the monthly base pay of a Chief Master Sergeant/Master Chief Petty Officer plus one-half (1/2) of the difference between the monthly base pays of a Second Lieutenant/Ensi gn (0-1) and a Chief Master Sergeant/Master Petty Officer (E-9)."

