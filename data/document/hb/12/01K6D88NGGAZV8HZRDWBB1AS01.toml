congress_website_title = "AN ACT PROHIBITING GOVERNMENT OFFICERS AND EMPLOYEES FROM PLAYING IN CASINOS AND OTHER SIMILAR ESTABLISHMENTS OPERATED BY THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION, OR BY OTHER SIMILAR GOVERNMENT-OWNE D OR -CONTROLLED CORPORATIONS, AND THEIRFRANCHISE HOLDERS, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "All elective and appointive government officers and employees, regardless of rank, designation, and status of employment, are hereby prohibited from playing in casinos amd other similar establishments operated by the Philippine Amusement and GamingCorporation. Such ban shall include entry inside casino premises during the establishment's business hours."

