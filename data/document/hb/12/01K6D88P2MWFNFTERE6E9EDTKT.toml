congress_website_title = "AN ACT CREATING A SPECIAL FUND FOR THE PHILIPPINE NATIONAL RED CROSS BLOOD SERVICES"
congress_website_abstract = "A Special Fund in the amount of P50,000,000.00 is hereby appropriated to come from the Philippine Charity Sweepstakes Office (P20,000,000.00 ) and the Philippine Amusement and Gaming Corporation (P20,000,000.00 ) and the National Treasury through the Department of Health (P10,000,000.00 ) to be used by the Philippine National Red Cross Blood Services in carrying out activities for public education, donor recruitment, donor screening, blood collection, blood testing, component preparation, and quality assurance in blood banking."

