congress_website_title = "AN ACT ESTABLISHING A DEPARTMENT OF PSYCHIATRY IN EVERY GOVERNMENT REGIONAL HOSPITAL/MEDICA L CENTER IN THE COUNTRY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Mental illness is now considred a world-wide menace, that by year 2003 is may become one of the leading causes of morbidity. The stress of fast living in a world with rapid changes in the lifestyle of Filipinos lead to the development ofmental illness. > Establishing a Department of Psychiatry in every regional hospital/medica l center will decongest the overpopulated National Center for Mental Health in Mandaluyong City, thus reving the financial burden of patients and relatives accompanying them who have to travel to Metro Manila for purposes of medical confinement and hospitalization ."

