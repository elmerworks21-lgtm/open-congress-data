congress_website_title = "AN ACT IMPOSING A CAP ON THE LOAN OBLIGATIONS OF LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE THE \\\"LOCAL GOVERNMENT CODE OF 1991,\\\" AS AMENDED"
congress_website_abstract = "Under the Local Government Code of 1991, local government units (LGUs) are allowed to incur indebtedness and avail of credit facilities to finance local infrastructure and other socio-economic development projects in accordance with the approved local development plan and public investment program. This bill seeks to put a cap on the total accumulated indebtedness of LGUs in order not to unduly burden their finances with debt payments."
