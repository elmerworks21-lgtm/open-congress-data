congress_website_title = "AN ACT INSTITUTIONALIZ ING THE OPEN HIGH SCHOOL SYSTEM IN THE PHILIPPINES, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The open high school system delivers educational services to high school students utilizing print, radio, television and computer-based communications, satellite broadcasting, teleconferencin g and other multi-media learning and teaching technologies that allow students to study on their own without having to regularly attend classes in conventional classrooms. This alternative learning system is consistent with the constitutional mandate to democratize access to quality education at all levelseven as it \"recognizes the vital role of the youth in nation-building .\""
