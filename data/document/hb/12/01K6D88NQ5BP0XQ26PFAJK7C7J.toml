congress_website_abstract = "Section 5, Chapter 1 of Batas Pambansa Bilang 129, otherwise known as \"The Judiciary Reorganization Act of 1980,\" is hereby amended to read as follows: >\"SEC. 5. Succession to the Office of Presiding Appellate Justice. - In case of a vacancy in thePresiding Appellate Justice, THE ASSOCIATE APPELLATE JUSTICE WHO IS FIRST IN PRECEDENCE SHALL BE APPOINTED TO THE POSITION. [or in] In the event of [his] The absence or inability OF THE PRESIDING APPELLATE JUSTICE to perform the powers, functions, and duties of his office, the Associate Appellate Justice who is first in precedence shall perform his powers, functions and duties until such disability is removed[,]. [or another Presiding Appellate Justice is appointed and qualified.] >A new sectionn, designated as Section 5-A, shall be inserted between Section 5 and Section 6 of the same law to read as follows: >\"SEC. 5-A. REMOVAL FROM OFFICE OF THE MEMBERS OF THE COURT OF APPEALS.- THE PRESIDING APPELLATE JUSTICE AND ASSOCIATE APPELLATE JUSTI"
