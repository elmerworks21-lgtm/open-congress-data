congress_website_title = "AN ACT PROMOTING THE DEVELOPMENT, UTILIZATION AND COMMERCIALIZATI ON OF RENEWABLE ENERGY SOURCES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Renewable Energy Act of 2003.\" Rationale: Our country has an immense form of indigenous energy resources that can be harnessed and utilized to mitigate the country's dependence on imported fuel. These renewable energy resources, which include biomass, solar, wind, geothermal, hydro and ocean energy, and other emerging energy sources, are abundantly available but not fully utilized. This bill, tehrefore seeks to promote production, commercializati on and utilization of renewable energy systemsusing indigenous resources to support the sustainable economic growth of the country."
