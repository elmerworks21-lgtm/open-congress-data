congress_website_title = "AN ACT ALLOWING MARRIED OR LEGALLY SEPARATED WOMEN TO USE THEIR MAIDEN FIRST NAME AND SURNAME, AMENDING FOR THE PURPOSE ARTICLES 370 AND 372 OF REPUBLIC ACT NO. 386, AS AMENDED, OTHERWISE KNOWN AS THE CIVIL CODE OF THE PHILIPPINES, AND ARTICLE 63 EXCUTIVE ORDER NO, 209, SERIES OF 1987, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: By allowing Filipino women to retain their surnames during their marriage, or even after a decree of legal separation has been granted, we not only keep their individuality, but also adhere to the Constitutional precept of \"fundamental equality\" of men and women before the law."

