congress_website_abstract = "Any provision of existing law to the contrary notwithstanding , an employee, whether permanent or temporary, of the National Government, its branches, agencies and instrumentaliti es, including local governments, and of government-owne d and/or controlled corporations and their subsidiaries, shall be entitled to thirty (30) days vacation leave and thirty (30) days sick leave with full pay, exclusive of Saturdays, Sundays and Holidays, for each calendar year of service."

