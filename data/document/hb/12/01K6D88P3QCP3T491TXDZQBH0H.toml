congress_website_title = "AN ACT AMENDING SECTIONS 141, 142, 143, 144 AND 145 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997 (RE: INDEXATION OF SIN TAXES)"
congress_website_abstract = "This bill intends to bring back the value of tax rates for alcohol and tobacco products to their 1997 LEVEL through the process of INDEXATION. > Allowing indexation and reclassificatio n will ensure that the tax rate on said products is maintainedat their real original levels despite the impact of inflation. The process of indexation and reclassificatio n will be made transparent and clear to ensure that it is fair and equitable to all products, whether these are brands existing in 1997 or new brands that have emerged since then."

