congress_website_title = "AN ACT INCREASING THE EXCISE TAX RATES ON CIGARS AND CIGARETTES BY THREE PERCENT (3%) EVERY YEAR FOR FIVE (5) YEARS, AMENDING FOR THE PURPOSE SECTION 145 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "To help generate much-needed revenues for the government, this bill seeks to increase the excise taxes on cigars and cigarettes and other tobacco products. It also proposes the retention of the four-tier specific system wherein the tax is based on the quality and retail prices of the different tobacco products available in the market. The retention of the four-tier tax system will prevent the collapse of the tobacco industry upon which more than a hundred thousand farmers in the North depend for their livelihood and survival."

