congress_website_title = "AN ACT CREATING THE NATIONAL COMMISSION ON MUSLIM AFFAIRS AND DEVELOPMENT, DEFINING ITS POWERS, FUNCTIONS AND RESPONSIBILITIE S AND APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The State shall ensure that all sectors of society benefit from its development programs as well as guarantee and protect the interests of those who belong to minority groups, especially the Filipino Muslims and shall extend to them the highest level of development efforts as well as secure the preservation of the rich cultural heritage of these people."
