congress_website_title = "AN ACT INSTITUTING THE DANGEROUS DRUGS ACT OF 2001 REPEALING REPUBLIC ACT NO. 6425, AS AMENDED"
congress_website_abstract = "This bill seeks to AMEND the provisions of the Dangerous Drugs Act of 1972 to make it more effective in addressing the drug problem in our society the extent of which, at present, has already assumed very severe and alarming proportions. > To curb the incessant surge in the crime rate brought about by drug-related incidents, authorities need stronger measures to combat the drug menace in the form of a law that encompasses a wider scope and provides stiffer penalties for offenders."
