congress_website_title = "AN ACT GRANTING ADDITIONAL RETIREMENT BENEFITS TO MEMBERS OF THE JUDICIARY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO, 910, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It is of common knowledge that the remuneration accorded to the Justice of the Supreme Court and Court of Appeals and other members of the Judiciary is indecently low. In response to the call of duty in the administration of justice, most of them have had to forego lucrative opportunities elsewhere. The existing retirement laws, foremost of which is Republic Act No. 910, as amended, are unresponsive to the rapidly changing economic conditions. The proposed bill seeks to upgrade these retirement benefits and redefine the retirement condition on the length of service to the government."
