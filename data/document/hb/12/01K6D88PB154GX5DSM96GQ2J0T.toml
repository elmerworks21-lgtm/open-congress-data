congress_website_title = "AN ACT PROVIDING FOR THE INCLUSION OF ALL ELECTRIC COOPERATIVES ORGANIZED AND EXISTING UNDER PRESIDENTIAL DECREE NO. 269, AS AMENDED, AND REGISTERED WITH THE NATIONAL ELECTRIFICATION ADMINISTRATION (NEA) WITHIN THE COVERAGE OF TAX EXEMPTION PRIVILEGES AND INCENTIVES, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Sections 193 and 234 of the Local Government Code provide for the withdrawal of tax exemption privileges from electric cooperatives not registered with the Cooperative Development Authority. Such cooperatives are required to pay real property taxes and other fees being imposed by the local government units concerned. The withdrawal of the tax exemptions has resulted in heavy financial burdens which the cooperative, in turn, pass on to consumers. This bill seeks to grant tax exemption privileges and incentives to all electric cooperative organized and existing under P.D. No. 269, as amended, and registered with the National Electrification Administration."

