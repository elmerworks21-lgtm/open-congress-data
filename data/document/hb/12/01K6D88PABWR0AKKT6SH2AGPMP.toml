congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE REAL ESTATE BUYERS' PROTECTION DIVISION AT THE HOUSING AND LAND USE REGULATORY BOARD (HLURB), CREATING ITS POWERS AND FUNCTIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The bill seeks to establish the Philippine Real Estate Buyers' Insurance Division (Division) under the Housing and Land Use Regulatory Board. The Division shall have the power to compel the execution of an escrow agreement where all payments or reservation deposits made by purchasers before construction is completed shall be held in escrow to guarantee the immediate refund of said amount in case of failure to deliver by the builders and/or developers."

