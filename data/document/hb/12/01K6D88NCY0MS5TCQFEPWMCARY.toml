congress_website_title = "AN ACT MANDATING THE COMPUTERIZATION OF GOVERNMENT TRANSACTIONS AND PROCEDURES"
congress_website_abstract = "All government transactions shall, to the extent possible, be conducted with the use of computer technology in lieu of manual procedures and systems. The National Computer Center shall design, install and maintain, with private sector participation, the necessary computer systems in all government offices over a period of one year and upon the implementation of this Act."

