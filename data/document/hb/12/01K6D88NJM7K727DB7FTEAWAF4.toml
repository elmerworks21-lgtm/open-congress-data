congress_website_title = "AN ACT ESTABLISHING A NATIONAL PROGRAM FOR FILIPINO GIFTED AND SCIENCE ORIENTED CHILDREN, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This proposed measure aims to establish a national program for the Filipino gifted and science oriented children pursuant to the 1987 Constitution. A Center with its own Excutive Council shall be created to ensure the effective coordination and implementation of the said program with the objective of identifying the gifted and science oriented from ages 3 to 16; and providing them with development opportunities, scholarship grants and other forms of assistance to realize their full potentials."

