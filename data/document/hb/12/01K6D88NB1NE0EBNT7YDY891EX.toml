congress_website_title = "AN ACT EXEMPTING FROM TAXATION ALL DONATIONS, GRANTS OR GIFTS TO NON-STOCK AND NON-PROFIT EDUCATIONAL INSTITUTIONS"
congress_website_abstract = "Any provision of law to the contrary, all monetary contributions and the equivalent monetary value of properties donated, granted or bestowed to non-stock and non-profit educational institutions are tax-exempt and deductible from the taxable incomeof the donor. Provided, that such donations, grants, endowments or contributions shall be used actually, directly and exclusively for the primary educational purposes of the recipient. Provided, further, that not more thab twenty-five percent (25%) of the donations, grants, endowments or contributions shall be used for administrative purposes."
