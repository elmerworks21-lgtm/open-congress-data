congress_website_title = "AN ACT PROVIDING FOR A LIMITED WARRANTY FOR ALL PUBLIC WORKS PROJECTS AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposes to impose a limited warranty for all contractors handling public works projects. The purpose of this bill is to stop this heartless practice of contractors in constructing below-average projects. The solution proposed is to require these contractors to give a warranty that their projects will withstand the regular wear and tear due to ordinary usage over a certain period of time."
