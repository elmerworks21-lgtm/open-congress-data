congress_website_title = "AN ACT PRIORITIZING THE DEVELOPMENT OF THE GARMENT AND TEXTILE INDUSTRY IN THE COUNTRYSIDE, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NO. 823, AS AMENDED, AND EXECUTIVE ORDER NO. 952"
congress_website_abstract = "This bill seeks to give the garment manufacturers in the regions outside the capital region priority in the distribution of the export quota to decongest the national capital region. The mandate should be that NO quotas be granted to the capital region unless and until the request for \"bids\" from the other regions are granted, on annual basis, to the extent of their historical peak capacities. It becomes imperative that the membership of the GTE Board must be EXPANDED to include the private stake players in the industry."
