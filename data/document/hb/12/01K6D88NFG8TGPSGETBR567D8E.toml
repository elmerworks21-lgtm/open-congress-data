congress_website_title = "AN ACT REQUIRING BLOOD BANK INSTITUTIONS, HOSPITALS OR HEALTH FACILITIES TO CONDUCT PRELIMINARY BLOOD EXAMINATIONS ON ALL BLOOD DONORS PRIOR TO THE ACT OF DONATION, PRESCRIBING STIFFER PENALTIES FOR VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "It is hereby declared the policy of the State to regulate the donations of blood, both government and privately-owned commercial blood banks, hospitals or health facilities, and promote the safe method of such acts of donation for the purpose of advancing good and secure health for the nation. Toward this end, the State shall encourage widest participation among concerned government and non-government instrumentaliti es and agencies in the mobilization of a well-informed citizenry."
