congress_website_title = "AN ACT PENALIZING THE PROVISION OF FIREARMS, AMMUNITIONS, EXPLOSIVES, CHEMICAL, BIOLOGICAL OR NUCLEAR WEAPONS OR ANY PARTS OR COMPONENTS USED IN THE MANUFACTURE THEREOF TO ENEMIES OF THE STATE"
congress_website_abstract = "This measure establishes the crime of provision of firearms, ammunitions, explosives, biological and nuclear weapons or parts thereof by any person to enemies of the state and imposes stiff penalties for its violation. It also penalizes the failureto report the commission of such crime despite knowledge thereof. It is therefore, an important measure against terrorism and other forms of criminality which thrive through the proliferation of illegally procured firearms and ammunitions."
