congress_website_title = "AN ACT CREATING A NATIONAL TRANSPORTATION SAFETY BOARD, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Transportaiton Safety Act of 2002\". The importance and necessity of a safe transportation system in the country cannot be overemphasized. This measusre proposes the creation of the National Transportation and Safety Board (NTSB), which shall be an independent and non-regulatory agency taske to ensure thorough and impartial investigations of transporation accidents. The NTSB shall primarily be responsile for the analysis, evaluation and prevention of air, highway and marine transportation accidents, including railway and pipeline systems, to effectively promote of safety and prevent the loss of life and property."
