congress_website_title = "AN ACT GRANTING INCENTIVES AND BENEFITS TO RURAL HEALTH DOCTORS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Rural Health Doctors Benefits and Incentives Act of 2001\\\". The absence or shortage of doctors in the rural areas can be attributed to the lack of opportunities for rural doctors to provide for a comfortable and secure life for their families. Majority of our competent and dedicated doctors are concentrated in urban areas or even abroad where the earnings are higher and the benefits more attractive. This brain drain creates a vacuum in the rendering of health care in rural areas. This bill seeks to boost the recruitment and retention of rural health doctors by granting them additional incentives and benefits."
