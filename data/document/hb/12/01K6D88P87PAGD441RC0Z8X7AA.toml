congress_website_title = "AN ACT CHANGING THE SCHOOL OPENING AND BEGINNING OF CLASSES TO THE FIRST MONDAY OF SEPTEMBER OF EVERY SCHOOL YEAR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to move the school opening and beginning of classes to the first Monday of September of each year for the following reasons : a) to make the school opening consistent with the rest of the world; b) to avoid the difficulties experienced by school children due to rainy months and floods; and c) to allow the SARS (Severe Acute Respiratory Syndrome) epidemic to pass over during the months of June, July and August, allowing our health authorities to contain, abate and develop remedies for SARS."
