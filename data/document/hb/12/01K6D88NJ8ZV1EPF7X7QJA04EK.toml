congress_website_title = "AN ACT AMENDING SECTION TWENTY-NINE OF BATAS PAMBANSA BLG. ONE HUNDRED TWENTY-NINE, OTHERWISE KNOWN AS JUDICIARY REORGANIZATION ACT OF 1980"
congress_website_abstract = "Rationale: From the standpoint of maintaining the proper faith in the administration of justice, the job of the lower court (MTCC) judges is the hardest and the most important. They are always confronted with several problems in every disputes brought to them to decide. One of the most nagging problem of our judiciary today is the congestion in the various courts caused by the increased number of cases which clog its dockets, due mainly to the expanded jurisdiction of the MTCC as provided forin RA 7691."
