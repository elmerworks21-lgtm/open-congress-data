congress_website_title = "AN ACT TO PRESERVE THE BUILT HERITAGE AND CULTURAL LANDSCAPES OF THE COUNTRY, PROVIDING FOR THE CREATION OF THE NATIONAL LANDMARKS COUNCIL AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Built Heritage Conservation Act of 2001\". Built heritage represents a facet of Philippine culture that blends artistic principles with practical purpose. This law recognizes the immediate need to protect rapidly vanishing structure or cultural landscapes pursuant to the 1987 Constitution which provides that all othe country's artistic and historic wealth constitutes the cultural treasure of the nation and shall be under the protection of the State which may regulate its disposition. >While recognizing the right of individual ownership, this law seeks to recognize a greater communal right and strives to attain a balance between both needs, to attain the greater good. A NATIONAL LANDMARKS COUNCIL is hereby created for this purpose."

