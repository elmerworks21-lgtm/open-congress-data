congress_website_title = "AN ACT TO ABOLISH THE PROVISION OF AUTOMATIC TERMINATION OF SUBSEQUENT MARRIAGE BY THE RECORDING OF THE AFFIDAVIT OF REAPPEARANCE OF THE ABSENT SPOUSE, AMENDING FOR THE PURPOSE ARTICLE 42 OF THE FAMILY CODE"
congress_website_abstract = "Rationale: Article 42 of the said Code which provides for an automatic termination of subsequent marriage \"by the recording of the affidavit of reappearance of the absent spouse,\" however, appears to be in congruent with the spirit to which the Family Code of the Philippines was conceived. So that while it adheres to the contemporary trends and conditions, the specific provision in Article 42 of the Code does not simply manifest so, for it denies the right of the contracted party to exercise his/her optional prerogative to which marriage he/she feels more duty bound considering his/her existing condition. The proposed bill justly gives the contracted party, given the former acted in good faith, the legal right to exercise an optional preroogative in his/her current marriage."
