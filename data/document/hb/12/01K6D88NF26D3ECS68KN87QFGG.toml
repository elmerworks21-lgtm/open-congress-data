congress_website_title = "AN ACT DECLARING ALL OFFICIAL NON WORKING DAYS TO FALL EITHER ON A MONDAY OR A FRIDAY"
congress_website_abstract = "This bill seeks to declare all official non-working days to fall either on a Monday or a Friday. It aims to prevent the happening of having \"sandwiched\" days. This will have a pleasant effect not merely to the business environment but likewise to the fields of education, government and social services."

