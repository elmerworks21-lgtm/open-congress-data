congress_website_title = "AN ACT ESTABLISHING GENERAL GUIDELINES FOR USE OF THE TERM `HALAL' AND INSTITUTING THE COMPREHENSIVE AND INTEGRATED PHILIPPINE HALAL CERTIFICATION AND ACCREDITATION SYSTEM FOR FOOD AND OTHER PRODUCT EXPORTS, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Halal Act of 2001\". The term \"HALAL\" means \"lawful\", as pertaining to food or products permitted to human consumption under Shariah Law.> This bill establishes the GENERAL GUIDELINES on the preparation, handling and verification of Halal products --- food, beverage, cosmetics, garments and textile --- to serve as BASIC requirement for certification. This includes the accreditation of abbatoirs and outlets."
