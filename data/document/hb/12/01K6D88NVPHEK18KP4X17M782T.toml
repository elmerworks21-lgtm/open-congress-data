congress_website_title = "AN ACT INCREASING THE BENEFITS OF MEMBERS, THEIR DEPENDENTS AND PENSIONERS OF THE GOVERNMENT SERVICE INSURANCE SYSTEM, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The Government Service Insurance System (GSIS) shall increase the benefits granted to its members as follows: (1) Life insurance by Fifty percent (50%) of what is being provided at present. (2) Salary loan by thirty percent (30%) in addition to present amount of loans being granted at present; and (3) Monthly pension of retirees - Five hundred percent (500%) of the Pension granted at present."

