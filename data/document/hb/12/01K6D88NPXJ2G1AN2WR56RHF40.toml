congress_website_title = "AN ACT ELEVATING THE PHILIPPINE NORMAL UNIVERSITY TO BECOME THE COUNTRY'S NATIONAL UNIVERSITY FOR TEACHER EDUCATION; ESTABLISHING A SYSTEM OF NATIONAL TEACHER TRAINING AND DEVELOPMENT; APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Normal University (PNU) Modernization Act of 2001\". The bill seeks to establish a national system of teacher training and development which will provide all teachers opportunities for in-service training programs in: (1) using information and communication technology (ICT) to improve the teaching and learning processes; (2) continuing professional education and development by strengthening teacher competencies in various field of specializations ; (3) introducing innovative strategies and modalities of teaching and learning; etc."
