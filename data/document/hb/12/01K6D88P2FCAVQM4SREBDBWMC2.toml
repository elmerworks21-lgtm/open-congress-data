congress_website_title = "AN ACT DECLARING MAY 7 OF EVERY YEAR AS `HEALTH WORKERS' DAY'"
congress_website_abstract = "In order to give due recognition to the important role and contributions of the health workers who provide vital health services to our pople and to promote their rights and welfare and enhance their sense of worth and dignity, May 7 of every year is hereby declared as a special working holiday to be known as \\\"Health Workers' Day.\\\" > The term \\\"health workers\\\" covers all persons engaged in health and health-related services, including medical and allied professional and support services personnel, who work in hospitals, sanitaria, health centers, clinics and other health-related establishments in the public and private secots."
