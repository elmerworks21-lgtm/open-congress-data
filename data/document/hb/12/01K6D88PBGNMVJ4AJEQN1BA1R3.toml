congress_website_title = "AN ACT REQUIRING THE SOCIO-CULTURAL IMPACT ASSESSMENT OF PLANNED TOURISM PROJECTS IN DESTINATIONS INHABITED BY INDIGENOUS PEOPLES, ENSURING THAT THE TOURISM DEVELOPMENT PLAN IS GUIDED BY CULTURAL SENSITIVITY, SUSTAINABILITY, EQUITY AND RESPECT FOR INDIGENOUS PEOPLES AND THEIR RIGHT TO SELF-DETERMINATION"
congress_website_abstract = "\\\"The Socio-Cultural Impact Assessment Act of 2004\\\". In order to respect and protect the rights of indigenous cultural communities, this measure requires the mandatory conduct of social-cultural assessments as a precondition to any planned tourism development in areas inhabited by indigenous people. It also recommends the creation of a national body to ensure that the development plan for indigenous communities are guided by cultural sensitivity, sustainability, equity and respect for indigenous people."
