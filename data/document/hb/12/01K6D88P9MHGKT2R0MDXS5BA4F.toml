congress_website_title = "AN ACT PROVIDING FOR ADDITIONAL DISQUALIFICATION FROM VOTER REGISTRATION, AMENDING FOR THE PURPOSE SECTION 11 OF REPUBLIC ACT 8189, OTHERWISE KNOWN AS THE VOTER'S REGISTRATION ACT OF 1996"
congress_website_abstract = "Filipino soldiers swear to uphold, protect and defend the Constitution and to respect the supremacy of civilian authority over the military. When soldiers betray their duty to the Constitution by committing the crime of rebellion, mutiny or sedition, insurrection or coup d'etat, they are deemed to have renounced their rights and privileges under the same Constitution they chose to abandon. This bill proposes that such betrayal of constitutional duty, specially the crime of mutiny, insurrection or coup d'etat and other related crimes, be penalized with perpetual disqualification from voter registration. This disqualification from voter registration is tantamount to ineligibility to run for any public office."

