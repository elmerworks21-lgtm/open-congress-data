congress_website_title = "AN ACT REQUIRING ALL LAWS SCHOOLS AND COLLEGES TO INTEGRATE IN THEIR CURRICULUM A CONTINUING LEGAL EDUCATION PROGRAM FOR CITIZENS RESIDING IN DEPRESSED AREAS AND FOR OTHER PURPOSES"
congress_website_abstract = "All senior students of accredited schools and colleges of law are enjointed to conduct not less than forty-eight hours of teach-in classes to citizens residing in depressed areas or such other places than have a high population density. The subjectof these classes are limited to basic provisions in political and constitutional law."
