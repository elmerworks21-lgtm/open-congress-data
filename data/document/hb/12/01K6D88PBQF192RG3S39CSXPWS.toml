congress_website_title = "AN ACT PROVIDING FOR THE RIGHTS OF THE ACCUSED AND PERSONS UNDER INVESTIGATION FOR THE COMMISSION OF A CRIME, PROVIDING FOR CIVIL AND CRIMINAL PENALTIES IN CASE OF VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill incorporates and codifies existing provisions in the Rules of Court on arrest, detention, bail, preliminary investigation and inquest, as well as the provisions of special laws such as RA 7438. The bill also incorporates significant rulings on criminal procedure that have great impact on the protection of civil and political rights, particularly the right of the accused to humane treatment at the post arrest and pre-investigation stages. It also provides for penal sanctions for violations of the rights of a person during arrest and his right to counsel."
