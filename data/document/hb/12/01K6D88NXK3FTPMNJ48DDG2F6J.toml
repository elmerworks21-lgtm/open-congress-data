congress_website_abstract = "\"Philippine Fire Code of 2001\". Rationale: A critical component of these thrusts, therefore, is the immediate institution of an updated Fire Code to replace P.D. 1185, otherwise known as the Fire Code of the Philippines, which has ostensibly been rendered ineffective due to vague and antiquated provisions that emasculate their strict enforcement."

