congress_website_title = "AN ACT GRANTING THE SANGGUNIANG PANLALAWIGAN THE POWER TO CONDUCT INQUIRIES, IN AID OF LEGISLATION, IN ACCORDANCE WITH ITS DULY PUBLISHED RULES AND PROCEDURE, ISSUE SUBPOENA AND SUBPOENA DUCES TECUM, AND TO PUNISH FOR CONTEMPT ANY PERSON WHO REFUSESTO OBEY SUCH PROCESS, AMENDING FOR THIS PURPOSE SECTION 468 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: The Sangguniang Panlalawigan, as the highest law-making body of the province, will be more efficient and effective if it has the power to compel the attendance of witnesses in the conduct of investigation and inquiries in aid of legislation."
