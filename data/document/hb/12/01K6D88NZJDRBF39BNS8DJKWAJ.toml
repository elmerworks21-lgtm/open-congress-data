congress_website_title = "AN ACT AUTHORIZING THE BOARD FOR PROFESSIONAL TEACHERS TO ISSUE TEMPORARY OR SPECIAL PERMIT TO HOLDERS OF MASTER'S DEGREE IN EDUCATIONAL MANAGEMENT OR INSTRUCTIONAL LEADERSHIP, OR THEIR EQUIVALENT, TO ENGAGE IN TEACHING OR ACT AS PROFESSIONAL TEACHERS FOR A PERIOD OF TWO YEARS"
congress_website_abstract = "Rationale: Section 26 of RA 7836, the Philippine Teachers Professional Act of 1992, requires the registration of all teachers as professional teachers. With the expiration of the two-year period within which to register with examination and the five-year special or temporary permit, all teachers must now take and pass the licensure examination before they are allowed to engage in teaching or act as professional teachers. As a consequence, thousand of highly qualified holders of master's degreeare prevented from immediately applying their newly acquired skills, specialized trainings and modern concepts of teaching, to the detriment of education in the country.> In view of the foregoing considerations, approval of this bill is earnestly souught."
