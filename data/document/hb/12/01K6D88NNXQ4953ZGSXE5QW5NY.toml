congress_website_title = "AN ACT AMENDING ARTICLE 39 (A)(1) OF EXECUTIVE ORDER NO. 226 OTHERWISE KNOWN AS THE OMNIBUS INVESTMENT CODE OF 1987, AS AMENDED AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposes to extend the maximum period for the income tax holiday offered to especially desirable investors from eight (8) to twelve (12) years, subject to the approval of the Secretary of Finance, upon compliance with certain conditions. This extension merely tries to align the Philippines' income tax holidays to match that of our neighboring countries. By keeping pace with the incentives being offered by other countries, we stand a sufficiently even chance of attracting investmentsand partners that will be crucial in our drive for development."

