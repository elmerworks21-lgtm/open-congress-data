congress_website_title = "AN ACT PENALIZING INFLUENCE PEDDLING AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Influence Peddling Act.\" It shall be unlawful for any person to engage in influence peddling which is hereby defined as the act of representing oneself, either orally or in writing, as being able, whether real or imagined, to influence, facilitate or assist another person having some business, transaction, application, request or contract with the government in which a public official or employee has to intervene. > Penalties for Violation. - Any person who engages in influence peddlingas defined by this Act shall be punished by imprisonment of not more than six (6) years or a fine not exceeding One Hundred Thousand (P100,000.00), or both, and disqualificatio n to hold public office."

