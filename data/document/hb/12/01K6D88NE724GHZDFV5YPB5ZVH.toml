congress_website_title = "AN ACT AMENDING SECTION 99 AND 262 OR BATAS PAMBANSA BLG. 881, AS AMENDED, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The Omnibus Election Code (RA 7166) failed to DECRIMINALIZE those acts with respect to persons making contributions to electoral candidates/poli tical parties. The bill, therefore seeks to remedy the situation by DECRIMINALIZING violations of Sections 98 and 99 of Batas Pambansa Blg. 881, As Amended, otherwise known as the \"Omnibus Election Code.\" The bill, nevertheless imposes on persons who violate these sections administrative fines similar to those provided in Section 14 of Republic Act No. 7166 which are imposed on candidates and political parties who fail to file a report on campaign contributions and expenditures. In addition to the fines, a contributor who fails to comply with Section 98 and 99 will not be able to claimm exemption from gift tax."
