congress_website_title = "AN ACT ESTABLISHING THE DRUG ENFORCEMENT ADMINISTRATION, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6425, AND FOR OTHER PURPOSES"
congress_website_abstract = "The Drug Enforcement Administration (DEA) shall merge the functions of separatae drug law enforcement agencies. Its mission is to enforce the controlled substances laws and regulations of the Philippines and bring to the criminal and civil justicesustem of the State, or any other competent jurisdiction, those organizations and principal members of organizations, involved in the growing, manufacture, or distribution of controlled substances appearing in or destined for illicit traffic on the Philippines. The DEA shall recommend and support non-enforcement programs aimed at reducing the availability of illicit controlled substances on the domestic and international markets."
