congress_website_title = "AN ACT PRESCRIBING THE MANNER OF ELECTION OF THE MEMBERS OF THE BOARD OF DIRECTORS OF THE PHILIPPINE VETERANS BANK AND AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NUMBERED THIRTY-FIVE HUNDRED AND EIGHTEEN AND REPUBLIC ACT NUMBERED SEVENTY-ONE HUNDRED AND SIXTY-NINE"
congress_website_abstract = "This bill prescribes a new system or manner in the election of the Board of Directors of the Bank and strips the Board of the Veterans of World WarII of the authority to vote for the issued but undelivered shares of the Bank. The system will serve to satisfy the desire of the stockholders for fairness and equity."

