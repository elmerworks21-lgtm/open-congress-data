congress_website_title = "OMNIBUS HOUSING AND URBAN DEVELOPMENT ACT"
congress_website_abstract = "\\\"Omnibus Housing and Urban Development Act of 2001\\\". Salient provision of this bill are as follows: (1) Creation of the DEPARTMENT OF HOUDING AND URBAN DEVELOPMENT; (2) Development of new towns to be undertaken by the Public Estates Authority; (3) Implementation of home lending and housing assistance programs, the GSIS, SSS and the House Development Mutual Fund; and (4) Creation of a SOCIAL HOUSING FUND for the low-income group."
