congress_website_title = "AN ACT ALLOCATING TWENTY-FIVE PERCENT (25%) OF TRAVEL TAX COLLECTIONS IN THE COUNTRY TO THE DEVELOPMENT AND PROMOTION OF TOURISM INDUSTRY IN THE TWENTY (20) DEPRESSED PROVINCES"
congress_website_abstract = "This bill seeks to allocate twenty-five percent (25%) of the travel tax collections being imposed under Presidential Decree No. 1183 to the development and promotion of tourism in the twenty (20) depressed provinces. > Capitalizing on the enormous potential of the tourism industry, the government has taken bold initiatives to maximize its contribution to the economy through the upgrading of roads, airports and seaports, deregulation of civil aviation, introduction of high-tech telecommunicati on services and brand new transport and recreational facilities. > The government has likewise included in its initiative the development of other potential tourist attractions in all provices, particularly in the twenty (20) depressed provinces identtified by the Office of the President."
