congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA OF AGRICULTURAL OFFICERS AND EMPLOYEES"
congress_website_abstract = "\"Magna Carta of Agricultural Officers and Employees of 2002\". Rationale: In a nation where more than half of the population relies on agriculture for livelihood and sustenance, the emancipation of our agricultural workers, which are the backbone ofthe country and the sustained grwoth of the countryside are both material and moral imperatives. This means designing and implementing policies that ensure social equity in order that delivery of basic services to the farmers and other sectors may beaffected alongside with economic opportunity and growth in the countryside. The agricultural officer is especially expected to perform the devolved functions in attaining its goal of teaching/assist ing the farmers of modern farm technology to uplifft their living conditions."

