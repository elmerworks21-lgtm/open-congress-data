congress_website_title = "AN ACT AMENDING ARTICLE 266-B OF REPUBLIC ACT NO. 8353, OTHERWISE KNOWN AS THE ANTI-RAPE LAW OF 1997, BY REDUCING THE PENALTY ON INCESTUOUS RAPE FROM DEATH TO RECLUSION PERPETUA"
congress_website_abstract = "Although Article 225-B, Act 3815, as amended, otherwise known as the Revised Penal Code, provides that death shall be imposed if the crime of rape is committed when the victim is under eighteen (18) years of age and the offender is a parent, ascendant, step-parent, guardian, relative by consanguinity or affinity within the third civil degree, or the common-law spouse of the parent of the victim, the tendency is that, the victim would hesitate to report the incident or file charges against her parent who raped her because the penalty is death or even if the charge is filed, she would not testify anymore. Hence, this bill provides (1) that item number one (1) of Art. 255-B of RA No. 8353 is DELETED; (2) that the following be ADDED TO \"When tthe victim is under eighteen (18) years of age and the offender is a parent, ascendant, step-parent, guardian, relative by consanguinity or affinity with the third civil degree, or the common-law spouse of the parent of the victim, the penalty shall"

