congress_website_title = "AN ACT PROVIDING FOR A NEW INVESTMENTS AND INCENTIVES CODE OF THE PHILIPPINES"
congress_website_abstract = "\"The Investments and Incentives Code of the Philippines.\" The primary investment policy of the State shall be the development of the national economy in consonance with the principles and objectives of achieving global competitiveness , fostering economic efficiency and encouraing and supporting investments that promote countrywide development and create productivity and quality employment. > The fiscal amendments will rationalize the grant of incentives that will be clear, simple, time-bound,performance based and at par with the regional countries. The Investment Priorities Plan (IPP) will include industries with high comparative advantage, new product/service and export oriented products and valid for a period of three (3) years. The inncentives include income tax holiday or net operating loss carry-over to registered enterprises, additional incentives for Ecozones and incentives to foreign nationals, among others. > All Investment Promotion Agencies (IPA) will draw their incentive"
