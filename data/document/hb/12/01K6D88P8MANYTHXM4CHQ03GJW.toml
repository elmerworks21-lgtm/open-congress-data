congress_website_title = "AN ACT CONSOLIDATING ADMIRALTY AND MARITIME LAWS TO MODERNIZE THE MARITIME INDUSTRY, PROMOTE AND REGULATE MERCHANT MARINE ACTIVITIES, RATIONALIZE THE ORGANIZATION AND FUNCTIONS OF GOVERNMENT AGENCIES RELATED TO ADMIRALTY AND MARITIME MATTERS, AND INSURE THE PROTECTION OF THE MARINE WEALTH IN THE PHILIPPINE TERRITORY"
congress_website_abstract = "\"Maritime Administration Act of 2001\". At present, the maritime administration functions of the government are spread over fourteen bureaus and agencies under seven departments resulting in bureaucratic entanglement, functional overlaps and conflicting laws and regulations. This bill aims to put an end to the fragmentation and overlapping of functions in the different government agencies and create a body that will be the central agency concerned with maritime administration. It seeks to solvethe multifarious problems plaguing the administration of the maritime sector."

