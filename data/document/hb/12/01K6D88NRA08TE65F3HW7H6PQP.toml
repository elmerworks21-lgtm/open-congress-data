congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE COAST GUARD AS A SEPARATE AND DISTINCT SERVICE ATTACHED TO THE DEPARTMENT OF TRANSPORTATION AND COMMUNICATIONS, FURTHER AMENDING REPUBLIC ACT NO. 5173, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Coast Guard Law of 2001\". Rationale: The US Coast Guard (USCG) is a military service and a branch of the armed forces of the United States at all times EXCEPT when operating as a service in the Navy, the USCG becomes a service in the Department of Transportation. This would be the closest model (among other several models of foreign countries) on maritime safety administration organization to our Philippine Coast Guard (PCG). In times of peace, the PCG shall be under the DOTC. Butin times of war or national emergencies, it shall be placed under the operational control of the Department of National Defense to render services."
