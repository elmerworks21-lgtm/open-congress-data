congress_website_title = "AN ACT CREATING THE DEPARTMENT OF ENVIRONMENTAL PROTECTION AND SANITATION, INTEGRATING THE DIFFERENT GOVERNMENT AGENCIES RELATED TO ENVIRONMENTAL PROTECTION AND SANITATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The growing problem on Solid Waste Management, Pollution on Air, Water and land, the outbreak of communicable diseases including dengue Fever has reached an alarming level, and yet, no solution seems to be on sight. An assessment on why these problems remain unabated would show that there is no single government agency in charge to implement and oversee the various existing Law on Environmental Protection and Sanitation."

