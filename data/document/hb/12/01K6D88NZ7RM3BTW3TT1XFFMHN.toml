congress_website_title = "AN ACT TO PROMOTE THE DEVELOPMENT, DELIVERY AND USE OF CONVERGENT SERVICES (convergence)"
congress_website_abstract = "\"Convergence Policy Act of the Philippines\". This convergence of telecommunicati ons and mass media technology and services has eventually resulted in inter-active multi-media technology services. However, a review of the applicable laws would reveal that there is an urgent need for new legislation to address the swift developments in telecommunicati ons and information services industries. to achieve this goal, this bill also removes unnecessary regulatory prohibitions and is pro-investment toprovide the sectors covered by convergence the necessary impetus in the form of needed capital and other incentives."
