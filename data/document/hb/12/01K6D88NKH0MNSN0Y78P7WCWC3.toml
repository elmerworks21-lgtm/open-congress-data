congress_website_title = "AN ACT PROVIDING FOR THE RECOVERY OF FINANCIALLY DISTRESSED ENTERPRISES AND THE RESOLUTION OF THEIR INDEBTEDNESS (corporate)"
congress_website_abstract = "\"Corporate Recovery Act.\" This bill represents a comprehensive approach to the complex problems faced by enterprises when they, for whatever reason, can no longer pay their debts as they come due. It combines the creation of substantive rights withrelatively detailed procedural guidelines that move cases through court-supervise d proceedings quickly. It emphasizes the survival of the enterprise while at the same time keeping paramount the rights of creditors with duly registered liens againstthe enterprise's assets."

