congress_website_title = "AN ACT PROHIBITING THE SALE OF CIGARS, CIGARETTES AND ALCOHOLIC OR INTOXICATING LIQUOR OR BEVERAGE TO MINORS"
congress_website_abstract = "\"Protection of Minors from Vices Act of 2001\". To protect the youth, this bill intends to deny minors access to these substances by banning the sale of tobacco and alcohol products to minors. It also penalizes persons who use minors to purchase saidproducts even for their personal consumption."
