congress_website_title = "AN ACT INCREASING THE AGE OF STATUTORY RAPE FROM TWELVE (12) TO SIXTEEN (16) YEARS OLD, AMENDING FOR THE PURPOSE ARTICLE 335 OF THE REVISED PENAL CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It is true that children ranging between 1 to 12 years old are such at a vulnerable stage of life. However, rape continues to be in the uptrend and the records speak for itself. In 1995 alone, rape accounts for 48% of all sexual abuse and, unmistakably, could have risen further. What strikes us is that majority of the victims were from 13 to 17 years old. Thus, the proposed amendment: \"Article 335. When and how rape is committed. Rape is committed by having carnal knowledge of a woman under any of the following circumstances: 1. By using force or intimidation; 2. When the woman is deprived of reason or otherwise unconscious; and 3. When the woman is under SIXTEEN (16) years of age or is demented.\""

