congress_website_title = "AN ACT INCREASING THE MEMBERS OF THE AGRARIAN REFORM ADJUDICATION BOARD, AMENDING SECTION 13 OF EXECUTIVE ORDER NO. 129-A, OTHERWISE KNOWN AS THE REORGANIZATION ACT OF THE DEPARTMENT OF AGRARIAN REFORM, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "The Department of Agrarian Reform Adjudication Board (DARAB), created under Executive Order No. 129-A, is the quasi-judicial body with the primary jurisdiction of hearing and determining all agrarian disputes except those pertaining to the determination of just compensation and resolution of criminal offenses arising from the implementation of agrarian laws. Given the increasing volume of agrarian cases, it appears that the present composition of the DARAB and its procedure for resolving appealed cases is no longer adequate. If passed, this legislation would (1) increase the membership of the DARAB, (2) allow farmer-paralega ls to appear before the DARAB and use their own dialect or language, and (3) mandate the regular courts to refer aggrarian cases to DAR and DARAB and dismiss cases that are intended to merely harass farmers."
