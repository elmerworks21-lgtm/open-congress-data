congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 8550, OTHERWISE KNOWN AS THE PHILIPPINE FISHERIES CODE OF 1998, PROVIDING STIFFER PENALTIES FOR VIOLATION OF FISHERIES AND ENVIRONMENTAL LAWS AND STRENGTHENING THE PROSECUTION OF OFFENSES"
congress_website_abstract = "The Philippine Fisheries Code of 1998 has the declared policy of limiting access to Philippine fishery and aquatic resources for the exclusive use and enjoyment of Filipino citizens. However, foreign vessels enter our territory to fish and even catch our endangered species. These poachers not only illegally fish in our waters but they also employ destructive means of fishing thereby ravaging our marine life. This bill aims to deter poaching activities in out territory by increasing the penalties therefor and to eradicate, if not minimize, the legal loopholes that have been taken advantage of by the poachers."

