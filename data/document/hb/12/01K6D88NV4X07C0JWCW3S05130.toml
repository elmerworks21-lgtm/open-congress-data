congress_website_title = "AN ACT PROHIBITING DISCRIMINATION ON ACCOUNT OF GENDER, SEXUAL ORIENTATION, AGE, RELIGION, ETHNIC OR CULTURAL GROUP, OR PHYSICAL APPEARANCE IN PUBLIC OR PRIVATE EMPLOYMENT OPPORTUNITIES, TENURE, OR PROMOTIONS AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Any provision of existing laws to the contrary notwithstanding , it shall be unlawful for an employer to discriminate against employees or job applicants on account of their gender, sexual orientation, age, religion, ethnic or cultural group, or physical appearance in regard to their recruitment, employment, promotion and dismissal in public or private employment. >The provision of the preceding paragraph notwithstanding , only officers and agents of the corporations, agencies, departments, associations or partnerships who have actually participated in, authorized or tolerated shall be held criminally liable. >Any violation of this Act shall be punished with a fine of not less than five thousand pesos (P5,000.00) but not more than twentythousand pesos (P20,000.00), or imprisonment of not less than three (3) months but not more than two (2) years, or both, upon the discretion of the Court. >Any provision of law to the contrary notwithstanding , any criminal offense punished in this A"

