congress_website_title = "AN ACT ALLOWING GRADUATES OF PHILIPPINE SCHOOLS OF MEDICINE, NURSING, DENTISTRY AND MED-TECH WHO HAVE NOT TAKEN THEIR BOARD EXAMS IN THE PHILIPPINES BUT WHO HAVE PASSED THE STATE BOARD EXAM IN THE UNITED STATES OF AMERICA TO PRACTICE THEIR PROFESSION IN THE PHILIPPINES"
congress_website_abstract = "The Philippines has been experiencing a brain drain in the Medical, Nursing, Med-Tech and Dental professions. In view of this, the country is losing so much in terms of expertise and services that these professionals would have been able to render if they did not chose to leave our country. This bill is envisioned to provide a way by which this problem maybe countered aside from the fact that our people would be able to take advantage of the expertise that these professionals have earned whilepracticing their respective professions abroad."
