congress_website_title = "AN ACT REORGANIZING THE PHILIPPINE STATISTICAL SYSTEM"
congress_website_abstract = "The proposed bill aims to (1) ensure the independence of the statistical system to strengthen its credibility; (2) create a Commission that has equal representation from the public and private sectors; (3) respond to information needs of the new millennium; and (4) address the current statistical problems relating to data gaps and inconsistencies , duplication of statistical activities, date reliability, and timeliness and relevance of generated and processed data."

