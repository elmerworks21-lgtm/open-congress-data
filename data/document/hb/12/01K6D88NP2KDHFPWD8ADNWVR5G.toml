congress_website_title = "THE SOLAR CONVERSION POWER SYSTEMS ACT OF 2001"
congress_website_abstract = "The attached bill aims to encourage the large-scale operation of solar energy systems by mandating the Department of Energy, in coordination with other offices, to design a program that will facilitate and accelerate the introduction, development and manufacture in the Philippines of advanced technology state-of-the-ar t solar conversion power systems. >Solar energy should be promoted in the Philippines to produce electricity, especially in remote areas because of the abundant supply of sunshine and it is more environment-fri endly. Solar power gives no omissions and is more sustainable than other traditional use of energy. >Incentives and ebenfits in the form of exemptions from all taxes, with certain exceptions, and import duties are prrovided in the bill."
