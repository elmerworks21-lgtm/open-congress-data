congress_website_title = "AN ACT GRANTING THE RIGHT OF REPLY AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "This bill guarantees the right of any person, natural or juridical, who are accused of committing having committed or of intending to commit any crime or offense defined by law of are criticized by innuendo, suggestion or rumor for any lapse in behavior in public or private life, to reply to the charges published or printed in newspapers, magazines, newsletters or publications, or criticisms aired or broadcast over radio, television, websites, or through any electronic device. > The reply of the person so accused or criticized shall be published in the same space of newspapers, magazines, newsletter or publication or aired over the same program on radio, television, website, or through any electronic device not later than one day after thhe reply shall have been delivered to the editorial office of publication concered or to the station that carried the broadcast being replied to."
