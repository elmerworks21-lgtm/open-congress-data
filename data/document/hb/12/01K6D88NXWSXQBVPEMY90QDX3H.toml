congress_website_title = "AN ACT GRANTING RETIREMENT BENEFITS TO DESERVING FILIPINO ATHLETES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Filipino athletes, who have brought honor and prestige to the Philippines by being world champions or gold medallists in internationally -acclaimed professional or amateur competitions, shall,upon reaching the age of sixty years, be entitled to retirement benefit in the amount of TEN THOUSAND PESOS (P10,000.00) per month."

