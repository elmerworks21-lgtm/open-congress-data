congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 7202, OTHERWISE KNOWN AS THE SUGAR RESTITUTION LAW AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It has been six years since the enabling of the Sugar Restitution Act. Yet to the continued frustration of what remains of the sugar industry today, no actual and tangible recource has been made available to anyone. It is against this backdrop the amendments to R.A. 7202 are herein proposed to provide teeth and easy accountability towards its quick and full implementation. > Section 2 of R.A. 7202 shall be amended to include a specific procedure in the sourcing and allotments of funds as well as to outline incentives towads paradigm shifting to consider alternative high-value crops."
