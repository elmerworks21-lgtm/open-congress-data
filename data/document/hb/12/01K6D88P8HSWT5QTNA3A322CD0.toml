congress_website_title = "AN ACT AUTHORIZING GOVERNMENT HOSPITALS TO UTILIZE ALL ITS INCOME FOR THEIR MAINTENANCE AND OTHER OPERATING EXPENSES AND FOR OTHER PURPOSES"
congress_website_abstract = "The practice of disallowing government hospitals from spending their income for maintenance and other operating expenses restricts their ability to respond to the needs of their clients. It also dampens the initiative of the hospital adminstrator toexpand and improve their services. This is perceived to be one of the reasons why government hospitals are unable to deliver adequate and timely health services. Utilization of their income can augment the budget appropriated to them by the nationalor local government. The bill provides that government hospitals shall be authorized to utilize income derived from pharmacy, laboratory, radiology, operating room, nursery and other facilities plus income derived from non-patient related services ffor maintenance and other operating expenses including capital outlay."
