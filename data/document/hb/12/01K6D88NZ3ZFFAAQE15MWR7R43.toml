congress_website_title = "AN ACT ESTABLISHING THE STATE UNIVERSITIES AND COLLEGES DEVELOPMENT AUTHORITY (SUCDA) AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "There shall be established a government agency called the State Universities and Colleges Development Authority (SUCDA) for the purpose of making the operations of the SUCs more effective and efficient with quality and excellent outputs.> Rationale:This bill separates the SUCs from the Commission on Higher Education. Since 85% of the country's higher education institutions are in the hands of the private sector, the Commission on Higher Education may need to concentrate more on this aspect. There is therefore the danger that the further development of the SUCs may be neglected since public tertiary institutions constitute only 15% of the entire higher education system. The magnitude of the government outlay for the SUCs alone justifies thhe establishment of the separate agency to oversee, supervise and to maximize the returns of this investment."
