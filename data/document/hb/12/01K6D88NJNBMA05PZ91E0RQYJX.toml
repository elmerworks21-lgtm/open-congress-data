congress_website_title = "AN ACT GRANTING SPECIAL INCENTIVES TO PUBLIC PROSECUTORS IN ORDER TO ENCOURAGE THEM TO PERFORM THEIR DUTIES WELL, APPROPRIATING NECESSARY FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "In recognition of their contribution in the fight against crime, state prosecutors, provincial prosecutors and city prosecutors of the DOJ and special prosecutors of the Office of the Ombudsman who successfully litigate criminal cases involving violation of the Revised Penal code in a full-blown trial court are hereby granted an incentive bonus of the One Thousand Pesos (P1,000.00) per case won if the work is completed within six (6) months from the date of arragement. > Those who are duly deputized by other government agencies, such as, but not limited to the Ofrfice of the Solicitor General and the Office of the Ombudsman shall be entitled to an allowance in the amount determined by the deputizing office: Provided, That the allowance tobe given by each deputizing office shall not exceed fifty percent (50%) of the basic pay of the prosecutors."
