congress_website_title = "AN ACT ESTABLISHING NATIONAL CEMETERIES AND PROVIDING FOR THEIR ADMINISTRATION AND MAINTENANCE"
congress_website_abstract = "There shall be established at least one (1) National Cemetery in each Region and major island to serve as a memorial and final resting place for veterans, military personnel and citizens who have rendered distinguished service to the nation. > The President of the Philippines shall establish each National Cemetery by individual Presidential Proclamation which shall set aside a portion of government land for the purpose."
