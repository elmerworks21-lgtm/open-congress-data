congress_website_title = "AN ACT PROHIBITING THE TRANSFER OF ANCESTRAL LAND BELONGING TO THE INDIGENOUS PEOPLE TO NONMEMBERS, AMENDING SECTION 8 OF REPUBLIC ACT NO. 8371, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"SEC. 8. Rights to Ancestral Lands. - The right of ownerhsip and possession of the ICCs/IPs to their ancestral lands shall be recognized and protected. > a) Right to transfer land/property. - Such right shall include the right to transfer land or property rights to/among members of the same ICCs/IPs , subject to customary laws and traditions of the community concerned. ANY SALE, TRANSFER OR ENCUMBRANCE OF THE ANCESTRAL LAND MADE BY AN IP IN FAVOR OF NON-MEMBERS OF THE ICC CONCERNED SHALL BE VOID."

