congress_website_title = "AN ACT EMPOWERING THE LOCAL SCHOOL BOARDS TO SCREEN AND RECOMMEND THE APPLICANTS TO TEACHING POSITIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The Local School Boards are hereby empowered to screen and recommend applicants to any teaching position in the Department of Education, Culture and Sports, hereinafter referred to as the Department. Provided, however, That the applicant possesses the necessary qualifications and standards including the ranking system, set by the Department."

