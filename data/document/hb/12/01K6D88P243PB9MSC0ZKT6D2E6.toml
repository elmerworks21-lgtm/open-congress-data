congress_website_title = "AN ACT REQUIRING THE REGISTRATION OF MEDICAL TECHNOLOGISTS, DEFINING THEIR PRACTICE, AND OTHER PURPOSES"
congress_website_abstract = "Rationale: Rapid increase in population growth and corresponding complexities in Filipino lifestyle create huge demand for laboratory tests as more and new diseases afflict Filipinos. It is therefore vital to institute the necessary support mechanisms in order to help these group of laboratory personnel, whose work constitute among others, examination of body fluids, tissues, and cells, and conduct tests for drug levels in the blood. > This bill seeks to update R.A. No. 5227, otherwise known asthe Medical Technology Act to help Medical Technologists conform to the needs of the changing times brought by development in technology, telecommunicati ons and huge increases in population growth. R.A. 5227 has already been in existence for thirtyy three years and therefore clearly needs some revisions."
