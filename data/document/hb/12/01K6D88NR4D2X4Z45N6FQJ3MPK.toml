congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF ABSENTEE VOTING BY QUALIFIED FILIPINOS ABROAD"
congress_website_abstract = "Absentee Voting/Absentee Voter. Absentee voting applies to any citizen residing abroad who has all the qualifications and none of the disqualificatio n of a voter, hereinafter called the absentee voter. He shall have the right to vote in any national or local election by absentee ballot in the city or municipality where he last resided prior to his departure from the Philippines."
