congress_website_title = "AN ACT REDUCING THE RETIREMENT AGE OF GOVERNMENT, AMENDING FURTHER FOR THE PURPOSE THE `GOVERNMENT SERVICE INSURANCE SYSTEM ACT OF 1997,' AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposes to reduce the optional retirement age of all government employees from sixty (60) years to fifty-five (55) years, and in the compulsory retirement age from sixty-five (65) to sixty (60) years. Earlier retirement for government employees will encourage more people into entrepreneurial activities in small and medium enterprises (SMEs) and contribute towards making the economy more efficient and competitive."

