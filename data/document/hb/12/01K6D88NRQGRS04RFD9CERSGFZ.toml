congress_website_title = "AN ACT AMENDING ARTICLES 13, 40, 48, 52, 54 AND 99 OF EXECUTIVE ORDER NO. 209, AS AMENDED, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to RECOGNIZE the Canon Laws of the Roman Catholic Church, as well as the laws of other Christian religious organizations or denominations, pertaining to the marriage performed and celebrated according to the rites of the Church and the dissolution of the same. A marriage that has been declared to be null and void by the Roman Catholic Church through the marriage tribunal is not recognized as controlling or decisive under our civil law. The spouses whose marriage has been declared null and void by the said tribunal are therefore not free to remarry under our civil law.> The amendments to the Family Code as proposed in this bill, therefore, seeks to recognize the CHURCH's DECLARATION OF NULLITY in deciding cases pertaining too marriage and the annulment of the same, as well as in determining the legitimacy of children."

