congress_website_title = "AN ACT BANNING PUBLIC OFFICERS AND EMPLOYEES FROM SMOKING WITHIN THE WORK PREMISES DURING OFFICE HOURS AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "\"Public Officers and Employees Smoking Ban Act of 2001.\" This bill seeks to BAN public officers and employees from smoking within premises during office hours. Once approved, any person found guilty of violating the provision of this Act shall suffer the penalty of prision correccional or temporary disqualificatio n from holding public office, or both, at the discretion of the court."
