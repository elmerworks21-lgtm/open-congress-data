congress_website_title = "AN ACT PROHIBITING DISCRIMINATION ON THE BASIS OF SEXUAL ORIENTATION AND GENDER IDENTITY AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "\\\"Anti-Discrimination Act\\\". This bill declares the following discriminatory acts as unlawful: (a) denial of access to public service to any person on the basis of sexual orientation; (b) inclusion of sexual orientation and gender identity in the criteria for hiring, promotion and dismissal of workers, and in the determination of employee compensation, training, incentives, privileges, benefits or allowances; (c) refusal to admit or expel a person from educational institutions on the basis of sexual orientation and gender identity; (d) denial of access to or use of establishments, facilities, utilities or services on the basis of sexual orientation or gender identity; and (e) other analogous circumstances."
