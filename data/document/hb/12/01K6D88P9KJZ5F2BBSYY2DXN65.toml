congress_website_title = "AN ACT AMENDING PD 1638 BY DELETING THEREFROM SECTION 25(d), AND BY INSERTING IN ITS PLACE SECTION 9(d) OF REPUBLIC ACT NO. 340, AND FOR OTHER PURPOSES"
congress_website_abstract = "The pension of a retiree from the Armed Forces of the Philippines (AFP) is computed based on the number of years he/she has actively served the AFP. This is pursuant to Section 25 (d) of PD 1638 which provides that \\\"a year of active service shall mean 12 months\\\". There are thousands of AFP personnel who retired under PD 1638 with a fraction of a year of service in addition to the full years of service. These retirees are being shortchanged of benefits due them since a fraction of a year of service is not included in the computation of his monthly pension. To correct this injustice, this bill proposes that any period of service totaling to six (6) months or more be considered as a complete year for purposes of computing the retirement benefits."
