congress_website_title = "AN ACT ALLOCATING ONE PERCENT (1%) OF THE GROSS ANNUAL EARNINGS OF THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION (PAGCOR) TO FINANCE THE LIVELIHOOD AND POVERTY ALLEVIATION PROGRAMS OF THE TWENTY (20) DEPRESSED PROVINCES OF THE PHILIPPINES"
congress_website_abstract = "Rationale: Without sufficient funds, the programs on poverty alleviation of the government will not be fully implemented. The bill aims to assist the government in maximizing its financial resources to help depressed provinces finance their livelihood programs aim at increasing the incomes of families therein. With the allocation of one (1%) percent of the gross earnings of PAGCOR to help finance the livelihood and poverty alleviation programs of the provinces, the goals and objectives of the government will be achieved."
