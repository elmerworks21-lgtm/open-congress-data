congress_website_title = "AN ACT REQUIRING MANDATORY MEMBERSHIP OF ALL CITIZENS OF THE PHILIPPINES IN THE NATIONAL HEALTH INSURANCE PROGRAM, AMENDING FOR THE PURPOSE THE NATIONAL HEALTH INSURANCE ACT OF 1995"
congress_website_abstract = "With the increasing cost of health care, there is an urgent need to find ways and means to lessen the financial burden of being sick. This measure seeks to require the immediate and mandatory membership of all citizens of the Philippines in the National Health Insurance Program to provide the citizenry with equal access to quality health care."

