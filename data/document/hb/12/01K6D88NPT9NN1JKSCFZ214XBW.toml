congress_website_title = "AN ACT REGULATING THE USE OF FUEL WOOD IN THE FLUE-CURING OF VIRGINIA TOBACCO, PROVIDING FOR ITS EVENTUAL PHASE-OUT AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The use of fuel food for for the flue-curing of Virginia tobacco is hereby regulated declaring for the purpose the following acts illegal: (1) use of fuel wood sourced from persons or entities engaged in illegal logging acitivites; and (2) unauthorized cutting of trees along roads and river banks."
