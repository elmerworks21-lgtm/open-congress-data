congress_website_title = "AN ACT AMENDING SECTION 461 OF THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Section 461 of the Local Government Code and which is sought to be amended by this bill refers to REQUISITES FOR CREATION of a PROVINCE, particularly on LAND AREA. This bill purposes that the requirement as to either the minimum land area or the maximum population SHALL NOT APPLY WITH THE PROPOSED AREA to be created CONSISTS OF ONE OR MORE ISLANDS."
