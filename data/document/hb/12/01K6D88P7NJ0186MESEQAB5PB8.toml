congress_website_title = "AN ACT EXTENDING THE PERIOD OF VALIDITY ON THE PRIVILEGES FOR MULTIPLE ENTRY VISA AND REENTRY PERMIT OF FILIPINO VETERANS AND THEIR IMMEDIATE FAMILY MEMBERS, AMENDING FOR THE PURPOSE THE ACT GRANTING PERMANENT RESIDENT STATUS, OTHER RIGHTS AND PRIVILEGES TO FILIPINO VETERANS OF WORLD WAR II WHO ACQUIRED AMERICAN CITIZENSHIP UNDER THE UNITED STATES IMMIGRATION ACT OF 1990 AND ANY OTHER PRIOR ACTS FOR THESE PURPOSES"
congress_website_abstract = "Filipino veterans of World War II were given the opportunity to acquire American citizenship under the US Immigration Act of 1990. Also, the country grants permanent resident status to these veterans even after they have acquired American citizenship. The law also grant othr privileges, such as multiple visa entry and reentry permit. However, these documents are valid only for two years. This bill seeks to extend the period of validity of the privileges for multiple visa and reentry permit of these veterans and their immediate family until their appreciation for permanent resident status in the Philippines has been approved. This would enable these veterans and their families to enjoy their stay in their own country free from the worries oof their multiple entry visa or reentry permit having expired and from the burden of renewing the same."
