congress_website_title = "AN ACT PROVIDING ALLOCATION FOR HUMAN RESOURCES DEVELOPMENT FROM THE TWENTY PERCENT (20%) DEVELOPMENT FUND OF PROVINCES AND CITIES, AMENDING FOR THE PURPOSE SECTION 287 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Each local government unit shall appropriate in its annual budget no less than twenty percent (20%) of its annual internal revenue allotment for development projects: PROVIDED, THAT TEN PERCENT OF SAID DEVELOPMENT FUND SHALL BE SET ASIDE BY PROVINCIAL AND CITY GOVERNMENTS FOR A SCHOLARSHIP PROGRAM AT THE COLLEGIATE AND POST-GRADUATE LEVELS, PREFERABLY IN THE FIELDS OF MANAGEMENT, ECONOMICS, FINANCE, ENGINEERING, ARCHITECTURE, ELECTRONICS AND APPLIED SCIENCES, TO DESERVING RESIDENTS OF THE PROVINCE OR CITY UNDER THE SUPERVISION AND DIRECTION OF A SCHOLARSHIP BOARD COMPOSED OF THE GOVERNOR OR CITY MAYOR AS CHAIRMAN, THE PROVINCIAL OR CITY SCHOOLS DIVISION SUPERINTENDENT AS VICE-CHAIRMAN, AND THE MEMBERS OF THE LOCAL SCHOOL BOARDS AS MEMBERSS, WITH ONE REPRESENTATIVE EACH FROM THE PRIVATE BUSINESS SECTOR NON-GOVERNMENTA L ORGANIZATIONS. Copies of the development plans for local government units shall be furnished the Department of Interior and Local Government."

