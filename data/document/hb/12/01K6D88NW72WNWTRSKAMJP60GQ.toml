congress_website_title = "AN ACT ESTABLISHING AN EMERGENCY MEASURE TO ALLEVIATE THE PLIGHT OF COCONUT FARMERS ADVERSELY AFFECTED BY LOW PRICES OF COPRA AND OTHER COCONUT PRODUCTS, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Rationale: In order to immediately address the abnormal price situation in the coconut industry sector brought by the worldwide glut of fats and oild in the world market, there is a need to launch an income supplment program for small coconut farmers, tillers, workers and owners-cultivat ors who comprise the overwhelming majority of the people in the coconut industry that will provide them immediate relief from adverse effects of extremely low prices of copra and husket nuts."
