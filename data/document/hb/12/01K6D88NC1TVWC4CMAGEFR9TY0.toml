congress_website_title = "AN ACT PROVIDING FOR A UNIFORM REWARD SYSTEM IN THE CAMPAIGN AGAINST CRIMES AND LAWLESSNESS"
congress_website_abstract = "Any person, or a group of persons, defined for purposes of this Act as government-info rmer, having knowledge of frauds upon and violations of any law of the Republic of the Philippines, may voluntarily submit, personally or by registred mail to anyresponsible government official a sworn statement on affidavit stating the time, place, manner and other circumstances of any act which in his best and honest judgement in patently in violation of the law, or furnishing information which may lead tothe arrest and apprehension of a fugitive or wanted criminal. For such information, a government informer shall be entitled to receive a compensation or reward as hereinafter provided."

