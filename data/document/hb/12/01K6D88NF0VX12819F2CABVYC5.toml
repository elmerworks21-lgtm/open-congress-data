congress_website_title = "AN ACT ESTABLISHING THE NATIONAL ARCHIVES OF THE PHILIPPINES, STRENGTHENING ITS POWERS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to establish the National Archives, granting it powers and appropriations for its opertions. The Office shall be under the Department of Education, Culture and Sports and shall take over the Records and Management Archives Office created in 1958. It shall plan, develop, prescribe, disseminate and enforce policies, rules and regulations and coordinate government wide programs governing the general protection, use, maintenance, storage and disposition of public records."
