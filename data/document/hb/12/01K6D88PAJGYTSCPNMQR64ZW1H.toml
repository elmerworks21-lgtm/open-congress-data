congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7941 OTHERWISE KNOWN AS THE 'PARTY-LIST SYSTEM ACT'"
congress_website_abstract = "The measure seeks to address the findings of the Supreme Court, in the two cases filed before it, that the existing law (R.A. 7941) is inadequate. It proposes to increase the number of party-list representation in the House of Representatives and to provide a more detailed formula in determining the allocation of seats for the party-list system. It further aims to ensure that the parties elected in the party-list system truly represent the marginalized and underrepresented sectors of our society."
