congress_website_title = "AN ACT ENTITLED REVISED PUBLIC LAND ACT OF THE PHILIPPINES"
congress_website_abstract = "Rationale: With the advent of modern technologies and in the light of the present needs of times, this Public Land Act can be considered obsolete and unrealistic. This bill seeks to UPDATE and SUPPLEMENT existing legal provisions on the management and disposition of public lands in order to consolidate therein related provisions of certain Presidential Decrees, Batas Pambansa and other existing laws. With the passage of the legislative measures, the nagging problems affecting public land, suchas the proliferation of fake titles, sustainable use of foreshore lands and problems related with land survey matters, can be aptly addressed through responsive regulatory mechanism."
