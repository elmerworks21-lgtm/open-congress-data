congress_website_title = "AN ACT FOR THE TEMPORARY TRANSFER FOR FIFTEEN (15) YEARS OF THE RESPONSIBILITY TO DEVELOP AND MAINTAIN BARANGAY ROADS FROM LOCAL GOVERNMENT UNITS TO THE DEPARTMENT OF PUBLIC WORKS AND HIGHWAYS"
congress_website_abstract = "Barangay roads serve as the basic access between barangays and sitions and as the link to poblacions and eventually to national road junctions. However, when the the development and maintenance of barangay roads was devolved to the local governmentunits by virtue of RA 7160, the conditions of these roads deteriorated sharply. Under the present set up, funds for the maintenance of barangay roads are sourced from a portion of the 20% internal revenue allotment of the barangays. Such amount is insufficient to fund good maintenance work. This measure proposes to temporarily transfer for fifteen years the responsibility of the development and maintenance of barangay roads to the Department of Public Works and Highways."

