congress_website_title = "AN ACT REQUIRING ALL OWNERS OR OPERATORS OF TELEVISION NETWORKS OR STATIONS AND PRODUCERS OF TELEVISION NEWS PROGRAMS TO HAVE THEIR NEWS PROGRAMS CLOSED-CAPTION AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "All owners or operators of television networks or stations and producers of television programs are required to have their newscasts or news programs, national and regional in scope, with closed-captions in order to benefit persons with hearing disabilities. Provided, however, that the words of the closed-captioni ng will be in the language spoken in the same program."
