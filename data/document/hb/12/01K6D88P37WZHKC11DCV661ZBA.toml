congress_website_title = "AN ACT REQUIRING MALL OR SHOPPING CENTERS OWNERS/OPERATOR S TO LEASE ADEQUATE AREAS FOR EMERGENCY CLINICS OR ESTABLISH AND MAINTAIN BY THEMSELVES AS EMERGENCY CLINIC IN THEIR MALLS OR SHOPPING CENTERS, PROVIDING PENALITY FOR VIOLATION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The very fact that thousands of people gather in malls also presents a serious area of concern - that of health. In spite of the sanitation requirements for such places, accidents still do happen and in fact emergency case of people getting suddenly sick in such areas occur and in most cases, there are no first-aid stations or clinics to go for such unfortunate ill-stricken people."

