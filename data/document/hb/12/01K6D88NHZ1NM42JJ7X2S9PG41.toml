congress_website_title = "AN ACT PROVIDING FOR THE OMNIBUS AMENDMENTS TO PRESIDENTIAL DECREE NO. 857, OTHERWISE KNOWN AS THE REVISED CHARTER OF THE PHILIPPINE PORTS AUTHORITY (PPA), AS AMENDED, TO STRENGTHEN AND STREAMLINE THE AUTHORITY, AND FOR OTHER PURPOSES"
congress_website_abstract = "This legislative proposal seeks to amend certain provisions of PD No. 857 otherwise known and cited as \"Revised Charter of the Philippine Ports Authority, As Amended\" with the aim in view of: 1) enhancing competition and efficiency in port infrastructure development and services; 2) promoting private sector participation in the planning and development of seaports in the country; 3) encouraging decentralizatio n of local port management offices; and 4) decoupling of the PPA's regulatory and commercial functions."
