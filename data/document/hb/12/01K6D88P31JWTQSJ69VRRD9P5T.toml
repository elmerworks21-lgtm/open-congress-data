congress_website_title = "AN ACT DECLARING THE FOREIGN NATIONALITY OF THE VICTIM OR OF THE OFFENDER AS AN AGGRAVATING CIRCUMSTANCE IN CRIMES COMMITTES BY FILIPINO CITIZENS AGAINST FOREIGN NATIONALS AND VICE-VERSA"
congress_website_abstract = "We, Filipinos are known all over the world for hospitality and warmth in dealing with our foreign visitors. Coupled with our bountiful natural wonders and tourist destinations, we have attracted a good number of foreign tourists to visit our country, giving vigor to our tourism industry, providing income to our people and additional revenues to the government.> However, with the passage of time, we have seen a dramatic decline in the number of tourist arrivals into the country due to deteriorating peace and order situation. Not too long ago, the Philiipines was at the limelight of international scorn against terrorism and kidnapping with the infamous Sipadan kidnapping incident and more recently, the Dos Palmas raid perpetrated by the samme band of ruthless bandits."

