congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7941, ENTITLED `AN ACT PROVIDING FOR THE ELECTION OF PARTY-LIST REPRESENTATIVES THROUGH THE PARTY-LIST SYSTEM, AND APPROPRIATING FUNDS THEREFOR' BY MODIFYING SEVERAL PROVISIONS TO PARTICULARIZE OFWs AND OTHER OVERSEAS FILIPINO ORGANIZATIONS"
congress_website_abstract = "This bill substantiates the policy of the state to protect the rights of workers and promote their welfare by giving the right of OFWs to be represented in the party-list system by: (1) excluding the OFW organizations and other organizations of Filipinos overseas from the refusal and/or cancellation of registration by the COMELEC; (2) allowing an overseas absentee voter to be nominated as party-list representative; and (3) in the case of OFWs and other overseas Filipino organizations, the two percent (2%) mandated in RA 7941 shall be computed on the basis of the total number of qualified overseas absentee voters."
