congress_website_title = "AN ACT AMENDING FOR THE PURPOSE SECTION 35 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED(RE: BASIC PERSONAL EXEMPTION)"
congress_website_abstract = "A BASIC PERSONAL EXEMPTION is proposed as follows: For single individual or married individual judicially decreed as legally separated with no qualified dependents - [P20,000] P50,000; For head of family - [P25,000] P60,000; For each married individual - [P32,000] P70,000. > There shall be allowed an additional exemption of [Eight Thousand oesis (P8,000)] TWENTY THOUSAND PESOS (P20,000) for each dependent not exceeding four (4). > All persons whose incomes are not taxable shall be exempted from filing income tax returns."

