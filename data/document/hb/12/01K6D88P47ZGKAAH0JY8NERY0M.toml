congress_website_title = "AN ACT GRANTING SECOND GRADE CIVIL SERVICE ELIGIBILITY TO THE PUNONG BARANGAY, THE SANGGUNIANG BARANGAY MEMBERS, THE BARANGAY TREASURER AND SECRETARY AND THE SANGGUNIANG KABATAAN CHAIRMAN AND FIRST GRADE CIVIL SERVICE ELIGIBILITY TO SANGGUNIANG KABATAAN COUNCILORS"
congress_website_abstract = "All Punong Barangay, Sangguniang Barangay members, Barangay Treasurers and Secretaries and Sangguniang Kabataan Chairmen who have served any elective or appointive position in their respective barangays for at least three (3) years may be granted the Second Grade Civil Service Eligibility: Provided that they finished at least a four0year degree course in college; Provided that they finished at least a four-year degree course in college; Provided further, that barangay officials who have not compeleted a four-year degree shall be granted First Grade Civil Service eligibility.> All Sanggunian Kabataan councilors who are holding the position for at least three (3) years may be granted First Grade Civil Service Eligibility provided they earnedd at least seventy-two units in college which is equivalent to second year."

