congress_website_title = "AN ACT GRANTING EXEMPTION TO THE MEMBERS OF THE JUDICIARY, INCLUDING THE CHIEF JUSTICE AND ASSOCIATE JUSTICES OF THE SUPREME COURT, AND THEIR PERSONNEL FROM THE COVERAGE OF REPUBLIC ACT NO. 6758, OTHERWISE KNOWN AS THE SALARY STANDARDIZATION LAW"
congress_website_abstract = "This bill seeks to exempt from the coverage of RA 6758, otherwise known as the Salary Standardization Law, the members of the judiciary, including the Chief Justice and Associate Justices of the Supreme Court, and their personnel. It is in keeping with the declared policy of the State to provide equal pay for equal work that this bill is filed. It is also with the intention to keep the good men and women as well as to attract the best and the brightest in the Bench, which according to the latest data suffers from a vacancy reaching a staggering figure of over 700, that the early passage of this bill is earnestly sought."
