congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF ABSENTEE VOTING AND REGISTRATION FOR QUALIFIED FILIPINOS ABROAD AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Our \"economic heroes\" deserve to be given a strong voice in the electorate to enable them to choose leaders who will chart policies and implement programs that directly affect them in a world where labor force has become increasingly \"globalized\" and highly competitive, our overseas workers and professionals continue to be a most vital sector of our national economy, an integral facet of our international relations and an important link to the global market. The right of suffrage isindeed a fundamental right and benefit of citinzeship -- of which we cannot deprive our Filipino brothers abroad, comprising as they are of sizable segment of the voting population."
