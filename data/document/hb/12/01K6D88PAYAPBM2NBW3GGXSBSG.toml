congress_website_title = "AN ACT PROHIBITING THE PUBLIC EXHIBITION OR DISPLAY OF OBSCENE AND/OR DISTRACTIVE MOTION OR STILL PICTURES ALONG MAJOR THOROUGHFARES"
congress_website_abstract = "Obscene and/or distractive pictures-billboards advertising products, movies and services have sprouted like mushrooms in our major thoroughfares such as the Epifanio delos Santos Avenue, Aurora Boulevard, South Expressway and the North Luzon Expressway. The presence of these obscene billboards have proven to be hazardous to road safety and to have damaging effects on the values of children and the general public. This bill seeks to prohibit the public display of obscene pictures, whether motion or still, along major thoroughfares and provides penalties for those responsible for the public exhibition or display."
