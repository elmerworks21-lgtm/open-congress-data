congress_website_title = "AN ACT PROVIDING FOR THE MANDATORY ISSUANCE OF VOTER'S IDENTIFICATION CARD, AMENDING FOR THE PURPOSE SECTION 128 OF BATAS PAMBANSA BLG. 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "This bill seeks to AMEND Section 128 of the Omnibus Election Code as follows:> ALL REGISTERED VOTERS SHALL BE ISSUED IDENTIFICATION CARDS. The identification card issued to the voter shall serve and be considered as a document for the identificationof each registered voter, X X X X X X [Any voter previously] ALL registered VOTERS [under the provisions of Presidential Decree Numbered 1846 who desires to] SHALL secure a voter identification card [shall,on any registration day; ], provide four copies of his latest identification photograph to the board of election inspectors which upon receipt thereof shall affix one copy thereof to the voter's affidavit in the book of voters, one copy to the voter identification card to be issued to the votter WITHIN THIRTY DAYS FROM RECEIPT THEREOF and transmit through the election registrar, one copy each to the provincial election supervisor and the Commission to be respectively attached to the voter's affidavit in their respective custody."

