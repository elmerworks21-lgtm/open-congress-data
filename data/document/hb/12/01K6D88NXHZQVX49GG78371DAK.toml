congress_website_title = "AN ACT MANDATING THE DEPARTMENT OF TRADE AND INDUSTRY TO PROVIDE EVERY BARANGAY TEN (10) PIECES OF STANDARDIZED METAL WEIGHTS WEIGHING ONE (1) KILOGRAM EACH TO BE PUT UNDER THE CUSTODY OF THE BARANGAY CAPTAIN AND LOANED FOR FREE TO ANY BARANGAY RESIDENT WHO WISHES TO CHECK THE ACCURACY OF THE WEIGHING SCALE BEING USED IN THE MARKETING OF ANY PRODUCT WHICH PRICE IS DETERMINED BY WEIGHT AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The only effective solution to the problem is giving the consumers the power to ensure that the weighing instruments being used in the trade are \"honest\". This bill proposes to enforce the same by providing them a standardized metal weight a kilogram to allow them to check whether scales being used to weigh their products are, indeed, \"honest\". > This proposed will be most effective in the countryside especially to small fatmers who are marketing their produce. It will also save thegovernment time and money by doing away with regular inspections on the accuracy of weighing scales being used."
