congress_website_title = "AN ACT DECLARING CERTAIN ELECTION OFFENSES AS DEFINED UNDER SECTION 261 OF THE OMNIBUS ELECTION CODE OF THE PHILIPPINES AND SECTION 27 OF REPUBLIC ACT NUMBERED SIXTY-SIX HUNDRED AND FORTY-SIX AS HEINOUS CRIMES AND PROVIDING THE PENALTY OF RECLUSIONPERPETUA TO DEATH FOR VIOLATIONS THEREOF, AMENDING FOR THE PURPOSE SECTION 264 OF THE OMNIBUS ELECTION CODE AND SECTION 27 (B) OF REPUBLIC ACT NO. 6646"
congress_website_abstract = "THE ELECTION OFFENSES ENUMERATED UNDER SECTION 261 OF THIS ACT UNDER PARAGRAPHS (a), ON VOTE BUYING AND VOTE SELLING, (b), ON CONSPIRACY TO BRIBE VOTERS, (e), ON THREATS, INTIMIDATION, TERRORISM, USE OF FRAUDULENT DEVICE OR OTHER FORMS OF COERCION,(i) ON COERCION OF ELECTION OFFICIALS AND EMPLOYEES, AND (j), ON UNDUE INFLUENCE, WHEN DONE ON A NATIONWIDE OR ON A LARGE AND MASSIVE SCALE AS WOULD ADVERSELY AFFECT THE VERY FREEDOM TO EXERCISE ONE'S RIGHT OF SUFFRAGE, SHALL BE CONSIDERED HEINOUS CRIMES FOR WHICH THE PENALTY OF RECLUSION PERPETUA TO DEATH SHALL BE IMPOSED."

