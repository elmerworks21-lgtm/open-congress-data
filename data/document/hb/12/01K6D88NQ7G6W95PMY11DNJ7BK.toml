congress_website_title = "AN ACT TO INSTITUTE POLICIES TO ELIMINATE THE TRAFFICKING IN PERSONS ESPECIALLY WOMEN AND CHILDREN, AND ESTABLISHING THE NECESSARY INSTITUTIONAL MECHANISMS FOR THE PROTECTION AND SUPPORT OF TRAFFICKED PERSONS, PROVIDING PENALTIES FOR ITS VIOLATIONS,AND FOR OTHER PURPOSES"
congress_website_abstract = "Trafficking in persons - shall refer to the recruitment, transfer, or deployment of a person, and/or harbouring or receipt of person with or without the victim's consent or knowledge through legal or illegal means, fraud or deceit, violence, coercion, intimidation, abuse of position or vulnerability of a person, within or across national borders for purposes of prostitution, or work or services, marriage or adoption and other similar arrangement characterized by forced labor and slavery-like practices, sexual exploitation, the removal of or sale of body organs and other similar acts. This bill states what acts are considered TRAFFICKING IN PERSONS, as well as other forms of the same. It likewise provides for penalties and sanctions for saaid offenses."
