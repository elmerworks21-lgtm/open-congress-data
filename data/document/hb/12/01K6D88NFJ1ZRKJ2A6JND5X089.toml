congress_website_title = "AN ACT INCREASING THE INTERNAL REVENUE ALLOTMENTS OF LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Sec. 284. Allotment of Internal Revenue Taxes. - Local government units shall have a share in the national revenue taxes based on the collection of the third fiscal year preceding the current fiscal year as follows: (a) On the first year of the effectivity of this Code, thirty percent (30%); (b) On the second year, thirty-five percent (35%); [and] (c) On the third UNTIL THE EIGHTH year [and thereafter], forty percent (40%); (D) ON THE NINTH YEAR, FORTY-FIVE PERCENT (45%); (E) ON THE TENTH YEAR, FIFTY PERCENT (50%); (F) ON THE ELEVENTH YEAR, FIFTY-FIVE PERCENT (55%); (G) ON THE TWELFTH YEAR AND THEREAFTER (60%)."
