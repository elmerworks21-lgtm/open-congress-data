congress_website_title = "AN ACT PROVIDING THAT ILLEGITIMATE CHILDREN MAY USE THE SURNAME OF THEIR FATHER, AMENDING FOR THE PURPOSE ARTICLE 176 OF THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "Illegitimate children shall use the surname and shall be under the parental authority of their mother, and shall be entitled to support in conformity with this Code. PROVIDED HOWEVER, THAT ILLEGITIMATE CHILDREN MAY USE THE SURNAME OF THIER FATHER IFTHEIR FILIATION HAS BEEN EXPRESSLY RECOGNIZED BY THE FATHER IN THE RECORD OF BIRTH APPEARING IN THE CIVIL REGISTER; OR IN A PUBLIC DOCUMENT OR IN A PRIVATE HANDWRITTEN INSTRUMENT SIGNED BY THE FATHER."
