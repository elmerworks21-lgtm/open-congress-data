congress_website_title = "AN ACT ESTABLISHING A UNIFORM SYSTEM OF RETIREMENT AND SEPARATION BENEFIT FOR THE UNIFORMED PERSONNEL OF THE DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT FURTHER AMENDING REPUBLIC ACT NO. 6975, AS AMENDED BY REPUBLIC ACT NO. 8551, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The proposed measure is one way of giving importance and due recognition to the service of the uniformed personnel with the end in view of enhancing and keeping at a high level their morale, while taking into consideration the great shareof burden to the extent of risking their life while actively engaged in the services and delicate tasks of suppressing the activities of criminal elements, disasters and of people causing widespread lawlessness, disorder of public safety and wantondestruction endangering the political and economic stability of the country."

