congress_website_title = "AN ACT MANDATING THE INSTALLATION OF UNDERGROUND ELECTRICAL CONNECTIONS AND TRANSMISSION LINES IN AREAS DECLARED AS TOURIST ZONES AND MARINE RESERVE UNDER THE PROVISIONS OF PROCLAMATION NUMBER 1801"
congress_website_abstract = "For the preservation of the pristine beauty of some areas designated as Tourist Zones and Marine Reserve, only underground electric connections and transmission lines are hereby allowed to be installed in such areas which shall be energized according to the energization master plan as proposed and designated joinly by the Department of Tourism and Department of Energy assisted by the Philippines Tourism Authority and National Electrification Adminsitration ."

