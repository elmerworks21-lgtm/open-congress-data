congress_website_title = "AN ACT REQUIRING THE MANDATORY LABELING AND SEGREGATION OF CONSUMER PRODUCTS AND FOOD CONTAINING GENETICALLY ENGINEERED INGREDIENTS AND FOOD PRODUCED BY MEANS OF GENETIC ENGINEERING TECHNOLOGIES, AMENDING FOR THAT PURPOSE REPUBLIC ACT NUMBERED SEVENTHOUSAND THREE HUNDRED NINETY- FOUR, OTHERWISE KNOWN AS THE CONSUMERS' ACT OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Article 77. MANDATORY Labeling Requirement for Consumer Products. - All consumer products domestically sold whether manufactured locally or imported shall indicate the following in the respective labels of packaging: a. its correct and registeredtrade name or brand name; b. its duly registered trademark; c. its duly registered business name; d. the address of the manufacturer, importer, repacker of the consumer product in the Philippines; e. its general make or active ingredients WHETHER NATURAL, SYNTHETIC OR GENETICALLY ENGINEERED OR PRODUCED BY MEANS OF GENETIC ENGINEERING TECHNOLOGIES. PROVIDED, THAT IS A CONSUMER PRODUCT CONTAINS GENETICALLY MODIFIED ORGANISMS OR GENETICALLY ENGINEERED INGREDIENTS, INCLUDING THOSE PRODUCED BY GENETIIC ENGINEERED INGREDIENTS, INCLUDING THOSE PRODUCED BY GENETIC ENGINEERED TECHNOLOGIES, IT SHALL LEGIBLY AND CONSPICUOUSLY INDICATE IN ITS LABEL OF PACKAGING THE FOLLOWING: 1. A NOTICE IMMEDIATELY PRECEDING THE WARNING REQUIRED IN ITEM (2) HEREOF AS"

