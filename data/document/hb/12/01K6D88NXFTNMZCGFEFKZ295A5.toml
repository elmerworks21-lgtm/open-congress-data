congress_website_title = "AN ACT CREATING THE LOCAL HOUSING BOARDS IN EVERY CITY AND MUNICIPALITY PROVIDING FOR ITS POWERS AND FUNCTIONS, AMENDING FOR THE SECTIONS 447 AND 458 OF REPUBLIC ACT NO. 7160, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to establish a local housing board in every city and municipality. Under this bill, the Local Government Units, in coordination with other housing agencies, the private sectors and the NGOs are given the task to create a local housing framework that would adopt a continuing socialized housing program for the underprivileged and homeless urban and rural poor dwellers at affordable cost. > The bill also provides a mandatory subsidy to all government resettlement projects for the provision of infrastructure facilities and maintenance to be allocated proportionately in accordance with the area and number of population of the resettlement projects."

