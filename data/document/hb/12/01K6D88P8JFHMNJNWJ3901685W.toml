congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7392, OTHERWISE KNOWN AS THE PHILIPPINE MIDWIFERY ACT OF 1992, AND FOR OTHER PURPOSES"
congress_website_abstract = "Midwifery has a significant role in the health care and education, not only of pregnant women, but also their family and community. The midwife, aside from caring and assisting in childbirth, has additional roles, such as educator community resourceand leader, and advocate for the health and well-being of women and children. However, midwives and their role in the central care of women remain unrecognized and unappreciated. This bill intends to professionalize the practice of midwifery - strengthen its education and training through a revision of the standard curriculum and through a midwifery continuing education. It also provides for more work opportunities through the step-ladder approach to midwifery education."

