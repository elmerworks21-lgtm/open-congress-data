congress_website_title = "AN ACT AMENDING SECTION 110 OF PRESIDENTIAL DECREE NO. 1529, OTHERWISE KNOWN AS THE PROPERTY REGISTRATION DECREE AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This bill seeks to amend Section 110 of PD No. 1529 by DIRECTING THE REGISTER OF DEEDS to be the proper party to initiate the filing of petitions for judicial reconstitution of lost or destroyed original certificates of title. > While original certificates of title are kept in the Office of the Register of Deeds for safekeeping and protection, it is also in this place where these documents get lost or suffer destruction. Hence, the approval of this bill is earnestly requested."
