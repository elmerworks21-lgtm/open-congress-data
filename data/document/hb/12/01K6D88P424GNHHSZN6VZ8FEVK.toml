congress_website_title = "AN ACT RECOGNIZING MULTIPLE CITIZENSHIP FOR NATURAL-BORN FILIPINO CITIZENS WHO HAVE ACQUIRED OR SHALL ACQUIRE FOREIGN CITIZENSHIP AND GRANTING THEM THEIR RIGHTS AND PRIVILEGES, AMENDING FOR THE PURPOSE COMMONWEALTH ACT NO. 63, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to authorize the reacquisition and/or retention of natural-born Filipino citizens who have acquired or those who shall acquire foreign citizenship in other countries without renouncing their foreign citizenship. Rationale: The justification of this bill is to allow Filipino citizens to retain or reacquire their original status in order to encourage the millions of expatriate abroad to invest in the Philippines, and in the process, shore up the country's economy with the infusionof new capital in the economic mainstream."

