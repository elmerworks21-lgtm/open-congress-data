congress_website_title = "AN ACT PROVIDING FOR THE ACQUISITION AND DISTRIBUTION OF MOISTURE METERS IN ALL COCONUT-PRODUCING BARANGAYS AND FOR OTHER PURPOSES"
congress_website_abstract = "RA 1365 requires the use of moisture meters in all domestic purchases of copra for the purpose of ensuring good quality copra and better income for our coconut farmers. It also prescribes a moisture content level for copra since high moisture content has been linked to high levels of aflatoxin which is known to cause cancer. Unfortunately, the law has not been fully implemented due to lack of moisture meters. The bill provides for the acquisition and distribution of moisture meters in all coconut-producing barangays in the country through the Philippine Coconut Authority."

