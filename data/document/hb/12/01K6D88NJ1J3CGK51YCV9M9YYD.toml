congress_website_title = "AN ACT AMENDING SECTION 4 AND SECTION 6, PARAGRAPH (c) OF REPUBLIC ACT NO. 6972, BY PRESCRIBING THE CREATION AND FILLING UP OF AT LEAST ONE (1) MANDATORY POSITION OF DAY CARE WORKER IN EVERY BARANGAY, APPROPRIATING THEREFOR A FAIR AND EQUITABLE MONTHLY ALLOWANCE, AND FOR OTHER PURPOSES"
congress_website_abstract = "THE SANGGUNIANG BAYAN OR THE SANGGUNIANG PANLUNGSOD SHALL CREATE AT LEAST ONE (1) MANDATORY POSITION OF BARANGAY DAY CARE WORKER IN EVERY BARANGAY WITH A MONTHLY ALLOWANCE OF NOT LESS THAN FIVE THOUSAND PESOS (P5,000.00), PROVIDED THAT, IN BARANGAYSWITH MORE THAN TWENTY THOUSAND (20,000) RESIDENTS, THERE SHOULD BE MORE THAN ONE (1) DAY CARE WORKER."
