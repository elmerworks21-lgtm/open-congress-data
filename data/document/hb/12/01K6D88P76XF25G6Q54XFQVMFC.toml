congress_website_title = "AN ACT DEFINING RAW CANE SUGAR, AMENDING FOR THE PURPOSE PARAGRAPH C, SECTION 109 OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE TAX REFORM ACT OF 1997, AND FOR OTHER PURPOSES."
congress_website_abstract = "This bill seeks to provide a fair and objective definition of raw cane sugar for taxation purposes. It also intends to broaden the coverage of agricultural products that will be subjected to VAT, such as sugar that undergo reprocessing and have beenconsidered vatable."
