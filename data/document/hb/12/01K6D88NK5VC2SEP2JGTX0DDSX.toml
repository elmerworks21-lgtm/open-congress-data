congress_website_title = "AN ACT TO STABILIZE THE SUGAR INDUSTRY BY ESTABLISHING THE SUGAR INDUSTRY RESEARCH AND STABILIZATION FUND AND FOR OTHER PURPOSES"
congress_website_abstract = "Twenty percent (20%) of the total Value Added Tax (VAT) proceeds collected on sugar and sugar by-products shall, accrue to and form part of a special fund for the sugar industry which shall be made available solely to finance the operation, programsand activities of the Sugar Regulatory Administration in pursuance of its charter objectives. > For this purpose, the proceed as herein provided shall be set aside to constitute a fund known as the Sugar Industry Research and Stabilization Fund which shall be paid out for the purpose herein stated."
