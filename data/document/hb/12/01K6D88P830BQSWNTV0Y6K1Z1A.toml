congress_website_title = "AN ACT STRENGTHENING THE INDEPENDENCE OF MEDIA IN THE PHILIPPINES BY ESTABLISHING THE JOURNALISTS WELFARE FUND, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Fourth Estate Act of 2003\" Press freedon is a right emanating from the right of the people to know the going-ons in the government and to be informed on matters of public concern. Journalists ensure that the right of the people to know is served, upheld and protected. Journalists have rightly been called the \"Vanguards of Press Freedom\". The proposed bill affirms the significance of the Fourth Estate in a democracy even as it recognizes the many threats to its independence. It proposes to establish a Journalists Welfare Fund to be administered by the Journalists Cooperative composed of accredited media practitioners. The fund is intended to provide members of the media with monetary benefits for work-related injury, disability, retiirement or death."

