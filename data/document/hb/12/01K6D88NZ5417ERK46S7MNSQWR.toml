congress_website_title = "AN ACT DECLARING FEBRUARY FOUR OF EVERY YEAR AS `ARAW NG PAGDAKILA SA MGA PILIPINONG NAGBUWIS NG BUHAY NOONG DIGMAANG PILIPINO-AMERIK ANO', PROVIDING FOR SUPPORT PROGRAMS AND REQUIRING THE APPROPRIATION OF FUNDS THEREFOR"
congress_website_abstract = "Rationale: The Philippine-Amer ican War began on February 4, 1899 with heavy fighting in the suburbs of Manila and officially ended in 1913, although pockets of resistance continued thereafter. This war of colonial conquest is therefore the longestwar in US history. This testifies to the courageous and indomitable spirit of the Filipino people, who fought the American colonizers and refused to be conquered even in the face of overwhelming odds."

