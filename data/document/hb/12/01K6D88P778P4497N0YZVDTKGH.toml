congress_website_title = "AN ACT SECURING THE RIGHT TO VOTE OF FILIPINOS ABROAD WHO HAVE BEEN CATEGORIZED BY THEIR HOST COUNTRIES AS IMMIGRANTS AND PERMANENT RESIDENTS BUT WHO HAVE NOT RENOUNCED THEIR FILIPINO CITIZENSHIP, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 9189, OTHERWISE KNOWN AS THE OVERSEAS ABSENTEE VOTING ACT OF 2003"
congress_website_abstract = "Republic Act No. 9189, otherwise known as the \"Overseas Absentee Voting Act of 2003.\" is hereby amended by allowing qualified overseas absentee voter, who is recognized as an immigrant or permanent resident in the host country but who has not expressly renounced his Filipino citizens, may vote for President, Vice-President, Senators and Party-list Representatives ; PROVIDED, Th he/she executes, upon registration, an affidavit prepared for the purpose by the Commission on Elections declaring his/her intention to return to the Philippines and resume actual physical residence in the country in the future and stating that he/she has not applied for citizenship in another country; PROVIDED, FURTHER, that no other susbstantial requirement shallbe imposed on the right of the immigrant or permanent resident to vote."

