congress_website_title = "AN ACT UPGRADING THE SALARY GRADE LEVEL OF THE SCHOOLS DISTRICT SUPERVISORS FROM SALARY GRADE NINETEEN (19) TO SALARY GRADE TWENTY-FOUR (24)"
congress_website_abstract = "It is the objective of this bill to ensure that School District supervisors are properly compensated commensurate to the duties and responsibilites that they perform. Hence, it is imperative that the Salary Grade Level of the Schools District Supervisors be upgraded from Salary Grade Nineteen (SG-19) to Salary Grade Twenty-Four (SG-24)."

