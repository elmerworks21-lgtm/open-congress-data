congress_website_title = "AN ACT TO DEVELOP ENTREPRENEURSHIP AMONG GOVERNMENT EMPLOYEES FOR AN INNOVATION INSPIRED CORPS OF CIVIL SERVANTS AND A PRODUCTIVE POST-SERVICE CITIZENRY"
congress_website_abstract = "\\\"Government Employees' Entrepreneurship Development Act of 2004\\\". The bill encourages all government agencies to establish cooperatives and savings and loans associations in their respective offices as an outlet for entrepreneurial skills in order to generate financial resources for their employees. It requires all government agencies to implement an Entrepreneurial Training Program for their employees to prepare them for in-service or post-service entrepreneurship. It seeks to create a coordinating council that will formulate a comprehensive plan for the development of entrepreneurial capabilities, managerial expertise and technical skills."
