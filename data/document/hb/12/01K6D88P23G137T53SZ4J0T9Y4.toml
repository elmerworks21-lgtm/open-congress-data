congress_website_title = "AN ACT AMENDING SECTION 15 OF REPUBLIC ACT NO. 7796, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES (RE: TECHNICAL EDUCATION AND SKILLS DEVELOPMENT AUTHORITY)"
congress_website_abstract = "Section 15 of Republic Act No. 7796, otherwise known as the \"Technical Education and Skills Development Authority (TESDA) Law,\" provides for the creation of Provincial TESDA Offices headed by Provincial Skills Development Officers. >Glaringly omitted from the TESDA Law are indenpendent cities with original charters which are, for all intents and purposes, equivalent in rank and status to provinces insofar as R.A. No. 7160, otherwise known as the \"Local Government Code of 1991\", is concerned. Under R.A. 7160, provinces and cities with original charters virtually enjoy the same benefits. There is a great need to create TESDA offices in cities with original charters equivalent to provincial offices created by the existing TESDA Law."
