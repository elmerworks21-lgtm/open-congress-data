congress_website_title = "AN ACT ABOLISHING THE PREMIUM TAX AND DOCUMENTARY STAMP TAX ON LIFE INSURANCE POLICIES AND ANNUITIES, REPEALING FOR THE PURPOSE SECTION 123 AND 183, AND AMENDING SECTION 186 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "This bill seeks to abolish the premium tax and documentary stamp tax on life insurance policies and annuities in order to strengthen the life insurance industry which is a vital source of long-term savings for a sustained economic growth of the country. > The main purpose of this bill is to lend support to a vital Philippine industry, the life insurance industry, which has been in place in our economy for almost a hundred years and among whose principal functions is the general of domestic longterm savings for economic development. Its passage will greatly support the industry's growth and development. Other countries have found such government policy economically and socially advantageous to its economy."
