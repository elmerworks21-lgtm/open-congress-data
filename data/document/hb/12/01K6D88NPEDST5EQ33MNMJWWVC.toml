congress_website_title = "AN ACT REGULATING THE OWNERSHIP, POSSESSION AND USE OF CHAINSAWS PENALIZING VIOLATIONS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Chainsaw Act of 1996\". Chainsaws shall be sold only by manufacturers, dealers and/or private owners which are duly authorized by the Secretary of the Department of Environment and Natural Resources (DENR), and only to qualified persons as hereinafter provided. Likewise, only persons or entities duly authorized by the DENR may be allowed to import chainsaws for their private use or to be sold to the public."
