congress_website_title = "AN ACT PROHIBITING THE USE OF \"ASPARTAME\" ON FOOD, BEVERAGES AND DRUGS AND THE SALE AND DISTRIBUTION OF ARTIFICIAL SWEETENERS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Aspartame Ban Act\". The sale and distribution of artifical sweeteners or sugar substitutes such as NutraSweet, Equal, Spoonful, Equal-Measure and other brand names with similar content, is hereby declared prohibited.> The penalty of reclusion temporal to reclusion perpetua and a fine ranging from Five Hundred Thousand Pesos to Five MIllion Pesos shall be imposed upon any individual or officers of a manufacturing or distributing corporation or company who shall violate any of the provisions ofthis Act."
