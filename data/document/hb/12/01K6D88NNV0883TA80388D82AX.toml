congress_website_title = "AN ACT PROVIDING THAT ELECTIVE OFFICIALS RUNNING FOR ANY OFFICE OTHER THAN THE ONE WHICH THEY ARE HOLDING SHALL BE CONSIDERED IPSO FACTO RESIGNED UPON THE FILING OF THEIR CERTIFICATE OF CANDIDACY, AMENDING FOR THE PURPOSE THE OMNIBUS ELECTION CODE"
congress_website_abstract = "Section 67 of Batas Pambansa Blg. 881, as amended, is hereby amended to read as follows: >\"Sec.67. Candidates holding elective office - Any elective official, whether national or local, running for any office other than the one which he is holding in a permanent capacity [, except for President and Vice President, ] shall be considered ipso facto resigned from his office upon the filing of his certificate of candidacy.\""
