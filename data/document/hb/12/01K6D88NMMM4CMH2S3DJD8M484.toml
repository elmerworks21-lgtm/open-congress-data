congress_website_title = "AN ACT RENDERING OPTIONAL THE RESERVED OFFICERS TRAINING CORPS, REVISING ITS BASIC CURRICULUM, PROVIDING ANOTHER ALTERNATIVE PROGRAM THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill renders ROTC OPTIONAL, doing away with the compulsory character of the program for college students and likewise establishes another alternative program. The idea is to give the students a rational choice: those who are interested in the military character of the program or attracted to military training to qualify as enlisted reservists can take the basic ROTC training program (under a revised curriculum handled by a national pool of highly qualified trainors to be established and funded by the AFP) and those who are not so inclined are given the option to pursue a two-semester program of classroom instructions, as part of the academic curriculum, that shall focus on values formation, military skills and disciple (minus the \"sunnshine, sandwich and softdrinks\"), respect for authorities, and love of country, including participation in public interest activities or community development projects."
