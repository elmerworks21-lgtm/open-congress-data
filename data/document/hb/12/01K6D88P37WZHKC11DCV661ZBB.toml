congress_website_title = "AN ACT TO AMEND ARTICLE ONE THOUSAND SEVEN HUNDRED AND TWENTY-THREE OF REPUBLIC ACT NUMBERED THREE HUNDRED AND EIGHTY-SIX, OTHERWISE KNOWN AS THE CIVIL CODE OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "The proposed amendment of Article 1723 of the Civil Code of the Philippines aims to strengthen the liability for damages if a building collapses and it includes damages to any infrastucture project which require a major or complete repair within a period of fifteen (15) years from the sate of completion of the building or infrastructure project.> Presently, Article 1723 of said Civil Code covers only building structures and does not include other infrastructure projects such as bridges, fly-over, roads, airports and the like. The proposed bill seeks to expand the coverage of this provisions (Article 1723) by including therein all infrastructure orojects for the purpose of determining responsibility and accountability of the engineer and arrchitect, as well as the contractors or subcontractors arising from non-observance of proper design or specifications or by reason of the use of poor and substandard materials."
