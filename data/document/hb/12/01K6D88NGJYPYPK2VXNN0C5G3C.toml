congress_website_title = "AN ACT DECLARING ALL IRRIGATED AND IRRIGABLE AGRICULTURAL LANDS AS PROTECTED AREAS FOR AGRICULTURE, PROHIBITING ITS CONVERSION FOR USES OTHER THAN AGRICULTURAL, AMENDING FOR THE PURPOSE SECTION 20 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "\"National Protected Areas for Agriculture (NPAA) Law.\" Main thrusts of this proposal are: (1) Grant of direct access to the latest agricultural technology, electric power, water sources, roads, credit and domestic markets to agricultural areas; (2)Essential research support for the intensive and environmentally -friendly development of food production; and (3) Prioritized allotment of the country's best alluvial soils for intensive agricultural activity."

