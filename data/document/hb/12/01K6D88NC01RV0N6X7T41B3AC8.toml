congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT, OPERATION AND MAINTENANCE OF A HOME FOR THE AGED AND DISABLED IN EVERY CONGRESSIONAL DISTRICT OF THE PHILIPPINES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The Home shall provide consultative services, including diagnosis, cure and prevention of diseases of the aged and disabled; rehabilitation hall with facilities for physiotheraphy and gymnasium for physical rehabilitation; a nutrition clinic; and aresearch ward on the care and treatment of aged and disabled patients. > No person shall be admitted to the home unless he/she is sixty-two years of age; and in the case of the disabled, one who, regardless of age, cannot move freely; of good moral character, and without any visible means of support."
