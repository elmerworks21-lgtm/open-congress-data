congress_website_title = "AN ACT TO AMEND REPUBLIC ACT NO. 6770, ENTITLED `AN ACT PROVIDING FOR THE FUNCTIONAL AND STRUCTURAL ORGANIZATION OF THE OFFICE OF THE OMBUDSMAN, AND FOR OTHER PURPOSES'"
congress_website_abstract = "Rationale: To date, the delivery of justice and judicial services in the country is deplorable. This is partially due to the lack of adequate facilities and trained personnel. Both these present numbers are insufficient, especially in view of the fact that an awakened and empowered population is vigilant of its rights and is more inclined to exervise it through legal and judicial means. It is therefore not surprising that many complainants constantly complain of the slow wheels of justice. This bill proposes an AMENDMENT to RA 6770, which reads as follows: \"IN THE INVESTIGATION OF ANY COMPLAINT, THE OMBUDSMAN MUST COMPLETE ITS INVESTIGATION AND COPME UP WITH A RESOLUTION DISMISSING THE COMPLAINT OR FILING THE NECESSARY INFORMATION WITHTHE SANDIGANBAYAN WITHIN A PERIOD OF ONE YEAR FROM THE DATE IT INITIATED ITS INVESTIGATION OR THE COMPLAINT WAS FILED; PROVIDED FURTHER, THAT THE PERIOD OF TIME GRANTED BY THE OMBUDSMAN WITH REGARD TO A REQUEST FOR EXTENSION OF TIME TO FILE ANY RESPO"
