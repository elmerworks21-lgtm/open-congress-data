congress_website_title = "AN ACT FIXING THE RETIREMENT AGE OF MILITARY PERSONNEL OF THE ARMED FORCES OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "The age of compulsory retirement of enlisted personnel is hereby fixed at 56 years. Military officers shall be compulsorily retired at the age of 58 years: Provided, That a Major General, a Lieutenant General and a fulkl-fledged General shall each be granted another year of service before retirement. The rationale of this Act is to be able to maximize the services of highly qualified, highly competent, and highly trained officers as they must have assumed key positions in the AFP hierarchical order. For studies have proven that military officers are very good economic managers whose expertise and services just cannot be dispensed with."
