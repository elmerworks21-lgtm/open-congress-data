congress_website_title = "AN ACT PROVIDING PROTECTION AGAINST COMPUTER FRAUD, ABUSES AND OTHER CYBER-RELATED FRAUDULENT ACTIVITIES, PROVIDING PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Computer Fraud and Abuses Act of 2001.\" The need for a special legislation against computer crimes is the primary objective of this proposed measure. This bill defines computer fraud and the offenses covered by the term \"computer forgery, damage to computer data or computer programs, computer sabotage, unauthorized access and unauthorized interception as well as obscenities. It likewise, provides the necessary penal provisions that must be imposed upon the violators of the offense, both fine and imprisonment. Finally, it accords authority to the National Security Council to conduct investigation on computer-relate d crimes vis-a-vis its effects on national security."
