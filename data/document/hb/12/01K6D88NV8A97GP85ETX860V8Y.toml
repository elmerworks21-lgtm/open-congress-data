congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF NATIONAL IDENTIFICATION IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "The proposed IDENTIFICATION CARD shall be used in all transactions with any government agency, in filing of application for any services and benefits offered by the Government Service Insurance System, the Social Security System and the PhilHealth,in tendering or making tax payments to the concerned agency, in seeking admission to any government hospital, health centers and similar institutions, in seeking admission in all schools, whether public or private, in casting his vote during elections, whether national or local, and in such other transactions as may be provided for under the rules and regulations to be promulgated by the Department of Justice. Provided, That the ID card shall be made of hard plastic, tamper-proof/fo ol-proof andd similarly designed like the existing driver's license issued by the Land Transportation Authority. Provided, further, That there should only be one authorized manufacturer and printer of said ID."

