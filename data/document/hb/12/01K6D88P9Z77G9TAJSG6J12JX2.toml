congress_website_title = "AN ACT FIXING THE DATE OF REGULAR ELECTION FOR ELECTIVE OFFICIALS OF THE AUTONOMOUS REGION IN MUSLIM MINDANAO PURSUANT TO REPUBLIC ACT NO. 9054, ENTITLED \\\"AN ACT TO STRENGTHEN AND EXPAND THE ORGANIC ACT FOR THE AUTONOMOUS REGION IN MUSLIM MINDANAO, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6734, ENTITLED \\\"AN ACT PROVIDING FOR AN ORGANIC ACT FOR THE AUTONOMOUS REGION IN MUSLIM MINDANAO\\\", AS AMENDED"
congress_website_abstract = "RA 9054 provided that the date of the first regular election for elective officials in the expanded Autonomous Region in Muslim Mindanao (ARMM) shall be held in the second Monday of September 2001. However, the first regular election for elective officials in the expanded ARMM was held on November 26, 2000 pursuant to RA 9140. In consonance with the provision of RA 9054, this measure proposes to hold the second regular elections for elective officials in the ARMM on the second Monday of September 2005 and the succeeding elections every three years thereafter. The term of office of the elected officials shall commence at noon of the 30th day of September 2005 next following their election and shall end at noon of the 30th day od September three years thereafter."
