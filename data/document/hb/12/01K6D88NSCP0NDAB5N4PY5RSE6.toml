congress_website_title = "AN ACT PROVIDING FOR A MORE RESPONSIVE AND COMPREHENSIVE REGULATION FOR THE PRACTICE OF CHEMICAL ENGINEERING IN THE PHILIPPINES, REPEALING FOR THE PURPOSE REPUBLIC ACT NUMBERED THREE HUNDRED AND EIGHTEEN, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to provide for a more responsive and comprehensive regulation for the practice of Chemical Engineering in the Philippines.> Republic Act No. 318, otherwise known as the Chemical Engineering Law was enacted on June 19, 1948. The presnet advances in technology practically make all phases of engineering work fully automated. The availability of advanced, sophisticated and modern instruments has rendered Republic Act No. 318 obsolete, sometimes irrelevant and impractical. A review of the law would reveal that some provisions thereof are inapplicable and therefore prone to be violated than followed. Hence this bill."
