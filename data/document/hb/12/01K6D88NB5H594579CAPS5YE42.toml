congress_website_title = "AN ACT TO ENHANCE THE INTERCONNECTION BETWEEN AND AMONG PUBLIC TELECOMMUNICATI ONS ENTITIES, PROVIDING FOR POLICIES AIMED AT RESOLVING INTERCONNECTION DISPUTES AND THE IMPLEMENTING MECHANISMS THEREFOR AND FOR OTHER PURPOSES (CONVERGENCE)"
congress_website_abstract = "The bill provides punishment for refusal or failure of any telecommunicati ons entity to comply with interconnection regulations after having been required by lawful written order of the National Telecommunicati ons Commission (NTC). Acts such as willful termination, disconnection, discontinuity, interruption, blocking and/or disruption of interconnection by any public telecommunicati ons entity will be prohibited. > Procedures for interconnection and reconnection and matters to be covered in the interconnection agreement will be provided for. The parameter for interconnection including points of interconnection , quantity of interconnection circuits, underwriting interconnection costs and interconnection costs will also be laid out. Crimiinal penalties for the violation of such will be provided for."
