congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7432, OTHERWISE KNOWN AS `AN ACT TO MAXIMIZE THE CONTRIBUTION OF SENIOR CITIZENS TO NATION BUILDING, GRANT BENEFITS AND SPECIAL PRIVILEGES AND FOR OTHER PURPOSES'"
congress_website_abstract = "This bill seeks to enhance the privileges already granted to senior citizens by: (1) Including the costs of electric and water utilities in the list of items subject to the twenty percent (20%) discount privilege; (2) Exempting from the payment of real property taxes the family homes of senior citizens; and (3) Exempting from twenty percent (20%) withholding tax on interest income from bank deposits. > In addition, it is also proposed that funeral and burial expenses, including costs for internment, cremation and other disposition of a corpse, suitable monument, epitaph and cost of the burial lot shall be covered by the discount privilege as part of the social services afforded to senior citizen."
