congress_website_title = "AN ACT STRENGTHENING THE REGULATORY POWER OF THE STATE AND THE POSITION AND COMPETITIVENESS OF LOCAL DRUG FIRMS IN THE IMPORTATION, MANUFACTURE, PACKAGING, SALE AND DISTRIBUTION OF PHARMACEUTICAL DRUGS IN THE PHILIPPINES, AND INSTITUTING FURTHER MEASURES TO LOWER THE COST OF MEDICINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Drugs Act of 2001\". This bill seeks to STRENGTHEN the mandate of administrative machinery of the DOH and of existing laws regarding drugs and pharmaceuticals . To achieve this, the bill seeks, among others, to introduce vital amendments to existinglaws concerning drugs and pharmaceuticals not only to pave the way for: (1) a greater state intervening through a more active and efficient regulatory system in the drug industry complemented by a more vigorous and intrusive participation of the DOHin the purchase and distribution of drugs as to effectively influence the prevailing price schemes in the market but also (2) in extending the support long clamored by local drug firms."

