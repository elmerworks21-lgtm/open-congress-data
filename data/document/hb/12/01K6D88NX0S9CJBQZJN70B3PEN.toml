congress_website_title = "AN ACT PROVIDING FOR THE TEACHING OF ECOLOGY IN ALL ELEMENTARY AND SECONDARY LEVELS, WHETHER PUBLIC OR PRIVATE OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: In effect, the youth will become more ecologically aware abd vigilant, understand the dynamic relationships which support and maintain the bio-system, demostrate practical solutions to the intricacies of the environmental imbalance the Philippines is facing. Such ecological subject will surely re-orient our sense of education and progress that the achievement of common vision for natural progress depends primordially on a holistic and liberal education."

