congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF DISPOSITION OF SEIZED/ CONFISCATED ILLEGALLY CUT, GATHERED, REMOVED, AND POSSESSED LOGS, LUMBER, FLITCHES AND OTHER FOREST PRODUCTS AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to curb this anomalous situation by PROHIBITING the DENR and the NRDC from conducting a PUBLIC AUCTION on all seized and confiscated illegally cut, gathered, removed, and possessed logs, lumber, flitches and other forest products. Instead these should be donated to the local government units (LGU) with jurisdiction over the area of origin to benefit their respective communities. These will be distributed according to priority, enhancing delivery of education, housing and infrastructure in the territorial jurisdiction of the LGU concerned."
