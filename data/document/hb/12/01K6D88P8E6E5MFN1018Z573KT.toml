congress_website_title = "AN ACT TO REGULATE THE PRACTICE OF VETERINARY MEDICINE IN THE PHILIPPINES, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 382 AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Philippine Veterinary Medicine Act of 2003\\\". Animals and their by-products are potential carriers of diseases. They are often the source of diseases transmissible to man. Therefore, it is imperative that to regulate the profession entrusted tomanage the country's animal health. This measure seeks to upgrade the practice of veterinary medicine for the purpose of protecting the animal population in the country. It aims to uplift the role of veterinarians in safeguarding public health and inthe control of zoonotic diseases."
