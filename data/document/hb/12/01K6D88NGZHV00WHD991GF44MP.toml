congress_website_title = "AN ACT ABOLISHING THE DEATH PENALTY REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 7659, ENTITLED `AN ACT TO IMPOSE THE DEATH PENALTY ON CERTAIN HEINOUS CRIMES, AMENDING FOR THE PURPOSE THE REVISED PENAL CODE, AS AMENDED, OTHER SPECIAL PENAL LAWS, AND FOR OTHER PURPOSES'"
congress_website_abstract = "Rationale: The harshness of the death penalty may not spare even the life of the innocents. The countless people, who are wielding authority and influence in the government must think that criminals are not born. They are made by society. Since society, in some measure, is responsible for the criminal's misfortune, it is therefore, unfair that society itself will exact his life."
