congress_website_title = "AN ACT REGULATING THE PRACTICE OF ACCOUNTANCY IN THE PHILIPPINES, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES, REPEALING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 692, OTHERWISE KNOWN AS THE REVISED ACCOUNTANCY LAW"
congress_website_abstract = "\\\"Philippine Accountancy Act of 2004\\\". Accountancy play a very important role in nation building and development. The bill seeks to update the antiquated and irrelevant provisions of PD 692 to make the accounting profession at par with global trends and development. It defines and interprets the practice of accountancy in commerce and industry, education, public practice and government service. The powers and functions of the Professional Regulatory Board of Accountancy are enhanced and strengthened in the proposed law."
