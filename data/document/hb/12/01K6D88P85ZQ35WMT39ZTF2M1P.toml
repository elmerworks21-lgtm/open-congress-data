congress_website_title = "AN ACT STRENGTHENING AND RATIONALIZING THE NATIONAL PROSECUTION SERVICE, THE LEGAL STAFF, TECHNICAL STAFF AND OTHER KEY POSITIONS IN THE OFFICE OF THE SECRETARY OF JUSTICE"
congress_website_abstract = "Effective prosecution of criminal cases is one of the principal concerns of our government. To meet this concern, the government must maintain a roster of qualified, committed and efficient government prosecutors, prosecution attorneys, state counsels, attorneys in the Technical Staff and other key officials in the Office of the Secretary of Justice. This bill grants additional allowances and benefits to prosecutors and prosecution attorneys in the National Prosecution Service (NAPROSS), statecounsels in the Office of the Chief State Counsel, attorneys in the Technical Staff, the Undersectaries and Assistant Secretaries in the Office of the Secretary of Justice."
