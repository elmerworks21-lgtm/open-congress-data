congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION AND PRESERVATION OF PHILIPPINE CULTURAL HERITAGE AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Cultural Heritage Law of 2003\". The Philippines has a rich cultural heritage. However, many of these are in the verge of ruin due to their prolonged exposure to natural wear and tear and the lack of attention being given them. This billseeks to protect, preserve, conserve and promote the nation's cultural heritage, its properties and its histories in order to conserve the ethnicity of local communities and of the nation as a whole. It also aims to establish and strengthen culturalinstitutions and to protect cultural workers and assure their professional development and well-being."
