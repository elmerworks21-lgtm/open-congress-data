congress_website_title = "AN ACT PROVIDING FOR SURVIVORSHIP BENEFIT TO THE SPOUSE OF A DECEASED CONSTITUTIONAL OFFICIAL AND FOR OTHER PURPOSES"
congress_website_abstract = "In the event a retired constitutional official mentioned in the Section 2 Article XI of the Constitution, appointed before or after ratification thereof, then receiving or entitled to receive a lifetime pension from the government, dies after said ratification, the surviving spouse of the said retiree shall receive every month thereafter survivorship benefits equivalent to fifty percent (50%) of the monthly pension of the deceased, except in case of civil status changed: and provided, that saidbenefits shall not accrue monthly prior to the effectivity of this Act."
