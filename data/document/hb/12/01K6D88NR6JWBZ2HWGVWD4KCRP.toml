congress_website_title = "AN ACT GRANTING FIRST PREFERENCE TO THE CLAIMS FOR DAMAGES OF VICTIMS OF HUMAN RIGHTS VIOLATIONS IN THE DISPOSITION OF THE ACCOUNTS AND ASSETS OF THE LATE PRESIDENT FERDINAND MARCOS FORFEITED TO THE PHILIPPINE GOVERNMENT AS ILL-GOTTEN WEALTH"
congress_website_abstract = "\"Law on Compensation of Victims of Human Rights Violations\". Any provision of existing law to the contrary notwithstanding which are adjudicated in favor of the victims or their heirs by proper courts within and outside the country's jurisdiction shall be given first preference over all other claims to the forfeited accounts or the proceeds of assets of the late President Ferdinand Marcos adjudged to be ill-gotten wealth and forfeited to the Philippine government.> Such preferential claims shall include the favorable judgment won by 9,539 victims of human rights violations during the martial law regime in the human rights class action lawsuit before the U.S. District Court for the District of Hawaii in the amount pf US$1.9 billion and the\"Agreement of Compromise and Settlement\" in the amount of US$150 million."
