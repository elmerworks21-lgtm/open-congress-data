congress_website_title = "AN ACT AMENDING SUBPARAGRAPHS (C) AND (D) OF SECTION 70 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposes to increase the percentage of the registered voters who may initiate recall of any elective official from twenty-five percent (25%) to at least FORTY percent (40%) of the total number of registered voters in the local government unit concerned during the election in which the local official sought to be recalled was elected. > It penalizes any person found guilty of violating this Act by six (6) years imprisonment."
