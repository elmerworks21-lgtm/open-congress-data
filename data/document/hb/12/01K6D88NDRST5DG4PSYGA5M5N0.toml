congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION AND CONSERVATION OF ALL OBJECTS OF UNDERWATER CULTURAL HERITAGE IN PHILIPPINE WATERS"
congress_website_abstract = "This bill aims to protect and preserve our underwater cultural heritage by providing for general requirements for underwater archaeology, exploration, and excavation. This measure also proposes the formulation of rules for the description of the items to be protected, prohibition of certain activities in the vicinity of a protected item or site, the establishment of a reward system for verified reports, and the imposition of sanction and penalties for the abuse of our underwater cultural heritage."

