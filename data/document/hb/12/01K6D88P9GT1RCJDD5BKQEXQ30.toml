congress_website_title = "AN ACT PROVIDING FOR A RATIONALIZED LAND ADMINISTRATION SYSTEM AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Land Administration System Act of 2003\\\". The bill proposes to consolidate and streamline within a single government agency the land administration powers and functions currently being dispersed by the Department of Justice's Land Registration Authority and Register of Deeds; the Department of Environment and Natural Resources' Land Management Bureau, Land Management Services in the regional, provincial and community offices, National Mapping and Resource Information Authority; and CARP Secretariat and its field offices. Without the integration of these agencies, it will be difficult for the government to undertake major long-term investment of resources necessary in the implementation of over-all reforms. The bill also seeks the creation of the Land Administration Authority which shall be the primary government agency responsible for land administration and public land management, specially the conduct of surveys, production of maps, classification of lands, disposition of alienable lands of the public domain and patrimonial lands, registration of titles, and resource information generation and management."

