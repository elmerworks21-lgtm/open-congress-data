congress_website_title = "AN ACT DESIGNATING THE TECHNOLOGY MANAGEMENT CENTER OF THE UNIVERSITY OF THE PHILIPPINES AT DILIMAN, QUEZON CITY, AS A NATIONAL CENTER OF EXCELLENCE FOR TECHNOLOGY ASSESSMENT, MANAGEMENT, FORECASTING, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The University of the Philippines (U.P.) Diliman Technology Management Center, hereinafter referred to as the Center, is hereby designated as a National Center of Excellence. The Center shall provide Congress and other government agencies, as well as the private business and industry, advice and assistance on technology forecasting, assessment and evaluation, planning, policy analysis, technology sourcing, acquisition, negotiation, upgrading and innovation, as well as other technology-rela tedactivities."

