congress_website_title = "AN ACT CREATING THE BUREAU OF SPECIAL EDUCATION AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Special Education Act of 2002.\" This bill seeks to create a Bureau of Special Education under the Department of Education which shall effect the establishment of adequate quality special education system for persons with special needs in all levelsof learning, prescribe the criteria for the establishment of special education programs in public and private schools in all regions of the country, devise and develop program models for non-school-base d learners with special needs, monitor, assessand evaluate said programs and perform such other functions as may be provided by law or delegated by the Secretary of the Department of Education."
