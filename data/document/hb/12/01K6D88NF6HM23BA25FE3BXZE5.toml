congress_website_title = "AN ACT REQUIRING LGUs TO SET ASIDE NOT LESS THAN FIVE PERCENT (5%) OF THE TOTAL REVENUE FROM REGULAR SOURCES OF THE PRECEDING YEAR AS LUMP SUM APPROPRIATION TO FINANCE REFORESTATION PROGRAMS AND PROJECTS, AMENDING FOR THE PURPOSE SECTION 324 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "This bill seeks to mandate local government units to set aside not less than two and a half percent (2.5%) of the total revenue from regular sources of the preceding year for reforestation programs and projects. Setting aside two and a half percent(2.5%) of the LGUs total revenue from regular sources of the preceding year, ensures the LGUs ecological viability and enhances the country's resources sustainability."

