congress_website_title = "AN ACT ESTABLISHING THE MOVEMENT TO HELP ERADICATE RAPE AND OTHER FEMALE ABUSES `MOTHER' MANDATING THE COMPULSORY TEACHING OF SELF DEFENSE TO ALL FEMALE CONSTITUENTS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This Act shall be known as the \"MOVEMENT TO HELP TO HELP ERADICATE RAPE & OTHER FEMALES ABUSES (MOTHER) ACT OF OR 'MOTHER RAPE PREVENTION ACT'\". > This bill seeks to prevent sexual harassment, assaults and other forms of abuses by enabling females to have a defense mechanism; based on the principle that self-defense is an instinct, which needs to be developed. With proper technique, knowledge of self-defense results in self-confidence , good disposition and quick reflexes in the face of imminent danger. It is high time that the State addresses from this perspective the issues of violence and other crimes perpetuated against our females."

