congress_website_title = "AN ACT TO INSTITUTE COASTAL AND FORESHORE LAND REFORM"
congress_website_abstract = "Millions of Filipinos depend on small-scale fishing for their livelihood. However, many of our small fishermen do not have direct and untrammeled access to the sea because most of the coastal lands are either lands of the public domain or private lands. This bill aims to provide an opportunity for millions of small fishermen and farmer-fishermen to own small portions of the land along the coast by giving them the right to purchase the same under just and reasonable terms and conditions."
