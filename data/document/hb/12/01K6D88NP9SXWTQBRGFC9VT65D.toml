congress_website_title = "AN ACT PROVIDING INSURANCE COVERAGE TO MEDICAL PRACTITIONERS IN THE RURAL AREAS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Doctors, nurses, medical aides and other persons engaged in the delivery of medical service, hereinafter referred to as medical practitioners who practice their profession in the rural areas shall be covered by life, disability and personal accidentinsurance under the Government Service Insurance System (GSIS): Provided, That such coverage shall only be effective for the duration of the actual practice of profession in the area. >As used in this Act the term \"rural areas\" shall mean a countryside area characterized by simplicity or a lack of sophistication with fewer than one thousand five hundred (1,500) inhabitants."

