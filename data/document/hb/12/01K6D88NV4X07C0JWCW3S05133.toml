congress_website_title = "AN ACT PROVIDING FOR VOLUNTARY DRUG TESTING OF HIGH SCHOOL STUDENTS"
congress_website_abstract = "This bill intends to help parents encourage their children who are about to enter college to voluntarily undergo testing for drug or substance abuse. The intention of which is to prevent students from continuing further their vice while in school as it will pose more inconveniences in the future for both the parent and the child. If tested positive for drug or substance abuse, it is the decision of the family to voluntarily refer their child to any institution that will undertake their rehabilitation. This process will be undergone in close coordination with school authorities."
