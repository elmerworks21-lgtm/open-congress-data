congress_website_title = "BATAS NA NAGTATAKDA NG FILIPINO BILANG OPISYAL NA WIKA NG PAGTUTURO SA MGA PAARALAN"
congress_website_abstract = "Article XIV of the Constitution declares Filipino as the national language of the country. It also provides for the government to take steps to initiate and sustain the use of Filipino as the official language of instruction in the educational system. This measure proposes the use of Filipino as the official langugage of instruction in all our schools."

