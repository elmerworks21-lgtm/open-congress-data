congress_website_abstract = "This measure seeks the reappointment of legislative districts thoughout the country among provinces and cities.> It is envisioned that through this measure, equality of representation which is a basic principle of republicanism, shall be achieved thru reapportionment of districts which, following the constitutional requirement, shall as far as practicable, be comprised of contiguous, compact and adjacent territory."
