congress_website_title = "AN ACT PROVIDING FOR AN EQUITABLE DISTRIBUTION OF THE INTERNAL REVENUE ALLOTMENT (IRA) TO, AND AUTHORIZING ITS AUTOMATIC RETENTION BY, THE LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE SECTIONS 285 AND 286 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS `THE LOCAL GOVERNMENT CODE OF 1991', AND FOR OTHER PURPOSES"
congress_website_abstract = "The share of local government units in the internal revenue allotment shall be allocated BEGINNING IN 1996, AFTER DEDUCTING THEREFROM THE FULL COSTS OF THE DEVOLVED FUNCTIONS AS WELL AS THE CITY FUNDED HOSPITALS, in the following manner: (a) Provinces - Twenty-three percent (23%); (b) Cities - Twenty-three percent (23%); (c) Municipalities - Thirty-four percent (34%); and (d) Barangays - Twenty-percent (20%) PROVIDED, HOWEVER, THAT IN THE EVENT THAT NEW CITIES ARE CREATED, THE EXISTING NUMBER OF CITIES PRIOR TO THE CREATION SHALL BE ALLOWED TO RECOVER THE AMOUNT OF NOT LESS THAN P899 MILLION EVERY YEAR WHICH THEY WOULD LOSE UNDER THE NEW ALLOCATION FORMULA AS PROVIDED IN THIS SECTION."
