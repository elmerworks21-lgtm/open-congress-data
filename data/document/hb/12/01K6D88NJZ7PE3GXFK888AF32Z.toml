congress_website_title = "AN ACT ESTABLISHING A UNIFORM SYSTEM OF RETIREMENT AND SEPARATION BENEFITS FOR THE UNIFORMED PERSONNEL OF THE DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT FURTHER AMENDING REPUBLIC ACT NO. 6975 AS AMENDED BY REPUBLIC ACT NO. 8551 AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill shall cover uniformed personnel of the Department of the Interior and Local Government who are eligible for optional and compulsory retirement and honorable separation from government service. For purposes of this Act, uniformed personnelshall include the uniformed officers and non-officers of the Philippine National Police (PNP), Bureau of Fire Protection (BFP) and Bureau of Jail Managment and Penology (BJMP) organized under R.A. No. 6975.> The proposed bill is a consolidation of various existing laws pertaining to the retirement and separation benefits previously received, extended, granted and entitled to be received by former members of the defunct PC and INP before the creation of PNP, BFP and BJMP. There is a perceived neeed to clarify, restore and to provide retirement and separation benefits to members of the uniformed personnel of the DILG, since the merger of the defunct PC and INP under RA 6975 has brought to fore some problems pertaining to retirement which is i"
