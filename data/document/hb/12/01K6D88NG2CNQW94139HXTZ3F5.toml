congress_website_title = "AN ACT GRANTING INCENTIVES TO AGENCIES PROVIDING CHILD CARE FACILITIES"
congress_website_abstract = "All offices whether private or government, including government-owne d or controlled institutions providing child care facilities and amenities to their employees and children six (6) years of age or below shall be entitled to the following incentives: 1. Exemption from payment of all forms of taxes, duties, fees or impost of such facilities and amenities. 2. To charge cost as expense for income tax purposes."

