congress_website_title = "AN ACT GRANTING FIVE HUNDRED PESOS (P500.00) MONTHLY ALLOWANCE TO ALL BARANGAY TANODS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: As the basic political unit, the barangay has lots of requirements which only bigger political units can provide. One such need is to provide incentives to those who normally deliver the services in the barangay hierarchy - the barangaytanods. This bill proposes to grant a standard monthly allowance of FIVE HUNDRED (P500.00) PESOS to all barangay tanods."

