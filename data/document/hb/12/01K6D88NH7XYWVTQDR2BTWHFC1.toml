congress_website_title = "AN ACT ESTABLISHING AT LEAST ONE (1) SPECIAL EDUCATION (SPED) CENTER FOR EACH SCHOOL DIVISION AND AT LEAST THREE (3) SPED CENTERS IN BIG SCHOOL DIVISIONS FOR CHILDREN WITH SPECIAL NEEDS (CSN's), CREATING THE IMPLEMENTING MACHINERY THEREOF, PROVIDINGGUIDELINES FOR GOVERNMENT FINANCIAL ASSISTANCE AND OTHER INCENTIVES AND SUPPORT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It is hereby declared the policy of the State to protect and promote the rights of children with special needs (CSN's) to quality education and to take appropriate steps to male such education accessible to them. The State recognizes their vital role in national development and that finding solutions to their problems forms an integral part of national development strategies. It is also the policy of the State to give full support for their welfare and development to ensure their full integration to society as well as to facilitate their active participation in the affairs of the State. Towards this end and also pursuant to the mandate stated in Section 13 of Article II, Sec. 13 of Article XIII of the 1987 Constitution, Sec. 11-2, pars. 1 and 3 of Article XIV, Art. 3 of P.D. 603 and Sections 12-14 of R.A. 7277, the State shall institutionaliz e an adequate and relevant educational program for every child with special needs through the establishment of SPED Centers and of"
