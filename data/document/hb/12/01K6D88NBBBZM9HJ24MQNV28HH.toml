congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE WATER POLLUTION CONTROL POLICY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Though the importance and necessity of maintaining our water resources is recognized, the same is not being done. Water pollution still remains prevalent and is the continuing major cause of the degradation of our marine and freshwater resources. Lack of regulation and monitoring capabilities on the part of the government contribute to the problem of water pollution. In Metro Manila, tons of garbage and septic wastes are generated and flushed to the different water channels while chemical wastewater from big factories remain untreated. Water tables and aquifers are imperiled as water pollution worsens, coupled by water wastage.> In this bill, local government units will establish area-specific effluent limitations, subject to thhe national standards established by the Environmental Management Bureau (EMB), the latter being mandated to have jurisdiction over all aspects of water quality and water pollution."
