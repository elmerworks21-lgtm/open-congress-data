congress_website_title = "AN ACT FURTHER AMENDING REPUBLIC ACT NUMBERED THREE THOUSAND FIVE HUNDRED NINETY-ONE, AS AMENDED, OTHERWISE KNOWN AS THE CHARTER OF THE PHILIPPINE DEPOSIT INSURANCE CORPORATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to amend the charter of the Philippine Deposit Insurance Corporation (PDIC). This bill promotes and safeguards public interest by establishing the basic policy of providing permanent and continuing coverage on all insured deposits. It increases insurance coverage from One Hundred to Two Hundred Thousand Pesos, thus increasing the protection granted each depositor. It gives the PDIC the authority to review insurance ceverage every five years to give it some flexibility in its policy-determin ing functions."
