congress_website_title = "AN ACT CONVERTING THE 95 CHED-SUPERVISED INSTITUTIONS (CSIs) OF THE PHILIPPINES TO BE CALLED POLYTECHNIC STATE COLLEGES OF THE PHILIPPINES (PSCP) AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Higher Technological Education Act of 2001\". The bill seeks to declare the 95 CHED-Supervised Institutions (CSI) of the Philippines to be called Polytechnic State Colleges of the Philippines to achieve a more coordinated and integrated technological, agricultural and industrial system of higher education. Thereby, providing a more relevant direction in the governance of higher technical education institution."
