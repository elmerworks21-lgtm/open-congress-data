congress_website_title = "AN ACT DECLARING POSITIONS IN THE STAFFING PATTERN AND PLANTILLA OF THE BUREAU OF INTERNAL REVENUE AND THE BUREAU OF CUSTOMS AS POLICY-DETERMIN ING, PRIMARILY CONFIDENTIAL AND HIGHLY TECHNICAL, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"BIR Personnel Reform Act of 2001\". All positions in the staffinf pattern and plantilla of the bureau of Internal Revenue directly and expressly tasked with the enforcement and implementation of tax laws or directly involved or connected with the assessment and collection of taxes are hereby declared as policy-determin ing, primarily confidential and highly technical. > any personnel who may displaced or separeated as a consuquence of the implementation of this Act or who may choose to discontinue his services shall be entitled to such retirement benefits, if qualified, provided under existing laws, rules and regulations. Otherwise, he shall be paid separation benefits equivalent to one and one-half months salary for every year of servicein the government."
