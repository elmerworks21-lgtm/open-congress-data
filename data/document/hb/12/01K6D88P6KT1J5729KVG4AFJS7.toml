congress_website_title = "AN ACT PROMOTING THE WELFARE OF THE PHILIPPINE COAST GUARD BY INCREASING, INTEGRATING AND RATIONALIZING THE BASE PAY AND OTHER BENEFITS OF ITS OFFICERS AND ENLISTED PERSONNEL, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Magna Carta of the Philippine Coast Guard.\" It is the objective of this Act to ensure reforms in the organization of the Philippine Coast Guard by bestowing to every personnel the enjoyment of basic rights and privileges in his career in the Coast Guard service and upon retirement. As provided for in this bill, the State shall: (a) Promote and maintain a rationalized and professional Coast Guard service; (b) Facilitate administrative and financial support to every PCG personnel and/or hisfamily facing criminal or civil suit arising from service-related \"acts of omissions\" and in the course of his duty; (c) Promote and develop a rational system of career promotion and advancement based on merit and a uniform criteria, applicable to evvery PCG personnel; (d) Develop every Coast Guard personnel to be highly competent and professional by institutionaliz ing the PCG as a strong cohesive and well-balanced bureau of government; and (e) Assure the rights of every PCG personnel to securi"
