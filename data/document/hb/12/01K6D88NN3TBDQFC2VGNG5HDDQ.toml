congress_website_title = "AN ACT CREATING A SPECIAL AGRICULTURAL FUND OUT OF THE TEN PERCENT (10%) GROSS ANNUAL INCOME OF THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION (PAGCOR) FOR THE YEARS 2001-2010 TO BE ADMINISTERED BY THE LANDBANK OF THE PHILIPPINES FOR LENDING TO SMALL FARMERS AND FISHERFOLKS AND FOR OTHER PURPOSES"
congress_website_abstract = "This proposed measure seeks to create a \"special agricultural fund\" to be taken-out of the ten percent annual gross income of the Philippine Amusement and Gaming Corporation (PAGCOR) for the years 2001 to 2010 to be administered by the Landbank of the Philippines for lending to small farmers and fisherfolks individually or thru their cooperatives. > This proposed measure further addresses the call of President Glorian Macapagal-Arroy o for the enactment of a law making farm lands acceptable asloal collateral to increase investments in agriculture. In addition to farmlands, the bill provides that small farmers and fisherfolks can use their farming and fishing implements, crops and expected fish harvests as collateral to avail of this crediit facility."
