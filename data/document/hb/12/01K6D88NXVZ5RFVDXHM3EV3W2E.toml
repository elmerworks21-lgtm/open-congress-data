congress_website_title = "AN ACT TO PROHIBIT THE PRACTICE OF BLACKLISTING BY RECRUITMENT AND PLACEMENT SERVICES THROUGH THE USE OF ANY MEANS, MECHANISMS OR LISTS WHICH INTEND TO SPECIFICALLY PREVENT OR DETER OVERSEAS FILIPINO WORKERS (OFW's) FROM GAINING PRODUCTIVE EMPLOYMENT, PROVIDING FOR STIFFER PENALTIES THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Blacklist ing in Overseas Job Applications Act\". It shall be unlawful for any recruitment and placement service or agency to cause any negative marking or sign or any other similar information in the passport or any other official document ofseafarers so as to warn or caution or discourage other recruitment and placement service from hiring and/or employing a particular OFW and/or to effect a prevention or deterrence against one's employment, or reemployment, or continuing employment."

