congress_website_title = "AN ACT INSTITUTING THE DANGEROUS DRUGS ACT OF 2001 REPEALING REPUBLIC ACT NO. 6425, AS AMENDED"
congress_website_abstract = "Rationale: At present, drug abuse has reached alarming proportions not only in the Philippines, but also in most regions of the world. With the proliferation of senseless crimes due to drug use and/or abuse, it is proposed that the minimum quantityprescribed in R.A. 6425, as amended be removed. Furthermore, in order to give more emphases on the responsibility of the parents to educate and discipline their minor children regarding the evils of using or consuming dangerous drugs, the parents under the proposed bill shall be civilly liable if their children are found guilty of violating the provisions of the Dangerous Drugs Act, as amended."
