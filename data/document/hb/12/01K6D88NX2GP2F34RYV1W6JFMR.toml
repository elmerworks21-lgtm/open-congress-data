congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6425, OTHERWISE KNOWN AS THE DANGEROUS DRUGS ACT OF 1972, AS AMENDED, CLASSIFYING METHYLAMPHETAMI NE HYDROCHLORIDE OR SHABU AS A PROHIBITED DRUG AND IMPOSING THE PENALTIES PROVIDED BY THE SAID ACT FOR THE IMPORTATION, MANUFACTURE, SALE, ADMINISTRATION DELIVERY, DISTRIBUTION AND TRANSPORTATION OF DANGEROUS DRUGS, CULTIVATION OF PLANTS SOURCES OF DANGEROUS DRUGS AND MAINTENANCE OF A DRUG DEN WITHOUT REGARD TO THE QUANTITY OF THE DANGEROUS DRUGS INVOLVED"
congress_website_abstract = "Rationale: To improve government efficiency in its fight against dangerous drugs, now is the time that we finetune our laws against illegal drugs, particularly Republic Act 6425, otherwise known as the \"The Dangerous Drugs Act of 1972\" to the effectthat methlyamphetami ne hydrochloride or shabu be classified as a prohibited drug and that the penalties provided therein for the importation, manufacture, sale, administration, delivery, distribution and transportation of dangerous drugs, the cultivation of plant sources of dangerous drugs and maintenance of a drug den for drug users be imposed without regard to the quantity of dangerous drugs involved, with the end view that the aforementioned offenses be classified as non-bailable and the coonvicts ineligible for probation after conviction."
