congress_website_title = "AN ACT PENALIZING THE EMPLOYMENT OF CHILDREN IN ANY PUBLIC OR PRIVATE UNDERTAKING OR OCCUPATION WHICH IS CONSIDERED HAZARDOUS TO HIS/HER LIFE, SAFETY, HEALTH AND MORALS, OR WHICH UNDULY INTERFERES WITH HIS/HER NORMAL DEVELOPMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "In recognition of the right of every child to a standard of living necessary for his/her physical, mental, spiritual, moral and social development, it is hereby declared the policy of the State to institute measures that will ensure their protectionagainst economic exploitation and from having to perform any hazardous work or activity that will unduly interfere with his/her education, or is harmful to the child's physical, mental, spiritual, moral or social development. > This bill classifieswhat are considered HAZARDOUS OR UNHEALTHY OCCUPATIONS for children, and states the penalties for violations of this Act."
