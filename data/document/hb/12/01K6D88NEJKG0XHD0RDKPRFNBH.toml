congress_website_title = "AN ACT AUTHORIZING THE TRANSFER OF OFFENDERS TO OR FROM FOREIGN COUNTRIES"
congress_website_abstract = "This bill shall only applicable to the transfer of an offender to and from a foreign country pursuant to a treaty that is in force: Provided, That a sentence imposed by a foreign court upon an offender who is subsequently transferred to the Philippines pursuant to a treaty shall be fully executed in the Philippines even though the treaty under which the offender was transferred is no longer in force."

