congress_website_title = "AN ACT AMENDING ARTICLE 192 OF THE CHILD AND YOUTH WELFARE CODE SO AS TO EXTEND ITS BENEFITS TO YOUTHFUL OFFENDERS CONVICTED OF OFFENSES PUNISHABLE BY DEATH OR LIFE IMPRISONMENT OR CONVICTED BY MILITARY TRIBUNALS"
