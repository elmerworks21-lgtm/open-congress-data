congress_website_title = "AN ACT DECLARING JUNE 2 OF THE YEAR AS FIL-HISPANO DAY"
congress_website_abstract = "The State recognizes the uncommon valor and nationalism of the Spanish soldiers that laid siege in the Church of Baler from 27 June 1898 to 2 June 1899, when they surrendered to the Filipino forces, and pursuant to the decree of President Emilio Aguinaldo dated 30 June 1899 declaring them friends of the Republic of the Philippines, desires to promote better relations between our two nationa.> The Second of June of each year is hereby declared as Fil-Hispano Friendship Day to commemorate cultural historical ties, friendship and cooperation between the Philippines and Spain. It shall be a non-working holiday in Aurora Province and a working holiday in all other parts of the Philippines."

