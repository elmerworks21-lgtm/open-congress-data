congress_website_title = "AN ACT ENHANCING THE COMPETITIVENESS AND ESTABLISHING THE SELF-RELIANCE OF THE NATIONAL PHARMACEUTICAL INDUSTRY, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Pharmaceutical Industries Omnibus Act of 1999\". Rationale: A profile of the Philippine pharmaceutical industry reveals that it is oligopolistic in structure, dominated by foreign corporation or multinational companies (MNC's) cornering almost ninety percent (90%) of the total market for pharmaceuticals , mostly composed of branded leading products. Distribution channels for drugs and medicines are likewise composed of foreign multinational firms distributing the products of the manufacturers. Filipino-owned and -controlled companies manufacturing and distributing generic drugs and medicines comprise only 12% to 15% of the total market. This bill, therefore, seeks to address those concerns: >1. Establishment of an effective drugg regulatory system; 2. Provision of safe, affordable and accessible drugs and medicines; and 3. Initiation of ways and means to increase the global competitiveness and self-reliance of the local pharmaceutical industry."

