congress_website_abstract = "Rationale: Truly, while there are constitutional provisions which assure every Filipino individual for their right to health services from the government, it is still deemed necessary that specific and concrete programs and actions be designed to effect them and to make said provisions relevant and responsive to the current needs of the people. It is in this spirit that the proposed bill is conceived."
