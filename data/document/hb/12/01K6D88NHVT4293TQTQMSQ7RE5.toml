congress_website_title = "AN ACT PROHIBITING THE ESTABLISHMENT OF POLITICAL DYNASTIES"
congress_website_abstract = "Any person who has a political dynasty relationship with the incumbent President of the Philippines or a candidate for such elective position is disqualified from running for any national and local elective public office. Any person who has a political dynasty relationship with an incumbent elective official is disqualified from running for any elective public office within the same city and/or province where an incumbent elective public official is also running: Provided, That, the incumbent elected public official covered by this Act shall not include that of Barangay official."

