congress_website_title = "AN ACT REQUIRING AS CONDITION PRECEDENT A HUMAN RIGHTS CLEARANCE IN EVERY APPOINTMENT AND PROMOTION OF OFFICERS, ENLISTED PERSONNEL, AGENTS OR MEMBERS POSSESSING AUTHORITY FOR MILITARY OR POLICE OR PEACE AND ORDER OPERATIONS OR CRIMINAL INVESTIGATION IN THE ARMED FORCES OF THE PHILIPPINES, THE PHILIPPINE NATIONAL POLICE, THE NATIONAL BUREAU OF INVESTIGATION AND THE COAST GUARD OF THE PHILIPPINES, CREATING A HUMAN RIGHTS CLEARANCE BOARD, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Human Rights Clearance Act of 2004\\\". In order to check the rampant trnasgression of human rights among those who are tasked with the enforcement of the law, this bill requires the issuance of a human rights clearance for the validity and effectivity of every appointment or promotion of officers , enlisted personnel, agents or members possessing authority for military or police or peace and order operations or criminal investigation in the Armed Forces of the Philippies, the Philippine National Police, the National Bureau of Investigation and the Coast Guard of the Philippines. It also proposes the creation of the Human Rights Clearance Board which shall be responsible for the issuance of human rights clearances for purposes of appointment or promotion of military, police and other law enforcement officers."

