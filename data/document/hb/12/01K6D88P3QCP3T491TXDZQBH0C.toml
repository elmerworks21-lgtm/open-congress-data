congress_website_title = "AN ACT APPROPRIATING SEVENTY-FIVE MILLION PESOS (P75,000,000.00 ) ANNUALLY FOR THE CONGRESSIONAL MIGRANT WORKERS' SCHOLARSHIP FUND, AMENDING FOR THE PURPOSE `THE MIGRANT WORKERS AND OVERSEAS FILIPINO ACT OF NINETEEN HUNDRED AND NINETY-FIVE'"
congress_website_abstract = "SECTION 1. Section 37 of Republic Act Numbered Eighty Hundred and Forty-Two, otherwise known as the Migrant Workers and Overseas Filipinos Act of 1995,\" is hereby amended by adding a new paragraph to read as follows: > \"SEC. 37. The Congressional Migrant Workers Scholarship Fund. - There is hereby created a Congressional Migrant Workers Scholarship Fund which shall benefit deserving migrant workers and/or their immediate descendants below twenty-one (21) years of age who intend to pursue courses or training primarily in the field of science and technology. The initial seed fund of TWO HUNDRED MILLION PESOS (P200,000,000.0 0) shall be constituted from the following sources: X X X X X X > AN ADDITIONAL AMOUNT OF SEVENTY-FIVE MILLION PPESOS (75,000,000,00) IS HEREBY APPRORIATED ANNUALLY FROM THE NATIONAL TREASURY FOR THE CONTINUED OPERATION OF THE FUND WHICH SHALL BE INCLUDED IN THE ANNUAL GENERAL APPROPRIATIONS ACT. > x X X"
