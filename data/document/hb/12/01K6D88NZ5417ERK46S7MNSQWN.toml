congress_website_title = "AN ACT GIVING CONTRACTUAL OR CASUAL EMPLOYEES HIGHER SALARY AND OTHER BENEFITS AND PRIVILEGES BEING ENJOYED BY REGULAR EMPLOYEES"
congress_website_abstract = "Rationale: Most big companies in the Philippines usually hire contractual or casual employees giving the latter a period of six (6) months or less to serve the former. Thereafter, upon the expiration of the contract these lowly will be terminated and will be rehired again after a few weeks. This practice is beind done by companies to circumvent the law on regularization of employees that an employee who has served the company for a continuous period of one year shall attain a regular status andlikewise to preclude them from extending benefits and privileges only accorded to a regular employee."

