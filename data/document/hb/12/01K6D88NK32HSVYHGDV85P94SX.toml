congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 7277 OTHERWISE KNOWN AS AN ACT PROVIDING FOR THE REHABILITATION, SELF-DEVELOPME NT AND SELF-RELIANCE OF DISABLED PERSONS AND THEIR INTEGRATION INTO THE MAINSTREAM OF SOCIETY AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: As stated in Republic Act No. 7277 or the Magna Carta for Disabled Persons, persons with disabilities must be assisted and integrated in society. In this light, it is just appropriate for society to facilitate for their participation insociety. However, their willingness to paricipate in society is hampered by difficulties brought about by their disabled condition. However, it must be ensured that this law is effectively implemented and it should penetrate well to the sector of persons with disabilities. This bill then proposes that in every province and municipality, a center must be established that is accessible for all persons with disabilities."
