congress_website_title = "AN ACT DECLARING ARNIS AS THE PHILIPPINE NATIONAL SPORT"
congress_website_abstract = "Rationale: Arnis is a sport that is indigenous and uniquely Filipino. Among the many games in the country, it can be considered as one of our national cultural gems that completely originated from the Philippines. This art was practiced primarily for self-defense by the Filipinos during the pre-Spanish period. While during the Spanish period, Arnis was used to fight against the Spanish invaders. The Filipinos stand against the superiorly armed adversaries in mortal combat in the areas of battle is now held in immortal inviolability by history. It would not be far-fetched to surmise that one of the earliest Filipino heroes, Lapu-Lapu, was an Arnis expert."
