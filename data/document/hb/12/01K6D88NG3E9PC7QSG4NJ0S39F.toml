congress_website_title = "AN ACT PROMOTING THE ROLE OF THE COOPERATIVE MOVEMENT IN COOPERATIVE DEVELOPMENT, STRENGTHENING AND DEFINING THE REGULATORY AND ADJUDICATIVE FUNCTIONS OF THE COOPERATIVE DEVELOPMENT AUTHORITY (CDA), RENAMING IT AS THE COOPERATIVE REGULATORY AND DEVELOPMENT AUTHORITY (CRDA) AND FOR OTHER PURPOSES, AMENDING THEREFOR REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED AND THIRTY-NINE"
congress_website_abstract = "Rationale: This bill calls to amend the Charter of the Cooperative Development Authority (CDA) as embodied in Republic Act 6939, in order to strengthen the agency's regulatory and/or supervisory powers, modufy its developmental functions, and provide it with quasi-judicial powers. It is envisioned that the streamlining of the CDA will put the agency in a better position not only to ensure discipline within the burgeoning cooperative sector, but help facilitate the growth of quality cooperatives by allowing the cooperative movement itself to handle institutional development of cooperatives nationwide."
