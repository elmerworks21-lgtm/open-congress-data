congress_website_title = "AN ACT INCREASING THE PENALTIES FOR JUETENG AND OTHER ILLEGAL NUMBERS GAMES, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 602, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Gambling has gone beyond the control of government law enforcement agencies as shown by the proliferation of jueteng and other illegal gambling games that have permeated even far-flung areas of the country. Decades of proliferation in thecountry of jueteng, as a primary example, has become a systematic social dilemma as it has been observed that the significant stakeholders in this illegal numbers game are mostly from the poor or those who belong in the lower strata. > This bill seeks to increase the penalties for those involved in illegal gambling to include not only the participants and the operators but government officials concerned with the full implementation of this Act. More importantly the bill provides for a penalty oof both imprisonment and fine for those found to be involved in illegal gambling. It also includes provisions that considere seized gambling materials and other paraphernalia as prima facie evidence to warrant the immediate filing and prosecution of"
