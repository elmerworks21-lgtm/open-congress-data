congress_website_title = "AN ACT REQUIRING ALL PUBLIC UTILITY AGENCIES AND COMPANIES OR CORPORATIONS, BOTH PUBLIC AND PRIVATE, TO REPAIR ANY DIGGING OR DESTRUCTION MADE IN THE COURSE OF THEIR INSTALLATION OR MAINTENANCE WORK"
congress_website_abstract = "Any existing laws to the contrary notwithstanding , all public agencies, companies or corporations covered by this Act shall, within seventy two (72) hours from completion of any work affecting any road, street passageway, pathway and similar places, repair or reconstruct the same by restoring it to its status prior to such work. The repair or reconstruction shall be done in the presence of the punong barangay concerned, or in his absence, the barangay secretary, who is hereby required to issuea certificate of repair work completion. A copy of the certificate shall be retained by the barangay official for barangay record purposes."

