congress_website_title = "AN ACT PROVIDING FOR A CHARTER OF THE PHILIPPINE PUBLIC SAFETY COLLEGE TO GOVERN ITS ORGANIZATION, ADMINISTRATION AND OPERATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Public Safety College Charter of 2002\". This bill seeks to enable the Philippine Public Safety College (PPSC) to effectively and efficiently carry its mandate, powers and functions under Section 66 and 67 of Republic Act No. 6875 as amended by Republic Act No. 8551. > The College shall serve as the primary educational institution for degree and non-degree programs for all personnel of the Philippine National Police (PNP), Bureau of Fire Protection (BFP) and the Bureau of Jail Management and Penology (BJMP) including personnel of the PPSC System and other related government Agencies."

