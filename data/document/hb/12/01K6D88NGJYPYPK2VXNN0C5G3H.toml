congress_website_title = "AN ACT PROVIDING THAT SECURITY, INTELLIGENCE AND CONFIDENTIAL FUNDS BE SUBJECTED TO STANDARD AUDITING PROCEDURES, REQUIRING THE SUBMISSION OF THE AUDIT AND LIQUIDATION REPORTS ON SAID FUNDS TO THE HOUSE OF REPRESENTATIVES AND PROVIDING PENALTIES FORVIOLATION THEREOF"
congress_website_abstract = "Rationale: The confidential audit of these funds, in the guise of protecting the source of \"bought\" information, has spawned a culture of corruption in the intelligence community. By perpetuating the myth that national security operations are off-limits to civilians, a thich veil of secrecy has blanketed what has become a defacto republic within our armed forces. > This bill does not intend to pry open the operations of our intelligence community. Logic and the safety of our soldiers dictate that some businesses are better conducted in the dark. But the accounting of taxpayers' money should be made under the sun. More so, if such money currently runs into billions of pesos a year."

