congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7875, OTHERWISE KNOWN AS 'AN ACT INSTITUTING A NATIONAL HEALTH INSURANCE PROGRAM FOR ALL FILIPINOS AND ESTABLISHING THE PHILIPPINE HEALTH INSURANCE CORPORATION FOR THE PURPOSE"
congress_website_abstract = "Republic Act No. 7875, otherwise known as the National Health Insurance Act of 1995 is hereby amended by deleting item (b) and amending item (c) of Section 11 in order to pave way for the coverage of the health services outpatient psychoterapy and counseling for mental disorders and drug abuse, users, respectively. > This bill also provide health care provided which is not yet operating for at least three (3) years to apply and qualify for accreditation if it complies with all the other accreditation requirements and further meets any of the conditions provided by this Act."
