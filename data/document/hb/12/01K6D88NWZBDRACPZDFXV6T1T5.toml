congress_website_title = "AN ACT CREATING A NATIONAL TRANSPORTATION SAFETY BOARD, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Transportation Safety Act of 2001\". This bill seeks to create a National Transportation Safety Board which shall be the primary agency of the people for accident prevention, accident impact attenuation, accident study, and analysis and for coordinating cost-effective safety measures. Beyond its fact-finding mission is a mandate to be an activist in punishing the guilty and in preventing recurrence of similar accidents in the future."

