congress_website_title = "AN ACT TO STRENGTHEN THE UNIVERSITY OF THE PHILIPPINES (U.P.) AS THE NATIONAL UNIVERSITY"
congress_website_abstract = "\"The Universiry of the Philippines Charter of 2001.\" Rationale: Established in 1908, the University of the Philippines' Charter then was constituted under the conditions of a Commonwealth under the United States. The Charter was then created to meetthe demands and challenges of an era entirely different from ours right now. Being 93 years old, the U.P.'s Charter is believed to be obsolete if it is to be compared with the thrusts of the institution's programs for the years to come.> The University of the Philippines has to become relevant to the times and the demands of our nation in the present new millennium."
