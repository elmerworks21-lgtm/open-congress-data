congress_website_title = "AN ACT INSTITUTING MANDATORY DRUG TESTING OF EMPLOYEES IN, AND APPLICANTS TO GOVERNMENT AGENCIES INVOLVED IN THE ADMINISTRATION OR ENFORCEMENT OF LAWS AGAIST DANGEROUS DRUGS AND FOR OTHER PURPOSES"
congress_website_abstract = "All employees in, and applicants for employment to government agencies principally and primarily charged with the administration or enforcement of laws against dangerous drugs such as but not limited to employees of the Dangerous Drugs Board, employees and guards of drug rehabilitation centers and agents and operatives of special police and military anti-drug units are hereby required to undergo a medical test to determine probable use of dangerous drugs."

