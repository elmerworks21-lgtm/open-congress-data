congress_website_title = "AN ACT REQUIRING MANUFACTURERS AND DISTRIBUTORS OF PROCESSED FOODS, SNACKS AND BEVERAGES TO DETERMINE AND PRINT ON THE BOX, PACK, BOTTLE OR CONTAINER OF PROCESSED FOODS, SNACKS OR BEVERAGES THE NUTRITIONAL FACTS OF THEIR PRODUCT WHICH ARE MANUFACTURED, DISTRIBUTED OR SOLD IN THE PHILIPPINES AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "This Act shall cover all the processes foods, snacks and beverages manufactured, distributed or sold within the territory of the Republic of the Philippines. > Scientifical Determination of Nutritional Value and Printing of Nutritional Facts - It shall be mandatory for all manufacturers and distributors of processed foods, snacks and beverages in the Philippines to scientifically determine the nutritional value and to provide a printed label of the nutritional facts of their product in the box,pack, bottle or container before sale to the public."

