congress_website_abstract = "The compensation or per diem of public schoolteachers for election duty is hereby INCREASED to Three Thousand Pesos (P3,000.00). The Commission on Elections is hereby authorized to grant periodice increase of not more than twenty percent (20%) of the amount in the next election following the effectivity of this Act."
