congress_website_title = "AN ACT AMENDING SECTION 6, PARAGRAPH (1) OF REPUBLIC ACT NO. 7581, OTHERWISE KNOWN AS THE PRICE ACT"
congress_website_abstract = "Unless otherwise declared by the President, prices of basic necessities in an area shall automatically be frozen at their prevailing prices or placed under automatie price control whenever: (1) That area is proclaimed or declared a disaster area orunder a state of calamity: PROVIDED, THAT IN THE ABSENCE OF A CONTRARY DECLARATION BY THE PRESIDENT, THE DECLARATION OR PROCLAMATION BY THE SANGGUNIAN CONCERNED SHALL BE SUFFICIENT BASIS FOR THE OPERATION OF THE AUTOMATIC PRICE CONTROL AND SHALL HAVETHE SAME EFFECT AS THAT OF A PRESIDENTIAL PROCLAMATION OR DECLARATION\"."
