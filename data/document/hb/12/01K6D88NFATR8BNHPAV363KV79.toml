congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC INCREASE ANNUALLY OF THE AMOUNT OF PENSION PAID TO ALL RETIRED GOVERNMENT EMPLOYEES BY AT LEAST AN AMOUNT EQUIVALENT TO THE RATE OF ANNUAL INCREASE IN THE NATIONAL LIVING INDEX AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The government has to update the amount of pension of retired government workers. It is bound to do so as an act of justice, an expression of its gratitude and concern for the welfare and well-being of former members of its work force."

