congress_website_title = "AN ACT PENALIZING THE SELLING OF FIREARMS, AMMUNITIONS AND EXPLOSIVES, AND SIMILAR OBJECTS, OR ANY PARTS OR COMPONENTS USED IN THE MANUFACTURE OF FIREARMS, AMMUNITION OR EXPLOSIVES TO ENEMIES OF THE STATE AS TREASON"
congress_website_abstract = "The selling of firearms, ammunitions, explosives and similar items to enemies of the state is a way of giving aid and comfort to these enemies. It strengthens the enemy in the conduct of war and leads to the possibility of our government being defeated by them. The bill seeks to penalize as treason the selling, directly or indirectly, of any firearms, ammunitions or explosives, and similar items or any parts of components used in the manufacture of firearms, ammunitions or explosives."
