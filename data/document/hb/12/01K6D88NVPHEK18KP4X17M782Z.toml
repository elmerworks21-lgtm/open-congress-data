congress_website_title = "AN ACT TO REGULATE THE PRACTICE OF VETERINARY MEDICINE IN THE PHILIPPINES"
congress_website_abstract = "Thrusts of this proposed measure are as follows: (1) The administration and conduct of licensure examination, registration, and licensing of veterinarians; (2) The supervision and regulation of the practice of veterinary medicine; (3) The integration of veterinarians under the existing accredited veterinary professional association; and (4) The development of the professional competence of veterinarians through continuing professional education in accordance with the guidelines set by the Professional Regulation Commission."
