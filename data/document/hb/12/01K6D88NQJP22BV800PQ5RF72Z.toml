congress_website_title = "AN ACT AMENDING SECTION 20 OF REPUBLIC ACT NO. 6425, OTHERWISE KNOWN AS THE DANGEROUS DRUGS ACT, AS AMENDED, MAKING CERTAIN VIOLATIONS OF THE LAW NON-BAILABLE AND/OR NON-PROBATIONAB LE OFFENSES"
congress_website_abstract = "This bill states that NO BAIL shall be granted for violations of the Dangerous Drugs Law involving the following quantities: >1. 4 grams or more of opium; 2. 4 grams or more of morphine; 3. 5 grams or more of shabu or methylamphetami ne hydrochloride; 4. 4 grams of heroine; 5. 30 grams or more of Indian hemp or marijuana; 6. 5 grams or more of resin or marijuana resin oil; 7. 4 grams or more of cocaine or cocaine hydrochloride; or 8. In the case of other dangerous drugs, the quantity of which is far beyond therapeutic requirements, as determined and promulgated by the Dangerous Drugs Board, after consultation/he arings conducted for the purpose."
