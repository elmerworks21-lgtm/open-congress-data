congress_website_title = "AN ACT DECLARING THE FIRST DAY OF SHAWAL, THE TENTH MONTH OF THE MUSLIM CALENDAR, A NATIONAL HOLIDAY FOR THE OBSERVANCE OF EIDUL-FITR, AMENDING FOR THE PURPOSE SECTION 26, CHAPTER 7 OF EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE ADMINISTRATIVE CODE OF 1987, AND FOR OTHER PURPOSES"
congress_website_abstract = "The first day of Shawal, the tenth month of the Muslim calendar, is hereby declared as a national holiday for the observance of EIDUL-FITR. This is the first day marking the end of the thirty-day fasting period of Ramadhan."
