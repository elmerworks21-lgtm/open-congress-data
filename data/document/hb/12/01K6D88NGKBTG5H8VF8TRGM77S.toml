congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A SCHOOLBUILDING IN EVERY BARANGAY IN THE PHILIPPINES, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "The Department of Education, Culture and Sports (DECS) is hereby mandated to be the lead agency in the implementation of this Act, to formulate a guideline of requirements and to structure a timetable to ensure that each and every barangay in the Philippines will have its own schoolbuilding by the end of year 2004. Likewise, DECS is hereby obligated to achieve a twenty percent (20%) completion rate each year until 2004."
