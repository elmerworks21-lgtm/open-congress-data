congress_website_title = "AN ACT REQUIRING ALL TELEPHONE COMPANIES TO INSTALL A HOT LINE SYSTEM FOR THE USE OF LAW ENFORCEMENT AGENCIES AND FIRE STATIONS IN THE EVENT OF EMERGENCY AND CALAMITY"
