congress_website_title = "AN ACT CREATING THE POSITION OF TOURISM OFFICER FOR EVERY PROVINCE, CITY AND MUNICIPALITY IN THE PHILIPPINES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "The proposed TOURISMS OFFICER is tasked to do, among bills, the following: (1) Formulate measures for the consideration of the sanggunian and provide technical assistance and suppoer to the governor or mayor, as the case may be, in providing the information and research data required for the promotion of local tourism; and (2) Develop plans, innovative approaches and strategies designed to promote and upgrade the technical capabilities of local governments and, upon approval thereof by the governor or mayor, as the case may be, implement the same, particularly those which have to do with tourism standards, tourism promotion, tourism information and tourism development."
