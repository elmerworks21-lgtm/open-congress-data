congress_website_title = "AN ACT IMPOSING PENALTIES ON PHILIPPINE CONSULATE OFFICIALS AND OTHER GOVERNMENT PERSONNEL FOR FAILURE TO ACT ON COMPLAINTS OF, OR TO GIVE ASSISTANCE OR RENDER SERVICE TO MIGRANT WORKERS, THEIR FAMILIES AND OVERSEAS FILIPINOS IN DISTRESS, AMENDING FOR THE PURPOSE THE `MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF 1995'"
congress_website_abstract = "SEC. 24-A. PENALTIES. - WITHOUT PREJUDICE TO THE FILING OF CRIMINAL COMPLAINT, ANY PHILIPPINE CONSULATE OFFICIAL AND OTHER GOVERNMENT PERSONNEL WHO FAILS OR REFUSES TO RENDER THE SERVICES AND/OR ASSISTANCE PROVIDED IN TITLES III, IV AND V OF THIS ACT SHALL, AFTER DUE NOTICE AND HEARING, AND IF FOUND GUILTY, BE PUNISHED WITH SUSPENSION FROM OFFICE OF NOT LESS THAN THIRTY (30) DAYS OR DISMISSAL FROM THE SERVICE WITH FORFEITURE OF RETIREMENT AND OTHER BENEFITS, AND SHALL BE DISQUALIFIED FROM HOLDING ANY OTHER GOVERNMENT OFFICE. FOR THIS PURPOSE, THE CENTER, IN COORDINATION WITH THE DEPARTMENT OF LABOR AND EMPLOYMENT, SHALL FORMULATE THE NECESSARY RULES AND PROCEDURE FOR THE CONDUCT OF SUCH HEARING AND IMPOSITION OF APPROPRIATE PENALTIES."

