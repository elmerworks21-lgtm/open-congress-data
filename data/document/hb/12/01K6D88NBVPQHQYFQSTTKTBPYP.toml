congress_website_title = "AN ACT POSTPONING THE ELECTIONS OF SANGGUNIANG KABATAAN OFFICIALS FROM THE YEAR 2002 TO THE YEAR 2005 AND FOR OTHER PURPOSES"
congress_website_abstract = "The elections of Sangguniang Kabataan officials set for the Year 2002, as provided by law, is hereby POSTPONED and RESET to the Year 2005, and the subsequent elections for the Sangguniang Kabataan shall be held every three (3) years thereafter."
