congress_website_title = "AN ACT GRANTING OTHER PRIVILEGES AND INCENTIVES TO PERSONS WITH DISABILITY, AMENDING FOR THE PURPOSE, THE \"MAGNA CARTA FOR DISABLED PERSONS\""
congress_website_abstract = "Republic Act No. 7277, otherwise known as the Magna Carta for Disabled Persons is hereby amended by inserting a new chapter, to be labeled as \"Chapter 8\", which provides for the following additional privileges to persons with disability: (a) 20% discount from all establishments relative to patronization and utilization of all commercial establishments in transportation services, hotels, and similar lodging establishments; restaurants; and recreation centers; (b) 10% discount for the purchase ofbranded medicines and 20% for generic medicines anywhere in the country; (c) exemption from the payment of individual income taxes; provided that their annual taxable income does not exceed the poverty level threshold; (d) the continuance of the samme benefits and privileges given by the GSIS, SSS, and the Pag-Ibig presently being enjoyed by them. > Those caring for and living with the persons with disability shall also be granted incentives such as: individual taxpayers caring for persons with"

