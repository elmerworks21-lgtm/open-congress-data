congress_website_abstract = "The Department shall have the following powers and functions of formulating, planning, implementing and coordinating national policies, plans programs and projects for the following: (1) Youth development and involvement in nation-building ; (2) Promotion and development of sports; and (3) Preservation, enrichment and popularization of cultural heritage and resources."

