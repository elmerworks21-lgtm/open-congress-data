congress_website_title = "AN ACT PROVIDING FOR A MORE EXPEDITIOUS ACTION ON LETTERS AND REQUESTS FROM THE PUBLIC, AMENDING SECTION FIVE, PARAGRAPH (a) OF REPUBLIC ACT NO. 6713 AND ADDING THERETO SUBPARAGRAPHS (1),(2),(3) AND (4)"
