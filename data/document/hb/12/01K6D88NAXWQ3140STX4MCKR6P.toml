congress_website_title = "AN ACT REQUIRING EMPLOYERS IN THE PRIVATE SECTOR TO HAVE IN THEIR EMPLOY DISABLED PERSONS, AND PROVIDING ADDITIONAL INCENTIVE THEREFOR, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SEVENTY-TWO SEVENTY-SEVEN, OTHERWISE KNOWN AS THE MAGNA CARTA FORDISABLED PERSONS"
congress_website_abstract = "The bill proposes to add the following provisions to RA No. 7277, the Magna Carta for Disabled Person:> EVERY EMPLOYER IN THE PRIVATE SECTOR SHALL ENSURE THAT AT LEAST THREE PERCENT (3%) OF HIS TOTAL REGULAR OR PERMANENT WORKFORCE,INCLU SIVE OF MANAGERIAL AND SUPERVISORIAL PERSONNEL, SHALL BE COMPOSED OF DISABLED PERSONS WHO SHALL HAVE QUALIFIED IN ACCORDANCE WITH THE PRECEDING SECTION. EMPLOYERS SHALL COMPLY WITH THE PROVISION OF THIS SECTION WITHIN ONE (1) YEAR FROM THE DATE OF EFFECTIVITY OFTHIS ACT. FAILURE TO COMPLY WITH THIS SECTIO SHALL BE PENALIZED IN ACCORDANCE WITH SECTION 46, PARAGRAPH (A) OF THIS ACT."
