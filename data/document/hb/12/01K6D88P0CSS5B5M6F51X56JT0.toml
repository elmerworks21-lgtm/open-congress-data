congress_website_title = "AN ACT TO AMEND ARTICLE 217 OF THE REVISED PENAL CODE MAKING THE FAILURE TO LIQUIDATE CASH ADVANCE WITHIN THE PERIOD PROVIDED THEREIN A PRIMA FACIE PROOF OF MALVERSATION"
congress_website_abstract = "This bill seeks to address one of the concerns of the Commision on Audit, that is, the practice of government officials and employees of disregarding the requirement of laws and regulations of liquidating promptly cash advances granted to them in the pursuit of their business, presumably official. > In order to preven the apparent laxity on the part of those concerned regarding this matter, this representation is proposing an amendment to ARticle 217 of the Revised Penal Code, making the failure to liquidate cash advances within the priods stated therein to be prima facie presumption of malversation."
