congress_website_title = "AN ACT REGULATING THE PRACTICE OF MICROBIOLOGY IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: At present, there are a number of universities that offer academic programs toward the production of graduates with training in microbiology. Those with training in microbiology have found jobs as quality control personnel in the manufacture of foods, pharmaceuticals , drugs, consmetics, food additives and flavors; as professional researcher in research institutes, biotechnology laboratories and in hospitals; as participant in the conduct of environmental impact studies; as instructor of microbiology courses in research institutes and centers, colleges and universities. Therefore, it becomes imperative that the practice of microbiology be regulated."

