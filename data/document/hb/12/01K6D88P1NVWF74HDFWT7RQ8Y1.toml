congress_website_title = "AN ACT PROVIDING FOR WOMEN EMPOWERMENT AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Women Empowerment Act of 2002\". The bill seeks to integrate women in national development by raising their status and assisting them in their quest for excellence in fields that are said to be male-dominated: public administration, politics, finance and economics, business and technology. More importantly, it is a recognition that the greater participation of women in all aspects of government, public administration, business management and other endeavors will enhance the quality of the outputs of such endeavors. This bill is not an accommodation for women, but rather an acceptance of the fact that gender is not a determinant of a person's capacity and ability to serve."
