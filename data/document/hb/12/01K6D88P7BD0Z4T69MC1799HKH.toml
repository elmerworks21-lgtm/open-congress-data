congress_website_title = "AN ACT IMPOSING HIGHER REGISTRATION FEE FOR VEHICLE OWNERS WHO OWN TWO OR MORE VEHICLES, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED EIGHTY-SEVEN HUNDRED NINETY-FOUR, ENTITLED \"AN ACT IMPOSING A MOTOR VEHICLE USER'S CHARGE ON OWNERS OF ALL TYPESOF MOTOR VEHICLES AND FOR OTHER PURPOSES\""
congress_website_abstract = "Section 3 of RA 8794 is hereby amended by adding a new paragraph to be known as paragraph (C) which provides that IN ADDITION TO THE BASE REATES PROVIDED UNDER PARAGRAPH (A) AND (B) THE FOLLOWING SHALL BE ADDED TO VEHICLE OWNERS WHO OWN TWO (2) OR MORE VEHICLES: (1) Second Vehicle, corresponding base rates plus twenty five percent (25%); (2) Third Vehicle, corresponding base rates plus fifty (50%); (3) Fourth Vehicle, corresponding base rates plus seventy-five percent (25%); (4) Fifth Vehicle and more, corresponding base rates plus one hundred percent (100%). > This new paragraph also states that motor vehicles are considered registered under the same persone if the registration forms bear: (1) the same name and anddress; (2) the same namee but different address; (3) name of the spouse of an existing registrant; and (4) under the name of children with no adequate source of income."

