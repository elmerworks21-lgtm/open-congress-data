congress_website_title = "AN ACT AUTHORIZING BARANGAY OFFICIALS TO ACT MEDIATORS AND CONCILIATORS IN LABOR DISPUTES, PARTICULARLY WAGE CLAIMS OF LESS THAN FIVE THOUSAND PESOS (P5,000.00), PROVIDING FOR THE TRAINING OF THESE MEDIATORS AND CONCILIATORS, AMENDING FOR THE PURPOSES THE LABOR CODE AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Barangay Mediation and Conciliation Act of 2001\". The Secretary of Labor is hereby authorized to deputize barangay officials to act as conciliators or mediators and help in the early settlement of disputes, actual or prospective, arising from labormanagement relations in companies located within the jurisdiction of said barangay officials. For this purpose, the Secretary of Labor shall train selected barangay officials on effective methods and techniques of conciliation and mediation, and with further training even act as voluntary arbiters, if so chosen by both parties."
