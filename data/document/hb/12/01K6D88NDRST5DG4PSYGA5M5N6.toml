congress_website_title = "AN ACT RESTRUCTURING THE FISCAL INCENTIVES UNDER EXECUTIVE ORDER NO. 226, OTHERWISE KNOWN AS THE OMNIBUS INVESTMENTS CODE OF 1987, AS AMENDED, AMENDING PERTINENT ARTICLES OF THE CODE, PROVIDING FOR PENALTIES IN VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to EXTEND the period of tax holidays to a maximum of ten (10) years for pioneer firms, and eight (8) years for non-pioneer firms with the hope that potential investors may consider our country as the best venue for their commercial operations. \"Tax holidays\" refers to the EXEMPTION granted by the National Government from the imposition of corporate income tax on certain enterprises."
