congress_website_title = "AN ACT TO REQUIRE 90 DAYS NOTICE BEFORE CHANGING THE ANNUAL PERCENTAGE RATE OF INTEREST APPLICABLE ON ANY CREDIT CARD ACCOUNT OR BEFORE CHANGING THE INDEX USED TO DETERMINE SUCH RATE"
congress_website_abstract = "\"Credit Card Internet Rate Charge Disclosure Act\". Rationale: The state shall simplify, clarify and modernize the laws governing credit transactions and encourage the development of fair and economically sound-consumer credit practices. The state shall assure the full disclosure of the true cost of credit to protect the consumer from lack of awareness of the true cost of credit to the user."

