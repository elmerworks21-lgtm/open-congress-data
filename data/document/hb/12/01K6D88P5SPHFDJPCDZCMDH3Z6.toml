congress_website_title = "AN ACT PROMOTING A SMOKE-FREE ENVIRONMENT BY REGULATING THE PRODUCTION, MANUFACTURE, LABELLING, ADVERTISEMENT AND SALE OF TOBACCO PRODUCTS, AND ESTABLISHING A TRUST FUND THEREOF"
congress_website_abstract = "\"National Tobacco Control Act.\" This bill has the following purposes: (1) Promote a smoke-free environment policy; (2) Enhance the authority of the National Tobacco Administration to regulate the use of tobacco products; (3) Regulate all tobacco advertisement; (4) Regulate tobacco products' labeling; (5) Prohibit the sale of tobacco products to minors; and (6) Create and establish a Trust Fund that will answer for the major programs of the government in line with this Act."
