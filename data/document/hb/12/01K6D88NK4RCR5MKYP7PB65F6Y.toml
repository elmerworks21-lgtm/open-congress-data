congress_website_title = "AN ACT PENALIZING ENFORCED OR INVOLUNTARY DISAPPEARANCE AND FOR OTHER PURPOSES"
congress_website_abstract = "Enforced or involuntary disappearance is committed when a person is arrested, detained or abducted against his/her will or otherwise deprived of his/her liberty by officials or employees of any branch, subdivision, agency or instrumentality of Government, or by organized groups or private individuals acting on behalf of, or with the support, direct or indirect, consent or acquiescence of the Government, and who subsequently disappeared for at least 48 hours. > This bill aims to penalize the commission of the act of enforced or involuntary disappearance in the country. Further, it also aims to deter, if not totally eradicate the commission of this heinous act by any officer or agent of the State and thus ensure that no person shall be deprrived of life, liberty or property without due process of law, nor shall any person de denied the equal protection of the laws."
