congress_website_title = "AN ACT REPEALING VAGRANCY AND AMENDING PROSTITUTION AS DEFINED AND PENALIZED IN ARTICLE 202 OF THE REVISED PENAL CODE"
congress_website_abstract = "Rationale: This bill seeks to repeal the law on vagrancy and to amend the penalty on prostitution as provided for in Article 202 of the Revised Penal Code. The law on vagrancy is outmoded or obsolete. It does not apply anymore to the present conditions in our country. Imagine the thousands of persons without apparent means of subsisitence, the thousand of persons loitering about public or semi-public buildings or places or tramping or wandering about the country or the streets without visible means of support, those who have lost hope in finding a job and are lodging in houses of ill-fame and those other people loitering in any inhabited or uninhabited place belonging to another."

