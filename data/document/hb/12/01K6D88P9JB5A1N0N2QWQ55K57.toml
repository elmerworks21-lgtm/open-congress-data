congress_website_title = "AN ACT PUNISHING THE PILFERAGE OR THEFT OF ANY MATERIAL, PRODUCT, MERCHANDISE, ARTICLE, EQUIPMENT OR BY-PRODUCT MANUFACTURED, PRODUCED, OWNED, OR BELONGING TO INFORMATION TECHNOLOGY ENTERPRISES LOCATED IN SPECIAL ECONOMIC ZONE"
congress_website_abstract = "\\\"Anti-Pilferage of Information Technology Materials in Special Economic Zones Act\\\". The information technology (IT) industry has infused much needed capital into our economy. It as also placed our country in the world map as one of the largest manufacturers of integrated circuit chips and other similar semiconductor products. Unfortunately, because of their high value and compact size, theft and pilferage of this industry's products have risen. These incidents of theft have adversely affected our competitiveness in the global arena. This bill seeks to declare as unlawful for any person to take, pilfer or steal, any material, product, merchandise, article, equipment or by-product manufactured, produced, owned or belonging to IT enterprises located in special economic zones. The passage of this measure would send a signal to the IT industry that the government is serious in protecting their economic rights."

