congress_website_title = "AN ACT INTEGRATING EDUCATION ON WOMEN, GIRLS AND GENDER RIGHTS, EQUALITY AND WELFARE IN ALL LEVELS OF PUBLIC AND PRIVATE SCHOOLS"
congress_website_abstract = "\\\"Women's, Girls' and Gender Education Act of 2003\\\". Aside from the home, the school is the best venue where the young can know, learn, and begin to protect and promote their rights and the right of others. This measure proposes to require all levels of public and private educational institutions, including computer, technical and vocational schools, to integrate in their curriculum women's and girls' rights, welfare, development, and gender equality, R.A. 7877 (Anti-Sexual Harassment Act of 1995) and R.A. 9208 (Anti-Trafficking in Person Act of 2003)."
