congress_website_title = "AN ACT AMENDING SECTION 52, PARAGRAPH (D) OF REPUBLIC ACT NO. 8291, OTHERWISE KNOWN AS THE 'REVISED GOVERNMENT SERVICE INSURANCE ACT OF 1997'"
congress_website_abstract = "The bill seeks to increase the penalty to be imposed upon the concerned officers or personnel of government agencies who fail to remit or causes the delay in the remittance of GSIS payments by more than thirty days from the time the amount becomes due. It proposes the following penalties: (a) increase in the penalty of imprisonment from six months and one day to six years, to imprisonment from ten years and one day to twelve years; (b) increase in the fine of not less than Ph3,000.00 but not more than Ph6,000.00, to a fine of not less than Ph10,000.00 but not more than Ph30,000.00; It retains the present additional penalty of absolute perpetual disqualification from holding public office and from practicing any profession or calling licensed by the government."
