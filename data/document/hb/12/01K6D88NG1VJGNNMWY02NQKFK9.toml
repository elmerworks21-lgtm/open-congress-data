congress_website_abstract = "Rationale: The creation of the DFAR will be a significant breakthrough in providing utmost protection to Philippine waters and marine resources. It will correct the traditional bias of government for land-based agriculture and provide the long-delayed attention local fishermen and Philippine water resources need. It will give impetus to the government's continuing efforts to increase food production to meet the demands of the country's fast growing population."
