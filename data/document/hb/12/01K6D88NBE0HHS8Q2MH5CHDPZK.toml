congress_website_title = "AN ACT TO REGULATE THE SALE, PURCHASE AND POSSESSION OF TOXIC AND HAZARDOUS SUBSTANCES, INCLUDING SODIUM CYANIDE PROVIDING PENALTIES FOR VIOLATION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Toxic and Hazardous Substances Contrl Act of 2001;\" Rationale: Sodium Cyanide (NaCN) is one of the most illegally used substances that cause extensive damage to our marine resources. This substance, while used in many manufacturing processes like mining, electroplating, jewelry making and other chemical manufacturing, is also used in the catching of live reef fish which gravely decimate the nation's fish breeding habitats, aqua-marine food chains, and consequently, diminish fish supply and eliminate the livelihood of our coastal populations who depend on the aqua-marine resource for their survival. The worst possible scenario is that illegal cyanide fishing and waste dumping would eventually threaten the food security of our people."
