congress_website_title = "AN ACT PROVIDING FOR THE CREATION OF GOVERNMENT FUNDED SPECIAL EDUCATIONAL INSTITUTIONS THAT WILL CATER TO THE DEAF, MUTE AND BLIND CHILDREN, GIVING THEM ACCESS TO FREE PRIMARY AND SECONDARY EDUCATION, WITH CENTERS EACH LOCATED IN METRO MANILA, LUZON, VISAYAS AND IN MINDANAO, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Special Education for the Deaf, Mute and Blind Act of 2003\\\". Oftentimes the physically disadvantaged are unable to live better lives because of limited resources and opportunities. To help them improve the quality of their lives, the government must make quality education available to them. This bill aims to provide free education at the elementary and secondary levels for the deaf, mute and blind. It also provides for the establishment of special education center in Metro Manila, Luzon, Visayas and Mindanao."

