congress_website_abstract = "In addition to the insurance benefits given to teachers by the Government Service Insurance System (GSIS) under Presidential Decree No. 1146, as amended, a term insurance coverage to all public schoolteachers providing the following benefits shall be granted: (1) P200,000.00 - death benefits; (2) P50,000.00 - burial expenses; (c) P100,000.00 - reimbursement of medical expenses."
