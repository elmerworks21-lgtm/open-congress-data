congress_website_title = "AN ACT INCREASING THE AMOUNT OF INSURED BANK DEPOSITS FROM ONE HUNDRED THOUSAND PESOS (P100,000) TO ONE MILLION PESOS (P1,000,000), AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED THREE THOUSAND FIVE HUNDRED NINETY-ONE, AS AMENDED, OTHERWISE KNOWN ASTHE CHARTER OF THE PHILIPPINE DEPOSIT INSURANCE CORPORATION"
congress_website_abstract = "This bill seeks to bring back the Filipinos' trust on the banking industry as it proposed to increase the maximum amount of insured deposits from the current P100,000.00 to P500,000.00 and establish a deposit insurance coverage plan for deposits inexcess of P500,000.00 which a depositor may have an option to enroll in at his/her cost. Accordingly, the bill increases the permanent insurance fund from the current amount of P3 billion to P8 billion."
