congress_website_title = "AN ACT PROHIBITING EDUCATIONAL INSTITUTIONS WHICH OFFER COURSES REQUIRING BOARD, BAR OR ANY LICENSING EXAMINATION FROM COMPELLING THEIR GRADUATES TO TAKE REVIEW CLASSES AND OR PRE-BOARD EXAMINATIONS IN THE SCHOOL OR COLLEGE OF WHICH HE IS A GRADUATEOF AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Any provision of existing laws, rules and regulations to the contrary notwithstanding , it shall be unlawful for any eductional institution offering courses requiring board, bar or any licensing examination from compelling their respective graduates to take review classes and or pre-board examinations in the school or college of which the student is a graduate. It shall be unlawful for the said institution to withhold the transcript or scholastic record of the student if he does not take review classes and or Pre-Board Examinations in the school or college of which he is a graduate."
