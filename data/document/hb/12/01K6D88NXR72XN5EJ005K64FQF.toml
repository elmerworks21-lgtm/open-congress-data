congress_website_title = "AN ACT PROVIDING FOR EFFECTIVE TRAINING AND PROGRAMS FOR WIDOWS, SINGLE PARENTS AND INDIVIDUALS ENTERING NONTRADITIONAL EMPLOYMENT"
congress_website_abstract = "\"Widows Employment Assistance and Lifeskills Act of 2001\". Rationale: WIDOWS and SINGLE PARENTS represent an untapped resource to enter unfilled and available positions in information technology sector, their education and training needs not being given considerable attention and assistance by the government, for lack of necessary programs and laws that could redound to their benefits and help them become more independent, self-reliant and productive citizens of the Republic. > This bill aims to fill in there needs."
