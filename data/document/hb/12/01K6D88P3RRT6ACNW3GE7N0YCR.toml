congress_website_title = "AN ACT CREATING A SPECIAL COMMITTEE TO REVIEW THE REVISED PENAL CODE, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The Revised Penal Code, the primary source of criminal laws in the country, has been in existence for more than seven (7) decades now having been passed into law on January 1, 1932. Since then, a number of special criminal laws have beenpassed either to amend the Revised Penal Code or to supplement it. > However, even with the amendments to the Revised Penal Code, it is still widely believed that some provisions of the Reviesed Penal Code needs to be reviewed in order to be attunedto the needs of the present. The review shall also serve as venue to incorporate the special criminal laws in order to have a comprehensive Penal Code."

