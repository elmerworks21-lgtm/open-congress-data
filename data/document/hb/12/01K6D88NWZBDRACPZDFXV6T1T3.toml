congress_website_title = "AN ACT GRANTING PRIVILEGES TO STUDENTS AT ALL LEVELS ON BOTH PUBLIC AND PRIVATE SCHOOLS"
congress_website_abstract = "Upon presentation of an identification card duly issued and validated by a recognized Philippine School, the student shall be entitled to the following: (1) A grant of twenty percent (20%) discount on transportation fares in all public utility vehicles; ship or airplanes; Provided, that the fare discount shall be availed of only during school seasons; (2) A grant of ten percent (10%) discount on medical and dental service in government as well as private clinics; and (3) A grant of ten percent(10%) discount on admission fees in museums, art galleries, libraries and state theaters; and (4) A grant of 10% discount on basic school supplies, to be availed of at enrollment time."
