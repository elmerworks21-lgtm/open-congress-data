congress_website_title = "AN ACT TO ABOLISH THE PENALTY OF IMPRISONMENT IN LIBEL AND DEFAMATION CASES AMENDING FOR THE PURPOSE ARTICLES 355, 356, 357 AND 360 OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE AND FOR OTHER PURPOSES"
congress_website_abstract = "The measure seeks to abolish the penalty of imprisonment in crimes against honor and to impose instead fines ranging from Ph20,000 to Ph2.0 million. It also proposes to spread the responsibility for the creation and publication or broadcast of news to include the publishers/owners and top management of newspapers, magazines and radio and television stations. By making the publisher/owners and managers equally responsible for the printed article or broadcast, editors and other supervising personnel are compelled to double check stories for elements of libel and oral defamation."

