congress_website_title = "AN ACT PROVIDING FOR A FAIR AND EQUITABLE TERMS FOR THE RELEASE OF MEDICAL PRACTITIONERS' PROFESSIONAL FEE WITHHELD BY HOSPITALS OR MEDICAL CLINICS FOR FAILURE OF THE PATIENT TO PAY HOSPITAL BILLS AND PENALIZING VIOLATIONS THEREOF"
congress_website_abstract = "This bill seeks to afford protection to medical practitioners by curtailing this unjust practice of some hospitals and medical clinics to withhold the payment of professional fees. It is the foremost intention of this measure to institute a mechanism that will ensure a fair and equitable terms acceptable to both the hospital and medical practitioners whenever patients make payments of hospital bills."
