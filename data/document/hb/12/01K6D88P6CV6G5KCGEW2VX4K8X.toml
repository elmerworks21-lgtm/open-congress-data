congress_website_title = "AN ACT REQUIRING GOVERNMENT-OWNE D AND/OR -CONTROLLED CORPORATIONS (GOCCs) TO SUBMIT THEIR ANNUAL BUDGETS TO CONGRESS AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill requires government-owne d and/or controlled corporations/en terprise to submit their annual budgets to congress for approval within thirty (30) days from the opening of every regular session. > No government-owne d and/or controlled corporations shall incur obligations or make payments for Current Operating or Capital Expenditures after the beginning of each calendar year without a budget approved by Congress and signed by the President."

