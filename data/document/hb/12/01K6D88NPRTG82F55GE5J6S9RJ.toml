congress_website_title = "AN ACT AMENDING THE COOPERATIVE CODE OF THE PHILIPPINES TO BE KNOWN AS THE `CODE OF PHILIPPINE COOPERATIVES OF 2001'"
congress_website_abstract = "After a decade, it is observed that the Code has not been fully implemented to the optimum benefit of the cooperatives movement due to some inconsistencies in the political and legal aspects of the law. It is for this reason that amendments to the Code should be made in order to enliven its constitutional precept, to wit: (1) By making registration requirements more affordable, attractive and convenient; (2) By upgrading the powers and capacities of cooperatives; (3) By providing adequate and clear tax incentives and privileges to cooperatives; and (4) By putting appropriate safeguards on the temptation to take advantage of leadership position for selfish purposes."
