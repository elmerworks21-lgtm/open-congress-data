congress_website_title = "AN ACT PROHIBITING THE USE AND/OR OPERATIONS OF MOBILE PHONES, PORTABLE CD PLAYERS AND OTHER PORTABLE ELECTRONIC GADGETS INSIDE COMMERCIAL AIRCRAFTS AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "The use and/or operation of mobile phones, portable CD players and other portable electronic gadgets are hereby prohibited inside commercial aircrafts, whether on the ground or in flight. > Mobile phones are hereby construed to include all kinds ofmobile communication equipment that allows transmission through the air from a base station. Portable Electronic gadgets include any and all items that would require the use of electricity in intelligence-be aring devices such as radios, televisions,personal digital assistant instruments, computers and other telecommunicati on equipments."

