congress_website_title = "AN ACT DECLARING CERTAIN POSITIONS IN THE BUREAU OF INTERNAL REVENUE AND BUREAU OF CUSTOMS AS PART OF THE CONFIDENTIAL STAFF OF THE APPOINTING OFFICIALS IN SAID BUREAUS AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to immunize BIR and Customs officers from graft and corrupt practices depriving the government of much needed income and revenues. At the same time those who betray the public trust may be more expeditiously removed from positions oftrust. A Board of Selection and Inquiry for each bureau will be created to handle the recruitment, selction and or removal of revenue and customs officers."
