congress_website_title = "AN ACT TO PROFESSIONALIZE THE PRACTICE OF GUIDANCE COUNSELING, CREATING A PROFESSIONAL REGULATORY BOARD OF GUIDANCE COUNSELING, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The State recognizes the important role of Guidance Counselors in nation-building and promotes the sustained development of a reservoir of Guidance Counselors whose competence has been determined by honest and credible licensure examinations and whose standards of professional practice and service are world-class and internationally recognized, globally competitive through preventive regulatory measures, programs and activities that foster their continuing professional development."
