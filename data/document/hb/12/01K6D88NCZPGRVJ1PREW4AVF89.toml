congress_website_title = "AN ACT PROVIDING THE MECHANISM FOR THE CREATION OF ANTI-ILLEGAL RECRUITMENT DESK IN EVERY CITY AND MUNICIPALITY NATIONWIDE"
congress_website_abstract = "The proposed ANTI-ILLEGAL RECRUITMENT DESK is tasked to: (a) Receive complaints of victims of illegal recruitment (b) Disseminate information to job seekers on acts of illegal recruitment (c) Document and monitor cases of illegal recruitment (d) Submit reports and coordinate with the national offices of Department of Labor and Employment, Philippine Overseas Employment Administration, National Labor Relations Commission, and Department of Justice on cases of illegal recruitment."
