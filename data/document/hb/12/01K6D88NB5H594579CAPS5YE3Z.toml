congress_website_title = "AN ACT ESTABLISHING A PROVIDENT PERSONAL SAVINGS PLAN KNOWN AS THE \"PERSONAL EQUITY AND RETIREMENT ACCOUNT\"(PERA)"
congress_website_abstract = "The bill provides that contributions made to PERA per taxable year shall be 100% deductible from the taxable income of the contributor, subject to certain conditions. This aims to encourage more people to invest their money in PERA. > Through PERA,Filipinos can prepare for and enjoy their retirement years. They are assured of a financially secure future. The bill will also facilitate an increase in savings because funds deposited to the PERA can be invested in securities including ordinary shares of stock. It will also offer facilities to move funds to high investment levels and take advantage of prevailing market conditions. This means more funds will be available for investments to spur economic growth."
