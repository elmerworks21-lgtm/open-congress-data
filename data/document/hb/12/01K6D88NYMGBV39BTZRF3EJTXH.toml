congress_website_title = "AN ACT CREATING AND ESTABLISHING THE NATIONAL SENIOR CITIZENS COMMISSION, DEFINING ITS POWERS, FUNCTIONS AND RESPONSIBILITIE S, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Objectives of the proposed NATIONAL SENIOR CITIZENS COMMISSION are as follows: (1) Suitable housing for the needy senior citizens; (2) Physical and mental health services; (3) A monthly pension for the needy; (4) Tax exemptions; (4) Employment opportunities and efficient community services; (6) Free funeral services; etc."

