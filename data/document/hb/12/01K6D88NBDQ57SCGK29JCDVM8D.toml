congress_website_title = "AN ACT REPEALING REPUBLIC ACT NO. 8794 OR \"AN ACT IMPOSING A MOTOR VEHICLES USERS' CHARGE ON OWNER OF ALL TYPES OF MOTOR VEHICLES AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The Road Users Tax (RUT) at this time is untimely. What it can only do is fuel protests and inflame passions, all for the P1 billion it can raise in a year. Because RUT comes on the heels of the rise in oil prices and toll fees, and worsening traffic, it is akin to pouring gasoline on an already combustible mixture. In short, it is a Trojan Horse, with WB loan concealed in its compartment. RUT is not a mere expiter that will hound future Filipinos who will amortize the loan. The RUTis another manifestation of the knee-jerk reaction of the government to write new taxes when revenue is down instead of vigorously implementing exciting ones."
