congress_website_title = "AN ACT STRENGTHENING THE COOPERATIVE CODE OF THE PHILIPPINES, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED AND THIRTY-EIGHT"
congress_website_abstract = "Since its inception, the cooperative movement has aimed to uplift the standards of living of the people especially the low income sectors. However, it is to be observed that the growth and development of cooperatives remain slow. The law may not beattractive enough to encourage some groups to organize into a cooperative. Thus, in order to optimize the efficiency and effectiveness of the Cooperative Code of the Philippines, pursuant to the Constitutional provision calling for the promotion anddevelopment of cooperatives to help attain economic development and social justice, this measure is being proposed."
