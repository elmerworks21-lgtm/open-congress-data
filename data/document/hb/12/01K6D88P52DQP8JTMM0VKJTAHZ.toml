congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE WATER RESOURCES MANAGEMENT TO ADDRESS THE NATIONAL WATER CRISIS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Water Resources Management Act of 1997.\" The State recognizes the existence of a national water crisis. This measure seeks to establish an institutional mechanism for the utilization and development of water resources and adopt a more comprehensive and relevant methods of conservation, protection, management and revitalization of said water resources."

