congress_website_title = "AN ACT CRIMINALIZING CHEATING AND OTHER DISHONEST ACTS RELATIVE TO THE CONDUCT OF BAR EXAMINATIONS AND IMPOSING STIFF PENALTIES THEREOF"
congress_website_abstract = "Time and again, the integrity of the legal profession has been shaken by occurrences and complaints of scandals, cheating and other dishonest acts during bar examinations. These acts have wrought damage to the credibility and integrity of our judicial system and the rule of law. To deter the commission of such dishonest acts, the bill seeks to criminalize cheating and other dishonest acts relative to the conduct of bar examinations. It also provides for the imposition of stiff penalties on offenders of this act."

