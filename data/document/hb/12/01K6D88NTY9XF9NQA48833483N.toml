congress_website_title = "AN ACT ESTABLISHING A PRE-SCHOOL PROGRAM IN ALL PUBLIC SCHOOLS AND APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposes the establishment of a pre-school program as a component of the free public elementary school. By making pre-school education available to all, children of poor families are afforded the same opportunity as those children from affluent families who can afford private pre-schools. The creation of a pre-school program in all public elementary schools will necessarily create official positions for pre-school teachers, who are already rendering services as such, and will likewiseprovide the corresponding compensation for the said positions. This Act shall cover all six-year old Filipino citizens."

