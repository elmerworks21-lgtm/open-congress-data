congress_website_title = "AN ACT MANDATING ALL GOVERNMENT FINANCIAL INSTITUTIONS (GFIs) PARTICIPATING AS LENDING WINDOWS UNDER THE MULTI-WINDOW LENDING SYSTEM (MWLS) TO ADOPT AND IMPLEMENT THE GRADUATED AMORTIZATION PAYMENT (GAP) SCHEME FOR SOCIALIZED HOUSING LOANS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Graduated Amortization Payment Scheme Act of 2002\". This bill seeks to: (1) Enhance the capability of low-income groups to aquire decent and socialized housing units through the mandatory graduated amortization payment mechanisms and facilities which will render affordable such acquisitions; (2) Provide for a strong and sustainable housing finance program with complementary support systems, which will pump prime, build up and strenghten available sources of cheap and long-term capital; and (3)Serve the housing requirement of all the underprivileged and those gainfully employed and members of the funding agencies such as Government Service Insurance System (GSIS), social Security System (SSS), and Home Devleopment Mutual Fund (HDMF/PAG-IBBIG) ."
