congress_website_title = "AN ACT GRANTING MATERNITY LEAVE BENEFITS TO UNMARRIED PREGNANT WOMEN WHO ARE IN GOVERNMENT SERVICE"
congress_website_abstract = "This bill seeks ti address the discrimination against unmarried pregnant women in the government sector. Rationale: Concerned women's organizations including the U.P. Portia Sorority, Department of Women and Development Studies of the U.P. College of Social Work and Community Development, COURAGE and GABRIELA maintain that as a matter of right, unmarried pregnant women in government service should also enjoy maternity leave benefits as unmarried pregnant women in the private sector do. They also stress that the protection of the health of the working women and her unborn must be given due importance."

