congress_website_title = "AN ACT REQUIRING ALL MASS MEDIA FACILITIES TO ALLOCATE AT LEAST FIVE (5) MINUTES A DAY FOR AIRTIME AND A MINIMUM OF FIVE (5) COLUMN INCH SPACE FOR A WRITE-UP OF A PROGRAM DESIGNED TO SPREAD INFORMATION ON SCIENCE AND TECHNOLOGY AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "All broadcast facilities are hereby required to allocate at least five (5) minutes airtime a day, and all print media facilities are required to allocate a minimum of five (5) column inch space for write-ups that will raise awareness of our people on matters concerning science and technology and tehrefore elevate responsiveness of the people of recent global phenomena, thereby also projecting the good image of our country to foreign investors."
