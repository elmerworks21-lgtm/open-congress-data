congress_website_title = "AN ACT CREATING THE NATIONAL AUTHORITY FOR REVENUE ADMINISTRATION, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Authority for Revenue Administration Act of 2002>\" This bill establishes a public organization to be known as the National Authority for Revenue Administration (NARA) which shall be responsible to raise revenues to finance the operations of the Government consistent with fiscal policy and revenue collection targets. The Authority shall exercise the powers and duties exercised by the Bureau of Internal Revenue under the National Internal Revenue Code of 1997. > It is also the intentionof this bill to address the concerns of the employees of the Bureau of Internal Revenue (BIR) who will be given fair retirement and separation package for the services rendered to the Bureau. It also provides not only the preferential absorption ofpresent BIR employees into the NARA but also for a retirement program better than that found under existing laws."
