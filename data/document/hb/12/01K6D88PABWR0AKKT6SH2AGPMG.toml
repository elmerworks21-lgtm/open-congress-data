congress_website_title = "AN ACT PROVIDING FOR THE CREATION OF THE NATIONAL INDEPENDENT COMMISSION AGAINST CORRUPTION, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"National Independent Commission Against Corruption Act of 2003\\\". In the 2002 survey of 102 countries conducted by Transparency International, an international coalition against corruption, the Philippines was reported to be the 11th most corrupt nation. The bill seeks the creation of the National Independent Commission Against Corruption (NICAC) which shall implement and coordinate policies at the national level for the prevention, control and, ultimately, elimination of graft and corrupt practices at all levels of the government, either perpetuated by public officers or private persons."
