congress_website_title = "`THE PHILIPPINE IMMIGRATION AND NATURALIZATION ACT OF 2002'"
congress_website_abstract = "This bill seeks to reorganize the Bureau of Immigration and instituting it into a Commission to be known as the Commission on Immigration and Naturalization. A more responsive immigration law is imperative to ensure the security, protect the health,morals, safety and maintain the dignity of our people in particular and the country in general. With this proposed legislation, the antiquated systems and procedures on immigration being adopted in our country will be strengthened and streamlines toconform with the modern trends."
