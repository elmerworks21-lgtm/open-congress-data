congress_website_title = "AN ACT PROVIDING FOR THE RE-ALLOCATION OF THE INTERNAL REVENUE ALLOTMENT OF LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE SECTION 285 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Section 285 of Republic Act No. 7160 otherwise known as the Local Government Code of 1991 is hereby amended to read as follows: \"Section 285. Allocation to Local Government Units. - the shares of local government units in the internal revenue allotment shall, STARTING IN 2002, be allocated AFTER DEDUCTING THEREFROM THE COST OF DEVOLVED FUNCTIONS AND PERSONNEL, INCLUDING THOSE PERSONNEL HIRED BY LOCAL GOVERNMENT UNITS BEFORE DECEMBER 1997 TO PERFORM THE DEVOLVED FUNCTIONS, AND THE COST OF THE CITY-FUNDED HOSPITALS AND LEGISLATED BENEFITS, EXCLUDING CAPITAL OUTLAY . THE TOTAL COST SO DEDUCTED SHALL BE DISTRIBUTED AND REMITTED DIRECTLY TO THE LOCAL GOVERNMENT UNITS CONCERNED. The net balance of the IRA shall be allocated as prescribed in thiis Act."
