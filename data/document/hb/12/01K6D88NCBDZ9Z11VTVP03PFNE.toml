congress_website_title = "AN ACT TO AMEND REPUBLIC ACT NO. 8239, OTHERWISE KNOWN AS THE PHILIPPINE PASSPORT ACT OF 1996"
congress_website_abstract = "Specifically, this bill seeks to amend the provisions relating to the requirements for issuance of passports as well as additional grounds for its amendment, suspension and revocation. Furthermore, the proposed bill enumerates the individuals who shall be qualified to file applications on bahalf of certain applicants in specific circumstances provided therein.> Finally, the bill also seeks to penalize those who do damage to the Philippine passport's integrity and validity by punishing those whoshall sell passport applications, government forms, as well as lost or stolen documents."
