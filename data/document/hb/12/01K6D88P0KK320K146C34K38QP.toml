congress_website_title = "AN ACT AMENDING ARTICLE 63, TITLE II OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "This bill proposes that present laws on marriage be amended to allow the innocent spouse who have been granted a decree of legal separation to initiate the necessary petition before the proper courts to finally terminate their marriage and to re-marry, after the lapse of five (5) years from the date of the issuance of the decree. During the hearing, it is necessary that the following elements be properly established: (1) That the petitioner be the innocent spouse; (2) That a period of five (5)years have elapsed from the time the decree of legal separation became final and executory; and (3) Reconciliation between the spouses is no longer possible."
