congress_website_title = "AN ACT REQUIRING MANDATORY SCHOOL INSPECTIONS TO PROTECT THE HEALTH AND SAFETY OF STUDENTS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Health Education Act of 2001\". Notwithstanding any laws to the contrary, schools of all levels and training institutions are hereby required to conduct a yearly inspection of facilities relevant to the health and safety of the students and their teaching and non-teaching personnel, such as, but not limited to the following: water supply system, comfort rooms, cafeterias and restaurants, fire exits and laboratories."
