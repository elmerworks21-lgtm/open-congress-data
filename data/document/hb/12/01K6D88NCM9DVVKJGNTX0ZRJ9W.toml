congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED SEVENTY-EIGHT HUNDRED AND THIRTY-SIX, OTHERWISE KNOWN AS \"THE PHILIPPINE TEACHERS PROFESSIONALIZA TION ACT OF 1994\""
congress_website_abstract = "This legislative initiative proposes to amend Section 22 and Section 26 of R.A. No. 7836 otherwise known and cited as \"The Philippine Teachers Professionaliza tion Act of 1994.\" The proposed amendment for the Section 22 calls for the automatic and mandatory membership of professional teachers into an integrated national organization recognized and accredited by the National Teachers Board and the Professional Regulations Commission. While the proposed amendment to Section 26 extends the prescriptive registation period for qualified teachers to register with the Board up to December 31. 2003."
