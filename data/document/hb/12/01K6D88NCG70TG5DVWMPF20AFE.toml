congress_website_title = "AN ACT CREATING THE EMPLOYMENT PLANNING BOARD, PROVIDING FOR ITS STRUCTURE, POWERS AND FUNCTIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to create a tripartite inter-agency Employment Planning Board that would, among others, formulate employment policies, make the employment chapter of the Philippine Development Plan, establish a labor market information system, and monitor the state of employment in the country. The creation of this board will help strengthen educational and manpower target-setting in the country's development plans and aid in the decrease of the growing mismatch between the supply and demand for the products of the educational system."

