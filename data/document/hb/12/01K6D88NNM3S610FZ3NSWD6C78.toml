congress_website_title = "AN ACT INCREASING PENSIONS UNDER THE SOCIAL SECURITY SYSTEM, AMENDING FOR THE PURPOSE SECTION 12 OF THE SOCIAL SECURITY ACT OF 1997"
congress_website_abstract = "Notwithstanding the preceding paragraph, the minimum MONTHLY pension shall be [One thousand two hundred pesos (P1,200.00) formembers with at least ten (10) credited years of service and Two thousand four hundred pesos (P2,400.00) for those with twenty (20) credited years of service] THREE THOUSAND PESOS (P3,000.00): PROVIDED, THAT IN THE SUCCEEDING YEARS STARTING JANUARY, 1999, SAID THREE THOUSAND MONTHLY PENSION BENEFIT SHALL BE INCREASED ANNUALLY BY FIVE HUNDRED PESOS (P500.00) PER MONTH UNTIL (P5,000.00) PER MONTH: PROVIDED, FURHTER THAT THE COMMISSSION SHALL EQUITABLY ADJUST THE MONTHLY PENSIONS OF OTHER ENTITLED MEMEBERS OR BENEFICIARIES WHOSE MONTHLY PENSIONS ARE HIGHER THAN THE MINIMUM MONTHLY PENSION HEREBY ESTABLISHED TO PRESERVETHE INTEGRITY OF THE PENSION PROGRAM."
