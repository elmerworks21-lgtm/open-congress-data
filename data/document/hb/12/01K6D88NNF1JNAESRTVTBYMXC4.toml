congress_website_title = "AN ACT EXEMPTING THE FAMILY HOME FROM REAL ESTATE TAX"
congress_website_abstract = "Family homes shall be exempt from real estates taxes. For this purpose, a family home shall mean the dwelling house constituted jointly by the husband and the wife or by an unmarried head of a family, where they and their family reside, and the landon which it is situated.> Only one family home per family shall be qualified to the real estate tax exemption."

