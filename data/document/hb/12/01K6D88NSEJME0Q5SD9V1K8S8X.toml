congress_website_title = "AN ACT AUTHORIZING THE CREATION OF SPECIAL PURPOSE ASSET VEHICLES TO ALLOW INVESTMENT IN AND ACQUISITION OF NON-PERFORMING LOANS, REAL ESTATE AND OTHER ASSETS, AND FOR OTHER PURPOSES"
congress_website_abstract = "This Act seeks to create a legislative framework to encourage private sector investment into the non-performing loans and assets of Philippine banks. It is an extraordinary measure enacted for the limited purpose of alleviating the temporary NPL problem, and thus has a limited effective period. This bill facilitates the creation of special purpose asset vehicles (the \"SPAV\") established to acquire non-performing assets, including loan assets and real and other properties, currently burdeningthe financial sector. Investment enhancements include: (1) reduction for a limited time of taxes, fees and duties relating to NPL and real estate acquisitions, dispositions and resolutions; (2) waiver on restrictions on foreign ownership of land andd assets for a limited period; and (3) improvement of domestic insolvency and creditor rights laws."
