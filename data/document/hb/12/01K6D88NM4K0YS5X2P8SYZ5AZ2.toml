congress_website_title = "AN ACT PROVIDING FOR THE STRENGTHENING OF THE HEALTH CARE PROGRAM AND OTHER SERVICES IN EVERY BARANGAY BY CREATING ITEMS FOR BARANGAY HEALTH WORKERS (BHWs), AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The position of Barangay Health Worker (BHW) is hereby created in every barangay in the Philippines. A BHW shall have the rank privileges of a barangay kagawad subject to adjustments approved by the Department of Budget and Management. > A BHW shallbe responsible for the year round implementation of the projects and programs of the Department of Health (DOH). Furthermore, BHWs shall initiate and plan such other programs as they may deem necessary for the advancement of health care program in their respective barangays and shall maintain close working relationship with the barangay captains, provincial/muni cipal health officers and non-government organizations."
