congress_website_title = "AN ACT CREATING THE INSTITUTE FOR HEARING, BALANCE AND COMMUNICATION DISORDERS WITHIN THE UNIVERSITY OF THE PHILIPPINES SYSTEM, DEFINING ITS POWERS AND FUNCTIONS, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Philippine Ear Research Institute Act of 2002\\\" Hearing loss, although the least recognized, is a physical ailment that affects more people than we are ware of. Ear diseases are known to cause significant functional and communication disability withwide-ranging economic and social implications.> This bill proposes to establish an Institute for Hearing, Balance and Communiction Disorders under the National Institutes of Health, University of the Philippines, which shall be the main research organization with the autonomy to identify and establish research problems and priorities."
