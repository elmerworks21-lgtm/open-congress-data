congress_website_title = "AN ACT SEEKING TO IMPROVE CHILD PROTECTION AGAINST ABUSE, EXPLOITATION AND DISCRIMINATION, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7610, AS AMENDED BY REPUBLIC ACT NO. 7658, OTHERWISE KNOWN AS THE `SPECIAL PROTECTION AND DISCRIMINATION ACT', APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Among the significant provisions of this bill are: (1) greater participation of local social workers and law enforcers in child prostitution; (2) penalty for child pornography through the internet; (3) ban on child employment in all forms of \"hazardous\" occupations; (4) creation of a central data bank to monitor cases of child abuse."

