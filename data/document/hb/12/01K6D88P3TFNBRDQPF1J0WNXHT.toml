congress_website_title = "AN ACT EXEMPTING RURAL ELECTRIC COOPERATIVES FROM THE PAYMENT OF THE FRANCHISE, BUSINESS AND REAL PROPERTY TAXES IMPOSED BY THE LOCAL GOVERNMENT CODE, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 7160"
congress_website_abstract = "Rationale: The rationale behind the grant of Tax Exemption Privileges to Electric Cooperatives is to ensure that the electric rates will remain reasonably low and affordable.> The imposition of the franchise, business and property tax on rural electric cooperatives by the Local Government Code of 1991 will deplete the EC's scarce resources and eventually render it incapable of pursuing its missionary role of rural electrifiction, which our poor rural inhabitants so richly deserve."

