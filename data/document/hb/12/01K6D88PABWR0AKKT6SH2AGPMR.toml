congress_website_title = "AN ACT AMENDING SECTION 45, CHAPTER 10 AND SECTION 17, CHAPTER 1 OF SUBTITLE II, TITLE VIII OF EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE \\\"1987 ADMINISTRATIVE CODE\\\" BY PROHIBITING A PERSON FROM BEING APPOINTED AS SECRETARY OF NATIONAL DEFENSE WITHIN THREE (3)YEARS AFTER RELIEF FROM ACTIVE DUTY AS COMMISSIONED OFFICER OF THE ARMED FORCES OF THE PHILIPPINES"
congress_website_abstract = "To maintain civilian supremacy over the military, this bill proposes to disqualify all military officers to serve as Executive Head of the Department of National Defense within three years after relief from active duty as a commissioned officer of the Armed Forces of the Philippines (AFP). Three years is deemed to be sufficient time for the relieved members of the AFP to adapt to civilian life."

