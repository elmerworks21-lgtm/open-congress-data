congress_website_title = "AN ACT PROHIBITING LOCAL ELECTIVE EXECUTIVE OFFICIALS FROM MAKING APPOINTMENTS AND INCURRING OBLIGATIONS ON BEHALF OF THEIR RESPECTIVE LOCAL GOVERNMENT UNITS NINETY (90) DAYS BEFORE THE NEXT REGULAR ELECTIONS UNTIL THE END OF THEIR TERM (RE: ANTI-MIDNIGHT APPOINTMENTS AND TRANSACTIONS ACT OF 2001)"
congress_website_abstract = "\"Anti-Midnight Appointments and Transactions Act of 2001\". This bill applies to all elective executive officials of Local Government Units including Governors, Vice-Governors, Mayors, Vice-Mayors, and Punong Barangays. >Ninety (90) days immediatelybefore the next regular elections and up to the end of their term, no local executive officials as mentioned above shall make appointments, except temporary appointments to executive positions when continued vacancies therein will prejudice public service or endanger public safety. Provided that, temporary appointments made may be revoked or changed by the incoming elected officials. >Neither shall any elective official as mentioned above enter into any loan agreement or obligation on behalf ofthe Local Government Unit ninety (90) days immediately before the next regular elections and up to the end of his term."

