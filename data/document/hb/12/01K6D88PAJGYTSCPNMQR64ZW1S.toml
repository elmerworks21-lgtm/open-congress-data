congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 9164, BY EXTENDING THE TERM OF BARANGAY OFFICIALS INTO FIVE (5) YEARS"
congress_website_abstract = "The measure seeks to extend the term of office of barangay officials from three years to five years in order to give these officials more time to implement and effectuate their projects, plans and programs. It further provides for the holding of a synchronized barangay and sangguniang kabataan elections on the last Monday of October 2007 and every five years thereafter."

