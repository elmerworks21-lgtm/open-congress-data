congress_website_title = "AN ACT PROHIBITING THE APPOINTMENT OF RESIGNED ELECTIVE GOVERNMENT OFFICIALS TO ANY OFFICE IN GOVERNMENT"
congress_website_abstract = "The measure seeks to prohibit the appointment or designation of resigned elective officials to any position in government or any government-owned or controlled corporation or any of its subsidiaries during the unfinished term of his elective position. The prohibition will discourage elective officials from resigning in order to seek juicy positions in government and strengthen the commitment of elected officials to serve the populace."
