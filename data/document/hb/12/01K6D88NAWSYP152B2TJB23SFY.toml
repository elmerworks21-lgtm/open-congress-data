congress_website_title = "AN ACT GRANTING INSURANCE BENEFITS TO ALL BARANGAY TANODS PROVIDING FUNDS FOR THE PAYMENT OF ITS PREMIUMS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Barangay Tanod Insurance Act of 2001.\" In recognition of their services, barangay tanods, in addition to the benefits under existing laws, shall be entitled to the following benefits: (a) Free life insurance of P20,000.00; (b) Burial expenses of P10,000.00; (c) Free hospitalization /medical services up to P10,000.00 per year, provided, however, that the disease, illness or injury is contracted in the performance of their official uniform; and (d) Free legal services - legal representation andconsultation services for barangay tanods shall be immediately provided by the Public Attorneys Office in cases of coercion, interference, and in civil and criminal cases filed by or against barangay tanods arising out of or in conection with the perrformance of their official duties."

