congress_website_title = "AN ACT PROHIBITING THE PUBLIC DISPLAY OF PERSONS ARRESTED, ACCUSED OR UNDER CUSTODIAL INVESTIGATION IN A DEGRADING MANNER, AND AMENDING FOR SUCH PURPOSE REPUBLIC ACT NO. 7438, ENTITLED \"AN ACT DEFINING CERTAIN RIGHTS OF PERSONS ARRESTED, DETAINED ORUNDER CUSTODIAL INVESTIGATION AS WELL AS THE DUTIES OF THE ARRESTING, DETAINING, AND INVESTIGATING OFFICERS AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF\""
congress_website_abstract = "NO PERSON ARRESTED, DETAINED OR UNDER CUSTODIAL INVESTIGATION SHALL BE PUT ON PUBLIC DISPLAY IN HAND CUFFS, WITH NAME TAGS OR OTHER TUGS, OR IN ANY MANNER CAUSING OR TENDING TO CAUSE DEGRADATION, HUMILIATION, DISHONOR, DISCREDIT, RIDICULE OR CONTEMPT, NOT SHALL SUCH PERSON BE PRESENTED TO THE PRESS IN SUCH MANNER. SUBJECT TO THE PRECEDING RESTRICTIONS, THE PUBLIC DISPLAY OR PRESENTATION TO THE PRESS OF ANY PERSON ARRESTED, ACCUSED, DETAINED, OR UNDER CUSTODIAL INVESTIGATION SHALL ONLY BE ALLOWED IF SUCH PERSON IS ASSISTTED BY COUNSEL OF HIS CHOICE DURING THE PUBLIC DISPLAY OR PRESENTATION."
