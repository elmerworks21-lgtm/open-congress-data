congress_website_title = "AN ACT AMENDING SECTION 285 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, PROVIDING FOR THE REDUCTION OF THE INTERNAL REVENUE ALLOCATION (IRAs) OF HIGH-INCOME LOCAL GOVERNMENT UNITS (LGUs) BY EIGHT PERCENT (8%) FORTHE BENEFIT OF LOW INCOME LGUs"
congress_website_abstract = "Rationale: The provision of Section 285 of RA 7160 is hereby amended to rectify the unfair and inequitable allocation of IRA of LGUs. To make the present system more responsive to the needs of low-income LGUs, this bill proposes to reduce the IRAs of high-income LGUs for the benefit of low-income LGUs. The reduced IRA will be allocated in proportation to population density, poverty incidence, and income class of LGUs, in lieu of land area and equal sharing. The proposed method would enable thelow-income local government units to carry out devolved functions, particularly, health and agricultural services."
