congress_website_title = "AN ACT REQUIRING PRIOR CONGRESSIONAL APPROVAL FOR ALL FORMS OF FOREIGN AND DOMESTIC INDEBTEDNESS OF THE NATIONAL GOVERNMENT, INCLUDING THE RE-PAYMENT AND AMORTIZATIONS OF ALL PUBLIC DEBTS"
congress_website_abstract = "This bill requires the President of the Philippines to obtain Congressional approval of the exact amount, rate of interest and actual source of all intended yearly borrowings in the name and liability of the Republic of the Philippines. The notification shall contain the probable terms and condtions, interest rates, maturity period, penalties in case of default or late payments of amortizations, and other similar conditions, and shall be transmitted yearly to Congress together with the proposedannual appropriations act.> Contracting of all forms of public debt in the name and liability of the Republic of the Philippines without the prior congressional approval in the form of Resolutions separately approved by a majority of the House of Reepresentatives and Senate shall be of no force and effect."

