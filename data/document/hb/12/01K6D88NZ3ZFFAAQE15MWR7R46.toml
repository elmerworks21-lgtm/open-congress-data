congress_website_title = "AN ACT ADDRESSING THE SPECIAL EDUCATIONAL NEEDS OF SPECIAL CHILDREN AND ADULTS"
congress_website_abstract = "\"The Law on Special Education (SPED).\" Rationale: The need to come up with an additional alternative form of education for the disabled is a living reality that can no longer be disregarded. In the present \"Internet Age\", the potential of the disabled children and adults should be tapped; and for that reason it is envisioned that they should contribute specifically to the computer industry in general, to the overall development of the country. > The State shall provide these natural persons Special Education (SPED); and the school cities that will be devoted for special eduction shall be located initially, in every legislative district."
