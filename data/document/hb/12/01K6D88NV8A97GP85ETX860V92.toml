congress_website_title = "AN ACT GRANTING SPECIAL BENEFITS TO GOVERNMENT PERSONNEL RETIRED UNDER R.A. 660, R.A. 1616 AND P.D. 1146, WHO ARE 70 YEARS OR OLDER, BY PROVIDING NEW PROCEDURES IN THE COMPUTATION OF MONTHLY PENSIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposes to modify the manner of computing the monthly pension of retirees by making the salary schedule provided in Executive Order No. 389 as one of the bases. This would give substance to the provision of RA 7432 (Senior Citizens Act),particularly, Section 6 thereof, which reads: \"Section 6. Retirement benefits. To the extend practicable and feasible, retirement benefits from both the Government and the Private sector shall be upgraded at par with the current scale enjoyed by those in actual service.\" This bill would also allow the change of modes of retirement of those that previously retired under RA 1616 and are now 70 years or older."

