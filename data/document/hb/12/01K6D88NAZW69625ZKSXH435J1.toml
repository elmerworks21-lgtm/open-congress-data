congress_website_title = "AN ACT AMENDING THE STATUTORY PROVISION AUTHORIZING THE PRESIDENT OF THE PHILIPPINES TO MAKE NECESSARY ADJUSTMENT IN THE INTERNAL REVENUE ALLOTMENT OF LOCAL GOVERNMENT INCURS AN UNMANAGEABLE PUBLIC SECTOR DEFICIT, AMENDING FOR THIS PURPOSE SECTION 284 OF REPUBLIC ACT NO. 7160"
congress_website_abstract = "This bill seeks to protect the Internal Revenue Allotment (IRA) share of the local government units from funding restrictions or holdback in the event that the national government incurs an unmanageable public sector deficit.> The local governments,being at the forefront in the delivery of essential services to the people must always be assured of local autonomy and financial viability as mandated by the Constitution and the Local Government Code."
