congress_website_title = "AN ACT TO ENTITLE CHILDREN OF TEACHERS AND EMPLOYEES IN PUBLIC AND PRIVATE INSTITUTIONS OF HIGHER LEARNING TO FREE TUITION AND OTHER SCHOOL FEES"
congress_website_abstract = "This bill seeks to extend EDUCATIONAL ASSISTANCE to children of our mentors in the form of tuition fee exemptions and discounts to enable them to obtain a college education with less financial and psychological strain on their parents. Further, theassistance is extended to children of other employees of educational institutions, who in their own capacity facilitate the educational attainment of our children."

