congress_website_title = "AN ACT PROVIDING FOR THE CONTROL AND ERADICATION OF RABIES, PRESCRIBING PENALTIES FOR VIOLATION THEREOF AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This bill seeks to provide an Anti-Rabies Law to protect our countrymen, specially the children, from rabid animals. Rabies is one of the most dangerous virus that can attack a human being, and our country has one of the highest rabies incidence inthe whole world. It is in this light that this measure is being proposed."
