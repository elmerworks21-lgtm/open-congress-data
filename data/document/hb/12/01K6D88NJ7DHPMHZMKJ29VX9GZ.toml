congress_website_title = "AN ACT STRENGTHENING FURTHER THE RIGHT OF DAUGHTERS AGAINST INCESTUOUS RAPE BY PENALIZING MOTHERS WHO REFRAIN FROM PROCEEDING AGAINST THE FATHER-RAPISTS OR TOLERATE ITS CIMMISSION"
congress_website_abstract = "Notwithstanding any law to the contrary and without prejudice to the provisions of Article 344 of Act No. 3815, as amended, (Revised Penal Code) and Section 27 of R.A. No. 7610, any mother who, in an incestous rape, refrains from instituting prosecution for the punishment of the offender or who tolerates the commission of the same, shall suffer the penalty of twenty (20) to torty (40) years of imprisonment and a fine ranging from twenty thousand pesos (P20,000.00) to forty thousand pesos (P40,000.00) and shall be perpetually deprived from parental authority."

