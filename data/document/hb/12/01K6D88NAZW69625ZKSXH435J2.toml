congress_website_title = "AN ACT GRANTING ADDITIONAL INSURANCE BENEFITS TO ALL PUBLIC SCHOOL TEACHERS, PROVIDING FUNDS FOR THE PAYMENT OF ITS PREMIUMS, AND FOR OTHER PURPOSES"
congress_website_abstract = "In addition to the existing insurance benefits given to public schoolteachers by the Government Service Insurance System (GSIS) under Republic Act No. 8291, a term insurance coverage to all public schoolteachers providing the following benefits shall be granted: (a) death benefits of Two Hundred Thousand (P200,000.00) to all teachers who are in active service; (b) burial expenses of Fifty Thousand Pesos (P50,000.00) to all teachers who are in active service; and (c) reimbursement of actual medical expenses of all teachers, whether retired or in the active service, but not to exceed One HUndred Thousand Pesos (P100,000.00)."
