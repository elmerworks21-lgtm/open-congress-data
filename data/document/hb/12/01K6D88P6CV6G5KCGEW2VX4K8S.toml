congress_website_title = "AN ACT REQUIRING ALL BRANCHES, SUBDIVISIONS, INSTRUMENTALITI ES AND AGENCIES OF THE GOVERNMENT, INCLUDING GOVERNMENT-OWNE D OR -CONTROLLED CORPORATIONS OR THEIR SUBSIDIARIES TO DIVULGE THE IDENTITY OF HIRED FOREIGN CONSULTANTS, THE NATURE OF THEIRWORK AND THEIR COMPENSATION, PERKS AND OTHER PRIVILEGES, AND PROVIDING PENALTIES IN CASE OF VIOLATION THEREOF"
congress_website_abstract = "This proposed measure seeks to inform the public of how many money us being used to pay consultants hired by the Government. Transparency in this regard is needed so that the public will know whether or not the consultancy fees paid these consultants are commensurate with the benefits that the Government is supposed to get from such consultancy contracts. This measure also gives emphasis of the people's basic right to know who are providing expert advice and support to the Government."
