congress_website_title = "AN ACT RESTORING THE FISCAL INCENTIVES TO ENTERPRISES ENGAGED IN AGRICULTURE AND FISHERIES AS PREVIOSLY GRANTED UNDER REPUBLIC ACT NUMBERED EIGHT THOUSAND FOUR HUNDRED THIRTY-FIVE (R.A. 8435), OTHERWISE KNOWN AS THE AGRICULTURE AND FISHERIES MODERNIZATION ACT OF 1997"
congress_website_abstract = "Considering that the agriculture sector holds the second highest multiplier effect on the national economy, more incentives for our farmers and agri-based industries are in order, This measure proposes to restore the duty exemption incentive to enterprises in the agriculture and fishery sectors (inclusive of single proprietorships, partnerships, cooperatives, corporations, farmer's organizations/associations or juridical entities) that was previously granted under Section 109 of RA 8435 (Agriculture and Fisheries Modernization Act [AFMA] OF 1997). The fiscal incentives expired on February 8, 2003. This measure also proposes to reinstate the penal provisions in the AFMA law for violation of the incentive provision therein to ensure strict compliance of the conditions for the grant of duty exemption."
