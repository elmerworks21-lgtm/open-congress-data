congress_website_title = "AN ACT PROVIDING FOR THE TEACHING OF ECOLOGY IN ALL ELEMENTARY AND SECONDARY LEVELS, WHETHER PUBLIC OR PRIVATE, ALL THROUGHOUT THE COUNTRY AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "The teaching of ecology as a separate subject is hereby included as one of the possible subjects in all elementary and secondary levels, either public or private, of the Philippines. The Secretary of Education, Culture and Sports shall issue the necessary reading materials, booklets and pamphlets dealing with the fundamentals of ecology in relation to the pressing environmental issues in the Philippines."
