congress_website_title = "AN ACT REGULATING THE LABELLING, SALES AND ADVERTISING OF CIGARETTES (AND OTHER TOBACCO PRODUCTS), PROHIBITING SMOKING IN PUBLIC CONVEYANCES AND IN ENCLOSED PLACES, PROVIDING PENALTIES FOR VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\"STOP for Health Act (Stop Tobacco and Other Products for Health).\" This bill proposed, among other matters, the prohibition of sale to minors, smoking in enclosed places and public conveyances and the sale, distribution and promotion of cigarettesin schools. Furthermore, the bill also requires the disclosure of the harmful ingredients contained in cigarettes, aside from requiring tobacco companies the usage of more prominent warnings on the hazards of smoking. A more strict regulation on theadvertising and promotional activities of tobacco products is also included. It is also proposed that the health risks associated with smoking shall be incorporated in the health and science subjects in all elementary and secondary schools."
