congress_website_title = "AN ACT ALLOCATING FIFTY PERCENT OF VALUE-ADDED TAX COLLECTIONS TO HEALTH AND EDUCATION SERVICES, AGRICULTURAL FACILITIES AND SERVICES, HOUSING, ENVIRONMENTAL PROTECTION, AND OTHER SOCIAL SERVICES THEREBY AMENDING THE NATIONAL INTERNAL REVENUE CODE,AS AMENDED"
congress_website_abstract = "SECTION 1. A new section, to be numbered Two Hundred Eight-Seven, shall be added to Chapter 2, Title XI of the National Internal Revenue Code, to read as follows: \"SEC. 287. DISPOSITION OF PROCEEDS OF VALUE-ADDED TAX. (A) IN GENERAL. - FIFTY PERCENT (50%) OF THE VALUE-ADDED TAX COLLECTED UNDER TITLE IV OF THIS CODE SHALL BE ALLOCATED TO EXPENDITURES FOR HEALTH AND EDUCATION SERVICES, IRRIGATION AND POST-HARVEST FACILITIES, HOUSING, ENVIRONMENTAL PROTECTION, AND TRAINING AND CAPABILITY BUILDINGPROGRAMS FOR MICRO-FINANCES, FOR A PERIOD OF FIVE YEARS IN THE FOLLOWING PROPORTIONS: EDUCATION 25%; HEALTH 25%; AGRICULTURAL FACILITIES AND SERVICES 25%; HOUSING 15%; ENVIRONMENTAL PROTECTION 5%:; TRAINING AND CAPABILITY BUILDING PROGRAMS 5%."
