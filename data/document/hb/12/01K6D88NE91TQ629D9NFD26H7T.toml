congress_website_title = "AN ACT DECLARING THE FIRST DAY OF SHAWAL, THE TENTH (10TH) MONTH OF THE HIJJRA OR MUSLIM CALENDAR, A NATIONAL HOLIDAY FOR THE OBSERVANCE OF EIDUL FITRI, AMENDING FOR THE PURPOSE SECTION 26, CHAPTER 7 OF EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE ADMINISTRATIVE CODE OF 1987, AND FOR OTHER PURPOSES"
congress_website_abstract = "The first day of Shawal, the tenth (10th) of the Hijjra or Muslim Calendar, is hereby declared as a National Holiday for the observance of Eidul Fitri. This is the first day marking the end of the thirty (30) day fasting period of Ramadan."
