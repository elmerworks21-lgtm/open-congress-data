congress_website_title = "AN ACT DEFINING AND PUNISHING MONEY LAUNDERING AND PROVIDING FOR APPROPRIATE MECHANISMS FOR ITS DETECTION, PREVENTION AND PROSECUTION, INCLUDING THE CREATION OF THE NATIONAL ANTI-MONEY LAUNDERING BOARD, DEFINING THE POWERS AND FUNCTIONS THEREOF ANDAPPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "It is the policy of the State to ensure that criminals, organized crime groups, corrupt public officials and the proceeds of their unlawful activities cannot find safe haven in or use the Philippines as a money laundering site, offshore center or transit point and to extend strong cooperation in any transnational investigation, prosecution and extradition involving money laundering activities wherever committed."
