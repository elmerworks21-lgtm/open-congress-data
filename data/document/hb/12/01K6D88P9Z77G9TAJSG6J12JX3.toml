congress_website_title = "AN ACT INCREASING THE RATES OF EXCISE TAX ON DISTILLED SPIRITS, WINES, FERMENTED LIQUOR, CIGARS AND CIGARETTES AMENDING FOR THE PURPOSE SECTIONS 141, 142, 143 AND 145 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "The bill proposes to increase the rates of excise tax on distilled spirits, wines, fermented liquor, cigars and cigarettes. The proposed increase in excise taxes would generate for the government much needed revenues to finance its fiscal obligations. The tax increase will also discourage the usage and consumption of these sin products that will, in the long run, drastically reduce the government's health care costs on smoking and alcohol related ailments."
