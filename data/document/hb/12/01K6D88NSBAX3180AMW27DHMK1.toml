congress_website_title = "AN ACT INCREASING THE CAPITALIZATION OF THE LOCAL WATER UTILITIES ADMINISTRATION TO TEN BILLION PESOS (P10,000,000,00 0.00), AMENDING FOR THE PURPOSE THE PROVINCIAL WATER UTILITIES ACT OF 1973, AS AMENDED"
congress_website_abstract = "This bill seeks to INCREASE through legislation, the capitalization fund of the LWUA to enable it to cater ever-increasing need of water districts all over the country. It aims to expand the service by strengthening the financial status of this institution to capacitate the development of existing water districts, and of those that may be created hereafter.> The valuable contributions of LWUA to local communities in providing potable water supply to families are of great help to our countrymenespecially the rural poor. But without sufficient capitalization, it could fail to assume its responsbilities to the citizenry."

