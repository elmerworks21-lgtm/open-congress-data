congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8042, ENTITLED `AN ACT TO INSTITUTE THE POLICIES OF OVERSEAS EMPLOYMENT AND ESTABLISH A HIGHER STANDARD OF PROTECTION AND PROMOTION OF THE WELFARE OF MIGRANT WORKERS, THEIR FAMILIES AND OVERSEAS FILIPINOS IN DISTRESS, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to ensure FULL PROTECTION and PROMOTION of the RIGHTS and WELFARE of OVERSEAS FILIPINO WORKERS. The following issues are, therefore, sought to be addressed through this proposed measure: (1) Abandon the present policy of deregulating the overseas labor industry and reassert the government's primary role in the protection and promotion of OFWs rights and welfare. (2) Address the problems of trafficking to women and minors for commercial sex purposes and forced labor. (3) Implement a comprehensive program to support migrant families. (4) Implement the needs and welfare of our sea-based OFWs. (5) Incorporate the needs and welfare of our sea-based OFWs."
