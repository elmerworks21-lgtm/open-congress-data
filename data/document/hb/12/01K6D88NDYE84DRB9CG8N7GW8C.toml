congress_website_title = "AN ACT PROHIBITING THE USE OF THE WORDS `MUSLIM' AND `CHRISTIAN' IN PRINT AND BROADCAST MEDIA TO DESCRIBE ANY PERSON SUSPECTED OF OR CONVICTED FOR HAVING COMMITTED CRIMINAL OR UNLAWFUL ACT AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "This bill seeks to prohibit the use of the words \"Muslim\" and \"Christian\" in print and broadcast media to described any person suspected of or convicted of having committed criminal or unlawful acts, and provides for penalties for violation thereof.The words \"Muslim\" and \"Christian\" refer to a person's religious belief and do not in any way refer to a person's place of origin or propensity for criminal behavior."
