congress_website_title = "AN ACT DECLARING SIKARAN AS THE NATIONAL MARTIAL ART OF THE PHILIPPINES"
congress_website_abstract = "The bill seeks to declare \\\"sikaran\\\" as the national martial art of the Philippines. Sikaran-arnis is an ancient art of foot and stick fighting that originated in the town of Baras, Rizal. It incorporates arnis in the predominantly foot-fighting technique making it distinct from the other forms of martial arts like taekwondo and karate. Sikaran which is rapidly gaining popularity in the country, promotes the virtues of self-discipline and control as well as a healthy and simple lifestyle."
