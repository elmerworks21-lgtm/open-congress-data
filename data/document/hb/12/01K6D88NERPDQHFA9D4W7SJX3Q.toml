congress_website_title = "AN ACT PROHIBITING DISCRIMINATION IN THE RECRUITMENT, EMPLOYMENT, PROMOTION AND DISMISSAL OF ANY MEMBER OF THE THIRD SEX BOTH IN PUBLIC AND PRIVATE EMPLOYMENT AND PROVIDING PENALTIES THEREFOR"
