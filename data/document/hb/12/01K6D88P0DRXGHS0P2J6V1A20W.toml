congress_website_title = "AN ACT ELEVATING THE POSITION OF TOURISM OFFICER AS A DEPARTMENT HEAD IN EVERY PROVINCE, CITY OR MUNICIPALITY AS MAYBE APPROPRIATE"
congress_website_abstract = "Rationale: The Department of Tourism is principally tasked with the development of national tourism. While admittedly the task of DOT is being carried out, it has to be complemented by local government units to develop domestic tourism. > To achieveeffective complementation , there is a need to strengthen the local tourism industry by departmentalizi ng the tourism office and making mandatory the position of tourism officer as department head in every province, city or municipality, as maybe appropriate."

