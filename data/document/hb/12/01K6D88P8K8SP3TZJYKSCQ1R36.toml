congress_website_title = "AN ACT PROVIDING FOR A TOTAL BAN ON ANTI-PERSONNEL LANDMINES, FOR OTHER PROHIBITIONS OR RESTRICTIONS ON THE USE OF LANDMINES, BOOBY-TRAPS AND OTHER DEVICES, FOR CREATION OF A PHILIPPINE COORDINATING COMMITTEE ON LANDMINES, AND FOR RELATED PURPOSES"
congress_website_abstract = "\"Philippine Comprehensive Law on Landmines\". In compliance with our obligations under the Ottawa Treaty (1997 Convention on the Prohibition of the Use, Stockpiling, Production and Transfer of Anti-Personnel Mines and on Their Destruction) and the Amended Protocol II (1996 Amended Protocol on Prohibition or Restrictions on the Use of Mines, Booby Traps and Other Devices) which we ratified, the Philippines is obliged to take all appropriate legislative and other measures to implement these treaties. This bill proposes the following among others: (1) the adoption of a total ban on anti-personnel mines; (b) the application of the total ban on anti-personnel mines to their transit and carrying by visiting foreign military vessels and forces, inncluding in joint military exercises, in Philippine territory; and (c) a ban on technology transfer regarding anti-personnel mines."
