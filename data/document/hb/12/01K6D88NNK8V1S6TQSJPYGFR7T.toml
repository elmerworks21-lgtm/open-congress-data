congress_website_title = "AN ACT REQUIRING MOVIE, TELEVISION AND RADIO PRODUCERS INCLUDING PROMOTIONS AND ADVERTISING AGENCIES AND OTHER LIKE ENTITIES WHICH EMPLOY UNEMANCIPATED MINORS TO DEPOSIT THEIR TALENT FEES OR INCOME IN A TRUST FUND, PROVIDING PENALTIES FOR THE VIOLATION OF THE SAME AND FOR OTHER PURPOSES"
congress_website_abstract = "All movie, television, radio producers, including promotions and advertising agencies, talent promoters, and other like entities, who in the course of business hires, procures, or engage the services of an unemancipated minor below eighteen (18) years of age shall be required to deposit in the name of the said minor at least fifty (50%) percent of the minor's income or talent fee at a bank duly licensed by the Bangko Sentral ng Pilipinas in the form of a trust fund. > The trust fund established by the immediately preceeding section shall be held in safekeeping by that bank, to earn legal interest, unti the minor shall have reached the age of majority as defined by law, in which case the latter shall be free to handle the deposit as he deeems equitable under the premises."
