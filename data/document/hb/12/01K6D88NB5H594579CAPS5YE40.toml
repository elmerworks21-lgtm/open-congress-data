congress_website_title = "AN ACT TO MODERNIZE THE DOMESTIC SHIPPING INDUSTRY, ORDAINING REFORMS IN GOVERNMENT POLICIES TOWARDS SHIPPING IN THE PHILIPPINES, AMENDING FOR THE PURPOSE CERTAIN LAWS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill provides for the strengthening of financial assistance programs for local shipowners. Incentives for the development of private ports through Build-Operate Transfer schemes are also provided for. This will encourage further private sectorparticipation in the shipping industry.> The bill hopes to hasten investment into the shipping sector, increase domestic fleet, improve service and outreach, reduce sea transport rates and push the country on the path to faster growth."
