congress_website_title = "AN ACT DECLARING JUNE 30 OF THE YEAR AS PHILIPPINE-SPAN ISH FRIENDSHIP DAY, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "It is the policy of the State to strengthen the relationship between the Philippines and countries with which it has shared history, values and traditions. > June 30 is a day when President Emilio Aguinaldo commended the besieged Spanish soldiers inthe Church of Baler for their loyalty and gallantry. To mark this momentous occasion, there is a need to declare said day a national holiday to remember the act of benevolence which has paved the way in bridging better relations between Philippinesand Spain. > The Thirtieth of June of each year is hereby declared as Philippine-Span ish Friendship Day to commemorate cultural historical ties, friendship and cooperation between the Philippines and Spain. It shall be declared as a national speciall working holiday and a special non-working holiday in Aurora Province."
