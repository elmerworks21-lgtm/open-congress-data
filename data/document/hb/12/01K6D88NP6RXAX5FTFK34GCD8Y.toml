congress_website_title = "AN ACT PROVIDING FOR A THREE THOUSAND PESOS (P3,000.00) ACROSS-THE-BOAR D MONTHLY SALARY INCREASE IN THE WAGE AND SALARY RATES OF EMPLOYEES AND WORKERS IN THE PUBLIC SECTOR AND FOR OTHER PURPOSES"
congress_website_abstract = "As provided, an across-the-boar d monthly salary increase of three thousand pesos (P3,000) shall be granted to all employees, whether permanent, temporary, emergency, contractual or casual of the National Government, its agencies and instrumentalities including the Local Government Units. > This piece of legislation intends to provide the much-needed economic relief to an important section of the bureaucracy - the rank-and-file employees. This intention should be carried out through the provision of a P3,000 across-the-boar d salary increase to all public sector employees."
