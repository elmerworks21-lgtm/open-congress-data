congress_website_title = "AN ACT REVISING REPUBLIC ACT NO. 382, TO REGULATE THE PRACTICE OF VETERINARY MEDICINE IN THE PHILIPPINES"
congress_website_abstract = "This Act provides for and shall govern the Administration and conduct of licensure examination, registration, and licensing of veterinarians: a) The supervision and regulation of the practice of veterinary medicine; b) The integration of veterinarians under the existing accredited Veterinary Professional Association; and c) The development of the professional competence of veterinarians through continuing professional in accordance with the guidelines set by the Professional Regulation Commission."
