congress_website_title = "AN ACT TOTALLY BANNING LOGGING OPERATIONS FOR THE NEXT TWENTY-FIVE (25) YEARS"
congress_website_abstract = "It is hereby declared a Policy of the State to prohibit logging operations of any kind in any forest, timber land, forest reserve or watershed for the next twenty-five (25) years. It shall be unlawful for any person to cut, fell or destroy any treestanding on any forest, timber land, forest reserve or watershed within the next twenty-five (25) years from the approval of this Act. This prohibition shall not apply to trees grown in legitimate commercial tree farms."

