congress_website_title = "AN ACT TO PROHIBIT ELECTED AND APPOINTED PUBLIC OFFICIALS AND EMPLOYEES, INCLUDING THOSE OF GOVERNMENT-OWNE D AND -CONTROLLED CORPORATIONS (GOCCs), AND THEIR SPOUSES FROM ENTERING, PLAYING AND PATRONIZING CASINOS AND OTHER SIMILAR ESTABLISHMENTS, PROVIDING PENALTIES FOR VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Decency in Public Service Act of 2001.\" All public officials and employees, including those of government-owne d and controlled corporations (GOCCs), and their spouses, regardless of rank, designation, and status of employment, are hereby prohibited from entering, playing and/or patronizing casinos and other similar establishments whether or not operated by the Philippine Amusement and Gaming Corporation: Provided, however, an exemption to the prohibition for entry shall be provided to publicofficials and/or employees who are conducting official and work-related functions such as, but not limited to the following: (a) police matters; (b) work-related activities for those who are officials and employees of GOCCs; (c) conduct of investigattions and query; and (d) other official functions that may be deemed necessary, Provided, That a written directive to that effect would suffice the entry into the casino. Provided, further, an exemption to the prohibition on entry shall be afforded t"

