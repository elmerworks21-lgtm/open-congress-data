congress_website_title = "AN ACT PROVIDING FOR A STAGGERED WORKING HOUR SCHEME IN THE PRIVATE SECTOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Any provisions of law to the contrary notwithstanding , the normal hours of work of employees in the private sector may exceed eight (8) hours a day but shall not exceed forty (40) hours a week. > Work performed by employees beyond forty (40) hoursin a week shall be paid an additional compensation equivalent to its regular hourly rate plus an additional twenty-five percent (25%) thereof. Work performed on a holiday or rest day shall be paid an additional compensation equivalent to the hourly rate on a holiday or rest day plus at least thirty percent (30%) thereof."
