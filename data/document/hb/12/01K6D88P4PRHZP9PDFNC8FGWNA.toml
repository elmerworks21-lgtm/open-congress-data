congress_website_title = "AN ACT PROVIDING FOR CORPORATE ACCOUNTABILITY, FIXING THE PENALTIES FOR ANY VIOLATION THEREOF, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Corporate Reform Act of 2002.\" This bill seeks to regulate corporate abuses by providing among others: (1) Banning of accounting firms from providing most consulting services to companies they are auditing; (2) No registered public accounting firmshall provide audit services to an issuer if the lead audit partner or the audit partner responsible for reviewing audit, has performed audit services for that issuer in each of five (5) previous fiscal years of that issuer; (3) Prohibits any issuerto extend or maintain credit, in a form of a personal loan to or for any director or executive officer of publicly listed companies; and (4) Destruction, alteration, or falsification of records in investigations and bankruptcy is punishable with up tto 20 years."
