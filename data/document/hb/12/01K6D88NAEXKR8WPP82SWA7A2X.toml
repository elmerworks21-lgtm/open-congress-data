congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA FOR SOCIAL WORKERS"
congress_website_abstract = "The State shall promote and improve the social and economic well-being of social workers, their living and working conditions, and terms of employment. It shall develop their skills and capabilities to make them more responsive to the needs and problems of their clients, and better equipped in delivering social services and programs. The State shall likewise encourage those with proper qualifications and excellent abilities to remain in social development work in both government and nongovernmental service."
