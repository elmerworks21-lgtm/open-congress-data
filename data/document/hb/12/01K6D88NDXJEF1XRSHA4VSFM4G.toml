congress_website_title = "AN ACT TO INTEGRATE INFORMATION TECHNOLOGY EDUCATION INTO THE PUBLIC ELEMENTARY AND SECONDARY CURRICULA AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "In the Philippines, computers are already prevalent in the working place. If our youth are to be fully equipped to face the business world confidently and with a bright outlook to the future, they must, at the very least, be computer-litera te. Graduates who are computer illiterate often find themselves at a disadvantage when faced with their computer-litera te counterparts. Being knowledgeable on computers can make them competitive and responsive in the job market."
