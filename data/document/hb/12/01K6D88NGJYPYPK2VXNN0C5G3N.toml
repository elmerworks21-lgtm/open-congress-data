congress_website_title = "AN ACT BANNING THE ENTRY, SALE, PROCESSING, FIELD TESTING AND RELEASE OF PRODUCTS CONSISTING OF, CONTAINING OR DERIVED FROM GENETICALLY MODIFIED ORGANISMS (GMOs) INTO AND WITHIN THE COUNTRY AND IMPOSING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "\"GMO Prohibition Act of 2000.\" Rationale: We are not a nation of guinea pigs. But the entry into the country of genetically engineered crops and food products with genetically modified organisms (GMOs) may just as well make us one. We have yet to determine the risks and hazards of biotechnology to health and the environment and until then it is incumbent upon government to impose measures that would safeguard our people's interests and welfare."

