congress_website_title = "AN ACT TO INSTITUTE POLICIES TO ELIMINATE THE TRAFFICKING IN PERSONS ESPECIALLY WOMEN AND MINORS, ESTABLISHING THE NECESSARY INSTITUTIONAL MECHANISMS FOR THE PROTECTION AND SUPPORT OF TRAFFICKED PERSONS, PROVIDING PENALTIES FOR ITS VIOLATIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Trafficki ng Act of 2001.\" With this proposed measure, special recognition is given to the vulnerablity of women and minors and it shall afford special protection to them.> Specific measures will be instituted, not only to support trafficked persons, especially women and minors, but more importantly, to mitigate pressures for involuntary migration and servitude of persons especially women and minors."
