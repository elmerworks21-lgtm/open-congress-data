congress_website_title = "AN ACT CREATING THE NATIONAL WATER REGULATORY COMMISSION PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Water Regulatory Act of 2002.\" Rationale: Water is considered as one of the primary needs of the society. The state of a country's water resources directly affects the health and well-being of the population, food production and the industrializati on process. Water resources must then be protected and efficiently managed in order to sustain the limited supply. > This bill seeks to create a government agency that will be tasked to formulate national policies on water resource management, regulation, operation, utilization, planning and conservation."
