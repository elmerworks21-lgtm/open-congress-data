congress_website_title = "AN ACT DEFINING DOMESTIC VIOLENCE, PROVIDING PROTECTION MEASURES AND PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Domestic Violence Act.\" Rationale: It has been argued that marriage renders women even more vulnerable to violence, in this instance from their own husbands. Wife assault accounts for about 25 percent of violent crimes in the United States, while one in seven wives in the United Kingdom has been raped by her spouse. A United Nations study recently concluded that \"physical attack is often accompanied by sexual violence and rape, the psychological effects of which are perhaps more seriousthan rape by a stranger given the breach of trust that such conduct involves. > In the Philippines, the 1,000 cases of family violence from 1994 to the first quarter of 1996 studied by the University of the Philippines Center for Women's Studies, wommen and girls constitute ninety eight percent (98%) of the survivors. In over half of the cases, the assailants of the abused women are their partners and spouses. Other female perpetrators of violence are the victim's father, uncle , stepfather, cou"
