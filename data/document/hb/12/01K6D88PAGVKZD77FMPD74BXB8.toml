congress_website_title = "AN ACT PROVIDING FOR A SECURED AND SEPARATE PRISON CELL FOR FEMALE PRISONERS IN EVERY DISTRICT, CITY AND MUNICPAL JAIL, AMENDING FOR THE PURPOSE SECTION 63 OF REPUBLIC ACT NO. 6975"
congress_website_abstract = "National and international human rights organizations and the media have reported several cases of rape and sexual harassment of female prisoners by male prisoners. The measure seeks to provide for secured, clean, safe and sanitary and separate cells for female prisoners in every district, city and municipality jail all over the country. This would safeguard female prisoners from possible crimes or abuses which may be committed while they are in custody."
