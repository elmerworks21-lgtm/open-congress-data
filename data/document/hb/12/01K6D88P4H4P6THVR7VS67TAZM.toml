congress_website_title = "AN ACT AMENDING SECTION 3, SUBPARAGRAPH (b) OF REPUBLIC ACT NO. 9160, OTHERWISE KNOWN AS THE `ANTI-MONEY LAUNDERING ACT OF 2001'"
congress_website_abstract = "This bill seeks to lower the amount of covered transaction or transactions on bank accounts to be investigated to conform with international standards, with the end in view of delisting the Philippines from the FINANCIAL ACTION TASK FORCE (FATF) watch list of countries who failed to implement controls to restrain money laundering by criminal syndicates."
