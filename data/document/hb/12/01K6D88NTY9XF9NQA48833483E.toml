congress_website_title = "AN ACT AMENDING SECTION 31 OF REPUBLIC ACT NO. 6770, OTHERWISE KNOWN AS `THE OMBUDSMAN ACT OF 1989', AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Section 31 of Republic Act No. 6770 is hereby amended to read as follows: \"Section 31. Designation of Investigators and Prosecutors. The Ombudsman may utilize the personnel of his office and/or designate any fiscal, state, prosecutor, or lawyer inthe government service to act as special investigator or prosecutor to assist in the investigation and prosecution of certain cases. THE OMBUDSMAN MAY ALSO DEPUTIZE LAWYERS IN PRIVATE PRACTICE, FREE OF CHARGE, TO PROSECUTE OR ASSIST IN THE PROSECUTION OF CERTAIN CASES. Those designated or deputized to assist him as herein provided shall be under his supervision and control. >It is urgent and imperative that if we are to win the war against corruption and erring public officials, the prosecutoriaal arm of the State - the Ombudsman - be reinforced by authorizing the deputization of private lawyers as prosecutors under the direct supervision and control of the Ombudsman."
