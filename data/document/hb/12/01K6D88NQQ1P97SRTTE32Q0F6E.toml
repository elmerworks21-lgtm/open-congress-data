congress_website_title = "AN ACT MANDATING THE ESTABLISHMENT OF A FACILITY FOR NON-SCHOOL AGE CHILDREN IN PRIVATE COMPANIES EMPLOYING AT LEAST 100 WOMEN WORKERS AND OTHER PURPOSES"
congress_website_abstract = "\"Mother-Child Friendly Facility Act of 2002\". The State shall mandate every private company employing at least 100 women to put up a drop-in facility for non-school age children in the work place to ensure proper care of small children while their mothers are disposing of their professional duties in the companies."
