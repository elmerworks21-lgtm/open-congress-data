congress_website_title = "AN ACT AUTHORIZING THE BANGKO SENTRAL NG PILIPINAS (BSP) AND PHILIPPINE DEPOSIT INSURANCE COMPANY (PDIC) TO LOOK INTO DEPOSITS OF ANY BANKING INSTITUTION TO PREVENT, DETECT, PROSECUTE AND PUNISH MONEY LAUNDERING AND SIMILARLY PROTECT THE FILIPINO DEPOSITORS FROM ANY ILLEGAL BANKING ACTIVITIES WHICH LEAD TO THE CLOSURE OF BANKS THEREBY AMENDING REPUBLIC ACT NO. 1405 AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to amend Republic Act 1405 or the Bank Secrecy Law. It allows examiners only from the BSP, PDIC, to look into records of depositors and transactions of banks not only to ensure that these banks are in healthy condition, but most importantly tnat no laundered money is deposited."
