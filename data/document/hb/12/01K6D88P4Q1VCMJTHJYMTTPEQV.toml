congress_website_abstract = "\"Housing, Livelihood and Technology-Rela ted Loan Condonation Act.\" This bill provides that: (a) All unpaid penalties on housing, LIVELIHOOD AND TECHNOLOGY loans from any of the government institutions and agencies involved in the National Shelter Program, LIVELIHOOD AND TECHNOLOGY PROGRAMS of the Government, are hereby condoned: Provided, that all due and demandable arrearages composed of the principal and interest are restructured and paid within remaining period of loan; (2) In the event that a borrower is able to pay only part of his/her due and demandable arrearages, only the penalties corresponding to the portion paod shall be condoned; (c) A borrower must not have availed of any previous condonation program from any government instiitution or agency involved in the National Shelter Program, LIVELIHOOD AND TECHNOLOGY PROGRAMS; and (d) The corresponding penalties due to the funders of the National Home Mortgage Finance Corproation (NHMFC) on all delinquent accounts under its mana"
