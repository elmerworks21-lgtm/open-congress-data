congress_website_title = "AN ACT PROVIDING THAT BRAIN TUMOR OR BRAIN CANCER BE CONSIDERED AS AN OCCUPATIONAL DISEASE"
congress_website_abstract = "Brain tumor or brain cancer contracted by an employee in the course of or during his employment shall be considred an occupational disease for purpose of securing disability/pens ion benefit and medical or related benefits: Provided, that for the sickness and the resulting disability or death to be compensable, proof must be shown that the risk of contracting the same is brought about or increased by the nature of the employment or by working conditions. > Any doubt as to the compensability ofthe brain tumor or brain cancer so contracted by the employee during the course of his employment shall be resolved in his favor."
