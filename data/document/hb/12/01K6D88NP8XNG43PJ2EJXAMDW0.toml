congress_website_title = "AN ACT GRANTING COMPULSORY COVERAGE TO ACCREDITED BARANGAY HEALTH WORKERS IN THE NATIONAL HEALTH INSURANCE PROGRAM, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 7883, AND FOR OTHER PURPOSES"
congress_website_abstract = "g) PHILHEALTH Compulsory Coverage--All barangay health workers and their dependents shall be enrolled in the National Health Insurance Program for them to receive and avail of an adequate package of personal health services that must include in-patient hospital care, out-patient care, emergency and transfer services, and also other supplementary health benefits as may be defined by the Philippine Health Insurance Corporation (PHIC) and the local government unit (LGU) where they render services.> The needed premium contributions and thereafter, the standard monthly contributions, shall be borned equally by the national government and the LGU concerned, such that upon the passage of this Act, the barangay health workers and their dependentts are automatically entitled to the full employment and availment of essential health services as contained in the National Health Insurance Act (R.A. 7875). Such cost-sharing scheme may be revised which may be made contingent on the LGU's financial"

