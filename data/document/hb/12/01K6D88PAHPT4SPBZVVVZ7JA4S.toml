congress_website_title = "AN ACT TO UPGRADE OF POSITION TITLE AND SALARY GRADE OF STENOGRAPHIC REPORTER II (SG 6) AND STENOGRAPHIC REPORTER III (SG 11) TO STENOGRAPHIC REPORTER IV (SG 14), APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The stenographic reporters in the National Labor Relations Commission (NLRC) perform substantially equal work to those in the judiciary who hold the position of Stenographic Reporter IV (SG 14). Furthermore, the number of cases being handled by the NLRC proper and the Regional Arbitration Branches have risen thereby resulting in the steady increase in the workload of the Commission's stenographic reporters. This bill seeks to upgrade the position title and salary grade of Stenographic Reporter II (SG 6) to Stenographic Reporter III (SG 11) to Stenographic Reporter IV (SG 14)."

