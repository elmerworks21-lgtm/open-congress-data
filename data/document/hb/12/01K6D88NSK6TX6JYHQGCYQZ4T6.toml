congress_website_title = "AN ACT PROHIBITING THE IMPOSITION OF OR EXACTION OF ANY FEE FOR THE USE OF PARKING SPACES AND FACILITIES LOCATED WITHIN SHOPPING MALLS, HOTELS AND SIMILAR BUSINESS AND/OR COMMERCIAL ESTABLISHMENTS AND PRESCRIBING PENALTIES THEREFOR"
congress_website_abstract = "Rationale: Of late however, it has been observed that malls, hotels and similar establishments have been charging exhorbitant parking fees. Most, according to complaints, apart from charging a basic parking fee still charge additional parking feesby the hour after a three (3) hours' lapse. Hence, the profits sourced from these parking fees are not just token but very substatntial. As a matter of fact, these parking spaces have already become a separate business apart from the main business offered by owners of shopping malls, hotels and similar commercial centers."
