congress_website_title = "AN ACT DECLARING THE ABACA AS THE PHILIPPINE NATIONAL FIBER"
congress_website_abstract = "Rationale: Abaca, scientifically known as Musa Textilis Nee, is endemic to the Philippines whose warm, wet climate and volcanic soild are particularly suited to its cultivation. The crop has been grown in the Philippines for centuries and was knownto the Filipinos long before the Spanish occuption. Abaca was one of only two export commodities which contributed to an sustained the expansion of the Philippine economy in the nineteenth century, the other being sugar.> Philippine abaca is part ofour history and cultural heritage. It has sustained the domestic economy during the struggle years of our country and eventually has helped make the Philippines known in the international market. Its potential contribution in the conversion of forestt resources cannot be underestimated. There is no other natural fiber in the world today that could come close to the superior and versatile qualities of the abaca, and it is with pride that we should recognize and uphold the importance of this truly"

