congress_website_title = "AN ACT REPEALING THE AUTOMATIC APPROPRIATION FOR PUBLIC DEBT, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE REVISED ADMINISTRATIVE CODE OF 1987 AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The national government debt service is a continuing burdern to the Filipino people, which remains to have the biggest slice of the national budget. Our huge debt is not a sole obligation of the government, but in efffect, a burden shouldered by the people gravely affected by the shifting of budgetary priorities and expenditues for the much needed social services to the payment of interest and principal amortization for our enormous debt. > In the interest of the Filipino people, this proposed measure seeks to delete the provision on automatic appropriation for debt service provided under Section 26, Chapter 4, Book VI of EO 292 otherwise known as the Revised Administrative Code of 1987."

