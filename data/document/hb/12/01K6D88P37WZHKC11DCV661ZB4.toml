congress_website_title = "AN ACT CREATING THE NATIONAL COMMISSION ON MUSLIM FILIPINOS DEFINING ITS POWERS, FUNCTIONS AND RESPONSIBILITIE S AND APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to create the National Commission on Muslim Filipino, an independent, autonomous body that will replace and take over the functions of the Office of Muslim Affairs (OMA). This Commission shall be subject to existing rules, policies and regulations. Its policies shall be both local and national affairs involving Muslim Filipinos, which includes the implementation of economic, educational, cultural, and infrastructure programs for Muslim Filipino communities."

