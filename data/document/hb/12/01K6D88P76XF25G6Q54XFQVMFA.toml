congress_website_title = "AN ACT AMENDING SECTION 109, CHAPTER I, TITLE IV OF PRESIDENTIAL DECREE NO. 1158, AS AMENDED, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE, AND FOR OTHER PURPOSES THEREOF(RE: VAT EXEMPTION TO MOTION PICTURES AND STAGE ARTISTS AND RELATED PERSONNEL)"
congress_website_abstract = "Section 109 of PD 1158, otherwise known as the National Internal Revenue Code is hereby amended by exempting the services rendered by actors and actresses, directors, non-acting contractual workers and other individuals employed on contractual basisin motion pictures, television shows, state theaters, musicals, concerts, live performances and other performing arts from the imposition of 10% Value Added Tax (VAT)."
