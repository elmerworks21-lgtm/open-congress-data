congress_website_title = "AN ACT GRANTING TAX INCENTIVES TO BROADCAST AND PRINT MEDIA DEVOTING AIR TIME AND SPACE TO EDUCATION AS WELL AS TO SPONSORS SUPPORTING SUCH PROGRAMS AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Congnizant of the problem being encountered by the media industry and recognizing the importance of media to the present educational program, this bill grants tax incentives to media programs and publications, as well as to their respective advertisers and sponsors, with educational thrust. It is hoped that the measures contained in this bill will alleviate the economic plight of the media industry as a whole and shall become an effective tool in the success of the national educational program."

