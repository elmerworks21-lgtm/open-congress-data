congress_website_title = "AN ACT MANDATING THE ESTABLISHMENT OF A PROGRAM OF EDUCATION DESIGNED TO HELP ALL MEMBERS OF THE COMMUNITY OF AN EDUCATIONAL INSTITUTION AVOID INVOLVEMENT WITH ILLEGAL DRUGS"
congress_website_abstract = "This bill seeks to institutionaliz e a community based program as a safeguard against the onslaught of drugs abuse that if unabated might become not only a serious social problem but even a threat to national security given the more contemporary backdrop. In this regard, educational institutions shall establish drug counseling services and whenever possible, rehabilitation services as well as with members of the immediate community as beneficiaries."
