congress_website_title = "AN ACT TO PROVIDE PROTECTION TO NEW PLANT VARIETIES, ESTABLISHING A NATIONAL PLANT VARIETY PROTECTION BOARD AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to provide protection to new plant varieties, thru the creation of a National Plant Variety Protection Board. The right of breeders to protect and secure exclusive rights with respect to their new plant variety must be thoroughly upheld and promoted, especially if such will redounto the public good."
