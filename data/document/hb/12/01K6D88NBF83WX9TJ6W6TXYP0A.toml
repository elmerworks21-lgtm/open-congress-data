congress_website_title = "AN ACT CREATING THE FILM DEVELOPMENT AND INCENTIVES BOARD, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The State shall promote and support the development and growth of the local film industry as a medium for the upliftment of the people's aesthetic, cultural and social values and for the better understanding and appreciation of the Filipino identity. > To achieve this end, the State shall formulate and implement policies and programs to upgrade the art and craft of film making and encourage the production of films for commercial purposes, intended for public entertainment, that seekto enhance the quality of life, examine the human condition and contribute to the dignity and nobility of the human spirit."
