congress_website_title = "AN ACT EXEMPTING FROM TAX ALL ALLOWANCES AND BENEFITS GRANTED TO PUBLIC AND PRIVATE SCHOOL TEACHERS, INCLUDING THE FACULTY OF PUBLIC AND PRIVATE TERTIARY EDUCATION INSTITUTIONS"
congress_website_abstract = "\"The Public and Private Schoolteachers' Tax Incentives Act.\" All allowances and benefits granted to public and private schoolteachers, including the faculty of public and private tertiary education institutions, shall not be included in the computation of gross income and shall be exempt from taxation under Title III, Chapter VI of Republic Act No. 8424, otherwise known as the \"Tax Reform Act of 1997\"."
