congress_website_title = "AN ACT INSTITUTIONALIZ ING REFORMS IN LAND ADMINISTRATION, CREATING FOR THE PURPOSE THE LAND ADMINISTRATION AUTHORITY AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Land Administration Reform Act of 2003\". The performance of government agencies in undertaking land surveys, mapping, classification, disposition and registration is hampered by fundamental legal and institutional defects in both the structureand operations of the land administration system. These defects have lead to inefficiencies and delays in the disposition and titling of alienable and disposable lands, inaccurate and incomplete land records, and duplicate and fake titles. This billproposes to consolidate the land administration powers and functions currently dispersed to the Department of Justice's Land Administration Authority and Register of Deeds; and the Department of Environment and Natural Resources' Land Management Bureeau, Land Management Services, National Mapping and Resource Information Authority and the CARP Secretariat, with the creation of the Land Administration Authority (LAA). The LAA shall be the primary agency responsible for land administration and pub"

