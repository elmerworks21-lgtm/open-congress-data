congress_website_title = "AN ACT PROMOTING AND REGULATING THE OPERATION OF CABLE TELEVISION IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Cable Television Act of 2001\". This bill provides incentives and support mechanisms that will promote competition in the field and allow a better-leveled comparative growth of the different players in the enterprise. The proposed legislation also seeks to rationalize government regulation of the industry be clearly delineating the powers of the government agency mandated by law."

