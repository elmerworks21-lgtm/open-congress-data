congress_website_title = "AN ACT MANDATING THE REPRESENTATION OF COOPERATIVES IN THE BOARD OF DIRECTORS OF THE LAND BANK OF THE PHILIPPINES, AMENDING THEREFOR REPUBLIC ACT NO. 3844, AS AMENDED"
congress_website_abstract = "This bill seeks to ensure the REPRESENTATION of COOPERATIVES in the Board of the Land Bank of the Philippines. This bill, likewise, mandates the LBP President to appoint the representative of the Cooperative sector from the nominees of a representative assembly of NATIONAL FEDERATIONS and UNIONS OF COOPERATIVES duly recognized by the Cooperative Development Authority."

