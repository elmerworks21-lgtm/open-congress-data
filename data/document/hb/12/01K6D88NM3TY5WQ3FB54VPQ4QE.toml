congress_website_title = "AN ACT PROVIDING FOR THE STRENGTHENING OF THE DAY CARE EDUCATION BY CREATING ITEM FOR A DAY CARE CENTER TEACHER, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The day care center teacher shall be responsible for the year round implementation of the projects and programs of the Department of Social Welfare and Development (DSWD). Furthermore, they shall initiate and plan such other programs as they may deem necessary for the advancement of quality day care education in their respective barangays, government agencies and LGUs and shall maintain close working relationship with the barangay captains, agency and LGUs and shall maintain close working relationship with the barangay captains, agency heads and local chief executives/muni cipality/city social welfare officer."

