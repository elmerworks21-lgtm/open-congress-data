congress_website_title = "AN ACT PROVIDING FOR MONTHLY ALLOWANCES FOR THE MEMBERS OF LUPONG TAGAPAMAYAPA AND THE PANGKAT NG TAGAPAGKASUNDO, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "The Members of the Lupon and the Pangkat have greatly contributed to the promotion of peace, harmony and solidarity in the community even if their membership is voluntary and without compensation. The fact that the Members of the Lupon and the Pangkat have been instrumental in unclogging court dockets by settling a good number of cases referred to them in their level cannot be overemphasized. They have likewise given the government tremendous savings and, the monthly incentives that may be given to them is only just and fair."

