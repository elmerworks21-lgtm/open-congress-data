congress_website_title = "AN ACT RESTRUCTURING THE OIL INDUSTRY BY ESTABLISHING A NATIONAL OIL EXCHANGE, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to establish a national oil exchange (hereinafter referred to as \"OilEx\") that will bid (spot market) and/or negotiate (term contracts) our country's total requirement of refined petroleum products (RPPs) such as gasoline, diesel, kerosene, LPG, etc. Said bidding and/or negotiation shall be open to all the oil refineries and traders in the world."
