congress_website_title = "AN ACT ESTABLISHING A CRISIS AND REHABILITATION CENTER FOR VICTIMS OF SEXUAL ABUSE"
congress_website_abstract = "Rationale: Victims of sexual abuses need more help from professionals and experts to contain the trauma they suffered. Campaigns and mass eduction have to be implemented to raise the awareness of the people and involve the community in the prevention and treatment of victims of rape and other sexually related abuse. Social workers, psychologists, psychiatrists, and other medical professionals have to be mobilized in the rehabilitation of victims and importantly in the prevention of sexual abuses committed against women."
