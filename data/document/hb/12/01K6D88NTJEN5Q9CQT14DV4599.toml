congress_website_title = "AN ACT PRESCRIBING THE MANNER OF ELECTION OF THE MEMBERS OF THE BOARD OF DIRECTORS OF THE PHILIPPINE VETERANS BANK AND AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NUMBERED THIRTY-FIVE HUNDRED AND EIGHTEEN AND REPUBLIC ACT NUMBERED SEVENTY-ONE HUNDRED AND SIXTY-NINE"
congress_website_abstract = "This bill addresses the issue concerning the ELECTION of the members of the Board of Directors of the PVB. The Board of Trustees of World War II hereby ceases to have authority to vote for the issued but undelivered shares of stock of the Philippine Veterans Bank. The undelivered shares shall be represented in the regional elections through the following manner: a) Prior to the regional elections, the Bank shall already identify the number of undelivered shares per each of the thirteen (13) regions. A stockholder who is present and voting in a regional election gets additional voting points according to an equal sharing of the number of undelivered shares in that region. To illustrate, if REgion VIII has 1,000 undelivered shares and 10,,000 stockholders who are present to vote, each of these 10,000 stockholders will be entitled to .10 voting point to be added to the candidate each voting stockholder elects. The responsibility of conducting the regional elections for the Board of D"
