congress_website_title = "AN ACT PROVIDING FOR THE ALLOCATION OF THE DEPARTMENT OF EDUCATION SCHOOL BUILDING PROGRAM BUDGET, ENSURING BUDGET PRIORITY FOR THE CONSTRUCTION AND MAINTENANCE OF SCHOOL BUILDINGS AND CLASSROOMS, REPEALING REPUBLIC ACT NO. 7880, OTHERWISE KNOWN AS THE FAIR AND EQUITABLE ACCESS TO EDUCATION ACT AND FOR OTHER PURPOSES"
congress_website_abstract = "The construction and maintenance of school buildings, classrooms and other facilities are essential to ensure a quality education. However, most of our elementary and secondary public schools have inadequate classrooms. The present budget allocation of the Department of Education (DepEd) including the School Building Program is not sufficient to cover the cost of much needed construction, repairs, rehabilitation and maintenance of school buildings and classrooms nationwide. This bill proposes to allocate the budget of the School Building Program to each legislative district according to its classroom shortage as determined by the DepEd's Division Superintendent and District Supervisors. It further proposes that the budget allocation for the construction of school buildings and classrooms be determined by the population of enrolled students in the elementary and secondary levels to be divided by forty (40)."

