congress_website_title = "AN ACT PROVIDING INCENTIVES TO PHYSICIANS TO ESTABLISH THEMSELVES OR RENDER THEIR MEDICAL PRACTICES IN DOCTORLESS AREAS OF THE COUNTRY'S RURAL COMMUNITIES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Rural Health Practitioners' Incentive Act\". The INCENTIVES proposed to be granted to the qualified physicians who shall serve in doctorless areas are: (1) TAx-free stipend for the first 5 years of service; (2) Medical education leave; (3) Tax-freeimportation of therapeutic and diagnostic equipment; (4) Entitlement to a DBP loan for setling up the clinic/hospital ; etc."

