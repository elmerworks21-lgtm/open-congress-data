congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED SIX THOUSAND SIX HUNDRED SEVENTY-FIVE, OTHERWISE KNOWN AS THE GENERICS ACT OF 1988, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill therefore seeks to amend Republic Act 6675 which is aimed at ensuring stronger deterrence against dubious profit-oriented pharmaceutical cumpanies and distributors which, like leeches, will continuously suck blood to many of the poor Filipinos. To protect the public from these elements in the pharmaceutical industry, this proposed legislation attempts to add the following provisions: 1) definition and requirements for quality control standards; and 2) stiffer provision on quality, manufacturer's identity and responsibility. In short this bill, on one hand, intends to facilitate the protection of consumers in so far as pharmaceutical products are concerned - to protect citizens from the harmful effects of fake or substandard druggs and medicines. Thus, provision are included for quality control standard."

