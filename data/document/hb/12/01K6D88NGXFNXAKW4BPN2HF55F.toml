congress_website_title = "AN ACT INSTITUTIONALIZ ING THE BARANGAY INTEGRATED DEVELOPMENT APPROACH FOR NUTRITION IMPROVEMENT (BIDANI) OF THE RURAL POOR AS A NETWORK PROGRAM OF PARTICIPATING STATE COLLEGES AND UNIVERSITIES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: It is hereby declared the policy of the State to recognize nutrition as a basic human right, just as the rights to health and to life are. Toward this end, the State shall promote vigorously the importance of nutrition as a public good and public concern that can be achieved only through multisectoral efforts and democratic process. It shall work towards the provision of the nutritional needs of the poor sector of the Filipino society who are deprived of said right. Further, the State shall give utmost support to programs and projects that are responsive to the nutritional needs of the people."

