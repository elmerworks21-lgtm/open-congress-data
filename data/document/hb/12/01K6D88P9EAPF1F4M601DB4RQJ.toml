congress_website_title = "AN ACT REGULATING THE PRACTICE OF DERMATOLOGY IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Philippine Dermatology Act of 2003\\\". Unqualified and untrained individuals pretending to be experts in the field of dermatology have sprouted in the country. This has led to the proliferation of cases of malpractice leading to disfigurement, injury and even death. To elevate the quality of dermatological care available to Filipinos, the bill seeks to regulate the practice of dermatology as a profession and to penalize the illegal practice of dermatology by incompetent individuals."
