congress_website_title = "AN ACT PROVIDING FOR THE EXTENSION OF THE TERM OF FRANCHISE OF THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION FROM TWENTY-FIVE (25) TO FIFTY (50) YEARS, AMENDING FOR THE PURPOSE SECTION 10 OF PRESIDENTIAL DECREE NO. 1869, OTHERWISE KNOWN AS PAGCORCHARTER"
congress_website_abstract = "Subject to the terms and conditions established in this Decree, the Corporation is hereby granted for a period of [twenty-five (25)] FIFTY (50) years [, renewable for another twenty-five (25) years,] the rights, privileges and authority to operate and maintain gambling casinos, clubs and other recreation or amusement places, sports, gaming pools, i.e. basketball, football, lotteries, etc. whether on land or sea, within the territorial jurisdiction of the Republic of the Philippines."
