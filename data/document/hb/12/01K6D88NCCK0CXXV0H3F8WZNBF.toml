congress_website_title = "AN ACT TO PROVIDE MAXIMUM EMPLOYMENT IN PUBLIC ECONOMIC DEVELOPMENT PROJECTS, AND FOR OTHER PURPOSES"
congress_website_abstract = "In order to provide employment opportunities around the country, the Legislative ad Executive Departments shall jointly formulate a public employment program. However, to ensure that all districts and sectors shall benefit for the public employmentprogram, the identificaiton of the projects shall be determined by the members of the House of Representatives , and its execution shall be in coordination with the government agency concerned. Members of the Senate shall also propose their own employment programs and executed in coordination with the government agency concerned in furtherance of the objectives of this Act."

