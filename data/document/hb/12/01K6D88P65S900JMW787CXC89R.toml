congress_website_title = "AN ACT PROFESSIONALIZI NG THE BARANGAY TANOD BRIGADES BY UPGRADING THEIR BENEFITS AND INCENTIVES AND MANDATING TERMS TO ENHANCE THEIR FUNCTIONAL EFFICIENCY"
congress_website_abstract = "This bill seeks to professionalize the Barangay Tanod brigades by providing legal standards to enhance their functional efficiency. Every Barangay Tanod shall be entitled to: (1) minimum of Five Hundred Pesos (P500.00) monthly allowance; (2) Christmas bonus; (3) monthly hazard pay; (4) free legal services from government lawyers; (5) insurance coverage; and (6) preference in the availment of and/or membership in barangay livelihood and development projects."

