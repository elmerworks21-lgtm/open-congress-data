congress_website_title = "AN ACT EXTENDING TAX EXEMPTION, PRIVILEGES AND ASSISTANCE TO RURAL ELECTRIC COOPERATIVES AS A MATTER OF STATE POLICY TO AID THE PROGRAM IMPLEMENTATION ON TOTAL ELECTRIFICATION"
congress_website_abstract = "The total electrification of the country has been placed on the shoulders of electric cooperatives (ECs). The collection of franchise, business, property, value-added and other forms of taxes and imposts on ECs by the Bureau of Internal Revenue (BIR) and some loval government units will deplete the ECs scarce resources rendering it incapable of performing its missionary role. Taxing ECs of whatever kind is indirectly taxing the poor rural electric cooperative consumers. This bill proposes toextend the tax exemption and privileges granted to ECS from a period of thirty years to a period of fifty years from the date of cooperative organization."
