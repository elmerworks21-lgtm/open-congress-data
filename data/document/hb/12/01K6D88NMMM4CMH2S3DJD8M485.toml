congress_website_title = "AN ACT ESTABLISHING AND PROVIDING FOR FREE COLLEGE EDUCATION IN INFORMATION AND COMMUNICATIONS TECHNOLOGY AND OTHER PURPOSES"
congress_website_abstract = "The system of Free College Educaiton as provided in this Act, shall commence in the School Year following approval of this Act. Qualified beneficiaries intending to enroll or already enrolled in Information and Communications Technology (ICT) courseofferings in state colleges and universities shall be free from payment of tuition and other school fees and shall be entitled to such other incentives or subsidies as may be granted in accordance with such rules and regulations to be promulgated tocarry out the provisions of this Act. Provided, that nothing in this Act shall cause or authorize the reduction or removal of any benefit which the national or local government may be granted to the students prior to the enactment of this Act."
