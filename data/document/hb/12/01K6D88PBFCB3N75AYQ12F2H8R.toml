congress_website_title = "AN ACT AMENDING SECTION 261 OF BATAS PAMBANSA BLG. 881, OTHERWISE EKNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "It was the practice in the past elections to demand money or any other valuable consideration from candidates running for public office, from political parties, or persons acting in their behalf. This bill, if enacted into law, makes it an election offense for any person or group of person to ask for or demand any amount of money or any other valuable consideration by whatever means, from any political party, candidate or any person acting in their behalf, in the guise of issuing so-called \\\"permits to campaign\\\" and the like, or in the guise of soliciting projects/programs, in exchange for the right to campaign freely anywhere in the country."
