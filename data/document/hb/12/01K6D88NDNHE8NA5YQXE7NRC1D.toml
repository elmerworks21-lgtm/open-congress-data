congress_website_title = "AN ACT PROVIDING FOR AN INCREASED SPECIAL GROUP TERM INSURANCE COVERAGE FOR THE MEMBERS OF THE ARMED FORCES OF THE PHILIPPINES INCLUDING THE MEMBERS OF THE PHILIPPINE NATIONAL POLICE, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 352, AS AMENDED,AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Through a Presidential Decree (PD352) issued by former President Ferdinand Marcos, a Special Group Term Insurance was created for the members of the Armed Forces of the Philippines which was designed to help its members, in the form of wake and burial assistance in the amount of Six Thousand Pesos (P6,000.00). In 1905, by another executive fiat (PD 1965), the amount was raised to Twelve Thousand Pesos (P12,000.00). Admittedly, a militiaman is covered by the compulsory insurance granted by the Government Service Insurance Sytem, the same however, is NOT enough for the sustenance of a grieving widow and her children."
