congress_website_title = "AN ACT PROVIDING FOR THE PROFESSIONALIZATION OF THE BUREAU OF FIRE PROTECTION (BFP) AND THE BUREAU OF JAIL MANAGEMENT AND PENOLOGY (BJMP), PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Bureau of Fire Protection and Bureau of Jail Management and Penology Professionalization Act of 2003\\\". The uniformed personnel of the Bureau of Fire Protection (BFP) and the Bureau of Jail Management and Penology (BJMP), as members of the uniformed service of the government under the Department of the Interior and Local Government, are required to put in the same amount of sacrifice and dedication as their counterparts in the Philippine National Police (PNP) and the Armed Forces of the Philippines (AFP) to carry out their duties to the extent of risking their lives and limbs. The bill seeks to professionalize and restructure the BFP and the BJMP by upgrading the level of qualifications of their uniformed personnel and standardizing their base pay, retirement and other benefits equivalent to those of the PNP and the AFP."
