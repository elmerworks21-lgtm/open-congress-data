congress_website_title = "AN ACT PROVIDING STIFFER PENALTIES FOR INFIDELITY IN THE CUSTODY OF PRISONERS BY PUBLIC OFFICERS, AMENDING FOR THE PURPOSE THE REVISED PENAL CODE"
congress_website_abstract = "The penalties for infidelity in the custody of prisoners by public officers under the Revised Penal Code are light. Some criminals who were apprehended were able to escape from their detention due to carelessness of, or connivance with their custodians or public officers in charge. These situations raise doubts on the justice system of our coutnry and the loss of trust and confidence in the government. It is, therefore, the purpose of this bill to impose STIFFER PENALTIES on public officers forinfidelity in the custody of prisoners."
