congress_website_title = "AN ACT EXPANDING THE PROHIBITED ACTS OF DISCRIMINATION AGAINST WOMEN ON ACCOUNT OF SEX, AMENDING FOR THE PURPOSE ARTICLES 135 AND 137 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "The following shall be considered PROHIBITED ACTS of discrimination against women: 1) Favoring a male employee over a female employee with respect to promotion, ASSIGNMENT, training opportunities, study and scholarship grants solely on account of their sexes; 2) GIVING PREFERENCE TO A MALE EMPLOYEE OVER A FEMALE EMPLOYEE IN THE HIRING PROCESS, WHETHER THROUGH NOTICES, ANNOUNCEMENTS OR ADVERTISEMENTS FOR EMPLOYMENT AND APPRENTICESHIP OR IN THE ACTUAL RECRUITMENT, HIRING OR EMPLOYMENT OF WORKERSWHERE THE PARTICULAR JOB AN BE HANDLED BY A WOMAN; AND 3) FAVORING A MALE EMPLOYEE OVER A FEMALE EMPLOYEE WITH RESPECT TO DISMISSAL OF PERSONNEL OR THE APPLICATION OF THEIR FIRST IN - FIRST OUT OR OTHER RETRENCHMENT POLICY OF THE EMPLOYER; 4) TO DENYY ANY WOMAN THE BENEFITS OF EMPLOYMENT OR OTHER STATUTORY BENEFITS UNDER OUR LAWS BY REASON OF HER SEX."
