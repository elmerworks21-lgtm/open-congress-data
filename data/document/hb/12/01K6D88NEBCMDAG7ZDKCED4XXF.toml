congress_website_title = "AN ACT TO GRANT PUBLIC SCHOOL TEACHERS FREE OF CHARGE X-RAY AND OTHER FORMS OF LABORATORY EXAMINATIONS IN ANY GOVERNMENT AND PRIVATE HOSPITALS DURING THEIR REQUIRED ANNUAL PHYSICAL EXAMINATION AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "X-ray and other forms of laboratory examinations shall be granted to all public schoolteachers in any government and private hospitals. Provided, however, that such privilege shall only be available during the required annual physical examination schedule."

