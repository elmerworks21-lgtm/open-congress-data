congress_website_title = "AN ACT STRENGTHENING THE MEAT INSPECTION SYSTEM OF THE PHILIPPINES, INTEGRATING ALL LAWS, RULES AND REGULATIONS PERTINENT TO MEAT AND MEAT PRODUCT EXPORTS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Meat Inspection Code of the Philippines\\\". Meat and meat products are vital components in the food security program of the country. We must ensure not only an adequate supply of meat and meat products but wwe must also ensure that these are safe and fit for human consumption. Therefore, there is an urgent needto update and strengthen the rules and regulations pertaining to the protection of the health of food animals prior to butchering, the proper and hygienic preparation and preservationof meat and meat products, to strict inspection and marketing of the same. This bill seeks to strengthen and codify the rules and regulations on meat and meat products inspection to ensure their safety and fitness for human consumption."
