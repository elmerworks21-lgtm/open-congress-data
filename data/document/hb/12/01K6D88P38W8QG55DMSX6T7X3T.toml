congress_website_title = "AN ACT CREATING THE SCIENCE AND MATHEMATICS EDUCATION FUND, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Science and mathematics are two important subjects Filipino students must study and if possible, excel in; not only to lodge the Philippines at the helm of global competition in these fields but also for their own personal advancement ascitizens of this country.> This bill seeks to provide for funds to support activities and projects that will assist Filipino students to improve on their science and mathematics skills. The fund will establish a research, development and training trust fund for research, curriculum development and teacher taining in science and mathematics, to be administered and managed by the National Institute for Science and Mathematics Education Development (NISMED) of the University of the Philippines."

