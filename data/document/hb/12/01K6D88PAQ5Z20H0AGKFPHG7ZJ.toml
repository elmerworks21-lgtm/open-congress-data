congress_website_title = "AN ACT PROMOTING ANIMAL HEALTH, PROVIDING MEASURES FOR THE DETECTION, PREVENTION, CONTROL AND ERADICATION OF CERTAIN DISEASES AFFECTING LIVESTOCK AND OTHER ANIMALS, PROVIDING PENALTIES FOR VIOLATION THEREOF, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"Animal Health Code of 2003\\\". The spread of notifiable diseases (food and mouth disease (FMD), hog cholera, newcastle disease) among livestock and other animals threatens food security and the viability of the livestock industry. The bill aims to promote animal health by providing measures for the detection, prevention, control and eradication of diseases affecting livestock and other animals. It provides for the codification of all existing laws, rules and regulations pertaining to the prevention, control and eradication of infectious animal diseases."

