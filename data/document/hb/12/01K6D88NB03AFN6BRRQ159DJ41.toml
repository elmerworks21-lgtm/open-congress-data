congress_website_title = "AN ACT AMENDING R.A. NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE, GIVING MUNICIPALITIES MORE EQUITABLE SHARE OF NATIONAL INTERNAL REVENUE TAXES AND FOR OTHER PURPOSES"
congress_website_abstract = "The Local Government Code of 1991 (Section 287) is amended to read as follows: Each local goverment units shall appropriate in its annual basic budget [no less than twenty percent (20%)] A CERTAIN PERCENTAGE of its annual internal revenue allotmentfor development projects IN ACCORDANCE WITH THE FOLLOWING SCHEDULE: \"WHEN INTERNAL REVENUE ALLOTMENT IS LESS THAN P100,000.00 --- TWENTY PERCENT (20%) MORE THAN P100,000.00 BUT LESS THAN P200,000.00 --- TWENTY-FIVE PERCENT (25%) MORE THAN P200,000.00 BUT LESS THAN P300,000.00 --- THIRTY PERCENT (30%) MORE THAN P300,000.00 --- THIRTY-FIVE PERCENT (35%)"
