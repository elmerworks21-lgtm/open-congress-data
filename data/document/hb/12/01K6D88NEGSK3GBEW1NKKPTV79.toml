congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION AND CONSERVATION OF ALL OBJECTS OF UNDERWATER CULTURAL HERITAGE IN PHILIPPINE WATER"
congress_website_abstract = "This bill aims to protect and preserve our underwater cultural heritage by providing for general requirements for underwater archaeology, exploration, and excavation, the description of the items to be protected, prohibition of certain activities inthe vicinity of a protected item and site, the establishment of a reward system for verified reports, and the imposition of sanction/penalt ies for violations."
