congress_website_title = "AN ACT REQUIRING THE PLANTING OF TREES IN OPEN SPACES OF SUBDIVISION PROJECTS DEVELOPED FOR RESIDENTIAL, INDUSTRIAL OR COMMERCIAL PURPOSE, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Greening Act of 2001.\" Every owner of land subdivided and devleoped for residential, industrial, or comercial purpose shall reserve develop, and maintain at least thirty percent (30%) of the gross area as open space for parks, playgrounds , recreational uses, schools, roads, places of worship, hospitals, health centers, barangay centers, and other similar amenities."
