congress_website_title = "AN ACT AMENDING SECTION 26, CHAPTER 4, BOOK VI OF EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE \"ADMINISTRATIVE CODE OF 1987\""
congress_website_abstract = "This bill seeks to AMEND Section 26 of the Administrative Code of 1987 (EO No. 292) to read as follows: All expenditures for (1) personnel retirement premiums, government service insurace, and other similar fixed SOCIAL SECURITY expenditures [, (2)principal and interest on public debt, (3) national govenment guarantees of obligations which are drawn upon,] are automatically appropriated: Provided, that no obligations shall be incurred or payments made from funds thus automatically appropriatedexcept as issued in the form of regular budgetary allotments.\""

