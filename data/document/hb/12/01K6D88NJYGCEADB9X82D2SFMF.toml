congress_website_title = "AN ACT PROMOTING SMALL BUSINESS LOCATION AND INCUBATOR PROGRAM"
congress_website_abstract = "The proposed measure seels to establish business incubators in strategically viable locations throughout the country, preferably in economic zones or places near academic institutions. Incubators are useful and cost-effective instruments in promoting the survival of new enterprises during their early years of existence by providing a work environment that readily make available business facilities as well as technical and managerial support. Incubators, thus, hasten the transformation of selected, early-stage business with high potential, into self-sufficient , growing and profitable businesses."

