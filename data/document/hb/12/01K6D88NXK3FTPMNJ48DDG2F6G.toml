congress_website_title = "AN ACT AMENDING SECTION 294 OF REPUBLIC ACT NUMBERED SEVEN THOUSAND ONE HUNDRED SIXTY, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "The proceeds from the share of Local Government Units pursuant to this chapter shall be appropriated by their respective Sanggunian to finance local development and livelihood projects; Provided, however, That at least eight percent (80%) of the proceeds derived from development and utilization hydrothermal, geothermal, and other sources of energy shall be applied solely to lower the cost of electricity in the local government unit where such a source of energy is located [.]; PROVIDED, FURTHER, THAT AFTER SATISFYING THE REQUIREMENT FOR LOWERING THE COST OF ELECTRICITY, THE EXCESS SHALL BE APPLIED TO ENVIRONMENTAL PROTECTION, TRADE AND COMMERCE, HOUSING, TOURISM, ENTREPRENUERSHI P, AND CULTURE AND SPORTS; PROVIDED FINALLY, THAT THESE DEVELLOPMENTAL INPUTS SHALL BE DISTRIBUTED EQUITABLY AMONG THE LOCAL GOVERNMENT UNITS OF THE PROVINCE WHERE THE SOURCE OF ENERGY IS LOCATED."

