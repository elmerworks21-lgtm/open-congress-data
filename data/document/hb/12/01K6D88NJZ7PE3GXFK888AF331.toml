congress_website_title = "AN ACT DECLARING AS UNLAWFUL THE TAKING, REMOVING, DESTROYING OR DAMAGING OF ROAD SAFETY DEVICES, PUBLIC UTILITY COMPONENTS AND OTHER INFRASTRUCTURE ACCESSORIES AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "It shall be unlawful for any person to take, remove destroy or damage any road safety device within the road right of way, any public utility component, whether under or above ground, or any other infrastructure accessory constructed by either a government or private entity for the use or safety of the public without authority or consent from the government or private entity that constructed it."

