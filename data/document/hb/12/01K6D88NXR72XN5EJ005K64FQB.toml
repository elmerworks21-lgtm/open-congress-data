congress_website_title = "AN ACT RATIONALIZING THE HIRING OF CASUAL EMPLOYEES IN THE GOVERNMENT, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to provide security of tenure to thousands of government employees who hold casual appointments in the service. They shall not be terminated anytime before the expiration of the contract or within the period for which they are hiredexcept for unsatisfactory conduct or want or capacity. > Casual employees who had served satisfactorily for a continuous period of five years in a particular position shall be automatically included in the plantilla of regular positions."
