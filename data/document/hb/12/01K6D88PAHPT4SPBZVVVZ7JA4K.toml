congress_website_title = "AN ACT PROHIBITING THE APPOINTMENT OF RETIRED GOVERNMENT OFFICIALS, INCLUDING THE MILITARY FOR ANY GOVERNMENT POSITIONS WITHIN FIVE (5) YEARS FROM RETIREMENT"
congress_website_abstract = "The bill seeks to prohibit the appointment or designation of retired government officers or officials to any post or government position, including the military, until after the lapse of five years from the date of retirement of the official concerned. Five years is deemed as sufficient time for the retired public official to rid himself of old habits and don a new mantle committed to public service."

