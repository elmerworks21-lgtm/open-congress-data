congress_website_title = "AN ACT EXEMPTING FROM DOCUMENTARY STAMP TAX THE BORROWING AND LENDING OF SECURITIES UNDER THE AUSPICES OF THE LOCAL STOCK EXCHANGE, AMENDING FOR THE PURPOSE SECTION 180 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "THE BORROWING AND LENDING OF SECURITIES EXECUTED UNDER THE SECURITIES BORROWING AND LENDING PROGRAM OF THE LOCAL STOCK EXCHANGE FOR PURPOSES OF TRADING STRATEGIES OF EITHER THE BORROWER OR LENDER, SHALL BE EXEMPT FROM THE PAYMENT OF THE DOCUMENTARYSTAMP TAX IMPOSED HEREON. FOR PURPOSES OF THIS SECTION, THE BORROWING AND LENDING OF SECURITIES SHALL MEAN THE TRANSFER OF SECURITIES FROM AN INVESTOR'S PORTFOLIO TO A BORROWER OR LENDER WITHOUT A CHANGE IN BENEFICIAL OWNERSHIP OF THE BORROWED SECURITIES AND EXECUTED TO SUPPORT TRADING STRATEGIES OF THE BORROWER OR THE LENDER."
