congress_website_title = "AN ACT PROVIDING FOR THE OMNIBUS AMENDMENTS TO PRESIDENTIAL DECREE NO. 857, OTHERWISE KNOWN AS THE REVISED CHARTER OF THE PHILIPPINE PORTS AUTHORITY (PPA), AS AMENDED, TO RATIONALIZE ITS FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill aims to: (1) elimiante the conflict of interest in the Philippine Ports Authority's regulation of ports by removing the 10% mandated share in cargo handling rate increases; and (2) change the composition and increasing the number of PPA Board Members from nine (9) to eleven (11) to promote greater private sector participation in port policy formulation and implementation."

