congress_website_title = "AN ACT PROVIDING FOR THE PROFESSIONALIZATION OF THE BUREAU OF FIRE PROTECTION (BFP) AND THE BUREAU OF JAIL MANAGEMENT AND PENOLOGY (BJMP)"
congress_website_abstract = "\\\"Bureau of Fire Protection and Bureu of Jail Management and Penology Professionalization Act of 2003\\\". The bill aims to professionalize and restructure the Bureau of Fire Protection (BFP) and the Bureau of Jail Management and Penology (BJMP) by upgrading the qualification standards of their uniformed personnel and place them at par with their counterpart in the Philippine National Police and the Armed Forces of the Philippines. It directs the Department of the Interior and Local Government to design a professionalization and qualifications upgrading program for the uniformed personnel of the BFP and the BJMP."
