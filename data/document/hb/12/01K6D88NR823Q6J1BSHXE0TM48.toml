congress_website_title = "AN ACT REQUIRING GARAGE FACILITIES AS A PREREQUISITE FOR ORIGINAL AND ANNUAL REGISTRATION OF ALL MOTOR VEHICLES AND IMPOSING A TAX OF TEN PERCENT (10%) OF THE PURCHASE PRICE THEREOF IN THE ABSENCE OF SUCH FACILITIES, AMENDING FOR THE PURPOSE THE LAND TRANSPORTATION AND TRAFFIC CODE"
congress_website_abstract = "Rationale: It is the duty of the government to protect both persons and properties from damage hence, it may use its police power to impose measures in order to achieve this objective. In contemplation hereof, this bill is proposed to require all vehicle registrants to have garage facilities for each subject vehicle as a condition for the issuance of registration certificates.> This bill seeks, therefore, to address these concerns: (1) The ever present risk of carnapping and/or car-burglary; and (2) The congestion or clogging up of streets and sidewalks impeding orderly traffic flow and the safety of pedestrian movement."

