congress_website_title = "AN ACT INCREASING THE MAXIMUM DEPOSIT INSURANCE COVERAGE OF ANY DEPOSITOR AND ENCOURAGING INSURED BANKS TO FURTHER INCREASE THE SAME, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 3591, AS AMENDED, OTHERWISE KNOWN AS THE CHARTER OF THE PHILIPPINE INSURANCE DEPOSIT CORPORATION"
congress_website_abstract = "This bill seeks to increase the maximum amount of the insured deposit of any depositor from One Hundred Thousand Pesos (P100,000.00) to Two Hundred Thousand Pesos (P200,000.00). This amount could be further increased by any bank to entice prospective bank depositors and at the same time open widow of opportunities to bank clients to choose the banks with the best offer thus paving the way for competitiveness in the banking industry."
