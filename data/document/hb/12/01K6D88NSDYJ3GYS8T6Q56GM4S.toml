congress_website_title = "AN ACT ESTABLISHING THE PUBLIC ATTORNEY'S OFFICE (PAO) AS AN INDEPENDENT AND AUTONOMOUS OFFICE, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF EXECUTIVE ORDER NO. 292, ENTITLED `ADMINISTRATIVE CODE OF 1987', AND FOR OTHER PURPOSES"
congress_website_abstract = "AMENDMENTS to the Administrative Code of 1987 \"PUBLIC ATTORNEY'S OFFICE are as follows: The Citizens Legal Assistance Office (CLAO) is renamed Public Attorney's Office (PAO). IT SHALL BE AN INDEPENDENT AND AUTONOMOUS OFFICE ATTACHED TO THE DEPARTMENT OF JUSTICE. IT SHALL EXTNED FREE LEGAL ASSISTANCE/REPR ESENTATION TO INDIGENT AND POOR LITIGANTS IN CRIMINAL CASES AND NONCOMMERCIAL CIVIL DISPUTES. Thus, it shall exercise the powers and functions as are now provided by law for the Citizen's LegalAssistance Office or may hereafter be provided by law."
