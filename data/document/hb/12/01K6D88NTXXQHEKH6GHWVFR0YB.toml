congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8042, OTHERWISE KNOWN AS THE `MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF 1995,' REDEFINING ILLEGAL RECRUITMENT UNDER TITLE II OF SAID ACT"
congress_website_abstract = "RA No. 8042, the migrant workers and Overseas Filipinos Act of 1995, is sought to be amended with the following: 1. The definition of \"ILLEGAL RECRUITMENT\" includes the act of recruiting ON BOARD FOREIGN VESSELS; 2. ANY PERSON ENTITY, WHETHER A NONLICENSE, NONHOLDER, LICENSEE, OR HOLDER OF AUTHORITY may be charged of committing any of the PROHIBITED ACTS stated in the Law, which includes the following: (1) TO CHARGE ANY FEE FROM A PERSON APPLYING FOR OVERSEAS EMPLOYMENT BEFORE THE LATTER HAS OBTAINED EMPLOYMENT OR HAS ACTUALLY COMMENCED EMPLOYMENT; (2) TO FAIL OR REFUSE TO ISSUE APPROPRIATE RECEIPTS CLEARLY SHOWING THE AMOUNT PAID BY ANY PERSON APPLYING FOR OVERSEAS EMPLOYMENT; (3) TRAFFICKING IN THE FORM OF RECRUITMENT, TRANSFER, DEPLOYMEENT OF PERSONS ACROSS NATIONAL BOARDERS AND ON BOARD FOREIGN VESSELS FOR WORK OR SERVICE OR PROSTITUTION THROUGH COERCION, VIOLENCE, THREAT OF VIOLENCE, ABUSE OF AUTHORITY, DEBT BONDAGE, BONDED LABOR, DECEPTION AND OTHER FORMS OF ENTICEMENT WITH OR W"

