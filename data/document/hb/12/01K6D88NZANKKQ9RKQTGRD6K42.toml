congress_website_title = "AN ACT AMENDING ARTICLE 288 OF THE LABOR CODE OF THE PHILIPPINES INCREASING THE PENALTY FOR VIOLATION OF ARTICLE 280 OF THE LABOR CODE, AS AMENDED"
congress_website_abstract = "Rationale: One of the rampant abuses committed against CONTRACTURAL and CASUAL employees is refusal of most employers to acknowledge their regular status of employment after serving the company for at least one (1) year whether such service is continuous or brokern. The reason for such rampant violation is that the Labor Code of the Philippines does not specifically provide for a penal sanction for such violation. PROVIDED HOWEVER, THAT ANY EMPLOYER WHO REFUSED TO RECOGNIZE THE REGULAR STATUS OF AN EMPLOYEE UNDER THE CIRCUMSTANCES PROVIDED FOR IN ARTICLE 280 OF THIS CODE SHALL BE PUNISHED WITH A FINE OF NOT LESS THAN FIVE THOUSAND PESOS (P5,000.00) NOR MORE THAN FIFTY THOUSAND PESOS (P50,000.00, OR IMPRISONMENT OF NOT LESS THAN SIX (6) MONNTHS NOR MORE THAN SIX (6) YEARS, OR BOTH SUCH FINE AND IMPRISONMENT AT THE DISCRETION OF THE COURT."
