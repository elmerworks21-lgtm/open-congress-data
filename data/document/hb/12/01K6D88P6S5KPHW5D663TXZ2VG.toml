congress_website_title = "AN ACT ESTABLISHING THE JOCKEYS' COMPENSATION FUND AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Jockeys' Compensation Fund Act of 2003.\" The purpose of this bill is to provide monetary benefits for work-related injury, disability, retirement and death benefits for all licensed jockeys in the Philippines which shall be three percent (3%) of the daily gross sales, after deduction of the regulatory tax from the gross prize of winning horses."

