congress_website_title = "AN ACT DIRECTING ALL GOVERNMENT AGENCIES, ENTITIES, INSTRUMENTALITI ES AND SUBDIVISIONS, INCLUDING GOVERNMENT-OWNE D OR -CONTROLLED CORPORATIONS TO TAKE APPROPRIATE ACTION WITHIN THE PRESCRIBED PERIOD HEREIN PROVIDED, ON ALL KINDS OF APPLICATION FORPERMITS, LICENSES, CERTIFICATIONS, CLEARANCES, AND OTHER SIMILAR ESTABLISHMENT AND OPERATIONS OF BUSINESSES AND INVESTMENTS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Red Tape Act of 2003.\" This bill seeks to eliminate red tapes in the releases of permits, licenses, clearances and other issuances for business to start and operate. It aims to protect public investors and promote the values of transparency and accountability among agencies, public officials and personnel who are duly mandated to the task of ensuring the simplification and processes and improving the delivery of services."
