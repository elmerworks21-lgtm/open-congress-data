congress_website_title = "AN ACT AMENDING SECTION 106(A)(1)(a) AND SECTION 108(A) OF PRESIDENTIAL DECREE NO. 1158, AS AMENDED BY REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE(RE: REAL ESTATE INDUSTRY)"
congress_website_abstract = "Rationale: To achieve the goal of rehabilitating the real estate industry, it is imperative that the real estate industry be provided with ample assistance and incentives, including tax measures more conducive to greater activity in the real estatemarket. It is for this reason that this bill proposes to reduce the amount of value-added tax imposed on real estate transactions in order to bring prices of real estate to levels more attractive to the end consumer."

