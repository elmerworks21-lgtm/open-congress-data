congress_website_title = "AN ACT PROVIDING FOR THE DEVOLUTION OF THE CONTROL, MANAGEMENT AND OPERATION OF MUNICIPAL OR TERTIARY PORTS FROM THE PHILIPPINE PORTS AUTHORITY TO LOCAL GOVERNMENT UNITS AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to clarify the inconsistencies under the PPA charter in relation to the operational concept of devolution and revenue collection under the Local Government Code, by transferring the control, management and operation of municipal ports as well as revenue collection and other activities pertinent thereto from the PPA to the LGUs. This will enable LGUs to be self-reliant communities and make them effective partners in the realization of national goals."

