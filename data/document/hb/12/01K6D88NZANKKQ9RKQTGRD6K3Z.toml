congress_website_title = "AN ACT EXEMPTING INDIVIDUALS, COOPERATIVES AND OTHER ENTERPRISES ENGAGED IN THE IMPORTATION OF ALL TYPES OF AGRICULTURE AND FISHERIES INPUTS, EQUIPMENT AND MACHINERY FROM PAYMENT OF TARIFFS AND DUTIES, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBEREDEIGHT THOUSAND FOUR HUNDRED THIRTY-FIVE (R.A. 8435), OTHERWISE KNOWN AS THE AGRICULTURE AND FISHERIES MODERNIZATION ACT OF 1997"
congress_website_abstract = "Rationale: Considering that the agriculture sector holds the second highest multiplier effect on the national economy and as such, the strongest potential for the country to withstand the possible effects of a global recession, more incentives for our farmers and agri-based industries are in order. Removing the tax burden of the sector would be the best course of action right now to improve productivity and increase production in the countryside."

