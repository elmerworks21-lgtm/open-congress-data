congress_website_title = "AN ACT EXPANDING COUNTRYSIDE CREDIT THROUGH COOPERATIVE BANKS AND ENCOURAGING THE GROWTH AND DEVELOPMENT OF COOPERATIVE BANKS BY AMENDING CHAPTER XIII OF THE REPUBLIC ACT NO. 6938, OTHERWISE KNOWN AS THE COOPERATIVE CODE OF THE PHILIPPINES, AND FOROTHER PURPOSES"
congress_website_abstract = "The bill provides for the strengthening of the cooperative banking system in the country, particularly in rural and remote areas where credit and financial services are solely needed. Toward this end, the bill extends a package of incentives, whichare at present enjoyed by thrift banks under Republic Act No. 7906 and rural banks under Republic Act No. 7353."
