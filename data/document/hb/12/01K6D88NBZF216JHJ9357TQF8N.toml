congress_website_title = "AN ACT EXEMPTING SENIOR CITIZENS WHOSE INCOME IS NOT MORE THAN ONE HUNDRED TWENTY THOUSAND PESOS (P120,000.00) PER ANNUM, FROM PAYMENT OF REAL PROPERTY TAX OF THEIR FAMILY HOMES AND THE LAND ON WHICH IT IS SITUATED, AMENDING FOR THE PURPOSE REPUBLICACT NO. 7432"
congress_website_abstract = "Rationale: The attached bill seeks to exempt senior citizens whose income is not more than One Hundred Twenty Thousand Pesos (P120,000.00) per annum, from the payment of real property tax and any tax on real property, such as the Special Education Fund Tax on their dwellings and the land on which it is situated, amending for the purpose Sections 2 and 4 of R.A. No. 7432, otherwise known as the Senior Citizens Law.> Senior citizens are now in the twilight years of their lives and most of them, having retired from work have no sufficient income to support their families with their daily needs, particularly at this time when prices of commodities have skyrocketed beyond the reach of minimum wage earners."
