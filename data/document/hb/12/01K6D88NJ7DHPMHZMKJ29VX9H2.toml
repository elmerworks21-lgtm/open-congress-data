congress_website_title = "AN ACT DECLARING THE CRIME OF RAPE AGAINST A HOUSEHELPER UNDER EIGHTEEN (18) YEARS OF AGE COMMITTED BY HER EMPLOYER A HEINOUS CRIME AND IMPOSING THE MANDATORY PENALTY OF DEATH THEREOF, AMENDING FOR THE PURPOSE ARTICLE 335 OF REVISED PENAL CODE"
congress_website_abstract = "Among the many women workers that should be included in the ambit of protection by these constitutional provisions are the househelpers. Because of the nature of their work, they become gullible to crimes against chastity. As they perform their duties, they may fall prey into the hands of their employer, as most of them are young female dropouts from the elementary and secondary schools and are uninitiated in the wiles of life. This bill seeks to impose the maximum penalty of death upon the offender who rapes a househelper under eighteen (18) years of age if committed by her employer, a member of the employer's household of a co-househelper."
