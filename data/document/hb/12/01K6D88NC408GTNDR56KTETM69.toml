congress_website_title = "AN ACT MODIFYING THE DEFINITION OF A CONDOMINIUM UNIT, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 4726, OTHERWISE KNOWN AS THE CONDOMINIUM LAW TO APPLY TO INDUSTRIAL ESTATES AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The bill seeks to amend R.A. 4726 to include the INDUSTRIAL ESTATES in the definition of the condominium. This bill gives investors more flexibility especially in planning in order them to maximize the use of space according to the needsof their operations. Also, the buildings and other structures within the industrial estates can be considered as collateral for loans and theregy improve the cash-flow position of firms."

