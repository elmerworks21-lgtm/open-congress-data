congress_website_title = "AN ACT FURTHER AMENDING SECTION TWO, CHAPTER II OF THE REVISED PENAL CODE, AS AMENDED(RE: FALSITIES COMMITTED FOR THE PURPOSE OF POLITICAL PERSECUTION OR HARASSMENT)"
congress_website_abstract = "Section Two, Chapter II of the Revised Penal Code, As Amended, is hereby further amended by incorporating a provision that will focus on the falsities committed for the purpose of political persecution or harassment. Accordingly, any person who shall commit, instigate or induce another to commit the said offenses for the purpose of political harassment or persecution was unjustly and illegally accused of, charged, and/or convicted. The offender shall likewise suffer the penalty of perpetual disqualificatio n from public office."
