congress_website_title = "AN ACT MANDATING THE NATIONAL HOUSING AUTHORITY TO DEVELOP AND CONSTRUCT MASS HOUSING PROJECTS IN FOURTH, FIFTH, AND SIXTH CLASS MUNICIPALITIES IN THE COUNTRY"
congress_website_abstract = "Rationale: The development and construction of housing units in the rural areas will channel investments to the countryside and will provide jobs to the unemployed particularly those in the construction sector. This will also generate economic activities therein such as in the procurement, delivery, and purchase of construction supplies and materials. Most of all, this will provide decent life to low-salaries members of the community who have been dreaming to have a house of their own."
