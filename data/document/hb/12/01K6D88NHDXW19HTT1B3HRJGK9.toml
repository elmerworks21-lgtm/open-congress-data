congress_website_title = "AN ACT REGULATING THE SALE OF TICKETS AND COLLECTION OF CONTRIBUTIONS FROM TEACHERS AND STUDENTS, SOLICITATION IN ANY FORM, AND/OR ANY SIMILAR FUND-RAISING ACTIVITY, IN ELEMENTARY AND SECONDARY PUBLIC SCHOOLS, AND PROVIDING PENALTIES FOR VIOLATIONSTHEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "The sale of tickets and collection of contributions and/or solicitation in any form by any person or persons, whether voluntary or otherwise, from teachers and students in public elementary and secondary schools at any time of the school year are prohibited: Provided, That this prohibitiion shall not cover voluntary fees in the Red Cross, Girl Scouts of the Philippines and Boy Scouts of the Philippines, membership fees and annual dues of members of Parents-Teacher s Association (PTA), as well as voluntary contributions for projects of the PTA for the benefit of the school and projects of the student organizations."
