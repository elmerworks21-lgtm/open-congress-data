congress_website_title = "AN ACT PROHIBITING THE ENTRY, SALE, PROCESSING, FIELD TESTING AND RELEASE OF CROPS AND FOOD PRODUCTS CONTAINING GENETICALLY ENGINEERED ORGANISMS (GEO) INTO AND WITHIN THE COUNTRY AND IMPOSING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "\"GEO-Free Food and Agriculture Act of 2001.\" This bill aims to keep the country's food and agriculture free from genetically engineered organisms at this time when there are still unresolved questions as to its possible adverse effects on human health and the environment. The filing of this bill does not mean that the bill's authors are against the use of science and technology in food and agriculture. On the contrary, the proponents of this bill firmly believe in using science to serve the people and society. But they are strongly opposed to the use of science that will benefit only a few and worse, hurt people and damage the environment."
