congress_website_title = "AN ACT INSTITUTIONALIZ ING DRUG TEST AS ONE OF THE REQUISITES OF MEDICAL EXAMINATION FOR OVERSEAS WORKERS, AMENDING FOR THE PURPOSE SECTION THREE, RULE IV, BOOK VII OF THE PHILIPPINE OVERSEAS EMPLOYMENT ADMINISTRATION (POEA) RULES AND REGULATIONS"
congress_website_abstract = "Section 3, Rule IV (Conduct of Medical Examination for Overseas Workers), Book VII of the Philippine Overseas Employment Administration (POEA) Rules and Regulations is hereby amended to read as follows: \"Sec. 3 Scope of Pre-employment Medical Examination. The pre-employment medical examination shall include the following: \"XXX. \"(f) dental examination; (g) psychometric evaluation[,]; AND (H) DRUG TEST."

