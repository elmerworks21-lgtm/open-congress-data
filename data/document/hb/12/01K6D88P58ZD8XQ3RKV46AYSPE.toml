congress_website_title = "AN ACT TO AMEND SECTION 450 OF REPUBLIC ACT NO. 7160, AS AMENDED, OTHERWISE KNOWN AS `THE LOCAL GOVERNMENT CODE OF 1991', BY DECREASING THE AVERAGE ANNUAL INCOME REQUIREMENT FOR A MUNICIPALITY OR CLUSTER OF BARANGAYS TO BE CONVERTED INTO A COMPONENTCITY, AND FOR OTHER PURPOSES"
congress_website_abstract = "It is the purpose of this bill to exempt the capital towns of provinces from the income requirement in case they apply for conversion to a component city. With the exemption of provincial capitals from the annual income requirement, it will help both the province and the component city become more developed and it will further serve as inspiration and model to the other towns of the province to become independent and self-reliant themselves, thereby accelerating economic growth provincewide."
