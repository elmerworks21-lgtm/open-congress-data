congress_website_title = "AN ACT REGULATING THE ESTABLISHMENT AND OPERATIONS OF HEALTH MAINTENANCE ORGANIZATIONS (HMOs), PROVIDING THEM INCENTIVES AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposes to grant Health Maintenance Organizations reasonable incentives to encourage the participation of the private sector in the government's endeavor to make health care available to all. It also seeks to establish the operating guidelines for HMOs to rectify the gross inequality of bargaining power that currently characterizes the HMO relationship with its members and health care providers."
