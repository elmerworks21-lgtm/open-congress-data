congress_website_title = "AN ACT GRANTING CERTAIN INVESTIGATIVE AND PROSECUTORY POWERS TO THE COMMISSION ON AUDIT FOR CRIMINAL OFFENSES PROVIDED FOR UNDER TITLE SEVEN, CHAPTERS THREE AND FOUR OF REPUBLIC ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE OFTHE PHILIPPINES"
congress_website_abstract = "Rationale: Records show that the Commission on Audit have discovered numerous cases of offenses in violation of existing laws, rules and regulations in its exercise of its regular audit functions however, statistics show that investigation and eventual prosecution and perpetrators have been anemic. It cannot be denied that the Commission on Audit can greatly contribute towards the improvement of this sorry state. This can only be attained by the Commission on Audit if it can be conferred investigative and prosecutory powers in addition to its existing auditorial powers aside from the fact that this scheme could have decongest the backlog that is now prevailing in the different Prosecutor's Offices of the Department of Justice all over thhe country."
