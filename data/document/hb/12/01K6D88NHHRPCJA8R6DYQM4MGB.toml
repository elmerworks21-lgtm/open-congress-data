congress_website_title = "AN ACT PRESCRIBING STIFFER PENALTIES FOR ILLEGAL GAMBLING"
congress_website_abstract = "This bill enumerates what are considered UNAUTHORIZED games of chance. The bill, likewise, imposes stiffer penalties to maintainers, financiers, employees and protectors of illegal gambling. Previous measures only impose either a fine or imprisonment. This measure proposes both fines and imprisonment as penalties for the violations of this act."
