congress_website_title = "AN ACT CONSTITUTING A REVOLVING FUND FOR THE AGRICULTURAL TRAINING INSTITUTE, DEPARTMENT OF AGRICULTURE"
congress_website_abstract = "Rationale: This bill is introduced because it sees the necessity of creating a revolving fund for the use of the institute, the rationale behind sich a proposal being that technical/train ing personnel would then become five times more capable and productive when given the rightful additional financial backup.> The Institute can draw up funds from laboratory practicum product sales, NGO training fees, guest house and form fees, and other forms of income derived from the services of the Institute. Such revenue can further enhance the budget of AGRICULTURAL TRAINING INSTITUTE (ATI) and can additionally be used to repair and maintain existing facilities."

