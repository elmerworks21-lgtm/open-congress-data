congress_website_title = "AN ACT AMENDING THE DECLARED POLICIES OF REPUBLIC ACT NO. 8042, OTHERWISE KNOWN AS THE MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF 1995, ENTITLED `AN ACT TO INSTITUTE THE POLICIES OF OVERSEAS EMPLOYMENT AND ESTABLISH A HIGHER STANDARD OF PROTECTION AND PROMOTION OF THE WELFARE OF MIGRANT WORKERS, THEIR FAMILIES AND OVERSEAS FILIPINOS IN DISTRESS,' AND FOR OTHER PURPOSES"
congress_website_abstract = "Amendments to R.A. No. 8042, the Migrant Workers Act, regarding the policies of the State are: 1. THE PHILIPPINE GOVERNMENT, WITHIN THREE (3) YEARS FROM THE EFFECTIVITY OF THIS ACT SHALL RATIFY INTERNATIONAL CONVENTIONS AND TREATIES THAT GUARANTEE PROTECTION TO THE MIGRANT WORKERS. 2. THE STATE SHALL CONTINUOUSLY CREATE LOCAL EMPLOYMENT OPPORTUNITIES AND PROMOTE EQUITABLE DISTRIBUTION OF WEALTH AND BENEFITS OF DEVELOPMENT, CONSISTENT WITH THE NATIONAL DEVELOPMENT OBJECTIVES, THE STATE SHALL MANAGE OVERSEAS EMPLOYMENT PROGRAM WITH UTMOST REGARD TO THE WELFARE OF FILIPINO MIGRANT WORKERS. 3. THE STATE SHALL PROVIDE FOR THE OPERATIONAL DEFINITION OF GENDER-SENSITIV ITY PURSUANT TO THE NATURE OF THE COMPOSITION OF FOREIGN LABOR. 4. THE STATE RRECOGNIZES THE IMPORTANCE OF THE POSSESSION OF SKILLS, AND OF ADEQUATE INFORMATION ON OVERSEAS EMPLOYMENT. PURSUANT TO THIS, THE GOVERNMENT SHALL INTENSIFY ITS SKILLS TRAINING AND INFORMATION DISSEMINATION PROGRAMS AND ESTABLISH LINKAGES WITH THE SEC"

