congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE COAST GUARD AS A SEPARATE AND DISTINCT SERVICE ATTACHED TO THE DEPARTMENT OF TRANSPORTATION AND COMMUNICATIONS, FURTHER AMENDING REPUBLIC ACT NO. 5173, AS AMENDED, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It is with this proposed law that the full potential of the Philippine Coast Guard as a civilian agency would be achieved. The legal and formal transfer of the control and supervision of the unit by force of statute would achieve the full realization of the potential of the PCG as a tool in the assistance of the development of coastlines. It would also increase the PCG's capability as an organization responsive to the ever-changing needs of the maritime community, most especially inthe light of economic globalization, technological innovation in the maritime industry and increase in the demand for safe and capable sea transport. Also, the transfer would increase the economic viability, service efficiency and over-all effectiveeness of the agency responsive to the public need."
