congress_website_title = "AN ACT GRANTING TO RESIDENTS OF A REGION WHERE A GEOTHERMAL ENERGY PLANT IS LOCATED A THIRTY PERCENT (30%) DISCOUNT ON THEIR POWER RATE CONSUMPTION"
congress_website_abstract = "Rationale: To compensate the threat posed by these plants, this bill proposes that the residents of the region be given discounted rate for the use of electricity from the geothermal plant located in their region. This is at least government can do for the people of the region who sacrifice so much in the name of progress. Considering that the entire nation benefits from these plants, it is but fair that the residents who are prejudiced thereby should be granted incentives."
