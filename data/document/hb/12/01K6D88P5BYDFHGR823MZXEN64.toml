congress_website_title = "AN ACT PRESCRIBING A FIXED TERM FOR THE CHIEF OF STAFF AND MAJOR SERVICE COMMANDERS OF THE ARMED FORCES OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill prescribes that the Chief of Staff of the Armed forces of the Philippines shall have a fixed term of office of three (3) years, and the Major Service Commanders shall each have a fixed term of office of two (2) years. The terms shall commence on the date of appointment by the President. > No extension of term shall be allowed, except for the position of Chief of Staff, which may be extended in cases of war or national emergencies as declared by Congress. > When compulsory retirement age is reached before the end of term for any of the positions mentioned above, he shall be allowed to complete his term but shall be deemed compulsory retired upon completion of the same."

