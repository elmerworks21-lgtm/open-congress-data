congress_website_abstract = "Rationale: There is an urgent need to elevate the Veterans Memorial Medical Center (VMMC) to a bureau level to attain its four-fold mission and objectives more effectively and efficiently, to wit: (1) Patient Care; (2) Medical Education and Training; (3) Research; and (4) Civic Action Programs."
