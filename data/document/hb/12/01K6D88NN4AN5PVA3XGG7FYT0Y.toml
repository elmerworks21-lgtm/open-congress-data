congress_website_title = "AN ACT EXPANDING THE PROHIBITED ACTS OF DISCRIMINATION AGAIST WOMEN ON ACCOUNT OF SEX, AMENDING FOR THE PURPOSE ARTICLES 135 AND 137 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "This bill considers as ACTS OF DISCRIMINATION the following: (1) Giving UNDUE FAVOR OR PREFERENCE to a male applicant over a female applicant in the RECRUITMENT of employees; (2) GIVING UNDUE FAVOR TO A MALE EMPLOYEE OVER A FEMALE EMPLOYEE WITH RESPECT TO DISMISSAL OR RETRENCHMENT; and (3) AND ALL OTHER ANALOGOUS DISCRIMINATORY ACTS. FOR THE PURPOSE OF THE PRECEDING ARTICLE THE TERM \"GIVING UNDUE FAVOR\" MEANS TREATING DIFFERENTLY A WOMAN FROM AN ACTUAL OR HYPOTHETICAL MALE UNDER SUBSTANTIALLY SIMILAR JOB DESCRIPTIONS QUALIFICATIONS AND CIRCUMSTANCES; OR SUCH FAVOR WAS GRANTED OR EXERCISED IN VIOLATION OF REASONABLE JOB DESCRIPTION OR EQUAL OPPORTUNITY SYSTEM AS PROVIDED IN THE SUCCEEDING OR A CONDITION OR REQUIREMENT HAS BEEN APPLIED TO HEER AND THAT CONSIDERABLY FEWER WOMEN THAN MEN ARE ABLE TO COMPLY WITH THE CONDITION WHEN SUCH CONDITION IS NEGLIGIBLE TO THE PERFORMANCE OF THE JOB. Sec. 2. (4) TO DENY ANY WOMAN THE BENEFITS OF EMPLOYMENT OR OTHER STATUTORY BENEFITS UNDER OUR LAWS B"
