congress_website_title = "AN ACT ESTABLISHING A LEGAL RESEARCH UNIT IN EACH OF THE FIVE (5) DIVISIONS OF THE NATIONAL LABOR RELATIONS COMMISSION (NLRC), AMENDING FOR THIS PURPOSE ARTICLE 213 OF THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "A LEGAL RESEARCH UNIT SHALL BE ESTABLISHED IN EACH OF THE FIVE (5) DIVISIONS OF THE COMMISSION TO PROVIDE LEGAL RESEARCH SERVICE, IN THE PERFORMANCE OF THEIR ADJUDICATORY FUNCTIONS. THE LEGAL RESEARCH UNIT SHALL BE COMPOSED OF COMMISSION ATTORNEYS WHO ARE WELL VERSED IN LABOR LAWS, RULES AND REGULATIONS AND JURISPRUDENCE. THEY SHALL RECEIVE ANNUAL SALARIES AND BE ENTITLED TO THE SAME ALLOWANCES, AND BENEFITS AS THOSE EMPLOYEES FALLING UNDER SALARY GRADE 25. THERE SHALL BE AS MANY COMMISSION ATTORNEYS AS MAY BE NECESSARY FOR THE EFFECTIVE AND EFFICIENT OPERATION OF THE COMMISSION BUT IN NO CASE LESS THAN TWO (2) PER COMMISSIONER."

