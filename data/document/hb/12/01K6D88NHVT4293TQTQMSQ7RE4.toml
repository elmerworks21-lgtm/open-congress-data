congress_website_title = "AN ACT PROVIDING FOR THE MANNER AND DATE OF ELECTION OF SECTORAL REPRESENTATIVES TO THE LOCAL SANGGUNIANS AND FOR OTHER PURPOSES"
congress_website_abstract = "There shall be three (3) sectoral representatives each in the Sangguniang Panlalawigan, Sangguniang Bayan and Sangguniang Panlungsod who shall be elected pursuant to this Act: One (1) from the women sector; one (1) from the workers; and one (1) from any of the following sectors: the urban poor, indigenous cultural communities, disable persons and elderly, which may be determined by the sanggunian concerned not later than one (1) year prior to the holding of the next local elections."
