congress_website_title = "AN ACT AMENDING ARTICLE 334 OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE(RE: CONCUBINAGE)"
congress_website_abstract = "Although both the crimes of adultery and concubinage violate marriage vows, the law treats them differently. A married woman can already be convicted of adultery by a single act of sexual intercourse. While the husband can be convicted of concubinage only if sexual intercourse was performed under scandalous circumstances, or if he does any of the two other acts specified in the Revised Penal Code. Therefore, the law makes the crime of concubinage more difficult to establish. The law also imposes a lesser penalty for the crime of concubinage. >This Act seeks to remedy such inequality in the law by amending Article 334 of the Revised Penal Code. The amendment deletes the phrase \"under scandalous circumstances\", increases the penalty and quallifies the penalty to be imposed on the concubine."
