congress_website_title = "AN ACT STRENGTHENING THE REGULATORY CAPACITY OF THE DEPARTMENT OF HEALTH IN QUARANTINE AND INTERNATIONAL HEALTH SURVEILLANCE, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 123 OF 1947, AS AMENDED"
congress_website_abstract = "\\\"Quarantine Act of 2003\\\". This bill seeks to strengthen the regulatory capacity of the Department of Health in Quarantine and International Health Surveillance. It provides for an effective command and control structure which would prevent the outbreaks if diseases of international concern such as SARS (Severe Acute Respiratory Syndrome) from spreading into the country. It identifies various interventions in the prevention and containment of public health emergencies of international concern such as information dissemination, coordination of responses and other necessary powers in the event that quarantine fails."
