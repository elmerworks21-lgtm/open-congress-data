congress_website_title = "AN ACT IMPLEMENTING THE RIGHT OF ACCESS TO INFORMATION ON MATTERS OF PUBLIC CONCERN GUARANTEED UNDER SECTION SEVEN, ARTICLE III OF THE 1987 CONSTITUTION AND FOR OTHER PURPOSES"
congress_website_abstract = "The following shall be made available for public scrutiny: records, documents, papers, research materials, tapes, microfilm, videotapes and the like, statements of policy and interpretations thereof, final opinions, as well as orders made in the adjudication of cases, administrative staff manuals and instructions affecting the public which are kept in or under the executive branch of the government, including the Office of the President, government research institutions, local governments, themilitary establishment and government-owne d or controlled corporations which are hereinafter referred to as government agencies."
