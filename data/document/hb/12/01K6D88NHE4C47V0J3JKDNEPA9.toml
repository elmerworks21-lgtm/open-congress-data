congress_website_title = "AN ACT REQUIRING ALL ELECTED OFFICIALS FROM GOVERNORS TO MEMBERS OF SANGGUNIANG PAMBARANGAY TO UNDERGO DRUG TEST BEFORE ASSUMPTION TO DUTY"
congress_website_abstract = "All elected officials which include the Governors, Vice-Governors, Mayors, Vice-Mayors, Punong Barangays and the Members of Sangguniang Panlalawigan, Panlungsod Bayan, and Pambarangay shall undergo drug test before assuing their duties. The test shall be undertaken under the supervision of the Department of Health in coordination with the Commission on Elections."
