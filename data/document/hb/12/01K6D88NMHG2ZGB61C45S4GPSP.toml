congress_website_abstract = "\"SEC. 286. Automatic release of shares. - (a) The share of each local government unit shall be released, (without need of any further action,) AND REMITTED directly BY THE PERSONS, NATURAL OR JURIDICAL, ENGAGED IN THE UTILIZATION AND DEVELOPMENT OFTHE NATIONAL WEALTH, to the provincial, city, municipal or barangay treasurer, as the case may be, on a quarterly basis within five (5) days after the end of each quarter, and which shall not be subject to any lien or holdback that may be imposed bythe national government for whatever purpose."
