congress_website_title = "AN ACT DEFINING THE CRIME OF ABUSE OF WOMEN IN INTIMATE RELATIONSHIPS, PRESCRIBING PENALTIES THEREFOR, PROVIDING FOR PROTECTIVE MEASURES FOR VICTIMS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: To date, there is still NO specific forms of violence against women. They occur within the family or household, in the workplace, in educational institutions, in churches, or in the general community. Some form of violence against womenare already addressed by legislation. To date, however, there is still NO specific legislation that appropriately addresses violence against women in intimate relationships. The experience of legal servicing NGOs like the Women's Legal Bureau, Inc.shows that existing legisation is either inadequate or inappropriate to address this kind of abuse and the distinct needs of the women victims. In many cases, there is no available remedy that can be used. This bill seeks to address this gap."
