congress_website_title = "AN ACT CREATING THE DEPARTMENT OF HOUSING AND URBAN DEVELOPMENT, RATIONALIZING THE ORGANIZATION AND FUNCTIONS OF GOVERNMENT AGENCIES AND CORPORATIONS RELATED TO HOUSING AND URBAN DEVELOPMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to create a DEPARTMENT OF HOUSING AND URBAN DEVELOPMENT to rationalize the shelter and urban development program of the national government. It will streamline the bureaucracy and the process of formulating human settlement programsto meet the demands of our increasing population and decreasing space. As a full-pledge Department, the shelter program shall likewise be elevated in priority and the attention given by national government to the problem of shelter will become focused and significant."
