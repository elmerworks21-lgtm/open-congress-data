congress_website_title = "AN ACT ALLOWING OBSTETRICIAN-GY NECOLOGISTS TO USE ULTRASOUND MACHINES IN THEIR PRIVATE CLINICS OR OFFICES INSIDE HOSPITALS AND MEDICAL ARTS BUILDINGS, AND FOR OTHER PURPOSES"
congress_website_abstract = "It is the purpose of this bill to allow obstetricians and gynecologist to use ultrasound machines in their private clinics inside hospitals and/or medical arts building. It is very important for them to have their own ultrasound machines for a moreaccurate and quick diagnosis of obstetric and gynecological conditions of women, the pregnant mother and the unborn fetus."

