congress_website_title = "AN ACT PROVIDING BENEFITS TO ANY PERSON WHO DIED OR SUSTAINED INJURY WHILE TRYING TO PREVENT THE COMMISSION OF A CRIME OR WHILE COMING TO THE AID OR RESCUE OF A VICTIM OR VICTIMS OF A CRIME AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Good Samaritan Act\". As used in this Act, the term \"Good Samaritan\" refers to any person who while not being a member of any law enforcement agency, dies or sustains injury while trying to prevent the commission of a crime or while coming to the aid or rescue of a victim or victims of a crime. > This bill therefore, seeks to provide compensation to any person who died or sustained injury while trying to prevent the commission of a crime or crimes or who comes to the aid of or rescues victimsof a crime. This bill not only accord due recognition and assistance to those who have risked their life and limb at stake but will also encourage the people to perform their civic duties as citizens."
