congress_website_title = "AN ACT PENALIZING ANY PERSON WHO CHECKED IN AS PASSENGER IN AN AIRLINE FLIGHT BUT FAILS TO TAKE THE SAME WITHOUT ANY VALID REASON"
congress_website_abstract = "Any person who checked in as passenger in an airline flight but fails to take same flight without any valid reason, shall be punished with imprisonment of not less than one (1) month but not more than six (6) months or a fine of not less than One Thousand Pesos (P1,000.00) but not more than Five Thousand Pesos (P5,000.00) or both such imprisonment and fine at the discretion of the Court."
