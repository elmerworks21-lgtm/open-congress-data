congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6948 AS AMENDED BY REPUBLIC ACT NO. 7696"
congress_website_abstract = "Rationale: Under the present law , the veterans of World War II are placed on an equal footing with the other categories of veterans in terms of benefits administered by the Philippine Veterans Affairs Office (PVAO).> this system has proven to be prejudicial to the World War II veterans in terms of budgetary allocation for payment of their benefits. The World War II veterans are fast diminishing in number. They deserve the government's special attention in terms of allowing them enjoy their benefits to the full, for the duration of their remaining few days in this world.> This bill, therefore, proposes the amendment of R.A. No. 6948 as amended by R.A. No. 7696 to provide for the grant of the Total Administrative Disability Pension to Worldd War II veterans only."

