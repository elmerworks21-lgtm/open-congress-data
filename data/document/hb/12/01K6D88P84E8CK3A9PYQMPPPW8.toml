congress_website_title = "AN ACT REGULATING THE USE, SALE AND ADVERTISEMENTS OF TOBACCO PRODUCTS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Tobacco Regulation Act\" This bill proposes to regulate the use, sale and advertisements of cigarettes and other tobacco products in order to protect the people from the hazards of tobacco smoke. It provides an absolute smoking ban in specific places like hospitals, public conveyances, other enclosed public places and areas frequented by the youth. It prohibits the sale of tobacco products to minors. It limits the sale of tobacco within one hundred meters from the perimeter of any educational institution. It requires the printing of health warning in all packages to tobacco products. It provides specific restrictions on advertisements of tobacco products. It prohibits sponsorship by tobacco companies of sports, cultural and educationaal programs. It provides assistance to tobacco farmers and workers who may wish to venture to alternative farming systems or plant alternative products."
