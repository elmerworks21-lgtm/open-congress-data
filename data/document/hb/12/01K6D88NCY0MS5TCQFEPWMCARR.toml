congress_website_title = "AN ACT CREATING THE POSITION OF HUMAN RESOURCES MANAGEMENT OFFICER IN THE PROVINCIAL, CITY AND MUNICIPAL GOVERNMENTS, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: Human value management looks upon people as constituting one of the most important assets of an organization. There us a need to seek a new, more pragmatic and more opportunistic style of human resources management. There is a need to project a new image of human resources as a value-adding function. Human Resources Management is a process by which any organization has to get people, which is recruitment, placement, and job analysis. It includes performance management systems, appraisal systems and reward systems."

