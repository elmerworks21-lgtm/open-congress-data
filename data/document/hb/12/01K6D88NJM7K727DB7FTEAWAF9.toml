congress_website_title = "AN ACT TO ESTABLISH A PROGRAM FOR THE ACQUISITION OF SCHOOL SITES AND THE CONSTRUCTION, MAINTENANCE, REHABILITATION, AND REPAIR OF PUBLIC ELEMENTARY AND SECONDARY SCHOOL BUILDINGS NATIONWIDE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"School Building Program Act of 2001\". The bill seeks to create a comprehensive program which will address the problem of classroom shortage. A salient feature of this bill is the provision of build-operate-t ransfer, build-lease-tra nsfer, build-transfer, rehabilitate-o perate-transfer , and other contractural arrangements that will allow the use of both government and private funds to finance the construction of needed school buildings, and the creation of an inter-agency committee to formulate and ensure the effective implementation of the program by the Department of Education, Culture and Sports. The program also provide for the integration of all the necessary information for the effective monitoring and maintenance of existing schoool buildings."
