congress_website_title = "AN ACT ESTABLISHING THE MAGNA CARTA FOR HOME AND MICRO-BUSINESS ENTERPRISES, GRANTING EXEMPTIONS FROM GOVERNMENT RULES AND REGULATIONS AND PROVIDING INCENTIVES AND BENEFITS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill mandates the Department of Finance, the LGUs and the relevant government agencies and financial institutions to formulate and implement a special HME training, marketing and financing programs. It seeks to push business promotion efforts and government services down to the provincial and municipal levels where they are directly needed."
