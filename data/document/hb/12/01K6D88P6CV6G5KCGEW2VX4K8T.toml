congress_website_title = "AN ACT PROVIDING FOR THE COMPULSORY REGISTRATION OF HEAVY EQUIPMENT"
congress_website_abstract = "This bill requires all heavy equipment such as, but not limited to, earthmoving equipment, compaction equipment, lifting equipment, excavating equipment operated on or upon any part of the Philippines, to be registered with the Land Transportation Office (LTO) for the current year in accordance with the Land Transportation and Traffic Code, as amended. > The LTO is empowered to prepare a schedule of registration fees subject to the approval of the Secretary of DOTC, in consultation with the Secretary of the Department of Finance. The scheduling of said fees shall be determined on the basis of model, body configuration, weight, cubic displacement or number of cylinders of heavy equipment and other pertinent factors."

