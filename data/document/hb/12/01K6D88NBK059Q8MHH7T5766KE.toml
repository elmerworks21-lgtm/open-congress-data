congress_website_title = "AN ACT PROVIDING FOR THE APPOINTMENT OF A REPRESENTATIVE FROM THE SENIOR CITIZEN SECTOR IN EVERY SANGGUNIANG BARANGAY, SANGGUNIANG BAYAN, SANGGUNIANG PANLUNGSOD AND SANGGUNIANG PANLALAWIGAN"
congress_website_abstract = "Rationale: It is worthy to mention the projection made by the National Economic Development Authority (NEDA) that the number of senior citizens will be increased by 455.20% from the 1990 level by year 2030 or about 14.5 million and this significant number must have a voice as far as decision and policy-making is concerned by giving them representation in every local legislative body."

