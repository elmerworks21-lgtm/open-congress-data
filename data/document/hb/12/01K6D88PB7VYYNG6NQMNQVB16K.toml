congress_website_title = "AN ACT STRENGTHENING THE RIGHT OF THE PEOPLE TO FREE EXPRESSION, PEACEABLY ASSEMBLE AND PETITION THE GOVERNMENT FOR REDRESS OF GRIEVANCES, REPEALING BATAS PAMBANSA BILANG 880 AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Exuberant Expression Act of 2003\\\". The Constitution guarantees the right of the citizenry to peaceably assemble and petition the government for redress of grievances through all medium of expression. However, this right has been curtailed under BP 880. This bill seeks the repeal of BO 880. To ensure the untrammeled exercise of the right to assembly, free speach and to petition the government for redress of grievances, it propose the following: a) no permit requirement for the holding of a public assembly in a public place; b) non-interference by law enforcement authorities; c) police assistance when requested; d) no dispersal of public assembly; and e)immunity from arrest and taxation"

