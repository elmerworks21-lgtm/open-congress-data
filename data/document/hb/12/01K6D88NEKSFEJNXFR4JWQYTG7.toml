congress_website_title = "AN ACT CREATING THE FIELD OF LAND TITLE INSURANCE, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 612, OTHERWISE KNOWN AS THE INSURANCE CODE OF 1978 AS AMENDED BY PRESIDENTIAL DECREES NOS. 1455 AND 1460 AND BATAS PAMBANSA BLG. 874"
congress_website_abstract = "This type of insurance guarantees a potential buyer of real estate or one loaning money on mortgage that the property in question is free from any title defect. This will serve to increase the confidence of real estate buyers or mortgages over the Torrens Title since they are assured that title insurance would guarantee them some form of compensation should a defect in the land title later be discovered."
