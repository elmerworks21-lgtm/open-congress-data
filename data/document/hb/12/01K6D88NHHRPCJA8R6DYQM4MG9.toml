congress_website_abstract = "We must help invest money on developing an incentive-motiv ated and performance-dri ven health care system that will produce maximum efficiency in the provision of quality health services. We must appropriate money that ensures maximum return for our spending in terms of health benefits. When enacted, this bill will breathe life to this proposal. The National Health Service Delivery Enhancement Fund is hereby established. The fund shall institute an efficient, sustainable and equitable health care delivery system by providing incentives to the different health service providers."
