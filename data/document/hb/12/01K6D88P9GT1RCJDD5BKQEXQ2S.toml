congress_website_title = "AN ACT DEFINING AND GUARANTEEING PUBLIC SECTOR UNIONISM IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Public Sector Unionism Act of 2002\\\". Like their counterpart in the private sector, employees in the government service must be allowed to participate and involve themselves in the protection and promotion of their rights and welfare as employees. This measure seeks to promote the welfare of government workers and guarantee their rights to self-organization, collective bargaining and negotiations and peaceful concerted activities including the right to strike. The right to engage in peaceful concerted activities includes the right of government workers to peaceably assemble and petition the government for redress of grievances. The bill also seeks the creation of the Public Sector Labor Relations which shall have the original and exclusive jurisdiction to hear and decide, mandatorily, all cases arising from the implementation of the rights of government employees under this proposed act."
