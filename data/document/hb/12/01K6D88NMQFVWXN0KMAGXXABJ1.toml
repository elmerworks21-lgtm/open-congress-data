congress_website_title = "AN ACT PRESCRIBING A RATIONALIZED STAFFING PATTERN FOR THE SUPPORT STAFF OF PROVINCIAL/CITY PROSECUTORS OFFICE"
congress_website_abstract = "To once and for all adopt a single standard of compensation for the support staff, this bill seeks to rationalize the staffing patterns and compensation of the support staff and thereby reflect a true and effective nationalization of the salaries ofthe support staff of all provincial/city prosecutors' offices all over the country. > This bill seeks to provide for an updated staffing pattern for each grouping of prosecutors' offices depending on the number of prosecutors therein since the staffing pattern provided in EO No. 910 has turned obsolete with the passage of time."

