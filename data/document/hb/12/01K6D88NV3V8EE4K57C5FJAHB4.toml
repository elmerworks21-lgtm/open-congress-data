congress_website_title = "AN ACT REVISING REPUBLIC ACT NO. 382, OTHERWISE KNOWN AS `AN ACT TO REGULATE THE PRACTICE OF VETERINARY MEDICINE IN THE PHILIPPINES'"
congress_website_abstract = "\"Philippine Veterinary Medicine Act of 2001.\" THIS ACT PROVIDES FOR AND SHALL GOVERN: a) THE ADMINISTRATION AND CONDUCT OF LICENSURE EXAMINATION, REGISTRATION, AND LICENSING OF VETERINARIANS; b) THE SUPERVISION AND REGULATION OF THE PRACTICE OF VETERINARY MEDICINE; c) THE INTEGRATION OF VETERINARIANS UNDER THE EXISTING ACCREDITED VETERINARY PROFESSIONAL ASSOCIATION; AND d) THE DEVELOPMENT OF THE PROFESSIONAL COMPETENCE OF VETERINARIANS THROUGH CONTINUING PROFESSIONAL EDUCATION IN ACCORDANCE WITH THE GUIDELINES SET BY THE PROFESSIONAL REGULATION COMMISSION."
