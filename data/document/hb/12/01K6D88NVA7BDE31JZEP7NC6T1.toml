congress_website_title = "AN ACT IMPOSING A THREE PERCENT (3%) CARDIO-PULMONAR Y HEALTH TAX ON RECEIPTS FROM CIGARETTE SALES TO BE BORNE BY CIGARETTE MANUFACTURERS, CREATING A CARDIO-PULMONAR Y HEALTH FUND, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to establish a cardio-pulmonar y health fund for the general prevention and treatment of tobacco-related illnesses by means of a minimal levy on cigarette sales. The aims is to make cigarette manufacturers answer the social costs oftheir product by making them help shoulder financially the responsibility of preventing and curing illnesses gained from cigarette smoking."

