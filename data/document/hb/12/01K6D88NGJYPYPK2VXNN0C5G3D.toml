congress_website_title = "AN ACT REDEFINING THE CRIME OF PLUNDER THEREBY AMENDING REPUBLIC ACT NUMBERED SEVENTY HUNDRED AND EIGTHY, AS AMENDED BY REPUBLIC ACT NUMBERED SEVENTY-SIX HUNDRED AND FIFTY-NINE"
congress_website_abstract = "This bill redefines the crime of plunder by further lowering the aggregate amount involved to P25,000,000.00. Indeed, the present level of P50,000,000.00 is seemingly ineffective. It has not deterred public officials from committeing various forms of corruption as exposes after exposes hug newspaper headlines."

