congress_website_title = "AN ACT GRANTING FRANKING PRIVILEGE FOR A LIMITED PERIOD TO PRIVATE CITIZENS WITH RESPECT TO COMMUNICATIONS PERTAINING TO PROPOSED AMENDMENTS TO THE CONSTITUTION"
congress_website_abstract = "All mail matter of private citizens addressed to the Committee on Constitutional Amendments of the Senate and the House of Representatives shall be received, transmitted and delivered in the mail free of postage; provided that the mail matter shallbe sent by ordinary mail only, and provided further that said mail matter shall be addressed to the Committee on Constitutional Amendments or either the Senate or the House of Representatives ."

