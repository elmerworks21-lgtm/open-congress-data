congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7941, OTHERWISE KNOWN AS THE `PARTY LIST SYSTEM ACT'"
congress_website_abstract = "This bill seeks to remedy the imperfections of RA No. 7941, the \"Party List System Act\", and settle once and for all gray areas of interpretation in order to fulfill the mandate of enabling marginalized and under represented sectors to contribute tothe legislative process.> RA 7941, the enabling law of the constitutional provision on the party list system has gone through two elections already. Because of this, it is expected that all concerned would now know that what provisions need revision. The experience deprived equal representation to many sector contrary to the intent of the constitution."
