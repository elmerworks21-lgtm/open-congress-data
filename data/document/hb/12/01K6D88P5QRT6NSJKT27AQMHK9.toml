congress_website_title = "AN ACT CREATING A TRUST FUND FOR THE AUTOMATION OF THE VEHICULAR TRAFFIC LAW ENFORCEMENT SYSTEM FOR THE PURPOSE OF SECURING THE SAFETY OF THE STREETS AND SOLVING THE TRAFFIC PROBLEM IN THE URBAN CENTERS AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposed to create a trust fund for the acquisition of devices and gadgets for the automation of the country's traffic law enforcement system which will enable authorities to identify vehicles involved in a traffic violations or accidentseven in unmanned streets. The fund shall be taken from the increase in the premium of the third party liability insurance of the vehicles involved in such traffic violations or accidents."

