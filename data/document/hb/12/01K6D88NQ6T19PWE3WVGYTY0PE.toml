congress_website_title = "AN ACT PROVIDING FOR THE RIGHTS OF THE ACCUSED AND PERSONS UNDER INVESTIGATION FOR THE COMMISSION OF A CRIME, PROVIDING FOR CIVIL AND CRIMINAL PENALTIES IN CASE OF VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"2001 Omnibus Bill on the Rights of the Accused and Persons Under Investigation for the Commission of Crime\". Rationale: In the face of the alarming rise of criminality in the country and the government's response to totally eradicate all forms of lawlessness in our midst, there is a strong tendency for law enforcement agencies, in their anti-crime campaign, to dispense with the basic precepts of the Bill of Rights. In our midst, we hear reports of suspected criminals being summarily executedand of detainees being tortured by ingenious means, akin to barbarism, to elicit confessions. >There is, therefore, an urgent need to codify a comprehensive set of safeguards for the protection of every person accused, arrested or under investigationn for the commission of a crime pursuant to the Bill of Rights, the pronouncements of the Supreme Court thereon and the rules of procedure and other applicable laws."
