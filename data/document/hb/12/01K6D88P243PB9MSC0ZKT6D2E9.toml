congress_website_title = "AN ACT GRANTING THE SANGGUNIANG PANLALAWIGAN THE POWER TO ISSUE SUBPOENA AND SUBPOENA DUCES TECUM IN AID OF ITS LEGISLATIVE FUNCTIONS, AMENDING FOR THE PURPOSE SECTION 468 (A) OF CHAPTER 3, BOOK III, TITLE 5, ARTICLE 3 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991 AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Although the power to issue subpoena and subpoena duces tecum is impliedly granted to the local sangguniang panlalawigans by virtue of the statutory grant of delegated legislative powerm, there is a need to expressly grant the same because the subpoena power is judicial in character. Allowing local legislative bodies to exercise this power without express statutory basis will impinge on the principle of separation of powers. > This bill seeks to expressly grant the local sangguniangpanlalawigans the power to issue subpoena and subpoena duces tecum."
