congress_website_title = "AN ACT RECOGNIZING THE RETENTION OF PHILIPPINE CITIZENSHIP FOR NATURAL-BORN FILIPINO CITIZENS NATURALIZED IN A FOREIGN COUNTRY, RECOGNIZING MULTIPLE CITIZENSHIP AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Citizenship Retention Law of 2002.\" This bill provides that --- \"No Filipino citizen who has voluntarily sought or opted to be naturalized in a foreign country shall be deemed to have lost his/her Philippine citizenship. It shall likewise not be lost merely by operation of the law of another country, whereby citizenship of that country is conferred ib that person, unless, by their free, willful and voluntary act, they become a candidate or was elected to any public office in his/heradopted country.\""
