congress_website_title = "AN ACT PROVIDING FOR THE MANNER FOR PROHIBITING CERTAIN VEHICLES FROM USING NATIONAL, PROVINCIAL, MUNICIPAL, BARANGAY ROADS IN DESIGNATED TOURIST ZONES AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to prohibit vehicles with internal combustion engine from using or traversing national, provincial, city, municipal or barangay raods or any other areas which have been declared as Vehicle-Free Tourism Development Zones. > A province, city or municipality may declare certain areas as Vehicle-Free Tourism Development Zones in an Ordinance duly passed by the Local Sanggunian and approved by the Local Chief Executive under certain conditions provided in this Act."

