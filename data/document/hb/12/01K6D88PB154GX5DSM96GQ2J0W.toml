congress_website_title = "AN ACT STRENGTHENING THE MEAT INSPECTION SYSTEM IN THE COUNTRY, ORDAINING FOR THIS PURPOSE A 'MEAT INSPECTION CODE OF THE PHILIPPINES' AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Meat Inspection Code of the Philippines.\\\" To ensure the safety and fitness for human consumption of all meat and meat products, both in the domestic and international markets, the measure seeks to strengthen and codify the rules and regulations pertaining to the inspection of meat and meat products. It empowers the National Meat Inspection Commission to formulate, issue and implement national policies, guidelines and rules and regulations for the effective implementation of the proposed code."
