congress_website_title = "AN ACT PROVIDING FOR A REWARD TO ANY PERSON WHO COULD HELP IDENTIFY, LOCATE, PROVIDE INFORMATION, TESTIFY AND PROSECUTE PUBLIC OFFICERS COMMITTING VIOLATIONS OF REPUBLIC ACT NO. 3019, OTHERWISE KNOWN AS THE ANTI-GRAFT AND CORRUPT PRACTICES ACT AND OTHER CRIMINAL OFFENSES COMMITTED BY REASON OF THE FUNCTIONS OF THEIR OFFICE AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"Informant's Act of 2001\\\". One of the best ways to fight corruption as well as other forms of injustice is by \\\"blowing the whistle\\\" or by exposing wrongdoings so that the public and the government can act on them. While the government offers rewards to informants leading to the capture of hardened criminals, tax evaders and smugglers, there is no operation reward mechanism that would empower the public to report the corrupt activities of high government officials. This measure proposes a reward system for informants with valid information that would lead to the indictment and/or conviction of corrupt government officials. The reward system proposed in this bill shall be based on the official's salary grade, i.e, the higher the rank of the official , the greater the informant's reward."

