congress_website_title = "AN ACT PROHIBITING THE ESTABLISHMENT OF NEW CIGARETTE AND/OR TOBACCO COMPANIES IN THE PHILIPPINES, PROHIBITING THE EXPANSION OF MANUFACTURING FACILITIES AND/OR PLANT CAPACITIES OF EXISTING CIGARETTE/TOBAC CO FIRMS AND CREATING A SPECIAL PRESIDENTIALCOMMISSION THAT WILL STUDY AND IMPLEMENT POLICIES AND PROCEDURES TOWARDS THE GRADUAL PHASE-OUT OF THE CIGARETTE AND TOBACCO INDUSTRY IN THE COUNTRY, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Cigarette and Tobacco Industry Control and Phase-out Act of 2001.\" Rationale: Time and again, cigarettes and tobacco products have been described as the last \"legal drug.\" Any action, therefor, which tends to make these products available to a wider segment of the population - most especially the youth - should be discourage, if not rejected outright. That the Philippine government relies on tobacco investments is also a sign of desperation. lagging behind its Asian neighbors in terms of attracting much needed investments, the Philippines is hard-pressed to attract dollars to our shores, even if these dollars are blood money coming from the millions of people around the world who have died from smoking."
