congress_website_title = "AN ACT ESTABLISHING THE CONSULTING SERVICES BOARD IN ORDER TO UPGRADE AND PROFESSIONALIZE THE CONSULTING SERVICES IN THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Consulting services are essential to the country's development. However, the access of Filipino consultant to foreign funded projects in the country is often at the mercy of their foreign counterparts. Also, with the country's accession to the World Trade Organization, better opportunities have opened abroad for the services of Filipino professional consultants. This bill aims to provide the platform for deserving Filipino consultants to have equal footing with their foreign counterparts in the practice of their profession not only in the Philippines but elsewhere in the world. It seeks to establish the Consulting Services Board which shall be tasked to professionalize and upgrade the standing of Filipino consultants to reasonable, if not equal footing with their foreign counterparts."

