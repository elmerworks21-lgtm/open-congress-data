congress_website_title = "AN ACT EFFECTIVELY REPEALING THE AUTOMATIC APPROPRIATION FOR DEBT SERVICE BY AMENDING SECTION 31 OF PRESIDENTIAL DECREE NO. 1177"
congress_website_abstract = "Section 31 of PD No. 1177, otherwise known as the \"Budget Reform Decree of 1977,\" is hereby amended to read as follows: \"Section 31. Automatice Appropriations. All expenditures for (a) personnel retirement premiums, government service insurance, andother similar fixed SOCIAL SERVICE expenditures [, (b) principal and interest on public debt, (c) national government guarantees of obligations which are drawn upon,] are automatically appropriated: provided, that no obligations shall be incurred orpayments made from funds thus automatically appropriated except as issued in the form of regular budgetary allotments. \"Section 26, Chapter 4, Book VI of Executive Order 292, otherwise known as the \"Administrative Code of 1987,\" which reiterates intoto Section 31 of PD 1177 is likewise amended by this bill."
