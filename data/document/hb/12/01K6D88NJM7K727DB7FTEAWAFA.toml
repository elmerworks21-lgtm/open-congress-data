congress_website_title = "AN ACT PROVIDING FOR THE SUMMARY TITLING OF REAL PROPERTIES USED AS SITES FOR PUBLIC SCHOOLS"
congress_website_abstract = "Titles to real properties, public or private, including those owned or possessed by the national, provincial or municipal governments which are being utilized as actual sites for public schools for a period of at least five (5) years shall be transferred to the Department of Education, Culture and Sports by simple motion filed by the Office of the Solicitor General or Municipal, City or Provincial Prosecutor. The proceedings shall be summary in nature and the decision shall be final and executory and not subject to appeal except in a petition for certiorari to the Supreme Court."

