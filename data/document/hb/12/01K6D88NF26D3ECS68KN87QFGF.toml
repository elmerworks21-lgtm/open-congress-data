congress_website_title = "AN ACT PROVIDING FOR THREE SMALL FARMERS' REPRESENTATIVES IN THE NATIONAL IRRIGATION ADMINISTRATION (NIA) BOARD BY AMENDING REPUBLIC ACT NUMBERED THIRTY-SIX HUNDRED AND ONE, AS AMENDED, `AN ACT CREATING THE NATIONAL IRRIGATION ADMINISTRATION' , ANDFOR OTHER PURPOSES"
congress_website_abstract = "The primary focus before of the NIA is to irrigate lands producing the most basic agricultural commodity, rice and corn. This is the primary reason why rice and corn farmers were given a right of representation in its Board of Director. As our farmers production has evolved into a variety of commodities, it is high time that representation in the NIA Board should be granted to those whose livelihood are very much dependent on it. These are small farmers who lacked the resources to irrigate thesmall landholding on their own."
