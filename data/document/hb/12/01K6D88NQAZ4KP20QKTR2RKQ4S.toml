congress_website_title = "AN ACT ELEVATING THE RANK OF THE COURT OF TAX APPEALS (CTA) TO THE LEVEL OF A COLLEGIATE COURT WITH SPECIAL JURISDICTION, ENLARGING ITS ORGANIZATIONAL STRUCTURE, EXPANDING ITS JURISDICTION, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF REPUBLIC ACT NO. 1125, AS AMENDED, OTHERWISE KNOWN AS THE LAW CREATING THE COURT OF TAX APPEALS, AND FOR OTHER PURPOSES mo"
congress_website_abstract = "As proposed in this bill, (1) the Court of Tax Appeals shall be of the SAME LEVEL as the Court of Appeals, possessing all the inherent powers of a court of justice; (2) increases in the salaries of the justices of the Court of Appeals shall be EXTENDED TO and enjoyed by the justices of the Court of Tax Appeals; and (3) the Court of Tax Appeals shall be EXCLUSIVE and ORIGINAL jurisdiction over pertinent offenses involving P500,000.00 o re in duties and taxes."
