congress_website_title = "AN ACT FURTHER AMENDING REPUBLIC ACT NUMBERED THREE THOUSAND FIVE HUNDRED NINETY-ONE, AS AMENDED, OTHERWISE KNOWN AS THE CHARTER OF THE PHILIPPINE DEPOSIT INSURANCE CORPORATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Amendments to the PDIC (Philippine Deposit Insurance Corporation) charter is proposed in the bill, to wit: >>a) it increases the insured deposit coverage amount from PhP 100,000 to PhP 400,000; >>b) it provides for a permanent and continuing insurance coverage for banks that continue to operate or receive deposits; >>c) it clarifies the status of joint accounts; >>d) it mandates the PDIC to conduct a periodic study on the factors affecting insurability of deposits and the need to adjust the amount of insurance coverage."
