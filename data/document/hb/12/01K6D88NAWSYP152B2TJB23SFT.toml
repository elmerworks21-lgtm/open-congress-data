congress_website_title = "AN ACT PROMOTING A SMOKE-FREE ENVIRONMENT BY REGULATING THE PRODUCTION, MANUFACTURE, LABELLING, ADVERTISEMENT AND SALE OF TOBACCO PRODUCTS, AND ESTABLISHING A TRUST FUND THEREOF"
congress_website_abstract = "\"National Toabacco Control Act.\" This bill seeks to: (a) Regulate all tobacco advertisements; (b) Regulate tobacco products' labelling; (c) Prohibit the sale of tobacco products to minors; and (d) Create and establish a Trust Fund that will answer for the major programs of the government in line with this Act."
