congress_website_title = "AN ACT AMENDING ARTICLE 176 OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES (RE: FATHER'S SURNAME)"
congress_website_abstract = "ILLEGITIMATE CHILDREN MAY USE THE SURNAME OF THEIR FATHER IF THEIR FILIATION HAS BEEN EXPRESSLY RECOGNIZED BY THE FATHER THROUGH THE RECORD OF BIRTH APPEARING IN THE CIVIL REGISTER; OR AN ADMISSION IN A PUBLIC DOCUMENT OR A PRIVATE HANDWRITTEN INSTRUMENT AND SIGNED BY THE PUTATIVE FATHER, UNLESS DEOXYRIBONUCLEI C ACID (DNA) TEST RESULTS DISPROVES SUCH FILIATION."
