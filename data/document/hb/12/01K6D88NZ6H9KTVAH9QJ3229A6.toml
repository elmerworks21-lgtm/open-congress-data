congress_website_abstract = "The Department of Health shall upgrade the medical facilities of all health centers in the cities and capital towns of provinces for the purpose of extending medical treatment to workers who suffer occupational injuries or illness. > This bill seeks to provide for the inadequacies in the implementation of the Labor Code's provision for medical services for the workers."
