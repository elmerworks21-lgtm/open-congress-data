congress_website_title = "AN ACT VESTING IN ALL CITY AND MUNICIPAL MAYORS THE AUTHORITY TO EXERCISE EXCLUSIVE DIRECT OPERATIONAL SUPERVISION AND CONTROL OVER ALL CITY AND MUNICIPAL EMPLOYEES TASKED WITH THE DUTY OR FUNCTIONS OF ISSUING ALL KINDS OF CITY OR MUNICIAL PERMITS AND LICENSES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Any existing law, rules and regulations, opinion of the Secretary of Justice and other administrative issuances to the contrary notwithstanding , all city and municipal employees tasked with the duty or function of issuing all kinds of city or municipal permits and licenses are hereby placed under the exclusive direct operational supervision and control of their respective city or municipal mayor, who shall be directly responsible for any act of malfeasance, misfeasance or nonfeasance committedby them in the performance of their assigned tasks."
