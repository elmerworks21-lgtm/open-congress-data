congress_website_title = "AN ACT MANDATING EMPLOYERS TO GRANT UP TO FOUR (4) WEEKS OF UNPAID LEAVE A YEAR TO EMPLOYEES WHOSE SPOUSE, PARENT, UNMARRIED CHILD, OR WHEN THEY THEMSELVES ARE SUFFERING FROM SERIOUS ILLNESS"
congress_website_abstract = "\"Family and Medical Leave Act of 2001\". An employee whether employed in the private sector or government entity may apply for a Family and Medical Leave when his legitimate spouse, parent, or legitimate unmarried child suffers from a serious illness. The employee may also apply for the same if he himself is physically unable to perform his job due to a serious illness. A casual or temporary employee can avail of the benefits of this Act only after twelve (12) months of continuous employment with the same employer. The employee availing of the benefits of this Act shall be reinstated to his original position with equivalent pay, benefits and all other term and conditions of employment upon return."
