congress_website_title = "AN ACT PROVIDING FOR THE PRESERVATION, REFORESTATION, AFFORESTATION AND SUSTAINABLE DEVELOPMENT OF THE MANGROVE FORESTS IN THE PHILIPPINES, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "There shall be established and set aside in all coastal areas in each municipality within the Philippines portions of land solely for the preservation, protection, reforestation and sustainable management of magrove forests. All existing mangrove forests shall automatically from part of the reservation areas.>This proposed measure also penalize the destruction and cutting of magrove tree, as well as dumping of waste products within the reservation areas.>Furtherm ore, the offender shall be required to pay for the expenses that will be incurred to the restoration or rehabilitation of the mangrove areas that wool be damaged or destroyed."
