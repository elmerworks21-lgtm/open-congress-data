congress_website_title = "AN ACT ABOLISHING THE RESERVE OFFICERS TRAINING CORPS (ROTC) AND CREATING ALTERNATIVE SOCIAL ACTION PROGRAMS IN SCHOOLS"
congress_website_abstract = "In lieu of the ROTC, all colleges and universities in the country, both public and private, shall include Social Action Programs as options in their academic curricula. The establishment of social action desks or institutes, in schools where there are none, shall be supervised by the school in direct coordination, with the active participation and meaningful consultation with the school's student councils, publications and organizations. If there are parallel SAPs already existing, reviews, direct coordination, active participation and meaningful consultations shall be held with the school's students councils, publications and organizations."
