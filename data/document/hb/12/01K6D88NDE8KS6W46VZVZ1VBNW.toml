congress_website_title = "AN ACT ESTABLISHING A DISASTER AND EMERGENCY AUXILIARY BOARD IN EVERY BARANGAY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "There shall be established, under the supervision of the National Disaster Coordinating Council and the Department of Social Welfare and Development, a Disaster and Emergency Auxiliary Board in every barangay to assist the Punong Barangay on occasions of emergency or calamity within the barangay and in the organization and development of programs that will prepare the people for any emergency or calamity."

