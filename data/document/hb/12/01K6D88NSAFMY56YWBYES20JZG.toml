congress_website_title = "AN ACT TO INCLUDE JUDGES OF THE LOWER COURTS IN THE RETIREMENT BENEFITS GRANTED BY LAW TO JUSTICES OF THE SUPREME COURT, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 910, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to amend RA 910 as amended by RA 1797, to include the judges of the lower courts from among those members of the Bench who will benefit from this amendatory retirement law. Having spent the best years of their lives in the service ofour country, they do not deserve unjust treatment from the government they have so faithfully served. It is worthy to mention that these retired judges did not benefit from the increase granted under the Salary Standardization Law (SSL) because their monthly pensions were based on the old salary rate."
