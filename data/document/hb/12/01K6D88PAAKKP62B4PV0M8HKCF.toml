congress_website_title = "AN ACT INCREASING THE PENSION OF TEACHERS RETIRED UNDER ACT NO. 3050 AS AMENDED BY PRESIDENTIAL DECREE NO. 1148, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Because of the present economic conditions, the pension of teachers who have retired under R.A. 3050, as amended by P.D. 1148 and who have devoted their services in the education sector, is inadequate to defray basic family needs. Retired teachers who are totally dependent of their pension, mostly live below the subsistence level. The bill proposes that the pensions of teachers in the private and public schools be increased by an amount that would decently support them and their dependents."

