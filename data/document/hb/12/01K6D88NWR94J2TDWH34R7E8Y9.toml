congress_website_title = "AN ACT FURTHER STRENGTHENING THE HOME DEVELOPMENT MUTUAL FUND AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Home Development Mutual Fund Law of 2001\". Rationale: The Legislature should take a pro-active and enactive stance to make Pag-IBIG Fund a more revitalized social institution. For example, Pag-IBIG Fund should be able to deal directly with possiblefunders, both foreign and domestic, without going through intermediaries, since the cost of having intermediaries would just add to the cost of funds. It should be able to go after erring employers, both private and government, who always resort toevery measure possible just for them not to give the employer counterpart contributions. It should be able to decide for itself how to match its resources (personnel, financial, equipment, and the like) with the strategies that have been set up in orrder to meet the demands of its major roles in savings mobilization and shelter finance. > The State shall integrate all laws relating to the Pag-IBIG fund to effectively achieve the following objectives: (1) To improve the quality of life of its cit"

