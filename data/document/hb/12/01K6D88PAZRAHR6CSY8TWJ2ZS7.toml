congress_website_title = "AN ACT PROVIDING INSURANCE AND OTHER BENEFITS TO BARANGAY TANODS, AMENDING FOR THE PURPOSE SECTION 393 OF THE \\\"LOCAL GOVERNMENT CODE OF 1991\\\", AS AMENDED"
congress_website_abstract = "Barangay tanods are considered to be partners of government in bringing service to the people. They have proven themselves to be effective in the maintenance of public order, and the protection and security of life and property. Sometimes they put their lives and limbs at risk in the conduct of their duties. In order to recognize and acknowledge their sacrifices, this bill seeks to extend to barangay tanods privileges and benefits similar to those being granted to other appointive barangay officials. Through these incentives, the government can encourage responsible local residents to join the tanod brigades."

