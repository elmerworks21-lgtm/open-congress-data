congress_website_title = "AN ACT AMENDING SECTION 5 OF REPUBLIC ACT NO. 776, OTHERWISE KNOWN AS THE CIVIL AERONAUTICS ACT OF THE PHILIPPINES, AS AMENDED BY PRESIDENTIAL DECREE NO. 1462 AND EXECUTIVE ORDER NO. 217"
congress_website_abstract = "This bill seeks to restore the membership of the Department of Tourism (DOT) in the Civil Aeronautics Board (CAB) in order to continue the marketing and promotion bilateral agreements between foreign airlines and the DOT, to address the removal of unnecessary barriers in travel, and to integrate and simplify existing travel regulations. This will definitely enhance efforts of the government in torusim marketing and promotions which in the end would ensure the Philippines' strategic position inthe highly competitive international tourism market."
