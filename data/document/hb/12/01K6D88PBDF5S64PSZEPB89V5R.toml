congress_website_title = "AN ACT RATIONALIZING THE TAX ON WINNINGS AND DOCUMENTARY STAMP TAX ON HORSE RACING AMENDING FOR THE PURPOSE SECTIONS 126 AND 190 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED, SECTIONS 11 AND 13 OF REPUBLIC ACT NO. 8407 AND SECTIONS 8 AND 10 OF REPUBLIC ACT NO. 7953"
congress_website_abstract = "The measure proposes to imposition of a lower tax rate on certain special horse-racing events as an incentive to help promote the long-term growth of the horse-racing industry, help more people gain employment and, consequently, boosts government revenues. The approval of the bill would put on leakages in the collection of percentage tax on winnings and documentary stamp tax with the elimination of illegal bookies who do not collect these taxes for the government. Furthermore, it would level the playing field since a uniform tax rate would be applicable to both the Philippine Racing Club and the Manila Jockey Club which are, at present, subject to different tax rates based on their individual franchises."
