congress_website_title = "AN ACT AUTHORIZING CITY AND MUNICIPAL MAYORS TO ORGANIZE LOCAL POLICE AUXILIARY UNITS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The members of the local police auxiliary units shall assist regular PNP elements in traffic management and control, performance of administrative duties and such other duties and functions which are non-life threatening, as may be assigned by the Mayor or the Chief of Police of the city or municipality concerned. Provided, that the members of the local police units shall not be issued or authorized to carry firearms, provided, further that they shall not de detailed or assigned as personal security of the local government officials."

