congress_website_title = "AN ACT ESTABLISHING THE NATIONAL HEALTH PASSPORT SYSTEM AND PROVIDING FREE DIAGNOSTIC TESTS IN GOVERNMENT HOSPITALS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The proposed HEALTH PASSPORT PROGRAM aims to provide the following: (1) Free diagnostic tests; (2) health consciousness; (3) Medical Care; (4) Encourage the prevention of health deterioration rather than the provision of cure for disease and illnesses; and (5) Impose on the parents the obligation to give their child/children proper health care and medical attention."
