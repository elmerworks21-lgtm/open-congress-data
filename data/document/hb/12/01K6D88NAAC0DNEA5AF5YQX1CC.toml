congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA FOR THE POOR"
congress_website_abstract = "Rationale: More than a bill of rights of the poor, it declares that Government must now take the side of the poor because the issue of poverty has now become a critical question of survival ; that Government intervention, given the present situation, is the only realistic route to take to uplift the poor, while long term measures, strategies and solutions for poverty reduction are being put in place, and that government must invest heavily in anti-poverty programs for the economic empowerment of the poor."
