congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED FOUR HUNDRED NINETY-THREE, ENTITLED: \"AN ACT TO PROHIBIT THE USE OR CONFERRING OF MILITARY OR NAVAL GRADES OR TITLES BY OR UPON PERSONS NOT IN THE SERVICE OF THE ARMED FORCES OF THE PHILIPPINES OR THE PHILIPPINE CONSTABULARY, TO REGULATE THE WEARING, USE, MANUFACTURE AND SALE OF INSIGNIAS, DECORATIONS AND MEDALS, BADGES, PATCHES AND IDENTIFICATION CARDS PRESCRIBED FOR THE SAID ARMED FORCES OR CONSTABULARY, AND FOR OTHER PURPOSES\""
congress_website_abstract = "The proposed bill seeks to STOP the practice of use or conferring of military, naval or police grades or titles by or upon persons not in the service of the Armed Forces of the Philippines and the Philippine National Police. Instead of merely regulating the wearing use, manufacture and sale of insignias, decorations and medals, badges, patches and identification cards prescribed for the Armed Forces of the Philippines and the Philippine National Police, the bill COMPLETELY PROHIBITS the possession and use of said items by unauthorized personnel."
