congress_website_title = "AN ACT PROVIDING A SERVICE AREA SCHEME TO ALL INTERNET SERVICE PROVIDERS (ISPs) LIBERALIZING THE GRANTING OF ITS OPERATIONAL LICENSE TO OFFER EXPANDED SERVICES AND DEPLOY INTERNET BROADBAND INFRASTRUCTURE AND FOR OTHER PURPOSES"
congress_website_abstract = "The scheme will allow ISPs to render service in any area of their choice but will however, be required to operate a branch in at least one provincial area where there is an equal demand for Internet access. Granting this long time request of most ISPs to have their own network will also be beneficial to the country. By having a broadband network spread throughout the country, we can take advantage of the benefits the technology can deliver such as simultaneous and speedy transmission of multimedia signals between subscribers. Through this, our country will no longer be left out in the broadband race in the Asian region."
