congress_website_title = "AN ACT TO PLACE SAFETY NETS FOR FILIPINO RICE PRODUCERS BY IMPOSING TARIFFS IN LIEU OF QUANTITATIVE RESTRICTIONS ON RICE IMPORTS, DIRECTING TARIFF COLLECTIONS FROM RICE IMPORTS TO PROJECTS AND PROGRAMS THAT ENHANCE RICE PRODUCTIVITY AND INCREASE FARMERS' INCOMES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Rice Safety Net Act of 2001.\" The proposed legislation shall be called the \"Rice Safety Net Act of 2001\", which adopts the use of tariffs in lieu of non-tariff import restrictions to protect local paddy producers in a direct and transparent mannerand, at the same time, generate revenues required to provide the infrastructure and finance the programs that improve farmers' productivity."

