congress_website_title = "AN ACT TO RESTRICT THE ACCESS OF YOUTH TO CIGARETTES AND OTHER TOBACCO PRODUCTS"
congress_website_abstract = "\"Control Youth Access to Tobacco Act\". Some restrictions provided in this bill are: (1) MINIMUM AGE - No manufacturer, distributor, or retailer or tobacco products may offer or distribute tobacco products may sell a tobacco product to an individualwho is less than 18 years old; (2) PACKAGES OF CIGARETTES - Only cigarettes in a package of 20 cigarettes may be sold or distributed by a manufacturer, distributor, or retailer or tobacco products; and (3) SAMPLING - No manufacturer, distributor, orretailer or tobacco products may offer or distribute tobacco products for sampling except in an area or establishment from which minors are denied access."
