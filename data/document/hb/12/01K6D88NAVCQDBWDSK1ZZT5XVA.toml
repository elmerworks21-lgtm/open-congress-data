congress_website_title = "AN ACT PUNISHING THE CRIME OF KIDNAPPING-FOR- RANSOM WITH AMPUTATION OF UPPER AND LOWER EXTREMITIES THEREBY AMENDING ARTICLE 267 OF THE REVISED PENAL CODE, AS AMENDED"
congress_website_abstract = "Rationale: The perpetrators of kidnap-for-rans om should be dealt with punishments as severe as the crimes they commit against the lives, property, and rights under the Constitution. The crime of kidnapping-for- ransom is not as simple as taking a man in unlawful and illegitimate custody for the purpose of soliciting money in exchange for victim's freedom. It has been proven to be viciously victimizing middle or the moneyed class in society.Let it stop and the psychological deterrent for its recurrence be to impose amputation of the upper and lower extremities(the punishment of such crime.) It is not intended to be a cruel and inhumane punishment, but only a consequence. As a matter of fact, giving the sentence of death a middle ground..."
