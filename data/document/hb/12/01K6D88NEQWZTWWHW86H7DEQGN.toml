congress_website_title = "AN ACT RENAMING THE DEPARTMENT OF AGRICULTURE AS THE DEPARTMENT OF AGRICULTURE AND FISHERIES"
congress_website_abstract = "Rationale: Sometimes, name change can make a difference in underscoring official policy. One such renaming is that of the Department of Agriculture to include the Fisheries sector, since the latter constitutes a very significant component of our country's economy. By so doing, the government serves notice that the sector is also a very important one in the allocation of scarce government resources."
