congress_website_title = "AN ACT CREATING A NATIONAL BOOK DEVELOPMENT TRUST FUND TO SUPPORT FILIPINO AUTHORSHIP"
congress_website_abstract = "\\\"National Book Developemnt Trust Fund Act\\\". Books are the most effective and economical tools for achieving intellectual growth; imparting information; and recording, preserving and disseminating the nation's cultural heritage. However, most of the books available in our libraries and bookstores are not local publications. This bill attempts to help both veteran and promising Filipino authors, specially those based outside of the National Capital Region, to produce or finish manuscripts for publication in the fields of science and technology, local history and in subject areas wherein local books are either few or non-existent. It seeks to create a National Book Development Trust Fund through which grants can be offered to deserving authors."

