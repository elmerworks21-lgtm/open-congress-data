congress_website_title = "AN ACT CRIMINALIZING MONEY LAUNDERING ACTIVITIES IN THE PHILIPPINES AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "This bill which seeks to punish and eradicate anti-money laundering activities in the country - implements the declared policy of the State to provide the necessary legal and policy environment for the domestic and international markets to enable the government to protect and promote legitimate business capital and interests and enhance the flow of legitimate financial transactions in the country. It is consistent with objectives of government to punish economic crimes and those who benefit from the proceeds of these economic crimes - all these as a significant step to protect and safeguard the integrity of our financial system."

