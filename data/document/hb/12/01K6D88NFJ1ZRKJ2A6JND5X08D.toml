congress_website_title = "AN ACT TO PROHIBIT DISCRIMINATION IN THE RECRUITMENT, EMPLOYMENT, PROMOTION AND DISMISSAL OF ANY LESBIAN OR GAY IN PUBLIC AND PRIVATE EMPLOYMENT SOLELY ON ACCOUNT OF DIFFERENCE IN SEXUAL ORIENTATION AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "This proposed measure seeks to prohibit any form of discrimination against lesbians and gays of the labor force especially those pertinent to their recruitment, employment, promotion and dismissal. Corresponding penalties therefor are also hereby provided to ensure a more responsible and equitable treatment of these mostly stereotyped sectors of Philippine society."

