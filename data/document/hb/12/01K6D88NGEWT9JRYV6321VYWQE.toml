congress_website_title = "AN ACT MAKING THE APPOINTMENT OF THE COOPERATIVES OFFICER MANDATORY IN THE PROVINCIAL, CITY AND MUNICIPAL GOVERNMENTS, AMENDING FOR THE PURPOSE SECTIONS 443, 454, 463 AND 487 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE"
congress_website_abstract = "Rationale: Appointment of a COOPERATIVES OFFICER means the fulfillment of the noble objectives that Local Government Units envisions to achieve vis-a-vis cooperativism. The mandatory appointment of a cooperatives officer therefor is of paramount significance. The Officer will assist the Cooperative Development Authority in (1) the collection of reports and financial statements; (2) mediation/conci liation of disputes; (3) monitoring of compliance with the rules of the CDA, etc."
