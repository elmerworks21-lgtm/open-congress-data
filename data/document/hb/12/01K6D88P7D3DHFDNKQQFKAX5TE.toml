congress_website_title = "AN ACT CREATING A COFFEE RESEARCH , DEVELOPMENT AND EXTENSION CENTER, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to create a Coffee Research, Development and Extension Center (CoRDEC) that shall be tasked to educate and train all stakeholders of the cofee industry, conduct relevant researches, scientific study and feasible marketing strategies,extend technologices and develop and maintain linkages with international organizations and other coffee development center in other countries. > The Center shall enjoy exemption from taxes and other duties in the importation of such machineries necessary for the development of and extension programs subjected to the provisions of Section 105 (s) of the Tariff and Customs Code, Section 103 (f) of the National Internal Revenue code and to the provisions on Automatic Appropriations under the Geneeral Appropriations Act."
