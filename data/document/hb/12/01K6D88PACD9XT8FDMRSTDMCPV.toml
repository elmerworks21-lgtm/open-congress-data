congress_website_title = "AN ACT INSTITUTIONALIZING THE ROLL-ON/ROLL-OFF TERMINAL SYSTEM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"Strong Republic Nautical Highway Act\\\". Compared to the usual land and sea routes, the Roll-on/Roll-off Terminal System (RRTS) reduces travel time by 17 hours. Furthermore, the documentary requirement using the RRTS is simplified thereby reducing red tape. This will redound to lower prices of basic commodities and an improved food supply at the local, regional and national levels. This bill seeks to institutionalize the RRTS and consider the same as part of the national highway. Vehicles that can be moved by their own power and passing through such links shall not be burdened by transport procedures and costs."

