congress_website_title = "AN ACT IMPLEMENTING THE RIGHT OF ACCESS TO INFORMATION ON MATTERS OF PUBLIC CONCERN GUARANTEED UNDER SECTION SEVEN, ARTICLE III OF THE 1987 CONSTITUTION AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Freedom of Access to Information Act of 2003\\\". In cognizance of the right of people information on matters of public concern and to allow full public disclosure in all transactions involving public interest, this measure requires all government agencies to make the following available for public information, scrutiny, copy or reproductions - records, documents, papers, research materials, tapes, microfilm, videotapes and the like, statements of policy and interpretations thereof, final opinions, orders in the adjudication of cases, administrative staff manuals and instructions and other information imbued with public interest. The bill identifies the kinds of information that are exempt from the ambit of the proposed act."
