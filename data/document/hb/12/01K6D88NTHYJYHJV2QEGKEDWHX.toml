congress_website_title = "AN ACT GRANTING A PERIOD ENDING DECEMBER 31, 2010 OF FILING APPLICATIONS FOR ADMINISTRATIVE LEGALIZATION (FREE PATENT) AND JUDICIAL CONFIRMATION OF IMPERFECT AND INCOMPLETE TITLES TO ALIENABLE AND DISPOSABLE LANDS OF THE PUBLIC DOMAIN UNDER CHAPTERVII AND CHAPTER VIII OF COMMONWEALTH ACT 141, AS AMENDED, COMMENCING JANUARY 1, 2001"
congress_website_abstract = "Rationale: The period for filing free patent was terminated last December 31, 2000, as provided for in RA 6940. Consequently, there are some individuals with application for free patent who were unable to avail of the gratuitous grant of the state although their claims are legitimate as the administrative confirmation of title was discontinued. >Free patent ishe most affordable means by which a legitimate claimant can acquire a title over the land lawfully occupied. This is different from the other modes of granting land titles which require judicial proceedings. In such procedure, an individual has to undergo tedious and lengthy court proceedings aside from the litigation expenses that usually accompany this mode of issuing land titles."
