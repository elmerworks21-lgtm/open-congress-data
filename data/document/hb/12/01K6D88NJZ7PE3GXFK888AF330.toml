congress_website_title = "AN ACT AMENDING ARTICLE 16 OF EXECUTIVE ORDER NO. 209 AS AMENDED BY EXECUTIVE ORDER NO. 227, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES, MAKING IT MANDATORY FOR COUPLES TO UNDERGO COUNSELING PRIOR TO THE ISSUANCE OF A MARRIAGE LICENSE"
congress_website_abstract = "\"Mandatory Marriage Counselling Act\". This bill aims to provide for a mandatory marriage counselling for all couples intending to marry, regardless whether they need parental consent or parental advice to marry. It seeks to educate couples in the rigors of marriage and how to cope with the challenges that will face them everyday for the rest of their lives."
