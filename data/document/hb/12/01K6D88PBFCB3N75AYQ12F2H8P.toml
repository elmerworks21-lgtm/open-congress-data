congress_website_title = "AN ACT PROVIDING ADDITIONAL REQUIREMENTS FOR FILING OF CERTIFICATES OF CANDIDACY, AMENDING FOR THE PURPOSE SECTION 74 OF BATAS PAMBANSA BLG. 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE"
congress_website_abstract = "An ordinary job applicant is required by his prospective employer to present an NBI (National Bureau of Investigation) Clearance and a Police Clearance to show his integrity and character. There is an even greater reason to require the same from a person aspiring to be elected to a public office since he shall be carrying the public trust. He must show that he has always observed good conduct and has obeyed the laws. This bill requires the presentation of an NBI Clearance and a Police Clearance as additional requirements in the filing of certificates of candidacy of persons aspiring to run for public office."

