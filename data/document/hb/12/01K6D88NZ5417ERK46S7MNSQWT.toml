congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8189, ENTITLED `AN ACT PROVIDING FOR A GENERAL REGISTRATION OF VOTERS, ADOPTING A SYSTEM OF CONTINUING REGISTRATION, PRESCRIBING THE PROCEDURES THEREOF AND AUTHORIZING THE APPROPRIATION OF FUNDS THEREFOR' BY DELETINGSECTION 44 THEREOF"
congress_website_abstract = "Section 44 of RA No. 8189 mandates the REASSIGNMENT of ELECTION OFFICERS to a new station every four (4) years OUTSIDE of the original congressional district they are presently serving. The affected officers claim that: (1) it dislocates their families every four (4) years and thereafter; (2) the schooling of their children is greatly affected; (3) the reassignment entails additional expenses in maintaining and establishing a new residence in another areas every four (4) years; and (4) beingaway from home diminishes the effectiveness of the performance of their duties and functions; etc."

