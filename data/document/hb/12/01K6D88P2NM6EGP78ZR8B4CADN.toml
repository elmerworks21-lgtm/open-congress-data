congress_website_title = "AN ACT REQUIRING THE MANDATORY APPOINTMENT OF MUNICIPAL SOCIAL WELFARE AND DEVELOPMENT OFFICERS IN ALL MUNICIPALITIES NATIONWIDE, AMENDING FOR THE PURPOSE SECTION 483, ARTICLE XIII OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE"
congress_website_abstract = "Rationale: In line with the system of decentralizatio n, social welfare services which used to be the primary function of the Department of Social Welfare and Develoment were devolved to local government units. The Barangays were vested with providing social health and social welfare services which includes the maintenance of health and day care centers. The Municipalities, on the other hand, were vested with general social welfare services which included programs and projects on the welfare ofchild and youth, family and community, elderly and disabled. In addition, community-based rehabilitation programs for vagrants and drug addicts, livelihood projects, nutrion services, and family planning services were also devolved to the Municipaliities. > There is therefore a complelling and urgent need to amend the pertinent provisions of the Local Government Code if only to ensure that each municipality finally have a Social Welfare and Development Officer which shall serve the social welfa"

