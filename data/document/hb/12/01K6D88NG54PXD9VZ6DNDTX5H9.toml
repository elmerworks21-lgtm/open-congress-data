congress_website_title = "AN ACT PROVIDING FOR THE IMPOSITION OF AN IDLE LAND TAX, AMENDING FOR THE PURPOSE THE PERTINENT PROVISIONS OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "There is hereby imposed an idle land tax to replace the local idle land tax authorized under the Local Government Code at the rate of five percent (5%) per annum based on the assessed value of the property as determined by the Provincial or City Assessor of the Province or City where the property is located, or by the Municipal Assessor in the case of idle lands situated in the municipalities within Metropolitan Manila. The listing and assessment of idle lands shall be conducted and completedwithin six (6) months after the effectivity of this Act. The updating or reassessment shall coincide with the triennial general revision for real property tax purposes. Provided, that the tax thereon shall be collected on the first day of January folllowing the year it was assessed."
