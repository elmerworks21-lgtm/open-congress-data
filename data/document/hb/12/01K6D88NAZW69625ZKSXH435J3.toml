congress_website_title = "AN ACT INSTITUTING A PUBLIC SCHOOL TEACHERS SCHOLARSHIP PROGRAM, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill provides for the establishment of a PUBLIC SCHOOLTEACHERS SCHOLARSHIP FUND. The grantee of the scholarship program under this Act shall be entitled to financial assistance which may include tuition and other school fees, outright grant forprescribed textbooks and essential school supplies, transportation assistance, and living allowance. Provided, however, that in the granting of financial assistance, the availability of funds, purchasing power of the peso and rate of financial assistance given udner other government scholarship programs must be considered."

