congress_website_title = "AN ACT AUTHORIZING THE RELEASE OF RETIREMENT, SEPARATION PAY AND BENEFITS WITH INTEREST FOR RETIRING OR RESIGNING GOVERNMENT OFFICIALS AND EMPLOYEES WITH ADMINISTRATIVE, CRIMINAL AND CIVIL CASES WHO ARE EVENTUALLY EXONERATED OR CLEARED THEREFROM"
congress_website_abstract = "Pursuant to the above declared policy, retiring or resigning government officials and employees with administrative, criminal or civil cases who eventually exonerated or cleared therefrom shall receive their retirement or separation pay and benefitswith added interest for that period from his retirement or separation date to the date of the promulgation of the decision on his case."

