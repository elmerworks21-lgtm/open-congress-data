congress_website_title = "AN ACT REQUIRING EDUCATIONAL INSTITUTIONS AND COMMERCIAL ESTABLISHMENTS WHICH MAINTAIN ATHLETIC TEAMS TO ALLOW THEIR ATHLETES OR PLAYERS TO JOIN IN THE SELECTION POOL AND FORMATION OF PHILIPPINE NATIONAL TEAMS THAT WILL COMPETE IN ALL INTERNATIONAL SPORTS COMPETITIONS AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "It is no secret that the Philippines lags behind in sports development compared to our Asian neighbors. This is not due to a dearth of athletes but because of lack of cooperation and coordination among the government agencies concerned, educational institutional and the other sectors involved in the implementation of our sports program. This bill seeks to require all educational institutions and athletic teams sponsored by commercial establishments to actively cooperate and assist the national government in the selection, training and formation of national teams that will compete in international sports competitions."

