congress_website_title = "AN ACT GOVERNING THE ESTABLISHMENT, OPERATION AND REGULATION OF LENDING COMPANIES"
congress_website_abstract = "\\\"Lending Company Regulation Act of 2003\\\". Lending companies (LCs) or lending investors are primarily engaged in extending credit to its clients through direct loans or direct lending. Direct lending has been defined in the Financing Act of 1998 as among the activities of a financing company hence LCs fall under the regulation and supervision of the Securities and Exchange Commission (SEC). However, not all LCs are organized as corporations hence the SEC can not regulate those organized as single proprietorship since these are registered with the Department of Trade and Industry (DTI). The bill seeks to require all LCs to register as corporations and allow existing LCs organized as single proprietorship or partnerships to convert into corporations within one year from the effectivity of this act. It also delineates the authority of the SEC and the DTI over LCs."
