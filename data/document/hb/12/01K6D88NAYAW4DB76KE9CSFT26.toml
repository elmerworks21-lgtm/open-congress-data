congress_website_title = "AN ACT STRENGTHENING THE MANDATE ON THE INTERCONNECTION BETWEEN AND AMONG PUBLIC TELECOMMUNICATI ONS ENTITIES, PROVIDING PENALTIES FOR ITS VIOLATION AND FOR OTHER PURPOSES (convergence)"
congress_website_abstract = "Rationale: Recognizing the vital role of teloecommunicat ions in nation-building and economic development, the State in its desire to attain universal access shall promote the rapid expandion of telecommunicati ons services in all areas of the Philippines, maximize the use of all available telecommunicati ons facilities, and ensure that every user of the public telecommunicati ons service shall have access to such facilities at a mandated standard of service and at reasonable costs."
