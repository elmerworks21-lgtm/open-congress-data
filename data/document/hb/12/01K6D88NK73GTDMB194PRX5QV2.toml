congress_website_title = "AN ACT REGULATING THE PRACTICE OF RESPIRATORY THERAPY AND CREATING THE BOARD OF EXAMINERS FOR RESPIRATORY THERAPISTS, PROVIDING FOR ITS STRUCTURE AND ORGANIZATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The field of RESPIRATORY THERAPY encompasses a broad area of clinical expertise needing a thorough understanding of basic anatomy, physiology, biochemistry, pharmacology and the physics of gases and a familiarity with the growing number of respiratory care devices required in caring for persons with pulmonary disorders such as asthma, acute respiratory failure with or without carbon dioxide retention, bronchitis, emphysema and other forms of obstructive and restrictive pulmonary diseases. > Recently, problems in the employment of such graduate have risen because of government requirements for licensed personnel as well as international accreditation's requirements for respiratory therapy practitioners."

