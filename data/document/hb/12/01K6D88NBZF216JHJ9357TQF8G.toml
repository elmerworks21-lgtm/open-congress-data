congress_website_title = "AN ACT REVISING THE INCOME TAX RATES OF INDIVIDUAL TAXPAYERS, AMENDING FOR THE PURPOSE CHAPTER III, SECTION 24(A)(1)(c) OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Rationale: The proposed REDUCTION in the income tax rates would strengthen the purchasing power of our people's hard-earned money in order to afford them the capability to meet the demands of daily living. In this light, not only do we hope to address the present financial difficulties of our taxpayers by increasing their take-home pay, but also to improve the country's economy by augmenting the current rate of consumption with the end view of enhancing economic activity."

