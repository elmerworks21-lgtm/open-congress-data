congress_website_title = "AN ACT PROHIBITING POLITICAL TURNCOATISM AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF, REPEALING FOR THE PURPOSE SECTION SEVENTY-ONE OF BATAS PAMBANSA BLG. EIGHT HUNDRED EIGHTY-ONE, AS AMENDED, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: Turncoatism, most often, is the result of political patronage, or hope of greater patronage from the party in power. Party platforms and ideologies are eschewed in exchange for patronage. This practice certainly is preventing and not helping in the development of a strong multi-party system. In order to minimize politics of patronage and develop a strong multi-party system in the Philippines, it is the purpose of this bill to prohibit political turncoatism and provide penalties thereof."
