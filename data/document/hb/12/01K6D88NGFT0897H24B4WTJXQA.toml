congress_website_title = "AN ACT RATIONALIZING THE HOUSING SECTOR CREATING THEREBY THE DEPARTMENT OF HOUSING AND URBAN DEVELOPMENT, DEFINING ITS STRUCTURE, PROVIDING FOR ITS POWERS AND FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Shelter is a basic need and fundamental right of the Filipino people. As such, the State is duty-bound to implement to implement a housing program that is affordable, adequate and decent. Despite the presence of government institutions that ensure the financing of housing units, there is still a pressing need to rationalize the housing sector to be able to reach out to the broadest units, there is still a pressing need to rationalize the housing sector to be able to reach out to the broadest number of people, especially the more needy and marginalized ones."
