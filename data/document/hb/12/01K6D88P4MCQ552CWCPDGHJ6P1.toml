congress_website_title = "AN ACT TERMINATING THE VAT-ZERO RATED PRIVILEGE OF INDEPENDENT POWER PRODUCERS, DELETING FOR THE PURPOSE THE INSERTED SENTENCE UNDER SECTION 6 OF REPUBLIC ACT NO. 9136, OTHERWISE KNOWN AS THE ELECTRIC POWER INDUSTRY REFORM ACT (EPIRA) OF 2001"
congress_website_abstract = "The VAT-ero rated privilege of Independent Power Producers (IPPs) has deprived the national government of substantial tax revenues, but such taxc privilege never achieved its purpose of lowering electricity rates. There is a pressing need to terminate the VAT-zero rated privilege for the government to collect the much-needed revenues that could somehow ease the huge budget deficit of the country."
