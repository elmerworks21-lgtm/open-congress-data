congress_website_title = "AN ACT AMENDING SECTIONS 6, 11, 21, 34, 47, 50 AND 51 OF REPUBLIC ACT NO. 9136, OTHERWISE KNOWN AS THE ELECTRIC POWER INDUSTRY REFORM ACT OF 2001"
congress_website_abstract = "Rationale: The proposed amendments to RA No. 9136 are sought in order to facilitate the privatization of the assets of NPC while at the same time reducing costs of electricity for end-users and providing a more reliable and efficient electricity system. The above will not only invite private capital and ensure premium price to the government but would pave the way for the improvement, expansion, operations and upkeep of the transmission facilities and privatization of the assets of NPC."
