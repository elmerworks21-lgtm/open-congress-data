congress_website_title = "AN ACT RATIONALIZING THE MANUFACTURE, REPAIR, REQUALIFICATION, SALE AND DISTRIBUTION OF LIQUEFIED PETROLEUM GAS (LPG) CYLINDERS, PROVIDING PENALTIES FOR VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"LPG Cylinder Act of 2003\\\". To protect the interests of the consumers, the bill seeks to ensure that appropriate standards will be developed and formulated for the Liquefied Petroleum Gas (LPG) industry. It mandates the Department of Trade and Industry, as the lead agency in the implementation of the proposed law, to establish an LPG cylinder development program and undertake research, standardization, promotion, market monitoring, certification, testing, accreditation and enforcement activities. The measure also provides for penalties and fines for violations of the law."
