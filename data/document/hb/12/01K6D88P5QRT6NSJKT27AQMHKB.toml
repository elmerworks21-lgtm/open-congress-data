congress_website_title = "AN ACT ESTABLISHING THE MOVEMENT TO HELP ERADICATE RAPE AND OTHER FEMALE ABUSES `MOTHER' MANDATING THE COMPULSORY TEACHING OF SELF-DEFENSE TO ALL FEMALE CONSTITUENTS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"MOVEMENT TO HELP ERADICATE RAPE AND OTHER FEMALE ABUSES (MOTHER) ACT\" or \"MOTHER RAPE PREVENTION ACT.\" > This bill seeks to prevent sexual harassment, assaults and other forms of abuses by enabling females to have a defence mechanism based on the principal that self-defense is an instinct, which needs to be developed. To achieve this objective, the Movement to Help Eradicate Rape and other female abuses (MOTHER) Commission is hereby established. The Commission shall: (a) oversee the formulation, recommendatatio n and enforcement of the MOTHER self-protection module for females through the assistance of the Philippine National Police; (b) ensure that the program is introduced and implemented on a gradual, staggered basus to all females inthe various government agencies; (c) formulate rules and regulations and exercise other powers and functions as may be necessary to carry out effectively the purpose and objectives of this Act; and (d) perform other functions as may be necessary for"

