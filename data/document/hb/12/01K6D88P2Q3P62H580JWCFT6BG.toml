congress_website_title = "AN ACT PROVIDING FOR A PRE-TRIAL RELEASE FOR THE ACCUSED, CREATING FOR THE PURPOSE THE PRE-TRIAL RELEASE OFFICE (PTRO), APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Pre-Trial Release Act of 2002.\" This bill seeks to provide persons arrested and charged with crimes or offenses, except those involving heinous crimes, the opportunity to be released immediately without the need to post a bail bond by way of the Pre-Trial Release (PTR) Program. This bill seeks the creation of the Pre-Trial Release Office under the direct control and supervision of the Department of Justice to administer the said Program. The rationale of this bill is to allow the relase of anaccused during the pendency of his or her case based on non-financial conditions."

