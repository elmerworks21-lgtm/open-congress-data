congress_website_title = "AN ACT CREATING A MECHANISM FOR AN OPEN SYSTEM OF HIGHER EDUCATION IN THE PHILIPPINES"
congress_website_abstract = "The purpose of this Act is to create a more equitable and efficient operation of the system of higher education in the Philippines. A mechanism for an open system or tertiary education, hereinafter referred to as open tertiary education, shall be created to supplement the scope of service and outreach of the formal system of higher education."

