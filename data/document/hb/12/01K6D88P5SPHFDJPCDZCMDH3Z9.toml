congress_website_title = "AN ACT UPGRADING THE SALARY GRADES OF EDUCATION SUPERVISORS IN THE DEPARTMENT OF EDUCATION"
congress_website_abstract = "Rationale: Based on the organizational structure of school divisions, Principals of all ranks are directly under the administrative and supervisory functions of the District Supervisors. However, it is clear in the implementation of R.A. 6758 or theCompensation and Position Classification Act of 1989 that the salary grades of principals and supervisors were distorted that Elementary and Secondary School Principals get higher salaries than the Division and Regional Supervisors. > This proposedmeasure intends to correct the error that resulted in the implementation of Ra 6758 by upgrading the basic salary of all Education Supervisor I and II from Salary Grade 19 and Salary Grade 20, respectively to Salary Grade 24."

