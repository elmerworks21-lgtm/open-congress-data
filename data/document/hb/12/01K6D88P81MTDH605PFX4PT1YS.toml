congress_website_title = "AN ACT DEFINING TERRORISM, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to define the crime of terrorism and impose the corresponding penalty. It also seeks to bring the crime of terrorism within the coverage of the Anti-Wire Tapping Law and the Anti-Money Laudering Law. It provides for the creation of an Anti-Terrorist Action Council to coordinate, supervise and monitor the counter terrorism efforts of the government."
