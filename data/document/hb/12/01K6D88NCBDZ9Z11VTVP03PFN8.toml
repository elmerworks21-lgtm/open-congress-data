congress_website_title = "AN ACT CHANGING THE SCHOOL CALENDAR FROM JUNE THROUGH MARCH TO SEPTEMBER THROUGH MAY"
congress_website_abstract = "Rationale: The existing school calendar which is yearly scheduled from June through March is no longer suited for the students today, particularly in Central Luzon wherein lahar avalanche spawned by Mt. Pinatubo continue to plague the region, specially during the rainy season. > This bill seeks to CHANGE the school calendar from June through March to September through May."

