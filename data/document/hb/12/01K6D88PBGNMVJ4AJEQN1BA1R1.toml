congress_website_title = "AN ACT TO REGULATE THE PRACTICE OF DENTISTRY, DENTAL HYGIENCE AND DENTAL TECHNOLOGY IN THE PHILIPPINES, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 4419, OTHERWISE KNOWN AS 'AN ACT TO REGULATE THE PRACTICE OF DENTISTRY IN THE PHILIPPINES, AND FOR OTHER PURPOSES', AND REPUBLIC ACT NO. 768, OTHERWISE KNOWN AS 'AN ACT TO REGULATE THE PRACTICE OF DENTAL HYGIENISTS IN THE PHILIPPINES AND FOR OTHER PURPOSES', APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"Philippine Dental Act of 2003\\\". The bill seeks to upgrade the practice of the dentistry profession to keep pace with developments in the field and in allied disciplines and activities particularly on public health and safety. It enumerates and defines the practice of dentists, dental hygienists and dental technologies. The measure also provides for the promotion and development of a continuing dental education and research in the country as well the enforcement of the Code of Ethics and Code of Dental Practice in the Philippines."
