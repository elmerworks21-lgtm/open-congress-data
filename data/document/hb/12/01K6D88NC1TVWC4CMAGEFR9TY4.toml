congress_website_title = "AN ACT DEFINING DOMESTIC VIOLENCE AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Rationale: There is NO enabling law defining and penalizing domestic violence despite the State mandate of protecting the family. It is unable to act in more competent and specific way, and hesitant to provide protection and help to the victims dueto the absence of mandate on who will carry on - what agency shall take such responsbility. > This bill, therefore, seeks to provide institutional and social remedy to the problem of domestic violence."
