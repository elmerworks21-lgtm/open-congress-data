congress_website_title = "AN ACT STRENGTHENING THE MANDATE ON THE INTERCONNECTION BETWEEN AND AMONG PUBLIC TELECOMMUNICATI ONS ENTITIES, PROVIDING PENALTIES FOR ITS VIOLATION AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The telephone industry consisting of landlines and cellular phone has been plagued by many problems, most severe of which is the failure for a phone company to gain access to another. Such failure of interconnection do not only provide inconvenience to individual subscribers but has affected business as well since inaccessibility will bring about waste of time, waste of labor, and loss of opportunity where dispatch and immediate action is necessary to communicate with another party or parties. The proposed bill opens the door for Congress to come out with a law that will impose severe monetary sanctions as well as criminal liability to erring telecoms companies who will now fail to interconnect after the NTC has determined the nnecessity for them to do so."
