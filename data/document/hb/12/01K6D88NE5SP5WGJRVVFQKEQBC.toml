congress_website_title = "AN ACT ESTABLISHING A CENTER FOR TEACHER'S EXCELLENCE IN ALL THE LEGISLATIVE DISTRICTS THROUGHOUT THE COUNTRY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The Department of Education, Culture and Sports shall establish a Center for Teacher's Excellence in all the legislative districts throughout the country, hereinafter referred to as the Center. The Center for Teacher's Excellence shall develop and maintain a continuing program to update the teaching competence and the skills of all the teachers under the Department of Education, Culture and Sports."

