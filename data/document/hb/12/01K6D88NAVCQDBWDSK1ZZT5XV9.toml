congress_website_title = "AN ACT EXPANDING THE COVERAGE OF AND THE CONDUIT NETWORK FOR AGRI-AGRA CREDITS, PRESCRIBING A FIXED PERCENTAGE OF THE FUNDS FOR LENDING TO SMALL FARMERS AND FISHERFOLK, AND FOR OTHER PURPOSES THEREBY AMENDING PRESIDENTIAL DECREE NO. 717, OTHERWISE KNOWN AS THE AGRI-AGRA LAW"
congress_website_abstract = "This billl seeks to REDIRECT CREDIT to where it is direly needed. This proposed measure mandates that fifty percent (50%) of the twenty-five percent (25%) of a bank's total loanable funds reserved for agricultural and agrarian reform credits be extended to the small farmers and fisherfolk and their cooperatives. Moreover, it removes the provision in P>D> 717 which allows banks to divert to government securities the ten percent (10%) agrarian reform share aforecited. And for its strict compliance by the financial institutions, a penalty provision is included."
