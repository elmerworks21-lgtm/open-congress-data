congress_website_title = "AN ACT ESTABLISHING THE MAGNA CARTA FOR COUNTRYSIDE AND BARANGAY BUSINESS ENTERPRISES (CBBEs), GRANTING EXEMPTIONS FROM ANY AND ALL GOVERNMENT RULES AND REGULATIONS AND PROVIDING INCENTIVES AND BENEFITS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Countryside and barangay business enteprises (CBBEs) are those engaged in the production, processing or manufacturing of products with a capitalization of not more than P50,000.00. > to encourage its formation and growth in the countryside, the government should grant non-tax incentives to CBBEs such as access to credit capitalization, technical training support and marketing assistance. This would generate more employment opportunities, help increase the income of the rural people,promote the market for indigenous products."
