congress_website_title = "AN ACT REGULATING DRUG PRICES, CREATING FOR THE PURPOSE THE DRUG PRICES CONTROL BOARD, DEFINING ITS POWERS AND FUNCTIONS, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "\"Drug Prices Control Act of 200\". This bill seeks to impose price controls on medicines in the Philippine in order to bring them to affordable levels. Faced with a steadily deteriorating standard of living, Filipinos today have to further contend with the grim reality of poverty everytime they suffer illnesses or meet accidents that require hospitalization or the purchase of medicines. Most often, the prices of these life-saving drugs are beyond the reach of ordinary Filipinos. > It is therefore, shocking to the sensibilities of those living in other countries to learn that from among all the countries of Asia, the Philippines has comparatively the highest prices of medicines. These prices are sometimes five times higher than those obtainiing in other Asian countries."
