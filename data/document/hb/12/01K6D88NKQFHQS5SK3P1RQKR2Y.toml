congress_website_title = "AN ACT IMPOSING A TEN PERCENT (10%) VOCATIONAL AND TECHNOLOGICAL EDUCATION TAX ON THE RECEIPTS (EXCLUDING VALUE ADDED TAX) FROM CELLULAR PHONE CALLS TO BE BORNE BY CELLULAR PHONE COMPANIES, CREATING A SPECIAL VOCATIONAL AND TECHNICAL EDUCATION FUND,AND FOR OTHER PURPOSES"
congress_website_abstract = "There is hereby created a Special Vocational and Technological Education Fund, which shall be known as the \"VocTech Fund\", and hereinafter referred to as Special Fund, to be constituted from the proceeds of the tax imposed in Section of this Act topromote a comprehensive vocational and technological education program adopted to the needs of the economy, and utilize this knowledge as an effective instrument for the advancement of a globally competitive citizenry through a highly skilled labor force."

