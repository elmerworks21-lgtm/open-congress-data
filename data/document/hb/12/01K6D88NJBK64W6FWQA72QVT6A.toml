congress_website_title = "AN ACT MANDATING THE COMPULSORY INCLUSION IN THE CURRICULA OF ALL SECONDARY SCHOOLS, PUBLIC OR PRIVATE, OF A SUBJECT ON `SUFFRAGE AND THE PRINCIPLES OF DEMOCRACY AND GOOD GOVERNMENT,' AND FOR OTHER PURPOSES"
congress_website_abstract = "Considering the significance of this fundamental right, it is essential that all secondary school students whether public or private, should be able to thoroughly understand their political rights and obligations as citizens by the inclusion of a separate subject on \"Suffrage and the principles of democracy and good government\". It is expected that by the inclusion of this new subject in all secondary schools, we are able to improve the quality of citizen involvement in the electoral processesand ensure the election of qualified leaders to lead our country."

