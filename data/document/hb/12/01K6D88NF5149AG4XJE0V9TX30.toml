congress_website_title = "AN ACT PROVIDING FOR THE REDUCTIONI OF THE FIVE (5)-YEAR QUALIFICATION PERIOD OF JUDGES OF THE METROPOLITAN TRIAL COURT, MUNICIPAL TRIAL COURT OR MUNICIPAL CIRCUIT TRIAL COURT, AMENDING FOR THE PURPOSE SECTION 26 OF BATAS PAMBANSA BLG. 129"
congress_website_abstract = "No person shall be appointed judge of a Metropolitan Trial Court, Municipal Trial Court, or Municipal Circuit Trial Court unless he is a natural-born citizen of the Philippines, at least 30 years of age, and for at least [five years] THREE YEARS, has been engaged in the practice of law in the Philippines, or has held a public office in the Philippines requiring admission to the practice of law as an indispensable requisite."
