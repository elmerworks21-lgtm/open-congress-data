congress_website_title = "AN ACT STRENGTHENING FURTHER AND BROADENING THE COVERAGE OF THE SPECIAL PROGRAM FOR EMPLOYMENT OF STUDENTS, AMENDING FOR THIS PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NO. 7323, AND FOR OTHER PURPOSES"
congress_website_abstract = "The objectives of this proposed measure are as follows: (1) To adjust the income requirement for coverage under the law; (2) To provide a non-diminution and automatic increase for is budgetary allocation; (3) To penalize those who dishonor the education vouchers; (4) To lessen the coverage of employment size of establishment; and (5) To make the program a year-round activity."
