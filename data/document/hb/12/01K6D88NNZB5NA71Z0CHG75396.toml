congress_website_title = "AN ACT TO AMEND ARTICLE 217 OF THE REVISED PENAL CODE MAKING THE FAILURE TO LIQUIDATE CASH ADVANCE WITHIN THE PERIOD PROVIDED THEREIN A PRIMA FACIE PROOF OF MALVERSATION"
congress_website_abstract = "Section thirteen of Article 217 of the Revised Penal Code is hereby amended to add another paragraph to read as follows: > \"In addition, the failure of a public officer or employee, who was previously granted a cash advance, to liquidate the same after the purpose for which it was given has been served within the following periods shall be prima facie proof of malversation or misappropriatio n of the fund he received, to wit: >1. Salaries, wages, etc. - within 5 days after each 15th day/end ofthe month pay period. 2. For petty operating expenses and field operating expenses - within 20 days after the end of the year. 3. For special operations, and operating expenses or purchases of supplies, materials and the like in an amount exceedingg P100,000 - 20 days after the completion of the operation or after the delivery and acceptance of the supplies, materials and the like. 4. For Local travel - within 15 days upon return to his official station. 5. For foreign travel - within 60 days"
