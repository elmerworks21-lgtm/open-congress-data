congress_website_title = "AN ACT GRANTING TAX INCENTIVES TO INDIVIDUAL PERSONS, WHO ARE SINGLE IN CIVIL STATUS AND CHILDLESS, OR WHO, WHILE MARRIED, HAVE REMAINED CHILDLESS OR HAVE OPTED TO ADOPT A CHILD AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Population Control Tax Incentive Law of 2002\". All salaries and wages of individual persons, who are single in civil status and childless, or who, while married, have remained childless, or have opted to adopt a child as a godly gesture of charity to the latter, shall be subject to taxation at a rate of not higher than five percent (5%) per annum only, while being employed in government and private establishments."
