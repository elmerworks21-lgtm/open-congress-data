congress_website_title = "AN ACT AMENDING SECTION 46, CHAPTER 6, BOOK V OF THE ADMINISTRATIVE CODE OF 1987"
congress_website_abstract = "Under the present rules of administrative discipline as provided in the Administrative Code of 1987, a government employees may be penalized even for acts with no negative effect on his/her duties as an officer or employee in the civil service or even if there is no specific connection between the allegedly offending conduct and the civil servant's efficiency in the service. This bill introduces a provision to protect civil servants against arbitrary suspension or dismissal. It stipulates that the grounds for disciplinary action must have \\\"a rational nexus between his/her conduct and his/her duties as an officer or employee in the Civil Service or a reasonably foreseeable specific connection between such conduct and the efficiency of the service rendered by the officer or employee\\\"."
