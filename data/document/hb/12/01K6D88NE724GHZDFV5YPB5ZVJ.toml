congress_website_title = "AN ACT ELEVATING THE RANK OF THE COURT OF TAX APPEALS (CTA) TO THE LEVEL OF A COLLEGIATE COURT WITH SPECIAL JURISDICTION, ENLARGING ITS ORGANIZATIONAL STRUCTURE, EXPANDING ITS JURISDICTION, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF REPUBLIC ACT NO. 1125, AS AMENDED, OTHERWISE KNOWN AS THE LAW CREATING THE COURT OF TAX APPEALS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Presently, the jurisdiction over criminal cases involving violations of the tax and customs laws is lodged with the regular courts, while the civil aspect of these cases is with the Coirt of Tax Appeals, thus resulting into needless delays in the final disposition of cases. Moreover, this delay is further prolonged by the appeal of the cases cognizable by the Court of Tax Appeals to the Court of Appeals."
