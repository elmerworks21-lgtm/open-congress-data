congress_website_title = "AN ACT PROVIDING FOR THE REGULATION OF TAXI COMPANY ACTIVITIES AND PROVIDING THE MECHANICS FOR ITS IMPLEMENTATION"
congress_website_abstract = "\\\"Taxi Transport Practices Regulation Act of 2003\\\". Taxi companies are mandated by their franchise agreement with the Land Transportation Franchising Regulatory Board to convey their passengers to any destination according to the latter's instructions. However, abusive taxi drivers and operators constantly violate this agreement by not conveying passengers citing heavy traffic or too distant destinations as excuses. The measure aims to subject taxi operators and drivers harsher penalties should they commit acts in violation of their franchise agreement. It also provides a mechanism whereby the government can immediately deal with such violations."
