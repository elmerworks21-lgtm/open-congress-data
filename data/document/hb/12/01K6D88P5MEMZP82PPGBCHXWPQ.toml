congress_website_title = "AN ACT IMPOSING PENALTIES ON ANY OWNER/OPERATOR OF A PUBLIC UTILITY VEHICLE VIOLATING THE OUT-OF-LINE OPERATION AND TAMPERING OF LICENSE PLATES, OFFICIAL RECEIPTS, CERTIFICATE OF REGISTRATION OF PUBLIC UTILITY VEHICLES AND/OR CERTIFICATE OF PUBLIC CONVENIENCE AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill provides that: (1) Any owner/operator of a public utility vehicle violating the out-of-line operation shall suffer the penalty of revocation of his Certificate of Public Convenience (CPC) issued by the Land Franchising and Regulatory Board(LTFRB). (2) Any owner/operator of a public utility vehicle found guilty of colorum operations shall, in addition to his liability under the existing law, suffer the penalty of confiscation of his public utility vehicle pursuant to the provision ofPD No. 1729. (3) Any person found guilty of tampering the license plate, official receipt and/or certificate of registration for public utility vehicles shall be required to pay a fine of P50,000.00, without prejudice to his liability under other proovisions of the Revised Penal Code."

