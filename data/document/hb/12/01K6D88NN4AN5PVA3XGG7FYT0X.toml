congress_website_title = "AN ACT AMENDING SECTIONS 447 AND 458 OF REPUBLIC ACT NO. 7160, ALSO KNOWN AS THE LOCAL GOVERNMENT CODE"
congress_website_abstract = "The FILCAB is diverted as a four (4)-wheeled vehicle with a capacity of 11-12 persons. Rationale: At present, it is the Land Transportation Franchising and Regulatory Board (LTFRB) and Land Transportation Office (LTO) that regulate and issue franchises in the operation of filcabs. > Considering that it is the Sangguniang of Cities and Municipalities under the Local Government Code that regulate and issue franchises regarding tricycles, it would be more appropriate for the same sangguniang to regulate and issue franchises with regard to the filcabs.> This bill is therefore, proposed so that filcabs are regulated through the local government units, which are in a better position to determine its use and desirability in their respective areass of jurisdiction."
