congress_website_title = "AN ACT ESTABLISHING BUSINESS ONE-STOP SHOP (BOSS) CENTERS FOR SMALL AND MEDIUM ENTERPRISES IN ALL REGIONAL AND PROVINCIAL CENTERS IN THE COUNTRY"
congress_website_abstract = "This bill seeks to remedy one problem in business start-ups, by making it easier for entrepreneurs and propsective entrepreneurs to fulfill the documentary requirements of starting a business enterprise. This it does by mandating all government agencies taking a hand in business start-ups to situate themselves through a branch or satellite office in the so-called Business One-Stop-Shop or BOSS Center."
