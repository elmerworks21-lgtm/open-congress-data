congress_website_title = "AN ACT GRANTING CIVIL SERVICE ELIGIBILITY TO CONTRACTUAL OR CO-TERMINUOUS GOVERNMENT EMPLOYEES WHO HAVE RENDERED A TOTAL OF FIVE(5) YEARS OF EFFICIENT SERVICE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: In 1990, Republic Act No. 6850 was passed granting civil service eligibility to govenrment employees appointed under provisional or temporary status who have rendered a total of seven (7) years. The law left out contractual and co-terminous government employees from the opportunity to acquire a permanent status, Likewise in 1995 barangay health workers who have rendered five years of continuous service was granted civil service eligibility through Republic Act No. 7883.> If these group of government employees were given such privilege, the same may also be extended to other groups of similar status in accordance with the equal protection clause as guaranteed by the Constitution."
