congress_website_title = "AN ACT PROVIDING FOR INCENTIVES TO THE SHIPBREAKING INDUSTRY PROVIDING PENALTIES FOR VIOLATION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "It is hereby declared the policy of the government to promote, encourage and accelerate the development and growth of the shipbreaking industry to provide an alternate and economical source of iron and steel for the construction industries, to create more job opportunities for Filipino workers, to save and generate foreign exchange earnings, to augment and support the material requirements of the shipping industry and to encourage the replacement of unseaworthy vessels in the interisland fleet."
