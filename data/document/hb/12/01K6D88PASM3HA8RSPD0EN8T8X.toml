congress_website_title = "AN ACT AMENDING ARTICLE 257 OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill aims to strengthen the right of workers to self-organization through the automatic certification of uncontested unions as exclusive bargaining agent. It seeks to amend Article 257 of the Labor Code of the Philippines to provide that \\\"WHERE THERE IS NO OTHER LEGITIMATE LABOR ORGANIZATION FILING A SIMILAR PETITION OR ONE FOR INTERVENTION THEREIN, THE PETITIONING UNION SHALL AUTOMATICALLY BE CERTIFIED BY THE MED-ARBITER AS THE EXCLUSIVE BARGAINING AGENT OF ALL WORKERS IN THE BARGAINING UNIT...\\\" Through automatic certification of lone union-candidates in unorganized establishments, it is foreseen that collective bargaining will be bolstered without prejudicing the will of the employees."

