congress_website_title = "AN ACT CREATING MANPOWER AND LIVELIHOOD TRAINING CENTERS IN ALL MUNICIPALITIES AND APPROPRIATING FUNDS THEREOF"
congress_website_abstract = "This bill proposes to bring education to the grassroots level by creating manpower and livelihood training centers in all municipalities nationwide. In facing the challenges of this \"technological era,\" the quality of a country's labor force and thesize of its technical manpower stock are essential. Productivity growth which arises through successful technology transfer requires workers that have a level of training and a mix of skills appropriate for the needs of the industry, agriculture, and service sector."
