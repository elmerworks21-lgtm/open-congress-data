congress_website_title = "AN ACT INSTITUTING A NATIONAL IDENTIFICATION SYSTEM, CREATING FOR THE PURPOSE THE NATIONAL IDENTIFICATION SYSTEM COUNCIL, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposes to formalize the different identification systems into one uniform system for the entire country which shall be known as the National Identification System (NIS). It will have various subsystems such as the School Identification System (SIS), Professional Identification System (PIS), Voter's Identification System (VIS), Drivers' Identification System (DIS), Social Security System Identification System (SSSIS), Government Service Insurance System Identification System (GSISIS), and the Bureau of Internal REvenue Identification System (BIRIS). >A uniform system is practical and economical to implement. It can properly and efficiently identify persons seeking basic services and social security and reduce if not eradicate ffraudulent transactions and misrepresentati ons. To achieve the realization of such system, a concerted and collaborative effort among the various sectors and government agencies are enjoined."

