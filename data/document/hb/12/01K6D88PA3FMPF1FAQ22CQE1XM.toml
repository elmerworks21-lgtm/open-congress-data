congress_website_title = "AN ACT ABOLISHING THE PUBLIC ESTATES AUTHORITY, CREATING THE PHILIPPINE RECLAMATION AND DEVELOPMENT CORPORATION AND FOR OTHER PURPOSES"
congress_website_abstract = "Recently, the image of the Philippine Estates Authority (PEA) has been seriously sullied by expositions of alleged anomalies such as the \\\"PEA-Amari Deal\\\" and the construction of the Pres. Diosdado Macapagal Boulevard. This prompted Pres. Macapagal-Arroyo to call for the abolition of the PEA. This bill seeks the abolition of the PEA and the creation of the Philippine Reclamation and Development Corporation (PRDC) which shall continue the mandate and functions of the PEA. It further provides certain safeguards to prevent the commission of similar anomalous transactions, viz: (a) that the PRDC's Board of Directors shall include three cabinet secretaries; (b) that all transactions of the PRDC be made strictly in accordance with all laws, rules and regulations on public bidding; and (c) that the PRDC shall adopt and implement a policy of public disclosure and transparency in all its transactions involving public interest."

