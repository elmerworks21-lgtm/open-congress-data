congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED 6768, ENTITLED \"AN ACT INSTITUTING A BALIKBAYAN PROGRAM\""
congress_website_abstract = "Rationale: Complaints aired by the balikbayans themselves have underscored the need to amend some provisions of the law. The forty-eight (48) hour limit given the balikbayan under Republic Act No. 6768 to complete his shopping is not sufficient, especially considering such factors as jet lag, tight family schedules and other matters that the balikbayan has to attend to first upon return. The need to reassess the time limit for shopping is imperative in order to allow the balikbayan ample choice of a convenient shopping time. This proposes amendments to RA 6768 (Balikbayan Law) such as on: (1) Benefits and privileges of the balikbayan; and on (2) Limitations on purchases."
