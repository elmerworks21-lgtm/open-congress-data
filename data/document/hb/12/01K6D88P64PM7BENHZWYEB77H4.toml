congress_website_title = "AN ACT AMENDING FURTHER REPUBLIC ACT NO. 7687, AS AMENDED, PROVIDING CONTINUING FUNDING FROM THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION (PAGCOR) TO AUGMENT THE SCIENCE AND TECHNOLOGY SCHOLARSHIP FUND"
congress_website_abstract = "This amendatory bill seeks to provide a continuing augmentation of the scholarship fund in the amount of Ten Million Pesos (P10,000,000.00 ) per month which shall be granted from the net income of the Philippine Amusement and Gaming Corporation (PAGCOR) to be taken from the fifty percent (50%) share of the national government subject to a ten percent (10%) annual increase. Such amount shall be strictly used to subsidize the beneficiaries' expenses while studying under the scholarship program. Priority to such scholarship shall be accorded to scholars graduating from high schools located in the fifth (5th) and sixth (6th) class municipalities."

