congress_website_title = "AN ACT PROVIDING FOR A P125 DAILY ACROSS-THE-BOAR D INCREASE IN THE WAGE AND SALARY RATES OF EMPLOYEES AND WORKERS IN THE PRIVATE SECTOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill provides that all employers in the private sector, whether agricultural or non-agricultura l, regardless of capitalization and number of employees shall pay their workers an across-the-boar d wage increase in the sum of One Hundred TwentyFive pesos (P125.00) a day upon the effectivity of this Act. > No wage incrase shall be credited as compliance with the increase prescribed herein unless expressly provided under valid collective bargaining agreements; provided, that such wage increase was granted in anticipation of the legislated across-the-boar d wage increase under the Act; and, provided further, that where such increase is less than the prescribed increase under this Act, the employer shall pay the difference. Such increasess shall not include anniversary wage increases, merit wage increases and those resulting from the regularization or promotion of employees."
