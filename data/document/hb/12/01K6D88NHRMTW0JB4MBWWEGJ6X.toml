congress_website_title = "AN ACT AMENDING SECTION 40 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill states that the following are DISQUALIFIED from running for any elective local position: B) THOSE CONNECTED IN THE LOWER COURTS BUT WHOSE CASES ARE PENDING APPEAL, PROVIDED THEY HAVE BEEN CONVICTED FOR AN OFFENSE INVOLVING MORAL TURPITUDEOR FOR AN OFFENSE PUNISHABLE BY AT LEAST FOUR (4) YEARS OF IMPRISONMENT OR FOR ANY CRIME CLASSIFIED AS HEINOUS, FOR THE PERIOD WHEREIN THE CASE IS ON APPEAL PENDING FINAL RESOLUTION BY THE HIGHER COURTS."

