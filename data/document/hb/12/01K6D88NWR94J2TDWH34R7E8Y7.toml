congress_website_title = "AN ACT INSTITUTING THE DANGEROUS DRUGS ACT OF 2001 REPEALING REPUBLIC ACT NO. 6425, AS AMENDED"
congress_website_abstract = "This bill seeks to make a COMPREHENSIVE AMENDMENT to RA No. 6425, the Dangerous Drugs Act of 1972. Salient amendments deal on the following: (1) Increased membership in the Dangerous Drugs Board; (2) Single definition of \"DANGEROUS SRUGS\", and \"DANGEROUS DRUGS PREPARATION\"; (3) Increased penalties and fines; (4) Requirement of mandatory drug testing for applicants of driver's license, permit to carry firearms, employment; and entry into the military service."
