congress_website_title = "AN ACT DECRIMINALIZING CERTAIN OFFENSES IN THE REVISED PENAL CODE"
congress_website_abstract = "Offenses Decriminalized. - The following offenses under the Revised Penal Code are hereby decriminalized: (a) Vagrants as defined in Art. 202. (b) Pre-mature marriage as defined in Art. 351. (c) Abandonment of minor by person entrusted with his custody; indifference of parents as defined in Art. 277. The enactment of the proposed bill also answers one of the causes of a prolonged disposition of criminal offenses thereby contributing to the over clogging of our courts which suppose crimes are but products of omissions, negligence and without necessarily disturbing the peace and order of our community."

