congress_website_title = "AN ACT REQUIRING CERTAIN BUILDINGS, INSTITUTIONS, ESTABLISHMENTS AND PUBLIC UTILITIES TO RESERVE SUFFICIENT AND SUITABLE PARKING OR SEATING SPACES FOR THE USE OF EXPECTANT MOTHERS"
congress_website_abstract = "Notwithstanding any law to the contrary, public and private buildings for public use, educational institutions, airports, sports and recreation centers and complexes, shopping centers or establishments, workplaces, public utilities shall reserve sufficient and suitable parking or seating spaces for the use of expectant mothers. In case of public transportation, devices such as the prominent display of posters or stickers shall be used to generate public awareness of the rights herein instituted and foster understanding of the special circumstances of expectant mothers. Discrimination against expectant mothers in the carriage or transportation of passengers is hereby declared unlawful."
