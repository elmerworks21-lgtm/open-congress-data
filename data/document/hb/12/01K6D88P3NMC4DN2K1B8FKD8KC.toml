congress_website_title = "AN ACT ELEVATING THE RANK OF THE COURT OF TAX APPEALS (CTA) TO THE LEVEL OF A COLLEGIATE COURT WITH SPECIAL JURISDICTION, ENLARGING ITS ORGANIZATIONAL STRUCTURE, EXPANDING ITS JURISDICTION, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF THE LAW CREATING THE COURT OF TAX APPEALS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Presently, the jurisdiction over criminal cases involving violations of the tax and customs laws is lodged with the regular courts, while the civil aspect of these cases is with the Court of Tax Appeals, thus resulting into needless delays in the final disposition of cases. Also, collection cases before the regular courts remain unattended in view of their large caseload. With respect to local tax and real property cases, there is no definite jurisprudence other than decisions of theSupreme Court, which are few and far between, on the matter. > In view of the foregoing and for a better administration of our revenue laws, this bill seeks to amend and revised Republic Act No. 1125 giving the Court of Tax Appeals criminal jurisdicction over tax and customs cases, jurisdiction over collection cases increasing its membership, expanding its organizational set up, and raising its level to that of the Court of Tax Appeals."
