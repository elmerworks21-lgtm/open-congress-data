congress_website_title = "AN ACT GRANTING THE RIGHT TO FRANCHISEES TO DEVELOP THE RURAL AIRPORT INFRASTRUCTURE NETWORK IN THE PHILIPPINES FOR COMMERCIAL AND OTHER PURPOSES"
congress_website_abstract = "Rationale: Our country sorely needs dependable transport systems to make economically convenient and affordable access to and from rural areas. Speedy access between urban and rural areas may be provided only by the construction and maintenance of arural air transport network complemented by the rehabilitation and maintenance of former or existing airports in the remote areas of our archipelago. Government does not have enough to finance the construction of these airports. This bill seeks to provide a way to develop rural airports through the help of the private sector."
