congress_website_title = "AN ACT GRANTING THE BARANGAY NUTRITION SCHOLARS DEPLOYED IN NUTRITIONALLY DEPRESSED MUNICIPALITIES AN ANNUAL TRAVEL ALLOWANCE OF ONE THOUSAND FIVE HUNDRED PESOS (P1,500.00), AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED FIFTEEN HUNDRED SIXTY-ONE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The Barangay Nutrition Scholars plays a vital role in the promotion of community health, backyard food production, environment sanitation, promotion of culture, mental feeding and family planning. Especially in the rural areas, the Barangay Nutrition Scholars devote themselves to the betterment of the health of the community in which they belong. It is sad, however, that these public servants are not properly rewarded for all the efforts that they are extending to the people."

