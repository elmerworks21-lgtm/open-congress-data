congress_website_title = "AN ACT PROVIDING FOR THE QUALIFIED EXEMPTION OF BASIC ALL-PURPOSE UTILITY VEHICLES FROM EXCISE TAXES OR AD VALOREM TAXES PROVIDED BY LAW"
congress_website_abstract = "This bill provides that any four-wheeled motor vehicle, with a wholesale price or cost of production and distribution not higher than Seven Hundred Ninety-Nine Thousand Pesos (P799,000.00) and with a seating capacity of ten persons, shall be considered as BASIC ALL-PURPOSE UTILITY VEHICLE which shall enjoy exemption from excise taxes or ad valorem taxes provided by law."
