congress_website_title = "AN ACT EXPANDING THE TAXING AND OTHER REVENUE-RAISING POWERS OF LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "This measure seeks to AMEND RA 7160, the Local Government Code, in order to EXPAND taxing/revenue- raising power of LGUs. It proposes (1) a general definition of \"AMUSEMENT PLACES\" to cover all types of amusement places; and (2) to allow provincesto impose a tax on businesses enjoying a FRANCHISE, whether national, legislative or local in nature."

