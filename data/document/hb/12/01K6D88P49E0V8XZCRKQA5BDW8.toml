congress_website_title = "AN ACT ESTABLISHING THE PRE-NEED PLAN CODE OF THE PHILIPPINES"
congress_website_abstract = "This bill has the following salient features: (1) Grants the Insurance Commission, instead of the SEC, the authority to supervise and regulare the operation of pre-need plan companies; (2) Provides smooth transition of Regulatory Bodies from the SECto the Insurance Commission; (3) Crafts a law which shall strengthen the Regulator so that is may adjust the Rules Regulating the Industry in acordance with the ever-changing world and environment where pre-need operates in; and (4) Establishes a Planholder's Protection Fund to compensate planholders for the extraordinary losses or damage they may suffer due to business failure or insolvency of a pre-need plan company."
