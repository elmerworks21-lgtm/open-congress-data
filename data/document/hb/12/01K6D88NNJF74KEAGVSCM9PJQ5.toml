congress_website_title = "AN ACT INCREASING PENALTIES FOR VIOLATIONS OF REPUBLIC ACT NO. 7432, OTHERWISE KNOWN AS THE `SENIOR CITIZENS ACT,' AND FOR OTHER PURPOSES"
congress_website_abstract = "ANY PERSON, FIRM, CORPORATION, ASSOCIATION OR ENTITY WHO SHALL VIOLATE THE [Violation of any] provisions of this Act AND/OR ANY RULES OR REGULATIONS ISSUED THEREUNDER for which no penalty is specifically provided under any other law, shall UPON CONVICTION, be punished by imprisonment OF NOT LESS THAN THREE (3) MONTHS BUT NOT MORE THAN ONE (1) YEAR [not exceeding one (1) month], or a fine OF NOT MORE THAN TWENTY THOUSAND PESOS (20,000.00) [not exceeding One Thousand Pesos (P1,000.00)], or both,IN THE DISCRETION OF THE COURT: PROVIDED, THAT IN THE CASE OF A CORPORATION , FIRM, PARTNERSHIP OR ASSOCIATION, THE SAME PENALTY SHALL BE IMPOSED UPON ITS OFFICIALS FOR SUCH VIOLATION."
