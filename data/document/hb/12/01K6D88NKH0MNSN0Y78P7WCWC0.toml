congress_website_title = "AN ACT GRANTING TAXPAYERS WITH DEPENDENT SPECIAL CHILDREN SPECIAL ADDITIONAL INCOME TAX EXEMPTIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "A special additional exemption of Fifty Thousand Pesos (P50,000.00) shall be granted to a single, married, legally separated individual or head of a family for each dependent who is a special child, Provided, That the total number of dependent special children for which this special additional exemption may be claimed shall not exceed four (4) dependents, and Provided, further, that this special additional exemption for dependent special children shall be claimed by only one of the spouses in the case of married individuals."
