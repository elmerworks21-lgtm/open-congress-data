congress_website_title = "AN ACT PENALIZING ANY ADVERTISING AGENCY, TELEVISION OR RADIO STATION AND PUBLICATION WHICH EXPLOIT WOMEN AND GLORIFY SEXUAL VIOLENCE IN ITS ADVERTISEMENTS"
congress_website_abstract = "Advertisement Regulation Act of 2001\". Any advertising agency, television or radio Station and publication which exploit individuals and glorify sexual violence in its advertisements shall, for the first offense, be liable for a fine of not less than Fifty Thousand Pesos (P50,000.00) nor more than Seventy Thousand Pesos (70,000.00) plus suspension of license or permit for thirty (30) days; for the second offense, to a fine of not less than Seventy Thousand Pesos (P70,000.00) nor more than Eighty Thousand Pesos (P80,000.00) plus suspension of license or permit for sixty (60) days; and for the third and final offense, imprisonment of not less than six (6) months nor more than six years or a fine of not less than Eighty Thousand Pesos (P80,0000.00) nor more than One Hundred Thousand Pesos (P100,000.00) or both such imprisonment and fine at the discretion of the court plus cancellation of the license or permit."
