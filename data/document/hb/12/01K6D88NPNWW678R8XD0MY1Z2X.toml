congress_website_title = "AN ACT MAKING THE POSITION OF THE MUNICIPAL AGRICULTURIST MANDATORY, AMENDING FOR THE PURPOSE SECTION 482 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE `LOCAL GOVERNMENT CODE OF 1991'"
congress_website_abstract = "Rationale: If the appointment of the MUNICIPAL AGRICULTURIST is made mandatory, the municipal government is assured that it can rely on the expertise of the agriculturist at all times as he shall be tasked to steer the office for agricultural service and to perform the duties and functions prescribed by law."

