congress_website_title = "AN ACT PROHIBITING THE USE OF NON-BIODEGRADAB LE PLASTIC MATERIALS AS CONTAINERS, BAGS, WRAPPERS OR PACKAGING FOR CONSUMER PRODUCTS AND PROVIDING PENALTIES FOR VIOLATION THEREFOR"
congress_website_abstract = "Rationale: Plastic has taken its toll against our natural environment. It accounts for a great percentage of the urban and industrial waste in the country, most of which are disposed in rivers, esteros, seas, lakes and landfills. Discarded plastic could stay long in the environment and could create an adverse effect it not properly collected and disposed of. If thrown directly into the water, it could create aesthetic problems and may post navigational problems. It may damage the spawning grounds of fish and other aquatic fauna and flora. Plastic could clog the sewer lines and impair the pumping facilities and other equipment of the sewerage system. In farm lands, it may hinder water and air circulations in soil, thereby adversely affectinng plant growth and crop production."

