congress_website_title = "AN ACT PENALIZING ANY GOVERNMENT OFFICIAL WHO REFUSES TO RELEASE IMMEDIATELY A DETAINED PRISONER WHO HAS POSTED BAIL AND/OR CLEARED OF CHARGES BY COMPETENT AUTHORITIES"
congress_website_abstract = "Any government official in any branch of the government who refuses to release immediately a detained prisoner after psoting bail or cleared of the charges by competent authorities shall be punished with an imprisonment equivalent to the penalty provided for by law for the crime for which the illegally detained person has been charged and a fine of not less than Thirty Thousand Pesos (P30,000.00). The law on conspiracy shall aplly in this case."

