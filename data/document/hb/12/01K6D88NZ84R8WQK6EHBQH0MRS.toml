congress_website_title = "AN ACT PROVIDING FOR A WAIVER OF THE RETIREMENT AGE REQUIREMENT OF GOVERNMENT EMPLOYEES, WHO HAVE RENDERED AT LEAST TWENTY (20) YEARS OF SERVICE, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 1146, AS AMENDED, OTHERWISE KNOWN AS THE REVISED GOVERNMENT SERVICE INSURANCE ACT OF 1977"
congress_website_abstract = "This bill seeks to amend Section 13 of Presidential Decree No. 1146 as amended by RA No. 8291, otherwise known as the Revised Government Service Insurance Act of 1977. The primary objective of this measure is to allow government employees to retireafter serving the government for at least twenty (20) years regardless of the retirement age requirement under existing laws. > This measure will certainly help open windows of opportunities for prospective retirees giving them better choice in planning the future of their respective families considering the amount they will receive from retirement benefits while they are still strong and capable of venturing into other fields."

