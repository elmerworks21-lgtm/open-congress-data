congress_website_title = "AN ACT REQUIRING ALL FOOD AND BEVERAGE MANUFACTURERS TO PRINT NUTRITIONAL INFORMATION ON THE PRODUCTS' LABEL AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "All food and beverage manufacturers are hereby required to print on the products' label a nutritional information guide which shall enumerate, among others the vitamins, mineral and fat contents of such products: Provided, That if such product is asignificant source of calorie from fat, saturated fat and cholesterol, its manufacture shall likewise be required to print in legible or bold letters \"WARNING: SIGNIFICANT SOURCE OF CALORIES FROM FAT, SATURATED FAT AND CHOLESTEROL\" on the food labelof such and beverage product. > All importers, consignees, distributors or suppliers of food and beverages which are manufactured abroad and brought into the country, are required prior to the sale or distribution thereof, to print a nutritional infoormation guide as provided for in Section 1 hereof."
