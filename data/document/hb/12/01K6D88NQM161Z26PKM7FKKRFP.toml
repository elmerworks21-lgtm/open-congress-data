congress_website_title = "AN ACT REGULATING HARBOR PILOTAGE SERVICES AND THE CONDUCT OF HARBOR PILOTS IN PHILIPPINE PORTS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Pilotage Services Act of 2001\". This proposal is intended to: a) To ensure safety at all times of port facilities, vessels, passengers, cargoes and other port users; b) To ensure effective and efficient delivery of pilotage services through rationalization of pilotage fees and charges, and upgrading the skills and qualification of harbor pilots; and c) To encourage a healthy and friendly competitive environment among entities engaged in pilotage services."

