congress_website_title = "AN ACT PROMOTING AND REGULATING THE OPERATION OF CABLE TELEVISION IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "The main objective of this bill is to promote and regulate the operation of the cable television industry within the country. This is in recognition of the fact that the delivery of cable television services to subscribers is impressed with public interest. This bill also aims to allow viable competition in the cable television industry to achieve and sustain its growth and to ensure that the same is responsbie to the needs and interests of the subscribers and the general public. Monopoly in the information and communication field must be discouraged, if not prohibited outright."

