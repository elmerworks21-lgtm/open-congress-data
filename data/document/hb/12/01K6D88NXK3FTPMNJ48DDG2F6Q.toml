congress_website_title = "AN ACT TO HELP IMPROVE THE QUALITY OF EDUCATION IN THE COUNTRY BY ALLOWING PUBLIC SCHOOL TEACHERS TO CONCENTRATE ON THEIR TEACHING DUTIES, AMENDING FOR THE PURPOSE SECTION 13 OF REPUBLIC ACT NO. 6646, OTHERWISE KNOWN AS `THE ELECTION REFORM ACT OF 1987,' AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to amend Section 13 by authorizing the Commission of Elections to designate citizens preferably coming from the civic, youth, professional, educational, business and labor sectors to sit in the Board of Election Inspectors (BEI). Thesame guideliens shall be used in choosing the members of the Election Registration of Board of Canvassers, and the canvassing committes. This way, all citizens regardless of their professions or calling shall share the equal burden of ensuring free,orderly, honest, peaceful and credible elections. It also promotes volunteerism, especially among the youth, which is one of the hallmarks of a republic and democracy such as ours."
