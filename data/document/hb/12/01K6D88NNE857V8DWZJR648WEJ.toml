congress_website_title = "AN ACT STRENGTHENING THE NATIONAL NUTRITION PROGRAM, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Nutrition Act of 2001\". This Nutrition Act aims to improve the nutrition status of the country and its citizenry, Specifically, it aims to: (1) Strengthen the National Nutrition Council (NNC) as the policy-making body on nutrition; (2) Provide a policy environment conducive to nutrition improvement; and (3) Provide mechanisms, strategies and approaches in implementing programs and projects to improve nutritional status and to eradicate malnutrition and hunger."
