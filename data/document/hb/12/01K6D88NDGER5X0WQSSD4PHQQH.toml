congress_website_title = "AN ACT CREATING THE PHILIPPINE COFFEE AND TROPICAL FRUITS DEVELOPMENT AUTHORITY, DEFINING ITS POWERS AND FUNCTIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The creation of a national coffee and tropical fruits development authority is aimed at increasing the productivity of the coffee and tropical fruit trees and improving the quality of its fruits. It is also hoped that in the process, theutility of the trees will be maximized. The approval of this bill will not only improve the country's coffee and tropical fruit industry but will also promote national development and progress."

