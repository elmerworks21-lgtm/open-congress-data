congress_website_title = "AN ACT ABSOLUTELY PROHIBITING DISCRIMINATION AGAINST WOMEN IN ALL MATTERS PERTAINING TO EMPLOYMENT, PRESCRIBING PENALTIES FOR VIOLATION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Consistent with this constitutional mandate, the attached bill seeks to prohibit absolutely any act of employer or any person acting on behalf of the employer from discriminating, directly or indirectly, against female employees or workers - or giving preference to male workers - in all matters pertaining to employment or employment opportunities and employment benefits. The prohibited act shall include announcements, publications or advertisements of any kind or any form that would have the effect of denying women equal employment opportunities on account of their being women."
