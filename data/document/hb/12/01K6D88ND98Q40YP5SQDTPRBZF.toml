congress_website_title = "AN ACT INSTITUTIONALIZ ING EARLY CHILDHOOD DEVELOPMENT AND EDUCATION CENTERS FOR CHILDREN AGED ZERO TO FIVE, CREATING THE IMPLEMENTING MACHINERY THEREOF, PROVIDING GUIDELINES, INCENTIVES, GOVERNMENT FINANCIAL SUPPORT AND TECHNICAL ASSISTANCE, AND FOR OTHER PURPOSES"
congress_website_abstract = "The Centers shall develop a program of activities that will focus primarily on the children's total development according to their individual stages of development, with the child's first language as the medium of instruction. They shall also provide the parents with training programs which shall endeavor to include responsible parenthood, as well provide guidance in child rearing, health, nutrition and education."

