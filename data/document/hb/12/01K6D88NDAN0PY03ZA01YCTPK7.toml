congress_website_title = "\"THE REVISED VETERINARY MEDICINE AND SURGERY ACT\""
congress_website_abstract = "Rationale: The importance of animals to man makes imperative the regulation of the profession of those entrusted to manage the country's animal health, to protect man from animal diseases and ensure public nutrition through increased animal production. The protection of public health requires the assurance that veterinarians dedicate their attention to health services."
