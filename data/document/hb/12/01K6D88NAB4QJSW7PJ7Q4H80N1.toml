congress_website_title = "AN ACT CURTAILING THE ILLEGAL ACTIVITIES OF RACKETEERS AND POWERFUL SYNDICATES IN THE PHILIPPINES"
congress_website_abstract = "\"Racketeer-Infl uenced and Corrupt Organization (RICO) Act of 2001\"> The purpose of this measure which is patterned after the RICO (Racketeers Influenced and Corrupt Organization) statute of the United States is primarily aimed at preventing the useof money and power by organized crime syndicates to subvert and corrupt legitimate business by facilitating the prosecution of and imposing stiffer penalties for criminal offenders. It penalizes, as a distinct crim, the act of LAUNDERING (which means to \"transfer funds of dubious or illegal origin and later to recover these from what seem to be \"clean\")."
