congress_website_title = "AN ACT ESTABLISHING THE NEW LABOR CODE OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"New Labor Code of the Philippines\". This bill seeks to establish a new labor code detailing the workers' economic and political rights. This comprehensive measure not only encompasses wages; job security; the workers' rights to organize, engage incollective bargaining and to strike but also occupational health and safety standards; the jurisdiction and extend of the powers of the officials and offices of the government agencies connected to labor and employment, as well as the penalties forviolations of the labor laws when perpetuated by employers and/or with the connivance of labor agencies , and the police and the military."
