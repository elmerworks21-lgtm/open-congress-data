congress_website_title = "AN ACT PROVIDING FOR THE DESIGN AND CONSTRUCTION OF PUBLIC BUILDINGS TO ACCOMMODATE THE PHYSICALLY HANDICAPPED"
congress_website_abstract = "Rationale: Physical or architectural-b arriers are a primary obstacle in limiting the ability of the disabled to live full meaningful lives. In employment, for instance, anti-discrimina tory statutes enacted for the benefit of the handicapped will be of little practical value when the employer can evade compliance with the law by arguing that the applicant cannot get into the place of employment in the first place. In effect, there is a need to first establish \"access\" in order to achieve goalof equal employment opportunity."
