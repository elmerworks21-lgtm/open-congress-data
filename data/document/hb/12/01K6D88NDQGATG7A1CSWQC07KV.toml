congress_website_title = "AN ACT DECLARING A NATIONAL FRAMEWORK FOR THE PROTECTION OF BIODIVERSITY IN TERRESTRIAL, AQUATIC AND AGRICULTURAL RESOURCES AND CREATING THE INSTITUTIONAL MECHANISM FOR ITS IMPLEMENTATION"
congress_website_abstract = "Rationale: It is the policy of the State to conserve the biodiversity of the existing terrestial, aquatic and agricultural resources of the country, document the remaining flora and fauna therein, identify their medicinal and commercial uses and regulate their collection and utilization for the benefit of present and future generations of Filipino citizens."

