congress_website_title = "AN ACT PROVIDING FOR A MORE RESPONSIVE AND COMPREHENSIVE REGULATION FOR THE REGISTRATION, LICENSING AND PRACTICE OF ARCHITECTURE, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 545, AS AMENDED, OTHERWISE KNOWN AS `AN ACT TO REGULATE THE PRACTICE OF ARCHITECTURE IN THE PHILIPPINES' AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The State recognizes the importance of acrhitects in nation building and development. Hence, it shall develop and nurture competent, virtuous, productive and well-rounded professional architects whose standards of practice and service shall be exceelent, qualitative, world-class and globally competitive through inviolable, honest, effective and credible licensure examinations and through regulatory measures, programs and activities that foster their professional growth and development."
