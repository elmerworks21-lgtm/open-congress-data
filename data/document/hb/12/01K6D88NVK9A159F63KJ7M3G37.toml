congress_website_title = "AN ACT PROVIDING FOR A SEPARATE COMPENSATION STRUCTURE FOR THE NATIONAL PROSECUTION SERVICE AND THE LEGAL STAFF OF THE DEPARTMENT OF JUSTICE, AMENDING FOR THE PURPOSE SECTION 5 OF PRESIDENTIAL DECREE NO. 1275"
congress_website_abstract = "Section 5 of Presidential Decree No. 1275 is hereby amended to read as follows: \"Section 5. Compensation. - THE SECRETARY OF JUSTICE IS HEREBY AUTHORIZED TO PREPARE A COMPENSATION STRUCTURE FOR THE NATIONAL PROSECUTION SERVICE (NAPROSS) WHICH SHALLBE BASED ON A COMPREHENSIVE JOB ANALYSIS AND AUDIT OF ACTUAL DUTIES AND RESPONSIBILITIE S AND SHALL BE COMPARABLE WITH THE PREVAILING COMPENSATION PLAN IN THE PRACTICE OF THE LEGAL PROFESSION IN THE PRIVATE SECTOR. SUCH COMPENSATION PLAN SHALL BE SUBJECT TO THE APPROVAL OF THE PRESIDENT OF THE PHILIPPINES. THE COMPENSATION STRUCTURE FOR THE NAPROSS SHALL BE EXEMPT FROM REPUBLIC ACT NO. 6758, OTHERWISE KNOWN AS THE SALARY STANDARDIZATION LAW.\" >THE ABOVE PROVISION SHALL LIKEWISE APPLY TO THE MEEMBERS OF THE LEGAL STAFF OF THE DEPARTMENT OF JUSTICE."
