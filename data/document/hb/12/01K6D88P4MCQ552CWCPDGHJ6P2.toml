congress_website_title = "AN ACT DEFINING AS A CRIME THE ACT OF DRIVING A MOTOR VEHICLE WHILE UNDER THE INFLUENCE OF LIQUOR AND/OR PROHIBITED DRUGS AND PROVIDING GRADUATED PENALTIES THEREFOR"
congress_website_abstract = "Any person found guilty of violating this Act will be penalized by the following: (1) For the first offense a fine of One Thousand (P1,000.00) Pesos and suspension of his license to drive for one year; and (2) For the second offense and all subsequent offense, a fine of Five Thousand (P5,000.00) Pesos and the revocation of his license to drive for five (5) years; provided, that if during the period that the offender's license to drive was suspended or revoked, then in addition to the penalty specified in this paragraph, he/she will be sentenced to one (1) to five (5) years imprisonment."
