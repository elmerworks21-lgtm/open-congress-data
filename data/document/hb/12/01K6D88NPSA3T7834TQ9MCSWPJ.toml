congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF ABSENTEE VOTING AND REGISTRATION FOR QUALIFIED FILIPINOS ABROAD AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The State shall provide a system of absentee voting and registration for qualified Filipinos abroad. Towards this end, the State shall ensure equal opportunity and proper access to all qualified Filipinos abroad in the exercise of this fundamental right."
