congress_website_title = "AN ACT AMENDING ARTICLE 177 OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "Article 177 of the Family Code of the Philippines is hereby amended to read as follows: Only children conceived and born outside of wedlock of parents who, at the time of conception of the former, were not disqualified by any impediment to marry each other may be legitimated. > PROVIDED THAT THOSE CONCEIVED AND BORN TO PARENTS UNDER THE AGE OF MAJORITY (BELOW 18 YEARS OF AGE) MAY BE ELIGIBLE FOR LEGITIMATION BY THE SUBSEQUENT MARRIAGE OF THE PARENTS TO EACH OTHER."
