congress_website_title = "AN ACT CREATING THE POSITION OF TOURISM OFFICER IN ALL PROVINCES, FIRST CLASS MUNICIPALITIES AND CITIES, OR MUNICIPALITIES AND CITIES WHERE TOURISM IS CONSIDERED A MAJOR LOCAL INDUSTRY, AND DEFINING ITS QUALIFICASTIONS , POWERS AND DUTIES, AMENDINGFOR THE PURPOSE CERTAIN SECTIONS OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LICAL GOVERNMENT CODE"
congress_website_abstract = "This bill states that the appointed tourism officer shall be a holder of a college degree with specialized training in tourism administration and a First Grade Civil Service eligible or its equivalent. He must also acquired experience in tourism administration, including tourism management, development and control. > The tourism officer shall have the following powers and functions: (1) formulate measures and provide technical assistance to ensure effective delivery of basic tourism services and access to tourism facilities; (2) develop a tourism master plan in consonance with the national tourism policies of government and implement the same; (3) initiate the support programs and projects that will develop and promote tourism as a major iindustry in the area; (4) coordinate with concerned government agencies, NGOs and private sector involved in tourisml (5) assist the governor or mayor and the concerned regional office of the Department of Tourism in the evaluation of tourism related"
