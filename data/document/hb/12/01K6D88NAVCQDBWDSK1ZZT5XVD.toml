congress_website_title = "AN ACT LEGALIZING JUETENG AND PROVIDING FOR THE CREATION OF THE LOTTERY CORPORATION OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "This proposal is based on the following objectives: (1) To eliminate the corrupting influence of jueteng, especially on public officers; (2) To raise revenue for the government to be used for charitable purposes and programs intended to uplift the conditions of the \"masa\"; and (3) To formulate rules that shall safeguard the interest of the betting public."

