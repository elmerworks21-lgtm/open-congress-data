congress_website_title = "AN ACT TO ENTITLE CHILDREN OF TEACHERS AND EMPLOYEES IN PUBLIC AND PRIVATE INSTITUTIONS OF HIGHER LEARNING TO FREE TUITION AND OTHER SCHOOL FEES"
congress_website_abstract = "Rationale: If government and private institutions of higher learning, because of their own financial limitations, cannot give their teachers decent pay to help them send their children to college, other remedies have to resorted to. This bill seeksto provide one such remedy: exempt children of teachers in public and private secondary institutions of higher learning from paying tuition and other school fees when they enroll at the educational institutions where one or both of their parents areteaching."
