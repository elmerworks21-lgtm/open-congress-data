congress_website_title = "AN ACT PROVIDING FOR SUSTAINABLE MANAGEMENT OF FOREST RESOURCES AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Sustainable management means the ability to meet the needs of the present generation without compromising the ability of future generations to meet their own needs. This is the framework under which the present bill has been crafted. Thebill aims to mark on the ground permanent boundaries for all forest lands as mandated by the 1987 constitution, in order to, among others, to accelerate and sustain the rehabilitation and protection of denuded forest areas, with watersheds as priority."
