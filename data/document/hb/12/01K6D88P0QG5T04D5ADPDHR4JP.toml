congress_website_title = "AN ACT TO ESTABLISH A HIGHER STANDARD OF PROMOTION AND PROTECTION OF THE RIGHTS AND WELFARE OF FILIPINO OVERSEAS SEAFARERS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Overseas Seafarers Act.\" Rationale: Prevailing state of things and available data attest that the Philippines is among the top, if not the No. 1, source of maritime labor in the world. As a matter of fact the Philippines is regarded as the \"manningcapital of the world\". Many of the vessels sailing in the world's oceans and seas are now manned by Filipino seafarers who, through the years, have established a reputation as seafarers who are at par or even more competent and reliable compared with seafarers from any other coutnry in the world. > Given the volume of Filipino overseas seafarers and their considerable annial dollar earnings (about $1.5 billion annually) which help sustain the country's economy and growth, the need to come up wiith a definitive policy legislation that will foster the benefits, rights and protection of seafarers has become more pressing."
