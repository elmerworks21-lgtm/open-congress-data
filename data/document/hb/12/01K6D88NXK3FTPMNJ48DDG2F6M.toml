congress_website_title = "AN ACT TO CREATE A PUBLIC CORPORATION TO BE KNOWN AS THE SCOUTS PHILIPPINES, AND TO DEFINE ITS POWERS AND PURPOSES"
congress_website_abstract = "Rationale: Recent developments around the world has shown that Scouting has become attractice not merely to boys but to girls as well. So that many Scount Associations have given way to the pressure to accept girls into Scouting.> To justify the involvement of ladies in the Organization who are sometimes called \"Boy Scout na Babae\", the National Council, the highest governing body of the Boy Scouts of the Philippines, has approved a resolution urging the change of the corporate name from Boy Scouts of the Philippines to Scouts Philippines during the National Council Meeting held in Cebu City on 26-28 May 2001."
