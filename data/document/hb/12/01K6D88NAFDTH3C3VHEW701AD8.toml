congress_website_title = "AN ACT PROHIBITING AND PENALIZING THE EMPLOYMENT OF CHILDREN IN ANY PUBLIC OR PRIVATE UNDERTAKING OR OCCUPATION WHICH IS CONSIDERED HAZARDOUS TO THEIR LIFE, SAFETY, HEALTH AND MORALS, OR WHICH UNDULY INTERFERES WITH THEIR NORMAL DEVELOPMENT AND FOROTHER PURPOSES"
congress_website_abstract = "Republic Act No. 7658, otherwise known as \"An Act Prohibiting the Employment of Childred Below 15 Years of Age in Public and Private Undertakings\" was enacted specifically banning the hiring of children under fifteen (15) years old, except in certain exceptional cases. Even this law which has reinforced the provisions of the Labor Code against the employment of minors, has notably failed to cover the imperative need without exception of prohibiting the employment of children in the 15-17 agecategory from all forms of hazardous and exploitative occupations and activities."
