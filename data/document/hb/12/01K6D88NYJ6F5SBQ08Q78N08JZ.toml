congress_website_title = "AN ACT ESTABLISHING A FISHERIES AND MARINE SCIENCE HIGH SCHOOL IN EVERY LEGISLATIVE DISTRICT OF THE COUNTRY, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Fishing is an occupation wherein most Filipinos are engaged in a primary means of livelihood. The immediate mobilization of manpower in the fisheries field will surely accelerate economic growth in the country. Hence, the need to upgradethe secondary curriculum to integrate thereto science and technology subjects that will provide students with skills and training in fisheries and marine sciences, and broadened the students' knowledge, capabilities and appreciation for fishereies and marine technologies."
