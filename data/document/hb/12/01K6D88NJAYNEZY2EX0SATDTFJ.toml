congress_website_title = "AN ACT REGULATING THE OPERATION OF SCHOOL TRANSPORT SERVICES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Schoolchildren Safety Act of 2001.\" It is hereby declared the policy of the State to secure and safeguard its citizens, particularly the passengers of school transportation services, from the risks of vehicular accidents while riding to and from school. The State shall enforce requirements that will ensure the safety of schoolchildren/ students who avail of private school transport services."

