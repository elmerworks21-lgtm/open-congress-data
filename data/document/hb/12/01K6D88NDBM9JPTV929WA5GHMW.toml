congress_website_title = "AN ACT INSTITUTIONALIZ ING THE RICE RESEARCH PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Our country is presently suffering from acute rice shortage. The government has to import rice from other countries when the Philippines is supposed to be an agricultural country. It is to be noted also that the farmers are maong the poorest of the poor in this country. > To solve these problems, there is a need for intensified research efforts that would balance the increased yield with sustainable production, and using a system that is environmentally safe."
