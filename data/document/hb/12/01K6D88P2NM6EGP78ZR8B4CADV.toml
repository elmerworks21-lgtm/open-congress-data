congress_website_title = "AN ACT AMENDING SECTION 286 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF THE PHILIPPINES, PROVIDING FOR THE AUTOMATIC APPROPRIATION AND RELEASE OF THE INTERNAL REVENUE ALLOTMENT (IRA) OF LOCAL GOVERNMENT UNITS"
congress_website_abstract = "SECTION 1. Paragraph (a) of Section 286 of Republic Act 7160, otherwise known as the \"Local Government Code of the Philippines,\" is hereby amended to read as follows: \"SEC. 286. Automatic APPROPRIATION AND Release of Shares. - (a) The ANNUAL INTERNAL REVENUE ALLOTMENT SHALL BE AUTOMATICALLY APPROPRIATED and the share of each local government unit TO THE SAME shall be REGULARLY released, without need of any further action, directly to the provincial, city, municipal or barangay treasurer, as thecase maybe, on a quarterly basis within five (5) days at the end of each quarter, and which shall not be subject to any lien or holdback that may be imposed by the National Government for whatever purpose. > (b) x x x\""

