congress_website_title = "AN ACT RATIONALIZING THE IMPORTATION OF RICE, PROHIBITING THE RE-MILLING, REPACKING AND MIXING OF IMPORTED AND LOCAL RICE VARIETIES, AND FOR OTHER PURPOSES"
congress_website_abstract = "This proposed measure declares it unlawful for any person to import rice which are over two (2) months old from the time it has been milled from the country of origin. It prohibits any person or entity to re-mill or repack imported milled rice, or mix imported rice with any local variety, for sale to the public. Only legitimate rice millers shall be allowed to possess rice polishing machines. Possession of such used to re-polich or re-mill imported milled rice shall be confiscated in favor of the government."
