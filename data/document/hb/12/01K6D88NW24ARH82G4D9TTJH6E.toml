congress_website_title = "AN ACT REQUIRING THE LOCAL GOVERNMENT UNITS TO CONDUCT A QUARTERLY BREAST CANCER DETECTION PROGRAM"
congress_website_abstract = "The Local Government Units are hereby directed, thru its local health officers and in close coordination with the Deaprtment of Health, to hold a quarterly manual or mammogram breast cancer screening program. The Program will utilize the services ofthe Barangay/Munici pal/City/Provin cial Health Workers in identifying breast cancer cases and positive cases will be immediately referred to public health hospitals for treatment, management and rehabilitation. The Health Workers concerned shall then maintain case records on each individual found positive of breast cancer."
