congress_website_title = "AN ACT PROVIDING FOR THE VENUE OF THE CRIMINAL AND CIVIL ACTION IN LIBEL CASES AGAINST COMMUNITY JOURNALIST, PUBLICATIONS OR BROADCAST STATIONS"
congress_website_abstract = "The prevailing rules on venue of action on libel cases place community journalists and local broadcasters in situations where they have to answer complaints or charged filed, deliberately, in remote or distant places. This may lead to a miscarriage of justice in cases where the accused or defendant fails to appear because of distance and travel constraints. This measure proposes to set the venue for the filing of criminal and civil action in libel cases against community journalists, publications or broadcast stations in the Regional Trial Court of the province or city where the principal office or place of business of said community journalist, publication or broadcast station."

