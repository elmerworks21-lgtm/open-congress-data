congress_website_title = "AN ACT ABOLISHING THE DEATH PENALTY AND IMPOSING THE PENALTY OF QUALIFIED RECLUSION PERPETUA IN LIEU THEREOF, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7659 OR THE DEATH PENALTLAW, ACT 3815, OTHERWISE KNOWN AS THE REVISED PENAL CODE, AS AMENDED, ANDOTHER SPECIAL LAWS"
congress_website_abstract = "Any person sentenced to Qualified Reclusion Perpetua shall serve his sentence until his natural death without benefit of loyalty and good conduct allowance, commutation, parole or pardon. All persons who have been meted out the death penalty by final judgement shall have their sentences commuted to Qualified Reclusion Perpetua."
