congress_website_title = "AN ACT FURTHER AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 6948 OTHERWISE KNOWN AS `AN ACT STANDARDIZING AND UPGRADING THE BENEFITS FOR MILITARY VETERANS AND THEIR DEPENDENTS,' AS AMENDED BY REPUBLIC ACT NO. 7696"
congress_website_abstract = "The bill seeks to allow the benefits granted or unclaimed during the lifetime of a decesed veteran to accrue to his or her heirs according to the law on succession. Many veterans, have died even before enjoying their benefits. It is also true that should the veterans have enjoyed such benefits, it was so for just a considerably short period of time, as most of them were already in their twilight years. It is, thus, just and fair for the Government to give importance and recognition to our veterans even when they have already passed away, by way of extending their benefits to their rightful heirs."

