congress_website_title = "AN ACT INCREASING THE COMPENSATION OF WATER DISTRT BOARD th MEMBERS AND PROVIDING SECURITY OF TENURE FOR GENERAL MANAGERS OF WATER DISTRICTS, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 198, OTHERWISE KNOWN AS THE PROVINCIAL WATER UTILITIES ACT OF 1973"
congress_website_abstract = "This bill proposed amendments to PD No. 198, e Provincial Water Utilities Act of 1973, such as: (1) Any per diem in excess of [P50] P150 shall be subject to the approval of the Administration. IN ADDITION THERETO EACH DIRECTOR SHALL RECEIVE ALLOWANCES AND BENEFITS AS THE BOARD MAY PRESCRIBE SUBJECT TO THE APPROVAL OF THE ADMINISTRATION; and (2) At the first meeting of the Board, or as soon thereafter as practicable, the Board shall appoint, by a majority vote, a general manager and shall definehis duties and fix his compensation. Said officer shall serve [at the pleasure of the Board] FOR A TERM OF FOUR (4) YEARS SUBJECT TO CONTINUOUS REAPPOINTMENT AT THE DISCRETION OF THE BOARD. DURING HIS TERM, HE SHALL NOT BE REMOVED FROM OFFICE EXCEPTT FOR CAUSE AND AFTER DUE PROCESS."

