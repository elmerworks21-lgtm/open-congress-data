congress_website_title = "AN ACT EXEMPTING ALL COOPERATIVES FROM ALL TAXES, LEVIES, DUTIES, FEES AND OTHER CHARGES, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED AND THIRTY-EIGHT, OTHERWISE KNOWN AS THE COOPERATIVE CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: Since the objective of cooperatives is to provide maximum service to its members, they must not be burdened by payments of so many taxex, levies, duties and other fees. In view of the foregoing, approval of this bill is highly recommended."
