congress_website_title = "AN ACT TO EXEMPT SENIOR CITIZENS FROM THE PAYMENT OF REAL PROPERTY TAX ON THEIR FAMILY HOMES AND THE LAND ON WHICH IT IS SITUATED, AMENDING FOR THE PURPOSE SECTIONS 2 AND 4 OF REPUBLIC ACT NUMBERED SEVEN THOUSAND FOUR HUNDRED AND THIRTY-TWO"
congress_website_abstract = "As used in this Act, the term \"senior citizens\" shall mean any resident citizen of the Philippines at least sixty (60) years old, including those who have retired from both government facilities or enterprises, and has an income of not more than [sixty (P60,000)] NINETY-SIX (P96,000) thousand pesos per annum subject to review by the National Economic and Development Authority (NEDA) every three (3) years."
