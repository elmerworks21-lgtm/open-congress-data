congress_website_title = "AN ACT REQUIRING PUBLISHERS OF ALL BOOKS TO FURNISH CERTAIN GOVERNMENT LIBRARIES AND STATE UNIVERSITIES PRINTED BOOKS FREE OF CHARGE AND PROVIDING CERTAIN PRIVILEGES THEREFOR"
congress_website_abstract = "\"Book Dissemination Act.\" This bill seeks to disseminate all published books or textbook free of charge to government libraries and state universities and make them easily accessible to the public without cost and likewise to provide depositories ofthese books to preserve for posterity ang against unforeseen events. This bill likewise endeavor to encourage book publishes to disseminate as many books to state universities by giving them 100% tax credit of the value of the books actually disseminated. This will eventually benefit the government as it will save a large sum of money in acquiring book for its universities."
