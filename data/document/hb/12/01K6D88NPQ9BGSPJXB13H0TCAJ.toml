congress_website_title = "AN ACT STRENGTHENING THE CAPABILITY OF THE BUREAU OF FOOD AND DRUGS (BFAD) BY ESTABLISHNG ADEQUATE TESTING LABORATORIES AND REGIONAL FIELD OFFICES, UPGRADING ITS EQUIPMENT, CREATION OF A DRUG ENFORCEMENT UNIT UNDER ITS OPERATIONAL AND ADMINISTRATIVECONTROL, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"BFAD Empowerment Act of 2001\". Rationale: There is a need to transform Bureau of Food and Drugs (BFAD) into a more and credible regulatory agency, and to borrow the words of the UP Policy Review Team, one whose integrity and credibility are above reproach and if possible, beyond any reasonable doubt. To achieve, this it is vital, among other thinds not only to provide adequate funding for the agnecy but more importantly, introduce major administrative reforms in BFAD to strengthen the capability of BFAD's regulatory functions of licensing, registration and monitoring, and more specifically in the following aspects: (1) Human resources in the field; (2) Augmentation of existing laboratories and upgrading their equipment; (3) Operational buudget; and (4) Creation of a drug enforcement unit under its operational and administrative control."
