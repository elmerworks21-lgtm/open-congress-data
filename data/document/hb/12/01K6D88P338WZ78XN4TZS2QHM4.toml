congress_website_title = "AN ACT INCREASING THE PENALTIES FOR JUETENG AND OTHER ILLEGAL NUMBERS GAMES, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE 1602, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill substantiates the policy of the State to eradicate jueteng and other illegal number games which have become a widespread social menace and source of corruption. Towards this end, the State shall adopt measures to deter the continued operation of jueteng and other illegal numbers games in any part of the country.> This bill likewise, specifies the penalties for jueteng, masiao, last two or other illegal numbers games or variants thereof. It has a provision on the LIABILITY of GOVERNMENT OFFICIALS."
