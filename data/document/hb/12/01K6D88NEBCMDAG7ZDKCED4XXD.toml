congress_website_title = "AN ACT PROVIDING ASSISTANCE TO PRIVATE HOSPITALS BY GRANTING INCENTIVES AND ESTABLISHING A PRIVATE HOSPITAL DEVELOPMENT PLAN"
congress_website_abstract = "Rationale: Private hospitals comprise 70.5% of the country's total number of hospitals. The government should help make the operations of these hospitals economically viable since the quality of service depend on the viability of their operations. Discontinuance of services by any hospital due to financial failure means an added drain on the scarce health resources of the government. More importantly, government assistance to private hospitals will help make hospital costs more affordable. Incentives to hospital dispersal to underserved/uns erved areas will likewise make health services accessible to the people."
