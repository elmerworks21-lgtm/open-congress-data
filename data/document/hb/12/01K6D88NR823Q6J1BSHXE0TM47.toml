congress_website_title = "AN ACT REQUIRING THE ESTABLISHMENT OF PROVINCIAL, CITY, MUNICIPAL AND BARANGAY LIBRARIES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Within the second calendar year following the approval of this Act, there shall be established a library in each province, city anf first to third class municipalities. Municipalities belonging to fourth class or tower category and barangays with anannual income of at least Five Million Pesos (P5,000,000.00) shall comply with this Act within five (5) years from its approval. Lower class barangays may establish their libraries when their respective annual incomes reach P5,000,000.00."

