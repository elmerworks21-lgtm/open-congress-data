congress_website_title = "AN ACT INCREASING THE FIVE PERCENT (5%) YEAR-END BONUS OF GOVERNMENT EMPLOYEES FROM FIVE PERCENT (5%) TO EIGHT PERCENT (8%), APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The year-end bonus of local and national government employees amounting to five percent (5%) shall be increased to eight percent (8%). > Casual employees who have rendered at least twelve (12) months continuous or uninterrupted service upon the effectivity of this Act or thereafter shall also be likewise granted this increased year-end bonus."
