congress_website_title = "AN ACT REQUIRING CERTAIN TOURISM-ORIENTE D BUSINESS ESTABLISHMENTS TO SECURE ACCREDITATION FROM THE DEPARTMENT OF TOURISM AS A PREREQUISITE TO THE ISSUANCE OF LICENSE OR PERMIT TO OPERATE BY LOCAL GOVERNMENT UNITS"
congress_website_abstract = "This bill seeks to make accreditation by the Department of Tourism mandatory for certain major tourism-oriente d establishments, specifically hotels, resorts, tourist inns, motels, apartels, tour guiding agencies, tour transport operators, travel agencies, tour operators and professional congress organizers, prior to the issuance of permit or license to operate by the respective LGUs. It aims to strengthen the coordination between the Department of Tourism and the local government units with the end in view of making tourism establishments in the country meet world class standards."
