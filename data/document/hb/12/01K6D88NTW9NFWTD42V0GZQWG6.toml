congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A PHILIPPINE CITIZENSHIP IDENTIFICATION SYSTEM"
congress_website_abstract = "There shall be established a Philippine citizenship identification (ID) system in the Philippines to be administered by the Bureau of Immigration, which is hereby mandated to determine, validate and issue certificates of citizenship to all Filipinocitizens in accordance with existing laws. All Filipino citizens, who have reached the age of majority, shall be required to secure a citizen's ID card as provided for by this Act."

