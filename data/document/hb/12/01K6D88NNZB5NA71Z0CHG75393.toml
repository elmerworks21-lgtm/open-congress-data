congress_website_title = "AN ACT REGULATING HARBOR PILOTAGE SERVICES AND THE CONDUCT OF HARBOR PULOTS IN ALL PORTS IN THE PHILIPPINES AND FOR RELATED PURPOSES"
congress_website_abstract = "It is hereby organized by the State that pilotage service in an inherent function of the Philippine Ports Authority (PPA) as it plays vital and complementary role in the efficient operation of ports. It is therefore its policy to regulate, controland supervise pilotage services and the conduct of pilots in all ports in the country to attain the following objectives: > a) To ensure the safety of port facilities, vessels and their passengers and cargoes; b) To ensure efficient pilotage serviceat all times, rationalize charges therefor and professionalize harbor pilots; and c) To foster competition in the provision of pilotage services."

