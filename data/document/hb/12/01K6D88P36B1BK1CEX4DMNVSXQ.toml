congress_website_title = "AN ACT PROVIDING PENALTIES FOR SCHOOLS, COLLEGES AND UNIVERSITIES WHICH REFUSE ADMISSION OF QUALIFIED SCHOLARS OF THE PHILIPPINE VETERANS AFFAIRS OFFICE"
congress_website_abstract = "In the implementation of R.A. No. 6948, as amended, entitled, \"An Act Standardizing and Upgrading the Benefits for Military Veterans and their Depedents\", any school, college or university which shall refuse admission of qualified scholars of the Philippine Veterans Affairs Office (PVAO) for reason of delayed payment of tuition and other fees by the PVAO shall, after due notice and hearing, be penalized by a fine of not less than Ten Thousand Pesos (P10,000.00) for the first offense; Twenty Thousand Pesos (P20,000.00) for the second offense; and Fifty Thousand Pesos (P50,000.00) for the third offense."

