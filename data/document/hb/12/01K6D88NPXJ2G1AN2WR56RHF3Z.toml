congress_website_title = "AN ACT AMENDING SECTION 14 (J) OF REPUBLIC ACT NUMBERED EIGHTY-FIVE HUNDRED AND FIFTY-ONE, EXTENDING THE REGLEMENTARY PERIOD FOR THE SATISFACTION OF THE MINIMUM EDUCATIONAL QUALIFICATION FOR AN APPOINTMENT TO THE PHILIPPINE NATIONAL POLICE TO FIVE (5) YEARS"
