congress_website_title = "AN ACT PROVIDING FOR THE EXTENSION OF EXEMPTION FROM INCOME TAX ON INCOME DERIVED FROM PHILIPPINE OVERSEAS SHIPPING, AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NO. 7471, OTHERWISE KNOWN AS THE PHILIPPINE OVERSEAS SHIPPING DEVELOPMENT ACT"
congress_website_abstract = "Rationale: An Overseas Shipping Act was passed in 1955 granting incentives to the sector. Terms for acquiring vessels under this Act were a disincentive to the acquisition and disposition of vessels because it lacked the flexibility needed by ship owners to quickly purchase and dispose of vessels. The incentives under this law expired in 1985. New incentives were given to the sector in 1992. The incentives granted by this law will expire in 2002. > We need strengthen our overseas shipping so that vessels owners will be encouraged to serve more of our trade and carry at least 50% of our import and export trade by 2010."

