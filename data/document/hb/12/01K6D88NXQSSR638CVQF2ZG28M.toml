congress_website_title = "AN ACT TO DEFINE AND GUARANTEE PUBLIC SECTOR UNIONISM IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Public Sector Unionism Act of 2001\". Under this proposed measure and consistent with the aforesaid constitutional provision, a duly recognized union of government employees is ensured of the right to act as official body representative of its members for purposes of collective bargaining and negotiations. This bill further put in place a mechanism that ensures the recognition of the right of government workers/employe es for a peaceful assembly and their right to petition government to rause and ease their grievances. > This bill, likewise, seeks to create a PUBLIC SECTOR LABOR RELATIONS BOARD which shall gurantee government employees the right to self-organizati on and collective bargaining."

