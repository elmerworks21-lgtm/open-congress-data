congress_website_title = "AN ACT REVISING THE START OF THE SCHOOL CALENDAR FROM JUNE THROUGH MARCH TO SEPTEMBER THROUGH MAY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7797, AND FOR OTHER PURPOSES"
congress_website_abstract = "Typhoons generally visit the country from June to August. During the period, students are exposed to the hazards brought about by floods, traffic, landslides, and water-borne diseases outbreak, among others. School buildings are also used as evacuation and health centers during floods. This measure proposes to revise the school schedule by moving the start of the school calendar, gradually, from June to September. This would spare students from the hazards brought about by typhoons."
