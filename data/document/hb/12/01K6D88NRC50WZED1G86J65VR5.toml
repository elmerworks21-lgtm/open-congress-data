congress_website_title = "AN ACT INCREASING THE QUARTERS ALLOWANCE OF OFFICERS AND ENLISTED PERSONNEL OF THE ARMED FORCES OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "The officers and enlisted personnel of the Armed Forces of the Philippines shall be provided with housing facilities consistent with the requirements of the service. Allowance per capita shall be provided for all officers and enlisted personnel to attain this objective. Such allowances may be commuted if no housing facilities can be made available. >In order to upgrade the morale of the Armed Forces of the Philippines, the quarters allowance for married officers and enlisted personnel shall beadjusted in accordance with the following rate: OFFICERS - MONTHLY; General - P1,800.00; Lieutenant General - 1,700.00; Major General - 1,600.00; Brigadier General - 1,500.00; Colonel - 1,400.00; Lieutenant Colonel - 1,300.00; Major - 1,200.00; Captaain - 1,100.00; First Lieutenant - 1,000.00; Second Lieutenant - 900.00; ENLISTED PERSONEL; Master Sergeant - 800.00; Technical Sergeant - 750.00; Staff Sergeant - 700.00; Sergeant - 650.00; Corporal - 600.00; Private First Class - 550.00; Private -"
