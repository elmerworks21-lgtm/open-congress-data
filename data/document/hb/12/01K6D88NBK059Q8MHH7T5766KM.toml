congress_website_title = "AN ACT PROVIDING FOR THE SUSTAINABLE MANAGEMENT OF FOREST RESOURCES AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to institutionaliz e a new but theory-based management system for the country's forest resources, the Community-Based Forest Management (CBFM) strategy. As the major strategy in forest resource management, (CBFM will pave the way for the DIRECT PARTICIPATION of some twenty million (20M) forest resident families and indigenous communities who are currently occupying the country's forestlands, as partners of the State in protecting the forest from poachers and illegal loggers andimplementing reforestation programs."
