congress_website_title = "AN ACT PROVIDING FOR A MANDATORY COURSE ON HUMAN RIGHTS FOR ALL OFFICERS, MEMBERS AND TRAINEES OF THE ARMED FORCES OF THE PHILIPPINES (AFP), THE PHILIPPINE NATIONAL POLICE (PNP), THE NATIONAL BUREAU OF INVESTIGATION (NBI), AND OTHER LAW ENFORCEMENTAGENCIES AND FOR OTHER PURPOSES"
congress_website_abstract = "For law enforcers to understand, appreciate and respect the rights of others, human rights education is a must. This bill, therefore, aims to ensure that officers, members and prospective members of law enforcement agencies be given at least a working knowledge of due process of law and human rights - its protection and promotion."
