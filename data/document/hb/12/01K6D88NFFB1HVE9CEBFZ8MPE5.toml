congress_website_title = "AN ACT PROVIDING FOR A FIVE(5)-YEAR WARRANTY PERIOD FOR GOVERNMENT INFRASTRUCTURE CONTRACTS, AMENDING PRESIDENTIAL DECREE NO. 1594 `PRESCRIBING POLICIES, GUIDELINES, RULES AND REGULATIONS FOR GOVERNMENT INFRASTRUCTURE CONTRACTS', AND FOR OTHER PURPOSES"
congress_website_abstract = "The contractor shall assume full responsibility for the contract work FROM THE TIME PROJECT CONSTRUCTION COMMENCED until FIVE (5) YEARS FROM its final acceptance by the Government and shall be held responsible for any damage or destruction of worksexcept those occasioned by force majeure. Except likewise for force majeure, the contractor shall be fully responsible for the safety, protection, security, and convenience of his personnel, third parties, and the public at large, as well as the works, equipment, installation and the like to be affected by his contraction work."
