congress_website_title = "AN ACT PROHIBITING THE ESTABLISHMENT OF POLITICAL DYNASTIES"
congress_website_abstract = "The history of Philippine politics is said to be history of successive families or clans who had dominated and continue reigning in both local and national policis. Among the first serious steps taken by a politician once elected to public office isto build strong political base that will ensure not only his re-election but also that such electoral support will extend to his spouse or descendents or next-of-kin. The abuses and corruption spawned by this system of patronage characteristic of the old political order under martial law has also aggravated the peace and order problem by further feeling discontented among the rebels and their mass sympathizers."
