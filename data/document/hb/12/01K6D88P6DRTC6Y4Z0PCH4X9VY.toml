congress_website_title = "AN ACT REQUIRING ALL CONSUMER PRODUCTS TO SPECIFY IN THEIR RESPECTIVE LABELS THE NUTRITION INFORMATION THAT EACH CONSUMER PRIDUCT CONTAINS, AMENDING FOR THE PURPOSE ARTICLE 77 OF REPUBLIC ACT NO. 7394, ALSO KNOWN AS THE CONSUMER'S ACT OF THE PHILIPPINES"
congress_website_abstract = "In order to correctly inform the public of the nutritional contents of any goods that consumers purchase in the market, this proposed measure requires all consumer products domestically sold whether manufactured locally or imported to indicate the amount of the following nutrients: (1) total fat, saturated fat, cholesterol, sodium, total carbohydrates, complex carbohydrates, sugars, dietary fiber and total protein contained in each serving size or unit of measure; (2) whether the product contains artificial flavoring, artificial coloring and chemical preservatives."

