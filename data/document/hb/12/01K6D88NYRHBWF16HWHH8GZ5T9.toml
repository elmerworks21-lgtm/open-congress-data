congress_website_title = "AN ACT AMENDING ARTICLE 316 OF ACT NO. 3815, OTHERWISE KNOWN AS THE REVISED PENAL CODE OF THE PHILIPPINES INCREASING THE PENALTY THEREFOR(RE: PENALIZING AN ACT OF PRETENDING TO BE AN OWNER OF REAL PROPERTY AND CRIMES RELATED THERETO)"
congress_website_abstract = "Rationale: The act of pretending to be an owner of real property and conveying, selling encumbering or mortgaging the same as well as encumbering a real property knowing that the same is already encumbered is penalized under Article 316 of the Revised Penal Code (Act 3815). The said law however, hardly has any teeth as it failed to deter further violations of the same. This is because conviction under the said law is merely punished by an imprisonment of arresto mayor in its minimum and mediumperiod or from one (1) month to four (4) months only. Those charged in court for the said violation is not even required to post bail for his/temporary liberty.> This bill seeks to restrain further violations of the above stated lay by increasing thee penalty in the crime called other forms of swindling."

