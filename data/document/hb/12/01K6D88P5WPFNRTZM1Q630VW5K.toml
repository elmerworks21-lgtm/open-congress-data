congress_website_title = "AN ACT PROVIDING FOR PROTECTION TO CONSUMERS IN THEIR CREDIT CARD TRANSACTIONS"
congress_website_abstract = "\"Credit Card Consumer Protection Act of 2002.\" This bill provides protection to credit card consumers by: (1) providing relief to customers in case of billing errors through a system of feedback and inquiries between the cardholders, the retailers and the card issuers; (2) shielding credit card consumers from any untrue credit information to any other person concerning a cardholder; (3) promoting the availability of discounts by retailers intending to sell lower priced goods and services through the use of credit cards; (4) prohibiting the imposition of surcharges on a cardholders who opts to use a credit card in payment for goods and services; and (5) putting a ceiling on interest charges for late payments."

