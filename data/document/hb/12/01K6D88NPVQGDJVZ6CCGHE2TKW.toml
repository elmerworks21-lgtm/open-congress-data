congress_website_title = "AN ACT EXPANDING THE EXEMPTION OF CENTRAL BANK EMPLOYEES FROM THE COVERAGE OF REPUBLIC ACT NO. 6758, OTHERWISE KNOWN AS \"THE COMPENSATION AND POSITION CLASSIFICATION ACT OF 1989,\" AMENDINFOR n THE PURPOSE REPUBLIC ACT NO. 7653, OTHERWISE KNOWNAS THE \"THE CENTRAL BANK ACT\""
congress_website_abstract = "Rationale: At present, employees of the Central Bank with salary grades twenty (20) and above are exempted from the salary standardization law. Those employees with salary grades ineteen (19) and below are covered by the said law. This creates a gapbetween employees with salary grades twenty (20) and above and nineteen (19) and below and will give rise to demoralization and dissatisfaction among those not covered. > This proposed measure makes the exemption applicable to all employees regardless of salary grades they have in order to prevent the proliferation of displeasure of those employees of the Central Bank covered by the salary standardization law."

