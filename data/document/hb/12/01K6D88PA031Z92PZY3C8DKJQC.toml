congress_website_title = "AN ACT AMENDING SECTION 3 (B) OF REPUBLIC ACT NO. 3518, AS AMENDED BY REPUBLIC ACT NO. 7169, ENTITLED \\\"AN ACT CREATING THE PHILIPPINE VETERANS BANK AND FOR OTHER PURPOSES\\\""
congress_website_abstract = "At present, World War II veterans, their widows or heirs are given, at most, 20 shares of stock of the Veterans Bank. These veterans can purchase additional shares of stock should they wish to own more shares than what the government has provided for them. This bill aims to limit the ownership of shares of stock of the Veterans Bank to 1,000 shares per veteran, widow or compulsory heir. It also allows veterans other than World War II veterans to own shares of stock of the Veterans Bank up to a maximum of 1,000 shares only. Shares which were subscribed or owned in excess of 1,000 units shall be sold back to the Bank or to other veterans at the prevailing fair market value."

