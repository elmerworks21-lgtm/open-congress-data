congress_website_title = "AN ACT ALLOWING NATURAL-BORN FILIPINO CITIZENS WHO HAVE BEEN NATURALIZED FOREIGN CITIZENS TO ENJOY CERTAIN RIGHTS AND PRIVILEGES RESERVED FOR FILIPINO CITIZENS WITHOUT RENOUNCING THEIR CITIZENSHIP IN THEIR ADOPTIVE COUNTRIES"
congress_website_abstract = "Natural-born citizens of the Philippines who have been naturalized citizens in other countries shall enjoy the rights and privileges enjoyed by Filipino citizens without renouncing their citizenship in their adoptive countries. Some of the RIGHTS AND PRIVILEGES referred to are: (1) To vote and run for public office, except as President and Vice President; (2) To seek employment; (3) To exploit the country's natural resources; (4) To operate public utilities, rural banks; (5) To engage in retail trade, etc."
