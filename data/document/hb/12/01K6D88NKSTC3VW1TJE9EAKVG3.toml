congress_website_title = "AN ACT ESTABLISHING A NATIONAL PUBLIC LIBRARY SYSTEM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The purpose of this Bill is to bring current information, not only locally, but globally to our people in the villages to help them in their intellectual pursuits and provide them with timely, relevant, and useful information which they can apply inimproving their lives. The computer technology which will be made an integral part of the National Public Library System (NPLS) will interconnect all the provinces and cities in the Philippines with each other and with the rest of the world and effectively integrate them into the global community."

