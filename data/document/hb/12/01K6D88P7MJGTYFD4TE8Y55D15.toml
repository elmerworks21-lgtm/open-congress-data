congress_website_title = "AN ACT REQUIRING PRE-AUDIT ON ALL GOVERNMENT PROGRAMS AND PROJECTS WITH FUNDING REQUIREMENTS BEFORE IMPLEMENTATION AND PRESCRIBING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Reports of overpricing on some government funded projects have grown to alarming proportions. To address this concern, the measure proposes that all government programs and projects with funding requirements, regardless of the amount, be subjected to pre-audit by the Commission on Audit (COA) or its duly authorized representative before implementation. This would thus enable the COA to first determine the reasonableness of the project cost and then prioritize as well as ensure the availabilityof funds."

