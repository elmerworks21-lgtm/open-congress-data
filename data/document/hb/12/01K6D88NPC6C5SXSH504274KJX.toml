congress_website_title = "AN ACT TO ESTABLISH BARANGAY INFORMATION AND EDUCATION NETWORKS NATIONWIDE (BIEN), DEFINING THEIR FUNCTIONS, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The proposed BARANGAY INFORMATION AND EDUCATION NETWORK shall be a network of electronic computers located in barangays to be used for education and data banking purposes interconnected through a wide area network via the Internet or such enabling infrastructure as the government shall establish and authorize. The NETWORK shall, among others, to provide educational opportunities to all out-of-school youth at whatever grade level. To serve as data banks for modern governance e.g. land use, planning, budgeting, tax mapping; electoral precinct mapping, barangay census, etc."

