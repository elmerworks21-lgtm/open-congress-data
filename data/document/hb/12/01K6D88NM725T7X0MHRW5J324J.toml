congress_website_title = "AN ACT AMENDING SECTIONS 2 AND 3 OF REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED AND SEVENTY-EIGHT, OTHERWISE KNOWN AS `AN ACT TO PROMOTE RURAL DEVELOPMENT BY PROVIDING FOR AN ACCELERATED PROGRAM WITHIN A TEN (10)-YEAR PERIOD FOR THE CONSTRUCTION OF IRRIGATION PROJECTS'"
