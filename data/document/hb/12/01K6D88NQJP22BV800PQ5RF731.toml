congress_website_abstract = "AUTOMATIC PROMOTION - All government officials and employees who are eligible for compulsory retirement shall be granted automatic promotion equivalent to One Grade Level Higher than his/her position at the time of retirement. For this purpose, theadjusted Salary Grade Level higher than his/her position at the time of retirement. For this purpose, the adjusted Salary Grade Level of the retiree shall be used as basis for the computation of his/her retirement benefits."
