congress_website_title = "AN ACT AMENDING ARTICLES 96, 124, 211 AND 225 OF THE NEW FAMILY CODE TO PROVIDE FOR JUDICIAL INTERVENTION IN CASES OF DISAGREEMENT BETWEEN HUSBAND AND WIFE OVER THE ADMINISTRATION AND ENJOYMENT OF COMMUNITY PROPERTY, THE ADMINISTRATION AND ENJOYMENT OF CONJUGAL PARTNERSHIP PROPERTY AND THE EXERCISE OF PARENTAL AUTHORITY AND LEGAL GUARDIANSHIP OVER THE PERSON AND PROPERTY OF UNEMANCIPATED COMMON CHILD"
congress_website_abstract = "The New Family Code, though largely adopting gender fair provisions, still retains certain provisions that give undue advantage to the husband over the wife. This measure seeks to allow either party to seek judicial intervention in cases of disagreement between husband and wife over the administration and enjoyment of community and conjugal partnership property, and in the exercise of legal guardianship over the property of an unemancipated common child. It also provides that in cases of disagreement in the exercise of parental authority, mother's decision shall prevail for children below 7 years old and for either party to go to court for proper remedy for children 7 years of age and above."
