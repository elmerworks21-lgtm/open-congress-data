congress_website_title = "AN ACT PROVIDING FOR STRONGER DETERRENCE AND SPECIAL PROTECTION AGAINST CHILD LABOR AND PROVIDING PENALTIES FOR ITS VIOLATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Special Protection of Children Against Child Labor Act\". This bill is premised on the principles that --- (1) The State shall take into account the best interest of the child in air actions concerning children; (2) The State recognizes the right ofthe child to be protected from economic exploitation and from performing any work that is lifely to be hazardous or to interfere with the child's education, or to be harmful to the child's health or physical, mental, spiritual, moral or social development; and (3) The State shall pursue a national policy designed to ensure the effective abolition of child labor and to raise progressively the minimum age for admission to employment or work to a level consistent with the fullest physical and menttal development of young persons."
