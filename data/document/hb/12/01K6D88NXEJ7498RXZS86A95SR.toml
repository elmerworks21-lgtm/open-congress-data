congress_website_title = "AN ACT CREATING THE PHILIPPINE CANCER CENTER, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The purposes and objectives of the Philippine Cancer Center are: (1) To construct, establish, operate and maintain an integrated medical insitution that will concentrate and specialiaze mainly on the multi-modality treatment of cancer and allied diseases; (2) To provide and extend medical services to the general public who are suffering from cance especially the poor and the less fortunate in life and relieve or alleviate their conditions from the afflictions of said disease; (3) To promote, encourage and engaged in medical and scientific researches on the early diagnosis, multi-modality treatment and prevention of cancer and gather, compile and publish such research finding for public information and dissemination; and (4) To encourage annd/or undertake the training of physicians, nurses, medical technicians, health officers and social workers on the scientific conduct of diagnosis, multi-modality treatment and prevention of cancer."

