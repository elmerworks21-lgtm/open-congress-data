congress_website_title = "AN ACT PENALIZING PROSTITUTION, DEFINING THE PERSONS LIABLE THEREFOR, PROVIDING MEASURES AND SUPPORT SERVICES FOR ITS VICTIMS, AMENDING FOR THE PURPOSE THE REVISED PENAL CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Prostitut ion Act.\" Rationale: Prostitution must be approached in its entirety, interrogating both the structural mechanisms and the ideological justifications which uphold it. In addressing prostitution, the government must address the contradictions in policies which in effect, reinforce the system of prostitution. The adult-child divide must be removed, and women and children in prostitution must be decriminalized alike. The goal of minimizing, if not totally eradicating prostitution,must be directed against establishments and male customers who control and profit from the business of prostitution. Policies and programs must be developed that will address the problems of women in prostitution, provide them protection, penalize thhose who control, perpetuate, and benefit fro, the business of prostitution, address the factors in general that perpetuate prostitution, and serve to eradicate prostitutions in the long term.> Thus, this proposed measure."

