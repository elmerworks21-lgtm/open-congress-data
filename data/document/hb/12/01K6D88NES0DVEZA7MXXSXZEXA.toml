congress_website_title = "AN ACT ESTABLISHING FREE SPECIAL EDUCATION CLASSES FOR THE PHYSICALLY DISABLED PERSONS WHO WILL ENROLL IN ALL PUBLIC ELEMENTARY AND SECONDARY SCHOOLS OF THE COUNTRY, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Physically disabled persons have a right to the quality of education that will suit their needs and develop their potentials to the maximum. For the disabled, sophisticated and modern teaching-learnn g materials are virtually unheard of.And on occations where there may be special classes conducted by the nongovernmental organizations and private sector, the teacher may either lack the necessary proper training for such a specialized purpose or the use of teaching methods designed for disabled persons."

