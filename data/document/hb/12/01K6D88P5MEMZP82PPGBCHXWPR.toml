congress_website_title = "AN ACT PROVIDING FOR THE RIGHT OF AN ILLEGITIMATE CHILD TO USE THE SURNAME OF HIS NATURAL FATHER, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "Article 176 of EO No. 209, otherwise known as the Family Code of the Philippines is hereby amended by providing that illegitimate chidlren shall use the surname of HIS ACKNOWLEDGED NATURAL FATHER, PROVIDED, THERE IS AN AGREEMENT BETWEEN THE MOTHER AND THE FORMER and shall be under the parental authority of THEIR ACKNOWLEDGED NATURAL PARENTS."
