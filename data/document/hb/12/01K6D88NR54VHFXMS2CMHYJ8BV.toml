congress_website_title = "AN ACT FURTHER STRENGTHENING THE PHILIPPINE BANKING SYSTEM, AMENDING FOR THE PURPOSE `THE NEW CENTRAL BANK ACT' AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to STRENGTHEN the banking system with these significant amendments to RA No. 7653, such as: (1) LOWERS the term of office of the members of the Bangko Sentral Monetary Board from [six (6)] to THREE (3) years; (2) INCREASES the frequency of bank examinations; (3) IMPOSES COLLATERAL (shares of bank owners) in cases of loans granted to provide liquidity; and (4) Authorizes the Monetary Board to order INQUIRY into all deposits worth P50 Million or its equivalent in foreign currency;etc."

