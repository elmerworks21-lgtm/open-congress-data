congress_website_title = "AN ACT BANNING CIGARETTE/CIGAR SMOKING IN CERTAIN PUBLIC PLACES AND IMPOSING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "\"Anti-Smoking Act of 2001.\" It is hereby declared a policy of the State to protect and promote the right to health of the people and instill health consciousness among them. It is also the policy of the State to safeguard public health by discouraging cigarette/cigar smoking which has been determined to be harmful to the health of smokers and nonsmokers alike. To this end, the State shall regulate cigarette/cigar smoking."
