congress_website_title = "AN ACT INCREASING THE NUMBER OF MEMBERS OF THE COMMISSION OF THE SOCIAL SECURITY SYSTEM (SSS) TO ALLOW GREATER PARTICIPATION AMONG ITS GENERAL MEMBERSHIP FURTHER AMENDING FOR THIS PURPOSE REPUBLIC ACT NUMBERED EIGHT THOUSAND TWO HUNDRED EIGHTY-TWO,OTHERWISE KNOWN AS THE SOCIAL SECURITY LAW OF 1997"
congress_website_abstract = "This bill proposed amendments to RA No. 8282, the Social Security Law of 1997, such as: (1) The DOLE Undersecretary shall be EX-OFFICIO MEMBER of the Social Security Commission; (2) The THREE (3) MEMBERS COMING FROM THE GENERAL MEMBERSHIP SHALL BE APPOINTED BY THE PRESIDENT AMONG THE NOMINEES OF THE DIFFERENT MEMBERS' ORGANIZATIONS. (3) Appointive members of the Commission shall receive FIVE THOUSAND FIVE HUNDRED PESOS (P5,500.00) but NOT to exceed THIRTY THOUSAND PESOS (P30,000.00) a month. (4) Transportation and representation allowing of same members shall NOT exceed TWENTY THOUSAND PESOS (P20,000.00) a month."

