congress_website_title = "AN ACT DIRECTING THE DEPARTMENT OF EDUCATION, CULTURE AND SPORTS TO INCLUDE IN THE CURRICULUM OF ALL ELEMENTARY AND SECONDARY SCHOOLS THE TEACHING OF RECYCLING AND COMPOSTING AS PART OF THE HEALTH SUBJECT"
congress_website_abstract = "Rationale: In proposing to integrate in the curriculum in the elementary and secondary levels within our educational system the teaching of recycling and composting, our main purpose is not simply to teach how to reduce, reuse and recycle. Through education, we hope to achieve a greater objective which is more to impart the correct values, proper attitude, right discipline, good training and the rigid, constant and consistent practice of good habits that are presumably instilled and ingrained in our daily life activities."

