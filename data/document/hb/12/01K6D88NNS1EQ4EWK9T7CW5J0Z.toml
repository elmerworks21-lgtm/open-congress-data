congress_website_title = "AN ACT PRESCRIBING THE AUTHORIZED KEY POSITIONS AND APPROPRIATE RANKS IN THE STRUCTURE OF THE ACTIVE FORCE IN THE ARMED FORCES OF THE PHILIPPINES, AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 8186, AND FOR OTHER PURPOSES."
congress_website_abstract = "There is a need to increase the current authorized number of generals/flag officers in the AFP due to the following reasons: (1) The present structure organizational structure of the AFP under the Modernization Program requires the more Generals/Flag Officers in the AFP that what is currently authorized. (2) It will widen the opportunities for promotion of younger but deserving officers due to the greater allocation in the General/Flag Officer grades. This will subsequently improve the moraleof the AFP Officers Corps. (3) Proposed increase will further strengthen the command and staff structure of the AFP."
