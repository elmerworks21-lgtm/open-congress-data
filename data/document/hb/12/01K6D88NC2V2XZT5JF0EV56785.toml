congress_website_title = "AN ACT ESTABLISHING THE RULES FOR A COMPETITIVELY NEUTRAL GOVERNMENT AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Government Competitive Neutrality Act of 2001.\" Rationale: Undeniably, despite its pronounced policy of privatization and deregulation, the State continues to compete for available economic resources in the system. This has resulted in resourceallocation distortions which occur because prices charged by significant government businesses need not fully reflect resource costs. Thus, the need for competitive neutrality arrangements."

