congress_website_title = "AN ACT ESTABLISHING A MEDICAL AND HEALTH CARE LIABILITY LAW, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Medical and Health Care Liability Act of 2002.\" This bill seeks to punish any individual who perform their jobs with negligence and incompetence and weeding them out of the profession. It also provides a process where justice is attained both by the accuser and the accused in a more reasonable way."

