congress_website_title = "AN ACT PROVIDING ADDITIONAL TAX DEDUCTIONS FOR INDIVIDUAL INCOME EARNERS, AMENDING FOR THE PURPOSE SECTION THIRTY- FOUR OF `THE TAX REFORM ACT OF 1997'"
congress_website_abstract = "THE AMOUNT OF TUITION OR MATRICULATION FEES PAID FOR BY THE TAXPAYER IN FAVOR OF HIS CHILDREN ATTENDING SCHOOL SHALL BE ALLOWED AS A DEDUCTION FROM HIS GROSS INCOME: PROVIDED, THAT THE FAMILY OF THE SAID TAXPAYER HAS A GROSS INCOME OF NOT MORE THANTWO HUNDRED FIFTY THOUSAND PESOS (P250,000.00) FOR THE TAXABLE YEAR: PROVIDED, FURTHER, THAT THE SAID DEDUCTION SHALL APPLY ONLY TO THREE (3) DEPENDENTS OF THE TAXPAYER: PROVIDED, FINALLY, THAT IN THE CASE OF MARRIED TAXPAYERS, ONLY THE SPOUSE CLAIMING THE ADDITIONAL EXEMPTION FOR DEPENDENTS SHALL BE ENTITLED TO THIS DEDUCTION. > ANY AMOUNT PAID BY AN INDIVIDUAL TAXPAYER AS INTEREST ON HOME LOAN MORTGAGES SHALL BE ALLOWED AS DEDUCTION FROM HIS GROSS INCOME."
