congress_website_title = "AN ACT CRIMINALIZING VIDEO AND PHOTO VOYEURISM AND IMPOSING PENALTIES THEREOF"
congress_website_abstract = "\\\"Anti-Voyeurism Act of 2003\\\". With the advent of the internet and information technology, pictures are being downloaded, exchanged and passed on through the e-mail. While some pictures are copyrighted, a number are stolen shots of people or groups caught in compromising situations. This is a gross invasion of privacy by people with voyeuristic tendencies. This bill proposes to penalize any person or persons found guilty of video or photo voyeurism with imprisonment for a period of at least eighteen months to a maximum of four years."

