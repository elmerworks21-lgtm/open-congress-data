congress_website_title = "AN ACT TO MAXIMIZE THE COLLECTION OF REVENUES BY REQUIRING THE FILING OF STATEMENT OF ASSETS, LIABILITIES AND NETWORTH AS OF DECEMBER 31, 2000 AND BY GRANTING TAX AMNESTY ON ALL UNPAID INTERNAL REVENUE TAXES IMPOSED BY THE NATIONAL GOVERNMENT FOR TAXABLE YEAR 2000 AND PRIOR YEARS"
congress_website_abstract = "This bill envisions an honest-to-goodn ess tax amnesty whereby all persons concerned shall be afforded to come up with a clean slate by making a true and faithful statement of their true and correct network as of December 31, 2000, paying the prescribed amnesty tax in order to earn the full benefits of tax amnesty which include, among others, immunity from civil, criminal, or administrative penalties arising from the failire to pay any and all internal revenue taxes for taxable year 2000 and prior years, subject to certain exceptions. > Aside from raising much-needed revenues, the amnesty is designed to broaden the tax base by providing data on all taxpyers considering that the filing of Sworn Statements of Assets and Liabilities and Netwoorth shall be mandatory."
