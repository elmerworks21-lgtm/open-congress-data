congress_website_title = "AN ACT ADJUSTING PENSIONS UNDER THE GOVERNMENT SERVICE INSURANCE SYSTEM TO A MINIMUM LEVEL OF EIGHT THOUSAND PESOS (P8,000.00) UNDER AN ECONOMIC ADJUSTMENT PENSION PROGRAM"
congress_website_abstract = "Any law to the contrary notwithstanding , the miimum monthly pension under the Government Service Insurance System shall be Four Thousand Pesos (P4,000.00). Provided, that in the succeeding years starting January 2002, the monthly pension shall be increased annually, for five years, by not less than Eight Hundred Pesos. (P800.00). Funds for the program shall be derived from the Reserve Fund of the Government Service Insurance System."

