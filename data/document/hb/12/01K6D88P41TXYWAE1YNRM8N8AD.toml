congress_website_title = "AN ACT UPGRADING THE SALARY GRADE LEVEL OF THE SCHOOLS DISTRICT SUPERVISORS FROM SALARY GRADE NINETEEN (19) TO SALARY GRADE TWENTY-FOUR (24)"
congress_website_abstract = "Rationale: The current salary scale, wherein a Schools District Supervisor enjoys only Salary Grade Nineteen (SG-19) or P16,792.00 per month (same with that of a Secondary Schoool Principal-II), is an obviously incorrect situation. > This bill seeksto upgrade the salary grade level of Schools District6 Supervisors from SG-19 to SG-24 without having the need to change the present salary grade level of the secondary school principals."
