congress_website_title = "AN ACT CREATING THE INTERNAL REVENUE COMMISSION, IN ORDER TO REVITALIZE TAX ADMINISTRATION, PROVIDING THE MECHANICS FOR ITS IMPLEMENTATION, ALLOCATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"IRC Act of 2003.\" This bill establishes a new internal revenue agency which shall be known as the Internal Revenue Commission. The Commission shall be responsible for the implementation of internal revenue laws and shall be the primary agency underthe Department of Finance (DOF) mandated to administer taxes. It shall take over the operations and functions of the Bureau of Internal Revenue as applicable under the Commission's new organizational structure."
