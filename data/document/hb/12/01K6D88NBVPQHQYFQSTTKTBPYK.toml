congress_website_title = "AN ACT CREATING THE FIELD OF LAND TITLE INSURANCE, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 612, OTHERWISE KNOWN AS THE INSURANCE CODE OF 1978, AS AMENDED BY PRESIDENTIAL DECREES NO. 1455 AND 1460 AND BATAS PAMBANSA BLG. 874"
congress_website_abstract = "Rationale: TITLE INSURANCE is a new field in this country, and there is a need for legislation to implement this and to encourage insurance companies to go into this venture. There is an urgency to implement title insurance as soon as possible, as title fraud has become a very serious problem. In order to implement a system of title insurance, there is a need to amend the Insurance Code of 1978 or PD 612 as amended, by adding the necessary provisions creating the field of title insurance."
