congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A POPULATION OFFICE IN ALL LOCAL GOVERNMENT UNITS AND TRANSFERRING THE CONTROL AND SUPERVISION OVER EXISTING LOCAL POPULATION OFFICES TO THE COMMISSION ON POPULATION"
congress_website_abstract = "Rationale: The vital role played by the POPULATION OFFICE in the LGUs cannot be underestimated. Among the various functions of the Office are: (1) Formulation of measures geared towards efficient and effective delivery of basic services related to population development; and (2) Ensuring people's participation in population development through the establishment of data bank for program operations and other related activities."

