congress_website_title = "AN ACT BANNING FISH CULTURE PENS IN LAKES THROUGHOUT THE COUNTRY"
congress_website_abstract = "The construction and maintenance of fish pens in lakes and tributaries thereof throughout the country is prohibited. For purposes of this Act, fish culture pens shall mean any enclosure wherein aquatic animals are grown in a prepared medium. Violation of this Act shall be punished by imprisonment of no less than one (1) year nor more than five (5) years and a fine of not less than Ten thousand pesos (P10,000.00) nor more than One hundred thousand pesos (P100,000.00) at the discretion of the Court."
