congress_website_title = "AN ACT PROVIDING FOR A SEPARATE COMPENSATION STRUCTURE FOR THE NATIONAL PROSECUTION SERVICE (NAPROSS) AND THE LEGAL STAFF OF THE DEPARTMENT OF JUSTICE, AMENDING FOR THE PURPOSE SECTION 5 OF PRESIDENTIAL DECREE NO. 1275"
congress_website_abstract = "Section 5 of PD 1275 is hereby amended to read as follows: \"Section 5. Compensation. THE SECRETARY OF JUSTICE IS HEREBY AUTHORIZED TO PREPARE A COMPENSATION STRUCTURE FOR THE NATIONAL PROSECUTION SERVICE (NAPROSS) WHICH SHALL BE BASED ON A COMPREHENSIVE JOB ANALYSIS AND AUDIT OF ACTUAL DUTIES AND RESPONSIBILITIE S AND SHALL BE COMPARABLE WITH THE PREVAILING COMPENSATION PLAN IN THE PRACTICE OF THE LEGAL PROFESSION IN THE PRIVATE SECTOR. SUCH COMPENSATION STRUCTURE FOR THE NAPROSS SHALL BE EXEMPT FROM REPUBLIC ACT NO. 6758 OTHERWISE KNOWN AS THE SALARY STANDARDIZATION LAW. >THE ABOVE PROVISION SHALL LIKEWISE APPLY TO THE MEMBERS OF THE LEGAL STAFF OF THE DEPARTMENT OF JUSTICE."
