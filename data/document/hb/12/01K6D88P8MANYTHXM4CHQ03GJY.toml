congress_website_title = "AN ACT REQUIRING PUBLIC CONTRACTORS TO PUT UP A PUBLIC INFORMATION BOARD UPON COMPLETION OF THEIR RESPECTIVE INFRASTRUCTURE PROJECTS INDICATING THE COST AND EXPENDITURE THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Public Infrastructure Billboard Act of 2003\". In line with the government's policy of public disclosure in all its transactions involving public interest, the bill seeks to make transparent every public transaction involving public infrastructure projects. It requires public contractors to put up a public information board indicating the cost and expenditure of the infrastructure project. This policy of transparency would serve as a deterrent to the commission of any irregularity."

