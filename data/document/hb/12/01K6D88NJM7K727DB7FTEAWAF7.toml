congress_website_title = "AN ACT AMENDING ARTICLES 215 AND 216 OF THE LABOR CODE OF THE PHILIPPINES, AS AMENDED, BY UPGRADING THE SALARIES, ALLOWANCES AND RETIREMENT BENEFITS OF LABOR ARBITERS AND THE COMMISSIONERS OF THE NATIONAL LABOR RELATIONS COMMISSION (NLRC) AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Since they perform an important part in the maintenance of industrial peace and in the adjudication of justice in the workplace, it is fitting that labor arbiters enjoy equality in rank with the judges of the RTC. Appropriate retirement benefits must likewise be accorded them to enable them to enjoy the fruits of government service long after they have been served it with their best years."

