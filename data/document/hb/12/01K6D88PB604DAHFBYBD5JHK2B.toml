congress_website_title = "AN ACT GRANTING THE RIGHT OF REPLY AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "The Constitution guarantees freedom of expression, freedom of speech and freedom of the press. The interest of society also demands the right to an educated and enlightened public opinion. Freedom of expression and speech embraces a correlative right to reply to every form of expression protected under the Constitution especially to accusations or criticisms published or aired through the mass media. This bill enables all persons to equitably exercise the right of reply in the field of broadcast and print media. It also provides penalties for violations of such right."
