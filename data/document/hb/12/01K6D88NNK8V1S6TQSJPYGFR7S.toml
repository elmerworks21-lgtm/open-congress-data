congress_website_title = "AN ACT INSTITUTIONALIZ ING THE OPEN LEARNING SYSTEM IN THE PHILIPPINES APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: To effectively respond to the need for working people to acquire formal higher education and a better professional career and to cater to the demand for continuous education, the establishment of an Open Learning System is therefore proposed by this bill > The idea of establishing an Open Learning System arose from a desire to democratize and expand higher educational opportunities for the people, in a more effective and economical manner. The Open Learning System will utilize the distance teaching/learni ng system, where students shall not be required to regulary attend conventional classrooms, thus allowing these students to study while working in offices, factories, farms or other preoccupations."

