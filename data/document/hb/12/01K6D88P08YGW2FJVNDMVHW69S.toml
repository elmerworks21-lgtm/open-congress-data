congress_website_title = "AN ACT AMENDING SECTION 14 OF REPUBLIC ACT NO. 9006, OTHERWISE KNOWN AS THE FAIR ELECTION ACT"
congress_website_abstract = "The following AMENDMENT to Section 14, RA No. 9006, the Fair Election Act, is proposed: Any elective official, whether national or local who has filed a certificate of candidacy for the same or any other office shall not be considered resigned fromoffice. > Provided, that Senators and other elected officials, who have filed certificates of candidacy for any other office, and whose terms of office do not expire at noon on the 30th day of June next following the election shall be considered resigned from office on such date."
