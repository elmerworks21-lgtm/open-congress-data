congress_website_title = "AN ACT CREATING THE FILM DEVELOPMENT AND INCENTIVES BOARD, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFO, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The Philippine Film Industry is in a sordid state. Faced with various problems, which hinder its growth and development, the industry is primarily burdened with having to pay numerous taxes and indemnities charges by the government. > Theprohibitively high taxes imposed by both nationa and local governments on the production and exhibition of Filipino films are forcing producers into churning commercial movies primarily geated towards box-office profits, thus sacrificing quality andrelevancy. > The creation of a new Film Development and Incentives Board (FDIB) is hereby proposed to nurture an economic and cultural environment that will encourage best efforts in the film industry, tasked above all, to formulate, harmonize and iimplement government policies designed to encourage the growth and development of quality film making."

