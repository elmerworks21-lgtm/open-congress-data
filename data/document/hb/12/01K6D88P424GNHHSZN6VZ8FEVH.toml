congress_website_title = "AN ACT TO ENHANCE FARM PRODUCTIVITY BY PROVIDING STRATEGIC FARM IRRIGATION SUPPORTS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Farm Productivity Act of 2002\". This bill provides for a strategic provision of irrigation farm support with the view of increasing farm productivity. It grants incentives for the promotion of cost-effective irrigation technologies. This will maximize the potential of our agricultural sector towards more efficient farming technologies that will yield a more diversified produce thereby contributing to the food sufficiency goal of the country."
