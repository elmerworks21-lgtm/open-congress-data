congress_website_title = "AN ACT REGULATING THE SALE OF MOBILE PHONES AND RELATED TELECOMMUNICATIONS DEVICES, PENALIZING THE REPROGRAMMING THEREOF AND RELATED ACTS AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "\\\"The Mobile Phone Regulation Act of 2003\\\". The unregulated use of mobile phones and similar telecommunication devices have contributed to the increase in crimes such as theft, homicide, murder, kidnap for ransom and other crimes. Cases of mobile phone thefts have risen to an alarming level. Likewise, trading in stolen mobile phones has proliferated. The bill aims to regulate the sale, registration, use and re-sale of mobile phones, SIM packs and similar telecommunications gadgets and the reprogramming of mobile phones; and to tackle non-reporting or false reporting of the sale of mobile phones. It provides for penalties for violations of this act."
