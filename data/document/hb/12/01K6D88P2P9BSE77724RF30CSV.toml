congress_website_title = "AN ACT EMPOWERING WOMEN BY PROVIDING THEM WITH FINANCIAL EDUCATIONAL AND INFORMATION ASSISTANCE IN ORDER FOR THEM TO EXCEL IN COMMERCE AND TRADE"
congress_website_abstract = "\"Women Empowerment in Enterprise Act.\" Rationale: Women in the Philippines are perceived to be more empowered than most of their counterparts in other societies and cultures. However, the empowered image of the Filipino women is flawed when one studies thier position in economic and public life. They continue to account for a higher nuumber of unemployed, wo under inhospitable conditions, receive lower pay, and are the last to be trained and the first to be laid off. They also have limited opportunities for growth in corporations, factories and other work places. In such discriminatory situations, women have to look, therefore, for other fields of endeavors where they can excel, like in entreprenuershi p, which now merges as an attractiveoption for women who want to reap the full harvest of their efforts."
