congress_website_title = "AN ACT SEEKING TO FURTHER STRENGTHEN `THE GOVERNMENT SERVICE INSURANCE SYSTEM ACT OF 1997' (REPUBLIC ACT NO. 8291), BY INTRODUCING SPECIFIC AMENDMENTS TO ITS PROVISIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to STRENGTHEN RA No. 8291, the GSIS Law od 1997, by proposing AMENDMENTS to certain provisions, such as on: (1) Declaration of Policy - Section 1; (2) Effect of Separation from Service - Section 4; (3) Dividends - Section 25; (4) Funds of the GSIS - Section 34; (5) Investment of Funds - Section 36; (6) The Board of Trustees (Composition, Tenure and Compensation) - Section 42; and (7) Dispensation of Social Insurance Benefits - Section 49."

