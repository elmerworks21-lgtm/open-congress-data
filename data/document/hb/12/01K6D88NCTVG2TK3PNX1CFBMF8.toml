congress_website_title = "AN ACT TO PREVENT GRAFT AND CORRUPTION AND IMPROVE GOVERNMENT SERVICES TO THE PEOPLE BY CUTTING GOVERNMENT BUREAUCRATIC RED TAPE"
congress_website_abstract = "Rationale: ILLEGAL FIXING is well-entrenched in the Philippine bureaucracy and has indeed become worst and is fast eroding whatever confidence the people may have left in the government. It is in response to the persistent reports of corruption thatthe bill is proposed. It is hoped that through this bill, illegal fixing shall be minimized in the government bureaucracy."
