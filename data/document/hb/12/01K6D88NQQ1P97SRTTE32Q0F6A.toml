congress_website_title = "AN ACT APPROPRIATING PORTION OF THE TERMINAL FEE COLLECTED FROM DEPARTING INTERNATIONAL PASSENGERS AT THE NINOY AQUINO INTERNATIONAL AIRPORT TO ACCRUE TO THE DEPARTMENT OF TOURISM AND FOR OTHER PURPOSES"
congress_website_abstract = "Appropriation of Portion of the NAIA Terminal Fee. The amount of fifty (P50.00) Pesos from the terminal fee presently being charged by the MIAA to all departing international passengers at the NAIA, and is currently being held in trust by the MIAA,shall accrue to the Department of Tourism, which shall have the authority to allocate and disburse the same for its tourism promotions, marketing and development-rel ated projects, subject to existing government accounting and auditing rules and regulations."

