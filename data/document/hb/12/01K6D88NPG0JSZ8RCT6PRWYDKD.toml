congress_website_title = "AN ACT EXEMPTING POOR LITIGANTS FROM POSTING BAIL WHEN CHARGED WITH NON-CAPITAL OFFENSES FOR THE FIRST TIME AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Poor Litigants Equalization Act of 2001\". Any poor litigant who are citizens of the Philippines shall be exempt from posting bail when charged with non-capital offenses for the first time in any court in the Philippines and be released on his/her own recognizance except when the probability of flight is evident, as determined by the court."
