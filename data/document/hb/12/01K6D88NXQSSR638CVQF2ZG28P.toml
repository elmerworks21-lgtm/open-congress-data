congress_website_title = "AN ACT PROHIBITING BANKS FROM IMPOSING FEES OR CHARGES ON SAVINGS OR CURRENT ACCOUNTS FALLING BELOW THE REQUIRED MINIMUM MAINTAINING BALANCE AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
