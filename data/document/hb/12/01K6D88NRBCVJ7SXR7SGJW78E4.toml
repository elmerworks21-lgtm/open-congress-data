congress_website_title = "AN ACT GRANTING EXEMPTION TO THE PROSECUTORS OF THE NATIONAL PROSECUTION SERVICE, STATE COUNSELS OF THE OFFICE OF THE CHIEF STATE COUNSEL OF THE DEPARTMENT OF JUSTICE, LAWYERS OF THE OFFICE OF THE OMBUDSMAN, AND PUBLIC ATTORNEYS OF THE PUBLIC ATTORNEY'S OFFICE FROM THE COVERAGE OF REPUBLIC ACT NO. 6758, OTHERWISE KNOWN AS THE SALARY STANDARDIZATION LAW"
congress_website_abstract = "Rationale: This proposal comes at a time when we can no longer ignore the demands of the situation. If the government truly means business in its fight against criminality, it must start from the basic. The compensation package for the Public andSpecial Prosecutors as well as the Public Attorneys has to be reviewed, and the first legal obstacle that has to be addressed is the Salary Standardization Law (R.A. 6758). This measure seeks the exemption of the Prosecutors of the National Prosecution Service, the State Counsels of the Office of the Chief State Counsel, the Public Attorneys of the Public Attorney;s Office, and the Lawyers of the Office of the Ombudsman from the coverage of said Act, with the intention of setting a new compensattion package which will be commensurate to the functions that they perform and comparable with those being received by their counterparts in the private sector."
