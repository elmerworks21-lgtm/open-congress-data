congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8353, OTHERWISE KNOWN AS THE ANTI-RAPE LAW OF 1997"
congress_website_abstract = "The proposed AMENDMENT to the Anti-Rape Law (RA No. 8353) referes to Article 266-A on \"RAPE: WHEN AND HOW COMMITTED\". The Amendment reads as follows: (1) x x x > \"(a) Through force, threat, or intimidation; \"(b) When the offended party is deprived of reason or otherwise unconscious; \"(c) By means of fraudulent machinations or grace abuse of authority; and \"(d) When the offended party is under twelve (12) years of age or is demented, even though none of circumstances mentioned above be present.> \"(2) By any person who, under any of the circumstances mentioned in paragraph 1 hereof, shall commit an act of sexual assault by inserting [his] THE penis into another person's mouth or anal orifice, or any instrument, [or] object, OR ANY OTHER PARRT OF THE BODY into the genital or anal orifice of another person.\""

