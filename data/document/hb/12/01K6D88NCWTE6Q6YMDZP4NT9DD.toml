congress_website_title = "AN ACT CREATING LOCAL HOUSING BOARDS IN EVERY CITY AND MUNICIPALITY, PROVIDING FOR ITS POWERS AND FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to institutionaliz e Local Housing Boards which will be created at the level of local government units. Because of their direct governance of their respective constituencies, the local governments are in the best position to know thepeculiarities of their locality and establish their priorities. Local housing boards, which shall be composed of representatives coming from the public as well as the private sector and civil society, shall be responsible for the formulation of a housing program in their respective areas of jurisdiction."
