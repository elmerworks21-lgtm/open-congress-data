congress_website_abstract = "The Local Government Code of 1991 has introduced the concept of decentralizatio n and described it as \"transfer of power and authority from the central institution to the lower or local levels of a government system.\" The author of this bill believes that there is a need to amend Sections 470 and 471 of the Code to realize decentralizatio n's full potential."
