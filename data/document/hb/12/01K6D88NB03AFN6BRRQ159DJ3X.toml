congress_website_title = "AN ACT REQUIRING THE REGISTRATION OF THE SALE OF PREPAID SUBSCRIBER IDENTITY MODULE (SIM) PACKS FOR CELLULAR TELEPHONES AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "All corporations, partnerships and single proprietorships engaged in the business of selling prepaid subscriber identity module (SIM) packs for cellular telephones are hereby required to cause the REGISTRATION of the following information in an official record-document established for the purpose: (1) Full name and address of the buyer - To this end, the buyer shall be required to present any acceptable proof of identification; (2) Issue/telephone number of the SIM pack; and (3) Value/amount ofthe SIM packs. The corporations, partnerships and single proprietorships shall also issue proper receipts to the buyers of SIM packs."

