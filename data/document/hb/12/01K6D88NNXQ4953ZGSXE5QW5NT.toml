congress_website_title = "AN ACT PUNISHING DOMESTIC VIOLENCE, DEFINING THE PUNISHABLE ACTS, PROVIDING PROTECTION MEASURES AND PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "For purposes of this bill, the following terms are defined: (1) DOMESTIC VIOLENCE; (2) PHYSICAL VIOLENCE; (3) PSYCHOLOGICAL VIOLENCE; (4) ECONOMIC ABUSE; AND (5) SEXUAL VIOLENCE. This bill, likewise, provides for significant concerns, such as: > 1.Protection Orders 2. Barangay and Police Response to Abuse 3. Penalties, etc."
