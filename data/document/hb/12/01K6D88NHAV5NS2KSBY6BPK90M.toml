congress_website_title = "AN ACT REGULATING THE SHOWING OF TELEVISION ADVERTISEMENTS FEATURING SEX AND/OR VIOLENCE TO CHILDREN OF TENDER AGE"
congress_website_abstract = "\"Television Advertisement Regulation Act of 2001.\" The showing of film or movie advertisements or trailers on television depicting violence and/or sex shall be aired only at such times when children of formative years are not usually watching television. Violation of the provisions of this Act as well as the rules and regulations thereunder that Act shall be punished by a fine of not less than Ten Thousand Pesos (P10,000.00) nor more than Fifty Thousand Pesos (P50,000.00) or imprisonment of not less than one (1) year nor more than five (5) years or both at the discretion of the Court."
