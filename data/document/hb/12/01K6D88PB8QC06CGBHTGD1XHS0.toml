congress_website_title = "AN ACT CALLING FOR THE CREATION OF SPECIAL EMPLOYMENT ASSISTANCE CENTERS FOR THE PHYSICALLY DISADVANTAGED, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Government Initiated Opportunity for the Advancement of Life Act of 2003 (G.O.A.L)\\\". It is a sad reality that the physically disadvantaged members of our society have difficulty in landing jobs commensurate to their educational background and skills. Because the positions open to them are limited, they are often compelled to occupy low-level positions. To help the disabled to secure a better and brighten future for themselves, this bill seeks to help them secure employment through the establishment of networks in both the public and private sectors. It provides for the creation of the Special Employment Assistance Centers which shall be tasked to address the employment needs of the disabled."
