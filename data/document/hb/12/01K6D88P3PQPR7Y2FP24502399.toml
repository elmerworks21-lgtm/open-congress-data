congress_website_title = "AN ACT CREATING THE NATIONAL ENVIRONMENTAL MANAGEMENT AUTHORITY, DEFINING ITS POWERS, FUNCTIONS AND RESPONSIBILITIE S, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The continuous degradation of our environment is somehow a result of government neglect. The Department of Environment and Natural Resources, while attending to problems concerning our forests and natural resources, had neglected the environment. We do not even have concrete standards on air, water and land quality. More so, we lack strageties and action plans to safeguard public health against poor environmental quality. What this nation therefore needs is a separate goverment entity which will focus on environmental concerns such as air and water pollution, solid and toxic wastes, hazardous substances, and public health. > This bill proposes the creation of the Naitonal Environmental Management Authority (NEMA), an environmenttal watchdog which shall be responsible for the conservation of the country's environment and resources, regulation of environmental impact occasioned by human activities, and control and abatement of enviromental pollution."

