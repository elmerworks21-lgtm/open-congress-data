congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF CHAPTER 2, TITLE THREE, BOOK II OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: The allocation of more resources to local government units is one of the most significant imports of the Code which gives a wider space in decision-making and grow in the manner it envisions for itself in consonance with its potentials and capabilities. The just share of local government units in the national wealth, among others, allow them to respond to the demands of local governance.> As a key feature, the bill, therefore, seeks to amend the sharing scheme of the national wealthvis-a-vis the local government unit's share which is of paramount importance, considering the enormous task of meeting the various need of their respective constituencies."

