congress_website_title = "AN ACT BANNING THE ISSUANCE AND USE OF LOW-NUMBERED PROTOCOL CARPLATES ON VEHICLES OF RANKING GOVERNMENT OFFICIALS"
congress_website_abstract = "The issuance and use of low-numbered car plates for vehicles of ranking government officials are hereby banned. All low-numbered car plates starting from No. 2, all the way down to the numbers now being assigned to Cabinet members and bureau directors issued in the past are hereby cancelled and deemed withdrawn"

