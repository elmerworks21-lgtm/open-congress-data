congress_website_title = "AN ACT EXEMPTING INDIVIDUALS, COOPERATIVES, AND OTHER ENTERPRISES ENGAGED IN THE IMPORTATION OF ALL TYPES OF AGRICULTURE AND FISHERIES INPUTS, EQUIPMENT AND MACHINERY FROM PAYMENT OF TARIFFS AND DUTIES, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBEREDEIGHT THOUSAND FOUR HUNDRED THIRTY-FIVE (R.A. NO. 8435), OTHERWISE KNOWN AS THE AGRICULTURE AND FISHERIES MODERNIZATION ACT OF 1997"
congress_website_abstract = "Section 109 of Republic Act No. 8435, otherwise known as the 'Agriculture and Fisheries Modernization Act (AFMA) of 1997,' is hereby amended by including all INDIVIDUALS, COOPERATIVES AND OTHER enterprises in the exemption of the payment of tariff and duties for the importation of all types of agriculture and fisheries inputs, equipment and machinery. > The AFMA provides for the exemption of all enterprises engaged in agriculture and fisheries, duty certified by the Department in consultation with the Department of Finance and the Board of Investment, from the payment of tariff and duties for the importation of all types of agriculture and fisheries inputs, equipment and machinery but only on the condition that the imported agricultural suupplies shall be used exclusively by the importing enterprise. Considering that the agricultual sector is the strongest potential for our country to withstand the possible effects of a global recession, more incentives for our farmers and agri-based"
