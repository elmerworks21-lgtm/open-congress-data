congress_website_title = "AN ACT MANDATING ALL PUBLIC AND PRIVATE SCHOOLS TO REQUIRE THEIR STUDENTS IN THE ELEMENTARY, SECONDARY AND TERTIARY LEVELS TO UNDERGO A YEARLY DRUG TEST AS A PREREQUISITE FOR ENROLMENT AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Rationale: With the proposed bill, every student would have second thoughts before using illegal drugs. This measure will also create a fear of detection or discovery if students will be required to undergo drug test before they are admitted to schools. Finally, by requiring the students to undergo drug test, the government can expect conscientious students who will not be remiss in their studies and duties to their families and society."
