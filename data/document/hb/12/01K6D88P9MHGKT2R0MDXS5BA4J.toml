congress_website_title = "AN ACT REPEALING SECTION 4 OF EXECUTIVE ORDER NO. 1 DATED FEBRUARY 28, 1986"
congress_website_abstract = "Section 4 (a) of Executive Order No. 1 grants the Presidential Commission on Good Government (PCGG) and its commissioners absolute immunity from all civil actions arising from any act or omission, whether in violation of the law or the rights of private individuals, as long as said act or omission is performed \\\"in the discharge of tasks contemplated by this order\\\". It is an elementary principle however, that public officers are civilly liable for acts or omissions which violate the rights of private individuals. The bill seeks to implement Section 1, Article XI of the Constitution in regard to the Commissioners, officers and employees of the PCGG. It likewise seeks to repeal Section 4 of EO 1 through which Commissioners, officers and employees of the PCGG can claim \\\"a privileged status not claimed by other officials under the 1987 Constitution."
