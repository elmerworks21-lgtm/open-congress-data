congress_website_title = "AN ACT GRANTING THE SANGGUNIANG PANLALAWIGAN THE POWER TO ISSUE SUBPOENA AND SUBPOENA DUCES TECUM IN AID OF ITS LEGISLATIVE FUNCTION, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: At present, there is no express provision in the Constitution nor in the Local Government Code granting Sangguniang Panlalawigans, the power to subpoena witness. But there is no express prohibition either. Therefore, the intention of thesovereign people, through their representatives in Congress, to grant the power to issue subpoena and subpoena duces tecum to Sangguniang Panlalawigans must clearly appear in a pertient legislation."
