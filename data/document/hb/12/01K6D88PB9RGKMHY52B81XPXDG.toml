congress_website_title = "AN ACT PROVIDING FOR A MANDATORY NATIONWIDE CHILD NUTRITION PROGRAM IN ALL PUBLIC ELEMENTARY SCHOOLS AND BARANGAY DAY CARE CENTERS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Child Nutrition Law of 2003\\\". The bill seeks to institutionalize a mandatory child nutrition program (Program) in all public elementary schools and barangay day care centers that is comprehensive, integrative and sustainable on a national basis. The Program shall be provided for children enrolled and studying in public elementary schools regardless of age with the consent of their parents. The Program shall include: a) complementary feeding to ensure access to food supplement; and b) dietary diversification/backyard gardening to assure availability of nutritious food in the local areas."

