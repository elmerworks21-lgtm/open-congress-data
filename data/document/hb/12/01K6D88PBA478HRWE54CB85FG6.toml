congress_website_title = "AN ACT DECLARING THE TWENTY-SEVENTH DAY OF APRIL, A NATIONAL HOLIDAY, FOR THE OBSERVANCE OF THE BATTLE OF MACTAN, MARKING FILIPINOS' LOVE FOR FREEDOM AND REJECTING FOREIGN DOMINATION, AMENDING FOR THE PURPOSE SECTION 26, CHAPTER 7 OF EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE ADMINISTRATIVE CODE OF 1987, AND FOR OTHER PURPOSES"
congress_website_abstract = "One of the Philippines' greatest heroes is Lapulapu, Chief of Mactan Island, who, with his forces, defeated the Spanish invaders in the Battle of Mactan and killed Ferdinand Magellan. The historical significance of the Battle of Mactan vis-a-vis the struggle of Filipinos for sovereignty should be appropriately celebrated by the whole nation. This bill seeks to declare April 27th of every year as a national holiday in observance of the Battle of Mactan."

