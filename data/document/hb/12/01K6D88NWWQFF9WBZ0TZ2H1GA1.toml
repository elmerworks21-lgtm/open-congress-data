congress_website_title = "AN ACT PROMOTING THE DEVELOPMENT OF FOOTBALL AND BASEBALL SPORTS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Football and Baseball Sports Development Act of 2001.\" Thrusts of this bill are: (1) To promote the development of football and baseball sports through comprehensive programs designed to encourage league competitions, amateur games and trainingfor international competition, particularly the Olumpics.: (2) To institute training programs on football and baseball for all physical education teachers, provincial city, municipal and barangay sports coordinators, coaches, trainers, referees, umpires, sports medicine practitioners and other sports and officials from different regions of the country; (3) To promote the holding of annual provincial and inter-regional competitions; and (4) To encourage all private and public high schools, colleeges and universities and other educational institutions to maintain football and baseball sports development program."
