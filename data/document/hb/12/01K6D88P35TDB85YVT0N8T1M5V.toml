congress_website_title = "AN ACT DIRECTING THE DEPARTMENT OF HEALTH (DOH) TO HOLD A ONE (1) WEEK TRI-MONTHLY FREE CLINIC, MEDICAL AND DENTAL CHECK UP IN BARANGAYS ALSO KNOWN AS `THE KALUSUGAN SA BARANGAY ACT,' AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The state of public health in the Philippines may have improved in the past decade due to the allocations given by government in promoting public health services. However, there is an impression in the recent years that the government has not asserted itself in promoting health services. It may have funded information campaigns about disease prevention but still remained mediocre in taking an proactive role of going to the barangays regularly and holding free public clinics and medical check ups for the constituency. > This bill would like to present a more active role of the Department of Health through a periodical and regular check up of the members of the constituency to the barangay level."

