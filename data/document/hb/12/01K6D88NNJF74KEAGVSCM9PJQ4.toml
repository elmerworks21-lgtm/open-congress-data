congress_website_title = "AN ACT RATIONALIZING RELIEFS FROM AND EXECUTION OF FINAL DECISIONS AND AWARDS OF THE NATIONAL LABOR RELATIONS COMMISSION AND THE LABOR ARBITERS THEREBY AMENDING FOR THE PURPOSE ARTICLES 223 AND 224 OF THE LABOR CODE"
congress_website_abstract = "This bill contains AMENDMENTS to the Labor Code, as follows: (1) Article 223 - APPEAL > IN CASE THE EMPLOYER SHALL OPT FOR PAYROLL REINSTATEMENT, THE EMPLOYEE SHALL PAID HIS SALARIES/WAGES DURING THE PENDENCY OF THE APPEAL IN THE COMMISSION. > IN CASE A MOTION FOR RECONSIDERATION IS FILED, THE DECISION SHALL BE EXECUTORY AFTER TEN (10) CALENDAR DAYS FROM RECEIPT OF THE RESOLUTION OF SUCH MOTION. (2) Article 224 - EXECUTION OF DECISIONS, ORDERS OR AWARDS OF THE COMMISSION SHALL BE UNAPPEALABLE AND REVIEWABLE ONLY BY THE SUPREME COURT ON CERTIORARI UNDER RULE 65 OF THE RULES OF COURT SOLELY ON QUESTIONS OF LAW OR JURISDICTION."
