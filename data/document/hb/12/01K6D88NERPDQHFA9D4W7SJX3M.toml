congress_website_title = "AN ACT MANDATING THE COMPUTATION OF RETIREMENT BENEFITS OF GOVERNMENT EMPLOYEES AND OFFICIALS WHO COMPULSORILY RETIRE FROM THE SERVICE ON THE BASIS OF THE SALARY GRADE NEXT HIGHER TO THE SALARY GRADE CORRESPONDING TO THEIR POSITION AT THE TIME OF THEIR RETIREMENT AND FOR OTHER PURPOSES"
congress_website_abstract = "The retirement benefits inclusive of pensions, gratuities and similar benefits granted to government employees and officials who compulsorily retire from government service shall be computed on the basis of the next higher salary grade to the salarygrade corresponding to the position they are holding at the time of their retirement."
