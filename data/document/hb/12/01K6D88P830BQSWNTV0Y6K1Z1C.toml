congress_website_title = "AN ACT PROVIDING FOR THE MEMBERSHIP OF SCHOOL PRINCIPALS IN MUNICIPAL SCHOOL BOARDS, AMENDING FOR THE PURPOSE SECTION 98 (b)(3) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE"
congress_website_abstract = "RA 9155 (Governance of Basic Education Act of 2001) changed the nature of the functions of public school district supervisors. It limited their functions to professional and instructional advise and support to school heads and teachers, and to curricula supervision. It also empowered school principals to implement whatever may be necessary to develop the school and achieve higher learning actions. Since the school principals are now granted authority, accountability and responsibility over their respective schools, they should be designated to sit in the school board as co-chairman in lieu of the district supervisor who now simply performs staff functions."
