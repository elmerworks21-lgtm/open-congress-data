congress_website_title = "AN ACT PROHIBITING EDUCATIONAL INSTITUTIONS WHICH OFFER COURSES REQUIRING PROFESSIONAL EXAMINATIONS FROM COMPELLING THEIR GRADUATES TO TAKE REVIEW CLASSES AND/OR PRE-LICENSURE EXAMINATIONS IN THE EDUCATIONAL INSTITUTION OF WHICH HE IS A GRADUATE ANDPROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Rationale: Many student-graduat es decry certain objectionable practices by educational institutions offering courses requiring board, bar or any licensing examination. One of these practices is to compel the graduate to take review classes in the same educational institution of which he or she is a graduate under pain of delaying the release of transcripts or scholastic records. Considering the Constitutional provisions on the protection and promotion of education, it would be better to enhance and strengthen the same by granting these graduates the right to freely choose the educational institutions wherein they would take their review classes."
