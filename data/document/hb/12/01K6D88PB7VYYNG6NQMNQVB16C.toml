congress_website_title = "AN ACT PROVIDING FOR THE UPGRADING OF THE RATES OF COMPENSATION OF THE OFFICERS AND EMPLOYEES OF THE SUPREME COURT AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"Supreme Court Compensation Act of 2003\\\". The justices and judges of the Supreme Court were granted special monthly allowances equivalent to one hundred percent (100%) of their basic salaries under RA 9227. However, the law excluded other court officers and employees from receiving additional benefits. This bill provides for the upgrading of the basic pay of all officers and employees of the Supreme Court by one salary grade."

