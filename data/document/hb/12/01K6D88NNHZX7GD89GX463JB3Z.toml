congress_website_title = "AN ACT PROHIBITING THE POSSESSION OR USE OF MOBILE OR CELLULAR TELEPHONE BY CONVICTED PRISONERS AND INDIVIDUALS WHILE INCARCERATED AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Rationale: Just recently, it was reported in newspapers that unannounced inspections conducted by officials of penal facilities revealed that some prisoners serving sentence in the national penitentiary and detained persons in city jails were foundto have in their possession cellular phones which they used to contact persons and associates outside the jail where they are confined. The unrestricted use of mobile phones had enabled convicted drug traffickers to direct the operation of their nefarious trade from within the confines of their jail cells, a task almost impossible to perform without these high-tech telecommunicati on gadgets."

