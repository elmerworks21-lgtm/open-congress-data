congress_website_title = "AN ACT AMENDING SECTION SEVENTY-ONE OF BATAS PAMBANSA BLG. 881, AS AMENDED, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "An elective official is prohibited from changing his party affiliation within the first two and a half years of his running as official candidate of a party. Changing of political affiliation for such candidates is only allowed six months before anelection. > Any electice official who violates the preceeding section shall be penalized by disqualificatio n from election in any public office and forfeiture of the position or office to which the offender was elected."
