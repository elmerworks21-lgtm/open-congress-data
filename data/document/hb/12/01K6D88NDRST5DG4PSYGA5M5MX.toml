congress_website_title = "AN ACT PROVIDING FOR THE PRESERVATION, REFORESTATION, AFFORESTATION AND SUSTAINABLE DEVELOPMENT OF MANGROVE FORESTS IN THE PHILIPPINES, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This measure proposes to establish reservation areas in all coastal areas in each municipality of the country solely for the preservation, protection, reforestation, afforestation and sustainable development of mangrove forests. In setting aside portions of land for mangroves, we can ensure that our people will continue to enjoy the benefits accorded by this important ecosystem."
