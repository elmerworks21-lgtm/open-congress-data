congress_website_title = "AN ACT RESTRUCTURING THE FISCAL INCENTIVES UNDER EXECUTIVE ORDER NO. 226, OTHERWISE KNOWN AS THE OMNIBUS INVESTMENTS CODE OF 1987, AS AMENDED, AMENDING PERTINENT ARTICLES OF THE CODE, PROVIDING FOR PENALTIES IN VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "This proposed legislation on the rationalization of investment incentives will pave the way for an incentive system that is consolidated and highly focused, cost-effective in promoting investments time-bound and simple to administer. This rationalization is necessary in order to meet, among others, the following objectives: (1) to address the intense competition for foreign direct investment in the Asian region; (2) to bring the country's incentive schemes in line with those in the ASEAN; and(3) to achieve harmony with the WTO agreements , particularly on subsidies and countervailing measures."
