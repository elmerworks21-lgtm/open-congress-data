congress_website_title = "AN ACT TO FURTHER AMEND REPUBLIC ACT NO. 6948, AS AMENDED BY REPUBLIC ACT NO. 7696, TO PROVIDE EQUITY IN THE BENEFITS FOR SENIOR MILITARY VETERANS"
congress_website_abstract = "Rationale: Section 5 (h) of Republic Act No. 6948, as amended by Republic Act No. 7696, provides that upon reaching seventy (70) years of age, a veteran/retiree , with or without any service connected disability, shall be considered a totally disabled veteran. The clear intention is to provide an additional benefit to a veteran/retiree upon his reaching seventy (70) years of age. > This provision places a disabled veteran/retiree with actual service connected disability rating at a disadvantagein relation to a veteran who has no service connected ability.> The amending of this provision will remove the inequity by clearly providing that each veteran/retiree upon reaching the age of seventy (70), shall receive the administrative disabilityy pension in addition to his service connected disability pension he is presently receiving."
