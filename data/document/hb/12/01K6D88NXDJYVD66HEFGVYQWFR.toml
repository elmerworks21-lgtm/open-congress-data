congress_website_title = "AN ACT CREATING AND ESTABLISHING THE PHILIPPINE SKILLS COMPETITION COMMISSION, DEFINING ITS POWER, FUNCTIONS AND RESPONSIBILITIE S APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Through the Philippine Skills Competition Commission Act (PSCC), the competitions on various technical and vocational fields will be more organized and institutionaliz ed. More skilled workers from different regions of the country will begiven an opportunity to participate in the competitions that will not only display their expertise in their respective fields but will also showcase their different crafts and creations. Also the competitions will pave way for better trainings and higher morale due to the availability of facilities and funds as well as to the opportunity to be recognized. Constant international exposures in competitions will open doors to investments."

