congress_website_title = "AN ACT RESTORING THE EFFECTIVITY OF SECTION 67 OF BATAS PAMBANSA BILANG 881 WHICH DECLARES THE IPSO FACTO RESIGNATION OF ANY ELECTIVE OFFICIAL, WHETHER NATIONAL OR LOCAL, RUNNING FOR ANY OFFICE OTHER THAN THE ONE HE IS HOLDING IN A PERMANENT CAPACITY, EXCEPT FOR PRESIDENT AND VICE PRESIDENT, AND AMENDING FOR THIS PURPOSE SECTION 14 OF REPUBLIC ACT NUMBERED NINE THOUSAND AND SIX, OTHERWISE KNOWN AS THE FAIR ELECTION ACT OF 2001"
congress_website_abstract = "It is the purpose if this proposed measure to prevent public officials from abuse of their powers. It also discourages such officials from running for another public office by making it clear that they cannot go back to their former position shouldthey lost in their candidacy."

