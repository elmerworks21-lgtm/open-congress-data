congress_website_title = "AN ACT PROHIBITING THE SALE OF TOBACCO PRODUCTS TO MINORS"
congress_website_abstract = "\"Youth Anti-Smoking Protective Act of 2001\". a) Any person who sells or offers to sell to a minor any tobacco product, after trial by a court of competent jurisdiction, shall be fined an amount of fifty thousand pesos (P50,000) or an imprisonment ofno less than six months to no more than one year or both upon the discretion of the court for each act committed. b) If the violation was committed by a corporation, partnership, association or similar entity, the officers of the said entity shall be liable jointly and solidarily for the penalties imposed in this section. c) If the violator is a minor, his care and custody shall be determine by the Child and Youth Welfare Code (Presidential Decree 603, as amended) provisions on juvenile offendeers."
