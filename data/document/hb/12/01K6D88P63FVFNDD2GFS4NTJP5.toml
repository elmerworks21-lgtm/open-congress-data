congress_website_title = "AN ACT AMENDING SECTIONS 4, 8, 9, 23, 31, 32, 34, 36, 38, 43, 45, 47, 66 AND 67 OF REPUBLIC ACT NO. 9136, OTHERWISE KNOWN AS THE ELECTRIC POWER INDUSTRY REFORM ACT OF 2001 (EPIRA)"
congress_website_abstract = "This bill seeks to amend R.A. 9136 otherwise known as the Electric Power Industry Act (EPIRA) by providing among others: (1) End-users should not be limited to those in the contestable market and that they should be given the choise to where they want to purchase electric power and it should be optional on their part as to whether or not they may have to pass thru the Wholesale Electricity Spot Market. (2) The national government shall directly assumet a portion of the financial obligations ofNational Power Corporation in an amount not to exceed SEVEN hundred billion pesos (P700,000,000,0 00.00). (3) Self-generators of electricity should not be billed the Universal Charge. (4) The Energy Regulatory Commission shall include one (1) licenseed professional electrical engineer with at least ten (10) years in active practice as one ouf of the [four (4)] SIX (6) members of the Commission. (5) No distribution utility or electric cooperative shall be entitled to charge royalty fees, marginal"

