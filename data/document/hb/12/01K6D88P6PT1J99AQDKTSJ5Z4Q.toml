congress_website_title = "AN ACT REORGANIZING THE NATIONAL FOOD AUTHORITY INTO THE NATIONAL FOOD CORPORATION, REDEFINING ITS POWERS, AND CREATING THE FOOD DEVELOPMENT AND REGULATORY ADMINISTRATION, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Food Authority Reorganization Act of 2002.\" This bill seeks to strengthen the National Food Authority to ensure food security for all Filipinos and provide an orderly development to the foodgrains marketing industry so that it can extend sufficient motivations to farmers and producers to increase their productivity and competiteveness . To execute these objectives, the National food Corporation (NFC) is hereby created. > The management of the Corporation shall be vested in a Presidentwho shall be appointed by the President of the Philippines for three (3) years and who shall direct and manage the affairs of the Corporation. > This proposed measure also seeks to create the Food Development and Regulatory Administration (FDRA) whiich shall carry out regulatory as well as scientific and development functions for strengthening the efficiency of the food supply chain to increase the value of farmer's produce as a component of food products for export as well as against imports."
