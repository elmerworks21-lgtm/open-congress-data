congress_website_title = "AN ACT TO IMPROVE THE ADMINISTRATION OF JUSTICE BY DECRIMINALIZING AND PROVIDING FOR THE IMPOSITION OF ALTERNATIVE PENALTIES SHORT OF DEPRIVATION OF LIBERTY FOR CERTAIN OFFENSES"
congress_website_abstract = "Rationale: Many of the cases that occupy the attention and energies of our police, prosecutors, judges, and prison authorities relate to minor offense, infractions that cause little or no damage to persons, property, and community and those not motivated by malice but by some psychological disorders that call for treatment instead of punishment.> This bill, therefore, seeks to provide innovative measures to improve the administration of justice and reduce the dely in court proceedings. Offensesproposed to be DECRIMINALIZED are stated in this bill."

