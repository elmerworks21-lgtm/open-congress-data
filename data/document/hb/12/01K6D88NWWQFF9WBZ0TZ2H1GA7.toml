congress_website_title = "AN ACT CREATING THE OVERSEAS FILIPINO WORKERS PENSION FUND AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Overseas Filipino Workers Pension Fund Act of 2001.\" There shall be created an Overseas Filipino Workers Pension Fund. All Overseas Filipino Contract Workers who are duly registered as such with the Philippine Overseas Employment Administration (POEA) and the Commission on Filipino Overseas (CFC) shall remit five (5%) percent of their gross monthly income to the Fund for five (5) years.> All Filipino Overseas Workers who are duly registered as such with the Philippine Overseas Employees Administration and/or the Commission on Filipino Overseas as provided in Section 4 hereof shall, for pension purposes, be compulsorily covered on the first day of his employment in a foreign land."
