congress_website_title = "AN ACT TO REDUCE THE CURRENTLY IMPOSED IMPORT DUTIES ON FINISHED MEDICINE AND ON RELATED RAW MATERIALS AND FOR OTHER PURPOSES"
congress_website_abstract = "SECTION 1. Pursuant to this Act, all import duties on finished medicines currently imposed at five (5%) percent shall be reduced to three percent (3%); Provided, That the said reduction shall be impsed only for five (5) years upon the effectivity ofthis Act; Provided, further, That such reduction shall be reviewed after five (5) years of its implementation and two (2) years thereafter to assess whether or not such reduction is indeed serving its purposes and intent."
