congress_website_title = "AN ACT PROHIBITING THE DISCLOSURE BY THE MEDIA OF THE RELIGIOUS AFFILIATION, WHETHER `MUSLIM', `CHRISTIAN', OR ANY RELIGION, OF ANY PERSON SUSPECTED OR CONVICTED OF HAVING COMMITTED A CRIMINAL OR UNLAWFUL ACT, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "This bill seeks to prohibit any person to use the words \"Muslim\", \"Christian\" or any other religious affiliation in print, television, radio or any broadcast media to describe any person suspected or convincted of having committed criminal or unlawful acts. > It penalizes any person found guilty of violating this Act by six (6) years imprisonment."

