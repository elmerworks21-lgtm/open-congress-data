congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF ABSENTEE VOTING BY QUALIFIED FILIPINOS ABROAD"
congress_website_abstract = "Any overseas Filipino in any of the following categories who is absent from the place of his voting residence in the Philippines and not otherwise disqualified by law, shall have the right to register and to vote by absentee ballot in any national,regional, or local election in the city or municipality where he last resided prior to his departure from the Philippines. (1) Overseas contract workers employed outside of the Philippines and the Filipino dependents when residing with them; (2) Employees of the Philippine government serving outside of the Philippines, and their spouses and dependents when residing with them; and (3) Those temporarily residing outside of the Philippines and their spouses and dependents when residing with or accoompanying them."
