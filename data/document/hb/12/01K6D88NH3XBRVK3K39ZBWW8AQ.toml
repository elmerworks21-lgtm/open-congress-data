congress_website_title = "AN ACT AMENDING ARTICLE IV, SECTION 20 OF REPUBLIC ACT NO. 6425, AS AMENDED, OTHERWISE KNOWN AS THE DANGEROUS DRUGS ACT OF 1972"
congress_website_abstract = "Rationale: Target of this proposed measure is the network of DRUG TRAFFICKERS. It is the network of drug traffickers involved in detail of dangerous drugs which this bill seeks to put into extinction. The collapse in the operation of this network iswhat will break the nexus between bigtime drug lords and the users. The approval of this bill into law is one sure step towards this direction."
