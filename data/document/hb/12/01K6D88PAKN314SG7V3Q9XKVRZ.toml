congress_website_title = "AN ACT BANNING THE IMPORTATION AND DUMPING OF ALL KINDS OF TOXIC WASTES AND MATERIALS INTO THE COUNTRY AND FOR OTHER PURPOSES"
congress_website_abstract = "The Philippines has been tagged as the toxic wastes \\\"dumping capital\\\" of the world. Toxic wastes and materials are reportedly shipped and imported continually into the country for either recycling or final disposal. This measures urges the total ban on all kinds and forms of toxic wastes and materials for recycling or for any other use and purpose from entering the country. Likewise, permits issued to any individual or corporation for the importation of toxic wastes and materials, by any government agency, shall be revoked and declared null and void."
