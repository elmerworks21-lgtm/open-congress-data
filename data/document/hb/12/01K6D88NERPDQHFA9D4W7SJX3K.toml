congress_website_title = "AN ACT GRANTING ONE STEP SALARY GRADE INCREASE TO GOVERNMENT EMPLOYEES ONE(1)-YEAR BEFORE COMPULSORY RETIREMENT AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: A one step salary grade increase in the basic salaries of government employees in the year before their retirement will ensure an increase in lump sum retirement benefits and monthly pensions that they can use to engage in useful enterprise that will benefit them and their community during the remaining years of their lives."

