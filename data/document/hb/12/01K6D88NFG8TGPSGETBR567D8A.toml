congress_website_title = "AN ACT TO INSTITUTE POLICIES TO ELIMINATE THE TRAFFICKING IN PERSONS ESPECIALLY WOMEN AND MINORS, ESTABLISHING THE NECESSARY INSTITUTIONAL MECHANISMS FOR THE PROTECTION AND SUPPORT OF TRAFFICKED PERSONS, PROVIDING PENALTIES FOR ITS VIOLATIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Trafficki ng Act of 2001.\" Rationale: The growing feminization of poverty and migration, along with the opening of borders as an imperative of globalization, has aggravated the odious global phenomenon of labor trafficking, more particularly in women and minors. Trafficking in persons is an oppressive trade that is dehumanizing even as it exploits female and child migrants."
