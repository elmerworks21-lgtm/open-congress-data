congress_website_title = "AN ACT PROVIDING THAT THE FIRST REGISTRATION OF BRAND-NEW MOTOR VEHICLES SHALL COVER A THREE (3)-YEAR PERIOD AND REDUCING THE FIRST REGISTRATION FEE BY FIFTY PERCENT(50%), AMENDING FOR THE PURPOSE THE \"LAND TRANSPORTATION AND TRAFFIC CODE,\" AS AMENDED, AND REPUBLIC ACT NUMBERED EIGHTY-SEVEN HUNDRED AND NINENTY-FOUR, ENTITLED \"AN ACT IMPOSING A MOTOR VEHICLE USER'S CHARGE ON OWNERS OF ALL TYPES OF MOTOR VEHICLES AND FOR OTHER PURPOSES\""
congress_website_abstract = "Rationale: The government requires revenue for it to effectively implement its programs. One way for the government to generate revenue is for the Land Transportation Office (LTO) to require owners of brand-new motor vehicles to pay the registrationfee of said vehicles to cover a three-year period. To encourage them to do this, registration fees should also be reduced by fifty percent (50%). After the lapse of three years, the registration shall then be on an annual basis."
