congress_website_title = "AN ACT INSTITUTING A NATIONAL LAND USE POLICY, PROVIDING THE IMPLEMENTING MECHANISMS THEREFOR, AND FOR OTHER PURPOSES pr"
congress_website_abstract = "\"National Land Use Act of the Philippines\". This proposed National Land Use Policy Act intends to help stop the alarming rate of environment degradation and threats to our food security. It has a strong bias for two basic uses of land resources: land for production and ecological/envi ronmental protection. > This proposed national land use policy is therefore radical. It is radical in the sense that it intends to set aside land in permanence for the main purpose of agricultural production and environment protection. Such will form part of the overall policies that will be implemented in the regional, ovincial and municipal levels."
