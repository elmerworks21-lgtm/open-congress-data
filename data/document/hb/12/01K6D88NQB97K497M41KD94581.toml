congress_website_title = "AN ACT TO AMEND REPUBLIC ACT NUMBERED THREE THOUSAND FOUR HUNDRED FIFTY-SIX, AS AMENDED BY REPUBLIC ACT NUMBERED FOUR THOUSAND ONE HUNDRED SEVENTY-SEVEN, OTHERWISE KNOWN AS `INTERNAL AUDITING ACT OF 1962'"
congress_website_abstract = "Rationale: The Internal Auditing Act of 1962 has NOT been FULLY implemented. The amendments proposed in this bill mandate the concerned government agencies to promulgate within a prescribed period the implementing rules and regulations of the Internal Auditing Act and to organize Internal Audit Services and create Internal Auditor positions in government as deemed necessary to fully implement the provisions of the Internal Auditing Act."

