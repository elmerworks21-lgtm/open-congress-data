congress_website_title = "AN ACT IMPROVING EFFICIENCY IN ALL GOVERNMENT AGENCIES AND CORPORATIONS BY LIMITING THE NUMBER OF SIGNATORIES REQUIRED FOR THEIR SERVICES AND FOR OTHER PURPOSES"
congress_website_abstract = "The proposed measure aims to improve service standard by limiting the number of signatories required in government transactions and streamlining procedures to attain a smooth flow in the processing of papers and documents involved, with the end in view of expeditiously and effectively delivering basic services to the public. For this reason, approval of this bill is earnestly sought.> This Act applies to all government offices and agencies, including local government units and government-owne dor-controlled corporations with original charters: Provided, however, That this Act shall not apply to regular courts."
