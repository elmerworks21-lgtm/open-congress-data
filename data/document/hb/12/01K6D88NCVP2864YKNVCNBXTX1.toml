congress_website_title = "AN ACT IMPOSING STIFFER PENALTIES TO DRUG STORES WHICH REFUSE TO HONOR SENIOR CITIZEN CARD ISSUED BY THE GOVERNMENT FOR AVAILMENT OF BENEFITS AND PRIVILEGES GRANTED TO SENIOR CITIZENS"
congress_website_abstract = "REFUSAL to honor the 20% discount due a senior citizen shall be penalized with a fine of not less than one thousand pesos (P1,000.00) nor more than five thousand pesos (P5,000.00) or imprisonment of not less than one (1) month nor more than six (6)months or both such fine and imprisonment at the discretion of the court."

