congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1759, OTHERWISE KNOWN AS `AN ACT PENALIZING CONTRACTORS AND SUB-CONTRACTORS WHO VIOLATE ANY MATERIAL PROVISIONS OF CONTRACTS INVOLVING PUBLIC WORKS PROJECTS' BY NOW REQUIRING CONTRACTORS AND SUB-CONTRACTORS TOPOST A BOND WITH THE DEPARTMENT OF PUBLIC WORKS AND HIGHWAYS (DPWH) TO ANSWER FOR DAMAGES TO THIRD PERSONS"
congress_website_abstract = "Rationale: It has been observed that many public works projects, undertaken by private contractors, are being constructed below specifications, as to materials, quality and quantity of work, in violation of substantial provisions and requirements ofthe contract. Government has suffered tremendous losses, in terms of properties and lives, as a result of these anomalies. There have been numerous cases of buildings collapsing, which have claimed lives. Furthermore, the material claims of victimsare delayed because of the difficulty of collecting from those accountable. Thus, the need for private contractors undertaking public works projects to POST A CASH BOND in order to expedite the claims for damages of third persons due to negligence."

