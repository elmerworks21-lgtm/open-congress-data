congress_website_title = "AN ACT ESTABLISHING THE NATIONAL SERVICE TRAINING PROGRAM AS A SUBSTITUTE FOR THE RESERVED OFFICERS' TRAINING CORPS PROGRAM, AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF COMMONWEALTH ACT NO. 1, OTHERWISE KNOWN AS THE `NATIONAL DEFENSE ACT', AND REPUBLIC ACT NO. 7077, OTHERWISE KNOWN AS THE `CITIZEN ARMED FORCE OR THE ARMED FORCES OF THE PHILIPPINES RESERVIST ACT', AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill envisions to achieve these objectives: a. To provide college students an alternative to military training as a requirement for graduation in a baccaulaureate degree; and b. To ensure that the country will ahve enough reservists to meet theminimum yearly requirement for the Armed Forces of the Philippines' reserve force development."
