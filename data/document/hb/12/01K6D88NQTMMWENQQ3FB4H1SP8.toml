congress_website_title = "AN ACT STRENGTHENING THE MANDATE ON THE INTERCONNECTION BETWEEN AND AMONG PUBLIC TELECOMMUNICATI ONS ENTITIES, PROVIDING PENALTIES FOR VIOLATION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill mandates only telecommunicati ons entity shall allow the speedy, efficient and fair interconnection of facilities of other public telecommunicati ons entities to those of its own, in accordance with the interconnection parameters prescribed in Section 10 hereof and adhere to the principles of transparency and non-discriminat ion. It likewise provides for: (1) PROHIBITED ACTS OR OMISSIONS; (2) ADMINISTRATIVE PENALTIES FOR FAILURE TO INTERCONNECT; (3) INTERCONNECTION PARAMETERS; (4) INTERCONNECTION PROCEDURE, etc."
