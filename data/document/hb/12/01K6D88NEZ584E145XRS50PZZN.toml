congress_website_title = "AN ACT INTEGRATING GENDER AND DEVELOPMENT ISSUES AND CONCERNS IN ALL CURRICULA OF ALL LEVELS OF EDUCATION AND TRAINING IN ALL SCHOOLS AND UNIVERSITIES OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "The integration of Geneder and Development (GAD) issues and concerns in the curricula of all levels of education and trainings in all schools and universities of the country is important to our own citizenship, and to our own local governance, as itwill seeks to highlight the key concepts of geneder and development - sustainable development, social justice and equality, family relations and population, sound values and perceptions, roles of women and men, diversity, conflict resolutions, humanrights and among others."
