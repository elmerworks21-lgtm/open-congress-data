congress_website_title = "AN ACT MANDATING MATERNITY LEAVE BENEFITS REGARDLESS OF MARITAL STATUS, AMENDING FOR THIS PURPOSE ARTICLE 133 OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: Single pregnant women must be supported and protected rather than be criticized and penalized because of their ordeal. These women need the Government's support, especially since it cannot be denied that in many cases, these women were left by their male partners, leaving them to fend for themselves unlike married women who usually have their husbands ti assist them."
