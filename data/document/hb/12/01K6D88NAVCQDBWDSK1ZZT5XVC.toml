congress_website_title = "AN ACT PROVIDING FOR A NATIONAL ECOTOURISM POLICY, ESTABLISHING A FRAMEWORK FOR ITS INSTITUTIONALIZ ATION, CREATING A MECHANISM FOR ITS IMPLEMENTATION AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposes an ecotourism policy growth and environmental protection. It creates a National Ecotourism Commission which shall formulate and implement an Ecotourism Master Plan with the assistance of the Department of Tourism and the Department of Environment and Natural resources. The bill also proposes a network of ecotourism sites which would be inclided in the Integrated Areas System under R.A. No. 7586, also known as National Integrated Protected Areas System Act of 1992 (NIPAS)."
