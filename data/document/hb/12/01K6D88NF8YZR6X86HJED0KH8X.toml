congress_website_title = "AN ACT PROVIDING FOR A MORE RESPONSIVE NURSING PROFESSION, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 7164, OTHERWISE KNOWN AS `THE PHILIPPINE NURSING ACT OF 1991' AND FOR OTHER PURPOSES"
congress_website_abstract = "Among the salient provisions of this bill are: (1) Strengthening of the Board of Nursing; (2) Improvement of the Licensure Examination; (3) Making nursing education and practice more relevant; (4) Increasing the participation of the accredited professional nursing association in the different concerns of the profession; and (5) Integrating the nursing profession in the country."
