congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8436, ENTITLED `AN ACT AUTHORIZING THE COMMISSION ON ELECTIONS TO USE AN AUTOMATED ELECTION SYSTEM IN THE MAY 11, 1998 NATIONAL OR LOCAL ELECTIONS AND IN SUBSEQUENT NATIONAL AND LOCAL ELECTORAL EXERCISES, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Specifically, this bill introduces amendments directed at improving the legal and procedural framework for modernization of the electoral system setting clear guidelines and standards that will ensure the integrity of the counting and canvassing process. Furthermore, it mandates the COMELEC to ensure that the benefits of the measure will be afforded the voting public by establishing criteria for prioritization."
