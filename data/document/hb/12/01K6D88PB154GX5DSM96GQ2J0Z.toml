congress_website_title = "AN ACT STRENGTHENING THE EDUCATION AND TRAINING PROGRAMS IN THE PENAL INSTITUTIONS AND PROVIDING FUNDS THEREOF"
congress_website_abstract = "Prisoners upon release from prison should be given the chance to have free and decent lives in the outside world. However, it is a sad reality that ex-prisoners have extreme difficulty in finding jobs. As a result, some of these ex-prisoners have to resort to illegal activities in order to survive, only to end up in jail again. This bill seeks to strengthen the education and training programs in penal institutions. It provides for a complete high school curriculum to enable inmates to complete their secondary education. It also provides for the holding of vocational training for those who have completed high school or college education. With the proper education and training, inmates would be better equipped to engage in small business ventures upon their release."

