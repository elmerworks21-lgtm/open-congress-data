congress_website_title = "AN ACT PROVIDING FOR FIREARMS REGULATION AND EXEMPTING SELECTED PERSONS AND ENTITIES FROM THE GENERAL PROHIBITION AGAINST CARRYING OF FIREARMS"
congress_website_abstract = "Rationale: Recognizing that the possession and carrying of firearms at home or in public, by private persons or by public officers, have resulted in a rising crime rate, this bill provides for stringent measures to be taken up and implemented to guarantee he safety of the Filipino people and protect their life, liberty and property. > As a general prohibition against carrying of firearms, it shall be unlawful for any person to carry firearms outside his residence or workplace without being issued a permit to carry firearms by the Philippines National Police. This bill enumerates certain persons who are exempted from the prohibition against carrying of firearms in public. It also sets standards that shall govern the issuance of firearms liccense and permit to carry. Private security agencies and individuals engaged in precarious occupation, who are holders of a permit to carry firearms, shall be allowed to carry the firearms only while he/she is in the actual performance of an official"
