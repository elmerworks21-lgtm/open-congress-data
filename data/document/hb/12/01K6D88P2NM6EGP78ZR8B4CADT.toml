congress_website_title = "AN ACT AUTHORIZING THE EXERCISE OF THE POWER OF EMINENT DOMAIN BY THE EXECUTIVE BRANCH OF THE GOVERNMENT, THROUGH THE DEPARTMENT OF JUSTICE, FOR THE PURPOSE OF EXPROPRIATING, WHOLLY OR PARTIALLY, INDEPENDENT POWER PRODUCERS AND OTHER PRIVATE COMPANIES INVOLVED IN THE GENERATION, TRANSMISSION AND DISTRIBUTION OF ELECTRICITY AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Selective Expropriation in the Power Industry Act of 2002\". This bill seeks to authorize the Executive branch of government, through the Department of Justice, to exercise the power of eminent domain, for the purpose of expropriating, wholly or partially, independent power producers and other private companies involved in the generation, transmission and distribution of electricity."

