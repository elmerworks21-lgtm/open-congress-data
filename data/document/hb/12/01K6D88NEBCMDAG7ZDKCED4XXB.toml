congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF PRESIDENTIAL DECREE NO. 1566, OTHERWISE KNOWN AS STRENGTHENING THE PHILIPPINE DISASTER CONTROL, CAPABILITY AND ESTABLISHING THE NATIONAL PROGRAM ON COMMUNITY DISASTER PREPAREDNESS"
congress_website_abstract = "This bill seeks to transfer the chairmanship of the National Disaster Coordinating Council from the Department of National Defense to the Department of Social Welfare and Development (DSWD). Furthermore, it mandates that the Executive Officer of theNational Disaster Coordinating Council shall be the Director of the Bureau of Emergency Assistance of the DSWD."

