congress_website_title = "AN ACT AUTHORIZING LOCAL GOVERNMENT UNITS TO UTILIZE THEIR ANNUAL INTERNAL REVENUE ALLOTMENT (IRA) AS COLLATERAL TO INCUR INDEBTEDNESS WITH ANY GOVERNMENT OR PRIVATE FINANCIAL INSTITUTION AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill endeavors to provide part of the answer to the constant need of LGUs for money to finance, among others, their daily operation s and infrastructure needs. For LGUs to wait for the quarterly IRA releases as provided for by law may delay their response to ever-growing opportunities awaiting their respective localities. > It is the proposotion of this representation that LGUs be allowed to use thier share of their annual IRA as collateral to enable them to borrow funds from either government of private financial institutions for their development needs. However, such collateral must only be limited to the LGUs share of their annual IRA within the term of office for which they are elected."
