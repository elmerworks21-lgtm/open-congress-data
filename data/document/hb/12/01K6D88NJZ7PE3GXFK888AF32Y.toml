congress_website_title = "AN ACT CREATING THE SUBSIDY OVERSIGHT COUNCIL AND PROVIDING THE RULES FOR A RATIONAL MANAGEMENT OF THE GOVERNMENT SUBSIDY SYSTEM"
congress_website_abstract = "Rationale: An important feature of this measure is the creation of the Subsidy Oversight Council as a supervisory and recommendatory commission which will monitor exclusively the grant of tax incentives, government loan guarantees, debt condonation,and concessional loans. All government agencies, which are empowered to grant subsidies, will regularly report on such activities to the Council. The Council shall them summarize such reports and prepare its own Quarterly report to be published in at least six (6) national broad sheets."
