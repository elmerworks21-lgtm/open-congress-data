congress_website_title = "AN ACT MANDATING THE PHILIPPINE OVERSEAS EMPLOYMENT AGENCY (POEA) TO INCLUDE IN ITS PROGRAM FOR OVERSEAS EMPLOYMENT THE MANDATORY TEACHING OF BASIC SELF-DEFENSE TECHNIQUES FOR WOMEN APPLICANTS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: For the past decades now, there had been alarming upsurge of violence especially against women, our overseas women employees abroad included. Because of thier apparent vulnerable conditions in the workplace, they have often become prone to assault, harassment, rape, and other forms of violence. These alleged forms of violence against our women overseas employees can be averted by a program that will require our women overseas employees to face not only the psychological and emotionalchallenges confronting them while productively employed abroad apart from their respective families."

