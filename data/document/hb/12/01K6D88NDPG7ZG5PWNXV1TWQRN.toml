congress_website_title = "AN ACT REQUIRING LOCAL GOVERNMENTS TO PLANT TREES ALONG NATIONAL AND LOCAL HIGHWAYS WITHIN ITS TERRITORIAL BOUNDARIES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Greening of Philippine Highways Act of 2001.\" It shall be the primary responsibility of local government, with the cooperation of the Department of Interior and Local Government, Department of Environment and Natural Resources, Department of Public Works and Highways and other concerned government agencies, to plant and maintain indigenous Philippine trees along national and local highways within their respective territorial boundaries."
