congress_website_title = "AN ACT PROVIDING SAFETY NETS THAT WOULD ENABLE THE AGRICULTURAL SECTOR TO ADJUST TO AND BE MORE COMPETITIVE IN THE FACE OF THE GENERAL AGREEMENT OF TARIFFS AND TRADE (GATT), AND FOR OTHER PURPOSES"
congress_website_abstract = "Among the victims of injustice are those in the far-flung barangays who, due to scarcity of lawyers, have to suffer delays in court litigations even for just minor offenses. Some have been detained in jail longer than the penalty they are supposed to serve. The few available lawyers in these places have to seek for several postponements of the hearing of cases they are handling, as they cannot cope with the attendant preparation for the case, documentation and indepth study of the case. The institution of a NATIONAL PARA-LEGAL SYSTEM could minimize such problem."
