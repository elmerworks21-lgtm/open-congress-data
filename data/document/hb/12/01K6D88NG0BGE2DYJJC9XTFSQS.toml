congress_website_title = "AN ACT STRENGTHENING THE PHILIPPINE COAST GUARD AND VESTING IN IT THE PRIMARY RESPONSIBILITY OF ENFORCING MARITIME SAFETY RULES AND REGULATIONS AS WELL AS ANY OTHER MATTER RELATED TO THE PERFORMANCE OF SAFETY OF LIFE AND PROPERTY FUNCTION WITHIN PHILIPPINE TERRITORIAL WATERS AND FOR OTHER PURPOSES"
congress_website_abstract = "This proposed measure seeks to confer upon the Philippine Coast Guard the primary responsibility of overseeing the safety of life and property at sea of all seafarers. It intends to resolve the confusion that arises in the aftermath of sea disasters where government agencies usually point at each other as being negligent or responsible for the sea mishaps. It does so by delineating the functions of the government agencies involved in the protection of seafarers, sea cargo, and vessels. It tasks the Maritime Industry Authority (MARINA) with the duty of issuing rules, regulations and standards pertaining to the maritime industry, safety and other related matters while the Philippine Coast Guard is tasked with the duty of enforcing and impplementing such rules, regulations and standards promulgated by the MARINA."
