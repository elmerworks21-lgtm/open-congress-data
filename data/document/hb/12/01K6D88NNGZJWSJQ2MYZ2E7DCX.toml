congress_website_title = "AN ACT TO EXPAND THE POWERS, DUTIES AND FUNCTIONS OF A PUNONG BARANGAY, AMENDING FOR THE PURPOSE SECTION 389, CHAPTER 3 OF THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "The duties and functions of the PUNONG BARANGAY shall INCLUDE the following: (1) ENFORCE ALL LAWS AND REGULATIONS RELATING TO THE PREVENTION, USE AND SALE OF ILLEGAL DRUGS; (2) PERFORM MINOR REPAIR AND MAINTENANCE OF MUNCIPAL AND BARANGAY ROADS IN COORDINATION WITH THE MAYORS OF THEIR RESPECTIVE MUNICIPALITIES OR CITIES; AND (3) CONDUCT ANNUALLY A CENSUS OF THE POPULATION OF BARANGAY AND SUBMIT THE RESULT OF SUCH CENSUS TO THE NATIONAL CENSUS STATISTICS OFFICE THROUGH THE MAYOR OF SUCH MUNICIPALITY OR CITY."

