congress_website_title = "AN ACT TO LIBERALIZE THE OPERATIONS OF RURAL BANKS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7353, OTHERWISE KNOWN AS THE NEW RURAL BANKS ACT OF 1992 AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Rural banks play a crucial role in the economy since they are in the forefront of the rural financial system. They mobilize small savings and provide farmers, fishermen, microentreprene urs, employees, market vendors and other rural workers access to credit in order to give them the opportunity to improve the quality of their life by engaging in productive activities. The Rural Banks Act of 1992 was passed in recognition of the need to make credit available and accessible in the rural areas. However, due to the rigid interpretation of the law by government agencies, the beneficial effects of RA 7353 were diluted. This proposed bill aims to resolve the issues and plug the loopholes that diluted the real intent of RA 7353."
