congress_website_title = "AN ACT DECLARING THE WALING-WALING AS THE NATIONAL FLOWER OF THE PHILIPPINES"
congress_website_abstract = "Rationale: The Sampaguita was designated as the Philippines National flower by virtue of Executive Proclamation No. 652 issued by Gov. Gen. Frank Murphy on February 1, 1934. > According to Dr. Eduardo Quisumbing National Museum Director, and Dr. Vicente Saplala, a professor of the UP Los Banos, the sampaguita is a native of India and Arabia while the Walingwaling \"is not only indigenous but endemic to the Philippines.\" > Aside from having its origin in the Philippines, the Waling-waling floweris truly symbolic of the Filipino traits and characteristics ."

