congress_website_title = "AN ACT GRANTING TO THE PUBLIC A PEOPLE'S FRANKING PRIVILEGE ON COMMUNICATIONS MAILED OR SENT BY CABLE/TELEGRAM TO THE PRESIDENT, VICE PRESIDENT, SENATORS, MEMBERS OF THE HOUSE OF REPRESENTATIVES AND TO CABINET SECRETARIES"
congress_website_abstract = "All communications, whether by mail or cable/telegram from the public addressed to the President, Vice-President, Senators, Members of the House of Representatives and Cabinet Secretaries for delivery within the country shall be received, transmitted and delivered free of charge; Provided, that the mail shall be sent by ordinary mail only; Provided further, that the said mail shall not exceed one hundred twenty grams in weight; and Provided finally, that cables and telegrams shall be sent through government telegraph offices."
