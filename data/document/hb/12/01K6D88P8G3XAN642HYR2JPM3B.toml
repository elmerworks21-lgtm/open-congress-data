congress_website_title = "AN ACT DECLARING THE PERIOD FROM MAY 1 TO 7 OF EVERY YEAR AS THE NATIONAL OLDER WORKERS WEEK"
congress_website_abstract = "Our work force is dominated by older workers who have rendered invaluable service not only the companies they work for but to the society as well. However, their immeasurable contributions have not been given due recognition. The bill proposes to declare the period from May to May 7 of every year as the \"National Older Workers Week\" to give due recognition to the contributions given by workers, both in the government and in the private sectors, aged fifty years and above. A nationwide search for outstanding older workers in various categories shall be conferred with honorary and cash awards."
