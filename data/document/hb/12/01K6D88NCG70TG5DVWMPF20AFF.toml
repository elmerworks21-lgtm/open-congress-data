congress_website_title = "AN ACT AMENDING PARAGRAPH (D), SECTION 324 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "LGU budgets for unforeseen calamities shall comply with the following requirements: That such appropriation shall be used only in the area, or portion thereof, of the local government unit or other aread [declared in state of calamity by the President] AFFECTED BY DISASTER OR CALAMITY AS DETRMINED BY THE LOCAL SANGGUNIAN CONCERNED: PROVIDED. THAT THE TWENTY PERCENT (20%) OF THE UNEXPENDED BALANCE OF THE ANNUAL LUMP SUM APPROPRIATION FOR UNFORESEEN EXPENDITURES ARISING FROM THE OCCURRENCE OF CALAMITIES SHALL NOT REVERT TO THE UNAPPROPRIATED SURPLUS OF THE GENERAL FUND, BUT INSTEAD, SHALL BE SET ASIDE AS A CALAMITY RESERVE FUND. SAID FUND TO BE USED TO AUGMENT THE ANNUAL CALAMITY FUND WHEN DEEMED NECESSARY."

