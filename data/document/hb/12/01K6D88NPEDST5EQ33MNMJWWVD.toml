congress_website_title = "AN ACT TO AMEND CHAPTER V, BOOK VI OF THE ADMINISTRATIVE CODE OF 1987 (RE: POWER OF THE PRESIDENT TO IMPOUND FUNDS)"
congress_website_abstract = "This bill refers to Section 38, Chapter 5 of the Administration Code if 1987 on the power of the President to impound funds. > Rationale: Impounding can harm the integrity of the budget process. The President may allow the budget to be bloated, knowing that he can opt not to implement projects and programs by his power to impound fund.> Impounding powers of the President could harm the integrity and rationality of the budget process in waste of scarce government resources and/or possible sacrifice of long-term growth potentials."

