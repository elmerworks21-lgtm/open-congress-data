congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF BARANGAY DRUGSTORES, OTHERWISE KNOWN AS \"BOTICA SA BARANGAY\" AND FOR OTHER PURPOSES"
congress_website_abstract = "Drugstores are normally non-existent in barangays outside of the town proper. Most of our people in the countryside are thus deprived of access even to basic drugs and medicines when they are afflicted and in need.> Within a period of three (3) years, the Department of Health is enjoined to establish barangay drugstores or \"botica sa barangay\" in every barangay making available drugs for common illnesses such as fever, pain, cough/colds and others, including vitamin and mineral preparations."

