congress_website_title = "AN ACT AUTHORIZING THE CONDONATION OF PENALTIES ON DELINQUENT SOCIAL SECURITY CONTRIBUTIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "Any employer who is delinquent or has not remitted all contributions due and payable to Social Security System (SSS) may, without incurring the prescribed penalty: (a) Pay or remit all such delinquent contributions within a period of twelve (12) months from the effectivity of this Act; or (b) Submit in writing a proposal to pay installment such delinquent contribution within a period of six (6) months from the effectivity of this Act. > Provided: That the employer shall submit together with hisremittance or installment proposal the corresponding collection list."

