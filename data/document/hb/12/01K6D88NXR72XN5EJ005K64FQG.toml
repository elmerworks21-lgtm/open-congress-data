congress_website_title = "AN ACT TO STRENGTHEN AND EFFECTUATE EQUALITY OF OPPORTUNITY FOR ALL FILIPINO WOMEN, ESTABLISHING AND IMPLEMENTING MACHINERY THEREFOR, APPROPRIATING FUNDS IN SUPPORT THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Equality of Opportunity for All Filipino Women Act of 2001\". It is hereby declared UNLAWFUL, and contrary to public policy, on the part of any party to any service relationship, to engage in the practice of inequality against women in such relationship, or commit any act of discriminating against any women in such relationship, based primarily on sex. > \"SERVICE RELATIONSHIP\" shall include employment of any kind, the hiring of professionals or the contracting of any piece of work, by which services are performed for a compensation in any form or any kind, under the control of the hirer or his representative, with respect to the result only, or with respect to the details and manner of performance as well as the result thereof."

