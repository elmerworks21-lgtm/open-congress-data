congress_website_title = "AN ACT PENALIZING THE APPROPRIATION, ENCROACHMENT, REGISTRATION AND TITLING OF CREEKS, ESTEROS, STREAMS, CANALS, RIVER BANKS AND OTHER PUBLIC WATERWAYS AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Land in urban areas has become so scarce that even small spaces of about 60 square meters have become invaluable. Urban centers have become so crowded that every available space are being encroached upon and titled to the extent that evencanals, streams, esteros are being filled up and built over, regardless of the fact that these are properties of the state, is inalienable and acquisition thereof is fraudulent. This bill seeks to provide penalties to those unscrupulous persons whoexploit this situation. Penalizing such registrants shall serve as a deterrent to these malefactors to prevent or curtail their anomalous acts of titling these waterways."
