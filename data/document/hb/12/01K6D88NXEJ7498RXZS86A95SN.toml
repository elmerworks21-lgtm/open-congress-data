congress_website_title = "AN ACT PROVIDING THAT THE CERTIFICATE OF LAND OWNERSHIP AWARD ISSUED UNDER THE COMPREHENSIVE AGRARIAN REFORM PROGRAM SHALL BE ACCEPTED BY FINANCIAL INSTITUTIONS AS COLLATERAL FOR LOANS, AMENDING FOR THE PURPOSE THE COMPREHENSIVE AGRARIAN REFORM LAWOF 1988"
congress_website_abstract = "SUBJECT TO THE RIGHTS OF THE LAND BANK OF THE PHILIPPINES OVER THE AWARDED LAND, ALL FINANCIAL INSTITUTIONS SHALL ACCEPT AS COLLATERAL FOR LOANS ANY DULY REGISTERED CERTIFICATE OF LAND OWNERSHIP AWARD ISSUED BY THE DEPARTMENT OF AGRARIAN REFORM; PROVIDED, THAT THE LOANS OBTAINED SHALL BE USED IN THE IMPROVEMENT OR DEVELOPMENT OF THE LAND AWARDED OR THE ESTABLISHMENT OF FACILITIES THAT WILL ENHANCE PRODUCTION OR MARKETING OF AGRICULTURAL PRODUCTS OR WILL INCREASE FARM INCOME."
