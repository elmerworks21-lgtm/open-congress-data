congress_website_title = "AN ACT TO AMEND SUBSECTION 3, ARTICLE 335 OF THE REVISED PENAL CODE AND FOR OTHER PURPOSES(RE: RAPE OF CHILDREN UNDER 12 YRS. OLD)"
congress_website_abstract = "The proposed amendment deals with WHEN AND HOW RAPE IS COMMITTED. The following circumstance is the subject of said amendment: When the woman is under twelve years of age, even though neither of the circumstances mentioned in the two next precedingparagraphs shall be present[.]: PROVIDED, THAT THE WOMAN IS NOT A PROFESSIONAL PROSTITUTE, OTHERWISE THE PARENTS OR ANY PERSON IN CHARGE OR PROMOTES THE SEX ACTIVITIES OF SUCH WOMAN SHALL BE HELD LIABLE FOR RAPE UNDER THIS SUB-SECTION."
