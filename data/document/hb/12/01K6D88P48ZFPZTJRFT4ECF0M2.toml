congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 9160, OTHERWISE KNOWN AS THE `ANTI-MONEY LAUNDERING ACT OF 2001'"
congress_website_abstract = "Under this proposed measure, the Anti-Money Laundering Council is given the authority to inquire into or examine any particular deposit or investment with any banking institution or non-bank financial institution WITHOUT THE NEED TO ESTABLISH PROBABLE CAUSE that the deposit or invesment is related to a money laundering offense. All that us needed is to ESTABLISH A REASONABLE GROUND to believe that an unlawful activity or a money laundering offense or any violation of this Act is about to be, isbeing or has been committed."
