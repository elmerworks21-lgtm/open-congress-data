congress_website_title = "AN ACT PROVIDING FOR THE MANDATORY APPOINTMENT OF SOCIAL WELFARE AND DEVELOPMENT OFFICERS FOR MUNICIPAL GOVERNMENTS, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: Social welfare services include activities on case work, group and community organizations. Its main goal is to assist individuals, groups and communities towards coordinated action which will ultimately lead to the improvement of their economic and social conditions. Social welfare services, indeed has, for its profession base social workers who are primarily tasked with these social services activites aimed at facilitating and strengthening the basic social relationships and the mutual adjustment between individuals and their environment for the good of society.> In view of the aforemetioned consideration, the existence oif a person to help uplift the living condition of the disadvantages sector of the society is a must, thusthe appointment of a duly licensed social workers in the municipal government should be mandatory. Hence, this bill, approval of which is sought."
