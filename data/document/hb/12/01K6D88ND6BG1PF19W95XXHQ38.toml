congress_website_title = "AN ACT INSTITUTING POLICIES GOVERNING THE HOUSEHOLD EMPLOYMENT INDUSTRY, ESTABLISHING A STANDARD OF PROTECTION AND PROMOTING THE WELFARE OF HOUSEHOLD HELPERS AND THEIR FAMILIES"
congress_website_abstract = "\"Batas Kasambahay.\" Rationale: Household helpers have been relegated by law, custom and convention to the informal sector of the labor force. They have been deliberately excluded from several protective provisions of law relating to basic rights andprivileges otherwise accorded traditional groups of the labor sector. Since the interaction between employer and household helper is confined within the walls of private residences, the predominantly female members of the industry are unduly exposedto physical, mental and sexual abuse and exploitation. Compounding the problem is the inherent timidity and passiveness of the household helpers themselves, who have little or no awareness of their basic rights and privileges."
