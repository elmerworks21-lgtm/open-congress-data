congress_website_title = "AN ACT TO PREVENT, DETECT, PROSECUTE AND PUNISH MONEY LAUNDERING AND THE USE OF BUSINESS FACILITIES IN THE PHILIPPINES IN MONEY LAUNDERING AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Money Laundering Act of 2001.\" Rationale: It is the policy of the State to ensure that the Philippines is not used as a money laundering site, transit point and haven for the proceeds of criminal and unlawful offenses committed abroad. It islikewise, the policy of the State to do its share in the global effort of preventing, detecting, and punishing money laundering wherever committed."
