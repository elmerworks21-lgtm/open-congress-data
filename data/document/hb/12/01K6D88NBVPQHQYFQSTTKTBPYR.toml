congress_website_title = "AN ACT DECLARING VARIOUS FORMS OF UNFAIR TRADE PRACTICES AS ACTS OF ECONOMIC SABOTAGE, PRESCRIBING PENALTIES THEREFOR, GRANTING INCENTIVES AND REWARDS FOR ASSISTANCE OF WITNESSES AND INFORMANTS LEADING TO SUCCESSFUL PROSECUTION THEREOF, AND FOR OTHER PURPOSES (anti-trust)"
congress_website_abstract = "Rationale: It is hoped that this proposed measure be instrumental in curbing the proliferation of the activities of those engaged in unfair competition and trade practices that threaten the very foundation of the local industry and business sectorsin particular, and the Philippine economy, in general. This Act likewise aims to ensure that the proper duties and taxes are paid to augment the government's depleted resources which are urgently needed to meet the society's basic requirements."
