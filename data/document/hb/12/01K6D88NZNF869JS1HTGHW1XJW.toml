congress_website_title = "AN ACT GRANTING THE SANGGUNIANG PANLALAWIGAN THE POWER TO CONDUCT INQUIRIES, IN AID OF LEGISLATION, ISSUE SUBPOENA TESTIFICANDUM AND DUCES TECUM, AND TO PUNISH FOR CONTEMPT ANY PERSON WHO REFUSES TO OBEY SUCH PROCESS, AMENDING FOR THE PURPOSE, SECTION 468 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill gives the Sangguniang Panlalawigan more powers by giving it the power to conduct inquiries in aid of legislation, issue subpoena testificandum and duces tecum and to punish for contempt any person who refuses to obey this process and refuse to be sworn to or answer inquiries whem lawfully required to do so. Anyone who refuses to obey the subpoena or refuses to be sworn to or answer inquiries when lawfully required to do so by the Sangguniang Panlalawigan in connected with its legislative function under Section 48 of R.A. 7160 and its quasi-judicial power under Section 62 and 63 and related sections of R.A. 7160 may, after due norice and hearing, be adjudged in contempt and be punished by a fine not exceeding THREE THOUSAND PESOS(P3,000.00) or imprisonment not exceeding ten days, or both at the discretion of the concerned Sangguniang Panlalawigan."
