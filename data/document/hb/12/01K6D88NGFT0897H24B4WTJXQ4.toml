congress_website_title = "AN ACT CREATING THE DEPARTMENT OF FISHERIES AND AQUATIC RESOURCES, PROVIDING FOR ITS POWERS AND FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to create the Department of Fisheries and Aquatic Resources (DFAR) to ensure the preservation and enhance the proper development of the Philippine water and marine resources. The proposed Department shall manage, develop, protect, conserve and utilize all fisheries and aquatic resources of the country except for municipal waters, which shall remain under the jurisdiction, capture, processing and marketing of fisheries and marine products, as well as streamline all the agencies presently involved, or has something to do, in the fishery sector."
