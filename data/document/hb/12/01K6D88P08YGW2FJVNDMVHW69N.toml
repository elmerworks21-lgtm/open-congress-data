congress_website_title = "AN ACT PROHIBITING THE PUBLICATION OF LEWD PHOTOGRAPHS AND SEX STORIES AND ARTICLES IN TABLOID AND BROADSHEET NEWSPAPERS, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Press freedom does not entail publishing materials offensive to society's moral standards. If the time-honored principle enshrined in the Constitution is allowed to go wayward toward this unwanted end, we can only expect a society governed by the basest of human moods and dispositions. A benchmark of decency must therefore be maintained if the freedom of the press is to be fully entrusted to media's responsibility. This is already contained in court rulings. We cannot let go of any selfish acts designed to rake profits for the media and their owners but inimical to society's interests."
