congress_website_title = "AN ACT DEREGULATING CERTAIN PUBLIC SERVICES, AMENDING FOR THE PURPOSE COMMONWEALTH ACT NO. 146, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Franchises to render specific public services may be extended to one or a limited number of private enterprises in a specified service area, if necessary to encourage private enterprises to render such public service. The best qualified and most capable to render such public service shall be elected in the required number from among competing applicants. Such franchises have the effect of limiting normal competition in rendering the public service, and are therefore subject to regulation by thedesignated agency of government."
