congress_website_title = "AN ACT AMENDING SECTION 13 OF REPUBLIC ACT NO. 3019, OTHERWISE KNOWN AS THE `ANTI-GRAFT AND CORRUPT PRACTICES ACT'"
congress_website_abstract = "Rationale: The main objective of preventive suspension is to prevent an accused official from interfering with the normal course of his investigation by wielding his influence and authority over the conduct of possible witnesses. Preventive suspension is also said to decrease possible instances of tampering or destruction of evidentiary records by someone still in authority.> Instead of utilizing the wisdom behind the remedy, preventive suspension has unwittingly become the tool for polical reprisals and other base motives."

