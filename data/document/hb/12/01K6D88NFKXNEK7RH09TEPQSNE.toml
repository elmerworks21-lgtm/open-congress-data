congress_website_title = "AN ACT TO RESTRICT THE ACCESS OF YOUTH TO CIGARETTES AND OTHER TOBACCO PRODUCTS"
congress_website_abstract = "\"Contrl Youth Access to Tobacco Act.\" Significant provisions of this bill are: (1) VENDING MACHINES - Vending Machines may be used to sell tobacco products only in an area or establishment from which individuals under the minimum age prescribed by subsection (b) are denied access. (2) MINIMUM AGE - No manufacturer, distributor, or retailer or tobacco products may offer or distribute tobacco products may sell a tobacco product to an individual who is less than 18 years old. (3) PACKAGES OF CIGARETTES - Only cigarettes in a package of 20 cigarettes may be sold or distributed by a manufacturer, distributor, or retailer or tobacco products. (4) SAMPLING - No manufacturer, distributor, or retailer or tobacco products may offer or distribute tobbacco products for sampling except in an area or establishment from which minors are denied access."
