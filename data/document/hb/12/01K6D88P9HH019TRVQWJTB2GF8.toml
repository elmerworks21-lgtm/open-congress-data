congress_website_title = "AN ACT AMENDING SECTION 97 OF REPUBLIC ACT NO. 8550 OTHERWISE KNOWN AS THE FISHERIES CODE OF THE PHILIPPINES OF 1998"
congress_website_abstract = "The Fisheries Code of the Philippines of 1998 is viewed by certain players in the aquaculture industry as unrealistic, oppressive and does not take into consideration new developments in aquaculture. The bill seeks to define the term \\\"endangered species\\\" as referring to any of the rare marine life which is declining in number and is in danger of extinction and, for the purpose of this proposed act, are listed in the CITES (Convention on the International Trade in Endangered Species of Wild Fauna and Flora). The proposed definition specifically excludes species which are replenished or grown by man with the the aid of research and technology and where actual propagation is in place assuring the preservation and increase in such marine life."
