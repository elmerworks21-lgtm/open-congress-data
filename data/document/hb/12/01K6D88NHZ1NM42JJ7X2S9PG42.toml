congress_website_title = "AN ACT AMENDING CERTAIN PROVISION OF REPUBLIC ACT NO. 7432 OTHERWISE KNOWN AS `AN ACT TO MAXIMIZE THE CONTRIBUTION OF SENIOR CITIZENS TO NATION BUILDING, GRANT BENEFITS AND SPECIAL PRIVILEGES AND FOR OTHER PURPOSES'"
congress_website_abstract = "Section 4, Sub-section (a) and (b) of Republic Act No. 7432 are hereby amended to read as follows: \"Sec. 4. Privilege for the Senior Citizen. - The senior citizen shall be entitled to the following: (a) the grant of FIFTY PERCENT (50%) discount fromall establishment relative to the utilization of transportation services, hotels and similar lodging establishment, restaurants, recreation centers, hospitals, and the purchase of medicines anywhere in the country: Provided, that private establishments may claim the cost as tax credit; (b) a minimum of FIFTY PERCENT (50%) discount on admission fees charged by theater, cinema houses and concert halls, circuses, carnivals and other similar places of culture, leisure, and amusement;\""
