congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7837, OTHERWISE KNOWN AS `AN ACT GRANTING PERMANENT RESIDENT STATUS, OTHER RIGHTS AND PRIVILEGES TO FILIPINO VETERANS OF WORLD WAR II WHO ACQUIRED AMERICAN CITIZENSHIP UNDER THE UNITED STATES IMMIGRATION ACT OF 1990,AND FOR OTHER PURPOSES"
congress_website_abstract = "Any Filipino veteran of World War II who acquired American citizenship pursuant to the United States Immigration Act of 1990 OR ANY OTHER PRIOR ACT shall be qualified for permanent resident status and is hereby granted limited property rights and privileges shall likewise automatically accrue upon illigitimate, and unmarried children of Filipino veterans who thereafter acquired American citizenship.> The amendment also shall cover LAND OWNERSHIP and the PRACTIVE OF PROFESSION."
