congress_website_title = "AN ACT ALLOWING AS DEDUCTION FROM THE GROSS INCOME CONTRIBUTIONS MADE BY INDIVIDUALS, GROUPS OR COMPANIES TO ANY CANDIDATE/S OR POLITICAL PARTY/IES DURING ELECTIONS, AMENDING FOR THE PURPOSE SECTION 34 OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS `THE TAX REFORM ACT OF 1997'"
congress_website_abstract = "Rationale: Very qualified people, more often than not, are not able to participate in politics because of lack of funds, thus, discouraging them to offer their service to the country. On the other hand, well meaning individuals and or business organizations or groups are not abl;e to contribute because under the existing laws, these contributions are deductible from the gross income, thus included in the taxable income."

