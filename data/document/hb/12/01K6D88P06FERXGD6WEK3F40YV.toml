congress_website_title = "AN ACT ESTABLISHING JOB PLACEMENT CENTERS IN ALL PROVINCIAL OFFICES OF THE TECHNICAL EDUCATION AND SKILLS DEVELOPMENT AUTHORITY (TESDA), AMENDING FOR THE PURPOSE THE `TESDA ACT OF 1994'"
congress_website_abstract = "Rationale: The establishments of a job placement center in the provincial offices of the TESDA would ensure trainees or graduates of TESDA of appropriate jobs. The center would be able to help them finnd a job suitable to their skills. It will openthe opportunity for the people in the rural areas to be gainfully employed hence, solve the growing unemployment problem. Likewise, this will protect our skilled workers against unscrupulous labor recruiters."

