congress_website_title = "AN ACT TO PREVENT AND PENALIZE COMPUTER CRIMES"
congress_website_abstract = "\"Anti-Cyber Crime Law\". It is the policy of the State to protect the society against the upsurge of computer fraud, destruction of electronic systems and properties and proliferation of crimes brought about by the continuing globalization of computer networks. It is imperative for us to maintain the confidentiality , integrity, reliability and availability of computer systems, networks and computer data in the furtherance of our national interest and security. It is in this context that the State recognizes its duty to safeguard its interest against the menace of electronic frauds that tend to disrupt peace and order in the cyberspace."

