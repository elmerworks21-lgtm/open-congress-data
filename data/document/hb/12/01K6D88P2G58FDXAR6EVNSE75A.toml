congress_website_title = "AN ACT AMENDING SECTION 3 OF REPUBLIC ACT NO. 9164, ENTITLED `AN ACT PROVIDING FOR SYNCHRONIZED BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE 'LOCAL GOVERNMENT CODE OF 1991', ANDFOR OTHER PURPOSES"
congress_website_abstract = "SECTION 1. Section 3 of Republic Act No. 9164 is hereby amended to read as follows: \"SEC. 3. Registration. - For purposes of the July 15, 2002 synchronized barangay and sanggunaing kabataan elections provided under this Act, a special registrationof voters for the sangguniang kabataan shall be fixed by the Commission on Elections (COMELEC). PROVIDED, THAT SANGGUNIANG KABATAAN VOTERS WHO REGISTERED ON DECEMBER 10 TO 26, 2001 AND WHO SHALL BE EIGHTEEN YEARS OLD ON OR BEFORE JULY 15, 2002 SHALLBE QUALIFIED TO VOTE FOR THE BARANGAY ELECTION. FOR THIS PURPOSE, THE COMMISSION IS HEREBY AUTHORIZED TO INCLUDE IN THE BARANGAY CERTIFIED VOTERS LIST THE NAMES OF SANGGUNIANG KABATAAN VOTERS WHO REGISTERED ON DECEMBER 10 TO 26, 2001 AND WHO SHALL BEE EIGHTEEN YEARS OLD ON BEFORE JULY 15, 2002.\""
