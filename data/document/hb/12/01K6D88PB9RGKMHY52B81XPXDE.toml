congress_website_title = "AN ACT PROVIDING FOR THE STANDARDS FOR THE PRACTICE OF REHABILITATION MEDICINE AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Medical Rehabilitation Standards Act of 2003\\\". Rehabilitation centers have recently operated throughout the country to provide rehabilitative care to Filipinos suffering from neuromusculoskeletal, cardiovascular, pulmonary and other system disorders which produce temporary or permanent disability. However, not all rehab centers provide services as envisioned and many are not headed by certified psychiatrists. To ensure public safety and quality rehab care, this bill aims to standardize the practice of rehab medicine and the establishment, management and operational aspects of rehab facilities."
