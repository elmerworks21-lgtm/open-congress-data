congress_website_title = "AN ACT PROVIDING FOR A SALARY STANDARDIZATION FOR MILITARY AND POLICE PERSONNEL, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6758, OTHERWISE KNOWN AS THE `COMPENSATION AND POSITION CLASSIFICATION ACT OF 1989' AND FOR OTHER PURPOSES"
congress_website_abstract = "With the enactment of R.A. No. 8551, otherwise known as the PNP Modernization Law in 1998, our policement now receives a relatively higher pay than our soldiers. Even with the subsequent enactment of R.A. No. 9166, providing for an increase in the base pay of officials and personnel of the AFP, the disparity remains the same.> This bill seeks to provide for a salary standardization for military and police personnel by prescribing a standard base pay and salary schedule for both."

