congress_website_title = "AN ACT CHANGING THE MANNER BY WHICH THE POSITIONS OF BARANGAY OFFICIALS AND SANGGUNIANG KABATAAN OFFICIALS ARE FILLED, AMENDING FOR THE PURPOSE PERTINENT PROVISIONS OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, ANDBATAS PAMBANSA BLG. 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "All BARANGAY and SANGGUNIANG KABATAAN OFFICIALS will be APPOINTED, rather than elected, by a Municipal - Barangay Monitoring Council/City - Barangay Monitoring Council composed of members coming from (1) Religious Organizations; (2) Farmer Cooperatives; (3) Students Organizations; (4) Business Organizations; (5) Senior Citizens Organization; (6) Women's Organizations; and (7) Cultural Organizations, who shall elect one (1) from among their respective sectors a representative to form the council."

