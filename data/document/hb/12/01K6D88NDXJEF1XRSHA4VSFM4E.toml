congress_website_title = "AN ACT STRENGTHENING LOCAL SCHOOL BOARDS, AMENDING FOR THE PURPOSE SECTIONS 98, 99 AND 100 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It is a well known fact that the Minority in any Sanggunian represents the other side in the community. They are fiscalizers in the disbursement of funds and the promulgation of laws in the Sanggunian and their presence in the Local School Board will give added assurance that the administration of this special fund is subjected to the scrutiny and safeguard that it deserves. Also, this will help promote the general support to programs formulated by the Board and will contribute to asound local governance."

