congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC DISMISSAL OF DORMANT COURT CASES"
congress_website_abstract = "Dormant cases are cases filed with the courts which have not been prosecuted for a period of six (6) months from the date the last pleading was filed or the date the last hearing was held. The courts shall automatically dismiss dormant cases without need of a motion immediately upon the lapse of the six-month period referred to above. The order of dismissal shall be mailed by registered mail to all parties. The order shall become final within fifteen (15) days from receipt thereof."
