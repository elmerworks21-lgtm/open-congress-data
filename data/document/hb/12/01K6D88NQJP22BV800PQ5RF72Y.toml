congress_website_title = "AN ACT ELEVATING THE PHILIPPINE NORMAL UNIVERSITY TO BECOME THE COUNTRY'S NATIONAL UNIVERSITY FOR TEACHER EDUCATION, ESTABLISHING A SYSTEM OF NATIONAL TEACHER TRAINING AND DEVELOPMENT, APPROPRIATING FUNDS THEREFOR; AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The honor and distinction of a national university for teacher education is conferred on the Philippine Normal University (PNU) in recognition of its progressive leadership in the field of teacher education. Since its inception of September 1, 1901, the university remains the only university in the country offering no other program but the teacher education program. The PNU has consistently proven the quality of excellence of its teacher education programs by the significant publications and research work of the faculty; the national and international distinctions and honor conferred on its faculty and alumni; and its outstanding leadership in promoting teacher education reforms in the country."

