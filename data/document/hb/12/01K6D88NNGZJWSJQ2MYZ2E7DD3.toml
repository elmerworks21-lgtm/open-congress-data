congress_website_title = "AN ACT REQUIRING ALL GOVERNMENT PHYSICIANS AND OTHER QUALIFIED PUBLIC HEALTH WORKERS WHO HAVE RENDERED AT LEAST TWO (2) YEARS OF CONTINUOUS SERVICE TO ATTEND SPECIAL SEMINARS AND LECTURES ON CURRENT MEDICAL TRENDS AND PUBLIC HEALTH ADMINISTRATION AND MAKING THEIR ATTENDANCE THEREIN OFFICIAL"
congress_website_abstract = "All government physicians and public health workers who have rendered at least two (2) years of continuous service shall be required to attend special seminars and lectures on current medical trends and public health administration to be conducted by the Department of Health. For this purpose, the attendance of the participants therein shall be considered official and shall not affect or diminish vacation or leave credits due them."

