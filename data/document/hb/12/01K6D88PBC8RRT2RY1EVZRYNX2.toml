congress_website_title = "AN ACT GRANTING ADDITIONAL COMPENSATION IN THE FORM OF SPECIAL ALLOWANCES FOR THE MEMBERS OF THE NATIONAL PROSECUTION SERVICE AND THE STATE COUNSELS IN THE DEPARTMENT OF JUSTICE, AND FOR OTHER PURPOSES"
congress_website_abstract = "To strengthen the prosecution arm of the government, the bill seeks to provide additional allowances for the members of the National Prosecution Service (NAPROSS) and the State Counsels of the Department of Justice. It also allows the imposition of fee increases or new fees for services rendered by the NAPROSS and the Office of the Chief State Counsel. It also provides for the proceeds of such fee increases and new fees to be deposited in a special trust fund to be used by the Secretary of Justice for the benefit of government prosecutors and state counsels. With the additional benefits, the prosecutors and state counsels can cope better with the current economic conditions and will no longer be tempted to leave government service in favor of private practice."
