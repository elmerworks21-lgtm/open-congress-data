congress_website_title = "AN ACT REGULATING THE EDUCATION AND LICENSURE OF PHYSICIANS AND THE PRACTICE OF MEDICINE IN THE PHILIPPINES, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 2382, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Medical Act of 2001.\" The purpose of this bill is to update and revitalize the 40-year old Medical Act of the Philippines and, as a result, provide a law that is more responsive to new medical developments and ever-changing requirementsof our developing society. Primary changes include provisions to promote continuing medical education among doctors. The erstwhile Department of Education and Board of Medical Examiners are to be changed to Commission on Higer Education (CHED) and Board of Medicine, respectively. Likewise, the composition of the Board of Medical Education is to be expanded. Subjects in the medical course are also increased."
