congress_website_title = "AN ACT ABOLISHING THE PREPARATORY RECALL ASSEMBLY, AMENDING FOR THE PURPOSE SECTION 70 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "This bill seeks to abolish the preparatory recall assembly and provides that recall of any elective provincial, city, municipal or barangay official SHALL be validly initiated ONLY upon petition of at least twenty-five percent (25%) of the total number of registered voters in the local government unit concerned during the election in which the local official sought to be recalled was elected."
