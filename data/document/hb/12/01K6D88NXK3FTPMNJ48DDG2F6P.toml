congress_website_title = "AN ACT REGULATING THE OWNERSHIP, POSSESSION, IMPORTATION, SALE AND USE OF CHAINSAWS, PENALIZING VIOLATIONS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Chain Saw Act of 2001\". The bill provides for the requlation and monitoring of chain saws, beginning from its entry as imported equipment or importation of its parts for assembly in the country up to its final productive use. Importers, manufacturers, sellers, possessors, and users of chain saws are henceforth mandated to apply for appropriate permits from the DENR. The unauthorized possession use, sale, importation, including the defacement of the serial number of a chain saw are declaredunlawful with corresponding penalty of fine and imprisonment for their violation."
