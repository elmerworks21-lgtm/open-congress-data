congress_website_title = "AN ACT PROVIDING FOR THE RETENTION OF CITIZENSHIP BY PHILIPPINE CITIZENS WHO ACQUIRE FOREIGN CITIZENSHIP, AMENDING FOR THE PURPOSE COMMONWEALTH ACT NO. 63, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Citizenship Retention Act of 2001\". Rationale: Despite their acquisition of foreign citizenship, their continued allegiance to the Philippines has never ceased to exist. They have continued to maintain links to the homeland, have shown keen interest in and concerns for the country and have always yearned to visit the country. Likewise, their contribution to the economy through investments or by sharing with their relatives here a part of the financial rewards they habe reaped abroad have in nodoubt shown that a vast majority of our erstwhile countrymen remain Filipinos in heart and mind."
