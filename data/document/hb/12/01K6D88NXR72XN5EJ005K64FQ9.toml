congress_website_title = "AN ACT CREATING THE NATIONAL GAMBLING IMPACT STUDY AND POLICY COMMISSION TO REVIEW, STUDY AND ASSESS THE IMPACT OF GAMBLING AND OTHER SIMILAR FORMS OF GAMES AND AMUSEMENTS AND RECOMMEND POLICY, INSTITUTIONAL AND SIMILAR MEASURES, APPROPRIATING FUNDSTHEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Gambling, as many people would say brings more harm than good. As a matter of fact many families have been broken due to gambling. On the other hand, it also helps build roads and bridges, schools, water system, and other forms of infrastructure projects from its proceeds. Its many advantages and disadvantages are still up for debate until this time because nobody knows exactly in factual terms if gambling indeed brings more harm than good. > It is in this context that this bill is filed to determine the social and economic impact of gambling in the country. It seeks the establishment of the \"National Gambling Impact Study and Policy Commission.\" The Commission shall conduct a comprehensive, legal, scientific and factual study oof the social and economic impacts of gambling in the Philippines."

