congress_website_title = "AN ACT GRANTING DUAL CITIZENSHIP TO NATURAL-BORN FILIPINOS WHO ACQUIRED FOREIGN CITIZENSHIP AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Dual Citizenship Act of 2002\". The bill seeks the enactment of a dual citizenship law, essentially granting natural-born Filipinos the privilege to retain or regain Filipino citizenship after having acquired or obtained citizenship of another country.> Natural-born citizens of the Philippines who became naturalized citizens of a foreign country are deemed to have retained or re-acquired their Philippine citizenship without renouncing their foreign citizenship upon the effectivity of this Act.Philippine citizenship shall not be deemed lost by virtue of naturalization in a foreign country or by operation of law of another country unless the person categorically and unequivocally renounces under oath his Philippine citizenship before a Phillippine consular official abroad or any public officer authorized to administer an oath except when such renunciation was an oath of allegiance required by the foreign country for naturalization purposes."
