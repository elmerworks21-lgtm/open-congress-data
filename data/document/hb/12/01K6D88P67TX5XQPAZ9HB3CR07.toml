congress_website_title = "AN ACT PROVIDING FOR THE COMPENSABILITY OF ANY ILLNESS CAUSED BY EMPLOYMENT WITHOUT NEED FOR ANY PROOF ON THE PART OF THE EMPLOYEE, AMENDING FOR THE PURPOSE ARTICLE 165 OF PRESIDENTIAL DECREE NO. 626, OTHERWISE KNOWN AS `THE EMPLOYEES COMPENSATION AND STATE INSURANCE FUND'"
congress_website_abstract = "This bill seeks to amend Art. 165 of PD 626 which provides that in order for a disability or death of an employee to be compensable, such ailment or disability should have been aggravated by his employment, is listed under the occupational and compensable diseases and the employee has to show proof that such ailment is compensable. > In order to give maximum aid and protection to labor, this bill provides compensation WITHOUT NEED FOR THE EMPLOYEE TO SHOW PROOF that the risk of contracting theillness is increased by working conditions of that such illness is work-connected."

