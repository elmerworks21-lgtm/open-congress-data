congress_website_title = "AN ACT TO LOWER THE COSTS OF MEDICINES AND HEALTH CARE IN THE PHILIPPINES BY EXEMPTING FROM ALL DUTIES AND TAXES THE SALE, IMPORTATION, PROCESSING, REPACKING OR MANUFACTURING OF MEDICINES, PHARMACEUTICAL PRODUCTS, MEDICAL, DENTAL AND HOSPITAL EQUIPMENT, AND RAW MATERIALS TO BE USED IN THE MANUFACTURE THEREOF"
congress_website_abstract = "All transactions involving the importation, sale, manufacturing, repacking or processing of the following shall be exempt from all duties and taxes, whether covered by the National Internal Revenue Code or the Tariff and Customs Code, or otherwise:(a) medicines; (b) pharmaceutical products; (c) medical, dental and hospital equipment; (d) chemicals or preparations for the formulation of medicines; (e) raw materials to be used in the manufacture of medicines, medical products; (f) raw materialsto be used in the manufacture of medical, dental and hospital equipment; (g) processing, manufacturing or repacking of medicines, pharmaceutical products, and medical, dental and hospital equipment."

