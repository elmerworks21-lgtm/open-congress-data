congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED(RE: INCOME TAX REFORM ACT)"
congress_website_abstract = "\"Income Tax Reform Act of 2001.\" This bill seeks to introduce reforms in the income tax system by: (1) Subjecting the corporations and self-employed individuals to a single tax rate based on gross income; and (2) Amending the income tax schedule applicable to compensation earners by lowering the marginal tax rates for low and middle income taxpayers and changing the rangers of taxable incomes."
