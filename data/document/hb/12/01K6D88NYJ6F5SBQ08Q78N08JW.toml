congress_website_title = "AN ACT TO AMEND SECTION TWENTY OF REPUBLIC ACT NUMBERED SEVEN THOUSAND ONE HUNDRED AND SIXTY, OTHERWISE KNOWN AS THE `LOCAL GOVERNMENT CODE OF 1991,' AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Section 20 (a) and (e) of R.A. 7160 exempts from reclassificatio n or conversion of such \"agricultural lands distributed to agrarian reform beneficiaries pursuant to R.A. 6657 otherwise known as The Comprehensive Agrarian Reform Law.\" However, the word \"distributed\" as used in this section is not defined. Since lands acquired by the government through CARP coverage are distributed and resold to the agrarian beneficiaries, it is implied that unless the original landowners had been duly compensated for their property, the government can not legally distribute said lands to the agrarian beneficiaries without violating the constitutional right of the landowners to due process under the Philippine Constitution. Hence, the need to ameend this Section in order to make the exception more specific, thereby avoiding injustice."
