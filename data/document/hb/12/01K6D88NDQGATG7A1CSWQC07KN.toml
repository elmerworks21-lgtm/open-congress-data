congress_website_title = "AN ACT DECLARING AS UNLAWFUL THE USE OF POLYCARBON PLASTICS, STYROFOAM AND OTHER SYNTHETIC MATERIALS HARMFUL TO THE ENVIRONMENT AND ESTABLISHING A CRITERION FOR THE ENDORSEMENT OF ENVIRONMENT FRIENDLY CONSUMER PRODUCTS"
congress_website_abstract = "Rationale: Styrofoam, the most common synthetic material in popular use by fastfood chains and product packagers, is not as benign as we have long thought it to be. Left undisposed, it continually releases chlorofluorocar bons, more commonly refersto as CFCs into the atmosphere. Choloflourocarb ons are the same elements found in aerosol propellants and freon refrigerants, that have been conclusively linked to the thinning of the ozone layer in the earth's atmosphere."

