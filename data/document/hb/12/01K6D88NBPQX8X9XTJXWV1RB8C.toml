congress_website_title = "AN ACT AUTHORIZING THE COMMISSIONER OF CUSTOMS TO ALLOW FOREIGN VESSELS TO LOAD AND UNLOAD CARGO AND ARTICLES FOR FOREIGN TRADE AT ANY PHILIPPINE PRINCIPAL PORT AND SUBPORT (RE: CABOTAGE)"
congress_website_abstract = "This bill recognizes the need for alternative means of shipping cargoes intended for foreign trade. However, these should not adversely affect the domestic shipping industry. Thus, it is proposed that the Commissioner of Customs be given authority to clear foreign vessels to load and unload cargoes and articles intended for foreign trade in the country's principal ports and subports."
