congress_website_title = "AN ACT DECLARING THE COCONUT LEVY FUNDS AS PUBLIC FUNDS, CREATING THE COCONUT INDUSTRY REHABILITATION AND DEVELOPMENT FUND AND FOR OTHER PURPOSES"
congress_website_abstract = "The coconut levy funds or the enforced contributions levied by the State on the coconut farmers pursuant to Repbulic Act No. 6260, Presidential Decree Nos. 276, 582, 1841 and other pertinent amendatory laws, including all income, interests, proceeds or profits derived therefrom, as well as all assets, properties and shares of stock procured or obtained with the use of such funds, which are under sequestration by the government, are hereby declared as public funds."
