congress_website_title = "AN ACT DECLARING ALL OFFICIAL NONWORKING DAYS TO FALL EITHER ON A MONDAY OR A FRIDAY"
congress_website_abstract = "All official non-working days except New Year's Day, Christmas Day and Independence Day shall be scheduled to fall either on a Monday or a Friday. The term \"official non-working days\" as used in this Act shall include those days duly declared and recognized by the government of the Republic of the Philippines wherein employees of both the public and private sectors are privileged not to attend work because of a national, international or traditional observance or celebration."
