congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8545, OTHERWISE KNOWN AS THE `EXPANDED GOVERNMENT ASSISTANCE TO STUDENTS AND TEACHERS IN PRIVATE EDUCATION ACT' PROVIDING FOR AN EXPANDED VOUCHER OR COUPON SYSTEM IN SECONDARY AND TERTIARY EDUCATION AND APPROPRIATINGFUNDS THEREFOR"
congress_website_abstract = "Rationale: The passage of the Expanded Government Assistance to Students and Teachers in Private Education (GASTPE) in 1998 offers many opportunities for the poor students who cannot afford to study in private schools by providing a financial assistance through the tuition fee supplements and education service contracting scheme. Through the GASTPE law, the system of voucher system in tuition fee payment had been introduced. However, there is a need to further improve the system and increase the amount of assistance to students-grante es by amending some sections of the Expanded GASTPE law so that it can become more responsive to the needs of the students and the schools."

