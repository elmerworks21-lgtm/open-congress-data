congress_website_title = "AN ACT TO AMEND REPUBLIC ACT NO. 8239, OTHERWISE KNOWN AS THE PHILIPPINE PASSPORT ACT OF 1996"
congress_website_abstract = "The bill seeks to amend the provisions relating to the requirement for issuance of passports as well as additional ground for its amendment, suspension and revocation. Furthermore, the proposed bill enumerates the individuals who are qualified to file applications on behalf of certain applicants. The bill also seeks to penalize those who do damage to the Philippine passport's integrity and validity by punishing those who sell passport applications, government forms, as well as lost or stolen travel documents."
