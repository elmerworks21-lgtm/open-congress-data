congress_website_title = "AN ACT PROVIDING HIGHER COMPENSATION TO VICTIMS OF UNJUST IMPRISONMENT OR DETENTION AND VICTIMS OF VIOLENT CRIMES, AMENDING FOR THE PURPOSE SECTION 4 OF REPUBLIC ACT NO. 7309, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to amend Section 4 of RA 7309 by increasing the amount to be awarded to those who are unjustly incarcerated. Present standards render the amount specified by the law obsolete and unresponsive. More so, it seeks to include psychiatricand medical treatment as part of the compensation program."

