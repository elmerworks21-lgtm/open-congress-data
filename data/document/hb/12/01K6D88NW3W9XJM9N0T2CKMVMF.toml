congress_website_title = "AN ACT STRENGTHENING THE CAPABILITY OF THE BUREAU OF FOOD AND DRUGS (BFAD) BY ESTABLISHING ADEQUATE TESTING LABORATORIES AND REGIONAL FIELD OFFICES, UPGRADING ITS EQUIPMENT, CREATION OF A DRUG ENFORCEMENT UNIT UNDER ITS OPERATIONAL AND ADMINISTRATIVE CONTROL, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"BFAD Empowerment Act of 2001\". Rationale: There is a need to TRANSFORM BFAD into a more and credible regulatory agency, and to borrow the words of the UP Policy Review Team, one whose integrity and credibility are above reproach and if possible, beyond any reasonable doubt. To achieve this, it is vital, among other things not only to provide adequate funding for the agency but more importantly, introduce major administrative reforms in BFAD to strengthen the capability of BFAD's regulatory functions of licensing, registration and monitoring, and more spefically in the following aspects: (1) Human resources in the field; (2) Augmentation of existing laboratories and upgrading their equipment; (3) Operational budget; and (4) Creation of a ddrug enforcement unit under its operational and administrative control."
