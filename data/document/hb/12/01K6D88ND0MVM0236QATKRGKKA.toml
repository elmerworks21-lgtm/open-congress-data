congress_website_title = "AN ACT PROVIDING FOR THE IMPOSITION OF THE DEATH PENALTY FOR CHILD PROSTITUTION, SEXUAL ABUSE OF CHILDREN AND CHILD TRAFFICKING, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 7610, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "The crimes of child prostitution, child trafficking and child abuse have become rampant in our society and these evil practices by unscrupulous pimps and solicitors have become more pronounced than ever. It is imperative that the perpetration of this crime should be discouraged by imposing heavy penalty on the offenders, with the end in view of eliminating all obstacles to economic, social, educational and community progress of the people."
