congress_website_title = "AN ACT TO EXCLUDE THE PRINT AND BROADCAST MEDIA ESTABLISHMENTS FROM SEEKING EXEMPTION FROM THE WAGE ORDER ISSUED PURSUANT TO REPUBLIC ACT NO. 6727, AS AMENDED AND ITS IMPLEMENTING RULES AND REGULATION AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Rationale: The press or media, in a democracy, practically constitutes the fourth branch of government. They key position it occupies in ferreting out factsm in molding public opinion, in channeling the actions of the Executive and the Legislature,and all agencies of the government along lines conducive to public welfare vests it with tremendous power and influence. However, some members of the press are forced to take advantage of their influence, considering the vital role played by the media in our society, by resorting to unethical forms of fund raising brought about by lack of financial security in the practice of their vocation. Yet, this occurrence may have been prevented should all or small media and press compatriots have enjoyedd rightful compensation for their services to the public. > There is an urgent need therefor for the enactment of this measure so as not to leave any loopholes in the implementation of the existing minimum wage law."

