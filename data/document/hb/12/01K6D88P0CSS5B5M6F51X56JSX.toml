congress_website_title = "AN ACT TO LEGALIZE CHURCH DECLARATION OF NULLITY OR NON-EXISTENCE, ANNULMENT OR DISSOLLUTION OF CERTAIN MARRIAGES AND FOR OTHER PURPOSES"
congress_website_abstract = "Whenever a marriage, duly and legally solemnized by a priest, minister, imam, rabbi, or presiding elder of an established church or religion in the Philippines is subsequently declared null or non-existent, annuleed or dissolved in a final judgmentor decree by said church or religion, in accordance with the canons or precepts of the latter, duly entered in the corresponding civil registry, the said declaration of nullify or non-existence, annulment or dissolution shall be recognized and givenfull force and effect in the Philippines: Provided, that said declaration of nullify or dissolution is based on any of the grounds recognized in the Civil Code or Family Code of the Philippines for the declaration of non-existence or dissolution ofthe marriage."
