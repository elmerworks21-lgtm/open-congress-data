congress_website_abstract = "There shall be imposed a five (5) year scheme reduction of tariff rates currently at three percent (3%) to one percent (1%) rate in the importation of food and beverages.> For purpose of this bill, the following reduction scheme shall be adopted: First year - two percent (2%); Second year - two percent (2%); Third year - one and half percent (1.5%); Fourth year - one percent (1%); and Fifth year - one half percent (0.5%)."
