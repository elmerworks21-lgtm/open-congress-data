congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1986, ENTITLED \\\"CREATING THE MOVIE AND TELEVISION REVIEW AND CLASSIFICATION BOARD\\\""
congress_website_abstract = "The measure proposes to require all foreign or imported theatrical films, including trailers, to be subtitled in the Filipino national language before being allowed for distribution and/or exhibition in local theaters or movie houses. Instead of sending a number of release prints from abroad for distribution in the Philippines, the foreign film distributor may only send a copy of the duped film negative. The duped film negative, through our local film laboratories, can then be printed or duplicated in to several copies for distribution and/or processing and/or printing at the same comparable quality and at equal or lower costs."
