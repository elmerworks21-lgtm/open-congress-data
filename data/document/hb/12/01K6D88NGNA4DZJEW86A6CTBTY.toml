congress_website_title = "AN ACT SHORTENING THE PERIOD TO CARRY OUT THE EXECUTION OF THE CONVICT, FROM ONE (1) YEAR TO SIX (6) MONTHS, AMENDING FOR THE PURPOSE SECTION TWENTY-FOUR OF REPUBLIC ACT NUMBERED SEVENTY-SIX FIFTY-NINE, AS AMENDED"
congress_website_abstract = "Rationale: On December 13, 1993, Republic Act No. 7659 was enacted into law re-imposing the death penalty, this time by lethal injection instead of the much ballyhooed electrocution. The agony of waiting should be shortened to give the society theneeded psychological and moral peace. For it cannot be denied that while the crime perpetrator are given their due, the victims suffer a lifetime trauma, together with their families and loved ones, which trauma can not be easily forgotten, no one (1) year period is too long as a waiting period."
