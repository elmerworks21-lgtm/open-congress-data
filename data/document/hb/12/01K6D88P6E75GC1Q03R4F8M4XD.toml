congress_website_title = "AN ACT PROVIDING FOR THE REORGANIZAATION OF THE NATIONAL POLICE COMMISSION (NAPOLCOM) AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Police Commission or NAPOLCOM Act of 2003.\" The NAPOLCOM is hereby reorganized into a collegial bodu under the Office of the President of the Philippines and shall administer all affairs concerning the discipline of all members of the PNP,police education, police communication, criminal statistics, as well as coordinate police administration affairs. It shall composed of one (1) Chairman and four (4) Commissioners, who shall be appointed by the President and shall possess the qualifications enumerated under Sec. 13 of RA 6975. The Chairman and the Commissioners of the Commission shall have the equivalent rank of Undersecretary and Assistant Secretary of the Cabinet, respectively. The Chief of the PNP is designated as an ex-officcion Commissioner.> The Commission shall establish, operate and maintain regional, provincial and district offices to be headed by the corresponding Directors, who shall implement the policies and programs of the Commmission in their respective juris"
