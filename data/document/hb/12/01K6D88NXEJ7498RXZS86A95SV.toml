congress_website_title = "AN ACT TO ORDAIN AND INSTITUTE THE MARITIME CODE OF THE PHILIPPINES"
congress_website_abstract = "This bill seeks to update and modernize our maritime law as embodied in the Code of Commerce to keep up with international maritime law and practices. The proposed Code shall apply to all ships or vessels plying within the territorial waters of thePhilippines, whether domestic or foreign-owned, and to all Philippine flag vessels, except those owned and/or operated by the Philippine government or by foreign governments for military or non-commecial purposes, and unmotorized bancas, sailboats, and other water-borne contrivances less than three gross tons capacity."

