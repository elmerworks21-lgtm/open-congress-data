congress_website_title = "AN ACT GRANTING REPRESENTATION OF CONSUMER GROUP IN THE BOARD OF DIRECTORS OF THE MANILA ELECTRIC COMPANY, THE NATIONAL POWER CORPORATION, THE METROPOLITAN WATER SEWERAGE AUTHORITY, THE PHILIPPINE LONG DISTANCE TELEPHONE COMPANY, AND ANY OTHER CORPORATION, GOVERNMENT OR PRIVATE, DISPENSING PUBLIC SERVICES, GIVING THEM ONE (1) SEAT IN THE BOARD OF DIRECTORS, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to grant REPRESENTATION of the CONSUMERS in the Board of Directors of the Manila Electric Company, the Nationa Power Corporation, the Metropolitan Water Sewerage Authority, The Philippine Long Distance Telephone Company, and any other corporation, government or private, dispensing public services like the one mentioned, giving them one (1) seat in the Board of Directors of these corporations."

