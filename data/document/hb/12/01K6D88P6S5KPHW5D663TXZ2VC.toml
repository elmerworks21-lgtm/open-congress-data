congress_website_title = "AN ACT PENALIZING THE UNLAWFUL IMPORTATION, POSSESSION AND SALE OF CHEMICALS USED AS INGREDIENTS IN THE MANUFACTURE OF EXPLOSIVES"
congress_website_abstract = "Any person or entity who intends to import, possess or sell any of the chemicals used as ingredients in the manufacture of explosives shall file an application with the chief of Philippine National Police (PNP), stating the purpose for which the license and/or permit is sought and such inforamtion as may be required by the Chief of the PNP.> Any violation of the provisions of this Act shall be punished with imprisonment of not less than one (1) year but not more than five (5) years or a fine ofnot less than P10,000.00 pesos but not more than P100,000.00, or both, at the discretion of the court."

