congress_website_title = "AN ACT FIXING THE RETIREMENT AGE OF THE UNIFORMED PERSONNEL OF THE PHILIPPINE NATIONAL POLICE, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED AND SEVENTY-FIVE, OTHERWISE KNOWN AS THE `DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990'"
congress_website_abstract = "Compulsory retirement, for officers and non-officers, shall be upon the attainment of age [fifty-six (56)] FIFTY-FOUR (54): Provided, That, in case of any officer with the rank of superintendent, or director or deputy director general, the Commission may allow his retention in the service for unextendible period of one year."

