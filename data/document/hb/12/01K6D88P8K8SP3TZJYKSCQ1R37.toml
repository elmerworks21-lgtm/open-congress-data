congress_website_abstract = "This measure seeks to limit the applicability of the mandatory drug-test requirement for applicants of a driver's license to persons/drivers who figured in at least two vehicular accidents within the year immediately preceding such application/ren ewal of driver's license. The fact that a person/driver figured in at least two vehicular accidents within a year somehow casts a doubt on whether or not he used the prohibited drug while driving."
