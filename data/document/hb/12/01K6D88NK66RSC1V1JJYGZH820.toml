congress_website_title = "AN ACT EXPANDING THE LIABILITIES OF INDIRECT EMPLOYERS IN THEIR JOB CONTRACTING, COVERING OTHER BENEFITS DUE THEIR EMPLOYEES, AMENDING FOR THE PURPOSE ARTICLE 106 OF PRESIDENTIAL DECREE 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Among our country's labor force, those hired through job agencies are the most exploited, neglected, oppressed, and poorly paid. > This bill commands/direct s companies/emplo yers that workers hired through job contractors must receive all the benefits due them. However, if in any case the workers are not able to receive the benefits justly for them, they can likewise get their attention to the company they are working for redress."
