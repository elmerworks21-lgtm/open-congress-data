congress_website_title = "AN ACT PENALIZING THE SELLING OF FIREARMS, AMMUNITION OR EXPLOSIVES OR ANY PARTS OR COMPONENTS USED IN THE MANUFACTURE OF FIREARMS, AMMUNITION OR EXPLOSIVES TO ENEMIES OF THE STATE AND IMPOSING PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "It is hereby declared the policy of the State to protect public security and safety by prohibiting the sale of firearms, ammunition or explosives or any parts or components used in the manufacture of firearms, ammunition or explosives to enemies ofthe State. >\"Enemy of the State\" refers to all persons or group of individuals who have commenced acts of hostility with the duly constituted authorities of a particular state by violating the laws particularly affecting its people, territory, sovereignty and government. >Any person who commits such act shall be punished by reclusion perpetua to death and shall pay a fine not to exceed 100,000 pesos. The extreme penalty of death by firing squad shall be imposed if the crime is committed by any mmember of the Armed Forces of the Philippines (AFP) or para-military units thereof of the Philippine National Police (PNP) or any law enforcement agency or any government and public official and shall pay a fine not to exceed 200,000 pesos."
