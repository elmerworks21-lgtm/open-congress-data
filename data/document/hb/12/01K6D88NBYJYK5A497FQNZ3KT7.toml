congress_website_title = "AN ACT PROHIBITING THE SERVICE OF WARRANTS OF ARRESTS IN CERTAIN CASES AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Except only in cases of citizen's arrest of persons made as a result of surveillance and/or entrapment operations; persons being arrested for subversion and other crimes and offenses against national security; notorious and dangerous criminals for whom outstanding warrants of arrest have been issued; and escapist and fugitives from justice, it is hereby prohibited to serve warrants of arrests during nighttime, on legal holidays, or on weekends."

