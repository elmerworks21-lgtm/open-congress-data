congress_website_title = "AN ACT UPGRADING THE MINIMUM SALARY GRADE LEVEL OF PUBLIC SCHOOL TEACHERS IN THE ELEMENTARY AND SECONDARY LEVELS FROM GRADE 10 TO GRADE 18, GRANTING ADDITIONAL LONGEVITY PAY ADJUSTMENT EVERY FIVE YEARS AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: On public schoolteachers are overworked, underpaid and have become convenient menials for numerous non-teaching activities without hardly the proper recognition of their participation in such activities. The present compensation package for teachers is not adequate for basic family expenditures. While teachers are increasingly made to undertake activities beyond their normal teaching duties, their compensation does not increase to corresponding levels. Their economic status hardly improves."

