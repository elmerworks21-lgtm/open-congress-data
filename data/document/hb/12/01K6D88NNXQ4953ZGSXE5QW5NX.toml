congress_website_title = "AN ACT PROVIDING SUSPENSION OF PAYMENT OF REAL PROPERTY TAX BY LANDOWNERS WHOSE PROPERTY, FROM WHICH THE TAX IS DUE AND ACCRUING, IS OCCUPIED IN WHOLE OR IN PART BY SQUATTERS AND FOR OTHER RELEVANT PURPOSES"
congress_website_abstract = "This piece of legislation is designed to grant landowners the right to suspend payment of real property taxes if he is deprived of possession of his property because his landholding is occupied by squatters. Stated otherwise, a landowner may not beobligated and required to render payment of the land tax as long as he is able to establish that his land is occupied."

