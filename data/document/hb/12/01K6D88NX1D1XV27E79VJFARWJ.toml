congress_website_title = "AN ACT TO HELP INSURE THE SAFETY OF BANK DEPOSITS AND FUNDS THEREBY STRENGTHENING THE OPERATIONS OF BANKING INSTITUTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "this bill seeks to help ensure the safety of bank deposits and funds thereby strengthening the operations of banking institutions. It intends to do this by authorizing all banking institutions recognized and accredited by the Banko Sentral ng Pilipinas (BSP) to provide special security services of their banking activities and operations and to procure and possess firearms for security purposes."

