congress_website_title = "AN ACT GRANTING THE DISABLED PERSON THE SAME PRIVILEGES ENJOYED BY SENIOR CITIZENS. AMENDING FOR THE PURPOSE THE MAGNA CARTA FOR DISABLED PERSONS"
congress_website_abstract = "Disabled persons are as vulnerable as the senior citizens. They should be given the same privileges enjoyed by senior citizens. This would surely boost morale of the disabled. And make them feel that they are still a member of the society with lessburden to their families."
