congress_website_title = "AN ACT PROVIDING FOR THE MODERNIZATION OF THE HEALTH CARE DELIVERY SYSTEM, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Health Care Delivery Modernization Act of 2001.\\\" This bill principally seeks: (1) To modernize the health care delivery by adopting a comprehensive, consistent and systematic approach to health issues and concerns to complement the state-of-the-art technology; and (2) To further enhance local autonomy by granting local government units full powers in the formulation of policies and by mandating the Department of Health (DOH) to perform tasks relative to the operation and maintenance of hospitals and public health services under its supervision and control."
