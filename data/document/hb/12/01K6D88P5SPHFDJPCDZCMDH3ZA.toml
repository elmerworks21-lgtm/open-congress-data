congress_website_title = "AN ACT ESTABLISHING A LEGAL ATTACHE OFFICE IN THE MIDDLE EAST COUNTRIES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8042, OTHERWISE KNOWN AS THE `MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF 1995' AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Republic Act No. 8042 otherwise known as the \"Migrant Workers and Overseas Filipinos Act of 1995\" is hereby amended by inserting a new section under Title V to read as follows: > V. THE LEGAL ASSISTANT FOR MIGRANT WORKERS AFFAIRS > Section 25. OFFICE OF THE LEGAL ATTACHE - A LEGAL ATTACHE OFFICE SHALL BE ESTABLISHED IN EVERY COUNTRY IN THE MIDDLE EAST TO PROVIDE FREE LEGAL ASSISTANCE TO FILIPINO MIGRANT WORKERS IN NEED OF LEGAL AID AND/OR IN CRISIS OR DIFFICULT SITUATION."

