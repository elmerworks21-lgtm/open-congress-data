congress_website_title = "AN ACT ESTABLISHING CENTERS FOR STREET CHILDREN IN EVERY REGION OF THE PHILIPPINES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "There shall be established in every region in the Philippines, centers for street children which shall extend services to all exploited infants and children, mendicant children, dependent, abandoned, vagrant and neglected children, and youth offenders covered by Presidential Decree Numbered Six Hundred and Three, as amended. The Center shall be under the direct supervision of the Department of Social Welfare and Development."

