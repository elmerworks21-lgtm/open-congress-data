congress_website_title = "AN ACT INTEGRATING COOPERATIVE EDUCATION IN THE CURRICULUM OF TERTIARY EDUCATIONAL INSTITUTIONS THROUGH PARTNERSHIP AMONG THE INSTITUTIONS, STUDENTS, BUSINESS, INDUSTRY AND AGRICULTURAL ENTITIES, AUTHORIZING THE APPROPRIATION OF FUNDS THEREFOR, ANDFOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to develop and maintain big caliber manpower in the Philippines by institutionaliz ing cooperative education as a unique structure educational strategy in tertiary education. It integrate classroom, study with paid, planned and supervised relevant works and paid experiences in the public and private sectors through partnership among the institution, the business and students, industry and agricultural entities with specified responsibility for each."
