congress_website_title = "AN ACT PROVIDING FOR THE UPGRADING AND STANDARDIZATION OF THE RATES OF COMPENSATION OF THE UNIFORMED MEMBERS OF THE ARMED FORCES OF THE PHILIPPINES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"AFP Compensation Structure of 2002\". Rationale: The members of the Armed Forces of the Philippines received their last increase in base pay fifteen years ago in November 26, 1987. Despite such increase, our soldier's pay is still inadequate to meetthe basic needs of his family considering the effects of inflation. Majority of the military personnel still wallow in poverty. More than 75% do not have their own homes; 35% of them live with relatives or are renting and 15% live in slum areas."

