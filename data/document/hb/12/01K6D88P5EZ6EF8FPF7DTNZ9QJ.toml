congress_website_title = "AN ACT ESTABLISHING A COMPREHENSIVE JUVENILE JUSTICE SYSTEM AND DELINQUENCY PREVENTION PROGRAM, CREATING THE OFFICE OF JUVENILE JUSTICE AND DELINQUENCY PREVENTION UNDER THE DEPARTMENT OF JUSTICE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It is recognized that children in conflict with the law have varying special needs and thus their treastment at all stages, of legal proceedings should be humane, effective and fair. They should be handled differently from the way adult offenders are treated. Emphasis should be on the promotion of well-being and rehabilitation of children in conflict with the law rather than on punitive retribution. It is against this background taht the institutionaliz ation of the comprehensive Juvenile Justice System is urgent and necessary. Specifically, the proposed system shall create agencies as well as strengthen existing instrumentaliti es within the five pillars of the criminal justice system in order to protect children in conflict wiith the law. > This proposed bill adopts the framework of restorative justice which considers the welfare of the child offender as well as the interest and protection of the victim and the community. It addresses the causes of juvenile delinquency th"
