congress_website_title = "AN ACT PROVIDING FOR SYNCHRONIZED BARANGAY AND NATIONAL ELECTIONS BY RESETTING THE BARANGAY ELECTIONS FROM THE SECOND MONDAY OF MAY 2002 TO THE SECOND MONDAY OF MAY 2004 AND FOR THIS PURPOSE REVERTING THE TERM OF OFFICE OF BARANGAY OFFICIALS AND MEMBERS OF THE SANGGUNIANG KABATAAN FROM FIVE (5) YEARS TO THREE (3) YEARS, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991 AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: This bill seeks to MINIMIZE election spending by resetting the barangay election for the year 2002 and synchronizing it with the holding of national regular elections. To give effect to this intention, this bill likewise seeks to shortenthe term of barangay officials to three years, similar to other local elected officials. Moreover, the fund that is supposed toi be appropriated to conduct the next barangay elections may instead be alloted to adopt a full-automated election systemin the country."
