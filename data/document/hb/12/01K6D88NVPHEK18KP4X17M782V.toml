congress_website_title = "AN ACT INCREASING THE BENEFITS OF MEMBERS, THEIR DEPENDENTS AND PENSIONERS OF THE SOCIAL SECURITY SYSTEM, AMENDING FOR THE PURPOSE THE SOCIAL SECURITY LAW, AS AMENDED"
congress_website_abstract = "This bill mandates that ALL EMPLOYEES IN THE PRIVATE SECTOR SHALL, UNDER SUCH TERMS AND CONDITIONS AS MAY BE PROMULGATED BY THE SYSTEM, BE COVERED WITH LIFE INSURANCE.> The MONHTLY PENSION shall be the HIGHEST of the following amount: (1) The sum ofthe following: (i) [Three Hundred Pesos (P300.00)] SIX HUNDRED PESOS (P600.00); plus (ii) [Twenty Percent (20%)] FORTY PERCENT (40%) of the average monthly salary credit; plus (iii) [Two percent (2%)] FOUR PERCENT (4%) of the average monthly salarycredit for each credited year with service in excess of ten (10) years; or (2) [Forty percent (40%)] EIGHTY PERCENT (80%) of the average monthly salary credit; or (3) One Thousand Pesos (P1,000.00): Provided, That the monthly pension shall in no casee be paid for an aggregate amount of less than sixty (60) months."
