congress_website_title = "AN ACT ESTABLISHING THE GENERAL GUIDELINES IN THE SALE, REQUALIFICATION , DISTRIBUTION, AND REPAIR OF LIQUEFIED PETROLEUM GAS (LPG) CYLINDERS, AND PROVIDING PENALTIES FOR VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"LPG Cylinder Act of 2002\". This bill substantiates the policy of the State to: (1) Ensure that appropriate standards will be developed and formulated for the LPG sector through the coordinated efforts of DTI, other government agencies, and the private sector; (2) Provide for the penalties and fines for the violation of this Act; (3) Promote awareness and educate all sectors of society regarding the safety requirements and proper use of LPG cylinders; and (4) Formulate and implement a comprehensive program that shall promote national consciousness to ensure consumer protection."
