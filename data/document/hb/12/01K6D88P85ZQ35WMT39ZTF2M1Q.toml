congress_website_title = "AN ACT AUTHORIZING FARMER ORGANIZATIONS ONLY TO UNDERTAKE ALL RICE IMPORTATIONS AND NFA FUNDS BE UTILIZED ONLY TO PURCHASE LOCALLY PRODUCED PALAY OR FARMERS IMPORTS FOR FOOD SECURITY REQUIREMENTS OF THE COUNTRY"
congress_website_abstract = "\"Farmers Organizations as Sole Importers of Rice in Lieu of the NFA and NFA Funds to be Utilized to Purchase Locally Produced Palay Only Act of 2003\" Rice farmers are the most affected by the entry of rice from other countries. This measure proposes to grant the authority to import rice to farmers organizations only. The farmers organizations shall be accredited by the Cooperative Development Authority (CDA) and licensed by the government through the NFA (National Food Authority) based on appropriate guidelines currently being implemented under the Farmer as Importers Program. >>The bill also authorizes the NFA to use its funds to procure locally produced palay to motivate farmers to increase their productivity."

