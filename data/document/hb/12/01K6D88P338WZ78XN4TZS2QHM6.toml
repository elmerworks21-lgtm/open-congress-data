congress_website_title = "AN ACT TO RECAPTURE THE POWER OVER TARIFFS, AMENDING FOR THE PURPOSE SECTION 401 OF THE TARIFF AND CUSTOMS CODE, AS AMENDED"
congress_website_abstract = "This bill seeks to RECAPTURE the power over TARIFFS which Congress last year ago. The exercise of power over tariffs is a question of policy which has a deep impact on the economy. This bill, therefore, seeks to restore equilibrium in our governmentof SHARED powers. Moreover, the change in the rates of import duty or in the classification of dutiable articles effected by the President's exercise of the power over tariffs shall be in force and effect for a period of one year only."
