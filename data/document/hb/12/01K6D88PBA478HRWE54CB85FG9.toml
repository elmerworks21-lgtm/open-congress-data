congress_website_title = "AN ACT CREATING THE NATIONAL HEALING, RECONCILIATION AND UNITY COMMISSION, DEFINING ITS POWERS, FUNCTIONS AND RESPONSIBILITIES, AND APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"National Healing, Reconciliation and Unity Act of 2003\\\". In line with the policy of the State to undertake a national reconciliation program to resolve and heal deep-rooted divisions and controversies which arose from political ideologies, rivalry and opposition, this bill proposes to establish a National Healing. Reconciliation and Unity Commission (Commission). The Commission shall have the sole power to discuss and resolve political conflicts, and to implement and monitor a National Reconciliation and Unity Program. Likewise, the Commission shall formulate a mechanism to recover ill-gotten wealth of certain individuals, to implement a mechanism for the redress of victims of political conflicts and to determine who shall be entitled to a political amnesty."

