congress_website_title = "AN ACT PROVIDING FOR THE REGISTRATION, LICENSURE AND PRACTICE OF FOOD TECHNOLOGY IN THE PHILIPPINES, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Our country's food processing industry must be assured of global competitiveness . Filipino manufactured food products should have the chance of being bought when placed side-by-side with their international competitors.> \"Food Safety\" isa worldwide concern. Without guarantees towards this end, there will be difficulties in ensuring healthy and safe food and achieving global competitiveness . Professionally trained and \"licensed\" Food Technologists can be a major force in safeguarding product safety through proper implementation of the HACCP (Hazard Anaylsis and Critical Control Point), ensuring healthy and safe food and which is not a requirement in many international food factories."

