congress_website_title = "AN ACT PROHIBITING THE CONTRACTING OUT OF JOBS AND ACTIVITIES WHICH ARE NECESSARY OR USUAL IN THE BUSINESS OR TRADE OF THE EMPLOYER, AMENDING FOR THE PURPOSE ARTICLE 106 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: LABOR-ONLY CONTRACTING is perceived to be a tool which favors the employers since it avoids fixed labor costs, to the detriment of workers. Thus, the prohibition on labor-only contracting will not only afford full protection to workers but would also ensure that the welfare and working conditions of workers are monitored and regulated."

