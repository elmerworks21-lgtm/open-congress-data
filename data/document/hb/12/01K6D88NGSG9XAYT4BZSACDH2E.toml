congress_website_title = "AN ACT INSTITUTIONALIZ ING THE NATIONAL MILK FEEDING PROGRAM AND PROVIDING FOR A MILKFEEDING FUND THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Milk feeding, as used in this Act, shall cover distribution of locally produced milk from cows, carabaos and goats for direct intake of children aged 5-10 years old nationwide. The milk shall come from the produce of local dairy producers and processors at a price and quality acceptable to both the local milk suppliers and milk feeding sponsors, private or government. No milk intended for milk feeding shall be used for commercial sale. Priority shall be given to children who are in the barangayday care centers, pre-schools and schools located in the rural areas of the country and where prevalence of malnutrition is high. Second priorities are nursing mothers, pregnant women and elderly persons who also reside in rural communities."
