congress_website_title = "AN ACT PROVIDING FOR THE CONSERVATION AND PROTECTION OF WILDLIFE RESOURCES AND THEIR HABITATS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This proposed measure aims to: (1) to conserve and protect wildlife species and their habitats to promote ecological balance and enhance biological diversity; (2) to regulate the collection and trade of wildlife; (3) to pursue, with due regard to the national interest, the Philippine commitment to international conventions, protection of wildlife and their habitats; and (4) to initiate or support scientific studies on the conservation of biological diversity."
