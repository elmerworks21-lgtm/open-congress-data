congress_website_title = "AN ACT IMPROVING PHILIPPINE COMMITMENT TO HUMAN RIGHTS PROMOTION AND PROTECTION BY AMENDING BATAS PAMBANSA BLG. 22, ENTITLED `AN ACT PENALIZING THE MAKING OR DRAWING AND ISSUANCE OF A CHECK WITHOUT SUFFICIENT FUNDS OR CREDIT AND FOR OTHER PURPOSES'"
congress_website_abstract = "Rationale: Despite its laudable purpose of ensuring the stability of the banking and payments system for a healthy economy, BP 22 has been much abused thereby making it anti-poor in practice. This particular law has caused untold hardship and suffering to the weaker and poorer sectors of the Filipino people as well as the clogging of the dockets of the courts of justice as to make such courts almost full-time collection agencies. BP Blg. 22 (An Act Penalizing the Making or Drawing and Issuanceof a Check Without Sufficient Funds or Credit and For Other Purposes) is hereby amended as follows: SECTION 1 - A. EXCEPTION. WHERE THE CHECK IS ISSUED AS PART OF AN ARRANGEMENT TO GUARANTEE OR SECURE THE PAYMENT OF AN OBLIGATION, WHETHER PRE-EXISTINNG OR NOT, THE DRAWER SHALL NOT BE CRIMINALLY LIABLE UNDER THIS ACT OR UNDER ARTICLE 315 (2D) OF REPUBLIC ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE."
