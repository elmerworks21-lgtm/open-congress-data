congress_website_title = "AN ACT PROVIDING FOR STIFFER PENALTIES FOR ELECTION OFFENSES AMENDING FOR THE PURPOSE SECTION 264 OF BATAS PAMBANSA BLG. 881, AS AMENDED, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "This bill proposes to impose the penalty of not less than six (6) years nor more than 12 years of imprisonment for the follwing election offenses: vote buying and vote selling; conspiracy to bribe voters; threats, intimidation, terrorism, use of fraudulent device or any for of Coercion; dismissal of employees, laborers or tenants; use of public funds, money deposited in trust, equipment, facilities owned and controlled by the government for an election campaign; carrying of deadly weapons; carrying of firearms outside residence or place of business; tampering of votes as defined under paragraphs (a) and (b), Section 27 of Republic Act No. 6646."

