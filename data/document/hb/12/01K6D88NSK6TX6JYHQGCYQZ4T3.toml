congress_website_title = "AN ACT CREATING THE DEPARTMENT OF COMMUNICATIONS AND INFORMATION TECHNOLOGY, DEFINING ITS POWERS AND FUNCTIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: From the 1990s onwards, communications and IT constitute the most important sectors that shaped the global landscape. They became instant powerful agents of change, not only in the social or cultural aspects but more so in the economic aspect. Growth in these areas had been dynamic and explosive, so to speak. Sadly though, we lack the necessary options that would make them work best for us. >This bill, therefore, seeks to create a Department of Communications and Information Technology (DOCIT) out of the DOTC that will split from the latter the communications sector. This independent and separate department, the DOCIT, will embody and formulate not only a comprehensive policy framework for IT and communications in the countrybut also a recommendation for this new department's regulatory and institutional infrastructures . This new Department shall likewise coordinate, rationalize and synchronize all activities, programs and operations of individual agencies regarding co"

