congress_website_title = "AN ACT PROVIDING FOR THE RETENTION OF CITIZENSHIP BY PHILIPPINE CITIZENS WHO ACQUIRE FOREIGN CITIZENSHIP, AMENDING FOR THE PURPOSE COMMONWEALTH ACT NO. 63, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: This legislative measure seeks to recognize the reality that hundreds of thousands of natural born Filipinos have lost their citizenship, not through their own volition, but because of the lack of economic opportunity. These Filipinos, scattered throughout the world, have lost their citizenship more by accident than by choice. Even if they are no longer living in the Republic, they shall always remain Filipino in heart and in mind. > This measure would hopefully be a form of recognition to the many faceless Filipinos who are working long hours in far-flung reaches of the world. Their efforts and achievements are just as important and just as valuable to our objective of building a stronger and more prosperous republic."
