congress_website_title = "AN ACT ESTABLISHING THE COASTAL ENVIRONMENT PROGRAM, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The State shall promote partnerships among all sectors of Philippine society to protect, conserve, and manage, on a sustainable basis, coastal environments throughout the territorial jurisdiction of the country.> The integrity of coastalecosystems and their productivity and biodiversity shall be maximized subject to some areas being designated for protection (exclusion of human exploitation) and others for sustainable use. > Equitability of access to and utilization of resources andsubstantive involvement of local communities and stake-holders shall be basic concerns of the Program."
