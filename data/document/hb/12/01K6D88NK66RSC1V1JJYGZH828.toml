congress_website_title = "AN ACT GRANTING CIVIL SERVICE ELIGIBILITY TO ANY GOVERNMENT EMPLOYEE WHO HAS RENDERED AT LEAST TEN (10) YEARS CONTINUOUS GOVERNMENT SERVICE WITHOUT TAKING ANY CIVIL SERVICE EXAMINATION"
congress_website_abstract = "The bill seeks to grant government employees who have rendered continuous satisfactory service for at least ten (10) years a subprofessional or professional civil service eligibility, as the case may be, and shall qualify them for appointment to anyposition under the following classifications : Subprofessional Civil Service Eligibility: (1) Has rendered at least ten (10) years continuous and satisfactory service; and (2) Has completed at least two (2) years of college education leading to a college degree. Completion of at least 72 units in college or completion to a 2-year technical course with basic collegiate subjects, such as English and Mathematics, shall be considered equivalent to 2-year college education. Professional Civil Servicce Eligibility: (1) Has rendered at least ten (10) years continuous and satisfactory service; (2) Has completed a 4-year college education leading to a college degree; and (3) A second grade subprofessional civil service eligible."

