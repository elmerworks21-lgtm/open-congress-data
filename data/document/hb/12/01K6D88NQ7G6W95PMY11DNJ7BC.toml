congress_website_title = "AN ACT AMENDING ARTICLE 213 OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE `FAMILY CODE OF THE PHILIPPINES'"
congress_website_abstract = "Article 213 of Executed Order No. 209, otherwise known as the \"Family Code of the Philippines\" is hereby amended to read as follows: >\"Art. 213. In case of separation of the parents, parental authority shall be exercised by the parent designated bythe court. The court shall take into account all relevant considerations, especially the choice of the child over seven years of age, unless the parent chose is unfit. >\"No child under seven years of age shall be separated from the mother, unless the court finds compelling reasons to order otherwise.\" >\"THE PRECEDING PARAGRAPH SHALL NOT APPLY IN CASES WHERE THE SEPARATION WAS DUE TO ADULTERY BY THE WIFE, IN WHICH CASE, CUSTODY OF THE NINOR CHILD, REGARDLESS OF HIS AGE, SHALL BE AWARDED TO THE IINNOCENT SPOUSE."

