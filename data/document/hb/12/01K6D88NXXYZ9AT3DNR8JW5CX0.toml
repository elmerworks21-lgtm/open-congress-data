congress_website_title = "AN ACT PENALIZING PROSTITUTION, DEFINING THE PERSONS LIABLE THEREFOR, PROVIDING MEASURES AND SUPPORT SERVICES FOR ITS VICTIMS, AMENDING FOR THE PURPOSE THE REVISED PENAL CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: This proposed measure is premised on the following policies of the State: > The State --- (1) recognizes prostitution as a human rights violation which calls for coordinate and sustained response from all agencies of government; (2) recognizes that women and children are systematically victimized by and in the system of prostitution and must, therefore, be given protection and support by the State, instead of being treated as criminals; and (3) recognizes international commitments onthe eradication of sexual exploitation in all forms of gender-based violence."

