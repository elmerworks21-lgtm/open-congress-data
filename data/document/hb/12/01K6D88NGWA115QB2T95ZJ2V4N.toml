congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8042 ENTITLED `AN ACT TO INSTITUTE THE POLICIES OF OVERSEAS EMPLOYMENT AND ESTABLISH A HIGHER STANDARD OF PROTECTION AND PROMOTION OF THE WELFARE OF MIGRANT WORKERS, THEIR FAMILIES AND OVERSEAS FILIPINOS IN DISTRESS,AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Omnibus Amendments to RA 8042.\" Rationale: The implementation of RA 8042 for the past five years saw the urgent need for the government to review and assess the long-term implications of certain provisions of law. In fact, the law is now the subject of several amendatory bills pending in this august chamber. Moreover, the series of consultations with the various sectors concerned has revealed other needed amendments that are not covered by these bills. The purpose of this omnibus bill, therefore, is to consolidate the concerns that are sought to be addressed by the pending bills and to integrate the inputs that were gathered during the consultations conducted to review RA 8042."
