congress_website_title = "AN ACT MANDATING THE REPRESENTATION OF COOPERATIVES IN THE BOARD OF DIRECTORS OF THE LAND BANK OF THE PHILIPPINES, AMENDING THEREFOR REPUBLIC ACT NO. 3844, AS AMENDED"
congress_website_abstract = "Rationale: It is widely acknowledged that cooperatives play a crucial role in agrarian reform. The Land Bank of the Philippines (LBP) was originally created to support the agrarian reform program and, as such, it has given prime importance to cooperatives in its effort to support agrarian reform and rural development. However, the cooperative sector is NOT represented in the LBP Board. This has deprived the cooperative sector of being heard in the policy-making body of the LBP. This bill seeksto remedy this situation."

