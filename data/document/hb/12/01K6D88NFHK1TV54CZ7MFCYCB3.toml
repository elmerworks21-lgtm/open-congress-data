congress_website_title = "AN ACT TO AMEND CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED SEVEN THOUSAND NINE HUNDRED SIXTEEN, OTHERWISE KNOWN AS THE SPECIAL ECONOMIC ZONE ACT OF 1995, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill imposes an obligation on the part of the Philippine Economic Zone (PEZA), the government agency designated to manage the development of ecozones, in regard to paying due and proper disturbance compensation to any person or group of personswho are evicted in the area where the ecozones are established. This bill also requires the appointment of qualified persons to head the PEZA Board, shifting from the old practice of just appointing somebody even those without any professional background and moral ascendancy in connection with the job of the office. This is necessary in order to really professionalize the performance of the authority."

