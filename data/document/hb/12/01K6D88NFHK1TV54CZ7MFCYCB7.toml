congress_website_title = "AN ACT TO FURTHER STRENGTHEN THE EXISTING MECHANISM FOR DETERRENCE TO THE COMMISSION OF CRIME IN THE CONDUCT OF FRATERNITY, SORORITY AND OTHER CONFRATERNITY INITIATION RITES, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED EIGHT THOUSAND AND FORTY-NINE"
congress_website_abstract = "This bill seeks to amend Republic Act No. 8049, otherwise known as the Anti-Hazing Law in order to further strengthen the existing mechanism for deterrence to the commission of crime in the conduct of fraternity, sorority, and confraternity initiation rites. Hence, senseless violence or death is averted. With the new provisions added in the existing Republic Act No. 8049, therefore, it is hoped that a stronger deterrence to the commission of hazing, thereby causing unwanted casualties and deaths of young and vibrant people, in the process of initiation rites is established."

