congress_website_title = "AN ACT ESTABLISHING A MASS HOUSING PROGRAM IN THE FOURTH, FIFTH AND SIXTH CLASS MUNICIPALITIES IN THE COUNTRY AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Based on the recently released report by the World Bank titled \"Filipino Report Card on Pro-Poor Services\" which has a chapter on housing, half of those surveyed by the Social Weather Station last March-April 2000 consider their present housing as inadequate, insufficient and in need of major improvement. Likewise, the existing housing services both by government and private institutions reach only 10 percent (10%) of the population. Of this 10%, less than half actually end up getting an approval and availing of the housing assistance sought. There is therefore a great need to effect a wider yet more focused distribution of housing assistance in favor of the significant part of the country's poor, those living in the countrysidde."

