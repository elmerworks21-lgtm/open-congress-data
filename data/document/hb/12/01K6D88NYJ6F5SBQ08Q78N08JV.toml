congress_website_title = "AN ACT AUTHORIZING A ONE (1)-YEAR REGISTRATION OF INCUMBENT TEACHERS WITHOUT EXAMINATION AND FOR OTHER PURPOSES"
congress_website_abstract = "The Board for Professional Teachers, under the general supervision and administrative control of the Professional Regulation Commission is hereby authorized to register incumbent teachers without examination for another year, commencing after the issuance of the necessary rules and guidelines for the effective implementation of this Act: Provided, That the incumbent teachers are qualified to be registered without examination in accordance with the provisions of Section 26 of Republic Act No. 7836, otherwise known as the \"Philippine Teachers Professionaliza tion Act of 1994\": Provided, further, That there shall be no other registration of incumbent teachers without examination upon the expiration of the one-year period provided under this AAct."
