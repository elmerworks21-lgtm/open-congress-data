congress_website_title = "AN ACT INCREASING THE PRIVILEGES GRANTED TO SENIOR CITIZENS, AMENDING FOR THE PURPOSE SECTION 4 (a) & (b) OF REPUBLIC ACT NO. 7432, ENTITLED `AN ACT TO MAXIMIZE THE CONTRIBUTION OF SENIOR CITIZENS TO NATION-BUILDING , GRANT BENEFITS AND SPECIAL PRIVILEGES AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to increase the discount privileges from twenty percent (10%) to forty percent (40%), It is the purpose of this important legilsative measure to help our senior citizens to fight the economic difficulties in our midst in order to survive. They have no more place to turn to because even if they are willing to work to sustain their needs, their age and health conditions certainly will discourage people to hire them. The goverment therefore, has to provide alternatives to rescue these people from extreme difficulties as concrete gesture of gratitude to them for the services they had contributed during their most productive years."
