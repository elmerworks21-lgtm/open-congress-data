congress_website_title = "AN ACT EXPANDING THE JURISDICTION OF THE COURT OF TAX APPEALS, ELEVATING ITS RANK TO THE LEVEL OF A COLLEGIATE COURT WITH SPECIAL JURISDICTION AND ENLARGING ITS ORGANIZATIONAL STRUCTURE, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF REPUBLIC ACT NO. 1125, AS AMENDED, OTHERWISE KNOWN AS THE LAW CREATING THE COURT OF TAX APPEALS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to lodge with the Court of Tax Appeals (CTA) both criminal and civil jurisdictions over tax and customs cases in order to avoid needless delays in the final disposition of such cases. The vesting of both criminal and civic jurisdictions of a tax case in one court will likewise effectively chance and maximize the development of jurisprudence and judicial precedence on all tax matters which is of vital importace to revenue administration. The bill also seeks to elevate the rank of the CTA to the level of the Sandiganbayan, widen its organizational structure and expand its jurisdiction. The approval of the bill is seen to improve the tax collection efficiency of the Bureau of Internal Revenue, the Bureau of Customs and other revenue collecting agencies of the government."
