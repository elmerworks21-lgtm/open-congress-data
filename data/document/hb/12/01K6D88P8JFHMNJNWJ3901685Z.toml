congress_website_title = "AN ACT ESTABLISHING A SENIOR CITIZENS TECHNOLOGY AND LIVELIHOOD CENTER IN EVERY BARANGAY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "To maximize the role of senior citizens in nation building, the government must adopt measures whereby senior citizens are assisted and appreciated by the community for their contributions. This measure seeks to provide the elderly with services inthe form of actual teaching, demonstration and transfer of new skills and expand the opportunities for gainful senior citizens to find employment through available technology and livelihood programs. It proposes to establish a Senior Citizens Technology and Livelihood Center in every barangay."
