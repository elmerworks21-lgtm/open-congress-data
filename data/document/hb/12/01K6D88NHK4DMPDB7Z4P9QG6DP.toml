congress_website_title = "AN ACT REQUIRING ANY PERSON, ASSOCIATION, CORPORATION OR ENTITY TO SECURE THE NECESSARY CLEARANCE OR PERMIT FROM THE NATIONAL HISTORICAL INSTITUTE (NHI) BEFORE COMMENCING ANY CONSTRUCTION OF REAL ESTATE DEVELOPMENT PROJECTS IN AREAS IDENTIFIED, DESIGNATED AND APPROPRIATELY MARKED AS HISTORICAL PLACES OR IN AREAS PROXIMATE THERETO, PROVIDING PENALTIES FOR VIOLATION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Historical Places Protection Act of 1998.\" Rationale: There are reports that many significant historical sites, buildings and landmarks are being destroyed in favor of development projects are being undertaken everywhere without considering the historical value of the places especially in provinces where numerous memorable events of national significance occurred. It is now high time to end these unpatriotic activities."

