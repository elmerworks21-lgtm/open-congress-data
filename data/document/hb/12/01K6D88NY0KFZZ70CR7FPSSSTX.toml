congress_website_title = "AN ACT REVIVING SECTION 67 OF THE OMNIBUS ELECTION CODE, AMENDING SECTION 14 OF REPUBLIC ACT NO. 9006, AND FOR OTHER PURPOSES m"
congress_website_abstract = "Rationale: Any elective official, whether national or local, running for any office other that the one which is he holding in a permanent capacity, except for the President and Vice President, shall be considered ipso facto resigned from his officeupon the filing of his certificate of candidacy. This Section of the Omnibus Election Code seeks to implement the Constitutional andate which says that \"a public office is a public trust\". > Hence, the approval of this bill is urgently requested."

