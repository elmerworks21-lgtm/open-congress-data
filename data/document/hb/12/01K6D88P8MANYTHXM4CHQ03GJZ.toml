congress_website_title = "AN ACT DEFINING DOMESTIC VIOLENCE, PROVIDING PROTECTION MEASURES AND PENALTIES THEREFOR, AND FOR OTHER PURPOSES (RA09262 - 03/08/2004 enacted together with HB05516 & SB02723)"
congress_website_abstract = "\\\"Anti-Domestic Violence Act\\\". Taking cognizance of the worsening incidence of domestic violence as both a social ill and a cime that needs to be decisively addressed with appropriate laws, policies, programs and services for its arrest, prevention and eliminatin; the bill defines the crime of domestic violence and imposes stiff penalties on perpetrators of the crime to enable the State to guarantee the safety and security of the individual members of the family. It provides a comprehensive package of ample protection to victims and survivors of domestic violence through the grant of immediate and other necessary relief including the issuance of protection orders (POs). It also details the procedures for the issuance and availment of POs annd the filing of domestic criminal complaints."
