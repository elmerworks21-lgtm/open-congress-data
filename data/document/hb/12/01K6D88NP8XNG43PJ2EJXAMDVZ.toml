congress_website_title = "AN ACT GRANTING P125.00 DAILY AGROSS-THE-BOAR D IN WAGES OF FILIPINO WORKERS NATIONWIDE"
congress_website_abstract = "Rationale: Worker's wages have already been severely eroded and devaluated many times over the series of oil price increases since the oil deregulation policy was implemented. The recent oil price increase further deteriorated the adverse situationand triggered unrest among the working class. Beyond doubt, there is a need to reset wages as oil prices continue to erode the purchasing power of the consuming public. > A P125.00 daily across-the-boar d wage increase will be granted to all Filipino workers nationwide in view of the rising costs of living in the country."
