congress_website_title = "AN ACT INCREASING THE RATE OF BASE PAY OF OFFICERS AND ENLISTED PERSONNEL OF THE ARMED FORCES OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "In order to enhance the general welfare in recognition of the professionalism of the members of the AFP, as well as in order to equalize the salary scale of the AFP with the Philippine National Police (PNP) and government employees, the base pay ofofficers and enlisted personnel shall be adjusted according to the following schedule: RANKS BASE PAY General - P28,875.00 Lieutenant General - 25,333.00 Major General - 24,359.000 Brigadier General - 23.422.00 Colonel - 22,521.00 Lieutenant Colonel - 21,655.00 Major - 20,823.00 Captain - 20,020.00 First Lieutenant - 19,250.00 Second Lieutenant - 18,510.00 Cadet/P2LT - 17,799.00 Chief Master Sergeant - 16,792.00 Senior Master Sergeant - 15,841.00 Technical Sergeant - 14,098.00 Staff Sergeant -- 12,546.00 Sergeant - 11,837.00 Corporal - 11,167.000 Private First Class - 10,535.00 Private - 9,939.000 Candidate Soldier - 9,939.000"
