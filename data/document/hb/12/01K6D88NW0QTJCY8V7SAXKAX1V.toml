congress_website_title = "AN ACT INSTITUTING THE DANGEROUS DRUGS ACT OF 2001 REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 6425, AS AMENDED"
congress_website_abstract = "Rationale: The illegal drug trade had been a perennial problem in our country for quite a time now. Many stories have been printed in newspapers and reported in broadcast media about self-confessed drug users whose lives were totally destroyed by illegal substances. We have also heard and witnessed how illegal drugs have destroyed families and shattered dreams of so many individuals.> This bill therefore aims to put an end to all forms of drug abuse and institute measureas that will curb drug-related activities in the country. It also aims to provide a program for rehabilitation and treatment of drug dependents and to encourage them to once again become responsible and productive citizens of our society."
