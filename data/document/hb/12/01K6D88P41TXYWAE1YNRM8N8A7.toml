congress_website_title = "AN ACT GRANTING EXEMPTION TO THE PUBLIC SCHOOL TEACHERS FROM THE COVERAGE OF REPUBLIC ACT NO. 6758, OTHERWISE KNOWN AS THE SALARY STANDARDIZATION LAW AND AUTHORIZING THE APPROPRIATION OF FUNDS THEREFOR"
congress_website_abstract = "This proposed bill provides for the granting of exemption to eligible public schoolteachers from the Salary Standardization Law with the end in view, of enabling the Department of Education to conceptualize a salary structure for public schoolteachers that will be responsive and effective in cushioning their fixed income from the withheld taxes and other deductions and upgrading their salary levels to a scale that will allow them to cope up with the rising costs of living."

