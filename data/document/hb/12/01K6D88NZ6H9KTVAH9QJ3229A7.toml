congress_website_title = "AN ACT GRANTING BARANGAY NUTRITION SCHOLAR ASSIGNED TO NUTRITIONALLY DEPRESSED AREAS AN ANNUAL TRAVEL ALLOWANCE OF TWO THOUSAND FOUR HUNDRED PESOS (P2,400.00) AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED FIFTEEN HUNDRED SIXTY- NINE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The Barangay Nutrition Scholar who works as a volunteer is only entitled to a meager travel allowance of P120.00 a year from the National Nutritional Council in addition to whatever counterpart fund the municipality can grant him. In economically depressed areas the Barangay Nutrition Scholar does not get any counterpart allowance from the municipality. As a result, very few volunteer to work as Barangay Nutrition Scholar."
