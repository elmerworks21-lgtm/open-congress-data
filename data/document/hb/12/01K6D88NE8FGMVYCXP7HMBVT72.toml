congress_website_title = "AN ACT PROVIDING FOR OPTIMUM PERFORMANCE IN REVENUE COLLECTION THROUGH LATERAL ATTRITION AND GRANTING OF SPECIAL INCENTIVES AND REWARDS FOR EXEMPLARY SERVICE IN REVENUE-GENERAT ING AGENCIES OF GOVERNMENT AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The issue of graft and corruption in revenue-generat ing agencies and/or local government units must be acted upon resolutely, however, radically. At the same time, collections in the respective areas of responsibility of revenue and customs officers/offici als and local government treasurers/assi stant treasurers must be increased or maintained at the very least. This bill would allow expeditious action against non-performing officers/offici als by removing them from their positionsif they do not come up to the set standards like the achievement of target collection goals. In contrast, it is also proposed in this Act to award special incentives and rewards to officers/offici als who render exemplary and honest performance intheir revenue-collect ion."
