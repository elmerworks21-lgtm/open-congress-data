congress_website_title = "AN ACT GRANTING COMPULSORY COVERAGE TO BARANGAY DAY CARE WORKERS IN THE NATIONAL HEALTH INSURANCE PROGRAM, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 6972, AND FOR OTHER PURPOSES"
congress_website_abstract = "All barangay day care center workers and their dependents shall be enrolled in the National Health Insurance Program for them to receive and avail of an adequate package of personal health services that must include in-patient hospital care, out-patient care, emergency and transfer services, and also other supplementary health benefits as may be defined by the Philippine Health Insurance Corporation (PHIC) and the local government unit (LGU) where they render services."
