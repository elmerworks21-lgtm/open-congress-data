congress_website_title = "AN ACT AUTHORIZING THE CONDONATION OF PENALTIES ON DELINQUENT SOCIAL SECURITY CONTRIBUTIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "SECTION 1. Nothwithstandin g the provisions of Sec. 30 of Republic Act No. 1161, as amended by Republic Act No. 8282, any employer who is delinquent or has not remitted all contributions due and payable to the Social Security System (SSS) may, without incurring the prescribed penalty: (1) remit in full such delinquent contributions within a period of twelve (12) months from the effectivity of this Act, or (2) submit in writing a proposal to pay in installment such delinquent contributions within a period of sic (6) months from the effectivity of this Act. > Provided, That the employer shall submit together with his remittance or installment proposal the corresponding collection list."
