congress_website_title = "AN ACT AMENDING SECTION 4 OF REPUBLIC ACT NO. 7161, FURTHER AMENDING SECTION 71 OF PRESIDENTIAL DECREE NO. 705, OTHERWISE KNOWN AS `THE REVISED FORESTRY CODE OF THE PHILIPPINES'"
congress_website_abstract = "Except for all mangrove species whose cutting shall be banned, there shall be collected forest charges on each cubic meter of firewood cut in forestland, branches and other recoverable wood waste of timber, such as timber ends, topes and stumps, when used as raw materials for the manufacture of finished products, Ten pesos (P10.00). > FOR MANGROVE SPECIES, HOWEVER, CUT TO ENHANCE THE DEVELOPMENT OF THE AREA, AS AUTHORIZED BY THE SECRETARY OF THE DEPARTMENT OF ENVIRONMENT AND NATURAL RESOURCES,NO SUCH FEES SHALL BE COLLECTED. > \"Only third or fourth group wood can be taken for firewood. However, if jointly authorized by the Secretaries of both the Department of Environment and Natureal Resources, and Agriculture, first and second group wooods may be removed for firewood purposes from land which is more valuable for agricultural than for forest purposes.\""

