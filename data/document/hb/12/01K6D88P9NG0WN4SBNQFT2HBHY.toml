congress_website_title = "AN ACT REQUIRING THE MANDATORY APPOINTMENT OF COOPERATIVE OFFICERS IN THE LOCAL GOVERNMENT UNITS, GIVING THEM ADDITIONAL FUNCTIONS, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991, AS AMENDED"
congress_website_abstract = "It is the policy of the State to foster the creation and growth of cooperatives as a vehicle for promoting self-reliance. Under the Local Government Code of 1991, local executives are empowered, at their option, to appoint cooperative officers who shall take charge of the office for the development of cooperatives. However, many local government units (LGUs) have not appointed their respective cooperative officers thus hampering the development of cooperatives in the country. This measure seeks to address this problem by requiring the mandatory appointment of cooperative officers. Its passage is expected to foster the formation of cooperatives as active partners of the LGUs in economic development specially in the rural areas."

