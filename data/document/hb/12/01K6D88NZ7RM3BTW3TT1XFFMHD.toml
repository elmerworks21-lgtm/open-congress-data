congress_website_title = "AN ACT GRANTING THE MAGNA CARTA FOR DAY CARE WORKERS, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: There is no law that protects the interests of one of our most important service providers. Until now Day Care Workers are only receiving a meager monthly allowance of P500 as provided for by Republic Act 6972 or the Day Care Law, a measure that rationalize the establishment of Day Care Centers in every barangay. Aside from the economic conditions that they are subjected to, Day Care Workers have no security of tenure and their appointments are in many cases subject to the whims of politicians. This is why the state should guarantee the security of tenure for these workers."
