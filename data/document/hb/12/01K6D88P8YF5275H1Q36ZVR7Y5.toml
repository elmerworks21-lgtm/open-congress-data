congress_website_title = "AN ACT INSTITUTING POLICIES AND MEASURES FOR THE PREVENTION, CONTROL AND TREATMENT OF SEVERE ACUTE RESPIRATORY SYNDROME (SARS), AND OTHER EMERGING DISEASES THAT THREATEN PUBLIC HEALTH, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Severe Acute Respiratory Syndrome (SARS) and Other Emerging Diseases That Threaten Public Health Act of 2003\". The spread of the SARS (Severe Acute Respiratory Syndrome) infection and other emerging diseases that threaten public health in the country can be arrested through swift, decisive and vigilant action by the government and the pople. This bill empowers the Department of Health through the Bureau of Quarantine (BQ) to prevent the entry of persons, properties and vessels coming from countries affected with a disease considered a threat to public health. It allows the Director of the BQ to control, direct supervise and manage all quarantine stations as well as establish additional stations or close existing ones. It provides for theconduct of an information and education campaign on emerging diseases that threaten public health . The bill provides for the mandatory quarantine of all suspected carriers of SARS or other emerging diseases that threaten public health. Furthermore,"
