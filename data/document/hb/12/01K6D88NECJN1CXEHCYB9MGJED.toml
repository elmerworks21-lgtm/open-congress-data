congress_website_title = "AN ACT PROVIDING FOR THE EXEMPTION OF FIXED INCOME EARNERS FROM THE FILING OF INCOME TAX RETURNS, AMENDING FOR THE PURPOSE SECTION 44, NO. 2 (C) OF EXECUTIVE ORDER NO. 273, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: It is submitted that the work involved for both taxpayers and the government in the filing of these returns would be considerably lessened if fixed income earners were exempted from the filing of income tax returns. Since their income taxes are already withheld by their employers, the filing of income tax returns of fixed income is an exercise in futility. For these fixed income earners, the certificates of withholding income may serve as proof of income, in lieu of income tax returns."
