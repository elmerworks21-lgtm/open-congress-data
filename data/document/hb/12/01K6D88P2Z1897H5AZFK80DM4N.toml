congress_website_title = "AN ACT IMPLEMENTING THE FREEDOM OF ACCESS TO INFORMATION ON MATTERS OF PUBLIC CONCERN GUARANTEED UNDER SECTION 7, ARTICLE III OF THE 1987 CONSTITUTION FOR CITIZENS OF THE PHILIPPINES AND NEWS MEDIA, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Freedom of Access to Information Act\". Access to official records, and to documents, and papers pertaining to official acts, transactions, or decisions, as well as to government research data used as basis for policy development, shall be affordedthe citizen, subject to such limitations as may be provided by law. It is government policy to make information on government transactions involving public interest and on matters of national concern accessible to the general public. This bill seeksto grant mass media practitioners, particularly journalists, easier access to public documents."
