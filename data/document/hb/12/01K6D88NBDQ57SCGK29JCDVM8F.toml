congress_website_title = "AN ACT REQUIRING OIL COMPANIES TO INSTALL OIL SPILLAGE PREVENTIVE AND CONTROL MECHANISM IN THEIR TANKERS AND TO UNDERTAKE IMMEDIATE CLEANING OPERATIONS IN THE EVENT OF OIL SPILLS WITHIN THE COUNTRY'S TERRITORIAL WATERS, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Oil companies are hereby required to install oil spillage preventive and control mechanism in their tankers and to udnergo immediate cleaning operations in the event of oil spill within the country's territorial waters.> For this purpose of this bill, oil companies shall be required to set aside at least One Hundred Thousand Pesos (P100,000.00) each to be utilized exclusively for cleaning operations in case of oil spill within the country's territorial waters."

