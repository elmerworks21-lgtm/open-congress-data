congress_website_title = "AN ACT GRANTING REBATES TO ANY BUYER, LESSEE OR TRANSFEREE OF GOODS, PROPERTIES OR SERVICES EQUIVALENT TO ONE HUNDRED PERCENT (100%) OF THE VALUE-ADDED TAX IMPOSED FOR EVERY TRANSACTION COVERED BY REPUBLIC ACT NO. 7716, AS AMENDED AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "This proposed measure gives to broaden the tax base by granting rebates to any buyer, transferee or lessee of goods, properties or services equivalent to one hundred percent (100%) of the total Value-Added tax imposed for every transaction covered by existing VAT laws. This way, buyers or consumers will be encouraged to demand a receipt or invoice for every purchase of goods for VAT covered transactions, which for many years, had become the primary source of unremitted revenues to the government."

