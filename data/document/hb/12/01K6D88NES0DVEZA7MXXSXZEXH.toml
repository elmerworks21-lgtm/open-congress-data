congress_website_title = "AN ACT TO PROVIDE A SPEEDY PROCEDURE IN THE DISBURSEMENT OF FUNDS DURING PERIODS OF CALAMITY BY AMENDING SECTION 287, TITLE THREE, CHAPTER 1, OF THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "Each local government unit shall appropriate in an annual budget no less than twenty percent (20%) of its annual revenue allotment for development projects. Copies of the development plans of local government units shall be furnished the Departmentof Interior and Local Government; PROVIDED, THAT IN THE EVENT OF A CALAMITY, THE AMOUNT APPROPRIATED FOR DEVELOPMENT PROJECTS SHALL BE USED TO COVER THE RELIEF AND REHABILITATION EXPENSES OF THE PROVINCE, CITY OR MUNICIPALITY, SUBJECT TO REIMBURSEMENT BY THE NATIONAL GOVERNMENT."
