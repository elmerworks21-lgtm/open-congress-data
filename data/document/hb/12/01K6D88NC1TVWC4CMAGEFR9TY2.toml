congress_website_title = "AN ACT MAKING AVAILABLE TO THE UNDERPRIVILEGED AND HOMELESS DECENT HOUSING UNITS AT AFFORDABLE COST BY GRANTING ADDITIONAL INCENTIVES FOR THE PRIVATE SECTOR PARTICIPATING IN SOCIALIZED HOUSING, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7279, OTHERWISE KNOWN AS THE URBAN DEVELOPMENT AND HOUSING ACT OF 1992"
congress_website_abstract = "This bill proposes to grant the following incentives for private sector participation in socialized housing: (1) Reduction and simplification of qualification and accreditation requirements for participating private developers; (2) Creation of ECONOMIC AND SOCIAL HOUSING ONE-STOP PROCESSING CENTERS (ESHOPCs) IN ALL THE ADMINISTRATIVE [one-stop offices in the different] regions of the country for the processing, approval and issuance of clearances, permits and licenses; (3) Simplification of financing procedures; and (4) EXEMPTION from certain taxes."

