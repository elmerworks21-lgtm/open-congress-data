congress_website_title = "AN ACT PROVIDING FOR AN INTEGRATED MAGNA CARTA OF TEACHERS AND NONTEACHING PERSONNEL"
congress_website_abstract = "This piece of legislation seeks to respect and fulfill the rights of teachers and non-teaching personnel in all schools in the Philippines. More particularly, it guarantees their rights to self-organizati on and to collective bargaining in accordance with ILO Conventions numbered 87 and 98. It also grants teachers' and employees' organizations whether independent or federated, the right to negotiate directly with school owner's organizations."

