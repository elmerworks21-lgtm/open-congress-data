congress_website_title = "AN ACT DEFINING THE TYPOLOGY OF PUBLIC HIGHER EDUCATION INSTITUTIONS AND FOR OTHER RELATED PURPOSES"
congress_website_abstract = "\"Public Higher Education Typology Act of 2001\". The term \"TYPOLOGY OF PUBLIC HIGHER EDUCATION INSTITUTIONS\" shall mean the main classifications of state colleges and universities into pre-university and university institutions. It is further categorized into: (1) agricultural; (2) polytechnic/tec hnological; (3) normal or comprehensive college or university. Rationale: Here in the Philippines, the distinction between colleges and universities is blurred. Furthermore, the distinction between polytechnics, agricultural and comprehensive colleges is unclear. Thus, there is a need to distinguish the typology or classification by characteristics of our higher academic institutions. > This measure proposes to define and classify public higher edducaiton institutions so as to make the allocation of government resources more rationale and equitable."
