congress_website_title = "AN ACT PUNISHING ANY PERSON OR ENTITY CAUSING THE CONSTRUCTION OF ANY MARKET STALL OR STRUCTURE THAT BLOCKS OR OBSTRUCTS ANY PART OF A PUBLIC ROAD, BOULEVARD, AVENUE, HIGHWAY OR SIDEWALK, AND FOR OTHER PURPOSES"
congress_website_abstract = "Any person or juridical entity constructing any permanent, temporary or makeshift stall or structure along any public road, highway or sidewalk shall be imposed the penalty of not more than six months of imprisonment or a fine of not less than FiveThousand Pesos (P5,000.00) but not more than Fifty Thousand Pesos (P50,000.00), or both, at the discretation of the court. Provided that if the offender is a corporation, partnership, association or other judicial entity causing such construction. Provided further that any form of structure situated along such public road, highway or sidewalk shall be subjected to demolition and removal."
