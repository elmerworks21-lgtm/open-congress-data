congress_website_title = "AN ACT PENALIZING LABOR-ONLY CONTRACTING AND RATIONALIZING THE SCOPE OF JOB-CONTRACTING, AMENDING FOR THE PURPOSE ARTICLES 106, 280 AND 281 OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Tenure in employment means the right to continue in employment until the same is terminated for a just or authorized cause. However, it has become very difficult for the work force to gain a regular employee status thus the right to security of tenure remains unrealizable for many. The measure proposes to concretize the right of workers to security of tenure. It also penalizes labor-only contracting and limits the scope of permissible job-contracting."
