congress_website_title = "AN ACT MANDATING EACH CITY AND MUNICIPALITY TO CREATE A RIVER DEVELOPMENT AUTHORITY FOR THE PRESERVATION, PROTECTION, AND DEVELOPMENT OF ALL RIVERS, RIVER SYSTEMS AND NATURAL WATERWAYS WITHIN ITS RESPECTIVE JURISDICTION, DEFINING ITS POWERS AND FUNCTIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "While a number of laws for the preservation and development of rivers have been enacted, effective enforcement by local government units is weak due to the absence of a local agency with which coordination can be made. What must be created is an efficient institutional machinery in each local government unit not only to implement such laws, but also to promote development of rivers, river systems, and natural waterways."
