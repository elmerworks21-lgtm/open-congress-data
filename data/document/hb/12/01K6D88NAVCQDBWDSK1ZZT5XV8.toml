congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF ABSENTEE VOTING FOR QUALIFIED FILIPINOS ABROAD AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "All Filipinos abroad and their spouse and dependents when residing with them who have all the qualifications and none of the disqualificatio ns of a voter shall have the right to register and to vote by absentee ballot.> They shall include the following: 1) Contract workers employed in foreign countries; 2) Employees of the Philippine Government assigned in foreign countries; 3) Filipino citizens who are legally immigrants or temporary residents of foreign countries."
