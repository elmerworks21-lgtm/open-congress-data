congress_website_title = "AN ACT CREATING THE DEPARTMENT OF INFORMATION TECHNOLOGY AND COMMUNICATIONS, PROVIDING FOR THE TRANSFER OF RELATED AGENCIES TO ITS JURISDICTION, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The role and value of information and communications technologies in individual lives, business, and even government, cannot be fully underscored. These technologies include, but are not limited to, computers, the Internet, telephones, mobile phones, electronic commerce, convergence and other emerging technologies. Once buzzwords, these now permeate how people live, communicate and interact with each other, make a living, or do business. > The creation of the Department of Information Technology and Communications will allow the government to give due attention to information and communications technologies that will most likely eventually form the backbone of the economies of the world."

