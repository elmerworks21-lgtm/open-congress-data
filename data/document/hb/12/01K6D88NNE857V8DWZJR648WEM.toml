congress_website_title = "AN ACT PROHIBITING THE SALE THROUGH PUBLIC AUCTION OF ALL KINDS OF CONFISCATED SMUGGLED GOODS AND PRODUCTS, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Our country has continually been beset with problems of graft and corruption committed by personnel of the different departments of our local and national governments. The Bureau of Customs has not been spared by this malady.> There are several activities of the Bureau of Customs that has been identified as one of the sources of graft and corruption. One particular activity of the Bureau of Customs which is mandated by law is the sale through public auction, of confiscated goods by the Bureau of Customs. Through collusion and manipulation between personnel of the Bureau of Customs and certain unscrupulous individuals this has become a rich opportunity for the commission of graft and corruption to the detriment of both the government and thhe citizenry."

