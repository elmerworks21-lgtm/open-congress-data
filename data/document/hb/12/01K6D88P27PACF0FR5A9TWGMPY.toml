congress_website_title = "AN ACT REGULATING THE USE OF ELECTRIC POLES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Pole Regulation Act of 2002\". Rationale: Since the inception of cable television, cable companies have sought the means to run a wire into the home of each subscriber. They have found it convenient, and oftern essential, to lease space for their cables on telephone and electric utility poles. Utilities, in turn, have found it convenient to charge monopoly rents. For this reason, the cable cocmpanies and other telecommunicati on service provides complain of the exorbitant rates of rents for poles attachments imposed to them by the public utility providing electric service, which in turn the cost is passed on the cable television subscribers."
