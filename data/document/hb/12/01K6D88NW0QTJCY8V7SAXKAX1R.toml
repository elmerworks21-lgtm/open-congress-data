congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A NATIONAL IDENTIFICATION (ID) SYSTEM TO CONSOLIDATE EXISTING ID SYSTEMS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "It is the policy of the State to establish and maintain a complete, adequate, and consolidated National Identification System (National ID) relevant to the goal of improved public administration. To achieve this, the government shall ensure that theNational Identification System shall aid the following objectives: (1) To streamline and economize the bureaucracy by consolidation of the ID sysatems present with the National ID system; (2) To facilitate and expedite statistical data gathering bypertinent government institutions in aid of planning activities; and (3) To provide Filipino citizens with a simple and effective identification system to conduct transactions."
