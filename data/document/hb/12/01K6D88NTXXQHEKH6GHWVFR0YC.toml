congress_website_title = "AN ACT ESTABLISHING A COMPUTERIZED VOTER'S IDENTIFICATION SYSTEM"
congress_website_abstract = "It is hereby declared a state policy to establish a voter's identification system as a means to ensure the integrity of the electoral process. Under this system, every registered voter shall, upon registration, furnish and make available his personal data to the Commission on Elections. >The voter's identification system shall be implemented by providing each bonafide years voter at least eighteen years old, a voter's identification card which shall contain the following personal data: (a) voter's name; (b) voter's sex; (c) voter's place of birth; (d) names of voter's parents; (e) voter's place of residence; (f) voter's photograph; (g) voter's signature; (h) voter's right-thumb mark; (i) voter's identification number. >Each voter's identiification card shall also bear the signature of the Chairman of the Commission on Elections. The voter's indentification number shall be permanent and shall be entered in the central computerized database of the Commission on Elections."

