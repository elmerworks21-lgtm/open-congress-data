congress_website_title = "AN ACT LIMITING THE EXPORTATION OF TROPICAL, ORNAMENTAL AND LIVE FOOD FISHES, PROVIDING FOR THE CONDUCT OF RESEARCH STUDIES FOR ALTERNATIVE FISHING METHODS OF CATCHING TROPICAL, ORNAMENTAL AND LIVE FOOD FISHES, AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "The exportation of tropical and ornamental fishes accounted for .04% of the total fish exports from 1993 to 1995. However, the market share of the industry can not compensate for the destructive effects of cyanide on the ecological balance of our marine ecosystem, particularly the corral reefs which serve as sanctuaries for ornamental and tropical fishes. (At present, cyanide fishing is the most common fishing method employed by fishermen who catch tropical and ornamental fishes). This measure imposes a mandatory ban on the exportation of such fishes for a minimum period of 10 years up to a maximum of 25 years to abate the use of cyanide on fishing unless an alternative fishing method for tropical and ornamental fishes is discovered."
