congress_website_title = "AN ACT STRENGTHENING THE NATIONAL HISTORICAL INSTITUTE, AMENDING FOR THE PURPOSES PRESIDENTIAL DECREE NUMBERED ONE AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposes to ADD the following paragraph to Article XV PD No. 1.\"THE INSTITUTE IS HEREBY AUTHORIZED TO IMPOSE FEES, CHARGES, OR OTHER DUES AS IT MAY DEEM APPROPRIATE FROM THOSE WHO VISIT OR USE THE FACILITIES OF THE INSTITUTE'S HISTORIC MONUMENTS AND SHRINES, OR FROM THOSE FROM THE PRIVATE SECTOR WHO AVAIL OF THE INSTITUTE'S RESEARCH, CONSERVATION, OR OTHER SERVICES. THE FUNDS RAISED AS A RESULT THEREOF SHALL BE USED EXCLUSIVELY BY THE INSTITUTE TO OPERATE AND MAINTAIN SAID HISTORIC SHRINES OR FOR SUCH OTHER PURPOSES AS MAY BE MANDATED BY LAW.\""
