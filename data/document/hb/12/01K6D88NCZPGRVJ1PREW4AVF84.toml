congress_website_title = "AN ACT DESIGNATING A SPECIAL EMERGENCY TELEPHONE NUMBER ACCESSIBLE NATIONWIDE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: In an archipelagicall y-oriented country, it is therefore important that an effective communication system be developed to centralize rescue operations not only in the metropolis but also in the far-flung areas of the Philippines especially in times of national disasters and other calamities. This bill, therefore, seeks to create a TOLL-FREE EMERGENCY HOTLINE NUMBER available nationwide."

