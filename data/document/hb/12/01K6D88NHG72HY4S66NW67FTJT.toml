congress_website_title = "AN ACT CREATING NATIONAL HEALTH RESEARCH INSTITUTES, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The Philippine Medical Association (PMA) firmly believes that scientific medicine has not equal in health care delivery. If we sincerely want to develop the medicinal potentials of our \"7000 species of medicinal plants we should go for it with well organized and adequately funded scientific investigations. Therefore, the PMA proposes the creation of National Health Research Institutes to provide the key to unlock the active compounds from indigenous and non-indigenous sources and other health potentials obtainable in our country."

