congress_website_title = "AN ACT PROVIDING FOR THE IMPOSITION OF THE PENALTY OF RECLUSION PERPETUA INSTEAD OF THE DEATH PENALTY IN CASES WHERE THE LAW PRESCRIBES THE DEATH PENALTY"
congress_website_abstract = "The provision of any law, rule or regulation to the contrary notwithstanding , the penalty of reclusion perpetua instead of the death penalty, shall henceforth be imposed in cases where the law prescribes the imposition of the death for the violation of its provisions. > Any person who shall be sentenced by final judgment to reclusion perpetua by virtue of this Act shall serve it for the rest of his natural life, without entitlement to any allowance for good conduct, special time allowance forloyalty, or parole save only as the President of the Philippines may allow in the exercise his power to grant reprieves, commutation of sentence or pardon under the Constitution."
