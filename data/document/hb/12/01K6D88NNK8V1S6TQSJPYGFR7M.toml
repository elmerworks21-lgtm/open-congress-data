congress_website_title = "AN ACT ABOLISHING THE CITIZEN'S ARMY TRAINING (CAT) FOR HIGH SCHOOL STUDENTS"
congress_website_abstract = "Article VII Sections 80 to 88 of Commonwealth Act No. 1 otherwise known as the National Defesne Act partly requiring preparatory military training for persons attending high or vocational school is hereby repealed. > Students who are qualified for the Citizen's Army Training (CAT) shall pursue instead training courses given by the Boy Scouts of the Philippines or the Girl Scouts of the Philippines, as the case may be, and shall be members thereof."
