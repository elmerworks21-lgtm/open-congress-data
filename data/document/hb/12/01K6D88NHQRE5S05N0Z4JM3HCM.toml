congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF ABSENTEE VOTING AND REGISTRATION FOR QUALIFIED FILIPINOS ABROAD AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This bill proposes a system of absentee voting to actualize the constitutional mandate and to enable our countrymen to exercise their right of suffrage. It proposes a system of registration, voting and canvassing for qualified Filipinos abroad to ensure that they could participate in important political exercises such as elections, referendum, initiative or plebiscite."
