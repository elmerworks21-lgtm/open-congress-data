congress_website_title = "AN ACT PROVIDING FOR THE SPLITTING OF THE DEPARTMENT OF TRANSPORTATION AND COMMUNICATIONS THEREBY CREATING THE DEPARTMENT OF COMMUNICATIONS AND INFORMATION TECHNOLOGY, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This bill seeks to establish a separate department for communication, thereby creating a new government agency called the Department of Information Technology and Communications (DITC). > The creation of DITC will effectively merge the communications aspect of the present DOTC with National Computer Center that is presently under the Office of the President. With this set-up, functional streamlining will address the new phenomenon of the coverging and emerging information technologies."

