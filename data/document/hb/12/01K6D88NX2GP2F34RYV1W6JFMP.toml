congress_website_title = "AN ACT PROVIDING FOR PUBLIC LIABILITY INSURANCE FOR THE PURPOSE OF PROVIDING IMMEDIATE RELIEF TO PERSONS AFFECTED BY ACCIDENT ARISING FROM THE OPERATIONS OR INCIDENTAL TO THE OPERATIONS OF ESTABLISHMENTS, ENTERPRISES, PUBLIC UTILITIES AND VEHICLES,BUILDINGS, MACHINERIES AND THEIR ACCESSORIES"
congress_website_abstract = "\"Public Liability Insurance Act of 2001\". Rationale: It is the policy of the State to ensure that immediate compensation or relief be provided to victims of accidents due to operations or incidental to the operations of establishments, enterprises,public utilities and vehicles, buildings, machineries and their accessories. > It is also the policy of the State to ensure the accountability of owners or operators of establishments, enterprises, public utilities and vehicles, buildings, machineries and thier accessories by requiring them to have in place public liability insurance which ensure that compensation, assistance or restitution be paid in respect of death of, or personal injury to, any person or persons or damage to property due totheir business operations."
