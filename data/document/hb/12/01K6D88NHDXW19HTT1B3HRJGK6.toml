congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991 (RE PERMISSION TO LEAVE STATION, POWERS OF THE VICE-GOVERNOR AND VICE-MAYOR, APPOINTMENT OF SECRETARY TO THE SANGGUNIAN, TREASURER AND ASSISTANT TREASURER)"
congress_website_abstract = "Rationale: Under the Local Government Code, there shall be an effective allocation among the different local governmetn units of their respective powers, functions, responsibilitie s, and resource. Likewise, local officials and employees paid whollyor mainly from local funds shall be appointed or removed by the appropriate appointing authority. To fully implement the aforesaid guiding principles of decentralizatio n, the accompanying bill seeks to grant more powers to local government officials, specifically the appointment of treasurer, assistant treasurer, the secretary to the sanggunian and employees in the offices of the vice-governor, provincial board member, vice mayor and councilors."

