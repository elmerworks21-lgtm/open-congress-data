congress_website_title = "AN ACT FIXING THE RETIREMENT AGE OF THE UNIFORMED PERSONNEL OF THE PHILIPPINE NATIONAL POLICE AND FOR OTHER PURPOSES"
congress_website_abstract = "The age of compulsory retirement of the members of the PNP from the rank of Police Officer 1 up to the rank of Senior Police Officer IV is hereby fixed at 56 years. PNP officers from the rank of Inspector to the rank of Chief Superintendent shall be compulsory retired at the age of 58 years; Provided, That a Director, a Deputy Director General and a Director General shall each be granted another year of service before retirement.> The premature retirement under existing laws of the uniformed personnel of the Philippine National Police (PNP), especially those in the upper echelons of the organization, deprives the people, of the services of thos who have the skills, knowledge and training as professional police officers."
