congress_website_title = "AN ACT INCREASING THE PRIVILEGE DISCOUNTS OF THE SENIOR CITIZENS FROM TWENTY PERCENT (20%) TO FORTY PERCENT (40%) AMENDING FOR THE PURPOSE SECTION 4 OF REPUBLIC ACT NO. 7432, AND FOR OTHER PURPOSES"
congress_website_abstract = "The senior citizen shall be entitled to the following: (1) The grant of twenty percent (20%) discount from all establishments relative to utilization of transportation services, hotels and similar lodging establishment, restaurants and recreation centers. A FORTY PERCENT (40%) discount shall be granted in the purchase of medicines anywhere in the country: Provided, That private establishments may claim the cost as tax credit. (2) xxxx (3) xxxx (4) xxxx (5) free medical and dental services INCLUDING HOSPITALIZATION AND MEDICINES, in government establishments AND A PRIVILEGE DISCOUNT OF FORTY PERCENT (40%) IN THE COST OF HOSPITALIZATION FOR THOSE ADMITTED IN PRIVATE HOSPITALS anywhere in the country, subject to guidelines to be issued by thee Department of Health, the Government Service Insurance System and the Social Security System; and (6) xxxx"
