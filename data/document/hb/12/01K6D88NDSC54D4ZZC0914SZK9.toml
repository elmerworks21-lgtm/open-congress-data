congress_website_abstract = "Assistance to NGOs may consist of: (1) Project Grants; (2) Matching Crants; (3) Concessional Loans; (4) technical, training and organizational development support; and (5) Such other assistance or support as may be determined to be appropriate and proper by the Secretary or Head of the Department, Commission or Agency."
