congress_website_title = "AN ACT PROVIDING FOR AUTOMATIC ADJUSTMENT OF THE BASIC MONTHLY PENSION OF RETIRED PERSONNEL COVERED BY THE GOVERNMENT SERVICE INSURANCE SYSTEM AND THE SOCIAL SECURITY SYSTEM TO THE PREVAILING COST OF LIVING INDEX AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "With the buying power of the peso constantly being weakened, the elderly, who depend mostly on their pensions, have difficulty in making both ends meet. This bill seeks to provide for the basic monthly pension and/or benefits of retired personnel covered by the GSIS and the SSS to be automatically adjusted to the prevailing cost of index as determined by the National Economic Development Authority. A pension based on the cost of index would help to alleviate the plight of our senior citizens and enable them to live comfortably in the twilight of their years."
