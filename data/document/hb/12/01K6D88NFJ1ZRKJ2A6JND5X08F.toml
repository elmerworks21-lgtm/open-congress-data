congress_website_title = "AN ACT TO DEVOLUTIONIZE TO THE LOCAL GOVERNMENT THE AUTHORITY WITH RESPECT OVER THE RIGHTS OF CHILDREN, AMENDING FOR THE PURPOSE SPECIFIC PROVISIONS OF REPUBLIC ACT NUMBERED SEVEN THOUSAND ONE HUNDRED SIXTY, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "If one wants national services to grow and develop, one must not think of the present generation alone. If we want the world to attain universal progress, unity and peace, we must work for the well-being of the children, look after their health, education, human rights, moral and spiritual values. This bill, therefore, seeks for the creation of the Local Council for Children to be established in every city or municipality to directly oversee the children's well being and strictly monitor andprohibit child abuse."

