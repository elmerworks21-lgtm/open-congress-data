congress_website_title = "AN ACT REORGANIZING THE NATIONAL FOOD AUTHORITY INTO THE NATIONAL FOOD CORPORATION REDEFINING ITS POWERS, AND CREATING THE FOOD DEVELOPMENT AND REGULATORY ADMINISTRATION, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Food Authority Reorganization Act of 2003\". The National Food Authority (NFA) is mandated to ensure food security in staple cereals during calamities and emergencies and stability of staple cereal supply and prices. This mandate is considered critical even with the present trend toward trade liberalization and globalization. To enable the NFA to meet its mandate, it must be restructured and its finances strengthened. This bill proposes to strengthen NFA financially and structurally soit will develop into a strong Food Development and Regulatory Administration and a State Financing Enterprise. It also proposes to reorganize the NFA and institute reforms therein."

