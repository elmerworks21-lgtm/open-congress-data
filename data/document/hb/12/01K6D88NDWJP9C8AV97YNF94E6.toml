congress_website_title = "AN ACT PENALIZING THE NEGATIVE PORTRAYAL OF A PERSON WITH A DISABILITY IN MOVIES, TELEVISION, STAGE AND OTHER FORMS OF MASS COMMUNICATION"
congress_website_abstract = "\"Media Protection for the Disabled Act.\" Any person who, in the performance of an act before the television, movies, stage, and other similar forms of mass communication, shall intentionally or maliciously mock, embarrass, humiliate, or otherwise insult a person with disabilities shall be penalized with imprisonment of not more than six (6) months and/or, a fine not exceeding Five thousand pesos (P5,000.00)"

