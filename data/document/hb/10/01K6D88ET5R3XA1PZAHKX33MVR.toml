congress_website_title = "AN ACT EXEMPTING NONLIFE INSURANCE POLICIES FROM THE EXPANDED VALUE ADDED TAX AND DOCUMENTARY STAMP TAX REPEALING FOR THE PURPOSE SECTION 184, AND AMENDING SECTIONS 102 AND 185, OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "Rationale: It is a fact that the local insurance industry is heavily taxed. This has affected the growth of the industry, since the high imposition on insurance premiums has prevented the insuring public from procuring sufficient insurance coveragesfor their properties. LIkewise, this has slowed doen the growth of the economy since a significant amount of losses are not indemnified by insurance. Amends Section 103 of the National Internal Revenue Code to read as follows: \"SEC. 103. Exempt Transactions. - The following shall be exempt from value added tax: > x x x > \"(u) NON-LIFE INSURANCE COMPANIES, INCLUDING THEIR CROP INSURANCES, AND SURETY, FIDELITY, INDEMNITY AND BONDING COMPANIES.\""

