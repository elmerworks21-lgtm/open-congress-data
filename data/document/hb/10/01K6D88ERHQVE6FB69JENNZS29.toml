congress_website_title = "AN ACT PROVIDING RETIREMENT BENEFITS FOR ALL ELECTIVE AND APPOINTIVE BARANGAY OFFICIALS WHO HAVE RENDERED SEVEN CONSECUTIVE YEARS OF SERVICE IN THEIR BARANGAYS AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Since their level is the closest to the people, barangay officials are practically working on a 24 - hour shift, without rest even on holidays. And this, they perform for a measly honoraria or allowance every month. Worse, they will notreceive any form of remuneration or benefits once they retire from office. Declares the following --- \"SECTION 1. All elective and appointive barangay officials who have rendered at least seven (7) consecutive years of service in their respective barangays, are hereby entitled to receive for life, upon their retirement, a monthly pension equivalent to 75% of the total honorarium he received his incumbency.\" \"SECTION 2. All incumbents to the positions above stated who have served for at least sevven (7) consecutive years before the May 1997 Barangay Elections and prior to the passage of this law shall be benefited by the retroactive effect of this act.\""

