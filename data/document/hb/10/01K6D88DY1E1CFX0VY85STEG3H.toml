congress_website_title = "AN ACT TO AMEND SECTION 5, SUBSECTION (d) THEREIN, OF PRESIDENTIAL DECREE NUMBERED FOUR HUNDRED FORTY-NINE, OTHERWISE KNOWN AS COCKFIGHTING LAW OF 1974"
congress_website_abstract = "Amends Sec. 5, Subsection (d) of PD 449 (Cockfighting Law of 1974) by providing that NO cockfighting shall be held on these days; December 30 (Rizal Day); June 12 (Philippine Independence Day); November 30 (National Heroes Day); Holy Thursday; GoodFriday; Election Day; Referendum Day and during Registration Day for election."

