congress_website_title = "AN ACT BROADENING, ENHANCING AND INSTITUTIONALIZ ING POPULAR AND NONGOVERNMENTAL PARTICIPATION IN LOCAL GOVERNANCE AND ADMINISTRATION, AMENDING FOR THE PURPOSE SECTIONS 2, 5, 26, 27, 34, 35, 36, 37, 41, 52, 55, 60, 70, 74, 98, 100, 102, 103, 106, 108, 112, 114, 116, 120, 122, 123, 124, 125, 227, AND 318 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Declares it the policy of the State to guarantee the effective and institutional participation of nongovernmental , people's and sectoral organizations in local governance and administration. Contains proposals on these areas of concern: (1) Duty ofnational government agencies in the implementation of national projects; (2) Role of people's and nongovernmental organizations; (3) Sanggunian sessions; (4) Representation of nongovernmental organizations."

