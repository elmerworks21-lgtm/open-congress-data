congress_website_title = "AN ACT PROVIDING CERTAIN REQUIREMENTS TO INSURE CLEAN AND HONEST ELECTIONS OF MEMBERS OF THE BOARD OF DIRECTORS OF ELECTRIC COOPERATIVES AND THEREBY AMENDING FOR THE PURPOSE PRESIDENTIAL DECREES NO. 269 AND 1645"
congress_website_abstract = "Rationale: Unfortunately , many electric cooperatives have virtually become the private preserve of the members of their Board of Directors who utilize the cooperative for thier personal gain as well as dumping ground for the employment of their relatives and friends, thereby over staffing the coop and increasing the cost of electricity. consequently, many coops are mismanaged and riddled with irregularities. As a result, many of them are not only behind in the payment of their loan amortizations, but are hugely indebted to the National Power Corporation. Electric consumers are the ones paying for the cost of their abuses. > Members of the board of directors of numerous electric cooperatives have managed to stay in power for a long time.. some of them even for more than a decade, through manipulation of the coop membership records and electoral process. District elections of electirc cooperatives are most often heavily tainted with electoral fraud.> Mandates the National Electrific"
