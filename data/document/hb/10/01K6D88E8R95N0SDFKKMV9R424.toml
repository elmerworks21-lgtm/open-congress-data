congress_website_title = "AN ACT CREATING A NATIONAL ALCOHOLISM REHABILITATION CENTER IN LUZON, VISAYAS, AND MINDANAO, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Prescribes the following functions of the proposed NATIONAL ALCOHOLISM REHABILITATION CENTER: (1) Educate the people on the nature of alcoholism as a disease and how it can be treated; (2) Encourage alcoholics to undergo treatment in rehabilitationcenters; (3) Help lessen the number of crimes being committed in the country under the influence of alcohol; (4) Provide alcoholics with government subsidized health care services relating to the treatment of alcoholism; (5) Draw up, in consultationwith various agencies, a national treatment and rehabilitation program for alcoholics; and (6) Grant technical or financial assitance to other rehabilitation centers for alcholics under guidelines to be approved by the Department of Health."

