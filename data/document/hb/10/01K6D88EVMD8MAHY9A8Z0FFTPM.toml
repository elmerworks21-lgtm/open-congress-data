congress_website_title = "AN ACT MANDATING THE ELIMINATION OF CHILD LABOR POLICY AS A REQUIRED BARGAINING CLAUSE IN COLLECTIVE BARGAINING AGREEMENTS, AMENDING FOR THIS PURPOSE THE PERTINENT PROVISIONS OF THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Proposes a NEW article to the Labor Code of the Philippines, which shall read as follows: \"ART. 260 - A. ELIMINATION OF CHILD LABOT; REQUIRED BARGAINING CLAUSE. - THE PARTIES TO A COLLECTIVE BARGAINING AGREEMENT SHALL INCLUDE THEREIN A PROVISION PROHIBITING CHILD LABOR AND PROVIDING SANCTIONS FOR ITS VIOLATION.\""

