congress_website_title = "AN ACT PROHIBITING THE PRACTICE OF HUMAN CLONING AND OPERATION OF ESTABLISHMENT OR INSTITUTION ENGAGED IN THE SAME IN THE PHILIPPINES AND IMPOSING PENALTY THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The recent issue on cloning of animals by scientists has stirred controversial views amongst, medical, religious and social groups internationally . With this breakthrough of cloning animals, cloning of human beings is possible and can beprobably achieved in similar ways. The practice of human clooning is considered as unethical, unconstitutiona l, tampering and interfering with God's original creation. > Penalizes violation of this Act with a fine of P600,000.00, or imprisonment for a period of six (6) years, or both."

