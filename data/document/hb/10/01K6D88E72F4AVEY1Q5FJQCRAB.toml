congress_website_abstract = "Provides for these areas of concern: (1) The turnover by the PCGG to the Sugar Regulatory Administration of funds and assets recovered; (2) Allocation to labor of an amount equivalent to 10% of the net share of the sugar purchases; (3) Condonation of bank interests on sugar planters' loans."

