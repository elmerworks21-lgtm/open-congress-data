congress_website_title = "AN ACT TO INSTITUTE THE POLICIES ON THE SUPPRESSION OF TRAFFICKING IN FILIPINO WOMEN, AND TO ESTABLISH A HIGHER STANDARD OF PROTECTION AND REHABILITATION OF VICTIMS OF TRAFFICKING, SEXUAL SERVITUDE, AND EXPLOITATION INCLUDING COMMERCIALIZED TRANSNATIONAL MARRIAGES, AND MIGRATION FOR ENTERTAINMENT, PROVIDINNG STIFFER PENALTIES FOR ITS VIOLATIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Trafficking in women takes many forms and continues to thrive in a more sophisticated, technological and globalized dimensions. > Trafficking in women is closely associated to the sex trade and should be given attention. Since the Philippines is a signatory to the 1949 Convention for the Suppression of the Traffic in Persons and of the Exploitation of the Prostitution of Others as well, it is committed to implement such Covenant and other relevant international instruments. \"The Anti-Traffickin g in Filipino Women Act of 1996\" Provides for the following --- (1) comprehensive measures in the suppression of trafficiking in women; (2) higher standards of rehabilitation and protection of victims of prostitution, sexual ? , etc; ((3) definition of the various acts of trafficking; penalties for violators of this proposed measure; and (4) creation of an INTER-AGENCY COUNCIL against trafficking."
