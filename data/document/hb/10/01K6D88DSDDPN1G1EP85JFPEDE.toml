congress_website_title = "AN ACT REQUIRING ALL GOVERNMENT AGENCIES TO DEPOSIT THE SALARIES AND OTHER MONETARY BENEFITS OF THEIR EMPLOYEES THROUGH BANKS AND FURNISHING THEM WITH PROOF OF SUCH DEPOSITS"
congress_website_abstract = "Requires all government agencies, including government-owne d and controlled corporations, to deposit the salaries and other monetary benefits of their employees, whether permanent, temporary, casual or contractual, with banks located close to its office. Obligates the disbursing officer, payroll master or any person in charge of disbursing or paying the salaries of their employees to furnish the latter a proof of notice of such deposit."

