congress_website_title = "AN ACT FURTHER AMENDING PRESIDENTIAL DECREEE NO. 198, AS AMENDED, OTHERWISE KNOWN AS 'THE PROVINCIAL WATER UTILITIES ACT OF 1973'"
congress_website_abstract = "States that reliable, adequate and environmentally sourced water and wastewater disposal systems shall be provided to population centers nationwide. States, likewise, that water districts shall be AUTONOMOUS, LOCALLY CONTROLLED, with public and/or private capital. Proposes that the respective water district board of directors shall ge given the sole power of determining the appropriate organizational structure, salary scale and position allocation plan."

