congress_website_title = "AN ACT PROHIBITING THE SHOWING OR EXHIBITION OF FILMS OR BROADCAST OF PROGRAMS THAT FEATURES OR GLORIFIES THE LIFE OF ANY CANDIDATE DURING ELECTION PERIOD, AMENDING FOR THE PURPOSE THE 'OMNIBUS ELECTION CODE OF THE PHILIPPINES'"
congress_website_abstract = "Amends Section 85 of BP 881, otherwise known as the Omnibus Election Code of the Philippines by inserting a NEW paragraph after paragraph (c) to read as follows: \"Sec. 85. Prohibited forms of election propaganda. - It shall be unlawful: xxx (C-A) TOPRODUCE, SHOW OR EXHIBIT FULL-LENGTH FILMS OR MOVIES OR BROADCAST OF RADIO PROGRAMS THAT FEATURES OR GLORIFIES THE LIFE OF A CANDIDATE.\""

