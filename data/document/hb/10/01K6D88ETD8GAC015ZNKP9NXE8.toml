congress_website_title = "AN ACT AUTHORIZING THE PAYMENT IN FULL OF RETIREMENT BENEFITS OF OFFICIALS AND EMPLOYEES WHO ARE ELIGIBLE TO RETIRE UNDER EXISTING RETIREMENT LAWS AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares that any public official or employee who is eligible to retire under any existing retirement law shall be paid in full his retirement benefits. > Those with pending administrative and/or criminal case against him shall be paid 50% of his retirement benefits for his sustenance in his old age; the balance (50%) shall be deposited with a government depository bank in the name of the retiree."

