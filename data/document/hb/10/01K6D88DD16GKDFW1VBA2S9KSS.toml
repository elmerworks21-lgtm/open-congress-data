congress_website_title = "AN ACT AMENDING SECTION 9 OF REPUBLIC ACT NUMBERED THIRTY HUNDRED AND NINETEEN, AS AMENDED, ENTITLED 'ANTI-GRAFT AND CORRUPT PRACTICES ACT'"
congress_website_abstract = "States that:\"(C) PERSONS, SUCH AS, BUT NOT LIMITED TO, IMMEDIATE FAMILY MEMBERS OF LEGAL AGE, WHO BENEFIT FROM THE UNLAWFUL ACTS OR OMISSIONS OF A PUBLIC OFFICER SHALL BE PUNISHED WITH IMPRISONMENT FOR NOT LESS THAN SIX (6) MONTHS NOR MORE THAN FIVE(5) YEARS AND FORFEITURE IN FAVOR OF THE GOVERNMENT WHATEVER PROCEEDS DERIVED FROM SUCH UNLAWFUL ACT.\""

