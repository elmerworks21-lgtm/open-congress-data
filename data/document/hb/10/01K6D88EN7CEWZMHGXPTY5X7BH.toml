congress_website_title = "AN ACT PROHIBITING LOCAL OFFICIALS FROM CLAIMING TRAVEL EXPENSES AND ALLOWANCES WHEN ATTENDING COURT HEARINGS OR LITIGATION RELATED ACTIVITIES OUTSIDE OF HIS JURISDICTION EXCEPT WHEN REPRESENTING THE PROVINCE, CITY OR MUNICIPALITY IN HIS CAPACITY ASTHE LOCAL CHIEF EXECUTIVE, AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Declares it UNLAWFUL for the following local officials to CLAIM travel expenses and/or allowances when attending court hearings or litigation - related activities outside of his jurisdiction, EXCEPT when representing the province, city or municipality: (1) Provincial Governor; (2) Municipal and (3) city mayors. Penalizes the official found guilty of violating this Act."

