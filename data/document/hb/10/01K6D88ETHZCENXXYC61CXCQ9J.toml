congress_website_title = "AN ACT PROVIDING INSURANCE COVERAGE TO PUBLIC SCHOOL TEACHERS WHO RENDER ELECTORAL SERVICES DURING REGISTRATION AND ELECTION DAYS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Declares the following --- \"SECTION 1. All public schoolteachers who render services during registration and election days shall be provided life, disability and accident insurance benefits.\" \"SECTION 2. The Commission on Election shall promulgate the rules and regulations to implement Section 1 hereof which may provide for individual or group insurance. This benefit shall be granted in addition to any other insurance benefits to which public schoolteachers are now entitled.\""

