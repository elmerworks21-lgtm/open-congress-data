congress_website_title = "AN ACT TO RATIONALIZE THE TEACHING OF RELIGION IN THE PUBLIC SCHOOL"
congress_website_abstract = "Defines the term \"Optional Religous Instruction\" as used in this Act. States that parents or guardians have the option to request to have their children instructed in the religion of their choice. Provides for the following: (1) designation of religious teachers/instru ctors; (2) written request and duly accomplished application by parent or guardian; and (3) size, schedule and duration of religion classes."

