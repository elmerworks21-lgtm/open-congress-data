congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A FREEDOM PARK IN ALL CITIES AND MUNICIPALITIES OF THE COUNTRY, IMPOSING PENALTIES FOR ANY DISRUPTION OF THE ACTIVITIES THEREIN, AND PROVIDING FUNDS THEREFOR"
