congress_website_title = "AN ACT AMENDING SECTION 4(B) OF REPUBLIC ACT NO. 6727, OTHERWISE KNOWN AS THE 'WAGE RATIONALIZATION ACT', PROVIDING FOR ALTERNATIVE MECHANISMS FOR WAGE FIXING IN PRIVATE EDUCATIONAL INSTITUTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Applies ONLY to nonstock, nonprofit private higher educational institutions or foundations; defines clearly the NATURE AND CHARACTER of educational institutions. Provides, therefore, for these concerns: (1) vulnerability of educational institutionsto labor-related problems; (2) exemption from the coverage of the Wage Rationalization Act regarding the provision on the P25.00 increase; (3) Task Force on private educational institutions welfare."

