congress_website_title = "AN ACT REGULATING THE PRACTICE OF FOOD TECHNOLOGY IN THE PHILIPPINES"
congress_website_abstract = "Rationale: \"Food and Safety\" is already a worldwide requirement. Without guarantees towards this end, there will be dificulties in achieving global competitiveness . Professionally trained and \"licensed\" Food Technologists can be a major force in safe-guarding product safety through proper implementation of the HACCP (Hazard Analysis and Critical Control Point) which is now becoming a requirement in international food factories. Proposes the creation of a BOARD OF EAMINERS IN FOOD TECHNOLOGY under the Professional Regulation Commission. Provides for other concerns, such as: (1) Qualification, Tenure, Removal, Powers and Duties of the Board; (2) Practice of Food Technology; (3) Board Examination, Qualification of Applicants for Examinationss; (4) Scope of Examinations, etc."
