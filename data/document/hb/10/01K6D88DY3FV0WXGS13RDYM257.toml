congress_website_title = "AN ACT TO REQUIRE HIGH-RISE STRUCTURES OR BUILDINGS OF SEVEN (7) STOREYS OR MORE IN HEIGHT TO INSTALL HELICOPTER LANDING FACILITIES AND OTHER SAFETY DEVICES FOR EMERGENCY AND RESCUE OPERATIONS, PROVIDING PENALTIES FOR VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "Requires high-rsie structures or buildings of seven (7) storeys or more in height to install a heliport on its top and other safety devices for emergency and rescue operations, free from any obstructions such as television antennas, radio networks or other forms of obstructions. No building permit for occupancy shall be issued unless these safety emergency requirements are complied with. Requirements further, that existing high-rise structures or buildings shall comply within seven (7) months from the date of approval of this Act."

