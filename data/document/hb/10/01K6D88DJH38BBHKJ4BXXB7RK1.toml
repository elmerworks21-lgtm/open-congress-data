congress_website_title = "AN ACT PROVIDING PROTECTION FOR JOB APPLICANTS BY RATIONALIZING MEDIA ADVERTISING OF JOB OPENINGS AND PLACEMENTS, PROVIDING PENALTY FOR VIOLATIONS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to remedy the plight of desperate job seekers who are victimized by job recruitment syndicates, specifies certain particulars or information that shall be included in job vacancies advertisements. Vests the Bureau of Local Employment with additional powers and functions relative to the protection of local job seekers; prescribes penalties for violation of any provision of this Act."

