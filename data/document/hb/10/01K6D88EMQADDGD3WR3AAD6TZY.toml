congress_website_title = "AN ACT EXTENDING THE DUTY-FREE SHOPPING PRIVILEGES OF OVERSEAS CONTRACT WORKERS FROM ONE THOUSAND DOLLARS ($1,000.00) TO TWO THOUSAND DOLLARS ($2,0000.00) ANNUALLY WHICH MAY BE AVAILED OF EVEN PRIOR TO THE ARRIVAL OF THE WORKERS IN THE PHILIPPINES"
congress_website_abstract = "Rationale: There is a social cost borne by Filipino families who must reluctantly send off their loved ones in search of greener pastures abroad. It is the government's job to help minimize this social cost. As it is, the present duty-free privilege scheme allows the OCWs to avail of the privilege only upon their return to the Philippines, normally after two years' stint. It is proposed that the said privilege be made available to them even prior to their return. Small as it is, this proposal is one way of minimizing the social cost for it helps raise the self-esteem of the Overseas Contract Workers' (OCWs)."

