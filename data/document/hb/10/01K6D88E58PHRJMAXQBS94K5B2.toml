congress_website_title = "AN ACT PROVIDING FOR THE TERMS, CONDITIONS AND LICENSING REQUIREMENTS FOR MULTINATIONAL COMPANIES OPERATING REGIONAL OR AREA HEADQUARTERS OR REGIONAL WAREHOUSES BUT NOT DOING BUSINESS IN THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Limits the number of incentives provided to multi-national companies establishing regional or area headquaters and regional warehouses, but will do business in the Philippines. Such offices merely serve as supply depot of raw materials for their affiliates in the Asia-Pacific Region."
