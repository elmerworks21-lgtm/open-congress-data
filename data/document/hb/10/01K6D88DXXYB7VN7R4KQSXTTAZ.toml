congress_website_title = "AN ACT APPROPRIATING FUNDS FOR THE OPERATION OF THE GOVERNMENT OF THE REPUBLIC OF THE PHILIPPINES FROM JANUARY ONE TO DECEMBER THIRTY-ONE, NINETEEN HUNDRED AND NINETY-SIX, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes the goverment expenditures program for 1996. Contains the following significant features and innovations: (1) Compensation adjustments and incentives; (2) Increased assistance to local government units; (3) Establishment of the ORGANIZATIONAL ADJUSTMENT FUND to cover the oprational requirements of NEW organizations or units; (4) Retirement and separation benefits; and (5) Validity of unutilized Maintenance and Other Operating Expenses (MOOE)."
