congress_website_title = "AN ACT ESTABLISHING THE NATIONAL SERVICE TRAINING PROGRAM (NSTP) FOR ALL HIGHER EDUCATIONAL INSTITUTIONS"
congress_website_abstract = "Seeks to create the NATIONAL SERVICE TRAINING PROGRAM (NSTP) as a substitute to the ROTC. Shall cover all able-bodied citiznes, male and female, enrolled in the initial baccalaureate degree courses; prescribes three (3) service components, namely --- (1) military training service; (2) civic welfare service; and (3) law enforcement service."

