congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF PRESIDENTIAL DECREE NUMBERED FOUR HUNDRED AND FORTY-TWO (PD 442), AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Declares that effective upon approval of this Act, no person or entity, other than the public employment offices, THE PHILIPPINE OVERSEAS EMPLOYMENT ADMINISTRATION AND DULY LICENSED PRIVATE RECRUITMENT ENTITIES shall engage in the recruitment and placement of workers. Proposes a NEW section to be added to the Labor Code and to be titled CANCELLATION OF LICENSE OR AUTHORITY, stating thereat the grounds for cancelling a license to recruit."

