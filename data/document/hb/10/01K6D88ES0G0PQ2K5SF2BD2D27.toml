congress_website_title = "AN ACT REDUCING THE FINAL TAX ON ROYALTIES RECEIVED BY LOCAL BOOK AUTHORS FROM THE PRESENT TWENTY PERCENT (20%) TO TEN PERCENT (10%), AMENDING FOR THE PURPOSE SUBPARAGRAPH (1), PARAGRAPH (C), SECTION 21 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Royalties on books are taxed at the same rate as other kinds of royalties, such as those for the use or lease of antural resources, patents, manufacturing formulas, industrial or commercial equipment of knowledge, foreign technology, andothers. > If enacted into law, this proposal would encourage and give impetus to present and future writers to write books, and eventually would bring about the publication of more titles, thus ensuring the flourishing of the book publishing industryand materially in the family of nations."

