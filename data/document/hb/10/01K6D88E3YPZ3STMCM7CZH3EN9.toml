congress_website_title = "AN ACT RATIONALIZING THE DISPOSITION OF THE PROCEEDS OF THE BASIC REAL PROPERTY TAX, INCLUDING INTEREST THEREON, AND PROCEEDS FROM THE USE, LEASE OR DISPOSITION, SALE OR REDEMPTION OF PROPERTY ACQUIRED AT A PUBLIC AUCTION, BY AMENDING FOR THE PURPOSE SECTION 271, OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
