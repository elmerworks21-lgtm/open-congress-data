congress_website_title = "AN ACT PROHIBITING OFFICERS AND EMPLOYEES OF THE CIVIL SERVICE INCLUDING MMEMBERS OF THE ARMED FORCES OF THE PHILIPPINES FROM ENGAGING IN PARTISAN POLITICAL ACTIVITIES AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides these salient features --- (1) Defines the holding of any psoition in any political party while in public office as an act constituting engagement in aprtisan political activities; (2) Requires officers and employees of the Civil Service, including members of the AFP, to resign from any position in any political party after the effectivity of this act. Likewise, any person joining the civil service or the Armed Forces of the Philippines is required to resign from any position in any political party before assuming public office; and (3) Penalizes failure to comply with the above-mentioned prohibition with dismissal from service or disqualificatio n from holding public office as the case may be."
