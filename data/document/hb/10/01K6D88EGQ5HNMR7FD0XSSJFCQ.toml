congress_website_title = "AN ACT DECLARING A NATIONAL ENVIRONMENT DAY"
congress_website_abstract = "Rationale: \"Considering the present state of our environment, to be effective and meaningful, efforts to rescue our environment from its present degradation should be massive and sustained. The mandate to care for our enviroment should not only be compulsory. It should also contain incentives.\" Declares the LAST SATURDAY of every month of the year as \"Environment Day.\" Prescribes the activities to be underaken in this day"

