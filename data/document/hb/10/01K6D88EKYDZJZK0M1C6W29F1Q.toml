congress_website_title = "AN ACT AMENDING ARTICLE 280 OF THE LABOR CODE BY LIMITING THE NUMBER OF CASUAL AND CONTRACTUAL EMPLOYEES TO NOT MORE THAN 10 PERCENT OF THE EXISTING PERMANENT EMPLOYEES"
congress_website_abstract = "Rationale: \"... there is still the problem of the increasing number of employees who do not enjoy security of tenure ...\" the casual and contractual employees. These are the employees who do NOT enjoy security of tenure and are earning income whichcould barely answeer for their daily needs. The policy of multinational and transnational corporations in hiring a substantial percentage of casual and contractual employees must be rectified so as to CORRECT the IMBALANCE and INEQUITY it creates.\""

