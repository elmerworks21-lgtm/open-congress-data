congress_website_title = "AN ACT EXEMPTING BONUSES, REPRESENTATION AND TRANSPORTATION ALLOWANCES, CASH GIFTS AND TIPS FORM THE COMPUTATION OF INDIVIDUAL INCOME TAX RETURNS"
congress_website_abstract = "Increases the purchasing powers of the compensation of all employees thus making life easier for them in the light of the prevailing economic difficulties. Exempts their bonuses, representation and transportation allowances, cash gifts and tips fromthe computation of their gross incomes as bases for individual income taxation. Does not apply to employees occupying managerial positions, with a monthly compensation of P20,000.00."
