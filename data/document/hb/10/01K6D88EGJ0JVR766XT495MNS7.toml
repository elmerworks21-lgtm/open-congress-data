congress_website_title = "THE SOLAR CONVERSION POWER SYSTEMS ACT OF 1996"
congress_website_abstract = "Aims to --- (1) Facilitate and accelerate the intorudction, development and local manufacture of advanced technology state-of-the-ar t solar conversion power systems; (2) Drastically reduce to a minimum the cost of building and maintaining large solar-oeprated power systems; and (3) Make available the wide-scale use in the country of cost-effective and reliable solar energy by homeowners, schools, hospitals, business, industry and agriculture. Directs the Dept. of Energy to design a program that will implement the objectives of this measure; contains provisions on other areas of concern, such as: (1) Exemptions and benefits for participating in the Program; and (2) Guidelines in formulating the Program."

