congress_website_title = "AN ACT EMPOWERING COOPERATIVES, PEOPLES' ORGANIZATIONS, FOUNDATIONS AND NONGOVERNMENTAL ORGANIZATIONS, AS WELL AS THE BARANGAYS, FOR THE PROMOTION OF ECONOMIC DEVELOPMENT AND SOCIAL JUSTICE AND THE SPEEDY INDUSTRIAL TRANSFORMATION OF THE COUNTRYSIDE"
