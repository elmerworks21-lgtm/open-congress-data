congress_website_title = "AN ACT CREATING THE OFFICE OF ENVIRONMENTAL EDUCATION, DEFINING ITS FUNCTIONS AND RESPONSIBILITIE S, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Environmental Education Act of 1997\" Creates the OFFICE OF ENVIRONMENTAL EDUCATION which shall serve as the primary government agency responsible for the environmnetal education and training of all sectors of society. Mandates said Officeto --- (1) develop and implement a national integrated and comprehensive action plan for environmental education and training; (2) formulate and prescribe an expanded and varied program of curriculum development to include value formationa and behavioral change on environmental concerns and issues for schools, colleges and universities; (3) design and conduct massive information dissemination campaign and environmental education and training programs; and (4) depitize or request the assistance oof appropriate government agencies, local goverment units and non-governmenta l organizations for the purpose of implementing this Act."

