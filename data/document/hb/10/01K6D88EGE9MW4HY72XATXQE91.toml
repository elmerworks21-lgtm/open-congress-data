congress_website_title = "AN ACT EXPANDING THE COVERAGE AND BENEFITS OF THE SOCIAL SECURITY SYSTEM AND INSTITUTING REFORMS THEREIN, FURTHER AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 1161, AS AMENDED, OTHERWISE KNOWN AS THE SOCIAL SECURITY LAW (sss)"
congress_website_abstract = "Seeks to --- (1) expand the SSS coverage; (2) rationalize the social security benefits and contributions structures; (3) broaden investment alternatives; (4) provide stringent sanctions for violations of the SSS LAW; and (5) improve and rationalizethe SSS organization."
