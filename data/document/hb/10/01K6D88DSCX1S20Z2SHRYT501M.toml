congress_website_title = "AN ACT REQUIRING LANDHOLDERS OF SPECIFIC AGRICULTURAL ENTERPRISES OR FARMS SHALL PROVIDE OR ALLOCATE FARMLOTS TO THEIR LANDLESS REGULAR FARMWORKERS"
congress_website_abstract = "Requires landowners of a specific agricultural enterprises of farms to provide or allocate a farmlot of not more than one-half (1/2) hectare to each of their farmworkers in which said farmworkers shall cultivate, plant and grow short-term crops, orraise livestock, poultry, or fish, for the duration of their employment. The total area to be allocated as farmlots shall not exceed ten (10%) percent of the land wherein the agricultural enterprise or farm is located. States that the produce shall be belong to the farmworkers but they shall reimburse whatever amount they have adnaced from the owners to make the farmlot productive."

