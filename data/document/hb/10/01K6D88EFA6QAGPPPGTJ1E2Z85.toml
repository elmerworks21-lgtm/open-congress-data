congress_website_title = "AN ACT ALLOWING POWER CONSUMERS TO REVOKE THE FRANCHISE OF POWER PRODUCERS AND DISTRIBUTORS THROUGH REFERENDUM"
congress_website_abstract = "Seeks to provide a mechanism by which power producers and distributors may be compelled to be reliable and efficient by the threat of revocation of their exclusive franchises through referendum among power consumers. Such a referendum may be held atregular intervals covering a reasonable period of time."

