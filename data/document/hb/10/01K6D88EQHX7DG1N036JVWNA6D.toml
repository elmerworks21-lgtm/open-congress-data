congress_website_title = "AN ACT PROVIDING FOR A MORE GENUINE SECTORAL REPRESENTATION IN THE BOARD OF DIRECTORS OF LOCAL WATER DISTRICTS, REDUCING THEIR REGULAR TERM OF OFFICE, REGULATING THEIR EMOLUMENTS AND IMPOSING PENALTIES FOR VIOLATIONS THEREOF, AMENDING FOR THE PURPOSE PRESIDENTTIAL DECREE NO. 198, AS AMENDED"
congress_website_abstract = "Rationale: It is a matter of public knowledge that the services of local water districts are generally inefficent, inadequate and unreliable. But despite such inefficiency, inadequacy and unreliability, they charge very exorbitant water rates. > Among the causes of their high water rates are the excessive per diems, allowances, bonuses, discretionary funds and other expenses collected by members of the Board of Directors which, consequently, are included in the water rates and passed on to thehelpless consumers. State that ONLY ORGANIZATIONS ASSOCIATIONS OR INSTITUTIONS DULY ACCREDITED BY THE SANGGUNIANG PANLALAWIGAN, SANGGUNIANG PANGLUNGSOD OR SANGGUNIANG BAYAN OF THE LOCALITY CONCERNED SHALL BE ELIGIBLE TO SUBMIT NOMINATIONS FOR MEMBERRS OF THE BOARD OF DIRECTORS OF A DISTRICT. > LIMITS the per diems received by the board members of local water districts, and PROHIBITS other compensation any form or guise. > LIMITS, likewise, the board members' term of office to only THREE (3) yea"

