congress_website_title = "AN ACT STRENGTHENING THE CONSULTATION PROCESS OF TUITION AND OTHER SCHOOL FEE INCREASES IN PRIVATE SCHOOLS, AMENDING FOR THE PURPOSE SECTION 42 OF BATAS PAMBANSA BLG. 232, OTHERWISE KNOWN AS THE EDUCATION ACT OF 1982"
congress_website_abstract = "Seeks to provide a CONSULTATION PROCESS that must be observed by schools intending to increase tuition fees. Provides the phases of this Process, such as: (1) NOTICE; (2) CONSULTATION PERIOD; and (3) MONITORING. Prescribes penalty for violation of this proposed measure."

