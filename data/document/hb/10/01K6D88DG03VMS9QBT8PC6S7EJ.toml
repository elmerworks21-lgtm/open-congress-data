congress_website_title = "AN ACT REQUIRING PROVINCIAL GOVERNORS AND CITY MAYORS TO PUBLISH IN A NEWSPAPER OF GENERAL CIRCULATION WITHIN HIS PROVINCE OR CITY A SUMMARY OF ALL REVENUES, COLLECTIONS, INCOME AND PUBLIC FUNDS RECEIVED BY THE PROVINCE OR CITY DURING THE PRECEDINGCALENDAR YEAR AND A SUMMARY OF ALL DISBURSEMENTS, EXPENDITURES AND UTILIZATION OF SUCH FUNDS FOR THE PERIOD"
congress_website_abstract = "Declares it a policy to provide greater public information about public funds received by provincial and city governments and the utilization of such funds. Requires all provincial governors and city mayors to publish within sixty days from the endof each year in a newspaper of general circulation within the province once a week for two consecutive weeks, a summary of all revenues, collections, income and public funds received by the province or the city furing the preceeding year and all disbursements, expenditures and utilization of said funds."
