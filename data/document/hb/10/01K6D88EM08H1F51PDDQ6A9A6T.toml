congress_website_title = "AN ACT TO AMEND SECTION 47, REPUBLIC ACT NUMBERED SIX THOUSAND NINE HUNDRED AND SEVENTY-FIVE, OTHERWISE KNOWN AS THE PHILIPPINE NATIONAL POLICE LAW, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to provide adequate protection to uniformed members of the PNP accused of grave felonies where the penalty imposed is prision correccional. Proposes to EXEMPT said members FROM preventive suspension PENDING the resolutions of the case filed against them. Proposes this provision: \"PROVIDED, THAT IF THE CASE IS SERVICE-CONNECT ED, THE ACCUSED SHOULD NOT BE SUSPENDED BUT REASSIGNED TO ANY STATION OTHER THAN HIS REGULAR STATION PENDING RESOLUTION OF THE CASE AND SHOULD CONTINUE TO RECEIVE HISSALARY.\""
