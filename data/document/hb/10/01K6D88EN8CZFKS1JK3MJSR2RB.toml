congress_website_title = "AN ACT TO AMEND SUB-SECTION 3, ARTICLE 335 OF THE REVISED PENAL CODE, AND FOR OTHER PURPOSES(WHEN AND HOW RAPE IS COMMITTED)"
congress_website_abstract = "Amends Sub-section 3 Art. 335 of the Revised Penal code to read as follows: \"Article 335. When and how rape is committed. --- Rape is committed by having carnal knowledge of a woman udner any of the following circumstances. >\"1 x x x \" >\"2 x x x \" >\"3. When the woman is under twelve years of age, even though neither of the circumstances mentioned in the two next preceding paragraphs shall be present [.]: PROVIDED, THAT THE WOMAN IS NOT A PROFESSIONAL PROSTITUTE, OTHERWISE THE PARENTS OR ANY PERSON IN CHARGE OR PROMOTES THE SEX ACTIVITIES OF SUCH WOMAN SHALL BE HELD LIABLE FOR RAPE UNDER THIS SUB-SECTION\""

