congress_website_abstract = "Grants the following privileges/ince ntives to disabled persons: (1) A 20% discount from commercial establishments in transportation, services, hotelry, restaurants and recreation centers; (2) A 20% discount on theater, concert halls, carnival, admission fees; (3) Exemption to the individual income taxes; and (4) Free medical and dental services."

