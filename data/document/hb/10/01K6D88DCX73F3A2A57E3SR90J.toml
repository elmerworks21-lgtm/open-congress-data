congress_website_title = "AN ACT PROHIBITING COMMERCIAL LOGGING IN ALL FOREST OR TIMBER LANDS IN THE COUNTRY FOR A PERIOD OF TWENTY-FIVE (25%)YEARS AND PROVIDING PENALTIES IN VIOLATION THEREOF"
congress_website_abstract = "Imposes total commercial logging ban for a period of twenty-five (25) years from the effectivity of this Act in all timber lands in the country. Defines commercial logging as the cutting, felling or destruction of trees from all growth and residualforests for the purpose of selling or otherwise disposing to the cut or felled logs for profit. * * *"
