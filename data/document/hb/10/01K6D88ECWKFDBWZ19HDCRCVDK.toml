congress_website_title = "AN ACT CREATING THE 'NATIONAL ORGANIC FARMING DEVELOPMENT COUNCIL,' PRESCRIBING ITS POWERS AND DUTIES, PROVIDING FUNDS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "States the objectives of the proposed Council, as follows: (a) To promote organic farming throughout the country; (b) To promote and develop the use of organic fertilizers and pesticides; and (c) To promote and develop organic farming as an environment-fri endly and sustainable alternative to the present farming methods that are heavily dependent on chemical fertilizers and pesticides."
