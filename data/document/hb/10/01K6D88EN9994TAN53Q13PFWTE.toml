congress_website_title = "AN ACT TO POSTPONE THE MAY 12, 1997 BARANGAY ELECTIONS AND RESET TO THE SECOND MONDAY OF MAY 1998, TO COINCIDE WITH THE NATIONAL AND LOCAL ELECTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: While there is a legal basis for the holding of the electoral exercise on May 12 this year, there are however compelling reasons justifying its resetting to coincide with the national and local election in May 1998.> The national and local elections in May 1998 are only a year away from May 1997. The five-year gap will mean a saving for the government of some P900 million, which can be better used to alleviate poverty, support livelihood projects, enhance health and social servicesand construct infrastructures ."

