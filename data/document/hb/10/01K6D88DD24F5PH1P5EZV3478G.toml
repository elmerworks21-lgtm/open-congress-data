congress_website_title = "AN ACT AMENDING SECTION 3 OF REPUBLIC ACT NO. 7202, OTHERWISE KNOWN AS THE SUGAR RESTITUTION LAW, INSERTING LETTER C., THERETO, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes the following amendments to RA 7202, or the SUGAR RESTITUTION LAW: \"(C) THE NATIONAL GOVERNMENT, THROUGH THE BUREAU OF TREASURY , SHALL ISSUE IN FAVOR OF THE CONCERNED GOVERNMENT FINANCIAL INSTITUTION (GFI) SPECIAL SERIES TREASURY NOTES EQUAL TO THE AMOUNT OF EXCESS INTEREST PAYMENTS (INTEREST COLLECTED IN EXCESS OF TWELVE PERCENT (12%) PER ANNUM) APPLIED BY THE CONCERNED GFI IN PAYMENT OF THE SUGAR PRODUCERS OTHER SUGAR-RELATED LOANS OUTSTANDING AS OF MARCH 8, 1993\""

