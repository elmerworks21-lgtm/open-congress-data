congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE NATIONAL POLICE SPECIAL REWARD FUND FOR THE IMMEDIATE CAPTURE, PROSECUTION AND CONVICTION OF THE TOP MOST WANTED KIDNAP-FOR-RANS OM LORDS AND DRUG LORDS IN THE COUNTRY, AND APPROPRIATING THE SUM OF TWO HUNDRED MILLION PESOS (P200,000,000.0 0) FOR THE PURPOSE"
congress_website_abstract = "Rationale: Kidnapping and drug trafficking still persist and remain rampant despite the instensified campaign launched by the Philippine National Police (PNP). It is therefore, essential, that in order to effect the capture, prosecution and finally,conviction of the leaders of these crime syndicates, special mechanisms must be put in place.> This bill proposes to create a Special Reward fund to bolster the cooperation and coordination between the citizenry and government law enforcement agencies in the capture, prosecution and conviction of the top most wanted drug lords and kidnap-for-rans on lords. \"Philippine National Police special Reward Fund\" Prescribes the GUIDELINES IN THE ALLOCATION OF FUNDS for this purpose."

