congress_website_title = "AN ACT DEREGULATING CERTAIN PUBLIC SERVICES, AMENDING FOR THE PURPOSE COMMONWEALTH ACT NO. 146, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Introduces certain amendments to the Public Service Law (CA 146, As Amended) and redefines the term \"PUBLIC SERVICE\" to EXCLUDE certain activities from the protection and regulation of the law, namely: (1) EXPRESS SERVICE; (2) SHIPYARD, MARINE RAILWAY, MARINE REPAIR SHOP, WHARF OR DOCK; ICE PLANT; CANAL IRRIGATION SYSTEMS; and PETROLEUM INDUSTRY. * * *"

