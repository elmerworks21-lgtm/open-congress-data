congress_website_title = "AN ACT AUTHORIZING THE ESTABLISHMENT OF A MULTIPURPOSE TRAINING AND ASSISTANCE CENTER IN EVERY LEGISLATIVE DISTRICT OF THE REPUBLIC OF THE PHILIPPINES DIRECTED TOWARDS THE DEVELOPMENT OF SKILLS IN THE UTILIZATION OF INDIGENOUS RAW MATERIALS FOR LIVELIHOOD PURPOSES, AND PROVIDING FOR THE FACILITIES AND APPROPRIATING FUNDS FOR THE MAINTENANCE AND OPERATIONS THEREOF"
