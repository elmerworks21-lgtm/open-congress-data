congress_website_title = "AN ACT REGULATING THE USE OF PROFESSIONAL, ECCLESIASTIC, MILITARY AND POLICE TITLES AND PROVIDING PENALTIES THEREOF"
congress_website_abstract = "\"Anti-Title Usurpation Act of 1996\" Declares the following --- \"SECTION 2. Declaration of Policy - The State shall accord the protection to the title of persons who are accorded special respect by society due to educational attainment or to their position in the hierarchy of their organization. The public should be protected against persons who use titles that they are not entitled to because this may prejudice the public that places trust and respect on these title-holders.\" Penalizes the violation of this Act."

