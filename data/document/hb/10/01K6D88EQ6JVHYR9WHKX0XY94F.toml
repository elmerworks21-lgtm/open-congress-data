congress_website_title = "AN ACT TO PROVIDE FOR A PROGRAM OF MODERNIZATION FOR THE UNIVERSITY OF THE PHILIPPINES"
congress_website_abstract = "Rationale: The current bill is intended to be a companion measure to the revised University Charter. It draws from the vision of UP Plan 2008, the University's strategic plan up ot is first centennial and into the twenty-first century. The UP Modernization Program seeks to provide Congressional support and resources to major areas which the University must develop to keep its lead in and provide support for the Philippine educational system, assure its place in the international system of universities, and enhance its capacity to respond to the major problems of our national life. Prescribes the following components of the Program: (1() Development of More Comprehensive Autonomous Campuses; (2) Expansion of Centers of Excellence; (3) Creeation of Complexes; (4) Expansion and Development of Learning and Resource Centers; (5) Modernization of the Philippine General Hospital; and (6) Administrative System and Governance."

