congress_website_title = "AN ACT TO GRANT CONGRESS THE SOLE PREROGATIVE TO GIVE THE HIGHEST AWARD FOR VALOR IN THE POLICE AND MILITARY SERVICE"
congress_website_abstract = "Rationale: Valor in the preference of duty in the police and military is service is performed in the service of soceity as a whole. Society, therefore, should have the prerogative to recognize outstanding police andd military service. Congress, where the direct representatives of the people are gathered, would be the appropriate institution to evaluate and grant the highest award for valor in the police and military service. States the following --- \"SEC. 1.CONGRESSIONAL MEDAL OF VALOR. The highest award for valor in the police and military service shall be known as the Congressional Medal of Valor and shall be awarded to the deserving by the Congress of the Philippiness.\""

