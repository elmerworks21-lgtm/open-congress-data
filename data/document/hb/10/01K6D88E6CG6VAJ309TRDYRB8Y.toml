congress_website_title = "AN ACT REPLACING QUANTITATIVE IMPORT RESTRICTIONS ON AGRICULTURAL PRODUCTS, EXCEPT RICE, WITH TARIFFS, AND ADOPTING ORDINARY CUSTOMS DUTIES AS THE SOLE MEASURES FOR PROTECTING AGRICULTURAL PRODUCERS, CREATING THE AGRICULTURAL PROTECTION TARIFFICATION FUND, AND PROVIDING FUNDS THEREFOR"
