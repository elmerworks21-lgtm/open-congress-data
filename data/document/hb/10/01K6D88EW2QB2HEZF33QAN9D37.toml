congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF EXECUTIVE ORDER NO. 226, OTHERWISE KNOWN AS THE OMNIBUS INVESTMENTS CODE OF 1987 AND FOR OTHER PURPOSES(RE: CUSTOMS DUTIES AND VAT ON CA PITAL EQUIPMENT)"
congress_website_abstract = "Rationale: Republic Act No. 7918, amending Article 39 of Executive Order No. 226, otherwise known as the Omnibus Investments Code of 1987, provides that importations of capital equipment, machinery and spare parts of enterprises registered with theBoard of Investments after 31 December 1994 are subject to 3% customs duties and 10% value added tax. However, this is set to expire on 31 December 1997. > The present situation wherein the Philippine economy is being affected by the current capital/financi al turmoil in Asia has brought up the cost of operations of industries in the country. Withi this situation and the expiration of the capital equipment incentive, the next few years would see a loss in momentum in the gains made by the counttry in attracting the very much needed investments into Philippine industries. > Seeks to EXTEND the current state of capital equipment incentives as embodied in RA No. 7918 up to December 31, 1999."

