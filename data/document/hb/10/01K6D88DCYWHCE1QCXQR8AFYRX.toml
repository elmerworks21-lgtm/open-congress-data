congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC RETENTION BY LOCAL GOVERNMENT UNITS OF THEIR RESPECTIVE INTERNAL REVENUE ALLOTMENTS ON THE THIRD YEAR OF THE EFFECTIVITY OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND THEREAFTER, AMENDING FOR THIS PURPOSE CHAPTER 1, TITLE THREE, BOOK II THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the automatic retention by the local government units (LGUs) of their respective internal revenue and allotments (IRAs)) on the third year of the effectivity of Republic Act No. 7160, otherwise known as the Local Government Code of 1991. Allows the LGUs to automatically retain their IRAs so that they can promptly disburse much needed funds in order to timely apply them to the pertinent expenditures and purposes. * * *"

