congress_website_title = "AN ACT PRESCRIBING THE CODE OF THE PHILIPPINE HERALDRY AND VEXILLARY (flag)"
congress_website_abstract = "Declares it the policy of the State that utmost reverence and respect should at all times be accorded to the national flag and anthem, as well as to other symbols representing the Philippine government. Prescribes rules, guidelines and standards toaccord fitting respect and affection for the national flag and anthem and the proper use of the national motto, coat-of-arms and other heraldic items and devices."
