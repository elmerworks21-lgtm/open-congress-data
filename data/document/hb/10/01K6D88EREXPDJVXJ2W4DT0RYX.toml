congress_website_title = "AN ACT EXEMPTING PRIVATE EDUCATIONAL INSTITUTIONS FROM CERTAIN TAXES AND DUTIES"
congress_website_abstract = "Rationale: To a large extent, the private educational institutions have assumed an indispensable role in molding the minds and character of the youth in order to prepare them for social, civic and political responsibilitie s. In recognition of theirunique role, the Constitution upholds the importance of the private educational institutions in nation building as a collaborative partner of the State by enabling Congress with the power to legislate measures that will grant them incentives. Applies to all persons or entities engaged in any of the activities of an educational institution , whether organized for profit or not.> Proposes that said institution be EXEMPT from the following taxes: (1) income tax; (2) tax on transfer of property;; (3) VAT and other percentage taxes; (4) documentary stamp tax; (5) real property taxes; (6) capital gains tax; (7) gross receipt taxes; and (8) taxes on interest from bank deposits."

