congress_website_title = "AN ACT WAIVING PENALTY INTEREST AND OTHER SIMILAR CHARGES ON AGRICULTURAL LOANS EXTENDED BY THE DEVELOPMENT BANK OF THE PHILIPPINES (DBP) TO BORROWERS RESIDING IN PLACES DECLARED AS CALAMITY AREAS, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NO. 81, OTHERWISE KNOWN AS \"THE 1986 REVISED CHARTER OF THE DEVELOPMENT BANK OF THE PHILIPPINES"
congress_website_abstract = "Rationale: This bill wants to make an exception: That in cases of calamities such as typhoons, floods, earthquakes, and others, penalty interest and other similar charges should be waived by the DBP. It is, likewise, a fact that after these calamities, borrowers have a hard time meeting their financial obligations. These financial obligations continue to accumulate once they default in the payment thereof because of penalty interest and other similar charges. Eventually, the failure to settle these financial obligations results in foreclosure. Thus, borrowers of agricultural loans, particularly farmers or farmers' cooperatives end up losing ownership of properties they used as collaterals or securities for the purpose."

