congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF EXECUTIVE ORDER NUMBERED TWO HUNDRED FORTY-FIVE, ENTITLED 'IMPLEMENTING THE CONSOLIDATION OF ALL TOBACCO AGENCIES AND THE CREATION OF THE NATIONAL TOBACCO ADMINISTRATION, PRESCRIBING ITS CHARTER AND FOR OTHER PURPOSES (245)"
congress_website_abstract = "Authorizes the National Tobacco Administration (NTA) to purchase tobacco, a ower vested in the Philippine Virginia Tobacco Administration (PVTA) pursuant to Executive Order No. 245, to ensure that the prices of tobacco products be maintained at a reasonable level to preclude the possibility that said prices be manipualted by unscrupulous businessmen. Mandates the NTA to provide the tobacco farmers an opportunity to diversity their agricultural products by introducing high value crops that wouldreduce their economic dependence on tobacco in view of the worldwide decline in the use of tobacco products."

