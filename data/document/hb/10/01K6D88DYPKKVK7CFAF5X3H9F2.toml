congress_website_title = "AN ACT PROVIDING FOR A MINIMUM WAGE TO APPRENTICES WHO HAVE SERVED THIRTY (30) DAYS, AMENDING FOR THIS PURPOSE ARTICLE 61 OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Provides that: (1) the apprentice, after serving for the period of thrity (30) days shall be entitled to legal minimum wage; (2) after ninety (90) days shall be entitled to legal minimum wage, including full cost of living allowance and such oatherprivileges as provided under existing laws; (3) after six months, the apprentice shall be considered as a permanent employee."

