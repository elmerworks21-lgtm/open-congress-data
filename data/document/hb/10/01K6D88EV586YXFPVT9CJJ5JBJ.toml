congress_website_title = "AN ACT PROVIDING FOR THE MANNER AND DATE OF ELECTION OF SECTORAL REPRESENTATIVES TO THE LOCAL SANGGUNIANS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Contains salient features, such as : (1) Sectoral representatives in the Sangguniang Panglungsod and Sangguniang Bayan shall be composed of one (1) representative each from the women and workers sector and one (1) from any of the following sectors:urban poor, indigenous cultural communities, disabled persons, or any other sector as may be determined by the sangguniang concerned; (2) Sectoral representatives in the Sangguniang Bayan and Sangguniang Panlungsod shall be elected at large; (3) A registered sectoral organization must file every election a manifestation of its desire to participate in the election for sectoral representatives in the local sanggunian; (4) No certificate of candidacy shall be accepted or given due course withoutt a certificate of nomination; (5) Every voter is entitled to one vote for a candidate of only one sector he wants represented in the Sangguniang Bayan or Sangguniang Panlungsod; and (6) If a permanent vacancy occurs in the Sangguniang Bayan or Sangg"
