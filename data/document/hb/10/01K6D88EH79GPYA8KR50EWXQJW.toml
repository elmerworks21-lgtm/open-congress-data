congress_website_abstract = "Rationale: The bill goes a step further than these laws by giving the disabled more opportunities to be part of the labor workforce, uplifting their dignity and morale by letting them bring in their own contributions to the community. Since governent has, time and again, expressed its commitment to support the disabled, it is but proper and fitting that it start with its various instrumentaliti es thereof. Thus, the passage of this bill is earnestly sought to effect the government and the legislative's commitment to the sector. >Defines \"VENDING FACILITY\" as any automatic vending machine and other appropriate auxiliary equipment necessary for the sale of food or beverages and other articles or services dispersed automatically or manually.Provides for areas of concern, such as: (1) Designation of and function of licensing agency; (2) Operation of vending facilities; (3) Issuance of license; (4) Exceptions, etc."

