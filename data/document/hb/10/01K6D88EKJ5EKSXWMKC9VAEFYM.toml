congress_website_title = "AN ACT MANDATING THE COLLECTION OF ALL RECORDS AND DOCUMENTS IN ALL GOVERNMENT OFFICES AND PRIVATE COLLECTIONS WHICH MAY HAVE A BEARING ON THE ASSASSINATION OF FORMER SENATOR BENIGNO AQUINO, JR. AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Benigno Aquino, Jr. Assassination Records and Documents Collection Act of 1997\" Declares it the policy of the State to collate and preserve all historical records and documents pertaining to the martydom of the late Senator Benigno Aquino, Jr., inline with the principle of government transparency and the right of the people to know. Directs the Director of the National Historical Institute to collate and preserve such records and documents."

