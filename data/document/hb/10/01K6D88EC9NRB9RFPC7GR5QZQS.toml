congress_website_title = "AN ACT GRANTING A TAX CREDIT OF TWENTY THOUSAND PESOS (P20,000.00) TO ALL TAXPAYERS, AMENDING FOR THE PURPOSE SECTION 21(a) OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "Is explained by the following --- (1) Currect wages cannot cope with rising daily cost of living; (2) Will complement government's efforts to implement nonwage and noninflationary measures which will not trigger employment nor increase labor costs.(3) Will challenge the BIR to increase its tax collection efficiency and look for alternative sources of revenue."
