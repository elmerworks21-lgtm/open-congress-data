congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION AND CONSERVATION OF ENDANGERED AND THREATENED SPECIES OF FISH, WILDLIFE AND PLANTS OF THE PHILIPPINES, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "\"Philippine Endangered Species Act of 1997\" Recommends the designation of particular species as either endagered or threatened based on scientific and commercial data available to the DENR Secretary. The following factors or conditions shall be considered: (1) The present or threatened destruction, modification or curtailment of its habitat or range; (2) over utilization for commercial, sporting, scientific or educational purposes; (4) inadequacy of existing regulatory mechanisms; and (5) othernatural or mammal factors affecting their continued existence. Penalizes violation of this Act."

