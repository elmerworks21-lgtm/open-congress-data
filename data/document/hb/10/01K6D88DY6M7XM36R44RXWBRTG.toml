congress_website_title = "AN ACT REGULATING THE SHOWING OF ARTIFICIAL BIRTH CONTROL ADVERTISEMENTS IN THE TELEVISION, AND PROVIDING PENALTIES THEREOF"
congress_website_abstract = "Seeks to PROHIBIT the showing of advertisements on artificial birth control on the television until ten o'clock in the evening. Penalizes any television station which shows artifical birth control advertisements with the following: (a) first offense, fine of not less than FIFTY THOUSAND (P50,000.00); (b) second offense, fine of SEVENTY THOUSAND (P70,000.00) PESOS AND THE SUSPENSION OF LICENSE OR PERMIT FOR THRITY (30) DAYS; (c) third offese, fine of ONE HUNDRED THOUSAND (P100,000.00) PESOS ANDCANCELLATION OF LICENSE OR PERMIT."

