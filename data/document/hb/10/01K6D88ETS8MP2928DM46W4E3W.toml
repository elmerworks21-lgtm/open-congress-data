congress_website_title = "AN ACT PROVIDING FOR THE MECHANISM TO AMEND THE CONSTITUTION THROUGH PEOPLE'S INITIATIVE, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-SEVEN HUNDRED AND THIRTY-FIVE, OTHERWISE KNOWN AS THE INITIATIVE AND REFERENDUM ACT"
congress_website_abstract = "Proposes a NEW subtitle after Section 7 of RA 6735, which shall read as \"INITIATIVE ON THE CONSTITUTION.\" This provision discusses (1) Commencement of the Initiative; (2) Determination of the Sufficiency of the Petition; (3) Appeal to the Supreme Court on the Decision of the Commission; and (4) Effectivity of the Constitutional Amendments."

