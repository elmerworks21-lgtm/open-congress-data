congress_website_title = "AN ACT EXEMPTING FILIPINO STAGE/MUSICAL PRODUCTIONS FROM THE COVERAGE OF AMUSEMENT TAX, AMENDING FOR THE PURPOSE SECTION 140 OF THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: The State should give the needed support if there is to be a cultural renaissance in the country. In the celebration of the Centennial of the Philippine Independence, cultural revival must be the first and foremost agenda to showcase Filipino talents and their ingenuity. As it is, Filipino talents are all over the world. They have brought honor and prestige to theater and musical competitions without support from government."

