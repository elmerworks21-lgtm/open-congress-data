congress_website_title = "AN ACT INCREASING THE MINIMUM WAGE OF HOUSEHELPERS, AMENDING FOR THE PURPOSE THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Rationale: Housemaids are the workhorse of the families. They are at the back and call of each member of the family every minute of the day, 24 hours a day. Hence, unlike blue and white collar workers, they are not only work eight (8) hours a day but more, toiling up to the late hours of the night and waking up early the next morning. > If only for their honesty and loyalty, househelpers deserve to be accorded incentives not only by their employers but by operation of law. Proposes the following minimum wages for househelpers: (see abstract #62)."

