congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC DISMISSAL OF DORMANT COURT CASES"
congress_website_abstract = "Defines \"DORMANT CASES\" for purpose of this Act; covers Municipal Trial Courts, Municipal Circuit Trial Courts, the Regional Trial Courts and the Court of Appeal. Declares that Courts shall automatically dismiss dormant cases without need of a motion immediately upon the lapse of the six-month period as provided in this Act."

