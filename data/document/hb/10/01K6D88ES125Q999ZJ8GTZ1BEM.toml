congress_website_title = "AN ACT MAKING THE POSITION OF MUNICIPAL/CITY AGRICULTURAL OFFICERS MANDATORY AND FIXING THE COMPENSATION THEREOF"
congress_website_abstract = "Rationale: Section 482 of the Local Government Code has institutionaliz ed the position of the MUNICIPAL OR CITY AGRICULTURIST as a mechanism for the delivery of the afore-mentioned services. In particular, the agriculturist formulates and implements agricultural programs, provides technical assistance, conducts research, promotes agricultural productivity and makes recommendations to the sanggunian on all matters relating to agriculture and aqua-culture. > However, despite the important roleof the municipal/city agriculturist , the Code has only made the said position optional, thereby rendering the delivery of devolved services uncertain. Declares, therefore, the following --- \"Section 1. The position of municipal/city agricultural offficer shall be mandatory in every municipality or city as the case may be with a salary scale of Grade 24.\""

