congress_website_title = "AN ACT CREATING THE TRADITIONAL AND ALTERNATIVE HEALTH CARE INSTITUTE TO ACCELERATE THE DEVELOPMENT OF TRADITIONAL AND ALTERNATIVE HEALTH CARE IN THE PHILIPPINES, PROVIDING FOR A TRADITIONAL AND ALTERNATIVE HEALTH CARE DEVELOPMENT FUND, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It is about time for us to explore the potentials of our health care resources. Some 7,000 speccies of medicinal plants await scientific investigation of their therapeutic value. Developing traditional and alternative medicine will produce low-cost, effective and affordable supplements to the existing health care system. Using indigenous skills and materials will aslo enhance cultural acceptability leadding to wider utilization of these health care modalities. Even the World Health Organization (WHO) recognizes the importance of traditional healing methods, particularly among developing countries.\" \"Traditional and alternative Health Care Development Act of 1996\" Aims to --- (1) encourage scientific research on the development oof traditional and alternative health care systems, especially those addressing preventive care and with direct impact on public health; (2) promote and advocate the use of traditional and alterantive health care modalities that have been proven safe"
