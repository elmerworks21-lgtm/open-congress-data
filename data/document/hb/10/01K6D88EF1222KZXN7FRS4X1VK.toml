congress_website_title = "AN ACT PROHIBITING THE ARREST OF ANY PERSON BY VIRTUE OF A WARRANT DURING WEEKENDS AND HOLIDAYS, EXCEPT IN CERTAIN INSTANCES, PRESCRIBING PENALTIES FOR VIOLATION THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides that --- \"SECTION 1. No person shall be arrested by virtue of a warrant during weekends and holidays except when the person to be arrested; (a) Is charged with an offense punishable by reclusion perpetua to death; (b) Has eluded arrest andis being pursued; or (3) Is about to leave the country and any delay will imperil the arrest."

