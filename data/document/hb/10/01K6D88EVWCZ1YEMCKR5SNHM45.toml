congress_website_title = "AN ACT ADDRESSING THE SPECIAL EDUCATIONAL NEEDS OF SPECIAL CHILDREN AND ADULTS"
congress_website_abstract = "Rationale: The need to come up with an additional alternative form of education for the disabled is a living reality that can no longer be disregarded. In the present \"internet age,\" the potential of the disabled children and adults should be tapped; and for that reason it is envisioned that they should contribute specifically to the computer industry, in general to the overall development of the country. \"The Law on Special Education\" (SPED) > Is premised on the following State policy: \"Section 2. x x x (b) x x x (c) the State encourages the formation of private institutions that will directly address the needs of the special children, it shall be mandatory on the part of the State to provide in each legislative district, a particular plaace that will be devoted exclusively entirely for the \"encouragement of informal and/or indigenous learning system,\" that will directly attend to a particular handicap of persons.\""

