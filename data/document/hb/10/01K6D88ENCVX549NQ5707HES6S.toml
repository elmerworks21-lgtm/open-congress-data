congress_website_title = "AN ACT EXEMPTING ALL FUNDS EARMARKED/RESER VED BY BANKS FOR AGRI-AGRA PURPOSES UNDER SECTION 3, PRESIDENTIAL DECREE NO. 717, FROM PAYMENT OF DOCUMENTARY STAMP TAX AND CAPITAL GAINS TAX"
congress_website_abstract = "Rationale: The high rates of taxes that will be imposed or the farmers' TREASURY CROP CERTIFICATES (as provided for in HB 7244) - P1.50 ro P2.00 face value; 35% for corporate issuers and from 3% to 30% for individual on short-and long-term eligiblepapers --- \"will nullify all the good things\" intended for them. Provides, therefore, for the following --- \"Section 1. All funds earmarked/reser ved by all banking institutions whether government or private for agri-agra purposes under Section 3, Presidential Decree No. 717, shall be exempted from the payment of documentary stamp tax and capital gains tax.\""

