congress_website_title = "AN ACT AMENDING SECTION ONE HUNDRED EIGHTEEN OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, BY DELETING THE SECOND PARAGRAPH THEREOF, IN EFFECT REPEALING PRESIDENTIAL DECREE NO. 1705"
congress_website_abstract = "Considers as \"repressive\" the provision in the National Internal Revenue Code which states that \"If a bank has knowledge of the death of a person who maintained a bank deposit account alone, or jointly with another, it shall not allow any withdrawal for the said deposit account UNLESS the Commissioner has certified that the taxes imposed thereon have been paid...\" Proposes, therefore, to DELETE the foregoing provision."

