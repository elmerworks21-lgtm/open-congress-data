congress_website_title = "AN ACT PROVIDING FOR THE MODERNIZATION OF THE PHILIPPINE NATIONAL POLICE, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"PNP Moernization Act of 1996\" States the objectives of the PNP MODERNIZATION PROGRAMS as follows: (1) To enhance police capability in professionalize d law enforcement, scientific detection, prevention and investigation of crimes; (2) To develop PNP capability in disaster preparedness, human and ecological security; and (3) To develop PNP capability to support national development."
