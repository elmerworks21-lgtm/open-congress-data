congress_website_title = "AN ACT DECLARING A TEN-YEAR MORATORIUM ON THE GATHERING OF EDIBLE BIRDS' NEST, PROVIDING A PENALTY THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares a MORATORIUM for a period of ten (10) years on the gathering, taking, collecting and destroying of the nests or \"Collocalia Troglodytes\" or swiflets. PROHIBITS, likewise, all catching, hunting, injuring, taking, possessing and/or killing ofsaid swiflets, as well as the act of driving them away from their natural habitats. Penalizes the violation of this proposed measure."

