congress_website_title = "AN ACT PROVIDING INCENTIVES TO PRIVATE SCHOOLS, COLLEGES AND UNIVERSITIES AND OTHER TERTIARY LEVEL SCHOOLS IN LIEU OF TUITION FEE INCREASES AMENDING FOR THE PURPOSE SECTION 41 OF BATAS PAMBANSA BLG. 232, OTHERWISE KNOWN AS THE EDUCATION ACT OF 1982"
