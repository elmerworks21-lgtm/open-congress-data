congress_website_title = "AN ACT CREATING THE OVERSEAS FILIPINO WORKERS PENSION FUND AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Creating a pension fund for retired Filipino overseas workers is in accordance with the protection to labor clause of the Constitution. Under Section 18, Article II thereof, it states that \"the State affirms labor as a primary social economic force. It shall protect the rights of workers and promote their welfare.\" Hences approval of this bill is highly recommended. \"Overseas Filipino Workers Pension Fund Act of 1997\" applies to all overseas Filipino contract workers who are duly registered with the POEA and the Commission on Filipino Overseas (CFO). Mandates the same to remit FIVE PERCENT (5%) of their gross monthly income to the Fund for five (5) years."

