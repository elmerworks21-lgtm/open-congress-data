congress_website_title = "THE MAGNA CARTA FOR SENIOR CITIZENS"
congress_website_abstract = "\"Magna Carta for Senior Citizens\" Applies to all elderly resident citizens of the Philippines, aged 60 years and above. Contains significant provision on: (1) Rights and Privileges of Senior Citizens; (2) Prohibition or Discrimination Against SeniorCitizens; (3) Creation of a NATIONAL COUNCIL FOR THE WELFARE OF SENIOR CITIZENS. Provides penalty for violation of this Act."

