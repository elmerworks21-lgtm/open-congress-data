congress_website_title = "AN ACT PROVIDING FOR THE SALARY EQUALIZATION OF PUBLIC ELEMENTARY AND SECONDARY SCHOOL PRINCIPALS"
congress_website_abstract = "Declares it the policy of the State to REMOVE disparities in the compensation of workers performing comparable function in the government service. Proposes the following --- \"SEC. 4. Salary Adjustment of Elementary School Principals - The salaries of elementary public school principals are hereby adjsuted to be at par with the salaries of secondary public school principals as follows: ESPI (SG 18) - P7,370 per month or P88,440 per annum; ESPI (SG 19) - P7,899 per month or P94,788 per annum; ESPI (SG 20) - P8,489 per month or P101,976 per annum. >All future salary adjustments for public elementary and high school principals shall be made consistent with the policy of equal pay for public school principals of both levels."

