congress_website_title = "AN ACT TO PROMOTE EXPLORATION, DISCOVERY AND PRODUCTION OF INDIGENOUS OIL AND GAS"
congress_website_abstract = "\"Oil and Gas Act of 1995\" Seeks to institutionaliz e improved fiscal incenties and provides for a mechanism for the development of local expertise in the oil exploration, development and production. Aims to (1) strengthen the control and supervisionof the State over petroleum operations; (2) establish a framework for natural gas development; (3) provide new and clear incentives for the development of the private Filipino-owned petroleum exploration companies to encourage a more active participation; (4) provide new incentives to foreign petroleum exploration companies, etc."

