congress_website_title = "AN ACT GRANTING FRANKING PRIVILEGE TO THE OFFICE OF THE PUNONG BARANGAY AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to grant franking privilege to the Office of the Punong Barangay on all OFFICIAL communications in order to provide a prompt and immediate response to the needs of the barangays and their residents. Provides that all mails of the Office shallbe given priority by post offices and mail distribution centers."

