congress_website_title = "AN ACT REQUIRING ALL FOREIGNERS TO PRESENT PROOFS OR CERTIFICATES THAT THEY ARE HIV/AIDS NEGATIVE UPON ENTRY TO THE COUNTRY OR IN THE ABSENCE THEREOF TO SUBMIT THEMSELVES TO HIV/AIDS-TESTIN G SO AS TO CONTROL THE SPREAD OF THE AIDS EPIDEMIC IN THE COUNTRY"
congress_website_abstract = "Applies to any foreigner, whether holding a tourist, immigrant or other visa, whether male or female, child or adult, and whether he intends to stay in the country on a temporary or permanent basis; DOES NOT APPLY, however to members of athe diplomatic corps, international organizations and such other foreigners who may be given special privilege by the Department of Foreign Affairs."

