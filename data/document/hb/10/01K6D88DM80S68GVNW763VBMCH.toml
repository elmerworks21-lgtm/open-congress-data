congress_website_title = "AN ACT ESTABLISHING THE PRE-NEED PLAN SECURITIES CODE"
congress_website_abstract = "\"The Pre-Need Plan Securities Code\" Establishes the rules and requirements as regards the organization, regulation, supervision and implementation of the pre-need plan securities program. Clarifies that pre-need plans are securities and not insurance contracts. Mandates the publication of the TRUST FUND ANNUAL VALUATION REPORT for every pre-need plan as approved by the Securities and Exchnage Commission to strengthen the protection of the public."
