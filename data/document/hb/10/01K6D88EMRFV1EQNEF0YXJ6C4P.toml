congress_website_title = "AN ACT REQUIRING THE USE OF SEAT BELTS IN ALL PRIVATE CARS AND TAXICABS AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Rationale: Research shows that in almost all vehicular accidents, NONUSE OF SEAT BELTS resulted in multiple fractures and severe injuries, and even death to car passengers. Penalizes violation as follows: 1st offense - P300,00 fine; 2nd offense - Confiscation of driver's license and/or P500.00 fine; 3rd offense - six (6) months to one (1) year imprisonment or P1,000.00 to P5,000.00 fine."

