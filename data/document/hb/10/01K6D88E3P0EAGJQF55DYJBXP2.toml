congress_website_title = "AN ACT PROHIBITING THE EXPORTATION OF TROPICAL AND ORNAMENTAL FISHES FOR A MINIMUM OF TEN YEARS UP TO A MAXIMUM OF TWENTY-FIVE YEARS, TO CONDUCT RESEARCH STUDIES FOR ALTERNATIVE FISHING METHODS OF CATCHING TROPICAL AND ORNAMENTAL FISHES FOR THE CONSERVATION OF THE MARINE ECOSYSTEMS IN THE PHILIPPINES, AND TO IMPLEMENT PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "PROHIBITS the exportation of tropical and ornamental fishes to all destination countries in order to cosnerve and preserve the corral reefs within the achipelagic waters of the Philippines. The prohibition period shall be on a MINIMUM of ten (10) years, to a MAXIMUM of 25 years."
