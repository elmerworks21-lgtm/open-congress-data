congress_website_title = "AN ACT TO AMEND REPUBLIC ACT NUMBERED 6770, ENTITLED 'AN ACT PROVIDING FOR THE FUNCTIONAL AND STRUCTURAL ORGANIZATION OF THE OFFICE OF THE OMBUDSMAN, AND FOR OTHER PURPOSES'"
congress_website_abstract = "Is based on the observation that some retired municipal treasurers, teachers and other public officers and employees who have rendered public service practically all throughout their adult life are UNABLE to obtain their retirement benefits becauseof a pending complaint that has not been decided by the Office of the OMBUDSMAN. Directs, therefor, the OMBUDSMAN to complete its investigation of a complaint and COME UP WITH A RESOLUTION DISMISSING THE COMPLAINT with one(1) year from the date it initiated its investigation or the complaint was filed."

