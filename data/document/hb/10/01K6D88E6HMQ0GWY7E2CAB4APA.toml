congress_website_title = "AN ACT TO REORGANIZE DEPARTMENTS, BUREAUS, OFFICES, AND OTHER INSTRUMENTALITI ES OF THE GOVERNMENT INCLUDING GOVERNMENT-OWNE D OR CONTROLLED CORPORATIONS (reinventing, re-engineering)"
congress_website_abstract = "\"Government Reorganization Act of 1995\" Is premsised on the need to make the government bureaucracy more efficient and effective in order to assist in national development efforts. Is based on these principles: (1) Government shall give priority tothe strengthening of its fundamental functions; (2) Government should encourage private sector participation; (3) The national government shall adopt a structural frameworks that will define the vertical and horizontal compartmentaliz ation of the executive branch."
