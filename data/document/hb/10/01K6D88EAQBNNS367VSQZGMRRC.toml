congress_website_title = "AN ACT PROHIBITING THE SALE THROUGH PUBLIC AUCTION OF ALL KINDS OF CONFISCATED SMUGGLED GOODS AND PRODUCTS, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Provides for the following --- \"SECTION 2. Smuggled goods and products, after liability to seizure or forfeiture shall have been established by proper administrative or judicial proceeding in conformity with the provisions of the Tariff and CustomsCode, shall be burned or destroyed in such a manner as to render them absolutely useless or worthless.\" Penalizes the violation of this Act with imprisonment of one (1) to six (6) years, or a fine of not less than P10,000.00, but not more than P100,000.00."

