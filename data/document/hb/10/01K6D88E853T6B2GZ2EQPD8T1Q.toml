congress_website_title = "AN ACT AMENDING BOOK 1 TITLE 1, 2 AND 3 OF THE LABOR CODE (P.D. 442 AS AMENDED) SO AS TO PROVIDE FOR SUBSIDIARY LIABILITY OF RECRUITMENT AGENCIES IN CASES OF ABUSE, INJURY OR DAMAGE TO A WORKER, ESTABLISHING A GUARANTEE FUND THEREFOR, AND FOR OTHERPURPOSES"
congress_website_abstract = "Defines \"SUBSIDIARY LIABILITY\" as the responsibility of the recruitment agency for any abuse, injury or damage inflicted upon the worker by the employer during the pendency of the contract where the employer has not been prosecuted or found guilty of the violation; where no compensation for the abuse, injury or damage has been given to the worker for any reason whatsoever."

