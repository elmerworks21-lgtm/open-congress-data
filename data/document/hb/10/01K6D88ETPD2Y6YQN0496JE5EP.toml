congress_website_title = "AN ACT PROVIDING FOR HIGHER PENALTIES FOR DRUG RELATED OFFENSES AND FOR OTHER PURPOSES"
congress_website_abstract = "Prescribes the following penalties for drug-related offenses: \"SECTION 1. PRIMA FACIE EVIDENCE. The mere posession of prohibited drugs, including but not limited to shabu, marijuana, cocaine and the like, shall be prima facie evidence that the possessor is a user of prohibited drugs. \"SECTION 2. PENALTIES. The penalty of reclusion pereptua to death and a fine ranging from Ten Thousand Pesos to Fifteen Million Pesos shall be imposed upon any person who is caught with the possession of prohibiteddrugs.\""

