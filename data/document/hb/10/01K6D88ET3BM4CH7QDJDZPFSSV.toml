congress_website_title = "AN ACT DECLARING THE CRIME OF RAPE AGAINST A HOUSEHELPER UNDER EIGHTEEN (18) YEARS OF AGE COMMITTED BY HER EMPLOYER A HEINOUS CRIME AND IMPOSING THE MANDATORY PENALTY OF DEATH THEREFOR, AMENDING FOR THE PURPOSE ARTICLE 335 OF THE REVISED PENAL CODE"
congress_website_abstract = "Proposes the following amendment to Article 335 of the Revised Penal Code: \"Art. 335 x x x x The death penalty shall also be imposed if the crime of rape is committed with any of the following attendant circumstances: (1) x x x x; (2) WHEN THE VICTIM IS A HOUSEHELPER, UNDER EIGHTEEN (18) YEARS OF AGE AND THE OFFENDER IS HER EMPLOYER, A MEMBER OF HER EMPLOYER'S HOUSEHOLD OR HER CO-HOUSEHELPER. \""

