congress_website_title = "AN ACT REQUIRING THE COMPLETE PRIVATIZATION OVER THREE YEARS OF REMAINING GOVERNMENT ENTERPRISES PROVIDING NON-ESSENTIAL SERVICES OR COMPETING WITH PRIVATE ENTERPRISES"
congress_website_abstract = "Seeks to restore the momentum of putting the private sector in the lead of government's effort to attain development. Requires, therefore, that the ramaining government enterprises providing non-essential services or competing with private enterprises shall, over a period of THREE (3) YEARS, be sold to the private sector."

