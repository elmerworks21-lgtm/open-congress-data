congress_website_title = "AN ACT ALLOWING ALIENS TO HOLD EXECUTIVE POSITIONS IN CORPORATIONS ENGAGED IN PARTIALLY NATIONALIZED ACTIVITIES, AMENDING FOR THE PURPOSE SECTION 2-A OF COMMONWEALTH ACT NUMBERED ONE HUNDRED AND EIGHT, AS AMENDED BY PRESIDENTIAL DECREE NUMBERED SEVEN HUNDRED AND FIFTEEN, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to strengthen the government's efforts in liberalizing foreign investments by allowing the appointment of aliens as executive officers in the governing body of corporations engaged in partially nationalized activities, in proportion to their allowable participation or share in the capital of such entities."

