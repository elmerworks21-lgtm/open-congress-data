congress_website_title = "AN ACT DECLARING A FIVE-YEAR MORATORIUM ON THE INCREASE IN RENTALS OF ALL RESIDENTIAL UNITS"
congress_website_abstract = "Rationale: Rentals of residential units is an added financial burden to families. Some have to tighten their belts a little more to be able to cope with the higher rate of rental of residential units and the spiraling cost of basic commodities. Withthe existing average of Six Thousand Pesos (P6,000.00) monthly rental of residential units, families with only a member thereof as the sole breadwinner would likely resort to squatting just to cope with the high cost of today's basic human needs. Mandates the following --- \"SECTION 1. A five-year moratorium is hereby declared on the increase in rentals of all residential units with monthly rental of Ten Thousand Pesos (P10,000.00) and below.\" \"SECTION 2. This Act shall take effect on January 1,, 1998 following its publication in at least two (2) newspaperss of general circulation."
