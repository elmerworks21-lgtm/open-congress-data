congress_website_title = "AN ACT INSTITUTIONALIZ ING THE USE OF PURCHASE ORDERS AND NOT MERELY OF QUEDAN OR WAREHOUSE RECEIPTS AS COLLATERALS FOR OBTAINING CREDIT FINANCING, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SEVENTY-THREE HUNDRED AND NINETY-THREE, OTHERWISE KNOWN AS THE QUEDAN AND RURAL CREDIT GUARANTEE CORPORATION ACT"
congress_website_abstract = "Rationale: Under existing law (RA 7393), only queden or warehouse receipt evidencing stored agri-aqua produce in bonded warehouses may be used as collaterals for obtaining credit financing subject to a guarantee by the Quedan and Credit Guarantee Corporation created under said law. It is felt however, that forward selling schemes as advanced in Asian developed countries, should be set up in order to enhance agricultural production especially in the countrysides. Hence, the use of purchase orders as collaterals for obtaining credit financing. Seeks to reassure income to small farmers and fishermen, as well as to guarantee repayment of loans."

