congress_website_title = "AN ACT REQUIRING PUBLIC AND PRIVATE OFFICES AND COMMERCIAL ESTABLISHMENTS TO DISPLAY THE PHILIPPINE FLAG EVERYDAY, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Mandates that the Philippine flag shall be conspicuously displayed in all public and private offices and commercial establishments everyday of the year. States that --- \"SECTION 2. Any private person, natural or juridical, who shall vioalte the provision of Section 1 hereof shall be punished with imprisonment of not less than two (2) years nor more than six (6) years or a fine ranging from Twenty thousand Pesos (P20,000.00) to Fifty thousand pesos (P50,000.00) or both such fine and imprisonmentat the discretion of the court.\""

