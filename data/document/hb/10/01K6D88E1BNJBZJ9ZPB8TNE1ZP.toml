congress_website_title = "AN ACT MANDATING ALL GOVERNMENT AGENCIES, GOVERNMENT-OWNE D AND -CONTROLLED CORPORATIONS, PRIVATE COMPANIES AND ENTERPRISES TO REQUIRE ALL JOB APPLICANTS TO UNDERGO ACQUIRED IMMUNE DEFICIENCY SYNDROME (AIDS) TESTING AS A PART OF THE HEALTH CERTIFICATE REQUIREMENT FOR HIRING"
