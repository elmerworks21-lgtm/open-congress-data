congress_website_title = "AN ACT TO AMEND REPUBLIC ACT NO. 6675, ENTITLED 'AN ACT TO PROMOTE, REQUIRE AND ENSURE THE PRODUCTION OF AN ADEQUATE SUPPLY, DISTRIBUTION, USE AND ACCEPTANCE OF DRUGS AND MEDICINES IDENTIFIED BY THEIR GENERIC NAMES'"
congress_website_abstract = "Is premised on the observation that the implementation of the Generics Law \"suffers from infirmities traceable to the very premises where it was anchored ...\" Provides that IF THE DRUG OR MEDICINE REQUIRED BY THE PATIENT'S CONDITION, HISTORY OR DAIGNOSIS IS A PARTICULAR BRAND-NAME DRUG AND CANNOT BE SUBSTITUTED WITH ANY OTHER BRAND OR ANY GENERAL TERMINOLOGY, THE BRAND OF THE MEDICINE PRESCRIBED AND THE PHRASE \"NO SUBSTITUTION\" SHALL BE WRITTEN."

