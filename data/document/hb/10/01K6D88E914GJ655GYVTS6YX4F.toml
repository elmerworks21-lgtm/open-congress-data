congress_website_title = "AN ACT TO AMEND ARTICLE 335 OF THE REVISED PENAL CODE, AS AMENDED, AND DEFINING AND PENALIZING THE CRIME OF SEXUAL ASSAULT (rape)"
congress_website_abstract = "Redefines the crime of rape so as to render it committable by a WOMAN against a man and also by one SPOUSE against the other; Includes as circumstances surrounding rape the use of DRUGS, INTOXICANTS OR ANY OTHER NOXIOUS MEANS and the ABUSE OF AUTHORITY OR RELATIONSHIP; Defines a new crime to be called SEXUAL ASSAULT"
