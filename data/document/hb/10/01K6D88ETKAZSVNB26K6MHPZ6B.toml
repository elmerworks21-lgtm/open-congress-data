congress_website_title = "AN ACT PROVIDING PROVISIONAL RELIEF TO CERTAIN VICTIMS OF TYPHOONS, EARTHQUAKES, VOLCANIC ERUPTIONS OR OTHER SIMILAR DISASTERS BY GRANTING SPECIAL DEDUCTIONS FROM INCOME AND REAL PROPERTY TAXES IN THEIR FAVOR"
congress_website_abstract = "Provides for the following --- \"SECTION 1. Notwithstanding any provision of law to the contrary, any person, natural or juridical, whose immovable property was lost, totally or aprtially destoryed by a typhoon, earthquake, volcanic eruption or similar natural calamities shall be allowed to deduct the total amount of the loss of destruction.\" Limits, however, the IMMOVABLE PROPERTY referred to in this Act to (1) residential lands and buildings, (2) comemrcial and residential buildings, (3) agricultural lands, and (4) permanently installed machinery."

