congress_website_title = "AN ACT DEVELOPING THE SMALL-SCALE MINING PROGRAM, AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NO. 7076, OTHERWISE KNOWN AS THE \"PEOPLE'S SMALL-SCALE MINING ACT OF 1991\""
congress_website_abstract = "Rationale: To minimize the effect of the social conflict caused by the unjust distribution of mineral lands and to protect the small and medium-scale miners in gold-rush areas being claimed by mining companies, a law reforming mineral resources utilization by small and medium-scale miners is urgently needed. Proposes amendments to certain provision of RA No. 7076, such as on: (1) Definition of small-scale mining to include \"SIMPLE SMALL-SCALE MINING\" and \"EXPANDED SMALL-SCALE MINING.\" (2) EXTENT OF control area; and (3) Ownership and transport of ore-bearing rocks."

