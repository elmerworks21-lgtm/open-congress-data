congress_website_title = "AN ACT PROVIDING FOR A STATUTORY MINIMUM WAGE AND OTHER SECURITY MEASURE FOR OVERSEAS FILIPINO DOMESTIC HELPERS AND FOR OTHER PURPOSES"
congress_website_abstract = "Applies to all overseas Filipino domestic helpers, whether presently employed or about be deployed abroad. Provides for these concers: (1) Employment Contract; (2) Minimum Monthly Wage; (3) Security Bond; (4) Retuirn Ticket; (5) Nondiminution of Benefits."

