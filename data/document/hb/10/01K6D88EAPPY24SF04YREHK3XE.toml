congress_website_title = "AN ACT UPGRADING THE CURRENT BENEFITS AND PRIVILEGES OF BALIKBAYANS AND OCWs, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED 6768, ENTITLED 'AN ACT INSTITUTING A BALIKBAYAN PROGRAM,' AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to grant ADDITIONAL benefits and privileges to balikbayans, such as: (1) INCREASE in the current balikbayan purchase limit from [$1,000] to TWO THOUSAND DOLLARS ($2,000); (2) EXTENSION of the shopping privilege from [48 hours] to SEVEN (7) DAYS; (3) ADDITIONAL tax-free purchase with $2,000 for livleihood tools and equipment; (4) ALLOWING the balikbayan and the OCWs to purchase goods using the Philippine peso, etc."

