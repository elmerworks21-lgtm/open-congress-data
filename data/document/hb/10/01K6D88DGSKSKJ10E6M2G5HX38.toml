congress_website_title = "AN ACT GRANTING FREE MEDICAL ASSISTANCE AND HOSPITALIZATION TO MEMBERS OF THE PHILIPPINE NATIONAL POLICE AND TO IMMEDIATE MEMBERS OF THEIR FAMILIES"
congress_website_abstract = "Grants free medical assistance and hospitalization , to a member of the Philippine National Police who gets sick due to natural causes or due to accident or battle-related causes. Extends such grant to the immediate members of the family with entitlement to fifty (50%) per cent discount on the total hospital bills."

