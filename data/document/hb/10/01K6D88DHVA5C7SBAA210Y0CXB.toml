congress_website_title = "AN ACT INSTITUTING ELECTORAL REFORMS BY PROVIDING FOR A CONTINUING REGISTRATION OF VOTERS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7166, ENTITLED \"AN ACT PROVIDING FOR SYNCHRONIZED NATIONAL AND LOCAL ELECTIONS AND FOR ELECTORAL REFORMS, AUTHORIZING APPROPRIATIONS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Is based on these reasons: (1) Not all can register on the specified registration days; (2) It is easier to check qualifications of voters when they are not registered en masse; (3) Disenfrachiseme nt of qualified voters in minimized; and (4) Government will realize substantial savings."
