congress_website_title = "AN ACT PROVIDING FOR THE MODERNIZATION OF THE PHILIPPINE NATIONAL POLICE AND FOR OTHER PURPOSES"
congress_website_abstract = "\"PNP Modernization Act of 1996\" Seeks the development of (1) an efficient and credible police force based on the pro-active; community-orien ted policing system; (2) a manpower and career development program to professionalize the PNP; and a (3) responsive police organizational structure. Seeks, likewise, the acquisition and upgrading of appropriate police equipment and technology."
