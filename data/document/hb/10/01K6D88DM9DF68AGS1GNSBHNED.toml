congress_website_title = "AN ACT CONSTITUTING ALL PUBLIC SECONDARY SCHOOLS AS THE MANPOWER TRAINING CENTERS OF THEIR RESPECTIVE COMMUNITY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Constitutes all public secondary schools as manpower training centers of their respective communities by requiring them to offer vocational and technical courses such as trianing skills in driving, gasoline and diesel engine mechanics, automotive and welding, in addition to the present secondary courses that they offer. Directs the Secretary of the Department of Education, Culture and Sports to promulgate the necessary rules and regulations for the effective implementation of this Act."

