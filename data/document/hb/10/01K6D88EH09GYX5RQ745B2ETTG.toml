congress_website_title = "AN ACT PROVIDING THAT ALL PUBLIC WORKS FUNDS ALLOCATED FOR THE MAINTENANCE OF ROAD FACILITIES IN PROVINCES, CITIES AND MUNICIPALITIES SHALL BE RELEASED TO AND ADMINISTERED BY, THE LOCAL GOVERNMENT UNITS CONCERNED"
congress_website_abstract = "Rationale: \"The Constitution provides that the State shall ensure the autonomy of local governments. One way of achieving such autonomy is to entrust into the hands of the LGUs the funds for local road projects. > Poses these objectives: (1) To decentralize the management of public works funds intended for road projects of LGUs and prevent the delay in the implementation thereof; and (2) To ensure the full implementation of road projects or infrastructure in the countryside.\""

