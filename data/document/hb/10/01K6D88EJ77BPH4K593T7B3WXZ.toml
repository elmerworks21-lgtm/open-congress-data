congress_website_title = "AN ACT DECLARING THE NATIONAL POLICY ON, AND ESTABLISHING THE PROGRAM FRAMEWORK ON MENTAL HEALTH, PROVIDING THE IMPLEMENTING MECHANISMS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Mental Health Act of the Philippines\" Mandates the adoption of a COMPREHENSIVE AND INTEGATED MENTAL HEALTH PROGRAM that shall --- (1) protect and promote the mental health of the nation through a multi-disciplin ary approach that encompasses health, education, labor and employment, justice, and social welfare; (2) prevent, treat, and control mental illness and rehabilitate the mentally disabled; (3) establish a nationwide multi-sectoral campaign for the identification and prevention of mentalill-health, particularly among the children and youth; and (4) provide primary, secondary, and tertiary levels of health care which ensure a well-balanced program of community-based and hosital or institutional care and treatment, with voluntary andinvoluntary access to such care and treatment."

