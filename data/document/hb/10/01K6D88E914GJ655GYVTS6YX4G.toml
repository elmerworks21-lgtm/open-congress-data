congress_website_title = "AN ACT ESTABLISHING THE RULES TO GOVERN THE ADOPTION OF FILIPINO CHILDREN IN THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Local Adoption Act of 1996\" Aims to --- (1) Correct the prevailing imbalance in the attention provided to intercountry adoption as compared with local adoption, and to ensure that adequate resources are availabel for the local adoption promotion and services; (2) Rectify recongized deficiences in the prevailing laws on local adoption as found in the Child and Youth Welfare Code (P.D> No. 603) and the Family Code (E.O. No. 209 as amended by E.O. 227); and (3) Consolidate within the single law the various provision on local adoption that are found in several different pieces of legislation."
