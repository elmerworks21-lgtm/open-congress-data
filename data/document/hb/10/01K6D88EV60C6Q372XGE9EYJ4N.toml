congress_website_title = "AN ACT REQUIRING ALL CITY AND MUNICIPAL GOVERNMENTS TO INCLUDE TREE PLANTING IN THEIR YEARLY FIESTA PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Provides for the following --- \"SEC. 3. The trees to be planted shall be fruit or shade, ornamental or forest trees, the seeds of which shall be provided by the DENR. The trees shall be maintained, protected and/or replaced if the same are diseasedor are defective by the local government unit (LGU) concerned, in coordination with the DENR and all other concerned agencies.\" Identifies the places where the trees should be planted; provides incentives to those municipalities complying with the provisions of this Act."

