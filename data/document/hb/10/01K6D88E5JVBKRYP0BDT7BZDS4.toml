congress_website_title = "AN ACT PUNISHING THE FUNNELLING, TRANSFER OR USE OF ILLEGALLY SOURCED OR PROCURED FUNDS OR PROPERTY TO LEGITIMATE ENTERPRISES OR TRANSACTIONS, AND PROVIDING PENALTIES THEREFOR(ANTI-L AUNDERING) (rico)"
congress_website_abstract = "\"Anti-Launderin g Act.\" Refers to the more sophisticated types of illegal acts committed with financial or economic gain as a primary purpose. Enumerates the ILLEGAL ACTS or ACTIVITIES referred to in this proposed measure. Penalizes the act of laundering defined as the \"transfer of funds of dubious or illegal origin, and then later to recover them from what seems to be 'clean' (legitimate) sources.\" Empowers the courts to issue \"freeze\" orders against the assets of suspected offenders even prior to the filing of an information or criminal charge in court."
