congress_website_title = "AN ACT CREATING THE COUNCIL OF VETERANS OF WORLD WAR II IN THE PHILIPPINE VETERANS AFFAIRS OFFICE"
congress_website_abstract = "Rationale: This refers to a provision of RA 7169 which provided for the designation of the BOARD OF TRUSTEES OF THE VETERANS OF WORLD WAR II (BTVWWII) as the trustee of all issued but undelivered shares of stock of the Philippine Veterans Bank. Complaints of discrimination by the BTVWWII has been raised. Seeks to ABOLISH THE BTVWWII and in its place, create another body under the direct supervision of the PVAO. This proposed body is the COUNCIL OF VETERANS OF WORLD WAR II."

