congress_website_title = "AN ACT AMENDING THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, BY DELETING SECTION 24 (D), THEREBY PUTTING ALL DOMESTIC LIFE INSURANCE COMPANIES ON EQUAL FOOTING FOR INCOME TAX PURPOSES"
congress_website_abstract = "Rationale: The preferential income tax rate of ten percent (10%) of ross investment income for mutual life insurance companies in lieu of the regular thirty-five percent (35%) corporate income tax under Section 24 (a) is not achieving its intended goal. Instead of reducing the tax specifically of mutual life insurance companies in order to encourage stock life insurance companies to convert into mutual life, it even burdened the mutual life insurance companies with more taxes to be paid comapred to the taxes being paid by stock life insurance companies. DELETES , therefore, the following provision of the National Internal Revenue Code, As Amended: \"Mutual life insurance companies organized in and existing under the laws of the Philippinesshall pay a tax of ten percent (10%) of their gross investment income consisting of interest, dividend, rents, net capital gains and income from any other business than life insurance derived from all sources, except those covered by paragraph (a) he"

