congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 7202, OTHERWISE KNOWN AS THE SUGAR RESTITUTION LAW, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides that --- (1) The Benedicto ceded assets will be used to compensate all sugar planters and millers for losses sustained during the relevant period. (2) Assets or funds to be recovered or already recovered as a result of a compromise agreement, notwithstanding any contrary statement therein, shall be deemed to have been illegally acquired from the sugar industry if prior thereto, the PCGG has made a prima facie determination of such fact, through the issuance of sequestration orders or the filing of complaints against the public officeials concerned. (3) PCGG shall turn over to the Sugar Regulatory Administration (SRA) all funds and assets already recovered within ninety (90) days from approval of this Act, and those to be recoveredd within 90 days from recovery, which shall be distributed on a pro rata basis in accordance with this Act, net of SRA's administrative expenses and the 10 percent for labor. (4) Ten percent (10%) of the assets/funds shall be allocated to labor which"
