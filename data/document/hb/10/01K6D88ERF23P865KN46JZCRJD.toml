congress_website_title = "AN ACT TO PROTECT THE FORESTS AND TO CONTROL ENVIRONMENTAL AND FORESTS RESOURCES DEGRADATION IN ORDER TO ATTAIN ECOLOGICAL BALANCE"
congress_website_abstract = "Seeks to impose a BAN on logging in ALL TYPES of forest, and to undertake a MASSIVE REFORESTATION and REHABILITATION program, for a period of FIFTEEN (15) YEARS, starting January 1, 1998. NO cutting, gathering, collecting or removing of timber and other forest products without the legal docments shall be allowed. Prescribes, likewise, for the strick implementation of pertinent laws on environment and natural resources, and the active involvement of the grassroots towards this end."

