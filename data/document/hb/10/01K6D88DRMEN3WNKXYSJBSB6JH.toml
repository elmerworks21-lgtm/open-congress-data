congress_website_title = "AN ACT GOVERNING THE DELIVERY OF PUBLIC TRANSPORT SERVICES"
congress_website_abstract = "\"The Public Transport Services Act of the Philippines\" Applies to all public transport services on land, water and air, except those using non-motorized conveyances. Seeks to update existing laws on public transport services making them less regulatory, more developmental, and mroe attuned to current and future Philippine conditions and realities, thereby providing a new direction and supportive environment for the public transport system."

