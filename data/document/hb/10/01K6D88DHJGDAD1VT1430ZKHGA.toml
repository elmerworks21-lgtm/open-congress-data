congress_website_title = "AN ACT AMENDING SECTION 2 OF REPUBLIC ACT 7041, OTHERWISE KNOWN AS AN ACT REQUIRING REGULAR PUBLICATION OF EXISTING VACANT POSITIONS IN GOVERNMENT OFFICES, APPROPRIATING FUNDS THEREFORE, AND FOR OTHER PURPOSES"
