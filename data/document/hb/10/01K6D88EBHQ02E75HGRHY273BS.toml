congress_website_title = "AN ACT ESTABLISHING THE RULES TO GOVERN THE ADOPTION OF FILIPINO CHILDREN IN THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Prescribes for the following: (1) Provides counseling services to the biological parents prior to and after the birth of the child who would be placed for adoption; (2) Expands the coverage of persons eligible to adopt by including those who are currently excluded by the Family Code; (3) Provides that the adoptive parents and their legitimate children, and the adoptive child, to be compulsory heirs of each other; (4) Extends all maternal leave benefits of biological parents to adoptive parentswho adopt below seven (7) years of age through regular adoption procedures."
