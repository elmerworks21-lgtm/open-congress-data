congress_website_title = "AN ACT PROVIDING FOR THE MANDATORY DRUG-TESTING OF DRIVERS IN PUBLIC LAND TRANSPORT COMPANIES"
congress_website_abstract = "Statistics show that in 1993 , 1.5 traffic accidents happened every hour in Metro Manila and Southern Tagalog Region alone. 4.4% of these accidents were fatal, 32% resulted in both slight and serious injuries and damage to property was estimated atP8.4B. Thus, road safety continues to be a serious concern of the State. Declares the following --- \"SECTION 1. Notwithstanding any provision of law to the contrary, all common carriers by land, in coordination with the Land Transporatation and Franchising Regulatory Board, shall periodically conduct mandatory drug-testing on their drivers. Such common carriers are hereby encouraged to institute a program to assist their drivers who may need rehabilitiation and after-treatment reintegration.. \""

