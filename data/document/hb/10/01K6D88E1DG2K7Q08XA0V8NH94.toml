congress_website_title = "AN ACT REQUIRING A FORMAL BACCALAUREATE DEGREE FOR ALL MEMBERS OF THE PHILIPPINE NATIONAL POLICE, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED AND SEVENTY-FIVE OTHERWISE KNOWN AS THE 'DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990'"
congress_website_abstract = "Aims to professionalize the PNP personnel by requiring a formal baccalaureate degree for all applicants to the PNP; requires those already in service but do not possess said degree upon approval of this Act to comply within five (5) years from effectivity of this proposed measure."
