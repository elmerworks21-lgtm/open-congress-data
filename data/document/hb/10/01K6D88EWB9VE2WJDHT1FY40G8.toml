congress_website_title = "AN ACT DEFINING CERTAIN RIGHTS AND PRIVILEGES OF MARKET VENDORS; ESTABLISHING PREFERENTIAL TREATMENT AND THE RIGHT OF FIRST REFUSAL TO ANY QUALIFIED LOCAL MARKET VENDORS OR GROUP OF MARKET VENDORS IN THE CREATION, LEASE, DEVELOPMENT, IMPROVEMENT OFTHE RESPECTIVE PUBLIC MARKET STALL FACILITIES; GRANTING SPECIAL INCENTIVES FOR PROMOTING THEIR SOCIAL DEVELOPMENT INTEREST"
congress_website_abstract = "\"The Cardinal Rights and Privileges of Philippine Market Vendors Act\" Covers all qualified market vendors; provides for these areas of concern: (1) Duties and responsibilitie s of market vendors; (2) Rights and privileges; (3) Preferential privileges; and (4) Creation of a Market Vendors Incentive Fund."

