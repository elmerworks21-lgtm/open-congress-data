congress_website_title = "AN ACT TO RATIONALIZE THE AUTHORITY AND RESPONSIBILITY OF THE COMMISSION ON HIGHER EDUCATION IN THE SUPERVISION OF CHARTERED STATE UNIVERSITIES AND COLLEGES AND DEGREE-GRANTING PROGRAMS OF PUBLIC POST-SECONDARY EDUCATIONAL INSTITUTIONS, AMENDING FORTHE PURPOSE CERTAIN SUCS CHARTERS, PRESIDENTIAL DECREE NO. 1437, THE ADMINISTRATIVE CODE OF 1987, THE ENABLING LAWS OF THOSE POST-SECONDARY EDUCATIONAL INSTITUTIONS, AND OTHER LAWS ON HIGHER EDUCATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Underscores the transfers of responsibility to sueprvise higher education from the DECS to the COMMISSION ON HIGHER EDUCATION (CHED). Seeks to --- (1) Designate the Chairman of the CHED as chair of all State universities and colleges governing boards; (2) Enhance the authoarity of the CHED Chairman; recommend the SUCs budgets to the DBM; (3) Provide a muchanism whereby complaints against SUCs can be resolved without delay; etc."

