congress_website_title = "AN ACT CREATING THE GAWAD-SAKA INSURANCE FUND FOR BONAFIDE GAWAD-SAKA INDIVIDUAL AWARDEES, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The main objective of the Gawad-Saka Awards is to pinpoint or select the best representatives from our farmers and fisherfolks' cooperatives and other categories. Those chosen excel not only in productivity but are also involved in community work and are well-rounded individuals who epitomize the best farmer and fisherfolk. > Creates the GAWAD-SAKA INSURANCE FUND which will be used to purchase (1) life insurance, (2) death and (3) burial benefits for all bonafide awardees. Designatesthe NATIONAL STEERING COMMITTEE for these awards as the implementing agency. Identifies the beneficiaries, amount of insurance, and prescribes penalties for violation of this proposed measure."

