congress_website_title = "AN ACT TO REQUIRE THE MANDATORY ROADWORTHINESS INSPECTION OF VEHICLES TEN (10) YEARS OLD, AND ABOVE AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the following --- \"SECTION 1. All vehicles ten years old and above shall pass a roadworthiness inspection test prior to registration by the Land Transportation Office (LTO): Provided That, vehicles ten years old to fifteen years old shall be inspected every two years and vehicles fifteen years old and above shall be inspected every year.\" \"SEC. 2. A certificate of roadworthiness duly issued by an LTO_operated or LTO-accredited motor vehicle inspection center shall be submitted to LTO for registration purposes.\""

