congress_website_title = "AN ACT GRANTING TAX CREDITS TO PRIVATE INSTITUTIONS THAT PROVIDE FINANCIAL SUPPORT TO THE TRAINING, MOBILIZATION AND PROGRAMS OF THE CITIZEN ARMED FORCES OF THE PHILIPPINES (RESERVISTS) AND FOR OTHER PURPOSES (rotc)"
