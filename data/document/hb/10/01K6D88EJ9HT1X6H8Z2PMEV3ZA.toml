congress_website_title = "AN ACT CREATING A MECHANISM BY WHICH THE NATIONAL GOVERNMENT CAN GUARANTEE REPAYMENT OF LOANS SECURED FROM THE COMMERCIAL CREDIT MARKET BY LOCAL GOVERNMENTS"
congress_website_abstract = "Declares that the national government may GUARANTEE loans secured from the commercial credit market by local governments and, on the event of DEFAULT, may WITHHOLD their internal revenue allotments for DIRECT PAYMENT to financial institutions granting the loan. > Identifies the types of services covered by such loans, such as (1) primary health care; (2) potable water; (3) solid waste disposal ; (4) roads; (5) power; and (6) nutrition."

