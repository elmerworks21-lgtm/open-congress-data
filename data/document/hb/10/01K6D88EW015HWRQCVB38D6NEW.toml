congress_website_title = "AN ACT PROVIDING FOR THE REASSIGNMENT OF ELECTION REGISTRARS AND COMELEC DEPUTIZED CITY/MUNICIPAL PHILIPPINE NATIONAL POLICE (PNP) STATION COMMANDERS, AMENDING FOR THE PURPOSE THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "Provides for the following --- \"SEC. 223 - A REASSIGNMENT OF ELECTION REGISTRARS. - DURING THE PERIOD OF THE CAMPAIGN AND UNTIL THE PROCLAMATION OF THE WINNING CANDIDATES, CITY, MUNICIPAL AND PROVINCIAL ELECTION REGISTRARS WHO HAVE SERVED FOR AT LEAST FOUR (4) YEARS IN A PARTICULAR CITY, MUNICIPALITY OR PROVINCE SHALL BE REASSIGNED TO OTHER CITY, MUNICIPALITY OR PROVINCE, AS THE CASE MAYBE, OUTSIDE OF THE CONGRESSIONAL DISTRICT THEY ARE PRESENTLY SERVING.\""

