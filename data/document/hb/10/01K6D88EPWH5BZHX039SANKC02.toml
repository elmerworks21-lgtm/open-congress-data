congress_website_title = "AN ACT TO AMEND PARAGRAPH B(1), SECTION 98, TITLE FOUR OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE 'LOCAL GOVERNMENT CODE OF 1991'(aims to include the representation of tertiary schools in the local school board)"
congress_website_abstract = "Rationale: The Law (Ra 7160) is silent on the representation of tertiary schools in the development process in the field of education in the locality. This deprives tertiary schools of their right to participate in the decision-making process involving education and the welfare of their students. Seeks, therefore, to amend the Law in order to INCLUDE the representation of tertiary schools in the local school board."

