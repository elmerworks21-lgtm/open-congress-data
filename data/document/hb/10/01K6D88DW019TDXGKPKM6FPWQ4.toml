congress_website_title = "AN ACT INCREASING THE PENALTY FOR VIOLATION OF B.P. 22 AMENDING FOR THE PURPOSE SECTION I OF B.P. 22 OTHERWISE KNOWN AS THE ANTI-BOUNCING CHECKS LAW AND FOR OTHER PURPOSES"
congress_website_abstract = "States that if the amount of check does not exceed P50,000.00, the penalty shall be thirty-day imprisonment, but not more than one (1) year. States further that if the amount exceeds P50,000.00, the same penalty shall be imposed, plus one (1) year for every excess of P10,000.00 or a fraction thereof over P50,000.00, but the total imprisonment shall not be more than eight (8) years."
