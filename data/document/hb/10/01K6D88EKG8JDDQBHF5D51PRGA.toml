congress_website_title = "AN ACT TO STRENGTHEN THE NATIONAL SHELTER PROGRAM OF THE GOVERNMENT BY RESCUING LOW-INCOME AND MIDDLE-INCOME MEMBER-BORROWER S OF THE HOME DEVELOPMENT MUTUAL FUND (PAG-IBIG) FROM FORECLOSURE OF THEIR PROPERTIES, AMENDING THEREBY PRESIDENTIAL DECREENO. 1752, AS AMENDED BY REPUBLIC ACT NO. 7742"
congress_website_abstract = "Proposes this amendment to the Pag-ibig Loan Program by adding a NEW provision on the powers of the Board: \"SEC. 12. TO CONDONE, IN WHOLE OR IN PART, PENALTIES OR SURCHARGES IMPOSED ON LOANS OF MEMBER-BORROWER S OF THE FUND WHO FOR JUSTIFIABLE REASONS FAILED TO PAY ON TIME THEIR OBLIGATIONS TO THE FUND. SUCH EXCLUSIVE POWER TO CONDONE SHALL LIKEWISE APPLY TO PENALTIES OR SURCHARGES IMPOSED ON EMPLOYEES WHO JUSTIFIABLY FAILED TO REMIT WHEN DUE THE REQUIRED CONTRIBUTIONS OF THEIR EMPLOYEES.\""
