congress_website_title = "AN ACT REORGANIZING THE MOVIE AND TELEVISION REVIEW AND CLASSIFICATION BOARD AND REPEALING PRESIDENTIAL DECREE NO. 1986"
congress_website_abstract = "Contains the following features --- (1) Reorganization of the composition of the MTRCB to include lawyers; the movie and TV industry; cultural communities and sectoral representatives as appointed by the President; (2) Extension of the terms of theMTRCB chairman and members from [one (1)year] to THREE (3) YEARS. Seeks to \"untie\" the hands of the Board from the limitations imposed by the prevailing law."

