congress_website_abstract = "Declares the PURPOSE of the Commission as follows --- \"SEC. 4. Purpose of the Commission. The Commission shall promote the family as the foudnation of the nation, its basic institution, as well as the protection of marriage which is the foundation of the nation, of the fmaily and is established for conjugal family life. It shall , likewise, provide opportunities for the private sector particularly civic and religious marriage and family orgnaizations to be partners of the government in nation building.\""

