congress_website_title = "AN ACT IMPOSING EXCISE TAX ON SOFTDRINKS, AMENDING FOR THE PURPOSE THE NATIONAL INTERNAL REVENUE CODE OF 1993"
congress_website_abstract = "Rationale: The softdrinks industry is well entrenched in the Philippine consumer market, amassing billions of pesos in terms of sales every year while rapidly expanding its operations. Softdrinks are regular beverages in most Filipino households, restaurants and other establishments, such that, according to studies, softdrinks have become the substitute for drinking water. It is thus an opportune time to tax softdrinks to provide a steady of funds for the development of water resources. Proposes, therefore, the following amendment to the Internal Revenue Code --- \"Chapter III - EXCISES TAX ON ALCOHOL PRODUCTS AND SOFTDRINKS. > x x x > \"SEC. 140-A. SOFTDRINKS. - ON SOFTDRINKS OR ANY NON-ALCOHOLIC CARBOANTED DRINK, MANUFACTURED FROM EXTRACTSS, INCLUDING DILUTIONS, PURIFICATIONS, OR MIXTURES THEREOF, FROM WHATEVER SOURCE OR BY WHATEVER PROCESS PRODUCED BUT TO EXCLUDE COFFEE, TEA, MILK, CACAO, AND UNDILUTED FRUIT AND VEGETABLE JUICES SHALL BE LEVIED, ASSESSED AND COLLECTED AS FOLLOWS: (1)"

