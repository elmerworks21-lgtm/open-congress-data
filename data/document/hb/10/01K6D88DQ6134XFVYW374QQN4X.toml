congress_website_title = "AN ACT CREATING THE TRADITIONAL AND ALTERNATIVE MEDICINE AUTHORITY TO ACCELERATE THE DEVELOPMENT OF THE TRADITIONAL AND ALTERNATIVE MEDICINE IN THE PHILIPPINES, PROVIDING FOR A TRADITIONAL MEDICINE DEVELOPMENT FUND AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines the terms \"TRADITIONAL MEDICINE\" and \"ALTERNATIVE MEDICINE\" as used in this Act. Seeks to encourage research and development of indigenous, alternative and non-allopathic health system and to promote the use of only those traditional and alternative healing modalities that are proven safe and effective."
