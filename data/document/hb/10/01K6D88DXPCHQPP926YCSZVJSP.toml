congress_website_title = "AN ACT REMOVING THE ALTERNATIVE POWER TO INITIATE RECALL OF LOCAL GOVERNMENT OFFICIALS FROM THE PREPARATORY RECALL ASSEMBLY, AMENDING FOR THE PURPOSE, REPUBLIC ACT NUMBERED SEVETY ONE HUNDRED AND SIXTY, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "States that RECALL may be initiated [by a preparatory recall assembly] by the registered voters of the local government unit to which the local elective official subject to such recall belongs."
