congress_website_title = "AN ACT MANDATING SECONDARY AND TERTIARY HOSPITALS TO IMPOSE SOCIALIZED USER FEES TO FAMILIES WHOSE INCOME ARE BELOW THE POVERTY LINE"
congress_website_abstract = "\"Socialized Secondary and Tertiary Health Care Act of 1997\" Provides for the following --- \"SEC. 5. Socialized User Fees. All public secondary and tertiary hospitals nationwide shall impose socialized user fees for services rendered and the use of hospital facilities and equipment based on the schedule as follows: (1) Patients whose income is less than 20% more than the official poverty line - no charge; (2) Patients whose income is 20% more but less than 40% more than the official poverty line- 20% of total hospital charges; (3) Patients whose income is 40% more but less tahn 60% more than the official poverty line - 40% of total hospital charges; (4) Patients whose income is 60% more but less than 80% more than the official poverty linee - 60% of total hospital charges; (5) Patients whose income is 80% more but less than 100% more than the official poverty line - 80% of total hospital charges; and (6) Patients whose income is 100% more than the official poverty line - 100% of total"

