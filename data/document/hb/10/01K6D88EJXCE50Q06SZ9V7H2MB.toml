congress_website_title = "AN ACT MANDATING THE PAYMENT OF SEPARATION PAY OF AT LEAST THREE (3) MONTHS FOR EVERY YEAR OF SERVICE IN LIEU OF REINSTATEMENT IN CASES OF STRAINED RELATIONS BETWEEN THE EMPLOYER AND EMPLOYEE, AMENDING FOR THE PURPOSE ARTICLE 279 OF THE LABOR CODE"
congress_website_abstract = "Provides for the following --- \"IN CASE WHERE REINSTATEMENT IS NOT POSSIBLE BECAUSE OF STRAINED RELATIONS BETWEEN THE EMPLOYER AND EMPLOYEE, THE LATTER SHALL BE PAID A SEPARATION PAY OF AT LEAST THREE (3) MONTHS FOR EVERY YEAR OF SERVICE. A FRACTION OF AT LEAST SIX (6) MONTHS SHALL BE CONSIDERED AS ONE (1) WHOLE YEAR."

