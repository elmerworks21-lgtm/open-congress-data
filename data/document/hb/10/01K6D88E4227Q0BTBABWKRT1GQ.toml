congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF THE RULES OF COURT BY CREATING A TRIBUNAL IN DECIDING A CASE INVOLVING HEINOUS CRIMES"
congress_website_abstract = "Allows the defined on the prosecution to petition the Supreme Court for the designation of a tribunal to decide a case involving heinous crimes, which shall be composed of three (3) RTC judges. The case shall be decided by the concurrence of at least two (2) of such members who actually took part in the deliberations on the issues in the case and voted thereon."

