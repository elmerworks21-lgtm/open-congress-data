congress_website_title = "AN ACT PROHIBITING THE IMPORTATION, SALE, DISTRIBUTION, DELIVERY, TRANSPORTATION, PLANTING, CULTIVATION, CULTURE, MANUFACTURE, ADMINISTRATION, POSSESSION, AND USE EVEN FOR FLORAL DECORATIVE PURPOSES OF ANY AND ALL SPECIES OF OPIUM POPPY INCLUDING PAPAVER SOMNIFERUM L., PAPAVER SETIGERUM DC, PAPAVER ORIENTALE, PAPAVER BRACTEATUM, AND PAPAVER RHOEAS, SEEDS, STRAW, BRANCHES, LEAVES, OR ANY PART THEREOF OR SUBSTANCES DERIVED THEREFROM, AMENDING REPUBIC ACT NO. 6425, AS AMEANDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Prohibits the importation , sale, distribution, delivery, transportation, planting, cultivation, culture, manufacture, administration, possession, and even for floral and decorative purposes of any and all those authorized by law and the Dangerous Drugs Board. Provides penalties for violation of this Act as provided under RA 6425, as amended."
