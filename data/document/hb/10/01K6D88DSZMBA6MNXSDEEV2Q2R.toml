congress_website_title = "AN ACT GRANTING SALARY EXTENDERS TO GOVERNMENT EMPLOYEES"
congress_website_abstract = "States that the government shall adopt measures intended to alleviate the plight of government employees and their families. Identifies the areas from where programs on salary extenders can be initiated: (1) Accumulated Vacation Leave; (2) Medical and Dental Care; (3) Housing; (4) Transportation; (5) Day Care Centers; (6) Livelihood Program; and (7) Agricultural Projects."

