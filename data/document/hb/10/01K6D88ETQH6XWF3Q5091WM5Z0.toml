congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8180, OTHERWISE KNOWN AS THE \"DOWNSTREAM OIL DEREGULATION ACT,\" BY PRESCRIBING PARITY OF TARIFF DUTY RATES ON IMPORTED CRUDE OIL AND PETROLEUM REFINED PRODUCTS, CLARIFYING AND MODIFYING THE ANTITRUST PROVISIONS OF THE ACT, AND INSTITUTIONALIZ ING THE REMEDIES AGAINST VIOLATIONS OF SAID PROVISIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: \"The present bill formalizes the concept of the appropriate actions which may be resorted to under the Rules of Court in conjunction with the oil deregulation law are adequate. But to stress their availability and dynamism, it is a good move to incorporate all the remedies in the law itself. Thus, the present bill formalizes the concept of government intervention and private suits to address the problem of antitrust violations. Specifically, the government may file an action to prevent or restrain any act of cartelization of predatory pricing, and if it has suffered any loss or damage by reason of the antitrusat violation it may recover damages. Likewise, a private person or entity may sue to prevent or restrain any such violatiion which will result in damage to his business or property, and if he has already suffered damage he shall recover treble damages. A class suit may also be allowed."

