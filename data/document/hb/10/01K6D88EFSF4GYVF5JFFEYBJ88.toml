congress_website_title = "AN ACT CREATING AN AGRICULTURAL PRODUCTIVITY ENHANCEMENT FUND IN EACH PROVINCE, CITY AND MUNICIPALITY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE"
congress_website_abstract = "Creates an AGRICULTURAL PRODUCTIVITY ENHANCEMENT FUND which shall be used exclusively to finance various support services to enhance agricultural production. Allocates the following for agricultural infrastructure projects: (1) at least FIFTY PERCENT (50%) of the TWENTY PERCENT (20%) DEVELOPMENT FUND allotted to provinces, cities and municipalities; and (2) FIVE PERCENT (5%) from the proceeds of the TAX on IDLE LANDS."

