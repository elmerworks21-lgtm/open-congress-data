congress_website_title = "AN ACT ADJUSTING PENSIONS UNDER THE SOCIAL SECURITY SYSTEM TO A MINIMUM LEVEL OF SEVEN THOUSAND PESOS (P7,000.00) UNDER AN ECONOMIC ADJUSTMENT PENSION PROGRAM"
congress_website_abstract = "Proposes to gradually INCREASE the minimum monthly PENSION under the Social Security System (SSS) which shall start with two thousand pesos (P2,000.00) and shall be increased annually by not less than one thousand pesos (P1,000.00) until the total monthly pension shall be at least SEVEN THOUSAND PESOS (P7,000.00) a month. Aims to enable the pensioners to cope better with the high cost of living."
