congress_website_title = "AN ACT ESTABLISHING A COMPREHENSIVE JUVENILE JUSTICE SYSTEM, APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Comprehensive Juvenile Justice System\" Applies to all youth offenders who are nine (9) years, but under 18 years of age at the time of the commission of the offense. > A youth offender who is nine years of age or underr at the time of a commissionof an offense shall be exempt from criminal liability and shall be committed to the care of his or her father or mother, or nearest relative or family friend, at the discretion of the juvenile court to be established by this Act, and subject to its supervision. The same action shall apply to a youth offender who is nine years of age but under fifteen years of age at the time of the commission of an offense, unless he acted with discernment, in which case he shall be proceeded against in accordannce with Section 6 of this Act.\""

