congress_website_title = "AN ACT TO ASSIST TEACHERS OF THE PUBLIC SCHOOL BY PROVIDING SUBSIDIZED MEDICAL CARE AND TREATMENT FOR TEACHERS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Teachers' Medical Center Law\" Creates the TEACHERS' MEDICAL CENTER to cater the medical and dental needs of public school teachers and their dependents free of charge. Said Medical Center should be built in the National Capital Region. Moreover, District Teachers' Medical Centers shall also be built for each educational district all over the country in accordance with the districting being implemented by the DECS."

