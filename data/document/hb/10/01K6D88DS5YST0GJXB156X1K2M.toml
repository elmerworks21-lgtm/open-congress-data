congress_website_title = "AN ACT AMENDING TITLE ELEVEN AND CERTAIN ARTICLES UNDER SAID TITLE OF THE REVISED PENAL CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Amends Title Eleven of the Revised Penal Code to read as \"CRIMES AGAINST (Chastity) PERSONAL DIGNITY AND SEXUAL LIBERTY.\" Amends, further, the title of Chapter Two, Title Eleven and Article 336 of the Revised Penal Code to read as follows: RAPE and(Acts of Lasciviousness) SEXUAL ASSAULT.\" Provides for the change in penalties and who may file the complaint."
