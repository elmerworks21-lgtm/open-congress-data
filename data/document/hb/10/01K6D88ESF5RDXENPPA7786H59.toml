congress_website_title = "AN ACT RATIONALIZING FURTHER THE QUALIFICATIONS FOR THE ADMISSION TO THE POLICE AND MILITARY SERVICE BY ESTABLISHING THE NORMAL HEIGHT OF A FILIPINO AS THE NEW PRESCRIBED MINIMUM HEIGHT REQUIREMENT"
congress_website_abstract = "Declares the following --- \"SECTION 1. Any law, decree and rule and regulation to the contrary notwithstanding , the normal height of a Filipino is hereby established as the prescribed minimum requirement for admission to the police and military service. For this purpose, the Department of Health shall determine as soon as practicable, the necessity of height prescription in the admission to police or military service.\""

