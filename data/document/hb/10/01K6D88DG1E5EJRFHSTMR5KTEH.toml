congress_website_title = "AN ACT REGULATING ALL FRANCHISES TO ESTABLISH, OPERATE, AND MAINTAIN GAMBLING CASINOS FOR FOREIGNERS ONLY, REPEALING FOR THIS PURPOSE PRESIDENTIAL DECREE NO. 1869, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The National Franchise Law on Gambling Casinos\" Repeals all existing franchises for gambling casinos and allows the issuance of franchises anew as mere support facilities to the tourism industry; allows qualified private coprorations as grantees ofsaid franchises, and; imposes special conditions on the issuance of such franchises in order for them to allow only tourists and foreigners who are at least twenty-one years old as casino players and for these grantees to oeprate only in selected areas."

