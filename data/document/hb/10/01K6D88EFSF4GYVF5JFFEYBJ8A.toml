congress_website_title = "AN ACT TO REVISE THE SCHEDULE OF FAIR MARKET VALUES OF RESIDENTIAL BUILDINGS, AS WELL AS THE ASSESSMENT LEVELS, SO AS TO EXEMPT FAMILY HOMES, THE FAIR MARKET VALUE OF WHICH IS NOT OVER P300,000, FROM REAL PROPERTY TAX, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE 'LOCAL GOVERNMENT CODE OF 1991'"
congress_website_abstract = "Considers FAMILY HOME as a tie which binds and strengthens the Filipino family - the foudnation of the nation. Is premised on the following: (1) the rapid increase in real proeprty valution would ultimately lead to almost confiscatory higher taxes and could spell doom for the family home; (2) the take home pay of low-salaried employees is not sufficient to finance their basic necessities, thus, the Filipino family is going to be unstable because of the damger of losing their common bond which is the family home. Provides for the following REVISED schedule of Fair Market Values of RESIDENTIAL buildings and assessment levels: (see abs. 37 for the table). Provides further that the EXEMPTION shall apply only to the property which is used excluusively as DWELLING of claimant's family and is not used in whole or in aprt for any COMMERCIAL purpose."

