congress_website_title = "AN ACT TO AMEND SECTION 31 (D) OF REPUBLIC ACT NO. 7610, OTHERWISE KNOWN AS THE SPECIAL PROTECTION OF CHILDREN AGAINST CHILD ABUSE, EXPLOITATION AND DISCRIMINATION ACT"
congress_website_abstract = "Amends the provision on Pedophiles under RA 7610, to read as follows: \"(d) WHEN THE OFFENDER IS A FOREIGNER, HE SHALL BE REQUIRED TO POST BAIL DOUBLE THE AMOUNT REQUIRED OF THE PUNISHABLE ACT. IN ADDITION, THE COMMISSION ON IMMIGRATION AND DEPORTATION SHALL, UPON RECEIPT OF A COURT ORDER OR ARREST AND SETTING THE BAIL, ORDER THAT SAID FOREIGNER BE PLACED ON HOLD ORDER TO PREVENT THE ACCUSED FROM LEAVING THE COUNTRY. IN ADDITION, AFTER SERVICE OF SENTENCE, HE SHALL BE ORDERED DEPORTED AND FOREVER BARRED INTO THE COUNTRY.\""

