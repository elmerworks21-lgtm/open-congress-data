congress_website_title = "AN ACT TO ENSURE THE FISCAL AUTONOMY OF THE JUDICIARY, CONSTITUTIONAL COMMISSIONS, OFFICE OF THE OMBUDSMAN AND THE COMMISSION ON HUMAN RIGHTS, PROVIDING FOR FLEXIBILITY IN THE UTILIZATION OF THEIR APPROVED APPROPRIATIONS AND AUTHORITY TO USE SAVINGSFOR CERTAIN PURPOSES CONSISTENT WITH ARTICLE VI, SECTION 25 (5) OF THE CONSTITUTION"
congress_website_abstract = "States that the Judiciary, the Civil Service Commission, the Commission on Audit, the COMELEC, the Ombudsman and the Commission on Human Rights shall be accorded FLEXIBILITY in the utilization of their approval appropriations, such as the -- (1) determination of the number of positions within the budgetary appropriation; and (2) the purchase of motor vehicles and other capital expenditures."

