congress_website_title = "AN ACT AMENDING SECTION ONE OF PRESIDENTIAL DECREE NO. 1866, AS AMENDED, OTHERWISE KNOWN AS 'CODIFYING THE LAWS ON IILEGAL/UNLAWFU L POSSESSION, MANUFACTURE, DEALING IN, ACQUISITION OR DISPOSITION, OF FIREARMS, AMMUNITION OR EXPLOSIVES OR INSTRUMENTS USED IN THE MANUFACTURE OF FIREARMS, AMMUNITION OR EXPLOSIVES, AND IMPOSING STIFFER PENALTIES FOR CERTAIN VIOLATIONS THEREOF AND FOR RELEVANT PURPOSES"
congress_website_abstract = "Provides some degree of liberality to vioaltors of this Act whose hold to firearms is not designed for illegal activities or in the commission of crimes. REMOVES the penalty of DEATH if a crime is committed with use of an unlicensed firearm."
