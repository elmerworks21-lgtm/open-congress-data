congress_website_title = "AN ACT AMENDING ARTICLES 135 AND 137 OF THE LABOR CODE (P.D. NO. 442, AS AMENDED) SO AS TO EXPAND THE PROHIBITED ACTS OF DISCRIMINATION AGAINST WOMEN ON ACCOUNT OF SEX, AGE, ETHNIC, ORIGIN OR BELIEFS"
congress_website_abstract = "Expands the prohibited acts of discrimination against women with respect to terms and conditions of employment so as to include favoring a male employee over a female employee as regard to: (1) job ASSIGNMENT; (2) HIRING, when the particular job canequally be handled by a women; and (3) DISMISSAL, RETRENCHMENT policy of the employer. Declares it unlawful for any employer to deny any woman the benefits of employment or other statutory benefits by reason of her sex, age, ethnic origin or beliefs or relations."
