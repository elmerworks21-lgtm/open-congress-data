congress_website_title = "AN ACT ESTABLISHING NATIONAL CEMETERIES AND PROVIDING FOR THEIR ADMINISTRATION AND MAINTENANCE"
congress_website_abstract = "Rationale: It is proposed that a number of national cemeteries be established such that there will be at least one (1) national cemetery in each region and major island. In this way, the government can offer each veteran, military personnel and distinguished citizens a final resting place which provides both distinction for the departed and convenience for the relatives they leave behind. These national cemeteries shall be established individually by presidential proclamation and shall be placed under the Philippine Veterans Affairs Office. Mandates the establishment of at least one (1) national cemetery in each region and major island to serve as a memorial and final resting place for veterans, military personnel and citizens who have rrendered distinguished service to the nation."

