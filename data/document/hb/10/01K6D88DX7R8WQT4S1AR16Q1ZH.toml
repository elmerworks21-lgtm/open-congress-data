congress_website_title = "AN ACT REQUIRING ALL MANUFACTURERS OF NON-BIODEGRADAB LE PLASTIC MATERIALS FOR CONSUMER PRODUCTS TO PRINT IN LEGIBLE OR BOLD LETTERS 'WARNING: NON-BIODEGRADAB LE. DO NOT THROW IN ANY WATER SYSTEM. DISPOSE PROPERLY' OR IN PILIPINO 'BABALA: HINDI NATUTUNAW. HUWAG ITAPON SA DAGAT, ILOG, ESTERO AT IBA PANG LAGUSAN NG TUBIG' OR ANY WORDS OF SIMILAR IMPORT ON THE SAID NON-BIODEGRADAB LE MATERIALS AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Imposes punishment for the violation of the provisions of this Act. Mandates the Department of Trade and Industry in coordination with the Department of Environment and Natural Resources to promulgate necessary rules and regulations for the effective implementation of this Act."

