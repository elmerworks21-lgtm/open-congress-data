congress_website_title = "AN ACT TO EQUALIZE THE NUMBER OF REGULAR MEMBERS OF THE SANGGUNIANG PANLALAWIGAN FOR EACH LEGISLATIVE DISTRICT IN A PROVINCE, AND FOR OTHER PURPOSES"
congress_website_abstract = "States that first and second class provinces shall each have TEN (10) REGULAR MEMBERS; third and fourth class provinces, SIX (6). Provides, further, that all legislative districts in a province shall have the same number of regular members."
