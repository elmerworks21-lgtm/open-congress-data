congress_website_title = "AN ACT REQUIRING THE JUDICIAL AND BAR COUNCIL TO CONDUCT A COMPREHENSIVE PUBLIC HEARING TO DETERMINE THE MERIT, FITNESS AND QUALIFICATIONS OF PERSONS NOMINATED TO THE JUDICIARY, AND FOR OTHER PURPOSES"
congress_website_abstract = "States that in case of any OPPOSITION, OBJECTION to the nomination of an applicant to the judiciary, the judicial and Bar Council shall under the nominee to defend himself in a public hearing to be called for the purpose. Failure to appear shall bedeemed as a voluntary withdrawal of the person's nomination."

