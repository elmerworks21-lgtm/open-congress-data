congress_website_title = "AN ACT PROVIDING FOR THE ASSIGNMENT, CONVEYANCE AND TRANSFER TO THE PROVINCIAL OR CITY GOVERNMENT CONCERNED OF ASSETS ACQUIRED AND HELD FOR OVER FIVE (5) YEARS BY GOVERNMENT FINANCING INSTITUTIONS FOR MONETIZATION OR DISPOSAL, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Acquired Assets Monetization Act of 1995\" Seeks to fully utilize the sale of idle acquired government assets by requiring all government financing institution to assign, convey and transfer such assets held for oever five (5) years to the provincial or city government concerned. Allocates the proceeds of the monetized or disposed assets as follows: (1) 30% for the national government; (2) 30% for the provincial/city government; and (3) 30% and 10% respectively for the municipality and barangay where these assets are located."

