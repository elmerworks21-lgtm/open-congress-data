congress_website_title = "AN ACT GRANTING A MONTHLY PENSION TO FILIPINO ATHLETES WHO WERE AWARDED GOLD, SILVER OR BRONZE MEDALS IN NATIONAL OR INTERNATIONAL ATHLETIC COMPETITIONS"
congress_website_abstract = "States that --- \"SECTION 1. Filipino athletes who were awarded gold, silver, or bronze medals in the Olympic Games shall be given a monthly pension for life. Official representatives of the country in other international athletic competitions who won gold, silver or bronze medals shall receive a monthly pension for a period not exceeding five (5) years. Medalists in national athletic competitions sponsored by the Philippine Sports Commission, the Department of Education, Culture and Sports orany other national government agency shall receive a monthly pension for a period not exceeding one (1) year."

