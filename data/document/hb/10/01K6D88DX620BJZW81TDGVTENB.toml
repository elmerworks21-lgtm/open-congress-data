congress_website_title = "AN ACT PROVIDING ADDITIONAL BENEFITS TO PUBLIC SCHOOL TEACHERS, AMENDING FOR THE PURPOSE THE MAGNA CARTA FOR PUBLIC SCHOOL TEACHERS"
congress_website_abstract = "Provides for the following additional benefits to public school teachers. (1) Special hardship allowance equivalent to at least [twenty-five per cent (25%)] THIRTY-FIVE PERCENT (35%) of their monthly salary. (2) Study leave not exceeding one schoolyear after EVERY THREE [seven] years of service to PURSUE A GRADUATE SCHOOL STUDY IN EDUCATION OR ALLIED COURSES. (3) Scholarship grant to at least TWO OF THEIR CHILDREN to any state college or university. (4) monthly longevity pay equivalent to TEN PER CENT (10%) of the monthly basic pay for each five years of continuous, efficient and meritorious service."

