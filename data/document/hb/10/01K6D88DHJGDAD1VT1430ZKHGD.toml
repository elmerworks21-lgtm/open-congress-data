congress_website_title = "AN ACT PROVIDING FOR AN EFFICIENT AND EXPIDITIOUS SYSTEM OF DISPOSING SEIZED ILLEGAL DRUGS, AMENDING FOR THE PURPOES THE DANGEROUS DRUGS ACT OF 1972"
congress_website_abstract = "States that the SEIZED PROHIBITED DRUGS SHALL BE TESTED, WEIGHED AND DESTROYED WITHIN TWENTY FOUR (24) HOURS UPON CONFISCATION, IN THE PRESENCE OF AT LEAST ONE REPRESENTATIVE EACH FROM DULY RECOGNIZED NON-GOVERNMENT ORGANIZATION (NGOs), RELIGIOUS ORGANIZATIONS, MEDIA AND DANGEROUS DRUGS BOARD. Provides, however that a maximum of ten (10%) per cent of the seized prohibited drugs shall be kept by the National Bureau of Investigation for testing purposes and as evidence."
