congress_website_title = "AN ACT CREATING THE OVERSEAS ENTERTAINMENT INDUSTRY BOARD (OEIB)"
congress_website_abstract = "Proposes the cretion of a \"single body to effectively and efficiently develop a system to cater to the needs of the entertainment industry.\" The proposed OEIB shall --- (1) act as clearing house for all training programs and technical assistance formanpower development programs affecting the industry; (2) formulate and implement measures to rationalize the recruitment and placement system and institutionaliz e ethical business standards within the industry in order to ensure the employemnt ofcertified artists and the participation of qualified entities; (3) promote the development of skills and careful selection of performing artists for overseas employment; and (4) institute a system for ensuring the speedy processing of pertinent documments for those who are qualified for deployment."

