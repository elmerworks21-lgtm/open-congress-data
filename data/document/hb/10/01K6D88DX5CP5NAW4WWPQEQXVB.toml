congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE NATIONAL HEALTH FACILITIES ENHANCEMENT PROGRAM, ESTABLISHING MECHANISMS AND APPROPRIATING FUNDS FOR ITS IMPLEMENTATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for an integrated and continuing Health Facilities Enhancement Program which shall (1) uplift the delivery of health services to the people; (2) improve the capability of local government units in efficiently delivering health services to their local constituency; (3) rationalize and optimize the utilization and development of health facilities and services; and (4) contribute to the general enhancement and improvement of the health conditions of the community."

