congress_website_title = "AN ACT RESTORING THE TAX EXEMPTION PRIVILEGES OF LOCAL WATER DISTRICTS UNDER SECTION 46 OF PRESIDENTIAL DECREE NO. 198 AS AMENDED AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares it the policy of the State to give priority to the operation and maintenance of reliable and economically viable and sound water supply for population centers of the country through the formation of local water districts. Declares the following --- \"SECTION 2. Water Districts shall likewise be exempted from the provision of R.A. 7656 requiring government-owne d and controlled corporations (GOCCs) to remit 50% of their annual net income to the National government,Prov ided, that the amount supposed to be remitted is utilized by the water district concerned, for the continuing expansion and improvement of its system.\""

