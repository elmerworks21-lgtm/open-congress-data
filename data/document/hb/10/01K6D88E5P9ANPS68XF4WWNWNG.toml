congress_website_title = "AN ACT PROVIDING FOR THE NATIONAL LAND USE POLICY AND PLANNING FRAMEWORK AND THE IMPLEMENTING MECHANISM THEREFOR, OTHERWISE KNOWN AS THE NATIONAL LAND USE ACT OF THE PHILIPPINES"
congress_website_abstract = "Proposes a NATIONAL LAND USE FRAMEWORK which defines the indicative priorities for land utilization and allocation; proposes likewise the creation of a NATIONAL LAND USE COORDINATING COUNCIL (NLUCC) under the Office of the President, as well as theestablishment of a land resource information and management system."
