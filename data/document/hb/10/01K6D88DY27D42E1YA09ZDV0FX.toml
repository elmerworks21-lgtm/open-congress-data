congress_website_title = "AN ACT STRENGTHENING FURTHER THE DISTRIBUTION AND PAYMENT OF THE SERVICE CHARGES IN FAVOR OF THE WORKERS BY PROVIDING PENAL SANCTIONS FOR VIOLATIONS THEREFOR AMENDING FOR THIS PURPOSE ARTICLE 96 OF THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Strengthens the provision on service charges collected by hotels, restaurants, lodging houses, night clubs, cocktail lounges, massage clinics, bars and similar enterprises distributed at 85% for all covered employees and 15% for management by PROVIDING FOR PENAL SANCTION IN CASE OF A VIOLATION OF THIS PROVISION BY A FINE NOT EXCEEDING TWENTY-FIVE THOUSAND (P25,000.00) PESOS AND IMPRISONMENT OF NOT LESS THAN ONE (1) YEAR NOR MORE THAN FIVE (5) YEARS. Provides, further, that IF THE VIOLATION IS COMMITTED BY A CORPORATION, TRUST OR FIRM, PARTNERSHIP, ASSOCIATION OR ANY OTHER ENTITY, THE PENALTY OF IMPRISONMENT SHALL BE IMPOSED UPON THE ENTITY'S OFFICERS AND IF CONVICTED, HE SHALL NOT BE ENTITLED TO THE BENEFITS PROVIDED FOR UNDER THE PROBATIOON LAW."

