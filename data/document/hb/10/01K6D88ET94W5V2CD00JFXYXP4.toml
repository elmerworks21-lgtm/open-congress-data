congress_website_title = "AN ACT MANDATING THE ESTABLISHMENT OF A PROGRAM OF EDUCATION DESIGNED TO HELP ALL MEMBERS OF THE COMMUNITY OF AN EDUCATIONAL INSTITUTION AVOID INVOLVEMENT WITH ILLEGAL DRUGS"
congress_website_abstract = "\"The Drug Abuse Prevention Program in Educational Institutions Act of 1997\" Declares the following --- \"SEC. 2. Declaration of Policy. It is the policy of the State to promote the health and well-being of the people and rear the youth for nation building. To this end, it is necessary to provide a program of education on the detrimental effects of the use of illegal drugs designed to help all members of the community of an educational institution avoid involvement with illegal drugs.\" >The educational program shall emphasize the following subjects: (1) the incompatibility of the use or sale of illegal drugs with the goals of the institution; (2) the legal consequences of involvement with illegal drugs; (3) the medical implications of theuse of illegal drugs; and (4) the ways in which illegal drugs jeopardize the individual's present accomplishments and future opportunities."

