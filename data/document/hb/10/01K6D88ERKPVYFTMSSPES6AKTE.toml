congress_website_title = "AN ACT TO ACCELERATE THE DEVELOPMENT OF AGRICULTURAL MECHANIZATION AND INFRASTRUCTURE, STRENGTHENING AND RATIONALIZING THE NECESSARY SUPPORT SERVICES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes the following activities aimed at accelerating the pace of agricultural mechanization and development of agricultural infrastractures : (1) Policy formulation and implementation of agricultural mechanization projects and activities, and provision and delivery of support facilities to the intended beneficiaries to realize the objectives of this Act; (2) Development and utilization of coordinative, consultative and monitoring and evaluation systems and mechanisms with the objective of ensuring an efficient and effective management of the Program at all levels of its implementation; (3) Research and development, and extension of appropriate, sustainable and environment and gender friendly agricultural mechanization technologies for ccrops, livestock and fishery production; and (4) Construction, installation, and upgrading of vital and mdoern agricultural infrastructures and facilities as defined in Section 3, paragraph 2 of this Act."

