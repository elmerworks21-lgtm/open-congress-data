congress_website_title = "AN ACT CREATING AND ESTABLISHING THE NATIONAL EMERGENCY RELIEF REHABILITATION AND INSURANCE OFFICE, DEFINING ITS POWERS, FUNCTIONS AND RESPONSIBILITIE S, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
