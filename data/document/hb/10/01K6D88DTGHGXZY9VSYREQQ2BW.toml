congress_website_title = "AN ACT ESTABLISHING RAPE VICTIMS ASSISTANCE CENTERS IN EACH CONGRESSIONAL DISTRICT AND CREATING RAPE CRISIS DESKS IN EVERY POLICE PRECINCT, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Establishes rape victims assistance centers in each congressional district which will specialize in and will be committed in assisting rape victims in alleviating their stree, tension and trauma. The centers will be manned by experts in handling the psychological, medical and legal aspects of the crime of rape, thus the centers will serve as immediate shelters for the victims. Creates rape crisis desk in every police precinct."
