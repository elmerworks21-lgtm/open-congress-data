congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A NATIONAL IDENTIFICATION SYSTEM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "States that a NATIONAL IDENTIFICATION SYSTEM shall be established in the country to be administered by the National Statistics Office. Prescribes these GUIDELINES: (1) the identification card shall be obligatory for all citizens of the Philippines who are at least eighteen (18) years old and above, and for all resident aliens; (b) the identification card shall be issued free of charge; (c) the identification card bearer shall be assigned a permanent number which shall be non-transferabl e, evenafter the bearer' death; and (4) adequate safeguards shall be provided to prevent the forgery of or unauthorized issuance of identification cards. States WHEN the ID shall be required; prescribes penalties for violation of this Act."

