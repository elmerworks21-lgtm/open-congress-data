congress_website_title = "AN ACT TO SPUR THE PLANTING OF A BILLION TREES, ESTABLISHING MINI-FOREST PARKS IN ALL CITIES AND MUNICIPALITIES, PROTECTING THE REMAINING NATURAL FORESTS AND FOREST PLANTATIONS, AND CREATING A FUND THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Billion Trees Act of 1995\" Provides for a sustainable forest development and management program on the replanting of denuded forest lands and idle alienable and disposable lands to be participated in by all sectors of society. Aims to plant both forest and fruit tree species in at least 500,000 hectares of open and denuded public forest lands and idele portions of alienable and disposable lands for the first five (5) years. Provides for other areas of concern, such as: (1) Reforestation by upland communities; (2) reforestation by AFP/PNP personnel; (3) reforestation by local governemnt units and by private individuals/cor porations; (4) and forest protection."
