congress_website_title = "AN ACT AMENDING SECTION 294 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, INCREASING TO FIFTY PERCENT (50%) THE SHARE OF THE LOCAL GOVERNMENT UNIT FOR DEVELOPMENT AND LIVELIHOOD PROJECTS DERIVED FROM THE DEVELOPMENTAND UTILIZATION OF THE NATIONAL WEALTH"
congress_website_abstract = "Proposes this amendment to Section 294 of the Local Government code: \"SECTION 294. DEVELOPMENT AND LIVELIHOOD PROJECTS. - The proceeds from the share of local government units pursuant to this chater shall be appropriated by their respective sanggunian to finance local development and livelihood projects: Provided, however, that at least [eight percent 80%] FIFTY PERCENT (50%) of the proceeds derived from the development and utilization of hydrothermal, geothermal, and other sources of energy shall be applied solely to lower the cost of electricity in the local government unit where such a source of energy is located.\""

