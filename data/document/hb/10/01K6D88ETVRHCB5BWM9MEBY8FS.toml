congress_website_title = "AN ACT DEFINING CERTAIN ACTS OR TRANSACTIONS IN GOVERNMENT OFFICES AS \"FIXING\" AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Rationale: Fixing has long been recognized as a source of graft and corruption and has been accepted as a common occurence in the bureaucracy. While government offices have set-up procedural rules to ensure expeditious actions, these rules have beentaken lightly by fixers who wrok in cahoots with certain public officials and employees in consideration of grease money and other forms of personal gain. \"Anti-Fixing Law of 1997\" Mandates the PUBLIC POSTING OF PROCEDURES --- \"All government offices, agencies, including government-owne d and/or controlled corporations, where the public transacts business on a regular and routinary basis, shall post signs in prominent places within their premises with the following information written in Pilipiino or in the local dialect.\" Provides other areas of concern, such as (1) Setting up of a Public Service Unit in each office; (2) staggard work hours; issuance of appointment ship; and wearing of name plates. Penalizes violation of this Act."
