congress_website_title = "AN ACT DECRIMINALIZING VAGRANCY AND PROSTITUTION FOR CHILDREN AGED BELOW EIGHTEEN (18) YEARS OR THOSE OVER BUT ARE UNABLE TO FULLY TAKE CARE OF THEMSELVES, AMENDING ARTICLE TWO HUNDRED TWO OF THE REVISED PENAL CODE, PROVIDING REHABILITATION PROGRAMS, AND APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "States that the term \"ANY PERSON in defining \"VAGRANTS\" under the Revised Penal Code SHALL NOT APPLY TO CHILDREN BELOW EIGHTEEN YEARS OF AGE OR THOSE OVER, BUT ARE UNABLE TO FULLY TAKE CARE OF THEMSELVES FROM ABUSE, NEGLECT, etc. BECAUSE OF A PHYSICAL OR MENTAL DISABILITY OR CONDITIONS. The same shall apply to \"PROSTITUTES\" as referred to in the Penal Code."
