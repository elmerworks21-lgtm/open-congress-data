congress_website_title = "AN ACT AMENDING SECTION 33 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, EXEMPTING COOPERATIVE VENTURES FROM TAXES AND FOR OTHER PURPOSES"
congress_website_abstract = "Amends Section 33 of RA 7160 to read as follows: \"SECTION 33. COOPERATIVE UNDERTAKINGS AMONG LOCAL GOVERNMENT UNITS. - Local government units may, through appropriate ordinances, group themselves, consolidate, CREATE SUBSIDIARY CORPORATIONS, COOPERATIVE VENTURES or coordinate their efforts, services and resources for purposes commonly beneficial to them. In support of such undertakings, the local government units involved may, upon approval by the sanggunian concerned after a public hearing conducted for the purpose, contribute funds, real estate, equipment, and other kinds of property and appoint or assign personnel under such terms and conditions as may be agreed upon by the participating local units through Memoranda of Agreement. SUCHH UNDERTAKINGS SHALL BE IN THE NATURE OF COOPERATIVE JOINT VENTURES AND SHALL BE EXEMPT FROM TAXES IN ACCORDANCE WITH EXISTING POLICES.\""

