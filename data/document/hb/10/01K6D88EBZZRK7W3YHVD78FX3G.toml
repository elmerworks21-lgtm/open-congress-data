congress_website_title = "AN ACT PUNISHING ANY OFFICER OR EMPLOYEE OF THE LAND TRANSPORTATION OFFICE WHO IS RESPONSIBLE FOR REGISTERING STOLEN MOTOR VEHICLE, INSERTING FOR THE PURPOSE A NEW SECTION BETWEEN SECTION FIFTY-SEVEN AND FIFTY-EIGHT OF REPUBLIC ACT NUMBERED FORTY-ONE HUNDRED AND THIRTY-SIX"
congress_website_abstract = "Penalizes any officer or employee of the Land Transportation Office (LTO) who is responsible for the registration of a STOLEN motor vehicle with a fine equivalent to the MARKET VALUE OF THE STOLEN MOTOR VEHICLE REGISTERED, OR IMPRISONMENT OF NOT LESS THAN ONE YEAR OR BOTH SUCH FINE OR IMPRISONMENT. States further that if such officer or employee be found guilty, he shall be DISMISSED from the service and shall be denied reinstatement or reemployment in the government service."

