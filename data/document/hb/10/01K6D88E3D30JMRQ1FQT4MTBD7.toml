congress_website_title = "AN ACT MAKING THE APPOINTMENT OF A SOCIAL WELFARE AND DEVELOPMENT OFFICER MANDATORY RATHER THAN OPTIONAL FOR MUNICIPAL GOVERNMENT, AMENDING FOR THE PURPOSE SECTION 483, PARAGRAPH 2 OF THE LOCAL GOVERNMENT CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the mandatory appointment of a MUNICIPAL SOCIAL WELFARE AND DEVELOPMENT OFFICER by amending SEction 483 of the Local Government Code of 1991 in order to compel all the municipalities to create such positions which is vital in the effective and efficient delivery of social welfare services at the municipal level."

