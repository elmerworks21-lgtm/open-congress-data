congress_website_title = "AN ACT ESTABLISHING THE NATIONAL SERVICE PROGRAM (NSP) FOR ALL STUDENTS IN HIGHER EDUCATIONAL INSTITUTIONS"
congress_website_abstract = "Rationale: For decades, there has been a clamor from all sectors of the academic community to make education responsive to the changes that occur in society and relevant to the needs of the times. While values re-orientation has been injected into various subjects, efforts failed to gain appreciation by the students because the teaching of these concepts remain to be limited in the classrooms. In this light, it has become necessary to redirect the students to the ethics of civic and social responsibility by incorporating experiential activities in the curriculum, activities which will be udnertaken in the communities. \"National Students SErvice Program Act of 1997\" Shall cover all able-bodied citizens, male and female, enrolled in the inittial baccalaureate degree courses; prescribes the service components of the Program as follows: (1) Military Training Service; (2) Civic Welfare Services; (3) Law Enforcement Service; and (4) Community Development Services. Provides penal sanctions."

