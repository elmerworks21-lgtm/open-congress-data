congress_website_title = "AN ACT MANDATING THE ELEVATION OF ANDRES BONIFACIO AS NATIONAL HERO, THEREBY ACCORDING HIM THE SAME TREATMENT AND DUE RESPECTS AS DR. JOSE RIZAL"
congress_website_abstract = "Mandates tht the following honors and special privileges be accorded to ANDRES BONIFACIO: (1) Inclusion in the Rizal curriculum of the life, works and writings of Bonifacio and the Katipunan; (2) Establishment of the Bonifacio Centennial Commission;(3) Celebration of an annual Bonifacio Week; and (4) Maintenance of the Bonifacio and Katipunan Park."

