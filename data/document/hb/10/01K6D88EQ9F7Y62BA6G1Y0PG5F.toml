congress_website_title = "AN ACT PROVIDING FOR THE MAXIMUM USE OF PHILIPPINE FLAG VESSELS AND AIR CARRIERS, FURTHER AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED EIGHT HUNDRED AND NINETY-FOUR, AS AMENDED, ENTITLED 'REQUIRING GOVERNMENT OFFICES, AGENCIES, INSTRUMENTALITI ES AND GOVERNMENT-OWNE D OR -CONTROLLED CORPORATIONS, PERSONS AND ENTITIES ENJOYING TAX EXEMPTION, INCENTIVES OR SUBSIDY FROM THE GOVERNMENT TO UTILIZE IN INTERNATIONAL TRANSPORTATION THE SERVICES OF THE PHILIPPINE FLAG AIR CARRIER AND SHIPPING LINES, AND FOR OTHER PURPOSES'"
congress_website_abstract = "Rationale: As an island nation, the Philippines is dependent upon air and sea transport for all foreign trade. Currently, the vast majority of imports and exports are carried by non-Filipino companies with vital markets such as Europe, the Middle East, Australia, and South America. The Philippines is entirely dependent upon foreign ocean and air carriers for the movements of Filipino exports. Transport freight revenue loses incurred by the Philippines is in the billions of pesos, leaving the Filipinos at the mercy of foreign lines when it comes to the economic security of their nation. Seeks to ensure that ALL \"taxpayer-suppo rted\" cargo imports are FIRST OFFERED to Philippine companies, thereby (1) ensuring the stability to the Philippinnes of an ocean and air carrier fleet,a s well as (2) securing a training ground for Filipino seaman and pilots."

