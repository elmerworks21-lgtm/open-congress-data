congress_website_title = "AN ACT CATEGORIZING CERTAIN DRUG PREPARATIONS AS DANGEROUS DRUGS, AMENDING FOR THIS PURPOSE REPUBLIC ACT NUMBERED 6425, AS AMENDED, OTHERWISE KNOWN AS THE DANGEROUS DRUGS ACT OF 1972, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines \"DANGEROUS DRUGS PREPARATIONS\" to include any compound solution or mixtur in whatever physical state, containing one or more dangerous drugs or their immediate precursors in combination with substances which are not prohibited, regualted orcontrolled, or one or more dangerous drugs substances or their immediate precursors in dosage form."
