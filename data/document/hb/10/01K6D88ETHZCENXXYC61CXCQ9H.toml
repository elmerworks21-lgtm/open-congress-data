congress_website_title = "AN ACT REQUIRING ALL LOCAL GOVERNMENT UNITS TO OBTAIN PUBLIC LIABILITY INSURANCE AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Sesk to substantiate Article 2189 of the Civil Code which states: \"Provinces, cities and municipalities shall be liable for damages for death of, or injuries suffered by, any person by reason of the defective condition of roads, streets, bridges, public buildings, and other public works under their control or supervisions.\" > Seeks, therefore, to institutionaliz e public liability insurance to facilitate the compensation for loss or damage caused by the defective condiction of roads, streets, bridges, public buildings, and other public works. With this bill, the payment of the compensation by the insurance companies shall be AUTOMATIC, pending the litigation."

