congress_website_title = "AN ACT EXEMPTING DULY REGISTERED COOPERATIVES AND THE LEASE OF RESIDENTIAL UNITS WITH MONTHLY RENTAL NOT EXCEEDING FIVE THOUSAND PESOS (P5,000.00) FROM THE VALUE-ADDED TAX AMENDING FOR THE PURPOSE THE NATIONAL INTERNAL REVENUE CODE AS AMENDED"
congress_website_abstract = "Declares the following EXEMPT from the VAT: (1) Transactions entered into by duly registered cooperatives under RA 6938 or the Cooperative Code of the Phil.; and (2) lease of residential units rented at not more than P5,000.00."
