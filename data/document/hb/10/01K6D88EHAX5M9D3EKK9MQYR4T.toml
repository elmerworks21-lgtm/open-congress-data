congress_website_title = "AN ACT PENALIZING REALTY DEVELOPMENT CORPORATIONS WHICH HAVE NEVER ACTUALLY ENGAGED IN ANY REAL ESTATE-RELATED OR SHELTER PROGRAM BUT HAVE AVAILED OF TAX HOLIDAYS AND OTHER CONCESSIONS GRANTED UNDER REPUBLIC ACT NUMBERED SEVENTY-TWO HUNDRED AND SEVENTY-NINE, AND OTHER PERTINENT LAWS"
congress_website_abstract = "Provides for the following --- \"SECTION 1. Any reality development corporation which has never actually engaged in any real estate-related socialized housing or shelter program but has availed of tax holidays and other concessions granted by the government under Republic Act No. 7279 and other pertinent laws, shall forfeit itss authority or license to operate and shall be imposed a fine of not less than One Hundred thousand Pesos (P100,000.00) but not more than One Million Pesos (P1,000,000.00).\""

