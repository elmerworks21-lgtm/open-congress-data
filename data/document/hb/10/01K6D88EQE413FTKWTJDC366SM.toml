congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 1161, OTHERWISE KNOWN AS THE 'SOCIAL SECURITY LAW', IN ORDER TO ENSURE THAT THE MONTHLY PENSION OF SSS PENSIONERS SHALL NOT BE LESS THAN THE APPLICABLE MINIMUM WAGE"
congress_website_abstract = "Rationale: The monthly pension symbolizes the fruit of the years of toil of each member employee. It serves as the reward for the labor which the member employee has rendered in all his years of service in the event that he decides to retire or becomes incapacitated to work. The monthly pension is made the basis for the payment of retirement benefits, disability benefits, dependent's pension and the like."

