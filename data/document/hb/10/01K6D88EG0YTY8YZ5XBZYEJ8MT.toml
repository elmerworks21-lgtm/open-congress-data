congress_website_title = "AN ACT AMENDING SECTION 23 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, REQUIRING THE NATIONAL ECONOMIC AND DEVELOPMENT AUTHORITY TO ALLOCATE FIFTY PERCENT( 50%) OF THE PROCEEDS FROM GRANTS OBTAINED UNDER REPUBLIC ACT NO. 8182 AS ASSISTANCE TO LOCAL GOVERNMENT UNITS"
congress_website_abstract = "Rationale: Section 23 of the Local Government Code of 1991 authorizes local chief executives to secure financial grants or donations from local and foreign assistance agencies to support the basic services and facilities devolved. On the other hand, Republic Act No. 8182 gives emphasis on the use of the proceeds of Official Development Assistance (ODA) to achieve equitable growth and development for the improvement of economic and social service facilities particulary in all local governmentunits. The title is self-explanator y."

