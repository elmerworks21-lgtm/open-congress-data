congress_website_title = "AN ACT REQUIRING MEMBERS OF PROFESSIONS TO RENDER VOLUNTEER SERVICE AS A REQUIREMENT FOR RENEWAL OF THEIR LICENSES"
congress_website_abstract = "\"Professionals Volunteer Act of 1996\" Rationale: A 1993 survey shows that there are only 6,913 government doctors and 1,895 government dentists to attend to a population of 68 million Filipinos. > As it is also the State's policy to inculcate socialresponsibility, this bill seeks tap professionals who have been granted the privilege to practice their professions to render volunteer work as a requisite for the renewal of their license."

