congress_website_title = "AN ACT TO ORDAIN REFORMS IN THE ELECTRIC POWER INDUSTRY AND THE GOVERNMENT ENERGY SECTOR TO ENSURE THE TOTAL ELECTRIFICATION OF THE PHILIPPINES AND SUSTAIN PARTICIPATION OF THE PRIVATE SECTOR IN POWER GENERATION, TRANSMISSION AND DISTRIBUTION, FOR SAID PURPOSES TO AMEND CERTAIN LAWS, AND FOR OTHER PURPOSES (omnibus electric power act)"
congress_website_abstract = "\"Omnibus Electric Power Industry Act of 1996\" Declares it the policy of the State --- (1) to ensure and accelerate the total electrification of the country; (2) to promote competition and accountability of industry participants; and (3) to enhance the inflow of private capital and broaden the ownersship base of the power generation, transmission and distribution subsectors."
