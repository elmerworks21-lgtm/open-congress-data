congress_website_title = "AN ACT AUTHORIZING THE ADMINISTRATOR OF THE NATIONAL STATISTICS OFFICE TO CORRECT CLERICAL OR TYPOGRAPHICAL ERROR IN THE CIVIL REGISTRY BOOKS WITHOUT NEED FOR JUDICIAL ACTION, AMENDING FOR THE PURPOSE ARTICLE 412 OF THE CIVIL CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Provides as follows: \"Art. 412. No entry in a civil register shall be changed or corected, without a judicial order [.] EXCEPT FOR CLERICAL OR TYPOGRAPHICAL ERROR WHICH MAY BE CHANGED OR CORRECTED BY THE ADMINISTRATOR OF THE NATIONAL STATISTICS OFFICE. UPON SUBMISSION OF AFFIDAVITS AND/OR OTHER WVIDENCE SETTING FORTH THE FACTS THAT LED SUCH ERROR IN THE ENTRY.\""

