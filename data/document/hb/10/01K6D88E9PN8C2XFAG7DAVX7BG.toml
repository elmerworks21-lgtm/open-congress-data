congress_website_title = "AN ACT STABILIZING THE PRICE AND SUPPLY OF RICE THROUGH A PALAY PRICE SUPPORT PROGRAM, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes a palay price support program whereby the government shall engage in the purchase of palay directly from the farmers and producers at fair and affordable prices. Authorizes, therefore, the NFA to accumulate stock of palay for national reserve sufficient for at least 90 days to tide the country over in time of emergency."

