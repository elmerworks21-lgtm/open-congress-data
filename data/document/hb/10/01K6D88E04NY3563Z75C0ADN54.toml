congress_website_title = "AN ACT AMENDING SECTION 27 OF BATAS PAMBANSA BILANG 68, OTHERWISE KNOWN AS THE CORPORATION CODE OF THE PHILIPPINES BY DISQUALIFYING DEALERS, BROKERS AND SELLERS OF SECURITIES, THEIR AGENTS AND THEIR RELATIVES BY CONSANGUINITY OR AFFINITY WITHIN THEFOURTH CIVIL DEGREE, FROM BECOMING DIRECTORS, TRUSTEES OR OFFICERS OF ANY CORPORATION"
