congress_website_title = "AN ACT GRANTING MONTHLY GRATUITY AND ADDITIONAL PRIVILEGES TO AN AWARDEE OF AN OLYMPIC GOLD MEDAL"
congress_website_abstract = "Rationale: It is only befitting, if not imperative, for the State to recognze and honor Filipino men and women who achieve the supreme distinction of receiving the most coveted Olympic gold medal. > Grants a monthly gratuity of P5,000.00 to every Filipino Olympic gold medalist, as well as the privilege of obtaining a collateral free loan of up to P1 M from government-owne d or controlled financial institutions."

