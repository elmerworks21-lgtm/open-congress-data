congress_website_title = "AN ACT CREATING THE NATIONAL COUNCIL FOR THE WELFARE OF SENIOR CITIZENS (NCWSC) AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines the objectives of the proposed Council, namely: (1) To prepare and adopt an integrated and comprehensive long-term National Geriatic and Rehabilitation Plan to ensure the protection of the rights of the senior citizens and provide them adequate health, geriatic, rehabilitative and socio-economic care and services; (2) To propose new policies and new legislation, or amendments to existing ones, that will ensure the attainment of its objectives; (3) To act as an over-all coordinating body, to rationalize the functions and activities of government agencies, nongovernment organizations, private entities and international organizations oeprating in the Philippines, and the affecting the senior citizens; (4) To ensure the fullest particiipation and involvement of senior citizens in the geriatic and rehabilitation process; and (5) To educate and re-orient the general public in its attitude and thinking towards senior citizens."

