congress_website_title = "AN ACT EXCLUDING THE OFFICIAL DEVELOPMENT ASSISTANCE (ODA) FROM THE FOREIGN DEBT LIMIT IN ORDER TO FACILITATE THE ABSORPTION AND OPTIMIZE THE UTILIZATION OF ODA RESOURCES, AMENDING FOR THE PURPOSE PARRAGRAPH 1, SECTION 2 OF REPUBLIC ACT NO. 4860"
congress_website_abstract = "\"Official Development Assistance Act of 1996\" Seeks to address the economic opportunities available to the country, the country's increasing economic needs and investments which require adequate financial funding and infrastructure support. The seeks to EXCLUDE the highly concessional OFFICIAL DEVELOPMENT ASSISTANCE or ODA loans from the foreign borrowing limit of $10 BILLION. ODA loans have the following advantages: (1) They provide CHEAPER sources of funds than commercial loans; (2) They have a longer maturity period and cheaper interest rates -- they exert LESS pressure on the coutnry's foreign exchange reserves; (3) They promote stability in domestic interest rates. The government does not need to compete with local private borrowerss or scarce financial resources."
