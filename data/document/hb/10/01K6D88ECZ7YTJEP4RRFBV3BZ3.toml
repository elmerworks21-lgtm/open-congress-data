congress_website_title = "AN ACT PROVIDING FOR THE PROMOTION OF HEALTH RESEARCH AND DEVELOPMENT, ESTABLISHING FOR THE PURPOSE THE NATIONAL INSTITUTES OF HEALTH (NIH) DEFINING ITS OBJECTIVES, POWERS AND FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines the nature of the proposed NATIONAL INSTITUTES OF HEALTH --- \"The National Institutes of Health (NIH) shall be the institutional home of research and extension units focused on health. It shall promote the conduct of and undertake health reserach including the basic, applied, policy, product, and operations types, and lead in the application and utilization of its research findings and conclusions. The NIH shall serve as coordinating and integrating body of all the Institutes mentionedin Section 10 as well as other institutes and health reserach programs which may be subsequently created after the effectivity of this Act. States the objectives of the NIH: (1) To enhance science and technology research and development in the filedd of health; (2) To nurture the development of institutes, study groups and research programs in that field; (3) To ensure the wide dissemination and utilization of research outputs; and (4) To complement graduate programs and development of facult"
