congress_website_title = "AN ACT AMENDING SECTION 10 OF REPUBLIC ACT NO. 7941, OTHERWISE KNOWN AS THE 'PARTY-LIST SYSTEM ACT'"
congress_website_abstract = "Rationale: Under the provisions of said R.A. No. 7941 particularly Section 10 thereof which gives the voter a second vote naming the party, organization, or coalition he wants represented in the House of Representatives in effect making the varioussectors fight each other to get a seat in congress, there is a distinct probability that certain sectors may not succeed in putting their representatives in Congress, thus defeating the very purpose of the Constitution in mandating a party-list election. >Amends, therefore, Section 10 of RA 7941 to read as follows: \"Section 10. - Manner of Voting. Every voter shall be entitled to ONE VOTE [two (2) votes: the first is a vote] for candidate for member of the House of Representatives in his legislaative district, and ONE VOTE EACH FOR A PARTY AND THE TWELVE (12) SECTORAL ORGANIZATIONS ENUMERATED IN SECTION 5 OF THIS ACT, THE RESPECTIVE VOTE TO BE CAST FOR THE PARTY, ORGANIZATION OR COALITION REPRESENTING A PARTICULAR SECTOR CHOSEN BY THE VOTER"

