congress_website_title = "AN ACT AUTHORIZING THE COMMISSION ON ELECTIONS TO USE AN AUTOMATED ELECTION SYSTEM NATIONWIDE IN THE MAY 11, 1998 NATIONAL AND LOCAL ELECTIONS AND IN SUBSEQUENT ELECTORAL EXERCISES AND PROVIDING FUNDS THEREFOR (computerized)"
congress_website_abstract = "Proposes an autoamted election system which shall utilize appropriate technology for voting and electronic devises for counting of votes and canvassing of results. The proposed System shall have the following features: (1) use of appropriate ballots; (2) stand-alone machine for counting votes; (3) automated system which can consolidate immedaite results; (4) provisions for audit trails; (5) minimum human intervention; and (6) adequate safeguard/secur ity measures."
