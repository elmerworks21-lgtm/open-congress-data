congress_website_title = "AN ACT EXEMPTING MONETARY AWARDS IN FAVOR OF WORKERS FROM TAXES AND OTHER ASSESSMENTS, AMENDING FOR THE PURPOSE ARTICLE 279 OF THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: It is generally conceded that workers' monetary claims mature into final and executory judgment only after the lapse of considerable period of time notwithstanding constitutional and statutory provisions mandating their speedy disposition(Section 16, Article III, 1987 Constitution; Article 277(e), Labor Code). Needless to state, these undue delays invariably diminish the value of whatever amounts that shall have been awarded in favor of the workers. Mandates, therefore, the following --- \"SECTION 1. NOTWITHSTANDING ANY PROVISION OF GENERAL OR SPECIAL LAW TO THE CONTRARY, ANY MONETARY AWARD IN FAVOR OF WORKERS IN ALL LABOR DISPUTES INCLUDING, BUT NOT LIMITED TO BACKWAGES, SEPARATION PAY, DIFFERENTIAL PAYMENTS, DAMAGES OR THE MONNETARY EQUIVALENT OF WORKERS OTHER PRIVILEGES OR BENEFITS, SHALL BE FREE FROM TAXES AND OTHER ASSESSMENTS. THE EXEMPTION PROVIDED HEREIN MAY BE WITHDRAWN ONLY BY A SPECIAL LAW EXPRESSLY REPEALING THIS PROVISION.\""

