congress_website_title = "AN ACT PROVIDING THAT ALL ARMORED VEHICLES SHALL BE TESTED AND CERTIFIED AS TO THEIR CAPABILITY BY THE PHILIPPINE NATIONAL POLICE BEFORE THE SAME ARE SOLD TO COMMERCIAL INSTITUTIONS OR ANY AUTHORIZED PERSON OR ENTITY, AMENDING FOR THE PURPOSE THE 'DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990'"
congress_website_abstract = "Authorizes the PNP to test and certify the capaibility of armored cars before these are sold for commercial purposes. Aims to reduce widespread robbery by ensuring that these cars which deliver valuable merchandise are technically sound to provide high-speed mobility, and are equipped with protective fire powers and personal protectors."

