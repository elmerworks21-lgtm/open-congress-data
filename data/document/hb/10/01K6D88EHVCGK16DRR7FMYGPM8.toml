congress_website_abstract = "Seeks to provide a six-year program towards this purpose, and which shall have the following components: (1) market information system; (2) functional linkage with research and development centers for technology transfer; (3) financial assistance tobarangays to cover the cost of salaries and allowances for trainors, etc.; and (4) functional linkage with possible sources of microenterprise financing."

