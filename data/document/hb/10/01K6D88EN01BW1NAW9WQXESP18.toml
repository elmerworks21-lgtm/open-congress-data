congress_website_title = "AN ACT MANDATING THE USE OF SEAT BELTS IN ALL VEHICLES AND PRESCRIBING A PENALTY FOR VIOLATION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the following --- :Section 1. Mandatory Installation of Seat Belts - All manufacturers, assemblers or importers of all types of motor vehicle in the country shall hereby be mandated to install seatbelts in all their manufactured, assembled or imported motor vehicles. The number of seatblets to be installed shall be according to the rated passenger capacity of each motor vehicle.\" \"Section 2. Penalty.- The officer, director, manager of the motor vehicle manufacturer, assembler, orimporter who fails to comply with the provision of this Act shall be punished by imprisonment of not less than one year. In addition, the operating license of the manufacturer, assembler, or importer shall be revoked.\""

