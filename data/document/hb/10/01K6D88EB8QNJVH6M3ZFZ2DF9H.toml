congress_website_title = "AN ACT DECLARING THE MONTH OF DECEMBER OF EVERY YEAR AS 'DISASTER-AT-SE A' AWARENESS MONTH AND PROVIDING CERTAIN MEASURES FOR SAFE SEA TRAVEL"
congress_website_abstract = "Tasks the Maritime Industry Authority (MARINA) to conduct an information campaign to raise public awareness on the hazards and risks of travelling at sea and to institute measures so that all the necessary precautions and safeguards can be taken. Aims to compel ship owners to review the seaworthiness of their vessels and to require higher standards of training for their crew."
