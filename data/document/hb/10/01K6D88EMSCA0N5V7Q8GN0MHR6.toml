congress_website_title = "AN ACT EXTENDING THE DUTY-FREE SHOPPING PRIVILEGES OF OVERSEAS CONTRACT WORKERS FROM ONE THOUSAND DOLLARS TO TWO THOUSAND DOLLARS ANNUALLY WHICH MAY BE AVAILED OF EVEN PRIOR TO THE ARRIVAL OF THE WORKERS IN THE PHILIPPINES"
congress_website_abstract = "As it is, the present duty-free privilege scheme allows the OCWs to avail of the privilege only upon their return to the Philippines, normally after two years stint. It is proposed that the said privilege be made available to them even prior to their return. Provides for the following --- \"SEC. 3. The duty-Free Philippines shall issue rules and regulations as may be necessary for the effective implementation of this Act which shall include the mechanism for availment of the $2,000.00 duty-freeshopping privileges of the OCW while still abroad and prior to his return to the Philippines, as well as the nature, sizes and kind of items to be sold by Duty-Free Philippines in all its outlets.\""

