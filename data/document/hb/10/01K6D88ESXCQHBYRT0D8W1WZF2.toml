congress_website_title = "AN ACT ESTABLISHING A COCONUT SEEDLING NURSERY IN EVERY COCONUT-PRODUCI NG BARANGAY AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The coconut industry needs to replace senile coconut trees planted in some one million hectares by the year 2000 in order to maintain, if not improve, its competitive position worldwide and to enhance the productivity and incomes of some20 million Filipinos dependent on the industry. > The most basic need for the attainment of this goal is good quality seednuts/seedli ngs. Mandates the following --- \"SECTION 1. There shall be established in every coconut-produci ng barangay a coconut seedling nursery, which shall be owned and/or maintained preferably by a coconut small farmers organization oeprating in the barangay. The Philippine Coconut Authority, in coordination with local government units and farmers' organizations conccerned, shall pool their resources for the attainment of the objectives of this Act.\""

