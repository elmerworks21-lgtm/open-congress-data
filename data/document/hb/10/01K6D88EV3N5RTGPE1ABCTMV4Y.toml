congress_website_title = "AN ACT GRANTING TAX CREDIT TO LESSEES OF CAPITAL EQUIPMENT UNDER FINANCIAL LEASE, AMENDING FOR THE PURPOSE SECTION 104 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "Rationale: The financial leasing transaction of finance companies necessarily involves the purchase or importaion of goods/equipment for which they pay the 10% VAT. Under the present law, VAT paid on the imported/locall y purchased equipment subject of a direct lease transaction, which is shifted to the VAT-registered lessee, shall not be allowed as input tax creditable against the output tax of the VAT-registered lessee. As a result, the lease transaction becomes more costly and less attractive as against loan financing and/or outright purchase, both of which are difficult to realize due to stringent colalteral requirements on the part of the lessee. >Provides for the following --- \" IN THE CASE OF FINANCIAL LEASE AS DEFINED HEREIN, WHHERE GOODS AND PROPERTIES ARE PURCHASED OR IMPORTED BY A FINANCE COMPANY ORGANIZED UNDER REPUBLIC ACT NO. 5980, WHICH GOODS AND PROPERTIES ARE SUBSEQUENTLY LEASED TO A VAT-REGISTERED PERSON AT WHOSE INSTANCE SAID GOODS AND PROPERTIES WERE PURCHASED O"

