congress_website_title = "AN ACT GRANTING NATIONAL ELECTRIFICATION ADMINISTRATION (NEA) EXCLUSIVE SUPERVISORY POWERS RELATIVE TO THE CONDUCT OF ELECTIONS OF ALL COOPERATIVE OFFICERS, AND THEREBY AMENDING FOR THIS PURPOSE PRESIDENTIAL DECREE NO. 269, OTHERWISE KNOWN AS THE \"NATIONAL ELECTRIFICATION ADMINISTRATION DECREE OF 1972\", AND FOR OTHER PURPOSE, THEREOF"
congress_website_abstract = "In addition to its other powers, the NEA is hereby empowered to --- \"(p) EXERCISE EXCLUSIVE SUPERVISION AND CONTROL OVER THE CONDUCT OF ELECTIONS OF ALL COOPERATIVE OFFICERS FOR THE PURPOSE OF ENSURING FREE, HONEST, PEACEFUL AND ORDERLY ELECTIONS AND SHALL: (i) EXERCISE THE POWER TO NULLIFY THE ELECTION RESULTS IF THE SAME IS TAINTED WITH FRAUD, VIOLENCE, INTIMIDATION, FORCE, THREATS AND OTHER SIMILAR ILLEGAL ACTS; (ii) DEPUTIZE LAW ENFORCEMENT AGENCIES AND INSTRUMENTALITI ES OF THE GOVERNMENTINCLUDING, THE ARMED FORCES OF THE PHILIPPINES, FOR THE EXCLUSIVE PURPOSE OF ENSURING THE CONDUCT OF FREE, ORDERLY, HONEST AND PEACEFUL ELECTIONS; (iii) PERFORM SUCH OTHER POWERS AND DUTIES AS MAY BE NECESSARY RELATIVE TO THE SUPERVISORY POWER OF THEE ADMINISTRATION OVER ELECTIONS OF ALL COOPERATIVE OFFICERS."
