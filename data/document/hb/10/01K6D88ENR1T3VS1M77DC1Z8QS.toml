congress_website_title = "AN ACT TO REQUIRE A DETAILED AND UNIFORM DISCLOSURE OF INFORMATION IN CONNECTION WITH APPLICATION AND SOLICITATION OF CREDIT AND CHARGE CARDS AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "\"Fair Credit and Charge Card Disclosure Act of 1997\" Provides for the following --- (1) the annual percentage rate applicable to extension of credit. Where more than one rate applies, the card issuer must also disclose the balances or range of balances to which each rate applies; (2) the annual or other periodic membership fee on the issuance or availability of credit or charge cards and any transaction charge for use of the card to purchase goods and services; (3) the grace of free period during which a cardholder may repay the balance without incurring a finance charge; and (4) the name of the balance calculation method used by the card issuer."

