congress_website_title = "AN ACT PROVIDING FOR HIGHER PENALTY FOR CRIMES OR OFFENSES WHERE THE OFFENDED PARTY OR COMPLAINANT IS A TOURIST OR TRANSIENT TO BE KNOWN AS 'THE TOURISTS' PROTECTION ACT'"
congress_website_abstract = "\"Tourists Protection Act\" Declares that in lieu of the penalties for vioaltion of the Revised Penal Code or other special laws already prescribed the PENALTY NEXT HIGHER in degree shall be imposed upon the offender where the offended party or complainant is a TOURIST OR TRANSIENT. Provides for (1) penalties for governmenty officers and employees; (2) speedy trial and trials in absention."

