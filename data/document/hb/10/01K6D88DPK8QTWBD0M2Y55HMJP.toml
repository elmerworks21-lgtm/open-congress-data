congress_website_title = "AN ACT CREATING THE NATIONAL COUNCIL FOR CHILDREN'S TELEVISION, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Children's Television Act of 1995\" Protects the youth's interests through the provision of television programs that will reflect their needs, concerns and interests and which do not exploit them. Establishes a NATIONAL COUNCIL FOR CHILDREN'S TELEVISION (NCCT) which shall be composed of five members from the sectors of educators, producers or media practitioners, parents and child-focused non-government organization."
