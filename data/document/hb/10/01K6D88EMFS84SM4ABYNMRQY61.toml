congress_website_title = "AN ACT REQUIRING PRIVATE ESTABLISHMENTS EMPLOYING MORE THAN ONE HUNDRED (100) PERSONNEL AND GOVERNMENT AGENCIES AND INSTITUTIONS TO PROVIDE SHUTTLE TRANSPORTATION FACILITIES FOR THEIR EMPLOYEES"
congress_website_abstract = "Rationale: With the present transportation and traffic situation in the country, especially in urban centers, most of the workers find it hard to commute from their home to their place of work and vice versa. Most of the time, they arrived in the office late. This constitute lost in manhours which result to reduction in production. To address the problems of both the employers and the employees, this bill is being introduced. States that private establishments shall be granted priority loanswith long terms from government financing institutions for them to purchase said transport facilities."

