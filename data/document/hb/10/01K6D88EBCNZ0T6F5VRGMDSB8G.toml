congress_website_title = "AN ACT GRANTING FREE EDUCATION AND SCHOLARSHIP GRANTS TO THE FAMILY OF MEMBERS OF THE PHILIPPINE NATIONAL POLICE WHO DIE IN THE PERFORMANCE OF DUTY, AND APPROPRIATING FUNDS THEREF0R"
congress_website_abstract = "Proposes to grant the folllowing benefits to the family of PNP members who die in line of duty: (1) free tertiary education in government schools; and an (2) annual asssitance to one (1) family member only as follows --- (a) For primary and elementary education - P5,000.00; (b) For secondary education - P8,000.00; (c) For collegiate education - P8,000.00"

