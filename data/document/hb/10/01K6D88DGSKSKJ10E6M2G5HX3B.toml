congress_website_title = "AN ACT AMENDING SECTION 32 OF REPUBLIC ACT NUMBERED 4670, OTHERWISE KNOWN AS THE MAGNA CARTA FOR PUBLIC SCHOOL TEACHERS"
congress_website_abstract = "Penalizes any person who willfully interferes with, restrains or coerces any teacher in the exercise of his rights with a fine of not less than one THOUSAND (P1,000.00) pesos nor more than TEN thousand (P10,000.00) pesos, or by imprisonment of SIX MONTHS BUT NOT MORE THAN SIX YEARS OR BOTH, in the discretion of the Court."
