congress_website_title = "AN ACT STRENGTHENING AND RATIONALIZING THE ROLE AND AUTHORITY OF THE COMMISSION ON HIGHER EDUCATION IN THE GOVERNANCE OF PUBLIC HIGHER EDUCATION INSTITUTIONS, ITS MEMBERSHIP IN THE CABINET, IN NATIONAL AND INTERNATIONAL EDUCATION BODIES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Underscores the role of the COMMISSION ON HIGHER EDUCATION CHED that of being at the apex of the Philippine educational system. Declares that the CHED Chairperson shall serve as chairperson of the governing boards of all state universities and colleges; provides, likewise, for these concerns: (1) portfolio membership in the cabinet, and (2) role of the CHED in higher education to lies/entities."

