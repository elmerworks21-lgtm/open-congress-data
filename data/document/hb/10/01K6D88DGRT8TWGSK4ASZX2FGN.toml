congress_website_title = "AN ACT REQUIRING ALL LIQUIFIED PETROLEUM GAS (LPG) MANUFACTURERS TO ADOPT A UNIFORM TYPE OF VALVE AND REGULATOR APPLICABLE TO ALL KINDS OF ELEVEN KILOGRAM (11 KG.) CYLINDER AND TO INSTALL AN EFFECTIVE MEASURING DEVICE IN THE CYLINDER TO ACCURATELY DETECT THE ACTUAL WEIGHT OF EACH CYLINDER"
congress_website_abstract = "Requires the liquified petroleum gas (LPG) manufacturers to adopt a standard type of cylinder valve and regulator applicable to all kinds of eleven kilogram (11 kg.) cylinder so as not to burden the consumers of the non-availabilit y of any particular brand, and to install an effective measuring devise to accurately detect actual weight."

