congress_website_title = "AN ACT PROVIDING FOR SCHOLARSHIPS AND OTHER BENEFITS FOR PUBLIC AND PRIVATE SCHOOLTEACHERS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: It is quite disappointing to read reports of the Commission on Higher Education that more than half of the 500,000 instructors and professors in 1,269 public and private colleges and universities nationwide are not academically qualifiedto teach. This is so because they lack the minimum requirement of a masters degree in the arts or sciences. Moreso CHED contends that this was one of the main factors which contributed to the decline of the quality of education in higher learning institutions. Prescribes the criteria to qualify for said scholarship; covers graduate and post-gradaute courses. Provides, likewise, for educational benefits to the recipient's children, including a longevity pay for the teachers."

