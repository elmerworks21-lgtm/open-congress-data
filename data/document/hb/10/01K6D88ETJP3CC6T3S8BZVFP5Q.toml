congress_website_title = "AN ACT FURTHER AMENDING ARTICLE THREE HUNDRED FORTY OF THE REVISED PENAL CODE, AS AMENDED, BY INCLUDING THE UNDUE COMMERCIAL EXPLOITATION OF CHILDREN IN SEXUALLY EXPLICIT ACTIVITIES IN THE DEFINITION OF THE CRIME OF CORRUPTION OF MINORS AND MODIFYING THE PENALTY THEREOF"
congress_website_abstract = "Seeks to amend Art. 340 of the Revised Penal Code, as amended, with the following: \"Art. 340. Corruption of Minors - Any person who shall promote or facilitate the prostitution or corruption of persons underage to satisfy the lust of another, INCLUDING THE UNDUE COMMERCIAL USE OF SUCH EPRSONS IN SEXUALLY EXPLICIT ACTIVITIES, shall be punished by prison mayor, and if the culprit is a public officer or employee, including those in government-owne d or controlled corporations, he shall also sufferthe penalty of temporary absolute disqualificatio n. IF THE OFFENDER IS THE PARENT OR THE APPOINTED GUARDIAN OF THE MINOR, THE PENALTY TO BE IMPOSED SHALL BE RECLUSION TEMPORAL IN ITS MINIMUM PERIOD.\""

