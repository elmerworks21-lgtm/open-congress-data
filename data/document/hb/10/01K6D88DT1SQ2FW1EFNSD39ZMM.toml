congress_website_title = "AN ACT PROVIDING FOR A SUSTAINABLE MANAGEMENT OF FOREST RESOURCES"
congress_website_abstract = "Adopts the following policies: (1) Sustainable forest management and development shall be the guiding principles in the management, protection, conservation and development of forest resources; (2) The protection and rehabilitation of forest lands and national parks shall be given priority; (3) The establishment of specific limits of forest lands and national parks, etc."
