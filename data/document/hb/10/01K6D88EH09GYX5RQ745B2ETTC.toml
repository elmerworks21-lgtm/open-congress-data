congress_website_title = "AN ACT TO REPEAL THE DOWNSTREAM OIL INDUSTRY DEREGULATION ACT OF 1996, OTHERWISE KNOWN AS REPUBLIC ACT NO. 8180"
congress_website_abstract = "Rationale: \"Last August 12, 1996, Phase I (Transition Phase) of the deregulation Act took effect. During this initial phase the prices of petroleum products, such as unleaded, premium, regular and diesel fuel increased. Thus, raising the prices of prime commodities and imposed a negative effect on the lives of those who are from the middle income bracket and most especially those who live below the poverty line.\""

