congress_website_title = "AN ACT TO PROVIDE MECHANISM FOR COMMUNITY-BASED PROTECTION, UTILIZATION AND CONSERVATION OF THE NATIONAL WEALTH"
congress_website_abstract = "States that any corporation awarded a concession for the use and exploitation of the national wealth shall reserve ten percent (10%) of its authorized capital stock for subscription by the local government unit. The corporation shall reserve AT LEAST ONE (1) SEAT in the Board of Directors for the representative of the LGU --- such representative shall be the chief executive of the barangay where the concession is located."

