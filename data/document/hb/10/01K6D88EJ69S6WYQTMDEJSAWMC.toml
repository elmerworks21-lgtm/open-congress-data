congress_website_title = "AN ACT ESTABLISHING A COMMISSION FOR SENIOR CITIZENS AND FOR OTHER PURPOSES"
congress_website_abstract = "States the following OBJECTIVES of the proposed Commission: (1) To promote senior citizens empowerment through the policies and programs for their effective participation as full partners in the social, economic and political development as well asin nation-building ; and (2) To enable government agencies to effectively address senior citizens' concerns in developmental processes, from planning, programming, budgeting, implementation, monitoring, and evaluation in the national and local levels."

