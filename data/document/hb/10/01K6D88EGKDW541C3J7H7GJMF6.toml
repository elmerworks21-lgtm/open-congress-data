congress_website_title = "AN ACT INCREASING THE FUNDING OF THE SUPPORT SERVICES FOR FARMER-BENEFICI ARIES, AMENDING FOR THE PURPOSE THE COMPREHENSIVE AGRARIAN REFORM LAW OF NINETEEN HUNDRED EIGHTY-EIGHT, AS AMENDED"
congress_website_abstract = "Proposes this amendment to the Comprehensive Agrarian Reform Law, RA 6657: \"SEC. 36. Funding for Support Services. In order to cover the expenses and cost of support services, [at least twenty-five percent (25%)] FIFTY PERCENT (50%) of all appropriations for agrarian reform shall be [immediately] set aside and made available for this purpose. In addition, the Department of Agrarian Reform shall be authorized to package proposals and receive grants, aid and other forms of financial assistancefrom any source.\""

