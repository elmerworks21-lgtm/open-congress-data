congress_website_title = "AN ACT PROVIDING FOR INPUT TAX PAID BY THE LESSEE ON FINANCIAL LEASES, AMENDING FOR THE PURPOSE SECTION 104 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED BY REPUBLIC ACT NO. 7716, AND FOR OTHER PURPOSES"
congress_website_abstract = "States that in the case of FINANCIAL LEASE where goods/propertie s are purchased or imported by a finance company, which are subsequently LEASED to a VAT-registered person at whose instance said funds and properties were purchased or imported, theINPUT TAX paid by the lessee shall be credited against the output tax payable by said lessee."
