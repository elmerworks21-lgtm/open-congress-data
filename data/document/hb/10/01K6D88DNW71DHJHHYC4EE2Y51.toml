congress_website_title = "AN ACT PROVIDING FOR TEMPORARY UNEMPLOYMENT BENEFITS TO WORKER-MEMBERS OF THE SOCIAL SECURITY SYSTEM, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED ONE THOUSAND ONE HUNDRED AND SIXTY-ONE, OTHERWISE KNOWN AS THE SOCIAL SECURITY LAW, AS AMENDED, ANDFOR OTHER PURPOSES"
congress_website_abstract = "\"Unemployment Benefit Act of 1995\" States that a covered employee who has been separated from work shall compulsorily receive a monthly unemployment benefit equivalent to SEVENTY five percent (75%) of his former salary for three months. Prescribes conditions for qualifications and disqualificatio ns to the said benefit and cities those who are exempted from the grant."

