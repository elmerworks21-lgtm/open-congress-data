congress_website_title = "AN ACT TO ADOPT WITH MODIFICATIONS THE UNITED NATIONS COMMISSION ON INTERNATIONAL TRADE LAW (UNCITRAL) MODEL LAW ON COMMERCIAL ARBITRATION"
congress_website_abstract = "Rationale: Seeks to update and revise our existing Arbitration Law pursuant to Republic Act 876 and adopt with modifications the United Nations Commission on International Trade Law (UNCITRAL) Model Law on Commercial Arbitration. The Model Law was adopted by the UNICITRAL in its eighteenth 18th session on June 21, 1985 after due deliberation and extensive consultation with arbitral institutions and individual experts on international comemrcial arbitration and was recommended to all States foradoption. \"Philippine Commercial Arbitration Act of 1997\" Provides for the rule governing enforcement of foreign arbitral awards; provides, likewise, for domestic commercial arbitration."
