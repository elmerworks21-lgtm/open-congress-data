congress_website_title = "AN ACT RESTORING THE TERM OF OFFICE OF BARANGAY OFFICIALS TO FIVE (5) YEARS AS PROVIDED IN SECTION 2 OF REPUBLIC ACT NO. 6653 AND SECTION 1, PARAGRAPH 2 OF REPUBLIC ACT NO. 6679 REPEALING SECTION 43(c) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991 AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares the following --- \"Section 1. The term of office of barangay officials shall be restored to its original five year term as provided for in Section 2 of RA No. 6653 and Section 1, paragraph 2 of RA No. 6679, beginning on the first day of June following the election and until their successors shall have been elected and qualified.\""
