congress_website_title = "AN ACT INSTITUTIONALIZ ING A NATIONAL FACILITATION SERVICE NETWORK THROUGH THE ESTABLISHMENT OF A PUBLIC EMPLOYMENT SERVICE OFFICE IN EVERY PROVINCE, KEY CITIES AND OTHER STRATEGIC AREAS THROUGHOUT THE COUNTRY"
congress_website_abstract = "\"Public Employment Service Office Act of 1996\" Mandates the establishment of a PUBLIC EMPLOYMENT SERVICE OFFICE (PESO) in all capital towns of provinces, key cities and other strategic areas. Aims to provide a venue where people can explore variousemployment options, and to provide clients with adequate information on employment and labor market situation in the area concerned."

