congress_website_title = "AN ACT AMENDING SECTION 75 OF REPUBLIC ACT NO. 6975 OTHERWISE KNOWN AS THE 'DILG ACT OF 1990,' BY PROVIDING RETIREES OF THE PHILIPPINE NATIONAL POLICE (PNP) AUTOMATIC ADJUSTMENT IN THEIR MONTHLY PENSION BASED ON THE PREVAILING SCALE OF BASE PAY OF POLICE PERSONNEL IN THE ACTIVE SERVICE (retirement)"
congress_website_abstract = "Rationale: \"... there is NO specific provision in the DILG Act of 1990 authorizing the automatic adjsutment of monthly pension of PNP pensioners by way of a salary increase ... Members of the PNP who are still in the active service receive their increase automatically. On the contrary, retired PNP members are NOT entitled to an automatic increase ...\""
