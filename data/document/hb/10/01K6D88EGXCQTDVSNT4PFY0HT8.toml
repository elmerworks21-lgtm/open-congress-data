congress_website_title = "AN ACT SETTING THE TARIFF RATE ON IMPORTED CRUDE OIL AND IMPORTED REFINED PETROLEUM PRODUCTS AT A UNIFORM RATE, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED EIGHTY-ONE HUNDRED AND EIGHTY, OTHERWISE KNOWN AS THE 'DOWNSTREAM OIL INDUSTRY DEREGULATION ACT OF 1996', AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: RA 8180 contains provisions which will, in fact, prevent, rather than promote, attaintment of the declared \"policy of the State to deregulate the downstream oil industry to foster a truly competitive market ...\" Proposes amendments to RA8180, such as: (1) Provides a uniform 3% duty on both imported crude oil and finished petroleum products; (2) Seeks to eliminate the stIff criminal and administrative penalties for failure to maintain the minimum inventory requirement under Section6 of the Law; (3) Proposes to REPEAL Section 9(b) on \"predatory pricing;\" and (4) Resets the implementation of full deregulation on MARCH 1,2000."

