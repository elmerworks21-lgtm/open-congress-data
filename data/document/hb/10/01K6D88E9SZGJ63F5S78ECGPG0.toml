congress_website_title = "AN ACT PROVIDING ADDITIONAL DEATH BENEFITS FOR AGENTS, SPECIAL INVESTIGATORS AND OTHER PERSONNEL OF THE NATIONAL BUREAU OF INVESTIGATION WHO DIE IN LINE OF DUTY DUE TO EXTRAORDINARY COURAGE AND GALLANTRY, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Provides as follows --- \"SECTION 2. ADDITIONAL DEATH BENEFITS FOR THE NBI OFFICIALS AND EMPLOYEES - The legitimate wife and legitimate children of Agents, Special Investigators or other personnel of the NBI who officially assist/support their operatives in any legitimate oepration against suspected criminals shall be entitled to receive death benefits in the amount of FIVE HUNDRED THOUSAND PESOS (P500,000.00) in the event of these personnel is killed in the course of its execution."

