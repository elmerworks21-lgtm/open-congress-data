congress_website_title = "AN ACT TO ALLOW THE COUNTRYWIDE DEVELOPMENT FUND TO BE USED IN THE ESTABLISHMENT OF BOTIKA SA BARANGAY THROUGH THE BARANGAYS"
congress_website_abstract = "Rationale: One of the most serious problems of the poor and the elderly specially those living in the rural areas is the scarcity and the high cost of medicines. The constitution provides that priority should be given to the needs of the underprivileged sick and elderly. Nevertheless, the reality is that the poor and the elderly are still groaning under the prohibitive cost and unavailability of medicines. > A solution worth exploring is the establishment of small drugstores in the barangays orthe Botika sa barangay through the cooperative effort of the senior citizens and the barangays. \"Botika sa Barangay Act\" Provides for the following --- \"SEC. 4. Use of CDF as source of capital - Part of the Countrywide Development Fund of the Memberr of the House of Representatives of the District where the barangay is located or of a Senator may be used as a source of the operating capital of the Botika sa Barangay to be established, provided, that a counterpart fund equivalent to at least TWE"

