congress_website_title = "AN ACT AMENDING SECTION 69 OF BATAS PAMBANSA BLG. 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES (nuisance candidate)"
congress_website_abstract = "Rationale: The measure aims to uphold the integrity of elections by prohibiting nuisance candidates, as defined under this proposed measure, to participate in any electoral exercise and cause confusion to the electorate. Contains these key features:(1) those who use a similar name as the registered candidates; (2) those who have no bona fide intention to run as a candidate for an electoral; and (3) those who have been defeated in at least three (3) successive elections of the same elective position."
