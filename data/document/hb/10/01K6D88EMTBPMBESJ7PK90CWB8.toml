congress_website_title = "AN ACT TO DECLARE AS NATIONAL HEROES THOSE WHO LED THE REVOLUTION AGAINST SPAIN AND THE UNITED STATES IN MINDANAO"
congress_website_abstract = "Rationale: Only by recognizing the heroic struggle of the people of Mindanao against colonial rule and by declaring as national heroes the Mindanaoans who fought so that this nation may be free and independent can we achieve a truthful and truly national celebration of the Philippine Centennial and the unity of the entire Filipino people.> It is high time that we correct the injustice inflicted on our brothers in the South. Now is the opportune time to give recognition where it is due. This bill, if enacted into law, will make our celebration of the Centennial of the Philippine Independence truly national and complete."

