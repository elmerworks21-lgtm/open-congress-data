congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF BOOK III OF EXECUTIVE ORDER NO. 226, OTHERWISE KNOWN AS THE OMNIBUS INVESTMENTS CODE OF 1987, ALLOWING REGIONAL AREA HEADQUARTERS TO DERIVE INCOME FROM SERVICES RENDERED, GRANTING ADDITIONAL INCENTIVES, AND FOROTHER PURPOSES"
congress_website_abstract = "Allows the REGIONAL AREA HEAQUARTERS of multinational companies in the Philippines to render management services and training of the personnel of their subsidiaries, affiliates and branches in the Region. The headquarters may be allowed to DERIVE INCOME from any of the above services."
