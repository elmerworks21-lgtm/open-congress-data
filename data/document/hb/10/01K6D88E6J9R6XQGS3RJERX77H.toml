congress_website_title = "AN ACT AMENDING SECTION 2, SUB-PARAGRAPH (k) AND SECTION 5, SUB-PARAGRAPH (a) OF PRESIDENTIAL DECREE NUMBERED ELEVEN HUNDRED AND FORTY-SIX, OTHERWISE KNOWN AS THE REVISED GOVERNMENT SERVICE INSURANCE ACT OF 1977, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to amend and update certain obsolete provisions of PD 1146, the Revised Government Service Insurance Act of 1977, thereby proposing the following: (1) The average monthly compensation shall be based on the actual basic salary of a GSIS member,and NOT LIMITED to P3,000.00; (2) The rate of monthly contributions re RETIREMENT INSURANCE for both the employee and the employer shall be as follows: EMPLOYEE 5.5% - EMPLOYER 6.5%."
