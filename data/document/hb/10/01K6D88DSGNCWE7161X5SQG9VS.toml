congress_website_title = "AN ACT PROHIBITING TRADERS FROM PURCHASING PALAY BELOW THE GOVERNMENT-MAND ATED FLOOR PRICE, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Declares it UNLAWFUL for TRADERS TO PURCHASE PALAY BELOW THE GOVERNMENT-MAND ATED FLOOR PRICE. Allows the President of the Philippines, upon recommendation by the National Food Authority (NFA) through the Secretary of Agriculture, to periodically determine and set a reasonable floor price for palay after due consideration of the prevailing market price, the moisture content of the palay, and existing conditions affecting rice production."

