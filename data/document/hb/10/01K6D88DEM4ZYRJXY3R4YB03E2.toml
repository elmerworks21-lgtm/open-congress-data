congress_website_title = "AN ACT TO PROHIBIT SMOKING IN ENCLOSED AND/OR CONFINED PUBLIC AREAS, AND FOR OTHER PURPOSES"
congress_website_abstract = "States that smoking of cigarettes, cigars, pipes in enclosed and/or confined public areas, such as offices, restaurants, movie-houses and public conveyances is hereby PROHIBITED. Prescribes the penalty of a fine in the amount of P200.00 or imprisonment of two (2) days."
