congress_website_title = "ANTI-BANK ROBBERY AND PROTECTION ACT OF 1995"
congress_website_abstract = "Insures maximum oritection of lives and properties against BANK ROBBERIES and ensures that WITNESSES can effectively help law enforcers in the succesful prosecution of the perpetrators. Provides for these concerns: (1) security officer, security program and security devices; (2) the use of high powered firearms and standardized armored cars; (3) training of the security personnel under the supervision of the PNP or NBI; (4) increased penalties for persons connected with the bank or by police/military officials and (5) corrective actions for non-compliance by banks."
