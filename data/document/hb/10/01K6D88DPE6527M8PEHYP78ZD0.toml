congress_website_title = "AN ACT INCREASING THE AGRARIAN REFORM FUND (ARF) FROM FIFTY BILLION PESOS (P50 BILLION) TO ONE HUNDRED BILLION PESOS (P100 BILLION), AND AMENDING SECTION SIXTY-THREE OF REPUBLIC ACT NUMBERED SIXTY-SIX HUNDRED AND FIFTY-SEVEN (R. A. NO. 6657), OTHERWISE KNOWN AS THE COMPREHENSIVE AGRARIAN REFORM LAW OF NINETEEN EIGHTY-EIGHT, PROVIDING THAT THE AGRARIAN REFORM FUND (ARF) SHALL BECOME A REVOLVING FUND TO FINANCE THE IMPLEMENTATION OF THE CARP, AND FOR OTHER PURPOSES"
congress_website_abstract = "Increases the Agrarian Refrom Fund (ARF) and converting it into a Revolving Fund. Allocates funds from (1) LBP collections on loan repayments of ARF funds and land amortization by farmer beneficiaries of CARP; (2) 5% of the annual proceeds and otherincome accruing to PAGCOR; (3) other income such as lease rentals, derived from assets under the custodianship of the Asset Privatization Trust (APT); and (4) other government funds not otherwise appropriated."
