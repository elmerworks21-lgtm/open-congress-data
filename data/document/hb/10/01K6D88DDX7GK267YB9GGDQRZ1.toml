congress_website_title = "AN ACT TO AMEND PRESIDENTIAL DECREE NO. 979, OTHERWISE KNOWN AS THE MARINE POLLUTION DECREE OF 1976"
congress_website_abstract = "\"The Oil Spill Clean Up Law of 1995\" Penalizes the owners and operators of vessels from which oil and other harmful substances are discharged and requires them to eliminate and clean-up such spillage. Empowers the Department of Environment and Natural Resources to issue rules and regulations relevant to the cleanup, as well as the issuance of clearance certificate required in this Act."

