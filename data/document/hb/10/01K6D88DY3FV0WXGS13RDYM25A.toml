congress_website_title = "AN ACT ESTABLISHING A NATIONAL CELLULAR AND WIRELESS TELEPHONE PROGRAM"
congress_website_abstract = "\"National Cellular and Wireless Telephone Act of 1995\" Requires the Department of Transportation and Communications (DOTC) to implement a FIVE-YEAR NATIONAL CELLULAR AND WIRELESS TELEPHONE PROGRAM using a combination of government and private investments in an environment of free competition and mandatory iterconnection. Towards this end, all landline telephone programs of the government shall be revised and appropriated, contracts under negotiations shall be reprogrammed and redirected."

