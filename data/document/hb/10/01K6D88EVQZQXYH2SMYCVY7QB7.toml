congress_website_title = "AN ACT GRANTING ALL PUBLIC EMPLOYEES IN THE GOVERNMENT A CREDIT-CHARACTE R LOAN OF ONE HUNDRED THOUSAND PESOS (P100,000.00) FROM THE GOVERNMENT SERVICE INSURANCE SYSTEM (GSIS) PAYABLE FROM THE PROCEEDS OF THEIR RETIREMENT AND GRATUITY BENEFITS AS THEIR COLLATERAL WHEN THEY RETIRE FROM THE SERVICE"
congress_website_abstract = "Declares the following --- \"Section 1. All public employees shall upon application from the Government Insurance System (GSIS) be granted a credit-characte r loan of ONE HUNDRED THOUSAND PESOS (P100,000.00) payable from the proceeds of their retirement/grat uity benefits when they retire from the service plus five percent (5%) annual interest from the principal amount. Section 3. The loan capital plus the 5% interest earned shall be deducted against the retirement pay paid to the government employee upon their retirement from the service.\""

