congress_website_title = "AN ACT TO PROVIDE INCENTIVES FOR AND ENCOURAGE CONSERVATION MAINTENANCE OF FOREST COVER AND TREE PLANTING IN ANCESTRAL LANDS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides incentives for the conservation of forest cover or reforestation of ancestral lands by: (a) requiring the government to pay rentals for the use of ancestral lands as forest cover and tree planting; (b) recognizing that the land is ancestralland claimed as owned by members of an indigenous cultural community; and (c) exempting ancestral lands under lease as forest cover from the payment of real estate taxes."

