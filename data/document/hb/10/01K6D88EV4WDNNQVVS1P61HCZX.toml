congress_website_title = "AN ACT LIFTING THE GROSS RECEIPTS TAX EXEMPTION OF THRIFT BANKS, AMENDING FOR THE PURPOSE SECTION 119 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "Rationale: This bill seeks to impose a gross receipts tax on interest, commissions and other income from lending activities of thrift banks, to promote equity and uniformity in taxation, level the playing field in the banking and financial sector of the economy and improve the revenue collection of the government. > States that there shall be collected a tax on gross receipts derived from sources within the Philippines by all banks INCLUDING THRIFT BANKS and nonbank financial intermediaries according to a specified schedule."

