congress_website_title = "AN ACT PROHIBITING THE USE, PRODUCTION, SALE, DISTRIBUTION OR DISPENSATION OF ABORTIVE DEVISES AND DRUGS, DEFINING THE SAME, PROVIDING PENALTIES THEREFOR AMENDING FOR THE PURPOSE THE REVISED PENAL CODE OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Abortive Devices and Drugs Act of 1994\" Prohibits the use, production, sale, distribution or dispensation of abortive devices and drugs. Defines \"ABORTIVE DEVICES\" as any instrument, device, material which: (a) prevents implantation of fertilized ovum; (b) creates an environment hostile to the fertilized ovum. Defines further, abortive drugs as any drug, chemical or agen introduced through the rectal, intramuscular, intravenous or other similar routes which directly or indirectly interfere to the implantation and hormonal development of the fetus."

