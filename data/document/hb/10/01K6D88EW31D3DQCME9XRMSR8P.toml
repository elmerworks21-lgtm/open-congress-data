congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF THE OMNIBUS ELECTION CODE (BP 881), AS AMENDED, RECLASSIFYING CERTAIN ELECTION OFFENSES INTO HEINOUS OFFENSES AND INCREASING THE PENALTY THEREOF"
congress_website_abstract = "RECLASSIFIES the following prohibited acts as HEINOUS OFFENSES: (1) VOTE-BUYING AND VOTE-SELLING - Any person who gives, offers, or promises any office or employment, franchise or grant, public or private, or makes or offers to make an expenditure to be made to any person, association, corporation, entity, or community in order to induce anyone or the public in general to vote for or against any candidate or withhold his vote in the lection, or to vote for or against any aspirant for the nomination or choice of a candidate in a convention or in a similar election process of a political party; (2) CONSPIRACY TO BRIBE VOTERS. - Two or more persons, whether candidates or not, who come to an agreement concerning the commission of any violationn of above-mentioned provisions; (3) COERCION OF SUBORDINATES. - Any public officer, or any officer of any public or pricate corporation or association or any head, superior, or administrator of any religious organization, or any employer, or landown"
