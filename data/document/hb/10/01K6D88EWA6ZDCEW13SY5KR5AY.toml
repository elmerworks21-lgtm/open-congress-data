congress_website_title = "AN ACT CREATING A SPECIAL ELECTION FUND BY IMPOSING AN ELECTION GARBAGE LEVY TO CANDIDATES IN THE NATIONAL, LOCAL AND BARANGAY ELECTIONS, TO BE KNOWN AS ELECTION GARBAGE FUND OF 1997, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Election Garbafe Fund of 1997\" Declares the following objectives: (1) To establish a COMELEC task force that shall implement the removal of eye sore election posters, garbage, and other election paraphernalia and cleaning of all posting areas immediately after each election exercise; and (2) To collect an appropriate amount from every candidate in all urban cities, provinces, municipalities and barangays that shall be used in the removal of all the eye sore election poster, garbage and other election paraphernalia and cleaning of all posting areas immediately after each election exercise. > Covers all candidates in any elections national, local or barangay."

