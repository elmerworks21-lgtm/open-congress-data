congress_website_title = "AN ACT PROVIDING THE REPRESENTATION OF EXPORTERS IN THE GOVERNING BOARD OF THE SUGAR REGULATORY ADMINISTRATION, AMENDING FOR THIS PURPOSE, SECTION 4 OF EXECUTIVE ORDER NO. 18, ENTITLED 'CREATING A SUGAR REGULATORY ADMINISTRATION'"
congress_website_abstract = "Despite having as its objective the development of the sugar industry for export, the sugar exporters are not specifically represented in the policy-making body of the Sugar Regulatory Board. The Executive Order merely provides that the two privatesector representatives represent the millers and the planters. With the representation of the exporters in the Governing Board of the SRA, it will be assured that the policies and programs for the sugar industry will take into consideration the actual experiences of exporting."

