congress_website_title = "AN ACT EXPANDING THE JURISDICTION OF THE SANDIGANBAYAN, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 1606, AS AMENDED, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Increases the number of Associate Justices from [eight] to FOURTEEN (14); specifies that cases originating from the three (3) geographical regions be tied in those regions , subject to exemptions; expands the jurisdiction of the Sandiganbayan to include POLICE OFFICIALS OF LOWER RANK if the PNP officer is a provincial direction."
