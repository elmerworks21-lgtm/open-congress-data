congress_website_title = "AN ACT EMPOWERING LOCAL GOVERNMENT UNITS TO ISSUE CERTIFICATES OF PUBLIC CONVENIENCE TO MOTORIZED BANCAS THEREBY DEVOLVING SAID POWER FROM THE MARITIME INDUSTRY AUTHORITY"
congress_website_abstract = "Rationale: In the rural areas, particularly in the Visayas and Mindanao provinces and coastal towns, the common man's basic needs of sea transportation is the motorized banca. Even in the coastal towns of Central Luzon, the motorized banca is the primary means of transporting goods and people by river and sea. > Under the present law, the motorized banca owner/proprieto r is required to file his petition for the issuance off a certificate of public convenience in Manila with the Maritime Industry Authority (MARINA). there is a need for him to be represented by a lawyer as there is that requirement of a public hearing.\" States that thee power to issue Certificates of Public Convenience to motorized bancas shall be devolved from the Maritimme Industry Authority the principal business of the operation is located."

