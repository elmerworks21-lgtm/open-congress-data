congress_website_title = "AN ACT PRESCRIBING THE MANNER OF CHANGING THE COMPOSITION OF THE FIELD OFFICES OF THE COMMISSION ON ELECTIONS, AMENDING FOR THE PURPOSE SECTION 44 OF REPUBLIC ACT NO. 8189, ALSO KNOWN AS THE VOTER'S REGISTRATION ACT OF 1996"
congress_website_abstract = "Seeks to AMEND the provision of RA 8189, Voter's Registration Act of 1996, regarding 'REASSIGNMENT OF ELECTION OFFICERS\" with the following --- \"SEC. 44. Changes in the composition, distribution or assignment of field offices. The Commission may make changes in the composition, distribution and assignment of field offices, as well as its personnel, whenever the exigencies of the service and the interest of free, orderly, and honest election so require: Provided, that such changes shall be effective and enforceable only for the duration of the election period concerned and shall not constitute a demotion, either in rank or salary, nor result in change of status: and Provided further, that in no case shall a regional or assistant regional ddirector be assigned in a region; a provincial election supervisor to a province; or a city or municipal election officer to a city or municipality, where he and/or his spouse are related to any candidate within the fourth civil degree of consaguinit"
