congress_website_title = "AN ACT MAKING THE ABOT-KAYA PABAHAY FUND A REGULAR AND CONTINUING COMPONENT OF THE NATIONAL SHELTER PROGRAM AND EXPANDING ITS SCOPE OF OPERATIONS, THEREBY AMENDING REPUBLIC ACT NUMBERED 6846, OTHERWISE KNOWN AS THE 'SOCIAL HOUSING SUPPORT FUND ACT,'APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Abot-Kaya Pabahay Fund Amendment Act of 1995\" Assresses the problem of the lack of enough funding support for the housing industry, thereby expanding the level of the Abot-Kaya Pabahay Fund's amortization support, scope of developmental financing and cashflow guarantees. Introduces a liquidity support and interest shortfall subsidy system to strengthen the secondary mortgage market and other lending operations of the government."

