congress_website_title = "AN ACT MAINTAINING THE PRESENT PROGRAM ON THE DEPLOYMENT OF SKILLED AND UNSKILLED MIGRANT WORKERS ABROAD INTENSIFYING AT THE SAME TIME THE GOVERNMENT'S SKILLS DEVELOPMENT PROGRAM, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED EIGHTY HUNDRED AND FORTY-TWO, OTHERWISE KNOWN AS THE MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF 1995"
congress_website_abstract = "Directs the government to launch an intensive nationwide skills development program to adequately prepare Filipinos for employment here or abroad. Gives opportunities to unskilled workers to still find jobs abroad."

