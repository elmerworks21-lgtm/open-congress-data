congress_website_title = "AN ACT TO PROMOTE, REQUIRE, AND ENSURE THE PRODUCTION OF AN ADEQUATE SUPPLY, DISTRIBUTION, AND USE OF IODIZED SALT, TO PREVENT IODINE DEFICIENCY DISORDERS, AND FOR RELATED PURPOSES"
congress_website_abstract = "\"Salt Iodization Act of 1995\" Ensures the promotion, production and use of iodized salt as a cost-effective measure to prevent IODINE DEFICIENCY DISORDER (IDD) - cause of health consequences as goiter, hypothyroidism, cretinism, reproductive failure, physical and intellectual retardation and childhood mortality - thereby assuring a health citizenry. * * *"
