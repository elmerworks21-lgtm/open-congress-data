congress_website_title = "AN ACT FURTHER MODIFYING THE NOMENCLATURE AND RATES OF IMPORT DUTY ON CERTAIN AGRICULTURAL PRODUCTS LISTED IN SECTION 104 OF THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES, AS AMENDED, CREATING THE AGRICULTURAL PROTECTION TARIFFICATION FUND, AND PROVIDING FUNDS THEREFOR"
