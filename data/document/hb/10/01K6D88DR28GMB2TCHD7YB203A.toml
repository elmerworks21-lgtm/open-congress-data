congress_website_title = "AN ACT REQUIRING PRIOR CLEARANCE FROM THE LOCAL GOVERNMENT UNIT CONCERNED TO ESTABLISH AND OPERATE GAMBLING CASINOS IN ANY PART OF THE COUNTRY, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 1869, AS AMENDED, ENTITLED 'CONSOLIDATING AND AMENDING PRESIDENTIAL DECREE NOS. 1067-A, 1067-B, 1067-C AND 1632 RELATIVE TO THE FRANCHISE AND POWERS OF THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION (PAGCOR)"
congress_website_abstract = "Is based on the premise that local government units have the pulse of the sentiment of the people. Requires, therefore, the Philippine Amusement and Gaming Corporation (PAGCOR) to secure prior clearance from the local government concerned for it toestablish and operate gambling casinos."
