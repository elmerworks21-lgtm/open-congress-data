congress_website_title = "AN ACT PENALIZING ANY PERSON WHO CHECKED IN AS PASSENGER IN AN AIRLINE FLIGHT BUT FAILS TO TAKE THE SAME WITHOUT ANY VALID REASON"
congress_website_abstract = "Declares the following --- \"SECTION 1. Ang person who checked in as passenger in an airline flight but fails to take the same flight without any valid reason, shall be punished with imprisonment of not less than one (1) month but not more than six (6) months or a fine of not less than one thousand pesos (P1,000.00) but not more than five thousand pesos (P5,000.00) or both such imprisonment and fine at the discretion of the Court. > For purposes of this Act, the following circumstances shall beconsdiered as valid reasons in order to exempt a person from any laibility under this Act: death or serious illness of himself or any member of his immediate family, accident, sickness or any other incident caused by force majeure or forces beyond hiis control or any other similar causes as may be determined by the judge.\" Considers the following circumstances as valid reasons for EXEMPTION from the provision: (1) death; (2) serious illness; (3) accident or any other incident/ force beyond his c"

