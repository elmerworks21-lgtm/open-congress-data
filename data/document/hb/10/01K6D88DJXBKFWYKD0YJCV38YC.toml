congress_website_title = "AN ACT CREATING THE PHILIPPINE VETERANS AUTHORITY (PVA) UNDER THE OFFICE OF THE PRESIDENT, TO SUPERVISE AND CONTROL ALL VETERANS AFFAIRS, ABOLISHING THE PHILIPPINE VETERANS AFFAIRS OFFICE (PVAO), APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Veterans Act of 1994\" Abolishes the Philippine Veterans Office (PVGAO), thereby creating the Philippine Veterans Authority (PVA) under the Office of the President. The Authority shall provide adequate care, benefits and other assistanceto veterans, military retirees and their dependents."
