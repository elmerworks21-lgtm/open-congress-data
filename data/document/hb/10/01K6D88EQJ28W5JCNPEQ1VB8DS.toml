congress_website_title = "RN ACT PROVIDING FOR THE UTILIZATION OF IRRIGATION CANALS FOR PALAY-DRYING PURPOSES, CONCRETING PORTIONS THEREOF, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Rationale: the inadequacy of palay-drying pavements in the countryside is seriously hampering the immediate marketing of newly harvested palay due to the delay in the drying process. Despite the national policy and the proliferation of municipal ordinances banning the use of raods for palay-drying purposes, farmers still resort to this means because of the apparent inadequacy of space for the said purpose. Mandates the following --- \"SECTION 1. Irrigation canals throughout the country shall be used for palay-drying purposes and portions thereof shall be paved with concrete.\""

