congress_website_title = "AN ACT REQUIRING 'DISASTER AWARENESS. PREPAREDNESS AND HAZARD MITIGATION' AS PART OF THE REGULAR CURRICULUM OF ALL SECONDARY SCHOOLS IN THE COUNTRY AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: In a study done by the National Conference on Natural Diaster Mitigation in 1994, it was shown that the Filipinos as a people have been observed to be more reactionary than anticipatory in our disaster preparedness and hazard awareness.Therefore the most logical solution to this problem is to include diaster awareness, preparednessand hazard mitigation as part of ther egular curriculum of all secondary schools in the Philippines."

