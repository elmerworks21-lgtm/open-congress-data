congress_website_title = "AN ACT GRANTING GENERAL AMNESTY FOR YOUTHFUL OFFENDERS CONVICTED BY FINAL JUDGEMENT"
congress_website_abstract = "Defines \"YOUTHFUL OFFENDER\" as any individual over nine (9) years, but under 21 years of age. States that a youthful offender who has been convicted of final judgment shall upon application, be granted GENERAL AMNESTY, provide he/she is NOT a recidivist nor a habitual offender."

