congress_website_title = "AN ACT INCREASING THE CASH GIFT FOR ALL OFFICIALS AND EMPLOYEES OF THE NATIONAL GOVERNMENT AND LOCAL GOVERNMENT UNITS, INCLUDING BARANGAY OFFICIALS, TO FIVE THOUSAND PESOS (P5,000.00), AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED SIX THOUSAND SIX HUNDRED EIGHTY SIX AND FOR OTHER PURPOSES"
congress_website_abstract = "INCREASES the cash gift for all officials and employees of the national government and local government units to FIVE THOUSAND PESOS (P5,000.00) to be implemented over a period of THREE (3) YEARS, as follows: (1) P2,500.00 - Christmas Year 1996; (2)An additional P1,250.00 - Christmas Year 1997; (3) An additional P1,250.00 - Christmas Year 1998. Entitles officials and employees who have rendered less than four (4) months of service from January 1 to October 31 of each year and who are employedas of October 31 of the same year with the following cash gifts. Length of Service: 3 months but less than 4 months - P2,000.00; 2 months but less than 3 months - P1,500.00; 1 month but less than 2 months - P1,000.00; Less than one month - P500.00."
