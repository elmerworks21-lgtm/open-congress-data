congress_website_abstract = "Provides for the following --- (1) The application for concession shall be subject to public hearing by the barangay and municipal government concerned; (2) The corporation awarded a concession shall reserve 10% of its unauthorized stock for subscription by the local government unit. (3) The corporation shall reserve at least one seat in the Board of Directors for the local governemnt unit representative."

