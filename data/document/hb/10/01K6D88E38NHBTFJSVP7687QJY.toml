congress_website_title = "AN ACT PROHIBITING EDUCATIONAL INSTITUTIONS WHICH OFFER COURSES REQUIRING BOARD, BAR OR ANY LICENSING EXAMINATION FROM COMPELLING THEIR GRADUATES TO TAKE REVIEW CLASSES AND/ OR PRE-BOARD EXAMINATIONS IN THE SCHOOL OR COLLEGE OF WHICH HE IS A GRADUATE OF AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Considers it likewise UNLAWFUL for the said institution to WITHHOLD the transcript or scholastic record of the student if he does not take review classes and/or pre-board exams in his alma mater. Prescribes penalty for violation of this Act."

