congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8182, AND FOR OTHER PURPOSES(OFFICI AL DEVELOPMENT ASSISTANCE) (oda)"
congress_website_abstract = "Rationale: This bill seeks to provide LEGISLATIVE CONFIRMATION in no uncertain terms that the President's power to waive under RA 4860 applies to ODA loans under Ra 8182 and tht Congressional approval of ODA loans is to be obtained through the appropriations process. Proposes a NEW section to be added to RA 8182, which states that --- \"Section 11-A. IN THE CONTRACTING OF ANY LOAN, CREDIT OR INDEBTEDNESS UDNER THIS ACT OR ANY LAW, THE PRESIDENT OF THEE PHILIPPINES MAY, WHEN NECESSARY, AGREE TO WAIVE OR MODIFY THE APPLICATION OF ANY PROVISION OF LAW GRANTING PREFERENCE IN CONNECTION WITH, OR IMPOSING RESTRICTIONS ON, THE PROCUREMENT OF GOODS OR SERVICES, ACT NUMBERED FOUR THOUSAND TWO HUNDRED THIRTY-NINE, COMMONWEALTH ACT NUMBERED ONE HUDNREED THRITY EIGHT, THE PROVISIONS OF COMMONWEALTH ACT NUMBERED FIVE HUDNRED FORTY-ONE, INSOFAR AS SUCH PROVISIONS DO NOT PERTAIN TO CONSTRUCTION PRIMARILY FOR NATIONAL DEFENSE OR SECURITY PURPOSES.\""
