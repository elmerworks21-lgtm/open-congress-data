congress_website_title = "AN ACT PROVIDING THAT BAIL SHALL NOT BE REQUIRED IN ALL BAILABLE OFFENSES IMPOSING CONDITIONS FOR ENTITLEMENT TO THE PRIVILEGE"
congress_website_abstract = "Is in keeping with the cosntitutional precept that the accused is presumed innocent until proven otherwise. Intends to benefit more the poor litigants who might be extremely prejudiced by the requirement of the bail. Provides for the conditions of availment or entitlement of the privilege and the situations where it may be lost."

