congress_website_title = "AN ACT PROVIDING MEASURES FOR THE SAFETY OF PASSENGERS OF COMMERCIAL SEA VESSELS, AND PRESCRIBING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Rationale: Passengers of commercial vessels should be safeguarded and be prepared in the event of any disaster while traveling by sea, such as fire, collision, and other natural or man-made calamities. Provides for the following ---- \"SECTION 2. Onboard the vessel, there shall be conducted a demonstration on the use of life vests and lifeboats and an orientation on safety measures such as distribution of life vests, assignment of lifeboats, priority to be given to children and women, and suchother steps as may be necessary to ensure the safety of the passengers, in the event of disaster, man-made or natural, during the voyage."

