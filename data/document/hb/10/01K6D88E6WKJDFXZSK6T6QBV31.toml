congress_website_title = "AN ACT MAKING THE CRIME OF MURDER COMMITTED AGAINST MEMBERS OF THE PRESS WHO ARE KILLED IN LINE OF DUTY PUNISHABLE BY THE MAXIMUM PENALTY OF DEATH (MEDIA)"
congress_website_abstract = "States that --- \"ANY PERSON WHO, NOT FALLING WITHIN THE PROVISIONS OF ARTICLE TWO HUNDRED FORTY-SIX, SHALL KILL LEGITIMATE MEMBERS OF THE FOURTH ESTATE LIKE PUBLISHERS, EDITORS, SUBORDINATE EDITORS, DESKMEN, COLUMNISTS, REPORTERS, AND CORRESPONDENTSOF NEWS MEDIA LIKE NEWSPAPERS, NEWSMAGAZINES, AND NEWS AGENCIES OR NEWSWRITERS, REPORTS, NEWSCASTERS, AND COMMENTATORS OF RADIO AND TELEVISION NETWORKS IN CITIES AND/OR PROVINCES DULY EXISTING AND OEPRATING UNDER THE LAWS OF THE PHILIPPINES, WHO AREMEMBERS OF, OR IF NOT ARE AT LEAST RECOGNIZED BY, THEIR RESPECTIVE MOTHER ORGANIZATIONS GENERALLY KNOWN AND RECOGNIZED TO BE THE TRUE NATIONAL SOCIETIES FOUNDED AND ORGANIZED TO SERVE, SUPPORT AND PROMOTE THE INTERESTS OF THE PROFESSION OF JOURNALISSM IN THIS COUNTRY, SHALL BE GUILTY OF MURDER AS A HEINOUS CRIME AND SHALL BE PUNISED BY DEATH: PROVIDED, THAT SUCH VICTIMS ARE KILLED IN LINE OF DUTY.\""
