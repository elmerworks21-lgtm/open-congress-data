congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6982, OTHERWISE KNOWN AS 'AN ACT STRENGTHENING THE SOCIAL AMELIORATION PROGRAM IN THE SUGAR INDUSTRY, PROVIDING THE MECHANICS FOR ITS IMPLEMENTATION, AND FOR OTHER PURPOSES'"
congress_website_abstract = "Has the following objectives: (1) To underscore the need to supervise and monitor the distribution of the social amelioration cash bonuses to the sugar workers; (2) To ensure that the social amelioration fund is considered as private funds; (3) To ensure that all monies and funds as mandated under RA No. 809, The Sugar Act of 1952, be turned over to the Sugar Industry Foundation, Inc. to augment the funds for the projects of the sugar workers."

