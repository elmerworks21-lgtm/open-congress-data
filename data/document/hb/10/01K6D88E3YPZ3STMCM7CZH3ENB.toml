congress_website_title = "AN ACT ESTABLISHING THE NATIONAL MUSEUM ON WOMEN AND PROVIDING FOR ITS PERMANENT HOME"
congress_website_abstract = "Vests the proposed NATIONAL MUSEUM ON WOMEN with duties, such as: (1) To acquire, collect, preserve, maintain, administer cultural materials, objects of art, archaelogical artifacts, relics, etc embodying the evolution and development of the Filipino women; (2) To conduct researches on the prehistory of the Philippine to determine the role of women in Phil. history, etc."

