congress_website_title = "AN ACT AMENDING SECTION 1 OF REPUBLIC ACT NUMBERED SEVEN THOUSAND SIX HUNDRED FORTY-SEVEN ENTITLED, 'AN ACT PROVIDING FOR THE DATE OF REGULAR ELECTIONS FOR REGIONAL GOVERNOR, REGIONAL VICE-GOVERNOR AND MEMBERS OF THE REGIONAL LEGISLATIVE ASSEMBLY OFTHE AUTONOMOUS REGION IN MUSLIM MINDANAO"
congress_website_abstract = "Sets the REGULAR ELECTIONS for regional governor, regional vice-governor, and members of the Regional Legislative Assembly for the Autonomous Region in Muslim Mindanao on the second Monday of MARCH, 1993 and every three years thereafter. However, for 1996, the elections for regional governor, vice-governor and members of the Regional Legislative Assembly shall be held on September 9, 1996."
