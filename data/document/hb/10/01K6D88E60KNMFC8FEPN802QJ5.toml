congress_website_title = "AN ACT PROHIBITING THE USE OF THE WORDS 'MUSLIM' OR 'CHRISTIAN' IN PRINT AND BROADCAST MEDIA TO DESCRIBE ANY PERSON SUSPECTED OF OR CONVICTED FOR HAVING COMMITTED CRIMINAL OR UNLAWFUL ACTS AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Aims to be fair and just to the Muslim-Filipino s by protecting the innocent ones from being associated in the desription of criminals and other bad elements in society. Dissuades, therefore, the use of the word \"Muslim\" that may imply a negative connotation."
