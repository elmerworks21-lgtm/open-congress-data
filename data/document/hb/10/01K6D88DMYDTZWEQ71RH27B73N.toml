congress_website_title = "AN ACT TO INCLUDE WITHIN THE COVERAGE OF THE GOVERNMENT SERVICE INSURANCE SYSTEM THOSE ELECTIVE AND APPOINTIVE OFFICIALS WHO DO NOT RECEIVE ANY BASIC PAY OR SALARY BUT WHO ARE PAID ON PER DIEMS BASIS, AMENDING FOR THE PURPOSE SECTIONS TWO AND TEN OFPRESIDENTIAL DECREE NUMBERED ELEVEN HUNDRED FORTY-SIX, OTHERWISE KNOWN AS THE REVISED GOVERNMENT SERVICE INSURANCE ACT OF 1977, AS AMENDED"
congress_website_abstract = "Defines the term \"compensation\" as the basic pay or salary received by an employee, pursuant to his employment/appo intment's, excluding per diems, bonuses, overtime pay, and allowances. NOTWITHSTANDING THIS DEFINITION OF COMPENSATION, PER DIEMS RECEIVED BY ELECTIVE OR APPOINTIVE OFFICIALS WHO DO NOT RECEIVE ANY BASIC PAY OR SALARY SHALL BE TREATED AS COMPENSATION FOR PURPOSES OF COVERAGE UNDER THIS ACT. Amends the last paragraph of Section 10 of the said Presidential Decree by including the periods of service of elective and appointive official paid on per diems basis in the computation of service for their retirement."
