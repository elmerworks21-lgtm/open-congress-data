congress_website_title = "AN ACT DECLARING SEPTEMBER THIRTEEN OF EVERY YEAR AS \"BATTLE OF PULANG LUPA DAY\" AND A SPECIAL NON-WORKING NATIONAL HOLIDAY"
congress_website_abstract = "Rationale: September 13, 1898 is a day of victory for our Filipino forebears in their quest for independence from foreign domination. Our countrymen showed their patriotism when they revolted against the Americans who rules the Province of Marinduque. To commemorate said historical event, September 13 of every year was declared as Battle of Pulang Lupa Day and a special non-working holiday in the Province of Marinduque under Republic Act No. 6702. Viewed on a national perspective, the Battle ofPulang Lupa did not only benefit the people of Marinduque but all of the Filipinos in our quest for genuine independence."

