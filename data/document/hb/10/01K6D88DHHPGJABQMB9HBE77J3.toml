congress_website_title = "AN ACT PROVIDING FOR THE ORGANIZATION OF THE OFFICE OF THE OMBUDSMAN"
congress_website_abstract = "Declares it a State policy to uphold and maintain an efficient and service-oriente d bureaucracy and to promote honesty, integrity, and high standards of ethics in the public service. Creates an independent Office of the Ombudsman composed of (a) the Ombudsman to be known as Tanodbayan; (b) one over-all Deputy; (c) at least on Deputy each for Luzon, Visayas, and Mindanao; and (d) a separate Deputy for the military establishment. States that whenever necessary, Regional Tanodbayan may likewise be appointed."

