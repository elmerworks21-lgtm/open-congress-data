congress_website_title = "AN ACT ENHANCING THE POSITION CLASSIFICATION OF GUIDANCE COUNSELOR III AND GUIDANCE COORDINATOR IN PUBLIC ELEMENTARY AND SECONDARY SCHOOLS, FIXING THEIR MINIMUM SALARY GRADES, AMENDING FOR THE PURPOSE THE COMPENSATION AND POSITION CLASSIFICATION ACTOF 1989"
congress_website_abstract = "In the functional chart of the Division of City Schools, a Guidance Coordiantor directly reports to the principal of the school where he is assigned, lending his expertise to the direction, operation and supervision of elementary or secondary schoolguidance and counselling programs. The position is recognized as a responsible position because the person holding it is almost always appointed officer-in-char ge in the absence of the school principal or his assistant. In addition to the regular duties and responsibilitie s of his position, the Guidance Coordinator also serves as trainor and facilitator in special training programs on the district, division, regional and national levels. >Proposes the following salary grades for these two (2)) position titles: Guidance Cousnelor III - S.G. 16; Guidance Coordinator - S.G. 18."

