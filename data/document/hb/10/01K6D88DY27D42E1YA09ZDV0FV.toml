congress_website_title = "AN ACT ESTABLISHING A STATUTORY CLAUSE FAVORING WORKERS IN CASE OF DOUBT IN THE INTERPRETATION OF LABOR LEGISLATION AND ALL OTHER CONTRACTS INVOLVING RIGHTS AND BENEFITS OF WORKERS, AMENDING FOR THIS PURPOSE ARTICLE 4 OF PRESIDENTIAL DECREE NO. 442,AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
