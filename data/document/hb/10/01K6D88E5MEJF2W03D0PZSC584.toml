congress_website_title = "AN ACT PRESCRIBING THE MANNER OF PROVIDING SECTORAL REPRESENTATION IN THE SANGGUNIANG BAYAN AND SANGGUNIANG PANGLUNGSOD, AMENDING FOR THE PURPOSE SECTIONS FOUR HUNDRED FORTY-SIX AND FOUR HUNDRED FIFTY-SEVEN OF REPUBLIC ACT NUMBERED SEVEN THOUSAND ONE HUNDRED SIXTY, OTHERWISE KNOWN AS THE 'LOCAL GOVERNMENT CODE'"
congress_website_abstract = "Directs the REGULAR MEMBERS of the Sangguniang Bayan to ELECT FROM AMONG THEMSELVES the member who shall represent each of the following sectors: (1) labor (agricultural or industrial); (2) women; and (3) a sector of sufficient membership in the municipality as determined by the SB to warrant representation. the same shall apply to the Sangguniang Panlungsod."

