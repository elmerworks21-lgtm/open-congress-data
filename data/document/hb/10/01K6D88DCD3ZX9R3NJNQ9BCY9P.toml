congress_website_title = "AN ACT PROVIDING FOR A PHILIPPINE FISHERIES CODE"
congress_website_abstract = "Seeks to protect and conserve the fisheries and aquatic resources of the country for the use and enjoyment of Filipino citizens. Provides for the creation of the PHILIPPINE FISHERIES ADMINISTRATION to have jurisdiction and responsibility over the management, conservation, and this position of our country's fishery and aquatic resources."
