congress_website_title = "AN ACT ACCORDING EQUAL RIGHTS TO WIVES AND HUSBANDS IN THE PHILIPPINES BY AMENDING ARTICLES 333, 334 AND 344 OF ACT NUMBERED THREE THOUSAND EIGHT HUNDRED AND FIFTEEN, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "Changes the terms \"adultery\" and \"concubinage\" in the Revised Penal Code with the new term \"SEXUAL INFIDELITY\" with the end in view of correcting the seemingly unfair treatment insofar as the imposition of penalty to the wife who is penalized with aheavier penalty for a single act of infidelity in contrast to the marital indiscretions of the husband which is not treated as a felony unless attended by qualifying circumstances."
