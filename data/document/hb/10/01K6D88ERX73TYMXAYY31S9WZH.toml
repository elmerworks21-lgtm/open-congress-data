congress_website_title = "AN ACT LIMITING THE MEMBERSHIP IN THE BOARD OF ELECTION INSPECTORS TO TEACHERS IN PUBLIC AND PRIVATE SCHOOLS AMENDING FOR THE PURPOSE 'THE ELECTORAL REFORMS LAW OF 1987'"
congress_website_abstract = "Rationale: In our country, school teachers are the major work force responsbile for molding our youth who will become our future leaders. They are vital instruments to the formation and the future of our youth. We look upon teachers as model of virtue, honesty and integrity. It is, therefore, proper to limit the memberships of the Board of Election Inspectors only to school teachers.> Seeks, therefore, to LIMIT the membership in the Board of Election Inspectors to PUBLIC OR PRIVATE schoolteachers only."

