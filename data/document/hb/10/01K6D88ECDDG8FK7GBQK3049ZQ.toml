congress_website_title = "AN ACT GRANTING INCENTIVES TO THE PRODUCTION OF QUALITY FILMS DEPICTING THE LIVES AND TIMES OF OUR NATIONAL HEROES AND HEROINES"
congress_website_abstract = "Declares that all quality historical films shall be entitled to a subsidy, and shall be EXEMPT from the payment of all other taxes, except income tax. Defines \"QUALITY FILMS\" and \"SUBSIDIZED FILM MAKER\" as used in this proposed measure."
