congress_website_title = "AN ACT INCREASING THE INTERNAL REVENUE ALLOTMENT OF LOCAL GOVERNMENT UNITS TO SIXTY PERCENT (60%) AMENDING FOR THE PURPOSE SECTION 284 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Declares that local government units shall have a share in the national internat revenue taxes based on the collection of the third fiscal year preceding the current fiscal year as follows: (a) On the first year of the effectivity of this Code, Thirty percent (30%); (b) On the second year, thirty five percent (35%); [and] (c) On the third year, [and thereafter] forty percent (40%); (d) ON THE FOURTH YEAR, FIFTY PERCENT (50%); AND (e) ON THE FIFTH YEAR AND THEREAFTER, SIXTY PERCENT (60%)."

