congress_website_title = "AN ACT ALLOWING OWNERS OF STRUCTURES AND HOUSES OCCUPYING OR BUILT ON SIDEWALKS A GRACE PERIOD OF ONE (1) YEAR WITHIN WHICH TO REMOVE THE SAME AFTER WHICH SUMMARY DEMOLITION SHALL FOLLOW"
congress_website_abstract = "Rationale: Sidewalks are for the sole use of pedestrians, that they may not run the risk of being ran over or bumped by motor vehicles. > These days however, sidewalks have lost the purpose for which they are constructed. For one thing, vendors have abused their use of the sidewalks. So authorities run after them, or perhaps make money on them.> Provides for the relocation of displaced owners or occupants per RA 7835 and RA 6846."

