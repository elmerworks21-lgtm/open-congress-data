congress_website_title = "AN ACT PROVIDING THAT ANOTHER PRELIMINARY INVESTIGATION AND REVIEW SHALL BE AVAILABLE FROM RESOLUTIONS OF DISMISSAL PROMULGATED BY THE CITY, PROVINCIAL OR STATE PROSECUTORS"
congress_website_abstract = "Rationale: It is undeniable that prosecutors are among the pillars of our criminal justice system. They are the ones who determine the criminal liability of an accused in a complainant. However, sometimes these prosecutors, for one reason or another, fail to appreciate the pieces of evidence presented by the complainant therey dismissing the complainant. Under our existing laws, a resolution of dismissal leaveas the complaint without a recourse but to accept the prosecutor's resolution of thecase, while the defendant who may have been actually guilty will be able to evade the sanction for this wrong doing and laugh his way out of the prosecution office. > Declares the following --- \"SECTION 1. Any provision of existing laws, rules or reggulations to the contrary notwithstanding , a resolution dismissing a complaint promulgated by a city, provincial or state prosecutor may, on motion of the complaint, be subject of another preliminary investigation by the psoecutor concerned.\""

