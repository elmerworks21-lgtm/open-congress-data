congress_website_title = "AN ACT ESTABLISHING AN 'ADOPT-OUT-OF SCHOOL YOUTH PROGRAM' IN BARANGAY CABUGAO VIEJO, MUNICIPALITY OF SAN ENRIQUE, PROVINCE OF ILOILO, PROVIDING INCENTIVES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Royalties on books are taxed at the same rate as other kinds of royalties, such as those for the use or lease of natural resources, patents, manufacturing formulas, industrial or commercial equipment of knowledge, foreign technology, andothers. > If enacted into law, this proposal would encourage and give impetus to present and future writers to write books, and eventually would bring about the publication of more titles, thus ensuring the flourishing of the book publishing industryand elevating ourselves intellectually and materially in the family of nations."

