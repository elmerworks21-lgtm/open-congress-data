congress_website_title = "AN ACT PROVIDING FOR THE FORESTRY CODE OF 1993 AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Forestry Code of 1993\" Provides a 25-year comprehensive master plan for forest development, that includes significant concerns, such as: (1) the identification of priority programs; (2) investment needs; (3) productivity sharing; (4) promotion of small-scale utilization of natural resources by Filipino citizens."
