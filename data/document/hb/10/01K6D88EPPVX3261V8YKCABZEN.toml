congress_website_title = "AN ACT CREATING THE PHILIPPINE COORDINATING OFFICE FOR BRUNEI-INDONESI A-MALAYSIA-PHIL IPPINES EAST ASEAN GROWTH AREA (BIMP-EAGA), AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The emergence of a new growth areas within the boundaries of Southern Philippines, Brunei, Malaysia and Indonesia holds exciting prospects for increased intra-regional cooperation within the Association of Southeast Asian Nations (ASEAN).> For this purpose, a central government agency is needed to integrate and put more focus on Philippine iniatives under the EAGA Agreement. While sectoral concerns can be addressed by individual government agencies and units, it is imperative that aholistic approach be adopted for better coordination of policies, more effective promotion of Philippine participation in EAGA programs and projects and more sytematic monitoring of activities relating to Philippine initiatives under EAGA. > Prescriibes the powers and functions of the proposed Office, its organizational structure and the composition of the various working groups of BIMP-EAGA."
