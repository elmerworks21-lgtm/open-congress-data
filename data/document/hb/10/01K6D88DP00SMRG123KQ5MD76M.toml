congress_website_title = "AN ACT AMENDING SECTION 31 OF PRESIDENTIAL DECREE NUMBERED 1177, AS AMENDED, OTHERWISE KNOWN AS THE BUDGET REFORM DECREE OF 1977 IN ORDER TO LIMIT AUTOMATIC APPROPRIATION OF DEBTS AND GUARANTEES ONLY TO THOSE DULY APPROVED BY CONGRESS"
congress_website_abstract = "Restores control of the public funds by providing that only loans and guarantees approved by Congress be the subject of automatic appropriations. Requires Congress to review and approved within twenty (20) days every foreign loan contracted and/or guarantee of an obligation assumed by the national government."

