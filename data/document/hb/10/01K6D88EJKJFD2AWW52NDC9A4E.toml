congress_website_title = "AN ACT FURTHER AMENDING SECTION 13 OF REPUBLIC ACT NO. 3019, OTHERWISE KNOWN AS THE ANTI-GRAFT AND CORRUPT PRACTICES ACT(NOTE: PROVISION ON SUSPENSION FROM OFFICE)"
congress_website_abstract = "Rationale: The purpose of the \"suspension from office\" under Section 13 of R.A. No. 3019, otherwise known as the Anti-Graft and Corrupt Practices Act, which is prevenetive in character, is to prevent the accused official or employee from influencingor coercing witnesses who are most likely his co-officials or subordinates, or to prevent the accused official from any access to relevant documents and papers filed in the said office while the case is in trial. States that the provision on \"SUSPENSION FROM OFFICE\" shall NOT apply if the accused is NO LONFER occupying that office by venture of transfer, promotion or election."
