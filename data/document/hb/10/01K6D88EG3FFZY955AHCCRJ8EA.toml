congress_website_title = "AN ACT REVOKING THE POWER OF THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION TO APPROVE APPLICATION TO ENGAGE IN ALL FORMS OF GAMBLING OR GAMES OF CHANCE GRANTED UNDER PRESIDENTIAL DECREE NUMBERED EIGHTEEN HUNDRED AND SIXTY-NINE"
congress_website_abstract = "Rationale: PAGCOR does not possess the power to grant franchise to operate any form of gambling or game of chance. Presidential Decree No. 1869, as amended, which created PAGCOR, merely clothed it with the power to regulate persons engaged in gambling. Declares that the Congress of the Philippines shall be the SOLE authority to grant permit to engage in all fforms of gambling or games of chance."

