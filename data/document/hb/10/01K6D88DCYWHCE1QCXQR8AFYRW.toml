congress_website_title = "AN ACT INTEGRATING ALL EXISTING ALLOWANCES OF THE UNIFORMED MEMBERS OF THE ARMED FORCES OF THE PHILIPPINES AND THE PHILIPPINE NATIONAL POLICE IN THEIR BASIC PAY"
congress_website_abstract = "Integrates all existing allowances of the uniformed personnel of the Armed Forces of the Philippines (AFP) and Philippine National Police (PNP) in their basic pay in view of computing the monthly pension of retiring personnel. Seeks to alleviate thefinancial difficulties of retiring AFP and PNP personnel and ensures that they will be receiving a larger pension by increasing the base on which the pension is computed. * * *"

