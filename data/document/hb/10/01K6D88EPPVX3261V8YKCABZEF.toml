congress_website_title = "AN ACT REQUIRING BUILDERS, OWNERS AND DEVELOPERS OF ESTABLISHMENTS/ PROJECTS TO CONSTRUCT APPROPRIATE OVERPASSES, AND/OR UNDERPASSES AND ROADS, ADEQUATE DRAINAGE SYSTEMS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: In the past years, the Philippines saw the construction of commercial buildings and establishments and big residential subdivisions along major thoroughfares. These establishments attract thousands of consumers, people, crowds, and vehicles a day. > As a result, the streets across these establishments, which are not provided with facilities to afford proper conveyance to people, are oftentimes clogged with traffic and pose danger to people all around."

