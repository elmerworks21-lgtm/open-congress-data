congress_website_title = "AN ACT TO REVISE THE PRESIDENTIAL DECREE NO. 797, OTHERWISE KNOWN AS THE MARINE POLLUTION DECREE OF 1976"
congress_website_abstract = "Rationale: The principal measure on marine pollution, that is, Presidential Decree No. 979, otherwise known as The Marine Pollution Decree of 1979, was passed in order to address problems on marine environment transpiring during those times. > It has been 18 years now since the said law was promulgated. Upheaval of modern technologies has come to pass almost unacknowledged as we always stand in anticipation or, somewhat accustomed to their occurence. The influx of sea-transport economic activities has likewise created a considerable mileage. Monetary factors have, consequently, yielded to more ideal level. Notwithstanding these positive factors, marine environment in the Philippine Archipelago has become worst and unmanageable. Relativelyy untraced and unfetted, oily residues, garbage, wastes and other toxic elements of off-shore and land-based sources continue to plague our territorial water. \"The Revised Marine Pollution Law of 1997\""

