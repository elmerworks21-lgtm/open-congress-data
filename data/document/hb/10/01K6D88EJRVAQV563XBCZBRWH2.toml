congress_website_title = "AN ACT INSTITUTIONALIZ ING THE CREATION OF LOCAL TOURISM COUNCILS IN EVERY PROVINCE, CITY, MUNCIPALITY, AND BARANGAY IN THE COUNTRY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE 'LOCAL GOVERNMENT CODE'"
congress_website_abstract = "Prescribes the functions of the LOCAL TOURISM COUNCILS as follows: (1) TO PROPOSE TO THE SANGGUNIAN CONCERNED, IN ACCORDANCE WITHS TANDARDS AND CRITERIA SET BY THE DEPARTMENT OF TOURISM, ANNUAL BEDGETARY ALLOCATIONS FOR THE OPERATION AND MAINTENANCEOF TOURISM FACILITIES AND SERVICES WITHIN THE MUNICIPALITY, CITY OR PROVINCE, AS THE CASE MAY BE: (2) TO COORDINATE THE TOURISM MASTER PLAN OF THE LOCALITY AND SERVE AS ITS TOURISM POLICY ARM; AND (3) TO SERVE AS AN ADVISORY COMMITTEE TO THE SANGGUNIAN CONCERNED ON TOURISM MATTERS."

