congress_website_title = "AN ACT AMENDING REPUBLIC ACT 7183 AND PROHIBITING THE MANUFACTURE OF DEADLY FIRECRACKERS, PROVIDING PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Penalizes the person, firm or association caught manufacturing or exploding these deadly firecrackers: \"Super Lolo, Thunders, Baby Dynamites, etc, --- with imprisonment of three (3) months to one (1) year, and a fine of P50,000.00."
