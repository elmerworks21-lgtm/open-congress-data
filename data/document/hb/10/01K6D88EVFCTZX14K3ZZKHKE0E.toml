congress_website_title = "AN ACT TO STRENGTHEN THE HOUSING INVESTMENT PORTFOLIO OF THE PAG-IBIG FUND BY AMENDING PRESIDENTIAL DECREE NO. 1752, OTHERWISE KNOWN AS \"HOME DEVELOPMENT MUTUAL FUND LAW OF 1980\", AS AMENDED, BY PROVIDING FOR TWENTY (20)-YEAR CONTINUOUS CONTRIBUTIONS BY ITS MEMBERS, MANDATING GOVERNMENT GUARANTY FOR ITS LOAN BORROWINGS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the following --- \" SECTION 7. Membership Term. - Membership in the Fund shall be for a period of twenty (20) years of CONTINUOUS CONTRIBUTIONS COMMENCING FROM THE FIRST DAY OF THE MONTH TO WHICH THE MEMBER'S INITIAL CONTRIBUTION TO THE FUND APPLIES, except when earlier terminated by reason of retirement, disability, insanity, death, departure from the country, separation from the service by reason of health or other causes as may be provided for by the Board of Trustees. Resignation, lay-off or suspension from employment may not necessarily constitute a ground for membership termination , except for suspension of contributions AND MEMBERSHIP.\""

