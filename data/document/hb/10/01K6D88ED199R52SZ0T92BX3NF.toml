congress_website_title = "AN ACT AMENDING SECTIONS 138, 139, 140 AND 142 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED (CTRP EXCISE TAX LIQUOR WINE CIGARETTE)"
congress_website_abstract = "Proposes amendatory provisions on INCREASED SPECIFIC TAXES on: (1) distilled spirits; (2) wine; (3) fermented liquor; (4) cigars and cigarettes. Modifies the tax base from the manufacturers' price to the actual retail price, net of value-added tax."
