congress_website_title = "AN ACT ESTABLISHING A PUBLIC LIBRARY IN EVERY MUNICIPALITY IN THE COUNTRY"
congress_website_abstract = "Provides for the following --- \"SECTION 1. Establishment of Public Library. - the Department of Public Works and Highways in coordination with the local government unit shall undertake the establishment of a public library in every municipality throughout the country within one hundred twenty (120) days after the effectivity of this Act. Such public library shall be under the control and sueprvision of the local government unit.\""

