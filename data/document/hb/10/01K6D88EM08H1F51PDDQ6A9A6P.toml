congress_website_title = "AN ACT REQUIRING ALL GOVERNMENT OFFICES TO ESTABLISH DAY CARE CENTERS AND PROVIDING APPROPRIATIONS THEREFOR"
congress_website_abstract = "\"Day Care Center in Government Offices Act of 1996\" States that government offices, including government-owne d or controlled corporations with at least thirty (30) permanent married employees, male and female, with children from three (3) to six (6) years of age are hereby required to establish and maintain a day care center which will be operational every working day. Provides for (1) DAY CARE CENTER MECHANICS; (2) PERIODIC EVALUATION; (3) TRAINING OF DAY CARE STAFF."

