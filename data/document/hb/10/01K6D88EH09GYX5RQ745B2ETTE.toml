congress_website_title = "AN ACT FURTHER PROMOTING THE DEVELOPMENT OF SMALL AND MEDIUM SCALE ENTERPRISES, AMENDING FOR THIS PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NO. 6977, OTHERWISE KNOWN AS THE 'MAGNA CARTA FOR SMALL ENTERPRISES'"
