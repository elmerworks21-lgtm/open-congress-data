congress_website_title = "AN ACT AMENDING SECTIONS 30 AND 31 OF BATAS PAMBANSA BILANG 129, AS AMENDED, BY ESTABLISHING MUNICIPAL TRIAL COURTS IN ALL MUNICIPALITIES AND CITIES OF THE PHILIPPINES, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
