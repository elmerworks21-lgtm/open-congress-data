congress_website_title = "AN ACT PROVIDING FOR ELECTION BY DISTRICT OF MEMBERS OF SANGGUNIANG PANLUNGSOD AND SANGGUNIANG BAYAN, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SEVENTY-ONE HUNDRED AND SIXTY-SIX, AS AMENDED, ENTITLED 'AN ACT PROVIDING FOR SYNCHRONIZED NATIONALAND LOCAL ELECTIONS AND FOR ELECTORAL REFORMS, AUTHORIZING APPROPRIATIONS THEREFOR, AND FOR OTHER PURPOSES'"
congress_website_abstract = "Declares the following --- \"SEC. 3. (D) [For purposes of the regular elections on May 11, 1992 and all general elections thereafter, the] THE regular elective members of the Sangguniang Panlungsod and Sangguniang Bayan, shall be elected [at large] BY DISTRICT in accordance with existing laws.\""

