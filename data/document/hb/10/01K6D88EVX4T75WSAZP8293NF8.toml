congress_website_title = "AN ACT REQUIRING SCHOOLS TO HAVE THEIR RESPECTIVE FOOTBALL AND BASEBALL TEAMS, PROVIDING INCENTIVES TO ALL PARTICIPATING SECTORS WHO WILL SPONSOR ANY PARTICIPATING SCHOOL, MANDATING INTER-SCHOOL AND REGIONAL COMPETITIONS AND ENCOURAGING THE FORMATION OF PROFESSIONAL FOOTBALL AND BASEBALL LEAGUES"
congress_website_abstract = "\"The Football and Baseball Sports Development Law\" Mandates all private and public high schools, colleges and universities to have a football and baseball sports development program. It shall be mandatory to have preliminary inter-school competitions between schools belonging to one region. Subsequently, regional competitions in football and baseball shall be held annually."

