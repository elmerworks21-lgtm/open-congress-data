congress_website_title = "AN ACT STRENGTHENING FURTHER THE AUTHORITY OF FEDERATIONS AND NATIONAL UNIONS TO ORGANIZE AFFILIATE LOCALS OR CHAPTERS BY PROVIDING THAT SUCH LOCALS OR CHAPTERS SHALL ACQUIRE LEGAL PERSONALITY UPON THE ISSUANCE OF THEIR CHARTER CERTIFICATES, INCORPORATING FOR THIS PURPOSE A NEW ARTICLE 238-A INTO PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE 'LABOR CODE OF THE PHILIPPINES'"
