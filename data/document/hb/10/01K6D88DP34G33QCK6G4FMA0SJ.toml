congress_website_title = "AN ACT REQUIRING ALL STUDENTS FROM THE ELEMENTARY, SECONDARY AND TERTIARY LEVELS, IN BOTH PUBLIC AND PRIVATE SCHOOLS, TO PLANT AT LEAST TEN TREES AS A REQUISITE FOR GRADUATION"
congress_website_abstract = "Requires all students from elementary, secondary and tertiary levels, whether public or private schools, to plant at least ten (10) trees as a requisite for graduation. Provides that the planting of trees should be done in their respective school grounds, in public places sych as plazas, markets, roadside and parks or in public lands. Provides, further, that the trees to be planted shall be fruit bearing, shafe, ornamental or forest trees."

