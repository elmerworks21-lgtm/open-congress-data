congress_website_title = "AN ACT REORGANIZING THE NATIONAL BUREAU OF INVESTIGATION, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to reorganize the National Bureau of Investigation (NBI) to integrate, undertake and coordinate all activities and programs relating to investigation services. Enumerates the powers and functions of the newly reorganized NBI. Limits to members of he Philippine Bar and/or Certified Public Accountants the appointments to positions in the different divisions of the NBI."

