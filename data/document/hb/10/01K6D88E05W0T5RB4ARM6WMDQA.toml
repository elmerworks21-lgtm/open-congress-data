congress_website_title = "AN ACT INSTITUTIONALIZ ING THE GRANT OF SEPARATION PAY OF AT LEAST ONE (1) MONTH FOR EVERY YEAR OF SERVICE IN FAVOR OF AN EMPLOYEE VALIDLY DISMISSED FOR CAUSES OTHER THAN SERIOUS MISCONDUCT OF THOSE INVOLVING MORAL TURPITUDE, AMENDING FOR THIS PURPOSE ARTICLE 282 OF THE LABOR CODE OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "States that an employee dismissed for just causes OTHER THAN SERIOUS MISCONDUCT OR THOSE INVOLVING MORAL TURPITUDE shall be entitled to a separation pay equivalent to at least one (1) month pay for every year of service."

