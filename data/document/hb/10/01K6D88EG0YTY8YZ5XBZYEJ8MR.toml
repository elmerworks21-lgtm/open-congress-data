congress_website_title = "AN ACT GRANTING MEDICAL ALLOWANCE TO ALL GOVERNMENT EMPLOYEES INCLUDING THOSE IN GOVERNMENT-OWNE D OR -CONTROLLED CORPORATIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "States that --- \"SECTION 1. All employees of the government, including those in government-owne d or controlled corporations, shall be granted an annual medical allowance in the amount of Five Thousand Pesos (P5,000.00). Employees of government agencies which are already receiving medical allowance as of the enactment of this Act, shall continue to receive such benefits.\""

