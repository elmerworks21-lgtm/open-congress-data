congress_website_title = "AN ACT PROVIDING FOR THE ADOPTION OF A CONTINUING SYSTEM OF REGISTRATION OF VOTERS, AMENDING FOR THE PURPOSE ARTICLE XII, SECTIONS 113 TO 148 OF BATAS PAMBANSA BILANG 881, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "States that the EXISTING APPROVED APPLICATIONS/VO TER'S AFFIDAVITS used in the 1988, 1990, 1994 elections, with additions/circu llations, SHALL REMAIN VALID AND BINDING and shall be considered as the permanent list of voters. Provides that the registration of voters shall be CONDUCTED DAILY in the office of the Elective Officers during office hours."
