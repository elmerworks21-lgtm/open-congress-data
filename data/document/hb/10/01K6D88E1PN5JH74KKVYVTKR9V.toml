congress_website_title = "AN ACT LEGALIZING EUTHANASIA IN CERTAIN CASES (mercy killing)"
congress_website_abstract = "\"The Right to Die Act\" Defines the terms \"PASSIVE EUTHANASIA\" and \"VOLUNTARY EUTHANASIA\" as used in this Act. Declares that EUTHANASIA, whether passive or voluntary, shall be ALLOWED as a practice in the Republic of the Philippines. Declares, further, the EXEMPTION of any person who participates in the performace of euthanasia FROM any criminal, civil or administrative liability."

