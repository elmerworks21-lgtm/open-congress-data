congress_website_title = "AN ACT PROHIBITING OFFICERS AND EMPLOYEES OF THE CIVIL SERVICE INCLUDING MEMBERS OF THE ARMED FORCES OF THE PHILIPPINES FROM ENGAGING IN PARTISAN POLITICAL ACTIVITIES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares that NO officer or employee in the civil service, including members of the AFP, shall engage directly or indirectly in any partisan policital activity. Defines \"PARTISAN POLITICAL ACTIVITIES\" as used in this Act; penalizes violation of thisAct with DISMISSAL from the service."
