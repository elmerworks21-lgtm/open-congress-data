congress_website_title = "AN ACT TO PROTECT THE SPOUSE FROM SEXUALLY TRANSMISSIBLE DISEASE, AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF EXECUTIVE ORDER NUMBERED TWO HUNDRED NINE, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to protect the spouse from SEXUALLY TRANSMISSIBLE DISEASE thus amending certain provisions of EO 209 (Family Code of the Philippines). Provides additional requirement for the issuance of a marriage license which is to secure a medical certificate that the applicant does not have a sexually transmissible disease."

