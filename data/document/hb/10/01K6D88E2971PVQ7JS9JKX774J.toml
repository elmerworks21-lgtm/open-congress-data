congress_website_title = "AN ACT ESTABLISHING POLICE FORCES UNDER THE ADMINISTRATIVE AND OPERATIONAL CONTROL OF THE LOCAL GOVERNMENT EXECUTIVES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Police Act of 1995\" Intends to give back to the local government executives the control of the police; provides for significant areas of concern, such as: (1) constitution of city or municipal police force; (2) duties of peace officers; (3) qualifications for appointment; (4) Police Disciplinary Board, etc."

