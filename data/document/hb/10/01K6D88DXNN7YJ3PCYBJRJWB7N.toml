congress_website_title = "AN ACT PROHIBITING ANY ACT OR OMISSION THAT TENDS TO CAST DISHONOR, RIDICULE, OR CONTEMPT UPON THE FLAG OF ANY NATION AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "\"Foreign Flag Act of 1995\" Provides for the following --- \"SEC 3. Prohibited Act. - It shall be unlawful for any person to do naything or make any utterance in speech, writing, or drawing, any act or omission including burining, mutilating or tampering that tends to cast dishonor, ridicule, or contempt upon any flag of any country, as well as its use in places of ill-repute or for purposes involving disrespect, including use as trademarks and for industrial, commercial or agricultural labels ordesigns, and any drawing or inscription upon the flag. Prescribes penalty for violation of this Act."

