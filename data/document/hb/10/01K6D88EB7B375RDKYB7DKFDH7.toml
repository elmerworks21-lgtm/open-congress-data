congress_website_title = "AN ACT SUPERVISING, REGULATING AND CONTROLLING THE LICENSURE AND PRACTICE OF ELECTRONICS ENGINEERS AND ELECTRONICS TECHNICIANS"
congress_website_abstract = "\"New Electronics Engineering Law of the Philippines\" Provides for the categories of electronics engineering and electronics technician practice, the scope and nature of the practice of these professions and the prohibitions and limitations on the exercise of such functions. Increases from three (3) to FIVE (5) members the composition of the Board of Electronics Engineering under the supervision of the Professional Regulation Commission. Includes provisions on consultations with the Commission on Higher Education (CHED) and the Technical Education and Skills Development Authority (TESDA) on the essential requirements as to curricula, schools facilities and courses to be offered."
