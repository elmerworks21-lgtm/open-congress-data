congress_website_title = "AN ACT RESTORING THE RIGHT OF OVERSEAS CONTRACT WORKERS TO RECOVER FULL BACKWAGES AND OTHER BENEFITS IN CASES OF ILLEGAL TERMINATION OF THEIR EMPLOYMENT CONTRACT, AMENDING FOR THIS PURPOSE SECTION 10 OF REPUBLIC ACT NO. 8042"
congress_website_abstract = "Mandates that in case of termination of overseas employment without just, valid or authorized casue as defined by law or contract, the worker shall be entitled to the full reimbursement of his placement fee with interest at twelve percent (12%) perannum, plus his salaries for the unexpired portion of his employment contract or for three (3) months for every year of the unexpired term, whichever is less.\""

