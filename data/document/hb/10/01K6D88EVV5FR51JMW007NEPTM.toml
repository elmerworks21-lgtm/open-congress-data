congress_website_title = "AN ACT CALLING FOR A CONSTITUTIONAL CONVENTION, PROVIDING FOR PROPORTIONAL REPRESENTATION THEREIN AND OTHER DETAILS RELATING TO THE ELECTION OF DELEGATES TO THE CONSTITUTIONAL CONVENTION ON THE SECOND MONDAY OF MAY, 1998"
congress_website_abstract = "Rationale: Calling a constitutional convention is believed to be the most democratic mode of proposing amendments, as the will of the people is expressed through their duly elected delegates. With the forthcoming general election on the second Monday of May, 1998, it is proposed that the election of delegates to the constitutional convention coincide with the general election to avoid the huge expenditures attendant to the exercise. \"The 1998 Constitutional Convention Act\" Contains these key features: (1) The Convention shall be composed of two (2) delegates from every legislative district who shall possess the same qualifications as those possessed by the members of the House of Representatives ; (2) The election of delegates shall be govverned by the Omnibus Election Code and shall be held on the second Monday of May 1998; (3) Any public officer or employee, including those of the armed forces and government-owne d and-controlled corporations shall be considered resigned upon the fi"
