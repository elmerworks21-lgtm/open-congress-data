congress_website_title = "AN ACT PROVIDING THAT THE DATE OF THE FILING OF THE LATEST INCOME TAX RETURN SHALL BE INDICATED ON CERTAIN DOCUMENTS"
congress_website_abstract = "Requires that the late of filing of the latest income tax return shall be indicated in these documents: (1) sugar quedans; (2) domestic bills of landing; (3) documents for egistration with the Registry of Deeds; (4) registration certificates of owners of transportation equipment by land, sea, or air; (5) building construction permits, etc."

