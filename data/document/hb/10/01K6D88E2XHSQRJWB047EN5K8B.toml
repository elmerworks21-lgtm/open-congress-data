congress_website_title = "AN ACT STRENGTHENING THE REGIONAL TRIPARTITE WAGES AND PRODUCTIVITY BOARDS, AMENDING FOR THE PURPOSE ARTICLE 122 AND 123 OF THE LABOR CODE OF THE PHILIPPINES, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides that the MEMBERS OF THE BOARDS REPRESENTING THE WORKERS AND EMPLOYERS SHALL UNDERGO TRAINING SEMINARS FOR THREE (3) MONTHS ON WAGE FIXING AND DETERMINATION TO EQUIP THEM WITH THE NECESSARY SKILLS AND EXPERTISE ON THEIR JOBS. Provides further that the Regional Board shall promulgate the necessary waqe order within 60 days from the time the Board conducts its first public hearing on a petition for wage increase or on its own initiative."
