congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF MICROSCOPY CENTERS IN EVERY BARANGAY THROUGHOUT THE COUNTRY, THE ACQUISITION OF ADDITIONAL MICROSCOPES, THE EMPLOYMENT OF ADDITIONAL MICROSCOPISTS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Provides for the following --- \"SECTION 1. There shall be established at least one microscopy center in every barangay throughout the country. Each microscopy center shall be equipped with functional microscopes, which number shall not be less thanthat which is required to have a ratio of microscope for every 2,000 barangay population.\" \"SECTION 2. Additional microscopists shall be employed to meet the manpower requirement for the full operation of all microscopy centers, subhect to the occupational standards and requirements set by the Department of Health for this function.\""

