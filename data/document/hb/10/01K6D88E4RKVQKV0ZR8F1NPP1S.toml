congress_website_title = "AN ACT REQUIRING THE CONCURRENCE OF CONGRESS OR THE LOCAL SANGGUNIAN CONCERNED TO ANY COMPROMISE AGREEMENT OR SETTLEMENT ENTERED INTO BY THE CHIEF EXECUTIVE OF THE NATIONAL OR LOCAL GOVERNMENTS, RESPECTIVELY, WITH ANY PERSON, ENTITY OR BODY WHICH INVOLVES THE PAYMENT OF CLAIM OF PUBLIC MONEY, OR TRANSFER OF PUBLIC PROPERTY OR COLLECTION, OR RECEIPT OF MONEY, PROPERTY OR ANYTHING OF VALUE BY THE NATIONAL OR LOCAL GOVERNMENTS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Requires the Concurrence of Congress for such Compromise Agreements when the amount involved is MORE THAN P1 MILLION; requires the concurrence of the local Sanggunian when the amount involved is MORE THAN P50,000.00, in the case of the province orcity; MORE THAN P10,000.00 in the case of the Municipality, and MORE THAN P500.00 in the case of the barangay."

