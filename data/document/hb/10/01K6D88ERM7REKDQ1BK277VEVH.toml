congress_website_title = "AN ACT PROVIDING FOR THE MAGNA CARTA OF ADMINISTRATIVE AND SUPPORT SERVICES PERSONNEL OF STATE UNIVERSITIES AND COLLEGES"
congress_website_abstract = "Recognizes the role played by the ADMINISTRATIVE and SUPPORT SERVICES PERSONNEL in the over-all operation of teaching institutions. These are the persons not occupying faculty ranks, but assist in research and production activities of the academic institutions. Provides for these areas of concern: (1) recruitment and qualifications; (2) performance evaluation and merit promotion; (3) duties and obligation; (4) code of conduct; (5) salaries, etc."

