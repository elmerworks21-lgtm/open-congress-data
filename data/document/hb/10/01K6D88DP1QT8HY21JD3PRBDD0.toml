congress_website_title = "AN ACT INCREASING THE MATERNITY LEAVE BENEFITS AS INCENTIVES FOR BREASTFEEDING MOTHERS IN THE PUBLIC AND PRIVATE SECTOR"
congress_website_abstract = "Increasing maternity leave benefits from sixty (60) days to ONE HUNDRED EIGHTY (180) DAYS WHICH may COMMENCE THIRTY DAYS BEFORE THE EXPECTED DATE OF DELIVERY and that the remaining ninety days leave should serve the purpose of breastfeeding the new-born baby. Entitles the employee to a full pay of her basic monthly salary, allowances and other benefits for ninety days of maternity leave."

