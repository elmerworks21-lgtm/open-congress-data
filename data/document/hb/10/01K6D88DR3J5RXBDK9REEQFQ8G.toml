congress_website_title = "AN ACT AMENDING ARTICLE 235 OF THE REVISED PENAL CODE SO AS TO INCLUDE OTHER CUSTODIAL CRIMES SUCH AS SALVAGING OR SUMMARY EXECUTION, UNEXPLAINED DISAPPEARANCES OF PRISONERS OR PERSONS UNDER INVESTIGATION OR CUSTODY OF PUBLIC OFFICERS AS HEINOUS CRIMES, PROVIDING PENALTY THEREFOR AND FOR OTHER PURPOSES"
