congress_website_title = "AN ACT TO CLASSIFY THE FAKING OR FABRICATING, NEGOTIATING, TRANSACTING, CONVEYING OR MORTGAGING OF FAKE OR ILLEGALLY FABRICATED TORRENS CERTIFICATES OF TITLE AS HEINOUS OFFENSE IF COMMITTED BY A SYNDICATE OR IN LARGE SCALE"
congress_website_abstract = "Defines \"PATENTLY FAKE OR FABRICATED\" Torrens certificates of title as referring to those that have not gone thrugh the regular process of registration or have not been duly issued by the Register of Deeds. Classifies the act of taking or fabricating as (1) committed by a SYNDICATE, and (2) committed in LARGE SCALE; prescribes penalties."

