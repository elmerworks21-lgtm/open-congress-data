congress_website_title = "AN ACT PROVIDING FOR THE INCLUSION OF ENTREPRENEURSHI P AS A SUBJECT IN THE ELEMENTARY CURRICULUM"
congress_website_abstract = "\"The inclusion of the subject entrepreneurshi p in the elementary curriculum in all public and private schools throughout the country will provide the pupils fundamental knowledge, attitude, desirable habits and skills for venturing into business. These will enable them to participate productively in their respective communities and at the same time prepare them to become worthwhile contributors to national development."

