congress_website_title = "AN ACT STRENGTHENING FURTHER THE RIGHT OF THE WORKERS TO SECURITY OF TENURE BY PRESCRIBING THE MANDATORY REQUISITES OF PERFECTING AN APPEAL IN LABOR CASES"
congress_website_abstract = "States that decisions, awards or orders of the Labor Arbiter are final and executory unless appealed to the Commission by any or both parties within the MANDATORY ten (10) calendar days from receipt of such decisions, awards or orders. States, likewise, that the EMPLOYER, AS WELL AS COUNSEL, SHALL SUBMIT A JOINT DECLARATION UNDER OATH ATTESTING THAT THE SURETY BOND POSTED IS GENUINE AND THAT IT SHALL BE IN EFFECT UNTIL ONE (1) YEAR AFTER THE FINALITY OF THE CASE."

