congress_website_title = "AN ACT REQUIRING PRIVATE EDUCATIONAL INSTITUTIONS TO HOLD CONSULTATIONS ON PROPOSED TUITION FEE INCREASES AT LEAST FORTY-FIVE (45) DAYS BEFORE THE END OF EACH SCHOOL YEAR"
congress_website_abstract = "Mandates all private educational institutions to hold consultations with its students through bonafide student representatives on proposed increases in tuition and other fees. The mandatory consultation shall be held at least FORTY-FIVE (45) DAYS before the end of each school year, but not later than March 1 of eveyr year."
