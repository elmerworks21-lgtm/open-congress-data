congress_website_title = "AN ACT AUTHORIZING THE BANGKO SENTRAL NG PILIPINAS TO REQUIRE ALL IMPORTERS AND OTHERS WHO NEED TO BUY DOLLARS TO POST IN ADVANCE A PESO DEPOSIT EQUIVALENT TO THEIR DOLLAR APPLICATION AND THAT ALL DOLLAR REMITTANCES OF OVERSEAS FILIPINO WORKERS ANDEXPORTERS MUST BE CHANNELED THRU GOVERNMENT BANKS"
congress_website_abstract = "Rationale: To save the Bangko Sentral ng Pilipinas from this counter-product ive process and to equalize the playing fields, an offer as a solution requiring all importers and others who need to buy dollars for their business operations to post in advance a peso deposit equivalent to their dollar application and which can be used by the Bangko Sentral ng Pilipinas as loan to small and medium scale businessmen. This will save the Bangko Sentral ng Pilipinas from using its borrowed money in buying rates for their operation. Also, all dollar remittances from our Overseas Filipino Workers and export earnings shall be channelled through government banks to control the circulation and prevent the dollars from seeing their way to the money changgers and private banks who manipulate the foreign exchange leading to the downfall of the economy."

