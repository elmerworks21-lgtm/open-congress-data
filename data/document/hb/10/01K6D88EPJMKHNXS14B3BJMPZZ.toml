congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF PRESIDENTIAL DECREE NUMBERED SIXTEEN HUNDRED TWO, ENTITLED 'PRESCRIBING STIFFER PENALTIES FOR GAMBLING, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Presently, there exists much difficulty in prosecuting so called gambling lords, coddlers and outright protectors and even operators due to cumbersome judicial processes and weak laws. > Under P.D, No. 1602, a person convicted is penalized only for two (2) years or fined One thousand pesos (P1,000.00) at the court's discretion. More cases end up only with ridiculously low fines comapred to the millions of pesos raked in by big gambling lords. > Urgent remedial measures are needed since jueteng and other forms of illegal gambling have reached gargantuan proportions, threatening to tear up our national moral fabric and corrupting the police, local and other authorities.> Provides for the following --- (1) INCREASES the penalty foor gambling from [one (1)] thousand to TWO (2) thousand pesos up to [six (6)] TWELVE (12) thousand pesos. Members of any law enforcement agench shall be liable for DERELICTION OF DUTY and can be penalized with PRISION CORRECCIONAL in its minimum peri"
