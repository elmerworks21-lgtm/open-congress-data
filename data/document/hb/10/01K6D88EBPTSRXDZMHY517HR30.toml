congress_website_title = "AN ACT TO PROVIDE AN EFFECTIVE ASSISTANCE DELIVERY SYSTEM TO ADDRESS THE PRODUCTION AND TECHNOLOGY NEEDS OF COTTAGE, SMALL AND MEDIUM ENTERPRISES AND STRENGTHEN THE COTTAGE INDUSTRY TECHNOLOGY CENTER WHICH IS HEREBY RENAMED AS THE PRODUCTIVITY INSTITUTE FOR COTTAGE, SMALL AND MEDIUM ENTERPRISES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Cottage, small and Medium Enterprises (CSMEs) Productivity Improvement Act of 1996\" Strengthens the Cottage Industry Technology Center (CITC), formerly known as the National Cottage Industry Development Authority (NACIDA), to perform its mandate toprovide an effective delivery system to address the production and technology transfer needs of cottage, small and medium enterprises (CSMEs) and rename it as Productivity Institute for Cottage, small and Medium Enterprises. Rationalizes the variouslegislative acts covering CITC and give it a clear and unambigious charter responsive to the changing economic and market environment of the country."

