congress_website_title = "AN ACT REQUIRING SECURITY GUARD APPLICANTS TO UNDERGO PSYCHIATRIC EVALUATION TEST PRIOR TO THEIR EMPLOYMENT"
congress_website_abstract = "Rationale: \"Security guards complement the policemen. In protecting the peace and securing life and property. To discharge their functions, security guards are usually issued serrvice firearms. As such therefore, proper safeguards must be in placeto prevent abuse. Crimes committed by security guards using their service firearms have in fact been reported.\" Presccribes penalty for violation of this Act."
