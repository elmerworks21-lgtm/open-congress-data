congress_website_title = "AN ACT AMENDING EXECUTIVE ORDER NO. 192, DATED 10 JUNE 1987 AS AMENDED, OTHERWISE KNOWN AS REORGANIZATION OF THE DEPARTMENT OF ENVIRONMENT AND NATURAL RESOURCES(RE: ENVIRONMENTAL MANAGEMENT BUREAU)"
congress_website_abstract = "Proposes the following amendment to Executive Order 192, Reorganization of the Department of Environment and Natural Resources: \"Section 16. The Environmental Management Bureau shall be a line bureau under the administrative supervision of the Department of Environment and Natural Resources, and shall primarily be in charge of matters related to environmental management, conservation and pollution control; provided, however, that the specific functions, appropriate organizational structure andbudgetary outlay of the bureau shall be immediately formulated and submitted by the DENR Secretary to the President for approval.\""

