congress_website_title = "AN ACT PROVIDING FOR THE SUPPORT INFRASTRUCTURES TO IDENTIFIED GROWTH CENTERS THROUGHOUT THE COUNTRY"
congress_website_abstract = "Provides for the creation of support infrastructures for industrial growth centers, as identified by the National Economic Development Authority (NEDA) in different parts of the country, to be undertaken by the Department of Trade and Industry (DTI), in coordination with other appropriate government agencies. Enumerates the support infrastructure to be undertaken in this Act as: (1) Concrete Road Network and Water Supply (2) Power Supply; (3) Telecommunicati ons Facilities; (4) Airport (5) PortFacilities; and (6) Water Supply."

