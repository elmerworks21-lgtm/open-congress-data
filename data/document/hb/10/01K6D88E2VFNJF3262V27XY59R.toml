congress_website_title = "AN ACT TO ORDAIN A NATIONAL POLICY ON LAND USE, TO ESTABLISH A LAND USE POLICY ADMINISTRATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to answer these urgent concerns: (1) The need to recognize the vital uses of land; (2) The need to properly assign the types of land and land resources to their most appropriate and beneficial uses; (3) The need to arrest the present threat toagriculture and food security and to protect the forests/natural resources of the country."
