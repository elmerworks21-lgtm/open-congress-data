congress_website_title = "AN ACT APPROPRIATING THE SUM OF FIVE BILLION PESOS FOR THE AID, RELIEF AND REHABILITATION OF, AND LIVELIHOOD SERVICES AS WELL AS INFRASTRUCTURE SUPPORT FOR, THE VICTIMS OF THE EL NINO EPISODE, CREATING THE EL NINO ASSISTANCE AND DEVELOPMENT COMMISSION, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"El Nino Assistance and Development fund\" Declares the following --- \"SEC. 2. Declaration of Policy. - It is hereby declared the policy of the State to assist the victims in the communities damaged or destroyed or adversely affected by the El Nino episode and its aftereffects by extending to them aid, relief, rehabilitation and livelihood services to the end that life may return to normalcy at the earliest possible time and the development of the affected areas may not be hampered.\" Prescribesthe guidelines in the allocation of funds; creates the EL NINO ASSISTANCE AND DEVELOPMENT COMMISSION for this purpose."

