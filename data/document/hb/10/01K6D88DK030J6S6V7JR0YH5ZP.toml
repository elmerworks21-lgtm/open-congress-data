congress_website_title = "AN ACT AMENDING ARTICLES 354, 360, AND 361 OF ACT NO. 3815, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "Seeks to loosen the restrictive provisions of libel law and enforce the freedom of speech of the press. Requires that before a public official or public figure can sue for libel against the publisher, editor or author he should proved that the defamatory imputation (a) was false; and (2) it was made with malice."
