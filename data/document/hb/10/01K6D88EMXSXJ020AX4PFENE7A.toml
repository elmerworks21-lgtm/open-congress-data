congress_website_title = "AN ACT TO PROHIBIT THE IMPORTATION OF TOXIC WASTES AND SUBSTANCES INTO THE COUNTRY"
congress_website_abstract = "Rationale: The industries of the world's richest countries produce limmions of tons of highly poisonous waste products annually. Many of these unwanted poisons are dumped in developing countries becuase of their more tolerant environmental laws. Industrialized countries pay the world's poorer nations to reprocess hazardous wastes in what is now called the \"Toxic Waste Trade.\" \"Toxic Substance Control Act of 1996\" Seeks to correct weakness in the legal system of the country which would enable it to deal with the problem of \"toxic waste trafficking.\" Declares the following --- \"SEC. 6. PROHIBITION. - The importation of toxic wastes or substances shall hereby be prohibited. For this purpose, the Commissioner of customs shall refuse entry off such importation within the Philippine customs territory. As used in this Section, 'Customs Territory' shall include the territorial air and sea boundaries of the country.\""

