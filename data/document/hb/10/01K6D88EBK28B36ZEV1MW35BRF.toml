congress_website_title = "AN ACT TO EXEMPT CERTAIN INCOME FROM TAXATION, AMENDING FOR THE PURPOSE PARAGRAPH (b) OF SECTION TWENTY-EIGHT, CHAPTER FOUR, TITLE TWO OF THE NATIONAL INTERNAL REVENUE CODE OF 1986, AS AMENDED"
congress_website_abstract = "EXEMPTS the following income from the computation of the GROSS compensation income: (1) overtime pay of employees in the First Level Positions of the Career Service of the Civil Service, and those employees in the private sector belonging to the non-supervisory group; (2) medical compensation benefits; and (3) income other than basic wages, such as proceeds from profit-sharing, allowances, accumulated leaves, commissions and other benefits paud to an employee, in cash or in kind."
