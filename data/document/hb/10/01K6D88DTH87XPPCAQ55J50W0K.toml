congress_website_title = "AN ACT ESTABLISHING A LOCAL GOVERNMENT INFORMATION MANAGEMENT PROGRAM"
congress_website_abstract = "Seeks to establish a LOCAL GOVERNMENT INFORMATION MANAGEMENT PROGRAM to provide management information systems in all local government units (LGUs) in order to strengthen further local government administration for national development. Ensures thesystematic and efficient gathering, processing and utilization of information for local development planning and implementation in the inforamtion systems development among local governments."

