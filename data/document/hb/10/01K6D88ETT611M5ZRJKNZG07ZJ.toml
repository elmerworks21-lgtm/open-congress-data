congress_website_title = "AN ACT RENAMING THE DEPARTMENT OF AGRICULTURE AS THE DEPARTMENT OF AGRICULTURE & FISHERY, RATIONALIZING AND REARRANGING ITS FUNCTIONS TO BRING ABOUT AGRICULTURAL MODERNIZATION, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates the proposed Department to serve as the government agency responsible for the development of agricultural and fishery development by providing the policy framework, public investments and support services needed for their modernization. TheDepartment is hereby mandated to --- (1) improve rural income and generate work opportunities for farming and fishing communities; and (2) ensure the relevance and responsiveness of policy and programs emanating from the local level."

