congress_website_title = "AN ACT ALLOWING FILIPINO CITIZENS RESIDING OR WORKING ABROAD TO EXERCISE THEIR RIGHT OF SUFFRAGE DURING NATIONAL ELECTIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Absentee Voting Law of 1995\" Allows all Filipino citizens residing or working abroad and possessing all qualifications of a voter under existing laws to cast their votes in the Philippine Embassies or Consulates nearest their pelaces of residence during national elections."
