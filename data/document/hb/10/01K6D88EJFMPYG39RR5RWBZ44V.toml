congress_website_title = "AN ACT AMENDING SECTIONS 3, 6 AND 8 OF REPUBLIC ACT NO. 7919, KNOWN AS 'THE ALIEN SOCIAL INTEGRATION ACT OF 1995'"
congress_website_abstract = "Provides for the following --- \"Section 3. Coverage. - Upon effectivity of this Act, all aliens whose stay in the Philippines is otherwise illegal under existing laws, and who have entered the country prior to June 30, 1992 are hereby granted legalresidence status upon compliance with the provisions of this Act, and shall not be prosecuted from crimes defined Under Commonwealth Act No. 613, otherwise known as the Immigration Act of 1940, which are inherent to illegal residence such as the absence of valid travel documents or visa: Provided, that in no case shall alien refugees in the Philippines be qualified to apply under this Act. Provided, further, that those aliens granted legal permanent residency under E.O. 324 are recognized to belegal residents and will no longer be required to re-apply for legal residency under this Act."
