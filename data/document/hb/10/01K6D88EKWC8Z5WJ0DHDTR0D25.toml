congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 97, OTHERWISE KNOWN AS THE PHILIPPINE MERCHANT MARINE OFFICERS LAW, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The merchant marine practitioners and the leaders of the different sectors in maritime industry have always clamored for the revision of the law governing the licensing of the Philippine Merchant Marine Officers on the basis that Presidential Decree No. 97 otherwise known as \"The Philippine Merchant Mrine Officers Law\" has become outmoded and there is now a pressing need to adopt and institutionaliz e radical changes to ensure compliance with the Conventions in which the Philippinesis a signatory, and to strengthen the licensing and certification process of merchant marine officers as required by national as well as international standards."
