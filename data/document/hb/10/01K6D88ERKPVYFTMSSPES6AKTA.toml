congress_website_title = "AN ACT LOWERING INTEREST RATES ON LOANS FROM GOVERNMENT BANKS/FINANCIAL INSTITUTIONS TO MICRO AND COTTAGE INDUSTRIES AS WELL AS TO SMALL AND MEDIUM ENTERPRISES"
congress_website_abstract = "States the following --- \"SECTION 2. LOAN INTEREST RATES - Upon effectivity of this Act, a special and lower interest rate for loans from Givernment Banks and Financial Institution shall be imposed for micro and cottage industries as well as to small and medium enterprises. The interest rates shall be as follows : (a) For micro and cottage industries - 6% - 8% per annum; and (b) For small and medium enterprise - 9% - 12% per annum.\""

