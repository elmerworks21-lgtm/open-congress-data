congress_website_title = "AN ACT AUTHORIZING THE DEPARTMENT OF EDUCATION, CULTURE AND SPORTS TO PROVIDE AUTOMATIC ALLOTMENT OF FUNDS FOR CONSTRUCTION OF TEN (10) CLASSROOM BUILDINGS COMPLETE WITH FENCE, PAINT AND HEALTH FACILITIES FOR EVERY DONATION OF FIVE THOUSAND (5,000)SQUARE METERS FOR SCHOOL SITE, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Rationale: As an inducement to the prospective donors who love education and are happy to see young people going to school and expectedly, would like their surrounding properties to be enhanced by proposed schoolbuildings and to provide an improvedfacilities for quality education even in rural areas, we propose that for every donation of 5,000 square meters or more for schoolsite, the Department of Education, Culture and Sports shall be authorized to automatically allot for construction a ten(10)-classroom buildings including fencing, painting, and health facilities."

