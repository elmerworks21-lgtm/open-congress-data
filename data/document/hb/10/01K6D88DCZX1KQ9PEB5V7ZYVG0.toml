congress_website_abstract = "\"Act on Iodization Nationwide (ASIN)\" Promotes salt iodization as a cost-effective measure to prevent iodine deficiency disorder (IDD) - cause of public health problems as endemic goiter and cretinism, and contributes to deaf-mutism, squint, impairment of human reproduction organ (increased rates of abortion, stillbirth, congenital anomalies, prenatal and infant mortality), physical and intellectual development and work performance - thereyb assuring a healthy citizenry. * * *"
