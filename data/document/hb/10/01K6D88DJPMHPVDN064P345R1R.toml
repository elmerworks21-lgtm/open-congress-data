congress_website_title = "AN ACT REQUIRING THE SOCIAL SECURITY SYSTEM TO SET ASIDE A PORTION OF ITS INVESTMENT RESERVE FUND FOR THE LIVELIHOOD CREDIT NEEDS OF THE SOCIAL SECURITY SYSTEM PENSIONERS"
congress_website_abstract = "Requires the Social Security System (SSS) to set aside a portion of its investment reserve fund to be made available for loan to SSS pensioners who want to venture to livelihood projects. Provides that the amount of loan shall be determined by the actual livelihood credit needs of the applicant or not less than Twenty-Five Thousand (P25,000.00) pesos and interest rates to be charged shall not exceed interest rates charged on short and medium term loans to SSS covered employees and that said loan shall be paid back out of applicant's pension."
