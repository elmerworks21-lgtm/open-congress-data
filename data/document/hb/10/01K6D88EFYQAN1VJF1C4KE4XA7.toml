congress_website_title = "AN ACT INSTITUTIONALIZ ING THE ESTABLISHMENT OF AN APPEALS SYSTEM TO LOOK INTO COMPLAINTS ABOUT GRADES RECEIVED BY STUDENTS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Students' Grades Appeals Act of 1996\" Rationale: The learning experience must not be characterized by fear, luck and frustration jsut because of a some \"terror\" professors and uncaring school administrators. The academe must always be at the forefron of fairness and objectivity. The students' young minds must be molded early enough in an atmosphere where the principles of jsutice, democracy and compassion abound. Contains provisions on (1) announcement of the grading system; (2) transparency in grading; (3) consatitution of a TEACHER APPEALS COMMITTEE; (4) manner of deciding appeals; and (5) penalties."

