congress_website_title = "AN ACT REQUIRING DEVELOPERS OF INDUSTRIAL ESTATES TO ALLOCATE AT LEAST EIGHTEEN PERCENT (18%) OF THE TOTAL AREA OF THE ESTATE AS OPEN SPACE FOR GREENBELTS, MINI-FORESTS OR PUBLIC PARKS PLANTED WITH TREES"
congress_website_abstract = "Advances that \"By reserving 18% of the total area of industrial estates as greenbelts, mini forests or public parks, the effect of pollution is minimized, the environment is enhanced, and people can rest and take a break\" in the open space providedfor. Prescribes penalty for violation of this Act."

