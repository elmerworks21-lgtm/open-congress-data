congress_website_title = "AN ACT INSTITUTING A NATIONAL DRUG TESTING ACT AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: In the 1997 State of the Nation Address (SONA), the government declared an all-out war against the drug menace in the country. It has been noted, however, that among the nation's 5.7 million high school and college students, at least 365,000 of them are hooked to drugs, while an estimated 570,000 students are exprimenting with the substances. >Despite the reimposition of the death penalty and the dangers associated with the drug trade, this illegal indsutry continues to flourish. Defines \"DRUG TESTING\" as referring to testing and evaluative procedures whether physical, chemical, physiological or otherwise conducted by qualified health personnel and law-enforcement officers to determine whether the subject has taken or is using pprohibited or regulated drugs and substances. > Provides for these areas of concern: (1) Concerned and Implementing Agencies; (2) Jurisdiction; (3) Implementting Rules and Regulations; and (4) Penalties."

