congress_website_title = "AN ACT AUTHORIZING THE COMMISSION ON ELECTIONS TO PILOT TEST NATIONWIDE THE COMPUTERIZED SYSTEM OF ELECTION IN THE MAY 1997 BARANGAY ELECTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the following --- \"SECTION 2. The provisions of Republic Act 8046 which authorized the Commission on Election to pilot-test the computerized election sysatem during the election held in the Autonomous Region in Muslim Mindanao (ARRM) shall, as fas as practicable, apply to the barangay election. The Commission on Elections shall promulgate such necessary resolutions, rules and regulations to implement the provisions of this Act.\""
