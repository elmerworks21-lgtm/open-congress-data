congress_website_title = "AN ACT TO PROVIDE FOR THE PAYMENT THROUGH VETERANS BONDS OF BENEFITS UNDER THE VETERANS BENEFITS PROGRAM, AND FOR OTHER PURPOSES"
congress_website_abstract = "Authorizes the Treasurer of the Philippines to issue VETERANS BONDS to pay veterans' benefits which can not be met by current appropriations. The bonds shall be NEGOTIABLE INSTRUMENTS and shall bear interest at 10% per annum, tax-free, payable at maturity date - 5 years for the date of issuance."

