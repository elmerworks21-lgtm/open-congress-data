congress_website_title = "AN ACT REQUIRING THE PHILIPPINE CHARITY SWEEPSTAKES OFFICE (PCSO) TO SECURE THE PRIOR APPROVAL OF THE LOCAL GOVERNMENT UNIT CONCERNED BEFORE THE FORMER CAN ESTABLISH AND OPERATE LOTTO WITHIN THE JURISDICTION OF THE SAID LOCALITY, AMENDING FOR THIS PURPOSE REPUBLIC ACT NUMBERED ELEVEN HUNDRED AND SIXTY-NINE, AS AMENDED"
congress_website_abstract = "Seeks to impose the policy of respecting the prevailing sentiments of the affected populace through prior approval of the local government unit as expressed in an appropriate resolution of its sanggunian or legislative council. Requires the conductof public hearings prior to approval of lotto operations."
