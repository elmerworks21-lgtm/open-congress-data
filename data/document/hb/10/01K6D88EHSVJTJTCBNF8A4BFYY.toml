congress_website_title = "AN ACT CREATING A SPECIAL LOCAL DEVELOPMENT FUND FOR IMPROVING THE CAPACITY OF LOCAL GOVERNMENTS TO PROVIDE BASIC SERVICES"
congress_website_abstract = "Defines the nature of the proposed SPECIAL LOCAL DEVELOPMENT FUND as follows --- \"SEC. 1. Special Local Development Fund. - Ten percent (10%) of the national budget shall be allocated ffor the creation of a Special Local Development Fund (SLDF) which shall be used to improve the capacity of local government s to provide basic services. Fifty percent of the fund shall be channeled through the Land Bank of the Philippines (LBP) for lending to first class, second class and third class provinces,municipalitiess and barangays. The remaining fifty percent shall be used as grants to fourth class, fifth class andd sixth class provinces, municipalities andd barangays.\""

