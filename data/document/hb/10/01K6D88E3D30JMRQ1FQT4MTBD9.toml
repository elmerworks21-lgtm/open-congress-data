congress_website_title = "AN ACT DECLARING THE FIRST WORKING DAY OF EVERY MONTH AS 'PEOPLE'S DAY' WHEN CITIZENS CAN AIR THEIR COMPLAINTS, SUGGESTIONS AND GRIEVANCES DEIRECTLY TO THE HEAD OF THEIR RESPECTIVE LOCAL GOVERNMENT UNITS"
congress_website_abstract = "Declares it a policy of the State to promote the welfare of all the people by providing a responsive government that will hear and address whatever problems and grievances the people have. Directs the Department of Interior and Local Government to promulgate the necessary rules and regulations for the implementation of the provisions of this Act."
