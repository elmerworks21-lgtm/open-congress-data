congress_website_title = "AN ACT PROVIDING FOR ADDITIONAL PENALTIES FOR THE VIOLATION OF THE BOUNCING CHECKS LAW, AMENDING BATAS PAMBANSA BILANG 22 FOR THE PURPOSE(RE: PUBLICATION BY THE PAYEE OR HOLDER OF THE DISHONORED CHECK IN A NEWSPAPER OF LOCAL/GENERAL CIRCULATION, INFORMATIONS WITH REGARD TO THE SAID CHECK)"
congress_website_abstract = "Rationale: Batas Pambansa Blg. 22 was enacted to discourage and deter the issuance of bouncing checks, but sad to say the nefarious and despicable practice of issuing bouncing checks still continues unabated. Court dockets of lower courts are clogged with cases of vioaltion of the Bouncing Checks Law so much so that there is a pervading feeling that Batas Pambansa Blg. 22 has not been an effective deterrent to the issuance of bouncing checks. Provides, therefore, for the following --- \"Section1. The payee or holder of the dishonored check, after the lapse of five (5) days from receipt of the notice by the drawer or maker that the check has not been paid by the drawee, may publish in a newspaper of local circulation if the amount of thedishonored check is ONE HUNDRED THOUSAND (P100,000.00) PESOS or less, or in a newspaper of general circulation if the amount of the dishonored check is more that ONE HUNDRED THOUSAND (P100,000.00) PESOS providing the following information: (1) Name o"

