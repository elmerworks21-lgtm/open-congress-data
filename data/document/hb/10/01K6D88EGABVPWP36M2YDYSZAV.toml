congress_website_title = "AN ACT CREATING THE TRADITIONAL AND ALTERNATIVE HEALTH CARE INSTITUTE TO ACCELERATE THE DEVELOPMENT OF TRADITIONAL AND ALTERNATIVE HEALTH CARE IN THE PHILIPPINES, PROVIDING FOR A TRADITIONAL AND ALTERNATIVE HEALTH CARE DEVELOPMENT FUND AND FOR OTHERPURPOSES"
congress_website_abstract = "\"Traditional and Alternative Health Care Development Act of 1996\" Rationale: Traditional health care derived from indigenous practices provide an alternative to conventional halth care. The cost promises to be significantly less because of the use of inddigenous materials. There is however need to identify, study and prmote the use of traditional and alternative health care methods that are proven safe and effective consistent with government standards on medical practices."
