congress_website_title = "AN ACT CREATING THE PHILIPPINE INSTITUTE OF TRADITIONAL AND COMPLEMENTARY HEALTH CARE (PITCHC) TO ACCELERATE THE DEVELOPMENT OF TRADITIONAL AND COMPLEMENTARY HEALTH CARE IN THE PHILIPPINES, PROVIDING FOR A TRADITIONAL AND COMPLEMENTARY HEALTH CARE DEVELOPMENT FUND AND OTHER PURPOSES"
congress_website_abstract = "\"Traditional and Complementary Health Care Development Act of 1997\" This bill aims to --- (1) to encourage scientific research on and development of traditional and complementary health care systems, particularly those with direct impact on public health; (2) to formulate standards, guidelines and codes of ethical pracctice appropriate for the practice of traditional and complementary health care as well as in the manufacture, quality control and marketing of different traditional and complementary health care materials, natural and organic products for approval and adoption; and (3) to formulate policies to strenghten the role of traditional and complementary health care delivery system."

