congress_website_title = "AN ACT GRANTING HONORARIA TO ALL ACCREDITED BARANGAY HEALTH WORKERS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7883, OTHERWISE KNOWN AS THE 'BARANGAY HEALTH WORKERS INCENTIVES AND BENEFITS ACT OF 1995' AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Barangay Health Workers Benefits and Incentives Act of 1995\" Grants HONORARIA to all accredited barangay health workers amounting to Two Thousand Pesos (P2,000.00) per month. Provides for the following additional incentives and benefits: (1) Hazardallowance; (2) Subsistence allowance; (3) Training, education and Career Enrichment Program; (4) Civil Service Eligibility; (5) Free Legal Services; and (6) Preferential Access to Loan."

