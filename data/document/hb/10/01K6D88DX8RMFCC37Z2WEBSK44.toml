congress_website_title = "AN ACT PROHIBITING AND PENALIZING USURIOUS INTEREST FOR LOAN OR FORBEARANCE OF ANY MONEY, GOODS OR CREDITS"
congress_website_abstract = "\"5 - 6 Law\" Provides for the following effective rate of interest: (1) Excluding commissions, premiums, fees and other charges for the loan or forbearance of any money, goods or credits where sich loan or renewal thereof, or forbearance has a maturity of less than 730 days or less, shall not exceed fourteen percent (14%) per annum for accrued loans and sixteen percent (16%) for unsecured loans; (2) Including commissions, premiums, fees and other charges for the loan or forbearance of any money,goods or credits where such loan or renewal thereof, or forbearance has a maturity of more than 730 days, shall not exceed twenty one (21%) percent per annum both secured and unsecured loans."

