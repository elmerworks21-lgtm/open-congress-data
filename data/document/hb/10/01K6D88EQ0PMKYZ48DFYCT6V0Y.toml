congress_website_title = "AN ACT UPGRADING THE MINIMUM SALARY GRADE LEVEL OF PUBLIC SCHOOL TEACHERS IN ELEMENTARY AND SECONDARY LEVELS FROM GRADE 10 TO GRADE 18 AND AUTHORIZING THE APPROPRIATION OF FUNDS THEREFOR"
congress_website_abstract = "Rationale: It has been found by the Congresssional Commission on Education that teacher's complaints center on three principal problems: namely, low salaries, too many activities that are not related to teaching, and non-implementat ion of existinglaws granting benefits to teachers. The cornerstone of any public policy to upgrade teachers' quality must be the restoration of their dignity and their standard of living. The initial step to restore the image off the teaching profession is to uplift the economic condition of the teachers. To achieve this, it is imperative that their salaries should be upgraded to that level where they could live a decent and respective life."

