congress_website_title = "AN ACT IMPOSING A FIFTEEN PERCENT (15%) INCOME TAX ON THE GROSS TAXABLE INCOME/PROFIT OF A CORPORATION"
congress_website_abstract = "States that a tax of FIFTEEN PERCENT (15%) tax shall be imposed upon the taxable gross income/profit received during each taxable year from all sources within the Philippine by every corporation organized in, or existing under the laws of the Philippines, and partnerships, no matter how created or organized, but not including general professional partnerships."
