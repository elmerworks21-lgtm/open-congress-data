congress_website_title = "AN ACT GRANTING ONE THOUSAND PESOS MONTHLY ALLOWANCE TO ALL BARANGAY TANODS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "States that --- \" Section 3. Every barangay shall be entitled to enlist the services of at least ten barangay tanods but which shall not exceed twenty, depending upon the population of each barangay, whose names and dates of service shall be properly recorded and forwarded to the municipal office by the barangay secretary or the barangay captain. \"Section 4. The amount of allowance provided herein shall not be afected by any other form of remuneration which the barangay tanods might be entitledto from their respective municipalities arising but of municipal special projects in the barangay or other similar activities."

