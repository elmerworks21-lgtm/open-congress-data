congress_website_title = "AN ACT GRANTING BARANGAY NUTRITION SCHOLARS ASSIGNED TO NUTRITIONALLY DEPRESSED AREAS AN ANNUAL TRAVEL ALLOWANCE OF TWO THOUSAND PESOS (P2,O00.00), AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED FIFTEEN HUNDRED SIXTY-NINE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Underscores the need to bring the government's nutrition programs to our people at the grassroots level and to encourage community initiative and participation in community nutrition activities. The Barangay Nutrition Scholar Project focuses on theinvaluable service rendered by volunteer assigned to nutritionally depressed areas of the country."

