congress_website_title = "AN ACT AMENDING SECTION 264 OF THE OMNIBUS ELECTION CODE IN ORDER TO INCREASE THE PENALTY FOR ELECTION OFFENSES"
congress_website_abstract = "Provides that the penalty for any election offense shall be imprisonment for not less than [one (1) year] THREE (3) YEARS, but not more than [six (6)] TEN (10) YEARS; provides, likewise, that the political party found guilty shall be fined not lessthan [ten (10)] FIFTY (50) thousand pesos."
