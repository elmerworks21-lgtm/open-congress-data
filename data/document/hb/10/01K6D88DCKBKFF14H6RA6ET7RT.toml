congress_website_title = "AN ACT STRENGTHENING THE MECHANISMS TO IMPLEMENT COUNTERVAILING AND FLEXIBLE DUTIES TO CONFORM WITH THE PROVISIONS OF THE GATT URUGUAY ROUND FINAL ACT AND AMENDING PRESIDENTIAL DECREE 1464 OTHERWISE KNOWN AS THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES FOR THESE PURPOSES"
