congress_website_title = "AN ACT STRENGTHENING THE GOVERNMENT'S PRICE REGULATION MEASURES THROUGH THE CREATION OF LOCAL PRICE STABILIZATION COUNCILS, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SEVENTY-FIVE HUNDRED AND EIGHTY-ONE OTHERWISE KNOWN AS THE 'PRICE ACT'"
congress_website_abstract = "Precribes the composition of the proposed LOCAL PRICE STABILIZATION COUNCILS, as well as their functions, such as: (1) To conduct surveys on the selling prices of all basic necessities and prime commodities; (2) To determine measures and strategiesto effect stabilization of prices of prime commodities, etc."

