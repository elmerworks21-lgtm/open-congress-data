congress_website_title = "AN ACT ORDAINING AND INSTITUTING A REVISED INSURANCE CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: This bill has for its purpose the revision and updating of certain provisions of the existing Insurance Code of the Philippines. It aims to further strengthen one of the most vital industries in our economy that contributes directly to the financial security of our people and which at the same time supports the economic development programs of the government. > With the globalization trend and modern technology upon us, several provisions in the present Insurance Code which was passed in 1978 have already become outmoded and in dire need of revision. > Proposes significant REVISIONS to the Code on the following areas: (1) suretyship; (2) margin of solvency; (3) Investment; (4) Insurance Commission; (5) Adjudicating power; (6) Juurisdiction; (7) Feesl and (8) Pre-need contract."

