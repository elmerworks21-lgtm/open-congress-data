congress_website_title = "AN ACT AMENDING SECTION TWENTY FIVE LETTER B OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, REQUIRING ALL NATIONAL PROGRAMS AND PROJECTS WHICH ARE LOCATION SPECIFIC TO BE INTEGRATED WITH LOCAL DEVELOPMENT PLANS, ANDFOR OTHER PURPOSES"
congress_website_abstract = "Rationale: To enhance intergovernment al relations between national agencies and the local government units. With the President exercising genreal sueprvision over the local government units, the national agencies and offices which are tasked withimplementing programs in the local level are likewise given the mandate to ensure that the LGU's are encouraged to participate in these development undertakings. Mandates all national agencies to submit all national programs, projects and plans whichare location specific to a province, city or municipality to the local government unit concerned for integration with the Local Development Plan."

