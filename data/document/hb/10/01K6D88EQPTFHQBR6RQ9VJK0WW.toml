congress_website_title = "AN ACT APPROPRIATING THE SUM OF ONE BILLION FIVE HUNDRED MILLION PESOS (P1,500,000,000 .00) TO FUND THE REGISTRATION ACTIVITIES TO BE CONDUCTED BY THE COMMISSION ON ELECTIONS PURSUANT TO REPUBLIC ACT NUMBERED EIGHTY-ONE HUNDRED EIGHTY-NINE (R.A. 8189), OTHERWISE KNOWN AS THE 'VOTER'S REGISTRATION ACT OF 1996'"
congress_website_abstract = "Rationale: The General Appropriations Act of 1997, however, allocates only P500 million for general registration of voters scheduled immediately after the barangay elections in May 1997 which is P1.5 billion short of the P2 billion funding requirement under R.A. No. 8189. The much-needed P2 billion will cover not only personal services and maintenance and other operating expenses but also the cost of voters ID cards for an estimated 40 million voters. > If this budgetary requirements is not met, the full intent of the law which is to cleanse the elctoral system of tampered and spurious lsits of voters shall be frustrated. The new list to be generated after the scheduled general registration will ensure the integity of the electoral resultss of the May 1998 national elections and all elections, plebiscites, referenda, initiatives and recalls thereafter."
