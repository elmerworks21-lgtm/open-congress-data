congress_website_title = "AN ACT TO AMEND SECTION 1 AND SECTION 3 OF PRESIDENTIAL DECREE NO. 1866, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes a humane treatment of the penalties imposed for illegal possession of firearms as provided for in PD 1866 and RA 7659 by lowering the stiff penalties therein: Example: Penalty for the unlawful manufacture, sale, disposition or possession offirearms or ammunition is [reclusion temporal in its maximum period to reclusion perpetua] ONE (1) YEAR AND ONE (1) DAY TO FIVE (5) YEARS OF IMPRISONMENT AND A FINE OF P1,000.00 to P5,000.00 PESOS."

