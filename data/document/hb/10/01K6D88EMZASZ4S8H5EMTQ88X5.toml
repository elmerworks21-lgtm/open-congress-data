congress_website_title = "AN ACT CREATING THE COMMISSION ON PREPARATORY SCHOOL EDUCATION, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "States the OBJECTIVES of the proposed Commission as follows: The Commission shall promote and work for the development of preparatory school education in the Philippines by way of prescribing and monitoring the curriculum on a periodical basis and constantly reviewing the instructional materials used to teach preparatory school pupils. The Commission shall likewise safeguard the quality of preparatory school education in the Philippines.> Prescribes the powers and functions of the Commission."

