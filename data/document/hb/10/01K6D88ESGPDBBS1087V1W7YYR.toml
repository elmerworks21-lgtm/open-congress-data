congress_website_title = "AN ACT ENHANCING FURTHER WORKERS' WELFARE BY PROHIBITING AND CRIMINALIZING 'BOUNDARY SYSTEM' AND SIMILAR SCHEMES IN TAXI AND OTHER PUBLIC TRANSPORT COMPANIES"
congress_website_abstract = "Rationale: 'Boundary system' is a system whereby a franchise operator of let us say, jeepneys, rents out his jeepney to a driver, at say P30.00 a day. The owner (operator) expects to collect from the driver his P30.00 at the end of the day. Any earning over and above the P30.00 (the boundary) goes to the driver. So the bigger the earnings over and above the boundary, as in this example, the better for the driver. > This is the reason why drivers, under this boundary agreement , are apt to drive faster and always on the go, for the more trips they make in a day, the bigger their earnings. This rush maneuver or operation, however, almost always results in accidents unfortunately."

