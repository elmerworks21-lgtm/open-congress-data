congress_website_title = "AN ACT ESTABLISHING THE NATIONAL COMMISSION FOR RESEARCH AND DEVELOPMENT, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Congress is mandated by the Constitution to provide full support for research and development because of its critical importance to industrializati on and global competitiveness , Provides, therefore, to the creation of the NATIONAL COMMISSION FOR RESEARCH AND DEVELOPMENT, its composition, powers and functions. Establishes the NATIONAL RESEARCH AND DEVELOPMENT to enhance R and D activities in the country."

