congress_website_title = "AN ACT ENCOURAGING INDUSTRIES AND INCREASING ECONOMIC ACTIVITY IN THE RURAL AREAS"
congress_website_abstract = "Declares that the national government shall implement and support a continuing program to promote rural industrializati on, as follows: (1) Establishment of a BUSINESS CENTER in the municipality/ba rangay with a 100,000 population; (2) Establishment of INVENTION CENTERS in every province; (3) Establishment of FUNCTIONAL facilities between national and international basic research institutions and the applied research and development centers in the provinces; and (4) Granting of financial assistance to municipalities to cover salaries/allowa nces of rural extension workers."

