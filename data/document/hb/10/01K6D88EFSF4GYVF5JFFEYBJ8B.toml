congress_website_title = "AN ACT MAKING AVAILABLE TO THE UNDERPRIVILEGED AND HOMELESS DECENT HOUSING UNITS AT AFFORDABLE COST BY GRANTING ADDITIONAL INCENTIVES FOR THE PRIVATE SECTOR PARTICIPATING IN SOCIALIZED HOUSING, AMENDING FOR THE PURPOSE R. A. NO. 7279, OTHERWISE KNOWN AS THE URBAN DEVELOPMENT AND HOUSING ACT OF 1992"
congress_website_abstract = "Aims to uplift the conditions of the underprivileged and to provide decent housing at affordable cost for the homeless. Grants, therefore, additional incentives for the private sector participating in socialized housing, such as exemption from the payment of DOCUMENTARY STAMP TAX AND REGISTRATION FEES, INCLUDING FEES REQUIRED FOR THE ISSUANCE OIF TRANSFER CERTIFICATE OF TITLES."

