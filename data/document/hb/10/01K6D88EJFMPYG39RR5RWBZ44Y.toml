congress_website_title = "AN ACT FIXING THE MINIMUM AMOUNT OF INVESTIBLE FUNDS OF THE SOCIAL SECURITY SYSTEM AND THE GOVERNMENT SERVICE INSURANCE SYSTEM FOR LOW-COST HOUSING, AMENDING FOR THIS PURPOSE SECTION 26, SUBPARAGRAPH D OF THE SOCIAL SECURITY LAW, OTHERWISE KNOWN ASREPUBLIC ACT NO. 1161, AS AMENDED, AND SECTION 30 OF THE REVISED GOVERNMENT SERVICE INSURANCE ACT, OTHERWISE KNOWN AS PRESIDENTIAL DECREE NO. 1146"
congress_website_abstract = "Rationale: The Philippine Government adopted a national shelter program sometime ago, with, the aim of alleviating the country's grave problem on housing. It has set itself to build 1.2 million low-cost housing units by the year 1998. > The nobilityof the program however is currently being undermined in that, designated government agencies tasked with contributing funds for the housing project have not been complying with their obligations on time. Such has prompted adverse response from participating housing developers and their affiliates, who decided to withdraw from the program. > Provides for the following --- \"SEC. 30. Investment of Funds. Funds of the sytem not needed to meet the current obligation may be invested under such termms and conditions as may be determined by the Board.[.]:PROVI DED, THAT AT LEAST THIRTY PERCENT (30%) OF THE INVESTIBLE FUNDS SHALL BE UTILIZED FOR LOW-COST HOUSING PURPOSES.\""

