congress_website_title = "AN ACT INCREASING THE MEMBERSHIP OF THE DEPARTMENT OF AGRARIAN REFORM ADJUDICATION BOARD (DARAB) AMENDING FOR THE PURPOSE SECTION 13 OF EXECUTIVE ORDER NO. 129-A ENTITLED 'MODIFYING EXECUTIVE ORDER NO. 129, REORGANIZING AND STRENGTHENING THE DEPARTMENT OF AGRARIAN REFORM AND FOR OTHER PURPOSES' DATED JULY 26, 1987"
congress_website_abstract = "Proposes this amendatory provision on the membership of the DARAB: \"SEC. 13. Agrarian Reform Adjudication Board. - There is hereby created an Agrarian Reform Adjudication Board under the Office of the Secretary. The Board shall be composed of the Secretary as Chairman, the Assistant Secretary for Legal Affairs, and [three] (3) SEVEN (7) others to be appointed by the President upon the recommendation of the Secretary as members.\""
