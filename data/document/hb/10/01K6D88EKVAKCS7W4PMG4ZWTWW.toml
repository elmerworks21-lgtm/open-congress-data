congress_website_title = "AN ACT AMENDING SECTIONS 140 AND 142 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED BY REPUBLIC ACT NUMBERED EIGHTY-TWO HUNDRED AND FORTY(AMENDMENT S TO COMPREHENSIVE TAX REFORM PACKAGE) (ctrp II, beer, cigarette, liquor)jm"
