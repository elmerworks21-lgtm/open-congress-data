congress_website_title = "AN ACT FURTHER AMENDING REPUBLIC ACT NUMBERED SIXTY FOUR HUNDRED AND TWENTY-FIVE, OTHERWISE KNOWN AS THE DANGEROUS DRUGS ACT OF 1972, AS AMENDED"
congress_website_abstract = "\"The REVISED Dangerous Drugs Act of 1972\" Proposes a number of significant amendments to RA 6425, such as: (1) Transfers the Dangerous Drugs Board to the Dept. of Justice; (2) Provides rewards not only to informers but to enforcers, as well; (3) Clarifies definition and scope of the dangerous drugs, etc."
