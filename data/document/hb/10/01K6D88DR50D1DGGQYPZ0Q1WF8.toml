congress_website_title = "AN ACT ENJOINING ALL SCHOOLS, WHETHER PUBLIC OR PRIVATE, TO CONTINUOUSLY USE BOTH ENGLISH AND FILIPINO AS A MEDIUM OF INSTRUCTION, THEREBY ADOPTING A POLICY OF BILINGUAL EDUCATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to increase competence in both Filipino and English language through their use as a medium of isntruction at all levels of learning. Aims to develop abled citizens; instill nationalism and patriotism within them; and to enable them to communicate effectively in the community of nations where English is acknowledged as a primary language."

