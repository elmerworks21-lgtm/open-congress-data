congress_website_title = "AN ACT REDEFINING THE APPLICATION OF PREVENTIVE SUSPENSION UNDER EXISTING LAWS ON ELECTIVE OFFICIALS"
congress_website_abstract = "Redefines the application of preventive suspension under existing laws on elective officials for any offense committed or imputed to have been committed prior to his election while the complaint is pending investigation or the case is pending investigation or the case is pending trial in court notwithstanding the provisions of Sec. 13, RA 3019 (Anti-Graft and Corrupt Practices Law, Sec. 24 of RA 6770 (Ombudsman Act of 1989), Sec. 63 of RA 7160 (Local Government Code of 1991). Excludes a MEMBEROF THE LEGISLATURE TO BE SUBJECTED TO PREVENTIVE SUSPENSION FOR ANY COMPLAINT BROUGHT BEFORE THE OMBUDSMAN OR THE SANDIGANBAYAN PRIOR TO HIS ELECTION OR DURING HIS CUARRENT TERM OF OFFICE, WHILE THE SAME IS PENDING INVESTIGATION, OR PENDING TRIAL INCOURT, EXCEPT UPON THE INITIATIVE OF THE LEGISLATIVE BODY TO WHICH HE BELONGS."

