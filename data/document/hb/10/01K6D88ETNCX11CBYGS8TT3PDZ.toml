congress_website_title = "AN ACT TO REPEAL PRESIDENTIAL DECREE NO. 1818 (P.D.1818 - PROHIBITING COURTS FROM ISSUING RESTRAINING ORDERS OR PRELIMINARY INJUNCTIONS IN CASES INVOLVING INFRASTRUCTURE AND NATURAL RESOURCES PROJECTS OF, AND PUBLIC UTILITIES OPERATED BY, THE GOVERNMENT)"
congress_website_abstract = "Rationale: PD 1818, enacted by then Pres. Ferdinand Marcos in 1981, prohibits the courts from issuing restrining orders and injunctions in cases involving development projects of, and public utilities operated by the government. This Act puts an obstacle to the right of the people, the communities, and to question governmental activities which they deem disadvantageous to their health, total development and environment. Essentially, this Act violates the people's right to seek remedies to pursue their right to health and healthy environment as well as their right to freedom of choice. >Seeks, therefore, to REPEAL PD 1818."

