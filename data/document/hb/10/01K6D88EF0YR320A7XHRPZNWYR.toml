congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE SPORTS HALL OF FAME AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: \"Several athletes have brought honors to the Philippines through the sports competitions they participated in. Some have risked their lives, and even died while defending a title for the Philippines. It is disheartening, however, that when these athletes retire, they are easily forgotten.\""
