congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7432, OTHERWISE KNOWN AS AN ACT TO MAXIMIZE THE CONTRIBUTION OF THE SENIOR CITIZENS TO NATION BUIILDING, GRANT BENEFITS AND SPECIAL PRIVILEGES AND FOR OTHER PURPOSES BY INCREASING PENALTIES FOR THE VIOLATION OF ANY OF THE PROVISIONS THEREOF"
congress_website_abstract = "Rationale: Republic Act No. 7432 known as' An Act To Maximize The Contribution of Senior Citizens to Nation Building grant benefits and Special Privileges and for other purposes' has provided certain benefits and privileges to senior citizens. Howeverm in may areas in the country there have been recurrent complaints about establishments especially drugstores and restaurants which refuse to extend to the senior citizens the discounts provided under law or resort to excuses just to avoid extending the prescribed discount to the senior citizens.> Proposes to INCREASE the penalties prescribed for violations of RA 7432 from P6,000.00 fine TO TEN THOUSAND PESOS (P10,000.00)."

