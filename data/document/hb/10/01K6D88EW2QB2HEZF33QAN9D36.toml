congress_website_title = "AN ACT TO REVERT ARTICLE 315, PARAGRAPH 2(d) OF THE REVISED PENAL CODE TO ITS ORIGINAL FORM, THEREBY REPEALING PRESIDENTIAL DECREE NO. 818, ENTITLED 'AMENDING ARTICLE 315 OF THE REVISED PENAL CODE BY INCREASING THE PENALTIES FOR ESTAFA COMMITTED BYMEANS OF BOUNCING CHECKS'"
congress_website_abstract = "Rationale: The Supreme Court, in people vs. Reyes (GR. No. 101127-31, August 7, 1992) said, to wit: > \"It is suggested that since estafa is a crime against property and supposedly not as \"heinous\" as crimes against persons or chastity, such as murder or rape, it should not be equated with the latter felonies in justifying the denial of bail to the accused. From the preceding disquisition, the obvious rsposte is that this is a matter which should be properly addressed to by the legislature. It is not for this Court, by judicial legislation, to amend the pertinent provisions of the Revised Penal Code. x x x On this score, we can take judicial notice that multimillion or large-scale estafa cases and inveterate or professional swindlers have iinflicted untold damages and misery not only on one or two but on countless victims in this country.\" > Seeks, therefore, to REPEAL PD No. 818, Amending Article 315 of the Revised Penal Code by Increasing the Penalties for Estafa Committed by Means o"

