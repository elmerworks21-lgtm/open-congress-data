congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION OF LESSEES FROM HARASSMENT AND INCREASING THE PENALTIES THEREFOR, AMENDING FOR THE PURPOSE BATAS PAMBANSA BILANG 877, ENTITLED 'AN ACT PROVIDING FOR THE STABILIZATION AND REGULATION OF RENTALS OF CERTAIN RESIDENTIAL UNITS AND FOR OTHER PURPOSES'"
congress_website_abstract = "Provides for the following --- \"SEC. 4-A. PROTECTION OF LESSEE AGAINST HARASSMENT. - THE LESSOR SHALL PROTECT THE LESSES FROM ANY FORM OF HARASSMENT, ANNOYANCE OR DISTURBANCE OF HIS PEACEFUL AND LAWFUL POSSESSION OF HIS RENTED RESIDENTIAL UNIT INCLUDING THE USE AND ENJOYMENT OF THE AUXILIARY PART OF HIS RESIDENCE, INCLUDING BUT NOT LIMITED TO THE GARAGE AND DRIVEWAY FOR INGRESS AND EGRESS, COMMON PLAYGROUND AND WASHING AREAS.\""

