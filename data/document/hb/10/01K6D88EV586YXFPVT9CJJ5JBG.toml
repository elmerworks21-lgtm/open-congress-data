congress_website_title = "AN ACT TO AMEND SECTION 291 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE \"LOCAL GOVERNMENT CODE OF 1991\", AND FOR OTHER PURPOSES(RE: SHARE OF LGUS IN THE NATIONAL WEALTH)"
congress_website_abstract = "Rationale: The Local Government Code which was enacted in 1991 provides for the empowerment of local government units. To achieve a successful decentralizatio n of powers, the same Code rationalized the taxing powers of these local government unitsand their share in the national wealth. However, it has been observed that the share of local government units in the national wealth is not equitable. Mandates that local government units shall have a [one (1%) THREE PERCENT (3%) share of the grosssales or receipts of the preceding calendar year, derived by any government agency or government-owne d or-controlled corporation engaged in the utilization and development of the national wealth."

