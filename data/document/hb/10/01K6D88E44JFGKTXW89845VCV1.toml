congress_website_title = "AN ACT IMPOSING A MANDATORY MORATORIUM ON THE ACCRUAL AND COLLECTION OF PRINCIPAL INTERESTS, PENALTIES AND SURCHARGES ON ALL LOANS FROM PUBLIC AND PRIVATE FINANCIAL INSTITUTIONS, PERSONS FOR A PERIOD OF SIX MONTHS FROM THE TIME ANY AREA WITHIN THE TERRITORIAL JURISDICTION OF THE REPUBLIC OF THE PHILIPPINES IS DECLARED A CALAMITY AREA BY THE PRESIDENT OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Moratorium in Calamity Act\" Penalizes financial institution or private lender (1) to a fine equivalent to five (5) times the interests, penalties and surcharges collected in vioaltion of the provisions of this act for the first offense; (2) to a fine equivalent to ten (10) times the amounts in interests, penalties and surcharges collected for the second offense and (3) suspension of the license to oeprate for the third and subsequent offense."

