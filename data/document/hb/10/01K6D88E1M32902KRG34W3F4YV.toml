congress_website_title = "AN ACT GRANTING ALL CITIZENS' ARM EQUAL OPPORTUNITY TO BE ACCREDITED BY THE COMMISSION ON ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SEVENTY-ONE HUNDRED AND SIXTY-SIX, AS AMENDED"
