congress_website_title = "AN ACT TO AMEND SECTIONS ONE (1), THREE (3) AND EIGHT (8) OF PRESIDENTIAL DECREE NUMBERED ONE THOUSAND EIGHT HUNDRED AND SIXTY-SIX, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to amend the penalties imposed for the unlawful manufacture, sale, acquisition, disposition or possession of firearms or ammunition as follows --- (1) The penalty of [reclusion temporal in its maximum period to reclusion perpetua] AN IMPRISONMENT FOR A PERIOD OF NOT LESS THAN ONE (1) YEAR AND ONE (1) DAY NOR MORE THAN FIVE (5) YEARS AND A FINE OF NOT LESS THAN P5,000.00; (2) The penalty of [reclusion temporal in its maximum period to reclusion perpetua] AN IMPRISONMENT FOR A PERIOD OFNOT LESS THAN ONE (1) YEAR AND ONE (1) DAY NOR MORE THAN FIVE (5) YEARS, AND A FINE OF NOT LESS THAN P5,000.00 NOR MORE THAN P20,000.00 shall be imposed upon the owner president, manager, director of the corporation found guilty of this act."

