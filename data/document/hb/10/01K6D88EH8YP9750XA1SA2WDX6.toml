congress_website_title = "AN ACT DIRECTING THE SECRETARY OF ENVIRONMENT AND NATURAL RESOURCES TO NULLIFY TITLES OVER LANDS NOT YET CLASSIFIED AS ALIENABLE AND DISPOSABLE AT THE TIME OF THE ISSUANCE OF SAID TITLES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the following --- \"SECTION 1. Wherever it is determined by the Secretary of Environment and Natural Resources, after investigation and due hearing at his own initiative or at the instance of any party, office or entity, that a parcel ofland, or any portion thereof, was not yet classified as alienable and disposable at the time of the issueance of the title thereto, he shall declare the title null and void insofar as it covers said landd or portion thereof.\""

