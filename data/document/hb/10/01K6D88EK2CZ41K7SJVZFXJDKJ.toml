congress_website_title = "AN ACT TO ENCOURAGE SAVINGS MOBILIZATION BY GRANTING TAX PRIVILEGES TO SMALL DEPOSITORS"
congress_website_abstract = "Rationale: The importance of savings as a catalyst of economic growth cannot be underscored. It is savings, after all, which generates the broad base of investible funds which, in turn, are responsible for business formation, industrial build-up, employment and income creation, among others. Entitles, therefore, tax privileges to small depositors by allowing them to use the twenty per cent (20%) final withholding tax paid on their interest income as tax credit or tax refund pursuant to terms and conditions specified in this Act. Defines SMALL DEPOSITORS to refer to any individual with an aggregate annual savings account not exceeding five hudnred thousand pesos (P500,000.00) per year."

