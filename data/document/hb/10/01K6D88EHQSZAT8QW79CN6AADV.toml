congress_website_title = "AN ACT GRANTING THE EQUIVALENT OF THE MONEY VALUE OF THE MATERNITY AND PATERNITY LEAVES NOW BEING ENJOYED BY MARRIED EMPLOYEES IN THE PRIVATE AND PUBLIC SECTORS TO THEIR UNMARRIED COUNTERPARTS WHO ARE AT LEAST FORTY (40) YEARS OLD, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Rationale: To place, therefore, these unmarried members off the working force, on equal footing with married ones, we proposed the grant of the same benefits and entitlements currently being enjoyed by the married government employees andd those inthe private sector to their unmarried counterparts in terms off the money value of the maternity andd paternity leaves, whoa re at least forty years old now enjoy. Provides for the following --- \"Section 1. The grant of the equivalent of the money value of maternity and paternity leaves now being enjoyed by legally married employees in the government and private sectors to their unmarried counterparts who are at least forty (40) years old is hereby authorized.\""

