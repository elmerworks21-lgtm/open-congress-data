congress_website_title = "AN ACT CREATING THE PHILIPPINE SPORTS ACADEMY, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Sports Academy Act of 1995\" Provides for the establishment of a Philippine Sports Academy which shall serve as a specialized education and training center for ahtletes, as well as sports officials and coaches. Prescribes the three (3) main features of the proposed Academy, namely: (1) a laboratory High School which shall offer full scholarship to outstanding and potential young athletes; (2) a training center which shall offer short-term courses in Physical Education and Sports designed for P.E. teachers, coaches, local government sports coordinators, private sectors' sports leaders and others; and (3) A Research Center for Physical Education and Sports studies to professionalize the approach and methodlogy of sports developmeent."

