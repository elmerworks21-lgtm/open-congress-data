congress_website_title = "AN ACT TO PROVIDE A COMPREHENSIVE PROGRAM AGAINST WIFE CRUELTY, INCREASING PENALTIES FOR OFFENDERS THEREOF, AND FOR OTHER PURPOSES (beating)"
congress_website_abstract = "Rationale: In spite of a sytem of penalties in the Revised Penal Code for physical injuries, the same has been proven to be inadequate in effectively curbing the incidence of this crime. > In the absence of laws, specifically penalizing such cruel acts, husband-offende rs are rarely made to account for their abhorrent predilection. \"Wife Cruelty Act\" Recommends the following --- (1) the victim may avail herself of the protection and legal assistance of the DOJ; and the services of a Family Therapeutic Crisis Center or a women's crisis center run by an NGO; (2) protection by the Court during litigation; (3) assistance from the PNP; (4) husband-offende rs shall be liable to suffer a penalty of one (1) degree higher than that provided udner AArticles 262 and Articles 282, 283 and 285 of Revised Penal Code; (5) establishment of Family Therapeutic Crisis Centers in all municipalities thru the local social welfare and development office or in coordination with NOGs; (6) counselling and trea"
