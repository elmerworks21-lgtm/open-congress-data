congress_website_title = "AN ACT REQUIRING THE TEACHING OF DISASTER AWARENESS AND DISASTER MITIGATION AS PART OF THE CURRICULUM OF ALL PRIMARY AND SECONDARY SCHOOLS IN THE COUNTRY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The Philippines is one of the most disaster- prone countries in the world and the need is imminent to promote awarenessd of the hazards concomitant with it. The Philippine archipelago is particularly prone to earthquakes, volcanic eruptions, typhoons, tsunami, floods and droughtbecause of its geologic and geographical conditions and yet studies done by the NATIONAL CONFERENCE ON NATURAL DISASTER MITIGATION in October 1994 have shown that we, as a people, have been observed to be more reactionary than anticipatory in our disaster-prepar edness and hazard awareness. Planning for a probable disaster is low in the priorities of majority of the population, especially among the low-income bracket whose main preoccupation is daily subbsistence and survivial. Sadly, data from the Asian Disaster Preparedness Center in Thailand shows that in 1994, the world economy lost more money from natural disasters that is spent on development aid."

