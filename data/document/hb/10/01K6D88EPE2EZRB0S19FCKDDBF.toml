congress_website_title = "AN ACT PROVIDING FOR AN AUTOMATIC INCREASE IN PENSION BENEFITS OF RETIRED MEMBERS OF THE SUPREME COURT, THE COURT OF APPEALS AND THE SANDIGANBAYAN, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Given the present economic realities and rising inflation that rapidly diminishes the peso's purchasing power, these retirees are left helpless in a highly insecure financial condition which their modest monthly pension hardly get them through. To the retired justices of the superior courts, the lifetime of dedicted service in the revered courtroom is a sacrifice that may not be adequately rewarded with the prospect of meager monthly check in one's twilight years."

