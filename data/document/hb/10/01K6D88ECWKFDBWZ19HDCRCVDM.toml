congress_website_title = "AN ACT REQUIRING HOSPITALS WITH INTENSIVE CARE UNITS, WHETHER PRIVATE OR GOVERNMENT-OWNE D, TO ENGAGE ON FULL-TIME BASIS, THE SERVICES OF MEDICAL SPECIALISTS IN ALL FIELDS OF MEDICINE, TO IMMEDIATELY ADDRESS THE NEEDS OF THE INTENSIVE CARE UNIT PATIENTS DURING NIGHT AND DAY"
congress_website_abstract = "States that --- \"SECTION 1. Medical specialists whose services are required day or night by the Intensive Care Unit patients or patients who are in very serious conditions, must be engaged, on full-time basis, by the hospitals in order that the needs of the said patients will be addressed immediately as they arise to save their lives."

