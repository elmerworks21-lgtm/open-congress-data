congress_website_title = "AN ACT DECLARING ILLEGAL LOGGING, AS DEFINED IN EXISTING LAWS, AS A HEINOUS CRIME IMPOSING THE DEATH PENALTY THEREFOR"
congress_website_abstract = "Declares the following --- \"SECTION 1. Any person who drectly or indirectly, cuts or gathers logs on forest or timber lands without the necessary permits from the proper government agencies or authorities, forest reserves or watershed areas shall bepunised by reclusion perpetua to death. If the offender is a corporation, firm, partnership or association, the penalty shall be imposed upon the guilty officer or officers of the corporation, firm, partnership or association. IN case the offenderis an alien, he shall be deported immediately without further proceedings on the aprt of the Commission on Immigration and Deportation after he shall have served the sentence imposed on him by the court if the penalty is other than death.\""

