congress_website_title = "AN ACT PROVIDING THAT PERSONS WORKING AS CADDIES IN GOLF COURSES SHALL BE CONSIDERED AS EMPLOYEES OF SUCH GOLF COURSES AND THEREBY ENTITLED TO COMPULSORY COVERAGE IN THE SOCIAL SECURITY SYSTEM"
congress_website_abstract = "Rationale: Most golf courses are maintained by clubs and associations, membership of which is only opened to the rich and the very rich. to treat the caddies miserably in order to save on costs of operating the golf courses, is the height of injustice. It is satisfying the luxurious sporting lifestyle of the rich and famous to the detriment of the underprivileged caddies who unquestionably render their full-time services to the golfers."

