congress_website_title = "AN ACT MANDATING THE GOVERNMENT SERVICE INSURANCE SYSTEM TO ESTABLISH A STUDY-NOW-PAY-L ATER PROGRAM FOR MEMBERS AND THEIR DEPENDENTS WHO DESIRE TO PURSUE COLLEGE EDUCATION"
congress_website_abstract = "Entitles any GSIS member or his dependent to enroll in any college or university with his tuition and matriculation fees and other allowable expenses to be paid by the GSIS until he completes the course of his choice. States that grantees of the program shall begin to amortize their payment beginning on the THIRD YEAR AFTER THEIR GRADUATION. Grants valedictorians and salutatorians of public secondary shools full scholarship under this Act."
