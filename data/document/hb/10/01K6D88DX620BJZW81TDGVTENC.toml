congress_website_title = "AN ACT REQUIRING THAT FAILURE TO SIGN THE CERTIFICATE OF VOTES BY MEMBERS OF THE BOARD OF ELECTION INSPECTORS AND THE REASON THEREOF BE ANNOTATED IN THE MINUTES, AMENDING FOR THE PURPOSE SECTION TWO HUNDRED FIFTEEN OF THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "States that no member of the Board of election inspectors shall refuse to sign the certificate of votes unles there is a clear disparity between the ELECTION RETURNS and the CERTIFICATE OF VOTES. A member's refusal to sign the certificate of votesand the reason thereof shall be annotated in the minutes."

