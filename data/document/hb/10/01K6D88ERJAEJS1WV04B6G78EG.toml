congress_website_title = "AN ACT INCREASING THE MINIMUM WAGE AND PROVIDING OTHER BENEFITS TO HOUSEHELPERS, AMENDING FOR THIS PURPOSE ARTICLES 143 AND 147 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED"
congress_website_abstract = "Proposes the following wages for househelper: (1) P1,600.00 [P800.00]/month - for househelpers in Manila, Quezon, Pasay and Caloocan cities and municipalities of Makati, San Juan, Mandaluyong, Muntinlupa, Navotas, Malabon, Paranaque, Las Pinas, Pasig, Marikina, Valenzuela, Taguig and Pateros in Metro Manila and in highly urbanized cities; (2) P1,300.00 [P650.00]/month - for those in other cities and municipalities. Proposes, further, that NO HOUSEHELPER SHALL BE MADE TO SUFFER WORK IN EXCESS OFEIGHT HOURS A DAY."

