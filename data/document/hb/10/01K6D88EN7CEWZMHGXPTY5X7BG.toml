congress_website_title = "AN ACT AMENDING ARTICLE 277(C) OF THE LABOR CODE, AS AMENDED, BY REQUIRING AN EMPLOYER TO FURNISH HIS EMPLOYEE WITH A WRITTEN CONTRACT OF EMPLOYMENT"
congress_website_abstract = "Rationale: One of the reasons why dockets of Labor Tribunals continue to be clogged with cases involving the issue of employer-employ ee relationships is the failure of employers to provide their employees with a written contract of employment. It is disheartening to note that almost 80% of our work force does not possess a written contract of employment, thus, employees are usually bereft of any evidence proving that they are actual employees of a certain company. > Declares that IT SHALL BE THE DUTY OF AN EMPLOYER TO FURNISH HIS EMPLOYEE WITH A WRITTEN CONTRACT OF EMPLOYMENT. THE WRITTEN CONTRACT OF EMPLOYMENT SHALL SERVE AS PRIMA FACIE PRESUMPTION OF THE EXISTENCE OF AN EMPLOYER-EMPLOY EE RELATIONSHIP."

