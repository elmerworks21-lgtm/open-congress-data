congress_website_title = "AN ACT TO PROHIBIT THE IMPORTATION OF GARBAGE"
congress_website_abstract = "Rationale: With increasing population, disposing garbage and other wastes in the country especially in highly urbanized and populated city-centers is becoming a big problem. Declares the following --- \"SEC. 1. The importation of garbage and waste materials for recycling including but not limited to the following: waste paper, acetate, iron or steel, carbon plated or coated with tin, paper board, corrugated paper, glass, silicon sands, plastics, metal scraps, and other solid waste materials is hereby prohibited.\" Prescribes corresponding penalties for violation of this Act."

