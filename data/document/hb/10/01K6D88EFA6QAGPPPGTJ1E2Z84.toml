congress_website_title = "AN ACT PROVIDING PENALTIES FOR NON-COMPLIANCE WITH STANDARD REQUIREMENTS OF FIRE SAFETY, CLEANLINESS AND HEALTH CONDITIONS IN DORMITORIES AND BOARDING HOUSES AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the following --- \"SECTION 1. Facilities for Fire Safety, Cleanliness and Health Conditions in Dormitories and Boarding Houses. - Dormitories and boarding houses shall have facilities and equipments for fire safetysanitatio n, cleanliness and health in accordance th the standards to be set by the Housing and Land Use Regulatory board (HLURB).\" \"SECTION 2. Penalties for Violations. - The owner and/or landlord of dormitories and boarding houses who fails to provide the facilities hereinabove required in compliance with the set standards shall, without prejudice to the penalties provided by other laws, be punished by a fine of not less than ten thousand pesos (P10,000.00) and/or imprisonment of not more than one year.\""

