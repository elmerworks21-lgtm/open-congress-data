congress_website_title = "AN ACT ESTABLISHING AND PROVIDING FOR FREE UNIVERSITY AND COLLEGE EDUCATION AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Free University and College Act of 1997\" Defines the term \"Free University and College Education\" as any four-year university or college-level course or program offered in or conducted by state colleges and universities. >Designates the DECS to formulate a four-year curriculum for this purpose. Prescribes limitations to this privilege."

