congress_website_title = "AN ACT FIXING THE MINIMUM SALARY GRADES OF GUIDANCE COUNSELOR III AND GUIDANCE COORDINATOR IN PUBLIC ELEMENTARY AND SECONDARY SCHOOLS, AMENDING FOR THE PURPOSE THE COMPENSATION AND POSITION CLASSIFICATION ACT OF 1989"
congress_website_abstract = "Rationale: The position of Guidance Counselor is a unique and distinct item. Accodingly, those appointed to it go through entry and hiring procedures that are more rigid than those undergone by ordinary classroom teachers. entry to such a position requires: (a) recommendationb y the school principal; (b) technical and oral sccreening by the DECS' Promotion Board; (c) minimum of three years experience as a classroom teacher; and (d) minimum of eighteen units in guidance and counselling and/or other related fields on the masteral level. Considering these qualifications and the gret responsibility assigned to a Guidance Counselor, it is but fair and appropriate that the position be assigned a minimum salary grade 16.> Proposes these salary grrade assignments for two (2) positions: Guidance Counselor III - 16; Guidance Coordinator - 18."

