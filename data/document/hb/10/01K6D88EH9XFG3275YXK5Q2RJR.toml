congress_website_title = "AN ACT TO BUILD THE CAPACITY OF LOCAL GOVERNMENTS TO PROVIDE MORE EFFECTIVE AGRICULTURAL EXTENSION SERVICE AND IMPROVE AGRICULTURAL PRODUCTIVITY"
congress_website_abstract = "Declares that the national government shall implement a six-year program to build the capacity of local governments in rural agricultural municipalities to provide more effective agricultural extension service to farmers. FINANCIAL ASSISTANCE shallbe made available to municipalities as follows: (a) 6th Class Municipality 100% 5th Class Municipality 90%; 4th Class Municipality 80%; 3rd Class Municipality 70%; 2nd class Municipality 60%; 1st class Municipality 50%; (b) Training of agricultural extension workers. (c) Establishment of functional linkages with agricultural research and financing institutions for technology transfer and credit sourcing;and (d) Installation of communications system for market and technology information disseminaation."

