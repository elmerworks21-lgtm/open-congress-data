congress_website_title = "AN ACT PROVIDING BENEFITS FOR EARLY RETIREMENT AND VOLUNTARY SEPARATION FROM THE GOVERNMENT SERVICE, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to streamline government functions and to maintain necessary positions through an appropriate retirement and voluntary separation scheme. Covers all appointive officials and employees of the national government, including government-owne d or-controlled corporations. Applies to regular and temporary employees, regardless of age who have rendered at least a TOTAL OF THREE (3) CONSECUTIVE YEARS of government service."
