congress_website_title = "AN ACT TO ENHANCE THE PROMOTION AND MARKETING OF PHILIPPINE TOURISM AND INTERNATIONAL TRADE, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Philippine Tourism and International Trade Reorientation Act of 1995\" Creates the Philippine Tourism, Trading and Exports Corporation which shall be solely responsible for the improvement, enhancement, and international marketing of Philippinetourism and for the promotion of foreign-trade and exports-related activities. Creates also within the Deprtment of Foreign Affairs the Bureau of Foreign Trades and Tourism which shall exercise the powers and duties of the Department of Tourism, consequently abolishes the Department of Tourism."

