congress_website_title = "AN ACT ESTABLISHING A REFRIGERATED PLANT IN ALL CITIES AND MUNICIPALITIES IN THE COUNTRY, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Agriculture and marine products need to be stored in a cold storage facility prior to and during transport to the market. For areas where road networks are bad or no roads at all, storing agricultural and marine products in cold storage may mean earning profit for farmers and fishermen for their produce. Cold storage preserve the freshness of farm produce and marine products."

