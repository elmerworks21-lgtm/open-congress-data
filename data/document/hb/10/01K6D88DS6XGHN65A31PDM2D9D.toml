congress_website_abstract = "Seeks to establish, develop and maintain permanent tree parks, greenbelts, and gardens on the property or properties owned by the city with aqn aggregate size equivalent to at least thirty percent (30%) of its land area. In case the city has no area available or not sufficient for this purpose, it shall be given a period of three (3) years to acquire the prescribed area."

