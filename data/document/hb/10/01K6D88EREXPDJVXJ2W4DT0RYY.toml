congress_website_title = "AN ACT EXEMPTING PRIVATE HOSPITALS FROM CERTAIN TAXES AND DUTIES"
congress_website_abstract = "Rationale: Nothing is more pathetic than to see sick men, women and children, especially the underprivileged , being deprived of the necessary health care due to the lack of health care facilities and absence of funds. In order to alleviate these pressing problems, the proposed bill seeks to provide hospitals with a direct source of funds and to increase their savings to expand operations that deal directly with health care. > Declares that siand institution be EXEMPT from these taxes: Incomereal property; VAT; documtanry stamp; capital gains; tax on interest from bank deposits. >Provides, likewise, for their exemption from payment of customs duties."

