congress_website_title = "AN ACT PROVIDING FOR A NATIONAL BAMBOO AND RATTAN DEVELOPMENT PROGRAM HARMONIZING ECOLOGICAL BALANCE WITH INDUSTRIAL DEVELOPMENT AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Government suspport for the intensive development of bamboo and rattan farms owned by forest dwellers and the rural poor can be a strategic move in upgrading the quality of life of Filipino which obviously should start from the grassroots. Proposes a bamboo and rattan development program covering the following phases: (1) propagation or production of high quality, genetically superior planting stocks through sexual and macro and micro-asexual means; (2) dispersal or distribution of planting materials to be disposed at nominal amounts; (3) production or bamboo farming and/or plantation development and management; (4) utilization, processing and marketing including high value product development; (5) training and extension, includding technology packaging and transfer; and (6) research and technology."

