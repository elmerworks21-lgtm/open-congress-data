congress_website_title = "AN ACT TRANSFERING RESPONSIBILITY OVER THE INSURGENCY FROM THE PHILIPPINE NATIONAL POLICE TO THE ARMED FORCES OF THE PHILIPPINES AND AMENDING FOR THAT PURPOSE REPUBLIC ACT NO. 6975, OTHERWISE KNOWN AS THE DEPARTMENT OF INTERIOR AND LOCAL GOVERNMENTACT"
congress_website_abstract = "Clarifies the relationship between the Dept. of Interior and Local Government and the Dept. of National Defense as follows: \"SECTION 12. Relationship of the Department with the Department of National Defense. - \"THE DEAPRTMENT SHALL BE RESPONSIBLE FOR THE PRESERVATION OF THE INTERNAL SECURITY OF THE COUNTRY WHILE THE ARMED FORCES OF THE PHILIPPINES SHALL BE RESPONSIBLE FOR THE PRESERVATION OF THE EXTERNAL SECURITY AND THE SUPPRESSION OF INSURGENCY. FOR PURPOSES OF THIS ACT, INTERNAL SECURITY PERTAINS TO THE SUPPRESSION OF ANY THREAT TO PEACE AND ORDER EMANATING FROM ELEMENTS WITHIN THE COUNTRY, PROVIDED HOWEVER THAT: FORIEGN CRIME GROUPS WHO OPERATE WITHIN THE COUNTRY ARE WITHIN THE COMPETENCE OF THE DEPARTMENT.\""

