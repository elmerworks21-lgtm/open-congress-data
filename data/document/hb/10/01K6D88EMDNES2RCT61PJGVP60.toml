congress_website_title = "AN ACT BANNING THE APPOINTMENT/DES IGNATION OF THE VICE- PRESIDENT OF THE REPUBLIC OF THE PHILIPPINES TO ANY POSITION GIVING HIM DIRECT CONTROL AND SUPERVISION OVER THE MILITARY OR POLICE FORCES AND OTHER SIMILAR GROUPS OR AGENCIES AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares the following --- \"Section 1. No appointment or designation shall be extended to the Vice President which shall enable him to exercise complete control and supervision over the military or police forces or any special group or agency created by law or executive order or decree, which necessarily clothe him with police powers and authority to use in whole or in part the police or military forces, special group or agency in the performance of such official duties or functions.\" \"Section2. The prohibition of the Vice President to the aforesaid position shall be absolute and shall be applicable even where the position only requires the performance of civilian or related functions.\""

