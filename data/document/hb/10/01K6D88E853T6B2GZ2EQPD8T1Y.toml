congress_website_title = "AN ACT CREATING A BOARD OF DIVESTMENTS AND FOR OTHER PURPOSES"
congress_website_abstract = "Prescribes the composition of the proposed BOARD OF DIVESTMENTS, as well as the authority and functions of the Director, such as: (1) Assist in setting up resident ETHICS COUNSELOR OFFICES in government agecies; (2) Develop rules and regulations pertaining to the identification and resolution of conflicts of interest and ethical concerns in the government; (3) Interpret rules and regulations governing conflict of interest and ethical problems, etc."

