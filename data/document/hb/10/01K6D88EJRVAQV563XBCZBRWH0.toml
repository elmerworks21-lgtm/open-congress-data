congress_website_title = "AN ACT TO INSTITUTE A NATIONAL AQUATIC FOOD SANITATION PROGRAM, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: \"... our failure to find a lasting solution to the problem of ensuring safe food from our waters does not stem from a lack of capable, responsible and dedicated people in government and in the private sector who are willing to work together. The problem lies in the lack of coordination, unity of direction and dedication to follow through. Seeks, therefore, to establish a COORDINATE BODY which will initially spearhead and catalayze the formulation of a comprehensive program to ensuretht the food we gather from the water is safe to eat. Creates the NATIONAL AQUATIC FOOD SANITATION COUNCIL for this purpose."

