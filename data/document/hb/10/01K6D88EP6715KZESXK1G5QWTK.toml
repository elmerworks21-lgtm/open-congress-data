congress_website_title = "AN ACT DEFINING THE SCOPE OF 'NATIONAL PATRIMONY' AND AMENDING FOR THIS PURPOSE ARTICLE 421 OF REPUBLIC ACT NO. 346, OTHERWISE KNOWN AS THE CIVIL CODE OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines the scope of \"NATIONAL PATRIMONY\" (Art. 421 of the Civil Code of the Philippines) with this amendatory provision: > Article 421. All other property of the State, which is not of the character stated in the preceding article, is patrimonial property. > HOWEVER, WITHOUT PREJUDICE TO THE PROVISIONS OF THE 1987 PHILIPPINE CONSTITUTION, WHEN REFERRING TO NATIONAL PATRIMONY, IT SHALL MEAN FILIPINO CULTURAL HERITAGE AND TREASURES. PROVIDED, THAT: CULTURAL HERITAGE AND TREASURES SHALL INCLUDE AND EMBRACE: (1) HISTORICAL LANDMARKS; (2) ANCESTRAL HOUSES; (3) MONUMENTS; (4) NATIONAL SHRINES; (5) RESIDENCE OF LATE PHILIPPINE PRESIDENTS; (6) MEMORABILIA AND RELICS OF LATE FILIPINO PERSONALITIES; AND (7) ANY PROPERTY, TANGIBLE OR INTANGIBLE, WHIICH IS CHARACTERIZED BY FILIPINO INGENUITY, TAINTED WITH HISTORICAL VALUE AND SIGNIFICANCE, IMPRESSED WITH NATIONAL INTEREST AND REFLECTIVE OF THE FILIPINO SOUL."

