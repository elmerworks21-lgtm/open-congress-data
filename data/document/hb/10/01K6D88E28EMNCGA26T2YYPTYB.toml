congress_website_title = "AN ACT REVISING THE FORM OF EXCISE TAX ON FERMENTED LIQUOR FROM AD VALOREM TO SPECIFIC, AMENDING FOR THE PURPOSE SECTION 140 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "Fixes a SPECIFIC TAX on fermented liquor according to the following schedule; (1) P8.00/liter - beer worth P26.00/liter and above; (2) P6.00/liter - beer costing below P26.00/liter."
