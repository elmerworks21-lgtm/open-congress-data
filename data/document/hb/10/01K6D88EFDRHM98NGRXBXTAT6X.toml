congress_website_title = "AN ACT AMENDING SECTION 3 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, PROVIDING FOR SELECTIVE DECENTRALIZATIO N OF CERTAIN FUNCTIONS TO LOCAL GOVERNMENT UNITS AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: \"Devolution has hastened country-wide modernization which had long been hampered by a highly centralized system of government. It has provided for a more responsive and accountable local government structure instituted through a system ofdecentralizatio n whereby LGUs are given more power, authority, responsibilitie s and resources. > However, the Local Government Code is not flexible enough to anticipate succeeding functions that may well be subject of decentralizatio n.\" Amends Section 3. of RA 7160 to read ad follows: \"SECTION 3. OPERATIVE PRINCIPLES OF DECENTRALIZATIO N - The formulation and implementation of policies and measures on local autonomy shall be guided by the following operative principles: (a) There shall be aan effective allocation among the different local government units of their respective powers, functions, responsibilitie s, and resources; (b) THE NATIONAL GOVERNMENT THROUGH THE PRESIDENT MAY DECENTRALIZE OTHER POWERS AND AUTHORITIES CURRENTLY VEST"

