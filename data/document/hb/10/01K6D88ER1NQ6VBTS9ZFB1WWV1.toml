congress_website_title = "AN ACT TO RATIONALIZE THE GENERAL QUALIFICATIONS FOR APPOINTMENT TO THE PHILIPPINE NATIONAL POLICE, BUREAU OF FIRE PROTECTION, AND BUREAU OF JAIL MANAGEMENT AND PENOLOGY, AMENDING FOR THIS PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NO. 6975, OTHERWISE KNOWN AS THE 'DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990'"
congress_website_abstract = "Seeks to STRENGTHEN law enforcement by EXPANDING the recruitment resources of the PNP with these recommendations : (1) Rationalize the general qualifications for appointment to the police force by giving preference to graduates of CRIMINOLOGY without their taking the qualifying examinations; (2) INCLUDE (a) psychologists; (b) computer programmers; (c) accountants; and (d) other baccalaureate degree holders for lateral entry into the PNP, provided they have passed the required examinations. > Inthe case of the Fire Bureau and the Jail Bureau, dentists, optometrists, nurses, engineers and graduates of forensic sciences, computer programmers, psychologists are also allowed entry."
