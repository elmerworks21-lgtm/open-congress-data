congress_website_title = "AN ACT PROVIDING SPECIAL PROVISIONS FOR THE INTERNAL ORGANIZATION AND OPERATION OF INDIGENOUS PEOPLES COOPERATIVES, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED AND THIRTY-EIGHT, OTHERWISE KNOWN AS THE COOOPERATIVE CODE OF THE PHILIPPINES"
congress_website_abstract = "Adds a NEW Chapter to the Cooeprative Code of the Philippines, which shall apply only to the INTERNAL ORGANIZATION AND OEPRATION of the indigenous people's cooperatives. Contains provisions on (1) Organization and Operation; (2) Registration Requirements; (3) Privileges of Such Cooperatives."

