congress_website_title = "AN ACT PROVIDING FREE MEDICAL ASSISTANCE AND HOSPITALIZATION TO ALL TEACHERS OF THE PUBLIC SCHOOLS IN ANY GOVERNMENT HOSPITAL, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Provides for the following --- (1) The teachers who avail of this Act SHALL NOT BE COVERED anyone with MEDICARE benefits from the GSIS; (2) Violation of the Act shall be penalized with a fine of P20,000.00.00, and/or imprisonment of not less than one (1) year."

