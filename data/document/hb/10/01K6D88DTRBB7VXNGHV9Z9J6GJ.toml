congress_website_title = "AN ACT MANDATING THE DEPARTMENT OF EDUCATION, CULTURE AND SPORTS TO INCLUDE DRUG TEST RESULTS IN REQUIREMENTS FOR GRADUATION OF SECONDARY AND TERTIARY LEVELS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
