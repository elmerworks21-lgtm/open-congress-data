congress_website_title = "AN ACT FURTHER AMENDING PRESIDENTIAL DECREE NUMBERED TWO HUNDRED AND TWENTY-THREE, AS AMENDED, ENTITLED \"CREATING THE PROFESSIONAL REGULATION COMMISSION AND PRESCRIBING ITS POWERS AND FUNCTIONS\", AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The bill seeks to further amend certain sections of P.D. 223, as amended, to ensure the effective and efficient administation and implementation of the regulatory policies of the Government on the various fields of professions. These amendments specifically emphasize the following : (1) The expansion of the Professional Regulation Commission in terms of manpower in view of the rapid increase of its clientele; (2) The creation of regional offices for the convenience of its increased clientele in the provinces who will renew their professional licenses as well as for the examinees who will take the board examinations in venues near their place of residence; (3) The full computerization of all lincesure examinations; (4) the Continnuing Professional Education program of the Commission to make the Filipino professionals globally competent ; and (5) The integration of all associations or organizations in a profession in order to foster unity, harmony and cooperation among the me"
