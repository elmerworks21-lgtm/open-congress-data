congress_website_title = "AN ACT REQUIRING THE INCLUSION OF ENTREPRENEURSHI P AS A SEPARATE SUBJECT IN THE HIGH SCHOOL CURRICULUM"
congress_website_abstract = "Rationale: Entrepreneurshi p has become one of the favorite among development planners in the country today. And for a good reason, too: the contributions of entreprenuers to the growth of our economy have made them indispensable components of ourdevelopment efforts. Hence, sustaining development in the ocuntry, with the end in view of attaining our industrializati on goals, requires the proper education and training of entrepreneurs. And this education and training must be done while they are young. Children must, therefore, be introduced to and acquainted with the exciting and empowering field of entrepreneurshi p. States that there shall be a separate subject on entrepreneurshi p in the SENIOR YEAR CURRICULUM of both public and privatte secodnary schools nationwide. Proposes the inclusion of the following entrepreneurial subject matters: (1) Management; (2) funds sourcing; (3) program accreditation requirements; and (4) contemporary entrepreneurial practices."

