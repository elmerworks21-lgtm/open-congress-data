congress_website_title = "AN ACT INSTITUTING A NATIONAL RURAL HEALTH CARE PROGRAM AND ESTABLISHING THE NATIONAL RURAL HEALTH CARE COORDINATING COUNCIL FOR THE PURPOSE"
congress_website_abstract = "Rationale: \"... this bill seeks to lessen the burden in our health care by transforming the Filipinos into a self-reliant nation. This bill seeks to ensure that health care reaches the grass-root level or the rural areas by providing for certain taxincentives to motivate our medical practitioners to work and live in the rural centers.\" \"National Rual Health CAre Act of 1997\" Seeks to --- (1) provide all citizens of the Philippines, particularly in the rural or remote areas, to gain access to health services; (2) create the National Rural Health Program, hereinafter referred to as the Program, to serve as the means to help the people avail of health care services; (3) to prioritize and accelerate the provision of health services to all Fillipinos, particularly that segment of the population who cannot avail of such services; and (4) to establish the National Rural Health Care Coordinating Council, hereinafter referred to as the Council, that will administer the Program at all levels."

