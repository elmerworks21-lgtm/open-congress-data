congress_website_title = "AN ACT PROHIBITING THE EXACTION OF FEES AND UNNECESSARY SERVICES FROM JOB APPLICANTS"
congress_website_abstract = "States that the following acts are PROHIBITED: (1) Payment of any fee for whatever purpose/reason, except those fees authorized by the Secretary of Labor and Employment and/or by law; (2) Rendering any service unrelated to the position being applied for; and the (3) Submission of unreasonable requirements."
