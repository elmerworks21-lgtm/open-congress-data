congress_website_title = "AN ACT CREATING A PUBLIC MARKET DEVELOPMENT FUND AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: A development fund to oversee the standardization of public market facilities. One need not overemphasize the necessity of providing for a uniform standard available for each public market, laying emphasis on environmental concerns, sanitation and upgrading support facilities because majority of the population primarily go to public markets for their daily food requirements and other commodities. > A council on the national level with a direct, and consulative linkage with the localmarket officials through a regional committee which shall in joint and collaborative efforts issue the necessary rules and regulations for the effective implementation of this Act and maintain a continuind coordination to ensire that the objectives oof this law are eventually met."

