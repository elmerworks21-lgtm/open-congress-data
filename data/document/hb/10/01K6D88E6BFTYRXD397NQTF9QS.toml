congress_website_title = "AN ACT ALLOWING THE FORMATION OF SHELF CORPORATIONS, PROVIDING INCENTIVES AND APPROPRIATE TAX EXEMPTIONS FOR THE PURPOSE OF FURTHER LIBERALIZING THE FOREIGN INVESTMENT CLIMATE IN THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines \"SHELF CORPORATION\" as used in this Act --- business entities characterized by (1) flexibility in the use of tax regulations; (2) ease of application and the ability to serve third-country operations. These corporations are likened to something readily available \"on the shelf.\" They can easily be taken or retrieved whem the need arises."
