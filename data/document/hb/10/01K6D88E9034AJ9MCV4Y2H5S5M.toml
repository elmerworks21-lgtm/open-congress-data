congress_website_title = "AN ACT PRESCRIBING GUIDELINES IN THE ALLOCATION OF SUGAR QUOTAS, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NUMBERED EIGHTEEN ENTITLED 'CREATING A SUGAR REGULATORY ADMINISTRATION, ' AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Proposes these ALLOCATION GUIDELINES in the distribution of quota among the different sugar categories: (1) The first 50% shall be allocated for domestic consumption; (2) From the balance, the appropriate percentage shall first be allocated to meetU>S> sugar quota requirements; and (3) The reamining balance shall be classified as reserve sugar."

