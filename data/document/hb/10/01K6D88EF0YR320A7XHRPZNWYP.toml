congress_website_title = "AN ACT REQUIRING LOCAL CIVIL REGISTRARS TO REPORT TO THE COMMISSION ON ELECTIONS ALL DEATHS OF PERSONS AGED EIGHTEEN YEARS AND ABOVE"
congress_website_abstract = "States that --- \"Section 1. It shall be the duty of Local Civil Registrars to report to the Commission on Elections, hereinafter referred to as the Commission, all deaths of natural persons with ages of eighteen years and above occuring within theirrespective territorial jurisdictions.\" \"Section 2. The report shall cover all such death registered since the date of the last revision of the voters' lists by the Commission and shall be submitted at least a month before the next such revision ateach forthcoming election.\""

