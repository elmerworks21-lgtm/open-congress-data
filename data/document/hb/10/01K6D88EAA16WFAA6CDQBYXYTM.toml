congress_website_title = "AN ACT INCREASING THE SHARE OF LOCAL GOVERNMENT UNITS IN THE GROSS COLLECTION OF THE NATIONAL GOVERNMENT FROM TAXES ON THE UTILIZATION AND DEVELOPMENT OF THE NATIONAL RESOURCES AND RAISING THE PERCENTAGE SHARE OF LOCAL GOVERNMENT UNITS IN THE PROCEEDS THEREOF TO LOWER THE COST OF ELECTRICITY IN THE PROVINCE WHERE THE RESOURCES ARE LOCATED, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "States that local government units shall have a [forty] FIFTY percent share in the gross collection of the antional government from its share in any co=production or joint venture in the development of the national wealth within their territorial jurisdiction. Provides futher that eighty percent (80%) of the proceeds from the development of hydro, geothermal and other sources of energy be applied solely to lower the cost of electricity in the ENTIRE PROVINE OF RESIDENTIAL CONSUMERS where such source of energy is located."

