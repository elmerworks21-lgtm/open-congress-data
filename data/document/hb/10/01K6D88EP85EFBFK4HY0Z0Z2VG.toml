congress_website_title = "AN ACT PROVIDING FOR A REHABILITATION PROGRAM FOR INMATES, PROBATIONERS AND PAROLEES AND APPROPRIATING THE AMOUNT OF TEN MILLION PESOS (P10,000,000.00 ) FOR THE PURPOSE"
congress_website_abstract = "Rationale: Rehabilitation of prisoners and other wrongdoers partakes of the nature of redeeming oneself morally, spiritually and psychologically . Under our present penal system, reformation of offenders while confined in prison, on probation or onparol, is being encouraged. The modern concept of dealing with wrongdoers is based on the philosophy that development of human personality does not rest solely on the capacity or will of the individual to resist the urge to commit crime but on the influence of the totality of all conflicting forces around him. > Provides for a REHABILITATION PROGRAM consisting of the following --- (1) Moral and spiritual upliftment through the regular conduct of religious seminars, catechetical activities, prayyer services, and guidance counselling; (2) Civic training through the teaching of principles of civic virtues; (3) Educational opportunities offering non-formal, elementary, secondary and college education; (4) Vocational training and employment pro"

