congress_website_title = "AN ACT TO ORDAIN REFORMS IN THE ELECTRIC POWER INDUSTRY AND THE GOVERNMENT ENERGY SECTOR TO ENSURE THE TOTAL ELECTRIFICATION OF THE PHILIPPINES AND SUSTAIN PARTICIPATIONN OF THE PRIVATE SECTOR IN POWER GENERATION, TRANSMISSION AND DISTRIBUTION, FORSAID PURPOSES TO AMEND CERTAIN LAWS, AND FOR OTHER PURPOSES (omnibus)"
congress_website_abstract = "\"Omnibus Power Industry Act of 1997\" Defines the (1) ORGANIZATION of the electric power industry, the transition from the present to the desired competitive structure, and the (2) RESPONSIBILITIE S of the various government agencies and private entities during and after the restructuring process. Mandates the Dept. of Energy (DOE) to have the over-all responsibility in implementing and overseeing the implementation of the restructuring of the power industry and the privatization of the NationalPower Corporation."
