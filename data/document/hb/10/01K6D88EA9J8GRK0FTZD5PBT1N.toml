congress_website_title = "AN ACT AUTHORIZING THE RULING POLITICAL PARTY AND THE DOMINANT OPPOSITION POLITICAL PARTY NOT OTHERWISE REGISTERED UNDER THE PARTY-LIST SYSTEM TO NOMINATE A REPRESENTATIVE TO THE PROVINCIAL, CITY AND MUNICIPAL BOARDS OF CANVASSERS, AMENDING FOR THEPURPOSE SECTION 20 OF REPUBLIC ACT NO. 6646"
congress_website_abstract = "Aims to further ensure that the canvassing of election returns which constitutes a crucial stage in the electoral process, be done with utmost transparency and accuracy. Authorises representation of the ruling political party and dominant oppositionpolitical party to the board of canvassers to serve as deterrent in the commission of fraud during the canvass."

