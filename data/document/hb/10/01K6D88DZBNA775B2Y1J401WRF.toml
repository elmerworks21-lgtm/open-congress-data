congress_website_title = "AN ACT EXPANDING COUNTRYSIDE CREDIT THROUGH COOPERATIVE BANKS BY AMENDING SECTIONS 23 AND 83 OF REPUBLIC ACT NO. 337, AS AMENDED, OTHERWISE KNOWN AS THE 'GENERAL BANKING ACT'"
congress_website_abstract = "EXEMPTS the cooperative banks from the coverage of: 1) SBL(Single Borrower Limit) Rule - provides that the total liabilities of any person, company, corporation or firm to a commercial banking corporation for money borrowed, shall at no time exceed15% of the unimpaired capital and surplus of such bank. 2) DOSRT(Directors , Officers, Shareholders and Related Interests) Rule - provides that credit accommodations to directors, officers, shareholders and their related interests shall not exceed an individual ceiling equivalent to the outstanding deposits plus the book value of his paid-in capital contribution in the bank."

