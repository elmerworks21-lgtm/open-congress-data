congress_website_title = "AN ACT INCREASING THE MONTHLY COMPENSATION AND PROVIDING OTHER BENEFITS AND INCENTIVES OF BARANGAY OFFICIALS, AMENDING SECTION 393 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "\"The Revised Barangay Compensation and Benefits Act of 1996\" Proposes the following --- \"SECTION 4. Compensation of Barangay Officials and Employees - The barangay officials and employees shall receive monthly compensation as may authorized by law or barangay, city/municipal ordinance which shall not be lower than what is indicated below: (a) Punong Barangay P3,000; (b) Each Sangguniang Barangay Member P2,000; Barangay Secretary P2,000; Barangay Treasurer P2,000; Each Barangay Tanod P500."

