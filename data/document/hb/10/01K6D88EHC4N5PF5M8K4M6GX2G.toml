congress_website_title = "AN ACT ESTABLISHING AN 'ADOPT-A-SCHOOL PROGRAM,' PROVIDING INCENTIVES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines the proposed \"ADOPT-A-SCHOOL PROGRAM\" as follows: Allows private companies and enterprises to assist a public elementary or high school in staff and faculty development through training and further education; construction of facilities; upgrading and improvement of existing facilities; provision of books, publications, and other instructional materials; and modernization of instructional technologies; provided, however, that the public elementary or high school is located in any of twenty (20) poorest provinces by the Presidential Council for Countryside Development (PCCD) or any other government agency tasked with identifying the poorest provinces; provided, further, that a school may be adopted by only one company or enterprise.Provides incentives for the companies or enterprises who support and participate actively in this Program."
