congress_website_title = "AN ACT PROVIDING FREE TRANSPORTATION COUPONS TO URBAN POOR COMMUNITIES RESETTLED IN OUTLYING AREAS"
congress_website_abstract = "\"Urban Poor Relocation Transport Subsidy Act of 1996\" Applies exclusively to residents of resettlement areas, who have been previously relocated from urban squatter communities. Grants FREE TRANSPORTATION coupons to residents resettlement communities located at least five (5) kilometers from their original locate, effective one (1) year from the date of resettlement. Explains the proper use of the coupons."

