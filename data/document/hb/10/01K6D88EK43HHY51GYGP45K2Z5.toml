congress_website_title = "AN ACT PROVIDING A FOREIGN EXCHANGE POLICY FAVORABLE TO THE PROMOTION OF PHILIPPINE EXPORTS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7653, OTHERWISE KNOWN AS THE CENTRAL BANK ACT"
congress_website_abstract = "Aims to improve the competitiveness of Philippine enterprises, especially the exporters, and to reduce considerably the risk of exporting attributable to foreign exchange fluctuations. Amends, therefore, certain provisions of Republic Act No. 7653 with these proposals, in order to provide a policy for the pursuance of a competitive exchange rate: (1) Adding in the mandate of the BSP the objective of a competitive exchange rate; (2) Requiring the BSP to report once a year to Congress on how thepolicy pursued has supported the economic development programs and thrusts of the government; (3) Providing for exporters' representation the Monetary Board; and (4) Creating a consultation mechanism through which the competitive rate of foreign exchhange is determined or set."

