congress_website_title = "AN ACT REORGANIZING AND RENAMING THE PHILIPPINE EXPORT AND FOREIGN LOAN GUARANTEE CORPORATION, AMENDING PRESIDENTIAL DECREE NO. 1080, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Renames the [Philippine Export and Foreign Loan Guarantee Corporation] to TRADE AND INVESTMENT DEVELOPMENT CORPORATION OF THE PHILIPPINES. States that one of the primary purposes of the Corporation is TO PROVIDE INSURANCE COVER, CREDITS AND APPORPIRATE SERVICES TO FACILITATE THE EXPORT OF PHILIPPINE GOODS AND SERVICES BY ANY ENTITY, ENTERPRISE OR CORPORATION ORGANIZED OR LICENSED TO ENGAGE IN THE PHILIPPINES."
