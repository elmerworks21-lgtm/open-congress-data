congress_website_title = "AN ACT PROVIDING FOR THE ADOPTION OF DAYLIGHT SAVING TIME (DST), AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates the adoption of DAYLIGHT SAVING TIME (DST) by advancing the official clock by one (1) hour in the months of April and May of each year. Directs the PAG-ASA to promulgate the rules and regulations for the effective implementation of this Act."

