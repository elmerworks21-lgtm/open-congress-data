congress_website_title = "AN ACT CREATING THE OFFICE OF THE OMBUDSPERSON FOR CHILDREN, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Republic Act 7610 or the \"pecial Protection of children Against Child Abuse, Exploitation and Discrimination Act\" will be six years old on July 22, 1997. This means that six years have passed since the passage of this landmark legislation. Its passage signaled the commitment of the legislature to the improvement in the lives of children in the Philippines. > However, statistics from the Department of Social Welfare and Development (DSWD) show that in a span of six years there was a250% increase in the number of reported child abuse cases in the Philippines. More specifically, the 1000 cases reported in 1992 ballooned to 3,776 last year. Considering the estimate that reported cases constitute less than 10% of actual abuses commmitted against children, we have reason to be alarmed. \"The Ombudsman for Children Act\" Mandates the creation of the OFFICE OF THE OMBUDSMAN FOR CHILDREN which will be responsible for the monitoring , advocacy, consultative and referral work for the"

