congress_website_title = "AN ACT MANDATING THE PROFESSIONAL REGULATION COMMISSION (PRC) AND THE SUPREME COURT OF THE PHILIPPINES TO PUBLISH WITHIN NINETY (90) DAYS AFTER THE RELEASE OF THE RESULT OF THE BOARD AND BAR EXAMINATIONS, THE QUESTIONS AND ANSWERS OF SAID EXAMINATIONS IN AT LEAST THREE (3) MAJOR NEWSPAPERS OF NATIONAL CIRCULATION, AND ALLOWING THE BOARD AND BAR FLUNKERS OF ONE TO TWO SUBJECTS TO RETAKE ONLY THE SUBJECTS WHERE THEY FAILED"
congress_website_abstract = "Rationale: considering the fact it takes a number of years for s tudent to fincish a course and graduate but only one to five days to go through these licensure examinations, it is only unkind but to a certain extent sadistic for the examinees to beadjudged later as unfit to practice his/her profession. Declares the following --- \"SECTION I. State of Policy. the board and Bar examinations shall be transparent so that the examinees can evalaute why they failed and the deans of schools and the general public can ascertain whether or not the questions asked are consistent with the curricula and relevant or pertinent to the practice of the profession.\" \"SECTION III. Within a period of thrity (30) days after the publication of the questions annd answers of the board or bar examination, an examinee who failed in such examination can appeal to the Professional Regulation Commission or the Supreme Court for a review of his examination papers. > Sub-Section a. - The examinee shall be allowed"

