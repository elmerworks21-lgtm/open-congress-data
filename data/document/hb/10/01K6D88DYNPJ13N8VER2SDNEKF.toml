congress_website_title = "AN ACT TO HELP ENSURE THE SAFETY OF BANK DEPOSITS AND FUNDS THEREBY STRENGTHENING THE OPERATIONS OF BANKING INSTITUTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Is intended to help ensure the safety of bank deposits and strengthen banking operations. Authorizes all banking institution recognizing abd accredited by the Bangko Sentral ng Pilipinas (BSP) to provide special security services for their banking activities and to procure and possess firearms for security purposes."
