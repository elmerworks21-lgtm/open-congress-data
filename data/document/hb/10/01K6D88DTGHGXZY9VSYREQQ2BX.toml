congress_website_title = "AN ACT MAKING RENTALS ON RESIDENTIAL/APA RTMENT OR OTHER DWELLING UNITS EXEMPT FROM INCOME TAXATION, ALLOWING THEM TO BE DEDUCTIBLE FROM TAXABLE FIXED INCOME OF THE TENANTS OR INDIVIDUALS WHO PAY SAID RENTALS"
congress_website_abstract = "Exempts rentals on residential/apa rtment or other dwelling units from income taxation. Seeks to exempt from income taxation that part of the ordinary Filipino's fixed income which is used to defray the cost of maintaining a dwelling unit. In so doing, the fixed income earner is somehow eased of the burden of providing a basic need for his or her family and is given the advantage of making savings for his or her future benefits."
