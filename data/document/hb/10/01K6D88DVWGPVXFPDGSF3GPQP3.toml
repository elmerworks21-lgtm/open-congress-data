congress_website_title = "AN ACT REQUIRING BUSINESS ESTABLISHMENTS TO SEGREGATE THEIR GARBAGE AND WASTES"
congress_website_abstract = "States that the segregation of garbage and wastes shall be as follows: (1) paper and paper products; (2) wood and wood products; (3) glass, ceramics products and bottles; (4) plastic and rubber products; (5) food; and (6) metal fabrications."

