congress_website_title = "AN ACT TO PROVIDE PROTECTION TO NEW PLANT VARIETIES, ESTABLISHING A NATIONAL PLANT VARIETY PROTECTION BOARD, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Plant Vareity Protection Act of 1996\" Declares that the State shall be responsible for the conservation of biological diversity, the sustainable use of its components and the fair and equitable sharing of the benefits arising from the use of genetic resources. The State adopts a policy of actively adopting measures to promote and advance priority access by itself or by its nationals, to the results and beneffits arising from biotechnologies based upon genetic resources found in itsterritory."

