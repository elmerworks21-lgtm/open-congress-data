congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6846, OTHERWISE KNOWN AS THE ABOT-KAYA PABAHAY FUND, AND FOR OTHER PURPOSES"
congress_website_abstract = "Amends Republic Act No. 6846, otherwise known as the Abot-Kaya Pabahay Law, by integrating its use into the development of a long term approach to the National shelter Program, expanding the level of amortization support by providing a third and fourth level, activating the Cash Flow Guaranty component of the Fund, enhancing the NHMFC's interest shortfall subsidy and liquidity mechanism for its secondary mortgage operation to augment interest subsidy support for the Community Mortgage Program,and increasing the administrative cost ceiling from one (1%) per centum to four (4%) per centum of the net Fund Assets. * * *"

