congress_website_title = "AN ACT DEFINING THE SOURCES AND USES OF THE OIL PRICE STABILIZATION FUND, SETTING ITS MAXIMUM AND MINIMUM LEVELS, AND PROVIDING FOR AN AUTOMATIC PRICE ADJUSTMENT MECHANISM FOR THE PRICE-REGULATED REFINED PETROLEUM PRODUCTS, AMENDING FOR THE PURPOSEPRESIDENTIAL DECREE NUMBERED NINETEEN HUNDRED FIFTY-SIX, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to define sources and uses of the Oil Price Stabilization Fund (OPSF); sets its maximum and minimum levels; provides for an automatic price adjustment mechanism for the price-regulated refined petroleum products; mandates the Department of Energy to undertake regular information campaigns on the OPSF mechanism, guidelines, formula, procedures and Fund status, and; seeks to minimize political intervention in oil price adjustment decisions."
