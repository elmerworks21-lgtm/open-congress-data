congress_website_title = "AN ACT PROHIBITING THE COLLECTION, IMPOSITION OR SOLICITATION OF CONTRIBUTIONS, ADMISSION OR ENTRANCE FEES FROM STUDENTS IN PUBLIC SECONDARY SCHOOLS, AMENDING FOR THE PURPOSE THE 'FREE PUBLIC SECONDARY EDUCATION ACT OF 1988'"
congress_website_abstract = "Rationale: The Free Public Secondary Education Act of 1988 has opened wider opportunities for young people in their quest for higher education. The law provides them with free secondary education in all public high schools. They do not pay tuition and other school fees, thus relieving their parents from the burden of costly eduction. However, complaints have been mounting regarding contributions and other exactions such as admissions for entrance fees collected by school authorities in public secondary schools. Parents and students alike regard them as an added impositions to the financial burden of parents. Besides, these contributions and fees defeats the true intent and spirite of the Free Public Secondary Education Act of 1988. Declarees, therefore, the following --- \"SECTION 4-A. PROHIBITION. - THE COLLECTION, IMPOSITION OR SOLICITATION OF CONTRIBUTIONS, ADMISSION OR ENTRANCE FEES FROM STUDENTS ARE HEREBY PROHIBITED. > ANY PERSON WHO COLLECTS, IMPOSES, SOLICITS, RECEIVES OR AUTHO"

