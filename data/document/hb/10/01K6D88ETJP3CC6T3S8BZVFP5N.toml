congress_website_title = "AN ACT AUTHORIZING THE USE OF THE CREDIT CARD FOR THE PAYMENT OF OBLIGATIONS TO THE GOVERNMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the following --- \"SECTION 1. The use of the credit card for the payment of obligations to the government is hereby authorized, subject to the policies and practices of the particular authorized participating credit card companies; Provided, that, the government shall not bear any burden of discount, rebates or commissions for collection services rendered by the credit card companies.\" \"SECTION 2. Participating credit card companies shall remit payment to the appropriate governmentcollection agencies within forty eight (48) hours upon presentation to them of the charge slips corresponding to the credit card holders' tax payments; Provided, That, should a credit card company fail to remit within the prescribed period, a penaltty of not more than two percent (2%) of the tax involved, per month or any fraction thereof, shall be imposed on the deliquent credit company.\""

