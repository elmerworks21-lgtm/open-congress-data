congress_website_title = "AN ACT PROVIDING EXEMPTION FOR GOVERNORS, MAYORS AND ALL LOCAL ELECTED OFFICIALS FROM SECURING TRAVEL AUTHORITY WHEN TRAVELLING WITHIN THE COUNTRY OR ABROAD"
congress_website_abstract = "Provides for the following --- \"SECTION 1. Governors, mayors and all local elected officials shall not be required to secure travel authority from the Office of the President or the Secretary of the Interior and Local government, as the case may be,when travelling abroad, or within the country, whether it be official or private purpose: Provided, That they have complied with all the other requirements prescribed under existing laws, orders and regulations: Provided, further, that their official travel shall be subject to existing auditing laws, rules and regulations.\""

