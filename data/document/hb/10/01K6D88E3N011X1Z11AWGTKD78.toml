congress_website_abstract = "\"1995 Omnibus Bill on the Rights of the Accused and Persins Under Investigation for the Commission of a Crime\" Is being a survey of the existing rules of procedure, jurisprudence and legal opinion that have evolved through the years. Contains innovations to ensure the observance of certain rules for the protection of the accused, or persons arrested or under investigation."
