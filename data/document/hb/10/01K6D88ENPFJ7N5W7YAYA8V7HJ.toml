congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED 7079, OTHERWISE KNOWN AS THE 'CAMPUS JOURNALISM ACT OF 1991,' PROVIDING FOR PENALTIES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to give more teeth to RA No. 7079, the Campus Journalism Act of 1991, and to ensure that the rights and privileges of the youth are respected and protected. Provides, therefore, for the following amendment to RA 7079: \"SECTION 10-A. Penal Provision - Any act, program, order, policies, scheme, or otherwise committed in violation of the policies and mandates set forth in this Act or resorted to for the purpose of obstructing, hindering or rendering the mandates and policies of this Act nugatory, shall be punished by imprisonment of not more than one year or a fine of not more than One Hundred Thousand Pesos (P100,000.00) or both at the discretion of the court.\""
