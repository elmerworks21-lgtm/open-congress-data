congress_website_title = "AN ACT EXEMPTING ALL FUNDS EARMARKED/RESER VED BY BANKS FOR AGRI-AGRA PURPOSES UNDER SECTION 3, PRESIDENTIAL DECREE NO. 717, FROM PAYMENT OF DOCUMENTARY STAMP TAX AND CAPITAL GAINS TAX"
congress_website_abstract = "Rationale: The bill on the Treasury Crop Certifficate (TCC) House Bill No. 7244 is envisioned to help our poor farmers increase their income derived from farming by setting up a decent price for their agricultural grain crops and reasonable intereston their Treasury Crop Certificates. It is also intended to provide the governemnt, specially the National Food Authority, with the much needed funds to improve its palay procurement program by one hudnred (100%) percent without foreign or local loan borrowing or imposition of new taxes, thereby saving the government billions of pesos in capital outlay. > These good intentions, however, to help our farmers improve and enhance their economic lives are rendered usless and nugatory by the high rattes of taxes that will be imposed on these Treasury Crop Certificates, that is, 1.50 to 2.00 documentary stamp tax per P200 face value; 35% for corporate issuers and from 3% for individuals on short and long terms eligible papers. 2"

