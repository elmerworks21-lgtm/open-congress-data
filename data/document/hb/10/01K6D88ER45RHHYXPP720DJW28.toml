congress_website_abstract = "Rationale: The importance of rivers in our domestic, agricultural, and industrial needs cannot be disputed, but the gripping realities that such body of water has long been neglected is very alarming. The need to place rivers under the protection of the National Integrated Protected Area System is imperative to save them from total destruction."

