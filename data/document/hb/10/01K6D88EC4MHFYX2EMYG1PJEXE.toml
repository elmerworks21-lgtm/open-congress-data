congress_website_title = "AN ACT PROVIDING THAT CANCER OF THE LARYNX BE CONSIDERED AS AN OCCUPATIONAL DISEASE"
congress_website_abstract = "Is in reaction to proposed measure is in reaction to a recent Court of Appeals' decision dismissing a claim of an employee (who has worked for more than 20 years in the government) against the Employees Compensation Commission and the GSIS noting that cancer of the larynx being of unkown was not listed as a compensable occupational disease. Requires that proof must be shown that the risk of contructing the same is brought about or increased by the nature of the employment or by working conditions."

