congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 6971, OTHERWISE KNOWN AS THE PRODUCTIVITY INCENTIVES ACT OF 1990"
congress_website_abstract = "Covers all business enterprises with or without existing and dulyrecognized COLLECTIVE BARGAINING REPRESENTATIVES , including ALL government INSTRUMENTALITI ES AND SUBDIVISIONS THEREOF, INCLUDING SECOND GENERATION GOVERNMENT CORPORATION/ENT ITIES. Covers all employees ad workers REGARDLESS OF THEIR STATUS AND MODE OF PAYMENT. Proposes amendments to certain provisions of Ra 6971, such as: (1) the definition of the \"Productivity Incentives Program\"; (2) measuring productivity changes; (3) coverage and manner of sharing bonuses; (4) resolving disagreements arising from violation of the Program, etc."
