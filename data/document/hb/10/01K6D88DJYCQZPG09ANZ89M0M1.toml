congress_website_title = "AN ACT TRANSFERRING TO THE DEPARTMENT OF EDUCATION, CULTURE AND SPORTS THE OWNERSHP OF REAL PROPERTIES USED AS SITES FOR PUBLIC SCHOOLS"
congress_website_abstract = "States that titles to real properties, public or private, which are utilized as public school sites, shall be transferred to the Department of Education, Culture and Sports. Lands of uncertain ownership shall be titled in favor of the same providedthat (1) the school has been in open, peaceful and uninterrupted possession of the property for a period of not less than 20 years; and (2) notice of registration shall be posted in a conspicuous place in the municipality where the land is located for two consecutive weeks."

