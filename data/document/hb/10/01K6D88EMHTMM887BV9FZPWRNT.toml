congress_website_title = "AN ACT REAPPORTIONING THE LEGISLATIVE DISTRICTS THROUGHOUT THE COUNTRY AMONG PROVINCES AND CITIES (redistricting)"
congress_website_abstract = "Rationale: Article VI, Section 5(4) of the Constitution provides that: \"within three years following the return of every census, the Congress shall make a reapportionment og legislative districts based on the standards provided in this section.\" Contains these salient features: (1) The measure increases the number of legislative districts from 204 to 289, or an increase of 85 new districts. (2) The Committee adopted the population formula in determining additional districts: Provinces - One (1)district for every 225,000; Cities - one (1) district for every 250,000."
