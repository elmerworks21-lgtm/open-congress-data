congress_website_title = "AN ACT STRENGTHENING FURTHER THE SPECIAL PROGRAM FOR EMPLOYMENT OF STUDENTS UNDER REPUBLIC ACT NO. 7323 BY INCREASING THE INCOME REQUIREMENT FOR COVERAGE THEREIN, PROVIDING A NONDIMINUTION AND AUTOMATIC INCREASE CLAUSES FOR ITS BUDGETARY ALLOCATIONAND PENALIZING THOSE WHO DISHONOR THE EDUCATION VOUCHERS, AMENDING FOR THESE PURPOSES REPUBLIC ACT NO. 7323, ENTITLED 'AN ACT TO HELP POOR BUT DESERVING STUDENTS PURSUE THEIR EDUCATION BY ENCOURAGING THEIR EMPLOYMENT DURING SUMMER AND/OR CHRISTMAS VACATIONS, THROUGH INCENTIVES GRANTED TO EMPLOYERS, ALLOWING THEM TO PAY ONLY SIXTY PER CENTUM (40%) OF THEIR SALARIES OR WAGES AND THE FORTY PER CENTUM THROUGH EDUCATION VOUCHERS TO BE PAID BY THE GOVERNMENT PROHIBITING AND PENALIZING THE FILING OF FRAUDULENT OR FICTITIOUS CLAIMS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to adjust the income requirement for coverage under the law -- to index the income qualificant to the annual national poverty threshold live for a family of six. Proposes Congress not to reduce the program's budgetary allocation below the amount appropriated."

