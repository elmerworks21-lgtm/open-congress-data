congress_website_title = "AN ACT PROHIBITING THE ESTABLISHMENT OF POLITICAL DYNASTIES"
congress_website_abstract = "Is applicable to the next election and to all subsequent elections to be held thereafter. Defines \"political dynasty\" as the concentration, consultation or perpetuation of public office and political power by persons related to one another, either by consanguinity or affinity.\""
