congress_website_title = "AN ACT STRENGTHENING THE PHILIPPINE NATIONAL POLICE ACADEMY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares that the \"Academy\" shall be the primary and exclusive training, education and development facility in the country for PNP members and officers. Provides for these concerns: (1) branches of the Academy; (2) academic programs; (3) candidatesfor admission; and (4) full professionaliza tion. Adopts a parallel professionaliza tion program for SECURITY GUARDS in the country."
