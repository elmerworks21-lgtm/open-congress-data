congress_website_title = "AN ACT REVERTING THE FUNCTION OF SUPPRESSING INSURGENCY FROM THE PHILIPPINE NATIONAL POLICE (PNP) TO THE ARMED FORCES OF THE PHILIPPINES (AFP), AMENDING THEREBY SECTION TWELVE (12) OF REPUBLIC ACT NO. 6975, OTHERWISE KNOWN AS THE DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990"
congress_website_abstract = "Declares that THE FUNCTION OF SUPPRESSING INSURGENCY, REBELLION, OR INSURRECTION SHALL BE REVERTED FROM THE PNP TO THE AFP. Is premised on the following : (1) PNP resources are very limited; (2) The AFP is in a better position to address the problemof insurgency considering its orientation, superior equipment, expertise, etc. (3) The proposal will ensure maximum utilization of AFP personnel, equipment and funds."

