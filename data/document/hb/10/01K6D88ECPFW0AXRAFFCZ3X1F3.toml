congress_website_title = "AN ACT LIMITING THE PREVENTIVE SUSPENSION OF A MEMBER OF THE PHILIPPINE NATIONAL POLICE WITH A PENDING CRIMINAL CASE TO NINETY (90) DAYS FROM ARRAIGNMENT, AMENDING FOR THE PURPOSE THE 'DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990'"
congress_website_abstract = "Rationale: \"Elective or appointive public officials with pending criminal cases are placed under preventive suspension for a definite period. If their civilian counter-parts enjoy this privilege, there is no reason wny the accused PNP members should not be accorded the same privilege.\""
