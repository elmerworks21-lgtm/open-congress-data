congress_website_title = "AN ACT TO UPDATE VALUATION AND IMPROVE COLLECTION OF LAND TAXES"
congress_website_abstract = "Rationale: This bill therefore seeks to provide certain guidelines and policies in order to update valuation and improve collection of taxes. The valuation takes into consideration the changes in the rate of land prices ever since the land valuation. To implement this, the State is further ordained to establish, maintain and support an effective system of collection of land taxes. applies to lands classified as agricultural, residential, commercial, industrial, whether taxable or exempt, as deferred udner the Local Government Code. > Mandates LGUs to provide for an update on the present valuation of lands based on the fair mmarketvalue of the land to be appraised, whether agricultural, residential, commercial or industrial."

