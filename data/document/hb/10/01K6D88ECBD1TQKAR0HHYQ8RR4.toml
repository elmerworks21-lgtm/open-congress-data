congress_website_title = "AN ACT PROVIDING FOR THE REPRESENTATION OF THE EXPORTERS IN THE GOVERNING BOARD OF THE PHILIPPINE COCONUT AUTHORITY, AMENDING FOR THIS PURPOSE PRESIDENTIAL DECREE NO. 232, SECTION 4, ENTITLED 'CREATING A PHILIPPINE COCONUT ANUTHORITY,' AS AMENDED"
congress_website_abstract = "To address the need to develop the coconut industry to achieve its full revenue-generat ing potential, it should be geared towards being able to compete globally. Since the exporters would have the experience and the expertise to address the problems in this aspect, the coconut industry will benefit much if the exporters will have a hand in steering its policies and programs. Thus, exporters' representation in the PCA Governing Board is proposed."

