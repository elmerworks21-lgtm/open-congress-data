congress_website_title = "AN ACT INSTITUTING A COMPREHENSIVE 'KAUNLARAN NG KABATAAN AT MAMAYAN DEVELOPMENT PROGRAM' TO PROMOTE THE PHYSICAL, INTELLECTUAL AND SOCIAL WELL-BEING OF YOUNG PEOPLE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes to establish a comprehensive Youth Development Program. It seeks to promote the involvement of the youth in character building and development activities for civic efficency, self-improvemen t and economic well being. The program is composed of various componenets such as: sports development, scholarship, livelihood training and cooperative organization. These areas of development will provide our youth the necessary opportunities to discover their social and economic potentials to become self-reliant, productive and responsible citizens of the country."

