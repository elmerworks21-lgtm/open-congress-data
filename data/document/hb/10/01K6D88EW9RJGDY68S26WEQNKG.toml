congress_website_title = "AN ACT PROVIDING THE RULES FOR THE IMPOSITION OF AN ANTI-DUMPING DUTY, AMENDING FOR THE PURPOSE SECTION 301, PART 2, TITLE II, BOOK I OF THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES, AMENDING REPUBLIC ACT NO. 7843, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Anti-dumping duties are additional duties imposed on imports over and above the regular duties. An anti-dumping duty is designed to protect local indsutries against price discrimination that brings about material injury. This is in addition to the protection accorded by the WTO in instances where the practice of dumping by exporting countries can be addressed through consultations, or should that fail, with dispute settlement procedures. Seeks to provide remedies and counteract thepractices of dumping."

