congress_website_title = "AN ACT REPEALING ARTICLES 333 AND 334 OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "Repeals the definition of \"ADULTERY and CONCUBINAGE\" to CONSTITUTE THE SINGLE CRIME OF MARITAL INFIDELITY committed by the following: (1) Any married person who has sexual intercourse or cohabits with another who is not his/her spouse; (2) A personwho has sexual intercourse or cohabits with a married man or woman knowing him or her to be married; (3) Ths spouse who keeps a mistress/lover in the conjugal dwelling; and (4) A spouse who commits marital infidelity if he or she was abandoned by his/her spouse without means of livelihood or support."
