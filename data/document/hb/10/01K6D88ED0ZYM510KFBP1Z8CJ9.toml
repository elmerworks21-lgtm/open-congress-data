congress_website_title = "AN ACT REPEALING PRESIDENTIAL DECREE NUMBERED ONE HUNDRED FORTY ENTITLED, 'REQUIRING ALL OWNERS OR OPERATORS OF XEROX AND OTHER TYPES OF COPYING MACHINES OR EQUIPMENT TO REGISTER THEIR EQUIPMENT OR MACHINES'"
congress_website_abstract = "Rationale: \"P.D. No. 140 was enacted for the purpose of checking whether xerox and other photocopying machines are used for the production of subversive propaganda materials and in the falsification of letters and important papers and documents. Under said decree, owners or operators of said equipments are directed to register theri photocopying machines with the Philippine National Police or the National Bureau of Investigation. The repeal of P.D. No. 140 would unload the Philippine National Police of lots of paperwork, wherein time spent for this task could be better utilized to attend to more important issues and activities especially in the light of growing concern about the peace and order situation in our country."

