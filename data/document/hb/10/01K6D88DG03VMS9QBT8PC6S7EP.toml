congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6975, ENTITLED, \"AN ACT ESTABLISHING THE PHILIPPINE NATIONAL POLICE UNDER A REORGANIZED DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT, AND FOR OTHER PURPOSES\""
