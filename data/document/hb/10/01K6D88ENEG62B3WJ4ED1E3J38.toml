congress_website_title = "AN ACT PROVIDING THAT THE PROVINCIAL, CITY OR MUNICIPAL ASSESSOR SHALL UNDERTAKE A GENERAL REVISION OF REAL PROPERTY ASSESSMENT EVERY FIVE (5) YEARS, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: The Local Government Code of 1991 (RA 7160) regulates the revision of assessment and classification of real properties. Under Sec. 219 and Sec. 220 of RA 7160, assessment is undertaken every three (3) years. This means, a higher real estate tax after each assessment. If correlated with the rising percentage of inflation, it spells and unncessary burden affecting the majority of our people. > Provides, therefore for the following --- \"SEC. 219. General Revision of Assessments and Property Classification. - The provincial, city or municipal assessor shall undertake a general revision of real property assessments within two (2) years after the effectivity of this Code and every [three (3)] FIVE (5) years thereafter.\""

