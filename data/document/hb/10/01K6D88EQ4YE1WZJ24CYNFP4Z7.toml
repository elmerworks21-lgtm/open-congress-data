congress_website_title = "AN ACT GRANTING WEDDING ANNIVERSARY LEAVE OF ONE (1) DAY WITH FULL PAY TO EVERY LEGALLY MARRIED EMPLOYEES IN THE PUBLIC AND PRIVATE SECTORS AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: This proposed Bill aims to uphold the mandate of the constitution that marriage is an inviolable social institution and the foundation of the family. The State recognized the Filipino family as the foundation of the nation. \"Wedding Anniversary Leave Act of 1997\" Applies to those who are legally married; excludes those marriages have been severed by legal separation and by an order of annulment. Wedding shall include civil or chuch wedding."

