congress_website_title = "AN ACT PROVIDING FOR THE MANDATORY TITLING AND REGISTRATION OF ALL PUBLIC SCHOOL SITES UNDER THE OWNERSHIP OF THE DEPARTMENT OF EDUCATION, CULTURE AND SPORTS, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Considering the increasing number of school site problems,d elaying the implementation of this Bill will cost government much as the growth of quality education will be stunted. With a staggering 8,011 untitled school sites, another UP Visayas case vs. the Iloilo City government is foreseeable in the future. Moreover, as there are 6,257 unregistered school sites, cases of usurpation and development aggression may in fact be happening now and/or has already taken place. Declaring thatthe State recognizes school sites as the property of DECS in order to protect the school's right to continue holding classes in their existing landsite, thereby promoting continuous service of quality education for all Filipino students."

