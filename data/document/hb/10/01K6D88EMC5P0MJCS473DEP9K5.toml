congress_website_title = "AN ACT AMENDING THE PROVISIONS OF ARTICLE 192, TITLE EIGHT, CHAPTER THREE OF PRESIDENTIAL DECREE NO. 603, AS AMENDED, OTHERWISE KNOWN AS THE CHILD AND YOUTH WELFARE CODE"
congress_website_abstract = "Provides for the following --- \"Article 192. Suspension of Sentence and Commitment of Youthful Offender _ If after hearing the evidence in the proper proceedings, the cocurt should find that the youthful offender has committed the acts charged against him the court shall determine the impossible penalty, including any civil liability chargeable against him. However isntead of pronouncing judgment of cconviction AND WITHOUT THE YOUTHFUL OFFENDER FILING AN APPLICATION THEREFOR, the court shall suspend all further proceedings and shall commit such minor to the custody or care of the Department of Social Welfare, or any trianing institution oeprated by the government, or duly licensed agencies or any other responsible person, until he shall haave reacched twenty-one years of age, for a shorter period as the court may deem proper, after considering the reports and recommendations of the Department of Social Welfare or the agency responsible individual under whose care he has been committed"

