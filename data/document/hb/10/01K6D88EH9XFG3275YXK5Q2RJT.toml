congress_website_title = "AN ACT EXEMPTING INTEREST INCOME FROM BONDS, DEBENTURES, AND OTHER OBLIGATIONS ISSUED BY PROVINCES, CITIES, AND MUNICIPALITIES FROM THE TWENTY PERCENT (20%) FINAL WITHHOLDING TAX"
congress_website_abstract = "Rationale: This act enhances the creativity and responsiveness in local governance spawned by the Local Government Code of 1991. It firms up the ideals of decentralizatio n and devolution by augmenting the financial resources of local government units (LGUs). More resources mean increased capacity of LGUs to absorp the costs of devolution, optimize their new powers and better address added responsibilitie s in service delivery and development."

