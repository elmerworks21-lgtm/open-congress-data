congress_website_title = "AN ACT CREATING THE PHILIPPINE COMMISSION ON WOMEN, DEFINING ITS POWERS, FUNCTIONS AND RESPONSIBILITIE S, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "provides for the creation of the PHILIPPINE COMMISSION ON WOMEN which will absord the functions of the existing National Commission on the role of Filipino Women; tasks the proposed Commission with the monitoring of the implementation of the laws onwomen, review and evaluate the extent to which women are integrated in all sectors of society."
