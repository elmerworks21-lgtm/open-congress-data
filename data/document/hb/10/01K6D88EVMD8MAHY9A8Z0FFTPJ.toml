congress_website_title = "AN ACT ESTABLISHING THE NATIONAL ARCHIVES OF THE PHILIPPINES, STRENGTHENING ITS POWERS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Archives Act of 1997\" Seeks to --- (1) establish the NATIONAL ARCHIVES OF THE PHILIPPINES, as well as strengthen its powers; (2) rectify procedural and substantive errors largely identified with the treatment, protection and/or disposal ofState-protected records; (3) incorporate all administrative issuances and regulations concerning Philippine archival materials, including government records."

