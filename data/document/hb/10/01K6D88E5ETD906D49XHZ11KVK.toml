congress_website_title = "AN ACT PROVIDING FOR THE FIRST ELECTIONS OF SECTORAL REPRESENTATIVES TO THE LOCAL SANGGUNIANS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the following -- (Sectoral representatives to the local sanggunians shall come from the (a) women sector - 1; (b) peasants or industrial workers -- 1; and (c) for the urban poor, or indigenous cultural communities, or disabled sectors- 1. (2) The FIRST elections shall be held simultaneously with the local elections on the second Monday of May 19998; the succeeding elections for the sectoral representatives to the Sangguniang Bayan and Panglungsod - those of the Sangguniang Panlalawigan shall be held 30 days after."
