congress_website_title = "AN ACT PROVIDING EXPRESS SUBPOENA AND CONTEMPT POWERS TO LEGISLATIVE BODIES OF MUNICIPALITIES, CITIES AND PROVINCES, AMENDING FOR THIS PURPOSE REPUBLIC ACT NUMBERED SEVENTY-ONE HUNDRED SIXTY, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Empowers the Sangguniang Bayan to (1) ISSUE SUBPOENA and SUBPOENA DUCES TECUM to witness in any part of the Municipality; (2) PUNISH WITH CONTEMPT any person who refers without legal excuse to obey such summons, or refuses to be sworn or placed under affirmation or to answer any legal inquiries."

