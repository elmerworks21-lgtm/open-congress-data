congress_website_title = "AN ACT PROVIDING FOR AN ALTERNATIVE TO THE RESERVE OFFICERS' TRAINING CORPS (ROTC) PROGRAM FOR STUDENTS ENROLLED IN COLLEGES, UNIVERSITIES AND SIMILAR INSTITUTIONS OF LEARNING, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to provide an alternative to the ROTC program as a requirement for graduation in a baccalaureate degree. Proposes the following: (1) a 45-day summer training program for college/univers ity students in a military camp; (2) cadre of trainors from selected, highly qualified and experienced officers of the AFP; (3) governors incentivers to training cadres; and (4) no expense on the part of the students."

