congress_website_title = "AN ACT PROVIDING FOR LINE ITEM BUDGETING FOR CAPITAL OUTLAYS OR EXPENDITURES AND FOR PERSONAL SERVICES OF THE POSITIONS FROM SALARY GRADE 26 AND ABOVE AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED ELEVEN HUNDRED AND SEVENTY-SEVEN AS AMENDEDBY EXECUTIVE ORDER NUMBERED TWO HUNDRED AND NINETY-TWO"
congress_website_abstract = "Rationale: Since the positions with salary grade 26 and higher levels belong to the higher echelon of the bureaucracy, it is with more reason that everything should be made transparent. An itemization of their salaries and wages should appear in thenational budget prepared every year."

