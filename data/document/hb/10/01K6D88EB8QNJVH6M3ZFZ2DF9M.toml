congress_website_title = "AN ACT GRANTING HONORARIA TO REPRESENTATIVES OF MEMBERS OF THE HOUSE OF REPRESENTATIVES TO THE L0CAL DEVELOPMENT COUNCILS, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Seeks to grant honoraria to the Congressmen's representatives who are appointed members of the local development councils for their actual attendance in the meetings of the councils,concer ned under this scheme: (1) Representative to the Barangay Development Council - P600.00; 2) Representative to the Development Council of a Regular City or Municipality - P800.00; 3) Representative to the Development Council of a Metropolitan Municipality or Highly Urbanized City or Province - P1,000.00."

