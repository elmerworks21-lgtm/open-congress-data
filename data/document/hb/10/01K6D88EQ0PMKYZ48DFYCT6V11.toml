congress_website_title = "AN ACT ESTABLISHING REGIONAL CONSULTANCY SERVICE OFFICES OF THE CIVIL SERVICE COMMISSION AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "States that the proposed REGIONAL CONSULTANCY SERVICE OFFICE shall have the following functions: (1) To orient, prepare and train retirable employees in the administation and oepration of livelihood projects; (2) To assist retirees in the availmentof loans in any lending institutions for the oepration of a livelihood project; (3) To conduct seminars, workshops and lectures ffor the continuing education in livelihood projects; (4) to establish linkages with numerous marketing establishment foreasy disposal of available products; (5) To provide services in processing separation, retirement and medical care beneffits for retirees; and (6) To performs such other acts as may be necessary to achieve the purpose of this Act."

