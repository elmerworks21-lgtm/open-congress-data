congress_website_title = "AN ACT INSTITUTING PRISON REFORMS, IMPOSING A PENALTY FOR VIOLATIONS THEREOF, PROVIDING APPROPRIATIONS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares what are considered PROHIBITED ACTS udner this proposed measure, such as: (1) The transfer of convicted prisoners without any court order from the place of confinement specified in the judgment of conviction; (2) Solitary confinement or detention of a prisoner incommunicado; (3) Releasing a prisoner to the custody of any person who is not authorized by a court of law; and (4) Failure to prevent the proliferation of drugs or other vices within the prison. > Prescribes other CORRECTIVE MEASURES, such as a periodic and systematic inventory of all prisoners and the establishment of REHABILITATION COLONIES."

