congress_website_title = "AN ACT INSTITUTING THE DANGEROUS DRUGS ACT OF 1997 REPEALING REPUBLIC ACT NO. 6425, AS AMENDED"
congress_website_abstract = "Rationale: It is acknowledged that the drug abuse problem in the country is extremely difficult and multi-faceted. > Experience gained in the long years of enforcement of RA No. 6425, otherwise known as the Dangerous Drugs Act of 1972, has providedinsights in improving ways to effectively combat the proliferation and abuse of dangerous drugs among our people especially the youth. \"Dangerous Drugs Act of 1997\" Contains salient features, such as: (1) Definition of \"dangerous drugs\" now include athird category, the Dangerous Drugs Preparations in addition to Prohibited Drugs and Regulated Drugs; (2) Penalties and fines have been greatly increased consistently with those imposed by RA 7659, or the Death Penalty Act and the quantity of drugspossessed which will make the act punishable with the death penalty; (3) Dangerous Drugs Board shall be attached to the Department of Justice instead of the Department of Health. The Chairman shall be the Secretary of Justice and the Vice-Chairman sh"
