congress_website_title = "AN ACT CREATING A JUVENILE AND FAMILY COURT IN ALL PROVINCES AND CITIES THROUGHOUT THE COUNTRY, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"The Juvenile and Family Court\" Prescribes the cases involving youth and family relations which shall be under the exclusive original jurisdiction of the said Court. Aims to facilitate the speedy disposition of these cases. Defines \"DEPENDENT\", \"ABANDONED\" OR \"NEGLECTED\" CHILD as used in this Act."
