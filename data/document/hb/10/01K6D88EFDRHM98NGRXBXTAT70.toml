congress_website_title = "AN ACT PROMOTING A SMALL BUSINESS INCUBATOR PROGRAM"
congress_website_abstract = "Defines \"BUSINESS INCUBATOR\" as an organization set up for the specific purpose of nurturing young enterprises by providing common office and service facilities; a wide-range of services, and technical advice and information at below-market costs. Identifies the services provided by such business incubators,a s well as the types of incubators be established; sets the general guidelines for setting up said incubator."

