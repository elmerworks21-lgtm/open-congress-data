congress_website_title = "AN ACT DECLARING ILLEGAL RECRUITMENT, AS DEFINED IN EXISTING LAWS, AS A HEINOUS CRIME AND IMPOSING THE DEATH PENALTY THEREFOR"
congress_website_abstract = "Any person who directly or indirectly recruits any person for work opportunities without the necessary permits from the proper government agencies or authorities, shall be punished by reclusion perpetua to death. If the offender is a corporation, firm, partnership, or association, the penalty shall be imposed upon the guilty officer or officers of the corporation, fir, partnership or association. In the case the offender is an alien, he shall be deported immediately without further proceedingson the part of the Commission on Immigration and Deportation after he shall have served the sentence imposed on him by the court if the penalty is other than death."

