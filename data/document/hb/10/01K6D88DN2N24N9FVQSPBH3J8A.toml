congress_website_title = "AN ACT TO REGULATE THE SHOWING OF VIOLENT SCENES AND EVENTS OVER THE TELEVISION AND THEREAFTER, PROVIDING FOR PENALTIES REGARDING VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Violent Scenes Law\" Sets allowable time for television stations and the fraction of time for all movies to show violent scenes and penalizes those who will violate the same. Mandates the MTRCB to have the power to impose fines, issue warnings,reprimand and revoke licenses of the violators of this Act."

