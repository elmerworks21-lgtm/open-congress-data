congress_website_title = "AN ACT TO PROVIDE FOR A PROGRAM OF MODERNIZATION FOR THE UNIVERSITY OF THE PHILIPPINES"
congress_website_abstract = "Rationale: The current bill is intended to be a companion measure to the revised University Charter. It draws from the vision of U.P. Plan 2008, the University's strategic plan up to its first centennial and into the twenty-first century. The U.P.Modernization Program seeks to provide Congressional support and resoruces to major areas which the University must develop to keep its lead in and provide support for the Philippine educational system, assure its place in the international system ofunviersitys, and enhance its capacity to respond to the major problems of our national life. \"U.P. Modernization Program Act\" Recommends the Program with these components: (1) Development of More Comprehensive Autonomous Campuses; (2) Expansion of CCenters of Excellence; (3) Creation of Cultural Complexes; (4) Expansion and Development of Training and Resource Centers; (5) Modernization of the PGH; and (6) Administrative System and Governance."

