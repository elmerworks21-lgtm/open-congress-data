congress_website_title = "AN ACT REPEALING REPUBLIC ACT NUMBERED FIVE HUNDRED TWENTY-NINE, ENTITLED \"AN ACT TO ASSURE UNIFORM VALUE TO PHILIPPINE COIN CURRENCY,\" AND REPUBLIC ACT NUMBERED ONE THOUSAND FOUR HUNDRED, ENTITLED, \"AN ACT TO AMEND SECTION ONE OF REPUBLIC ACT NUMBERED FIVE HUNDRED TWENTY-NINE, ENTITLED \"AN ACT TO ASSURE THE UNIFORM VALUE OF PHILIPPINE COIN AND CURRENCY\""
congress_website_abstract = "Is premised on the observation that the Uniform Currency Law cannot contribute to strengthening the Philippine coin and currency and may in certain circumstances serve as a deterrent to the stimulating of economic growth in the Philippines."
