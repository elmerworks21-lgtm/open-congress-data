congress_website_title = "AN ACT AMENDING SECTION 22 OF R.A. 1161, OTHERWISE KNOWN AS THE 'SOCIAL SECURITY LAW' SO AS TO INCREASE THE PENALTY FOR FAILURE TO REMIT THE EMPLOYER'S CONTRIBUTIONS"
congress_website_abstract = "Increases the penalty for failure to remit the employer's contribution from [three percent (3%)] TO TEN PERCENT (10%) per month. In addition, the licenses of erring employees are to be revoked in case they fail to remit their contributions for three consecutive months."
