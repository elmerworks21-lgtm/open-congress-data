congress_website_title = "AN ACT DEFINING DOMESTIC VIOLENCE, PROVIDING PENALTIES THEREFOR AND PROVIDING FOR PROTECTION ORDERS"
congress_website_abstract = "\"Domestic Violence Act of 1996\" Defines \"DOMESTIC VIOLENCE \" as used in this Act; states certain acts considered as domestic violence. Prescribes penalties for these acts; provides for PROTECTIVE ORDERS for the following: (1) victim; (2) relatives within the fourth civil degree of consangsinity; (3) DSWD social worker; and (4) police officer who has personal knowledge of the incident."

