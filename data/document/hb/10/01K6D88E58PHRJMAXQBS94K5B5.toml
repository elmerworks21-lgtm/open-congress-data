congress_website_title = "AN ACT ALLOWING THE USE OF ELECTION PROPAGANDA THROUGH MASS MEDIA UNDER CERTAIN CONDITIONS, AMENDING FOR THE PURPOSE SUBPARAGRAPH (B) OF SECTION ELEVEN OF REPUBLIC ACT NO. 6646, OTHERWISE KNOWN AS THE ELECTORAL REFORMS LAW OF 1987, AND SECTION EIGHTY-FIVE OF BATAS PAMBANSA BLG. 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE, AS AMENDED"
congress_website_abstract = "States that the right of media to print or broadcast accounts of significant or news worthy events and view of public interest shall at times be recognized. Adds a NEW Section to BP Blg. 881 which allows candidates to buy air time and print space, subject to approval by the COMELEC."
