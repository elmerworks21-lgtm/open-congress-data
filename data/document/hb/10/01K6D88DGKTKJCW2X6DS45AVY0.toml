congress_website_title = "AN ACT STRENGTHENING THE NATIONAL ELECTRIFICATION ADMINISTRATION (NEA) AND THE RURAL ELECTRIC COOPERATIVES (RECS) BY RELEIVING THEM OF CERTAIN LOAN OBLIGATIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to institutionaliz e the recommendation of the Department of Finance through its Government Corporate Monitoring and Coordinating Commitee to revitalize the National Electrification Administration and the Rural Electric Cooepratives (RECs) contained in the Bail Out Plan which includes the write-off of receivables of electric cooperatives amounting to almost P4.39 Million consisting of accounts from the cooperatives, Pielstick loans, loans to the RECs and social projects not related to rural electrification ."
