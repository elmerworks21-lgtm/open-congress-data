congress_website_title = "AN ACT EXCLUDING CERTAIN TRANSACTIONS FROM THE COVERAGE OF REPUBLIC ACT NO. 7716 ENTITLED 'AN ACT RESTRUCTURING THE VALUE-ADDED TAX (VAT) SYSTEM, WIDENING ITS TAX BASE AND ENHANCING ITS ADMINISTRATION, AND FOR THESE PURPOSES AMENDING AND REPEALING THE RELEVANT PROVISIONS OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to EXEMPT the following transactions from coverage of the Expanded VAT Law, RA 7716: (1) Sales, barters, exchanges and services rendered by cooperatives registered under the Cooperative Code of the Philippines; (2) Leases of real and personnel properties, printing and publication/sal e of books and newspapers."
