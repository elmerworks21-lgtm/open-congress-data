congress_website_title = "AN ACT REQUIRING MANUFACTURERS AND OWNERS OF VEHICLES WHETHER FOR PUBLIC OR PRIVATE USE, TO INSTALL ANTI-POLLUTION DEVICES THEREIN, AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF, FURTHER AMENDING FOR THE PURPOSES THE LAND TRANSPORTATION AND TRAFFICCODE, AS AMENDED"
congress_website_abstract = "Provides for the following --- 'SEC. 34. (a) x x x > (k) ANTI-POLLUTION DEVICESS. - AS A PREREQUISITE FOR REGISTRATION AND THE ISSUANCE OF LICENSE PLATES, EVERY MOTOR VEHICLE, OF WHATEVER TYPE OR NATURE, WHETHER FOR PUBLIC OR PRIVATE USE, SHALL BE EQUIPPED WITH ANTI-POLLUTION DEVICES APPROVED BY THE DEPARTMENT OF TRANSPORTATION AND COMMUNICATIONS (DOTC).> Prescribes penalties for the vehicle manufacturer, owner or any person who assists or facilitates the registration of a motor vehicle withoutthe requirement imposed by this Act."

