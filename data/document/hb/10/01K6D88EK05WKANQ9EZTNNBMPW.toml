congress_website_title = "AN ACT PROVIDING FOR THE MODERNIZATION OF THE SCHOOL HEALTH AND NUTRITION PROGRAM (SHNP) OF THE DEPARTMENT OF EDUCATION, CULTURE AND SPORTS, AUTHORIZING THE APPROPRIATION OF FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"School Health and Nutrition Act\" Rationale: \"Health consciousness and proper health care should be inculcated in the minds of even the young. From a tender age of six years old, a child is required to attend school for at least five to six hours,five days a week, for eight months in a year. Unfortunately, not much emphasis is given to school health and nutrition program. It must be recognized tht it is the status of children's health and nutrition tht determines their capacity for learning.Aims to upgrade the SHNP of the DECS to enhance the active learning capacity of the chidlren, and for the teachers and other non-teaching personnel to function most effectively and efficiently this, enabling the achievement of the goals of quality baasic education. Provides for the principal thrusts, objectives, components and priority programs of the SHNP modernization."

