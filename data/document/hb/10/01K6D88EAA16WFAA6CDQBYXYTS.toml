congress_website_title = "AN ACT REQUIRING A CLEARANCE OR INDORSEMENT FROM THE DEPARTMENT OF AGRARIAN REFORM BEFORE A CASE INVOLVING AGRARIAN REFORM MATTERS OR ANY CASE INVOLVING BETWEEN LANDOWNER AND BENEFICIARY IS FILED WITH THE REGIONAL TRIAL COURTS/SPECIAL AGRARIAN COURTS, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-SIX HUNDRED AND FIFTY SEVEN, OTHERWISE KNOWN AS THE COMPREHENSIVE AGRARIAN REFORM LAW OF 1988"
congress_website_abstract = "States that NO CASE INVOLVING AGRARIAN MATTERS OR ANY CIVIL OR CRIMINAL CASE INVOLVING LANDOWNER AND BENEFICIARY UNDER THIS ACT SHALL BE FILED WITH THE SPECIAL AGRARIAN COURTS WITHOUT A CLEARANCE OR INDORSEMENT FROM THE DEPT. OF AGRARIAN REFORM."
