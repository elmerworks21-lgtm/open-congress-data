congress_website_title = "AN ACT MANDATING A REFERENDUM TO SUBMIT TO THE PEOPLE THE QUESTION OF CALLING A CONSTITUTIONAL CONVENTION TO INTRODUCE AMENDMENTS AND REVISIONS TO THE CONSTITUTION"
congress_website_abstract = "\"Constitutional Consultation Act of 1996\" Rationale: \"Today, there are very obvious manifestations of systemic disfunction which calls for the amendment andd revision of the Constitution. Among these are: (1) Muslim rebellion in Mindanao; (2) Unchecked deterioration of the peace and order situation; (3) Need for innovative mechanisms to allocate the CDF and the CIA, etc. Provides for these concers: (1) Date of Referendum; (2) Questions posed; (3) Election of delegates and their qualifications."

