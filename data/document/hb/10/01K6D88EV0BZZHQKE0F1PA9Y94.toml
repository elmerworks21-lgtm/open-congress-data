congress_website_title = "AN ACT PROVIDING FOR THE MANDATORY APPOINTMENT OF INFORMATION OFFICERS IN ALL LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: Information Officers are tasked to formulate measures for the consideration of the sanggunian. They give technical assistance to the governor or mayor by providing information and research data required for the delivery of basic servicesand adequate facilities to the public. They make known to the public said services so thaty they may fully avail of the same. > In spite of their crucial role in development, still many of the provincial governemnts do not have duly appointed information officers. This is further exacerbated by the attitude of some governors and Sangguniang Panlalawigan members who do not recognize the need for full-time information officers, naively believing that the private media could amply take care of theinformation function."

