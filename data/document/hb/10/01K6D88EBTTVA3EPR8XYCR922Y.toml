congress_website_title = "AN ACT FURTHER REGULATING THE CONVERSION OF AGRICULTURAL LANDS TO NON-AGRICULTURA L USES, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-SIX HUNDRED AND FIFTY-SEVEN, OTHERWISE KNOWN AS THE COMPREHENSIVE AGRARIAN REFORM LAW OF 1988"
congress_website_abstract = "Seeks to regulate the unnecessary conversion of agricultural lands to non-agricultura l uses. States that: \"...the DAR, upon the application of the beneficiary, or the landowner WITH THE PRIOR APPROVAL OF THE BENEFICIARY... AND UPON THE CONSULTATIONWITH THE FARMERS' ORGANIZATION TO WHICH THE BENEFICIARY IS ACCREDITED, and subject to existing laws may authorize the reclassificatio n or conversion of the land and its disposition: Provided, that, the beneficiary shall have fully paid his obligation OR SHALL HAVE BEEN PAID AN AMOUNT OR OBLIGATION THAT IS FAIR BY THE LANDOWNER."
