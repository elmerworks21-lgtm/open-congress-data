congress_website_title = "AN ACT LIBERALIZING BUSINESS IN THE RETAIL SECTOR, REPEALING REPUBLIC ACT NO. 1180, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"1995 Retail Trade Act\" Proposes to liberalize business in the retail sector thus appealing RA 1180 by accepting foreign investors to have: (a) one hundred (100%) percent ownership with a capitalization of at least TEN MILLION DOLLARS ($10,000,000.00 ); (B) forty-nine percent (49%) equity participation with a capitalization of at least $150,000.00 up to less than ten million dollars."
