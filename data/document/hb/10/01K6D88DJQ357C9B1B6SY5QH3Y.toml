congress_website_title = "AN ACT GRANTING EXEMPTION FROM PHILIPPINE INCOME TAXATION TO ALL FILIPINO OVERSEAS CONTRACT WORKERS EARNING TEN THOUSAND US DOLLARS (US$10,000) OR LESS PER ANNUM WHO REMIT THROUGH THE PHILIPPINE BANKING SYSTEM"
congress_website_abstract = "Seeks to exempt Filipino Overseas Contract Workers(OCWs) earning Ten Thousand ($10.000) US Dollars or less per annum and remitted through the system from Philippine income taxation. Aims to encourage Filipino OCWs to remit through the Philippine banking system, rather than through nonbank channels, thereby helping the country boost its economy."
