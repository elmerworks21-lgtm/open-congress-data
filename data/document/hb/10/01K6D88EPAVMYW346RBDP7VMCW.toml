congress_website_title = "AN ACT ABOLISHING FIXED TERM EMPLOYMENT OR EMPLOYMENT WITH DEFINITE PERIOD IN CONTRACTS INVOLVING HOUSEHELPERS DELETING FOR THIS PURPOSE ARTICLE 142 OF THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Seks to DELETE the following provision of the Labor Code as it \"DOES NOT augur well for the tenurial right of the househelpers which the Constitution guarantees to all workers. The present provision tends to confirm the status of \"househelper\" as mere \"SECOND-CLASS\" workers.\": > \"Art. 142. Contract of domestic service. - The original contract of Domestic Service shall not last for more than two (2) years but it may be renewed for such periods as may be agreed upon by the parties.\""

