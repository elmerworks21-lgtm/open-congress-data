congress_website_title = "AN ACT AMENDING SECTIONS 98, 99 AND 262 OF BATAS PAMBANSA BILANG 881 AS AMENDED, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Refers to the DECRIMINALIZATI ON of certain acts in connection with contributions to and expenditures by the candidates and political parties. However, \"RA NO. 7166 FAILED to decriminalize those acts with respect to PERSONS MAKING THE CONTRIBUTIONS.Provides, therefore, that ANY PERSON who commits such acts shall be administrativel y charged and fined with P1,000.00 to P30,000.00 for the first violation, and P2,000.00 to P60,000.00 for subsequent violations."
