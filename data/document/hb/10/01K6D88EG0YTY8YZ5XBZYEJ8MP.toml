congress_website_title = "AN ACT MANDATING WATER UTILITIES, ELECTRIC COMPANIES AND COOPERATIVES, AND OTHER SERVICE-RELATED FACILITIES TO RENDER EDUCATION AND INFORMATION MECHANISMS TO ITS CONSUMERS"
congress_website_abstract = "Rationale: the matter of inaccurate \"meterage reading\" has always been the subject of the ire of consumers. Numerous complaints have been lodged with the various government agencies and judicial courts over apparent inconsistencies in billing. Provides, therefore, for the following --- \"Section 1. An education and information mechanism shall be required of all service-related facilities, such as water utilities, electric companies, cooperatives, and the like to undertake a continuing information drive to educate its consuemrs on \"meterage\", inter alia, in order to fully understand the system, including bill charges and collection procedures.\""

