congress_website_title = "AN ACT AUTHORIZING THE PROCLAMATION OF THE CANDIDATE TO A LOCAL ELECTIVE POSITION IN A LOCAL ELECTION WHO OBTAINED THE SECOND HIGHEST NUMBER OF VOTES UPON THE FINALITY OF THE DECISION ISSUED BEFORE THE DAY OF ELECTION BY THE COMMISSION ON ELECTION (COMELEC) OR THE COURT OF COMPETENT JUIRISDICTION THAT THE CANDIDATE WHO OBTAINED THE HIGHEST NUMBER OF VOTES WAS DISQUALIFIED OR DECLARED NOT QUALIFIED FOR THE POSITION FOR WHATEVER REASON"
congress_website_abstract = "Seeks to remedy the situation of putting into office a person elected for another office, a situation supported by the doctrine of \"plurality of votes.\" Provides, therefore, that --- \"SECTION 1. Any provision of law to the contrary notwitstanding, the candidate in a local election to a local elective position who obtained the second highest number of votes shall be proclaimed upon the finality of a decision issued before the day of election by the Commission on Elections or any court of competent jurisdiction that the candidate who obtained the highest number of votes was disqualified or declared not qualified as candidate for the position for whatever cause."
