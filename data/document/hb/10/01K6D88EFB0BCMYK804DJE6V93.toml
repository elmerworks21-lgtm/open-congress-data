congress_website_title = "AN ACT REQUIRING EMPLOYERS TO FURNISH EMPLOYEES COPIES OF THE EMPLOYMENT CONTRACTS AND TO MAKE A SWORN DECLARATION THEREFOR, AMENDING FOR THIS PURPOSE ARTICLE 279 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "States that --- \"IN CASES WHERE EMPLOYMENT AGREEMENTS ARE REDUCED INTO WRITING , EMPLOYERS ARE REQUIRED TO FURNISH EMPLOYEES COPIES THEREOF AND TO MAKE A DECLARATION UDNER OATH THAT THE EMPLOYEES DULY RECEIVED THEIR RESPECTIVE EMPLOYMENT CONTRACTS:PROVIDED, THAT IN THE CASE OC CORPORATIONS, PARTNERSHIPS, OR ASSOCIATIONS, THE PRESIDENT, MANAGER OR PERSONNEL OFFICER IN CHARGE OF HUMAN RESOURCES MATTERS SHALL BE LIABLE FOR ANY VIOLATION UNDER THIS PARAGRAPH.\""

