congress_website_title = "AN ACT TO PROMOTE THE DEVELOPMENT OF THE JEWELRY MANUFACTURING INDUSTRY AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Jewelry Industry Development Act of 1995\" Recognizes the potential of the industry in generating more employment and increasing foreign exchange earnings through export and imports substitutes. Encourages the development and accelerated growth of the industry by: (a) encouragingloca l jewelers to legitimize their operations; (b) adopting tax measure policies and programs; and (c) institutionaliz ing in the skills advancement of their workers."
