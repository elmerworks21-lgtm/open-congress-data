congress_website_title = "AN ACT DEREGULATING THE DOWNSTREAM OIL INDUSTRY, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Downstream Oil Industry Deregulation Act of 1997\" Provides for the following --- (1) Imposition of a uniform tariff structure of three percent (3%) for both crude oil and refined petroleum products. (2) Redefinition of predatory pricing to focus onpreventing the dominant players in the industry from discouraging new entrants in the markets."
