congress_website_title = "AN ACT OFFICIALLY ACKNOWLEDGING THE HEROISM OF BISHOP GREGORIO AGLIPAY"
congress_website_abstract = "Rationale: Obispo Gregorio Aglipay is not only a minsiter of God but also a parliamentarian . He was the only priest who was a member of the Malolos Congress which drafted the first independent written Cosntitution of the Philippines. It is also noteworthy to mention that he was a contemporary and good friend of our National Hero, Jose Rizal. In constract with Rizal, he believed that revolutionary struggle would liberate our nation. Aside from his fight against frailocracy, he also fought against Spanish colonialism and American imperialism later. >In celebration of the Centennial of the 1896 Philippine Revolution, it is very aptly to officially acknowledge the heroism of Bishop Gregorio Aglipay. There is no more proper and fitting way foor the Filipino people and out country to give our tribute to the revolutionary priest who has painstakingly fought for our independence. It is because of him that we are reaping the fruits of an independent Philippines."

