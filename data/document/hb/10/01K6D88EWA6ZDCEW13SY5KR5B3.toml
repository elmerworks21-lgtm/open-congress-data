congress_website_title = "AN ACT CREATING A ONE STOP HOUSE FOR LABOR DISPUTES, ENSURING THE SIMPLIFIED PROCEDURES THEREIN IN THE PURSUIT OF SIMPLE AND EXPEDIENT LABOR JUSTICE, THEREBY AMENDING BOOK FIVE OF THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Rationale: The procedure and machinery for the labor disputes resolution has to be simplified under one roof. A one-stop house for labor disputes has to be established where all labor disputes will be filed as a first step of a well-defined procedural flow. Under this one- stop house, the competition will be effective delivery, not jurisdiction. In it, the simplicity of the procedures, among others, can enhance trust and confidence."

