congress_website_title = "AN ACT INCREASING THE MONTHLY PENSIONS OF GOVERNMENT RETIREES, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED ONE THOUSAND ONE HUNDRED AND FORTY-SIX, OTHERWISE KNOWN AS THE REVISED GOVERNMENT SERVICE INSURANCE ACT OF 1977"
congress_website_abstract = "Mandates that the basic monthly pension of all government retirees shall be [37 1/2] FIFTY PERCENT (50%) of the revalued average monthly compensation; states that the basic monthly pension SHALL NOT BE LESS THAN P5,000.00 PER MONTH. Provides for a [one thousand P1,000.00] FIFTEEN THOUSAND PESOS (P15,000.00) funeral benefit for a GSIS pensioner or member."
