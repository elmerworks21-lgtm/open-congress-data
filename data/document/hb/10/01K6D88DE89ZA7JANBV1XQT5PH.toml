congress_website_title = "AN ACT PROVIDING FOR THE CONSTRUCTION OF PUBLIC RESTROOMS ALONG NATIONAL HIGHWAYS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Land Transport Support Facilities for Hygiene and Convenience\" Mandates the contruction of a public restroom in every thirty (30) kilometer span of the national highways and roads to serve the interests of the riding-public availing of the landcarriers. Directs the barangay where the public restrooms are situated to maintain and sueprvise such facilities."
