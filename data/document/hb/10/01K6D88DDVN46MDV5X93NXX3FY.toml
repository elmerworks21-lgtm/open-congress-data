congress_website_title = "AN ACT REGULATING THE USE OF GOVERNMENT AMBULANCES"
congress_website_abstract = "Prohibits the use of government ambulance other than the transport of patients except: (1) transporting cadavers of indigent persons who died at the hospital; (2) withdrawal of money or hospital funds from a bank;p (3) transport of hospital personnel on night duty; and (4) medical missions."
