congress_website_title = "AN ACT MAKING THE CRIME OF MURDER COMMITTED AGAINST BARANGAY OFFICIALS WHO ARE KILLED IN THE LINE OF DUTY PUNISHABLE BY THE MAXIMUM PENALTY OF DEATH"
congress_website_abstract = "Rationale: Aside from having lesser compensation for their work, barangay officials lack the protection and security they need in the exercise of their duties. In complying with the demands of their work, they unavoidably meet the ire of some people. This often results in injury being inflicted on them, or to their death in more serious cases. > With this lowly status of our barangay officials, It is imperative that we provide the security and protection they need in the exercise of their duties. Hence, the attached bill seeks to minimize the occurrence of violence against barangay officials by advocating HARSHER PENALTIES for those who commit murder against our barangay officials."

