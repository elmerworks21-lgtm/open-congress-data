congress_website_title = "AN ACT GRANTING A ONE STEP SALARY INCREASE TO GOVERNMENT EMPLOYEES SIX MONTHS BEFORE COMPULSORY RETIREMENT AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: \" A one step salary grade increase in the basic salaries of government civil servants as they are nearing retirement will insure an increase in lump sum retirement benefits and monthly pensions. They will then have sufficient amount upontheir retirement either to engage in some useful enterprise that will benefit society or to enable them to spend the remaining years of their lives, in the best way they see fit."

