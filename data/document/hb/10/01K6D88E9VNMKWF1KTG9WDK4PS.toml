congress_website_title = "AN ACT IMPOSING STIFFER PENALTIES FOR ILLEGAL GAMBLING"
congress_website_abstract = "\"Anti-Gambling Act of 1995\" Enumerates the various forms of ILLEGAL GAMBLING as referred to in this proposed measure: Prescribes stiffer penalties for illegal gambling operations carried out by persons, such as: (1) the financier; (2) an AFP or PNPmember; (3)_ a bettor: (4) any employee directly or indrectly employed in such operation; (5) one who knowingly possess ticket, advertisement or paraphernalia used in illegal gambling; etc."
