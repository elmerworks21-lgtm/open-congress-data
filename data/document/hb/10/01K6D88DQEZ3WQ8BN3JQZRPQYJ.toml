congress_website_abstract = "States that child prostitution and other sexual abuses, being offenses viewed with total and unbridled persersity, hatefulness and repugnance to the common standdards and norms of decency and morality in a just and ordered society, are thus classified as heinous crimes and punishes, therefore, the offenders with the penalty of RECLUSION PERPETUA TO DEATH PENALTY."

