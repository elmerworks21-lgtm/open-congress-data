congress_website_title = "AN ACT PROVIDING FOR THE REGULATION OF THE ORGANIZATION AND OPERATIONS OF BANKS, QUASI-BANKS, TRUST ENTITIES AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: For this purpose, there is a need not merely to review and revise the General Banking Act (Republic Act No. 337, as amended), but to reissue the same as a new law that would govern the regulation of the organization and oepration of banks, quasi-banks and trust entities. \"The Revised General Banking Act of 1997\" Contains salient features, such as: (1) INCLUSION of universal banks, Islamic banks and cooperative banks in the classification of banks; (2)REDUCTION OF MINIMUM MEMBERSHIP of Filipino citizens in new banks from [70%] to 60% of total voting stock; (3) Monetary Board authority to disqualify, remove or suspend directors or officers of banks, quasi-banks and trust entities; (4) INCREASE in certain allowable equity investmennts; (5) Minimum banking days and hours fixed; (6) DECREASE in loan value of real estate collateral from [70%] to 60% of appraised value."

