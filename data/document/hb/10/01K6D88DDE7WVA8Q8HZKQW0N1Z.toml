congress_website_title = "AN ACT AMENDING SECTION 6 OF REPUBLIC ACT NO. 6675, OTHERWISE KNOWN AS THE GENERICS ACT OF 1988 (Requires that brand names indicated in prescriptions be NOT substituted)"
congress_website_abstract = "Amends Section 6 of RA 6675 as follows: \"Section 6. All medical, dental and veterinary practitioners, including private practitioners, shall write prescriptions using the generic name. HOWEVER, IF THE BRAND NAME IS INCLUDED, NO OTHER SUBSTITUTION CAN BE MADE IF OFFERED BY THE DRUG OWNER OR BY THE PHARMACIST TO THE EFFECT THERETO OTHER THAN THAT PROVIDED IN THE PRESCRIPTION.\""

