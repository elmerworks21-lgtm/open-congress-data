congress_website_title = "AN ACT PROVIDING FOR THE REPRESENTATION OF THE EXPORT SECTOR IN THE MARITIME INDUSTRY AUTHORITY (MARINA) BOARD, AMENDING FOR THIS PURPOSE PRESIDENTIAL DECREE NO. 474"
congress_website_abstract = "With such a demanding role, it is surprising that the sector most affected by the maritime, industry, the exporters, is not represented in the MARINA Board. The export sector is where our country relies on for economic growth. Ironically, they arenot represented in the policy-making body that significantly affect out country's overseas trade. Therefore, amending Presidential Decree 474, to include a representative of the export sector to the MARINA Board is sought through this measure."

