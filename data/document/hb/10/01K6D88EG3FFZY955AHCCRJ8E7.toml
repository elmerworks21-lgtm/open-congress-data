congress_website_title = "AN ACT IMPOSING STIFFER PENALTIES FOR THEFT OF AGRICULTURAL PRODUCTS IN THEIR ORIGINAL STATE"
congress_website_abstract = "States that --- \"SECTION 1. Any person shall commit theft of agricultural products and livestock in its original state including the theft of coconuts from a plantation, and the theft of fish and aquatic resources from fishponds, shall be punished with imprisonment of not less than twelve years but not mroe than twenty years in accordance with the following schedule: (1) Eighteen years to twenty years, if the amount of the crops involved exceeds P2,000.000.00.; (2) Fifteen to seventeen years, if the amount of crops involved exceeds P5,000,000.00 but does not exceed P2,000,000.00.; and (3) Twelve to fourteen years, if the amount of the crops involved does not exceed P5,000,000.00."

