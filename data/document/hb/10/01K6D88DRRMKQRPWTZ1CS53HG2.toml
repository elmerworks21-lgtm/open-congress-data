congress_website_title = "AN ACT ESTABLISHING THE CHILD AND FAMILY COURTS AND GRANTING THEM EXCLUSIVE ORIGINAL JURISDICTION OVER CHILD AND FAMILY CASES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Limits the jurisdiction of the proposed Courts to juvenile and domestic relations cases in order to specialize and develop the necessary competence on such cases. Proposes to totally eradicate the criminal contamination of minors through the propermonitoring of their detention and rehabilitation."
