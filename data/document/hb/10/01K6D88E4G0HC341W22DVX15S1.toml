congress_website_title = "AN ACT TO DEREGULATE THE DOWNSTREAM OIL INDUSTRY PURSUANT TO REPUBLIC ACT NUMBERED SEVENTY-SIX HUNDRED AND THIRTY-EIGHT AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Energy Competitive Law of 1995\" Defines \"DOWNSTREAM OIL INDUSTRY\" as the act and/or business of importing, exporting, shipping, transporting, processing or refining of indigenous or imported crude oil or other petroleum products, storing, marketingor selling of gasoline, gas, kerosene, oil and other crude oil or refined petroleum products. Proposes an automatic oil pricing mechanism; prescribes the duties, the jurisdiction and the powers of the Energy Regulatory Board."

