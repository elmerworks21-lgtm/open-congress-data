congress_website_title = "AN ACT PROVIDING FOR INTERNET ACCESS AMONG VARIOUS GOVERNMENT AGENCIES, GOVERNMENT-OWNE D AND -CONTROLLED CORPORATIONS AND LOCAL GOVERNMENT UNITS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Internet (Philnet) Access Act of 1996\" Provides a national and integrated framework for information technology development among the various government agencies, government-owne d and controlled corporations (GOCCs) and local governmentunits (LGUs). Seeks to revolutionize the communications system within the Philippine government, thus making the bureucracy more efficient and responsive to public interests."

