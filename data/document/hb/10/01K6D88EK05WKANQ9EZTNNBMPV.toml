congress_website_title = "AN ACT TO AMEND SECTION EIGHTY-NINE OF PRESIDENTIAL DECREE NUMBERED ONE THOUSAND FOUR HUNDRED AND FORTY-FIVE, OTHERWISE KNOWN AS THE GOVERNMENT AUDITING CODE OF THE PHILIPPINES, PROVIDING PENALTY THEREFOR, AND FOR OTHER PURPOSES(RE: CASH ADVANCES)"
congress_website_abstract = "\"SECTION 89 of the government Auditing Code was designed to control the giving of cash advance to any official or employee, but the existing provision of the law is not effective because it DOES NOT PROVIDE A PENALTY for those who intend to vioaltethe said provision, hence the rampant violation of its and the lrage accumulation of unliquidated cash advances in the different department, bureaus and offices.\" \"CASH ADVANCE SHALL INCLUDE (1) CASH ADVANCE TO DULY DESIGNATED SPECCIAL DISBURSING OFFICERS FOR SPECIFIC AUTHORIZED OFFICIAL EXPENDITURES AND (2) CASH ADVANCE TO OFFICERS AND EMPLOYEES OF THE VARIOUS AGENCIES OF THE NATIONAL GOVERNMENT AND ALL LOCAL GOVERNMENT UNITS FOR AUTHORIZED DISBURSEMENTS.\" > Penalizes any official or employee oof the national government and the local government units who violates this provision with a PRINCIPAL PENALTY OF PRISION CORRECTIONAL AND AN ACCESSORY PENALTY OF PERPETUAL DISQUALIFICATIO N FROM PUBLIC OFFICE."

