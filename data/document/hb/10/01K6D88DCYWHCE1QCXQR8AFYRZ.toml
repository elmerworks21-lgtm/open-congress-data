congress_website_title = "AN ACT FURTHER AMENDING REPUBLIC ACT NUMBERED SIX THOUSAND TWO HUNDRED THIRTY FOUR ENTITLED, \"AN ACT CREATING THE METROPOLITAN WATERWORKS AND SEWERAGE SYSTEM AND DISSOLVING THE NATIONAL WATERWORKS AND SEWERAGE AUTHORITY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Increases the authorized capitalization of the Metropolitan Waterworks and Sewerage System (MWSS) to [P8 Billion] P16 Billion, as well as its local and foreign ceilings to be able to finance its expansion, improvement and rehabilitation program overthe eleven-year period (1993-2003), as provided in Republic Act No. 6234, as amended, and provides for tax relief to be able to continously fulfill its basic mandate of providing adequate potable water to its constituents now and in the future. * **"

