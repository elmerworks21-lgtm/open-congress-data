congress_website_abstract = "Mandates the establishment in the Phil. Air Force of an educational institution to be known as the PHILIPPINE AIR FORCE ACADMEY for the instruction and preparation for military service of air force cadets. Prescribes the composition of the academicboard of the Academy, as well as the criteria for admission."

