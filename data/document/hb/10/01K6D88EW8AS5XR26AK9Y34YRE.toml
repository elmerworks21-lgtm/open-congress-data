congress_website_title = "AN ACT TO ENSURE PEACEFUL ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7166, OTHERWISE KNOWN AS THE SYNCHRONIZED ELECTIONS LAW OF 1991"
congress_website_abstract = "Rationale: Past election experiences reveal that granting exemptions from the 'gun ban\" and prohibitions on the use of bodyguards provided opportunities to candidates with private armies to create unncessary violence and wreak havoc during the election period. Ensuring that only law enforcers deputizes by the Comelec shall carry guns is a step towards making the 1998 elections peaceful, clean and honest. > Seeks, therefore, to DELETE from Ra No. 1766 those provisions authorizing the COMELEC togrant exemptions to the law."

