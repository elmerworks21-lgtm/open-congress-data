congress_website_title = "AN ACT STRENGTHENING ENVIRONMENTAL PROTECTION IN THE LOCAL GOVERNMENTAL LEVEL, AMENDING FOR THE PURPOSE SECTIONS SEVENTEEN AND FOUR HUNDRED EIGHTY-FOUR OF THE LOCAL GOVERNMENT CODE OF 1991"
