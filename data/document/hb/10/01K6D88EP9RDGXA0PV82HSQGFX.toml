congress_website_title = "AN ACT PROVIDING FOR THE CONSTRUCTION OF A BOUNDARY ARCH AND SIGN IN ALL NATIONAL, PROVINCIAL, CITY AND MUNICIPAL ROADS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: It is sad to note that many Filipinos do not know their neighboring provinces, cities and municipalities. This attitude causes confusion and difficulties to travelers because whenever they approach a person for assistance in order to locate the place they want to visit, they can not get the correct direction. Provides for the following --- \"SECTION 1. There shall be constructed, udner the supervision of the Department of Public Works and Highways, a boundary arch and sign bearing theseal and name of the province, city or municipality in all national, provincial, city and municipal roads nationwide.\""

