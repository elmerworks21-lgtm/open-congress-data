congress_website_title = "AN ACT AMENDING SECTION 20 ARTICLE IV OF REPUBLIC ACT NO. 6425, AS AMENDED, AND FURTHER AMENDED BY REPUBLIC ACT NO. 7659, AND FOR OTHER PURPOSES(PENALT IES-ILLEGAL DRUGS)"
