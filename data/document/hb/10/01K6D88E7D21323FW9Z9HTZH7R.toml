congress_website_title = "AN ACT PROVIDING DUE COMPENSATION TO MEMBERS OF LOCAL DEVELOPMENT COUNCILS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the following --- \"SECTION 116. COMPENSATION OF LOCAL DEVELOPMENT COUNCIL MEMBERS - MEMBERS OF THE LOCAL DEVELOPMENT COUNCILS SHALL RECEIVE HONORARIA, ALLOWANCES, AND SUCH OTHER EMOLUMENTS AS MAY BE AUTHORIZED BY LAW OR BARANGAY, MUNICIPAL OR CITY ORDINANCE WHICH SHALL COVER BUT SHALL NOT BE LIMITED TO PER DIEM, TRANSPORTATION AND MEAL ALLOWANCES. PROVIDED, THAT ANY PER DIEM COMPENSATION SHALL IN NO CASE BE LESS THAN ONE THOUSAND PESOS (P1,000) FOR MEMBERS F PRVINCIAL DEVELPMENT COUNCILS, SEVEN HUNDRED FIFTY PESOS (P750) FOR MEMBERS OF CITY OR MUNICIPAL DEVELOPMENT COUNCILS AND FIVE HUNDRED PESOS COUNCILS\""

