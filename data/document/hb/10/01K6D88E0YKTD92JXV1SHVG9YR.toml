congress_website_title = "AN ACT TO LOWER THE PENALTY OF ILLEGAL POSSESSION OF FIREARMS AND OTHER OFFENSES IN RELATION THERETO, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED EIGHTEEN HUNDRED AND SIXTY-SIX, AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares that the penalty of [reclusion temporal] PRISION CORRECCIONAL shall be imposed upon any person who shall unlawfully manufacture, acquire, dispose or possess any firearm, ammunition, etc. or instrument used or intended for the manufacture ofany firearm or ammunition. Premises that the \"incongruity of the offense committed and the penalty imposed under P.D. 1866 is best understood by considering the time... the edict was promulgated.\" It was made under a \"despotic regime. It is high time that we remove the vestiges of dictatorship.\""
