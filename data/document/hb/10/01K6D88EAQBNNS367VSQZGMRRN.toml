congress_website_title = "AN ACT PROVIDING FOR THE MODERNIZATION OF FIRE PROTECTION AND FOR OTHER PURPOSES"
congress_website_abstract = "Prescribes the components of the proposed fire protection modernization programs as follows: (1) establishment of FIRE PROTECTION SERVICES in the 1,053 LGUs without any existing service; (2) UPGRADING of existing fire protection services. (3) establishment of SPECIALIZED fire protection services related to: high-rise building fires, forest fires, ship fires, chemical fires, etc.; (4) establishment of training facilities and the hiring of training consultants."

