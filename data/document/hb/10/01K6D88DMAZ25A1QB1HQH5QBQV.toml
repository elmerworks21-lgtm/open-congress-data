congress_website_title = "AN ACT INCREASING THE PENALTIES FOR VIOLATIONS OF CERTAIN PROVISIONS OF THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Provides the Bureau of Customs (BOC) with a sharper tooth similar to that of the Bureau of Internal Revenue as provided in RA 7642 to strengthen its capability to fight smugglers and other violators of the Tariff and Customs Code of the Philippines(TCCP). Increases the penalties for the violation of certain provisions of TCCP in order to deter vioaltors including the officials, agents or employees of the BOC or of any agency of the government charged with enforcement of the provisions of thisAct."

