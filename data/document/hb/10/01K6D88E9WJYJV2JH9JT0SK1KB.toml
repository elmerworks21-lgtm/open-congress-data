congress_website_title = "AN ACT PROVIDING FOR UNIFORM RETIREMENT BENEFITS FOR ALL GOVERNMENT OFFICIALS AND EMPLOYEES, PRESCRIBING PROCEDURES IN THE PROMPT PAYMENT THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes a retirment scheme as follows: (1) OPTIONAL RETIREMENT - After completing at least 20 years of accumulated government service, a government official or employee may be retired, regardless of age; (2) COMPULSORY RETIREMENT - Applies to one who has rendered 60 years of age. Provides for other concerns, such as: (1) Principal Retirement Benefits; (2) Survivorship Benefits and Pension; (3) Permanent Disability Benefits; (4) Upgraded Salary Scale."

