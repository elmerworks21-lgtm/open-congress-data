congress_website_title = "AN ACT GRANTING RETIRED MEMBERS OF THE GOVERNMENT SERVICE INSURANCE SYSTEM THE FULL VALUE OF THEIR CONTRIBUTIONS TO THE SYSTEM, AND AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8291, OTHERWISE KNOWN AS 'THE GOVERNMENT SERVICE INSURANCE SYSTEM ACT OF 1997'"
congress_website_abstract = "Rationale: The main objective of this House bill is to grant the GSIS members who will retire from the service the total GSIS contributions of the member and the employer, including interest earnings of said contributions. > Introduces the concept of \"FULL VALUE OF CONTRIBUTIONS ' which shall be used as the basis for the payment to the retirees of their lump sum and basic monthly pension benefit."

