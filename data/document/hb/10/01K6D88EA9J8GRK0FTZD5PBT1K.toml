congress_website_title = "AN ACT ESTABLISHING THE ARTIST CAREER SERVICE AND PRESCRIBING RULES AND REGULATIONS TO IMPLEMENT IT"
congress_website_abstract = "Declares it the policy of the State to attract artists into the public service, and to provide a system for the recognition and reward of artistic performance productivity and creativity. Creates an Artist Career Service for a pool of highly qualified and productive artist personnel, which has special characteristics that set it apart from other personnel and the regular run of career services in the country."

