congress_website_title = "AN ACT DECLARING THE BUBALUS MINDORENSIS, COMMONLY KNOWN AS THE TAMARAW, AS THE NATIONAL ANIMAL, AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares the TAMARAW (Bubalus Mindorensis) as the national animal. Is based on observation that: (1) the Tamaraw, unlike the carabao, can only be found in the Philippines; and (2) it is symbolic of the country's good qualities and typifies some characteristics of the Filipinos."

