congress_website_title = "AN ACT DECLARING THE LINGGO NG KABATAAN A SPECIAL HOLIDAY FOR COLLEGE AND HIGH SCHOOL STUDENTS"
congress_website_abstract = "Rationale: It is sad to say, however, that the celbration of the Linggo ng Kabataan is done during school days. Consequently, students' participation is not encouraging. Mandates the following --- \"SECTION 2. The Linggo ng Kabataan is hereby declared a special holiday in the Philippines for college and high school students to encourage full support and participation from the youth.\""

