congress_website_title = "AN ACT AMENDING SECTION 63 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS LOCAL GOVERNMENT CODE OF 1991 BY PROVIDING FOR THE INDEFINITE SUSPENSION OF ANY LOCAL OFFICIAL WHO IS CHARGED WITH A CRIMINAL CASE BEFORE A COMPETENT COURT"
congress_website_abstract = "States that an INDEFINITE SUSPENSION shall be imposed upon any local officials who shall be charge with a criminal case in court. Provides, however, that such indefinite suspension shall be LIFTED only after judgment is rendered by the competent court acquitting the suspended local official of the offense, or where there is a prima facie finding of a malicious prosecution under the Revised Penal Code."

