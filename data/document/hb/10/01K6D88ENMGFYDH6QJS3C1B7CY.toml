congress_website_title = "AN ACT INSURING AUTOMATIC SALARY ADJUSTMENTS BY INSTITUTING WAGE INDEXATION SCHEME BASED ON CONSUMER PRICES"
congress_website_abstract = "Declares the following --- \"SECTION 1. Effective April 1, 1997, a corresponding one percentage point increase in the daily wages inclusive of allowances shall automatically be granted in favor of workers in the private sector for every one percentage point increase in consumer prices as measured and determined by the National Statistics Office (NSO) or its successor entity. > The adjustment provided in this Section shall be computed and implemented on a quarterly basis.\""
