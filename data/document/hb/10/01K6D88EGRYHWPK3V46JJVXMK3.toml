congress_website_title = "AN ACT REQUIRING SUBDIVISION DEVELOPERS/OWNE RS, INCLUDING GOVERNMENT-OWNE D OR -CONTROLLED CORPORATIONS, TO PAY THE REAL PROPERTY TAX OF EVERY HOUSE AND LOT OR LOT ONLY UNTIL THE SAME IS FULLY PAID BY AND OWNERSHIP THEREOF IS TRANSFERRED, TO THE AWARDEE"
congress_website_abstract = "Rationale: \"it is the basic provision of law that the legal owner of any real property must bear the burden of paying the corresponding tax therefor. In the business of housing and subdivision development, the legal ownership of the house and lot orlot only remains with the developer or owner. It is only upon full payment thereof that the legal ownership is transferred to the individual awardee."

