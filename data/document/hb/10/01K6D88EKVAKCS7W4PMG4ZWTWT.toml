congress_website_title = "AN ACT AMENDING SECTIONS 3, 4, 7, 8, AND 9 OF ARTICLE II AND SECTION 14, 14-A, 15 AND 16 OF ARTICLE III OF REPUBLIC ACT NO. 6425, AS AMENDED BY REPUBLIC ACT NO. 7659, THEREBY IMPOSING A PENALTY OF RECLUSION PERPETUA TO DEATH, REGARDLESS OF THE QUANTITY OF THE DANGEROUS DRUGS INVOLVED, AND FOR OTHER PURPOSES THEREOF"
congress_website_abstract = "Rationale: The advent of RA 7659 amending RA 6425, otherwise known as Dangerous Drugs Act of 1972 as amended, was a welcome haven to drug users and drug traffickers. Instead of giving more teeth and spirit to the Dangerous Drugs Act of 1972 as amended, it only created a monster with no fangs and spine!!! The floodgates of drug trafficking is again widely-opened. Why? First, RA 6425 was given retroactive effect. Second, the quantity of dangerous drugs involved determines the basis of the penlatyimposable. Third, modifying circumstances are noe considered in imposing penalty for the violation of RA 6425 to the extent of lowering imposable penalty be lower than prision correccional."

