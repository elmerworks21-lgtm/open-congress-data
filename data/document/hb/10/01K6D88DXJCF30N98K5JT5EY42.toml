congress_website_title = "AN ACT AUTHORIZING THE PROCLAMATION OF THE CANDIDATE IN A CONGRESSIONAL ELECTION WHO OBTAINED THE SECOND HIGHEST NUMBER OF VOTES UPON THE FINALITY OF THE DECISION ISSUED BEFORE THE DAY OF ELECTION BY THE COMMISSION ON ELECTIONS (COMELEC) OR THE COURT OF COMPETENT JURISDICTION THAT THE CANDIDATE WHO OBTAINED THE HIGHEST NUMBER OF VOTES WAS DISQUALIFIED OR DECLARED NOT QUALIFIED AS CANDIDATE FOR THE POSITION FOR WHATEVER REASON"
congress_website_abstract = "States, therefore, that all votes obtained by the candidate declared NOT qualified shall be considered STRAY and null and void."

