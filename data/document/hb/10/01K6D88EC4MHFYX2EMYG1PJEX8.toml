congress_website_title = "AN ACT CREATING THE COOPERATIVE HUMAN RESOURCE DEVELOPMENT TRUST FUND UNDER THE COOPERATIVE DEVELOPMENT AUTHORITY"
congress_website_abstract = "Requires that the proposed Fund be utilized for the institution of human resource development programs for the benefit of the members of registered cooperatives under the Cooperative Development Authority. The Fund shall constitute 3% of the share of all local government units in any and all government-impo sed taxes collected by the BIR, and 5% of the annual net income of all the registered cooperatives."

