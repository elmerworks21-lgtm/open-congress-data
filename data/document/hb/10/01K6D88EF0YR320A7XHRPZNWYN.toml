congress_website_title = "AN ACT AMENDING SECTION 482 (a) OF REPUBLIC ACT 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, MAKING MANDATORY THE POSITION OF AGRICULTURIST IN RURAL MUNICIPALITIES"
congress_website_abstract = "Amends Section 482 (a) of RA 7160 to read as follows: \"SECTION 482. QUALIFICATIONS, POWERS AND DUTIES --- (a) No person shall be appointed agriculturist unless he is a citizen of the Philippines, a resident of the local government unit cocnerned, ofgood moral character, a holder of a ccollege degree in agriculture or any related course from a recognized college or university and a first grade civil service eligible or its equivalent. He must have practiced his profession in agriculture or acquired experience in a related field for at least five (5) years in the case of the provincial or city agriculturist, and three (3) years in the case of the municipal agriculturist. >The position of an aagriculturist shall be mandatory for the provinciial government, RURAL MUNICIPALITIES and optional for the city and urban municipal governments."

