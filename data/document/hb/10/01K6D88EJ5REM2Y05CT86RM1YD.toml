congress_website_title = "AN ACT DECLARING THE RIGHTS OF PATIENTS AND PRESCRIBING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Rationale: A contractual relationship between a physician and his patients exists and is recognized. It is characterized by a mutual agreement by both the physician and the patient - the physicial consents to render medical service. The relationship is also fiduciary which means that it is based on mutual trust and confidence in one another. By virtue of the physician's education, training, expertise and skill, the former acquires intimate knowledge of an exercises considerable power over their patient's health. \"Patients Rights Act of 1996\" Aims to equalize the contractual relationship between a patient and his physician by stating the RIGHTS OF PATIENTS, such as the right to --- (1) medical care and treatment; (2) informed consent; (33) privacy; (4) choose his physician; (5) religious belief; and (6) privileged communication."

