congress_website_title = "AN ACT GRANTING THE BANGKO SENTRAL NG PILIPINAS THE POWER TO SET A CAP ON INTEREST RATES DURING CURRENCY AND OTHER ECONOMIC CRISES, IMPOSING PENALTIES FOR ANY VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "Decalres the following --- \"SECTION 1. The Bangko Sentral ng Pilipinas, shall, in the interest of national security currency and economic stability, and price stabilization, set a cap on interest rates imposed by banks and quasi-banks, including their subsidiaries and affiliates engaged in allied activities, during currency and other economic cirses asmay be determined by the monetary board.\""

