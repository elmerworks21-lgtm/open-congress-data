congress_website_title = "AN ACT PROVIDING FOR THE INCREASE OF THE AUTHORIZED CAPITAL STOCK OF THE NATIONAL ELECTRIFICATION ADMINISTRATION AND ORDAINING THE ENERGIZATION OF ALL BARANGAYS, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED TWO HUNDRED AND SIXTY-NINE, AS AMENDED, OTHERWISE KNOWN AS THE 'NATIONAL ELECTRIFICATION ADMINISTRATION DECREE'"
congress_website_abstract = "Increases the capitalization of the National Electrification Administration (NEA) from [five (5) Billion] to TWENTY-FIVE BILLION PESOS (P25 BILLION). Aims to energize all barangays within the next 15 years by further extending financial assistance to the rural electric cooperatives. Allows the conversion into equity of all advances by the National Treasury for NEA's foreign loans and for its outstanding liabilities for rural electrification projects."
