congress_website_title = "AN ACT CREATING THE PHILIPPINE VETERANS AUTHORITY CONSOLIDATING ALL AGENCIES ON VETERANS WELFARE, PRESCRIBING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Creates the Philippine Veterans Authority, an agency under the Office of the President that will undertake an effective, well-coordinate d and responsive benefits and welfare program for all veterans, military retiress and their dependents. Abolishes the PVAO and places the control and supervision of all the agencies and corporations attached to it."
