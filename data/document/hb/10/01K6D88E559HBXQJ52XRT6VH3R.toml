congress_website_title = "AN ACT PROVIDING FOR A POLICY REGARDING ALLOCATION, CONVERSION AND QUEDANNING OF SUGAR PRODUCTION AND FOR OTHER PURPOSES, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NUMBERED EIGHTEEN, ENTITLED 'CREATING A SUGAR REGULATORY ADMINISTRATION"
congress_website_abstract = "Vests the Sugar Regulatory Administration to establish domestic, export and reserve allocations SUBJECT TO THE UNANIMOUS APPROVAL OF SUGAR PRODUCERS, BOTH PLANTERS AND MLLERS. PROHIBITS the conversion, swapping or borrowing in any form or manner, ofany amount of sugar already quedanned; prescribes penal sanctions."

