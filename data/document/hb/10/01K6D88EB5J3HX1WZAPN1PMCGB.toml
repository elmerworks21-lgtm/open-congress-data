congress_website_title = "AN ACT CREATING AND ESTABLISHING THE PHILIPPINE COMMISSION ON WOMEN, DEFINING ITS POWERS, FUNCTIONS AND RESPONSIBILITIE S, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes a Commission on Women that shall exercise corporate powers, have a seal, may sue and be sued, and be the primary olicy-making and coordinating body of all women development programs and institutions in the Philippines. Seeks to promote women's social economic and political empowerment through policies and programs that will enhance their welfare and enable them to realize their full potential in serving the nation."

