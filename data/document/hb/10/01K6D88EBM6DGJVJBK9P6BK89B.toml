congress_website_title = "AN ACT MANDATING THE COMPULSORY INCLUSION IN THE CURRICULA OF ALL SECONDARY SCHOOLS, PUBLIC OR PRIVATE, OF A SUBJECT ON 'SUFFRAGE AND THE PRINCIPLES OF DEMOCRACY AND GOOD GOVERNMENT,' AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to integrate a new subject on SUFFRAGE AND THE PRINCIPLES OF DEMOCRACY and GOOD GOVERNMENT to the curricula of all SECONDARY schools. Aims to educate these students regarding their political rights and obligations as citizens. Intends to improve the quality of citizen involvement in the electoral processes and to ensure the election of qualified leaders in the country."

