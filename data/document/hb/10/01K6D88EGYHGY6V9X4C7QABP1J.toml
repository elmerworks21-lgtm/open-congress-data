congress_website_title = "AN ACT REGULATING THE INCREASE OF RENTALS OF COMMERCIAL BUILDINGS, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Provides for the following --- \"SECTION 1. Article XIII of the Constitution provides that: \"The Congress shall give highest priority to the enactment of measures that protect and enhance the right of all the people to human dignity, reduce social, economic, and political inequities, and remove cultural inequities by equitably diffusing the State shall regulate the acquisition, ownership, use, and disposition of property and its increments.\" Our past Constitutions contained similar provisions onthe regulation of the acquisition, use andd disposition of property.\" Penalizes violation of this Act."

