congress_website_title = "AN ACT PRESCRIBING THE AMOUNT OF TWO HUNDRED PESOS (P200.00) AS THE MAXIMUM AMOUNT OF APPLICATION FEE THAT CAN BE CHARGED BY AN EMPLOYER TO A JOB APPLICANT FOR LOCAL EMPLOYMENT"
congress_website_abstract = "Rationale: A common problem encountered by job applicants is the excessive fees charged by companies. These fees are charged usually to cover expenses for medical examination, application form, aptitude and other tests, pictures and other requirements. These fees range from P300 to P1,000.00. Penalizes employees who fail to comply with or circumvent the provisions of this proposed measure with UNFAIR LABOR PRACTICE and a fine of P10,000.00."

