congress_website_title = "THE REVISED INVESTMENT COMPANY ACT"
congress_website_abstract = "\"The Revised Investment Company Act\" Declares it the policy of the State to foster and promote a fair, orderly and efficient capital market in order to provide the private and public sectors with access to funds that are vital to the development ofthe national economy.> An investment company, by its nature, brings together large concentrations of funds from the public which are entrusted for investment to the management of others. This Act seeks, therefore, to establish a comprehensive schemeof regulation to permit investment companies to serrve their role in the capital formation process."
