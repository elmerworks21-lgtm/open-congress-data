congress_website_title = "AN ACT IMPOSING STIFFER PENALTIES FOR CERTAIN INSTANCES OF QUALIFIED THEFT THEREBY AMENDING ARTICLE 310, CHAPTER THREE OF REPUBLIC ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "Imposes the penalty of RECLUSION TEMPORAL in its MAXIMUM period to RECLUSION PERPETUA for certain instances of QUALIFIED THEFT on the occasion of the following, or immediately thereafter: a) fire, earthquake, typhoon or any other calamity; b) civildisturbance, public want or emergency; c) vehicular accidents."

