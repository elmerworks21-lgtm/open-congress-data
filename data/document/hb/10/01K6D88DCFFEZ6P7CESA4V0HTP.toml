congress_website_title = "AN ACT PROMOTING VOLUNTARY BLOOD DONATION, PROVIDING FOR AN ADEQUATE SUPPLY OF SAFE BLOOD, REGULATING BLOOD BANKS, AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "\"Blood Services Act of 1992\" States that VOLUNTARY BLOOD DONATION shall be promoted by an organized and sustained public education campaign by the DOH, the Phil. National Red Cross and other agencies. Provides for these concerns: (1) blood collection centers; (2) regulation of blood services; (3) importation of blood bank equipment. Prescribes penalties for any irregulairty on the operation of a blood bank. * * *"

