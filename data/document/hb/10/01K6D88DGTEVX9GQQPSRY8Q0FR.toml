congress_website_title = "AN ACT CONSTITUTING A CONSTITUTIONAL CONVENTION TO AMEND OR REVISE THE PRESENT CONSTITUTION, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Constitutional Convention Act of 1996\" Calls for a Constitutional Convention, rather than a constituent assembly, to amend or revise the Constitution in order to make it clear, comprehensive and concise, thus making it a good Charte and provides for the election of two (2) delegates from every congressional district of the country whose terms shall commence on Jly 1, 1995 and convene in not more than one (1) year."
