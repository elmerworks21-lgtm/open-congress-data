congress_website_title = "AN ACT ESTABLISHING BUSINESS ONE-STOP SHOP (BOSS) CENTERS FOR SMALL AND MEDIUM ENTERPRISES IN ALL REGIONS AND PROVINCIAL CENTERS IN THE COUNTRY"
congress_website_abstract = "Aims to provide entrepreneurs and would-be entrepreneurs with all the basic and essential information in establishing and running a business. The Centers shall have all the necessary government agencies - from registration to the last requirement needed in setting up a new business enterprise. Presribes the composition of the BOSS (Business One-Stop Shop) Centers."
