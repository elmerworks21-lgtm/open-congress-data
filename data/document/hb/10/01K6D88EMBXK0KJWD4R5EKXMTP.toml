congress_website_title = "AN ACT ALLOCATING FIFTY PERCENT (50%) OF THE TOTAL ENROLLMENT IN GOVERNMENT UNIVERSITIES AND COLLEGES FOR CHILDREN OF LOWLY PAID GOVERNMENT EMPLOYEES"
congress_website_abstract = "Provides for the following --- \"SECTION 2. All government Universities and Colleges are hereby required to reserve at least FIFTY (50%) PERCENT of its total enrollment for children of lowly paid government employees, elected or appointed, provided that, this reservation is only available to children of government employees whose total annual gross family income of the husband and wife does not exceed ONE HUNDRED THOUSAND PESOS (P100,000.00) coming from all sources as shown in their Three (3) years Income Tax Returns filed with the Bureau of Internal Revenue (BIR) immediately preceding the year of enrollment of their children."

