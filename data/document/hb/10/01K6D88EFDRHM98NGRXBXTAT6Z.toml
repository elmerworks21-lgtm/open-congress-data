congress_website_title = "AN ACT TO PROMOTE PRODUCTIVE USE OF IDLE PUBLIC AND PRIVATE AGRICULTURAL LANDS THROUGH BUILD-OPERATE-T RANSFER SCHEMES IN FAVOR OF FARMWORKERS"
congress_website_abstract = "Declares it the policy og the State to --- (a) Encourage private investments and renewed corporation or cooperative activities in idle public and private agricultural lands through \"Build-Operate- Transfer Schemes\" in favor of farmworkers. (b) Promote the development of idle public and private agricultural lands and make them economically productive and sustainable; and (c) Enahnce productivity and income of farmer/farmwork ers and the rural population. Covers all idle public and private agricultural lands and allow any productive enterprise engaged in: agricultural production, agri-processing or manufacturing, agri-trading, agro-tourism, etc."

