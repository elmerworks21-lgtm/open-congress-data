congress_website_title = "AN ACT REGULATING THE USE OF FUEL WOOD IN THE FLUE-CURING OF VIRGINIA TOBACCO AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "States that the use of fuel food for the flue-curing of Virginia tobacco is hereby regulated; declares the following acts ILLEGAL; (1) use of fuel food sourced from persons or entities engaged in illegal logging acitivites; and (2) unauthorized cutting of trees along roads and river banks. Prescribes a 6-month imprisonment or a P1,000.00 fine as penalty for violation of this Act."

