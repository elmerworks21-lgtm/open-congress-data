congress_website_title = "AN ACT FURTHER AMENDING SECTION THREE (3) OF REPUBLIC ACT NO. 7696 OTHERWISE KNOWN AS AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NO. 6948 OTHERWISE KNOWN AS AN ACT STANDARDIZING AND UPGRADING THE BENEFITS FOR MILITARY VETERANS AND THEIR DEPENDENTS"
congress_website_abstract = "Rationale : Many military retirees, who are also considered veterans coming from the different branches of the Armed Forces of the Philippines enjoying benefits provided in R.A. 7696 although they may also be reciving other benefits from the repestice military branch of office. This Bill aims to correct a situation where, a veteran or a direct descendant may be enjoying both benefits granted by PVAO and the Armed Forces of the Philippines. It is noticeably clear that a substantial amount is saved and preserved if this measure will be implement thereby, the government can utilize the saved portion for some other benefits that may be granted to deserving veterans whose pension allocations are depleted."

