congress_website_title = "AN ACT AUTHORIZING THE BUREAU OF CUSTOMS TO CONSIGN CONFISCATED AND ABANDONED ITEMS TO THE DUTY-FREE SHOP PHILIPPINES"
congress_website_abstract = "States that all confiscated and abandoned items in the Bureau of Customs shall be consigned to the Duty-Free Shop Philippines under the supervision of the Bureau of Customs. Refers to groceries , electronics, toys, garments, textiles, shoes, watches, jewelry held for failure to satisfy any administratve fine, or forfeited in favor of the government for violation of the Tariff and Customs Code."

