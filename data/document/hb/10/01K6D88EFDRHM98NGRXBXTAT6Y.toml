congress_website_title = "AN ACT REQUIRING ALL FRANCHISE HOLDERS OR OPERATORS OF TELEVISION STATIONS, PRODUCERS OF TELEVISION PROGRAMS, HOME VIDEO PROGRAMS AND MOTION PICTURES TO HAVE THEIR PROGRAMS AND FILMS BROADCAST WITH CLOSED-CAPTION AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Defines \"CLOSED-CAPTION \" as a method of captioning or subtitling of television home video programs and films for hearing-impaire d or foreign language viewers without interfering with the normal television pciture and films, by coding captions as vertical interval data signal which is decoded at the receiver and superimposed on the television picture or on films of motion pictures. Penalizes violation of this Act."

