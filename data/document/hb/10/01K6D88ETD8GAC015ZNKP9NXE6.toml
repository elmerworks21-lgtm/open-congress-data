congress_website_title = "AN ACT GRANTING SPECIAL RIGHTS AND PRIVILEGES TO NATURAL-BORN CITIZENS OF THE PHILIPPINES WHO HAVE LOST THEIR PHILIPPINE CITIZENSHIP, AND FOR OTHER PURPOSES"
