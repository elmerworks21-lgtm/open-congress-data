congress_website_title = "AN ACT PROVIDING FOR THE STANDARDIZATION OF ALL REGULATORS AND VALVE USED FOR LIQUIFIED PETROLEUM GAS (LPG) CYLINDERS"
congress_website_abstract = "Rationale: From the viewpoint of amrket strategies, the customer of LPG becomes captive to the supplier of regulators, thus, crippling his freedom to buy other LPG gas. This strategy runs counter to free competition as one LPG dealer may continue tocontrol his market because of his regulator. Provides, therefore, for the following --- \"SECTION 1. All regulators and valves for use in liquified petroleum gas (LPG) cylinders shall be subject to standards to be prescribed by the Bureau of ProductsStandards in coordination with the Energy Regulatory Board to ensure their uniformity in design, sizes, and other specifications."

