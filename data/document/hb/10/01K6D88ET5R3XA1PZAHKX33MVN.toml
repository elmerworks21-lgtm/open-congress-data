congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA OF AGRICULTURAL OFFICERS, EMPLOYEES AND PRACTITIONERS"
congress_website_abstract = "Rationale: \"... It is not too late for the government to look into the predicament of the agricultural officers, employees and practitioners. Their economic ans social well-being should be improved, and their working conditions and employment statuselevated.\" Covers all eligible agricultural officers and employees, as well as all agricultural practitioners. > Provides for areas of concern, such as: (1) Rectruitment and qualifications; (2) performance evaluation and merit promotion; (3) security of tenure; (4) Code of conduct and normal hours of work; (5) safeguards in administrative proceedings; (6) basic compensation and hazard allowance; etc."

