congress_website_title = "AN ACT REPEALING SECTION 119, CHAPTER XIV, TITLE VI, COMMONWEALTH ACT NO. 141(FREE PATENT/HOMESTEA D)"
congress_website_abstract = "Rationale: \"Investors are coming to MIndanao through purchase of land. If the real properties purchased are free patent or homestead, the investors are encouraged to introduce any development or improvement because of the five-year right of repurchase by the vendor or his heirs. If the buyer introduces improvement thereon, he risks losing his investments should the vendor or his heirs exercise their right of repurchase. This hinders progress. > Seeks, therefore, to REPEAL the following provisions under Commonwealth Act No. 141: \"Sec. 119. Every conveyance of land acquired under the free patent or homestead provisions, when proper, shall be subject to repurchase by the applicant, his widow or legal heirs within a period of five (5) years ffrom the date of the conveyance.\""

