congress_website_abstract = "\"Downstream Oil Industry Deregulation Act of 1997\" Declares it the policy of the State to deregulate the downstream oil industry to foster a truly competitive market which can better achieve the social policy objectives of fair prices, consumer protection and adequate, continuous supply of environmentally -friendly and high-quality petroleum products."
