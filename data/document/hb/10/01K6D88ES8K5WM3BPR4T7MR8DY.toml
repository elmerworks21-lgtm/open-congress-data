congress_website_title = "AN ACT GIVING PRIORITY TO DIFFERENTLY-ABL ED INDIVIDUALS IN THE OPERATION OF VENDING FACILITIES IN GOVERNMENT PROPERTY, TO ENLARGE THE ECONOMIC OPPORTUNITIES OF THE DIFFERENTLY-ABL ED AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The bill goes a step further than these laws by giving the disabled more opportunities to be part of the labor workforce, uplifting their dignity and morale by letting them bring in their own contribution s to the community. Since government has, time and again, expressed its commitment to support the disabled, it is but proper and fitting that it start with its various instrumentaliti es thereof. Thus, the passage of this bill is earnestly soughtto effect the government and the legislature's commitment to the sector. >Defines \"VENDING FACILITY\" as any automatic vending machine and other appropriate auxiliary equipment necessary for the sale of food or beverages and other articles or services dispersed automatically or manually.. > Provides for areas of concern, such as: (1) Designation of and function of the licensing agency; (2) Operation of vending facilities; (3) Issuance of license; (4) Exceptions, etc."

