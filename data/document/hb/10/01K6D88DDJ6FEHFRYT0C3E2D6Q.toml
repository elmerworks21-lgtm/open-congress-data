congress_website_title = "AN ACT ESTABLISHING A UNIVERSAL, COMPREHENSIVE AND UNIFORM SOCIAL SECURITY AND INSURANCE PROGRAM FOR ALL GOVERNMENT EMPLOYEES, AND FOR THIS PURPOSE INTEGRATING, RATIONALIZING, CONSOLIDATING, REVISING, FURTHER INCREASING AND EXPANDING THE BENEFITS UNDER EXISTING LAWS BEING ADMINISTERED BY THE GOVERNMENT SERVICE INSURANCE SYSTEM, AND FOR OTHER PURPOSES"
congress_website_abstract = "Liberalizes the scope of social insurance and streamlines the procedures for availment of benefits, such as: (1) extension of coverage to all government workers, inlcuding temporary employees; (2) simplified adminsitrative operations and requirements; and (3) expansion of existing benefits."
