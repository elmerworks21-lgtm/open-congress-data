congress_website_title = "AN ACT PROVIDING FOR THE ADJUSTMENT IN THE BASIC MONTHLY PENSION OF GOVERNMENT RETIREES TO AN AMOUNT EQUIVALENT TO THE AVERAGE MONTHLY SALARY FOR THE LAST FIVE YEARS OF AN INCUMBENT OF THE POSITION LAST HELD BY THE CONCERNED RETIREE, AMENDING FOR THE PURPOSE THE REVISED GOVERNMENT SERVICE INSURANCE ACT OF 1977"
congress_website_abstract = "Seeks to appropriate an amount equivalent to 5% of the total appropriation for the salaries of all government officials and employees. From this amount shall be drawn the adjustments of pensions to make them AT PAR with the salaries of incumbents."

