congress_website_title = "AN ACT TO AMEND REPUBLIC ACT NO. 7832, ENTITLED 'AN ACT PENALIZING THE PILFERAGE OF ELECTRICITY AND THEFT OF ELECTRIC POWER TRANSMISSION LINES/MATERIALS RATIONALIZING SYSTEM LOSSES BY PHASING OUT PILFERAGE LOSSES AS A COMPONENT THEREOF, AND FOR OTHER PURPOSES'"
congress_website_abstract = "Rationale: While the rigidity of RA 7832 is understandably due to the proliferation of theft of electricity, yet said law is deemed too oppressive to consumers who might not even be aware of the state of their electric meters and transmission lines/materials . This bill therefore seeks to temper the oppressive provisions on RA 7832 without being prejudicial to private electric utilities and electric cooperatives. > Proposes amendments to certain provisions of RA 7832, such as on: (1) Inspection and notice of violation; (2) Report on defects in electric meters and materials resulting in lower electricity rate; and (3) Compromise settlement."

