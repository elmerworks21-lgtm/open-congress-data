congress_website_title = "AN ACT PROHIBITING THE SUBSTITUTION OF CANDIDATES BY ANOTHER IN CASE OF DISQUALIFICATIO N AND WITHDRAWAL, PROVIDING PENALTIES FOR VIOLATIONS THEREOF AND AMENDING FOR THE PURPOSE SECTION SEVENTY-SEVEN OF BATAS PAMBANSA BILANG EIGHTY-EIGHT HUNDRED ANDONE, AS AMENDED"
congress_website_abstract = "Rationale: Under Section 77 of Batas Pambansa Blg. 881, substitution of candidates in case of unexpected or fortuitous event is permitted so as not to deprive a registered or accredited political party the right to field its own candidate. > Politicians however have often subverted the legislative intent behind this remedy by engaging intoo much horsetrading, bargaining and secret deals, sometimes with violent consequences. Hence, it is not surprising that most of these politicians file theircertificates of candidacy at the last minute. Contains these salient features: (1) Substitution of candidates shall only be allowed inc ase of death; and (2) In the case of independent candidates, the substitute shall only come from a list of three ((3) persons submitted by the independent candidate concerned at the time he filed his certificate of candidacy according to their ranking in said list."
