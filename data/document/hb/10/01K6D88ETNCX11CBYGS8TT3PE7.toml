congress_website_title = "AN ACT INCREASING THE OLD-AGE PENSION OF WORLD WAR II VETERANS, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 6948, AS AMENDED"
congress_website_abstract = "Rationale: The national government has taken a snail's pace in responding to the needs of the now aged, poor and sickly veterans. In spite of their recorded patriotic services to our country, it is most unfortunate that unlike the veterans of othercountries who are treated with much respect and given full support by their governments, our veterans are struggling for survival, lacking even in their basic needs. > Proposes, therefore, the following --- \"SECTION 10. Eligibility - A World War IIveteran shall be paid an old-age pension monthly for life, unless he is actually receiving a similar pension for the same consideration from other government funds or from the United States Government. The amount of the monthly old age pension shallbe according to the veteran's age as shown below: AGE Monthly Old Age Pension - 65 - 69 years - Five Thousand Pesos (P5,000.00); 70 - 74 years - Ten Thousand Pesos (P10,000.00); 75 - 79 years - Fifteen Thousand Pesos (P15,000.00); 80 - 89 years - Tw"

