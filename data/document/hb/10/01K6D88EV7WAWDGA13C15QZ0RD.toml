congress_website_title = "AN ACT GRANTING INCENTIVES TO THE SHIPBULDING AND SHIPREPAIR INDUSTRY AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: \"Until the early part of the 1970s, the Philippines was considered the leader and pioneer in shipbuilding and ship repair in the Asean Region. > This was the state of affairs in the industry until our neighbors generously grnated incentives to their own local shipbuilders and shiprepairers. As a result, their shipbuilding and shiprepair industry grew by leaps and bounds that by the turn of the decade the industry has become a pillar in their repective economies. > As a result, our shipbuilding and shiprepair industry was gradually eased out of the competition. In about a decade, our country was transformed from a vessel exporter to an importer of second-hand vessels.\" \"Philippine Shipbuilding and Ship Repair Development Act of 11997\" Seeks to grant incentives to shipbuilding and ship repair yards duly registered with MARINA, such as: (1) Exemption from import duties and value-added taxes; (2) Facilitation of the government rules regarding entry, stay and departure of vesse"

