congress_website_title = "AN ACT INCREASING THE TAX EXEMPTION PRIVILIGES OF THE PHILIPPINE NATIONAL RED CROSS, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED TWELVE HUNDRED AND SIXTY-FOUR, ENTITLED \"AN ACT TO INCOROPORATE THE PHILIPPINE NATIONAL RED CROSS\""
congress_website_abstract = "Declares that the PNRC shall be EXEMPT from payment of all duties, fees and TAXES, INCLUDING BUT NOT LIMITED TO, INCOME TAXES AND VALUE ADDED TAXES and ALL other charges of all kinds and NATURE on all importations AND LOCAL purchases for its exclusive use or for donations for deserving beneficiaries."

