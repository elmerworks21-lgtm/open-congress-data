congress_website_title = "AN ACT AMENDING SECTION 28 (b) (7) (A) OF PRESIDENTIAL DECREE NO. 1158 KNOWN AS THE NATIONAL INTERNAL REVENUE CODE MAKING AUTOMATIC THE GRANT OF EXEMPTION FROM INCOME TAX OF RETIREMENT BENEFITS OF WORKERS IN PRIVATE FIRMS AND REMOVING CERTAIN CONDITIONS"
