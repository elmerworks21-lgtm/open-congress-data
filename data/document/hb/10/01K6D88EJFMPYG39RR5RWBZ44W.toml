congress_website_title = "AN ACT AUTHORIZING THE COMELEC TO DEPUTIZE QUALIFIED CADETS OF THE RESERVED OFFICERS TRAINING CORPS AND THE CITIZENS MILITARY TRAINING DURING ELECTIONS, PLEBISCITES, REFERENDA AND OTHER ELECTORAL EVENTS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: the move of deploying the cadets is in consonance with Section 13 of Article II of the Declaration of Principles that \"the State recognizes the vital role of the youth in nation building ... and shall encourage their invovlement in publicand civic affairs.\" Authorizes the commandants of ROTC and CMT units in both public and private schools to screen volunteer cadets for this purpose. Prescribes allowances for these qualified cadets."

