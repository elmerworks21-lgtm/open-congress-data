congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A POPULATION OFFICE IN ALL LOCAL GOVERNMENT UNITS AND TRANSFERRING THE CONTROL AND SUPERVISION OVER EXISTING LOCAL POPULATION OFFICES TO THE COMMISSION ON POPULATION"
congress_website_abstract = "Presribes the following functions of the proposed Population Office: (1) To formulate measures designed to ensure the delivery of basic services and provision of adequate facilities relative to the integration of the population development principles. (2) To establish and maintain an updated data bank for program operations, development planning and an educational program to ensure the people's participation in population development; etc."

