congress_website_title = "AN ACT CHANGING THE GOVERNING PROPERTY RELATIONS OF SPOUSES TO CONJUGAL PARTNERSHIP OF GAINS, AMENDING FOR THE PURPOSE THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "Amends the Family Code provision on Absolute Community of Property to read as follows: \"Article 75. The future spouses may, in the marriage settlement, agree upon the regime of absolute community, conjugal partnership of gains, complete separation of property or any other regime. In the absence of a marriage settlement or when the regime agreed upon is void, the system of [Absolute Community of Proeprty] CONJUGAL PARTNERSHIP OF GAINS established in this Code shall govern.\""

