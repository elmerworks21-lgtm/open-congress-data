congress_website_title = "AN ACT EXEMPTING ROTARY CLUBS FROM PAYMENT OF CUSTOMS DUTIES AND OTHER TAXES FOR DONATIONS-IN KIND RECEIVED FROM FOREIGN ORGANIZATIONS UNDER CERTAIN CONDITIONS"
congress_website_abstract = "Aims to exempt from payment of all customs duties and taxes donations-in-ki nd received by Rotary Clubs from foreign organizations provided (1) that such donations are for exclusive use for which it is intended for as enumerated in its article of incorporation; (2) donations-in-ki nd shall not be diverted for other purpose; (3) donee shall not appropriate gifts to himself."

