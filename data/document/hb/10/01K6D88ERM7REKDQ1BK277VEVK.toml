congress_website_title = "AN ACT PROVIDING FOR AN EQUITABLE MECHANICS IN THE APPLICATION OF THE GRANT OF THE RIGHT TO BAIL"
congress_website_abstract = "\"Equitable Bail Act of 1997\" Proposes to FIX the AMOUNT OF BAIL based on the seriousness of the offense and on certain factors, such as: (1) financial ability of the accused; (2) nature and circumstances of the offense; (3) penalty of the offense; (4) age and health of the accused; (5) weight of evidence, etc."

