congress_website_title = "AN ACT REQUIRING DRUG TEST FOR CERTAIN APPLICATIONS, PRESCRIBING PENALTIES FOR FRAUDULENT ACTS RELATIVE THERETO AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Drug addiction is considered as one of the evils of today's Filipino society. The government is trying to combat this epidemic, but the task of preventing drug abuse remains a challenge to all sectors of society. Thousands of people of all ages are subjecting themselves to the harmful influences of drugs which they do so out of curiosity, for pleasure, or in order to deal with stressful events or painful experiences. More often the use of these prohibited drugs leads to the commission of other crimes. Provides for the following --- \"SECTION 1. Applicants for the following shall, upon filing of their application, be required to udnergo drug test under the supervision of the Department of Health: (1) driver's license; (2) licensee for the possession of firearms and other deadly weapons; (3) security guard license; (4) government licensure examinations; (5) employment in government and government owned and controlled corporations whether as casual, contractual or permanent po"

