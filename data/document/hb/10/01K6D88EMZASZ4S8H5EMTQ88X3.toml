congress_website_title = "AN ACT IMPOSING THE DEATH PENALTY FOR CHILD PROSTITUTION, SEXUAL ABUSE OF CHILDREN AND CHILD TRAFFICKING, AMENDING FOR THE PURPOSE THE \"SPECIAL PROTECTION OF CHILDREN AGAINST CHILD ABUSE, EXPLOITATION AND DISCRIMINATION ACT\""
congress_website_abstract = "Declares it the policy of the State to provide special protection to children from all forms of abuse, neglect, cruelty, exploitation and disrimination and other conditions prejudicial to their development. The State shall guardd and defend the interest of chidlren and guarantee the exercise of their rights. The State shall adopt such measures as would effectively promote the health, safety andd welfare of children."

