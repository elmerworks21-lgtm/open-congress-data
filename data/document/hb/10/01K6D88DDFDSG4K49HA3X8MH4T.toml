congress_website_title = "AN ACT STRENGTHENING THE NATIONAL NUTRITION PROGRAM, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides an integrated short, medium and long-term plan of the government to eradicate hunger and malnutrition - the PHILIPPINE PLAN OF ACTION FOR NUTRITION (PPAN). Provides for a twin strategy towards this objective: (1) promotion of household foodsecurity; and (2) the prevention, control and elimination of micronutrient malnutrition."
