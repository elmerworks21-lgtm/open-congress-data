congress_website_title = "AN ACT AUTHORIZING THE FIBER INDUSTRY DEVELOPMENT AUTHORITY TO ORGANIZE AND IMPLEMENT A FIVE-YEAR NATIONAL ABACA PRODUCTION PROGRAM IN ALL ABACA PRODUCING REGIONS OF THE COUNTRY, AND APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Enumerates the following components of the National Abaca Production Program: (a) Conduct researches related to crop production, improvement and protection; (b) Seedbanks development and maintenance; (3) Strengthening of extension services and manpower development; (d) Institutionaliz ation of Farmer's Field School on Abaca; (e) Establishments of Techno-Demo Centers; (f) Planting materials production and distribution; (g) Integrated Pest Management on Abaca."

