congress_website_title = "AN ACT TO ABOLISH THE PRESCRIPTIVE PERIOD FOR ACTIONS TO ANNUL MARRIAGES CELEBRATED BEFORE THE ENACTMENT OF THE FAMILY CODE, AMENDING FOR THE PURPOSE ARTICLE 39 OF THE FAMILY CODE"
congress_website_abstract = "Proposes that the PRESCRIPTIVE PERIOD provided in Article 39 of the Family Code be DELETED so that marriages solemnized BEFORE the effectivity of the Family Code MAY BE ANNULLED at any time, as long as the grounds therefor exist. Rationale: Under Article 39 of the Family Code, action or defense for the declaration of absolute nullity of a marriage shall not prescribe. However, in cases of marriages celebrated before the effectivity of the Family Code, such action or defense shall presscribe inten years after the Code shall have taken effect. > The reason given for the exception was that couples who were married before the effectivity of the Family Code who have grounds for annulment by reason of psychological incapacity, but who do not avvail off the 10 year prescriptive period provided under Article 39 of the Family code show no interest in annulling their marriage."
