congress_website_title = "AN ACT PROVIDING FOR THE ORGANIZATION OF COOPERATIVES FOR FRY GATHERERS, SMALL SCALE FISHERMEN ABND SMALL FISHFARMERS"
congress_website_abstract = "Seeks to organize cooperatives for fry gatherers, small-scale fishermen and small fishfarmers for the purpose of uplifting their socio-economic condition. States that fry gatherers, small-scale fishermen and small fishfarmers belong to the less fortunate segments of our society and as such they deserve to be provided with assistance by the government to enable them to participate more meaningfuly in the national efforts for economic development and to receive a more equitable share of the benefits derived from the fishing industry."

