congress_website_title = "AN ACT TO PROHIBIT THE MANUFACTURE, POSSESSION, STORAGE, TRADING, DISTRIBUTION OR PASSAGE OF NUCLEAR WEAPONS IN PHILIPPINE TERRITORY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Prohibits the manufacture, storage, possession, trade or distribution of nuclear weapons and passage of any foareign vessel carrying such weapons in Philippine territory. Authorizes the Department of National Defense to create a special unit to be known as the NUCLEAR WEAPONS PREVENTION UNIT (NWPU). The NWPU will be primarily tasked to monitor any of the activities specified above."

