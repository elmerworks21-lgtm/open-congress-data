congress_website_title = "AN ACT AMENDING ARTICLES 96, 124, 211 AND 225 OF THE NEW FAMILY CODE TO PROVIDE FOR JUDICIAL ENTERVENTION IN CASES OF DISAGREEMENT BETWEEN HUSBAND AND WIFE OVER THE ADMINISTRATION AND ENJOYMENT OF COMMUNITY PROPERTY, THE ADMINISTRATION AND ENJOYMENTOF CONJUGAL PARTNERSHIP PROPERTY AND THE EXERCISE OF PARENTAL AUTHORITY AND LEGAL GUARDIANSHIP OVER PROPERTY OF EMANCIPATED COMMON CHILD"
congress_website_abstract = "States that in case of disagreement over the administration and enjoyment of the community property, EITHER PARTY SHALL GO TO COURT FOR PROPER REMEDY. THE COURT SHALL APPOINT AN ADMINSITRATION FOR THE PROPERTY PENDING RESOLUTION OF THE CASE."

