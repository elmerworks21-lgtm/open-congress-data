congress_website_title = "AN ACT GRANTING HAZARD PAY TO ALL DULY-APPOINTED MEMBERS OF BARANGAY TANOD BRIGADES DURING THEIR INCUMBENCY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Barangay tanod brigades were organized to assist the government in the maintenance of peace and order in the country. Pursuant to such duty, they conduct rondas or nightly patrols, necessarily , exposing their lives and limbs to danger in the hands of criminal elements and other wayward members of society. In fact, an alarming number of barangay tanods have already been assaulted, injured and/or killed, leaving their families and dependents to fend for themselves. Provides for thefollowing --- \" SECTION 1. All duly-appointed barangay tanods shall be granted a hazard pay, during their incumbency, in the amount of Two Hundred Pesos (P200.00) per month.\""

