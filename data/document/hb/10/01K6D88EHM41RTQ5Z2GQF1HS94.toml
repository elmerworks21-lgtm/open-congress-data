congress_website_title = "AN ACT DECLARING NECROPHILIA AS A CRIME AGAINST PERSONS AND IMPOSING PENALTIES THEREFOR (desecrating dead)"
congress_website_abstract = "Defines NECROPHILIA as an abnormal, usually erotic fascination with female corpses, including sexual intercourse. Categorizes necrophilia into (a) Simple necrophilia and (b) aggravated necrophilia; prescribes corresponding penalties for each type."
