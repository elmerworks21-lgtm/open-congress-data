congress_website_title = "AN ACT TO REQUIRE INDUSTRIES, FACTORIES, COMPANIES, OR ANY INSTITUTION, FIRM OR ESTABLISHMENT USING CHEMICALS AND THEIR BY-PRODUCTS FOR PRODUCTION TO DEVELOP AND PROMOTE A COMMUNITY ENVIRONMENT INFORMATION PROGRAM"
congress_website_abstract = "\"Community Environmental Information Program of 1995\" Covers all industries, corporations, business firms and establishments that derive raw materials from the communities, or produce and discard their by-products in the community. Intends to require all corporations to: (1) ensure that all its operations for production do not cause pollution and do not endanger the ecological the ecological balance of community ecosystems; and (2) orient, educate and inform the community residents of the possible risks and safety measures in the use of chemicals and their by-products."

