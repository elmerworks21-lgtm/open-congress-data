congress_website_title = "AN ACT INCREASING THE MONTHLY RETIREMENT PENSION OF ALL SOCIAL SECURITY SYSTEM (SSS) RETIREES TO A MINIMUM LEVEL OF SIX THOUSAND PESOS (P6,000.00) UNDER AN ECONOMIC ADJUSTMENT PENSION PROGRAM"
congress_website_abstract = "Provides for the following --- \"SECTION 1. This act shall provide for the adjustment of Social Security System monthly pension to three thousand pesos (P3,000.00), provided that in the succeeding years upon approval of this Act, said amount will beincreased annually by not less than One thousand five-hundred pesos P1,500.00) until the total monthly pension shall be at least Six thousand pesos (P6,000.00) per month.\""
