congress_website_title = "AN ACT EXEMPTING PRIVATE LANDOWNERS FROM PAYMENT OF REAL PROPERTY TAXES WHOSE LANDS ARE OCCUPIED BY SQUATTERS"
congress_website_abstract = "Rationale: The squatter problem has become a national menace that even with the existence of a law making the act of squatting punishable under P.D. 772, the government seems to be losing the war on squatting. In fact, the war is raging with all those numerous demolition activities being udnertaken presently by the local govenrment units. Grants, therefore, TAX RELIEF to those hapless landowners who are being deprived of the use of their properties, until such time that the government can clear their lands from squatters."

