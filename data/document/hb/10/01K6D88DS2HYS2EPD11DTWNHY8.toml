congress_website_title = "AN ACT REGULATING THE USE OF GOVERNMENT AMBULANCES"
congress_website_abstract = "Regulates the use of government ambulances by prohibiting all government officials and employees, particularly those of the Department of Health (DOH), including hospitals under its jurisdiction, and the local government units owning or operating government ambulances to secure, appropriate or use such vehicles for any purpose other than the transport of patients except for certain circusmtance certified by the Director/Chief of the Hospital that no other vehicle could be utilized for the purpose."
