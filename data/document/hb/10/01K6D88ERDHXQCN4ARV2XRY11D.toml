congress_website_title = "AN ACT INSURING DUE PROCESS AND PREVENTING ABUSE IN THE ISSUANCE AND IMPLEMENTATION OF HOLD-DEPARTURE ORDERS, AND PROVIDING PENALTIES FOR ANY VIOLATION THEREOF"
congress_website_abstract = "Rationale: The right to travel is guaranteed by the Constitution and the United Nations Universal Declaration of Human Rights to which the Philippines is a signatory.> The Constitution, however, does not indicate the person who has the power to determine when the right can be curtailed \"in the interest of national security, public safety, or public health.\" Thus, the power is open to abuse by adminsitrative or nonjudicial officers who may imprudently exercise it at the \"inconvenience and annoyance\" of those who desire to exercise their constitutional right to travel. Provides for these concerns: (1) The proper trial court; (2) Action on the petition for a hold-departure order; (3) Evidence of guilt;l (4) Proper court order; and (5) Penaltyy for violation of this process."

