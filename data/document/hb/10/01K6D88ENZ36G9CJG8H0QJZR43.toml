congress_website_title = "AN ACT AMENDING ARTICLE 39 OF ACT NO. 3815, OTHERWISE KNOWN AS THE REVISED PENAL CODE, AND FOR OTHER PURPOSES(SUBSID IARY PENALTY)"
congress_website_abstract = "Rationale: Despite the good intentions (to curb criminality and to protect the people from the bad elements of society the imposition of subsidiary imprisonment for nonpayment of fine imposed under the same Revised Penal Code is unjust, unfair and discriminatory to those who are not in the financial position to pay the said fine. This is a categorical disregard of the social justice principle. Proposes, therefore, this amendatory provision to Art. 39 of the Revised Penal Code as follows: \"Art.30: Subsidiary Penalty. - 1. x x x 2. x x x 3. x x x 4. x x x 5) The subsidiary personal liability which the convict may have suffered by reason of his insolvency shall [not] relieve AND DISCHARGE him from HIS OBLIGATION TO PAY the fine in casee his financial circumstances should SUBSEQUENTLY improve."

