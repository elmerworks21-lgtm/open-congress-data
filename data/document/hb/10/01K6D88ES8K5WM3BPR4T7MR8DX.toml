congress_website_title = "AN ACT INSTITUTING THE HEALTH MAINTENANCE ORGANIZATIONS CODE"
congress_website_abstract = "Is premised on the following objectives: (1) To recognize Health Maintenance Organizations as unique medical service providers that combine the financing, management and provision of health services and to encourage them by providing incentives; (2)To establish the regulatory framework for Health Maintenance Organizations that should protect the rights of the buying public, as well as of the various sectors involved in the delivery health care services; and (3) To make people more health conscious by making health care services readily available, accessible and affordable."

