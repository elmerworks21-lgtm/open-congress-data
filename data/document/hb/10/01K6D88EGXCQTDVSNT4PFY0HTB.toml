congress_website_title = "AN ACT CREATING THE AUTONOMOUS PORT ADMINISTRATIONS , DEFINING THEIR POWERS AND FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Ports Autonomy Act\" Is premised on the following reasons: (1) to give meaning and realize the manddate of the Local Government Code by conferring autonomy and self-governing authority to the LGUs including the management and administration; (2) to provide immediate government response at the LGU or regional level on port problems and issues. (3) to encourage regional development and inter-regional competition; (4) to allow the LGUs to play an active role in the administration and development of ports; and (5) to accelerate ports privatization program with more participation of the local private sector."

