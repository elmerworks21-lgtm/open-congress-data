congress_website_title = "AN ACT REQUIRING MANUFACTURERS AND OWNERS OF VEHICLES WHETHER FOR PUBLIC OR PRIVATE USE, TO INSTALL SEAT BELTS THEREIN, REQUIRING THEIR OCCUPANTS TO USE THEM WHILE ON BOARD AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF, FURTHER AMENDING FOR THE PURPOSE THE LAND TRANSPORTATION AND TRAFFIC CODE, AS AMENDED"
congress_website_abstract = "Prescribes penalty for violation of this proposed measure, as follows: (1) for the vehicle manufacturer or owner --- P5,000.00 fine, or a 6-month imprisonment; and (2) suspension of the certificate of registration; (3) for the occupant not using theseatbelt -- same penalty."

