congress_website_title = "AN ACT PROHIBITING THE UTILIZATION OF CRIMINAL ELEMENTS IN MILITARY AND POLICE OPERATIONS, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Mandates that NO criminal elements shall be utilized in military and police operations. Penalizes the responsible military or police officer or personnel found guilty of violating this Act with imprisonment of not less than one (1) month nor more than six (6) months, in addition to dismissal from the military or police service."

