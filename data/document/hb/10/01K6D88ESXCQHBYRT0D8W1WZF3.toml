congress_website_title = "AN ACT PROVIDING FOR THE ACQUISITION AND DISTRIBUTION OF MOISTURE METERS IN ALL COCONUT-PRODUCI NG BARANGAYS AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The measure provides for the acquisition and distribution through the Philippine Coconut Authority of moisture meters in all coconut-produci ng barangays in the country. > At present, Republic Act No. 1365 requires the use of moisture meters in all domestic purchases of copra for the purpose of ensuring good quality copra and better incomes for our coconut farmers. >Mandates the following --- \"SECTION 1. Tne Philippine Coconut Authority shall formulate and implement a program for theacquisition of moisture meters and their distribution in every coconut-produci ng barangay, preferably through a duly accredited coconut small farmers' organization.\""

