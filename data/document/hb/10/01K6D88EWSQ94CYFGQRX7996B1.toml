congress_website_title = "AN ACT REQUIRING DISCLOSURE OF CERTAIN INFORMATION BY ALL BANKS AND FINANCIAL INSTITUTIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Banking Transparency Act of 1998\" Mandates all banking and financial isntitutions to submit to the Bangko Sentral ng Pilipinas and cause it to disclose the following information on the tenth (10th) day of January, april, June and October of each year: (1) Average cost of funds; (2) Average prime lending rates; (3) net profits from foreign exchange operations; (4) return on equity; and (5) average interest rate on credit cards."

