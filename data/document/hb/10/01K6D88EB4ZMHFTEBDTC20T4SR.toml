congress_website_title = "AN ACT STRENGTHENING VOLUNTARY ARBITRATION AS A PREFERENTIAL MODE OF LABOR DISPUTE SETTLEMENT, AMENDING FOR THE PURPOSE ARTICLE 262-A OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "States that \"the award or decision of the voluntary arbitrator shall contain the facts and the law on which it is based. It shall be final and executory after ten (10) calendar days from receipt of the copy of the award or decision by the parties,UNLESS THE AGGRIEVED PARTY OBSTAINS A TEMPORARY RESTRAINING ORDER FROM THE SUPREME COURT. PROVIDED, THAT THE SAID AWARD OR DECISION SHALL BE REVIEWED ONLY BY THE SUPREME COURT ON A PETITION FOR CERTIORARI UNDER THE REVISED RULES OF COURT.\""
