congress_website_title = "AN ACT INCREASING THE ADDITIONAL AD VALOREM TAX ON IDLE LANDS, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Ratioanale: \"Raising the effective tax rate on idle and unproductive lands would hopefully, strengthen the government's urban and rural land reform programs. The owners thereof would be constrained to utilize the land for proeductive purposes because of the additional tax burden. In case of agricultural lands, trees and other crops may be planted; in case of commercial and industrial lands, factories and other business establishments can be put up while in the case of residential lands, housing projects for the poor may be undertaken by the landowners thereof.\" States that --- \"SECTION 236. Additional Ad Valorem Tax on Idle Lands. - A province or city, or a municipality within the Metropolitan Manila Area, may levy an annual tax on idle llands at the rate not exceeding [five percent (5%)] FIFTEEN PERCENT (15%) of the assessed value of the property which shal be in addition to the basic real property tax.\""

