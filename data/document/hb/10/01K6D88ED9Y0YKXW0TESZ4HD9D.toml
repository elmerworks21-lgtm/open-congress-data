congress_website_title = "AN ACT PROVIDING FOR A CLEAN AND GREEN ENVIRONMENT ACT OF 1996"
congress_website_abstract = "Provides for the following \"SEC. 2. All persons are enjoined to clean and green their property including its immediate surroundings or premises such as streets, sidewalks or other roadsides. Such cleaning, disposal and collection of garbage and theplanting of trees shall be in coordination with the Department of Environment and Natural Resources (DENR) and the local government units concerned.\" \"Sec. 3. All government units shall adopt and implement within six (6) months from the approval of this Act, a clean and green environment program within its territorial jurisdiction. Likewise, all government agencies shall adopt and implement its own clean and green environment program within six (6) months from the approval of this Act. Provides,, likewise, for the creation of a CLEAN AND GREEN ENVIRONMENT FUND for this purpose."

