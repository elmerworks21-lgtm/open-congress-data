congress_website_abstract = "States that --- \"SECTION 1. Government-owne d and-controlled corporations shall be privatized through a public offering of not less than sixty (60) percent of its share of stock: Provided, That no single person shall own, directly or indirectly, more than one percent of the shares of stock of the corporation.\""

