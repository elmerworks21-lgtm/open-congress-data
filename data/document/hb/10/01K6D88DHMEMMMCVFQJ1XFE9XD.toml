congress_website_title = "AN ACT STRENGTHENING THE RESEARCH, CONTROL AND PREVENTION PROGRAMS ON DIABETES MELLITUS, PROVIDING FOR THE CREATION OF A NATIONAL COMMISSION ON DIABETES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The National Diabetes Act of 1994\" Provides for an effective research on the prevention and treatment of Diabetes Mellitus. Creates the National Commission of Diabetes which shall formulate a long-range plan to combat the disease, including research programs and studies for the investigation of the epidemiology, prevention and control of the disease."
