congress_website_title = "AN ACT INCREASING THE PENALTY FOR THE UNAUTHORIZED SLAUGHTERING OF CARABAOS, HORSES, MARES, AND COWS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 11, ENTITLED 'AN ACT TO PROHIBIT THE SLAUGHTERING OF MALE AND FEMALE CARABAOS, HORSES, MARES, AND COWS'"
congress_website_abstract = "Rationale: \"Being an agricultural country, most of the Filipinos rely on farming as their chief soource of livelihood. Thus, it is important to maintain a sufficient population of work animals throughout the country to meet farmer's needs. It is inthis context that Republic Act No. 11 was enacted in 1946. Lately, however, it has been observed notwithstanding this law and its punitive provisions, indiscriminate slaughtering of carabaos, horses, mares, and cows continue tht Republic Act No. 11has outlived its effectivity. People nowadays do not seem to be deterred by the rather light penalties prescribed under the Republic Act No. 11 hence, the need to impose stiffer penalties.\""

