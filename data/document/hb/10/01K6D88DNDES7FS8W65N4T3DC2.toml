congress_website_title = "AN ACT EXEMPTING THE PERSONNEL OF GOVERNMENT-OWNE D OR -CONTROLLED CORPORATIONS (GOCCs) AND GOVERNMENT FINANCIAL INSTITUTIONS (GFIs) FROM THE COVERAGE OF REPUBLIC ACT NUMBERED SIXTY-SEVEN FIFTY-EIGHT, OTHERWISE KNOWN AS THE 'COMPENSATION AND POSITION CLASSIFICATION ACT OF 1989'"
congress_website_abstract = "Declares that government-owne d or controlled corporations (GOCC) and government financial institutions which do not receive any form of budgetary support or subsidy from the national government and performs propriety functions SHALL BE EXEMPT for the coverage of RA 6758 which standardized salaries and benefits of GOCC and GFI employees."

