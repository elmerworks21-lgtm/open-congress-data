congress_website_title = "AN ACT PROVIDING FOR THE REGULATION AND DISPOSAL OF MEDICAL WASTES, DECLARING CERTAIN ACTS UNLAWFUL, PRESCRIBING PENALTIES THERETO, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Medical Waste Control Act of 1995\" Defines the meaning of the term \"medical wastes\"; empowers the Secretary of Health to establish acceptable standards for its regulation, management and disposal. States that all local government units shall havea complementary role in the enforcement of the provisions of this Act."

