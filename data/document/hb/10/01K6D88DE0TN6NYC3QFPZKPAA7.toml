congress_website_title = "AN ACT EXEMPTING THE MEMBERS OF THE ARMED FORCES OF THE PHILIPPINES FROM COMPULSORY COVERAGE IN THE GOVERNMENT SERVICE INSURANCE SYSTEM, AMENDING FOR THE PURPOSE SECTIONS 3 AND 24 OF THE 'REVISED GOVERNMENT SERVICE INSURANCE ACT OF 1977'"
congress_website_abstract = "Exempts the members of the AFP from the mandatory membership and compulsory insurance coverage with the GSIS by amending PD 1146, otherwise known as the \"Revised Government Service Insurance Act.\" States that the premiums for Employees CompensationInsurance, extra hazard and health (medicare) of military personnel of the AFP as appropriated and as previously computed by the GSIS-DBM Reconciliation Task Force shall be released to the AFP RSBS."
