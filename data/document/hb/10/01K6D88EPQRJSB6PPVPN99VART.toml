congress_website_title = "AN ACT AUTHORIZING THE BOARD OF REGENTS OF THE UNIVERSITY OF THE PHILIPPINES TO CONVERT THE COLLEGE OF PUBLIC ADMINISTRATION INTO THE NATIONAL SCHOOL OF PUBLIC ADMINISTRATION, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: In 1952, the College of Public Administration of the University of the Philippines was created. Throughout its over fifty years of existence, the College ahs been regarded as the leader of the discipline in the country. All the programsof the College have been designed defined its core as government management, the present when it embraces as well as the analysis and betterment of alternative delivery mechanisms. As the government sheds off many functions and institutions to the private sector, the focus of public administration is aimed at understanding and improving not only governance but also the role of the State and civil society in the enhancement of that service.> Directs the proposed NATIONAL SCHOOL OF PUBLIC ADMINISSTRATION (NSPA) to offer the following courses: (1) Integrated Honors Program - leading to the degree of Bachelor of arts in Public Administration (BAPA) and Master of Arts in Public Administration; and (2) Academic Program in Third Sector Management"

