congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA OF AGRICULTURAL DEVELOPMENT WORKERS"
congress_website_abstract = "Rationale: At present, there is a weak and fragmented agricultural service delivery operating within the Department of Agriculture and the local government units which hamper the implementation of government agricultural development programs. One of the causes to this problem was due to the effects of devolution which made LGUs financially constrained to hire the needed agricultural development workers and provide them with the necessary compensation. Furthermore, it is unfortunate that the Local Government Code of 1991 provides that agriculturist position in the city and municipal levels be made optional, not mandatory. Besides, the position of provincial agricultural engineer, and provincial fishery officer were not even included for crreation, considering that these services are essential in accelerating agricultural modernization in the countryside. \"Magna Carta of Agricultural Development Workers\" Defines the term \"AGRICULTURAL DEVELOPMENT WORKERS\" to include the following worke"

