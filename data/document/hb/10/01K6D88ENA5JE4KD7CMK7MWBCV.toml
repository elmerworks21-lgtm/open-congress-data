congress_website_title = "AN ACT PROVIDING FOR ELECTION OF PROVINCIAL AND CITY PROSECUTORS BY THE QUALIFIED VOTERS OF THE PROVINCE OR CITY CONCERNED, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED TWELVE HUNDRED AND SEVENTY-FIVE ENTITLED 'REORGANIZING THE PROSECUTIONSTAFF OF THE DEPARTMENT OF JUSTICE AND THE OFFICES OF THE PROVINCIAL AND CITY FISCALS, REGIONALIZING THE PROSECUTION SERVICE, AND CREATING THE NATIONAL PROSECUTION SERVICE'"
congress_website_abstract = "Rationale: The government prosecution service plays a significant role in maintaining peace and order in our country. It is responsible for filing charges against criminals and sees to it that those who committedd an offense or crime are punished accordingly. > Proposes to ADD this new section to PD 1275, and to read as follows: \"SEC, 9-A. PROVINCIAL PROSECUTORS AND CITY PROSECUTORS; ELECTION, TERM, QUALIFICATIONS. - PROVINCIAL PROSECUTORS AND CITY PROSECUTORS SHALL BE ELECTED BY QUALIFIED VOTERS OF THE PROVINCE OR CITY CONCERNED AT THE LOCAL ELECTION ON THE SECOND MONDAY OF MAY 1998 AND EVERY THREE YEARS THEREAFTER. THEY SHALL SERVE FOR A TERM OF THREE YEARS BEGINNING ON THE FIRST DAY OF JUNE AFTER THEIR ELECTION AND UNTIL THEIR SUCCESSOORS ARE ELECTED AND HAVE QUALIFIED.\""

