congress_website_title = "AN ACT PROVIDING PENALTIES FOR MANIPULATION AND OTHER CORRUPT PRACTICES IN THE CONDUCT OF PROFESSIONAL LICENSURE EXAMINATIONS"
congress_website_abstract = "Seeks to impose penalties of imprisonment of not less than two (2) years and a fine of not less than P5,000.00 and not more than P10,000.00 or both on persons who manipulate or rig board examination results, make a leak of the questions to be askedon the examinations, or tamper the grades. In case the offender is an officer or employee of the Professional Regulations Commission or a Member of the Board of Examiners, he shall be removed from office and shall suffer the penalty of perpetual absolute disqualificatio n from public office, in addition to the penalties prescribed above."
