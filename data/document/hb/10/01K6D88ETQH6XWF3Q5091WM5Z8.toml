congress_website_title = "AN ACT CREATING THE NATIONAL AGRARIAN REFORM ADJUDICATION COMMISSION, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Today, there is an urgent need not only to maintain but improve the twin-approach concept of administrative and judicial dispensation of agrarian justice to cope with the dynamics of social justice and the speedy impartial disposition ofcases before any administrative or judicial tribunal. > Seeks, therefore, to provide a mechanism for the delivery of agrarian justice by an independent quasi-judicial administrative body whose decisions, orders or rulings could be appealed to the Supreme Court."
