congress_website_title = "AN ACT AMENDING ARTICLE 202 OF THE REVISED PENAL CODE, SO AS TO INCLUDE MALES IN THE DEFINITION OF PROSTITUTION"
congress_website_abstract = "Rationale: Article 202 of the Revised Penal Code penalizes prostitutes defined as \"manner who, for money or profit, habitually indluge in sexual intercourse or lascivious conduct.\" > The definition ... is restrictive. Under the Article, ONLY WOMENwho habitually indulge in sexual intercourse or lascivious conduct are deemed prostitutes. However, MALES are also CAPABLE of engaging in prostitution. Proposes, therefore, to AMEND Article 202 of the Revised Penal Code by redefining this way: \" Art202. Vagrants and Prostitutes - The following are vagrants: x x x 5. Prostitutes. For the purpose of this article, [women] PERSONS who, for money or profit, habitually indulge in sexual intercourse or lascivious conduct, are deemed to be prostitutess.\""
