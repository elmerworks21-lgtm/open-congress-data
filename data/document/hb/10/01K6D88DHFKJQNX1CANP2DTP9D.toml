congress_website_title = "AN ACT RATIONALIZING THE EDUCATIONAL ASSISTANCE PROGRAMS FOR INDIGENOUS CULTURAL COMMUNITIES AND FOR OTHER PURPOSES"
congress_website_abstract = "Vests with the DECS the authority to systematize, administer, and implement the NATIONAL INTEGRATION SCHOLARSHIP GRANT PROGRAM (NISGP), the SELECTED ETHNIC GROUPS EDUCATONAL ASSISTANCE PROGRAM (SEAGEP), and other government study grants available exclusively for deserving members of the indigenous communities. Requires , however, the full participation of the (1) Office for Northern Cultural Communities (ONCC), the Office for Southern Cultural Communities (OSSC), and the Office for Muslim Affairs (OMA)."

