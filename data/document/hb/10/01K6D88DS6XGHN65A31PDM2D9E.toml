congress_website_title = "AN ACT FURTHER AMENDING SUB-PARAGRAPH (C), SECTION 6 OF PRESIDENTIAL DECREE NUMBERED 902-A, AS AMENDED BY PRESIDENTIAL DECREES NUMBERED 1653 AND 1758, BY PROVIDING THAT ONLY ACTIONS FOR MONEY CLAIMS ARE SUSPENDED UPON APPOINTMENT OF A MANAGEMENT COMMITTEE, REHABILITATION RECEIVER, BOARD OR BODY, FOR CORPORATIONS, PARTNERSHIPS OR ASSOCIATIONS UNDER RECEIVERSHIP AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to suspend money claims or creditor's claims upon appointment of a management committee, rehabilitation receiver, board or body, for corporations, partnerships or associations under receivership. Actions on money claims shall not include actions which involve questions of title to or ownership or real property."
