congress_website_title = "AN ACT DECLARING A MORATORIUM ON PRODUCTION, MANUFACTURING AND IMPORTATION OF NON-BIODEGRADAB LE PLASTIC BAGS, PLASTIC WRAPPINGS AND PLASTIC SHEETS FOR PACKAGING OF ANY CONSUMER PRODUCTS FOR COMMERCIAL DISTRIBUTION AND SALE FOR AT LEAST TEN (10) YEARS TO A MAXIMUM OF TWENTY-FIVE (25) YEARS UPON APPROVAL OF THIS BILL TO ENABLE THE COUNTRY TO CLEAN UP AND REHABILITATE ITS ENVIRONMENT AND NATURAL RESOURCES AND TO IMPLEMENT PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Rationale: The indiscriminate and careless dumping of trash and other waste materials like plastics pollute our water and cause damage to our environment to the detriment of our natural resources and the majority of the Filipino people. Prescribes corresponding penalties for vioaltion of this Act, whether the violation be an alien, an individual, a corporation or as vessel used to transporting the prohibited terms."

