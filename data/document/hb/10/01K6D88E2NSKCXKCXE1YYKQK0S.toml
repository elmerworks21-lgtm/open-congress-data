congress_website_title = "AN ACT CREATING AN ADVANCED STUDIES DEVELOPMENT PROGRAM FOR EXCEPTIONAL EMPLOYEES FROM THE GOVERNMENT AND THE PRIVATE SECTOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Pensionado Act of 1995\" Seeks the creation of a \"critical mass of elite professionals who shall take the lead in harnessing science, technology and related disciplines\" to accelerate the productivity of the country's human resources. Envisions theestablishment of a program for exceptionally able and highly motivated employees, preferably age 30-40, who shall undertake advanced studies in a branch of science, technology or related fields of learning."

