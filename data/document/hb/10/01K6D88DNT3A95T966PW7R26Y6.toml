congress_website_title = "AN ACT AMENDING SECTION 77 OF BATAS PAMBANSA BLG. 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to provide stricter rules for substitution of candidates in case of death, disqualificatio n or withdrawal. Further enhances the meaningful participation of political parties and independent candidates in the electoral process. Allows the spouse or nearest relative of a DECEASED independent candidate to file his certificate of candidacy for the officer concerned."
