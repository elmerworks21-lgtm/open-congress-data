congress_website_title = "AN ACT PROHIBITING METROPOLITAN TRIAL COURTS, MUNICIPAL TRIAL COURTS, MUNICIPAL CIRCUIT TRIAL COURTS AND REGIONAL TRIAL COURTS FROM TAKING COGNIZANCE OF AND DECIDING INCLUSION AND EXCLUSION CASES WITHIN SIXTY (60) DAYS BEFORE ELECTION DAY, AMENDINGFOR THE PURPOSE REPUBLIC ACT 8189"
congress_website_abstract = "Rationale: Despite the admonition by the Honorable Supreme Court to some lower court judges, experiences and records of the Commission on Elections showed that inclusion and exclusion cases have been decided involving not only hundreds and thousandsof voters but also that the decisions were rendered even on election day. The judiciary was, in effect, utilized as a political tool of unscrupulous politicans. Mandates the following ---\" SECTION 3. The decision or roder of the courts in inclusionor exclusion cases received by the Board of Election Inspectors or the Election Officer within the prohibited period of sixty (60) days before elction day shall be null and void. The Election Officer of the City or Municipality affected and the Boarrd of Election Inspectors of the precinct concerned shall not implement the said court decision or order.\" \"SECTION 4. Violation of this Act shall constitute an election offense punsihable udner the Omnibus Election Code (BP 881) as amended by R.A. 8"

