congress_website_title = "AN ACT ALLOWING ALL GOVERNMENT FINANCIAL INSTITUTIONS INVOLVED IN THE LOW-COST HOUSING PROGRAM OF THE GOVERNMENT TO GRANT CONDONATIONS OF LOAN ARREARAGES IN THEIR HOUSING LOANS"
congress_website_abstract = "Provides for the following: \"SECTION 1. All unpaid penalties and surcharges on housing loans from any of the government financial institutions, including the National Home Mortgage and Finance Corporation, are hereby condoned; Provided that all thepast due amortizations due and demandable are paid within two years after the effectivity off this Act; Provided Further, that in the event that the borrowers are able to pay only a part of their past due amortizations due and demandable, only the penalties and surcharges corresponding to the portion that has been paid shall be condoned; and Provided Finally that the borrower has not availed of any previous program of condoning granted by these Government Financial Institutions."
