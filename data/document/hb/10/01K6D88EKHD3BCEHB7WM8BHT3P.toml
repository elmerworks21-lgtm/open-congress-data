congress_website_title = "AN ACT TO AMEND SECTION THIRTY-FIVE HUNDRED AND THIRTEEN OF THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The Tariff and Customs Code of the Philippines provides that a cash reward be given to a person who is instrumental in the discovery and seizure of smuggled goods even if such informer is a government official or employee. However, the system has opened the door to government officials and employees who use their positions to entrap violators and them claim for such reward. the reward should only be given if the informer is a private individual and not a government official or employee, who are in fact under obligation to eprform the act of being the subject of a reward. Provides, therefore for the following --- :Sec. 3513. Reward to persons instrumental in the Discovery and Seizure of Smuggled Goods.- The provisions of generaland special laws to the contrary notwithstanding , a cash reward equivalent to [twenty] FIFTEEN per centum [20] 15 of the fair market value of the smuggled and confiscated goods shall be given to the [officers and men and] informers who are isntrume"

