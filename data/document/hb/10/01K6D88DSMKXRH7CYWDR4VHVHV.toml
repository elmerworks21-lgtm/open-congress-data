congress_website_title = "AN ACT PROVIDING SPECIAL FEES FOR SPECIAL NUMBER PLATES OF MOTOR VEHICLES"
congress_website_abstract = "Authorizes the Land Transportation Office to charge the following fees for special number plates of motor vehicles: (1) Six thousand (P6,000.00) pesos for number plates with three identical numbers; (2) Eight thousand (P8,000.00) pesos for number plates with three \"8\"'s; and (3) Ten thousand (P10,000.00) pesos for number plates with letters and/or numbers specifically requested by the owner of the motor vehicle to which they are to be attached."

