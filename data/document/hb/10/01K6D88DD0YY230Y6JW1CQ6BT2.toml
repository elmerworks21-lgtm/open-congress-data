congress_website_title = "AN ACT PROHIBITING THE REGISTRATION AND OPERATION OF RIGHT-HAND DRIVE MOTOR VEHICLES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Prohibits the registration and use of right hand drive vehicles in the country, thereby directing the Land Transportation Office (LTO) not to register motor vehicles whose steering wheels are found on its right side. Allows, however, importation provided that conversion kits are included in the units to be imported with the intention to convert them to left hand drive as evidenced by the availability of a conversion kit. * * *"
