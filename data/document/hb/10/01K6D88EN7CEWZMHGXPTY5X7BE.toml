congress_website_title = "AN ACT PROVIDING THAT A SUBJECT ON ILLEGAL DRUGS BE INCORPORATED IN THE SCHOOL CURRICULA IN ALL PUBLIC AND PRIVATE SCHOOLS"
congress_website_abstract = "Rationale: Making our youth aware of the consequences of illegal drugs in one's life will minimize drug abuse and the incidence of drug-related crimes. With the enactment of this bill, the young generation could be made aware that many homes and precious lives have been destroyed becuase of the proliferation of drug addiction in the country. It is through education that our government will be able to solve the drug problem in our country. In view thereof, approval of this bill is highly recommended. Mandates the following --- \"SECTION 1. A subject on illegal drugs, its effects on the person and society, shall be incorporated in the school curricula in all public and private, elementary, secondary and tertiary schools."

