congress_website_title = "AN ACT TO PROMOTE COMPREHENSIVE RURAL DEVELOPMENT THROUGH THE IMPROVEMENT OF INFRASTRUCTURE, PROCESSING AND DELIVERY SYSTEMS, CREATING THE NATIONAL POSTHARVEST COUNCIL TO COORDINATE, CONSOLIDATE AND DIRECT ALL GOVERNMENT ACTIVITIES INVOLVING POSTHARVEST, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Postharvest Development Act\" Covers all government and private individuals and entities involved in postharvest activities in order to promote efficiency in handling, distributing and marketing food. Focuses on: (1) grain; (2) fruits and vegetables; (3) livestock products; (4) fish products, etc."

