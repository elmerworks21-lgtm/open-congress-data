congress_website_title = "AN ACT AMENDING ARTICLE 125 OF ACT NO. 3815, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "States that --- \"Article 125. Delay in the delivery of detained persons to the proper judicial authorities - the penalties provided in the next preceding article shall be imposed upon the public officer or employee who shall detain any person forsome legal ground and shall fail to deliver such person to the proper judicial authorities within the period of 120 HOURS FOR HEINOUS CRIMES, 96 HOURS FOR CRIMES PUNISHABLE BY RECLUSION PERPETUA, 72 HOURS FOR CRIMES PUNISHABLE BY RECLUSION TEMPORAL,48 HOURS FOR CRIMES PUNISHABLE BY PRISION MAYOR AND 36 HOURS FOR CRIMES PUNISHABLE BY PRISION CORRECCIONAL AND BELOW."

