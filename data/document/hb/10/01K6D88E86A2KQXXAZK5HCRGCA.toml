congress_website_title = "AN ACT PENALIZING THE LAUNDERING OF MONETARY INSTRUMENTS, AUTHORIZING THE EXAMINATION OF BANK RECORDS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Money Laundering Control Act of 1996\" Defines clearly what \"LAUNDERING OF MONETARY INSTRUMENTS\" means. States that the bank accounts or records of a person suspended of or charged with laundering monetary instruments may be investigated by the Ombudsman, the Secretary of Justice and Secretary of Finance."

