congress_website_title = "AN ACT TO REGULATE REAL ESTATE VALUES AND PRACTICES, CREATING FOR THE PURPOSE THE REAL ESTATE COMMISSION, PRESCRIBING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Real Estate Commission Act of 1997\" Declares it the policy of the State to safeguard public interest against unjustified or unreasonable increase in the prices of real estates, and in the interest of fair play, to regulate practices involving realestate business. Seeks to create the REAL ESTATE COMMISSION which shall be the SOLE estate regulating agency of the government. It shall cover both public and private real estates."

