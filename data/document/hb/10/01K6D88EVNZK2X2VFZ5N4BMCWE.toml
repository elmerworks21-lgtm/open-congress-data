congress_website_title = "AN ACT PENALIZING GOVERNMENT OFFICIALS AND EMPLOYEES WHO ARE NEGLIGENT OF THEIR JOBS IN PROTECTING FILIPINO MIGRANT WORKERS, AMENDING FOR THIS PURPOSE SECTION 23 AND SECTION 28 OF REPUBLIC ACT NO. 8042, OTHERWISE KNOWN AS THE 'MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF 1995'"
congress_website_abstract = "Penalizes these erring government officials and employees with a fine NOT EXCEEDING THE EQUIVALENT OF ONE (1) YEAR'S SALARY, or removal from office, or imprisonment of not more than five (5) years. Applies, likewise, to concerned Philippine government personnel abroad."

