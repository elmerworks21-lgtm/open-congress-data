congress_website_title = "AN ACT GRANTING INCENTIVES TO HIGHLY SKILLED FORMER FILIPINO CITIZENS AND ALIENS, ESTABLISHING A COORDINATING COUNCIL AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Although there have been numerous legislation and statutes that seek to lure foreign investment and tourism to the country by way of granting certain privileges to foreign investors, there is yet to be a law that would address the need toattract the infusion into the country of highly specialized skills, knowledge and expertise that are in the possession of former Filipino citizens and aliens who desire to make the Philippines their home. \"Skilled Aliens Citizenship Act of 1997\" Proposes the grant the following incentives and privileges to individuals qualified as highly skilled former Filipino citizen or highly skilled alien: (1) admission as quota immigrant; (2) re-acquisition or acquisition of Filipino citizenship; (3) emplooyment permits; and (4) tax incentives. Creates a COORDINATING COUNCIL for this purpose."

