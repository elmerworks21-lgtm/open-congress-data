congress_website_title = "AN ACT REQUIRING COURTS AND QUASI-JUDICIAL BODIES TO FURNISH WORKERS AN ADVISORY OF ENTITIES PROVIDING FREE LEGAL SERVICES IN CASES INVOLVING EMPLOYMENT RELATIONS"
congress_website_abstract = "Declares the following --- \"SECTION 2. Notwithstanding any law to the contrary, courts and quasi-judicial bodies are required, at the institution of the complaint, appeal or toehr initiatory pleading or petition by or against the worker, to furnishsuch worker an advisory of entities providing free legal services in cases arising from, or in connection with employment relations.\""

