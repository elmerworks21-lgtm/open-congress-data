congress_website_title = "AN ACT BANNING THE MANUFACTURE OF PLASTIC BAGS. PROVIDING PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The indiscriminate and wanton disposal of plastic bags and other plastic materials has resulted in clogged sewers, rivers and drainage systems in Metro Manila and in other urban centers in the country. Plastics are non-biodegradal e and are thus not capable of being decomposed into benign and harmless elements under the action of normal environmental faces. For a long, long time, these discarded plastics will pose great hazards to public health and welfare. Declares the following --- \"SEC. 3. Penalty . - Any person found guilty of violating any provision of this Act shall be imposed the penalty of prision correccional in its maximum period and a fine of not less than ONE HUNDRED THOUSAND PESOS (P100,000.00): Provided, however,that if the offender is a juridical entity, the penalty and fine hereinabove provided shall be imposed upon the chief executive officer, President or general manager found primarily responsible for the violation.\""

