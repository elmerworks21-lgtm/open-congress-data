congress_website_title = "AN ACT AMENDING THE REVISED PHILIPPINE MEDICAL CARE ACT (P.D. NO. 1519) SO AS TO INCLUDE INDIGENTS, AS CERTIFIED BY THE DEPARTMENT OF SOCIAL WELFARE AND DEVELOPMENT, IN THE COVERAGE OF MEDICAL CARE BENEFITS"
congress_website_abstract = "Defines \"INDIGENT\" as a person certified by the DSWD as needy and poor, or one who has not sufficient property to furnish a living nor anyone able to support him to whom he is entitled to look for support. Proposes the following --- \"SEC. 15 ENTITLEMENT TO MEDICAL CARE BENEFITS, A MEMBER WHO SHALL HAVE PAID AT LEAST THREE MONTHLY CONTRIBUTIONS DURING THE LAST TWELVE MONTHS PRIOR TO THE FIRST DAY OF THE SINGLE PERIOD OF CONFINEMENT, AS WELL AS HIS LEGAL DEPENDENTS, SHALL BE ENTITLED TO MEDICAL CARE BENEFITS: PROVIDED, THAT WHEN WE COMMITS ANY VIOLATION OF THIS LAW OR ITS RULES AND REGULATIONS, HE AND HIS LEGAL DEPENDENTS SHALL NOT BE ALLOWED TO AVAIL OF THESE BENEFITS BY THE COMMISSION SUBJECT TO SECTON 6(K) HEREOF. THE MEMBER SHALL CONTINNUE TO PAY HIS CONTRIBUTION DURING THE PERIOD OF SUSPENSION OF AVAILMENT OF BENEFITS: PROVIDED, FURTHER, THAT AN INDIGENT AS DEFINED HEREIN, SHALL BE ENTITLED TO THE BENEFITS PROVIDED FOR IN THIS ACT.\""

