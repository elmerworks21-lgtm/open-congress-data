congress_website_title = "AN ACT PROVIDING FOR A MANDATORY PROFIT SHARING CLAUSE IN EVERY COLLECTIVE BARGAINING AGREEMENT AND REQUIRING THE EMPLOYER TO ALLOW INSPECTION OF HIS BUSINESS BOOK FOR THIS PURPOSE, AMENDING THEREBY ARTICLE 252 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Provides for a mandatory profit sharing clause in every collective bargaining agreement and allows the CBA representative access to the business records of the employer to ensure further the right of labor to the just share in the fruits and production of any business."
