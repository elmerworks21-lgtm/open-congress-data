congress_website_title = "AN ACT REQUIRING THE MEMBERSHIP OF A STUDENT REPRESENTATIVE IN THE BOARD OF TRUSTEES IN ALL PRIVATE EDUCATIONAL INSTITUTIONS"
congress_website_abstract = "States that the student representative shall be entitled to all the privileges, duties and obligation of a regular members with full voting rights. Defines such terms as \"BOARD OF TRUSTEES\", \"STUDENT REPRESENTATIVE\" and \"PRIVATE EDUCATIONAL INSTITUTIONS.\""
