congress_website_title = "AN ACT REQUIRING THE WEATHER BUREAU, THE PAGASA, PHILVOCS AND OTHER GOVERNMENT AGENCIES CONCERNED TO RELEASE EVERY THIRTY (30) MINUTES, THE PROGRESS, DIRECTION AND STATUS OF STORMS AND TYPHOONS, OTHER WEATHER DISTURBANCES AND NATURAL CALAMITIES THATHIT OR THREATENS TO HIT THE PHILIPPINE AREA OF RESPONSIBILITY, TO ALL RADIO AND TV STATIONS AND OTHER COMMUNICATIONS NETWORK WHICH ARE HEREBY REQUIRED TO GIVE WIDE PUBLICITY AND CONTINUING PUBLIC ANNOUNCEMENT THEREOF, EVERY THIRTY (30) MINUTES, FREEOF CHARGE PROVIDING PENALTIES FOR NON-COMPLIANCE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Penalkizes the noncompliance with the provisions of this Act with suspension of the rights and privileges of the radio and TV stations under their franchise for three (3) to six (6) months, and a P500,000.00 to P300,000.00 fine."

