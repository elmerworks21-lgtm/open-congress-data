congress_website_title = "AN ACT REPEALING BATAS PAMBANSA BLG. 22 AND FOR OTHER PURPOSES"
congress_website_abstract = "Repeals, in toto, Batas Pambansa Blg. 22, otherwise known as \"An Act Penalizing the Mking or Drawing and Issuance of a Check Without Sufficient Funds for Credit and for other purposes.\" Is based on the observation that BP Blg. 22 has not been an effective deterrent to the nefarious practice of issuing bouncing checks.\""
