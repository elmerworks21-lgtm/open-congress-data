congress_website_title = "AN ACT PROMULGATING THE RULES AND REGULATIONS GOVERNING THE ACQUISITION, OWNERSHIP, POSSESSION AND CARRYING OF FIREARMS OUTSIDE OF RESIDENCE, SANCTIONS AND PENALTIES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Firearms Regulation Act of 1995\" Seeks to provide fullest protection to the life, liberty and property of citizens and to guarantee the full respect for human rights. Allows a qualified citizen to own more than two (2) firearms, but not to carry atone time more than one (1) firearms and carrying these outside of residence."

