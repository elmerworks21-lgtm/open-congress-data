congress_website_title = "AN ACT TO PROMOTE THE DEVELOPMENT OF THE FARMERS IN THE BURLEY AND NATIVE TOBACCO-PRODUCI NG PROVINCES, PROVIDING FOR THE AUTOMATIC APPROPRIATION OF THE FUNDS THEREIN AND FOR OTHER PURPOSES"
congress_website_abstract = "Recognizes active participation of tobacco farmers in the generation of revenues for the government through excise taxes from cigars and cigarettes. Seeks, therefore, to uplift these farmers from their present economic bondage, enhance their productivity and market potential, and accord them the much-needed opportunity for advancement and self-reliance."
