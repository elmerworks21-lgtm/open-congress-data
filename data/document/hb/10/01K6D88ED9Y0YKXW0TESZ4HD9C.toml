congress_website_title = "AN ACT CREATING AN ECOLOGY TRUST FUND FOR THE REHABILITATION OF OUR ENVIRONMENT AND HAZARDOUS WASTE SITES,FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: \"Our government has established programs and projects towards a clean environment, but the budget for this purpose is always not sufficient.\" Mandates all corporations, partnerships and individuals engaged in mine exploration and/or logging activities to CONTRIBUTE for the Fund. The rehabilitation of imbalanced environment and hazardous waste sites shall be made in accordance with the recommendation of the Environment Management Bureau."

