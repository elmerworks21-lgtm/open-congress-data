congress_website_title = "AN ACT INCREASING THE INSURANCE COVERAGE FOR THIRD PARTY LIABILITY OF PRIVATE CAR AND OTHER VEHICLE OWNERS AMENDING FOR THE PURPOSE SECTION 377 PARAGRAPH 2 OF THE NEW INSURANCE CODE"
congress_website_abstract = "Rationale: Insurance coverage lessens the heavy burden suffered by vehicles owners for their liabilities in case of death or injury caused to third parties. In addition, it will provide a fast and ready relief to injured third parties or to their relatives. Proposes the following scheme of insurance coverage for third party liability of private car/other vehicle owners: (1) Private Cars (a) Bantam: [Twenty thousand Pesos] THIRTY THOUSAND PESOS: (b) Light: [Twenty Thousand Pesos] THIRTY THOUSANDPESOS; (C) Heavy: [Thirty Thousand Pesos] FORTY THOUSAND PESOS; (2) Other Private Vehicles (a) Tricycle, Motorcycles and Scooters: [Twelve Thousand Pesos] FIFTEEN THOUSAND PESOS; (b) Vehicles with an unladen weight of 2,600 kilos or less: [Twenty Thhousand Pesos] THIRTY THOUSAND PESOS; (c) Vehicle with an unladen weight of between 2,601 kilos and 3,939 kilos: [Thirty Thousand Pesos] FORTY THOUSAND PESOS; (d) Vehicle with an unladen weight over 3,930 kilos: Fifty Thousand Pesos."

