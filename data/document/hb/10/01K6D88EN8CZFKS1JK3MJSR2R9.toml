congress_website_title = "AN ACT SUBJECTING THE INTELLIGENCE FUND OF LOCAL GOVERNMENT UNITS TO AN AUDIT BY THE COMMISSION ON AUDIT"
congress_website_abstract = "Rationale: While the Provincial Governors, City and Municipal Mayors enjoy the luxury and the special privilege of spending government funds or the so called \"Intelligence Fund\" at will without the necessity of subjecting it to COA Audit, it is alsolamentable that the use of such fund has been abused to the detriment of the taxpayer. It has come to a point where these officials used the money to advance their political edge over their opponent, thereby making the political playing field uneven. Mandates this provision --- \"SECTION 1. Disbursements of Intelligence Funds by Local Government Units shall be made only in accordance with existing budgeting, accounting and auditing rules and regulations.\""

