congress_website_title = "AN ACT AWARDING TO VICTIMS OF CRIMES DEPICTED IN A MOVIE, BOOK, NEWSPAPER, MAGAZINE, RADIO, OR TELEVISION PRODUCTION, OR LIVE ENTERTAINMENT, OF ANY KIND, OR ANY OTHER FORM OF COMMERCIAL EXHIBITION, PART OF THE PROCEEDS DUE TO THE CRIMINAL WHOSE STORY OF THE COMMISSION OF A CRIME OR CRIMES IS DEPICTED IN SAID EXHIBITION"
congress_website_abstract = "Seeks to award VICTIMS of crime seventy (70%) percent of the proceeds from any contract relating to the depiction of a crime in a movie, book, newspaper, magazine, radio or television production, or live entertainment, of any kind, or and other formof commercial exhibition of a criminal's story. Deputizes an appopriate agency to determine thr rightful claimants, facilitate and ensure the awarding of the proceeds."

