congress_website_title = "AN ACT TO DECLARE ALL DISPOSABLE LANDS OF THE GOVERNMENT WHICH HAVE REMAINED IDLE AND SUITABLE FOR RESIDENTIAL PURPOSE SHALL BE DEVELOPED INTO SOCIALIZED HOUSING SITE FOR LOW-SALARIED GOVERNMENT AND PRIVATE EMPLOYEES AND ALSO SQUATTERS"
congress_website_abstract = "Directs the National Housing Authority to conduct a survey of idle government lands in coordination with the DENR, afterwhich it shall publish the areas for socialized housing projects and thereafter allocate the lands to qualified applicants."

