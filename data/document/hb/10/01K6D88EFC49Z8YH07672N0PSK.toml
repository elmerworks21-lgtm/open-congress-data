congress_website_title = "AN ACT CREATING THE OFFICE OF GOVERNMENT MONITORING AND DATA CENTER, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates the proposed Office to: (a) promote efficiency and effectiveness in the delivery of basic services to the people. (b) Maintain as integrated human resource system characterized by independence, objectivity and integrity in order to enhanceresponsiveness to the requirements of an effective bureaucracy. (c) Promote and develop a reliable data system and personnel movement that will give support to the needs of the an efficient civil service and an accurate guide to the Department of Budget and Management, so that the decision making process will be made relative easier. >Prescribes the powers and functions of the Office."

