congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF COMMONWEALTH ACT NUMBERED THREE HUNDRED AND EIGHTY-TWO ENTITLED 'AN ACT TO ADOPT THE ORIGINAL AUTHENTIC FORM OF THE PHILIPPINE NATIONAL ANTHEM AND TO APPROPRIATE FUNDS FOR ITS PRINTING AND FREE DISTRIBUTION', AS AMENDED BY COMMONWEALTH ACT NUMBERED SIX HUNDRED AND THIRTY-FOUR"
