congress_website_title = "AN ACT DIRECTING THE PHILIPPINE OVERSEAS EMPLOYMENT ADMINISTRATION (POEA) TO CONDUCT EDUCATIONAL CAMPAIGNS ON AIDS FOR DEPARTING OVERSEAS CONTRACT WORKERS SO AS TO SECURE THEIR HEALTH AND TO MINIMIZE THE SPREAD OF THE AIDS EPIDEMIC IN THE COUNTRY"
congress_website_abstract = "Provides for the conduct of anti-AIDS campaigns with features such as: (1) Preparing AIDS Orientation Programs; (2) Conducting Pre-deployment Seminars on the AIDS Epidemic and (3) Distributing Pamphlets about AIDS."
