congress_website_title = "AN ACT FURTHER AMENDING PRESIDENTIAL DECREE NUMBERED SEVEN HUNDRED AND SIXTY, AS AMENDED BY CONTINUING THE BAREBOAT CHARTERING PROGRAM AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: \"The present measure is in recognition of the growing need to accelerate the expansion and modernization of the shipping industry. It proposes a continuing bareboat chartering program that would guarantee foreign exchange earnings for the country, enhance maritime employment, provide sufficient financial resources to acquire new tonnage to replace unecconomic and over-aged fleet and provide for a system of registry that is not too dependent on time-bound provisions but more focusedon long-term development of the industry as well as training of seamen and related professions\""

