congress_website_title = "AN ACT PROVIDING FOR COMPREHENSIVE CONSERVATION, PROTECTION, UTILIZATION, DEVELOPMENT AND MANAGEMENT OF THE PHILIPPINE EXCLUSIVE ECONOMIC ZONE (EEZ)"
congress_website_abstract = "\"The Philippine Exclusive Economic Zone Act of 1995\" Provides that the exclusive economic zone shall extend to a distance of two hundred (200) nautical miles from the baselines from which the breadth of the territorial sea is measured. Reserves theexclusive use and enjoyment of the marine resources therein to the Filipinos. Institutionaliz es plans and programs for conservation and management of resources of the patrimonial sea."

