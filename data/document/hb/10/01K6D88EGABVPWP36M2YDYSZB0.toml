congress_website_title = "AN ACT PROVIDING FOR COMMUNITY-BASED FOREST MANAGEMENT AND ITS IMPLEMENTING MECHANISM"
congress_website_abstract = "Rationale: This bill seeks to put more impetus to the adoption of a rational national forest management policy that is geared towards giving upland communities and indigenous peoples management, rehabilitation, protection, enhancement and utilization of forest resources in a sustainable, well-planned and effecttive manner. Includes these vital provisions: (1) The creation of a CBFM Steering Committee tasked to prepare a national action plan and the policies, guidelines and strategies to implement such plan particularly such mechanisms for community and local government participation; (2) The creation of a CBFM Special Account to suport the implementation for the CBFM Action Plan; and (3) The institutionaliz ation of a training support assiistance program for participants in the CBFM."

