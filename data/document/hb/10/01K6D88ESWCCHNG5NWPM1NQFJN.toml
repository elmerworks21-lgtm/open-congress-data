congress_website_title = "AN ACT AMENDING SECTION 30-H OF REPUBLIC ACT NO. 6975, OTHERWISE KNOWN AS THE DEPARTMENT OF INTERIOR AND LOCAL GOVERNMENT (DILG) ACT OF 1990"
congress_website_abstract = "Rationale: Experience and observations have shown that littel men can do or can even surpass what bigger men can do in the police or military service. Police and military veterans can attest to the outstanding achievements of little men in war and in the fight against lawless elements. What counts is the physcial and mental fitness of the policemen or soldier and not his height. > Proposes the following amendment to Section 30 - h of RA 6975, the DILG Act: \"SEC. 30 - h. Must be at least one meter and sixty-two centimeters (1.62 m.) in height for male and one meter and fifty-seven centimeters for female. EXEMPTION IS, HOWEVER, GIVEN TO MEMBERS OF THE CULTURAL COMMUNITIES WHO MUST BE AT LEAST ONE METER AND FIFTY-SEVEN CENTIMETERS (1.57 M.)FOR MALE AND ONE METER AND FIFTY-TWO (1.52 M.) FOR FEMALE.\""

