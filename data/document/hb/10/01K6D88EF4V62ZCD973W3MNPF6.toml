congress_website_title = "AN ACT CREATING A DEPARTMENT OF MARITIME AFFAIRS, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Department of Maritime Affairs Act\" Rationale: However, to date the Philippine Marchant Marine, both domestic and international, is in a sad and sorry state. A very low priortiy has been given for maritime development by past administation and ourmaritime potential has never been dully exploited. There is therefore the most urgent need for the government to immediately focus on the growth and development requirements of our Maritime Industry in view of the great significance of the industry to total national development efforts and those requirements can only be effectively addressed by the establishment of a Department of Maritime Affairs."

