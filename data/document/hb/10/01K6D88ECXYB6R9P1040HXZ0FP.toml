congress_website_title = "AN ACT EXPANDING THE POWERS AND FUNCTIONS OF THE COMMISSION ON THE SETTLEMENT OF LAND PROBLEMS AND TRANSFERRING IT TO THE OFFICE OF THE PRESIDENT, AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF EXECUTIVE ORDER NO. 561 AND EXECUTIVE ORDER NO. 292"
congress_website_abstract = "Declares that the COMMISSION ON THE SETTLEMENT OF LAND PROBLEMS (COSLAP) shall have ORIGINAL jurisdiction to decide the following cases: (1) PETITIONS FOR THE CANCELLATION OF LAND TITLES OBTAINED EITHER BY JUDICIAL OR ADMINISTRATIVE PROCEEDINGS THROUGH FRAUD, DECEIT, MISTAKE, OVERSIGHT OR ACQUIRED THROUGH OTHER ILLEGAL, ERRONEOUS AND CORRUPT PRACTICES; (2) PETITIONS FOR THE SETTLEMENT OF BOUNDARY DISPUTES BETWEEN BARANGAYS, MUNICIPALITIES, CITIES AND PROVINCES; (3) CASES INVOLVING OWNERSHIP ORPOSSESSIONS OF PRIVATE LANDS NOT COVERED BY REPUBLIC ACT NO.6657 AND RELATED LAWS BETWEEN LANDOWNERS AND OCCUPANTS OR SQUATTERS; (4) CASES FOR CORRECTION OF ERRONEOUSLY APPROVED PRIVATE OR CADASTRAL SURVEYS; (5) LAND REGISTRATION CASES; AND (6) LANDPROBLEMS OR DISPUTES INVOLVING PUBLIC LANDS BETWEEN OCCUPANTS OR SQUATTERS AND AWARDEES OF LEASE AGREEMENTS, CONCESSIONS, PERMITS, LICENSES AND OTHER SIMILAR PRIVILEGES."

