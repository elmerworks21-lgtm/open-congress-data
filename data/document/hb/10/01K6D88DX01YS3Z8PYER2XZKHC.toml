congress_website_title = "AN ACT INCREASING THE AMOUNT OF MEDICAL CARE EXPENSES AUTHORIZED TO BE INCURRED BY PUNONG BARANGAYS, AMENDING FOR THE PURPOSE SECTION 393 OF THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "States that in case of emergency where there is no available government hospital or institution, the PUNONG BARANGAY may submit himself for immediate medical attendance to the nearest private hospital or institution and may incur expenses to a maximum of TEN THOUSAND (P10,000.00) PESOS chargeable against the barangay funds."

