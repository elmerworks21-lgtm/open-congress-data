congress_website_title = "AN ACT PROVIDING FOR THE TEACHING OF ECOLOGY IN ALL ELEMENTARY AND SECONDARY LEVELS, WHETHER PUBLIC OR PRIVATE, OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "Includes the teaching of ecology in all elementary and high school levels. Is intended to promote environmental consciousness and vigilance which is a conditiosine qua non to a holistic education required under the New Constitution. Directs the Secretary of DECS to issue the necessary reading materials dealing with the subject in relation to the pressing environmental issues in the country."

