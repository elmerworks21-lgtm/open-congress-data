congress_website_title = "AN ACT PROHIBITING THE SALE OR DISPOSITION, EXCEPT UPON THE APPROVAL OF THE GOVERNMENT, OF FILIPINO ANTIQUE ARTICLES AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Defines \"ANTIQUE\" as used in this Act to mean a work of art, price of furniture or decorative object made on crafted at a much earlier period, at least more than 50 years old. Declares that all antique articles acquired by the goernment from any person, business entity or corporation, shall be documented by the National Historical Institute and shall be deposited in the National Museum for exhibit or display. Penalizes violation of this Act."

