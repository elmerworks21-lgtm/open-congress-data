congress_website_title = "AN ACT CREATING THE LOCAL GOVERNMENT EMPLOYEES' WELFARE FUND, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to provide for the immediate needs and general well-being of the local government employees; applies to all local government employees, regular, contractual or temporary, who has been employed by the same office for the past six (6) months prior to application. Entitles qualified applicants of these benefits and incentives: (1) hospitalization loan; (2) funeral loan; (3) educational loan; (4) house improvement loan; (5) salary loan; (6) appliance acquisition loan; (7) rice and sugar loan;and (8) other benefits."

