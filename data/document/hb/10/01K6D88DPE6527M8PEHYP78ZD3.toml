congress_website_title = "AN ACT INCREASING THE PENALTY ON THE DEMAND FOR DEPOSITS OR ADVANCE PAYMENT FOR CONFINEMENT OR TREATMENT OF PATIENTS IN HOSPITALS OR MEDICAL CLINICS AND PROHIBITING THE REFUSAL BY HOSPITALS AND MEDICAL CLINICS TO DISCHARGE PATIENTS FOR INABILITY TOSETTLE HOSPITAL ACCOUNT, AMENDING FOR THE PURPOSE BATAS PAMBANSA BILANG PITONG DAAN AT DALAWA, ENTITLED 'AN ACT PROHIBITING THE DEMAND OF DEPOSITS OR ADVANCE PAYMENTS FOR THE CONFINEMENT OR TREATMENT OF PATIENTS IN HOSPITALS AND MEDICAL CLINICS IN CERTAIN CASES"
congress_website_abstract = "Prohibits the REFUSAL by hospitals and medical clinics to discharge patients who are unable to pay hospital bills and icnreases the penalty for those who violate the same by a fine of not less than P20,000.00, but not more than P50,000.00 or imprisonment for not less than six months but not more than one year."
