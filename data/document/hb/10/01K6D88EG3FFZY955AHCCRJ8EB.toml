congress_website_title = "AN ACT ALLOCATING TWENTY-FIVE PERCENT (25%) OF THE INCREMENTAL REVENUE FROM THE DOCUMENTARY STAMP TAX FOR STREET CHILDREN, AMENDING FOR THE PURPOSE THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "Rationale: the most fundamental problem which confronts our society today is an alarming increase of street children. Latest statistics show that one out of every six Filipino chidlren in big cities belong to the category of street children. Approximately 75,000 of these street children are found in Metro Manila and an estimate of 1.2 million are scattered in the metropolitan areas of the country."

