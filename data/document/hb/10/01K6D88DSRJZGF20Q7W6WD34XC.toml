congress_website_title = "AN ACT AMENDING CERTAIN ADMINISTRATIVE PROVISIONS OF THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES, AS AMENDED, TO STRENGTHEN CUSTOMS ADMINISTRATION"
congress_website_abstract = "Declares that the dutiable value of an imported article subject to ad valorem rate of duty shall be based on the cost (fair market value) of the article. Defines clearly the functios of the Bureau of Customs; identifies those persons authorized to effect searches, seizures and arrests, etc. States that \"Nothing in this Code shall give authority to any employee, officer or agent of the AFP, national law enforcement agencies or any office other than the Customs Bureau to excercise any function pertaining to the importation of any article ... \""

