congress_website_abstract = "\"New Population Act of 1995\" Establishes a new population policy that will achieve an ultimate goal of improving the quality of life. Strengthens the Population Commission by reorganization and institutionaliz ation under the National Economic and Development authority (NEDA) which shall serve as its central policy-making body."
