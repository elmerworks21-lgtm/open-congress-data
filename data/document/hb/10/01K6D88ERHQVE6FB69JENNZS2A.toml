congress_website_title = "AN ACT REPEALING PRESIDENTIAL DECREE NO. 1853 AND FOR OTHER PURPOSES(RE: TAXES AND DUTIES COVERING IMPORTS)"
congress_website_abstract = "Declares that the POSTING OF DEPOSIT OF DUTIES at the time of opening letters of credits covering imports as provided for under PD No. 1853 IS NO LONGER REQUIRED. >The payment of duties and taxes shall be made upon the filing of an import entry andexmination and appraisal of the shipment as provided for under the Tariff and Customs Code of 1978, as amended."

