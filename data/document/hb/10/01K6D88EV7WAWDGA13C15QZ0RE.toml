congress_website_title = "AN ACT INSTITUTIONALIZ ING EMOTIONAL QUOTIENT ENHANCEMENT ACTIVITIES IN THE ELEMENTARY AND SECONDARY SCHOOLS CURRICULA AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Studies have confirmed that one's ability to cope with stress and to relate to his or her environment is more important than one's ability to process and absorb knowledge. Psychologists refer to the former as emotional quotient. The latter is what we commonly known as intelligence quotient. \"Emotional Quotient Enhancement Act\" Provides, therefore, for the following --- \"SEC. 2. The Department of Education, Culture and Sports (DECS) shall incorporate in the curricula of all public and private elementary and secondary schools nationwide, activities aimed at the enhancement of the emotional quotient of the pupils and students. SEC. 3. The Department of Science and Technology (DOST), in coordination with DECS, shall establish a staandard formula and set of activities for the purpose; Provided, that a school which may deem such standard to be insufficient may improve on the same, subject to the approval of the DECS."

