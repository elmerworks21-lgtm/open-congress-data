congress_website_title = "AN ACT PROHIBITING MEMBERS OF THE LAW ENFORCEMENT AND INVESTIGATIVE AGENCIES OF THE GOVERNMENT FROM RECEIVING DIRECTLY OR INDIRECTLY REWARD MONEY OFFERED FOR THE SOLUTION OF A CRIME, AND PROVIDING PENAL SANCTIONS THEREFOR"
congress_website_abstract = "Proposes that a REWARDS SYSTEM be set up and institutionaliz ed in all the law enforcement and investigative agencies involved in the investigation of any crime so as to ensure speedy prosecution. Imposes the fine of P50,000.00 and imprisonment of six (6) to 12 years with perpetual disqualificatio n from office for violation of this Act."

