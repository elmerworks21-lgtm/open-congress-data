congress_website_title = "AN ACT AMENDING SECTION 23, ARTICLE VIII OF REPUBLIC ACT NO. 7925, OTHERWISE KNOWN AS THE 'PUBLIC TELECOMMUNICATI ONS POLICY ACT OF THE PHILIPPINES"
congress_website_abstract = "Makes distinction as to the NATURE AND TYPE of the telecommunicati ons franchise in applying the equality clause stated in Sec. 23, Art VIII of R.A. No. 7925 - \"Public Telecommunicati ons Policy Act of the Philippines.\" Includes in the exemptions enumerated therein ANY TRANSFER OF CONTROLLING INTEREST, WHETHER BY TRANSFER OR SALE OF SHARES OF STOCK OR BY AN INCREASE IN CAPITALIZATION."
