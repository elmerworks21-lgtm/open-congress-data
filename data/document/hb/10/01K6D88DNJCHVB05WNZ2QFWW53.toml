congress_website_title = "AN ACT APPROPRIATING THE AMOUNT OF ONE MILLION PESOS (P1,000,000.00) FOR THE REPAIR, MAINTENANCE AND UPGRADING OF EQUIPMENT TO BE USED IN THE IMPLEMENTATION OF THE DEATH PENALTY"
