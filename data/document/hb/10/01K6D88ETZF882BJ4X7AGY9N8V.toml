congress_website_title = "AN ACT GRANTING A LUMP-SUM BENEFIT AND OTHER ASSISTANCE SERVICES TO SURVIVORS OF WORLD WAR II VETERANS WHO HAVE DIED PRIOR TO THE ENACTMENT OF REPUBLIC ACT NO. 6948, AS AMENDED"
congress_website_abstract = "Makes reference to RA No. 6948 which standardized and upgraded the benefits of WW II veterans and their dependents. Seeks to grant the following benefits and assistance services to the dependents of deceased WW II veterans: (1) a lump-sum benefit worth P30,000.00; (2) hospitalization , medical care and treatment at the Veterans Memorial Medical Center; and (4) a Philippine flag to honor the deceased veteran."

