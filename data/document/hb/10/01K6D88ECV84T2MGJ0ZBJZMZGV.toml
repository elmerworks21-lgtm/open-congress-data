congress_website_title = "AN ACT PROVIDING PROTECTION TO JOURNALISTS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Journalists' Protection Act of 1996\" Ensure that journalists shall be provided with a comprehensive benefits package at par with the current benefits enjoyed by those in the labor force. Contains provisions on --- (1) Duties, Obligations, Professional Conduct; (2) Hours of Work, Working conditions, Salaries and Remunerations; (3) Lease and Retirement Benefits; (4) Labor Organizations."

