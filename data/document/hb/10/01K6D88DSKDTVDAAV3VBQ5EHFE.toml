congress_website_title = "AN ACT PROVIDING GUIDELINES FOR THE SELECTION OF PARTICIPANTS IN THE PARLIAMENT OF YOUTH LEADERS, AMENDING FOR THE PURPOSE SECTION 13 OF REPUBLIC ACT NO. 8044"
congress_website_abstract = "Provides for the basis of composition and selection of participants in the Parliament of Youth Leaders, such as: (1) The incumbent president of the Pederasyon ng mga Sangguniang Kabataan; (2) The representatives from the student sector who shall beelected by the various student councils of all colleges and universities duly accredited by the DECS from among themselves under the supervision of DECS; (3) The representative from the out-of-school youth sector from among the nominees of the various District Coordinators; and (4) All delegates shall be able to read and write, of good moral character, has not been convicted of any crime involving moral turpitude and shall not be more years than 35 of age on the last day the Parliament will be hheld."

