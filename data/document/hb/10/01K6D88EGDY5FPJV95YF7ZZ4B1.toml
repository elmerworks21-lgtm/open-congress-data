congress_website_title = "AN ACT PROHIBITING THE CONSTRUCTION OF COMMERCIAL AND RESIDENTIAL STRUCTURES ABOVE OR BELOW RAODS, BRIDGES AND TRANSPORT SYSTEMS AS WELL AS STATIONS THEREOF"
congress_website_abstract = "Rationale:\"The Department of Transportation and Communication grappled with the different aspects of the traffic problem. One of these, as being manifested in the LRT-3 project and inviting so much attentionm, was the commercial angle, which involved the real estate significance of the LRT projects, like the airspace over the lines and the areas in and around the stations. These income-earners of mammoth potentials were planned to be leased out by the developers.\" Declares it UNLAWFUL for anyperson, corporation or netity to construct or allow the construction of commercial or residential structurees above or below roads, bridges and transport systems, as well as stations thereof."

