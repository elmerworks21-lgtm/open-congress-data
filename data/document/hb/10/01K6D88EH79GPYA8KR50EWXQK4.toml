congress_website_title = "AN ACT TO REGIONALIZE THE COLLECTION DISTRICTS OF THE BUREAU OF CUSTOMS"
congress_website_abstract = "Seeks to correct the grave injustice in the ranking of regional officials of the Bureau of Customs by amending some provisions of the Tariff and Customs Code of the Philippines, As Amended. Provides for the following --- \"SECTION 2. DISTRICT COLLECTOR AND DEPUTY COLLECTOR OF PRINCIPAL PORTS OF ENTRY MENTIONED IN THE TARIFF AND CUSOTMS CODE OF THE PHILIPPINES, AS AMENDED, SHALL BE RENAMED REGIONAL CUSTOMS DIRECTORS WITH A RANK OF DIRECTOR II AND REGIONAL CUSTOMS DEPUTY DIRECTOR WITH A RANK OF DIRECTOR I, RESPECTIVELY.\" \"SECTION 3. THE CURRENT SALARY RATE OF DIRECTOR II AT P172,200.00 PER ANNUM AND DIRECTOR I P157,000.00 PER ANNUM, ARE SUBJECT TO ADJUSTMENTS AS MAY BE AUTHORIZED BY LAW.\""

