congress_website_title = "AN ACT TO REVISE THE PHILIPPINE ENVIRONMENTAL CODE, DEFINING ITS SCOPE AND INTEGRATING ALL OTHER LAWS RELATIVE THERETO"
congress_website_abstract = "\"Revised Philippine Environmental code of 1995\" Includes the following provisions that have been forged in the recently concluded Earth Summit in Rio de Janairo participated in by the Philippines: 1) Environment Quality Management; 2) Natural Resources Management and Conservation; 3) Solid Waste Management; 4) Energy Development; 5) Environmental Impact Assessment System; 6) Establishment of an Environmental Fund; and 7) Miscellaneous Provisions for Implementing Agencies. * * *"
