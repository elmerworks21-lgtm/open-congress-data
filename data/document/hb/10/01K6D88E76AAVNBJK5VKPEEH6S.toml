congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION OF WOMEN AGAINST HABITUAL WIFE BEATING, AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Penalizes the person found guilty of habitual wife beating with imprisonment of not less than six (6) months, nor more than six (6) years. States the rights of the victim; provides for an inform,ation campaign to raise consciousness against the evils of wife beating."
