congress_website_title = "AN ACT RECLASSIFYING THE SYSTEM OF IRRIGATION FACILITIES OF THE NATIONAL IRRIGATION ADMINISTRATION AS INFRASTRUCTURE PROJECT; AND IN THE PROCESS ABSOLVING OUTSTANDING LOANS EXTENDED BY THE NATIONAL IRRIGATION ADMINISTRATION TO RICE FARMERS, BE IT INDIVIDUALS, ASSOCIATIONS, OR COMMUNITY-BASED ORGANIZATIONS"
congress_website_abstract = "Provides for the following --- \"SECTION 1. The loans facility extended by the National Irrigation Administration to rice farmers for the operation of irrigation facilities, whether granted to individuals or groups through irrigator's associations orcommunity-based organizations shall be considered as infrastructure investment of the State similar to roads, bridges and the like.\" \"SECTION 2. The use of irrigation facilities through the National Irrigation Administration shall therefore be freeof charge for maintenance, which the State has amply and regularly supported on annual appropriations. \" \"SECTION 3. The National Irrigation Adminsitration is mandated to update all its pertinent records prior to the implementation of this Act and coonsequently write-off the outstanding obligations of the farmers, principal and any interest accruing thereto, from its books of account.\""

