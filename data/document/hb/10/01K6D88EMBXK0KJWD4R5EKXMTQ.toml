congress_website_title = "AN ACT TO REGULATE THE PRACTICE OF PSYCHOLOGY, CREATING FOR THIS PURPOSE A PSYCHOLOGY BOARD, PROVIDING PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Shall govern (a) the supervision, control and regulation of the practice of psychology as a separate profession in the delivery of services of high quality; and (b) the licensure of psychologists and the certification of psychometrists. Sets a national standard for the practice of psychology; proposes the creation of a Board to oversee the practice of the profession."

