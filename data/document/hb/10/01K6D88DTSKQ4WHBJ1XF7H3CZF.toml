congress_website_title = "AN ACT UPGRADING THE LAW ON FIREARMS AND AMMUNITION AND REGULATING OWNERSHIP THEREFOR, PROVIDING AND/OR ADJUSTING PENALTIES FOR CERTAIN OFFENSES RELATIVE THERETO, AND FOR OTHER PURPOSES"
congress_website_abstract = "Updates the law on firearms and ammunition and regulating of ownership, as follows: (1) creation of one office within the Dept. of Interior and Local Government (DILG) which will take charge of the registration and licensing of firearms; (2) puttinginto a positive perspective firearms ownership, possession, carrying and emphasizes responsibility of owners."

