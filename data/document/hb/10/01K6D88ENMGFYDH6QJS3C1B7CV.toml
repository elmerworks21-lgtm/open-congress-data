congress_website_title = "AN ACT STRENGTHENING FURTHER THE SANCTIONS UNDER THE SOCIAL SECURITY LAW BY ORDERING THE CANCELLATION OF BUSINESS PERMITS OF CERTAIN COMPANIES NOT REMITTING SOCIAL SECURITY SYSTEM CONTRIBUTIONS, AMENDING FOR THIS PURPOSE SECTION 22 OF REPUBLIC ACTNO. 1161, AS AMENDED"
congress_website_abstract = "Declares the following --- \"SEC. 22. x x x > (F) EMPLOYEES WHO ARE DELINQUENT OR HAVE NOT REMITTED THE MONTHLY CONTRIBUTIONS FOR AT LEAST SIX (6) MONTHS, WHETHER CONTINUOUS OR BROKEN, SHALL HAVE THEIR AUTHORITY OR LICENSE TO OPERATE CANCELLED, WITHOUT PREJUDICE TO SUCH EMPLOYERS BEING PROCEEDED AGAINST UNDER THIS ACT FOR OTHER SANCTIONS OR REMEDIES.\""

