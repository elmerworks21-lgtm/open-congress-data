congress_website_title = "AN ACT DECREASING THE RATES OF DUTY ON PETROLEUM PRODUCTS TO ZERO PERCENT (0%) THEREBY AMENDING HEADING NUMBERS 27.09, 27.10 AND 27.11 OF THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: The Supreme Court in its decision declaring Republic Act 8180, the Oil Deregulation Law, unconstitutiona l struck down the existence of a tariff differential as violative of the Constitution as it works to the \"immense benefit\" of the oiltriumvirate: Shell, Caltex and Petron. > This bill provides for a zero tariff on imported crude and finished petroleum products which will also remove any tariff differential. This will (1) foreclose the inordinate escalation of prices of petroleumproducts and (2) enhance competition in the oil industry without prejudice to the new players."

