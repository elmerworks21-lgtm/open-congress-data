congress_website_title = "AN ACT AUTHORIZING GOVERNMENT HOSPITALS TO UTILIZE ALL INCOME FOR THEIR MAINTENANCE AND OTHER OPERATING EXPENSES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: This practice of disallowing government hospitals from spending their income for Maintenance And Other Operating Expenses (MOOE) has the effect of limiting their capability for expansion and improvement and precisely the primary reason why government hospitals fail to deliver quality and efficient delivery of basic health services to the people. Mandates, therefore, the following --- \"SECTION 1. Government hospitals are hereby authorized to utilize their income from pharmacy, laboratory, radiology, operating room and nursery for the maintenance and other operating expenses of the hospital. \"SECTION 2. Expenditures under this Act shall be subject to existing auditing rules and regulations. In addition, it shall submit quaterly reeport to the DOH their statement of income and expenditures.\""

