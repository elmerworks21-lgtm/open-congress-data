congress_website_title = "AN ACT AMENDING SECTIONS 3514, 3601, AND 3602 OF THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Sets up a system that will strictly enforce the anti-smuggling law by amending certain sections in the Tariff and Customs Code of the Philippines (TCCP), as amended. Is based on the observation that smuggling and other farudulent importations remainunchecked because the old provisions of the TCCP contain loopholes that the smugglers take advantage of as their way out of prosecutions."

