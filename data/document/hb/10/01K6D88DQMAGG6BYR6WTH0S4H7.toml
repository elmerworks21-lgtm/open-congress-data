congress_website_title = "AN ACT REQUIRING ALL GOVERNMENT AND PRIVATELY OWNED HOSPITALS TO PROVIDE AND ADMINISTER FREE VACCINATIONS FOR INFANTS AND CHILDREN, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "\"Free Vaccination Law\" Defines the term \"vaccination\" as the inoculation of specific causitive substances in order to prevent or lessen the effects of some diseases, including BCG, DPT and polio. Authorizes the Department of Health to administer and supervise the implementation of this Act."

