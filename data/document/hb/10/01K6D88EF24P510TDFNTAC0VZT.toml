congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF ABSENTEE VOTING BY QUALIFIED FILIPINOS ABROAD"
congress_website_abstract = "\"Absentee Voting Law of 1996\" Defines \"absentee voting\" as the electoral process by which qualified overseas Filipinos cast their votes in any Philippine elections. Provides for areas of concern, such as; (1) Scope and Coverage; (2) Notice of Election; (3) Registration Procedure; (4) Costing of Ballots, etc."
