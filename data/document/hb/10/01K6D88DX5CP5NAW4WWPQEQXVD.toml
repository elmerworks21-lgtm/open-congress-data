congress_website_title = "AN ACT INCREASING THE PENALTIES FOR VIOLATION OF THE CORAL RESOURCES DEVELOPMENT AND CONSERVATION DECREE, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED TWELVE HUNDRED AND NINETEEN, AS AMENDED"
congress_website_abstract = "Provides for the following: (1) Increase of penalty from 60 days to 6 years to 6 months to 10 years or a fine from P6,000.00 to P10,000.00 for any person gathering precious or semi-precious corals without permit; (2) Increase of penalty from 30 daysto 3 years or a fine of not less than P3,000.00 or both, to 6 months to 6 years or a fine of P6,000.00 or both for any person gathering, possessing, selling, exporting and/or using ordinary corals either in raw or processed form or exporting precious and semi-precious corals."

