congress_website_title = "AN ACT PROHIBITING THE GLORIFICATION OF GUNS AND VIOLENCE IN MOVIE, TELEVISION, RADIO, PRINT MEDIA AND OTHER PUBLIC MEANS, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Defines the term \"GLORIFICATION\" as the portrayal of the use of guns on the act of violence as an appproved and accepted normal or ordinary way of life, or when the presnetation is given a favorable aspect, dignifying the violent act and showing itsportrayal is worthy of praise and emulation. Penalizes violation of this Act with a P20,000.00 to P50,000.00 fine or by a six (6) months to one (1) year imprisonment."

