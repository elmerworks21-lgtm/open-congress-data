congress_website_abstract = "Proposes a police modernization program with the following components: (1) ORGANIZATIONAL ENHANCEMENT: (2) WELFARE AND BENEFITS: (3) STRENGTHENING OF DISCIPLINARY MACHINERY; and (4) MODIFICATION OF SUPERVISORY POWERS OF LOCAL OFFICIALS OVER LOCAL PNP OFFICERS."
