congress_website_title = "AN ACT CONSERVING, PROMOTING AND POPULARIZING THE NATIONS'S HISTORICAL AND CULTURAL HERITAGE AND RESOURCES, AS WELL AS ARTISTIC CREATIONS BY EXACTING A PERFORMANCE FEE FROM FOREIGN PERFORMERS AND ALLOCATING THE PROCEEDS THEREOF TO THE NATIONAL COMMISSION ON CULTURE AND ARTS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Singer's Equity Act of 1996\" provides for the following --- \"SEC. 3. Equity Fee. In addition to the fees currently being imposed, there shall be charged on a foreign performer a fee equivalent to fifteen percent (15%) of his total talent fee for the privilege of performing in the Philippines which shall be known as the Equity Fee.\" \"SECTION 4. Exception. Performances of foreign performers for a socio-civic benefit or to which the audience does not pay for admission or which the Cultural Centerof the Philippines sponsors shall not be covered by this Act.\""

