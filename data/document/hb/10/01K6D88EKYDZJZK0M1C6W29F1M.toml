congress_website_title = "AN ACT STRENGTHENING FURTHER THE RIGHTS OF THE PARTIES UNDER VOLUNTARY ARBITRATION, AMENDING FOR THIS PURPOSE ARTICLE 262-A OF THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: \"Recent developments tend to erode the integrity of voluntary arbitration as an equitable, expeditious and inexpensive mode of settling labor disputes.\" Seeks to RESTORE the confidence once enjoyed by voluntary arbitration as the primarymode of albor dsipute resolution by: (1) restating tht the decision/award of the voluntary arbitrator is final and executory and thus no motion for consideration may be entertained by the voluntary arbitrator; (2) clarifying that, unless otherwise ordered by the Court, the aspect of the decision/award of the voluntary arbitrator ordering reinstatement shall not be stayed by the mere filing of a petition for a certiorari; and (3) requiring the posting of a supersedeas bond equivalent to the monettary award in the decision/award as a jurisdictional prerequisite in filing a certiorari petition seeking the review of said decision/award."
