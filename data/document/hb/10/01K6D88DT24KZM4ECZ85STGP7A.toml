congress_website_title = "AN ACT EXEMPTING THE ELECTRIC COOPERATIVES FROM THE COVERAGE OF REPUBLIC ACTS 6938 AND 6939 IN ORDER TO CONTINUE WITH THEIR REGISTRATION WITH THE NATIONAL ELECTRIFICATION ADMINISTRATION UNDER PRESIDENTIAL DECREE NO. 269, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Refers to RA 6938, the Cooeprative Code of the Philippines and RA 6939 which created the Cooperative Development Authority (CDA). Seeks to EXEMPT electric cooperatives (ECs) from coverage of the two laws for them to retain their nonstock, nonprofitnature and tax-exemption privileges."
