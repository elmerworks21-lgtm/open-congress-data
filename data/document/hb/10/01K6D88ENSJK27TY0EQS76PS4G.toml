congress_website_title = "AN ACT PROVIDING THAT THE SALARY OF GOVERNMENT EMPLOYEES WHO HAVE RENDERED AT LEAST TWENTY (20) YEARS OF CONTINUOUS GOVERNMENT SERVICE SHALL BE ADJUSTED TO ONE SALARY GRADE HIGHER"
congress_website_abstract = "Rationale: This bill therefore seeks to adjust the salary grade by one salary grade higher of those who have served the government for at least twenty years. This is in consonance with Article II, Section 9 of the 1987 Constitution which states that: \"The State shall promote a just and dynamic social order that will ensure the prosperity and independence of the nation and free the people from poverty through policies that provide adequate social services, promote full employment, a rising standard of living, and an improved quality life for all.\""

