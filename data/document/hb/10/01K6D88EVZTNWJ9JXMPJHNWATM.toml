congress_website_title = "AN ACT PROVIDING FOR AN ADDITIONAL SUBJECT IN ALL ELEMENTARY AND SECONDARY LEVELS FOR THE DISCUSSION OF RELEVANT SOCIAL, POLITICAL, ECONOMIC, CULTURAL, AND ENVIRONMENTAL TOPICS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares the following --- \"SECTION 1. All elementary and secondary schools shall have an additional mandatory subject for all grade and year levels dedicated to the discussion of relevant social, political, economic, cultural, and environmental topics, such as, resource conservation and protection, drug abuse, sex education, social justice issues, gender sensitivity, and poverty alleviation.\""

