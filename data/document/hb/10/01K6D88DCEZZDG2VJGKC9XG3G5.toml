congress_website_title = "AN ACT TO FURTHER LIBERALIZE FOREIGN INVESTMENTS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7042, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes amendments to RA 7042 on the Foreign Investments Act, intended to attract substantial foreign capital; seeks to liberalize provisions on (1) the paid-in equity requirement of not less than $500,000.00 for foreign-owned domestic market enterprises, and the (2) Negative List C in both the transitory and regular negative lists. Proposes to open certain economic areas, now the exclusive domain of Filipino businessmen, to foreigners, such as retail trade, banking and those reserved to Philippine nationals by virtue of the Constitution. * * *"
