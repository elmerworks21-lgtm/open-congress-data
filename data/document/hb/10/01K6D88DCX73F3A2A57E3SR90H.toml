congress_website_title = "AN ACT PROVIDING FOR INCREASED INVESTMENT TO HOUSING BY THE SOCIAL SECURITY SYSTEM BY REQUIRING THAT AT LEAST THIRTY PERCENT (30%) OF ITS INVESTMENT RESERVE FUND BE ALLOCATED TO THE PROVISION OF DIRECT HOUSING LOANS TO ITS MEMBERS, THEREBY AMENDINGSECTION 21 OF REPUBLIC ACT NO. 1161, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Amends Section 26 of Republic Act No. 1161, as amended, otherwise known as the Social Security Law by requiring at least thirty (30%) per centum of the investible funds of the Social Security System (SSS) be allocated to direct housing loans to itsmembers. Provides, likewise, that investments up to ten (10%) per centum of the investible funds may be made by the SSS in the provision of the loans for the construction and maintenance of hospitals and institutions for the sick, aged and infirm. ** *"
