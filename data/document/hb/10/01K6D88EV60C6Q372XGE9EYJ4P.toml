congress_website_title = "AN ACT REQUIRING THE CONSTRUCTION AND INSTALLATION OF UNDERGROUND SECONDARY STORAGE OR DOUBLE-WALLED TANK AS A REQUIREMENT PRIOR TO THE ISSUANCE AND/OR RENEWAL OF BUSINESS OR OTHER REGULAR PERMITS TO ANY OPERATOR OF GASOLINE STATION OPERATING AS BUSINESS FOR DISTRIBUTION/SE LLING OF GASOLINE, DIESEL AND OTHER SIMILAR PRODUCTS WITHIN THE TERRITORIAL JURISDICTION OF THE REPUBLIC OF THE PHILIPPINES AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Rationale: The danger lies on the basic premise that any defect in the condition of the Underground Storage Tank (UST) of gasoline dealers can emit dangerous benzene and other toxic waste which may contaminate underground aquifer or water streams. If such condition happens, the people are in danger of contacting cancer, leukemia, asthma, mental disroder and in the worst scenario, the loss of lives. \"Regulation of Gasoline Storage Facilities Act of 1997\" Aims to --- (1) institute an orderly system of law and order to properly regulate the system of retail selling of gasoline and its derivatives; (2) establish and sustain a balanced supply of gasoline; (3) contain the harmful effects of any damage in the storage tank; and (4) promote the efffective operation of the industry."

