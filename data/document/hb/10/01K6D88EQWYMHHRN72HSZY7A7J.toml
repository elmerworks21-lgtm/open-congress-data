congress_website_title = "AN ACT PROMOTING THE UTILIZATION OF RECYCLABLE RESOURCES IN CERTAIN INDUSTRIES"
congress_website_abstract = "Rationale: This bill seeks to promote the utilization of all recyclable resources in certain specified industries. The objective of this measure is to increase the productivity of the industiries affected at the least possible cost and with a sufficient degree of utilization of recycled resources and at the same time achieving a reduction in the volume of waste. This legislation aims to contribute to the protection and maintenance of the living environment and the healthy development of the national economy's effective utilization of resources. \"Recycling Law of the Philippines\" Provides for these concerns: (1) What are recyclable resources; (2) Responsibilitie s of business entities; (3) Responsibility of the government; and (4) Use of rrecyclable resources;"

