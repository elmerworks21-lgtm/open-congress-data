congress_website_title = "AN ACT PROVIDING FOR THE ADMINISTRATIVE AND OPERATIONAL REFORMS OF THE PHILIPPINE NATIONAL POLICE, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED AND SEVENTY-FIVE ENTITLED, 'AN ACT ESTABLISHING THE PHILIPPINE NATIONAL POLICE UNDERA REORGANIZED DEPARTMENT OF INTERIOR AND LOCAL GOVERNMENT, AND FOR OTHER PURPOSES'"
congress_website_abstract = "Rationale: The promise of a highly efficient and competent police force, as provided in Republic Act No. 6975 enacted in 1990, has not been achieved. The performance of the Philippine National Police has been dismal. The peace and order situation ahs remained a very serious problem. There is a steady rise of incidence of major crimes, like kidnapping, robberies, carnapping, hold-ups, etc. And the worst part is that police response to crime occurrences is very poor. The situation leaves people covering in fear that they may become the next victims of crime. > At this point, the Philippine National Police has a tarnished image. The people have lost respect for it and this consequently breeds crimes. The Philippine National Police has to be rreformed if it wants to serve the people with dedication and efficiency. > Contains significant provisions, such as on: (1) Amending the COMPOSITION of the National Police Commission and the TERM OF OFFICE of the Commission; (2) A Qualifications Upra"

