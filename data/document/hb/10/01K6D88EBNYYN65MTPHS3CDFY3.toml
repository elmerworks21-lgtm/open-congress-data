congress_website_title = "AN ACT MANDATING EMPLOYERS TO GRANT UP TO FOUR (4) WEEKS OF UNPAID LEAVE A YEAR TO EMPLOYEES WHOSE SPOUSE, PARENT, UNMARRIED CHILD, OR WHEN THEY THEMSELVES ARE SUFFERING FROM SERIOUS ILLNESS"
congress_website_abstract = "\"Family and Medical Leave Act of 1996\" Grants an employee, whether employed in a private or government entity, a Family and Medical Leave when his legitimate spouse, parent, or legitimate unmarried child suffers from serious illness, which benefit an employee may also supply for the same if he himself is physically unable to perform his job due to a serious illness."

