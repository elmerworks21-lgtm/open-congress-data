congress_website_title = "AN ACT MANDATING THE GOVERNMENT SERVICE INSURANCE SYSTEM (GSIS) TO ESTABLISH A STUDY-NOW-PAY-L ATER PROGRAM FOR MEMBERS AND THEIR DEPENDENTS WHO DESIRE TO PURSUE COLLEGE EDUCATION"
congress_website_abstract = "Rationale: Education is, perhaps, the greatest investment that society can make for its people. As the country moves towards the next millennium, the government should seriously concern itself with the kind of education that would amply prepare ourpeople in the year 2000 and beyond.> Seeks to partially fulfill the educational needs of the people by mandating the GSIS to establish a STUDY-NOW-PAY-L ATER PROGRAM for members and their dependents desiring to pursue a college education."

