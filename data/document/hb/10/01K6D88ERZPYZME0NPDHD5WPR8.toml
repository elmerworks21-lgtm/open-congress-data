congress_website_title = "AN ACT INCREASING THE SHARE FROM THE INTERNAL REVENUE ALLOTMENT OF MUNICIPALITIES TO TEN PERCENT (10%), AMENDING SECTION 285 OF THE LOCAL GOVERNMENT CODE OF 1991, OTHERWISE KNOWN AS THE ALLOCATION TO LOCAL GOVERNMENT UNITS"
congress_website_abstract = "Proposes the following amendment to Section 285 of the Local Government Code: \"SEC. 285. Allocation to Local Government Units. - The share of Local Government Units in the internal revenue allotment shall be allocated in the following manner: (a) Provinces - [Twenty-three percent (23%)]FOURTEEN PERCENT (14%); (b) Cities - Twenty-three percent (23%); (c) Municipalities - [Thirty-four percent (34%)] FORTY-THREE PERCENT (43%) WITH THE FOLLOWING ALLOCATION: PLUS 2% FOR THE FOURTH CLASS, PLUS 3% FORTHE FIFTH CLASS, AND PLUS 4% FOR THE SIXTH CLASS; and (d) Barangays - Twenty percent (20%).\""

