congress_website_title = "AN ACT EXPANDING THE PUNISHABLE ACTS OF MONOPOLY AND COMBINATION IN RESTRAINT OF TRADE, PROVIDING CIVIL REMEDIES THEREFOR, AND AMENDING FOR THE PURPOSE ARTICLE ONE HUNDRED AND EIGHTY SIX (186) OF THE REVISED PENAL CODE OF THE PHILIPPINES"
congress_website_abstract = "Underscores the need for an alternative civil remedy for antitrust conspiracies, such as: (1) expanding the enumeration of punishable acts of monopolies and combinations in restraint of trade; (2) increasing the penalties of fine and/or imprisonmentfor antitrust offenses; and (3) providing an alternative civil remedy to the offended parties for recovering damages in antitrust cases."

