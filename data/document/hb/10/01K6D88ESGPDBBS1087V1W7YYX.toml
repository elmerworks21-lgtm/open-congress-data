congress_website_title = "AN ACT PROHIBITING THE ACCESS OF PORNOGRAPHIC AND SMUT WEB SITES THROUGH THE INTERNET IN PUBLIC PLACES AND PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: This bill seeks to prohibit any person from accessing a pornographic web site for whatever purpose in public places such as parks, canteens, theaters, classrooms, computer rental shops, school, colleges and universities and other similarplaces. This bill aims to protect and preserve the moral virtues and culture of our youth against smut and pornography. It also wants to give protection to other people against nuisance, offensive and obnoxious individuals. >Penalizes violation of this Act with a fine of P5,000.00, or imprisonment of five (5) years, or both."

