congress_website_title = "AN ACT MAKING APPLICABLE TO LAWYERS IN THE PUBLIC ATTORNEYS' OFFICE OF THE DEPARTMENT OF JUSTICE THE RETIREMENT BENEFITS UNDER REPUBLIC ACT NO. 910, AS AMENDED"
congress_website_abstract = "Provides that retirement benefits provided under RA 910 be extended to the lawyer in the Public Attorneys; Office. Sets the retirement age of PAO lawyers at 65 years, the optional retirement age at 60 years, and the would-be retiree should have rendered at least 20 years service in the government, the last five (5) having been rendered in the PAO."

