congress_website_title = "AN ACT PROVIDING BENEFITS FOR EARLY RETIREMENT AND VOLUNTARY SEPARATION FROM THE GOVERNMENT SERVICE, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Covers all appointive officials and employees of the national government, including government-owne d or-controlled corporations. as well as the personnel of all local government units. Applies to all REGULAR AND TEMPORARY EMPLOYEES appointed to permanent itemized positions, REGARDLESS OF AGE, who have RENDERED AT LEAST A TOTAL OF THREE (3) CONSECUTIVE YEARS of government service as of the date of separation."
