congress_website_title = "AN ACT DECLARING THE TARSIUS SYRICHTA COMMONLY KNOWN AS THE PHILIPPINE TARSIER AS A PROTECTED MONKEY IN THE PHILIPPINES, PROVIDING FOR THE PRESERVATION OF THE SAME, AND AUTHORIZING THE APPROPRIATION OF FUNDS FOR THE PURPOSE"
congress_website_abstract = "PROHIBITS the killing, hunting, wounding or taking away of the TARSUS SYRICHITA and/or destroying their habitat, disturbing, or taking away their siblings. Directs the Parks and Wildlife director to establish sanctuaries to preserve this threatenedspecies."
