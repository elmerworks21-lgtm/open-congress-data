congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1067 DATED 31 DECEMBER 1976, AS AMENDED, OTHERWISE KNOWN AS THE WATER CODE OF THE PHILIPPINES"
congress_website_abstract = "Proposes the following amendment to the Wate Code of the Philippines: \"Article 51. The banks of rivers and streams and the shores of the seas and lakes throughout their enture length and within the zone to be determined by the Council en banc and updated by the same every other five (5) years, shall be subject to the easement of public use in the interest of recreation, navigation, flotage, fishing, salvage and preservation of these areas for the sustainable use of such rivers, streams seas andlakes. No person shall be allowed to stay in this zone longer than what is necessary for recreation, navigation, flotage, fishing or salvage or, to build structures of any kind.\""

