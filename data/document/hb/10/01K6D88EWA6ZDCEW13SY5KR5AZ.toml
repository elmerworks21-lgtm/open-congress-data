congress_website_title = "AN ACT AMENDING SECTION 15 OF REPUBLIC ACT NO. 8282, OTHERWISE KNOWN AS THE 'SOCIAL SECURITY ACT OF 1997'(RE: PR OVISIONS ON DEATH BENEFITS)"
congress_website_abstract = "Rationale: To provide a really meaningful protection to its members and beneficiaries, the provisions of the Social Security Act on death benefits must be amended anew. Benefits that are due to an applicant must not only be delivered --- they must be delivered expeditiously so as to serve its purpose of providing protection to the people against the contingencies of life. Provides for the following --- \"SEC. 15. Nontranferabili ty of Benefit. - The SSS shall promptly pay the benefits provided for in this Act to such persons as may be entitled thereto in accordance with the provisions of this Act and shall impose only the minimum and necessary requirements as proof of an applicant's entitlement thereto: Provided, That the SSS shall pqay thee death benefits immediately after the death of the member to qualified beneficiaries who have submitted the necessary documents: Provided, further, That as proof of death of the member, the death certificate or an equivalent thereof shall suffice.\""

