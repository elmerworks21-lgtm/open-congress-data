congress_website_title = "AN ACT TO DECLARE OCTOBER FIFTEEN OF EVERY YEAR AS NATIONAL RURAL WOMEN'S DAY"
congress_website_abstract = "Rationale: Rural women comprise more than one-fourth of the world population, with 500 million of rural women living below the poverty line. Women produce 60% to 80% of basic foodstuffs in the African Sahara and the Carribean regions. They perform50% of rice cultivation in Asia and 30% of agricultural work in industrialized countries. In Africa, women process 100% of basic household foodstuffs. In spite of their major role in agricultural production and consequently, in the promotion of foodsecurity, rural women are not given due recognition. Mandates, therefore, the following --- \"SEC. 2. To ensure meaningful observance of said day as herein declared, all heads of government agencies and instrumentaliti es, including government-owne dand controlled corporation as well as local government units, and employees in the private sector shall encourage and support the holding of activities that will highlight the contributions of rual women to the economy and society.\""
