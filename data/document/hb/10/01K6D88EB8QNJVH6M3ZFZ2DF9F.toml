congress_website_abstract = "Seeks to integrate the nursing profession into one national nursing association to be known as the Philippine Integrated Nurses Association (PHILINA). Aims to protect and improve the profession by instituting measures for better health care, humaneworking conditions, better career prospects and a dignified existence for Filipino nurses."

