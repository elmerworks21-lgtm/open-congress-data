congress_website_title = "AN ACT ESTABLISHING A NATIONAL IDENTIFICATION SYSTEM IN THE PHILIPPINES"
congress_website_abstract = "Requires all Filipino citizens with at least seventeen years of age to apply for registration and for the issuance of an identification card with a permanent serial number. at the office of the local civil registrar of the locality where he resides.Directs the National Bureau of Investigation (NBI) to establish a system for the implementation of this Act."

