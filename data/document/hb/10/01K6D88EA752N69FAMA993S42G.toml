congress_website_title = "AN ACT REQUIRING LABOR REPRESENTATION IN THE BOARD OF DIRECTORS/TRUST EES OF THE MANILA ELECTRIC COMPANY, THE PHILIPPINE LONG DISTANCE TELEPHONE COMPANY AND ANY OTHER PRIVATE CORPORATION OPERATING A PUBLIC UTILITY AND/OR DISPENSING PUBLIC SERVICES"
congress_website_abstract = "Provides that - \"SEC. 2. Labor Representation in the Board of Directors/Trust ees. Labor groups accredited by the Department of Labor and Employment shall be given one (1) seat in the Board of Directors/Trust ees of the Manila Electric Corporation(MERALCO), the Philippine Long Distance Telephone Company (PLDT), and any other private corporation a public utility and/or dispensing public services.\""

