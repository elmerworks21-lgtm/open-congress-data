congress_website_title = "AN ACT AMENDING SECTION 35, ARTICLE VIII, OF REPUBLIC ACT NO. 6425, AS AMENDED, OTHERWISE KNOWN AS 'THE DANGEROUS DRUGS ACT OF 1972,'DDESIGNAT ING THE SECRETARY OF JUSTICE AS THE CHAIRMAN OF THE DANGEROUS DRUGS BOARD"
congress_website_abstract = "Rationale: Since the Department of Justice plays a major role in the investigation and prosecution of drug-related cases, it is only fitting and proper that the Secretary of Justice should also be made to take an important role in the Dangerous Drugs Board, the highest policy-making and coordinating arm of the Office of the President, as well as the naitonal clearing house of all matters pertaining to law enforcement and control of dangerous drugs, treatment and rehabilitation of drug dependents, drug abuse, prevention and community information, research and statistics on the drug problem, and the training of personnel engaged in the aforementioned activities."
