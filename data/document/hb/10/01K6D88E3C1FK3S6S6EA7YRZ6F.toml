congress_website_title = "AN ACT PROVIDING FOR A UNIFORM TERMINATION PAY FOR ALL WORKERS IN THE PRIVATE SECTOR, AMENDING FOR THE PURPOSE ARTICLES 283 AND 284 OF THE LABOR CODE OF THE PHILIPPINES, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Applies to any PRIVATE SECTOR EMPLOYEE who is termianted due to: (1) Retrenchment to prevent losses; (2) Closures of oeprations; (3) prejudicial health condition. Entitles the employee to a SEPARATION PAY equivalent to at least one (1) month pay orto at least one (1) month pay for every year of service, whichever is higher."

