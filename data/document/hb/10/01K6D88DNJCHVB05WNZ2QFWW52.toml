congress_website_title = "AN ACT CLASSIFYING THE CRIME OF CHILD ABUSE COMMITTED WITH THE USE OF DRUGS OR INTIMIDATION AGAINST A CHILD UNDER EIGHT YEARS OF AGE AS HEINOUS CRIME AND IMPOSING THE DEATH PENALTY THEREFOR"
congress_website_abstract = "Penalizes a person who commits child abuse with the use of drugs or intimidation against a child under eight (8) years old with or without his or her consent with a maximum penalty of death and a fine of not less than fifty thousand (P50,000.00) pesos, but not more than one hundred thousand (P100,000.00) pesos."

