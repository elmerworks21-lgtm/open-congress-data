congress_website_title = "AN ACT TO FOSTER LONG-TERM SOURCES OF DOMESTIC FINANCING BY PROVIDING INCENTIVES TO INDIVIDUALS TO INCREASE THEIR LONG-TERM SAVINGS, AMENDING FOR THE PURPOSE SECTIONS 20, 21 (C) AND 180 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "\"Long-term Savings Act\" Seeks to enhance the personal and institutional savings of Filipinos, to generate various source of long-term funds and to develop the capital markets. Proposes a NEW paragraph to Section 20 of the National Internal Code which shall reas as follows: \"(AA) THE TERM LONG-TERM SAVINGS CERTIFICATE SHALL REFER TO CERTIFICATE OF TIME DEPOSIT WITH A MATURITY PERIOD OF NOT LESS THAN FIVE (5) YEARS, DULY REGISTERED WITH THE BANGKO SENTRAL NG PILIPINAS (BSP) AND ISSUED BY BANKS ONLY (NOT BY NON-BANKS FINANCIAL INTERMEDIARIES AND FINANCE COMPANIES) TO INDIVIDUALS IN DENOMINATIONS OF P10,000 AND OTHER DENOMINATIONS AS MAY BE PRESCRIBED BY BSP\""
