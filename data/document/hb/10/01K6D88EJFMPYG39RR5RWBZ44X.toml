congress_website_title = "AN ACT REQUIRING THE EXAMINATION AND INSPECTION OF FISH OR EDIBLE MARINE PRODUCTS THAT ARE SOLD OR DISTRIBUTED FOR CONSUMPTION TO THE PUBLIC, AND PROVIDING STIFFER PENALTIES THEREFOR"
congress_website_abstract = "Defines \"FISH OR EDIBLE MARINE PRODUCTS\" as used in this Act. Mandates the following --- \"SEC. 3. All fish or any edible marine product found to be stale, purified or decomposed, diseased, poisonous, or caught with the use of explosives or toxic substances such as cyanide, etc., and contaminated with red tide organism, or containing levels of mercury, shall be condemned or disposed of in accordance with existing rules and regualtions promulgated jointly by the Secretary of Health, the Directorof the Bureau of Fisheries and Aquatic Resources any existing interagency committee concerned. Prescribes penalties for violation of this provision."

