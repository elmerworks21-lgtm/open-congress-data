congress_website_abstract = "Rationale: \"After almost 36 years, the Agricultural Engineering Law (1960) has not been amended nor updated with the increased role of the country's agricultural engineers in the country's bid for agro-industrial ization and the recent trend of technological development, there is a need to update said law.\" \"The Philippine Agricultural Engineering Law of 1996\""
