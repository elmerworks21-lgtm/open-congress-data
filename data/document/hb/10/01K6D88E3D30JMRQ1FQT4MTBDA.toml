congress_website_title = "AN ACT PROVIDING FOR THE FORFEITURE OF ELECTIONS IN NATIONAL OFFICES AMENDING FOR THE PURPOSE SECTION 6 OF BATAS PAMBANSA BILANG 881, AS AMENDED, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE"
congress_website_abstract = "Mandates for the forfeiture of elections for national positions in cases where elections are attended by acts of force and violence. States that the COMELEC shall declare a FORFEITURE OF ELECTIONS for the position of president, vice-president and senatoars where at least 60% of the votes have laready been case where there was failure or suspension of election."
