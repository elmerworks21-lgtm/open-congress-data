congress_website_title = "AN ACT AMENDING SECTION 25 (d) OF PRESIDENTIAL DECREE NUMBERED SIXTEEN HUNDRED THIRTY-EIGHT, OTHERWISE KNOWN AS THE AFP MILITARY AND SEPARATION DECREE OF 1979, AND FOR OTHER PURPOSES(RETIRE MENT PAY COMPUTATION)"
congress_website_abstract = "Rationale: This bill seeks to amend P>D> 1638 and revert back to the provision of R.A. 340 in recognition of the service our men and women on the field have so courageously provided in defense of the State. Section 25 (d) of Presdiential Decree No.1638, otherwise known as the Armed Forces of the Philippines Military Personnel Retirement and Separation Decree of 1979 is hereby amended to read as follows: \"SEC. 25. For the purposes of this Decree - x x x (d) [A year of service shall mean twelve(12) months.] ANY PERIOD OF SERVICE AMOUNTING TO SIX MONTHS OR MORE SHALL BE COUNTED AS A COMPLETE YEAR.\""

