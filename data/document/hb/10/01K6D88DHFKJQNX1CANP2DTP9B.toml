congress_website_title = "AN ACT GRANTING RETIREMENT, PENSION AND OTHER BENEFITS UPON REACHING RETIREMENT AGE OR EARLIER SEPARATED FROM THE SERVICE ALLOWED UNDER EXISTING LAWS, TO ALL OFFICIALS AND EMPLOYEES OF THE NATIONAL AND LOCAL GOVERNMENTS, EITHER APPOINTIVE OR ELECTIVE, INCLUDING THOSE OF THE GOVERNMENT- OWNED AND -CONTROLLED CORPORATIONS WHO HAVE RENDERED AN AGGREGATE ALTHOUGH NON-CONTINUOUS AND BROKEN PUBLIC SERVICE FOR AT LEAST TEN (10) YEARS UPON A RECONSTITUTION OF THEIR SERVICE RECORDS AND OTHER PERTINENT DOCUMENTS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Directs the creation of a SPECIAL GOVERNMENT EMPLOYEES FUND (SGEF) to pay off the benefits provided for in this Act. Explains the details whereby one can avail of the benefits under this Act."
