congress_website_title = "AN ACT RATIONALIZING THE ALLOCATION OF PROCEEDS FROM THE SALE OF MILITARY CAMPS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7227, OTHERWISE KNOWN AS THE BASES CONVERSION AND DEVELOPMENT LAW"
congress_website_abstract = "Provides for allocation of proceeds from the sale of military camps: (1) Fifty percent (50%) for the AFP Modernization Plan and other needs of soldiers to make them a self-reliant and a truly Filipino fighting force; (2) Twenty percent (20%) for theconversion and the commercial uses of the Clark and Subic military reservations; (3) Ten (10%) percent for the housing loan and livelihood assistance for the homeless and urban poor of the affected municipalities; and (4) The balance for the socio-economic upliftment of the Filipino people."

