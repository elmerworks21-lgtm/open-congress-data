congress_website_title = "AN ACT PROMULGATING POLICIES AND PRESCRIBING MEASURES FOR THE PREVENTION AND CONTROL OF HIV/AIDS IN THE PHILIPPINES, INSTITUTING A NATIONWIDE HIV/AIDS INFORMATION AND EDUCATION PROGRAM, ESTABLISHING A COMPREHENSIVE AIDS MONITORING SYSTEM, CREATING THE PHILIPPINE AIDS PREVENTION AND CONTROL COMMISSION, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine HIV/AIDS Prevention and Control Act of 1994\" Provides for the establishment of an HIV/AIDS monitoring and feedback mechanism to report on the occurrence of the diseases in the country. Provides GUIDELINES on HIV anti-body testing and counselling, medical and other practices that carry the risk of HIV transmission; states what are considered DISCRIMINATION ACTS AND POLICIES."
