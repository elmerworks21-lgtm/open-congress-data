congress_website_title = "THE NATIONAL LAND TRANSPORTATION AUTHORITY ACT OF 1997"
congress_website_abstract = "\"National Land Transportation Authority (NLTA) Act of 1997\" Mandates the creation of the NATIONAL LAND TRANSPORTATION AUTHORITY, which shall be attached to the Dept. of Transportation and Communications. Provides for these areas of concern: (1) Powers and Function of the Authority; (2) Administration; Finances; (3) Regulation of Public Utility Vehicles; and (4) Disposition of Seized Vehicles, Components and Accessories."

