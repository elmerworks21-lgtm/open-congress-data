congress_website_title = "AN ACT ADOPTING COMMUNITY SERVICE AS AN ALTERNATIVE PENALTY FOR CERTAIN OFFENSES IN LIEU OF DEPRIVATION OF LIBERTY OR PAYMENT OF FINE"
congress_website_abstract = "\"Community Service Law of 1996\" Aims to --- (1) Prevent the negative effect of prison term to individual offenders who are charged with minor offenses; (2) Reduce the overload of correctional institutions; and (3) Promote the correction and rehabilitation of an offender by providing him with personalized community-based treatment."

