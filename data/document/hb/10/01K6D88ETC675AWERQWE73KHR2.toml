congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED EIGHTY HUNDRED AND FORTY-EIGHT, OTHERWISE KNOWN AS THE 'COCONUT PRESERVATION ACT OF 1995,' FOR THE PURPOSE OF DECLARING A MORATORIUM ON THE CUTTING OF COCONUT TREES UNTIL THE YEAR 2000"
congress_website_abstract = "Rationale: This proposed amendment to R.A. 8048 for a strict moratorium on cutting until year 2000 will further strenthen the regulation against the still unabated cutting (whether allowed or not), which aggravates the low productivity of farms. The moratorium is necessary until the full recovery of the typhoon-damaged and unproductive coconut farms through the rehabilitation and replanting program of the government. Proposes the following amendment to Section 4, RA 8048: \"SEC. 4. No other causes other than those above-mentioned shall be considered as a valid ground for cutting [.]; PROVIDED, HOWEVER, THAT IN THE IMPLEMENTATION OF THIS SECTION, A MORATORIUM ON CUTTING OF COCONUT TREES SHALL BE STRICTLY OBSERVED UNTIL THE END OF YEAR 2000,, EXCEPT IN ANY OF THE FOLLOWING CIRCUMSTANCES ONLY: (1) SENILE COCONUT TREES AS DETERMINED BY AND INTENDED TO BE REPLANTED BY THE PHILIPPINE COCONUT AUTHORITY PURSUANT TO ITS REPLANTING PROGRAM; (2) CONSTRUCTION OF VITAL GOVERNEMNT INFRASTRUCTURE PR"

