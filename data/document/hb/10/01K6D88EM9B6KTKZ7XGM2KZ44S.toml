congress_website_title = "AN ACT PROVIDING THAT ONLY PROOF OF OWNERSHIP SHALL BE REQUIRED IN SHIPPING ANY MOTOR VEHICLE, MOTOR VEHICLE ENGINE, ENGINE BLOCK, CHASSIS OR BODY FROM ONE ISLAND TO ANOTHER, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-FIVE HUNDRED AND THIRTY-NINE, OTHERWISE KNOWN AS THE 'ANTI-CARNAPPIN G ACT OF 1972'"
congress_website_abstract = "Seeks to amend the Anti-Carnapping Law to read as follows: \"Sec. 11. [Clearance Request For Shipment] SHIPMENT of Motor Vehicles, Motor Vehicle Engines, Engine Blocks, Chassis or Bodies. - ONLY PROOF OF OWNERSHIP SHALL BE REQUIRED IN SHIPPING ANY MOTOR VEHICLE, MOTOR VEHICLE ENGINE, ENGINE BLOCK, CHASSIS OR BODY FROM ONE ISLAND TO ANOTHER, FOR PURPOSES OF THIS SECTION, PROOF OF OWNERSHIP INCLUDE BUT NOT LIMITED TO REGISTRATION CERTIFICATE AND OFFICIAL RECEIPT.\""
