congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6657, ENTITLED 'AN ACT PROVIDING FOR THE AGRARIAN REFORM LAW', AND FOR OTHER PURPOSES"
congress_website_abstract = "States that any person, CORPORATION, ASSOCIATION OR ENTITY who wilfully violates the Agrarian Reform Law (RA 6657) shall be punished with imprisonment of FIVE (5) YEARS TO NOT MORE THAN TEN (10) YEARS or a fine of FIVE HUNDRED THOUSAND PESOS (P500,00.00) AND NOT MORE THAN ONE MILLION PESOS (P1,000,000.00)"
