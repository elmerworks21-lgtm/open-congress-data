congress_website_title = "AN ACT PROVIDING FOR A TREASURY CROP SYSTEM IN THE PROCUREMENT OF PALAY TO BE GUARANTEED BY THE BANGKO SENTRAL NG PILIPINAS (CENTRAL MONETARY AUTHORITY) TO ENSURE A FAIR RETURN ON THE INVESTMENT TO FARMER PRODUCERS AND ASSURING THE NATIONAL FOOD AUTHORITY (NFA) OF RETURNS FOR ITS OPERATIONS, MAKING NFA A SELF-EARNING AGENCY IN THE GOVERNMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Treasury Crop System for the Procurement of Palay\" Provides that the Bangko Sentral shall undertake to issue and guarantee Treasury Crops which shall be used exclusively as payment for the purchase of agricultural products by the NFA."
