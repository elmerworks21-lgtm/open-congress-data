congress_website_title = "AN ACT DEVOLVING FIRE PROTECTION SERVICES FROM THE NATIONAL GOVERNMENT TO THE LOCAL GOVERNMENT UNITS, REPEALING FOR THE PURPOSE CHAPTER IV INCLUDING SECTIONS 53 TO 59 OF REPUBLIC ACT NUMBERED 6975, AND AMENDING PERTINENT PROVISIONS OF REPUBLIC ACT NUMBERED 7160"
