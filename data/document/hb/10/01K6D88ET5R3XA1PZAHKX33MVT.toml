congress_website_title = "AN ACT TO DEVELOP NEW SYSTEM OF WEAPONS AND ARMAMENTS CONCEPTUALIZED ON FILIPINO CULTURE, IN CONJUCTION WITH THE MODERNIZATION PROGRAM OF THE ARMED FORCES OF THE PHILIPPINES, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Our own military establishment has been totally dependent on acquiring or procuring war instruments for use by Filipino combatants in actual operations and on regular training from highly-industri alized nations which are of superior qualities. > A few of these weapons were re-made and adjsuted to suit the local field situations, fully-tested and effective in every encounter, but, this has just reached the limited point of innovation by the AFP logistics services. There is thereforea strong opportunity that exists in mass production of varying qualities of weapons and armaments with the seal of Filipino craftsmanship. \"Weapons and Armaments Development Act of 1997\" States that the \"Armed Forces of the Philippines ... shall endeeavor to develop NEW types of weapons and armaments, including particular accessories ... of high quality ..., technologically advanced as possible, WHOLLY ADAPTABLE to the Filipino culture, as a use of UPGRADING its present inventory and stockpile.\""

