congress_website_title = "AN ACT DECLARING ALL OFFICIAL NONWORKING DAYS TO FALL EITHER ON A MONDAY OR A FRIDAY"
congress_website_abstract = "Rationale: This measure proposes that all official non-working days should be mandatorily scheduled such that they either fall on a MOnday or a Friday. This will adddress the problem of \"intentional absenteeism\" of workers and will therefore positively impact on productivity. The longer breaks are also expected to promote the health of the workers by giving them ample time for rest and attention to their personal needs outside off their works. Defines \"official non-working days\" as ? in thisAct; prescribes the GUIDELINES to be followed in implementing this measure."

