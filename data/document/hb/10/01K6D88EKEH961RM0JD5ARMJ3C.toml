congress_website_title = "AN ACT ESTABLISHING A COMPREHENSIVE JUVENILE JUSTICE SYSTEM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Comprehensive Juvenile Justice System Law of 1996\" Declares it the policy of the State to undertake a COMPREHENSIVE REFORM in its system of administering JUVENILE JUSTICE by adopting the minimum standards accepted by the United Nations consisted with human rights and fundamental freedoms. Provides for these areas of concern: (1) Investigation of youth offender; (2) Filing of charges before the juvenile court; (3) Release on recognizance; (4) Detention of youth offender; pre-trial determination; (5) Suspension of sentence and commitment."

