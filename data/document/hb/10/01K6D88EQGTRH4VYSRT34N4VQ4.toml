congress_website_title = "AN ACT TO PROVIDE FINANCIAL ASSISTANCE TO LOCAL GOVERNMENT UNITS IN THE IMPLEMENTATION OF WASTE DISPOSAL SYSTEM"
congress_website_abstract = "States the following --- \"SECTION 3. Financial Assistance. The national government shall provide financial assistance to financially distressed cities or municipalities to cover the cost of designing and installing an efficient and effective systemof garbage collection and disposal. The extent of financial assistance shall be up to a maximum of three percent (3%) of the Internation Revenue Allotment (IRA) of cities or municipalities in the preceding fiscal year and shall be according to the financial status of cities or municipalities as follows: (1) 6th class city or municipality - 100% of maximum; (2) 5th class city or municipality - 80% of maximum; (3) 4th class city of municipality - 60%; (4) 3rd class city or municipality - 40% ofmaximum; (5) 2nd class city or municipality - 20% of maximum; (6) 1st class city or municipality - 0%."

