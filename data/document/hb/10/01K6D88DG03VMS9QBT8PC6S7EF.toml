congress_website_title = "AN ACT REQUIRING NATIONAL OFFICIALS CONCERNED TO ADEQUATELY INFORM MEMBERS OF CONGRESS OF PROJECTS WITHIN THEIR RESPECTIVE DISTRICTS FINANCED BY NATIONAL FUNDS PRIOR TO THEIR IMPLEMENTATION"
congress_website_abstract = "Requires the national officials concerned to advise in writing the Members of Congress of any proposed project to be undertaken within their respective districts, with financing from the national funds. Requires further that such advice be made after the planning of projects is completed and its funding is already programmed for release to contain the general description of the project, the estimated project cost, schedule of fund release and the timetable for the construction of the project."

