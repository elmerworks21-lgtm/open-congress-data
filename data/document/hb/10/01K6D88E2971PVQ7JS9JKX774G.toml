congress_website_title = "AN ACT INSTITUTING INCOME SECURITY FOR WORKERS BY PROVIDING THEM UNEMPLOYMENT BENEFITS IN CASE OF INVOLUNTARY UNEMPLOYMENT CONTINGENCIES AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares that any worker who suffers involuntary unemployment due to retrenchment, shutdown, merger, closure, etc. shall be entitled to a MONTHLY UNEMPLOYMENT INSURANCE BENEFIT equivalent to his current basic monthly salary to a maximum period of six (6) months. Prescribes penalty for violation of this Act."

