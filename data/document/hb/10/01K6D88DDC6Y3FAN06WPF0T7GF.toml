congress_website_title = "AN ACT ENSURING AND SAFEGUARDING THE INTEGRITY OF LICENSURE EXAMINATIONS CONDUCTED AND ADMINISTERED BY THE PROFESSIONAL REGULATION COMMISSION, PROVIDING PENALTIES FOR VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "Applies to all licensure examinations administered by the Professional Regulation Commission. Provides for these significant concerns: (1) Rotation of Board Chairman; (2) Examiner's Appointment, Qualifications and Term of Office; (3) Submission of Prospective Test Questions; (4) Drawing/Safekee ping of Examination Questions, etc."
