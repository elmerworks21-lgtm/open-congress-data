congress_website_title = "AN ACT TO AMEND SECTION THREE HUNDRED NINETY-THREE, SUBSECTION (A) OF REPUBLIC ACT NUMBERED SEVENTY-ONE HUNDRED AND SIXTY, ENTITLED 'AN ACT PROVIDING FOR A LOCAL GOVERNMENT CODE OF 1991', BY INCREASING THE MONTHLY HONORARIA OF BARANGAY OFFICIALS"
congress_website_abstract = "Rationale: It is not uncommon for barangay officials to be on call round-the-clock to constituents. They are known to devote long hours, spend their own funds, even risk their personal safety, attending to local needs and problems. Unfortunately, however, the amounts they receive in the form of honoraria are nowhere near levels deemed reasonable or appropriate given their tasks and responsibilitie s and the obtaining economic situation. > Proposes the following benefits of barangay officials under Section 393 (a) of RA 7160, the Local government Code of 1991: (1) Punong barangay --- P2,000.00 [P1,000.00]; (2) SB members, treasurer, and secretary --- P1,200.00 [P600.00]."

