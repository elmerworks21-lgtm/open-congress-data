congress_website_title = "AN ACT ADJUSTING THE RETIREMENT PAY OF MEMBERS OF THE GOVERNMENT SERVICE INSURANCE SYSTEM (GSIS) AND OF THE SOCIAL SECURITY SYSTEM (SSS)"
congress_website_abstract = "Adjusts the retirement pay of all the retired members of the Government Service Insurance System (Gsis) and of the Social Security System (SSS) yearly proportionate with the buying power of the Philippine peso but not lower than ten (10%) per cent of the rate of pay durin the preceding year."
