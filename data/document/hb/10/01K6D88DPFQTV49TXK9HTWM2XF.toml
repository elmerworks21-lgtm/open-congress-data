congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC RESTORATION OF PHILIPPINE CITIZENSHIP TO FILIPINO NATIONALS WHO HAVE ACQUIRED FOREIGN CITIZENSHIPS UPON ELECTION TO PUBLIC OFFICE IN THE PHILIPPINES, PROVIDING FOR THE MECHANISMS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "States that a Filipino national, who acquired foreign citizenship, automatically regains his Philippine citizenship upon election to public office, provided that he possesses all the qualificatios provided udner the election code except the loss ofcitizenship."

