congress_website_title = "AN ACT ABOLISHING THE COMMISSION ON THE SETTLEMENT OF LAND PROBLEMS AND FOR OTHER PURPOSES"
congress_website_abstract = "Abolishes the Commission on the Settlement of Land Problems (COSLAP) Distributes the powers and functions of the Commission to the proper government departments and agencies or instrumentaliti es where they are deemed appropriate. States that all personnel involved in the discharge of functions shall be absorbed by the appropriate agency to which the function was transferred."
