congress_website_title = "AN ACT AMENDING SECTIONS 61 AND 103 OF PRESIDENTIAL DECREE NO. 856, OTHERWISE KNOWN AS THE 'CODE OF SANITATION'"
congress_website_abstract = "Seeks to REGULATE the maintenance of massage clinics and suana bath establishments to provide more STRINGENT penalties for the violations thereof. Prescribes the following regulatory requirements: (1) Every massage cubicle and sauna bath cubicle must be adequately ventilated and provided with sliding translucent curtains or transparent sliding glass doors without lock which will be seven feet height with a clearance of two (2) feet from the floor with a two feet space from below and one foot from above. Each cubicle must also be equipped with a suitable and clean massage table. (2) The operation hours of massage and sauna baths is from twelve (12) in the morning to twelve (12) in the evening; and (3) No display window for the masseurs, maassage clinic attendants and sauna bath attendants shall be provided."

