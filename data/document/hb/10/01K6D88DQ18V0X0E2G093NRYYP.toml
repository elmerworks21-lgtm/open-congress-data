congress_website_abstract = "Refers to the present situation where police officials are beholden to local executives in view of RA 6975 which authorize the provincial govern to choose the PNP regional director. Seeks to correct this situation by proposing to repeal Section 51(a) number one (1) and 51(b) number four (4) of RA 6975."

