congress_website_title = "AN ACT AMENDING SECTION 20 OF PRESIDENTIAL DECREE NUMBERED 1638, AS AMENDED BY PRESIDENTIAL DECREE NUMBERED 1650, OTHERWISE KNOWN AS THE ARMED FORCES OF THE PHILIPPINES RETIREMENT LAW AND SUBSECTION (a) SECTION 27 OF COMMONWEALTH ACT NUMBERED 1, OTHERWISE KNOWN AS THE NATIONAL DEFENSE ACT"
congress_website_abstract = "Allows enlisted personnel to enjoy the same privileges enjoyed by the offices of the AFP with regard to the separation pay of those honorably separated from the service before reaching 20 years of active service. Changes the term of enlistment and re-enlistment in the AFP active force from [three (3)] years to FIVE YEARS."
