congress_website_title = "AN ACT AMENDING THE LAW ON RAPE, RECLASSIFYING THE SAME AS A CRIME AGAINST PERSONS, REDEFINING IT AS TO INCLUDE OTHER FORMS OF SEXUAL ASSAULT ON ANY PERSON, PRESCRIBING PENALTIES THEREFOR, PROVIDING EVIDENTIARY REQUIREMENTS AND PROCEDURES FOR THE EFFECTIVE PROSECUTION OF OFFENDERS, AND INSTITUTIONALIZ ING PROTECTIVE MEASURES FOR RAPE VICTIMS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines \"RAPE\" in more specific terms. Considers rape as a crime against persons, thus prosecution takes effect upon filing of a complaint by any citizen and penalizes the offender with reclusion perpetua if found guilty."
