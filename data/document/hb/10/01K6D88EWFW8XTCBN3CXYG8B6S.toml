congress_website_title = "AN ACT CREATING THE RETIREMENT FUND FOR ALL BARANGAY OFFICIALS; PROVIDING RETIREMENT BENEFITS TO ELECTED AND APPOINTED LOCAL GOVERNMENT OFFICIALS INCLUDING BARANGAY TANODS WHO HAVE RENDERED THREE (3) FULL TERMS, AMENDING FOR THE PURPOSE REPUBLIC ACTNO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Barangay Retirement Fund\" Mandates that all elected and appointed local government officials, INCLUDING BARANGAY TANODS, shall be entitled to GSIS retirement benefits, provided that they have rendered no less than three (3) full terms as elected orappointed barangay official."

