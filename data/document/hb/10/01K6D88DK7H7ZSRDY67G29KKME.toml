congress_website_title = "AN ACT TO DECRIMINALIZE THE CRIME OF VAGRANCY AS DEFINED IN ARTICLE 202, PARAGRAPH 1, 2, 3, AND 4 OF THE REVISED PENAL CODE"
congress_website_abstract = "Seeks to amend Art. 202 of the Revised Penal Code and to read as follows: \"Prostitutes - Women who, for money or for profit, habitually indulge in sexual intercourse or lascivious conduct, are deemed as PROSTITUTES.\" Prescribe penalty upon any person found guilty of this crime."
