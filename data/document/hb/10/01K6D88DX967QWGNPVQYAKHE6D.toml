congress_website_title = "AN ACT AMENDING SECTION 28 OF REPUBLIC ACT NO. 6975, OTHERWISE KNOWN AS 'THE DEPARTMENT OF INTERIOR AND LOCAL GOVERNMENT ACT OF 1990', BY REVERTING TO THEIR FORMER NAMES THE RANK CLASSIFICATIONS IN THE PHILIPPINE NATIONAL POLICE (PNP)"
congress_website_abstract = "REVERTS to their former names of the rank classifications in the Philippine National Police (PNP) which shall read as follows: Commanding General (Director General); Deputy Commanding General (Deputy Director General); General (Director); Colonel (Chief Superintendent) ; Lieutenant Colonel (Senior Superintendent) ; Major (Superintendent ); Captain (Chief Inspector) Second Lieutenant (Inspector)' Master Sergeant (Senior Police Officer III); Staff Sergeant (Senior Police Officer II); Sergeant (Senior Officer I); Patrolman III (Police Officer III); Patrolman II (Police Officer II); Patrolman I (Police Officer I)"

