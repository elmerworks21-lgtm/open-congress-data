congress_website_title = "AN ACT GRANTING ADDITIONAL ALLOWANCES AND OTHER BENEFITS TO BARANGAY NUTRITION SCHOLARS, AMENDING FOR THE PURPOSE SECTION SIX OF PRESIDENTIAL DECREE NUMBERED FIFTEEN HUNDRED AND SIXTY-NINE, ENTITLED 'STRENGTHENING THE BARANGAY NUTRITION PROGRAM BY PROVIDING FOR A BARANGAY NUTRITION SCHOLAR IN EVERY BARANGAY, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Grants additional benefits and allowances to a barangay nutrition scholar, such as: (1) INSURANCE COVERAGE OF THIRTY THOUSAND (P30,000.00) PESOS; (2) SUBSISTENCE ALLOWANCE AND HAZARD PAY OR FIE HUNDRED (P500.00) PESOS A MONTH; (3) FREE MEDICAL AND LEGAL SERVICES; (4) TRAVELING ALLOWANCE OF ONE THOUSAND FIVE HUNDRED (P1,500.00) A MONTH; AND (5) OTHER ALLOWANCES THAT THE MUNICIPALITY MAY GRANT BUT NOT EXCEEDING FIVE HUNDRED (P500.00) PESOS A MONTH."

