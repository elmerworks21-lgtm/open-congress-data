congress_website_title = "AN ACT TO BUILD THE CAPABILITY OF LOCAL GOVERNMENTS TO EFFICIENTLY AND EFFECTIVELY ASSUME THE TASK OF GOVERNANCE"
congress_website_abstract = "Provides for this --- \"SECTION 1. Capability building Program. The Local Government Academy shall develop and implement a regular capability building program for local executives, legislators and government employees. The program shall provide standardized courses in local administration for local executives including provincial governors, city mayors, municipal mayors and barangay chairmen; local legislation for local legislators including provincial board members, city councilors, municipalcouncilors and barangay councilors and the various technical areas of concern in local governance for local government employees.\""

