congress_website_title = "AN ACT PROVIDING THAT THE CONTRACTOR'S PROFIT FOR ALL GOVERNMENT INFRASTRUCTURE PROJECTS SHALL NOT EXCEED TWELVE PERCENT (12%) OF THE CONTRACT PRICE AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED ONE THOUSAND FIVE HUNDRED AND NINETY-FOUR"
congress_website_abstract = "\"SEC. 5 - A. CONTRACT PRICE. - THE CONTRACT PRICE. - THE CONTRACT PRICE SHALL COVER THE COST OF LABOR, EQUIPMENT, MATERIALS, SUPPLIES AND OTHER ITEMS AS MAY BE NECESSARY FOR THE CONSTRUCTION OF THE GOVERNMENT INFRASTRUCTURE PROJECTS THE CONTRACTOR'SESTIMATED PROFIT SHALL NOT EXCEED (12%) OF THE CONTRACT PRICE AS STATED IN THE BID. IN CASE THE NET PROFIT OF THE CONSTRACTOR EXCEEDS TWELVE PERCENT (12%) THE EXCESS SHALL BE DEDUCTED FROM THE CONTRACT PRICE INDICATED IN THE CONTRACTOR'S BID.\""

