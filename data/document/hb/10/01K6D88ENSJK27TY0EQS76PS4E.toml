congress_website_title = "AN ACT PROMOTING THE ORGANIC FERTILIZER INDUSTRY, PLACING TOTAL BAN ON THE USE OF SYNTHETIC FERTILIZERS, PROVIDING PENALTIES THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The ultiate concern here is to improve and maintain the physical, chemical and biological properties of the soil without sacrificing its productivity. States the following --- 'SECTION 2. Total Ban. - It is hereby declared that there is atotal ban on the use of inorganic and synthetic fertilizers in all agricultural farms, owned either by the government or private individuals and/or corporations, whoch are engaged in agricultural farming."

