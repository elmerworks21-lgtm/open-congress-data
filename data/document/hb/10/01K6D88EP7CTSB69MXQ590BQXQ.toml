congress_website_title = "AN ACT PROVIDING FOR A SPECIAL PRIVILEGE TO HONOR GRADUATES OF STATE UNIVERSITIES AND COLLEGES IN THE RECRUITMENT AND SELECTION OF EMPLOYEES TO ENTER THE GOVERNMENT SERVICE"
congress_website_abstract = "\"Honor Graduates Priority Act\" Provides for the following --- \"SEC. 2. Priority in Appointment. - In the recruitment and selection of employees to enter into the Civil Service, priority shall be given to honor graduates of state universities and colleges of the Philippines; Provided, that the honor graduates possess all the minimum qualifications for the position as required under Civil Service laws.\" Prescribes penalties for willful violation of this Act."
