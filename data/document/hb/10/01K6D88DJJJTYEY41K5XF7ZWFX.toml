congress_website_title = "AN ACT REPEALING PARAGRAPH THREE (3) OF SECTION THREE OF PRESIDENTIAL DECREE NO. 1866"
congress_website_abstract = "Repeals the following - \"SEC. 3, paragraph 3 of P>D> 1866, relating to the unlawful manufacture, sale, acquisitions, disposition or possession of explosives in view of the repeal of the Anti-Subversion Law: \"If the violation of this Section is in furtherance of rebellion, insurrection or subversion, the penalty of death shall be imposed.\""
