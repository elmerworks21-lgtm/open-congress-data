congress_website_title = "AN ACT TO AMEND SECTIONS 2 AND 4, AND REPEAL SECTIONS 3, 5, 6, AND 8 OF REPUBLIC ACT NUMBERED SEVEN THOUSAND AND FORTY- ONE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The requirement of publication of the list of all vacant positions by the Civil Service Commission has often caused the delay in the filling up of vacancies in many government offices. The agencies concerned have to post in three (3) conspicuous places of their offices and transmit to the Civil Service Commission a complete list of all existing vacant positions in their respective offices which are authorized to be filled. Seeks to SIMPLIFY the recruitment and appointment process, thereby insuring continuity of service in the event of vacancies."

