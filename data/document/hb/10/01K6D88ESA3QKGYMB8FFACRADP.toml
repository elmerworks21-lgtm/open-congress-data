congress_website_title = "AN ACT TO RESTORE THE INTEGRITY OF THE CHECKS AND FOR OTHER PURPOSES"
congress_website_abstract = "States the following --- \"SECTION 3. MINIMUM LIMIT. All the banks, regardless of classification, are directed to allow the opening of current or checking account with a minimum deposit of P20,000.00 which, at all times should be maintained. Failureof the depositors to maintain this minimum balance for five (5) succeeding days will mean the cancellation of his account and future application for issuance of check booklets will be denied. >Directs all banks to make the necessary INVESTIGATION anddata gathering, including the informaion as to whether the depositor who intends to open a checking account has been, at any time, charged or accused of vioalting BP Bilang 22."

