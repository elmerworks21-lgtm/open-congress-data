congress_website_title = "AN ACT INCREASING THE SHARES OF LOCAL GOVERNMENT UNITS IN THE PROCEEDS OF THE NATIONAL TAXES, AMENDING FOR THE PURPOSE SECTION 284 OF REPUBLIC ACT NUMBERED SEVEN THOUSAND ONE HUNDRED SIXTY (R.A. 7160), OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF1991"
congress_website_abstract = "States that local government units shall share in the national internal revenue taxes based on the third fiscal year collection preceding the current fiscal year as follows: (1) 1st year of effectivity of the Local Government Code - 30%; (2) Secondyear - 35%; (3) Third [year] AND FOURTH YEARS - 40%; and (5) FIFTH YEAR AND THEREAFTER - FIFTY PERCENT (50%)."

