congress_website_title = "AN ACT AMENDING TITLE I OF BOOK II OF THE LABOR CODE OF THE PHILIPPINES, ENTITLED 'HUMAN RESOURCES DEVELOPMENT'"
congress_website_abstract = "\"National Manpower Development Act of 1995\" Seeks to put direction and relevance to the training requirements of the country; amends the membership of the National Manpower and Youth Council. Provides for the formulation of a NATIONAL SKILLS DEVELOPMENT PRIORITIES PLAN that will operationalize the National Manpower Plan; provides for the creation of a network of manpower skills training centers."

