congress_website_title = "AN ACT ESTABLISHING THE SLOPING AGRICULTURAL LAND TECHNOLOGY FARMING PROGRAM, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: To this end, the establishment of programs and farming techniques shall be undertaken to enhance income distribution in rural areas and help the rural poor in pursuing national self-sufficienc y in food production, particularly the hillside farmers. This program shall not only improve the quality of their lives through greater production but shall also be designed to restore and conserve the fertility of the soil. > \"SALT (Sloping Agricultural Land Technology) Farming Program\" > Covers all public and private lands, including ancestral lands devoted to agriculture with a slope of at least five (5) degrees or higher, regardless of the agricultural products raised or can be raised thereon. Provides INCENTIVES to farmers applying tthe SALT farming method."
