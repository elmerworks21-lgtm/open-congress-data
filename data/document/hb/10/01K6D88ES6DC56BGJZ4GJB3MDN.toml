congress_website_title = "AN ACT DECLARING APRIL TWENTY-SEVEN OF EVERY YEAR AS THE BATTLE OF MACTAN DAY AND A SPECIAL NONWORKING NATIONAL HOLIDAY"
congress_website_abstract = "Rationale: On April 27, 1521 in the Battle of Mactan, Lapulapu, our brave warrior defeated Ferdinand Magellan, a Spanish conquistador. > Viewed in the national perspective, the victory of the Filipinos during the Battle of Mactan did not only benefit the people of Cebu, but all the Filipinos in our quest for genuine independence. It is high time that today's generation recognize and honor this historical event."

