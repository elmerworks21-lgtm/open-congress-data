congress_website_title = "AN ACT AMENDING SUBSECTION (c), SECTION TWELVE OF COMMONWEALTH ACT NUMBERED ONE HUNDRED AND EIGHTY-SIX, AS INSERTED BY REPUBLIC ACT NUMBERED ONE THOUSAND SIX HUNDRED AND SIXTEEN AND FURTHER AMENDED BY REPUBLIC ACTS NUMBERED THREE THOUSAND EIGHT HUNDRED AND THIRTY-SIX AND FOUR THOUSAND NINE HUNDRED AND SIXTY-EIGHT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides that --- \"(d) RETIREMENT IS ALSO ALLOWED TO A SENATOR OR MEMBER OF THE HOUSE OF REPRESENTATIVES , REGARDLESS OF AGE; PROVIDED, THAT IN THE CASE OF A SENATOR OR MEMBER HE MUST HAVE SERVED AT LEAST NINE YEARS AS A SENATOR AND/OR MEMBER OF THEHOUSE OF REPRESENTATIVES ; PROVIDED, FURTHER, THAT THE GRATUITY PAYABLE TO A RETIRING SENATOR OR MEMBER OF THE HOUSE OF REPRESENTATIVES SHALL BE EQUIVALENT TO ONE YEAR'S SALARY FOR EVERY THREE YEARS OF SERVICE IN THE GOVERNMENT AND THE SAME SHALL BEEXEMPT FROM ANY TAX WHATSOEVER AND SHALL BE NEITHER LIABLE TO ATTACHMENT OR EXECUTION NOT REFUNDABLE IN THE CASE OF REINSTATEMENT OR REELECTION OF THE RETIREE."

