congress_website_title = "AN ACT ESTABLISHING AN 'ADOPT-A-SCHOOL PROGRAM,' PROVIDING INCENTIVES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes the following Program --- \"SECTION 3. Adopt-a-School Program. - There is hereby established the \"Adopt-a-School Program\" which will allow private companies and enterprises to assist a public elementary school, high scchool or tertiary school including but not limited to (1) staff and faculty development through training and further education; (b) construction of facilities; (c) upgrading and improvement of existing facilities; (d) provision of books, publications and other instructional materials and (e) modernization of instructional technologies; provided, however, that the public elementary school, high school or tertiary school is lcoated preferably in any of the twenty (20) pooresst provinces identified by the Presdidential ccouncil for Countryside Development (PCCD) or any other government agency tasked with identifying the poorest provincesl provided, further, that a school may be adopted by only one company or enterprise.\""
