congress_website_title = "AN ACT ADJUSTING PENSIONS UNDER THE GOVERNMENT SERVICE INSURANCE SYSTEM TO A MINIMUM LEVEL OF SEVEN THOUSAND PESOS (P7,000) UNDER AN ECONOMIC ADJUSTMENT PENSION PROGRAM"
congress_website_abstract = "Increases the pension of retirees under the GSIS to a minimum of P2,000.00 a month and providing to ANNUAL INCREASES of not less than P10,000.00 a month until total monthly pension shall amount to P7,000.00."
