congress_website_title = "AN ACT UPGRADING THE SALARY GRADE OF PUBLIC SCHOOL TEACHERS, AMENDING FOR THE PURPOSE THE COMPENSATION AND POSITION CLASSIFICATION ACT OF 1989, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Unfortunately, the present basic pay of teachers of eight thousand six hundred five pesos (P8,605.00) according to the 1997 Phase of the \"Compensation and Position Classification Act of 1989\", which is salary grade 10 in the scale, is very discouraging. It could hardly maintain a family of four, what with the worsening economy that our nation is presently experiencing. > Proposes to UPGRADE the salary of public schoolteachers to Salary Grade [10] 20."

