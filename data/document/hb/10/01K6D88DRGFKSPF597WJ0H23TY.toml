congress_website_title = "AN ACT EXPANDING THE RULES ON NEPOTISM AND INCREASING THE PENALTIES FOR THE VIOLATION THEREOF, AMENDING FOR THE PURPOSE SECTIONS 59 AND 67, CHARTER 8, BOOK V OF EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE ADMINISTRATIVE CODE OF 1987"
congress_website_abstract = "Excludes from among the exemptions on the rules and nepotism those persons employed in a CONFIDENTIAL CAPACITY; expands the degree of relationship of a RELATIVE from the third to the FOURTH degree of consanguinity or affinity; and increases the penalties for its violation by a fine equivalent to the amount of the offender's ONE YEAR SALARY and by imprisonment not exceeding ONE (1) YEAR WITH PERPETUAL ABSOLUTE DISQUALIFICATIO N FROM PUBLIC OFFICE."

