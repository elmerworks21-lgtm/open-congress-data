congress_website_title = "AN ACT FURTHER AMENDING PRESIDENTIAL DECREE NO. 1467, AS AMENDED, OTHERWISE KNOWN AS THE CHARTER OF THE PHILIPPINE CROP INSURANCE CORPORATION (PCIC), IN ORDER TO MAKE THE CROP INSURANCE SYSTEM MORE STABLE AND MORE BENEFICIAL TO THE FARMERS COVERED THEREBY AND FOR THE NATIONAL ECONOMY"
congress_website_abstract = "\"Revised Charter of the Philippine Crop Insurance Corporation (PCIC) Act of 1995\" Attaches the PCIC to the Department of Agriculture; expands the insurance coverage to include (1) farmers'own labor; (2) that of the members of his household and paidlabor as portions of expected yield or income. States that government share in the premium subsidy shall be limited only to small-scale/sub sistence farmers cultivating not more than seven (7) hectares of land."
