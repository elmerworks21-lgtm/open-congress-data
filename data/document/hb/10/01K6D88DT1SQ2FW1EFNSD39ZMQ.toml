congress_website_title = "AN ACT INCREASING THE PENALTY FOR THE DEMAND OF DEPOSITS OR ADVANCE PAYMENT FOR CONFINEMENT OR TREATMENT OF PATIENTS IN HOSPITALS OR MEDICAL CLINICS AND PROHIBITING THE REFUSAL TO ADMINISTER FIRST AID MEDICAL TREATMENT AND SUPPORT IN EMERGENCY OR SERIOUS CASES, AMENDING FOR THE PURPOSE BATAS PAMBANSA BILANG PITONG DAAN AT DALAWA"
congress_website_abstract = "Increases the penalty for said violation from [one (1) thousand pesos (P1,000.00)] to TEN thousand pesos (P10,000.00), but not more than P50,000.00, or imprisonment of [fifteen (15) days] SIX MONTHS to [thirty (30) days] TWO (2) YEARS."
