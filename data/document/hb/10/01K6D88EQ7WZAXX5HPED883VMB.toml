congress_website_title = "AN ACT INCLUDING A MUNICIPAL AGRICULTURIST IN THE LIST OF MANDATORY MUNICIPAL OFFICIALS, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Municipalities must be equipped to handle efficiently the agricultural programs of the government. Thus, there is a need for a MUNICIPAL AGRICULTURIST to oversee the implementation of these programs and to serve as the voice of farmers/livesto ck producers during consultations with the concerned government agencies."

