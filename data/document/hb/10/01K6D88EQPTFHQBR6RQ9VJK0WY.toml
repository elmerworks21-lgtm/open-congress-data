congress_website_title = "AN ACT EXCLUDING DRUG OFFENSES FROM THE COVERAGE OF THE PROBATION LAW AND DISALLOWING DRUG OFFENDERS FROM AVAILING OF THE PROVISION ON PLEA-BARGAINING , AMENDING FOR THE PURPOSE THE DANGEROUS DRUGS ACT OF 1972, AS AMENDED"
congress_website_abstract = "Rationale: The liberality of our statutes or the misplaces leniency towards drug offenders makes a mockery of our criminal justice system. It is not inconceivable that these same people set free by reason of the Probation Law will again engagin thenefarious activity of drug trafficking and other drug offenses. Declares the following --- \"SEC. 20. Application of Penalties, Confiscation and Forfeiture of the Proceeds or instruments of the Crime. --->xxx xxx xxx > Otherwise, if the quantity involved is less than the foregoing quantities, the penalty shall range from prison correccional to reclusion perpetua depending upon the quanity [.] PROVIDED, THAT WHERE THE PENALTY IMPOSED BY THE COURT IS IMPRISONMENT FOR SIX YEARS OR LESS. THE PROBATTION LAW SHALL NOT APPLY. xxx xxx xxx\" \"SEC. 20-A. Plea-bargaining Provision. - Any person charged under any provision of this Act [where the imposable penalty is reclusion perpetua to death] shall not be allowed to avail of the provision on plea-bar"

