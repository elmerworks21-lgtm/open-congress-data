congress_website_title = "AN ACT INCLUDING THE STUDY OF THE TOP TEN (10) KILLER DISEASES INCLUDING AIDS AS A SEPARATE SUBJECT IN THE EDUCATIONAL CURRICULUM OF FOURTH (4TH) YEAR HIGH SCHOOL STUDENTS IN ALL PUBLIC AND PRIVATE INSTITUTIONS"
congress_website_abstract = "Is based on the premise that one of the reasons for the proliferation of killer diseases is the lack of basic information as to the causes and the manner of its prevention. Aims to reduce the enormous loss of lives brought about by these deadly diseases through the launching of a comprehensive education drive on the top ten (10) killer diseases, including AIDS."

