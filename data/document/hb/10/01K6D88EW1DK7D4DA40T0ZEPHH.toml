congress_website_title = "AN ACT AMENDING TITLE IV, SECTIONS 98,99 AND 101 AND TITLE 11, SECTION 272 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, PROVIDING THE CREATION OF A BARANGAY SCHOOL BOARD, ITS SHARE IN THE APPLICATION OF THE ADDITIONAL ONE PERCENT (1%) SEF, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes the creation of the BARANGAY SCHOOL BOARD with the barangay chairman and the school principal as co-chairmen. Provides, likewise, that the proceeds from the Special Education Fund (SEF) shall be divided AT A RATIO OF 35%, TO THE PROVINCIALSCHOOL BOARD, 40% TO THE MUNICIPAL BOARD, AND 25% TO THE BARANGAY SCHOOL BOARD."

