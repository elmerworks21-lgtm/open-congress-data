congress_website_title = "AN ACT ADOPTING A COMPUTERIZED SYSTEM OF ELECTION FOR THE 1998 GENERAL ELECTIONS AND SUBSEQUENT ELECTIONS, PLEBISCITES, REFERENDA, RECALL AND OTHER ELECTORAL EXERCISES, AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF BATAS PAMBANSA BLG. 881, AS AMENDED, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE"
congress_website_abstract = "Rationale: On June 7, 1995, Congress passed into law R.A. No. 8046, authorizing the COMELEC to conduct a nationwide demonstration of a computerized election and pilot-test it in the September 9, 1996 elections in the Autonomous Region in Muslim Mindanao. The pilot-testing serves as the preparatory exercise for a nationwide implementation of a computerized election system. Such system is envisioned to fully modernize and improve our electoral processes and thereby minimize, if not prevent altogether, incidents of fraud and other irregularities. Provides for these areas of concern: (1) Use of the AIS-150 Optical Scanner; (2) Printing and distribution of official ballots; (3) Examination and testing of counting machineries; and (4) Electionn offenses."
