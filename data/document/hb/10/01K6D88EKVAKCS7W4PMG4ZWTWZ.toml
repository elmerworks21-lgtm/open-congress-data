congress_website_title = "AN ACT GRANTING THIRTY PERCENT (30%) OF THE THREE HUNDRED FIFTY-SIX MILLION DOLLAR ($356 Million) DEPOSITS IN SWISS BANKS OF THE MARCOS' FAMILY TO THE VICTIMS OF HUMAN RIGHTS VIOLATION DURING THE MARCOS ERA AND, IN THE PROCESS, AMENDING SECTION 63(b) OF REPUBLIC ACT NO. 6657"
congress_website_abstract = "Provides for the following --- \"Section 1. thirty percent (30%) of thee three hundred fifty-six million dollars ($356 Million) deposits including interest earnings in Swiss banks of the Marcos' family shall be awarded to the victims of human rightsviolation during the Marcos era.\" \"Section 2. The President is hereby authorized to create a body which shall be vested the function of managing the amount granted, processing of claims by the victims and ensuring that the amount if equitably distributed among the claimants.\" \" Section 3. Within one year after its creation, the body shall sbumit to the President and Congress a copy of the results of its accomplishments .\""
