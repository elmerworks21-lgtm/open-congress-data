congress_website_title = "AN ACT INCREASING THE PRIVILEGES OF THE SANGGUNIANG KABATAAN OFFICIALS AND AMENDING FOR THE PURPOSE SECTION 434 OF REPUBLIC ACT NO. 7160"
congress_website_abstract = "Seeks to INCREASE the privileges of the Sangguniang Kabataan officials by entitling them to the following --- (1) insurance coverage; (2) free medical care, including subsistence, medicines and medical attendance; (3) appropriate civil service eligibilities; and (4) preference in appointment to any government position."

