congress_website_title = "AN ACT VESTING THE NATIONAL AND REGIONAL COMPETITIVE SPORTS UNDER THE JURISDICTION OF THE PHILIPPINE SPORTS COMMISSION"
congress_website_abstract = "Transfers the aspect of national and regional competitive sports and athletics from the DECS to the Philippine Spots Commission. Provides, however, for the retention of the jurisdiction of the DECS over school sports and athletics at intramural anddistrict levels only."

