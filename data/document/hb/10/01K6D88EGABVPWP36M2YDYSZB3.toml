congress_website_title = "AN ACT REQUIRING APPLICANTS FOR MARRIAGE LICENSE TO UNDERGO ACQUIRED IMMUNE DEFICIENCY SYNDROME (AIDS) TEST IN ANY PUBLIC OR DULY ACCREDITED PRIVATE HOSPITAL OR MEDICAL CLINIC BEFORE THE ISSUANCE OF A MARRIAGE LICENSE, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NUMBERED TWO HUNDRED NINE OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Rationale: The spread of AIDS, especially among small chidlren, is a major health crisis that must be dealt with immediately. Preventive measures must be taken to solve this malady. The mandatory requirement for couples to undergo AIDS test beforethe issuance of a marriage licensed is a guarantee that the offsprings to be born are healthy and free from the debilitating virus."

