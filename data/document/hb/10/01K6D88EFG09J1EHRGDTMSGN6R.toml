congress_website_title = "AN ACT TO BUILD THE CAPABILITY OF LOCAL GOVERNMENTS TO EFFICIENTLY AND EFFECTIVELY ASSUME THE TASK OF GOVERNANCE"
congress_website_abstract = "Seeks to build the capability of local governments to efficiently and effectively assume the task of governance. Provides, therefore, for the establishment of a LOCAL GOVERNMENT ACADEMY which shall develop and implement a regular management and skills building program for local executives, legislators and government employees."

