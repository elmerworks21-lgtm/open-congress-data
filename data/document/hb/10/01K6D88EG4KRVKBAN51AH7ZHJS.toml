congress_website_title = "AN ACT ADOPTING THE COMMUNITY-BASED FOREST MANAGEMENT (CBFM) PROGRAM, CREATING A CBFM STEERING COMMITTEE FOR THE PURPOSE, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Prescribes the COMMUNITY-BASED FOREST ACTION PLAN for this purpose. A community-based forest management approach recognizes that only with the mobilization and empowerment of the people who have a direct stake in the sustained life of a forest canthe same be protected, rehabilitated and effectively managed. It also recognizes that there is a need to develop working partnerships with the people who inhabit the forest lands and forested areas to uplift their standard of living at the same timeprotecting the natural heritage of the country."

