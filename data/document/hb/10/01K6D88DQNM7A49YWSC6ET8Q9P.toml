congress_website_title = "AN ACT RESTORING TO THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION (PAGCOR) THE EXCLUSIVE AUTHORITY TO OPERATE CASINO ESTABLISHMENTS THROUGHOUT THE COUNTRY INCLUDING SPECIL ECONOMIC ZONES, AND REPEALING ALL OTHER EXISTING LAWS PROVIDING FOR THE COONTRARY"
