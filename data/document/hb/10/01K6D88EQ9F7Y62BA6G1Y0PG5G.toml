congress_website_title = "AN ACT REDUCING THE AMUSEMENT TAX ON GROSS RECEIPTS FROM ADMISSION FEES OF THEATERS AND CINEMAS FROM THIRTY(30%) TO TEN PERCENT(10%), AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: For a few pesos, moviegoers tend to forget their worries even for a few hours and had themselves immersed in the loftiness or inanities of foreign or local movies. It is, therefore, only fair and just that we give due recognition and/or incentives to filmmakers to encourage them to produce more meaningful movies. This bill is a step in this direction."

