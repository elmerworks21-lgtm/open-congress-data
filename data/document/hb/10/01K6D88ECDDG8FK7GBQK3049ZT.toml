congress_website_title = "AN ACT AUTHORIZING THE FIBER INDUSTRY DEVELOPMENT AUTHORITY TO ORGANIZE AND IMPLEMENT A FIVE-YEAR NATIONAL ABACA PRODUCTION PROGRAM IN ALL ABACA PRODUCING REGIONS OF THE COUNTRY, AND APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Prescribes the components of the proposed NATIONAL ABACA PRODUCTION PROGRAM: (1) Conducts researches related to crop production, crop improvement and crop protection; (2) Seedbanks development and maintenance; (3) Strengthening of extension servicesand manpower development; (4) Institutionaliz ation of Farmer's Field School on Abaca; (5) Establishment of Techno-Demo Centers; (6) Planting materials production and distribution; and (7) Integrated pest management on abaca."

