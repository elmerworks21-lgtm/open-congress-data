congress_website_title = "AN ACT GRANTING STATE RECOGNITION AND ASSISTANCE TO OUTSTANDING MEMBERS AND ORGANIZATIONS OF THE PHILIPPINE PRIVATE PRINT AND ELECTRONIC MEDIA"
congress_website_abstract = "\"The Law on State Recognition of Media\" Aims among others to --- (1) convey to the Philippine media fraternity the State's recognition of their vital role in the country's development and economic resurgence; (2) encourage media, as a watchdog of government and a vanguard of law and justice, to continue monitoring government actions or inactions. Explains tht State recognitio shall be in the form of a Presidential trophy, plaque, or citation. Each awardee shall be allowed a study grant, or a cash prize; or a survivorship pension, cash assistance and employment and scholarship privileges, in posthumous cases."

