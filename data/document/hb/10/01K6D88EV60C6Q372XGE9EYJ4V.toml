congress_website_title = "AN ACT LIFTING THE BAN ON THE SLAUGHTER OF CARABAOS, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED ELEVEN ENTITLED \"AN ACT TO PROHIBIT THE SLAUGHTERING OF MALE AND FEMALE CARABAOS, HORSES, MARES AND COWS\""
congress_website_abstract = "Rationale: The following reasons have been advanced for the lifting of the ban: (1) It is ineffective; (2) EO 626 is conducive to violations; it cannot be relied upon to increase carabao population; and (3) The situation is still the same with or without the ban. > If the government wants to enhance the role of carabaos in Philippine agriculture, it should instead expand and improve the products that could be derived from carabao. The ban limits this product to draft services. Researches haveproven that the animal could be an important source of meat and milk. If this potential is fully exploited, it would go a long way in promoting equitable rural development."

