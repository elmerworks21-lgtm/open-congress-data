congress_website_title = "AN ACT PRESCRIBING URGENT RELATED MEASURES TO EFFECTIVELY CARRY OUT AGRICULTURAL DEVELOPMENT IN THE COUNTRYSIDE TO ADDRESS THE IMPLICATIONS OF THE GENERAL AGREEMENT ON TARIFFS AND TRADE ON THE ECONOMY THROUGH THE ACCELERATION OF THE INTEGRATED IRRIGATION PROGRAM, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Irrigation Crisis Act of 1995\" Empowers the President to enter into negotiated contracts for the construction, repair, rehabilitation, improvement or maintenance of irrigation projects and facilities; sets the budget of the National Irrigation Administration to P600 M for 1996 and P400 M for 1997."
