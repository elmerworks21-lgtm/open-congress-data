congress_website_title = "AN ACT GRANTING CIVIL SERVICE ELIGIBILITY TO ALL MEMBERS OF THE SANGGUNIANG BAYAN, SANGGUNIANG PANLUNGSOD, AND SANGGUNIANG PANLALAWIGAN WHO HAVE SERVED FOR AT LEAST ONE (1) TERM IN THEIR RESPECTIVE SANGGUNIANS"
congress_website_abstract = "Provides for the following --- \"SECTION 1. Any provision of Republic Act No. 6850 and other similar laws to the contrary notwithstanding , all members of the Sangguniang Bayan, Sangguniang Panlungsod, and Sangguniang Panlalawigan, shall be granted automatic civil service eligibility provided: (1) they have served at least one (1) term in their respective sanggunians; (2) they are baccalaureate degree holders; (3) they have no other eligibilities; and (4) they possess the necessary qualifications and none of the disqualificatio ns as provided by the law."

