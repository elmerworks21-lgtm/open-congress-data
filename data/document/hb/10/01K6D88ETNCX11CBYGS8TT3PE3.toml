congress_website_title = "AN ACT AMENDING SECTION 14 OF REPUBLIC ACT NO. 8180, OTHERWISE KNOWN AS THE 'DOWNSTREAM OIL INDUSTRY DEREGULATION ACT OF 1996'"
congress_website_abstract = "Rationale: Allegations of apparent arbitrary decisions to icnrease the prices by suppliers of petroleum products stem from the fact that there is no agency in government that determines what is \"reasonable\" regarding oil products. This is an omission in RA 8180 which this bill proposes to cure. > Declares that THE AUTHORITY TO DETERMINE THE REASONABLENESS OF PRICING PETROLEUM PRODUCTS SHALL BE EXERCISED BY THE ENERGY REGULATORY BOARD (ERB)."

