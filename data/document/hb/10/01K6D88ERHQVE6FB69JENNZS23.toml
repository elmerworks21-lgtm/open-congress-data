congress_website_title = "AN ACT RESTORING THE AUTHORITY OF THE BUREAU OF LABOR RELATIONS OVER APPEALS IN CERTIFICATION ELECTION CASES, AMENDING FOR THE PURPOSE ARTICLE 259 OF THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to amend Art. 259 of PD 442, Labor Code of the Philippines, to read as follows: \"Art. 259. Appeal from certification electio orders. Any party to an election may appeal order or results of the election as determined by the Med-Arbiter [directly to the Secretary of Labor and Employment] TO THE BUREAU DIRECTOR on the ground that the rules and regulations or parts thereof established by the Secretary of Labor and Employment for the conduct of the election have been vioalted. Such appeal shall be decided within fifteen (15) calendar days."

