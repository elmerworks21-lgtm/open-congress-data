congress_website_title = "AN ACT TO AMEND SECTION 31, REPUBLIC ACT NUMBERED SEVEN THOUSAND SIX HUNDRED AND FIFTY-NINE, AND FOR OTHER PURPOSES (RA 7659: death penalty, heinous crimes, penal code)"
congress_website_abstract = "Intends to shorten the waiting period for execution of a convict from one (1) year to only SIX (6) MONTHS. Is based on a premise that these convicts have been found guilty beyond reasonable doubt and it is not just to prolong the waiting period of their execution since their victims and their familiies either end up dead or suffer a lifetime trauma."

