congress_website_title = "AN ACT PROHIBITING THE USE OF WOOD AS A MAJOR COMPONENT IN THE CONSTRUCTION OF PUBLIC AND PRIVATE BUILDINGS AND INFRASTRUCTURE WITHIN A PERIOD OF TWENTY (20) YEARS"
congress_website_abstract = "Mandates that henceforth, wood SHALL NOT be used as a major component in the construction of public and private buildings on other infrastructure. States that the prohibition shall be for a period twenty (20) years from approval of this Act; prescribes penal sanctions."

