congress_website_title = "AN ACT TO STRENGTHEN DEVELOPING AND FINANCIALLY DISTRESSED HIGHER EDUCATION INSTITUTIONS THROUGH THE EXTENSION OF SPECIAL PROGRAMS AND EMERGENCY ASSISTANCE, PROVIDING FOR MECHANISMS OF IMPLEMENTATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Developing Institutions and Emergency Assistance Act of 1996\" Applies to both public and private higher education institutions, inlcuding chartered state colleges and universities, CHED-supervised (Commission on Higher Education) institutions, community colleges, as well as degree-granting programs in all post-secondary educational institutions, public and private. Provides for these concerns: (1) Eligibility for Special Assistance; (2) Grants and Awards; (3) Emergency Assistance - Nature andPurpose of Assistance; etc."

