congress_website_title = "AN ACT TO INSTILL DISCIPLINE AMONG THE MEMBERS OF THE PHILIPPINE NATIONAL POLICE BY EMPOWERING THE NATIONAL POLICE COMMISSION TO OVERSEE ITS INTERNAL ADMINISTRATIVE MACHINERY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares that the National Police Commission (NAPOLCOM) shall decide cases on appeal from decisions rendered by the REGIONAL NAPOLCOM OFFICES. The NAPOLCOM Regional Offices shall acquire EXCLUSIVE ORIGINAL JURISDICTION over any complaint by an individual person against any member of the PNP. The offenses covered are those punishable by (1) withholding of privileges; (2) restriction to specified limits; (3) suspension or forfeiture of salary."
