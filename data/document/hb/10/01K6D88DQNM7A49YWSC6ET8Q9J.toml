congress_website_title = "AN ACT INSTITUTIONALIZ ING PEOPLE POWER IN THE LOCAL GOVERNMENT LEGISLATIVE BODIES BY REQUIRING THEM TO INCLUDE IN THEIR ORDER OF BUSINESS OF ALL REGULAR SESSIONS A MANDATORY TIME TO BE KNOWN AS 'PEOPLE'S HOUR' OR 'ORAS NG BAYAN'"
