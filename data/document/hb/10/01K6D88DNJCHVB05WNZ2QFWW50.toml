congress_website_title = "AN ACT DEFINING THE CRIME OF ART FORGERY, PROVIDING PENALTIES THEREOF, AND CREATING THE ART AUTHENTICATION BOARD, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Art Forgeries Act of 1995\" Defines the crime of art forgery with the hope of eliminating much confusion as if clearly spells out the specific act that would constitute such crime. Creates an Art Authentication Baord which shall have the authority to certify works of art for registration as mandated by the intellectual property law. Seeks to erase most of the vagueness, misinterpretati on and loopholes that have plagued cases of art forgeries for years."
