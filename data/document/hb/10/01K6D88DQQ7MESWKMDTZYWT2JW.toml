congress_website_title = "AN ACT GRANTING FRANKING PRIVILEGE TO PRIVATE CITIZENS WITH RESPECT TO COMMUNICATIONS PERTAINING TO PROPOSED AMENDMENTS TO THE CONSTITUTION"
congress_website_abstract = "Provides that all mail matters of private citizens addressed to the Committee on Constitutional Amendments of the Senate and the House of Representatives for the purpose of communicating their views and opinions regarding issues pertaining to the Constitution shall be received, transmitted and delivered free of POSTAGE, subject to the provision that said mail matters be addressed to the aforesaid Committee."

