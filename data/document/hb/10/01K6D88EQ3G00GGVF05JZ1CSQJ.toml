congress_website_title = "AN ACT PROVIDING FOR THE PREVENTION AND CONTROL OF THE HUMAN IMMUNODEFICIENC Y VIRUS (HIV) AND ACQUIRED IMMUNITY DEFICIENCY SYNDROME (AIDS) BY REQUIRING AN 'AIDS CLEARANCE CERTIFICATE' (ACC) FROM SEX WORKERS, AND PRESCRIBING PENALTIES FOR VIOLATIONSTHEREFOR"
congress_website_abstract = "Rationale: The government has formulated the AIDS Prevention and Control Program under the DOH and has implemented the \"Stop-AIDS\" information campaign, among others, to promote people's awareness and to understand AIDS for its prevention. Moreover,existing laws require sex workers to seek health clearances and working permits from local government. Unfortunately, reports even revealed majority of sex entertainers are working with the necessary license. Thus, AIDS continue to pose a threat topublic health. Given all these, it becomes necessary to strenghten the power and widen the manpower of the Department of Health to ensure that the spread of AIDS is minimized. \"AIDS Control Act of 1997\" Provides for the creation of an HIV/AIDS ACC (( Aids Clearance Certificate) DIVISION in the Dept. of Health which shall conduct checkup and physcial examination of sex workers and to issue or cancel the ACC. Provides. likewise, for the requirements of issuance of the ACC."

