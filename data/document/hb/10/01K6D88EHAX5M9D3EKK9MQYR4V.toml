congress_website_title = "AN ACT PROVIDING FOR COMMUNITY-BASED FOREST MANAGEMENT AND ITS IMPLEMENTING MECHANISMS"
congress_website_abstract = "\"Community-base d Forest Management Act\" Provides for a COMMUNITY-BASED FOREST ACTION PLAN which shall consider the following issues: (a) Scope and mechanism of community participation in the protection, conservation, access, use and development ofnatural resources in the area; (b) Prevention of degradation of the area and maintenance of ecological balance therein; (c) Protection and maintenance of community rights over livelihood sources; (d) Provision of mechanisms for resolving overlappingclaims, resource use, privileges and boundary conflicts; (e) Procedures for allocating land to individual claims; and (f) Provision for sharing benefits derived from the use of resources."

