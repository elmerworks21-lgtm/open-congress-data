congress_website_title = "AN ACT TO PROMOTE RURAL HEALTH BY PROVIDING FOR AN ACCELERATED PROGRAM FOR THE CONSTRUCTION OF A POTABLE WATER SUPPLY SYSTEM IN EVERY BARANGAY IN THE COUNTRY WITHIN THREE YEARS"
congress_website_abstract = "Provides for an accelerated program for the CONSTRUCTION OF A POTABLE WATER SUPPLY SYSTEM IN EVERY BARANGAY IN THE COUNTRY WITHIN THREE YEARS, through the Department of Social Welfare and Development in coordination with the Department of Health andthe Deaprtment of Public Works and Highways. Such program shall give priority to areas with social and health problems brought about by water-borne diseases."

