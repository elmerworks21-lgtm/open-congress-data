congress_website_title = "AN ACT EXTENDING THE SPECIAL TIME ALLOWANCE FOR LOYALTY TO THOSE PRISONERS WHO CHOOSE TO STAY IN THE PENAL INSTITUTION WHERE THEY ARE DETAINED ON THE OCCASION OF A DISORDER, CONFLAGRATION, EARTHQUAKE, OR OTHER CALAMITIES, AMENDING ARTICLE 98 OF THEREVISED PENAL CODE FOR THE PURPOSE"
congress_website_abstract = "Proposes the following --- \"Art. 98. Special time allowance for loyalty - A deduction of one-fifth of the period of his sentence shall be granted to any prisoner who, having evaded his sentence under the circumstances mentioned in article 158 of this Code, gives himself up to the authorities within 48 hours following the issuance of a proclamation announcing the passing away of the calamity or catastrophe referred to in said article. THIS BENEFIT SHALL, LIKEWISE, BE EXTENDED TO THOSE WHO CHOOSE TO REMAIN IN THE PENAQL INSTITUTION WHERE THEY ARE DETAINED FOR THE DURATION OF SUCH DISORDER, CONFLAGRATION, EARTHQUAKE OR OTHER CALAMITY.\""

