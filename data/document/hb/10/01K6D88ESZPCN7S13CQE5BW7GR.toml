congress_website_title = "AN ACT RATIONALIZING THE ORGANIZATION AND FUNCTIONS OF GOVERNMENT AGENCIES RELATED TO WATER, ABOLISHING THE NATIONAL WATER RESOURCES BOARD, CREATING THE WATER RESOURCES AUTHORITY OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The State recognizes the existence of a national water crisis. It is hereby declared the policy of the State to adopt urgent and effective measures to address the national water crisis, as well as measures for the long-term sustainable management of scarce water resources. To achieve this purpose, the utilization and development of water resources must be rationalized and optimized through an integrated approach to planning, development and regulation of the water sector. \"The WaterResources Authority of the Philippines Act of 1997\" \"The Authority shall be the catalyst for the formulation of a national framework for water resources management based on a decentralized, community-based and participatory approach. The Authority,shall create an environment conducive to increased private sector participation in water resources development. The Authority shall facilitate the preparation, integration, coordination, and supervision of all plans, programs, projects, and activitie"

