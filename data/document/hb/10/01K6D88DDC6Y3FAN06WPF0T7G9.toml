congress_website_title = "AN ACT TO IMPLEMENT THE DEREGULATION OF THE DOWNSTREAM OIL INDUSTRY PURSUANT TO REPUBLIC ACT NUMBERED SEVENTY-SIX HUNDRED AND THRITY-EIGHT AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines the term \"DOWNSTREAM OIL INDUSTRY\" as used in this Act; Contains these featuares: (1) Fixes the OPSF accrued balance at P2 Billion; (2) amends RA 6173 to propose the adoption of an appropriate formula to be approved through a public hearing;and (3) sets price ceilings to provide safeguard measures for consumers."
