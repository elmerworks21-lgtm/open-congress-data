congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 5173, ESTABLISHING THE PHILIPPINE COAST GUARD AS A SEPARATE AND DISTINCT SERVICE AND ATTACHING THE SAME TO THE DEPARTMENT OF TRANSPORTATION AND COMMUNICATIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The urgent need to separate and professionalize the PCG has time and again been brought to fore by compelling events and disasters that continue to plague the country's maritime industry. Costly accidents at sea with thousands of lives lost, unabated environmental degradation, destruction of maritime resources, deadly red tide, and the recent fishkills at Manila Bay and Laguna Lake have made the separation of the Philippine coast Guard relevant and imperative. \"The Philippine coast guard Law of 1996\" Proposes to SEPARATE the PCG from the Philippine Navy and attach it to the DOTC."

