congress_website_title = "AN ACT LEVELLING THE PLAYING FIELD IN THE OIL INDUSTRY BY REMOVING THE TARIFF DIFFERENTIAL BETWEEN IMPORTED CRUDE OIL AND IMPORTED REFINED PETROLEUM PRODUCTS BY AMENDING SECTION 5, PARAGRAPH (b) OF REPUBLIC ACT NO. 8180, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: As we now experience, this difference in tariff rates betwen imported crude oil and imported refined petroleum products, unwittingly provided a built-in-advant age for the three existing oil refineries in the country and eliminating competition which is a must in a free enterprise economy. Moreover, it created a disincentive for other players to engage even initially in the importation and distribution of refined petroleum products and ultimately in the putting up of refineries. This tariff differential virtually created a monopoly of the downstream oil industry by the existing three oil companies as shown by their uniform and capricious pricing of their products since this law took effect, to the great disadvantage of the conssuming public.> Thus, instead of achieving the desired effects of deregulation, that of free enterprise and a level playing field in the downstream oil industry, RA 8180 has created an environment conducive to cartelization, unfavorable, increased,"

