congress_website_title = "AN ACT PROVIDING RETIREMENT BENEFITS TO ALL BARANGAY OFFICIALS, AMENDING FOR THE PURPOSE SECTION 393 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: The present laws, Republic Act No. 7160 and Republic Act No. 6942 while providing benefits to elected local officials overlooked an equally important aspect in government service which is retirement. With this bill the much needed assistance to our outgoing barangay officials will ultimately be met. Provides, therefore, for the following --- \"SECTION 393. Benefits of Barangay Officials - xxx > (b) The punong barangay, the sangguniang barangay members, the barangay treasurer, and thebarangay secretary shall also: > (6) BE ENTITLED TO RETIREMENT BENEFITS FROM THE GSIS AFTER HAVING SERVED FOR AT LEAST NINE (9) YEARS OF CUMULATIVE SERVICE > PROVIDED, HOWEVER THAT A CERTAIN PERCENTAGE OF THE TOTAL OF THEIR MINIMUM BASIC ALLOWANCE ANNNUALLY SHALL BE REMITTED TO THE GSIS IN ACCORDANCE WITH THE PROGRAM WHICH THE GSIS WILL ESTABLISH FOR THE PURPOSE; > PROVIDED, FURTHER THAT AT THE END OF NINE YEARS THE GSIS SHALL PAY THEM A LUMP SUM BENEFIT EQUIVALENT TO FIVE THOUSAND (P5,000.00) F"

