congress_website_title = "AN ACT ESTABLISHING THE PRESIDENT'S NATIONAL QUALITY AWARD IN ORDER TO ENCOURAGE PHILIPPINE BUSINESS AND OTHER ORGANIZATIONS TO ATTAIN EXCELLENCE IN QUALITY IN THE PROVISION OF THEIR GOODS AND SERVICES"
congress_website_abstract = "\"President's National quality Awards Act\" Aims to --- (1) provide for the establishment and conduct of a national quality improvement program under which awards are given to selected companies and other organizations that practice effective quality management and as a result make significant improvements in the quality of their goods and services; and (2) generate and obtain useful information about successful strategies and programs for improving quality of goods and services which can be disseminated to other companies and organizations. > Provides for (1) Making and Presentation of the Award; (2) Categories for the Grant of the Award; (3) Criteria for Qualification."

