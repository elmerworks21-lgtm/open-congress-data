congress_website_title = "AN ACT CREATING THE CENTER FOR LEADING-EDGE EDUCATIONAL TECHNOLOGIES, AUTHORIZING THE APPROPRIATION OF FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Charter of the Leading-Edge Educational Technologies Center\" Creates a non-stock, non-profit, non-sectoral and non-political corporate body to be known as the CENTER FOR LEADING-EDGE EDUCATIONAL TECHNOLOGIES that will implement the State policy tonationwide and integrate a comprehensive approach in bringing together the academic, technological and economic forces which will promote the educational promise of appropriated and affordable technologies and other related sciences or fields of endeavor."

