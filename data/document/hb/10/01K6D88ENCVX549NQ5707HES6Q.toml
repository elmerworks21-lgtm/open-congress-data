congress_website_title = "AN ACT WHICH SEEKS TO PRIORITIZE INVESTMENTS IN PRIMARY EDUCATION OVER THE SECONDARY AND TERTIARY EDUCATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Primary Education Priority Investment Act of 1996\" Aims to shift government spending from secondary and tertiary edcuation TO PRIMARY EDUCATION. States the INVESTMENT PRIORITY for this purpose as follows: (a) Funds for secondary and tertiary education shall be limited to the maintenance of existing facilities with no new construction being authorized until succh time that the provisions of paragraph (b) hereof shall have been complied with; and (b) Funds remaining shall be used for primary education, particularly, in the construction andd maintenance of school buildings and facilities, provision of equipments and improvement of teaching, instructional materials and curriculum especially in areas where such are inadequate and until such tiime as the need for such for all localities nationwide shall have been met."

