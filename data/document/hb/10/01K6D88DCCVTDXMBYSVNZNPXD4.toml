congress_website_title = "AN ACT INSTITUTIONALIZ ING A NATIONAL STRATEGY FOR POVERTY ALLEVIATION"
congress_website_abstract = "Underscores the policy of the State to adopt an area-based, holistic and focused intervention to poverty alleviation directed at providing every poor Filipino family its minimum basic needs. Identifies the thrusts of said poverty alleviation interventions, namely; (1) The revival of economic growth to create employment and community-livel ihood opportunities; (2) The development of competitive labor-intensive industries and agriculture, safety nets, and the ensured access of the poor to productive resources; and (3) Expansion of the scope and improvement of the quality of social services. Provides for the creation of the NATIONAL COMMISSION ON POVERTY ALLEVIATION (NCPA) which shall ensure the implementation of all programs related to poverrty alleviation. States the functions and responsibilitie s of the NCPA; provides for its composition, organizational structure, as well as those of the Provincial Commissions."
