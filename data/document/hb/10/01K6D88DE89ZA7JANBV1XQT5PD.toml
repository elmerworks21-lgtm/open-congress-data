congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION AND PRESERVATION OF PHILIPPINE CULTURAL HERITAGE, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Philippine Cultural Heritage Law of 1995\" States that the prime duty of the people and the present generation in sustaining and maintaining the fullest meaning of its nationhood is to restore, develop and preserve the nation's cultural properties and attributes. Strengthens the cultural institutions by regulating the transfer of cultural properties and requiring appropriate registration thereof."

