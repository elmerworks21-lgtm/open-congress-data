congress_website_title = "AN ACT TO INCREASE THE RETIREMENT PAY OF PNP PERSONNEL, AMENDING FOR THE PURPOSE SECTION SEVENTY-FIVE OF REPUBLIC ACT NUMBERED SIXTY NINE HUNDRED AND SEVENTY-FIVE (police)"
congress_website_abstract = "Amends Section 75 of RA 6975 to read as follows: \"Section 75. Retirement Benefits. Monthly retirement pay shall be fifty percent (50%) of the base pay and longevity pay of the retired grade in case of twenty (20) years of active service, increasingby two and one-half percent (2.5%) for every year of active service rendered beyond twenty (20) years to a maximum of ninety percent (90%) for thirty-six (36) years of active service. IT SHALL LIKEWISE, INCLUDE THE SUBSISTENCE AND COST OF LIVING ALLOWANCES, AND HAZARD PAY AUTHORIZED IN SECTION SEVENTY-ONE OF THE SAME ACT.\""
