congress_website_title = "AN ACT REPEALING SECTION 2307, AS AMENDED, AND AMENDING SECTIONS 2612, 3601 AND 3602 OF THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Underscores the need to strictly enforce anti-smuggling laws. One way is to REPEAL Section 2307 of the Tariff and Customs Code, thereby REVOKING the authority of the Customs Commission or collectors to settle seizure cases. Intends, likewise, to amend Section 2612, thereby forestalling situations of smuggling with the use of dummies."

