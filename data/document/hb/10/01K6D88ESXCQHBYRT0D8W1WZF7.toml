congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE SCIENCE HERITAGE CENTER, AND APPROPRIATING FUNDS FOR THE PURPOSE"
congress_website_abstract = "Provides for the creation of the PHILIPPINE SCIENCE HERITAGE CENTER which shall \"highlight the country's contributions to the world of science and elicit a sense of pride in evey Filipino who learns of these accomplishments .\" The Center shall --- (1) Document the work of Filipino scientists, ideas, inventions, and products which have had a significant impact on the improvement of human lives; (2) Establish a display area for samples of inventions and products, memorabilia, and references (library); (3) Produce printed materials to be used by schools in teaching values education with scientific insights. These materials will also serve as an alternative source of information for people unable to visit the Center; and (4) Serve as the coreof the network of science museums in the Philippines."

