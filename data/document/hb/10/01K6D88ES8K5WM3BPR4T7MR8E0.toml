congress_website_title = "AN ACT TO FURTHER AMEND ACT NO. 2655, AS AMENDED, OTHERWISE KNOWN AS THE USURY LAW AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Commonwealth Act Number 2655, more commonly known as the Usury Law was put out statute books to eradicate a virulent social cancer, which was to prevent the imposition of exorbitant or unreasonable interest rates. However, due to the amendments made upon the Usury Law by Presidential Decrees 116 and 1684, this social legislation lost its effectiveness. The amendments empowered the Monetary Board to impose ceiling on the interest rates that lenders are allowed under various sections of the Usury Law. However, under the present state of the law, the Monetary Board did not place any ceiling on the interest rates. Without these ceilings, any interest rate had become legally binding between the lender and the borrower. Seeks, therefoore, to AMEND the Usury Law with the following amendment: \"SECTION 1. The rate of interest for loans or forbearance of any money, goods, or credits and the rate allowed in judgments, in the absence of express contract as to such rate of interest, sh"

