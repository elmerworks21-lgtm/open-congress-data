congress_website_title = "AN ACT DECRIMINALIZING CERTAIN ACTS OF VAGRANCY, AMENDING FOR THIS PURPOSE ARTICLE 202 OF ACT NO. 3815 AS AMENDED, OTHERWISE KNOWN AS 'THE REVISED PENAL CODE'"
congress_website_abstract = "Seeks to correct the existing situation where \"the Philippines continues to regard vagrancy as a crime at the expense of various constitutional rights. Amends, therefore, the definition of \"VAGRANTS\" under the Revised Penal Code to mean any person having no apparent means of subsistence, who has the physical ability to work and which DELIBERATELY neglects to apply himself or herself to some lawful calling."
