congress_website_title = "AN ACT PROMOTING THE EXPLORATION, DEVELOPMENT AND PRODUCTION OF GEOTHERMAL RESOURCES"
congress_website_abstract = "\"Geothermal Resources Act of 1995\" Declares the Government's power to directly explore, develop and exploit geothermal resources. Provides for other concerns, such as: (1) Execution of Contracts; (2) Publicity of Related Activities; (3) Nature of Geothermal Contracts; (4) Obligations of the Service; (5) Sharing of the National and Local Governments; etc."

