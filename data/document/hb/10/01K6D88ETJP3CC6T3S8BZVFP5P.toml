congress_website_title = "AN ACT INCREASING THE PENALTY FOR THE CRIME OF GRAVE COERCIONS AMENDING FOR THE PURPOSE ARTICLE 286 OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "Amends ARt. 286 of the Revised Penal Code to read as follows: \"Art. 286. Grave Coercion. The penalty of arresto mayor in ITS MAXIMUM PERIOD and a fine not exceeding FIVE THOUSAND PESOS (P5,000.00) shall be imposed upon any person who, without authority of law, shall, by means of violence, prevent another from doing something against his will, whether it be right or wrong. > If the coercion be committed for the purpose of compelling another to perform any religious act or to prevent him from doing so, the penalty (next higher in degree) OF PRISON CORRECCIONAL IN ITS MEDIUM PERIOD shall be imposed.\""

