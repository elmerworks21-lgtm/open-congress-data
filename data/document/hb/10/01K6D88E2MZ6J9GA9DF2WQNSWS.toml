congress_website_title = "AN ACT CREATING SPECIAL CRIMINAL TAX COURTS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Declares that criminal tax courts of the same level as the Sandiganbayan and possessing all the inherent powers of a court of justice shall be created under the Supreme Court in Luzon, Visayas and Mindanao. Prescribes the composition of the Courts,as well as the qualifications and tenure of the Justices."

