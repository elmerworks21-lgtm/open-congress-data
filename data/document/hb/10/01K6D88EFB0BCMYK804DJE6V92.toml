congress_website_title = "AN ACT STRENGTHENING FURTHER VOLUNTARY ARBITRATION AS A MODE OF LABOR DISPUTE SETTLEMENT BY AUTHORIZING THE VOLUNTARY ARBITRATOR OR PANEL OF VOLUNTARY ARBITRATORS TO ISSUE SUBPOENAS, IMPOSE FINES AND CITE PERSONS IN CONTEMPT, AMENDING FOR THE PURPOSE ARTICLE 262-A OF THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Provides for the following --- \"THE VOLUNTARY ARBITRATOR OR PANEL OF VOLUNTARY ARBITRATORS SHALL HAVE THE POWER TO REQUIRE ANY PERSON TO ATTEND HEARING/S AS A WITNESS. THEY SHALL HAVE THE POWER TO SUBPOENA WITNESSES AND DOCUMENTS WHEN THE RELEVANCYOF THE TESTIMONY AND THE MATERIALITY THEREOF HAVE BEEN DEMONSTRATED TO THE ARBITRATORS. IN THE EXERCISE OF HIS POWERS UNDERR THIS CODE, THE VOLUNTARY ARBITRATOR OR PANEL OF VOLUNTARY ARBITRATORS MAY HOLD ANY PERSON IN DIRECT OR INDIRECT CONTEMPT ANDIMPOSE THE APPROPRIATE PENALTIES THEREOF.\""
