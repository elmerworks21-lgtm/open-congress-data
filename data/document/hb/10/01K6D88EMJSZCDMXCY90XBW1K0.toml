congress_website_title = "AN ACT APPROPRIATING THE SUM OF TWENTY-SEVEN BILLION PESOS (P27,000,000,00 0) TO FUND THE FOURTH-YEAR IMPLEMENTATION OF THE SALARY INCREASES AUTHORIZED BY JOINT RESOLUTION NO. 01, SERIES OF 1994, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the following --- \"Section 1. Appropriation for National Government Agencies. The amount of Twenty-Seven Billion Pesos (P27,000,000,00 0), or so much thereof as may be necessary, is hereby appropriated to cover the funding requirementsfor the fourth and final year of implementation of the salary increases authorized by Joint Resolution No. 1, Series of 1994, for all national government personnel, including the uniformed personnel of the Department of National Defense and the Department of the Interior and Local Government, according to the following schedule: (1) Effective Janaury 1, 1997 - Payment of fifty percent (50%) of the unimplemented balance as of December 31, 1996 of the basic pay corresponding to the salary Grade cconcerned; (2) Effective November 1, 1997 - Payment of the remaining fifty percent (50%) of said unimplemented balance to effect full salary adjustment.\" States, likewise, that goverment personnel who will compulsorily retire PRIOR TO NOVEMBER 1, 199"
