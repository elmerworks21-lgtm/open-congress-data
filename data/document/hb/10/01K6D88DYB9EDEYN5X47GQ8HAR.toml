congress_website_title = "AN ACT PROVIDING FOR AN ANTI-BANK ROBBERY PROGRAM AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "\"Bank Security Act\" Requires all banks, whether government-owne d or private, to install video cameras and alarm devices connected to the nearest police. Non-compliance will mean of paying a fine of One Hundred Thousand (P100,000.00) Pesos and thebank official responsible for the omission shall be punished with prision correcional. Mandates the Philippine National Police to adopt such measures as it may deem necessary for the security of banks in consultation with the Central Bank and the Associations of Banks. Penalizes any person who is a bank official or employee or with their knowledge or in connivance with other persons or by former or active military personnel who commits bank robbery punishable with reclusion perpetua to death."
