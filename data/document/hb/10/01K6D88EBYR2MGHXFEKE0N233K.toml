congress_website_title = "AN ACT PROVIDING FOR A MINIMUM SUBSISTENCE ALLOWANCE FOR BARANGAY HEALTH WORKERS, AMENDING FOR THE PURPOSE SECTION 6 (b) OF REPUBLIC ACT NO. 7883, ENTITLED 'AN ACT GRANTING BENEFITS AND INCENTIVES TO ACCREDITED BARANGAY HEALTH WORKERS, AND FOR OTHERPURPOSES"
congress_website_abstract = "States that --- \"SEC 6. Incentives and Benefits. - \" x x x \"(b) Subssistence allowance. - Barangay health workers who render service within the premises of isolated barangay health stations in order to make their services available at any and all times, shall be entitled to a monthly subsistance allowance, which shall be computed in accordance with prevailing circumstances as determined by the local government unit cocnerned, BUT SHALL IN NO CASE BE LESS THAN P1,000.\""

