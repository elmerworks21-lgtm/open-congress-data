congress_website_title = "AN ACT REDUCING THE AGE OF STATUTORY RAPE FROM TWELVE TO SIXTEEN YEARS OLD, AMENDING FOR THE PURPOSE ARTICLE 335 OF THE REVISED PENAL CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to AMEND Art. 335, subsection 3 of the Revised Penal Code to read as follows: \"Article 335. When and how rape is committed. Rape is committed by having carnal knowledge of a woman under any of the following circumstances: (1) By using force orintimidation; (2) When the woman is deprived of reason or otherwise unconscious; and (3) WHEN THE WOMAN IS UNDER SIXTEEN YEARS OF AGE or is demented."

