congress_website_title = "AN ACT PROVIDING FOR RECOGNITION AND PROTECTION OF PRIOR AND VESTED ANCESTRAL LAND AND MINING RIGHTS OF INDIGENOUS CULTURAL COMMUNITIES OR MEMBERS THEREOF WITHIN PATENTED MINING CLAIMS AND MINING LEASES AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to rectify the injustice inflicted by the Philippine Bill of 1902 insidiously used by the Americans to take over ancestral mines of indigenous natives by restoring their rights over whatever remains of their ancestral lands and mines. Proposes that patented mining claims over which mining operations have ceased shall revert back to the State. Bans the \"OPEN PIT\" mining method where it is destructive to human settlements, small-scale mining and to the environment."

