congress_website_title = "AN ACT AMENDING ARTICLES 354, 360 AND 361 OF ACT NO. 3815, OTHERWISE KNOWN AS THE REVISED PENAL CODE, FURTHER AMENDING REPUBLIC ACT NO. 4363"
congress_website_abstract = "Rationale: A public official or employee so maligned in his eprsonal capacity or official record in any newspaper, TV or radio program shall have the right to demand that the newspaper print, free of cost, to the public official or employee, his answer or rebuttal, the same kind of prominence as the charges which prompted the reply. Failure to comply with this requirement shall constitute prima facie evidence of malice. To give meaning to the constitutional mandate that a public office is a public trust and the offended party is a public official or employee, and the alleged libelous article pertain to his official function, only a ccivil action may be filed by him. > This bill seeks to amend Articles 354 and 361 of Act No. 3815, otherwiise known as the Revised Penal Code, further amending RA No. 4363. It also seeks to reinforce the freedom of speech as granted under Section 2, Article III of the 1987 Constitution. The proposed amendments primarily aim to protect public officials a"
