congress_website_title = "AN ACT REQUIRING A PERSON TO REPORT TO THE COMMISSIONER OF INTERNAL REVENUE THE PROFESSIONAL FEE HE HAD PAID TO ANOTHER FOR SERVICE RENDERED IN CONNECTION WITH THE PRACTICE OR EXERCISE OF PROFESSION"
congress_website_abstract = "Rationale: \"... taxable income has escaped close scrutiny among tax collectors because the clients ... rarely report the professional fees involved and paid ...\" States that --- \"SECTION 1. A person who pays a fee of not less than One Hundred Fiftythousand Pesos (P150,000.00), whether in cash or in kind, for services rendered by another in the exercise or practice of his profession requiring government examination shall submit a report in the form to be prepared by the Secretary of Finance, tothe Commissioner of Internal Revenue or his duly authorized representative within ten (10) days after the close of each month indicating the following information and such information which the Secretary of Finance imposes: (1) Name of professionaland client; (2) Kind of professional service rendered; (3) Inclusive date of service rendered; and (4) Date of payment and amount of professional fee received."

