congress_website_title = "AN ACT REQUIRING ALL PERSONNEL OF THE ARMED FORCES OF THE PHILIPPINES AND THE PHILIPPINE NATIONAL POLICE TO UNDERGO A TWO-MONTH BASIC COURSE ON THE PHILIPPINE CONSTITUTION, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims at prodducing disciplined members of the Armed Forces of the Philippines and the Philippine National Police who will also be responsible citizens. Is premised on the observation that many charges which have been leveled against military and police personnel center mostly on disloyalty to the Republic, violation of human rights, disregard of established laws and other illegal activities, thus the necessity of this course"
