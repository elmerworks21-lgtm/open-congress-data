congress_website_title = "AN ACT EXTENDING THE PERIOD OF EXEMPTION FROM THE PAYMENT OF ALL TAXES, FEES AND OTHER CHARGES AND INCREASING THE AMOUNT FOR FREE NOTARIAL SERVICES OF RURAL BANKS, AMENDING FOR THE PURPOSE THE RURAL BANKS ACT OF 1992"
congress_website_abstract = "Proposes this amendment to Ra 7353, the Rural Banks Act of 1992: \"SEC. 15. All rural banks created and organized under the provisions of this Act shall be exempt from the payment of all taxes, fees and charges of whatever nature and description, except the corporate income tax and local taxes, fees and charges, for a period of [five (5) EIGHT] (8) years from the date of commencement of operations.\""

