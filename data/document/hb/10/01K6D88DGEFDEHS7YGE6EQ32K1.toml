congress_website_title = "AN ACT EXEMPTING CERTAIN ITEMS OF SALES AND SERVICES MADE OR PERFORMED BY PARTICULAR INDIVIDUALS AND ENTITIES FROM COVERAGE OF THE VALUE-ADDED TAX, AMENDING FOR THE PURPOSE REPUBLIC ACT 7716. OTHERWISE KNOWN AS THE VAT RESTRUCTURING LAW, AND THE RELEVANT PROVISIONS OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to EXEMPT the following items for coverage of the VAT: (1) All kinds of books, including schoolbooks; (2) newspapers, magazines , periodicals; (3) service of radio/TV franchise grantees; (4) print and broadcast media; (5) the supply of scientific, technical, industrial or commercial infrastructure; (6) small public eateries, market stall retailers; (7) copyrights, patents, trademarks; and (8) all types of cooperatives them exerted under the Cooperative Code."
