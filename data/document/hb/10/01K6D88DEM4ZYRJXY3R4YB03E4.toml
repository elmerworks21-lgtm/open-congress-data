congress_website_title = "AN ACT REQUIRING THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION (PAGCOR) TO FIRST OBTAIN THE CONFORMITY OF THE LOCAL GOVERNMENT UNIT CONCERNED BEFORE THE FORMER CAN ESTABLISH AND OPERATE GAMBLING CASINOS, CLUBS, AS WELL AS OTHER AMUSEMENT PLACES, SPORTS AND GAMING POOLS WITHIN THE JURISDICTION OF THE SAID LOCAL GOVERNMENT UNIT AND FOR OTHER PURPOSES, FURTHER AMENDING FOR THESE PURPOSES PRESIDENTIAL DECREE NO. 1869, AS AMENDED, OTHERWISE KNOWN AS THE PAGCOR CHARTER"
congress_website_abstract = "Provides for the conduct of public hearings to discuss the issue on the operation of gambling casinos, etc. and the passage of a resolution by the local legislative body, expressing conformity to the operation of said gambling casinos."
