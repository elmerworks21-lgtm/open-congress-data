congress_website_title = "AN ACT INCREASING THE PENALTY FOR BANK ROBBERY AND AMENDING FOR THAT PURPOSE ARTICLE 294 OF ACT NO. 3815, OTHERWISE KNOWN AS THE REVISED PENAL CODE, AS AMENDED BY REPUBLIC ACT NO. 7659"
congress_website_abstract = "Declares that a BANK ROBBERY committed by BANK OFFICIALS or employees, or with their knowledge or in connivance with other persons, or by former or active MILITARY personnel, or by active or former POLICE personnel shall be punishable with RECLUSIONPERPETUA to DEATH. A bank robbery committed by any other person shall be punishable with reclusion temporal to reclusion perpetua."

