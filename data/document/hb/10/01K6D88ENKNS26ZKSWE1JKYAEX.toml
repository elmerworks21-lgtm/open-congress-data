congress_website_title = "AN ACT FIXING THE IMPORT DUTY ON RAW AND REFINED SUGAR AT THE RATES PRESCRIBED UNDER TARIFF HEADING NO. 17.01, SECTION 104 OF THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES, AS AMENDED BY EXECUTIVE ORDER NO. 313"
congress_website_abstract = "Rationale: The bill seeks to REPEAL existing preferential tariff agreement in the form of tariff reduction/disco unt on imported sugar to forestall the collapse of the local sugar industry. Provides for the following --- \"SEC. 402. Promotion of Foreign Trade. - \"H. THE PROVISIONS OF SECTION 401, AND PARAGRAPH (F) OF THIS SECTION REGARDDING THE EFFECTIVITY OF ANY EXECUTIVE OR PREFERENTIAL TRADE AGREEMENT WITH ANY FOREIGN COUNTRY TO THE CONTRARY NOTWITHSTANDING , THE EXISTING RATES OF IMPORT DUTYON RAW AND REFINED SUGAR UNDER TARIFF HEADING NO. 17.01 OF SECTION 104 OF THIS CODE, SHALL REMAIN IN FULL FORCE AND EFFECT UNTIL REVISED, MODIFIED OR ADJSUTED BY AN ACT OF CONGRESS. > ANY EXISTING EXECUTIVE OR PREFERENTIAL TRADE AGREEMENT IN THE FORRM OF TARIFF/DISCOUNT INVOLVING SAID ARTICLE IS HEREBY REPEALED.\""

