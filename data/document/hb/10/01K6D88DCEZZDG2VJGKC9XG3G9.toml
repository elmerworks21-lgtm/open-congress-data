congress_website_abstract = "\"Apprenticeship Act of 1992\" Provides for the establishment of a national apprenticeship system that includes ON and OFF-THE-JOB TRAINING COMPONENTS AND WITH TRIPARTITE INVOLVEMENT. Provides, likewise, for the REGULATION and CONTROL of training apprentices; designates the National Manpower and Youth council as the agency responsible for over-all apprenticehsip administration. * * *"
