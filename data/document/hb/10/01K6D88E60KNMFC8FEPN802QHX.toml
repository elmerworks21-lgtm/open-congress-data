congress_website_title = "AN ACT BROADENING THE SCOPE OF COMPLIANCE AND EXPANDING THE CONDUIT NETWORK FOR AGRI-AGRA CREDITS, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 717, OTHERWISE KNOWN AS THE AGRI-AGRA LAW"
congress_website_abstract = "Aims to assure credit availability and accessibility to the smal farmers by: (1) imposing a P1.5 million capitalization ceiling for agri-agra qualified borrowers; (2) deleting the distinction between agriculture and agrarian reform credits; (3) deleting investment in government securities; (4) broadening alternative compliance options by purchase of DBP and LBP bonds and special deposit accounts, etc. and (5) expanding the conduit network to inlcude government institutions (DBP and LBP), etc."
