congress_website_title = "AN ACT AUTHORIZING GOVERNMENT EMPLOYEES WHO RETIRE UNDER REPUBLIC ACT NO. 660 OR PRESIDENTIAL DECREE NO. 1146 TO RECEIVE, IN ADDITION TO THE LUMP SUM ANNUITY FROM THE GOVERNMENT SERVICE INSURANCE SYSTEM, THE DIFFERENCE BETWEEN THE ANNUITY AND THE TOTAL AMOUNT THEY SHALL RECEIVE UNDER REPUBLIC ACT NO. 1616 WHICH SHALL BE PAID BY THEIR EMPLOYER"
congress_website_abstract = "Refers to RA 660 and PD 1146 which are the bases for payment of lump sum annuity to retirees who are GSIS members, and RA 1616 which is the basis for employees to pay their retirement gratuity."
