congress_website_title = "AN ACT ALLOCATING NEWLY CREATED BARANGAYS WITH A SHARE IN THE INTERNAL REVENUE ALLOTMENT AND AMENDING FOR THE PURPOSE SECTION 285 OF REPUBLIC ACT NO. 7160"
congress_website_abstract = "States that on the first three (3) years of their creation, newly-created barangays shall be ALLOCATED A SHARE FROM THE SHARE OF THE MOTHER BARANGAYS in the Internal Revenue Allotment on the basis of the following formula: Population - 60%; and Equal Sharing - 40%."

