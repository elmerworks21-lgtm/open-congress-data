congress_website_title = "AN ACT GRANTING TAX AND DUTY EXEMPTIONS TO ALL EDUCATIONAL INSTITUTIONS FOR IMPORTATION OF INSTRUCTIONAL MATERIALS"
congress_website_abstract = "Rationale: Considering that educational institutions are confronted with financial difficulties due to the rising costs of educational inputs, additional forms assistance to these institutions are rendered necessary in order to upgrade their performance as producers of skilled and educated manpower. It is submitted that one mode of extending such assistance is by way of exempting their importations of instructional material from tax and other duties."

