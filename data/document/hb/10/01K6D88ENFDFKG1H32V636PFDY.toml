congress_website_title = "AN ACT IMPOSING SOCIALIZED TUITION FEE SCHEME IN ALL STATE COLLEGES AND UNIVERSITIES IN THE COUNTRY TO AUGMENT THE BUDGET FOR PUBLIC ELEMENTARY AND SECONDARY SCHOOLS AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The outright shiftly of resources from secondary and tertiary TO PRIMARY EDUCATION may lead to waste and student dislocation. Resources may be redisplayed to ... WITHOUT the expected ill effects by initiating a SOCIALIZED TUITION FEE scheme in all State colleges and universities.> Proposes the following socialized scheme of tuition fees: \"SECTION 4. SCHEDULE OF TUITION FEES. - The tuition fee in State colleges and universities shall be determined in accordance with the following schedule: Family Income; Tuition Fee > (1) Below the poverty threshold - none; (2) 20% above the poverty threshold- 20% of regular rate; (3) 40% above the poverty threshold - 40% of regular rate; (4) 60% above the poverty threshold - 60% of regular ratee; (5) 70% above the poverty threshold - 70% of regular rate; (6) 80% above the poverty threshold - 80% of regular rate; (7) 90% above the poverty threshold - 90% of regular rate; (8) 100% above the poverty threshold - 100% of regular rate."

