congress_website_title = "AN ACT TO REQUIRE GOVERNMENT AGENCIES TO FILE WITH THE SUPREME COURT LIBRARY THREE CERTIFIED COPIES OF EVERY RULE ADOPTED BY THEM, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NO. 292, KNOWN AS THE ADMINISTRATIVE CODE OF 1987"
congress_website_abstract = "Amends EO 292, otherwise known as the Administrative Code of 1987 by (1) requiring government agencies to fike with the SUPREME COURT LIBRARY three (3) certified copies of every rule adopted by them and (2) designating the Supreme Court Library to furnish the Court of Appeals and the Regional Trial Courts copies of all bulletins and codified rules."
