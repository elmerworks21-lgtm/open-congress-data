congress_website_title = "AN ACT CREATING THE NATIONAL SUGAR DEVELOPMENT COUNCIL, THEREBY INSTITUTIONALIZ ING THE SUGAR DEVELOPMENT PROGRAM OF THE PHILIPPINES"
congress_website_abstract = "States the PURPOSE of the priposed Council: To formulate a comprehensive and integrated sugar development program and create structures to integrate all sugar development initiatives. The sugar development program shall include all activities supportive of the sugar indsutry by adopting innovative schemes of production, such as: (1) village corporation; (2) compact farming; (3) cooperatives development; (4) voluntary land sharing agreement, etc."

