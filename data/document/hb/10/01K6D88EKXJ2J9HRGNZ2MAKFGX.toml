congress_website_title = "AN ACT AUTHORIZING FISCAL AUTONOMY TO ALL STATE UNIVERSITIES AND COLLEGES IN THEIR OPERATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to insure that fiscal planning and management of government funds are properly instituted in all state universities and colleges. Prescribes the manner of ALLOCATING the income, receipts and fees accruing to or derived by any state universityor college as follows: (1) Tuition, matriculation, registration, entrance fee, laboratory, medical, literary, athletic, school organ, cultural, graduation, diploma and all other fees; (2) Income from the operation of service facilities such as cafeterias, dormitories, research and extension services; (3) Income from trust legacies, gifts and donations of real and personal property of all kind, which shall continue to be administered in accordance with the instructions of the trustor, testator orr donor; (4) All other income classified as special or fiduciary within the context of P.D. 711, P.D. 1177 and P.D. 1234."

