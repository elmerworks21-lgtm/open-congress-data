congress_website_title = "AN ACT STRENGTHENING THE WITNESS PROTECTION PROGRAM BY ENTITLING LAW ENFORCEMENT OFFICERS TO AVAIL OF ITS BENEFITS IN CASES INVOLVING NATIONAL SECURITY AND HEINOUS CRIMES COMMITTED BY CRIMINAL SYNDICATES, AMENDING FOR THIS PURPOSE SECTION 3, REPUBLIC ACT NO. 6981"
congress_website_abstract = "Rationale: Under the Witness Protection, Security and Benefit Law, police and other law enforcers are disqualified from availing of the benefits thereunder (Sec. 3 [d] R.A. 6981). The said disqualificatio n is expressed in absolute terms and does not admit of exceptions. This restriction is not promotive of full protection to law officers and is prejudicial to national interest. Needless to state, the disqualificatio n likewise tends to discriminate law enforcers. > States that ANY ENFORCEMENTOFFICER may be entitled to the Witness Protection Program IF THE OFFENSE IN WHICH HIS TESTIMONY WILL BE USED INVOLVES NATIONAL SECURITY OR IS COMMITTED BY AN ORGANIZED CRIMINAL SYNDICATE WHERE THE IMPOSABLE PENALTY IS DEATH."

