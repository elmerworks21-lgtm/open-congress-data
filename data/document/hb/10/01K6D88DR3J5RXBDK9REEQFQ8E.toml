congress_website_title = "AN ACT AMENDING SECTIONS 61, 62, 63 AND 65 OF REPUBLIC ACT NO. 6975 PLACING FOR THE PURPOSE THE PROVINCIAL JAILS UNDER THE JURISDICTION OF THE BUREAU OF JAIL MANAGEMENT AND PENOLOGY, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Transfers the supervision and control of PROVINCIAL jails from the [provincial governments] to the Bureau of Jail Management and Penology. Creates the office of provincial jail administrator who shall supervise and administer all local jails in theprovince and thus provide a vital link in the management of local jails nationwide."
