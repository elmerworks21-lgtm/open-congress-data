congress_website_title = "AN ACT INSTITUTIONALIZ ING PSYCHOLOGICAL TESTING OF ELEMENTARY AND HIGH SCHOOL STUDENTS TO DETERMINE THE FIELD OF STUDY MOST SUITED FOR FILIPINO STUDENTS, PROVIDING FOR COUNSELLING CENTERS IN EVERY SCHOOL DISTRICT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: This bill seeks to institutionaliz e a psychological testing scheme that shall help Filipino students determine the fields of study most suited to their talents and skills. \"Psychological Test for Students Act\" Mandates ALL students in public and private elementary and high schools to undergo psychological testing for the purpose of determining the field of study most suited for them. >The tests shall consist of verbal and nonverbal tests."

