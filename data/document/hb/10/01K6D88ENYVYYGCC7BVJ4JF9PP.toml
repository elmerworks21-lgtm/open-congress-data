congress_website_title = "AN ACT AMENDING ARTICLE 36 OF CHAPTER 3, TITLE I OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES(RE: DEFINITION OF PSYCHOLOGICAL INCAPACITY)"
congress_website_abstract = "Rationale: \"... the consensus in the bench and bar is that Article 36 (of the Family Code) has opened the floodgates of abuse in its integration resulting in a mockery of the conjugal bond. This is so because Art. 36 DOES NOT define 'PSYCHOLOGICAL INCAPACITY' at all ...\" Provides. therefore, a clear definition of PSYCHOLOGICAL INCAPACITY under the Family Code. States the ACTS which may serve as probative indicators of such behavioral pattern."
