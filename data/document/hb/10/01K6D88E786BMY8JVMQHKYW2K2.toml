congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION AND REHABILITATION OF RAPE VICTIMS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the creation of a WOMEN'S CRISIS COMMITTEE in every city or municipality, which shall facilitate the medico-legal examination of victims of rape and acts of lasciviousness; provides the victim with psychological counselling; medical and health services; unertake a training program on gender sensitivity and legal management of rape cases; etc."
