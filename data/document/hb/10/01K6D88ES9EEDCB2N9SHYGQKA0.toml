congress_website_title = "AN ACT PROHIBITING THE GLORIFICATION OF GUNS AND VIOLENCE IN MOVIE, TELEVISION, RADIO, PRINT MEDIA AND OTHER SIMILAR MEDIUM AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Rationale: \"... it is imperative to prohibit the glorification of guns and violence in movies, television, radio and print media to protect the youth who are very susceptible to following the footsteps of their movie idols and to avoid undue influence on mature individuals.\" >Defines the term \"GLORIFICATION\" as the portrayal of the use of guns or the act of violence as an approved and accepted normal or ordinary way of life, or when the presentation is given a favorable aspect, dignifying the violent act and showing that its portrayal is worthy of praise and emulation. >Prescribes penalties for glorifying guns and violence with a fine of not less than P20,000.00, but not more than P50,000.00, or by imprisonment."

