congress_website_title = "AN ACT ORDAINING THE ENACTMENT OF THE PRE-NEED PLAN SECURITIES CODE"
congress_website_abstract = "Proposes the enactment of a Pre-Need Plan Securities Code which establishes the rules and requirements as regards the organization, regualtion, supervision and implementation of the Pre-Need Plan Securities Program. Mandates the establishment of a TRUST FUND for every pre-need plan category, which shall be administered by a reputable bank authorized to perform trust functions."
