congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1602, OTHERWISE KNOWN AS 'PRESCRIBING STIFFER PENALTIES ON ILLEGAL GAMBLING AND FOR OTHER PURPOSES'(NOTE: VIDEOKARERA)"
congress_website_abstract = "Rationale: The most recent gambling craze to adversely affect our youth is the mechanical game of videokarera. the proliferation of videokarera machines in the Metropolitan area has definitely brought about pernicious and debilitating effects on ourcountrymen. The game easily attracts young students and is even more appealing to the out-of-school youth. Seeks to include VIDEOKARERA as one of the prohibited games under PD 1602."
