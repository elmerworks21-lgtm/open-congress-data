congress_website_title = "AN ACT AUTHORIZING ADDITIONAL OUTLETS FOR THE DISTRIBUTION OF MEDICINES, PHARMACEUTICAL OR DRUGS, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED FIFTY-NINE AND TWENTY-ONE, ENTITLED 'AN ACT REGULATING THE PRACTICE OF PHARMACY AND SETTING STANDARDS OFPHARMACEUTICAL EDUCATION IN THE PHILIPPINES AND FOR OTHER PURPOSES'"
congress_website_abstract = "Rationale: The limited capital or financial resources of duly authorized outlets such as drugstores or pharmacies is the main reason why a wide variety of pharmaceutical products cannot be availed in the rural areas. Consequently, specific drugs prescribed by local physicians, cannot be purchased by patients. > Authorizing medical and dental clinics and other health offices to be an outlet for the distribution of medicines, pharmaceutical, or drugs will keep these vital health commodities accessible to all. Provides for the sale of medicines, pharmaceuticals , drugs and devices through INDUSTRIAL, MEDICAL AND DENTAL CLINICS, LYING-IN CLINICS, GOVERNMENT HEALTH OFFICES, AND NONGOVERNMENTAL ORGANIZATIONS (NGOs) RENDERING DENTAL AND MEDICAL MMISSIONS."

