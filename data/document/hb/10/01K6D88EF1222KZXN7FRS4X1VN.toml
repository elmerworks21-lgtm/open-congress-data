congress_website_title = "AN ACT REQUIRING ALL COLLEGES AND UNIVERSITIES TO GRANT SCHOLARSHIP TO DESERVING POOR STUDENTS"
congress_website_abstract = "States that --- \"SECTION 1. All colleges and universities shall grant scholarship in the form of free tuition and other matricualtion fees to deserving poor students, who shall comprise at least five percent (5%) of their respective student population. \"SECTION 2. For the purpose of this Act, a deserving poor student is one who has qualified for admission in the college or university of his or her choice, and is supporting himself or herself as a working student or is being supported by his orher parents is not more than thrity-six thousand pesos (P36,000.00) as evidenced by their income tax return for the preceding taxable year."

