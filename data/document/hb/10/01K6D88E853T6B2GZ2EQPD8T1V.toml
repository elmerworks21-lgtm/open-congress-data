congress_website_title = "AN ACT GRANTING APPROPRIATE CIVIL SERVICE ELIGIBILITY TO ELECTED CITY AND MUNICIPAL OFFICIALS AND FOR OTHER PURPOSES"
congress_website_abstract = "Requires that the elected official be at least 18 years of age and must have completed at least two (2) years of college education. Requires further that the official should have served for three (3) years or one (1) term to qualify to sub-professiona l eligibility; and six (6) years or two terms for professional eligibility."

