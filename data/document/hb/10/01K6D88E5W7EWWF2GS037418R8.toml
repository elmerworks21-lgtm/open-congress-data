congress_website_title = "AN ACT PROVIDING STIFFER PENALTIES FOR THE ELECTION OFFENSE OF TAMPERING WITH THE VOTES RECEIVED BY THE CANDIDATES, AS PROVIDED FOR IN PARAGRAPH (b) OF SECTION 27 OF REPUBLIC ACT NUMBERED SIXTY-SIX HUNDRED AND FORTY-SIX, OTHERWISE KNOWN AS 'THE ELECTORAL REFORMS LAW OF 1987; FURTHER AMENDING FOR THE PURPOSE THE 'OMNIBUS ELECTION CODE'"
congress_website_abstract = "States that - \"SEC. 264. Penalties. - XXXX ANY MEMBER OF THE BOARD OF ELECTION INSPECTORS OR BOARD OF CANVASSERS WHO TAMPERED, INCREASED, OR DECREASED THE VOTES RECEIVED BY A CANDIDATE IN ANY ELECTION OR WHO REFUSED, AFTER PROPER VERIFICATION AND HEARING, TO CREDIT THE CORRECT VOTES OR DEDUCT SUCH TAMPERED VOTES AS PROVIDED FOR IN PARAGRAPH (b), SECTION 27 OF REPUBLIC ACT NO. 6646, SHALL, BE PUNISHED WITH IMPRISONMENT OF NOT LESS THAN TWO YEARS BUT NOT MORE THAN TEN YEARS.\" (BP Blg. 881)"
