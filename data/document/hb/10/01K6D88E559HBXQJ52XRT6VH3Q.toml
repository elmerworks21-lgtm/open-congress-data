congress_website_title = "AN ACT DECLARING INTENSIVE CARE UNITS, EMERGENCY ROOMS, OPERATING ROOMS, AND OTHER CRITICAL AREAS INTENDED FOR PATIENTS IN HOSPITALS, MEDICAL CLINICS, AND OTHER SIMILAR ESTABLISHMENTS, AS OFF LIMITS TO OWNERS, AGENTS AND/OR REPRESENTATIVES OF FUNERAL PARLORS, MORGUES, AND FUNERAL SERVICE ESTABLISHMENTS, WHO ARE SOLICITING PROSPECTIVE CLIENTS, PROVIDING PENALTIES FOR VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "Directs owners of hospitals, clinics and similar medical establishments to DESIGNATE AN APPROPRIATE AREA within their establishments where owners or agents of funeral parlors may conduct negotiations with relatives of deceased patients."

