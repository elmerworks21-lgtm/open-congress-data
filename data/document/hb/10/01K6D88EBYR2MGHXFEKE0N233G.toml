congress_website_title = "AN ACT INCREASING THE MONTHLY RETIREMENT PENSION OF ALL SOCIAL SECURITY SYSTEM (SSS) RETIREES TO A MINIMUM LEVEL OF FIVE THOUSAND PESOS (P5,000.00) UNDER AN ECONOMIC ADJUSTMENT PENSION PROGRAM"
congress_website_abstract = "Provudes for the following: \"SECTION 1. This Act shall provide for the adjustment of Social Security System monthly pension to Three Thousand Pesos (P3,000.00). Provided, that in the succedding years upon approval of this Act, said amount will be increased annually by not less than Six Hundred Pesos (P600,00) until total monthly pension shall be at least Five Thousand Pesos (P5,000.00) per month."
