congress_website_title = "AN ACT LIMITING THE HOURS OF OPERATION OF NIGHTCLUBS, COCKTAIL LOUNGES, BARS AND SIMILAR ESTABLISHMENTS, AND PENALIZING THE VIOLATION THEREOF"
congress_website_abstract = "Requires nightclubs, cocktail lounges, bars or similar establishments serving intoxicating liquor, and employing hosteses to be OPEN from TWELVE C'CLOCK NOON UP TO TWELVE O'CLOCK MIDNIGHT of the same day. Prohibits any person carrying a firearm fromentering any of the above establishments."
