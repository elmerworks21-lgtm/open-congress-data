congress_website_title = "AN ACT INCREASING THE SALARIES AND GRANTING OTHER BENEFITS TO BARANGAY OFFICIALS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes the following monthly salaries for barangay officials: (1) P3.000/00 for the barangay captian; (2) P1,500.00 for the barangay councilmen; (3) P1,000.00 for the barangay treasurer, secretary, KB chairman and tanod; provides, likewise for insurance benefits to all the officials."

