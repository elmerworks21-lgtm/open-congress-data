congress_website_title = "AN ACT REQUIRING THE GOVERNMENT SERVICE INSURANCE SYSTEM TO ALLOCATE TWENTY PERCENT (20%)OF ITS INVESTIBLE FUNDS FOR MEMORIAL PARKS, AMENDING FOR THE PURPOSE THE REVISED GOVERNMENT SERVICE INSURANCE ACT OF 1977, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Government employees and retirees should always be provided with a decent and reputable resting place because they have sent and still spending the best years of their lives in public service with utmost loyalty and responsibility. Provides for the following --- \"SEC. 33. Investment of Funds. - Funds of the System not needed to meet the current obligations may be invested under such terms and conditions as may be determined by the Board: PROVIDED, THAT NOT LESS THAN TWENTY PERCENT (20%) OF THE INVESTIBLE FUNDS OF THE SYSTEM SHALL BE ALLOCATED FOR THE PROVISION OF MEMORIAL LOTS TO MEMBERS GIVING PRIORITY TO THE LOW-INCOME GROUPS TO BE PAID IN LOW-MONTHLY INSTALLMENT.\""

