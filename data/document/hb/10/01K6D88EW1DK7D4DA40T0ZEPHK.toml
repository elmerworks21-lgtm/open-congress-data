congress_website_title = "AN ACT INCREASING THE MONTHLY COMPENSATION OF VICTIMS OF UNJUST IMPRISONMENT OR DETENTION TO FIVE THOUSAND PESOS (P5,000.00) PER MONTH STARTING ON THE SECOND YEAR OF SUCH IMPRISONMENT OR DETENTION, AMENDING FOR THIS PURPOSE SECTION 4 OF REPUBLIC ACTNO. 7309"
congress_website_abstract = "Rationale: To alleviate the conditions of those who are eventually found to be unjustly imprisoned or detained, this Bill seeks to increase the monthly compensation to five thousand pesos (P5,000.00) on the second year of imprisonment or detention."

