congress_website_title = "AN ACT AUTHORIZING THE GIRL SCOUT OF THE PHILIPPINES TO CONTINUE EXISTING AS A CORPORATION UNDER COMMONWEALTH ACT NO. 542, AS AMENDED BY REPUBLIC ACT NO. 4375, PRESIDENTIAL DECREE NO. 720, AND EXECUTIVE ORDER NO. 267, ENTITLED 'AN ACT TO CREATE A CORPORATION TO BE KNOWN AS THE GIRL SCOUT OF THE PHILIPPINES AND DEFINE ITS POWERS AND PURPOSES"
congress_website_abstract = "Clarifies the existing legal status of the GSP Under CA 542, as amended. Declares that the GSP SHALL CONTINUE its corporate existence under CA 542, as amended, and shall exercise and enjoy the same functions, powers, benefits and privileges grantedto it by the Law."
