congress_website_title = "AN ACT AMENDING SECTION TWO HUNDRED AND SIXTY-FIVE OF BATAS PAMBANSA BILANG 881, AS AMENDED, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES(RE: ELECTION OFFENSES)"
congress_website_abstract = "Proposes the following amendment to Section 265 of the Omnibus Election Code\" \"SECTION 265. Prosecution. The Commission, shall through its duly authorized legal officers, MOTU PROPIO, UPON KNOWLEDGE OF A POSSIBLE ELECTION OFFENSE OR UPON COMPLAINT FILED BY A PARTY, have the exclusive power to conduct preliminary investigation of all election offenders ... and to prosecute the same WITHIN DELAY. x x x That UPON THE CONCLUSION OF THE PRELIMINARY INVESTIGATION, AND THERE BE A PROBABLE CAUSE, THE COMMISSION SHALL TRANSMIT WITHIN THIRTY DAYS TO THE PROPER COURT HAVING JURISDICTION OF THE OFFENSE, ALL RECORDS OF THE CASE FOR PROPER INVESTIGATION AND PROSECUTION, IF WARRANTED. PERTINENT PROVISIONS OF THE RULES OF COURT WILL HAVE SUPPLETORY EFFECTT ON THE PROCEDURES NOT HEREWITH ENUMERATED. Section 2. ADMINISTRATIVE SANCTIONS - FAILURE OF THE CONCERNED OFFICIALS AND PERSONNEL TO IMMEDIATELY ACT ON ELECTION OFFENSES SHALL BE CONSIDERED GROSS NEGLECT OF DUTY AND SHALL HAVE CORRESPONDING ADMINIS"
