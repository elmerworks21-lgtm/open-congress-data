congress_website_title = "AN ACT PROVIDING FOR THE CONSTRUCTION OF CONCRETE FARM-TO- MARKET ROADS THROUGHOUT THE COUNTRY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates the Department of Public Works and Highways (DPWH) to undertake the construction of concrete farm to market roads connecting rural agricultural production areas in outlaying barangays with municipal marketing centers, municipalities with prpvincial marketing centers and provinces with urban marketing centers throughout the country over a period of three (3) years."

