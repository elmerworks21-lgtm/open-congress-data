congress_website_title = "AN ACT RATIONALIZING FURTHER THE IMPOSITION OF PENAL SANCTIONS UNDER THE DANGEROUS DRUGS LAW OF 1972 BY PROVIDING PENALTIES SEPARATE AND DISTINCT FROM THOSE PROVIDED IN THE REVISED PENAL CODE (ACT NO. 3815, AS AMENDED) THEREBY PRECLUDING THE APPLICABILITY OF THE PROVISIONS OF THE LATTER IN DRUG OFFENSES, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 6425, AS AMENDED BY REPUBLIC ACT NO. 7659"
congress_website_abstract = "Seeks to impose the penalty of [reclusion perpetua] LIFE IMPRISONMENT to death for the following crimes related to prohibited days: (1) Importation of prohibited days; (2) Administration, delivery distribution and transportation of such drugs; (4) Manufacture, Possession of prohibited drugs, etc."
