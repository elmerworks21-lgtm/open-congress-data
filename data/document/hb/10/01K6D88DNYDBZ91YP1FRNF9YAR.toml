congress_website_title = "AN ACT PROHIBITING THE DEPARTMENT OF ENVIRONMENT AND NATURAL RESOURCES AND THE NATURAL RESOURCES DEVELOPMENT CORPORATION FROM AUCTIONING OR ALIENATING BY ANY OTHER MODE TO THE PUBLIC, THE CONFISCATED ILLEGALLY CUT, GATHERED, REMOVED AND POSSESSED LOGS, LUMBER AND OTHER FOREST PRODUCTS; PROVIDING FOR THE DONATION OF THESE PRODUCTS TO THE LOCAL GOVERNMENT UNITS HAVING JURISDICTION OVER THE AREA OF ORIGIN"
congress_website_abstract = "Aims to give force to the Constitutional provision that: Specifies the projects to be undertaken by the LGU's for the utilization of the confiscated and donated products, to ensure that the whole community benefits from these projects."
