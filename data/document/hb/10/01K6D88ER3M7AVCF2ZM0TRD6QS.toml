congress_website_title = "AN ACT PROVIDING THAT CANDIDATES IN BARANGAY ELECTIONS WHO HAVE RECEIVED AN EQUAL AND HIGHEST NUMBER OF VOTES FOR THE SAME POSITION SHALL EACH SERVE HALF OF THE TERM OF OFFICE, AMENDING FOR THE PURPOSE THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "Declares the following --- \"SECTION 240. Election Resulting in Tie --- x x x > \"WHENEVER IN BARANGAY ELECTION, TIE HAS RESULTED, THE CANDIDATES WHO HAVE TIED SHALL BOTH BE PROCLAIMED: PROVIDED, THAT THE BOARD OF CANVASSERS SHALL ALSO PROCEED TO THEDRAWING OF LOTS OF THE CANDIDATES WHO HAVE TIED, AND THE CANDIDATES WHO MAY BE FAVORED BY LUCK SHALL SERVE THE FIRST HALF OF THE TERM OF OFFICE, AND THE OTHER CANDIDATE SHALL SERVE THE SCEOND HALF OF THE TERM OF OFFICE. > x x x.\""

