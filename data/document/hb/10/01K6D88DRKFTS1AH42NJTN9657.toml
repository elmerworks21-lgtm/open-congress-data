congress_website_title = "AN ACT PROVIDING FOR INCENTIVES TO THE SHIPBREAKING INDUSTRY, PROVIDING PENALTIES FOR VIOLATIONS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Shipbreaking Industry Incentives Act of 1995\" Defines the term \"SHIPBREAKING\" as the dismantling of uneconomical or non-serviceable ships, for the purpose of recovering and recycling useful steel and other materials and the rehabilitation and repair of usable machineries, instruments and devices. Prescribes the incentives and the legal requirements under this Act."

