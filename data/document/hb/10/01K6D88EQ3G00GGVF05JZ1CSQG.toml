congress_website_title = "AN ACT GRANTING RETIREMENT BENEFITS TO BARANGAY OFFICIALS, BY AMENDING SECTION 393 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Considering the amount of responsibility and extent of public service placed by the barangay officials in the performance of their official duty, it is very sad to note that the law fails to provide them assurance that their future will be taken care of by the State. Currently, the barangay officials are not enjoying retirement benefits that would at least see them through after their separation from the public service. Proposes the following for our barangay officials --- \"(6) BE ENTITLED TO RETIREMENT BENEFITS AFTER THEIR SEPARATION FROM THE PUBLIC SERVICE. PROVIDED, THAT THE BENEFITS UNDER THIS PROVISION SHALL BE AVAILED OF ONLY BY ELECTIVE BARANGAY OFFICIALS WHO HAVE RENDERED PUBLIC SERVICE FOR AT LEAST THREE TERMS, WHETHERCONSECUTIVE OR NOT. PROVIDED, FURTHER, THAT APPOINTIVE BARANGAY OFFICIALS WHO HAVE RENDERED SERVICE FOR AT LEAST TEN YEARS, WHETHER CONTINUOUS OR NOT, ARE ALSO ENTITLED TO THE BENEFITS OF THIS ACT.\""

