congress_website_title = "AN ACT STRENGTHENING THE CROP INSURANCE PROGRAM OF THE GOVERNMENT, FURTHER AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 1467, AS AMENDED"
congress_website_abstract = "Contains the following significant features: (1) Expansion of the capital base of the Philippine Crop Insurance Corporation (PCIC); (2) Authority to insure part of expected yield or income; (3) Attachment of the PCIC to the Dept. of Agriculture; (4) Clear administrative procedures for the speedy settlement of disputes; (5) Grant of incentives to any insured farmer, etc."
