congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7716, OTHERWISE KNOWN AS THE EXPANDED VALUE ADDED TAX LAW"
congress_website_abstract = "Rectifies the possibilities of adverse effects of the expanded value-added tax law, Republic Act No. 7716, by adjusting the exemptions from VAT of the: (1) non-electric cooperatives composed primarily of small producers and/or consumers; (2) circulation and advertising revenues of newspapers; and (3) leasing of residential units at a monthly rental not exceeding P12,500 per unit, and by providing for a presumptive input tax to be availed by construction contractors, owners of buildings or buildings with machineries permanently attached therein and agro-processors ."
