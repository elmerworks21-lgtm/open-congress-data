congress_website_title = "AN ACT PROHIBITING THE ESTABLISHMENT OF POLITICAL DYNASTIES"
congress_website_abstract = "Rationale: This bill seeks to give meaning and substance to Article II, Sec. 26 of the Philippine Constitution which states that: \"The State shall guarantee equal access to opportunities for public service, and prohibit political dynasties as may bedefined by law.\" Contains the following slaient features: (1) No person holding any elective public office shall be immediately succeeded by any person having a political dynasty relationship to such public official as defined in Section 4 (a) of this Act; (2) No person having a political dynasty relationship to an incumbent elective public official seeking reelection shall be allowed to run simultaneously with and for the same office the incumbent public official is holding; (3) Persons runninng for the positions of Punong Barangay and Sangguniang Barangay are not covered by the abovestated prohibitions; (4) Candidates running for any elective public office within a province, except for the positions of Punong Barangay and Sangguniang Bar"
