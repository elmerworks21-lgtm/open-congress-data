congress_website_title = "AN ACT GRANTING FIRST PREFERENCE TO THE CLAIMS FOR DAMAGES OF VICTIMS OF HUMAN RIGHTS VIOLATIONS IN THE DISPOSITION OF THE ESTATE OR PROPERTY OF THE OFFENDER"
congress_website_abstract = "Seeks to grant first preference to claims for damages of victims of human rights vioaltions which are adjudicated or decided in favor of the victims by proper courts within or outside the country over all other claims in the disposition of the estate or property, real or personal, of the violator or offender."

