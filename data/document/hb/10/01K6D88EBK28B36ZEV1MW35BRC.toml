congress_website_title = "AN ACT INCREASING THE PENSION OF FORMER PRESIDENTS OF THE REPUBLIC OF THE PHILIPPINES OR THEIR SURVIVING SPOUSES, TO HELP INSURE THAT THEY LIVE IN CONDITIONS OF DIGNITY, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED FIFTY HUNDRED AND FIFTY-NINE, ASAMENDED, AND REPUBLIC ACT NUMBERED TWENTY HUNDRED AND EIGHTY-SEVEN, AS AMENDED"
congress_website_abstract = "INcreases the life pension of every former President of the Philippines and their surviving spouses from [ninety-six thousand pesos (P96,000.00) annually payable at the rate of eight thousand pesos (P8,000.00) monthly] to a SUM EQUIVALENT TO THE ANNUAL SALARY OF THE INCUMBENT PRESIDENT AT THE TIME OF REMITTANCE, PAYABLE MONTHLY IN TWELVE EQUAL INSTALLMENTS."

