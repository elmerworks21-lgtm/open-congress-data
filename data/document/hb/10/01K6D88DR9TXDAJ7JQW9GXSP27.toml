congress_website_title = "AN ACT ESTABLISHING A CODE OF ETHICS AND PROFESSIONAL CONDUCT FOR POLICE PERSONNEL, PRESCRIBING PENALTIES FOR VIOLATIONS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine National Police Code of Ethics and Professional Conduct\" Prescribes the following: (1) ethical standards in the discharge of duties; (2) training; (3) prohibited acts: (4) penalties for violation of any provision of this Act. Provides for a set of guidelines that will help policemen to perform their duties with right and honorable conduct."

