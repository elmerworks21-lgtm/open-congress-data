congress_website_title = "AN ACT TO REGULATE FILIPINO LOTTERY, PROVIDING THE PENALTIES FOR VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Filipino Lottery Act of 1995\" Governs the establoshment, operation, maintenance, regualtion and supervision of Filipino lottery (jueteng, masiao, daily double, last two (2) digits) and other forms of clandestine number games. Designates the PAGCORas the governing regulatory agency for Filipino lottery. Institutes regulatory measure that will impose stiffer penalties against violations of this proposed Act."
