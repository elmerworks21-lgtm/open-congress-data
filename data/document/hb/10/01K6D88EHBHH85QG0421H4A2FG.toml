congress_website_title = "AN ACT PENALIZING STEALING FROM, AND OTHER ACTS OF DESECRATION OF THE DEAD"
congress_website_abstract = "Declares the following --- \"SECTION 1. Notwithstanding any law to the contrary, any person who unless authorized by law, shall take any personal proeprty of the dead person, its corpose or coffin, at its gravesite or burial ground shall be guilty ofrobbery udner Article299 of the Revised Penal Code and be imposed with penalties provided therefor.> Any person who shall wantonly or maliciously deface, break, or destroy any tomb, ornament, or gravestone erectedd to any deceased person, or any momento or memorial, or any plant, trees or shrub pertaining to places of burial of a dead body, or who shall wantonly or maliciously remove any fence, post, or wall or any burial around or cemetery, shall be punished by a fine of not more than ten thouusand (P10,000.00) pesos or by imprisonment for not more than one (1) year, or both.\" Penalizes the person found guilty of violating this Act with a fine of not more than P10,000.00, or by imprisonment for not more than a year, or both."
