congress_website_title = "AN ACT PROMOTING TO ONE RANK HIGHER VETERAN MEMBERS OF THE PHILIPPINE COMMONWEALTH ARMY WHO SERVED IN THE UNITED STATES FORCES IN THE FAR EAST (USAFFE) DURING WORLD WAR II, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Declares the following --- \"SECTION 1. Veteran members of the Philippine Commonwealth Army who served in the USAFFE and fought the Japanese Forces in Bataan and Corregidor and other USAFFE fronts are hereby promoted to one rank higher, based on their existing ranks when they died, left the USAFFE or retired from the service.\""
