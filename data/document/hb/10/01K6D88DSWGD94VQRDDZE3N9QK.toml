congress_website_title = "AN ACT PROHIBITING THE FILING OF ANY COMPLAINT AGAINST PUBLIC OFFICIALS BASED ON MATTERS PENDING AUDIT, INVESTIGATION, OR INQUIRY BY THE COMMISSION ON AUDIT, OR ON DECISIONS, RULING, OR ORDER, OF THE COMMISSION ON AUDIT WHICH IS NOT YET FINAL AND EXECUTORY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to protect public officials from unecessary, frivolous, unwarranted and premature complaints which are resorted to as a vehicle to harass, embarrass or inconvenience the concerned public officials."
