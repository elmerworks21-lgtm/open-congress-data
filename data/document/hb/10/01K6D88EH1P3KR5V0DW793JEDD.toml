congress_website_title = "AN ACT CREATING THE LOCAL GOVERNMENTS' EXPERTS EXCHANGE PROGRAM ACADEMY, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to provide a mechanism for the training of all government officials to ensure an efficient delivery of basic services to the people and the creation of an ideal community to live in. Establishes the LOCAL GOVERNMENTS' EXPERTS EXCHANGE PROGRAMACADEMY that will provide the training and skills to local government officials in terms of local government administration through development planning and urban development."

