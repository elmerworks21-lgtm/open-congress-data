congress_website_title = "AN ACT PROHIBITING THE SALE, DISTRIBUTION AND ADMINISTRATION OF MISLABELED, ADULTERATED AND EXPIRED MEDICINES AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Penalizes all vendors, importers or distributors of any unauthorized or banned medicine to imprisonment of not less than two (2) years but not more than four (4) years, or a fine of not less than THIRTY THOUSAND (P30,000.00) PESOS, but not more thanFIFTY THOUSAND (P50,000.00) PESOS or both at the discretion of the court. Authorizes the Secretary of Health to furnish all drug manufacturers and drug outlets of a LIST of all unauthorized and banned medicines or ingredients and to publish the samein five (5) newspaper of general circulation."

