congress_website_title = "AN ACT REGULATING FOOD AND DRINK THAT DEVELOPS OBESITY AND IMPOSING PENALTIES THEREOF"
congress_website_abstract = "Rationale: The epidemic of obesity is so tremendous, that the UNited State having the highest percentage of obesity, will have 100% of its population obese by year 2230. > A catalogue of diseases are caused and exacerated by obesity. It develops when the amount of calories consumed as food and drink, exceeds the energy used for exercise and other metabolic processes. \"Anti-Obesity Act of 1997\" Directs the DOH, DECS, DILG and the Food and Drug Administration to udnertake a nationwide INFORMATIONCAMPAIGN on the harmful effects of obesity. > States that all food and drinks with greater amounts of calories as determined by the DOH are hereby REGULATED in their manufacture, distribution, sale, or consumption. Prescribes penalties for violationn of this Act."

