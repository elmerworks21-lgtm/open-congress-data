congress_website_title = "AN ACT REORGANIZING THE BUREAU OF IMMIGRATION HEREINAFTER TO BE KNOWN AS THE BUREAU OF IMMIGRATION AND NATURALIZATION, DEFINING ITS ORGANIZATIONAL STRUCTURE AND POWERS AND FUNCTIONS THEREFORE, PROVIDING A SPECIAL APPROPRIATIONS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Establishes 13 immigration districts; creates travel control districts to have jurisdiction over international airports. Legalizes the residence and naturalization of qualified aliens; grants the Bureau of right to determine claims of Philippine citizenship. Retains the Board of Commissioners with quasi-judicial powers; retains the two associate commissioners who shall become automatic members of the board. Repeals RA 7500, deputizing local government treasurers to register aliens; provides organic personnel chance for advancement."

