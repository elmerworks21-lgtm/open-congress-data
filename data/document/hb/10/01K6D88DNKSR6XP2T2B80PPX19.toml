congress_website_title = "AN ACT REQUIRING ALL APPLICANTS AND ACTIVE PERSONNEL OF THE PHILIPPINE NATIONAL POLICE AND OTHER LAW ENFORCEMENT AGENCIES TO UNDERGO PERIODIC DRUG TESTS, PROVIDING PENALTIES FOR VIOLATIONS THEREOF, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Requires all active personnel of the Philippine National Police (PNP) and all other law enforcement agencies to udnergo drug tests within six (6) months from the date of effectivity of this Act and every six (6) months thereafter and requires also applicants to undertake this test as part of the requirement for acceptance."
