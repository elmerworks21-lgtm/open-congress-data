congress_website_title = "AN ACT TO APPROPRIATE FUNDS FOR THE BARANGAY HEALTH WORKERS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7883"
congress_website_abstract = "Rationale: The thousand barangay health workers are the front line helpers of the national government in providing the needed health care services of the millions of people of our country, especially in the countryside. They serve as the immediate representatives of the civil service in performing their duty of delivering services to the people. Seeks to provide a P600.00 subsistence allowance to barangay health workers."

