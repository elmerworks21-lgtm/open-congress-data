congress_website_title = "AN ACT PROVIDING FOR THE RETENTION OF CIVIL AND POLITICAL RIGHTS OF NATURAL-BORN FILIPINOS WHO HAVE ACQUIRED OTHER CITIZENSHIP BY REASON OF MARRIAGE AND DOMICILE ABROAD"
congress_website_abstract = "Covers all natural-born Filipinos who have subsequently acquired other citizenship by reason of marriage or domicile abroad. These rights include: (1) the right to practice one's profession even if the degree is earned abroad; provided, they passedthe requirements set by the proper government regulating body, which requirements shall not include the qualification of Filipino citizenship; (2) the right to acquire properties, real or personal; (3) the right of suffrage; (4) the right to tax exemption benefits granted by law to Filipino citizens; (5) the right to invest even in areas of business limited to Filipino citizens; and (6) the right to explore and enjoy natural resources limited to Filipino citizens."

