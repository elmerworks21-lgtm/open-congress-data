congress_website_title = "AN ACT REQUIRING THE INCLUSION OF ABACA PLANTING IN THE GOVERNMENT REFORESTATION PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Includes abaca planting in the government's reforestation program. States that there is need for the government to hasten the abaca expansion through the use of upland and the mountainous areas and that abaca can be intercropped with timber trees and pulp woods which will also help augment the income of small farmers and individual landowners engaged in tree planting."

