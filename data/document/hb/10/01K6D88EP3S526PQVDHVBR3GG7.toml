congress_website_title = "AN ACT ESTABLISHING THE SMALL AND MEDIUM ENTERPRISES SECURITIES EXCHANGE AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Small and Medium Enterprises Securities Exchange (SMEC) Act of 1997\" Defines the SMEX as a capital market catering primarily to small and medium enterprises and other business entities that do not meet the listing requirements of the regular Boardof the Philippine Stock Exchange. Describes the operation of the SMEX."
