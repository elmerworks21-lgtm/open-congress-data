congress_website_title = "AN ACT CREATING INCENTIVES FOR UNDERTAKING GOVERNMENT INFRASTRUCTURE CONSTRUCTION WORKS AT NIGHT, AMENDING CERTAIN PROVISIONS OF THE LABOR CODE AND THE TAX CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides that in case the builder/contrac tor of government infrastructure projects decide to pay the night shift differential, the builder/contrac tor shall be allowed a TAX CREDIT equivalent to the TOTAL AMOUNT OF NIGHT SHIFT DIFFERENTIAL paid deductible from the income tax due from the current year."

