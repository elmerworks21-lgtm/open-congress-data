congress_website_title = "AN ACT TO PROVIDE A UNIFORM MANDATORY PERIOD FOR PRELIMINARY INVESTIGATION"
congress_website_abstract = "States that preliminary investigation shall be conducted and termianted within a period of FIFTEEN (15) DAYS upon receipt by the investigating prosecutor of the affidavits of the complaint and his witnesses. States that failure to observe the mandatory periods which are NON-EXTENDIBLE shall constitute a ground for suspension or removal."

