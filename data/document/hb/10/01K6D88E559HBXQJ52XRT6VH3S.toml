congress_website_title = "AN ACT STRENGTHENING THE MOVIE AND TELEVISION REVIEW AND CLASSIFICATION BOARD (MTRCB), AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF PRESIDENTIAL DECREE NUMBERED NINETEEN HUNDRED AND EIGHTY-SIX"
congress_website_abstract = "Increases the membership of the MTRCB from [thirty (30)] to THIRTY-SIX (36), and the term of office of the members from [one (1) year] to THREE (3) years. Allows the other sectors of society -- the family, academe, Church, actual communities and NGOs -- to become members of the Board; enhances the power and functions of the Board, such as to regulate importation/exp ortation, production, sale and exhibition of films."

