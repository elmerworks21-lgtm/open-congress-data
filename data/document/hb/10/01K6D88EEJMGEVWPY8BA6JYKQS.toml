congress_website_title = "AN ACT PROVIDING THAT CERTAIN PERCENTAGE OF THE APPROPRIATION OF THE DEPARTMENT OF PUBLIC WORKS AND HIGHWAYS FOR ITS INFRASTRUCTURE PROJECTS BE ALLOCATED FOR THE CONSTRUCTION OF THE WATER EMPOUNDING SYSTEM ALL OVER THE COUNTRY"
congress_website_abstract = "Rationale: \"The water impounding system to be constructed will hold the water gathered during the rainy season before it goes to the creek and river. The waters impounded can be utilized during the summer season for agricultural and other purposes.It will provide our farmers with constant supply of water making it possible for them to double their production. This will not only solve the resident's food supply problem but also the personal water consumption needs.\""

