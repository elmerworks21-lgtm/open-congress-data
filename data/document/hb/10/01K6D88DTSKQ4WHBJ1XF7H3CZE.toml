congress_website_title = "AN ACT INTEGRATING ALL NATIONAL, PROVINCIAL, SUB-PROVINCIAL, CITY, AND MUNICIPAL JAILS, PLACING FOR THE PURPOSE THE BUREAU OF CORRECTIONS, PROVINCIAL/SUB- PROVINCIAL JAILS AND THE BUREAU OF JAIL MANAGEMENT AND PENOLOGY UNDER A NEW BUREAU, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to improve the existing penal system in the Philippines by abolishing the Bureau of Corrections, Bureau of Jail Management and Penology and the provincial jail services which is being maintained by the provincial government. Establishes a competent corrections bureau to be known as BUREAU OF CORRECTIONAL services which shall be responsible for the proper custody and rehabilitation of one inmates in the national prisons and one provincial, subprovincial, district, city and municipal jailsin one country."
