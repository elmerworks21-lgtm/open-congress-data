congress_website_title = "AN ACT MANDATING THE UNIFORM IMPLEMENTATION OF PRESIDENTIAL DECREE NO. 1181, OTHERWISE KNOWN AS \"THE ANTI-POLLUTION LAW\", MANDATING THE LAND TRANSPORTATION OFFICE (LTO) TO MAKE PASSING THE SMOKE EMISSION TEST A PREREQUISITE TO REGISTRATION OF MOTORVEHICLES AND TO AUTHORIZE THE LOCAL GOVERNMENT UNITS TO CONDUCT THE SMOKE EMISSION TEST AND ISSUE A CERTIFICATE OF COMPLIANCE TO THE EFFECT"
congress_website_abstract = "Rationale: Motor vehicles operators and drivers going to and from different places complain that even if they have already complied with the smoke emission tests law in their own hometown they are again charged with violation of P>D. 1181 because nouniform specific guidelines are being followed by each local government unit in the implementation of the law. >Requires all LGUs purchase STANDARD UNIFORM EQUIPMENT for smoke emission tests; a certificate of compliance shall them be issued and to be used as a requirement for registration. The Certificate of Compliance shall be valid for ONE (1) YEAR from date of issue. Penalizes violation of this Act."

