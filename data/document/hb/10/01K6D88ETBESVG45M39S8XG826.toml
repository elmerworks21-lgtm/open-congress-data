congress_website_title = "AN ACT CREATING THE NATIONAL AIDS CONTROL COMMISSION, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Acquired Immune Deficiency Syndrome (AIDS) Control Act of 1997\" Proposes the creation of the NATIONAL AIDS CONTROL COMMISSION whose principal function is to coordinate the various HIV-AIDS prevention, control and research activities of both the public and private medical and other sectors. Prescribes the powers and duties of the Commission; provides for (1) an information - dissemination campaign on AIDS prevention and control; (2) regulation of the issuance of working permits, as well as of blood banks and other related facilities."

