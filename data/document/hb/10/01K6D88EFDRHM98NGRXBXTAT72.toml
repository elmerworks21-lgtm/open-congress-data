congress_website_title = "AN ACT PROVIDING TAX INCENTIVES TO PRIVATE AND GOVERNMENT-OWNE D AND -CONTROLLED CORPORATIONS FOR THE PROMOTION OF EMPLOYEES STOCK OWNERSHIP PLAN"
congress_website_abstract = "Defines ESOP-EMPLOYEE STOCK OWNERSHIP as a contribution plan in which the sponsoring employer or corporation makes regular contributions which accumulate to produce a benefit for employees, In return, ESOP sponsors shall receive various tax incentives as provided in this Act. Technically, it is a stock bonus plan for the employees designed to invest primarily in the sponsoring employer's stocks or securities. It rewards employees with a benefit tied to corporate performance. Provides for: (1)Methods of Contributions; (2) Limits to Contributions; (3) Entitlement to Fair Market Value; (4) Tax Incentives."

