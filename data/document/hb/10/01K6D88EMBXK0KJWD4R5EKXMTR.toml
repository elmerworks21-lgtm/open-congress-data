congress_website_title = "AN ACT AMENDING SECTIONS 61, 62 AND 63 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE \"LOCAL GOVERNMENT CODE OF 1991\", REMOVING THE POWER OF THE VARIOUS SANGGUNIANS TO INVESTIGATE COMPLAINTS AGAINST LOCAL GOVERNMENT OFFICIALS AND VESTING THE SAMESOLELY UPON THE OFFICE OF THE OMBUDSMAN"
congress_website_abstract = "Rationale: Without denigrating the competence of the Honorable Members of the various Sanggunians, it is but logical to conclude that given the same set of facts, the Office of the Ombudsman would be more objective that a Sanggunian in the investigation of a complaint against a local government official, as being an independent Constitutional body, the former does not owe anyone any political debt.> Consequently, the matter of preventive suspension will not be imposed arbitrarily, as is the wont of many officials today, but will be one based on a rational consideration of the facts."

