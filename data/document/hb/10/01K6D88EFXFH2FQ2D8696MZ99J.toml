congress_website_title = "AN ACT CREATING THE POSITION OF FISHERIES OFFICER IN COASTAL MUNICIPALITIES, CITIES AND PROVINCES AND IN THOSE WHERE A SUBSTANTIAL NUMBER OF THE INHABITANTS OF THE LOCAL GOVERNMENT UNIT CONCERNED IS ENGAGED IN INLAND FISHING OR THE CULTURE OF FISHERIES AND AQUATIC RESOURCES, AMENDING FOR THE PURPOSE SECTIONS 443, 454, 463 AND 482 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: The fisheries sector is now faced with the problem of over-exploitati on of fisheries resources. Large-scale commercial fishing and the use of prohibited means of fishing have resulted in the depletion of fisheries resources, extinction of fish specieis and the destruction of coral reefs. > One major factor which contributed to this problem is the lack of effective government officials at the local level who will help in the formualtion and implementation of policies and programs relating to fisheries and aquatic resources. > Provides, therefore, for the position of FISHERIES OFFICER who will formulate and develop measures, plans, strategies relating to fisheries and aquatic resources."

