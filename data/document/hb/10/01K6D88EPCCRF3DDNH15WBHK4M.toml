congress_website_title = "AN ACT AMENDING THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, AND FOR OTHER PURPOSES (ctrp III)"
congress_website_abstract = "Rationale: The present SCHEDULAR SYSTEM of taxation embodied in the National Internal Revenue Code which taxes different types of income at DIFFERENT RATES is hardly in keeping with the constitutional mandate of \"uniform\", \"equitable\" and \"progressive\" taxation. >This disparity has resulted in a regressive income tax system where the burden of carrying the cost of government is NOT distributed fairly by income classes. Those who have been paying more and those who have more, pay LESS in sharingthe cost of government --- \"hard-earned income is taxed at rates higher than idle or passive income.\" \"TAX REFORM ACT OF 1997\" Proposes, therefore, the following structural reforms --- (1) SHIFT from a [schedular] to a GLOBAL system of taxation; >TThe shift will ensure that the burden of taxation is DISTRIBUTED in accordance with ABILITY TO PAY; (2) The pooling of income from all sources and then taxed, using a UNITARY RATE ranging from 5-30% for individuals, and 35% for corporations; (3) DEDU"
