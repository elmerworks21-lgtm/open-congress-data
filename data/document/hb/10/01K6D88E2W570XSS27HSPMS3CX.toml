congress_website_title = "AN ACT REQUIRING THE PHILIPPINE NATIONAL POLICE TO SERVE PROCESSES ISSUED BY ANY COURT, PROSECUTION OFFICE OR PUBLIC ATTORNEY'S OFFICE, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED AND SEVENTY-FIVE OTHERWISE KNOWN AS THE 'DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990'"
congress_website_abstract = "Imposes upon the members of the PNP the mandatory responsibility to serve all criminal processes of any court, the prosecution officer of the National Prosecution Service and the Public Attorney's Office."
