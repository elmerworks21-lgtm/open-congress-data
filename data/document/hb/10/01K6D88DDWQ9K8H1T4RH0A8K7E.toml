congress_website_title = "AN ACT PROVIDING FOR A PHILIPPINE FISHERIES CODE"
congress_website_abstract = "\"The Philippine Fisheries Code of 1995\" Codifies and updates all existing laws governing the management, utilization, development and conservation of the country's fishery and aquatic resources. Provides for a genuine and comprehensive fisheries code based on the principle of a democratized and Filipinized fishing industry with the ends in view of tapping the country's ocean resources."
