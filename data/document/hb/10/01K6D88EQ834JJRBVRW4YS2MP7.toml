congress_website_title = "AN ACT AMENDING SECTION ELEVEN OF PRESIDENTIAL DECREE NUMBERED TWELVE HUNDRED AND NINETEEN AS AMENDED BY PRESIDENTIAL DECREE NUMBERED SIXTEEN HUNDRED AND NINETY-EIGHT OTHERWISE KNOWN AS 'THE CORAL RESOURCES DEVELOPMENT AND CONSERVATION DECREE' AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Seagrass are a rich breeding and feeding grounds for small fishes, shells, and other animal marine life. They are creeping underwater plants near shores that, unlike seaweeds, produce flowers and fruits. > If corals are fish breeding grounds, seagrass are their nurseries and playgrounds. During low tide, a variety of mullusks, sea urchins, sea cucumbers, crustaceans, ells, mussels, snails, small fish and shellfish can be picked from seagrass beds by fishermen and even birds. > Seeksto INCLUDE, \"SEAGRASSES\" as among the aquatic resources (ordering corals included) mandated by law to be protected and conserved, their use of which is considered a PUNISHABLE act."

