congress_website_title = "AN ACT FURTHER AMENDING SECTIONS 27 AS AMENDED BY REPUBLIC ACT NO. 8045 AND SECTIONS 28, 29 AND 30 OF REPUBLIC ACT NO. 7166 BY PROVIDING FOR COMELEC TABULATION OF MUNICIPAL AND CITY RETURNS FOR NATIONALLY ELECTED OFFICIALS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to do away with the provincial canvass for nationally elected oficials. Municipal and city returns shall be sent by the fastest and most reliable means of communication direct to COMELEC which will tabulate about 1,609 returns. Thus, each return will only be about 1/1,609 or .062% of the total votes cast. This will make tampering of returns more difficult because of the much bigger number of returns and city returns which would be about 142."
