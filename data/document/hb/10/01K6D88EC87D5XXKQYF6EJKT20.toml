congress_website_abstract = "\"Animated Cartoons Regulation Act of 1993\" Mandates the following \"SEC. 3. Regulated Animated Cartoons. - The showing of animated cartoons in television monitors or in film depicting violences or unethical conducts shall be aired only at such timeswhen children of formative years are not usually watching television and shall be subjected to a system of rating similar to the one being attached to films. Penalizes vioaltion of this Act."

