congress_website_title = "AN ACT TO INSURE THE EXPEDITIOUS COMPLETION OF GOVERNMENT PROJECTS WITHOUT DELAY, AND PROVIDING PENALTIES AND SANCTIONS FOR VIOLATIONS THEREOF"
congress_website_abstract = "\"Government Projects Expeditious Completion Act\" Seeks to solve the problem of delays in the ocmpletion of government projects due to court orders or injunctions which restrain or prohibit the government from awarding, implementing or terminating contracts for government projects, or undertaking any other lawful activity necessary for such projects, thereby resulting in unwarranted cost increases and undermined social benefits from such projects. * * *"
