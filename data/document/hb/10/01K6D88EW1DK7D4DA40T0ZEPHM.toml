congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED EIGHTY-TWO NINETY-TWO (REPUBLIC ACT NO. 8292), OTHERWISE KNOWN AS 'AN ACT PROVIDING FOR THE UNIFORM COMPOSITION AND POWERS OF THE GOVERNING BOARDS, THE MANNER OF APPOINTMENT AND TERM OF OFFICE OF THE PRESIDENT OF CHARTERED STATE UNIVERSITIES AND COLLEGES, AND FOR OTHER PURPOSES'"
congress_website_abstract = "Seeks to INCLUDE the Director General of the TESDA or his duly designated representative in the governing board of State colleges and universities. > Proposes, likewise, that one (1) of the two (2) permanent citizens to be chosen by the Board shallbe a TECHNICAL/VOCAT IONAL EDUCATION AND TRAINING (TVET) PRACTITIONER OR SHAREHOLDER from the city or province where the school is located."

