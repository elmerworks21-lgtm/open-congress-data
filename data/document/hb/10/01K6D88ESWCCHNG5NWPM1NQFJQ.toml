congress_website_title = "AN ACT INCREASING THE MINIMUM DAILY WAGE OF WORKERS, PROVIDING THE POLICY MECHANISM FOR REFORMING WAGE DETERMINATION AND INCOME DISTRIBUTION, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Wage Policy Reform Act of 1997\" Declares it the policy of the State to provide for and ensure a living wage for the Filipino worker and improve the quality of his life. Mandates the following --- \"SEC. 3. Operationalizin g the Living Wage. - Uponthe effectivity of this Act, every covered employer shall pay to each of his employees a daily minimum wage equivalent to the mandated living wage as computed by the Department of Labor and Employment, in coordination with the National Census andStatistics Office, and genuine representatives of labor and management.\" Provides, likewise, for the grant of EMERGENCY LIVING ALLOWANCE."

