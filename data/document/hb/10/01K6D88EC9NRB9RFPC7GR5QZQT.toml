congress_website_title = "AN ACT GRANTING ADDITIONAL ALLOCATION TO ALL LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Provides for the following --- \"BEGINNING THE FISCAL YEAR AFTER THE CURRENT FISCAL YEAR AND THEREAFTER AN AMOUNT EQUIVALENT TO ONE-PERCENT (1%) OF THE TOTAL INTERNAL REVENUE ALLOTMENT FOR LOCAL GOVERNMENT UNITS SHALL BE ADDED AS A SPECIAL ALLOCATIONTO LOCAL GOVERNMENT UNITS: PROVIDED, THAT THE SHARE OF WACH PROVINCE, CITY AND MUNICIPALITY SHALL BE ALLOCATED ON THE BASIS OF THE FORMULA PROVIDED UDNER SECTION 285 OF THIS CODE.\""

