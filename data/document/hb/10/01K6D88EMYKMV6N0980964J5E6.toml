congress_website_title = "AN ACT REQUIRING CAUTIONARY LABEL ON CONTAINERS OF ALL BEVERAGES FOR SALE OR DISTRIBUTION AND AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7394, OTHERWISE KNOWN AS THE CONSUMER ACT OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to add the following article to RA 7394, which shall read as follows: \"Art. 94 - A. Labeling Requirements of Beverages. - All beverages for sale or distribution within the country shall be in a container which shall bear, in a conspicuous place and in bold type, the following statement or its equivalent in Filipino: WARNING: THIS BEVERAGE MAY NOT BE GOOD FOR YOUR HEALTH. CONSULT YOUR DOCTOR.\" Any advertisement of beverages shall contain the warning as indicated in the label.\" Penalizesviolation of thos Act."

