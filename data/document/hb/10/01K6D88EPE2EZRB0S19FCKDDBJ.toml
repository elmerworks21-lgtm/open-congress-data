congress_website_abstract = "Rationale: The youth are the inheritors and hope of the future. The fundamental law of the land, in Section 13, Article II under the Declaration of Principles and State Policies, provides that, \"The State recognizes the vital role of the youth in nation-building and shall promote and protect their physical, moral, spiritual, intellectual and social well-being.\" Time and again, we are reminded that our country is the creation of the young. Jose Rizal, Apolinario Mabini, Andres Bonifacio, EmilioAguinaldo, Teresa Magbanua and their peers were in their youth when they wrote their first novels, fought their first battles and sacrificed life andd comfort for La Patria. Until today, the youth remain a potent force in bringing about positive chhanges in our society and in advancing national development.> The youth, who comprise 60 percent of today's population, have a lot to contribute to the ¬untry, and to the world. Their significant number could make a difference in our national life a"

