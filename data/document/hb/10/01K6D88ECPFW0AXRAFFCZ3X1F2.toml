congress_website_title = "AN ACT AUTHORIZING THE REGISTER OF DEEDS TO CORRECT TYPOGRAPHICAL ERRORS IN CERTIFICATES OF LAND TITLES, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 1529, OTHERWISE KNOWN AS THE 'PROPERTY REGISTRATION DECREE'"
congress_website_abstract = "Rationale: \"Under the present registration law, all cases of amendment and alternation of certification of land titles, be it a very minor correction of a clerical or typographical error, are filed with the REgional TRial Court. This proves to be burdensome, time-consuming and expensive for the owners of the land. Seeks, therefore, to remedy the situation with the proposal."

