congress_website_title = "AN ACT AUTHORIZING THE GRANT OF FREE PATENT UNDER CERTAIN CONDITIONS ON RESIDENTIAL LANDS, AMENDING FOR THE PURPOSE BATAS PAMBANSA BILANG DALAWANG DAAN DALAWAMPU'T TATLO"
congress_website_abstract = "Rationale: a great percentage of residential lands of the country have not been titled. People believe that lands are means for economic security and are determinative of the family's future, and therefor, titling of the same through the grant of free patent shall be facilitated. States that all application for free patent under this Act shall be filed on or before December 31, [1987] 2016."
