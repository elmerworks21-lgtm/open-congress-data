congress_website_title = "AN ACT MAKING DECISIONS OF THE MUNICIPAL TRIAL COURTS IN UNLAWFUL DETAINER CASES BASED ON EXPIRED CONTRACTS OF LEASE FINAL AND IMMEDIATELY EXECUTORY"
congress_website_abstract = "\"Ejectment of Lessees with Expired Contracts Act\" Declares that any decision of a MUNICIPAL TRIAL COURT in cases of UNLAWFUL DETAINER based on the expiration of a contract of lease which has been final shall BE immediately EXECUTORY, WITH OR WITHOUTAN APPEAL taken by the LESSEE."

