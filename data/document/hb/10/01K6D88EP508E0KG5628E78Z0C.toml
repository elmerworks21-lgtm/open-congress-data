congress_website_title = "AN ACT TO GRANT FRANKING PRIVILEGE TO LOCAL GOVERNMENTS"
congress_website_abstract = "Rationale: The national government is privileged with an exemption from the payment of postage for official mails to expedite the conduct of official business. Such privilege however is denied the local governments whose activities have increased significantly because of an expanded mandate. Provides, therefore, for the following --- \"SEC. 3 Franking Privilege shall hereby be granted to local governments, provided, that such privilege shall only be used in the conduct of official business and,provided further, that such privilege shall not be used for personal or partisan political purposes.\" Prescribes, likewise, penalties for vioaltion of this Act."

