congress_website_title = "AN ACT ADJUSTING THE AMOUNTS OF PERSONAL EXEMPTIONS AND MINIMUM TAXABLE INCOME TO BE MORE RELEVANT TO THE CURRENT COST OF LIVING"
congress_website_abstract = "Seeks to make the amount of personal eemption at par with the current cost of living. Proposes the following scheme of personeal exemptions: (1) P9,000.00 for single individual or legally separated individual with no qualified dependents. (2) P18,000.00 for head of the family; (3) P18,000.00 for married individual; (4) P18,000.00 for each husband and wife electing to derive taxable income otherwise only the spouse deriving taxable income can avail of the exemption; and (5) P5,000.00 per qualified dependent children not exceeding four."
