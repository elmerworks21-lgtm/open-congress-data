congress_website_title = "AN ACT TO PROTECT DOMESTIC INDUSTRIES FROM UNFAIR COMPETITION BROUGHT ABOUT BY THE PRESENCE OF PRODUCTION AND/OR EXPORT SUBSIDIES AMENDING FOR THAT PURPOSE SECTION 302 ON COUNTERVAILING DUTY OF THE TARIFFS AND CUSTOMS CODE OF THE PHILIPPINES"
congress_website_abstract = "Puts into place the built-in safety nets of the World Trade Organization (WTO) through an amendment to repeal the provisions of Section 302 and align it with that of the Uruguay Round (UR) Agreement on Subsidies and Countervailing Duties (SCM). Transfers part of the administrative functions of the Department of Finance (DOF) and the Tariff Commission to the Department of Trade and Industries (DTI) to implement Section 302, particularly in the receiving of applications for investigation, the conduct of the preliminary investigation and the decision to impose the preliminary countervailing duties (CVDs), and the final decision to impose a definitive CVD."
