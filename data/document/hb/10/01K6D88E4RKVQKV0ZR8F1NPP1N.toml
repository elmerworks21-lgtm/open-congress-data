congress_website_title = "AN ACT ALLOWING NEWLY ESTABLISHED CORPORATIONS OR FIRMS NEWLY VENTURING INTO OTHER LINES OR AREAS OF BUSINESS TO DEDUCT THEIR OPERATIONAL LOSSES DURING THE TAXABLE YEAR AND THE YEAR THEREAFTER, AMENDING FOR THIS PURPOSE SECTION 29 (2) OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "Declares that NEWLY ESTABLISHED CORPORATIONS, OR EXISTING COMPANIES NEWLY VENTURING INTO OTHER OR NEW LINES OR AREAS OF BUSINESS, SHALL BE ALLOWED, DURING THEIR FIRST TWO (2) YEARS OF OPERATION, TO CARRY OVER AS DEDUCTION FROM THEIR GROSS INCOME INTHE SUCCEEDING YEAR THE OPERATING LOSS THEY MAY INCUR DURING THE TAXABLE YEAR; PROVIDED, FURTHER, THAT ANY PORTION OF SUCH LOSS WHICH IS IN EXCESS OF THE TAXABLE INCOME SHALL BE DEDUCTED FROM THE GROSS INCOME OF THE SUCCEEDING YEARS BUT NOT BEYOND THE THIRD YEAR OF THEIR OPERATION. OPERATING LOSS SHALL MEAN THE LOSS ARISING FROM AND ACTUALLY SUSTAINED BY THE CORPORATION IN THE CONDUCT OR OPERATION OF ITS BUSINESS OR TRADE WITHIN THE TAXABLE YEAR AND NOT COMPENSATED FOR BY INSURANCE OR OTHERWISE."
