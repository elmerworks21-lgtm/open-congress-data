congress_website_title = "AN ACT PROHIBITING THE USE OF NON-BIODEGRADAB LE PLASTIC MATERIALS AS CONTAINERS, BAGS, WRAPPERS OR PACKAGING FOR CONSUMER PRODUCTS AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Rationale: Plastic has taken its toll against our natural environment. It accounts for a great percentage of the urban and industrial waste in the country, most of which are disposed of in rivers, esteros, seas, lakes and landfills.> Refers to inorganic materials with chemical and physical properties which prevent immediate decomposition, or materials that cannot be readily broken down by exposure to the natural environment. Penalizes the violation of this Act."

