congress_website_title = "AN ACT TO AMEND SUBSECTION (C), SECTION 1 OF PRESIDENTIAL DECREE NUMBERED ONE THOUSAND EIGHT HUNDRED AND TWENTY NINE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to reconcile Section 1 (c) of Presidential Decree No. 1829 and Art. 20 of the Revised Penal code with respect to those who commit a crime as mere accessory by harboring or concealing the escape of any person he knows, or has reasonable groundto believe or suspect, has committed any offence under existing penal laws in order to prevenet his arrest, prosecution and conviction."

