congress_website_title = "AN ACT ESTABLISHING THE RULES TO GOVERN THE ADOPTION OF FILIPINO CHILDREN IN THE PHILIPPINES, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Contains provisions which seek to correct the following deficiencies in the Child and Youth Welfare Code and the Family Code: (1) The exclusion of qualified individuals from adopting locally; (2) Ambiguous and inconsistent rules on succession; (3) rescission of adoption where the adopted is a minor; (4) denial of maternity leaves to adoptive parents; (5) absence of penalties from disregard of adoption laws; and (6) the problem of \"simulated\" births."
