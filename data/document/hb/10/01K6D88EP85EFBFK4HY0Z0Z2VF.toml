congress_website_title = "AN ACT PROVIDING LEGAL ASSISTANCE TO MEMBERS OF THE PHILIPPINE NATIONAL POLICE CHARGED WITH SERVICE-CONNECT ED OFFENSES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: This bill seeks to provide legal assistance to members of the Philippine National Police who may be charged with service-connect ed offenses. > A policeman is always actively engaged in eradicating widespread lawlessness, disorder and wanton destruction of lives and property. In carrying out these dangerous tasks, he is necessarily in constant contact with civilians. His actions are monitored by the human rights advocates. Aims, therefore, to provide support to the policeman who ischarged in court for an offense arising from the performance of his duties."
