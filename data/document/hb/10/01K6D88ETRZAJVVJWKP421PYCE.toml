congress_website_title = "AN ACT TO REGULATE THE PRINTING/INDICA TION OF EXPIRY DATES ON BOTTLES, CARTONS AND OTHER CONTAINERS OF DRUGS, COSMETIC, FOOD AND SUPPLEMENTS, FOOD ADDITIVES AND OTHER HEALTH ITEMS, THE MARKETING AND SALE THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates the following --- \"SECTION1. Every commercial or indsutrial firm or entity or other person authorized to manufacture and/or produce drugs, cosmetic, food and supplement, food additives and other health items meant to maintain and otherwiseenhance or promote the health of persons, or sub-manufacture rs, sub-producers or other agents of such entities or persons shall indicate prominently and in big, bold letters the expiry dates of such health items on the bottles, cartons, packets or other containers thereof. In case such health items are in tablet form, the expiry date shall be printed and otherwiese indicated individually on the wrapping of each tablet or on the tablet itself in case it is not wrapped.\" Prescribes penalties forviolation of this Act."

