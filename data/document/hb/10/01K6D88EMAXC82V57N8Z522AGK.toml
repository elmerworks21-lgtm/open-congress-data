congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE COAST GUARD AS A SEPARATE AND DISTINCT SERVICE FROM THE PHILIPPINE NAVY AND ATTACHING THE SAME TO THE DEPARTMENT OF TRANSPORTATION AND COMMUNICATIONS"
congress_website_abstract = "Rationale: Under the present set-up, the PCG is under the Philippine Navy and it is aligned with the Department of National Defense. However, a close scrutiny of the functions of the PCG would reveal that it is primarily concerned with the safety oflife and property at sea and the protection and preservation of marine environment. This responsibility of PCG is not directly related with any of the functions of the Philippine Navy. It is obvious that the role of the PCG in national defense is not as critical as compared to other service branches of the Armed Forces, while its role in maritime transportation, especially concerning maritime safety can not be downplayed.> \"Philippine Coast guard Law of 1996\" > Provides for: (1) Establishmentand transfer; (2) general powers and functions; (3) operational placement; (4) organizational and commoned structure; and (5) personnel."

