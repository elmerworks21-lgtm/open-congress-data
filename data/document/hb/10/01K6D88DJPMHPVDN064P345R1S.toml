congress_website_title = "AN ACT REQUIRING THE LESSOR TO DEPOSIT IN BANK THE CASH DEPOSIT OF LESSEE IN A LEASE AGREEMENT, AMENDING FOR THE PURPOSE SECTION THREE OF BATAS PAMBANSA BILANG WALONG DAAN PITUMPU'T PITO ENTITLED, \"AN ACT PROVIDING FOR THE STABILIZATION AND REGULATION OF RENTALS OF CERTAIN RESIDENTIAL UNITS AND FOR OTHER PURPOSES\", AS AMENDED"
congress_website_abstract = "Requires the lessort to deposit in a bank the one month deposit for rental during the entire duration of the lease agreement. Any and all interest that shall accrue therein shall be returned to the lessee at the expiration of the lease contract."

