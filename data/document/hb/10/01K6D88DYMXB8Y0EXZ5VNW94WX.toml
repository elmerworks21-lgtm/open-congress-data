congress_website_title = "AN ACT AMENDING SECTIONS 1 AND 2 OF REPUBLIC ACT NO. 4670, OTHERWISE KNOWN AS THE MAGNA CARTA FOR PUBLIC SCHOOL TEACHERS BY PROVIDING FOR THE INCLUSION OF NON-TEACHING PERSONNEL IN ALL LEVELS, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Magna Carta for Public School Teachers and Non-Teaching Personnel\" Includes the non-teaching schooteachers in the benefits enjoyed by the Public schoolteachers. Defines the term \"NON-TEACHING PERSONNEL\" to mean all employees in the education service, regardless of the value of their work and status of employment and including employees in the Department of Education, Culture and Sports."

