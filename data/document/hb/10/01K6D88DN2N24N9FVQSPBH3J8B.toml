congress_website_title = "AN ACT EXEMPTING SAVINGS DEPOSITS AMOUNTING TO FIFTY THOUSAND PESOS OF LESS FROM WITHHOLDING TAX, AMENDING SECTION 21(C)(1) OF THE NATIONAL INTERNAL REVENUE CODE THEREBY, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Small Deposits Exemption Law\" States that all SAVINGS DEPOSIT in any banking or quasi-banking institutions amounting to P50,000.00 or less shall be EXEMPTED from withholding taxes which shall be enjoyed only by NATURAL PERSONS as defined by the Civil Code. Requires personbs filing their Individual Income Tax Returns to submit a Bank Certification as to the amount of their deposits. Certification reflecting P50,000.00 or less shall be required to declare the interest earned by their deposits asincome and shall be taxed accordingly."

