congress_website_title = "AN ACT PROVIDING FOR EXTRAORDINARY PENALTIES FOR POSSESSION OF ILLEGAL DRUGS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Drug Possession Act\" Declares the following --- \" SECTION 2. PRIMA FACIE EVIDENCE. The mere possession of prohibited drugs including but not limited to shabu, marijuana, cocaine and the like shall be prima facie evidence that the possessor isa user of prohibited drugs.\" Provides, likewise, for the following penalties: \"SECTION 3. The penalty for possession of prohibited drugs shall be SIX YEARS AND ONE DAY imprisonment and fine of P60,000.00 or both upon the discretion of the judge. In the alternative, the accused may be required to render community service for the same period and/or be made to use clothing with proper markings \"I AM A USER OF PROHIBITED DRUGS\" or words to the effect. Furthermore, the State us ehreby allowed to ppaint markings of the same nature in the last known residence of the accused for the same period of time he was sentenced.\""

