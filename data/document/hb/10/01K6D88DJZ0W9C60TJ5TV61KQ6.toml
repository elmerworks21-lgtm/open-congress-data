congress_website_title = "AN ACT GRANTING PATERNITY LEAVE BENEFIT TO ALL MARRIED MALE EMPLOYEES IN CASES OF CHILDBIRTH OF THEIR LEGAL WIVES, AND FOR THIS PURPOSE AMENDING ARTICLE 133 OF THE LABOR CODE OF THE PHILIPPINES, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Amends Article 133 of the Labor Code of the Philippines, as amended, by granting all married male employees, in cases of childbirth of their legal wives, seven (7) days of paternity leave with pay which can be availed of during the first four weeksafter delivery, abortion or miscarriage."
