congress_website_title = "AN ACT TO REGULATE THE PRACTICE OF PHYSICAL THERAPY IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "The controversy surrounding the 1996 physical therapy and occupational therapy examination placed in bad light the integrity of the Members of the Board of Examiners and the Professional Regulation Commission. The incident runs counter to the aspiration of the present administration for an ethical government which is the component of the culture of excellence in our bureaucracy through the concerted efforts from all sectors to demand and insist on quality and honesty in public service. \"Philippine Physical Therapy Law\" Aims to --- (1) improve the quality of physical therapy education in the country; (2) create and strengthen the Board of Physical Therapy which will be tasked to maintain highly professional, ethical and technical standards;; and provide for a COUNCIL OF PHYSICAL THERAPY EDUCATION, separate and distinct from that of the Occupational Therapy Education."

