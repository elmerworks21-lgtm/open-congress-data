congress_website_title = "AN ACT SYNCHRONIZING THE ELECTIONS OF BARANGAY OFFICIALS WITH THE KABATAANG BARANGAY MEMBERS IN A SIMPLIFIED MANNER, BEING NON-PARTISAN"
congress_website_abstract = "Rationale: The present separate elections for the barangay officials and the Sangguniang Kabataan (SK) members entail too much time, resources and effort which could have otherwise been devoted to more fruitful economic and community development activities. More so, that our elections were being held on weekdays which had to be declared as public holidays if contrasted to the United States of America ( a fully developed country) and other democratic countries where election day is not declareda public holiday. This keeps their economy going faster than ours, while our workforce suffers loss of productivity, and our studentry, loss of learning/traini ng hours. > Proposes SIMULTENEOUS ELECTIONS for barangay officials and Sangguniang Kabataaan (SK) members IN EVERY ZONE, ON APRIL 9, 2000, and ON THE SAME DATE EVERY FOUR (4) YEARS thereafter, udner a SIMPLIFIED PROCEDURE."

