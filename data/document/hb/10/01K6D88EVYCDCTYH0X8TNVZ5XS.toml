congress_website_title = "AN ACT ESTABLISHING THE NATIONAL ARCHIVES, DEFINING ITS POWERS AND FUNCTIONS, FIXING ITS ORGANIZATIONAL STRUCTURE, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "\"National Archives Act of 1997\" Seeks to strengthen the conservation and promotion of the nation's historical and cultural heritage by setting up the NATIONAL ARCHIVES OF THE PHILIPPINES. It also provides for the establishment of REGIONAL FIELD OFFICES for the collection and promotion of archival resource nationwide."

