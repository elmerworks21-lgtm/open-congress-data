congress_website_title = "AN ACT RESTRUCTURING THE EXCISE TAX ON PETROLEUM PRODUCTS, AMENDING FOR THE PURPOSE PERTINENT SECTIONS OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "Decreases the present rate of 10% ad valorem duty to 3% and consolidates into the specific tax the 7% difference, and the P0.95 special levy; reduces the excise tax imposed on indigenous etroleum from 15% to 3% of the fair international market price. Provides for a uniform level of protection across all sectors, promotes global competition and simplifies the tariff structure for ease in customs administration. Is in line with the government's oil industry deregulation and liberalization program."
