congress_website_title = "AN ACT TO STRENGTHEN THE FAMILY BY PROVIDING MORE TIME AND OPPORTUNITY FOR TOGETHERNESS (HOLIDAYS)"
congress_website_abstract = "\"Family Weekend Act\" Provides for the following --- \"SEC. 2. Opportunity for Family Togetherness - To provide opportunity for family closeness, the non-working holiday aspect of legal or regular holidays and special days, and other public holidays so declared by law, order or proclamation, not falling on a Monday, except Chirstmas Day and New Year's Day, shall be observed on the MOnday nearest the actual date of the public holiday.>The same rule shall be observed in the case of lcoal special days so declared by the President for a particular place."
