congress_website_title = "AN ACT EXCLUDING CERTAIN TRANSACTIONS FROM THE COVERAGE OF REPUBLIC ACT NO. 7716 ENTITLED 'AN ACT RESTRUCTURING THE VALUE-ADDED TAX (VAT) SYSTEM, WIDENING ITS TAX BASE AND ENHANCING ITS ADMINISTRATION, AND FOR THESE PURPOSES AMENDING AND REPEALINGTHE RELEVANT PROVISIONS OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, AND FOR OTHER PURPOSES'"
congress_website_abstract = "Seeks to EXEMPT the following transactions from the coverage of the Expanded Value-Added Tax Law: (1) sales, barters, exchanges and services rendered by cooperatives registered under the Cooperative Code of the Philippines; (2) leases of real and personal properties; (3) printing and publication, sale of books and newspapers not devoted principally to the publication of advertisements."

