congress_website_title = "AN ACT REQUIRING THE INCLUSION OF PEOPLE EMPOWERMENT AND HUMAN RIGHTS SUBJECT IN THE CURRICULUM OF BOTH THE ELEMENTARY AND SECONDARY SCHOOLS"
congress_website_abstract = "Requires the inclusion of subject on people empowerment and human rights in the school curriculum of both elementary and secondary schools. It is at these levels that schoolchildren can easily absorb and adopt every educational information taught to them, thus its is imperative that the ideas on people empowerment and the importance of human rights be inculcated in their minds."

