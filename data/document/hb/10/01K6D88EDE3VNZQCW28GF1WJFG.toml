congress_website_title = "AN ACT EXPANDING THE JURISDICTION OF THE SHARI'A CIRCUIT COURTS TO INCLUDE CASES BETWEEN MUSLIMS AND NONMUSLIMS AMENDING FOR THE PURPOSE THE CODE OF MUSLIM PERSONAL LAWS OF THE PHILIPPINES"
congress_website_abstract = "Rationale: \"Under the existing laws, the Civil Courts shall have jurisdiction of cases between Muslims and non-Muslims. It is felt however, that there is a significant difference between Muslim personal laws and those of other communities. Cases ofthese nature, being of cultural values, must be considered in the light of the Muslim personal laws.\""

