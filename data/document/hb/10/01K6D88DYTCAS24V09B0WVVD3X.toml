congress_website_title = "AN ACT CREATING A PRESIDENTIAL DRUG ENFORCEMENT AGENCY, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Presidential Drug Enforcement Agency Act of 1995\" Aims to improve the efficiency and effectiveness of our campaign against illegal drugs through the integration and consolidation of the various units in the different agencies of the Government which are involved in drug abuse under the authority of a single drug enforcement and coordinating agency directly under the Office of the President."

