congress_website_title = "AN ACT ESTABLISHING A WOMEN'S AND CHILDREN'S CRISIS ASSISTANCE CENTER IN EVERY REGION OF THE PHILIPPINES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Identifies the beneficiaries of this Act: (1) victims of involuntary or forced prostitution; (2) victims of sexual abuse, molestation; (3) victims of illegal recruitment, labor exploitation; (4) victims of armed conflict, natural disasters; (5) abandoned and run-away children; and (6) victims suffering from mental, emotional and psychological impairment, needing special assistance."

