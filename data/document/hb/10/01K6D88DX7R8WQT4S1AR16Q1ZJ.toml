congress_website_title = "AN ACT AMENDING SECTION 25 OF REPUBLIC ACT ELEVEN SIXTY-ONE OTHERWISE KNOWN AS THE 'SOCIAL SECURITY LAW' APPROPRIATING, FOR THIS PURPOSE, FIVE MILLION PESOS ANNUALLY FROM THE FUNDS OF THE SOCIAL SECURITY SYSTEM (SSS) TO PROVIDE BENEFITS FOR OVERSEASCONTRACT WORKERS (OCWs), AND FOR OTHER PURPOSES"
congress_website_abstract = "Amends Section 25 of RA 1161 by inserting a new section to read as follows: \"SECTION 25-A. OVERSEAS CONTRACT WORKERS FUND. - THE SSS SHALL APPROPRIATE FIVE MILLION PESOS (P5,000,000.00) YEARLY TO COVER THE DEATH, DISABILITY, FUNERAL SICKNESS AND REHABILITATION BENEFITS OF OVERSEAS CONTRACT WORKERS.\""
