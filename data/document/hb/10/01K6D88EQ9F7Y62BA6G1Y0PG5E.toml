congress_website_title = "AN ACT STRENGTHENING THE SANGGUNIANG KABATAAN. AMENDING SECTIONS 308 AND 309 OF CHAPTER 2, SECTIONS 423,430,433,434 AND 435 OF CHAPTER 8, AND SECTIONS 436 AND 437 OF CHAPTER 9, TITLE V OF REPUBLIC ACT NO. 7160, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Seeks to STRENGTHEN the SK organization in the midst of criticisms hurled against them, especially after the May 1996 election, which was reportedly marred with irregularities , which were not, in any way of SK's own doing. These amendatory provisions seek to --- (1) allocate MORE FUNDS to the SK organizations and their officials; (2) grant MORE POWER to the SK officials, particularly in the management of their affairs; (3) REINFORCE the processes and procedures of its operations where the SK officials become primarily responsible."

