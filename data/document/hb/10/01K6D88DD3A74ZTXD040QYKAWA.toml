congress_website_title = "AN ACT FURTHER AMENDING SECTION 12-B, RETIREMENT BENEFITS, OF THE SOCIAL SECURITY SYSTEM, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to REDUCE the required sixty (60) to sixty-five (65) years old RETIRABLE AGE for an SSS member to retire, provided he has PAID the ONE HUNDRED TWENTY MONTHLY CONTRIBUTIONS to the System. Requires, further, that the member should be FIFTY-FIVE(55) YEARS OLD in order to avail of his SSS retirement benefits."
