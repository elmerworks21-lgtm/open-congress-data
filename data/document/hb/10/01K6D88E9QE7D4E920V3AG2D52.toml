congress_website_title = "AN ACT MANDATING THE APPOINTMENT OF A REPRESENTATIVE FOR THE ELDERLY IN EVERY SANGGUNIANG BARANGAY, SANGGUNIANG BAYAN, SANGGUNIANG PANGLUNGSOD AND SANGGUNIANG PANLALAWIGAN AND A SECTORAL REPRESENTATIVE FOR THE ELDERLY IN THE CONGRESS OF THE PHILIPPINES"
congress_website_abstract = "Provides for the following --- \"SECTION 1. There shall be appointed by the Secretary of the Department of Interior and Local Government in every Sangguniang Barnagay, Snagguniang Bayan, Sangguniang Panglungsod and Sangguniang Panlalawigan throughtthe country, a representative for the elderly who shall be entitled to all the privileges and emoluments enjoyed by members of said Snaggunian and shall hold office for a terms of three (3) years unless sooner removed from Office by death or incapacity to discharge the funcitons of his office. His successor shall hold office for the duration of the unexpired term."
