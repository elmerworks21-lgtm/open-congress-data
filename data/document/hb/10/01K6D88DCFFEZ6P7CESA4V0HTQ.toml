congress_website_title = "ACT PROHIBITING PRIVATE AND PUBLIC SCHOOLS FROM DISALLOWING STUDENTS WITH DELINQUENT TUITON FEES TO TAKE THE MID-TERM OR FINAL EXAMINATIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares it UNALWFUL for any school, public or private, to disallow any student from taking any mid-term or final examination due to nonpayment of tuition fees NOT exceeding one installment under the established terms of payment. Provides for the rights of the school and the obligation of students as far as this mandate is concerned. * * *"
