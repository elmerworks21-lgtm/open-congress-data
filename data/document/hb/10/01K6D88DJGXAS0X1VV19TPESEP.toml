congress_website_title = "AN ACT INSTITUTING THE DANGEROUS DRUGS ACT OF 1995"
congress_website_abstract = "\"Dangerous Drugs Act of 1995\" Defines terms under this proposed measure. Seeks to institute a new dangerous drugs law with these features: (1) increased penalties for violation of this proposed Act; (2) procedure in the confiscation and forfeitureof the proceeds of the crimes relative to dangerous drugs; (3) the role of students and schools in the prevention or deterrence in the use of dangerous drugs; and (4) modified structure and powers of the Dangerous Drugs Board."
