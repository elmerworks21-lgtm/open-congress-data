congress_website_title = "AN ACT AMENDING FURTHER REPUBLIC ACT NUMBERED SEVENTY-SIX HUNDRED THIRTY- SEVEN ENTITLED \"AN ACT APPROPRIATING THE SUM OF TEN BILLION PESOS FOR THE AID, RELIEF, RESETTLEMENT, REHABILITATION AND LIVELIHOOD SERVICES AS WELL AS INFRASTRUCTURE SUPPORT FOR THE VICTIMS OF THE ERUPTION OF MT. PINATUBO, CREATING THE MT. PINATUBO ASSISTANCE, RESETTLEMENT AND DEVELOPMENT COMMISSION, AND FOR OTHER PURPOSES,\" AS AMENDED BY REPUBLIC ACT SEVENTY-SIX HUNDRED FIFTY-SEVEN"
congress_website_abstract = "Includes a provision in RA 7637 to the effect that the Secretary of National Defense and the Chief of Philippine Air Force will furnish the Commission with air transportation assistance. Provides further that the Commission could request for air transport for its representatives and Department of Public Works and HIghways and other essential lahar experts, scientists and technical consultants and personnel and other government agencies during mission inspections and assessment of the damage andwork progress of ongoing infrastructure in the adversely affected areas."

