congress_website_title = "AN ACT AMENDING BATAS PAMBANSA BLG. 185 ENTITLED, 'AN ACT TO IMPLEMENT SECTION FIFTEEN OF ARTICLE XIV OF THE CONSTITUTION AND FOR OTHER PURPOSES,' TO ALLOW NATURAL-BORN CITIZENS WHO HAVE LOST THEIR FILIPINO CITIZENSHIP TO BE TRANSFEREES OF PRIVATE LANDS FOR RESIDENTIAL, COMMERCIAL AND INDUSTRIAL PURPOSES, TO INCREASE THE AREA THEY MAY ACQUIRE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Allows natural-born citizens who have lost their citizenship to acquire lots for residential, COMMERCIAL AND INDUSTRIAL PURPOSES; sets the MAXIMUM LIMIT to be acquiared from [1,000 square meters] to THREE THOUSAND SQUARE METERS for urban lands, andfrom [one (1) hectare] to FIVE (5) HECTARES for rural lands."

