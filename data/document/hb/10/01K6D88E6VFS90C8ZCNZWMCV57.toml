congress_website_title = "AN ACT DISAUTHORIZING THE DETAIL OF LABOR ARBITERS AS REVIEWERS OF COMMISSIONERS IN THE NATIONAL LABOR RELATIONS COMMISSION, AMENDING FOR THIS PURPOSE ARTICLE 217 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED"
congress_website_abstract = "Ensures the speedy administration of labor justice through compulsory labor arbitration. States, therefore, that LABOR ARBITERS shall NOT be designated to the National Labor Relations Commisison as reviewers, or to any other agency performing quasi-judicial functions."

