congress_website_title = "AN ACT PROVIDING FOR THE CONDONATION OF ALL OUTSTANDING LOAN OBLIGATIONS OF RURAL ELECTRIC COOPERATIVES INVOLVING ALTERNATIVE GENERATION PROJECTS PURSUANT TO SECTION 2 OF PRESIDENTIAL DECREE NO. 1645, INCLUDING LOANS TO REMOTE ELECTRIC COOPERATIVESAND OTHER LOANS ON SOCIAL PROJECTS OF THE NATIONAL ELECTRIFICATION ADMINISTRATION ; AND THE ASSUMPTION BY THE NATIONAL GOVERNMENT OF VARIOUS LOANS INVOLVING ALTERNATIVE POWER GENERATION PROJECTS"
congress_website_abstract = "Mandates the coordination of the following loan obligations of the National Electrification Administration (NEA): (1) Outstanding loan obligations granted by the NEA to the electric cooperatives involving alternative generation projects; (2) NEA;s obligations involving there social programs: MHS-BLISS housing projects, Kilusang Sariling Sikap, MHS-Seeds Projects, etc."
