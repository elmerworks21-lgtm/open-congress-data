congress_website_title = "AN ACT REMOVING RED TAPE AND REDUCING CLEARANCE REQUIREMENTS IN THE INTERISLAND SHIPPING INDUSTRY"
congress_website_abstract = "Mandates the following --- \"SECTION 1. Any existing laws, regulations, or policies to the contrary notwithstanding , all clearance requirements for interisland vessels and their cargoes shall be issued by the Philippines Ports Authority (PPA) in accordance with Executive Order No. 493 dated December 3, 1991. All vessel or cargo clearances issued or required by any government agency, bureau or office are hereby considered transferred to the Philippine Port Authority for the purpose of this Act.\""

