congress_website_title = "AN ACT REQUIRING THE COMPLETE PRIVATIZATION OF THE PHILIPPINE DEPOSIT INSURANCE CORPORATION"
congress_website_abstract = "Substantiates the constitutional provision which states that: \"The State recognizes the indispensable role of the private sector, encourages private enterprise, and provides incentives to needed investments.\" (Section 20, Art. II) Authorizes the Assets Privatization Trust (APT) to use any appropriate mode of privatizing the PDIC, such as a joint venture with the private sector."

