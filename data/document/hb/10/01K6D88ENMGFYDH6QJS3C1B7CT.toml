congress_website_title = "AN ACT ESTABLISHING THE THIRD ENGINEERING DISTRICT IN THE PROVINCE OF BATANGAS, TO BE LOCATED IN THE CITY OF LIPA, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Sustainable Government Resettlement Areas Act\" Rationale: The Department of Public Works and Highways (DPWH) has a temporary sub-district engineering office in Lipa city which aims to lighten up the heavy word load of Batangas 2nd Engineering Office, its existence is temporary in nature. However, its existence is temporary in nature and will not be able to address the growing infrastructure needs brought about by the passage of the R.A. 7916.> In order that this difficulty be resolved, a thirdengineering district office must be established which will solely cater to the engineering needs of the fourth congressional district composed of the municipalities of Padre Garcia, Taysan, Ibaan, San Jose, Rosario and San Juan and the city of Lipa.. > Gives the details of these required needs for all resettlement areas: (1) educational and health facilities; (2) provision of basic community amenities and social services; (3) industrial zones; and (4) use of lots in the industrial area/zone."
