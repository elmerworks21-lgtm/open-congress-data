congress_website_title = "AN ACT AMENDING SECTIONS 2 AND 4 OF REPUBLIC ACT NO. 8166, OTHERWISE KNOWN AS 'AN ACT PRESCRIBING OFFICER GRADE DISTRIBUTION IN THE ACTIVE FORCE OF THE ARMED FORCES OF THE PHILIPPINES AND LIMITING THE TENURE OF OFFICES IN THE GRADES OF COLONEL/CAPTAIN (PN) AND GENERAL/FLAG OFFICERS IN THE AFP'"
congress_website_abstract = "Proposes this amendatory provision to RA 8186 particularly on DISTRIBUTION OF GENERAL/FLAG OFFICERS: \" x x x PROVIDES, FINALLY, THAT EFFECTIVE ONE (1) YEAR AFTER THE APPROVAL OF THIS ACT, EXCEPT FOR THE CHIEF OF STAFF, AFP, NO OFFICER SHALL BE PROMOTED TO THE GRADE OF BRIGADIER GENERAL/COMMODO RE OR HIGHER IF HE HAS LESS THAN ONE (1) YEAR OF ACTIVE SERVICE REMAINING PRIOR TO COMPULSORY RETIREMENT.\""

