congress_website_title = "AN ACT ESTABLISHING THE 'GALING PINOY' AWARD PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The contribution of the Filipino entrepreneurs and the workers to the development of the country's economy must be recognized and rewarded. There is a need to focus national attention to their invaluable contributions to the economy and the country as a whole and provide attractive incentives to bolster their competitiveness . They deserve motivation and recognition which can take the form of giving them honors, privileges and cash awards. \"Galing Pinoy Award Act\" Is premised on thefollowing objectives. (1) To acknowledge the vital role of the Filipino entrepreneurs and members of the working class in the development of the economy; (2) To generate greater awareness among, and support from, the various sectors of Philippine soociety on the development of Filipino enterprise and technically skilld labor force toward a more industrialized and developed economy; (3) To provide mechanisms for identifying qualified awardees and inculcate in the minds of the Filipino entreprene"

