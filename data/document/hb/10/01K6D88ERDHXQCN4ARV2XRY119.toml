congress_website_title = "AN ACT DECLARING THE NATIONAL ENVIRONMENTAL POLICY, CREATING THE NATIONAL ENVIRONMENTAL COUNCIL, AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares the NATIONAL ENVIRONMENTAL POLICY as follows: \"It is the policy of the national government, in cooperation with local authorities and concerned civic and private organizations, to create, nurture and maintain conditions under which man andnature can exist in productive and harmonious relationship by engaging in the sustainable development of our country's natural resources. Towards this end, all practiable means and measures of government, including financial and technical assistance, shall be utilized in a manner that will foster and promote environmental enhancement.\" Prescribes the duties and functions of the proposed NATIONAL ENVIRONMENTAL COUNCIL."

