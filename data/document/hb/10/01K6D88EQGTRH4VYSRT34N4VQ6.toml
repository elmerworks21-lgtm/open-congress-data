congress_website_title = "AN ACT TO AMEND SECTION 109 OF PRESIDENTIAL DECREE NO. 1529 ON NOTICE AND REPLACEMENT OF LOST DUPLICATE CERTIFICATE RELATIVE TO REGISTRATION OF PROPERTY AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Going to court to have a lost owner's duplicate of a Certificate of Title reissued has become too expensive, cumbersome and complicated, especially to ordinary citizens who neither have time nor the money to go to such lengths. People who are adversely affected are put at quite a disadvantage Seeks to amend PD 1529 and TRANSFER the function of having to issue Certificates of Titles to the REGISTER OF DEEDS of the different provisions and municipalities."

