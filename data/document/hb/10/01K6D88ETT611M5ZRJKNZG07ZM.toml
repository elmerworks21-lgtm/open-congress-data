congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6975, OTHERWISE KNOWN AS THE 'DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990', AND FOR OTHER PURPOSES(POLICE REFORM ACT)"
congress_website_abstract = "Rationale: The seven-year implementation of RA 6975 otherwise known as the PNP Law unraveled deficiencies, gray areas and loopholes which hamper the operational and administrative efficiencies of the Philippine National Police. If we are to come upwith a more cohesive and effective national police organization that is more responsive to the demands of the times, an amendatory legislation purging the present law of its ambiguities and strengthening the organizational structure of the police, fire and jail agencies and their respective mandates, is in order. Recommends the following: (1) The respective organizational structures as well as the functions and responsibilitie s of the Department of the Interior and Local Government, National PPolice Commission, Philippine National Police, Bureau of Fire Protection, Bureau of Jail Management and Penology, Philippine Public Safety College are strengthened and expanded; (2) The recruitment and screening procedures for the police, fire and ja"
