congress_website_title = "AN ACT PROVIDING FOR A MANDATORY TRAINING ON HUMAN RIGHTS FOR ALL OFFICIALS AND EMPLOYEES IN THE EXECUTIVE, LEGISLATIVE AND JUDICIAL BRANCHES OF GOVERNMENT AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates all branches of the government, including government-owne d and/or controlled corporations (GOCCs) to mandate the study of human rights as an integral part of the education and training of all their officers and employees, particularly those involved in the administration of justice, intelligence work and the maintenance of peace and order."

