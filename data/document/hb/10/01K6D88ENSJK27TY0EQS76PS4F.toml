congress_website_title = "AN ACT DECLARING THE RIGHTS OF PATIENTS AND PRESCRIBING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Rationale: In the Philippines, there is yet a law to be created to protect, promote and defend the rights off patients. We hear horriying stories of patients who died or are further injured in hospitals as a result of negligence and incompetence of their supposed healers. \"Magna Carta of Patients' Rights Act\" Declares it the policy of the State to ensure and protect the rights of patientss to decent, humane, and quality health care. States the RIGHTS OF PATIENTS, such as the right to: (1) MEDICAL CARE AND HUMANE TREATMENT; (2) INFORMED CONSENT; (3) PRIVACY; (4) PRIVILEGED COMMUNICATION; etc."

