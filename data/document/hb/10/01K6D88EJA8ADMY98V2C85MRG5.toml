congress_website_title = "AN ACT REQUIRING A SEPARATE SUBJECT ON ENVIRONMENTAL EDUCATION IN THE CURRICULA FOR SECONDARY AND COLLEGIATE LEVELS OF ALL SCHOOLS AND EDUCATIONAL INSTITUTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "In the face of rapidly declining natural resources and a degenerating ecological system, there is a need for the Filipino people to realize that they are the very stewards of the natural riches and environment of their country. They must be made tounderstand that real environmentalis m is achieved only through an active and responsible consciousness of how they can contribute in improving and sustaining the delicate balance that exists between man and his surroundings."

