congress_website_title = "AN ACT PROMOTING THE ABACA INDUSTRY BY PROVIDING FOR AN ACCELERATED FIVE-YEAR NATIONAL ABACA DEVELOPMENT PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The Philippines is the world's largest producer of abaca fiber, accounting for 85-90 percent of the total world output. Directs the Fiber Industry Development Authority (FIDA) to establish and implement a 5-year national abaca developmentprogram in all abaca-producing regions. Prescribes the various components of the program."

