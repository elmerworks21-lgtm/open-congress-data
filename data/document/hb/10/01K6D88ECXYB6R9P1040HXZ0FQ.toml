congress_website_title = "AN ACT PROVIDING FOR THE PROMOTION OF MUSIC TO INCULCATE POSITIVE VALUES IN THE FILIPINO AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Contains these significant provisions --- (1) The Department of Education, Culture and Sposrts (DECS) shall include music as a compulsory subject in the curriculum in the tertiary level; (2) The DECS shall develop and implement a program granting incentives to gifted Filipino musicians and signers garnering musical awards locally and internationally ; and (3) The DECS shall hold annual musical contest all over the country."

