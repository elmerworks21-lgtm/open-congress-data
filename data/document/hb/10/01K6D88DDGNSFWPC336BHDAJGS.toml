congress_website_title = "AN ACT STRENGTHENING THE CROP INSURANCE PROGRAM OF GOVERNMENT FURTHER AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 1467, AS AMENDED"
congress_website_abstract = "Provides for the following : (1) Attached the PCIC to the Dept. of Agriculture; (2) Increases the PCIC capital to P2 Billion; (3) Limits government premium subsidy to insurance against unavoidable risks, e.g. typhoons, droughts and outbreaks of pests and diseases; etc."
