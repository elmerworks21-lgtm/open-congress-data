congress_website_title = "AN ACT STRENGTHENING FURTHER THE WORKERS' RIGHT TO SELF-ORGANIZATI ON BY RATIONALIZING THE STATUTORY REQUIREMENTS FOR UNION REGISTRATION, AMENDING FOR THIS PURPOSE ARTICLE 234 OF THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Applies to any APPLICANT LABOR ORGANIZATION, association or group of unions/workers who wish to acquire legal personality upon issuance of the certificate of registration based on certain requirements. States that FAILURE TO COMPLY with any of therequirements SHALL NOT BE A GROUND for the dismissal of the application, but action thereon shall be held in abeyance until compliance shall have been made."

