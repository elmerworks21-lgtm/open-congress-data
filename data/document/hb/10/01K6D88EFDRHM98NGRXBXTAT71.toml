congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF LABOR-MANAGEMEN T COOPERATIVES IN BUSINESS FIRMS AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Rank and file workers employed by private business firms compose a major segment of the entire Filipino population. While they are more fortunate than many of our brethren who have no jobs, yet in many instances their monthly income cannot support their present and future needs, much less if they have families. Seeks to compel workers to save, as well as to oblige management in providing said capital in the establishment of a Labor Management Cooperative within the covered business firm."

