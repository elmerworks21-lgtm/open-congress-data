congress_website_title = "AN ACT MANDATING THE PAYMENT OF RETIREMENT BENEFITS TO GOVERNMENT RETIREES ON THE DATE OF THEIR RETIREMENT"
congress_website_abstract = "Provides for the following --- \"SECTION 1. The heads of all government agencies, bureaus and corporations shall see to it that the processing of the papers of all their employees under compulsory and optional retirement, shall be completed three (3)months before the date of their retirement, and for this purpose, immediately after the filing of application for retirement, shall notify or inform the retirees of the required papers and documents,and for them to submit the same within six (6) months before their date of retirement."

