congress_website_title = "AN ACT CREATING THE DISEASE PREVENTION CENTER, DEFINING ITS POWERS, FUNCTIONS AND RESPONSIBILITIE S, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to create a Disease Prevention Center, a special agency attached to the Department of Health which would serve as the country's vigilant professional sentinel against the outbreak of emerging and reemerging infectious diseases. Tasks said Center to conduct more intense activities in the surveillance, research and prevention of the influx and spread of epidemic viral deiseases."

