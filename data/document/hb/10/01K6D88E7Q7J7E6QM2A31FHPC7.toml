congress_website_title = "AN ACT AMENDING SUB-PARAGRAPH (1), PARAGRAPH (L), SECTION 29 OF THE NATIONAL INTERNAL REVENUE CODE OF 1977, AS AMENDED, INCREASING THE PERSONAL EXEMPTIONS"
congress_website_abstract = "States that there shall be allowed a basic PERSONAL EXEMPTION as follows: For single individual or married individually judicially decreed as legally separated with no qualified dependents --- P 15,000.00; For head of a family --- P18,000.00; For each married individual ---- P 25,000.00. Provided, that in case of the spouses is deriving taxable income, only said spouse shall be allowed to avail of the aforesaid basic personal exemption for married individual."
