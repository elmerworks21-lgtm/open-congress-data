congress_website_title = "AN ACT PROVIDING FOR THE CREATION, OPERATION, ADMINISTRATION AND COORDINATION OF SPECIAL TOURISM ZONES IN MAJOR AREAS IN THE PHILIPPINES, CREATING FOR THIS PURPOSE THE SPECIAL TOURISM ZONE AUTHORITY, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The Philippines is blessed with an abundance and a variety of beautiful natural resources, all of which are tourism potentials, It is lamentable, however, that our tourism is faced with the problem of lack of infrastructure facilities andother support services to sustain the demands of tourism development. Because of this, we have not been able to realize the full potentials and benefits that can be derived from tourism. \"The Special Tourism Zone Act of 1997\" Is premised on the following objectives --- (1) To establish the legal framework and mechanism for the coordination, planning, administration and monitoring of special tourism zone; (2) To transform selected areas in the country into highly developed tourism destinationsand centers, offering facilities and services which are in conformity with international measures and standards; (3) To promote the flow of investments, both foreign and locak, into these special tourism zones, which will generate employment opportun"

