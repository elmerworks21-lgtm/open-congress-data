congress_website_title = "AN ACT PROVIDING FOR A MORE JUDICIOUS RETIREMENT SCHEME FOR GOVERNMENT EMPLOYEES BY INTEGRATING ALL ALLOWANCES TO THE MONTHLY SALARY OF, AND GRANTING AUTOMATIC PROMOTION OF ONE GRADE OR ONE RANK HIGHER UPON RETIREMENT TO, SAID EMPLOYEES AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "\"Government Employees Retirement Benefits Act of 1996\" Declares that any official or employee in any branch of the government service shall, for purposes of dtermining retirement benefits, be promoted one (1) grade or one (1) rank higher upon retirement. Provides retirement schemes applicable to the following cases: (1) retirement after 20 years of service; (2) retirement at age sixty-five; (3) retirement due to inability to discharge duties; and (4) death while in actual service."

