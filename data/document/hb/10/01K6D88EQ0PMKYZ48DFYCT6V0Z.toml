congress_website_title = "AN ACT DESIGNATING THE BAYANIHAN PHILIPPINE DANCE COMPANY AS THE PHILIPPINE NATIONAL FOLK DANCE COMPANY, DEFINING ITS ROLE AND FUNCTIONS AS SUCH AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The famed Bayanihan dancers held a sophisticated audience spellbound now swirling through the wild tempestuous figures of an Igorot dancer, now moving with infinite grace and delicacy through royal ceremonial rites. >Prescribes the role and functions of the Bayanihan Philippine dance company in the PHILIPPINE NATIONAL FOLK DANCE COMPANY."
