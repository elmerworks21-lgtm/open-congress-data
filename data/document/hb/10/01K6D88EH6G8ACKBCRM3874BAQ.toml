congress_website_title = "AN ACT TO PROVIDE FOR A SPECIAL PENAL CODE TO BE KNOWN AS THE 'CREDIT CARD FRAUD ACT' AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Several complaints have been received on the use or safety of credit cards in spite of the technical safety measures employed therein. \"Credit Card Fraud Act of 1996\" States and defines what acts constitute CREDIT CARD FRAUD. Prescribes penalties for any of the acts stated above."

