congress_website_title = "AN ACT IMPOSING A CEILING ON INTEREST RATES CHARGED BY INFORMAL MONEYLENDERS ON SUBSISTENCE AND CALAMITY LOANS AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Applies to all credit transactions for subsistence and calamity loans involving P500.00 to P20,000.00. Allows INFORMAL MONEYLENDERS (pawnshops; includes loans for medicines,basic food necessities) to change an interest NOT HIGHER THAN 24% PER ANNUM.Prescribes penal sanctions."

