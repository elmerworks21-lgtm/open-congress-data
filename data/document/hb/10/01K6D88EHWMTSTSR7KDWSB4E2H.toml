congress_website_abstract = "On September 9, 1986, then President Corazon Aquino declared September 20 as \"Josefa Llanes Escoda Day\" in Ilocos Norte in commemoration of the civic leader's heroid deed during World Ward II and her exemplary accomplishments and contributions as foudner of the Girl Scouts of the Philippines and organizer of the National Liberation of Women's Club of the Philippines."

