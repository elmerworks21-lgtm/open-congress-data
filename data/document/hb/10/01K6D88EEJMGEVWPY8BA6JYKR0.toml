congress_website_title = "AN ACT MAKING THE LESSEE, ASSIGNEE, TRANSFEREE, MANAGER OR OPERATOR OF A CORPORATION, FIRM, ESTABLISHMENT OR BUSINESS SOLIDARILY LIABLE WITH THE LESSOR, ASSIGNOR, TRANSFEROR OR FORMER MANAGER OR OPERATOR THEREOF AGAINST WHICH A COMPLAINT OR CLAIM ISFILED BY AN EMPLOYEE OR LABOR UNION FOR ANY CAUSE UNDER THE LABOR CODE"
congress_website_abstract = "Rationale: \"the intent of this bill is to foreclose any doubt as to the identity or ownership of the succeeding owners or management of a corporation or firm. It will even guarantee industrial peace as labor is assured of the continuity of existenceof the company or establishment where he works even in the face of an alleged closure due to bankruptcy or change of ownership.\""

