congress_website_title = "AN AACT AMENDING PRESIDENTIAL DECREE NO.1759, OTHERWISE KNOWN AS \"AN ACT PENALIZING CONTRACTORS AND SUB-CONTRACTORS WHO VIOLATE ANY MATERIAL PROVISIONS OF CONTRACTS INVOLVING PUBLIC WORKS PROJECTS\" BY REQUIRING CONTRACTORS AND SUBCONTRACTORS TO FILEA BOND WITH THE DEPARTMENT OF PUBLIC WORKS AND HIGHWAYS (DPWH) TO ANSWER FOR DAMAGES TO THIRD PERSONS"
congress_website_abstract = "Requires contractors and sub-contractors to file a cash bond with the DPWH equivalent to three percent (3%) of the amount of the contract entered into by the government and the contractor/sub- contractor to answer for damages to third persons."

