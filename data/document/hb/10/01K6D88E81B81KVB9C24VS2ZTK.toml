congress_website_title = "AN ACT PROVIDING FOR THE INCLUSION OF THE COST OF LIVING ALLOWANCE (COLA), AND REPRESENTATION AND TRANSPORTATION ALLOWANCE (RATA) IN THE COMPUTATION OF THE TERMINAL LEAVE PAY OF ANY OFFICER OR EMPLOYEE OF THE GOVERNMENT WHO RETIRES, OR VOLUNTARY RESIGNS, OR IS SEPARATED FROM THE SERVICE THROUGH NO FAULT OF HIS OWN"
congress_website_abstract = "States that --- \"SECTION 1. Any officer or employee of the government who retires under an existing law, or voluntarily resigns, or is separated from the service through no fault of his own, shall be entitled to the commutation of all the accumulated vacation and/or sick leaves to his credit based on the highest monthly salary without limitation as to the number of days of vacation and/or sick leaves that had accumulated, including the duly authorized transportation and representation allowance(RATA) and cost of living allowance (COLA) which has not been integrated in the basis salary pursuant to Section 12 of Republic Act No. 6758, or which may subsequently be granted by law."

