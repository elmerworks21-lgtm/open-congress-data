congress_website_title = "AN ACT ESTABLISHING A PUBLIC HIGHER EDUCATION SCHOLARSHIP AND ASSISTANCE FUND FOR PRIORITY FIELDS, INSTITUTING A SYSTEM FOR EQUITABLE ALLOCATION OF SUBSIDIES TO STATE UNIVERSITIES AND COLLEGES, AND CREATING A STRUCTURE FOR EFFECTIVE COORDINATION ANDHARMONIZATION OF PUBLIC HIGHER EDUCATION PROGRAMS"
congress_website_abstract = "Rationale: \"A more equitable distribution of opportunity for higher education in public institutions among capable and deserving but financially-han dicapped citizens, through full scholars in priority fields, with financial assistance for living expenses, distributed pro rata between congressional districts. (2) Development and application of standards and common criteria for the allocation of funds for public institutions of higher education, including reasonable cost-recovery measures, whichwill enhance their efficiency and effectiveness. (3) Establishment of structural mechanisms which will promote greater coordination and harmonization of instructional , research and extension programs between and among the SUCs and other public insttitutions engaged in such programs, including line departments and agencies of government."

