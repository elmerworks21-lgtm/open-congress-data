congress_website_title = "AN ACT MANDATING THE ESTABLISHMENT OF TEMPORARY SHELTERS FOR CHILDREN IN ESPECIALLY DIFFICULT CIRCUMSTANCES IN PROVINCES AND CITIES, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Notwitstanding the welcome proliferation of NGOs concerned with the welfare and protection of children, there is still a need for more shelters for child abuse victims. While the combined capacities of all child-caring institutions--- both government and NGO run throughout the country only amount to about 12,000, there are about 2.9 million children in especially difficult circumstances, who need such shelters. Even if we assume, that centers are serving twice as much clients as their capacity allows them to, it means that we are serving less than one percent (1%) of those in need of shelter. \"Temporary Shleters for Chidlren in Especially Difficult Circumstances Act of 1997\" >Defines the term \"CHILDREN IN ESPECIALLY DIFFICULT CIIRCUMSTANCES\" --- refers to those below 18 years of age who are victims of prostitution and sexual abuse, differently abled, child workers, young offenders, in situations of armed conflict, young victims of natural disasters and calamities, HIV-posit"

