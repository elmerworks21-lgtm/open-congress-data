congress_website_title = "AN ACT TO ESTABLISH A SCIENCE AND TECHNOLOGY POPULARIZATION PROGRAM, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Science and Technology Popularization Act\" Proposes a Science and Technology Popularization Proram with four (4) components, namely: (1) Youth Development Program; (2) Science Communication and Outreach Program; (3) Continuing Assessment Program; and (4) Public Science and Technology Learning Centers. Declares that all media groups participating in this program and setting aside print space, air and broadcast time, shall be entitled to tax incentives."

