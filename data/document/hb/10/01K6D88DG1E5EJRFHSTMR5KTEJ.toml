congress_website_title = "AN ACT GRANTING LOCAL GOVERNMENT UNITS A SHARE IN THE LANDING AND TERMINAL FEES COLLECTED BY THE BUREAU OF AIR TRANSPORTATION (BAT), AMENDING SECTION 52, CHAPTER IX OF REPUBLIC ACT NO.776, OTHERWISE KNOWN AS THE CIVIL AERONAUTICS ACT OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Grants a share in the landing and terminal fees collected by the Bureau of Air Transportation (BAT) to locla government units (LGUs) where the government's air navigating facilities are located. Earmarks a portion of the revolving fund of the BAT for the installation and improvement of the runway lights designed to guide pilots during day and night landing."

