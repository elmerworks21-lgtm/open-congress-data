congress_website_title = "AN ACT DECLARING THE TAMPERING OF VOTES AS A HEINOUS CRIME AND PROVIDING PENALTY THEREOF BY AMENDING FURTHER SECTION 261 (bb) (2) AND ALSO SECTION 264 OF BATAS PAMBANSA BLG. 881"
congress_website_abstract = "Rationale: Fraudulent activities during elections are very rampant in our society ... More and more electorates begin to perceive government officials to be elements of graft and corruption. States that ANY MEMBER OF THE BOARD OF INSPECTORS OR BOARDOF CANVASSERS OR ANY PUBLIC OFFICIAL FOUND GUILTY OF TAMPERING, INCREASING OR DECREASING VOTES RECEIVED BY CANDIDATE OR REFUSES TO CREDIT THE CORRECT VOTES, TAMPER, ALTER, MODIFY, DEDUCT SUCH VOTES SHALL BE SENTENCED TO SUFFER THE PENALTY IMPOSED AGAINST HEINOUS CRIMES as prescribed under RA 7659, the Death Penalty Law."
