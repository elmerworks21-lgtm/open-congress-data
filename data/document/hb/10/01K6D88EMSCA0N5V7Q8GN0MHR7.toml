congress_website_title = "AN ACT APPROPRIATING P40 BILLION IN ADDITIONAL CAPITAL FOR THE BANGKO SENTRAL NG PILIPINAS AND FOR OTHER PURPOSES"
congress_website_abstract = "Under Republic Act 7653 (The New Central Bank Act), the central monetary authority has a capitalization of P50 billion. > However, the government has so far provided only P10 billion for its capital.> BSP Gov. Gabriel C. Singson has urged the national government to infuse the additional P40 billion for its capitalization or its ability to maintain stability, particularly controlling inflation, would be affected. In its year-end report the Bangko Sentral ng Pilipinas said \"a strong capital baseis essential to the continuing ability and credibility of the BSP to do its job well of preserving financial stability."
