congress_website_title = "AN ACT CREATING A JUVENILE AND FAMILY COURT IN ALL PROVINCES AND CITIES THROUGHOUT THE COUNTRY, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Defines the jurisdiction of the proposed juvenile and family courts. Defines, likewise, PROCEEDINGS cocnernings a \"dependent\", \"abandoned\" or \"neglected\" child. Seeks to provide special procedures for the protection of the child and to facilitate the speedy disposition of cases involving the youth and family relations."
