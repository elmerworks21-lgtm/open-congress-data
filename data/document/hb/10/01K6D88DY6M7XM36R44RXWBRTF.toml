congress_website_title = "AN ACT DIRECTING THE PHILIPPINE NATIONAL RAILWAYS TO PRIVATIZE ITS IDLE ASSETS AND FOR OTHER PURPOSES"
congress_website_abstract = "Directs the Philippine National Railways (PNR) with its corporate auditor or his duly authorized representative to udnertake inspection and appraisal of all its idle assets and those found valuable shall be sold immediately at public auction ot thehighest bidder and those found to valueless shall be destroyed or disposed pursuant to existing laws. This should be done within thirty (30) days after the approval of this Act, and every year thereafter."

