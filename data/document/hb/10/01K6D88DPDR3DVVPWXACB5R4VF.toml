congress_website_title = "AN ACT TO PROMOTE AND DEVELOP THE PHILIPPINE MANGO INDUSTRY, CREATING FOR THE PURPOSE THE MANGO BOARD OF THE PHILIPPINES, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Mango Act of 1995\" Creates a Mango Board of the Philippines which shall be composed of ten (10) private sector representatives involved in the production and marketing of mangoes. States that the Mango Board shall nor receive any compensation provided that they shall be entitled to per diems and travel allowances."

