congress_website_title = "AN ACT PROVIDING THE DAYS OF HOLDING COCKFIGHTING AMENDING FOR THE PURPOSE SUB-PARAGRAPHS (v), PARAGRAPHS (3), SUB-SECTIONS (a) OF SECTIONS 447 AND 458 OF REPUBLIC ACT NUMBERED SEVENTY-ONE SIXTY, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "States that cocfighting shall be allowed only in licensed cockpits during SUNDAYS, LEGAL HOLIDAYS and LOCAL FIESTAS for not more than three (3) days, except in December 30, June 12, November 30, Holy Thursday, Good Friday, Election or Referendum Dayand during registration days for an election."

