congress_website_title = "AN ACT TO AMEND PARAGRAPH (C) OF SECTION 46, BOOK I OF REPUBLIC ACT NO. 7160, \"AN ACT PROVIDING FOR A LOCAL GOVERNMENT CODE OF 1991\""
congress_website_abstract = "Provides that --- \"When the incumbent local chief executive is travelling within the country but outside his territorial jurisdiction, regardless of the number of days, the vice-governor, the city or municipal mayor or the highest ranking sangguniang barangay member shall automatically exercise the powers and perform the duties and functions of the local chief executive concern, except the power to appoint, suspend or dismiss employees which can only be exercised in cases of temporary incapacity exceeding thirty (30) working days."

