congress_website_title = "AN ACT AMENDING SECTIONS 3, 12, AND 24 OF REPUBLIC ACT NO. 6506, ENTITLED 'AN ACT CREATING THE BOARD OF EXAMINERS FOR CRIMINOLOGISTS IN THE PHILIPPINES AND FOR OTHER PURPOSES'"
congress_website_abstract = "Proposes these amendatory provision to RA 6506, Creating the board of Examiners for Criminologists: (1) A faculty member of any criminology school may sit in the Board; (2) Additional educational qualifiications for an applicant to the board examination include a bachelor's degree in any of the following --- (a) Police Administration; (b) Criminal Justice System Administration; (c) Security and Safety Management; (d) Convictions and Jail Management or (e) Law; and (3) Licensed criminologists with at least five (5) years of satisfactory experience in the practice of criminology CAN QUALIFY for lateral entry with the PNP as an Inspector."

