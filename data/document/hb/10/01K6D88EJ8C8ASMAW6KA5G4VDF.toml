congress_website_title = "AN ACT REORGANIZING THE PHILIPPINE STATISTICAL SYSTEM"
congress_website_abstract = "Rationale: The Philippine Statistical System (PSS), in its present stage, is mandated to provide accurate and precise data for the process of planning, implementation and evaluation of government plans and projects for national development. It mustbe guided by the universal principles of objectivity through the use of sound scientific statistical theories and techniques, run by statistical professionals with known expertise, and its oeprations must be independent of any political or other pressure. \"Philippine Statistical System Reorganization Act of 1996\" Provides for these significiant areas of concern: (1) The structurual and functional reorganization of the PSS: (2) The independence of the PSS from the control of the NEDA; (3) Upgradiing of the Civil Registration and Vital Statistics Division to an OFFICE OF THE CIVIL REGISTRATION GENERAL; and (4) Standardization and rationalization of the position classification and schemes of the personnel government statistical agencies."

