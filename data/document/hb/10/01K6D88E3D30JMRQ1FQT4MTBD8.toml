congress_website_title = "AN ACT EXEMPTING PROMOTIONAL APPOINTMENT FROM THE PROHIBITION ON NEPOTISM, AMENDING FOR THE PURPOSE THE REVISED ADMINISTRATIVE CODE OF NINETEEN HUNDRED AND EIGHTY SEVEN, AS AMENDED"
congress_website_abstract = "Limits the prohibition on the appointment made in favor of relatives udner the principle of nepotism only to original appointments, but NOT TO PROMOTIONAL APPOINTMENTS in order to avoid situations where relatives of chief executives can not be promoted notwithstanding their qualification, fitness and competence."
