congress_website_title = "AN ACT MAKING APPLICABLE TO PROSECUTORS IN THE NATIONAL PROSECUTION SERVICE OF THE DEPARTMENT OF JUSTICE THE RETIREMENT BENEFITS UNDER REPUBLIC ACT NO. 910, AS AMENDED"
congress_website_abstract = "Extends the retirement benefits provided under Republic Act NO. 910, as amended, to the prosecutors in the National Prosecution Service of the Department of Justice. Sets the retirement age of prosecutors at sixty-five years, and requires the rendering of 20 years of service in the government."

