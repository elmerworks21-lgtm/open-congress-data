congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED, TO ENHANCE WOKERS' PARTICIPATION IN THE DETERMINATION OF APPRENTICESHIP PROGRAMS AND TO SAFEGUARD WORKERS' RIGHT TOGAINFUL EMPLOYMENT"
congress_website_abstract = "Redefines the meaning of \"APPRENTICESHIP \" as [practical training on the job supplemental be related theoretical instruction] TRAINING WITHIN EMPLOYMENT WITH COMPULSORY RELATED THEORETICAL INSTRUCTION INVOLVING A CONTRACT BETWEEN AN APPRENTICE AND AN EMPLOYER ON AN APPROVED APPRENTICEABLE OCCUPATION; defines clearly other related terms used in this Act. States that the WAGE RATES of apprentices shall in NO case be LESS than the statutory minimum wage."
