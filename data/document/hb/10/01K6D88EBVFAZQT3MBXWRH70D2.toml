congress_website_title = "AN ACT AUTHORIZING THE FIBER INDUSTRY DEVELOPMENT AUTHORITY TO ORGANIZE AND IMPLEMENT A FIVE-YEAR NATIONAL ABACA PRODUCTION PROGRAM IN ALL ABACA PRODUCING REGIONS OF THE COUNTRY, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to establish a five-year National Abaca Production Program (NADP) in all abaca-producing regions of the country aimed to conduct abaca researches and impact development projects. Is intended to improve and sustain the development of the abacafiber in order to: 1) meet the increasing demand in both local and international market; 2) pave way for its promotion; and 3) stabilize and maintain the industry as one of the major agricultural exports of the country"

