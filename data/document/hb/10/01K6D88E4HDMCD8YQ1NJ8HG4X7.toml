congress_website_title = "AN ACT AMENDING SECTIONS 2 (k) AND (l), SECTIONS 5 (a) AND 10, SUBPARAGRAPH 2 (ii) OF PRESIDENTIAL DECREE NUMBERED ONE THOUSAND ONE HUNDRED FORTY-SIX, OTHERWISE KNOWN AS THE REVISED GOVERNMENT SERVICE INSURANCE ACT OF 1977, AND FOR OTHER PURPOSES"
