congress_website_title = "AN ACT INCREASING THE INTERNAL REVENUE ALLOTMENT OF LOCAL GOVERNMENT UNITS TO SIXTY PERCENT AND PROVIDING FOR ANNUAL REPORTS OF ALLOCATION, AMENDING FOR THE PURPOSE SECTIONS 284 AND 285 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Provides for the increase of the Internal Revenue Allotment of SIXTY (60%) PERCENT to Local Government Units. Provides, further, that the Department of Budget and Management and other appropriate national agencies, shall submit annual reports withinthe first thirty days of the current year to Congress, Leagues of Local Government and the Oversight Committee. The Reports contains the data and computation actually used and applied for in the allocation to all local government units for the current year."

