congress_website_title = "AN ACT TO AMEND SECTION 32, ARTICLE VIII OF R.A. 7875, OTHERWISE KNOWN AS THE 'NATIONAL HEALTH INSURANCE ACT OF 1995'"
congress_website_abstract = "Rationale: \"Art. 3 Sec. 32 of RA 7875, National Health Insurance Program, provides that accreditation shall be granted only to health care providers in operation for at least three (3) years. The 3-year period is too long for a good clinic or hospital to wait for accreditation ...\" Amends, therefore, this Section to read as follows: \"Sec. 32. Accreditation Eligibility-All Health care providers, as enumerated in Section 4 (0) hereof and operating for at elast one (1) year may apply for accreditation.\""

