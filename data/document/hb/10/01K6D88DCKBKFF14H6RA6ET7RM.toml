congress_website_title = "AN ACT EXTENDING A SPECIAL TAX CREDIT TO AGRICULTURAL PROCESSORS, FURTHER AMENDING FOR THE PURPOSE THE NATIONAL INTERNAL REVENUE CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Covers the processing of (1) nonfood agricultural, marinend forest products; (2) ground and tree crops, livestock and poultry in their original state. Declares that any person or firm engaged in agro-processing can credit the agro-processing VAT credit against the output tax. * * *"
