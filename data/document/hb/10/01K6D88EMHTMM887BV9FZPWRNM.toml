congress_website_title = "AN ACT DEFINING THE RIGHTS OF VICTIMS OF CRIME, ESTABLISHING THE OFFICE OF VICTIMS OF CRIME UNDER THE DEPARTMENT OF JUSTICE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Presently, there are many countries who have shown great interest to victims of crime. We therefore need to define the basic principles of justice for victims of crime to increase public awareness of crime victims' special needs and to uphold the age-old principle that justice is blind and that it doesn't tilt the sccales to favor anyone. \"Victims of Crime Act of 1996\" Defines in clear terms the meaning of 'CRIME VICTIM COMPENSATION PROGRAM' as used in this Act; prescribes the RIGHTS OF THE VICTIMS. Provides, likewise, for SERVICES FOR VICTIMS; establishes an office of Victim of Crime."

