congress_website_title = "AN ACT ALLOWING A FARMER-BENEFICI ARY TO MORTGAGE HIS RIGHT TO THE LAND AWARDED TO HIM, FOR A PERIOD OF TWO YEARS WITHOUT LOSING HIS SECURITY OF TENURE, AMENDING FOR THE PURPOSE SECTION TWENTY-SEVEN OF REPUBLIC ACT NUMBERED SIXTY-SIX HUNDRED AND FIFTY-SEVEN, OTHERWISE KNOWN AS THE 'COMPREHENSIVE AGRARIAN REFORM LAW OF 1988', AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares that --- \"SUBJECT TO THE APPROVAL OF THE DAR, THE FARMER BENEFICIARY WHO HAS NOT YET FULLY PAID THE VALUE OF THE LAND AWARDED TO HIM UNDER THE CARP MAY LIKEWISE MORTGAGE HIS RIGHTS THERETO, WITHIN THE PERIOD OF NOT EXCEEDING TWO (2) YEARS,TO ANY PERSON WHO MAY TEMPORARILY TAKE OVER THE CULTIVATION OF THE LAND: PROVIDED, HOWEVER, THAT, WITHIN THE PERIOD OF THE MORTGAGE, THE FARMER-BENEFICI ARY SHALL NOT LOST HIS SECURITY OF TENURE AND SHALL NOT BE EJECTED THEREFROM: PROVIDED, FURTHER,THAT HE REGULARLY PAYS THE AMORTIZATION DUE TO THE LBP.\""

