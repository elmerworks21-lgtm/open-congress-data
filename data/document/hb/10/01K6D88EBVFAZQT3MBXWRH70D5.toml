congress_website_title = "AN ACT REQUIRING DOMESTIC CARRIERS TO INSURE THEIR PASSENGERS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Passenger Protection Act of 1996\" Mandates all domestic airlines, ships and public utility vehicles to provide their passengers with individual automatic and non-contestable INSURANCE POLICIES as follows: (1) death - P300,000.00; (2) serious injuries - P150,000.00 (3) less serious injuries - P100,000.00; (4) slight injuries - P50,000.00."

