congress_website_title = "AN ACT REQUIRING LOCAL GOVERNMENT UNITS TO SET ASIDE NOT LESS THAN FIVE PERCENT (5%) OF THE TOTAL REVENUE FROM REGULAR SOURCES OF THE PRECEEDING YEAR AS LUMP SUM APPROPRIATION TO FINANCE REFORESTATION PROGRAMS AND PROJECTS, AMENDING FOR THE PURPOSESECTION 324 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1990"
congress_website_abstract = "Mandates local government units to comply with the following budgetary requirement: \"NOT LESS THAN TWO AND A HALF PERCENT (2.5%) OF THE TOTAL REVENUE FROM REGULAR SOURCES OF THE PRECEEDING YEAR SHALL BE SET ASIDE AS AN ANNUAL LUMP SUM APPROPRIATIONFOR REFORESTATION RELATED PROJECTS AND PROGRAMS; PROVIDED, THAT EXISTING LOCAL REFORESTATION PROJECTS FUNDED BY THE DEPARTMENT OF ENVIRONMENT AND NATURAL RESOURCES, INTERNATIONAL FUNDING INSTITUTIONS AND NON-GOVERNMENTA L ORGANIZATIONS SHALL BE EXCLUDED.\""

