congress_website_title = "AN ACT SEEKING TO IMPROVE CHILD PROTECTION AGAINST ABUSE, EXPLOITATION AND DISCRIMINATION, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7610, AS AMENDED BY REPUBLIC ACT NO. 7658, OTHERWISE KNOWN AS THE 'SPECIAL PROTECTION OF CHILDREN AGAINST CHILD ABUSE, EXPLOITATION AND DISCRIMINATION ACT,' APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Five (5) years after its passage, Republic Act No. 7610, otherwise known as the \"Special Protection of Children Against child Abuse, Exploitation and Discrimination Act,\" is still celberated for its valuable contribution to the cause of children's rights and welfare. Child-carers everywjere have hailed R.A. 7610 as a landmark piece of legislation in the area of child rights advocacy. However, even with its amendment by R.A. 7658, social workers, and other child care-givers still sawvarious areas where R.A. 7610 could be improved. This bill seeks to address indentified problems in those areas. Contains the following features --- (1) Bans and penalized the employment of all children in all forms of hazardous occupations; (2) Defiines \"HAZARDOUS OCCUPATION\" as used in this Act; (3) Mandates the creation of a CENTRAL DATA BANK to monitor child abuse cases; (4) Expands the meaning of \"CHILD TRAFFICKING\"; and (4) INCREASES penalties under RA 7610, Providing for Stronger Deterren"

