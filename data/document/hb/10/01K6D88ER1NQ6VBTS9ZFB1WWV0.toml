congress_website_title = "AN ACT TO PROVIDE HOUSING INCENTIVES TO ATHLETES WHO COMPETE AND WIN IN THE OLYMPICS AND ASIAN GAMES"
congress_website_abstract = "Declares the following --- \"SECTION 1. Housing Incentives. - Athletes who compete and win any medal in the Olympics and gold medal in the Asian Games shall be granted housing units subject to the following qualifications: (a) That the athlete beneficiary is a Filipino citizen, and resident of the Philippines at the time of the grant of the incentive; (b) That the athlete does not own a house and lot; and (c) That the athlete may avail of this incentive only once regardless of the number of medals that he or she has won.> The incentive provided under the preceding paragraph shall be over and above all other incentives granted to athletes under other laws, rules and regulations, except housing icnentives.\""

