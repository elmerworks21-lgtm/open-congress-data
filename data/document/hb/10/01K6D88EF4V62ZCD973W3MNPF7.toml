congress_website_title = "AN ACT GRANTING BONA-FIDE STUDENTS FARE DISCOUNTS IN LAND, AIR AND SEA TRANSPORTATION"
congress_website_abstract = "Provides for the following --- \"SECTION 2. SCOPE AND COVERAGE - Upon approval of this Act, all types of public transportation, including but not limited to BUSES, JEEPNEYS, TRICYCLES, CALESAS, AIRPLANES, and SHIPS granted a franchise by government to operate, shall give TWENTY (20) PERCENT DISCOUNT on the basic fare to students.\" \"SECTION 3. IDENTIFICATION CARDS - To avail of the student fare disccount a student upon boarding the public transport must show a duly issued identification card oreregistration form.\" \"SECTION 4. PENALTIES - any public utility operator and/or driver who refuses to give a student fare discount shall suffer the indeterminate penalty of SIX YEARS in prison and a fine of TEN THOUSAND PESOS or both upon the discretiion of the Courts. Likewise, the operators franchise ti operate shall be revoked and the License to Drive of the driver cancelled.\""

