congress_website_title = "AN ACT RECOGNIZING OR GRANTING CAREER EXECUTIVE SERVICE ELIGIBILITY TO CERTAIN FIRST GRADE ELIGIBLES AND PROTECTING THEIR RIGHT TO SECURITY OF TENURE"
congress_website_abstract = "Seeks to recognize or grant career executive service eligibilities to the following first grade eligibles who: (1) acquired first grade civil service eligibilities before September 24, 1972; (2) received Presidential appointments before August 12, 1990; acquired first grade eligibilities and served under these appointments for a period of at least five (5) years; and (3) received Presidential appointments before August 12, 1990, acquired first grade eligibilities and served under these appointments for a period of at least ten (10) years."
