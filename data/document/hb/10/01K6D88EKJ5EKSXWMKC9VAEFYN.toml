congress_website_title = "AN ACT MANDATING THE START OF THE SCHOOL YEAR ON THE FIRST MONDAY OF SEPTEMBER AND SHALL END UP TO THE MONTH OF JUNE BUT NOT EXCEEDING TWO HUNDRED TWENTY (220) CLASS DAYS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7797"
congress_website_abstract = "Rationale: The months of June until August fall under the rainy season. The primary reason for this is that the months of June until August would fall on the rainy season. Hence, not only are the students inconvenienced by the bad weather in attending their classes but suspension of classes are rather expected due to typhoons especially in flood-prone areas. Teachers, therefore, tend to cram their lessons and the students end up with half-baked learning. \"Section 1. Section three of Republic Act No. 7797 is hereby amended to read as follows: Section 3. Start of the School Year.- The school year shall start on the first Monday of [June] SPETEMBER but not later than the last day of [August] NOVEMBER. >In the implementation of this Act, the SSecretary of Education, Culture and Sports shall determine the EXACT DATE of the end of the regular school year AND WHICH SHOULD FALL ON THE MONTH OF JUNE, taking into consideration the Christmas and [summer] vacations, and the peculiar circumstances"

