congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NUMBER 1866, OTHERWISE KNOWN AS 'CODIFYING THE LAWS ON ILLEGAL/UNLAWFU L POSSESSION, MANUFACTURE , DEALING IN, ACQUISITION OR DISPOSITION OF FIREARMS, AMMUNITION OR EXPLOSIVES OR INSTRUMENTS USED IN THE MANUFACTURE OF FIREARM, AMMUNITION OR EXPLOSIVES AND IMPOSING STIFFER PENALTIES FOR CERTAIN VIOLATIONS THEREOF AND FOR RELEVANT PURPOSES"
congress_website_abstract = "Declares that: \"SECTION 1. THE PENALTY OF PRISION CORRECCIONAL SHALL BE IMPOSED UPON ANY PERSON WHO SHALL UNLAWFULLY MANUFACTURE, DEAL IN, ACQUIRE, DISPOSE OR POSSESS ANY FIREARM, AMMUNITION, EXPLOSIVES OR MACHINERY, TOOL OR INSTRUMENT USED OR INTENDED TO BE USED IN THE MANUFACTURE OF ANY FIREARM, AMMUNITION OR EXPLOSIVES\""
