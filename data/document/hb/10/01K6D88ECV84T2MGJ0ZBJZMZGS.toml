congress_website_title = "AN ACT PROVIDING FOR CERTAIN REQUIREMENTS TO INSURE CLEAN AND HONEST ELECTION OF MEMBERS OF THE BOARD OF DIRECTORS OF ELECTRIC COOPERATIVES AND FOR OTHER PURPOSES TO BROADEN THE OPPORTUNITIES FOR SERVICE THEREIN AMONG A WIDER SEGMENT OF THEIR MEMBERSHIP, FURTHER AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 269, AS AMENDED BY PRESIDENTIAL DECREE NO. 1645"
congress_website_abstract = "Recommends significant amendments to PD 269 regarding election of the Board of Directors of electric cooperatives, such as on: (1) term of office of a regularly elected member; (2) additional qualification for membership in the cooperative; (3) preparation of a masterlist of qualified members/voters; (4) issuance of a membership certificate; and (5) penalties for violation of this Act."
