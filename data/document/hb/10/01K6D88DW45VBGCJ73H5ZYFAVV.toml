congress_website_title = "AN ACT AMENDING SECTION 114 OF THE NATIONAL INTERNAL REVENUE CODE SO AS TO ENSURE THAT THE CATERER'S TAX IS NOT PAID BY THE CUSTOMERS OF RESTAURANTS, REFRESHMENT PARLORS, AND OTHER EATING PLACES AS PART OF THE COST OF FOOD AND REFRESHMENT BOUGHT"
congress_website_abstract = "Declares that --- \"THE CATERER'S TAX OF FOUR (4%) PER CENTUM ABOVE IMPOSED FROM THE SALE OF FOOD OR REFRESHMENT IS A DIRECT TAX OF THE PROPRIETORS AND OWNERS OF THE RESTAURANTS AND OTHER EATING ESTABLISHMENT AND SHALL NOT BE IMPUTED AS PART OF THE COST OF SUCH FOOD OR REFRESHMENT WHEN SOLD TO CUSTOMERS.\""

