congress_website_title = "AN ACT PROVIDING FOR THE MODERNIZATION OF THE SCHOOL HEALTH AND NUTRITION PROGRAM (SHNP) OF THE DEPARTMENT OF EDUCATION, CULTURE AND SPORTS, AUTHORIZING THE APPROPRIATION OF FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"School Health and Nutrition Modernization Act\" States the THRUSTS of this Program, as follows: (1) The development of an efficient and effective health care delivery system in the schools; (2) The development, evaluation and application of appropriate methods and procedures in preventive health care; (3) The development of reforms in the management of human and material resoruces; and (4) The acquisition and upgrading of appropriate equipment and technology."

