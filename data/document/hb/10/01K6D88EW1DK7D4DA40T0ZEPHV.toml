congress_website_title = "AN ACT PROVIDING PENALTY FOR ANY EMPLOYER WHO TERMINATES EMPLOYMENT WITHOUT JUST CAUSE WHILE UNDER PROBATION TO AVOID REGULARIZATION AND SECURITY OF TENURE"
congress_website_abstract = "Rationale: All over nationwide, more specifically in food and chain establishments and other fields of industries, there is rampant violations of these statutory and constitutional guarantees to labor. These are violated grossly and wantonly at will, left and right, and with impunity. Our small and poor workers are a very pitiful sight because the practice which is openly public is that once these young workers are in the fifth (5th) month, they are cruelly terminated WITHOUT JUST CAUSE OR CAUSES. Why? Are these young workers not entitled at all to regularization and security of tenure? Let us now put a stop to this mockery to our Labor Code and the Constitution. > \"The Employees' Regularization Law\" Provides for the following --- \"SECTIOON 3. Prohibited Acts. - It shall be unlawful for any employer to terminate any employee or worker on or before the expiration of a period of six (6) months from date of employment without just, valid and legal cause in order to prevent or avoid regu"

