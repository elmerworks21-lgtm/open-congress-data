congress_website_title = "AN ACT TO ACHIEVE SELF-RELIANCE IN THE COUNTRY'S ENERGY REQUIREMENTS THROUGH THE EXPLOITATION OF NON-CONVENTIONA L ENERGY RESOURCES SUCH AS, BUT NOT LIMITED TO, BIOMASS, SOLAR, WIND, MICROHYDRO AND OCEAN ENERGY, PROVIDING INCENTIVES FOR DEVELOPERS,MANUFACTURERS AND USERS OF NON-CONVENTIONA L ENERGY SYSTEMS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Most nonconventional energy systems are environment-saf e, as in wind andd solar energy systems, andd even environment-enh anccing, as in systems for recycling waste into gas and biomass. Isolated groups and individuals have persisted andtriumphed in their efforts to harness nonconventional sources of energy for daily home and indsutrial use. The Philippines is not lacking in such forward-looking and enterprising citizens, who have sometimes deplored the perceived lack of genuine government interest in their work.\" \"National Nonconvetional Energy Program Act of 1996\" Refers to energy systems which use renewable energy resources applying new energy conversion or utilizing innovative techniques. These systems can be characterizeed as indigenous small-scale, decentralized andd modular."

