congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF THE PHILIPPINE INTERNET CORPORATION, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The State recognizes the vital role of communication and information in nation building. In pursuance of this policy, the State shall develop and implement a national government program that will optimize the utilization of information technology infrastructure towards the attainment of continued economic growth and development. \"Philippine Internet Access Act of 1997\" Creates the PHILIPPINE INTERNET CORPORATION or \"Philincor\" which shall provide a national and integrated frameworkfor information technology development among the various government agencies, government-owne d and controlled corporations (GOCCs), state colleges and universities (SUCs) and local government units."

