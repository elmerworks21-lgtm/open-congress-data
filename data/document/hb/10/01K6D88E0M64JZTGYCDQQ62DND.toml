congress_website_title = "AN ACT PROVIDING FOR A NATIONAL ECOTOURISM POLICY, ESTABLISHING A FRAMEWORK FOR ITS INSTITUTIONALIZ ATION, CREATING MECHANISM FOR ITS IMPLEMENTATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Ecotourism Policy Act of 1995\" Ensures the right of the people to a balanced and healthful ecology through the promotion of activities geared towards environmental protection and conservation. Underscores the role of the local communities, including the indigenous cultural communities, as stewards of the environment in their respective localities."

