congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC RESIGNATION OF ANY CANDIDATE HOLDING AN ELECTIVE OFFICE, AMENDING SECTION 67, ARTIClE IX, OF BATAS PAMBANSA BLG. 881, AS AMENDED, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "Proposes the following amendment to Section 67 of the Omnibus Election Code (BP Blg. 881): \"SEC. 67. Candidates holding elective office. - Any elective official, whether national or local, running for any office other than the one which he is holding in a permanent capacity except President and Vice President, shall be considered ipso facto resigned from his office upon the filing of his certificate of candidacy.\""

