congress_website_title = "AN ACT GRANTING INCOME TAX EXEMPTIONS TO EMPLOYEES BOTH FROM PUBLIC AND PRIVATE AGENCIES WHO ARE DUE FOR RETIREMENT"
congress_website_abstract = "Entitles ALL employees who are DUE FOR RETIREMENT the following income tax exemptions PRIOR to their retirement: (a) Compulsory retirement - three (3) years exemptions (b) Optional retirement - two (2) years exemptions (c) Disability retirement - one (1) year exemptions"
