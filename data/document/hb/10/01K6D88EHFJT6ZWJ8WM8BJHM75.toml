congress_website_title = "AN ACT GRANTING THE MAGNA CARTA FOR DAY CARE WORKERS"
congress_website_abstract = "Declares it the policy of the State to promote and improve the social and economis status of day care workers. Provides for these areas of concern: (1) recruitment and qualification; (2) remuneration and working conditions; (3) working hours; (4) additional compensation and allowances; (5) transfers and tenure of office."

