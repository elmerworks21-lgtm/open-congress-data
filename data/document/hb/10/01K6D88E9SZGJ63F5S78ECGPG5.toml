congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED 6713, OTHERWISE KNOWN AS THE CODE OF CONDUCT AND ETHICAL STANDARDS FOR PUBLIC OFFICIALS AND EMPLOYEES"
congress_website_abstract = "Refers to the Duties of Public Officials and Employees, Section 5(d) of RA 6713. States that: \"THE RETIREMENT BENEFITS OF ALL GOVERNMENT OFFICIALS AND EMPLOYEES SHALL BE RELEASED ON OR BEFORE THAT DATE OF RETIREMENT OF THE OFFICIAL OR EMPLOYEE CONCERNED, PROVIDED-HOWEVE R: THAT AL REQUIREMENTS FOR THE PROCESSING OF THE SAME ARE SUBMITTED AND/OR COMPLIED WITH WITHIN A REASONABLE TIME BEFORE THE DATE OF RETIREMENT AND PROVIDED, FURTHER: THAT THE GOVERNMENT OFFICIAL OR EMPLOYEE CONCERNED SHALL BERELIEVED FROM HIS OR HER DUTIES SIXTY (60) DAYS BEFORE TH DATE OF RETIREMENT TO ENABLE SUCH EPRSON TO WORK ON ALL REQUIREMENTS\""

