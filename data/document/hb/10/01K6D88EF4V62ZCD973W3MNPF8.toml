congress_website_title = "AN ACT CREATING THE TRADITIONAL AND ALTERNATIVE HEALTH CARE INSTITUTE TO ACCELERATE THE DEVELOPMENT OF TRADITIONAL AND ALTERNATIVE HEALTH CARE IN THE PHILIPPINES, PROVIDING FOR A TRADITIONAL AND ALTERNATIVE HEALTH CARE DEVELOPMENT FUND AND FOR OTHERPURPOSES"
congress_website_abstract = "\"Traditional and Alternative Health Care Development Act of 1996\" Seeks to --- (a) to encourage scientific research on and development of traditional and alternative health care systems, particualry those with direct impact on public health; (b) topromote and advocate the use of traditional and alternative health care modalities that have been proven safe, effective and consistent with government standdards on medical practices; (c) to formulate standards, guidelines and codes of ethical practice appropriate for the practice of traditional and alternative health care as well as in the manufacturem marketing and quality control of different traditional and alternative health care materials and product for approval and adoption by the approopriate governemnt agencies."
