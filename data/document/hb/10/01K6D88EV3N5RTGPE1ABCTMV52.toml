congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6981, OTHERWISE KNOWN AS THE \"WITNESS PROTECTION, SECURITY AND BENEFIT ACT\" AND FOR OTHER PURPOSES"
congress_website_abstract = "Recommends the following amendments to the Witness Protection Law: (1) Free medical treatment, hospitalization and medicines for the witness WHILE IN THE SAFEHOUSE; and (2) Free PUBLIC education, from primary to college, fo rthe WITNESS' minor or dependent children. > Adds a NEW Section which shall read as follows: \"SEC. 2-A. PERPETUATION OF TESTIMONY. - A WITNESS ONCE ADMITTED INTO THE PROGRAM MAY PERPETUATE HIS TESTIMONY PURSUANT TO RULE 134 OF THE REVISED RULES OF COURT.\""

