congress_website_title = "AN ACT DEFINING AND PENALIZING THE REPRISAL OF ANY OFFICER OR EMPLOYEE IN THE CIVIL SERVICE AGAINST ANY GOVERNMENT EMPLOYEE OR APPLICANT FOR THE DISCLOSURE OF INFORMATION REASONABLY BELIEVED TO EVIDENCE A VIOLATION OF LAW, RULE, OR REGULATION OR MISMANAGEMENT, A GROSS WASTE OF FUNDS, AN ABUSE OF AUTHORITY, OR A SUBSTANTIAL AND SPECIFIC DANGER TO PUBLIC HEALTH AND SAFETY"
congress_website_abstract = "Prohibits any officer or employee in the Civil Service, whether career or non-career who has the authority to take a personnel action as a reprisal for disclosure of information of a vioaltion, abuse, mismanagement, gross waste of funds or a substantial and specific danger to public health and safety with respect to any employee or applicant for employment provided that such disclosure is not specifically prohibited by law. Penalizes any person who commits such reprisal, upon conviction by a competent court, with imprisonment of not more than two (2) years or a fine not exceeding TWENTY THOUSAND (P20,000.00) PESOS or both."
