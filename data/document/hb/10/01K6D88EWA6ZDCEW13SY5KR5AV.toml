congress_website_title = "AN ACT AMENDING ARTICLE 94, 95 AND 96, CHAPTER III, OF THE LABOR CODE OF THE PHILIPPINES, AS AMENDED(RE: RIGHT TO SERVI CE INCENTIVE LEAVE;SERVICE CHARGES COLLECTED BY RESTAURANTS ...)"
congress_website_abstract = "Rationale: The approval of this measure will the very least, offer a noninflationary financial package to our brothers and sisters in the field of labr, and save our employers a direct hit to its finances. The effects of both will certainly redoundto industrial peace. Proposes, therefore, the following amendments to the Labor Code: \"ART. 95. Right to service incentive leave. (a) Every employee who has rendered at least TEN (10) MONTHS of service shall be entitled to a yearly service incentiveleave of TEN (10) DAYS with pay AND THOSE WHO HAVE WORKED FOR MORE THAN SIX (6) MONTHS BUT LESS THAN TEN (10) MONTHS SHALL BE ENTITLED TO A SERVICE INCENTIVE LEAVE OF FIVE (5) DAYS WITH PAY.\" \"ART. 96. Service charges. - All service charges collectedd by restaurants and similar establishments shall be distributed ONE HUNDRED PERCENT (100%) TO ALL ITS EMPLOYEES AND WORKERS EQUALLY AMONG THEMSELVES EVERY 15TH DAY AND 30TH DAY OF EACH MONTH; NON-COMPLIANCE BY AN EMPLOYER WITH THIS REQUIREMENT SHALL"

