congress_website_title = "AN ACT LIMITING THE USE OF DULY REGISTERED AND MARKED BOTTLES AS CONTAINERS OF 'SISI', 'BAGOONG', ' PATIS' AND SIMILAR NATIVE PRODUCTS TO SMALL SCALE PRODUCERS, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIX HUNDRED AND TWENTY THREE, AS AMENDED,ENTITLED 'AN ACT TO REGULATE THE USE OF DULY STAMPED OR MARKED BOTTLES, BOXES, CASKS, KEGS, BARRELS AND OTHER SIMILAR CONTAINERS'"
congress_website_abstract = "Rationale: Republic Act No. 623 was enacted on June 5, 1951 to protect legitimate business from the unfair trade practice or nefarious activity of some manufacturers in re-using duly marked, or stamped bottles of registered owners without their consent. Specifically, Sections 1 to 5 of the law assure protection to manufacturers who registered their finished products. However, Section 6 thereof removes such protection when the users of their registered and marked bottles are producers of \"sisi\",\"patis,\" \"bagoong\" and similar native products. >Proposes the following amendment to Section 6, RA 623: \"SEC. 6. The provisions of this Act shall not be interpreted as prohibiting the use of bottles as containers for \"sisi\", \"bagoong\", \"patis\", andsimilar native products by PRODUCERS WHOSE PRODUCTION IS ON A SMALL SCALE, CARRIED ON MAINLY IN THE RESIDENTIAL HOUSE OF THE PRODUCERS FOR PROFIT AND DONE WITH THE HELP OF THE OTHER MEMBERS OF THE FAMILY WITH CAPITALIZATION NOT EXCEEDING THIRTY THOUS"

