congress_website_title = "AN ACT GRANTING PROVINCES, CITIES, MUNICIPALITIES AND CONGRESSIONAL DISTRICTS AS WELL AS SECTORAL AREAS A SHARE IN THE GROSS REVENUE OF CASINOS DULY ESTABLISHED UNDER THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION"
congress_website_abstract = "\"SECTION 1. Provinces, cities or municipalities where casinos are presently located and established under the Philippine Amusement and Gaming Corporation (PAGCOR) shall be granted a minimum of ten percent (10%) share in the gross revenue of casinoswithin their respective jurisdictions which shall be computed based on the gross revenue after deducting the five percent (5%) franchise tax and fifty percent (50%) of the ninety-five percent (95%) balance due the National Treasury, but in no case shall it be less than the present amount given by PAGCOR as host city's share of its casino.\""

