congress_website_title = "AN ACT REQUIRING FOOD MANUFACTURERS/P ROCESSORS TO INDICATE THE EXPIRATION OR EXPIRY DATE ON THE LABEL OR ON ANY CONSPICUOUS PLACE OF EVERY PROCESSED, PRESERVED, CANNED, PACKAGED OR BOTTLED FOOD PRODUCT, AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Penalizes violation of this Act with --- \"Sec. 5 Any person who vioaltes this act, or the rules and regulations issued pursuant thereto, shall be punished with imprisonment of not less than six (6) months and one (1) day but not more than five (5) years, or a fine of not less than Ten Thousand Pesos (P10,000.00) but not more than Thirty Thousand Pesos (P30,000,00) or both such imprisonment and fine, at the discretion of the court.\""
