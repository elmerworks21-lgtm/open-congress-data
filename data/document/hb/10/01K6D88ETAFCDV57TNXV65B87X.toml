congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE WATER RESOURCES MANAGEMENT TO ADDRESS THE NATIONAL WATER CRISIS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Declaration of Policy - The State recognizes the existence of a national water crisis. It is hereby declared the policy of the State to adopt urgent and effective measures to address the antional water crisis, as well as measures for thelong-term sustainable management of scarce water resources. To achieve this purpose, the utilization and development of water resources must be rationalized and optimized through an integrated approach to planning, development and regulation of thewater sector.\" Proposes the creation of the WATER RESOURCES AUTHORITY OF THE PHILIPPINES which shall facilitate the preparation, integration, coordination, and supervision of all plans, programs, projects, and activities of the government relative too water exploration, utilization, distribution and conservation."

