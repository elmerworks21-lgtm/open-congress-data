congress_website_title = "AN ACT PRESCRIBING THE CODE OF THE NATIONAL FLAG, ANTHEM, MOTTO, COAT-OF-ARMS AND GREAT SEAL OF THE PHILIPPINES"
congress_website_abstract = "\"Code of the National Flag, Anthem, Motto, Coat-of-Arms and Great Seal of the Philippines\" Prescribes certain deportment for all citizens to observe during flag ceremonies, proper handling of the flag, remembering the substance of the Motto, livingup to the Coat-of-Arms and the Great Seal of the Philippines by proudly displaying them within the context of prudence and propriety."
