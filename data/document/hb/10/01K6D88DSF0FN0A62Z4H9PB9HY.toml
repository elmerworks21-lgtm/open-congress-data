congress_website_title = "AN ACT GRANTING ADDITIONAL RETIREMENT BENEFITS TO MEMBERS OF THE JUDICIARY, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED NINE HUNDRED AND TEN, AS AMENDED, AND PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Increases the retirement pensions of MUNICIPAL AND REGIONAL TRIAL COURT JUDGES. Transfers to the surviving spouse or his heirs upon the death of the pensioner the retirement pension, and in case the surviving spouse contracts another marriage, he/she shall cease to receive such pension."

