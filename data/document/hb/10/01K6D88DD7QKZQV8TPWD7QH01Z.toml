congress_website_title = "AN ACT INCREASING THE BENEFITS OF BARANGAY OFFICIALS, INCLUDING BARANGAY TANODS AND MEMBERS OF THE LUPONG TAGAPAMAYAPA, AMENDING FOR THE PURPOSE THE 'LOCAL GOVERNMENT CODE OF 1991'"
congress_website_abstract = "Proposes the grant of increased benefits to barangay officials as follows: (1) P3,000.00 per month for the punong barangay; (2) P1,500.00 per month for the barangay members, treasure, and secretary; and (3) P600.00 for the barangay tanod and membersof the lupong tagapamayapa."

