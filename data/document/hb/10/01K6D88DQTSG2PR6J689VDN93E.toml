congress_website_title = "AN ACT TO INTEGRATE A COMPUTER EDUCATION PROGRAM INTO THE EDUCATIONAL SYSTEM AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares it a State policy to promote functional computer literacy in all schools, at the earliest possible stage, and in a manner that is most efficient and effective in producing a population that is highly skilled in the creation, use and manipulation of computer softrware. Mandates the integration of basics of computer applications and programming in the school curriculum; creates a Board on Computer Education. Encourages the private sector initiative and participation to achieve the aformentioned policy objective."

