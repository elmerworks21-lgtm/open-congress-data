congress_website_title = "AN ACT RECTIFYING THE ERRONEOUS INTERPRETATION OF SECTION 2 OF EXECUTIVE ORDER NO. 228, SERIES OF 1987, AND DIRECTING THE PRESIDENTIAL AGRARIAN REFORM COUNCIL TO GIVE FIRST PRIORITY IN THE ALLOCATION OF FUNDS FROM THE AGRARIAN REFORM FUND FOR THE PURPOSE"
congress_website_abstract = "\"Operation Land Transfer (OLT) Rectification Law\" Declares the following --- \"SEC. 2. Declaration of Principle. It is the principle of the State to uphold social jsutice in the implementation of the Comprehensive Agrarian Reform Program and which shall not be limited to the just distribution of agricultural lands to the landless farmers and farmworkers but shall include the fair valuation of lands of the affected landowners for the jsut compensation thereof. \"Sec. 3. Constant-Year Pricing. Inthe implementation of Executive Orderr No. 228, Series of 1987, the compensation due to affected landowners of rice and corn lands shall be recomputed with the valuation derived per Section 2 thereof treated as the constant-year price for the land ssubject of acquisition in order to rectify for the effects of inflation between the October 21, 1972 and date of effectivity of the said Executive Order.\""

