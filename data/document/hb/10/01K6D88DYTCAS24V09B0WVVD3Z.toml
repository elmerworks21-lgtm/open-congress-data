congress_website_title = "AN ACT CREATING THE POSITION OF ANTI-DRUG ABUSE ACTION OFFICER IN EVERY CITY AND EVERY MUNICIPALITY AND PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Creates the position of Local Anti-Drug Abuse Action Officer in every city and municipality. Designates the following functions, such as: (1) Direct local educational and public dissemination drive; (2) Supervise the Barangay Anti-Drug Abuse ActionOfficer; (3) Coordiante with local agencies concerned; and (4) Designates the municipal or city vice-mayor or ex-officio anti-drug abuse action officer."

