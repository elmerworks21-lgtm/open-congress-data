congress_website_title = "AN ACT VESTING IN ALL CITY AND MUNICIPAL MAYORS THE AUTHORITY TO EXERCISE EXCLUSIVE DIRECT OPERATIONAL SUPERVISION AND CONTROL OVER ALL CITY AND MUNICIPAL EMPLOYEES TASKED WITH THE DUTY OR FUNCTIONS OF ISSUING ALL KINDS OF CITY OR MUNICIPAL PERMITSAND LICENSES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares that --- \"SECTION 2. Any act of malfeasance. misfeasance or nonfeasance committed by a city or municipal mayor or city or municipal employee in the performance of his function of issuing a city or municipal permit or license shall be punhised with imprisonment for a period of not less than two (2) years nor mroe than five (5) years, at the discretion of the court. In addition, the offender shall suffer the penalty of perpetual absolute disqualificatio n from holding a public office.\""

