congress_website_title = "AN ACT REGULATING THE OPERATIONS OF BROADCAST MEDIA AND FOR OTHER PURPOSES"
congress_website_abstract = "Regulates the operations of broadcast media (1) repealing PD#576-A; (2) declaring that the authority to grant franchises to operate radio and television stations shall reside in Congress; (3) recognizing the validity of franchises previously grantedby Congress, as well as the permits issued by the defunct Broadcast Media Council and the National Telecommunicati ons Commission; and (4) providing for an interim period within which existing radio and television broadcast operators, whose franchises have already expired, can apply for and secure franchises from Congress."

