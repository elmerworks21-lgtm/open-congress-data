congress_website_title = "AN ACT ENSURING THE PAYMENT OF RETIREMENT AND OTHER BENEFITS TO GOVERNMENT EMPLOYEES ON THE DATE OF THEIR RETIREMENT"
congress_website_abstract = "Ensures the payment of retirement and other benefits to government employees on the date of their retirement. Seeks to relieve retirees and their beneficiaries from the physically taxing and financially burdensome experience of following up their retirement benefits in the central offices of insurance and other related offices in Metro Manila."
