congress_website_title = "AN ACT ESTABLISHING A COMPREHENSIVE FACULTY ASSISTANCE AND DEVELOPMENT FUND FOR THE PURPOSE OF GIVING GOVERNMENT SUBSIDY TO ALL PRIVATE SCHOOLS IN THE FORM OF ALLOWANCES, AND AMENDING FOR THIS PURPOSE, SECTION 13 OF REPUBLIC ACT NO. 6728, OTHERWISEKNOWN AS 'AN ACT PROVIDING GOVERNMENT ASSISTANCE TO STUDENTS AND TEACHERS IN PRIVATE EDUCATION (GASTPE), AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Under Ra 6728, otherwise known as The Salary Standardization Law, public school teachers receive a minimum salary of Eight Thousand Six Hundred Pesos (P8,600.00) while private school teachers in the provinces receive a meager amount ranging from Two Thousand Five Hundered to Three Thousand Pesos (P2,500.00) - (P3,000.00) per month which results to a great imbalance of salaries between public and private school teachers. As a consequence, this only results to total dismay of school teachers from private schools who cannot be accommodated at teaching posts in the public schools. Moreover, it will finally end up in the closure of private schools in the provinces. Seeks, therefore, to amend Sec. 13 of Ra 6728 by granting GOVERNMENTT SUBSIDY in the from of allowances to all private school teachers in orderr to elimiante inequities in salary."
