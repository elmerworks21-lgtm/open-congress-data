congress_website_title = "AN ACT AMENDING SECTION 8, PARAGRAPH (D), SUBPARAGRAPHS 1, 2, 3 AND 4 OF REPUBLIC ACT NO. 7227, OTHERWISE KNOWN AS 'AN ACT ACCELERATING THE CONVERSION OF MILITARY RESERVATIONS INTO OTHER PRODUCTIVE USES, CREATING THE BASES CONVERSION AND DEVELOPMENTAUTHORITY FOR THIS PURPOSE, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES'"
congress_website_abstract = "Rationale: There is an imbalance in the sharing of the proceeds from the sale of the military camps. The AFP gets a smaller share from the proceeds of the fact that they are the one greatly affected by the disposition. Also, among others, the modernization program of the AFP is of equal importance, if not more, compared to the development of Clack and Subic, for which reason it must receive a more equitable share.> Seeks to CORRECT this imbalance with this proposed sccheme of apportionment.\" >\"xxxxx The proceeds from any sale, after deducting all expenses related to the sale xxxxx shall be used for the sole purpose of financing the transfer of AFP military camps and the construction of new camps, the self-reliance and modernization progrram of the AFP, the concessional and long-term housing loan assistance and livelihood assistance to AFP officers and enlisted men and their families, and the rehabilitation and expansion of the AFP's medical facilities.\""

