congress_website_title = "AN ACT PROHIBITING GOVERNMENT AGENCIES AND GOVERNMENT-OWNE D OR -CONTROLLED ENTITIES FROM AWARDING OR SELLING HOUSING UNITS TO BENEFICIARIES NOT QUALIFIED UNDER EXISTING LAWS, THE TRANSFERRING OWNERSHIP OF OR RIGHTS TO THE SAME WITHIN FIVE YEARS ANDPROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "States that awardees or buyers of each properties shall be PROHIBITED from TRANSFERRING OWNERSHIP of or rights to said properties within five (5) years from the date of award. Penalizes the President, Secretary of any government agency which violates this Act."

