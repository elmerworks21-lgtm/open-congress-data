congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC SUCCESSION OF THE ASSOCIATE APPELLATE JUSTICE WHO IS FIRST IN PRECEDENCE TO THE POSITION OF PRESIDING APPELLATE JUSTICE OF THE COURT OF APPEALS IN CASE OF VACANCY AND THE REMOVAL BY IMPEACHMENT OF THE MEMBERS THEREOF, AMENDING FOR THE PURPOSE THE JUDICIARY REORGANIZATION ACT OF 1980"
congress_website_abstract = "States that in case of avacancy in the Office of the Preisidng Appellate Justice, the ASSOCIATE APPELLATE JUSTICE WHO IS FIRST IN PRECEDENCE SHALL BE APPOINTED TO THE POSITION. States further that THE PRESIDING and Associate Appellate Justices of the Court of Appeals shall not be removed from office except on impeachment upon grounds and in the manner provided for in Sections 2 and 3 of Article XI of the Constitution of the Philippines."

