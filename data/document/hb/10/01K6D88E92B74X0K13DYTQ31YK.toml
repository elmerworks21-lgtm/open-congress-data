congress_website_title = "AN ACT TO PROFESSIONALIZE THE LOCAL SOCIAL WELFARE AND DEVELOPMENT OFFICER AMENDING FOR THE PURPOSE SECTION 483(a) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT ACT OF 1991"
congress_website_abstract = "Seeks to DELETE the alternative qualification of \"... OR holder of a college degree preferably in sociology and other related course\" as prescribed under Section 483 (a)_ of the Local Government Code, RA 7160. Underscores the additional qualification of the Social Welfare and Development Officer of \"having acquired experience in the practice of social work for at least five (5) years (for the provincial or city officer), and three (3) years for the municipal officer.\""

