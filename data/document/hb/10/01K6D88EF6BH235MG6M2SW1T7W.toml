congress_website_title = "AN ACT TO AMEND SECTION TWO HUNDRED TWENTY OF REPUBLIC ACT NUMBERED SEVEN THOUSAND ONE HUNDRED AND SIXTY OTHERWISE KNOWN AS THE 'LOCAL GOVERNMENT CODE OF 1991' AND FOR TOHER PURPOSES"
congress_website_abstract = "Provides that REAL PROPERTY CLASSIFIED AS RESIDENTIAL SHALL NOT BE REASSESSED MORE OFTENER THAT ONCE EVERY TEN YEARS AND AND THAT EACH PREASSESSMENT SHALL NOT EXCEED TWENTY PERCENT ON LAND AND TEN PERCEN ON BUILDINGS AND OTHER STRUCTURES; AND PROVIDED, FINALLY, THAT IN CASE OF VIOALTION OF THIS PROVISION, A PENALTY OF PERPETUAL DISQUALIFICATIO N TO HOLD PUBLIC OFFICE OR A FINE OF NOT EXCEEDING THREE HUNDRED THOUSAND PESOS OR BOTH DISQUALIFICATIO N AND FINE IN THE DISCRETION OF THE COURT, SHALLBE IMPOSED."

