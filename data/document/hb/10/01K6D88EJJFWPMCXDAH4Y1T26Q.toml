congress_website_title = "AN ACT PROFESSIONALIZI NG CERAMIC ENGINEERING IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: While the Philippines missed the advancement and development of ceramic science and technology for centuries due to the omission of ceramic engineering in the course offering in the country's academic institutions, sometimes such omission must have to be corrected. And the present Congress has within its powers to correct this error, by passing a Ceramic Engineering Law. \"Ceramic Engineering Act of the Philippines\""

