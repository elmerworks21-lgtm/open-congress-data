congress_website_title = "AN ACT CREATING AN AUDIO-VISUAL LIBRARY IN EACH MUNICIPALITY OF THE COUNTRY, REPLICATING FOR THE PURPOSE THE AUDIO VISUAL LIBRARY OF THE TECHNOLOGY AND LIVELIHOOD RESOURCE CENTER, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "With the advent of the technological age, it is the duty of the State to provide its people with concrete tools of receiving the same. The State has to prepare its inhabitants and keep them abreast with the modern practices and trades which are indispensable to the economic growth and development of the country. Thus, it is but necessary for the State to provide avenues where such technological developments can be learned and acquired with more facility and accessibility."

