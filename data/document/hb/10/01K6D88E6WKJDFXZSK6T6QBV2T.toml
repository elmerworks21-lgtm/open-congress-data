congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7716, OTHERWISE KNOWN AS THE EXPANDED VALUE-ADDED TAX LAW AND OTHER PERTINENT PROVISIONS OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, AND FOR OTHER PURPOSES"
