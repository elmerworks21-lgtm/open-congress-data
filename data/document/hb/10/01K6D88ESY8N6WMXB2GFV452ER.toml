congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NUMBERED TWELVE HUNDRERD NINETEEN, AS AMENDED, ENTITLED 'PROVIDING FOR THE EXPLORATION, EXPLOITATION, UTILIZATION AND CONSERVATION OF CORAL RESOURCES'"
congress_website_abstract = "Rationale: It is a fact that dead corals are used for rip-rap purposes and/or for the construction of breakwaters to serve as a protection for seacrafts or vessels moored along the shorelines. The beneficial use of dead corals for these purposes should not, therefore, be prohibited nor penalized. There are over zealous BFAR people, however, who are prosecuting persons who have used dead corals for rip-rap and/or for the construction of breakwaters. Seeks to AMEND Section 5 of PD 1219 to read asfollows: \"SEC. 5. Ordinary Coral. - The gathering, harvesting, collecting, transporting, [possession], sale and/or exporting of ordinary corals either in raw or processed form in any quantity, is prohibited. [The use of corals as materials in buildiing and other man-made structures, such as but not limited to piers, dams and dikes, is likewise prohibited.]\""

