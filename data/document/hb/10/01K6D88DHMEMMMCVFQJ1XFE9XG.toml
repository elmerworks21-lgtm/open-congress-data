congress_website_title = "AN ACT AUTHORIZING THE USE OF ELECTION PROPAGANDA IN MASS MEDIA UNDER CERTAIN CONDITIONS AMENDING FOR THE PURPOSE, SUBPARAGRAPH (B) OF SECTION ELEVEN OF REPUBLIC ACT NUMBER 6646, OTHERWISE KNOWN AS THE ELECTORAL REFORMS LAW OF 1987 AND SECTION 85 (E) OF BATAS PAMBANSA BLG. 881 OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE, AS AMENDED"
congress_website_abstract = "Allows political parties and independent candidates to buy air time and print space but with approval by the COMELEC. Seeks to restore the right , access and use of mass media for election propaganda under certain conditions. Aims to provide the electorate with a borader understanding of various electoral issues, as well as more bases in choosing their candidates for elective positions."
