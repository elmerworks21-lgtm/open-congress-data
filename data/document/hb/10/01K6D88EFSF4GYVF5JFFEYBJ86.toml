congress_website_title = "AN ACT ESTABLISHING REGIONAL AGRICULTURAL ZONES (AGRIZONES) TO ENHANCE PRODUCTION, PROVIDING THE NECESSARY SUPPORT SERVICES SUCH AS IRRIGATION, FARM-TO-MARKET ROADS, POST-HARVEST EQUIPMENT AND FACILITIES, RESEARCH AND DEVELOPMENT, AGRICULTURAL EXTENSION, FARM CREDIT ACCESS, SMALL FARMER COOPERATIVES, AND OTHER AGRICULTURAL INFRASTRUCTURES , APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Agricultural Productivity enhancement Program Act of 1996\" Rationale: The proposed bill identifies and focuses government support on certain priority areas whose agro-climatic features and market conditions are favorable for producing, processing,and marketing specific products. It encourages farmers and fishers to produce specific crops, such as rice, corn, coconut, sugar, tobacco, high value crops; livestocks, and fishery products only in areas that have the comparative advantage in producing such commodities. > Is premised on the principles of: (1) global competitiveness ; (2) participatory development process; (3) sustainable development; and (4) rational use of resources. Identifies the proposed agrizones."

