congress_website_title = "AN ACT BANNING LIQUOR AND CIGARETTE ADVERTISEMENT ON PRINT, RADIO, TELEVISION AND OTHER FORMS OF MASS MEDIA"
congress_website_abstract = "Declares the following acts PROHIBITED: (1) Showing of commercials on television, movies, film of advertisements about liquor and cigarettes; (b) Printing of advertisements about liquor and cigarettes in local, regional and national newspapers of general circulation, books, souvenir programs, pamphlets, and other forms (c) Announcing on radio advertisement spots referring to liquor and cigarretes; (d) Sports advertisement of liquor and cigarettes; (e) Other acts analogous to the above mentionedcircumstances."

