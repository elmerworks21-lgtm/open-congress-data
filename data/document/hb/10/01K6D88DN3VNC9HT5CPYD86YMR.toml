congress_website_title = "AN ACT REPEALING PRESIDENTIAL DECREE NUMBERED NINE HUNDRED AND FORTY AND RESTORING TO QUEZON CITY THE TITLE OF CAPITAL CITY OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "Repeals PD 940 which has made Manila the Capital City of the Philippine now known as Metropolitan Manila, and the seat of the National Government. Seeks to restore to Quezon City its birthright as the Capital City of the Philippines and the seat ofgovernment as envisioned by the founder of this City, the late Manuel L. Quezon."

