congress_website_title = "AN ACT ALLOWING THE ISSUANCE OF FIREARM LICENSES DURING ELECTION PERIOD, AMENDING FOR THE PURPOSE SECTION 32 OF REPUBLIC ACT NO. 7166, OTHERWISE KNOWN AS THE 1991 SYNCHRONIZED ELECTION LAW"
congress_website_abstract = "Rationale: What is necessary to be prohibited for security purposes is the carrying of firearms, which would not include possessing, and more, the issuance, of firearm license during the election period. To prohbit the possession and issuance of firearms license during election period, which usually runs for six (6) months before and after the election, effectively deprives duly licensed firearm dealers from doing their legitimate business during the period which is contrary to the state policy of encouraging private enterprise. > This bill seeks to lift the prohibition/sus pension of the issuance of firearm license during election period."
