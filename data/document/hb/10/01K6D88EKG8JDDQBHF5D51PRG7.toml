congress_website_title = "AN ACT PROVIDING FOR THE RESTORATION OF THE POSITION TITLE OF COURT STENOGRAPHER TO STENOGRAPHIC REPORTER AND UPGRADING THE POSITION AND SALARY GRADES THEREOF IN ALL COURTS NATIONWIDE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Before the passage and implementation of the Salary Standardization Law, the salary grade of Court Stenographers of the Regional Trial Courts was classified as Grade 18. Ironically, after the passage and implementation of the aforementioned Law, the position title of \"Stenographic Reporter\" was changed to \"Court Stenographer\" and the corresponding salary grade as lowered from Grade 18 to Grade 12, a clear diminution of their position classification and salary grade level depsite thegrave duties and responsibilaite s attacched to their position and the highly technical nature and the risks involved in holding such position."

