congress_website_title = "AN ACT PROVIDING FOR APPROPRIATION TO DEFRAY THE COST OF BUILDING A MEMORIAL TO COMMEMORATE THE CENTENNIAL OF THE PHILIPPINE INDEPENDENCE AND A SHRINE FOR THE HEROIC AND VALIANT KATIPUNEROS LED BY PRESIDENT EMILIO AGUINALDO AND FOR OTHER PURPOSES"
congress_website_abstract = "Appropriates the amount of at least FIFTY MILLION PESOS for the first year, and TEN MILLION PESOS thereafter every year for five (5) years for this purpose. Provides the site of the proposed memorial - a three (3) -hectare area at the boundary of Cavite and Metro Manila."

