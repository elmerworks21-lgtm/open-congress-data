congress_website_title = "AN ACT AUTHORIZING THE START OF THE SCHOOL YEAR ON THE SECOND MONDAY OF SEPTEMBER AND SHALL END UP TO THE MONTH OF JUNE BUT NOT EXCEEDING TWO HUNDRED TEN (210) CLASS DAYS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7797"
congress_website_abstract = "Rationale: The bill seeks to mandate the scchool year calendar to start in the month of September and to end in the month of June, but not to exceed two hundred ten (210) days, amending for the purpose Republic Act No. 7797. > The rainy season in the Philippines starts in the month of June until the month of August. Our students, especially those in the grade school are inconvenienced by bad weather causing suspension of classes in flood-prone areas."

