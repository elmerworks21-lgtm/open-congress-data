congress_website_title = "AN ACT CRIMINALIZING RETALIATORY ACTS DIRECTED AGAINST AN EMPLOYEE WHO HAS FILED ANY COMPLAINT UNDER THE LABOR CODE OR TESTIFIED THEREUNDER, AMENDING FOR THIS PURPOSE THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Incorporate Article 286-A in PD No. 442, which shall read as follows: \"ART. 286 - A RETALIATORY MEASURES. IT SHALL BE UNLAWFUL FOR AN EMPLOYER TO REFUSE TO PAY IR REDUCE THE WAGES AND OTHER BENEFITS AND PRIVILEGES, DISCHARGE OR IN ANY MANNER DISCRIMINATE AGAINST ANY EMPLOYEE WHO HAS FILED ANY COMPLAINT OR INSTITUTED ANY PROCEEDING UNDER THIS CODE OR HAS TESTIFIED OR IS ABOUT TO TESTIFY IN ANY SUCH PROCEEDINGS."

