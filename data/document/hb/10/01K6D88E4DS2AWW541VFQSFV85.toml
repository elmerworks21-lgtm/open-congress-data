congress_website_title = "AN ACT PROVIDING THE MANNER AND DATE FOR THE FIRST ELECTIONS OF SECTORAL REPRESENTATIVES TO THE LOCAL SANGGUNIANS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Sets the DATE of the first elections of sectoral representatives to the local Sanggunian on the third (3) Saturday of February 1998. States that there shall be one (1) sectoral representative each for women sector and the workers' sector, and one (1) from any of the following sectors: urban poor, indigenous cultural communities, disabled persons."
