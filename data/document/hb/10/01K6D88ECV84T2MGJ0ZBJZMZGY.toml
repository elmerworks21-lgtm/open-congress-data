congress_website_title = "AN ACT AMENDING SECTION 32 OF REPUBLIC ACT NO. 7166, OTHERWISE KNOWN AS THE 1991 SYNCHRONIZED ELECTION LAW"
congress_website_abstract = "Amends Section 32 of RA 7166 to read as follows: \"Sec. 32. Who May Bear Firearms. - During the election period, no person shall bear, carry or transport firearms or other deadly weapons in public places, including any building, street, park, privatevehicles or public conveyances, even if licensed to possess or carry the same, unless authorized in writing by the Commission. The issuance of firearms licenses shall be suspended during the election period.\""
