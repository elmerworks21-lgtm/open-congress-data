congress_website_title = "AN ACT PROVIDING FOR A FLAG LAW FOR CUSTOMS BROKERS"
congress_website_abstract = "\"Flag Law for Customs Brokers\" States that all foreign-owned or multinational companies operating or doing business in the Philippines and enjoying tax benefits and other forms of incentives SHALL EMPLOY the service of ONE HUNDRED PERCENT Filipino-owned customs brokers to bundle their brokering requirements in the country."
