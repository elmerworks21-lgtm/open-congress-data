congress_website_title = "AN ACT ESTABLISHING A LIBRARY IN ALL GOVERNMENT OFFICES"
congress_website_abstract = "\"Government Office Library Act of 1996\" States that --- \"SECTION 4. Establishment of Libraries - All government agencies, including their regional and provincial offices shall establish a library where the following data shall be filed for access tothe public: (1) publications and newsletters of the agency, (2) all the latest data or statistics, including raw and uncollated data, which the agency has gathered or used as a basis for its operations; (3) official repoorts and office memoranda that concern the public, such as progress reports on its projects, situationers and the like, (4) administrative issuances, implementing guidelines and regulatory orders issued by the agency and laws and other executives issuances tht cocnern the agenccy, (5) and annual reports."

