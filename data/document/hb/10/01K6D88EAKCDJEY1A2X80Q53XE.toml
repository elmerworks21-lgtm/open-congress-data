congress_website_title = "AN ACT PROVIDING FOR THE EXEMPTION OF FIXED INCOME EARNERS FROM THE FILING OF INCOME TAX RETURNS, AMENDING FOR THE PURPOSE SECTION 44, NO. 2(C) OF EXECUTIVE ORDER NO. 273, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE OF THE PHILIPPINES"
congress_website_abstract = "Premises that \"since their (fixed income earners) income taxes are already withheld by their employers, the filing of income tax returns of fixed earners is an exercise in futility.\" Aims, likewise, to help the BIR meet its objective of simplifyingand streamlining the country's entire taxe collection system."
