congress_website_title = "AN ACT CREATING AN ANTI-KIDNAPPING AND -BANK ROBBERY UNIT UNDER THE CRIMINAL INVESTIGATION GROUP OF THE PNP, AMENDING FOR THE PURPOSE SECTION 35(b) (4) OF REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED SEVENTY-FIVE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The recent spate of kidnapping and bank robberies continue to haunt the country. Despite the eforts of the Philippine National Police, the number of reported kidnappings continue to escalate thus earning us the monicker \"the Kidnap Capital of Asia\", as one international magazine recently reported. Mandates the creation of a SPECIAL ANTI-KIDNAPPING AND-BANK ROBBERY UNIT which shall serve as a primary reaction term to undertake the (1) monitoring; (2) investigation; and (3) prosecutionof all kidnapping and bank robbery gangs and cases in the country."

