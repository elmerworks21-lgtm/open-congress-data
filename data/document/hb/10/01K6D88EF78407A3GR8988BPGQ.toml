congress_website_title = "AN ACT AMENDING SECTION 11 OF R. A. 8182, AND FOR OTHER PURPOSES (official development assistance -ODA)"
congress_website_abstract = "Rationale: \"To address the concerns raised by the Overseas Economic Cooperation fund (OECF), the World Bank (WB) and the Asian Development Bank (ADB) on the restrictions provided under Section 11 of RA 8182. > Accordingly, the restrictions run counter to the donors' policy and guidelines on international competitive bidding of official development assistance (ODA) grants and concessional loans-supported projects to the Government of the Philippines.\" Provides that the GUIDELINES OF THE DONOR COUNTRY/INSTITU TION IN CASES OF GRANT AND CONCESSIONAL LOANS ON FOREIGN-ASSISTE D PROJECTS SHALL BE RESPECTED."
