congress_website_title = "AN ACT DEFINING AND IMPOSING PENALTIES FOR THE CRIME OF DOMESTIC VIOLENCE"
congress_website_abstract = "Rationale: Among others, domestic violence is belatedly being recognized as a serious threat to the safety and security of the vulnerable members of the family. women victims, upon whom culture has imposed the burden of keeping the family intact, are sometimes left with no recourse but to suffer their ordeal in silence. Chidlren, innocent of the ways of the world, are puzzled and dazed by the violence being inflicted on them by people they trust and look to for kindness and care. \"Anti-Domestic Violence Act of 1996\" Defines \"DOMESTIC VIOLENCE\" as used in this Act; penalizes the crime of domestic violence to provide for the safety and security of the individual members of the family."

