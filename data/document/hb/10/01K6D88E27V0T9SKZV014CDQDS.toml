congress_website_title = "AN ACT GRANTING THE DISABLED PERSON THE SAME PRIVILEGES ENJOYED BY SENIOR CITIZENS, AMENDING FOR THE PURPOSE THE MAGNA CARTA FOR DISABLED PERSONS"
congress_website_abstract = "Seeks to grant the disabled person the following privileges enjoyed by senior citizens: (1) 20% discount from hotels, restaurants, recreation centers and or purchase of medicines and transportaion; (2) exemption for the individual income tax; and (3) full medical and dental services in government establishment. Grants incentives to persons caring forand living with disabled persons."

