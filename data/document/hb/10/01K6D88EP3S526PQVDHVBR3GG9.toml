congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA OF AGRICULTURAL OFFICERS AND EMPLOYEES"
congress_website_abstract = "Rationale: It is unfortunate that the career path of agricultural officers has been broken - limiting their chances to venture into higher positions and/or other offices of regional and national scope. Because the said position is onloy optional, local executives may opt not to create the position or appoint/assign someone as agricultural officer. Despite this status, the office of the agricultural officer is especially to perform its devolved functions in attaining its goal of teaching/asssiting the farmers on modern farm technology to uplift their living conditions. Defines the terms \" AGRICULTURAL OFFICER\" and \"AGRICULTURAL EMPLOYEE\" as used in this Act. Shall cover all eligible agricultural officers and employees, as well as all agriicultural practitioners in the government or nongovernment service. Provides for these concerns: (1) recruitment and qualifications; (2) performance instruction and merit promotion; (3) security of tenure; (4) safeguards in administrative proceedings"

