congress_website_title = "AN ACT ESTABLISHING CHILD AND FAMILY COURTS, GRANTING THEM EXCLUSIVE ORIGINAL JURISDICTION OVER CHILD AND FAMILY CASES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: As a signatory to the UN convention to the Rights of the Child, our country through this bill further aims to correct the glaring and obvious discrepancies in ineffectively handling of youth offender cases by our present judicial system. Our non-compliance to the UN minimum standard, to the provisions of the convention, to the UN committee on Children as required by the UN Beijing rules has been cited in the Geneva convention of January 1995. \"Child and Family Courts Act of 1997\"Places the following cases under the EXCLUSIVE ORIGINAL JURISDICTION of the child and Family Courts: (1) criminal cases where the accused is below 18 years of age at the time of the office; (2) petitions for guardianship, custody of children, ?in relation to the latter; (3) petition for the adoption of children; (4) complaints for the annulment of marriage, declaration of nullity of marriage, etc; (5) petitions for support, etc."
