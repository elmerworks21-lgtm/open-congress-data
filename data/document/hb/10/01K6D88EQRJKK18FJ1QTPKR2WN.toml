congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF ABSENTEE VOTING OF QUALIFIED FILIPINOS ABROAD AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Absente Voting Act of 1997\" Recommends that proper access to the right to vote by qualified Filipinos abroad be institutionaliz ed. > Defines \"ABSENTEE VOTING\" as used in this Act; covers all Filipinos abroad and their spouses and adequate who haveall the qualifications and none of the disqualificatio n of a voter. These votes include the following: (1) contract worker employed in foreign countries; (2) employees of the Philippine government assigned in foreign countries; and (3) Filipino citizens who are legal immigrants or temporary residents of foreign countries. Provides for other areas of concern, such as: (1) Procedure for Absentee Voting(2) Counting and Canvassing; (3) Prohibited Acts and Penalties, etc."
