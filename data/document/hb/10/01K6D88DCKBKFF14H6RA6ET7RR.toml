congress_website_abstract = "Seeks to expand the list of nonessential articles subject to the 20% excise tax to include: high grade watches, compact/laser discs, high-powered cameras, video recorders, color TV sets 21 inches or more, aircrafts, etc. Imposes a 5% and valorem taxon the sale/exchange of residential buildings, townhouses and condominium units worth P5 Million or more. * * *"

