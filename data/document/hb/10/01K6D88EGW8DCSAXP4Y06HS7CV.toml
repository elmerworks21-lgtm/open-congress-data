congress_website_title = "AN ACT DECLARING THE ACT OF LOOTING OR STEALING FROM OR DESECRATING VICTIMS OF ACCIDENTS, NATURAL OR MAN-MADE CALAMITIES, OR OTHER MISFORTUNES A HEINOUS CRIME PUNISHABLE BY RECLUSION PERPETUA TO DEATH (dead)"
congress_website_abstract = "Rationale: In order to promote the maintenance of peace and order, the protection of life and property..., Congress finds compelling reasons to declare as heinous crimes the act of looting or stealing from or desecrating victims of accidents, natural or man-made calamities or other misfortunes. Prescribes the penalty of RECLUSION PERPETUA to death for this crime."
