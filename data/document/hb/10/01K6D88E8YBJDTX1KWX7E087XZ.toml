congress_website_title = "AN ACT PENALIZING THE ISSUANCE OF A LICENSE OR PERMIT FOR ANY BUSINESS OR ACTIVITY WITHOUT FIRST OBTAINING A CLEARANCE FROM THE BARANGAY WHERE SUCH BUSINESS OR ACTIVITY IS LOCATED OR CONDUCTED, AMENDING FOR THE PURPOSE SECTION 152, PARAGRAPH (C) OFREPUBLIC ACT NO. 7160, AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares that willful and intentional violation of this provision by any officer charged with the duty of issuing a license or permit shall upon conviction be punished by a fine of P1,000.00 to P5,000.00, or by imprisonment of one (1) month to six (6) months."

