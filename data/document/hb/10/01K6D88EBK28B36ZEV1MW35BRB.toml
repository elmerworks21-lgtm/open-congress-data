congress_website_title = "AN ACT CREATING COUNCILS FOR THE PROTECTION OF CHILDREN IN EVERY CITY AND MUNICIPALITY OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Supports the policy of the State to bring up its minor citizens with proper direction, supervision and guardianship in their training, education and other interests. Creates a Council for the Protection of children within the city or municipality which shall among other functions: (1) encourage the cultivation of the duties of parents; (2) protect and assist abandoned or mistreated children and orphans; (3) take stpes to prevent juvenile deliquency."

