congress_website_title = "AN ACT DESIGNATING DEATH BY LETHAL INJECTION AS THE METHOD OF CARRYING OUT CAPITAL PUNISHMENT, AMENDING FOR THIS PURPOSE SECTION 24 OF REPUBLIC ACT 7659, WHICH AMENDED ARTICLE 81 OF THE REVISED PENAL CODE"
congress_website_abstract = "Amends further Section 24 of RA 7659 by designating LETHAL INJECTION as the method of carrying out capital punishment instead of electrocution which shall be executed under the authority of the Director of [Prisons] THE BUREAU OF CORRECTIONS. Statesthat persons already sentenced by final judgment who are waiting to udnergo the death penalty by electrocution or gas poisoning shall be covered by the provisions of this Act."
