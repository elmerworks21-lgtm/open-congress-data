congress_website_title = "AN ACT DEREGULATING CERTAIN PUBLIC SERVICES, AMENDING FOR THE PURPOSE COMMONWEALTH ACT NO. 146, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Redefines the term \"PUBLIC SERVICE\" so as to exclude certain activities from the protection and regulation of the law, including the burden of obtains a certificate of public convenience: (1) EXPRESS SERVICE; (2) SHIPYARD, MARINE RAILWAY MARINE REPAIR SHOP, WHARF OR DOCK; (3) ICE PLANT ICE REFRIGERATION PLANT; (4) CANAL IRRIGATION SYSTEMS; (3) PETROLEUM."

