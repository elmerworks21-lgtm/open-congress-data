congress_website_title = "AN ACT PROVIDING FOR THE DEVELOPMENT, ADMINISTRATION, ORGANIZATION, TRAINING, MAINTENANCE, AND UTILIZATION OF THE CITIZENS (ARMED FORCE) SERVICE GUARDS (CSGs) OF THE ARMED FORCES OF THE PHILIPPINES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7077, AND FOR OTHER PURPOSES (rotc)"
congress_website_abstract = "\"CITIZENS SERVICE GUARDS ACT\" Declares it the policy of the State to maintain a well disccipline, well -trained citizen force during times of external security, war or invasion, based on (3) THREE SERVICE COMPONENTS, namely: (1) military training service; (2) civic welfare service; and (3) law enforcement service."

