congress_website_title = "AN ACT REINSTATING TO FORMER NATURAL-BORN FILIPINO CITIZENS THEIR RIGHTS AND PRIVILEGES"
congress_website_abstract = "Rationale: Most former Filipino citizens have, as a matter of fact, remained Filipinos at heart. The prosperity they have acquired and enjoy abroad, grants them the unique ability to invest in the country and aid in its sustained development. Indeed, many have expressed the willingness to do so but have been inhibited by certain decrees and laws. \"Natural-born Filipino Citizenship Act\" States the following --- \"SECTION 2. The rights and privileges allowed to Filipino citizens shall be reinstated to former natural-born Filipino citizens, who have lost their Philippine citizenship, except as otherwise provided in the Constitution. > The right to hold public office, however, shall be reserved to Filipino citizens, pursuant to the provisionsof the Constitution.\" \"SECTION 3. Those rights and privileges reserved for Filipino citizens only by provisions of law other than the Constitution shall now be granted to natural botn Filipino citizens who have lsot their Philippine citizenships.\""

