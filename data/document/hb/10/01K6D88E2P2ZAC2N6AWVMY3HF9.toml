congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF SECTIONS 70 AND 71, CHAPTER 5, TITLE ONE, BOOK I OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE 'LOCAL GOVERNMENT CODE OF 1991,' AND FOR OTHER PURPOSES"
congress_website_abstract = "States that RECALL OF ANY ELECTIVE PROVINCIAL, CITY, MUNICIPAL OR BARANGAY OFFICIAL SHALL BE VALIDLY INITIATED ONLY UPON PETITION OF AT LEAST 25% OF THE TOTAL NUMBER OF REGISTERED VOTERS IN THE LOCAL GOVERNMENT UNIT CONCERNED DURING THE ELECTION INWHICH THE LOCAL OFFICIAL SOUGHT TO BE RECALLED WAS ELECTED."
