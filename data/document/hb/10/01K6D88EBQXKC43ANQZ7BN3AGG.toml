congress_website_title = "AN ACT SAFEGUARDING THE PROPERTY RIGHTS OF FILIPINO ARTISTS WITH RESPECT TO THEIR ARTISTIC WORK IN THE TELEVISION MEDIUM AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to safeguard the PROPERTY RIGHTS of Filipino artists and their artistic creations on cases of REPLAYS and RERUNS of local television shows. Provides for additional remuneration for every replays equivalent to at least FIFTY PERCENT (50%) of the original compensation received by the artist for the initial broadcast."

