congress_website_title = "AN ACT ABOLISHING THE PREMIUM TAX AND DOCUMENTARY STAMP TAX ON LIFE INSURANCE POLICIES AND ANNUITIES, REPEALING FOR THE PURPOSE SECTIONS 121 AND 183, AND AMENDING SECTION 186 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "Rationale: The main purpose of this bill is to lend support to a vital Philippine industry, the life insurance industry, which has been in place in our economy for almost a hundred years and among whose principal functions is the generation of domestic long term savings for economic development. Its passage will greatly support the industry's growth and development. Other countries have found such government policy economically and socially advantageous and beneficial to the country and its economy."
