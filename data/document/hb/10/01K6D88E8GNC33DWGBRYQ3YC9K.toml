congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A CREDIT COOPERATIVE SYSTEM IN THE LEGISLATIVE DISTRICTS THROUGHOUT THE COUNTRY IN ACCORDANCE WITH REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED AND THIRTY-EIGHT, OTHERWISE KNOWN AS THE COOPERATIVE CODE OF THE PHILIPPINES, AND APPROPRIATING FUDNS THEREFOR"
congress_website_abstract = "States the following objectives of the proposed credit cooperative system; (1) To encourage savings among its members; (2) To offer productive or provident endeavors/activ ities ot its members; and (3) To provide related services to enable the members to maximize the benefits from such loans."
