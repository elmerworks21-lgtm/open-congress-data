congress_website_title = "AN ACT WHICH SEEKS TO INCREASE LOCAL GOVERNMENT PARTICIPATION IN ENVIRONMENTAL PROTECTION BY ENLARGING THE POWER OF LOCAL LEGISLATIVE BODIES IN CREATING ENVIRONMENTAL CONTROL MEASURES FOR THEIR RESPECTIVE JURISDICTIONS"
congress_website_abstract = "Grants LGUs with the following powers with respect to environmental protection. (1) To approve or reject mining applications in their jurisdiction and to cancel or withdraw previously approved licenses or franchises, agreements or concessions; (2) To approve or reject applications for the oepration and maintenance o factories or plants with emissions or wastes hazardous to the environemnt; (3) To approve or reject applicaitons for forest/logging concessions or timber license agreements in theirrespective units; (4) To investigate violations committed by erring firms; (5) To impose fines, penalties and damages for violations committed by said firms; (6) To organize bodies, committees or task forces to monitor the oeprations of firms engageed in activities which have direct impact on the environment; and (7) To coordinate with people's or non-government organizations, law enforcement agencies, and other concerned agencies of the government for the enforcement of environmental laws."

