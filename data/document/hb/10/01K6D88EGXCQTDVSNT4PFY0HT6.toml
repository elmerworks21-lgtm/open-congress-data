congress_website_title = "AN ACT PRESCRIBING FURTHER ADMINISTRATIVE CONTROL AND PROCEDURES GOVERNING THE TRANSFER OF TITLE OR OWNERSHIP OF REAL PROPERTY IN ORDER TO ENSURE THE COLLECTION OF TAXES ARISING FROM SUCH TRANSFER, AMENDING FOR THE PURPOSE THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: \"...There is still much room for improvement of the present statutory revenue procedures to enhance voluntary tax compliance and accodingly maximize the BIR's revenue generation effort.\" Seeks, therefore, to plug the loopholes and legal technicalities arising from any law covering transfers of ownership over real properties."
