congress_website_title = "AN ACT PRESCRIBING ADDITIONAL PENALTIES FOR ANY MEMBER OF THE PNP, AFP, NBI OR ANY OTHER AGENT OF GOVERNMENT ENGAGED IN LAW ENFORCEMENT FUNCTIONS WHO COMMIT ANY CRIME OR OFFENSE PUNISHABLE UNDER THE PENAL LAWS OF THE PHILIPPINES"
congress_website_abstract = "Imposes the following additional penalties to members of the PNP, AFP, NBI oir any other agent of government engaged in law enforcement function who commit any crime or offense punishable der the penal laws or special laws of the Philippines: (a) accessory penalty of perpetual disqualificatio n from holding public office or employment; (b) forfeiture of rights to retirement pay, pension or any other gratuity; and (c) hard labor for at least ten (10) hours a day."

