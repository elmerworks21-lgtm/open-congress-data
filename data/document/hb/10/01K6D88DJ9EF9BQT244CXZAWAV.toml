congress_website_title = "AN ACT REGULATING THE PRODUCTION, PROCESSING, MANUFACTURE, SALE, USE AND DISPOSAL OF BAGS, CONTAINER AND PACKAGES, WHICH ARE ALL MADE OF POLYETHELENE MATERIALS, PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Declares that it shall be UNLAWFUL for any person or group of persons, both natural and juridical to sell, convey, give, donate or transfer to and end-user any form of bag, container, or packages which is MADE OUT OF POLYETHELENE MATERIALS. Prescribes penal sanctions."

