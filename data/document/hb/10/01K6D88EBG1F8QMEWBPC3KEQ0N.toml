congress_website_title = "AN ACT TO ALLOW GOVERNMENT HEALTH CARE PROFESSIONALS TO ENGAGE IN PRIVATE PRACTICE AFTER THEY HAVE RENDERED THE REQUIRED NUMBER OF WORKING HOURS IN THEIR RESPECTIVE HEALTH CARE FACILITIES OF HEALTH-RELATED ESTABLISHMENTS"
congress_website_abstract = "\"Government Health Care Professionals Private Act of 1996\" Aims to --- 1. Augment the income of government health care professionals by allowing them to engage in private practice after they have rendered the required number of working hours for theday or week; (2) Develop their skills and capabilities through their private practice so that they are better equipped to deliver medical/health services; and (3) Eliminate possible causes of graft and corruption."

