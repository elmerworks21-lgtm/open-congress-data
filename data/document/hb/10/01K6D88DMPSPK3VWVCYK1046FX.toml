congress_website_title = "AN ACT MANDATING THE GOVERNMENT SERVICE INSURANCE SYSTEM TO DEVELOP HOUSING COMMUNITIES FOR ITS MEMBERS IN PROVINCES AND CITIES THROUGHOUT THE COUNTRY"
congress_website_abstract = "Mandates GSIS to undertake and develop low-cost housing communities in provinces and cities throughout the country for the next five (5) years. Ensures that all qualified GSIS members are given the opportunity to avail of a unit on a soft loan basis."
