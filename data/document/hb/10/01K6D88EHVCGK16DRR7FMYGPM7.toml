congress_website_title = "AN ACT TO PROMOTE THE DEVELOPMENT OF THE ORCHID INDUSTRY"
congress_website_abstract = "Rationale: While our country is rich in orchid species. we are left out in the development of the orchid industry. \"Philippine Orchid Development Act\" >Creates the PHILIPPINE ORCHID DEVELOPMENT SECTION in order to --- (1) promote the accelerated development of the orchid industry in the country; (2) provide a general direction for the steady and orderly development of the industry for both domestic and export markets."

