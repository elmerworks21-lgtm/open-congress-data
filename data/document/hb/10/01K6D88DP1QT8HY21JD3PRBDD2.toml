congress_website_title = "AN ACT PROVIDING FOR BICYCLE LANES IN ALL MAIN ROADS AND HIGHWAYS THROUGHOUT THE COUNTRY"
congress_website_abstract = "Provides for bicycle lanes in all main roads and highways all over the country to lessen traffic and air pollution problems. Requires the District Engineer to place marks on existing main roads and highways to indicate bicycle lanes. Requires, further, that no new main road or highway shall be constructed without the required bicycle lanes."

