congress_website_title = "AN ACT SETTING THE WAGE RECOVERY FORMULA AS THE BASIS FOR GRANTING SALARY ADJUSTMENT TO PRIVATE SECTOR EMPLOYEES, PROVIDING GOVERNMENT SUBSIDY FOR INABILITY OF EMPLOYERS TO GRANT THE SALARY ADJUSTMENT, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes SALARY ADJUSTMENTS of private sector employees to be fixed on the basis of the following WAGE RECOVERY FORMULA: (1) Current Nominal Wage (CNW)/Current Consumer Price Index (ccpi) x 100 = Present Real Wage Volume (PRWV); (2) CNW - PRW V = Wage Loss Recoverable (WLR)"
