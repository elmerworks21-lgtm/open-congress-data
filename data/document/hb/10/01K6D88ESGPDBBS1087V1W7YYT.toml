congress_website_title = "AN ACT REQUIRING CANDIDATES FOR ALL ELECTIVE PUBLIC OFFICE TO SUBMIT CERTIFICATE OF NEUROLOGICAL TEST AND DRUG TEST AS ADDITIONAL REQUIREMENTS FOR THE FILING OF CERTIFICATE OF CANDIDACY, AMENDING BATAS PAMBANSA BLG. 811, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Section 7, Artilce 3 of our Constitution provides that it is the right of the people to information on matters of public concern. Health and the physiological frameup of an aspirant to an elective position are concededly a matter of public concern. These two aspects of man are the foundation of his action, the cause, if not the primary source, of our efficiency. > Amends, therefore, the Omnibus Election Code to read as follows: \"SECTION 73. Certificate of Candidacy. - No person shall be eligible for any elective public office unless he files a sworn Certificate of Candidacy TOGETHER WITH THE RESULT OF A NEUROLOGICAL EXAMINATION CONDUCTED BY AN ACCREDITED LICENSED NEUROLOGIST AND A CERTIFICATE FROM THE PNP CRIME LABORATORIES ATTTESTING TO THE RESULT OF A DRUG TEST ON THE ASPIRANT, within the period fixed herein. > THE RESULT OF THE NEUROLOGICAL EXAMINATION AND THE DRUG TEST SHALL BE INADMISSIBLE FOR ANY PURPOSE IN ANY PROCEEDING."

