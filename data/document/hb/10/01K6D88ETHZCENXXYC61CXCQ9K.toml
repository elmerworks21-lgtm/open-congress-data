congress_website_title = "AN ACT MANDATING THE USE OF THE SAFETY SEAT BELT BY DRIVERS AND FRONT SEAT PASSENGERS OF ALL MOTOR VEHICLES TRAVERSING ALL NATIONAL HIGHWAYS"
congress_website_abstract = "\"Safety Belt System Act\" Provides for the following --- \"SECTION 2. All motor vehicles passing through national highways shall be equipped with a safety belt system consisting of integrated lap and shoulder belts which must be used by their front seat occupants.\" \"SECTION 3. No motor vehicle shall be sold or registered and no registered motor vehicle shall be operated unless such vehicle is equipped with safety belts approved by and conforming to standards established by the Land TransportationOffice.\""

