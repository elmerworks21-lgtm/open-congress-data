congress_website_title = "AN ACT TO AMEND SECTION 47 OF REPUBLIC ACT NUMBERED EIGHT THOUSAND ONE HUNDRED AND EIGHTY-NINE, OTHERWISE KNOWN AS 'THE VOTER'S REGISTRATION ACT OF 1996', AND FOR OTHER PURPOSES(Re: funding for the registration activities)"
congress_website_abstract = "Seeks to remedy the problem of providing the necessary funds needed to update the list of voters preparatory to the 1998 national elections. Proposes, therefore, the following amendment to RA 8189: \"SEC. 47. Funding. - The amount of Two billion pesos (P2,000,000,000 ) is hereby [included in the General Appropriations Act for the fiscal year 1997] APPROPRIATED OUT OF ANY UNAPPROPRIATED SURPLUS IN THE NATIONAL TREASURY to defray the expenses for the registration activities.\""
