congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF COMPENSATION TO BUILDERS AND CONTRACTORS OF BUILD-OPERATE-T RANSFER (BOT) PROJECTS WHICH ENHANCE THE VALUE OF LANDS OR PROPERTY"
congress_website_abstract = "Provides for the following --- \"Sec. 2. Builders or contractors of infrastructure, utilities or services which enhance the value of lands or property shall be duly compensated through a system of reimbursement as part of the overall financial repayment scheme and contractual arrangements under Ra 7718, provided such repayment scheme and contractual arrangements are mutually agreed upon among the parties involved, especially those benefited, based on a percentage of the realized gain or increasein the value of the property.\""

