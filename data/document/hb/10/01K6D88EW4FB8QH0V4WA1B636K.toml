congress_website_title = "AN ACT CREATING THE NATIONAL HEALTH INSTITUTES, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Institutes Act of 1997: Is premised on the following objectives: (1) To expand the frontiers of medical knowledge by investing wisely on biomedical research that will lead to better health for all; (2) to promote research and development of drugs from indigenous and nonindigenous sources; (3) To encourage basic and clinical research on diseases peculiar to our country and ecology; (4) To create and fund intramural and extramural research programs for health."

