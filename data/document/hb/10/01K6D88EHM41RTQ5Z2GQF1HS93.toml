congress_website_title = "AN ACT CREATING THE SAFE DRINKING WATER COMMISSION, SETTING STANDARDS FOR CLEAN AND SAFE PUBLIC DRINKING WATER SYSTEMS, PROVIDING PENALTIES FOR VIOLATIONS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Clean, safe and abundant drinking water is one of our greatest patrimonial treasures, whether it comes from the ground or from lakes, streams or rivers. We can't take if for grantedd. We must protect its purity andd integrity now - and for future generations. \"Safe Drinking Water Act of 1996\" Prescribes the composition of the Commission, its power and duties; states the PROHIBITED ACTS under this proposed measure andd prescribes penalties for violation thereof."

