congress_website_title = "AN ACT ESTABLISHING THE MAGNA CARTA FOR COUNTRYSIDE AND BARANGAY BUSINESS ENTERPRISES (CBBEs), GRANTING EXEMPTIONS FROM ANY AND ALL GOVERNMENT RULES AND REGULATIONS AND OTHER INCENTIVES AND BENEFITS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to encourage the formation and growth of small business entities, principally in the countryside through minimal bureaucratic requirements and reasonable fees and charges. Prescribes for its registration and operations and for its fiscal and non-fiscal incentives. Provides for the proper and adequate information dissemination of the contents and benefits of this Act to the general public."

