congress_website_title = "AN ACT GRANTING ADDITIONAL FINANCIAL BENEFITS AND PROTECTION TO THE PRACTISING MEDIA MEN, MEDIA WORKERS, AS WELL AS MEDIA OWNERS AND FOR OTHER PURPOSE"
congress_website_abstract = "\"Meida Benefits Act\" Seeks to provide full protection to media men and media workers; proposes to grant the following additional benefits to media men and media workers: (1) health, accident and/or death insurance coverage; (2) educational plan coverage; (3) stock ownership option plan; (4) affordable housing; (5) sabbatical privileges; (6) discontented fares; and (6) security of tenure."

