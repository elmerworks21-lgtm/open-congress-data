congress_website_title = "AN ACT PROHIBITING THE UNAUTHORIZED CONVERSION OF COCONUT FARMS INTO OTHER AGRICULTURAL USES AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to regulate the conversion of coconut planted agricultural lands into other uses thereby implementing measures designed to conserve and protect the resources devoted to the coconut industry. Allows, however, such conversion in cases where it is shown that majority of the coconut trees in the subject land have become senescent and economically unproductive as determined by the Philippine Coconut Authority (PCA)."

