congress_website_title = "AN ACT AUTHORIZING CITY AND MUNICIPAL MAYORS TO ORGANIZE LOCAL POLICE AUXILIARY UNITS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Is based on the observation that the most glaring cause for the poor state of our police system is the inadequate number of policemen, particularly those assigned in the field. Provides, therefore, that the members of the local police auxiliary units shall enforce TRAFFIC laws and perform ADMINISTRATIVE duties. Provides, further that the members of these units shall NOT be issued or authorized to carry FIREARMS."

