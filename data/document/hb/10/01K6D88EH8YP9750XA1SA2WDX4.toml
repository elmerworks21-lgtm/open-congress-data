congress_website_title = "AN ACT AMENDING ARTICLE 96, CHAPTER 3, AND ARTICLE 124, CHAPTER 4, TITLE IV OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: to provide the wife an equal standing with the husbandd insofar as the administration and enjoyment of the community property or conjugal partnership property is concerned, and to conform to the constitutional mandate and the avowed objective of the Family Code, it is imperative to amend Articles 96 and 124 of the same. Further, that recourse to the courts shall be available to both spouses as soon as possible so that the five-year period can be shortened to a period of thirty (30) days from the date of failure of conciliation between them. Amends Article 96, Chapter 3, Title 4 of the Family Code to read as follows: \"The administration and enjoyment of the community property shall belong to both spouses jointly. In case of ddisagreement, the husband's decision shall prevail ONLY IF THE COMMUNITY PROPERTY WAS OBTAINED THROUGH HIS SOLE EFFORTS; BUT IF THE MAJOR PORTION THEREOF OR ITS VALUE IS DERIVED FROM THE WIFE'S RESOURCES AND EFFORTS, HER DECISION SHALL PREVAIL, subje"

