congress_website_title = "AN ACT PROHIBITING HEIGHT REQUIREMENT AS A CONDITION TO THE RECRUITMENT IN THE ARMED FORCES OF THE PHILIPPINES, PHILIPPINE NATIONAL POLICE AND SIMILAR AGENCIES OF GOVERNMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the following \"SECTION 1. The height requirement into the Armed Forces of the Philippines, the Philippine National Police and similar agencies of governemnt shall be prohibited, except for certain special duties, such as but not limitedto, motorcycle cops, special honor guards and the like.\""
