congress_website_title = "AN ACT DEFINING THE CRIME OF STALKING, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Stalking Act of 1997\" Declares it the policy of the State to ensure the safety and protection of the lives, properties and privacy of its citizens. Seeks to --- (1) Eliminate perpetrator behavior which disrupts normal life for the victim; and(2) Prevent such behaviors from escalating into violence."
