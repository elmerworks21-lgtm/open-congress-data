congress_website_title = "AN ACT TO REGULATE THE PROCUREMENT AND TRANSPLANT OF HUMAN ORGANS AND TISSUES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Human Organ and Tissue Procurement and Transplant Act of 1996\" Contains these salient featuress: (1) Establishment of the HUMAN ORGAN AND TISSUE PROCUREMENT ORGANIZATION NETWORK --- a system that will facilitate acquisition and transplantation of organs/tisues; (2) Mechanics in estabishing the HUMAN ORGAN AND TISSSUE PROCUREMENT ORGANIZATION --- this is tasked to arrange for the acquisition, preservation and allocation of doanted human organs and tissues. (3) Establishment of a task force thatwill study problem areas in this regard; and (4) Prohibits and penalizes profit marketing of human organs and tissue."

