congress_website_title = "AN ACT REDUCING THE QUANTITIES OF DANGEROUS DRUGS AS A BASIS IN THE APPLICATION OF PENALTIES, AMENDING FOR THE PURPOSE THE DANGEROUS DRUGS ACT OF 1972, AS AMENDED"
congress_website_abstract = "Proposes the following amendment to Section 20, Art. IV of the Dangerous Drugs Act of 1972: \"SEC. 20. Application of Penalties, Confiscation and Forfeiture of the Proceeds or Instruments of the Crime. - The penalties for offenses under Sections 3,4, 7, 8, and 9 of Article II and Sections 14, 14-A, 15 and 16 of Article III of this Act shall be applied if the dangerous drugs involved is in any of the following quantities: (1) [40] 20 grams or more of opium; (2) [40] 20 grams or more of morphine; (3) [200] 15 grams or more of shabu or methylamphetami ne hydrochloride; (4) [40] 20 grams or more of heroin; (5) [750] 350 grams or more of indian hemp or marijuana; (6) [50] 25 grams or more of marijuan resin or marijuan resin oil; (7) [40] 20 grrams or more of cocaine or cocaine hydrochloride; or (8) xxx.\""

