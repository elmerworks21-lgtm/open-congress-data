congress_website_title = "AN ACT DEFINING AS HEINOUS CRIME ALL ACTS OF LOOTING, STEALING FROM AND DESECRATING THE BODIES OF THE VICTIMS DURING OR IN THE AFTERMATH OF NATURAL OR MAN-MADE CALAMITIES AND ACCIDENTS, AND PRESCRIBING PENALTIES THEREFOR (dead)"
congress_website_abstract = "Declares that the CRIME OF LOOTING, STEALING from and desecrating bodies of victims of natural and man-made tragedies shall be punished by RECLUSION PERPETUA with a fine ranging from P300,000.00 to P500,000.00."
