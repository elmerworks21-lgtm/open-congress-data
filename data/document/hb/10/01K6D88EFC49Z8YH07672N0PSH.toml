congress_website_title = "AN ACT TRANSFERRING TO THE LOCAL GOVERNMENT UNITS THE MANAGEMENT ADMINISTRATION AND OPERATION OF MUNICIPAL PORTS TO THE LOCAL GOVENMENT UNITS WITHIN WHOSE TERRITORIAL JURISDICTION THE SAME ARE SITUATED REPEALING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED FIVE HUNDRED AND FIVE, AS AMENDED"
congress_website_abstract = "Rationale: \"Recent developments however point that there is a growing clamor from the local government officials that greater efficiency and productivity could be achieved if the management and operations of these ports be transferred to them. A factor for consdieration is the fact that each port and its immediate envisions offer possibilities for development if taken into consideration along that with the development thrusts of the province or municipality. In effect, the idea is that, sincethe local officials are in the best position to char the development areas and that maritime transportation is a vital cog in these efforts, they will be in a better capacity to handle the managementm, supervision and operations of these ports.\""

