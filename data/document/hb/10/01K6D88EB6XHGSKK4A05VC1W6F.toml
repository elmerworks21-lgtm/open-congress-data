congress_website_title = "AN ACT CREATING THE FOREIGN POLICY COUNCIL, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Prescribes the purposes and objectives of the proposed FOREIGN POLICY COUNCIL as follows: (1) To establish the legal basis, framework and mechanisms for the creation of the Foreign Policy Council; (2) To create and develop the Council's capability and mission as a high-level policy-coordina ting/making body, or clearing house mechanism; and (3) To provide the government with a wider range of well-crafted foreign policy options and recommendation for decision-making ."
