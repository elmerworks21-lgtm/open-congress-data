congress_website_title = "AN ACT ENJOINING ALL PERSONS WHO ARE PHYSICALLY PRESENT DURING THE PLAYING OR SINGING OF THE PHILIPPINE NATIONAL ANTHEM TO STAND ON ATTENTION, AND PROVIDING FOR PENALTY IN CASE OF A VIOLATION"
congress_website_abstract = "Seeks to enjoin all persons, except those who are incapacitated or handicapped, to stand at attention during the playing or singing of the Philippine National Anthem. Aims to develop a sense of patriotism, nationalism and love for one's country."

