congress_website_title = "AN ACT CREATING THE TEACHERS BANK OF THE PHILIPPINES, DEFINING ITS POWERS, FUNCTIONS AND OBJECTIVES"
congress_website_abstract = "Rationale: As the country prepares its human resource for active participation in the fulfillment of national development goals, it is a must that the very people who carry out this vital mission be equally prepared for the job. Incentives must be offered in order to attract the best maids to enter the teaching profession and make teaching competitive.> This bill is an attempt not only to improve the ploght of teachers but also to encourage qualified individuals to enter the teching profession.Hence, its approval is urgently and earnestly recommended. \"Charter of the Teachers Bank of the Philippines\" Provides for these areas of concern: (1) Corporate Powers and Duties; (2) Authorized Capital Stock; (3) Loans and Investments Authorized; (44) The board and Its Officials, etc."

