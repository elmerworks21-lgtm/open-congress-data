congress_website_title = "AN ACT GRANTING SEPARATION PAY OF AT LEAST ONE (1) MONTH PAY FOR EVERY YEAR OF SERVICE TO A RESIGNING EMPLOYEE WHO HAS RENDERED AT LEAST TEN (10) YEARS OF SERVICE WITH HIS EMPLOYER, AMENDING FOR THIS PURPOSE ARTICLE 285 OF THE LABOR CODE EMPLOYER AND EMPLOYEE, AMENDING FOR THE PURPOSE ARTICLE 279 OF THE LABOR CODE"
congress_website_abstract = "Rationale: This Bill seeks to provide a separation pay of at least one (1) month pay for every year of service to every resigning employee who has rendered at least ten (10) years of service with his company. Needless to state, the separation pay hereby proposed is designed as a sort of longevity compensation and award for the measure of loyalty and finally, to provide the resigning employee the imemdiate wherewithal dduring the period of separation."

