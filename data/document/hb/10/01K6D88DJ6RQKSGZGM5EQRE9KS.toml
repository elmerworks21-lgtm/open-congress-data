congress_website_title = "AN ACT DECLARING AS UNLAWFUL THE TAMPERING OF VOTES FOR ANY CANDIDATE IN AN ELECTION HELD IN ACCORDANCE WITH THE OMNIBUS ELECTION CODE AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Vests the Regional Trial Courts with exclusive jurisdiction to try and decide cases of tampering of votes as provided in this Act. Prescribes the penalty of imprisonment of three (3) to eight (8) years, in addition to disqualificatio n to hold public office and deprivation of the rights of suffrage."
