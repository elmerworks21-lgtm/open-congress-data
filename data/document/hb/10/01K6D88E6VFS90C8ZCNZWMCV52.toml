congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED 6768, ENTITLED 'AN ACT INSTITUTING A BALIKBAYAN PROGRAM'"
congress_website_abstract = "Addresses the shopping needs of the balikbayan in line with the objective encouraging oversees Filipinos to visit the Philippines. Proposes the following: (1) INCREASE in shopping privilege from [US$1,000.00] to US$2,000.00. (2) Extension of SHOPPING TIME limit from [two (2) days] to ONE (1) WEEK after date of arrival. (3) Grant of an additional US$2,000.00 shopping privilege to be availed of within one (1) year from date of arrival, and exclusively be purchase of \"Kabuhayan\" tools/equipment ."
