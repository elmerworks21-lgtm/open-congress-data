congress_website_title = "AN ACT TO AMEND CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED EIGTH HUNDRED SEVENTY SEVEN, OTHERWISE KNOWN AS THE 'PHILIPPINE NURSING LAW', AS AMENDED"
congress_website_abstract = "Rationale: \"Thus, nurses today are required to have new skills, new knowledge and new attitudes and perspectives of their work as professionals. The Nursing Law of 1953, as amended, has to be revised and updated if only to reflect the new reality ofthe nursing profession, solve the problem that beset the professionals and truly make her a part of the health care team delivering quality patient care to the various health centers and institutions in the country.\""

