congress_website_title = "AN ACT REQUIRING ALL FRANCHISE GRANTEES USING WIRES AND CABLES IN THE OPERATION OF THEIR BUSINESS WITHIN THE PHILIPPINES TO PLACE THEIR WIRE AND CABLE CONNECTIONS UNDER THE GROUND, AND PROVIDING FOR PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Provides for a FINE of P500.00 per day, starting from the first day immediately after the lapse of five (5) years, within which to place wire connections underground until the grantee has fully complied with the same in the case of franchise holdersalready operating prior to the effectivity of this Act."

