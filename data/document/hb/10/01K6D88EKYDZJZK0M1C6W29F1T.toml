congress_website_title = "AN ACT DECLARING THE PITHECOPHAGA JEFFERYI, COMMONLY KNOWN AS THE PHILIPPINE EAGLE, AS THE NATIONAL BIRD, PROVIDING FOR THE PROTECTION AND CONSERVATION THEREOF"
congress_website_abstract = "States the following --- \"Sec. 2. National Bird. - Aware of the immense aesthetic, ecological, educational, historical and scientific value to the Philippines and its eople, the Pithecophaga jefferyi commonly known as the Philippine Eagle is herebydeclared as the national bird of the Philippines.\" Provides for the PROTECTION of the national bird. Penalizes violation of this Act."

