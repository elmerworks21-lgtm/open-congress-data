congress_website_title = "AN ACT PROMOTING THE GROWTH AND DEVELOPMENT OF THE LOCAL FILM INDUSTRY, CREATING THE FILM DEVELOPMENT AND RATINGS BOARD, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Substantiates the policy of the State to foster the growth of the local film industry as a medium to the upliftment of the people's aesthetic and cultural values. Encourage the production of films that strengthen and solidify our national identity,seek to enhance the quality of life, promote positive value - formation and character - building."
