congress_website_title = "AN ACT TO GOVERN SAFEGUARD MEASURES TO BE TAKEN IN RESPONSE TO AN INCREASE IN THE IMPORTATION OF GOODS DIRECTLY RESULTING OUT OF THE OBLIGATIONS INCLUDING TARIFF CONCESSIONS UNDER THE WTO (anti-dumping)"
congress_website_abstract = "\"Safeguard Measure Act of 1996\" Provides safeguard measures to protect local industries from injury or threat of injury directly attributable to the increased importation of articles subject to the obligations including tariff consessions made underthe World Trade Organization (WTO). Provides, further for the specific agricultural commodities whose quantitative restrictions were converted into ordinary customs duties and import volumes of which have increased or the import prices of which havedecreased, as provided in the General Agreement on Tariffs and Trade (GATT) of 1994, the Agreement on Safeguards, the Agreement in Agriculture of the WTO."
