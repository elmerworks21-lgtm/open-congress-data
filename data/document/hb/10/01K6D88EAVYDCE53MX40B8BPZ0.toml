congress_website_abstract = "\"Safety Standard Act\" Declares that --- \"SECTION 2. PROHIBITION - Upon effectivity of this Act, any owner, corproate officer, aprttner or manager of a business establishment found to have caused the death or serious physical injury of any guest(s) due to negligence and/or non-compliance with safety standards shall after due to notice and hearing be sentenced to death by lethal injection.\""

