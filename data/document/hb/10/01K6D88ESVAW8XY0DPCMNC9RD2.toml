congress_website_title = "AN ACT AMENDING SECTION 30 (h) OF REPUBLIC ACT NO. 6975, OTHERWISE KNOWN AS THE DILG ACT OF 1990, BY REDUCING THE HEIGHT REQUIREMENT TO QUALIFY FOR APPOINTMENT AS OFFICER OR MEMBER OF THE PHILIPPINE NATIONAL POLICE (PNP)"
congress_website_abstract = "Rationale: The height requirement provided for under Republic Act No. 6975 for acceptance and appointment to the PNP, has long been the cause of unjust exclusion from the PNP and consequently has caused frustration of otherwise fully qualified indigenous Cordilleran applicants to the PNP , msot of whom are by nature and physical build, short and stocky. Since majority of the Cordillerans fall below the minimum height requirements provided for under Republic Act No. 6975, said law can be regarded as discriminatory towards Cordillerans and therefore unconstitutiona l since it has the effect of discriminating against a class of Filipino citizens. > Proposes, therefore, the following amendments to Section 30 of the DILG Act, RA 6975 on the genneral qualifications for appointment to the PNP: \"Must be at least one meter and [sixty-two] FIFTY-SEVEN centimeters (1.57 m) in height for male and one meter and fifty-seven FIFTY-TWO centimers (1.52 m) for female."

