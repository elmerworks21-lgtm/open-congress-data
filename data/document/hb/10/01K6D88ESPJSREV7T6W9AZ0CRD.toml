congress_website_title = "AN ACT BANNING STUDENTS IN THE PRIMARY AND SECONDARY SCHOOLS FROM ENTERING MALLS AND GAME SHOPS DURING SCHOOL DAYS"
congress_website_abstract = "Rationale: This bill intends to motivate and encourage students to devote their time for studies rather than visiting malls only for fun. This calls for a joint effort between the State and the parents in their pursuit to provide quality educationby not tolerating students to go somewhere else after attending or during classes. > Declares the following UNLAWFUL: (1) Students in the primary and secondary schools entering shopping malls for video game shops; and (2) Establishments allowing theentry of students during school days. Provides penalties for violation of this Act."
