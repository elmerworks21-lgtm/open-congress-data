congress_website_title = "AN ACT REGULATING THE OWNERSHIP AND USE OF CHAINSAW UNITS"
congress_website_abstract = "Declares it all UNLAWFUL for any person, whether natural or juridical, to own or possess chainsaw units. Exempts, however, the following for the provision: (1) Duly registered and licensed Timber License Agreement holders; (2) Orchard and fruit treefarmers; (3) Industrial tree farmers; and (4) Others who are in need of chainsaws in their occupation."
