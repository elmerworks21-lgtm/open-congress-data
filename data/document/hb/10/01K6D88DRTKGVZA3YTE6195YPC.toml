congress_website_title = "AN ACT INCREASING THE PENALTIES FOR ILLEGAL LOGGING AND PENALIZING ILLEGAL POSSESSION OF CHAINSAWS AND OTHER TREE-CUTTING IMPLEMENTS, AMENDING FOR THIS PURPOSE SECTION 68 OF PRESIDENTIAL DECREE NO. 705, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Penalizes illegal POSSESSION of logging implements with IMPRISONMENT RANGING FROM TWELVE YEARS AND ONE DAY TO FOURTEEN YEARS AND EIGHT MONTHS. Authorizes the DENR to issue licenses to possess chainsaws to LEGITIMATE logging concessionaires which shall be RENEWABLE every year."
