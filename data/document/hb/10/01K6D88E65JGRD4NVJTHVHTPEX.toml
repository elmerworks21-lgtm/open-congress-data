congress_website_abstract = "Underscores the importance of natural rubber as both a dollar0earning and a dollar-saving crop. It has a competitive edge over synthetic rubber. Addresses these concerns: (1) rahabilitation of existing rubber plantations; (2) expansion of hectarages and increasing yields through improved technology and sustained research and development."

