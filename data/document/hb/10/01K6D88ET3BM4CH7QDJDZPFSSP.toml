congress_website_title = "AN ACT STRENGTHENING THE SANGGUNIANG KABATAAN, AMENDING REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE 'LOCAL GOVERNMENT CODE OF 1991'"
congress_website_abstract = "Seeks to strengthen the Sangguniang Kabataan by EXPANDING the definition of youth to INCLUDE all persons who are from fifteen (15) to THRITY (30) years of age. Provides, likewise, the following --- \"ALL SANGGUNIANG KABATAAN MEMBERS SHALL BE ENTITLEDTO A PER DIEM OF ONE THOUSAND (P1,000.00) PESOS FOR EACH MEETING OF THE SANGGUNIANG KABATAAN ACTUALLY ATTENDED: PROVIDED, THAT, THE PER DIEM DUE TO EACH SANGGUNIANG KABATAAN MEMBER SHALL NOT EXCEED FOUR THOUSAND (P4,000.00) PESOS PER MONTH.\""

