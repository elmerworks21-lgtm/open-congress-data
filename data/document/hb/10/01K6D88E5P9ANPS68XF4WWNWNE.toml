congress_website_abstract = "States that - \"SEC. 2. An owner/mortgagor of a residential property which has been judicially or extrajudicially foreclosed, and the period of redemption has already expires, shall enjoy the preferential right to buy back or redeem the property before it can be offered for sale to a third party.\""

