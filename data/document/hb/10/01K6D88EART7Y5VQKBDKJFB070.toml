congress_website_title = "AN ACT ORDAINING INSTITUTIONAL RESPONSIBILITY IN GIVING TESTIMONY IN DANGEROUS DRUGS CASES UNDER REPUBLIC ACT NO. 6425, AS AMENDED, PROVIDING PENALTIES FOR VIOLATIONS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Penalizes the public employees who refuses or fails to give testimony in dangerous drugs cases with a P10,000.00 to P20,000.00 fine, or imprisonment of one (1) to two (2) years. Prescribes, likewise, penalty for the immediate superior of said employees."

