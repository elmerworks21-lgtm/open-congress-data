congress_website_title = "AN ACT STRENGTHENING FURTHER THE RIGHT OF SECURITY OF TENURE OF WORKERS BY RESTRICTING FIXED PERIOD OR TERM EMPLOYMENT IN WORK ACTIVITIES WHICH ARE USUALLY NECESSARY OR DESIRABLE IN THE USUAL BUSINESS OR TRADE OF THE EMPLOYER, FOR THE PURPOSE ARTICLE 280 OF THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Declares the following --- \"ANY STIPULATION IN ANY WRITTEN OR ORAL CONTRACT OF EMPLOYMENT FOR A DEFINITE OR FIXED PERIOD, TERM OR SIMILAR FORMS COVERING REGULAR EMPLOYMENT AS DEFINED UNDER THIS TITLE SHALL, EXCEPT IN CASES ALLOWED IN THIS ARTICLE, BE NULL AND VOID AB INITIO, WITHOUT PREJUDICE HOWEVER TO THE RIGHT OF THE EMPLOYEE TO FILE CLAIMS FOR DAMAGES ARISING FROM THE CONTRACT. >\"NOTHING IN THE PROVISIONS OF THIS ARTICLE SHALL PRECLUDE SCHOOLS AND UNIVERSITIES FROM ENGAGING THE SERVICES OFEPRSONS UDNER EMPLOYMENT CONTRACTS WITH A TERM OR FFOR A DEFINITE OR FIXED PERIOD INVOLVING TEACHING POSITIONS DURING THE PROBATIONARY PERIOD OF SUCH EMPLOYMENT AS AUTHORIZED UNDER EXISTING LAWS, RULES, AND REGULATIONS.\""

