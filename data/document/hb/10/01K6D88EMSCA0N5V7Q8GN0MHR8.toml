congress_website_title = "AN ACT ALLOWING FILIPINO CITIZENS RESIDING OR WORKING ABROAD TO EXERCISE THEIR RIGHT OF SUFFRAGE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Absentte Voting Act of 1997\" Rationale: There are about 6 million Filipinos working or residing abroad. They are considered one of the top dollar earners. They deserve to be given a voice in determining the leaders who shall shape and steer the nation's future, including policies and programs tht will affect them. > Provides for these areas of concern: (1) Absentee Voting Rights, Scope; (2) Application and Registration of Voters; (3) Report and Transmission of Ballots; (4) Canvass of Absentee Votes; etc. > Covers the following --- (1) Overseas contract workers employed in foreign countries and their Filipino dependents who are living with them; (2) Employees of the Philippine government assigned in foreign countries, and their Filipinoo spouses and dependents who are living with them; and (3) Filipino citizens who are legal immigrants or temporary residents of foreign countries, and their Filipino spouses and dependents who are living with them."
