congress_website_title = "AN ACT TO ESTABLISH A SYSTEM OF NATIONAL FOOD SECURITY RESERVATIONS IN THE PHILIPPINES, ESTABLISH THEIR IMPLEMENTING MECHANISMS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Food Security Reservations Act of 1997\" Declares that the State recognizes the fundamental right of the Filipino people to be secure from threats to their food supplies, their collective capacities to produce fodd, and to their freedom toacquire sustenance. >The State shall protect and reserve for primary use for food production, all lands and fishing areas. The State shall protect and promote the establishment of services and infrastructure that support agriculture and the environments that sustain agricultural productivity."

