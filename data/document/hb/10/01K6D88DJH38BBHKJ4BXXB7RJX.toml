congress_website_title = "AN ACT PROVIDING FOR THE NATIONAL CONSULTANCY ACT, DEFINING THE SCOPE OF CONSULTING SERVICES, REGULATING THE HIRING OF CONSULTANTS IN GOVERNMENT OFFICES, PRESCRIBING PENALTIES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Consultancy Act of 1995\" Defines terms under this proposed measure. Seeks to regulate and establish uniform guidelines for the hiring of consultants for infrastructure and other government projects. Limits participation to Filipino consultants and states the instances when foreign consultants may be hired. Provides for: (1) accreditation and selection of consultants; (2) financing and cost of consultancy; and (3) independence of consultancy services."

