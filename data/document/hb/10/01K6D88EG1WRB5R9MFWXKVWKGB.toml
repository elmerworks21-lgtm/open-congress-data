congress_website_title = "AN ACT PROVIDING FOR THE MODERNIZATION OF THE PHILIPPINE NATIONAL POLICE AND FOR OTHER PURPOSES"
congress_website_abstract = "Substantiates the State policy to establish a highly efficient and computed police force which is national in scope and civilian in character. The MODERNIZATION PROGRAM proposed in this measure shall have thse THRUSTS: The development of --- (1) Anefficient and credible police force based on the pro-active, community-orien ted policing system; a manpower and career development program to professionalize the PNP; and a responsive police organizational structure; (2) Reforms in the management ofhuman andd material resources; (3) Appropriates police doctrines, as well as the evolution and application of the same; and (4) Acquisition and upgrading of appopriate police equipment and tecchnology; improvement and construction of police headquarrters and other facilities."
