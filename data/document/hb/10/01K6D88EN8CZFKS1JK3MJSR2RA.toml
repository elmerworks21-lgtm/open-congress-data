congress_website_title = "AN ACT ABOLISHING THE PRESIDENTIAL COMMISSION ON GOOD GOVERNMENT (PCGG) AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Former President Corazon c. Aquino, through Executive Order No. 1, created the Presidential Commission on Good Government (PCGG) is tasked to recover ill-gotten wealth accumulated by some of our public officials and to return the same toits rightful owners - the filipino people. With this mandate, PCGG was granted legal immunity. Agents of PCGG could not be asked to testify or required to produce evidence in any judicial, legislative or administrative proceedings concerning its official actions. > Despite this awesome mandate, the performance record of the PCGG leaves much to be desired. Many of its commissioners or agents were involved in graft and corruption and many of its cases in courts are dismissed or lost because of ppoor investigation and documentation. <Requires the devolution of the PCGG powers and functions of investigation and prosecution upon the Office of the Department of Justice (DOJ)."

