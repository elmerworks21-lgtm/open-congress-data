congress_website_title = "AN ACT GRANTING CASH INCENTIVES TO FILIPINO ATHLETES WINNING GOLD, SILVER AND BRONZE MEDALS IN THE OFFICIAL WORLD OLYMPICS, SOUTHEAST ASIAN (SEA), ASIAN GAMES AND OTHER WORLD CHAMPIONSHIP COMPETITIONS, AND APPROPRIATING FUNDS THEREOF"
congress_website_abstract = "Rattionale: \"By bagging medals in international sport competitions, Filipino athletes bring honor and prestige to our country. In recognition of this worthy contribution and building the country's image to an advantage, we would like to be able to continue to inspire more our Filipino athletes to excel in their field of endeavor by giving them the rewards they truly deserve.\""
