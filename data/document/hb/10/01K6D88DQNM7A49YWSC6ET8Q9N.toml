congress_website_title = "AN ACT TO PROHIBIT AND PENALIZE CELLULAR PHONE CLONING AND OTHER SIMILAR FRAUDULENT SCHEMES OF ACQUIRING ILLEGAL CELLULAR PHONE SERVICE"
congress_website_abstract = "\"The Cellular Phone Anti-Cloning Act\" Defines the term \"cloning\" as a technical process of tampering or manipulating any part or device of any cellular phone unit by using or employing any electronic devices, computers, its combination or other equipment of similar nature in order to access and program the Electronic Serial Number (ESN) and the Mobile Serial NUmber (MSN), the unique identification numbers electronically programmed into a microchip of the cellular phone units, of a duly registered cellular phone unit into another cellular phone unit, without the authorization or approval of a cellular phone service provider."
