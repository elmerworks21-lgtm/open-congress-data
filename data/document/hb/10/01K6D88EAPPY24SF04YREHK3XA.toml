congress_website_title = "AN ACT PRESCRIBING THE PROCEDURE FOR THE EXPEDITIOUS HOLDING OF SPECIAL ELECTION IN CASE OF VACANCY IN THE CONGRESS OF THE PHILIPPINES, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-SIX HUNDRED AND FORTY-FIVE, ENTITLED 'AN ACT PRESCRIBING THEMANNER OF FILLING A VACANCY IN THE CONGRESS OF THE PHILIPPINES'"
congress_website_abstract = "Provides for the holding of SPECIAL ELECTION, in case of VACANCY - the Senate, which shall be held SIMULTANEOUSLY with the next succeeding regular election for the Members of Congress. In the case of the House of Representatives , A MAJORITY VOTE OFCOMELEC MEMBERS SITTING EN BANC shall [fix] PASS A RESOLUTION SETTING the date of the special election FOR MEMBERS OF THE HOUSE OF REPRESENTATIVES ."
