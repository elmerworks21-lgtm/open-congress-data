congress_website_title = "AN ACT MANDATING THE CREATION OF WOMEN AND CHILDREN PROTECTION UNITS (WCPU) IN ALL HOSPITALS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The UN Declaration state that \"violence against women and children both vioaltes and impairs the enjoyment by women and chidlren of human rights and fundamental freedoms.\" It further believes tht all forms of violence, especcially thoseinflicted on vulnerable groups, are an affront to the dignity of the human person and thus, must, be eliminated. Seeks to provide a specific area for crisis interventions and comprehensive programs to ensure round-the-clock and continued care and concern for women and children victims and survivors of violence."

