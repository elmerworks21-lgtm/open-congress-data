congress_website_title = "AN ACT STRENGTHENING POLICE SUPERVISION OVER THE OPERATION OF PRIVATE DETECTIVE, WATCHMAN OR SECURITY GUARD AGENCIES, AMENDING FOR THE PURPOSE 'THE PRIVATE SECURITY AGENCY LAW'"
congress_website_abstract = "Mandates the Philippine National Police to excercise general supervision over the operation of all private detective, COMPANY GUARD FORCES OF PRIVATE FIRMS AND GOVERNMENT ENTITIES, AND THE SECURITY TRAINING INSTITUTIONS. Establishes, therefore, theSECURITY GUARDS AND AGENCIES SUPERVISORY UNIT (SGASU) within the PNP."
