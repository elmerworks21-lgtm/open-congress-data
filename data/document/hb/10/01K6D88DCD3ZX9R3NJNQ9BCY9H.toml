congress_website_title = "AN ACT PRESCRIBING URGENT RELATED MEASURES TO EFFECTIVELY CARRY OUT AGRICULTURAL DEVELOPMENT IN THE COUNTRYSIDE TO ADDRESS THE IMPLICATIONS OF THE GENERAL AGREEMENT ON TARIFFS AND TRADE ON THE ECONOMY THROUGH THE ACCELERATION OF THE INTEGRATED IRRIGATION PROGRAM, AND FOR OTHER PURPOSES (crisis)"
congress_website_abstract = "\"Irrigation Crisis Act of 1995\" Addresses agricultural development in the light of the implication of the General Agreement on Tariffs and Trade; declares that the State shall institutionaliz e cooperative linkages between the National Irrigation Administration (NIA) and small farmers organizations. States that the President may enter into negotiated contracts for the construction repair, rehabilitation, improvement or maintenance of irrigation projects and facilities. Provides the requirementsto be met for said negotiated contracts; authorizes, likewise, the Secretary of Agriculture to enter into negotiated contracts for projects costing below P50 Million pesos."
