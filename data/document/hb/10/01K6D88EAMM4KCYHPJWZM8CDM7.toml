congress_website_title = "AN ACT TO MOBILIZE NATIONWIDE SAVINGS BY STRENGTHENING THE ORGANIZATION AND OPERATIONS OF THE PHILIPPINE POSTAL SAVINGS BANK AND FOR OTHER PURPOSES"
congress_website_abstract = "Directs the PHILIPPINE POSTAL SAVINGS BANK (postal bank) to establish banking presence in all congressional districts, and in all cities and municipalities. Mandates. likewise, the Postal Bank to adopt the best features on savings generation and alternative credit delivery systems."
