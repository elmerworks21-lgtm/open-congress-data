congress_website_title = "AN ACT PROHIBITING THE CONTRACTING OUT OF JOBS AND ACTIVITIES WHICH ARE NECESSARY OR USUAL IN THE BUSINESS OR TRADE OF THE EMPLOYEE, AMENDING FOR THE PURPOSE ARTICLE 106 OF PD 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Provides for the following PERMISSIBLE labor contracting activities: (1) services NOT DIRECTLY related to or NOT INTEGRAL to the PRINCIPAL business of an enterprise; (2) SPECIALIZED works in certain industries; (c) services TEMPORARILY needed to meet ABNORMAL increase in the demand of products or services; Declares unlawful certain labor contracting activities and penalizes any person found violating the provisions of this Act."
