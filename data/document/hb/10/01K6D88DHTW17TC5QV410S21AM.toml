congress_website_title = "AN ACT INSTITUTING ELECTORAL REFORMS BY ALLOWING VOTING OUTSIDE OF ONE'S PLACE OF REGISTRATION, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7166, ENTITLED \"AN ACT PROVIDING FOR SYNCHRONIZED NATIONAL AND LOCAL ELECTIONS AND FOR ELECTORAL REFORMS, AUTHORIZING APPROPRIATIONS THEREFOR, AND FOR OTHER PURPOSES\""
congress_website_abstract = "Proposes to add a NEW section to RA 7166, which shall read as follows: \"SECTION 12-A. ALLOWING A VOTER TO VOTE OUTSIDE OF THE PLACE WHERE HE IS REGISTERED - A REGISTERED VOTER WHO, ON ELECTION DAY, IS NOT ABLE TO VOTE IN THE PLACE WHERE HE IS REGISTERED BECAUSE OF HIS WORK OR STUDY, SHALL BE ALLOWED TO VOTE FOR NATIONAL AND LOCAL OFFICIALS IN THE PLACE WHERE HE WORKS OR STUDIES; PROVIDED, THAT IN CASE OF LOCAL OFFICIALS ATO BE VOTED UPON, SAID REGISTERED VOTER SHALL VOTE FOR THE CANDIDATES OF HIS PLACE OF REGISTRATION.\""

