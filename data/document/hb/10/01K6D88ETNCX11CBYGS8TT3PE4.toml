congress_website_title = "AN ACT PROVIDING FOR THE PROCEDURE FOR AMENDMENTS TO THE CONSTITUTION THROUGH PEOPLE'S INITIATIVE , AMENDING FOR THE PURPOSE THE INITIATIVE AND REFERENDUM ACT"
congress_website_abstract = "Provides for these areas of concern: (1) Requirements in filing a petition for initiative; (2) Manner of initiating amendments to the Constitution through a people's initiative; (3) Appeal of the decision; (4) conduct and date of plebiscite; and (5)Effectivity of the amendment."
