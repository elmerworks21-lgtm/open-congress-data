congress_website_title = "AN ACT REQUIRING ALL BANKING INSTITUTIONS TO CONDUCT BACKGROUND INVESTIGATION ON THE FINANCIAL CAPACITY OF AN APPLICANT FOR A CHECKING ACCOUNT, AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Rationale: It is noted that many cases involving bouncing checks now clogged the docket of our courts. This might be due to the indiscriminate issuance of checking accounts by banks to their clients who do not have the financial capacity to exercise the privilege. Seeks, therefore, to require all banking institutions to conduct background investigation on the financial capacity of an individual intending to open a checking account."

