congress_website_title = "AN ACT MAKING APPLICABLE TO PROSECUTORS IN THE NATIONAL PROSECUTION SERVICE OF THE DEPARTMENT OF JUSTICE THE RETIREMENT BENEFITS UNDER REPUBLIC ACT NO. 910, AS AMENDED"
congress_website_abstract = "Extends to the prosecutors in the National Prosecution Service of the Department of Justice the retirement benefits provided in RA 910, provided that the retirement age for prosecutors shall remain at sixty-five years. Provides that the applicant shall have attained the age o sixty-years and has rendered at least twenty (20) years of service in the Government, the last five (5) of which shall gave been continously rendered in the prosecution service."

