congress_website_title = "AN ACT AMENDING SECTION 443, CHAPTER 2, BOOK III OF THE LOCAL GOVERNMENT CODE OF 1991 TO INCLUDE THE POSITION OF THE MUNICIPAL SOCIAL WELFARE AND DEVELOPMENT OFFICER MANDATORY AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: From all indications, the position of MUNICIPAL SOCIAL WELFARE AND DEVELOPMENT OFFICER (MSWDO) should be co-opted with the other mandatory positions in the organizational structure of the municipal government. Relegating it to an optionalposition is short of leaving out where credit is due, more so now that among government's focus is in the institutionaliz ation of its anti-poverty program, social reform agenda and the human development where the Municipal Social Welfare Development Officer's role is essential."

