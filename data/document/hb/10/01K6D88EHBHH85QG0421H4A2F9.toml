congress_website_title = "AN ACT TO RATIONALIZE THE SCHOLARSHIP PROGRAM OF THE GOVERNMENT BY INCREASING THE ANNUAL INCOME REQUIREMENT OF FAMILIES FROM THIRTY-SIX THOUSAND PESOS TO SIXTY THOUSAND PESOS"
congress_website_abstract = "Rationale: It is a part of the guidelines that the applicants for the schoalrship program will be subjected to a rigid screening process. The purpose is to determine the applicant's mental aptitude and academic potentials. This has the end objective of determining the best qualifier to obtain a college education at no cost to the scholar or his family. This bill intends to increase the required annual incime of the applicant's family from Thirty Six Thousandd Pesos (P36,000.00) to Sixty Thousand Pesos (P60,000.00). To maintain it at P36,000.00 is already unthinkable, considering the inflationary times and fluctuating value of the peso."

