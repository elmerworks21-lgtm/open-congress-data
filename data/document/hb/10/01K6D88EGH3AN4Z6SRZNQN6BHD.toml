congress_website_title = "AN ACT PROHIBITING EMPLOYERS FROM REQUIRING JOB APPLICANTS TO PAY FEES OR BUY OR SELL PRODUCTS, AND PRESCRIBING PENALTIES THEREOF"
congress_website_abstract = "Rationale: Employment is a problem that badly affects our countryment, that they are willing to do anything to land a decent job. Many of those who apply have fallen prey to the unscrupulous ways of ilelgal recruiters. Our desperate countrymen sometimes pay a high placement fee sourced from their life savings or even from loans or proceeds of the sale of their homes only to find disappointment after they are sent abroad without the promised job or after the recruiter absconds with their money.Declares it UNLAWFUL for anyone offering employment to require job applicants to do the following: (1) Pay fees to defray the cost of seminars, processing, examiantions or any similar expense. (2) Sell products without receiving the regular commissiion. (3) Buy products of the employer."

