congress_website_title = "AN ACT PROVIDING INCENTIVES FOR COMPANIES WITHIN SPECIAL ECONOMIC ZONES TO JOINTLY ESTABLISH COOPERATIVE GENERAL HOSPITALS OR INDUSTRIAL CLINICS FOR THE HEALTH AND SAFETY OF WORKERS AND THEIR FAMILIES WITHIN SUCH ZONES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Ecozone Hospitals Incentives Act of 1996\" Mandates that all employers located in a declared special economic zone shall, in cooperation with workers organizations and government agencies, establish an emergency general hospital or industrial clinicwhich shall render exclusive medical, dental and occupational health and safety services for workers and their families, as well as all resident within the economic zone. Provides incentives and tax exemption privileges to such companies who shall cooperate in the establishment of said cooperative general hospital."

