congress_website_title = "AN ACT TO AMEND SECTION 64 OF BATAS PAMBANSA BILANG 68, OTHERWISE KNOWN AS THE CORPORATION CODE OF THE PHILIPPINES (RE: ISSUANCE OF STOCK CERTIFICATES)"
congress_website_abstract = "Rationale: Article 175 of the National Internal Revenue Code imposes a STamp Tax on every original issue of certificates of stock by any association, company or corporation at the rate pf Two Pesos (P2.00) on each Two Hundred Pesos (P200.00) or fractional part thereof the par value for such certificates. > The above provision, however, has been rendered ineffective and without force by a related provision in the Corporation Code of the Philippines, specifically, Section 64 thereof which provides that no certificate of stock shall be issued to a subscriber until the full amount of his subscription, together with interest and expenses (in case of delinquent shares) if any is due, has been paid. > With their subscriptions not being fully paidd for, no certificates of stock covering the same can be issued. As a consequence thereof, no documentary stamp tax can be imposed to the detriment of the tax collection effort of the government.> Seeks, therefore, to remedy the situation with the fo"

