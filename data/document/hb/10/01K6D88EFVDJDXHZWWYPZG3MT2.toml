congress_website_title = "AN ACT REQUIRING PHILIPPINE EMBASSIES AND CONSULATES TO CONDUCT CLASSES FOR CHILDREN OF FILIPINOS IN OTHER COUNTRIES, TO EDUCATE THEM ON PHILIPPINE HISTORY, CULTURE, LANGUAGES AND CIVICS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Mandates the following --- \"SECTION 1. All Philippine Embassies and Consualtes, particularly in countries where there are many Filipino expatriates, are hereby required to conduct special classes, free of charge, during Saturdays for the chidlren ofFilipino parentage, to educate them on Philippine history, languages, culture and civics."

