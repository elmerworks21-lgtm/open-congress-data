congress_website_title = "AN ACT TO ADOPT A REVISED GOVERNMENT AUDITING CODE OF THE PHILIPPINES REVISING PRESIDENTIAL DECREE NO. 1445, AS AMENDED BY EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS 'THE GOVERNMENT AUDITING CODE OF THE PHILIPPINES'"
congress_website_abstract = "\"Government Auditing Code of 1995\" Aims to --- (1) Remove statutory hindrances to the complete implementation of an engagement or team approach audit; (2) Disengage COA from non-audit functions to enable it to concentrate more on revenue, performance and fraud audits; (3) Provide COA Auditors access to vital documents in the custody of government agencies deemed necessary for audit purposes; (4) Grant to COA the authority to restructure its organization and functions; (5) Enhance accountabilityof public funds and property of goernment officers; (6) Impose penal sanctions for obstructing COA's audit and exercise of jurisdiction; (7) Operationalize the collegial concept of COA leadership unde the Constitution; and (8) Amend requirements orprovisions which are mere procedural detail impractical, unreasonable, or outmoded."

