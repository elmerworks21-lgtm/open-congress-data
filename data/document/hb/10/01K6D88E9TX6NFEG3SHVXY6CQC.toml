congress_website_title = "AN ACT REPLACING QUANTITATIVE IMPORT RESTRICTIONS (QRs) ON AGRICULTURAL PRODUCTS, EXCEPT RICE, WITH TARIFFS, CREATING THE AGRICULTURAL PROTECTION TARRIFICATION FUND, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Declares that \"non-tariff restrictions in general and quantitative import restrictions in particular are INEFFICIENT measures of promoting agricultural production...\"; ADOPTS THE USE OF TARIFFS in lieu of non-tariff restrictions to protect local producers of agricultural products, EXCEPT RICE...;Declare s the policy of the State to apply ANTI-DUMPING and COUNTERVAILING measures to protect local producers from unfair trade practices...;Ai ms to improve productivity by providing the necessary support services...;Cre ates the Agricultural Protection Tariffication Fund which shall be sourced from the proceeds of importation of the Minimum Access Volumes (MAV) of agricultural products."
