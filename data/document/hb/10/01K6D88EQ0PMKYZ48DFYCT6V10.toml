congress_website_title = "AN ACT AMENDING THE SANGGUNIANG KABATAAN PROVISIONS IN REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It cannot be denied that the SK is now a formidable force to reckon with. It has steered the youth to participate actively in local governance and commit themselved to the political growth of the country. > The Sangguniang Kabataan is a good training ground for the young people who will, eventually, take over the reins of governance fron their elders. Thus, it need to be strengthened for better and more efficient and effectively delivery of services to the young populace. \"The Sangguniang kabataan Reform Law of 1997\" Similar to HB 9174."

