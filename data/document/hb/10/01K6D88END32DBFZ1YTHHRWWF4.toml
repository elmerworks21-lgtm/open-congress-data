congress_website_title = "AN ACT TO INSTITUTIONALIZ E THE STATE POLICY ON FOOD SECURITY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: \"The State hereby declares that the attaintment of food security at all times is an essential component of times is an essential component of national security and a critical element for thee attainment of national development.\" \"Food Security Act of 1996\" Creates the NATIONAL FOOD SECURITY COUNCIL which is tasked to --- (1) ensure steady production of various food commodities to cope with the demands of a growing population; (2) promote the reengineering and improvement of the country's irrigation system; and (3) reorient the country's food production policies, places and programs."

