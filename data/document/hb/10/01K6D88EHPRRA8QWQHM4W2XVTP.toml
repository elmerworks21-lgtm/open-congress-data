congress_website_title = "AN ACT INCREASING THE CASH GIFT TO FIVE THOUSAND PESOS (P5,000.00), AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED SIX THOUSAND SIX HUNDRED EIGHTY SIX, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes the following amendments to RA 6686 - \"SEC. 1. All officials andd employees of the National Government who have rendered at least four months of service from January 1 to October 31 of each year and who are employed in the government service as of October 31 of the same year shall each receive a Christmas bonus equivalent to one month basic salary andd addditional cash gift of [One] FIVE thousandd pesos [(P,000.00)] (P5,000.00).\" \"SEC. 2. Officials and employees of the National Government who have rendered less than four months of service from January 1 to October 31 of each year and who are employed in the government service as of October 31 of the same shall be entitled solely to thee following cash gift. 3 months but less than4 months P[400.00] 2,000.00; 2 months but less than 3 months [300.00] 1,500.00; 1 month but less than 2 months [200.00] 1,000.00; Less than one month [100.00] 500.00\""
