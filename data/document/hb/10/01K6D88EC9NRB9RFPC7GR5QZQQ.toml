congress_website_title = "AN ACT PROVIDING THAT BANKS SHALL INDEMNIFY INNOCENT BYSTANDERS AND BANK CLIENTS WHO SUFFER INJURY, DEATH OR DAMAGE IN THE COURSE OF AND AS A RESULT OF BANK HOLD-UPS AND ROBBERIES WITHIN AND IN THE VICINITY OF BANK PREMISES"
congress_website_abstract = "Prescribes the following types of indemnity got said victims: (1) In case of death, a one-time lump sum payment of P20,000 for each victim to be paid to his heirs; (2) In case of injury, a medical treatment assistance of P5,000 for less serious physical injury and P10,000 for serious physical injuries. (3) In case of loss or damage to personal property, an amount equal to the damage or loss but not more than P10,000 in any instance."

