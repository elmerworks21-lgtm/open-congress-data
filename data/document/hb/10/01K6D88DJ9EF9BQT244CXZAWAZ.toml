congress_website_title = "AN ACT REVISING THE COVERAGE OF THE EXPANDED VALUE-ADDED TAX LAW, AMENDING FOR THE PURPOSE THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "Seeks to EXEMPT the following goods or proeprties from coverage of the VAT: (1) real properties held for sale to customers or held for lease: (2) the right or privilege to use patent, copyright, design, plan, trademark, tradebrand; (3) the right orprivilege to use in the Phil. any industrial, commercial or scientific equipment, as well as NON-ELECTRIC COOPERATIVES under RA 6938. States that the PRINTING, PUBLICATION, IMPORTATION AND SALE OF BOOKS, NEWSPAPERS, MAGAZINES, OR BULLETINS shall be subject to zero rate."
