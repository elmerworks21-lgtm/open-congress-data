congress_website_title = "AN ACT PROVIDING FOR CANVASSING OF ELECTION RETURNS IN LIEU OF CERTIFICATES OF CANVASS, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SEVENTY-ONE HUNDRED AND SIXTY-SIX"
congress_website_abstract = "Rationale: The right of suffrage is one of the most fundamental rights of each citizen. In this regard, the government must ensure that the electoral process is conducted freely, honestly and credibly. Proposes that the ELECTION RETURNS be used inthe canvassing of votes, instead of the certificates of canvass."
