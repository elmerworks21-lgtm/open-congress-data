congress_website_title = "AN ACT PROVIDING FOR SURVIVORSHIP BENEFIT TO THE SPOUSE OF A DECEASED CONSTITUTIONAL OFFICIAL, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the following --- \"SECTION 1. In the event a retired constitutional official mentioned in Section 2, Article XI of the Constitution, appointed before or after ratification thereof, then receiving or entitled to receive a lifetime pension from the Government, dies after said ratification, the surviving spouse of the saud retiree shall receive every month thereafter survivorship benefits equivalent to one-half (50%) of the monthly pension of the deceased, except in case of civil status change; and provided, that said benefits shall not accrue monthly prior to the effectivity of this Act.\""

