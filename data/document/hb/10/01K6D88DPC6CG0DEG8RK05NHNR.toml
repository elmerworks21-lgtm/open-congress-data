congress_website_title = "AN ACT REQUIRING THE DEPARTMENT OF ENVIRONMENT AND NATURAL RESOURCES TO EMPLOY QUALIFIED REBEL RETURNEES AS FOREST GUARDS IN EVERY FORESTATION PROJECTS"
congress_website_abstract = "\"Rebel Returnee Act of National Reconciliation of 1993\" Requires the Department of Environment and Natural Resources to employ all qualified rebel returnees as forest guards provided that these rebel returnees have undergone and passed psychiatric and health tests and submitted clearance from appropriate agencies that they have availed of the general amnesty program of the government."

