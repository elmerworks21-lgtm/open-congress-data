congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC ADJUSTMENT OF THE PENSION BENEFITS OF RETIRED PERSONNEL OF THE PHILIPPINE NATIONAL POLICE, AMENDING FOR THE PURPOSE \"THE DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990,\" AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The police retirement system is glaringly unfair to its beneficiaries. The Armed Forces of the Philippines retirement system, to which the police retirement system was patterned, provides for adjustment of the retirement pay on the prevailing scale of basic pay of the military personnel in active service. Nowhere in the police retirement system is such provision found. > Seeks to correct the foregoing inequity by proposing the following amendment to the Local Government Code providion on retirement benefits of PNP personnel: \"SEC. 75. X X X PROVIDED, THAT SUCH RETIREMENT PAY SHALL BE SUBJECT TO ADJUSTMENT BASED ON THE PREVAILING SCALE OF BASE PAY OF POLICE PERSONNEL IN THE ACTIVE SERVICE.\""

