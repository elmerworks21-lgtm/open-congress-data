congress_website_title = "AN ACT AMENDING ARTICLE SIXTY-SIX OF THE CIVIL CODE OF THE PHILIPPINES IN ORDER TO PRESCRIBE ADDITIONAL REQUIREMENTS FOR MALE CITIZENS AND SUBJECTS OF A FOREIGN COUNTRY DESIRING TO MARRY A FILIPINO WOMAN"
congress_website_abstract = "Provides that WHEN ONE OF THE CONTRACTING PARTIES IS A MALE CITIZEN AND SUBJECT OF A FOREIGN COUNTRY DESIRING TO MARRY A FEMALE CITIZEN OF THE PHILIPPINES, IN ADDITION TO THE CERTIFICATE OF LEGAL CAPACITY, THE FOREIGN SUBJECT OR CITIZEN SHALL PROVIDE HIMSELF WITH A CERTIFICATE OF GOOD MORAL CHARACTER; AND PROVIDED, FURTHER, THAT SUCH FOREIGN SUBJECT SHALL SUBMIT A CERTIFICATE THAT HE HAS A GAINFUL TRADE, BUSINESS OR EMPLOYMENT, TO BE ISSUED BY HIS DIPLOMATIC OR CONSULAR OFFICIAL, BEFORE A MARRIAGE LICENSE CAN BE OBTAINED."

