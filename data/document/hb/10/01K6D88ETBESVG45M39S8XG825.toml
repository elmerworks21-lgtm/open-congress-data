congress_website_title = "AN ACT REQUIRING ALL PUBLIC AND PRIVATE SCHOOLS TO CONDUCT A YEARLY DRUG TEST ON THEIR STUDENTS IN THE SECONDARY AND TERTIARY LEVELS AS A PREREQUISITE FOR ENROLLMENT AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Rationale: Several measures have been adopted and passed and stiff penalties and sanctions imposed on illegal drug offenders, but still they seem to be inadequate to prevent drug abuse. With the proposed bill every student would have second thoughts before using illegal drugs. With this measure, there is created a fear of detection or discovery if they will be required to udnergo drug test before they are admitted to the schools. > Provides for the following --- \"SEC. 2. Any student who shallfail the drug tests required by this Act or who willfully or without justifiable cause refuses to undergo the required drug test shall not be admitted to the school until he complies with the requirement under this Act.\""

