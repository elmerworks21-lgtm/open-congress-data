congress_website_title = "AN ACT FURTHER AMENDING CERTAIN SECTIONS OF PRESIDENTIAL DECREE NUMBERED TWELVE HUNDRED AND SIXTEEN, OTHERWISE KNOWN AS 'DEFINING OPEN SPACE IN RESIDENTIAL SUBDIVISIONS AND AMENDING SECTION 31 OF PRESIDENTIAL DECREE NO. 957 REQUIRING SUBDIVISION OWNERS TO PROVIDE ROADS, ALLEYS SIDEWALKS AND RESERVE OPEN FOR PARKS OR RECREATIONAL USE,' AND FOR OTHER PURPOSES"
congress_website_abstract = "Recognizes the need for the State to intervene in the provision of roads, alleys, sidewalks and open spaces with the emergence of a \"property boom\", as well as the need to identify who shall bear the cost and maintenance of said facilities. Proposesto turn over said facilities and infrastructure to homeowners' associations."
