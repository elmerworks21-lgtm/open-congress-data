congress_website_title = "AN ACT ESTABLISHING NATIONAL CEMETERIES AND PROVIDING FOR THEIR ADMINISTRATION AND MAINTENANCE"
congress_website_abstract = "Provides for the establishment of at least one national cemetery in each region and major island in the country to serve as a memorial and final resting place for veterans, military personnel and citizens who have rendered distinguished service to the nation. Provides, further, the administration, maintenance and security of national cemeteries shall be under the jurisdiction of the Philippine Veterans Affairs Office (PVAO)>"

