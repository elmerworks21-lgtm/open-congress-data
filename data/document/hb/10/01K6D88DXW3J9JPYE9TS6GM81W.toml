congress_website_title = "AN ACT STRENGTHENING THE SECURITY OF TENURE OF AN EMPLOYEE BY MAKING ABSOLUTE THE LIMITATION OF THE PROBATIONARY PERIOD, AMENDING FOR THIS PURPOSE ARTICLE 281 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to provide a PROBATIONARY PERIOD of not more than six (6) months in all cases. This would put an end to the malpractice of employeed of securing the agreement of probationary workers for a longer probation period."
