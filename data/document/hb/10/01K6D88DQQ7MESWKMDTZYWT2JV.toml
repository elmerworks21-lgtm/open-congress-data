congress_website_title = "AN ACT MANDATING THE COMPULSORY INCLUSION OF A COURSE ON ELECTION LAW AND THE PRINCIPLES OF DEMOCRACY AND GOOD GOVERNMENT IN THE CURRICULA OF ALL SCHOOLS IN ALL LEVELS OF THE EDUCATIONAL SYSTEM OF THE PHILIPPINES"
congress_website_abstract = "Requires the integration of a mandatory course on election law and the principles of democracy and good government in the curricula of all schools in all levels of the educational system in order to instill in the youths the consciousness and discipline necessary towards the effective and meaningful exercise of suffrage."

