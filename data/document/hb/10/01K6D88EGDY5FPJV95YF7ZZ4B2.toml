congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF THE PHILIPPINE EMERGENCY MEDICAL SERVICES SYSTEM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Preparedness is the key to minimizing or preventing the damaging effects of any emergency or disaster. The organization and training of emergency response teams within the community is an important component of preparedness. This Act shall have the following objectives: (1) Organize volunteer emergency medical response teams in every municipality all over the country; (2) Train memebers of the emergency medical response teams on first aid, basic life support and other emergency procedures; (3) Establish a fully equipped and functional Medical Emergency and Disaster Management Operations and Coordinating Center to be known as Rescue 2000 Center to facilitate immediate and effective emergency response; and (4) Establish a networkk with all government and non -government organizations/g roups with emergency medical response capabilities."

