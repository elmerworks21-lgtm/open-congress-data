congress_website_title = "AN ACT WIDENING THE COVERAGE OF THE SANGGUNIANG KABATAAN, BY LOWERING THE MINIMUM AND INCREASING THE MAXIMUM AGE REQUIREMENTS FOR MEMBERSHIP THEREIN, AMENDING FOR THAT PURPOSE SECTIONS 423 (b), 424 AND 428 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE 'LOCAL GOVERNMENT CODE OF 1991'"
