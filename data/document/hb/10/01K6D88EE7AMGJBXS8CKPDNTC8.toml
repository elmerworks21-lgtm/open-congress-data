congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 6657 OTHERWISE KNOWN AS 'AN ACT INSTITUTING A COMPREHENSIVE AGRARIAN REFORM LAW'"
congress_website_abstract = "Seeks to hasten to hasten the process of land valuation in accordance with existing laws in force now and before martial law in order that the Government may distribute properties lawfully acquired after complying with the Constitutional mandate topay just compensation for private property taken under agrarian reform program. This bill will remove the valid apprehension and doubts of the beneficiaries whether the titles issued to them by the Government over lands not lawfully acquired by it are really owned by them."

