congress_website_title = "AN ACT REGULATING THE IMPOSITION OF INTEREST RATES ON LOANS GRANTED TO SMALL BORROWERS BY PAWNSHOPS, AMENDING FOR THIS PURPOSE PRESIDENTIAL DECREE NO. 114, OTHERWISE KNOWN AS THE PAWNSHOP REGULATION ACT"
congress_website_abstract = "Declares the following --- \"NO PAWNSHOP, PAWNBROKER OR PAWNBROKER'S AGENT SHALL DIRECTLY OR INDIRECTLY STIPULATE, CHARGE, DEMAND, TAKE OR RECEIVE ANY HIGHER RATE OR GREATER SUM OR VALUE FOR ANY LOAN OR FORBEARANCE THAN SIX (6%) CENTUM PER ANNUM MONTH WHEN THE SUM LENT IT LESS THAN TWO THOUSAND PESOS (P2,000.00); SEVEN (7%) CEN TUM PER ANNUM WHEN THE SUM IS MORE THAN TWO THOUSAND PESOS (P2,000.00) BUT NOT MORE THAN FIVE THOUSAND PESOS (P5,000.00); AND NINE (9%) PER CENTUM (7%) PER ANNUM IF THE SUM IS MORE THAN FIVE THOUSAND PESOS (P5,000.00).\" States that it shall be unlawful for a pawnshop, pawnbroker to divide the pawn offered by a person into two (2) or more fractions in order to collect a bigger interest than what is authorized."

