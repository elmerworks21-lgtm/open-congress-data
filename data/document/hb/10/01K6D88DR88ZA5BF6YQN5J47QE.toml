congress_website_title = "AN ACT AUTHORIZING THE PRESIDENT OF THE PHILIPPINES, WITH THE HELP OF A COMMISSION ON REORGANIZATION, TO REORGANIZE THE DIFFERENT DEPARTMENTS, BUREAUS, OFFICES, AGENCIES, AND OTHER INSTRUMENTALITI ES OF THE EXECUTIVE BRANCH OF GOVERNMENT, INCLUDINGGOVERNMENT-OWNE D OR -CONTROLLED CORPORATIONS AND FINANCIAL INSTITUTIONS, STATE COLLEGES AND UNIVERSITIES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares it the policy of the State to develop and maintain a government bureaucracy whose SCOPE, LEVEL and FOCUS OF FUNCTIONS, PROGRAMS and ACTIVITIES support national development goals and efforts; and whose SIZE, ORGANIZATIONAL STRUCTURE and OPERATING SYSTEMS promote economy, efficiency, innovation and productivity. Prescribes the scope, principles and standards of reoganization; provides safety nets for those who may be separated as a result of this reorganization. Creates the COMMISSION ONREORGANIZATION primarily responsible for the drafting of an Integrated Reorganization Plan. drafting of an INtegrated Reorganization Plan."
