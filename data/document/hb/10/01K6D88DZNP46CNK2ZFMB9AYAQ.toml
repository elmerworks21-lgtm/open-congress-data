congress_website_title = "AN ACT LIBERALIZING THE DOWNSTREAM SECTOR OF THE PETROLEUM INDUSTRY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides that the establishment of any oil company and/or refinery, and the importation, storage and distribution, wether wholesale or retail of crude oil, gasoline and other oil products are authorized without need of prior approval of the Department of Energy or the Energy Regulatory Board. Provides, further that these would be no relaxation of rules and standards concerning health, safety, product quality and environmental protection in relation to oil products."
