congress_website_title = "AN ACT PROVIDING FOR THE RECOGNITION AND PROMOTION OF YOUTH ART AND CULTURAL DEVELOPMENT, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to --- (1) to recognize the importance of art and cultural development as guiding tool for the upliftment and formation of youth's values; (2) to provide mechanism in recognition and honoring the efforts of the youth for their artistic excellence and contribution to the community; and (3) to create opportunities for popularizing youth's artistic works and talents locally as well as internationally ."

