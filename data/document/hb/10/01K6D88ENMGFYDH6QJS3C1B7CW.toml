congress_website_title = "AN ACT STRENGTHENING FURTHER WORKERS' RIGHT TO UNIONIZE BY DISALLOWING THE FORMATION OF LABOR-MANAGEMEN T COUNCILS OR SIMILAR BODIES IN ORGANIZED COMPANIES, AMENDING FOR THIS PURPOSE ARTICLE 277 (H) OF THE LABOR CODE"
congress_website_abstract = "Proposes the following amendments to Art. 277 (H) of the Labor Code: \"Art. 277. Miscellaneous provisions. - (a) xxx (b) xxx (c) xxx (d) xxx (e) xxx (f) xxx (g) xxx (h) In establishments where no legitimate labor organization exists, labor-management committees may be formed voluntarily by workers and employers for the purpose of promoting industrial peace. IN NO CASE SHALL BE FORMATION OF LABOR-MANAGEMEN T COUNCILS OR SIMILAR BODIES BE ALLOWED IN ORGANIZED COMPANIES. PROVIDED, HOWEVER THAT [T] the Department of Labor and Employment shall endeavor to enlighten and educate the workers THROUGH THEIR UNIONS and employeess on their rights and responsibilitie s through labor education with emphasis on the policy thrusts of this Code.\""

