congress_website_title = "AN ACT TO INSTITUTE THE POLICIES ON THE SUPPRESSION OF TRAFFICKING OF FILIPINO WOMEN; AND THE ESTABLISHMENT OF A HIGHER STANDARD OF PROTECTION AND REHABILITATION OF VICTIMS OF TRAFFICKING. FORCED PROSTITUTION, SEXUAL SERVITUDE AND EXPLOITATION INCLUDING COMMERCIALIZED TRANSNATIONAL MARRIAGES, MIGRATION FOR ENTERTAINMENT, SALE OF BODY ORGANS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Trafficki ng of Filipino Women Act of 1996\" Defnes the term \"TRAFFICKING OF WOMEN\" as used in this Act; names the various forms of trafficking of women under this proposed measure. Proposes the creation of the INTER-AGENCY COUNCIL AGAINST TRAFFICKING; prescribes the functions of the Council."
