congress_website_title = "AN ACT ESTABLISHING A MARINE FISH SANCTUARY IN EVERY COASTAL PROVINCES ALL OVER THE PHILIPPINE ARCHIPELAGO AND PROVIDING FUNDS FOR THE REHABILITATION THEREOF"
congress_website_abstract = "\"Fish Sanctuary Act of 1996\" Seeks to establish and rehabilitate the fish sanctuaries all over the country by declaring a fish sanctuary in every coastal provinces in order to assure the continuous supply of fish and other marine products for the coming years. Prohibits and penalizes all kinds of fishing activities and collection of marine life within the fish sanctuary with a fine not lower than ten thousand pesos (P10,000.00) and/or imprisonment of one (1) to two (2) years."

