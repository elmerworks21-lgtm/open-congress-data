congress_website_title = "AN ACT REQUIRING THAT EVERY GOVERNMENT RESETTLEMENT AREA MUST HAVE ITS OWN INDUSTRIAL AREA/ZONE, EDUCATIONAL AND HEALTH FACILITIES, AND OTHER BASIC COMMUNITY AMENITIES AND SOCIAL SERVICES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: At present, many Filipinos are living in resettlements areas provided for either by the government or the private sector. Resettlement takes these people away from their major source of livelihood. This causes them to become nonfunctioning assets of the society because of the lack of sufficient jobs in their new community. It is therefore in keeping with the mandate of the Constitution to provide a community acceptable to these relocatees and with adequate employment opportunities as well. \"Sustainable Government Resettlement Areas Act\" Explains the details of the following requirements for all resettlement areas: (1) education and health facilities; (2) provision of basic community amenities and social services; (3) industriall zones; and (4) use of lots in the industrial area/zone."

