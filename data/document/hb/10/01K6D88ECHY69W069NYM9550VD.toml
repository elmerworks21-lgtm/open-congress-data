congress_website_abstract = "Seeks to provide farmers financial assistance in the form of a LOAN to be used as capital for fertilizers, seeds, acquisition of livestock, poultry and other agricultural inputs. Farmers are encouraged to form cooperatives and those will take chargeof loan evaluation and the making of credit decisions."

