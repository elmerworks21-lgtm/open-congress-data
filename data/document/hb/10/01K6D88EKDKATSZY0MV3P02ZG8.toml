congress_website_title = "AN ACT STRENGTHENING THE PEDERASYON NG MGA SANGGUNIANG KABATAAN, THEREBY AMENDING SECTION 436 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE"
congress_website_abstract = "Aims to enhance the potentials and capabilities of youth leaders by adding several provisions to Section 436 of Republic Act No. 7160, otherwise known as the Local Government Code, as regards to: (1) funds for the development projects; (2) membership in the National Youth Commission; (3) national headquarters with a national secretariat; (4) appropriations fron any funds of the national treasury; (5) Autonomy of operations with active lines of coordiantion and communications with other govenrment offices and agencies; (6) Authority to raise funds; and (7) Exemptions from all forms of taxation or other impositions."

