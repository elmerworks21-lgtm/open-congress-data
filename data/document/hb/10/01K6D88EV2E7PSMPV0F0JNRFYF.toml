congress_website_title = "AN ACT GRANTING ONE THOUSAND TWO HUNDRED PESOS (P1,200.00) MONTHLY ALLOWANCE TO ALL BARANGAY TANODS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Provides for the following --- \"SECTION 2. A monthly allowance of ONE THOUSAND TWO HUNDRED PESOS (P1,200.00) is hereby granted to all barangay tanods in the country. \"SECTION 3. Every barangay shall be entitled to enlist the services of at least tenbarangay tanods but which shall not exceed twenty, depending upon the population of each barangay, whose names and dates of service shall be properly recorded and forwarded to the municipal office by the barangay secretary or the barangay captain.\""

