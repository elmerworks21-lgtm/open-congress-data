congress_website_title = "AN ACT PROHIBITING THE COLLECTION OF CONTRIBUTIONS FROM TEACHERS AND STUDENTS IN ALL LEVELS OF BOTH PUBLIC AND PRIVATE SCHOOLS AND PROVIDING PENALTIES FOR VIOLATIONS THEREFOR"
congress_website_abstract = "States that - \"SECTION 1. The Sale of tickets and collection of contributions and/or solicitation by any person or persons, whether voluntary or otherwise, from teachers, parents and students at all levels of both public and private schools at any time of the year is prohibited; Provided, however, That this prohibition shall not cover voluntary fees for the Red Cross, Girl Scouts of the Philippines, Boy Scouts of the Philippines and Anti-TB drive.\" Prescribes penalty for violation of this Act."
