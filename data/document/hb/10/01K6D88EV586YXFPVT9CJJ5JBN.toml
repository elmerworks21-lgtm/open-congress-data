congress_website_title = "AN ACT REQUIRING THE INCLUSION OF ENTREPRENEURSHI P AS A SEPARATE SUBJECT IN THE HIGH SCHOOL CURRICULUM"
congress_website_abstract = "Rationale: The contribution of entrepreneurs to the growth of our country has made them indispensable components of development. To reach our goal of becoming a newly industrialized economy by the 21st century, the spirit of entrepreneurshi p must be inculcated in our youth by introducing the subject of entreprenueursh ip in the high school curricula. > Directs the DECS to appoint a HEAD SUBJECT SPECIALIST from the Bureau of Secondary Education, who shall be the lead person in coordinating allactivities towards this end. > Prescribes the duties and functions of the Head Subject Specialist, as well as the scope of the proposed subject."

