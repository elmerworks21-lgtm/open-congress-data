congress_website_title = "AN ACT TO PROMOTE THE DEVELOPMENT OF THE FOOTWEAR MANUFACTURING INDUSTRY, PROVIDING INCENTIVES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The earning potential of footwear production has long been proven. In 1996, the footwear industry earned US$170,043,570. 00. On the first half of 1997, it has already gained as much as US$94,347,096.0 0. This is 1.05% growth compared tothe industry's export earnings during the same period last year. \"Footwear Industry Development Act of 1997\" > Provides the following INCENTIVES to every qualified footwear enterprise, in addition to other incentives granted by the Board of Investments: (1) Exemption from import taxes and duties and value-added tax on imported raw materials, for as long as such are not locally available in quantities necessary for production; (2) A special value-added tax (VAT) rate of two percent (2%) on sale oof goods; (3) Exemption from taxes and duties on imported capital equipment, including spare parts and tooling thereof; and (4) Training incentives equivalent to fifty percent (50%) of the amount spent in training schemes approved by the appropriat"

