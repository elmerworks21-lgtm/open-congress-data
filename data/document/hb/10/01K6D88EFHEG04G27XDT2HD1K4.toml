congress_website_title = "AN ACT INSTITUTING A PROFIT-SHARING- SCHEME BASED ON EMPLOYEE PRODUCTIVITY"
congress_website_abstract = "Seeks to make PROFIT-SHARING a major feature in labor-managemen t relations in the country. Provides that FIFTY PERCENT (50%) of the NET INCOME of private enterprises EXCEEDING TWO HUNDRED PERCENT (200%) of the AVERAGE RETURN ON INVESTMENT from treasury bills issued shall be shared with all employees based on their performance."

