congress_website_title = "AN ACT TO REQUIRE STUDENTS IN ELEMENTARY AND HIGH SCHOOLS TO PLANT TREES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Because of need and greed, we have effectively and efficiently decimated a good portion of our forest lands. This has resulted in various environmental and food security problems. Certainly, now is not just the time for conservation andprotection. A lot of efforts should also be dedicated to rehabilitation of our forest resources . It is in this light that the role of the youth , especially the students, in nation-building is being invoked. \"Students' Tree Planting Act\" Mandatesthe following --- \"SECTION 3. Every elementary and high school student is hereby required to plant at least four trees every school year either in their oen lots or in areas designated in accordance with the provisions of this Act.\""

