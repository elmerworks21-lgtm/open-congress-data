congress_website_title = "AN ACT ALLOWING TUITION FEES PAID FOR THE EDUCATION OF CHILDREN DEDUCTIBLE FROM GROSS INCOME OF INDIVIDUAL TAXPAYERS"
congress_website_abstract = "Proposes to add this NEW paragraph to SEction 29, National Internal Revenue Code to read as follows: \"(N) DEDUCTION ALLOWABLE FROM THE GROSS INCOME OF FILIPINO INDIVIDUAL TAXPAYERS. - IN COMPUTING THE TAXABLE INCOME OF A FILIPINO INDIVIDUAL TAXPAYER, REGARDLESS OF WHETHER OR NOT HE IS A COMPENSATION INCOME EARNER, ENGAGED IN BUSINESS OR TRADE, OR IN PRACTICE OF PROFESSION, THERE SHALL BE ALLOWED A DEDUCTION IN HIS GROSS INCOME FIFTY (50%) OF THE TOTAL AMOUNT PAID FOR MATRICULATION FEES FOR THEEDUCATION OF HIS CHILDREN IN ANY GIVEN YEAR WHICH SHALL IN NO CASE EXCEED THE AMOUNT OF TWENTY PESOS (P20,000.00) SUBJECT, HOWEVER, TO THE FOLLOWING CONDTIONS.\""

