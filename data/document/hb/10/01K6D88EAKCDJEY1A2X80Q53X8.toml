congress_website_title = "AN ACT PROVIDING FOR A HUMAN RESOURCE DEVELOPMENT PROGRAM FOR POLICE PERSONNEL, AND APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Police Welfare Act of 1996\" States that the proposed human resource program shall consist of MANPOWER DEVELOPMENT, PROFESSIONAL AND CAREER DEVELOPMENT PROGRAMS. Provides, likewise, for other areas of concner, such as: (1) Benefits for Personal Killed in Line of Duty; (2) Legal Assistance Benefits; (3) Fare Discount Privilege; (4) Standards for Promotion and Appointment to Office."

