congress_website_title = "AN ACT TO PROVIDE FOR THE POPULARIZATION OF LAWS THROUGH TRANSLATION AND POPULAR EDUCATION, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Government should therefore remedy the situation by bringing the law down to the grassroots, so to speak. By translating the laws into languages most understandable to the public, and by presenting the law in the most comprehensive mannerto the people through the use of media and other popular education techniques, it is envisioned that our fellow Filipinos shall be educated on their rights, obligations and possible liabilities under the law. Thus, injustice caused by lack of information can somehow be alleviated. Directs the Sentro ng Wikang Pambansa and the University of the Philippine Law Center to implement a program for the translation of all legislation into Filipino and regional languages for the purpose of making laws uunderstandable to the general public."

