congress_website_title = "AN ACT PROHIBITING BANKS FROM IMPOSING FEES OR CHARGES ON SAVINGS OR CURRENT ACCOUNTS FALLING BELOW THE REQUIRED MINIMUM MAINTAINING BALANCE AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "States that \"SECTION 1. It shall be unlawful for any bank, whether government0owne d or private, local or foreign, to impose fees or charges on depositors who cannot comply with the required minimum maintaining balance in savings or current accounts by deducting certain amounts from the depositor's remaining balance of his/her deposit. Prescribes penalty for violation of this Act."

