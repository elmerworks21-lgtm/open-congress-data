congress_website_title = "AN ACT RATIONALIZING FURTHER THE POWER OF ASSUMPTION OR CERTIFICATION OF LABOR DISPUTES BY THE SECRETARY OF LABOR AND EMPLOYMENT BY LIMITING THE EXERCISE THEREOF TO INDUSTRIES PERFORMING ESSENTIAL SERVICES, AMENDING FOR THIS PURPOSE ARTICLE 263 (G)OF THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Refers to the DOLE Secretary's authority to assume or certify labor disputes involving industries indespensable to the national interest. Replaces the phrase \"industry indespensable to the national interest\" to \"INDUSTRIES PERFORMING ESSENTIAL SERVICES\" which refers to medical, water supply, telephone, electric, mass transport and other services."

