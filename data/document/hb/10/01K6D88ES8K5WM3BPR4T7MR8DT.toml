congress_website_title = "AN ACT TRANSFERRING THE ADMINISTRATION OF THE GOVERNMENT SCHOLARSHIP PROGRAM FOR CULTURAL COMMUNITIES FROM DEPARTMENT OF EDUCATION, CULTURE AND SPORTS TO THE OFFICE FOR SOUTHERN CULTURAL COMMUNITIES AND OFFICE FOR NORTHERN CULTURAL COMMUNITIES, CREATING THEREAT THE BUREAU FOR SCHOLARSHIP, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to create the BUREAU FOR SCHOLARSHIP which: (1) adminsiter the scholarship program exclusively for the members of the indigenous cultural communities; (2) adopt an equitable apportionment of the slots available for scholarship grants among allthe different indigenous cultural communities under their respective tribes wherein there shall be at least one (1) slot for each tribe for every school year; (3) coordinate with the National Testing Center and the Department of Education, Culture and Sports in prescribing the test, standard, criteria and other forms of measurement in the scholarship programs; and (4) assist in the placement and employment of the graduates of the program."

