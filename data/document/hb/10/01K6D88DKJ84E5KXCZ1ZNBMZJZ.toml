congress_website_title = "AN ACT GRANTING RETIREMENT BENEFITS AND MONTHLY PENSION TO ALL BARANGAY OFFICIALS AMENDING FOR THE PURPOSE THE \"LOCAL GOVERNMENT CODE OF 1991\""
congress_website_abstract = "Applies to the punong barangay, the sangguniang barangay members, the barangay treasurer, and the barangay secretary, after having rendered an aggregate period of at least nine (9) years of service and upon reaching the age of sixty-five (65) yearsold. Proposes to grant these retirement benefits to said officials: (1) lump sum benefit equivalent to five (5) years allowance, based on the highest rate of monthly allowances; and (2) a monthly pension of not less than 75% of the highest monthly allowance."

