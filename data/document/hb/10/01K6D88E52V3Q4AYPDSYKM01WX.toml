congress_website_title = "AN ACT REQUIRING A LEGISLATIVE FRANCHISE TO ENGAGE IN AIR COMMERCE OR AIR TRANSPORTATION BEFORE CERTIFICATES OF PUBLIC CONVENIENCE AND NECESSITY TO OPERATE DOMESTIC AIR SERVICES MAY BE ISSUED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides that --- \"SECTION 2. No persons shall be granted a Certificate of Public Convenience and Necessity or Temporary Operating Permit to operate a domestic air service, or other permit ot license of a similar nature unless such person shall havefirst been granted a legislative franchise to engage in air commerce or air transportation by the Congress of the Republic of the Philippines."
