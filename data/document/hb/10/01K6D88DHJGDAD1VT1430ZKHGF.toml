congress_website_title = "AN ACT UPGRADING THE BENEFITS AND INCENTIVES OF BARANGAY TANOD MEMBERS WHO HAVE RENDERED AT LEAST ONE YEAR OF SERVICE IN THE BARANGAY GOVERNMENT"
congress_website_abstract = "Entitles the barangay tanod members who have rendered for at least one (1) year in the barangay, aside from the privileges already granted by the Local Government Code, to the following: (a) Christmas Bonus of at least one-half (1/2) of what the punong barangay shall receive; (b) insurance coverage equal to three-fourths (3/4) of that received by the punong barangay; (c) free legal services from the government lawyers for criminal and civil cases filed against him arising from acts committed inthe performance of their duties; (d) fifty (50%) per cent discount in tuition and matriculation fees for their legitimate dependent children attending state colleges and universities; and (e) preference in the availment of membership in barangay livvelihood and development projects."

