congress_website_title = "AN ACT AUTHORIZING THE ESTABLISHMENT OF A TRAINING CENTER BY THE PHILIPPINE NATIONAL POLICE FOR THE EDUCATION OF PYROTECHNIC WORKERS AND FACTORY OWNERS AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Proposes the creation of a TRAINING CENTER manned by experienced and competent personnel, where prospective pytotechnic workers, as well as the owners, shall undergo training on SAFETY, MANUFACTURE and USE of standard components in the production ofharmless products. > Only those certified by the Center to have completed the course shall be accepted for employment."

