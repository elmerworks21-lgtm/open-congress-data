congress_website_title = "AN ACT GRANTING REGULATORY POWERS TO LOCAL GOVERNMENT UNITS OVER PUBLIC UTILITY AGENCIES RESPONSIBLE IN THE DELIVERY OF VITAL SERVICES LIKE WATER, POWER, TELEPHONE, TRANSPORTATION AND COMMUNICATIONS FACILITIES, AND FOR OTHER PURPOSES, AMENDING FOR THE PURPOSE THE PERTINENT PROVISIONS OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE"
congress_website_abstract = "Mandates that within 60 days from enactment of this Act, the President shall cause the issuance of an Executive Order embodying the implementing rules and regulations governing the grant of public utility regulatory powers to the LGUs over public utility agencies operating within the locality."

