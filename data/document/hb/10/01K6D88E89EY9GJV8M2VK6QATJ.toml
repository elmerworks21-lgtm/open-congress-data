congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7837, OTHERWISE KNOWN AS 'AN ACT GRANTING PERMANENT RESIDENT STATUS, OTHER RIGHTS AND PRIVILEGES TO FILIPINO VETERANS OF WORLD WAR II WHO ACQUIRED AMERICAN CITIZENSHIP UNDER THE UNITED STATES IMMIGRATION ACT OF 1990,AND FOR OTHER PURPOSES,' AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to incorporate into the substantive provisions of RA 7837 the phrase \"AND ANY OTHER PRIOR ACTS\" to make it clear that all the rights and privileges granted under the Law accrue not only to those Filipino veterans who acquired American citizenship under the US Immigration Act of 1990, BUT ALSLO to those who did so UNDER PRIOR US Acts."
