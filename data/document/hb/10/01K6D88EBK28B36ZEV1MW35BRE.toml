congress_website_title = "AN ACT TO INSTITUTE THE POLICIES ON THE LOCAL ADOPTION OF FILIPINO CHILDREN"
congress_website_abstract = "Declares that the State shall adopt the tenets set forth in the UN Declaration and UN Convention on the Rights of the Child that the BEST INTERESTS OF THE CHILD shall be the paramount consideration in the adoption of Filipino children. Declares further that in considering the child's best interest, the State shall be guided by the UN Declaration on Social and Legal Principles relating to the Protection and Welfare of Chidlren with Special Reference to Foster Placement and Adoption Nationally and Internationally ."
