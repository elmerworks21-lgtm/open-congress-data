congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF ABSENTEE VOTING BY QUALIFIED FILIPINOS ABROAD"
congress_website_abstract = "\"Absentee Voting Law of 1993\" Allows Filipinos residing or working abroad to exercise their right of suffrage during national elections. Covers (1) overseas contract workers and their Filipino dependents residing with them; (2) Phil. government employees serving outside of the Philippines, their spouses and dependents when residing with them, and (3) those temporarily residing outside of the Philippines, their spouses and dependents when residing with them. * * *"
