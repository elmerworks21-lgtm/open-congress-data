congress_website_title = "AN ACT AMENDING PARAGRAPH (D), SECTION 324 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Provides that TWENTY PERCENT (20%) OF THE UNEXPENDED BALANCE OF THE ANNUAL LUMP SUM APPROPRIATION FOR UNFORESEEN EXPENDITURE ARISING FROM OCCURRENCE OF CALAMITIES SHALL NOT REVERT TO THE UNAPPROPRIATED SURPLUS OF THE GENERAL FUND, BUT INSTEAD, SHALLBE SET ASIDE AS A CALAMITY RESERVE FUND. SAID FUND TO BE USED TO AUGMENT THE ANNUAL CALAMITY FUND WHEN DEEMED NECESSARY.\""

