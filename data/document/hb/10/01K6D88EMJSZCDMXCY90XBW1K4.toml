congress_website_title = "AN ACT INTRODUCING REFORMS IN THE OPERATIONS OF THE BUREAU OF CUSTOMS AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The Bureau of Customs (BOC) is pressed to implement its computerization program in order to facilitiate the processing of papers and document srelating the entry of imported products, commodities and articles in the BOC premises. the computerization of the BOC oepration is likewise necessary to upgrade the standard of customs services and to enable the country to effectively carry out itss goal toward trade globalization through trade facilitation. Recommends the following --- (1) To institute reforms in the Bureau off Customs regarding the operation and maintenance of computer systems/network s for receipts of documents; (2) To provide penal provisions related tounauthorized use of the BOC computer system; (3) To define documeents which can be used as evidence in any proceedings, etc."
