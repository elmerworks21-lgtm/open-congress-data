congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6975, OTHERWISE KNOWN AS THE 'DEPARTMENT OF INTERIOR AND LOCAL GOVERNMENT ACT OF 1990', AND FOR OTHER PURPOSES(CRIMIN OLOGY EDUCATION PROGRAM)"
congress_website_abstract = "Seeks to provide the PNP, the Bureau of Jail Management and Penology (BJMP), and the Bureau of Fire Protection (BFP) with a CONTINUOUS POOL of (1) criminology graduates; (2) professional criminologists and (3) criminology experts in order to: (1) UPGRADE and STRENGTHEN law enforcement agencies; (2) enhance public safety services; and (3) ensure a more judicious and effective administration of criminal justice."
