congress_website_title = "AN ACT PROVIDING FOR PROCEDURE IN OIL PRICE INCREASE, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NUMBERED ONE HUNDRED SEVENTY-TWO, CREATING THE ENERGY REGULATORY BOARD"
congress_website_abstract = "Provides that (1) all hearings, investigations and proceedings shall be conducted in the city or municipality centrally accessible to all concerned; (2) the Energy Regulatory Board shall determine the necessity for any price increse, provisional orotherwise, of oil products after hearings. No price increase shall be effected unless the petitioner and the oppositors are given the opportunity to be heard; (3) a party adversely to the President of the Philippines, who shall decide within thirty(30) days and whose decision shall be final and executory."

