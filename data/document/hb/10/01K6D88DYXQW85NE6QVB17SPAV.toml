congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 5980, AS AMENDED, OTHERWISE KNOWN AS THE 'FINANCING COMPANY ACT,' FOR THE PURPOSE OF LIBERALIZING THE FOREIGN INVESTMENTS CLIMATE IN THE PHILIPPINES"
congress_website_abstract = "Amends Section 6 of RA 5980. Defines Form of Organization - FINANCING COMPANIES SHALL BE ORGANIZED IN THE FORMED OF STOCK CORPORATION OR GENERAL PARTNERSHIPS AND SHALL HAVE A PAID-UP CAPITAL OF NOT LESS THAN TEN MILLION PESOS (P10.000,000.00 ). Repeals the citizenship requirement for the Board of Director of Financing companies."
