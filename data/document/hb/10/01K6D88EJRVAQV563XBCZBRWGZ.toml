congress_website_title = "AN ACT PRESCRIBING A SEPARATE SALARY SCHEDULE FOR PUBLIC SCHOOL TEACHERS AND PROFESSORS IN STATE COLLEGES AND UNIVERSITIES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes a P6,500,000 base pay for public schoolteachers; prescribes, therefore, that the rates of pay of professors ins tate colleges and universities shall be based on a schedule to be prepared by the Department of Budget and Management guided bythe base pay for public schoolteachers and such factors as it may be deem appropriate. > For this purpose, public schoolteachers and professors in state colelges and universities shall be consdiered as exception from the coverage of Republic Act No.6758, otherwise known as the Salary Standardization Law."

