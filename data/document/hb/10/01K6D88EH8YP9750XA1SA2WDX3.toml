congress_website_title = "AN ACT AMENDING ARTICLE 75 OF CHAPTER 1, TITLE IV OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: Of the numerous and multifarious issues brough before the courts, one of the most difficult and sensitive to resolve is that involving property relations between husband andd wife. States that --- \"SECTION 1. The future spouses may, in the marriage settlements, agree upon the absolute community, conjugal partnership of gains, complete separation of property, or any other regime. In the absence of marriage settlements, or when the regime agreed upon is void, the system of CONJUGAL PARTNERSHIP OF GAINS as established in this Code shall govern.\""

