congress_website_title = "AN ACT LOWERING INTEREST RATES ON LOANS FROM GOVERNMENT BANKS/FINANCIAL INSTITUTIONS TO MICRO AND COTTAGE INDUSTRIES AS WELL AS TO SMALL AND MEDIUM ENTERPRISES"
congress_website_abstract = "\"SME Credit Assistance Law\" States the following --- \"SECTION 2. INCENTIVES. - Upon effectivity of this Act, Small and Medium Business Enterprises duly registered and accredited by the Department of Trade and Industry, The local government unit andother proper government agency shall enjoy the following: (1) Exemption from payment of income taxes within FIVE (5) YEARS from full operation; (2) Exemption from franchise taxes when applicable; (3) Priority in government grants and subsidies; and (4) Soft loans from government banks and financial institution at a rate of 6% to 9% per annum."

