congress_website_title = "AN ACT INTEGRATING TOURISM IN THE CURRICULA OF ELEMENTARY, SECONDARY AND TERTIARY LEVELS IN PUBLIC AND PRIVATE EDUCATIONAL INSTITUTIONS"
congress_website_abstract = "Mandates that TOURISM be taught as a subject area attached to Araling Panlipunan (Social Studies) in Grades 4 to 6. It shall be taught once a week in elementary schools; shall be taught as a separate subject field in secondary schools and shall be considered as a required subject in college."

