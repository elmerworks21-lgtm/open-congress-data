congress_website_title = "AN ACT ENHANCING THE RIGHTS OF WORKERS TO SOCIAL WELFARE BENEFITS UNDER EXISTING LAWS, COLLECTIVE BARGAINING AGREEMENTS OR COMPANY POLICIES BY REQUIRING EMPLOYERS TO INFORM THEIR EMPLOYEES THEREOF IN WRITING ON THE FIRST DAY OF THEIR EMPLOYMENT ANDEVERY TIME A PARTICULAR CONTINGENCY OCCURS"
congress_website_abstract = "Rationale: Almost invariably workers fail to avail of the benefits due them under existing laws for the simple reason that they are not cognizant about them. States the following --- \"SECTION 1. It is hereby declared the policy of the State to provide adequate social services, promote fill employment and an improved quality of life for all. Towards this end, the sTate shall institute mechanisms to facilitate, rather then prolong, the invocation and payment of benefits.\""

