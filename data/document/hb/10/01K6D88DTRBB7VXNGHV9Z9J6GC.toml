congress_website_title = "AN ACT CREATING THE GRAINS PRICE STABILIZATION FUND OF THE NATIONAL FOOD AUTHORITY (NFA) FOR ITS FOOD SECURITY AND STABILIZATION PROGRAM, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Creates the GRAINS AND PRICE STABILIZATION FUND of the National Food Authority for its food security and stabilization program. Provides a mechanism to protect small farmers from severe price fluctuations that result in their getting low prices fortheir produce in the market. Assures farmers of a reasonable price for their produce."

