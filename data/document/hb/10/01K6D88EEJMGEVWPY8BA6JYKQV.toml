congress_website_title = "AN ACT AMENDING SECTION 67, ARTICLE IX OF BATAS PAMBANSA BILANG 881, AS AMENDED, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "States that: \"Section 67. Candidates holding elective office. - Any elective official whether national or local, running for any office other than the one which he is holding in a permanent capacity shall be considered ipso facto resigned from his office upon the filing of his certificate of candidacy.\""
