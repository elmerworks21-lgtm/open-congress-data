congress_website_title = "AN ACT STRENGTHENING THE PHILIPPINE COCONUT AUTHORITY, INCREASING THE SMALL COCONUT FARMERS' PARTICIPATION IN, AND THEIR BENEFITS FROM, THE COCONUT INDUSTRY, AND BOLSTERING THE INDUSTRY'S DEVELOPMENT, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED FOURTEEN HUNDRED AND SIXTY-EIGHT, AS AMENDED, OTHERWISE KNOWN AS THE \"REVISED COCONUT INDUSTRY CODE\""
congress_website_abstract = "Aims to protect, encourage and assist small coconut farmers; appoints representatives of small coconut farmers and their organizations in the Philippine Coconut Authority; pools all funds raised by the coconut levies and the assets funded by said levies into a single fund to be known as the COCONUT INDUSTRY REHABILITATION AND DEVELOPMENT FUND (CIRDF)"

