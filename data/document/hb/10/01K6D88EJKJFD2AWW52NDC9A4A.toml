congress_website_title = "AN ACT AMENDING SECTION 63(b) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS 'THE LOCAL GOVERNMENT CODE OF 1991' (NOTE: PROPOSES AMENDMENTS TO THE LOCAL GOVERNMENT CODE PROVISION ON PREVENTIVE SUSPENSION)"
congress_website_abstract = "Rationale: The constitutional safeguard of due process is briefly worded thus: \"No person shall be deprived of life, liberty and property without due process of law\" (Art. II, Sec. 1, 1987 Constitution). Proposes these amendments to the Local Government Code provision on PREVENTIVE SUSPENSION: (1) Preventive suspension SHALL BE IMPOSED ONLY AFTER A PRELIMINARY HEARING HAS BEEN CONDUCTED AND UPON A RECOMMENDATION SUBMITTED BY THE APPROPRIATE COMMITTEE, AS THE CASE MAYBE, WHEN BOTH PARTIES HAVE BEEN GIVEN AS OPPORTUNITY TO PRESENT THEIR SIDES AND UPON FINDING THAT THE EVIDENCE OF GUILT IS STRONG. Provided: that any single preventive suspension of the lcoal elective official shall not extend beyond sixty (60) days. (2) SEC. 63-A. PREVENTIVE SSUSPENSION SHALL MOTU PROPRIO BE IMPOSED: (1) WHEN THE OFFENSE CHARGED IS PUNISHABLE BY PRISION MAYOR TO DEATH; (2) WHEN THE EVIDENCE OF GUILT IS STRONG; AND (3) IF THE PUBLIC OFFICIAL CONCERNED, DURING THE PENDENCY OF THE HEARING, UTILIZE HIS PUBLIC"

