congress_website_title = "AN ACT DECLARING AS PRIMA FACIE EVIDENCE OF GRAFT AND CORRUPTION, INFRASTRUCTURE PROJECTS BELOW THE PRESCRIBED STANDARDS AND/OR SPECIFICATIONS, AMENDING FOR THE PURPOSE, REPUBLIC ACT NUMBERED THIRTY HUNDRED NINETEEN, OTHERWISE KNOWN AS THE ANTI-GRAFT AND CORRUPT PRACTICES ACT"
congress_website_abstract = "Proposes to add a NEW section to the Anti-Graft and Corrupt Practices Act, which shall read as follows: \"SEC. 4 a) x x x b) x x x c) IT SHALL BE UNLAWFUL FOR ANY PRIVATE PERSON OR ENTITY TO KNOWINGLY BRIBE A PUBLIC OFFICIAL OR EMPLOYEE TO ENTER INTO ANY GOVERNMENT INFRASTRUCTURE CONTRACT GROSSLY DISADVANTAGEOUS TO THE GOVERNEMNT AND WHICH MAY RESULT TO THE COSNTRUCTION OF INFRASTRUCTURE THAT ARE BELOW THE PRESCRIBED STANDARDS AND SPECIFICATION STIPULATED IN THE CONTRACT OR ANY RELATED LAW, RULE OR REGULATION.\" Penalizes the public officials or employee found guilty for the construction of substantial infrastructure projects."

