congress_website_title = "AN ACT CREATING THE CHILD AND YOUTH WELFARE BOARD IN EVERY PROVINCE AND CITY, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It is the policy of the State to promote and protect the right of children and the youth and ensure their growth and development. The State shall extend them special protection from abuse, cruelty, exploitation, neglect and other conditions detrimental to their development through the empowerment of local government units in the implementation of laws enacted to promote and protect their rights. Prescribes the powers and duties of the Board, its composition, qualifications of the Chairperson, and term of office."

