congress_website_title = "AN ACT PENALIZING THE COMMISSION OF SUMMARY OR ARBITRARY EXECUTIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Salvaging Act of 1996\" Recognizes as offenses under the criminal laws all forms of summary or arbitrary execution, commonly known as SALVAGING. Safeguards the protection of every person accused, arrested or under investigation for the commission of a crime, thus maintain respect for human dignity. Imposes the penalty of RECLUSION PERPETUA or RECLUSION TEMPORAL upon those persons directly or indirectly involved with the commission of such acts."

