congress_website_title = "AN ACT PRESCRIBING A MAXIMUM FIVE (5)-YEAR PERIOD FOR THE COMPLETION AND TERMINATION OF ANY CIVIL AND/OR CRIMINAL CASE"
congress_website_abstract = "Supports the rights of all persons to a speedy disposition of their case/s before all judicial, quasi-judicial, or administrative bodies. Provides for charges of inefficiency or dereliction of duty to the prosecutor, lawyer and judge involved, should there be failure to complete or terminate a case upon the expiration of the maximum five (5)-year period."

