congress_website_title = "AN ACT REQUIRING ALL PUBLIC HEALTH CENTERS TO BE OPEN AT ALL TIMES TO PROVIDE CONTINUOUS HEALTH AND MEDICAL SERVICES TO THE PUBLIC"
congress_website_abstract = "Rationale: The problem of health and medical services for the poor in our society is a very serious one. Free wards of private hospitals and the existing services of public health and medical needs of the people. This is specially true because after regular office hours, public health centers are closed, and the sick among the poor have nowhere to go for free medical attention. > This Bill seeks to ease up the situation by extending the working hours of public health center beyond regular daytime schedules."

