congress_website_title = "AN ACT FIXING AND DELINEATING THE SPECIFIC LIMITS OF FOREST LANDS AND NATIONAL PARKS, PROVIDING PENALTIES FOR VIOLATIONS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Final Forest Line Act of 1995\" Establishes the meters and bounds of the country's forest lands and national parks, in pursuance of the constitutional mandate to\" ... determine by law the specific limits of forest lands and national parks, marking clearly their boundaries and the ground.\" Ensures the boundaries of the forests which need to be developed and rehabilitated for our posterity. * * *"
