congress_website_title = "AN ACT FIXING THE RATES OF INTEREST AND FOR OTHER PURPOSES"
congress_website_abstract = "States that --- \"SECTION 1. The rate of interest for the loan or renewal thereof or the forbearance of money. goods or credits, in the absence of any written contract as to such rate of interest, shall be six per centum (6%) per annum. The rate of interest allowed in judgments shall, likewise be six per centum (6%) per annum."

