congress_website_title = "AN ACT ABOLISHING THE PREPARATORY RECALL ASSEMBLY AS A MECHANISM OF RECALL OF LOCAL ELECTIVE OFFICIALS, AND CLARIFYING THE LIMITATIONS ON RECALL, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: \"... present-day political realities reveal that partisanship has gotten in the way of political stability in local government units in cases where the elected official subject of the recall proceedings is outnumbered by his political adversaries in the preparatory recall assembly.\" Proposes, therefore, to ABOLSIH the Preparatory Recall Assembly provided in the Local Government Code of 1991."
