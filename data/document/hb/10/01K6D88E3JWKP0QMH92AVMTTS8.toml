congress_website_title = "AN ACT PROVIDING FOR TRANSPARENCY IN THE BUDGET PROCESS, AMENDING FOR THE PURPOSE SECTION THIRTY-ONE OF PRESIDENTIAL DECREE NUMBERED ONE THOUSAND ONE HUNDRED SEVENTY-SEVEN, OTHERWISE KNOWN AS THE BUDGET REFORM DECREE, AS CODIFIED UNDER SECTION TWENTY-SIX, BOOK VI OF EXECUTIVE ORDER NUMBERED TWO-HUNDRED NINETY-TWO, ALSO KNOWN AS THE ADMINISTRATIVE CODE OF 1987, AND REPEALING PROVISIONS OF LAWS AUTHORIZING AUTOMATIC APPROPRIATIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to WITHDRAW from the Executive Deaprtment the authority to DISBURSE PUBLIC FUNDS out of automatic appropriations. Provides, therefore, that all expenditures for (a) personal retirement premiums, governemnt service insurance and other similar fixed expenditures; (b) principal and interest on public debt; (c) national government guarantees of obligations SHALL BE SUBJECT TO THE REGULAR ANNUAL CONGRESSIONAL APPROPRIATIONS."

