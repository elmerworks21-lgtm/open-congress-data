congress_website_title = "AN ACT REQUIRING BOTH THE ELECTRIC POWER PRODUCER AND ELECTRICITY RETAILER TO INDEMNIFY THE HEAD OF THE HOUSEHOLD(S) WHOSE PROPERTY(IES) GET BURNED OR DAMAGED ON ACCOUNT OF A BROWN-OUT OR BLACK-OUT OR POWER FLUCTUATION"
congress_website_abstract = "Provides the following: \"SEC. 4 - INDEMNIFICATION - The producer or retailer of electricity, or both, shall indemnity the owner of the damaged property arising from their inefficiency. The owner of the damaged property shall have the option to recipt the indemnity in the form of a replacement with one of an equivalent and comparative quantity and quality as that which had been damaged, or to recieve the monetary value of the damaged property."

