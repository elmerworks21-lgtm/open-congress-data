congress_website_title = "AN ACT AUTHORIZING THE COMMISSION ON ELECTIONS TO USE AN AUTOMATED ELECTION SYSTEM NATIONWIDE IN THE MAY 11, 1998 NATIONAL AND LOCAL ELECTIONS AND IN OTHER NATIONAL AND LOCAL ELECTIONS THEREAFTER, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Rationale: With the employment of mdoern technologies in the counting and canvassing of votes, the perennial problem and vicious cycle of electoral fraud which has now come to be known as operation \"dagdag-bawas\" shall be addressed. For one, it shall eliminate human intervention in the reading of ballots and in the accomplishment of election returns, as well as tremendously shorten the period in determining the votes for every elective position whicha re usually the areas where fraud takes place.> Proposes the use of electronic devices in the country and canvassing of votes during the May 11, 1998 elections."
