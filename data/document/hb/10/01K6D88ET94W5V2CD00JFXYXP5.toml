congress_website_title = "AN ACT REQUIRING ALL GASOLINE REFINERS, BLENDERS AND IMPORTERS TO BRING DOWN LEAD CONTENT TO ONE-TENTH 1/10 GRAM PER LITER OF LEADED GASOLINE AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Rationale: \"Lead is a silvery gray metal that is toxic in every known form..., lead is hazardous to health even at exceedingly low levels. Children are particularly vulnerable. Concentration of this in body tissues results in fatigue, weakness, lethargy, insomnia, brain damage and muscular paralysis.\" Penalizes violation of this Act --- \"SEC. 3. Any gasoline refiner, blender or importer who vilates this Act shall, upon conviction, be penalized by a fine of Two Hundred Thousand Pesos (P200,000.00) and the cancellation of the license of the corporation to operate its business.\""

