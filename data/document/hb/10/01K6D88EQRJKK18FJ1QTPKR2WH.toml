congress_website_title = "AN ACT APPROPRIATING THE SUM OF FIVE HUNDRED MILLION PESOS (P5OO,000,000.0 0) TO REIMBURSE LOCAL GOVERNMENT UNITS (LGUs) THE AMOUNT WHICH THEY WERE REQUIRED TO SHARE IN THE EXPENSES OF THE 1997 BARANGAY ELECTIONS"
congress_website_abstract = "Rationale: Sharing the expense of the May 12, 1997 barangay elections with the COMELEC is an additional burden to cash-trapped LGUs who can hardly finance their own devleopment programs. LGUs have in fact been encouraged to institute revenue-generating programs such as floating municipal bonds, imposing \"green taxes, renting out real properties and other money-making innovations to maximize their devleopment potentials. Seeks, therefore, to REIMBURSE the P500 MIllion shouldered by the LGUs inthe total expenses of the May 12, 1997 barangay elections to enable them to utilize the amount for social services and socio-economic development projects."

