congress_website_title = "AN ACT DISQUALIFYING PERSONS CONVICTED OF THE CRIME OF ROBBERY OR THEFT FROM THE BENEFITS OF THE PROBATION LAW, AMENDING FOR THE PURPOSE THE PROBATION LAW OF 1976, AS AMENDED"
congress_website_abstract = "Rationale: Robbery and theft are among the most common crimes in our country today. Many offenders of such crimes who have been apprehended and convicted have remained scot-free by virtue of the benefits granted under the Probation Law of 1976. This is most unfair to the victims or complainants who have suffered harassment, mental, anguish, worry and anxiety before, during and after trials."

