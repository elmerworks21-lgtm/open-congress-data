congress_website_title = "AN ACT FURTHER AMENDING PRESIDENTIAL DECREE NO. 1467, AS AMENDED, OTHERWISE KNOWN AS THE CHARTER OF THE PHILIPPINE CROP INSURANCE CORPORATION (PCIC), IN ORDER TO MAKE THE CROP INSURANCE MORE STABLE AND MORE BENEFICIAL TO THE FARMERS COVERED THEREBYAND FOR THE NATIONAL ECONOMY"
congress_website_abstract = "Contains the following features --- (1) Declares it a State policy to minimize the disastrous effects of the risks that agricultural produces have to face, such as calamities; (2) Provides premium subsidy to small-scale farmers; (3) Expands the capital base of the Philippine Crop Insurance Corporation, etc."
