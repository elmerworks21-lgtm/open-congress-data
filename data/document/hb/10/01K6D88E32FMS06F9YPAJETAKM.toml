congress_website_title = "AN ACT REGULATING THE SALE OR PURCHASE, TRANSFER, DISTRIBUTION, POSSESSION AND USE OF CHAINSAWS, PENALIZING VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Chainsaw Act pf 1995\" Substantiates the State policy to enhance forest protection by eliminating destructive modes of natural resource exploitation in order to ensure the continuity of their productive condition. Identifies the persons authorized to sell chainsaws and to passess and sell chainsaws; imposes penalties for violation of this Act."
