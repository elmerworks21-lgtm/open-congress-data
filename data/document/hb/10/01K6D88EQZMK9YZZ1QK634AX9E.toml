congress_website_title = "AN ACT PROHIBITING SEX CHANGE OPERATIONS KNOWN AS SEX REASSIGNMENT SURGERY, AND PROVIDING PENALTIES THEREOF"
congress_website_abstract = "Declares the following --- \"SECTION 4. Other Unlawful Acts. (1) it shall be unlawful for any person to engage himself/herrsel f in any sex change operation or Sex Reassignment Surgery. (2) It shall be unlawful for any person to perform, initiate andexecute surgical procedure for changing the sex organi of a person. Moreover, it shall include all accessories and other persons who is found guilty for violation of the purposes of this Act.\" Prescribes penalties for violation of this Act."

