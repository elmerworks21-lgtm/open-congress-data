congress_website_title = "AN ACT REQUIRING MANUFACTURERS, PROMOTERS, AND/OR ADVERTISERS OF CIGARS AND CIGARETTES TO PRINT IN LEGIBLE OR BOLD LETTERS THE WARNING 'SALE TO MINORS ARE PROHIBITED AND PUNISHABLE BY LAW', ON THE PACKAGES OR CONTAINERS OF CIGARS AND CIGARETTES ANDPROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Requires all manufacturers, promoters, and/or advertisers of cigars and cigarettes to print in legible or bold letters the warning \"SALE TO MINORS IS PROHIBITED AND PUNISHABLE BY LAW\" on the packages or containers of cigars and cigarettes. Requiresall importers, consigness or suppliers of cigars and cigarettes manufactured abroad and exported to the Philippines prior to the sale, distribution, promotion and/or advertisement also to print in legible or bold letters the warning as stated above."

