congress_website_title = "AN ACT PRESCRIBING THE PHILIPPINE PATENTS ACT OF 1995, ESTABLISHING THE BUREAU OF PATENTS, TRADEMARKS AND TECHNOLOGY TRANSFER, PROVIDING FOR ITS POWERS AND FUNCTIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "Premises that the existing procedure for the examination and grant of patents, utility models and industrial designs is outdated. Seeks, therefore, to update the grant of patent with the introduction of certain changes, such as: (1) adoption of the\"first to file\" system to replace the first to invent system as the basis of the grant of patent; (2) adoption of the deferred examination procedure; (3) alignment of the patent law with the provisions of the Agreement on the TRADE RELATED ASPECTS OFINTELLECTUAL PROPERTY RIGHTS (TRIPS)."
