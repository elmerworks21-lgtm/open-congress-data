congress_website_title = "AN ACT REQUIRING LAWYERS AND LAW FIRMS WITH LUCRATIVE PRACTICE TO RENDER LEGAL SERVICES FREE OF CHARGE TO PAUPER CLIENTS AND TO REWARD THEM WITH TAX CREDITS FOR THEIR LEGAL SERVICES, OTHERWISE KNOWN AS THE 'PAUPERS LEGAL ASSISTANCE ACT'"
congress_website_abstract = "\"Paupers Legal Assistance Act\" Requires every lawyer who has practiced his profession for not less than three years and with P300,000.00 annual gross income for the preceding year and every law partnership duly registered with Securities and Exchange Commission with at least 10 lawyers, including partners, to render legal services to pauper clients."

