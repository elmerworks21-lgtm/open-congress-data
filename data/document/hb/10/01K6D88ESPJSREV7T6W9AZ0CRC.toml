congress_website_title = "AN ACT AMENDING ARTICLE 177 OF EXECUTIVE ORDER NO. 209, KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: Since laws are created to serve the welfare of man and not otherwise, and since there is growing awarenes that there is no such thing as superior, laws should make an exemption to the general rule least we undermine and oppress the minorities of our society, like the \"indigenous cultural communities\", by forcing them to embrace the Family Code without due reference and consideration of their distinct culture. > Seeks, therefore, to AMEND Article 177 of EO No. 209 to read as follows:\"Article 177.[Only] Children conceived and born outside of wedlock of parents who, at the time of the conception of the former were not disqualified by any impediment to marry each other, EXCEPT ON THE GROUND THAT EITHER OR BOTH THE PARENTS WERE BELOOW EIGHTEEN YEARS OF AGE, CAN [may] be legitimated. > LEGITIMATION ATTACHES TO CHILDREN WHOSE PARENTS WERE BELOW EIGHTEEN YEARS OF AGE AT THE TIME OF THEIR CONCEPTION OR BIRTH EVEN IN CASE EITHER OR BOTH PARENTS CONTRACTED THE MARRIAGE AFTER THE TERM"

