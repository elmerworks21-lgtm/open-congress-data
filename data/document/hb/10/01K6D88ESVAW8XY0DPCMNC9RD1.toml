congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1759, OTHERWISE KNOWN AS 'AN ACT PENALIZING CONTRACTORS AND SUB-CONTRACTORS WHO VIOLATE ANY MATERIAL PROVISIONS OF CONTRACTS INVOLVING PUBLIC WORKS PROJECTS' BY IMPOSING A FINE IN THE SUM OF ONE HUNDRED THOUSAND PESOS (P100,000.00) TO FIVE HUNDRED THOUSAND PESOS (P500,000.00) AGAINST THE CONTRACTOR WHOSE WORK IS FOUND TO BE SUBSTANDARD"
congress_website_abstract = "Rationale: One of the indicators of a progressive economy is the tremendous increase in the number of construction projects. Most of these projects are undertaken by private contractors contracted by the government. However, it has been observed that many public works projects being undertaken by private contractors are substandard. These substandard projects constitute a substantial violation of the provisions and requirements of their contract with government. >Seeks to AMEND Section 1, PD 1759, to read as follows: \"Any provisions of law to the contrary notwithstanding , contractors and subcontractors who violate any material provisions of ocntracts involving public works projects either as to materials, quality and quantity of work, reesulting to the prejudice of the government, shall suffer the penalty of from twelve (12) years to life imprisonment AND A FINE IN THE SUM OF P100,000.00 TO P500,000.00 at the discretion of the Court and shall,in addition, suffer perpetual disqual"

