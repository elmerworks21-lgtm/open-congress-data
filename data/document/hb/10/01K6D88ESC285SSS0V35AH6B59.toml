congress_website_title = "AN ACT REQUIRING OPERATORS OF PUBLIC UTILITY VEHICLES TO OBTAIN PERSONAL INSURANCE COVERAGE FOR THEIR RESPECTIVE DRIVERS"
congress_website_abstract = "\"Drivers Personal Liability Insurance Law (DPL)\" Provides for the following --- \"SECTION 2. COVERAGE - Upon effectivity of this Act, oeprators of public utility vehicles shall as a pre-requisite to registration with the LAND TRANSPORTATION OFFICE and/or LAND TRANSPORTATION FRANCHSING AND REGULATORY BOARD, obtain a personal insurance coverage for the amount of no less than FIFTY THOUSAND (P50,000.00) PESOS to cover accident and/or death of their respective drivers. A public utility driver is herein defined as one who actually oeprates a motor vehicle for commercial purposes.\""

