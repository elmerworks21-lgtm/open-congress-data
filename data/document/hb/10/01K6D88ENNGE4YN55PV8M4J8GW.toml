congress_website_title = "AN ACT AMENDING THE PROVISIONS OF ARTICLES 97 AND 99, OTHERWISE KNOWN AS THE REVISED PENAL CODE(RE: ALLOWANCE FOR GOOD CONDUCT OF ANY DETENTION PRISONER OR FINALLY CONVICTED, IN ANY PENAL INSTITUTION, REHABILITATION OR DETENTION CENTER OR ANY OTHERLOCAL JAIL...)"
congress_website_abstract = "Refers to these Revised Penal Code provisions: (1) ALLOWANCE FOR GOOD CONDUCT; and (2) WHO GRANTS TIME ALLOWANCE. Proposes these amendments to Articles 97 and 99 of the Revised Penal Code: \"Article 97. Allowance for Good conduct. - The good conductof any DETENTION PRISONER OR FINALLY CONVICTED, in any penal institution, REHABILITATION OR DETENTION CENTER OR ANY OTHER LOCAL JAIL, shall entitle him to the following deduction from the period of his sentence: (1) During the first two years of hisimprisonment, he shall be allowed a deduction of five days for each month of good behavior; (2) During the third to the fifth year, inclusive, of his imprisonment, he shall be allowed a deduction of eight days for each month of good behavior; (3) Durring the following years until the tenth, inclusive, of his imprisonment, he shall be allowed a deduction of ten days for each month of good behavior; and (4) During the eleventh and successive years of his imprisonment, he shall be allowed a deducti"

