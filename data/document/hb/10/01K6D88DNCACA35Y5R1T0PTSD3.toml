congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE SOLID WASTE MANAGEMENT AND CONTROL PROGRAM, PROMOTING REASEARCH AND DEVELOPMENT, PROVIDING INCENTIVES, DECLARING CERTAIN ACTS PROHIBITED, PROVIDING PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for a systematic and comprehensive solid waste management and control program in response to the nagging problem of garbage disposal. Promotes national reserch and development program for improved methods of solid waste management like collection, separation and recovery, recycling and environmentally safe disposal of non-recoverable residues."
