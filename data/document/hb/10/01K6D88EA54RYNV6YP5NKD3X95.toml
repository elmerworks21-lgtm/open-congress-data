congress_website_title = "AN ACT DECLARING APRIL 22 OF EVERY YEAR AS 'EARTH DAY' AND PROVIDING GUIDELINES FOR ITS OBSERVANCE AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the following \"SEC. 3. For the observance of this occasion, each year, the Department of Environment and Natural Resources, in coordination with the Philippine Information Agency, shall conduct an information camapaign on the serious global threats posed by environemnt pollution and over-exploitati on of natural resources. the Department of Education, culture and Sports shall require schools, colleges and universities to conduct lectures/semian rs, for contests and other means to foster awareness among their students on the above-mentioned subject matter."
