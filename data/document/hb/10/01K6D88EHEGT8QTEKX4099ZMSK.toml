congress_website_title = "AN ACT REQUIRING CLEARANCE FROM THE NATIONAL ECONOMIC DEVELOPMENT AUTHORITY OR THE BANGKO SENTRAL NG PILIPINAS, AS THE CASE MAY BE, ON ANY BUSINESS INVESTMENT ABROAD BY ANY GOVERNMENT-OWNE D OR -CONTROLLED CORPORATION, AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Rationale: While the government has been spending so much for the campaign to generate inflow of foreign capital to the country, which is vital to the beleaguered economy, the move of some government agencies, particularly the Government Service Insurance System to invest abroad, will nullify whatever gains the campaign has generated and will put to naught the government efforts to encourage foreign investments. The GSIS's monumental indiscretion in this case is an eye opener to the ned for proper safeguards in law to curtail capital flight as well as enable Congress, with its inherent power in appropriations, to keep track with government spending. President Ramos has udnertaken a series of trips aborad convincing investors to invest in tthe Philippines. All the efforts and expense to promote this end should be safeguarded in law."

