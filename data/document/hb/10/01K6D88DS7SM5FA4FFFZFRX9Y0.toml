congress_website_title = "AN ACT TO HARNESS THE REJECT ENERGY EXCESS CAPACITY OF PRIVATELY-OWNED POWER PLANTS AND GENERATING UNITS TO ENCOURAGE THE BUILDING OF SAID PLANTS UNITS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"ELECTRIC POWER SHARING AND COGENERATION ACT OF 1993\" Proposes to adopt a combination of power-sharing scheme and cogeneration concpet. This means that the government will have to make use of the excess power capacity of private power plants through the NAPOCOR and NEA. These power plants should be connected to the distribution system of the nearest public utility, the NAPOCOR grid or the transmission facilities of the NEA. The latter shall pay for the used excess power capacity."

