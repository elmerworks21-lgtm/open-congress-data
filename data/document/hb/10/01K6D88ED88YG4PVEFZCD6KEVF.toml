congress_website_title = "AN ACT PROVIDING FOR A TREASURY CROP SYSTEM IN THE PROCUREMENT OF PALAY TO BE GUARANTEED BY THE DEPARTMENT OF FINANCE TO ENSURE A FAIR RETURN ON THE INVESTMENT TO FARMER PRODUCERS AND ASSURING THE NATIONAL FOOD AUTHORITY (NFA) OF RETURNS FOR ITS OPERATIONS, MAKING NFA A SELF-EARNING AGENCY IN THE GOVERNMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Empowers the Dept. of Finance and the National food Authority to execute the State policy to promote and integrated growth and development of the food industry. The State shall encourage increased and efficient productivity by assuring a fair returnon investments to farmer producers and by ensuring the government of revenues for its operations."
