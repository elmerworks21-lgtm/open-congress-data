congress_website_title = "AN ACT PROVIDING FOR THE CONSERVATION AND PROTECTION OF WILDLIFE RESOURCES AND THEIR HABITATS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Wildlife Resources Conservation and Protection Act\" Aims to ease the mounting pressure brought about by the overexploitatio n of the country's resource base. Implements wildlife conservation program with greater impetus. States that it is about time that preservation and protection of the country's wildlife resources be put in high concerns because a high degree of biodiversity indicates an ecologically stable environment and an ecologically stable environment assures the citizenry or a sustainable flow of natural goods. * * *"
