congress_website_title = "AN ACT AMENDING SECTION 30 OF REPUBLIC ACT NO. 6975, OTHERWISE KNOWN AS THE 'DEPARTMENT OF INTERIOR AND LOCAL GOVERNMENT ACT OF 1990' WAIVING THE HEIGHT AND EDUCATIONAL REQUIREMENTS FOR ACCEPTANCE TO THE PHILIPPINE NATIONAL POLICE OF APPLICANTS FROMTHE AUTONOMOUS REGION OF MUSLIM MINDANAO AND THE CORDILLERA ADMINISTRATIVE REGION"
congress_website_abstract = "Rationale: The present situation in the ARMM and the CAR requires the integration of \"rebel returnees\" to the mainstream with either the ARMED FORCES OF THE PHILIPPINES and/or the PHILIPPINE NATIONAL POLICE as option against earlier request for thecreation and organization of the autonomous region's own Regional Security Force. > This would however be possible only if the laws governing both the AFP and PNP are amended to accommodate integrees who by sheer lack of opportunity would not have been able to obtain the required educational units or by culture, and heredity and/or environment could not not reach the minimum height requirements."
