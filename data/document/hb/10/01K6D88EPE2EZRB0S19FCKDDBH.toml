congress_website_title = "AN ACT ESTABLISHING A NATIONAL MUSEUM SYSTEM, PROVIDING FOR ITS PERMANENT HOME AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Since its inception in 1901 the National Museum has evovled, adapting to the changes in Philippine societies, matching services with public needs. The mandates that give authority to the operations of the museum are widely distributed invarious legislation that have been passed through the years. There is no single charter that enables the operation of the National Museum to serve all the scientific and cultural needs of our present day societies that make up the Filipino nation. \"National Museum System Act of 1997\" Declares the following --- \"SECTION 2. It is the policy of the State to pursue and support the cultural development of the Filipino people through the perservation, enrichment and dynamic evolution of a Filipino Naational Culture, based on the principle of unity in diversity in a climate of free artistic and intellectual expression. The State shall also protect, restore and develop the nation's historic and cultural heritage, and promote the recognition, respe"
