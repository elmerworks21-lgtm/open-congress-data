congress_website_title = "AN ACT INSTITUTIONALIZ ING THE BARANGAY INTEGRATED DEVELOPMENT APPROACH FOR NUTRITION IMPROVEMENT (BIDANI) OF THE RURAL POOR AS A NETWORK PROGRAM OF PARTICIPATING STATE COLLEGES AND UNIVERSITIES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Statistics disclosed that nearly 72 percent of filipino household are not meeting their daily energy requirements simply because they are poor and cannot afford nutritious food. The Food and Nutrition Research Institute's study conductedin 1990 showed that 13.9 percent of our pre-school children were affected by protein-energy malnutrition. the same study also showed that 7.6 percent and 1.4 percent of the filipino children suffered from acute malnutrition and severe chronic malnutrition, respectively. BIDANI Act of 1996\" Seeks to --- (1) encourage cooperation and participation of academic institutions and local governments in promoting the nutritional well-being of the country; (2) evolve an effective action-research networkk program to improve the nutrition and general well-being of the poor."

