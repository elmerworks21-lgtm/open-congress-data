congress_website_title = "AN ACT STABILIZING THE PRICE AND SUPPLY OF RICE AND CORN THROUGH A PRICE SUPPORT PROGRAM,AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Declares it the policy of the State to maintain an adequate and continuous supply of rice and corn at affordable prices through a PRICE SUPPORT PROGRAM. Appropriates the amount of FIVE BILLION PESOS (P5,000,000,000 .00) annually to support the pricesupport program which shall be collected from the proceeds of the taxes and tariffs on the importation of all agricultural products in their raw and basic forms."

