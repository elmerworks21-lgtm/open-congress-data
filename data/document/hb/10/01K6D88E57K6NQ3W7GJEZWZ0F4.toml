congress_website_title = "AN ACT PROTECTING USERS OF TELEGRAPH, RADIO OR ANY OTHER COMMUNICATIONS SYSTEM IN THE PHILIPPINES AND PRESCRIBING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Declares it UNLAWFUL for anyy telegraoh, radio, or other communication firms TO FAIL, by design or neglect, to deliver any communication or message duly addressed and paid for WITHIN SIX (6) HOURS in case of \"rush\" or \"urgent\" communications, and TWELVE (12) HOURS in case of \"ordinary\" communications, from the filing thereof. Prescribes penal sanctions."

