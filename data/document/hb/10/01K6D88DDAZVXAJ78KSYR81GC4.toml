congress_website_title = "AN ACT INCREASING THE RETIRMENT AND SEPARATION BENEFITS OF MILITARY PERSONNEL OF THE ARMED FORCES OF THE PHILIPPINES AND THEIR DEPENDENTS, AMENDING FOR THE PURPOSE THE AFP MILITARY PERSONNEL RETIREMENT AND SEPARATION DECREE OF 1979, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes an increased retirement pay for AFP military personnel, equivalent to [2 1/2%] THREE AND THREE FOURTHS PER CENT (3.75%) for each year of active service rendered, but not exceeding [85%] ONE HUNDRED PERCENT (100%) of the monthly base and longevity pay of the grade next higher than the permanent grade last held."
