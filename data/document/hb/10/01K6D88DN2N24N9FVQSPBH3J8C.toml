congress_website_title = "AN ACT AMENDING THE PROVISIONS OF PRESIDENTIAL DECREE NO. 1606, OTHERWISE KNOWN AS REVISING PRESIDENTIAL DECREE NO. 1486 CREATING A SPECIAL COURT TO BE KNOWN AS 'SANDIGANBAYAN' BY PROVIDING ADDITIONAL SPECIAL DIVISION FOR ENVIRONMENT AND ECOLOGY THEREOF WHICH SHALL EXCLUSIVELY HEAR, TRY AND DECIDE SPECIAL CASES INVOLVING THE DESTRUCTION OF ENVIRONMENT AND ECOLOGY IN THE COUNTRY AND FOR OTHER PURPOSES"
congress_website_abstract = "Enumerates cases wherein the SPECIAL DIVISION FOR ENVIRONMENT AND ECOLOGY shall have the exclusive and original jurisdiction to hear, try and decide cases of environment and ecological destructions. Empowers the Special Division to compel officers and other persons in any corporation, association, partnership, manufacturing industry and the like to cease and desist from harmful oeprations against our country's environment and ecology."

