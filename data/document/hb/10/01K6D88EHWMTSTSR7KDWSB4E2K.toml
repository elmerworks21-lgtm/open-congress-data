congress_website_title = "AN ACT PROVIDING FOR AN EXPEDITIOUS PROCESSING, REGISTRATION OF BUSINESSES AND ISSUANCE OF PERMITS, LICENSES AND CONCESSIONS AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Rationale: Any person, establishment or corporation cannot commence the operation of any business unless a right or permission is granted by a government licensing agency in accordance with the rules and regulations legally promulgated. These individuals and/or juridical persons seeking such documents must be acorded fast, prompt and efficient frontline services. Applies to all government offices and agencies, including local government units and government-owne d or-controlled corporations with original charters rendering related services. States what are considered VIOLATIONS under this Act; prescribes penalties."

