congress_website_title = "AN ACT DEREGULATING THE DOWNSTREAM OIL INDUSTRY, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The 1997 Downstream Oil Industry Deregulation Act\" Contains these salient features --- (1) incorporates ANTI-TRUST PROVISIONS as implemented in other countries; (2) promotes the long-term structure of the oil including; and (3) adds NEW provisionsthat will attract and protect new players in the downstream oil industry in the form of incentives."
