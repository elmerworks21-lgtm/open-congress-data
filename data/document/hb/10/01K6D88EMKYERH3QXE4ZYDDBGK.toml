congress_website_title = "AN ACT AMENDING THE SECOND PARAGRAPH OF SECTION 11 OF REPUBLIC ACT NO. 8150, OTHERWISE KNOWN AS THE PUBLIC WORKS AND HIGHWAYS INFRASTRUCTURE PROGRAM ACT OF 1995, AND FOR OTHER PURPOSES"
congress_website_abstract = "In line with the policy of DECENTRALIZATIO N, this bill proposes that the authority to negotiate and approve contracts be delegated to the District engineer if the project cost is THREE MILLION PESOS (P3 M) or less, and to the Regional Director if the project cost more than P3 M or more, but NOT exceeding FIVE MILLION PESOS (P5 M)."

