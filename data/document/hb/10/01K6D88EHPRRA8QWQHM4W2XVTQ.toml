congress_website_title = "AN ACT IMPOSING A LEVY OF TWENTY-FIVE PERCENT ON THE GROSS INCOME DERIVED FROM THE MANUFACTURE OF CONTAINERS, BAGS, BOTTLES, WRAPPERS, OR PACKAGES OF CONSUMER PRODUCTS WITH THE USE OF NON-BIODEGRADAB LE PLASTIC MATERIALS, AND PROVIDING PENALTIES FORVIOLATION THEREOF"
congress_website_abstract = "Rationale: Plastic materials are very toxic when burned, emitting poisonous gases such as chlorine, sulfuric acid and cyanides which pollute the atmosphere. The effects of inhaling smoke from these materials can lead to inflammation of the mucous membrance in the respiratory tract, leadding to edema of the bronchial tubes and blood vessels in the lungs. Proposes the following schedule of paying the proposed levy: (1) 5% for the first year of implementation; (2) 10% for the second year; (3) 15%for the third year; (4) 20% for the fourth year; and (5) 25% for the fifth year and thereafter. Penalizes violation of this Act."

