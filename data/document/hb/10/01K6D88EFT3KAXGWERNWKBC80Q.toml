congress_website_title = "AN ACT TO INCREASE THE MONTHLY PENSION OF RETIREES UNDER THE SOCIAL SECURITY SYSTEM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 1161, AS AMENDED, OTHERWISE KNOWN AS 'THE SOCIAL SECURITY LAW'"
congress_website_abstract = "Amends Section 12 of RA 1161 to read as follws: \"SECTION 12. Montly pension - (a) The monthly pension shall be the sum of the following:> The average monthly salary credit [Multiplied by the replacement ratio;] FOR THE LAST FIVE YEARS PRIOR TO DISABILITY/SEPA RATION/DEATG/RE TIREMENT; and > One and half percent of the average monthly salary credit for each credited year of service in excess of ten years. > (b) The monthly pension shall in no case be less than two [hundred] THOUSAND pesos norpaid in an aggregate amount of less than sixty times the monthly pension except to a secondary beneficiary.\""
