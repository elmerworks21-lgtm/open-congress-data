congress_website_title = "AN ACT AUTHORIZING THE PROVINCIAL VICE-GOVERNOR TO SIT AS MEMBER OF THE PROVINCIAL DEVELOPMENT COUNCIL, AMENDING FOR THE PURPOSE SECTION 107 (C) OF REPUBLIC ACT NO. 7160"
congress_website_abstract = "Substantiates the following rationale --- \"The provincial vice governor as presiding officer steers the proceedings of the Sangguniang Panlalawigan and therefore, it is necessary for him to have a first hand knowledge in the formulation of the development plans and programs. And this can only be done if the vice governor is also made a member of the provincial development council.\""

