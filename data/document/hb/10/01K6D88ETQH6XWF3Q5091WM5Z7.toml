congress_website_title = "AN ACT REQUIRING FOURTH YEAR HIGH SCHOOL STUDENTS TO PLANT TEN (10) BAMBOO PLANTS AS ONE OF THE REQUISITES FOR GRADUATING FROM SECONDARY EDUCATION"
congress_website_abstract = "\"Bamboo Planting Act\" Provides, therefore, for the following --- \"SEC. 4. Secondary students who are in their fourth year of schooling are hereby required to plant at least ten (10) bamboo plants in planting area designed by the Department of Environment and Natural Resources. Such requirement will constitute part of the requisites for them to be officially considered to have graduated from secondary education.\""

