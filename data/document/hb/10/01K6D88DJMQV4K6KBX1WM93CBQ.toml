congress_website_title = "AN ACT TO UPGRADE THE QUALIFICATIONS, RANKS, PREROGATIVES, SALARIES, ALLOWANCES, AND PRIVILEGES OF THE GOVERNMENT CORPORATE COUNSEL, THE DEPUTY GOVERNMENT CORPORATE COUNSEL, THE ASSISTANT GOVERNMENT CORPORATE COUNSELS AND THE STATE CORPORATE ATTORNEYS, AMENDING FOR THE PURPOSE SECTION TEN, CHAPTER 3, TITLE III, BOOK IV OF EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE ADMINISTRATIVE CODE OF 1987, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides sufficient incentives and privileges in recognition of the vital role of the Office of the Government Corporate Counsel (OGCC) in safeguarding the legal interests of government corporations. Intends to upgrade qualifications for appointment, ranks and prerogatives of the government corporate counsels to make these at par with other government employees holding similar positions."

