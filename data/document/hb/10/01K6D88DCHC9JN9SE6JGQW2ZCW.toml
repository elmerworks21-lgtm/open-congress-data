congress_website_title = "AN ACT STRENGTHENING THE CROP INSURANCE PROGRAM OF GOVERNMENT, FURTHER AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 1467, AS AMENDED"
congress_website_abstract = "Seeks to provide insurance protection to farmers by COVERING THE COST OF MATERIAL INPUTS, PLUS FIFTY PERCENT (50%) OF THE VALUE OF MATERIAL INPUTS TO COVER THE COST OF OTHER PRODUCTION INPUTS, HIS HOUSEHOLD, PAID LABOR, PORTIONS OF EXPECTED YIELD AND OPPORTUNITY COST. Proposes a NEW section to PD 1467, Establishing a Crop Insurance Program, which deals on SETTLEMENT OF CLAIMS. * * *"
