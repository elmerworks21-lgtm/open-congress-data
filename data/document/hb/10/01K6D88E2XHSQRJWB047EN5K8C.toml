congress_website_title = "AN ACT REQUIRING EMPLOYEES IN PRIVATE ESTABLISHMENTS TO DEFINE WITH SUFFICIENT PRECISION THE CONDITIONS OF EMPLOYMENT UNDER THEM AND TO MAKE SUCH CONDITIONS KNOWN TO WORKERS EMPLOYED BY THEM, OTHERWISE KNOWN AS THE EMPLOYMENT CONDITION ACT OF 1995"
congress_website_abstract = "Requires employers to inform their workers in formal writing regarding ALL THE TERMS AND CONDITIONS OF EMPLOYMENT, as well as training requirements, employment policies, rules and regulations and social security schemes. Seeks to enhance the inspectorate and law enforcement functions of the DOLE."

