congress_website_title = "AN ACT GRANTING GOVERNMENT BANKS THE POWER TO ADOPT A COMPENSATION AND POSITION CLASSIFICATION SYSTEM FOR THEIR OFFICERS AND EMPLOYEES"
congress_website_abstract = "Allows government banks to adjust the salaries of their officers and employees which shall be comparable with the prevailing compensation plans in the private sector, to enable them to be competitive in the market for trained and highly qualified personnel. Authorizes said banks to adopt a compensation, position classification system and qualification standards based on a comprehensive job analysis and audit of actual duties and responsibilitie s."

