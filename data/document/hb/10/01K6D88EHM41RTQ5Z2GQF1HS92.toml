congress_website_title = "AN ACT AMENDING SECTIONS 14, 15, AND 16 OF CHAPTER 5, TITLE III OF EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE ADMINISTRATIVE CODE OF 1987 BY RENAMING THE PUBLIC ATTORNEY'S OFFICE AS THE 'PUBLIC DEFENDER'S OFFICE'"
congress_website_abstract = "Rationale: To be truly reflective of the lofty purpose of said office this bill seeks to change the name of the Public Attorney's Office to the PUBLIC DEFENDER'S OFFICE. A defender, after all, is a protector, advocate, champion, vindicator and upholder. By renaming this office as the Public Defender, it will hopefully eradicate misperception that only the rich get justice and only the poor are aggrieved. It would give life to the often quoted message of the late President Ramon Magsaysay that\"those who have less in life should have more in law.\""

