congress_website_title = "AN ACT INSTITUTING A CHILDREN'S WELFARE FUND FOR THE PROTECTION AND REHABILITATION OF ABANDONED, ABUSED AND SEXUALLY EXPLOITED CHILDREN, AMENDING FOR THIS PURPOSE REPUBLIC ACT NUMBERED 7610, OTHERWISE KNOWN AS 'THE SPECIAL PROTECTION OF CHILDREN AGAINST CHILD ABUSE, EXPLOITATION AND DISCRIMINATION ACT'"
congress_website_abstract = "Rationale: The State is duty bound under the Constitution to promote and protect our children's physical, moral, spiritual, intellectual and social well-being so that they will be fully prepared when they assume their responsibility in shaping our country's future. > By giving them the proper environment they need, these chidlren will make this nation truly great. Prescribes the sources of the proposed Fund, as well as its management."

