congress_website_title = "AN ACT TO INSTITUTE THE POLICIES ON THE SUPPRESSION OF TRAFFICKING OF FILIPINO WOMEN; AND THE ESTABLISHMENT OF A HIGHER STANDARD OF PROTECTION AND REHABILITATION OF VICTIMS OF TRAFFICKING, FORCED PROSTITUTION, SEXUAL SERVITUDE AND EXPLOITATION INCLUDING COMMERCIALIZED TRANSNATIONAL MARRIAGES, MIGRATION FOR ENTERTAINMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Ati-Trafficking of Filipino Women Act of 1996\" Recognizes the equal rights and inherent human dignity of women and men. Declares it a State policy to bring national law and practice into compliance with international standards so as to insure full protection and assistance to women. Establishes the INTER-AGENCY COUNCIL AGAINST TRAFFICKING tasked to monitor compliance with this Act."
