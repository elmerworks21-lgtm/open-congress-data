congress_website_title = "AN ACT PROHIBITING PERSONS WHO ACCEPT PAYMENTS FOR GOODS OR SERVICES FROM GIVING CHANGE THAT IS LESS THAN THE AMOUNT THAT IS DUE THE PAYER, AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "\"Exact Change Act of 1996\" Provides for the following --- \"SECTION 4. Prohibition Against Giving of Less than Exact Change - No person shall give change which shall be less than the amount that must be given to the payer, even if the consent of thecustomer is obtained. In the absence of any money that will correspond top the amount of the change, the payee shall give more than the amount that is required and shall shoulder the difference. The following acts are also prohibited: (1) Giving candies, cugarettes and other items as change. (2) Asking the payer for permission to give change that is less than the exact amount or to give other items as change. (3) Giving credit to the payer for subsequent purchases as change. (4) Not giving anychange because of the asence of loose change."

