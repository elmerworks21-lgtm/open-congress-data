congress_website_title = "AN ACT RATIONALIZING THE GRANT BY THE FILM RATINGS BOARD OF AMUSEMENT TAX REBATES TO QUALITY MOTION PICTURES AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: This bill seeks to improve and increase the number of quality films of the local movie industry by offering tax incentives for those productions that achieve meritorious standards in their work. > Authorizes the Film Ratings board (FRB) to grant tax rebates on the amusement tax imposed on films that meet its criteria. The FRB may grant rebates according to this schedule: \"A\" - 60%; \"B\" - 30%; \"C\" -10%. The FRB shall grant tax rebates to at least 30 local film productions every year."

