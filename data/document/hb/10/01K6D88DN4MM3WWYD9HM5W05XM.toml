congress_website_title = "AN ACT GRANTING ALL MEMBERS OF THE SSS AND GSIS ADDITIONAL LUMP-SUM BENEFIT TO ENABLE THEM TO INVEST IN SMALL SCALE BUSINESS VENTURES"
congress_website_abstract = "Authorizes all SSS and GSIS members to withdraw, at their option, seventy (70%) percent of their contributions on a lump sum acount equivalent to the first 10, 15, 20, 25, 30, 35, and 40 years of their service together with their employer's share and their earned interest during the corresponding period to be used as an investment in small scale business ventures. Provides for the exercise of such option only once without prejudice to the continuance of membership and the amount granted to theoption shall be deducted from whatever retirement benefits a member is entitled."
