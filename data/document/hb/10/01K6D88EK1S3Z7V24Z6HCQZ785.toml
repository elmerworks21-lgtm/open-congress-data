congress_website_title = "AN ACT PROVIDING FOR AN INCREASE OF PER DIEM TO TEACHERS WHO RENDER THEIR SERVICES DURING ELECTION REGISTRATION AND DAY OF ELECTION, AMENDING SECTION 31 OF REPUBLIC ACT NO. 7166"
congress_website_abstract = "Provides due recognition, incentives, assistance and benefits to teachers who are instrumental in making every electoral exercise successful. Amends therefore Section 31 of Republic Act No. 7166 to INCREASE the per diem of election inspectors/canv assers as follows: a) for service rendered on the day of registration and revision of ballots - [P200.00] P400.00; (b) services rendered on the day of election - [P400.00] P750.00; (c) services rendered during the canvassing of election ballots - [0]P750.00. Also proposes for the following : (1) financial assistance for those who unfortunately become casualty in an election-relate d violence; (2) plaque of appreciation or undue recognition for heroic act in guarding the sacredness of the electiion ballots; and (3) appropriate sanctions and penalty for those who are reportedly guilty of misconduct and/or anomalous action during election."

