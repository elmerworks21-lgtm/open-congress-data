congress_website_title = "AN ACT AMENDING SECTION 343 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE 'LOCAL GOVERNMENT CODE OF 1991,' AND APPROPRIATING FUNDS THEREFOR(NOTE: BENEFITS OF BARANGAY OFFICIALS)"
congress_website_abstract = "Rationale: With the effectivity of the Local Government Code of 1991, the powers and functions of the barangay officials are correspondingly expanded. Unfortunately, the affected barangay officials received minimal compensation for their services. Proposes the following --- \"Sec. 393. Benefits of Barangay Officials - (a) Barangay officials including barangay tanods and members of the lupong tagapamayapa , shall received honoraria, allowances and such other emoluments as may be authorized by lawor barangay, municipal or city ordinance in accordance with the provisions of this Code, but in no case shall it be less than TWO THOUSAND PESOS (P2,000.00) per month for the punong barangay and ONE THOUSAND PESOS (P1,000.00) per month for the sanggguniang barangay members, barangay treasurerm and barangay secretary: x x x.\""

