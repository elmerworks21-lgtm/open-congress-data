congress_website_title = "AN ACT AMENDING SECTION 12 OF REPUBLIC ACT NO. 6727 OF THE LABOR CODE OF THE PHILIPPINES BY INCREASING THE PENALTY AND IMPOSING DOUBLE INDEMNITY FOR VIOLATION OF THE PRESCRIBED INCREASES OR ADJUSTMENTS IN THE WAGE RATES OF WORKERS IN THE PRIVATE SECTOR"
congress_website_abstract = "Penalizes any person or association which refuses or fails to pay prescribed increases/adjus tments in wage rates with a fine not less P25,000.00, nor more than P250,000.00, and imprisonment of three (3) to six (6) years. The EMPLOYER concernced shall also pay, by way of RESTITUTION, an amount equivalent to double the unpaid benefits owing to the employees."
