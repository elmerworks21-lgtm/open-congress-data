congress_website_title = "AN ACT INCREASING THE JURISDICTION OF THE DAR ADJUDICATION BOARD (DARAB), AMENDING FOR THE PURPOSE SECTION FIFTY-SEVEN OF REPUBLIC ACT NUMBERED SIXTY-SIX HUNDRED AND FIFTY-SEVEN, OTHERWISE KNOWN AS THE COMPREHENSIVE AGRARIAN REFORM LAW OF NINETEEN HUNDRED AND EIGHTY-EIGHT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to ensure the immediate disposition of agrarian cases in order to help expedite the implementation of the Comrephensive Agrarian Reform by vesting the DAR ADJUDICATION Board the original and exclusive jurisdiction over all petitions for the determination of just compensation to landowerns and the prosecution of all criminal offenses arising from the implementation of the CARP>"
