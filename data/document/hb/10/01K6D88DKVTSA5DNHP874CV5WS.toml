congress_website_title = "AN ACT AMENDING THE JUDICIARY REORGANIZATION ACT OF 1981, CONSTITUTING ALL MUNICIPAL TRIAL COURTS IN HIGHLY URBANIZED CITIES AS METROPOLITAN TRIAL COURTS"
congress_website_abstract = "Constitutes as METROPOLITAN TRIAL COURTS all Municipal Trial Courts in highly urbanized cities. States that the judges of said Municipal Trial Courts shall be called METROPOLITAN TRIAL JUDGES, and their salaries and privileges shall be the same as their counterpart in the Metropolitan Trial Courts of Metro Manila."

