congress_website_title = "AN ACT CREATING THE TRADITIONAL AND ALTERNATIVE HEALTH CARE INSTITUTE TO ACCELERATE THE DEVELOPMENT OF TRADITIONAL AND ALTERNATIVE HEALTH CARE IN THE PHILIPPINES, PROVIDING FOR A TRADITIONAL AND ALTERNATIVE HEALTH CARE DEVELOPMENT FUND AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares it the policy of the State to seek a legally workable basis by which indigenous societies would own their knowledge of TRADITIONAL MEDICINE, control whether any of that knowledge may be used by outsiders... Defines the powers and functionsof the proposed ALTERNATIVE HEALTH CARE INSTITUTE."
