congress_website_title = "AN ACT ESTABLISHING A COMPREHENSIVE JUVENILE JUSTICE SYSTEM, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Comprehensive Juvenile Justice System\" Applies to all youth offenders who are over nine (9) years but under eighteen (18) years of age at the time of the commission of the offense. Provides for a humane, effective and fair treatment of juvenile offenders in all stages of legal proceedings. Emphasizes on the promotion of the well-being and the rehabilitation of the offenders rather than on exacting retribution to them."

