congress_website_title = "AN ACT PROMOTING THE PHILIPPINE SHIPPING AND THE EXPORT INDUSTRIES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Shipping and Export Development Act of 1997\" Declares it the policy of the State to support, promote and encourage the growth and development of the shipping industry by --- (1) promoting and encouraging exporters to use Philippine FlagCarriers in the shipment of goods to international destinations; (2) adopting tax measures, policies, and programs required for the immediate development and accelerated growth of the industires shipping and export; (3) institutionaliz ing the effective partnership of the export and shipping industry in the advancement and promotion, of Philippine exports abroad through the necessary grant of tax benefits."

