congress_website_title = "AN ACT AMENDING SECTION 40 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Amends Section 40 (a) of RA 7160 the Local Government Code, regarding DISQUALIFICATIO NS of persons running for a elective local position, to read as follows: \"SEC. 40. Disqualificatio ns. - (a) Those sentenced by final judgment for an offense involving moral turpitude or for an offense punishable by one (1) year or more of imprisonment, within [two (2)] FOUR (4) YEARS afteer serving sentence; (b) Those convicted by final judgment for vioalting the oath of alleigance to the Republic; (c) Thosewith dual citizenship; (d) Fugitive from justice in criminal or nonpolitical cases [here or abroad] in the PHILIPPINES; (e) THOSE SENTENCED BY FINAL JUDGMENT FOR ILLEGAL GAMBLING; (f) Permanent residents in foreign country or those who have acquiredthe right abroad and continue to avail of the same right after the effectivity of this Code; and (g) The insane or feeble-minded.\""

