congress_website_title = "AN ACT PROVIDING SECTORAL REPRESENTATION FOR SENIOR CITIZENS IN LOCAL LEGISLATIVE BODIES, AND AMENDING FOR THE PURPOSE SECTIONS 390, 446, 457, AND 467 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rationale: The elderly seek to be represented in the local legislative council for these reasons; (1) They comprise a large segment of the population of any local community; (2) The accumualted knowledge and experience of the elderly is certain to enrich local policy orientations; and (3) The nationwide organization of senior citizens needs to be supported and strengthened in order to consolidate efforts responsive to their needs and to provide for them adequate social services. \"Senior citizens Representative Act of 1996\""

