congress_website_title = "AN ACT ESTABLISHING A NATIONAL MUSEUM SYSTEM, PROVIDING FOR ITS PERMANENT HOME AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale : This bill thus seeks to provide the present National Museum with a permanent site to house the priceless artifacts which truly reflect our cultural heritage. The regional branches sought to be established will become agents of educationin diverse fileds ranging from history, anthropology, geology, paleontology and other branches of science and culture, reflecting our glorious historical past andd cultural legacy. Identifies the various aspects of the proposed Museum System; authorizes the National Musuem to deputize national andd local police authorities and thee AFP to protect newlt discovered archaelogical sites and to report the discoverry of such sites."
