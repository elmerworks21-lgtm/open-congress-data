congress_website_title = "AN ACT AUTHORIZING THE CONSTRUCTION AND OPERATION OF A DESALINATION PLANT ON A BUILD-OPERATE-T RANSFER (BOT) SCHEME TO COMPLIMENT AND AUGMENT THE PRESENT SOURCE OF WATER SUPPLY FOR DOMESTIC, INDUSTRIAL AND AGRICULTURAL USE WITHIN METRO MANILA, OTHERCITIES AND PROVINCES OF THE PHILIPPINES"
congress_website_abstract = "\"National Water Supply Development Program of the Philippines\" Is premised on the following objectives: (1) To complement and augment the existing water supply; (2) To thwart the negative effects of a water shortage brought about by the El Nino phenomenon; and (3) To make use of the availability and abundance of sea water in the Philippines."

