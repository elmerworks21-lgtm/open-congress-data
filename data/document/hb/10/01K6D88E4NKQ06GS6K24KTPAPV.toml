congress_website_title = "AN ACT AMENDING SECTION 4 OF REPUBLIC ACT NO. 7438,' 'ENTITLED AN ACT DEFINING CERTAIN RIGHTS OF PERSON ARRESTED, DETAINED OR UNDER CUSTODIAL INVESTIGATION AS WELL AS THE DUTIES OF THE ARRESTING, DETAINING AND INVESTIGATING OFFICERS AND PROVIDING PENALTIES FOR VIOLATION THEREOF'"
congress_website_abstract = "Amends Section 4(a) of RA 7438 to read as follows: \"Section 4 Penalty Clause - a) Any arresting public officer or employee or any investigating officer, who fails to inform any person arrested, detained or under custodial investigation of his rightto remain silent and to have competent and independent counsel preferably of his own choice, shall suffer a fine of Six Thousand (P6,000.00) or a penalty of imprisonment of not less than THREE (3) YEARS BUT NOT MORE THAN FIVE (5) YEARS, OR BOTH ....."
