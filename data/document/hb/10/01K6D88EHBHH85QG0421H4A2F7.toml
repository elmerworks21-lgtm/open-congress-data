congress_website_title = "AN ACT CREATING A BODY CORPORATE TO BE KNOWN AS THE PHILIPPINE GENERAL HOSPITAL, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES (up-pgh)"
congress_website_abstract = "Rationale: Incidentally, other medical institutions have their own charters, e.g. the Heart Center and the Chidlreen's Hospita, yet Philippine General Hospital, which is supposed to be the principal and showcase State medical institution, does not have any. > It is therefore the objective of this Bill to give the PGH the status that it deserves in order to be considered really as the prime State hospital, free to chart its own course pursuant to itss nature as such institutions and in accordance with the policies embodied in the Bill. \"The Philippine General Hospital Charter\""

