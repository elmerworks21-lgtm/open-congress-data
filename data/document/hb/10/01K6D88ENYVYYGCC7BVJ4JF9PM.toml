congress_website_title = "AN ACT ALLOCATING FUNDS FOR THE IMPLEMENTATION OF A SIX-YEAR (6 YR.) FEEDING PROGRAM FOR CHILDREN AND A NUTRITION EDUCATION PROGRAM FOR PARENTS NATIONWIDE"
congress_website_abstract = "Rationale: This bill seeks therefore to implement a feeding program for pre-school and primary school children and nutrition education for parents to arrest the problem of malnutrition. The feed program is also expected to encourage parents to sendtheir children to school which would reduce the high drop out rate now being experienced. The intervention is graduated and limited to a period of six years to preclude dependency among local governments. Explains the NUTRITION PROGRAM proposed in this Act; prescribes the allocation of FUNDS for this purpose as follows: SEC. 3 Extent. Funds shall be made available to barangays to the extent as follows: (1) Barangays in 6th class municipalites - 100%: (2) Barangays in 5th class municipalities -90%; (3) Barangays in 4th class municipalities - 80%; (4) Barangays in 3rd class municipalities - 70%; (5) Barangays in 2nd class municipalities - 60%; and (6) barangays in 1st class municipalities - 50%."

