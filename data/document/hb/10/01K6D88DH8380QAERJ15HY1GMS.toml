congress_website_title = "AN ACT FURTHER AMENDING THE PROVISIONS OF PRESIDENTIAL DECREE NO. 442 ON ILLEGAL RECRUITMENT AND PROVIDING FOR THE FILING OF ILLEGAL RECRUITMENT CASES IN THE PLACE OF RESIDENCE OR WORK OF THE COMPLAINANT VICTIM"
congress_website_abstract = "States that --- THE CRIMINAL AS WELL AS CIVIL ACTION FOR DAMAGES IN CASES OF ILLEGAL RECRUITMENT PROVIDED IN THIS CODE, AS AMENDED, AND/OR ESTAFA COMMITTED INCIDENT THERETO, SHALL BE FILED SIMULTANEOUSLY OR SEPARATELY WITH THE PROPER COURT OF THE PROVINCE OR CITY WHERE ANY OF THE OFFENDED PARTIES ACTUALLY RESIDES AT THE TIME OF THE COMMISSION OF THE OFFENSE: PROVIDED, THAT THE CIVIL ACTION SHALL BE FILED IN THE SAME COURT WHERE THE CRIMINAL ACTION IS FILED AND VICE VERSA: PROVIDED FURTHER, THATTHE COURT WHERE THE CRIMINAL ACTION OR CIVIL ACTION FOR DAMAGES IS FIRST SHALL ACQUIRE JURISDICTION TO THE EXCLUSION OF OTHER COURTS."

