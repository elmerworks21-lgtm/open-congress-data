congress_website_title = "AN ACT PROVIDING FOR THE CONFIRMATION OF WORLD WAR II MILITARY SERVICES"
congress_website_abstract = "Creates the MILITARY SERVICE CONFIRMATION BOARD which shall be tasked to provide a process by which the military services of patriotic Filipinos and foreign nationals during World War II may be CONFIRMED by the AFP, making them eligible for military veteran status with the corresponding honor, rights, benefits and privileges due them."
