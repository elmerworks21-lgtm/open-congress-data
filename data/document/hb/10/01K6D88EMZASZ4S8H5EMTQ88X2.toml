congress_website_title = "AN ACT AMENDING SECTION 10 OF REPUBLIC ACT NO. 6728, OTHERWISE KNOWN AS GOVERNMENT ASSISTANCE TO STUDENTS AND TEACHERS IN PRIVATE EDUCATION (GASTPE)(RE: TUITION FEE INCREASES)"
congress_website_abstract = "Rationale: This bill intends to provide a mechanism different sectors of our educational system can equally exercise their rrights to express their positions in any proposed increase in the rate of tuition and/or other school fees. Furthermore, apart from financial statements, the school administration is required to submit expansion and wage increase plans for faculty and non-faculty members, among others. With these, it is hoped that the informed participation of all the affected sectors canbe solicited and consdired before a major decision such as a tuition fees increase can be made. >Provides for the following --- \"Section 10. Consultation - AT LEAST SIX MONTHS PRIOR [In] any proposed IMPLEEMNTATION OF AN increase in the rate of tuittion fee AND/OR OTHER SCHOOL FEES, there shall be a COMPREHENSIVE AND appropriate consultation conducted by the school administration with the duly organized parents and teacher associations, [and] faculty [association] AND NON-ACADEMIC FACULTY ASSOC"

