congress_website_title = "AN ACT REGULATING THE SALE OF TICKETS AND COLLECTION OF CONTRIBUTIONS FROM TEACHERS AND STUDENTS IN ELEMENTARY AND SECONDARY PUBLIC AND PRIVATE SCHOOLS AND PROVIDING PENALTIES FOR VIOLATION THEREFOR"
congress_website_abstract = "Provides for the following --- \"SECTION 1. The sale of tickets collection or contributions and/or solicitations in any form by any person or persons, whether voluntary or otherwise, from teachers and students in public and private elementary and secondary schools at any time of the school year are prohibited; Provided, however, that this prohibition shall not cover voluntary fees in the Red Cross, Girl Scouts of the Philippines and Boy Sccouts or the Philippines as well as contrivutions for projects of the PTA for the benefit of the school and projects of the student organizations; Provided, further, that persons other than teachers will undertake the collection. Penalizes violation of this provision."

