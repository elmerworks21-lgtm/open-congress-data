congress_website_title = "AN ACT AMENDING SECTION 42 OF REPUBLIC ACT NO. 7920, OTHERWISE KNOWN AS THE NEW ELECTRICAL ENGINEERING LAW OF 1995, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: \"By setting a specific time frame on registration or re-registration of associate electrical engineers, assistant electrical engineers and master electricians, the government has unwittingly deprived a large percentage of them from practicing their profession ... simply because they ... failed to register or re-register within the period prescribed in the law.\" > Allows, therefore, said professionals to register UPON EXPIRATION OF THEIR CURRENT REGISTRATION AND LICENSES. Their NEW serial numbers as REGISTERED ENGINEERS or MASTER ELECTRICIANS shall be provided."
