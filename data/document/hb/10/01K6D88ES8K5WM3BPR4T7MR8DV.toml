congress_website_title = "AN ACT PROVIDING FOR AT LEAST TWO (2) SANGGUNIANG PANLALAWIGAN MEMBERS FOR EACH CONGRESSIONAL DISTRICT, AMENDING FOR THE PURPOSE SECTION 467 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991 AND REPEALING SECTION 2 OF REPUBLIC ACT NO. 6637 AND SECTION 4 OF REPUBLIC ACT NO. 6636, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Proposes the following amendment to the Local Government Code of 1991: \"SEC. 467. Composition - x x x > (D) FOR PROVINCES WITH TWO (2) OR MORE LEGISLATIVE DISTRICTS, THERE SHALL BE ELECTED AT LEAST TWO (2) REGULAR MEMBERS OF THE SANGGUNIANG PANLALAWIGAN FOR EACH LEGISLATIVE DISTRICT. PROVIDED, THAT, FOR PROVINCES WITH ONLY ONE (1) LEGISLATIVE DISTRICT, THE COMMISSION ON ELECTION SHALL DIVIDE THEM INTO TWO (2) DISTRICTS FOR PURPOSES OF ELECTING THE MEMBERS OF THE SANGGUNIANG PANLALAWIGAN, AS NEARLY AS PRACTICABLE ACCORDING TO THE NUMBER OF INHABITANTS, EACH DISTRICT COMPROMISING A COMPACT, CONTIGUOUS AND ADJACENT TERRIROTY.\""
