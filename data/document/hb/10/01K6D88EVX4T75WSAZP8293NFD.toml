congress_website_title = "AN ACT PROVIDING FOR A FREE-REVIEW EDUCATION TO ALL BOARD AND BAR EXAMINEES TO BE KNOWN AS FREE-REVIEW EDUCATION ACT OF 1997, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: For economic reasons, study shows that a big percent of those who took the board and bar examinations have not attended a proper review classes. Others deferred taking the licensure exams, and those who failed, hesitantly gambled themselves in getting another chance. This dilemma will cause a tremedous effect and imperil the goals of Philippine education. > Unless remedial measures are adopted to abate the present situation, reviewees will be joining the rooster of frustrated professionals. \"Free Review Education Act of 1997\" Covers only the first and second times board and bar examinees of the following profession: (1) Accountancy; (2) Architecture; (3) Chemical Engineering; (4) Civil Engineering; (5) Dentistry; (6) Electricaal Engineering; (7) Mechanical Engineering; (8) Medicine; (9) Nursing; (10) Midwifery; (11) Medical Technology; (12) Education; (13) Nautical; (14) Other non-board related licensure examinations; and (15) Law."

