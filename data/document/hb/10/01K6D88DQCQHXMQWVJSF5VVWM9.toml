congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7610, OTHERWISE KNOWN AS THE 'SPECIAL PROTECTION OF CHILDREN AGAINST CHILD ABUSE, EXPLOITATION AND DISCRIMINATION ACT,' SO AS TO PROVIDE A SPECIFIC SECTION FOR STREET CHILDREN AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines the term \"STREET CHILDREN\" as any boy or girl aged seven (7) to thirteen (13) years who has not reached adulthood and for whom the street has become habitual \"shelter\" and/or source of livelihood, either abandoned, neglected, unsupervised and/or uncared for by responsible adults. Gives special focus to the enhancement of the well-being of street children with stiff protective measures to safeguard their delicate conditions."

