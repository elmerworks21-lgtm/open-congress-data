congress_website_title = "AN ACT TO AMEND SECTION 61 OF PRESIDENTIAL DECREE NUMBERED ONE THOUSAND FOUR HUNDRED AND FORTY-FIVE OTHERWISE KNOWN AS THE 'GOVERNMENT AUDITING CODE OF THE PHILIPPINES' AND FOR OTHER PURPOSES(PROVID ES THAT EXPENSE ACCOUNTS INCURRED DURING A PERIODOF CALAMITY, EPIDEMIC, EARTHQUAKE OR NATIONAL DISASTER SHALL BE EXEMPT FROM...AND/OR THE RIGID AUDITING PROCEDURES AND TECHNIQUES FOLLOWED IN THE EXAMINATION OF VOUCHERS AND OTHER DOCUMENTS...)"
congress_website_abstract = "Rationale: During a period of calamity, epidemic, earthquake or national disaster, it is almost impossible ffor those responsible in the disbursement of public funds to adhere to the standard requirements authorized under the government auditing code, hence the proposed exemption. States that EXPENSE ACCOUNTS INCURRED DURING A PERIOD OF CALAMITY, EPIDEMIC, EARTHQUAKE OR NATIONAL DISASTER SHALL BE EXEMPT FROM THE ABOVE REQUIREMENTS AND/OR THE RIGID AUDITING PROCEDURES AND TECHNIQUES FOLLOWED INTHE EXAMINATION OF VOUCHERS AND OTHER DOCUMENTS; AND, PROVIDED, FURTHER. THAT EXPENSE ACOUNTS CHARGEABLE AGAINST LUMP-SUM APPROPRIATIONS, SUBJECT TO A SPECIAL BUDGET, SHALL BE AUDITED BASED ON THE APPROVED ITEMIZATION IN THE PSECIAL BUDGET, WHICH SHAALL SERVE AS THE AUTHORITY AND LEGAL BASIS."

