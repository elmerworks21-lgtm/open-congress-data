congress_website_title = "AN ACT CREATING A SPECIAL FUND FOR AIDS VICTIMS AND REQUIRING THE MANDATORY ESTABLISHMENT OF EXCLUSIVE AIDS WARDS IN PUBLIC AND PRIVATE HOSPITALS"
congress_website_abstract = "Appropriates an annual amount of P50 MILLION (P50,000.000.00 ) to serve as a Special AIDS Fund to assist the victims of the dreaded AIDS disease. Mandates all public and private hospitals in the country to establish AIDS wards free of charge"
