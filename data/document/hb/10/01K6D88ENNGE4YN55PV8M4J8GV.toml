congress_website_title = "AN ACT CREATING THE BUREAU OF TRAFFIC MANAGEMENT AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The complexity of the traffic problem throughout the country makes it imperative for the government to create a national traffic authority that will oversee, unify and integrate the planning, management, implementation and administrationof traffic activities in the urban centers in the country; hence, this bill, the approval of which is requested.> Provides for the composition of the propsoed Bureau; its powers and functions; term of office and secretariat. Abolishes, therefore, theTraffic Management Division bodied in RA No. 7924."

