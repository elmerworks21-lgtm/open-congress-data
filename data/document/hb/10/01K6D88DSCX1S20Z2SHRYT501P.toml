congress_website_title = "AN ACT REQUIRING MANDATORY AND IMMEDIATE INVESTIGATION OF CASES OF SHOOTOUTS AND OTHER FORMS OF EXTRA-JUDICIAL KILLINGS INVOLVING POLICE OFFICERS, AGENTS OR ANY MEMBER OF THE LAW ENFORCING AGENCIES OF THE GOVERNMENT INCLUDING MEMBERS OF THE ARMED FORCES OF THE PHILIPPINES, PERSONS IN AUTHORITY, AGENTS OR PERSONS IN AUTHORITY AND PERSONNEL OF LEGITIMATE PRIVATE SECURITY AGENCIES AND FOR OTHER PURPOSES"
congress_website_abstract = "Requires the Commission on Human Rights upon a report by police or law enforcement authorities, or upon complaint by any party, TO CONDUCT MANDATORY AND IMMEDIATE INVESTIGATION OF CASES OF SHOOTOUTS AND OTHER FORMS OF EXTRA-JUDICIAL KILLINGS INVOLVING POLICE OFFICERS, AGENTS OR ANY MEMBER OF THE LAW ENFORCING AGENCIES OF THE GOVERNMENT INCLUDING MEMBERS OF THE AFP, PERSONS IN AUTHORITY INCLUDING THEIR AGENTS, PERSONNEL OF LEGITIMATE PRIVATE SECURITY AGENCIESA within 24 hours from knowledge of the incident or receipt of said report."

