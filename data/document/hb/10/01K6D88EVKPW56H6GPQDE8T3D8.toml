congress_website_title = "AN ACT PROHIBITING APPOINTED GOVERNMENT OFFICIALS FROM RUNNING FOR ANY ELECTIVE OFFICE WITHIN THREE YEARS FROM RESIGNATION OR SEPARATION FROM SERVICE"
congress_website_abstract = "Rationale: Government officials, whether elected or appointed, owe it to the people to uphold the constitutional aphorism that \"Public Office Is Public Trust\" and therefore must be held with the highest degree of sincerity and professionalism . > There are, however, appointed officials who are lured by the prestige and power seemingly attached to the public office they hold and therefore desire to further extend it through an elected office. Most of the time, these appointed officials use their present position as the take-off point of their political aspirations. > Declares it UNLAWFUL for any appointed government official to run for any elective public office WITHIN THREE (3) YEARS from resignation or separation from service."

