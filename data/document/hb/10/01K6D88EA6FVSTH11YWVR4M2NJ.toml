congress_website_title = "AN ACT PRESCRIBING ADDITIONAL REQUIREMENTS FOR CITIZENS OR SUBJECTS OF A FOREIGN COUNTRY DESIRING TO MARRY A FILIPINO WOMAN, AMENDING ARTICLE 21 OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "Prescribes the following ADDITIONAL requirements: (1) certificate of good moral character; (2) a record of criminal or adminsitrative case filed against him or her; (3) health or medical clearance, including a psychological evaluation; and (4) a certificate of gainful trade, business or employment."

