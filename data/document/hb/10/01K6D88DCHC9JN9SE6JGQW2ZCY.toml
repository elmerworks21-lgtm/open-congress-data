congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A SYSTEM OF COMMUNITY INTELLECTUAL PROPERTY RIGHTS PROTECTION"
congress_website_abstract = "Introduces NEW PRINCIPLES directed at protecting community intellectual property rights: (1) State recognition of the original rights of indigenous communities and local farmers over innovations they have developed; (2) Community ownership of traditional knowledge especcially those that are unwritten, and (3) registration and demonstration of traditional knowledge. * * *"
