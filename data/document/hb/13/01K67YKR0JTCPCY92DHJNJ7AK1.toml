congress_website_title = "AN ACT PRESCRIBING THE USE OF ENGLISH AS THE MEDIUM OF INSTRUCTION IN PHILIPPINE SCHOOLS"
congress_website_abstract = "\\\"English as the Medium of Instruction Act\\\". The bill mandates the use of English as the medium of instruction in all subjects taught in the elementary and secondary levels except in preschool and until Grade I where, aside from English, the regional or native tongue may be used. It also provides for the use of English as the medium of instruction in all subjects in the tertiary level and technical or vocational courses except in Pilipino taught as a subject."
