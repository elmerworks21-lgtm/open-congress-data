congress_website_title = "AN ACT PROVIDING FOR THE ALLOCATION OF Php 25B OUT OF THE Php 38B MARCOS WEALTH DEPOSIT AT THE NATIONAL TREASURY AS A SPECIAL BASIC EDUCATION FUND TO HELP FINANCE THE MUCH-NEEDED AND URGENT PRIORITY BASIC EDUCATION PROGRAMS OF THE NATIONAL GOVERNMENT"
congress_website_abstract = "The bill allocates P25 billion (out of the P38 billion Marcos wealth deposited in the National Treasury) for the construction, repair and rehabilitation of school buildings; for the acquisition of school chairs, desks and textbooks; for the hiring of new teachers; and for the increase in the salaries of public school teaching and non-teaching personnel."
