congress_website_title = "AN ACT REGULATING THE EDUCATION AND LICENSURE OF PHYSICIANS AND THE PRACTICE OF MEDICINE IN THE PHILIPPINES, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 2382, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Physicians Act of 2005\\\". The bill provides for the following, among others: a) the creation of the Professional Regulatory Board of Medicine vice the Board of Medical Examiners, b) the creation of the Council of Medical Education vice the Board of Medical Education, c) the inclusion of psychiatry among the subjects for licensure examination, and d) the inclusion of clinical clerkship and internship training as a requirement in the completion of a doctorate degree in medicine."
