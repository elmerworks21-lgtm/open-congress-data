congress_website_title = "AN ACT TO DEFINE AND PENALIZE ACTS OF TERRORISM AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Anti-Terrorism Act of 2004.\\\" The bill defines \\\"terrorism\\\" and how it is committed. It provides the penalties for the commission of the act of terrorism, conspiracy to commit acts of terrorism, participation in any act of terrorism, financing or materially supporting any act of terrorism, harboring or concealing a terrorist and for making false threats of acts of terrorism."
