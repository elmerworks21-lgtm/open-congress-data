congress_website_title = "AN ACT ABOLISHING THE PUBLIC ESTATES AUTHORITY AND CREATING IN ITS PLACE THE PHILIPPINE RECLAMATION AND DEVELOPMENT CORPORATION AND FOR 0THER PURPOSES"
congress_website_abstract = "The bill calls for the creation of the Philippine Reclamation and Development Corporation (PRDC) to replace the Philippine Estate Authority in overseeing major government reclamation projects. It clarifies the nature and ownership of the reclaimed lands, i.e., all lands reclaimed by the PRDC shall be owned by it and deemed alienable lands."
