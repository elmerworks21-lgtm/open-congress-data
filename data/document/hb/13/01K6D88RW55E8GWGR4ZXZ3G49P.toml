congress_website_title = "AN ACT ADOPTING THE CONJUGAL PARTNERSHIP OF GAINS AS THE GOVERNING REGIME IN THE PROPERTY RELATIONS OF HUSBAND AND WIFE IN CASE OF ABSENCE OF, OR OF A VOID, MARRIAGE SETTLEMENT, THEREBY AMENDING THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "To address the resistance to the adoption of the absolute community of property as the governing property regime in the absence of any marriage settlement or when the same is void, the bill seeks the reversion to the conjugal partnership of gains as the default property regime between husbands and wives."
