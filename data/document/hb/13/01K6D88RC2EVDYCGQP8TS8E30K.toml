congress_website_title = "AN ACT EXTENDING THE APPLICABLE PERIOD OF THE AGRICULTURAL COMPETITIVENESS ENHANCEMENT FUND FROM NINE (9) YEARS TO FIFTEEN (15) YEARS, AND ALLOWING FOR THE PRESIDENT OF THE PHILIPPINES TO SET TARIFFS FROM 2004 UP TO 2010, AMENDING FOR THE PURPOSE SECTION 8, AND SECTION 6 OF REPUBLIC ACT NO. 8178, OTHERWISE KNOWN AS THE AGRICULTURAL TARIFFICATION ACT"
congress_website_abstract = "The bill extends the Agri-Competitiveness Enhancement Fund for 6 more years for a total duration of 15 years from the original start-up date of the fund. It also extends the authority granted to the President to impose tariffs up to the year 2010."
