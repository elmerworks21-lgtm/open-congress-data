congress_website_title = "AN ACT GRANTING INCENTIVES AND PRIVILEGES TO FOSTER FAMILIES AND CHILDREN UNDER FOSTER CARE PROGRAM, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"Foster Care Incentives and Privileges.\\\" The measure provides foster parents the following incentives: a) personal tax exemption, b) foster care susbsidy, c) respite care special leave, and d) supplies and other assistance. It also grants the following privileges to a foster child: a) health care privileges, b) free access to public education, c) civil service eligibility, and d) emergency fund for medical/hospitalization needs."
