congress_website_title = "AN ACT AMENDING THE COOPERATIVE CODE OF THE PHILIPPINES TO BE KNOWN AS THE 'PHILIPPINE COOPERATIVE CODE OF 2005'"
congress_website_abstract = "The bill proposes the following amendments to the Code, among others: a) it grants cooperatives the right of first refusal on specific business undertakings; b) it grants cooperative banks the same incentive package enjoyed by thrift banks; c) it increases the minimum paid up share capital from P2,000 to P30,000; and d) it allows the transformation of single-purpose cooperatives into multi-purpose cooperatives only after two years of operations."
