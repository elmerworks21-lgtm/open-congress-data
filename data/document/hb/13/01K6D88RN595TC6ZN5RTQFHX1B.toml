congress_website_title = "AN ACT DECLARING AS UNLAWFUL SOLICITATION FROM CANDIDATES AND POLITICAL PARTIES FOR THE PURPOSE OF ALLOWING THEM TO CAMPAIGN FREELY BEFORE AND DURING ANY ELECTION AMENDING BATAS PAMBANSA BLG. 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to declare as unlawful for any person or persons to demand or receive any amount of money or anything of value, directly or indirectly, from any political party or candidate, or induce others to perform the preceding acts in their behalf, in consideration for the candidate or political party to campaign freely before and during any election."
