congress_website_title = "AN ACT TO AMEND REPUBLIC ACT NO. 9189 OTHERWISE KNOWN AS THE OVERSEAS ABSENTEE VOTING ACT OF 2003"
congress_website_abstract = "The bill proposes the following amendments, among others: a) for counting to be fully automated; b) for the scope of voting by mail to be widened; c) for the adoption of a continuing system of registration for Filipinos overseas; and d) for the adoption of a registration and voting mechanism adaptable to seafarers' situation."
