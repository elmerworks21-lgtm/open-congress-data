congress_website_title = "AN ACT ESTABLISHING A SYSTEM WHICH WILL ENCOURAGE THE GENERAL PUBLIC TO PROVIDE RELEVANT INFORMATION AND EVIDENCE AGAINST PUBLIC OFFICERS AND EMPLOYEES FOR VIOLATIONS OF REPUBLIC ACT NO. 3019 (ANTI-GRAFT AND CORRUPT PRACTICES ACT) AND THE COMMISSION OF OTHER CRIMINAL OFFENSES WHICH ARE PUNISHABLE UNDER THE REVISED PENAL CODE OR SPECIAL LAWS IN CONNECTION WITH OR BY REASON OF THEIR PUBLIC OFFICE AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"The Philippine Informants Act of 2004.\\\" The bill seeks to grant qualified informants the following: a) cash rewards; b) immunity from retaliatory actions and suits; c) share in the proceeds of the offense recovered; and d) enrollment in the Witness Protection Program."
