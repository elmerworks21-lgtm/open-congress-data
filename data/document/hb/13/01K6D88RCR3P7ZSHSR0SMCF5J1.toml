congress_website_title = "AN ACT DESIGNATING THE HOUSING AND URBAN DEVELOPMENT COORDINATING COUNCIL (HUDCC) AS THE SOLE CLEARING HOUSE FOR THE CONDUCT OF DEMOLITION AND EVICTION ACTIVITIES"
congress_website_abstract = "The bill directs the Housing and Urban Development Coordinating Council (HUDCC) to monitor all evictions and demolitions involving homeless and underprivileged citizens. It requires all government agencies proposing to undertake demolition and eviction activities to secure from the HUDCC the checklist and guidelines on demolition and eviction activities prior to implementation."
