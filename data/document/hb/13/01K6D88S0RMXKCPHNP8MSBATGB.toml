congress_website_title = "AN ACT PROVIDING FOR THE PAYMENT OF SURVIVOR'S BENEFITS TO THE SPOUSE OR IN PROPER CASES THE PARENTS OF A DECEASED RETIRED MEMBER OF THE SUPREME COURT OR THE LOWER COLLEGIATE COURTS, OR OF A DECEASED RETIRED MEMBER OF A CONSTITUTIONAL COMMISSION, OR OF A DECEASED RETIRED OMBUDSMAN OR DEPUTY OMBUDSMAN, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to enhance the retirement benefits of the members of the Supreme Court, Court of Appeals, Sandiganbayan, members of the three (3) Constitutional Commissions, and the Ombusman and the Deputy Ombudsman. It adds survivorship benefits for the surviving spouse and, in proper cases, the parents."
