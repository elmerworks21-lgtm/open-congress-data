congress_website_title = "AN ACT FOR THE TEMPORARY TRANSFER FOR FIFTEEN (15) YEARS OF THE RESPONSIBILITY TO DEVELOP AND MAINTAIN BARANGAY ROADS FROM LOCAL GOVERNMENT UNITS TO THE DEPARTMENT OF PUBLIC WORKS AND HIGHWAYS"
congress_website_abstract = "To respond to the need to restore, repair and maintain barangay roads that have deteriorated since the responsibility for their maintenance was shifted to local government units, the bill temporarily transfers the development and maintenance of these roads to the Department of Public Works and Highways which has the technical and logistical capability to handle such."
