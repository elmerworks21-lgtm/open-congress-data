congress_website_abstract = "The bill seeks to correct certain defects of RA 7941, to wit: a) the establishment of a two-stage system to fill up all reserved seats for the party-list groups; b) the listing of the three-seat limit per party; c) the adoption of the eight-point guideline of the Supreme Court for screening party-list participants, among others."
