congress_website_title = "AN ACT DEFINING THE POLICIES, PRINCIPLES AND PROCEDURE FOR THE DECLARATION OF A STATE OF NATIONAL EMERGENCY"
congress_website_abstract = "“National Emergency Act of 2006”. The bill seeks to define the policies, principles and procedure for the declaration of a state of national emergency. It provides that Congress, in joint session, voting separately, shall authorize the President, for a limited period subject to prescribed restrictions, to exercise powers necessary and proper to carry out a declared national policy or revoke the declaration of the state of national emergency."
