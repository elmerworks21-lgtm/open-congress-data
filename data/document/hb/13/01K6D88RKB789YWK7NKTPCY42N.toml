congress_website_title = "AN ACT ENFORCING WARRANTIES ON SALE OF BRAND NEW MOTOR VEHICLES, PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "\\\"Philippine Lemon Law\\\". The bill mandates manufacturers to cover by warranty all new motor vehicles for a fixed period as provided in the sales contract. It authorizes the Secretary of Transportation and Communications to order the recall of new motor vehicles of the same series or edition found to have life-threatening defects."
