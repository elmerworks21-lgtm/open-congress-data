congress_website_abstract = "“Philippine Clinical Psychology and Psychometrics Act of 2006”. The bill seeks the creation of the Professional Regulatory Board of Clinic Psychology and Psychometrics. It prescribes the composition, term of office and powers and functions of the Board. It also sets the criteria for the licensure of the practitioners of the profession."
