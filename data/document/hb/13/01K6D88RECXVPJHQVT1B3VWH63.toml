congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6975 entitled, \\\"AN ACT ESTABLISHING THE PHILIPPINE NATIONAL POLICE UNDER REORGANIZED DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Act Amending the PNP Laws.\\\" The bill provides for the rank classification of the Philippine National Police (PNP). It also proposes the distribution in the Police officers ranks from Police Chief Superintendent to Policy Deputy Director General, to wit: a) Deputy Director General - 0.008%; b) Director - 0.037%; and c) Chief Superintendent - 0.074%."
