long_title = "AN ACT TO IMPROVE THE REVENUE COLLECTION PERFORMANCE OF THE BUREAU OF INTERNAL REVENUE (BIR) AND THE BUREAU OF CUSTOMS (BOC) THROUGH THE CREATION OF A REWARDS AND INCENTIVES FUND AND OF A REVENUE PERFORMANCE EVALUATION BOARD AND FOR OTHER PURPOSES"
scope = "National"
