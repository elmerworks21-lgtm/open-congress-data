congress_website_coauthors_raw = ["CODILLA, EUFROCINO SR. M.","ARROYO, JUAN MIGUEL M.","AMIN, HUSSIN U.","MARCOS, IMEE R.","DOMOGAN, MAURICIO G.","NEPOMUCENO, FRANCIS \"BLUEBOY\" L.","LAPUS, JESLI A.","ANDAYA, ROLANDO JR. G.","TEVES, HERMINIO G.","ABAYON, HARLIN CAST","SILVERIO, LORNA C.","MAGSAYSAY, MA. MILAGROS H.","ABAYA, JOSEPH EMILIO A.","ALCALA, PROCESO J.","BIAZON, ROZZANO RUFINO B.","CHUNGALAO, SOLOMON R.","GUINGONA, TEOFISTO III DL.","MACARAMBON, BENASING JR. O.","ORTEGA, MANUEL C.","REMULLA, JESUS CRISPIN C.","ROMAN, ANTONINO P.","UMALI, ALFONSO JR. V.","VILLAFUERTE, LUIS R."]
congress_website_committee_codes = ["0504","0506","0542","D501","0532"]
congress_website_primary_keys = [68942]
congress_website_title = "AN ACT PROVIDING FOR OPTIMUM PERFORMANCE IN REVENUE COLLECTION THROUGH THE GRANT OF SPECIAL INCENTIVES AND REWARDS FOR EXEMPLARY SERVICE AND THROUGH LATERAL ATTRITION IN REVENUE-GENERATING AGENCIES OF GOVERNMENT AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill provides for the establishment of a system of lateral attrition that shall cover revenue and customs officials/officers/employees in the Bureau of Internal Revenue, the Bureau of Customs and their parallel set-up in other revenue-generating agencies. A special incentives and rewards system shall be implemented that will automatically allocate 2% - 10% of the collection in excess of targets to fund rewards for deserving officials/officers/employees."
