congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6552, OTHERWISE KNOWN AS THE REALTY INSTALLMENT BUYER ACT, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to limit the applicability of RA 6552 (Maceda law) to individual buyers of residential real property only. It also proposes that penalty charges and interest on installment amortizations and certain taxes and expenses actually paid to third persons be deducted from the total payments made for purposes of determining the cash surrender value refundable to the buyer."
