congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 4670, OTHERWISE KNOWN AS THE MAGNA CARTA FOR PUBLIC SCHOOL TEACHERS"
congress_website_abstract = "The bill seeks to grant teachers the following, among others: a) due compensation for services rendered by probationary teachers and teachers who fail to meet the requirements of the Civil Service Commission; b) 15 days sick leave annually with full pay after six months of continuous service; c) rehabilitation period for work-related injuries; and d) consultative forums as needed."
