congress_website_title = "AN ACT STRENGTHENING THE POLITICAL PARTY SYSTEM AND PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Political Party Development Act of 2004.\\\" The bill requires all national political parties, registered with the Commission on Elections, to craft a clear policy agenda and program of governance. It limits voluntary contributions from individuals to P100,00 and from juridical entities to P1.0 million. It imposes penalties for political turncoatism."
