congress_website_title = "AN ACT REQUIRING MEMBERS OF THE ARMED FORCES OF THE PHILIPPINES AND THE PHILIPPINE NATIONAL POLICE TO BE IN PROPER UNIFORM WHILE RIDING IN OFFICIAL VEHICLES AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "The bill provides the following penalties for non-wearing of proper uniforms while riding in official vehicles: a) for the 1st offense - 3 days suspension without pay; b) for the 2nd offense - 1 week suspension without pay; and c) for the 3rd offense - dismissal from service."
