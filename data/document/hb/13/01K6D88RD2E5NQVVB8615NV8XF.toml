congress_website_title = "AN ACT PROHIBITING CERTAIN LOCAL OFFICIALS TO FILL THE VACANCY IN THE OFFICES OF THE GOVERNOR OR MAYOR AND VICE-GOVERNOR OR VICE-MAYOR, AMENDING FOR THE PURPOSE SECTIONS 44 AND 46 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "The bill seeks to prohibit any local official, disqualified by law, to serve during the prohibitive term. It aims to plug the loophole in the law wherein certain local officials still manage to serve for a fourth term by way of succession to the same position they are prohibited from running and serving."
