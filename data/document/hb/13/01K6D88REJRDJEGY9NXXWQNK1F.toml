congress_website_title = "AN ACT AMENDING SECTIONS 61, 62, 63 AND 65 OF REPUBLIC ACT NO. 6975 PLACING FOR THE PURPOSE THE PROVINCIAL JAILS UNDER THE JURISDICTION OF THE BUREAU OF JAIL MANAGEMENT AND PENOLOGY (BJMP) APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill proposes to take away the supervision and management of provincial jails from the provincial governments and place them under the Bureau of Jail Management and Penology. It creates the position of Provincial Jail Administrator who will supervise and administer all local jails in the province."
