congress_website_title = "AN ACT INSTITUTIONALIZING A CHECK AND BALANCE SYSTEM IN THE APPOINTMENT OF KEY OFFICERS IN THE ARMED FORCES OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"AFP Check and Balance Act of 2004.\\\" The bill establishes an alternating and balancing system in the selection of officers from the graduates of the Philippine Military Academy, on the one hand, and the graduates of officers candidate schools, Reserve Officers Training Course, flying schools, foreign military schools, other military schools and licensed technical professionals admitted into the service, on the other hand."
