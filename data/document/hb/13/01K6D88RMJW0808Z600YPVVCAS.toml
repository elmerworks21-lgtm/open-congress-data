congress_website_title = "AN ACT EXPANDING THE SUPERVISORY AND REGULATORY POWERS OF THE BANGKO SENTRAL NG PILIPINAS, AMENDING FOR THE PURPOSE, REPUBLIC ACT NO. 7653"
congress_website_abstract = "\\\"Expanded BSP Supervisory and Regulatory Powers Act of 2005\\\". The bill seeks to expand the supervisory and regulatory powers of the Bangko Sentral ng Pilipinas (BSP) to include within the ambit of its authority, bank subsidiaries and affiliates engaged in allied activities, quasi-banks, trust entities and other non-bank financial institutions placed under the BSP supervision through special laws."
