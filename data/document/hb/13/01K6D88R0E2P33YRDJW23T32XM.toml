congress_website_title = "AN ACT PROVIDING FOR GUIDELINES IN THE SELECTION AND APPOINTMENT OF A STATE UNIVERSITY/COLLEGE PRESIDENT, AMENDING FOR THE PURPOSE THE 'HIGHER EDUCATION MODERNIZATION ACT OF 1997', AND FOR OTHER PURPOSES'"
congress_website_abstract = "This bill seeks to provide for the guidelines in the selection and appointment of a state university/college president. It institutes a uniform set of guidelines to avert possible questions on the validity of the search committee's recommendation and assure a transparent process of selection."
