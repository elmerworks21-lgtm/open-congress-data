congress_website_title = "AN ACT PROMULGATING A COMPREHENSIVE POLICY ON BIRTH CONTROL AND FOR THIS MATTER CREATING A BUREAU OF POPULATION MANAGEMENT UNDER THE DEPARTMENT OF HEALTH AND RENAMING THE DEPARTMENT AS THE DEPARTMENT OF HEALTH AND POPULATION MANAGEMENT AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"The Population Management Act of 2004.\\\" The bill seeks to: a) limit population growth to a replacement level; b) create the Bureau of Population Management (BPM); c) integrate the Population Commission with the BPM; d) integrate family planning and birth control in the Social Studies curricula; and e) disseminate programs to limit population."
