congress_website_title = "AN ACT PROVIDING EMERGENCY INCOME TAX RELIEF FOR ORDINARY TAXPAYERS AND RECALIBRATING THE INCOME TAX RATES OF INDIVIDUAL TAXPAYERS, AMENDING FOR THE PURPOSE CHAPTER III, SECTION 24(A)(1)(c) OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "The bill seeks to recalibrate the income tax rate structure for individual taxpayers, to wit: a) NOT OVER P240,000 - 0%; and b) over P250,000 but not over P500,000 - P50,000 + 30% OF THE EXCESS OVER P240,000."
