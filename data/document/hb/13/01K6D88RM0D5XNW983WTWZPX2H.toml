congress_website_title = "AN ACT PROVIDING FISCAL INDEPENDENCE TO THE CONSTITUTIONAL COMMISSIONS, THROUGH THE AUTOMATIC RELEASE OF THEIR RESPECTIVE SHARE IN THE NATIONAL INTERNAL REVENUES"
congress_website_abstract = "The bill provides for the automatic release of the share of the Civil Service Commission, the Commission on Audit and the Commission on Elections in the national internal revenues. It further provides that their share shall not be subject to any lien or holdback that the national government may impose for whatever purpose."
