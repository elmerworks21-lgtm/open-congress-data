congress_website_title = "AN ACT AUTHORIZING THE BANGKO SENTRAL NG PILIPINAS (BSP), PHILIPPINES DEPOSIT INSURANCE COMPANY (PDIC) AND BUREAU OF INTERNAL REVENUE (BIR) TO LOOK INTO DEPOSITS OF ANY BANKING INSTITUTION, THEREBY AMENDING REPUBLIC ACT 1405, AND FOR OTHER PURPOSES"
