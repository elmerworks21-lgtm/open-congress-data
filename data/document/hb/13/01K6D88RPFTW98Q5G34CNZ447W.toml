congress_website_title = "AN ACT REGULATING THE PRACTICE OF THE METALLURGICAL ENGINEERING IN THE PHILIPPINES (AN ACT REPEALING P.D. 1536)"
congress_website_abstract = "\\\"Philippine Metallurgical Engineering Act of 2005\\\". The bill prescribes the scope of the professional metallurgical engineering service, the examination of candidates to the profession, and the registration and licensure of successful candidates. It also provides for the creation of the Board of Metallurgical Engineering, its composition, powers and duties, compensation and term of office."
