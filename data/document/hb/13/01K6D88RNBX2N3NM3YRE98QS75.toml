congress_website_title = "AN ACT PENALIZING THE TITLING, APPROPRIATION, ENCROACHMENT, AND REGISTRATION OF CREEKS, ESTEROS, STREAMS, CANALS, RIVER BANKS AND OTHER PUBLIC WATERWAYS AND FOR OTHER PURPOSES"
