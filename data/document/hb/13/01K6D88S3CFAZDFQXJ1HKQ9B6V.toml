congress_website_title = "AN ACT TO BE KNOWN AS \\\"THE MARINE LIENS AND SHIP MORTGAGE ACT OF 2002"
congress_website_abstract = "\\\"Maritime Liens and Ship Mortgage Act of 2002\\\". The bill enumerates and defines the preference of maritime liens to enable ship financiers to assess favorably ship mortgages in the Philippines to ensure repayment of loans. Moreover, this bill deals with maritime liens separately from ship mortgages and limits the number of claims secured by maritime liens to a minimum."
