congress_website_title = "AN ACT PROVIDING FOR SUSTAINABLE FOREST MANAGEMENT AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Sustainable Forest Management Act of 2004.\\\" The bill provides for the following, among others: a) the adoption of a community-based forest management strategy as the principal strategy in forest management; b) total commercial logging ban in protected forestlands; c) grant of incentives to private sector investments in reforestation; and d) creation of a sustainable forest development fund."
