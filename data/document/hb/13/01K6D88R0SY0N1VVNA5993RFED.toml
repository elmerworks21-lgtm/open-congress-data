congress_website_title = "AN ACT PROVIDING FOR THE PROMOTION OF BIO-ORGANIC FARMING IN THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill defines bio-organic farming as an agricultural production system that avoids the use of chemical or inorganic farm inputs, pesticides, weedicides and feed additives and relies on biological means of enriching the soil and controlling pests using beneficial organisms, animal wastes, composting or crop rotation. It creates the Bio-Organic Farming Authority to direct the program."
