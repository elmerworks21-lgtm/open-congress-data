congress_website_title = "AN ACT ENSURING A HIGHER STANDARD OF PROTECTION AND PROMOTION OF THE WELFARE OF MIGRANT WORKERS BY AMENDING THE FIFTH PARAGRAPH OF SECTION 10 OF REPUBLIC ACT NO. 8042, OTHERWISE KNOWN AS THE 'MIGRANT WORKERS AND OVERSEAS FILIPINO ACT OF 1995'"
congress_website_abstract = "The bill entitles an overseas worker who has been terminated from employment without just cause to receive full reimbursement of his placement fee plus a 12% interest per annum, plus his salaries for the unexpired portion of his term or for three (3) months for every year of the unexpired term, whichever is HIGHER."
