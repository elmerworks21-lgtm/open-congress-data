congress_website_abstract = "\\\"Archipelagic Baselines Law of the Philippines\\\". The bill establishes new basepoints to serve as bases from which to draw the 12-mile territorial sea, the 24-mile contiguous zone and the 200-mile Exclusive Economic Zone as provided under the UNCLOS (United Nations Convention of the Law of the Sea) and to serve as well in defining the territory of the Philippine Archipelago."
