congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8291 REMOVING INTERESTS ON DELAYED REMITTANCES, LIMITING DISBURSEMENTS FOR ADMINISTRATIVE AND OPERATIONAL EXPENSES AND THE POWERS OF THE GSIS AND ITS PRESIDENT AND GENERAL MANAGER, AND INCREASING THE PENALTIES FOR VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill imposes penalties upon officials concerned for non-remittance or delayed remittance of monies due the GSIS, limits disbursements for administrative and operational expenses, controls the investment of funds, limits the powers of the GSIS and its President and General Manager, and increases the penalties for violations of the law."
