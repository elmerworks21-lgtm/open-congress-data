congress_website_title = "AN ACT REQUIRING THE CONCURRENCE OF THE SANGGUNIANG PANLALAWIGAN OR PANLUNGSOD, AS THE CASE MAY BE, FOR THE ESTABLISHMENT OF TERMINALS, OUTLETS, OR AUTHORIZED AGENTS OF ANY GAME OF CHANCE"
congress_website_abstract = "The bill provides that no lotto terminal, jai alai off fronton station, bingo outlet or authorized agent of any game of chance shall be established without the concurrence of the sangguniang panlalawigan or sangguniang panglungsod of the local government unit concerned."
