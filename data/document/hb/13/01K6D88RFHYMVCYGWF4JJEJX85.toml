congress_website_title = "AN ACT AMENDING ARTICLE 198 OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS \\\"THE FAMILY CODE OF THE PHILIPPINES\\\""
congress_website_abstract = "The bill provides that \\\"during the proceedings for legal separation or for annulment of marriage, and for declaration of nullity of marriage, the spouses and their children shall be supported from the property of the absolute community or the conjugal partnership. After final judgment granting the petition, the obligation of mutual support between spouses ceases. However, in case of legal separation, the court may order that the guilty spouse shall give support to the innocent one, specifying the terms of such order.\\\""
