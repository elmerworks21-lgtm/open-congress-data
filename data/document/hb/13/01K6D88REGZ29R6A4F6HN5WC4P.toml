congress_website_title = "AN ACT DECENTRALIZING THE BUDGETING AND PROCUREMENT SYSTEM IN THE ARMED FORCES OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"AFP Budget and Procurement Decentralization Act of 2004.\\\" The bill directs the Department of Budget and Management to release the annual budgets of the regional commands or similar geographical commands of each of the major services directly to said commands. It also authorizes said commands to procure their needs directly."
