congress_website_title = "AN ACT TO MAKE THE LAWS ON PATENTS, TRADENAMES AND TRADEMARKS MORE RESPONSIVE TO THE HEALTH CARE NEEDS OF THE FILIPINO PEOPLE BY CLARIFYING NON-PATENTABLE INVENTIONS, ALLOWING THE IMPORTATION AND EARLY DEVELOPMENT OF PATENTED MEDICINES, AND MODIFYING GOVERNMENT USE PROVISIONS FOR DRUGS OR MEDICINES, TO LOWER PRICES AND INCREASE ACCESS TO AND SUPPLY OF QUALITY DRUGS OR MEDICINES, AMENDING FOR THIS PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NO. 8293 OTHERWISE KNOWN AS THE INTELLECTUAL PROPERTY CODE OF THE PHILIPPINES"
congress_website_abstract = "The bill aims to reduce the cost of medicines by incorporating into the present Philippine Intellectual Property Code certain public health safeguards found in the GATT Trade Related Aspects of Intellectual Property Rights (TRIPS)Agreement that create clear, legal exceptions to intellectual property rules."
