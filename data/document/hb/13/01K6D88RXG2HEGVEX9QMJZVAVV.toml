congress_website_abstract = "“Student Entitlements Act of 2006”. The bill seeks to grant student the following benefits: a) 25% discount on transportation, b) 25% discount on medicines, medical and dental services, c) 50% discount on admission in all cultural centers, d) 10% discount on basic school supplies, and e) 25% discount on meals in all food establishments."
