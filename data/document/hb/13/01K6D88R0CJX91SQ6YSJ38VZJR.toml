congress_website_title = "AN ACT ESTABLISHING A PRIVATE-HOSPITAL DEVELOPMENT PLAN AND PROVIDING ASSISTANCE TO PRIVATE HOSPITALS BY GRANTING THEM INCENTIVES"
congress_website_abstract = "\\\"Private Hospital Assistance Act of 2004.\\\" This bill creates the Private Hospital Development Plan which shall evaluate the facilities, human resources and other needs of private hospitals that comprise seventy percent (70%) of the total number of hospitals in the country. It proposes the creation of a Private Hospital Fund to enable private hospitals to accomodate more service ward patients and to finance/assist community-based health projects."
