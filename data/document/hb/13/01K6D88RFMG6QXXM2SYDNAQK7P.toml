congress_website_abstract = "The bill seeks to address some loopholes in RA 8292 (Higher Education Modernization Act of 1997) such as the composition, powers and duties of the governing bodies of state universities and colleges (SUCs); their term of office; meetings/quorum; and the administration of the SUC, among others."
