congress_website_title = "AN ACT ESTABLISHING PUBLIC LIBRARIES SPECIALLY DESIGNED FOR THE DISABLED, EQUIPPED WITH ACCESS TO INFORMATION, LIBRARY RESOURCES, AND RESEARCH"
congress_website_abstract = "The bill requires the Department of Education and the Commission on Higher Education to provide for the viaually impaired reading materials printed in the Braille system, books on audio and large print magazines and books. They are also directed to add entrance ramps and elevators to provide wheelchair users greater access to libraries."
