congress_website_title = "AN ACT AMENDING SECTION 97 OF REPUBLIC ACT NO. 8550 OTHERWISE KNOWN AS THE FISHERIES CODE OF THE PHILIPPINES OF 1998"
congress_website_abstract = "The bill seeks to define the term \\\"ENDANGERED SPECIES\\\" to mean ANY OF THE RARE MARINE LIFE WHICH IS DECLINING IN NUMBER AND IS IN DANGER OF EXTINCTION AND, FOR THE PURPOSE OF THIS PROPOSED ACT, ARE LISTED IN THE CITIES (CONVENTION ON THE INTERNATIONAL TRADE IN ENDANGERED SPECIES OF WILD FAUNA AND FLORA), BUT WILL NOT INCLUDE SPECIES WHICH ARE REPLENISHED OR GROWN BY MAN WITH THE AID OF RESEARCH AND TECHNOLOGY AND WHERE ACTUAL PROPAGATION IS IN PLACE ASSURING THE PRESERVATION AND INCREASE OF SUCH MARINE LIFE."
