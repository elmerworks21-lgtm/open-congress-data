congress_website_title = "AN ACT MANDATING EACH BUSINESS ENTITY, CORPORATION, FIRM, RETAIL OUTLET, ESTABLISHMENT AND ENTERPRISE IN THE PRIVATE SECTOR TO SHARE TEN PERCENT (10%) OF ITS ANNUAL NET PROFITS TO ITS RESPECTIVE EMPLOYEES AND WORKERS OVER AND ABOVE WHAT THEY RECEIVE AS WAGES AND OTHER BENEFITS PURSUANT TO EXISTING LAWS, ESTABLISHING THE MECHANISM AND PROPER STANDARDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Mandatory Profit Sharing Act of 2005\\\". The bill mandates private business entities to set aside 10% of their net profits to be given to employees as a cash gift over and above wages and benefits."
