congress_website_title = "AN ACT TO PRESERVE AND REHABILITATE THE FOREST BY PERMANENTLY BANNING ALL LOGGING OPERATIONS IN PROTECTED FORESTLANDS, CREATING FOR THE PURPOSE A TASK FORCE FOR THE PRESERVATION AND REHABILITATION OF FORESTS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Forest Preservation and Rehabilitation Act of 2004.\\\" The bill proposes a permanent ban on all commercial logging activities in all protected forests. It prohibits the issuance of licenses, permits or agreements to cut any timber therein."
