congress_website_title = "AN ACT EMPOWERING THE CHIEF OF PHILIPPINE NATIONAL POLICE TO APPOINT THE PROVINCIAL POLICE DIRECTOR AND THE PNP REGIONAL DIRECTOR TO APPOINT THE CITY AND MUNICIPAL CHIEF OF POLICE AMENDING FOR THAT PURPOSE REPUBLIC ACT NO. 6975 ENTITLED 'AN ACT ESTABLISHING THE PHILIPPINE NATIONAL POLICE UNDER A REORGANIZED DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT' AS AMENDED BY REPUBLIC ACT NO. 8551 AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to transfer the power of choose and appoint the Provincial Police Director and the city and municipal Chief of Police from the provincial Governor and the city or municipal Mayors, respectively, to the Chief of the Philippines National Police (PNP) and the PNP Regional Director, respectively."
