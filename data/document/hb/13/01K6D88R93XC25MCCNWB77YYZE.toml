congress_website_title = "AN ACT GRANTING AN ULTIMATE TAX AMNESTY COVERING UNPAID INCOME, ESTATE, GIFT, VALUE-ADDED, OTHER PERCENTAGE AND EXCISE TAXES FOR THE YEARS 1986 TO 2003"
congress_website_abstract = "\\\"Tax Amnesty Law of 2004.\\\" The bill grants an amnesty on income, estate, gift, value-added, other percentage and excise taxes for the years 1986 to 2003. It proposes to grant a credit for taxes already paid by those who have underpaid their income tax liabilities during the period. It extends certain immunities and privileges to those who avail of the tax amnesty."
