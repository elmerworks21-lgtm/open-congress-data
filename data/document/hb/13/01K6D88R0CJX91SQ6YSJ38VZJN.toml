congress_website_title = "AN ACT TO RATIONALIZE THE COMPOSITION AND FUNCTIONS OF THE NATIONAL LABOR RELATIONS COMMISSION, AMENDING FOR THIS PURPOSE ARTICLES 213, 214, 215 AND 216 OF P.D. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "This bill amends some provisions in P.D. No. 442, as follows: Composition of the NLRC from fourteen (14) to TWENTY-THREE (23) members; (2) The Commission may sit en banc or in EIGHT (8) divisions; (3) THE COMMISSION AND ITS EIGHT (8) DIVISIONS SHALL BE ASSISTED BY THE COMMISSION ATTORNEY'S IN ITS APPELLATE AND ADJUDICATORY FUNCTIONS WHOSE TERM SHALL BE CO-TERMINUS WITH THE COMMISSIONERS WITH WHOM THEY ARE ASSIGNED. THE COMMISSION ATTORNEYS SHALL BE MEMBERS OF THE PHILIPPINE BAR WITH AT LEAST ONE (1) YEAR EXPERIENCE IN THE FIELD OF LABOR-MANAGEMENT RELATIONS; and (4) Labor Arbiters shall have the same allowances, retirement and other benefits as that of the judges of the Regional Trial Courts."
