congress_website_title = "AN ACT TO PRESCRIBE THE ESTABLISHMENT OF PILOT TRIBAL COMMUNITIES IN EACH AND EVERY REGION IN THE PHILIPPINES WHICH SHALL SERVE AS MODEL HUMAN SETTLEMENTS THAT WILL ADHERE, TO THE EXTENT PRACTICABLE, TO THE CULTURE, CUSTOMS AND TRADITIONS OF SUCH TRIBAL COMMUNITIES, WHILE PROVIDING THE BASIC CONVENIENCES OF CONTEMPORARY LIVING STANDARDS AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill directs the Department of Land Reform, in coordination with the Presidential Commission on Indigenous Peoples, to establish a pilot tribal community for every distinct tribal community. Health, education and recreation facilities shall be integrated in each pilot tribal community."
