congress_website_title = "AN ACT RESTORING THE TAX EXEMPTION PRIVILEGES OF LOCAL WATER DISTRICTS UNDER SECTION 46 OF PRESIDENTIAL DECREE NO. 198, AS AMENDED AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill aims to: a) restore the tax exemption privileges enjoyed by water districts under PD 193 for a period of ten years; b) exempt water districts from RA 7656 which require government-owned and controlled corporations to remit 50% of their annual net income to government, and c) condone all unpaid taxes, duties and required remittances to the government."
