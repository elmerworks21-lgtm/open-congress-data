congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE HAZARDOUS AND RADIOACTIVE WASTES MANAGEMENT, PROVIDING PENALTIES FOR VIOLATIONS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "“Philippine Hazardous and Radioactive Wastes Management Act of 2006”. The measure defines the responsibilities, requirements and other protocols in hazardous, healthcare and radioactive wastes management. It provides clear criteria, guidelines and specifications in the treatment, storage and disposal facilities of hazardous waste for disposal."
