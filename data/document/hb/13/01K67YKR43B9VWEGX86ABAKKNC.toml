congress_website_title = "AN ACT PROVIDING SPECIAL PROTECTION TO CHILDREN/JUVENILES IN CONFLICT WITH THE LAW BY ESTABLISHING A COMPREHENSIVE JUVENILE JUSTICE SYSTEM AND DELINQUENCY PREVENTION PROGRAM, CREATING THE OFFICE OF THE JUVENILE JUSTICE AND DELINQUENCY PREVENTION UNDER THE DEPARTMENT OF JUSTICE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "“Child Protection Through a Comprehensive Juvenile Justice System Act of 2005”. The bill seeks to reform the present justice system for juvenile offenders. It proposes the adoption of restorative justice which considers the welfare of children in conflict with the law, and the interest and protection of the victim and the community."
