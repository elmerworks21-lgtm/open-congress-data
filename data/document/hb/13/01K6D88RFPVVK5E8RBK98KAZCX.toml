congress_website_title = "AN ACT REORGANIZING AND STRENGTHENING THE PUBLIC ATTORNEY'S OFFICE (PAO), AMENDING FOR THE PURPOSE PERTINENT PROVISIONS OF THE ADMINISTRATIVE CODE OF 1987 AND FOR OTHER PURPOSES"
