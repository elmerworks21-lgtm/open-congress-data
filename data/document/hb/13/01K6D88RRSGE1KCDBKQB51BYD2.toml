congress_website_title = "AN ACT REQUIRING THE IMPOUNDING OF MOTOR VEHICLES INVOLVED IN A VEHICULAR ACCIDENT THAT RESULTS IN THE DEATH OR SERIOUS PHYSICAL INJURY OF A PEDESTRIAN, COMMUTER OR BY-STANDER, UNLESS A CASH BOND IS POSTED"
congress_website_abstract = "The bill calls for the impounding of any motor vehicle involved in a vehicular incident resulting in the death or serious physical injuries to a pedestrian, commuter or by-stander pending the outcome of any criminal/civil case unless a cash bond of not less than P50,000 is posted."
