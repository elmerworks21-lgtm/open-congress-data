congress_website_title = "AN ACT TO STRENGTHEN THE UNIVERSITY OF THE PHILIPPINES AS THE NATIONAL UNIVERSITY"
congress_website_abstract = "\\\"The University of the Philippines Charter of 2004.\\\" The bill aims to strengthen the University of the Philippines by declaring it the national university of the State. As the national universityof the State, it shall: (a) set standards and initiate innovations in teaching, research and faculty development; (b) serve as a graduate university; (c) serve as a research university; (d) provide various forms of community, public and volunteer service, and scholarly and technical assistance; (e) provide opportunities for training and learning in progressive leadership; and (f) serve as a regional and global university."
