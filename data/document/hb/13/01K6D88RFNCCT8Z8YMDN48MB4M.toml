congress_website_title = "AN ACT AMENDING SECTION 1, PARAGRAPH 1, OF REPUBLIC ACT NUMBERED SIXTY THIRTY-SIX (6036), PROVIDING THAT BAIL SHALL NOT, WITH CERTAIN EXCEPTIONS, BE REQUIRED IN CASES OF VIOLATIONS OF MUNICIPAL OR CITY ORDINANCES AND IN CRIMINAL OFFENSES WHEN THE PRESCRIBED PENALTY FOR SUCH OFFENSES IS NOT HIGHER THAN PRISON CORRECTIONAL AND/OR A FINE OF TWENTY-FOUR THOUSAND PESOS OR BOTH"
congress_website_abstract = "The bill provides that bail shall not be required of a person charged with violation of a municipal or city ordinance, a light felony and/or criminal offense with a penalty of imprisonment for not more than six years and/or a fine of P24,000."
