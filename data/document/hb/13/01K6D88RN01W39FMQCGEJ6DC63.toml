congress_website_title = "AN ACT MANDATING THE USE OF COCO METHYL ESTER (CME), ALSO KNOWN AS COCO-BIODIESEL, AS AN ADDITIVE TO OR SUBSTITUTE FOR DIESEL FUEL DESIGNED TO EFFECTIVELY REDUCE VEHICULAR EMISSIONS SUCH AS NITROUS OXIDE, SULFUR OXIDE AND OTHER EFFLUENTS, AND ALSO TO INCREASE FUEL EFFICIENCY, THEREBY ESTABLISHING FOR THE PURPOSE THE NATIONAL COCO-BIODIESEL PROGRAM, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"Coco-Biodiesel Act of 2005\\\". The bill mandates the use of coco-diesel as an additive to or substitute for diesel fuel and thereby bolster the development of the coco-biodiesel industry."
