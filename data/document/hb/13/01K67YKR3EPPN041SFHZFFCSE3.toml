congress_website_abstract = "The bill proposes to increase the number of Commissioners in the National Labor Relations Commission (NLRC) from fifteen (15) to twenty four (24 and the number of divisions from five (5) to eight (8). It also recommends that the Chairman and the Commissioners in the NLRC be given the same rank, allowances and benefits as those given to the Presiding Justice and Associates of the Court of Appeals."
