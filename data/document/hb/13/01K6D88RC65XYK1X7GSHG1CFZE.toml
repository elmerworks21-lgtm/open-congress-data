congress_website_title = "AN ACT PROVIDING FOR MANDATORY TRAINING ON HUMAN RIGHTS FOR ALL OFFICERS, MEMBERS AND TRAINEES OF THE ARMED FORCES OF THE PHILIPPINES (AFP), THE PHILIPPINE NATIONAL POLICE (PNP), THE NATIONAL BUREAU OF INVESTIGATION (NBI), AND OTHER LAW ENFORCEMENT AGENCIES, AS WELL AS OFFICIALS AND EMPLOYEES IN THE EXECUTIVE, LEGISLATIVE AND JUDICIAL BRANCHES OF GOVERNMENT INCLUDING GOVERNMENT-OWNED AND/OR -CONTROLLED CORPORATIONS AND LOCAL GOVERNMENT UNITS AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill requires all branches of the government to include the study of human rights in the education and training of their officers and employees. It also directs all government-owned or financed training institutions to include in their curricula a regular course on human rights."
