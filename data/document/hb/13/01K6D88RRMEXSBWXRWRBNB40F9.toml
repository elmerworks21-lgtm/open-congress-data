congress_website_title = "AN ACT AMENDING SECTION 35 (A) AND (B) REPUBLIC ACT NO. 9010 ENTITLED \\\"THE NATIONAL INTERNAL REVENUE CODE OF 1997\\\", AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill increases the basic personal exemption of individual taxpayers, to wit: a) for single individuals or legally separated individuals with no qualified dependents - P40,000; b) for head of the family - P50,000; and c) for each married individual - P64,000. It also increases the additional exemption for each dependent (but not exceeding four dependents) to P16,000."
