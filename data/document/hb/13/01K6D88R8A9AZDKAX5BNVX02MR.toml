congress_website_title = "AN ACT ESTABLISHING A BAYANIHAN HOMEBUILDING PROGRAM FOR LOW INCOME GROUPS THROUGH GRADUATED AMORTIZATION PAYMENT (GAP) SCHEME AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Bayanihan Homebuilding Program Act of 2004.\\\" The bill proposes the establishment of a self-help homebuilding program wherein beneficiaries shall be required to render hours of labor as part of their investment. It provides for the eligibility criteria for beneficiaries of the program and a graduated amortization payment scheme."
