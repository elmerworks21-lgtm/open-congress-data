congress_website_title = "AN ACT PROVIDING SANCTIONS, FINES AND PENALTIES FOR VIOLATION OF LAWS RELATING TO CONSTRUCTION OF BASE STATIONS OF CELLULAR MOBILE TELEPHONE, PAGING SERVICE, TRUNKING SERVICE, WIRELESS LOCAL LOOP SERVICE AND OTHER WIRELESS COMMUNICATION SERVICES"
congress_website_abstract = "The bill imposes the following sanctions for the construction of base stations and similar structures in violation of HLURB Resolution R-626: a) issuance of a cease and desist order by the city/municipality mayor where such structure is erected; and b) an order of permanent stoppage of work and/or removal of any work or improvement at the expense of the entity concerned."
