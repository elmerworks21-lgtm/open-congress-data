congress_website_title = "AN ACT CREATING THE EXPRESS LANE SECTION IN ALL GOVERNMENT INSTITUTIONS, ITS SUBSIDIARIES, LOCAL GOVERNMENT UNITS, GOVERNMENT OWNED AND CONTROLLED CORPORATIONS, INTERNATIONAL ORGANIZATIONS, CONSULAR AND DIPLOMATIC MISSIONS OPERATING IN THE PHILIPPINES, IMPOSING PENALTY FOR NON-COMPLIANCE, ESTABLISHING THE PEOPLES' EXPRESS LANE COMMISSION, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Express Lane Act of 2004.\\\" The bill mandates all government institutions to establish an express lane to facilitate the delivery of services in the most convenient, fast and reliable manner. The creation of the express lane is envisioned to eliminate fixers and counterfeit/fake documents."
