congress_website_title = "AN ACT RESETTING THE DATE OF BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS TO THE SECOND MONDAY OF MAY, 2008, THEREBY AMENDING FOR THE PURPOSE SECTION 1 OF REPUBLIC ACT NO. 9164, OTHERWISE KNOWN AS 'AN ACT PROVIDING FOR SYNCHRONIZED BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS'"
congress_website_abstract = "The bill provides for the holding of the synchronized barangay and sangguniang kabataan elections on the 2nd Monday of May 2008 and every three years thereafter."
