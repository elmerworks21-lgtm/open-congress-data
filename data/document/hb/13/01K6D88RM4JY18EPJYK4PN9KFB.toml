congress_website_title = "AN ACT REPEALING REPUBLIC ACT NUMBERED 6727, OTHERWISE KNOWN AS AN ACT TO RATIONALIZE WAGE POLICY DETERMINATION BY ESTABLISHING THE MECHANISM AND PROPER STANDARDS THEREFOR, AMENDING FOR THE PURPOSE ARTICLE 99 OF, AND INCORPORATING ARTICLES 120, 121, 122, 123, 124, 126 AND 127 INTO, PRESIDENTIAL DECREEE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, FIXING NEW WAGE RATES, PROVIDING WAGE INCENTIVES FOR INDUSTRIAL DISPERSAL TO THE COUNTRYSIDE, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks the repeal of RA 6727 which granted the Regional Tripartite Wages and Productivity Boards the authority to prescribe the minimum wage rates for agricultural and non-agricultural employees and workers in each and every region of the country. RA 6527 is viewed to have heightened labor exploitation to unprecendented levels."
