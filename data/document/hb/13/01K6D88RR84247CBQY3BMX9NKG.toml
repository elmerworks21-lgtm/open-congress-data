congress_website_title = "AN ACT STRENGTHENING THE CONSTITUTIONAL RIGHT OF THE PEOPLE TO FREE EXPRESSION, PEACEABLY ASSEMBLE AND PETITION THE GOVERNMENT FOR REDRESS OF GRIEVANCES"
congress_website_abstract = "\\\"The Public Assembly Act of 2005\\\". The bill requires that prior notice be given for the holding of a public assembly to the city/municipal mayor having jurisdiction over the venue. It provides that no other procedural or administration requirement shall be imposed on the organizers. It also seeks to repeal Batas Pambansa 880 which decreed the \\\"no permit, no rally\\\" rule."
