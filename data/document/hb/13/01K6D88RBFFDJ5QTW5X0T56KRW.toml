congress_website_title = "AN ACT AMENDING SECTION 145 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997"
congress_website_abstract = "The bill proposes to replace the present four-tier tax system on cigarettes packed by machines with a unitary tax rate of P6.50 per pack. It also requires cigarette manufacturers and importers to report the volume of removals instead of the volume of sales to plug the leakages arising from the underdeclaration of removals."
