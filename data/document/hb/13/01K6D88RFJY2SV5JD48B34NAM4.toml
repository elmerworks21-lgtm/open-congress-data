congress_website_title = "AN ACT PROHIBITING THE PUBLIC DISPLAY OF SIGNAGES BEARING THE NAME/S OF ANY PUBLIC OFFICIAL/S, IN CONNECTION WITH ANY PROJECT WHOSE FUNDS, WHOLLY OR PARTLY, COME FROM THE GOVERNMENT"
congress_website_abstract = "\\\"Anti Signage of Government Projects Act.\\\" The bill prohibits the following: a) affixing the name and image of any public official to a signage announcing a proposed or on-going government project; and b) installing a signage announcing the maintenance, rehabilitation and construction of public works crediting individual public officers for such public works."
