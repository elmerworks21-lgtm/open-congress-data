congress_website_title = "AN ACT TO MAKE THE LAWS ON PATENTS, TRADENAMES AND TRADEMARKS MORE RESPONSIVE TO THE HEALTH CARE NEEDS OF THE FILIPINO PEOPLE BY ALLOWING THE IMPORTATION, EARLY DEVELOPMENT OF PATENTED MEDICINES AND EXCEPTIONS TO THE APPLICATION OF STANDARD COMPULSORY LICENSING REQUIREMENTS FOR DRUGS OR MEDICINES TO LOWER DRUG OR MEDICINE PRICES BY AMENDING FOR THIS PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NO. 8293 OTHERWISE KNOWN AS THE INTELLECTUAL PROPERTY CODE OF THE PHILIPPINES"
congress_website_abstract = "The bill seeks to lower the prices of medicines through greater competition among drug companies and by providing the government with better policy tools to influence the supply and demand of medicines."
