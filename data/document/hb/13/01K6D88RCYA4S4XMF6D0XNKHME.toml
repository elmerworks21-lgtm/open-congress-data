congress_website_title = "AN ACT REQUIRING ALL GOVERNMENT AGENCIES THAT PROVIDE FRONTLINE SERVICES TO PROVIDE THE PUBLIC INFORMATION ON HOW TO ACCESS SUCH SERVICES FROM THEIR RESPECTIVE OFFICES"
congress_website_abstract = "\\\"Frontline Service Information Act of 2004.\\\" The bill directs all branches and units of the government that provide frontline services to the public to put-up information billboards and produce handbooks or primers that detail: a) the procedure to obtain a particular service; b) person/s responsible for each step; c) maximum processing time; d) required documents; e) amount of fees; and f) procedure for filing complaints."
