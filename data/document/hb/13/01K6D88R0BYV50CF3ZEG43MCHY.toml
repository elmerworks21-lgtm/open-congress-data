congress_website_title = "AN ACT ESTABLISHING A NATIONAL PROGRAM FOR FILIPINO GIFTED CHILDREN AND SCIENCE-ORIENTED YOUTH, PROVIDING FUNDS THEREFOR"
congress_website_abstract = "\\\"Gifted Children and Science-Oriented Youth Act.\\\" This bill states the following objectives: (1) Identify the gifted Filipino children and science-oriented youth at the earliest age possible; (2) Establish a Center for the identification and nurturance of Filipino gifted children and science-oritented youth; (3) Provide scholarship grants and other forms of assistance for identified Filipino gifted children and science-oriented youth; (4) Provide funds for research and development, curriculum development, training of parents, teachers and other personnel; (5) Provide incentives to government institutions and the private sector that will participate in the implementation of this Act; and (6) Establish and maintain linkages with national and international institutions involved in programs on giftedness."
