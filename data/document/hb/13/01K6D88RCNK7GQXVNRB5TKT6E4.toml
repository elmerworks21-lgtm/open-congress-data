congress_website_title = "AN ACT AMENDING BATAS PAMBANSA BILANG 22, OTHERWISE KNOWN AS THE BOUNCING CHECK LAW, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill provides that personal receipt of a notice of dishonor and/or a notice of demand to pay is not necessary for the conviction of the maker, drawer, endorser of the check. It also provides for the notice of dishonor and/or demand to pay to be addressed to the last known address of the maker, drawer or endorser."
