congress_website_title = "AN ACT REQUIRING INTERMEDIATE GRADE SCHOOL AND HIGH SCHOOL STUDENTS TO DO COMMUNITY WORK AS PART OF THEIR CURRICULUM AND AS PREREQUISITE FOR GRADUATION"
congress_website_abstract = "The bill requires intermediate pupils in public and private schools to render 50 hours of community service. It also gives private and public high school students the option to choose any of the following programs as a prerequisite tp graduation: a) undergo Citizens Army Training; b)undergo training courses conducted by the Boys or Girls Scouts of the Philippines; and c) undertake 50 hours of community service."
