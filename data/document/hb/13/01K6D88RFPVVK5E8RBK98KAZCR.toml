congress_website_title = "AN ACT ADJUSTING THE RATE OF SUBSIDIARY IMPRISONMENT FROM ONE DAY FOR EACH P8.00 TO ONE DAY FOR AN AMOUNT EQUIVALENT TO THE DAILY MINIMUM WAGE OF A LABORER IN THE NATIONAL CAPITAL REGION AMENDING FOR THE PURPOSE ARTICLE THIRTY-NINE OF THE REVISED PENAL CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "The bill proposes to adjust the subsidiary imprisonment which a convict with no property has to suffer from \\\"one day for each P8.00\\\" to \\\"one day for an amount equivalent to the daily minimum wage of a laborer in the National Capital Region,\\\" which he can not pay."
