congress_website_abstract = "“Philippine Orthopedic Hospital Modernization Act of 2005”. The measure provides for the restructuring and streamlining of the units under the Philippine Orthopedic Hospital, the adoption of manpower development and professional education programs, the acquisition and upgrading of medical equipment and supplies, and the construction or improvement of infrastructures and support facilities."
