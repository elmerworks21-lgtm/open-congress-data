congress_website_title = "AN ACT PROVIDING INCOME EXTENDERS TO PUBLIC ELEMENTARY AND SECONDARY SCHOOL TEACHERS AND FOR OTHER PURPOSES"
congress_website_abstract = "“The Public Elementary and Secondary School Teachers’ Income Extenders Act of 2006”. The bill seeks to grant public school teachers non-monetary incentives in the form of tuition fee exemption for their children enrolled in state universities and colleges, a 25% discount in the price of rice/corn bought directly from the National Food Authority and a GSIS loan interest rate 3% lower than the regular rate."
