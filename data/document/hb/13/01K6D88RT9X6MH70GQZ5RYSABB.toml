congress_website_title = "AN ACT REQUIRING CERTIFICATION OF THE DEPARTMENT OF SOCIAL WELFARE AND DEVELOPMENT (DSWD) TO DECLARE A \\\"CHILD LEGALLY AVAILABLE FOR ADOPTION\\\" AS A PREREQUISITE FOR ADOPTION PROCEEDINGS, AMENDING FOR THIS PURPOSE CERTAIN PROVISION OF REPUBLIC ACT OF 1998, REPUBLIC ACT NO. 8043, OTHERWISE KNOWN AS THE INTER-COUNTRY ADOPTION CODE, PRESIDENTIAL DECREE NO. 603 OTHERWISE KNOWN AS THE CHILD AND YOUTH WELFARE CODE, AND OTHER PURPOSES"
congress_website_abstract = "The bill seeks to transfer the resolution of Declaration of Abandonment cases to the Department of Social Welfare and Development (DSWD), changing the nature of the proceedings to quasi-judicial. It also requires a certification from the DSWD declaring the adoptee legally available for adoption as a prerequisite to all adoption proceedings whether domestic or inter-country."
