congress_website_title = "AN ACT EXTENDING THE APPLICATION PERIOD FOR FILING SPECIAL PURPOSE VEHICLES FROM 18 MONTHS TO 36 MONTHS, AND EXTENDING THE APPLICABLE PERIOD OF THE TAX EXEMPTIONS AND FEE PRIVILEGES PROVIDED TO SPECIAL PURPOSE VEHICLES FROM NOT MORE THAN 2 YEARS TO NOT MORE THAN 5 YEARS AMENDING FOR THE PURPOSE SECTION 6, AND SECTION 15 PARAGRAPH C OF REPUBLIC ACT NO. 9182 OTHERWISE KNOWN AS THE SPECIAL PURPOSE VEHICLE ACT OF 2002"
