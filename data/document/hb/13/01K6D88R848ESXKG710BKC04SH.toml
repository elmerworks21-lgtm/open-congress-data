congress_website_title = "AN ACT PROVIDING FOR OPTIMUM PERFORMANCE IN REVENUE COLLECTION THROUGH THE GRANT OF SPECIAL INCENTIVES AND REWARDS FOR EXEMPLARY SERVICE AND THROUGH LATERAL ATTRITION IN REVENUE-GENERATING AGENCIES OF GOVERNMENT AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill provides for a system of special incentives and rewards to motivate officials/officers/employees of the Bureau of Internal Revenue and the Bureau of Customs and their parallel set-up in other revenue-generating agencies to render exemplary service and, at the same time, uphold the highest ethical standards. It provides for a system of lateral attrition that may be applied after careful review by the Revenue Performance Evaluation Board."
