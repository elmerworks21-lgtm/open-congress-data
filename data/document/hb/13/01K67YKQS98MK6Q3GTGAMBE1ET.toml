congress_website_abstract = "\\\"The Investments Incentives Code of the Philippines.\\\" The bill prescribes the powers, duties and composition of the Board of Governors of the Board of Investments. It identifies the industries, services and activities eligible for incentives; grants incentives to registered companies and provides for the basic rights and guarantees of registered companies."
