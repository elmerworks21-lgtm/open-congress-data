congress_website_title = "AN ACT CANCELLING PAYMENTS OF LOANS AND RECOVERING PREVIOUS PAYMENTS FOR THE FRAUDULENT LOANS INCURRED DURING THE MARCOS MARTIAL LAW REGIME DEBT"
congress_website_abstract = "\\\"Marcos Martial Law Regime Debt Cancellation Act\\\". The bill prohibits the inclusion in the General Appropriations Act and in supplementary budgets debt interest payments and principal amortization payments for loans incurred by or related to the Marcos martial law regime. It directs the Department of Finance to negotiate for the refund of all previous interest and principal amortization payments made for such loans."
