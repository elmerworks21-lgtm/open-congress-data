congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED NINETY ONE HUNDRED AND EIGHTY TWO (R.A. NO. 9182), OTHERWISE KNOWN AS THE SPECIAL PURPOSE VEHICLE ACT OF 2002"
congress_website_abstract = "The bill seeks to extend the duration of availment of tax exemptions and fee privileges from two years to four years to give financial institutions (FIs), debtors and investors ample time to benefit from these incentives. It also grants FIs special rights and protection to ensure the efficiency of the Special Purpose Vehicle Act of 2002."
