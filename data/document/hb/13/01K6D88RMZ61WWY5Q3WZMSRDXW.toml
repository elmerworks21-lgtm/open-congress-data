congress_website_title = "AN ACT PROVIDING FOR TRANSPARENCY IN THE PRICING OF PETROLEUM PRODUCTS, STRENGTHENING THE POWERS OF THE DEPARTMENT OF ENERGY, THEREBY AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 8479, OTHERWISE KNOWN AS THE \\\"DOWNSTREAM OIL INDUSTRY DEREGULATION ACT\\\" PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
