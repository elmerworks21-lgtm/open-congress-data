congress_website_title = "AN ACT FURTHER STRENGTHENING THE HOUSING AND LAND USE REGULATORY BOARD, AND FOR OTHER PURPOSES"
congress_website_abstract = "“HLURB Charter Amendments of 2005”. The bill proposes to grant the Board the following, among others: a) the power to conduct en banc hearings on any opposition to an application for a license, permit or clearance which have economic, social, environmental or national implications; and b) exclusive jurisdiction over cases decided upon by the Housing and Land Use Arbiter."
