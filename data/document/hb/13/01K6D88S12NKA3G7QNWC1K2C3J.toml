congress_website_title = "AN ACT VESTING CERTAIN GOVERNMENT OFFICERS WITH THE AUTHORITY TO GRANT TIME ALLOWANCES TO PRISONERS FOR GOOD CONDUCT, AMENDING FOR THE PURPOSE ARTICLE TWENTY-NINE OF ACT NUMBERED THREE THOUSAND EIGHT HUNDRED FIFTEEN, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "The bill extends the authority to grant time allowance to the following: a) the Director of the Bureau of Corrections for insular prisoners; b) the Provincial Governor for provincial prisoners; and c) the Chief of the Bureau of Jail Management and Penology for city or municipal prisoners."
