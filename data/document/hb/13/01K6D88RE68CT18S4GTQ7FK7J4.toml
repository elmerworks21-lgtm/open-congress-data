congress_website_title = "AN ACT AMENDING SECTION 109 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to withdraw the exemptions from the value-added tax, to wit: a) sale or importation of coal, natural gas and petroleum products; b) sale or importation of raw materials used in the manufacture of petroleum products by the buyer/importer himself; c) importation of passenger and cargo vessels of more than 5,000 tons; d) sales and importation of cooperatives; e) sale, importation, printing and publication of books; and f) service rendered in the exercise of medical and legal profession."
