congress_website_title = "AN ACT TO REGULATE THE OPERATION OF TELECOMMUNICATIONS SERVICES BY REQUIRING A MONTHLY BILLING STATEMENTS OF TELECOMMUNICATIONS SERVICES TO PROMOTE THE WELFARE OF THE CONSUMING PUBLIC, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to regulate the following services rendered by public telecommunications entities: a) the issuance of monthly billing statements; b) the sale and use of prepaid cards; c) the unit of billing of cellular mobile telephone service CMTS; and d) the deregulation of rates for leased lines and CMTS."
