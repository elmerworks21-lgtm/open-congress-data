congress_website_title = "AN ACT TO AMEND SECTION SEVEN OF REPUBLIC ACT NUMBERED ONE HUNDRED SIXTY-SIX, OTHERWISE KNOWN AS THE LAW ON TRADEMARKS, TRADENAMES AND UNFAIR COMPETITION FOR THE PURPOSE OF REQUIRING THE PUBLICATION OF A LISTING OF APPLICATIONS FOR REGISTRATION IN A NEWSPAPER OF NATIONAL CIRCULATION AND FOR OTHER PURPOSES"
