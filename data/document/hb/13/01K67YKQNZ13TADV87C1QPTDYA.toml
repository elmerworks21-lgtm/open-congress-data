congress_website_coauthors_raw = ["CODILLA, EUFROCINO SR. M.","YAPHA, ANTONIO JR. P.","AMIN, HUSSIN U.","ROQUERO, EDUARDO V.","UY, REYNALDO S.","MAGSAYSAY, EULOGIO R.","CARMONA, TRANQUILINO B.","CARLOS, JOSE EMMANUEL L.","AGARAO, BENJAMIN JR. C.","MAGSAYSAY, MA. MILAGROS H.","FABIAN, ERICO BASILIO A.","AGBAYANI, RODOLFO Q.","FIGUEROA, CATALINO V.","VIOLAGO, ELEUTERIO R.","AQUINO, JESUS REYNALDO B.","PINGOY, ARTHUR \"DODO\" JR. Y. M.D.","ANGARA, JUAN EDGARDO M.","BIRON, FERJENEL G.","GARIN, JANETTE L.","FIRMALO, EDUARDO C.","SEACHON-LANETE, RIZALINA"]
