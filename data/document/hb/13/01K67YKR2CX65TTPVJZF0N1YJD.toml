congress_website_title = "AN ACT DEFINING AS A CRIME THE ACT OF DRIVING ANY MOTOR VEHICLE WHILE UNDER THE INFLUENCE OF ALCOHOLIC BEVERAGES AND/OR PROHIBITED DRUGS AND PROVIDING GRADUATED PENALTIES THEREFOR"
congress_website_abstract = "\\\"Anti-Drunk Driving Act of 2005\\\". The bill imposes the following penalties on drunk drivers (persons with blood alcohol concentration level of 0.6% or more): a) 1st offense - P1,000 fine and one year suspension of driver's license or 30 days imprisonment; b) 2nd offense - P5,000 fine and five years suspension of driver's license plus 30 days imprisonment; and c) 3rd offense - P10,000 fine and revocation of driver's license for five years plus 30 days imprisonment."
