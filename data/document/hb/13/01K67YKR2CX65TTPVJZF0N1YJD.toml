congress_website_author_codes = ["D077"]
congress_website_coauthors_raw = ["MAGSAYSAY, EULOGIO R.","ABAYON, HARLIN CAST","CHUNGALAO, SOLOMON R.","PUENTEVELLA, MONICO O.","FUA, ORLANDO JR. A.","AGUJA, MARIO JOYO"]
congress_website_committee_codes = ["0531","0532"]
