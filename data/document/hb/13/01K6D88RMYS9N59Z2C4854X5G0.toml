congress_website_title = "AN ACT TO PROVIDE FOR THE PRESERVATION AND CULTIVATION OF THE FILIPINO HERITAGE AMONG FILIPINOS OVERSEAS THROUGH THE TEACHING OF FILIPINO LANGUAGE AND HISTORY, ASSISTANCE IN THE ESTABLISHMENT AND OPERATION OF PHILIPPINE SCHOOLS AND FILIPINIANA CENTERS ABROAD AND ESTABLISHING A TRUST FUND THEREFOR"
