congress_website_title = "AN ACT TO ENSURE PUBLIC ACCESS TO OFFICIAL INFORMATION AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Right to Information Act of 2004.\\\" The bill seeks to put in a place a uniform, simple, speedy and effective means of enforcing the right to information and to provide penalties for the unlawful denial of access to official information. It establishes the National Information Commission and prescribes its composition, jurisdiction, powers and functions."
