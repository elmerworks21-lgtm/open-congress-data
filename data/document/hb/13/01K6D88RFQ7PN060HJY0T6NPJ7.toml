congress_website_title = "AN ACT AMENDING SECTION III (B) (1) OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "The bill includes in the coverage of the presumptive input tax system persons or firms engaged in the processing of home-processed meat products and the manufacture of instant noodles. It proposes to increase the presumptive input tax from 1 1/2% to 3 1/2% of the gross value in money of their purchases of primary agricultural products used as inputs to production."
