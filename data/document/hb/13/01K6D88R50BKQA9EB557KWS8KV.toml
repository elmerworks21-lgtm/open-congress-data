congress_website_title = "AN ACT SYNCHRONIZING THE BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS WITH THE NATIONAL ELECTIONS AND CHANGING THE TERM OF OFFICE OF BARANGAY OFFICIALS AND SANGGUNIANG KABATAAN OFFICIALS FROM THREE (3) YEARS TO FIVE (5) YEARS AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill synchronizes the barangay and sanggunian kabataan elections with the national elections which shall be held on the 2nd Monday of May 2007. Thereafter, the barangay and sanggunian kabataan elections shall be held every five years."
