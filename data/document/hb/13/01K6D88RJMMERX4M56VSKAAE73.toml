congress_website_title = "AN ACT GRANTING CERTAIN PRIVILEGES AND MONTHLY PENSIONS TO FORMER WORLD BOXING CHAMPIONS AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "The bill grants the following privileges to Filipino world boxing champions: a) P100,000 cash award; b) medical and hospitalization benefits, c) a P500,000 insurance coverage by the GSIS, and d) a lifetime monthly pension of P30,000 upon reaching the age of 55 years or if incapacitated."
