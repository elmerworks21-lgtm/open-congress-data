congress_website_title = "AN ACT AMENDING SECTION 145 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997"
congress_website_abstract = "The bill seeks to: a) update or make current the net retail prices of cigarettes that serve as the basis of the tax rates; b) increase the tax rate for each brand of cigarette by P3.00; and c) index the net retail price and the tax rates to the average inflation rate."
