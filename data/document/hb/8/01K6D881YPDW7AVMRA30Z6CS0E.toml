congress_website_title = "ISANG BATAS NA NAG-UUTOS SA PAGLALATHALA NG KONGRESO NG ABISO-TAGAPAGBA TAS O LEGISLATIVE NOTICE SA MGA PAHAYAGANG MAY PAMBANSANG SIRKULASYON NG LAHATNG MGA PAGDINIGPAMBAYA N, MGA IMBESTIGASYON, MGA PAGTATANONG-PAG SISIYASAT O INQUIRIES AT IBA PA, NA PINAMAMAHALAAN AT GINAGAWA O PAMAMAHALAAN AT GAGAWIN NITO PARA SA LAYUNIN NA ANG LAHAT NG MGA INTERESADONG TAO NA MAYROONG MAGANDANG HANGARIN AY MAABISUHAN AT MAKADALO SA GANITONG MGA PAGDINIG-PAMBAY AN, IMBESTIGASYON, PAGTATANONG-PAG SISIYASAT ATIBA PA. (AN ACT REQUIRING THE PUBLICATION OF LEGISLATIVE NOTICE BY CONGRESS IN NEWSPAPERS OF NATIONWIDE CIRCULATION OF ALL PUBLIC HEARINGS, INVESTIGATIONS, INQUIRIES, AND OTHERS, BEING CONDUCTED OR WILL BE CONDUCTED BY IT TO THE END THAT ALL BONA FIDE INTERESTED PARTIES MAY BE NOTIFIED OF AND ATTEND SUCH PUBLIC HEARINGS, INVESTIGATIONS, INQUIRIES, AND OTHERS)"

