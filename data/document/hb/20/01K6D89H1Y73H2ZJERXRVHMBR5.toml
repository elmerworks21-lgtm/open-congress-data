congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 9510, OTHERWISE KNOWN AS THE “CREDIT INFORMATION SYSTEMS ACT (CISA)” AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to institutionalize the transfer of oversight and supervision of the Credit Information Corporation to the Bangko Sentral ng Pilipinas (BSP), in line with the national strategy for financial inclusion. Aims to facilitate a seamless transition so that credit information systems become interoperable and bureaucracy is streamlined, while efficient operations continue and disruptions in the concerned government offices are minimized."
