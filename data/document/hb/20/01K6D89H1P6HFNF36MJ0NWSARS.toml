congress_website_title = "AN ACT AMENDING SECTION 13 OF REPUBLIC ACT NO. 3019 AS AMENDED, ENTITLED THE “ANTI-GRAFT AND CORRUPT PRACTICES ACT”"
congress_website_abstract = "Seeks to amend Section 13 to read as follows: Section 13. Suspension and Loss of Benefits. - Any incumbent public officer against whom any criminal prosecution under a valid information . . . or for any offense involving fraud upon government or public funds or property . . . is pending in court, shall be suspended from office FOR A PERIOD NOT EXCEEDING NINETY (90) DAYS: PROVIDED, THAT IN CASE SUCH ELECTED PUBLIC OFFICER IS NO LONGER CONNECTED WITH THE OFFICE WHEREIN THE OFFENSE CHARGED WAS COMMITTED, THE PREVENTIVE SUSPENSION ORDER SHALL NO LONGER BE IMPELEMENTED."
