congress_website_abstract = "Seeks to address the rice crisis and to ensure rice production in the country. Proposes to relaunch the program, taking into consideration the following matters: productivity in rain-fed rice, water control through irrigated systems, applicable technologies to increase yields, rice varieties that can cope with climate change, excess water/flooding, hybrid plant breeding, and genetic engineering."
