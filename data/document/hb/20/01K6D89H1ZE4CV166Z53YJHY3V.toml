congress_website_abstract = "Proposes to amend Sec.52 of R.A.8435 to read as follows: SECTION 1. “Section 52. Farm-to-Market Roads The Department shall coordinate . . . in order to identify priority locations . . . that take into account the number of farmers and fisherfolk and their families who shall benefit therefrom and the amount, kind and importance of agricultural and fisheries products produced in the area. Construction of farm-to-market roads shall be a priority of the LGUs."
