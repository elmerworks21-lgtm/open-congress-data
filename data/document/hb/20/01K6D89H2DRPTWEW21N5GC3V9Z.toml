congress_website_abstract = "Proposes the ff. amendments: “(d) Ten Percent (10%) of the estimated revenue from regular sources shall be set aside as annual lump sum appropriations for relief, rehabilitation, reconstruction and other works or services in connection with calamities and pandemics which may occur during the budget year: Provided, however, That such fund shall be used only in the area, or a portion thereof, of the local government unit or other areas affected by a disaster, calamity or pandemic as determined and declared by the local sanggunian concerned.”"
