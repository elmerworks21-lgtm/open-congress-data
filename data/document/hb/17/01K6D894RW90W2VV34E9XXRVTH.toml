congress_website_title = "AN ACT PROVIDING FOR A NATIONAL DISASTER RESILIENCE FUND, TO MAINTAIN THE NECESSARY BALANCE OF FUNDING, TO MEET THE REQUESTS AND DEMANDS FOR SUPPORT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates the allocation of grants from Disaster Resilience Fund to support small and medium scale disasters, provides therefore an initial amount of FIVE HUNDRED MILLION PESOS (P500,000,000.00) to promote urgent disaster resiliency concerned measures. Enumerates the determining factors and conditions that may influence the size of the grant/fund such as: extent of damage; estimate of death, injuries, and displaced persons; response capacity of key agencies; and date and magnitude of the last disaster."
