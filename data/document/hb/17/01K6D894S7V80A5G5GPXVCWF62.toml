congress_website_title = "AN ACT TO ENHANCE PUBLIC FINANCIAL MANAGEMENT IN LOCAL GOVERNMENT UNITS BY AMENDING CERTAIN PROVISIONS IN REPUBLIC ACT 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Mandates the Department of Local Government (DILG), Department of Finance (DOF), Department of Budget and Management (DBM), and the National Economic Development Authority (NEDA) to provide guidance to local government units regarding public financial management. Highlights the oversight role of the Provincial, City, and Municipal governments to ensure that provinces, cities, municipalities and barangays adhere to the principles and policies of good governance and efficient public financial management."
