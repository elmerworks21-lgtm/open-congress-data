congress_website_title = "AN ACT REQUIRING RESTAURANTS AND OTHER SIMILAR FOOD ESTABLISHMENTS TO DISCLOSE AND DISPLAY NUTRITIONAL INFORMATION OF FOOD AND BEVERAGES ON THEIR MENUS AND MENU BOARDS"
congress_website_abstract = "Aims to help Filipinos make an informed and healthier decision on their food choices by providing that food establishments disclose the corresponding nutrient content, in a clear and conspicuous manner as regard to: total calories; calories from fat; total fat; saturated fat; trans fat; cholesterol; Sodium; total carbohydrates; dietary fiber; sugars; and protein Provides that the statement: “2,000 calories a day is used for general nutrition advice, but calorie needs vary” be posted prominently to enable consumers to understand, in the context of a total daily diet, the significance of calorie information. Also includes provision for menus and menu boards targeting children with options as a substitute for or in addition to the above statement."
