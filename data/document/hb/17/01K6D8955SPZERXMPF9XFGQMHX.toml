congress_website_title = "AN ACT UPGRADING THE RANK STRUCTURE OF UNIFORMED MEMBERS OF THE BUREAU OF FIRE AND PROTECTION THE BUREAU OF JAIL MANAGEMENT AND PENOLOGY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9263 AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to establish fairness and parity among the uniformed personnel of the BFP and BJMP by upgrading their rank structure to a level commensurate with their critical role in maintaining security and peace and order, which should be at par with those of the PCG, PNP and AFP, taking into consideration their exposure to high-risk environments. Proposes to further amend the BFP and BJMP Professionalization Act, as amended to upgrade several key positions as provided in this Act."
