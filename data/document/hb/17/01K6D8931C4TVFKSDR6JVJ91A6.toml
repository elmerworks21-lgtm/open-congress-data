congress_website_title = "AN ACT STRENGTHENING THE PHILIPPINE COMPREHENSIVE POLICY ON HUMAN IMMUNODEFICIENCY VIRUS (HIV) AND ACQUIRED IMMUNE DEFICIENCY SYNDROME (AIDS) PREVENTION, TREATMENT, CARE, AND SUPPORT, AND ESTABLISHING THE PHILIPPINE NATIONAL HIV AND AIDS PLAN, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 8504, OTHERWISE KNOWN AS THE “PHILIPPINE AIDS PREVENTION AND CONTROL ACT OF 1998,” AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Establishes policies and programs to prevent the spread of Human Immunodeficiency Virus (HIV) and Acquired Immune Deficiency Syndrome (AIDS) and deliver treatment, care, and support services to Filipinos HIV and AIDS in accordance with evidence-based strategies and approaches that follow the principle of human rights, gender-responsiveness, and meaningful participation of communities affected by the epidemic."
