congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA FOR WORKERS, ENTERPRISES AND ORGANIZATIONS IN THE INFORMAL ECONOMY AND PROVIDING MECHANISMS FOR RECOGNITION, INTEGRATION, AND TRANSITION TO THE FORMAL ECONOMY"
congress_website_abstract = "Refers “Informal Economy” to all economic activities by workers and economic units that are, in law or in practice, not covered or insufficiently covered by formal arrangements, and which lack social protection and are subject to hazardous working conditions. Seeks to provide rights and benefits for workers in the informal economies by giving affordable social protection and security in the workplace. Also provides for: labor standards and enforcement of labor laws for its informal workers; creation of Informal Economy Development Council (IEDC); and establishment of Workers in Informal Employment Local Development Office (WIELDO)."
