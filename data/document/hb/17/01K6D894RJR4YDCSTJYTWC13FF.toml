congress_website_title = "AN ACT REGULATING THE CATCHING SALE, PURCHASE, POSSESSION, TRANSPORTATION, IMPORTATION, AND EXPORTATION OF ALL SHARKS, RAYS, CHIMAERAS, OR ANY PART THEREOF IN THE COUNTRY"
congress_website_abstract = "Provides for the conservation and protection of sharks, management of their threats, and creation of shark sanctuaries. Declares the following acts as illegal and penalizes the same: killing, taking, keeping in captivity, inflicting injury, harassing and trading vulnerable, threatened, endangered, or critically endangered species, and finning of sharks, among others."
