congress_website_title = "AN ACT REQUIRING THE PHILIPPINE GOVERNMENT TO ISSUE EDUCATIONAL BONDS FOR THE BENEFIT OF TERTIARY STUDENTS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines Educational Bond as a long-term government security issued by a national government with corresponding interest and sovereign guarantee. Proposes an issuance of treasury bonds in the name of every Filipino at birth which shall be used exclusively to augment any and all financial assistance extended by the government through the proceeds of said security instrument upon maturity, release of which shall be to the qualified beneficiary only under the ff. conditions: a) At the time he or she reaches 18 years of age, must be enrolled in undergraduate-post-secondary programs in any public or private educational institution; and b) He or she must be a part of household included in the National Household Targeting System for Poverty Reduction (NHTS-PR)."
