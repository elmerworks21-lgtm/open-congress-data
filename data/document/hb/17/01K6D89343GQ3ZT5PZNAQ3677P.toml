congress_website_title = "AN ACT EFFECTIVELY AUTHORIZING THE DEPARTMENT OF LABOR AND EMPLOYMENT TO BAN AND AVERT THE PRACTICE OF PRIVATE COMPANIES OF CONTRACTUALIZATION OF EMPLOYMENT AND ANY FORM OF FLEXIBILIZATION OF LABOR THEREBY ASSISTING SAID COMPANIES TOWARD A SHIFT TO REGULARIZATION OF EMPLOYMENT AND SECURITY OF TENURE FOR CONTRACTUAL WORKERS, LABORERS, AND EMPLOYEES"
congress_website_abstract = "Seeks to afford full protection to labor and promote full employment opportunities for all; guarantee the rights of all workers to self-organization, collective bargaining and negotiations and peaceful concerted activities including the right to strike in accordance with law; and entitle workers to security of tenure, humane conditions of work and living wage and accord them opportunity to decision-making processes affecting their rights and benefit."
