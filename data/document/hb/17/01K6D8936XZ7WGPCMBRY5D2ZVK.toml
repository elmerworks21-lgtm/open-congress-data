congress_website_title = "AN ACT STRENGTHENING THE PROHIBITION AGAINST LABOR-ONLY CONTRACTING, AMENDING FOR THIS PURPOSE PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Seeks to prevent employers who wantonly circumvent labor laws through a system that is designed to prevent workers from attaining regular employment and security of tenure, such as by terminating employment every five (5) months and thereafter rehiring the same workers for the same duration, or by denying the existence of employer-employee relationship by engaging the services of workers either from workers´ cooperatives or manpower agencies, which will be the purported employers to perform functions which are necessary and desirable to their main business without attaining regular employment."
