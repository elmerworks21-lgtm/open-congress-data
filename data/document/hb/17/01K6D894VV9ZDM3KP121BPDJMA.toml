congress_website_title = "AN ACT REGULATING AND MODERNIZING THE PRACTICE OF MEDICAL TECHNOLOGY IN THE PHILIPPINES, PROVIDING FUNDS THEREFOR AND FOR OTHER RELATED PURPOSES"
congress_website_abstract = "Seeks to modernize the practice of medical technology in the Philippines which shall now specifically include molecular and cytogenetic technologies, drug testing, phlebotomy, research, academic work, and other similar activities. Proposes to establish a Professional Regulatory Board for Medical Technology, and introduces a Code of Professional Ethics for its practice Seeks to institutionalize a continuing education program for medical technologists/medical laboratory scientists to remain at par with international standards and proficient enough to provide topnotch services to our people."
