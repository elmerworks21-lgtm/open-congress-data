congress_website_title = "AN ACT PROHIBITING DISCRIMINATION ON THE BASIS OF SEXUAL ORIENTATION OR GENDER IDENTITY (SOGI) AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Declares it a policy of the State to exert efforts to address all forms of discrimination and violence on the basis of sexual orientation or gender identity and to promote human dignity as enshrined in the United Nations Universal Declaration on Human Rights, the Convention on the Elimination of All Forms of Discrimination Against Women, particularly the General Recommendation No. 28 on Non-Discrimination Based on Sexual Orientation and Gender Identity, Convention on the Rights of the Child, International Covenant on Civil and Political Rights, International Covenant of Economic, Social and Cultural Rights and all other relevant and universally accepted human rights instruments and other international conventions to which the Philippines is a signatory of."
