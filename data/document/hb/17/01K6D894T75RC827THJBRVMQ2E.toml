congress_website_title = "AN ACT PROVIDING FOR THE REGULATION, SUPERVISION AND PROFESSIONALIZATION OF THE PRACTICE, LICENSING AND REGISTRATION OF SANITARIANS"
congress_website_abstract = "Aims to recognize the roles of sanitarian in our society by equipping them with the proper knowledge, training and skill-set required to effectively and properly discharge their functions. Defines “Sanitarians and Hygiene Profession or Practice of Sanitation and Hygiene” as profession concerned primarily with education, prevention and control of diseases and other public health concerns using scientific methods and paramedical measure related to sanitation and hygiene. Provides for the description and scope of work of sanitary inspectors as follows: a) Waste management; b) Food and water supply sanitation; c) Vermin and vector control; d) Industrial hygiene; e) Epidemiology; f) Pollution control; g) Environmental health planning and program; h) Other community level activities re: public hygiene."
