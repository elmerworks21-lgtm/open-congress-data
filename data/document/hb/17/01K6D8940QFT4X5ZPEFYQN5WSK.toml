congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7160, ALSO KNOWN AS THE LOCAL GOVERNMENT CODE, ON THE LEVEL OF THE POSITION OF SECRETARY TO THE SANGGUNIAN"
