congress_website_title = "AN ACT TO STRENGTHEN DISCIPLINARY MECHANISM IN THE PHILIPPINE NATIONAL POLICE, AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NO. 6975, AS AMENDED BY REPUBLIC ACT NO. 8551, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to strengthen existing disciplinary mechanisms within the Philippine National Police (PNP) organization to overcome more challenging wars against sophisticated forms of criminality; Proposes to reconstitute the Internal Affairs Service (IAS) as “Internal Affairs” clothe with adjudicatory power to hear and decide, with finality, administrative cases filed against PNP uniformed members; Amends Sec.49 of R.A.8551 which grants IAS the power to “generally conduct summary proceedings and hearings” and, thus, only make disciplinary recommendations; Further proposes to establish a separate and distinct Police Justice System in cases of “breach of internal discipline” committed by uniformed members."
