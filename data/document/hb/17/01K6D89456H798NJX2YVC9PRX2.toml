congress_website_title = "AN ACT INSTITUTING A POVERTY-ALLEVIATION MEASURE TO UPLIFT THE MOST CRITICALLY-SITUATED MUNICIPALITIES IN THE PHILIPPINES"
congress_website_abstract = "Seeks to ensure that the poorest municipalities will be able to avail of basic social services of the government and improved their quality of life; Mandates therefore the National Anti-Poverty Commission with the DSWD to conduct a study to determine the three most critically situated municipalities in every province; Provides for the standards to be used in determining such areas to be enrolled under the Program which may include per capita income, infant mortality rate, poverty-incidence, unemployment rate, etc.;"
