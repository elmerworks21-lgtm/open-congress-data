congress_website_title = "AN ACT TO MANAGE MEDICAL RESIDENCY TRAINING PROGRAMS IN THE PHILIPPINES"
congress_website_abstract = "Seeks to create the Philippine Medical Accreditation Council (PMAC) as attached agency of the DOH to ensure the quality of medical residency training for all specialties and sub-specialties of medical residents; Provides for the roles and functions of the PMAC to include among others: Sets the standards of said training and ensure that they are at par with international standards such as the World Federation for Medical Education (WFME); Screens foreign graduates of medicine who will be trained and assess the equivalence of their basic medical education to the Philippine curriculum standard; Includes provision on accreditation, curriculum, qualifications of applicants and general conditions for foreign medical graduates; Also incorporates provisions on working conditions, salaries and benefits, professional conduct of medical residents."
