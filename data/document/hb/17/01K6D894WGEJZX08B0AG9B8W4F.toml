congress_website_title = "AN ACT ALLOWING FOR SINGLE PARTY CONSENSUAL RECORDING IN LAW ENFORCEMENT"
congress_website_abstract = "Authorizes a law enforcement officer to record an oral communication to which the officer or a person under the supervision of the officer is a party. Such recording shall not be admissible to court unless it is proven that the recording is free from any alterations and shall contain the recitation of the circumstances including the identity of the person making the recording, the date, time and place where the recording is made, the person/s subject of the recording, and the offense for which the recording is being made."
