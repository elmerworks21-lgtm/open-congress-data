congress_website_title = "AN ACT STRENGTHENING THE NATIONAL MUSEUM OF THE PHILIPPINES, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 8492, OTHERWISE KNOWN AS THE \\\"NATIONAL MUSEUM ACT OF 1998\\\", AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Renames the National Museum as the “National Museum of the Philippines” or “Pambansang Museo ng Pilipinas.” Prescribes the mandate, duties and functions of the National Museum. Declares the whole Executive House known as the old Congress or Legislative Building, together with the Department of Finance Building and Department of Tourism as the permanent and exclusive site of the National Museum. Grants general public free admission to all public museums and national historical shrines and landmarks. Allows the existing Museum Endowment Fund to continue to be utilized for the purpose of implementing special programs, projects and activities of the National Museum in furtherance of its mandate. Authorizes the National Museum to retain the entirety of its income from all sources of its operations and to expend the same for any purpose in its benefit as may be authorized by its Board."
