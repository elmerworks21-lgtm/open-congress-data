congress_website_title = "AN ACT TO REQUIRE HOSPITALS TO ESTABLISH AND IMPLEMENT SECURITY PROCEDURES TO REDUCE THE LIKELIHOOD OF INFANT PATIENT ABDUCTION AND BABY SWITCHING, INCLUDING PROCEDURES FOR IDENTIFYING ALL INFANT PATIENTS IN THE HOSPITAL IN A MANNER THAT ENSURES IT WILL BE EVIDENT IF INFANTS ARE MISSING FROM THE HOSPITAL"
congress_website_abstract = "Provides that all hospitals, public or private, shall keep an identification record of all newborn infants under their care and to ensure that such records shall prevent infant abduction or baby switching. Identification record shall include any of the following: the footprint, fingerprint or photograph of the infant; written description of the infant; and an identification bracelet or anklet put on the newborn patient."
