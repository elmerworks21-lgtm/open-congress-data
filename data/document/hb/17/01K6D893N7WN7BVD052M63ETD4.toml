congress_website_title = "AN ACT REMOVING THE RESTRICTIONS UNDER SECTIONS 118, 119, 121, 122 AND 123 OF COMMONWEALTH ACT NO. 141, AS AMENDED, ON FREE PATENTS ISSUED UNDER SECTION 44 THEREOF"
congress_website_abstract = "Provides that subject to the Constitutional restrictions on foreign ownership of lands, agricultural public lands alienated or disposed in favor of qualified public land applicants under Sec. 44 of C.A. No.141, as amended, shall not be subject to restrictions re: encumbrances, conveyances, transfers or dispositions imposed under the above-mentioned Sections of C.A. No. 141, as amended. Provides likewise that retroactive effect and restrictions on free patents issued under Sec.44 thereof before the effectivity of this Act shall be removed and are hereby immediately lifted."
