[meta]
bill_number = 8370
congress = 17
title = "SUCS LAND USE DEVELOPMENT AND INFRASTRUCTURE PLAN (LUDIP) ACT"
date_filed = "2018-10-04"
long_title = "AN ACT REQUIRING STATE UNIVERSITIES AND COLLEGES (SUCS) TO PREPARE AND IMPLEMENT A LAND USE DEVELOPMENT AND INFRASTRUCTURE PLAN THAT SHALL INCLUDE THE CONSTRUCTION OF DORMITORIES FOR STUDENTS AND HOUSING SITES FOR EMPLOYEES"
scope = "National"
subjects = [ "Dormitories/Boarding Houses", "Land Use", "State Colleges and Universities (SCUS)", "Students",]
congress_website_author_codes = ["G110","G111","G109","G054","F036","I029","H085","H026","I013","I017","F084","C072","I076","I066","H092","G012"]
congress_website_coauthors_raw = ["SALO, RON P.","ALONTE-NAGUIAT, LEN B.","GARCIA, JOSE ENRIQUE III S.","PRIMICIAS-AGABAS, MARLYN L."]
congress_website_committee_codes = ["C502","0532"]
congress_website_primary_keys = [34119]
congress_website_title = "AN ACT REQUIRING STATE UNIVERSITIES AND COLLEGES (SUCs) TO PREPARE AND IMPLEMENT A LAND USE DEVELOPMENT AND INFRASTRUCTURE PLAN THAT SHALL INCLUDE THE CONSTRUCTION OF DORMITORIES FOR STUDENTS AND HOUSING SITES FOR EMPLOYEES"
congress_website_abstract = "Requires SUCs to follow the required LUDIP on all land use or infrastructure projects which shall be submitted to the Commission on Higher Education (CHED) within two (2) years after approval of this Act and to be updated periodically as the need arises. Mandates all government departments, agencies, offices, and instrumentalities to extend all possible assistance and cooperation to the SUCs in the preparation of their LUDIP. Provides for the coverage of LUDIP which includes the following, among others: detailed geographical and survey site occupied by the SUCs; detailed description and survey site intended for dormitories for students and housing sites for employees; design and estimated cost of construction, operation, maintenance of other infrastructure needs of the SUCs; and financial plan, which shall include the conduct and submission of feasibility studies, sources of funds and other financial schemes or arrangements."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=17&q=HBN-8370"

