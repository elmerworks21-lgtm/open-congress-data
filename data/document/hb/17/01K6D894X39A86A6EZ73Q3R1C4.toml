congress_website_title = "AN ACT MANDATING THE COMMISSION ON ELECTIONS TO PROVIDE FOR THE OFFICE SPACES OF ITS FIELD OFFICES, HEREBY REPEALING SECTION 55 OF BATAS PAMBANSA BLG. 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Intends to repeal Sec.55 of BP 881 to address its conflicting provision which compromise the independence of COMELEC as guardians of the ballot by separating its field offices from the offices of the LGUs. Proposes to delegate the responsibility of providing the needed office space for the office of the provincial election supervisor and his staff and the election registrar and his staff, to the COMELEC without the need for prior approval of the LGU concerned."
