title = "RELEASE OF CADAVER FROM THE HOSPITALS AND MEDICAL CLINICS"
date_filed = "2018-11-21"
long_title = "AN ACT REQUIRING HOSPITALS, MEDICAL CLINICS, AND OTHER FACILITIES TO RELEASE A CADAVER IN THEIR POSSESSION WITHIN TWENTY-FOUR (24) HOURS FROM THE TIME OF DEATH TO THE FAMILY OR RELATIVES IN RECOGNITION OF RELIGIOUS PRACTICES AND TRADITIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9439, ENTITLED AN ACT PROHIBITING THE DETENTION OF PATIENTS IN HOSPITALS AND MEDICAL CUNICS ON GROUNDS OF NONPAYMENT OF HOSPITAL BILLS OR MEDICAL EXPENSES"
