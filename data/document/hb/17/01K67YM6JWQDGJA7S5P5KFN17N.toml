congress_website_title = "AN ACT REQUIRING HOSPITALS, MEDICAL CLINICS, AND OTHER FACILITIES TO RELEASE A CADAVER IN THEIR POSSESSION WITHIN TWENTY-FOUR (24) HOURS FROM TIME OF DEATH TO THE FAMILY OR RELATIVES IN RECOGNITION OF RELIGIOUS PRACTICES AND TRADITIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9439 ENTITLED \\\"AN ACT PROHIBITING THE DETENTION OF PATIENTS IN HOSPITAL AND MEDICAL CLINIC ON GROUNDS OF NONPAYMENT OF HOSPITAL BILLS OR MEDICAL EXPENSES"
congress_website_abstract = "Aims to honor the religious customs and traditions of Muslims, Christian and Indigenous Peoples by allowing the released of the body of a deceased patient with the corresponding death certificate and other documents for interment within twenty-four (24) hours upon execution of a promissory note for their unpaid obligation. States that those patients who stayed in private rooms are not covered by this Act."
