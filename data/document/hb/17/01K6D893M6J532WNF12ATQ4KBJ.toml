congress_website_title = "AN ACT GRANTING THE PRESIDENT/EXECUTIVE BRANCH OF GOVERNMENT EMERGENCY POWERS TO MANAGE, MITIGATE AND SOLVE THE TRAFFIC AND CONGESTION CRISIS ACROSS THE PHILIPPINES, TO EXPEDITIOUSLY AND EFFECTIVELY IMPLEMENT MEASURES THAT SHALL PROVIDE REAL LASTING SOLUTIONS AS WELL AS THE EARLIEST RESPITE FROM TRAFFIC AND CONGESTION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to grant emergency power to the President, along with the heads of departments and agencies under the Executive Branch related to the transportation sector, to urgently utilize necessary government resources, employ actions and measures, and harmonize national and local government projects to address the traffic and congestion crisis."
