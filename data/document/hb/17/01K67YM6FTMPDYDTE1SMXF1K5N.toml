congress_website_title = "AN ACT CREATING THE DEPARTMENT OF DISASTER RESILIENCE, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Creates the Department of Disaster Resilience that shall be the primary agency responsible for leading, organizing and managing the national effort to reduce disaster risk, prepare for and respond to disasters, recover and rehabilitate, and build forward better the after the occurrence of disasters. Enables the government to quickly respond, prepare, implement, monitor, and evaluate disaster and climate resilience plans, programs, projects and activities. Ensures that the government upholds the welfare of the people particularly the vulnerable sectors of the society by providing its citizens a safer, adaptive, resilient, and inclusive community."
