congress_website_title = "AN ACT ESTABLISHING THE INCENTIVIZED SOLID WASTE REDEMPTION AND RECOVERY SYSTEMS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to motivate individuals, associations and institutions to gather and collect non-hazardous and recyclable solid wastes which shall be exchanged for rice, water, canned goods, basic, household consumer items or cash. Provides that the DENR, DA and DTI shall: determine the reasonable and compliance-inducing exchange values for graduated weights or volumes of solid wastes surrendered; and establish a Hazardous Waste Recovery Protocols and Reporting System. Proposes to task the DENR, DTI and DOF to adapt the Carbon Credit system for reducing carbon emissions to the realm of solid waste recovery and reduction; and for private corporations and GOCCs to establish special purpose corporations or joint ventures with the specific mission of redeeming and recovering plastic wastes through the combination of mechanisms and incentives designed for corporate social responsibility programs and non-tax incentives."
