congress_website_title = "AN ACT ALLOWING THE TERMINATION OF ANY POSTPAID SUBSCRIPTION WHENEVER SERVICES HAVE BEEN SUBSTANDARD OR DELINQUENT, TO FOSTER CONSUMER PROTECTION, PROVIDING PENALTIES AND SANCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to promote the rights and interests of the paying consumer-subscriber by mandating telecommunications company to act with fairness and equality by providing for quality services, resources management, service regulation, penalties-sanctions and dispute resolution. Penalizes the telecommunications company/service provider who violates or who fails to comply with this Act: a) First Offense - a fine of not less than Two hundred thousand pesos (P200,000.00); b) Second Offense - a fine of not less than Five hundred thousand pesos (P500,000.00); c) Subsequent Offenses - a fine of not less than One million pesos (P1,000,000.00) and revocation of the franchise to operate."
