congress_website_title = "AN ACT AMENDING REPUBLIC ACT 8353, ALSO KNOWN AS THE ANTI-RAPE LAW OF 1997"
congress_website_abstract = "Seeks to bring the prosecution and definition of rape up to modern standards, no longer placing the onus on the victim's refusal or resistance, or the specifics of the sexual act performed or attempted, but instead placing focus on consent of all parties. Proposes to acknowledge and elaborate upon the circumstance which are to be considered as inherently coercive; increases the age of statutory rape to sixteen; and removes the qualifier, which requires that a person in authority must have taken advantage of their position. Provides for increased compensation for victims under certain circumstances."
