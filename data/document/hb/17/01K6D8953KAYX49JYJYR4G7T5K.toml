congress_website_title = "AN ACT PROTECTING THE RIGHTS OF FILIPINO ARTISTS AND CULTURAL WORKERS"
congress_website_abstract = "Enumerates the rights of Filipino artists and cultural workers among others as follows: a. To express freely in any mode of art, their personal views and opinions; b. To use public spaces and be provided material support especially from the LGU; c. To promote social justice and human rights in any art form; d. To use art freely, especially in peaceful protests and demonstrations; e. To be recognized for promoting Filipino culture and upholding the essence of nationalism and patriotism; f. To be celebrated for their efforts in exposing their view of the current status of the society through the different mediums of art. Provides for artists and cultural workers' registration and accreditation and \\\"Cultural Work\\\" ranging from seminars, workshops, educational tours, shows, etc. and mandates LGU to support and promote their activities, advocacies, rights, protection and privileges."
