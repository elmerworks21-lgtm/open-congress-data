congress_website_title = "AN ACT AMENDING SECTION 9 OF REPUBLIC ACT 10366, OTHERWISE KNOWN AS THE \\\"ACT AUTHORIZING THE COMMISSION ON ELECTIONS TO ESTABLISH PRECINCTS ASSIGNED TO ACCESSIBLE POLLING PLACES EXCLUSIVELY FOR PERSONS WITH DISABILITIES AND SENIOR CITIZENS\\\""
congress_website_abstract = "Aims to improve the voting experience of the vulnerable sector by assigning an earlier voting day for the elderly and the persons with disability (PWD), thus ensuring an expedited, streamlined and convenient voting process, by mandating the Commission on Elections (COMELEC) to designate an “accessible polling place” within the municipal or city hall exclusively for elderly and PWD citizens."
