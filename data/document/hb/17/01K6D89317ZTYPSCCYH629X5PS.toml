congress_website_title = "AN ACT ENHANCING PUBLIC SAFETY AT THE LOCAL LEVEL BY ESTABLISHING AND MAINTAINING A DEPARTMENT OF PUBLIC SAFETY IN EVERY PROVINCE, CITY AND MUNICIPALITY"
