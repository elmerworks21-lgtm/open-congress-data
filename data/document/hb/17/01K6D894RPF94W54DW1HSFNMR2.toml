congress_website_title = "AN ACT TO EXPAND THE COVERAGE OF MICRO ENTERPRISES AS BENEFICIARIES OF THE MAGNA CARTA FOR MICRO, SMALL, AND MEDIUM ENTERPRISES OR REPUBLIC ACT NO. 6977, AS AMENDED BY REPUBLIC ACT NO. 8289 AND FURTHER AMENDED BY REPUBLIC ACT NO. 9501"
congress_website_abstract = "Amends existing laws on Magna Carta for Micro, Small, and Medium Enterprises specifically MSMEs categories based on total assets in order to ensure that more businesses are qualified to enjoy the benefits of specialized programs for the said sector. Provides that Sec.3 of Republic Act No. 6977, as amended by Republic Act Nos. 8289 and 9501, is hereby amended to read as follows: MSMEs shall be defined as any business activity or enterprise engaged in industry, agribusiness, and/or services ”¦ whose total assets ”¦ must have value falling under the following categories: Micro: not more than [3,000,000] P7,500,000 Small: [P3,000,001 - P15,000,000] P7,500,001 - P15,000,000 Medium: [P15,000,001 - P100,000,000] P15,000,001 - P100,000,000."
