congress_website_title = "AN ACT MANDATING THE NATIONAL TELECOMMUNICATIONS COMMISSION TO REQUIRE INTERNET SERVICE PROVIDERS TO DELIVER A MINIMUM STANDARD OF 10 MEGABYTES PER SECOND (10MBPS) FOR INTERNET CONNECTION SPEED"
congress_website_abstract = "Mandates the National Telecommunications Commission (NTC) to require Internet Service Providers (ISPs) to deliver minimum Internet connection speed of 10 megabytes per second (10mbps) for all mobile, fixed and fixed wireless broadband/internet access to their subscribers and to require ISPs to guarantee that they continuously develop their system and they work towards providing an average Internet connection speed above global average."
