date_filed = "2018-11-05"
long_title = "AN ACT ESTABLISHING THE PHILIPPINE SPACE DEVELOPMENT AND UTILIZATION POLICY AND CREATING THE PHILIPPINE SPACE AGENCY, DEFINING THE PURPOSE AND SCOPE OF ITS ACTIVITIES, AND APPROPRIATING FUNDS THEREFOR"
