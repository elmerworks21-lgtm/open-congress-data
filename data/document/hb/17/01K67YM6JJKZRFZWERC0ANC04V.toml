congress_website_coauthors_raw = ["ANDAYA, ROLANDO JR. G.","MARCOLETA, RODANTE D.","DEFENSOR, ARTHUR JR. R.","PUNO, CHIQUI ROA","HOFER, ANN K.","CRISOLOGO, VINCENT P.","PALMA, WALTER II WEE","NOEL, VICTORIA ISABEL G.","ESPINA, ROGELIO J. M.D.","GONZALES, ALEXANDRIA P.","ROMERO, MICHAEL ODYLON L.","PIMENTEL, JOHNNY TY","ALONTE-NAGUIAT, LEN B.","GARIN, OSCAR \"RICHARD\" JR. S.","VERGARA, ROSANNA \"RIA\"","ROBES, FLORIDA P.","ORTEGA, VINI NOLA A.","NOGRALES, JERICHO JONAS B.","FORTUN, LAWRENCE LEMUEL H.","BAGATSING, CRISTAL","PRIMICIAS-AGABAS, MARLYN L.","ANTONINO, MAGNOLIA C.","SUAREZ, DANILO E.","ABAYON, HARLIN NEIL III J.","CAMPOS, LUIS JOSE ANGEL JR. N.","MATUGAS, FRANCISCO \"BINGO\" T.","GULLAS, GERALD ANTHONY JR. V.","TAMBUNTING, GUSTAVO S.","BRAVO, MARIA VIDA E."]
congress_website_committee_codes = ["0504","0516","0534","0532"]
congress_website_primary_keys = [169898]
congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE SPACE DEVELOPMENT AND UTILIZATION POLICY AND CREATING THE PHILIPPINE SPACE AGENCY, DEFINING THE PURPOSE AND SCOPE OF ITS ACTIVITIES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to establish a Philippine Space Policy that will serve as the country´s primary strategic roadmap for space development and embody the country´s central goal of becoming a space-capable and space-faring nation. Provides for a framework that will focus on six (6) Key Development Areas (KDA) for Space Science and Technology Applications (SSTA) development to ensure the country´s sustained progress: National Security and Development; Hazard Management and Climate Studies; Space Research and Development; Space Industry Capacity Building; Space Education and Awareness; and International Cooperation Creates and mandates the Philippine Space Authority (PhilSA) to be the primary entity of the Executive Branch of the government that will plan, develop, and promote the national space program in line with the Philippine Space Policy. Creates the Philippine Space Development Fund that shall be sourced from the share of the National Government in the gross income of PAGCOR and the BCDA; income from specialized products, services, and royalties produced by PhilSA; and loans, contributions, grants, bequests, gifts, and donations from local or foreign sources."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=17&q=HBN-8541"

