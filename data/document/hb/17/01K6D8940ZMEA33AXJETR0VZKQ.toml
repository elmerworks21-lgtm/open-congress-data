congress_website_title = "AN ACT ESTABLISHING A NATIONAL POLICY ON EASE OF DOING BUSINESS, CREATING FOR THE PURPOSE THE EASE OF DOING BUSINESS COMMISSION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the automatic approval and release of business permits (especially for the micro, small and medium enterprises (MSMES)) upon the lapse of thirty days of inaction; Sets the validity period of the said permits for a period of one year from the date of issuance instead of the current practice of setting the expiration at the end of the fiscal year the said permit was filed; Provides for the following technology: Central Business Portal, Phil. Business Registry Bank, Computerized or Software-enabled Business Permit and Licensing System or an electronic-Business One Stop Shop (BOSS)"
