congress_website_title = "AN ACT ESTABLISHING THE COCONUT FARMERS AND INDUSTRY TRUST FUND AND PROVIDING FOR ITS MANAGEMENT AND UTILIZATION"
congress_website_abstract = "Seeks to consolidate all coconut levy assets into a trust fund called Farmers and Industry Trust Fund; delineate the Trust Fund from the General Fund, hence preventing the marriage of the two; create the Coconut Farmers and Industry Trust Fund Committee under the Office of the President to be chaired by the Secretary of Agriculture with the primary task of monitoring the implementation of the Fund and the Coconut Industry Development Plan, which shall be use as a guide in the utilization of the trust income; empower the Privatization and Management Office as the sole entity to dispose of the coconut levy assets that have been approved for privatization, and; mandate the Presidential Commission on Good Government to conduct a complete accounting and inventory of all coconut levy assets and for the Commission on Audit to audit the inventory of coconut levy assets prepared by the PCGG."
