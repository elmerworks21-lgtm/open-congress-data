congress_website_title = "AN ACT GRANTING INCENTIVES TO FILIPINO FILMMAKERS WHO WERE GRANTED HONORS IN NOTABLE INTERNATIONAL FILM FESTIVALS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Grants incentives to Filipino filmmakers or production entities, whose films merited the highest recognition for technical or artistic excellence in notable film festivals the following amount, to wit: a) Five million pesos (Php5,000,000.00) to the filmmaker or production entity that produces the international award winning full-length feature or documentary film; b) Three million pesos (Php 3,000,000.00) to the filmmaker or production entity that produces the international award-winning short feature or documentary film; c)Two million pesos (Php 2,000,000.00) to film directors, main artists, screenplay, or technical support filmmaker personnel including the scriptwriter , cinematographer, editor, production designer, music scoring, sound editor, audio or video technicians who have received the highest international awards in their respective categories; d) One million pesos (Php1,000,000.00) to supporting artists or technicians who have garnered the highest award in their respective categories; and e) An “A” rating from the Cinema Evaluation Board for international award-winning films as stated in paragraphs (a) and (b) of Section 3."
