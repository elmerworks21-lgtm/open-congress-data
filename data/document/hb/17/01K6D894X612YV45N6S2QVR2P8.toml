congress_website_title = "AN ACT PROVIDING FOR A MINIMUM MONTHLY NET TAKE HOME PAY FOR ALL GOVERNMENT EMPLOYEES AFTER AUTHORIZED DEDUCTIONS"
congress_website_abstract = "Defines the terms \\\"Take Home Pay\\\" and \\\"Authorized Deductions\\\". Provides that the minimum monthly take home pay of all government employees after all the authorized deductions shall be at all times thirty percent (30%) of their monthly salary. Prioritizes the authorized deductions in the following order: a. BIR, GSIS, HDMF, and the PHIC; b. Mutual benefit associations, thrift banks, and non-stock savings and loan associations; c. Associations or Cooperatives; d. Duly licensed insurance companies; e. Other authorized legal deductions."
