congress_website_title = "AN ACT AMENDING INVESTMENT RESTRICTIONS IN COMMONWEALTH ACT NO. 541, AS AMENDED BY LETTER OF INSTRUCTION NO. 630, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to position the country to be more competitive and attract new investments in the construction industry to enable the Government to deliver the much-needed infrastructure that would support the country´s initiatives in providing business climate conducive to investments. Seeks to provide a more level playing field and extend equal opportunities to eligible and qualified domestic and foreign bidders to participate in the bidding by the Government for public works projects. Intends to encourage and attract foreign firms possessing the capacity to construct vital projects and capable of sharing technical expertise with local firms to enter the Philippine construction market."
