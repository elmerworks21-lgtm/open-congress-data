congress_website_title = "AN ACT STRENGTHENING AND EXPANDING THE FREE PUBLIC TERTIARY EDUCATION THROUGH FORMULATION OF NATIONALIST, SCIENTIFIC AND MASS-ORIENTED CURRICULUM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10931, OTHERWISE KNOWN AS THE \\\"UNIVERSAL ACCESS TO QUALITY TERTIARY EDUCATION\\\""
congress_website_abstract = "Intends to establish a new higher education curriculum which shall: a) instill in every student the firm resolve never to allow our people to be dominated and controlled by foreign powers or domestic tyrants, developing a self-reliant and independent national economy with particular emphasis on agrarian reform, agriculture and national industries. b) inculcate a scientific worldview that heightens the social consciousness of all Filipino students towards total human liberation, and foster a culture of learning that nurtures learning directed towards understanding and solving the basic problems of society. c) equip students with the knowledge and skills needed to serve the Filipino nation and encourage study programs that respond to community needs through immersion into larger society that exists beyond their classrooms."
