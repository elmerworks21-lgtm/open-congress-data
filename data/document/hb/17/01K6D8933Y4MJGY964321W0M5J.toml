congress_website_abstract = "Creates the Commission with five (5) members to be appointed by the President with a seven years term of office, and with a budget of Three Hundred Million Pesos (P300,000,000.00), with the end in view of recognizing, protecting, realizing and enhancing the rights of all Filipinos to safe and clean drinking water and sanitation."
