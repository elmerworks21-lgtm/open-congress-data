[meta]
bill_number = 7820
congress = 17
title = "SURVIVORSHIP BENEFITS (SURVIVING SPOUSE OF DECEASED RETIRED MEMBER OF THE COA/CSC/COMELEC/OMBUDSMAN)"
date_filed = "2018-05-30"
long_title = "AN ACT GRANTING SURVIVORSHIP BENEFITS TO THE DEPENDENT CHILDREN OF A DECEASED RETIRED MEMBER OF THE COMMISSION ON AUDIT, CIVIL SERVICE COMMISSION, COMMISSION ON ELECTIONS, AND THE OMBUDSMAN, WHO IS A SOLO PARENT, OR THE SURVIVING PARENTS OR NOMINATED PERSONS OF SUCH DECEASED RETIREE, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10084, ENTITLED, ‘AN ACT GRANTING SURVIVORSHIP BENEFITS TO THE SURVIVING LEGITIMATE SPOUSE OF A DECEASED RETIRED MEMBER OF THE COMMISSION ON AUDIT, CIVIL SERVICE COMMISSION, COMMISSION ON ELECTIONS AND THE OMBUDSMAN, AND FOR OTHER PURPOSES'"
scope = "National"
subjects = [ "Survivorship Benefits", "Commission on Audit (COA)", "Civil Service Commission (CSC)", "Commission on Election (Comelec)", "Ombudsman",]
congress_website_author_codes = ["C045","H083","G052","I105","I077","I019","I072","I041","G110","H005","D083","I081","I030","I096","G080","G064","C011","H040","I022","D025","C072","D043","G083","I063","I087","H054","H024","I062","I085","I092","I086","G093"]
congress_website_coauthors_raw = ["PRIMICIAS-AGABAS, MARLYN L.","GASATAYA, GREG","TREÑAS, JERRY P."]
congress_website_committee_codes = ["0504","0515","0532"]
congress_website_primary_keys = [133767]
congress_website_title = "AN ACT GRANTING SURVIVORSHIP BENEFITS TO THE DEPENDENT CHILDREN OF A DECEASED RETIRED MEMBER OF THE COMMISSION ON AUDIT, CIVIL SERVICE COMMISSION, COMMISSION ON ELECTIONS, AND THE OMBUDSMAN, WHO IS A SOLO PARENT, OR THE SURVIVING PARENTS OR NOMINATED PERSONS OF SUCH DECEASED RETIREE, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10084, ENTITLED, \\\"AN ACT GRANTING SURVIVORSHIP BENEFITS TO THE SURVIVING LEGITIMATE SPOUSE OF A DECEASED RETIRED MEMBER OF THE COMMISSION ON AUDIT, CIVIL SERVICE COMMISSION, COMMISSION ON ELECTIONS AND THE OMBUDSMAN, AND FOR OTHER PURPOSES\\\""
congress_website_abstract = "Amends RA No. 10084 by granting survivorship benefits to dependents of retired members of the COA, CSC, COMELEC, and the Ombudsman, who are solo parents, to be awarded in the following order: a. Dependent children or other children under the care of the deceased retiree as stipulated under RA 9262, (Anti-Violence Against Women and Their Children Act of 2004), including children who have reached the age of majority but are unable to fully take care of themselves or protect themselves from abuse, neglect, cruelty, exploitation, or discrimination because of a physical or mental disability or condition as defined under RA 7610 (Special Protection of Children Against Abuse, Exploitation and Discrimination Act). b. The surviving parents, if any, or any person or persons nominated by the Chairman, Commissioner, or the Ombudsman prior to or on the date of retirement provided, that the nominees shall be limited to two (2) persons only. Beneficiaries who are receiving benefits under existing retirement laws shall only be entitled to the difference between the amount to be received pursuant to this Act and the retirement benefits being received."
