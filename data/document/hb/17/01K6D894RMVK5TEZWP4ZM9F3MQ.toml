congress_website_title = "AN ACT PROMOTING SAFE AND RESPONSIBLE USE OF MODERN BIOTECHNOLOGY, ESTABLISHING THE BIOTECHNOLOGY AUTHORITY OF THE PHILIPPINES FOR THIS PURPOSE AND APPROPRIATING FUNDS THEREOF"
congress_website_abstract = "Aims to support safe and responsible use of modern biotechnology for the development of bio-based industries in agriculture, agroforestry, food processing, human health and medicine, and procession of high value commercial products;,Defines the following terms as used in this Act: Genetically Modified Organism (GMO) refers to an organism whose genetic material has been altered through genetic engineering; Modern Biotechnology refers to techniques for modifying genomes for the production of new bio-based products; Proposes to abolish the National Committee on Biosafety of the Philippines (NCBP) and other modern biotech regulatory bodies and their functions shall be absorbed by the BioAP."
