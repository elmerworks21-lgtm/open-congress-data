congress_website_abstract = "Aims to strengthen the qualification of the Filipino workforce through access to technical and vocational training, thereby improving an individual´s prospect for employment. Establishes the Philippine Labor Force Competency Competitiveness Program which shall be funded through the Tulong-Trabaho Fund that shall provide qualified recipients with the access to training programs through the payment of fees, as well as transportation allowance and laboratory fees as needed."
