congress_website_title = "AN ACT REDUCING ELECTRICITY RATES BY ALLOCATING THE NET NATIONAL GOVERNMENT SHARE FROM THE MALAMPAYA NATURAL GAS PROJECT FOR THE PAYMENT OF THE STRANDED CONTRACT COSTS AND STRANDED DEBTS OF THE NATIONAL POWER CORPORATION"
congress_website_abstract = "Seeks to lower power costs by using the net national government share from the Malampaya Fund solely for the payment of NPC´s Stranded Contract Costs and Stranded Debts which shall be remitted to a Special Trust Fund to be administered by the PSALM. The amounts allocated shall be included in the General Appropriations Act and the DBM shall provide a timely release of the amounts allocated and appropriated in accordance with its debt and independent power producer payment schedule."
