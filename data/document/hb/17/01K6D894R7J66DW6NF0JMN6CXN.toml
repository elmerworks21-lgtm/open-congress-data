congress_website_title = "AN ACT INSTITUTING THE FARMERS AND FISHERFOLK ENTERPRISE DEVELOPMENT PROGRAM OF THE DEPARTMENT OF AGRICULTURE AND FOR OTHER PURPOSES"
congress_website_abstract = "Establishes the Farmers and Fisherfolk Enterprise Development Program which shall refer to the comprehensive set of objectives, targets, and holistic approach and assistance in promoting the establishment of enterprises involving agricultural and fishery products. It shall be integrated and be made consistent with the Agriculture and Fisheries Modernization Plan, and the Micro, Small, and Medium Enterprises Development Plan. The Program shall cover the following areas: a) Agricultural and fisheries production; b)Acquisition of work animals, farm and fishery equipment and machinery; c) Acquisition of seeds, fertilizer, poultry, livestock, feeds, and other similar items; d) Procurement of agricultural and fisheries products for storage, trading, processing, and distribution; e) Construction, acquisition, and repair of facilities for production, processing, storage, transportation, communication, marketing, and such other facilities in support of agriculture and fisheries; f) Working capital for agriculture and fisheries graduates to enable them to engage in agriculture and fisheries related economic activities; g) Agribusiness activities which support soil and water conservation and ecology enhancing activities; h) Working capital for long gestating projects; and i) Credit guarantees on uncollateralized loans to farmers and fisherfolk."
