congress_website_title = "AN ACT STRENGTHENING AND EXPANDING THE PROFESSIONAL RIGHTS AND WORK INCENTIVES OF PUBLIC SCHOOL TEACHERS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 4670, TO BE KNOWN AS THE EXPANDED MAGNA CARTA FOR PUBLIC SCHOOL TEACHERS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes several amendments to R.A. No. 4670 (Magna Carta for Public School Teachers) as regards to: a. recruitment, selection and qualifications; b. appointment of a substitute teacher from the RQA; c. experientail qualification for equitable promotion mechanism; d. termination for a just cause/after due process; e. conditions for consent for transfer; f. code of ethics; g. hiring/promotion based on academic and professional merit and fitness; h. conditions when professional licenses maybe revoked or invalidated; i. creation of independent research body to review teaching methods; j. additional compensation for off campus activities; k. special hardship, health and safety hazard allowances; l. order of preference in salary deduction; and m. health, wellness and medical benefits."
