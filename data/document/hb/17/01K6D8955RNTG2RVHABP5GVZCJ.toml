congress_website_title = "AN ACT INSTITUTING A THIRTY-FIVE (35) HOUR WORKING WEEK SCHEME AS AN ALTERNATIVE WORK ARRANGEMENT FOR EMPLOYEES IN THE PUBLIC SECTOR"
congress_website_abstract = "States that any government office, department, agency or enterprise may, upon request of its employees or on a voluntary basis, implement a 35 hour working week arrangement upon such terms and conditions as they may mutually agree upon, including arrangements for flexible working time. Enumerates provisions as regards to rate of pay, and other monetary benefits; rest periods; workload and performance standards; terms and conditions of the scheme adopted; and the corresponding responsibilities of the employees under such arrangement."
