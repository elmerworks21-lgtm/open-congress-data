congress_website_title = "AN ACT PROVIDING A SYSTEM OF EXTENDING NO-COLLATERAL, LOW-INTEREST LOANS TO GRADUATES OF ANY COURSES OFFERED BY THE TECHNICAL EDUCATION AND SKILLS DEVELOPMENT AUTHORITY OR DULY ACCREDITED LEARNING INSTITUTIONS WITH APPROVED OVERSEAS JOB CONTRACTS"
congress_website_abstract = "Proposes for a special loan granted to graduates of TESDA and other learning institutions credited by CHED with an approved overseas job contracts only. Aims to provide the much needed credit facility for our graduates, so that they may be able to afford the cost of pursuing employment overseas. Proposes to mandate all government and private banking and financial institutions to make the necessary provisions for extending such loans which shall be used exclusively for meeting said credit needs."
