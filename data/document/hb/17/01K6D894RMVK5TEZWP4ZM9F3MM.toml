congress_website_title = "AN ACT PROVIDING INCENTIVES AND MECHANISMS TO CREATE NEW JOBS AND OPPORTUNITIES, IMPROVE PRODUCTION, AND ADVANCE INNOVATION AND TRADE IN THE COUNTRY, TO FOSTER AND DEVELOP THE PHILIPPINE STARTUP ECOSYSTEM"
congress_website_abstract = "Defines the following terms as follows: Startup - any person, or registered entity in the Philippines which aims to develop an innovative product, process, or business model; Startup Enabler - any person, or registered entity registered under the Philippine Startup Development Program that provides goods, services, or capital identified to be crucial in supporting the operation and growth of startups by the DTI; Seeks to encourage the establishment and operation of an ecosystem of enterprise, government and non-government institutions that shall promote a pioneering entrepreneurial culture in the country; Creates the Philippine Startup Ecozones or the Special Economic Zones; Startup Commercialization and Impact Fund (SCIF); and the Startup Investment Matching Fund."
