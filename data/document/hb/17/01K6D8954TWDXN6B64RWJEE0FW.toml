congress_website_title = "AN ACT CONSOLIDATING ALL SUBSEQUENT AMENDMENTS TO THE CHARTER OF THE PHILIPPINE VETERANS BANK, REENACTING FOR THE SAID PURPOSE THE PERTINENT PORTIONS OF REPUBLIC ACT NO. 3518, AS AMENDED, AND INTRODUCING FURTHER AMENDMENTS THERETO"
congress_website_abstract = "Aims to expand the benefits of Philippine Veterans Banks' banking operations not only to World War II veterans but also to veterans of other Philippine wars and to active and retired military personnel. Proposes amendments to the PVB's charter to effect structural and organization changes in light of changing economic circumstances and trends in the field of banking. Intends to open up equity ownership to a broader base of shareholders and to adapt new approaches to governance and management to increase profitability."
