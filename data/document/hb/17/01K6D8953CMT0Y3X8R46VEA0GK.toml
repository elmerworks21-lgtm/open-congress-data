congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 10742 OR THE SANGGUNIANG KABATAAN REFORM ACT OF 2015"
congress_website_abstract = "Proposes to exempt SK officials from payment of tuition and matriculation fees in any public tertiary school including SCUs and locally funded public educational institutions. Provides for the allocation of funds in accordance with comprehensive barangay youth development plan and annual barangay investment program to priority programs, projects and activities which emphasizes leadership training, human rights, and culture and arts. Proposes the conduct of an annual activity to be known as the Linggo ng Kabataan Week where August 12 shall be declared as \\\"Filipino Youth Day\\\" or \\\"Araw ng Kabataang Pilipino.”"
