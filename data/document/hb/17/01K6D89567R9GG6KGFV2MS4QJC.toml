congress_website_title = "AN ACT PROHIBITING THE IMPORTATION OF SOLID WASTE MATERIALS"
congress_website_abstract = "Provides for the definition of solid waste as defined in R.A. No.9003 and its IRR as follows: \\\"Solid waste shall refer to all discarded household, commercial waste, non-hazardous institutional and industrial waste, street sweepings, construction debris, agricultural waste, and other non-hazardous/non-toxic solid waste.\\\" Penalizes any entity or person, foreigner, business entity owner/president/manager/sr. officers, or government official/employees who shall import any solid waste for use, treatment, or processing in violation of this Act with corresponding punishment and liabilities."
