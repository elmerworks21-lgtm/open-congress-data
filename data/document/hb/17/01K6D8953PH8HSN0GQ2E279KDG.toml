congress_website_title = "AN ACT ESTABLISHING A SHARED PARENTAL LEAVE POLICY THAT GRANTS AN OPTION TO FEMALE WORKERS IN THE GOVERNMENT SERVICE AND IN THE PRIVATE SECTOR TO SHARE THEIR LEAVE BENEFITS WITH THEIR SPOUSES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes that all covered female workers stated herein may, at her option, allocate up to sixty (60) days of leave benefits to the child's father, whether or not the same is married to the female worker. States that such shared period of leave shall be in addition to the seven (7) days paternity leave granted under R.A.8187 (Paternity Leave Act); shall be granted in every instance of pregnancy or miscarriage, regardless of frequency; and that in case of miscarriage, a period of only thirty (30) days can be allocated to the child's father. Proposes further that in case of death, absence or incapacity of the male partner/spouse, the benefit may be allocated to an alternative caregiver who may be a relative or the current partner of the female worker sharing the same household, upon election of the mother."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_17/HB09081.pdf"]

