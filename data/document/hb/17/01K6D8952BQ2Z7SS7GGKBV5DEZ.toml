congress_website_title = "AN ACT RATIONALIZING FIREARMS POLICY AND AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 10591"
congress_website_abstract = "Seeks to review and revise R.A. No.10591, to bring it in line with more stringent standards of gun regulation, and clarifies certain provisions that have led to unreasonable applications of the law with regard to loose bullets, by making the existing licensing procedure as rigorous as possible. Proposes several revisions and additional requirements as regards to application of license: a. certification from current place of employment regarding any record of past disciplinary infractions; b. consent from all other adult members of the applicant's household; c. Application stating the personal circumstance of the applicant and his/her reason why ownership of the firearm is sought; d. Applicant's psychiatric test which shall factor in the disciplinary records from his/her place of work, if any; e. Presentation of a valid clearance from the National Bureau of Investigation (NBI); f. Applicants must not have had a previous license revoked under R.A.No.10591, Sec.39 paragraphs (A),(B),(G), OR (H) which provides for grounds for revocation, cancellation or suspension of license permit; g. Applicant must not have a pending case for violation of Sec. 40 of R.A. No. 10591 (\\\"Failure to Notify Lost or Stolen Firearm of Light Weapon\\\"), or must not have been found guilty of a violation within the past five (5) years. h. Applicants must not be a subject of a Protection Order under the Anti-Violence Against Women and Their Children Act; i. More rigorous regulation on the purchase, sale, and general business of firearms by making all transactions require a license to deal on the part of the seller, and on the part of the buyer; j. Delivery of the licensed firearm three (3) working days after purchase to allow for a cooling off period that should decrease impulsive crimes and suicides involving firearms; etc."
