congress_website_abstract = "Seeks to recognize the important role of the private sector in augmenting the government's efforts and resources in the construction and maintenance of libraries across the country. Proposes to allow the private sector to assist a local government unit, public elementary or secondary school, or State University or College (SUC) in establishing and maintaining libraries within their respective jurisdiction."
