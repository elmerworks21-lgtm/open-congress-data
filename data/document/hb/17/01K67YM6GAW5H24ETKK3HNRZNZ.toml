congress_website_abstract = "Includes the act of point-shaving and game machinations as forms of game-fixing; Prescribes stiffer penalties of imprisonment from three (3) years to twelve (12) years and a fine of not less than One million (P1,000,000.00) to Five million (P5,000,000.00) pesos on the acts of game-fixing; Exempts from prosecution or punishment any person who voluntarily discloses, testifies, or assist in the prosecution of any offenses of game-fixing."
