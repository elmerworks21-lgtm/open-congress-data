congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE BLOOD DISEASE AND TRANSFUSION CENTER, DEFINING ITS OBJECTIVES, POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Intends to ensure that an adequate supply of safe blood and blood products, and their safe and rational use should be an integral part of the country's national health care policy and health care infrastructure. Aims to establish a sustainable national blood system envision to offer comprehensive care for patients with blood disorders, including blood transfusion services. Proposes that the Blood Center shall also become the primary provider of the state-of-the-art diagnosis, management and treatment of blood disorders and shall be provided the necessary tools and funding to conduct research on hematologic disorders and to serve as a referral laboratory for all hematologic diseases."
