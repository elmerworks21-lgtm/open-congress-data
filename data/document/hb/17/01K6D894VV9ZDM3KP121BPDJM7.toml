congress_website_title = "AN ACT AMENDING REPUBLIC ACT 9147, OTHERWISE KNOWN AS THE \\\"WILDLIFE RESOURCES CONSERVATION AND PROTECTION ACT\\\""
congress_website_abstract = "Declares it unlawful for any person to exploit wildlife resources and their habitats, or undertake the setting up of fishnets (lambat) or similar materials to capture or otherwise take possession of any of the species including race pigeons. Defines the term “Lambateros” as those who set up nets or “lambats” for the purpose of capturing wildlife species including economically important species such as pigeons and the like."
