congress_website_abstract = "Amends the Fair Election Act by updating its salient provisions by including the use of online and social media as part of lawful election propaganda. Requires the identification of paid online advertisements and online content to reflect whether these were paid for such entities and the submission of an inventory of the advertising materials purchased, complete with the titles and particulars of such advertising materials."
