congress_website_title = "AN ACT INCREASING THE BENEFITS GRANTED TO SCIENCE AND TECHNOLOGY (S&T) PERSONNEL OF THE GOVERNMENT, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8439, OTHERWISE KNOWN AS THE 'MAGNA CARTA FOR SCIENTISTS, ENGINEERS, RESEARCHERS AND OTHER S&T PERSONNEL IN THE GOVERNMENT"
congress_website_abstract = "Seeks to remove the limitations on additional salary and honoraria for science and technology practitioners and allow non-DOST S&T personnel to avail of the benefits under this Act on certain conditions. Allows scientist who is due for compulsory retirement to extend his services for a maximum of five (5) years provided that the scientist is still mentally and physically fit and the research project is within the priority research and development programs of the DOST and is identified as strategic to national development as certified by the DOST Secretary."
