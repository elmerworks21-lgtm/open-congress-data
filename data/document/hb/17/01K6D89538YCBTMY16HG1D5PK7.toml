congress_website_title = "AN ACT MAKING THE STATE UNIVERSITIES AND COLLEGES SPECIAL EDUCATION (SPED)-FRIENDLY"
congress_website_abstract = "Intends to reinforce the State's policies as stated in Section 2 of Republic Act No. 7277, otherwise known as the Magna Carta for Disabled Persons. Proposes an enabling environment for students with physical and mental disabilities by: improving the quality and accessibility of SUC facilities; creating a curriculum responsive to their specific needs; and ensuring SUCs as a community for these students to be able to enjoy academic freedom and uphold their right to education."
