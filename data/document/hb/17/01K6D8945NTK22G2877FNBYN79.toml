congress_website_title = "AN ACT MANDATING THE RIGHT TO PROTECT ONESELF, FAMILY, PROPERTY AND OTHERS"
congress_website_abstract = "Declares it the policy of the State to guarantee and protect the right of qualified citizens to own and possess firearms; Aims to simplify the redundant firearm application process to encourage new and existing owners to have their firearms licensed; Seeks therefore to merge the License to Own and Possess Firearms (LTOPF) and Permit to Carry Firearm Outside of Residence (PTCFOR) into a single license (LTOPF); Defines several terms among others as “concealed carry” and “open carry”."
