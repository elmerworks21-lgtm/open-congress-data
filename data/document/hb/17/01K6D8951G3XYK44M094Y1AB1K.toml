congress_website_title = "AN ACT PROVIDING FOR COMPENSATION TO STAY-AT-HOME HOUSEWIVES"
congress_website_abstract = "Recognizes the full-time work at home of stay-at-home mothers or housewives as valuable economic activity by providing financial assistance equivalent to Two Thousand (Php2,000.00) pesos per month for all the services they render to their children and their families. Proposes to cover all housewives whose family's economic status falls below the poverty threshold; who do not have part-time nor home-based work that is compensated or any income generating activity; and whose child or children is/are enrolled in public schools with at least 85% attendance and who manifest responsible behavior in preparation for eventual services of the mothers."
