congress_website_title = "AN ACT PROHIBITING THE USE AND INSTALLATION OF BRIGHT WHITE HEADLIGHTS OR HEADLAMPS CLASSIFIED AS HIGH INTENSITY DISCHARGE (HID) HEADLAMPS IN MOTOR VEHICLES"
congress_website_abstract = "Aims to reduce road accidents and improve the overall safety and convenience of our motorists by banning the use or installation of high intensity discharge “xenon headlights/headlamps”; Imposes a fine of one hundred thousand (P100,000.00) for every sale of a motor vehicle fitted with such prohibited headlamps and a fine of ten thousand pesos (P10,000.00) for every violation by the owner and driver of a motor vehicle."
