congress_website_abstract = "Seeks to protect the interest of the youth by creating policies that will improved their access to employment by waiving fees or charges from new graduates such as application for and granting of licenses, proof of identification, clearances, certificates, or other documents required in the course of employment except those collected in connection with an application to take a professional licensure examination conducted by the Professional Regulation Commission or an application for a Philippine passport."
