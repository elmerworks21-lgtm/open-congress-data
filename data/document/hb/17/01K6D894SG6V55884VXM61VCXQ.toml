congress_website_title = "AN ACT MANDATING 14TH MONTH PAY FOR ALL EMPLOYEES IN THE GOVERNMENT AND PRIVATE SECTOR REGARDLESS OF STATUS OF EMPLOYMENT"
congress_website_abstract = "Sets schedules for the released of the 13th month pay on or before May 31; and 14th month pay on or before November 30 every year. Provides that for employees employed for less than one (1) year, their 14th month pay shall be prorated to the number of months served. Exempts the 14th month pay from the computation of the employee´s gross income provided, that it shall not exceed ninety thousand pesos (P90,000.00)."
