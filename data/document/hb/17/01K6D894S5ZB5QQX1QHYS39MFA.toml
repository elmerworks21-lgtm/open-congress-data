congress_website_title = "AN ACT STANDARDIZING THE APPROPRIATE CLASS SIZE IN PUBLIC SCHOOLS NATIONWIDE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to ensure that existing school facilities and learning spaces that are used by our young learners are conducive to quality learning. Seeks to institutionalize an international class size standard of no more than 30 students; considers any class exceeding 30 students up to a maximum of 45 students as LARGE CLASS; and prohibits class size of more than 45 students. Entitles a teacher handling a large class additional compensation equivalent to five (5%) percent of their daily rate for every student in excess of the standard class size of 30."
