congress_website_title = "AN ACT ESTABLISHING A NATIONAL SPECIAL NEEDS SCREENING PROGRAM, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to institutionalize a screening program (for children with special needs and physical disabilities) that focus on the importance of the early identification of their conditions; Intends to screen children between two (2) to four (4) years of age for any physical disability, impairment or special need; Defines terms as used in this Act among others: Children with special needs refer to children who are gifted or talented, or with neuropsychological retardations, learning disabilities, emotional or behavioral disorders, speech and language disorders, hearing impairments, visual impairments, autism, physical or health disabilities, deaf-blindness and multiple handicapping conditions in need of special education as well as services for rehabilitation."
