congress_website_title = "AN ACT PROVIDING FOR THE EMPLOYMENT OF NURSES, ASSIGNING ONE REGISTERED NURSE FOR EVERY BARANGAY IN THE PHILIPPINES"
congress_website_abstract = "Intends to tap our pool of qualified yet underemployed or unemployed nurses in the country for the purpose of improving the delivery of public health care services to the poorest communities in rural areas as well as underprivileged communities in the urban areas. Proposes to enact a program whereby the government mobilizes these population of nurses in order to dispatch at least one registered nurse to every barangay whose duties include education with regards to the importance of health, hygiene, sanitation, and wellness."
