congress_website_title = "AN ACT ESTABLISHING REGIONAL JAILS UNDER THE BUREAU OF CORRECTIONS, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to address the worsened overcrowding/overcapacity of jails which is a serious security and health risk and poses a myriad of sanitation problems. Proposes the establishment of regional penal colonies for the incarceration of convicted prisoners instead of transferring them to the national penitentiaries. Mandates the Bureau of Corrections to ensure that each prison facility shall strive to adhere to the UN Standard Minimum Rules for the Treatment of Prisoners (the Nelson Mandel Rules and other national and international standards.)"
