congress_website_title = "AN ACT INSTITUTIONALIZING CERTAIN WORKING INCENTIVES OF ON-THE-JOB TRAINEE NURSES IN PUBLIC AND PRIVATE HOSPITALS, PROHIBITING THE COLLECTION OF EXPERIENCE FEES AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Seeks to provide certain working incentives for trainee nurses while rendering experiential service to any hospital. Specifically provides for the rate to compute the incentives which shall not be less that fifty percent (50%) of the minimum daily wage. Aims to penalize hospitals that demand payment from trainee nurses in exchange for actual nursing experience gained while working in a particular hospital."
