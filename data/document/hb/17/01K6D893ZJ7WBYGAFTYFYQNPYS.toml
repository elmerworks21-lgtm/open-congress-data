congress_website_title = "AN ACT INSTITUTIONALIZING AND MAINSTREAMING PAYMENT FOR ENVIRONMENTAL SERVICES (PES) IN POLICY AND INVESTMENT PROGRAMS"
congress_website_abstract = "Defines Several Terms Among Others As Follows: Ancestral Domains, Biological Diversity Or Biodiversity, Carbon Sequestration, Climate Change, Commmunity-based Forest Management Strategy, Environment Externalities, Environment Services, Iccs/ips. Adopts Several Policies As Follows: Sustainable Use Of The Country´s Environment And Natural Resources; Common Rights But Differentiated Responsibilities And Accountabilities Of Environment And Natural Resource (enr) Suppliers/providers And Users/beneficiaries; Climate Change Mitigation And Adaptation. Provides For Several Objectives As Follows: Create Awareness And Appreciation Of Pes As A Strategy In Attaining Sustainable Development; Provide A Platform/entry Point/legal/institutional Framework For Use And Management Of Resources Aside From Energy And Mining Under A Pes Scheme; Develop Capacity Of Major Stakeholders Regarding Pes Implementation; Conduct Environmental And Natural Resources Accounting; Mainstream A Pes Mechanism In Policy And Investment Programs Of The Phil. Council For Sustainable Dev't And Other Relevant Institutions; Encourages Diff. Forms And Modes Of Pes Such As, But Not Limited To Rewarding Upland Peoples For Ecosystem Services (rupes), Carbon Trading, Reduction Of Emissions From Deforestation And Degradation (redd), Conditional Cash Transfer For Enviromental Protection And Management, Green Corporate Social Responsibility (csr, Ecological Fees And Polluter Fees"
