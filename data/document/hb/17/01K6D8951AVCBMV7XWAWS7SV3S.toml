congress_website_title = "AN ACT REGULATING THE MANUFACTURING, IMPORTATION, AND USE OF SINGLE-USE PLASTIC PRODUCTS, AND PROVIDING PENALTIES, LEVIES, AND AN INCENTIVES SYSTEM FOR INDUSTRIES, BUSINESS ENTERPRISES AND CONSUMERS THEREOF"
congress_website_abstract = "Intends to address the issue of the increased usage of plastic by both manufacturers and consumers which leads to plastic waste being incommensurate with the current waste disposal infrastructure of the country. Proposes to provide incentives to business enterprises, individuals, cooperatives, partnerships, and corporations which engage in the manufacture of identified alternatives to single-use plastics as provided for under Barangay Micro-Business Enterprise Act; Magna Carta for Micro, Small, and Medium Enterprises Act; Green Jobs Act; and Omnibus Investment Code of 1987."
