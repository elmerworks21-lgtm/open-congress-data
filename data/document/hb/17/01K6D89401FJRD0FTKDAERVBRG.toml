congress_website_title = "AN ACT PROMOTING THE WELFARE OF WORKERS IN THE WELLNESS SPA, BEAUTY SALON, FITNESS GYM AND RELATED BUSINESS BY FACILITATING THEIR MEMBERSHIP IN THE SSS, FURTHER AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 1161, AS AMENDED, OTHERWISE KNOWN AS THE SOCIAL SECURITY LAW, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to remove from the definition of self-employed under the SSS law, workers such as barbers, haircutters or hairstylists; manicurists or pedicurists; make-up artists or beauty professionals; masseuse, reflexologists or therapists; and, gym trainers, fitness instructors or dieticians; Provides that irrespective of the contractual arrangement or their non-recognition as employees, of of the kind or source of their commissions, earnings, compensation or payment for their services, they shall not be considered as self-employed."
