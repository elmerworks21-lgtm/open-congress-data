congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6975, ALSO KNOWN AS \\\"AN ACT ESTABLISHING THE PHILIPPINE NATIONAL POLICE, UNDER A REORGANIZED DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT, AND FOR OTHER PURPOSES\\\", AS AMENDED BY REPUBLIC ACT NO. 8551"
congress_website_abstract = "Amends Republic Act No. 6975 to allow Senior High School graduates to apply and be recruited into the Philippine National Police, and states that “. . . a new applicant must not be less than EIGHTEEN (18) nor more than thirty (30) years of age.\\\" Opens career opportunities for SHS graduates and allow the government to improve recruitment numbers of the PNP which will bring us closer to the target police-to-population ratio, to be responsive to the need for more reliable policemen."
