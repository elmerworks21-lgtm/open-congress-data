congress_website_title = "AN ACT ESTABLISHING A CONTINUING NATIONAL PROGRAM FOR HYBRID AND OTHER QUALITY SEEDS PRODUCTION, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to provide greater support to the seed research and production that can create better products such as hybrid seeds and to promote comprehensive quality seed production to farmers and farmer organizations by developing and propagating quality seeds for them. Proposes to undertake a comprehensive program on the production of hybrid and other quality seeds at a subsidized cost, as well as encouraging farmers to intensify their efforts in increasing farm productivity."
