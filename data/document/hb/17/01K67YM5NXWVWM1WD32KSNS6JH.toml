congress_website_coauthors_raw = ["PRIMICIAS-AGABAS, MARLYN L.","DALIPE, MANUEL JOSE M.","BOLILIA, LIANDA B.","VIOLAGO, MICALEA S.","BRAVO, MARIA VIDA E.","NIETO, YUL SERVO","MARCOLETA, RODANTE D."]
congress_website_committee_codes = ["0515"]
congress_website_primary_keys = [27746]
congress_website_title = "AN ACT RATIONALIZING AND EXPANDING THE POWERS AND DUTIES OF THE SOCIAL SECURITY COMMISSION AND THE SOCIAL SECURITY SYSTEM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 1161, AS AMENDED BY REPUBLIC ACT NO. 8282, OTHERWISE KNOWN AS THE 'SOCIAL SECURITY ACT OF 1997'"
congress_website_abstract = "Seeks to vest the Social Security Commission (SSC) and the Social Security System (SSS) with powers and duties comparable to other social security agencies, e.g. Government Service Insurance System (GSIS), Philippine Health Insurance Corporation (PhilHealth) and Home Development and Mutual Fund (Pag-IBIG), and their policy making bodies, thereby allowing the SSC-SSS to respond with dispatch to clamor for additional benefits to its members or any threat to the sustainability of the social security fund."
