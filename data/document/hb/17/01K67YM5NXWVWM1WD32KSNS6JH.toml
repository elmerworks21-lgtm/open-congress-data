long_title = "AN ACT RATIONALIZING AND EXPANDING THE POWERS AND DUTIES OF THE SOCIAL SECURITY COMMISSION AND THE SOCIAL SECURITY SYSTEM, FURTHER AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 1161, AS AMENDED BY REPUBLIC ACT NO. 8282, OTHERWISE KNOWN AS THE SOCIAL SECURITY ACT OF 1997"
scope = "National"
