congress_website_title = "AN ACT ESTABLISHING A TOTAL BAN ON THE IMPORT AND EXPORT OF WASTES, PROVIDING MEANS FOR ITS ENFORCEMENT, APPROPRIATIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to address the issue as regards the practice of other countries and companies overseas like Canada, South Korea, Australia and Hongkong of sending their garbage to the Philippines which is an insult to all Filipinos and an affront to our laws. Tasks the DENR, DOF, DOT to jointly establish an Environmental Protection Desk at every port of entry in the country to be manned 24 hours a day and seven days a week by competent and adequately trained personnel. States that the relevant penal provision of environmental and customs law as provided herein shall apply as penalties to violations of this Act."
