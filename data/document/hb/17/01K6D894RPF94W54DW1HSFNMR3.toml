congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION AND CONSERVATION OF UNDERWATER CULTURAL HERITAGE IN PHILIPPINE WATERS"
congress_website_abstract = "Intends to supplement existing laws as regards to “cultural properties” under R.A. No.4846 (Cultural Properties Preservation and Protection Act); P.D. No.374 (Amends R.A. No.4846); R.A.No.8492 (National Museum Act); and R.A. No.10066 (National Cultural Heritage Act). Aims therefore to establish comprehensive underwater cultural heritage preservation, protection, management, and monitoring mechanism by creating regulatory framework particularly: regulations on excavation and exploration, the creation of a registry of items and/or sites to be protected, prohibition of certain harmful activities, a reward system for verified reports and imposition of sanction/penalties for violations."
