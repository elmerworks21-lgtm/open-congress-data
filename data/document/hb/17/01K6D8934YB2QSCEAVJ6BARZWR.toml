congress_website_title = "AN ACT DEFINING THE CAUSES OF TERMINATION OF EMPLOYMENT OF WORKERS, AMENDING FOR THE PURPOSE ARTICLE NUMBERS 282 AND 283 OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Enumerates the causes that an employer may terminate an employment, to wit: 1) serious misconduct or willful disobedience by the employee of the lawful orders of the employer or representative in connection with his/her work; 2) gross habitual neglect by the employee of his/her work; 3) fraud and willful breach by the employee of the trust reposed in him/her by the employer or duly authorized representative; 4) commission of a crime or offense by the employee against the person of his/her employer or any immediate member of his/her family or his/her duly authorized representative; and 5) act or omission expressly specified in the company rules and regulations or collective bargaining agreement."
