congress_website_title = "AN ACT TO ESTABLISH A JOB TRAINING PROGRAM FOR MATURE OR OLDER WORKERS"
congress_website_abstract = "Defines several terms among others as follows: Basic Skills Deficient - means with that the individual has English reading or computing skills at or below the 8th grade level on a generally accepted standardized test or a comparable score on a criterion-referenced test; Mature or Older Worker - means an individual who is 40 years of age or older. Intends to provide programs to prepare mature or older workers for involvement in the working force, by enrolling them to occupational and educational skills that they may use for an improved skill set and long-term employability. Enumerates several categories for an individual who shall be eligible to participate in the program and provides for program design which covers general program requirements; authorized trainings or support services, and special rules on selection of service providers and job training plan."
