congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE CENTER FOR DIABETES AND ENDOCRINOLOGY AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to create the Philippine Center for Diabetes and Endocrinology (PCDE) which shall serve as the lead tertiary-level center in the screening, prevention, diagnosis and treatment of diabetes. Grants PCDE the authority to call upon any department, bureau, office, agency, or instrumentality of the government, including government-owned or controlled corporations, local government units, and state universities and colleges for such assistance as it may need in the pursuit of its purposes and objectives. Appropriates the amount of Ten Billion Pesos (Php10,000,000,000.00) from the Philippine Amusement and Gaming Corporation (PAGCOR) to defray the initial operation and maintenance of the PCDE to be included in the General Appropriations Act."
