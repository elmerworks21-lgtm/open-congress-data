congress_website_title = "AN ACT CREATING A DATABASE OF PRODUCTS CONTAINING PROBABLE CARCINOGENS"
congress_website_abstract = "Defines the term “carcinogen” as any substance or radiation that is directly involve in the existence of cancer or in the increase of its spread. Aims to call for government´s action towards a comprehensive cancer control program, initially cancer prevention, which offers the greatest public health potential and the most cost-effective long-term method of cancer control. Provides that the database shall be available at all health centers and at their website to inform and educate the public about known and probable carcinogens."
