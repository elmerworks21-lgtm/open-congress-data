congress_website_title = "AN ACT PROMOTING THE USE OF URBAN FARMING IN THE COUNTRY'S METROPOLITAN AREAS TO ADDRESS FOOD SECURITY CONCERNS AND REGENERATE ECOSYSTEM FUNCTIONS, APPROPRIATING FUNDS THEREFOR, AND FOR ANY OTHER PURPOSE"
congress_website_abstract = "Defines the terms “Urban Agriculture” and “Vertical Farming”; Involves the application of intensive production methods such as the using and reusing of urban sources and wastes; Also involves animal husbandry aquaculture, agro-forestry and horticulture; Employs the concepts of indoor agriculture in skyscrapers and other modern buildings; Integrates these methods in the academic curriculum of Institutions studying courses on Agriculture; Practical Arts, Home Economics, etc., and also incorporates its concept in the NSTP or the CMT."
