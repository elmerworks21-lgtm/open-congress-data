congress_website_title = "AN ACT STRENGTHENING THE FIRE CODE OF THE PHILIPPINES, REPEALING REPUBLIC ACT 9514 (FIRE CODE OF THE PHILIPPINES OF 2008) AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to clarify the respective authorities and jurisdictions of the BFP, PEZA and other similar entities, with respect to the administration and enforcement of the Fire Code in economic zones; harmonize the assessment and collection of Fire Code fees to the assessment and collection made by the LGUs for construction-related permits and business permits. Aims to expand the utilization of the Fire Code collections; and provide stringent penalties for every acts that tend to compromise fire safety that endangers the lives and limbs as well as properties of the Filipinos."
