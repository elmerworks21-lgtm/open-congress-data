congress_website_title = "AN ACT TO ENHANCE THE USE OF NATIONAL WEALTH FOR LOCAL DEVELOPMENT BY AMENDING CERTAIN PROVISIONS IN BOOK II OF REPUBLIC ACT 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Seeks to address the funneling of the 80% of the proceeds of LGU energy sources to non-priority projects aimed at lowering their respective community´s electricity consumption costs. Amends Sec.294 of the Local Government Code of 1991 to read as follows: SEC 294. Development and Livelihood Projects. - The proceeds from the share of local government units pursuant to this chapter shall be appropriated by their respective sanggunian to finance local government and livelihood projects IN THE APPROVED LOCAL DEVELOPMENT INVESTMENT PROGRAM AND ANNUAL INVESTMENT PROGRAM."
