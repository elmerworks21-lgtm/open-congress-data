congress_website_title = "AN ACT ESTABLISHING THE SCHOOL OF THE FUTURE IN TECHNOLOGY (SOFT) PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to provide Filipino students with the benefits of technological innovations which will prepare them for the challenges of future economic and employment realities. Proposes to establish the Philippine Schools of the Future in Technology (SOFT) in all public schools at basic education cycle (between preschool and K to 12) and provides for its program structure, components and sequencing such as: a) computer skills training and technology programs for teaching instructors; b) hybrid intranet connectivity through DepEd in collaboration with DITC, etc.; c) personal laptop units for each student at Grade 4, Grade 8, and Grade 11; d) digital classrooms equipped with digital board, tools and devices; e) hands-on training program particularly the marginalized and the disadvantaged students."
