congress_website_title = "AN ACT PROFESSIONALIZING THE PRACTICE OF THE PARALEGAL PROFESSION IN THE PHILIPPINES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Intends to give Filipinos who have been practicing paralegal work the necessary recognition and government assistance to develop the profession. Defines Paralegal profession as government-sanctioned performance of specifically delegated substantive legal work for which a lawyer is responsible, including but not limited to legal research, drafting of simple legal documents, liaising with judicial and quasi-judicial bodies, etc. and for which a license to practice law is not required under prevailing rules and regulations. Provides for the creation of the Professional Regulatory Board of Paralegals; licensure examination requirement, qualifications and rating; issuance of the certificate of registration and professional license; roster of paralegals in good standing; prohibition on the practice and Continuing Professional Development (CPD) Program of paralegal."
