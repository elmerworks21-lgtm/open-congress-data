congress_website_abstract = "Seeks to further incentivize and motivate our public school teachers to improve work performance and productivity and at the same time alleviate their financial plights. Proposes to grant a 14th month salary every year, in an amount equivalent to the 13th-month pay which shall be excluded from the computation of gross income provided the amount shall not exceed Eighty Two Thousand Pesos (82,000.00)."
