congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF LEARNING CITIES, MANDATING COMPLIANCE WITH THE KEY FEATURES THEREOF AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Declares that “the State shall promote lifelong learning as a tool for a more sustainable and secure nation by prescribing basic standards concerning the duties of the State and local government units for the promotion of lifelong education.” Requires heads of LGUs designated as Learning Cities to guide and support activities for the promotion of lifelong education whether initiated by the LGU or private lifelong educational institutions and to conduct training necessary to upgrade the capabilities of persons and institutions engaged in lifelong education activities."
