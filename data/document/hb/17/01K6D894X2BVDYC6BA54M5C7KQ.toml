congress_website_title = "AN ACT STRENGTHENING THE PHILIPPINE COMMISSION, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6847, OTHERWISE KNOWN AS THE PHILIPPINE SPORTS COMMISSION ACT"
congress_website_abstract = "Aims to meet the changing demands as sports and athletics become increasingly recognized and more people aspire to pursue their passion in sports. Seeks to amend several provisions of R.A. 6847 to help amateur athletes through grassroots programs, to effectively expand the priorities of the PSC, to include not only elite athletes, but also emerging ones."
