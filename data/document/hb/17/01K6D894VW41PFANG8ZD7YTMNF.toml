congress_website_title = "AN ACT IMPROVING THE DISCLOSURE AND TRANSPARENCY OF THE EXTRACTIVE INDUSTRIES"
congress_website_abstract = "Intends to ensure government´s commitment to disclose timely, complete, and accurate information on fees, taxes, and other mandatory payments by mining, oil and gas companies pertinent to resource extraction to enable evidence-based management. Aims to address the inability of the country to meet international standards in extractive industry governance by maintaining stringent regulation through the institutionalization of the Philippine Extractive Industries Transparency Initiative (PH-EITI)."
