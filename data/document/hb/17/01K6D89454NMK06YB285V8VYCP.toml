congress_website_title = "AN ACT DEFINING THE CRIMES OF IDENTITY THEFT AND IDENTITY FRAUD AND PROVIDING THE APPROPRIATE PENALTIES THEREFOR"
congress_website_abstract = "Defines the terms “Personal Electronic Content”, “Social Networking Website” and “Personal Identifying Information”; Seeks to supplement the protections afforded by the Data Privacy Act of 2012 and will be lex specialis in penalizing the use of personal data in appropriating to one´s self the identity of another person for personal gain or to defraud another; Proposes, as a minimum, the penalty of prission correccional with hefty fine or at least twice the damage cause by the act or whatever benefit the perpetrator sought to gain."
