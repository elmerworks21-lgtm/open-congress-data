congress_website_title = "AN ACT GRANTING TAX INCENTIVES TO PRIVATE EMPLOYERS THAT HIRE K+12 GRADUATES, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Grants private employers who hire and employ K+12 graduates a special deduction from the computation of their gross income, equivalent to twenty percent (20%) of the total amount paid as salaries and wages to the aforementioned graduates, subject to Section 4 of the National Internal Revenue Code. Tax deductions shall not exceed ten percent (10%) of the employer´s taxable income."
