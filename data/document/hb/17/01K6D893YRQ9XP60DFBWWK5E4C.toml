congress_website_title = "AN ACT AMENDING SECTIONS 7, 10, 23, 30, 31, 42 AND 52 OF REPUBLIC ACT NO. 8291, OTHERWISE KNOWN AS THE GSIS ACT OF 1997"
congress_website_abstract = "Seeks to propose changes in R.A.No.8291 (GSIS Act of 1997), the law which amended P.D. No.1146, in an effort to redress the said law's ineffective implementation, particularly in responding to the needs of teachers who comprise the largest group in terms of GSIS membership. Proposes to amend certain section in the present law to recompense the improper computation of service including the chargine of interests/surcharges penalties on late remittances. Also proposes to adjusts coverage of benefits to make them at par with the costs of living compounded by the escalating inflation rate and enhances the law's penalty clause to ensure that persons may be held accountable for prohibited acts committed."
