congress_website_title = "AN ACT PROVIDING A MAGNA CARTA FOR THE BENEFICIARIES OF HOUSING PROGRAMS OF THE GOVERNMENT"
congress_website_abstract = "Seeks to define basic rights and privileges that housing program beneficiary may enjoy with corresponding obligation or duty that they must observe in order to enjoy such privilege. Enumerates the various rights and responsibilities of a beneficiary among others such as: a) full use of the property as personal dwelling; b) access to basic utilities and services; c) shall not use the property for commercial purpose; d) shall not vacate the property and use it for pecuniary gain, etc."
