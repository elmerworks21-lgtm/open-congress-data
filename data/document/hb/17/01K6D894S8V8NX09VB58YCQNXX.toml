congress_website_title = "AN ACT STRENGTHENING THE INSTITUTIONAL CAPACITY OF THE OFFICE OF THE OMBUDSMAN BY AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 6770, OTHERWISE KNOWN AS \\\"THE OMBUDSMAN ACT OF 1989\\\", AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Seeks to broaden the investigative and prosecutorial powers of the Ombudsman by allowing them the following: employ wiretapping as an investigation technique after a grant of judicial authority; to issue subpoena and subpoena duces tecum to compel and secure the compulsory attendance of any witness or the production of evidence; the power to examine and access bank and non-bank accounts and transactions; and the power to punish for contempt."
