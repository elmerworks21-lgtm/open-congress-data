congress_website_title = "AN ACT AMENDING SECTIONS 12 AND 68 OF BATAS PAMBANSA BILANG 881, ALSO KNOWN AS THE OMNIBUS ELECTION CODE, DISQUALIFYING PERSONS CONVICTED OR SANCTIONED IN ANY COURT, TRIBUNAL OR BODY FROM BEING DECLARED AS A CANDIDATE OR FROM HOLDING ANY PUBLIC OFFICE PENDING APPEAL OF CONVICTION, WHERE THE PENALTY IMPOSED INCLUDES TEMPORARY OR PERPETUAL DISQUALIFICATION"
congress_website_abstract = "Aims to address the issue wherein many aspiring candidates still run for public office despite the fact that a court, tribunal or administrative body found compelling evidence to decide on their guilt and impose upon them corresponding penalties including perpetual or temporary disqualification from holding any public office. States that should the judgment imposing the sentence be brought up on appeal, the candidate shall still be disqualified until such time the appeal reverses the conviction and acquits such person. Provides that any person convicted of election offenses enumerated in Sec.68 of the Omnibus Election Code shall likewise be disqualified from being declared a candidate or, if elected, from holding public office pending appeal of such conviction."
