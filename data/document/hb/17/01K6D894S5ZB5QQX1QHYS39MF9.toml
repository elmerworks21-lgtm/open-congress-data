congress_website_title = "AN ACT PROVIDING FREE EDUCATION FOR THE CHILDREN AND QUALIFIED DEPENDENTS OF PUBLIC SCHOOL TEACHERS WHO DIED IN SERVICE"
congress_website_abstract = "Seeks to extend social guarantees to public school teachers and their families by granting educational scholarship to their qualified beneficiaries should they encounter their untimely demise or have been permanently incapacitated while still in service. Provision of said privileges to these Teacher´s dependent/s commences from the time of their death or permanent incapacity until these students graduate from a four (4) or five (5) year degree in college in any State Universities and Colleges (SUCs). Also provides for exemption in the payment of any school fees, and a monthly stipend, book and clothing allowance shall be granted to said scholars."
