congress_website_title = "AN ACT PREVENTING THE CIRCUMVENTION OF THE EMPLOYEES' RIGHT TO SECURITY OF TENURE, THEREBY AMENDING ARTICLE 280 OF THE LABOR CODE ON REGULAR AND CASUAL EMPLOYMENT"
congress_website_abstract = "Declares it unlawful for any employer to enter into any agreement which precludes acquisition of tenurial security by its employee and with this void agreement, the employer shall be liable to the employee concerned for the injury that the employee may suffer due to this act, and to both moral and exemplary damages, by reason of circumvention of the law on security of tenure which is fraudulent and in bad faith, without prejudice to any other liabilities the employer may incur for the resulting violation of other labor rights of the employee."
