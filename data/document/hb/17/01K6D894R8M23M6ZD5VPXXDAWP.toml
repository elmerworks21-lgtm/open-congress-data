congress_website_title = "AN ACT CREATING THE DEPARTMENT OF INVESTMENT PROMOTION AND DEVELOPMENT, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates the Department of Investments Promotion to be the lead investment promotion agency of the Philippines that shall promote both foreign and domestic investments; formulate and implement the Investments Strategy and Action Plan of the country; and harmonize, rationalize, and prioritize in a Comprehensive Investment Incentives Program, the grant of national tax and non-tax incentives for small, medium, and large scale investors, industries, institutions, and corporations on the basis of criteria that are performance-based, tightly-targeted, time-bound, and transparent."
