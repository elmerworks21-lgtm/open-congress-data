congress_website_title = "AN ACT INCREASING THE NUMBER OF RAYS OF THE SUN ON THE PHILIPPINE FLAG FROM EIGHT TO NINE, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 8491, OTHERWISE KNOWN AS THE FLAG AND HERALDIC CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to inculcate in the minds and hearts of our people a just pride in the country´s native Muslim brothers who sacrificed their lives for the country´s freedom. Proposes to increase the rays of the sun of the Philippine flag to give due recognition to the Muslim heroes who left an imprint on national history replete with stories of struggles for independence and victory against colonizers."
