congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION OF FINANCIAL CONSUMERS"
congress_website_abstract = "Seeks to recognize the role of financial regulators in ensuring that the rights of each and every consumer are protected. Provides therefore, among others, financial regulators such as the Bangko Sentral ng Pilipinas, Insurance Commission and the Securities and Exchange Commission, rulemaking, surveillance and inspection, market monitoring, and enforcement powers relative to consumer protection Defines Investment Adviser as any person who, engages in the business of advising others, as to the value of investment products or as to the advisability of investing in, purchasing, or selling investment products, or who issues or promulgates analyses or reports concerning investment products, with several exclusions thereon."
