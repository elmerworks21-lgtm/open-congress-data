action = "Conference Committee Report on the disagreeing provisions of HBNos. 4814, 8554 and SBN-2059, submitted to the Senate, recommending that HBN-8554, in consolidation with SBN-2059 and HBN-4814, be approved as reconciled and approved by the conferees;"

[[history]]
date = "2018-12-13"
action = "Conference Committee Report Approved by the Senate;"

[[history]]
