action = "Read on First Reading and Referred to the Committee on RULES;"

[[history]]
date = "2018-11-26"
action = "Senate requested the House of Representatives for a conference on the disagreeing provisions of SBN-2059 and HBN-4814, designating Senators Angara, Recto, Binay, Pimentel III and Drilon as its conferees to the Bicameral Conference Committee on November 19, 2018;"

[[history]]
date = "2018-11-26"
action = "House of Representatives designated Representatives Suansing (E.), Bolilia, Deloso-Montalla, Romero, Suarez and Defensor, Jr. as conferees to the Bicameral Conference Committee on the disagreeing provisions of SBN-2059, HBNos. 4814 and 8554 on November 21, 2018;"

[[history]]
date = "2018-11-27"
action = "Senator Zubiri manifested that the constituted Bicameral Conference Committee covers the disagreeing provisions on SBN-2059, HBN-4814 and HBN-8554, since HBN-8554 was already included in the letter of the House of Representatives dated November 21, 2018;"

[[history]]
date = "2018-12-04"
action = "House of Representatives designated Representatives Cua and Pichay Jr. as additional conferees to the Bicameral Conference Committee on the disagreeing provisions of SBN-2059, HBNos. 4814 and 8554 on November 28, 2018;"

[[history]]
date = "2018-12-12"
action = "Conference Committee Report on the disagreeing provisions of HBNos. 4814, 8554 and SBN-2059, submitted to the Senate, recommending that HBN-8554, in consolidation with SBN-2059 and HBN-4814, be approved as reconciled and approved by the conferees;"

[[history]]
date = "2018-12-13"
action = "Conference Committee Report Approved by the Senate;"

[[history]]
date = "2018-12-17"
action = "Conference Committee Report Approved by the House of Representatives on December 12, 2018; (See: O.B. dated January 21, 2019)"

[[history]]
date = "2019-01-10"
action = "Letter from Acting Secretary General of the House of Representatives, Mr. Dante Roberto P. Maling, dated January 9, 2019, transmitting nine (9) enrolled copies of the consolidated version of HBN-4814, HBN-8554 and SBN-2059, for the signature of Senate Secretary Myra Marie D. Villarica and Senate President Vicente C. Sotto III;"

[[history]]
date = "2019-01-16"
action = "Letter for Speaker Gloria Macapagal-Arroyo, dated January 15, 2019, returning eight (8) enrolled copies of consolidated version of HBN-4814 and SBN-8554, which were signed by Senate Secretary Atty. Myra Marie D. Villarica and Senate President Vicente C. Sotto III;"

[[history]]
date = "2019-01-17"
