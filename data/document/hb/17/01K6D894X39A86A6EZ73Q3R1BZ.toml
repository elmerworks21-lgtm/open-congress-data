congress_website_title = "PHILIPPINE CROWDSOURCING ACT OF 2018"
congress_website_abstract = "Proposes to improve the process of charting policies that shall provide the country's desired direction through expanding the avenues of participation to the Filipino online community. Intends to make good use of social media to give voice to the brilliant ideas and greatest concerns of the people through law-making, and make the Government to become much closer to the people it has sworn to serve so that democracy will flourish. Refers \\\"CROWDSOURCING\\\" as a law that allows the public to participate in the legislative process wherever they are and it believes in the power of online crowdsourcing."
