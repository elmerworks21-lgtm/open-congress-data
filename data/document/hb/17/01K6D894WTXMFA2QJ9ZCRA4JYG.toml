congress_website_title = "AN ACT ESTABLISHING THE POLICE LAW ENFORCEMENT COURTS, GRANTING THESE EXCLUSIVE ORIGINAL JURISDICTION OVER VIOLATIONS OF CONSTITUTIONAL RIGHTS AND PNP RULES OF ENGAGEMENT COMMITTED BY THE POLICE, AMENDING BATAS PAMBANSA BILANG 129, AS AMENDED, OTHERWISE KNOWN AS THE \\\"JUDICIARY REORGANIZATION ACT OF 1980\\\", APPROPRIATING FUNDS THEREFORE AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to prosecute rogue police elements through a special courts that will provide the public fair, impartial, and speedy disposition of complaints for violations of constitutional rights and PNP operational procedures and code of ethical standards. It shall handle all civil and criminal cases involving the abuse of authority of the members of the PNP including those arising out of the violation of its police operational procedures and other police protocols designed to protect the rights of the accused. Provides for periodic and continuing training program for the presiding judge and the court personnel of the police courts on police protocols, tactics and rules of engagement including Philippine and International Human Rights Law."
