congress_website_title = "AN ACT AMENDING SECTION 69 OF BATAS PAMBANSA BILANG 881, ALSO KNOWN AS THE OMNIBUS ELECTION CODE, IMPOSING A FINE UPON A NUISANCE CANDIDATE AND/OR PERSONS IN CONSPIRACY WITH SUCH CANDIDATE FOR THE MALICIOUS FILING OF A CERTIFICATE OF CANDIDACY"
congress_website_abstract = "Intends to deter any person from repeatedly filing or causing the filing of Certificate of Candidacy \\\"to put the election process in mockery or disrepute or to cause confusion among the voters by the similarity of the names of the registered candidates or by other circumstances or acts which clearly demonstrate that the candidate has no bona fide intention to run for the office.\\\" Proposes to impose the penalty of a fine not less than ONE HUNDRED THOUSAND PESOS each to the nuisance candidate himself/herself and the person/s who were found to have been in conspiracy with or have induced such candidate to file such certificate, upon proof of malice or gross bad faith."
