congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 9173 OR \\\"THE PHILIPPINE NURSING ACT OF 1991\\\" INCREASING THE SALARY AND PROVIDING ADDITIONAL BENEFITS TO NURSES AND PUBLIC HEALTH WORKERS"
congress_website_abstract = "Provides for the minimum base pay of all nurses working in the public, private and LGUs health institutions. Authorizes the Secretary of Health to pay hardship allowances to physicians, dentists, nurses, mid-wives, x-ray technicians, medical technologists, nutritionists and aides presently employed or who may be willing to accept assignments in any municipality where positions abovementioned have been vacant for three (3) years or more"
