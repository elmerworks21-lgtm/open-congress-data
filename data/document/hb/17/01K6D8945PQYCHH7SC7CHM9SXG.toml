congress_website_title = "AN ACT REQUIRING INTERNET SERVICE PROVIDERS TO CREATE AND MAINTAIN A CHILD FRIENDLY INTERNET PACKAGE FOR SUBSCRIPTION OF PARENTS OR GUARDIANS, FREE WIFI PROVIDERS, COMPUTER RENTAL SHOPS, AND OTHER SUBSCRIBERS, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Intends to prevent children from being overly exposed and addicted to sexually themed and violent applications in the internet and computer gaming which may lead them to be victims of cyber pornography, bullying, scamming, and other crimes committed online and to shield these young minds from being polluted by those sites; Ensures that “Child Friendly Service Packages” are equipped with firewalls and other filtering devices which disallow access to sites and applications that are deemed detrimental to children´s welfare."
