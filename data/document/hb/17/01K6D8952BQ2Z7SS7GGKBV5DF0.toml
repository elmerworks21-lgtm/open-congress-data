congress_website_title = "AN ACT PROVIDING FOR THE PRESERVATION, REFORESTATION, AFFORESTATION AND SUSTAINABLE DEVELOPMENT OF MANGROVE FORESTS IN THE PHILIPPINES, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to set aside portions of land solely for the development and sustainable management of mangrove forests, in all coastal areas in each municipality of the country; establishing the National Council for the Preservation of Mangrove Forests (NCPMF) and the Local Council for the Preservation of Mangrove Forests (LCPMF). Seeks to employ the services of forest guards who shall be tasked to police the areas and shall have the authority to arrest those caught violating the provisions of this Act. Enumerates prohibited acts within the mangrove reservation areas and provides for penalties for any person, natural or juridical, found guilty of violating any provisions of this Act."
