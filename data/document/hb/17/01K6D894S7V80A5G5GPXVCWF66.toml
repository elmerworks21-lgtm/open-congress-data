congress_website_title = "AN ACT CREATING THE YOUTH DRUG ABUSE RESISTANCE EDUCATION AND PREVENTION PROGRAM AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Mandates the Department of Health, in close coordination with Department of Education (DepEd), Commission on Higher Education (CHED) and other appropriate agencies, to administer, coordinate and recommend policies to avoid opportunities of drug abuse and live drug-free lives of the youth. The Y-DARE shall also include livelihood and training programs to provide the youth with appropriate skills to prevent them from falling victim to illegal drugs."
