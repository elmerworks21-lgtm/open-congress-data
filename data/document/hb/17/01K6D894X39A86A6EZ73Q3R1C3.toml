congress_website_title = "AN ACT WAIVING GOVERNMENT FEES AND CHARGES ON THE ISSUANCE OF DOCUMENTS REQUIRED IN THE APPLICATION FOR EMPLOYMENT OF FIRST TIME JOBSEEKERS"
congress_website_abstract = "Seeks to exempt first-time jobseekers from the fees required by government agencies on documents necessary for job application. Intends to ease the burden that fresh graduates experience which involves securing and spending for the following: Clearances (Police, NBI and Barangay); Certificates (Medical, Birth and/or Marriage); UMID; and other documentary requirements issued by the government that may be required by employers for first time jobseekers."
