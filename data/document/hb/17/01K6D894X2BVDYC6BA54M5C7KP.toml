congress_website_title = "AN ACT PROVIDING FOR RULES ON PLEA BARGAINING AGREEMENT IN CRIMINAL CASES, PROVIDING PENALTIES IN VIOLATION THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to ensure that the plea bargaining procedure is not exploited as a means of compromise for the convenience of the guilty. Provides for several principles which shall be considered when plea bargaining agreement shall be entered into by and between the prosecution and the accused: a) it shall be imbued with public interest; b) it shall be based on the premise that the interest of justice and of the public will be served; c) it shall not be a matter of compromise or of right but shall be addressed to the sound discretion of the trial court; d) it shall not be entered into when it will only serve to trivialize the seriousness of the offense nor negate the deterrent value of the law. Provides for the appropriate lesser offense and its corresponding penalty; the offended party whose consent is necessary; offended parties in case of plunder and money laundering; the time and conditions avail; and the procedures to be followed."
