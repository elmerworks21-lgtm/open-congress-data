congress_website_title = "AN ACT ESTABLISHING THE ENERGY VIRTUAL ONE STOP SHOP FOR THE PURPOSE OF STREAMLINING THE PERMITTING PROCESS OF ENERGY PROJECTS"
congress_website_abstract = "Establishes an Energy Virtual One Stop Shop (eVOSS) under the supervision of the DOE which shall have the following powers and functions: a.) recognizes the legal effect, validity, and enforceability of electronic documents submitted in relation to applications for permits and/or certifications necessary for or related to applications for power generation, transmission or distribution projects; b.) utilizes an online payment system for all fees imposed for applications for permits and/or certification necessary for or related to applications for power generation, transmission or distribution projects; c.) provides a secure and accessible paperless processing system; d.) provides a secure and accessible system for all mother agencies, attached and/or subordinate agencies, LGUs, and other entities involved in the permitting process of power generation, transmission or distribution projects; e.) operated as 100% virtual storage and rules driven system build as an integrated shared service of the mother agency, attached and/or subordinate, LGUs, and other entities involved in the permitting process of power generation, transmission or distribution projects; and f.) utilizes a technology platform and operations management software platform for the mother agency, attached and/or subordinate, LGUs, and other entities involved in the permitting process of power generation, transmission or distribution projects to build their define processes and forms within a strict timeframe using published standards."
