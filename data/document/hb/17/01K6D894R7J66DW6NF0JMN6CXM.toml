congress_website_title = "AN ACT STRENGTHENING THE HEALTHCARE SYSTEM IN CULTURAL AND INDIGENOUS COMMUNITIES BY INSTITUTIONALIZING THE TRAINING AND EMPLOYMENT OF TRIBAL HEALTH WORKERS AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes that all tribal communities which are located about ten (10) kilometres from a barangay center shall have one (1) tribal health worker for every 30 families. The Tribal Health Worker (THW) shall be responsible for providing health care to members of the tribes and for assisting the sick person/s to the nearest clinic or hospital."
