congress_website_title = "AN ACT RECLASSIFYING THE SALARY AND QUALIFICATIONS OF CERTAIN EMPLOYEES IN THE JUDICIARY AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to reclassify and increase the salaries of 18 positions in the Judiciary which shall be commensurate to their merits, qualifications and amount of works that they perform. States that increasing the salaries of these court personnel will enable them to focus on their work and contribute in the speedy and efficient administration of justice in the country."
