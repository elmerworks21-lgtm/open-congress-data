congress_website_title = "AN ACT CREATING THE DEPARTMENT OF CLIMATE CHANGE, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to create the Department of Climate Change which will function as a core for the development, planning, formulating, and executing legislative measures, that will combine the harmful effects of climate change. Proposes to create programs and projects that will help the Filipino people adapt to the adverse effect of climate change in terms of public health, infrastructure and agriculture. Defines several terms among others such as: “Anthropogenic”, “Geographic Information System”; “Gender Mainstreaming”, “Greenhouse Effect/Gases”, etc."
