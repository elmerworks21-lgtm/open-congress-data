congress_website_title = "AN ACT INSTITUTING THE MAGNA CARTA OF BENEFITS FOR THE OFFICERS AND PERSONNEL OF THE PHILIPPINE DRUG ENFORCEMENT AGENCY"
congress_website_abstract = "Intends to ensure that PDEA agents are provided sufficient compensation and accorded avenues for professionalization since they are expose to dangerous situations especially now that many drug syndicates are affected by the administration's all-out war against illegal drugs. Seeks to promote and improve the well-being and economic welfare of the men and women of the PDEA by providing them with decent living and working conditions, better terms of employment, and career opportunities in order to effectively carry out their mandate."
