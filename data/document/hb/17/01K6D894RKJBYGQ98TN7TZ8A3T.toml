congress_website_title = "AN ACT PROMOTING NATIONAL ROAD SAFETY AWARENESS THROUGH ROAD SAFETY EDUCATION, ROAD SAFETY EVENTS AND ACTIVITIES AND MULTI-STAKEHOLDER CONSULTATION AND COLLABORATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address road crashes and deaths through safety education and awareness campaign and prevent road deaths and injuries, by providing for mandatory road safety education in school curricula at all levels. Declares the month of June as National Road Safety Month to stress the importance of road safety education. Mandates different government agencies to conduct nationwide information, education and communication campaigns on road safety laws, road crash data, risk factors, rights and responsibilities of all road users and all other matters which will help increase the awareness of the public on the importance of road safety."
