congress_website_title = "AN ACT AMENDING SECTIONS 141, 142 AND 143 OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Intends to increase the tax on alcohol products to approximate the 40-60% sharing of alcohol and tobacco expenditure and to increase its excise tax rate to 10%. Seeks to remove the distinction on whether fermented liquors are brewed and sold in microbreweries and pubs or in factories for simpler tax administration and provides that tax shall be based on the basis of volume or per liter and no longer on “per proof liter”."
