congress_website_title = "AN ACT PROVIDING FOR ADDITIONAL SUPPORT AND COMPENSATION FOR EDUCATORS IN BASIC EDUCATION"
congress_website_abstract = "Proposes to give additional support in the form of allowances and other remuneration, medical allowance, and an annual Magna Carta Bonus in relation to the implementation of Republic Act 4670 (Magna Carta for Public School Teachers); Provides for the beneficiaries of the additional support and compensation in the amount of TEN THOUSAND (P10,000.00) per month which shall be paid in three (3) tranches and specifies the terms and conditions of its payment."
