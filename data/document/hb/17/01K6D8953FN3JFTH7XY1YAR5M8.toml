congress_website_title = "AN ACT AMENDING ARTICLE 83 OF THE PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Intends to help ease the burden of employees in commuting to work by allowing alternative working arrangements. Proposes to remove the limiting \\\"normal work hours\\\" from eight (8) hours a day for five (5) days to a more flexible work duration which means that employees may clock in to work at any time as long as they complete the required number of hours. Proposes further to put a ceiling on the number of working hours to forty-eight (48) hours per week in order to protect the well-being of employees."
