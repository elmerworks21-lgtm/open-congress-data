congress_website_title = "AN ACT REGULATING THE PRACTICE OF OCCUPATIONAL THERAPY IN THE PHILIPPINES, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Creates the Professional Regulatory Board of Occupational Therapy that shall promulgate rules and regulations, administrative orders, and issuances to carry out the provisions of this Act; supervise and regulate the registration, licensure, and practice of occupational therapy in the country; prescribe the Code of Ethics and Standards of Practice for occupational therapists and occupational therapy technicians; and issue, suspend, revoke and reinstate the certificate of registration and professional identification card for the practice of occupational therapy, among others. Requires all applicants for registration for the practice of occupational therapy to undergo a licensure examination to be administered by the Board; and prescribes prohibitions on the practice of occupational therapy. Proposes all registered occupation therapists to become members of one national professional organization of occupational therapists duly registered with the Securities and Exchange Commission (SEC)."
