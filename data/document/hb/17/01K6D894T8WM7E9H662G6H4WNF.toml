congress_website_title = "AN ACT TO RECRUIT, HIRE, AND TRAIN ADDITIONAL SCHOOL-BASED GUIDANCE COUNSELORS, PSYCHOLOGISTS, SCHOOL SOCIAL WORKERS AND MENTAL HEALTH PERSONNEL"
congress_website_abstract = "Proposes to employ and train additional school-based mental health personnel, counselors, social workers and school psychologist in order to address the intellectual, emotional and developmental needs of the elementary and secondary school students. Provides that each public school shall have at least three (3) counselors, one (1) psychologist, one (1) social worker, and other mental health and students service providers when the need arises."
