congress_website_title = "AN ACT ADJUSTING THE AMOUNTS OR THE VALUE OF PROPERTY ON WHICH A PENALTY IS BASED, AND THE FINES IMPOSED UNDER THE REVISED PENAL CODE, AMENDING FOR THE PURPOSE ACT NO. 3815, OTHERWISE KNOWN AS \\\"THE REVISED PENAL CODE\\\", AS AMENDED\\\""
congress_website_abstract = "Aims to render current and relevant to the times, the fines provided therein; Among others, the bill raises/adjusts the amount of fines/penalties for the following crimes: obtaining a search warrant without just cause; crimes of direct assault, tumults; false testimony favorable to or against a defendant in a criminal case; qualified trespass to dwelling; indirect assault; less serious physical injuries; unlawful arrest; grave threats; revelation of industrial secrets; other coercions or unjust vexation; resistance and disobedience to a person in authority not of a serous nature."
