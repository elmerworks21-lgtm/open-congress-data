congress_website_title = "AN ACT EMPOWERING LOTTO WINNERS OF PRIZES AMOUNTING TO MORE THAN TEN THOUSAND PESOS TO DETERMINE HOW THE FINAL TAX ON HIS OR HER WINNINGS SHALL BE SPENT"
congress_website_abstract = "Seeks to empower the Lotto winners the right to determine how to spend the final tax of twenty percent (20%) specified in Republic Act No.10963, otherwise known as the TRAIN Law. Provides that the taxpayer can specify in a notarized letter addressed to the President, a government entity, program or project to which the final tax shall be allocated and spent; otherwise if he does not choose a beneficiary or beneficiaries, the final tax proceeds shall form part of the incremental revenues and shall be spent as provided in the TRAIN Law."
