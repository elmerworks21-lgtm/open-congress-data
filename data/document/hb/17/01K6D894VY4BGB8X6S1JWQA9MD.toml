congress_website_title = "AN ACT TO AMEND REPUBLIC ACT 9994 OTHERWISE KNOWN AS THE EXPANDED SENIOR CITIZENS ACT OF 2010 AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to give certain classes of senior citizens graduated discount which will amend specifically Sec. 4 of R.A.9994 on the grant of 20% discount. Provides for: TWENTY PERCENT (20%) discount for those who are 60 - 70 years old; THIRTY PERCENT (30%) discount for those who are 70 - 80 years old; FORTY PERCENT (40%) discount for those who are 80 - 90 years old; and FIFTY PERCENT (50%) discount for those who are 90 years old or over."
