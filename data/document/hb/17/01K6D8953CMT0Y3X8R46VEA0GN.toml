congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF RECOGNITION OF CHURCHES, SECTS, RELIGIOUS GROUPS OR ORGANIZATIONS IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates compliance with the prescribed procedure for the registration of non-stock and non-profit organization of the SEC subject to the minimum requirements provided in this Act. Proposes application and issuance of \\\"Certificate of Recognition\\\" for churches or religious groups including their respective leaders with the Philippine Statistics Authority and grants additional privileges to both the organizations and their religious leaders as stated in this Act. Provides for exemption from the state recognition several churches, sects, religious groups or organizations in consideration of their long-recognized establishment in the country, or on account of their broad membership base."
