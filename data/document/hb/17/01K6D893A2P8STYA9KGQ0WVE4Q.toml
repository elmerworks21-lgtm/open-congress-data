congress_website_title = "AN ACT DEFINING AND CLASSIFYING EMPLOYMENT RELATIONSHIP AMENDING FOR THIS PURPOSE ARTICLES 279, 280 AND 281 OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Proposes the following: 1) reiterating the right to security of tenure to the to the effect that all employees shall not be dismissed without cause and due process; 2) defining the criteria for the existence of employer-employee relationship; 3) classifying all employees as regular except those under probationary employment or those under industry-specific work arrangement as may be determined by the Secretary of Labor and Employment through tripartite consultation; and 4) providing for probationary employment which shall not exceed six months."
