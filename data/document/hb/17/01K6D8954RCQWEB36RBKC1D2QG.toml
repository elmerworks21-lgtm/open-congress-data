congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 8293 ENTITLED \\\"AN ACT PRESCRIBING THE INTELLECTUAL PROPERTY CODE AND ESTABLISHING THE INTELLECTUAL PROPERTY OFFICE, PROVIDING FOR ITS POWER AND FUNCTIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to bolster the organizational structure of the Intellectual Property Office, strengthening it to benefit micro, small and medium enterprises. Seeks to incorporate changes on substantive law in the areas of patents, trademarks, copyright, and emerging intellectual property related fields to conform with international standards, trends and obligations and to implement national policies. Proposes to rationalize and put into logical coherence the common provisions such as jurisdiction, remedies, and penalties and sanctions, and to correct errors and inconsistencies in the current law, and organize the provisions to make it understandable."
