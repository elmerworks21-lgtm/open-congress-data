congress_website_title = "AN ACT ESTABLISHING THE OFFICE FOR SOCIAL WELFARE ATTACHE, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8042, OTHERWISE KNOWN AS THE MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF 1995, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Recognizes the significant role of social welfare attaches in the provision of appropriate social services to our overseas workers and their families, by institutionalizing their permanent posting and/or deployment to Philippine Foreign Posts. States that the DSWD shall deploy such attaches to manage cases of OFWs needing psychosocial services and Overseas Filipinos in distress such as victims of trafficking, illegal recruitment, sexually-abused, maltreated/mistreated Overseas Filipinos, abandoned/neglected children and vulnerable sectors."
