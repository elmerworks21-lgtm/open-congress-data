congress_website_committee_codes = ["0542"]
congress_website_primary_keys = [27833]
congress_website_title = "AN ACT PROMOTING SMALL SCALE MINING BY EXEMPTING FROM THE PAYMENT OF INCOME AND EXCISE TAXES THE SALE OF GOLD PURSUANT TO REPUBLIC ACT NO. 7076, OTHERWISE KNOWN AS THE PEOPLE'S SMALL-SCALE MINING ACT, AMENDING FOR THE PURPOSE SECTIONS 32 AND 151 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates that the income derived from the sale of gold to the Bangko Sentral ng Pilipinas (BSP) by registered small-scale miners, pursuant to RA No. 7076, and accredited traders; and the sale of gold by registered small-scale miners to accredited traders for eventual sale to the Banko Sentral ng Pilipinas shall not be included in gross income and shall be exempted from taxation. It also mandates that the gold which is sold, or eventually sold to the BSP shall be exempt from the payment of excise tax. The taxpayer who had paid excise tax prior to the sale of gold to the BSP may file a claim for refund or credit with the Commissioner for the excise tax paid."
