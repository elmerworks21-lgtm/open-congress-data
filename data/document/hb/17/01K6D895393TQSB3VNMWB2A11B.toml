congress_website_title = "AN ACT STRENGTHENING AND EXPANDING THE SCOPE OF THE FREE PUBLIC TERTIARY EDUCATION THROUGH NO COLLECTION OF ALL OTHER SCHOOL FEES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10931, OTHERWISE KNOWN AS THE \\\"UNIVERSAL ACCESS TO QUALITY TERTIARY EDUCATION\\\""
congress_website_abstract = "Proposes to address the issue that several SUCs are circumventing R.A.NO.10931 through being able to establish and collect other school fees due to vague provision on the law. Amends Sec.3(h) of R.A.No.10931 to read as follows: \\\"(h) Other school fees refers to fees charges by HEIs and technical-vocational institutions which cover other necessary costs supportive of instructions, specifically the following: library fees, computer fees, laboratory fees, school ID fees, athletic fees, admission fees, development fees, guidance fees, handbook fees, entrance fees, registration fees, medical and dental fees, cultural fees and [other similar or related fees] ALL OTHER SCHOOL FEES.\\\""
