congress_website_title = "AN ACT CREATING THE PHILIPPINE RADIATION AND NUCLEAR REGULATORY COMMISSION, PROVIDING FOR THE REGULATION AND CONTROL OF NUCLEAR AND OTHER RADIOACTIVE MATERIALS, FACILITIES, AND RADIATION GENERATING EQUIPMENT, APPROPRIATING FUNDS THEREFORE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to unify the nuclear regulatory body in the Philippines to include the relocation of all regulatory activities being undertaken in the Phil. Nuclear Research Institute (PNRI)under DOST and those in the Center for Device Regulation, Radiation Health and Research of the Food and Drug Administration (FDA-CDRRHR) under the DOH, which are specific to ionizing radiation regulation, into a single unified governmental organizational structure; Aims to provide the legal basis for such independent body and to specify and clarify its functions."
