congress_website_title = "AN ACT CREATING PROGRAMS FOR INCARCERATED PARENTS AND THEIR CHILDREN"
congress_website_abstract = "Intends to protect children of incarcerated parents from all forms of neglect and development problems by providing for placement and guardianship options for the minor children, specifying the persons they are allowed to be placed under the care of. Proposes child-friendly visitation programs for solo parents and children and establishment of special visitation rooms in prison facilities in order to help solo parents raise their children regardless of their circumstances."
