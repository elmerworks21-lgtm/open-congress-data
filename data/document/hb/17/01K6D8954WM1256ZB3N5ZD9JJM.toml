congress_website_title = "AN ACT CREATING THE DEPARTMENT OF WATER, IRRIGATION, SEWAGE, FLOOD CONTROL, AND SANITATION RESOURCE MANAGEMENT, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to improve our waters by: ensuring and improving the country's sustainable community-based water sources; protection of watersheds and water sources; lending program to Local Water Districts; sewage and sanitation resource management; as well as flood control and flood risk management. Seeks to better manage the entire cycle of our water - from sourcing to water treatment and sewage to achieve more sustainable water supply and better overall management of our irrigation, sanitation, flood management, and sewage."
