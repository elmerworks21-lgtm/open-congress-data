congress_website_title = "AN ACT INSTITUTIONALIZING SUSTAINABLE COASTAL TOURISM, PROVIDING MECHANISMS FOR ITS INSTITUTIONALIZATION, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to ensure the continued rise and longevity of our tourism industry through conservation, protection, and strengthening of our natural resources. Specifically addresses urgent issues on development planning and mitigation efforts on our coastal resources, creating therefore the National Coastal Recreational Area Quality Framework which will form and implement tourism development measures and practices which shall include among others, measurable and reasonable quality standards requirements such as ecological waste management; water quality and sanitation; protection of marine flora and fauna, etc."
