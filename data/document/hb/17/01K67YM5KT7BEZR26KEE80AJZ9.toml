congress_website_title = "AN ACT STRENGTHENING COMPLIANCE WITH OCCUPATIONAL SAFETY AND HEALTH STANDARDS AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Seeks to strengthen compliance of the occupational safety and health (OSH) standards by: 1) outlining the responsibilities of both the employers and workers; 2) mandating the creation of workplace OSH structure; 3) imposing administrative and criminal penalties in the form of fine and imprisonment for non-compliance thereof just like in Singapore and the USA; 4) imposing joint and solidary liability of employers, contractors and subcontractors for OSH compliance; and 5) provide for compensation and employment insurance benefits as well as payment of required penalties to the State Insurance Fund."
