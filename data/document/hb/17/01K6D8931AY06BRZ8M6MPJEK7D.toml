congress_website_title = "AN ACT CREATING A MORE EQUITABLE, PROGRESSIVE AND JUST TAX SYSTEM, BY ADJUSTING THE LEVEL OF NET TAXABLE INCOME AND NOMINAL TAX RATES OF THE INDIVIDUAL INCOME TAX, AMENDING FOR THE PURPOSE SECTION 24 (A) (1) OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED BY REPUBLIC ACT NO. 9504, AND FOR OTHER PURPOSES"
congress_website_abstract = "Creates a more equitable, progressive and just tax system for a majority of the Filipino taxpayers, by adjusting the level of net income and nominal tax rates of the individual income tax, while ensuring that the government will still be able to raise revenues for its important programs."
