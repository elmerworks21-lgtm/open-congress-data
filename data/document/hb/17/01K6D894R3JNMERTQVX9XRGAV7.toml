congress_website_title = "AN ACT REQUIRING ALL BRANCHES, SUBDIVISIONS, INSTRUMENTALITIES, AND AGENCIES OF THE GOVERNMENT, INCLUDING GOVERNMENT-OWNED AND -CONTROLLED CORPORATIONS OR THEIR SUBSIDIARIES TO DIVULGE THE IDENTITY OF HIRED FOREIGN CONSULTANTS, THE NATURE OF THEIR WORK AND THEIR COMPENSATION, PERKS, AND OTHER PRIVILEGES, AND PROVIDING PENALTIES IN CASE OF VIOLATION THEREOF"
congress_website_abstract = "Aims to respond to the need for the public to be appraised as to whether or not the fees that foreign consultants receive corresponds to the quality of service they render; Assigns the office of the Executive Secretary to maintain a centralized data-file of all foreign consultants hired or retained by the Government and to publish such list in at least two newspapers of general circulation."
