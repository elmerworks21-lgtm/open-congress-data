congress_website_title = "AN ACT MANDATING THE CREATION, INSTITUTIONALIZATION, AND DEVELOPMENT OF YOUTH STUDIES IN PUBLIC HIGHER EDUCATION"
congress_website_abstract = "Aims to indoctrinate in the youth the concepts of social justice and human rights and develop awareness and appreciation of their role in nation building, society and community. Intends to honor the youth´s role and heroism on their struggle against injustice, oppression, and exploitations especially during Martial law and to actualize in them their role as the hope of the nation. Proposes to integrate youth studies in undergraduate and graduate studies."
