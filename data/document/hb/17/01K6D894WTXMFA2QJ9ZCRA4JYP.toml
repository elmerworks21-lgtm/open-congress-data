congress_website_title = "AN ACT CREATING THE PHILIPPINE CANCER CENTER, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to oversee the continuity of the national program on cancer prevention and cure by creating an agency whose specific and primary focus is the advocacy of cancer awareness and treatment. Enumerates several objectives of the PCC related to the following, among others: specialized cancer hospital; scientific research; publication/dissemination of the findings of researches on several aspects of cancer, its abnormalities and control; dissemination and exchange of ideas and information; training of medical personnel; studies of cellular anomalies; formation of other organization for a more effective programmatic approach; medical cancer services especially to the poor and less fortunate."
