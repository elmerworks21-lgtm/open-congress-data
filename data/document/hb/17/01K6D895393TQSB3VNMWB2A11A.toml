congress_website_title = "AN ACT INSTITUTIONALIZING FREE PUBLIC TERTIARY EDUCATION THROUGH INTRODUCTION OF COST OF ATTENDANCE AS PRIMARY DETERMINANT OF STATE-RUN UNIVERSITY OR COLLEGE'S ANNUAL FUNDING FROM THE GOVERNMENT, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10931, OTHERWISE KNOWN AS THE \\\"UNIVERSAL ACCESS TO QUALITY TERTIARY EDUCATION\\\""
congress_website_abstract = "Refers \\\"cost of attendance\\\" to the total amount a particular state-run university or college needs to provide education for a student per year, including the proportional cost per student for personnel services, maintenance and other operating expenses, and capital outlay. Seeks to finance the actual \\\"cost of attendance\\\" of students, which shall also serve as guide for the Executive Department in preparing the national expenditure program."
