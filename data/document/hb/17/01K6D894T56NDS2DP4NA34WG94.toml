congress_website_title = "AN ACT PROVIDING A BAN ON DUMPING OF SEWAGE SLUDGE AND INDUSTRIAL WASTE INTO THE SEA"
congress_website_abstract = "Aims to provide protection to our marine and aquatic life and resources by penalizing the act of dumping of wastes into the sea waters. Defines “Industrial waste” as any solid, semi-solid, or liquid waste dumped by a manufacturing or processing plant; and “Sewage sludge” as any solid, semi-solid, or liquid waste generated by a wastewater treatment plant. Penalizes any person or the guilty officer/s (in the case of corporation, trust, firm, etc.) who dumps above-mentioned wastes into ocean waters, an amount of not less than ONE HUNDRED THOUSAND PESOS (Php100,000.00) nor more than ONE MILLION PESOS (Php1,000,000.00) or imprisonment of not less than SIX (6) months but not more than EIGHT (8) years, or both at the discretion of the court."
