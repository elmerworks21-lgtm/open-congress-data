congress_website_title = "AN ACT TO STRENGTHEN THE INTERNAL AFFAIRS SERVICE OF THE PHILIPPINE NATIONAL POLICE, AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NO. 6975 AS AMENDED BY REPUBLIC ACT NO. 8551, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to strengthen the Internal Affairs Service (IAS) of the PNP to make them more effective and efficient in promoting higher standards of integrity in the police force. Provides integrity development functions such as character building, lifestyle checks and investigation and impose restrictions, file appropriate criminal cases against PNP members before the regular courts and assist in the prosecution of cases. Grants IAS to formulate and adopt its own disciplinary rules and mechanisms and fiscal independence that shall be distinct and separate from the PNP. Provides that the police internal affairs investigation shall be finished within 30 days after criminal charges had been filed."
