congress_website_abstract = "Requires educational institutions to provide appropriate armchairs to address the needs of the left-handed student population. Mandates the Department of Education, Commission on Higher and Technical Education and Skills Development Authority to adopt measures and to formulate rules and regulations to implement and carry out the provisions of this Act."
