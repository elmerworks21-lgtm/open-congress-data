congress_website_title = "AN ACT CODIFYING THE ALTERNATIVE CHILD CARE LAWS OF THE PHILIPPINES"
congress_website_abstract = "Seeks to codify the existing laws on alternative child care, such as the Law On Domestic Adoption and Inter - Country Adoption, The Foster Care Law, and Guardianship Law leading to adoption, to a single deposit of law to be known as \\\" The Alternative Child Care Code Of 2016. Establishes the \\\" National Child Care Authority ( N C C A ) to implement various laws which will improve and speed up the process of adoption, foster care and guardianship and increase fiscal capacity of N C C A, thereby improving its services offered to stakeholders."
