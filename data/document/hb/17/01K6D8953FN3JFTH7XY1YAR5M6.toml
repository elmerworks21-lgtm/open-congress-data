congress_website_title = "AN ACT PROVIDING FOR PENSION AND HEALTH BENEFITS TO COMFORT WOMEN, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines \\\"comfort women\\\" as Filipino women who were made sex slaves by the Japanese Occupation Army during World War II as may be determined by the National Commission on the Role of Filipino Women (NCRFW). Proposes for a program for the proper counselling and guidance of \\\"comfort women\\\" and the provision of free full medical insurance through PhilHealth and a monthly pension of Three Thousand Pesos (Php3,000) to be provided by the Philippine Veterans Affairs Office (PVAO)."
