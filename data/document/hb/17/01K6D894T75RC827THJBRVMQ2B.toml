congress_website_title = "AN ACT AUTHORIZING THE COMMISSION ON ELECTIONS TO PROVIDE FIELD OFFICES FOR THE PROVINCIAL ELECTION SUPERVISOR AND ELECTION REGISTRAR, AMENDING FOR THE PURPOSE SECTION 55 OF BATAS PAMBANSA BLG. 881, OTHERWISE KNOWN AS THE \\\"OMNIBUS ELECTION CODE OF THE PHILIPPINES\\\", AS AMENDED, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Intends to rectify the issue that the integrity of the COMELEC is being compromised due to the field officers´ proximity to local officials which clearly runs counter to the constitutional provision guaranteeing COMELEC´s fiscal autonomy and the exercise of its duties and responsibilities without the influence, approval of or dependence on any government entity. Provides for appropriation of funds and a three-year period within which all existing field offices must be transferred from LGU-owned/controlled facilities to COMELEC -owned or -leased facilities."
