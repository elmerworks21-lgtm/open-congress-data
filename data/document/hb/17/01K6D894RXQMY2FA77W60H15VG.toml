congress_website_title = "AN ACT ENABLING THE INTELLECTUAL PROPERTY OFFICE THROUGH THE NATIONAL TELECOMMUNICATIONS COMMISSION TO CANCEL LICENSES OF INTERNET SERVICE PROVIDERS THAT ALLOW WEBSITES TO INFRINGE OR TO FACILITATE INFRINGEMENT OF COPYRIGHT"
congress_website_abstract = "Aims to empower the Intellectual Property Office and enable local Internet Service Providers (ISPs) to take reasonable steps to disable access to sites whenever these sites are reported to be infringing copyright or facilitating copyright infringement. Incorporates provisions as to procedures regarding the ff.: 1. Application by a copyright owner, or an exclusive licensee for disabling access to infringing online locations; 2. Review of the said application to determine whether the online location meets the requirements; 3. The required action or response by the Review Committee; and 4. Inclusion in the Watch List in case the online location does not meet the requirements"
