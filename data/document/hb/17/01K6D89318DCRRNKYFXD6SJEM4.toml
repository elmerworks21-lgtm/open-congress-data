congress_website_title = "AN ACT DESIGNATING CASINO OPERATORS AS COVERED PERSONS UNDER REPUBLIC ACT NO. 9160, OTHERWISE KNOWN AS THE `ANTI-MONEY LAUNDERING ACT OF 2001´, AS AMENDED"
congress_website_abstract = "Seeks to introduce the necessary amendments to the Anti-Money Laundering Act of 2001 (AMLA), as amended, to discourage the use of the casinos as avenues of illicit activity by mandating these to report covered and suspicious transactions to the Anti-Money Laundering Council (AMLAC) thereby providing for stricter customer identification requirements and records keeping system and prohibiting these casinos from engaging in any transaction involving the conversion of money from one form to another without being used for gaming."
