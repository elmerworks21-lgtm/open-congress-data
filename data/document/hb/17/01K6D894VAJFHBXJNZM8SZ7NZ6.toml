congress_website_title = "AN ACT PROVIDING FOR ADDITIONAL ORGANIZATIONAL, OPERATIONAL AND DEVELOPMENT FUNDING TO THE COMMISSION ON ELECTIONS (COMELEC), TO PROMOTE AND ENHANCE ICT MECHANISMS AND PROJECTS, TO FOSTER AND ACCELERATE THE CONVERGENCE OF ICT ENABLED FACILITIES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to appropriate the amount of FIVE HUNDRED MILLION PESOS (PhP500,000,000.00) as additional funding to carry-out the mandates of the COMELEC which includes among others as follows: Provision of citizen-centric election technology, infrastructure, systems and resources; Promotion on the use of emerging new COMELEC-ICT technologies; Foster a policy environment that will promote a broad market-led development of the election and ICT-enabled services; Promote and assist the development of election database-ICT content, applications and services; and Promote digital literacy, COMELEC-ICT expertise, and knowledge-building among citizens."
