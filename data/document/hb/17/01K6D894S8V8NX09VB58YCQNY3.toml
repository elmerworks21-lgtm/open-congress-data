congress_website_title = "AN ACT PROVIDING FOR THE DEMOCRATIZATION OF PUBLIC SCHOOL EDUCATION"
congress_website_abstract = "Declares it unlawful for any public school official to refuse admission of any student in primary or secondary public school where the student is a bona fide resident of the community. Penalizes public school official or employee who violates any provisions of this Act with one (1) month suspension from service and Five Thousand Pesos (P5,000.00) fine for the first offense, dismissal from service and temporary disqualification to hold public office for six (6) months for the second offense, and dismissal from service and perpetual disqualification to hold public office for third or subsequent offenses."
