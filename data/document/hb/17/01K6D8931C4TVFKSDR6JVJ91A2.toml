congress_website_title = "AN ACT TO PREVENT AND CONTROL POLLUTION FROM SHIPS, PROVIDE PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to remedy the shortcomings of Presidential Decree No. 979 and thus implementing the provisions of the International Convention for the Prevention of Pollution from Ships 1973, as modified by the Protocol of 1978 (MARPOL 73/78); establishes guidelines for the identification of harmful substances including emission of oil, noxious liquid substances and other harmful substances; sets emission standards for ships plying Philippine seas; and establishes a Marine Pollution Adjudication Board that has a quasi-judicial powers and exclusive jurisdiction over all marine pollution cases."
