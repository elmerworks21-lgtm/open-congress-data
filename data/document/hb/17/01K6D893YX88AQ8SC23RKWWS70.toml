congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NO. 9184, OTHERWISE KNOWN AS THE GOVERNMENT PROCUREMENT REFORM ACT"
congress_website_abstract = "Provides amendments to the following sections, among others as follows: 1) Sec.18 - ... Reference to brand names shall not be allowed; PROVIDED, THAT REFERENCE TO BRAND NAMES CAN BE MADE BY PROCURING ENTITIES WHICH ARE CONSTITUTED PRIMARILY FOR PROPRIETARY OR BUSINESS FUNCTION; 2) Sec.32 - Bid for the Procurement of Goods, Infrastructure Projects AND LEASE OF REAL PROPERTY...; 3) Sec.50 - provides additional condition when direct contracting may be resorted to such as d) FOOD, BEVERAGE AND HOTEL ACCOMMODATIONS, WHEN THE PROCURING ENTITY IS A GOCCs ENGAGED PRIMARILY IN PROPRIETARY OR BUSINESS FUNCTIONS SUCH AS ENTERTAINMENT AND GAMING INDUSTRY; 4) Sec.51 - also provides for additional condition when repeat order may be allowed: IN CASE OF PROCUREMENT OF RAW AND PERSIHABLE GOODS AND COMMODITIES, PRICE INCREASE SHALL NOT EXCEED 25% OF THE ORIGINAL CONTRACT."
