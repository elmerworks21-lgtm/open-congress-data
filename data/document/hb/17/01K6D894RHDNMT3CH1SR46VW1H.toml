congress_website_title = "AN ACT MANDATING PLASTIC WASTE MANAGEMENT PROGRAMS AND MEASURES, PROHIBITING THE RELEASE OF PLASTIC WASTE INTO THE NATURAL ENVIRONMENT, EMPOWERING THE OMBUDSMAN TO IMPLEMENT WASTE MANAGEMENT LAWS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Identifies and prohibits certain acts that may cause damage to or death and destruction of animal and plant life and habitats; Imposes a plastic bags deterrence fee of at least twenty pesos (P20.00) per reusable bag for plastic use deterrence and discouragement purposes at point-of-sale transactions at all retail purchase outlets nationwide; Provides for the phase-out of single-use plastic and phase-in of non-toxic and food-safe reusable plastic for the packaging, presentation, and storage of food and beverages; Mandates DENR, DTI and DILG to jointly formulate, approve and implement a national policy and implementing rules on redemption, recovery and recycling of reusable plastic products and packaging."
