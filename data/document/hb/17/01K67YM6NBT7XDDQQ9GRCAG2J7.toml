congress_website_title = "AN ACT PROMOTING PHILIPPINE INDIGENOUS OR TRADITIONAL WRITING SYSTEMS AND PROVIDING FOR THEIR PROTECTION, PRESERVATION AND CONSERVATION"
congress_website_abstract = "Provides that the writing systems shall be promoted through the following: (a.) Mandates the Department of Education and the Commission on Higher Education to include the writing systems in relevant subjects of the basic and higher education curricula and create the elective or specialized course in higher education for the same; (b.) Creates and support activities that promote the awareness of the writing systems during the Buwan ng Wika and other similar occasions and events; (c.) Conducts seminars, conferences, conventions, symposia and other relevant activities on the study of the writing systems; and (d.) Ensures the proper record-keeping of relevant documents and preservation of oral evidence on the writing systems."
