congress_website_title = "AN ACT MANDATING THE MOVIE AND TELEVISION INDUSTRY TO OBSERVE DUE DEFERENCE TO THE CULTURAL SENSITIVITIES AND INTELLECTUAL PROPERTY RIGHTS OF INDIGENOUS CULTURAL COMMUNITIES/INDIGENOUS PEOPLES (ICCs/IPs), AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 1986 CREATING THE MOVIE AND TELEVISION REVIEW AND CLASSIFICATION BOARD"
congress_website_abstract = "Aims to protect the intellectual property rights of Indigenous Cultural Communities and Indigenous Peoples in their promotion in mainstream mass media, specifically the movie and television industry. Provides measures and minimum standards to be met by movie and television enterprises in portraying and/or representing these cultural communities to safeguard their cultural identity and heritage."
