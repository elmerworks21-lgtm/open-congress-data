congress_website_title = "AN ACT PROFESSIONALIZING THE PRACTICE OF AUDIOLOGY AND CREATING FOR THIS PURPOSE A PROFESSIONAL REGULATORY BOARD OF AUDIOLOGY, APPROPRIATING FUNDS THEREFOR, UPGRADING AUDIOLOGIC EDUCATION, INTEGRATING AUDIOLOGISTS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address the need for a regular study on the prevalence, development and causes of hearing-related diseases, impairment, and disabilities and strengthen the practice of Audiology to resolve the grossly insufficient number of audiologists. Provides for the scope of the practice; prohibition against the unauthorized practice; disclosure of authority to practice; the Professional Regulatory Board; board examinations; registration and licensure; technical panel on education; and professional ethical standards."
