congress_website_title = "AN ACT ESTABLISHING THE DEPARTMENT OF WATER AND FISHERIES, PROVIDING FOR ITS POWERS AND COMPOSITION, APPROPRIATIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes a holistic and sustainable Integrated Water and Fisheries Continuum Management Approach as the bedrock of a Unified Water and Fisheries Policy Framework. Seeks to task the Department as the lead agency and implementor on the regulation, development and management of the country's water supply, fisheries, aquatic resources, inland waters, and ocean marine life and minerals. Provides for several agencies which shall be attached to the Department: 1. National Water Utilities Commission; 2. Watershed, Coastal, and Inland Water Resources Management Board; 3. Philippine Rise and West Phil. Sea Authority; and 4. Inter-Agency Water Policy and Operations Coordination Council."
