congress_website_title = "AN ACT REQUIRING THE ESTABLISHMENT OF COMPUTER LABORATORY IN ALL PUBLIC ELEMENTARY AND SECONDARY SCHOOLS AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to give priority to promote the use of computer technology and literacy in basic education, especially in public schools; Seeks to enhance and facilitate learning and education of pupils and students and provide access to computers and the Internet by both learners and teachers; Provides that every public elementary and high school students in the country shall have at least one (1) room that shall be used as computer laboratory."
