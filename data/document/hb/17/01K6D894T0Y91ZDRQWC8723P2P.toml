congress_website_title = "AN ACT STRENGTHENING THE NATIONAL FOOD AUTHORITY (NFA) AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "States that the National Food Authority shall be classified as a Government Instrumentality vested with Corporate Powers (GICP), tasked to maintain safe, adequate and continuous supply, at reasonable prices of food grains in the country. Intends to address various challenges and concerns facing the National Food Authority such as: the reasonableness and affordability of prices of staple rice and corn; enforceability of rules and regulations governing grains business; licensing and registration of all rice and corn business Defines several terms among others such as “adulteration”, “contumacy”, “farm gate price”, “food security”, “Minimum Access Volume (MAV)”; and “National Rice Reserve”."
