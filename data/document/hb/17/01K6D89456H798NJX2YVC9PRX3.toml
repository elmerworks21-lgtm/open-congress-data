congress_website_title = "AN ACT ESTABLISHING A NATIONWIDE GEO-TAGGING AND POVERTY TRACKING SYSTEM AND PPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to institutionalize geo-tagging in all LGUs to allow for more effective policy-making, facility in updating our respective maps, to track the success of government projects (infrastructure, conservation and land titling), and to constantly monitor the progress of society in terms of poverty incidence and other tangible results; Defines geo-tagging as the process of adding geographical identification to various media in the form of metadata. The captured information will be uploaded to a web-based application which provides the platform to geo-tag . . .; Intends to further the imperative to provide our citizenry the transparency they seek and ensure their taxes go to the support of the welfare of Filipinos on the fringes of society."
