congress_website_title = "AN ACT PROVIDING FOR FURTHER OPTIONS FOR COMPLIANCE WITH SECTION 7 OF REPUBLIC ACT NO. 10000, OTHERWISE KNOWN AS THE \\\"AGRI-AGRA REFORM CREDIT ACT OF 2009\\\""
congress_website_abstract = "Seeks to provide for further alternative modes of compliance with the requirement of RA10000; Allows the direct lending to rural and cooperative banks and to farmers to strengthen countryside lending; Provides that the loans should be directed to borrowers that will use the money for initiatives that will also benefit the agriculture sector; Seeks to allow direct investments to accredited rural financial institutions (RFIs) as another alternative form of compliance."
