congress_website_title = "AN ACT ESTABLISHING THE NATIONAL FILIPINO YOUTH MUSEUM"
congress_website_abstract = "Aims to commemorate the Filipino youth's heritage, heroism, and martyrdom whose historic contributions to people's struggles for freedom, rights, and equality shall be recognized. States that the administration of the Youth Museum shall follow the general standard structures, management and operations by the National Commission for Culture and Arts (NCCA) and other appropriate agencies."
