congress_website_title = "AN ACT GRANTING BENEFITS AND PRIVILEGES TO FORMER PRESIDENTS AND VICE PRESIDENTS OF THE PHILIPPINES OR THEIR SURVIVING SPOUSES, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 5059, REPEALING REPUBLIC ACT NO. 2087, AND FOR OTHER PURPOSES"
congress_website_abstract = "Grants former Presidents and Vice Presidents the following benefits and privileges: a.) tax-free retirement pension equivalent to the salary of an incumbent President and Vice President, respectively; b.) personal security and protection detail of at least three (3) personnel to be provided by the PSG; c.) Franking privileges; and d.) fifty percent (50%) discount on all public transportation and foreign travel. The same shall be extended to the surviving spouse provided he/she will not re-marry."
