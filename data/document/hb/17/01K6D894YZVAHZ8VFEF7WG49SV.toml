congress_website_title = "AN ACT CREATING AN INDEPENDENT POLICY-MAKING, QUALITY ASSESSING, RESEARCH AND REGULATORY BODY FOR THE EDUCATION SYSTEM IN THE PHILIPPINES TO BE KNOWN AS THE PHILIPPINE EDUCATION RESEARCH AND REGULATORY COMMISSION, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to bridge the governance and policy-making frameworks of basic education, higher education and technical-vocational education which shall set the general directions for educational policies, quality standards, guidelines and supervision learning outcomes of the entire education system. Proposes to develop a comprehensive educational policy based on extensive research on education and industry trends to ensure the professional and career suitability of the students both in local and international professions and seeks to further empower educational institutions to be effective partners in the delivery of educational reform"
