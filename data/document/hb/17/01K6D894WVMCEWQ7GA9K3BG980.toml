congress_website_title = "AN ACT PROMOTING THE PHILIPPINE FILM INDUSTRY THROUGH AN ANNUAL FILM QUOTA AND OTHER SUPPORT MEASURES"
congress_website_abstract = "Aims to safeguard the artistic and economic development of the film industry through an annual film quota that will require all cinemas and theatrical venues to exhibit only Filipino films for a period of twenty eight (28) days , from June 1 to June 14 and from December 18 to December 31. Seeks to guarantee all Filipino films a full week's run in all commercial theatres and booking priority on \\\"payday playdates\\\"."
