congress_website_title = "AN ACT REGULATING ELECTRONIC CIGARETTES"
congress_website_abstract = "Defines among others: “E-cigarette” (product that can be used for the consumption of a nicotine-containing vapour) “Nicotine” (nicotinic alkaloids, including any salt or complex of nicotine whether derived from tobacco or synthetically produced); “Vaping” (act of using an e-cigarette). Provides that nicotine containers shall bear a textual health warnings “This product may damage your health and is addictive”; and a retailer signage statement shall likewise be posted: “SALE/DISTRIBUTION TO OR PURCHASE BY MINORS OF E-CIGARETTES IS UNLAWFUL” or “IT IS UNLAWFUL FOR E-CIGARETTES TO BE SOLD/DISTRIBUTED TO OR PURCHASED BY PERSONS UNDER 18 YEARS OF AGE”."
