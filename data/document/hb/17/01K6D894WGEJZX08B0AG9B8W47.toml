congress_website_title = "AN ACT ESTABLISHING A UNIVERSAL NEWBORN HEARING SCREENING PROGRAM FOR THE PREVENTION, EARLY DIAGNOSIS AND INTERVENTION OF HEARING LOSS AMONG CHILDREN"
congress_website_abstract = "Provides that all babies born in Philippine hospitals, upon the consent of parents or legal guardians, shall be made to undergo newborn hearing loss screening before discharge. Babies who are not born in hospitals should be screened within the first three (3) months of life. States that a parent or legal guardian may refuse hearing loss screening on the grounds of religious beliefs but shall acknowledge in writing that they have been informed of their responsibility to perform said screening. Mandates the DOH to require health institutions to provide hearing loss screening services as a condition of licensure. It shall also establish an Advisory Committee on Newborn Hearing Screening to facilitate interagency coordination and the cooperation of private sector and professional associations in policy development, technology development, enforcement monitoring, data banking and training."
