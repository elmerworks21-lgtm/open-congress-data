congress_website_title = "AN ACT REQUIRING THE ENERGY REGULATORY COMMISSION TO CONDUCT A TRANSPARENT BIDDING PROCESS FOR POWER SUPPLY, AMENDING FOR THE PURPOSE SECTION 45, B OF REPUBLIC ACT NO. 9136, OTHERWISE KNOWN AS THE \\\"ELECTRIC POWER INDUSTRY REFORM ACT OF 2001\\\""
congress_website_abstract = "Seeks to amend the provision in the Electric Power Industry Reform Act (EPIRA), allowing the distribution utilities (DUs) to enter into bilateral power supply agreements and which the role of the Energy Regulatory Commission (ERC) is only to evaluate Power Supply Agreements (PSAs) and, mandates the ERC to conduct the transparent and competitive selection process in power contracts between distribution utilities and generation companies."
