congress_website_title = "AN ACT CURTAILING THE ILLEGAL ACTIVITIES OF RACKETEERS AND POWERFUL SYNDICATES IN THE PHILIPPINES"
congress_website_abstract = "Declares it unlawful for any person to a.) knowingly participate with or in an enterprise conducting a pattern of racketeering activity; b.) received any money derived from a pattern of a racketeering activity, or act as a dummy of any person in order to conceal money or property; c.) use or invest any part of the money or property received from a pattern of racketeering activity in any interest in or control of any business enterprise; d.) acquire or maintain through a pattern of racketeering activity any interest in or control of any business or enterprise; and e.) conspire in the conduct of any unlawful acts provided in this Act. Provides that all rights, titles and interest in property acquired, maintained or derived through racketeering activity shall be vested in the Philippines government upon the commission of the act."
