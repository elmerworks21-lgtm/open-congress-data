congress_website_title = "AN ACT PROMOTING CORPORATE FARMING AND PROVIDING INCENTIVES THEREFOR"
congress_website_abstract = "Establishes a national corporate farming program where corporations or partnerships, through direct ownership or lease of farmland, may engage in the agricultural production of rice and corn. Provides an incentive package which exempts the corporations or partnerships participating in the corporate farming program from paying certain taxes. Loans extended by banks to said participating corporations or partnerships shall be treated as compliance with RA10000 or “The Agri-Agra Reform Credit Act of 2009.”"
