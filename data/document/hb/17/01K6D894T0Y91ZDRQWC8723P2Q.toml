congress_website_title = "AN ACT REQUIRING GOVERNMENT AGENCIES TO IMPLEMENT HEALTH IMPACT ASSESSMENTS AND TAKE OTHER ACTIONS TO IMPROVE THE HEALTH AND ENVIRONMENT QUALITY OF COMMUNITIES"
congress_website_abstract = "Proposes to ensure that policies, programs, or projects of the government is consistent with improving environmental health or reducing its negative impact to the community´s health and to the environment. Aims to implement a “Health in All Policies” approach and improve accountability of policymakers for health impacts and providing emphasis on the consequences of public policies on health systems, determinants of health, and well-being. Defines “Health Impact Assessment” as a systematic process that uses an array of data sources and analytic methods and considers inputs from stakeholders to determine the actual or potential effects of a proposed policy, program or project on the health of a population and the distribution of those effects within the population"
