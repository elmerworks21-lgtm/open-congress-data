congress_website_title = "AN ACT ESTABLISHING THE COASTAL ENVIRONMENT PROGRAM, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to adopt a comprehensive program to protect our coastal environment and to progress in the nation's goal of sustainable development. Provides for the organization of Coastal Environment Program into the following components: a) Coastal habitats and biodiversity - floral and fauna populations; implementation of the National Integrated Protected Areas System Act of 1992; mangroves, seagrass and coral reefs; b) Endangered species - marine turtles, crocodiles, sea snakes, shore birds, whales, sea cows, porpoises; c) Coastal industries and pollution - regulation, impact, and mitigation; d) Resource inventory assessment - stocks of ecologically and economically important coastal pieces; e) Research and special projects - methodologies to understand coastal environments and their associated resource systems."
