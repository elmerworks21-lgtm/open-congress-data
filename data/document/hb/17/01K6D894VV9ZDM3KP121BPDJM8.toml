congress_website_title = "AN ACT ENHANCING PROTECTION FOR OVERSEAS FILIPINO WORKERS IN THE CUSTODY OF GOVERNMENT OFFICERS/EMPLOYEES, AMENDING FOR THIS PURPOSE REPUBLIC ACT 8042"
congress_website_abstract = "Amends Sec. 8 of R.A. 8042 to include Sec. 8-A, stating that officials or employees of the DOLE, OWWA, or the DFA, or other government agencies that are stationed abroad and proven to be committing the abuses against migrant workers in their custody shall be criminally prosecuted in the Philippines. Identifies the acts to be penalized such as child abuse, exploitation and discrimination; violence against women and their children; trafficking of persons; sexual harassment/rape and violation of the Magna Carta for Women Act."
