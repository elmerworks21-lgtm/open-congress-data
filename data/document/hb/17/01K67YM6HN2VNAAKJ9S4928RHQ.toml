congress_website_author_codes = ["I073","H035","G095","I051","G084","G002","G064","D007","I042","H003","H070","H092","I097","I054","C045"]
congress_website_coauthors_raw = ["SALO, RON P.","ALONTE-NAGUIAT, LEN B.","GARCIA, JOSE ENRIQUE III S.","CATAMCO, NANCY A.","VILLARICA, LINABELLE RUTH R.","SY-ALVARADO, JOSE ANTONIO R.","NIETO, YUL SERVO","CUEVA, LEO RAFAEL M.","TAMBUNTING, GUSTAVO S."]
congress_website_committee_codes = ["0504","E509","0532"]
congress_website_primary_keys = [5162]
congress_website_title = "AN ACT PREVENTING THE USE OF MOTORCYCLES IN THE COMMISSION OF CRIMES THROUGH BIGGER NUMBER PLATES AND IDENTIFICATION MARKS"
congress_website_abstract = "Mandates the LTO to maintain a registry of motorcycles in a database to facilitate information retrieval to be used in official investigation and law enforcement purposes and to issue bigger number plates for motorcycles with alphanumeric characters which can be readable from at least twelve (12) meters distance which should be displayed at the back of the motorcycle for the purpose of ensuring the security and safety of citizenry from crimes committed with the use of motorcycles. Penalizes motorcycle rider and passenger or passengers who used a motorcycle in the commission of a crime, whether grave or less grave felony under the Revised Penal Code, or as a means to escape from the scene of such crime, whether attempted, frustrated, or consummated."
