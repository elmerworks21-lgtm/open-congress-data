long_title = "AN ACT REQUIRING THE MANDATORY COMPLIANCE BY ALL MOTORCYCLE RIDERS AND OPERATORS TO AUTOMATICALLY TURN ON AND RIDE WITH THEIR HEADLIGHTS ON AT ALL HOURS OF THE DAY AND NIGHT ON ALL ROADS"
scope = "National"
subjects = [ "Motorcycle",]
