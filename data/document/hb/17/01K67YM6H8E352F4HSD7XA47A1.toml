congress_website_coauthors_raw = ["SALO, RON P.","ALONTE-NAGUIAT, LEN B.","GARCIA, JOSE ENRIQUE III S.","NIETO, YUL SERVO"]
congress_website_committee_codes = ["E509","0532"]
congress_website_primary_keys = [34200]
congress_website_title = "AN ACT REQUIRING THE MANDATORY COMPLIANCE BY ALL MOTORCYCLE RIDERS AND OPERATORS TO AUTOMATICALLY TURN ON AND RIDE WITH THEIR HEADLIGHTS ON AT ALL HOURS OF THE DAY AND NIGHT ON ALL ROADS"
congress_website_abstract = "Requires all motorcycle manufactures, assemblers and distributors to ensure that all motorcycles are equipped with an automatic headlights on system, mechanism or device before its sale or distribution; Prohibits the registration and succeeding renewal of registration of motorcycles without the required automatic headlights system; Provides penalties and fines for the violation of this Act; Mandates the LTO, in coordination with the Philippine Information Agency, the DepEd and other private agencies and organizations concerned to conduct nationwide information education and communication campaign that shall stress and promote the public safety awareness in observance of and compliance with this Act."
