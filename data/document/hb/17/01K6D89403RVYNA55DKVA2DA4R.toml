congress_website_title = "AN ACT EXEMPTING PHILIPPINE SEA SALT FROM MANDATORY IODIZATION, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8172, OTHERWISE KNOWN AS AN ACT FOR SALT IODIZATION NATIONWIDE (ASIN), AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to exempt natural sea salt from mandatory iodization since the law has effectively discouraged its sale, thereby inhibiting the development of local sea salt farming; Aims to promote salt iodization as an effective strategy for the prevention and control of iodine deficiency disorders and to ensure that small-scale and subsistence producers are not adversely affected."
