congress_website_title = "AN ACT CHANGING THE TERM OF OFFICE OF ELECTIVE BARANGAY OFFICIALS AND MEMBERS OF THE SANGGUNIANG KABATAAN FROM THREE (3) YEARS TO FIVE (5) YEARS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9164 AS AMENDED BY REPUBLIC ACT NOS. 9340, 10632, 10656, 10923, 10952 AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to change the term of office of all barangay and sangguniang kabataan officials from three (3) years to five (5) years. Prevents barangay elective officials to serve more than two (2) consecutive terms in the same position provided, that the term of office shall be reckoned from the 1994 barangay elections. Voluntary renunciation of office for any length of time shall not be considered as an interruption in the continuity of service for the full term for which the elective official was elected."
