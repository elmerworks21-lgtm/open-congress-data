congress_website_title = "AN ACT PRESERVING THE INDIGENOUS GAMES OF THE PHILIPPINES"
congress_website_abstract = "Mandates the National Commission for Culture and the Arts (NCAA) to initiate measures to preserve indigenous games in the country and conduct research on the various sports traditionally played by different indigenous groups to ensure the preservation and development of these games. Requires the Philippine Sports Commission (PSC), in coordination with the Philippine Olympic Committee (POC), and the LGUs to conduct annual regional and national indigenous sports competitions."
