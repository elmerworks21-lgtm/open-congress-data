congress_website_title = "AN ACT CREATING THE DEPARTMENT OF OVERSEAS FILIPINO WORKERS, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to establish the Department of Overseas Filipino Workers to be the single government agency that would provide a unified and coordinated service OFWs from deployment and repatriation. DOFW shall prepare, integrate, coordinate, supervise, and control all plans, programs, projects, and activities of the Government relative to overseas employment. Provides for a Special Assistance Fund for OFWs in distress in the amount of One Billion Pesos."
