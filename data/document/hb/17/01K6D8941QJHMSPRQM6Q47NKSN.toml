congress_website_title = "AN ACT PROVIDING FOR RURAL EMPLOYMENT ASSISTANCE PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Defines the terms “rural area” and “poor” as used in this act; Designates the DSWD to establish and implement the Rural Employment Assistance Program (REAP) , in coordination with the LGUs to provide temporary work to every qualified head of family or an unmarried, single adult member of qualified poor families in rural areas who volunteers to do unskilled manual job for a minimum of 45-90 days in every calendar year."
