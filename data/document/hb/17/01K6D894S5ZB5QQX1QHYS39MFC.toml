congress_website_title = "AN ACT PROVIDING THAT THE SEASONABLE FILING OF A MOTION FOR RECONSIDERATION AND/OR APPEAL SHALL STAY THE EXECUTION OF THE CHALLENGED ORDER OF DECISION"
congress_website_abstract = "Intends to unequivocally provide that a seasonable motion for reconsideration, appeal or petition for review shall stay the execution of the challenged order or decision until the rendition of a final judgment affirming the said controverted order or decision. States that Sec.7 of Rule III of the Rules of Procedure of the Office of the Ombudsman, Sec.65 of Rule 12 of the Revised Rules on Administrative Cases in the Civil Service and similar rules, issuances and statutes are hereby modified or abrogated in so far as they provide that a challenged order of decision is executory pending a motion for reconsideration or appeal."
