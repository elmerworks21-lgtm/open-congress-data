congress_website_title = "AN ACT REQUIRING USED CAR DEALERS TO PROVIDE CONSUMERS WITH A WRITTEN WARRANTY AGAINST DEFECTS AND REQUIRING PRIVATE SELLERS TO DISCLOSE ANY KNOWN USE OR SAFETY DEFECTS"
congress_website_abstract = "Provides that no used car shall be sold by a dealer to a buyer unless given a warranty covering the full cost of parts and labor to repair the defect. It also provides the coverage of the warranty which will depend on the mileage of the vehicle at the time of its purchase or the if the true mileage is unknown, the warranty period shall be calculated according to the age of the vehicle."
