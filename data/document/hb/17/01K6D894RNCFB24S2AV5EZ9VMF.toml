congress_website_title = "AN ACT REGULATING ELECTRONIC CIGARETTES"
congress_website_abstract = "Intends to require producers of E-cigarette products to follow the product standard requirements in order to register them with the Department of Trade and Industry (DTI) to ensure conformity to quality and safety standards; Proposes to prohibit the sale and distribution of said products to persons below EIGHTEEN (18) years old and provides that only nicotine containers shall bear textual health warnings “This product may damage your health and is addictive”."
