congress_website_title = "AN ACT REGULATING THE PLANNING, DESIGN, CONSTRUCTION, OCCUPANCY, AND MAINTENANCE OF PUBLIC AND PRIVATE BUILDINGS, ENACTING A NEW BUILDING ACT, THEREBY REPEALING PRESIDENTIAL DECREE NO. 1096, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to update building regulations and standards in order to better safeguard life, health, property, and public welfare through resilient, and sustainable or green, houses, buildings, and other structures. Aims to streamline building permit processes, distinguishing simple buildings from special buildings with commensurate requirements; and to coordinate and harmonize the regulations, standards, and practices of various agencies implementing different laws and various sectors involve therein. Proposes to capacitate implementing offices, empower the general public to take care of both new and old buildings, thus equitably share the responsibilities between those enforcing and those complying with the building law."
