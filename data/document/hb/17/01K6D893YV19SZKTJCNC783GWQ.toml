congress_website_title = "AN ACT AMENDING SECTIONS 6, 22, 24, 25, 31, 33, 34, 79, 84, 86, 99, 106, 107, 108, 109, 113, 116, 148, 149, 155, 232, 237 AND 288; CREATING NEW SECTIONS 148-A, 237-A, 264-A AND 264-B; AND REPEALING SECTIONS 35 AND 62 ALL UNDER REPUBLIC ACT NO. 8424 OTHERWISE KNOWN AS \\\"THE NATIONAL INTERNAL REVENUE CODE OF 1997\\\""
congress_website_abstract = "Seeks to lower personal income taxes, broadening the VAT base, adjusting excise taxes on petroleum and automobiles, and reducing the estate and donor's tax. Provides for the following tax administration measures: a) mandatory use of fuel marking; b) mandatory issuance of e-receipts c) mandatory interconnection of large and medium firms point of sale machines and accounting system with BIR; d) mandatory use of GPS locks when transporting cargo from ports to economic zones and free ports; and e) relaxation of bank secrecy for fraud cases."
