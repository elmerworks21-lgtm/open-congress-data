congress_website_title = "AN ACT ESTABLISHING THE MUNICIPAL AGRICULTURE INFORMATION SYSTEM"
congress_website_abstract = "Aims to provide for the computerization and integration into a unified Agricultural Commodity Supply Inventory/Registry System of all information in the agricultural supply-demand chain; Provides that this centralized database under the Department of Agriculture shall interconnect farmers and organized communities all over the country with an easy-to-access data on real-time market demand, both local and global, for agricultural commodities, thus creating a wider range of market linkages to both farmers and agricultural buyers."
