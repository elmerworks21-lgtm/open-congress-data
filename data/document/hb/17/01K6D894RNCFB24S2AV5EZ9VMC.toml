congress_website_title = "AN ACT ESTABLISHING A COMPETITIVE GRANT PROGRAM TO RETAIN HIGHLY QUALIFIED TEACHERS IN RURAL COMMUNITIES"
congress_website_abstract = "Explains the term “child with disability” as a minor who has a physical, mental or medical impairment resulting from an anatomical, physiological, or neurological condition that prevents the exercise of a normal bodily function or that substantially impair cognitive function, and include but is not limited to impairments requiring the use of an artificial device; Seeks to counter massive migration of top Filipino teachers who leave the country by providing financial incentive to these highly qualified teachers or highly qualified special education teachers in rural areas; Provides therefore a five-year pilot program; and tasks the DepEd to award grants to not more than ten (10) provinces to enable them to extend salary bonuses to above-mentioned teachers who will teach, or will commit to teach, for at least three (3) academic years in select rural academic institutions."
