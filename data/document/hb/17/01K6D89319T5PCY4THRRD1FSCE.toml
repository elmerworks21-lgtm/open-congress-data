congress_website_abstract = "Addresses the dire state of the country´s Science and Technology (S&T) situation by creating the ASSET (Advancing and Sustaining Science, Engineering and Technology) Scholarship Center to sustain and institutionalize these initiatives in the Engineering Research and Development (ERDT) and National Science Complex (NSC), as well as to ensure continuous progress in science and technology, and thereby establishing the ASSET Fund."
