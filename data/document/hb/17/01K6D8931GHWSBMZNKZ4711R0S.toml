congress_website_title = "AN ACT STRENGTHENING COMPLIANCE WITH OCCUPATIONAL SAFETY AND HEALTH STANDARDS AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Seeks to criminalize non-compliance with occupational safety and health (OSH) standards as they have done in countries like Singapore and the United States of America, where significant compliance to the OSH regulations corresponds to less accidents and injuries to workers; makes any employer directly responsible for an employee´s injury or death due to the violation of these standards, which responsibility is extended to payment of required penalties to the State Insurance Fund."
