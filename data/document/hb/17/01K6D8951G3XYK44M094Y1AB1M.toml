congress_website_title = "AN ACT REQUIRING THE CREATION OF A SYSTEM OR APPLICATION THAT WOULD DETERMINE POTENTIAL CREDIT LIMIT BREACH AND GIVE THE CREDIT CARD HOLDER REAL-TIME FINANCIAL NOTIFICATION"
congress_website_abstract = "Seeks to respond to the findings of an annual study being conducted by Visa's Consumer Payment Attitudes Survey across six markets in Southeast Asia that \\\"Filipinos were most interested in contactless payments, and used them typically to pay for groceries, bills and fines, and food and beverages\\\". Intends to protect the rights of consumers and ensure that they do not fall on the traps of careless spending and incurring unnecessary and completely avoidable penalties from credit card companies. Refers \\\"credit card limit breach\\\" to the situation when a credit cardholder's account balance is more than the maximum amount of money the credit card issuer would loan to the former."
