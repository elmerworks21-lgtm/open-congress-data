congress_website_title = "AN ACT INCREASING THE COVERAGE OF STATUTORY RAPE AS DEFINED IN ARTICLE 266-A (1) (d) OF ACT NO. 3815, OTHERWISE KNOWN AS THE REVISED PENAL CODE, AMENDING FOR THE PURPOSE ACT NO. 3815 AS AMENDED BY REPUBLIC ACT 8353, OTHERWISE KNOWN AS THE ANTI-RAPE LAW OF 1997"
congress_website_abstract = "Amends Act No.3815 as amended by R.A.No. 8353 (Anti-Rape Law of 1997) to address the immaturity and helplessness of woman below the age of 18 as regards to sexual intimacy and the financial and emotional strain of unwanted teenage pregnancy which oftentimes lead to abortion. Proposes to increase the age of consent in relation to statutory rape from TWELVE (12) years old, to EIGHTEEN (18) years old."
