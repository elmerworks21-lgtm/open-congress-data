congress_website_title = "AN ACT TO ENHANCE CITIZENS' ACCESS TO GOVERNMENT INFORMATION AND SERVICES BY ESTABLISHING A SYSTEM IN WHICH GOVERNMENT DOCUMENTS ISSUED TO THE PUBLIC MUST BE WRITTEN IN PLAIN LANGUAGE AND TRANSLATED TO THE LOCAL LANGUAGE OR DIALECTS IF NECESSARY, AND FOR OTHER PURPOSES"
