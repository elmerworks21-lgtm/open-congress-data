congress_website_title = "AN ACT PROVIDING FOR THE PERIOD OF PROBATIONARY EMPLOYMENT OF TEACHING AND NON-TEACHING PERSONNEL IN PRIVATE SCHOOLS, THEREBY AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE 442, AS AMENDED"
congress_website_abstract = "Seeks to correct the decades-long injustice besetting the private schools which grants probationary period of three (3) years in basic education and six (6) consecutive regular semesters or nine (9) consecutive trimesters in the tertiary level. Proposes to include teaching and non-teaching employees in private schools, colleges, universities, and other educational institutions in the provision on probationary employment (Art.281, P.D.No.442) which sets a six-month probationary period from the date the employees starts his contract."
