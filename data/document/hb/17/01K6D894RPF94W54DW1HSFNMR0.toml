congress_website_title = "AN ACT RECOGNIZING NATIONAL SCENIC BYWAYS IN THE PHILIPPINES, CREATING A NATIONAL SCENIC BYWAYS PROGRAM, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines among others, “Byway” as a minor or secondary road or a road other than the main road; and “National Scenic Byway” as a road that is recognized for its outstanding scenic, historic, natural, recreational, and archaeological qualities. Intends to preserve and protect such roads in the country alongside the promotion of tourism and economic development through infrastructural improvement such as centers, overlooks, and rest areas. Provides for “Corridor Management Plan” developed by the community/communities along a scenic byway which outlines the mechanisms for the protection and enhancement of the byways´ intrinsic qualities and character that define the byway corridor."
