congress_website_title = "AN ACT PROHIBITING THE HIRING OF TEACHERS IN THE PUBLIC SECTOR THROUGH CONTRACTS OF SERVICE OR JOB ORDERS"
congress_website_abstract = "Mandates that no teacher shall be hired to carry out the duties and functions of regular teaching staff, either on a full-time or part-time basis, through contracts of service or job orders, provided that post-secondary education institutions requiring teachers with highly specialized or technical expertise, which cannot be provided by their regular teaching staff, are exempt from the prohibition on contracts of service."
