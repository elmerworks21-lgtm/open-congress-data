congress_website_title = "AN ACT DEFINING GENDER-BASED STREET, PUBLIC SPACES AND ONLINE SEXUAL HARASSMENT, PROVIDING PROTECTIVE MEASURES AND PRESCRIBING PENALTIES THEREFOR"
congress_website_abstract = "Prescribes for the acts that constitute gender-based street and public spaces harassment such as catcalling, wolf-whistling, unwanted invitations, misogynistic and sexist slurs, persistent uninvited comments or gestures on a person´s appearance, relentless requests for personal details, statement of sexual comments and suggestions, public masturbation or flashing of private parts, groping, or any advances, whether verbal or physical, that is unwanted and has threatened one´s sense of personal space and physical safety. Describes online sexual harassment as acts that use information and communications technology in terrorizing and intimidating victims through physical, psychological, and emotional threats, unwanted sexual and sexist remarks and comments online , invasion of victim´s privacy through cyber stalking and messaging, uploading and sharing of photos, voice, video without the consent of the victim and impersonating identities of victims online or posting lies that may harm the victim´s reputation, or filing false abuse reports to online platforms to silence victims. Prescribes penalties and equivalent fines for the violations of such unlawful acts. A victim of gender-based street, public spaces or online sexual harassment may avail of appropriate remedies as provided for under the law as well as psychological counselling services which fees shall be borne by the harasser. Mandates the Metro Manila Development Authority (MMDA) for Metro Manila, the local units of the PNP for other provinces, and the Women and Children´s Protection Desk (WCPD) of the PNP to apprehend harassers and enforce the law provided that they have undergone prior Gender Sensitivity Training (GST). The PCW, Department of the Interior and Local Government (DILG) and Department of Information and Communications Technology (DICT) shall be the national bodies responsible for the formulation of policies and overseeing the implementation of this Act."
