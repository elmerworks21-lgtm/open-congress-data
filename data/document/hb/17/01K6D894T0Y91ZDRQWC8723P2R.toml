congress_website_title = "AN ACT INSTITUTIONALIZING THE NATIONAL ECONOMIC AND DEVELOPMENT AUTHORITY AS THE INDEPENDENT ECONOMIC AND PLANNING AGENCY OF THE PHILIPPINE GOVERNMENT, DEFINING ITS FUNCTIONS AND AMENDING EXECUTIVE ORDER NO. 230 SERIES OF 1987, AS AMENDED, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Envisions to instill a culture of planning in the formulation and implementation of the country´s economic and development policies and emphasizes the importance of participatory planning by expanding stakeholder participation through various stages. It seeks to institutionalize a new and truly independent department, that will implement long-term, continuing, integrated, and coordinated programs and policies for national development; and that will also enhance decentralization and strengthen the autonomy of units within the various regions of the country to accelerate the economic and social growth and development. Enumerates the powers and functions of the NEDA, the composition and powers of its Board and the creation of inter-agency committees as follows: Development Budget Coordination Committee (DBCC); Investment Coordination Committee (ICC); Infrastructure Committee (INFRACOM); Social Development Committee (SDC); Tariff and Related Matters Committee (TRMC), Regional Development Committee (RDCOM); National Land Use Committee (NLUC); Economic Development Committee (EDC); Science, Technology and Innovation Committee (STIC); Environment and Sustainable Development Committee (ESDC); and the Governance Committee (GC)."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_17/HB08124.pdf"]
