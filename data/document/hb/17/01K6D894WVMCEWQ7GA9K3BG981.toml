congress_website_title = "AN ACT INSTITUTIONALIZING THE GRANT OF STUDENT FARE DISCOUNT PRIVILEGES ON PUBLIC TRANSPORTATION AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to institutionalize the twenty percent (20%) discount granted to students in various public land tranportation which includes, but not limited to, PUBs, PUJs, taxis, tricycles, Transport Network Vehicle Services (TNVS), Trasport Network Companies (TNCs), shuttle services, and public and private railways such as the LRT, MRT, AND PNR. Provides that in the case of air transportation utilities, the discount shall only apply to the base fare or the price of the ticket before taxes and costs for ancillary services. Proposes further that Filipino students who will travel abroad for education, training, and competition shall be exempts from the payment of travel tax."
