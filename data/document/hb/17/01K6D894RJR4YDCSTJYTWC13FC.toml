congress_website_title = "AN ACT PROVIDING FOR VIDEO GAME CONTENT RATING AND CLASSIFICATION SYSTEM,AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates the Gaming and Amusement Board (GAB) to rate and classify videogames into the following categories: “E” or For Everyone, “E10+” or “Everyone 10 years old or older”, “T” or “Teen”, “M” or “Mature”, “AO” or “Adults Only”, “X” or Not Fit for Distribution”. Declares it unlawful for any person to sell, lease, or distribute any video game or publicity material, including trailer, and stills in connection with such video games, without being rated and classified by the GAB."
