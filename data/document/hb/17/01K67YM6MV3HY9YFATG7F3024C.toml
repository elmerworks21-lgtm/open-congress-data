congress_website_title = "AN ACT REQUIRING PARENTS TO PLANT TWO (2) TREES FOR EVERY CHILD BORN TO THEM"
congress_website_abstract = "Mandates all parents, whether legally married or not, to plant two (2) trees for every child born to them which shall be a requirement for the release of the child´s Certificate of Live Birth. States that planted species should be appropriate to the location, climate and topography of the area where they reside with preference for indigenous species and high value crops."
