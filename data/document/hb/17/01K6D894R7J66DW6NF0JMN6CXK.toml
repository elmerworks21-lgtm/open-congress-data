congress_website_title = "AN ACT TO PROVIDE YOUTH SUICIDE INTERVENTION AND PREVENTION"
congress_website_abstract = "Mandates the Department of Education (DepEd), in coordination with the Department of Health (DOH), to formulate and include a course of Life Planning in the elementary and secondary education curriculum which shall require lectures and discussion on self and identity; personal, family, community values; communication and interrelationship with others; sexuality and gender roles; community participation; health; psychological thinking and employment, among others. It requires all schools to implement a Peer Counselling Program that includes the Peer Counselling Training Course and the Mentor-Mentee Program. This bill also mandates DOH to employ at least one (1) psychologist in every school that shall be required to visit the school at least once (1) a month to hold School Counselling Alignment Sessions."
