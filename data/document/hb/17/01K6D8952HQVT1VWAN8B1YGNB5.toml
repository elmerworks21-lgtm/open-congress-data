congress_website_title = "AN ACT ESTABLISHING THE NATIONAL ROADS AND RAILWAYS SAFETY BOARD, PROVIDING FOR ITS POWERS AND COMPOSITION, APPROPRIATIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes that road and rail safety regulation of all land vehicles, including public utility vehicles, should be with a National Land Transportation Safety Board, not with the LTFRB or LTO. Seeks to authorize the RRSB to set standards on road-worthiness of land vehicles, cancel or suspend driver's licenses, investigate road accidents and resolve administrative cases arising from road mishaps."
