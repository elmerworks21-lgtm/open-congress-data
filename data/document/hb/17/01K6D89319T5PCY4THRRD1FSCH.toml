congress_website_title = "AN ACT BANNING THE REAPPOINTMENT OF A REGULAR MEMBER OF THE JUDICIAL AND BAR COUNCIL WHO HAS ALREADY SERVED THE FULL TERM"
congress_website_abstract = "Seeks to ban reappointments to the Judicial and Bar Council (JBC) in order to avoid the possibility of instances where its members, in their desire to be reappointed to the Council, succumb to pressures from the executive to nominate individuals based on political considerations instead of their actual merits and qualifications, seriously undermining the quality of judicial appointments and the independence of the judiciary as a whole."
