congress_website_title = "AN ACT PROTECTING EMPLOYEES IN CASES OF MERGER OR CONSOLIDATION, SALE OR TRANSFER OF ALL OR SUBSTANTIALLY ALL ASSETS OR BUSINESSES OF THEIR EMPLOYERS AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates that merger, consolidation or transfer of business shall not diminish the wages, benefits and other employment terms and conditions of the affected employees; Seeks to oblige the acquiring or transferee employers to continue the employment of the transferor employer's employees during such instances. Aims to limit the ground for termination of employment in case of such business overhauls only to redundancy."
