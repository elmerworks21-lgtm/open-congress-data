congress_website_title = "AN ACT ENHANCING REVENUE ADMINISTRATION AND COLLECTION BY GRANTING AMNESTY ON ALL UNPAID IMPOSITIONS LEVIED BY GOVERNMENT FOR TAXABLE YEAR 2017 AND PRIOR YEARS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to respond to the recent partial veto of the Tax Amnesty Program that was approved in December 2018 and recognizes a general tax amnesty for all unpaid internal revenue taxes in order to improve the State's economic standing by expanding its taxpayer base, and decloging the dockets of the BIR and the courts of tax cases. Provides that the grant of the general tax amnesty shall cover all taxes such as, but not limited to income tax, withholding tax, capital gains tax, donor's tax, value-added tax, percentage taxes, excise tax, and documentary stamp tax collected by the BIR, including value-added tax and excise taxes collected by the BOC for taxable year 2017 and prior years. Proposes to incorporate provisions for the lifting of bank secrecy and authorizing an automatic exchange of Information for certain cases involving tax administration."
