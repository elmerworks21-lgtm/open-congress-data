congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE NUCLEAR REGULATION, CREATING FOR THE PURPOSE, THE PHILIPPINE NUCLEAR REGULATORY COMMISSION, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to encompass the relocation of all regulatory activities performed by the Philippine Nuclear Regulatory Institute (PNRI) under Department of Science and Technology (DOST) and those in the Bureau of Health Devices and Technology (BHDT) under Department of Health (DOH), which are specific to ionizing radiation regulation, to position within the governmental organizational structure, such as the Office of the President, that guarantees that controlling functions of a regulatory body are separate from the promoting functions."
