congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA OF STUDENTS"
congress_website_abstract = "Aims to elevate and clarify the rights of students as against authorities, as well as facilitate the learning and dissemination of these rights by collating them in a single statute. Proposes several provisions on freedom of access to education; right to organize and freedom of association; freedom of expression; academic rights; the right to adequate academic facilities; right to student employment; right to consultation, information and participation in policy making; creation of Student Ethics Committee; due process in disciplinary proceedings; and right to protection and privacy of official educational records."
