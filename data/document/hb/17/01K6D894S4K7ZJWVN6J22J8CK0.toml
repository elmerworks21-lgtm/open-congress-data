congress_website_title = "AN ACT REQUIRING THE ESTABLISHMENT OF COMPUTER LABORATORY IN ALL PUBLIC ELEMENTARY AND SECONDARY SCHOOLS AND FOR OTHER PURPOSES"
congress_website_abstract = "Recognizes the value of computer technology and access to the Internet in enhancing and facilitating learning and education of students in basic education. Provides that every public elementary and high school shall have at least one room that shall be used as a computer laboratory and mandates DepEd to include in the curriculum of said schools, computer and internet literacy."
