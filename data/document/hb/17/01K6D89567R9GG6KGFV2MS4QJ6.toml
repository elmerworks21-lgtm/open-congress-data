congress_website_title = "AN ACT REGULATING THE SALE OF MOTOR VEHICLES IN METRO MANILA BY REQUIRING A PROOF-OF-PARKING SPACE OR GARAGE FACILITY FROM MOTOR VEHICLE BUYERS AS A PREREQUISITE FOR THE PURCHASE OF A MOTOR VEHICLE AND REGISTRATION WITH THE LAND TRANSPORTATION OFFICE"
congress_website_abstract = "Proposes to institute a No Parking or Garage, No Car policy aims to lessen traffic congestion, curb the number of private vehicles, provide safe and uncluttered pathways where people may freely walk through space for ongoing human and vehicular traffic. Provides that any person with residence or business address in Metro Manila who intends to purchase a motor vehicle, shall be required to execute an affidavit, attesting to the availability of a permanent parking space or facility or such has been leased or procured specifically for the purpose."
