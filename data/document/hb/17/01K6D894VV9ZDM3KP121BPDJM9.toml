congress_website_title = "AN ACT CREATING THE NATIONAL LOCAL ROADS DEVELOPMENT BUREAU (NLRDB), PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to centralize the efforts and resources required in the development of our local roads by effectively placing in one body, the responsibility of examining, identifying problem areas, and designing a cohesive master plan that equitably and fairly distributes resources among regions, provinces, cities, municipalities, and barangays. Proposes therefore to create the National Local Roads Development Bureau (NLRDB) under the DPWH to reduce the adverse effects of local political patronage on the country´s road infrastructure, and streamline its overall development."
