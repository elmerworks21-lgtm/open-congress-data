congress_website_title = "AN ACT TO STRENGTHEN THE JURISDICTION AND POWER OF THE DEPARTMENT OF ENERGY OVER PETROLEUM PIPELINE OPERATIONS AND FOR THIS PURPOSE PROVIDE A PETROLEUM PIPELINE CODE TO PRESCRIBE STANDARDS FOR THE DESIGN, CONSTRUCTION, OPERATION AND MAINTENANCE AND ABANDONMENT OF LIQUID PETROLEUM PIPELINES AND APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to review, expand, improve, and promote regulations on our pipeline systems to ensure their safety and reliability and to provide the DOE the jurisdiction that will regulate, monitor, and oversee the operations of petroleum pipelines in the country. Provides for the application for Concession under this Act to be filed with the Oil Industry Management Bureau (OIMB) of the DOE which shall examine and pass upon the same as well as upon the qualifications of the applicant. Provides further that ownership, establishment, operation and maintenance of a pipeline shall be granted only to Filipino citizens or to corporations/associations organized under the laws of the Phils. at leas 60% of whose capital is owned by such citizens."
