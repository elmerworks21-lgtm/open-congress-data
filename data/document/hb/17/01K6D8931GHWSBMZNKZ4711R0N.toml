congress_website_title = "AN ACT STRENGTHENING THE SECURITY OF TENURE OF EMPLOYEES, AMENDING FOR THIS PURPOSE ARTICLES 106, 109, 280, AND 281 OF PRESIDENTIAL DECREE NUMBER 442, OR THE LABOR CODE OF THE PHILIPPINES; AND ADDING ARTICLES ARTICLE 108-A ON THE DEFINITION OF CONTRACTING, ARTICLE 108-B ON THE PROHIBITION OF LABOR-ONLY CONTRACTING, ARTICLE 108-C ON THE EXISTENCE OF AN EMPLOYER-EMPLOYEE RELATIONSHIP BETWEEN THE CONTRACTOR AND CONTRACTUAL EMPLOYEE, ARTICLE 108-D ON THE RIGHTS OF CONTRACTUAL EMPLOYEES, ARTICLE 108-E ON THE CONTRACT BETWEEN CONTRACTOR OR SUBCONTRACTOR AND CONTRACTUAL EMPLOYEE, ARTICLE 108-F ON THE EFFECT OF TERMINATION OF CONTRACTUAL EMPOYMENT, ARTICLE 108-G ON LICENSING OF CONTRACTORS AND SUBCONTRACTORS, ARTICLE 108-H ON GOOD FAITH CONTRACTING, ARTICLE 280-A, DEFINING FIXED TERM EMPLOYMENT; AND ARTICLE 280-B, DEFINING PROJECT EMPLOYMENT TO PRESIDENTIAL DECREE NUMBER 442, OR THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Creates a new category of employment, one that returns regular employment to its primary position, while making allowances for distressed industries; makes clear and precise distinctions and corrects legal loopholes, and; ensures that the nation´s legal framework will once again support the right to security of tenure, rather than undermine it."
