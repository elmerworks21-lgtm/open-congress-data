congress_website_title = "AN ACT REGULATING THE IMPOSITION OF NATIONAL TAXES TO BE PROPORTIONAL TO ACTUAL GOVERNMENT SPENDING"
congress_website_abstract = "Defines \\\" Absorptive Capacity Benchmark \\\" which shall refer to the percentage of unused appropriations of the annual national budget divided by the total amount of appropriations available for any given year. Mandates the DOF,in cooperation with the BIR and the BSP, to set a threshold absorptive capacity benchmark, which is reflective of the sufficiency of tax collection measures. Provides for the proportionality of new tax measures with tax collection."
