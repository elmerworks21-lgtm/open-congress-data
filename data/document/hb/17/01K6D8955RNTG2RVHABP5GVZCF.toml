congress_website_title = "AN ACT DECLARING MANILA BAY AS HERITAGE ASSET FREE FROM ANY AND ALL FORMS OF FURTHER RECLAMATION AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Seeks to recognize and declare Manila Bay, in its entirety, not only a national historical landmark, but a heritage site that is protected, fully owned by the government, with management policies based on the preservation of an ecosystem and rights-based, people centered development framework. Intends to counter the \\\"National Reclamation Plan\\\" of the Philippine Reclamation Authority (PRA) to reclaim 1,440 hectares along Manila Bay covering the Cultural Center Complex to Las Pinas-Paranaque coast, and 38,000 hectares all over the country involving 26,234 hectares of water along the coast of Manila Bay."
