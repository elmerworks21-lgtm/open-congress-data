congress_website_title = "AN ACT INCREASING THE YEARLY ALLOCATION FOR SCIENTIFIC AND TECHNOLOGICAL ACTIVITIES (STA) AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to allocate 1% of Gross Domestic Product (GDP) as annual budget for science and technology activities (STA) for generation, advancement, dissemination, and application of scientific knowledge in all fields of Science and Technology; Creates a special fund for research and development to be known as “R&D” from the following sources: a. allocation of 1 percent (1%) of GDP for S&T activities; b. all unused R&D allocation; and c. all income derived from R&D activities"
