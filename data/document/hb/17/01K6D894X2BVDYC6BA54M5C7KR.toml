congress_website_title = "AN ACT TO INCLUDE ETHNIC ORIGIN IN THE NATIONAL SURVEY CONDUCTED BY THE PHILIPPINE STATISTICS AUTHORITY"
congress_website_abstract = "Intends to recognize and promote the rights of indigenous peoples (IPs) or indigenous cultural communities (ICCs) within the framework of national unity and development. Provides that the PSA, in coordination with the National Commission on Indigenous Peoples (NCIP) shall ensure the employment of enumerators, or the deployment of NCIP employees, who are knowledgeable of the different IPs and ICCs, and the language and appropriate manner of asking culturally-sensitive questions in gathering data on Ethnic Origin during the conduct of the national survey and national census. Provides further that the PSA shall ensure that all surveys and documents issued by their office should be culturally sensitive."
