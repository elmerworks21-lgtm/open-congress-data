congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA OF WORKERS IN INFORMAL ECONOMY INSTITUTIONALIZING MECHANISMS FOR IMPLEMENTATION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides a comprehensive, rights-based, participatory, sustainable and gender responsive frameworks in the informal economy. Defines certain terms as used in this Act such as: a) Informal Economy - refers to “all economic activities by workers and economic units that are - in law or in practice not covered or insufficiency covered by formal arrangements.” b) Informal Sector - refers to units engaged in the production of goods and services with the primary objective of generating employment and incomes to the persons concerned. It consists of households and unincorporated enterprises that are market and nonmarket producers of goods, as well as market producers of services; among others. Provides the coverage, qualifications and accreditation, as well as, the right and benefits of Workers in the Informal Economy (WIE). Creates the Informal Economy Development Council (IEDC) which shall be an agency within the Department of Labor and Employment (DOLE) that shall institute appropriate reforms within its structure, programming and other processes, including adjusting its human resource capabilities to ensure that WIE-focused programs will be efficiently and adequately implemented to address the needs of these workers."
