congress_website_title = "AN ACT SYSTEMIZING SPECTRUM USER FEES IMPOSED AGAINST RADIO FREQUENCY BANDS, AMENDING REPUBLIC ACT NO. 7925, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to correct the injustice in the allocation and assignment of national frequency bands by having definite system in the imposition and collection of spectrum user fees by the NTC. Amends Sec.15 Article V of Republic Act No. 7925 (Public Telecommunications Policy Act of the Philippines) by adding the following provisions: THE COMMISSION SHALL INITIATE CALL BACK OR RECALL PROCEEDINGS AGAINST ALL ASSIGNED SPECTRUM THAT REMAINS, UNUSED, UNUTILIZED, AND/OR UNDERUTILIZED AFTER THE EXPIRATION OF THE PROVISIONAL AUTHORITY GRANTED BY THE COMMISSION. FOR PURPOSES OF THIS ACT, ASSIGNMENT, LEASING OR RENTING, AND/OR ANY ANTI-COMPETITIVE ACT, INCLUDING COLLUSION, FOR NON-USE OR UNDERUTILIZATION OF FREQUENCIES SHALL NOT BE CONSIDERED AS USE OR UTILIZATION OF LICENSED FREQUENCIES."
