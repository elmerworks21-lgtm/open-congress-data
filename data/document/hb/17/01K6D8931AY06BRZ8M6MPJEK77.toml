congress_website_title = "AN ACT ESTABLISHING AND PROVIDING FOR FREE COLLEGE EDUCATION IN INFORMATION AND COMMUNICATIONS TECHNOLOGY IN STATE UNIVERSITIES AND COLLEGES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Provides free college education in Information and Communications Technology (ICT), a two-year college degree course, to all high school graduates of public schools, giving them the right to choose the public or state college or university of their choice within the city, province or region, as the case may be, enjoying the free college education benefits."
