congress_website_title = "AN ACT AMENDING REPUBLIC ACT 9711, OTHERWISE KNOWN AS THE \\\"FOOD AND DRUG ADMINISTRATION ACT\\\" AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to supplement the FDA law (RA9711) by having a single unit dedicated to the screening, evaluation and processing of technical documents and other regulatory requirements for the traditional medicine (TM) and herbal supplement (HS) products. Proposes to create the CENTER FOR TRADITIONAL AND ALTERNATIVE MEDICINE exclusively devoted for these group of products under the FDA, which will streamline and expedite registration procedures to facilitate the release of product registration certificates."
