congress_website_title = "AN ACT PENALIZING THE USE OF SIDEWALKS FOR COMMERCIAL AND/OR PERSONAL PURPOSES"
congress_website_abstract = "Aims to clear sidewalks and other public spaces from unauthorized commercial or personal use in order to facilitate the smooth passage of persons as well as to clear all obstructions to traffic and vehicular flow. Specifically enumerates prohibited acts and the corresponding penalties to any person who violates such acts; and holds LGU officials who fail to implement this Act administratively liable and shall be penalized by a fine of P100,000.00 - P500,000.00. Compels LGUS to formulate a development plan that will make possible an organized vending program for all affected and displaced sidewalk vendors."
