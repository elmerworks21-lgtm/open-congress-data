congress_website_title = "AN ACT CREATING AN AGRICULTURAL WORKERS PENSION AND SOCIAL SECURITY BENEFIT SCHEME TO PROVIDE PENSION AND SOCIAL SECURITY BENEFITS TO FARMERS AND FISHERFOLK"
congress_website_abstract = "Seeks to guarantee pension and social security benefits of registered and eligible agricultural workers by subsidizing their SSS premium payments to enable them to enroll and sustain their membership. Provides that the beneficiary shall receive the premium subsidy for a maximum of ten (10) years provided that said beneficiary shall continuously remain as an agricultural worker; and those registered under the Registry System for Basic Sectors in Agriculture (RSBSA) shall not be less than 18 years of age and not more than 59 years of age."
