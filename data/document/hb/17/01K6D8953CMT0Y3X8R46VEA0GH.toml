congress_website_title = "AN ACT PROVIDING FOR THE CONTINUATION OF REPARATION AND RECOGNITION OF VICTIMS OF HUMAN RIGHTS VIOLATIONS DURING THE MARCOS REGIME, CREATING THE HUMAN RIGHTS VIOLATIONS VICTIMS' RECOGNITION AND REPARATION BOARD, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10368, OTHERWISE KNOWN AS THE HUMAN RIGHTS VICTIMS REPARATION AND RECOGNITION ACT OF 2013, AS AMENDED BY REPUBLIC ACT NO. 10766, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address a growing clamor among many martial law human rights violations victims and relatives and human rights groups for a new law that will continue the mandate stated in Republic Act No. 10368. Amends and provides several provisions to the existing law as regards to the receipt of monetary reparation; new source of reparation; creation and composition of the Human Rights Violation Victim's Recognition and Reparation Board; appointment, powers and functions and operating budget of the Board."
