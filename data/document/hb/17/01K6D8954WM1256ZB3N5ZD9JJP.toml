congress_website_title = "AN ACT REGULATING THE MANUFACTURE, IMPORTATION, SALE, AND USE OF PLASTIC DRINKING BOTTLES, PROVIDING PENALTIES AND INCENTIVES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to address the alarming amount of plastic waste being generated and the lack of proper disposal and recycling mechanisms in our country. Seeks to regulate the use of plastic drinking bottles which hold 750 ml and below through prohibition of its manufacture, importation, sale and use, and proposes to grant incentives to business enterprises that comply with proscriptions as stipulated in this Act."
