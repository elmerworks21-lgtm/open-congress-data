congress_website_title = "AN ACT ESTABLISHING FOOD SECURITY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to institute new measures for the NFA to more effectively handle its role of ensuring national food security and stabilizing rice supply and prices, and help reduce poverty, promote social justice, empower the rural sector, improve the productivity and income of agricultural workers and producers, and comply with the Food Safety Act of 2013 (R.A.10611). Intends to specifically espouse several reforms as follows: 1. Setting the policy on National Rice Reserve equivalent to at least SIXTY (60) days national consumption requirement to provide Stocks for: Food Security; Calamities; Marginalized Sector; and Trade/Export (in case of surplus); 2. Classification of NFA as a Government Instrumentality vested with Corporate Powers (GICP); 3. Stabilization function for palay and rice; 4. Retention of NFA´s regulatory function, pursuant to R.A.10611; 5. Condonation of all NFA´s existing obligations and interest payments."
