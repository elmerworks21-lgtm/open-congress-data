congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC SUSPENSION OF THE EXCISE TAX ON FUEL AND REPEALING THE EXCISE TAX IMPOSED ON KEROSENE AND DIESEL UNDER REPUBLIC ACT NO. 10963, OTHERWISE KNOWN AS THE \\\"TAX REFORM FOR ACCELERATION AND INCLUSION (TRAIN), AMENDING FOR THE PURPOSE THE NATIONAL INTERNAL REVENUE CODE (NIRC) OF 1997, AS AMENDED\\\""
congress_website_abstract = "Seeks to repeal the excise taxes imposed under RA No. 10963, otherwise known as the “Tax Reform for Acceleration and Inclusion (TRAIN)” on kerosene and diesel from January 1, 2018 to January 1, 2020 to zero (P0.00). Provides for the automatic suspension of excise taxes on all other petroleum products under TRAIN when the inflation rate for a given quarter exceeds the government´s quarterly inflation target. Upon such suspension, excise taxes on fuel will revert to their pre-TRAIN levels and may only be re-imposed if the inflation rate in any succeeding quarter falls below the corresponding inflation target."
