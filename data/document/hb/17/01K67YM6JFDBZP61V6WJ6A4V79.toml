congress_website_title = "AN ACT REGULATING THE PRACTICE OF SPEECH LANGUAGE PATHOLOGY IN THE PHILIPPINES, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Creates the Professional Regulatory Board of Speech Language Pathology under the supervision of the Professional Regulatory Commission that shall promulgate rules and regulations; administer oaths; supervise and regulate; and develop and maintain standards for the practice of speech language pathology in the country. Requires licensure examination for all applicants for the practice of speech language pathology who must obtain a general weighted average of at least seventy-five percent (75%) with no grade lower than fifty percent (50%) in any given subject of examination. Requires the Speech Language Pathology Board to maintain a roster of speech language pathologists which shall contain the names of the speech language pathologists, their respective certificate of registration numbers, and other data which the Board may deem pertinent."
