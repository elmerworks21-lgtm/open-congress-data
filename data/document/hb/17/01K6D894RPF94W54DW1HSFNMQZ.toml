congress_website_title = "AN ACT REGULATING THE USE OF GOVERNMENT AMBULANCES, PROVIDING PENALTIES THEREFORE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to address the many problems that beset emergency medical response in the country particularly the appropriate utilization of ambulance/s in local government. Provides that such government ambulance/s donated or acquired by an LGU shall be under the joint custody of the local chief executive and the health officer concerned. Identifies the duties of the Local Chief Executives and the prohibited acts as regards the use of said vehicles and provides that they be allowed to be used in non-emergency cases only during medical outreach missions and other related hospital operations."
