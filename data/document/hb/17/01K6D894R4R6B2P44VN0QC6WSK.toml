congress_website_title = "AN ACT RATIONALIZING EXTRADITION PROCEEDINGS AMENDING FOR THIS PURPOSE PRESIDENTIAL DECREE NO. 1069, ALSO KNOWN AS THE \\\"PHILIPPINE EXTRADITION LAW\\\""
congress_website_abstract = "Amends Sec.2, par.(a) of PD 1069 to read as follows: (a) “Extradition” - The TURN-OVER OF THE EXTRADITABLE PERSON/S, PURSUANT TO A TREATY, TO THE DESIGNATED AUTHORITES OF THE REQUESTING STATE, with the object of placing him at the disposal of the requesting state or government to hold hIm in connection with any criminal investigation directed against him or the execution of a penalty imposed on him under the penal or criminal laws of the requesting state or government; Provides for just and appropriate extradition proceedings for both the accused alien and a resident citizen of the Philippines; Guarantees due process in the seizure and turn over of accused properties by determining the relevance thereof to the charges for which the accused is sought to be extradited,"
