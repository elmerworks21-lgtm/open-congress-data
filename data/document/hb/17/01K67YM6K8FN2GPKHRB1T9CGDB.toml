congress_website_title = "AN ACT INSTITUTIONALIZING A NATIONAL INTEGRATED CANCER CONTROL PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to establish a framework for all cancer related activities that shall have, among others, the following objectives: a.) decrease the overall mortality and impact of all adult and childhood cancer; b.) lessen the incidence of preventable cancer in adults and children; c.) prevent cancer recurrence and secondary cancer among survivors and people living with cancer; d.) provide timely access to optimal cancer treatment and care for all cancer patients; e.) make cancer treatment and care more affordable and accessible; f.) improve the experience of cancer treatment and care of patients and families; g.) support the recovery and reintegration to society of cancer survivors; and h.) eliminate various forms of burden on patients, people living with cancer, survivors and their families."
