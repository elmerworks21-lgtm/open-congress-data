congress_website_title = "AN ACT PROVIDING FOR THE PAYMENT OF ARREARS IN THE VETERANS PENSIONS AND BENEFITS MANDATED PURSUANT TO REPUBLIC ACT NO. 7696, AS AMENDED, OTHERWISE KNOWN AS AN ACT STANDARDIZING AND UPGRADING THE BENEFITS FOR MILITARY VETERANS AND THEIR DEPENDENTS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to address the accumulated arrears/outstanding obligations in the payment of pension and other benefits in favor of veterans, military retirees and their heirs or dependents. Provides that the sources of funds that may be used to settle said obligations shall come from the proceeds from the development, lease, or other proprietary use of government properties enumerated in this Act."
