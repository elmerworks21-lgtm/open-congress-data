congress_website_title = "AN ACT RECOGNIZING JANUARY 26 OF EVERY YEAR AS OBSERVANCE OF THE ANNIVERSARY OF THE FIRST QUARTER STORM, AND FOR OTHER PURPOSES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to give a chance for every citizen to look back to the past and learn the lessons from the nightmare of the Marcos regime and to honor the youths who fought to revive democracy and to defend the rights and liberties of the Filipino people. Aims to revive the First Quarter Storm which is a continuous movement initiated by youth and other advocates to combat tyrannical rule and authoritarianism."
