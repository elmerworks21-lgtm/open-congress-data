congress_website_title = "AN ACT MAKING A SEPARATE COURSE ON ETHICS COMPULSORY AT ALL LEVELS OF ELEMENTARY AND SECONDARY EDUCATION, AND IN EVERY DEGREE COURSE IN ALL COLLEGES AND UNIVERSITIES"
congress_website_abstract = "Provides further that all colleges and universities shall provide a compulsory 3-unit Ethics course for every profession, e.g., Legal Ethics for law schools, Medical Ethics for medical schools, Military Ethics for the PMA, etc.; Enumerates the six levels of public morality topics that should be included in the main syllabus and the supplementary topics on the causes, issues, and effects of graft and corruption and suggests measures to reform a corrupt environment."
