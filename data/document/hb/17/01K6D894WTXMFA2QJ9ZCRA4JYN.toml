congress_website_title = "AN ACT PROVIDING SOCIAL SECURITY BENEFITS FOR BARANGAY OFFICIALS AND VOLUNTEER WORKERS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to recognize the valuable services rendered by our barangay officials and volunteer workers by tapping the various government instrumentalities such as the GSIS, PAG-IBIG Fund, and PHILHEALTH. Provides for the mandatory membership and enrollment of all barangay officials and volunteers to the GSIS Life Insurance and Social Protection Program, including the PAGIBIG Fund Voluntary Membership Program."
