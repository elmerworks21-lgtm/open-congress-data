congress_website_abstract = "Penalizes any officer or employee of the hospital or medical clinic responsible for billing who violates the provision of this Act with a fine of not less than Twenty Thousand Pesos (Php20,000.00) but not more than Fifty Thousand Pesos (Php50,000.00), or imprisonment of not less than one (1) month but not more than six (6) months, or both such fine and imprisonment, at the discretion of the proper court."
