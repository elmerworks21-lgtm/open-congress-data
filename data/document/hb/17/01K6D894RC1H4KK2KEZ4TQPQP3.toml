congress_website_title = "AN ACT MANDATING ALL EMPLOYERS IN THE PRIVATE AND PUBLIC SECTORS, INCLUDING ALL GOVERNMENT OFFICES, AGENCIES AND INSTRUMENTALITIES, TO PROVIDE, FREE OF CHARGE, CLEAN, HEALTHY, SUFFICIENT AND ACCESSIBLE DRINKING WATER TO ALL ITS EMPLOYEES"
congress_website_abstract = "Mandates employers in the private and public sectors to provide all employees with clean, healthy, sufficient and accessible drinking water during working hours while performing their respective tasks and/or duties inside or outside the office or business place and premises not in the form of monetary allowance of whatever nature and not to be deducted the expenses for said item in the salaries, allowances and/or benefits of/for the employees."
