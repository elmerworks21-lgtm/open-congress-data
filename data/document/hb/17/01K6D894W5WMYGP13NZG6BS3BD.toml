congress_website_title = "AN ACT TO PROVIDE YOUTH SUICIDE INTERVENTION AND PREVENTION"
congress_website_abstract = "Aims to introduce a Life Planning Education (LPE) in the elementary and secondary education curriculum which shall require lectures and discussion on self and identity; personal, family, community values; communication and interrelationship with others; sexuality and gender roles; among others. Proposes a Peer Counselling Program to encourage positive mental health for students which aims to teach basic counselling skills; foster relationship and confidence building among the student body; and be a source of skill and academic motivation for them. Proposes to encourage schools to employ at least one licensed psychologist in order to respond to the mental health care needs of the students, and create suicide prevention programs."
