congress_website_title = "AN ACT INSTITUTING REFORMS IN REAL PROPERTY VALUATION AND ASSESSMENT IN THE PHILIPPINES, REORGANIZING THE BUREAU OF LOCAL GOVERNMENT FINANCE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to improve real property valuation for the government by adopting a market based Schedule Market Value (SMV) to be used as basis of local and national real property taxation. Reorganizes the Bureau of Local Government Finance (BLGF) under the Department of Finance, to provide the institutional support and accountability to operationalize the reform agenda, and oversee all matters relating to real property valuation in the country. Requires all real properties, whether taxable or exempt, shall be valued or appraised based on the prevailing market values in the locality where the property is situated, in conformity with the valuation standards adopted pursuant to this Act. Requires the BLGF to develop and maintain an up-to-date electronic database of the sale, exchange, lease, mortgage, donation and all other real property transactions and declarations in the country and on the cost of construction or renovation of buildings and other structures, and on prices of machinery."
