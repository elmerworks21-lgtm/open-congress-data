congress_website_title = "AN ACT INCREASING THE AGE FOR DETERMINING STATUTORY RAPE AND OTHER ACTS OF SEXUAL ABUSE AND EXPLOITATION TO BELOW EIGHTEEN YEARS OLD AND PROVIDE STRONGER PROTECTION FOR CHILDREN AND AMENDING FOR THIS PURPOSE ACT NO. 3815, AS AMENDED, ALSO KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "Aims to address grave concerns on sexual exploitation of children including growing child prostitution, and the reported cases of child pornography in the country. Seeks to raise the minimum age of consent to determine statutory rape to UNDER EIGHTEEN (18) YEARS OF AGE, by amending Art.266-A of the Revised Penal Code, as well as special laws with the attempt to address the disparity in the treatment of those person who are below twelve (12) years old and those twelve (12) years but below eighteen (18) years of age."
