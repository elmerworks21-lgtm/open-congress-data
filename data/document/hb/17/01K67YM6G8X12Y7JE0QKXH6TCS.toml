congress_website_title = "AN ACT REDUCING THE MINIMUM MEMBERSHIP REQUIREMENT FOR REGISTRATION OF UNIONS OR FEDERATIONS, AND STREAMLINING THE PROCESS OF REGISTRATION, AMENDING FOR THIS PURPOSE PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to modify the restrictions imposed on the process of union formation by introducing amendments to the Labor Code as follows: 1. to lower the present minimum membership requirement for the registration of independent unions from twenty percent (20%) to ten percent (10%); 2. To reduce the number of affiliated local chapters required for purposes of registration as a federation from ten (10) to five (5); and 3. mandates the Bureau of Labor Relations to develop a system of online registration of unions."
