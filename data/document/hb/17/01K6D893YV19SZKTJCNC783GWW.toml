congress_website_title = "AN ACT REMOVING THE RESTRICTIONS UNDER SECTIONS 118, 119, 120, 121, 122, AND 123 OF COMMONWEALTH ACT NO. 141, AS AMENDED, ON FREE PATENTS ISSUED UNDER SECTION 44 THEREOF"
congress_website_abstract = "Intends to remove the archaic restrictions of the Public Land Act on agricultural free patents in order to make these titles readily available for commercial and credit transactions; Provides that these lands alienated or disposed of in favor of qualified land applicants shall not be subject to restrictions regarding encumbrances, conveyances, transfers, or dispositions imposed under several sections of the said Act."
