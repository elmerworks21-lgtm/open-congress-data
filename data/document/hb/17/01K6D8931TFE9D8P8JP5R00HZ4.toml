congress_website_title = "AN ACT INSTITUTING ABSOLUTE DIVORCE IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "Gives the espouses opportunity in irremediably failed marriages to secure an absolute divorce decree under limited ground and well-defined procedures to avoid abuse, save the children from the pain and stress of their parents´ marital clashes, and grant the divorced espouses the right to marry again for another chance to achieve marital bliss."
