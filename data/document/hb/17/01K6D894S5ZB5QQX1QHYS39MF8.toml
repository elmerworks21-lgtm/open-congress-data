congress_website_title = "AN ACT CREATING THE NATIONAL NUCLEAR RADIATION SAFETY BOARD AND DEFINING ITS SCOPE, FUNCTIONS AND POWERS"
congress_website_abstract = "Aims to establish NNRSB that will be responsible for formulating programs, management and provide policies that will aid in the prevention or minimization of nuclear technology risks or threats. Tasks the Board to regulate all undertakings of nuclear radiation researches, developmental application for the safety and protection of the general public and thereby prevent or decrease the risks which such activities post to life, property and ecology."
