congress_website_title = "AN ACT RECOGNIZING THE ANNUAL OBSERVANCE OF WORLD EDUCATION SUPPORT PERSONNEL DAY, DECLARING FOR THE PURPOSE THE SIXTEENTH DAY OF MAY OF EVERY YEAR AS NATIONAL EDUCATION SUPPORT PERSONNEL DAY IN THE PHILIPPINES"
congress_website_abstract = "Refers Education Support Personnel to a wide range of professional, administrative, technical, and general staff working within the education sector such as teaching assistants; school doctors, nurses and psychologists; registrars and clerks; guidance counselors; librarians; and bus drivers, among others. Aims to address numerous concerns and issues of ESP which tends to ignore and undervalue their worth in the administration of quality education by setting aside a special day to enable society to honor and celebrate their important role."
