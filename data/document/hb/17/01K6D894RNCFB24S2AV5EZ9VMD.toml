congress_website_title = "AN ACT MANDATING THE CONTINUITY OF EDUCATIONAL CURRICULUM FOR A PERIOD OF AT LEAST SIX (6) YEARS AND ENSURING THE STABILITY OF THE CONSEQUENT TEXTBOOKS AND RELATED MATERIALS THROUGH AN ANNUAL REVIEW, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8047, OTHERWISE KNOWN AS THE BOOK PUBLISHING INDUSTRY ACT, AS AMENDED"
congress_website_abstract = "Amends Republic Act No. 8047 (Book Publishing Industry Act) to improve competencies of educational materials in public schools by mandating that curriculum should have continuity and stability by keeping the same for a period of at least SIX (6) years; Intends to resolve errors in textbooks and related materials and to ensure that they are up to standards by conducting ANNUAL review by the DepEd in cooperation with National Book Development Board."
