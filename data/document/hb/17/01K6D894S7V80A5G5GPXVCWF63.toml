congress_website_title = "AN ACT DEFINING AND PROHIBITING POLITICAL DYNASTIES, PROVIDING PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines “Political Dynasty” as the concentration, consolidation, or perpetuation of public office and political powers by relatives within the 2nd degree of consanguinity or affinity. Provides prohibited candidates and covered scenarios in the application of this Act to the next elections and all subsequent elections thereafter. Allows the COMELEC to deny, motu proprio, and/or cancel certificate of candidacy of any candidate/party if it becomes apparent from the documents filed that a violation of this Act may have been committed."
