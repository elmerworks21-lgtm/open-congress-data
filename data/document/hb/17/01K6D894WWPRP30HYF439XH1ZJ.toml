congress_website_title = "AN ACT TO PROVIDE FREE LEGAL ASSISTANCE TO ALL INDIGENT FILIPINOS, AMENDING FOR THE PURPOSE CHAPTER 5, TITLE III, BOOK IV OF EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE \\\"ADMINISTRATIVE CODE OF 1987\\\", APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Hustisya Para sa Lahat Act of 2018\\\" Intends to adjust the parameters currently being used by the Public Attorney's Office (PAO)in qualifying indigent persons. Defines \\\"indigent\\\" as any individual who falls into any of the following categories: a) whose net income falls below the most recent official poverty threshold by the Phil. Statistics Authority (PSA); b) those identified as poor and near poor based on National Household Targeting System (NHTS); or c) those vulnerable households who are living under precarious circumstances (members of the informal economy/sectors, Indigenous Peoples, and those living in geographically isolated and disadvantaged areas."
