congress_website_title = "AN ACT STRENGTHENING AND EXPANDING THE MANDATE AND FUNCTIONS OF THE BUREAU OF FIRE PROTECTION (BFP) TO ENHANCE PUBLIC SAFETY AS WELL AS TO UPGRADE THE RANK STRUCTURE OF THE UNIFORMED MEMBERS OF THE BUREAU OF FIRE PROTECTION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to strengthen and expand the mandate and functions of the BFP to enable them to respond to all kinds of disasters as well as to respond to other emergencies including rescue, medical, and other forms of emergencies. Aims to provide parity as to rank classification of the members of the BFP with the officers of the Philippine National Police, Armed Forces of the Philippines, and the Philippine Coast Guard. Proposes to establish the Search and Rescue Force (SRF), Emergency Medical Services (EMS), and HAZMAT (Hazardous Materials) Units, in addition to the existing Fire Fighting Units."
