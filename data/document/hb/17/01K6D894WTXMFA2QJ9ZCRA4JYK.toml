congress_website_title = "AN ACT INCREASING THE PENALTIES FOR OTHER ILLEGAL GAMBLING ACTIVITIES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9287, ENTITLED \\\"AN ACT INCREASING THE PENALTIES FOR ILLEGAL NUMBERS GAMES, AMENDING CERTAIN PROVISIONS OF PRESIDENTIAL DECREE NO. 1602, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to impose an increase in the penalties carried out against various forms of illegal gambling such as penalty of imprisonment as follows: 30 to 90 days to such person who acts as bettor; 6 years & 1 day to 8 years to personnel/staff of an illegal gambling operation /any person who allows his vehicle, house, building or land to be used in such activity; 8 years & 1 day to 10 years to such person who acts as collector or agent; 10 years & 1 day to 12 years to such person who acts as coordinator, controller or supervisor; 12 years & 1 day to 14 years to such person who acts as maintainer, manager or operator; 14 years & 1 day to 16 years to such person who acts as financier or capitalist; 16 years & 1 day to 20 years to such person who acts as protector or coddler. Enumerates the different illegal gambling activities considered in this Act among other such as cockfighting/\\\"tupada\\\", jai alai or horse racing, other forms of illegal lotteries; cara y cruz or pompiang, etc.; 7-11 etc.; black jack, lucky nine, \\\"pusoy\\\" or russian poker, monte, baccarat, \\\"sakla\\\", cuajao, pangguingue, etc.; mahjong, domino, etc.; slot machines, roullette, pinball, fruit game; dog rcing, boat racing pinball, fruit game etc.; dog/boat/car racing, etc.; game fixing, point shaving and other machinations; banking or percntage game, or any other game or scheme and its derivatives. Proposes that the DILG, NAPOLCOM and DOJ shall conduct an annual moral recovery and values enhancement seminars for local government officials and law enforcers."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_17/HB08389.pdf"]

