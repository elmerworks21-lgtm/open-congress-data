congress_website_title = "AN ACT INSTITUTING A COMPREHENSIVE HOUSING PROGRAM FOR PUBLIC SCHOOL TEACHERS, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to help public school teachers to purchase a housing unit of their choice through loans with affordable interest and long-term repayment period; Seeks to engage the government housing and financing agencies (National Housing Authority, National Home Mortgage Finance Corporation, Home Guaranty Corporation, and the Government Service Insurance System) to spearhead the formulation and the implementation of the proposed program of this Act; Proposes further the provision of on-site living quarters, free of charge, for public school teachers in remote and hard-to-reach areas."
