congress_website_title = "AN ACT FURTHER AMENDING SECTIONS 101 (A)(I) AND SECTION 169 OF PRESIDENTIAL DECREE NO. 612, OTHERWISE KNOWN AS \\\"THE INSURANCE CODE\\\", AS AMENDED BY REPUBLIC ACT NO. 10607"
congress_website_abstract = "Seeks to address contingencies arising from terrorist and rebellious activities which exposes our countrymen to wide forms of risks involving death, destruction of property, stoppage of livelihood among others. Amends R.A. No.10607 as amended, to read as follows: “SEC.169. . . . the term fire insurance shall include insurance against loss by fire, lightning, windstorm, tornado or earthquake, ACTS OF REBELLION OR TERRORISM and other allied risks, when such risks are covered by extension to fire insurance policies or under separate policies.”"
