congress_website_title = "AN ACT CREATING AN ADVANCED STUDIES DEVELOPMENT PROGRAM FOR EXCEPTIONAL EMPLOYEES FROM THE GOVERNMENT AND THE PRIVATE SECTOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to reverse human capital flight or “brain drain” by establishing fellowship program for qualified Filipino professionals from the public and private sectors and for those who are self-employed; Intends to help Filipino professionals obtain high-quality credentials, new skills, and expanded professional networks which will lead to the development of the country´s workforce as the returning scholars are expected to exert a broader influence by applying their knowledge and networks that they developed overseas."
