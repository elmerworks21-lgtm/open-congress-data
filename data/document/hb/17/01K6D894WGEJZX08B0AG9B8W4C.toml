congress_website_title = "AN ACT PROVIDING FOR AN INCREASE IN THE SALARY OF, AND ADDITIONAL INCENTIVES FOR, GOVERNMENT PHYSICIANS AND APPROPRIATING FUNDS THEREFORE"
congress_website_abstract = "Seeks to adjust the salary of Government Physician to Salary Grade 24 and provide those who have rendered at least three (3) years of government service an annual loyalty pay equivalent to 75% of the one (1) month of their prevailing salary. Government doctors who have rendered at least five (5) years of continuous service shall be entitled to an educational grant for any medical course and training whether locally or internationally. Provides further, for transportation, representation, food, and medical allowances for public doctors that are assigned to isolated, depressed, or conflict-torn areas."
