congress_website_title = "AN ACT FACILITATING THE GLOBAL EMPLOYMENT OF FILIPINOS"
congress_website_abstract = "Seeks To Allow Competent Professionals Who Have Passed Government Licensure Examinations And Other Graduates Of Baccalaureate Degrees, As Certified By Ched, And Those Who Are Considered Highly-skilled Or Experts In Their Respective Trade, Craft, Industry Or Vocation, As Certified By Tesda Or Other Government Bodies - To Work Abroad Without Having To Process Their Overseas Employment Through The Poea. Proposes To Provide Filipinos Seeking Employment Abroad The Utmost Support For Their Travel And Employment By Ensuring The Issuance Of Their Travel Documents And Other Documentary Requirements, Within The Shortest Possible Time Without Unnecessary Or Avoidable Delay."
