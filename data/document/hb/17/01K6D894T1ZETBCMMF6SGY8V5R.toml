congress_website_title = "AN ACT DEFINING THE RIGHTS AND FUNDAMENTAL FREEDOMS OF HUMAN RIGHTS DEFENDERS, DECLARING STATE RESPONSIBILITIES AND INSTITUTING EFFECTIVE MECHANISMS FOR THE PROTECTION AND PROMOTION OF THESE RIGHTS AND FREEDOMS"
congress_website_abstract = "Proposes to address increasing threats and attacks, and various cases of human rights violations/abuses perpetrated against Human Rights Defenders (HRDs). Enumerates rights and freedoms of human rights defenders and specifies the obligations of the state and public authorities to ensure the fulfillment of these rights and freedoms, and impose appropriate sanctions to counter impunity. Creates the Human Rights Defenders Committee with one Chairperson and with six members which shall be jointly nominated by two representatives each of the Phil. Alliance of Human Rights Advocates (PAHRA), Karapatan Alliance for the Advancement of People´s Rights (Karapatan), Free Legal Assistance Group (FLAG), and National Union of People´s Lawyers (NUPL)."
