congress_website_title = "AN ACT INSTITUTING THE FARMERS AND FISHERFOLK ENTERPRISE DEVELOPMENT PROGRAM OF THE DEPARTMENT OF AGRICULTURE AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to capacitate our agricultural and fisher-folk communities through an enterprise development program that will provide assistance to farmers and fishermen in developing their own business through various opportunities to develop technical skills, use production equipment and facilities, gain access to credit, and avail of business development counselling services. Proposes to establish a comprehensive and holistic approach in the formulation, coordination and implementation of enterprise development initiatives, consolidate the roles of different government agencies involved therein, intensify the building of entrepreneurship culture among farmers and fisherfolk, and provide incentives to private entities that support said initiatives of the government."
