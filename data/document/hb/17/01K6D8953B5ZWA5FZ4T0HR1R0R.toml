congress_website_title = "AN ACT PROVIDING FOR THE BENEFITS AND PRIVILEGES TO SINGLE PERSONS AND THEIR DEPENDENTS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Refers \\\"Single Person\\\" as used in this Act to any individual who is not legally married, or to anyone who was previously married but whose marriage was subsequently annulled or declared void ab initio, and who exercises custody on or financially supports or aids someone not his or her child. Proposes an additional leave privileges of not more than three (3) days every year who has rendered service of at least one (1) year and a flexible working schedule and other considerations under certain conditions."
