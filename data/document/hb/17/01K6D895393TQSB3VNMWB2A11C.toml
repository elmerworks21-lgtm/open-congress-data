congress_website_title = "AN ACT STRENGTHENING AND EXPANDING THE SCOPE OF THE FREE PUBLIC TERTIARY EDUCATION TO INCLUDE ALL LOCAL UNIVERSITIES AND COLLEGES (LUCs), AND BRANCHES OF STATE UNIVERSITIES AND COLLEGES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10931, OTHERWISE KNOWN AS THE \\\"UNIVERSAL ACCESS TO QUALITY TERTIARY EDUCATION"
congress_website_abstract = "Intends to introduce a system of free public higher education, with particular emphasis on promulgating new state policy that translates to a repudiation of the neoliberal education framework. Seeks therefore to finance the actual \\\"cost of attendance\\\" of students; include provision for readmission of drop-outs youth; create a special grant that will offer additional support for financially-disadvantaged students; and introduce a nationalist, scientific, and mass-oriented curriculum."
