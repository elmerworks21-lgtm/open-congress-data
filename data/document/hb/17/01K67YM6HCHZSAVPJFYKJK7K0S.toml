congress_website_title = "AN ACT PROVIDING FOR THE REVISED CORPORATION CODE OF THE PHILIPPINES"
congress_website_abstract = "Provides for a Revised Corporation Code based on international best practices and standards to address and meet the needs and realities of business in the Philippines; encourage new businesses, deter corporate fraud and abuse, strengthen good corporate governance and rationalize the authority of the Security and Exchange Commission. Seeks to allow the corporation to have perpetual life existence; accept electronic filing with the SEC, thereby contributing to the ease of doing business; permit stockholders to vote remotely, at the option of the corporation; allow the establishment of one-person corporations; and require the SEC to notify and coordinate with the appropriate government agency prior to the suspension or revocation of the certificate of incorporation of companies under the agency´s special regulatory jurisdiction."
