congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA FOR STATISTICAL AND REGISTRATION WORKERS"
congress_website_abstract = "Aims to promote efficient and effective delivery of statistical services, civil registration functions and deployment of a resilient Phil. Identification System (PhilSys). Intends to formulate a career system for statistical and registration worker in the government service by the Philippine Statistical Authority (PSA) in coordination with the Civil Service Commssion (CSC) Provides for a program of human resource development to achieve and maintain the necessary reservoir of talent and manpower that will sustain its drive for accessible, affordable and sustainable statistical, civil registration, and PhilSys services in various parts and sectors of the society."
