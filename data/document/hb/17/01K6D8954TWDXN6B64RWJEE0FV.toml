congress_website_title = "AN ACT ENHANCING REVENUE ADMINISTRATION AND COLLECTION BY GRANTING AMNESTY ON ALL UNPAID IMPOSITIONS LEVIED BY GOVERNMENT FOR TAXABLE YEAR 2017 AND PRIOR YEARS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to grant a General Tax Amnesty which shall cover all national internal revenue taxes such as, but not limited to, income tax, withholding tax, capital gains tax, donor's tax, value-added tax, percentage taxes, excise tax, and documentary stamp tax collected by the BIR, including VAT and excise taxes collected by the BOC for the year 2017 and prior years, that have remained unpaid. Proposes provisions on the entitlement and availment; contents of SALN, presumption of its correctness, and confidentiality and non-use of information and data therein in any investigation or prosecution; immunities and privileges to those who shall avail, complied with all the conditions and paid the tax amnesty; exceptions as to when the amnesty shall not be extended; unlawful divulgence of tax amnesty return; and disposition of proceeds to augment the appropriations needed for the social mitigating measures and the Government's Build, Build, Build infrastructure projects."
