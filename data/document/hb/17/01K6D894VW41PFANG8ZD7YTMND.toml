congress_website_title = "AN ACT ESTABLISHING AND INSTITUTIONALIZING THE SEAL OF GOOD LOCAL GOVERNANCE FOR LOCAL GOVERNMENT UNITS, AND ALLOCATING FOR THIS PURPOSE THE SEAL OF GOOD LOCAL GOVERNANCE FUND"
congress_website_abstract = "Intends to promote strong and responsive governance among LGUs to further improve performance, accountability, transparency and participation, by recognizing their achievements and progress. Proposes to institutionalize the awarding of performance-based grants to LGUs that meet and exceed the minimum governance standards, which they may use as supplemental funding for local development projects."
