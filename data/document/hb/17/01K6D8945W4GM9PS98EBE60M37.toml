congress_website_title = "AN ACT PROVIDING FOR THE MAGNA CARTA OF YOUNG FARMERS"
congress_website_abstract = "Declares “Young Farmer” as an individual whose primary source of income comes from agriculture, with an age range of 15-35 years old, is owner, worker, tenant or lessee of the land in which they personally cultivate and till; Aims to promote the social and economic well-being of these young farmers; develop their skills and capabilities; and eliminate discrimination against them by promoting their rights."
