congress_website_abstract = "Seeks to ensure the development, enhancement, propagation, and preservation of Filipino and other Philippine language as a symbol of national unity and identity. Proposes that the CHED shall undertake consultations with the PRC and the Commission on Filipino Language, and other stakeholders such as the private and public school´s associations, the national student organizations, the national teacher organization, the parents-teachers´ associations and the chambers of commerce on matters affecting them."
