congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA FOR BARANGAY HEALTH WORKERS"
congress_website_abstract = "Seeks to provide reasonable set of monetary and incentive packages for Barangay Health Workers who are the forefront of the delivery of health care in the grassroots level, in order to compensate their valuable services. Defines “Barangay Health Worker (BHW)” as person who has completed the basic training program of DOH or training programs by any accredited government or non-government organization and who voluntarily renders primary health services in the community after having been accredited to functions as such by the Local Health Board. Incentives and Benefits includes: Hazard/subsistence/remote assignment allowances; PHILHEALTH/Medical examination/work-related injuries coverage/benefits; Free legal services; Training, education and career enrichment program/Study tours/ socialized subsidies/study now pay later scholarship schemes; Degree equivalent of accredited work experience; Civil service eligibility; Retirement benefits and scholarships for dependents."
