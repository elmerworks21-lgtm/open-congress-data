congress_website_title = "AN ACT DEFINING AND PROHIBITING OBSTRUCTION AND SLOWDOWN OF TRAFFIC WHILE UNDER THE INFLUENCE OF ROAD RAGE, PROVIDING PENALTIES FOR VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines “Road Rage” as a person´s anger or violent behaviour that is usually caused by another person´s bad driving or the stress of being in heavy traffic; and is expressed in aggressive or violent behaviour, thus causing the total or partial obstruction or slowdown of vehicular traffic and endangering the lives and safety of the public. Provides penalties from Five Thousand Pesos (P5,000.00) to Twenty Thousand Pesos (P20,000.00) plus the revocation of the driver´s license of the offending driver. Mandates the owner of CCTV systems, cameras, mobile phones or similar equipment, which was used to capture the actual act of road rage, to produce a hardcopy of the footage or effect a transfer thereof to responding traffic enforcers."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_17/HB08304.pdf"]

