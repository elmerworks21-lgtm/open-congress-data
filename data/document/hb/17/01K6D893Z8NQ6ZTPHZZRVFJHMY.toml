congress_website_title = "AN ACT PROHIBITING DRAG RACING IN PUBLIC ROADS AND PRESCRIBING PENALTIES FOR VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "States that drag racing, that involves the employment of two or more private motor vehicles driven side by side within a specified distance at accelerating speeds with the objective to outdo each other, or the employment of motor vehicles not necessarily driven side by side over a common course, is hereby declared banned or prohibited; Also includes those public utility vehicles randomly overtaking each other for the purpose of getting passengers first or merely for the purpose of outdistancing each other, is likewise prohibited."
