congress_website_title = "AN ACT MANDATING ALL LOCAL GOVERNMENT UNITS, NATIONAL GOVERNMENT AGENCIES, EXECUTIVE DEPARTMENTS, BUREAUS, OFFICES, AGENCIES, COMMISSIONS, GOVERNMENT FINANCIAL INSTITUTIONS, GOVERNMENT OWNED AND CONTROLLED CORPORATIONS AND, STATE UNIVERSITIES AND COLLEGES TO ALLOCATE FIVE PERCENT (5%) OF THEIR ANNUAL ALLOTMENT FOR PROGRAMS AND PROJECTS FOR SENIOR CITIZENS"
congress_website_abstract = "Seeks to institutionalize the Philippine Plan of Action for Senior citizens (PPASC) that will serve as the point of synergy of all efforts directed towards the promotion of the wellbeing of the senior citizens. Allocates funds for the implementation of programs, projects, activities and services which will address the needs of senior citizens, in either, but not limited to the following: a. Information and Communication Campaign and Advocacy (re: aging, and prevention of discrimination against and abuse); b. Education, Human Resource Dev´t. and Capability Building (for family members, family caregivers, and professional and service providers); c. Protection and Safety Program (friendly facilities in compliance w/ Accessibility Law) d. Group Home/Foster Home (for neglected, abandoned and detached); e. Policy Development and Legislation (promotion of rights and full participation and equality in the development process); f. Employment Opportunities; Advancement of Health and Well-being; Communicty-Based Facilities; and other projects and activities the agencies may implement in relation to their respective mandates."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_17/HB08154.pdf"]

