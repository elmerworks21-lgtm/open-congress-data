congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 4200, ENTITLED, \\\"AN ACT TO PROHIBIT AND PENALIZE WIRE TAPPING AND OTHER RELATED VIOLATIONS OF THE PRIVACY OF COMMUNICATION\\\""
congress_website_abstract = "Declares it unlawful for any person, not being authorized by any party to any ORAL, WIRE, RADIO, DIGITAL OR ELECTRONIC private communication, to tap, intercept or record such communication WITH THE USE OF ANY ELECTRONIC, MECHANICAL, DIGITAL OR ANALOG PHONE SYSTEM, OR SIMILAR DEVICES. Includes the crimes or offenses in the following as addition to those enumerated under Section 3 of RA 4200, namely: (1) Violation of RA 9165, or the “Dangerous Drugs Act of 2002”, as amended; (2) Coup d´etat, Conspiracy and Proposal to Commit Coup d´etat, Robbery in Band as defined and penalized by Articles 294, 295, 296, 299 and 302 of the Revised Penal Code; (3) Presidential Decree No. 532, otherwise known as the “Anti-Piracy and Anti-Highway Robbery Law of 1974; (4) Violation of RA 3019, or the “Anti-Graft and Corrupt Practices Act”; (7) Syndicated Illegal recruitment as defined and punished under RA 8042; and, (6) Violation of RA 9160, otherwise known as the “Anti-Money Laundering Act of 2001,” as amended."
