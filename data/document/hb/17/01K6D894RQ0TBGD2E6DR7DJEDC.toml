congress_website_abstract = "Intends to provide programs to prevent emergency response employees from acquiring Hepatitis C (a viral infection that causes liver inflammation, sometimes leading to serious liver damage). Seeks to establish a system, training, protocol and scientific research and medical treatment for this virus so that our said personnel will be able to deploy their functions without sacrificing their precious health."
