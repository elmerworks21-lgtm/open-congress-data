congress_website_title = "AN ACT PROVIDING FOR BUSINESS-FRIENDLY TAX REMEDIES IN LOCAL GOVERNMENT UNITS BY AMENDING CERTAIN PROVISIONS IN BOOK II OF REPUBLIC ACT 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
