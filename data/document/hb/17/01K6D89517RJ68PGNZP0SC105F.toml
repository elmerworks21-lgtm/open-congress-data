congress_website_title = "AN ACT PROVIDING SPECIAL ASSISTANCE FOR OVERSEAS FILIPINO WORKERS IN DISTRESS, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines \\\"OFW in Distress\\\" as an OFW who has medical or psycho-social problems requiring treatment, hospitalization, and/or counseling; and/or problems like labor, immigration and other issues requiring legal representation, or any other kind of intervention with foreign authorities. Seeks to create a Special Fund in the amount of Php1,000,000.00, at least 30% of which shall be allotted as monetary support as lump sum payment not exceeding Php50,000.00 for each OFW who has been a victim of abuse, or one who has been repatriated due to natural or manmade calamities, disasters, armed conflict, war, or other similar circumstances."
