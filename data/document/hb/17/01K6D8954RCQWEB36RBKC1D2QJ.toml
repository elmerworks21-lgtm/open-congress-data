congress_website_title = "AN ACT ESTABLISHING THE COCONUT FARMERS AND INDUSTRY DEVELOPMENT TRUST FUND AND PROVIDING FOR ITS MANAGEMENT AND UTILIZATION"
congress_website_abstract = "Aims to address the various challenges facing the coconut industry including low productivity, lack of information on appropriate technologies, and high poverty incidence among coconut farmers as well as the full utilization of the Coconut Levy Funds for the benefit of the coconut farmers and for the development of the industry. Seeks to provide for the audit and inventory of coconut levy assets and reconveyance thereof; creation of the Coconut Farmers and Industry Development Trust Fund; preparation of the Coconut Farmers and Industry Development Plan; determination of the privatization and/or retention of the Coconut Levy Assets; provision for additional mandate of the Privatization and Management Office (PMO) and its powers thereof; and the suppletory application of R.A. No.10149 (GOCC Governance Act) and E.O. No.323 (Constituting an Inter-Agency Privatization Council (PC), etc."
