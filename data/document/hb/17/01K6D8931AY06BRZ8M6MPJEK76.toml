congress_website_title = "AN ACT TO STRENGTHEN THE RIGHT OF CITIZENS TO INFORMATION HELD BY THE GOVERNMENT"
congress_website_abstract = "Seeks to put in place the enabling law necessary to implement the Constitutional provision that says: “The Right of the people to information on matter of public concerns shall be recognized. Access to official records, and to documents, and papers pertaining to official acts, transactions, or decisions, as well as government research data used as basis for policy development, shall be afforded the citizens, subject to such limitations as may be provided by law.” (Article II, Section 7)."
