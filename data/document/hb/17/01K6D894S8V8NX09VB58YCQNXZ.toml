congress_website_title = "AN ACT ESTABLISHING A STRATEGIC FOOD SECURITY RICE RESERVE AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates the National Food Authority (NFA) to maintain rice reserve equivalent to fifteen (15) days of national rice consumption, buy stocks from small farmers and their cooperatives and import only under abnormal conditions, and release them to the market upon declaration of a state of calamity. Strengthens farmers´ cooperatives by mandating the Cooperative Development Authority in coordination with the LGUs and NGOs to transform agri-based cooperatives into entrepreneurs."
