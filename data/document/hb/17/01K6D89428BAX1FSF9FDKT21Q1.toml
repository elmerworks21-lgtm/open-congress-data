congress_website_title = "AN ACT MANDATING THE COMMISSION ON HIGHER EDUCATION TO INCLUDE A SUBJECT OF MORO HISTORY, CULTURE AND IDENTITY STUDIES AS AN ELECTIVE IN THE HIGHER EDUCATION CURRICULUM"
congress_website_abstract = "Acknowledges that education plays an important role in recognizing the value of interdependence among cultures; Proposes therefore to promote greater appreciation of centuries-long rich historical and cultural heritage among majority of Filipinos by recognizing the rightful place of the Bangsamoro people in the fabric of our national history; Aims to help instill in the consciousness and understanding of the Filipino students the Muslim culture which may possibly eradicate certain biases instilled in the minds of individuals; Emphasizes, among others the positive relations and remembrances in history among the tri-people of Mindanao: the Christian settlers and their descendants, the Moros or Muslims and the Lumads or indigenous highland tribes."
