congress_website_title = "AN ACT REQUIRING THE TEACHING AND INCULCATION OF THE NEED OF EVERY PERSON TO FIGHT THE EVILS OF GRAFT AND CORRUPTION IN THE SOCIETY, OF THE VARIOUS PROCESSES AND PROCEDURES IN GOVERNMENT AND OF TRANSACTIONS OCCURRING IN THE PRIVATE SECTOR, OF THE STEPS THAT CAN BE UNDERTAKEN IN CASE GRAFT AND CORRUPTION OCCURS, AND OF THE RIGHT AND RESPONSIBILITIES OF CITIZENS IN GOVERNANCE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Requires the teaching thereof to be part of the curriculum of all primary and secondary schools in the Phils.; Provides that DepEd shall be guided by the principle that the information to be disseminated shall be given or taught in a positive manner in such a way that the students will be inspired and encouraged to participate in the fight against graft and corruption. . ."
