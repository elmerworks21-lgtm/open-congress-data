congress_website_title = "AN ACT TO REGULATE THE RATIONAL EXPLORATION, DEVELOPMENT AND UTILIZATION OF MINERAL RESOURCES, AND TO ENSURE THE EQUITABLE SHARING OF BENEFITS FOR THE STATE, INDIGENOUS PEOPLES AND LOCAL COMMUNITIES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to guarantee that the exploration, development and utilization of mineral resources will primarily benefit the Filipino people; prioritizes sustainable livelihood choices of communities; gives utmost importance to food security and livable conditions for the people; ensures that the gains from the mining industry would be maximized while preventing or mitigating its adverse effects; recognizes that the issue of environment and sustainable development is local and thus prioritizes local participation in decisions surrounding mining; ensures the protection and human rights of communities and individuals; and imposes harsh penalties for the violation of its provisions."
