congress_website_abstract = "Increases the annual Personal Equity and Retirement Account (PERA) contributions entitled to tax incentives from P100,000 to 200,000 or up to P400,000 for OFWs. Provides that instead of a 5% tax credit, PERA contributions up to the maximum amount shall be allowed as deductions from gross income tax of each contributor."
