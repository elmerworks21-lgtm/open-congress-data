congress_website_title = "AN ACT PROHIBITING THE MANUFACTURE, SALE, DISTRIBUTION AND USE OF RINSE-OFF COSMETICS AND CLOTHING CONTAINING MICROPLASTICS"
congress_website_abstract = "Prohibits the manufacture, sale, importation or distribution of rinse-off cosmetics such as facial scrubs, body wash, toothpaste, and similar products containing plastic microbeads; and garments, clothing, apparel that contain microfiber. Penalizes the violation of this Act with a fine of P500,000.00 pesos to P1.5 million pesos, revocation of Business Permit and imprisonment ranging from 3 to 6 years."
