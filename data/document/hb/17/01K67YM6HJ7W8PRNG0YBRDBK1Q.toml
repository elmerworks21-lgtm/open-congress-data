congress_website_title = "AN ACT ESTABLISHING THE FISCAL REGIME FOR THE MINING INDUSTRY"
congress_website_abstract = "Seeks to impose tax on the following: a margin -based royalty tax on large-scale metallic and non-metallic mining operations outside of mineral reservations from 1% to 5%; three percent (3%) royalty tax for mining contractors of large-scale metallic and non-metallic within mineral reservations ; one-tenth (1/10) of one percent (1%) of gross output for mining contractors of small-scale metallic and non-metallic within or outside mineral reservations; a margin-based windfall profits tax on income from mining operations before corporate income tax from 1% to 10% for each taxable year. Requires small-scale miners to register with the Mining Board of the concerned local government unit and with the Mines and Geoscience Bureau (MGB) and may organize themselves into cooperatives in order to qualify for the awarding of a people´s small-scale mining contract."
