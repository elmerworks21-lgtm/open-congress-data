congress_website_title = "AN ACT RECOGNIZING THE OBSERVANCE OF SEPTEMBER 21 OF EVERY YEAR AS THE NATIONAL DAY OF REMEMBRANCE FOR THE VICTIMS OF MARTIAL LAW, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to recognize the Filipinos who were victims of enforced or involuntary disappearance and other human rights violations committed during the regime of the late former President Ferdinand Marcos. Seek to solidify the state´s remembrance of the day as it should be remembered which shall be essential in ensuring that the state does not forget its role in the recovery of the nation."
