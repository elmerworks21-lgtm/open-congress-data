congress_website_title = "AN ACT INCREASING THE SEPARATION PAY OF EMPLOYEES TERMINATED DUE TO DISEASE, PROVIDING CONDITIONS FOR SUCH TERMINATION, AMENDING FOR THE PURPOSE ARTICLE 284 OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to increase the separation pay of employees terminated due to disease to an amount equivalent to at least SIX (6) months salary or TWO (2) months salary for every year of service, whichever is greater; Institutionalizes the issuance of a certification by a competent public health authority that the disease is of such nature or at such stage that it cannot be cured within a period of six (6) months even with proper medical treatment before an employee can be terminated for this cause."
