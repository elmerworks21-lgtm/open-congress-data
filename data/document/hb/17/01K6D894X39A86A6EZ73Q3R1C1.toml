congress_website_title = "AN ACT DECLARING THE SEVENTEENTH OF NOVEMBER OF EVERY YEAR AS NATIONAL STUDENT LEADER'S DAY"
congress_website_abstract = "Proposes to instill in the youth the values of patriotism and responsible leadership and encourage their involvement in nation-building through the observance of an annual program of activities which shall be prepared and implemented, with the National Youth Commission (NYC) as the lead agency. Aims to honor the efforts of student leaders of the past and to foster student leadership and academic excellence among the students of the present."
