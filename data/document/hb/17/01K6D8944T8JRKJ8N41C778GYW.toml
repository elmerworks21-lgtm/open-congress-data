congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 9184, OTHERWISE KNOWN AS \\\"AN ACT PROVIDING FOR THE MODERNIZATION, STANDARDIZATION AND REGULATION OF THE PROCUREMENT ACTIVITIES OF THE GOVERNMENT\\\" AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims, among others, to ensure that the quality of the goods and services to be procured by the Government is not sacrifices as it pursues the best price for such goods and services; Empowers the Bids and Awards Committee (BAC)to also consider such, consistent with the guidelines to be provided the Government Procurement Policy Board (GPPB); Likewise seeks to expedite bureaucratic processes in cases where the need for public bidding has been rendered unnecessary by contracts which are priced equal to or lower than the Suggested Retail Price (SRP). . ."
