congress_website_title = "AN ACT RATIONALIZING THE RESOURCE MANAGEMENT OF THE WATER SECTOR, CREATING THE DEPARTMENT OF WATER, SEWAGE, AND SANITATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to appropriate and release the sum of Three Hundred Million Pesos (P300,000,000.00) for the organization of the Department and its initial operations. Tasks the Department with developing and implementing comprehensive program including, but not limited to: a) implementing necessary policy and resource reforms with respect to the management of water, sewage, and sanitation; b) monitoring and evaluating compliance with the Social Contract of the President and the Millenium Development Goals as they relate herein. c) formulating a national updated road map to address the requirements of the State; and d) improving conservation of water and increasing system efficiencies."
