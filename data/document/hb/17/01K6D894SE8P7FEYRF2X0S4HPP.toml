congress_website_title = "AN ACT REQUIRING THE ESTABLISHMENT OF FULLY-EQUIPPED SCIENCE LABORATORIES IN EVERY PUBLIC ELEMENTARY AND SECONDARY SCHOOL AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides infrastructure projects for the upgrade, maintenance and development of laboratory rooms and facilities in all elementary and secondary schools. Gives tax incentives to private entities engaging in S&T development; 20% tax deduction from the total revenue obligations for private schools who shall import laboratory equipment/facilities for the exclusive use in their school; 3% tax incentive from the importation of raw materials for private entities engaged in the manufacture of laboratory equipment needed in public schools."
