congress_website_title = "AN ACT ORDAINING STANDARDIZATION OF STEEL REINFORCING BAR QUALITY IN HIGH RISE INFRASTRUCTURES TO RESIST AGAINST WIND AND EARTHQUAKE IN THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Recognizes the critical role of steel reinforcing bars (\\\"rebars\\\") in the construction of high-rise infrastructures by making mandatory the use of, at the minimum, grade 60 microalloyed steel rebars, which are capable of passing the cyclic loading test. Provides for the following provisions as regards to: Certification of Conformity; Embossing of Manufacturer Label and Steel Grade; Periodic and Random Testing; and Prohibited Acts and Practices which includes among others, the use of Quench Tempered or Thermomechanically Treated Steel Rebars."
