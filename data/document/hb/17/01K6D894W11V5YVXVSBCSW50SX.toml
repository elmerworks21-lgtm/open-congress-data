congress_website_title = "AN ACT CREATING THE NATIONAL COMMISSION FOR THE URBAN POOR AMENDING EXECUTIVE ORDER 82 OF 1986, AS AMENDED, WHICH CREATED THE PRESIDENTIAL COMMISSION FOR THE URBAN POOR, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Institutionalizes and strengthens the powers of the Presidential Commission for the Urban Poor (PCUP) through the creation of the National Commission for the Urban Poor (NCUP). Proposes to introduce the following: 1) Social preparations in resettlement and relocation of the urban poor; 2) Amendments to some provisions of R.A.7279 (Urban Development and Housing A Law); and 3) Institutionalization of new programs and activities of the Commission. Recommends that the Commission be part of inter-agency formation, among others, as follows: a) National Urban Development and Housing Framework; b) Identification of Sites for Socialized Housing; c) Livelihood projects for Urban Poor Settler Families Fund d) Promotion of the concept of “TOWNSHIP” or “RESETTLEMENT SITES” within economic zones, etc."
