congress_website_title = "AN ACT TO PROTECT MARINE MAMMALS AND ENSURE THEIR SURVIVAL FOR THE BENEFIT OF FUTURE GENERATIONS"
congress_website_abstract = "Seeks to address “data deficient” status of the populations of most marine mammals in the country so that they can be evaluated and identified whether critically endangered, endangered, and vulnerable. Intends to encourage and support research of wildlife populations by partnering with local community organizations, academic and scientific institutions in order to form a database that will support conservation programs. Creates the Marine Protected Areas and Networks and Marine Corridors that shall seek to protect wild populations from heavy industries; and the Marine Mammal Protection and Conservation Committee (MMPCC) tasks with functions related to research programs; rescue of stranded animals; dolphin and whale-watching tours; rescued, stranded or rehabilitated marine mammals, etc."
