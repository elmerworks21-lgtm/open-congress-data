congress_website_title = "AN ACT REQUIRING LAND, AIR, AND SEA TRANSPORT PROVIDERS TO PROVIDE PRIORITY SEATING FOR THE ELDERLY, FURTHER AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 7432, AS AMENDED BY REPUBLIC ACT NO. 9257 AND 9994, OTHERWISE KNOWN AS THE EXPANDED SENIOR CITIZENS ACT OF 2010"
congress_website_abstract = "States that all transport providers shall reserve and designate the best possible seats for senior citizens which shall be clearly labelled to indicate that other passengers may use them but must vacate them if they are needed by an elderly passenger. Provides that air and sea transport providers shall ensure that priority seats are made available DURING THEIR RESERVATION."
