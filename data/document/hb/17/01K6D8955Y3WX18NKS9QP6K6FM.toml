congress_website_title = "AN ACT ESTABLISHING THE OVERSEAS FILIPINO WORKERS HOSPITAL AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes to establish a national hospital facility with departmentalized clinical services and select specialty care for OFWs and their families to fill in the gaps of paving better access and in providing higher quality of healthcare. Aims to provide comprehensive health care services to OWWA contributors and their legal dependents; conduct medical examinations to ensure the physical and mental capability of would-be OFWs; serve as primary referral hospital for repatriated OFW needing medical attention; generate relevant information and data for policy formulation; and participate in the health care provider networks and arrangements in accordance with Universal Health Care Act."
