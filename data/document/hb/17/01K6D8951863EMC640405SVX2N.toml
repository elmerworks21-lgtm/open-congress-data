congress_website_title = "AN ACT PROVIDING COMPASSIONATE AND RIGHT OF ACCESS TO MEDICAL CANNABIS AND EXPANDING RESEARCH INTO ITS MEDICINAL PROPERTIES"
congress_website_abstract = "Aims to provide patients and those afflicted with serious diseases to have alternative option in treating their illness and alleviate their suffering from it by allowing the use of \\\"medical cannabis\\\" with the proper diagnosis and prescription by licensed physicians. Intends to provide safety measures and regulation on the medical use of cannabis which has been confirmed to have beneficial and therapeutic uses to treat chronic or debilitating diseases or medical condition that produces one or more of the following: cachexia or wasting syndrome; severe and chronic pain; severe nausea; seizures (like epilepsy); or severe and persistent muscle spasms (like multiple sclerosis), to ensure the health and safety of the public."
