congress_website_title = "AN ACT REQUIRING PERSONNEL OF BUSINESS ESTABLISHMENTS, MEMBERS OF ORGANIZATIONS OR ASSOCIATIONS AND ALL OTHER PERSONS PROVIDING TOURISM SERVICES TO UNDERGO BASIC FIRST AID TRAINING"
congress_website_abstract = "Mandates all personnel of business establishments, members of organizations or associations providing tourism services to undergo basic first aid training by the Philippine National Red Cross and other reputable organizations or institutions providing such training who shall issue the necessary certifications for this purpose. Ensures the safety of tourists by requiring such establishments to be equipped with first aid kits that the local government units shall inspect on a periodic or regular basis."
