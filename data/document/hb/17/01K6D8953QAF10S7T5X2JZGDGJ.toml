congress_website_title = "AN ACT PENALIZING THE USE OF A CONTRACTOR'S LICENSE BY ANOTHER PERSON AND INCREASING THE PENALTIES FOR THE IRREGULAR USE OF A CONTRACTOR'S LICENSE, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 4566, AS AMENDED, OTHERWISE KNOWN AS THE \\\"CONTRACTORS' LICENSE LAW"
congress_website_abstract = "Proposes to deter unscrupulous contractors from borrowing or lending a contractor's license for a fee or commission by punishing such acts in order to prevent, if not totally eradicate, the said practice which is inimical to public safety and interest. Amends Sec.35 of \\\"Contractors' License Law\\\" with an imprisonment of one to two years, or a fine of P200,000.00 to P1,000,000.00, or both, at the discretion of the court."
