congress_website_title = "AN ACT SEPARATING THE REGULATORY AND COMMERCIAL FUNCTIONS OF THE PHILIPPINE PORTS AUTHORITY (PPA) BY CONVERTING IT INTO PHILIPPINE PORTS CORPORATION FOR DEVELOPMENT, MANAGEMENT AND OPERATION OF PUBLIC PORTS WITHIN ITS SYSTEM AND TRANSFERRING THE REGULATORY FUNCTIONS TO THE MARITIME INDUSTRY AUTHORITY (MARINA)"
congress_website_abstract = "Addresses the problems of port users (e.g. domestic shippers, exporters and importers) as to low service levels, inefficient port operations and ever-increasing port charges. Aims to reform the country´s ports administration to avoid conflict of interest arising from regulatory agencies vested with both regulatory and development or commercial functions, States that Philippine Ports Corporation (PHILPORTS) is a public enterprise, is not primarily a revenue-generating entity but a service provider. As such, its shall always give utmost priority and importance to public service delivery and promotion of public interest."
