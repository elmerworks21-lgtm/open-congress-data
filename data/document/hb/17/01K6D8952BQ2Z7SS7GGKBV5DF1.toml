congress_website_title = "AN ACT ESTABLISHING THE SMALL AND MEDIUM ENTERPRISES STOCK EXCHANGE"
congress_website_abstract = "Proposes the creation of an efficient and effective SMEX which will serve as the equities market of SMEs in order to broaden and deepen its capital markets through increased access to financing and therefore provides both foreign and local investors another opportunity for investment. Provides that operation and activites of the SMEX shall be managed and controlled by the Board of Governors composed of the Governor of the BSP, SEC/PSE representative, and five members from the SMEX."
