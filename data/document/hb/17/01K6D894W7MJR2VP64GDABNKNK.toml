congress_website_title = "AN ACT PROVIDING FOR THE EFFECTIVE ENFORCEMENT OF ENVIRONMENTAL LAWS OF THE PHILIPPINES, AMENDING THE PHILIPPINE NATIONAL POLICE REORGANIZATION AND MODERNIZATION LAW, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides that LGUs, DILG, DENR, may, when they deem necessary, call upon PNP, AFP, PCG and the NBI for the enforcement of environmental laws, Eos, and their implementing rules and regulations. Proposes to create the “Forest and Park Ranger Command” as an integral operations unit of the PNP tasked to enforce the environment laws of the country and of its LGUs, including forest, forestry, and protected areas laws and ordinances."
