congress_website_title = "AN ACT STRENGTHENING THE MOST BASIC POLITICAL SUBDIVISIONS OF THE STATE BY PROVIDING ITS MEMBERS WITH JUST COMPENSATION, AMENDING REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE \\\"LOCAL GOVERNMENT CODE OF 1991\\\", AS AMENDED, AND REPUBLIC ACT NO. 10742, OTHERWISE KNOWN AS THE \\\"SANGGUNIANG KABATAAN REFORM ACT OF 2015\\\""
congress_website_abstract = "Seeks to provide all officers and members of our Barangay and Sangguniang Kabataan with just and proportionate allowances and benefits as follows: Punong Barangay - Not less than THREE THOUSAND PESOS (P3,000.00) per month; Sangguniang Barangay Members, Barangay Treasurer and Barangay Secretary - Not less than THREE THOUSAND SIX HUNDRED PESOS (P3,600.00) per month; Sangguniang Kabataan Secretary, Treasurer and Members - Equivalent to ONE HALF (1/2) of the monthly allowances and benefits received by the Sangguniang Kabataan Chairman."
