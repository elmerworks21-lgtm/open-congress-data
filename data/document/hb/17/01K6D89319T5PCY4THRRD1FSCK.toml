congress_website_title = "AN ACT DIRECTING THE REDUCTION OF ELECTRICITY RATES THROUGH THE UTILIZATION OF THE GOVERNMENT SHARE IN THE DISCOVERY, EXPLORATION, DEVELOPMENT AND/OR PRODUCTION OF INDIGENOUS SOURCES OF ENERGY FOR THE PURPOSE OF LOWERING THE COST OF ELECTRICITY"
congress_website_abstract = "Lowers the government share in the exploration, development and production of indigenous energy resources other than those already covered by the Renewable Energy Act of 2008; sets such government share at the level that maintains the relative preference to indigenous renewable energy resources and still provide for a substantial revenue for the government; and remove the disparities in tax/royalty treatment between indigenous energy resources and imported fuels, thereby seeking to lower electricity rates to Filipino consumers in a significant and sustainable manner."
