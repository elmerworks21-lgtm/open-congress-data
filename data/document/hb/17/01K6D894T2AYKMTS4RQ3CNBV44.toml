congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 9136, OTHERWISE KNOWN AS THE \\\"ELECTRIC POWER INDUSTRY REFORM ACT OF 2001\\\" OR EPIRA, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to provide for the determination of the beneficiaries of the lifeline rate - the low-income or the marginalized end-users, to ensure that the Lifeline Rate subsidy will truly reach its intended beneficiaries. Amends EPIRA to provide for a socialized pricing mechanism as follows: 100% discount - electricity consumption not exceeding 20 kwh; 50% discount - electricity consumption not exceeding 50 kwh; 35% discount - electricity consumption not exceeding 70 kwh; 20% discount - electricity consumption not exceeding 100 kwh."
