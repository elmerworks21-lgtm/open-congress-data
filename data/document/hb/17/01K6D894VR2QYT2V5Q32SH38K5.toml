congress_website_title = "AN ACT GRANTING EDUCATIONAL ASSISTANCE AND BENEFITS TO THE DEPENDENTS OF ALL MEMBERS OF THE ARMED FORCES OF THE PHILIPPINES (AFP), PHILIPPINE NATIONAL POLICE (PNP), BUREAU OF FIRE PROTECTION (BFP), BUREAU OF JAIL MANAGEMENT AND PENOLOGY (BJMP), NATIONAL BUREAU OF INVESTIGATION (NBI), PHILIPPINE DRUG ENFORCEMENT AGENCY (PDEA), PHILIPPINE COAST GUARD (PCG) AND BUREAU OF CORRECTIONS (BUCOR) WHO ARE KILLED OR PERMANENTLY INCAPACITATED WHILE IN THE PERFORMANCE OF THEIR DUTY OR BY REASON OF THEIR OFFICE OR POSITION"
congress_website_abstract = "Defines “Permanent Incapacity” as physical or mental ill-health or infirmity which is: permanent; prevents a member from pursuing his or her normal employment; and seriously impairs his or her earning capacity. Provides for the grant of full scholarship to such surviving children, from kindergarten to tertiary level whether baccalaureate, formal or non-formal education or training in a non-exclusive school or institution. Also extends the grant of educational assistance and benefits to the surviving spouse and if the deceased or disabled personnel is single, his or her qualified dependent siblings may also avail of the benefit."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_17/HB08202.pdf"]

