congress_website_title = "AN ACT STRENGTHENING THE BARANGAYS THROUGH SUPPORT FOR BARANGAY OFFICIALS AND VOLUNTEER WORKERS"
congress_website_abstract = "Intends to ensure that the people working in the barangay level are highly-motivated, effective, and capable in the planning and implementation of local projects and programs. Proposes to properly compensate and reward them for quality performance, and promote constant appraisal of their skills by providing other incentives and benefits such as honorarium, trainings and workshops, PhilHealth and free legal services for barangay health workers, barangay tanods, barangay officials and volunteer workers."
