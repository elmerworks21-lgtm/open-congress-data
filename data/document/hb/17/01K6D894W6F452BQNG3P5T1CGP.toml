congress_website_title = "AN ACT AMENDING SECTIONS 229 AND 230 OF REPUBLIC ACT NO. 7160, AS AMENDED, OTHERWISE KNOWN AS THE \\\"LOCAL GOVERNMENT CODE OF 1991\\\", AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address a procedural problem under the Code as regards to the appeal on the assessment of real property or the tax due thereon to the Local Board of Assessment Appeals. Seeks to legislate a period of twelve (12) months from the date of receipt of the appeal to the Central Board of Assessment Appeals, and deletes the provision stating that its decision shall be final and executory and allows parties adversely affected to obtain judicial recourse by means of appeal to the Court of Tax Appeals. Intends to adjust the number of Hearing Officers to a maximum of seven (7) each for Luzon, Visayas, and Mindanao, to be determined as the caseload may require."
