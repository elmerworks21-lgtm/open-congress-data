congress_website_title = "AN ACT PROVIDING FOR THE REMEDY OF FILING A PETITION FOR CERTIORARI TO THE SUPREME COURT TO REVIEW THE DECISIONS OF THE NATIONAL LABOR RELATIONS COMMISSION AMENDING FOR THE PURPOSE ARTICLES 229 AND 230 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE \\\"LABOR CODE OF THE PHILIPPINES\\\""
congress_website_abstract = "Mandates that no appeal or petition from the decisions, awards or orders of the labor arbiter shall be entertained by any court or agency except the National Labor Relations Commission. Provides that decisions, resolutions, orders or awards of the National Labor and Relations Commission shall be reviewable only by the Supreme Court on petition for cetriorari under the Rules of Court solely on questions of law or jurisdiction in the exercise of its powers under paragraph (1) Section 5, Article VIII of the 1987 Constitution of the Philippines."
