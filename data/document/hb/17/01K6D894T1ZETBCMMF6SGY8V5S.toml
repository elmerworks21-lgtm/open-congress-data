congress_website_title = "AN ACT STRENGTHENING REPUBLIC ACT 9501, OTHERWISE KNOWN AS THE \\\"MAGNA CARTA FOR MICRO, SMALL, AND MEDIUM ENTERPRISES\\\" AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to amend Republic Act No. 9501 to address the lack of access to domestic and international markets, as one among the barriers/issues that hinder the growth and development of MSMEs. Aims to provide another avenue by which MSMEs can gain market access on a continuing basis by inserting the following amendment to the existing law: “PRIVATE MALLS AND SUPERMARKETS SHALL PROVIDE AT LEAST TEN PERCENT (10%) OF THEIR TOTAL SELLING AREA, FREE OF CHARGE, TO QUALIFIED MSMEs WHICH WILL BE IDENTIFIED BY THE DEPARTMENT OF TRADE AND INDUSTRY”."
