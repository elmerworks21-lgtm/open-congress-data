congress_website_title = "AN ACT ESTABLISHING PUBLIC SCHOOLS AND ACCESS ROADS LEADING TO LAST MILE PUBLIC SCHOOLS AND GEOGRAPHICALLY ISOLATED AND DISADVANTAGED AREAS (GIDA)"
congress_website_abstract = "Proposes the convergence between the DPWH and the DepEd in comprehensive planning and constructing infrastructures that will benefit public students in: a) Geographically Isolated and Disadvantage Areas (GIDA); b) Last Mile Schools; c) With No Access Roads to All Learners (ARAL). Provides also for an inventory of all school buildings in all public elementary and secondary schools in order to determine the physical status of each structure and attends to the repair, rehabilitation and construction of new ones in anticipation of the increase in student population by virtue of the implementation of R.A. No. 10533 (Enhanced Basic Education Act). Intends that all schools under this Act shall gain access to the availability of the programs under School of the Future (SOFT), consistent with the emerging Fourth Industrial Revolution and socio-economic realities which may be spurred by fast-pace technological progress."
