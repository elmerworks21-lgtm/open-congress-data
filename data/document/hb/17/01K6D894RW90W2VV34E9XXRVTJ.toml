congress_website_title = "AN ACT PROHIBITING THE IMPOSITION OF INTEREST AND/OR PENALTY CHARGES ON UNPAID HOSPITAL BILLS AND MEDICAL EXPENSES TO PATIENTS WHO EARN MINIMUM WAGE OR LESS"
congress_website_abstract = "The prohibition aims to supplement Republic Act No. 9439: “AND ACT PROHIBITING THE DETENTION OF PATIENTS IN HOSPITAL AND MEDICAL CLINICS ON THE GROUND OF NONPAYMENT OF HOSPITAL BILLS OR MEDICAL EXPENSES” to give discharged patients a chance to address the burden of interest earned by the principal hospital balance as it accrues over time Also proposes that prohibition extend to patients who are minors, whose parents belong to the less privileged or the minimum wage earners or less."
