congress_website_title = "AN ACT INSTITUTIONALIZING PRE-SCHOOL EDUCATION, INCREASING THE MONTHLY COMPENSATION OF DAY CARE WORKERS AND FOR OTHER PURPOSES"
congress_website_abstract = "Institutionalizes pre-school education as part of the compulsory basic education and provides that Barangay Day Care Centers (R.A. 6972) constitute said public sector institution; Mandates pre-school teachers to continuously undergo the necessary trainings and provides for their monthly basic salary based on the compensation of public school teachers under the SSL, as amended; Enumerates the functions of the DSWD and qualifications and appointment of day care workers."
