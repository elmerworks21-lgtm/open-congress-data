congress_website_title = "AN ACT PROMOTING THE PHILIPPINE FILM INDUSTRY THROUGH AN ANNUAL FILM QUOTA AND OTHER SUPPORT MEASURES"
congress_website_abstract = "Proposes to promote the local film industry by establishing an annual film quota that requires all theater cinema to exhibit only locally produced movies for a period of twenty-eight (28) days, namely: from the 1st to 14th of June, and from the 18th to the 31st of December and such additional dates or period as provided in this Act. Provides that only Filipino films shall be publicly exhibited in all commercial theaters as well as in all theatrical venues operated by the Film Development Council of the Phils., The Cultural Center of the Phils., and the National Commission for the Culture and the Arts, and any such cinematic venues."
