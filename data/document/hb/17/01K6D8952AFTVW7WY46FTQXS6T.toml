congress_website_title = "AN ACT INSTITUTING REFORMS TO PROMOTE AND PROTECT THE ECONOMIC, SOCIAL, POLITICAL RIGHTS AND WELL BEING OF COMMUNITY HEALTH WORKERS TOWARDS QUALITY HEALTH SERVICES DELIVERY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Provides that there shall be one Barangay Health Center in every barangay which shall have: the basic and essential facilities and provisions; different functions related to the delivery of public health services in the community level; and its components as Community Health Team(CHT). Proposes for Barangay Health Workers' (BHWs) qualifications, compensation, incentives and benefits; Community Health Team´s (CHT) positions and hiring process, Community Health Workers (CHW) duties and responsibilities."
