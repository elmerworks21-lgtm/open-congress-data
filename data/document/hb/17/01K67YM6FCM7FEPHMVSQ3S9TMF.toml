congress_website_coauthors_raw = ["SALO, RON P.","ALONTE-NAGUIAT, LEN B.","GARCIA, JOSE ENRIQUE III S.","PRIMICIAS-AGABAS, MARLYN L.","TAMBUNTING, GUSTAVO S."]
congress_website_committee_codes = ["0504","0520","0532"]
congress_website_primary_keys = [169992]
congress_website_title = "AN ACT PROVIDING SUPPORT FOR THE SURVIVING SPOUSE AND CHILDREN OF SLAIN JUSTICES AND JUDGES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 910, AS AMENDED, ENTITLED \\\"AN ACT TO PROVIDE FOR THE RETIREMENT OF JUSTICES OF THE SUPREME COURT AND OF THE COURT OF APPEALS, FOR THE ENFORCEMENT OF THE PROVISIONS HEREOF BY THE GOVERNMENT SERVICE INSURANCE SYSTEM, AND TO REPEAL COMMONWEALTH ACT NUMBERED FIVE HUNDRED AND THIRTY-SIX\\\", AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Entitles the surviving spouse and children of the slain judge or justice the salary plus the highest monthly aggregate of transportation, representation and other allowances such as Personal Economic Relief Allowance (PERA) and additional compensation allowance received by an associate justice of the Supreme Court; and a gratuity equivalent to ten (10) years salary, lump sum, to be computed based on all the salaries and other benefits of an associate justice of the Supreme Court. Provides that upon the death of the surviving spouse, the benefits of such spouse was receiving shall be transferred to the surviving children of the slain justice or judge. Provides further, that if the surviving spouse and children have not received the full lump sum due them within one (1) year from the death of the justice or judge, the lump sum still to be granted shall be computed based on the difference between the amounts already received and the ten (10) year lump sum based on the current rates of salaries, benefits, allowances and other grants given to an associate justice of the Supreme Court."
