congress_website_title = "AN ACT ENHANCING THE CONTINUING PROFESSIONAL DEVELOPMENT OF FILIPINO WORKERS AND PROFESSIONALS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10912, OTHERWISE KNOWN AS THE \\\"CONTINUING PROFESSIONAL DEVELOPMENT ACT OF 2016\\\""
congress_website_abstract = "Seeks to amend some provisions of Republic Act No.10912 with the following provisions: a) That registered and licensed professional are exempted from compliance within the FIRST FIVE YEARS after obtaining their licenses; b) That failure to comply with CPD shall only be a basis to deny renewal of Professional Identification Cards after the lapse of the compliance period; c) That licensed Professional OFWs shall be exempted from the requirement for the period of their overseas employment; and d) That professionals shall only be required to obtain a maximum of 36 CPD credit units once every five years."
