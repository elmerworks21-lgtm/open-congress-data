congress_website_title = "AN ACT TO INSTITUTIONALIZE DEPLOYMENT OF TEACHER TO THE BARRIOS"
congress_website_abstract = "Intends to address the problem of accessibility to basic education through the institutionalization of a Teacher to the Barrios program for the DepEd to provide basic education to the pupils/students in geographically isolated communities. Proposes to create a program, whereby teachers shall be deployed to remote, far-flung areas to educate these children with a parallel module to that of a formal basic education in a form of study session, which may be conducted in a public community hall, or a private hall/place."
