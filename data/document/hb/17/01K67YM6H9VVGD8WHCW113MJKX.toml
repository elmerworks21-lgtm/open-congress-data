congress_website_title = "AN ACT STRENGTHENING THE REGULATION OF EMPLOYMENT OF FOREIGN NATIONALS AMENDING FOR THE PURPOSE ARTICLES 40, 41 AND 42 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE \\\"LABOR CODE OF THE PHILIPPINES\\\""
congress_website_abstract = "Mandates that ALL NON-RESIDENT FOREIGN NATIONALS seeking employment in the Philippines shall obtain an employment permit from the Department of Labor and Employment and shall be subjected to a Labor Market Test based on non-availability of qualified and willing Filipino nationals. States that foreign nationals issued employment permits shall transfer technology to Filipino understudies within a prescribed period. Prohibits foreign national issued an employment permit to transfer to another job or change employer without prior approval of the Secretary of Labor and Employment."
