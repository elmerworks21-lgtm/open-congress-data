congress_website_title = "AN ACT TO STRENGTHEN AND ENHANCE THE USE OF ENGLISH AS THE MEDIUM OF INSTRUCTION IN THE EDUCATIONAL SYSTEM"
congress_website_abstract = "Aims to develop the aptitude, competence and proficiency of our students in the English language to maintain and improve their competitive edge in emerging and fast-growing local and international industries, particularly in the area of Information and Communications Technology (ICT); Provides among others that English shall be used as the MOI for English, Mathematics and Science, from at least the 3rd Grade Level and as primary MOI in all public and private institutions of learning in the Secondary Level. Provides that the percentage of time allotment for learning areas conducted in the English language is expected to be not less than 70% of the total time allotment for all learning areas in the Secondary Level."
