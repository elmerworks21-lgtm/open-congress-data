congress_website_title = "AN ACT PROVIDING FOR THE MANDATORY INSTRUCTION OF PHILIPPINE CINEMA APPRECIATION IN SECONDARY EDUCATIONAL INSTITUTIONS IN THE COUNTRY AND FOR OTHER PURPOSES"
congress_website_abstract = "Mandates the Department of Education , in consultation with the National Commission for Culture and Arts, Film Development Council of the Philippines and the University of the Philippines Film Institute, to formulate courses and lectures on Philippine Cinema to be taught in secondary schools across the country as separate subjects or incorporated in existing subjects now being taught to focus on its appreciation as a collective body of artistic creation that enhance and reflect the cultural and societal identity of our nation."
