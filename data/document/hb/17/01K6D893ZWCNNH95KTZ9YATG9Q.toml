congress_website_title = "AN ACT AMENDING THE REPUBLIC ACT 8178, OTHERWISE KNOWN AS THE \\\"AGRICULTURAL TARIFFICATION ACT\\\" AND PRESIDENTIAL DECREE NO. 4, AS AMENDED, OTHERWISE KNOWN AS, \\\"PROCLAIMING THE CREATION OF THE NATIONAL GRAINS AUTHORITY AND APPROVING FUNDS THEREFOR\\\""
congress_website_abstract = "Seeks to prescribe tariff rates for rice importations which will be a revenue raising activity for the Government which can be set aside to strengthen the rice sector to meet head-on the challenges of confronting import threats and keeping the Philippines food secure; Provides that funds that will be allocated to the rice sector follows a Rice Industry roadmap that shall be based on the ff. principles: rice industry competitiveness; farmers' profitability; support focusing on the whole-value chain; and technology-oriented, location, situation, and farmer-specific support services."
