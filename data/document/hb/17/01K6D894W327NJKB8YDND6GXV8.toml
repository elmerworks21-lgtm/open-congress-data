congress_website_title = "AN ACT TRANSFERRING TO THE PHILIPPINE NATIONAL POLICE THE OPERATIONAL SUPERVISION AND CONTROL OVER POLICE UNITS ASSIGNED OR STATIONED IN LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6975, AS AMENDED, OTHERWISE KNOWN AS THE \\\"DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990\\\""
congress_website_abstract = "Defines the term “operational supervision and control” as the power to direct, superintend, and oversee the day-to-day functions of police investigation of crime, crime prevention activities, and traffic control in accordance with the rules and regulations promulgated by the Commission. It also includes the power to direct the employment and deployment of units or elements of the PNP, through the station commander, to ensure public safety and effective maintenance of peace and order within the locality."
