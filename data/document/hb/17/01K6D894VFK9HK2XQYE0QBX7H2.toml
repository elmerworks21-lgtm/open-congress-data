congress_website_title = "AN ACT ESTABLISHING A SENIOR CITIZENS DAY CARE CENTER IN EVERY BARANGAY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Intends to support the provision in Art.XV, Sec.4 of the 1987 Philippine Constitution that the State shall prepare for the care, support and comfort to the vulnerable aging members of its population, in the incapacity or deficiency of the family to fulfill its duties. Seeks to create barangay-level senior citizens´ day care centers to substantially supplement the insufficiency of senior citizens centers and homes in all communities nationwide, and guarantee the daily basic care for our nation´s elderly."
