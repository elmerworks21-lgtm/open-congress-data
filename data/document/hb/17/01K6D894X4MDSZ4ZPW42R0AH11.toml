congress_website_title = "AN ACT PROVIDING FOR ADDITIONAL SUPPORT AND COMPENSATION FOR EDUCATORS IN BASIC EDUCATION"
congress_website_abstract = "States that an amount of Ten Thousand Pesos (P10,000.00) per month shall be granted as additional compensation to the existing salary and benefits of the concerned Educators which shall be paid in three (3) tranches, as follows: First Year - P4,000.00 per month; Second Year - additional P3,000.00 per month Third Year - another additional of P3,000.00 per month. Provides for authorized additional support as follows: a.Support in the form of allowances and other remuneration funded from local school board funds; b.Medical allowance for medical check-up in the amount of One Thousand Pesos (P1,000.00) per year; c.Annual Magna Carta bonus which shall be equivalent to the entitlement under RA 4670."
