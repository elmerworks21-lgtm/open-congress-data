congress_website_title = "AN ACT TO PROMULGATE A CONSUMER PRODUCT SAFETY STANDARD FOR EACH DURABLE INFANT OR TODDLER PRODUCT"
congress_website_abstract = "Proposes to prevent unsafe nursery/children´s products from getting to the market by requiring independent testing of all durable infant and toddler products by the Department of Trade. Enumerates these products intended for use, or that may be reasonably expected to be used, by children under the age of five years, which includes among others: cribs, toddlers beds/chairs, walkers, carriers strollers, and swings."
