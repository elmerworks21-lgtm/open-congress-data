congress_website_title = "AN ACT AMENDING SECTIONS 22, 24, 25, 27, 28, 29, 30, 32, 34, 37, 38, 39, 42, 51, 52, 54, 56, 57, 73, 108, 121, 122, 123, 174, 176, 179, 181, 182, 183, 184, 185, 186, 187, 188, 189, 190, 191, 194, 195, 196, 197, 198, AND 199; AND REPEALING SECTIONS 127, 175, 177, 178, 180, 192, AND 193; ALL UNDER REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to achieve the following objectives: 1.) redesign financial sector taxation by making it simpler, fairer, and more efficient; 2.) provide neutrality in tax treatment across financial institutions and financial instruments; 3.) improve equity across investors and savers; 4.) minimize arbitrage opportunities; and 4.) promote capital market development and tax competitiveness within the context of financial globalization, increased capital mobility, and financial inclusion. Proposes the following reforms: 1.) reduction in the number of rates of withholding taxes; 2.) unifies the tax rates for interests, dividends, and capital gains; 3.) harmonizes business rates; 4.) removal or minimization of barriers to capital market development"
