congress_website_title = "AN ACT REQUIRING THE INTEGRATION OF BASIC COMPUTER LITERACY AND ADVANCED COMPUTER EDUCATION AS ADDITIONAL REQUIREMENTS IN THE CURRICULA OF GRADES 3 TO 12 OF THE \\\"K TO 12\\\" (K-12) EDUCATIONAL SYSTEM IN ALL PUBLIC SCHOOLS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the following rules and regulations: 1.) adoption of a uniform syllabus for every applicable computer literacy program commensurate to the grade levels of the “K-12” program; 2.) training of qualified members of the school faculty; 3.) establishment of at least one (1) computer laboratory for every school; 4.) acquisition of desktop computers and peripherals primarily through donation; 5.) necessary maintenance of computers and peripherals acquired; 6.) acquisition and maintenance of WIFI network connectivity for the computer laboratory; and 7.) commencement of the entire program, which is at the start of the school year immediately following the effectivity of this Act."
