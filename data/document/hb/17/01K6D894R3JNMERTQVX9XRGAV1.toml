congress_website_title = "AN ACT PROVIDING A MECHANISM FOR GENERATING QUALITY GRADUATES OF HIGHER EDUCATION INSTITUTIONS BASED ON PERFORMANCE IN PROFESSIONAL LICENSURE EXAMINATIONS"
congress_website_abstract = "Provides for the continued government accreditation of professional degree courses of higher education institutions based on the performance of their graduates in professional boards and bar examinations; Proposes to permanently revoke government recognition and/or permit to operate pertinent and related professional courses whose graduates registered zero-performance in three (3) out of five (5) consecutive times they participated; Requires the publication of results in nationally circulated newspapers showing the percentage of successful examinees."
