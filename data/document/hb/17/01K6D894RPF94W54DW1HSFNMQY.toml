congress_website_title = "AN ACT CREATING THE COMMISSION ON IMMIGRATION, DEFINING ITS POWERS AND FUNCTIONS, EXPANDING, RATIONALIZING AND FURTHER PROFESSIONALIZING ITS ORGANIZATION, UPGRADING THE COMPENSATION AND BENEFITS OF ITS OFFICIALS AND EMPLOYEES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to create the Commission on Immigration which shall be under the control and supervision of the Department of Justice (DOJ). The Commission shall be responsible in the implementation of all laws, rules, regulations or orders of any competent authority concerning the entry and admission into, stay in, and the departure from the Philippines of all persons."
