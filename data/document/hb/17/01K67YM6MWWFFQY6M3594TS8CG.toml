congress_website_abstract = "Aims to require graduating students from grade school, high school, and college to plant at least ten (10) trees as a mandatory prerequisite for their graduation which shall be their living legacy to the environment and to the future generations. States that the planted trees should be appropriate to the location, climate and topography of the area with preference for the planting of indigenous species."
