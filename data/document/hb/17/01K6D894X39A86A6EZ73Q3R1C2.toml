congress_website_title = "AN ACT ESTABLISHING THE DEPARTMENT OF CULTURE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to establish an independent Department of Culture which will promote and develop our cultural traditions and which will serve as legitimate government body that would coordinate all activities of promoting \\\"national identity and culture.\\\" Aims to effectively preserve our Filipino heritage as well as promote the importance of Philippine arts and culture. Intends to abolish the National Commission for Culture and the Arts (NCCA); Intends to attach to the Department of Culture, the following agencies among others: Cultural Center of the Phils.; National Museum; National Historical Commission; National Library; National Archives; Komisyon sa Wikang Filipino; Intramuros Administration, etc."
