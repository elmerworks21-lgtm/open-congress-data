congress_website_title = "AN ACT TO IMPROVE AND TO PROMOTE QUALITY DELIVERY OF HEALTH SERVICES IN BARANGAYS, ENACTING THE \\\"BARANGAY HEALTH WORKERS AND SERVICES REFORM ACT OF 2018\\\""
congress_website_abstract = "Seeks to establish one Barangay Health Center in every barangay unit which shall be composed of Nurses, Midwife and Barangay Health Worker. Provides that barangay health workers shall receive an entry pay level equivalent to Salary Grade One “SG 1” and shall be entitled to the same incentives and benefits provided under the Magna Carta for Public Health Workers. Further, they shall be covered by the existing statutory benefits such as GSIS, Philhealth, and Pag-ibig."
