congress_website_title = "AN ACT PROMOTING CRITICAL MEDIA AND INFORMATION LITERACY IN THE PHILIPPINES AND PRESCRIBING ITS MANDATORY INCLUSION IN THE EDUCATION SYSTEM AND CURRICULUM IN THE PHILIPPINES, FOR SUCH OTHER PURPOSES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Defines important terms as follows: Alternative Media refers to media contents that fall outside the mainstream or dominant contents. Its contents are progressive, critical, pro-people and free from business and corporate interests. Critical Media Literacy is educational response that expands the notion of literacy to include different forms of mass communication, popular culture, and new technologies. It deepens the potential of literacy education to critically analyze relationships between media and audiences, information, and power. Along with this mainstream analysis, alternative media production empowers students to create their own messages that can challenge media texts and narratives. Seeks to create a critical media literacy curriculum not only of high school students but even primary/elementary students to help in cultivating a more informed and well-educated public to combat the surge of false information in the wake of technological advancements and in developing critical thinking skills at a very young age. Provides that all programs to be implemented and curriculum to be developed shall duly promote and safeguard the fundamental freedom of speech and expression, and shall be guided by the principles of critical media literacy education summarized as: a) Media is a COMPETENT TOOL; b) Media is EVOLVING; c) Media is produce in DIFFERENT MODES; and d) Media DOES NOT EXIST IN A VACCUUM."
