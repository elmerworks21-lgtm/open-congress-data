congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA OF THE POOR"
congress_website_abstract = "Declares it a policy of the State to uplift the standard of living and quality of life of the poor and provide them with sustained opportunities for growth and development, adopting an area-based, sectoral and focused intervention to poverty alleviation where every poor Filipino family must be empowered to meet their minimum basic needs, through the partnership of the government and the basic sector."
