congress_website_title = "AN ACT TO ENHANCE THE TAXING POWERS OF LOCAL GOVERNMENT UNITS BY AMENDING CERTAIN PROVISIONS IN BOOK II OF REPUBLIC ACT 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Aims to increase the annual fixed tax rate for delivery trucks or vans of manufacturers or producers from P500 to P1,500; reduce the taxable base of the head office from 30 % to 10 % of gross sales or revenues; increase the share of sales outlets and the likes from 70% to 90%; remove the authority of the national government to provides exemptions on local taxes, fees and charges; and limit LGUs to provide local exemptions from taxes, fees and charges."
