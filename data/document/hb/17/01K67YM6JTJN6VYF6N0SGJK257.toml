congress_website_abstract = "Encourages government institutions, private sectors and schools to observe the National Hijab Day to promote understanding and awareness among its employees and students as to the value of wearing the hijab. Mandates the National Commission on Muslim Filipinos to be the lead agency in the promotion and raising consciousness about Hijabis in the Philippines and to conduct educational drive and information dissemination campaign to effectively meet the objectives of this Act."
