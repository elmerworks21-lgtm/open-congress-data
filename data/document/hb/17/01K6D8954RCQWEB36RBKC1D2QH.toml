congress_website_title = "AN ACT ENHANCING THE FINANCIAL LITERACY OF OVERSEAS FILIPINO WORKERS (OFWs), AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to provide OFWs the necessary skills and learning to make sound decisions in all matters concerning their assets and liabilities including their resources, investments, debts, credits, and other financial transactions. Proposes to mandate financial literacy training seminars which shall become an integral part of the Pre-Departure Orientation Seminar (PDOS) and Post-Arrival Training Seminars (PATS). Seeks to tasked the Department of Finance (DOF) to formulate training modules; conduct financial and responsibility training programs; apprise OFWs on financial opportunities and pitfalls; ensure accessibility of qualified online advisers/counsellors; and disseminate knowledge-expanding activities that promote financial literacy among OFWs and their dependents."
