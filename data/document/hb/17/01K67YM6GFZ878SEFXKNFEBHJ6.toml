congress_website_title = "AN ACT ESTABLISHING A CONSOLIDATED POVERTY DATA COLLECTION SYSTEM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Provides a social tool for the formulation and implementation of poverty alleviation and development programs which are specific, targeted and responsive to the basic needs of the poor. Mandates each local government unit (LGU) to collect primary poverty data at the local level on a regular and synchronized manner at an interval of not longer than every three (3) years for the first six (6) years of the implementation of this Act and annually thereafter. Allows the LGUs to maintain their own CPDC System database which shall be received and stored by the Philippine Statistics Authority (PSA) to create a national CPDC System databank. The PSA shall undertake measures to ensure the integrity and safety of the gathered information against unnecessary leakage and unauthorized access."
