congress_website_title = "AN ACT PROVIDING FOR THE PHASE-OUT OF SINGLE-USE PLASTIC PRODUCTS IN THE COUNTRY AND FOR OTHER PURPOSES"
congress_website_abstract = "Prohibits the sale and use of single-use of plastic products three years after the effectivity of this Act and thereafter, the production, manufacture and importation of such products shall no longer be allowed. Mandates different government agencies to formulate a Phase-Out Plan to carry out the objective of phasing out single-use plastic products in the country."
