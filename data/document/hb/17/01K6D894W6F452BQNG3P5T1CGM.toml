congress_website_title = "AN ACT INSTITUTING THE MAGNA CARTA OF BENEFITS FOR THE OFFICERS AND PERSONNEL OF THE PHILIPPINE DRUG ENFORCEMENT AGENCY"
congress_website_abstract = "Proposes to ensure that PDEA agents are well provided with acceptable living and working conditions; better terms of employment; additional pays and allowances; career opportunities; and proper expert trainings, to alleviate the consequences of the hazards they face in order that they may be able to effectively carry out their mandate. Provides for the PDEA Academy and its training programs; PERA (P2,000.00); Hazard duty pay (10% - 30% of basic pay); Combat pay (25% of basic pay); Special counsel allowance (P2,500.00); Instructor´s duty pay and various regular allowances and benefits for government workers."
