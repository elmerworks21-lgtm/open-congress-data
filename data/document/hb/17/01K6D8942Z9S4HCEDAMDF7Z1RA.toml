congress_website_title = "AN ACT PROVIDING FOR THE UPGRADING OF FACILITIES AND SKILLS OF HEALTH PROVIDERS IN BARANGAY HEALTH STATION (BHS), RURAL HEALTH UNIT (RHU), DISTRICT AND COMMUNITY HOSPITALS TO MEET THE STANDARDS OF BEMONC AND CEMONC IN ARMM AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Aims to consistently improve maternal health care and reduce maternal mortality; Proposes to ensure the full implementation of Sec. 6 of RA10354 “The Responsible Parenthood and Reproductive Health Act of 2012” by providing for essential support to barangay health stations, rural health units, district and community hospitals in ARMM so they can meet the standards of Basic Emergency Obstetric and Newborn Care (BEMONC) and Comprehensive Emergency Obstetric and Newborn Care (CEMONC) through provision of additional funds for operation; equipment, including steading power supply; and training and/or hiring of health care personnel."
