congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8551, OTHERWISE KNOWN AS \\\"THE PHILIPPINE NATIONAL POLICE REFORM AND REORGANIZATION ACT OF 1998\\\" AND REPUBLIC ACT NO. 6975, OTHERWISE KNOWN AS \\\"THE DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990\\\", AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes for the People´s Law Enforcement Board (PLEB) to have jurisdiction to hear and decide cases filed by citizens, against erring members of the PNP. Grants more authority and independence to the Internal Affairs Service (IAS) as well as the PLEB to strengthen PNP accountability and lessens potential political influence. Enumerates the instances when PLEB shall conduct, motu proprio, automatic investigation of cases involving uniformed and non-uniformed PNP PERSONNEL."
