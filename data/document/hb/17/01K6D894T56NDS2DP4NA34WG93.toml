congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE NATIONAL STANDARDS FOR BANKING AND FINANCIAL SERVICE CHARGES AND CLIENT PROTECTION AND WELFARE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to empower depositors and other bank clientele with verified, credible information and sound metrics on banking performance and services, to enable them to make well-informed decisions on how to manage their personal and business finances. Tasks the Bangko Sentral to develop comprehensive and detailed sets of banking and financial services standards, corresponding objective indicators, and database of metrics of objective, qualitative and quantitative ratings on financial inclusion, service quality, and service charges. Creates the Harmonized Indices of Service Quality and Charges (HISQC) System as a transparency mechanism to enable consumers to use the standards to objectively compare, monitor, and rate banking and financial services, using computer software, electronic devices, mobile applications, and other means of telecommunications."
