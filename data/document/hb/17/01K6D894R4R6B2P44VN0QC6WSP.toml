congress_website_title = "AN ACT TO PROTECT ALL AGRICULTURAL LANDS FROM INDISCRIMINATE LAND CONVERSION AMENDING SECTION 20 OF REPUBLIC ACT 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Intends to tip the scale between agriculture and rapid industrialization to its proper balance by amending Sec.20 of R.A. 7160 to require the additional approval by the Department of Agrarian Reform (DAR) before a land conversion application can be granted; Authorizes the reclassification of IRRIGATED OR IRRIGABLE agricultural lands and provide for the manner of their utilization or disposition in cases WHEN THE LAND IS NOT IDENTIFIED AS SUBJECT TO AGRARIAN REFORM OR HAS BEEN DISTRIBUTED TO AGRARIAN REFORM BENEFICIARIES AS CERTIFIED TO BY THE DAR."
