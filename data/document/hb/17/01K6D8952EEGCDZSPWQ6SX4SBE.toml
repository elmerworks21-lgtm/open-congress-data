congress_website_title = "BATAS NA NAGTATAKDA NG HINDI BABABA SA SIYAM (9) NA YUNIT NG ASIGNATURANG FILIPINO SA KURIKULUM NG KOLEHIYO"
congress_website_abstract = "Naglalayong punan ang kakulangan ng bagong General Education Curriculum at makapag-ambag sa paglinang ng ating kamalayan sa sariling wika, kultura, at identidad, upang linangin at puspusang itaguyod and ating pambansang wika. Nilalayon din ng panukalang batas na ito ang paggamit ng wikang Filipino bilang: midyum ng opisyal na komunikasyon; sa pagtuturo sa lahat ng antas ng sistemang pang-edukasyon; sa intelektwal na diskurso; sa pagtalakay sa mga mahahalagang isyung local, pambansa, at panlipinan; sa mataas na antas ng komunikasyon; at sa pananaliksik sa pagtalakay ng iba't-ibang larangan."
