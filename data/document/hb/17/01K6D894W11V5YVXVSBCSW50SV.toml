congress_website_title = "AN ACT RECOGNIZING FILIPINO CITIZENS BORN ABROAD OF FILIPINO MOTHERS OR FATHERS"
congress_website_abstract = "States that foreign nationals born to Filipino fathers or mothers regardless of their citizenship held, shall be recognized as Filipinos and shall be granted full civil, economic and political rights enjoyed by Filipino citizens and shall be allowed to apply for dual citizenship if they choose. Mandates the issuance of a Recognition Identification Card by the Bureau of Immigration to prove Filipino citizenship in the same way as Philippine birth certificate."
