congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE NUCLEAR REGULATORY FRAMEWORK, CREATING FOR THE PURPOSE, THE PHILIPPINE NUCLEAR REGULATORY COMMISSION, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Provides for a comprehensive nuclear regulatory framework that shall protect public health and safety and the environment against the harmful effects of ionizing radiation, and for the safety and security of radiation sources. Seeks to create the Philippine Nuclear Regulatory Commission (PNRC) which shall exercise authority on the safety, security and safeguards involving the peaceful uses of nuclear materials and other radioactive materials, facilities and radiation generating equipment. Provides for the regulation and authorization of nuclear installations and radiation facilities, radiation protection, emergency preparedness and response plan, transport of nuclear and other radioactive material, import and export of nuclear and other radioactive materials , management of spent nuclear fuel, and safeguards, physical protection and security of nuclear materials. Includes provisions for civil liability for nuclear and radiation damage as well as penalties for violation."
