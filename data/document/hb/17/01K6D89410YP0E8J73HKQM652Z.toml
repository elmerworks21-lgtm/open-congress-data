congress_website_title = "AN ACT REQUIRING A SPECIAL LICENSE FOR PUBLIC UTILITY DRIVERS"
congress_website_abstract = "Aims to enhance the safety of public transport by ensuring that only qualified individuals will be allowed to drive or operate public utility buses, jeeps and other similar modes of mass public transportation; Requires all public utility drivers to secure a Utility Driver's License and mandates the LTO to create a Special Driver's Licensing Division which will administer the issuance of such."
