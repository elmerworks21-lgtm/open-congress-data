congress_website_title = "AN ACT ESTABLISHING A NATIONAL PROGRAM FOR THE CACAO INDUSTRY, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to enhance education and training of all stakeholders in the cacao industry, collecting relevant research, scientific studies and market strategies, extending technologies and creating international linkages for development and promotion of the industry and its products. Provides for the composition of the National Cacao Development Council; the development of programs related to its objectives; and specifies its powers and functions."
