congress_website_title = "AN ACT STRENGTHENING AND MODERNIZING THE WAREHOUSE RECEIPTS LAW OF THE PHILIPPINES IN ORDER TO PROVIDE A LEGAL FRAMEWORK IN THE PHILIPPINES THAT SHALL FACILITATE TRADE, COMMERCE, AND OTHER RELATED PURPOSES"
congress_website_abstract = "Defines “Warehouse receipt” as a receipt, whether electronic or otherwise, issued by a warehouseman to release the goods to a specified person. Proposes to establish a central electronic Registry for all Warehouse Receipts to be made readily available online, which shall be managed by a Warehousing Accreditation Council. Intends to enable the agricultural sector to “convert” goods and products into credit in a faster and simpler way, promote economic activity by increasing access to least cost credit by establishing a simplified, unified, and modern framework for the storage of goods in warehouses and the subsequent trading of interest therein."
