congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBER 9160, OTHERWISE KNOWN AS \\\"THE ANTI-MONEY LAUNDERING ACT OF 2001\\\", AS AMENDED BY REPUBLIC ACT NUMBERS 9194, 10167 AND 10365, AND FOR OTHER PURPOSES"
congress_website_abstract = "Introduces major amendments among others, as follows: 1) to include casinos, real estate brokers, art dealers, and motor vehicle dealers as covered persons; 2) to change nomenclature for the covered person \\\"jewelry dealers\\\" in precious metals and stones to \\\"dealers\\\" in precious metals and stones, and including jewelry dealers as a separate covered persons; 3) to provide for a definition of covered transactions as \\\"cash\\\" transactions amounting to P500,000.00 only; 4) to designate the Bangko Sentral ng Pilipinas as the Supervising Authority of foreign exchange dealers, money changers, and remittance and money transfer businesses, for purposes of the AMLA; 5) to include new unlawful activities under Sec.30(i) of the AMLA, such as violations of firearms and ammunitions regulation act, cybercrime, violations of strategic trade management act (re: weapons of mass destruction, and tax evasion; etc."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_17/HB04786.pdf"]
