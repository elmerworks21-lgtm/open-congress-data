congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA FOR THE STATISTICAL, CIVIL REGISTRATION AND PHILIPPINE IDENTIFICATION SYSTEM WORKERS OF THE PHILIPPINES, AUTHORIZING THE COLLECTION AND APPROPRIATION OF FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to ensure a reservoir of talent who are adequately provided with compensation and benefits at par with the private sector that shall address the issues confronting the human resources of the statistical, civil registration and PhilSys sectors. Mandates the creation of additional Deputy National Statisticians, transfer of the administrative and operations management, control and supervision of the Local Civil Registrars and their staff from the LGUs to PSA and the officials and employees of which shall be transferred to and absorbed by the Local Statistics Office to be established in each City and Municipality, and establishment of the Philippine Statistics AttachÃ© in each Philippine Embassy and Consular Office or clusters. Mandates the Local Chief Executives concerned to allocate and donate adequate lots or areas for the construction of buildings and structures, and sustained operations of the PSA Field Offices in their respective Municipality, City, Provincial or regional government centers; and the DBM and Congress to ensure sufficient amounts for the procurement of buildings, equipment facilities and materials for the PSA Filed Offices and Local Statistics Office."
