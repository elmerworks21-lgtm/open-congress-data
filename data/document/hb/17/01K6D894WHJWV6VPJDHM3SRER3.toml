congress_website_title = "AN ACT STRENGTHENING EARLY CHILDHOOD CARE AND DEVELOPMENT SYSTEM, REVISING FOR THE PURPOSE REPUBLIC ACT NO. 10410, OTHERWISE KNOWN AS THE \\\"EARLY YEARS ACT OF 2013\\\", AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Seeks to amend Section 11 of RA No. 10410 by increasing the amount to be contributed by the Philippine Amusement and Gaming Corporation from Five Hundred Million Pesos (P500,000,000.00) to One Billion Pesos (P1,000,000,000.00) per year for another five (5) years to fund the establishment of National Child Development Centers and the conversion of existing Day Care Centers into Child Development Centers in various local government units to be directly remitted in four (4) quarterly installments to a special account of the EDDC Council."
