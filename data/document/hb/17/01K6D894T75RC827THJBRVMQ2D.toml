congress_website_title = "AN ACT PROHIBITING THE IMPOSITION OF INTEREST AND/OR PENALTY CHARGES ON UNPAID HOSPITAL BILLS AND MEDICAL EXPENSES OF PATIENTS WHO EARN AN INCOME OF THE MINIMUM WAGE OR LESS"
congress_website_abstract = "Declares it unlawful for any hospital or medical clinic to charge interest or impose other penalties on unpaid bills for ONE YEAR from the date of the discharge, to patients who earn minimum wage or less and of minor patients whose parents or legal guardians also earn minimum wage or less, Penalizes any hospital/medical clinic officer or employee who violates the provisions of this Act by a fine of Twenty Thousand Pesos (P20,000.00) to Fifty Thousand Pesos (P50,000.00), or imprisonment of one (1) month to six (6) months, or both such fine and imprisonment."
