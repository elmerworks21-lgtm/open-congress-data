congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NO. 10068 OR THE ORGANIC AGRICULTURE ACT OF 2010"
congress_website_abstract = "Aims to further promote, propagate, develop and implement the organic farming and other sustainable agriculture practices in the country that will enrich the fertility of the soil, increase farm productivity and farmer´s income and promote food self sufficiency. Institutionalizes the Participatory Guarantee system (PGS) to help small organic farmers attain the organic certification they need to compete in local and global markets. Includes three (3) representatives from the private sector or agribusiness firms involved in organic agriculture for the last three years in the composition of the National Organic Agriculture Board (NOAB) to increase organic expertise and achieve a more balanced public-private partnership on the NOAB."
