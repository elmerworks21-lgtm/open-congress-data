congress_website_title = "AN ACT GRANTING UNIVERSAL PENSION TO ALL SENIOR CITIZENS AGED SIXTY-FIVE (65) YEARS AND ABOVE, AND FOR THIS PURPOSE INTRODUCING PARAGRAPH (I) IN SECTION 2 AND AMENDING SECTION 5 (H)(1) OF REPUBLIC ACT NO. 7432, OTHERWISE KNOWN AS \\\"AN ACT TO MAXIMIZE THE CONTRIBUTION OF SENIOR CITIZENS TO NATION BUILDING, GRANT BENEFITS AND SPECIAL PRIVILEGES AND FOR OTHER PURPOSES\\\", AS AMENDED BY REPUBLIC ACT NO. 9257, OTHERWISE KNOWN AS THE \\\"EXPANDED SENIOR CITIZENS ACT OF 2003\\\", AND AS FURTHER AMENDED BY REPUBLIC ACT NO. 9994, OTHERWISE KNOWN AS THE \\\"EXPANDED SENIOR CITIZENS ACT OF 2010\\\""
congress_website_abstract = "Provides for a monthly ONE THOUSAND PESOS (Php1,000.00) stipend or monetary grant to ALL senior citizens aged 65 years old and above and to INDIGENT senior citizens aged 60 - 64 years old to augment their daily subsistence and other medical needs. Proposes to review and increase the amount of said social pension every two (2) years, taking into account the various needs of senior citizens, the national inflation rate, and other relevant economic indicators."
