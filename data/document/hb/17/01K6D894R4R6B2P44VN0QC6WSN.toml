congress_website_title = "AN ACT PENALIZING PARENTS, ADOPTERS, GUARDIANS OR PERSONS EXERCISING SPECIAL OR SUBSTITUTE PARENTAL AUTHORITY OVER CHILDREN UNDER PARENTAL AUTHORITY FOUND TO BE ENGAGED IN BEGGING AND/OR PROSTITUTION AND FOR OTHER PURPOSES"
congress_website_abstract = "Children as mentioned in this Act refers to persons below eighteen (18) years of age including those in said age category who are unable to fully take care of themselves because of physical or mental disability or condition; Imposes the penalty of arresto mayor upon persons as stated in this Act whose children under parental custody are found to be begging or engaging in prostitution and a penalty of prision correccional upon such persons who use, coerce, intimidate, or force their children to beg or engage in prostitution."
