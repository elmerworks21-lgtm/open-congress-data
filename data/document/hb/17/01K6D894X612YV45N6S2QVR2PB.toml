congress_website_title = "AN ACT ESTABLISHING AN INTERNAL AFFAIRS SERVICE IN THE BUREAU OF IMMIGRATION AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to maintain, promote, and ensure the Bureau of Immigration's high standard of ethics in public service through the establishment of an Internal Affairs Service. It shall serve as a monitoring, investigatory, recommendatory and disciplinary body whose primary objective is to ensure that the Bureau is instilling and strengthening responsibility and accountability among its personnel."
