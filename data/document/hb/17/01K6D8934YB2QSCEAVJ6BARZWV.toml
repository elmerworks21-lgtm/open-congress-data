congress_website_title = "AN ACT SPECIFYING THE REQUIREMENTS OF LEGITIMATE CONTRACTING/SUBCONTRACTING AMENDING FOR THIS PUPROSE ARTICLES 106 TO 109 OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes the following: 1) Clearly defining legitimate contractor or subcontractor as an employer engaged in providing job, work or services to another business; 2) recognizing industry peculiarities through industry tripartite-determined functions or standards, application of the general standards on contracting and subcontracting; 3) in the absence of industry-tripartite standards, application of the general standards as determined by the Department of Labor and Employment (DOLE) Secretary, after consultation with the Tripartite Industrial Peace Council (TIPC); 4) prohibiting labor-only contracting; 5) licensing of contractors and subcontractors; 6) mandatory posting of bond to answer for the same; 7) coverage of the cooperatives as employers in contracting or subcontracting; and 8) reiteration of solidary liability in case of a finding of labor-only contracting."
