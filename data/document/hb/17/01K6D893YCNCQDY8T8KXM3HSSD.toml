congress_website_title = "AN ACT AMENDING SECTIONS 22, 24, 31, 32, 34, 35, 79, 106, 107, 108, 109, 110, 148, AND TITLE VI OF REPUBLIC ACT NO. 8424 OTHERWISE KNOWN AS \\\"THE NATIONAL INTERNAL REVENUE CODE OF 1997\\\", AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to lower personal income taxes while broadening the VAT base and adjusting excise taxes; Proposes relaxation of bank secrecy and an absolute tax amnesty; Provides for key features among others as follows: a) expanding the VAT base by limiting exemptions to raw food and other necessities, b) increasing excise tax rates on all petroleum products, c) restructuring and increasing the excise tax on automobiles; Also provides for mechanism to link adjustments in petroleum taxes to Dubai crude price se at $85/barrel."
