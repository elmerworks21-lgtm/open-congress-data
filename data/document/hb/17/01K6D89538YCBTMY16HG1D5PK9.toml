congress_website_title = "AN ACT GRANTING SUBSTITUTE CIVIL SERVICE ELIGIBILITY TO REGULAR EMPLOYEES WHO RENDERED AT LEAST SIX CONTINUOUS MONTHS OF MERITORIOUS GOVERNMENT SERVICE"
congress_website_abstract = "Proposes to extend the granting of substitute eligibility for long-time regular government employees who were able to render at least six (6) months of continuous meritorious service and/or at least with a satisfactory rating in the government including the national government agencies, LGUs, SUCs and GOCCs and all other government instrumentalities. Refers \\\"substitute civil service eligibility\\\" to the qualification deemed to have been acquired by an individual through daily performance of his or her work to be recognized by the agency or instrumentality which utilized his or her services for the said period, for entrance into and promotion to the civil service."
