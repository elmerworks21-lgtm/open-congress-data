congress_website_title = "AN ACT AUTHORIZING THE SECRETARY OF HEALTH TO AWARD GRANTS FOR TRAINING AND SUPPORT SERVICES FOR ALZHEIMER'S PATIENTS AND THEIR FAMILIES"
congress_website_abstract = "Aims to provide and improve treatment services for patients afflicted with Alzheimer´s disease by authorizing the DOH to give grants to public and non-profit private health care providers. Enumerates conditions for grant to recipients such as: a) a comprehensive approach to Alzheimer´s care that integrates treatment of patients with training and support services for their families/caregivers; b) services shall be provided in the dialects or languages and cultural backgrounds most appropriate for of the patients to be served; c) provision of outreach activities to inform the public on Alzheimer´s disease and of the services of the program."
