congress_website_title = "AN ACT DECLARING THE POOR INTERNET SPEED AND CONNECTIVITY IN THE COUNTRY AS A NATIONAL EMERGENCY, AND GRANTING PRESIDENT RODRIGO ROA DUTERTE EMERGENCY POWERS AND PRESCRIBING URGENT MEASURES NECESSARY AND PROPER TO EFFECTIVELY ADDRESS SUCH PREDICAMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to simplify and rationalize the bureaucratic process particularly in acquiring the permits to build cell towers which will dramatically enhance the build-up of telecommunication infrastructure in the country which can make internet connectivity at par, if not better, with the best in the world. Seeks to grant the President the authority, among others, to require concerned LGUs and other national agencies to issue the necessary permits in relation to the application for the construction of cell site or other similar facilities within a period of seven (7) days or more under exceptional circumstances. Proposes to designate the Secretary of DICT as the Internet Speed and Connectivity Crisis Manager to formulate a sustainable 5-year Reform Plan which shall, among others, set a) Target speed and coverage; b) Quality metrics; and 3) Competition Policy and Consumer Welfare aspects including affordability."
