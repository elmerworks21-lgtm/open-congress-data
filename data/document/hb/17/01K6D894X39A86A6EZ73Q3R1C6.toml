congress_website_title = "AN ACT PROVIDING A UNIFIED SYSTEM OF EXTENDING AND PROCESSING SCHOLARSHIP GRANTS, STUDENT LOAN PROGRAMS, SUBSIDIES, BUSARIES AND OTHER FINANCIAL SUPPORT WINDOWS FOR THE FILIPINO YOUTH, ESTABLISHING THE NATIONAL SCHOLARSHIP COMMISSION, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to ensure that information or access to all available scholarships and other programs and incentives initiated by the government or other private institutions are made accessible to the widest possible recipients. Enumerates the duties and functions of the National Scholarship Commission as regards to the following: a) comprehensive database of OSCY and other qualified individuals nationwide; b) issues and/or controversies that are keeping children and youth out of schools and formal education; c) information and/or data that could help them get back to formal education; d) existing regular and/or special scholarships/educational grants; and e) the necessary procedures and/or processes as regards the scholarships/grants."
