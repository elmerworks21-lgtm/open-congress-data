congress_website_title = "AN ACT ESTABLISHING A NATIONAL SEX OFFENDER REGISTRATION DATABASE AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to provide a national data base registration for sex-related offenders in order for the public to be apprised of the identity of these culprits and also to benefit the non-governmental entities engaged in the advocacy for women and children´s protection. Provides that there shall be a listing of persons convicted of criminal offenses against a victim who is a minor or of sexually violent offenses."
