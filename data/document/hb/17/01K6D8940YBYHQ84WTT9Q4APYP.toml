congress_website_title = "AN ACT REGULATING THE ESTABLISHMENT AND IMPLEMENTATION OF AGRIBUSINESS VENTURES ARRANGEMENTS (AVAs) IN AGRARIAN REFORM LANDS"
congress_website_abstract = "Seeks to institutionalize...AVAs, particularly in agrarian reform areas, to promote productive and collaborative ventures between the private sector and the Agrarian Reform Beneficiaries (ARBs) and transform them into farmer-entrepreneurs as well as maximize distributed agrarian lands without compromising the farmers' tenure rights; Emphasizes the principle of agrarian reform and provides that AVAs should not be a threat to the ARBs' land rights but should give incentive to develop their lands and improve their productivity."
