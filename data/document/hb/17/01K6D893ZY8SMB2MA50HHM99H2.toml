congress_website_title = "AN ACT REQUIRING THE IMPLEMENTATION BY BRAND OWNERS OF MANAGEMENT PLANS THAT PROVIDE REFUND VALUES FOR CERTAIN BEVERAGE CONTAINERS"
congress_website_abstract = "Seeks to mandate the creation and implementation of management plans for brand owners to recover their used beverage containers for reuse or recycling; Requires consumers to pay a deposit when purchasing a beverage in order to have them return the containers or to surrender them to a return site that will pay the refund value stated on the containers."
