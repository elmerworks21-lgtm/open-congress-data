congress_website_title = "AN ACT GRANTING RETIREMENT, SURVIVORSHIP, AND OTHER BENEFITS TO THE BRANCH CLERKS OF COURT OF THE REGIONAL TRIAL COURTS AND THE CLERKS AND ASSISTANT CLERKS OF COURT OF THE OFFICE OF THE CLERK OF COURT OF THE REGIONAL TRIAL COURTS, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Specifies the persons covered such as the Branch Clerks of Court of the RTC and Clerks and Assistant Clerks of Court of the RTC: a) who have reached the compulsory retirement age of sixty-five (65) years; b) who have reached the optional retirement age of sixty (60) years; and c) who have resigned due to partial or permanent disability. States that in all instances, the employee must be a lawyer who has rendered a total of at least fifteen (15) years of service in the RTC or in any branch of government, or both, with the last five (5) years of service being continuously rendered in the RTC."
