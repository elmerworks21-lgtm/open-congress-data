congress_website_title = "AN ACT ESTABLISHING EMERGENCY RICE RESERVES AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to provide a contingency program in order to maintain a functional reserve of rice in case shortage exists in times of national calamity or emergency. Tasks the National Food Authority (NFA) to effectively: a) Maintain and manage a government rice reserve equivalent to fifteen (15) days of the national rice consumption for the current year and determine the location and distribution of such stocks into depots nationwide; b) Procure stock from small farmers and farmers´ cooperatives and import only under abnormal conditions; c) Release to the market said rice reserve upon the declaration of a state of calamity by the President."
