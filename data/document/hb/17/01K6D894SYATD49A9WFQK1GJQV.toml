congress_website_title = "AN ACT PRIORITIZING THE CONSTRUCTION OF SPECIAL CONCRETE LOCAL ROAD NETWORK IN AREAS WHERE THE NATIONAL ROAD NETWORK IS ALMOST ONE HUNDRED PERCENT (100%) COMPLETED AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides highest priority in local roads whose residents volunteer labor services in its construction and the areas where the National Road Network is almost one hundred percent (100%) completed. Allocates funds for the implementation of the construction of concrete local roads in the appropriations of the DPWH under the General Appropriations Act or from portions of amounts available from foreign assistance which can be availed of by the President to augment the fund of the Department until its completion."
