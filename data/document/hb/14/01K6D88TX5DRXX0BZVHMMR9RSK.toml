congress_website_title = "AN ACT STRENGTHENING THE POLITICAL PARTY SYSTEM AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "\\\"Political Party Act of 2007\\\". The bill creates a state fund for registered political parties that shall be used exclusively to augment the campaign expenditures and the operations of national parties. It proposes to limit voluntary contributions to any national party by individuals to P100,000 and by corporations to P500,000. It penalizes political turncoatism."
