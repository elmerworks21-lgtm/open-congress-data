congress_website_title = "AN ACT CREATING THE PHILIPPINE FAIR TRADE COMMISSION, REGULATING AND PENALIZING UNFAIR TRADE PRACTICES AND OTHER ANTI-COMPETITIVE PRACTICES AND CONDUCT, UNLAWFUL MERGERS, ACQUISITIONS AND COMBINATIONS IN RESTRAINT OF TRADE, UNFAIR COMPETITION, ABUSE OF DOMINANT POWER, AND APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Creates the PFTC that shall investigate, gather evidence and initiate prosecution of those engaged in unfair trade practices. Defines monopoly power or market abuse and imposes sanctions to key officials of companies that violate fair competition."
