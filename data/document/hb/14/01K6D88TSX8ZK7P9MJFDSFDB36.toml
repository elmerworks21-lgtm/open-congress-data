congress_website_title = "AN ACT MANDATING THE AUTOMATIC RELEASE OF THE SHARE OF THE BARANGAY IN THE PROCEEDS OF NATIONAL TAXES AND TAXES ON THE UTILIZATION AND DEVELOPMENT OF THE NATIONAL WEALTH, AMENDING FOR THIS PURPOSE SECTION 286, CHAPTER 1 AND SECTION 293, CHAPTER 2 TITLE 3 BOOK II RESPECTIVELY, OF THE REPUBLIC ACT 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "This measure seeks to provide for the automatic release of the share of the barangays in the national taxes and in taxes imposed on the utilization and development of national wealth. It provides that THE SHARE OF THE BARANGAYS SHALL NOT BE SUBJECT TO ANY LIEN OR HOLDBACK THAT MAY BE IMPOSED BY PROVINCIAL, CITY OR MUNICIPAL GOVERNMENT."

