congress_website_title = "AN ACT EXPANDING THE JURISDICTION OF AND GRANTING PROSECUTORIAL POWERS TO THE COMMISSION ON HUMAN RIGHTS AND FOR OTHER PURPOSES"
congress_website_abstract = "The measure seeks to expands the jurisdiction of the Commission on Human Rights (CHR) to include civil, political, economic, social and cultural rights. It also grants the CHR prosecutorial power similar to that of the National Prosecution Service."
