congress_website_title = "AN ACT PROVIDING FOR A NATIONAL MENTAL HEALTH CARE DELIVERY SYSTEM, ESTABLISHING FOR THE PURPOSE THE PHILIPPINE COUNCIL FOR MENTAL HEALTH AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"National Mental Health Of 2010.\\\" Seeks to promote a shift from a hospital-based system to community-based mental health care delivery system through reorientation and modernization of the existing mental health facilities; integrate mental health care in the general health care delivery system and prevent, treat and control mental illness at all levels and rahabilitate persons with mental disability; provide access to comprehensive health care and treatment which ensure a well-balanced mental health program of community based and hospital care and treatment; and, establish a nationwide multi-sectoral collaborative network for the identification and prevention of mental illness and disability and to protect and promote the mental health of the people through a multi-discilinary approach that encompasses health, education, labor and employment, justice, and social welfare."
