congress_website_title = "AN ACT TO ENHANCE THE PHILIPPINE INDUSTRIAL AND LABOR DISPUTE SETTLEMENT SYSTEM AND FOR THAT PURPOSE, AMENDING CERTAIN PROVISIONS OF PRESIDENTIAL DECREE NO. 442 OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "\\\"Industrial and Labor Dispute Settlement Act of 2004\\\". The bill provides for the creation of the National Mediation and Arbitration Board, its composition, organizational structure, jurisdiction, powers and functions.It also prescribes the mediation process and the arbitration procedure. It brings to the forefront alternative dispute resolution processes in addressing industrial and labor disputes. It calls for the abolition of the National Labor Relations Commission and the National Conciliation and Mediation Board."
