congress_website_abstract = "\\\"Anti-Cyber Sex Act of 2007\\\". The bill proposes to impose the penalty of imprisonment for ten (10) years and a fine of not less than P500,000 but not more than P2 million on any internet content hosting provider or email hosting provider who engages in the business of providing cyber sex or internet-related service that provides sexually explicit materials."
