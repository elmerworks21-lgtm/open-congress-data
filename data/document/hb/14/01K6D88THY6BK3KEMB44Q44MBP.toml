congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6981 OTHERWISE KNOWN AS THE 'WITNESS PROTECTION, SECURITY AND BENEFIT ACT' AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill entitles witnesses admitted into the program to the following: a) hospitalization benefits while in the safehouse, and 2) free public education for minor or dependent children from primary to college. It also seeks to explicitly provide for the perpetuation of testimonies of witnesses in consonance with Rule 134 of the Revised Rules of Court."
