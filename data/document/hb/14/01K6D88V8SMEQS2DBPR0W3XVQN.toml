congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6938, OTHERWISE KNOWN AS THE COOPERATIVE CODE OF THE PHILIPPINES"
congress_website_abstract = "Proposes the following amendments to the Cooperative Code, among others: a) to rename the credit, consumer and producer types of cooperatives to financial, trading and manufacturing coooperatives; b) to rationalize the grant and administration of tax and other incentives; and c) to rationalize the investment of the cooperative's capital."
