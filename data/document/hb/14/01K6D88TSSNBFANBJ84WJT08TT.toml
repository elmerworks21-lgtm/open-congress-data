congress_website_title = "THE CONSOLIDATED INVESTMENTS AND INCENTIVES CODE OF THE PHILIPPINES"
congress_website_abstract = "\\\"The Consolidated Investments and Incentives Code of the Philippines\\\". The bill offers a uniform set of incentives for all investment promotion agencies like income tax holiday or net operating loss carry over, accelerated depreciation, tax and duty free importation of capital equipment, tax credit on raw materials, and deferred imposition of the minimum corporate income tax, among others."
