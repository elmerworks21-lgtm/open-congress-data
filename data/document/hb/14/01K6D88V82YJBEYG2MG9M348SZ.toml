congress_website_title = "AN ACT AMENDING SECTION 24 OF REPUBLIC ACT NO. 8424 OTHERWISE KNOWN AS THE TAX REFORM ACT OF 1997, BY EXEMPTING FROM INCOME TAX INDIVIDUAL CITIZENS WHOSE GROSS INCOME FALLS WITHIN THE POVERTY THRESHOLD"
