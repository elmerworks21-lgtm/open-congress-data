congress_website_title = "AN ACT AMENDING SECTION 4 (C) OF REPUBLIC ACT NO. 7432, OTHERWISE KNOWN AS THE SENIOR CITIZEN'S ACT, THEREBY EXEMPTING THE BANK DEPOSITS OF SENIOR CITIZENS FROM THE TWENTY PERCENT (20%) WITHHOLDING TAX ON INTEREST INCOME"
congress_website_abstract = "Provides that senior citizens are exempted from paying the withholding tax on the interest income from their bank deposits amounting to not more than One Million (P1,000,000.00) Pesos, provided that the senior citizen should present to the manager of the bank his/her Senior Citizen's ID and a certificate from the chief of the firm where he retired."

