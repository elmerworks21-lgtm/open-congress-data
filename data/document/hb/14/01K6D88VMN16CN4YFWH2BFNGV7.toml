congress_website_title = "AN ACT PROHIBITING COURTS FROM ISSUING RESTRAINING ORDERS OR PRELIMINARY INJUNCTIONS IN CASES INVOLVING PUBLIC AUCTION SALES ARISING FROM EXTRA-JUDICIAL FORECLOSURE OF REAL ESTATE MORTGAGES IN THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to prohibit the courts from issuing restraining orders, preliminary injunctions or preliminary mandatory injuctions in the following cases: a) those involving public auction sales arising from the foreclosure of real estate mortgages; and b) when the mortgagee has clearly established that the loan secured by a real estate mortgage is due and demandable and that the mortgagor is deliquent in his payments."

