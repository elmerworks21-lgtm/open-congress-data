congress_website_title = "AN ACT PROVIDING FOR THE ADMINISTRATIVE AND SUMMARY TITLING OF REAL PROPERTIES USED AS SITES FOR PUBLIC SCHOOLS"
congress_website_abstract = "The bill mandates for the titles to real properties, public or private, being utilized as actual sites for public schools for a period of at least five (5) years to be transferred to the Department of Education by simple motion filed by the Office of the Solicitor General or by the City or Provincial Prosecutor."

