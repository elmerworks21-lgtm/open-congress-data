congress_website_title = "AN ACT ALLOCATING 10% OF THE GROSS INCOME OF ALL LOCAL MOBILE PHONE TEXT MESSAGES SENT FROM THE TELECOMMUNICATIONS COMPANY TO THE FOOD AND EDUCATION PROGRAM OF THE GOVERNMENT"
congress_website_abstract = "“The 10% Allocating Act of 2009.” In order to balance the interest of the public on the cost of sending text message and the diminution in the earnings of telecommunication companies, this bill proposes that instead of merely lowering the cost of communication through lowered access charges, current rates should be maintained, but with the government collecting ten percent (10%) of the gross revenue, of the telecommunications companies to be used in answering the long-time problem of our country in education, food and malnutrition particularly focusing on elementary school children. This bill seeks to create a program, the Food and Education Acceleration Program (FEAP) under supervision of DepEd and DOH to spearhead the rehabilitation and acceleration of educational infrastructure in our country as well as to improve the nutrition and health of school children by providing the proper food and nourishment their body needs."
