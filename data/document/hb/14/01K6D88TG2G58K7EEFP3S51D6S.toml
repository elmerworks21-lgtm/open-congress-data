congress_website_title = "AN ACT ALLOWING A FARMER-BENEFICIARY TO MORTGAGE HIS RIGHT TO FARM LAND AWARDED TO HIM, WITHOUT LOSING HIS SECURITY TO TENURE AND PROVIDING THAT THE CERTIFICATE OF LAND OWNERSHIP AWARD ISSUED TO HIM UNDER THE COMPREHENSIVE AGRARIAN REFORM PROGRAM SHALL BE ACCEPTED BY BANKS AND OTHER FINANCIAL INSTITUTIONS AS COLLATERAL FOR LOANS AMENDING FOR THE PURPOSE SECTIONS TWENTY-SEVEN AND TWENTY-ONE OF REPUBLIC ACT NUMBERED SIXTY-SIX HUNDRED AND FIFTY SEVEN, OTHERWISE KNOWN AS THE \\\"COMPREHENSIVE AGRARIAN REFORM LAW OF 1998,\\\" AND FOR OTHER PURPOSE"
congress_website_abstract = "The bill allows farmer-beneficiaries to use awarded land as collateral for both short-term and long-term production and other types of loans for the acquisition of farm equipment and machineries, seeds, fertilizers and other similar items."
