congress_website_title = "AN ACT ESTABLISHING THE RULES FOR A COMPETITIVELY NEUTRAL GOVERNMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Government Competitive Neutrality Act of 2007\\\". The bill compels the government to adopt the following competitive neutrality arrangements, among others: a) prohibition of fiscal and legislative powers to the advantage of government business over the private sector; b) prohibition of subsidies; and c) prohibition of exemption from any form of taxes."

