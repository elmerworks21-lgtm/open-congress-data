congress_website_title = "AN ACT AMENDING SECTIONS 91 AND 97 OF REPUBLIC ACT NO. 8550, OTHERWISE KNOWN AS THE \\\"PHILIPPINE FISHERIES CODE OF 1998\\\""
congress_website_abstract = "The bill prohibits the following: a) gathering, possessing, sale or importation of ordinary precious and semi-precious corals except for scientific or research purposes; and b) fishing or willful taking of rare, threatened or endangered species from the wild as listed in the Convention on International Trade of Endangered Species of Flora and Fauna (CITES)."
