congress_website_title = "AN ACT TO REQUIRE CERTAIN DISCLOSURES IN CONNECTION WITH ANY INTERNATIONAL MONEY TRANSFER AND FOR OTHER PURPOSES"
congress_website_abstract = "Requires all financial institutions that initiates an international money transfer on behalf of a consumer to make a good faith effort to provide the following information to the consumer before the consummation of the transaction: a) fees to be charged, b) itemization of all costs for the remittance, and c) the exact amount of foreign currency to be received by the recipient abroad."

