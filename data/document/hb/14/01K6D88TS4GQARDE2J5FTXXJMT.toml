congress_website_title = "THE NATIONAL LAND TRANSPORTATION AUTHORITY ACT OF 2007"
congress_website_abstract = "\\\"The National Land Transportation Authority (NLTA) Act of 2007\\\". The bill creates the National Land Transportation Authority that shall absorb the functions of a merged Land Transportation Office and Land Transportation Franchising and Regulatory Board as the primary policy, planning, programming, coordinating, implementing, regulating and administrative entity of the government in the promotion, development and regulation of a dependable network of land transportation systems."

