congress_website_title = "AN ACT GRANTING RETIREMENT INCENTIVE AND HEALTH CARE BENEFITS TO FILIPINO PROFESSIONAL ATHLETES WHO HAVE WON WORLD TITLES OR WORLD CHAMPIONSHIPS AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "\\\"Filipino Professional Athletes Retirement Incentive and Health Care Benefits Act of 2007\\\". The bill propose to provide retirement incentive and health care benefits to Filipino professional athletes who have won world titles or world championships and who, in their twilight years, are unable to provide for themselves and their families economically."
