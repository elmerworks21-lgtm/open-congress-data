congress_website_title = "AN ACT AMENDING ACT NO. 2031, OTHERWISE KNOWN AS THE NEGOTIABLE INSTRUMENTS LAW, BY REQUIRING THE DRAWER OF THE CHECK TO LEGIBLY PRINT HIS/HER NAME BEFORE SIGNING THE SAME"
congress_website_abstract = "Seeks to address the problem whereby victims of pyramid scams have difficulty in filing cases for bouncing checks because they do not know who are the signatories/drawers of these checks especially in cases of corporations, thus the filing of this measure which requires the signatories/drawers of the checks to legibly print their names before signing the checks."

