congress_website_title = "AN ACT STRENGTHENING THE LADDERIZED INTERFACE BETWEEN TECHNICAL-VOCATIONAL EDUCATION AND TRAINING AND HIGHER EDUCATION"
congress_website_abstract = "\\\"Ladderized Education Act Of 2009.\\\" Seeks to strengthen the ladderized interface between Technical vocational Education and Training (TVET) and higher Education to achieve the following: 1) to open the pathways of opportunity for career and educational progression of students and workers; 2) to create a seamless and borderless education; 3) to empower students and workers to exercise options or to choose when to enter and exit from the educational ladder; 4) to create job platforms at every exit and the opportunity to earn income, and; to solve the problem of structural employment or skills and job mismatch."
