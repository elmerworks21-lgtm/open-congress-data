congress_website_title = "AN ACT GRANTING PUBLIC ELEMENTARY AND HIGH SCHOOL TEACHERS NON-WAGE BENEFITS IN THE FORM OF FREE TERTIARY EDUCATION IN ANY STATE COLLEGE OR UNIVERSITY FOR ONE (1) DEPENDENT CHILD, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill extends additional benefit to public elementary and secondary public school teachers in the form of educational grant to one dependent child attending any state university or college. If both spouses are public school teachers, two (2) dependent children shall be covered by the educational grant."
