congress_website_title = "AN ACT PROVIDING THE REGULATORY FRAMEWORK FOR REAL ESTATE INVESTMENT TRUSTS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Real Estate Investment Trust Act of 2007\\\". The bill provides for the legal framework whereby real estate investment trusts may be allowed to invest in real estate, whether freehold or leasehold, in or out of the country; real estate related assets; listed or unlisted debt securities and listed shares issued by local or foreign non-property corporations; government securities issued on behalf of the Philippine government or governments of other countries; and cash and cash equivalent items."
