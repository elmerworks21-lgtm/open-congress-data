congress_website_abstract = "\\\"National Historical Commission Of The Philippines Act.\\\" Seeks to conserve, promote and popularize the nation's historical heritage and resources by changing the nomeclature of the National Historical Institute into National Historical Commission of the Philippines and strengthening its powers and functions; make history relevant so that, by having planted it in its citizens, the country will become proud of its heritage, strong in its identity, and unified as a nation."
