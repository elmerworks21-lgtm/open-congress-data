congress_website_title = "AN ACT PROVIDING FOR THE PROMOTION OF ORGANIC AGRICUTURE IN THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Organic Agriculture Act Of 2009.\\\" Seeks to organize a system which assures the quality of organic foodstuff, that is ecologically or bio-dynamically grown and handled and develop an environmentally sustainable agriculture; to produce sufficient high quality food as well as protect the health of farmers and consumers, and; to promote the practice of organic agriculture in the country that will cumulatively condition and enrich the fertility of the soil, increase farm productivity, reduce pollution and destruction of the environment, prevent the depletion of natural resources and save on imported inputs."
