congress_website_title = "ISANG PANUKALANG BATAS NA NAGTATATAG NG ISANG KODIGO SA ETIKA AT PROPESYONAL NA ASAL NG MGA PERSONEL NA PULIS, NAGTATAKDA NG PARUSA SA MGA PAGLABAG DITO AT PARA SA IBA PANG MGA LAYUNIN (AN ACT ESTABLISHING A CODE OF ETHICS AND PROFESSIONAL CONDUCT FOR POLICE PERSONNEL, PRESCRIBING PENALTIES FOR VIOLATION THEREFORE AND FOR OTHER PURPOSES)"
congress_website_abstract = "Maglalaan ng sistema ng insentibo at pagkilala sa mga huwarang opisyal at kasapi ng puwersa ng pulis. Nagpapataw din ito ng kaparusahan sa mga lumalabag sa sinumpaang tungkulin na protektahan ang taumbayan at isulong ang batas. (Provides for a system of incentives and recognition for exemplary officers and members of the police force. Also imposes penalties on those who violate their foresworn duty to protect the people and uphold the law.)"

