congress_website_title = "AN ACT PROVIDING FOR MANDATORY HEPATITIS B VACCINATION OF ALL INFANTS WITHIN A REASONABLE PERIOD OF TIME AFTER BIRTH, AND BASIC IMMUNIZATION AND VACCINATION"
congress_website_abstract = "The measure proposes a mandatory basic immunization service for infants, to wit: a) BCG vaccination against tuberculosis; b) inoculation against diphtheria, tetanus and pertussis; c) oral poliomyetitis immunization; d) protection against measles; e) immunization against hepatitis B; f) immunization against rubella; and g) other basic immunization services."
