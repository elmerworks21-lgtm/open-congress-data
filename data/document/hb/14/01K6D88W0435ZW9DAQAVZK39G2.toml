congress_website_title = "AN ACT TO PREVENT AND CONTROL POLLUTION FROM SHIPS, PROVIDE PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Prevention Of Pollution From Ships Act Of 2009.\\\" Seeks to implement the International Convention for the Prevention of Pollution from Shipsor Marpol 73/78 including its annexes and subsequent amendments; prevent or minimize marine pollution covering oily substance, harmful and toxic substances, garbage, sewage and other pollutants coming from ships and floating structures; harmonize institutional arrangements concerning marine pollution; and, strengthen and complement enforcement of existing related laws on marine pollution."
