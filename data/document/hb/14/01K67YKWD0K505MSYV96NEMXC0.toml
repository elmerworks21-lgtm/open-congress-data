title = "CIRCUMFERENTIAL ROAD BY LINKING THE MUNICIPALITIES OF MILAOR AND PILI, CITY OF NAGA"
long_title = "AN ACT CONVERTING A LOCAL ROAD NETWORK INTO A NATIONAL CIRCUMFERENTIAL ROAD BY LINKING THE MUNICIPALITIES OF MILAOR AND THE CITY OF NAGA IN THE PROVINCE OF CAMARINES SUR BY CONNECTING THE PROVINCIAL ROAD PASSING THROUGH BARANGAYS DEL ROSARIO AND BORONGBORONG IN THE MUNICIPALITY OF MILAOR AND CONTINUING TO BARANGAY TAGBONG IN THE MUNICIPALITY OF PILI WITH THE NATIONAL ROAD LINKING AND TRAVERSING BARANGAYS TAGBONG, SAN ISIDRO, SAN AGUSTIN, SAN JOSE, CADLAN AND PALESTINA IN THE MUNICIPALITY OF PILI, THROUGH THE BARANGAYS OF DEL ROSARIO, CONCEPCION GRANDE, CONCEPCION PEQUEÑA, TRIANGULO AND MABULO IN THE CITY OF NAGA, AND THENCE TO THE BARANGAY OF SAN VICENTE IN THE MUNICIPALITY OF MILAOR, PROVINCE OF CAMARINES SUR"
