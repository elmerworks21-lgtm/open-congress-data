congress_website_title = "AN ACT PROVIDING FOR THE MANNER AND DATE OF ELECTION OF SECTORAL REPRESENTATIVES TO THE LOCAL SANGGUNIANS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Local Sectoral Representation Act of 2007\\\". The bill provides for 3 selected sectoral representatives each in the sangguniang panlalawigan, sangguniang bayan and the sangguniang panlungsod - 1 from the women sector, 1 from the workers and 1 from either of the following sectors: indigenous people and cultural communities; differently-abled persons, senior citizens, victims of calamities, children, and urban poor or any other sector as may be determined by the sangguniang concerned."
