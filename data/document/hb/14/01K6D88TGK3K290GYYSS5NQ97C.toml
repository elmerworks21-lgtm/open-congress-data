congress_website_title = "AN ACT PROVIDING FOR THE REHABILITATION OR LIQUIDATION OF FINANCIALLY DISTRESSED ENTERPRISES"
congress_website_abstract = "\\\"Corporate Recovery and Insolvency Act of 2007\\\". The bill establishes a framework for insolvency proceeding and provides an equitable treatment to all parties involved in a financial restructuring or rehabilitation. It provides ailing companies four remedies: a) fast-track rehabilitation, b) court-supervised rehabilitation, c) pre-negotiated rehabilitation, and d) dissolution-liquidation."
