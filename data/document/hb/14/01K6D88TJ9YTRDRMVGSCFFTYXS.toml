congress_website_title = "AN ACT PROVIDING INCENTIVES TO ALL BARANGAY OFFICIALS, INCLUDING BARANGAY TANODS AND MEMBERS OF THE LUPONG TAGAPAMAYAPA, AND BARANGAY EMPLOYEES AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Barangay Incentives Act of 2007\\\". The bill proposes to provide incentives to barangay officials, including barangay tanods and members of the lupong tagapamayapa and barangay empployees. Among the benefits being proposed in the bill are: a. exemption from income tax on salaries, wages, compensation, remuneration and other emoluments; b. exemption from capital gains and transfer taxes; c. GSIS benefit coverage; d. health benefits; and e. free legal representation."

