congress_website_title = "AN ACT DECENTRALIZING THE TEXTBOOK PROCUREMENT PROGRAM OF THE DEPARTMENT OF EDUCATION (DepEd) BY CREATING A DIVISION TEXTBOOK PROCUREMENT SERVICES UNIT (DTPSU) IN ALL PROVINCIAL AND CITY DIVISION OFFICES INCLUDING THOSE IN THE AUTONOMOUS REGION IN MUSLIM MINDANAO (ARMM) REPEALING FOR THE PURPOSE SECTION 10 OF R.A. NO. 8047 OTHERWISE KNOWN AS THE BOOK PUBLISHING INDUSTRY DEVELOPMENT ACT"
congress_website_abstract = "The measure establishes a Division Textbook Procurement Service Unit in every provincial and city division office to handle the textbook procurement program of the Department of Education. It also proposes to decentralize the printing of textbooks."

