congress_website_title = "AN ACT PROVIDING FOR STRICT REGULATION AND STIFFER PENALTIES FOR THE ILLEGAL/UNLAWFUL IMPORTATION, MANUFACTURE, ACQUISITION, SALE, DISPOSITION OR POSSESSION OF EXPLOSIVES AND CHEMICALS OR ACCESSORIES USED IN THE MANUFACTURE OF EXPLOSIVES, REPEALING EXECUTIVE ORDER NO. 522 AND AMENDING CERTAIN PROVISIONS OF PRESIDENTIAL DECREE NO. 1866, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill expands the list of chemicals and accessories used in the manufacture of explosives/explosive ingredients that would fall under the licensing and monitoring authority of the Philippine National Police. It imposes calibrated penalties for illegal importation, manufacture and possession of explosives and chemicals/accessories used in the manufacture of explosives/explosive ingredients."
