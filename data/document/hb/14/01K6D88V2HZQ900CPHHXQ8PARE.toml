congress_website_title = "PANUKALANG BATAS NA NAGLALAAN NG PARAAN KUNG SAAN ANG ISANG GUMAGANAP NA PANGULO AY PIPILIIN KUNG SAKALING ANG PANGULO, PANGALAWANG PANGULO, PANGULO NG SENADO, AT ISPIKER NG KAPULUNGAN NG MGA KINATAWAN AY HINDI NAGING KWALIPIKADO O HINDI KAYANG GAMPANAN AT TUPARIN ANG MGA TUNGKULIN NG TANGGAPAN NG PANGULO NG PILIPINAS SA ILALIM NG ARTIKULO VII SEKSIYON 7 AT 8 NG 1987 KONSTITUSYON AT PARA SA IBA PANG LAYUNIN (AN ACT PROVIDING FOR THE MANNER IN WHICH AN ACTING PRESIDENT SHALL BE SELECTED IN CASE THE PRESIDENT, VICE-PRESIDENT, SENATE PRESIDENT AND SPEAKER OF THE HOUSE FAILS TO QUALIFY OR IS UNABLE TO ASSUME AND DISCHARGE THE FUNCTIONS OF THE OFFICE OF THE PRESIDENT OF THE PHILIPPINES UNDER ARTICLE VII SECTION 7 AND 8 OF THE 1987 CONSTITUTION AND FOR OTHER PURPOSES)"
congress_website_abstract = "Ang panukalang batas na ito ay naglalaan na ang mga kasapi ng Kongress, sama-samang naghahalal, ay pipili ng isa sa kanilang hanay para maglingkod na Pangulo hangang ang Pangulo ay mahalal sakaling ang Pangulo, Pangalawang Pangulo, Pangulo ng Senado at Ispiker ng Mababang Kapulungan ay namatay o pamalagiang nabalda. (The bill provides for the members of Congress, voting jointly, to choose from among themselves an acting President in the event of death, permanent disability of the President, Vice President, Senate President and Speaker of the House of Representatives.)"
