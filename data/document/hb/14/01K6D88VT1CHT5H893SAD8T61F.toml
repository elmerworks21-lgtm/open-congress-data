congress_website_title = "AN ACT ESTABLISHING THE RIGHTS OF TAXI PASSENGERS"
congress_website_abstract = "“Taxi Passenger Bill of Rights Act.” Aims to protect the commuting public, citizen and tourists alike from predatory practices of some taxi drivers and operators. It also seeks to acknowledge the rights of taxi passengers and penalizes both driver and the operator of the taxi cab who violate these rights."

