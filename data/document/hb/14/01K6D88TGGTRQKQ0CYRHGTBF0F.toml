congress_website_title = "AN ACT ESTABLISHING A PROGRAM FOR THE ACQUISITION OF SCHOOL SITES AND THE CONSTRUCTION, MAINTENANCE, REHABILITATION, AND REPAIR OF SCHOOL BUILDINGS IN THE PUBLIC ELEMENTARY AND SECONDARY SCHOOLS NATIONWIDE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"School Building Program Act of 2007\\\". This bill seeks to create a comprehensive program which will address the problem of classroom shortage. It carries a provision for a build-operate, build-lease-transfer, build-transfer, rehabilitate-operate-transfer and other contractual arragements that will allow the use of both government and private funds to finance the construction of school buildings. It is hoped that with the passage of the bill, class sizes will be reduced to a manageable level and thus result in the improvement in the quality of education."
