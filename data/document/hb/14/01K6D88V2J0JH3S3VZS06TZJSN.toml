congress_website_title = "AN ACT INCREASING THE MONTHLY BENEFITS OF BARANGAY OFFICIALS AND PROVIDING ALLOWANCES TO BARANGAY TANODS, BARANGAY HEALTH WORKERS AND BARANGAY SOCIAL WORKERS, AMENDING FOR THE PURPOSE, THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "The bill proposes to increase/grant honoraria and allowances to barangay officials, as follows: a) P3,000 per month for the punong barangay; b) P1,800 per month for sanggunian barangay members, treasurer and secretary; and c) P1,500 per month for members of the lupong tagapamayapa, barangay tanods, barangay health workers and barangay social workers."
