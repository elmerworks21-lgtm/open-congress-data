congress_website_title = "AN ACT CREATING THE MAGNA CARTA FOR SMALL SCALE MINING PROGRAM"
congress_website_abstract = "\\\"Magna Carta for Small Scale Mining Program.\\\" Seeks to transfer the responsibility of accepting, reviewing and subsequently approving applications for permit to operate small-scale mining from the local government units (LGUs) to the Department of Environment and Natural Resources (DENR) in order to ensure control over unbridled issuances of permits which can arise if the lead government agency entrusted with the responsibility is not well-equipped for the task."

