congress_website_title = "AN ACT INCREASING STIFFER PENALTIES FOR THE UNAUTHORIZED INSTALLATION AND PILFERAGE OF CABLE OR TELEPHONE CONNECTIONS AND THEFT OF CABLE OR TELEPHONE WIRES AND MATERIALS"
congress_website_abstract = "The bill imposes the penalty of prision mayor or a fine ranging from P100,000 to P200,000 or both for the unauthorized installation and pilferage of cable or telephone connections. It imposes the penalty of prision mayor and a fine ranging from P300,000 to P500,000 or both for the theft of cable or telephone wires and materials."
