congress_website_title = "AN ACT INCREASING THE ALLOWABLE PERSONAL EXEMPTION FOR THE HEAD OF THE FAMILY/MARRIED INDIVIDUAL AS TAX PAYER AND FOR THE DEPENDENT, AMENDING FOR THE PURPOSE SECTION 35 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill proposes to increase the personal exemption of individual taxpayers as follows: a) single - from P20,000 to P50,000; b) head of the family - from P25,000 to P70,000; and c) married individual - from P32,000 to P70,000. It also increase the additional exemption for dependents from P8,000 to P20,000 for each dependent not exceeding four."
