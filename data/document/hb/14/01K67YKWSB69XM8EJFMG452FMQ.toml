congress_website_title = "AN ACT REDUCING THE RATE OF AMUSEMENT TAX TO BE COLLECTED FROM THE PROPRIETORS, LESSEES, OR OPERATORS OF THEATERS OR CINEMAS, AMENDING FOR THE PURPOSE SECTION 140 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Seeks to amend Section 140 (A) of Republic Act No. 7160, otherwise known as the Local Government Code in order to encourage the growth and development of the entertainment industry that had deteriorated due to the imposition of a higher amusement tax; help the proprietors, lessees and operators, and encourage more investments and innovations on the entertainment industry, and; produce quality films that are culturally, politically and economically beneficial to the Filipino people."
