congress_website_title = "AN ACT BANNING AND CRIMINALIZING THE \\\"COMMERCIALIZATION OF TEXTBOOKS AND OTHER INSTRUCTIONAL MATERIALS\\\" IN STATE UNIVERSITIES AND COLLEGES"
congress_website_abstract = "Seeks to abate, if not stop, the practice of some instructors and professors, doubling as authors of textbooks in many state universities and colleges (SUCs), of requiring students to buy their textbooks and to tear off the page where test/examination exercises are printed, fill it up and submit it as part of their grading system."

