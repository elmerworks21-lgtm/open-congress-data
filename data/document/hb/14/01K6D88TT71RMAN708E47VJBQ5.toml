congress_website_title = "AN ACT AMENDING REPUBLIC ACT 9184, OTHERWISE KNOWN AS THE GOVERNMENT PROCUREMENT REFORM ACT, WITHDRAWING FROM ITS APPLICATION ALL REFERENCES TO THE LOCAL GOVERNMENT UNITS"
congress_website_abstract = "The bill seeks to exclude local government units (LGUs) from the ambit of RA 9184 (Government Procurement Act). It provides for the procurement of infrastructure projects, goods and consulting services by LGUs to be governed by Title Six, Book Two of RA 7160."
