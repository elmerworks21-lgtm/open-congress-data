congress_website_title = "AN ACT PRESCRIBING THE GEOGRAPHICAL REQUIREMENTS IN THE BIDDING AND AWARDING OF CONTRACTS FOR GOVERNMENT INFRASTRUCTURE PROJECTS, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 1594"
congress_website_abstract = "The bill mandates that the geographical factor be taken into consideration in the award of contracts for government infrastructure projects, that is, prospective contractors based in Luzon may only bid for projects to be implemented within Luzon. The same requirements shall be imposed to contractors based in the Visayas and Mindanao."

