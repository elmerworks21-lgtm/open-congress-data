congress_website_title = "AN ACT STRENGTHENING PHILIPPINE DISASTER RISK MANAGEMENT CAPABILITY BY INSTITUTIONALIZING THE NATIONAL DISASTER RISK MANAGEMENT FRAMEWORK, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Philippine Disaster Risk Management Act of 2009.” Seeks to establish the National Disaster Mangement Council which shall be tasked to develop, formulate and implement a National Disaster Risk Management Plan (NDRMP) in conformity with a National Disaster Risk Management Framework (NDRMF) for creating a comprehensive and community-based disaster risk management approach, which shall be anticipatory of and responsive to socio-economic and environmental impacts of disasters. It encompases all actions and measures pertaining to all aspects of disaster management from pre-disaster phase to post-disaster phase. Further it proposes to enhance national leadership, strengthen local capabilities, mainstream disaster risk planning, improve risk communication, enhance accountability and financial supports."
