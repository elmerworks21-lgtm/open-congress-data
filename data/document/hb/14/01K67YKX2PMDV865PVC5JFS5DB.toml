congress_website_title = "AN ACT STRENGTHENING THE COMMISSION ON HUMAN RIGHTS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Commission On Human Rights Act Of 2009.\\\" Seeks to define the mandate of the Commission on Human Rights to include investigative, monitoring and advocacy powers and functions; empower the Commission by elaborating on its concurrent prosecutorial powers and functions, and provide rules of procedure for the exercise thereof; and, delineate the structural and organizational structure of the Commission as a collegial body with the corresponding powers and functions ascribed unto each office, and the pertinent ranks and qualifications of every officer therein."
