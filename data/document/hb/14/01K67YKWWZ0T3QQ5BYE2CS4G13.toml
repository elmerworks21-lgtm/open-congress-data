long_title = "AN ACT ELEVATING THE PHILIPPINE NORMAL UNIVERSITY AS THE COUNTRY'S NATIONAL UNIVERSITY FOR TEACHER EDUCATION, ESTABLISHING A SYSTEM OF NATIONAL TEACHER TRAINING AND DEVELOPMENT AND A PROGRAM FOR EDUCATIONAL POLICY RESEARCH AND DEVELOPMENT, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
scope = "National"
subjects = [ "Philippine Normal University (PNU) Modernization",]
congress_website_author_codes = ["D071"]
congress_website_coauthors_raw = ["CUA, JUNIE E.","PLAZA, RODOLFO RODRIGO G.","RODRIGUEZ, RUFUS B.","REMULLA, JESUS CRISPIN C.","PIAMONTE, MARIANO U.","TEODORO, MARCELINO R."]
congress_website_committee_codes = ["0504","C502","0532"]
congress_website_primary_keys = [68330]
congress_website_title = "AN ACT ELEVATING THE PHILIPPINE NORMAL UNIVERSITY AS THE COUNTRY'S NATIONAL UNIVERSITY FOR TEACHER EDUCATION, ESTABLISHING A SYSTEM OF NATIONAL TEACHER TRAINING AND DEVELOPMENT, AND A PROGRAM FOR EDUCATIONAL POLICY RESEARCH AND DEVELOPMENT, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "“Philippine Normal University (PNU) Modernization Act of 2009.” Seeks to elevate the Philippine Normal University (PNU) as the country's premier National University for Teacher Education by establishing a national system of teacher training and development that will provide all teachers opportunities for in-service training and development programs in: 1) using Information and Technology (ICT) to improve the teaching and learning processes; 2) continuing professional education and development by strengthening teacher competences in various fields of specialization; 3) introducing innovative strategies and modalities of teaching and learning; 4) benchmarking and establihsing institutional linkages and networking; and 5) other advocating and promoting strategies towards modernization."
