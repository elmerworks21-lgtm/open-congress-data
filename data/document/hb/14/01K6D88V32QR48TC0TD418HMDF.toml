congress_website_title = "AN ACT INSTITUTING A CORPORATE RESTRUCTURING PROGRAM FOR THE NATIONAL GOVERNMENT HOSPITAL SYSTEM, REORGANIZING THE NATIONAL CENTER FOR HEALTH FACILITIES DEVELOPMENT INTO A CORPORATE BODY TO BE KNOWN AS THE NATIONAL HOSPITAL SYSTEM DEVELOPMENT CENTER, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill proposes the conversion of all national government hospitals under the supervision of the Department of Health into government-owned corporations. It establishes the National Hospitals System Development Center that shall serve as a holding and management company for all corporate-restructured hospitals."

