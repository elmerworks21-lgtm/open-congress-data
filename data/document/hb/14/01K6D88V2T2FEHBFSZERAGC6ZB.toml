congress_website_title = "AN ACT PROVIDING CRIMINAL IMMUNITY FOR A PARENT WHO VOLUNTARILY SURRENDERS CUSTODY OF AN UNHARMED INFANT SIXTY (60) DAYS OLD OR YOUNGER TO A HOSPITAL, EMERGENCY MEDICAL FACILITY, POLICE STATION OR THE DEPARTMENT OF SOCIAL WELFARE AND DEVELOPMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill grants immunity from arrest and prosecution to parents who voluntarily give up custody and care of their baby (infants 60 days of age or younger) provided that the infant has been left in the custody of a staff or other responsible person of the hospital and that the infant has not been physically neglected or abused."
