congress_website_title = "AN ACT ENABLING RETIREES WHO HAVE NOT RECEIVED PENSIONS EITHER BY CHOICE OR OPERATION OF LAW TO RECEIVE PENSIONS AT AGE SEVENTY YEARS OR OVER, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "\\\"Special Retirement Act of 2007\\\". The bill provides for all reitirees who have not received an old age pension or annuity by choice or operation of law to receive an old-age pension equivalent to 50% of their average monthly compensation, as defined under RA 8291, upon reaching the age of seventy (70) years."
