congress_website_abstract = "Seeks to reduce if not totally eradicate loose firearms and to have a society of responsible gun holders who register their firearms; and, provide stiffer penalties for violation of unlawful possession, acquisition, manufacture, dealing in, acquisition or disposition of firearms, ammunitions and legitimate weapons which will enable law enforcement agencies and prosecutors to implement the law and prosecute violators effectively."
