congress_website_title = "AN ACT PROHIBITING CYBER-TRAFFICKING AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "The bill proposes to impose the following penalties: a) imprisonment of two (2) to five (5) years and a fine of not less than P500,000 but not more than P1 million on any performer, actor or exhibitor of an indecent act; b) imprisonment of 15 to 20 years and a fine of not less than P1 million but not more than P2 million on the internet service provider or website operator; and c) imprisonment of 20 to 30 years and a fine of not less than P2 million but not more than P5 million on the producer or promoter of cyber-trafficking."
