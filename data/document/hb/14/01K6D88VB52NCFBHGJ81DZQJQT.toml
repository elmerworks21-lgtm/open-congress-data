congress_website_title = "AN ACT TO PROHIBIT AND PENALIZE THE RECORDING OF PRIVATE ACT OR ACTS AND OTHER VIOLATIONS OF THE PRIVACY OF AN INDIVIDUAL, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to penalize the mere act of recording or any attempt of recording the private act/s, including but not limited to sexual act, and other violations of the privacy of an individual which would cause public ridicule, without the consent of the parties, and if there is consent in the recording, there is no assent to its sharing, showing or exhibition to other groups."
