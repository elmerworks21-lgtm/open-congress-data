congress_website_title = "AN ACT PRESCRIBING THAT PROVINCES APPROPRIATE AND SET ASIDE ANNUALLY, ACCORDING TO THEIR RESPECTIVE CLASSIFICATIONS, A SPECIFIC SUM FOR THE ACQUISITION OF LAW BOOKS, LAW JOURNALS AND PERIODICALS, IN PRINT OR ENCODED IN DIGITAL OR OTHER ELECTRONIC FORMATS, THAT SHALL FORM PART OF PROVINCIAL PUBLIC LAW LIBRARIES IN THEIR RESPECTIVE JURISDICTIONS FOR THE USE OF LAW STUDENTS, LAWYERS, JUDGES AND COURT PERSONNEL"
congress_website_abstract = "The bill requires all provinces to establish a law section in the public library or a separate public law library for the use of law students, lawyers, judges, court personnel and law enforcement arms."

