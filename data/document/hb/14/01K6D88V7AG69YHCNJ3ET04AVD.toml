congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 8293 ENTITLED \\\"AN ACT PRESCRIBING THE INTELLECTUAL PROPERTY CODE AND ESTABLISHING THE INTELLECTUAL PROPERTY OFFICE, PROVIDING FOR ITS POWERS AND FUNCTIONS AND FOR OTHER PURPOSES\\\""
congress_website_abstract = "The bill aims to protect the rights of performers, phonogram producers and broadcasters from intellectual thievery in the same manner accorded to authors, artistic and literary works. It also seeks to recognize rights to distrbution and rental, and rights to receive payments for certain forms of broadcasting or communication to the public."
