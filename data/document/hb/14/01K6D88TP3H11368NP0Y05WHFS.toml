congress_website_title = "AN ACT EXEMPTING THE INCOME AND RECEIPTS FROM LOANS USED TO FINANCE AGRICULTURALLY BASED, RELATED AND/OR LOCATED ACTIVITIES AND BUSINESSES FROM TAXES"
congress_website_abstract = "This bill exempts all income and receipts from loans used to finance agricultural based, related and.or located activities and businesses from all taxes, including gross receipts and income tax. Given this incentive, the farmers will be able to use the savings from the exemption to increase their production."

