congress_website_title = "AN ACT PROVIDING FOR SECURITY OF TENURE, CODE OF CONDUCT AND ADDITIONAL BENEFITS TO TEACHERS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 4670, OTHERWISE KNOWN AS THE MAGNA CARTA FOR PUBLIC SCHOOL TEACHERS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to grant public school teachers additional benefits and privileges such as gratuity benefit for teachers and non-teaching personnel who choose to retire before the age of 60 years. It likewise guarantees their rights to self-organization and to collective bargaining. It mandates the formulation of a Code of Professional Conduct for the Teaching Professsion."
