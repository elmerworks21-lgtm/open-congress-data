congress_website_title = "AN ACT REQUIRING MANUFACTURERS, PACKERS AND DISTRIBUTORS OF FOOD PRODUCTS, AND RESTAURANT AND FAST-FOOD CHAIN OPERATORS TO SPECIFY IN THEIR RESPECTIVE FOOD LABELS, PACKAGES OR CONTAINERS THE NUTRITION INFORMATION OF EACH PRODUCT AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7394, OTHERWISE KNOWN AS THE \\\"CONSUMER ACT OF THE PHILIPPINES\\\""
congress_website_abstract = "The bill requires food labels, packages or containers to reflect thereon information on the nutritive value of the product: a) number of servings or other units of measure per container; b) total number of calories; and c) the amount of nutrients in each food serving such as total fat, saturated fat and the like."

