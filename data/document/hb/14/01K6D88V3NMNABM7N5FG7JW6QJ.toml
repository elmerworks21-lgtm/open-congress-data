congress_website_title = "AN ACT ESTABLISHING AN INFORMATION COMMUNICATION TECHNOLOGY HUB IN EVERY PROVINCE IN THE PHILIPPINES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The bill proposes the establishment of information communications technology or ICT hubs in the 81 provinces nationwide in order to make the provinces investor-friendly. Locators in the ICT hub shall be granted a 5-year tax break from national taxes provided they are part of the global o & o (off-shoring and outsourcing) industry."
