congress_website_title = "ISANG PANUKALANG-BATAS NA NAGDIDISMIS SA LAHAT NG DEMANDA O IMPORMASYONG NAGBIBINTANG NG KRIMEN O PAGLABAG NA POLITIKAL KAPAG NANALO SA ELEKSIYON SA PAMBANSANG POSISYON AT PARA SA IBA PANG LAYUNIN (AN ACT DISMISSING ALL CHARGES OR INFORMATION ALLEGING POLITICAL CRIMES OR OFFENSES IN CASES OF ELECTION TO A NATIONAL OFFICE, AND FOR OTHER PURPOSES)"
congress_website_abstract = "Layunin ng panukalang batas na ito ang eksonerasyon at/o pagkadismis ng mga naisampang kaso laban sa isang tao dahil sa pagkagawa ng krimen o paglabag na politikal sa oras na maihalal siya sa pambansang posisyon. (The bill seeks the exoneration and/or dismissal of cases against a person for political offenses or crimes against public order, upon his election to public office.)"

