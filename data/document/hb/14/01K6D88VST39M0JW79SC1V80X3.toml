congress_website_title = "AN ACT AMENDING SECTION 6 OF REPUBLIC ACT NO. 1379, OTHERWISE KNOWN AS THE FORFEITURE LAW, TO PROVIDE A FIXED PERCENTAGE OF THE VALUE OF FORFEITED PROPERTIES IN CORRUPTION CASES AS ADDITIONAL FUNDING FOR THE OFFICE OF THE OMBUDSMAN AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares that thirty per cent (30%) of the value of the property forfeited in the accordance with Republic Act No. 1379 shall be given to the office of the Ombudsman, augmenting the fund appropriated to it, thus helping it perform its duties more effectively."

