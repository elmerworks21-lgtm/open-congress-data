congress_website_title = "AN ACT AMENDING ARTICLE 177 OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "This bill amends Article 177 of EO No 209, as follows: \\\"Art. 177. Only children conceived and born outside of wedlock of parents who, at the time of the cenception of the former, were not disqualified by any impediment to marry each other may be legitimated: PROVIDED, THAT LEGITIMIZATION SHALL ATTACH TO CHILDREN WHOSE PARENT OR PARENTS WERE BELOW EIGHTEEN (18) YEARS OF AGE AT THE TIME OF THEIR CONCEPTION OR BIRTH AND SAID PARENT OR PARENTS SUBSEQUENTLY CONTRACTED A VALID MARRIAGE.\\\""
