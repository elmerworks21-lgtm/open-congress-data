congress_website_title = "AN ACT AMENDING BATAS PAMBANSA BLG. 68, OTHERWISE KNOWN AS THE CORPORATION CODE, SECTION 37, GRANTING STOCKHOLDERS THE RIGHT OF APPRAISAL WHEN THE TERM OF CORPORATE EXISTENCE IS EXTENDED"
congress_website_abstract = "Allows the stokeholders who dissent and vote against a proposed corporate action, to withdraw from the corporation demanding payment of the fair value of their shares, e.g., whenever a major change in their contracts of investment occur which they do not agree and which the law presumes they did not foresee when they bought their shares."

