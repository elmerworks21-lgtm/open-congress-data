congress_website_title = "AN ACT GRANTING OLD-AGE PENSION BENEFIT TO RETIREES UNDER REPUBLIC ACT NO. 1616, AS AMENDED, FOR AGED 70 YEARS OR OVER, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "\\\"Special Retirement Act of 2007\\\". The bill grants government employees who retire under RA 1616, as amended, and who are seventy (70) years old or above, old-age pension benefit equivalent to 50% of their average monthly compensation."
