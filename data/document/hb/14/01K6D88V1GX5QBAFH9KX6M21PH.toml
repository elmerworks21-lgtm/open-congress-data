congress_website_title = "AN ACT INCREASING THE CASH PAYMENT GIVEN TO LANDOWNERS AS COMPENSATION FOR LANDS COVERED BY THE COMPREHENSIVE AGRARIAN REFORM PROGRAM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6657, AS AMENDED, OTHERWISE KNOWN AS \\\"THE COMPREHENSIVE AGRARIAN REFORM ACT OF 1988\\\""
congress_website_abstract = "The bill proposes to increase the cash payment for lands covered by the Comprehensive Agrarian Reform Program, to wit: a) 40% for lands above 50 hectares; b) 50% for lands above 24 hectares up to 50 hectares, and c) 60% for lands 24 hectares and below."
