congress_website_title = "AN ACT ADDRESSING THE SYSTEM OF PROSTITUTION OF HUMAN BEINGS, ESPECIALLY WOMEN AND CHILDREN, IMPOSING PENALTIES ON ITS PERPETRATORS, PROVIDING PROTECTIVE MEASURES AND SUPPORT SERVICES FOR ITS VICTIMS, AND DECRIMINALIZING VAGRANCY, REPEALING [AMENDING] FOR THE PURPOSE ARTICLES 202 AND 341 OF THE REVISED PENAL CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Anti-Prostitution Act of 2005\\\". The bill seeks to end the continuing sexual exploitation of women and children and all forms of gender-based violence. It recognizes prostitution as a human rights violation and calls for a coordinated and sustained response from all agencies of the government. It imposes stiff penalties for prostitution and provides social services and programs to help victims of prostitution."
