congress_website_title = "AN ACT RATIONALIZING THE HOUSING SECTOR CREATING THEREBY THE DEPARTMENT OF HOUSING AND URBAN DEVELOPMENT, DEFINING ITS STRUCTURE, PROVIDING FOR ITS POWERS AND FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Omnibus Housing and Urban Development Act of 2007\\\". The bill seeks the creation of the Department of Housing and Urban Development (DHUD) which shall be the primary agency tasked with addressing the nation's needs relating to housing, housing finance, land use and resettlement. The DHUD shall undertake a continuing program that will ensure the optimum use of urban lands and resources, and the availability of adequate, affordable and decent shelter and other basic services for the Filipino people."
