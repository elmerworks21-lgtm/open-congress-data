congress_website_title = "AN ACT PROVIDING FOR THE CRITERIA IN THE ACCREDITATION OF NON-GOVERNMENTAL ORGANIZATIONS, AMENDING FOR THE PURPOSE SECTION 108 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS 'THE LOCAL GOVERNMENT CODE OF 1991' AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill provides for specific criteria in the accreditation of nongovernmental and people's organizations (NGOs/POs) by requiring them to register with the concerned government agency. The NGOs/POs have a strong organizational capability as shown by their track record in project development and implementation. It also provides that in the case of pre-qualifications, bids and awards committee, the NGO or PO or any of its officers must have no conflict of interest in the awarding of infrastructure projects and that no local government official or public officer should interfere in the selection process."
