congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHIMENT, DEVELOPMENT AND MAINTENANCE OF PARKS AND MINI-PARKS IN BARANGAYS, MUNICIPALITIES, CITIES AND PROVINCES, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
