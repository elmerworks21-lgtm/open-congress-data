congress_website_title = "AN ACT TO PROTECT CONSUMERS BY PROMULGATING UNIFORM MANUFACTURING STANDARDS FOR BICYCLE HELMETS AND PROMOTING ITS USE"
congress_website_abstract = "\\\"The Bicycle Helmet Safety Act of 2008.\\\" Provides for the mandatory use of approved bicycle helmets thereby mandating government offices authorized to prescribe uniform standards in the manufacture of such helmets and further authorizes the Department of Transportation and Communication to establish grants for programs that require or encourage individuals to wear approved bicycle helmets."
