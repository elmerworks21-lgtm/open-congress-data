congress_website_title = "AN ACT INSTITUTING REFORMS IN THE REAL PROPERTY VALUATION AND ASSESSMENT PRACTICES IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Real Property Valuation Reform Act Of 2009.\\\" Seeks to remove confusion and provide reliable basis for the assessment of real property taxes, reduce costs of duplication through a single valuation base, and a single appraisal agency, and; establish an efficient and equitable utilization and allocation of land market in the Philippines that shall contribute to the country's economic growth, provide opportunities to the poor and encourage the optimal management and use of land resources."
