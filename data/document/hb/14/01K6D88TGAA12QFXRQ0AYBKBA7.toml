congress_website_title = "AN ACT PROVIDING INCENTIVES TO PUBLIC SCHOOL TEACHERS WHO ARE ASSIGNED OUTSIDE OF THEIR TOWNS AND PROVINCES APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Public School Teachers' Incentives Act of 2007\\\". The bill proposes to grant any public school teacher assigned to a town other than his own a P1,000 monthly incentive allowance. It also proposes to grant a P2,000 monthly incentive allowance to any public school teacher who is assigned to a town of another province other than his own."
