congress_website_title = "AN ACT ESTABLISHING REFORMS IN THE REGULATION OF RENT OF CERTAIN RESIDENTIAL UNITS, PROVIDING THE MECHANISMS THEREFORE AND FOR OTHER PURPOSES"
congress_website_abstract = "“Rent Control Act of 2009.” Seeks to provide a moraturium in any rent increases of all residential units in the National Capital Region (NCR) and other highly urbanized cities, the total monthly rent for each of which does not exceed Fifteen Thousand (P15,000.00) Pesos and all residential units in all other areas, the total monthly rent for each of which does not exceed Eight Thousand (P8,000.00) Pesos, for a period of two (2) years and after such two-year period, and for a period of three (3) years thereafter, the rent of any residential unit within the covered amount stated herein shall not be increased by more than ten (10%) percent annually."
