congress_website_title = "AN ACT IMPROVING PHILIPPINE COMMITMENT TO HUMAN RIGHTS PROMOTION AND PROTECTION BY PROVIDING THE NECESSARY MECHANISMS FOR THE PREVENTION OF THE OCCURRENCE AND PROTECTION FROM THE ADVERSE EFFECTS OF INTERNAL DISPLACEMENT AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill establishes a mechanisms that will: a) prevent the occurrence of internal displacement; b) protect internally displaced persons (IDDs) during displacement; c) address the continuing need of displaced communities; d) provide assistance during the return, resettlement or local integration of IDDs; and e) provide compensation."
