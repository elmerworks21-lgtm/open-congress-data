congress_website_title = "AN ACT PROVIDING FOR THE LEGAL FRAMEWORK AND MECHANISMS FOR THE CREATION, OPERATION, ADMINISTRATION AND COORDINATION OF THE PHILIPPINE BOOK PUBLISHING INDUSTRY DEVELOPMENT CENTER, OTHERWISE KNOWN AS THE 'BOOK CITY', CREATING FOR THE PURPOSE, THE BOOK PUBLISHING ENTERPRISE ZONE AUTHORITY (BPEZA) AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Book City Act of 2007\\\". The measure establishes a special economic zone for the book publishing industry in the Subic Bay Metropolitan Authority to be known as the Book City. It aims to promote the development of the book publishing industry in order to make the local publishing industry globally competitive and to ensure an adequate supply of affordable quality-produced books."
