congress_website_title = "BATAS NA MANGANGASIWA SA AWTORIDAD NG KOMISYON SA ELEKSIYON (COMELEC) UPANG GANAP AT DIREKTANG HUMAWAK NG KONTROL AT PANGANGASIWA KAUGNAY NG PAGSASAGAWA NG ELEKSIYON SA MGA KINAUUKULANG POLITIKAL NA DIBISYON, YUNIT O LUGAR AT SA IBA PANG LAYUNIN (AN ACT TO GOVERN THE COMMISSION ON ELECTIONS' AUTHORITY TO TAKE FULL AND DIRECT CONTROL AND SUPERVISION RELATIVE TO THE CONDUCT OF ELECTIONS IN POLITICAL DIVISIONS, UNITS OR AREAS OF CONCERN, AND FOR OTHER PURPOSES)"
congress_website_abstract = "“Comelec Control Act of 2009.” Layunin ng panukalang batas na tukuyin ang mga pagkakataon kung kailan maaaring ipatupad ang pag-control ng isang lugar ng COMELEC upang matiyak ang malinis at mapayapang election. Inililista rin nito ang mga kapangyarihan at tungkulin ng Komisyon sa pagdiriin ng gayong kontrol, sa pagsusulong ng layunin nito upang maiwasan ang mga karanasan at pandaraya kaugnay ng eleksyon."

