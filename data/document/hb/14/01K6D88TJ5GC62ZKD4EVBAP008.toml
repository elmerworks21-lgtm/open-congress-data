congress_website_title = "AN ACT AMENDING THE SUBDIVISION AND CONDOMINIUM BUYERS' PROTECTIVE DECREE"
congress_website_abstract = "The bill seeks to clarify the gray areas in certain provisions of PD 957. Among others, it provides for greater protection to buyers, includes condominium units and pre-selling scheme within the ambit of the law and provides protection to developers who fail to meet the completion schedule for reasons beyond their control."
