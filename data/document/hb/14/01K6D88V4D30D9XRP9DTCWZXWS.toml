congress_website_title = "AN ACT AMENDING SUBSECTIONS 86(A)(4) AND (6) OF REPUBLIC ACT NO. 8424, AS AMENDED, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE OF 1997"
congress_website_abstract = "The bill proposes to increase the maximum allowable deductible medical expenses in the computation of the net estate for the payment of the estate tax from P500,000 to P1 million. It also seeks to postpone the inclusion of the family home in the computation of the gross estate until after the death of the surviving spouse."

