congress_website_title = "AN ACT MANDATING THE DEPARTMENT OF EDUCATION TO INCLUDE DATING VIOLENCE EDUCATION IN THE PHYSICAL EDUCATION, HEALTH AND MUSIC (PEHM) CURRICULUM FOR SECONDARY EDUCATION"
congress_website_abstract = "Seeks to provide dating violence education to students, parents, staff faculty and administrators, in order to prevent dating violence and to address incidents involving it. The enactment of this policy is in response to several studies that declared that when a student is a victim of dating violence, his or her academic life suffers and his or her safety at school is jeopardized."

