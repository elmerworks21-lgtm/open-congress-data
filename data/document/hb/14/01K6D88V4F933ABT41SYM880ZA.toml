congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT, DEVELOPMENT AND MAINTENANCE OF GREEN AREAS IN ALL RESIDENTIAL AND COMMERCIAL CONDOMINIUM PROJECTS NATIONWIDE, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 4726 OTHERWISE KNOWN AS THE CONDOMINIUM LAW, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill directs owners and developers of residential and commercial condominium projects to reserve, develop and maintain not less than 30% of the total area of the project, exclusive of roads, service streets and alleys, as open space for green areas."
