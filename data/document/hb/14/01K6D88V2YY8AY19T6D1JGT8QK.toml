congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7898 OTHERWISE KNOWN AS THE \\\"AFP MODERNIZATION ACT\\\""
congress_website_abstract = "The bill proposes the following amendments to the AFP Modernization Act (AFP-MA), among others: a) fix the annual appropriations for the AFP-MA in an amount not less than 0.3% of the GNP; b) expand the sources of funding for the AFP-MA Trust Fund; c) create the office of the Undersecretary for Resource Management and Capability Development; and d) make the AFP-MA a continuing effort."
