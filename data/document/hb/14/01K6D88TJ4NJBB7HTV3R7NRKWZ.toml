congress_website_title = "OMNIBUS HOUSING AND URBAN DEVELOPMENT ACT"
congress_website_abstract = "\\\"Omnibus Housing and Urban Development Act of 2007\\\". The bill creates the Department of Housing and Urban Development to supervise urban planning, development and renewal, including land use and zoning, housing and finance. It promotes the flow of private funds into the primary and secondary mortgage markets. It also deals with the 4 aspects of land and housing development: finance, production, regulation and administrative structure."
