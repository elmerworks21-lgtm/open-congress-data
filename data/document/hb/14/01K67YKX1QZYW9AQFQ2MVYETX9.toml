long_title = "AN ACT DEFINING AND PENALIZING CRIMES AGAINST INTERNATIONAL HUMANITARIAN LAW, GENOCIDE AND CRIMES AGAINST HUMANITY, OPERATIONALIZING UNIVERSAL JURISDICTION, DESIGNATING SPECIAL COURTS, AND FOR RELATED PURPOSES"
scope = "National"
subjects = [ "International Crimes",]
congress_website_author_codes = ["A040"]
congress_website_coauthors_raw = ["NOGRALES, PROSPERO C.","DATUMANONG, SIMEON A.","RODRIGUEZ, RUFUS B.","DEFENSOR, MATIAS JR. V.","TAÑADA, LORENZO III M.","DE VENECIA, JOSE JR. C.","ESCUDERO, SALVADOR III H.","LACSON, JOSE CARLOS V.","CHATTO, EDGARDO M.","ABAYA, JOSEPH EMILIO A.","BICHARA, AL FRANCIS D.","MARIANO, RAFAEL V.","JOSON, EDUARDO NONATO N.","ILAGAN, LUZVIMINDA C.","TUPAS, NIEL JR. C.","REMULLA, JESUS CRISPIN C."]
congress_website_committee_codes = ["0520","E507","0532"]
congress_website_primary_keys = [61765]
congress_website_title = "AN ACT DEFINING AND PENALIZING CRIMES AGAINST INTERNATIONAL HUMANITARIAN LAW, GENOCIDE AND CRIMES AGAINST HUMANITY, OPERATIONALIZING UNIVERSAL JURISDICTION, DESIGNATING SPECIAL COURTS, AND FOR RELATED PURPOSES"
congress_website_abstract = "Seeks to define and penalize crimes against International Humanitarian Law, genocide, and crimes against humanity; provide for criminal and administrative liability of commanders and other superiors under the principle of command responsibility; provide protection to the civilians, non-combatants and witnesses as well as reparations to the victims,and; provide for universal jurisdiction over persons, whether military or civilian, suspected or accused of the crimes defined and penalized under this bill and designate the Regional Trial Courts as having original and exclusive jurisdiction over the international crimes punishable under this Act."
