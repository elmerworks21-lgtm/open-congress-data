congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 8293 ENTITLED 'AN ACT PRESCRIBING THE INTELLECTUAL PROPERTY CODE AND ESTABLISHING THE INTELLECTUAL PROPERTY OFFICE, PROVIDING FOR ITS POWERS AND FUNCTIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to amend the Intellectual Property Code through the integration of comprehensive, swift, efficient and adequate strategies designed to respond to the criminal onslaught of internet piracy; aims to give as much concern to the rights of performers, phonogram producers and broadcasters in the same breath as those accorded authors of artistic and literary works by acknowledging the right of such phonogram producers, performers or broadcasters to control or be compensated for the various ways in which their works are used or enjoyed by others, and; give the visually-impaired persons equal and timely eccess to copyrighted printed materials without securing permission from copyright holders to produce their materials."
