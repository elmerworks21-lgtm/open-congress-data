congress_website_title = "AN ACT ACCREDITING THE PHILIPPINE MEDICAL ASSOCIATION, INC. (PMA) AS THE INTEGRATED PROFESSIONAL MEDICAL ORGANIZATION IN THE PHILIPPINES"
congress_website_abstract = "The bill seeks to acknowledge the Philippine Medical Association (PMA) as the only integrated professional medical organization in the country. As such, the Professional Regulation Commission shall issue a license to practice medicine only to members in good standing of the PMA."
