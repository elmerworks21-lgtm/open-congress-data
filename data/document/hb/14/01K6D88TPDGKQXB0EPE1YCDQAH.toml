congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8368, OTHERWISE KNOWN AS THE 'ANTI-SQUATTING LAW REPEAL ACT OF 1997'"
congress_website_abstract = "\\\"Revised Anti-Squatting Law of 2005\\\". The bill considers as professional squatter/s any person or groups of persons who occupy or possess the property of a landowner against his will, or who, having received a written demand to either vacate or pay rent to said landowner, refuses to do so within a period of 90 days."
