congress_website_title = "AN ACT INSTITUTING THE MAGNA CARTA FOR FILIPINO SEAFARERS"
congress_website_abstract = "The measure establishes mechanisms for the enhancement of administrative, adjudicative, social and welfare services for Filipino seafarers and for their families. It also aims to maintain and develop of a pool of competent and world class seafarers of all grades and ratings through a system of education and training and of accreditation and licensing."

