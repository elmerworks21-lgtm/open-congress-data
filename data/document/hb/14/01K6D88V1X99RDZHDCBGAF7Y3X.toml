congress_website_title = "AN ACT MANDATING THE COURTS TO ENSURE THAT THE MATTER OF SUPPORT FOR THE COMMON CHILDREN EVEN NOT ALLEGED ON THE PLEADINGS OR RAISED AS AN ISSUE, BE RESOLVED IN FINAL JUDGMENTS GRANTING PETITIONS FOR LEGAL SEPARATION, OR FOR ANNULMENT OF MARRIAGE, AND FOR DECLARATION OF NULLITY OF MARRIAGE AMENDING FOR THE PURPOSE EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS \\\"THE FAMILY CODE OF THE PHILIPPINES\\\""
congress_website_abstract = "The measure directs the courts to ensure that the matter of support for common children, even if it is not alleged in the pleadings or raised as an issue by the parties, is taken up during the proceedings and ruled upon in the final judgment granting the petition for legal separation or for annulment of marriage."
