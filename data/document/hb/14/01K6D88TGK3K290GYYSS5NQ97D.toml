congress_website_title = "AN ACT ESTABLISHING AN INTERNATIONAL COMPENSATION FUND FOR OIL POLLUTION DAMAGE, PROVIDING PENALTIES THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Oil Pollution Liability and Compensation Act (OPA) of 2007\\\". This bill proposes to adopt and implement the provisions of the 1992 International Convention on Civil Liability for Oil Pollution Damage and the 1992 International Convention on the Establishment of an International Fund for Compensation for Oil Pollution Damage. The two (2) conventions provide a system of compensation for pollution damage caused by a ship as a result of an incident, and for the cost of recovery measures to prevent or minimize such damage."
