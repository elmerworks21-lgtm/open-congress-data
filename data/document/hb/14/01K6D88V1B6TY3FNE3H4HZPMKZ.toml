congress_website_title = "AN ACT INCREASING THE INTERNAL REVENUE ALLOTMENT OF LOCAL GOVERNMENT UNITS (LGUs) AND AUTHORIZING ITS AUTOMATIC RETENTION, AMENDING FOR THAT PURPOSE SECTION 284 AND 286 OF R.A. No. 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "The measure increases the internal revenue allotment (IRA) of local government units (LGUs) from 40% to 60% of the national internal revenue collection. It also allows LGUs to automatically retain their share in the IRA."

