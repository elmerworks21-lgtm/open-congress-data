congress_website_title = "AN ACT STRENGTHENING THE CONSTITUTIONAL RIGHT OF THE PEOPLE TO FREE EXPRESSION, PEACEABLY ASSEMBLE AND PETITION THE GOVERNMENT FOR REDRESS OF GRIEVANCES"
congress_website_abstract = "\\\"The Public Assembly Act of 2007\\\". The bill provides that no other procedural or administrative requirement shall be imposed upon a person or persons intending to organize and hold a public assembly in a public place except to give notice to the local chief executive having jurisdiction over the place. It clearly defines the role the police during rallies."
