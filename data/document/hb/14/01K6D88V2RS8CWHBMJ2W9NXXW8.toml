congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED 6939, CREATING THE COOPERATIVE DEVELOPMENT AUTHORITY"
congress_website_abstract = "The bill proposes the creation of the Cooperative Development Council that shall serve as the advisory body of the Coperative Development Authority on matters of policies, plans and programs. It also creates the Cooperative Adjudication Board that shall have jurisdiction over disputes and grievances between and among members of the cooperatives as well as between cooperatives."

