congress_website_title = "AN ACT GRANTING OLD-AGE PENSION FOR LIFE TO SENIOR CITIZENS WHO RETIRED UNDER REPUBLIC ACT 1616 AS WELL AS SURVIVORSHIP BENEFITS TO THEIR SURVIVORS"
congress_website_abstract = "The bill allows retirees who retired under RA 1616 and who is qualified to retire under RA 660 or PD 1146, to automatically convert his gratuity retirement to a pension system of his choice under existing laws and thereafter receive the old-age pension for life as well as survivorship benefits for survivors. In addition, the retiree shall not be required to reimburse the GSIS for the retirement gratuity previously received by him from his last employer."
