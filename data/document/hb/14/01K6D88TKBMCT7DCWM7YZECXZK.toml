congress_website_title = "AN ACT MANDATING THE ESTABLISHMENT OF A FACILITY FOR NON-SCHOOL AGE CHILDREN IN PRIVATE COMPANIES EMPLOYING AT LEAST 100 WOMEN WORKERS AND OTHER PURPOSES"
congress_website_abstract = "\\\"Mother-Child Friendly Facility Act of 2007\\\". Mandates every private company employing at least one hundred (100) women to establish a drop-in facility for non-school age children in the workplace to ensure their proper care while the mothers are disposing of their professional duties in the company."

