congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED SEVENTY-SIX HUNDRED AND FIFTY-THREE ENTITLED 'THE NEW CENTRAL BANK ACT' AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill mandates the Bangko Sentral ng Pilipinas (BSP) to adopt the best international practices in banking supervision and other other measures that will strengthen the regulatory and supervisory powers of the BSP over banks and other financial institutions. It also aims to enhance the ability of the BSP to provide policy directions in the areas of money, banking and credit."
