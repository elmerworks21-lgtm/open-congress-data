congress_website_title = "ISANG PANUKALA NA NAGTATAKDA SA \\\"SALVAGING\\\" O PAGPATAY NA HINDI UTOS NG HUKUMAN NG ISANG OPISYAL NG PAMAHALAAN, AUTORIDAD O ALAGAD NG BATAS BILANG KARUMALDUMAL NA KRIMEN, PAGPATAW NG PARUSANG KAMATAYAN PARA DITO AT PARA PA SA IBANG LAYUNIN (AN ACT QUALIFYING SALVAGING OR EXTRAJUDICIAL KILLING BY ANY PUBLIC OFFICER, PERSON IN AUTHORITY OR AGENT OF A PERSON IN AUTHORITY AS A HEINOUS CRIME, IMPOSING THE DEATH PENALTY THEREFOR AND FOR OTHER PURPOSES)"
congress_website_abstract = "\\\"Batas Laban sa Salvaging\\\". Ang panukalang ito ay nagpapataw ng parusang kamatayan sa sinumang opisyal ng pamahalaan, autoridad o alagad ng batas para sa anumang salvaging o pagpatay na hindi utos ng hukuman. (\\\"The Anti-Salvaging Law\\\". The bill provides for the imposition of the death penalty upon any public officer, person in authority or agent of a person in authority for any salvaging or extrajudicial killing.)"
