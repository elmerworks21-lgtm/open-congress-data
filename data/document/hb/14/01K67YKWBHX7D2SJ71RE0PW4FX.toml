title = "CANAMAN, MAGARAO, BOMBON AND CALABANGA CIRCUMFERENTIAL ROAD"
long_title = "AN ACT CONVERTING A LOCAL ROAD NETWORK INTO A NATIONAL CIRCUMFERENTIAL ROAD LINKING THE MUNICIPALITIES OF CANAMAN, MAGARAO, BOMBON AND CALABANGA WITH THE CITY OF NAGA IN THE PROVINCE OF CAMARINES SUR BY CONNECTING THE PROVINCIAL ROAD PASSING THROUGH BARANGAYS PAGATPAT, BIGAAS, FABRICA, SIBAO AND PANICUASON IN THE MUNICIPALITY OF CALABANGA AND WITH THE NATIONAL ROADS LINKING AND TRAVERSING BARANGAYS CAROLINA, PACOL, SAN FELIPE, LIBOTON AND BAGUMBAYAN NORTE IN THE CITY OF NAGA, THROUGH THE BARANGAYS OF HARING, SAN AGUSTIN AND BARAS IN THE MUNICIPALITY OF CANAMAN, THROUGH THE BARANGAYS SAN FRANCISCO, SANTO TOMAS, SAN MIGUEL, SAN PANTALEON, SAN ISIDRO, SAN JUAN AND MONSERAT IN THE MUNICIPALITY OF MAGARAO, THROUGH THE BARANGAYS OF SAN ROQUE, SAN JOSE AND SAN ISIDRO IN THE MUNICIPALITY OF BOMBON, AND THENCE TO BARANGAY QUIPAYO IN THE MUNICIPALITY OF CALABANGA, THEREBY CREATING A NATIONAL ROAD NETWORK"
scope = "Local"
subjects = [ "Roads, Conversion Into a National Road",]

