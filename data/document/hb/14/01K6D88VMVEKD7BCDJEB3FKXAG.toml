congress_website_title = "AN ACT PROVIDING PRIVATE SECTOR EMPLOYEES COMPENSATORY TIME OFF, BIWEEKLY WORK SCHEDULES AND FLEXIBLE CREDIT HOURS"
congress_website_abstract = "\\\"Family Friendly Workplace Act of 2008.\\\" Seeks to afford further protection to labor by providing employees in the private sector demands of workplaces with their their personal needs and those of their families by allowing employers to offer compensatory time off, which employees may voluntarily elect to receive, and to establish biweekly work programs and flexible credit hour programs, in which employees may voluntarily participate."
