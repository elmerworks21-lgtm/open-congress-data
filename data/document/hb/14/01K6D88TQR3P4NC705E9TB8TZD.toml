congress_website_title = "AN ACT CREATING THE DEPARTMENT OF INFORMATION AND COMMUNICATIONS TECHNOLOGY, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFORE, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Department of Information and Communications Technology Act of 2005\\\". The measure seeks the creation of the Department of Communication and Information Technology that will be responsible for providing the policy and legal environment and the institutional mechanisms that will promote the development of information and communication technology in the country. The Department shall also ensure the availability of enabling factors such as infrastructure support, financial resources and qualified/skilled human resources, etc."
