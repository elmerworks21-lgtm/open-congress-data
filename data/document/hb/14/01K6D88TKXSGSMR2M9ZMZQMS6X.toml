congress_website_title = "AN ACT PROVIDING FOR STIFFER PENALTIES AGAINST PUBLIC OFFICIALS AND EMPLOYEES WHO REFUSE OR NEGLECT TO ACT PROMPTLY ON THE PUBLIC'S PERSONAL TRANSACTIONS AND COMMUNICATIONS AS REQUIRED UNDER REPUBLIC ACT NO. 6713, OTHERWISE KNOWN AS THE 'CODE OF CONDUCT AND ETHICAL STANDARDS FOR PUBLIC OFFICIALS AND EMPLOYEES'"
congress_website_abstract = "The bill imposes a fine of not less than the equivalent of three (3) months salary but not more than the equivalent of six (6) months salary or suspension of not less than six (6) months but not more than one (1) year or removal from office on any public servant who fails to act promptly on letters and other communication from the public."
