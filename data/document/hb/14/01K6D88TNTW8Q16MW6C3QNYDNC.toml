congress_website_title = "AN ACT TO REFORM AND STRENGTHEN THE SANGGUNIANG KABATAAN (SK), AMENDING FOR THAT PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Sangguniang Kabataan Reform and Empowerment Act of 2007\\\". The bill seeks to grant the Katipunan ng mga Kabataan oversight powers to make SK officials accountable to their constituencies in the areas of local planning, budget and disbursement of funds. It provides for the creation of the Katipunang Pangkaunlaran ng mga Kabataan. It introduces an anti-dynasty clause in the SK."

