congress_website_title = "AN ACT REQUIRING ALL INDEPENDENT POWER PRODUCERS, GENERATION COMPANIES OR ENERGY RESOURCE DEVELOPERS TO REMIT THE AMOUNT THEY ARE REQUIRED TO SET ASIDE AS FINANCIAL BENEFIT TO HOST COMMUNITIES"
congress_website_abstract = "In order to expedite the remittance of the financial benefit (one centavo per kilowatt hour of the total electricity sales) that independent power products, generation companies and energy resource developers are required to set aside for the affected host communities, the bill directs said entities to remit the benefits directly to the communities concerned."
