congress_website_title = "AN ACT ADDRESSING THE SYSTEM OF PROSTITUTION, IMPOSING PENALTIES ON ITS PERPETRATORS, PROVIDING PROTECTIVE MEASURES AND SUPPORT SERVICES FOR ITS VICTIMS, AND DECRIMINALIZING VAGRANCY, REPEALING FOR THE PURPOSE ARTICLES 202 AND 341 OF THE REVISED PENAL CODE AND AMENDING R.A. 9208, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Anti-Prostitution Act of 2007\\\". The bill seeks to shift the accountability for prostitution from the persons exploited in prostitution to those who really gain from the system of prostitution, i.e., the business establishments (sauna, bath and massage parlors; motels, hotels and lodging houses; bars, etc.) and the buyers who are predominantly men."
