congress_website_title = "AN ACT ESTABLISHING A FAIR PRICING SYSTEM FOR DRUGS, BIOLOGICALS, MEDICINES, AND HEALTH CARE SERVICES TO BE REIMBURSED BY THE PHILIPPINE HEALTH INSURANCE CORPORATION (PHILHEALTH), AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 7875, OTHERWISE KNOWN AS \\\"THE NATIONAL HEALTH INSURANCE ACT OF 1995\\\""
congress_website_abstract = "\\\"Fair Pricing in Pharmaceuticals Act of 2006\\\". The bill directs the Philippine Health Insurance Corporation to undertake the following: a) to conduct regular price monitoring of all drugs and biologicals listed in the Philippine National Drug Formulary; b) to determine and establish the fair price for the listed drugs and biologicals being monitored; and c) to disseminate the determined fair price of drugs and biologicals to the general public, government agencies, health institutions and health industry."

