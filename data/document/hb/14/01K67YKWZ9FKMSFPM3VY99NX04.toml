title = "EID'L ADHA"
date_filed = "2009-05-21"
long_title = "AN ACT DECLARING THE TENTH DAY OF ZHUL HIJJA, THE TWELFTH MONTH OF THE HIJRAH CALENDAR A NATIONAL HOLIDAY FOR THE OBSERVANCE OF EID’L ADHA, AMENDING FURTHER FOR THE PURPOSE SECTION 26, CHAPTER 7 OF EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE ADMINISTRATIVE CODE OF 1987, AS AMENDED, AND FOR OTHER PURPOSES"
scope = "Local"
subjects = [ "Administrative Code of 1987", "Holidays",]
congress_website_author_codes = ["D078"]
congress_website_coauthors_raw = ["DATUMANONG, SIMEON A.","DILANGALEN, DIDAGEN P.","MANGUDADATU, DATU PAX S.","JIKIRI, YUSOP H.","ARBISON, MUNIR M.","CABILAO, BELMA A.","JAAFAR, NUR G.","GO, ARNULFO F.","ILAGAN, LUZVIMINDA C.","HATAMAN, MUJIV S.","RODRIGUEZ, RUFUS B.","DIMAPORO, ABDULLAH D.","BALINDONG, PANGALIAN M."]
congress_website_committee_codes = ["0523","0532"]
congress_website_primary_keys = [22484]
congress_website_title = "AN ACT DECLARING THE TENTH DAY OF ZHUL HIJJA, THE TWELFTH MONTH OF THE HIJRAH CALENDAR A NATIONAL HOLIDAY FOR THE OBSERVANCE OF EID'L ADHA AMENDING FURTHER FOR THE PURPOSE SECTION 26, CHAPTER 7 OF EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE ADMINISTRATIVE CODE OF 1987, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to declare the Tenth day of Zhul, the Twelfth month of the Hijrah Calendar, a national holiday, for the observance of Eid'l Adha or the Feast of sacrifice, which is celebrated by Muslims all over the world every year on the tenth day of Dhul Hijjrah - the last month of the Islamic lunar calendar, in commemoration of the great sacrifice by Prophet Ibrahim."
