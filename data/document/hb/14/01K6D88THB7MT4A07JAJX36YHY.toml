congress_website_title = "AN ACT ESTABLISHING A NATIONAL PROGRAM FOR FILIPINO GIFTED CHILDREN, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Gifted Children Act of 2007\\\". The measure seeks the establisment of the Center for the Gifted Children that shall be responsible for the following, among others: 1) the identification and placement of gifted children, b) scholarship grants and other forms of assistance, c) training of parents on parenting gifted children, and d) establishment of linkages and networking with institutions involved with gifted children."
