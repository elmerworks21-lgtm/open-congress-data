congress_website_title = "AN ACT PROVIDING INCENTIVES TO ALL BARANGAY OFFICIALS, INCLUDING BARANGAY TANODS AND MEMBERS OF THE LUPONG TAGAPAMAYAPA, AND BARANGAY EMPLOYEES AND FOR OTHER PURPOSES"
congress_website_abstract = "“Barangay Incentives Act of 2004”. The bill proposes to grant barangay officials the following benefits: a) income tax exemption, b) exemption from capital gains and transfer taxes, c) GSIS benefits, d) health benefits, and e) free legal representation in administrative and criminal cases filed in connection with the performance of their official duties."
