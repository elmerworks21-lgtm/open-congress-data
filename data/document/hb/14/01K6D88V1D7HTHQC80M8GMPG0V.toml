congress_website_title = "AN ACT TO SPUR THE PLANTING OF A BILLION TREES AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill targets the planting of a billion trees covering about 1.0 million hectares over a period of five years. It proposes to tap the police, local government units, military, upland communities, the private sector, NGOs and civic organizations in the reforestation program."
