congress_website_title = "AN ACT AMENDING TITLE VI OF E.O. NO. 209, AS AMENDED, OTHERWISE KNOWN AS THE FAMILY CODE BY REMOVING AND/OR ERASING DISTINCTIONS BETWEEN LEGITIMATE, ILLEGITIMATE AND LEGITIMATED FILIATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill grants all children the following rights: a) to bear the surname of the father and mother in conformity with the provisions of the Civil Code and special laws; b) to receive support from their parents, their descendants and in proper cases, their brothers and sisters; and c) to be entitled to legitimate and other successional rights without any distinction whatsoever."

