congress_website_title = "AN ACT TO STRENGTHEN AND ENHANCE THE USE OF ENGLISH AS THE MEDIUM OF INSTRUCTION IN PHILIPPINE SCHOOLS"
congress_website_abstract = "The bill mandates the use of English as a medium of instruction in all curriculum levels and in examinations for admission, accreditation, acceleration and promotion. It allows the inclusion of questions in Filipino provided the questions do not exceed 10% of the total points in the examination."
