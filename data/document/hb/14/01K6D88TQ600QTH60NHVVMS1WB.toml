congress_website_title = "AN ACT PROHIBITING THE PRESENTATION TO THE PRESS OR PUBLIC OF SUSPECTS IN CRIMINAL INVESTIGATIONS BEFORE CASES ARE FORMALLY FILED AGAINST THE SUSPECTS"
congress_website_abstract = "The bill proposes to hold a person criminally, civilly and administratively liable for presenting a suspect, who is being investigated, publicly or in a press conference. It also proposes certain guideliness on what the police can do to keep the public informed as to the status of pending high-profile cases."
