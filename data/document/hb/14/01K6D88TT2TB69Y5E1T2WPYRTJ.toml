congress_website_title = "AN ACT ESTABLISHING MARINE PROTECTED AREAS IN ALL COASTAL MUNICIPALITIES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8550, OTHERWISE KNOWN AS \\\"THE PHILIPPINE FISHERIES CODE OF 1998\\\" AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill establishes at least one (1) marine protected area (MPA) in every coastal municipality in the country. The MPA shall be used to conserve biodiversity, manage natural resources, protect endangered species, reduce user conflicts, provide educational and research opportunities and enhance recreational fisheries."
