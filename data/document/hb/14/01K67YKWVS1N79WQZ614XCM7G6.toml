congress_website_title = "AN ACT ESTABLISHING THE REGULATORY FRAMEWORK FOR THE LIQUEFIED PETROLEUM GAS (LPG) AND RELATED INDUSTRIES, DEFINING AND PENALIZING CERTAIN PROHIBITED ACTS INVOLVING LPG AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"LPG Act Of 2008.\\\" Establishes the regulatory and supervisory framework for liquefied petroleum gas (LPG) and related industries, enjoining accountablity and responsibility in the industry; promotes quality, safety and fair trade practices in the business; and promotes consumer welfare and enhances competition by providing stricter guidelines to all persons or entities in the business and all other activities involving or related to LPG, Auto-LPG, LPG cyliders, LPG containers and anciliary equipment and LPG seals."
