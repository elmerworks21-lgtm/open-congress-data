congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED SEVENTY-EIGHT THIRTY-TWO, AS AMENDED, OTHERWISE KNOWN AS THE 'ANTI-ELECTRICITY AND ELECTRIC TRANSMISSION LINES/MATERIALS PILFERAGE ACT OF 1994'"
congress_website_abstract = "Seeks to provide a new incentive scheme to encourage the public to report pilferage activities to the National Transmission Corporation (TRANSCO), any private electric utility or rural electric cooperative in the area where pilferage is being committed, and seeks to increase the penalties for violation of this Act, with the hope that with a new incentive scheme and increased penalties, violators would be discouraged from doing or continuing their unscrupulous deeds and it is expected that the savings to be enjoyed by the electric sector will redound to the benefits of loyal and honest paying electric consumers who are clamoring for efficient power supply at reasonable rates."
