congress_website_title = "AN ACT PROVIDING FOR THE MANNER AND DATE OF ELECTION OF THE SECTORAL REPRESENTATIVES IN LOCAL SANGGUNIANS AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the election of three (3) sectoral representatives in the local sanggunians, to wit: a) one (1) from the women's sector; b) one (1) from the workers' sector; and c) one from any of the following sectors: indigenous peoples and cultural communities, differently-abled persons, senior citizens, victims of calamities, and children and urban poor."
