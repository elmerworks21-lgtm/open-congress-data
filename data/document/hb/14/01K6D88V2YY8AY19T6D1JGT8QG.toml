congress_website_title = "AN ACT TO REGULATE THE PRACTICE OF CLINICAL PSYCHOLOGY AND PSYCHOMETRICS CREATING FOR THIS PURPOSE A PROFESSIONAL REGULATORY BOARD OF CLINICAL PSYCHOLOGY AND PSYCHOMETRICS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSE"
congress_website_abstract = "The bill defines the scope of the practice of psychologists and psychometricians and sets the criteria for the licensure of the practitioners of the profession. It creates a clinical and psycometrics board tasked to oversee the practice of the profession and the issuance of licenses."
