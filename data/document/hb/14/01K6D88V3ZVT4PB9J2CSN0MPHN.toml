congress_website_title = "AN ACT PENALIZING DISOBEDIENCE TO THE WRIT OF HABEAS CORPUS AND OTHER ACTS AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill proposes to punish disobedience to the writ under the following instances: a) a person who refuses or neglects to obey the writ; b) a member of the court who knowingly recommits to prison a person already discharged; c) a clerk of court who refuses without reason to issue a writ; and d) a person who intently transfers residence or transfers a person under his custody of restraint to elude the service of the writ."
