congress_website_title = "AN ACT PROVIDING FOR A CEILING ON ALL PUBLIC DEBTS OF THE REPUBLIC OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Public Debt Ceiling Act of 2007\\\". The bill provides for the following: a) a debt ceiling equivalent to 5% of the country's GNP; b) concurrence of Congress if the debt ceiling is to be exceeded; c) foreign loans shall be contracted or guaranteed solely to finance economic and social infrastructure programs; and d) the concurrence of the Senate in bilateral agreement involving official assistance such as grants and commodity credit arrangements or indebtedness."
