congress_website_title = "AN ACT TO ENHANCE THE PHILIPPINE ENVIRONMENTAL IMPACT ASSESSMENT (EIA) SYSTEM, TO STRENGTHEN PUBLIC PARTICIPATION THEREIN, AND FOR RELATED PURPOSES"
congress_website_abstract = "“EIA Act of 2007”. The measure seeks to consolidate under a singular legislative framework the various presidential and department orders that had been issued to implement the EIA (environmental impact assessment) system. It proposes to create an independent national environmental protection body and calls for the development of technical expertise and capacity among implementing agencies."
