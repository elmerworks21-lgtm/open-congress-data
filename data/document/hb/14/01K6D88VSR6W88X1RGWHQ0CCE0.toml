congress_website_title = "AN ACT PROVIDING FOR THE RESETTLEMENT, AID AND REHABILITATION SERVICES FOR THE UNDERPRIVILEGED AND HOMELESS CITIZENS AFFECTED BY THE DEMOLITION OF HOUSES/DWELLINGS ALONG DANGER AREAS AS WELL AS THE VICTIMS OF DISASTERS AND CALAMITIES AND THOSE AFFECTED BY GOVERNMENT INFRASTRUCTURE PROJECTS IN URBAN AREAS AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to benefit the poor and homeless Filipinos who suffered damages and injuries to their persons and properties while being removed from danger areas. Victims of disasters and calamities and those affected by government infrastructure projects are also covered by this Act. Resettlement centers, home sites or town sites will be established for the immediate relief of the displaced underprivileged families and homeless citizen in urban areas."

