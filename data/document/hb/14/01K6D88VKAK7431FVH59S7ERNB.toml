congress_website_title = "AN ACT TO ESTABLISH ADVERTISING REQUIREMENTS FOR ALCOHOLIC BEVERAGES"
congress_website_abstract = "Prohibits the following, among others: a) the advertising or promotion of alcoholic beverages in any tape, audio disc, videotape, video arcade game, computer game or in film; b) outdoor advertising of alcoholic beverages within 100 feet of any school, playground, or other public facility visited by minors."

