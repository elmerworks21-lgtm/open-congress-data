congress_website_title = "AN ACT RATIONALIZING THE PROCEEDINGS IN AND RESOLUTION OF ELECTORAL PROTESTS AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill provides for the following, among others: a) reasonable filing fees to cover only the administrative costs for accepting and docketing the protest; b) for the proclaimed winner who is eventually ousted in the protest to shoulder all costs; c) the imposition of a time limit in the resolution of protests; and d) disqualification of an ousted winner from running for any elective position."

