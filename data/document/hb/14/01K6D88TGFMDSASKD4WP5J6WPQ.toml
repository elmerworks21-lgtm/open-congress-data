congress_website_title = "AN ACT INSTITUTIONALIZING A SCHOOL MODERNIZATION AND INNOVATION PROGRAM FOR PUBLIC ELEMENTARY AND SECONDARY SCHOOLS, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"School Modernization and Innovation Act of 2007\\\". This bill aims to institutionalize a comprehensive modernization program for public schools and to provide a mechanism for the private sector and for local government units to participate in the program. The bill also seeks to establish the School Modernization and Innovation Trust Fund which will augment regular appropriations under the General Appropriations Act."

