congress_website_title = "AN ACT IMPROVING PHILIPPINE COMMITMENT TO HUMAN RIGHTS PROMOTION AND PROTECTION BY PROVIDING THE NECESSARY MECHANISMS FOR THE PREVENTION OF THE OCCURRENCE AND PROTECTION FROM THE ADVERSE EFFECTS OF INTERNAL DISPLACEMENT AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Internal Displacement Act of 2007\\\". The bill seeks to recognize and respect the rights of citizens to be protected against enforced or involuntary displacement from his home or place of habitual residence, to receive humanitarian assistance, to be protected during displacement and to return to the safety of one's home or to resettle."
