congress_website_title = "AN ACT CREATING THE NATIONAL CAREER ASSESSMENT EXAMINATION TO INSTITUTIONALIZE A CAREER DIRECTION PROGRAM FOR SECONDARY SCHOOL GRADUATES, DEFINING ITS SCOPE AND FUNCTIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"National Career Assessment Examination Act Of 2010.\\\" Seeks to guarantee protection and promotion of the right of all citizens to quality education by providing a fair, reasonable and equitable assessment of academic requirements for admission to tertiary education and assess the academic, technical and vocational aptitudes of secondary school graduates in order to facilitate and rationalize their placement in degree and non-degree courses as the case may be."
