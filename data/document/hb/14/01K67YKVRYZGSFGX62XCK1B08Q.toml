congress_website_title = "AN ACT PROVIDING FOR CHEAPER MEDICINES AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to foster greater competition among drug companies thereby lowering the prices of medicines. It provides the government with better policy tools to influence the supply and demand of medicines. It establishes the Drug Price Regulation Board to set the maximum retail prices of medicines, among others."
