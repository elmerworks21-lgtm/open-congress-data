congress_website_title = "AN ACT CREATING THE GOVERNMENT ASSET MANAGEMENT AUTHORITY, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Government Asset Management Act of 2007\\\". The bill seeks to establish the Government Asset Management Authority (GAMA) that shall be responsible for the privatization and disposition of non-performing government assets and the recovery ill-gotten wealth of government officials. The GAMA is envisioned to take over and continue the powers, functions and duties of the Presidential Commission on Good Government, the Privatization Council and the Privatization Management Office."
