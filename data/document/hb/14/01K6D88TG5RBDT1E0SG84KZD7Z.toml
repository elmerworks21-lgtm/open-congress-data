congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT 9165 OTHERWISE KNOWN AS THE COMPREHENSIVE DANGEROUS DRUGS ACT OF 2002"
congress_website_abstract = "The bill seeks to penalize the possession of controlled precursors and essential chemicals by an individual with the intent to use said chemical for an illegal activity. It also provides that in computing the equivalent monetary value of dangerous drugs, the base for such computation shall be 100% purity of said drug."
