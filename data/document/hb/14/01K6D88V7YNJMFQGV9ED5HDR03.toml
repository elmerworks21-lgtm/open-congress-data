congress_website_title = "AN ACT PROVIDING FOR THE MINIMUM CONTENTS OF A COMPREHENSIVE REPORT OF ELECTIONS TO THE PRESIDENT AND TO CONGRESS BY THE COMMISSION ON ELECTIONS"
congress_website_abstract = "Directs the COMELEC to include in its report to the President and to Congress to a narrative assessment and basic electoral data - on voters; on precincts; on the number of ballots, election returns, ballot boxes and all other accountable forms; on candidates; on election protests, violence and other election violations and offenses; and other data deemed important."

