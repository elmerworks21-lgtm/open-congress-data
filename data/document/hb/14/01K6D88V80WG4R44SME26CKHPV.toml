congress_website_title = "AN ACT AMENDING SECTIONS 24(c) AND 35 OF REPUBLIC ACT NO. 8424 OTHERWISE KNOWN AS \\\"THE TAX REFORM ACT OF 1997\\\" AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill proposes to increase the personal exemption of individual taxpayers as follows: a) single - from P20,000 to P30,000; b) head of the family - from P25,000 to P50,000; and c) married individual - from P32,000 to P50,000. It also increase the additional exemption for dependents from P8,000 to P12,000 for each dependent not exceeding four."
