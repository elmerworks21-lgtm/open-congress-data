congress_website_title = "AN ACT DEFINING AND PENALIZING ENFORCED OR INVOLUNTARY DISAPPEARANCE AND FOR OTHER PURPOSES"
congress_website_abstract = "“Anti-Enforced or Involuntary Disappearance Act of 2007”. The salient features of the bill include the following, among others: a) it adopts the United Nations definition of enforced or involuntary disappearance, b) it considers enforced or involuntary disappearance as a continuing offense, and c) it prescribes penal sanctions for enforced disappearance ranging from arresto mayor to reclusion perpetua."
