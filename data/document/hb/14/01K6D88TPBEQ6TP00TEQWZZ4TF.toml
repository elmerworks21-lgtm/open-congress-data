congress_website_title = "AN ACT ESTABLISHING A MORE COMPETITIVE AND REALISTIC SALARY SCHEME FOR CAREER EXECUTIVE SERVICE (CES) OFFICIALS"
congress_website_abstract = "The bill proposes a two-tiered salary structure for government executives to enable them to receive higher salaries commensurate to their qualifications. The first tier grants a 150% adjustment on the present rate for CES positions to career executive service and the second tier grants a 100% adjustment for non-CESOs incumbent in CES positions."
