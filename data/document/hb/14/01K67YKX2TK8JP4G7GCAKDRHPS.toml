congress_website_title = "AN ACT AMENDING SECTIONS 6(F), 71 AND 270 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED, ALLOWING THE EXCHANGE OF INFORMATION BY THE BUREAU OF INTERNAL REVENUE ON TAX MATTERS PURSUANT TO THE INTERNATIONALLY AGREED TAX STANDARDS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Exchange Of Information On Tax Matters Act Of 2009.\\\" Seeks to comply with the Internationally Agreed Tax Standards (IATS) for Exchange of Information to effectively carry out the country's commitments under bilateral tax treaties designed to combat tax abuses; strengthen the authority of our tax administration to directly respond to request for tax information from treaty partners, and; provide sanctions for officers of banks and financial institutions for willful refusal to supply information and strict obligation of the requesting foreign tax authority to maintain confidentiality"
