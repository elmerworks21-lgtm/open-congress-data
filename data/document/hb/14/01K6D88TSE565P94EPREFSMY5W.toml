congress_website_title = "AN ACT DECLARING ALL DISPOSABLE LANDS OF THE GOVERNMENT WHICH HAVE REMAINED IDLE AND SUITABLE FOR RESIDENTIAL PURPOSES SHALL BE DEVELOPED INTO SOCIALIZED HOUSING SITE FOR LOW-SALARIED GOVERNMENT AND PRIVATE EMPLOYEES AND SQUATTERS"
congress_website_abstract = "The bill directs the National Housing Authority to take over idle public lands which are not suitable for agriculture and which have been left idle for the past ten (10) years for development into a residential project to be reserved for low-salaried government and private employees inlcuding squatters."
