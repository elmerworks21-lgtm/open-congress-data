congress_website_title = "AN ACT TO REGULATE THE CABLE TELEVISION INDUSTRY IN THE PHILIPPINES, PROVIDING IMPLEMENTING MECHANISMS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Cable TV Act of 2007\\\". Ar present, cable TV is classified under the broadcast industry although some sectors claim that it belongs to the telecommunications sector. But cable TV can neither be classified as public utility nor media. The proposed bill tries to resolve this issue by recognizing it as a separate and distinct industry meant to supplement and complement the telecommunications and broadcast sectors. The upgrading of the cable TV industry will allow for alternative modes of communication such as cable internet and cable telephony. These modes of communication will help facilitate the exchange and delivery of information in the country."

