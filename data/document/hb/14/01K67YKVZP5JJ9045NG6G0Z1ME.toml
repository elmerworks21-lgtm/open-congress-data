congress_website_title = "AN ACT GRANTING TAX RELIEF FOR INDIVIDUAL TAXPAYERS AMENDING FOR THE PURPOSE SECTIONS 34, 35 AND 79 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "The bill proposes to increase the personal exemption of individual taxpayers as follows: a) single - from P20,000 to P50,000; b) head of the family - from P25,000 to P50,000; and c) married individual - from P32,000 to P50,000. It also increase the additional exemption for dependents from P8,000 to P25,000 for each dependent not exceeding four."
