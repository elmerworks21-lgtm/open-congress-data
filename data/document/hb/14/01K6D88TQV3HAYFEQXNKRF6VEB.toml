congress_website_title = "AN ACT STRENGTHENING FURTHER THE PHILIPPINE COMPREHENSIVE POLICY ON THE PREVENTION AND CONTROL OF AIDS BY ENHANCING THE EXISTING HIV AND AIDS INFORMATION AND EDUCATIONAL PROGRAM AND ITS MONITORING SYSTEM APPROPRIATING FOR THE CARE AND SUPPORT OF PEOPLE LIVING WITH HIV AND AIDS AND THEIR AFFECTED FAMILIES, AS WELL AS PROVIDE AN AUGMENTATION FUND TO INCREASE THE ANNUAL BUDGET OF THE PHILIPPINE NATIONAL AIDS COUNCIL (PNAC), AMENDING FOR THE PURPOSE SECTIONS 3, 4, 5, 7, 11, 25, 30, 32, 33, 34, 42, 43, 45, 46, 47 AND 48, ADDING SECTION 49 AND RENAMING ARTICLE V - HIV AND AIDS SURVEILLANCE - OF REPUBLIC ACT NO. 8504, OTHERWISE KNOWN AS 'THE PHILIPPINE AIDS PREVENTION AND CONTROL ACT OF 1998'"
congress_website_abstract = "The bill seeks to enhance the existing HIV and AIDS information and educational program in order to increase the level of awareness of the citizenry on the malady and encourage behavioral changes. It also provides for an Augmentation Fund to increase the annual budget of the Philippine National Aids Council."
