congress_website_title = "AN ACT GRANTING ADDITIONAL INSURANCE BENEFITS TO ALL PUBLIC SCHOOL TEACHERS, PROVIDING FUNDS FOR THE PAYMENT OF ITS PREMIUMS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Public School Teachers' Insurance Act of 2007\\\". This bill seeks to improve the plight of teachers by improving the benefits afforded to them to encourage the best minds to join the teaching profession. Specifically, this provides additional insurance benefits to public school teachers, over and above the benefits granted by the Government Service Insurance System."
