congress_website_title = "AN ACT STRENGTHENING AND RATIONALIZING THE NATIONAL PROSECUTION SERVICE, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 1275, ENTITLED 'REORGANIZING THE PROSECUTION STAFF OF THE DEPARTMENT OF JUSTICE AND THE OFFICES OF THE PROVINCIAL AND CITY FISCALS, REGIONALIZING THE PROSECUTION SERVICE, AND CREATING THE NATIONAL PROSECUTION SERVICE', AS AMENDED, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to further amend Presidenial Decree No. 1275 which organized the Prosecution Staff of the Department of Justice and the offices of the Provincial and City Fiscals, regionalized the prosecution service and created the National Prosecution Service by providing for additional plantilla positions and raising the benefits of prosecutors to attract lawyers of caliber and retain them to ensure a more efficient and effective prosecution service for a better administration of justice."
