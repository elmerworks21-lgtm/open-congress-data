congress_website_title = "AN ACT AMENDING THE PENAL CODE, ARTICLE 259 ON ABORTION"
congress_website_abstract = "Seeks to put more teeth to the Constitutional ban on abortion by providing that penalties imposed by law be meted in their maximum and by imposing the additional penalty of perpetual loss of license to practice their profession by the guilty individuals. Further exempts a woman on whom the abortion was performed from criminal prosecution in exchange for her testimony against the physician, midwife, nurse or health worker concerned."
