congress_website_title = "AN ACT REQUIRING THE PREPARATION AND ISSUANCE OF THE CERTIFICATE OF VOTES AS REPLICA OF THE ELECTION RETURNS AND PRESCRIBING A REVISED C.E. FORM NO. 13, AMENDING FOR THAT PURPOSE SECTION 215 OF THE OMNIBUS ELECTION CODE, AS AMENDED BY R.A. NO. 6646, SECTION 16"
congress_website_abstract = "Seeks to make the electoral data more accessible with suggested legal and adminstrative remedies consisting of: 1) revision of the format of C. E. Form No. 13, otherwise known as the Certificate of Votes (CoV), to make it more comprehensive and similar to the Election Returns (ERs); 2) allowing the accredited party watchers to prepare the CoV in duplicate; and 3) authentication of the document by all the Board of Election Inspector (BEI) members and at least three (3) accredited party watchers as a necessary safeguard."
