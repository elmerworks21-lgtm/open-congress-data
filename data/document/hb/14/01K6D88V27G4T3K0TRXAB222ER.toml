congress_website_title = "AN ACT TO PROVIDE FOR ADDITIONAL BENEFITS AND PRIVILEGES TO PUBLIC SCHOOL TEACHERS IN THE BASIC EDUCATION SYSTEM, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED FORTY-SIX HUNDRED SEVENTY, OTHERWISE KNOWN AS THE MAGNA CARTA FOR PUBLIC SCHOOL TEACHERS, AND FOR OTHER PURPOSES"
