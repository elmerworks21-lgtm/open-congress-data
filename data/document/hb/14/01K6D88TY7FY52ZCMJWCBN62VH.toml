congress_website_title = "AN ACT REQUIRING TOBACCO MANUFACTURERS TO USE A MINIMUM OF SEVENTY FIVE PERCENT (75%) LOCALLY PRODUCED TOBACCO IN THE MANUFACTURE OF CIGARETTES IN THE PHILIPPINES"
congress_website_abstract = "The measure penalizes cigarette manufacturers who fail to comply with the local tobacco component mandated under the proposed measure. The proposed penalties are - a fine of P10 million for the first offense, P30 million for the second offense and P50 million for the 3rd offense plus closure of the cigarette plant."

