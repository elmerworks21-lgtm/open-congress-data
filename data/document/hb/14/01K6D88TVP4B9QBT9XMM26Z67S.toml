congress_website_title = "AN ACT ALLOWING FILIPINO WORLD WAR II VETERANS TO CONTINUE RECEIVING PHILIPPINE GOVERNMENT PENSIONS AND BENEFITS EVEN WHEN THE SAME OR SIMILAR PENSIONS AND BENEFITS ARE PROVIDED BY THE UNITED STATES GOVERNMENT, THEREBY AMENDING SECTION 10 OF REPUBLIC ACT NO. 6948, AS AMENDED"
congress_website_abstract = "\\\"Preserving the Pension and Benefits of Filipino World War II Veterans Act of 2007\\\". The bill provides for World War II veterans to receive the old-age pension of P7,000 per month for life. It also provides for the monthly pension to be increased annually by not less than P300.00 per month."
