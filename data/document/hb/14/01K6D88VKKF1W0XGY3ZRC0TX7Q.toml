congress_website_title = "AN ACT RATIONALIZING THE PERCENTAGE OF SALES ALLOCATION TAXABLE BY THE CITY OR MUNICIPALITY WHERE FACTORIES, PROJECT OFFICES, PLANTS AND PLANTATIONS ARE LOCATED IN THE PURSUIT OF THEIR BUSINESSES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Seeks to adjust the local government tax rate, to wit: a) on sales recorded in the principal office of manufacturers, assemblers, contractors, producers and exporters with factories, project offices, plants and plantations taxable by the city/municipality where the principal office is located - from 30% to 20% in the first year and 10% thereafter; and b) on sales recorded in the principal office taxable by the city/municipality where the factory, project or plantation is located - from 70% to 80% on the first year and 90% thereafter."

