congress_website_title = "AN ACT TO ESTABLISH A SOCIALIZED AND LOW COST HOUSING RESTRUCTURING PROGRAM, PROVIDING THE MECHANISMS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Socialized and Low-Cost Housing Loan Restructuring Act of 2007\\\". The measure seeks to institute a restructuring program for all socialized housing loan accounts (loans amounting to P225,000 and below) and all low-cost housing loan accounts (loans amounting to over P225,000 but not exceeding P500,000) in government financing institutions."
