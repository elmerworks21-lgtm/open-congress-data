congress_website_title = "ISANG PANUKALANG-BATAS NA NAGTATADHANA SA PAGSASAGAWA NG REFERENDUM PARA SA BOTO NG KUMPIYANSA, PAGLALAAN NG PONDO PARA DITO AT PARA SA IBA PANG LAYUNIN (AN ACT PROVIDING FOR THE HOLDING OF A VOTE OF CONFIDENCE REFERENDUM, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES)"
congress_website_abstract = "Ang panukalang batas na ito ay nagpapatawag ng isang referendum tatlong (3) taon pagkaraan ng pambansang election upang mabatid kung ang Presidente at ang Bise Presidente ay binibigyan pa ng tiwala at kumpyansa ng taongbayan. (The bill calls for the holding of a referendum three (3) years after the national election to determine whether the President and the Vice President still has the trust and confidence of the people.)"
