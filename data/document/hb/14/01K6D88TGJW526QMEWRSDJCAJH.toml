congress_website_title = "AN ACT STRENGTHENING THE POLITICAL PARTY SYSTEM, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Political Party Development Act of 2007\\\". The measure seeks to reform the orientation of our political parties so as to veer away from the concept of traditional politics and to discourage \\\"turncoatism\\\". It also seeks the creation of a party development fund that shall provide subsidy to political parties of national character for their operational expenses and party building activities."
