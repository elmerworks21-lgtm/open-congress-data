congress_website_title = "AN ACT REQUIRING PROVINCIAL GOVERNORS, CITY AND MUNICIPAL MAYORS, AND PUNONG BARANGAY TO POST AND PUBLISH WITHIN THE TERRITORIAL JURISDICTION OF THEIR LOCAL GOVERNMENT UNITS A SUMMARY OF ALL INCOME AND REVENUE FROM BOTH PUBLIC AND PRIVATE SOURCES AS WELL AS A LISTING OF ALL DISBURSEMENTS, EXPENDITURES AND UTILIZATION OF FUNDS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill directs the provincial governors, city and municipal mayors and punong barangay to post in public places a summary of all income and and expenditures of their respective local government units at the end of every quarter and at the end of every calendar year."

