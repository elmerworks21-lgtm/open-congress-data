congress_website_title = "AN ACT PROHIBITING AND PENALIZING THE USE OF CELLULAR PHONES AND OTHER ELECTRONICS COMMUNICATIONS EQUIPMENT WHILE DRIVING MOTOR VEHICLE AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to penalize any person who uses a cell phone while driving a motor vehicle with imprisonment of not less than six (6) months but not more than two (2) years and a fine of not less than P50,000 but not more than P100,000."
