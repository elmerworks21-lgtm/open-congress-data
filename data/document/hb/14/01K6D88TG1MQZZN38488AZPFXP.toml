congress_website_title = "AN ACT PROVIDING FOR THE SYNCHRONIZED ELECTIONS IN 2010, EXTENDING THE TERM OF OFFICE OF BARANGAY OFFICIALS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "\\\"Synchronized Elections Act of 2007\\\". The bill seeks to reset the barangay elections scheduled to be held on the last Monday of October 2007 to coincide with the national and local elections which shall be held on the second Monday of May 2010."
