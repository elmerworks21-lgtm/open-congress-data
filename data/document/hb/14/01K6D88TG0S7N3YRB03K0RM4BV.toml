congress_website_title = "AN ACT PROVIDING FOR A NATIONAL POLICY ON REPRODUCTIVE HEALTH, RESPONSIBLE PARENTHOOD AND POPULATION DEVELOPMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Reproductive Health,Responsible Parenthood and Population Development Act of 2007\\\". The measure seeks to proivde the enabling environment for couples and individuals to enjoy the right to decide freely and responsibly on the number and spacing of their children and to have the information, education and access to safe, effective, affordable and acceptable methods of family planning of their choice."
