congress_website_title = "AN ACT AMENDING SECTIONS 11 AND 16 OF REPUBLIC ACT NUMBER 7586 OTHERWISE KNOWN AS THE NATIONAL INTEGRATED PROTECTED AREAS SYSTEM ACT"
congress_website_abstract = "The bill authorizes the retention of 75% of the revenue gnerated from the operations of the NIPAS (National Integrated Protected Areas System) and the management of wild flora and fauna by the Protected Areas Management Board. The said revenue shall be utilized for the protection, maintenance, administration and management of protected areas."
