congress_website_title = "AN ACT PENALIZING AN OWNER OR LESSOR OF A BUILDING, WAREHOUSE, OR ANY EDIFICE, WHO OMITS TO ASCERTAIN THAT THE PROPERTY SUBJECT OF LEASE IS UTILIZED IN THE MANUFACTURE OR STORAGE OF DANGEROUS DRUGS, CONTROLLED PRECURSORS, AND ESSENTIAL CHEMICALS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9165, OTHERWISE KNOWN AS THE COMPREHENSIVE DRUGS ACT OF 2002"
congress_website_abstract = "This bill seeks to impose a penalty of imprisonment from 12 years and 1 day to 20 years and a fine ranging from P100,000 to P500,000 on the owner of a building, warehouse or any edifice whose property is used for the manufacture or storage of dangerous drugs."
