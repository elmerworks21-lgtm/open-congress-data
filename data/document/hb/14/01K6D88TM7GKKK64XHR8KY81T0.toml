congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF DRUG REHABILITATION CENTER IN EVERY REGION OF THE COUNTRY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This measure seeks to establish a drug rehabilitation center in every region in the country to provide medical and psychiatric treatment to drug dependents. By making medical facilities easily accessible, drug dependents are provided an opportunity to become useful and productive members of the community again."
