congress_website_title = "ISANG PANUKALANG-BATAS NA NAGSASAINSTITUSYON SA PATAKARAN NG ESTADO SA SEGURIDAD SA PAGKAIN AT PARA SA IBA PANG LAYUNIN (AN ACT TO INSTITUTIONALIZE STATE POLICIES ON FOOD SECURITY, AND FOR OTHER PURPOSES)"
congress_website_abstract = "Ang panukalang ito ay nagmumungkahi ng pagtatayo ng Lupon sa Seguridad sa Pagkain; paglahok ng lokal na gobyerno at 1000 pangunahing corporasyon sa produksiyon ng pagkain; intensipikasyon ng produksiyon ng hybrid na binhing buto at paglalaan ng mga pasilidad sa pag-iimbak dito at iba pa. (The bill proposes the creation of the Food Security Board; the participation of local government units and the top 1000 corporations in food production; and the intensification of hybrid seed production and provision of storage facilities therefor; among others."
