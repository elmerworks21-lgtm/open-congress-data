congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED 7309 ENTITLED \\\"AN ACT CREATING A BOARD OF CLAIMS UNDER THE DEPARTMENT OF JUSTICE FOR VICTIMS OF UNJUST IMPRISONMENT OR DETENTION AND VICTIMS OF VIOLENT CRIMES AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to create a Board of Claims under the Commission of Human Rights and thereby changing all references to the Department of Justice and Secretary to Commission of Human Rights and Chairman, respectively; increase the compensation for victims of unjust imprisonment or detention to P10,000.00 and the amount necessary to reimburse the claimant the expenses incurred for hospitalization, medical treatment, loss of wage, loss of support and others to P100,000.00, or whichever is lower."
