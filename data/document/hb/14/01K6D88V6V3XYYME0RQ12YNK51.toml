congress_website_abstract = "The bill proposes the following amendments to the AFP Modernization Act: a) fix the annual appropriation for the AFP Modernization Act to not less than .3% of the GNP; b) establish a continuing research and development program for the upgrading of the AFP equipment and weapons systems; and c) expand the sources of funding for the AFP Modernization Act Trust Fund; among others."
