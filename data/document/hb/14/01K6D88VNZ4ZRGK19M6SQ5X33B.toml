congress_website_title = "AN ACT MAKING ANY DISCUSSION OF ANY MATTER OF PUBLIC CONCERN, OR CRITICISM OF OFFICAL CONDUCT OR THE CONDUCT OF PUBLIC FIGURES, QUALIFIEDLY PRIVILEGED, INCREASING FINES FOR THE CRIME OF LIBEL, AND PROVIDING FOR THE VENUE OF LIBEL CASES FILED AGAINST COMMUNITY JOURNALISTS, THEIR EDITOS, BUSINESS MANAGERS OR PUBLISHERS, AMENDING FOR THE PURPOSE ARTICLES 354, 355, 356, 357, 360 AND 361 OF ACT NO. 3815, OTHERWISE KNOWN AS THE REVISED PENAL CODE OF THE PHILIPPINES"
congress_website_abstract = "Aims to allow journalists to do their work without fear of being jailed by reason of criminal complaints by those who are offended by their reporting, thus encouraging media to be more vigilant and active in their crusade against graft and corruption."
