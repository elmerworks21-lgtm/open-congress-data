congress_website_title = "AN ACT PROHIBITING THE DETENTION OF LIVE OR DEAD PATIENTS IN HOSPITALS AND MEDICAL CLINICS ON GROUNDS OF NONPAYMENT OF HOSPITAL BILLS OR MEDICAL EXPENSES"
congress_website_abstract = "Seeks to allow live or dead patient to leave the hospital of medical clinic, with a right to demand the issuance of the corresponding medical certificate and other pertinent papers required for the release, upon execution of a promissory note covering unpaid obligation. States that the promissory note shall be secured by either a mortgage or by a guarantee of a co-maker who will be jointly and severally liable with the patient for the unpaid obligation."
