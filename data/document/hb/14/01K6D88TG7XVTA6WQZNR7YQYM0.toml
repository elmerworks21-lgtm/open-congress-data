congress_website_title = "AN ACT ESTABLISHING THE MARITIME AND OCEAN AFFAIRS CENTER AS AN ATTACHED AGENCY OF THE DEPARTMENT OF FOREIGN AFFAIRS, PROVIDING FOR ITS FUNCTIONS AND RESPONSIBILITIES, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Maritime and Ocean Affairs Center Act of 2002\\\". This measure seeks the creation of the Maritime and Ocean Affairs Center (MOAC) which shall serve as the secretariat to the Department of Foreign Affairs on maritime and ocean affairs matters. Among its other functions, the MOAC shall initiate steps to harmonize and update domestic legislation and rules and regulations with international agreements to which the Philippines is a party."
