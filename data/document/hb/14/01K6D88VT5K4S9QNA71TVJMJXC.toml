congress_website_title = "AN ACT PROVIDING FOR THE LEGITIMATION OF CHILDREN BORN TO PARENTS WHO ARE BELOW MARRYING AGE, AMENDING FOR THE PURPOSE THE FAMILY CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Nowadays the incidents of children born out of wedlock to parents who are disqualified under the law to marry each other because of the issue of minority is almost an everyday occurrence. It is in the light of the foregoing that in the amendment of the provision of the Family Code is earnestly sought in order to uphold the rights of children as well as their human dignity."

