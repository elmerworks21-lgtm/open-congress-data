congress_website_title = "AN ACT PROVIDING FOR THE DISCLOSURE OF LOBBYING ACTIVITIES IN THE PHILIPPINES AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "\\\"Lobbying Disclosure Act Of 2009.\\\" Seeks to make lobbying activities more public thus ensuring openness, honesty and integrity in dealings of and between public officials and Members of Congress and lobbyists or lobby groups thereby enhancing the people's trust and confidence in government in practicing transparency in the enactment of laws; make it possible for citizens to communicate their views on controversial issues and provide vital information to policymakers and public officials."
