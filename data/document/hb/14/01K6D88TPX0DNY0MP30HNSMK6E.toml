congress_website_title = "AN ACT PROHIBITING ANY EMPLOYMENT ADVERTISEMENT PRESCRIBING APPLICANTS TO BE GRADUATES OF CERTAIN LEARNING INSTITUTIONS THEREBY DEFEATING CONSTITUTIONAL MANDATE OF EQUAL EMPLOYMENT OPPORTUNITY FOR ALL THEREFORE AND FOR OTHER PURPOSES"
congress_website_abstract = "The measure prohibits \\\"entry-point discrimination\\\" which is defined as the hiring of young applicants and graduates from renowned school. It imposes a fine of P10,000 but not more than P100,000 or imprisonment of six (6) months and one (1) day to six (6) years or both to guilty employers."

