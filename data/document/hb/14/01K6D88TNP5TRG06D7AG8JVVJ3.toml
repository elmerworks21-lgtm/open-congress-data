congress_website_title = "AN ACT MODIFYING THE PRESCRIBED CUMULATIVE INVESTMENT CEILINGS IN THE INVESTMENT RESERVE FUNDS OF SOCIAL SECURITY SYSTEMS, THEREBY AMENDING SECTION 26 OF RA 8282 OTHERWISE KNOWN SOCIAL SECURITY ACT OF 1997, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill sets the prescribed cumulative investment ceiling in the investment reserve funds of the Social Security System at the following levels: a) 25% in private securities, b) 50% in housing, c) 40% in real estate related investments, d) 25% in short and medium-term member loans, e) 20% in government financial institutions and corporations, f) 15% in infrastructure projects, g) 20% in any particular industry, and h) 20% in foreign currency denominated investments."
