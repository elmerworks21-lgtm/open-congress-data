congress_website_title = "AN ACT AMENDING ARTICLE 16 OF EXECUTIVE ORDER NO. 209 AS AMENDED BY EXECUTIVE ORDER NO. 227, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES, MAKING IT MANDATORY FOR COUPLES TO UNDERGO COUNSELING PRIOR TO THE ISSUANCE OF A MARRIAGE LICENSE"
congress_website_abstract = "\\\"Mandatory Marriage Counseling Act\\\". The bill provides for mandatory marriage counseling for all couples intending to marry, regardless of whether they need parental consent or parental advise to marry. It seeks to educate couples on the rigors of marriage and how to cope with the challenges marriage will bring."
