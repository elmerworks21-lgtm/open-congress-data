congress_website_title = "AN ACT PROVIDING FOR A MANDATORY LABELING OF POLYVINYL CHLORIDE (PVC) PRODUCTS AND FOR OTHER PURPOSES"
congress_website_abstract = "Requires all manufacturers to label polyvinyl chlorine (PVC) products with a clearly-worded warning that the product contains di-ethylhexyl-phthalate (DEHP). If the PVC product has no DEHP, it must also bear a label that it has no DEHP."
