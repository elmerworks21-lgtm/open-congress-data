congress_website_title = "PANUKALANG-BATAS PARA SA PATAKARANG GANAP NA PAGBABAWAL SA BARIL O TOTAL GUN BAN AT SA PAGGAMIT NG MGA PAMALIT NA SANDATANG DI-NAKAMAMATAY SA PHILIPPINE NATIONAL POLICE (PNP) AT IBA PANG AHENSIYANG NAGPAPATUPAD NG BATAS, PAGLALAAN NG PONDO PARA DITO AT PARA SA IBA PANG LAYUNIN (AN ACT PROVIDING FOR A TOTAL GUN BAN POLICY AND THE USE OF NON-LETHAL WEAPONS AS SUBSTITUTE BY THE PHILIPPINE NATIONAL POLICE (PNP) AND OTHER LAW ENFORCEMENT AGENCIES, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
