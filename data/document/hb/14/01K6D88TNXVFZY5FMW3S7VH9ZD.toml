congress_website_title = "AN ACT IMPLEMENTING THE RIGHT OF ACCESS TO INFORMATION ON MATTERS OF PUBLIC CONCERN GUARANTEED UNDER SECTION SEVEN, ARTICLE III OF THE 1987 CONSTITUTION AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Freedom of Access to Information Act of 2007\\\". The bill seeks to: a) put in place a uniform, simple, speedy and effective means of enforcing the right to information; b) provide a clear penalty for the unlawful denial of access to official information; and c) clarify further the scope of the guarantee by defining its coverage and prescribing reasonable limitations."
