congress_website_title = "AN ACT DECLARING A NATIONAL POLICY ON TOURISM AS THE PRIMARY ENGINE OF INVESTMENT, EMPLOYMENT, GROWTH AND NATIONAL DEVELOPMENT AND STRENGTHENING THE DEPARTMENT OF TOURISM, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"Tourism Act of 2007\\\". The bill calls for the establishment of a national policy framework for tourism that will unify the efforts of all sectors in the industry in terms of development and promotion. It also seeks to strengthen the Department of Tourism by streamlining its structure and its attached agencies."
