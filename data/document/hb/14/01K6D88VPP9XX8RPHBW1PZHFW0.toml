congress_website_title = "AN ACT PRESCRIBING FOR ADDITIONAL INCENTIVES AND BENEFITS TO ALL UNIFORMED PERSONNEL OF THE ARMED FORCES OF THE PHILIPPINES DEPLOYED IN THEATERS OF WAR AND WHO ARE ENGAGED IN COMBAT OPERATIONS"
congress_website_abstract = "Seeks to recognize the services and sacrifices of the uniformed personnel of the Armed Forces of the Philippines who protect and uphold the interests of the vast majority of peace-loving Filipinos, in maintaining order for healthy and conducive social and economic activities, and in safeguarding vital and strategic facilities important to the people and to the economy by providing them additional incentives and benefits."

