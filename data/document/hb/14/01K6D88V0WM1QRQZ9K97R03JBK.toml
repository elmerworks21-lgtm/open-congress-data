congress_website_title = "AN ACT INCREASING THE PENSION OF FILIPINO WORLD WAR II VETERANS OR THEIR SURVIVING SPOUSES INCLUDING THOSE WHO ARE OTHERWISE DISQUALIFIED ON ACCOUNT OF THE PENSION THEY ARE RECEIVING FROM OTHER GOVERNMENT FUNDS OR THE UNITED STATES GOVERNMENT, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6948, AS AMENDED, OTHERWISE KNOWN AS \\\"AN ACT STANDARDIZING AND UPGRADING THE BENEFITS FOR MILITARY VETERANS AND THEIR DEPENDENTS\\\""
