congress_website_title = "AN ACT AMENDING SECTION 4 OF PRESIDENTIAL DECREE NO. 968, OTHERWISE KNOWN AS THE PROBATION LAW OF 1976, AS AMENDED, ON THE GRANT OF PROBATION"
congress_website_abstract = "The bill gives the accused the right to apply for probation despite his appeal from the judgment of conviction if his appeal is for the sole purpose of reducing the penalty within probationable limits and the appellate court modifies the judgment by imposing a probationable penalty."
