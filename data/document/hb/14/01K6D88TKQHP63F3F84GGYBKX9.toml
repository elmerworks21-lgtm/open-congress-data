congress_website_title = "AN ACT PROVIDING FOR THE PRESERVATION, REFORESTATION, AFFORESTATION AND SUSTAINABLE DEVELOPMENT OF MANGROVE FORESTS IN THE PHILIPPINES, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"National Mangrove Forest Protection and Preservation Act of 2007\\\". This bill establishes and sets aside portions of land in the coastal areas solely for the preservation, protection, reforestation and sustainable management of mangrove forests. It penalizes the destruction and cutting of mangrove trees, as well as the dumping of waste products within the reservation areas and makes the offenders pay for the rehabilitation cost of the damaged mangrove areas."

