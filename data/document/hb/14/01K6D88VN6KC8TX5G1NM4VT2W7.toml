congress_website_title = "AN ACT AMENDING SECTION 14 OF REPUBLIC ACT NO. 7166, OTHERWISE KNOWN AS THE \\\"SYNCHRONIZED ELECTION LAW OF 1991\\\", ON THE PARTICULAR OFFICE WHERE CANDIDATES SHALL FILE THEIR STATEMENTS OF ELECTION CONTRIBUTIONS AND EXPENDITURES AND PROVIDING ADMINISTRATIVE SANCTIONS FOR VIOLATIONS OF SAID SECTION"
congress_website_abstract = "The bill proposes to designate the particular Commission of Elections (COMELEC) office where the statement of expenditures and constributions in connection with the election are to be filed. It further seeks to correct the flaw in the existing law whereby the provisions decriminalize only the failure to declare election expenses while failure to file statements of election contributions by the contributor required is still classified as an election offense. Furthermore, it proposes that all violations of the provisions concerning electoral contributions and expenditures be penalized administratively."
