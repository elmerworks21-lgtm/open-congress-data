congress_website_title = "AN ACT DECLARING THE ARNIS AS THE PHILIPPINE NATIONAL SPORT"
congress_website_abstract = "Declares Arnis as the Philippine National Sport and its official adoption as such shall be promulgated by inscribing its symbol in the official seal of the Philippine Sports Commission and by making it as the first sport in the competition to be played by participating teams in the annual Palarong Pambansa."
