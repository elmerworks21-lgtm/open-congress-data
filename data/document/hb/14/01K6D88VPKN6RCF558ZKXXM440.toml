congress_website_title = "AN ACT PROHIBITING THE USE OF CELLULAR OR MOBILE TELEPHONES IN CERTAIN PUBLIC AREAS OF HOSPITALS, MEDICAL CENTERS, OR ANY OTHER TREATMENT CENTER"
congress_website_abstract = "Seeks to prohibit the use of cellular or mobile phones in certain public areas of hospitals, medical centers, or any other treatment center to prevent radio frequency interference not only with peacemakers but also with other medical devices such as ventilators, patient monitors, neonatal warmers, motorized wheelchairs, and anesthesia delivery equipment."

