congress_website_title = "AN ACT ADOPTING A SALARY SCHEDULE FOR THE MEMBERS OF THE BENCH AND OTHER LAWYERS IN THE JUDICIARY, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to further beef up the compensation package for the members of the judiciary to put their income at par with that of an average law practitioner. Even with special allowances granted under RA 9227, the justices and judges can not still be considered as adequately compensated for the sensitive duties and responsibilites that their positions entail."
