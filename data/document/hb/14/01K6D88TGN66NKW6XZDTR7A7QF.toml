congress_website_title = "AN ACT INSTITUTIONALIZING REFORMS IN REAL PROPERTY APPRAISAL AND ASSESSMENT PRACTICES IN THE PHILIPPINES, CREATING FOR THE PURPOSE THE NATIONAL APPRAISAL AUTHORITY AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Real Property Appraisal and Assessment Reform Act of 2007\\\". The measure calls for the establishment of a National Appraisal Authority that shall set valuation standards, regulations and specifications consistent with generally accepted valuation standards for real property appraisal; provide technical assistance on real property appraisal matters; and review and approve the schedule of market values; among others."
