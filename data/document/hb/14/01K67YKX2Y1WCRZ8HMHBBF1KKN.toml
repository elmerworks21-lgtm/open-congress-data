congress_website_abstract = "\\\"Motorcycle Helmet Act Of 2009.\\\" Seeks to pursue a more proactive and preventive approach to secure the safety of motorists, their passengers and pedestrians at all times through the mandatory enforcement of the use of standard protective motorcycle helmet; secure and safeguard its citizenry, particularly the operators or drivers of motorcycles and their passengers, from the ruinous and extremely injurious effects of fatal or life threatening accidents and crashes."
