congress_website_title = "AN ACT ALLOWING MARRIED OR LEGALLY SEPARATED WOMEN TO USE THEIR MAIDEN NAME AND SURNAME, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 386, ALSO KNOWN AS THE CIVIL CODE, ARTICLES 370 AND 372, AND EXECUTIVE ORDER 209 SERIES OF 1987, ALSO KNOWN AS THE FAMILY CODE, ARTICLE 63"
congress_website_abstract = "Seeks to provide a married woman an option to use: 1) her maiden first name and surname; or 2) her maiden first name and surname and add her husband's surname; or 3) her maiden first name and her husband's surname; or 4) her husband's full name, but affixing a word indicating that she is his wife, such as Mrs.; and provides further that when legal separation has been granted, the wife may either continue using her name and surname employed before the legal separation or her maiden name first name and surname."

