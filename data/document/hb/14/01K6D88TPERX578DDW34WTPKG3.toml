congress_website_title = "AN ACT REORGANIZING THE NATIONAL FOOD AUTHORITY INTO THE NATIONAL FOOD CORPORATION AND THE FOOD DEVELOPMENT AND REGULATORY ADMINISTRATION, REDEFINING THEIR POWERS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"National Food Authority Reorganization Act of 2005\\\". The bill seeks to reorganize the National Food Authority (NFA) into: a) the National Food Corporation, attached to the Office of the President, responsible for buffer stocking for food security purposes, and b) the Food Development and Regulatory Administration, attached the Department of Agriculture, to discharge the regulatory functions of the NFA."
