congress_website_title = "AN ACT DEFINING AND PENALIZING ENFORCED OR INVOLUNTARY DISAPPEARANCE, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Anti-Enforced or Involuntary Disappearance Act of 2007\\\". The bill imposes the penalty of reclusion perpetua upon the following persons, among others: a) those who directly committed the act of enforced or involuntary disappearance; b) those who directly forced, instigated, encourage or induced others to commit the act of enforced or involuntary disappearance; and c) those officials who allowed the act of enforced or involuntary disappearance when it is within their power to stop the commission of the act."
