congress_website_title = "AN ACT ESTABLISHING A STATUTE OF REPOSE FOR DURABLE GOODS USED IN A TRADE OR BUSINESS"
congress_website_abstract = "The bill prohibits the filing of a civil action against a manufacturer or seller of a durable good (goods or components thereof that has a normal life expectancy of three (3) years or more and is used in trade or business) for damage to property or for death or personal injury arising out of an accident if the accident occurs more than 18 years after the date of delivery of the durable good."
