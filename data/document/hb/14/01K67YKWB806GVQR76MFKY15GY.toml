long_title = "AN ACT CONVERTING A NATIONAL SECONDARY ROAD NETWORK THAT CONNECTS THE UPLAND BARANGAYS IN THE MUNICIPALITY OF CALABANGA, PROVICE OF CAMARINES SUR, STARTING FROM BARANGAY PAOLBO, TRAVERSING THE BARANGAYS OF BINANUAANAN GRANDE, BINANUAANAN PEQUEÑA COMAGUINKING, BURABOD, HARUBAY, QUINALE, PIÑADA AND BALOMBON TO BARANGAY TOMAGODTOD AND THROUGH BARANGAYS MANGUIRING AND STA. CRUZ ON THE WAY BACK TO BARANGAY PAOLBO, BY ESTABLISHING A NATIONAL CIRCUMFERENTIAL ROAD LINKING THE AFOREMENTIONED BARANGAYS, THEREBY PROVIDING MORE EFFICIENT TRANSPORT FACILITIES FROM THE FARMS TO THE MARKETS OF AGRICULTURAL PRODUCTS WITHIN THE AREA AND THROUGH THE PRIMARY NATIONAL HIGHWAY"
