congress_website_title = "AN ACT GRANTING EXEMPTIONS FROM SECURING PERMISSION FROM THE PUBLISHER OR COPYRIGHT OWNER OF PRINTED MATERIALS TO REPRODUCE THE SAME IN A SPECIALIZED FORMAT FOR THE EXCLUSIVE USE OF BLIND OR VISUALLY-IMPAIRED INDIVIDUALS, AMENDING FOR THIS PURPOSE SECTION 185 OF REPUBLIC ACT NO. 8293, OTHERWISE KNOWN AS THE \\\"INTELLECTUAL PROPERTY CODE OF THE PHILIPPINES\\\", AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to give visually-impaired persons equal and timely access to copyrighted print materials by exempting from the Intellectual Property Code the translation of printed materials into formats for the visually-impaired."
