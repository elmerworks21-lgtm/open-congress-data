congress_website_abstract = "Seeks to enhance public awareness and participation on environmental restoration and protection; encourage the participation of the public and private civil society in the reforestation program of the government; generate incetives and additional sources of income and livelihood without impairing the ecological balance or our natural resources; reduce poverty incidence in the uplands; cover available lands possible, including but not limited to, the protection and production of forest lands and private lands; and accelerate the implementation of reforestation programs with minimal government assistance."
