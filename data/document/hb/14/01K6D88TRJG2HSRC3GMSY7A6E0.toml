congress_website_title = "AN ACT DECLARING SIKARAN AS THE NATIONAL MARTIAL ART OF THE PHILIPPINES"
congress_website_abstract = "The bill seeks to declare sikaran as the national martial art of the Philippines. Sikaran-arnis is an ancient art of Filipino foot and stick fighting that promotes the virtues of self-discipline and control as well as a healthy and simple lifestyle for the holistic development of the Filipino individual."
