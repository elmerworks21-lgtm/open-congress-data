congress_website_title = "AN ACT GRANTING BENEFITS AND PRIVILEGES TO STUDENTS AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill grants students the following benefits and privileges: a) 25% discount on transportation fares; b) 25% discount on medicines, medical and dental fees, and diagnostic and laboratory fees; c) 50% discount on admission fees in all cultural centers; d) 10% discount on school supplies; and e) 25% discount on meals."

