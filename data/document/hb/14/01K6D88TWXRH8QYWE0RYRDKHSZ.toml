congress_website_abstract = "The bill proposes that WHEN THE INTERNATIONAL TREATIES OR AGREEMENTS REQUIRE THAT SUPPLIERS, MANUFACTURERS AND/OR DISTRIBUTORS BE FROM THE FUNDING COUNTRY, PROCUREMENT FROM ELIGIBLE SUPPLIERS/MANUFACTURERS/DISTRIBUTORS FROM THE FUNDING COUNTRY WILL STILL BE SUBJECT TO THE PRINCIPLES AND PERTINENT PROVISIONS OF THIS ACT."
