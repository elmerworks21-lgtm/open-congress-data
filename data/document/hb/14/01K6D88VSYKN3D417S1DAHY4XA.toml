congress_website_title = "AN ACT TO ESTABLISH A PILOT PROGRAM TO PROVIDE GRANTS TO ENCOURAGE ELIGIBLE INSTITUTIONS OF HIGHER EDUCATION TO ESTABLISH AND OPERATE PREGNANT AND PARENTING STUDENT SERVICES OFFICES FOR PREGNANT STUDENTS, PARENTING STUDENTS, PROSPECTIVE PARENTING STUDENTS WHO ARE ANTICIPATING A BIRTH OR ADOPTION, AND STUDENTS WHO ARE PLACING OR HAVE PLACED A CHILD FOR ADOPTION"
congress_website_abstract = "“Pregnant and Parenting Students Services Act Of 2009.” Seeks to mandate the Department of Education to enlist the participation of the educational institutions in teaching our students the value of responsible parenting. By doing so, we will not only help our unfortunate student parents but we will also be able to prevent such unfortunate incidents from proliferating in our campuses."
