congress_website_title = "AN ACT AUTHORIZING GOVERNMENT AGENCIES TO AWARD NATIONALLY FUNDED PROJECTS COSTING FIVE HUNDRED THOUSAND PESOS BELOW TO NON-GOVERNMENTAL ORGANIZATIONS"
congress_website_abstract = "\\\"Empowering NGO's in Government Declared Calamity Areas and Facilitating Participation on Projects Funded by the National Government\\\". The bill authorizes government agencies to award nationally-funded projects costing P1.5 million and below to non-government organizations engaged in the promotion of livelihood and community projects in calamity devastated areas."
