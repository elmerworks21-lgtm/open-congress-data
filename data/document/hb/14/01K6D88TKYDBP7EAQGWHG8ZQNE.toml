congress_website_title = "AN ACT LIMITING THE INVESTMENT OF FUNDS OF THE GOVERNMENT SERVICE INSURANCE SYSTEM AMENDING FOR THE PURPOSE SECTION THIRTY-SIX OF PRESIDENTIAL DECREE NUMBER ELEVEN HUNDRED FORTY-SIX AS AMENDED, OTHERWISE KNOWN AS THE REVISED GOVERNMENT SERVICE INSURANCE SYSTEM ACT OF 1977"
congress_website_abstract = "The bill limits the investment of funds of the Government Service Insurance System to the following: a) in interest-bearing bonds or securities or other evidence of indebtedness of the national government; b) in direct housing loans to members and group housing projects secured by first mortgage; c) in bonds, securities, promissory notes of medical and educational institutions; d) in real estate property; and e) in domestic mutual funds."
