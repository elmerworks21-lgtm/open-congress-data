congress_website_title = "AN ACT REGULATING FOREIGN PROGRAMMING THROUGH THE GRANTING OF LANDING RIGHTS, DESIGNATING THE NATIONAL TELECOMMUNICATIONS COMMISSION AS THE APPROPRIATE REGULATORY BODY AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Landing Rights Act of 2009.\\\" Seeks to grant the National Telecommunications Commission (NTC) the power of jurisdiction and regulation over all foreign programs through granting of Landing Rights to foreign programmers as well as authority to resolve any and all disputes between foreign programmers and cable TV operators, thereby ensuring no-discriminatory access to appropriate and desirable content under the framework of transparency and fair play, for the full attainment of the progress and development of the country's economy and preservation and enrichment of our culture."
