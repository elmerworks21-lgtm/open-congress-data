congress_website_abstract = "\\\"Flag And Heraldic Code Of The Philippines.\\\" Seeks to amend and update the Flag and Heraldic Code of the Philippines thus clarifying the intetion of the law; update the law in the light of contemporary changes in attitudes and adioms; prescribe standards with respect to the singing of the Philippine National Anthem, protocol and display of the Philippine Flag; and instill love of country and underscore the importance of complying with standard expressions of respect for our national symbols."
