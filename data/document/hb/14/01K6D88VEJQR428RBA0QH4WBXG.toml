congress_website_title = "AN ACT PROMOTING THE FULL REALIZATION OF THE CONSTITUTIONAL PROVISIONS ON SOCIAL JUSTICE AND THE RIGHT TO HEALTH, THROUGH THE STRENGTHENING OF A COMPREHENSIVE FREE VACCINATION AND IMMUNIZATION PROGRAM FOR FILIPINO INFANTS AND CHILDREN, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Directs the Department of Health to provide for free the following vaccinations and immunizations for infants and children: a) hepatitis B; b) DPT-diptheria, tetanus, pertussis (whooping cough); c) H. Influenza type B; d) polio; e) rotavirus (diarrhea and gastroenteritis); f) measles, mumps, rubella (German measles); and g) varicella (chicken pox)."
