congress_website_title = "AN ACT INCREASING THE COMPENSATION AND/OR INDEMNITY OF UNLAWFULLY DETAINED PERSONS, APPROPRIATING FUNDS THEREFORE, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to compensate or indemnify a person who has been wrongfully detained at a rate of P60,000 for every year of detention provided that if the detention is less than one year, the rate of compensation shall be computed at P5,000 per month or a proportion thereof."
