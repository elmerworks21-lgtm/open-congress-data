congress_website_title = "AN ACT REFORMING THE ADMINISTRATIVE TITLING PROCESS BY AMENDING CERTAIN PROVISIONS OF COMMONWEALTH ACT NO. 141 OTHERWISE KNOWN AS THE PUBLIC LAND ACT AS AMENDED, AND OTHER RELATED LAWS"
congress_website_abstract = "The bill provides for the following, among others: a) reduction of the period of eligibility to apply for a patent from thirty (30) to ten (10) years, b) extension of free patent to cover residential and commercial lands, c) removal of restrictions after patent issuance, and d) removal of the reservation of the right to repurchase."
