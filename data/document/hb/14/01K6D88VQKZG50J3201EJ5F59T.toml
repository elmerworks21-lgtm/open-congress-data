congress_website_title = "AN ACT STRENGTHENING THE WORKERS' CONSTITUTIONAL RIGHT TO COLLECTIVE BARGAINING, REPEALING AND REPLACING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to allow the workers to organize by acceeding to a national union or a federation which issued the charter certificate to the local chapter, to itself file the petition for certification election, thus shielding the local officers from harassment and discrimination; to likewise allow both labor and management to demand multi-unit and/or multi-employer bargaining."

