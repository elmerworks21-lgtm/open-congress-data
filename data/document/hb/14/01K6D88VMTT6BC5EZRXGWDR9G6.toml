congress_website_abstract = "Institutionalizes a mechanism whereby free legal counsel is extended to the needy and marginalized. Entitles lawyers and professional partnerships an allowable tax reduction from the gross income derived from the actual performance of said services, and upon receipt of the necessary certification and accreditation from the PAO, DOJ and the Supreme Court."

