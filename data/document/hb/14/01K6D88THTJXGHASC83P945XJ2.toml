congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8479, OTHERWISE KNOWN AS THE \\\"DOWNSTREAM OIL INDUSTRY DEREGULATION ACT\\\""
congress_website_abstract = "The bill seeks to increase competition at the retail level in order to bring the pump prices of oil products to reasonable levels. It also aims to strengthen the powers of the Department of Energy to enable it to effectively carry out its mandate to inform and protect the public from illicit practices prevailing in the oil industry."
