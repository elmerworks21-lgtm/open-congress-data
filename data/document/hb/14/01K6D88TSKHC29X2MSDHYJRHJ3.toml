congress_website_title = "AN ACT PROVIDING INCENTIVES TO PUBLIC SCHOOL TEACHERS WHO ARE ASSIGNED OUTSIDE OF THEIR TOWNS AND PROVINCES, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Public School Teachers' Incentives Act\\\". The bill proposes to grant public school teachers an incentive allowance of P2,000 when assigned to another town within the same province and P4,000 allowance when assigned to a town in another province."
