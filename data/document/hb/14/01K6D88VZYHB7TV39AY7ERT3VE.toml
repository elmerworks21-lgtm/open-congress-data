congress_website_abstract = "Seeks to freely and effectively pursue the economic, social and cultural development of the indigenous cultural communities; give full benefits to the indigenous peoples by extending to them their preferential rights to public services and the protection of their cultural integrity, and; guarantee the right to self-governance and self determination of the indigenous cultural communities."
