congress_website_title = "AN ACT AMENDING P.D. NO. 1752, OTHERWISE KNOWN AS THE MUTUAL DEVELOPMENT MUTUAL FUND LAW OF 1980, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill prohibits the optional withdrawal of membership from the HDMF before the end of the 20 year membership term. It establishes an annual special P2 billion fund to be used as: a) funding assistance to non-governmental organizations involved in socialized housing; and b) in establishing livelihood component and income-generating projects."
