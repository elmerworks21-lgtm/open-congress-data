congress_website_title = "AN ACT TO HASTEN TITLING OF RESIDENTIAL LANDS OF THE PUBLIC DOMAIN BY EXTENDING THE GRANT OF FREE PATENT TO RESIDENTIAL LANDS UNDER CERTAIN CONDITIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill proposes the following: a) extend the grant of free patent to residential lands classified as such by the local government in its land use plan and not needed for public service and use; b) reduce the period of occupation to ten (10) years; and c) remove the restriction on encumbrance in the title."
