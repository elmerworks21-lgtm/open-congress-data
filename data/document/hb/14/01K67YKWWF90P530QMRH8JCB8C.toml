congress_website_title = "AN ACT EXTENDING FOR FIVE (5) YEARS THE REGLEMENTARY PERIOD FOR COMPLYING WITH THE MINIMUM EDUCATIONAL QUALIFICATION AND APPROPRIATE ELIGIBILITY IN THE BUREAU OF FIRE PROTECTION (BFP) AND THE BUREAU OF JAIL MANAGEMENT AND PENOLOGY (BJMP), AMENDING FOR THE PURPOSE SECTION 4 OF REPUBLIC ACT NO. 9263, OTHERWISE KNOWN AS 'THE BFP AND BJMP PROFESSIONALIZATION ACT OF 2004' AND FOR OTHER PURPOSES"
congress_website_abstract = "Extends for another five (5) years the period of compliance for the baccalaureate degree education and Civil Service eligibility requirements for veteran fire fighters and jail guards who are still unable to comply with the upgraded qualification standards under RA 9263, otherwise, they will be forced to retire and be separated from the service with the impending lapse of the existing five-year waiver under the law on April 4, 2009."
