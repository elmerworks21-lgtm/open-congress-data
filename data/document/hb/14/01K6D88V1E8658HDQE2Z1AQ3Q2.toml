congress_website_title = "AN ACT TO SPUR THE PLANTING OF BILLION TREES AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill targets the planting of a billion trees covering about 1.0 million hectares over a period of five years. It proposes to tap organized communities, cooperatives, people's organizations, upland communities, NGOs and civic organizations, the private sector, the police, local government units, military, among others, in the reforestation program."
