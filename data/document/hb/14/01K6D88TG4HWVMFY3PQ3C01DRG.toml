congress_website_title = "AN ACT TO CREATE A LOCAL HOUSING BOARD IN EVERY CITY AND MUNICIPALITY, PROVIDING FOR ITS POWERS AND DEFINING ITS DUTIES AND FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Local Housing Board Act\\\". The measure mandates the creation of local housing boards that shall formulate, develop, implement and monitor policies on the provision for housing and resettlement areas; and on the observance of the rights of the underprivileged and homeless to a just and humane eviction and demolition."
