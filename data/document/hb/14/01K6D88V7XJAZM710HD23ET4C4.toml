congress_website_title = "AN ACT PROTECTING THE RIGHTS OF INDIGENOUS PEOPLES AFFECTED BY MINING OPERATIONS IN ANCESTRAL DOMAINS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7942, OTHERWISE KNOWN AS THE \\\"PHILIPPINE MINING ACT OF 1995\\\""
congress_website_abstract = "The bill seeks to amend the Mining Act of 1995 by requiring the prior consent of the indigenous cultural communities (ICCs) and indigenous peoples (IPs) and a certification precondition issued by the National Commission on Indigenous peoples before the grant of any license, lease or permit for the exploration of natural resources that affect the interests of ICCs/IPs."
