congress_website_title = "AN ACT AMENDING THE COOPERATIVE CODE OF THE PHILIPPINES TO BE KNOWN AS THE 'PHILIPPINE COOPERATIVE CODE OF 2005'"
congress_website_abstract = "\\\"Philippine Cooperative Code of 2005\\\". The measure increases the members required to form a cooperative from 15 to 30 and raises the paid-up share capitalization to P30,000. It requires cooperatives to hire a bookkeeper. It prohibits newly organized co-ops from registering and operating as a multi-purpose cooperative."
