congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A NATIONAL SCHOLARSHIP PROGRAM FOR COLLEGE STUDENTS IN SCIENCE AND TECHNOLOGY COURSES IN EVERY MUNICIPALITY OF EVERY PROVINCE OF THE COUNTRY, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The bill seeks to grant annually a scholarship in science and technology course to a poor but deserving student in every municipality of every province. The fund assistance shall cover tuition and registration fees, book allowance, board and lodging fees or transportation allowance, and a monthly stipend for living expenses."

