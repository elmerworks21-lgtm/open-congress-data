congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA FOR WORKERS IN THE INFORMAL ECONOMY, INSTITUTIONALIZING MECHANISMS FOR IMPLEMENTATION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Magna Carta for the Workers in the Informal Economy\\\". The bill seeks to extend government assistance, incentives and grants to accredited informal sector (IS) workers, and business acitivities or enterprises. It provides for the exemption of accredited IS workers/enterprises from all taxes, licenses and building permit fees, among others. I also provides for the creation of the Informal Economy Development Authority that will primarily be responsbile for the promotion, growth and development of the IS."
