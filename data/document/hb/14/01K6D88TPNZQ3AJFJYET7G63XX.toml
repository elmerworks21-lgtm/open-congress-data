congress_website_title = "AN ACT DECLARING FEBRUARY FOUR OF EVERY YEAR AS \\\"ARAW NG PAGKADAKILA SA MGA PILIPINONG NAGBUWIS NG BUHAY NOONG DIGMAANG PILIPINO-AMERIKANO\\\", PROVIDING FOR SUPPORT PROGRAMS, AND REQUIRING THE APPROPRIATION OF FUNDS THEREFOR"
congress_website_abstract = "The bill seeks to declare February 4th of every year as a regular national holiday to commemorate the start of the Philippine-American War and to honor the courageous and indomitable spirit of the Filipino people who fought the American colonizers."
