congress_website_title = "AN ACT PROVIDING FOR REPRODUCTIVE HEALTH CARE STRUCTURES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"The Reproductive Health Care Act\\\". The bill establishes the Reproductive Health Care Program that recognizes women's rights and gender equality and ensures universal access to reproductive health information, education and services. Comprehensive health care includes measures that promote safe motherhood, care for persons with HIV/AIDS and other STIs, infertility treatment, and male involvement in reproductive health."
