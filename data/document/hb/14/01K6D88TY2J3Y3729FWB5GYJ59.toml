congress_website_title = "AN ACT CREATING THE PHILIPPINE RUBBER RESEARCH INSTITUTE TO DEVELOP THE PHILIPPINE RUBBER INDUSTRY AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill creates the Philippine Rubber Research Institute that shall undertake the following tasks, among others: a) propagate and promote the planting, maintenance and use of rubber trees; b) make rubber tree seedlings, modern producers techniques and other support services available to rubber producers and processors; and c) undertake training and capacity-building programs."
