congress_website_title = "AN ACT PRESCRIBING REFORMS IN NATIONAL GOVERNMENT BUDGETING, AMENDING FOR THESE PURPOSES PERTINENT PROVISIONS OF BOOK VI OF EXECUTIVE ORDER 292, OTHERWISE KNOWN AS THE REVISED ADMINISTRATIVE CODE OF 1987, AND PROVIDING FOR OTHER RELATED PURPOSES"
congress_website_abstract = "\\\"Budget Reform Act of 2009.\\\" Seeks to reflect the spirit and noble intent of the 1987 Constitution to remove all vestiges of unmitigated Executive might and to restore Congress' power over the purse in the hope that through the reclamation of this power, Congress will be able to strengthen its ability to check the Executive."
