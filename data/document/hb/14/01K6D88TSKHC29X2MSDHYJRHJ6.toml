congress_website_title = "AN ACT GRANTING TAX INCENTIVES TO BROADCAST AND PRINT MEDIA DEVOTING AIR TIME AND SPACE TO EDUCATION, AS WELL AS, TO SPONSORS SUPPORTING SUCH PROGRAMS AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to grant tax incentives to educational programs and publications, together with their respective advertisers and sponsors. It recognizes that media is an effective alternative vehicle in educating the populace, thus every Filipino should be extended such services beyond the classroom to their homes. It is also hoped that this bill will alleviate the economic plight of the media industry as a whole and become an effective tool in the success of the educational program."
