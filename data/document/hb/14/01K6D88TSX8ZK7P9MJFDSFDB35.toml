congress_website_title = "AN ACT PROVIDING ADDITIONAL INSURANCE BENEFITS TO BARANGAY CAPTAINS, PROVIDING FUNDS FOR THE PAYMENT OF PREMIUMS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Expanded Barangay Captains' Insurance Act of 2007\\\". The bill grants barangay captains the following additional insurance benefits: a) P250,000 death benefits if caused by assassination, accident or other similar circumstances; b) 50,000 burial benefit; and c) P100,000 reimbursement of actual medical expenses."

