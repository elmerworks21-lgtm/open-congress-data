congress_website_title = "AN ACT CREATING THE POSITION OF TOURISM OFFICER IN ALL PROVINCES, FIRST CLASS MUNICIPALITIES AND CITIES, OR MUNICIPALITIES AND CITIES WHERE TOURISM IS CONSIDERED A MAJOR LOCAL INDUSTRY, AND DEFINING ITS QUALIFICATIONS, POWERS AND DUTIES, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE"
congress_website_abstract = "The bill provides for the qualifications, powers and duties of a Tourism Officer. The position shall be mandatory in all provinces, cities and municipalities identified by the Department of Tourism as tourist areas. The Tourism Officer shall monitor and evaluate the implementation of the different tourism development programs and activities in the local government unit."
