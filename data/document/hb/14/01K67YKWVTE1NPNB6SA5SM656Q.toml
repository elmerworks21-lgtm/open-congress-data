congress_website_abstract = "Aims to strengthen the role of Schools District Supervisor as Head of the Schools District by proposing that the position be considered as a separate level in the organizational structure of the Department of Education (DepEd), and NOT just as a staff of another unit or level; and aims to provide/equip the Schools District Supervisor, as Head of the Schools District Office, with necessary administrative and supervisory line functions in order to effectively deliver the necessary programs and projects to its intended clients."
