congress_website_title = "AN ACT CREATING A NATIONAL TRANSPORTATION SAFETY BOARD, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"National Transportation Safety Act of 2004\\\". To advance transportation safety consciousness, the bill proposes the creation of the National Transportation and Safety Board (NTSB), an independent non-regulatory agency, to undertake thorough and impartial investigation of transporation accidents. The NTSB shall be responsible for the analysis, evaluation and prevention of air, highway and marine transportation accidents."

