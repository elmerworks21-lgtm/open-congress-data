congress_website_title = "ISANG PANUKALANG BATAS NA MAGSASAINSTITUSYON SA SISTEMANG VOUCHER O VOUCHER SYSTEM PARA SA PAGKAIN, GASOLINA, GAMOT AT TRABAHONG PANG-EMERGENCY, PAGLALAAN NG PONDO PARA DITO, AT PARA SA IBA PANG LAYUNIN (AN ACT INSTITUTIONALIZING THE VOUCHER SYSTEM FOR FOOD, FUEL, MEDICINE AND EMERGENCY EMPLOYMENT, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES)"
congress_website_abstract = "Ang panukalang ito ay nagsasa-institusyon ng pagbigay ng vouchers o kupon sa mga piling tagapakinabang o beneficiary para tugunan ang kanilang pinakamahalagang pangangailangan. (The bill institutionalizes the grant of vouchers or coupons to selected beneficiaries to address their very basic needs.)"
