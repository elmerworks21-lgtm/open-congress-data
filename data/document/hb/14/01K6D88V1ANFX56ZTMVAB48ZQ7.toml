congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF PRESIDENTIAL DECREE NO. 1464, OTHERWISE KNOWN AS THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to curb smuggling, both technical and outright, by providing systemic solutions that will make it easier to detect smuggling. It creates the office of the Deputy Commissioner for Audit and Transparency and a Valuation and Classification Review Committee. It provides a maximum penalty of life imprisonment for smuggling if the value of the goods unlawfully imported exceeds P1 million."
