congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED SEVENTY ONE SIXTY SIX ENTITLED 'SYNCHRONIZED NATIONAL AND LOCAL ELECTIONS AND FOR ELECTORAL REFORMS' AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill proposes to adjust the authorized expenses of candidates and political parties during the election campaign, as follows: a) for presidential candidates - P50.00 for every registered voter; b) for vice presidential and senatorial candidates - P35.00 for every registered voter; and c) for congressional and other local candidates - P30.00 for every registered voter."

