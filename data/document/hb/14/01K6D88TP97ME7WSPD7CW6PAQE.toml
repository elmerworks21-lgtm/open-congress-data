congress_website_title = "AN ACT DECLARING AND REAFFIRMING THE COCO LEVY FUNDS AND ASSETS AS PUBLIC FUND AND CREATING THE PRESIDENTIAL COCONUT INDUSTRY DEVELOPMENT COUNCIL FOR PURPOSES OF MANAGEMENT THEREOF"
congress_website_abstract = "\\\"Coco Levy Funds and Assets Are Public Funds Act\\\" The bill provides a mechanism so that the rights and interests of small farmers to the coconut levy funds can be protected. It establishes the Coconut Industry Rehabilitation and Development Council and provides for its composition, terms of office, powers and functions."

