congress_website_title = "AN ACT CREATING THE PHILIPPINE TRADE REPRESENTATIVE OFFICE, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "“Charter of the Philippine Trade Representative Office.” Seeks to establish a sole entity principally responsible for monitoring and maintaining a cohesive and coherent trade trade policy vis-a-vis our national interest; pursue the formulation, management and improvement of our country's trade policies in order to to efficiently promote our own products and protect our own economy and domestic market from unfair trade practices, and; ensure transparency in the nogotiations process as well as stakeholder consultation and participation in the crafting of trade agreements."
