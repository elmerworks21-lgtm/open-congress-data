congress_website_title = "AN ACT STRENGTHENING FURTHER THE ANTI-MONEY LAUNDERING LAW, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9160, OTHERWISE KNOWN AS THE \\\"ANTI-MONEY LAUNDERING ACT OF 2001\\\", AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to restore to the Anti-Money Laundering Council the authority to freeze any monetary instrument or property alleged to be the proceeds of any unlawful activity. It proposes a system of incentives and rewards to be given to the government agency that led and initiated the investigation, prosecution and conviction of the person involved in the offense."
