congress_website_title = "AN ACT PROVIDING FOR BENEFITS TO DEPENDENTS OF MEMBERS OF THE PHILIPPINE NATIONAL POLICE, CREATING THE PHILIPPINE NATIONAL POLICE DEPENDENTS WELFARE OFFICE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
