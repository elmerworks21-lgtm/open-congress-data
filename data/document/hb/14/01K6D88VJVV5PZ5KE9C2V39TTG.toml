congress_website_title = "AN ACT ADOPTING THE SIMPLIFIED NET INCOME TAXATION SCHEME FOR INDIVIDUALS ENGAGED IN TRADE/BUSINESS AND/OR PRACTICE OF PROFESSION, AMENDING FOR THE PURPOSE THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Seeks to address the imbalance in the taxation between wage earners, on the one hand, and professionals and self-employed individuals, on the other hand. Proposes to limit the allowable deductions for individual taxpayers and proposes to grant them an optional standard deduction of 40% of gross income."
