congress_website_title = "AN ACT PENALIZING MEMBERS OF A LAW ENFORCEMENT AGENCY, OTHER GOVERNMENT OFFICIALS OR EMPLOYEES WHO FAIL OR REFUSE TO TESTIFY AS PROSECUTION WITNESSES IN ANY CRIMINAL PROCEEDING AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill penalizes with imprisonment of not less than twelve (12) years and one (1) day to twenty (20) years and a fine of not less than P500,000 with perpetual disqualification to hold public office any member of the a law enforcing agency who fails or refuses to appear and testify in any criminal proceeding."

