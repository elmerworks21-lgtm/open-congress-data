congress_website_title = "AN ACT PROVIDING FOR SUSTAINABLE FOREST MANAGEMENT"
congress_website_abstract = "\\\"Sustainable Forest Management Act of 2005\\\". The measure provides for the limits and classification of forest lands; the administration and management of these lands; reforestation program; forest protection; forestry research, education, training and extension; disposition and utilization of forest resources; forest charges, fees and rentals; and criminals offenses and penalties."
