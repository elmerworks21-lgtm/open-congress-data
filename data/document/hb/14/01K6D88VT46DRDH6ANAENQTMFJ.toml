congress_website_title = "AN ACT PROMOTING BARANGAY JUSTICE BY AMENDING ARTICLE ELEVEN HUNDRED FIFTY-FIVE OF REPUBLIC ACT NUMBERED THREE HUNDRED AND EIGHTY-SIX, OTHERWISE KNOWN AS THE CIVIL CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to address the need to strengthen the system of amicably settling disputes at the barangay level by specifically providing that the filing of a case with the Punong Barangay interrupts the running of the prescriptive period under the Civil Code of the Philippines or RA No. 386, particularly Article 1155. The suspension, however, does not extend to more than sixty (60) days to prevent the possibility of undue delay that the suspension may engender."

