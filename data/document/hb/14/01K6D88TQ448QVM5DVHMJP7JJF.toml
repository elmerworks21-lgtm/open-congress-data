congress_website_title = "AN ACT GRANTING THE DEPARTMENT OF JUSTICE THE AUTHORITY TO SETTLE MINOR CRIMINAL OFFENSES"
congress_website_abstract = "This bill authorizes to the Department of Justice (DOJ) through the Office of the Chief State Prosecutor, to bring together the parties to a criminal action involving minor offenses in order to arrive to an extra-judicial settlement. Minor offenses are offenses punishable by imprisonment not exceeding one (1) year and/or a fine not exceeding Five Thousand Pesos (P5,000.00)."

