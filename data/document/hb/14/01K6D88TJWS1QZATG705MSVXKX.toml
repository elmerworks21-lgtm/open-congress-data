congress_website_title = "AN ACT ELEVATING THE PHILIPPINE NORMAL UNIVERSITY TO BECOME THE COUNTRY'S NATIONAL UNIVERSITY FOR TEACHER EDUCATION, ESTABLISHING A SYSTEM OF NATIONAL TEACHER TRAINING AND DEVELOPMENT, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Philippine Normal University (PNU) Modernization Act of 2007\\\". The bill establishes the National Teachers Training and Development Program that will provide teachers opportunities for in-service training programs in the following areas: a) information and communication techologies; b) competencies in various fields of specialization; and c) innovative strategies and alternative modalities of teaching and learning."
