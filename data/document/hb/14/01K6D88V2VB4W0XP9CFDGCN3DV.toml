congress_website_title = "AN ACT PROVIDING FOR THE OMNIBUS AMENDMENTS TO PRESIDENTIAL DECREE NO. 857, OTHERWISE KNOWN AS THE REVISED CHARTER OF THE PHILIPPINE PORTS AUTHORITY (PPA), AS AMENDED, TO RATIONALIZE ITS FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill proposes to increase the members of the Board of Directors of the Philippine Ports Authority from nine (9) to eleven (11). It also seeks to remove the government's 10% share in the gross income earnings of cargo handling contractors and to promote greater private sector participation in port policy formulation and implementation."

