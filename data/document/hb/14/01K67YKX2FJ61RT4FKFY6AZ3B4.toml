congress_website_title = "AN ACT TO REGULATE AND MODERNIZE THE PRACTICE OF INTERIOR DESIGN IN THE PHILIPPINES, REPEALING FOR THE PURPOSE REPUBLIC ACT NUMBER 8534 (RA No. 8534) KNOWN AS 'THE PHILIPPINE INTERIOR DESIGN ACT OF 1998,' APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Philippine Interior Design Act Of 2009.\\\" Seeks to regulate and modernize the practice of interior design in the country to conform to the international standards and at the same time, provide safety nets for the practice of the profession against foreign practitioners and those engaged in illegal practice, and; recognize the practice of interior design as a full-fledged profession vital to the building and construction industry and to institute policies and regulatory measures to protect the interests of the Filipino professionals."
