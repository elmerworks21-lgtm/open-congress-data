congress_website_title = "AN ACT REGULATING THE PRACTICE OF REAL ESTATE SERVICE IN THE PHILIPPINES, CREATING FOR THE PURPOSE A PROFESSIONAL REGULATORY BOARD OF REAL ESTATE SERVICE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Real Estate Service Act of the Philippines\\\". The measure defines the concept of real estate and what constitutes estate service practitioners. It provides for the creation of the Professional Regulatory Board of Real Estate Service and the licensure examination and registration of real estate practitioners."
