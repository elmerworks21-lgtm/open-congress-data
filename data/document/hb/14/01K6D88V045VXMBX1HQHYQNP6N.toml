congress_website_title = "AN ACT CREATING THE DEPARTMENT OF HOUSING AND URBAN DEVELOPMENT, PRESCRIBING ITS POWERS, FUNCTIONS AND DUTIES, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "The measure creates the Department of Housing and Urban Development that shall serve as the primary agency in the preparation, integration, coordination, supervision of plans, programs, projects and activities of the government related to urban planning development and renewal, including land use and zoning, housing provision, regulation and finance, and marginal assistance and services."
