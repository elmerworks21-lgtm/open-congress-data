congress_website_title = "AN ACT ESTABLISHING A NATIONAL IDENTIFICATION SYSTEM IN THE PHILIPPINES, CONSTITUTING FOR THE PURPOSE THE NATIONAL REGISTRATION COORDINATING COUNCIL, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The National Multi-Purpose ID Card Act of 2007\\\". The bill seeks to institute an official identification of all citizens of the Philippines and all foreign nationals permanently residing in the country. It also proposes to convert and consolidate all existing government-initiated identification systems into one, integrated and multi-purpose system."

