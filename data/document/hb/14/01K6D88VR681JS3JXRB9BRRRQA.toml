congress_website_title = "AN ACT AUTHORIZING ENGINEERS TO DISCLOSE TO ANY GOVERNMENTAL OFFICIAL INFORMATION REGARDING A BUILDING OR STRUCTURE THAT HE BELIEVES IN GOOD FAITH MAY POSE A DANGER TO THE PUBLIC HEALTH OR SAFETY"
congress_website_abstract = "\\\"Professional Engineer's Disclosure Act.\\\" Seeks to prohibit a contract between an engineer and building owner from containing any provision that would limit or interfere with the engineer's right to provide that disclosure and would also prohibit a building owner from threatening, initiating or maintaining legal action against, or otherwise retaliating against an engineer due to that disclosure or the engineer's ability to make that disclosure."
