congress_website_title = "AN ACT REQUIRING THE ISSUANCE OF CERTIFICATE OF EMPLOYMENT TO THE RESIGNED OR DISMISSED EMPLOYEES AND IMPOSING PENALTIES FOR VIOLATION THEREOF, AMENDING FOR THIS PURPOSE PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
