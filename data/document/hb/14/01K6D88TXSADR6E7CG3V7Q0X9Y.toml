congress_website_title = "AN ACT TO PROFESSIONALIZE THE PRACTICE OF PRISON MANAGEMENT AND SET FOR THAT PURPOSE THE QUALIFICATION FOR SUPERINTENDENTS OF THE NATIONAL PRISON SYSTEM AND OF WARDENS OF PROVINCIAL, CITY OR MUNICIPAL JAILS"
congress_website_abstract = "The bill requires the Superintendents of Prisons/Colonies/Prison Farms to hold a bahelor's degree in law or a bachelor's degree in public administration and have educational training in psychology or sociology. It also provides for wardens of provincial, city or municipal jails to have a bachelor's degree in law, public administration, psychology or its equivalent."

