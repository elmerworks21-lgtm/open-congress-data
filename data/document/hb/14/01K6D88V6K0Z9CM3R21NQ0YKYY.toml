congress_website_title = "PANUKALANG BATAS PARA PAGTIBAYIN ANG COMPREHENSIVE AGRARIAN REFORM PROGRAM SA PAMAMAGITAN NG PAG-AALIS SA MGA HADLANG SA EPEKTIBONG PAGPAPATUPAD NITO SA PAG-AMYENDA NG MGA MAHAHALAGANG PROBISYON NG BATAS REPUBLIKA BLG. 6657, MAS KILALA SA TAWAG NA COMPREHENSIVE AGRARIAN REFORM PROGRAM NG 1988, NA NAAMYENDAHAN, PAGLALALAN NG PONDO PARA RITO AT PARA SA IBA PANG MGA LAYUNIN (AN ACT STRENGTHENING THE COMPREHENSIVE AGRARIAN REFORM PROGRAM BY REMOVING THE BARRIERS TO ITS EFFECTIVE IMPLEMENTATION AND PROVIDING FURTHER FUNDS THEREFOR, AMENDING FOR THESE PURPOSES PERTINENT PROVISIONS OF REPUBLIC ACT N. 6657, OTHERWISE KNOWN AS THE COMPREHENSIVE AGRARIAN REFORM LAW OF 1988, AS AMENDED, AND PROVIDING FOR OTHER RELATED PURPOSES)"
congress_website_abstract = "Iminumungkahi ng panukalang ito na isailalim sa saklaw ng CARP ang mga lupaing iniwas dati tulad ng mga palaisdaan at inland aquaculture. Iminumungkahi din na alisin sa iskema ang mga paraang hindi lupa ang talagang ipinamamahagi tulad ng stock option distribution, leaseback arrangement, joint venture at boluntaryong pagsasalin ng lupa. (The bills seeks to place previously exempt areas such as fishponds and inland aquaculture under the coverage of the CARP. It also proposes to abolish non-redistributive schemes such as stock distribution option, leaseback arrangement, joint ventures and voluntary land transfers.)"
