congress_website_title = "AN ACT PENALIZING THE REFUSAL OR FAILURE OF AN EMPLOYER TO COMPLY WITH THE DECISION, ORDER OR MONETARY AWARD PROMULGATED BY THE NATIONAL LABOR RELATIONS COMMISSION FOLLOWING THE RESOLUTION OF A LABOR DISPUTE AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to penalize any person, corporation, trust, firm, partnership, association or entity who fails to comply with the decision, order, monetary award promulgated by the NLRC with a fine of not less than P50,000 but not more than P100,000 or imprisonment of not less than two (2) but not more than four (4) years."

