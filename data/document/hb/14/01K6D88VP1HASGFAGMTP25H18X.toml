congress_website_title = "AN ACT ADJUSTING THE REQUIREMENT ON EDUCATION AND FOR PROMOTION IN THE BUREAU OF FIRE PROTECTION (BFP) AND BUREAU OF JAIL MANAGEMENT AND PENOLOGY (BJMP) AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED 9263 OTHERWISE KNOWN AS THE BUREAU OF FIRE PROTECTION AND THE BUREAU OF JAIL MANAGEMENT AND PENOLOGY PROFESSIONALIZATION ACT AND FOR OTHER PURPOSES"
congress_website_abstract = "Establishes a system of attrition for uniformed personnel in the Bureau of Fire Protection (BFP) and the Bureau of Jail Management and Penology (BJMP) with the end in view of averting the forced retirement of veteran and seasoned firefighters and jailguards who were not able to satisfy the baccalaureate requirements as prescribed by RA 9263's qualification standards in the designation of the uniformed personnel in these agencies."
