congress_website_title = "AN ACT PROVIDING FOR A NATIONAL POLICY ON REPRODUCTIVE HEALTH, RESPONSIBLE PARENTHOOD AND POPULATION DEVELOPMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the following, among others: a) an environment for women and couples to make an informed choice regarding the family planning method suited to their needs; b) availability of hospital-based family planning methods; and c) maternal death review in government hospitals."
