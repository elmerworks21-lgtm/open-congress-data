congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8972, OTHERWISE KNOWN AS THE SOLO PARENTS' WELFARE ACT OF 2000, BY PROVIDING FOR ADDITIONAL BENEFITS AND PENAL PROVISION FOR VIOLATIONS OF THE ACT"
congress_website_abstract = "The measure grants solo parents the following additional benefits: a) 10% discount in clothes purchased within 2 years from the child's birth; b) 15% discount in baby milk, food and food supplement purchased within 2 years from the child's birth; c) 15% discount in medicines and medical supplement/supplies purchased within 5 years from the child 's birth; and d) P50,000 personal exemption on income tax."
