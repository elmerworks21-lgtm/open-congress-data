congress_website_title = "AN ACT TO PREVENT DISABLED PERSONS' PARKING PLACES FROM BEING OCCUPIED BY PERSONS NOT ENTITLED TO USE THEM"
congress_website_abstract = "“Disabled Persons' Parking Places Act of 2009.” Directs the local governments and owners of private property open to public to designate parking zones and spaces to be used exclusively by disabled persons' vehicles which shall be located near the shortest route to curb cuts and ramps for use by wheelchairs and other mechanical device usage mobility aid and devices."
