congress_website_title = "AN ACT AMENDING SECTION 27 OF REPUBLIC ACT NO. 7279 OTHERWISE KNOWN AS \\\"URBAN DEVELOPMENT AND HOUSING ACT OF 1992\\\""
congress_website_abstract = "The bill mandates the Department of Justice, in conjunction with the local government units and the HUDCC, to take the lead in the prosecution of identified professional squatters and squatting syndicates. It imposes on members of squatting syndicates the penalty of ten (10) years imprisonment and a fine of not less than P100,000 but not more than P500,000."
