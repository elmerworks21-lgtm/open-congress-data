congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6981 OTHERWISE KNOWN AS THE 'WITNESS PROTECTION, SECURITY AND BENEFIT ACT', AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to define witness duty to include the relocation of a witness to an accredited safehouse or temporary shelter for purposes of availing hospitalization benefits under the Program; provide free education to the witness' minor or dependent children for the duration of their witness duty and up to one year after termination of the witness duty; and, aims to provide for the perpetuation of testimonies of witnesses in consonance with Rule 134 of the Revised Rules of Court."
