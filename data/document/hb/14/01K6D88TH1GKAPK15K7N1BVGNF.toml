congress_website_title = "AN ACT CREATING THE CHARTER OF THE LOCAL GOVERNMENT ACADEMY (LGA), AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6975, OTHERWISE KNOWN AS THE DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990 AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"Local Government Academy (LGA) Act of 2007\\\". The Local Government Academy (LGA) is tasked to train and improve the managerial skills and technical capability of local government officials and personnel to properly equip them with the demands of their position. This measure aims to strengthen the LGA and transform it to a more autonomous corporate body with the end in view of making its program more responsive to the needs of its clients."
