congress_website_title = "AN ACT PROVIDING FOR BARANGAY EMPOWERMENT, AMENDING VARIOUS PROVISIONS OF THE LOCAL GOVERNMENT CODE AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Barangay Empowerment Act of 2007\\\". The bill provides for the creation of a Barangay Building Official in all barangays with a population of at least 3,000 inhabitants. It also proposes to give the barangay a bigger share in the proceeds of tax collected on sand, gravel and other quarry resources."

