congress_website_title = "AN ACT REGULATING THE DEVELOPMENT AND MANAGEMENT OF LAKES IN THE PHILIPPINES"
congress_website_abstract = "\\\"Lake Development And Management Act Of 2009.\\\" Seeks to regulate the development and management of approximately 200,000 hectares of freshment bodies in the country formed by volcanic and tectonic process; enhance sustainability of about 211 hectares thorughout the archipelago as a natural resource by reducing vulnerability to hazards caused by human intervention; protect ecosystems from pollution and degradation in view of the heavy demand on the natural resource to sustain the growing population; and, craft a holistic program that define the bounds where the interdependence of human population and the lakes is enhanced despite industrialization, urbanization and population increase."
