congress_website_title = "AN ACT PROHIBITING THE ESTABLISHMENT OF POLITICAL DYNASTIES"
congress_website_abstract = "The bill prohibits the spouse or any person related within the second degree of consanguinity or affinity, whether legitimate or illegitimate, full or half-blood to an incumbent elective official seeking re-election, to hold or run for any elective office in the same province in the same election."

