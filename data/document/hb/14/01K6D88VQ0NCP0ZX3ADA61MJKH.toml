congress_website_title = "AN ACT TO REGULATE ORGAN TRANSPLANTATION AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "“Human Organ Transplant Act.” Seeks to eliminate the waiting list (availability) for human organs and eradicate the lucrative trade in organ trafficking. Automatically qualifies every Filipno citizen, 18 years old and above, to become an organ donor in the event of untimely death, unless he “opts out” or specifically refuses to donate his organs."
