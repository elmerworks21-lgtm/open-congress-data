congress_website_title = "AN ACT INCREASING THE NUMBER OF IMMIGRATION OFFICERS OF THE BUREAU OF IMMIGRATION AND APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill proposes to increase the number of immigration officers who shall be assigned to all undermanned immigration offices especially in farflung ports, airports and ports of entry. It prescribes the powers and duties, qualifications and compensation of the additional immigration officers."
