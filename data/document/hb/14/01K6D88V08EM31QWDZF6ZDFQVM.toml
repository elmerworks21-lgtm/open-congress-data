congress_website_title = "AN ACT AMENDING SECTIONS 27 AND 71 OF REPUBLIC ACT NO. 6657, OTHERWISE KNOWN AS THE COMPREHENSIVE AGRARIAN REFORM LAW OF 1988 THEREBY LIFTING THE RESTRICTION ON THE RIGHT OF FARMER-BENEFICIARIES TO MORTGAGE AND/OR ENCUMBER THE LANDS AWARDED TO THEM UNDER THE COMPREHENSIVE AGRARIAN REFORM PROGRAM AND ALLOWING THE SUBMISSION OF THE CERTIFICATE OF LAND OWNERSHIP AWARD AS SUFFICIENT COLLATERAL FOR LOANS ENTERED INTO WITH BANKS AND/OR OTHER FINANCIAL INTERMEDIARIES"
congress_website_abstract = "This bill seeks to allow farmer-beneficiaries of the Comprehensive Agrarian Reform Law (CARL) to use awarded land as collateral in availing of both short-term and long-term production and other types of loans from commercial banks and other financial institutions for the purchase of necessary agricultural inputs and establishment of production, processing or marketing facilities for agricultural products."
