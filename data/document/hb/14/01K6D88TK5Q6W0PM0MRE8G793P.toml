congress_website_title = "AN ACT REQUIRING COASTAL PROVINCES, COASTAL CITIES AND FIRST CLASS COASTAL MUNICIPALITIES TO HAVE A MARINE RESERVE FOR AQUATIC RESOURCES AND FISHERIES OFFICER TO SUPERVISE THE SAME AND APPROPRIATING FUNDS THEREOF"
congress_website_abstract = "\\\"Marine Reserve Law\\\". The measure requires all coastal cities and first class coastal municipalities to establish a marine reserve for aquatic resources. It also requires the appointment of a fisheries officer in all first class coastal municipalities and in coastal cities and provinces to manage the marine reserve."
