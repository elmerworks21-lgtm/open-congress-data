congress_website_title = "AN ACT PROTECTING PRIVATE PROPERTY RIGHTS BY REQUIRING GOVERNMENT AGENCIES TO PREPARE PRIVATE PROPERTY TAKING IMPACT ANALYSIS"
congress_website_abstract = "“Private Property Rights Act of 2009.” Seeks to protect private property rights by requiring government agencies to prepare private property impact analyses before said property is taken for public use. This is important to guide agency actions, including regulations, not to overstep the clear boundaries set by the Constitution concerning private property."

