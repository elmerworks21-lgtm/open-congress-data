congress_website_title = "AN ACT PROVIDING FOR THE MANDATORY AUTOPSY OF ANY PERSON WHO DIED IN A VIOLENT, SUSPICIOUS, QUESTIONABLE, UNUSUAL AND/OR UNNATURAL MANNER, THE CONDITIONS FOR THE PROPER ISSUANCE OF THE DEATH CERTIFICATE OF SAID PERSON AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Autopsy Act of 2007\\\". The bill requires the conduct of a mandatory professional forensic autopsy in cases of violent, unnatural, questionable, mysterious or unusual death of a person. It also addresses the problem of deficient or inadequate autopsy and post-mortem reports that contribute to the non-prosecution or dismissal of complaints because of the absence or lack of guidelines in the conduct and preparation of the same"

