congress_website_title = "AN ACT STRENGTHENING THE MANDATE ON THE INTERCONNECTION BETWEEN AND AMONG PUBLIC TELECOMMUNICATIONS ENTITIES, PROVIDING PENALTIES FOR ITS VIOLATION AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill penalizes telecommunication entities that refuse or fail to comply with the interconnection regulation after having been required through lawful written order by the National Telecommunications Commission. It prohibits acts that result in the termination, disconnection, discontinuance, interruption, blocking and/disruption of interconnection by any public telecommunications entity."

