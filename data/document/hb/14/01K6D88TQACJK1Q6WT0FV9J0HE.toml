congress_website_title = "AN ACT AMENDING SECTIONS 235 AND SECTION 272 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS 'THE LOCAL GOVERNMENT CODE OF 1991' FOR THE PURPOSE OF AUGMENTING, EXPANDING AND DIVERSIFYING THE USES OF THE SPECIAL EDUCATION FUND AND FOR OTHER PURPOSES"
