congress_website_title = "AN ACT PROVIDING SUBSIDY TO PRIVATE HOSPITALS AND CLINICS WHICH ADMIT FOR CONFINEMENT AND TREATMENT INDIGENT PATIENTS UNDER EMERGENCY CASES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The bill grants subsidy to private hospitals and medical clinics that accept indigent patients under emergency cases. It further requires all persons who wish to avail of the financial assistance granted under this Act to apply for an indigent identification card with the Department of Social Welfare and Development. It directs hospitals concerned to transmit monthly billings to the Department of Health of the total emergency admission fees extended to indigent patients."

