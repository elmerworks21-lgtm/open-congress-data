congress_website_title = "AN ACT STRENGTHENING THE IMPLEMENTATION OF THE COMPREHENSIVE AGRARIAN REFORM PROGRAM, AMENDING FOR THIS PURPOSE SECTION 27 OF REPUBLIC ACT NUMBER 6657 AS AMENDED"
congress_website_abstract = "This bill seeks to allow farmer-beneficiaries of the Comprehensive Agrarian Reform Law (CARL) to use the certificate of land ownership award (CLOA) as collateral in availing of loans from commercial banks and other financial institutions provided that the loan does not exceed one-fourth of the assessed value of the land or the total amortization the paid by the beneficiary."
