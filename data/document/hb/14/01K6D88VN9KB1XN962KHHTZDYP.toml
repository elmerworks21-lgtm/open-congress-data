congress_website_title = "PANUKALANG BATAS NA HUMIHILING NG REFERENDUM PARA SA KUMBENSIYONG KONSTITUSYONAL NA ISASABAY SA ELEKSIYON SA MAYO 10, 2010, NAGLALAAN NG PONDO PARA DITO AT IBA PANG LAYUNIN (AN ACT CALLING FOR A CONSTITUTIONAL CONVENTION REFERENDUM TO COINCIDE WITH THE MAY 10, 2010 ELECTIONS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
