congress_website_title = "AN ACT PROVIDING FOR THE REHABILITATION OF FINANCIALLY DISTRESSED CORPORATIONS, AMENDING FOR THE PURPOSE P.D. NO. 902-A, AS AMENDED"
congress_website_abstract = "The bill institutionalizes the mechanism by which financially distressed corporations may be restored to their former positions of financial stability and profitability in a manner that will allow them to continue their business and, at the same time, ensure the orderly repayment of their obligations to their creditors."
