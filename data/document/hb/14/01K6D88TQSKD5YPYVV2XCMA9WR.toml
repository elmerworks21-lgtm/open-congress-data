congress_website_title = "AN ACT ESTABLISHING THE NATIONAL COMMITTEE ON THE PHILIPPINE CLAIM TO AN EXTENDED CONTINENTAL SHELF TO CONFORM WITH THE REQUIREMENTS OF THE UNITED NATIONS COMMISSION ON THE LIMITS OF THE CONTINENTAL SHELF (UNCLCS) PURSUANT TO THE PROVISIONS OF THE UNITED NATIONS CONVENTION ON THE LAW OF THE SEA"
congress_website_abstract = "\\\"Extended Philippine Continental Shelf Law of 2007\\\". The bill provides for the creation of the National Committee on the Philippine Claim to an Extended Continental Shelf that shall be tasked to delineate, document and legitimize the country's claim to an extended continental shelf (the seabed and subsoil of submarine areas extending beyond 200 nautical miles up to 350 nautical miles from the baselines) to be submitted to the United Nations Commission on the Limits of the Continental Shelf."

