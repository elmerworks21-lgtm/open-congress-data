congress_website_title = "AN ACT GRANTING BENEFITS AND SPECIAL PRIVILEGES TO FORMER OVERSEAS FILIPINO WORKERS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to grant former OFWs the following, among others: a) 20% discount on transportation services, from hotels and similar lodging establishments, restaurants and recreation centers and the purchase of medicines; b) 20% discount on admission fees charged by theaters, cinema houses and concert halls, circuses, carnivals and similar establishments; c) exemption from income tax; and d) free medical and dental consultations in private or government hospitals."

