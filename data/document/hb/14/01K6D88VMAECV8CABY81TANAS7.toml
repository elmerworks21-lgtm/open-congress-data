congress_website_abstract = "Seeks to subject the following to random drug testing: a) applicants for driver's license; b) applicants for firearms license and for permit to carry firearms; c) students of secondary and tertiary schools; d) officers and employees of public and private offices; e) officers and members of the military, police and other law enforcement agencies; f) persons charged before the prosecutor's office with a criminal offense; and g) candidates for public office."
