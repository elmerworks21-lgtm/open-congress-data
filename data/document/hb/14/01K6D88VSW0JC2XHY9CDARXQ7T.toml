congress_website_title = "AN ACT STRENGTHENING THE BUREAU OF INTERNAL REVENUE (BIR) AND THE BUREAU OF CUSTOMS (BOC), APPROPRIATING FUNDS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to strengthen the organizational capability of the Bureau of customs (BOC) and the Bureau of Internal Revenue (BIR). It also provides the creation of the National Revenue Academy (NRA) by the Department of Finance which shall handle all the trainings, continuing education programs and other courses for all the officials and personnel of BIR and BOC, thus ensuring efficient and effective collection of taxes and duties to meet the financial requirements of the government."
