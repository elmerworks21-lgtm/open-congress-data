congress_website_title = "AN ACT PROVIDING FOR RESTRICTIONS ON GARNISHMENT OF COMPENSATION DUE FOR PERSONAL SERVICES"
congress_website_abstract = "\\\"Restrictions on Garnishment of Compensation Act of 2008.\\\" Defines \\\"garnishment\\\" to mean any legal or equitable procedure through which the earnings of any individual are required to be withheld for payment of any debt. This bill seeks to abate if not eliminate the use unrestricted garnishment or deduction from the compensation of employees which encourages liberal extension of credit by unscrupulous parties which sometimes result in loss of employment by the debtors resulting in the disruption of employment, production, and compensation."

