congress_website_title = "AN ACT TO INSULATE THE AUTOMATED ELECTION SYSTEM FROM THE REST OF THE COMELEC ORGANIZATION, OTHER OFFICERS OF THE GOVERNMENT, CANDIDATES, REPRESENTATIVES AND AGENTS OF CANDIDATES AND ANY OTHER PERSON"
congress_website_abstract = "“Automated Election Anti-Collusion Act of 2009.\\\" Seeks to ensure the integrity of the automated election system by providing more stringent safeguards and to penalize in particular acts that pertain to persons involved in carrying out the automated election such as those by the officers and employees of the winning bidder and the officials of the Commission on Elections (COMELEC), local and national elective officials, candidates and their representatives or any other person with the motive to tamper with the automated election process."

