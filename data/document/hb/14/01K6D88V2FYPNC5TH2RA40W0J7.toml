congress_website_title = "AN ACT STRENGTHENING THE BUREAU OF FOOD AND DRUGS (BFAD) BY ESTABLISHING LABORATORY FACILITY EACH IN LUZON, VISAYAS AND MINDANAO AND REGULATORY FIELD OFFICE IN EVERY PROVINCES AND CITIES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The bill proposes to establish the following: a) a laboratory facility in Luzon, Visayas and Mindanao while maintaining the central testing laboratory in Metro Manila; and b) regulatory filed offices in every province and city to decentralize the regulatory functions of the regional food and drug regulatory office."

