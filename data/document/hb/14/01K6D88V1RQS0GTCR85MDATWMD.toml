congress_website_title = "AN ACT PROVIDING HIGHER COMPENSATION TO VICTIMS OF UNJUST IMPRISONMENT OR DETENTION AND VICTIMS OF VIOLENT CRIMES, AMENDING FOR THIS PURPOSE SECTION 4 OF REPUBLIC ACT NO. 7309, AND FOR THE OTHER PURPOSES"
congress_website_abstract = "The measure grants victims of unjust imprisonment or detention for more than five (5) years a compensation of P2,000 for every month of imprisonment. It provides victims of violent crimes psychiatric and medical treatment in any government hospital."

