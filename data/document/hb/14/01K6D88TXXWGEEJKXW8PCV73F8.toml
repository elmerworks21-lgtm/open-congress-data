congress_website_title = "AN ACT PROVIDING FOR THE REGULARIZATION OF EMPLOYEES, PROHIBITING CONTRACTUAL OR LABOR-ONLY CONTRACTING FOR REGULAR POSITIONS, PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "The bill expands the definition of regular employees by including those who have rendered at least one (1) year of service, whether continuous or broken and whether or not such service is necessary in the usual trade or business of the employer. It penalizes employers who deliberately deprive their employees the benefit of regularization when due."
