congress_website_title = "PANUKALANG BATAS NA NAGTATADHANA NG DALAWAMPUNG (20) TAONG PROGRAMA PARA SA PAGPAPAUNLAD NG MGA BARANGAY, PAGLALAAN NG PONDO PARA DITO AT IBA PANG LAYUNIN (AN ACT PROVIDING FOR A TWENTY (20) YEAR BARANGAY DEVELOPMENT PROGRAM, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES)"
congress_website_abstract = "\\\"2007 Batas Para sa Pagpapaunlad ng mga Barangay\\\". Ang panukalang ito ay naghahangad na mapabilis ang pag-unlad ng lahat ng mga barangay bilang pangungunang bahaging politikal at pang-economiya ng ating bansa sa loob ng itinakdang panahon. Ang panukala ay naglalaan ng panimulang pondo na P20 bilyon para sa programang ito.(\\\"The Barangay Development Act of 2007\\\". The bill seeks to accelerate the development of barangays as the primary political-economic unit through the formulation of a 20-year development program with a seed fund of P20 billion pesos.)"

