congress_website_title = "AN ACT REORGANIZING THE NATIONAL FOOD AUTHORITY INTO THE NATIONAL FOOD CORPORATION, REDEFINING ITS POWERS, AND CREATING THE FOOD DEVELOPMENT AND REGULATORY ADMINISTRATION, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"National Food Authority Reorganization Act of 2002\\\". The bill seeks to reorganize the National Food Authority into the National Food Corporation (NFC) and to arm the NFC with a broader mandate and wider powers to enable it to effectively perform its functions as motivator for farmers to become more productive and competitive."
