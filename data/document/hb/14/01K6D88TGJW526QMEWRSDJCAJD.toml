congress_website_title = "AN ACT EXEMPTING BONDS ISSUED BY THE LAND BANK OF THE PHILIPPINES FOR LAND ACQUISITIONS FROM PAYMENT OF THE TWENTY PERCENT (20%) FINAL TAX ON INTEREST INCOME, AMENDING FOR THE SAID PURPOSE SECTION 24(B)(1) OF REPUBLIC ACT 8424, OTHERWISE KNOWN AS THE TAX REFORM ACT OF 1997"
congress_website_abstract = "In the implementation of the Land Reform Law, the contemplated protection of the just share for the landowners did not actually materialize. In most cases, only the productive portions of the lands were bought, leaving the landowners with unproductive and undesirable portions of the land. To redress a perceived social wrong, this bill proposes to exempt interest earnings on Land Bank notes paid to landowners from the payment of withholding tax."

