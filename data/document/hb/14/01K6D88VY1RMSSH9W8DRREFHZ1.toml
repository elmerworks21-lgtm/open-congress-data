congress_website_title = "AN ACT PROVIDING FOR THE MANNER IN WHICH AN ACTING PRESIDENT SHALL BE SELECTED IN CASE THE PRESIDENT, VICE-PRESIDENT, SENATE PRESIDENT AND SPEAKER OF THE HOUSE FAILS TO QUALIFY OR IS UNABLE TO ASSUME AND DISCHARGE THE FUNCTIONS OF THE OFFICE OF THE PRESIDENT OF THE PHILIPPINES UNDER ARTICLE VII, SECTIONS 7 AND 8 OF THE 1987 CONSTITUTION"
congress_website_abstract = "Seeks to fulfill the Constitutional provision mandating Congress to enact a law to determine who will serve as Acting President in case the President, Vice-President, Senate President, Speaker of the House, fails to qualify or is unable to assume and discharge the functions of the Office of the President. This is apparently to prevent a vacuum in the Office of the President - a very dangerous situation that could lead to bloodshed and anarchy, and the very thought of which has adverse effects to the stability of the economy."
