congress_website_title = "AN ACT PROHIBITING THE PRODUCTION OF INCANDESCENT LIGHT BULBS COMPLETELY WITHIN 5 YEARS TO CUT DOWN THE AMOUNT OF GREENHOUSE GASES IMPLICATED IN GLOBAL WARMING, THAT IT RELEASES INTO THE ATMOSPHERE"
congress_website_abstract = "\\\"Production of Incandescent Light Bulb Prohibition Act\\\". The bill seeks to ban the production of incandescent light bulbs completely within five (5) years from its enactment. It aims to promote the use of compact flourescent light bulbs in place of incandescent light bulbs."
