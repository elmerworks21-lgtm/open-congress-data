congress_website_title = "AN ACT AMENDING SECTIONS 15 AND 31 OF REPUBLIC ACT NO. 6770, OTHERWISE KNOWN AS 'THE OMBUDSMAN ACT OF 1989', ENSURING OBJECTIVITY AND THE PROTECTION OF WITNESSES IN THE PROSECUTION OF CASES BY THE OMBUDSMAN, ALLOWING PRIVATE LAWYERS TO ACT AS PROSECUTORS ON HIS BEHALF, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill allows the Ombudsman to deputize private lawyers as prosecutors in the following cases, among others: a) those involving former impeachable constitutional officers; b) those involving public officers and employees where the public funds involved amount to at least P5 million; and c) those involving former and incumbent officials representing government interests in private corporations."
