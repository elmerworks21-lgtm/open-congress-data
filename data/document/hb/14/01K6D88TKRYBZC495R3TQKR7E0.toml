congress_website_title = "AN ACT STRENGTHENING THE COMPREHENSIVE AGRARIAN REFORM PROGRAM (CARP), FURTHER AMENDING FOR THE PURPOSE SECTIONS SIXTY-THREE AND THIRTY-SEVEN OF REPUBLIC ACT NO. 6657, AS AMENDED, OTHERWISE KNOWN AS THE COMPREHENSIVE AGRARIAN REFORM LAW OF 1988"
congress_website_abstract = "The bill directs all financing institutions to accept as collateral for loans any duly registered emancipation patent or certificate of land ownership award issued by the government through the Department of Agrarian Reform provided that the loan shall used for the improvement of the farmholding of the farmer-beneficiary or the establishment of facilities that will help increase farm income."
