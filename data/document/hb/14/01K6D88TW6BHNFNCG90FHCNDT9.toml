congress_website_title = "AN ACT REQUIRING ALL GOVERNMENT AGENCIES, INSTRUMENTALITIES, LOCAL GOVERNMENT UNITS, AND GOVERNMENT OWNED AND/OR CONTROLLED CORPORATIONS (GOCCs) AND PRIVATE ESTABLISHMENTS TO USE SECURITY WATER-MARKED PAPER IN ALL RECEIPTS AND INVOICES, PERMITS, LICENSES, CLEARANCES, OFFICIAL PAPERS OR DOCUMENTS"
congress_website_abstract = "\\\"Use of Security Water-Marked Paper in All Receipts and Invoices, Permits, Licenses, Clearances, Official Papers or Documents Act of 2007\\\". The bill directs all government agencies and instrumentalities to use water-marked paper in all receipts, invoices, forms, permits, licenses, clearances, official papers and documents issued to all natural and juridical persons transacting business with them."
