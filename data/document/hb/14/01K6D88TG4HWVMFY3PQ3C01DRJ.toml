congress_website_title = "AN ACT ESTABLISHING A MECHANISM FOR THE NATIONAL IDENTIFICATION SYSTEM IN THE PHILIPPINES, PROVIDING FOR BENEFITS AND RIGHTS AND CORRESPONDING OBLIGATIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"National Identification Card Systtem (NICS) Act of 2001\\\". In some countries like Malaysia, Indonesia, Japan, Germany and South Africe, the adoption of an identification system has provided a useful tool in minimizing, if not eradicating, bureaucratic red tape. The bill seeks to establish an identification system in the Philippines with the aim of reaping the same benefits as those achieved in the abovementioned countries - efficient delivery of service and effective law enforcement."

