congress_website_title = "AN ACT GRANTING ADDITIONAL RETIREMENT BENEFITS TO MEMBERS OF THE JUDICIARY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 910, AS AMENDED, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill entitles a justice or a judge, who has rendered 15 years of service in the judiciary and who retired at the compulsory age of 70 years, to a basic monthly pension plus the highest aggregate transportation, living and representation allowances received at the time of retirement plus a non-wage benefit in the form of education scholarship for one legitimate child."
