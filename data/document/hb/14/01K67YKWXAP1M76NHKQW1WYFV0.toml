congress_website_title = "AN ACT PROVIDING FOR AN AGRICULTURE AND AGRARIAN REFORM CREDIT AND FINANCING SYSTEM THROUGH BANKING INSTITUTIONS"
congress_website_abstract = "“Agri-Argra Reform Credit Act of 2009.” Seeks to provide and ensure viable credit facility to farmers, agrarian reform beneficiaries, tillers, tenant farmers, settlers, agricultural lessees, amortizing owners, owner-cultivators, farmers cooperatives, compact farmers, agro-industrial enterprises, corporate farmers, small farmers, and small fisher folks and their cooperatives to accommodate eligible agricultural/fisheries activities thus, propelling the countryside/rural areas to become exceptional agricultural/fisheries producers."
