congress_website_title = "AN ACT REVIVING THE PHILIPPINE MOVIE INDUSTRY BY PROVIDING INCENTIVES TO THE PROPRIETORS, LESSEES, OPERATORS OF THEATERS AND CINEMAS"
congress_website_abstract = "The bill proposes to exempt proprietors, lessees, operators of theaters and cinemas from the payment of income tax, excise tax abd value-added tax in relation to the showing of exhibition or movies and films produced by the Philippine movie industry. In lieu thereof, it provides for the payment of a five percent (5%) tax based on gross income."
