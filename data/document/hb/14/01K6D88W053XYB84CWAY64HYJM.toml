congress_website_title = "AN ACT CREATING THE PHILIPPINE THOUROUGHBRED HORSERACING AUTHORITY PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Charter Of The Philippine Thouroughbred Horseracing Authority.\\\" Seeks to create the Philippine Thoroughbred Horseracing Authority and abolish the existing Philippine Racing Authority thereby repealing Presidential Decree No. 42, thereby promoting and strengthening the thoroughbred horseracing industry by ensuring the professional development of the horseracing personnel, upgrading the breed of the Philippine Thoroughbred horses and ensuring the efficient and fair operation of horseracing through regulatory measures."
