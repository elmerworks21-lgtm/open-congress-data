congress_website_title = "AN ACT CREATING AN ADVANCED STUDIES DEVELOPMENT PROGRAM FOR EXCEPTIONAL EMPLOYEES FROM OTHER GOVERNMENT AND THE PRIVATE SECTOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Pensionado Act of 2007\\\". The bill proposes to establish a program for exceptionally able and highly motivated employees to undertake advanced studies in a branch of science, technology or related fields of learning that would contribute to the development and progress of the country. The program shall pool together all fellowships, scholarships, training grants sponsored by foreign governments and agencies."

