congress_website_title = "AN ACT DEFINING THE CRIME OF CHILD PORNOGRAPHY IMPOSING PENALTIES THEREFORE AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Anti-Child Pornography Act\\\". The bill imposes the penalty of reclusion perpetua and a fine of not less than P2 million but not more than P5 million on any person who solicits, proposes, induces, promotes, facilitates or engages in the conduct of child pornograpy or who produces child pornographic materials. It defines the prohibited activities related to child pornography."
