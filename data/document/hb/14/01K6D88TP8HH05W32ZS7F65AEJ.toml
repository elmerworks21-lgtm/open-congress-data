congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT 7394, OTHERWISE KNOWN AS THE CONSUMER ACT OF THE PHILIPPINES, DEFINING FOR THE PURPOSE THE CRIME OF PSEUDO-INVESTMENTS, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to curb the growing threat of pseudo-investment schemes such as pyramid sales schemes, ponzi schemes, telemarketing fraud and technology fraud by imposing the penalty of imprisonment of not less than two (2) years but not more than four (4) years and a fine of not less than P100,000 but not more than P500,000."

