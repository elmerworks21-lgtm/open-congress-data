congress_website_title = "AN ACT DECLARING A NATIONAL POLICY FOR TOURISM AS AN ENGINE OF INVESTMENT, EMPLOYMENT, GROWTH AND NATIONAL DEVELOPMENT, REORGANIZING THE DEPARTMENT OF TOURISM AND ITS ATTACHED AGENCIES TO EFFECTIVELY AND EFFICIENTLY IMPLEMENT THAT POLICY, PROVIDING NECESSARY INCENTIVES FOR INVESTMENT AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The bill calls for the establishment of a national policy framework for tourism that will unify the efforts of all sectors in the industry in terms of development and promotion. It also seeks to strengthen the Department of Tourism by streamlining its structure and its attached agencies."
