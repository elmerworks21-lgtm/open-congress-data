congress_website_title = "AN ACT INSTITUTING REFORMS IN THE REAL PROPERTY APPRAISAL AND ASSESSMENT PRACTICES IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Real Property Appraisal and Assessment Reform Act of 2007\\\". The bill calls for the establishment of a National Appraisal Authority that shall be responsible for regulating and overseeing the appraisal activities of all the local government units and national government agencies. The Authority shall ensure that a nationally consistent, equitable and impartial valuation system for real property taxes is put in place."
