congress_website_title = "AN ACT ACCELERATING THE IMPLEMENTATION OF RETAIL COMPETITION AND OPEN ACCESS IN THE ELECTRIC POWER INDUSTRY, AMENDING FOR THE PURPOSE SECTIONS 31 AND 43 OF REPUBLIC ACT NO. 9136, OTHERWISE KNOWN AS THE 'ELECTRIC POWER INDUSTRY REFORM ACT OF 2001' AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill lowers the threshold requirements from 70% to 50% in the privatization of total capacity generating assets of the National Power Corporation (NPC) in Luzon and Visayas and the transfer of the management and control of the total energy output of power plants under contract with the NPC to the IPP (independent power producers) administrators, as conditions precedent to retail/competition and open access."
