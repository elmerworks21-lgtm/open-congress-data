congress_website_title = "AN ACT REGULATING THE USE OF HIGH INTENSITY DISCHARGE HEADLAMPS IN MOTOR VEHICLES"
congress_website_abstract = "“HID Regulation Act of 2009.” Aims to limit the use of HID headlamps to vehicles with headlamp housing originally designed for HID use, and not those designed for conventional halogen or tungsten for the reason that the former design (retrofitted headlamps) have been known to cause accidents on the road and have generally inconvenienced those who drive at night."

