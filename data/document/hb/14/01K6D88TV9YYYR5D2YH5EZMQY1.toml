congress_website_title = "AN ACT PROVIDING FOR COLLEGE EDUCATION EXTENSION PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"College Education Extension Program Act of 2007\\\". The bill establishes the College Education Extension Program (CEEP) that shall enable state colleges and universities to extend their services to far-flung areas by opening extension classes to students who want to continue their college education but can not do so because of the distance of the school and the cost of other incidental expenses."

