congress_website_title = "AN ACT CREATING PLANTILLA POSITIONS IN THE DEPARTMENT OF EDUCATION FOR VOLUNTEER TEACHERS WITH AT LEAST FIVE YEARS OF CONTINUOUS SERVICE IN THE PUBLIC SCHOOL SYSTEM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The bill mandates the Department of Education to create plantilla teaching positions for volunteer teachers with at least five years of continuous service in public schools. The creation of plantilla positions for volunteer teachers will not only give them adequate income but it will also accord them dignity."
