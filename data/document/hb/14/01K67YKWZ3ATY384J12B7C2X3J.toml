congress_website_abstract = "\\\"Small Islands Development And Management Act Of 2009.\\\" Seeks to provide for a thorough planning aimed at prortecting the resources of small islands from degradation and destruction due to irresponsible development; resolve conflicts in jurisdiction among agencies to pursue the sustainable development of the small islands; determine the scale of development in relation to limitations in resources such as water and coastal resources; reduce the vulnerability of small islands to natural hazards; and, preserve socio-cultural and ecological integrity vis-a-vis development."
