congress_website_title = "AN ACT ESTABLISHING THE REGULATORY FRAMEWORK FOR THE LIQUEFIED PETROLEUM GAS INDUSTRY, DEFINING AND PENALIZING CERTAIN PROHIBITED ACTS INVOLVING LPG AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"LPG Industry Act of 2007\\\". The bill authorizes the Department of Energy to supervise and monitor the liquefied petroleum gas (LPG) industry to ensure compliance with national product quality, environmental and workers safety, and consumers welfare standards. It mandates the Department of Trade and Industry to promulgate the Philippine National Standards for LPG cylinders and ancillary equipment."
