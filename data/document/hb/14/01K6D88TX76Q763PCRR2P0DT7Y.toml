congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AND PROVIDING FOR THE RATIONALIZATION OF WAGE-FIXING ALONG NATIONAL AND INDUSTRIAL LINES"
