congress_website_abstract = "Increases the prescriptive period of filing cases against graft and corruption years so as not to allow violators of the law to escape criminal liability by mere technicality, i.e., prescription of offenses. Provides that all offenses punishable under the law shall prescribe in thirty (30) years."
