title = "SUBSIDIARY IMPRISONMENT"
date_filed = "2009-10-19"
long_title = "AN ACT ADJUSTING THE RATE OF SUBSIDIARY IMPRISONMENT TO ONE DAY FOR AN AMOUNT EQUIVALENT TO THE DAILY MINIMUM WAGE OF A LABORER IN THE NATIONAL CAPITAL REGION, AMENDING FOR THE PURPOSE ARTICLE 39 OF THE REVISED PENAL CODE OF THE PHILIPPINES"
scope = "National"
subjects = [ "Revised Penal Code (RA 3815; Amendments)", "Subsidiary Imprisonment",]
congress_website_author_codes = ["E004"]
congress_website_coauthors_raw = ["NOGRALES, PROSPERO C.","RODRIGUEZ, RUFUS B.","SANTIAGO, NARCISO III D.","AGGABAO, GIORGIDI B."]
congress_website_committee_codes = ["0531","0532"]
congress_website_primary_keys = [28937]
congress_website_title = "AN ACT ADJUSTING THE RATE OF SUBSIDIARY IMPRISONMENT TO ONE DAY FOR AN AMOUNT EQUIVALENT TO THE DAILY MINIMUM WAGE OF A LABORER IN THE NATIONAL CAPITAL REGION, AMENDING FOR THE PURPOSE ARTICLE 39 OF THE REVISED PENAL CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to protect and enhance the right of all people to human dignity and reduce social inequities by alleviatinge the plight of poor convicts who are compelled to serve subsidiary imprisonment for the reason that they do not have the means to pay the fine imposed upon them whereby, the current rate of subsidiary imprisonment has not only become obsolete but also imposes an unreasonabe burden on poor convicts; considerably reduce the total number of days of subsidiary imprisonment that a prisoner would have to serve, and; effect jail decongestion by imposing penalty that is commensurate to the offense committeed by the convict."
