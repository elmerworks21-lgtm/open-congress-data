congress_website_title = "AN ACT DECLARING CERTAIN ILLEGAL PRACTICES OF RICE TRADERS AS ECONOMIC SABOTAGE AND IMPOSING STRICTER GUIDELINES IN THE IMPORTATION, PROCESSING, STORAGE AND DISTRIBUTION OF RICE AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to protect the country from the importation of sub-standard price by prohibiting the importation of rice that is over two (2) months old from the time it has been milled in the country of origin. Provides safety measures in the storage, sale and distribution of imported rice for the protection of consumers."

