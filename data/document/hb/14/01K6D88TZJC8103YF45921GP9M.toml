congress_website_title = "AN ACT PROVIDING FOR A PEOPLE-EMPOWERING LOAN PROGRAM THROUGH A RATIONALIZED GOVERNMENT-PRIVATE SECTOR FINANCIAL SERVICES SYSTEM, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill proposes a complementary and rationalized government-private sector credit system guided by the following principles: a) greater role for private sector in the provision of financial services to the poor; b) market-oriented financial and credit policies; c) facilitative role of government in the delivery of credit services; and d) non-participation of government non-financial agencies and GOCCs in the implementation of credit programs."
