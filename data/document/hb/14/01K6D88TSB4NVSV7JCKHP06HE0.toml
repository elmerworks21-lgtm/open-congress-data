congress_website_abstract = "\\\"Political Party Act of 2007\\\". The bill proposes public funding for political parties thereby minimizing political patronage and developing a strong political party system by prohibiting turncoatism. It proposes two sources for public campaign funding: a) a check off from personal and corporate income taxes; and b) a direct allocation from the national budget. (Campaign Finance Bill)"
