congress_website_title = "AN ACT PROVIDING FOR CHEAPER MEDICINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Cheaper Medicines Act of 2007\\\". The bill seeks to improve access to affordable medicines by incorporating into the present Philippine Intellectual Property Code certain public safeguards found in the GATT Trade Related Aspects of Intellectual Property Rights (TRIPS) Agreement that create clear, legal exceptions into intellectual property rules."
