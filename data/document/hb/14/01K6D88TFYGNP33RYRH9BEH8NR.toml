congress_website_title = "AN ACT ESTABLISHING THE EMERGENCY MANAGEMENT PHILIPPINES (EMP) AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "\\\"Emergency Management Philippines Act Of 2007.\\\" The bill seeks to institutionalize an integrated and coordinated disaster management policy that focuses on preventing and reducing the risks of disasters, mitigating the severity of disasters, undertaking emergency preparedness and initiating rapid and effective response to disasters and post disaster recovery."
