congress_website_title = "AN ACT INCREASING THE BENEFITS OF AND PROVIDING INCENTIVES TO BARANGAY OFFICIALS AND EMPLOYEES, INCLUDING BARANGAY TANODS, MEMBERS OF THE LUPONG TAGAPAMAYAPA, AMENDING FOR THE PURPOSE SECTIONS 393 AND 406 OF R. A. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "\\\"Comprehensive Barangay Incentives Act of 2007\\\". The bill seeks to grant barangay officials, including barangay tanods, members of the lupong tagapamayapa, members of the pangkat tagapagkasundo and kabataan barangay, the following incentive, among others: a) exemption from income, capital gains and transfer taxes; b) GSIS coverage; c) health benefits; and d) legal representation."

