congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBER 7227 OTHERWISE KNOWN AS THE \\\"BASES CONVERSION AND DEVELOPMENT ACT OF 1991\\\" AS AMENDED BY THE REPUBLIC ACT NUMBER 7917, EXPANDING THE ALLOCATION OF REVENUES FROM THE SALE, LEASE, JOINT-VENTURE AGREEMENTS AND OTHER TRANSACTION INVOLVING MILITARY BASES AND RESERVATIONS, ALLOCATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill proposes the following, among others: a) to increase the share of the AFP in the proceeds of converted base lands from 35% to 55% of net proceeds; b) to put a cap in sale-related expenses for bases conversion; and c) for the AFP to share in the proceeds from the lease, joint venture and other arrangements for the productive use of former military bases."

