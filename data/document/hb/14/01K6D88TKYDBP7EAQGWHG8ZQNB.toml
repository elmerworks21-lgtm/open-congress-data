congress_website_title = "AN ACT PROVIDING FOR THE MANNER AND DATE OF ELECTION OF THE SECTORAL REPRESENTATIVES IN LOCAL SANGGUNIANS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Local Sectoral Representation Act of 2007\\\". This bill provides for three (3) sectoral representatives each in the Sangguniang Panlalawigan, Sangguniang Bayan and Sangguniang Panlungsod who shall be elected pursuant to this Act: one (1) from the women sector; one (1) from the workers; and one (1) from any of the following sectors: the urban poor, indigenous peoples and cultural communities, differently-abled persons, senior citizen victims of calamities and disasters, children, and urban poor or any other sector as may be determined by the sanggunian concerned."
