congress_website_title = "AN ACT TO PROTECT WORKERS IN THE EVENT OF COMPANY CLOSURES OR CESSATION OF OPERATIONS BY ESTABLISHING THE MECHANISM AND PROPER STANDARDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Workers' Protection Act of 2007\\\". The bill seeks to afford protection to workers in the event of business closure or cessation by providing certain mechanisms and standards, to wit: a) 90-day mandatory notification in case of closure, mass lay-off or any form of cessation of operations; b) allow workers the use of work time with pay to seek alternative employment; and c) allow workers to institute civil action against employers for anomalous closures or mass layoffs."

