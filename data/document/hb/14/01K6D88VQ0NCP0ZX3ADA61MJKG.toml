congress_website_abstract = "“Philippine Economic Development Authority (PEDA) Act of 2009.” Aims to strengthen the processes of planning and budgeting of the government through close coordination between PEDA and the Department of Budget Management (DBM) to bring the national wealth to the programs and projects that would help realize the objectives of the national development and to foster the open accountability in government transactions thus ensuring the highest benefits obtained from the national projects and services."
