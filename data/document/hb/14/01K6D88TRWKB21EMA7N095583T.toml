congress_website_title = "AN ACT GRANTING THE MAGNA CARTA FOR DAY CARE WORKERS, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to protect, promote and improve the social and economic status of day care workers by providing for their: a) salary; b) working hours; c) additional compensation and allowance; d) transfer and tenure; e) leave credit benefits; f) medical, insurance and retirement benefits; g) freedom to organize; and h) code of conduct."
