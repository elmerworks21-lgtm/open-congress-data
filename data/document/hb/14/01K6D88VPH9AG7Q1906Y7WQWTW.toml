congress_website_title = "AN ACT MANDATING A 15% DISCOUNT ON ELECTRICITY RATES FOR CONSUMERS IN PROVINCES HOSTING A NUCLEAR OR GEOTHERMAL OR NATURAL GAS OR WIND POWERED PLANTS"
congress_website_abstract = "Mandates all electric power producers or distributors to grant a fifteen (15%) per cent discount on electricity rates to electric consumers of a particular province if the electricity they have been producing or distributing is coming from a generatingfacility powered by nuclear or geothermal energy or natural gas or wind power located at the said province."
