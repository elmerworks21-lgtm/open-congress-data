congress_website_title = "AN ACT AUTHORIZING THE TRANSFER OF SENTENCED PERSONS TO OR FROM FOREIGN COUNTRIES"
congress_website_abstract = "\\\"Transfer of Sentenced Persons Act of 2007\\\". The bill authorizes the Secretary if Justice to receive custody of a Filipino sentenced abroad or cause the transfer of an alien serviing sentence in Philippine penitentiaries in accordance with the provisions of the transfer of sentenced persons treaties between the Philippines and other countries."
