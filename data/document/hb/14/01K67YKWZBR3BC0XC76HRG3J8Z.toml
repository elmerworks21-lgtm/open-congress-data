congress_website_title = "AN ACT TO INSTITUTE REFORMS IN THE GOVERNMENT'S DRIVE AGAINST PROFESSIONAL SQUATTERS AND SQUATTING RACKETEER/S OR SYNDICATES, STRENGTHENING THE MECHANISMS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Anti-professional Squatters And Squatting Racketeer/s Or Syndicates Drive Reforms Act Of 2009.\\\" Seeks to extend additional protection over the rights of private property owners and make the drive against squatting more effective; hopefully bring to an end the formation of squatting syndicates by imposing stiffer penalty for the commission of such crime and providing for circumstances that shall constitute prima facie evidence against squatting syndicates; and, promote cooperation among government agencies such as the Department of Interior and Local Government (DILG) and the Housing and Urban Development Coordinating Council (HUDCC) in curtailing the nefarious and illegal activities of professional squatters and squatting syndicates."
