congress_website_title = "AN ACT REGULATING THE DOWNSTREAM PETROLEUM INDUSTRY AND FOR OTHER RELATED PURPOSES"
congress_website_abstract = "The bill creates the Petroleum Regulatory Council that shall regulate the pricing of crude oil, and of socially and economically sensitive petroleum products at the marketing, distribution, wholesale and retail levels. It also establishes the oil price buffer fund that shall be used to subsidize oil price fluctuations between price settings."
