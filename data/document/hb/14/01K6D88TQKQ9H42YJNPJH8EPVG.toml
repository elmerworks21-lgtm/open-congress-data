congress_website_title = "AN ACT TO PROMOTE AND GOVERN THE DEVELOPMENT OF VOICE OVER INTERNET PROTOCOL IN THE PHILIPPINES"
congress_website_abstract = "\\\"Philippine VOIP Act of 2007\\\". The bill institutes measures to lower the cost of phone calls by introducing the use of voice over internet protocol (VoIP), a category of hardware and software that enables people to use the internet as the transmission medium for telephone calls by sending voice data in packets using IP rather than by traditional circuit transmissions of the public switch telephone network (PSTN)."

