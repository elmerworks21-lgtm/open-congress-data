congress_website_title = "AN ACT PROVIDING PROTECTION TO CREDIT CARD HOLDER BY SETTING A CEILING ON INTEREST RATES AND SURCHARGES AND PROHIBITING HIDDEN PENALTIES OR COSTS IMPOSED BY BANKS AND SIMILAR FINANCIAL INSTITUTIONS ON PURCHASES AND CASH ADVANCES MADE THROUGH SUCH CREDIT FACILITY"
congress_website_abstract = "The bill sets the interest rate limit which may be imposed by credit card companies to not more than 1% per month or 12% per annum, without compounding. It likewise limits the surcharges or penalties to a ceiling of 1% per month, without compounding."
