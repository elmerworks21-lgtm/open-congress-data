congress_website_title = "AN ACT AMENDING SECTION 285 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, PROVIDING FOR RE-ALLOCATION OF THE INTERNAL REVENUE ALLOTMENT OF LOCAL GOVERNMENT UNITS"
congress_website_abstract = "The bill proposes the deduction of the cost of devolved functions from the internal revenue allotment (IRA) before the IRA is divided among the local government units (LGUs). It also seeks the direct release of the amount corresponding to the amount of devolved functions to the LGUs concerned."

