congress_website_title = "AN ACT ESTABLISHING A CIVIL SERVICE CODE OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to update the existing laws, decrees, letters of instruction and executive orders and make them consistent with the needs of the present system of civil governance. It aims to address deeply-rooted problems confronting the public service such as graft and corruption, bureaucratic red tape, violations of the rights of employees, among others."

