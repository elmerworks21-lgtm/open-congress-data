congress_website_title = "AN ACT ESTABLISHING AT LEAST ONE (1) SPECIAL EDUCATION (SPED) CENTER FOR EACH SCHOOL DIVISION AND AT LEAST THREE (3) SPED CENTERS IN EVERY BIG SCHOOL DIVISION FOR CHILDREN WITH SPECIAL NEEDS (CSN), CREATING THE IMPLEMENTING MACHINERY THEREOF, PROVIDING GUIDELINES FOR GOVERNMENT FINANCIAL ASSISTANCE AND OTHER INCENTIVES AND SUPPORT FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to institutionalize special education program for children with special needs (CSN). It introduces administrative reforms particularly in the structural framework of the DECS and the formulation of appropriate programs to strengthen existing polices and concerns for CSNs. To give easy access to basic education among CSNs, the measure proposes the establishment of at least one special education (SPED) center in each division school and at least three SPED centers in big schools."
