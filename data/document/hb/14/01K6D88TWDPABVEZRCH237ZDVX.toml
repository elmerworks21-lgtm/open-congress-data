congress_website_title = "AN ACT CREATING THE BUILD-OPERATE-TRANSFER AUTHORITY, FURTHER AMENDING REPUBLIC ACT NO. 6957, AS AMENDED BY REPUBLIC ACT NO. 7718, ENTITLED 'AN ACT AUTHORIZING THE FINANCING, CONSTRUCTION, OPERATION AND MAINTENANCE OF INFRASTRUCTURE PROJECTS BY THE PRIVATE SECTOR AND FOR OTHER PURPOSES' FOR THIS PURPOSE"
