congress_website_title = "AN ACT AMENDING REPUBLIC ACT 9184, OTHERWISE KNOWN AS THE GOVERNMENT PROCUREMENT REFORM ACT, WITHDRAWING FROM ITS APPLICATION ALL REFERENCES TO THE LOCAL GOVERNMENT UNITS"
congress_website_abstract = "Seeks to withdraw from its application and coverage all references to the local government units (LGUs) under the provisions of Republic Act No. 9184, otherwise known as the Government Procurement Reform Act, and thereby mandate that procurement of infrastructure projects, goods and consulting services by LGUs be governed by Title Six, Book Two of Republic Act No. 7160, otherwise known as Local Government Code of 1991."

