congress_website_title = "AN ACT ESTABLISHING TRANS FAT LABELING REQUIREMENTS ON FOOD PRODUCT LABELS AND BANNING HARMFUL TRANS FATS IN FOOD"
congress_website_abstract = "\\\"The Trans Fat Labeling Act\\\". The bill requires all food manufacturers to indicate in their label the amount of trans fat contained in their food product and to ban harmful trans fats in foods in the country. It provides that in a \\\"free of trans fatty acids\\\" claim, the content of trans fat acids should be less than one (1) gram per one hundred (100) grams of the individual oil or the individual fat in the finished product."
