congress_website_title = "AN ACT CREATING A DEPARTMENT OF FISHERIES AND AQUATIC RESOURCES, PROVIDING FOR ITS POWERS AND FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill creates a separate and distinct entity to be known as the Department of Fisheries and Aquatic Resources that shall have the power to administer, develop, conserve and utilize all fisheries and aquatic resources. It shall have the jurisdiction to take control over the production, capture, dispensation and promotion of fisheries and marine products in the country."
