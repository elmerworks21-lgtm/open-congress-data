congress_website_title = "AN ACT RECOGNIZING THE POTENTIALS OF THE FILIPINO YOUTH TOWARD NATION-BUILDING, PRESCRIBING THE FREE EXERCISE OF CERTAIN RIGHTS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Magna Carta for Youth\\\". The bill guarantees the following rights of the youth: a) access to labor and employment; b) access to education; c) academic freedom; d) access to health care and services; e) free expression and information; f) organization and free assemly; g) participation in policy formulation; h) freedom of thought, conscience and religion; and i) political repression."
