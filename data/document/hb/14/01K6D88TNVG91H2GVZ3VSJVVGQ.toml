congress_website_title = "AN ACT PROVIDING FOR THE MANNER AND DATE OF ELECTION OF SECTORAL REPRESENTATIVES TO THE LOCAL SANGGUNIANS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Local Sectoral Representation Act of 2007\\\". The bill provides for the election of three sectoral representatives each in the sangguniang panlalawigan, sangguniang bayan and sangguniang panlungsod - one from the women sector, one from the workers and one from any of the following: the urban poor, indigenous cultural communities, disabled persons, and the elderly."
