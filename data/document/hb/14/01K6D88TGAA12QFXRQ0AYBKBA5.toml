congress_website_title = "AN ACT ESTABLISHING A PROVIDENT PERSONAL SAVINGS PLAN, KNOWN AS THE PERSONAL EQUITY AND RETIREMENT ACCOUNT (\\\"PERA\\\")"
congress_website_abstract = "\\\"Personal Equity and Retirement Account (PERA) Act of 2007\\\". This bill seeks to institutionalize the Personal Equity and Retirement Account (PERA) for all private and private employees in order to promote among them positive attitudes toward saving for their retirement years. It is hoped that the institutionalization of the PERA would give our workforce a comfortable and financially secure retirement."
