congress_website_title = "AN ACT AMENDING SECTION 22 OF REPUBLIC ACT NO. 8552, OTHERWISE KNOWN AS THE \\\"DOMESTIC ADOPTION ACT OF 1998\\\""
congress_website_abstract = "Seeks to extend the prescriptive period for availment of the amnesty from pecuniary and penal sanctions imposed against individuals who falsified the birth certificates of their child under their custody through the registration of a simulated birth certificate. Proposes to extend the prescriptive period from five (5) years to another fifteen (15) years."
