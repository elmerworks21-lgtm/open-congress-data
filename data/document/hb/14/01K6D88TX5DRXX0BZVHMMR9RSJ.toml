congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 9340, RESETTING THE SYNCHRONIZED BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill proposes to postpone the barangay and sangguniang kabataan elections to the second Monday of Novermber 2009. It also provides for the subsequent barangay and sangguniang kabataan elections to be held on the second Monday of November 2014 and every five (5) years thereafter."
