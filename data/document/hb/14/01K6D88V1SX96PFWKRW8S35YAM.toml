congress_website_title = "AN ACT RENATIONALIZING PETRON CORPORATION"
congress_website_abstract = "The bill mandates the Philippine National Oil Company to reacquire 100% ownership of Petron Corporation within a period of four (4) years. Upon its renationalization, Petron shall adopt a pricing policy that will keep the prices of crude oil and petroleum products socially and economically viable; control cartel and monopoly pricing; and promote the local capacity for exploration, refining and exploitation, processing and development of petroleum."
