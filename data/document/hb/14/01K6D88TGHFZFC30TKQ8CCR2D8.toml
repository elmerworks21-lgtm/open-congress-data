congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC RETENTION BY THE BARANGAY OF ITS SHARE OF FIFTY PERCENT (50%) IN THE COMMUNITY TAX COLLECTED BY SAID BARANGAY, AMENDING FOR THE PURPOSE SECTION 164 OF R.A. NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Section 164, par (c), subpar (2) of the Local Government Code of 1991 entitles barangay units to share up to fifty percent (50%) of their community tax collection. The section also provides that the share of the national government from the community tax collection shall be remitted by the city or municipality concerned within ten (10) days after the end of each quarter. It is silent as when the barangay shall receive its share of the community taxes. To correct the situation, the bill seeks to amend this provision to allow barangays to automatically retain their fifty percent (50%) share in the community tax collections and to remit the share of the city or municipality within ten (10) days after the end of each month."
