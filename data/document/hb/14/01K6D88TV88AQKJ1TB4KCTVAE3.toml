congress_website_abstract = "\\\"The Tourism Act of 2007\\\". The bill calls for the establishment of a national policy framework for tourism that will unify the efforts of all sectors in the industry in terms of development and promotion. It also seeks to strengthen the Department of Tourism by streamlining its structure and its attached agencies."
