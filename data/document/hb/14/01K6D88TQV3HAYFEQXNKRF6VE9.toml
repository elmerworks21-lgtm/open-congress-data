congress_website_title = "AN ACT EXPANDING THE COVERAGE OF AND THE CONDUIT NETWORK FOR AGRI-AGRA CREDITS, PRESCRIBING A FIXED PERCENTAGE OF THE FUNDS FOR LENDING TO SMALL FARMERS AND FISHERFOLK, AND FOR OTHER PURPOSES THEREBY AMENDING PRESIDENTIAL DECREE NO. 717 OTHERWISE KNOWN AS THE AGRI-AGRA LAW"
congress_website_abstract = "This bill requires banks to grant 25% of their loanable funds to the agriculture and fisheries sectors, 50% of which shall be lent to small farmers and fisherfolk. It prohibits the diversion of the 10% agrarian reform share to government securities."
