congress_website_title = "AN ACT REVERTING TO THE NATIONAL GOVERNMENT THE DISCHARGE OF BASIC AGRICULTURAL FUNCTIONS AND RESPONSIBILITIES DEVOLVED TO LOCAL GOVERNMENT UNITS AND AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991'"
congress_website_abstract = "The bill reverts to the national government the following devolved functions, among others: dispersal of livestock and poultry; fingerlings and seedlings for aquaculture; agricultural extension; inter-barangay irrigation system; and on-site research services. Accordingly, it reverts to the national government all personnel previously devolved to the local government units."
