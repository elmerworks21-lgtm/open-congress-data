congress_website_title = "ISANG BATAS NA NAG-AAMYENDA SA ARTIKULO 11 NG KAUTUSANG TAGAPAGPAGANAP BLG. 209, (ANG FAMILY CODE OF THE PHILIPPINES, BILANG NAAMYENDAHAN) UPANG MAILAGAY ANG FAMILY PLANNING SEMINAR BILANG KAHINGIAN PARA SA PAG-IISYU NG LISENSIYA SA KASAL AT SA IBA PANG MGA LAYUNIN (AN ACT AMENDING ARTICLE 11 OF EXECUTIVE ORDER NO. 209, (THE FAMILY CODE OF THE PHILIPPINES, AS AMENDED) SO AS TO INCLUDE FAMILY PLANNING SEMINAR AS A REQUISITE FOR THE ISSUANCE OF A MARRIAGE LICENSE AND FOR OTHER PURPOSES)"
