congress_website_title = "AN ACT GRANTING TAX EXEMPTIONS TO SENIOR CITIZENS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9257, OTHERWISE KNOWN AS EXPANDED SENIOR CITIZENS ACT OF 2003"
congress_website_abstract = "The bill exempts the sale of goods and services to senior citizens from the expanded value-added tax to enable them to enjoy the full 20% discount privilege. To compensate proprietors for the loss, it provides for the input value-added tax on such sale to be taken against the taxable sales of the proprietors."
