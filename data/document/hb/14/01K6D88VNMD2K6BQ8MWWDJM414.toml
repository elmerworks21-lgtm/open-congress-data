congress_website_title = "AN ACT PROVIDING FOR SPECIFIC BUDGETING GUIDELINES IN CASES OF RE-ENACTED NATIONAL BUDGETS"
congress_website_abstract = "\\\"Act Providing for Specific Budgeting Guidelines in Cases of Re-enacted National Budgets.\\\" Defines the items in the General Appropriations Act in case of a re-enacted National Budget to include the annual appropriations for salaries and wages of existing positions, statutory and contractual obligations, and essential operating expenses authorized in the annual and supplemental budgets dor the preceding year."
