congress_website_title = "AN ACT PENALIZING THE USE OF COMPUTERS TO COMMIT, FACILITATE OR CONCEAL THE COMMISSION OF A CRIME OR TO VIOLATE THE RIGHT TO PRIVACY OF PERSONS"
congress_website_abstract = "Seeks to penalize any person with imprisonment of not less than ten (10) years but not more than fifteen (15) years and a fine of not less than P20,000 but not more than P50,00 for the use of computers in the commission of a crime against national security, and imprisonment of not less than five (5) years but not more than ten (10) years if the crime is committed against a person or property."

