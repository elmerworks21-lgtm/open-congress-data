congress_website_title = "AN ACT RECOGNIZING THE FUNDAMENTAL RIGHT OF ADULT PERSONS TO DECIDE THEIR OWN HEALTH CARE, INCLUDING THE DECISION TO HAVE LIFE-SUSTAINING TREATMENT WITHHELD OR WITHDRAW IN INSTANCES OF A TERMINAL CONDITION OR PERMANENT UNCONSCIOUS CONDITION"
congress_website_abstract = "“Natural Death Act of 2008.” Seeks to recognize the right of an adult person to make a written directive instructing his or her physician to withhold or withdraw life-sustaining treatment in the event of a terminal condition or permanent unconscious condition which shall be exercised by an authorized representative who validly holds his or her durable power of attorney for health."

