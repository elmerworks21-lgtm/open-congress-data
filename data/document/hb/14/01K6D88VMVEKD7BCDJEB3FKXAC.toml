congress_website_title = "AN ACT REQUIRING BANKS, WHATEVER MAY BE ITS NATURE, KIND AND/OR CLASSIFICATION, TO INDICATE AND/OR APPREND IN ITS BUSINESS NAME SAID NATURE, KIND, AND/OR CLASSIFICATION, PROVIDING FOR PENAL AND ADMINISTRATIVE SANCTIONS AGAINST BANK OWNERS AND/OR OFFICERS FOR ANY MISREPRESENTATION IN RELATION THERETO, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to thwart instances where the bank wittingly and willingly misrepresented itself by adopting a business name contrary to its classification thus convincing and creating confusion and thereby jeopardizing the interest of the depositors and exposing them to great risks and providing stiffer penalties therefor."

