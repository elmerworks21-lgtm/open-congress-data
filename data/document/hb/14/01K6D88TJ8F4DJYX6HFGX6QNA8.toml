congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA FOR THE POOR"
congress_website_abstract = "\\\"Magna Carta for the Poor\\\". The bill clearly defines the basic irreducible rights of the poor, to wit: a. the right to employment; b. the right to food; c. the right to free quality education; d. the right to shelter; and e. the right to free health services and medicine."
