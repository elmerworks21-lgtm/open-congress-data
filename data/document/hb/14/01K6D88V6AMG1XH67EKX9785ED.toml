congress_website_title = "AN ACT STRENGTHENING THE COMPREHENSIVE AGRARIAN REFORM PROGRAM (CARP) BY AMENDING SECTION SEVEN, FURTHER AMENDING SECTIONS THIRTY-SEVEN AND SIXTY-THREE AND REPEALING SECTIONS TWENTY-NINE, THIRTY, THIRTY-ONE, THIRTY-TWO, THIRTY-THREE AND THIRTY-FOUR OF REPUBLIC ACT NO. 6657, AS AMENDED, OTHERWISE KNOWN AS THE COMPREHENSIVE AGRARIAN REFORM LAW OF 1988"
congress_website_abstract = "The bill requires all financing institutions to accept as collateral for loans any duly registered emancipation patent (EP) or certificate of land ownership award (CLOA) provided that the loans obtained shall be used in the improvement or development of the farmholding of the farmer-beneficiary or the establishment of facilities that will enhance production or marketing or agricultural products or increase farm income. It also proposes the abolition of the stock distribution option offered to farmers."
