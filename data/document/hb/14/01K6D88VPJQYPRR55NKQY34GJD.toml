congress_website_title = "AN ACT MANDATING ALL GOVERNMENT AND PRIVATE BANKS TO EXTEND LOANS FOR THE PURPOSE OF APPLYING FOR JOBS OVERSEAS TO GRADUATES OF THE TECHNICAL EDUCATION AND SKILLS DEVELOPMENT AUTHORITY"
congress_website_abstract = "Mandates all government and private banks to extend loans, without collateral, to graduates of the Technical Education and Skills Development Authority (TESDA) to be used primarily for meeting their credit needs in applying for jobs overseas in the form of placement fees and other fees required by the Philippine Overseas Employment Agency (POEA) and Overseas Workers Welfare Administration (OWWA)."
