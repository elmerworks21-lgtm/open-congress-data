congress_website_title = "AN ACT AMENDING EXECUTIVE ORDER NO. 209, ALSO KNOWN AS THE FAMILY CODE, ARTICLE 73, ON THE CHARGE AGAINST THE COMMUNITY PROPERTY OF AN OBLIGATION OF A SPOUSE WHO PRACTICES A PROFESSION"
congress_website_abstract = "The measure seeks to amend Article 73 of the Family Code to provide that if a spouse objects to the excercise of the profession of his spouse and \\\"if benefit accrued to the family prior to the objection, the resulting obligation shall be enforced against the COMMUNITY PROPERTY. IF BENEFIT ACCRUED THEREAFTER, SUCH OBLIGATION SHALL BE ENFORCED AGAINST THE separate property of the spouse who had not obtained consent.\\\""
