scope = "National"
subjects = [ "Real Estate Investment Trust",]
congress_website_author_codes = ["E011"]
congress_website_coauthors_raw = ["TEODORO, MARCELINO R.","CAJAYON, MARY MITZI LIM","NOGRALES, PROSPERO C.","MITRA, ABRAHAM KAHLIL B.","DAZA, PAUL R.","MANDANAS, HERMILANDO I.","DURANO, RAMON VI","JOSON, EDUARDO NONATO N.","ROMULO, ROMAN T."]
congress_website_committee_codes = ["0536","0542","0532"]
congress_website_primary_keys = [22453]
congress_website_title = "AN ACT PROVIDING THE LEGAL FRAMEWORK FOR REAL ESTATE INVESTMENT TRUSTS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Real Estate Investment Trust (REIT) Act Of 2009.\\\" Seeks to democratize wealth by providing small and large investors alike with the opportunity to participate directly in the ownership and financing of large-scale real estate projects at affordable rates of investment, without the disadvantages of illiquidity, high transaction and management costs, as compared to traditional private and real estate ownership; facilitate the buying and selling of securities of said companies representing an interest in income-producing real estate than to directly buy and sell the properties themselves; provide the investor and the national government a steady income stream since the real estate investment trust is required to declare dividends; allow for cross-border investments that will encourage strategic foreign investments in the capital market; and, develop the capital market, reinvigorate the real property markets and improve investor access to property investments."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=14&q=HBN-6379"

