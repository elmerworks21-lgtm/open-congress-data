congress_website_abstract = "\\\"Micro-Enterprise Development Institution Act Of 2010.\\\" Seeks to create micro-enterprise development institutions (MEDIs) that can be tapped to promote, enhance and protect the interests of the poor most especially access to credit as well as access in all realted micro-finance services susch as insurance, health care, education, housing and other value added services."
