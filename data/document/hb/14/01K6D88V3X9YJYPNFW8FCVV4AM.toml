congress_website_title = "AN ACT PROVIDING FOR THE MANDATORY PREGNANCY TESTING OF ALL WOMEN OF CHILDBEARING AGE WHO WILL UNDERGO COSMETIC PROCEDURES THAT ARE HARMFUL TO PREGNANT WOMEN AND UNBORN CHILDREN, AND DISCLOSURE OF THE POTENTIAL RISKS OF SUCH PROCEDURES AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill requires all cosmetic providers to conduct a pregnancy test on every female patient of child-bearing age. It also obliges cosmetic providers to make a reasonable disclosure of available choices with respect to cosmetic procedures and the potential risks associated with them."
