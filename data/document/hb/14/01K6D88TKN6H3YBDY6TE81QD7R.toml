congress_website_title = "AN ACT ESTABLISHING A STUDENT FINANCIAL ASSISTANCE PROGRAM FOR STUDENTS OF ECONOMICALLY DISADVANTAGED FAMILIES AND AUTHORIZING THE APPROPRIATION OF FUNDS FOR THE PURPOSE"
congress_website_abstract = "This bill establishes a student financial assistance program in the collegiate level which caters to students of underprivileged families who are willing to continue and finish a degree course. It entitles the beneficiaries under this program to a monthly stipend, free tuition, book allowance and other miscellaneous fees to be determined by the administering agency."

