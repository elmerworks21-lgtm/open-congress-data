congress_website_title = "AN ACT MANDATING EACH CITY OR MUNICIPALITY TO CREATE A RIVER DEVELOPMENT AUTHORITY FOR THE PRESERVATION, PROTECTION AND DEVELOPMENT OF ALL RIVERS, RIVERSYSTEMS AND NATURAL WATERWAYS WITHIN ITS JURISDICTION, DEFINING ITS POWERS AND FUNCTIONS AND APPROPRIATING FUNDS THEREFOR"
