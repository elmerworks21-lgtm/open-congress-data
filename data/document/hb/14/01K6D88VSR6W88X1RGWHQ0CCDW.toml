congress_website_title = "AN ACT IMPOSING A UNIFORM FRANCHISE TAX ON DISTRIBUTION UTILITIES ENJOYING LEGISLATIVE FRANCHISE IN LIEU OF ANY AND ALL TAXES COLLECTED BY THE GOVERNMENT WITH THE END IN VIEW OF REDUCING THE COST OF ELECTRICITY BORNE BY CONSUMERS"
congress_website_abstract = "Seeks to revert to the previous system where franchise tax is required of distribution utilities not only to allow the industry players to enjoy a more equitable tax regime. More importantly, the imposition of a franchise tax which is directly absorbed by the franchisee will free the consumers from shouldering additional pass-on charges, thus ensuring affordability and steady supply of electricity to the end users."
