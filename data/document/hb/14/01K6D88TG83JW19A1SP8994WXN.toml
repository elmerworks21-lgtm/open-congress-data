congress_website_title = "AN ACT TO ORDAIN AND INSTITUTE THE MARITIME CODE OF THE PHILIPPINES"
congress_website_abstract = "\\\"Maritime Code of the Philippines\\\". The bill seeks to update and reform the shipping laws of the Philippines and codify the same into one code. It shall upgrade the laws dealing with registration of ships, maritime liens and ship mortgage, maritime fraud, accidents at sea and shipowners' liability. It provides for a separate common carrier provision to apply specifically to vessels transporting passengers and goods. It updates the marine insurance provisions found in the Insurance Code of 1978. The bill also provides for an alternative dispute settlement in the form of arbitration."
