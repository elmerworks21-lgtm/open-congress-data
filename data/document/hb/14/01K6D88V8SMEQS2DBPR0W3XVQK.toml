congress_website_title = "AN ACT PENALIZING THE USE OF COMPUTERS TO COMMIT, FACILITATE OR CONCEAL THE COMMISSION OF A CRIME"
congress_website_abstract = "Prohibits the following use of computers a) to commit or facilitate a criminal activity, b) to transmit a communication intended to conceal the origin of money or asset derived from the commission of a crime, c) to conceal, obliterate or hide the identity of persons guilty of committing a crime, and d) to conceal or hide the commission of a crime and the evidence thereof."
