congress_website_title = "AN ACT TO REGULATE AGGRESSIVE DRIVING"
congress_website_abstract = "Defines the guilt of aggressive driving when a person operates a motor vehicle on a public highway in a manner that creates a substantial risk of serious physical injury to another person; or when a person operates a motor vehicle on a highway while displaying a deadly weapon, dangerous instrument or what reasonably appears to be a pistol, revolver, rifle, shotgun, machine gun or other firearm in such a manner to place another person in reasonable fear of death or serous physical injuury; or when a person operates a motor vehicle on a public highway in such a manner to place another person in reasonable fear of death or physical injury; or when a person tailgates, or drives on a road too closely behind another vehicle, such as less than the travel distance in two seconds or, equivalently, vehicle-length for every 8 km/h (5 mph) of the current speed."
