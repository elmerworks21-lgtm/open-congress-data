congress_website_title = "AN ACT TO REQUIRE CERTAIN DISCLOSURES RELATING TO MATERIALLY ALTERED FILMS"
congress_website_abstract = "\\\"Film Disclosure Act of 2008.\\\" Declares it a policy of the state to protect and secure the rights of scientists, inventors, artists, and other gifted citizens to their intellectual property and creations, thus requiring that each public exhibition of a materially altered motion picture, and each copy of a materially altered motion picture offered to the public through sale or lease (including its film packaging), shall include a label which clearly and conspicuously discloses certain information."
