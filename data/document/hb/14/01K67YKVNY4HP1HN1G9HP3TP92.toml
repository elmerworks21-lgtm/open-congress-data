congress_website_abstract = "The bill declares as agricultural lands certain parcels of land of the public domain within small islands with land areas of 50,000 hectares or less, already devoted to or with great potential for eco-tourism ventures. These lands shall be open to disposition for commercial eco-tourism purposes provided that they have been subjected to a public cadastral survey."
