congress_website_title = "AN ACT TO PLACE SAFETY NETS FOR FILIPINO RICE PRODUCERS BY IMPOSING TARIFFS IN LIEU OF QUANTITATIVE RESTRICTIONS ON RICE IMPORTS, DIRECTING TARIFF COLLECTIONS FROM RICE IMPORTS TO PROJECTS AND PROGRAMS THAT ENHANCE RICE PRODUCTIVITY AND INCREASE FARMERS' INCOMES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Rice Safety Net Act of 2007\\\". The bill seeks to adopt the use of tariffs in lieu of non-tariff import restrictions to protect local rice producers in a direct and transparent manner and, at the same time, generate revenue necessary to provide the infrastructures and finance the programs that would improve farmers' productivity. The tarrification of rice will stop the destabilizing burden of NFAs intervention mechanisms on the Philippine budget and, at 90% to 100% tariff rate, generate PhP 1.38 billion annually in additional revenues for the government."

