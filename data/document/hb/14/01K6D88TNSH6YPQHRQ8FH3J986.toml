congress_website_title = "AN ACT TO MAKE LAWS ON PATENTS, TRADENAMES AND TRADEMARKS MORE RESPONSIVE TO THE HEALTH CARE NEEDS OF THE FILIPINO PEOPLE BY CLARIFYING NON-PATENTABLE INVENTIONS, ALLOWING THE IMPORTATION AND EARLY DEVELOPMENT OF PATENTED MEDICINES, AND MODIFYING GOVERNMENT USE PROVISIONS FOR DRUGS AND MEDICINES, TO LOWER PRICES AND INCREASE ACCESS TO AND SUPPLY OF QUALITY DRUGS AND MEDICINES, AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NO. 8293, OTHERWISE KNOWN AS THE INTELLECTUAL PROPERTY CODE OF THE PHILIPPINES"
congress_website_abstract = "The bill aspires to: a) allow for parallel importation of drugs as a tool for price reduction, b) introduce the Bolar provision in the International Property Code which would accelerate the production of generics by allowing commercial research on the production of drugs whose patents are about to expire, c) prevent or minimize evergreening, and d) widen and enhance the power of the government to use patented products. (Cheaper Medicines)"
