congress_website_title = "AN ACT PROVIDING FOR COMPREHENSIVE HEALTH REFORM OF THE PHILIPPINES TO INCREASE AND MAKE EQUITABLE ACCESS TO HEALTH CARE SERVICES, CREATING A NATIONAL HEALTH POLICY COUNCIL, A NATIONAL HEALTH AND HOSPITALS CORPORATION AND A NATIONAL HEALTHCARE FINANCING POLICY CLUSTER, AMENDING THE INTELLECTUAL PROPERTY CODE (REPUBLIC ACT NO. 8293), AND OTHER RELEVANT LAWS, SUPPLEMENTING THE NATIONAL HEALTH INSURANCE ACT (REPUBLIC ACT NO. 7875), THE LOCAL GOVERNMENT CODE (REPUBLIC ACT NO. 7160) AND OTHER RELEVANT LAWS FOR THAT PURPOSE"
