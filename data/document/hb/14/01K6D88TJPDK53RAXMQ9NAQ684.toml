congress_website_title = "AN ACT ABOLISHING THE AGE REQUIREMENT FOR APPLICANTS TAKING THE BOARD EXAMINATION FOR SOCIAL WORKERS, PROVIDING FOR THE CONTINUING SOCIAL WORK EDUCATION AND UPGRADING THE SUNDRY PROVISIONS RELATIVE TO THE PRACTICE OF SOCIAL WORK, AMENDING FOR THE PURPOSE SECTIONS 12, 24 AND 26 OF THE REPUBLIC ACT 4373, OTHERWISE KNOWN AS SOCIAL WORKER'S LAW"
congress_website_abstract = "The bill aims to give young social graduates the opportunity to take the examination immediately upon graduation in order to make them economically and socially productive. It also seeks to continually capacitate social workers by requiring them to complete 20 units of Continuing Professional Education as a requirement to the renewal of their profession social worker's license."
