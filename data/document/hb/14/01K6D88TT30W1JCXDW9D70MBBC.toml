congress_website_title = "AN ACT REPEALING THE LAW ON ADULTERY AND CONCUBINAGE AND DEFINING IN LIEU THEREOF THE CRIME OF MARITAL INFIDELITY, AMENDING FOR THE PURPOSE ARTICLES 333, 334, AND 344 OF ACT NUMBERED THREE THOUSAND EIGHT-HUNDRED AND FIFTEEN, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "The bill seeks to correct the disparity in the treatment of a husband or a wife who committed the crimes of concubinage or adultery, respectively, with both crimes hereon to be known as “marital infidelity”."
