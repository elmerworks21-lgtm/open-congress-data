congress_website_coauthors_raw = ["CODILLA, EUFROCINO SR. M.","CARI, CARMEN L.","TIENG, WILLIAM ERWIN C.","ABAYON, DARYL GRACE J.","NOGRALES, PROSPERO C.","PINGOY, ARTHUR \"DODO\" JR. Y. M.D.","RODRIGUEZ, RUFUS B.","SANTIAGO, NARCISO III D.","MENDOZA, MARK LLANDRO L.","CHAVEZ, LEONILA V.","ESTRELLA, ROBERT RAYMUND M.","MADRONA, ELEANDRO JESUS F.","VALDEZ, EDGAR L.","PRIETO-TEODORO, MONICA LOUISE","JAVIER, EXEQUIEL B.","CUA, JUNIE E."]
congress_website_committee_codes = ["0504","0542","F501","0532"]
congress_website_primary_keys = [32120]
congress_website_title = "AN ACT ESTABLISHING AT LEAST ONE (1) SPECIAL EDUCATION (SPED) CENTERS FOR EACH SCHOOL DIVISION AND AT LEAST THREE (3) SPED CENTERS IN BIG SCHOOL DIVISIONS FOR CHILDREN WITH SPECIAL NEEDS (CSNs), CREATING THE IMPLEMENTING MACHINERY THEREOF, PROVIDING GUIDELINES FOR GOVERNMENT FINANCIAL ASSISTANCE AND OTHER INCENTIVES AND SUPPORT, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Special Education Act Of 2009.\\\" Seeks to provide access to basic education among children with specal needs (CSNs); ensure that CSNs fully develop their abilities, talents, interests and all aspect of their development to become more responsible for their lives and more effective partners in all the affairs of the state; inform and equip parents, caregivers and teachers with the capabilities to identify , prevent, refer and intervene with the disabilities of children and their developmental disorders; involve private groups, local government units and national agencies in the education of CSNs, and; effect positive changes in the community attitudes towards disability and the need to provide education, care and other needs to CSNs."
