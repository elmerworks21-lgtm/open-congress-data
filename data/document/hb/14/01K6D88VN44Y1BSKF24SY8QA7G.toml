congress_website_title = "AN ACT TO STRENGTHEN AND ENHANCE THE USE OF ENGLISH AS THE MEDIUM OF INSTRUCTION IN THE PHILIPPINE SCHOOLS"
congress_website_abstract = "Aims to correct the defects of the current Bilingual Education Program of the Department of Education (DepEd) with its ultimate objective of improving the learning process in schools to ensure quality outputs; aims to raise to a higher level the English language proficiency of Filipino students and graduates of our educational system in line with the demands of business and industries to be competitive in the business world; and, seeks to step up the level of English language proficiency or the ability to communicate in the world of economic enterprise as the key for Filipino graduates to get better jobs here and overseas considering that English is the language of research, engineering, science and technology and other areas which is an accepted practice in global business and employment."
