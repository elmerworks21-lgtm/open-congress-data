congress_website_title = "AN ACT PROHIBITING POLITICAL DYNASTIES"
congress_website_abstract = "The bill prohibits the following: a) election or appointment to any elective or appointive office if a family member or relative is holding such public office, and b) appointment or designation of an elective official to a public office in any capacity immediately after his tenure."

