congress_website_title = "AN ACT ESTABLISHING REFORMS IN THE RECOVERY OF SYSTEM LOSS CHARGES BY PRIVATE COMPANIES AND RURAL ELECTRIC COOPERATIVES UNDER REPUBLIC ACT NO. 7832 OTHERWISE KNOWN AS THE \\\"ANTI-ELECTRICITY AND ELECTRIC TRANSMISSION LINES/MATERIALS PILFERAGE ACT OF 1994\\\", AS AMENDED BY SECTION 43(F) OF REPUBLIC ACT NO. 9136 OR THE \\\"ELECTRIC POWER INDUSTRY REFORM ACT OF 2001\\\", AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Provides for a progressive reduction on the present system loss rate, to wit: a) for private electric utilities - 1% a year on the existing 9.5 % cap until it reaches 4.5%; and b) for rural electric cooperatives - 1% a year on the existing 14% cap until it reaches 7%."
