congress_website_title = "AN ACT GRANTING DISCOUNTS TO UNDERPRIVILEGED COLLEGE STUDENTS ON BASIC AND EDUCATION SERVICES"
congress_website_abstract = "“Underprivileged College Students Discount Act.” Aims to respond to the economic and educational realities by alleviating the burden of shouldering educational expenses placed on college students who belong to the underprivileged class and who are compelled to engage in part-time and full-time employment by granting them discounts in certain establishments and institutions."
