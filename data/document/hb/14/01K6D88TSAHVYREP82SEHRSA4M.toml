congress_website_title = "AN ACT IMPLEMENTING THE CONSTITUTIONAL RIGHT OF ACCESS TO INFORMATION, PRESCRIBING GUIDELINES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Freedom of Information Act\\\". The bill provides for absolute and mandatory access to matters of official information, public concern and public interest. It mandates all government bodies to provide the requested information within two (2) days from receipt of a written request."
