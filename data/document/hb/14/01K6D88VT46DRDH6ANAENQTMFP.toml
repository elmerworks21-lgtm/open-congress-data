congress_website_title = "AN ACT CONSTITUTING THE NATIONAL PROSECUTION SERVICE INTO AN AUTONOMOUS OFFICE OF THE PROSECUTOR GENERAL AND FOR OTHER PURPOSES"
congress_website_abstract = "“Prosecution Service Autonomy Act of 2009.\\\" Democracy will not fully blossom unless the rule of law is put in place. To ensure rule of law, it is essential that the Prosecution Service is backed up by the trust of the people. This bill seeks to do so by strengthening the independence of the National Prosecution Services - free from interference of politicians, high-ranking government officials and businessmen. It aims to strengthen public trust toward the Prosecution Service and, in the process, help advance democracy in the Philippines."
