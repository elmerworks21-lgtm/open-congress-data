congress_website_title = "AN ACT GRANTING SPECIAL PRIVILEGES AND INCENTIVES FOR TEACHERS IN PRIVATE AND PUBLIC SCHOOLS, PROVIDING FUNDS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to grant elementary and high school teachers the following incentives, among others: a) 20% discount from service establishments and in the purchase of medicines; b) 20% discount on admission fees charged by theaters, cinemas, etc.; c) exemption from the payment of individual income tax; d) exemption from training fees; e) free medical and dental service in government medical facilities; and f) 20% discount on medical and dental services in private hospitals."
