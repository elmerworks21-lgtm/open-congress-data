congress_website_title = "AN ACT AMENDING SECTION 4 (PARAGRAPH 40) AND PROVIDING ADDITIONAL SECTION ON MUNICIPAL FISHERIES, CHAPTER 2, ARTICLE I OF R.A. 8550, ENTITLED, 'AN ACT PROVIDING FOR THE DEVELOPMENT, MANAGEMENT AND CONSERVATION OF THE FISHERIES AND AQUATIC RESOURCES, INTEGRATING ALL LAWS PERTINENT THERETO, AND FOR OTHER PURPOSES'"
congress_website_abstract = "The bill seeks to redefine fishing gears into \\\"allowed\\\" and \\\"not allowed\\\" to capture not only the use of the gear but also how it is handled and its depletive effects to our aquatic resources. The modification of the definition of gears also gives local government units reasonable discretion in the formulation of regulations to determine which gears are allowed or not."
