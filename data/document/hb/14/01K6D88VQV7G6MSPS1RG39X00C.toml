congress_website_title = "AN ACT PROHIBITING THE GIVING OF GIFTS OFFERED BY PRESCRIPTION DRUG MANUFACTURERS AND DISTRIBUTORS TO ENCOURAGE PRACTITIONERS TO PRESCRIBE CERTAIN DRUGS AND PROVIDING A PENALTY"
congress_website_abstract = "\\\"Medical Gift Giving Ban Act of 2009.\\\" Seeks to prevent the pharmaceutical industry and health product manufacturers from having too much influence over doctors and medical practitioners by prohibiting the former from giving, or offering to give, anything of monetary value to encourage the latter to issue prescriptions for the manufacturers' drugs."

