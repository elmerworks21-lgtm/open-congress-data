congress_website_title = "AN ACT PROHIBITING THE RECORDING, BROADCASTING, AIRING AND/OR PUBLICATION OF A CONFESSION OR ADMISSION BY A PERSON ACCUSED OF A CRIME WITHOUT AN EXPRESSED WAIVER IN THE PRESENCE OF COUNSEL, PROVIDING PENALTIES THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill prohibits a person from recording by means of video, compact disc, tape and other devices any confession and/or admission to a commission of a crime by a person arrested or under investigation, detention or custodial interrogation for the same crime unless such person waives or consents to the recording in writing in the presence of his counsel."
