congress_website_title = "AN ACT GRANTING RETIREMENT INCENTIVE AND HEALTH CARE BENEFITS TO PROFESSIONAL FILIPINO ATHLETES WHO HAVE WON WORLD TITLES OR WORLD CHAMPIONSHIPS AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "\\\"Filipino Professional Athletes Retirement Incentive and Health Care Benefits Act of 2007\\\". The bill seeks to grant a monthly pension of P15,000 to former world champions upon reaching the age of fifty. Likewise, it grants members of a world champion team a monthly lifetime retirement incentive of P10,000 upon reaching the age of fifty."
