congress_website_abstract = "“Marine and Coastal Resources Protection Act of 2009.” Establishes at least one (1) marine protected area (MPA) in every coastal municipality in the country. The MPA shall be used to conserve biodiversity, manage natural resources, protect endangered species, reduce user conflicts, provide educational and research opportunities and enhance recreational fisheries."
