congress_website_title = "AN ACT REQUIRING THE MANDATORY LABELING OF FOOD AND FOOD PRODUCTS CONTAINING GENETICALLY-MODIFIED ORGANISMS AND FOOD PRODUCED BY GENETIC ENGINEERING TECHNOLOGIES, AMENDING FOR THAT PURPOSE REPUBLIC ACT NUMBERED THREE THOUSAND SEVEN HUNDRED AND TWENTY, OTHERWISE KNOWN AS THE FOOD, DRUGS AND DRUG DEVICES AND COSMETICS ACT, AND REPUBLIC ACT NUMBERED SEVEN THOUSAND THREE HUNDRED AND NINETY-FOUR, OTHERWISE KNOWN AS THE CONSUMERS' ACT OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Genetically Engineered Food Right to Know Act\\\". The bill mandates all food and food products containing genetically-modified organisms to carry in the label of their packaging the following notice \\\"GENETICALLY ENGINEERED\\\" and \\\"GOVERNMENT NOTICE: THIS PRODUCT CONTAINS A GENETICALLY ENGINEERED MATERIAL, or WAS PRODUCED WITH A GENETICALLY ENGINEERED MATERIAL\\\"."

