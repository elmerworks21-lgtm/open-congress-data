congress_website_title = "AN ACT FURTHER STRENGTHENING THE ANTI-SMUGGLING MECHANISM, AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF PRESIDENTIAL DECREE NO. 1464, OTHERWISE KNWON AS THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to protect government revenue derived from importations by infusing the Tariff and Customs Code of the Philippines, as amended, with certain provisions that will plug perceived loopholes and weaknesses in the Code which abet the commission of technical and outright smuggling; protect the domestic industries against unfair competition brough about by fraudulently imported articles which are generally and usually priced below the domestic market values of the comparative locally manufactured goods, and; upgrade manifold the penal provisions in the Code which have not been updated and amended since 1957 and are therefore already impotent in deterring the commission of smuggling."
