congress_website_title = "AN ACT FURTHER STRENGTHENING THE PAG-IBIG FUND AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Pag-IBIG Fund Law of 2007\\\". The bill shall rename the Home Development Mutual Fund into the Pag-IBIG which shall be the primary government financial institution charged with mobilizing provident funds for shelter finance. It calls for the mandatory membership to the Pag-IBIG Fund of all employees covered by the GSIS and the SSS."
