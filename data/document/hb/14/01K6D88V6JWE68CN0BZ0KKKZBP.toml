congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6713, ALSO KNOWN AS AN ACT ESTABLISHING A CODE OF CONDUCT AND ETHICAL STANDARDS FOR PUBLIC OFFICIALS AND EMPLOYEES, TO UPHOLD THE TIME-HONORED PRINCIPLE OF PUBLIC OFFICE BEING A PUBLIC TRUST, GRANTING INCENTIVES AND REWARDS FOR EXEMPLARY SERVICE, ENUMERATING PROHIBITED ACTS AND TRANSACTIONS, PROVIDING PENALTIES FOR VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "The measure proposes to remove from public office any public official who places any of his/her assets in the name of dummies. It also prohibit public officials from acquiring any property from a relative within the tenth civil degree of consanguinity or affinity while holding public office and within twenty (20) years from the time he/she left the civil service."
