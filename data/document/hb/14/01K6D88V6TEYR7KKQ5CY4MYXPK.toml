congress_website_title = "AN ACT ALLOCATING TO THE AFP TRUST FUND THE COLLECTION FROM CAPITAL GAINS TAX AND VALUE-ADDED TAX ON THE SALE OF REAL PROPERTY AND THE SHARE OF THE NATIONAL GOVERNMENT ON ALL TAXES, ROYALTIES AND CHARGES COLLECTED FROM THE MALAMPAYA NATURAL GAS PROJECT"
congress_website_abstract = "The measure seeks to transfer to the AFP Modernization Act Trust Fund the following: a) the share of the national government in the taxes, royalties and charges collected from the Malampaya Natural Gas PRoject Modernization Act; and b) other applicable mining taxes, royalties and other taxes, fees or charges including surcharges, interests and liens authorized by existing laws."
