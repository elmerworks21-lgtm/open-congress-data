congress_website_title = "AN ACT ESTABLISHING THE NATIONAL GERIATRIC HEALTH CENTRE OF THE PHILIPPINES"
congress_website_abstract = "“Dona Eva Macaraeg-Macapagal National Geriatric Health Centre Act.” Seeks to create a hospital known as National Geriatric Health Center which will focus on the medical needs of senior citizens so that they will have the comfort and assurance that the government is truly concerned for their well-being. The hospital will be having the nature of a corporate body, which render the medical institution more viable and more responsive to the varied demands of patients, whose benefits and facilities are open not only to Manilans but to all Filipinos through the land."
