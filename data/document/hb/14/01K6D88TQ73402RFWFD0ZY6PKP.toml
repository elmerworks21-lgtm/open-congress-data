congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED SEVENTY-EIGHT THIRTY-TWO, AS AMENDED, OTHERWISE KNOWN AS THE \\\"ANTI-ELECTRICITY AND ELECTRIC TRANSMISSION LINES/MATERIALS PILFERAGE ACT OF 1994"
congress_website_abstract = "The bill grants a monetary incentive equivalent to 20% of the value of the recovered stolen electric power transmission and distribution lines or materials to any person who reports the pilferage or theft to the TRANSCO, private electric utility, rural electric cooperative or police authorities. It imposes a penalty of reclusion temporal or a fine ranging from P100,000 to P500,000 or both to any person found guilty of theft of said lines and materials."
