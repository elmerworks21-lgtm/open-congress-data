congress_website_title = "AN ACT AMENDING EXECUTIVE ORDER NO. 209 OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "The measure provides that the following marriages shall be void ab initio: a) thoise contracted by any party below 18 years of age even with the consent of parents; b) those solemnized by any person not legally authorized to perform marriages; c) those solemnized without a without a license; d) those bigamous or polygamous marriage not falling under Article 41 of EO 209; and e) those contracted through mistake of one contracting party as to the identity of the other."
