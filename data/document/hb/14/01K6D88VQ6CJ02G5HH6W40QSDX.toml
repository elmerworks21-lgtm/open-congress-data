congress_website_title = "AN ACT PROVIDING FOR THE REAPPORTIONMENT OF THE LEGISLATIVE DISTRICTS THROUGHOUT THE COUNTRY"
congress_website_abstract = "“Legislative Districts Reapportionment Act.” Increases the number of members of the House of Representatives to not more than three hundred fifty (350) who shall be elected from legislative districts apportioned among provinces, cities, and the Metropolitan Manila area, in accordance with the number of their respective inhabitants and on the basis of a uniform and progressive ratio, and those who, as provided by law, shall be elected through a party-list system of registered national, regional, and sectoral parties or organizations."

