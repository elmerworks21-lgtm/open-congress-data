congress_website_title = "AN ACT REGULATING THE PRACTICE OF REAL ESTATE SERVICE IN THE PHILIPPINES, CREATING FOR THE PURPOSE A PROFESSIONAL REGULATORY BOARD OF REAL ESTATE SERVICE, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill aims to professionalizing the real estate service practice by transferring the regulatory function from the Department of Trade and Industry to the Professional Regulatory Commission to be exercised by the Professional Real Estate Service Board. The board shall be responsible for the examination, registration, licensing, discipline and continuing education of real estate practitioners."
