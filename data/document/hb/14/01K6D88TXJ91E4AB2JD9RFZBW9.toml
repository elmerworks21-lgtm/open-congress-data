congress_website_title = "AN ACT MAKING R.A. 7323 MORE EFFECTIVE AND RELEVANT TO PRESENT AND FUTURE CONDITIONS BY EXPANDING ITS COVERAGE IN TERMS OF EMPLOYER PARTICIPATION, ADJUSTING THE INCOME CLASSIFICATION REQUIREMENT THEREIN PROVIDING AUTOMATIC AND NON-DIMINUTION CLAUSES ON ITS BUDGETARY ALLOCATION AND PROVIDING PENALTIES FOR THOSE WHO DISHONOR THE EDUCATION VOUCHERS, AMENDING FOR THE PURPOSES R.A. 7323 ENTITLED \\\"AN ACT TO HELP POOR BUT DESERVING STUDENTS PURSUE THEIR EDUCATION BY ENCOURAGING THEIR EMPLOYMENT DURING SUMMER AND/OR CHRISTMAS VACATIONS, THROUGH INCENTIVES GRANTED TO EMPLOYERS, ALLOWING THEM TO PAY ONLY SIXTY PER CENTUM OF THEIR SALARIES OR WAGES AND THE FORTY PER CENTUM THROUGH EDUCATION VOUCHERS TO BE PAID BY THE GOVERNMENT PROHIBITING AND PENALIZING THE FILING FRAUDULENT OR FICTITIOUS CLAIMS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to make the Special Program for Employment of Students (SPES) more responsive to the needs of poor but deserving students by lowering the number of existing employee requirement to twenty (20) for private sector participants and by deleting the fixed income amount of P36,000 as income threshold."
