congress_website_title = "AN ACT TO PREVENT CREDIT CARD ISSUERS FROM TAKING UNFAIR ADVANTAGE OF COLLEGE STUDENTS AND THEIR PARENTS AND FOR OTHER PURPOSES"
congress_website_abstract = "“Student Credit Card Protection Act.” Prohibits creditors to increase the amount of credit authorized to be extended under a college student credit card account for which a parent, legal guardian, or spouse of the consumer has assumed joint liability for debts incurred by the consumer, in connection with the account, before the consumer attains the age of twenty-one (21), with respect to such consumer, unless the parent, guardian, or spouse of the consumer, as applicable, approved in writing, and assumes joint liability for such increase."

