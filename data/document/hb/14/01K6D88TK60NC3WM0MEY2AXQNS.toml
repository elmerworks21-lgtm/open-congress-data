congress_website_title = "AN ACT CREATING NATIONAL HEALTH RESEARCH INSTITUTES APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"National Health Research Institute Act of 2007\\\". The measure creates the National Health Research Institute that shall be responsible for the following, among others: a) encourage research and development on indigenous health care systems; b) promote research and development of drugs from indigenous and non-indigenous sources; and c) encourage basic and clinical research on diseases peculiar to our country and ecology."

