congress_website_title = "AN ACT PROVIDING FOR THE REHABILITATION OR LIQUIDATION OF FINANCIALLY DISTRESSED ENTERPRISES AND INDIVIDUALS"
congress_website_abstract = "\\\"Financial Rehabilitation And Insolvency Act (FRIA) Of 2009.\\\" Seeks to restore the Debtor to a condition of successful operation and solvency, if it is shown that its continuance of operation is economically feasible; provide a clear framework for the insolvency proceedings for companies who are undergoing financial restructuring or rehabilitation or those unable to pay its liabilities or has liabilities greater than its assets, and; provide equitable treatment to all parties involved in a financial restructuring or rehabilitation."
