congress_website_title = "AN ACT TO IMPROVE THE ADMINISTRATION OF JUSTICE BY DECRIMINALIZING AND PROVIDING FOR THE IMPOSITION OF ALTERNATIVE PENALTIES SHORT OF DEPRIVATION OF LIBERTY FOR CERTAIN OFFENSES"
congress_website_abstract = "The bill seeks to decriminalize and provide for the imposition of alternative penalties for the following offenses: a) simple disobedience to an agent of a person in authority; b) alarms and scandals; c) vagrancy; d) refusal of assistance; e) refusal to discharge elective office; f) premature marriages; and g) other similar offenses."
