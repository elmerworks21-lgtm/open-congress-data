congress_website_title = "AN ACT ESTABLISHING A REWARDS PROGRAM FOR INFORMATION ON POLITICAL KILLINGS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "“Rewards for Information On Political Killings Act.” Seeks to provide a reward system for persons who provide information leading to the arrest or prosecution of those involved in political killings. This can help facilitate enforcement of proper laws in the country. The rewards system proposed by this bill can strongly urge witnesses or persons with knowledge of the crime to come forward and cooperate with appropriate authorities in solving political killings in the country."
