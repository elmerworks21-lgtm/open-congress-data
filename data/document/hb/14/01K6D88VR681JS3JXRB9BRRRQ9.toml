congress_website_title = "AN ACT TO DIRECT THE SECRETARY OF TRANSPORTATION AND COMMUNICATION TO STUDY AND ESTABLISH A MOTOR VEHICLE SAFETY STANDARD THAT PROVIDES FOR MEANS OF ALERTING BLIND AND OTHER PEDESTRIANS OF MOTOR VEHICLE OPERATION"
congress_website_abstract = "\\\"Pedestrian Safety Enhancement Act of 2009.\\\" Seeks to direct the Secretary of the Department of Transportation and Communication (DOTC) to promulgate a motor vehicle safety standard and establish a method for alerting blind and other pedestrians of the presence and operation of nearby motor vehicles to enable such pedestrians to travel safely and independently in urban, rural and residential environments."

