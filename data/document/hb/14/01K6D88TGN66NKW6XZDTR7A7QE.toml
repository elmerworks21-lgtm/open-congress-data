congress_website_title = "AN ACT AMENDING ARTICLES 83, 87, 100, 128, AND 131 OF PRESIDENTIAL DECREE 442, OR THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "The bill proposes the following amendments to the Labor Code: a) allow compressed workweek/flextime arrangements, b) revise the doctrine against elimination/diminution of benefits under certain conditions, c) restructure the visitorial and enforcement power of the Labor Secretary to allow for self-regulation, and d) excempt from the night work prohibition on women establishments operating on a 24-hour schedule."
