congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE TAX ACADEMY, DEFINING ITS POWERS AND FUNCTIONS"
congress_website_abstract = "\\\"Philippine Tax Academy Act.\\\" Seeks to improve tax collection efficiency by improving the front line resources of the government, tax collectors and administratorswith requisite of knowledge, training skills and expertise, including moral fitness and work ethics, in the performance of their duties by constinuous updating the public on the lastest tax laws, regulation and guidelines to improve compliance and observance therewith, and; provide long-term solution to the much needed enhancement of tax collection efficiency, reduce bureaucratic red tape, streamline processes and revive enthusiasm among career civil servants."
