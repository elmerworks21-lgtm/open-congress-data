congress_website_title = "AN ACT PROVIDING FOR A MORE RESPONSIVE AND COMPREHENSIVE REGULATION FOR THE PRACTICE, LICENSING, AND REGISTRATION OF ENVIRONMENTAL AND SANITARY ENGINEERS IN THE PHILIPPINES AMENDING FOR THE PURPOSE OF REPUBLIC ACT NO. 1364, AND OTHER PURPOSES"
congress_website_abstract = "\\\"Revised Environmental and Sanitary Engineering Act of 2007\\\". The measure seeks to update the scope of Environment and Sanitary Engineering in order to make the profession globally competitive. It creates the Board of Examiners for Environmental and Sanitary Engineers that shall issue certificates of registration. It also provides for the powers and duties of the Board and the qualification of its members. It further provides for the requirements and qualifications of applicants who wish to obtain a license."

