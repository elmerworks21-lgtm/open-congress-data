congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE AIR FORCE ACADEMY (PAFA) AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The bill provides for the establishment of the Philippine Air Force Academy (PAFA) in the Philippine Air Force. The PAFA shall provide PAF cadets with instruction and prepare them for military service. The PAFA shall also absorb the present PAF Flying School, PAF Officer Candidate School and the PAF Technical School."

