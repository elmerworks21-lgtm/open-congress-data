congress_website_title = "AN ACT ORDAINING INSTITUTIONAL RESPONSIBILITY IN GIVING TESTIMONY IN CRIMINAL CASES AND PROVIDING PENALTIES FOR VIOLATIONS"
congress_website_abstract = "Penalizes any law enforcement officer or public employee working for a law enforcement or related agency, who, after due notice, fails or refuses, intentionally or negligently, to appear either as a prosecution or defense witness in any criminal proceedings, without any valid reason. Further punishes the head of office or agency for failure to exert effort to present his subordinate."

