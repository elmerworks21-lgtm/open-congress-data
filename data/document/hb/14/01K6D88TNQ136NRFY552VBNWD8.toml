congress_website_title = "AN ACT STRENGTHENING FURTHER THE COMPREHENSIVE AGRARIAN REFORM PROGRAM (CARP) BY PROVIDING ADDITIONAL FUNDING AND AMENDING FOR THIS PURPOSE SECTIONS 63, AND 37 OF REPUBLIC ACT NO. 6657, OTHERWISE KNOWN AS 'THE CARP LAW OF 1988' AS AMENDED BY REPUBLIC ACT 7905 AND REPUBLIC ACT 8532, THEREBY DIRECTING THE CONDUCT OF POST PROCESSES FOR A MORE EFFICIENT CARP IMPLEMENTATION AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The bill requires all financing institutions to accept as collateral for loans any duly registered emancipation patent (EP) or certificate of land ownership award (CLOA) provided that the loans obtained shall be used in the improvement or development of the farmholding of the farmer-beneficiary or the establishment of facilities that will enhance production or marketing or agricultural products or increase farm income."
