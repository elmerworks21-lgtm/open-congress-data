congress_website_title = "AN ACT PROMOTING CORPORATE FARMING AND PROVIDING INCENTIVES THEREOF"
congress_website_abstract = "Seeks to attain food security by re-evaluating and redefining the government's short-term and long-term priorities and resources aimed at improving rice productivity; encourage the private sector to engage in agricultural production by adopting a “corporate farming” scheme, with rice/corn as the primary crop, to feed their own employees, thus, taking the lead role in promoting food security, and; help eliminate the chain of middlemen and bring the producers and processors face-to-face, leading to better product distribution, stimulating higher private in agriculture, and resulting in higher outputs, income and exports."
