congress_website_title = "AN ACT ADJUSTING THE REQUIREMENTS ON EDUCATION AND FOR PROMOTION IN THE PHILIPPINE NATIONAL POLICE AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8551, OTHERWISE KNOWN AS THE \\\"PHILIPPINE NATIONAL POLICE REFORM AND REORGANIZATION ACT OF 1998\\\", AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to lift the baccalaureate degree requirement for police members who are already in the service upon the enactment of RA 8551. It also provides that the pendency of any criminal and/or administrative case shall not be a bar for the promotion of a uniformed PNP member."
