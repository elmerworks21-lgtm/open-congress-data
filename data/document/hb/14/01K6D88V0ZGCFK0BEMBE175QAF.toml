congress_website_title = "AN ACT GRANTING ADDITIONAL RETIREMENT BENEFITS TO MEMBERS OF THE JUDICIARY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 910, OTHERWISE KNOWN AS \\\"AN ACT TO PROVIDE FOR THE RETIREMENT OF JUSTICES OF THE SUPREME COURT AND OF THE COURT OF APPEALS, FOR THE ENFORCEMENT OF THE PROVISIONS HEREOF BY THE GOVERNMENT SERVICE INSURANCE SYSTEM,\\\" AND TO REPEAL COMMONWEALTH ACT NO. 536, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "The measure reduces the required length of government service for members of the judiciary from 20 years to 15 years to be entitled to retirement pension. It also incorporates the transportation, living and representation allowances in said pension."
