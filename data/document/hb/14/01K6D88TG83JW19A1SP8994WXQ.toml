congress_website_title = "AN ACT INCREASING THE PENALTY IMPOSED AGAINST POLLUTERS OF NAVIGABLE WATERS BY AMENDING SECTION 7 OF PRESIDENTIAL DECREE NO. 979 PROVIDING FOR THE REVISION OF PRESIDENTIAL DECREE NO. 600 GOVERNING MARINE POLLUTION"
congress_website_abstract = "It is imperative that stiff civil and criminal penalties be imposed against polluters of our marine environment since we are dependent on the sea and other bodies of water for our transportation, livelihood and other related activities. The bill seeks to increase the penalties being imposed under the present law on polluters to a fine of not less that five million pesos (PhP 5.0) or imprisonment of not less than 8 years and 1 day nor more than 12 years or both such fine and imprisonment."
