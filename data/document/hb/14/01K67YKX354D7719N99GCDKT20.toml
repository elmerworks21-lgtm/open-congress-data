congress_website_title = "AN ACT GIVING OFFENDERS THE FULLEST BENEFIT OF PREVENTIVE IMPRISONMENT, AMENDING FOR THE PURPOSE ARTICLE 29 OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "Seeks to correct the iniquitous application of the law where a person convicted of a bailable offense or is convicted of a bailable offense cannot afford bail, undergoes preventive imprisonment. Once entitled to preventive imrisonment, the prisoner concerned must voluntarily agree in writing that he will abide by the same disciplinary rules imposed upon convicted prisoners, otherwise, if no such written agreement is made, he will only be entitled to four-fifths (4/5) of the period of detention."
