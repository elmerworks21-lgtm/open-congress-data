congress_website_title = "ISANG BATAS NA NAGSUSUSOG SA SEK. 4 NG BATAS REPUBLIKA 8049 PARA IPAGBAWAL ANG MGA FRATERNITY, SORORITY AT KATULAD NA ORGANISASYONG NAGSASAGAWA NG HAZING (AN ACT AMENDING SEC. 4 OF REPUBLIC ACT NO. 8049 SO AS TO BAN FRATERNITIES, SORORITIES AND SIMILAR ORGANIZATIONS WHICH HAVE BEEN ENGAGED IN HAZING)"
congress_website_abstract = "Ang panukalang batas na ito ay nagmumungkahing pagbawalan sa mga eskuwelahan, kolehiyo at universidad ang mga fraternity at sorority na gumagawa ng hazing o karahasan sa panahon ng initiation rites. Bukod dito, ang mga kasapi sa mga ibinawal na fraternity/sorority ay mapapatawan ng administratibong pataw tulad ng suspension o expulsion sa eskuwelahan, kolehiyo o universidad. (The bill aims to ban from schools, colleges and universities fraternities and sororities that engage in hazing or violence during initiation rites. Furthermore, it proposes to subject the members of the banned fraternity/sorority to administrative sanctions such as suspension or expulsion from the school, college or university.)"

