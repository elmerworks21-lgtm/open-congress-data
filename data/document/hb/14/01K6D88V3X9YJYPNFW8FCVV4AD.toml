congress_website_title = "AN ACT TO ASSURE MEANINGFUL DISCLOSURES OF THE TERMS OF RENTAL PURCHASE AGREEMENTS, INCLUDING DISCLOSURES OF ALL COSTS TO CONSUMERS UNDER SUCH AGREEMENTS AND TO PROVIDE CERTAIN SUBSTANTIVE RIGHTS TO CONSUMERS UNDER SUCH AGREEMENTS"
congress_website_abstract = "The bill requires merchants to disclose to consumers the following terms and conditions of rental purchase agreements, among others: a) the amount of downpayment including fees, taxes and other charges; b) amount and timing of rental payments; and c) number and amount of rental payments necessary to acquire ownership of the property."
