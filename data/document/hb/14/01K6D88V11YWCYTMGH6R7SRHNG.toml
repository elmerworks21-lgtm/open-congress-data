congress_website_title = "AN ACT ESTABLISHING AN EDUCATION TRUST FUND FOR GRANTEES OF GSIS AND SSS MEMBERS AND FOR OTHER PURPOSES"
congress_website_abstract = "The measure seeks the creation of the Education Trust Fund to ensure the accessibility and affordability of education to all citizens particularly the underprivileged. It extends to the grantees of the members of the Government Service Insurance System (GSIS) and the Social Services System (SSS) equal opportunity to quality education."

