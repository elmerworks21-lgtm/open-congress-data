congress_website_title = "AN ACT TO STRENGTHENING FURTHER AND BROADENING THE COVERAGE OF THE SPECIAL PROGRAM FOR EMPLOYMENT OF STUDENTS (SPES), AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NO. 7323"
congress_website_abstract = "The bill seeks to upgrade the provisions RA 7323 (Poor But Deserving Students Employment Act) by: a. pegging the salary rate of trainees on the minimum wage for private employees and the applicable hiring rate for national and local government agencies; and b. indexing the income qualifications for the Special Program for Employment of Students to the annual national poverty threshold line for a family of six to insulate it from legislative amendments every time there is a shift in the poverty line."
