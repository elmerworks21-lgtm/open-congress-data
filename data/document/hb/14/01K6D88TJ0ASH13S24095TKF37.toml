congress_website_title = "AN ACT CREATING THE GLOBAL WARMING COMMISSION, PRESCRIBING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"Philippine Global Warming Commission Act of 2007. The bill seeks the creation of the Global Warming Commission that shall be responsible for the following, among others: a) ensure that the Clean Air Act is properly being implemented; b) recommend possible legislation, policies and programs on global warming or climate change; and c) represent the government in all international and regional meetings on global warming."
