congress_website_title = "AN ACT AUTHORIZING FARMER-BENEFICIARIES TO MORTGAGE THE RIGHT TO A FARM LAND AWARDED TO HIM THROUGH THE CERTIFICATE OF LAND OWNERSHIP, BY VIRTUE OF THE COMPREHENSIVE AGRARIAN REFORM PROGRAM SHALL BE ACCEPTED BY BANKS AND OTHER FINANCIAL INSTITUTIONS AS COLLATERAL FOR LOANS, AMENDING FOR THE PURPOSE SECTIONS 27 AND 21 OF REPUBLIC ACT NO. 6675, OTHERWISE KNOWN AS THE COMPREHENSIVE AGRARIAN REFORM LAW OF 1998"
congress_website_abstract = "The bill allows farmer-beneficiaries to use awarded land as collateral for both short-term and long-term production and other types of loans for the acquisition of farm equipment and machineries, seeds, fertilizers and other similar items."
