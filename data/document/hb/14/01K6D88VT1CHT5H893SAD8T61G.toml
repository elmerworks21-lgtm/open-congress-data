congress_website_title = "AN ACT ESTABLISHING AN ADVISORY COMMITTEE WITHIN THE DEPARTMENT OF HEALTH TO STUDY ISSUES RELATED TO AUTISM, AND INFANT AND TODDLER IMMUNE SYSTEM DISORDERS"
congress_website_abstract = "Seeks to create an advisory panel on Autism and Immune Deficiency Disorders in Infants and Toddlers within the Department of Health. Through this panel, the causes of Autism and other disorders that becomes manifested during childhood will be identified thus preventive measures will be institutionalized. The knowledge that will be gained through this comprehensive approach will benefit not only our country but also worldwide scientific community as well."
