congress_website_title = "AN ACT AMENDING ARTICLE 26 OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES, AS AMENDED, GRANTING A FILIPINO CITIZEN THE RIGHT TO REMARRY AFTER HIS/HER ALIEN SPOUSE VALIDLY OBTAINS A DIVORCE ABROAD"
