congress_website_title = "AN ACT ADOPTING THE SIMPLIFIED NET INCOME TAXATION SCHEME FOR AN INDIVIDUAL ENGAGED IN TRADE/BUSINESS AND/OR PRACTICE OF PROFESSION, AMENDING FOR THE PURPOSE THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
