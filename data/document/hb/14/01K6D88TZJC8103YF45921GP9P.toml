congress_website_title = "AN ACT STRENGTHENING THE RIGHT OF THE PEOPLE TO FREE EXPRESSION, PEACEABLY ASSEMBLE AND PETITION THE GOVERNMENT FOR REDRESS OF GRIEVANCES, REPEALING BATAS PAMBANSA BILANG 880 AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill provides for the following: a) no permit requirement for the holding of a public assembly; b) non-interference from law enforcement authorities during public assemblies; c) extension of police assistance when requested; d) no dispersal of public assembly; and e) immunity from arrest and taxation."

