congress_website_title = "AN ACT PROVIDING FOR THE SPLITTING OF THE DEPARTMENT OF TRANSPORTATION AND COMMUNICATION THEREBY CREATING THE DEPARTMENT OF COMMUNICATION AND INFORMATION TECHNOLOGY, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
