congress_website_title = "AN ACT ESTABLISHING A FARM MACHINERIES MANUFACTURING PROGRAMS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"Farm Machineries Manufacturing Program (FMMP) Act of 2004\\\". This bill provides for the establishment of a comprehensive program that shall introduce mechanized farming to boast production. It encourages local manufacturers to enter into a joint venture with foreign companies that shall assist and train them with the end in view of enabling them to maximize the utilization of local materials in the products."

