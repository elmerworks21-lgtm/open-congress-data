congress_website_title = "AN ACT TO ENSURE THE ACCOUNTABILITY OF GOVERNMENT-OWNED OR CONTROLLED CORPORATIONS, GOVERNMENT FINANCIAL INSTITUTIONS, STATE-OWNED UNIVERSITIES, AND OTHER SIMILAR AGENCIES IN THE PUBLIC SECTOR BY REQUIRING THESE ENTITIES TO BE EVALUATED AND SUBJECTED TO THE TEST OF ECONOMIC AND FINANCIAL VIABILITY, CREATING A CONGRESSIONAL OVERSIGHT COMMITTEE THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Government-Owned or Controlled Corporations (GOCCs) Accountability Act of 2007\\\". The bill calls for the creation of a Congressional Oversight Committee that shall review, monitor and evaluate the overall performance of GOCCs to ascertain whether they are fulfillling their mandates under their respective charters and are economically and financially viable."
