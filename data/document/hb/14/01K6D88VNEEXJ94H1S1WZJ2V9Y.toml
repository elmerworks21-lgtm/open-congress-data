congress_website_title = "AN ACT PROVIDING FOR A MANDATORY PERIOD TO RELOCATE SQUATTERS, GRANTING DISTURBANCE FEES TO OWNERS OF ILLEGALLY OCCUPIED RESIDENTIAL LAND, AND PENALIZING VIOLATIONS THEREOF"
congress_website_abstract = "“Landowners Protection Act of 2008.” This bill seeks to provide equal protection to the squatters and to the landowners by providing a mandatory period in the relocation of squatters and compensating the landowners in case of failure of the local government unit concerned to act on the request for assistance to evict illegal occupants within the prescribed period thus giving full meaning to the noble objectives of RA 7279. It also further seeks to minimize, if not totally eliminate squatting because local government units will be compelled to monitor vacant lands to prevent trespassers from constructing illegal structures within their respective localities."

