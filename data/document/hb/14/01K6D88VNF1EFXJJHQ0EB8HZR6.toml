congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF DRUG REHABILITATION CENTER IN EVERY REGION OF THE COUNTRY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This measure seeks to establish a drug rehabilitation center in every region in the country which will provide medical and psychiatric treatment to drug dependents, under the supervision of the Department of Health, thus providing these drug dependents an opportunity to become useful and productive members of the community again. Prescribes the functions and organizational structure of the center."

