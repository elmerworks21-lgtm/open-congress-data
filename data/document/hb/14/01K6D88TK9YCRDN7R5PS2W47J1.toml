congress_website_title = "AN ACT ESTABLISHING AND MAINTAINING LACTATION STATIONS IN WORKPLACES AND OTHER PURPOSES"
congress_website_abstract = "\\\"Workplace Lactation Station Act of 2007\\\". The bill mandates the establishment of lactation stations in workplaces for nursing female employees. The lactation station must include a lavatory for hand washing, adequate refrigeration equipment for storing milk and comfortable chairs. It grants nursing mothers an additional 30 minutes work break within the eight-hour work period for milk expression."
