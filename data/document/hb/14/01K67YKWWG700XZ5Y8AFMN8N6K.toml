congress_website_title = "AN ACT STRENGTHENING THE PHILIPPINE PUBLIC SAFETY COLLEGE SYSTEM AS THE PREMIER EDUCATIONAL INSTITUTION FOR TRAINING, HUMAN RESOURCES DEVELOPMENT AND CONTINUING EDUCATION OF ALL POLICE, FIRE AND JAIL PERSONNEL, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "“Philippine Public Safety College System Act of 2009.” Mandates the Philippine Public Safety College System (PPSCS) to serve as the premier educational institution for degree and non-degree programs, including training, human resource development and continuing education of all personnel of the Philippine National Police (PNP), Bureau of Jail Management and Penology (BJMP) and the Bureau of Fire Protection (BFP), as well as the personnel of the College System and other related government agencies and organizations."
