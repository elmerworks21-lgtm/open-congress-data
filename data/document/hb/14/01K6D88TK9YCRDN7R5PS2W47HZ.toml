congress_website_title = "AN ACT TRANSFERRING THE PHILIPPINE COAST GUARD TO THE DEPARTMENT OF TRANSPORTATION AND COMMUNICATIONS AS A SEPARATE AND DISTINCT ARMED UNIFORMED COMMISSIONED SERVICE, FURTHER AMENDING REPUBLIC ACT NO. 5173, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Philippine Coast Guard Law of 2007\\\". The bill transforms the Philippine Coast Guard (PCG) into a new and distinct branch of service under the Department of Transportation and Communications. The PCG shall be tasked, among others, to enforce laws, promulgate and administer regulations for the promotion of safety of life and property at sea and the protection of all users of the sea within the jurisdiction of the Philippines."
