congress_website_title = "AN ACT FURTHER AMENDING PRESIDENTIAL DECREE NO. 1638,AS AMENDED BY PRESIDENTIAL DECREE NO. 1650, ESTABLISHING A NEW SYSTEM OF RETIREMENT AND SEPARATION FOR MILITARY PERSONNEL OF THE ARMED FORCES OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "Grants the surviving heirs of an officer or enlisted man a monthly annuity equivalent to 50% of his base and longevity pay based on his separation grade OR 75% OF THE RETIREMENT PAY HE WOULD BE ENTITLED TO RECEIVE IF HE WERE RETIRED ON THE DATE OF HIS DEATH OR DISABILITY, WHICHEVER IS HIGHER."
