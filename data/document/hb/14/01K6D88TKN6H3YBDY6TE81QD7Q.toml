congress_website_title = "AN ACT REGULATING THE CONSTRUCTION, INSTALLATION AND MAINTENANCE OF BILLBOARDS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Billboard Regulation Act of 2007\\\". The bill lists the prohibitions with regard to the installation of billboards and signages, to wit: a) those that obstruct the view of vehicular or pedestrian traffick; b) those on posts or walls that obstruct roadways and pedestrian lanes; c) those that take the space reserved for safety and informative road signs; d) those that block any rural or urban natural vista; among others."

