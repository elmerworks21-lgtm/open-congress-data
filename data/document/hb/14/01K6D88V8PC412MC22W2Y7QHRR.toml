congress_website_title = "AN ACT TO REQUIRE THE SECRETARIES OF HEALTH AND LABOR AND EMPLOYMENT TO ISSUE REGULATIONS TO ELIMINATE OR MINIMIZE THE SIGNIFICANT RISK OF NEEDLESTICK INJURY TO HEALTH CARE WORKERS"
congress_website_abstract = "The bill directs the Secretaries of Health and Labor and Employment to prescribe the following: a) bloodborne pathogens standard; b)exceptions to the bloodborne pathogens standard; c) exposure plan control; d) sharps injury log; and e) training on the use of needleless systems and sharps with engineered sharp injury protections."

