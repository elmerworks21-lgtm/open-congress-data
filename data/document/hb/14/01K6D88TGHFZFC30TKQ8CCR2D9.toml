congress_website_title = "AN ACT INSTITUTING A PROGRAM FOR THE CONTINUING EDUCATION OF COLLEGE TEACHERS, AMENDING FOR SUCH PURPOSE REPUBLIC ACT NO. 7784, OTHERWISE KNOWN AS \\\"AN ACT STRENGTHENING TEACHER EDUCATION IN THE PHILIPPINES BY ESTABLISHING CENTERS OF EXCELLENCE, CREATING A TEACHER EDUCATION COUNCIL FOR THE PURPOSE, APPROPRIATING FUNDS THEREFORE, AND FOR OTHER PURPOSES"
congress_website_abstract = "The proposed bill seeks to institute a program for college teachers in private and public universities/colleges for the purpose of improving the quality of tertiary education in the country by means of upgrading the capability and competence of these teachers. The proposed training program shall focus on proper teaching methods and on other areas of study where continuing education is necessary."
