congress_website_title = "AN ACT RESTRUCTURING THE INCOME TAXATION FOR INDIVIDUALS Y CREATING A NEW SECTION, SECTION 34-A, REPEALING SUBSECTION (L) OF SECTION 34 AND AMENDING SECTIONS 22, 24, 32 AND 35, ALL UNDER THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
