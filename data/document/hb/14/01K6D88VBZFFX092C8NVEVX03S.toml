congress_website_title = "AN ACT TO CREATE A SYSTEM OF REGISTRATION AND NOTIFICATION FOR SEX OFFENDERS AND PROVIDING A PENALTY FOR NON-COMPLIANCE"
congress_website_abstract = "Requires the registration of a sex offender with the Office of the Mayor in his place of residence within ten (10) days from prison release. The mayor is required to notify all licensed daycare centers, elementary schools and high schools within a two kilometer radius of the sex offender's residence of the sex offender's registration information."

