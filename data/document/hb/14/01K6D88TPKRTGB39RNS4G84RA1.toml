congress_website_title = "AN ACT REORGANIZING THE PHILIPPINE COAST GUARD AS A SEPARATE AND DISTINCT COMMISSIONED SERVICE UNDER THE DEPARTMENT OF TRANSPORTATION AND COMMUNICATIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Philippine Coast Guard Act of 2007\\\". The bill intends to transfer the Philippine Coast Guard from the Philippine Navy to the Department of Transportation and Communications to enable it to concentrate on its functions of marine safety administration, marine environmental protection, marine search and rescue and maritime law enforcement. It is expected that said transfer would result in a unified and integrated approach to maritime safety and water transport development."
