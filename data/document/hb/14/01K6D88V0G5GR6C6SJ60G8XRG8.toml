congress_website_title = "AN ACT PROVIDING PROTECTION TO CREDIT CARD HOLDERS BY SETTING A CEILING ON INTEREST RATES AND SURCHARGES AND PROHIBITING HIDDEN PENALTIES OR COSTS IMPOSED BY CREDIT CARD COMPANIES, BANKS, AND SIMILAR INSTITUTIONS ON PURCHASES AND CASH ADVANCES MADE THROUGH SUCH FACILITY"
congress_website_abstract = "The bill sets the ceiling on interest rates imposed by credit card companies on purchases and cash advances made through credit cards at no higher than 1% per month or 12% per annum, without compounding. It likewise sets the ceiling on surcharges or penalties at 1% per month, without compounding."
