congress_website_title = "AN ACT REQUIRING PHILIPPINE EMBASSIES AND CONSULATES TO CONDUCT CLASSES FOR CHILDREN OF FILIPINOS IN OTHER COUNTRIES, TO EDUCATE THEM ON PHILIPPINE HISTORY, CULTURE, LANGUAGE AND CIVICS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The bill mandates all Philippine embassies and consulates in countries where there are many Filipino expatriates to conduct special classes, free of charge, during week-ends to educate Filipino children in other countries on Philippine history, language, culture and civics."

