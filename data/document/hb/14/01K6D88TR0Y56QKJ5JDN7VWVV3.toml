congress_website_title = "AN ACT REGULATING TUITION AND OTHER SCHOOL-RELATED FEES IN ALL HIGHER AND BASIC INSTITUTIONS OF LEARNING, CREATING A TUITION REGULATION COUNCIL, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Tuition Regulation Act of 2007\\\". To broaden the campaign against unreasonable and unwarranted tuition fee increases every academic year, the bill seeks the creation of a Tuition Regulatory Council (TRC) that shall serve as the highest policy making body on matters concerning tuition fee rates, modification and other tuition related matters. The TRC shall study, conduct consultations and thereafter recommend adjustments in tuition and other school fees."

