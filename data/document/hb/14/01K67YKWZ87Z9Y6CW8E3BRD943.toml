congress_website_title = "AN ACT STRENGTHENING THE GRANT OF BENEFITS AND PRIVILEGES TO SENIOR CITIZENS"
congress_website_abstract = "Comprehensive Senior Citizens Act (CoSCA) Of 2009. Seeks to grant 20% discount and exemption from the Value Added Tax (VAT) on the sale of specific goods and services; grant 5% discount on other basic commodities, provided that the discounted purchase does not exceed the monthly allocation of the senior citizen; provide for a death benefits assitance to the nearest surviving relative of a deceased senior citizen; establish senior citizen vision services; and, establish for a Senior Citizens Ward in every government hospitals."
