congress_website_title = "PANUKALANG BATAS NA NAGBABAWAL SA PAGSAPI SA SINDIKATONG KRIMINAL, PAGPATAW NG PARUSA DAHIL DITO AT IBA PANG LAYUNIN (AN ACT PROHIBITING MEMBERSHIP IN A CRIMINAL SYNDICATE, IMPOSING A PENALTY THEREFOR AND FOR OTHER PURPOSES)"
congress_website_abstract = "\\\"Batas Laban sa Sindikatong Kriminal\\\". Ipinagbabawal ng panukalang batas na ito ang pagsapi sa isang sindikatong kriminal at itinuturing krimen ang gayong pagsapi. Ang pagsapi sa isang sindikatong krimen ay mapaparusahan ng pagkakulong ng tatlong taon at multa na P50,000.00. (\\\"The Anti-Criminal Syndicate Law\\\". The bill prohibits membership in a criminal syndicate and provides a penalty of three (3) years imprisonment and a fine of P50,000 for violation thereof.)"

