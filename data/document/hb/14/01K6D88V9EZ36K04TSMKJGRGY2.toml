congress_website_title = "AN ACT STRENGTHENING RIGHTS RELATING TO TRADE UNION ACTIVITIES, AMENDING FOR THE PURPOSE ARTICLES 263 AND 264 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Proposes the following amendments, among others, to the Labor Code: a) workers, through their unions, shall have the right to refuse to handle merchandise of/for , or provide/receive a service to, any company with an ongoing labor dispute; b) workers shall receive the full amount of their regular wages for the duration of the strike or lockout; and c) no employer shall refuse reinstatement of strikers returning to work."

