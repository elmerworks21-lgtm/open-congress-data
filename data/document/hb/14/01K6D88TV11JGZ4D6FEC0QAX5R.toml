congress_website_title = "AN ACT PROVIDING FOR THE LEGITIMATION OF CHILDREN BORN TO PARENTS BELOW MARRYING AGE, AMENDING FOR THE PURPOSE THE FAMILY CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Article 177 of the Family Code provides that only children conceived and born out of wedlock of parents who, at the time of the conception of the former, were not disqualified by any impediment to marry each other may be legitimated. The bill seeks to amend the provision, as follows \\\"PROVIDED THAT THOSE CONCEIVED AND BORN TO PARENTS UNDER THE AGE OF MAJORITY SHALL BE ELIGIBLE FOR LEGITIMATION.\\\""
