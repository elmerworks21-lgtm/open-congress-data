congress_website_title = "AN ACT INSTITUTIONALIZING THE OPEN HIGH SCHOOL SYSTEM IN THE PHILIPPINES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "“The Open High School System Act of 2008.” The measure institutionalizes the open high school system which utilizes print, radio, television and computer-based communications, satellite broadcasting, teleconferencing and other multi-media learning and teaching technologies that allow students to study on their own without having to regularly attend classes in conventional classrooms. It establishes the system which shall be open to all youth and adults who have finished elementary education and to high school qualifiers."

