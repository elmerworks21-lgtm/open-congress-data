congress_website_title = "AN ACT EXPANDING THE PROMOTION OF BREASTFEEDING, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7600, OTHERWISE KNOWN AS 'AN ACT PROVIDING INCENTIVES TO ALL GOVERNMENT AND PRIVATE HEALTH INSTITUTIONS WITH ROOMING-IN AND BREASTFEEDING PRACTICES AND FOR OTHER PURPOSES'"
congress_website_abstract = "“Expanded Breastfeeding Promotion Act of 2009.” Seeks to promote and support breastfeeding by encouraging all firms, establishments and institutions to establish and maintain an appropriate breastfeeding facility for mothers to breastfeed and express milk; protect working women by providing safe and healthful working conditions, taking into account their maternal functions, and such facilities and opportunities that will enhance their welfare and enable them to realize their full potential in the service of the nation, and; re-establish a culture of breastfeeding as the normal, natural and preferred method of feeding infants and young children."
