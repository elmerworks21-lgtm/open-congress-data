congress_website_title = "AN ACT ALLOWING LAW ENFORCEMENT OFFICERS TO MONITOR AND RECORD COMMUNICATIONS AND CONVERSATIONS THROUGH WIRE-TAPPING, ELECTRONIC SURVEILLANCE AND OTHER MODERN COVERT INVESTIGATIVE TECHNIQUES UPON WRITTEN ORDER OF THE COURT IN CASE OF ANY ATTEMPT OR CONSPIRACY TO COMMIT ANY OF THE SPECIFIED UNLAWFUL ACTS PENALIZED UNDER ARTICLE II OF REPUBLIC ACT NO. 9165, OTHERWISE KNOWN AS THE COMPREHENSIVE DANGEROUS DRUGS ACT OF 2002, AMENDING FOR THE PURPOSE SAID LAW"
congress_website_abstract = "The bill allows the use of wire-tapping and other forms of electronic surveillance in the course of police action directed towards known and established drug purveyors where any and all evidence gathered in connection therewith shall be admissible in court."
