congress_website_title = "AN ACT CREATING THE MINDANAO ECONOMIC DEVELOPMENT AUTHORITY (MEDA), DEFINING ITS POWERS AND FUNCTIONS, AND PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Mindanao Economic Development Authority (MEDA) Act of 2008.\\\" Seeks to strengthen the Mindanao Economic Development Council (MEDCo) by converting it into an Authority in order to preserve, protect and strengthen the gains achieved thus far from the peace and development efforts in Mindanao as well as to establish a permanent mechanism that will ensure coherence, consistency and continuity of development efforts in the island-region."
