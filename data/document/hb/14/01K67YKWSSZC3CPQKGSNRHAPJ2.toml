congress_website_title = "AN ACT PENALIZING THE COMMISSION OF ACTS OF TORTURE AND OTHER CRUEL, INHUMAN AND DEGRADING TREATMENT OR PUNISHMENT, PRESCRIBING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to define and classify torture into physical, mental or psychological torture, criminalize acts of torture and provide stiffer penalties ranging from reclusion perpetua to prision correccional, depending on the gravity of the offense. It further seeks to ensure that the rights of all persons, including suspects, detainees or prisoners, are respected at all times."
