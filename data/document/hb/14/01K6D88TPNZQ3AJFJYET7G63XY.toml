congress_website_title = "AN ACT REQUIRING WOMEN'S AND GIRLS' HUMAN RIGHTS AWARENESS PROGRAMS IN MEDIA, PROVIDING INCENTIVES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Women's and Girls' Human Rights Awareness Program in Media Act of 2003\\\". The measure requires all broadcasting networks to allot 15% of its daily total air time to the promotion, protection and advocay of women's and girls' human rights, welfare, development and gender sensitivity and equality."
