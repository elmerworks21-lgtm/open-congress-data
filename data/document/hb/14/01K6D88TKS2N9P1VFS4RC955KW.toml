congress_website_title = "AN ACT REGULATING THE PRACTICE OF REAL ESTATE PROFESSION IN THE PHILIPPINES, CREATING FOR THE PURPOSE A PROFESSIONAL REGULATORY BOARD OF REAL ESTATE PROFESSIONALS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Real Estate Profession Act of the Philippines\\\" The bill elevates the real estate service practice. i.e., real estate brokerage, appraisal and consultancy, to the category of a profession, thereby placing realty service practitioners under the jurisdiction of the Professional Regulatory Commission."
