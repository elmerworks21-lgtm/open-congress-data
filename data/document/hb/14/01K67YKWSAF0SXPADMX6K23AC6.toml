title = "DEMOLITION OF HOUSES/DWELLINGS ALONG DANGER AREAS"
date_filed = "2008-12-16"
long_title = "AN ACT PROVIDING FOR THE RESETTLEMENT, AID AND REHABILITATION SERVICES FOR THE UNDERPRIVILEGED AND HOMELESS CITIZENS AFFECTED BY THE DEMOLITION OF HOUSES/DWELLINGS ALONG DANGER AREAS SUCH AS ESTEROS, GARBAGE DUMPS, RIVERBANKS, SHORELINES, WATERWAYS AND OTHER PUBLIC PLACES SUCH AS SIDEWALKS, ROADS, PARKS AND PLAYGROUNDS AS WELL AS THE VICTIMS OF DISASTERS AND CALAMITIES AND THOSE AFFECTED BY GOVERNMENT INFRASTRUCTURE PROJECTS IN METRO MANILA AND FOR OTHER PURPOSES"
scope = "National"
subjects = [ "Squatters/Squatting", "Homeless/Underprivilege",]
congress_website_author_codes = ["0029"]
congress_website_coauthors_raw = ["SUSANO, MARY ANN L","ASILO, BENJAMIN DR.","ANGPING, MARIA ZENAIDA B.","ABANTE, BIENVENIDO JR. M.","CRISOLOGO, VINCENT P.","DEFENSOR, MATIAS JR. V.","GONZALES, NEPTALI II M.","ZAMORA, RONALDO B.","ZIALCITA, EDUARDO C.","GOLEZ, ROILO S.","VILLAR, CYNTHIA A.","LOCSIN, TEODORO JR. L.","BINAY, MAR-LEN ABIGAIL S.","BIAZON, ROZZANO RUFINO B.","CAYETANO, MA. LAARNI L.","DUENAS, HENRYJR. M.","DE GUZMAN, DEL R.","MALAPITAN, OSCAR G.","ROMULO, ROMAN T.","ROXAS, JOSE ANTONIO F.","GATCHALIAN, REXLON T.","TEODORO, MARCELINO R.","SANDOVAL, ALVIN S.","PUENTEVELLA, MONICO O.","NOGRALES, PROSPERO C."]
congress_website_committee_codes = ["0518","0532"]
congress_website_primary_keys = [71808]
congress_website_title = "AN ACT PROVIDING FOR THE RESETTLEMENT, AID AND REHABILITATION SERVICES FOR THE UNDERPRIVILEGED AND HOMELESS CITIZENS AFFECTED BY THE DEMOLITION OF HOUSES/DWELLINGS ALONG DANGER AREAS SUCH AS ESTEROS, GARBAGE DUMPS, RIVERBANKS, SHORELINES, WATERWAYS, AND OTHER PUBLIC PLACES SUCH AS SIDEWALKS, ROADS, PARKS, AND PLAYGROUNDS AS WELL AS THE VICTIMS OF DISASTERS AND CALAMITIES AND THOSE AFFECTED BY GOVERNMENT INFRASTRUCTURE PROJECTS IN METRO MANILA AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to provide resettlement of some 126,320 families that are expected to be displaced by demolitions and clearing operations in Metro Manila as well as to some 12,082 families that will be affected by government infrastructure projects through the establishment of resettlement centers, home sites, or town sites, whether off-site or beneficiary-led, through the Community Mortgage Program (CMP) or other socialized housing programs, and; seeks to provide a permanent solution to the problem of the informal settlers in Metro Manila and restore the lives of the underprivileged and homeless citizens who suffer damages resulting from the demolition in or the clearing up of danger areas and other public places as well as victims of disasters and calamities and those affected by government infrastructure projects in Metro Manila."
