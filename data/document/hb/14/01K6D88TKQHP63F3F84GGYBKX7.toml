congress_website_title = "AN ACT ESTABLISHING THE ARTISTS CAREER SERVICE, RECOGNIZING THE SPECIAL QUALIFICATIONS OF ARTISTS IN GOVERNMENT, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill creates the Artists Career Service (ACS) as one of the closed career services of the civil service. It also creates a system of recruitment, career progression, recognition and reward of artists in the public service, and a means of selecting, developing and retaining a pool of highly qualified and productive artist personnel. It grants eligibilities to members of the service, from the first, second and third levels corresponding to the regular career service."

