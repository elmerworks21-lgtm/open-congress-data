congress_website_title = "AN ACT PRESCRIBING THE PENALTIES FOR AN IMMEDIATE SUPERIOR OR SENIOR OFFICIAL OF AN AGENCY, PUBLIC OR PRIVATE, WHO DENIES APPLICATION FOR LEAVE OF A VICTIM-SURVIVOR OF VIOLENCE AGAINST WOMEN AND THEIR CHILDREN AS PROVIDED UNDER SECTION 42 OF THE IMPLEMENTING RULES AND REGULATIONS (IRR) OF REPUBLIC ACT NO. 9262, OTHERWISE KNOWN AS THE ANTI-VIOLENCE AGAINST WOMEN AND THEIR CHILDREN ACT OF 2004, AMENDING FOR THE PURPOSE SAID SECTION"
congress_website_abstract = "Seeks to prescribe the penalties for the violators of Section 42 of Republic Acts No. 9262, otherwise known as the Anti-Violence Against Women and their Children Act of 2004 thus keeping with the fundamental freedoms guaranteed under the Constitution and the provisions of the Universal declaration of Human Rights, the Convention on the Rights of the Child and other international human rights instruments of which the Philippines is a party of."

