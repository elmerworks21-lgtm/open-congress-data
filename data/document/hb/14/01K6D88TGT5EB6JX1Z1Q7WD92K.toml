congress_website_title = "AN ACT DEFINING CYBERCRIME, PROVIDING FOR PREVENTION, SUPPRESSION AND IMPOSITION OF PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Cybercrime Prevention Act of 2007\\\". The bill defines cybercrimes, identifies punishable acts involving computers , determines the legal procedures for the investigation and prosecution of cybercrimes, clarifies jurisdictions, provides for a clause on mutual assistance and cooperation, and identifies a local body that shall be responsible for providing a 24/7 assistance to foreign entities in the resolution of cybercrime cases."
