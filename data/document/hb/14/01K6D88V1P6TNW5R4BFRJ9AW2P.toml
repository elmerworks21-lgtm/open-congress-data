congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF INTEGRATED REFORMATORY CENTERS FOR METROPOLITAN MANILA AND OTHER HIGHLY URBANIZED CENTERS IN THE COUNTRY, AMENDING FOR THE PURPOSE SECTION SIXTY-THREE OF REPUBLIC ACT NO. 6975, AS AMENDED, OTHERWISE KNOWN AS \\\"THE DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990\\\" AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill authorizes the Bureau of Jail Management and Penology to establish integrated reformatory centers in Metro Manila and other highly urbanized centers and to transfer the existing jails to a common site. It also provides for the Supreme Court to establish court rooms in the integrated reformatory centers."
