congress_website_title = "AN ACT FURTHER STRENGTHENING VOLUNTARY ARBITRATION AS THE PREFERENTIAL MODE OF LABOR DISPUTE SETTLEMENT, AMENDING FOR THIS PURPOSE ARTICLES217, 260, 261, 262-A, 262-B, 263(G) AND ARTICLE 277(F), AND INCORPORATING A NEW ARTICLE262-D OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "The bill seeks to strengthen the use of voluntary arbitration as the preferred mode in settling labor-management disputes. It provides for the accreditation and de-accreditation of voluntary arbitrators. It also creates the tripartite voluntary arbitration advisory council that shall advise the National Conciliation and Mediation Board."

