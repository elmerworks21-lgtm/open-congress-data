congress_website_title = "AN ACT PROVIDING FOR THE EVALUATION OF PUBLIC AND PRIVATE PROGRAMS IN ORDER TO REDUCE THE RATE OF TEENAGE PREGNANCY"
congress_website_abstract = "\\\"Teenage Pregnancy Reduction Act of 2008.\\\" Defines the term \\\"programmatic approaches\\\" with respect to prevention programs to include abstinence from sexual activity, providing family planning services, fostering academic achievement, mentoring by adults, providing employment assistance or job training, providing professional counseling or peer counseling, providing for recreational or social events, and any of its combination; and the term \\\"prevention program\\\" as a program for the prevention of pregnancy in adolescents."
