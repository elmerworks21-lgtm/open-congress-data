congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A GOVERNMENT CORPORATE MONITORING AND COORDINATING COMMITTEE FOR ALL GOVERNMENT-OWNED OR CONTROLLED CORPORATIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "“Government-Owned or Controlled Corporations Monitoring Act.” Seeks to establish annual evaluation and monitoring on the performance of the heads of each Government-Owned or Controlled Corporation (GOCC) to ensure the efficient and effective delivery of services from these corporations and thus minimizing budget losses."
