congress_website_title = "AN ACT GIVING OFFENDERS THE FULLEST BENEFIT OF PREVENTIVE IMPRISONMENT, AMENDING FOR THE PURPOSE ARTICLE 29 OF REPUBLIC ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to grant an offender full credit for his preventive imprisonment as a general rule without any written agreement. It also provides that if the prisoner does not agree to abide by the disciplinary rules imposed upon convicted prisoners, he shall do so in writing and then be entitled to only four-fifths (4/5) of the time during which he has undergone preventive imprisonment."
