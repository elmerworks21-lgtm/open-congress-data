congress_website_title = "AN ACT REGULATING THE DONATION AND TRANSPLANTATION OF HUMAN ORGANS AND TISSUES FROM LIVING AND DECEASED DONORS"
congress_website_abstract = "“Donation And Transplantation Of Human Organs And Tissues Act Of 2009.” Seeks to recognize the paramount importance of organ donors in the interest of public health of this country, thus it primarily ensures that its availability to our patients in need will be carefully supervised and regulated by the Department of Health (DOH) and to also solve a more holistic program as we avail the immense benefits of this medical advancement."

