congress_website_title = "AN ACT ESTABLISHING A PRODUCTIVITY AND PERFORMANCE INCENTIVES AND GAINSHARING PROGRAM, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 6971, OTHERWISE KNOWN AS THE \\\"PRODUCTIVITY INCENTIVES ACT OF 1990\\\""
congress_website_abstract = "\\\"Productivity and Performance Incentives and Gainsharing Act of 2007\\\".\\\" RA 6971 was widely ignored by target sectors because of its seemingly unrealistic provisions. To liberalize the law and therefore, make it more attractive to its intended beneficiaries, this bill seeks to establish a productivity and performance incentives and gainsharing program. It aims to eliminate the conditions that unduly limit or regulate the process of productivity improvement."
