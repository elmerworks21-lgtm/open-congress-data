congress_website_title = "AN ACT PROVIDING FOR THE MAGNA CARTA OF WOMEN"
congress_website_abstract = "Bestows on women the following rights, privileges and protection, among others: a) all rights recognized under international instruments ratified by the Philippines; b) right to be protected from violence; c) right to participate and represent in all spheres of society; and d) right to equal treatment before the law."
