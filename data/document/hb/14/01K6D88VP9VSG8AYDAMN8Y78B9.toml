congress_website_title = "AN ACT AMENDING ARTICLE 952 OF REPUBLIC ACT NO. 386, ALSO KNOWN AS THE CIVIL CODE OF THE PHILIPPINES"
congress_website_abstract = "Amends Article 952 of the Civil Code of the Philippines, to read as: “The heir [, charged with the legacy or devise] or the executor or administrator of the estate, must deliver the very thing bequeathed if he is liable to do so and cannot discharge this obligation by paying its value.” “Legacy of money must be paid in cash, even though the heir or the estate may not have any.” “ The expenses necessary for the delivery of the thing bequeathed shall be for the account of the heir or the estate, but without prejudice to the legitime.”"
