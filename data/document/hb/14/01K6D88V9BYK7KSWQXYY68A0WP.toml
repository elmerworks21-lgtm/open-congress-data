congress_website_title = "AN ACT TO PROMOTE A LOW CARBON ECONOMY ESTABLISHING FOR THIS PURPOSE THE EMISSION CAP-AND-TRADE SYSTEM IN THE INDUSTRY SECTOR TO REDUCE GREENHOUSE GAS EMISSIONS AND PROTECT THE CLIMATE"
congress_website_abstract = "Authorizes the Departments of Environment and Natural Resources and Trade and Industry to set a cap on the greenhouse gas emissions of companies. Allows the companies to trade credits with each other, i.e., companies with excess greenhouse gas emissions may buy allowances from the market while companies with less greenhouse gas emissions may sell their allowances to the market."

