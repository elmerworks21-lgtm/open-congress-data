congress_website_title = "AN ACT LIMITING THE EXPOSURE OF CHILDREN TO VIOLENT PROGRAMMING ON TELEVISION AND CABLE SYSTEMS"
congress_website_abstract = "\\\"Children's Media Protection Act of 2008.\\\" Seeks to authorize the Movie and Television Review and Classification Board (MTRCB) and the National Telecommunications Commission (NTC) to prescribe ratings for violent television programming and rules for blocking such violent programming in apparatuses with such technical capability to allay the apprehentions that there is an irrefutable connection between the amount of violence depicted in television programs being watched by children and the increased aggression among these children."
