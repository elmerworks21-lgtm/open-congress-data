congress_website_title = "AN ACT RATIONALIZING THE GRANT AND ADMINISTRATION OF FISCAL AND NON-FISCAL INCENTIVES, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill proposes the following, among others: a) promote exports, whether located inside or outside economic zones; b) promote countryside development and job generation by granting income tax incentives to investors in the 30 poorest provinces; c) harmonize tax incentive packages in economic zones and freeports; and d) clarify the mandate, roles and enhance the capabilities of key government agencies."
