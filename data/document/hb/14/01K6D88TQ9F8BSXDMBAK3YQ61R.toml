congress_website_title = "AN ACT STRENGTHENING FURTHER THE COMPREHENSIVE AGRARIAN REFORM PROGRAM (CARP) BY PROVIDING AUGMENTATION FUND, AMENDING FOR THIS PURPOSE SECTIONS 2, 36 AND 63 OF REPUBLIC ACT NO. 6657, OTHERWISE KNOWN AS 'THE CARP LAW OF 1988' AS AMENDED BY REPUBLIC ACT NO. 7905 AND REPUBLIC ACT NO. 8532, DIRECTING THE CONDUCT OF A PROCESS FOR CARP IMPACT VALIDATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill provides for the following: a) extension of the agrarian reform program for five years, b) additional allocation for support services, c) strengthening of the agrarian reform communities and granting incentives to such areas, and d) creation of a multi-sectoral oversight committee that will be mandated to ensure the sustainability of the program."
