congress_website_title = "AN ACT TO ENSURE THAT MENTAL HEALTH PATIENTS RECEIVE THE PROTECTION AND SERVICES THEY REQUIRE"
congress_website_abstract = "Grants mental health patients undergoing treatment within an institution or as out-patients the following rights, among others: a) right to appropriate treatment and related services; b) right to an individualized and written treatment or service plan; c) right to ongoing participation in the planning of mental health service ; and d) right not to receive a mode or course of treatment in the absence of such person's informed, voluntary or written consent to such treatment."
