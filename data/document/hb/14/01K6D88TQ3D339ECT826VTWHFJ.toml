congress_website_title = "AN ACT PENALIZING THE TITLING, APPROPRIATION, ENCROACHMENT AND REGISTRATION OF CREEKS, ESTEROS, STREAMS, CANALS, RIVER BANKS AND OTHER PUBLIC WATERWAYS AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill imposes the penalty of imprisonment of not less than six (6) months and one (1) day to six (6) years or a fine of not less than P5,000 or both on any person who appropriates and encroaches upon any creek, canal, estero, stream, and other similar public waterways; and who registers or otherwise acquires a title thereto."

