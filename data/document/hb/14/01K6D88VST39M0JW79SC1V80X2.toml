congress_website_title = "AN ACT PENALIZING PHOTO AND VIDEO VOYEURISM"
congress_website_abstract = "“Anti-Image Voyeurism Act of 2009.” Seeks to address photo and video voyeurism problem by penalizing those who capture an image of a private area of and individual without his/her consent and knowingly does so under circumstances in which the individual has a reasonable expectation of privacy and also those who broadcast the said image without the written permission or consent of said individual."
