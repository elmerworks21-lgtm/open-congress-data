congress_website_title = "AN ACT PROVIDING FOR THE ALLOCATION OF THE DEPARTMENT OF EDUCATION-SCHOOL BUILDING PROGRAM BUDGET, ENSURING BUDGET PRIORITY FOR THE CONSTRUCTION AND MAINTENANCE OF SCHOOL BUILDINGS AND CLASSROOMS, REPEALING REPUBLIC ACT NO. 7880, OTHERWISE KNOWN AS THE FAIR AND EQUITABLE ACCESS TO EDUCATION ACT AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill provides for the School Building Program (SBP) budget to be allocated to each legislative district based on classroom shortage. It also proposes for the balance of the SBP budget to be allocated pro-rata according to each legislative district's student population in relation to the total student population of the country."
