congress_website_title = "AN ACT PROMOTING INVESTMENTS IN THE BIOFUEL INDUSTRY, AMENDING FOR THE PURPOSE THE TAX INCENTIVE SCHEMES OF REPUBLIC ACT NO. 9367, OTHERWISE KNOWN AS THE BIOFUELS ACT OF 2006, AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill exempts the importation of raw materials used in the production and/or refining of biofuels from the value-added tax and customs duties. it also clarifies that the zero specific tax privilege includes, but is not limited to, chemicals andother substances used in the processing or refining of biofuels."
