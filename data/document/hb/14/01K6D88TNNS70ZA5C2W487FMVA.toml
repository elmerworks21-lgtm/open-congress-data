congress_website_title = "AN ACT PROVIDING COMPENSATION TO VICTIMS OF HUMAN RIGHTS VIOLATIONS DURING THE MARCOS REGIME, DOCUMENTATION OF SAID VIOLATIONS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Compensation Act to Victims of Human Rights Violations\\\". The measure provides compensation to the victims of human rights violations and/or their families for the deaths, injuries, sufferings, deprivations and damages they suffered during the period from September 21, 1972 to February 25, 1986, and the continuing harm they have endured as a result of past abuses, including the economic dislocation or deprivation resulting more particularly from the extrajudicial killing or forced disappearance of the family breadwinner."
