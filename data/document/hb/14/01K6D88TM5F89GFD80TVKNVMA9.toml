congress_website_title = "AN ACT CREATING THE NATIONAL COMMISSION ON MUSLIM FILIPINOS DEFINING ITS POWERS, FUNCTIONS AND RESPONSIBILITIES AND APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"National Commission on Muslim Filipinos Act\\\". The measure proposes the creation of the National Commission on Muslim Filipinos to replace and take over the functions of the Office of Muslim Affairs. The Commission is mandated to preserve and develop the culture, tradition, institutions and well-being of Muslim Filipinos in conformity with the country's laws and in consonance with programs to attain national unity and development."
