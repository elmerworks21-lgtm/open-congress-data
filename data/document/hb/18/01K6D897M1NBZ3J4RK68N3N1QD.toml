congress_website_title = "AN ACT CREATING THE DEPARTMENT OF DISASTER RESILIENCE, DEFINING ITS POWER AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to create a truly empowered department that will focus on natural hazards and disasters, characterized by unity of command, a science-and ICT-based approach, and the capacity to take charge of three (3) key result areas: 1) disaster risk reduction; 2) disaster preparedness and response; and 3) recovery, rehabilitation, etc. Provides for key elements and features of the proposed Department as follows: a) unity of command, abolishing the Climate Change Commission and the NDRRMC; b) full-time focus on resilience to natural hazards; c) temporary take-over or direct any private utility for urgent public purpose; d) rationalized judicious and expeditious use of funds to help ensure the timely support where urgently and critically needed; e) innovative and responsive procurement mechanisms; f) Science and ICT-based approach to ensure real time access to relevant information; g) highly specialized functions and highly-skilled personnel requirements; h) institutional partnerships with LGUs, NGOs, and academia."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_18/HB01151.pdf"]
