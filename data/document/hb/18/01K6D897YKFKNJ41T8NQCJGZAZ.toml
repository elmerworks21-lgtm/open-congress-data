congress_website_title = "AN ACT PROVIDING FOR THE RATIONALIZATION OF WAGE LEVELS ON A NATIONAL AND INDUSTRIAL BASIS, AMENDING FOR THIS PURPOSE PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Proposes to institute the rationalization of wage levels on a per industry basis instead of the current regional minimum wage structure in order to achieve an equitable pay between workers in the regions, and which will ensure responsiveness to peculiarities unique to each industry. Seeks therefore to abolish the existing Regional Tripartite Wages and Productivity Boards and instead empower the National Wages and Productivity Commission to determine and fix the minimum wage rates to address regional wage distortions."
