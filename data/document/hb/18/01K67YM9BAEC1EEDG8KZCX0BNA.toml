congress_website_title = "AN ACT REGULATING THE OPERATIONS AND IMPOSITION OF FEES FOR THE USE OF PARKING SPACES AND PARKING FACILITIES IN VARIOUS ESTABLISHMENTS SUCH AS TO ACCOMMODATION, COMMERCIAL SERVICES, FOOD SERVICES, HEALTH SERVICES, RETAIL SERVICES, EDUCATIONAL INSTITUTIONS INCLUDING INDEPENDENT PARKING ENTERPRISES AND PRESCRIBING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Seeks to prioritize public safety and welfare, as well as to protect the interest and promote the general welfare of consumers who avail of parking facilities offered by business operators from unreasonable parking rates and fees while allowing reasonable return of investment. Rationalizes the provision of parking spaces and regulation of parking fees on all parking facilities of covered establishments for all types of vehicles such as but not limited to bicycles, motorcycles, and automobiles. Provides prohibition on covered establishments from invoking waiver of liability in case of loss of property or damage to the customer´s or parking client´s vehicle."
