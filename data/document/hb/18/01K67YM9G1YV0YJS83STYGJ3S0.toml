[meta]
bill_number = 8261
congress = 18
title = "PNP, BFP, BJMP AND BUCOR HEIGHT EQUALITY ACT"
date_filed = "2020-12-15"
long_title = "AN ACT LOWERING THE MINIMUM HEIGHT REQUIREMENT AND REMOVING THE HEIGHT WAIVER FOR APPLICANTS TO THE PHILIPPINE NATIONAL POLICE (PNP), BUREAU OF FIRE PROTECTION (BFP), BUREAU OF JAIL MANAGEMENT AND PENOLOGY (BJMP), AND BUREAU OF CORRECTIONS (BUCOR), AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6975, AS AMENDED, REPUBLIC ACT NO. 8551, REPUBLIC ACT NO. 9263, AS AMENDED, AND REPUBLIC ACT NO. 10575"
scope = "National"
subjects = [ "Philippine National Police (PNP)", "Bureau of Fire Protection", "Bureau of Jail Management and Penology", "Bureau of Corrections (Bucor)", "Height Qualification",]
congress_website_author_codes = ["F083"]
congress_website_coauthors_raw = ["NIETO, YUL SERVO","MACEDA, EDWARD","TAN, ANGELINA \"HELEN\" D.L. M.D.","AGABAS, TYRONE D.","DALIPE, MANUEL JOSE M."]
congress_website_committee_codes = ["0529","0532"]
congress_website_primary_keys = [161321]
congress_website_title = "AN ACT LOWERING THE MINIMUM HEIGHT REQUIREMENT AND REMOVING THE HEIGHT WAIVER FOR APPLICANTS TO THE PHILIPPINE NATIONAL POLICE (PNP), BUREAU OF FIRE PROTECTION (BFP), BUREAU OF JAIL MANAGEMENT AND PENOLOGY (BJMP), AND BUREAU OF CORRECTIONS (BUCOR), AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6975, AS AMENDED, REPUBLIC ACT NO. 8551, REPUBLIC ACT NO. 9263, AS AMENDED, AND REPUBLIC ACT NO. 10575"
congress_website_abstract = "Seeks to lower the minimum height requirement for the appointment as officer or member of the PNP, uniformed personnel of the BFP and the BJMP and the BuCor as follows : a. from one meter and sixty-two centimeters (1.62 m.) to one meter and fifty-seven centimeters (1.57 m.) for male; and from one meter and fifty-seven centimeters (1.57 m.) to one meter fifty-two centimeters (1.52 m.) for female. b. applicants belonging to the Cultural Communities or Indigenous Peoples must be at least one meter and fifty-two centimeters (1.52 m.) for male, and one meter and forty-seven centimeters (1.47 m.) for female. States that cadets of the PNPA shall be retained at one meter and sixty-two centimeters (1.62 m.) for male, and one meter and fifty-seven centimeters (1.57 m.) for female."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=18&q=HBN-8261"
ldr_website_permalink = "https://ldr.senate.gov.ph/bills/house-bill-no-8261-18th-congress-republic"

