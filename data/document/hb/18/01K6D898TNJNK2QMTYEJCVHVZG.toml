congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 10863 OTHERWISE KNOWN AS THE \"CUSTOMS MODERNIZATION AND TARIFF ACT\""
congress_website_abstract = "Proposes to allow the BoC to utilize one percent (1%) of its annual income derived from its collection of customs duties and taxes for its modernization program. Aims to give more leeway for the BoC to pursue seamless, efficient, and transparent trading procedures through the acquisition, upgrading, and modernization of equipment and information and technology equipment systems; and the construction, repair, and rehabilitation of its structures and facilities."
