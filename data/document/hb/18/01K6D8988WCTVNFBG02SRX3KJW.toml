congress_website_title = "AN ACT RECOGNIZING TRANSPORTATION NETWORK COMPANIES, PRESCRIBING REQUIREMENTS, GUIDELINES AND STANDARDS FOR THEIR OPERATION, PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Defines TNC as an organization, whether a corporation, partnership, or sole proprietorship operating in the Philippines, that provides pre-arranged transportation services for compensation using an internet-based application or digital platform technology to connect passengers and drivers using their personal vehicles. Highlights several provisions as regards to regulation (application/renewal for permit); operation (requirements, zero tolerance for drug or alcohol use, vehicle safety policy, fare setting and disclosures, electronic receipt provisions, drivers and vehicles identification, confidentiality of passenger's information, requirements for and status of drivers as independent contractors, insurance requirements, street hails prohibition, acceptance of excess cash payments, fleet service ownership, tax treatment); and enforcement of this Act."
