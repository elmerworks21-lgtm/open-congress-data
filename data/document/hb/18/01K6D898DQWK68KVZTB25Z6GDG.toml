congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC ANNUAL ADJUSTMENT OF THE PENSIONS OF RETIREES FROM THE GOVERNMENT WHO ARE MEMBERS OF THE GOVERNMENT SERVICE INSURANCE SYSTEM"
congress_website_abstract = "Aims to use the wage indexation concept by providing for the automatic increase in the G S I S pension of each retiree from the Government, whenever there is an increase in the salary of the same position from which he/she retired, provided that, if the computed increase in pension is more than the current pension of the retiree, the increase shall be granted in tranches of one hundred percent (100%) of the current pension per year until the full amount of the increase is paid."
