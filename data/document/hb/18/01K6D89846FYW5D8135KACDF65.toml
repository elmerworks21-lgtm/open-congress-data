congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8972, OTHERWISE KNOWN AS THE SOLO PARENTS' WELFARE ACT OF 2010, PROVIDING FOR ADDITIONAL BENEFITS ON BASIC COMMODITIES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to amend the existing law to address the financial concerns of solo parents by providing them additional support and benefits which include: a) 10% discount - clothing/clothing materials for the child 0 - 2 y.o.; b) 15% discount - baby's milk, food/food supplements; c) 15% discount - medicines/medical supplements/supplies for the child; d) Basic personal exemption from individual income tax."
