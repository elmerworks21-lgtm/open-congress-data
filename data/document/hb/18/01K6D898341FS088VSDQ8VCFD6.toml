congress_website_title = "AN ACT PROVIDING FOR AN EARLY OPTIONAL RETIREMENT FOR DISABLED PERSONS WORKING IN GOVERNMENT"
congress_website_abstract = "States that all disabled persons working in government, who are members of the Government Service Insurance System, are entitled to the benefits under Section 13 of Republic Act 8291 otherwise known as “the Government Service Insurance System Act of 1997” provided that he or she: a) Has rendered at least 15 years of service; b) Has been suffering a disability for at least 10 years immediately preceding the retirement; and c) Is at least fifty five (55) years of age at the time of retirement."
