congress_website_title = "AN ACT TO EMPOWER THE DEPARTMENT OF EDUCATION (DEPED), THE COMMISSION ON HIGHER EDUCATION (CHED), AND THE TECHNICAL EDUCATION AND SKILLS DEVELOPMENT AUTHORITY (TESDA) TO REQUIRE ALL THE SCHOOL HEADS TO REPORT ALL THE INCIDENTS OF STUDENT SUICIDE IN THEIR RESPECTIVE SCHOOLS, WHETHER CONSUMMATED, FRUSTRATED, OR ATTEMPTED, AND TO PROVIDE A PROGRAM FOR STUDENT SUICIDE EARLY INTERVENTION AND PREVENTION"
congress_website_abstract = "Intends to address the absence of concrete steps in determining the causes of suicide among the Filipino youth and to raise awareness of student suicide as a serious public health program. Proposes to establish a Task Force which shall collect information; study, make findings, conclusions, and recommendations regarding that information; and submit reports to Congress and also to the Civil Registrar a database regarding the incidence of student suicides. Provides several strategies that are fair, prompt, timely, continuous, up-to-date, appropriate, and effective to assist schools in achieving suicide reduction targets."
