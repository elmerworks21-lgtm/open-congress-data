congress_website_title = "AN ACT EXPANDING THE COVERAGE OF THE TELECOMMUTING ACT AND PROVIDING INCENTIVES FOR TELECOMMUTING EMPLOYEES, AMENDING FOR THE PURPOSE, REPUBLIC ACT NO. 11165, OTHERWISE KNOWN AS THE TELECOMMUTING ACT AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to expand R.A. 11165 to include in its coverage institutions from the PUBLIC sector and to provide incentives of a non-taxable telecommuting allowance of at least ONE THOUSAND PESOS (P1,000.00) for every month served under telecommuting agreement. Provides that existing similar benefits shall not be eliminated or reduced upon implementation of this proposed law and there shall be no prohibition for employers or the Collective Bargaining Agreement to offer higher or more favorable terms than what was provided in this Act. Proposes further that telecommuting allowances granted by private employers shall be deductible for income tax purposes."
