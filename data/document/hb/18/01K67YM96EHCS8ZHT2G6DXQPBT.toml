congress_website_title = "AN ACT PROHIBITING THE DISCRIMINATION AGAINST PERSONS WHO ARE DECLARED CONFIRMED, SUSPECT, PROBABLE, AND RECOVERED CASES OF COVID-19, REPATRIATED FILIPINOS, HEALTHCARE WORKERS, RESPONDERS, AND SERVICE WORKERS AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Seeks to grant the full, inviolable protection against prejudice and discrimination to those who have already suffered and recovered from Covid-19 disease and value the dignity of every person and guarantee full respect of their human rights. Enumerates and penalizes discriminatory practices against persons who are declared confirmed, suspect and probable cases of COVID-19 or any person suspected of having been exposed to and has recovered from COVID-19, including Filipino workers, registered or otherwise such as: a. Failure to Give Assistance; b. Harassment or Assault; c. Stigmatization; and d. Unlawful Refusal to Honor Valid and Existing Contracts."
