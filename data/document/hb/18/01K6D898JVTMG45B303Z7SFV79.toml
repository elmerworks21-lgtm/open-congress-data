congress_website_title = "AN ACT PROVIDING FOR THE MAGNA CARTA FOR PUBLIC COUNSELORS"
congress_website_abstract = "Seeks to protect, promote, advance and develop the ethical, socio - economic well - being, and career and professional development of the guidance counselors, their living and working conditions and terms of employment in the public schools and in the government service. Aims to achieve the right of the students to avail the guidance and counselling services in the schools; strengthen the Mental Health Act(R.A.No.11036); help to adequately address the mental, emotional and developmental needs of the basic education learners and clients; remove the emotional, behavioral, and psycho-social barriers to learning; support school staff, teachers and administrators in improving classroom management through the conduct of behavioral and other guidance related interventions, among others."
