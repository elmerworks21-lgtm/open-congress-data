congress_website_title = "AN ACT ESTABLISHING A COMPREHENSIVE SYSTEM FOR THE REGISTRATION AND LICENSING OF SOCIAL WELFARE AND DEVELOPMENT AGENCIES AND ACCREDITATION OF SOCIAL WELFARE AND DEVELOPMENT PROGRAMS AND SERVICES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to ensure that social welfare and development programs and services in the public and private sectors comply with the national standards and adhere to the principle of human rights. It shall register, license, accredit, and monitor social welfare and development agencies, service providers, groups or organizations engaged in social welfare and development activities, provide appropriate consultative mechanisms to enable mutual beneficial engagements of the private sector and its government counterparts, and develop standards to meet the challenges and demands of the services provided to the poor, the vulnerable, the marginalized, the disadvantages, and the underprivileged sectors of Philippine society."
