congress_website_title = "AN ACT EXTENDING THE PERIOD FOR INDIGENOUS CULTURAL COMMUNITIES/INDIGENOUS PEOPLES TO EXERCISE THE OPTION TO SECURE TITLE TO THEIR ANCESTRAL LANDS UNDER LAND REGISTRATION ACT 496, AMENDING FOR THE PURPOSE SECTION 12 OF REPUBLIC ACT NO. 8371, OTHERWISE KNOWN AS \\\"THE INDIGENOUS PEOPLE RIGHTS ACT OF 1997\\\""
congress_website_abstract = "Intends to remedy the misgivings of formulating a specific IRR in achieving the goals identified under Sec.64 of R.A.No.8371 which is to give our indigenous fellowmen the opportunity to own the land they till. Aims also to empower and allow them to seek financial and technical assistance to improve their production, hence extends for another twenty (20) years the option to secure a Certificate of Title under the Land Registration Act 496, as amended, as provided for under the IPR Act."
