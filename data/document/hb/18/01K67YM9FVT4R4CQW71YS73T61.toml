congress_website_title = "AN ACT PROTECTING AND PROMOTING THE RIGHTS TO EQUALITY AND NON-DISCRIMINATION ON THE BASIS OF RACE, ETHNICITY AND RELIGION"
congress_website_abstract = "Provides for prohibited acts of discrimination, when committed on the basis of race, color, descent, national or ethnic origin, religion, or religious affiliation or beliefs, against a person or any one´s relative, representative or assignee of that persons that includes: discrimination in political participation; employment; education and training; delivery of goods and services; acquisition, possession, utilization, lease or disposal of lands; access to public places; advertisements/mass media; wrongful portrayal; speech, utterances, acts of hatred and similar acts; analogous acts that result in impairment of the employment of human rights and fundamental freedoms; profiling; and abuses of state and non-state actors. Creates a Non-Discriminatory and Equal Opportunity Committee which shall exercise administrative jurisdiction to investigate acts and practices of discrimination under this Act."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=18&q=HBN-8243"

