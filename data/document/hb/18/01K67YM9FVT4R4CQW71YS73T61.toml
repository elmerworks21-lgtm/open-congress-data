congress_website_coauthors_raw = ["VELASCO, LORD ALLAN JAY Q.","NIETO, YUL SERVO","TAN, ANGELINA \"HELEN\" D.L. M.D.","OLIVAREZ, ERIC L.","MARIANO-HERNANDEZ, RUTH","MACEDA, EDWARD","VILLANUEVA, EDUARDO C.","RIVERA, DOMINGO C.","AGABAS, TYRONE D."]
