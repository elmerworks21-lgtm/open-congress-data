congress_website_title = "AN ACT AMENDING SECTIONS 22, 24, 25, 27, 28, 29, 30, 32, 34, 37, 38, 39, 42, 51, 52, 54, 56, 57, 73, 108, 121, 122, 123, 174, 176, 179, 181, 182, 183, 184, 185, 186, 187, 188, 189, 190, 191, 194, 195, 196, 197, 198, AND 199; AND REPEALING SECTIONS 127, 175, 177, 178, 180, 192, AND 193; ALL UNDER REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Covers the fourth package of the Administration's Comprehensive Tax Reform Program, making capital income taxes and financial intermediary taxes simpler, fairer and more efficient in order to fuel and direct the movement of capital rightly to where they are most needed, so that higher, sustainable, and more inclusive growth can be achieved. Proposes reforms on the following: a) tax rates on interest income and on interests, dividends, and capital gains; b) GRT rate for all Financial Intermediaries, excluding premium on insurance; c) Pre-need, pension, life and HMO insurance/non-life insurance premium tax rates; d) capital market development (IPO tax removal); e) DST of the financial sector; and f) adoption of regionally competitive tax system comparable to those neighboring ASEAN nations and their best practices."
