congress_website_title = "AN ACT PROTECTING CONSUMERS AND MERCHANTS ENGAGED IN INTERNET TRANSACTIONS, CREATING FOR THE PURPOSE THE ECOMMERCE BUREAU AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Intends to create an office to oversee the full implementation of R.A.No. 8792 or the Electronic Commerce Act of 2000 to address the safety and facility of using online platforms and build the ease and confidence of both customers and merchants. Proposes several provisions regarding eCommerce transactions: a) Code of Conduct; b) Qualifications to Engage; c) Business Registration; d) Regulatory Jurisdiction of the DTI; e) Obligations of Online eCommerce Platforms; f) Responsibilities of an Online Merchant; g) Right to Redress by Online Merchants; h) Right to Terminate the Contract by the Consumer; i) Damages due to the Consumer; j) Online Dispute Resolution; k) Joint and Solidarity Liability; l) Digital Payments; m) Tax Exemption for Newly Registered eCommerce Enterprises; n) eCommerce Philippine Trustmark, and o) Data Retention and Protection."
