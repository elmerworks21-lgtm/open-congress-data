congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF THE ARCHIPELAGIC SEA LANES IN THE PHILIPPINE ARCHIPELAGIC WATERS, PRESCRIBING THE RIGHTS AND OBLIGATIONS OF FOREIGN SHIPS AND AIRCRAFT EXERCISING THE RIGHT OF ARCHIPELAGIC SEA LANES PASSAGE"
congress_website_abstract = "Provides that \\\"Archipelagic sea lanes passage\\\" means the exercise, in accordance with the United Nations Convention on the Law of the Sea (UNCLOS), of the rights of navigation and overflight of foreign ships solely for the purpose of continuous, expeditious and unobstructed transit in the normal mode of operation. Intends to establish our archipelagic sea lanes in order that the country may fully benefit from the provision of the UNCLOS, specifically Article 53 which states that an archipelagic State may designate sea lanes and air routes suitable for the continuous passage of foreign ships and aircraft through or over its archipelagic waters and the adjacent territorial sea."
