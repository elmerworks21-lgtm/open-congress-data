congress_website_title = "AN ACT TO STRENGTHEN THE ROLE OF PRIVATE BASIC EDUCATION IN THE PHILIPPINES BY CREATING FOR THE PURPOSE THE PARTNERSHIP IN PRIVATE EDUCATION BOARD, AND THE PARTNERSHIP FUND FOR PRIVATE EDUCATION, APPROPRIATING FUNDS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to create the Partnership in Private Education Board, attached to DepEd whose principal functions among others are to: develop, lead, and coordinate the government's efforts to strengthen the role of private educational institutions, and to expand such role in partnership with the relevant agencies of the national government; coordinate information activities designed to mobilize public support through volunteerism, special projects, demonstration pilots, ad public-private partnerships; and ensure that their activities, efforts and performance meet high standards of excellence and accountability. Intends also to create the \\\"Partnership Fund for Private Education (PFPE), to be appropriated annually under the GAA for the purpose of financing assistance and partnership programs with private basic education institutions."
