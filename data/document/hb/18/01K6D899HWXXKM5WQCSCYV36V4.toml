congress_website_title = "AN ACT ESTABLISHING THE NATIONAL FRAMEWORK FOR WATER RESOURCE MANAGEMENT AND CREATING THE DEPARTMENT OF WATER RESOURCES AND THE WATER REGULATORY COMMISSION, DEFINING THEIR MANDATES, POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to rationalize the management of water resources, sewerage, and sanitation through the creation of the Department of Water Resources and the Water Regulatory Commission. Mandates the Department of Water Resources to be the primary agency responsible for the comprehensive and integrated identification and mapping of all water resources, planning, policy formulation, and management of the ownership, appropriation, utilization, exploitation, development, and protection of water resources in the Philippines to ensure the optimal use for domestic and municipal water supply, sanitation, irrigation, hydropower, industry, navigation, flood management, and recreation except fisheries or aquaculture; Enumerates its powers and functions, the authority and responsibility of the Secretary and the composition of its office. Creates the Water Regulatory Commission which shall be placed under the administrative supervision of the Department of Water Resources. Transfers the economic regulatory units and functions of the MWSS, NWRB, LWUA, SBMA, PEZA, and TIEZA to the Commission and shall collectively comprise its central regulatory unit for water supply and sanitation services. Provides quasi-judicial functions to the Commission for the purpose of any investigation, inquiry or proceeding."
