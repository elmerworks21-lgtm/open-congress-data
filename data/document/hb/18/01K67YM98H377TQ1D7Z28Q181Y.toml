congress_website_abstract = "Requires all government agencies to indicate the blood type of an individual applying for government issued identification card, certificate and license to protect and promote the right to health of the people during disasters and medical emergency situations such as those issued by the Social Security System (SSS), Government Service Insurance System (GSIS), passport issued by DFA, professional identification card issued by the PRC, birth certificate issued by the Local Registrar´s Office or the PSA, driver´s license issued by the LTO, firearms license issued by the PNP, and such other certificates, licenses or identification documents that are yet to be issued by agencies created after the effectivity of this Act."
