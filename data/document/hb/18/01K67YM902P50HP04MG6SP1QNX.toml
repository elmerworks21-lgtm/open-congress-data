title = "AGRARIAN AND AGRICULTURAL LOAN RESTRUCTURING AND CONDONATION ACT"
date_filed = "2019-10-03"
long_title = "AN ACT PROVIDING FOR THE RESTRUCTURING AND CONDONATION OF UNPAID INTERESTS, PENALTIES, AND SURCHARGES ON LOANS SECURED BY FARMERS, FISHERFOLK AND AGRARIAN REFORM BENEFICIARIES FROM DEPARTMENT OF AGRARIAN REFORM (DAR), DEPARTMENT OF AGRICULTURE (DA), PEOPLE'S CREDIT AND FINANCE CORPORATION (PCFC), COOPERATIVE DEVELOPMENT AUTHORITY (CDA), NATIONAL FOOD AUTHORITY (NFA) AND THE QUEDAN AND RURAL CREDIT GUARANTEE CORPORATION (QUEDANCOR)"
scope = "National"
subjects = [ "Condonation", "Farmers", "Fisherfolk", "Department of Agrarian Reform (DAR)", "Peoples Credit and Finance Corporation (PCFC)", "Cooperative Development Authority", "National Food Authority (NFA)", "Quedan and Rural Credit Guarantee Corporation",]
congress_website_author_codes = ["I079"]
congress_website_coauthors_raw = ["SY-ALVARADO, JOSE ANTONIO R.","NIETO, YUL SERVO","VILLANUEVA, EDUARDO C.","RIVERA, DOMINGO C."]
congress_website_committee_codes = ["0502"]
congress_website_primary_keys = [106926]
congress_website_title = "AN ACT PROVIDING FOR THE RESTRUCTURING AND CONDONATION OF UNPAID INTERESTS, PENALTIES, AND SURCHARGES ON LOANS SECURED BY FARMERS, FISHERFOLK AND AGRARIAN REFORM BENEFICIARIES FROM THE DEPARTMENT OF AGRARIAN REFORM (DAR), THE DEPARTMENT OF AGRICULTURE (DA), THE PEOPLE'S CREDIT AND FINANCE CORPORATION (PCFC), THE COOPERATIVE DEVELOPMENT AUTHORITY (CDA), THE NATIONAL FOOD AUTHORITY (NFA) AND THE QUEDAN AND RURAL CREDIT GUARANTEE CORPORATION (QUEDANCOR)"
congress_website_abstract = "Aims to release farmers, fisher-folk and agrarian reform beneficiaries from the bondage of debt and give them the opportunity to regain access to government and commercial credit facilities through condonation of unpaid interests, penalties and surcharges on their existing loans obtained through government lending programs provided: 1.that the bases for the condonation shall be limited to force majeure or market aberration and shall, in no case, be applied for the willful default of the borrower to pay such loans; 2. that the accumulated payments of not less than Five percent (5%) of the loan principal shall have been paid at the time of application for condonation; 3. a graduation process shall be followed in consonance with the plan of payment such that a borrower shall be granted a one-time condonation only; and 4. the condonation shall be in conformity with the applicable general banking laws and regulations of the Bangko Sentral ng Pilipinas (BSP)."
