congress_website_title = "AN ACT ESTABLISHING POLICIES AND REGULATIONS FOR THE NEW NORMAL FOR THE WORKPLACE AND PUBLIC SPACES AND INSTITUTING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Proposes to institute and establish mechanisms and measures to define \\\"new normal\\\", using paradigms and policies to adopt measures intended to guide government leaders in protecting the citizens when economies reopen, with people going back to work which are proven effective in preventing transmission of the virus in their respective localities to mitigate the effects of the global pandemic amongst the Filipino people. Envisions a whole-of-society approach in ushering a well-planned path towards \\\"the new normal\\\" by preparing and educating the Filipino public for life after lifting of Covid-19 restrictions and to adapt to the new norms of physical distancing. Provides for the standards for \\\"NEW NORMAL\\\" as regards to the following: a. universal mandatory safety measures, b. management of spaces such as in gatherings and in government-managed public spaces c. management of public transportation d. monitoring of schools and learning institutions e. monitoring of private commercial and industrial workers f. activating Inter-Local Government Unit Task Forces/Coordinating Council g. implementation of the universal and standard safety measures to government offices h. the role of local government units and the private sector i. detailed workplace-specific protocols and measures Mandates the fast-tracking and full-implementation of Phil. Identification System Act and the National Broadband Program and the establishment of e-government systems or system of facilitating government transactions thru various online channels or contact-less mechanisms."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_18/HB06623.pdf"]
