congress_website_title = "AN ACT AMENDING SECTION 13 OF REPUBLIC ACT NO. 3019, AS AMENDED, ENTITLED THE 'ANTI-GRAFT AND CORRUPT PRACTICES ACT'"
congress_website_abstract = "Seeks to provide an EXCEPTION to the imposition of preventive suspension FOR A PERIOD NOT EXCEEDING NINETY (90) DAYS, to incumbent public officers against whom any criminal prosecution under “Anti-Graft & Corrupt Practices Act” or under Title 7, Book II of the Revised Penal Code [dereliction of duty by officers related to the administration of justice; bribery; corruption of public officials (e.g. plunder); frauds against public treasury, other frauds; prohibited transactions; possession of prohibited interest; malversation of public funds or for any offenses involving fraud upon government funds or property; and infidelities by public officers]. Provides that EXCEPTION to the PREVENTIVE SUSPENSION shall apply to public officers who are no longer connected with the office wherein the offense charged was committed."
