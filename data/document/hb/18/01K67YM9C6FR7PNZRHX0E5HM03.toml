congress_website_title = "ANÂ ACT REGULATING THE USE OF TREATMENT TECHNOLOGY FOR MUNICIPAL AND HAZARDOUS WASTES, REPEALING FOR THE PURPOSE SECTION 20 OF REPUBLIC ACT NO. 8749, ENTITLED “THE PHILIPPINE CLEAN AIR ACT OF 1999”"
congress_website_abstract = "Provides priority over other treatment technologies that recover energy. Mandates the DENR to be the primarily responsible agency for the implementation and enforcement of this Act which shall promote the use of the state-of-the-art, environmentally-sound and safe technologies for the handling, treatment, thermal or non-thermal destruction, utilization, and dispersal of residual wastes. Provides for the different roles of the LGUs, National Solid Waste Management Commission, Department of Science and Technology, and the Department of Energy regarding the use of treatment technology of hazardous wastes."
