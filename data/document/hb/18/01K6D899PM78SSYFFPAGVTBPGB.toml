congress_website_title = "AN ACT GRANTING THE EMPLOYEES IN THE PRIVATE SECTOR THE RIGHT TO DESIGNATE THE BANK ACCOUNT TO WHICH THEIR WAGES OR COMPENSATION MAY BE DEPOSITED, AND PROVIDING OTHER OPTIONS IN THE PAYMENT OF SALARIES, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Grants the employee the right to designate the bank account to which the employee´s wages shall be deposited based on a list of at least five (5) bank options to be given by the employer. Requires the employer to pay the employee´s wages by issuing a company cheque, sending cash electronically, or by disbursing cash to employee if none of the bank options is feasible to the employee."
