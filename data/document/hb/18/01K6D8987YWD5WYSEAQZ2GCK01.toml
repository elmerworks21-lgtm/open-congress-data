congress_website_title = "AN ACT ENSURING THE EMPLOYEES' RIGHT TO THEIR WAGES, INCLUDING WAGE-RELATED SOCIAL SECURITY AND WELFARE BENEFITS, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to increase penalties to impose stricter guidelines for the unjust employers who fail to pay the required minimum wage rates including wage-related benefits. Intends to insert Art. 97-A to P.D.442 which provides that every employee shall be covered by the SSS, the PHILHEALTH, the PAG-IBIG FUND, and other social security and welfare benefits; and notwithstanding any provision of law to the contrary, all premium contributions shall be shouldered by the employer."
