congress_website_title = "AN ACT ESTABLISHING A FRAMEWORK FOR CITIZENS PARTICIPATION IN LEGISLATIVE POLICYMAKING THROUGH THE USE OF INFORMATION AND COMMUNICATIONS TECHNOLOGY PLATFORMS"
congress_website_abstract = "Refers to “Crowdsourcing” as the practice of engaging individuals or a group towards a common goal, often at innovation, problem solving, or efficiency in the delivery of services. Powered by new technologies, social media and the development of the worldwide web 2.0, the individuals or groups are able to contribute to the formulation, improvement, and creation of laws that are beneficial to the nation. Aims to enhance democracy in our country by engaging Filipinos to make legislative proposals that reflect their most pressing needs and concerns through the use of information and communication technology platforms. Crowdsourcing act may be done in the Senate and the House of Representatives a. On First Reading b. On Second Reading and c. On Third Reading; or through the Presidential Legislative Liaison (PLLO) Office which shall provide a platform through the internet where people can start a campaign or petition to review, amend and repeal a law or create a bill, the result of which may be transmitted to any member of both Houses for appropriate action."
