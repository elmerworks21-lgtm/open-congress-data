title = "PARENT-TEACHER AND COMMUNITY ASSOCIATION ACT"
date_filed = "2020-02-03"
long_title = "AN ACT INSTITUTIONALIZING AND FINANCING THE ROLE OF PARENT-TEACHER AND COMMUNITY ASSOCIATIONS IN PROMOTING THE WELFARE AND PROTECTING THE RIGHTS OF CHILDREN, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 603, OTHERWISE KNOWN AS ‘THE CHILD AND YOUTH WELFARE CODE’"
scope = "National"
subjects = [ "Parent-Teacher Associations", "Children and Youth",]
congress_website_author_codes = ["I020"]
congress_website_coauthors_raw = ["BORDADO, GABRIEL JR.","CHATTO, EDGARDO M."]
congress_website_committee_codes = ["0532","F501"]
congress_website_primary_keys = [145472]
congress_website_title = "AN ACT INSTITUTIONALIZING AND ENHANCING THE ROLE OF PARENT-TEACHER AND COMMUNITY ASSOCIATIONS IN PROMOTING THE WELFARE AND PROTECTING THE RIGHTS OF CHILDREN, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 603, OTHERWISE KNOWN AS \\\"THE CHILD AND YOUTH WELFARE CODE\\\""
congress_website_abstract = "Aims to encourage the building of strong family ties as well as responsive, responsible and stable community ties to promote the welfare, protect the rights and enhance opportunities for children and the youth. Allows PTCAs to create a program for children to ensure that they become well-rounded, stable, sociable and civic-oriented citizens; ensure the full cooperation of parents, teachers, and other community stakeholders; consult the children at all times; serve as an avenue for local school stakeholders to design other appropriate programs that will address children´s concerns; raise awareness on and support the implementation of child protection policies as mandated by DepEd; assess the local implementation of basic education program; partner with the appropriate school officials and student councils in the design and implementation of basic education school programs; and strengthen accountability among school stakeholders by facilitating information dissemination among parents in the community on DepEd and local school programs and services."
