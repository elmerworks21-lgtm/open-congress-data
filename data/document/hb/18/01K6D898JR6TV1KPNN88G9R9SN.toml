congress_website_title = "AN ACT ESTABLISHING THE FISCAL REGIME FOR THE MINING INDUSTRY"
congress_website_abstract = "Aims to rationalize and institute a single fiscal regime applicable to all mineral agreements for a better revenue sharing between the mining industry and the government.Creates the Natural Resource Trust Fund from the revenue collected from the margin-based royalty paid by the large-scale metallic mining operations outside of mineral reservations that shall redound to the benefit of provinces, cities, municipalities, and barangays directly affected by mining operations. Provides the following key provisions: 1.) Impose a three percent (3%) royalty tax on large-scale mining operations located within mining reservation areas; 2.) Impose a margin-based royalty tax on large-scale mining operations outside mining reservation areas ranging from 1% to 5%, as the case may be; 3.) Impose a royalty tax on small-scale mining operations equivalent to one-tenth of one percent (1/10 of 1%) of gross output; and 4.) Impose an additional margin-based tax on windfall profits gained from mining operations ranging from 1% to 10%, as the case may be. Exempts mining contractors for all metallic and non-metallic mining operations from the confidentiality clauses of the National Internal Revenue Code of 1977, as amended, including Sec. 270 in relation to Sec. 71 therein, by requiring them to observe fiscal transparency and comply with the requirements of the Executive Industries Transparency Initiative (EITI) of government.Creates the Natural Resource Trust Fund from the revenue collected from the margin-based royalty paid by the large-scale metallic mining operations outside of mineral reservations that shall redound to the benefit of provinces, cities, municipalities, and barangays directly affected by mining operations."
