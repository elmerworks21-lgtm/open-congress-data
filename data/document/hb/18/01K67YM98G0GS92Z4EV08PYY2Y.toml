title = "RATIONALIZING THE DISABILITY PENSION OF VETERANS"
date_filed = "2020-08-06"
long_title = "AN ACT RATIONALIZING THE DISABILITY PENSION OF VETERANS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6948, ENTITLED, AN ACT STANDARDIZING AND UPGRADING THE BENEFITS FOR MILITARY VETERANS AND THEIR BENEFICIARIES, AS AMENDED"
scope = "National"
subjects = [ "Pension", "Veterans",]
congress_website_author_codes = ["D007"]
congress_website_coauthors_raw = ["CAGAS, MERCEDES C.","ALONTE-NAGUIAT, LEN B.","BORDADO, GABRIEL JR.","CHATTO, EDGARDO M.","MARIANO-HERNANDEZ, RUTH"]
congress_website_committee_codes = ["0532","A506","0504"]
congress_website_primary_keys = [119750]
congress_website_title = "AN ACT RATIONALIZING THE DISABILITY PENSION OF VETERANS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6948, ENTITLED, \\\"AN ACT STANDARDIZING AND UPGRADING THE BENEFITS FOR MILITARY VETERANS AND THEIR BENEFICIARIES,\\\" AS AMENDED"
congress_website_abstract = "Provides for the increase of the monthly disability pension of eligible living veterans: a. From One Thousand Pesos (P1,000.00) to Four thousand Five Hundred Pesos (P4,500.00) if and while the disability is rated from ten to thirty percent (10% - 30%); b. From One Thousand One Hundred Pesos (P1,100.00) to Five Thousand Three Hundred Pesos (P5,300.00) if and while the disability is rated from thirty-one to forty percent (31% - 40%); c. From One Thousand Two Hundred Pesos (P1,200.00) to Six Thousand One Hundred Pesos (P6,100.00) if and while the disability is rated from forty-one to fifty percent (41%-50%); d. From One Thousand Three Hundred Pesos (P1,300.00) to Six Thousand Nine Hundred Pesos (P6,900.00) if and while the disability is rated from fifty-one to sixty percent (51%-60%); e. From One Thousand Four Hundred Pesos (1,400.00) to Seven Thousand Seven Hundred Pesos (P7,700.00) if and while the disability if rated from sixty-one to seventy percent (61%-70%); f. From One Thousand Five Hundred Pesos (P1,500.00) to Eight Thousand Five Hundred Pesos (P8,500.00) if and while the disability is rated from seventy-one to eighty percent (71%-80%); g. From One Thousand Six Hundred Pesos (P1,600.00) to Nine Thousand Three Hundred Pesos (P9,300.00) if and while the disability is rated from eighty-one to ninety percent (81%-90%); h. From One Thousand Seven Hundred Pesos (P1,700.00) to Ten Thousand Pesos plus One Thousand Pesos for the spouse and each unmarried minor children if and while the disability is rated from ninety-one to one hundred percent ((91%-100%). Provided, however, that a veteran without a service-connected disability, upon reaching the age of 70 is deemed totally disabled shall be entitled to a monthly pension of One Thousand Seven Hundred Pesos (P1,700.00) only ."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=18&q=HBN-7302"

