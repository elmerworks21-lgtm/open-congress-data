congress_website_title = "AN ACT CREATING THE POSITION OF THE MUNICIPAL GENERAL SERVICES OFFICER IN MUNICIPAL GOVERNMENTS, AMENDING SECTION 443 (a) AND SECTION 490 (a) OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Intends to effectively guarantees the uniformity of general services management of the local government units in the provincial, city and MUNICIPAL level. Seeks to ensure the speedy delivery of services requiring general services expertise and technical support services which shall likewise provide for an improved system of procurement, care, utilization, custody, and disposal of supplies or properties of the LGU."
