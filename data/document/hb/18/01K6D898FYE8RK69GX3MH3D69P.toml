congress_website_title = "AN ACT INSTITUTIONALIZING SUPPORT MECHANISMS AND PROTECTION FOR PUBLIC SCHOOL TEACHERS ON MATTERS OF STUDENT DISCIPLINE FOR CLASSROOM MANAGEMENT"
congress_website_abstract = "Aims to explicitly grants protection to education professionals from being sued over efforts to undertake \\\"reasonable actions to maintain order, discipline, and an appropriate educational environment\\\" thereby shielding teachers from any liability arising from imposing discipline upon school children. Mandates the Department of Education to issue guidelines on teacher protection, and emphasize the rights and responsibilities of teachers with respect to student discipline and classroom management which shall not be deemed as child abuse, cruelty, or exploitation as defined under R.A. No.7610 and which shall include clear description of disciplinary procedure of authorities who may respond to interventions being administered by teachers."
