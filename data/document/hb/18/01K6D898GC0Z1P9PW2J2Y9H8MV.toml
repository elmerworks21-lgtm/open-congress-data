congress_website_title = "AN ACT AMENDING PROVISIONS OF REPUBLIC ACT 10667, OTHERWISE KNOWN AS 'AN ACT PROVIDING FOR A NATIONAL COMPETITION POLICY PROHIBITING ANTI-COMPETITIVE AGREEMENTS, ABUSE OF DOMINANT POSITION AND ANTI-COMPETITIVE MERGERS AND ACQUISITIONS, ESTABLISHING THE PHILIPPINE COMPETITION COMMISSION AND APPROPRIATING FUNDS THEREFOR'"
congress_website_abstract = "Seeks to amend the Philippine Competition Act to enhance the PCC's ability to enforce its mandate, particularly in investigating cartels, bid rigging, market foreclosure, and other anti-competitive conduct, as well as imposing various fines, penalties, and remedies. Intends to legislate principles of the National Competition Policy to ensure the competition considerations are included in the formulation and deliberation of government policies; and mandates PCC to review fiscal incentives for anti-competitive effects."
