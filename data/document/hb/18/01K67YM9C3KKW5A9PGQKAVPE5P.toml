congress_website_coauthors_raw = ["FORTUN, LAWRENCE LEMUEL H.","NIETO, YUL SERVO","ROBES, FLORIDA P.","REMULLA, JESUS CRISPIN C.","DAZA, PAUL R.","DALIPE, MANUEL JOSE M.","RODRIGUEZ, RUFUS B.","ARAGONES, SOL","ALONTE-NAGUIAT, LEN B.","TAN, ANGELINA \"HELEN\" D.L. M.D."]
