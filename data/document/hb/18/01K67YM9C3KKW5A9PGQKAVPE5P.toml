congress_website_primary_keys = [26834]
congress_website_title = "AN ACT PROVIDING PROTECTION TO CONSUMERS AND MERCHANTS ENGAGED IN INTERNET TRANSACTIONS, CREATING FOR THE PURPOSE THE ELECTRONIC COMMERCE BUREAU, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to promote and maintain a robust electronic commerce (eCommerce) environment in the country by building trust between online merchants and consumers. Establishes secure and reliable platforms where goods and services are transacted online with appropriate transparency and utmost efficiency to encourage the creation of new products, services, business models and processes. Ensures an effective regulation of commercial activities through the internet or electronic means to ensure that consumer rights and data privacy are protected, innovation is encouraged, fair advertising practices and competition are promoted, online transactions are secured, intellectual property rights are respected, and where product standards and safety are observed. Covers all business-to-business and business-to-consumer eCommerce and internet transactions including those related to the following activities: a.) Internet retail of consumer goods and services; b.) Online travel services; c.) Online media providers; d.) Ride hailing services; and e.) Digital financial services.Creates the eCommerce Bureau under the Department of Trade and Industry (DTI)and provides for its powers and functions. Enumerates the consumers rights and obligations involving internet transactions."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=18&q=HBN-7805"

