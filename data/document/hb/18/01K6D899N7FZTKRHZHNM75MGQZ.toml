congress_website_title = "AN ACT IMPOSING A `SUPER-RICH TAX´ ON INDIVIDUALS WITH NET VALUE ASSETS EXCEEDING ONE BILLION PESOS (P1,000,000,000.00), AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF THE NATIONAL INTERNAL REVENUE 21 CODE OF 1997 OR REPUBLIC ACT 10963 AS AMENDED"
congress_website_abstract = "Defines SUPER-RICH TAX as the net value of taxable assets or the market value of assets owned by a taxpayer, real or personal, tangible or intangible, wherever situated, reduced by any debts owed by the taxpayer. Proposes a tax on the super-rich Filipinos: 1% on wealth above Php1 billion, 2% on wealth above Php2 billion, and 3% on wealth over Php3 billion. Proposes to aid the government in pursuing its anti-poverty measures and other social programs that can help stop the widening divide between the rich and the poor and help shift the burden of taxation away from regressive consumption taxes."
