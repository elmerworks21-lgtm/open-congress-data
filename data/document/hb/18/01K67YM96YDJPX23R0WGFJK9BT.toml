congress_website_title = "AN ACT ESTABLISHING POLICIES, REGULATIONS, AND PUBLIC HEALTH SAFEGUARDS FOR THE BETTER NORMAL IN THE WORKPLACE, PUBLIC PLACES AND COMMUNITIES TOWARD A SUSTAINABLE RECOVERY FROM COVID-19 PANDEMIC"
congress_website_abstract = "Seeks to provide the strategies and measures that shall be implemented so that economic and social activities can proceed in a manner that ensures public health, safety, and security during an epidemic, and until such time that the same is declared eradicated by the authorized National Government agency or agencies of the government.Mandates the LGUs to be primarily responsible for instituting localized policies and legislation in accordance with the better normal measures and other directives and issuances of the National Government. Prescribes all private businesses, offices and establishments to submit a Management Plan to the concerned LGU where the entity conducts operations or holds office not later than (15) days upon resumption of their operations. Provides specific responsibilities of the following National Government Offices, their respective Attached Agencies, and GOCCs: Philippine Statistics Authority (PSA), Department of Information and Communications Technology (DICT), Department of Trade and Industry (DTI), Department of Health (DOH), Local Water District and Water Utilities, Department of Public Works and Highways (DPWH), and Department of Finance (DOF). Enumerates prohibited acts and omissions and its corresponding penalties under this Act."
