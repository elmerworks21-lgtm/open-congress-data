congress_website_title = "AN ACT REGULATING THE USE OF BANK ACCOUNTS, ELECTRONIC WALLETS, AND OTHER FINANCIAL ACCOUNTS"
congress_website_abstract = "Aims to protect the public from cybercriminals and criminal syndicates who target bank accounts and e-wallets or lure account holders into perpetrating fraudulent activities. Enumerates and defines punishable offenses such as money mule, social engineering schemes and economic sabotage. Declares that the commission of certain crimes when done in bulk or in large scale is a form of economic sabotage and a heinous crime and shall be punishable to the maximum level allowed by law."
