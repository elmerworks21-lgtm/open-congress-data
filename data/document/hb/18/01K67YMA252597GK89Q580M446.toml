congress_website_title = "AN ACT STRENGTHENING THE COMMISSION ON HIGHER EDUCATION AND APPROPRIATING FUNDS THEREFOR, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7722, OTHERWISE KNOWN AS THE “HIGHER EDUCATION ACT OF 1994”"
congress_website_abstract = "Aims to modernize the Philippine higher education to keep pace with all the international and regional advancements. States that the Commission on Higher Education (CHED) is independent and separate from the Department of Education (DepEd) and is attached to the Office of the President for administrative purposes only which shall cover both public and private HEIs offering degree programs, except those explicitly removed by Congress from its jurisdiction. States that the Higher Development Fund established under Republic Act No. 7722 shall be used exclusively for the strengthening of higher education in all regions of the country. Guarantees academic freedom of universities and colleges and religious freedom of higher education student, faculty, or other members of the academic community; Enumerates the powers and functions as well as the quasi-judicial powers of the CHED, among others."
