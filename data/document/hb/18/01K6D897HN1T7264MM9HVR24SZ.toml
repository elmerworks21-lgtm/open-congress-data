congress_website_title = "AN ACT TO ESTABLISH THE ARCHIPELAGIC SEA LANES IN THE PHILIPPINE ARCHIPELAGIC WATERS, PRESCRIBING THE RIGHTS AND OBLIGATIONS OF FOREIGN SHIPS AND AIRCRAFT EXERCISING THE RIGHT OF ARCHIPELAGIC SEA LANES PASSAGE THROUGH THE ESTABLISHED ARCHIPELAGIC SEA LANES AND PROVIDING FOR THE ASSOCIATED PROTECTED MEASURES THEREIN"
congress_website_abstract = "Seeks to address the failure of R.A.No.9522 to provide and establish the archipelagic sea lanes of the Philippines as espoused in Art.53 of the UNCLOS. Defines \\\"Archipelagic sea lane\\\" as the designated sea lanes and air routes in the archipelagic waters through which foreign vessels or aircraft may exercise the right of archipelagic sea lanes passage. Declares that foreign ships and aircraft exercising the right of archipelagic sea lanes passage shall pass through or above the archipelagic sea lane as quickly as possible without delay and in the normal mode solely for the purpose of continuous, expeditious and unobstructed transit; and shall not deviate more than 25 nautical miles to either side of the axis line of the sea lane: Provided, that such ships and aircraft shall not navigate closer to the coast more that 10% of the distance between the nearest points on the islands bordering the sea lane"
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_18/HB00809.pdf"]
