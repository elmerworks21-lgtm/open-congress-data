congress_website_title = "AN ACT MODIFYING THE SALARY SCHEDULE FOR CIVILIAN GOVERNMENT PERSONNEL"
congress_website_abstract = "Proposes the Compensation Adjustment Strategy to revise and update the existing Compensation and Position Classification System (CPCS) to reflect the changing times and make it competitive with the private sector. States that the proposed modified Salary Schedule shall apply to all civilian personnel in the Executive, Legislative and Judicial Branches, Constitutional Commissions and other Constitutional Offices, GOCCs with original charters, not covered by R.A.10149, and a special compensation adjustment for LGU personnel. Intended to raise the minimum salary for SG 1 from the current rate of Eleven Thousand Sixty Eight Pesos (P11,068.00) to ELEVEN THOUSAND SIX HUNDRED FIFTY SIX PESOS (P11,656.00) to make the current CPCS even more competitive with the market rates."
