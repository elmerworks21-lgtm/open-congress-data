congress_website_title = "AN ACT ESTABLISHING AN EPIDEMICS AND/OR PANDEMICS PREPAREDNESS PLAN, AND FOR OTHER PURPOSES THEREOF"
congress_website_abstract = "Aims to establish an epidemic/pandemic emergency plan in order for the country to be better prepared to recognize and manage future threats of epidemic/pandemic. Proposes for an intensive nationwide information campaign on emerging/re-emerging infectious diseases to educate the people on its nature, causes, transmission and prevention. Proposes the establishment of Endemic/Pandemic Emergency Council which shall: a) Identify isolation centers and health care facilities; b) Authorize quarantine of individuals or groups of individuals; c) Purchase, store or distribute sufficiently adequate supply of PPEs, anti-viral agents, anti-toxins, serums and vaccines, and ensure that their use and rationing be controlled, restricted and regulated in the event of an epidemic/pandemic; d) Establish a comprehensive monitoring program to determine the sufficiency and effectiveness of the programs and activities in preventing the spread of the disease; e) Establish reporting procedures that will ensure the confidentiality and non-disclosure of the personal information gathered and medical records of all patients and individuals infected or suspected to have been infected with the disease; f) Provide health care workers and responders with adequate PPEs like N95 respiratory masks, gloves, face shields and goggles."
