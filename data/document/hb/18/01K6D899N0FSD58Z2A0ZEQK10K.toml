congress_website_title = "AN ACT RATIONALIZING THE NUMBERS OF HOLIDAYS IN THE PHILIPPINES, AMENDING FOR THE PURPOSE SECTION 26, CHAPTER 7, BOOK I OF EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE ADMINISTRATIVE CODE OF 1987, AS AMENDED"
congress_website_abstract = "Seeks to reduce the number of holidays to 12 days per year which is in line with the global median: the eight traditional holidays such as: New Year´s Day, Maundy Thursday, Good Friday, Black Saturday, Labor Day, Independence Day, All Saints´ Day, and Christmas Day; one holiday to commemorate all heroes on Rizal Day; one inter-faith/cultural holiday based on employees´ religious or cultural preferences; one holiday for both Ninoy Aquino´s death and People Power Revolution anniversaries; one local holiday which shall fall on a Monday. Proposes to move holidays to Mondays as much as possible to spur tourism and holiday spending to improve competitiveness and overall productivity."
