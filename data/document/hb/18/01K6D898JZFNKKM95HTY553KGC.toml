congress_website_title = "AN ACT ESTABLISHING THE NATIONAL INFECTIOUS DISEASE TREATMENT AND RESEARCH INSTITUTE AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to establish a hospital that would specialize in the treatment of infectious diseases like the Middle East Respiratory Syndrome ( M E R S ), Severe Acute Respiratory Syndrome ( S A R S ), and the Novel Coronavirus Acute Respiratory Diseases (2019-n Co V A R D ). Provides for the following objectives of the Institute among others, as regards to: mobilization of healthcare and security personnel and resources; isolation and quarantine operations; safe transportation and ensuring minimum contact with other persons; ensuring compliance with orders for isolation and restriction of movement; decontamination of equipment, supplies and personnel of infected persons; imposition of travel restrictions; primary repository of all database for researchers."
