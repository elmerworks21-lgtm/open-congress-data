congress_website_title = "AN ACT REFORMING THE COUNTRY'S BASIC EDUCATION SYSTEM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10533, OTHERWISE KNOWN AS \\\"THE ENHANCED BASIC EDUCATION ACT OF 2013\\\""
congress_website_abstract = "Proposes to introduce new provisions to reform R.A.No.10533, to emphasize quality over quantity in teaching, prepare K-12 graduates for both employment and higher education, and ensure that the administration of basic education focuses on improving the learning outcomes of students. Features include the following: a. emphasis on TVET as a bridge to both employment and higher education; b. mother tongue-based materials produced in the actual native language of the learner; c. a workforce development plan to ensure employability in top employers and high-value industries; d. TVET as the default senior high school option, while maintaining the other tracks as alternatives; e. courses in senior high school certified as skills by the TVET; f. creation of a Learning Materials Development Center for textbooks' accuracy and effectiveness; g. curricular deloading emphasizing skill-building; h. encouraging summer internships among senior high school students. Emphasizes the integration of several skills into the curriculum as follows: global citizenship, innovation and creativity skills, technology skills and interpersonal skills."
