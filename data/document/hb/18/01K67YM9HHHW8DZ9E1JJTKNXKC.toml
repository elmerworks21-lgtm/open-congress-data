congress_website_title = "AN ACT REGULATING THE CONDUCT OF OFF-CAMPUS EDUCATIONAL ACTIVITIES BY PUBLIC AND PRIVATE SCHOOLS"
congress_website_abstract = "Aims to integrate relevant off-campus education activities with regular classrooms instructional programs to broaden and supplement the learning opportunity. Prescribes the following conditions for off-campus educational activities: a. relevant and aligned with the education competencies of the curriculum; b. part of program requirement embodied in the approved curriculum; or c. necessary to the acquisition of relevant knowledge, skills, and values of learners. States that participation in such activity shall be voluntary basis only except when the off-campus educational activity is indispensable in the completion of program or curriculum requirement. Mandates the DepEd and the CHED, in consultation with the Department of Tourism, National Museum of the Philippines, National Historical Commission of the Philippines, National Commission for Culture and the Arts, and other relevant government agencies to accredit the venues, destinations, and activities where the educational institutions may conduct, hold, or participate in off-campus activities."
