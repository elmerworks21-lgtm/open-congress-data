title = "MT. PULAG PROTECTED LANDSCAPE ACT"
long_title = "AN ACT DECLARING A PARCEL OF LAND LOCATED IN THE MUNICIPALITIES OF KABAYAN, BOKOD AND BUGUIAS, IN THE PROVINCE OF BENGUET, IN THE MUNICIPALITY OF TINOC, PROVINCE OF IFUGAO, AND IN THE MUNICIPALITY OF KAYAPA IN THE PROVINCE OF NUEVA VIZCAYA, A PROTECTED AREA, WITH THE CATEGORY OF PROTECTED LANDSCAPE UNDER THE NATIONAL INTEGRATED PROTECTED AREAS SYSTEM (NIPAS), TO BE REFERRED TO AS THE MT. PULAG PROTECTED LANDSCAPE, PROVIDING FOR ITS MANAGEMENT, AND APPROPRIATING FUNDS THEREFOR"
scope = "Local"
subjects = [ "Protected Area/Protected Landscape", "National Integrated Protected Areas System (Nipas), R.A.No. 7586",]

