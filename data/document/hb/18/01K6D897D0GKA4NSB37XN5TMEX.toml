congress_website_title = "AN ACT ESTABLISHING THE NATIONAL HEALTH PASSPORT SYSTEM AND STRENGTHENING THE PRIMARY HEALTHCARE SYSTEM, APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Provides for a Health Passport that shall serve as the patient´s official recognition that he could avail of the free medical and dental diagnostic tests in government hospitals subject to the requirements of the DOH and the local government units where passport holder resides which shall contain the following information: a. Patient´s medical and dental history as recorded by the physician, dentist or authorized health professionals; b. Medical and dental test results; c. Diagnosis; d. Medicines and medical treatment availed of; e. Basic medical data; f. Information on all medical and health related benefits provided by laws; and g. Information regarding the patient´s medical rights and privileges under passport system. Mandates the parents or legal guardians of children born after the effectivity of this Act to enroll their children in the health passport program to record the child´s initial medical check-up and immunization. Failure to provide the child with medical check-ups and immunization shall constitute an evidence of violation of the provisions of Article VI, Section 10 of RA 7610, otherwise known as the Anti-Child Abuse Act."
