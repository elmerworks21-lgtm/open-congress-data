congress_website_title = "AN ACT ESTABLISHING A LABOR EMPOWERMENT ASSISTANCE PROGRAM, AMENDING PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to introduce a matching skills approach to employment by providing for a Labor Empowerment Assistance Program (LEAP) that is linked to TESDA skills training programs for employees who are in-between jobs. Proposes to ensure that financial assistance and trainings required to reduce the gap between knowledge in the educational system or previous employment, and the actual demand of skills - are readily available and accessible to interested workers."
