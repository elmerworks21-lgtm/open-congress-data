congress_website_title = "AN ACT DEFINING AND PENALIZING THE CRIME OF CYBER-BULLYING"
congress_website_abstract = "Seeks to protect every citizen from cruelty in the virtual world by defining the scope of \\\" cyber - bullying \\\" and imposing penal sanctions to encourage netizens to be responsible and accountable for their cyber - actions. Enumerates the \\\"acts of cruelty committed using the internet or any form of electronic media or technology that has the effect of stripping one's dignity or causing reasonable fear of physical or emotional harm . . . \\\" which involves: repeatedly sending offensive, rude, and insulting messages; distributing derogatory information; posting/sending offensive photos; using the victim's virtual identity to send embarrassing materials; revealing and sharing personal or embarrassing information; and repeatedly sending messages that include threats of harm or online activities that cause fear on the victim's safety."
