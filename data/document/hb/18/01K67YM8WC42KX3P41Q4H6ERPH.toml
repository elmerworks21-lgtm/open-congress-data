[meta]
bill_number = 59
congress = 18
title = "AMENDING THE RETAIL TRADE LIBERALIZATION ACT"
date_filed = "2019-07-01"
long_title = "AN ACT SETTING THE MINIMUM PAID-UP CAPITAL AND LOCALLY PRODUCED STOCK INVENTORY REQUIREMENTS FOR FOREIGN RETAIL BUSINESS ENTERPRISES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8762, OTHERWISE KNOWN AS THE RETAIL TRADE LIBERALIZATION ACT OF 2000"
scope = "National"
subjects = [ "Retail Trade Liberalization (R.A.No. 8762)",]
congress_website_author_codes = ["I073"]
congress_website_committee_codes = ["0539"]
congress_website_primary_keys = [142342]
congress_website_title = "AN ACT SETTING THE MINIMUM PAID-UP CAPITAL AND LOCALLY PRODUCED STOCK INVENTORY REQUIREMENTS FOR FOREIGN RETAIL BUSINESS ENTERPRISES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8762, OTHERWISE KNOWN AS THE \\\"RETAIL TRADE LIBERALIZATION ACT OF 2000\\\""
congress_website_abstract = "Aims to relax barriers to entry of foreign investment in retail trade by lowering the required minimum paid-up capital for foreign retail investors to US$200,000. Intends to reduce the required locally manufactured products carried by foreign retailers from 30 percent to 10 percent of the aggregate cost of their stock inventory which would open up the Philippine retail industry that would result in greater variety of products, more competitive local players, inflow of new technology, and more importantly, more jobs for Filipinos."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=18&q=HBN-59"
download_url_sources = ["https://web.senate.gov.ph/lisdata/3271129575!.pdf","https://docs.congress.hrep.online/legisdocs/basic_18/HB00059.pdf"]

