congress_website_title = "AN ACT MANDATING THE INSTALLATION OF ALTERNATIVE PAYMENT SYSTEMS IN ALL PUBLIC OFFICES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Intends to reduce face-to-face government transactions by mandating the Department of Information and Communications Technology (DICT) to develop an electronic payment system which shall be readily available for use by all government agencies and instrumentalities, which shall be accessible to all Filipinos. Provides that the payment system shall include, but is not limited to, the use of debit cards, credit cards, online banking, e-money, and mobile wallets; encourages partnerships with reputable banks and financial institutions regulated by the BSP; and assures that any data collected, processed and stored through this Act shall be secured and protected under the Data Privacy Act (R.A. No. 10173)"
