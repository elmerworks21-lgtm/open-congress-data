congress_website_title = "AN ACT FOR THE STEWARDSHIP AND CONSERVATION OF BUILT CULTURAL HERITAGE"
congress_website_abstract = "Defines “Built Heritage” as an architectural and engineering structures such as, but not limited to bridges, government buildings, houses of ancestry, traditional dwellings, quartels, train stations, lighthouses, small ports, educational, technological, and industrial complexes, and their settings, and landscapes with notable historical and cultural significance. Intends to: integrate existing legislation on heritage protection with local government mandates, especially concerning land use planning and permitting functions; provide financial incentives to encourage property owners to preserve their structures; and to properly define the jurisdiction borders between cultural agencies, and develop their institutional capacity."
