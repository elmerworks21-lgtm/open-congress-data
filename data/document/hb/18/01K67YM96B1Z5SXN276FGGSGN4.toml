congress_website_primary_keys = [20270]
congress_website_title = "AN ACT AFFORDING MORE PROTECTION TO CONSUMERS OF FINANCIAL PRODUCTS AND SERVICES"
congress_website_abstract = "Aims to protect the following rights of financial consumers: a. Right to equitable and fair treatment; b. Right to disclosure and transparency of Financial Products and Services; c. Right to protection of consumer assets against fraud and misuse; d. Right to data privacy and protection; and e. Right to timely handling and redress of complaints. Provides, among others, financial regulators such as the Bangko Sentral ng Pilipinas (BSP), the Security and Exchange Commission (SEC), the Insurance Commission (IC) and the Cooperative Development Authority (CDA), rulemaking, surveillance and inspection, market monitoring, enforcement and adjudication powers relative to consumer protection."
