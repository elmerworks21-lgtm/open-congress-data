date_filed = "2019-12-18"
long_title = "AN ACT DEFINING ELECTRONIC VIOLENCE AGAINST WOMEN AND THEIR CHILDREN, PROVIDING PROTECTIVE MEASURES, AND PRESCRIBING PENALTIES FOR VIOLATIONS THEREOF, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9262, OTHERWISE KNOWN AS THE ANTI-VIOLENCE AGAINST WOMEN AND THEIR CHILDREN ACT OF 2004"
scope = "Local"
subjects = [ "Anti-Violence Against Women and Children (VAWC)(R.A.No. 9262)", "Women", "Children/Child Care", "E-Vawc",]
congress_website_author_codes = ["I078"]
congress_website_coauthors_raw = ["NAVA, LUCILLE","DEL MAR, RAUL V.","ROBES, FLORIDA P.","ABANTE, BIENVENIDO M.","VERGARA, ROSANNA \"RIA\"","ALONTE-NAGUIAT, LEN B.","HERRERA-DY, BERNADETTE C.","LAGMAN, EDCEL C."]
congress_website_committee_codes = ["0532","A504"]
congress_website_primary_keys = [149085]
congress_website_title = "AN ACT DEFINING ELECTRONIC VIOLENCE AGAINST WOMEN AND THEIR CHILDREN, PROVIDING PROTECTIVE MEASURES, AND PRESCRIBING PENALTIES FOR VIOLATIONS THEREOF, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9262, OTHERWISE KNOWN AS THE \\\"ANTI-VIOLENCE AGAINST WOMEN AND THEIR CHILDREN ACT OF 2004\\\""
congress_website_abstract = "Aims to amend RA 9262 by including and addressing the electronic violence against women or EVAW which defines any acts or omissions that involves the use or exploitation of information and communications technology which causes or likely to cause mental, emotional or psychological distress or suffering to the women and their children. Provides penalties for the violation of this Act; Provides that cases of Electronic Violence Against Women (EVAW) may be filed in the place where the woman and her children reside at the time that they learned of the commission of the offense; Includes the Movie and Television Review and Classification Board (MTRCB), Department of Science and Technology (DOST), National Telecommunications Commission (NTC), Department of Information and Communications Technology (DICT), Department of Foreign Affairs (DFA), Commission on Filipinos Overseas (CFO) and two (2) representatives from civil society organizations (CSOs) with proven track record of involvement in the prevention and elimination of violence against women and their children (VAWC) as additional members of the Inter-Agency Council on Violence Against Women and Their Children (IAC-VAWC); Mandates the DSWD and the LGUs to provide women and their children temporary shelters, provide counselling, psycho-social services and/or recovery, rehabilitation programs, and livelihood assistance; and the DOH to provide medical assistance to women and their children, among others."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=18&q=HBN-5869"
