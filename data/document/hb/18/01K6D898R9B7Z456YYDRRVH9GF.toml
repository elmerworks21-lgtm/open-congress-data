congress_website_title = "AN ACT TO ENHANCE PUBLIC FINANCIAL MANAGEMENT BY AMENDING CERTAIN PROVISIONS IN BOOK II OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE “LOCAL GOVERNMENT CODE OF 1991”"
congress_website_abstract = "Intends to: 1) integrate principles and policies of good governance and efficient public financial management; 2) mandates relevant government agencies to provide proper guidance to the LGU´s in planning, investment programming, budgeting, revenue mobilization and administration, expenditure management, performance monitoring, and management including the preparation of public investment plans. Emphasizes the role of Regional Development Councils as well as the provincial, city, and municipal governments over their respective component LGUs in matters of public finance management. Provides for the digitization of reports and posting on government portals to ensure transparency and accountability."
