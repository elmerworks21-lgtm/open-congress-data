congress_website_title = "AN ACT EXPANDING THE USE OF THE LEGAL ASSISTANCE FUND, AMENDING FOR THE PURPOSE SECTION 26 OF REPUBLIC ACT NO. 8042, OTHERWISE KNOWN AS THE \\\"MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF 1995,\\\" AS AMENDED"
congress_website_abstract = "Expands the use of the Legal Assistance Fund to include Overseas Filipinos facing charges, expenses for the filing of labor and/or criminal cases against erring or abusive employers or other persons abroad. Provides that the Legal Assistance Fund shall be made available at all time from the investigation, detention, arrest, charging or indictment of the Migrant Worker or Overseas Filipino all the way to the trial proper, and at all levels of appeal thereafter."
