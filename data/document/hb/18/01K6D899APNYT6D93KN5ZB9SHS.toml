congress_website_title = "AN ACT IMPROVING TEACHER QUALITY THROUGH THE ESTABLISHMENT OF A TEACHER EDUCATION FOR ACHIEVERS PROGRAM, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to uplift the teaching profession's image and encourage and attract the best and brightest to teach by strengthening the enrollment requirements and providing merit-based scholarships for students entering pre-service teacher training institutions. Proposes to establish Teacher Education Council and Centers of Excellence to produce high-quality teachers and improve the quality of learning outcomes through policies and practices where pre-service and in-service teacher education is prioritized. Aims to ensure that future teachers are classroom-ready and contributors to improved learning outcomes by providing the best training, full financial and psychosocial support, and employment assistance. Proposes to provide holistic support for the teacher grantees such as scholarship package; continuous mentorship and training and development; teaching position upon graduation; and other various incentives."
