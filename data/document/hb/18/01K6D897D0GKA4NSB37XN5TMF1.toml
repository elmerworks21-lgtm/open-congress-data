congress_website_title = "AN ACT STRENGTHENING THE PEOPLE'S RIGHT TO INFORMATION"
congress_website_abstract = "Seeks to promote a clear transparency and accountability in government; a convenient procedure to facilitate access to information; remedies available for denial of access; administrative, civil and criminal penalties for violation thereof, among others. Access to information shall cover all official records, documents and papers pertaining to official acts, transactions or decisions, and government research data used as basis for policy development, subject to limitations provided under this Act."
