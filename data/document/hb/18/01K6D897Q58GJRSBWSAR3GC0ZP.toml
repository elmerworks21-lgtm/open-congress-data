congress_website_title = "AN ACT TO REQUIRE CERTAIN DISCLOSURES IN CONNECTION WITH ANY INTERNATIONAL MONEY TRANSFER AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to institutionalize an appropriate disclosure mechanism for financial institutions or money transmitting business that initiates international money transfers on behalf of a consumer - disclosures shall be before the consummation of the transfer to facilitate the transparent and cost-effective transaction. Proposes required disclosures such as any fees chargeable to the recipient, final itemization of all costs to the consumer, and the amount of foreign currency to be received."
