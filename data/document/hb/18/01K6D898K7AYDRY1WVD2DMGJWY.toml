congress_website_title = "AN ACT TO REGULATE THE FARE RATES OF TRANSPORT NETWORK COMPANIES AND TRANSPORTATION NETWORK VEHICLES SERVICE"
congress_website_abstract = "Provides that T N Cs and T N V S be subject for the full regulation and supervision by the L T F R B, specifically in the standardization of fare rates, system of refund in case of overcharging and adjustments of such standardized fare rates. States that fare rates for T N V S shall be determined and adjusted by the L T F R B taking into consideration the: a) make/type of the vehicle; b) year model; c) time of service; and d) distance covered."
