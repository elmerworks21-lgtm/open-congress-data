congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 7305, OTHERWISE KNOWN AS THE MAGNA CARTA OF PUBLIC HEALTH WORKERS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to honor the sacrifices and to show appreciation and gratitude to our fallen public health workers who died in battling the COVID-19 Pandemic. Proposes to provide educational assistance to one direct descendant/beneficiary of the COVID-19 heroes through their admission to any school, college, university, or institution authorized by the government, with all school fees at the expense of the government."
