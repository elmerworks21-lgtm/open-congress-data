congress_website_abstract = "Seeks to update and provide stiffer penalties imposed for child abuse, exploitation and discrimination in order to secure the wholesome rearing of our children for them to be protected and to become good citizens of our country. Increases penalties for any person committing the following acts: 1. Participation in production of obscene and indecent shows 2. Other acts of abuse, cruelty or exploitation and other conditions prejudicial to the child´s development 3. Child labor practices 4. Child trafficking 5. Discrimination of children of indigenous cultural communities."
