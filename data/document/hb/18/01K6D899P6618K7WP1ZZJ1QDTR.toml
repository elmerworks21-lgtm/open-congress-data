congress_website_title = "AN ACT REINSTATING AND AMENDING SECTION 67 OF BATAS PAMBANSA BILANG 881 OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "Proposes to reinstate the repealed provision regarding elective officials deemed resigned once they file their Certificate of Candidacy provided that they file for another position different from the ones they are currently holding. Proposes that any elective national or local official, running for any office other than the one he is holding in a permanent capacity [except for President and Vice-President] shall be ipso facto automatically resigned from his office upon the filing of his COC."
