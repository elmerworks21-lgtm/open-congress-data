congress_website_title = "AN ACT AMENDING SECTION 27 (B) OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to rectify the conflation and confusion in the new BIR Revenue Regulation No. 5-2021 Sec.2 (c), which provides that: proprietary educational institutions must be non-profit to qualify for the new tax rates under the C R E A T E Law. Seeks to address the new IRR of the BIR that unfairly imposes a 25 percent tax rate on private schools, which is 15 percent higher than the 10 percent previously being collected from private schools, regardless of whether it is non-profit or for-profit. Proposes to amend Sec.27 (B) of the NIRC Code of 1997, as amended, to read as follows: B) HOSPITALS WHICH ARE NON-PROFIT, AND ALL PROPRIETARY EDUCATIONAL INSTITUTIONS shall pay a tax of ten percent (10%) on their taxable income except those covered by Subsection (D) hereof: Provided, that beginning July 1, 2020, until June 30, 2023, the tax rate herein imposed shall be one percent (1%):..."
