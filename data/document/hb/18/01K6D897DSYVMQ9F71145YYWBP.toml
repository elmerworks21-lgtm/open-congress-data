congress_website_title = "AN ACT CREATING THE COMMUNITY HEALTH WORKER EDUCATION AND TRAINING PROGRAM, INCREASING COMPENSATION AND OTHER BENEFITS FOR BARANGAY HEALTH WORKERS (BHW), APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for a six-month education and training program, free of charge, for community-based health workers that shall train them as healthcare provider, community organizer, health service manager, trainer and education, and researcher. Increases the monthly basic pay of BHW to six thousand pesos (Php6,000.00) including incentives and benefits provided under the Magna Carta for Public Health Workers and shall be given burial and disability assistance in case of death or illness which results to disability, among others."
