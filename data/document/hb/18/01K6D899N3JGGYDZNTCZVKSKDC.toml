congress_website_title = "AN ACT AMENDING SECTION 12 (A) OF REPUBLIC ACT NO. 7610, OTHERWISE KNOWN AS “SPECIAL PROTECTION OF CHILDREN AGAINST ABUSE, EXPLOITATION AND DISCRIMINATION ACT”, AS AMENDED BY REPUBLIC ACT NO. 9231"
congress_website_abstract = "Aims to provide a uniform time in which children are not allowed to work, by prohibiting all minors, or those under eighteen (18) years of age, from working between eleven o´clock in the evening to seven o´clock in the morning (11 p.m. to 7 a.m.). Seeks to remove the current staggered time, by removing the differentiation between age group. Allows those in the creative industries; including child actors themselves, to maximize their available working hours, while still following the State´s declared policy of providing special protection to children, and preventing conditions prejudicial to their development."
