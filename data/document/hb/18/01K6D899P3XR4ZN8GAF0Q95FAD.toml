congress_website_title = "AN ACT IMPLEMENTING STRICTER MEASURES ON THE REGULATION AND CONTROL OF THE MANUFACTURE, SALE, AND DISTRIBUTION OF PNP UNIFORMS, INSIGNIAS, AND ACCOUTREMENTS AND PROVIDING FOR PUNISHMENT ON THE ILLEGAL PRODUCTION, SALE AND USE OF THE SAME"
congress_website_abstract = "Accords respect to the men and women of the Philippine National Police (PNP) by ensuring that the uniforms, including the official insignias and accoutrements are produced as per standard design and made accessible to the men and women who had earned the right to wear them. Safeguards the production, manufacture, sale and distribution of PNP uniforms and penalizes those who illegally produce, sell, and use the same."
