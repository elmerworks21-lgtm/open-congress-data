congress_website_title = "AN ACT MANDATING BANKING INSTITUTIONS TO STRENGTHEN THE FINANCING SYSTEM FOR AGRICULTURAL, FISHERIES AND RURAL DEVELOPMENT IN THE PHILIPPINES"
congress_website_abstract = "Aims to promote rural development by enhancing access of rural communities and agricultural and fisheries households to financial services and programs that increase productivity, enhance market efficiency, promote modernization and improve the welfare and economic prospects of beneficiaries in rural communities through active participation of banking institutions. States that agricultural, fisheries and rural development financing shall consist of loans, investments and grants to finance activities identified under the Agro-Industry Modernization Credit and Financing Program (AMCFP) as enumerated under Chapter 3, Section 23 of RA 8435, off-farm/fishery activities, agricultural mechanization/modernization, agri-tourim, green finance projects, acquisition of lands under the Agrarian Reform Code of the Philippines and its amendments, efficient and effective marketing, processing, distribution and storage of agricultural and fishery commodities, public rural infrastructure, as well as programs that shall address the development needs of rural communities, and all other activities as may be determined by the Agricultural and Fisheries and Capacity-Building Council (AFFCC). Mandates all banking institutions, except newly-established banks for a period of five (5) years from the date of commencement of the bank´s operations, shall set aside a credit quota, or a minimum mandatory agricultural and fisheries financing requirement of at least twenty-five percent (25%) of their total loanable funds as defined by the Bangko Sentral ng Pilipinas (BSP)."
