congress_website_title = "AN ACT AMENDING SECTIONS 7, 10, 23, 30, 31, 42 AND 52 OF REPUBLIC ACT NO. 8291, OTHERWISE KNOWN AS THE GSIS ACT OF 1997"
congress_website_abstract = "Seeks to propose amendments in the GSIS Act of 1997 to redress the law´s ineffective implementation, particularly in responding to the needs of teachers who comprise the largest group in terms of membership in the GSIS. Intends to recompense the improper computation of service including the charging of interests/surcharges/penalties on late remittances; to adjust coverage of benefits by GSIS to make them at par with the costs of living and the escalating inflation rate; and to enhance the law´s penalty clause to ensure that persons may be held accountable for prohibited acts committed. Proposes to broaden the prerogative of concerned parties in the settlement of disputes covered by the law, by giving the RTC concurrent jurisdiction with the GSIS; and to increase the representation of the DepEd in the Board of Trustees."
