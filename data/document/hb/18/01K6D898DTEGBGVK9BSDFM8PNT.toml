congress_website_title = "AN ACT CREATING A MANDATORY FREE SOUP KITCHEN ALLOCATING 3% OF THE INTERNAL REVENUE ALLOTMENT FOR EVERY IMPOVERISHED BARANGAY IN THE CITY OR MUNICIPALITY AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines \\\"Free Soup Kitchen\\\" as a place where food is offered to the hungry for free, frequently located in lower-income neighborhoods. Provides that the City or Municipality in coordination with the DSWD shall determine the impoverished barangay who upon consultation by the City or Municipality shall determine the frequency of days and hours/day in giving free lunch and dinner for the qualified beneficiaries."
