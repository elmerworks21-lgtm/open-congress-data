congress_website_title = "AN ACT ESTABLISHING AN ECONOMIC STIMULUS STRATEGY FOR THE COUNTRY'S GROWTH AND DEVELOPMENT IN THE AFTERMATH OF COVID-19, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Aims to provide immediate relief to critically impacted businesses and non-essential businesses to reduce permanent damage to the economy, maintain employment levels and have a demonstrable capacity to support economic output and preserve the country´s productive capacity. Provides four types of Economic Interventions such as: a. Transitional Interventions - mitigate the permanent damage by the Covid-19 crisis to the economy and maintain employment levels of the corresponding sector or industry; b. Financial Interventions - intended to accelerate recovery and improve economic performance of business entities by broadening and increasing financial and credit access; c. Sectoral - economic relief intended for specific sectors or industries; and d. Structural - measures designed to accommodate, close gaps in, or impose any sector or industry through an institutionalized mechanism or entity."
