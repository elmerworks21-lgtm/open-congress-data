congress_website_title = "AN ACT DEVELOPING GLOBALLY COMPETITIVE SCIENCE AND MATHEMATICS TEACHERS"
congress_website_abstract = "Seeks to attract above-average student and science graduates who majored in science or mathematics to join the teaching profession as science and mathematics teachers which shall have among others the following incentives: a.) priority in government scholarship grants; b.) temporary waiver of the requirement under Section 13, Art. III of RA 7836 to undergo the written Licensure Examination for Teachers to allow new graduates to be employed as science and mathematics teachers; c.) to teach in public and elementary and secondary schools for not more than three years d.) specialized continuing education and training in science and mathematics teaching; e.) rewards and recognition in cash and in kind for the top twenty slots in the LET; and f.) a starting salary grade, two grades higher than of a regular teacher."
