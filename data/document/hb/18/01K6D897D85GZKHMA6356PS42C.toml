congress_website_title = "AN ACT PROHIBITING THE DISPLAY OR ADVERTISEMENT OF GOVERNMENT OFFICIALS' NAMES AND PHOTOS IN ALL GOVERNMENT PROJECTS, SERVICES AND VEHICLES"
congress_website_abstract = "Seeks to address the issue regarding the prevalent practice of certain politicians of posting their names and/or photos in public works, government establishments, vehicles, service programs and campaigns. Intends to prohibit and penalize said government officials who habitually takes the credit of any public work, project, assistance or program accomplished by the government through affixing, or causing to be affixed the name, initials, logo or image of any public official to a signage."
