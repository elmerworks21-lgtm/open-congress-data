[meta]
bill_number = 8080
congress = 18
title = "INSTITUTING SERVICES FOR LEARNERS WITH DISABILITIES (LWDS) IN SUPPORT OF INCLUSIVE EDUCATION ACT"
date_filed = "2020-11-25"
long_title = "AN ACT INSTITUTING SERVICES FOR LEARNERS WITH DISABILITIES IN SUPPORT OF INCLUSIVE EDUCATION, ESTABLISHING INCLUSIVE LEARNING RESOURCE CENTERS IN ALL SCHOOL DISTRICTS, PROVIDING FOR STANDARDS, AND APPROPRIATING FUNDS THEREFOR"
scope = "National"
subjects = [ "Leaners with Disability", "Inclusive Education",]
congress_website_author_codes = ["J089"]
congress_website_coauthors_raw = ["MACEDA, EDWARD","LARA, JOSEPH LASAM","VELASCO, LORD ALLAN JAY Q.","TAN, ANGELINA \"HELEN\" D.L. M.D."]
congress_website_committee_codes = ["0532","C501","0504"]
congress_website_primary_keys = [119930]
congress_website_title = "AN ACT INSTITUTING SERVICES FOR LEARNERS WITH DISABILITIES IN SUPPORT OF INCLUSIVE EDUCATION, ESTABLISHING INCLUSIVE LEARNING RESOURCE CENTERS IN ALL SCHOOL DISTRICTS, PROVIDING FOR STANDARDS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to provide inclusive education for children and youth with special needs by providing them appropriate public education and related services according to their needs, and in preparation for adult living and community life. Provides partnership mechanism of the DepEd and the concerned agencies to coordinate and enter into cooperative agreement , arrangement or contract with other government agencies, private and non-profit agencies, institutions or organizations duly accredited or recognized by the government agencies, civil society, business and industrial sector, and other concerned sectors in the furtherance of the provisions of this Act. Creates an Inter-Agency Coordinating Council for Learners with Disabilities which shall be attached to the DepEd for policy integration, harmonization, and coordination of functions. Mandates the DepEd to undertake continuing research to identify and design programs that shall meet the full range of needs of LWDs."
