congress_website_title = "AN ACT AMENDING SECTION 9 AND SECTION 27 OF REPUBLIC ACT NO. 8189 OR THE VOTER'S REGISTRATION ACT OF 1996"
congress_website_abstract = "Seeks to amend Sec.9 of R.A.No.8189 by requiring the presentation not only proof of identity but also proof of residence for the purpose of voter's registration to prevent the problem of perennial flying voters. Proposes several proofs of residence such as tax declaration or receipt of payment of real property tax, or a certification from the landowner or less of residential unit, where he/she is residing at the time of registration; recent household utility bill under his/her name; and affidavit of at least two witnesses who are residents of the place where he/she proposes to vote. Seeks to amend Sec. 27 of the same Act by removing from the list the provision on disenfranchising registered voters who failed to vote in the two (2) succeeding regular elections."
