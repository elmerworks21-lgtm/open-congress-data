congress_website_abstract = "Proposes to recognize the economic value of the domestic labor that stay-at-home/full-time mothers perform; Entitles them to a monthly compensation of FIVE THOUSAND PESOS (Php5,000.00), whose family´s annual income falls below the country´s poverty threshold and who are noted gainfully employed. Provides guidelines or conditions to qualify for such compensation per month."
