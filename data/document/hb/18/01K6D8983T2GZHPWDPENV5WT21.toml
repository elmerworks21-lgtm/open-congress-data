congress_website_title = "AN ACT ESTABLISHING A UNIFIED HOUSING AND URBAN DEVELOPMENT FUND AND A CENTRALIZED HOME FINANCING PROGRAM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7835, OTHERWISE KNOWN AS THE \\\"COMPREHENSIVE AND INTEGRATED SHELTER FINANCING ACT (CISFA) OF 1994\\\""
congress_website_abstract = "Seeks to amend key provisions of RA 7835 or the Comprehensive and Integrated Shelter Finance Act (CISFA) of 1994 to establish, among others, a Unified Housing and Urban Development Fund to make long-term and affordable financing for housing purposes accessible for qualified low-income earners in need of a home of their own even they are not members of the SSS, GSIS of the Pag-IBIG Fund. Further aims to establish a Centralized Home Financing Program that shall be sourced out by tapping key fund sources already been identified by law: among them, RA 7835 or CISFA, RA8282 or the amended SSS charter, RA8291 of the amended GSIS Charter and RA9679 of the new Pag-IBIG Fund Charter."
