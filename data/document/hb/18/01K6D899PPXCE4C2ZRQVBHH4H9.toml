congress_website_title = "AN ACT DECLARING THE PHILIPPINE MERCHANT MARINE ACADEMY AS THE NATIONAL MARITIME ACADEMY, EXPANDING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Declares the Philippine Merchant Academy as the National Maritime Academy with a mission of molding merchant marine professional imbued with nationalism, leadership, traits, and positive character development and excellence in their profession, and endeavor to contribute positively to society and their respective communities. Grants PMMA the academic freedom and institutional autonomy pursuant to paragraph 2, Section 5 of Article XIV of the Constitution; to establish a National Maritime Research and Policy Center which shall engage in research for the development and advancement of the maritime industry; and to develop, design, deploy, and confer degrees as appropriate, in accordance with the Philippine Qualifications Framework (PQF) Level II to VII and covering technical-vocational education and training (TVET), undergraduate, and graduate programs in the fields of maritime and allied disciplines, among others. Mandates graduates of the undergraduate degree programs of the PMMA who will opt to work in the merchant marine industry, either in domestic or international trade, to provide a minimum of four (4) years cumulative full-time service to the government in any of its agencies or instrumentalities, including GOCCs, within ten (10) years after graduation. They shall also be commissioned as officers of the PN Naval Reserve Command with the rank of ensign and shall be called to serve by the Commander-in-Chief in times of war or national emergency."
