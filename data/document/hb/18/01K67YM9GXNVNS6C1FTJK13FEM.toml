congress_website_title = "AN ACT PROVIDING FOR A MANDATORY IMMUNIZATION PROGRAM, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 10152, OTHERWISE KNOWN AS THE “MANDATORY INFANTS AND CHILDREN HEALTH IMMUNIZATION ACT OF 2011”"
congress_website_abstract = "Seeks to establish a National Immunization Program under the Department of Health (DOH), which shall ensure that the population is equitably protected from vaccine-preventable diseases such as Tuberculosis, Diphtheria, Tetanus And Pertussis, Poliomyelitis, Measles, Mumps, Rubella, Hepatitis-B, Human Influenza Type-B, Rotavirus, Japanese Encephalitis, Pneumococcal Conjugate Vaccine (PCV), Human Papilloma Virus (HPV), and booster for Measles, Rubella, Tetanus, Diphtheria ( MRTD) and such other types as may be determined by the Secretary of Health. Mandates PhilHealth to include the mandatory immunization services specified under this Act in its benefit package. Creates the National Immunization Technical and Advisory Group (NITAG) that shall serve as a technical and independent multi-disciplinary advisory body to provide evidence-based policy and program decisions on immunization and vaccines to the DOH."
