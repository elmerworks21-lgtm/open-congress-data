congress_website_abstract = "Seeks to provide an incentive for college students to finish their four year courses and enhance the capacity or competencies of graduates of four-year degree programs by automatically entitling them to a sub-professional civil service eligibility. Intends to enable current but efficient, loyal, dependable and deserving government employees without civil service eligibility to acquire job security."
