congress_website_title = "AN ACT ABOLISHING THE BUREAU OF CUSTOMS, CREATING FOR THE PURPOSE THE CUSTOMS DEVELOPMENT AUTHORITY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes to replace the BOC with a new entity with a corporate structure to enhance customs efficiency and administration. Seeks to allow Customs Development Authority to outsource or privatize some of its administrative functions subject to some terms and conditions to curtail customs bureaucracy and corruption; Intends to promote competition and encourage private participation in customs operation. Proposes the powers and functions of the Authority: assess and collect customs revenues from imported goods accruing under R.A.10863 (Customs Modernization and Tariff Act); facilitate the movement of goods in international trade; prevent the entry of smuggled goods through border control; prevent and suppress customs fraud; prevent the entry of contraband; supervise and control the entrance and clearance of vessels and aircrafts engaged in foreign commerce; supervise and control all import and export cargoes; and others."
