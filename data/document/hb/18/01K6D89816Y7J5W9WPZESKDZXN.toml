congress_website_title = "AN ACT PROVIDING MEDICAL SCHOLARSHIP TO QUALIFIED STUDENTS IN ALL MUNICIPALITIES, ESTABLISHING FOR THIS PURPOSE THE ONE TOWN: ONE DOCTOR SCHOLARSHIP PROGRAM, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to ensure that there will be a steady and sustainable supply of medical doctors to fill in the present gaps as well as address the anticipated increase demand in line with the full implementation of the Universal Health Care law. Provides the necessary intervention through a state-sponsored scholarship program for those qualified students to become doctors to be able to provide dependable healthcare services to all Filipino especially those living in rural areas. Intends to tap and nurture homegrown talents of a community, and tuition repayment will be in the form of return service to the community; Seeks to require the medical scholar to serve for at least four (4) years in public hospitals or rural health units and shall accordingly be given the appropriate rank and salary."
