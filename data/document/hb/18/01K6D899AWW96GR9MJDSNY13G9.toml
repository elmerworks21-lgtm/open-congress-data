congress_website_title = "AN ACT APPROPRIATING THE SUM OF FIFTY-FOUR BILLION AND SIX HUNDRED MILLION PESOS (P54,600,000,000.00) AS SUPPLEMENTAL BUDGET FOR THE PENSION AND GRATUITY FUND"
congress_website_abstract = "Intends to resolve the outcome of the suspension of the indexation of the pension of retired Military Uniformed Personnel (MUP)with the base pay increase of those in the active service, where such suspension was later lifted, resulting in the 2018 pension differential. Seeks to appropriate a supplemental budget for the unpaid pension differentials of retired MUP of the AFP as well as the retired uniformed personnel of the Philippine National Police, Bureau of Fire Protection, Bureau of Jail Management and Penology, Philippine Coast Guard, and National Mapping and Resource Information Authority to ensure the final settlement of such long-overdue account."
