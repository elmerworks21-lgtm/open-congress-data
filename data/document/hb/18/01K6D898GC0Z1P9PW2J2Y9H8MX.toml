congress_website_title = "AN ACT CREATING THE SOCIAL HOUSING DEVELOPMENT AND FINANCE CORPORATION"
congress_website_abstract = "Intends to make available affordable decent housing and basic services to underprivileged and homeless citizens in urban centers and resettlement areas. Seeks among others, to establish a more independent, well-organized and transparent SHDFC that is more responsive to the housing needs of the Filipino people; defines its powers and functions; mandates the supervision, control and implementation of specified socialized housing programs; and prescribes the qualification of the President of the corporation."
