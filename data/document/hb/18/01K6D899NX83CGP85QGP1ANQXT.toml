congress_website_title = "AN ACT PROVIDING FOR A 30-YEAR NATIONAL INFRASTRUCTURE PROGRAM"
congress_website_abstract = "Provides the policies and strategies to be pursued by Government in order to develop the component national infrastructure projects. Provides additional list and brief description of core national infrastructure projects to be given priority in the 30-Year Program. Mandates NEDA, in coordination with the Oversight and Implementing Agencies, to formulate the details of the 30-Year National Infrastructure Program, divided into six phases of five years each. Mandates implementing agencies to formulate their Medium-Term Infrastructure Programs and Annual Infrastructure Budgets (AIBs) to be integrated into the National Expenditure Programs (NEPs) for submission to the Congress as basis of the General appropriations Acts (GAAs)."
