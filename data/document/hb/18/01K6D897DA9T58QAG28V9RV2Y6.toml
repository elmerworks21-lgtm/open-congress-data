congress_website_title = "AN ACT AMENDING SECTIONS 9 AND 41 OF RA 8291, OTHERWISE KNOWN AS THE \\\"GOVERNMENT SERVICE INSURANCE ACT OF 1997\\\" BY DEFINING \\\"BASIC MONTHLY PENSION\\\" AND INCREASING THE MEMBERSHIP OF THE BOARD OF TRUSTEES OF THE GSIS"
congress_website_abstract = "Amends Republic Act No. 8291 with regard to the retirement packages for retirees, simplifying the computation of the same and by using the latest monthly salary of the retiring employee as basis for the computation of the pension and not the Basic Monthly Pension (BMP) derived from the Average Monthly Salary (AMC) of the retiring employee and by including a representative from the Civil Service Commission in the membership of the Government Service Insurance Board pursuant to its mandate to administer the retirement program for government officials and employees."
