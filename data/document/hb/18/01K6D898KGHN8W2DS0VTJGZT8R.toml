congress_website_title = "AN ACT AMENDING THE REVISED PENAL CODE'S ARTICLE 315 TO INCLUDE WILFUL NON-PAYMENT OF CORRECTLY IMPOSED PUBLIC TRANSPORTATION FEES AS A MODE OF COMMITTING ESTAFA"
congress_website_abstract = "Aims to give protection to the drivers, riders and delivery men of common carriers or the new transportation methods such as Grab, Angkas, Lala Move, and Joy Ride. Proposes therefore to amend the definition of Estafa or Swindling in order to prevent abuses of the new methods of engaging common-carriers who usually risk both their own funds and safety in delivering passengers and goods to their final destination. Declares that any person who shall defraud another by \\\"willful refusal to pay the properly imposed fees to any common-carrier, regardless of the amount due\\\" shall be punished under Art.315 of Act No.3815 of the Revised Penal Code."
