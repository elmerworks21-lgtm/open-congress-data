congress_website_title = "AN ACT PUNISHING DOG MEAT TRADE"
congress_website_abstract = "Seeks to address the failure in the implementation of existing Animal Welfare Act (R.A.No.8485) and the Anti-Rabies Act (R.A.No.9482) enacted for the protection of animals in this case dogs, against farming or capture, transport, and/or sale of live dogs for purposes of trading dog meat; transporting, trading, selling, and/or purchasing dog meat; and slaughter of dogs for the purposes of trading dog meat. Intends to enact stiffer penalties for persons who engage in any of the stages of the dog meat trade, and to allocate the funds collected therefor on the implementation of this Act."
