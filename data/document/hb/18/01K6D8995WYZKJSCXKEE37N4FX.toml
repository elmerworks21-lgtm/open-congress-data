congress_website_title = "AN ACT PROVIDING FOR ADDITIONAL MECHANISMS TO ACCELERATE THE RECOVERY AND BOLSTER THE RESILIENCY OF THE PHILIPPINE ECONOMY, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to provide additional economic stimulus package to help the government to recover from the adverse impact of the COVID-19 pandemic . Proposes to allocate 108 billion pesos for additional social amelioration to impacted households, 100 billion pesos for capacity building to impacted sectors, 52 billion pesos for wage subsidies, 70 billion pesos for capacity building for agricultural producers, 30 billion pesos for allowances to students and teachers, 30 billion pesos for assistance to displaced workers, 25 billion pesos for COVID-19 treatment and vaccines, and 5 billion pesos for the rehabilitation of typhoon-affected areas."
