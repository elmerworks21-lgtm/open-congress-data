congress_website_title = "AN ACT INSTITUTIONALIZING THE PARTICIPATION OF CIVIL SOCIETY ORGANIZATIONS IN THE ANNUAL NATIONAL BUDGET PROCESS AND PROVIDING EFFECTIVE MECHANISMS THEREFOR"
congress_website_abstract = "Aims to facilitate the establishment of adequate consultation and feedback mechanisms to promote meaningful and effective participation of civil society organizations (CSOs) in the preparation and authorization of the annual national budget. Mandates the Offices of the Secretary of the Senate, the Secretary General of the House of Representatives, the Supreme Court Clerk of Court, and the Office of the Chairman of the Constitutional Offices to process the application for accreditation of civil society organizations. Requires all NGAs and GOCCs to formulate and adopt guidelines outlining the mechanism for accreditation and active participation of the CSOs in the preparation of the annual national budget."
