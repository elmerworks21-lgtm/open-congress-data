congress_website_title = "AN ACT PROVIDING FOR THE DEVELOPMENT OF SUSTAINABLE CITIES AND COMMUNITIES IN THE COUNTRY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to address extreme poverty and inequality brought about by the rapid growth of cities, coupled with increasing rural to urban migration in line with the country's commitment with the United Nations Sustainable Development Goals ( S D Gs ). Provides a model for sustainable cities and communities for existing ones by ensuring access to safe and affordable housing, upgrading highly dense slum settlements, investing in public transport, creating green public spaces and improving urban planning through inclusive and participatory management. States the N E D A shall set targets based on several indicators to determine if a city or community has fully transitioned into a sustainable one: urban population living in slums; public transport access; protecting cultural heritage; economic losses, deaths and injuries from natural disasters; solid waste management and urban air pollution, open and safe spaces in cities, urban and regional planning; integrated and local disaster risk management."
