congress_website_coauthors_raw = ["VELASCO, LORD ALLAN JAY Q."]
congress_website_committee_codes = ["0527","0532"]
congress_website_primary_keys = [155562]
congress_website_title = "AN ACT CREATING A SYSTEM OF PARTNERSHIP BETWEEN LOCAL GOVERNMENTS AND CIVIL SOCIETY ORGANIZATIONS THROUGH THE ESTABLISHMENT OF A PEOPLE'S COUNCIL IN EVERY LOCAL GOVERNMENT UNIT, PRESCRIBING ITS POWERS AND FUNCTIONS AND PROVIDING FOR ITS PARTICIPATION IN THE LOCAL SANGGUNIAN AND LOCAL BOARDS, COUNCILS, COMMITTEES, TASK FORCES OR SIMILAR WORK GROUPS"
congress_website_abstract = "Seeks to ensure participation of citizens in all avenues of local governance by creating a mechanism where citizens´ views and opinions may be heard and considered. Allow Civil Society Organizations (CSOs) to be duly recognized and allowed to participate in local governance provided they have actively operated for at least one (1) year in the city or municipality where majority of its members reside, and must apply for accreditation with the local sanggunian. Defines the functions of the Committee for the Accreditation of CSOs; Enumerates the rights and privileges of the accredited CSOs; Creates the People´s Councils which shall determine its own organizational structure and internal rules, among others."
