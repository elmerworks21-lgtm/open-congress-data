congress_website_title = "AN ACT TO AMEND SECTION 2 OF REPUBLIC ACT NO. 1405 OTHERWISE KNOWN AS THE \\\"SECRECY OF BANK DEPOSITS LAW\\\", EXEMPTING GOVERNMENT OFFICIALS AND EMPLOYEES FROM THE PROHIBITION AGAINST DISCLOSURE OF OR INQUIRY INTO DEPOSITS WITH ANY BANKING INSTITUTION AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to amend R.A. No.1405 so that law enforcement authorities will be equipped with the tools needed to go after crooks in government which shall be summarized as follows: \\\"All deposit are strictly confidential and may not be inquired or looked into except on the following grounds: upon permission of the depositor, in cases of impeachment; upon order of a competent court in cases of bribery or dereliction of duty; and in cases where the money deposited or invested is the subject matter of litigation OR WHEN THE DEPOSITOR IS AN ELECTIVE OR APPOINTIVE OFFICIAL OR EMPLOYEE OF THE REPUBLIC OF THE PHILIPPINES INCLUDING THE OFFICERS AND MEMEBERS OF THE AFP, THE PNP, AND ALL THE MEMBERS OF THE UNIFORMED SERVICES, AND OFFICERS AND EMPLOYEES OF GOCCs AND THEIR SUBSIDIARIES."
