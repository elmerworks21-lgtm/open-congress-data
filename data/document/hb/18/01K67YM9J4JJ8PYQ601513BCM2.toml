congress_website_title = "AN ACT MODERNIZING THE BUREAU OF IMMIGRATION BY DEFINING ITS POWERS AND FUNCTIONS, FURTHER PROFESSIONALIZING ITS ORGANIZATION, UPGRADING THE COMPENSATION AND BENEFITS OF ITS OFFICIALS AND EMPLOYEES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to modernize the structure and mechanisms of the Bureau of Immigration to be more responsive to the development and challenges of migration and immigration requiring a wider scope of functions and jurisdictions. Seeks the expansion of the Immigration´s organization structure and upgrades the existing positions of immigration personnel and administrative staff to adequately meet the country´s rapidly increasing immigration services. Harmonizes existing immigration rules and regulations pertaining to issuance of visas to foreign nationals."
