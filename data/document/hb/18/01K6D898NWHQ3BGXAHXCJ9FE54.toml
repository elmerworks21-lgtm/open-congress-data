congress_website_title = "AN ACT REPEALING REPUBLIC ACT NO. 10912, OTHERWISE KNOWN AS THE “CONTINUING PROFESSIONAL DEVELOPMENT ACT OF 2016”"
congress_website_abstract = "Intends to properly address the effect of the implementation of the CPD law as it does not serve the interest of the Filipino professionals due to the unnecessary and unreasonable requirements set through the law which almost jeopardize their practice. Proposes to repeal the law which was supposed to promote lifelong learning among Filipino Professionals but instead turned out to put greater burden to them because they are forced to spend a bulk of their salary, take absences from work, and go through unreasonable hardships."
