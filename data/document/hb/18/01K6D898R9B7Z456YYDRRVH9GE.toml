congress_website_title = "AN ACT TO ENHANCE INTER-LGU COOPERATION BY AMENDING CERTAIN PROVISIONS IN BOOK I OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE “LOCAL GOVERNMENT CODE OF 1991”"
congress_website_abstract = "States that LGUs may group themselves, consolidate, or coordinate their efforts, services, and resources for purposes commonly beneficial to them THROUGH MUTUAL AGREEMENT OR THROUGH THE FORMATION OF AN ALLIANCE WITH A LEGAL PERSONALITY. Provides that a National Registry of Alliances ( N R A ) shall be formed to register the alliance of LGUs and establish the legal personality and all the consequent implications of the same. Refers Inter-Local Cooperation to the arrangement wherein geographically adjacent local government units (LGUs) agree to jointly plan and implement development projects, programs, and initiatives."
