congress_website_title = "AN ACT STRENGTHENING THE ROLES AND FUNCTIONS OF THE PHILIPPINE ECONOMIC ZONE AUTHORITY (PEZA) TO ACCELERATE COUNTRYSIDE DEVELOPMENT THROUGH ROBUST CREATION OF SPECIAL ECONOMIC ZONES IN RURAL AND NEW GROWTH AREAS, ENHANCING THE INCENTIVES THEREOF AND AMENDING FOR THIS PURPOSE, REPUBLIC ACT NO. 7916, OTHERWISE KNOWN AS \\\"THE SPECIAL ECONOMIC ZONE ACT OF 1995\\\", AS AMENDED BY RA 8748"
congress_website_abstract = "Seeks to strengthen the PEZA by providing the following: 1) additional powers and functions of the authority to be more proactive and responsive to the demands of the local and international business markets; 2) establishment of a globally competitive and conducive investment climate and facility; 3) competitive and appropriate incentives package in order to attract more investors to the countryside; 4) creation of opportunities for more investment portfolios; 5) increased financial capability of the designated authority; 6) reduced import dependence by empowering, capacitating and incentivizing domestic enterprises, farmers, fishermen and every Filipino; and 7) more empowered and capable LGUs that are self-reliant, self-sustaining and resource-generating to enjoy social progress, peace and prosperity."
