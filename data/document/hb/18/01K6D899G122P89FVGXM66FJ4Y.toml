congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 10642 OTHERWISE KNOWN AS THE \"PHILIPPINE LEMON LAW\" AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to address the technical hardships and non-warranted troubles experienced by motor vehicle buyers in claiming and invoking their rights under the Philippine Lemon Law. Defines CRITICAL NONCONFORMITY ISSUE TO ANY DEFECT WHICH COULD AFFECT THE CONTROL OR DIRECTIONAL STABILITY OF THE VEHICLE, OR CAUSE INJURY TO THE PEOPLE INSIDE OR OUTSIDE THE VEHICLE, and provides condition when a replacement with a brand new motor vehicle is necessary."
