congress_website_title = "AN ACT TO PROVIDE YOUTH SUICIDE INTERVENTION AND PREVENTION"
congress_website_abstract = "Seeks to: include Life Planning course in the elementary and secondary education curriculum; implement a peer counseling group program; conduct a nationwide public education suicide awareness campaign; employ at least one psychologist in every school for monthly counseling alignment sessions; to establish a network of health facilities and teen centers to address identified youth issues. Provides that Life Planning Education (LPE) shall require lectures and discussions on self and identity; personal, family, community values; communication and interrelationship with others; sexuality and gender roles; community participation; health; psychological thinking and employment, among others."
