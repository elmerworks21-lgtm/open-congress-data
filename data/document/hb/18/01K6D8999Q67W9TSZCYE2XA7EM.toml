congress_website_title = "AN ACT REQUIRING THE DEPARTMENT OF ENVIRONMENT AND NATURAL RESOURCES TO CONDUCT A FEASIBILITY STUDY FOR APPLYING AIRPORT BUBBLES AS A METHOD OF IDENTIFYING, ASSESSING, AND REDUCING THE ADVERSE ENVIRONMENTAL IMPACTS OF THE AIRPORT GROUND AND FLIGHT OPERATIONS AND IMPROVING THE OVERALL QUALITY OF THE ENVIRONMENT"
congress_website_abstract = "Requires the Secretary of the Department of Environment and Natural Resources to conduct a feasibility study for applying airport bubbles in preventing detrimental effects of flight operations and pollution to the environment. Defines “Airport bubble” as an area 1.) in and around an airport, or other facility using aircraft, within which sources of pollution and level of pollution from those sources are to be identified and reduced and; 2.) containing a variety of types of air, noise, water, and solid waste sources of pollution in which the aggregate of each type of pollutant from the respective sources is regulated as if the various sources were single source."
