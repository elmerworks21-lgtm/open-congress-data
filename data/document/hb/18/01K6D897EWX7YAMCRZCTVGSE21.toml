congress_website_title = "AN ACT EXEMPTING THE SYSTEM LOSS CHARGE COMPONENT IN THE SALE OF ELECTRICITY BY DISTRIBUTION COMPANIES AND ELECTRIC COOPERATIVES FROM THE COVERAGE OF THE VALUE-ADDED TAX, AMENDING FOR THE PURPOSE SECTION 109 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Aims to resolve the issue as regards to the primary reason for higher power rates in Luzon as compared to other countries which is the absence of government subsidies for electricity. Intends to address the injustice being suffered by the electricity consumers which is an illegal imposition of Value-Added Tax upon System Loss charge as they are taxed for goods/services they have not actually consumed."
