congress_website_title = "AN ACT ESTABLISHING A DEVELOPMENTAL, STANDARDIZATION, AND INCENTIVIZATION FRAMEWORK FOR THE ESTABLISHMENT OF SMART CITIES AND MUNICIPALITIES NATIONWIDE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to employ the proper application of technology to address several issues faced by many Filipinos living in dense metropolitan areas; Intends to create a developmental, standardization, and incentivization framework for local government units to spur the creation of Smart Cities nationwide - while respecting the principle of local autonomy; Provides that the term \\\"smart city\\\" denotes an \\\"instrumented, interconnected and intelligent city\\\" whereas \\\"instrumented\\\" refers to the capability of capturing and integrating live real-world data through the use of sensors, meters, appliances, personal devices, and other similar sensors; Provides an incentivazation program called Smart Innovation and City Acceleration Program or S I C A P."
