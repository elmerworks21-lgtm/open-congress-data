long_title = "AN ACT TAXING PERSONS ENGAGED IN PHILIPPINE OFFSHORE GAMING OPERATIONS AMENDING SECTION 25, SECTION 27, SECTION 108 AND ADDING A NEW SECTION 125-A OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
scope = "National"
subjects = [ "Taxes/Taxation", "Philippine Offshore Gaming Operations (POGO)", "National Internal Revenue Code (NIRC)",]
congress_website_author_codes = ["C102"]
congress_website_coauthors_raw = ["SINGSON-MEEHAN, KRISTINE","VELASCO, LORD ALLAN JAY Q.","MACEDA, EDWARD"]
congress_website_committee_codes = ["0532","0542"]
congress_website_primary_keys = [20049]
congress_website_title = "AN ACT TAXING PERSONS ENGAGED IN PHILIPPINE OFFSHORE GAMING OPERATIONS AMENDING FOR THE PURPOSE SECTION 25 AND ADDING A NEW SECTION 150-C OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Seeks to impose tax on alien individual who is a permanent resident of a foreign country and who is employed and assigned in the Philippines by an offshore gaming licensee equivalent to twenty-five percent (25%) of the salaries, wages, annuities, compensation, remuneration and other emoluments, such as honoraria and allowances received from such licensee. Imposes a tax equivalent to five percent (5%) based on the gross revenue or receipts derived from gaming operations and similar related activities of all offshore gaming licensees."
