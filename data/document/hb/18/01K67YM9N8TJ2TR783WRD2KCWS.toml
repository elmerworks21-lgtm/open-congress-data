congress_website_title = "AN ACT REGULATING THE PRODUCTION, IMPORTATION, SALE, DISTRIBUTION, PROVISION, USE, RECOVERY, COLLECTION, RECYCLING, AND DISPOSAL OF SINGLE-USE PLASTIC PRODUCTS"
congress_website_abstract = "Seeks to impose a ban on the production, importation, sale, provision and use of single-use plastics to curb the growing problem of plastic pollution in the country. Provides for a gradual phase out of single-use plastic products, a program for the shift to the use of biodegradable plastics, encouragement of the use of reusable, recyclable, and retrievable products, a recovery program for the significant reduction in consumption and increased recovery for recycling and treatment, or proper disposal of single-use plastic products, the role of local government units, penalties for violators, a program for affected workers of the plastic industry and support for affected manufacturers of plastic products, among others."
