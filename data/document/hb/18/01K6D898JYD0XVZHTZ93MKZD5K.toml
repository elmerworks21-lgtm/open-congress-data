congress_website_title = "AN ACT TO FURTHER STRENGTHEN THE ANTI-MONEY LAUNDERING LAW, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9160, OTHERWISE KNOWN AS THE ANTI-MONEY LAUNDERING ACT OF 2001, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to implement plan to include legal framework addressing money laundering, terrorism financing, proliferation of financing weapons of mass destruction, and the framework for supervision of financial institutions and designated non-financial businesses and professions. Introduces therefore several amendments to Republic Act No.9160, as amended which includes: a) inclusion of real estate agents as covered persons; b) inclusion of tax crimes and violation of the Strategic Trade Management Act which indirectly includes proliferation of weapons of mass destruction as a predicate offenses to money laundering; c) enhancement of the investigative powers of the A M L C; d) authority of the A M L C to implement targeted financial sanctions on proliferation financing; e) prohibition on the issuance of injunctive relief against freeze orders and forfeiture proceedings; f) and retention of portion of forfeited assets."
