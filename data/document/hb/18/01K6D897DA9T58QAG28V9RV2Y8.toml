congress_website_title = "AN ACT AMENDING SECTIONS 10 AND 13 OF RA 10912, OTHERWISE KNOWN AS THE \\\"CONTINUING PROFESSIONAL DEVELOPMENT ACT OF 1996êžŒ\\\" BY EXEMPTING OFW'S FROM THE COVERAGE OF THE CPD LAW AND PROVIDING FOR MANDATORY PAID LEAVE AND COST SHARING OF EXPENSES IN COMPLYING WITH THE CPD LAW"
congress_website_abstract = "Mandates all employers, whether in the public or private sectors, to share in the cost of an employee´s compliance with the CPD Law by shouldering at least fifty percent (50%) of the cost of such compliance; and all professionals shall be given mandatory paid leave in sufficient number of days necessary to comply with the requirements of this Act. Exempts OFWs who are engaged in the practice of their profession outside the Philippines from the CPD Law."
