congress_website_title = "AN ACT CREATING THE EMERGENCY RESPONSE DEPARTMENT (ERD), APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to establish the Emergency Response Department which shall prepare, integrate, coordinate, implement, supervise, control, monitor, and evaluate all plans, programs, projects, and activities of the Government on humanitarian emergency assistance and disaster risk reduction and management. Mandates the Department to assume the policy-making, coordination, integration, supervision, monitoring and evaluation functions currently logged with the existing NDRRMC, and shall take over all of the latter´s responsibilities enumerated in Section 6 of RA 10121 and the functions of the OCD as enumerated in Section 9 of the same law. Designates the Department as the manager of the Human Emergency Assistance and Disaster (HEAD) Fund to ensure accountability and the responsible use of public funds and all monetary donations or otherwise. Gives visitorial powers to ensure that funding and donations to all entities are used actually, directly, and exclusively for disaster risk reduction efforts."
