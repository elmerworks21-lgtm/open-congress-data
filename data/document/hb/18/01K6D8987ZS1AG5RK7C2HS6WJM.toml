congress_website_title = "AN ACT STRENGTHENING THE COMMISSION ON ELECTIONS, AMENDING FOR THE PURPOSE PERTINENT PROVISIONS OF BATAS PAMBANSA 881, OTHERWISE KNOWN AS THE \"OMNIBUS ELECTION CODE\", AS AMENDED, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for several amendments and/or insertions to Sec.53, Art.VII of B.P.881, which includes, among others: Sec.53-A. \"AUTOMATIC CREATION OF POSITIONS OF ELECTION OFFICERS...\"; Sec.53-B. \"RATIO OF ELECTION ASSISTANTS TO REGISTERED VOTERS...\"; Sec.53-C. \"NO OTHER PERSONNEL, OTHER THAN THOSE MENTIONED IN SEC.53 HEREOF, OR EXPRESSLY AUTHORIZED BY LAW, SHALL BE ASSIGNED, DESIGNATED, ENGAGED OR DETAILED AT THE COMMISSIONS'S FIELD OFFICES, OR SHALL BE ALLOWED TO PERFORM ADMINISTRATIVE OR CLERICAL WORKS IN ACCORDANCE WITH THE MANDATE OF THE FIELD OFFICES ...\" Also provides for an amended Sec. 55 which shall be read as follows: \"COMELEC SHALL PROVIDE AN ACCESSIBLE AND SUITABLE PLACE FOR ITS FIELD OFFICERS AND THEIR STAFF, CHARGEABLE TO ITS YEARLY APPROPRIATIONS.\""
