congress_website_title = "AN ACT PROVIDING BROADER PROTECTION TO CONSUMERS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7394, OTHERWISE KNOWN AS THE `CONSUMER ACT OF THE PHILIPPINES´"
congress_website_abstract = "Intends to increase penalties and sanctions on unscrupulous, deceitful, and dishonest merchants; and to endeavor for the integration and utilization of ICT to conform with the current trends in the market. Proposes for the following amendments, among others: Definition of terms, among others: “BUSINESS NAME, FIRM NAME, OR STYLE” to include ANY ELECTRONIC EVIDENCE OF AGREEMENT, BUSINESS TRANSACTION OR ADVERTISEMENT THROUGH INFORMATION AND COMMUNICATIONS TECHNOLOGY (ICT) MEDIA, INCLUDING VOICE, VIDEO, AND OTHER FORMS OF DATA; “MASS MEDIA” to include INTERNET, MOBILE PHONE, LANDLINE as additional means or methods to convey advertising messages; Publication of consumer product standards in THE OFFICIAL GAZETTE OR IN THE DEPARTMENT´S OFFICIAL WEBSITE; Amendments regarding Declaration of the injurious, unsafe or dangerous character of a consumer product; Regulation of unprocessed food; Breach of warranties; Repair service obligation; False, deceptive or misleading advertisement; Consumer complaints, and others."
