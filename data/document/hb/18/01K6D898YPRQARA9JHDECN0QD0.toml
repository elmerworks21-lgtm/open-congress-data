congress_website_title = "AN ACT MANDATING GOLF CLUBS TO PROVIDE SOCIAL SECURITY AND WELFARE BENEFITS TO GOLF CADDIES AND OTHER RELATED SERVICE WORKERS THROUGH A SHARED CONTRIBUTION SCHEME"
congress_website_abstract = "Mandates that payment of SSS, Pag-IBIG Fund and PhilHealth monthly contributions shall be jointly shared by the golf caddies and other related service workers, and the golf club management in accordance with existing rules and regulations. Provides golf caddies and other related service workers retirement benefits under Republic Act No. 11199, otherwise known as the “Social Security Act of 2018.”"
