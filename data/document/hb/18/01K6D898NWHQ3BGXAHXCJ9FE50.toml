congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7581, AS AMENDED, OTHERWISE KNOWN AS THE “PRICE ACT” AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to ensure that the price and supply of personal protective equipment (PPEs) such as face masks, safety goggles, and medical devices such as nebulizers, ethyl alcohol solution, disinfectants and oxygen cannulas remain stable during times of emergencies. Seeks to: include PPEs and medical devices as prime commodities whose price may be subjected to price ceiling; clarify that price control measures of such commodities may also be imposed in times of outbreaks/epidemics, pandemics or public health emergencies; and increase the administrative fines and criminal penalties for violations of the Price Act."
