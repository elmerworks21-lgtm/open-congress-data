congress_website_title = "AN ACT MANDATING THE NATIONAL TELECOMMUNICATIONS COMMISSION TO REQUIRE INTERNET SERVICE PROVIDERS TO DELIVER A MINIMUM STANDARD OF 10 MEGABYTES PER SECOND (10MBPS) FOR INTERNET CONNECTION SPEED"
congress_website_abstract = "Seeks to mandate the National Telecommunications Commission (NTC) to require Internet Service Providers (ISPs) to deliver minimum internet connection speeds of 10 megabytes per second (mbps) for all mobile, fixed and fixed wireless broadband/internet access to their subscribers and shall modify, improve, or change telecommunication lines and systems or expand their infrastructure to run on higher capacity bandwidths based on the number of subscribers demanding for their services ."
