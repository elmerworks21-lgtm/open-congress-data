congress_website_title = "AN ACT ESTABLISHING A NATIONAL ECONOMIC DECENTRALIZATION PLAN TO FACILITATE FURTHER GROWTH IN ALL REGIONS OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to create a more progressive Philippines for every Filipino through: a) Conduct of periodic comprehensive studies on focusing on challenges and opportunities for regional economic development; b) Ensure quality health and education facilities in all regions; c) Establishment of Regional Centers of Excellence; d) Determine the appropriate region and specific location to transfer selected National Government Agencies (NGAs); and e) Establish mechanisms of decentralization including procurement procedures, among others."
