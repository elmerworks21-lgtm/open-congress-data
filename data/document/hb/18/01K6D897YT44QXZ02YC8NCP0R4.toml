congress_website_title = "AN ACT AUTHORIZING A LOCAL GOVERNMENT UNIT TO CREATE A CORPORATE ENTITY AND/OR AUTHORITY TO ATTRACT DOMESTIC AND FOREIGN INVESTMENT TO GENERATE ADDITIONAL SOURCE OF REVENUE AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to subscribe to the view that LGUs, as \\\"corporations,\\\" may engage in business economic enterprise, or investment of nature that will generate additional revenue that would accrue to the LGUs. Proposes to allow LGUs some degree of freedom and independence in pursuing commercial and service enterprises, as the case may be, as long as it should be generally consistent with the local development plan and the corresponding public investment program of that LGU."
