congress_website_title = "AN ACT AMENDING ARTICLES 96 AND 124 OF THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to eliminate all forms of discrimination against women in both the public and private spheres, to promote equality between women and men and to advance women's rights. Proposes to remove the portion in Articles 96 and 124 of the Family Code which gives preference to the husband's decision over that of the wife in case of disagreement on the administration and enjoyment of the conjugal or community property. Intends to preserve and safeguard conjugal or community properties from unilateral and reckless decisions that are often resorted to when conflict occurs between the husband and the wife."
