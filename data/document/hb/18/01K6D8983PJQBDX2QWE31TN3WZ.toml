congress_website_title = "AN ACT CREATING THE OFFICE FOR INVESTOR FACILITATION AND PROTECTION AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes the creation of the OIFP dedicated to the ff.: a) coordinating and assisting in the facilitation of business registration requirements, permits, certificates, and those requirements to qualify to avail of the investment incentives program; and b) the protection of the investors through consultation, consultative meetings, and discussions and if not resolved, for alternative dispute resolution (ADR) for issues that may arise between the Investment Promotion Agencies (IPAs), other related government agencies and departments concerning the administration of the program, interpretation of the terms and conditions of the grant, in favor of the Filipino or foreign investor."
