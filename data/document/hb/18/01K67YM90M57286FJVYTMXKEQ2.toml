congress_website_committee_codes = ["0532"]
congress_website_primary_keys = [145175]
congress_website_title = "AN ACT EXTENDING THE AVAILABILITY OF THE 2019 APPROPRIATIONS FOR MAINTENANCE AND OTHER OPERATING EXPENSES AND CAPITAL OUTLAYS TO DECEMBER 31, 2020, AMENDING FOR THE PURPOSE SECTION 65 OF THE GENERAL PROVISIONS OF REPUBLIC ACT 11260, THE GENERAL APPROPRIATIONS ACT OF FISCAL YEAR 2019"
congress_website_abstract = "Seeks to extend the validity of the MOOE and CO for another fiscal year to fund priority projects, financial assistance program, aid, and relief activities as well as for the maintenance, construction/repair, and rehabilitation of schools, hospitals, roads, bridges and other essential facilities of the national government. Requires a report on all releases and obligations to be submitted to the Speaker of the House of Representatives, the President of the Senate of the Philippines, the House Committee on Appropriations and the Senate Committee on Finance, either in printed form or by way of electronic document."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=18&q=HBN-5437"

