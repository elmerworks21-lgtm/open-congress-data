congress_website_title = "AN ACT AMENDING PARAGRAPH 2 OF THE SPECIAL PROVISIONS OF ARTICLE XXII (A) OF REPUBLIC ACT NO. 11465, OTHERWISE KNOWN AS THE GENERAL APPROPRIATIONS ACT OF THE FISCAL YEAR 2020"
congress_website_abstract = "Proposes that the amount appropriated here under the Pantawid Pamilyang Pilipino Program (4Ps) shall be used for the provision of rice subsidy amounting to P600 a month in the form of RICE INSTEAD OF financial assistance. Provides that the DSWD may enter into a Memorandum of Agreement with the National Food Authority (NFA), LOCAL GOVERNMENT UNITS (LGUS), OR ACCREDITED FARMERS ORGANIZATIONS for the purchase of LOCALLY PRODUCED rice for distribution to the 4Ps beneficiaries."
