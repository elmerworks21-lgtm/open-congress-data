congress_website_title = "AN ACT CREATING A PHILIPPINE POLLUTANT RELEASE AND TRANSFER REGISTRY"
congress_website_abstract = "Proposes to tally and study the scientific nature and details of pollutants, toxic chemicals, and substances so that they can be eliminated or be confined to avoid harming our health and our environment. Defines several terms among others such as Green Chemistry, Clean Production, and Pollutant Release and Transfer Registry (PRTR) - refers to catalogs or registries of potentially harmful pollutant releases or transfers to the environment from a variety of sources, including information on the nature and quantity of such releases and transfers. It includes information regarding releases or transfers to air, water, and soil; and wastes transported to treatment and disposal sites. These are the means for obtaining regular, periodic information about releases and/or transfers of chemical substances of interest and for making this information accessible to those who may be interested and/or affected by it; it is a tool for promoting efficient and effective policies for environmental protection and sustainable development."
