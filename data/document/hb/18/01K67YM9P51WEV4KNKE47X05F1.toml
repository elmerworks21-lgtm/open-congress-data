congress_website_title = "AN ACT ENHANCING THE CONTINUING PROFESSIONAL DEVELOPMENT OF FILIPINO PROFESSIONALS AS AN INTEGRAL COMPONENT OF THE CAREER PROGRESSION AND SPECIALIZATION PROGRAMS, AND APPROPRIATING FUNDS THEREFOR, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10912, OTHERWISE KNOWN AS THE “CONTINUING PROFESSIONAL DEVELOPMENT ACT OF 2016”"
congress_website_abstract = "Aims to amend some provisions of RA 10912 to make it easier for the workers and professionals affected to comply with the mandatory requirements of the CPD Law. Makes the CPD a mandatory requirement in the updating and upgrading of knowledge, skills, values and competencies of all registered and licensed professionals under the regulation of the Professional Regulation Commission (PRC). Requires all professionals to obtain forty-five (45) CPD credit units every four (4) years which shall be deemed as the compliance period. It also requires professionals covered by Mutual Recognition Arrangements (MRAs) who may wish that their profession and qualifications be internationally recognized to comply with the required CPD units as prescribed in the MRAs which shall not be less than forty-five (45) credit units. Exempts the following from CPD requirements: a.) newly licensed or registered professionals on the first renewal of their PIC within the first four (4) years after obtaining their license; b.) OFWs during their stay in a foreign country for purposes of employment; and c.) senior citizens who are not engaged in the practice of their profession, as defined under their respective regulatory laws. Mandates various government departments and agencies, and private companies, in consultation and coordination with the PRC, to establish a mechanism to provide professionals under their jurisdiction, with free or inexpensive seminars, workshops, online and similar training programs to earn CPD program credits."
