congress_website_title = "AN ACT EXCLUDING THE PERFORMANCE-BASED BONUS FROM THE COMPUTATION OF TAXABLE INCOME AMENDING FOR THE PURPOSE SECTION 32 (B) (7) OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Seeks to grant civil servant full recognition and enjoyment of their reward for exemplary performance by excluding the PBB in the computation of taxable income. PBB must be given in full amount to serve as a meaningful reward for government employees who walked the extra mile towards the attainment of agency goals. The grant of PBB through Executive Order No.80 (Directing the Adoption of a Performance-Based Incentive System), is on top of the Productivity Enhancement Incentive (PEI)."
