congress_website_title = "AN ACT CREATING THE DEPARTMENT OF DISASTER RESILIENCE, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to create the Department which shall be the primary agency responsible for managing the national effort to reduce disaster risk; and prepare for and respond to disasters, recovery and rehabilitation. Intends to augment the capacity of the local government units, in collaboration with relevant national government agencies and stakeholders to implement disaster risk reduction and management; and climate change action plans, programs, projects and activities. Proposes for the creation of the National Disaster Resilience Council, which will serve as the policy advisory body to the Department; and establishes Multi-Stakeholders Convergence Unit; Climate and Disaster Research, Education, and Training Institute; and National and Regional Information Management System for Climate and Disaster Resilience."
