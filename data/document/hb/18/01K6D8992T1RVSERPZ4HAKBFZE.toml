congress_website_title = "AN ACT INCREASING THE VALUE OF MONEY AND THE PENALTIES FOR MALVERSATION OF PUBLIC FUNDS, AMENDING FOR THE PURPOSE ARTICLES 217, 218, 219, 220, 221, AND 222 OF ACT NO. 3815, OTHERWISE KNOWN AS THE REVISED PENAL CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to address the issue that the statutes in place that governed the subject of malversation of public funds or property have barely exacted any considerable retribution against those guilty of such crimes. Seeks to upgrade the corresponding penalties according to the gravity of offenses and not just based on the value of Philippine Peso, which was the intention of Republic Act No. 10951."
