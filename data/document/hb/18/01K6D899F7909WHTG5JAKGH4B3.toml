congress_website_title = "AN ACT DEFINING AND PENALIZING THE CRIME OF HOAX KIDNAPPING"
congress_website_abstract = "Defines “Hoax Kidnapping“ as the faking, orchestrating or staging by a person of his/her kidnapping and detention for the purpose of extorting ransom from that person´s family or other entities, or coercing the latter to do or not to do an act. Proposes that any person who is found guilty of hoax kidnapping shall suffer the penalty of prision correctional and a fine of one hundred thousand pesos (P100,000.00) to one million pesos (P1,000.000.00)."
