congress_website_title = "AN ACT INSTITUTIONALIZING MICROFINANCE PROGRAMS AND ACCESS TO CAPITAL TO SUPPORT AND GROW MICRO, SMALL, AND MEDIUM ENTERPRISES (MSMEs), ALLOCATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides that the State should institutionalize a loan program with a simplified process and with low interest that can provide members of the working class in need of capital with sufficient funds to start their own business. Creates a comprehensive development and assistance program for MSMEs to protect the capital of small proprietors, ensure the success of their MSMEs, and transform them into five-star businesses by providing them with assistance and the necessary resources in order to help their business flourish. Intends to provide a program where: a) Requirements for loan applications and approval are very basic, and there is no collateral requirement; b) Loan proceeds are exclusively used for capital; c) Interests are very close to prevailing bank rates; d) The lenders have a pragmatic collection mechanism; and e) The mode of payment is on a daily or weekly basis."
