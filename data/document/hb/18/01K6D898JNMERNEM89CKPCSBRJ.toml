congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE AGRICULTURAL AND RURAL FINANCING SYSTEM, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to address the shortcomings of agricultural and rural sectors´ credit extension which has been elusive due to failure of the market to allocate resources in an equitable manner, resulting to majority of them unable to earn enough as advanced farming technologies are inaccessible to them and their financial requirements to boost productivity are often unserved. Provides a framework where automatic eligibility is granted with Phil. Guarantee Corp., Phil. Crop Insurance Corp. P C I C, Agricultural Credit and Policy Council ( A C P C ) and other governmental agencies providing services towards risk - mitigation in the agriculture sector."
