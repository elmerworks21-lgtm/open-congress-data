congress_website_title = "AN ACT PROVIDING FOR THE CONDUCT OF HYBRID NATIONAL AND LOCAL ELECTIONS, THROUGH MANUAL VOTING AND COUNTING AT THE PRECINCT LEVEL, AND AUTOMATED TRANSMISSION AND CANVASSING, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to address the unsatisfactory observations on the conduct of the “automated” national and local elections and the “glitches” involving the electronic transmission of canvass, SD cards, and the use of ballot markers through manual voting and counting at the precinct level and automated transmission and canvassing. Provides for the manner of filing of Certificates of Candidacy; the Printing of Official Ballots; Authentication of Ballot; the Counting of Votes; the Counting, Filling Out and Distribution of Election Returns; the Canvassing of Election Return, among others."
