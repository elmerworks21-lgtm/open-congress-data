[meta]
bill_number = 4611
congress = 18
title = "NATIONAL DAY OF REMEMBRANCE FOR ROAD CRASH VICTIMS, SURVIVORS, AND THEIR FAMILIES ACT"
date_filed = "2019-09-16"
long_title = "AN ACT DESIGNATING THE THIRD SUNDAY OF NOVEMBER EVERY YEAR AS THE NATIONAL DAY OF REMEMBRANCE FOR ROAD CRASH VICTIMS, SURVIVORS, AND THEIR FAMILIES, ENSURING ITS MEANINGFUL OBSERVANCE"
scope = "National"
subjects = [ "Road Crash Victims",]
congress_website_author_codes = ["J103"]
congress_website_coauthors_raw = ["DY, FAUSTINO V A.","NIETO, YUL SERVO","AGABAS, TYRONE D.","NIETO, YUL SERVO","AGABAS, TYRONE D."]
congress_website_committee_codes = ["0532","E509"]
congress_website_primary_keys = [14809]
congress_website_title = "AN ACT DESIGNATING THE THIRD SUNDAY OF NOVEMBER EVERY YEAR AS THE NATIONAL DAY OF REMEMBRANCE FOR ROAD CRASH VICTIMS, SURVIVORS, AND THEIR FAMILIES, ENSURING ITS MEANINGFUL OBSERVANCE"
congress_website_abstract = "Aims to promote protection and safety from any form of road hazards and value human lives by way of remembering the victims of previous tragedies and recognizing the sufferings of their families to raise awareness of the people on the causes, consequences, and costs of road deaths and injuries and prevent traumatic incidents through collaborative platform that brings together multisector stakeholders. Mandates the DOTr to be the lead agency and coordinate with other concerned agencies in the meaningful observance of the National Day of Remembrance every year."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=18&q=HBN-4611"

