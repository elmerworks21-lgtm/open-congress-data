title = "REAL ESTATE INVESTMENT TRUST (REIT) ACT"
date_filed = "2020-03-02"
long_title = "AN ACT PROVIDING FOR A REINVESTMENT FRAMEWORK FOR REAL ESTATE INVESTMENT TRUST (REIT) SPONSORS, AMENDING SECTIONS 3, 8, AND 9 OF REPUBLIC ACT NO. 9856, OTHERWISE KNOWN AS 'THE REAL ESTATE INVESTMENT TRUST (REIT) ACT OF 2009'"
scope = "National"
subjects = [ "Real Estate Investment Trust (REIT)",]
congress_website_author_codes = ["G118"]
congress_website_coauthors_raw = ["CAGAS, MERCEDES C."]
congress_website_committee_codes = ["0532","0536"]
congress_website_primary_keys = [155186]
congress_website_title = "AN ACT PROVIDING FOR A REINVESTMENT FRAMEWORK FOR REAL ESTATE INVESTMENT TRUST (REIT) SPONSORS, AMENDING SECTIONS 3, 8, AND 9 OF REPUBLIC ACT NO. 9856, OTHERWISE KNOWN AS \\\"THE REAL ESTATE INVESTMENT TRUST (REIT) ACT OF 2009\\\""
congress_website_abstract = "Intends to ensure that the funds invested through the \\\"Real Estate Investment Act of 2009\\\" , enacted to promote the development of the capital market to fund infrastructure projects and further improve the real estate industry, are to be reinvested in the Philippines to secure full domestic participation in the real estate industry. Defines the terms \\\"REINVESTMENT PLAN\\\" and provides that any proceeds realized by the sponsor/promoter from the sale of R E I T share or other securities issued in exchange for income - generating real estate transferred to R E I T and any money raised by the sponsor/promoter from the sale of any of its income - generating to the R E I T, in any real estate including any redevelopment thereof, and/or infrastructure projects in the country, must be reinvested in the Philippines. Mandates that the REIT shall submit a Reinvestment Plan to the Exchange or the Commission upon registration and must annually secure a Certification from the Commission that it is compliant with its Reinvestment Plan."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=18&q=HBN-6430"

