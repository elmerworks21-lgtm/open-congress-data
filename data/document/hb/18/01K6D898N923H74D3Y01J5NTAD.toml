congress_website_title = "AN ACT AUTHORIZING THE USE OF THE RICE SUBSIDY PROVIDED UNDER THE PANTAWID PAMILYANG PILIPINO PROGRAM (4PS) IN THE 2019 GENERAL APPROPRIATIONS ACT FOR THE PURCHASE OF PALAY FROM LOCAL FARMERS, MANDATING FOR THE PURPOSE THE DEPARTMENT OF SOCIAL WELFARE AND DEVELOPMENT (DSWD), IN COORDINATION WITH THE DEPARTMENT OF AGRICULTURE (DA) AND THE NATIONAL FOOD AUTHORITY (NFA), TO BUY PALAY FROM LOCAL FARMERS AND DISTRIBUTE RICE INSTEAD OF CASH TO QUALIFIED BENEFICIARIES"
congress_website_abstract = "Mandates the DSWD, in coordination with the Department of Agriculture and the National Food Authority, to buy palay from farmers, and distribute rice subsidy in actual kilos of rice instead of cash grant to qualified beneficiaries of the Pantawid Pamilyang Pilipino Program or 4Ps to promote the welfare of farmers and help them to cope with the liberalization of rice importation."
