congress_website_title = "AN ACT DECLARING THE MONTH OF OCTOBER OF EVERY YEAR AS THE \"NATIONAL DWARFISM AWARENESS MONTH\" AND OCTOBER 25 AS THE \"NATIONAL DWARFISM AWARENESS DAY\""
congress_website_abstract = "Seeks to declare the month of October of every year as the “National Dwarfism Awareness Month”, for the purposes of instilling public awareness of the human rights situation of the Filipino Little People. Likewise, October twenty-fifth of every year shall be declared the “National Dwarfism Awareness Day” for the purpose of promoting recognition and acceptance to persons with dwarfism, in line with the annual celebration of the Dwarfism Awareness Month and Dwarfism Awareness Day by the Little People of America, one of the early organizations that provides support, resources, and information to individuals with dwarfism and their families."
