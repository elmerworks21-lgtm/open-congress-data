congress_website_title = "AN ACT STRENGTHENING THE NATIONAL PROGRAM FOR THE ELIMINATION OF TUBERCULOSIS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10767 OR THE \\\"COMPREHENSIVE TUBERCULOSIS ELIMINATION PLAN ACT\\\""
congress_website_abstract = "Seeks to support and expand efforts to eliminate tuberculosis as a public health problem in the country by intensifying information and education programs on the principles and practices of preventing, detecting, managing and controlling tuberculosis, as well as development and inclusion of curricula about tuberculosis in the basic education. Provides for the following significant features, among others: provisions on patients´ rights and responsibilities, corporate social responsibility to encourage business corporations to contribute in the on-going efforts to reduce the incidence of TB in the country; convergence of services; TB Strategic Plan for local government units; integration of TB services into established Service Delivery Networks (SDNs) or local health referral system; and inclusion of TB-DOTS treatment as one of the requirements for the conditional cash transfer program."
