congress_website_title = "AN ACT TO PROMOTE INCLUSIVE BUSINESS TO SUPPORT AND ACCELERATE INCLUSIVE DEVELOPMENT AT THE NATIONAL AND LOCAL LEVELS THROUGH PRIVATE SECTOR INVOLVEMENT"
congress_website_abstract = "Defines “Inclusive Business (IB)” to a business model approach that provides decent work, respects Constitutional provisions of workers, and economic opportunities and livelihood, or relevant and affordable goods or services, for poor and low-income earners, to people at the base of the pyramid, as consumers, workers, owners or business partners, and making them part of the value chain of the core business operations of the IB Company: Provided, That there is a direct contribution to improved living standards, poverty reduction, and systematic inclusion in a manner that is sustainable, in scale or scalable, and replicable."
