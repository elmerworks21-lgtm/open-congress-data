congress_website_title = "AN ACT REDUCING THE EXCISE TAX ON CERTAIN PETROLEUM PRODUCTS, AMENDING FOR THE PURPOSE SECTION 148 AND ADDING SECTIONS 148-B AND 148-C IN THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Seeks to provide reduction of excise taxes on gasoline, diesel, kerosene and liquefied petroleum gas (LPG) for the immediate relief to the public affected by rising fuel prices. Provides a price monitoring mechanism that will require oil companies to notify the Department of Energy (DOE) and the Department of Finance (DOF) of the retail prices, including taxes, of gasoline, kerosene, diesel fuel oil, LPG, and similar oils having more or less the same generating power a day before the implementation of the six-month excise tax rate adjustment, and of every change in the retail price until the end of the six-month period. Creates a Social Impact Stabilization Fund to be utilized by the Department of Social Welfare and Development for cash aid to affected land public transport entities during periods of high petroleum prices."
