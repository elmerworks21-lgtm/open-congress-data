congress_website_title = "AN ACT INSTITUTING THE MEDICAL RESERVE CORPS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to establish a Medical Reserve Corps which shall be composed of all persons who have degrees in the field of medicine, nursing, medical technology, and other health-related fields but have yet to have their respective licenses to practice. Provides that these Members may be called upon and mobilized to: assist the National and LGUs in their functions related to addressing the medical needs of the public in times of national or local emergencies; and to respond to contingencies related to external and territorial defense, internal security and peace and order and/or disaster risk reduction management. Provides also for an evaluation of the requests for deployment, which shall contain its justification and information such as the nature of the contingencies to be addressed, the purpose of the deployment, the number of personnel requested and the period of deployment."
