congress_website_title = "AN ACT CREATING THE CONGRESSIONAL OVERSIGHT COMMITTEE ON THE NATIONAL BUDGET"
congress_website_abstract = "Intends to address the issues of pork barrel, Priority Development Assistance Fund ( P D A F ), Disbursement Acceleration Program ( D A P ), and other similar discretionary funds which expose the problems and weaknesses of the actual budget process that took away huge amount of public funds intended for social services for the people. Proposes to strengthen Congress oversight function in the budget process to enhance the effectiveness of the national budget towards the country's development goals and people's well-being, thereby creating a strong, permanent oversight committee with defined powers."
