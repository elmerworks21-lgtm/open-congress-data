congress_website_title = "AN ACT EXPEDITING THE PURCHASE AND ADMINISTRATION OF VACCINES FOR THE PROTECTION AGAINST THE CORONAVIRUS DISEASE 2019 BY PROVIDING EXEMPTIONS TO COMPLIANCE WITH THE PROCUREMENT REQUIREMENTS UNDER REPUBLIC ACT NO. 9184, OTHERWISE KNOWN AS THE \"GOVERNMENT PROCUREMENT REFORM ACT\", AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to ensure that the COVID-19 vaccine is procured and administered in an expeditious, effective, efficient, and equitable manner. Authorizes the Local Government Units to directly purchase Covid-19 vaccines and secure other goods and services necessary for their storage, transport, distribution, and administration notwithstanding the provisions of RA No. 9184, or the “Government Procurement Reform Act,” Section 338 of Republic Act No. 7160, as amended, or the “Local Government Code of 1991,” and Section 88 of PD No. 1445, as amended, or the “Government Auditing Code of the Philippines.” Creates the Indemnification Fund which shall cover the Adverse Events Following Immunization (AEFI) to ensure the safety of individuals who will receive vaccination from COVID-19. Exempts the procurement, importation, storage, transport, distribution, and administration of the Covid-19 vaccines by the local government units from customs duties, value-added tax, excise tax, and other fees, provided, that the vaccines acquired shall only be used for their residents and constituents, and not for commercial distribution."
