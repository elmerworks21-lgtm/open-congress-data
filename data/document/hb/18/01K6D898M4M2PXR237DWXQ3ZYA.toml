congress_website_title = "AN ACT TO DEFINE PUBLIC UTILITIES, PROMOTE INVESTMENT, IMPROVE REGULATION, AND ENSURE NATIONAL SECURITY BY AMENDING COMMONWEALTH ACT NO. 146, OTHERWISE KNOWN AS THE PUBLIC SERVICE ACT, AS AMENDED, AND OTHER RELATED LAWS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to clarify the definition of public services and public utilities; and institute an appropriate mechanism for fixing the rates, tolls, and the like based on a reasonable rate of return. Intends to establish a process for vetting investments, and to provide safeguards should any investor pose a potential threat to national security involving critical infrastructure; and to empower the President to suspend or prohibit such transactions involving electricity transmission and distribution, water pipeline distribution, sewerage pipeline system, and telecommunications that threaten to impair the national security of the country."
