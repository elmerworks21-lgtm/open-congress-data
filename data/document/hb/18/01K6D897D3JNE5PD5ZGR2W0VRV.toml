congress_website_title = "AN ACT MANDATING THE INCLUSION OF A SUBJECT ON PROPER ROAD USE IN THE ELEMENTARY EDUCATION CURRICULUM"
congress_website_abstract = "Seeks to mandate the inclusion of road use and safety in the elementary education curriculum as it intends to instill discipline in the road among people at an early age; to inculcate in them, the concern for the well-being and safety of others that should be primordial to anyone using our roads. It is envisioned to contribute in improving traffic situation in order to make the roads safer to travel and minimize losses incurred due to traffic and accidents."
