congress_website_title = "AN ACT PROVIDING FOR THE REGIME OF COMPLETE SEPARATION OF PROPERTY AS THE GOVERNING REGIME IN THE ABSENCE OF A MARRIAGE SETTLEMENT OR WHEN THE REGIME AGREED UPON IS VOID, AMENDING FOR THE PURPOSE ARTICLES 75 AND 147 OF TITLE IV OF EXECUTIVE ORDER NO. 209, AS AMENDED BY EXECUTIVE ORDER NO. 277, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "States that the future spouses may, in the marriage settlements, EITHER IN A SEPARATE DOCUMENT OR AS PROVIDED FOR IN THEIR APPLICATION FOR MARRIAGE LICENSE OR IN THE MARRIAGE LICENSE ITSELF, agree upon their choice of marriage regime options. Provides that when a man and a woman live exclusively as husband and wife without the benefit of a marriage or under a void marriage, their RESPECTIVE wages and salaries earned in their INDIVIDUAL CAPACITY shall be owned by them UNDER THE REGIME OF COMPLETE SEPARATION OF PROPERTY. Declares that it shall be mandatory for the local civil registrar to provide the different marriage regime option in the application for marriage license."
