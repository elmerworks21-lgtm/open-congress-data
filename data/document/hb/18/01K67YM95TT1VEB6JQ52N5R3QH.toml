congress_website_primary_keys = [151634]
congress_website_title = "AN ACT TO DECLARE THE EXISTENCE OF A NATIONAL EMERGENCY ARISING FROM THE CORONAVIRUS 2019 (COVID-19) SITUATION AND A NATIONAL POLICY IN CONNECTION THEREWITH, AND AUTHORIZING THE PRESIDENT OF THE REPUBLIC OF THE PHILIPPINES FOR A LIMITED PERIOD AND SUBJECT TO RESTRICTIONS, TO EXERCISE POWERS NECESSARY AND PROPER TO CARRY OUT THE DECLARED NATIONAL POLICY AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address the continuing rise of confirmed cases of Covid-19 which has greatly affected nations worldwide, including the Philippines. causing serious threat to the health, safety, and lives of the Filipinos. Provides the following national policy 1. minimize, if not prevent, further transmission and spread of Covid-19; 2. immediately mobilize assistance in the provision of basic necessities to families and individuals affected by the imposition of Community Quarantine; 3. immediately provide healthcare, medical tests and treatments to Covid-19 patients; PUI or PUM 4. undertake a program for recovery and rehabilitation, including a social amelioration program and provision of safety nets to all affected sectors; 5. ensure for a sufficient, adequate and readily available funding; and 6. promote and protect the collective interests of all Filipinos in these challenging times. Enumerates the emergency powers granted to the President to carry out the tasks needed to implement the aforementioned policy pursuant to Article VI, Section 23 (2) of the Constitution"
