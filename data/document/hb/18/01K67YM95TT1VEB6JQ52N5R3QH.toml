long_title = "AN ACT DECLARING THE EXISTENCE OF A NATIONAL EMERGENCY ARISING FROM THE CORONAVIRUS DISEASE 2019 (COVID-19) SITUATION AND A NATIONAL POLICY IN CONNECTION THEREWITH, AND AUTHORIZING THE PRESIDENT OF THE REPUBLIC OF THE PHILIPPINES FOR A LIMITED PERIOD AND SUBJECT TO RESTRICTIONS, TO EXERCISE POWERS NECESSARY AND PROPER TO CARRY OUT THE DECLARED NATIONAL POLICY AND FOR OTHER PURPOSES"
scope = "National"
subjects = []
congress_website_author_codes = ["F402"]
