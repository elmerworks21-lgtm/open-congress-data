congress_website_title = "AN ACT PROVIDING FOR THE CONSTRUCTION OF PUBLIC RESTROOMS ALONG NATIONAL AND PROVINCIAL HIGHWAYS THROUGHOUT THE COUNTRY, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to provide public restrooms which shall be constructed every thirty (30) to fifty (50) kilometres apart along national and provincial highways throughout the country and shall be maintained and supervised by the council or any nongovernmental organization (NGO) of the barangay where it is situated. Allows collection of reasonable payment per head which shall be held in a trust fund for the development projects of a particular barangay where the public restroom is situated."
