congress_website_title = "AN ACT AMENDING SECTIONS 4, 5, 20, 22, 27, 28, 34, 40, 50, 73, 112, 117, 204, 222, 237, 237-A, 255, 256, 257, 258, 260, 261, 262, 263, 264, 265, 266, 275, 288, 290 AND ADDING SECTIONS 6-A, 282-A, 291, 292, 293, 294, 295, 296, 297, 298, 299, 300, 301, 301-A, 301-B, 302, 303, 304, 305, 306, 307, 308, 309, 310, 311, 312, 313 AND 314 UNDER THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to encourage investments by bringing down the corporate income tax (CIT) rate from 30% to 20% and ensure that the grant of fiscal incentives helps bring in the greatest benefits and that there should be fairness and transparency on its grant. Proposes to enhance the accountability of taxpayers through refinement of tax administration and provides for funding provisions and sunset provisions for existing registered enterprises availing of fiscal incentives."
