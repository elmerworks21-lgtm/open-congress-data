congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 11036, OTHERWISE KNOWN AS THE MENTAL HEALTH ACT"
congress_website_abstract = "Intends to address and assist the mental health needs of the Filipino workforce, both in public and private sectors, reinforces their rights to a secure monetary compensation to lessen, if not eliminate, the burden and harmful effects of serious health hazard. Amends Section 5 of the Mental Health Act to reinforce P.D.No.626 ( for private and public employees) and R.A.No.6963 ( for our uniformed personnel) which provide for special financial assistance in the event a worker sustain temporary or permanent mental disability while in the performance of duty or by reason of his/her position."
