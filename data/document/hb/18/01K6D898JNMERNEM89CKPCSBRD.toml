congress_website_title = "AN ACT EXPANDING THE SCOPE OF ACTS CONSTITUTING SEXUAL HARASSMENT, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBER 7877, OTHERWISE KNOWN AS THE \\\"SEXUAL HARASSMENT ACT OF 1995\\\""
congress_website_abstract = "Seeks to fill many gaps needed to address the limitation of the law and its provision which presupposes the existence of authority, influence or moral ascendancy between the offender and the offended party, by providing that a \\\"harasser\\\" could be anyone including a colleague or subordinate staff. Proposes to strengthen the law by amending certain provisions so that \\\"sexual harassment\\\" now constitutes: a) acts that are not only physical or verbal in nature, but also those committed using electronic devices or any available technology or means; b) acts that have been committed either within or outside the place of employment, training or education; and c) offensive remarks about a person's sexual orientation."
