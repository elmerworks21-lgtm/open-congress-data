congress_website_title = "AN ACT TO PRIORITIZE MOBILITY OF PEOPLE OVER THE MOBILITY OF VEHICLES"
congress_website_abstract = "Provides that \\\"Public mass transportation in urban areas shall be given priority over private transport. High capacity public transport systems shall be the preferred mode in high passenger density corridors. [Sec.7, Transportation Management in Urban and Regional Areas]\\\". Proposes to require government officials involved in the planning, construction, management and operation of road transportation infrastructure (highways, roads, bridges, terminals, stops, walkways and bike ways, etc.) to consider the needs of all users and to take decisions on the basis of \\\"people mobility requirements."
