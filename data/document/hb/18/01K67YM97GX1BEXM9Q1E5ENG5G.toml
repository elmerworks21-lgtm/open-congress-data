congress_website_title = "AN ACT ESTABLISHING THE E-GOVERNMENT, DEFINING ITS POWERS AND FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to develop a framework to guide and govern basic technical interoperability of government ICT systems between and among its various agencies in dealing with their constituencies. Mandates the Secretary of the DICT to head the E-Government initiative and to spearhead all aspects of implementation of the E-Government Master Plan for the optimum use of ICT in government to expand and improve public services, government operations and capabilities. Authorizes the appointment of an ICT officer for each Local Government Unit who shall manage and supervise the adoption of the E-Government Plan and to spearhead seminars and other means of educating the community to maximize E-Government initiatives."
