congress_website_title = "AN ACT CREATING THE PHILIPPINE MARSHAL SERVICE, DEFINING ITS FUNCTIONS AND POWERS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to defend and secure justices, judges, court officials and personnel in order to adequately protect their safety and independence. Provides that the officials and personnel of the Marshal Service shall: possess suitable and adequate firearms; be given the power to make arrests, searches and seizures, and to issue subpoenas for the appearance of any person for investigation; ensure that court trials and hearings proceed orderly, and to assist in the execution and implementation of court orders; and shall also be responsible in conducting investigation concerning allegations of irregularities, including graft and corruption, committed by aforementioned court officials and personnel."
