congress_website_title = "AN ACT PRESCRIBING AN URGENT COMPREHENSIVE AND INTEGRATED LAND-BASED TRAFFIC MANAGEMENT POLICY TO EFFECTIVELY ADDRESS THE TRAFFIC CONGESTION CRISIS IN METRO MANILA, METROPOLITAN CEBU AND METROPOLITAN DAVAO AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Intends to address the issue that Metro Manila traffic is considered as one of the worst in Southeast Asia and that the country loses billions of pesos a day due to the traffic congestion by providing urgent, immediate, and comprehensive solution to the traffic crisis. Grants the traffic chief of the Secretary of Transportation, full power and authority to streamline the management of traffic and transportation, and shall have the power of supervision and control over various land transportation agencies. Aims to incorporate several provisions, among others as regards to: Comprehensive Traffic Rule Handbook; Traffic Management Plan; Friendship Routes; Revocation and Modification of PUV Franchises and Permits; Suspension of PUV Franchising Authority; Government Take-Over of the Operations of a PUV Franchise; PUV Operator Obligations and Responsibilities; Professional Driver's Examination; Roadworthiness; Financial Assistance to PUV Modernization; Liability for Priority Projects; Special Traffic Crisis Court; Traffic Education."
