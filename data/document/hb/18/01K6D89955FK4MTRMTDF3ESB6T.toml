congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 386, ALSO KNOWN AS THE CIVIL CODE, ARTICLE 867"
congress_website_abstract = "Provides that Art. 867, par. 2 of the Civil Code does not allow an absolute or temporary prohibition by the testator in the disposition of the estate “beyond the limit fixed in Art. 863.” but there is no such period is provided therein. Aims therefore to amend Art. 867 so that Article 863 would correctly refer to Article 870 which provides the period limiting the prohibition on alienation to 20 years."
