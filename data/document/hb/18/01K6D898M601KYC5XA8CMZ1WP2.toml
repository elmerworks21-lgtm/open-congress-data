congress_website_title = "AN ACT IMPOSING ECOTAX ON BATTERIES"
congress_website_abstract = "Aims to create economic incentives arising from environmental-friendly endeavors, usually levied on activities or products known to be harmful to the ecology; Intends to address the demand for more technical, advanced, and expensive public mechanisms for the collection and processing of electronic wastes; Seeks to reduce pollution and encourage the use of alternatives. Proposes to impose an Ecotax (ecological tax) on Rechargeable Batteries equal to one percent (1%) and Disposable Batteries and other products with similar contents equal to three percent (3%) of the actual sale price; such Ecotax shall cover battery manufacturers, producers, and importers."
