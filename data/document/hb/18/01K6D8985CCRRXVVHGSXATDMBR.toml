congress_website_title = "AN ACT DECLARING AND DEFINING THE MARITIME ZONES UNDER THE JURISDICTION OF THE REPUBLIC OF THE PHILIPPINES"
congress_website_abstract = "States that the maritime zones of the Philippines comprise the internal waters, archipelagic waters, territorial sea, contiguous zone, exclusive economic zone (EEZ) and continental shelf; and provides that all territories shall generate their respective maritime zones in accordance with international law. Declares that the Philippines exercises sovereignty/sovereign rights and jurisdiction, including the right to explore and exploit living and nonliving, organic or nonorganic resources over the specified maritime zones in accordance with the UNCLOS and other existing laws and treaties."
