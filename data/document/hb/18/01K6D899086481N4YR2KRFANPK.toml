congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 9775 OTHERWISE KNOWN AS THE \"ANTI-CHILD PORNOGRAPHY ACT OF 2009,\" AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides that all Internet Service Providers shall install every latest technology, program, or software to ensure that access to or transmittal of any form of child pornography will be blocked or filtered. Proposes that all ISPs shall submit an annual report to the National Telecommunications Commission (NTC) - on the status of the technology, program, or software that they install or utilized."
