congress_website_title = "AN ACT PROVIDING A FRAMEWORK TO PROTECT AND PROMOTE THE RIGHT TO ADEQUATE FOOD"
congress_website_abstract = "Provides a framework to address and eliminate hunger in an organized manner and protect the right of the people to adequate food. Creates the Commission on the Right to Adequate Food which shall be the primary policy-making and coordinating body to guarantee full exercise of the right to adequate food. Provides an integrated monitoring system that shall ensure that all government agencies at all levels shall collect data related to food and nutrition security, disaggregate collected data, monitor progress, and establish or identify an early warning mechanisms for food supply shortages and emergencies."
