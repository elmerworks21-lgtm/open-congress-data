congress_website_title = "AN ACT APPROPRIATING THE SUM OF THREE HUNDRED SEVENTY BILLION PESOS (P370,000,000,000) FOR THE 2020 FISCAL STIMULUS PACKAGE TO ADDRESS THE ECONOMIC IMPACT OF COVID-19"
congress_website_abstract = "Intends to address the potential impact of COVID-19 on the economy due to revenue decline brought about by the reduction of economic output if the COVID-induced disruption lasts longer Aims to provide sufficient safety nets and immediate assistance to affected sectors by reallocating fund through the General Appropriations Act of 2020 contingency and unspent funds, as the main economic measure to address the current public health emergency to keep the economy on track. Proposes that the fund shall be allocated as follows: a) Forty-three Billion Pesos - tourism sector b) Fifteen Billion Pesos - displaced workers c) Fifty Billion Pesos - businesses Proposes to establish an Inter-Agency Task Force which shall develop the fiscal stimulus package and manage the use of funds, to be headed by the NEDA, with representatives from the DOT, DOLE, DTI, DOF, and DBM."
