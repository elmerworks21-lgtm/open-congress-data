congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 252 OTHERWISE KNOWN AS THE “PHILIPPINE INTERNATIONAL TRADING CORPORATION LAW”, AS AMENDED BY PRESIDENTIAL DECREE NO. 1071 OTHERWISE KNOWN AS “REVISING THE CHARTER OF THE PHILIPPINE INTERNATIONAL TRADING CORPORATION”"
congress_website_abstract = "Proposes to create the PHILIPPINE INTERNATIONAL TRADING AND CRITICAL MATERIALS STOCKPILE CORPORATION to act as the supply-chain manager in the stockpiling of strategic and critical materials as may be determined by the President; and to acquire and release such materials as directed by him, in the interest of the public in response or preparation of any conceived national emergency. Amends specific provisions as to its capitalization and the composition of the Board of Directors, and adds several sections including the Corporation´s objective; creation of Strategic and Critical Materials Stockpile Division; materials constituting the stockpile, the disposal authority, sources of materials, and institutional linkages/partnership with government and non-government institutions, among others."
