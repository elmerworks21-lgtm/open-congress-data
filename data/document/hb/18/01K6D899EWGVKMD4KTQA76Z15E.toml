congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7305, OTHERWISE KNOWN AS THE MAGNA CARTA OF PUBLIC HEALTH WORKERS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides that there shall be no discrimination against a public health worker concerning his SEXUAL ORIENTATION AND gender IDENTITY, civil status, AGE, DISABILITY, religious or political beliefs, AND AFFILIATIONS, OR ETHNICITY in the exercise of his profession. Seeks to amend the existing law to assist and protect our public health workers, and ensure that they are appropriately compensated and provided with their well-deserved incentives and benefits as follows: Night Shift Differential of TWENTY (20%) of his regular wage for each hour of work; an additional TWENTY (20%) of an overtime rate for each hour of work performed between SIX (6) o´clock in the evening to six (6) o´clock in the morning; Monthly Hazard Allowance of TEN THOUSAND PESOS (P10,000.00); Subsistence Allowance equivalent to THREE HUNDRED PESOS (P300.00) per day; and Laundry Allowance to FIVE HUNDRED PESOS (P500.00) per month."
