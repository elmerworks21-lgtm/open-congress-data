congress_website_title = "AN ACT STANDARDIZING THE ALLOWANCES, PER DIEMS, TRAVEL EXPENSES AND OTHER BENEFITS OF SERVICE ATTACHES FROM OTHER DEPARTMENTS, BUREAUS AND AGENCIES OF THE GOVERNMENT ON DETAIL ABROAD, WITH THEIR COUNTERPARTS IN THE DEPARTMENT OF FOREIGN AFFAIRS"
