congress_website_title = "AN ACT AUTHORIZING THE PRESIDENT, FOR A LIMITED PERIOD AND SUBJECT TO CERTAIN RESTRICTIONS, TO EXERCISE EMERGENCY POWERS TO EFFECTIVELY ADDRESS THE TRAFFIC AND CONGESTION CRISIS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes to declare the existence of a national emergency in view of the traffic congestion crisis in Metropolitan Manila, Metropolitan Cebu, Davao City, Cagayan de Oro City, and other highly urbanized cities. Intends to grant the President emergency powers to employ necessary government resources; exercise or employ executive actions and measures - necessary and incidental, unhampered by existing laws, regulations, and procedures - to solve this escalating problem; and to adopt short-term, mid-term, and long-term development plans for a sustainable and efficient transport system. Seeks to designate the Secretary of Transportation as the de officio Traffic Crisis Czar during the entire duration of the grant of emergency powers who is authorized to exercise all powers granted to the President but shall be under the latter´s direct control and supervision."
