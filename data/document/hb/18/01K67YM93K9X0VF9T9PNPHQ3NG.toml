congress_website_author_codes = ["J035"]
congress_website_coauthors_raw = ["ROMUALDO, XAVIER JESUS \"XJ\" D.","NIETO, YUL SERVO","ROMUALDEZ, FERDINAND MARTIN G.","CAGAS, MERCEDES C."]
congress_website_committee_codes = ["0532","0537"]
congress_website_primary_keys = [8039]
congress_website_title = "AN ACT INCREASING THE AMOUNT OF AUTHORIZED ELECTION CAMPAIGN EXPENSES OF CANDIDATES AND POLITICAL PARTIES, AMENDING FOR THE PURPOSE SECTION 13 OF REPUBLIC ACT NO.7166, ENTITLED, \\\"AN ACT PROVIDING FOR SYNCHRONIZED NATIONAL AND LOCAL ELECTIONS AND FOR ELECTORAL REFORMS, AUTHORIZING APPROPRIATIONS THEREFOR, AND FOR OTHER PURPOSES\\\""
congress_website_abstract = "Seeks to update the authorized expenses of candidates and political parties as follows: 1.For Candidates: Fifty Pesos (P50.00) for President, Vice-President and Senators; Thirty Pesos (P30.00) for other candidates for every voter currently registered in the constituency where they are seeking to be elected and have filed a certificate of candidacy for 2. For political parties: Fifty Pesos (P50.00) for their respective national candidates; and Thirty Pesos (P30.00) for local candidates for every voter. Mandates the Commission on Elections, in consultation with the Bangko Sentral ng Pilipinas, the NEDA and the PSA to adjust the amounts of authorized election campaign expenses every six years based on the inflation rate and the consumer price index."
