congress_website_title = "AN ACT RECOGNIZING THE COMMUNITY CONSERVED TERRITORIES AND AREAS OF INDIGENOUS PEOPLES AND CULTURAL COMMUNITIES, ESTABLISHING FOR THE PURPOSE THE NATIONAL INDIGENOUS COMMUNITY CONSERVED AREAS REGISTRY, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to recognize and respect the designation and declaration by Indigenous Cultural Communities/Indigenous Peoples (ICCs/IPs) of the conserved areas within their ancestral domains and to promote their rights to manage, maintain, and sustainably develop the natural resources by applying their indigenous knowledge systems and practices within these areas under their indigenous political structures and traditional governance systems. Provides a Registry which shall be the official information management system that shall contain all pertinent records on the Indigenous Community Conserved Territories and Areas (ICCAs) that are voluntarily submitted by the ICCs/Ips as the ICCA registrant."
