congress_website_title = "AN ACT PROVIDING FOR THE DEVELOPMENT OF PUBLIC GREEN SPACES IN BARANGAYS, MUNICIPALITIES, CITIES, AND PROVINCES AND FOR OTHER PURPOSES"
congress_website_abstract = "Refers \"public green spaces\" to an open area of grass, trees, or other vegetation set apart for leisure, recreational, or aesthetic purposes for the general public. Proposes that public green spaces include but are not limited to permanent forests, tree parks, or watersheds with an aggregate size equivalent to at least two percent (2%) of its entire area, and may be located in one or more places within the LGU´s respective jurisdiction."
