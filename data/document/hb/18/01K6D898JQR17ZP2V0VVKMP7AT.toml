congress_website_title = "AN ACT INCREASING THE TAX ON IDLE LANDS, AMENDING FOR THE PURPOSE SECTION 236 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Proposes an additional Ad Valorem Tax to be levied to a province or city, or a municipality within Metropolitan Manila, at an annual tax of TEN PERCENT (10%) of the assessed value of the property which shall be in addition to the basic real property tax. Aims to further incentivize real property owners to make these lands productive to contribute to the national economy and to serve as better sources of revenue for the government."
