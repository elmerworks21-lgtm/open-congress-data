congress_website_title = "AN ACT INSTITUTING BUDGET REFORM THAT WILL ENSURE THE EQUITABLE DISTRIBUTION OF FUNDS FOR BOTH THE NATIONAL AND LOCAL GOVERNMENT UNITS FOR THE PURPOSE OF PROMOTING VILLAGE EMPOWERMENT, ENABLING THEM TO BE AN EFFECTIVE INSTRUMENT IN ATTAINING INCLUSIVE GROWTH, APPROPRIATING FUNDS THEREFOR AND OTHER PURPOSES"
congress_website_abstract = "Provides that adequate funds shall be appropriated mandating the Local Government Academy (LGA) to provide the LGUs with necessary tools in undertaking effective planning and proper implementation of their approved Comprehensive Development Plans. Intends to institutionalize rational and equitable budget distribution for LGU development for them to be active participants in nation-building through the allocation of \\\"Local Development Fund (LDF)\\\", which will be divided among the different political subdivisions solely for developmental projects, activities and programs (PAPs) based on their approved CDPs)."
