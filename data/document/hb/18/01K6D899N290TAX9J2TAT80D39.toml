congress_website_title = "AN ACT ABOLISHING PHILIPPINE INTERNATIONAL TRADING CORPORATION (PITC), AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to address the issues that the trade liberalization thrust of the global economy has made the mandate of the PITC redundant and irrelevant in the current times, and the passage of R.A. No.9184 (Government Procurement Reform Act) has also weakened the mandate of the PITC. Tasks the DTI to undertake the functions of PITC related to facilitative trade-related services, responsive business solutions, and trade-related government-to-government transactions, among others."
