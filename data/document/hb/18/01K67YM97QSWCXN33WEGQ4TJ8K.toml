congress_website_title = "AN ACT ESTABLISHING A GREEN PUBLIC PROCUREMENT PROGRAM FOR ALL BRANCHES OF GOVERNMENT"
congress_website_abstract = "Establishes a Green Public Procurement (GPP) Program in the executive, judicial and legislative branches of government to achieve sustainable consumption and production in government procurement in accordance with the GPP Roadmap established by the Government Procurement Policy Board (GPPB) for the purpose, consistent with the governing principles of RA No. 9184, or the Procurement Reform Act. Mandates the GPPB to design and conduct capability-building programs for all concerned procuring entities as well as green products suppliers Mandates the verification of the compliance of goods or items being procured with the green criteria established by the GPPB, in accordance with the provisions under RA 9184."
