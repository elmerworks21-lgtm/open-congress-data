congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8282, OTHERWISE KNOWN AS THE \\\"SOCIAL SECURITY LAW\\\" AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to amend the SSS law so as to supplement the change brought about by the K-12 Law by extending the age of legal dependents from twenty-one (21) to twenty-three (23), hence complementing the age when Filipino students normally finish their basic education and thus are able to provide for themselves. States that Sec.8 (e)(3)(2) of R.A.8282, as amended, shall be read as follows: SEC. 8. Terms Defined - For the purposes of this Act, the fiollowing. terms shall, unless the context indicates otherwise, have the following meanings: \\\"e) Dependents -The dependent shall be the following.: (2) The legitimate, legitimated, or legally adopted, and illegitimate child who is unmarried, not gainfully employed and has not reached TWENTY-THREE (23) years of age, or if over TWENTY-THREE (23) years of age, he is congenitally or while still a minor has been permanently incapacitated and incapable of self-support, physically or mentally; and ..."
