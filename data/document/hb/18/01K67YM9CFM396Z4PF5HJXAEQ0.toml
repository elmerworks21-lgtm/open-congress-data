congress_website_title = "AN ACT AUTHORIZING THE PRESIDENT TO EXPEDITE THE PROCESSING AND ISSUANCE OF NATIONAL AND LOCAL PERMITS, LICENSES AND CERTIFICATIONS IN TIMES OF NATIONAL EMERGENCY"
congress_website_abstract = "Provides the President, in times of national emergency, the following authority: a.) Accelerate and streamline regulatory processes and procedures for new and pending applications and renewal of permits, licenses, clearances, certifications or authorizations; b.) Suspend or waive the requirements in securing such permits, licenses, clearances, certifications or authorizations; and c.) In consultation with or upon the recommendation of the affected government agencies, prescribe to be permanent the streamlined regulatory processes and procedures, and the suspension or waiver of the requirements in securing permits, licenses, clearances, and certifications or authorizations. States that the authority herein granted shall not be used to undermine the existing procedures and processes, under applicable laws, rules and regulations, meant to protect the environment, especially those that aim to safeguard protected areas and its buffer zones, and environmentally critical areas."
