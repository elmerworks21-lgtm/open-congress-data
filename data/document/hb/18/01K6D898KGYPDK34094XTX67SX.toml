congress_website_title = "AN ACT INSTITUTIONALIZING A NATIONAL ORAL HEALTH PROGRAM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to strengthen the delivery of oral health services through the adoption of responsive and efficient policies in oral disease prevention and oral health promotion by scaling up essential programs and increasing investments to make oral health treatment and care more equitable and affordable for all Filipinos. Proposes to establish a Program that will seek to improve the determinants of oral health; integrate oral health promotion and preventive services with the general health care system; and provide timely access to quality basic oral health care and treatment, among others."
