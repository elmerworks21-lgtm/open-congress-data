congress_website_title = "AN ACT CREATING A DEPARTMENT OF FISHERIES AND AQUATIC RESOURCES PROVIDING FOR ITS POWERS AND FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the creation of a Department that shall have primary jurisdiction over the management, development, utilization and disposition of all fishery and aquatic resources of the country, including the habitats of fish and all other marine life and over activities which impact on these habitats; and the sole authority to supervise and regulate the production and capture of fish and fishery products within its jurisdiction, as well as the processing and marketing of all fisheries and aquatic products in the country, and to rationalize all ocean sector initiatives which impact on fish and maritime resources or their habitats. Proposes to abolish the Bureau of Fisheries and Aquatic Resources and transfer its relevant functions, appropriations, records, properties, equipment and personnel to the Department of Fisheries and Aquatic Resources; and abolishes, transfers and merges other government units and agencies to the Department pursuant to the implementation of this Act."
