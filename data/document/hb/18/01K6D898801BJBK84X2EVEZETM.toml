congress_website_title = "AN ACT RIGHTSIZING THE NATIONAL GOVERNMENT TO IMPROVE PUBLIC SERVICE DELIVERY"
congress_website_abstract = "Aims to improve the quality and efficiency of government service by minimizing redundancies, overlaps and duplication in its operations and simplifying rules, regulations, systems and processes. Proposes to cover all agencies of the executive branch, including departments, bureaus, offices, commissions, boards, councils, and all other entities attached to or under their administrative supervision, GOCCs; the Legislature, the Judiciary, the Constitutional Commissions, and the Office of the Ombudsman and local government units may also right size their respective offices."
