congress_website_title = "AN ACT EXPANDING THE SCOPE OF MEDICAL PRACTICE THROUGH PROVIDING GUIDELINES FOR TELEMEDICINE SERVICES, AMENDING REPUBLIC ACT NO. 2382 OR THE MEDICAL ACT OF 1959, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines Telemedicine (as defined by the World Medical Association) to the practice of medicine over a distance, in which interventions, diagnostic and treatment decisions and recommendations are based on data, documents and other information transmitted through telecommunication systems. Seeks to expand the scope of medical practice to include the practice of telemedicine, so as to make access to health care available to a broader audience, especially during the transition to the world's \\\"new normal\\\". Proposes to introduce and regulate its practice, and to recognize it as a legitimate means by which a patient may receive medical services from a licensed physician without physical contact especially to those in medically underserved areas."
