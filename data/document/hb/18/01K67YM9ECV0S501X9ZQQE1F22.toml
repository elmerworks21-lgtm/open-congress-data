congress_website_title = "AN ACT INSTITUTIONALIZING A NEW FILIPINO GESTURE OF RESPECT, GOODWILL, AND PRAISE"
congress_website_abstract = "Prescribes a new and safe gesture of respect, goodwill, and praise to be observed and performed through the simple act of gracefully laying the palm of the right hand over the center of one´s chest while simultaneously lowering the head, with eyes either closed or cast down. Mandates all government agencies and instrumentalities to allocate their respective resources for information dissemination and to encourage the practice of the new gesture."
