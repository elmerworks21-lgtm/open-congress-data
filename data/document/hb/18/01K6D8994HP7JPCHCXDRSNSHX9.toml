congress_website_title = "AN ACT DEFINING THE CRIME OF STALKING AND PROVIDING THE PENALTIES THEREFOR"
congress_website_abstract = "Prescribes punishable acts when can a person be accused of stalking: when he harasses another: by making repeated unsolicited calls...; making repeated communications anonymously or at extremely inconvenient hours, or in an offensively coarse language; making repeated visits to the victims' home or workplace; following or repeatedly maintain visual or physical proximity...; and engaging in any other course of alarming conduct."
