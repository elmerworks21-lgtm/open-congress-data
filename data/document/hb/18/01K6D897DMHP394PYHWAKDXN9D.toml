congress_website_title = "AN ACT CREATING A DEPARTMENT OF FISHERIES AND AQUATIC RESOURCES, PROVIDING FOR ITS POWERS AND FUNCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to create a Department that shall have primary jurisdiction over the management, conservation, development, protection, utilization and disposition of all fishery and aquatic resources of the country, including the habitats of fish and all other marine life and over activities which impacts on these habitats. It shall also have the authority to supervise and regulate the production and capture of fish and fishery products, as well as the processing and marketing of all fisheries and aquatic products in the country and the responsibility of rationalizing all ocean sector initiatives which impact on fish and marine resources or their habitat."
