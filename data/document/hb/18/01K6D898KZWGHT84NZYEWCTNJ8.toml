congress_website_title = "AN ACT CREATING A COMPREHENSIVE POLICY ENABLING YOUTH PARTICIPATION IN ADOLESCENT PREGNANCY PREVENTION"
congress_website_abstract = "\"The Local Council Adolescent Act of 2020\" Aims to address the alarming increase of teenage pregnancy incidence among Filipino women which has brought serious consequences for teenagers involved and has affected every aspect of their lives, both their physical and mental well-being, during and after the baby is born. Defines \"Adolescent Pregnancy\" as an individual belonging to the age group of 10-19 who is child-bearing; Seeks to create a comprehensive policy enabling youth participation in adolescent pregnancy prevention."
