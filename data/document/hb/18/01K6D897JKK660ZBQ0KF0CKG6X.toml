congress_website_title = "AN ACT AMENDING SECTION 48 OF REPUBLIC ACT 9267, 'OTHERWISE KNOWN AS THE SECURITIZATION ACT OF 2004', PROVIDING FOR STIFFER PENALTIES AND SANCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to foster the development of the capital market by supporting securitization: providing a legal and regulatory framework for securitization, and creating a favorable market environment for a range of asset-backed securities, thus providing stiffer penalties and sanctions for any person who violates any of the provisions of this Act . . . fine of not less than Five Hundred Thousand Pesos (P500,000.00) nor more than Five Million Pesos (P5,000,000.00) or imprisonment of not less than six (6) years and one (1) day nor more than twenty-one (21) years, or both in the discretion of the court."
