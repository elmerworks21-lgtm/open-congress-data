congress_website_title = "AN ACT ESTABLISHING THE COCONUT FARMERS AND INDUSTRY DEVELOPMENT TRUST FUND AND PROVIDING FOR ITS MANAGEMENT AND UTILIZATION"
congress_website_abstract = "Seeks to create a trust fund to be maintained for a period not to exceed thirty (30) years or until the fund is fully utilized which shall be used exclusively for the ultimate benefit of coconut farmers and for the development of the coconut industry. Provides for a Ten Billion Pesos (Php 10,000,000,000.00) Jumpstart Fund which may be used within two (2) years commencing from the approval of the Plan by the President to jumpstart the development of the industry; Creates the Coconut Farmers and Industry Trust Fund Committee to coordinate and monitor the implementation of the Coconut Farmers and Industry Development Plan; Conducts complete accounting and inventory of all Coconut Levy Assets by the PCGG; Allows audit by the Commission on Audit on the inventory of the Coconut Levy Assets prepared by the PCGG; and allows privatization of non-cash coconut levy assets which shall be determine by the Governance Commission for Government-Owned or Controlled Corporations."
