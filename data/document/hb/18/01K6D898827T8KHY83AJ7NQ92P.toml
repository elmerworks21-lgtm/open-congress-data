congress_website_title = "AN ACT ESTABLISHING THE PROGRAM ON PREVENTING AND COUNTERING VIOLENT EXTREMISM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Intends to fill in the gap the inadequacies of R.A.No.11054, the \\\"Organic Law for the Bangsamoro Autonomous Region in Muslim Mindanao\\\" which aims to address the armed conflict between Moro separatist factions and the government forces; and the existence of extremist groups such as the Abu Sayyaf Group (ASG) which engage in terror attacks, kidnapping, arson and other forms of violence. Seeks to introduce a third program for rebels which aims to establish the Program on Preventing and Countering Violent Extremism ( P C V E ); envisions to be a national program similar to Enhanced Comprehensive Local Integration Program ( E - C L I P ) and the Payapa at Masaganang Pamayanan ( P A M A N A ) Program."
