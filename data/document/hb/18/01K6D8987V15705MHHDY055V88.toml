congress_website_title = "AN ACT INSTITUTING INCOME TAX REFORM FOR CORPORATE TAXPAYERS, AMENDING FOR THIS PURPOSE SECTIONS 27(A) AND 28 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Seeks to replace the unitary or single income tax rate with a graduated income tax schedule for corporate taxpayers to align with the constitutional mandate of a progressive system of taxation and the rule on a uniform and equitable taxation. Proposes to lower the corporate income tax rate of domestic and resident foreign corporations with graduated rates ranging from 5% to 25%; and for a non-resident foreign corporation (not engaged in a trade or business in the Philippines), a tax rate equal to 25% of the gross income received during each taxable year from all sources within the Philippines,. . ."
