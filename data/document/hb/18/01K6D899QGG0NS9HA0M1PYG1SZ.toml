congress_website_title = "AN ACT PROVIDING FOR THE DEVELOPMENT AND PRESERVATION OF PHILIPPINE CULINARY HERITAGE"
congress_website_abstract = "Proposes the establishment of the Committee on Philippine Gastronomy and Culinary Heritage with powers, functions, and duties that include the continuous conduct, formulation of implementation standards, and the annual funding of regional and national Buwan ng Kalutong Filipino/Filipino Food Month activities. Tasks DepEd, DA, DOST, and DOT to conduct food heritage mapping; to promote and raise the awareness of the importance of culinary heritage and tradition preservation; to identify and record tangible culinary resources making use of geographic tools; to conduct regional culinary identity mapping, taking into consideration geography, the food culture of indigenous people; foods and cooking techniques; and economic viability and providing evidence of regional cuisine."
