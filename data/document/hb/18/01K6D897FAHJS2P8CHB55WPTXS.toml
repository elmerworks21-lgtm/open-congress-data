congress_website_title = "AN ACT INSTITUTING A THIRTY-FIVE (35) HOUR WORKING WEEK SCHEME AS AN ALTERNATIVE WORK ARRANGEMENT FOR EMPLOYEES IN THE PRIVATE SECTOR"
congress_website_abstract = "Provides employees under a thirty-five (35) hour working scheme to receive a rate pay, including overtime, night shift differential and other similar monetary benefits and collective bargaining agreements; right to rest periods as provided by law; have equivalent workload and the same performance standards as those of comparable employees in the company; and be provided by the employer with written information on the terms and conditions of the thirty-five (35) hour working week scheme adopted, and the corresponding responsibilities of the employees under such arrangement."
