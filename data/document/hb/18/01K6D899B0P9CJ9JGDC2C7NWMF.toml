congress_website_title = "AN ACT DEFINING HATE SPEECH AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Defines “Hate Speech” as all forms of expressions, including advocacy, that constitute incitement to discrimination, hostility and violence against any person or group of persons on the basis of ethnicity, race, religion, color, national or social origin, birth, indigenous origin or identity, migrant or refugee status, political or other opinion, sexual orientation, gender identity, sex language, and disability. Prohibits the following acts when containing hate speech: a.) Utterance or writing words, or displays or depiction of behavior made before a public audience; b.) Publication or distribution of written material to the public or through social media, broadcasting or other forms of communications; or c.) Public performance of plays, shows, recordings of audio or visual images. Penalizes any person violating any provision of this Act by arresto mayor or imprisonment for a period of not less than thirty (30) days or not more than six (6) months and/or a fine of not less than Ten thousand pesos (Php 10,000.00) or more than One hundred thousand pesos (Php100,000.00), and non-custodial sanctions such as community service, taking into consideration the circumstances and gravity of the offense."
