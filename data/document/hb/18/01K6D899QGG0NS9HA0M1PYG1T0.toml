congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF LOCAL STUDIES CENTERS IN STATE UNIVERSITIES AND COLLEGES (SUCs) THROUGHOUT THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides that the Centers shall serve as research institutions that focus on the grassroots level with the thrust of identifying, recognizing, documenting, conserving, preserving, and promoting local history, folklore, language, and other aspects of cultural heritage through academic, scientific, and scholastic approaches. Proposes the patronage of publications produced by the Center by the following: Historical Data Bank of the National Historical Commission of the Philippines, the National Library of the Philippines, and the University of the Philippines Diliman Filipiniana Library; the DFA shall purchase and disseminate to all Sentro Rizal cultural centers in foreign service posts; the local school board and the DepEd shall do the same for public and private schools, and the DILG and NLP for public libraries."
