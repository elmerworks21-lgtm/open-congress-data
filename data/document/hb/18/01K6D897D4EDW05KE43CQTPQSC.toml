congress_website_title = "AN ACT REGULATING THE USE, SALE AND DISTRIBUTION OF ELECTRONIC NICOTINE DELIVERY SYSTEMS (ENDS) AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address the unregulated and unchecked sale or distribution of ENDS such as electronic cigarettes/e-cigs, vaping devices, and the like. Proposes to regulate the proliferation of ENDS in the market and to strictly prohibit the use, sale and distribution of these products to minors. Defines ENDS as products that contain tobacco-derived substances, but in which tobacco is not necessary for operation; they are battery-powered devices that provide inhaled doses of nicotine or other substances by delivering vaporized propylene glycol/nicotine mixture."
