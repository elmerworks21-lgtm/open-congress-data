congress_website_title = "AN ACT AMENDING REPUBLIC ACT 7160"
congress_website_abstract = "Provides that Sec. 100 of R.A. 7610, otherwise known as the “Local Government Code” shall read as follows: “Section 100. Meetings and Quorum; Budget. - (a) The local school board shall meet at least once a month, as far as practicable every first week of the month, or as often as may be necessary. (b) All meetings of the local school board shall be publicly announced in the websites and social media accounts of the local government unit, the DepEd district supervisor, parent - teacher associations and the public schools within the territorial jurisdiction of the local government, and through such other means as would ensure utmost awareness and participation by all stakeholders, at least ten (10) days prior to the scheduled meeting. Any interested school official or community leader may attend such meetings, but they will not be able to vote."
