congress_website_title = "AN ACT AMENDING SECTIONS 141, 142 AND 143 OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Aims to increase the excise tax rates on alcohol products and the indexation rate to 10 percent to account for inflation and income and to approximate the 40%-to-60% sharing of alcohol and tobacco expenditure; Seeks to remove the distinction on whether fermented liquors are brewed and sold in microbreweries and pubs or in factories for simpler administration. Intends that to further simplify the tax administration on spirits, the tax shall be based on volume or per liter and no longer on \\\"per proof liter\\\", the incremental revenues that will be generated will fund social services and infrastructure programs of the government."
