congress_website_title = "AN ACT STRENGTHENING DRUG PREVENTION AND CONTROL, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9165, AS AMENDED, OTHERWISE KNOWN AS THE êžŒCOMPREHENSIVE DANGEROUS DRUGS ACT OF 2002êžŒ"
congress_website_abstract = "Seeks to strengthen drug prevention and control campaign of the government by providing, among others, for a legal presumption of who is considered as the importer, financier, and protector or coddler of illegal drugs as well as the legal consequences or penalties for importers and financiers of illegal drugs, and their protectors or coddlers. Penalizes the exportation of dangerous drugs from the Philippines, and negligent lessors of properties used as clandestine laboratories. Requires lessors of properties to submit documents to avoid their properties from being used for illegal drug purpose."
