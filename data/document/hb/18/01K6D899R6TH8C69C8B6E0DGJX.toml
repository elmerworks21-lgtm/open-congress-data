congress_website_title = "AN ACT CREATING THE NATIONAL CREATIVE INDUSTRIES INVESTMENT PROGRAM, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to “develop the support systems, structures, and mechanisms necessary to advance creative industries, which continue to generate the county´s artistic and cultural wealth.” Proposes to establish a Committee for the development of the creative sector which shall reflect target public spending levels; target levels of output, value-added, employment, and other key indicators; target levels of private investment, and measures such as favorable credit policies and regulatory forbearance; proposed infrastructure programs; proposed policies on fiscal and non-fiscal incentives; proposed promotion programs or activities, and outputs to the domestic and global markets, etc."
