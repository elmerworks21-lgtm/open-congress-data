congress_website_title = "AN ACT PROVIDING FOR THE DEFINITION OF PUBLIC UTILITY, FURTHER AMENDING FOR THE PURPOSE COMMONWEALTH ACT NO. 146, OTHERWISE KNOWN AS THE \"PUBLIC SERVICE ACT\" AS AMENDED"
congress_website_abstract = "Seeks to limit the term “public utility” to the electricity distribution and transmission sector and the water pipeline and sewerage pipeline system. Prescribes a mechanism for rate fixing that allows a reasonable rate of return to attract investments into public utilities; updates the applicable penalties and fees for public services; and strengthens the enforcement remedies of administrative agencies."
