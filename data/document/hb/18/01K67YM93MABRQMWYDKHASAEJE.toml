congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8794, ENTITLED \\\"AN ACT IMPOSING A MOTOR VEHICLE USER'S CHARGE ON OWNERS OF ALL TYPES OF MOTOR VEHICLES AND FOR OTHER PURPOSES,\\\" AS AMENDED BY REPUBLIC ACT NO. 11239"
congress_website_abstract = "Seeks to impose an optimal Motor Vehicle Road User´s Tax (MVRUT) on all types of vehicles which shall be collected from and paid by the owner of the motor vehicle; the revenues shall be used to finance road infrastructure projects of the government and the modernization of public utility vehicles and universal health care. Mandates the Land Transportation Office (LTO) to collect the Motor Vehicle User´s Tax as part of the annual vehicle registration in accordance with the set forth rates. Any registration of motor vehicles not renewed on or before the date fixed by the LTO shall be considered delinquent and invalid."
