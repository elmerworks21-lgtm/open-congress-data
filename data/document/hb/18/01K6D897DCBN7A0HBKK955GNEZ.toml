congress_website_title = "AN ACT INSTITUTING ABSOLUTE DIVORCE AND DISSOLUTION OF MARRIAGE IN THE PHILIPPINES"
congress_website_abstract = "\\\"Absolute Divorce Act of 2019\\\" This bill seeks to give opportunity to spouses in irremediably failed marriages to secure an absolute divorce decree under limited grounds and well-defined judicial procedures to terminate a continuing dysfunction of a long broken marriage; save the children from the pain, stress, and agony consequent to their parents' constant marital clashes and grant the divorce spouses the right to marry again for another chance to achieve marital bliss."
