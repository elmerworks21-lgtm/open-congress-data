congress_website_title = "AN ACT STRENGTHENING THE OFFICE OF THE GOVERNMENT CORPORATE COUNSEL AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Intends to improve and safeguard the legal interests and services of Government-Owned or Controlled Corporations (GOCCs), Government Financial Institutions (GFIs), Government Instrumentalities with Corporate Powers (GCIPs), Government Corporate Entities (GCEs) as defined in R.A.No.10149 as well as their subsidiaries and corporate offsprings including economic zones, state universities and water districts. Aims to address the expanding needs of these government corporations due to the complexities of their requirements brought by the modern business situations and conditions through proper equipping and provision of adequate compensation to the officials and employees of OGCC which should be at par with the salary grades, positions, salaries and benefits of its counterparts in the DOJ performing similar functions and providing similar legal services."
