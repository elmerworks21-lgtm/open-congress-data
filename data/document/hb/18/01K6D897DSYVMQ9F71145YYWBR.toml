congress_website_title = "AN ACT STRENGTHENING THE NATIONAL PROGRAM FOR THE ELIMINATION OF TUBERCULOSIS AS A PUBLIC HEALTH PROBLEM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10767 OR THE êžŒCOMPREHENSIVE TUBERCULOSIS ELIMINATION PLAN ACTêžŒ"
congress_website_abstract = "This bill provides the following salient features: provisions on patients right and responsibilities, corporate social responsibility to encourage business corporations to contribute in the continuing efforts to reduce the incidence of TB in the country; convergence of services to address the problem of indirect costs borne out of accessing TB treatment; TB Strategic Plan for local government units; integration of TB services into established Service Delivery Networks or local health referral system; and inclusion of TB-DOTS treatment as one of the requirements for the conditional cash transfer program. It also provides fines and penalties for non-compliance to the “No prescription, No anti-TB drugs” policy and non-observance of the national protocol on TB management and TB notification. Further, it expands PhilHealth´s benefit package for TB patients to include TB screening, MDR TB, and XDR TB, in both adults and children."
