congress_website_title = "AN ACT PRESCRIBING A STANDARDIZED RATE FOR OPTIONAL STANDARD DEDUCTION AT FORTY PERCENT (40%) OF GROSS INCOME FOR ALL TAXPAYERS, AMENDING FOR THE PURPOSE SECTION 34(L) OF NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Proposes to address the different basis in claiming the prescribed standard of 40% for OSD - based on gross receipts or gross sales for the individual taxpayer and based on gross income for corporations. It tends to put an individual at a disadvantage because this assumes that individuals or sole proprietors do not incur a cost of goods sold when actually, many sole proprietors incur a cost of goods sold just the same way as corporations do."
