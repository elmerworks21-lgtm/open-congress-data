congress_website_title = "AN ACT PROVIDING FOR THE INSTITUTIONALIZATION OF THE CONDITIONAL MATCHING GRANT TO PROVINCES (CMGP) FOR ROAD AND BRIDGE REPAIR, REHABILITATION, AND IMPROVEMENT"
congress_website_abstract = "Defines among others, \\\"Core Local Roads\\\" as the minimum road network required to support economic and social development by providing linkages between the majority of population and the basic services and facilities within the province; also serves as the primary drivers of economic growth. Seeks to provide the necessary funding of provincial road works to all provincial government annually, as well as the provision of capacity development and quality assurance measures for local road management to ensure the continuous development, improvement, and maintenance of local road networks."
