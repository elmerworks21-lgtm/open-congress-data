congress_website_title = "AN ACT REPEALING REPUBLIC ACT NO. 386, ALSO KNOWN AS THE CIVIL CODE, ARTICLE 781, ON THE GROUND OF SUPERFLUITY"
congress_website_abstract = "Renders that the provision serves no purpose and adds confusion to the law on succession because the fruits and accessions of inherited properties, which accrue after the death of the decedent, will still belong to the heirs and the acquisitions of such is no longer through succession, but as owners of the properties to which they accrue."
