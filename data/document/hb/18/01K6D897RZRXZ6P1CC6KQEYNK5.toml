congress_website_title = "AN ACT UNIFYING ALL EXISTING AGRICULTURAL CREDIT PROGRAMS FOR THE FARMERS, FISHERFOLK AND MICRO, SMALL AND MEDIUM ENTERPRISES (MSMEs) ENGAGED IN AGRICULTURAL AND FISHERIES, CREATING THE FARMERS AND FISHERFOLK QUICK CREDIT PROGRAM, ESTABLISHING THE AGRICULTURAL CREDIT AUTHORITY OF THE PHILIPPINES (ACAP), AND PROVIDING FUNDS THEREFOR, IN ORDER TO PROMOTE THE DEVELOPMENT OF ENTREPRENEURSHIP IN THE AGRICULTURE AND FISHERIES SECTORS"
congress_website_abstract = "Seeks to consolidate existing agricultural credit programs for MSMEs, thereby creating a lending facility which shall provide small farmers, fisherfolk and MSMEs in the agriculture and fisheries sectors direct, adequate, affordable, and timely credit for their farming and fishing activities. Defines MSME in agriculture-related business activities among others; and states that FFQCP loan shall be provided with no collateral at a low interest rate and with minimal documentary/identification requirements. Intends that FFQCP shall provide grant/financing assistance for the relief and rehabilitation of concerned stakeholders engaged in agriculture/fisheries affected by calamities/fortuitous events; and provide grants and other subsidies for their education, institution capacity building activities, and training asregards to credit awareness, loan acquisition, loan repayment and on financial literacy."
