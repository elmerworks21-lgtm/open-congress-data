congress_website_title = "AN ACT ESTABLISHING THE NATIONAL ACADEMY OF SPORTS SYSTEM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to develop the athletic skills and talents of students and prepare them for a long-term career in sports. Mandates the NAS System to offer a full scholarship on secondary education to natural-born Filipino citizens with considerable potential in sports. For the purposes of this Act, foundlings who are born in the Philippines and those who acquired Filipino citizenship by virtue of Sec. 4 of RA 9225, otherwise known as the “Citizenship Retention and Re-acquisition Act of 2003,” shall be considered natural-born Filipino citizens. Provides for the construction and site of NAS at the New Clark City Sports Complex, Capas, Tarlac; creates a Board of Trustees which shall be headed by the DepEd Secretary; provides the powers and functions of the Board; exempts importation of sportswear, equipment, books, supplies, instruments, materials and goods, including donations to the NAS System from custom duty in accordance with the provisions of RA 10862."
