congress_website_abstract = "This bill seeks to provide the framework and funding for the safe and phased reopening of schools beginning from low-risk areas which shall cover all public and private educational institutions at all levels. Mandates all local government units and concerned government agencies, together with the education stakeholders, to form a roadmap based on the actual needs and conditions in their respective localities."
