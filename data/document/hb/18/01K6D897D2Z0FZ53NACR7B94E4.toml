congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA OF WORKERS IN THE INFORMAL SECTOR, INSTITUTIONALIZING MECHANISMS FOR IMPLEMENTATION THEREOF AND AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NOS. 7160 AND 8282"
congress_website_abstract = "Defines informal sector known as IS as “units”, whether individual or group, own-account/self-employed or micro-entreprenuer or livelihood enterprises regularly employing family members, engaged in the production of goods and services with the primary objective of generating employment and incomes to the units concerned in order to earn a living. Seeks for the social protection and empowerment of the members of the informal sector by providing access to social protection benefits and to provide appropriate regulation, due representation in local government agencies and meaningful planning that will harness their full potentials to become effective economic actors."
