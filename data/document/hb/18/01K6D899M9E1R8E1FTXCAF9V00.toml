congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE ATOMIC REGULATORY FRAMEWORK, CREATING FOR THE PURPOSE THE PHILIPPINE ATOMIC REGULATORY COMMISSION, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to provide a legal framework that adequately protects public health and safety and the environment against the harmful effects of ionizing radiation, and for the safety and security of atomic material, other radioactive material including radioactive sources, and their associated facilities and activities; to establish the Philippine Atomic Regulatory Commission (PARC) for the purpose of exercising regulatory control over the peaceful uses of ionizing radiation in the territory or area under the jurisdiction or control of the Republic of the Philippines. Provides for the requirements for the regulation and authorization of facilities and activities, including standards to ensure the safe conduct of activities related to the utilization, production, transport, development, import and export and disposal of nuclear and radioactive materials. Establishes a Radioactive Waste Management Fund which shall be held in escrow and can only be utilized for the decommissioning of atomic facilities including the safe management disposal of the atomic waste and spent fuel. Enumerates the activities subject to authorization to transfer, construct, receive, own, possess, operate, import or export any atomic installation and radiation facility and the requirements for such authorization."
