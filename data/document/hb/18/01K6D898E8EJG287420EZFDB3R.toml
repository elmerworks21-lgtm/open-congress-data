congress_website_title = "AN ACT AMENDING SECTIONS 11 AND 14 OF REPUBLIC ACT NO.3019, OTHERWISE KNOWN AS \\\"THE ANTI-GRAFT AND CORRUPT PRACTICES ACT\\\", AS AMENDED"
congress_website_abstract = "Provides further amendments to Sec.11 of R.A.No.3019, as amended by R.A.No.10910 as follows: \\\"SECTION 11. Prescription of offenses - All offenses punishable under this Act shall be imprescriptible\\\" [shall prescribe in twenty (20) years] Proposes to eliminate the first sentence of Sec.14 as regards to exception of unsolicited gifts or presents of small or insignificant value. Intends to retain only the second sentence of Sec.14 which states that \\\"... where the practice of such profession, trade or occupation involves conspiracy with any other person or public official to commit any of the violations penalized in this Act\\\"."
