congress_website_title = "AN ACT INSTITUTIONALIZING MALASAKIT CENTERS IN ALL ACCREDITED PUBLIC HOSPITALS ALL OVER THE PHILIPPINES"
congress_website_abstract = "Aims to provide indigent patients with zero balance billing by institutionalizing the Malasakit Center in efforts to unburden them of documentary requirements for them to avail of various medical assistance and treatments in hospitals. Proposes a one-stop service center of government services comprised of different agencies which can provide help to families of patients who wish to settle medical expenses through expediting of complicated processes in availing of services primarily for, but not limited to, financial assistance. Intends to bring government services closer to the poor and marginalized people as agencies will be house in one location."
