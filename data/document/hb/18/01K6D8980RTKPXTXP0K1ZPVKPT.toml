congress_website_title = "AN ACT ADJUSTING THE SALARY SCHEDULE OF CIVILIAN PERSONNEL IN THE GOVERNMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Salary Standardization Law V\\\" Intends to implement a salary schedule that is generally comparable with those in the private sector doing comparable work and in accordance with the provisions of existing salary and position classification laws. Aims to keep the salary for government personnel fair and reasonable in recognition of fiscal realities and maintain personal services cost at a reasonable proportion of over-all expenditures. Proposes to conduct a periodic review of the salary and position classification system taking into account the changes in skills and competency requirements and the possible erosion in the purchasing power due to inflation, and other factors."
