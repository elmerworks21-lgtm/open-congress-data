congress_website_title = "AN ACT INSTITUTING REFORMS IN REAL PROPERTY VALUATION IN THE PHILIPPINES, ESTABLISHING THE NATIONAL VALUATION AUTHORITY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to adopt a market value prevailing in the locality where the property is located, as a single real property valuation base for the assessment of real property related taxes; and to establish market value for valuing or appraising real property for various government purposes. Proposes to separate the function of appraising and assessment of property from tax policy and tax administration, thereby creating a National Valuation Authority (NVA) to regulate and have oversight on the valuation and appraisal of real property in the country."
