congress_website_abstract = "Intends to address the rising number of road accidents in spite of the implementation of R.A.No. 10930 by providing stricter rules in its stipulated point system mechanism. Aims to add a new Sec.23-B-A to the “Land Transportation Code” to enable the automatic revocation of driver´s licenses once all the default points are used up due to continuous or repetitive traffic offense."
