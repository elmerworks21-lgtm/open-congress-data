congress_website_title = "AN ACT ELEVATING THE STATUS OF THE CHILDREN BORN OUT OF WEDLOCK, AMENDING FOR THIS PURPOSE ARTICLE 177 OF EXECUTIVE ORDER 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "Declares that \\\"Children conceived and born outside of wedlock may be legitimized by a subsequent valid marriage of their parents\\\" which amends Art. 177 of the Family Code. States that no court declaration is necessary to effect legitimation, but only an Affidavit of Legitimation may be filed with the Civil Registrar where the records of birth of the child is registered."
