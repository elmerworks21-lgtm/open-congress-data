congress_website_title = "AN ACT ENCOURAGING CORPORATE SOCIAL RESPONSIBILITY, PROVIDING INCENTIVES THEREFOR"
congress_website_abstract = "Refers corporate social responsibility (CSR) to the commitment of business to contribute on a voluntary basis to sustainable economic development by working with relevant stakeholders to improve their lives in ways that are good for business, sustainable development agenda and society at large. Defines CSR-related activities as charitable programs and projects; scientific research; youth and sports development; cultural or educational promotion; services to veterans and senior citizens; social welfare; environmental sustainability; health development; disaster relief and assistance; and employee and worker welfare related related CSR activities. Allows stock corporations to retain surplus profits in excess of one hundred per cent (100%) of their paid-in capital stock to be used to definite corporate expansion or corporate social responsibility projects and programs approved by the directors. Mandates the Department of Trade and Industry to recognize and reward all business organizations for outstanding, innovative and world-class CSR-related services, projects and programs , and extend endorsement and encouragements to domestic and foreign corporations doing business in the Philippines which are candidates for recognition in international award-giving bodies for their CSR-related activities."
