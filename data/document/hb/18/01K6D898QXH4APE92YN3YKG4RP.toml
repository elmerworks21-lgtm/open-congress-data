congress_website_title = "AN ACT PROMOTING THE ENVIRONMENTALLY SOUND MANAGEMENT OF E-WASTE IN THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines several terms which includes \\\"E-Waste\\\" which shall refer \\\"to old, end-of-life or discarded appliances that use electricity and other electrical and electronic equipment which have been disposed of by their original users\\\". Seeks to ensure that e-waste management is accomplished in an environmentally sound manner that adheres to the principles and agreements in which the country is a signatory and has committed compliance, as follows: a. the Basel Convention, which controls the transboundary movement and disposal of hazardous wastes; b. the principle of “extended producer´s/distributor´s responsibility”; and c. the Basel Ban Amendment, which prohibits the transboundary movement of hazardous waste from developed to developing countries. Proposes several provisions as regards to the responsibilities of the national and local government and recyclers; and recycler's registration program, among others."
