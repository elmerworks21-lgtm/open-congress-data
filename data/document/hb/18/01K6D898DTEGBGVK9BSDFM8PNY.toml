congress_website_title = "AN ACT AMENDING SECTION 5, PARAGRAPH 3 OF REPUBLIC ACT NO. 9225 OTHERWISE KNOWN AS THE \\\"CITIZENSHIP RETENTION AND RE-ACQUISITION ACT OF 2003\\\""
congress_website_abstract = "Intends to correct the injustice where public universities are unfairly disadvantaged compared to their private counterparts in that they would be hard-put to convince dual citizens to renounce their foreign citizenship as a condition precedent to employment, whereas private educational institutions do not labor under the same requirement. Aims further to address the problem wherein our State Universities and Colleges will be further disadvantaged compared to its A S E A N and international counterparts by removing the requirement of renunciation as a condition precedent to the appointment of dual citizens to University of the Philippines and other SUCs."
