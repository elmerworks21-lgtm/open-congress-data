congress_website_title = "AN ACT FURTHER STRENGTHENING THE AUTONOMY OF LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE SECTION 16 AND SECTION 41 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE “LOCAL GOVERNMENT CODE OF 1991”"
congress_website_abstract = "Intends to address LGU's limitation in the exercise of its powers brought about by national laws and policies that tend to prevent them from truly exercising their right to self-government and address the different needs of their constituents. Aims therefore, to further foster genuine and meaningful local autonomy by strengthening the delegated power of LGUs under Section 16 of the LGC, which embodies the general welfare clause. Proposes that Section 41(b) of R.A. 7160, as amended by R.A.8553 is hereby further amended to read as follows: “(b) The regular members of the Sangguniang Panlalawigan, Sangguniang Panlungsod, and Sangguniang Bayan shall be elected by district as follows: “First and second-class provinces shall have NOT MORE THAN FOURTEEN (14) regular members; third and fourth-class provinces, NOT MORE THANT TWELVE (12); and fifth and sixth-class provinces, NOT MORE THAN TEN (10): Provided, That, in provinces having more than five (5) legislative districts, each district shall have NOT MORE THAN THREE (3) Sangguniang Panlalawigan members."
