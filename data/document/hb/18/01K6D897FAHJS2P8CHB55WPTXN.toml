congress_website_title = "AN ACT INSTITUTING REFORMS IN REAL PROPERTY VALUATION AND ASSESSMENT IN THE PHILIPPINES, REORGANIZING THE BUREAU OF LOCAL GOVERNMENT FINANCE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes to: a) establish and maintain valuation standards in appraising lands, buildings, machinery and other real properties; b) provide a comprehensive and up-to-date electronic database of all related transactions (sale, exchange, lease, mortgage, donation, and others, and on the cost of construction or renovation of buildings and other structures, and on prices of machinery); c) ensure transparency to protect the public and develop confidence in the work of appraisers and assessors. Tasks the Bureau of Local Government Finance (BLGF), through the Real Property Valuation Service (RPVS) to lead and manage the implementation in the development, adoption, and maintenance of valuation standards consistent with generally accepted valuation standards, regulations and specifications for real property appraisal used for tax and other purposes."
