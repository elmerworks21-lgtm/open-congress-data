congress_website_title = "AN ACT REQUIRING THE DEPARTMENT OF AGRARIAN REFORM AND THE DEPARTMENT OF AGRICULTURE TO SUBMIT AN ANNUAL REPORT TO CONGRESS ON STATISTICS RELATING TO THE CONVERSION OF AGRICULTURAL LAND TO NON-AGRICULTURAL USES INCLUDING A REVIEW OF EXISTING POLICIES AND PROCEDURES"
congress_website_abstract = "Intends to address the continued decrease of the country´s agricultural land base which threatens its ability to produce sufficient food to meet domestic needs, and undermines the economic base of many rural areas. Proposes to develop criteria to identify the effects of government programs on agricultural land conversion; tasks the department agencies and LGUs to use such criteria to determine and take into account its adverse effects on said land preservation; consider appropriate alternative actions that could lessen such adverse effects; and evaluation of said programs and policies´ compatibility with the development plans at the national and local levels."
