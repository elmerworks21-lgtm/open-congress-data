congress_website_title = "AN ACT REQUIRING DEVELOPERS OF PROPOSED CONDOMINIUM PROJECTS TO DEVELOP AN AREA FOR SOCIALIZED HOUSING, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 4726 ENTITLED \\\"THE CONDOMINIUM ACT\\\""
congress_website_abstract = "Aims to help mitigate, if not eradicate the backlog of housing needs in the country by requiring developers of proposed condominium projects to develop an area for socialized housing which is equivalent to twenty percent (20%) of the total project area or total condominium project cost, at the option of the developer. Prescribes that the area for such socialized housing component shall be done within the same city or municipality, whenever feasible, and in accordance with the standards set by the Housing and Land Use Regulatory Board (HLURB) and other existing laws."
