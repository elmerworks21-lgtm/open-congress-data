congress_website_title = "AN ACT PROVIDING FOR A NATIONAL PROGRAM TO SUPPORT AND CARE FOR THE ABANDONED, NEGLECTED, AND VOLUNTARY COMMITTED CHILDREN, CREATING A SPECIAL TRUST FUND, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to provide a trust fund account in a trust entity for every covered abandoned, neglected, or voluntary committed children which shall be entitled to a quarterly deposit in his/her trust fund for the entire duration that the child was in an orphanage or child-caring institution and shall receive the lump sum amount when he/she reaches the age of eighteen (18)."
