congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8972, OTHERWISE KNOWN AS THE SOLO PARENTSêžŒ WELFARE ACT OF 2000, PROVIDING FOR ADDITIONAL BENEFITS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to lighten the burdens of solo parenting and sustain their child's basic needs by expanding the coverage and benefits of R.A.No.8972. Proposes to provide twenty percent (20%) discount on tuition and miscellaneous fees, per child, from grade school to college on any educational institution and state colleges and universities; provided that a single parent who is receiving support from the child's other parent shall not be eligible to receive the benefit. Provides that any person or establishment who violates the provisions of this Act by denying or hindering a solo parent from availing any of these benefits shall suffer penalties as provided in this Act."
