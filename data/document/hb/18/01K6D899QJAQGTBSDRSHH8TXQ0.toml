congress_website_title = "AN ACT AUTHORIZING THE COMMUNITY ENVIRONMENT AND NATURAL RESOURCES OFFICE OF THE DEPARTMENT OF ENVIRONMENT AND NATURAL RESOURCES TO ISSUE PERMITS FOR THE CUTTING, GATHERING, AND UTILIZATION OF NATURALLY GROWN TREES IN PRIVATELY-OWNED LANDS"
congress_website_abstract = "Covers all applications for the cutting, gathering, and utilization of natural grown trees in private and titled lands. Penalizes any public officer, found for abuse of authority, or grave misconduct in the issuance of permits or certifications in violation of this Act and its implementing rules and regulations. Makes other acts such as commission of bribery, extortion or other illegal act in order to secure the issuance of permit or license subject of this Act a criminal liability and shall be sanctioned with fine or imprisonment, or both."
