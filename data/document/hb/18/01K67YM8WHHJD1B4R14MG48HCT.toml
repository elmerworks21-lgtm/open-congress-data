congress_website_abstract = "Provides for an employment contract between the caregiver and the employer before the commencement of the service in a language or dialect understood by both parties. Enumerates the duties of the caregivers. Provides eight (8) working hour shift, payment of wages, leave benefits and other benefits, and basic necessities for caregivers, among others."
