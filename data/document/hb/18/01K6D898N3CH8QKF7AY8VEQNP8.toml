congress_website_title = "AN ACT AMENDING SECTIONS 129, 164 AND 225 OF REPUBLIC ACT NO. 8424, AS AMENDED, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE OF 1997, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to address the proliferation of illicit trade on tobacco products which was alleged to be brought about by several increases in excise tax. Tasks the B I R to exercise regulatory authority over all articles subject to excise tax such as those produced or kept in areas such as but not limited to Special Economic Zones, Economic Zones, and freeports pending investigation of violations of the provisions of Art.129 of NIRC Code of 1997. Describes several instances when an act is considered an offense of engaging in the illicit trade of cigarettes/tobacco products; specifies persons or parties who shall be held accountable for the commission of an offense; and provides for corresponding fines and/or penalties for violation of this Act."
