congress_website_title = "AN ACT INCREASING THE PENALTIES IMPOSED AGAINST CONTRACTORS AND SUBCONTRACTORS WHO VIOLATE ANY MATERIAL PROVISION OF CONTRACTS INVOLVING PUBLIC WORKS PROJECTS OF THE GOVERNMENT, AND PUBLIC OFFICIALS WHO ALLOW SUCH VIOLATIONS, AMENDING FOR THIS PURPOSE PRESIDENTIAL DECREE NO. 1759"
congress_website_abstract = "Seeks to strengthen P.D.No.1759 by increasing the penal sanctions on the violations of the provisions of contracts involving public works projects, either as to material, quality and quantity of work, the offending contractor/sub-contractor shall suffer: a) an imprisonment ranging from 20 years to life imprisonment; b) a fine ranging from 50% to 200% of the amount of the contract; c) suffer ipso facto revocation of their contractor's licenses including the professional licenses of executives in charge of the design and construction of the project."
