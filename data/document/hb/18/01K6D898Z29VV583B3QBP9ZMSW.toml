congress_website_title = "AN ACT PROVIDING PROTECTION TO FREELANCERS AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\" Freelancers Protection Act \\\" Intends to recognize the changing landscape of how jobs are performed by freelancers whether in-person or through online platforms or gig economy, which has grown exponentially with technological advancement, and to address their weakening labor rights and their changing concepts of work and employer-employee relationship. Provides therefore a regulatory framework for their unique circumstances by putting their safety and welfare into consideration, among others. Seeks to cover all freelancers, regardless of the profession, talent, skills, task, work or service required to be rendered. Defines several terms among others such as crowdwork, platform provider and other related terms."
