congress_website_title = "AN ACT AMENDING SECTION 6, CHAPTER II, TITLE II OF PRESIDENTIAL DECREE # 198, AS AMENDED"
congress_website_abstract = "Provides that local officials have a compelling duty to address basic needs of their constituents, water being one of the most essential because they have a larger stake in the issue of water supply and sharper capacity because of the proximity to assess the problem than the central agency LWUA. Provides that the autonomy of Metropolitan Cebu Water District (MCDW) and the other water districts in the country, which P.D.No.198 provides, shall not be interpreted to rule out oversight by LGUS in helping assure adequate supply of water to their constituents. Amends therefore P.D.No.198, series of 1973 to allow and encourage the oversight by local governments on the performance of water districts."
