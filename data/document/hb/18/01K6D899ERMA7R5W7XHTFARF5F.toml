congress_website_title = "AN ACT INSTITUTIONALIZING THE GREEN CORRIDOR INITIATIVE FOR TOURISM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Defines Green Corridor Initiative as any tourism program and activity spearheaded by local government units, in collaboration with the State and private stakeholders: that shall ensure and promote regional biodiversity, improve environmental quality, offer economic resilience opportunities, protect heritage and culture, and support the jumpstart of the economy in the new normal. Tasks the DOT in coordination with the DILG, DENR, and DOH to create the operational guidelines of the Green Corridor Initiative in adherence to the principles and objectives of the Tourism Act of 2009 (R.A. No.9593)."
