congress_website_title = "AN ACT PROVIDING INCOME TAX RELIEF TO MEDICAL FRONTLINERS FOR TAXABLE YEAR TWO THOUSAND TWENTY"
congress_website_abstract = "Aims to exempt all medical frontliners from paying twenty-five percent (25%) of income tax due for taxable year 2020 subject to rules and regulations to be formulated by the Bureau of Internal Revenue (BIR). Provides exemption of the salary or compensation, as well as the gross receipts from the exercise of profession or employment received by frontliners for taxable year 2020. States that income received by the medical frontliners from their other businesses, investments and other kinds of passive income not related to serving, treating, caring, aiding, assisting Covid-19 patients shall not be included in the tax exemption. Authorizes the Secretary of Department of Finance to extend the payment of income tax to qualified frontliners for a period of not more than six (6) months."
