congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8762, \\\"OTHERWISE KNOWN THE RETAIL TRADE LIBERALIZATION ACT OF 2000\\\", PROVIDING STIFFER PENALTIES AND SANCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to foster amendments to this Act to provide stiffer penalties and sanctions, encompass greater variety of goods, create more competitive local performers, promote introduction of new technology, and more opportunities for the Filipino people. Proposes amendments to Sec.9 to read as follows: Sec.9. Promotion of Locally Manufactured Products. - For Five (5) years after the effectivity of this Act, at least Ten percent (10%) of the aggregate cost of the stock inventory of foreign retailers shall be made in the Philippines. Also proposes amendment to the penalty clause section wherein any person who shall be found guilty of violation of any provision of this Act shall be punished by imprisonment of not less than Eight (8) years, and a fine of not less than Five million pesos (P5,000.000.00) but not more than Twenty million pesos (P20,000,000.00)."
