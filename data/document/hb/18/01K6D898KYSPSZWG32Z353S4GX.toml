congress_website_title = "AN ACT PROVIDING FOR THE ELECTION OF SECTORAL REPRESENTATIVES TO THE LEGISLATIVE BODIES OF LOCAL GOVERNMENT UNITS"
congress_website_abstract = "Proposes to resolve the unrealized provisions of the Party-List System Law and the Local Government Code which provides for sectoral representatives in local legislative bodies to consider the important role of the marginalized sectors in nation-building by ensuring their participation in crafting policies that involve the general and collective interest of the Filipinos. Intends to bring into fruition the Constitution's vision of balanced, democratic and well represented local legislative bodies where sectoral representatives of workers or peasants, women, urban poor, indigenous people, persons with disabilities, and all other organizations which shall be identified in the future can now participate in the local elections."
