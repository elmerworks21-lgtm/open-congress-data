congress_website_title = "AN ACT ENHANCING THE PROTECTION AGAINST COUNTERFEIT MEDICINE, AMENDING FOR THE PURPOSE R.A. 8203"
congress_website_abstract = "Intends to enhance the enforcement of existing laws regarding counterfeit drugs by increasing the penalty for committing crimes as follows: 1.mere possession of counterfeit drug; 2.the fake drug is for animals; 3.an act that conceals, substitute, dispose, or destroy any drug as may have been segregated and sealed by the BFAD or who shall break, alter or tamper any mark or seal used by the Bureau to identify those segregated ones; 4.the illness sought to be cured is aggravated or has resulted in physical injury or suffering; and 5.the counterfeit medicine is the proximate cause of death of a victim who unknowingly purchased and took it."
