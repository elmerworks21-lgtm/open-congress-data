congress_website_title = "AN ACT INCREASING THE PENALTIES UNDER THE ANTI-GRAFT AND CORRUPT PRACTICES ACT, AMENDING FOR THAT PURPOSE REPUBLIC ACT NO. 3019,AS AMENDED"
congress_website_abstract = "Seeks to increase the maximum penalty for violations of Sections 3, 4, 5, and 6 of R.A. No. 3019 to TWENTY (20) YEARS to mirror the maximum period for reclusion temporal, while the imposable fine or imprisonment for failure to submit one´s STATEMENT OF ASSETS, LIABILITIES and NET WORTH (SALN) will be increased to “a fine of NOT LESS THAN TEN THOUSAND PESOS (P10,000.00) nor more than ONE HUNDRED THOUSAND PESOS (P100,000.00), or by imprisonment not exceeding FIVE YEARS, or by both such fine and imprisonment, at the discretion of the Court. Provides that such upgrade of penalties for violations as provided in R.A. No. 3019 is as follows: Sec. 3 - Corrupt practices of public officers; Sec. 4 - Prohibition on private individuals (with a close personal relationship with any public official); Sec. 5 - Prohibition on certain relatives; Sec. 6 - Prohibition on Members of Congress."
