congress_website_title = "AN ACT ESTABLISHING BIKE-FRIENDLY COMMUNITIES"
congress_website_abstract = "Seeks to establish bike-friendly communities throughout the Philippines that will 1.) create a safe and easy environment for cycling; 2.) educate the community on bicycle safety and laws; and 3.) enforce rules and regulations surrounding traffic and marked lanes. It also seeks to direct the Secretary of the Department of Transportation to develop a comprehensive plan and program to ensure the safety not only of cyclists, but also other commuters."
