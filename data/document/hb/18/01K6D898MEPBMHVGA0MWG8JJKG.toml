congress_website_title = "AN ACT PROMOTING INCLUSIVE AND SUSTAINABLE PRODUCTIVITY GROWTH, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6971, OTHERWISE KNOWN AS THE PRODUCTIVITY INCENTIVES ACT OF 1990"
congress_website_abstract = "Aims to promote a working environment with an increased level of productivity, maintain industrial harmony, and propel shared commitment and responsibility among employers and employees. Seeks to reinforce labor productivity through 1.) the establishment of a Productivity Incentives Committee (PIC); 2.) the adoption of productivity incentive programs; 3.) granting productivity incentives to employees; 4) providing a tax incentive to business establishments for granting incentives to employees."
