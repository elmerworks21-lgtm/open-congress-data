congress_website_abstract = "Aims to protect all workers from abusive acts of employers. Identifies instances wherein an employer in the private sector shall publish notices of termination of employment in newspapers, social media and other public information venues. Penalizes employer who publishes a notice of termination of employment in violation of Section 2 of this Act an amount of not less than Ten thousand pesos (P10,000.00) but not more than Fifty thousand pesos (P50,000.00) upon the discretion of the court and without prejudice to the filing of any criminal case."
