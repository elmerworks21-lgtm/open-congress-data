congress_website_title = "AN ACT PROVIDING A SCHOLARSHIP GRANT FOR EVERY FILIPINO FAMILY"
congress_website_abstract = "Aims to waive the conditions and expand the privileges granted under the \\\" Universal Access to Quality Tertiary Education Act \\\" ( R.A.No.10931) which provides students free tuition and other school fees in state universities and colleges, local universities and colleges and state-run technical vocational institutions. Proposes that one member of a Filipino Family shall be a recipient of a scholarship grant to an appropriate college course or training for a technical or vocational skills, and shall cover all related expenses."
