congress_website_title = "AN ACT CREATING THE DEPARTMENT OF TECHNICAL EDUCATION AND SKILLS DEVELOPMENT, DEFINING ITS POWERS AND FUNCTIONS, REPEALING REPUBLIC ACT NO. 7796, OTHERWISE KNOWN AS THE TESDA ACT OF 1994, AND APPROPRIATING FUNDS THEREOF"
congress_website_abstract = "Seeks to recognize that to become globally competitive and labor efficient, there is a need to centralize all the State's efforts and resources to manage the country's labor force. Intends to elevate the TESDA into a Department to strengthen its powers and organizational functions - providing adequate budgetary support, personnel, and resources to further develop its projects and programs."
