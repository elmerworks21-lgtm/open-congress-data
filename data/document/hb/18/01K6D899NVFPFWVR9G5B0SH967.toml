congress_website_title = "AN ACT STRENGTHENING THE POWERS AND FUNCTIONS OF THE PHILIPPINE NATIONAL OIL COMPANY, FURTHER AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 334, AS AMENDED, OTHERWISE KNOWN AS THE “CHARTER OF THE PHILIPPINE NATIONAL OIL COMPANY”"
congress_website_abstract = "Grants the PNOC a franchise to develop, construct, own and operate pipelines and all other modes of transportation of conventional energy resources all over the country and to implement, by itself, through its subsidiaries or with other entities, a comprehensive and integrated program for all conventional energy resources. Authorizes the Secretary of Energy, in concurrent capacity, to be the Ex-Officio Chairperson of the Board and its subsidiaries, provided, that no case shall the Secretary of Energy be the Chief Executive Officer or Chief Operating Officer of the company or its subsidiaries. Mandates that the Chief Executive Officer or Chief Operating Officer shall be elected annually by the members of the Board from among its ranks; the President of the company shall have at least five (5) years of experience in oil, gas, or any energy-related industry; and the Corporate Secretary and the Vice Presidents shall be appointed by the Board. Mandates that all contracts entered into, benefits enjoyed and obligation incurred by the Company shall remain valid, in force and in effect and shall be under the name of the Company from the effectivity of this Act."
