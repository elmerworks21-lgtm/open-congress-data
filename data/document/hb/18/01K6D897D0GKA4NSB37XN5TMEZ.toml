congress_website_title = "AN ACT DECLARING THE COCONUT LEVY ASSETS AS A TRUST FUND, PROVIDING FOR ITS MANAGEMENT AND UTILIZATION, AUTHORIZING THE PRIVATIZATION AND MANAGEMENT OFFICE TO DISPOSE THE COCONUT LEVY ASSETS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to make sure that the coconut farmers benefit from the coco levy fund; that more funds will be provided for infrastructure and research to strengthen the coconut industry, and efforts shall be supported to recover the remaining funds. Reconstitutes the Philippine Coconut Authority to ensure the participation of coconut farmers in the crafting and implementation of the Coconut Farmers and Industry Development Plan ;Creates a Coconut Farmers and Industry Trust Fund which shall be capitalized, managed, invested, utilized and accounted for in the manner provided in this Act and shall be used for the benefit of the coconut farmers and the development of the coconut industry; Mandates the Designated Disposition Entities assigned by the Trust Fund Management Committee to privatized or disposed Coco Levy Assets subject to the regulatory approvals as required by law and to take title to and possession of, conserve, provisionally manage, and dispose the Coco Levy Assets which have been identified for privatization and disposition."
