congress_website_title = "AN ACT IMPOSING SALES TAX IN LIEU OF VALUE-ADDED TAX, REPLACING FOR THE PURPOSE THE ENTIRE PROVISIONS OF TITLE IV, AND AMENDING SECTION 116, TITLE V, AND SECTION 236, TITLE IX, OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to shift to a simple sales tax system that will implement a gross taxation system. Aims to eliminate the abuse of the input tax mechanism of the present VAT system, and simplify the monitoring and administration by the government. Proposes to impose a lower tax rate that consumers shall pay on goods and services. Proposes several provisions as regards persons liable to pay sales tax; rate and base of tax on the sale of goods or properties; tax on the importation of goods; tax on the sale of services and use or lease of properties; transactions exempted from the sales tax; and compliance requirements."
