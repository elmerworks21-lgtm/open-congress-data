congress_website_title = "AN ACT LIMITING THE LIABILITY OF A CARDHOLDER FOR UNAUTHORIZED TRANSACTIONS IN CASES OF LOSS, FRAUD OR THEFT OF CREDIT OR DEBIT CARDS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10870"
congress_website_abstract = "Intends to address the absoluteness in holding innocent cardholders solely liable for fraudulent and unauthorized transactions made before reporting the lost or stolen credit card, which runs contrary to the declared policy of that State to protect them against unfair practices, fraud, and scams. Provides that there shall be, in the service level agreement between the acquiring banks and their partner merchants, a provision: THE IDENTITY OF A CARDHOLDER SHALL BE ASCERTAINED BY REQUIRING THE PRESENTATION OF A VALID IDENTIFICATION CARD . . . OR SOME OTHER MEANS OF AUTHENTICATING THE IDENTITY OF THE CARDHOLDER. Proposes that a credit card issuer shall disclose: A CLEAR AND PROPER DESCRIPTION OF THE MEANS WHICH THE CARD ISSUER MAY BE NOTIFIED OF THE LOSS AND THEFT . . . THE TELEPHONE NUMBER DEDICATED SOLELY FOR REPORTING . . .; A REMINDER TO THE CARDHOLDER . . . THAT THE FAILURE TO REPORT THE LOSS OR THEFT . . . WITHIN REASONABLE TIME WOULD RESULT IN POTENTIAL LIABILITY FOR UNAUTHORIZED TRANSACTIONS."
