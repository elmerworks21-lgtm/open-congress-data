congress_website_title = "AN ACT IMPOSING STIFFER PENALTIES FOR THE OFFENSES OF STEALING OR VANDALIZING OF GOVERNMENT ROAD AND TRAFFIC SIGNS, WARNING DEVICES, ACCESSORIES AND OTHER FACILITIES"
congress_website_abstract = "Aims to improve the condition of roads and make vehicular traffic as safe as possible by providing motorists with appropriate information through signs and accident-prevention devices. Mandates concerned government agencies and instrumentalities to install, in conspicuous and appropriate places, road and traffic signs and devices, to warn motorists of risks and dangers on the road. Declares it unlawful to steal or vandalize government road and traffic signs, warning devices, accessories, and other facilities, installed by the national and local governments and penalizes the violation of such acts."
