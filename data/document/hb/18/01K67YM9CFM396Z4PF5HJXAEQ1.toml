long_title = "AN ACT IMPOSING STIFFER PENALTIES FOR THE OFFENSES OF STEALING OR VANDALIZING OF GOVERNMENT ROAD AND TRAFFIC SIGNS, WARNING DEVICES, ACCESSORIES AND OTHER FACILITIES"
