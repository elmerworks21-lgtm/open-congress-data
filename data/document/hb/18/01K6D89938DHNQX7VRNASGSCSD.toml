congress_website_title = "AN ACT AMENDING THE PENAL CODE, ARTICLE 259 ON ABORTION"
congress_website_abstract = "Defines the following terms: abortive or abortifacient, and abortive device; Proposes that the penalties imposed by law against abortion be meted to their maximum and an imposition of additional penalty of perpetual loss of license to practice their profession by the guilty individuals. Seeks to encourage the reporting of violations by exempting the mother on whom an abortion was performed from criminal prosecution in exchange for her testimony against the physician, midwife, nurse, or health worker concerned."
