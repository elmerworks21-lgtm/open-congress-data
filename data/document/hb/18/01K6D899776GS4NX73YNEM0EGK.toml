congress_website_title = "AN ACT CHANGING THE TERM OF OFFICE OF BARANGAY OFFICIALS AND MEMBERS OF THE SANGGUNIANG KABATAAN FROM THREE (3) TO FIVE (5) YEARS, AND PROVIDING FOR LIMITATIONS ON THEIR RECALL, AMENDING FOR THE PURPOSE SECTIONS 43 (c) AND 74 OF REPUBLIC ACT NO. 7160, AS AMENDED, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Seeks to change the term of office of barangay officials and members of the Sangguniang Kabataan from three (3) years to five (5) years which shall begin after the regular election of barangays officials on December 5, 2022. Provides that the next regular election of barangay officials shall be held on the second Monday of May 2027 and every five (5) years thereafter. Provides that no recall of any elective barangay official shall take place within two (2) years from the date of the official´s assumption to office or two (2) years immediately preceding a regular or local election."
