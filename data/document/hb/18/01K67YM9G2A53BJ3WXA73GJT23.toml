date_filed = "2020-12-16"
long_title = "AN ACT INCREASING THE PENALTIES FOR PERJURY, AMENDING FOR THE PURPOSE ARTICLES 183 AND 184 OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
scope = "National"
subjects = [ "Perjury",]
congress_website_author_codes = ["I069"]
congress_website_coauthors_raw = ["NIETO, YUL SERVO","MACEDA, EDWARD","AGABAS, TYRONE D.","VILLARICA, HENRY R."]
congress_website_committee_codes = ["0520","0532"]
congress_website_primary_keys = [152455]
congress_website_title = "AN ACT INCREASING THE PENALTIES FOR PERJURY, AMENDING FOR THE PURPOSE ARTICLES 183 AND 184 OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS \"THE REVISED PENAL CODE\""
congress_website_abstract = "Seeks to increase the penalty for providing false testimony under oath or through affidavit, or through solemn affirmation made in lieu of an oath from arresto mayor in its maximum period to prision correctional in its minimum period to prision mayor in its minimum period to prision mayor in its medium period. Provides that if the offender is a public officer or employee, the penalty of perpetual absolute disqualification from any appointive or elective position in the government or in any agency, entity or instrumentality and a fine not to exceed One million pesos (P1,000,000.00) shall be imposed on the perjuring public officer or employee."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=18&q=HBN-8268"

