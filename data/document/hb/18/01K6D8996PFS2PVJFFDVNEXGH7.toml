congress_website_title = "AN ACT REQUIRING PERSONNEL OF TOURISM ESTABLISHMENTS, TOURISM-ORIENTED ORGANIZATIONS, AND ALL OTHER PERSONS PROVIDING TOURISM-RELATED SERVICES TO UNDERGO BASIC FIRST AID TRAINING"
congress_website_abstract = "Mandates personnel of tourism establishments, tourism-oriented organizations, and all persons providing tourism-related services to undergo basic first aid training provided by the Philippine Red Cross (PRC) or other reputable training institutions that shall issue the appropriate training certificate for this purpose. Requires all concerned LGUs to ensure that all tourism establishments seeking the renewal of their business permits shall submit a sworn statement attesting that their personnel have undergone basic first aid training with their individual training certificates."
