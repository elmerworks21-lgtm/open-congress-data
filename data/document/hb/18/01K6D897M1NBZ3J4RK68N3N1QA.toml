congress_website_title = "AN ACT AMENDING ARTICLES 14, 211 AND 225 OF THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to amend several provisions in the Family code to remove the preferential treatment for the father's decision in matter's concerning children, from exercising authority over their persons and properties to withholding or giving consent to their child's marriage. Intends to harmonize the Family Code with the Magna Carta of Women and shall serve as responses to our international commitments sustained on the Elimination of all Forms of Discrimination Against Women and the United Nations Convention on the Rights of the Child."
