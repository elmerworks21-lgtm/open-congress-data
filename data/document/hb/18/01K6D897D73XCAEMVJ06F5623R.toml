congress_website_title = "AN ACT AMENDING SECTION 15 OF REPUBLIC ACT NO. 7227, AS AMENDED, OTHERWISE KNOWN AS THE BASES CONVERSION AND DEVELOPMENT ACT OF 1992"
congress_website_abstract = "Aims to diffuse income opportunities that will serve as additional funding source for the development and promotion of the Clark Special Economic Zone (CSEZ). Proposes to amend the allocation of gross income on taxes earned within the CSEZ as follows: 1% will be remitted to the national government, 1% to be equally shared by the provincial governments of Pampanga and Tarlac, 1% to municipalities or cities, and 2% to the governing body of the CSEZ or the Clark Development Corporation."
