congress_website_title = "AN ACT FURTHER AMENDING REPUBLIC ACT NUMBER 4566, OTHERWISE KNOWN AS THE \"CONTRACTOR'S LICENSE LAW\", AS AMENDED, PROVIDING FOR THE TYPES, ADDITIONAL CONDITIONS, AND REQUIREMENTS IN THE ISSUANCE OF A CONTRACTOR'S LICENSE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to prioritize Filipino contractors and workers in the construction industry without closing barriers to the entry of foreign contractors; Provides that qualified Filipino contractors shall be issued regular licenses to enable them to engage in multiple undertakings. Proposes that foreign contractors may also engage in construction business under a special license for a single project only and a regular license under specific instances. Proposes further that they are considered for the grant if their country or State of Origin allows Filipino contractors to practice within their territory on the same basis as its subjects or citizens."
