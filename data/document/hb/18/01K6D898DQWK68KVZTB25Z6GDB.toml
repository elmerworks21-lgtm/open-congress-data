congress_website_title = "AN ACT CONVERTING INTO COMPONENT CITIES THE CAPITAL TOWNS OF PROVINCES WITHOUT A CITY AND WHICH ARE AMONG THE TWENTY POOREST PROVINCES AS OF THE FIRST SEMESTER OF 2018, CLASSIFIED AS SUCH BY THE PHILIPPINE STATISTICS AUTHORITY (PSA), AMENDING FOR THE PURPOSE SECTION 450 OF REPUBLIC ACT NO. 7610, AS AMENDED BY REPUBLIC ACT NO. 9009, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to elevate the status of these municipalities into component cities in order to grant more autonomy, taxation powers and an increase share in the internal revenue allotment, thereby capacitating them to improve the lives and well-being of their populace, especially the poor. Aims also to invigorate the investment climate in the locality and put them at par with the other existing capital cities and enable them to equally and fairly enjoy the benefits of cityhood."
