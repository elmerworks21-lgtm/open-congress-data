congress_website_title = "AN ACT MANDATING THE DUTY TO RENDER ASSISTANCE AT SEA IN ACCORDANCE WITH RELEVANT INTERNATIONAL CONVENTIONS TO WHICH THE PHILIPPINES IS A STATE PARTY AND FOR OTHER PURPOSES"
congress_website_abstract = "“ Good Samaritan at Sea Law ” Proposes to hold the vessel´s captain, crew, and passengers liable for refusing or failing to assist persons in distress at sea; and penalizes violators of this Act with a fine depending on the size of the vessel or ship. Provides that under specific circumstances, when a ship is unable to respond to a distress alert, the ship captain has to document the reason for his failure to render assistance and immediately inform the search and rescue service or the Philippine Coast Guard."
