congress_website_title = "AN ACT GRANTING ADDITIONAL BENEFITS TO PROSECUTORS OF THE NATIONAL PROSECUTION SERVICE, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 10071, OTHERWISE KNOWN AS THE \\\"PROSECUTION SERVICE ACT OF 2010\\\""
congress_website_abstract = "Aims to properly compensate the prosecutors due to the great risks and perils they encounter and the threat and imminent danger they face due to the nature of their profession. Seeks to grant them additional benefits: by providing a monthly hazard pay during their incumbency in an amount equivalent to 25% of their basic salary; the issuance of service firearms for their protection against death threats as a consequence of the performance of their duty; and survivorship benefits, primarily to the surviving legitimate spouse and dependent children."
