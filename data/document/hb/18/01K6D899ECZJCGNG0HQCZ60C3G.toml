congress_website_title = "AN ACT AMENDING SECTION 27 (B) OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Proposes to amend Sec.27(B) of the NIRC of 1997, as amended, to read as follows: “SEC.27. Rates of Income on Domestic Corporations. - (B) Proprietary Educational Institutions and NON-PROFIT Hospitals. - Proprietary educational institutions and NON PROFIT HOSPITALS shall pay a tax of ten percent (10%) on their taxable income except those covered by Subsection (D) hereof: Provided, That beginning July 1, 2020, until June 30, 2023, that tax rate herein imposed shall be one percent (1%): . . . PROVIDED, FINALLY, THAT PROPRIETARY EDUCATIONAL INSTITUTIONS AS DEFINED HEREIN MAY AVAIL OF THE PREFERENTIAL RATE FOR THEIR TAXABLE INCOME BEGINNING TAXABLE YEAR 2016."
