congress_website_title = "AN ACT ESTABLISHING THE OVERSEAS FILIPINO WORKERS HOSPITAL AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Establishes a hospital with at least tertiary level of care to be known as “OFW Hospital” which shall be developed for the health care needs of the OFWs and their dependents. Provides exemptions from donor´s tax all grants, bequests, endowments, donations and contributions made to the OFW Hospital and from value-added tax and customs duty the importation of equipment, machinery and spare parts not available locally for the sole used of the Hospital."
