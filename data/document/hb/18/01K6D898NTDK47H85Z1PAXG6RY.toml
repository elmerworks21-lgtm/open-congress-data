congress_website_title = "AN ACT ESTABLISHING A PHILIPPINE NATIONAL INFECTIOUS DISEASES HOSPITAL AND RESEARCH CENTER IN ALL THE REGIONS OF THE COUNTRY"
congress_website_abstract = "Provides that the PNIDHRC shall be the principal hospital and research facility responsible for the: a. treatment, control, prevention, and research of highly communicable diseases whether from natural or man-made sources; b. conduct researches and advocate government actions and policies to solve medical health problems; c. seek to improve the management of infectious diseases including ill-effects to the health of humans of various hazardous chemical; d. conduct surveillance and clinical researches on important pathogens; and e. perform molecular epidemiology to investigate the mechanisms contributing the drug resistant pathogens. Proposes to appropriate the sum of Twenty Billion Pesos for the initial operation and maintenance of the hospitals and research facilities of the PNIDHRC and thereafter, the necessary amount to support its continued operation and maintenance shall be appropriated in the GAA."
