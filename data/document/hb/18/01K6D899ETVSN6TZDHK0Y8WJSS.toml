congress_website_title = "AN ACT AMENDING SECTION 79 AND 80 OF BATAS PAMBANSA BILANG 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES, PROHIBITING THE ACTS OF PREMATURE CAMPAIGNING"
congress_website_abstract = "Seeks to correct and reconcile the provisions of the Omnibus Election Code and the Republic Act No. 9369 where the prohibition against early campaigning and partisan political activity would be reinstituted. This also puts liability against a prospective candidate who carries out premature campaigning within a year before the start of the campaign period and placing him under the ambit of disqualification in the Omnibus Election Code anew."
