congress_website_title = "AN ACT PROVIDING FOR ADDITIONAL SUPPORT AND COMPENSATION FOR EDUCATORS IN BASIC EDUCATION"
congress_website_abstract = "Provides additional support in the form of allowances, inflationary adjustment assistance, medical care and well-being allowance, teaching supplies allowance, and Magna Carta Bonus to public school teachers, locally-funded teachers, Philippine Science High School system teaching and non-teaching personnel, and Non-teaching personnel of the DepEd, excluding those occupying positions from salary grade level 30, under the DepEd schedule of salaries, and/or Assistant Secretary upwards."
