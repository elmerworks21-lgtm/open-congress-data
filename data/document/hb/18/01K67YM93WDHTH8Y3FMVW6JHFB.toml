congress_website_title = "AN ACT PRESERVING THE INDIGENOUS GAMES OF THE PHILIPPINES"
congress_website_abstract = "Aims to recognize and promote the rights of indigenous cultural communities through the preservation of the indigenous peoples´ games thereby strengthening their self-expression, and promote peace, harmony, goodwill and camaraderie among them. Mandates the Philippine Sports Commission (PSC), in coordination with the Philippine Olympic Committee (POC) and the local government units (LGUs) to conduct annual regional and national indigenous sports competitions."
