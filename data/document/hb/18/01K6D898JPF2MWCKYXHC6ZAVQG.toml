congress_website_title = "AN ACT PROTECTING CONSUMERS AND MERCHANTS ENGAGED IN INTERNET TRANSACTIONS, CREATING FOR THIS PURPOSE THE ECOMMERCE BUREAU AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to create an environment founded on trust among consumers and merchants, as a means to increase the number of eCommerce participants, and ultimately achieve sustainable growth. Aims to address the need to establish an eCommerce Bureau under the Dept. of Trade and Industry ( D T I ) that: 1) will be given the responsibility to carry out the provisions of this bill; 2) will ensure the implementation of the Electronic Commerce Act of 2000 (R.A.NO.8792); and will be the focal point in the monitoring and implementation of the Phil. eCommerce roadmap. Proposes that the sale or exchange of digital products shall include the following: internet retail of consumer goods; online travel services; digital media providers; ride hailing services for personal transport; and financial services offered through digital online platforms."
