congress_website_title = "AN ACT GRANTING MENTAL HEALTH WELLNESS LEAVE TO ALL EMPLOYEES IN THE PRIVATE SECTOR"
congress_website_abstract = "Aims to address the steadily declining mental health and wellness needs of the modern workforce and the increase incidence of suicide and mental disorders due to either lack of access to professional help or the stigma that still exists in society against those who seek help for their mental health issues. States that all employees of the private sector are entitled to mental health wellness leaves for five (5) days with full pay per annum and provides that unused leaves shall not be carried over to the next year nor it can be monetized. Mandates employers to offer and implement programs to raise awareness on mental health and to ensure their employees' mental wellbeing."
