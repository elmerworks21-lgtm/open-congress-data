congress_website_title = "AN ACT PROVIDING FOR A BASIC REGULATORY FRAMEWORK FOR VIRTUAL BANKING AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines virtual bank as “a bank which primarily delivers retail banking services through the internet or other forms of electronic channels instead of physical branches”. Seeks to regulate the existence of a financial system that is accessible to as wide a proportion of the population as possible which is a prerequisite to building a strong middle class; present opportunities for fast, reliable, and less costly delivery of social cash transfers; and expedite the rollout of critical anti-poverty measures and help achieve the country's inclusive growth goals. Promotes the development of financial technology; grants adequate latitude to the BSP; auctions license to qualified virtual banking applicants; provides operations and management rules that levels the playing field; opens the sector to some degree of foreign ownership; outlines a framework for consumer protection including deposit insurance and protection against unauthorized transactions."
