congress_website_title = "AN ACT AMENDING SECTIONS 1, 2, 3 AND 16 OF REPUBLIC ACT NO. 7925 OTHERWISE KNOWN AS THE PUBLIC TELECOMMUNICATIONS POLICY ACT OF THE PHILIPPINES"
congress_website_abstract = "Intends to address the gap in the law wherein only public telecommunications entities are required to obtain a franchise which excludes those persons engaged in broadcasting companies. Amends the definition and interpretation of a franchise as \\\"a privilege conferred upon a telecommunications entity AND A BROADCASTING (TELEVISION AND RADIO) ENTITY by congress, authorizing SUCH ENTITIES to engage in a certain type of telecommunications service AND BROADCASTING SERVICE. Proposes further to amend Section 16 of the law to read as follows: \\\"No person shall commence or conduct the business of being a public telecommunications entity AND A BROADCASTING (TELEVISION AND RADIO) ENTITY without first obtaining a franchise."
