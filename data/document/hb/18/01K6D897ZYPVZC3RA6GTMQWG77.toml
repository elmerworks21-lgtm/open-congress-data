congress_website_title = "AN ACT PRESCRIBING AN URGENT, COMPREHENSIVE AND INTEGRATED LAND-BASED TRAFFIC MANAGEMENT SYSTEM TO EFFECTIVELY ADDRESS THE TRAFFIC CONGESTION CRISIS IN METRO MANILA, METROPOLITAN CEBU AND METROPOLITAN DAVAO, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes to address the crisis brought about by land traffic congestion and gridlock and the shortage of efficient, safe, secure, and accessible mass transportation in metropolitan areas. Intends to establish a primary policy-making, regulating, enforcement authority under the control and supervision of the Department of Transportation (DOTr) vested with exclusive power to manage and regulate land-based traffic and structures; harmonize all traffic regulations and policies to achieve a comprehensive and integrated statutory and regulatory framework for land-based traffic system; modernize and streamline the mass transportation systems to attain sustainable and safe networks of public transportation; institute a system of accountability for all land-based traffic stakeholders; and ensure transparency and accountability and compliance with applicable legal requirements in the execution of all projects for the purpose of alleviating the land-based traffic crisis."
