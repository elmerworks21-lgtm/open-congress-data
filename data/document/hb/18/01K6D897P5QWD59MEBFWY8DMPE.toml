congress_website_title = "AN ACT PROVIDING MEDICAL SCHOLARSHIPS TO QUALIFIED STUDENTS IN ALL MUNICIPALITIES, ESTABLISHING FOR THIS PURPOSE THE ONE TOWN: ONE DOCTOR SCHOLARSHIP PROGRAM, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address the medical manpower scarcity through a state-sponsored scholarship program that will enable and encourage more students to go into the medical field and serve their fellow countrymen, especially in the rural areas. Enumerates required qualifications of candidates who want to pursue a degree in Doctor of Medicine; and provides for several conditions of the scholarship grant. States that the scholar shall be integrated into the public health and medical service system as a medical doctor into his/her hometown for a period of at least four (4) years upon graduation, with the appropriate rank and salary, upon passing the medical board examination."
