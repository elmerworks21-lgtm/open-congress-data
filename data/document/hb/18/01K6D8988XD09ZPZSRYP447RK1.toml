congress_website_title = "AN ACT STRENGTHENING THE RIGHTS OF MOBILE TELECOMMUNICATIONS SERVICE SUBSCRIBERS, ESTABLISHING THE MINIMUM STANDARDS IN THE QUALITY OF SUCH SERVICES"
congress_website_abstract = "Identifies several provisions as regards to the appropriate regulatory measures which will provide minimum standards of service quality delivery to be complied by all mobile phone service providers to promote and protect the rights of its subscribers such as : Truth in Advertising; Telecommunication Offers; Customer Service; Unsolicited Promotions; Prepaid Load Expiration; SIM Card Expiration; Billing; Internet Speed; Number Portability; Protection of Subscriber Information; Complaint Handling; and Suspension or Termination of Service."
