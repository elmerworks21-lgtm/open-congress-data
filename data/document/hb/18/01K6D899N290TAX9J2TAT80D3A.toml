congress_website_title = "AN ACT ABOLISHING THE PROCUREMENT SERVICE - DEPARTMENT OF BUDGET AND MANAGEMENT (PS-DBM), AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides that the passage of R.A. No. 9184 undermines the mandate of PS-DBM because of the inclusion of relevant provisions that seek to strengthen the procurement service of national government agencies. Seeks to address the many issues and controversies surrounding the PS-DBM, most recent is in connection with the procurement of face shields, face masks, PPEs, and other pandemic-related purchases. Proposes that the respective Departments, Agencies, Government-Owned and/or-Controlled Corporations (GOCCs), State Universities and Colleges, and Local Government Units shall take charge of the procurement of their common-use supplies, materials, and equipment."
