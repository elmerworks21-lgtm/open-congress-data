congress_website_title = "AN ACT SETTING MINIMUM STANDARDS FOR THE OPERATION OF INTERNET CAFES"
congress_website_abstract = "Mandates all Local Government Units to enforce the provisions of this Act and all similar establishments shall be covered under this Act. Specifies adequate facilities for establishments offering computer services such as: a) system, program, or application which can aid the monitoring of the time spent by each client; b) sufficient ventilation, or if needed, an airconditioning; c) regularly cleaned comfort room/lavatory with a closed-flush toilet. Requires other regulations such as: a) a computer may be rented for only six (6) hours per person in one session; b) students in basic/secondary education shall not be allowed to rent a computer to play games from 9:00 a.m. to 4:00 p.m. during weekdays, excluding holidays/other special observances"
