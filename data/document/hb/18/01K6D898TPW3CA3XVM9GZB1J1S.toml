congress_website_title = "AN ACT AMENDING REPUBLIC ACT 8792 (ELECTRONIC COMMERCE ACT OF 2000), PROVIDING FOR STIFFER PENALTIES AND SANCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to facilitate domestic and international dealings, transactions, arrangements, agreements, contracts and exchanges and storage of information through the utilization of electronic, optical, and similar medium, mode, instrumentality, and technology to recognize the authenticity and reliability of electronic documents related to such activities and to promote the universal use of electronic transaction in the government and general public. Proposes to amend Sec.33 of the Electronic Commerce Act of 2000 as regards to penalties by fine and/or imprisonment to acts of hacking or crackling; piracy; violations of the Consumer Act and other relevant pertinent laws through transaction covered by or using electronic data messages or electronic documents."
