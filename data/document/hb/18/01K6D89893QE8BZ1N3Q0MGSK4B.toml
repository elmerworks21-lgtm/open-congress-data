congress_website_title = "AN ACT ESTABLISHING A SYSTEM OF REGISTRATION FOR LEASE ON REGISTERED LANDS"
congress_website_abstract = "Proposes to authorize the issuance of certificates of lease on lease on registered lands so that a lessee may be able to prove the existence of the lease. Expands P.D.No.1529 as amended, (where the system of registration is limited only to registration by annotation which is the inscription of a memorandum on the original certificate title of property and the owner's duplicate) by providing an indefeasible proof of lease to further safeguard the right of the lessee."
