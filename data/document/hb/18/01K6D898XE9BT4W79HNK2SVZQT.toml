congress_website_title = "AN ACT AMENDING SECTIONS 28, 38 AND 39 OF REPUBLIC ACT NO. 7305,OTHERWISE KNOWN AS THE “MAGNA CARTA OF PUBLIC HEALTH WORKERS”"
congress_website_abstract = "Proposes to grant a LOSS OF EARNINGS BENEFIT (LOEB) to public health workers to protect them against the consequences of ILLNESS OR QUARANTINE; and presumed work-connected, ILLNESS incurred while doing overtime. Intends to grant public health workers LOEB equal to seventy-five (75%) percent of the public health worker´s monthly salary, in case of death and permanent disabilities while in the performance of duty."
