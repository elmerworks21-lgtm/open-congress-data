congress_website_title = "AN ACT PROHIBITING POLITICAL TURNCOATISM AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Defines Political Turncoatism as the change of political party affiliation by any party member within a period of one (1) year immediately preceding or following an election; or to an independent candidates and party-list candidates who, after participating in an election, shall join any political party within a period of one (1) year following such election regardless whether he won or lost. Provides for several instances where political turncoatism shall not apply and for penalties for violation of this Act."
