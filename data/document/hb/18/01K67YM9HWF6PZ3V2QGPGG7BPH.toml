congress_website_title = "AN ACT REGULATING THE PRACTICE OF MICROBIOLOGY IN THE PHILIPPINES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to institute a regulatory system that guarantees the delivery of technical services in a manner that ensures food safety and high quality of manufactured goods, prevents the rapid spread of microbially-caused diseases in human, plant, and animal populations, and helps provide a safe and healthy environment for the general populace. Also aims to develop and nature competent, ethical, globally competitive and well-rounded professionals who shall observe the highest standard of excellence through credible and relevant licensure examination. Creates the Professional Regulatory Board for Microbiology which shall promulgates, administer and enforce rules and regulations of the practice of microbiology in the country. Allows holders of Master´s or Doctoral Degree in Microbiology or related fields from an HEI to apply for exemption as microbiologist without examination from the Board provided they have actively practiced the microbiology professional for at least five (5) years. Allows issuance of temporary permit to foreign registered or licensed microbiologist to practice microbiology in the Philippines under certain conditions."
