congress_website_title = "AN ACT MANDATING A TAX HOLIDAY FOR ALL QUALIFIED HEALTH WORKERS SERVING AT THE FRONTLINES DURING THE CORONAVIRUS DISEASE 2019 (COVID-19) GLOBAL PANDEMIC"
congress_website_abstract = "Refers \\\"Qualified Health Workers\\\" for purposes of this Act, to persons who are engaged in health and health-related work, and all persons employed in all hospitals, sanitaria, health infirmaries, health centers, rural health units, barangay health stations, clinics and other health-related establishments, public or private, and shall include medical, allied health professional, administrative and support personnel employed regardless of their employment status Provides that \\\"applicable period\\\" means from March 15, 2020 to May 15, 2020, which may extend not exceeding three (3) calendar months if the emergency related to COVID 19 is likely to be still ongoing during such period."
