congress_website_title = "AN ACT PROVIDING FOR A NATIONAL DEFENSE ACT, TO FOSTER THE SUPPRESSION OF INSURGENCY AND OTHER SERIOUS THREATS TO NATIONAL SECURITY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to create a comprehensive National Defense Act to ensure accountability and uprightness in police exercise of discretion as well as to achieve efficiency and effectiveness of its members and units in the performance of their functions. Mandates the DND to support the AFP on matters involving suppression of insurgency, except in cases where the President shall call on the DND to support the AFP in combat operations. In time of national emergency, the PNP, BFP and the BJMP shall assist the armed forces in meeting the national emergency."
