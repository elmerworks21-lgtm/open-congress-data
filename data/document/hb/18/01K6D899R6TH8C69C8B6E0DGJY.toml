congress_website_title = "AN ACT PROHIBITING PREMATURE CAMPAIGNING, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9369, AS AMENDED, OR THE “AUTOMATED ELECTION SYSTEM LAW”"
congress_website_abstract = "Seeks to equalize the playing field among candidates by removing the confusion brought about by the provision in the Automated Election Law that determines when a person becomes a candidate. Intends to bring back the effectiveness of Sec.80 of the Omnibus Election Code, disqualifies candidates for premature campaigning (Sec.68 of the OEC), and criminalizes the same."
