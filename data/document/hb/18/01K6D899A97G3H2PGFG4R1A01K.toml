congress_website_title = "AN ACT TO ESTABLISH THERAPEUTIC EQUIVALENCE REQUIREMENTS FOR GENERIC DRUGS"
congress_website_abstract = "Defines several terms among others such as “Essential Drugs List” or “National Drug Formulary”; “Core List”; and “Complementary List” Intends to ensure that the drug products with similar generic name also contain the same chemical components responsible for the claimed therapeutic effects. Enumerates several requirements for a drug to be considered the therapeutic equivalent of a drug listed in the Essential Drugs List or National Drug Formulary before its approval by the DOH Secretary."
