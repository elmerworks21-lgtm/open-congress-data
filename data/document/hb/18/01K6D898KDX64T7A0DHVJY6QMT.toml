congress_website_title = "AN ACT INSTITUTIONALIZING THE PHILIPPINE COAST GUARD AUXILIARY (PCGA), AMENDING FOR THE PURPOSE SECTION 11 OF REPUBLIC ACT NO. 9993, OTHERWISE KNOWN AS THE PHILIPPINE COAST GUARD LAW OF 2009, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to institutionalize PCGA as a service-oriented, uniformed, voluntary organization which is a non-government, non-political organization whose membership adhere to the PCG customs and traditions, to enable the government to fully harness its potential. Establishes PCGA as a citizen armed group and uniformed service attached to the PCG which shall be provided maximum opportunity to participate in safeguarding the coastline security of the State and in maritime, environmental and socioeconomic development."
