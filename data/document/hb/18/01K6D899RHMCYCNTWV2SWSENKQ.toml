congress_website_abstract = "Seeks to address the failure to renew franchises of public utilities due to pandemic, civil strife, and other similar national and global crises, among others. Proposes to amend the Code by incorporating a policy of automatic extension of the effective period of an expired franchise until Congress - prevented by a fortuitous event or force majeure - can already act on its application for renewal."
