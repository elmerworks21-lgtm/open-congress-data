congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION OF EMPLOYEES IN THE BUSINESS PROCESS OUTSOURCING (BPO) INDUSTRY"
congress_website_abstract = "Aims to maintain a balance between the protection of the interests and welfare of the workers and employees in the B P O industry and to ensure that the impact of its growth be trickled down to most of the populations. Enumerates several rights of B P O employees as regards to organizing/joining labor organizations; safe and healthy working environment; an hour meal break; respect for privacy when it comes to personal phone calls, in compliance with the Data Privacy Act; comfortable resting area for night shift employees until daybreak; and to be informed of the terms and conditions of their contract."
