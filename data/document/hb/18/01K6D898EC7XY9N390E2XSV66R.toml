congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 10068 OR \\\"THE ORGANIC AGRICULTURE ACT OF 2010\\\""
congress_website_abstract = "Intends to address criticism on the seemingly exclusive rights given to private certifying bodies and the high cost to get certified to use the \\\"organic\\\" label for organic produce, which severely prevent the all-round growth of organic agriculture since it discriminates against small farmers, small fisherfolks, and indigenous peoples which is detrimental to their livelihood. Seeks to amend the law to further promote organic agriculture, to make the law more appropriate for our country's food producers that include marginal farmers, municipal fisherfolk and micro, small and medium entrepreneurs. Defines \\\"Participatory Guarantee Systems (PGS)\\\", recognizes it in the certification and labeling of organic products and brings together the appropriate agencies and stakeholder groups to develop and strengthen such alternative certification mechanisms, and likewise ensures the protection of indigenous organic resources against cross contamination of engineered crops."
