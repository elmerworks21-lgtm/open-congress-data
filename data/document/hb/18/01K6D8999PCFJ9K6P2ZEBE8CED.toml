congress_website_title = "AN ACT AMENDING ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE PENAL CODE, ARTICLE 310, TO INCREASE THE PENALTIES IN CERTAIN INSTANCES OF QUALIFIED THEFT"
congress_website_abstract = "Seeks to increase the penalties for the crime of theft on the following circumstances: 1. The penalty of reclusion temporal in its maximum period to reclusion perpetua shall be imposed if the property taken on the occasion of the following: a. Fire, earthquake, typhoon, volcanic eruption, floods, or any other calamity natural or man-made; b. civil disruption or disturbance, public want or emergency; and c. accidents involving land, sea, air and transport. 2. The penalty of reclusion perpetua shall be imposed if the offender is a law enforcement agent or officer, a barangay official, a fireman of the Bureau of Fire Protection and of other civil organization exercising the same functions, and any other government official or employee entrusted with a duty to render assistance on the foregoing occurrences."
