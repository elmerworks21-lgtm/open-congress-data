congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION OF FINANCIAL CONSUMERS AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines among others, “Financial Consumer” as a natural person or micro, small or medium-sized enterprise that had or has a current or prospective financial transaction with financial entities pertaining to financial products and services; and refers “Financial Products or Services” to those developed or marketed by a financial person which may include, but is not limited to savings, credit, insurance, investments, payments, remittances, and other similar products and services. Seeks to strengthen the State´s regulatory powers in the financial service arena - to invest in rulemaking, surveillance and inspection, market monitoring, and enforcement powers to the nation´s financial regulators: the Bangko Sentral ng Pilipinas, the Securities and Exchange Commission, the Insurance Commission, and the Cooperative Development Authority."
