congress_website_title = "AN ACT AMENDING SECTION 463 UNDER CHAPTER 2, TITLE 4, BOOK 3 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Makes mandatory instead of optional the appointment of the Provincial Environment and Natural Resources Officer (PENRO). Seeks to designate an official who should be responsible for ensuring that the lands in every province are protected from the wanton and illegal cutting of logs and that in areas where reforestation is needed, the same shall be undertaken to avoid destructive flooding in the future."
