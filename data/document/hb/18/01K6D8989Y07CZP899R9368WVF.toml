congress_website_title = "AN ACT ESTABLISHING A PRIVATE HOSPITAL DEVELOPMENT PLAN AND PROVIDING ASSISTANCE TO PRIVATE HOSPITALS BY GRANTING OF INCENTIVES"
congress_website_abstract = "Proposes for a Private Hospital Development Plan which will be drawn in coordination with the DOH, other government agencies, and NGOs which shall monitor the needs of private hospitals in terms of facility, equipment, and human resources. Seeks to create a Special Private Hospital Fund that will be sourced from real property taxes paid by the private hospitals which shall be used to finance the improvement of private hospital and to assist community-based projects in various localities."
