congress_website_title = "AN ACT TO PROVIDE TRAINING ON VIOLENCE PREVENTION TO PROFESSIONALS WHO WORK WITH CHILDREN"
congress_website_abstract = "Proposes a program that: 1) trains and provides professional development to individuals working in early child development programs or elementary schools; and 2) provides training to become an early childhood education/school teacher, counselor, or care provider. Intends to give priority to award grants with approved application to carry out violence prevention programs that include one or more components as regards to engaging family support and community outreach or collaboration with other services in the community, conflict resolution training with at-risk children, working in and with - economically disadvantaged communities/students, and carrying out training programs with proven effectiveness."
