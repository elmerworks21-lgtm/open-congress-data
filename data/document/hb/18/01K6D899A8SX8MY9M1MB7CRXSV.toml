congress_website_title = "AN ACT PROVIDING FOR THE PREVENTION AND TREATMENT OF DRUG AND ALCOHOL ABUSE AMONG HIGH RISK YOUTH"
congress_website_abstract = "Defines “High-Risk Youth” by enumerating certain youth groups more vulnerable or susceptible to substance abuse who may not have any access to formal institutional structures due to their marginalized status. Mandates DOH to make priority grants that would assist public and nonprofit entities for their community-based programs or projects that intend to develop and demonstrate innovative and effective models with multiple, coordinated services and which employ research designs so that disenfranchised sectors of the youth may be saved from the debilitating effects of substance abuse and become competent partners in development."
