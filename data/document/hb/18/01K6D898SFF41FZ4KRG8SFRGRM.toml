congress_website_title = "AN ACT AMENDING SECTION 14-B OF REPUBLIC ACT NO. 11199, OTHERWISE KNOWN AS THE SOCIAL SECURITY ACT OF 2018"
congress_website_abstract = "Proposes to amend Sec. 14-B of R.A. 11199 which shall be read as follows: Section 14-B. Unemployment Insurance - A member who is not over sixty (60) years of age who has paid at least thirty-six (36) months contributions twelve (12) months of which should be in the eighteen months immediately preceding the unemployment shall be paid benefits in the form of monthly cash payments equivalent to fifty (50%) of the average monthly salary credit for a maximum of two (2) months. Intends to mandate the Social Security Commission to amend the Implementing Rules and Regulations of the existing law."
