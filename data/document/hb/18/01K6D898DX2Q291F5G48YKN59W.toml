congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION OF WORKERS IN THE BUSINESS PROCESS OUTSOURCING (BPO) INDUSTRY"
congress_website_abstract = "Refers \\\"Business Process Outsourcing\\\" or \\\"BPO\\\" as the transfer of an organization's non-core processes to a third-party who uses an information technology-based service delivery, and in turn manages the selected process based on defined and measurable performance criteria. Seeks to protect the interests and welfare of the workers in the BPO Industry by giving them the right to social protection that includes among others, the right to privacy of personal calls, and for the night shift workers/employees to have the right to stay in a comfortable resting area within the employer's premises until daybreak to ensure their safety."
