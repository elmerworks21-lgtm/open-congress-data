congress_website_title = "AN ACT MANDATING THE OVERSIGHT AND AUDIT OF GOVERNMENT INTELLIGENCE AND CONFIDENTIAL FUNDS AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines \\\"intelligence funds\\\" as funds provided for those related to intelligence information gathering activities of uniformed and military personnel, and intelligence practitioners that have direct impact to national security; Also defines \\\"confidential funds\\\" as funds provided for those related to surveillance activities in civilian government agencies that are intended to support the mandate or operations of the agency. States that confidential and intelligence funds shall be used for intelligence, counter-intelligence and confidential activities only upon the expressed recommendation of Congress via Joint Resolution, and the approval of the President of the Philippines. Intends to fill the gaps of previous initiatives which does not fully address the issues concerning transparency, accountability and other malevolent issues surrounding the use of the funds, and therefore rectify the unconstitutional mode of allocating funds that are free from audit, public scrutiny and official accountability."
