congress_website_title = "AN ACT MANDATING THE CONDUCT OF BASELINE POLYMERASE CHAIN REACTION COVID-19 TESTING FOR THE VULNERABLE MEMBERS OF SOCIETY TO STOP THE TRANSMISSION OF THE DISEASE"
congress_website_abstract = "Aims to safeguard the people from the threat of Covid-19 pandemic by requiring them to undergo testing for early detection and proper management. Establishes the Baseline Polymerase Chain Reaction Testing, or Baseline PCR Testing as the protocol for Covid-19 testing for the vulnerable members of the society. Mandates the Philippine Health Insurance Corporation (PhilHealth) to cover the full cost of testing, including the cost of services of the pathologist, laboratory specialist and other laboratory staff which shall not be more than the prevailing market cost."
