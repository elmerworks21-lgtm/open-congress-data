congress_website_title = "AN ACT AMENDING REPUBLIC ACT 386, ALSO KNOWN AS THE CIVIL CODE, ARTICLE 737, MAKING IT CONSISTENT WITH THE OTHER PROVISIONS ON DONATIONS"
congress_website_abstract = "Intends to correct the inconsistency of Article 737 with Article 734, in some cases which states that “the donation is perfected from the moment the donor knows of the acceptance by the donee.” Proposes to amend the law to read as follows: “Article 737. [The donor´s capacity shall be determined as of the time of the making of the donation] AT THE TIME THE DONATION IS PERFECTED, BOTH OF THE DONOR AND THE DONEE MUST BE CAPACITATED."
