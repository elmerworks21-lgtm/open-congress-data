congress_website_title = "AN ACT CREATING THE OVERSEAS FILIPINO WORKERS (OFW) SOVEREIGN FUND"
congress_website_abstract = "Directs the Bureau of Treasury (BTr) to create a sperate special fund to be referred to as the OFW Sovereign Fund, where all investments made under the program shall be lodged until it is utilized by the government for its select key projects. Provides income tax and documentary stamp tax exemption on the earnings of OFWs and former OFWs from their investment in the bonds or other debt or investment instruments that the government shall issue in the implementation of this Act."
