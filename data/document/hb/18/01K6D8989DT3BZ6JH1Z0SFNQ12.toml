congress_website_title = "AN ACT FURTHER AMENDING ARTICLE 97 OF THE REVISED PENAL CODE TO EXCLUDE PERSONS CONVICTED OF HEINOUS CRIMES FROM THE APPLICATION OF GOOD CONDUCT TIME ALLOWANCE"
congress_website_abstract = "Seeks to amend further Art.97 of the Revised Penal Code so that the exlusion and disqualification of persons convicted of heinous crimes from the application of GCTA shall become explicit. Provides that criminal liability is extinquished partially: 1. By conditional pardon; 2. By commutation of the sentence; and 3. For good conduct allowances which the culprit may earn while serving his sentence PROVIDED THAT HE IS NOT A RECIDIVIST, A HABITUAL DELINQUENT, AND ESCAPEE AND/OR A PERSON CHARGED WITH HEINOUS CRIMES. Declares that \\\"NO RELEASE ORDER ON THE BASIS OF AN COMMUTED SENTENCE SHALL BE VALID UNLESS APPROVED BY THE PRESIDENT BASED UPON THE RECOMMENDATION OF THE DIRECTOR OF BUREAU OF CORRECTIONS OR THE CHIEF OF THE BUREAU OF JAIL MANAGEMENT AND PENOLOGY\\\"."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_18/HB04822.pdf"]

