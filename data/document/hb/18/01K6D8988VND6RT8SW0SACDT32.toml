congress_website_title = "AN ACT INSTITUTING CENTRALIZED PROCUREMENT OF PETROLEUM IN THE COUNTRY"
congress_website_abstract = "Declares that the act and business of importing, exporting, re-exporting, distributing, and selling at wholesale of crude oil, gasoline, kerosene, gas, and other refined petroleum products, as well as operations and activities of natural and juridical persons, firms, and entities engaged in the petroleum industry shall be carried out in a manner consistent with the public interest. Highlights the objectives and purposes of the bill as regards to: indigenous petroleum and petroleum-based resources, primarily for the general welfare; proper, adequate, and continuous supply of crude oil and refined petroleum products; reasonable prices for petroleum products and to prevent monopoly, combinations in restraint of trade, unfair competition, and economic dominations; and minimal cost and outflow of foreign exchange involved in the operations of the industry. Creates the Philippine National Oil Company-National Petroleum Exchange Corporation (PNOC-NPEC); Renationalizes the Petron Corporation and repeals R.A. 8479, also known as the “Downstream Oil Industry Deregulations Act of 1998”."
