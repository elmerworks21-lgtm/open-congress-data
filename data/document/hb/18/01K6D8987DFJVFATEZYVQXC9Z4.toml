congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7042, OTHERWISE KNOWN AS THE FOREIGN INVESTMENTS ACT OF 1991, AS AMENDED BY REPUBLIC ACT NO. 8179, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to amend the current law in order to improve investment climate in the country, RECOGNIZING THAT GLOBAL AND REGIONAL ECONOMIES AFFECT THE PHILIPPINE ECONOMY. Proposes the promotion of productive foreign investments in activities which significantly contribute to SUSTAINABLE INCLUSIVE ECONOMIC GROWTH, PRODUCTIVITY, GLOBAL COMPETITIVENESS, EMPLOYMENT CREATION, TECHNOLOGICAL ADVANCEMENT, AND COUNTRYWIDE DEVELOPMENT to the extent that foreign investment is allowed in such activity by the Constitution and relevant laws."
