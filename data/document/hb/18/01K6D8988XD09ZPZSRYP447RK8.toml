congress_website_title = "AN ACT CLASSIFYING TABLOIDS CONTAINING SEXUAL STORIES AND IMAGES AS PORNOGRAPHIC OR X-RATED, DENOMINATING THEM AS ONLY FOR ADULTS, REGULATING THEIR CIRCULATION AND PRESCRIBING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Intends to incorporate systematic domestic regulatory system banning the youth from all forms of pornography in all government programs to address the rising rates of teenage pregnancy, coupled with alarming increase in HIV infections. Aims therefore to regulate the proliferation of tabloids containing sexual stories and images distributed for the exclusive purpose of sexual arousal, by classifying it once and for all, as pornographic or x-rated, and as only for adults."
