congress_website_title = "AN ACT INSTITUTING THE MAGNA CARTA FOR NON-UNIFORMED PERSONNEL IN UNIFORMED AGENCIES"
congress_website_abstract = "States that “non-uniformed personnel” refers to all civilian employees in the military and all other uniformed agencies of the government such as AFP, PNP, BJMP, DND, BFP, BOC, PCG, and the NAMRIA. Seeks to improve the social and economic well-being of all NUP to ensure that their rights are protected, professionalize our public safety workforce, boost employee morale and ensure accountability and responsiveness of our institutions. Seeks to include provisions for salaries, work hours and working conditions, benefits, social protection, and job security."
