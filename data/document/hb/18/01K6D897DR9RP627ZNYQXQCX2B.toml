congress_website_title = "AN ACT ESTABLISHING A RENTAL SUBSIDY PROGRAM FOR INFORMAL SETTLER FAMILIES (ISFS) AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Establishes a housing and social protection program for the ISFs to lead decent lives and access to the formal housing market . Provides flat-rate rental subsidy to eligible low-income ISFs to rent accommodation in the private rental market for a maximum of five (5) years or upon availment of permanent housing, whichever comes first."
