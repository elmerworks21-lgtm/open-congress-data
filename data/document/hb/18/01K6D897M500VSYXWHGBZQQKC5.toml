congress_website_title = "AN ACT MANDATING THE INSTITUTIONALIZATION, DEVELOPMENT, TRAINING, ORGANIZATION AND ADMINISTRATION OF BASIC RESERVE OFFICERS TRAINING CORPS (ROTC) IN GRADES 11 AND 12 IN PUBLIC AND PRIVATE EDUCATIONAL INSTITUTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7077, OTHERWISE KNOWN AS THE 'CITIZEN ARMED FORCES OF THE PHILIPPINES RESERVIST ACT', AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to establish a mandatory two (2)-year Basic ROTC program for students in Grades 11 and 12 in public and private education institutions with the objective of producing well-trained and prepared reservists for military and civil service and instill patriotism, moral and spiritual virtues and respect for human rights and adherence to the Constitution. States that student who fails to undergo the mandatory Basic ROTC shall not be qualified for graduation with the following exemptions: a.) those who are physically or psychologically unfit, as certified by the AFP Surgeon General or his authorized officer; b.) those who have undergone or are undergoing similar military training; c.) those who were chosen to serve as the school´s varsity players; and d.) those who may be exempted from training for valid reasons as approved by the DND."
