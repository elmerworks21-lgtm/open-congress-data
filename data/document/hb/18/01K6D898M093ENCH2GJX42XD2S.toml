congress_website_title = "AN ACT ESTABLISHING A MEDICAL SCHOLARSHIP AND RETURN SERVICE PROGRAM FOR DESERVING STUDENTS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to narrow down the doctor to population ratio, specifically in geographically isolated and disadvantaged communities. Intends to provide access to medical education of students aspiring to become doctors especially those who are financially disadvantaged; and to instill in them the importance of medical service to the country, especially in the underserved areas. Mandates LGU's to provide necessary support to the integration program of physicians who will be assigned to the LGU."
