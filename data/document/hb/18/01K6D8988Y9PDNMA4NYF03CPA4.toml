congress_website_title = "AN ACT IMPOSING THE DEATH PENALTY ON CERTAIN HEINOUS CRIMES, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 9346, ENTITLED \\\"AN ACT PROHIBITING THE IMPOSITION OF DEATH PENALTY IN THE PHILIPPINES\\\" AND AMENDING ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE \\\"REVISED PENAL CODE,\\\" AND OTHER SPECIAL PENAL LAWS"
congress_website_abstract = "Proposes to restore the death sentence in the country by imposing the penalty on heinous crimes as defined under Act No.3815, as amended such as treason; qualified piracy; qualified bribery; parricide; murder; infanticide; rape; kidnapping and serious illegal detention; robbery with violence against or intimidation of persons; destructive arson; plunder; carnapping; and illegal acts/activities related to dangerous drugs and/or controlled precursors and essential chemical. States that the death penalty shall not be imposed when the guilty person is below eighteen years of age when the crime was committed or is more that seventy years of age when upon appeal or automatic review of the case by the Supreme Courts, the required majority vote is not obtained for said imposition. Declares that the death sentence shall be executed with preference to any other penalty and shall consist in putting the person under the sentence to death by either hanging, firing squad or lethal injection."
