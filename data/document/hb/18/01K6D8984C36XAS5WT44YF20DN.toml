congress_website_abstract = "Aims to inculcate in the youth patriotism and nationalism, and encourage their involvement in public and civic affairs. Intends to restore good manners, moral values and self-discipline which are now slowly diminishing over the years as the younger generation are being influenced by different factors such as permissive society, advancement in technology and multimedia platforms, among others."
