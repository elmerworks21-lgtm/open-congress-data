congress_website_title = "AN ACT ESTABLISHING MASAGANA, GANAP AT MAY DANGAL NA BUHAY NA HAYAHAY (MAGANDANG BUHAY) PROGRAM, GRANTING INCENTIVES TO LEGITIMATE SPOUSES HAVING ONE (1) TO TWO (2) CHILDREN AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to create an incentive-induced environment wherein the spouses exercise their freedom to make reproductive decisions which can have a positive impact on the reduction of the population growth of the country. Declares that qualified enrollees of the Program shall meet several qualifications which includes among others, that the spouses are laborers, farmers, fisherfolks, indigenous peoples, informal settlers, homeless families, families from geographically isolated and disadvantaged areas and are classified as \\\"poor\\\". States that this program is complementary with the existing Pantawid Pamilayang Pilipino Program (4P's) but the availment of one bars the enrollment to the other."
