congress_website_title = "AN ACT TO ENHANCE THE USE OF NATIONAL WEALTH FOR LOCAL DEVELOPMENT BY AMENDING CERTAIN PROVISIONS IN BOOK II OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE “LOCAL GOVERNMENT CODE OF 1991”"
congress_website_abstract = "Intends to amends Sec. 294 of Republic Act No. 7160, to be read as follows: “The proceeds from the share of the local government units . . . shall be appropriated by their local sanggunian to finance local government and livelihood projects IN THE APPROVED LOCAL DEVELOPMENT INVESTMENT PROGRAM AND ANNUAL INVESTMENT PROGRAM: THE PROCEEDS, OR A PORTION THEREOF DERIVED FROM THE DEVELOPMENT AND UTILIZATION OF HYDROTHERMAL, GEOTHERMAL, AND OTHER SOURCES OF ENERGY MAY BE APPLIED, AT THE OPTION OF THE LOCAL GOVERNMENT UNIT, TO LOWER THE COST OF ELECTRICITY . . .”"
