congress_website_title = "AN ACT IMPOSING TAXES ON OFFSITE BETTING ACTIVITIES ON LOCALLY LICENSED COCKFIGHTS AND DERBIES, AMENDING SECTION 125 OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Seeks to impose five percent (5%)tax on the gross receipts derived from offsite betting activities on locally licensed cockfights and derbies and other derivative activities , and shall not be in lieu of taxes required by the local government units, and regulatory fees and charges imposed by government agencies. Requires gaming operators to specify “Offsite Betting Activities on Locally Licensed Games” in disclosures and documentations required by the BIR and other regulatory government agencies and instrumentalities to help ensure that the government can monitor the activities of such operators. Mandates the GAB to issue rules and regulations for the fair conduct of offsite betting on locally licensed cockfights and derbies, including devices required of gaming operators, agents, and other related parties."
