congress_website_title = "AN ACT PROVIDING FOR THE REMEDY OF FILING A PETITION FOR CERTIORARI TO THE SUPREME COURT TO REVIEW THE DECISIONS OF THE NATIONAL LABOR RELATIONS COMMISSION (NLRC), AMENDING FOR THE PURPOSE ARTICLES 223 AND 224 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE \\\"LABOR CODE OF THE PHILIPPINES\\\""
congress_website_abstract = "Intends to clearly put into law the accurate “intended mode of review” of NLRC decisions directly with the Supreme Court. Proposes to reform the present set-up of three (3) stages/level of appeal/review of labor cases because the procedural requirements and process required by different modes of appeal before the case attain finality, defeat the very purpose of the Constitution on speedy labor justice."
