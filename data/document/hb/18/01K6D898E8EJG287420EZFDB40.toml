congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 10173, OTHERWISE KNOWN AS THE \\\"DATA PRIVACY ACT OF 2012\\\""
congress_website_abstract = "Aims to ensure the protection of individuals from exploitation and misuse of their personal information inspite of the challenges brought about by the 4th industrial revolution. Proposes to: address concerns on child online protection; clarifies the definition of what constitutes sensitive personal information and the requirements for personal data breach notification; and provides standard for lawful processing of personal information for public health purpose and humanitarian emergencies, among others. Declares definitive functions of the National Privacy Commission in the exercise of its quasi-judicial powers and in the effective enforcement of its orders."
