congress_website_title = "AN ACT EXTENDING THE AVAILABILITY OF APPROPRIATIONS UNDER REPUBLIC ACT NO. 11494, OTHERWISE KNOWN AS THE “BAYANIHAN TO RECOVER AS ONE ACT”"
congress_website_abstract = "Seeks to extend the effectivity of R.A. 11494 otherwise known as the “Bayanihan to Recover as One Act” until June 30, 2021 to allow the government to continue its programs and efforts to combat the effects of Covid-19. Extends the following until June 30, 2021:1.) The validity for advices of allotments issued by the DBM for funds releases charged against Section 11 of the Bayanihan to Recover as One Act; 2.) The fund releases to the local government units and government institutions, and the utilization for programs, projects and activities enumerated in Section 10 0f the Bayanihan nto Recover ad One Act; 3.) Release of allotment releases from the standby fund as provided in Section 11 of the Bayanihan to Recover as One Act; and 4.) Release, obligations and disbursement of all unreleased appropriations authorized under the Bayanihan to Recover as One Act."
