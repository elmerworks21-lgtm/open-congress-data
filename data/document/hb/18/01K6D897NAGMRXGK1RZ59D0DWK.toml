congress_website_title = "AN ACT ESTABLISHING THE MAGNA CARTA FOR BARANGAYS, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to propose the following: 1. Barangay officials including barangay tanods be considered as regular government employees with fixed salaries, allowances and other fringe benefits, including retirement benefits, and membership to Pag-ibig, PhilHealth and GSIS that regular government employees are entitled to; and 2. Every barangay be provided with basic priorities such as regular supply of clean and potable water, transport services, schools, health centers and barangay hall."
