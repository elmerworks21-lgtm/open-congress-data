congress_website_title = "AN ACT INCORPORATING THE VALUE OF RESPONSIBLE, FAIR, AND TRUTHFUL USAGE AND ENJOYMENT OF SOCIAL MEDIA IN SCHOOLS AND UNIVERSITIES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to cope with the mercurial rise of the influence and prevalence of the use of social media by the youth and/or students in their unavoidable daily immersion to these phenomena. Proposes to include social media awareness in the curricula of primary and secondary education in public and private schools, for the purpose of inculcating among the youth and/or students how various types of social media: helps in the effective and efficient dissemination of information, and in shaping public discourse and opinion; helps in fostering a more participative democracy, and in upholding truth and the veracity of facts, figures, and events; and responsible and fair use and virtues of discernment and critical-thinking in its use and/or enjoyment. Seeks to include social media awareness as part of the NSTP, particularly in the Literacy Training Service (LTS) and the Civic Welfare Training Service (CWTS); and as part of private sector´s Corporate Social Responsibility (CSR)"
