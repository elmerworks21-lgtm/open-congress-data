congress_website_primary_keys = [14797]
congress_website_title = "AN ACT MANDATING ALL BARANGAYS TO CREATE A REGISTRY OF SKILLED WORKERS"
congress_website_abstract = "Mandates all barangays to create and make public a registry that will serve as a database for all skilled workers who are willing to make their services available in the locality. Prohibits the barangay to collect fees for the inclusion of a skilled worker´s name and corresponding details in the registry. However, if the barangay decides to issue an ID pertaining to the skilled worker and the latter agrees to avail one, the barangay may collect a reasonable fee that would cover the cost of the production of the ID."
