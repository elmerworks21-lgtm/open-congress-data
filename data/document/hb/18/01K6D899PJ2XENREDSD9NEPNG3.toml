congress_website_title = "AN ACT PROVIDING FOR THE DEVELOPMENT OF SUSTAINABLE CITIES AND COMMUNITIES IN THE COUNTRY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to address the issues regarding the rapid urbanization of cities and metropolitan areas that exerts pressure on the natural environment and the affordability of housing services, public safety, and health; and that the highly populated and concentrated urbanized areas are more vulnerable to disasters and the effects of climate change. Seeks to institutionalize the policy framework for creating sustainable cities that would ensure the continuing growth of our country in pursuance of our commitment to the UNs Sustainable Development Goals (SDGS). Tasks NEDA to set targets based on several indicators for transitioned sustainable areas: urban population living in informal settlements (squatters); public transport access; urbanization rates; cultural heritage protection; deaths/injuries and economic losses from natural disasters; solid waste management and urban pollution; open and safe spaces; urban and regional planning; integrated/local disaster risk management, and other targets consistent with the model outlined in this Act."
