congress_website_title = "AN ACT AMENDING SECTION 443, 454, AND 463 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE “LOCAL GOVERNMENT CODE OF 1991”"
congress_website_abstract = "Proposes to ensure a permanent position for tourism and cultural affairs officers in every local government unit (municipalities, cities, and provinces) to strengthen cultural heritage work and promote the growth of the tourism industry in the county. Seeks to address the need to fortify the tourism safeguards provided by R.A. 9593 (Tourism Act of 2009) and R.A. 10066 (National Cultural Heritage Act of 2009), which assigns particular tasks to LGUS to foster the preservation, enrichment, and dynamic evolution of Filipino culture."
