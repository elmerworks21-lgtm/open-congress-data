congress_website_title = "AN ACT MANDATING THE LABELLING OF PLASTIC PRODUCTS ACCORDING TO THE TYPE OF PLASTIC RESIN USED IN SUCH PRODUCTS, PROVIDING PENALTIES FOR VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to mandate the labelling of plastic products according to the type of plastic resin used in such products. Despite the waste segregation schemes in the collection of garbage being employed by different local government units, puts into place a system that would hasten the management and disposal of plastic products in order to minimize their harmful impact on the environment."
