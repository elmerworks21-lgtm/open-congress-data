congress_website_title = "AN ACT PROVIDING FOR THE DELINEATION OF THE SPECIFIC FOREST LIMITS OF THE PUBLIC DOMAIN AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides guidelines and procedures to be followed in determining the specific limits of forest lands; Creates the National Review and Evaluation Committee to process, evaluate and approve all completed assessment and delineation reports; Mandates that the final forest line determined and established by the DENR shall be the final forest land boundary of the country which shall not be diminished nor reduced except by an Act of Congress. Creates the Land Classification Conflict Adjudication Board to resolve controversies arising from land classification as a result of the delimitation of forest lands."
