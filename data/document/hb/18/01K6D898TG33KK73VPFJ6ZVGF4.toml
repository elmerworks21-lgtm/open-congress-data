congress_website_title = "AN ACT PROTECTING E-CONSUMERS AND E-MERCHANTS, CREATING FOR THE PURPOSE THE E-COMMERCE BUREAU AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to regulate the transactions and trade between e-merchant and e-consumer - to ensure fair business and advertising practices and to secure online transactions, especially the small and lowly platforms as follows: a) internet retail of consumer goods; b) online travel services; c) digital media providers; d) ride-hailing services, and e) financial services. Proposes several provisions on business registration, online dispute resolution, and tax exemption, among others; States that only those whose generated revenue reach two hundred fifty thousand pesos (P250,000.00) shall be taxed."
