congress_website_title = "AN ACT PROVIDING A COMPREHENSIVE RENAL REPLACEMENT THERAPY (RRT) FOR PATIENTS WITH END STAGE RENAL DISEASE IN NATIONAL, REGIONAL, AND PROVINCIAL GOVERNMENT HOSPITALS, INCREASING THE PHILHEALTH PACKAGE RATE FOR RENAL REPLACEMENT THERAPY OF MEMBERS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to make comprehensive renal replacement therapy services available to all Filipinos who suffer from End Stage Kidney Disease by including it in the coverage of treatment services provided by PhilHealth. It also supports kidney transplantation as the best treatment option that provides the quality of life of End Stage Renal Disease patients and ensures the return of the patient to full rehabilitation. Provides the following key provisions, among others: expansion of PhilHealth benefit package for kidney transplantation or renal replacement therapy from the living donors; free dialysis to indigent patients; provision for the PCSO to pay for the remaining sessions for both peritoneal dialysis and hemodialysis after a patient has already consumed his or her benefit package from PhilHealth."
