congress_website_title = "AN ACT ESTABLISHING A NETWORK OF POP-UP BICYCLE LANES AND EMERGENCY PATHWAYS FOR USE DURING THE DURATION OF THE CORONAVIRUS DISEASE 2019 (COVID-19) PANDEMIC"
congress_website_abstract = "Aims to address the problem of transportation in preparation for the easing of quarantine restrictions to meet the demand for safe commuting of passengers which enforces social distancing measures. Intends to promote walking and the use of bicycles and other non-motorized vehicles during the duration of the COVID-19 pandemic, especially to the frontliners and essential workers. Seeks to create a network of safe and convenient lanes, walkways and emergency pathways that are people-oriented and pedestrian-friendly, which may be marked with removable tapes and mobile signs to connect users to essential destinations such as workplaces, medical facilities, and other similar places and most frequented destinations."
