congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 3019, OTHERWISE KOWN AS THE ANTI-GRAFT AND CORRUPT PRACTICES ACT, SECTION 13, ON ITS NON-APPLICATION TO IMPEACHABLE PUBLIC OFFICERS"
congress_website_abstract = "Intends to preserve and protect the principle of separation of powers among the executive branches of the government for them to be effective in the discharge of their functions. Seeks to provide an EXCEPTION to the imposition of preventive suspension to an incumbent public officer, EXCEPT OFFICERS WHO MAY BE REMOVED ONLY BY IMPEACHMENT; MEMBERS OF CONGRESS; AND MEMBERS OF THE SUPREME COURT AND COURT OF APPEALS against whom any criminal prosecution under valid information under the provisions of the Penal Code on bribery is pending in court."
