congress_website_title = "AN ACT PRESCRIBING URGENT RELATED MEASURES NECESSARY AND PROPER TO EFFECTIVELY ADDRESS THE TRAFFIC CRISIS IN METRO MANILA AND FOR OTHER PURPOSES"
congress_website_abstract = "Grants the President the power to enter into negotiated contracts for the construction, repair, rehabilitation, improvement or maintenance of critical infrastructure projects and facilities, subject to certain requirements. Further authorizes the President to set a maximum internal rate of return of not more than twelve percent (12%) of the house-estimated project cost provided, that any infrastructure project that has the capacity to yield said internal rate of return under commercial conditions may be undertaken on a build-operate-transfer basis or any of its variants as enumerated in Section 2 of RA 7718; provided, further, that the toll fees in the case of projects undertaken as BOT or any of its variants shall be set by the Toll Regulatory Board. Empowers the President to reorganize the Metro Manila Development Authority (MMDA) to make it more effective, innovative and responsive to the traffic crisis in Metro Manila."
