congress_website_title = "AN ACT AMENDING SECTION 55 OF BATAS PAMBANSA BLG. 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE, AS AMENDED, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes that Sec. 55 of the Omnibus Election Code as amended, is hereby amended to read as follows: Section 55. Office space - THE COMMISSION SHALL PROVIDE AN ACCESSIBLE AND SUITABLE PLACE FOR ITS FIELD OFFICERS AND THEIR STAFF, CHARGEABLE TO THE YEARLY APPROPRIATIONS OF THE COMMISSION. Aims to remove from the hands of the local governments the power and duty to provide such office space to be consistent with and to be truly reflective of the constitutional independence that is due to the Commission."
