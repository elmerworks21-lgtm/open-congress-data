congress_website_title = "AN ACT PROVIDING FOR SECURITY OF TENURE FOR ALL CASUAL AND CONTRACTUAL EMPLOYEES OF THE GOVERNMENT WHO HAVE RENDERED THE PRESCRIBED YEARS OF SERVICE IN THE NATIONAL GOVERNMENT AGENCIES AND THE LOCAL GOVERNMENT UNITS AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for security of tenure to all incumbent casual and contractual government employees who have rendered at least 5 (five) years of continuous service in the national government agencies or a total of ten (10) years of continuous service in the local government units provided that said requirement of continuous service may be waived if the service of the employee concerned prior to the completion of the said years, was interrupted by not more than three (3) years taken cumulatively, due to either abolition of his position, reorganization of the office or reduction in force. Employees who have been previously employed in the same government agency in any capacity, the said requirement of continuous service may likewise be waived if the interruption of their service is not more than eighteen (18) months, taken cumulatively, so long as the minimum required period is met."
