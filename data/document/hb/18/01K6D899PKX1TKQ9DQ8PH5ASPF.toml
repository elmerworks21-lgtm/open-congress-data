congress_website_title = "AN ACT INSTITUTIONALIZING THE ASSISTANCE TO INDIVIDUALS IN CRISIS SITUATION (AICS) PROGRAM AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Proposes to address the vulnerable conditions of many Filipinos who are in dire need of immediate relief when they face exigencies due to family matters, medical emergencies, and disasters. These are citizens who could not go to hospitals, funeral parlors, or go back home to their provinces, who could not avail social services because they lack the financial capability and support to do so, and families with members attending online classes also face additional financial burdens to meet learning needs. Seeks to institutionalize the AICS program to introduce a permanent national program that is financially and administratively capable of responding to the needs of Filipinos dealing with extreme circumstances. Provides for the corresponding rates and frequency in availing various assistance such as transportation, medical, burial, educational, food, cash assistance for other support services, and provision of PPEs."
