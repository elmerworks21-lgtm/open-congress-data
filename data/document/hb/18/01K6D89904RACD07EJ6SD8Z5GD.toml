congress_website_title = "AN ACT FURTHER AMENDING REPUBLIC ACT NO. 4566 ALSO KNOWN AS \\\"THE CONTRACTORS´ LICENSING LAW\\\""
congress_website_abstract = "Proposes to require that the pertinent regulatory authority first certifies that no other local contractor can undertake a certain project before a foreign entity may be granted license to operate in the Philippines; Intends to regulate the entry of foreign - owned construction companies by requiring them to prove that they are amply qualified with the requisite experience and knowledge of Philippine laws and rudimentary administrative principles; Seeks to grant the regulatory authority sufficient latitude to investigate, classify and qualify applicants for contractor´s licenses by written or oral examination, or both."
