congress_website_title = "AN ACT PROVIDING FOR CERTAIN EXEMPTIONS FROM NATIONAL INTERNAL REVENUE TAXES, AND A SIMPLIFIED BUSINESS REGISTRATION PROCESS FOR SMALL-TIME ONLINE SELLERS"
congress_website_abstract = "Seeks to categorize online sellers (any Filipino citizen who conducts online business exclusively through electronic channels including but not limited to social media, online shopping platforms, and online marketplaces) where the gross income from the conduct of the sale of goods or services is as follows: 1. small scale online seller - does not exceed PhP 150,000.00 annually 2. medium scale online seller - more than PhP150,000.00 but does not exceed Php 250,000.00 annually 3. large scale online seller - exceeds PhP 250,000.00 but not more than PhP 3,000,000.00 annually Proposes for: exemption and tax liabilities of online sellers (per category) from national internal revenue taxes such as income tax and Other Percentage Taxeswaiver of the registration fee for small and medium scale online sellers; and complete migration of the registration process to electronic modes for all small-time online sellers."
