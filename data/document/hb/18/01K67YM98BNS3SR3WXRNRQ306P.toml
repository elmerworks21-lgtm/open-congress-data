congress_website_title = "AN ACT PROHIBITING THE ACTIVE USE AND DISPLAY OF COMMERCIAL BILLBOARDS DURING TYPHOONS"
congress_website_abstract = "Mandates all billboard operators to take down all advertising materials within 12 hours from an official announcement and/or release of a Typhoon Signal No. 1 bulletin, or any other significant weather disturbance by the PAG-ASA until the duration of this period. Penalizes any billboard operator or person who shall violate the provisions of this Act to a fine of not less than Three Hundred Thousand Pesos (Php300,000.00) or the imprisonment of not less than six months but not more than one year, upon the discretion of the court."
