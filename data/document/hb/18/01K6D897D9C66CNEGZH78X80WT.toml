congress_website_title = "AN ACT INSTITUTIONALIZING THE NATIONAL ECONOMIC AND DEVELOPMENT AUTHORITY AS THE INDEPENDENT ECONOMIC AND PLANNING AGENCY OF THE PHILIPPINE GOVERNMENT, DEFINING ITS FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR, REPEALING FOR THE PURPOSE EXECUTIVE ORDER NO. 230 SERIES OF 1987, ALSO KNOWN AS THE REORGANIZATION ACT OF THE NATIONAL ECONOMIC AND DEVELOPMENT AUTHORITY"
