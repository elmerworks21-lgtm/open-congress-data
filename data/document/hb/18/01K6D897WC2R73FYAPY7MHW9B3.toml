congress_website_title = "AN ACT RIGHTSIZING THE NATIONAL GOVERNMENT TO IMPROVE PUBLIC SERVICE DELIVERY"
congress_website_abstract = "Proposes to implement a rightsizing program in the National Government for the purpose of enhancing government's institutional capacity to improve public service delivery. Seeks to improve the quality and efficiency of government service delivery by minimizing duplication and improving performance through the rationalization of service delivery and support systems and organization structure and staffing. Aims to ensure the long-term sustainability of our government service through resource mobilization and cost effective public expenditure management."
