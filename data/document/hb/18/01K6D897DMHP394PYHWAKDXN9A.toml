congress_website_title = "AN ACT TO CONSERVE AND PROTECT PHILIPPINE PUBLIC FORESTS, MANGROVES AND WILDLIFE THROUGH A COMPREHENSIVE ENVIRONMENTAL PROGRAM OF RENEWAL, REPLANTING AND REFORESTATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Creates a Coordinating Council for the Conservation, Protection and Renewal of the Nation´s Patrimony that shall formulate policies and develop projects to implement the national policy and program framework to carry out the purposes of this Act; and promulgate rules and regulations and adopt a code of services and guidelines to conserve, protect and renew the nation´s patrimony. Encourages students and community youth below twenty-five (25) years old to render service as provided in this Act. Students who will render such service may be credited with the required units for the National Service Training Program."
