congress_website_abstract = "Aims to promote and pursue reforestation programs and encourage tree planting as part of the family´s responsibility and legacy to protect the environment and conserve natural resources for the future generation. Mandates Local Civil Registry where the birth of the child shall be registered, to release the Certificate of Live Birth of the child upon presentation of the parent´s sworn statement of compliance sworn to before the Punong Barangay of the premises where the trees were planted, or before the DENR officer concerned if the trees were planted in a government-designated area outside the barangay where the family resides."
