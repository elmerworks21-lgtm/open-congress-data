congress_website_title = "AN ACT AMENDING FOR THE PURPOSE SECTIONS 102, 119, 201, 307, 402, 405, 407, 431, 802, 806, 1135, 1100, 1129, 1147, 1400 AND 1226 AND DELETING SECTION 709 OF THE REPUBLIC ACT NO. 10863 OTHERWISE KNOWN AS THE CUSTOMS MODERNIZATION AND TARIFF ACT"
congress_website_abstract = "Seeks to simplify and clearly define some processes in the customs clearance of imported goods; prevent the proliferation of Off-Dock Custom Facilities Warehouses (CFWs) by defining the Aggregate Capacity Utilization (ACU); separate the process of establishing the CFWs; and to set stricter provisions in granting the authority to operate a CFW. Seeks further to empower the Bureau of Customs in the imposition of administrative sanctions insofar as the third parties are concerned as defined under Sec.102(uu) of this Act; and includes garments and textiles bonded warehouse among the types of manufacturing customs bonded warehouse."
