congress_website_title = "AN ACT MANDATING CONCURRENCE TO INTERNATIONAL AGREEMENTS AND EXECUTIVE AGREEMENTS"
congress_website_abstract = "Seeks to reassert the power of the President in his dealing and relations with other countries or his exercise of a treaty-making power as Chief Executive. Proposes concurrence by the Senate to international and executive agreements - to ensure that any commitment made by the President, whether bilateral or multilateral arrangements, will not threaten our national security and interests. Prescribes agreements that do not need Senate concurrence which includes among others: the power to receive foreign ambassadors and recognize foreign governments; and to authorize the sending of medical missions for humanitarian reasons; the power as Commander-in-Chief of the AFP, with the exception of the deployment of military troops to any foreign country, and those that involve other forms of military assistance."
