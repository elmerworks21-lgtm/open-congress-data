congress_website_title = "AN ACT AMENDING REPUBLIC ACT 7103, \\\"OTHERWISE KNOWN AS THE IRON AND STEEL INDUSTRY ACT\\\", PROVIDING FOR STIFFER PENALTIES AND SANCTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to provide stiffer penalties for smuggling of iron and steel products and provide a set of quality and industry standards for iron and steel products. Declares that upon the operation of the smelting plants, penalties shall be imposed upon any person who shall smuggle, fraudulently import or bring goods into the Philippines that constitute the intermediate or final product of the manufacturing activity described in Sec.5(b) of this Act, or who shall receive, conceal, buy or in a manner facilitate the transportation, concealment, or sale after importation of such products."
