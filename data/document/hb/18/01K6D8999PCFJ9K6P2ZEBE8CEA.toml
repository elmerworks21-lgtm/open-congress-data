congress_website_title = "AN ACT PROVIDING THAT ALL EDUCATIONAL INSTITUTIONS, WHETHER PUBLIC OR PRIVATE, SHALL HOLD MANDATORY CONSULTATION WITH STUDENTS, PARENTS OR GUARDIANS, ALUMNI, TEACHERS, AND OTHER NON-TEACHING PERSONNEL ASSOCIATIONS, BEFORE INCREASING AND/OR ADDING MISCELLANEOUS FEES, OTHER FEES, AND PAID SERVICES"
congress_website_abstract = "Seeks to provide that all educational institutions, whether public or private, shall hold mandatory consultation with their student councils/ governments, parents or guardians, alumni, faculty, and other non-teaching personnel associations, before increasing and/or adding miscellaneous fees, other fees, and paid services. In case no consensus is reached among the concerned educational institution and the concerned parties, the DepEd (for schools), CHED (for HEIs), or TESDA (Centers) is hereby authorized to decide in a summary proceeding whether the proposed increase or additional fee or paid services should be granted."
