congress_website_title = "AN ACT PROVIDING INCENTIVES TO PUBLIC SCHOOL TEACHERS WHO ARE ASSIGNED OUTSIDE OF THEIR TOWNS AND PROVINCES, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides that any public school teacher who is assigned to a town other than his own shall be entitled to Two Thousand Pesos (P2,000.00) monthly incentive allowance; and those who are assigned to a town of another province, other than their own, shall receive Four Thousand Pesos (P4,000.00) monthly incentive allowance."
