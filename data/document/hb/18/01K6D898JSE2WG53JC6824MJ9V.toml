congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION OF FINANCIAL CONSUMERS AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address the travails (fraud, abuse and misconduct) being experienced by financial consumers due to the rapid development of complex financial products coupled with the use of advanced technologies. Proposes therefore to ensure that the rights of each and every consumer are protected by providing, among others, financial regulators such as the Bangko Sentral ng Pilipinas, Insurance Commission and the Securities and Exchange Commission. Defines several terms among others which include \\\"Financial Consumer\\\" who is a recipient of \\\"Financial Products or Services\\\" which are developed or marketed by a Financial Service Provider which may include, but are not limited to savings, credit, insurance, investments, payments, remittances and other similar products and services; also includes digital financial services."
