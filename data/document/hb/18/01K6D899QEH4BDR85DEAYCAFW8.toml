congress_website_title = "AN ACT PROVIDING FOR THE REGIME OF CONJUGAL PARTNERSHIP OF GAINS AS THE GOVERNING PROPERTY REGIME IN THE ABSENCE OF A MARRIAGE SETTLEMENT OR WHEN THE REGIME AGREED UPON IS VOID, AMENDING FOR THE PURPOSE ARTICLE 75 OF TITLE IV OF EXECUTIVE ORDER NO. 209, AS AMENDED, OTHERWISE KNOWN AS “THE FAMILY CODE OF THE PHILIPPINES”"
congress_website_abstract = "States that the property regime of conjugal partnership, instead of the system of absolute community of property, shall be the governing property regime in the absence of a marriage settlement or when the regime agreed upon is void."
