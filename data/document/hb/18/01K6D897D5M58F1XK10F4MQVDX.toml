congress_website_title = "AN ACT GRANTING EDUCATIONAL ASSISTANCE AND BENEFITS TO THE DEPENDENTS OF ALL MEMBERS OF THE ARMED FORCES OF THE PHILIPPINES (AFP), PHILIPPINE NATIONAL POLICE (PNP), BUREAU OF FIRE PROTECTION (BFP), BUREAU OF JAIL MANAGEMENT AND PENOLOGY (BJMP), NATIONAL BUREAU OF INVESTIGATION (NBI), PHILIPPINE DRUG ENFORCEMENT AGENCY (PDEA), PHILIPPINE COAST GUARD (PCG) AND BUREAU OF CORRECTIONS (BUCOR) WHO ARE KILLED OR PERMANENTLY INCAPACITATED WHILE IN THE PERFORMANCE OF THEIR DUTY OR BY REASON OF THEIR OFFICE OR POSITION"
congress_website_abstract = "Aims to grant all surviving children, surviving spouse and qualified dependent siblings of the members of the AFP, PNP, BJMP, NBI, PDEA, PCG and BuCor who are killed or permanently incapacitated while in the performance of their duty or by reason of their office or position full scholarship from kindergarten to tertiary level in a non-exclusive school or institution which shall not be limited to, payment of tuition and miscellaneous fees, allowance for books and school supplies and allowance for food and transportation."
