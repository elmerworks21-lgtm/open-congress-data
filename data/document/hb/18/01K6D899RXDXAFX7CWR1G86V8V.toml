congress_website_title = "AN ACT STRENGTHENING THE REGULATION OF EMPLOYMENT OF FOREIGN NATIONALS, AMENDING FOR THE PURPOSE ARTICLES 40, 41, AND 42 OF TITLE II, BOOK ONE OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE \"LABOR CODE OF THE PHILIPPINES\""
congress_website_abstract = "Seeks to 1. Update the provisions and reflects the terms used by the country in trade negotiations and in its bilateral, regional, and multilateral agreements´ commitments; 2. Provide flexibility in the Labor Market Test in cases where there are shortage of skilled workers in specific industries, corporations, and profession; 3. Provide training of Filipino understudies to transfer skills and technology from the foreign nationals through understudy programs; 4. Emphasize that the Department of Labor and Employment is the sole issuing authority of employment permits all over the country including those working or employed in enterprises in preferred areas of investments or in economic zones; and 5. Update the fines and sanctions for violations which was set several decades ago."
