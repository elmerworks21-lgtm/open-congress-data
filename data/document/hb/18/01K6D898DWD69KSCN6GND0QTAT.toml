congress_website_title = "AN ACT CODIFYING THE ALTERNATIVE CHILD CARE LAWS AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Seeks to address the needs of abandoned and neglected Filipino children by codifying the laws and simplifying the processes involved in providing these children a second chance of having the family care and love they deserve through out-of-home care such as that provided by residential facilities. Proposes to create the National Authority for Child Care (NACC), a one stop shop on alternative child care attached to the DSWD - reorganizing the Inter Country Adoption Board (ICAB); and makes adoption administrative in nature to effectively streamline adoption procedures and make formal adoption accessible. Provides for other forms of alternative child care such as guardianship, khafallah, kinship care, or residential care."
