congress_website_title = "AN ACT CREATING THE PHILIPPINE AIRPORTS AUTHORITY, DEFINING ITS POWERS, FUNCTIONS AND RESPONSIBILITIES, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to ensure an integrated manner of operating international and domestic airport terminals in the country, and to avoid conflicting policies and programs in airport maintenance, operation and development, and flight operations through the creation of a Philippine Airports Authority. Addresses the inherent conflict of interest existing under the current mandate of the Civil Aviation Authority of the Philippines (CAAP) where it acts as a regulatory body of the aviation industry and the operation of airports in the country."
