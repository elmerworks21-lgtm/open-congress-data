congress_website_title = "THE INVESTMENTS AND INCENTIVES CODE OF THE PHILIPPINES"
congress_website_abstract = "Proposes provisions regarding: Organization and Functions of the Board of Investment; Establishment of Domestic Industrial Zones; Investment with Incentives (Qualified Activities, Incentives to Registered Enterprises, Availment of Incentives, Registration of Enterprises, Basic Rights and Guarantees of Registered Enterprises, Administration of Incentives, and others. Defines several terms, among others as Investments Promotion Agencies (IPAS), Investments Priorities Plan (IPP), Export Sales of Goods/Services, Export/Domestic Enterprise, Domestic Industrial Zone, Special Economic Zone, Domestic Industrial Zone Developer, Export Processing Zone, Supply Chain City, and Capital Equipment. Seeks to streamline the tax breaks for businesses by stopping the practice of having perpetual perks for several industries; Intends to grant tax breaks to exporters and limits the income tax holiday for domestic enterprises to four years; Provides for an investment policy that will improve the country´s investment programs and strategies and ensuring that no industry will unjustly benefit from the incentives to be provided."
