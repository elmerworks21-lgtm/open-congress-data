congress_website_primary_keys = [145571]
congress_website_title = "AN ACT ESTABLISHING A MEDICAL SCHOLARSHIP AND RETURN SERVICE PROGRAM FOR DESERVING STUDENTS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Establishes a Medical Scholarship and Return Service (MSRS) Program for deserving students in State Universities and Colleges (SUCs) or in private higher education institutions (PHEIs) or regions where there are no SUCs offering a medical course which shall be made available for deserving Filipino students who want to pursue a degree in Doctor of Medicine. Provides qualification requirements for applicants; conditions for the grant of scholarship; and disqualifications. Mandates that upon passing the Physician Licensure Examination (PLE), the scholar shall be integrated into the public health and medical service system, through the DOH, and shall receive the appropriate civil service rank, salary and related benefits. Upon integration into the public health and medical system, the scholar shall render the mandatory return service for a period equivalent to at least four (4) years within six (6) years for those who have availed of four-year program, and seven (7) years for those who have availed of a five-year program. Requires a physician who has availed of the MSRS Program but refuses to serve in a government hospital or any other local health office or refuses to comply with the mandatory return service and integration requirement to pay twice the full cost of scholarship, including other benefits and expenses incurred by reason of participation in the scholarship program. Defines the roles and functions of CHED, SUCs and PHEIs in the implementation of the MSRS Program."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=18&q=HBN-6756"

