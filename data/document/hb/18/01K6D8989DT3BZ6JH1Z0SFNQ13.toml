congress_website_title = "AN ACT PROVIDING FOR A FAIR AND REASONABLE PUBLIC UTILITY JEEPNEY (PUJ) MODERNIZATION PROGRAM TO FACILITATE TRANSITORY ASSISTANCE TO PUBLIC UTILITY JEEPNEY DRIVERS, OPERATORS AND CONCERNED STAKEHOLDERS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes a middle ground to provide clear guidance on how the modernization program should move forward - particularly with clear indication as to what are the roles and responsibilities of the government and of the industry stakeholders in making this happen. Aims to push for a win-win-win scenario wherein the welfares of all stakeholders - transport sector, riding public and government, are upheld; and to provide an adequate, efficient reliable, and environment sustainable PUVs to ensure the safety and comfort of the riding public, and at the same time promote the welfare and protect the rights of industry players, most especially the drivers and operators of our PUJs."
