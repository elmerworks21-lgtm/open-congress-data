[meta]
bill_number = 4933
congress = 18
title = "POSTPONING THE MAY 2020 BARANGAY AND SK ELECTIONS"
date_filed = "2019-09-30"
long_title = "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9164, AS AMENDED BY REPUBLIC ACT NO. 9340, REPUBLIC ACT NO. 10632, REPUBLIC ACT NO. 10656, REPUBLIC ACT NO. 10923 AND REPUBLIC ACT NO. 10952, AND FOR OTHER PURPOSES"
scope = "National"
subjects = [ "Barangay Elections", "Sk Elections",]
congress_website_author_codes = ["F061"]
congress_website_coauthors_raw = ["SANGCOPAN, AMIHILDA J.","HATAMAN, MUJIV S.","DALIPE, MANUEL JOSE M."]
congress_website_committee_codes = ["0532","0537"]
congress_website_primary_keys = [149015]
congress_website_title = "AN ACT POSTPONING THE MAY 2020 BARANGAY AND SANGGUNIANG KABATAAN ELECTIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9164, AS AMENDED BY REPUBLIC ACT NO. 9340, REPUBLIC ACT NO. 10632, REPUBLIC ACT NO. 10656, REPUBLIC ACT NO. 10923 AND REPUBLIC ACT NO. 10952, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to postpone the barangay and sangguniang kabataan elections on May 2020 to the second Monday of May 2023 and every one (1) year following a national and local elections. Provides that the term of office of the barangay and sangguniang kabataan officials elected in the May 2023 elections and subsequently thereafter, shall commence at noon of June 30 next following their election. States that until their successor shall have been duly elected and qualified, all incumbent barangay and sangguniang kabataan officials shall remain in office unless sooner removed or suspended for a cause. Barangay and sangguniang kabataan officials who are ex officio members of the sangguniang bayan, sangguniang panlungsod, or sangguniang panlalawigan, shall continue to serve as such members in the sanggunian concerned until the next barangay election."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=18&q=HBN-4933"

