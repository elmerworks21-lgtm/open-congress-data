congress_website_title = "AN ACT MANDATING HIGHER EDUCATION INSTITUTIONS AND TECHNICAL-VOCATIONAL INSTITUTIONS TO ENSURE THE SAFETY AND SECURITY OF THE ACADEMIC COMMUNITY FROM INTERNAL AND EXTERNAL THREATS, THEREBY CREATING A SAFETY AND SECURITY COMMITTEE FOR THIS PURPOSE AND FOR OTHER PURPOSES"
congress_website_abstract = "Tasks HEIs and TVIs to provide for: a) a safe, accessible and secure environment, buildings and facilities that shall comply with government standards, and licensed and competent security personnel; b) a mechanism for students to help in crime prevention, safety and security of the concerned HEI and TVI. Enumerates the duties and responsibilities of the Safety and Security Committee which shall include: a) formulation of a Safety and Security Strategy; b) formulation of crime prevention programs; c) coordination with HEI/TVI officials in the maintenance of peace and order; d) recommendation to the HEI/TVI the conduct of seminars or training on crime and drug prevention and control; e) intensive information drive on the Safety and Security Strategy; and f) submission to the CHED or to the TESDA the composition of the SSC and its Safety and Security Strategy, as well as its program of activities and projects."
