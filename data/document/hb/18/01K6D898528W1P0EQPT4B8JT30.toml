congress_website_title = "AN ACT AMENDING SECTIONS 4 AND 8 OF REPUBLIC ACT NO. 7042, AS AMENDED, OTHERWISE KNOWN AS THE \"FOREIGN INVESTMENTS ACT OF 1991\""
congress_website_abstract = "Seeks to delete the provisions relating to the “practice of professions “ from among the items listed under the Foreign Investment Negative List (FINL), considering that several laws governing each profession allow foreign nationals to practice in the Philippines under reciprocity arrangements. Proposes to lower the threshold of employment requirement to at least fifteen (15) direct employees for a US $100,000.00 foreign investment (minimum paid-in capital of non-Philippine nationals) in small and medium-sized domestic market industries."
