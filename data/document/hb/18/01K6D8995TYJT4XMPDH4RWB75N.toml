congress_website_title = "AN ACT IMPOSING FORFEITURES ON THE OVERHEAD CHARGES DUE TO UNINTENDED OR UNANNOUNCED UTILITY SERVICE INTERRUPTION AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to compensate consumers or subscribers for the inconvenience and reduced productivity brought by electricity outages, water, and internet connectivity interruptions; Excludes services interruptions due to, but not limited to force majeure, acts of God, insurrection, rebellion, negligence by the subscriber, from the forfeitures as provided for in this Act. Seeks to charge a minute-based forfeiture on the fixed or overhead costs on utility bills from the time of unintended or unannounced interruptions until the restoration of the utility service. Mandates the Energy Regulatory Commission, Local Water Administration, and National Telecommunications Commission to determine forfeiture rates and overhead or fixed charges."
