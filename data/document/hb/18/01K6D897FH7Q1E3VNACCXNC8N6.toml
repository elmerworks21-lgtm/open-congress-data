congress_website_title = "AN ACT ADOPTING THE HIGHER PRESCRIBED PENALTY, INCLUDING DEATH, OF THE NATIONAL LAW OF AN ALIEN FOUND GUILTY OF TRAFFICKING DANGEROUS DRUGS AND OTHER SIMILAR SUBSTANCES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9165, OTHERWISE KNOWN AS THE êžŒCOMPREHENSIVE DANGEROUS DRUGS ACT OF 2002êžŒ"
congress_website_abstract = "Seeks to impose death penalty on foreign nationals who violates RA 9165 otherwise known as the Comprehensive Dangerous Drugs Act of 2002. States that should death penalty is not imposed by the national law of the offender, in addition to the penalties prescribed for the unlawful act committed, any alien who violates such provisions of this Act shall, after service of sentence, be deported immediately without further proceedings. Further states that the penalty of death, if applicable, shall be imposed despite the prohibition of the imposition of the death penalty in the Philippines."
