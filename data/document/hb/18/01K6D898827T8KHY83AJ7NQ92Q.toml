congress_website_title = "AN ACT PROHIBITING RACIAL, ETHNIC AND RELIGIOUS DISCRIMINATION"
congress_website_abstract = "Defines several terms among others such as ETHNIC ORIGIN, ETHNO LINGUISTIC GROUP, INDIGENOUS PEOPLES, STEREOTYPE/STEREOTYPING, et.al. Provides for several ACTS OF DISCRIMINATION which are deemed discriminatory and shall be prohibited: discrimination in : political participation; employment; education and training; delivery of goods and services; land, business and other accommodation; access to public places, facilities, and public meetings; advertisements/mass media; discrimination : by wrongful portrayal; through speech, utterances, acts of hatred and similar act, through analogous acts that result in impairment of the enjoyment of human rights and fundamental freedoms; through engaging in profiling; and through abuses of state and non - state actors."
