congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE BUSINESS REGISTRY DATABANK, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to create a comprehensive national repository business database to collate, merge and make available business information and training support services; and which shall promote trade and investments, through electronic networking to facilitate business transactions and partnerships among local and foreign investors and entrepreneurs. Proposes that the information/data to be utilized by the PBRD shall come from the consolidated business permits issued by the cities and municipalities and those gathered by the Securities and Exchange Commission and the Department of Trade and Industry."
