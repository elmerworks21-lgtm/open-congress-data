congress_website_title = "AN ACT DEFINING WHO ARE INSTITUTIONALIZED PERSONS AND PENALIZING THEIR MALTREATMENT"
congress_website_abstract = "Seeks to ensure that institutionalized persons not be subjected to shabby and abusive treatment from the people charged with their care and custody. Refers “institutionalized persons” to persons kept in an institution (any facility owned or managed by, or provides services on behalf of the government which employs skilled nursing, provides intermediate or long-term care, or custodial or residential care) who are: 1.) Mentally ill, disabled, or retarded, or chronically ill or handicapped; 2.) in jail, either by final sentence or under detention; and 3.) Juveniles, under certain conditions."
