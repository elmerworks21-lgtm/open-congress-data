congress_website_title = "AN ACT FURTHER AMENDING COMMONWEALTH ACT NO. 146 OTHERWISE KNOWN AS THE PUBLIC SERVICE ACT, AS AMENDED"
congress_website_abstract = "Proposes to provide a clear definition of public service and public utility, an appropriate mechanism for fixing rates based on a reasonable rate of return, and the applicable penalties and fees for public services. Proposes to transfer the functions, powers, and duties of the Public Service Commission to the various administrative agencies of the government, such as Department of Transportation; Land Transportation Franchising and Regulatory Board; Land Transportation Office; Department of Information and Communications Technology, National Telecommunications Commission; Department of Energy; Energy Regulatory Commission; Department of Environment and Natural Resources; Philippine Ports Authority; Maritime Industry Authority; Philippine Coast Guard; Civil Aeronautics Board; Civil Aviation Authority of the Phils.; National Water Resources Board; Local Water Utilities Administration; Phil. Competition Commission; and others."
