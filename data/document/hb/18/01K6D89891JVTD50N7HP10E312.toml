congress_website_title = "AN ACT INSTITUTIONALIZING THE COMMUNITY-DRIVEN DEVELOPMENT APPROACH AS A NATIONAL STRATEGY FOR INCLUSIVE GROWTH AND SOCIAL PROTECTION, MANDATING ALL NATIONAL GOVERNMENT AGENCIES AND DEPARTMENTS, INCLUDING THEIR ATTACHED AGENCIES, OFFICES AND BUREAUS, LOCAL GOVERNMENT UNITS, AND OTHER GOVERNMENT INSTRUMENTALITIES TO IMPLEMENT THEIR COMMUNITY-BASED PROGRAMS, ACTIVITIES, AND PROJECTS, APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to address the lack of an enabling policy, a national strategy and its mechanisms for community empowerment, by enhancing capacities for community participation, especially the poor, vulnerable, disadvantaged, and marginalized in the local development process. Intends to reinforce the value of participatory governance by complementing the LGC which mandates LGUs, among others, to provide basic services to constituents; and offers a step-by- step process and ready technologies that were all proven effective in stirring lasting active citizenship and allows even residents who are not part of organizations to have a voice. Institutionalizes the Kalahi-CIDSS (Kapit-Bisig Laban sa Kahirapan Comprehensive and Integrated Delivery of Social Services) as a Community Driven Development program; and Creates an Inter-Agency Advisory Council on CDD Institutionalization and the CDD Knowledge and Resource Institute (CDD KRI)."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_18/HB04764.pdf"]
