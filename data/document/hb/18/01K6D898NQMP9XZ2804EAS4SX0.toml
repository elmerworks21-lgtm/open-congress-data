congress_website_title = "AN ACT MANDATING A THIRTY-DAY NATIONAL PAYMENT HOLIDAY DUE TO THE CORONAVIRUS DISEASE 2019 (COVID-19) GLOBAL PANDEMIC"
congress_website_abstract = "Intends to alleviate the financial burden of informal sector workers, self-employed individuals, peddlers, contractual workers, and other workers under a \\\"no work, no pay\\\" arrangement who are greatly affected during the occurrence of COVID-19 global pandemic since they are not assured of any income during the quarantine period. Proposes to have a 30-day waiver of payments to the following: a) loan amortizations and premium contributions to SSS, GSIS, Pag-IBIG Fund, and PhilHealth; b) rental payments for dwelling units and commercial spaces in private establishments; c) subscription payments with internet service providers and telecommunication companies; d) toll fees for use of expressways; and e) public utilities such as electric and water consumption."
