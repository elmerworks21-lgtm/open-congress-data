congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA FOR MEDIA PROFESSIONALS"
congress_website_abstract = "Proposes to ensure a living wage for the media professionals, provide an atmosphere conducive to productive work as well as development programs that will deepen the practice of their profession, inculcate and stress the value of ethics, and promote the defense and protection of freedom and human rights of media professionals and their organizations. Seeks to mandate that media professionals/journalists on field assignments shall be covered by additional insurance benefits as well as a corresponding hazard pay."
