congress_website_title = "AN ACT MANDATING OWNERS OR OPERATORS OF HOTELS AND RESORTS WITH SWIMMING POOLS AND BEACHFRONT FACILITIES TO EMPLOY THE SERVICES OF CERTIFIED LIFEGUARDS, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Seeks to ensure the safety of swimming pools and beachfronts in hotels and resorts by mandating the presence of at least one (1) certified lifeguard for every two hundred fifty (250) square meters of swimming pool or beachfront area during all hours of operation. Mandates the LGUs to conduct regular inspection of the swimming pools and beachfront facilities of the hotels and resorts to ensure the strict compliance of the law. Prescribes penalties for violation of the provisions of this Act."
