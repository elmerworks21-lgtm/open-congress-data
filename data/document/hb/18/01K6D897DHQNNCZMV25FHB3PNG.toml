congress_website_title = "AN ACT REGULATING THE PRODUCTION, IMPORTATION, SALE, PROVISION, USE, RECOVERY, COLLECTION, RECYCLING, AND DISPOSAL OF PLASTIC PRODUCTS"
congress_website_abstract = "Seeks to regulate the production, use, recycling and disposal of plastic bags and other single-use plastics in the whole country. Provides for a gradual phase out of single-use plastics; a transition program for the shift to the use of biodegradable plastic bags; a Special Environment Fund for plastics regulation; the role of local government units; a program for affected workers of the plastic industry; and support for affected manufacturers of plastic products for effective implementation of this Act."
