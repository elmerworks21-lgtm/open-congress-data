congress_website_title = "AN ACT AMENDING SECTIONS 141, 142 AND 143 OF REPUBLIC ACT NO. 8424, AS AMENDED, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE OF 1997"
congress_website_abstract = "Aims to: raise additional revenues to fund the Universal Health Care (UHC) Program; reduce consumption of alcohol products; and to address the perceived inequity on the excise tax collections on alcohol and tobacco products. Proposes to: a) increase the indexation of excise tax rates on alcohol products from 4% to 7% annually; b) removes the distinction between fermented liquors brewed in microbreweries and in factories for simpler tax administration; c) exempts cooking wines containing a salt content of not less than 1.5 G/100 ML from excise tax; and d) imposes a biannual price survey to determine the net retail price of distilled spirits and sparkling wines."
