congress_website_title = "AN ACT PROVIDING FOR THE REVISED WAREHOUSE RECEIPTS LAW OF THE PHILIPPINES"
congress_website_abstract = "Aims to establish a simplified, unified, and modern framework for the storage of goods in warehouses and the subsequent trading of interest therein. Proposes to establish a central electronic Registry for all warehouse receipts which will be made readily available online and eventually integrated with other existing Registries. Enables the agricultural sector to convert goods and products into credit in a faster and simpler way, promote economic activity by increasing access, particularly for entities engaged in agricultural businesses such as farming, to least cost credit. Provides for the following provisions: 1.) Obligations and rights of warehouse operators upon their receipts; 2.) Negotiation and transfer of receipt; and 3.) Criminal Offenses, among others."
