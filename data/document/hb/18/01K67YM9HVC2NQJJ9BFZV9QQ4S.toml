congress_website_title = "AN ACT PROVIDING PROTECTION FOR FREELANCE WORKERS"
congress_website_abstract = "Mandates any hiring party obtaining or retaining the services of a freelance worker to execute a written contract with such freelance workers before said services are rendered. Provides freelance workers with night shift differential and hazard pay for services rendered. Provides penalties for any violations of the rights of the freelance workers. Mandates all freelance workers to register with the BIR and pay their annual income taxes."
