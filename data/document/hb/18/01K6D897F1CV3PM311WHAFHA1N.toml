congress_website_title = "AN ACT TO ESTABLISH A STANDARD DETERMINATION OF THE REGIONAL WAGE LEVELS THROUGH THE NATIONAL WAGE AND PRODUCTIVITY COMMISSION AND IMPOSING A STIFFER PENALTY FOR THE VIOLATION THEREOF, AMENDING FOR THE PURPOSE THE RELEVANT PROVISIONS OF PRESIDENTIAL DECREE NO. 442, AS AMENDED, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES"
congress_website_abstract = "Aims to address the inadequate and inequitable regional wage levels to the evolving economic realities and intended decent living conditions of a minimum wage earner and his family. Seeks to replace the Regional Tripartite Wages and Productivity Boards with the National Wages and Productivity Commission, to address regional wage distortions and harmonize regional wage levels and determine and fix that of the agricultural and non-agricultural Industries at least once every year. Intends to ensure strict compliance on the payment of the mandated regional minimum wages by increasing the penalty for non-compliance with a fine in the amount double of the amount of wage denied to workers or P150,000.00 whichever is higher; and in cases where a fine is decreed by DOLE or the NLRC but cannot be satisfied because of the unavailability or inadequacy of funds, the assets of the owners, president, and/or officers of the corporation or any other entity, or fraction thereof, either movable or immovable property shall be the subject of a summary forfeiture and garnishment proceeding for litigation."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_18/HB00276.pdf"]

