congress_website_abstract = "Prioritizes the families left by Overseas Filipino Workers by regarding their needs through welfare assistance and counseling services that seeks to address the issues linked to having a member of their family work overseas. Seeks to direct the OWWA to develop a clear and comprehensive outline on the re-unification, reintegration, and re-placement scheme for returning OFWs."
