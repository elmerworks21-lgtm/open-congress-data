congress_website_title = "AN ACT INSTITUTIONALIZING THE SECURING MANUFACTURING REVITALIZATION AND TRANSFORMATION (SMaRT) PROGRAM IN THE PHILIPPINES"
congress_website_abstract = "Seeks to revitalize and transform the country´s manufacturing sector into the Fourth Industrial Revolution to make them more globally competitive, through the: development of new production techniques and business models; performance-based, targeted, time-bound, and transparent fiscal and non-fiscal support; stimulate innovation, expand research and development, and accelerate research commercialization activities, attract investments in emerging industries and industry clusters, and encourage global value chain upgrading. Defines “Global Value Chain” as global geographic fragmentation of activities involved in the production, supply, distribution, and post-sale activities."
