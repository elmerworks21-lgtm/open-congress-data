congress_website_title = "AN ACT CREATING THE SUSTAINABLE DEVELOPMENT GOALS (SDG) COUNCIL OF THE PHILIPPINES, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides for the powers and functions of the Council as regards to the following, among others: 1. a set of standards and criteria and procedures for the SDG Evaluation System; 2. an incentive and reward system, based on merit, to encourage the establishment of private sector and local government programs that aid in the fulfillment of the SDGs; 3. organization and operation of local exhibitions, seminars and similar activities; 4. authorization as coordinating body to consolidate and record the whole of nation approach in attaining the SDGS"
