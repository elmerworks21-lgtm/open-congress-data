congress_website_title = "AN ACT CREATING THE DEPARTMENT OF OVERSEAS FILIPINO WORKERS (OFW) AND FOREIGN EMPLOYMENT, DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR, RATIONALIZING THE ORGANIZATION AND FUNCTIONS OF GOVERNMENT AGENCIES RELATED TO MIGRATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address the absence of a single agency tasks to address foreign employment concerns in order for the government to focus on the needs and demands of migration in general and of OFWs in particular. Proposes to have a one-stop shop to serve as the umbrella agency that would manage, harmonize, and strengthen existing policies and programs on migration to address OFW needs and avoid overlapping jurisdiction or conflict of policy pronouncements. Intends to expedite the fulfillment of the objectives of the Global Compact for Safe, Orderly and Regular Migration (GCM) adopted by the Philippines, which is an inter-governmentally negotiated agreement that has 23 objectives for the protection and promotion of the rights of migrant workers."
