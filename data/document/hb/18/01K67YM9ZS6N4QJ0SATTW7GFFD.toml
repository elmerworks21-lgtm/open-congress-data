congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE ELECTRONIC HEALTH OR eHEALTH SYSTEM AND SERVICES IN SUPPORT OF UNIVERSAL HEALTH CARE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to utilize information and communication technology (ICT) for health or National eHealth System (NeHS) in order to deliver medical services and improve access to healthcare, particularly in medically unserved and underserved geographically isolated and disadvantaged areas (GIDAs). Mandates the Department of Health (DOH) to strengthen and transform its existing Knowledge Management and Information Technology Service (KMITS) into a full-pledged Bureau, to be called as the National eHealth Information and Services Bureau (NeHISB) which shall perform the overall management and administration of this Act. Mandates all health care providers and health-related entities to comply with data standards to allow interoperability and health information exchange."
