congress_website_abstract = "Proposes to rectify the overarching scope of R.A. 10149 which includes the compensation standardization of government officials and employees of GOCCs even without the original charter. Provides that non-chartered GOCCs created and organized under B.P. Blg.68 or the Corporation Code must be governed by the appropriate provisions of P.D. 442 or the Labor Code insofar as salary or compensation standardization is concerned."
