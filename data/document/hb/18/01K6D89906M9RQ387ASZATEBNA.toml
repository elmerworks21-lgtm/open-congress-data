congress_website_title = "AN ACT STRENGTHENING THE RIGHT OF THE PEOPLE TO FREE EXPRESSION, TO PEACEABLY ASSEMBLE, AND TO PETITION THE GOVERNMENT FOR REDRESS OF GRIEVANCES, REPEALING FOR THE PURPOSE BATAS PAMBANSA BLG. 880 OR THE “PUBLIC ASSEMBLY ACT OF 1985”"
congress_website_abstract = "Seeks to ensure the free exercise of the fundamental rights of the people without unnecessary and unreasonable impediments. Mandates any person or group who intends to organize and hold a public assembly in a public place which includes any highway, boulevard, avenue, road, street, bridge or other thoroughfare, park, plaza, square, or any open space where people are allowed access to serve a notice to the city or municipal mayor who has jurisdiction over the place where the assembly is to be held except freedom park duly established by law or ordinance, private property with the consent of the owner of the person entitled to its legal possession, or in the campus of a government-owned and operated educational institution, subject to its rules and regulations. Provides the responsibilities of leader and organizers of a public assembly; guidelines and rules of conduct, prohibited acts and penalties, among others."
