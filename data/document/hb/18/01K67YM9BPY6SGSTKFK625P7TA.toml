congress_website_title = "AN ACT PROVIDING FOR GOVERNMENT FINANCIAL INSTITUTIONS UNIFIED INITIATIVES TO DISTRESSED ENTERPRISES FOR ECONOMIC RECOVERY (GUIDE)"
congress_website_abstract = "Aims to protect employment and assist distressed enterprises due to the community quarantine measures that restricted the operation of numerous businesses. Seeks to strengthen the capacity of the Philippine Guarantee Corporation (PGC), the Land Bank of the Philippines (LBP), and the Development Bank of the Philippines (DBP) in order to provide the needed assistance to micro, small, and medium enterprises (SMSEs), and other strategically important companies. Grants LBP and DBP to create a special holding company (SHC) which aims to further reinvigorate important companies heavily affected by the COVID-19 pandemic. Provides incentives and exemptions privileges to the DBP, LBP and the SHC."
