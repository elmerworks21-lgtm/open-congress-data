congress_website_title = "AN ACT INSTITUTIONALIZING THE COMMUNITY-DRIVEN DEVELOPMENT (CDD) APPROACH AS A NATIONAL STRATEGY FOR INCLUSIVE GROWTH AND SOCIAL PROTECTION, MANDATING ALL NATIONAL GOVERNMENT AGENCIES AND DEPARTMENTS, INCLUDING THEIR ATTACHED AGENCIES, OFFICES AND BUREAUS, LOCAL GOVERNMENT UNITS, AND OTHER GOVERNMENT INSTRUMENTALITIES TO IMPLEMENT THEIR COMMUNITY- BASED PROGRAMS, ACTIVITIES, AND PROJECTS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to address the lack of an enabling policy, a national strategy and its mechanisms for community empowerment, by enhancing capacities for community participation, especially the poor, vulnerable, disadvantaged, and marginalized in the local development process. Reinforces the value of participatory governance by complementing the Local Government Code (LGC) which mandates the Local Government Unit (LGU) among others, provides basic services to constituent, by specifying the mechanisms by which the principles stipulated can be operationalized and institutionalized for developing self-reliant communities."
