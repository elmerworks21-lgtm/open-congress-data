congress_website_title = "AN ACT IMPOSING A MORATORIUM ON THE OPEN PIT METHOD OF MINING FOR COPPER, GOLD, SILVER, AND COMPLEX ORES IN THE PHILIPPINES"
congress_website_abstract = "Provides for a 25-year moratorium or suspension on the approval and commencement of mining projects which covers all existing approved and pending mining projects that have not commenced commercial operation. Intends to craft a National Industrialization Program (NIP) and a Mineral Management Plan (MMP) as a precondition to the consideration of the feasibility of open-pit mining method after a mandatory review of this Act after twelve (12) years."
