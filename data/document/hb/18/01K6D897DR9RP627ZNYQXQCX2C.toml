congress_website_title = "AN ACT INSTITUTING A NATIONAL LAND USE AND MANAGEMENT POLICY, PROVIDING THE IMPLEMENTING MECHANISMS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Establishes a framework wherein various land uses shall be determined in a manner that promotes the policies and principles of land allocation and utilization. Creates the National Land Use Policy Council (NLUPC) which shall act as the highest policy-making body on land use and shall resolve land use policy conflict between or among agencies, branches, or levels of the government, and integrate efforts and monitor developments relating to land use and the evolution policies."
