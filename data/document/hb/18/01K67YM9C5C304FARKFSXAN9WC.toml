congress_website_title = "AN ACT CREATING ANTI-DRUG ABUSE COUNCILS (ADACS) IN ALL PROVINCES, CITIES, MUNICIPALITIES, AND BARANGAYS THROUGHOUT THE COUNTRY"
congress_website_abstract = "Aims to safeguard the well-being of the Filipino citizens particularly the youth from the harmful effects of dangerous drugs on the physical and mental well-being, and to defend the same against acts or omission detrimental to their development and preservation. Mandates the Anti-Drug Abuse Councils to spearhead the planning and implementation of all local anti-drug abuse programs, projects and activities in their respective political units; employ drug clearing operations, start drug rehabilitation programs, after care and reintegration programs, promote advocacy programs on the effects and legal consequences of illegal drugs, among others."
