congress_website_title = "AN ACT DEFINING THE RIGHTS AND FUNDAMENTAL FREEDOMS OF HUMAN RIGHTS DEFENDERS, DECLARING STATE RESPONSIBILITIES, AND INSTITUTING EFFECTIVE MECHANISMS FOR THE PROTECTION AND PROMOTION OF THESE RIGHTS AND FREEDOMS"
congress_website_abstract = "Provides and enumerates the rights and freedoms of human rights defenders; grants the right to effective remedy and full reparation, both monetary and non-monetary in the event of a violation of the rights provided for or a breach of obligations under the Act; provides and enumerates the obligations of the State and public authorities and shall take all the necessary measures to ensure that the rights and fundamental freedoms are effectively guaranteed and protected; imposes sanctions for violations of the rights and freedoms of human rights defenders; and requires extraordinary diligence by concerned government personnel in processing and handling any complaint or report for violation of human rights and fundamental freedom."
