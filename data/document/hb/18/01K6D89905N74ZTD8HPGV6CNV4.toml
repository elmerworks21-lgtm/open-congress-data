congress_website_title = "AN ACT AMENDING SECTION 18, BOOK VII, CHAPTER 3 OF THE ADMINISTRATIVE CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to provide that a license should not expire, given that the licensee has made timely and sufficient application for its renewal until finally determined by the relevant department, agency or branch of government. Aims to amend the provision for non-expiration to also include franchises and specifically provides that inaction on a pending application must not be considered denial of the application. Intends to encourage concerned agencies or branches of government to act on applications for renewal of franchises and licenses promptly and resolutely."
