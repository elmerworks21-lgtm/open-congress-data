congress_website_title = "AN ACT ALLOWING AND REGULATING THE USE OF MOTORCYCLES AS PUBLIC UTILITY VEHICLES, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 4136, OTHERWISE KNOWN AS THE LAND TRANSPORTATION AND TRAFFIC CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address the worsening traffic situation in the country by solving the existing inadequacies in our laws and promoting the safety and welfare of people who patronize the more commonly known \\\"habal-habal\\\" or \\\"angkas\\\" as an alternative to other modes of public transportation. Includes the new term \\\"MOTORCYCLES-FOR-HIRE in Sec.3 of R.A. 4136 which shall be defined as follows: \\\" ( N ) MOTORCYCLES-FOR-HIRE - ANY TWO-WHEELED MOTOR VEHICLE THAT MAY BE REGISTERED WITH THE LTO AS FOR HIRE AND MAY BE USED AS A COMMERCIAL VEHICLE TO TRANSPORT PASSENGERS AND GOODS: PROVIDED, THAT, FOR TRANSPORTING PASSENGERS, THE MOTORCYCLE SHALL HAVE A MINIMUM ENGINE DISPLACEMENT OF 125 CUBIC CENTIMETERS AND A BACKBONE TYPE BUILT. \\\""
