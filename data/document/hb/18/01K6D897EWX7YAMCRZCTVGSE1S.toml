congress_website_title = "AN ACT ESTABLISHING THE NATIONAL TRANSPORTATION SAFETY BOARD, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to create a non-regulatory and independent agency to promote safety and efficiency in the transportation of people, property and goods, and conduct investigations to determine the cause of transportation accidents on land, sea, and air, including railway and pipeline systems. Provides for a Transportation Safety Fund which shall be administered by the NTSB and shall be used for the operational expenses in investigating transportation accidents; studies and research on transportation safety; reimbursement of extraordinary expenditures and expenses of government and private agencies and persons mobilized by the Board in investigating transportation accidents; and training and related conference to enhance the expertise of the officers, personnel and employees of NTSB."
