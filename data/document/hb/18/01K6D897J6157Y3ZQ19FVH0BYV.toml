congress_website_title = "AN ACT PROVIDING FOR THE MODERNIZATION OF FIRE PROTECTION AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to establish a Fire Protection Service (FPS) in local government units; upgrade the existing fire protection services; establish a specialized fire protection and related services with the BFP; provide for training facilities and hiring of internationally accredited training consultants and advisers to accelerate the human resources development program; and ensure that fire protection vehicles of various types, communication equipment and facilities, and other support equipment will be equitably distributed to different fire units."
