congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA OF WORKERS IN THE INFORMAL SECTOR, INSTITUTIONALIZING MECHANISMS FOR IMPLEMENTATION THEREOF AND AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NOS. 7160 AND 8282"
congress_website_abstract = "Provides that workers engaged in an economic activity shall belong to an informal sector: those who are operating, employed, or working either as a micro-entrepreneur or is self-employed like vendors, small farmers, marginalized fisherfolks, home-based workers, and small transport; own-account or those who are self-employed such as on-call domestic and service workers, barbers/manicurists/pedicurists, drivers, barkers/fare collectors/dispatchers, welders/mechanics, non-corporate construction workers, appliance technicians, scavengers. Proposes to extend protection to these workers, accord them opportunities and their rights, through providing standardized social security measures, registration system, LGU one-stop-shop, Informal Sector Local Development Office, legitimate organizations, workplace security, among others."
