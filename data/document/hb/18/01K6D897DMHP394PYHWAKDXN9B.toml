congress_website_title = "AN ACT PROHIBITING HARASSMENT AND INVASION OF PRIVACY FOR COMMERCIAL PURPOSES"
congress_website_abstract = "Seeks to penalize any person who shall commit harassment against any person for commercial purposes by: a.) Reclusion temporal and a fine of Fifty Thousand Pesos, if death is caused by such harassment; b.) Prison mayor and a fine of Twenty Thousand Pesos, if seriously bodily injury is proximately caused by such harassment; and c.) Arresto mayor and a fine of One Thousand Pesos, if neither death nor serious bodily injury is proximately caused by such harassment."
