congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 9502, OTHERWISE KNOWN AS THE \"UNIVERSALLY ACCESSIBLE CHEAPER AND QUALITY MEDICINES ACT OF 2008\""
congress_website_abstract = "Seeks to create the Drug Price Regulatory Board with power to REGULATE the maximum retail price of drugs and medicines subject to price regulation, AND AS THE BOARD MAY DEEM FIT, FIX AND PUBLISH FROM TIME TO TIME THE MAXIMUM RETAIL PRICE AT WHICH SUCH DRUGS AND MEDICINES SHALL BE SOLD. Proposes that in DETERMINING the maximum price, the Board shall consider that “No retailer shall sell drugs and medicines at a retail price exceeding the maximum retail price FIXED BY THE BOARD; Provides that UNTIL THE MAXIMUM RETAIL PRICE of drugs and medicines subject to price regulation IS FIXED BY THE BOARD, NO MANUFACTURER, IMPORTER, TRADER, DISTRIBUTOR, WHOLESALER OR RETAILER OF SUCH DRUG AND MEDICINE SHALL SELL THE SAME AT A RETAIL PRICE EXCEEDING THE PRICE PREVAILING IMMEDIATELY BEFORE THE EFFECTIVITY OF THIS ACT: . . . Proposes that the Board shall have the power to investigate and adjudicate on illegal acts of price manipulation, such as hoarding, profiteering, or illegal combination or forming cartel . . . Mandates all medical, dental, and veterinary practitioners to write prescriptions using generic names only as a mechanism to increase the utilization of generic medicines."
