congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7394, OTHERWISE KNOWN AS THE 'CONSUMER ACT OF THE PHILIPPINES', INCREASING ITS PENALTIES AND SANCTIONS, RATIONALIZING ITS POLICIES AND GUIDELINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to assist the public in evaluating the quality of consumer products; protect them against unreasonable risks of injury associated with it; undertake research on quality improvement of products; and investigate the causes and prevention of product-related deaths, illnesses, and injuries. Intends to assure the public of the consistency of standardized products; and develop standards, including performance or user-oriented standards, codes of practice, and methods of tests."
