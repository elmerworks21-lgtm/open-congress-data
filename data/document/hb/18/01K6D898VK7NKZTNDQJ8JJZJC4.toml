congress_website_abstract = "Seeks to recognize migrant workers as a distinct class within the category of direct contributors under the UHC Act considering their peculiar employment circumstances. Provides that PhilHealth, in partnership with the OWWA, DFA, other concerned agencies, and relevant civil society groups and NGOs, shall issue a separate circular regarding premium contributions for land-based and sea-based Filipino migrant workers."
