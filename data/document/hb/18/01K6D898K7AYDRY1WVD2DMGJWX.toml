congress_website_title = "AN ACT REMOVING CARDBOARD WASTAGE IN THE PRODUCTION PROCESS OF CONSUMER PRODUCTS"
congress_website_abstract = "Seeks to do away with outer box packaging that are unnecessary and maintained mostly for aesthetics; and those goods which do not require outer protective covers and those which can be safely sold to consumers without the boxes shall be covered by this law. Provides for the development of \\\"National Waste Reduction Program\\\" which mandates the D E N R and the D T I to create plans and guidelines for manufacturing companies to reduce waste such as cardboard boxes in the packaging and distribution of consumer products."
