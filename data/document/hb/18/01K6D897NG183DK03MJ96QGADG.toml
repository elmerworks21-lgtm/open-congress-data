congress_website_title = "AN ACT TO AMEND SECTION 2 OF REPUBLIC ACT NO. 1405 OTHERWISE KNOWN AS 'THE SECRECY OF BANK DEPOSITS LAW', EXEMPTING GOVERNMENT OFFICIALS AND EMPLOYEES FROM THE PROHIBITION AGAINST DISCLOSURE OF OR INQUIRY INTO DEPOSITS WITH ANY BANKING INSTITUTION AND FOR OTHER PURPOSES"
congress_website_abstract = "States that: \\\"All deposits of whatever nature with banks or banking institutions are hereby considered as of an absolutely confidential nature and may not be examined, inquired or looked into by any person, government official, bureau or office, except upon written permission of the depositor, or in cases of impeachment, or upon order of a competent court in cases of bribery or dereliction of duty of public officials or in cases where the money deposited or invested is the subject matter of the litigation; OR WHEN THE DEPOSITOR IS AN ELECTIVE OR APPOINTIVE OFFICIAL OR EMPLOYEE OF THE REPUBLIC OF THE PHILIPPINES INCLUDING THE OFFICERS AND MEMEBERS OF THE AFP, THE PNP, AND ALL THE MEMBERS OF THE UNIFORMED SERVICES, AND OFFICERS AND EMPLOYEES OF GOCCs AND THEIR SUBSIDIARIES."
