congress_website_title = "AN ACT PROVIDING EMERGENCY FOOD SUBSIDY TO EVERY POOR FILIPINO FAMILY AFFECTED BY THE ENHANCED COMMUNITY QUARANTINE DUE TO COVID-19 PANDEMIC AND APPROPRIATING FUNDS THEREOF"
congress_website_abstract = "Aims to provide emergency food subsidy to the marginalized and poor communities affected by the ECQ in the entire Luzon which shall cover 100,000 households in the NCR in the amount of FIVE HUNDRED PESOS (P500.00) per day for a duration of 30 days to ease the impact of the COVID-19; also includes households in all provinces whose economic activities are greatly affected."
