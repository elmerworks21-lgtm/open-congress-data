congress_website_title = "AN ACT STRENGTHENING NATIONAL PREPAREDNESS AND RESPONSE TO PUBLIC HEALTH EMERGENCIES"
congress_website_abstract = "Seeks to create a National Health Strategy that would provide for an integrated policy coordination and strategic direction with respect to all matters in relation to the national public health and medical preparedness as well as execution and deployment of national response before, during, and immediately after public health emergencies. Defines Public Health Emergency as an occurrence of imminent threat of an illness or condition caused by bioterrorism, epidemic or pandemic disease, or a novel and highly fatal infectious agent or biological toxin, that poses a substantial risk of a significant number of human facilities or incidents or permanent or long-term disability. Proposes among others the following provisions: a) a review of health strategies every five (5) years, or more frequently as deemed necessary; b) creation of an Inter-Agency Task Force on public health emergencies composed of representatives from: DOH, DILG, NDRRMC, DFA, DPWH, DOTr and NEDA; c) components of a National Health Strategy which shall be consistent with international health regulations; d) creation of medical reserve corps composed of volunteer health professionals"
