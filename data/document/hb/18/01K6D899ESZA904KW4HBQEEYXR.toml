congress_website_title = "AN ACT CREATING A SUSTAINABLE FISCAL FRAMEWORK FOR THE PENSION SYSTEM OF THE MILITARY AND UNIFORMED PERSONNEL, PROVIDING MECHANISMS FOR THE DISPOSITION OF GOVERNMENT ASSETS FOR THE PURPOSE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to secure the pension system for the military and uniformed personnel that shall ensure an adequate, robust, and a well-managed insurance system that shall adequately and sustainably support their needs and that of their dependents. Proposes the following reforms to sustain the pension system: 1. The amount of One Hundred Thirty Billion Pesos (P130,000,000,000.00) shall be appropriated to the MUP Trust Fund to cover the pension requirement of the Fiscal Year for which the fund was appropriated. 2. Making mandatory for military and uniformed personnel to contribute to a percentage of their monthly compensation as their personal share to the MUP Trust Fund and there shall also be a share of the National Government which shall be automatically appropriated and exclusively used to fund pension benefits of the military and uniformed personnel; and 3. Proceeds from the sale /lease of MUP assets, and other identified assets, will be sources of additional funding. Exempts the MUP trust Fund, its assets, revenues, including all accruals thereto, and benefits paid, from all taxes, assessments, fees, charges, or duties of all kinds which shall continue unless expressly and specifically revoked."
