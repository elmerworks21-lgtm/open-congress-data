congress_website_title = "AN ACT REGULATING THE USE OF BANK ACCOUNTS AND E-WALLETS AND PROHIBITING THE USE THEREOF FOR UNUSUAL AND SUSPICIOUS FINANCIAL ACTIVITY"
congress_website_abstract = "Seeks to mitigate the rise of heightened cybercrime activities such as phishing, smishing, vishing, and other online fraud schemes which target bank clients, credit card holders, e-wallet accounts, online shopping, and other uses of online financial services. Proposes to penalize money mules and social engineering schemes leading to illicit online financial activities through regulation of digital services to ensure the safety of the public and strengthen the financial system´s defense against cybercriminals. Defines several terms such as electronic wallet, money mule, phishing, social engineering scheme, among others."
