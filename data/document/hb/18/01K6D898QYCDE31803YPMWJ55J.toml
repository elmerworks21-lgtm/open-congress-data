congress_website_title = "AN ACT AMENDING ARTICLES 183 AND 184 OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "Aims to deter the commission of perjury and to create a culture of truth-telling; Proposes to increase the penalty for the crime of perjury. Penalizes any person who shall incriminate or impute through false testimony or untruthful statements under oath/thru an affidavit, any person in a commission of a crime. Provides that if a person responsible for the commission of felony is a public officer or employee, the penalty shall be imposed in its maximum period."
