congress_website_title = "AN ACT SIMPLIFYING THE PROCEDURE IN THE DISPOSITION OF PUBLIC AGRICULTURAL LANDS, AMENDING FOR THE PURPOSE SECTION 24 OF COMMONWEALTH ACT NO. 141, OTHERWISE KNOWN AS \"THE PUBLIC LAND ACT\""
congress_website_abstract = "Provides that the publication of notices of sale of lands sold under the provisions of this chapter shall be two (2) consecutive weeks instead of six (6) consecutive weeks in the Official Gazette which shall be published in English, instead of English and Spanish. The threshold land value that will result in an exemption from the requirement of publication in the Official Gazette and in newspapers shall now be Fifty Thousand Pesos (P50,000.00), instead of Two Hundred Forty Pesos (P240.00). The date on which public biddings shall be held and the awards of the lands to disposed of shall be made thirty (30) days after the date of the notice of the sale, instead of sixty (60) days."
