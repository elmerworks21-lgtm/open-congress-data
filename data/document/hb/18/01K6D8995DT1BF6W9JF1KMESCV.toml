congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 386, ALSO KNOWN AS THE CIVIL CODE, ARTICLE 1991, ON REPLACING THE WORD “DEPOSITOR´S” WITH “DEPOSITARY´S” IN ORDER FOR THE LAW TO REFLECT ITS INTENDED MEANING"
congress_website_abstract = "Proposes to amend Article 1991 of the Civil Code to read as follows: “Article 1991. The [depositor´s] DEPOSITARY´S heir who in good faith may have sold the thing which he did not know was deposited, shall only be bound to return the price he may have received or to assign his right of action against the buyer in case the price has not been paid by him.”"
