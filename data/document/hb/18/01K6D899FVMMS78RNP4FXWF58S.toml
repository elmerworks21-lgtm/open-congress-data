congress_website_title = "AN ACT AMENDING SECTION 40 OF REPUBLIC ACT NO. 8551, OR THE “PHILIPPINE NATIONAL POLICE REFORM AND REORGANIZATION ACT OF 1998”, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to strengthen the Internal Affairs Service of the PNP to perform its functions of being the monitoring body of the character and behavior of all policemen, and operates as the investigating and adjudicatory body on all administrative offenses committed by PNP personnel. Provides that said Internal Affairs Service be head by an Inspector General to be assisted by a Deputy Inspector General WITH THE RANK OF POLICE MAJOR GENERAL. Also Provides that the REGIONAL INTERNAL AFFAIRS offices be head by a Director WITH THE RANK OF POLICE BRIGADIER GENERAL, while the provincial offices, by a DIRECTOR WITH THE RANK OF POLICE COLONEL: . . ."
