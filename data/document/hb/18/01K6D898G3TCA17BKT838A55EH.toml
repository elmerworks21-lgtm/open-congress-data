congress_website_title = "AN ACT ESTABLISHING THE PARALEGAL PROFESSION AND CODIFYING THE PARALEGAL PROFESSIONAL CONDUCT GUIDELINES"
congress_website_abstract = "Defines \\\" paralegal to a natural person, qualified, through education, training or work experience, to perform substantive legal work that requires knowledge of legal concepts which legal work is customarily, but not exclusively, performed by a lawyer. Proposes a comprehensive measure to professionalize the paralegal profession to make them agents of the State in making justice accessible through competent assistance to the legal profession and through legal education and information campaigns provided by paralegals."
