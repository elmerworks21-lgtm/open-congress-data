congress_website_title = "AN ACT GRANTING DISCOUNT PRIVILEGES AND OTHER BENEFITS TO PUBLIC SCHOOL TEACHERS AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to grant discounts to public school teachers such as, among others, discount fares in public transport facilities, health services, hotels, lodging houses, restaurants, and eateries, recreational facilities, and physical fitness facilities. Gives priority to public school teachers in the grant of loans in all government lending institution not exceeding Twenty-thousand Pesos (Php 20,000.00) intended to provide capital or to finance a livelihood and other income-generating projects. Provides deductions in the computation of taxable income by the public or private entities and individual granting the discount provided that the tax deductions shall not exceed ten percent (10%) of its taxable income."
