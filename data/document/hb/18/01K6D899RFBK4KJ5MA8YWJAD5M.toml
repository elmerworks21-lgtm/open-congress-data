congress_website_title = "AN ACT CREATING THE REGIONAL INVESTMENT AND INFRASTRUCTURE COORDINATING HUB OF CENTRAL LUZON AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Aims to maximize the infrastructure development and organization of the interconnecting highways, railways, seaports, and airports in Central Luzon to encourage capital flow and increase the productivity of the people and their individual and family income. Creates the Regional Investment and Infrastructure Coordinating Hub of Central Luzon (RICH) which shall replace the Subic-Clark Alliance for Development Council (SCADC) which powers shall be vested by the Board of Directors composed of thirteen (13) Members. Mandates the Board to develop the Central Luzon Investment Corridor Master Plan (Master Plan) which shall contain the necessary programs and strategies to ensure the harmonious operation of an aggregation of special economic or freeport zones within Central Luzon."
