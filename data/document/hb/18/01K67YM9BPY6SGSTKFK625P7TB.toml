congress_website_title = "AN ACT INSTITUTING POLICIES FOR THE PROTECTION AND PROMOTION OF THE WELFARE OF WORKERS OR INDEPENDENT CONTRACTORS IN THE FILM, TELEVISION, AND RADIO ENTERTAINMENT INDUSTRY"
congress_website_abstract = "Aims to ensure safety and to establish emergency protocols while artists are at work. Sets standards and specifies working hours required of artists based on age, as well as prescribes provision of accident and medical insurance for all workers, both on-screen or off-screen, involved and employed in the covered industries. Mandates the Department of Labor and Employment (DOLE) to initiate the creation of the Film, Television, and Radio Entertainment Industry Tripartite Council that shall serve as a link among various stakeholders concerning labor issues and provide the film, television, and radio entertainment industry with a platform for the employers or principals and workers or independent contractors to represent their respective groups on the crafting of policy decisions, and serve as an avenue to express their aspirations, present their programs or bridge gaps in cases of conflict among them, subject to the accreditation of the DOLE."
