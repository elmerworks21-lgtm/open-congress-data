congress_website_title = "AN ACT ADJUSTING THE MINIMUM AMOUNT FOR DEATH INDEMNITY, MORAL AND EXEMPLARY DAMAGES UNDER REPUBLIC ACT NO. 386 OR THE CIVIL CODE OF THE PHILIPPINES"
congress_website_abstract = "Proposes the following amendments: SECTION 1. Article 2206 of Republic Act No. 386, ”¦ is hereby amended to read as follows: ART. 2206. The amount of damages for death caused by a crime or quasi-delict SHALL BE AT LEAST THREE HUNDRED THOUSAND PESOS even though there may have been mitigating circumstances. THE COURT, IN ITS DISCRETION, MAY AWARD A HIGHER AMOUNT, BASED ON THE RATE OF INFLATION AND THE CIRCUMSTANCES OF EACH CASE.” SECTION 2. Article 2216 of the same Act is hereby amended to read as follows: ART. 2216. ”¦ PROVIDED, THAT THE AMOUNT OF MORAL AND EXEMPLARY DAMAGES SHALL BE AT LEAST TWO HUNDRED THOUSAND PESOS IN CASES OF DEATH RESULTING FROM A CRIME OR QUASI-DELICT. THE COURT, IN ITS DISCRETION, MAY AWARD A HIGHER AMOUNT BASED ON PREVAILING CIRCUMSTANCES AND THE RATE OF INFLATION.”"
