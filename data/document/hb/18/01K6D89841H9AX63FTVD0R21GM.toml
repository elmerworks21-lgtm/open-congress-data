congress_website_title = "AN ACT STRENGTHENING THE PHILIPPINE ECONOMIC ZONE AUTHORITY (PEZA) TO ACCELERATE COUNTRYSIDE DEVELOPMENT THROUGH ROBUST CREATION OF SPECIAL ECONOMIC ZONES IN RURAL AND NEW GROWTH AREAS, ENHANCING THE INCENTIVES THEREOF, AND AMENDING FOR THIS PURPOSE, REPUBLIC ACT NO. 7916, AS AMENDED BY REPUBLIC ACT NO. 8748, OTHERWISE KNOWN AS \\\"THE SPECIAL ECONOMIC ZONE ACT OF 1995\\\""
congress_website_abstract = "Intends to maximize the investments in the economic zones and obtain more significant gains for the Filipinos and the country at large, especially the less developed areas in the countryside. Seeks to strengthen PEZA by: granting additional powers and function; establishment of a globally competitive and conducive investment climate and facility; competitive and appropriate incentives package in order to attract more investors to the countryside; creation of opportunities for more investment portfolios; increased financial capability of the designated authority; reduced import dependence by empowering, capacitating and incentivizing domestic enterprises, farmers, fishermen and every Filipino; and more empowered and capable LGUs that are self-reliant, self-sustaining and resource-generating ."
