congress_website_title = "AN ACT AMENDING SECTIONS 38, 39 AND 40 OF REPUBLIC ACT NO. 4566 OTHERWISE KNOWN AS THE CONTRACTORS´ LICENSE LAW"
congress_website_abstract = "Intends to rectify existing infirmities in R.A.No.4566, as amended by P.D.No.1746 which provides that no contractor shall engage in the business of contracting without first having secured a Phil. Contractors Accreditation Board (PCAB) license to conduct business. Seeks to propose several amendments among others such as: a) Violation shall be penalized with a fine of not less than P50,000.00 where the cost of the project is not more than P500,000,000.00; and a fine of not less than P500,000.00 where the cost of the project is more than P500,000,000.00; b) The bidder shall be automatically disqualified for award of contract; c) Higher fees for licensing, registration of application, and renewal shall be implemented: P5,000.00 for an original license; P6,000.00 for examination of an applicant; P5,000.00 for annual renewal."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_18/HB01911.pdf"]
