congress_website_title = "AN ACT MANDATING MOVIE THEATER OPERATORS NATIONWIDE TO RUN MTRCB APPROVED AND RATED LOCAL MOVIES TO SUPPORT LOCAL MOVIE PRODUCERS AND PROMOTE ORIGINAL FILIPINO MOVIES"
congress_website_abstract = "Mandates the movie theatre operators to: a.) run MTRCB approved and rated local movies at the minimum span of five (5) consecutive days to support local movie producers; b.) equally divide theatre screening slots between local films (40%) and foreign films (60%); c.) equally divide movie trailer slots, 50% local film and 50% foreign film movie trailers, prior to the actual film screening of a featured movie; and d.) make Fridays as start of movie play dates, instead of Wednesdays, to give local movies a better fighting chance in the Box Office."
