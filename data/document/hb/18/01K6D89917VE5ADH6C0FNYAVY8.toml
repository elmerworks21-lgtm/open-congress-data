congress_website_title = "AN ACT GRANTING ADDITIONAL BENEFITS TO SOLO PARENTS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8972, OTHERWISE KNOWN AS THE “SOLO PARENTS WELFARE ACT OF 2000”"
congress_website_abstract = "Seeks to strengthen Republic Act No. 8972 by redefining and expanding the coverage of the definition of solo parents, shortening the waiting period for entitlement to privilege and benefits, inclusion of additional discount privileges on education, clothes and medicines, food and micronutrient supplements, and requiring that certain facilities be put up in workplaces such as breastfeeding and child minding centers."
