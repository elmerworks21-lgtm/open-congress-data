congress_website_title = "AN ACT CREATING THE DEPARTMENT OF DISASTER RESILIENCE, DEFINING ITS MANDATE, POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Creates a Department which shall be the primary government agency responsible for leading, organizing, and managing the national effort to reduce disaster risk, prepare for and respond to disasters, recover and rehabilitate, and build forward better after the occurrence of disasters. Provides the Department the authority to orchestrate different actors, policies and programs for disaster risk reduction and management; and to receive, administer, mobilize, report, monitor and oversee the utilization of the National Disaster Risk Reduction and Management Fund, recovery and rehabilitations funds, and donations for disaster risk reduction and management. Establishes the National Disaster Operations Center (NDOC) which is a center equipped with the necessary tools and systems to monitor, manage, and respond to disasters in the country; the Alternative Command and Control Center (ACCCs) which are command centers established in other locations to provide supplemental support to the NDOC; and the Disaster Resilience Research and Training Institute (DRRTI) which shall be a platform for providing training and for collecting, consolidating, managing, analysing, and sharing knowledge and information to improve or enhance disaster resilience. Authorizes joint operational supervision with the following: a.) (DOST) over the Philippine Atmospheric, Geophysical and Astronomical Services Administration (PAGASA), the Philippine Institute of Volcanology and Seismology (PHILVOCS); b.) (DENR) over the Geo-Hazard Assessment and Engineering Geology Section of the Mines and Geosciences Bureau (MGB); c.) (DOH) over the Health Emergency Management Bureau (HEMB), and d.) DILG over the Bureau of Fire Protection (BFP)."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=18&q=HBN-5989"

