congress_website_title = "AN ACT AUTHORIZING THE SECRETARY OF EDUCATION TO POSTPONE THE START OF SCHOOL YEAR IN CASE OF A DECLARATION OF A STATE OF EMERGENCY, STATE OF CALAMITY OR SIMILAR OCCURRENCE, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7977, OTHERWISE KNOWN AS “AN ACT TO LENGTHEN THE SCHOOL CALENDAR FROM TWO HUNDRED (200) DAYS TO NOT MORE THAN TWO HUNDRED TWENTY (220) CLASS DAYS”"
congress_website_abstract = "Aims to address the issue that since the DepEd is mandated to open the school year between the first Monday of June and the last day of August only, it thus limit their ability to comply with the President's directive to move the opening of classes to September in areas under the General Community Quarantine. Provides that moving the opening of the school year to a later date per area or region will redound to the safety of students, faculty and staff because it would be an effective way to limit further COVID-19 infections since majority of physical interactions among age groups happen among the 0-9 age group."
