congress_website_title = "AN ACT ENHANCING THE IMPLEMENTATION OF THE NET-METERING PROGRAM, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 9513, OTHERWISE KNOWN AS THE RENEWABLE ENERGY ACT OF 2008"
congress_website_abstract = "Proposes to introduce necessary changes as follows: 1) removal of the 100kW cap to allow more qualified end-users to participate in the program and tasks the ERC to regularly set the maximum kW capacity for distributed generation”¦; 2) uniform and streamlined permitting process and requirements, and provide minimum requirements for LGUS in accordance with the time frames under the “Energy Virtual One Stop-Shop Act””¦; 3) a parity pricing methodology that credits end-users the full retail price of the surplus electricity contributed to the electricity grid, including accumulated unused credits from the previous billing period, to correct the double-charging scheme of the current pricing methodology”¦"
