congress_website_title = "AN ACT ESTABLISHING THE SPECIAL LOCAL HEALTH FUND FOR THE IMPROVEMENT OF HEALTH CARE SERVICES IN THE LOCAL GOVERNMENT UNITS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to establish a Special Local Health Fund which shall be used for the upgrading of facilities and equipment of local hospitals, hiring, training and continuing education of health workers and personnel of local government health institutions, building of new health institutions, purchase of medicines and medical supplies at the lowest costs, and establishment of mobile emergency lifelines or quick-response medical and paramedical teams to respond to disasters, emergencies and other life-threatening situations in the community. Provides funding from the following sources: a) Proceeds from a special levy of one percentum from all sales in all local public and private markets; b) Proceeds from fines collected for violations of health and safety regulations from all establishments in cities and municipalities; c) Five percentum of all revenues derived from the Philippine Charity Sweepstakes Office (PCSO) from lotto; d) Five percentum of the net revenues of the Philippine Amusement and Gaming Corporation (PAGCOR); and e) Grants or donations and endowments to cities and municipalities from private and foreign individuals, as well as, local and international, private and public associations or foundations."
