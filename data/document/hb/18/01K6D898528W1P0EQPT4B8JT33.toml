congress_website_title = "AN ACT PROMOTING OPEN ACCESS IN DATA TRANSMISSION, PROVIDING ADDITIONAL POWERS TO THE NATIONAL TELECOMMUNICATIONS COMMISSION"
congress_website_abstract = "Defines \\\"data transmission\\\" as the process of sending digital or digitized analog signal over a communication medium to one or more computing network/s, communication or electronic device/s; it enables the transfer and communication of devices in a point-to-point, point-to-multipoint and multipoint-to-multipoint environments; includes the provision of Voice over Internet Protocol (VoIP) services but does not include the provision of basic telephone services. Provides for the organization, operation and regulation of the data transmission industry through open access approach; spectrum allocation, recall, and reallocation; setting of performance standards; arms-length transactions and transparency; fair competition; and restriction on the issuance of TRO or Writ of Preliminary Injunction. Also includes among its provisions: sections on prohibited acts; administrative penalties; and adjustment for inflation; and rights of data transmission service users and responsibilities of data transmission service providers."
