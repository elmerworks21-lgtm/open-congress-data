congress_website_title = "AN ACT PROVIDING FOR ADDITIONAL BENEFITS, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 8972 OTHERWISE KNOWN AS THE \\\"SOLO PARENTS\\\" WELFARE ACT OF 2000"
congress_website_abstract = "Proposes to amend Republic Act No.8972, extending additional benefit to solo parents as follows: - 30% discount from tuition fees for every child (private high school, public and private SUCs); - Medical Assistance in the form of discounts: 1. 30% discount - medicine, vaccines, and other medical supplements or supplies, for the child 18 years from birth; 2. 30% discount - hospital bills for parent or his/her child; 3. 20% discount - consultation, laboratory diagnostic fees to both parent and their dependents; and 4. 25% discount - baby's milk, food and food supplements, within three years from child's birth. States that Solo parents shall have basic personal exemption from individual income tax in the amount of Php 50,000.00 in addition to the existing exemption that may be claim for their dependent child or children."
