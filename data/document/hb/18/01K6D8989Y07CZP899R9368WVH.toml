congress_website_title = "AN ACT DECLARING AND DEFINING THE CRIME OF DISTRIBUTING \\\"BOTCHA,\\\" \\\"DOUBLE-DEAD MEAT,\\\" OR ANY MEAT TAKEN FROM ANY FOOD ANIMAL THAT HAS DIED OF DISEASE, AS A CRIMINAL OFFENSE, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 9296, OTHERWISE KNOWN AS \\\"THE MEAT INSPECTION CODE OF THE PHILIPPINES\\\" AND FOR OTHER PURPOSES"
congress_website_abstract = "Introduces a comprehensive definition of the crime of unlawfully distributing botcha, double-dead meat, in all its forms, modes of transmission, and variations or derivatives. Proposes to increase the penalties in its distribution and sale in light of the escalation of abuses, through syndication and otherwise, of proprietors who capitalize on the institutional weaknesses of our importation processes and who increasingly exploit growing market demand of botcha."
