congress_website_title = "AN ACT ESTABLISHING A PHILIPPINE REGISTRY PORTAL OF SEC-REGISTERED SECURITIES AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to address the issues of investment scams and unscrupulous enterprising financial schemes to protect every citizen by providing accessible and available information that will guide and protect the public. Proposes to establish an online portal of all securities such as debt instruments including promissory notes, equities, collective investment schemes including mutual funds and derivatives, and those registered with the agency and licensed for sale to the public."
