date_filed = "2020-01-28"
long_title = "AN ACT PROVIDING PROTECTION FROM LIABILITY TO VOLUNTEERS FOR ACTS OR OMISSIONS COMMITTED IN THE PERFORMANCE OF THEIR DUTIES DURING EMERGENCY SITUATION"
scope = "National"
subjects = [ "Emergency Volunteer",]
congress_website_author_codes = ["H061"]
congress_website_coauthors_raw = ["ROMUALDEZ, FERDINAND MARTIN G.","VERGARA, ROSANNA \"RIA\""]
congress_website_committee_codes = ["0527","0532"]
congress_website_primary_keys = [119699]
congress_website_title = "AN ACT PROVIDING PROTECTION FROM LIABILITY TO VOLUNTEERS FOR ACTS OR OMISSIONS COMMITTED IN THE PERFORMANCE OF THEIR DUTIES DURING EMERGENCY SITUATIONS"
congress_website_abstract = "Seeks to provide liability protection for volunteers for harm caused by an act or commission if: 1.) the volunteer was acting in an emergency situation at the scene of an accident; 2.) the volunteer was property licensed, certified, or authorized by the appropriate authorities, either government entities or non-government organizations, for the activities undertaken in an emergency at the time of the act of omission; and 3.) the harm was not caused by willful or criminal misconduct, gross negligence, reckless misconduct, or a conscious, flagrant indifference to the rights or safety of the individual harmed by the volunteer. Provides exceptions to the protection against liability of volunteers if: 1.) the misconduct constitutes a crime under the Revised Penal code or an offense in any special penal law; 2.) the misconduct was performed by the volunteer under the influence of intoxicating liquor or any dangerous drug at the time of the act or omission; 3.) the volunteers are from business organizations that employ volunteers for pecuniary purposes; and 4.) volunteers receive compensation for volunteering at a non-profit organization."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=18&q=HBN-6091"

