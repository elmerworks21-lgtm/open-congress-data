congress_website_title = "AN ACT MANDATING THE STANDARDIZATION OF CLASSES AND FACILITIES IN PUBLIC SCHOOLS"
congress_website_abstract = "Seeks to cover all educational institution owned and controlled by the State under elementary and secondary level; ensures quality education through a one shift class system and uniformity of school facilities to uplift the confidence of students that they are in good condition and pleasant school environment. Prohibits all educational institution owned and controlled by the State to adopt the double shift session for classes nationwide."
