congress_website_abstract = "Provides for a legal presumption of who is considered as the importer, financier, and protector or coddler of illegal drugs as well as the legal consequences or penalties for importers and financiers of illegal drugs, and their protectors or coddlers. Penalizes the exportation of dangerous drugs from the Philippines and the negligent lessors of properties used as clandestine laboratories. Requires lessors of properties to submit documents to avoid properties from being used for illegal drug purpose."
