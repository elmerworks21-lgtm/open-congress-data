congress_website_title = "AN ACT AMENDING SECTION 386 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Proposes to amend Sec. 386 regarding requisites for creation of a barangay, to be read as follows: . . . “IN CASE THE POPULATION OF A BARANGAY EXCEEDS FIFTEEN THOUSAND (15,000) AS CERTIFIED BY THE PHILIPPINE STATISTICS AUTHORITY, SUCH BARANGAY SHALL BE AUTOMATICALLY BE REAPPORTIONED, THEREBY CREATING A NEW BARANGAY OR BARANGAYS. ALL EXISTING BARANGAYS WITH A POPULATION OF MORE THAN FIFTEEN THOUSAND (15,000) INHABITANTS SHALL ALSO BE AUTOMATICALLY REAPPORTIONED.”"
