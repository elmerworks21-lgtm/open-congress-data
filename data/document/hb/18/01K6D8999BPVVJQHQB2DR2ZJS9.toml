congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6713, ALSO KNOWN AS AN ACT ESTABLISHING A CODE OF CONDUCT AND ETHICAL STANDARDS FOR PUBLIC OFFICIALS AND EMPLOYEES TO UPHOLD THE TIME-HONORED PRINCIPLE OF PUBLIC OFFICE BEING A PUBLIC TRUST, GRANTING INCENTIVES AND REWARDS FOR EXEMPLARY SERVICE, ENUMERATING PROHIBITED ACTS AND TRANSACTIONS AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Seeks to remedy the prevalent corrupt practice by imposing penalty by removal from public office on a public official who places any of his/her assets in the name of dummies. A public official who does so shall forfeit all his rights to the property in favor of the dummy. Public officials shall also be prohibited from acquiring any property from a relative within the fifth civil degree of consanguinity while holding public office and within ten years from the time he/she left the civil service."
