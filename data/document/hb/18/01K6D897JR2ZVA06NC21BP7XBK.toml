congress_website_title = "AN ACT INSTITUTING BUDGET REFORM THAT WILL ENSURE THE EQUITABLE DISTRIBUTION OF FUNDS FOR BOTH THE NATIONAL AND LOCAL GOVERNMENT UNITS FOR THE PURPOSE OF PROMOTING VILLAGE EMPOWERMENT, ENABLING THEM TO BE AN EFFECTIVE INSTRUMENT IN ATTAINING INCLUSIVE GROWTH, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address existing gaps, among which is the measly sum of LGU share in the National Budget where LGU shares, through the allocation to LGUs and IRA translates only to a mere 15% of the National Budget. Proposes to institutionalize rational and equitable budget distribution for LGU development for them to be active participants in national building. States that the amount allocated to the LGUs will be referred to as the \\\"Local Development Fund (LDF), which will be divided among the different political subdivisions solely for developmental projects, activities and programs (PAPs) based on the approved Comprehensive Development Plans (CDPs)."
