congress_website_title = "AN ACT GRANTING BROADER PROTECTION TO CONSUMERS AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7394, OTHERWISE KNOWN AS \"THE CONSUMER ACT OF THE PHILIPPINES\""
congress_website_abstract = "Proposes new provisions to the law to include eight (8) Consumer Bill of Rights and five (5) Consumer Responsibilities; Provides an article mandating the English or Filipino translation of product labels written in foreign characters or languages; Proposes to permanently ban suppliers who engaged in the importation of defective goods. Intends to expand provisions on advertising and promotion, to include those products, services, and credit facilities with sponsorships of programs, concerts, games, shows, and similar activities; Includes in the definition of “Mass Media” - internet, mobile phones, and similar electronic devices.; Proposes the automatic shutting down of any establishments caught in flagrante delicto selling, producing, or importing substandard and hazardous products."
