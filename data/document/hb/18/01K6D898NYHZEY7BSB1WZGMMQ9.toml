congress_website_title = "AN ACT ESTABLISHING THE BALIK PROBINSYA PUBLIC HOUSING AND RELOCATION PROGRAM, AND FOR RELATED PURPOSES"
congress_website_abstract = "Aims to address the issue that COVID-19 pandemic has most cases concentrated in highly urbanized areas, which has become a wake-up call to decongest the highly urbanized cities. Seeks to resolve housing and rural-to-urban migration problems; address the plight of the local migrants; and to enable trickled down economic policies and resettlement programs to produce lasting impact. Provides as basis of this measure the first baseline National Migration Survey (NMS) of 2018 by the Philippine Statistics Authority (PSA). Proposes a database of informal settlers where the PSA shall design and conduct detailed surveys and inventory of every urban poor household residing in informal settler communities in the NCR, Metropolitan Cebu, and Metropolitan Davao. Intends to gather economic, social, and personal data necessary which shall comprise key components of a National Database on the Urban Poor and shall guide the Department of Human Settlements and Urban Development (DHSUD) and other government agencies on crafting and implementing economic and social policies."
