congress_website_title = "AN ACT ENSURING THE FUNDAMENTAL EQUALITY OF MEN AND WOMEN UNDER THE LAWS ON MARRIAGE AND FAMILY RELATIONS, AMENDING FOR THE PURPOSE ARTICLES 14, 96, 124, 211, AND 225 OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE \\\"FAMILY CODE OF THE PHILIPPINES\\\""
congress_website_abstract = "Seeks to rectify the discriminatory provisions of the Family Code which propagate the unequal status of spouses and perpetuate the obsolete concept of patriarchy within the family specially on matters of parental consent to marriage of children between ages 18 to 21, administration and employment of community and conjugal property, exercise of parental authority over children and legal guardianship over properties of minor children wherein the husband is given special preference by the law."
