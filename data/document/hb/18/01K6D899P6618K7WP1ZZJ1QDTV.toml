congress_website_title = "AN ACT TO IMPROVE THE EFFICIENCY OF NATIONAL RESEARCH AND DEVELOPMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to establish under the Office of the President a Research and Development Support Committee (RDSC) who shall be responsible for reviewing regulations affecting research and research universities. Proposes that RDSC shall harmonize, streamline, and eliminate duplicative regulations and reporting requirements; and minimize the regulatory burden on institutions of higher education performing government-funded research while maintaining accountability for expenditures."
