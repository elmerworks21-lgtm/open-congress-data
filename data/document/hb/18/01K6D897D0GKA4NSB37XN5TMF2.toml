congress_website_title = "AN ACT ALLOWING AND REGULATING THE USE OF MOTORCYCLES AS PUBLIC UTILITY VEHICLES, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 4136, OTHERWISE KNOWN AS THE LAND TRANSPORTATION AND TRAFFIC CODE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Allows any two-wheeled motor vehicle that may be registered with the Land Transportation Office as for hire and may be used as a commercial vehicle to transport passengers and goods provided that the motorcycle shall have a minimum engine displacement of 125 cubic centimeters and a backbone type built. Ensures the safety and roadworthiness of motorcycles-for-hire by prohibiting any modifications on said vehicle except the installation of motorcycle luggage carrier, saddlebag, step board or foot peg and appropriate speed limiter and monitoring device based on safe engineering specifications."
