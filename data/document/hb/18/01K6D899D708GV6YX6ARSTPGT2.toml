congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 10642 OTHERWISE KNOWN AS THE “PHILIPPINE LEMON LAW” AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to promote full protection to the rights of consumers in the sale of motor vehicles against business and trade practices which are deceptive or unfair by making it easier for them to avail of their rights. Seeks to reduce the number of repair attempts required under the law and obligating the manufacturer, distributor, authorized dealer or retailer to immediately replace the motor vehicle if it shall be found to have critical nonconformity issues which threatens the safety of its users."
