congress_website_title = "AN ACT RATIONALIZING GOVERNMENT INTERVENTIONS IN LABOR DISPUTES BY ADOPTING THE ESSENTIAL SERVICES CRITERIA IN THE EXERCISE OF THE ASSUMPTION OR CERTIFICATION POWER OF THE SECRETARY OF LABOR AND EMPLOYMENT, AND DECRIMINALIZING VIOLATIONS THEREOF, AMENDING FOR THE PURPOSE ARTICLES 263, 264, AND 272 OF PRESIDENTIAL DECREE 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED AND FOR OTHER PURPOSES"
congress_website_abstract = "Refers essential services to: FUNCTIONS OR SERVICES RENDERED BY AN ESTABLISHMENT, WHICH IF INTERRUPTED, WOULD ENDANGER THE LIFE, PERSONAL SAFETY OF THE WHOLE OR PART OF THE POPULATION FOR THIS PURPOSE, . . . Declares that: “IN LABOR DISPUTES AFFECTING INDUSTRIES ENGAGED IN ESSENTIAL SERVICES, IT SHALL BE THE DUTY OF THE UNION AND EMPLOYER TO PROVIDE AND MAINTAIN THE OPERATION OR DELIVERY OF SERVICES IN CASE OF HOSPITALS, CLINICS OR MEDICAL INSTITUTIONS, THE UNION AND EMPLOYER SHALL PROVIDE AND MAINTAIN AN EFFECTIVE AND FUNCTIONAL WORKFORCE, WHOSE MOVEMENT AND SERVICES SHALL BE UNHAMPERED AND UNRESTRICTED. . . , MOST ESPECIALLY EMERGENCY CASES FOR THE DURATION OF LABOR DISPUTE”."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_18/HB05607.pdf"]

