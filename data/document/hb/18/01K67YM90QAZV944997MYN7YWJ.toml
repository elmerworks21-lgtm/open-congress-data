title = "MALASAKIT CENTERS ACT"
date_filed = "2019-11-13"
long_title = "AN ACT ESTABLISHING MALASAKIT CENTERS IN ALL DEPARTMENT OF HEALTH (DOH) HOSPITALS IN THE COUNTRY AND IN THE PHILIPPINE GENERAL HOSPITAL (PGH), PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
scope = "National"
subjects = [ "Malasakit Centers",]
congress_website_author_codes = ["H058"]
congress_website_coauthors_raw = ["MARCOLETA, RODANTE D.","ABU, RANEO \"RANIE\" E.","KHO, ELISA \"OLGA\" T.","GO, MARK O.","ALONTE-NAGUIAT, LEN B.","VELASCO, LORD ALLAN JAY Q.","BUSTOS, JORGE ANTONIO P.","SALCEDA, JOEY S."]
congress_website_committee_codes = ["0517","0532","0542"]
congress_website_primary_keys = [7652]
congress_website_title = "AN ACT ESTABLISHING THE MALASAKIT PROGRAM AND INSTITUTIONALIZING THE DELIVERY OF MEDICAL AND FINANCIAL ASSISTANCE UNDER THE MALASAKIT CENTERS IN PUBLIC HOSPITALS TO COMPLEMENT THE IMPLEMENTATION OF REPUBLIC ACT NO. 11223, OTHERWISE KNOWN AS THE \\\"UNIVERSAL HEALTH CARE ACT\\\" AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to provide a policy framework for an integrated people-oriented approach in public hospitals, ensure financial risk protection and alleviate the financial burden of the indigent and financially incapacitated patients and families through streamlined processes to access financial and medical assistance in public hospitals, and guarantee that indigents patients will not incur out-of-pocket expense and financially incapacitated patients will not incur the least out-of-pocket expense by making use of the various medical and financial assistance available for patients. Provides a one-stop shop for medical and financial assistance not covered by the PhilHealth benefits for indigent and financially incapacitated patients, to be provided by participating agencies such as DOH, DSWD, PCSO, and OP."
senate_website_permalink = "https://web.senate.gov.ph/lis/bill_res.aspx?congress=18&q=HBN-5477"

