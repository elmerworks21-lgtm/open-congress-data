congress_website_title = "AN ACT EXPANDING ENTERPRISE-BASED EDUCATION AND TRAINING, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to address gaps leading to jobs-skill mismatch in order to tap the full productive potential of the labor force especially college graduates. Defines Enterprise-Based Education and Training programs (EBET) to practical training programs with compulsory related theoretical instructions conducted on/off-the-job being implemented within companies. Intends to enhance the skills of the middle-level workforce by strengthening the participation of the private sector in Technical-Vocational Education and Training (TVET) - to empower more companies, organizations, and other institutions to offer enterprise-based training programs compliant to standards which shall be formulated by TESDA. Proposes to establish a national enterprise-based training system and standards which shall ensure that the student/trainees will acquire the right competencies in an environment where their rights and safety are protected."
