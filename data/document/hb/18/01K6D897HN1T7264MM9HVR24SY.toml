congress_website_title = "AN ACT DEFINING THE MARITIME ZONES OF THE REPUBLIC OF THE PHILIPPINES"
congress_website_abstract = "Seeks to have a general declaration and definition of the maritime zones under the jurisdiction of the Philippines and to preserve and protect the country's maritime rights. Intends to practically averts any unnecessary dispute with vessels of foreign states entering the Philippine maritime territory without permission. Declares that the maritime zones of the Philippines shall be comprised of its internal waters,archipelagic waters, territorial sea, continuous zone, EEZ and continental shelf; and that all territories of the Philippines shall generate their respective maritime zones in accordance with international laws."
