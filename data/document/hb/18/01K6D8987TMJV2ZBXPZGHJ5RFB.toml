congress_website_title = "AN ACT SETTING A CEILING TO THE INDEBTEDNESS OF THE REPUBLIC OF THE PHILIPPINES TO ENSURE MACRO-ECONOMIC STABILITY AND SUSTAINABLE GROWTH AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to put a cap on the total indebtedness of the national government and any of its agencies, offices, GOCCs at 50% of the latest GDP to secure the prevention of potential negative impacts of high pubic debt on economic activity. Provides that the debt ceiling may be breached only when there are extraneous events beyond the control of the government subject to Presidential certification, and approval of Congress. Mandates the Chief Executive to go back to Congress and seek authority to borrow more in the event that the national government fiscal deficit target submitted by the President is breached before the end of the fiscal year."
