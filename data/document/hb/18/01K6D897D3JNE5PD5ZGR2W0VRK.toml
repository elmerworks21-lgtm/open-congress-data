congress_website_title = "AN ACT ESTABLISHING THE EASTERN SEABOARD STRATEGIC DEFENSE PLAN"
congress_website_abstract = "Seeks to protect and defend the part of our national territory which includes Benham Rise which has been acknowledged and confirmed by the United Nations Commission on the Limits of the Continental Shelf pursuant to the UNCLOS to be part of the Philippine Continental Shelf. Intends to adopt a strategic plan on developing our capability to protect our rights over Benham Rise and our entire eastern seaboard in order to monitor, track and challenge, vessels in our waters. Provides that our Navy, Coast Guard and Air Force be equipped with sufficient assets to carry out this mission and for the establishment of coastal facilities that will cater to air, sea and surveillance assets on the eastern seaboard."
