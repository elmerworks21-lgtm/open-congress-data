congress_website_title = "AN ACT PROVIDING FOR PROTECTION OF THE REMITTANCES OF OVERSEAS FILIPINO WORKERS"
congress_website_abstract = "Seeks to 1.) provide for a mandatory discount of 50% of the remittance fees imposed by bank and non-bank financial intermediaries; 2.) provide for tax incentives to intermediaries which shall provide for such discounts; 3.) prohibit intermediaries from raising their current remittances fees without prior consultation with the Department of Finance (DOF), Bangko Sentral ng Pilipinas (BSP), and the Philippine Overseas Employment Administration (POEA). Mandates government agencies to provide financial education programs to OFWs and their families."
