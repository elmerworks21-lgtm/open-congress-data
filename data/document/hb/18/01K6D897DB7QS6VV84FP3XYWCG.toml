congress_website_title = "AN ACT CHANGING THE TERM OF OFFICE OF ALL BARANGAY OFFICIALS FROM THREE (3) YEARS TO FIVE (5) YEARS AND PROVIDING A SYSTEM FOR RECALL, AMENDING FOR THE PURPOSE SECTION 43 AND SECTION 74, RESPECTIVELY, OF REPUBLIC ACT NUMBERED SEVEN THOUSAND ONE HUNDRED SIXTY, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
