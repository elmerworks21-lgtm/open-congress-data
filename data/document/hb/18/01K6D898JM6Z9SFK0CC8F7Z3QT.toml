congress_website_title = "AN ACT INSTITUTIONALIZING THE UNANG YAKAP CAMPAIGN, ADOPTING THE PROTOCOL ON ESSENTIAL NEWBORN CARE"
congress_website_abstract = "Seeks to address the disturbing trend in neonatal mortality by institutionalizing the Unang Yakap campaign which advocates the Essential Intrapartum Newborn Care ( E I N C ), a concept fully supported by W H O, describes by D O H as a series of time - bound and evidence - based interventions in caring for newborn babies and their mothers and therefore has a potential to decrease newborn death by at least half. Involves non-costly simple ways or steps to improve health care services for babies during the first critical hours; and aims to train frontline maternal and newborn healthcare practitioners and educate pregnant women of the importance of observing the Unang Yakap protocol."
