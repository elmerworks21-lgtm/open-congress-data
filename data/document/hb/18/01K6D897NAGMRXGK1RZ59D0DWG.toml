congress_website_title = "AN ACT ESTABLISHING THE DEPARTMENT OF OVERSEAS FILIPINO WORKERS (DOFW), DEFINING ITS POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFORE AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to create a separate Department which should provide immediate, prompt, and effective response to OFWs problems both local and abroad and that there should be an official OFW bank which shall address the OFWs financial needs. Provides for the powers and functions of the Department, some notable ones, as follows: Assess, review, harmonize and coordinate all OFW-related local policies and procedures and International agreements to ensure overall consistency and implementation of the national policies; Build a strong and harmonious partnership with foreign countries and the private sectors to formulate strategies and implement the same; Assist and provide technical expertise on the formulation of strategies and plans concerning OFW activities if needed."
