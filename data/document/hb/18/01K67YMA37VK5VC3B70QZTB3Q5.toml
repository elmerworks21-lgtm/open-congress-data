congress_website_title = "AN ACT ENSURING THE EFFECTIVENESS OF OFFICIAL DEVELOPMENT ASSISTANCE LOANS AND GRANTS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8182, OTHERWISE KNOWN AS THE OFFICIAL DEVELOPMENT ASSISTANCE ACT OF 1996, AS AMENDED"
congress_website_abstract = "ODA and Aid Effectiveness refers to a loan or loan and grant package which meets several criteria to be effective. Intends to promote and achieve sustained reduction of poverty and inequality and support the enjoyment of human rights, democracy, environmental sustainability, and gender equality. Seeks to require ODA loans to be based on democratic ownership and mutual accountability. Provides an alternative discount rate for computing the present value (PV) of debt service payments; Seeks to empowers civil society organizations to measure the impact of effectiveness and establishes a citizen participation committee for each ODA-funded project."
