congress_website_title = "AN ACT PROVIDING THAT THE SEASONABLE FILING OF A MOTION FOR RECONSIDERATION AND/OR APPEAL SHALL STAY THE EXECUTION OF THE CHALLENGED ORDER OF DECISION"
congress_website_abstract = "Provides that a seasonable motion for reconsideration, appeal or petition for review shall stay execution of the challenged order or decision until the rendition of a final judgement affirming the said controverted order or decision. States that due process includes the opportunity to be heard not only in the first instance but also on motion for reconsideration as appeal. This opportunity to be heard is virtually negated by the execution of the challenged order or decision pending a motion for reconsideration or appeal."
