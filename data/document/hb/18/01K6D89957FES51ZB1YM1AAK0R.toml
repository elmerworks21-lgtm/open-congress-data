congress_website_title = "AN ACT INCREASING THE PENALTIES UNDER ARTICLE 217 OF THE REVISED PENAL CODE, AMENDING FOR THAT PURPOSE ACT NO.3815, AS AMENDED"
congress_website_abstract = "Seeks to address the rampant graft and corruption in the country by increasing penalties imposed for malversation of public funds. Proposes to upgrade such penalties by moving up the periods of the divisible penalties provided in article 217 of the Revised Penal Code from prision mayor in its minimum to medium periods to prision mayor in its medium and maximum periods. Intends to make the penalty of reclusion perpetua imposable to a lower amount from P8,800,000.00 to P4,400,000.00."
