congress_website_title = "AN ACT IMPLEMENTING THE PEOPLE'S RIGHT TO INFORMATION AND THE CONSTITUTIONAL POLICIES OF FULL PUBLIC DISCLOSURE AND HONESTY IN THE PUBLIC SERVICE AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to provide for the following: 1.) an expansive scope in terms of government agencies as well as information covered; 2.) a clear, uniform and speedy procedure for access to information; 3.) a proscription against excessive costs of access to information; 4.) a system of accessible and speedy remedies that a citizen who has been denied access to information may resort to; 5.) a mandate to promote a culture of openness within government; and 6.) criminal offenses and penalties for violation of the right to information."
