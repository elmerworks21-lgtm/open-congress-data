congress_website_title = "AN ACT STRENGTHENING THE PRIVATE SECURITY INDUSTRY, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 5487, ENTITLED, “AN ACT TO REGULATE THE ORGANIZATION AND OPERATION OF PRIVATE DETECTIVE, WATCHMEN OR SECURITY GUARD AGENCIES”, AS AMENDED"
congress_website_abstract = "Seeks to professionalize the private security industry by intensifying the requirements for training and professional certification of security practitioners. Intends to increase the efficiency of the security industry by introducing amendments to lessen bureaucracy with respect to licensing, operation and regulation of private security agencies. It also gives the agency players a greater role in the drafting of regulations and issuances related to and affecting private security agencies and private security personnel. Provides safeguards for the public against private security agencies that act as private armies."
