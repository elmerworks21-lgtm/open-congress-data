congress_website_title = "AN ACT ESTABLISHING A FORENSIC DNA DATABASE IN THE PHILIPPINES"
congress_website_abstract = "Proposes to create a centralized and nationwide Forensic Deoxyribonucleic Acid (DNA) Database System for collection, storage, and maintenance of genetic identification information and to empower concerned government agencies to collect, analyze, type or profile, and record any genetic markers contained in or derived from DNA. Intends to provide a reliable mechanism for building evidence in forensic investigations consisting of different indices: to serve as a tool for crime prevention or solution, and non-criminal purposes; to identify the person who got involved in the commission of an offense; to prove the innocence or guilt of person allegedly involved in the commission of an offense; to exonerate a person wrongly convicted of an offense, or to assist in the identification of missing persons or unidentified human remains."
