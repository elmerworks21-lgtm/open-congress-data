congress_website_title = "AN ACT AMENDING SECTIONS 141, 142 AND 143 OF REPUBLIC ACT NO. 8424, AS AMENDED, OTHERWISE KNOWN AS THE NATIONAL INTERNAL REVENUE CODE OF 1997"
congress_website_abstract = "Seeks to increase the excise tax rates on distilled spirits to 22% from 20% ad valorem on the net retail price (NTP) per proof and a specific tax rate of P30 per liter from P23.40. Intends to levy sparkling wines a 15% ad valorem per liter in addition to P650 specific tax per liter which shall be increased by 7% annually, while still wines and carbonated wines with more than 14% alcohol will be taxed at P80 per liter with 7% increase annually. Seeks to increase the specific tax rate to P28 per liter for the fermented liquors and to increase to P32 in 2020 and so on, which shall be increased by 7% annually, thereafter."
