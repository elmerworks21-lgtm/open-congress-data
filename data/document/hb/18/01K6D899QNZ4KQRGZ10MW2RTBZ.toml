congress_website_title = "AN ACT PROVIDING INCENTIVES AND OTHER BENEFITS TO ALL FORCE MULTIPLIERS AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to grant Volunteers and Force Multipliers that are accredited by the PNP and LGUs the following: a monthly allowance of P2,500; an exemption from income taxation all amounts received and other emoluments, gross benefits of whatever kind or character shall likewise be exempt from taxation; and the sale, exchange or disposition of real property shall be exempt from capital gains and other transfer taxes. Seeks to provide free primary health services and medicines and free legal services of the Public Attorney´s Office (PAO) if they shall be a party litigant in administrative and criminal cases filed in connection with the performance of their assigned duties."
