congress_website_abstract = "Aims to a.) Establish a Special fund that shall be disbursed primarily for the implementation of infrastructure projects across four (4) priority areas - Health, Education, Agriculture, and Local Roads/Infrastructure and Livelihood (HEAL); b.)Define the guidelines, criteria, and standards in accessing, implementation, and evaluation of use of the same fund; and c.) Establish the government authority and body which shall be responsible for collection, evaluation, approval, and oversight of the projects and activities to be undertaken under the same fund."
