congress_website_title = "AN ACT ADJUSTING THE SALARY SCHEDULE OF CIVILIAN PERSONNEL IN THE GOVERNMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to implement a salary schedule that is generally comparable with those in the private sector doing comparable work and in accordance with the provisions of existing salary and position classifications laws, in order to attract, retain and motivate a corps of competent civil servants. Declares that the Salary Schedule shall apply to all positions for civilian government personnel in the three branches of government, including Constitutional Commissions, SUCs, GOCCs not covered by R.A. 10149, GFIs and LGUs. Provides that the DBM and CSC shall jointly review the CPCS every three (3) years, develop and recommend to the President a competitive compensation and remuneration system which shall attract and retain talent."
