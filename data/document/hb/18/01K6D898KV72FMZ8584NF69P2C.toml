congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE NUCLEAR REGULATORY FRAMEWORK, CREATING FOR THE PURPOSE, THE PHILIPPINE NUCLEAR REGULATORY COMMISSION, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to provide cheaper electricity for Filipinos by utilizing cheap and reliable energy sources through establishing a regulatory body which shall also focused on the use and application of nuclear energy with a vast coverage that will touch on issues regarding public health and safety, and protection of the environment. Seeks to create said autonomous regulatory body which shall exercise authority over all aspects of safety, security and safeguards involving nuclear and other radioactive materials, facilities and radiation generating equipment. Proposes provisions which include but is not limited to the control of peaceful uses and application of nuclear energy in order to strengthen science and technology and boost industrial growth, harmonization of Philippines' nuclear regulatory structure with other countries and ensure consistency with the nation's obligations under relevant international instruments and modernize the nuclear civil liability and compensation regime in line with internationally-accepted standards."
