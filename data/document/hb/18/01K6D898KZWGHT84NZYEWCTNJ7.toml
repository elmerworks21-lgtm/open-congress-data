congress_website_title = "AN ACT STRENGTHENING THE FILIPINO YOUTH INVOLVEMENT IN AGRICULTURE AND ENTREPRENEURSHIP"
congress_website_abstract = "\\\"Young Agripreneurs Act of 2020\\\" Aims to address the state of unemployment, underemployment and the condition of rural youths who are forced to work in urban communities. Intends to create a \\\"Youth Agricultural Hubs\\\" in provinces and highly urbanized cities which shall: be the center for trainings, assistance, and opportunities; monitor and evaluate programs, projects, and activities; and facilitate partnerships among stakeholders, in the promotion of youth involvement in agriculture. Proposes the conduct of series of \\\"Youth Agripreneurship Trade Fairs\\\" showcasing the youth's agricultural products; and appropriates three percent (3%) of Internal Revenue Allotment of the LGU concerned for youth's hubs."
