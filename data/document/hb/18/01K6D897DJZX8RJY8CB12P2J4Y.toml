congress_website_title = "AN ACT PROVIDING FOR THE SUSTAINABLE MANAGEMENT OF FOREST AND FOREST LANDS AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to set a clear and concrete policy direction in the formulation of programs for the protection and sustainable management of our forest ecosystems. Recognizes the Sustainable Forest Ecosystem Management (SFEM) strategy as the principal policy framework for all programs in the forestry sector. Prioritizes the protection and rehabilitation of our forest systems through regeneration or restoration of natural forests."
