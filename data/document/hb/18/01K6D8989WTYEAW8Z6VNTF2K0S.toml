congress_website_title = "AN ACT DECLARING A NATIONAL POLICY THE PROMOTION OF FINANCIAL LITERACY AS A TOOL FOR POVERTY ALLEVIATION AND NATIONAL DEVELOPMENT"
congress_website_abstract = "Proposes to create a Council primarily responsible in providing assistance in formulating policies related to the promotion of financial literacy as a national concept, promoting exchange of information on financial literacy between public and private sectors, and monitoring and evaluating financial literacy programs. Intends to harness schools and workplaces as learning environments, integrating financial literacy in anti-poverty programs, and multi-channel delivery of learning tools and information."
