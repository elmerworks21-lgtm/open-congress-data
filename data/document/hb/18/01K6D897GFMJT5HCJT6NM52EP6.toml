congress_website_title = "AN ACT PRESCRIBING AN URGENT, COMPREHENSIVE, AND INTEGRATED LAND-BASED TRAFFIC MANAGEMENT TO EFFECTIVELY ADDRESS THE TRAFFIC CONGESTION CRISIS IN MANILA, METROPOLITAN CEBU, AND METROPOLITAN DAVAO AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Declares and recognize that the traffic crisis is in the nature of a man-made calamity or catastrophe; that time is of the essence and immediate action is urgently necessary to prevent further damage to the national economy, public health, and social welfare or loss of life and property as a result of the traffic crisis; and that there is urgent necessity as well to restore, improve, and make accessible vital public transportation services, infrastructure, and facilities. Seeks to reserve funds to facilitate the improvement and enhancement of PUVs in the metropolitan areas through conduct of roadworthiness testing. States that the DBP shall extend financial assistance to existing public transportation operators with valid franchise to enable them to modernize their units and can only offer the loan facility for procurement of vehicles with engines that are Euro 4-compliant, hybrid, fully electric-powered or those which are more environment-friendly and are accessible to PWDs. Proposes to create a Special Traffic Crisis Court in each of the metropolitan areas which shall have exclusive jurisdiction to hear and expeditiously resolve all actions that may emanate from the implementation herein."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_18/HB00559.pdf"]

