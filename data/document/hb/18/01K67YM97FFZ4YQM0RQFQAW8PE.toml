congress_website_title = "AN ACT ENABLING BANKS TO EXPAND SERVICE DELIVERY CHANNELS THROUGH CASH AGENTS AND PROVIDING GUIDELINES THEREFOR"
congress_website_abstract = "Seeks to create an enabling regulatory environment for innovations and allow banks to exponentially expand reach through cash agents and serve clients, particularly in the low-income and rural areas, more efficiently. Allows banks, with prior BSP authorization, to serve clients through cash agents to accept and disburse cash on the bank´s behalf, collect and forward applications for opening a savings account, forward loan application documents, perform initial Customer Identity Verification, and bills payments. Provides incentives to any persons who shall establish its business in remote areas such as waiver of government fees, free personnel training, tax benefits, among other."
