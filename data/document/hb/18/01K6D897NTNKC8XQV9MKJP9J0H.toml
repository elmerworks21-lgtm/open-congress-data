congress_website_title = "AN ACT TO ESTABLISH THE MAGNA CARTA FOR BARANGAYS"
congress_website_abstract = "Intends to help barangays better perform their mandate in the most efficient, responsive and sustainable manner, professionalizing barangay officials and give their work some dignity. Seeks to recognize these officials as regular government employees with all the benefits for which a regular employee may be entitled to, instead of just receiving honoraria. Aims to provide for the barangays appropriate basic services and facilities such as regular supply of clean and potable water, public transportation, schools, health centers and barangay halls to meet the requirements of their local populace."
