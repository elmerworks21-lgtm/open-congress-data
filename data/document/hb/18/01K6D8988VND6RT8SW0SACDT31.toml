congress_website_title = "AN ACT REGULATING THE DOWNSTREAM PETROLEUM INDUSTRY AND FOR OTHER RELATED PURPOSES"
congress_website_abstract = "Contends that there is a pressing need to regulate the oil industry to protect the majority of Filipinos from current runaway increases in oil prices and assumes that regulation can only be effective and truly beneficial if it is part of a program to institutionalize national oil industrialization, so that local oil prices can be brought down from unreasonable and unjustifiable levels and can be prevented from falling prey to further monopoly pricing and manipulation. Intends therefore the regulation of the petroleum industry through the creation of an independent, quasi-judicial regulatory body to be named as Petroleum Regulatory Council (PRC); and a trust fund which shall be designated as the Oil Price Buffer Fund (OPBF) which shall serve to cushion the impact on consumers against drastic increases in petroleum prices."
