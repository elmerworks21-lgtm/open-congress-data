congress_website_title = "AN ACT ABOLISHING THE PROCUREMENT SERVICE - DEPARTMENT OF BUDGET AND MANAGEMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address the issue regarding DOH´s transfer of COVID-19 funds to the PS-DBM (for the procurement of face shields, face masks, PPEs, medicines, and other health and medical supplies) that became a breeding ground for graft, corruption, inefficiency, and negligence. Supposes that the mandate of the PS-DBM became archaic and irrelevant upon implementation of Republic Act No. 9184, otherwise known as the “Government Procurement Reform Act” which also mandates that all procurement entities shall establish a single Bids and Awards Committee."
