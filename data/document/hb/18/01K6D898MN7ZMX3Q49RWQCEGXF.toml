congress_website_title = "AN ACT REGULATING PUBLIC SOLICITATIONS AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Intends to regulate public solicitation by any organizations, agencies, groups and individuals in order to protect the general public from unscrupulous solicitation and to ensure that funds are properly utilized for the intended charitable, social or public welfare purposes and for the intended beneficiaries. Provides for the following, among others: 1. All agencies and organizations covered and exempted by this Act; 2. Documentary requirements for solicitation permit; 3. Officials who are authorized to issue permit ; 4. The validity of permit; 5. Types of public solicitation; 6. Fees and charges; 7. Methods of public solicitation; 8. Allocation of proceeds; 9. Monitoring of public solicitation; 10. Reportorial requirements for exempt organizations; and 11. Prohibited acts and penalties"
