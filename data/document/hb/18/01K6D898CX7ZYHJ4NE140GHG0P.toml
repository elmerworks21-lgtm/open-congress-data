congress_website_title = "AN ACT AMENDING SECTION 65 OF REPUBLIC ACT NO. 11260, OTHERWISE KNOWN AS THE GENERAL APPROPRIATIONS ACT OF FISCAL YEAR 2019"
congress_website_abstract = "Proposes to extend the validity / availability of the Maintenance and Other Operating Expenses (M O O E ) and Capital Outlay ( C O ) appropriations for another fiscal year (until December 31, 2020). Intends to provide for the much-needed M O O E and C O to fund priority projects, financial assistance program, aid, and relief activities as well as for the maintenance, construction/repair, and rehabilitation of schools, hospitals, roads, bridges and other essential facilities of the national government."
