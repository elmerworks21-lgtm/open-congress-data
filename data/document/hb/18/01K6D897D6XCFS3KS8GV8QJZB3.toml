congress_website_title = "AN ACT PROMOTING OPEN ACCESS IN DATA TRANSMISSION, PROVIDING ADDITIONAL POWERS TO THE NATIONAL TELECOMMUNICATIONS COMMISSION"
congress_website_abstract = "Aims to address the slow and expensive internet service in the country due to the present structure of the Philippine telecommunications industry which imposes a high barrier to the entry of new, independent players, both local and foreign. Intends to promote competition in data transmission and telecommunications services by lowering the cost and minimizing the barriers to entry by service providers; and seeks to establish a regulatory framework that would develop and sustain efficient and effective data transmission in the country."
