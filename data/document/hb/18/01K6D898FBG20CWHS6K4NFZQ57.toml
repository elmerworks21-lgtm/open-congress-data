congress_website_title = "AN ACT REQUIRING THE REGISTRATION OF SUBSCRIBER IDENTITY MODULE CARDS"
congress_website_abstract = "Mandates every Public Telecommunication Entity (PTE) or direct seller to require SIM card subscribers to present a valid identification with photo and to accomplish and sign a control-numbered registration form with their full name, date of birth, gender, and address and the assigned cell phone number of SIM cards and its serial number. States that any information in the SIM card registration shall be treated as absolute confidential, provided that under Section 12(e) of RA 10173, otherwise known as the “Data Privacy Act of 2012”, the PTE shall be required to disclose the full name and address contained in the SIM card registration, upon a duly issued subpoena or order of a court upon finding of probable cause, or upon written request from a law enforcement agency in relation to an on-going investigation, that a particular number is used in the commission of a crime or that it was used as a means to commit an unlawful act. Requires all PTEs to maintain a SIM Card Register of their subscribers and all existing mobile phone subscribers to register with their respective PTE within 180 days with an extension period of no longer than 120 days upon valid request to the DICT."
