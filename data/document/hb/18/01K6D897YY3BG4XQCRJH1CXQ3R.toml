congress_website_title = "AN ACT AMENDING SECTIONS 4, 5, 20, 22, 25, 27, 28, 34, 40, 50, 73, 112, 117, 119, 203, 204, 222, 237, 237-A, 255, 256, 257, 258, 260, 261, 262, 263, 264, 265, 266, 275, 282, 290 AND ADDING SECTIONS 6-A AND A NEW TITLE XIII UNDER THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to lower the corporate income tax rate, reform the corporate income tax system, and broaden the tax base by modernizing investment tax incentives to enhance fairness, improved competitiveness, plug tax leakages, and achieve fiscal sustainability. Endeavors to address several major policy issues as regards to: a. Philippines having the highest corporate income tax rate in the ASEAN region but having the lowest collection efficiency because of very generous tax incentives that are given in perpetuity and in lieu of other taxes; b. The country's investment tax incentive system is very complex which result in a system that is less transparent, less targeted, not time-bound, and not performance-based; c. Tax Code is outdated which lacks adequate provisions to address transfer pricing and other anti-avoidance practices; and d. Very little involvement by the DOF in the formulation and grant of tax incentives to the registered business enterprises, though it is the steward of the government's fiscal health and mandated to formulate sound fiscal policy."
