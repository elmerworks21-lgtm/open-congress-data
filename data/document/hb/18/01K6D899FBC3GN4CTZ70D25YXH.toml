congress_website_title = "AN ACT ESTABLISHING A TOTAL BAN ON THE IMPORTATION OF WASTES, PROVIDING MEANS FOR ITS ENFORCEMENT, APPROPRIATIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to establish a total ban on the importation of wastes, processed wastes, and its by-products (for whatever purpose, in any form, and in whatever amount) to prevent future incidents of shipments from abroad and therefore send a message internationally that the Philippines is not a dumping site for their wastes. Provides for the application of relevant penal provisions of environmental and customs laws to violators of this Act, such as but not limited to Ecological Solid Waste Management; Philippine Clean Air Act; Philippine Clean Water Act; Toxic Substances and Hazardous and Nuclear Wastes Control Act; and the Customs Modernization and Tariff Act."
