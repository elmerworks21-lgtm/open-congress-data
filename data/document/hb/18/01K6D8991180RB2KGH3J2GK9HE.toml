congress_website_title = "AN ACT PROVIDING MECHANISMS FOR ACCELERATED ECONOMIC RECOVERY AND SOCIOECONOMIC RELIEF, APPROPRIATING FUNDS FOR THE PURPOSE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to put a stop and halt the COVID-19 disease through vaccine acquisition and free access to it, and to further reconditions the economy particularly the sectors that have been gravely affected. Focuses on the government assistance to the banking sectors, rentals, business, livelihood, workers, agriculture, education, and health. Intends to spur the economy through efficient health regulatory and fiscal policies."
