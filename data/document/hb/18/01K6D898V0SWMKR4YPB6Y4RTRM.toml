congress_website_title = "AN ACT FURTHER AMENDING REPUBLIC ACT NO. 4566 TO PROMOTE COMPETITION AND INVESTMENTS IN THE CONSTRUCTION CONTRACTING SERVICES INDUSTRY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to extend equal opportunities to eligible and qualified domestic and foreign contractors by removing barriers to entry of new players, including government restrictions. Proposes to insert new sections, among others, to read as follows: “SEC.17. WHO MAY PRACTICE CONSTRUCTION CONTRACTING. - ONLY PERSONS, REGARDLESS OF NATIONALITY OR CITIZENSHIP, PROPERLY LICENSED AND REGISTERED WITH THE BOARD IN CONFORMITY WITH THE AUTHORITY MAY PRACTICE. . .”; and “SEC. 18. FOREIGN RECIPROCITY. - NO FOREIGN CONTRACTOR SHALL BE GRANTED A LICENSE . . . UNLESS THE COUNTRY OR STATE OF WHICH THE FOREIGN CONTRACTOR IS A SUBJECT OR CITIZEN, SPECIFICALLY PERMITS FILIPINO CONTRACTORS TO PRACTICE WITHIN ITS TERRITORIAL LIMITS ON THE SAME BASIS AS THE SUBJECTS OR CITIZENS OF SAID FOREIGN COUNTRY OR STATE UNDER RECIPROCITY AND INTERNATIONAL AGREEMENTS; . . . PROVIDED FURTHER, THAT SUCH FOREIGN CONTRACTOR . . . SHALL ENSURE TECHNOLOGY TRANSFER AND CAPACITY BUILDING OF LOCAL CONTRACTORS.”"
