congress_website_title = "AN ACT PROVIDING FOR PROTECTED GEOGRAPHICAL INDICATIONS OF LOCALLY PRODUCED FOOD PRODUCTS, FOODSTUFF, HANDICRAFT, WINES AND SPIRITS"
congress_website_abstract = "Defines “Geographical Indication” to indications that identify a good as originating in a territory, region, or locality, where a given quality, reputation, or other characteristics of the good is essentially attributable to its geographical origin and/or human factors. Seeks to incentivize local producers of a province or region with globally-competitive products by preserving their methods of production, which have close ties with Filipino culture and tradition, and establish a foothold of Filipino-made products in the international market."
