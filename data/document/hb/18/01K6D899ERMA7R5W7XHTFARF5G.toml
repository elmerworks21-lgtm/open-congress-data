congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 8792, OTHERWISE KNOWN AS THE \"ELECTRONIC COMMERCE ACT\""
congress_website_abstract = "Seeks to align our law on the legal recognition of electronic signatures, formation and validity of electronic contracts, error on electronic communication or electronic document, and the time and place of dispatch and receipts of electronic communications and documents. Intends to introduce electronic and remote notarization; to make Philippine law at par with the ECC (Electronic Communications in International Contracts); and remove any inconsistency that currently exists to ease cross-border transactions and greatly improve the efficiency of e-commerce."
