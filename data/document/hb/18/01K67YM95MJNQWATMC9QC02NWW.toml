congress_website_title = "AN ACT PROVIDING POOR JOB APPLICANTS A 20% DISCOUNT IN THE PAYMENT OF FEES AND CHARGES FOR CERTAIN CERTIFICATES AND CLEARANCES ISSUED BY GOVERNMENT AGENCIES"
congress_website_abstract = "Refers poor job applicant to a person who is seeking gainful employment and has no visible means of income or whose income falls below the official poverty threshold. Members of the households of the “Pantawid Pamilyang Pilipino Program” (4Ps) shall be automatically considered as “poor” and are eligible to avail of the privileges under this Act. Provides a fine of not less than Five Thousand Pesos (P5,000.00) but not more than Twenty Thousand Pesos (P20,000.00) for any public officer or employee who refuses or fails to provide the benefit granted to the poor job applicant. States that a job applicant who misrepresents or falsifies any document to avail of benefits provided under this Act or abuses the privilege granted herein shall be prosecuted and punished in accordance with RA No. 3185, as amended, otherwise known as the Revised Penal Code, and shall suffer perpetual disqualification in availing the privileges under this Act."
