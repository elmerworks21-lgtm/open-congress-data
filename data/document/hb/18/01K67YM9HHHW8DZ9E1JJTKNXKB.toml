congress_website_title = "AN ACT ESTABLISHING A RENTAL HOUSING SUBSIDY PROGRAM FOR INFORMAL SETTLER FAMILIES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Establishes the Rental Housing Subsidy Program to provide social protection and support to informal settler families (ISFs) in accessing the formal housing market and to address the temporary relocation of displaced families due to natural and man-made disasters. Provides eligible ISFs a flat rental subsidy rate of Three thousand five hundred pesos (P3,500.00) for those living in Metro Manila and a rental subsidy rate to be determined by the Department of Human Settlements and Urban Development (DHSUD) and the National Economic Development Authority (NEDA) for those living in all regions, taking into consideration the prevailing minimum wage and rental rates per region, but not to exceed Three thousand five hundred pesos (P3,500.00) provided that the rental subsidy shall not exceed the actual rent. States that rental subsidy shall be granted to eligible beneficiaries until the date of completion of the permanent housing project intended for them or upon their actual transfer to the permanent housing project, whichever comes first."
