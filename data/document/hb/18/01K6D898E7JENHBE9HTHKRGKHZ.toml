congress_website_title = "AN ACT TO PROMOTE THE RIGHTS OF NATURE IN THE PHILIPPINES"
congress_website_abstract = "Proposes to give legal entity to nature, thereby urges all individual or collective member of the State to promote harmony with nature in all areas of its relationship with other human communities and the rest of nature in ecosystems. Declares that the State shall provide simple, effective and expeditious mechanisms for the protection and enforcement of certain fundamental and inalienable rights of the natural ecosystems and processes, or distinct and identifiable portions thereof."
