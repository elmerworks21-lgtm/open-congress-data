congress_website_title = "AN ACT REQUIRING ALL BROADCAST MEDIA NETWORKS TO DEVOTE A TOTAL OF TWENTY (20) MINUTES OF REGULAR AIRTIME A DAY FOR PUBLIC SERVICE ANNOUNCEMENTS, FREE OF CHARGE, AND PROVIDING PENALTIES FOR THE VIOLATION THEREOF"
congress_website_abstract = "Proposes to require all broadcasting media networks to devote a total of twenty (20) minutes of regular airtime a day for public service announcements (PSA) on various social issues including but not limited to: 1) Drug Abuse and Prevention; 2) Policies and Laws; 3) Road and Traffic Rules; 4) Physical and Mental Health; 5) Government Processes; 6) Emergency Preparedness and Public Safety; 7) Welfare Rights and Benefits; 8) Environmental Issues; 9) Education; 10) Suicide Prevention; and 11) Voter and Civic Education."
