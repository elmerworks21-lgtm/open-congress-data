congress_website_title = "AN ACT ESTABLISHING THE NATIONAL FINANCIAL LITERACY COUNCIL AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Intends to address Filipinos' lack of financial literacy or capability in managing their day-to-day finances, as well as their access to formal financial institutions (banks, insurance and investment companies) that would aid them to acquire specific knowledge to make informed financial decisions. Seeks to instill financial literacy in young Filipino by incorporating its modules to the basic education system which shall include budgeting, financial basics such as the effect of compound interest in debt, savings, and investments, and time value of money. Aims to: integrate financial literacy in the implementation of poverty alleviation; promote financial literacy in all government and private workplaces; and disseminate financial education materials through various media platforms."
