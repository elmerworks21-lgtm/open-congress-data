congress_website_title = "AN ACT FURTHER STRENGTHENING THE REGULATORY FRAMEWORK FOR THE PHILIPPINE DEPOSIT INSURANCE CORPORATION (PDIC), AMENDING FOR THE PURPOSE SECTIONS 1, 3, 4, 5, 6, 8, 9, 10, 11, 18, 22, 24, 26 and 28 OF REPUBLIC ACT NO. 3591, AS AMENDED, OTHERWISE KNOWN AS THE PDIC CHARTER"
congress_website_abstract = "Provides for the following: 1.) Attach the Philippine Deposit Insurance Corporation (PDIC) to the Bangko Sentral ng Pilipinas (BSP) for policy and program coordination; 2.) Modify certain powers of PDIC to exercise its core mandates as deposit insurer and liquidator of banks; 3.) Authorize the Board of Directors to increase the maximum deposit coverage when financial stability is threatened; 4.) Provide PDIC the authority to setup deposit insurance schemes for protection of users of new financial products, and depositors in Islamic banks; 5.) Provide that the compensation of PDIC officials shall be based on the Compensation and Position Classification System (CPCS) of the Governance Commission on Government-Owned-and-Controlled Corporations, among others."
