congress_website_title = "AN ACT ESTABLISHING THE NATIONAL ELECTRONIC TOLL COLLECTION SYSTEM FOR ALL EXPRESSWAYS IN THE COUNTRY"
congress_website_abstract = "Seeks to establish the interoperability of existing toll operations between different expressways to harness the full potential of providing fast, seamless and convenient means of land transportation. Defines several terms among others such as Electronic Toll Interoperability which refers to a system where an electronic or R F I D tag from one toll road operator can be used in the toll road of another operator, or a single electronic of R F I D tag can be used to access all toll roads in the country. Also refers Radio Frequency Identification or R F I D to a technology whereby digital data encoded in R F I D tags or labels are automatically identified, collected and entered into computer systems with little or no human intervention."
