congress_website_title = "AN ACT PROVIDING RETIREMENT BENEFIT TO FORCE MULTIPLIER"
congress_website_abstract = "Proposes to establish a retirement benefit for Philippine National Police force-multipliers in the amount of P50,000.00 provided that he shall be at least 65 years of age and with at least ten (10) years in service. Provides that in case such volunteer dies or becomes permanently incapacitated while in the performance of duty, he shall be entitled to the same amounts of benefits irrespective of age and number of years in service."
