congress_website_title = "AN ACT PROVIDING FOR THE REVISED CONSUMER ACT OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines several terms, among others: Chain Distribution Plans or Pseudo Investment, Ponzi Scheme, Telemarketing, Open-End-Credit Plan, Stockpiling, Counterfeit Products, Trademark, etc. Proposes several provisions, among others, to update and improve Republic Act No.7394 to keep up with the changing times - the age of technology: a) Basic Consumer Rights, b) Products Standards, Technical Regulations, and Conformity Assessment, c) Production, Sale, Distribution, Advertising, and Promotion of Health Products, d) Protection Against Hazardous Substances, e) Protection Against Deceptive, Unfair and Unconscionable Sales Acts and Practices, f) Regulation of Practices Relative to Weights and Measures, g) Sale of Products with Warranty, h) Labeling and Fair Packaging, i) Liability for Product and Services, j) Advertising and Sales Promotion, k) Regulation of Repair Service Terms, and l) Consumer Credit Transaction. Seeks to establish the Philippine Online Dispute Resolution and the Consumer Affairs Council, and provides for the Consumer Welfare and Protection Education Program."
