congress_website_title = "AN ACT ESTABLISHING A NATIONAL ECONOMIC DECENTRALIZATION PLAN TO FACILITATE FURTHER GROWTH IN ALL REGIONS OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"The Progresibong Pilipinas Para sa Lahat ng Pilipino Act\\\" Aims to create a more progressive Philippines for every Filipino through: a) Comprehensive studies focusing on challenges and opportunities for regional economic development; b) Phil. Healthcare Development Program which shall include establishment of specialty hospitals such as Phil. Heart Center, Lung Center of the Phils. National Kidney and Transplant Inst. and Phil. Orthopedic Center; c) Regional Centers for Excellence Development Program focusing on education and skills development; d) Relocation of NGAs to ensure effective and efficient communication and coordination between and among them, enhancing delivery of public goods and services in the regions/countryside; e) Regional decentralization mechanisms of procurement procedures for major NGA projects; f) Tax incentives for industries locating outside NCR."
