congress_website_title = "AN ACT PROMOTING INTEGRATED URBAN AGRICULTURE IN URBAN AREAS NATIONWIDE TO ADDRESS FOOD SECURITY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to promote and protect the fundamental right of every person to adequate food and freedom from hunger, optimize the use and productivity of urban land resources and spaces to support sufficient and sustainable food production, and develop modern-cost effective, space-efficient, and environmentally-safe agriculture technologies in urban areas to contribute in achieving sustainable food production and food security. Seeks to promote integrated urban agriculture development in all metropolitan areas nationwide which shall cover idle or abandoned government or private lands, buildings, shipping containers, subdivisions or villages, public housing, open spaces in all urban, peri-urban and urbanizable areas in the country, and all available land resources and buildings in schools, state or private universities and colleges, military camps suitable for growing crops and raising poultry, livestock and aquaculture."
