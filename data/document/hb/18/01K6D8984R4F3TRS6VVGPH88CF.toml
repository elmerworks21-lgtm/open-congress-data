congress_website_title = "AN ACT AMENDING TITLE IV, CHAPTER 1, ARTICLES 74, 75, 76 AND 77 OF RA 8533"
congress_website_abstract = "Proposes several amendments among others to Executive Order No. 209, the Family Code of the Phils. regarding property relations between husband and wife: Sec.74 is amended to read as follows: “”¦ (4) by the execution of a contract modifying the default or marriage settlement elected before the marriage.” Sec. 75 is amended to read as follows: “”¦ In the absence of marriage settlement, or when the regime agreed upon is void, the system of conjugal partnership of gains shall govern”¦” Sec. 76, is amended to read as follows: “In order that any modification in the marriage settlements may be valid, it must be made in writing and duly subscribed to the local civil registrar where the marriage is recorded ”¦ The modification of marriage settlement shall apply prospectively.\""
