congress_website_title = "AN ACT PROVIDING FOR A UNIVERSAL, COMPREHENSIVE, RELIABLE AND ACCESSIBLE WIRELESS INTERNET CONNECTION IN ORDER TO FACILITATE THE DELIVERY OF DIGITAL EDUCATION AMID THE CORONAVIRUS DISEASE 2019 (COVID-19) PANDEMIC"
congress_website_abstract = "Intends to create a solid and robust Philippine cyberinfrastructure that will continuously deliver reliable and fast internet connectivity that students need in this digital age. Provides for a minimum internet speed requirement which shall be set by the NTC; and for a universal wireless internet connection access which shall be established to key areas/strategic locations which must be able to maximize internet connectivity especially in the rural areas."
