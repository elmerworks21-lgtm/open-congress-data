congress_website_title = "AN ACT ESTABLISHING THE DEPARTMENT OF CULTURE, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Creates a Department which shall be responsible for the protection, preservation, regulations, development, management, dissemination and promotion of the cultural, historical and artistic heritage and resources of the Philippines and the Filipino people. Seeks to abolish the National Commission for Culture and the Arts (NCCA) and transfer its powers and functions, funds and appropriations, records, equipment, property and personnel to the Department with the following agencies being attached thereto: 1. Cultural Center of the Philippines; 2. National Museum of the Philippines; 3. National Historical Commission of the Philippines; 4. National Library of the Philippines; 5. National Archives of the Philippines; 6. Komisyon sa Wikang Filipino; 7. Intramuros Administration; 8. National Parks Development Committee; 9. Nayong Pilipino Foundation; and 10. Film Development Council of the Philippines."
