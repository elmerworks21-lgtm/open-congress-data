congress_website_abstract = "Seeks to include the opening of the practice of real estate salesperson to high school graduates, given the country´s shift to the K-12 curriculum; the removal of the arbitrary 1:20 ratio of brokers to salespersons and the harsh penalty of imprisonment for violations of the law and instead adjust the fine that may be imposed considering that violation by real estate service practitioners as in other profession are already subject to administrative sanctions, including the revocation of one´s registration."
