congress_website_title = "AN ACT IMPOSING STIFFER PENALTIES FOR CHILD ABUSE, EXPLOITATION AND DISCRIMINATION, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7610, AS AMENDED"
congress_website_abstract = "Aims to address prevailing numerous cases of child abuse in spite of the enactment of the \\\"Special Protection of Children Against Abuse, Exploitation and Discrimination Act” by imposing stiffer penalties to offenses, which includes among others: Violation of Sec.12 of R.A.No.10364 or the \\\"EXPANDED ANTI-TRAFICKING IN PERSONS ACT OF 2012\\\"; Discrimination against children of indigenous cultural communities which shall suffer a penalty of PRISION CORRECTIONAL in its MEDIUM period and a fine of not less than FIFTY THOUSAND PESOS (P50,000.00) nor more than ONE HUNDRED THOUSAND PESOS (P100,000.00)."
