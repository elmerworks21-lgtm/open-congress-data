congress_website_title = "AN ACT AMENDING SECTION 8 OF REPUBLIC ACT 6426, OTHERWISE KNOWN AS THE \"FOREIGN CURRENCY DEPOSIT ACT OF THE PHILIPPINES\""
congress_website_abstract = "States that \"All foreign currency deposits under Sec.8 of R.A. 6426, as amended by P.D. No.1035 and those authorized under P.D. No. 1034, are declared as and considered of an absolutely confidential nature. IN NO INSTANCE SHALL FOREIGN CURRENCY DEPOSITS BE EXAMINED, INQUIRED OR LOOKED INTO . . . EXCEPT UPON THE WRITTEN PERMISSION OF THE DEPOSITOR, OR IN CASES OF IMPEACHMENT, OR UPON ORDER OF A COMPETENT COURT IN CASES OF BRIBERY OR DERELICTION OF DUTY OF PUBLIC OFFICIALS, OR IN CASES WHERE THE MONEY DEPOSITED OR INVESTED IS THE SUBJECT MATTER OF THE LITIGATION\"."
