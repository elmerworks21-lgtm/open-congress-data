congress_website_title = "AN ACT PROHIBITING THE SUBSTITUTION OF CANDIDATES BY REASON OF WITHDRAWAL THEREBY AMENDING SECTION 77 OF THE BATAS PAMBANSA BILANG 881 OR THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "Amends Section 77 of the Batas Pambansa Bilang 881 or the Omnibus Election Code of the Philippines by prohibiting the substitution of candidates by reason of withdrawal. Also amends Section 69 of the same BP which states that any candidate who is only a placeholder for another candidate, is prima facie evidence that said candidate has no bona fide intention to run for the office for which the COC has been filed."
