congress_website_title = "AN ACT AMENDING SECTION 8 OF REPUBLIC ACT NO. 6713, ALSO KNOWN AS THE CODE OF CONDUCT AND ETHICAL STANDARDS FOR PUBLIC OFFICIALS AND EMPLOYEES PROVIDING FOR STATEMENTS AND DISCLOSURE"
congress_website_abstract = "Proposes to amend the law by requiring public officials to use a more detailed SALN form, which will require the declaration of the gifts received, financial transactions, and travels for the year. Aims for transparency to curb corruption by reflecting the true wealth of a government official; and further provides that for the purpose of computing the declarant´s net worth, the current fair market value of the real property indicated in the tax declaration of the real property concerned shall be used."
