congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 8293, OTHERWISE KNOWN AS THE INTELLECTUAL PROPERTY CODE OF THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to foster and protect Filipino creativity and innovation in a highly competitive borderless world through the protection of IP Rights, to secure quality, reliable and safe products, and genuine and authentic music, works of arts, and literature. Seeks to create an enabling environment that will promote and steer creativity, innovation, and development of large companies and the micro, small and medium enterprises, including start-ups; Intends to deter counterfeiting and piracy in the physical and online markets; Proposes to take down or block websites and online posts that advertise, sell or offer to sell, promote, and influence consumers to patronize counterfeit products; infringement or download pirated music, movies, and other materials."
