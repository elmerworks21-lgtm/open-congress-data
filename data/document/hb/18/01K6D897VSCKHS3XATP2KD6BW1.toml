congress_website_title = "AN ACT INSTITUTING REFORMS IN REAL PROPERTY VALUATION AND ASSESSMENT IN THE PHILIPPINES, REORGANIZING THE BUREAU OF LOCAL GOVERNMENT FINANCE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to promote the development and maintenance of just, equitable, impartial, and nationally consistent real property valuation by establishing appraisal standards, methods and procedures of property valuations and assessment. Intends to assist the Local Government Units in maximizing revenue collections, which in turn, will promote genuine local autonomy. Provides for the following provisions: a) powers and functions of the Bureau of Local Government Finance (BLGF); b) establishment of the Real Property Valuation Service; c) creation of a Central Consultative Committee; d) role of the BLGF Regional Offices; e) Regional Consultative Committee and its function; f) Valuation Standards and Market Values; g) development and maintenance of real property market database, and others."
