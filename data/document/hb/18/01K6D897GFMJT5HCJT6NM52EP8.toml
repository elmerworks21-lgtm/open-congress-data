congress_website_title = "AN ACT RIGHTSIZING THE NATIONAL GOVERNMENT TO IMPROVE PUBLIC SERVICE DELIVERY"
congress_website_abstract = "\\\"Rightsizing the National Government Act\\\" Seeks to authorize the President to rightsized the executive branch of the government in order to promote a more streamlined and efficient system of operations; and also grants the heads of the Legislature, the Judiciary, Constitutional Offices, LGUS, and SUCs the same authority within their authorized appropriations. Proposes the creation of the Committee on Rightsizing the National Government which shall oversee the implementation of this rationalization program aimed at streamlining national government agency operations thereby promoting a more efficient system of delivery of services. Intends to ensure a more sustainable pattern of public expenditure through a leaner yet more responsive and effective bureaucracy."
