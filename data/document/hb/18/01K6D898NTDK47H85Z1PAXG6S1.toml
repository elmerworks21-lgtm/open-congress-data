congress_website_title = "AN ACT CREATING THE CENTER FOR DISEASE CONTROL AND PREVENTION AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address the current challenges in achieving a harmonized approach for implementation of the International Health Regulations (IHR) which include policies and regulations implementation; and effective coordination between national and local levels and among sectors, and investments in institutional capacities. Proposes to establish a separate institution that specializes in handling surveillance in support of disease prevention and control, complemented with exemplary expertise, state-of-the-art facilities and laboratories and appropriate resources in order to build the capacity and level of readiness of the government to any public health emergency that could be chemical, biological, radioactive or nuclear in nature. Provides that the CDC shall be primarily responsible for conducting routine disease surveillance, investigating outbreaks and epidemics, and measuring the effectiveness of control and preventive health measures, monitoring infectious and non-infectious agents, as well as continuously updating pandemic preparedness planning and readiness with capacity to deploy personnel and allocate resources within the healthcare system in the event of a public health emergency."
