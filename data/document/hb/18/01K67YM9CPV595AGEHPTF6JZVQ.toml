congress_website_title = "AN ACT REDUCING WASTAGE BY DONATING AND RECYCLING EXCESS EDIBLE FOOD"
congress_website_abstract = "Aims to attain food security, end hunger, and promote the efficient use of the country´s food resources through food redistribution and recycling. Mandates the different government departments, agencies and LGUs headed by the National Nutrition Council (NNC) to undertake a National Zero-Food Waste Campaign to raise awareness on the impact of a food surplus and strategies to decrease wasted food starting at the household level and promote the food surplus reduction hierarchy and recommend means of reducing individual food waste. Provides steps to be followed in the distribution of edible food surplus; procedure on food-related business surplus reduction strategy; guidelines and standards on National Food Surplus Scheme; enumerates the responsibility of LGUs in Waste Reduction Strategy; imposes penalties for selling food donations and causing edible food surplus to be unfit for human consumption, among others."
