congress_website_title = "AN ACT EFFECTIVELY AUTHORIZING THE DEPARTMENT OF LABOR AND EMPLOYMENT TO BAN AND AVERT THE PRACTICE OF PRIVATE COMPANIES OF CONTRACTUALIZATION OF EMPLOYMENT AND ANY FORM OF FLEXIBILIZATION OF LABOR THEREBY ASSISTING SAID COMPANIES TOWARD A SHIFT TO REGULARIZATION OF EMPLOYMENT AND SECURITY OF TENURE FOR CONTRACTUAL WORKERS, LABORERS, AND EMPLOYEES"
congress_website_abstract = "Seeks to address the practice in any public agency or private company the idea of circumventing the law in order to withhold benefits, privileges, and other emoluments accruing to bona fide and eligible employees through the scheme of contractualization which is in principle a form of underemployment. Intends to ban contractualization (any predetermined period of labor time or work); the discretion to remove non-regulars without valid ground; and any form of flexible labor arrangement inimical to the workers and employees in private companies and veer toward the regularization of employees."
