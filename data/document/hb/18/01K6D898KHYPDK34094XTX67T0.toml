congress_website_title = "AN ACT MANDATING THE CREATION OF AN EXTENDED PRODUCER RESPONSIBILITY SCHEME TO ADDRESS LEAKAGE OF PLASTIC WASTE INTO THE ENVIRONMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to supplement RA9003 by addressing the problem of collection of plastic waste through the setting up of a system by which private companies that generate plastic will be responsible to collect an amount of plastic waste in proportion to the plastic generated by them, under the \\\"producer pays\\\" principle. Defines several terms among others such as \\\"Producer Responsibility Organization (PRO) which is a legal entity that shall undertake resource recovery of plastic wastes on behalf of producers, founded voluntarily by companies and assumes responsibility for the take-back of the equivalent amount of plastic packaging they put into the market."
