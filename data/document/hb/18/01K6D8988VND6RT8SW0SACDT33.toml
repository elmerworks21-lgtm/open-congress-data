congress_website_title = "AN ACT MANDATING THE BUREAU OF JAIL MANAGEMENT AND PENOLOGY TO EXERCISE SUPERVISION AND CONTROL OVER PROVINCIAL JAILS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Proposes to establish a national standard in the operational management of all jails in the country to attain uniformity and greater efficiency in the implementation of the plans and programs geared towards the effective rehabilitation of inmates. States that each provincial jail shall be headed by a provincial jail warden with a rank of superintendent, who must be a graduate of bachelor of laws or a holder of a master´s degree in management, public administration, public safety, criminology, penology, sociology, national security administration, defense studies or other related disciplines from a recognized institution of learning, and must have satisfactorily passed the necessary or career courses for such position"
