congress_website_title = "AN ACT PENALIZING THE UNJUSTIFIED INTERRUPTION OF SERVICE PROVIDED BY DISTRIBUTION UTILITIES AND TELECOMMUNICATIONS AND BROADCASTING ENTITIES"
congress_website_abstract = "Mandates water and electric distribution utilities and telecommunications or broadcasting entities to address all customer complaints within one day from the receipt of the complaint - failure to address such complaint will make the concerned entity liable for a penalty payable to the customer. Seeks to penalize these public utilities for service interruption that lasts for eight (8) hours or more (for prepaid services or services with fixed regular fees); Entitles the affected customer to a refund or deduction on the bill."
