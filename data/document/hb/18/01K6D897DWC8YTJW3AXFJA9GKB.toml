congress_website_title = "AN ACT SETTING THE MINIMUM PAID-UP CAPITAL AND LOCALLY PRODUCED STOCK INVENTORY REQUIREMENTS FOR FOREIGN RETAIL BUSINESS ENTERPRISES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8762, OTHERWISE KNOWN AS THE êžŒRETAIL TRADE LIBERALIZATION ACT OF 2000êžŒ"
congress_website_abstract = "Seeks to allow foreign-owned partnerships, associations and corporations to engage or invest in the retail trade business with a minimum paid-up capital of the equivalent in Phil. Peso of Two Hundred Thousand US Dollars (US$200,000.00). Proposes several salient features of the bill: a) removal of several requirements for foreign investors to acquire shares of stock of local retailers and for public offering of shares of stock by foreign-owned retail enterprises. b) permit only nationals from or juridical entities formed or incorporated in countries which allow the entry of Filipino retailers to engage in retail trade in the Phils.; and c) reduce the required locally manufactured products carried by foreign retailers from 30% to 10% of the aggregate cost of their stock inventory."
