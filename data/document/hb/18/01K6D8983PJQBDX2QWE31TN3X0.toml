congress_website_title = "AN ACT CREATING THE CENTER FOR WEST PHILIPPINE SEA STUDIES ATTACHED TO THE DEPARTMENT OF FOREIGN AFFAIRS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address the overlapping claims over the Spratly islands and the Scarborough Shoal by the Philippines, China, Vietnam, Brunei, Malaysia and Taiwan as these islands, reefs and coral outcrops are believed to be rich in oil and gas. Provides for the duties and responsibilities of the Center as regards to: a) Study of the basis of the claims under the UNCLOS, international law, local laws and historical data; b) Actions and measures in order to defend and prosecute our claims against claims of other neighboring countries; c) Plans on how to develop and fully utilize all the natural resources therein; d) Other duties and responsibilities that would strengthen our sovereignty and other claims, over the area; e) Other functions as may be directed by the President in relation to concerns over the West Phil. Sea."
