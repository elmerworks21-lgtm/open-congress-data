congress_website_title = "AN ACT INSTITUTIONALIZING THE WARNING, ALERT, AND RESPONSE NETWORK 911 ACT OF 2016 OR THE \\\"WARN 911\\\" AS THE NATIONWIDE EMERGENCY HOTLINE NUMBER AND PROVIDING PENALTY TO PRANK CALLS THEREOF"
congress_website_abstract = "Proposes to institutionalize the WARN hotline 911 Public Safety Answering Center (Call Center) in every Region, Province, City, Municipality and Barangay and identifies its major service responders such as: PNP, BFP, BJMP, PCG, PDEA, NBI, MMDA, PNRC, BSP, EARnet (Emergency Assistance and Response Network, Volunteer NGOs, affiliated civic sector groups, and other affiliated public safety volunteers. Seeks also to institutionalize: the WARN 911 Community-Based Volunteer Network constituting Volunteer Service Responders Network; and the WARN 911 Development Office where existing DILG PATROL \\\"117\\\" Development Group activated by the DILG under the PATROL \\\"117\\\" Commission is tasks to implement the WARN 911 Program. Declares that the WARN 911 Development Office shall coordinate with the NDRRMC and the corresponding LDRRMCs to address, prevent and mitigate a potential or existing disasters in the community; and guarantees the non-applicability of Republic Act No.4200 or the Anti-Wiretapping Act to a call made to WARN 911."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_18/HB04755.pdf"]

