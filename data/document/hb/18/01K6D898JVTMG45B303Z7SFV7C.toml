congress_website_title = "AN ACT PROVIDING FOR CREATIVE INDUSTRY WELFARE PROTECTION"
congress_website_abstract = "Refers \\\"Creative Worker\\\" to any person who performs work requiring invention, imagination, administration, coordination, originality, or talent in a recognized field of artistic or creative endeavor, such as but not limited to music, writing, acting, and the graphic arts, whether or not he or she is bound by any relations of employment or association. Enumerates the rights and privileges of an accredited creative worker such as social protection, including but not limited to S S S / G S I S, PagI B I G, PhilHealh; accident insurance which involve hazardous work; standard working hours which shall vary according to age; workplace safety and health hazards risk reduction; synchronized medical and safety precautionary measures; second / alternative careers; and artist´s village among others. Specifies the role of the National Commission for Culture and Arts ( N C C A ) which shall create a Creative Workers' Welfare Office to implement the provisions of this Act."
