congress_website_title = "AN ACT RIGHTSIZING THE NATIONAL GOVERNMENT TO IMPROVE PUBLIC SERVICE DELIVERY"
congress_website_abstract = "Intends to create a Committee on Rightsizing the National Government, provides for its powers and functions; submission to the President of the rightsized organizational structure of department agencies concerned and submission by the Department Secretaries/Agency Heads to the DBM the detailed organizations structure and staffing pattern. Proposes retirement benefits and separation incentives for personnel who may be affected by the NG's Rightsizing Program. Provides for prohibition on appointment or rehiring of personnel retired/separated from the service for a period of five (5) years, except as teaching staff in a state university or college, while consultancy services shall be governed by Sec.7 of R.A. No. 6713 (Code of Conduct and Ethical Standards for Public Officials and Employees)."
