congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1146, OTHERWISE KNOWN AS THE \\\"GOVERNMENT INSURANCE ACT OF 1977\\\" AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address the prolonged dependence of Filipino children to their parents, due to the passing of Republic Act No.10533 or better known as the K-12 Law which mandated Filipino children to stay in school for a longer period of time. Seeks to extend the coverage of P.D.No.1146, as amended, by extending the age of legal dependents from eighteen (18) to twenty-three (23), hence complementing the age when Filipino students normally finish their basic education and thus able to provide for themselves."
