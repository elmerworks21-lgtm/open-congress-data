congress_website_title = "AN ACT PROVIDING PROTECTION TO FREELANCERS, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to address the limited rights of freelancers to associate and form organizations leading to a lack of standards on contracts, fees and work metrics by giving them same treatment as any other traditional laborer. Aims to provide protection to freelancers by setting the standard requirements in terms of written contracts and payment of salaries between the employer and the freelancer. Defines several terms among others such as \\\"Freelance worker\\\" which refers to any natural person or a One Person Corporation registered with the S E C, or registered as a sole proprietorship with the D T I, or registered as self - employed with the B I R, that is hired or retained as an independent contractor by a hiring party to provide services in exchange for compensation."
