congress_website_title = "AN ACT ESTABLISHING PHILIPPINE eHEALTH SYSTEM AND SERVICES IN THE DELIVERY OF HEALTH SERVICES WITH THE USE OF INFORMATION AND COMMUNICATIONS TECHNOLOGY IN THE PHILIPPINES AND APPROPRIATING FUNDS THEREOF"
congress_website_abstract = "Proposes to address health and medical issues on access, availability, equity, patient rights, electronic medical data and health information exchange, among others through the use of appropriate ICT which is seen as a cost-efficient solution to come up with an integrated and comprehensive approach to health development. Includes provisions where medical consultations may be done online through an accredited eHealth provider and where medical records will be readily made available for research and policy-making purposes."
