congress_website_title = "AN ACT FURTHER AMENDING REPUBLIC ACT NO. 7581, OTHERWISE KNOWN AS THE “PRICE ACT”, AS AMENDED BY REPUBLIC ACT NO. 10623, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to amend the definition of basic necessities and introduce water containers, 3-in-1 coffee, tea, alcohol, hand sanitizers, disinfectants, PPEs, medical devices, among others, to form part of its definition; and prime commodities will also be amended to include toothbrush, toothpaste, shampoo, umbrellas, and raincoats, among others. Defines several new terminologies among others, states and declares specific provisions related to: EPIDEMIC/OUTBREAKS´, PANDEMIC, MEDICAL DEVICE, PERSONAL PROTECTIVE EQUIPMENT, PUBLIC HEALTH EMERGENCY, and SUGGESTED RETAIL PRICE."
