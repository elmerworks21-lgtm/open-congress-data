congress_website_title = "AN ACT TO INSTITUTIONALIZE MICRO-CREDIT FINANCING, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 3844, AS AMENDED, OTHERWISE KNOWN AS 'THE CODE OF AGRARIAN REFORM IN THE PHILIPPINES,' APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to grant loans to farmers´ cooperatives/associations to facilitate marketing and delivery and/or distribution of crops and acquisition of essential equipment, machinery, and tools. Seeks to reinforce Land Bank´s development mission by amending R.A. 3844, authorizing Land Bank to grant collateral-free loans ranging from P2,000.00 to P20,000.00 to private individuals or informal groups of persons to finance self-help ventures and small-scale business or crafts. Proposes to require Land Bank to allocate 25% of its loan portfolio to micro-lending operations to monitor the success of micro-financing as a poverty-reduction scheme."
