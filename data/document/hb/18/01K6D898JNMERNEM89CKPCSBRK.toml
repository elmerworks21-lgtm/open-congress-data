congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE LOCAL GOVERNMENT CALAMITY FUND, TO AUGMENT DISASTER RESPONSE AND RECOVERY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Proposes to mandate LGUs to contribute one percent (1%) of their total revenues taken from the Local Disaster Risk Reduction and Management Fund ( L D R R M F ) other than the amount set aside for the quick response fund; provided that an LGU who availed of the Fund shall contribute two percent (2%) of their L D R R M F for the next year; provided further, that the LGU shall revert to the one percent (1%) contribution if it did not avail of the Fund for the previous year."
