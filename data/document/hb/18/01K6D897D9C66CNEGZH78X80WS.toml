congress_website_title = "AN ACT STRENGTHENING PUBLIC-PRIVATE PARTNERSHIPS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Intends to further enhance and reinforce the provision of R.A. 6957, as amended to engender transparency in transactions, efficiency in the performance of project obligations, and putting additional thrust and impetus to the PPP program through a more robust cooperation between the public and private sectors. Defines PPP Project as infrastructure or development programs, projects, activities, facilities, and related services normally finance and undertaken by the public sector but which shall now be wholly or partly financed, designed, built, operated and maintained by the private sector."
