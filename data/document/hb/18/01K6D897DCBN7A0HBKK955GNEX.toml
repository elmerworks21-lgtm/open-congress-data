congress_website_title = "AN ACT PROVIDING FOR THE DELINEATION OF THE SPECIFIC FOREST LIMITS OF THE PUBLIC DOMAIN AND FOR OTHER PURPOSES"
congress_website_abstract = "\\\"Forestland Limits Act\\\" Seeks to ascertain the specific boundaries of forest and protected areas, with the objective of conserving and protecting these areas from further degradation. Proposes to establish a National Review and Evaluation Committee to conduct competent review, assessment, and validation of existing boundaries of forest lands, and shall recommend to congress such boundaries."
