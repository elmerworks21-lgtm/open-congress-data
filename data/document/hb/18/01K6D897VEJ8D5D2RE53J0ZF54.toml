congress_website_title = "AN ACT CREATING MALASAKIT CENTERS TO COMPLEMENT THE IMPLEMENTATION OF REPUBLIC ACT NO. 11223 OTHERWISE KNOWN AS THE êžŒUNIVERSAL HEALTH CARE ACTêžŒ BY REQUIRING PHILHEALTH TO ESTABLISH, OPERATE AND MAINTAIN MALASAKIT CENTERS IN ALL DOH, LGU, SUC AND DND HOSPITALS IN THE COUNTRY, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to complement the implementation of Universal Health Care Act (R.A. No. 11223) by establishing a Malasakit Center in each DOH, LGU, DND and SUC hospital which shall serve as a) processing center for all PhilHealth concerns regarding coverage and referral to the health care provider network; and b) one-stop shop medical assistance to cover out-of-pocket medical expenses of indigent and poor patients. Provides for the definition of Poor Patients as distinguished from Indigent Patients: Indigent Patients - patient who has no visible means of income, or whose income is insufficient for the subsistence of his/her family, as identified by the DSWD, LGU social worker or the medical social worker of the health facility. Poor Patients refers to those not classified as indigent but are otherwise considered poor or, with financial difficulty to access adequate medical care and/or pay hospital bills because of certain unavoidable circumstances as enumerated in this Act."
