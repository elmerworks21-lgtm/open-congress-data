congress_website_title = "AN ACT INSTITUTING THE MAGNA CARTA OF FILIPINO SEAFARERS"
congress_website_abstract = "Aims to recognize and uphold the rights and to promote the welfare of Filipino seafarers specifically the right to safe and secure workplace that complies with the safety standards, decent working and living conditions on board a ship, medical care, welfare measures and other forms of health and social protection, and fair terms and conditions of employment including salary commensurate to their rank, minimum number of working hours, and rest periods consistent with Philippine or international maritime conventions."
