congress_website_title = "AN ACT INSTITUTING A NATIONAL LAND USE AND MANAGEMENT POLICY, PROVIDING THE IMPLEMENTING MECHANISMS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to integrate and institutionalize people´s participation and gender mainstreaming in defining the framework and guiding principles of land allocation and utilization. Provides for the mandatory participation of the stakeholders in key decision making bodies on land use policy at all levels. Provides for the 1. Mechanism to harmonize conflicting land laws; 2. Adherence to the principle of sustainable development and just management, and utilization of natural resources; 3. Clear delineation of land use categories; 4. Protection of prime agricultural lands for food security and sufficiency; 5. Integration and institutionalizing people´s participation in land use planning and applies the combined bottom-up top-bottom approach in land use planning; 6. National Physical Framework Plan which shall define the national strategy and objective of the country´s urban, rural, and regional development; 7. Creation of the National Spatial Database Information and Mapping Inter-Agency Support System; and 8. Final determination and ground delineation of the country´s permanent forest line and completion the Geohazard Mapping Program to effectively provide adequate and up to date information necessary for land use planning."
