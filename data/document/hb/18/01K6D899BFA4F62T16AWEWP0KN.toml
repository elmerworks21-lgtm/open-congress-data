congress_website_title = "AN ACT AMENDING ARTICLES 333 AND 344, AND REPEALING ARTICLE 334, OF THE REVISED PENAL CODE, ELIMINATING GENDER BIAS IN ADULTERY AND CONCUBINAGE"
congress_website_abstract = "“Art. 333. MARITAL INFIDELITY. [Who are guilty of adultery] - MARITAL INFIDELITY [ADULTERY] is committed by any married PERSON (woman)who shall have sexual RELATIONS [intercourse] with a PERSON [man] OTHER THAN HIS OR her SPOUSE [husband], and by the SEXUAL PARTNER [man] of the MARRIED PERSON knowing the LATTER [her] to be married, even if the marriage be subsequently declared void”. “MARITAL INFIDELITY [Adultery] shall be punished by prision correctional in its medium and maximum periods. Cite several cases when a person accused of marital infidelity be exempt from criminal liability or when the penalty next lower in degree than that provided in the law shall be imposed."
