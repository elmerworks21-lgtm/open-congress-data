congress_website_title = "AN ACT CREATING THE DEPARTMENT OF DISASTER RESILIENCE, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to designate and empower the DDR as the lead agency for the implementation of 1) vulnerability and risk reduction policies, programs and projects; 2) rehabilitation and reconstruction; and 3) assess collective progress towards achieving purpose of Agreement and reconstruction and its long-term goals, in a comprehensive sustainable manner, considering prevention, mitigation, anticipatory adaptation measures and support, in the light of equity, capacity building, best available science, technology transfer and other development. Aims to build and improve upon the previous law, RA10121 that created the NDRRMC's where the DDR will be the body with sufficient power, mandate, and resources to implement, integrate and mainstream disaster risk and vulnerability reduction and climate change adaptation and mitigation into local and national processes. Proposes several transfer of powers, functions, funds and others, and attachment of several offices/ agencies to the Department, particularly the Climate Change Office of the Climate Change Commission; the Philippine Atmospheric, Geophysical and Astronomical Services Administration (PAGASA; Philippine Institute of Volcanology and Seismology (PHILVOLCS)."
