congress_website_title = "AN ACT PROVIDING FOR THE URBAN AND COUNTRYSIDE GREENING IN THE PHILIPPINES"
congress_website_abstract = "Proposes to make it mandatory, the planting of trees in urban and countryside parks, as well as in school grounds, vacant lots, and other urbanized sites all over the country to supplement our National Greening Program. Incorporates provisions regarding National/Regional Greening Committees; specific functions of DENR, LGUs, DOJ, DPWH, DA, DOT, DILG, and DepEd; and standard requirements for tree planting along national roads, among others."
