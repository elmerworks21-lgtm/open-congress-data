congress_website_title = "AN ACT ABSOLUTELY PROHIBITING THE USE OF MINES, BOOBY-TRAPS AND OTHER DEVICES, PROVIDING FOR A TOTAL BAN ON ANTI-PERSONNEL LANDMINES AND CREATING FOR THIS PURPOSE A COORDINATING COMMITTEE ON LANDMINES"
congress_website_abstract = "Provides restrictions and prohibitions 1.) on the use of mines, booby-traps or other devices; 2.) to develop, produce, acquire, retain or transfer to anyone anti-personnel mines; and 3.) to assist, encourage or induce, anyone to engage in any activity prohibited under this Act, with corresponding penalties thereof. Mandates the Armed Forces of the Philippines to effect the corresponding charges in its military doctrine, issue military instructions and operating procedures in arms development, production, acquisition and transfer, receive training to comply with the provisions of this Act, develop and use alternatives to anti-personnel mines for perimeter defense of its detachments, and ensure that reacquisition of claymore mines are usable and used in command-detonated mode only."
