congress_website_title = "AN ACT PUNISHING THE WILLFUL FAILURE TO PAY CHILD SUPPORT"
congress_website_abstract = "Proposes to recognize Section 194 of the Family Code of the Philippines which defines SUPPORT as that “comprises everything indispensable for sustenance, dwelling, clothing, medical assistance, education, and transportation, in keeping with the financial capacity of the family.” Intends to give importance to the right of each child to be supported by their parents until such time that they will become self-sustaining. Seeks to penalize the willful neglect of parent, child support that is adjudged by a court of justice in a decision, decree, or in any court order."
