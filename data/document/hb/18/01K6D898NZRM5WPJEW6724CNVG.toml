congress_website_title = "AN ACT AMENDING SECTION 386 OF REPUBLIC ACT NO. 7160 OR THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Aims to address the dilemma of barangays with high population density where local officials experience more difficulties in reaching out to their constituents. Intends to provide fast and efficient delivery of essential services and orderly governance especially in times of disasters and emergency situations, such as the COVID-19 pandemic, where barangay officials are expected to be the first responders. Seeks to provide a limit on the population of a barangay in urban areas to 15,000 inhabitants as certified by the Philippines Statistics Authority, and all existing barangays with a population exceeding 15,000 inhabitants shall be reapportioned to create additional barangays."
