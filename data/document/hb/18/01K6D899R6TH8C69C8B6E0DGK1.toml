congress_website_title = "AN ACT PROHIBITING THE EXPORTATION OF BLACK SAND AND ITS DERIVATIVES IN THEIR RAW FORM"
congress_website_abstract = "Prohibits the exportation of black sand and its derivatives in their raw form to other countries and requires all black sand mining or trading entities to only export processed products or raw materials that have undergone initial or advanced processing within the country. Penalizes any person or public officer who violates the prohibition of this Act with imprisonment of at least six (6) years and a fine of at least Five million pesos (P5,000,000.00) depending on the volume of extracted black sand."
