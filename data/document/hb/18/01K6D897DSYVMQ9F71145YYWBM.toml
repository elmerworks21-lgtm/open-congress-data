congress_website_title = "AN ACT PROVIDING A COMPREHENSIVE RENAL REPLACEMENT THERAPY (RRT) FOR PATIENTS WITH END STAGE RENAL DISEASE IN NATIONAL, REGIONAL, AND PROVINCIAL GOVERNMENT HOSPITALS, INCREASING THE PHILHEALTH PACKAGE RATE FOR RENAL REPLACEMENT THERAPY OF MEMBERS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Mandates all national, provincial, and regional government hospitals, including all stand alone dialysis facilities to establish, operate and maintain a dialysis service facility, including peritoneal dialysis and hemodialysis, in their hospital. Establishes a Chronic Kidney Disease (CKD) prevention strategies and health promotion activities which include: advocacy activities targeting relatives of dialysis patients who are at high risk for developing CKD themselves, the provision of instructional materials and regular educational activities on the common symptoms of kidney disease, common tests to diagnose kidney disease, causes of kidney failure, and advisories on the appropriate protocols for the diagnostic evaluation of possible kidney disease."
