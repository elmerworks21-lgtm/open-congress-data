congress_website_title = "AN ACT TO PROVIDE FOR UNIFORM WARNINGS ON PERSONAL PROTECTIVE EQUIPMENT FOR OCCUPATIONAL USE"
congress_website_abstract = "Intends to enhance understanding of the proper use and limits of PPEs through safety warning and health standards to reduce injuries and illnesses resulting from their faulty use. Prescribes certain standard warnings for the manufacturer or other seller which shall be communicated to the employer using PPEs, and for the employer to communicate to each employee using the same; and to train, educate and instruct such employees as regards to PPEs proper use, warning vis-Ã -vis workplace and work environment; and consequences of failing to observe each warning."
