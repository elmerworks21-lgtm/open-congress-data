congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8972, OTHERWISE KNOWN AS THE SOLO PARENTS´ WELFARE ACT OF 2000, BY PROVIDING FOR ADDITIONAL BENEFITS AND PENAL PROVISION FOR VIOLATIONS OF THE ACT"
congress_website_abstract = "Provides additional categories to the definition of \\\"Solo Parent\\\" as follows: \\\"PARENT LEFT SOLO OR ALONE FOR AT LEAST ONE (1) YEAR WITH THE RESPONSIBILITY OF PARENTHOOD DUE TO THE DISSOLUTION OF MARRIAGE BY A LEGALLY OBTAINED DIVORCE.\\\" \\\"A SINGLE/ANNULLED/DIVORCED PARENT WHO MAY HAVE LATER LEGALLY MARRIED BUT WHOSE CHILD IS NOT RECEIVING FINANCIAL SUPPORT FROM THE OTHER PARENT, OR IS NOT LEGALLY ADOPTED BY THE CURRENT SPOUSE.\\\" Aims to provide necessary aid and relief to the solo parents to help enable them to provide their children with quality education, adequate and proper health care services, affordable and quality food, clothing, and medicines. Proposes to amend the existing Solo Parents Welfare Act not only to address their needs by way of providing for additional benefits but also to penalize those who violate the provisions of the Act."
