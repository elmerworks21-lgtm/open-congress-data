congress_website_title = "AN ACT PROVIDING FOR A NEW PASSPORT LAW, REPEALING FOR THE PURPOSE REPUBLIC ACT NO. 8239, OTHERWISE KNOWN AS THE “PHILIPPINE PASSPORT ACT OF 1996”"
congress_website_abstract = "Aims to update and reflect current laws that affect the process of issuing passports. Simplifies the passport documentation requirements by requiring the submission of specific documents; revises the list of persons entitled to diplomatic and official passports; provides for the issuance of passports with 5 or 10 year validity; imposes penalties against the persons who use or conspire and connive with other to use fraudulent passports."
