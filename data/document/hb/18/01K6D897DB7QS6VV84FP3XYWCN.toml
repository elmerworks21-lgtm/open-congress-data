congress_website_title = "AN ACT PROHIBITING DISCRIMINATION ON THE BASIS OF SEXUAL ORIENTATION OR GENDER IDENTITY OR EXPRESSION (SOGIE) AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "\\\"SOGIE Equality Act\\\" Declares the state's recognition of the fundamental right of every person regardless of sex, age, class status, ethnicity, color, disability, religious and political beliefs, sexual orientation, or gender identity or expression to be free from any form of discrimination. Intensifies its efforts to fulfill its duties under the Equal Protection Clause and Bill of Rights provision of the Philippine constitution, and international and domestic laws to respect, protect, and fulfill the rights and dignity of every individual. Prohibits any distinction, exclusion, restriction, or preference which is based on any ground such as sex, sexual orientation, gender identity or expression, and which has the purpose or effect of nullifying or impairing the recognition, access to, enjoyment, or exercise by all persons on an equal footing of all rights and freedoms. Provides penalties for violations of this Act"
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_18/HB00095.pdf"]
