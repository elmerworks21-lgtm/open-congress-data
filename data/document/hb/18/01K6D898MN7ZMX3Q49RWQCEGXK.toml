congress_website_title = "AN ACT TO ENHANCE THE REGIONAL DEVELOPMENT COUNCILS BY CREATING A REGIONAL DEVELOPMENT ADMINISTRATION TO STRENGTHEN THE POLICY-MAKING CAPABILITIES OF NATIONAL GOVERNMENT AGENCIES (NGAs) AND LOCAL GOVERNMENT UNITS (LGUs) APPROPRIATING FUNDS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to make RDCs to be more responsive to the needs of their respective regions which shall ensure that all economic and social gains as well as investment opportunities are evenly distributed in al cities and municipalities in areas where they are needed the most. Proposes that the creation of RDA which shall be attached to NEDA shall have the lead mandate to establish priorities and objectives as well as direct and implement relevant programs and projects in the regional level in line with the government´s socio-economic development programs. Provides that the NEDA regional office shall be the Secretariat of the RDC which shall manage the technical, administrative and financial operations of the RDC."
