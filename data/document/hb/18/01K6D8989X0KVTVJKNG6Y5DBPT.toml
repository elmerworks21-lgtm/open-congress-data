congress_website_title = "AN ACT PROVIDING FOR DIRECT FINANCIAL ASSISTANCE TO BACKYARD LIVESTOCK RAISERS AFFECTED BY MAJOR ANIMAL DISEASE EPIDEMIC OR TRANSBOUNDARY ANIMAL DISEASES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 1578, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to address the limited government engagement in the local livestock industry which inhibits its ability to provide swift and timely interventions during emergency situations. Intends to adjust the rate of pre-slaughter fees by amending R.A.No.1578, thereby increasing the potential collection of necessary funds for the implementation of other programs and projects to improve the productivity of the livestock industry and to protect the welfare of backyard livestock raisers: a) For cattle, carabaos, buffaloes, horses, mules... (bovine family) - P120.0 per head; b) For swine - P80.00 per head; and c) For sheep, goats and deer - P 40.00 per head."
