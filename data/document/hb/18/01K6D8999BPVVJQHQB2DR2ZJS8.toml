congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 386, OTHERWISE KNOWN AS THE CIVIL CODE, ARTICLE 1723, ON THE LIABILITY OF ENGINEERS, ARCHITECTS OR CONTRACTORS ARISING FROM NON-OBSERVANCE OF PLANS AND SPECIFICATIONS OR THE USE OF MATERIALS OF INFERIOR QUALITY"
congress_website_abstract = "Seeks to expand its coverage with proposed amendments of covering all kinds of infrastructure projects and the liability for damages shall not arise not only in case the structure should collapse, but also where the infrastructure undertaking should require major repair by reason of defective construction. Proposes to hold the contractors directly responsible for defective construction undertaken by sub-contractors. The sub-contractors shall merely assume subsidiary liability to encourage contractors to be more cautious in their selection of sub-contractors."
