congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8762, OTHERWISE KNOWN AS THE RETAIL TRADE LIBERALIZATION ACT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to minimize barriers to foreign investment as regards to equity and capitalization requirements stated in the Trade Liberalization Law to create a better and a business and consumer friendly environment in the Philippines. Proposes amendments to Sec.5 of R.A.No.8762 to read as follows: \\\"Sec.5. Foreign Equity Participation. - Foreign-owned partnerships, associations and corporations . . . may, upon registration with the SEC and the DTI, or in case of foreign owned single proprietorships, with the DTI, engage or invest in the retail trade business WITH A MINIMUM PAID-UP CAPITAL OF THE EQUIVALENT IN PHILIPPINE PESO OF TWO HUNDRED THOUSAND US DOLLARS (US$200,000.00)."
