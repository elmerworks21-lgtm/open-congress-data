congress_website_title = "AN ACT MODIFYING THE SALARY SCHEDULE FOR CIVILIAN GOVERNMENT PERSONNEL"
congress_website_abstract = "Aims to revise or update the existing Compensation and Position Classification System (CPCS) to conform with a compensation structure that is highly competitive with the private sector; and raising of the minimum salary for Salary Grade 1 to ELEVEN THOUSAND SIX HUNDRED FIFTY-SIX PESOS (P11,656.00). Proposes that the modified Salary Schedule shall apply to all civilian personnel regardless of appointment status, whether regular, contractual or casual; appointive or elective; and on full- time or part-time basis."
