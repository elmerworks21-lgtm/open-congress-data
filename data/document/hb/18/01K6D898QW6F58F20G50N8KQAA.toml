congress_website_title = "AN ACT AMENDING SECTION 3 OF REPUBLIC ACT NO. 7797, OTHERWISE KNOWN AS \\\"AN ACT TO LENGTHEN THE SCHOOL CALENDAR FROM TWO HUNDRED (200) DAYS TO NOT MORE THAN TWO HUNDRED TWENTY (220) CLASS DAYS\\\""
congress_website_abstract = "Intends to address the UNESCO declarations that the COVID-19 Pandemic is no longer just a public health crisis, but also a major education crisis because millions of learners in the country have been negatively affected by the locked down. Seeks to remedy the situation by amending the law wherein the President, upon the recommendation of the Secretary of the Department of Education, will be given the flexibility to adjust the start of the date of the school year in the event of a declaration of a state of emergency, state of calamity, or similar occurrence."
