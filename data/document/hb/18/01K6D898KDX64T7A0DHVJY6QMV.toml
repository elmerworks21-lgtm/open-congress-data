congress_website_title = "AN ACT MANDATING ELECTION SPENDING LIMITS, DETERMINING ELECTION CONTRIBUTION LIMITS, AND ADJUSTING THEM PERIODICALLY BASED ON THE CURRENT INFLATION RATE AND THE CONSUMER PRICE INDEX"
congress_website_abstract = "Mandates that COMELEC, in coordination with NEDA and PSA to periodically adjust the amount provided by law as the maximum allowable spending limits of any candidate or political party based on the current inflation rate and the consumer price index; promulgate the maximum election spending and contributions limits and for every election not less than three (3) months from the start of every election campaign period; and issue the rules and regulations necessary to implement this Act."
