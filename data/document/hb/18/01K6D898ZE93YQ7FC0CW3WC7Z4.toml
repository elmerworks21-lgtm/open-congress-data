congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO.11332, OTHERWISE KNOWN AS THE \"MANDATORY REPORTING OF NOTIFIABLE DISEASES AND HEALTH EVENTS OF PUBLIC HEALTH CONCERN ACT\""
congress_website_abstract = "Seeks to augment the law to make this more effective in addressing future outbreaks by: (1) establishing sub-national laboratories in all DOH-run hospitals; (2) establishment of hotlines and other forms of access for reporting of diseases and public health events; (3) requiring the DOH to issue clear guidelines on the systematic reporting and recording of such diseases and events of public health concern; and (4) requiring all public and private institutions to provide the necessary information in disease surveillance and other epidemiologic investigations."
