congress_website_title = "AN ACT REGULATING THE AIRING OF ADVERTISEMENTS OF SUGAR SWEETENED BEVERAGES AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Seeks regulation in all media platforms such as radio, television and cable television, film and movies, online social media, electronic, print or whatever form of mass media, including outdoor advertisements, but not limited to signs and billboards. Defines \\\"Sugar Sweetened Beverages ( S S B )\\\" to non-alcoholic beverages of any constitution (liquid, powder, or concentrates) that are pre-packaged and sealed in accordance with the F D A standards, that contain caloric and/or non-caloric sweeteners added by the manufacturers, and shall include, but not limited to the following: sweetened juice drinks; sweetened tea; all carbonated beverages; flavored water; energy and sports drinks; other powdered drinks not classified as milk, juice, tea, and coffee; cereal and grain beverages; and other non-alcoholic beverages that contain added sugar."
