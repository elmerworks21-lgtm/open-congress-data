congress_website_title = "AN ACT FURTHER AMENDING ARTICLES 29, 97, 98 AND 99 OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "Proposes to amend the Good Conduct Time Allowance (GCTA) Law in order to put a stop to whatever grave abuse of discretion in its implementation which is contrary to the good intention impelled by the reformatory or rehabilitative spirit of the modern penal system, rather than by purely punitive nature. Provides for other exemptions of cases as enumerated hereunder, when the offenders or accused who have undergone preventive imprisonment shall be credited in the service of their sentence consisting of deprivation of liberty, with the full time during which they have undergone preventive imprisonment: a.) when they are habitual delinquents; b.) when they are escapees; and 3.) when they have been charged with and convicted of heinous crimes as specified in this Act."
