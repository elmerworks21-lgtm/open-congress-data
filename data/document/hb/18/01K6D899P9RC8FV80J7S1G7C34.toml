congress_website_title = "AN ACT GRANTING HAZARD PAY TO WORKERS IN CRITICAL INDUSTRIES DURING A STATE OF CALAMITY OR EMERGENCY OR PUBLIC HEALTH EMERGENCY"
congress_website_abstract = "Proposes to cover all workers in critical industries in the private sector such as, but not limited to health-related establishments; morgues and mortuaries; financial institutions providing money transfers; food and medicines providers; logistics and warehouse establishment; telecommunications companies; mass media personnel delivering news; electric generation, transmission, and distribution companies; gasoline stations; oil companies (tanker drivers); water-related services; garbage collectors, Phil. Capital market workers; hotels; mass public transportation companies; civil aviation-related companies; and other establishments may be considered critical in light of the nature of the state of calamity emergency or public health concern."
