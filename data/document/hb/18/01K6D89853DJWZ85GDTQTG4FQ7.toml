congress_website_title = "AN ACT REVERTING FISHPONDS WHICH HAVE BEEN UNUTILIZED OR ABANDONED FOR A PERIOD OF THREE (3) YEARS TO FORESTLANDS, AMENDING FOR THE PURPOSE SECTION 43 OF PRESIDENTIAL DECREE NO. 705 OTHERWISE KNOWN AS THE REVISED FORESTRY REFORM CODE OF THE PHILIPPINES"
congress_website_abstract = "Seeks to shorten the period to revert fishponds which have been unutilized and abandoned to forest lands from five (5) years to three (3) years and shall be immediately rehabilitated and reforested. Mandates the Department of Agriculture and Department of Environment and Natural Resources to jointly set guidelines in determining abandoned, undeveloped or underutilized fishponds covered by FLAs which shall be reverted into forestlands and rehabilitated."
