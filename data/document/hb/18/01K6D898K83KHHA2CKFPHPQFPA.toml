congress_website_title = "AN ACT PROVIDING FOR THE FULL AND EFFECTIVE IMPLEMENTATION AND ENFORCEMENT OF INTERNATIONAL MARITIME INSTRUMENTS OF WHICH THE PHILIPPINES IS A STATE PARTY"
congress_website_abstract = "Refers \\\"International Maritime Instruments\\\" to all conventions, codes recommendations, procedures, guidelines, or other similar instruments pertaining to safety of life at sea, prevention of pollution from ships, load lines, tonnage measurements of ships, and regulations for preventing collisions at sea, of which the Philippines is a State Party, including International Conventions as provided in this Act. Enumerates the powers and functions of the DOTr and the PCG; Mandates MARINA to recommend to the DFA the adoption of international maritime instruments which the Phils. is not yet a party, so that the appropriate recommendation can be made; and that in the case of any subsequent amendment to any technical annex of any existing international convention or treaty to which the Phils. is already a party and which is deemed accepted by the State Parties to the convention after the lapse of the specified time, the MARINA is empowered and authorized to amend and revise its rules and regulations to conform with the amendments to the relevant convention or treaty. Provides for coordination among regulatory agencies as follows: Philippine Atmospheric, Geophysical and Astronomical Services Administration (PAGASA) under the DOST, and the National Mapping and Resource Information Authority (NAMRIA) under the DENR, among others."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_18/HB06217.pdf"]
