congress_website_title = "AN ACT AMENDING SECTIONS 443, 454, AND 463 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE \\\"LOCAL GOVERNMENT CODE OF 1991\\\""
congress_website_abstract = "Intends to address the need to fortify the tourism safeguards provided by the \\\"Tourism Act of 2009 (R.A.No.9593) in order to resolve the issue of the lack of permanent and dedicated tourism officers for every local government unit in which tourism is a significant industry. Proposes to amend the pertinent provisions of the Local Government Code of 1991 and ensure that permanent positions for tourism officers would serve as an important factor in increasing the influx of tourists in said localities and thus strengthen and promote the growth of tourism industry of the country."
