congress_website_title = "AN ACT EXPANDING THE GROUNDS FOR LEGAL SEPARATION, AMENDING FOR THE PURPOSE ARTICLE 55 OF THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "Proposes to amend Art.55 (1), (5) and (6) under the grounds for legal separation, whereas Art.55(1) is to consider not only the number of times violence is perpetrated but also the severity or gravity of the physical or sexual violence committed; while Art. 55 (5) and (6) are additional grounds such as excessive gambling and bisexuality of the respondents."
