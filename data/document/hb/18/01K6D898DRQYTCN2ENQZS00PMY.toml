congress_website_title = "AN ACT PUNISHING MILITARY COMMANDERS OR SUPERIORS FOR CRIMES OR OFFENSES COMMITTED BY THEIR SUBORDINATES UNDER THE PRINCIPLE OF COMMAND RESPONSIBILITY"
congress_website_abstract = "Seeks to address the alleged state of human rights in the country today which is impunity, in relation to the administration's campaign against drugs which involves numerous cases of extrajudicial killings and enforced disappearance. Defines Command Responsibility as the responsibility of a military commander or superior for a crime or offense committed by a subordinate under his or her effective command and control if the commander or superior knew or under the circumstances should have known that the subordinate committed, was committing or about to commit such crime or offense and he or she failed to take all the necessary and reasonable measures to prevent or repress such acts, or submit the matter to competent authorities for investigation and prosecution, as the case may be."
