congress_website_title = "AN ACT PROHIBITING THE CONVERSION OF IRRIGATED AND IRRIGABLE AGRICULTURAL LANDS FOR NON-AGRICULTURAL USES, AMENDING FOR THE PURPOSE SECTION 20 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Proposes a ban on the irresponsible and indiscriminate land conversion on all irrigated and irrigable lands into residential, commercial, industrial and other zones, in order to promote food security to ensure the availability, adequacy and accessibility of food supplies to every Filipino. Intends to amend Sec.20 of the Local Government Code by requiring additional approval from the DA, DAR, DENR AND LGUs before a land conversion application can be granted."
