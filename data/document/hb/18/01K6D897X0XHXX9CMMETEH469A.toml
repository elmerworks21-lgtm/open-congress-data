congress_website_title = "AN ACT PROVIDING PROTECTION TO CONSUMERS BY EXPANDING THE DEFINITION OF BASIC NECESSITIES AND PRIME COMMODITIES, AMENDING, FOR THE PURPOSE REPUBLIC ACT NO. 7581, OTHERWISE KNOWN AS THE PRICE ACT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to include “new” goods that by virtue of their mass and necessary usage qualify as “Basic Necessities: such as POTABLE WATER IN CONTAINERS, NOODLES, KEROSENE, AND LIQUEFIED PETROLEUM GAS, and such other TYPES AND BRANDS OF GOODS which may be included BY MOTU PROPIO ACTION OF THE CONCERNED AGENCY OF THE PRICE COORDINATING COUNCIL; and any type or brand previously excluded in the definition may be reinstated in times of disaster, calamities, and other emergency crisis. Seeks to exclude fresh fruits and noodles from the definition of “Prime Commodities” and to include such other TYPES AND BRANDS OF GOODS which may be included BY MOTU PROPIO ACTION OF THE CONCERNED AGENCY OF THE PRICE COORDINATING COUNCIL, and any type or brand previously excluded in the definition may be reinstated in times of disaster, calamities, and other emergency crisis."
