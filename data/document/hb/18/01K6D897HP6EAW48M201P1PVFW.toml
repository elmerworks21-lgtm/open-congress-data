congress_website_title = "AN ACT CREATING THE DEBT MANAGEMENT BOARD, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to centralize the myriad of functions and responsibilities distributed among various agencies concerning foreign loans to one single agency for the State to have a clearer picture of its indebtedness procedures and stature. States that the Board, which shall be a Cabinet-level agency, shall be the primary agency to integrate and coordinate the country´s debt management system: including debt recording and inventory, debt monitoring and analysis, risk management, debt planning; debt service payments; advice on debt negotiations and borrowings, and formulation of debt policies and strategies."
