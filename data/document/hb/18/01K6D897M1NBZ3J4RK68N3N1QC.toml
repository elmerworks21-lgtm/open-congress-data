congress_website_title = "AN ACT ESTABLISHING A NATIONAL CANCER CENTER TO BE KNOWN AS THE NATIONAL CANCER CENTER OF THE PHILIPPINES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Seeks to establish and maintain a cancer center that shall specialize in cancer treatment, enhance the noble undertaking of cancer research, provide state-of-the art training of medical and technical personnel, develop programs for the prevention and early detection of cancer and attract the best cancer specialists in the country to render service for indigent patients at affordable rates. Intends to provide financial and material support towards the establishment and maintenance of a cancer center for the welfare and benefit of the Filipino people."
