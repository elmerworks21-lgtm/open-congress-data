congress_website_title = "AN ACT ESTABLISHING ENVIRONMENTAL TAXATION FOR THE PROTECTION OF PHILIPPINE NATURAL RESOURCES"
congress_website_abstract = "Seeks to impose environmental taxes (green taxes) on all kinds of pollutants with natural resources such as air, water, biodiversity, energy, land, and other environmental conservation. Proposes several taxes as follows: registration taxes on new and second-hand vehicles and congestion tax on heavy-traffic roads identified by the Metro Manila Dev´t Authority (MMDA); taxes on transport and heating fuels; air pollution tax from stationary sources emitting excessive carbon dioxide and ticket tax on the carriage of passengers on board fixed-wing and rotary-wing aircraft; taxes on water resources extraction, water supply, and wastewater; taxes on biodiversity services such as conservation tax, fishery management tax, and non-compliance tax; taxes on waste management such as landfill, incineration, and pay-as-you-throw schemes; taxes on the exploration of natural resources such as signature bonus tax and aggregate tax; and taxes on the use of chemicals in agriculture."
