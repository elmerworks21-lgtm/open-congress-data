congress_website_title = "AN ACT PROMOTING TRANSPARENT GOVERNANCE AND INSTITUTING ANTI-CORRUPTION MECHANISMS IN THE OPERATION OF BANKS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 1405, OTHERWISE KNOWN AS “THE SECRECY OF BANK DEPOSITS LAW”"
congress_website_abstract = "Seeks to exempt the Bangko Sentral ng Pilipinas (BSP), in the exercise of its supervisory powers, to inquire or examine into deposits provided that, upon determination by the Monetary Board, there is a reasonable ground to believe that fraud, serious irregularity, or unlawful activity has been or is being committed by the stockholder, owner, director, trustee, officer or employee of an entity, and that it is necessary to look into the deposit to establish such fraud, irregularity, or unlawful activity. Limits the results of the inquiry or examination conducted by the BSP for its exclusive use and shall not be made available to any person or entity, except to the Securities and Exchange Commission, Philippine Deposit Insurance corporation, anti-Money Laundering Council, Department of Justice, and the courts that shall be necessary to prevent or prosecute any offense or crime. Makes it unlawful for any person to use this Act for persecution or harassment or as instrument to hamper competition in trade and commerce."
