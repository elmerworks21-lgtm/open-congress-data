congress_website_title = "AN ACT PENALIZING THE CONVERSION OR CAUSING THE CONVERSION OF IRRIGATED AND IRRIGABLE LANDS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6657, AS AMENDED, OTHERWISE KNOWN AS THE COMPREHENSIVE AGRARIAN REFORM LAW OF 1998"
congress_website_abstract = "Aims to protect and maintain the prime agricultural lands together with irrigated and irrigable lands by penalizing any person who knowingly or wilfully violates the conversion or causing the conversion of irrigated and irrigable lands. Penalizes any person who violates the provisions of this Act by imprisonment of not less than one (1) month to not more than three (3) years or a fine of not less than one thousand pesos (P1,000.00) and not more than Fifteen thousand pesos (P15,000.00), or both, at the discretion of the court: Provided, that any person who violates Section 73, subparagraphs (c), 9(d), (e), [and] (i), AND (J) of Republic Act No. 6657, as amended shall be penalized by imprisonment of six (6) years and one (1) day to twelve (12) years or a fine of not less than Two hundred thousand pesos (P200,000.00) and not more than One million pesos (P1,000,000.00), or both, at the discretion of the court."
