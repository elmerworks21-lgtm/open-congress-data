congress_website_title = "AN ACT TO REFORM THE BUDGET PROCESS BY ENFORCING GREATER ACCOUNTABILITY IN PUBLIC FINANCIAL MANAGEMENT (PFM), PROMOTING FISCAL SUSTAINABILITY, STRENGTHENING CONGRESS´ POWER OF THE PURSE, INSTITUTING AN INTEGRATED PFM SYSTEM, AND INCREASING BUDGET TRANSPARENCY AND PARTICIPATION"
congress_website_abstract = "Intends to restructure and redesign the existing outmoded government accounting system and introduces reforms in the accounting service for an effective tool for managing government offices. Proposes the following provisions among others: a) Institution of internal control systems as a primary responsibility of heads of agencies, government corporations and local government units; b) Vesting responsibility in the Executive Branch for the accounting function; c) Delimitation of the accounting jurisdiction of the COA; d) Creation of a Central Government Accounting Authority; e) Adoption of the \\\"accrual basis\\\" of accounting to the \\\"obligation\\\" and \\\"cash accounting\\\"'"
