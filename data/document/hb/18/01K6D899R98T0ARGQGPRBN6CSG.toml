congress_website_title = "AN ACT PROVIDING FOR AN OPT-IN MECHANISM FOR TELEPHONE AND MOBILE SUBSCRIBERS, PROTECTING SUCH SUBSCRIBERS FROM ELECTRONIC THREATS THROUGH THE MISUSE OF DIGITAL TECHNOLOGY, AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "States that an “unsolicited call or text or spam” refers to any one of the following: 1) not initiated by the recipient of the call or message containing commercial promotions or advertisements and did not opt-in to receive the same; 2) causes an installation of programs on the subscriber´s device without consent; 3) contains false or misleading electronic representations redirecting to websites, chat platforms, etc.,and 4) triggers the collection of personal information by accessing an electronic device illegally. Proposes that: as a default, all subscribers are automatically opted out of receiving unsolicited calls or texts; only subscriber who has given prior consent or has specifically opted-in shall receive commercial or promotional advertisements; and a subscriber who has opted-in may choose to opt-out any time."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_18/HB10637.pdf"]

