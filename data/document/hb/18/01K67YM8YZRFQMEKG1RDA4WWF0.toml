congress_website_title = "AN ACT INSTITUTING REFORMS IN REAL PROPERTY VALUATION AND ASSESSMENT IN THE PHILIPPINES, REORGANIZING THE BUREAU OF LOCAL GOVERNMENT FINANCE, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to establish and maintain standards to govern the valuation of real property based on internationally accepted valuation standards, concepts, principles, and practices; provide a comprehensive and up-to-date electronic database of all real property transactions; and ensure transparency in real property transactions to protect the public and develop confidence in the valuation system. Provides the Bureau of Local Government Finance (BLGF) the task to develop and implement uniform valuation standards which shall be used by all appraisers and assessors in the local government units and other concerned parties in appraising or valuing lands, buildings, machinery and other real properties for taxation and other purposes. Mandates that all real properties, whether taxable or exempt, shall be valued or appraised based on prevailing market values in the locality where the property is situated, in conformity with the valuation standards adopted pursuant to this Act."
