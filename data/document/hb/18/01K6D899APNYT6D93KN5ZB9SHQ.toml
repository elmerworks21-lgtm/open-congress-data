congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7925, OTHERWISE KNOWN AS THE \"PUBLIC TELECOMMUNICATIONS POLICY ACT OF THE PHILIPPINES\", BY REQUIRING PUBLIC TELECOMMUNICATIONS ENTITIES AND INTERNET SERVICE PROVIDERS TO INSTITUTE A REFUND MECHANISM FOR SERVICE OUTAGES AND DISRUPTIONS"
congress_website_abstract = "Seeks to address the poor quality of internet and cellular connectivity services offered by TelCos/ISPs which are riddled with service outages, disruptions, and interruptions. Proposes to provide on a pro-rated basis, a refund credit or a bill adjustment to a customer who has experienced a service outage or disruption for an aggregate period of twenty-four (24) hours or more within a month. Provides that such refund credit or bill adjustment shall be granted to customers subscribing to a service on a pre-paid basis who need not take any action in order to receive a refund."
