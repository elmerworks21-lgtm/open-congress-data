congress_website_title = "AN ACTÂ DECLARING THE BOARD OF TRUSTEES FOR THE VETERANS OF WORLD WAR II (BTVWWII) A PUBLIC OFFICE AND THE FUNDS ENTRUSTED TO IT AS PUBLIC FUNDS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 3518, AS AMENDED, OTHERWISE KNOWN AS \"AN ACT CREATING THE PHILIPPINE VETERANS BANK AND FOR OTHER PURPOSES\""
congress_website_abstract = "Declares the Trust Fund held by the Board of Trustees for the Veterans of World War II (BTVWWII) and all other funds held by the Board as public funds and are subject to audit by the Commission on Audit. Creates a Public Office to be known as “The Board of Trustees of the Veterans of World War II, consisting of eleven (11) members to be selected from among the veterans of World War II by the Supreme Council of the Veterans Federation of the Philippines."
