congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION OF THE RIGHTS OF AIRLINE PASSENGERS AND PENALIZING ACTS IN VIOLATION THEREOF"
congress_website_abstract = "States that contract of air carriage is perfected from the moment the air carrier and the passenger gives their respective consent to the said agreement wherein the air carrier obliges to transport the passenger or one´s baggage from one place to another, without any damage or injury upon the latter´s person, or loss, damage or unreasonable deterioration of his baggage, if any, and when the passenger obliges oneself to pay a just and reasonable air fare. Provides the rights and obligations of the passengers; the rights, duties and obligation of the air carriers; and the obligation of the CAAP, CAB and airport operators."
