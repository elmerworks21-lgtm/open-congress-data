congress_website_title = "AN ACT REGULATING THE MANUFACTURE, USE, SALE, PACKAGING, DISTRIBUTION AND ADVERTISEMENTS OF VAPOR PRODUCTS AND FOR OTHER PURPOSES"
congress_website_abstract = "Refers \\\"Vapor Products\\\" as battery-powered devices that heat a solution, blend or gel, which may or may not contain nicotine, to a temperature that allows the production of vapor, also termed as Electronic Nicotine or Electronic Non-Nicotine Delivery Systems ( E N D S / E N N D S ). Aims to mitigate and monitor the risks of Vapor Products by imposing strict product standards and comprehensive restrictions on their sales and consumption through: creation of an Inter-Agency Committee; protection of minors; ban on flavorings, except for tobacco and menthol; maintenance of post - market records on adverse health events; prohibition against use in certain public places; severe penalties for non - compliance, among others."
