congress_website_title = "AN ACT ESTABLISHING A NATIONAL WETLAND POLICY, PROVIDING MECHANISMS FOR ITS INSTITUTIONALIZATION, AND APPROPRIATING FUNDS THEREOF"
congress_website_abstract = "Seeks to promote the conservation of wetlands; to guide all concerned national government agencies and local government units in adjusting their sectorial or local policies, plans, and programs to be consistent with wetland conservation and wise use. Refers wetlands to a wide variety of areas such as natural pools/ponds, springs, freshwater swamps/marshes, peatlands, floodplains, rivers and lakes, and coastal areas such as estuaries, salt marshes, mangroves, lagoons, intertidal flats, and seagrass beds, and also coral reefs and other marine areas no deeper than six meters at low tide, as well as human-made wetlands such as dams, reservoirs, rice paddies, fish ponds, saltpans, and wastewater treatment ponds."
