congress_website_title = "AN ACT AMENDING SECTION 6 OF REPUBLIC ACT NO. 1379, OTHERWISE KNOWN AS THE FORFEITURE LAW, TO PROVIDE A FIXED PERCENTAGE OF THE VALUE OF FORFEITED PROPERTIES IN CORRUPTION CASES AS ADDITIONAL FUNDING FOR THE OFFICE OF THE OMBUDSMAN AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to be earmarked as additional funding to the Office of the Ombudsman, a share of thirty percent (30%) of the value of asset or property forfeited in favor of the State. Proposes further that: “IF THE PROPERTY IS NOT IN CASH IT SHALL BE SOLD AT PUBLIC AUCTION AND THE PROCEEDS THEREOF, AFTER DEDUCTING THE THIRTY PERCENT (30%) FOR THE OFFICE OF THE OMBUDSMAN, SHALL ACCRUE TO THE GENERAL FUND.”"
