congress_website_title = "AN ACT STRENGTHENING THE ROLES AND FUNCTIONS OF THE PHILIPPINE ECONOMIC ZONE AUTHORITY (PEZA) TO ACCELERATE COUNTRYSIDE DEVELOPMENT THROUGH ROBUST CREATION OF SPECIAL ECONOMIC ZONES IN RURAL AND NEW GROWTH AREAS, ENHANCING THE INCENTIVES THEREOF AND AMENDING FOR THIS PURPOSE, REPUBLIC ACT NO. 7916, OTHERWISE KNOWN AS \\\"THE SPECIAL ECONOMIC ZONE ACT OF 1995, AS AMENDED BY RA 8748\\\""
congress_website_abstract = "Intends to fully industrialize and develop the Philippines into a green, climate-resilient and regional economy that will attract export-oriented industries, as well as strategic domestic-oriented industries; to minimize import dependence, maximize exportation, production, and manufacturing capability of Filipinos and complete the supply chain; Proposes to empower and capacitate the people and the LGUs through the establishment of special economic zones as economic drivers to grow smart towns, digital cities and new metropolitan areas in every region, making the LGUs self-reliant, self-sustaining and resource-generating."
