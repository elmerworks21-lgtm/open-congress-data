congress_website_title = "AN ACT MANDATING ALL PUBLIC AND PRIVATE PRIMARY AND SECONDARY SCHOOLS TO INCLUDE MEDIA AND INFORMATION EDUCATION, INCLUDING THE RESPONSIBLE USE OF THE INTERNET IN THEIR CURRICULUM, FOR OTHER PURPOSES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\\\"Media and Information Education Act\\\" Aims to address the growing need to have a clear framework and structure on elaborate Media Education and Responsible use of the Internet. Intends to recognize the importance of keeping the integrity of the ecosystem of information, by inculcating critical thinking to our youth at the onset of their education to help them assess the truthfulness of the information given to them and defend themselves from all types of abuse and anything that might compromise their privacy. Proposes to cover all students from Grade 1 to Grade 12, from both public and private schools and provides for the development of a module which shall include the following topics but should not be limited to: a. History and Development of Media b. Types and Forms of Media c. Critical Information Analysis d. Responsible Information Dissemination e. Understanding Technology and Social Media Security Systems f. Data Privacy Act and Cybercrime Prevention Act of 2012."
download_url_sources = ["https://docs.congress.hrep.online/legisdocs/basic_18/HB06634.pdf"]

