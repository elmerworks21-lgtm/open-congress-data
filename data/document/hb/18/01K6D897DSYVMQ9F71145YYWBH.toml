congress_website_title = "AN ACT PROHIBITING DISCRIMINATION ON THE BASIS OF SEXUAL ORIENTATION OR GENDER IDENTITY OR EXPRESSION (SOGIE) AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Seeks to define, prohibit and penalize situations and practices wherein discrimination on the basis of sexual orientation and gender identity occur. It also aims to protect members of the LGBT community and guarantee their rights as citizens of the Republic of the Philippines and their rights as human beings. Enumerates different discriminatory practices to any person on the basis of sexual orientation or gender identity or expression as defined in this Act; Provides a complaint mechanism for SOGIE-related cases; Orders government to promote equality; and Empowers the portrayal of LGBT persons in media."
