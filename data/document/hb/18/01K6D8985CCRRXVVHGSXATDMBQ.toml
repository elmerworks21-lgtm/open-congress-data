congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF THE ARCHIPELAGIC SEA LANES IN THE PHILIPPINE ARCHIPELAGIC WATERS, PRESCRIBING THE RIGHTS AND OBLIGATIONS OF FOREIGN SHIPS AND AIRCRAFT EXERCISING THE RIGHT OF ARCHIPELAGIC SEA LANES PASSAGE"
congress_website_abstract = "Defines several terms such as: Archipelagic sea lane; Archipelagic sea lane passage; Archipelagic water; Associated protective measure; Hydrographic survey; Oceanographic survey; Right of innocent passage; and Territorial sea. Declares that foreign ships or aircraft, including research or hydrographic survey ships or aircraft, shall not conduct oceanographic or hydrographic surveys, unless prior permission to do so from the appropriate agency of the Government has been obtained. Enumerates the different prohibitions to foreign ships/fishing vessels and aircraft, while exercising the right of archipelagic sea lanes passage; and provides for compliance with navigational regulations, procedures and traffic scheme."
