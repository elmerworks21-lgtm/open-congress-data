congress_website_abstract = "Seeks to amend further certain provisions of R.A. 7836 - Philippine Teachers Professionalization Act of 1994 as amended by R.A. 9293 to include the participation of the Department of Education (DepEd) and Commission on Higher Education (CHED) in formulating the question for the Licensed Examination for Teachers (LET); and a review and assessment of the same by a non partisan third-party organization to ascertain and verify the effectiveness of the examination in producing professional teachers."
