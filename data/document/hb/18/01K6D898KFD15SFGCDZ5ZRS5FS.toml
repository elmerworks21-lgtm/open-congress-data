congress_website_title = "AN ACT GRANTING ALL MUNICIPAL MAYORS, CITY MAYORS AND PROVINCIAL GOVERNORS THE APPROPRIATE CIVIL SERVICE ELIGIBILITY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to recognize the immense amount of duties and responsibilities that these local government leaders have whose role is to incorporate the local development needs with national priorities to create holistic meso-level policies, programs and priorities for socio-economic growth. Grants an eligibility to the former and current local government officials an equivalent of a Career Service Professional Eligibility who have served or who shall serve an aggregate period of nine (9) years in office, provided that they must be a holder of a bachelor's degree; while an eligibility of a Career Service Sub-Professional is hereby granted to those former and current officials who have served or who shall serve an aggregate period of six (6) years in office, provided that such officials shall have at least earned seventy-two (72) academic units leading to a bachelor's degree."
