congress_website_title = "AN ACT AMENDING SECTION 26 OF REPUBLIC ACT 6847 ALSO KNOWN AS THE PHILIPPINE SPORTS COMMISSION ACT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to update the PCSO funding provision to the lotto lottery game. It increases the funds of the PSC by allocating to the National Sports Development Fund the following: ten percent (10%) of the Motor Vehicle Users´ Tax; five percent (5%) of the online cockfighting (e-sabong) regulated by the Philippine Amusement and Gaming Corporation (PAGCOR); and five percent (5%) of all taxes collected on imported athletic equipment. Empowers the PSC to explore for, negotiate and secure foreign grants and technical assistance to augment the National Sports Development Fund, in coordination with the Department of Finance and the National Economic and Development Authority."
