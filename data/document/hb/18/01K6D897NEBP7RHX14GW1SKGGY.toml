congress_website_title = "AN ACT GRANTING THE SECURITIES AND EXCHANGE COMMISSION THE AUTHORITY TO MONITOR AND/OR INVESTIGATE NON-GOVERNMENTAL ORGANIZATIONS, FOUNDATIONS, AND SIMILAR INSTITUTIONS"
congress_website_abstract = "Aims to address widespread abuses and malpractices involving the use of PDAF committed by some NGOs, charitable institutions, and foundations that put honest-to-goodness organizations into disrepute. Proposes to mandate the Securities and Exchange Commission to raise “red flags” concerning unethical practices of these dubious organizations: investigating their acts and practices when there exists probable cause to believe that they are committing or attempting or conspiring to commit, or participating in, or facilitating activities in violation of existing laws, rules, and regulations."
