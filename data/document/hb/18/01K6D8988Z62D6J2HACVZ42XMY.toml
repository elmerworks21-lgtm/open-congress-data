congress_website_title = "AN ACT INSTITUTING THE MAGNA CARTA NG PILIPINONG MARINO"
congress_website_abstract = "Contends that existing labor laws and legislation, especially the Overseas Filipinos and Migrant Worker's Act, do not adhere to the adopted Maritime Labor Convention of 2006 (also known as the \\\"Seafarer's Bill of Rights\\\"), which was designed to be applicable internationally and ensure minimum standards for the safe and secure workplace that complies with safety standards and other forms of social protection. Intends to fill the gaps in legislation and comply and effectively implement the standards set by the international convention to promote the welfare and protect the rights of Filipino seafarers. Tasks the Philippine Seafarer One Stop Processing Center (PSOC) to operationalize and make available to the public, an integrated document processing center for the seafarers and the general public to conduct official transactions."
