congress_website_title = "AN ACT CODIFYING THE ALTERNATIVE CHILD CARE LAWS, REORGANIZING THE INTERCOUNTRY ADOPTION BOARD INTO THE NATIONAL AUTHORITY FOR CHILD CARE, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "Creates a one stop shop on alternative child care attached to the DSWD whose functions shall include among others, the formulation and development of alternative child care policies such as but not limited to programs and services that will protect the Filipino child from abuse, exploitation, trafficking, and adoption practice that is harmful, detrimental and prejudicial to the best interest of the child. Establishes a system of cooperation with other States, through their respective central or competent authorities and accredited bodies to prevent the sale, trafficking, and abduction of children, and to protect Filipino children abandoned overseas who are made vulnerable by their irregular status. Incorporates provisions as regards to other forms of alternative child care options such as foster care, guardianship, kafalah care, kinship care, family-like care and residential care."
