congress_website_title = "AN ACT ESTABLISHING A NATIONAL CENTER AND AN INTER-AGENCY COUNCIL FOR HARM REDUCTION, PROVIDING FOR DIVERSION AND HARM-REDUCTION PROGRAM FOR PERSONAL USE AND LOW-LEVEL POSSESSION OF DRUGS, PROHIBITING HARMFUL AND DISCRIMINATORY DRUG-RELATED INTERVENTIONS AND PRACTICES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to reduce the adverse health, social and economic consequences related to the use of legal and illegal psychoactive drugs without focusing on drug consumption by creating a National Center for Harm Reduction which shall plan and implement an integrated and comprehensive harm reduction approach to drug-related issues in the country. Provides diversion and harm reduction programs to person who personally use drugs and with low-level possession of drugs and drugs paraphernalia who qualifies under this Act the following procedures: a.) Education and outreach; b.) Referral to health and social services c.) Peer support and mentorship program; d.) Safe paraphernalia distribution programs; e.) Drug substitution treatment; and f.) Integrative Harm Reduction Psychotherapy. Prohibits discriminatory and harmful drug-related interventions and practices and provides penalties for violation of this Act."
