congress_website_title = "AN ACT INSTITUTIONALIZING MALASAKIT CENTERS TO COMPLEMENT THE IMPLEMENTATION OF REPUBLIC ACT NO. 11223 OTHERWISE KNOWN AS THE êžŒUNIVERSAL HEALTH CARE ACTêžŒ BY REQUIRING PHILHEALTH TO ESTABLISH, OPERATE AND MAINTAIN MALASAKIT CENTERS IN ALL DOH, LGU, SUC AND DND HOSPITALS IN THE COUNTRY, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Intends to establish a one-stop shop dubbed as Malasakit Centers to: a) effectively ease the process of availing government services for patients; b) house desk representatives from the DOH, DSWD, PhilHealth and PCSO to assist and process the concerns of indigent and poor patients; c) serve as a Health System Enabler to improve patient assistance and referral and provide much needed system support for patient navigation; d) reduce, if not eliminate, out-of-pocket payments by indigent and poor patients, including non-medical expenses like transportation costs."
