congress_website_title = "AN ACT PROHIBITING THE EXPORTATION OF BLACK SAND AND ITS DERIVATIVES IN ITS RAW FORM TO OTHER COUNTRIES"
congress_website_abstract = "Intends to address potential revenue losses from black sand mining caused by unscrupulous companies who take advantage of the laxity by which permits are issued, which prompted the Mining Industry Coordination Council (MICC) had issued Resolution No. 4 or the \\\"Adoption of Immediate Measures to Address Black Sand Mining Operations in the Country.\\\" Proposes to prohibit the exportation of black sand in its raw form and to require all black sand mining companies to institute, build, or lease advanced processing plants for magnetite within the province where they are conducting actual mining operation."
