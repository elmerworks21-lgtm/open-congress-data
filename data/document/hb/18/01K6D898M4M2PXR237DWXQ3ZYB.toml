congress_website_title = "AN ACT AMENDING ARTICLES 183 AND 184 OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "States that in the case of “False testimony in other cases and perjury in solemn affirmation”, the penalty of PRISION MAYOR IN ITS MINIMUM PERIOD TO PRISION MAYOR IN ITS MEDIUM PERIOD shall be imposed upon any person, who knowingly makes untruthful statements and shall testify under oath, or make an affidavit, upon any material matter before a competent person authorized to administer an oath in cases in which the law so requires. Penalizes any person who shall incriminate or impute, through false testimony or untruthful statements under oath or through an affidavit, any person in the commission of a crime. Provides further that if the offender is a public officer or employee, the penalty shall be imposed in its maximum period; shall suffer a fine not to exceed one million pesos; and perpetual absolute disqualification from holding any appointive or elective position."
