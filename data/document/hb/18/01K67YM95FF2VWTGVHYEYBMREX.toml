congress_website_title = "AN ACT INSTITUTIONALIZING VOLUNTEERISM AS A STRATEGY FOR NATIONAL DEVELOPMENT AND DECLARING DECEMBER AS NATIONAL VOLUNTEER MONTH, AMENDING FOR THE PURPOSE SECTIONS 12 AND 13 OF REPUBLIC ACT NO. 9418, OTHERWISE KNOWN AS THE \\\"VOLUNTEER ACT OF 2007\\\""
congress_website_abstract = "Institutionalizes the Philippine Volunteer Awards Program (PNVAP) comprising of a National Outstanding Volunteer award (NOVA) which shall be conferred by the President of the Philippines to recognize the exemplary contributions, dedication to service and achievements of individuals and organization in uplifting the lives of people and communities through volunteerism; and a Local Outstanding Volunteer Award (LOVA) which recognizes the significant contributions of volunteer individuals and groups in the development of their respective communities and shall be implemented by the Local Government Unit and conferred by the respective Local Chief Executive. Declares the month of December of every year as National Volunteer Month which celebration shall be spearheaded by the PNVSCA for coordination purposes."
