congress_website_title = "AN ACT PROHIBITING DISCRIMINATION ON THE BASIS OF HEALTH CONDITION AND MEDICAL HISTORY"
congress_website_abstract = "Defines \\\"Health Condition or Medical History\\\" for the purpose of this Act as the past and present state of an individual relative to his or her exposure to a contagious disease as a result of being a patient or a survivor, or on account of his or her nature or place of work, and residence.” States that \\\"It shall be unlawful for any person to commit an act of discrimination on the basis of health condition and medical history such as when he or she treats a person less favorably than other persons having or under similar circumstances, or when he or she imposes a supposed equal condition or requirement which has the effect of disadvantaging a person, both on account of health condition and medical history”."
