congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 386, ALSO KNOWN AS THE CIVIL CODE OF THE PHILIPPINES, ARTICLE 952"
congress_website_abstract = "Seeks to establish the fact that an heir is no longer the continuation of the personality of the deceased and therefore does not assume responsibility for the obligations of the decedent. Intends to amend Art. 952 of the Civil Code (which mentions a charge of a legacy or a devise upon an heir), to be read as follows: “The heir or the executor or administrator of the estate must deliver the very thing bequeathed if he is liable to do so and cannot discharge this obligation by paying its value. . .”"
