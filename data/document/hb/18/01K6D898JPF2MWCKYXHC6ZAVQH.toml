congress_website_title = "AN ACT DEFINING THE OFFENSES OF DISCHARGE OF FIREARMS AND INDISCRIMINATE FIRING OF FIREARMS AND PROVIDING STIFFER PENALTIES THEREFOR, AMENDING FOR THE PURPOSE ARTICLE 254 OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE \"REVISED PENAL CODE\", AND REPUBLIC ACT NO. 10591, OTHERWISE KNOWN AS \"THE COMPREHENSIVE FIREARMS AND AMMUNITION REGULATION ACT\""
congress_website_abstract = "Seeks to increase the penalty on any person who shall shoot at another with any firearm or any device from the penalty of prision correccional in its [minimum and medium periods] MAXIMUM PERIOD. Imposes heavier penalties upon members of the uniformed services of the government of one (1) degree higher provided in Article 254 of Act No. 3815, as amended and RA 10591."
