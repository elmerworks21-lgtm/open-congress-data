congress_website_title = "AN ACT INSTITUTIONALIZING GOOD MANNERS AND RIGHT CONDUCT (GMRC) IN THE K-12 CURRICULUM"
congress_website_abstract = "Intends to restore GMRC/Values Education as a separate subject in the present K-12 program in basic education curriculum - focusing on the character development and moral values formation of students relating to self, to the community, to the country, to the environment, and to God which shall include theoretical, practical, and biblical principles in its enforcement to all students. States that the mother tongue of the majority of the learners shall be adopted as the primary medium of instruction for teaching this subject and provides for corresponding number of hours required per school year for Elementary (60 hours); Junior High School (80 hours); and Senior High School (100 hours)."
