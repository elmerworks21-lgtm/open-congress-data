congress_website_title = "AN ACT TO SUPPORT BUSINESS INCUBATION IN ACADEMIC SETTINGS"
congress_website_abstract = "Defines “incubator” as an entity affiliated with or house in a degree-granting institution that provides space and coordinated and specialized services to entrepreneurial businesses which meet selected criteria during the businesses´ start-up phase. Proposes to authorize CHED: to support the establishment and development of incubators; to allocate funds to make awards on a competitive basis to support the program and funds for research regarding best practices; to contract with organizations with expertise in business incubation practices; and to identify specified recipients of such awards. Provides that CHED shall give priority to funding applications that provide strong educational opportunities to students in entrepreneurship, and that require significant collaboration between businesses, academia, and local government and economic development leaders."
