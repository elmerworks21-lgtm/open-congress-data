congress_website_title = "AN ACT GRANTING FULL INSURANCE COVERAGE TO ALL QUALIFIED AGRARIAN REFORM BENEFICIARIES OF THE COMPREHENSIVE AGRARIAN REFORM PROGRAM, AMENDING FOR THE PURPOSE SECTION 14 OF REPUBLIC ACT NO. 9700, OTHERWISE KNOWN AS THE \\\"COMPREHENSIVE AGRARIAN REFORM PROGRAM EXTENSION WITH REFORMS\\\""
congress_website_abstract = "Provides for additional form of support service to qualified beneficiaries of the CARP by including to compensable losses those resulting from natural calamities such as typhoon, flood, drought, earthquake, volcanic eruption, frost, and other destructive natural phenomena such as heat and hot wind; plant diseases caused by pathogens, bacteria, fungi, viruses, virus-like pathogens, and other similar foreign bodies; pest infestations caused by nematodes, insects, mites and spiders, millipedes and centipedes, symphylans, slugs and snails, sow bugs and pillbugs, parasistic higher plants, and other parasites, and loss of life and/or injury to the qualified agrarian reform beneficiary due to accident or any of the aforementioned causes. Covers the following crops: palay, corn, sugarcane, high-value crops as defined in Section 4(b) of RA 7900, otherwise known as the “High-Value Crops Development Act of 1995\\\", coconut, and tobacco; aquaculture;livestock; and non-crop agricultural assets."
