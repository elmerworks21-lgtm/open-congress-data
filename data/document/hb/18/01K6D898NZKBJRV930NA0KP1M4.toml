congress_website_title = "AN ACT AMENDING THE SALIENT PROVISIONS OF THE LOCAL GOVERNMENT CODE ON THE SPECIAL EDUCATION FUND (SEF), AMENDING FOR THE PURPOSE RA 7160 OR THE LOCAL GOVERNMENT CODE OF 1991, AS AMENDED"
congress_website_abstract = "Amends Sections 100 and 272 of the LGC, as amended: a) to provide the DepEd the power to levy funds from the SEF in times of national emergencies or when the Executive Department deems it necessary, in order to address and secure the salaries, allowances, and other benefits of our teaching, teaching-related, and non-teaching personnel; b) to create temporary teacher items on a contractual basis; and c) to expand the coverage of the SEF to include the Alternative Learning System through requiring the Local School Boards to set aside a portion for the implementation of the ALS programs. Proposes also the hiring and employment by the LGU's of administrative and non-teaching personnel who will be assigned to public schools."
