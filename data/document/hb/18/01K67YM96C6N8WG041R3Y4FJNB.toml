congress_website_title = "AN ACT MANDATING THE PROVISION OF COMPREHENSIVE RENAL REPLACEMENT THERAPY (RRT) TO PATIENTS WITH END STAGE RENAL DISEASE IN NATIONAL, REGIONAL, AND PROVINCIAL GOVERNMENT HOSPITALS, INCREASING FOR THE PURPOSE THE PHILHEALTH PACKAGE RATE FOR MEMBERS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Aims to make comprehensive renal replacement therapy services available to all Filipinos who suffer from End Stage Kidney Disease; supports kidney transplantation as the best treatment option that provides the highest quality of life for End Stage Renal Disease patients and ensures the return of the patient to full rehabilitation. Provides for the expansion of PhilHealth benefit package for kidney transplantation or renal replacement therapy from both the living and deceased donors; provision of free dialysis to indigent patients; and provision by the Philippine Charity Sweepstakes Office of the remaining sessions for both peritoneal dialysis and hemodialysis after a patient has already consumed his or her benefit package from PhilHealth."
