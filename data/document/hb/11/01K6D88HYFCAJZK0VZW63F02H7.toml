congress_website_title = "AN ACT CREATING THE DEPARTMENT OF FAMILY MEDICINE IN EVERY HOSPITAL OR MEDICAL CENTER OF THE COUNTRY, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "States the following as the objectives of the proposed Department: (1) to offer training programs for physicians who intend to udnergo a well-rounded training in family and general practice in a community setting; (2) to serve as laboratory for testing and implementing varied and newer concepts of health care delivery; and (3) to coordinate with exsiting agencies in whatever undertaking it shall endeavor to achieve its short and long terms goals and to further the policies of the Department ofHealth."

