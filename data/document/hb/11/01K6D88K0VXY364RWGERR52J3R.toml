congress_website_title = "AN ACT CREATING THE NATIONAL PRINTING CORPORATION, DEFINING ITS POWERS, FUNCTIONS AND RESPONSIBILITIE S THEREBY TAKING OVER THE PRINTING FACILITIES, MANAGEMENT, CONTROL AND OPERATIONS OF APO PRODUCTION UNIT, INC. AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Printing Act of 2000\". Rationale: The National Printing Office, since its inception through E.O. 285, has been printing the various forms necessitated by the different government agencies. However, due to its antiquated facilities, it hasbeen forced to endorse specialized forms to accredited printers, as it can not cope with the demands of the government agencies."

