congress_website_title = "AN ACT DECLARING THE POSITIONS OF MUNICIPAL SOCIAL WELFARE AND DEVELOPMENT OFFICER, MUNICIPAL AGRICULTURIST, MUNICIPAL ENVIRONMENT AND NATURAL RESOURCES OFFICER AND MUNICIPAL INFORMATION OFFICER, AS MANDATORY, AMENDING FOR THE PURPOSE SECTION 443 OFREPUBLIC ACT NO. 7160, AS AMENDED AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Under the Local Government Code (RA 7160), the social, agricultural environmental and natural resources services are being devolved to the LGUs. Congruently, the key officers of the devolved agencies in the municipal level msut be considered as among the municipal officials in the light of the government thrust towards transforming the LGus into stronger partners in the task of nation-building ."

