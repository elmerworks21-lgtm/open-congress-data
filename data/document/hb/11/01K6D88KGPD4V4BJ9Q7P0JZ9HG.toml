congress_website_title = "AN ACT UPGRADING THE MONTHLY BENEFITS OF WORLD WAR II VETERANS, THEIR SPOUSES AND UNMARRIED MINOR CHILDREN"
congress_website_abstract = "This bill seeks to upgrade the monthly pension of living veterans and the surviving family of a deceased veteran. Besides increasing the amount of pension, this measure also integrates the old age and administrative disability pensions into one typeof monthly pension thereby increasing the amount due the veteran on a monthly basis. This bill provides for a different scheme in determining the rate of monthly pension because it is dependent on the age of the veteran at the time of the effectivity of this Act."

