congress_website_title = "AN ACT AUTHORIZING THE BUREAU OF INTERNAL REVENUE (BIR) TO IMPOSE AND ASSESS AN EXCISE TAX ON THE EXTRACTION OF GROUNDWATER FOR COMMERCIAL, INDUSTRIAL AND RECREATIONAL PURPOSES"
congress_website_abstract = "\"Groundwater Extraction Act\". Rationale: Water resources within the territorial jurisdiction of the Republic of the Philippines belong to the State, and their appropriation of rights over their use for any purpose allowed by law is a privilege granted to citizens by the government. Pursuant to this, the State has the right to manage, control and regulate the use of its waters in order to ensure that the exercise of water rights by others does not prejudice the rights of the rest of the populace."

