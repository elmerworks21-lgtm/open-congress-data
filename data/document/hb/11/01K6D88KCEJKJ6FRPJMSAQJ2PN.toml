congress_website_title = "AN ACT PROHIBITING THE PUBLICATION, TELECAST, BROADCAST OR DISSEMINATION IN ANY MANNER OF THE RESULTS OF POLL SURVEY OF CANDIDATES WITHIN ONE (1) MONTH PRIOR TO AN ELECTION, AMENDING FOR THE PURPOSE THE OMNIBUS ELECTION CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Rationale: The Constitution envisions equal access to opportunities for public service. Elections are conducted so the people can rightfully choose the candidates who can best represent their interest in the proper forum. Right choices are made when the people are provided witn ample time to be informed and to reflect on the qualifications of candidates for a given position. However, when poll survey results based on unverified data are released one month before election, this prerogative loses its meaning and the exercise of the right of suffrage greatly affected."

