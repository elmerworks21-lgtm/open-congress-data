congress_website_title = "AN ACT AMENDING SECTION 24 OF REPUBLIC ACT NUMBERED 6770 OTHERWISE KNOWN AS THE `THE OMBUDSMAN ACT OF 1989'(RE: PREVENTIVE SUSPENSION OF ANY OFFICER OR EMPLOYEE UNDER THE AUTHORITY OF THE OMBUDSMAN...)"
congress_website_abstract = "This bill refers to the preventive suspension of any officer or employee under the authority of the Ombudsman. It states that: The preventive suspension shall continue until the case is terminated by the Office of the Ombudsman but not more than A NON-EXTENDIBLE PERIOD OF SIXTY (60) DAYS UPON ISSUANCE OF THE ORDER OF PREVENTIVE SUSPENION [six months] without pay, except when the delay in the disposition of the case by the Office of the Ombudsman is due to the fault, negligence or petition of the respondent, in which case the period of such delay shall not be counted in computing the period of suspension herein provided."
