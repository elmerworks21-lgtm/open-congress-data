congress_website_title = "AN ACT INCREASING THE DAILY FOOD SUBSISTENCE ALLOWANCE OF PRISONERS AND DETAINEES FROM THIRTY PESOS (P30.00) TO SEVENTY-FIVE PESOS (P75.00) AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The present daily food subsistence allowance of prisoners and detainees of the Bureau of Corrections and the Bureau of Jail Management and Penology is pegged at P30.00 a day. It is common knowledge that this amount barely covers one single meal muchmore three meals a day. Sharp price increases of all commodities validly justify the increase of food allowance."

