congress_website_title = "AN ACT AMENDING SECTIONS TWO HUNDRED NINETY-NINE (299), THREE HUNDRED FIVE (305), THREE HUNDRED ELEVEN (311), THREE HUNDRED TWENTY-TWO (322), AND THREE HUNDRED SIXTY-SIX (366) OF THE INSURANCE CODE OF 1978 BY PROVIDING THEREIN CONTINUED VALIDITY TOLICENSES ISSUED TO INSURANCE AGENTS AND INSURANCE AND REINSURANCE BROKERS AND TO ACCREDITATION ISSUED TO NON-LIFE COMPANY UNDERWRITERS AND ACTUARIES UPON PAYMENT OF ANNUAL FEES THEREFOR, UNLESS RECALLED, SUSPENDED OR REVOKED, FOR CAUSE"
congress_website_abstract = "This bill seeks to amend the Insurance Code in order to improve the system of renewing licenses. the influx of renewal applications to the Insurance Commission is an annual activity that government agency has to contend with using precious time, manpower and supplies, all paid by the government. It would be more advantageous for the Insurance Commission and the insurance agents and brokers if the annual renewal and accreditation are foregone."
