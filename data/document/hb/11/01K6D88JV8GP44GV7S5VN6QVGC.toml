congress_website_title = "AN ACT GIVING PRIORITY TO DIFFERENTLY-ABL ED INDIVIDUALS IN THE OPERATION OF VENDING FACILITIES IN GOVERNMENT PROPERTIES, TO ENLARGE THE ECONOMIC OPPORTUNITIES OF THE DIFFERENTLY-ABL ED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Government, therefore, should push for programs and policies that will provide the support system to allow these differently-abl ed individuals to be integrated smoothly into the mainstream of society. Financial independence and sele-reliance are foremost concerns of this special sector, and the feeling of security that comes with financial independence is an important morale booster for them. A steady source of income will give them the financial security they need most."
