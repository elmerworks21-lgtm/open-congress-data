congress_website_title = "AN ACT DISCOURAGING HOOLIGANISM, FRATERNITY AND GANG VIOLENCE BY PROVIDING GREATER PENALTIES TO OFFENDERS, AMENDING ARTICLES 251 & 252 OF THE REVISED PENAL CODE"
congress_website_abstract = "Rationale: In the past few weeks, fraternity and gang violence have escalated and worsened. It is in this light, that it becomes necessary to impose stiff penalties to acts of fraternity and gang violence whether inside or outside campuses to underscore the seriousness of these offenses."

