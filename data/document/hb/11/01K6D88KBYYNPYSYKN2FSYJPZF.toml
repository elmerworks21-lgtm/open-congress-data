congress_website_title = "AN ACT EXEMPTING A MUNICIPALITY FROM THE ADDITIONAL REQUISITE ON LAND AREA OR POPULATION FOR ITS CONVERSION INTO A CITY PROVIDED ITS AVERAGE ANNUAL INCOME IS AT LEAST P200 MILLION, AMENDING SEC. 450 OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991 AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: As provided, a municipality who aims to be converted into a city, may be exempted from the additional requisites of land are or population if such municipality has reached an income of at least P200 Million or ten times than that prescribed under the Local Government Code. This amendment should give each and every municipality to strive and obtain the peak of autonomy in local governance through cityhood regardless of its size and population."

