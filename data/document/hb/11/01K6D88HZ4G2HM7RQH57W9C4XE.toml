congress_website_title = "AN ACT PROVIDING FOR THE PRESERVATION, REFORESTATION AND AFORESTATION OF THE MANGROVE FORESTS IN THE PHILIPPINES, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Protection and Preservation of Mangrove Forest Act of 1998\". The mangrove forests, being one of the world's most biological fertile ecosystems, is the most damaged by man's exploitation. The proposed Council is for the Preservation of Mangrove Forests, both at the national and local levels, tasked to draw up a comprehensive plan to secure and preserve our mangrove forests."
