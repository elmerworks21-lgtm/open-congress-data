congress_website_title = "AN ACT PROVIDING FOR THE DECLARATION OF THE CANDIDATE RECEIVING THE SECOND HIGHEST NUMBER OF VOTES FOR THE SAME POSITION AS THE ELECTED CANDIDATE IN QUO WARRANTO CASES IF THE CANDIDATE CREDITED WITH THE HIGHEST NUMBER OF VOTES IS DISQUALIFIED TO RUNFOR SUCH POSITION, AMENDING FOR THE PURPOSE SECTION 253 OF BATAS PAMBANSA BLG. 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE REPUBLIC OF THE PHILIPINES"
congress_website_abstract = "IF THE CANDIDATE CREDITED WITH THE HIGHEST NUMBER OF VOTES IS DISQUALIFIED ON THE GROUND OF INELIGIBILITY FOR FAILURE TO MEET CITIZENSHIP, AGE OR RESIDENCE REQUIREMENT OR OF DISLOYALTY TO THE REPUBLIC AND/OR FAILED TO MEET THE REQUIREMENTS IN THE RESPECTIVE CERTIFICATE OF CANDIDACY THAT COULD BE GROUND FOR DISQUALIFICATIO N AS A CANDIDATE, THE ELECTORAL TRIBUNALS OF THE SENATE AND THE HOUSE OF REPRESENTATIVES , THE COMMISSION ON ELECTIONS OR IN ANY COURTS, AS THE CASE MAY BE, SHALL DECLARE AS ELECTED THE CANDIDATE FOR THE SAME POSITION WHO OBTAINED THE SECOND HIGHEST NUMBER OF VOTES."
