congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NUMBERS 183 AND 887 ESTABLISHING THE PROCEDURE AND REQUIRING THE MANDATORY REGISTRATION OF RESERVISTS OF THE ARMED FORCES OF THE PHILIPPINES AND FOR OTHER PURPOSES"
