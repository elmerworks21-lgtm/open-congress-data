congress_website_title = "AN ACT MANDATING COOPERATIVES TO IMPORT AND RETAIL GASOLINE AND OTHER PETROLEUM PRODUCTS FOR RETAIL TO THEIR RESPECTIVE MEMBERS ALLOWING THESE ENTITIES TO USE THEIR SURPLUS TO FUND SUCH VENTURE, AND DIRECTING GOVERNMENT FINANCIAL INSTITUTIONS TO GIVE PRIORITY APPROVAL TO LOANS FOR SUCH UNDERTAKING SO AS TO ATTAIN THE PURPOSE OF THIS ACT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The Constitution recognizes the special place of cooperatives in the development of the country. The consortia and federations of cooperatives have the capability of importing and distributing gas, fuel and other energy sources to servicetheir members. They have resources in their possession that can enable them to put up gas station and to import gas from neutral energy producing countries. They can be responsible entities to be entrusted with gasoline distribution to their members. The life and death, the defeat and success of the ventures of cooperative could well depend upon their management of the source and distribution of oil/gas and oil products."

