congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6539, AS AMENDED, ENTITLED 'AN ACT PREVENTING AND PENALIZING CARNAPPING', AND FOR OTHER PURPOSES(RE: STRICTER PENALTIES ON CARNAPPING)"
congress_website_abstract = "In 1995, the Death Penalty Law was reinstated. Included in this Law was the imposition of death penalty on carnapping if it included murder and rape. However, despite the inclusion of carnapping as one of those liable with death penalty, there has been an increase in the incidence of carnapping. Carnappers today are even more sly. They use \"high technology\" gadgets in thier operations. Thus, there is a need to impose stricter penalties on carnapping."
