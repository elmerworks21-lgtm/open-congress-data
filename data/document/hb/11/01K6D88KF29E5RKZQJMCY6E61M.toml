congress_website_title = "AN ACT DECLARING A NATIONAL POLICY ON PEACE ZONES"
congress_website_abstract = "\"The Peace Zones Policy Act of 2000.\" A peace zone is a people-initiate d, community-based arrangement in a local geographical area which residents themselves declare to be off-limits to armed conflict primarily to protect the civilians there and also to contribute to the more comprehensive peace progress. There is a need, therefore, to not only clarify concept of Peace Zones but also, more importantly, set a national policy of openness, respect and recognition of this valuable Filipino innovation and contribution to peace-building. This would complement and deepen a comprehensive national peace policy."
