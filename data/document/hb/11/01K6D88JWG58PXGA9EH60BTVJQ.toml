congress_website_title = "AN ACT PROVIDING FOR THE TREASURE HUNTING CODE"
congress_website_abstract = "It is hereby declared a policy of the State to pursue the exploration, development and utilization of the country's natural resources, among which is the discovery of hidden treasures known to be buried for centuries and is perceived to possess cultural significance and value. Towards this end, the State shall undertake to provide guidelines to regulate treasure hunting activities to the end that rights and interests can be protected and that our cultural heritage can be preserved."

