congress_website_title = "AN ACT TO AMEND CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED SEVENTY-FOUR HUNDRED AND THIRTY-ONE, OTHERWISE KNOWN AS THE \"RADIOLOGIC TECHNOLOGY ACT OF 1992\"(RE: MEDICAL PHYSICIST RADIOLOGIST)"
congress_website_abstract = "The MEDICAL PHYSICIST and the RADIOLOGIST clearly differ with the radiologic technology profession. Under this bill, the PRC shall recommend to the President and ADDITIONAL two (2) members to the Board of Radiologic Technology from the roster of radiologic/X-ra y technologists IN LIEU of the medical physicist and radiologist."

