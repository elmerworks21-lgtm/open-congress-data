congress_website_title = "AN ACT PROVIDING FOR THE MODERNIZATION OF THE HEALTH CARE DELIVERY SYSTEM, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Health Care Delivery Modernization Act of 1998\". The proposed modernization program consists of the (1) phasing out of the antiquated health care delivery system; (2) the realization of a genuine local autonomy by transforming devolved hospitals into self-governing units; and (3) the establishment of district health boards nationwide."
