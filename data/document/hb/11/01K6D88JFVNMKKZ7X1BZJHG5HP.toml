congress_website_title = "AN ACT PROVIDING FOR A FIVE (5)-YEAR MORATORIUM ON THE APPLICATION OF BATAS PAMBANSA BLG. 22, ENTITLED `AN ACT PENALIZING THE MAKING OR DRAWING AND ISSUANCE OF A CHECK WITHOUT SUFFICIENT FUNDS OR CREDIT AND FOR OTHER PURPOSES'"
