congress_website_title = "AN ACT EXCLUDING BANK, NON-BANK FINANCIAL INTERMEDIARIES AND FINANCE COMPANIES FROM THE COVERAGE OF THE VALUE-ADDED TAX, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8424, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Countries which are now under the Value Added Tax (VAT) system have long recognized the difficulty of imposing the tax on banks and non-bank financial intermediaries primarily because of the limited VATable inputs that may be claimed as tax credits. Also, gross receipts of these institutions do not fir with the coverage of the regular VAT. It is the intention of this bill to ease out legislative work by totally exempting banks and non-bank financial intermediaries from the existing VAT system until such time that an appropriate tax structure is designed."
