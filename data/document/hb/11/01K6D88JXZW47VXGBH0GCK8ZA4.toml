congress_website_title = "AN ACT AUTHORIZING DUAL CITIZENSHIP TO AMERICANS AND OTHER FOREIGN CITIZENS WHO ARE FORMER FILIPINOS OR OF FILIPINO ANCESTRY UNDER CERTAIN CONDITIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The rationale behind this measure is to allow the Filipino expatriates to reacquire or acquire, as the case maybe, their Filipino citizenship in order that the millions of these expatriates abroad can be encouraged or enticed to invest in the Philippines, and in the process, shore up the country's economy with the infusion of new capital into its economic mainstream."

