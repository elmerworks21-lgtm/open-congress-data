congress_website_title = "AN ACT MAKING MANDATORY THE POSITION OF THE AGRICULTURIST IN THE MUNICIPAL GOVERNMENT, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE 'LOCAL GOVERNMENT CODE OF 1991'"
congress_website_abstract = "No person shall be appointed agriculturlist unless he is a citizen of the Philippines, a resident of the local government unit concerned, of good moral character, a holder of a college degree in agriculture or any related course from a recognized college or university, and a first grade civil service elgibile or its equivalent. He must have practiced his profession in agriculture or acquired experience in a related field for at least five (5) years in the case of the provincial or city agriculturist and three (3) years in the case of the municipal agriculturist."

