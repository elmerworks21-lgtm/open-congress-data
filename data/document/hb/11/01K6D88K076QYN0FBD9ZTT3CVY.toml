congress_website_title = "AN ACT DEVOLVING TO LOCAL GOVERNMENT UNITS ALL RENATIONALIZED HOSPITALS, INCLUDING NEWLY ESTABLISHED HOSPITALS PERFORMING GENERAL HOSPITAL CARE, AFTER THE EFFECTIVITY OF REPUBLIC ACT NO. 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991 ANDFOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Due to the lack of adequate funding and the necessary technical assistance at the early stage of implementation of the Local Government Code, most local government units encountered difficulties in assuming the devolved health functions and responsibilitie s. An attempt during the 9th Congress to reverse the process of decentralizatio n of this health care system under House Bill No. 3331 was vetoed by then President Ramos on certain grounds among others, that re-centralizati on iscontrary to the spirit of genuine local autonomy and decentralizatio n, that reversion is costly, impractical and counter-product ive, etc."
