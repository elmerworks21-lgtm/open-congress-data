congress_website_title = "AN ACT MANDATING THE INCLUSION OF PSYCHIATRY IN THE MEDICAL BOARD EXAMINATIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED TWENTY-THREE HUNDRED AND EIGHTY-TWO, OTHERWISE KNOWN AS THE MEDICAL ACT OF 1959"
congress_website_abstract = "This bill seeks to correct the long standing situation in which physicians are not enlightened as to the social context of health and illness nor equipped to detect symptoms of stree and anxiety which may be the root of a patient's physical disorderby mandating that psychiatry be included as a subject in the Medical Baord Examination."
