congress_website_title = "AN ACT AMENDING THE STATUTORY PROVISION AUTHORIZING THE PRESIDENT OF THE PHILIPPINES TO MAKE NECESSARY ADJUSTMENT IN THE INTERNAL REVENUE ALLOTMENT OF LOCAL GOVERNMENT UNITS IN THE EVENT THAT THE NATIONAL GOVERNMENT INCURS AN UNMANAGEABLE PUBLIC SECTOR DEFICIT, AMENDING FOR THIS PURPOSE SECTION 284 OF REPUBLIC ACT NO. 7160"
congress_website_abstract = "Rationale: Any funding restriction or holdback will mean restraining the freedom of LGUs to operate and respond to the needs of their constitutents. This bill seeks to protect the IRA share of LGUs and ensure their continued delivery of basic services."
