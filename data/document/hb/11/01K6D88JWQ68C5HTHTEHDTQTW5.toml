congress_website_title = "AN ACT CREATING THE CENTER FOR STRATEGIC AND GLOBAL STUDIES AS AN INTELLECTUAL FACILITY TO ENHANCE CONDITIONS FOR GLOBAL COMPETITIVENESS AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: If enacted into law, this Bill's reason for being lies in the establishment of a Center for Strategic and Global Studies which will have the responsibility to serve the nerve-centers of the country's policy-making, in particular the Congress, by making strategic studies and global scenarios which can be the raw materials for policy-makers to work on in preparing the Philippine position in a highly competitive global economy."
