congress_website_title = "AN ACT PROVIDING RETIREMENT BENEFIT FOR PUNONG BARANGAY AND MEMBERS OF THE SANGGUNIANG BARANGAY WHO HAVE RENDERED SERVICE FOR THREE (3) COMPLETE TERMS"
congress_website_abstract = "Aside from the benefits now provided for them by law, every punong barangay or member of the sangguniang barangay who has servbed as such for three (3) complete terms shall, after his/her third term, be entitled for life to a monthly honorarium, whichever is higher."

