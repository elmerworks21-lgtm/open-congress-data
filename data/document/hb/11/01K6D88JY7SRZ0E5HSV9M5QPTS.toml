congress_website_title = "AN ACT FURTHER AMENDING ARTICLE 39, TITLE III OF EXECUTIVE ORDER NO. 226, OTHERWISE KNOWN AS THE OMNIBUS INVESTMENTS CODE OF 1987, AS AMENDED, AND FOR OTHER PURPOSES(RE: INCENTIVES TO REGISTERD ENTERPRISES RELATING TO INCOME TAX HOLIDAY; NOLCO;IMPORTED CAPITAL EQUIPMENT"
congress_website_abstract = "This bill grants additional incentives granted under the Omnibus Investment Act of 1987, such as: (1) extension of the tax holiday granted to pioneer firms; (2) carrying over of the net operating loss; (3) tax and duty exemption on imported capitalequipment, breeding stocks and genetic materials, etc."
