congress_website_title = "AN ACT GRANTING LIFETIME EXEMPTION FROM THE PAYMENT OF INCOME TAX AND TAX-EXEMPT CASH REWARDS TO FILIPINO ATHLETES AND PLAYERS WINNING GLOBAL SPORTS COMPETITIONS OR OTHER WORLD TOURNAMENTS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Filipino atletes or players, who bring honor and prestige to the Philippines by winning the championship or first place in global sports competitions or other world tournaments shall be granted a lifetime exemption from the payment of income tax anda tax-exempt cash reward of One Million Pesos (P1,000,000.00) ."

