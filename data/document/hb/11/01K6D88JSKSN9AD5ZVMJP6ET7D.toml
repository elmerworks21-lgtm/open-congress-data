congress_website_title = "AN ACT PROVIDING FOR OPTIMUM UTILIZATION OF PERSONNEL IN GOVERNMENT SERVICE THROUGH A SYSTEM OF ATTRITION, PROVIDING PENALTIES FOR VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "The term \"ATTRITION\" means the reduction of personnel as a result of resignation, retirement, dismissal in accordance with laws, death or transfer to another office. Within five (5) years from approval of this measure, NO appointment shall be made to fill vacated positions in any government office as a result of resignation, retirement, dismissal, death or transfer to another office of an officer or employee, except, on certain cases."
