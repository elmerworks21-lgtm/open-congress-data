congress_website_title = "AN ACT INSTALLING A REGIONAL GOVERNMENT UNDER A GOVERNOR TO ADMINISTER THE AFFAIRS OF THE NATIONAL CAPITAL REGION (NCR) AND FOR OTHER PURPOSES"
congress_website_abstract = "\"An Act Installing a Regional Government Under a Governor to Adminsiter the Affairs of the National Capital Region\". Rationale: In Metro Manila, policy relationship among the LGus just couldn't be reached because of the traditional mutual hostilityin place. Each local official, endowed with a rugged spirit of independence - with a mind of his own, coupled with a strong mixed socio-economic and political porfolio - wouldn't just easily abdicate his authority. No doubt, the NCR has an overwhelming array of public problems that ignore boundary lines - pollution, poverty, transportation, land use, waste management and disposal, health, crime housing, urban renewal,w ater supply, electricity, etc. - PROBLMES OF REGIONAL DIMENSION. The presentt arrangement is an extreme example of an institutional lag which inhibits the area from arriving at a single solution for all to adopt in dealing with common problems and needs."
