congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8291, OTHERWISE KNOWN AS THE `THE GOVERNMENT SERVICE INSURANCE SYSTEM (GSIS) ACT OF 1997', TO RE-INSTITUTE THE COMPULSORY MEMBERSHIP OF THE UNIFORMED PERSONNEL OF THE PHILIPPINE NATIONAL POLICE (PNP), BUREAU OF JAILMANAGEMENT AND PENOLOGY (BJMP) AND BUREAU OF FIRE PROTECTION (BFP) UNDER THE GSIS"
congress_website_abstract = "Rationale: With the disenfranchisem ent of the uniformed personnel of the PNP, BJMP and the BFP of their GSIS compulsory membership and while the viability of the insurance program PSMFI (Public Safety Mutual Benefit Fund, INc.) remain uncertain, it is essential that the social security protection of said personnel be RESTORED immediately."
