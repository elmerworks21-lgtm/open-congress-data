congress_website_title = "AN ACT INSTITUTING A PROGRAM FOR THE CONTINUING EDUCATION OF COLLEGE TEACHERS, AMENDING FOR SUCH PURPOSE REPUBLIC ACT NO. 7784, OTHERWISE KNOWN AS \"AN ACT TO STRENGTHEN TEACHER EDUCATION IN THE PHILIPPINES BY ESTABLISHING CENTERS OF EXCELLENCE, CREATING A TEACHER EDUCATION COUNCIL FOR THE PURPOSE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
