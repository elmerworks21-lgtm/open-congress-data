congress_website_title = "AN ACT RETURNING TO THE NATIONAL GOVERNMENT THE DEVOLVED HEALTH SERVICES AND FACILITIES, AND APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "REVERTS to the national government the health services and facilities devolved to the local government units by virtue of the Local Government Code with the purpose of correcting the ill-effects brought about by the devolution that led to the deterioration of health services, particularly in depressed and far-flung areas where services are needed most."

