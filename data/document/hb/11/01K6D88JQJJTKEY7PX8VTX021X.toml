congress_website_title = "AN ACT PROHIBITING CABLE TV COMPANIES TO OPERATE CABLE CHANNEL WITH COMMERCIAL ADVERTISEMENT PROVIDING PENALTIES FOR VIOLATORS"
congress_website_abstract = "Rationale: Cable TV companies are committed to provide uninterrupted cable channel programs in exchange for monthly fees from subscribers. Allowing them to provide commercial advertisement will give them added income that will be unfair to regular television, which does not charge monthly fees from its viewers."
