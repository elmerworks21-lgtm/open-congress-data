congress_website_title = "AN ACT REQUIRING DEVELOPERS OF INDUSTRIAL ESTATES TO ALLOCATE AT LEAST EIGHTEEN PERCENT (18%) OF THE TOTAL AREA OF THE ESTATE AS OPEN SPACE FOR GREENBELTS, MINI-FORESTS OR PUBLIC PARKS PLANTED WITH TREES, PROVIDING FINES AND OTHER ADMINISTRATIVE SANCTIONS FOR VIOLATIONS THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "Developers of industrial estates shall allocate at least eighteen percent (18%) of the total land area of the estate, exclusive of roads, service streest and alleys, for greenbelts and mini-forests or public parks planted with trees for the enhancement of the environment and at the same time serving as resting places for the people around it. No application for the devleopment of an industrial estate shall be approved by the appropriate government agency unless this provision has been compliedwith. For the purpose of this Act, INDUSTRIAL ESTATE shall refer to areas designated or intended for the development of factories and warehouses."
