congress_website_title = "AN ACT DECLARING TORTURE A CRIME, PRESCRIBING PENALTIES FOR COMMISION OF ACTS OF TORTURE AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Torture Act of 1998\". Identifies what acts constitute (1) PHYSICLA TORTURE, as well as (2) MENTAL/PSYCHOLO GICAL TORTURE\". Declares \"TORTURE\" as a criminal act. The individuals who actually participated in the infliciton of physical and mentalharm, as well as the individual present during the said acts, shall be LIABLE as principals."
