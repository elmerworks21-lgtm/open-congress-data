congress_website_title = "AN ACT ABOLISHING THE ECONOMIC INTELLIGENCE AND INVESTIGATION BUREAU (EIIB) AND FOR OTHER PURPOSES"
congress_website_abstract = "The Economic Intelligence and Investigation Bureau (EIIB) was established to gather evidence of illegal activities affecting the national economy, such as but not limited to, economic sabotage, smuggling, tax evasion and dollar salting. Since the EIIB was created in January 1987 up to the present, the EIIB proved inefective in curbing economic related crimes."
