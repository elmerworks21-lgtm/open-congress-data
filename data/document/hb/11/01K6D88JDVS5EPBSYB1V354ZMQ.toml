congress_website_title = "AN ACT EXEMPTING FROM THE VALUE-ADDED TAX CERTAIN SALE OF SERVICES, AMENDING FOR THE PURPOSE THE TAX REFORM ACT OF 1997"
congress_website_abstract = "Sale of services by the following shall be EXEMPT from the VAT: Services rendered by (1) banks, nonbank financial intermediaries, finance companies; (2) actors, talents, singers, radio and TV broadcasters; (3) professional athletes; and (4) registered general professional partnerships."
