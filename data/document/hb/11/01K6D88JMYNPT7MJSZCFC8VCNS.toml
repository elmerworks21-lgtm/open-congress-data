congress_website_title = "AN ACT MANDATING THE PAYMENT OF RETIREMENT AND OTHER BENEFITS TO GOVERNMENT RETIREES ON THE DATE OF THEIR RETIREMENT, AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Seeks to require payment of retirement benefits on the day of its effectivity. Penalizes violation of this Act with a P10,000.00 to P20,000.00 fine, or imprisonment of six (6) months to six (6) years."
