congress_website_title = "AN ACT PRESCRIBING A RETIREMENT SCHEME FOR ALL SEAGOING VESSELS WITH PHILIPPINE REGISTRY, IMPOSING A MORATORIUM IN THE IMPORTATION OF CERTAIN VESSELS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The following vessels shall be subject to retirement and may NOT be used for the same purpose in any body of water in the country: (1) passenger vessels over 25 years old; (2) tankers over 15 years old; and cargo vessels over 25 years old."
