congress_website_title = "AN ACT EXEMPTING FROM DOCUMENTARY STAMP TAX THE BORROWING AND LENDING OF SECURITIES UNDER THE AUSPICES OF THE LOCAL STOCK EXCHANGE, AMENDING FOR THE PURPOSE SECTION 180 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "The exemption, will lead to the creation of other taxable transactions not possible without SBL (Securities Borrowing and Lending), like Short Selling defined as the sale of borrowed securities. Also, this will encourage the trading of other derivative instruments that require the SBL facility. Furthermore, this will bring onshore the borrowing and lending of Philippine securities happening offshore. Studies made by the PSE show that the exemption will result not to a loss of revenues for the government, but to additional and potential revenues of about Ph162 million per year from DST, Stock Transaction Taxes, VAT, Income Taxes on Commission Income, and Final Tax on Interest Income, on the additional trading transactions in the stock markeet."
