congress_website_title = "AN ACT AMENDING SECTION 79 (a) OF BATAS PAMBANSA BLG. 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "Broadens the definition of the term \"CANDIDATE\" as referred to in the Omnibus Election Code to mean one WHO HAS PUBLICLY ANNOUNCED THE SAME OR WHO HAS, THROUGH OTHER ANALOGOUS ACTS PERFORMED WITHIN NINETY (90) DAYS PRIOR TO THE START OF THE CAMPAIGNPERIOD, OPENLY MANIFESTED HIS DESIRE TO SEEK AN ELECTIVE PUBLIC OFFICE, WHETHER OR NOT HE HAS FILED A CERTIFICATE OF CANDIDACY BY HIMSELF OR THROUGH AN ACCREDITED POLITICAL PARTY."

