congress_website_title = "AN ACT PROVIDING FOR THE INCREASE IN MEDICAL CARE BENEFITS UNDER PRESIDENTIAL DECREE NO. 1519 OTHERWISE KNOWN AS THE `REVISED PHILIPPINE MEDICAL CARE ACT' TO COVER NO LESS THAN SEVENTY-FIVE PERCENT (75%) OF MEDICAL EXPENSES INCURRED BY MEDICARE MEMBERS"
congress_website_abstract = "Aims to alleviate the difficulty of ordinary workers in meeting hospitalization and other medical expenses by providing more realistic rates of medical care benefits to medicare members. Tasks the Philippine Medical Care Commission to REVISE the present rates of medical care benefits to SEVENTY-FIVE PERCENT (75%) to conform to the increase provided in this Act. Increases therefore the rate of contribution of its members to meet the needed additional funds."

