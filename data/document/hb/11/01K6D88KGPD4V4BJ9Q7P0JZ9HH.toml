congress_website_title = "AN ACT ESTABLISHING A MAGNA CARTA FOR THE PHILIPPINE NATIONAL POLICE"
congress_website_abstract = "\"Magna Carta for the Philippine National Police.\" This bill aims to effect reforms in the PNP organization by professionalizi ng it and ensuring that everyone in the PNP roster enjoys his/her basic rights and privileges throughout his/her entire career in the police service and upon retirement thereof. The provisions provided in this bill uphold the basic rights of the police personnel including the right to equal opportunity in promotion and assignment by establishing an efficient merit system and promotion program, the right to receive continuing in-service quality education and training programs, the right of security of tenure and the right to present his complaints and grievance to his/her superior officer. this proposed legislatioon primarily aims to address the inadequacies and flaws of the present PNP structure, organization and operation."

