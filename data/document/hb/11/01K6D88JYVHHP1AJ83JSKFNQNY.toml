congress_website_title = "AN ACT REGULATING THE INVESTIGATION OF MARITIME ACCIDENTS, PROVIDING FOR EARLY INVESTIGATION AND FINDINGS OF FACTS, AND FOR OTHER PURPOSES"
congress_website_abstract = "In case of sinking and/or damage to motor vessels or ships caused by collisions, overloading, fire or by typhoons, the Maritime Board of Inquiry to be convened by the Philippine Navy shall immediately conduct an investigation and hearing to determine the cause of the accident or incident, the party or parties at fault or negligent."
