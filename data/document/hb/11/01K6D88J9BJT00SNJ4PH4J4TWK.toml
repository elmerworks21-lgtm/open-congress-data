congress_website_title = "AN ACT REGULATING THE IMPOSITION OF INTEREST RATES ON LOANS GRANTED TO SMALL BORROWERS BY PAWNSHOPS, AMENDING FOR THIS PURPOSE, PRESIDENTIAL DECREE NO. 114, OTHERWISE KNOWN AS THE PAWNSHOP REGULATION ACT"
congress_website_abstract = "Recommends the following interest rates on loans extended by pawnshops and pawnbrokers: (1) 6% per annum --- for a loan less than P2,000.00; (2) 7% per annum --- for a P2,000.00 to P5,000.00 loan; and (3) 9% per annum --- for a loan more than P5,000.00."
