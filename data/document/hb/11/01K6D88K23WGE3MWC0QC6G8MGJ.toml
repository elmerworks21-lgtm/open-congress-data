congress_website_title = "AN ACT REQUIRING THE PUBLICATION IN THREE (3) NEWSPAPERS OF NATIONAL AND GENERAL CIRCULATION THE LIST OF RECOMMENDEES FOR EXECUTIVE CLEMENCY, PENALIZING THE FAILURE THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "The publication of the names of the recommendeed for executive clemency shall be made at least thirty (30) days prior to the submittal by the Chairman of the Board of Pardons and Parole to the President of the Philippines of the list of recommendeesfor executive clemency. Any violation of this Act by the Chairman and the Members of the Board of Pardons and Parole shall be punishable by a fine of P10,000.00 or imprisonment of six (6) months, or both at the discretion of the court."
