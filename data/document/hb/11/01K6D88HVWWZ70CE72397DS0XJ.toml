congress_website_title = "AN ACT TO PROTECT THE FOREST BY BANNING ALL COMMERCIAL LOGGING OPERATIONS, PROVIDING MECHANISMS FOR ITS EFFECTIVE ENFORCEMENT AND IMPLEMENTATION AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Total commercial Logging Ban Act of 1998\". The author explains that \"the policy reform for a total log ban has been too much delayed and compromised to the detriment of the next generation. The time to act is now.\" Declares it UNLAWFUL for any person to cut, fell, or destroy any tree or engage in commercial logging operations for a period of at least THIRTY (30) YEARS from the effectivity of this Act."
