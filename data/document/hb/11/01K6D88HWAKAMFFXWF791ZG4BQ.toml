congress_website_title = "AN ACT APPROPRIATING FUNDS FOR THE OPERATION OF THE BARANGAY AGRARIAN REFORM COUNCIL (BARC), AND ALLOWANCES FOR ITS MEMBERS"
congress_website_abstract = "Appropriates Forty Million Pesos (P40 M) annually from the budget of the Department of Agrarian Reform (DAR) to defray the operation of the Barangay Reform Council (BARC) of which sixty percent (60%) will go to the procurement of supplies for its operation while the balance will be allotted on per diem basis for the BARC members."

