congress_website_title = "AN ACT GUARANTEEING THE CORRECT AND PROMPT PAYMENT OF WORKERS' WAGES AND OTHER BENEFITS PROVIDED BY LAW THROUGH THE BANKING SYSTEM, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-SEVEN HUNDRED AND TWENTY-SEVEN, OTHERWISE KNOWN AS THE WAGES RATIONALIZATION ACT"
congress_website_abstract = "Requires all private establishments, companies, businesses and other entities with at least twenty five (25) employees and located within one (1) kilometers radius to a commercial, savings or rural bank to pay the wages and other benefits of their employees through any of the said banks. Prohibits the banks to require more than P100.00 as the lowest balance in individual accounts of employee."

