congress_website_title = "AN ACT ORDAINING REFORMS IN THE ELECTRIC POWER INDUSTRY AND THE GOVERNMENT ENERGY SECTOR TO ENSURE THE TOTAL ELECTRIFICATION OF THE PHILIPPINES AND STRENGTHENING THE PARTICIPATION OF THE PRIVATE SECTOR IN POWER GENERATION, TRANSMISSION AND DISTRIBUTION, FOR SAID PURPOSES, AMENDING CERTAIN LAWS, AND FOR OTHER PURPOSES (omnibus)"
congress_website_abstract = "\"Omnibus Power Industry Act of 1998\". Promotes competition in generation and supply of electricity; provides safeguards against monopolization and eartels. Withdraws the major portion of government investments in generating plantsl promotes privatesector investments. Promotes participation of customers; encourages ownership of share or equity."
