congress_website_title = "AN ACT UPGRADING THE EXISTING FACILITIES OF THE VETERANS MEMORIAL MEDICAL CENTER (VMMC) THROUGH A FIVE (5)-YEAR MODERNIZATION PLAN AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This bill seeks to modernize and upgrade the existing facilities of the Veterans Memorial Medical Center (VMMC) through the VMMC Five-Year Modernization Plan. The VMMC is envisioned to be equipped with modern health equipment and facilities which shall include well-trained medical staff and other personnel to attend to the health and other medical needs of the veterans. This is one way of showing our concern for, and acknowledgment of the sacrifices and heroic deeds of our veterans."
