congress_website_title = "AN ACT ALLOCATING FIFTY PERCENT (50%) OF VALUE-ADDED TAX COLLECTIONS TO HEALTH AND EDUCATION SERVICES, AGRICULTURAL FACILITIES AND SERVICES, HOUSING, ENVIRONMENTAL PROTECTION, AND OTHER SOCIAL SERVICES THEREBY AMENDING THE NATIONAL INTERNAL REVENUECODE, AS AMENDED"
congress_website_abstract = "Allocates FIFTY PERCENT (50%) of the total value-added tax (VAT) collections for a period of FIVE YEARS beginning fiscal year 1999 to directly finance programs for social reform and poverty alleviation and institutional intervention mechanisms, without having to be subjected to the bureaucracy's layers of discretion."

