congress_website_title = "AN ACT ESTABLISHING AN INTEGRATED POPULATION AND DEVELOPMENT POLICY STRENGTHENING ITS IMPLEMENTING STRUCTURES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Among a host of development problems that includes poverty, social inequities and injustice, various population factors contributed and continue to contribute to stunting the full development of Filipinos. It has also severely reduced thecapability of government to provide basic services, further develop the rural areas and stem the tide of rapid urbanization and migration. > This bill, guided by the above principles and the multi-faceted nature of the problems besetting the countryand its people, proposes tht the State ultimately recognize the interdependence between population, development and environment."
