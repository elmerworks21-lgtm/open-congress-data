congress_website_title = "AN ACT ESTABLISHING THE BARANGAY INTEGRATED DEVELOPMENT APPROACH FOR NUTRITION IMPROVEMENT (BIDANI) OF THE RURAL POOR AS A NETWORK PROGRAM OF THE PARTICIPATING STATE COLLEGES AND UNIVERSITIES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"BIDANI Act of 2000.\" Rationale: It is the policy of the State to recognize nutrition as a basic human right, just as the right to health and to life are. Towards this end, the state shall promote vigorously the importance of nutrition as a public good and public concern which can be achieved only through multi-sectoral efforts and democratic process. It shall work towards the provision of the nutritional needs of the sector of Filipino society who are deprived of the said right. Moreover, thestate shall give utmost support to programs and projects that are responsive to the nutritional needs of the people."

