congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8436, ENTITLED 'AN ACT AUTHORIZING THE COMMISSION ON ELECTIONS TO USE AN AUTOMATED ELECTION SYSTEM IN THE MAY 11, 1998 NATIONAL OR LOCAL ELECTIONS AND IN SUBSEQUENT NATIONAL AND LOCAL ELECTORAL EXERCISES, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES'"
congress_website_abstract = "The proposed law would enable the Comission on Elections (COMELEC) to acquire the latest and most efficient technology suitable to the local setting. It would also authorize the implementation of the automated election system in selected areas forpurposes of the May 14, 2001 elections which would enable the COMELEC to further study and improve the most appropriate and feasible systems and technologies for Philippine elections."
