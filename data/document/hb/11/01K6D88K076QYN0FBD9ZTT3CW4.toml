congress_website_title = "AN ACT MANDATING THE DEPARTMENT OF HEALTH TO INTEGRATE THE BOTIKA BINHI PROGRAM AS A REGULAR PROGRAM OF THE NATIONAL GOVERNMENT"
congress_website_abstract = "Botika Binhi is a Community Drug Insurance Program (CDIP) which aims to make drugs affordable, available, and accessible to the people in the barangays, especially those in depressed and marginalized communities. Under this program, members of the community are encouraged to save for one's health through organized collective effort, thus the initial capital for the establishment of community pharmacies comes from the community."
