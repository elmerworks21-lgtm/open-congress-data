congress_website_title = "AN ACT MAINTAINING THE PRESENT PROVISION ON PROBATIONARY EMPLOYMENT INCREASING AT THE SAME TIME THE GOVERNMENT'S PROTECTION TO PROBATIONARY EMPLOYEES, AMENDING FOR THIS PURPOSE ARTICLE 281 OF THE LABOR CODE"
congress_website_abstract = "Provides that PROBATIONARY employment shall NOT exceed six (6) months from the date the employee started working, unless it is covered by an apprenticeship agreement stipulating a longer period. States that the services of an employee who has been engaged on a probationary basis may be terminated for a just cause or when he fails to qualify as a regular employee in accordance with reasonable standards made known by the employer to the employee at the same time of his engagement."
