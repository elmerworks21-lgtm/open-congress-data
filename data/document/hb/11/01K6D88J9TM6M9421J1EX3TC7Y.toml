congress_website_title = "AN ACT PROVIDING INDIGENT AGRICULTURAL TENANTS, TILLERS, SETTLERS AND FARMWORKERS INVOLVED IN CIVIL, CRIMINAL OR ADMINISTRATIVE CASES ARISING FROM OR CONNECTED WITH AN AGRARIAN DISPUTE WITH FREE LEGAL COUNSEL OF THEIR OWN CHOICE"
congress_website_abstract = "Under this bill, the tenant, tiller, settler and farmworker involved in a civil, criminal or administrative case may seek FREE legal counsel from the Bureau of Agrariran Legal Assistance (BALA) or from a private lawyer whose services shall be paid by the Dept. of Agrarian Reform."

