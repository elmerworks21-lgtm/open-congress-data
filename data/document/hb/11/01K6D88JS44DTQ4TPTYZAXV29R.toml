congress_website_title = "AN ACT PROVIDING GRATUITY TO BARANGAY CAPTAINS UNDER CERTAIN CONDITIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This bill aims to provide barangay captains with an incentive. They will be given gratuity when they complete their term, resigned, become incapacitated to discharge their duties, or die while serving their term, on the condition that they have served as barangay captains for at least two (2) consecutive terms and therafter re-elected to the same position."

