congress_website_title = "AN ACT REGULATING THE PRACTICE OF RESPIRATORY THERAPY AND CREATING THE BOARD OF EXAMINERS FOR RESPIRATORY THERAPISTS, PROVIDING FOR ITS STRUCTURE AND ORGANIZATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Respiratory Act of 2000\". This bill substantiates the policy of the State to recognize the vital role of respiratory therapy, as a profession, and to assume responsibility for its protection and improvement by instituting measures that will result in relevant education, better carer prospects and a dignified and ethical practice of the profession. Respiratory Therapy is an allied health specially employed with medical direction in the treatment, management, control, diagnostic evaluation and care of patients with deficiencies and abnormalities in the cardiopulmonary system."
