congress_website_title = "AN ACT INSTITUTING POLICIES GOVERNING THE HOUSEHOLD EMPLOYMENT INDUSTRY, ESTABLISHING A STANDARD OF PROTECTION AND PROMOTING THE WELFARE OF HOUSEHOLD HELPERS AND THEIR FAMILIES"
congress_website_abstract = "\"BATAS KASAMBAHAY\" Rationale: The proposed Batas Kasambahay seeks to redress the grave injustice on this significant section of the labor force, by providing the basic structure that would uphold their dignity and protect their rights and privileges. Let it not be construed however, that the Batas Kasambahay will fully correct the societal imbalance prevalent in this sector, for the circumstances are so complex and the inter-relations hips so intricate. But we have to start somewhere. Let the Batas Kasambahay be the springboard by which other laws that seek to protect the interests of our fellow Filipinos are enacted by this august body."
