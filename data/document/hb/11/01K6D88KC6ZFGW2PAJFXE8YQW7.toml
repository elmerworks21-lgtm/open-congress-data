congress_website_title = "AN ACT GRANTING TO ALL REGISTERED/BONA FIDE STALL HOLDERS FOR TEN (10) YEARS IN ALL PUBLIC MARKETS A CREDIT/CHARACTE R LOAN OF FIFTY THOUSAND PESOS (P50,000.00) UPON PAYMENT OF BUSINESS PERMIT EQUIVALENT TO TWICE THE AMOUNT AND SALES TAX ON THEIR PRESENT FINANCIAL STATEMENT AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: It will be noted that the government awarded 10,000 per square meters of land or one hectare to the farmers as assistance and credit line from the agri-agra law to finance the cultivation of land. If similar benefits can be extended to million market vendors, a healthy business climate will ensue and lead to economic recovery. The loand from private or government bank shows that the essence of equality in a democratic country is not lost in legality to the share of every Filipino toimprove the present stable marketing of the vendors."

