congress_website_title = "AN ACT AUTHORIZING PRESIDENT JOSEPH EJERCITO ESTRADA TO EXERCISE LIMITED SPECIAL POWERS NECESSARY AND PROPER FOR THE REHABILITATION AND DEVELOPMENT OF MINDANAO AND FOR OTHER PURPOSES"
congress_website_abstract = "\"MINDANAO CRISIS ACT OF 2000.\" It is the policy of the State to adopt suitable and sufficient measures to fast track and establish a firm legal foundation for the rehabilitation and development of Mindanao, in the light of the socio-economic crisisand peace and order situation prevailing on the whole island. In realtion thereto, there shall be a full integration of all rehabilitation and development plans and programs of homogeneous co-related growth areas in accordance with the individual need and comparative advantage of each growth area in the whole of Mindanao. > To cope with the crisis, and consistent with SAection 23 (2) Article VI of the 1987 Constitution, there is an urgent need to grant the President limited and specific powerss to restore peace and order, and to achieve propserity for the general welfare, and the for the greatest good of the greatest number of the inhabitants of Mindanao."
