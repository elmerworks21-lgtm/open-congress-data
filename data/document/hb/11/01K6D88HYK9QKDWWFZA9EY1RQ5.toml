congress_website_title = "AN ACT PROHIBITING THE PUBLIC DISPLAY OF PERSONS, ARRESTED, ACCUSED, OR UNDER CUSTODIAL INVESTIGATION IN A DEGRADING MANNER, AND AMENDING FOR SUCH PURPOSE REPUBLIC ACT NO. 7438, ENTITLED `AN ACT DEFINING CERTAIN RIGHTS OF PERSONS ARRESTED, DETAINEDOR UNDER CUSTODIAL INVESTIGATION AS WELL AS THE DUTIES OF THE ARRESTING, DETAINING, AND INVESTIGATING OFFICERS AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF'"
congress_website_abstract = "Expands the protection given to persons arrested, accused, or under custodial investigation by safeguarding their privacy and reputation, pending trial and conviction by prohibiting the public display and presentation to the press without their voluntary and informed consent and/or without the assistance of a counsel."
