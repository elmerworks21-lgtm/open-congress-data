congress_website_title = "AN ACT REQUIRING EMPLOYERS IN THE PRIVATE SECTOR TO HAVE IN THEIR EMPLOY DISABLED, AND PROVIDING ADDITIONAL INCENTIVE THEREFOR, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SEVENTY-TWO SEVENTY-SEVEN, OTHERWISE KNOWN AS THE MAGNA CARTA FOR DISABLEDPERSONS"
congress_website_abstract = "Requires every private sector employer to ensure that THREE PERCENT (3%) of his workforce, inclusive of managerial and supervisory personal, is composed of DISABLED PERSONS. Provides INCENTIVES to such employers. Penalizes violation of this Act."

