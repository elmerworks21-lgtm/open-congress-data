congress_website_title = "AN ACT CREATING THE BOARD FOR OCCUPATIONAL THERAPISTS THEREBY AMENDING REPUBLIC ACT NO. 5680"
congress_website_abstract = "\"Philippine Occupational Theraphy Law of 1998\". RA 5680 has never been updated to respond to current global trend and national development. This bill, therefore, aims to upgrade and update the competence, knowledge, skills and attitudes of the Filipino occupational therapists to make them globally competitive and nationally accessible to our disabled population."
