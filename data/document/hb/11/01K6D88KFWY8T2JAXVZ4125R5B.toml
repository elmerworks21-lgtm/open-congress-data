congress_website_title = "AN ACT INSTITUTING ELECTORAL REFORMS AGAINST POST-ELECTORAL FRAUD, DEFINING AND PENALIZING THE SAME WITH RECLUSION PERPETUA, AND AMENDING THE OMNIBUS ELECTION CODE OF THE PHILIPPINES (BATAS PAMBANSA BLG. 881) FOR THIS PURPOSE"
congress_website_abstract = "Rationale: A good number of provisions dealing with acts of tampering or similar fraudulent acts are found under Sec. 261 of the Omnibus Election Code and amendatory laws like R.A. No. 6646 and R.A. No. 7166. These prohibited acts and election offenses, however, do not contemplate the frauds that are committed AFTER the election records and paraphernalia are ostensibly placed in safekeeping and preservation to await the disposition of any election contest. Amendatory provisions should thus be introduced so as to make aforesaid provisions APPLY squarely to POST-ELECTION acts and make these punishable by a much more severe penalty than that presently imposed."

