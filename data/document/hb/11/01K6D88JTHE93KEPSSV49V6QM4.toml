congress_website_title = "AN ACT INCREASING THE INSURANCE COVERAGE OF BANK DEPOSITS OF DEPOSITORS FROM ONE HUNDRED THOUSAND PESOS (P100,000.00) TO TWO HUNDRED THOUSAND PESOS (P200,000.00) OR ONE HALF (1/2) OF THE DEPOSIT, WHICHEVER IS HIGHER, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED THIRTY-FIVE HUNDRED AND NINETY-ONE, AS AMENDED, ENTITLED \"AN ACT ESTABLISHING THE PHILIPPINE DEPOSIT INSURANCE CORPORATION, DEFINING ITS POWERS AND DUTIES, AND FOR OTHER PURPOSES\""
congress_website_abstract = "It is the declared policy of the State to encourage the accumulation of savings and deposits in banks in recognition of the immense contribution of these funds to the socio-economic development of the country. In order to encourage the accumulationof more deposits, the deposit insurance scheme has been adopted to generate public faith and confidence in the banking system."
