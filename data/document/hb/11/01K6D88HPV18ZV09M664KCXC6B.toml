congress_website_title = "AN ACT RE-NATIONALIZIN G DEVOLVED HEALTH SERVICES AND FACILITIES, AND APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Re-Nationaliza tion of Devolved Health Services and Facilities Act of 1998\". RETURNS to the Department of Health all health services and facilities that were devolved to the local government units under RA 7160 to further prevent its deterioration;provide essential health services to the people ; improve and uplift the morale, social and economic well-being of devolved health workers; and develop a professional health manpower that is responsive to the people's health needs and problems."
