congress_website_title = "AN ACT MANDATING THE EXAMINATION OF THE BOOKS OF ACCOUNTS OF EVERY BANKING INSTITUTION, ONCE IN EVERY SIX (6) MONTHS, AMENDING FOR THE PURPOSE THE NEW CENTRAL BANK ACT"
congress_website_abstract = "Directs the supervising and examining department head, personally or by deputy, to EXAMINE the books of every banking institution once every SIX (6) months, and at such other times as the Monetary Board, by an affirmative vote of five (5) members, may deem expedient or necessary, for the national interest or to safeguard the depositors' interest, and to make a report to the Board."
