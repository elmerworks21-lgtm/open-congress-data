congress_website_title = "AN ACT REQUIRING COMPANIES TO CONDUCT AN ASSESSMENT OF THE CAPABILITY OF THEIR COMPUTER SYSTEMS TO DEAL WITH CALENDAR DATES AFTER 31ST DECEMBER 1999 AND TO REPORT BOTH ON THOSE ASSESSMENTS AND ON THE ACTIONS THEIR DIRECTORS PROPOSE TO TAKE IN CONSEQUENCE"
congress_website_abstract = "\"millenium Computer Compliance Act of 1998\". Directs the companies in each financial year ending before the 31st day of December 1999 to assess the capability of the operation of their computer systems that are essential to the continued traind programmed to manipulate calendar dates to be able to deal accurately with the dates later than 31st December 1999 which shall be called \"the millenium computer assessment.\""
