congress_website_title = "AN ACT COMPLYING WITH THE CONSTITUTIONAL MANDATE TO RENDER A MEASURE OF JUSTICE TO THE VICTIMS OF HUMAN RIGHTS VIOLATIONS AS A CONSEQUENCE OF THE PROCLAMATION OF MARTIAL LAW, AND THEREAFTER, BY COMPENSATING THEM, AND FOR OTHER PURPOSES"
congress_website_abstract = "All bona fide victims of human rights violations, such as salvaging, disappearances, torture, rape, unlawful arrest, indefinite detention without charges, and the like are entitled to compensation as a matter of constitutional rights and of plain and simple justice and may file claims for the purpose."

