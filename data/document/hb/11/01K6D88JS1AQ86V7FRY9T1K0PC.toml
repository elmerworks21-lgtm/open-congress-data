congress_website_title = "AN ACT TO EXEMPT SENIOR CITIZENS FROM THE TWENTY PERCENT (20%) FINAL WITHHOLDING TAX ON INTEREST INCOME FROM PHILIPPINE CURRENCY BANK DEPOSIT, AMENDING FOR THE PURPOSE SECTIONS THREE AND SIX, PARAGRAPH C OF THE BUREAU OF INTERNAL REVENUE REGULATIONSNO. 2-94"
congress_website_abstract = "A QUALIFIED SENIOR CITIZEN SHALL BE ENTITLED TO THE TWENTY PERCENT (20%) TAX EXEMPTION FROM THE FINAL WITHHOLDING TAX ON INTEREST INCOME FROM PHILIPPINE CURRENCY BANK DEPOSIT: PROVIDED, THAT ONLY FIVE HUNDRED THOUSAND PESOS (P500,000.00) MAXIMUM AMOUNT OF DEPOSIT SHALL BE ALLOWED FOR THE EXEMPTION; PROVIDED FURTHER, THAT A SENIOR CITIZEN WHO AVAILS THIS EXEMPTION SHALL BE REQUIRED TO SUBMIT HIS/HER LIST OF BANK DEPOSITS INCLUDING BANK CERTIFICATIONS ATTESTING THE AUTHENTICITY OF HIS/HER DEPOSIT FOR PURPOSES OF FINAL COMPUTATION AS TO THE MAXIMUM AMOUNT OF DEPOSIT REQUIRED FOR EXEMPTION."
