congress_website_title = "AN ACT TO PROVIDE FOR THE PRESERVATION AND CULTIVATION OF THE FILIPINO HERITAGE AMONG FILIPINOS OVERSEAS THROUGH THE TEACHING OF FILIPINO LANGUAGE AND HISTORY, ASSISTANCE IN THE ESTABLISHMENT AND OPERATION OF PHILIPPINE SCHOOLS AND FILIPINIANA RESOURCE CENTERS ABROAD, AND THE CREATION OF A COMMITTEE ON HERITAGE AND CULTURE FOR OVERSEAS FILIPINOS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Education and Heritage Program for Overseas Filipinos Act of 1998\". Seeks to promote Filipino heritage and culture among Filipinos overseas by: (1) conducting classes in Filipino and Philippine history; (2) assisting in the establishment and operation of Philippine schools abroad; and (3) establishing Filipiniana Resources Centers."

