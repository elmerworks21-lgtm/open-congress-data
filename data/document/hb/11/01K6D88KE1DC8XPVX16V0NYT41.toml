congress_website_title = "AN ACT DESIGNATING THE PHILIPPINE PHILHARMONIC ORCHESTRA AS THE NATIONAL ORCHESTRA OF THE PHILIPPINES, DEFINING ITS ROLE AND FUNCTIONS AS SUCH, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "In recognition of its efforts and numerous awards it has received for and in behalf of the Philippines, the Philippine Philharmonic Orchestra (PPO) is designated as the country's national orchestra. The bill grants the orchestra and its members certain benefits, such as exemption from civil service laws; free use of office space, rehearsal free use of office space, rehearsal studios, and production and technical facilities at the CCP; and travel and project grants for research, documentation, and production from the National Commission for Culture and the Arts (NCCA). On the other hand, the PPO will be mandated to, among others, recruit and develop new talents from all over the country; and disseminate, produce, and preserve Philippine mussic and prepare and set new, superior and serious goals for the new millenium for national performances and international tours."

