congress_website_title = "AN ACT PRESCRIBING URGENT RELATED MEASURES NECESSARY AND PROPER TO EFFECTIVELY ADDRESS THE CURRENT SOCIOECONOMIC EMERGENCY IN LUZON, VISAYAS AND MINDANAO, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to grant limited emergency powers to President Joseph Ejercito Estarda for the rehabilitation of poverty-ridden provinces, especially those which are members of the 20 Most Depressed Provinces in the Philippines, and the war-torn areas in Mindanao for three years. It is intended for the speedy rehabilitation and economic development of the nation that will lead to a conducive environment to spur business development, local and foreign investments and the integration with various sectors for effectiveness of programs and projects."
