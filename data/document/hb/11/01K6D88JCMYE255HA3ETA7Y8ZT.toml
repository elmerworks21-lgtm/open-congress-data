congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED SEVENTY-SIX HUNDRED AND SIXTY-TWO, OTHERWISE KNOWN AS THE \"LEGAL EDUCATION REFORM ACT OF 1993\"(RE: MEMBERSHIP IN THE BOARD)"
congress_website_abstract = "Proposes the following amendments to the Legal Education Board: (1) Allowing a former Dean of Law to seat in the Board, including two (2) active law practitioners, the DECS Secretary, the IBP President, the Philippine Association of Law Schools President, the Philippine Association of Law Professors President, and the President of the Association of Law Students in the Philippines. All members of the Board shall NOT receive any salary, except per diems."
