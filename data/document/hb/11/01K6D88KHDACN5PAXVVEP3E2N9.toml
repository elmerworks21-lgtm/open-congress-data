congress_website_title = "AN ACT DIRECTING THE COMMISSION ON ELECTIONS TO EXTEND THE REGISTRATION OF VOTERS FOR PURPOSES OF THE MAY 14, 2001 NATIONAL AND LOCAL ELECTIONS"
congress_website_abstract = "The Commission of Elections shall EXTEND the registration of voters nationwide for five (5) full days for purposes of the May 14, 2001 National and Local Elections in accordance with Republic Act No. 8189, otherwise known as the \"Registration Act of1996.\" The specific date of said extension of registration shall be for the 5-day period of February 1, 2001 through February 5, 2001."

