congress_website_title = "AN ACT TO AMEND REPUBLIC ACT NUMBERED TWENTY-THREE HUNDRED AND EIGHTY-TWO, OTHERWISE KNOWN AS THE \"MEDICAL ACT OF 1959\" AS AMENDED BY REPUBLIC ACT NOS. 4224 AND 5946"
congress_website_abstract = "Proposes amendments to the Medical Act of 1959, such as: (1) The Dept. of Education and Board of Medical Examiners is changed to COMMISSION ON HIGHER EDUCATION (CHED) AND BOARD OF MEDICINE, respectively; (2) expanded composition of the Board of Medical Education; (3) additional qualifications of candidates for the board examinations; (4) a new provision on the prosecution of illegal practices, etc."
