congress_website_title = "AN ACT ESTABLISHING A NATIONAL VOLUNTEER SERVICE PROGRAMME, STRENGTHENING GOVERNMENTAL MECHANISMS FOR THE REGULATION OF VOLUNTEER SERVICES AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill aims to encourage the promotion of volunteer service programmes for national development, social welfare and international understanding; and maximize the benefits that may be derived from volunteer service programs. It will support efforts of government agencies and the private sector in seeking the attainment of national development goals. >Thisproposed measure will establish a National Volunteer Service Programme to provide the necessary manpower and technical expertise for development projects undertaken in the country."

