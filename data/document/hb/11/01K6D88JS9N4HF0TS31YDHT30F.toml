congress_website_title = "AN ACT CODIFYING NATIONAL SECURITY LAWS BY PROVIDING FOR THE INTEGRATION OF NATIONAL SECURITY POLICIES, PLANS AND ACTIVITIES, AND FOR DEALING WITH EMERGENCIES AND OTHER GRAVE CIVIL DISTURBANCES THAT THREATEN THE SECURITY AND STABILITY OF THE NATIONAND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Teamwork and coordination as a strategy to unify the efforts of various agencies involved in the national security emphasize the basic responsibility of government that the entire system of government in close concert with the people should endeavor to provide responsive public services in key national security and development policy section. It should take initiatives for the legal, constructive, conciliatory and non-violent recourse to redress of people's grievances and to facilitate the formulation of the national agenda for peace."
