congress_website_title = "AN ACT AUTHORIZING THE COMMISSION ON ELECTIONS TO CONDUCT A PLEBISCITE NOT LATER THAN FORTY-FIVE (45) DAYS FROM JUNE 30, 2001 FOR THE APPROVAL OF THE AMENDMENTS TO REPUBLIC ACT NUMBERED SIXTY-SEVEN HUNDRED AND THIRTY-FOUR, AS AMENDED, AND FOR THIS PURPOSE, RESETTING THE DATE OF THE REGULAR ELECTIONS FOR ELECTIVE OFFICIALS OF THE AUTONOMOUS REGION IN MUSLIM MINDANAO (ARMM) ON NOVEMBER 26, 2001"
congress_website_abstract = "Rationale: This bill is intended to give the COMELEC sufficient time to adequately prepare for the first regular election under the Organic Act. Also, the authors take into consideration the observance of the Ramadan by our Muslim brothers sometimein December."
