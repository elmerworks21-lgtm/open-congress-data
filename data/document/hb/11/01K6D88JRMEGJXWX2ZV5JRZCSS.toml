congress_website_title = "AN ACT INSTITUTING FULL TRANSPARENCY IN TAX COLLECTION AND REPEALING SECTIONS 270 AND 278 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "This bill mandates the BIR and the Bureau of Customs to implement TOTAL TRANSPARENCY in tax collections. These agencies shall make available to the public all information related to tax collection, within a reasonable time frame and at a reasonablecost."
