congress_website_title = "AN ACT INCREASING THE PENALTIES FOR VIOLATIONS OF THE ANTI-CARNAPPING LAW, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-FIVE HUNDRED AND THIRTY-NINE, AS AMENDED BY SECTION TWENTY REPUBLIC ACT NUMBERED SEVEN THOUSAND SIX HUNDRED FIFTY-NINE, OTHERWISE KNOWN AS AN ACT PREVENTING AND PENALIZING CARNAPPING"
congress_website_abstract = "Penalizes the crime of carnapping with imprisonment of not less than [14 years and 8 months] SEVENTEEN (17) YEARS AND FOUR (4) MONTHS and not more than [17 years and 4 months) TWENTY (20) YEARS. DEATH shall be imposed if the owner, driver or occupant of the carnapped vehicle is killed or raped."
