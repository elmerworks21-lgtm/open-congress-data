congress_website_title = "AN ACT TO INSTITUTIONALIZ E A FREE PRE-AUDIT SYSTEM IN ALL GOVERNMENT FINANCIAL TRANSACTIONS IN ORDER TO ACCELERATE THE DELIVERY OF PUBLIC SERVICES"
congress_website_abstract = "In order to accelerate the delivery of public services, as well as to improve the operations of the government, all financial transactions of the national government agencies, local government units and government-owne d and/or- controlled corporations shall not be subject to pre-audit examinations. The Commission on Audit or its Auditors shall only conduct post-audit examination of all these financial transactions."
