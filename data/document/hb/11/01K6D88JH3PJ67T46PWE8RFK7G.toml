congress_website_title = "AN ACT DECRIMINALIZING VAGRANCY AND PROSTITUTION FOR CHILDREN AGED EIGHTEEN (18) YEARS AND BELOW, AMENDING ARTICLE TWO HUNDRED TWO OF THE REVISED PENAL CODE, PROVIDING REHABILITATION PROGRAMS AND FUNDING THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Vagrants belong to the underprivileged class of society; they are in continuous search for the basic necessities of life ... Majority of the prostitutes do not intend to be in their predicament. This bill seeks to consider vagrants and prostitutes as victims needing rehabilitation and deserving consideration."

