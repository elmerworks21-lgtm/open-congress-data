congress_website_title = "AN ACT ADOPTING THE MILITARY SYSTEM OF RANKING FOR MEMBERS OF THE PHILIPPINE NATIONAL POLICE, AMENDING FOR THE PURPOSE THE \"DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990\""
congress_website_abstract = "Rationale: Even members of the police force are fully sold on the idea of police ranks. they believe that the police ranking system is vague, and unlike the military system wherein the mere mention of a military rank, i.e. \"Sergeant\", one can discern his status, position level and authority in the organization."

