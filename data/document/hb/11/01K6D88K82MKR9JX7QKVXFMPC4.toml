congress_website_abstract = "A person can live without food for more than a month but he or she cannot survive without water even for just a week. Water is a basic human need that can spell the difference between well-being and ill-health. As a resource, water invaluably contributes to economic development. Thus, government needs to pursue water security with as much vigor as food security."
