congress_website_title = "AN ACT REORGANIZING THE BUREAU OF IMMIGRATION HEREINAFTER TO BE KNOWN AS THE COMMISSION ON IMMIGRATION AND NATURALIZATION, DEFINING ITS ORGANIZATIONAL STRUCTURE, AND THE POWERS AND FUNCTIONS THEREOF, PROVIDING A SPECIAL APPROPRIATION THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Immigration and Naturalization Act of 2000.\" Rationale: As the country enters the new millenium there are still several antiquated laws in our statute books which are no longer relevant to modern time. One of them is Commonwealth Act No.613 otherwise known as the \"Philippine Immigration Act of 1940\". although some amendments and revisions have been effected on this law, many of its provisions have ceased to be responsive to present day conditions and realities and there are still many problematic areas and concerns that have not been adequately addressed."

