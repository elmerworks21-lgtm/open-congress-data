congress_website_title = "AN ACT EXEMPTING FROM INCOME TAXATION THE SALARIES OF MEMBERS OF THE JUDICIARY AND PUBLIC PROSECUTORS"
congress_website_abstract = "Rationale: This exemption is in support of a constitutional provision. Taxes diminish the salary of justices and judges. Their salary is very inadequate given the inflationary cost of commodities and services, high tuition fee of students, and thelike. Their expertise and nature of work are comparable to veteran lawyers in the private practice whose minimum salary is Fifty Thousand Pesos (P50,000.00) every month. Lawyer researchers in private law firms get a starting salary of Thirty ThousandPesos (P30,000.00), while judges start at Nineteen Thousand Pesos (P19,000.00) every month."

