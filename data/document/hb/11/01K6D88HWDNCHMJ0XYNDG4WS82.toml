congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1759, OTHERWISE KNOWN AS 'AN ACT PENALIZING CONTRACTORS AND SUB-CONTRACTORS WHO VIOLATE ANY MATERIAL PROVISIONS OF CONTRACTS INVOLVING PUBLIC WORKS PROJECTS' BY NOW REQUIRING CONTRACTORS AND SUB-CONTRACTORS TOPOST A BOND WITH THE DEPARTMENT OF PUBLIC WORKS AND HIGHWAYS (DPWH) TO ANSWER FOR DAMAGES TO THIRD PERSONS"
congress_website_abstract = "Requires the contractors and sub-contractors who have entered into a contract with the government to FILE a CASH BOND with the Department of Public Works and Highways (DPWH) equivalent to THREE PERCENT (3%) of the amount of the contract entered intoto answer for damages to eprsons who are victims of accidents involving said public works projects."

