congress_website_title = "AN ACT PROVIDING A SERVICE AREA SCHEME TO ALL INTERNET SERVICE PROVIDERS (ISPs), LIBERALIZING THE GRANTING OF ITS OPERATIONAL LICENSE TO OFFER EXPANDED SERVICES AND DEPLOY INTERNET BROADBAND INFRASTRUCTURE AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Internet Universal Access and Liberalization Act of 2000\". This bill which will put in place a scheme to spread out Internet Service Providers (ISPs) operations, will not only provide the entire Philippines with universal access to the informationhighway, but will, at the same time respond to ISPs growing demand for bandwidth.> The scheme will allow all ISPs to render service in any area of their choice but will however, be required to operate a branch in at least one provincial area where there is an equal demand for internet access."

