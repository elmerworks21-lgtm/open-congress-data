congress_website_title = "AN ACT CREATING THE FIELD OF LAND TITLE INSURANCE AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 612, OTHERWISE KNOWN AS THE INSURANCE CODE OF 1978 AS AMENDED BY PRESIDENTIAL DECREES 1455 AND 1460 AND BATAS PAMBANSA BLG. 874"
congress_website_abstract = "Rationale: TITLE INSURANCE protects whoever is dealing with the land titles fron any losses which he may incur should the title later on turn out to be fraudulent or a fake. Title insurance will give confidence to financial institutions and individual persons to proceed and deal with real property, knowing, that should it later turn out that the title sold or mortgaged was a fake, the financial institution or the individual will be reimbursed by the insurance company for the losses. There will no longer be any need for thorough, time-consuming and expensive research on the origins of the title, as the title insurance company will do it for you. A computerized data bank on all relevant information concerning a piece of property and the tiitle it represents shall be kept and maintained by the title insurance company for use by the general public, without cost to the government."

