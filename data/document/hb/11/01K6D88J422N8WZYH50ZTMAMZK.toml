congress_website_title = "AN ACT PROHIBITING THE ESTABLISHMENT OF POLITICAL DYNASTIES"
congress_website_abstract = "\"The Anti-Political Dynasty Act of 1998\". Mandates that any person running for any elective office, EXCEPT for the punong barangay and Sangguniang Barangay member,file a SWORN STATEMENT with the COMELEC that he/she does not have a political dynastyrelationship with the incumbent elective official he aspires to succeed."
