congress_website_title = "AN ACT EXPANDING THE DEFINITION OF SEXUAL HARASSMENT, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7877, OTHERWISE KNOWN AS THE `ANTI-SEXUAL HARASSMENT LAW'"
congress_website_abstract = "This bill states that WHEN AN OFFER OF A SEXUAL FAVOR IS MADE BY A PERSON TO ANOTHER HAVING AUTHORITY, INFLUENCE OR MORAL ASCENDACY OVER THE OFFERER IN EXCHANGE FOR A FAVOR SOLICITED BY THE LATTER FROM THE FORMER, AND THE PERSON OFFERED OF SUCH SEXUAL FAVOR ACCEPTS THE SAME IN CONSIDERATION THEREOF, THE ACCEPTANCE OF THE FAVOR OFFERED SHALL CONSTITUTE SEXUAL HARASSMENT PUNISHABLE UNDER THIS ACT: PROVIDED FURTHER, THAT THE PERSON WHO MADE THE ACCEPTED OFFER SHALL BE DEEMED AN ACCOMPLISE TO THE CONSUMATION OF THE OFFENSE AND SHALL BE PUNISHED AS SUCH IN ACCORDANCE WITH THE PERTINENT PROVISIONS OF THE REVISED PENAL CODE AND SUBJECT TO THE DISCRETION OF THE COURT."
