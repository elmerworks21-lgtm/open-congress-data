congress_website_abstract = "ROAD RAGE IS DEFINED AS THE VIOLENT OR AGGRESSIVE BEHAVIOR OF A MOTORIST ON THE ROAD DIRECTED AGAINST AND IS A REACTION TO ACTS OF OTHER MOTORISTS PERCEIVED BY THE FIRST MOTORIST AS INSULTS OR ONE-UP MANSHIP, GIVING RISE TO AN ALTERCATION WHICH RESULTS IN DEATH, INJURY AND/OR DAMAGE TO PROPERTY OF THE SECOND MOTORIST, OTHER MOTORISTS OR THIRD PARTIES."

