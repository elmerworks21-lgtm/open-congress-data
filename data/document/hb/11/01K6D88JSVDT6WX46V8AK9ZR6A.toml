congress_website_title = "AN ACT PRESCRIBING THE USE OF DESCRIPTIONS AS HOUSEHOLD MANAGERS/HOMECA RE SUPERVISORS/ RESIDENCE ADMINISTRATORS IN PRINT AND BROADCAST MEDIA TO REFER TO OUR OVERSEAS FILIPINO WORKERS (OFWs) WORKING AS SERVICE PROVIDERS AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "It is hereby declared unlawful for any person to use the words \"domestic helpers\" or any analogous or derogatory terms in print, television, radio or any broadcast media to describe/refer to our Filipinos working as service providers abroad. Henceforth, the appropriate descriptions HOUSEHOLD MANAGERS, HOMECARE SUPERVISORS, RESIDENCE ADMINISTRATORS shall be used instead."

