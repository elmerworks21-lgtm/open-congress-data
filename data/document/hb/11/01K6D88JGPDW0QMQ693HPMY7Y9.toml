congress_website_title = "AN ACT EMPOWERING THE LOCAL SCHOOL BOARDS TO SCREEN AND RECOMMEND THE APPLICANTS TO TEACHING POSITIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "The local school boards are hereby empowered to screen and recommend applicants to any teaching position in the DECS. Public schoolteachers shall be appointed by the DECS Secretary, based on the recommendation submitted by the local school boards."
