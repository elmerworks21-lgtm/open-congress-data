congress_website_title = "AN ACT INSTITUTING THE DANGEROUS DRUGS ACT OF 1998"
congress_website_abstract = "\"Dangerous Drugs Act of 1998\". Seeks to institute a new dangerous drugs law: (1) increasing penalties for violation of this Act; (2) formulating procedures in the confiscation and forfeiture of the proceeds of the crimes relative to dangerous drugs; (3) setting the rle of students and schools in the prevention or deterrence in the use of dangerous drugs; and (4) modifying the structure and powers of the Dangerous Drugs Board."
