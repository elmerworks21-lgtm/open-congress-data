congress_website_title = "AN ACT REQUIRING THE PUBLICATION IN THREE (3) NEWSPAPERS OF NATIONAL AND GENERAL CIRCULATION, THE LIST OF RECOMMENDEES FOR EXECUTIVE CLEMENCY"
congress_website_abstract = "This act requires the Board of Pardons and Parole which is udner the Department of Justice to PUBLISH the names of convicts, their offenses and the places where committed, recommended for executive clemency, in newspapers of national and general circulation at least thirty (30) days prior to its submittal of the list of recommendees to the Office of the President in order to ALLOW PUBLIC REACTION which could guide Presdidential action thereon."

