congress_website_title = "AN ACT DECRIMINALIZING CERTAIN ACTS OF VAGRANCY, AMENDING FOR THE PURPOSE ARTICLE TWO HUNDRED OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "Under this bill, vagrants and aprostitutes SHALL BE COMMITTED TO THE DEPARTMENT OF SOCIAL WELFARE AND DEVELOPMENT FOR COUNSELLING AND REHABILITATION FOR A PERIOD NOT EXCEEDING SIX (6) MONTHS FROM SERVICE OF SENTENCE."

