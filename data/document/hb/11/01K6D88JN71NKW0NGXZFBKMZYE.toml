congress_website_title = "AN ACT AMENDING SECTION 39 OF REPUBLIC ACT NO. 7077 SO AS TO INCLUDE ON AN OPTIONAL BASIS, A VOLUNTARY CIVIC WORK OR COMMUNITY IMMERSION AS PART OF BASIC ROTC AND/OR CITIZEN MILITARY TRAINING"
congress_website_abstract = "\"SECTION 1. THE TWO YEARS BASIC ROTC INCLUDE A MAXIMUM OF ONE (1) ACADEMIC YEAR FOR VOLUNTARY CIVIC WORK OR COMMUNITY IMMERSION AT THE OPTION OF A STUDENT, AND A MINIMUM OF ONE (1) ACADEMIC YEAR FOR THE MILITARY TRAINING COMPONENT. SAID CIVIC WORK OR IMMERSION SHALL NOT EXCEED 50% OF THE NECESSARY BASIC ROTC TRAINING PERIOD.\""
