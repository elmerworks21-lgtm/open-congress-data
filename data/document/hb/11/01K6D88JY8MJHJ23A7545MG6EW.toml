congress_website_title = "AN ACT MANDATING USAGE OF FUNDS OF THE LITERACY COORDINATING COUNCIL FOR PERSONAL SERVICES, AMENDING REPUBLIC ACT NO. 7165, AND FOR OTHER PURPOSES"
congress_website_abstract = "The present staff of LCC are all contractual employees. With the mandatory implementation of RA 8291, as operationalized in the GSIS Circular No. 4-97 (25 June 1997), they will have to personally shoulder the 21% entire contribution to GSIS. That is a very big deduction from their take home pay because ordinarily the Agency shoulders 9% as its contribution. Under this set-up and without this amendment, the contractual employee shoulders the entire 21%."
