congress_website_title = "AN ACT PROVIDING FOR ADDITIONAL CAUSE FOR ARREST WITHOUT WARRANT"
congress_website_abstract = "WHEN A CRIME HAD BEEN COMMITTED AND UPON THE SWORN STATEMENT OF AN EYE-WITNESS DULY VERIFIED AS TRUE BY A POLICE OR LAW ENFORCEMENT INVESTIGATOR, OR BY A FORENSIC EXPERT, PROVIDED THAT THE ASSERTION OF THE LATTER IS BORNE OUT BY AT LEAST TWO CICUMSTANTIAL PHYSICAL OR SCIENTIFIC EVIDENCE INDICATING THAT THE PERSON TO BE ARRESTED WAS THE PERPETRATOR OF THE CRIME, THE LATTER MAY BE ARRESTED WITHOUT WARRANT BY ANY OFFICER OF THE LAW."

