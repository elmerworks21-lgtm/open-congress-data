congress_website_title = "AN ACT INCREASING THE BENEFITS OF BARANGAY OFFICIALS, AMENDING FOR THE PURPOSE SECTION 393 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Grants these monthly benefits to barangay officials: (1) Punong barangay - P2,500.00; (2) Sangguniang Barangay member, treasurer and secretary - P1,500.00 per month. In addition, they shall be entitled to a Christmas bonus."
