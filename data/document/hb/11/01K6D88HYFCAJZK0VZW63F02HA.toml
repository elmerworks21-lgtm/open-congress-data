congress_website_title = "AN ACT TO ORDAIN REFORMS IN THE ELECTRIC POWER INDUSTRY AND THE GOVERNMENT ENERGY SECTOR TO ENSURE THE TOTAL ELECTRIFICATION OF THE PHILIPPINES AND SUSTAIN PARTICIPATION OF THE PRIVATE SECTOR IN POWER GENERATION, TRANSMISSION AND DISTRIBUTION, THEREBY AMENDING CERTAIN LAWS, AND FOR OTHER PURPOSES (omnibus)"
congress_website_abstract = "\"Omnibus Power Industry Act of 1998\". Establishes (1) an unregulated and competitive power generation component, with power producers selling electricity via long-term contracts; (2) a partially regulated and non-exclusive transmission component with the National Power Corporation (NPC) spin-off company serving as a common electricity carrier; and (3) a regualtory agency spun from the Energy Regulatory Board (ERB), to be renamed the ENERGY REGULATORY COMMISSION (ERC)."
