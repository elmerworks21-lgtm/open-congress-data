congress_website_title = "AN ACT REQUIRING CERTAIN GOVERNMENT INFRASTRUCTURE PROJECTS TO BE IMPLEMENTED BY LOCAL GOVERNMENT UNITS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Emergency Employment Act of 1998\". All infrastructure projects of the government costing P1 Million (P1,000,000.00) or less shall be implemented by the local government units where the projects are located. This refers to projects funded under theGeneral Appropriation Acts of 1999 up to 2004."

