congress_website_title = "AN ACT PROFESSIONALIZI NG THE GOVERNMENT ACCOUNTING SERVICE TO SERVE AS A TOOL FOR EFFECTIVE MANAGEMENT AND CONTROL OF GOVERNMENT RESOURCES, CREATING FOR THE PURPOSE THE GOVERNMENT ACCOUNTANCY OFFICE UNDER THE DEPARTMENT OF BUDGET AND MANAGEMENT ANDFOR OTHER PURPOSES"
congress_website_abstract = "\"Government Accounting Act of 1998\". With this proposal, all government transactions shall be properly documented, recorded, classified and interpreted into meaningful data; and communicated on a timely basis to fiscal authorities concerned so thatthe information genrated therefrom can be made useful for economic analysis, policy formulation and decision-making purposes. The responsibility to document and record faithfully said transaction should rest with government accountants."

