congress_website_title = "AN ACT AMENDING SECTION 9 OF REPUBLIC ACT NO. 7432 OTHERWISE KNOWN AS `AN ACT TO MAXIMIZE THE CONTRIBUTION OF SENIOR CITIZENS TO NATION-BUILDING , GRANT BENEFITS AND SPECIAL PRIVILEGES AND FOR OTHER PURPOSES,' BY INCREASING THE PENALTIES FOR THE VIOLATION OF ANY PROVISIONS THEREOF"
congress_website_abstract = "Violation of any provision of this Act for which no penalty is specifically provided under any other law, shall be punished by imprisonment OF UP TO SIX (6) MONTHS or a fine FROM FIVE THOUSAND PESOS (P5,000.00) TO TEN THOUSAND PESOS (P10,000.00) orboth. IN CASES INVOLVING PRIVATE ESTABLISHMENTS WHICH REFUSE TO GRANT BENEFITS TO SENIOR CITIZENS, SUBSEQUENT OFFENSES WILL RESULT IN THE REVOCATION OF THEIR FRANCHISE OR BUSINESS PERMITS BY AUTHORIZED GOVERNMENT AGENCIES."
