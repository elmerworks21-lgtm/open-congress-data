congress_website_title = "AN ACT TO UPGRADE THE SALARY SCALE OF A RETIRING GOVERNMENT EMPLOYEE BY ONE GRADE FOR PURPOSES OF HIS/HER RETIREMENT"
congress_website_abstract = "The salary scale of any retiring government employee shall be upgraded to one grade on the date of his/her retirement. The upgraded salary scale shall be the basis in computing the retirement benefits of such retiring employee. For any employee whoopts to retire under any existing laws on retirement, the one-grade increase shall be deemed granted one year before retirement for purposes of service requirement only."

