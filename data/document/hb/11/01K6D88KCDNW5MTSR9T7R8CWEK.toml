congress_website_title = "AN ACT INCREASING THE ALLOWABLE PERSONAL AND ADDITIONAL EXEMPTIONS OF INDIVIDUAL TAXPAYERS, AMENDING FOR THE PURPOSE SECTION 35(A) AND (B) OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "This bill proposes the following allowable personal and additional exemptions for individual taxpayers: For single individual or married individual judicially decreed as legally separated with qualified dependents [P20,000.00] P48.000.00; For head of the family [25,000.00]; P54,000.00; for each married individual [P32,000.00] P64,000.00. There shall be allowed an additional exemption of [Eight Thousand Pesos (P8,000.00)] SIXTEEN THOUSAND PESOS (P16,000.00) for each dependent not exceeding four(4)."
