congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION AND CONSERVATION OF ALL OBJECTS OF UNDERWATER CULTURAL HERITAGE IN THE PHILIPPINE WATERS"
congress_website_abstract = "\"Protection of Underwater Cultural Heritage Act of 1998\". Declares it a State policy to protect and preserve underwater archaeology, exploration and excavation, the description of items to be protected, the prohibition of certain activities in the vicinity of a protected item/site, the establishment of a reward system for verified reports and imposition of sanction/penalt ies for violations."

