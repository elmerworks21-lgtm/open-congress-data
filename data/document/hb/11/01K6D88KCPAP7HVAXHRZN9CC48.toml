congress_website_title = "AN ACT REQUIRING APPLICANTS FOR DRIVERS LICENSE WHETHER PROFESSIONAL OR NON-PROFESSIONA L, TO UNDERGO A THREE-DAY SEMINAR AND PASS THE REQUIRED EXAMINATION ON DRIVING PRINCIPLES AND APTITUDES UNDER THE SPONSORSHIP OF THE LAND TRANSPORTATION OFFICE,APPROPRIATING FUNDS FOR THE PURPOSE AND PRESCRIBING PENALTY FOR VIOLATION THEREOF"
congress_website_abstract = "All applicants for professional and non-professiona l driver's license are hereby required to undergo a three-day seminar which shall include topics on the basic principles of driving, familiarization of traffic signs and symbols, map-reading, psychological aptitudes of drivers and such other related topics as may aid prospective drivers in their occupation as such, and to pass the required examination before a driver's license is issued to them."
