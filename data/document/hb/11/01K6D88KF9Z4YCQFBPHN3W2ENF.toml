congress_website_title = "AN ACT DECLARING ALL AGRICULTURAL LAND WITHIN THE RADIUS OF FIVE-KILOMETERS FROM THE EXISTING CITY HALL IN EVERY CITY AND WITHIN THE RADIUS OF THREE-KILOMETER S FROM THE EXISTING MUNICIPAL HALL, IN CASE OF A MUNICIPALITY, AS QUALIFIED FOR NON-AGRICULTURA L USES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Urbanization Act of 2000.\" Rationale: The State shall promote comprehensive rural development. The goals of the national economy are a more equitable distribution of opportunities, income and wealth. In the pursuit of these goals, all sectors of the economy and all regions of the country shall be given optimum opportunity to develop. The State must pursue an agro-industrial strategy of support for both agriculture and indsutry where industrializati on is anchored on agricultural modernization."

