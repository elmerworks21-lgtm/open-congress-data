congress_website_title = "AN ACT AMENDING ARTICLE X, SECTION 39 AND ARTICLE XII, SECTION 44 OF REPUBLIC ACT NO. 7279, OTHERWISE KNOWN AS THE 'URBAN DEVELOPMENT AND HOUSING ACT OF 1992'"
congress_website_abstract = "\"Urban Development and Housing Act of 1998\". Urges the Housing Development Coordinating Council (HUDCC), in coordination with the housing agencies, the Presidential Commission for Urban Poor (PCUP), the private sector, non-government organizations (NGOs) and the affected sectors to initiate measures to implement this Act with or without the approval of the local government unit. Declares a moratorium on the eviction of all program beneficiaries and on the demolition of their houses or dwellingunit up to year 2000."

