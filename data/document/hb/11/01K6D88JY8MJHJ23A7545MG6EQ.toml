congress_website_title = "AN ACT PROVIDING FOR THE MANDATORY APPOINTMENT OF ENVIRONMENT AND NATURAL RESOURCES OFFICERS IN THE LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSES THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Hazardous air pollutants about by industrializati on are very evident in the air and threaten many wildlife to extinction. To support research and enforcement and to monitor the implementation of the environmental laws and to buttress the containment, removal, and clean-up operations of the government in environmental pollution cases and guarantee restoration of the ecosystem, the mandatory appointment of Environment and Natural Resources Officers for the local government units is necessary."
