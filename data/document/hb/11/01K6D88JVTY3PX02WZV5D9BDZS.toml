congress_website_title = "AN ACT PROHIBITING THE ESTABLISHMENT OF POLITICAL DYNASTIES"
congress_website_abstract = "\"Anti-Political Dynasty Act of 1999\". Rationale: Political Dynasties, as we are all familiar with, is an effective way of monopolizing and perpetuating power. The constitution seeks to democratize access to power by disallowing the concentration ofpolitical power to a few families. This is a noble provision that no amount of rhetoric to the contrary can nullify. 12 years after the people ratified our constitution, it is high time we revisit and bring life to this provision."
