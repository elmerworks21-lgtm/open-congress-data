congress_website_abstract = "This bill proposes (1) to make April 9 (Araw ng Kagitingan) and May 1 (Labor Day) WORKING HOLIDAYS; and (2) to make December 30 the NATIONAL HEROES DAY, thereby doing away with National Heroes Day (last Sunday of August) and Bonifacio Day (November30)."
