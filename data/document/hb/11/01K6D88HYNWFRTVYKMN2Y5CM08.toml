congress_website_title = "\"THE CODE OF CRIMES OF THE PHILIPPINES\""
congress_website_abstract = "\"Code of Crimes of the Philippines\". Seeks to amend, revise, simplify, and update the REvised Penal Code of the Philippines or Republic Act No. 3815, a law which took effect in January 1932. Aims to make the penal laws more responsive to the demandsof the present day society, considering the increase in the brutal commission of cimes and the pressing need to reclassify, add and define acts which at present are not punishable but are nevertheless being atrociously committed."
