congress_website_title = "AN ACT GRANTING FINANCIAL BENEFITS ASSISTANCE TO FORMER BARANGAY OFFICIALS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "All laws to the contrary notwithstanding , all former barangay officials duly elected or appointed as such under existing laws, rules and regulations, who have served for at least twenty five (25) years of continuous or aggregate public service, shall be entitled to a financial benefits assistance in the amount of one thousand pesos (P1,000) for every year of service. The barangay officials referred to in this Act shall include Barrio Lieutenant, Vice-Barrio Lieutenant, Barrio Captain, Barrio Councilman, Barrio Treasurer, Barrio Secretary, Barangay chairman, Barangay Councilman, Punong Barangay, Barangay Kagawd, Barangay Secretary, Barangaty Treasurer, Barangay Police, Kabataang Barangay (KB) Chairman, KB Members, KB Secretary, KB Treasureer, Sangguniang Kabataan (SK) Chairman, SK Members, SK Secretary, and SK Treasurer."

