congress_website_title = "AN ACT INSTITUTIONALIZ ING AND PROVIDING MECHANISMS AND FUNDS FOR BROADENING, ENHANCING, AND STRENGTHENING THE PARTICIPATION OF PEOPLE'S, NONGOVERNMENT AND SECTORAL ORGANIZATIONS IN LOCAL GOVERNANCE"
congress_website_abstract = "The NGO/PO-LGU Empowered Partnership Act of 1998\". Provides for a system of accreditation of NGOs and POs, structures, mechanisms and programs for collaboration or partnership with LGUs and mandating the latter to allocate 10 percent of their budget to realize the programs under such collaboration."
