congress_website_title = "AN ACT RECOGNIZING DUAL CITIZENSHIP OF FOREIGN NATIONALS WHO ARE FORMER FILIPINOS OR WHO ARE OF FILIPINO ANCESTRY, UNDER CERTAIN CONDITIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8171, AND FOR OTHER PURPOSES"
congress_website_abstract = "NATURAL-BORN FILIPINOS WHO HAVE LOST THEIR PHILIPPINE CITIZENSHIP, INCLUDING THEIR MINOR CHILDREN, ON ACCOUNT OF POLICITAL OR ECONOMIC NECESSITY, OR WHO ACQUIRED FOREIGN CITIZENSHIP UNDER THE PRINCIPLE OF JUS SOLI OR BY REASON OF BIRTH AND Filipinowomen who have lost their Philippine citizenship by marriage to aliens may require Philippine citizenship through repatriation WITHOUT RENOUNCING THEIR FOREIGN CITIZENSHIP."
