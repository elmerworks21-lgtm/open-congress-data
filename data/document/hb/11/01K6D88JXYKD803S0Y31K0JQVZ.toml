congress_website_title = "AN ACT RESTRUCTURING THE OIL INDUSTRY BY ESTABLISHING A NATIONAL OIL EXCHANGE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Within three (3) months from the efectivity of this Act, a government-owne d and controlled corporation to be named as the National Oil Exchange Corporation (NOEC) shall be established. The NOEC shall determine the country's total monthly requirements for refined petroleum products, and shall exclusively handle all the purchases, storages and distributions thereof to distributors, wholesalers, retailers and big bulk consumers throughout the country."
