congress_website_title = "AN ACT TO INSTITUTIONALIZ E A QUICK RESPONSE SYSTEM (QRS) IN THE NATIONAL AND LOCAL GOVERNMENT LEVELS, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
