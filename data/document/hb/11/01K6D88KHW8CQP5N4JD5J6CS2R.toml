congress_website_title = "AN ACT CREATING THE PORTS AND HARBOR OFFICE, DEFINING ITS POWERS AND FUNCTIONS, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "There is obviously a need to establish a permanent central authority that would systematically coordinate and manage all relevant resources to hasten sustainability and maximize utilization of feeder ports and ultimately bring about a desirable contribution in facilitating national dvelopment. This bill therefore seeks to establish a Ports and Harbors Office under the Department of Transportation and Communication which will provide a continuing and lasting commitment to the overall developmentof feeder ports and the relevant facilities nationwide."
