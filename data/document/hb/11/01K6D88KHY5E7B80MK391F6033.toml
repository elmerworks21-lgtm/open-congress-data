congress_website_title = "AN ACT PROVIDING HIGHER COMPENSATION TO VICTIMS OF UNJUST IMPRISONMENT OR DETENTION AND VICTIMS OF VIOLENT CRIMES, AMENDING FOR THE PURPOSE SECTION 4 OF REPUBLIC ACT NO. 7309, AND FOR OTHER PURPOSES"
congress_website_abstract = "Hence, this bill seeks to amend Section 4 of R.A. No. 7309 by increasing the amount be awarded to the victims of unjust imprisonment of detention as well as victims of violent crimes. The proposed measure, therefore, provides that those who have been unjustly imprisoned or detained for less than five (5) years shall be entitled to receive P1,000.00 for every month of such imprisonment. However, for those who were imprisoned for more than five (5) years are entitled to claim P2,000.00 for everymonth of such imprisonment or detention. While the compensation for the victims of violent crimes is increased from P10,000.00 to P100,000.00 considering the high cost of hospitalization and medical treatment."
