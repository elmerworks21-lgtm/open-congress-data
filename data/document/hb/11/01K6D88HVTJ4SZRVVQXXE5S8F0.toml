congress_website_title = "AN ACT PROHIBITING GOVERNMENT OFFICIALS AND EMPLOYEES FROM PLAYING IN CASINOS AND OTHER SIMILAR ESTABLISHMENTS OPERATED BY THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION, OR BY OTHER SIMILAR GOVERNMENT-OWNE D OR -CONTROLLED CORPORATIONS, AND THEIRFRANCHISE HOLDERS, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Penalizes the government official or employee found guilty of violating this Act with imprisonment of six (6) months to six (6) years, and a fine of P10,000.00 to P30,000.00, in addition to PERPETUAL DISQUALIFICATIO N for holding public office."

