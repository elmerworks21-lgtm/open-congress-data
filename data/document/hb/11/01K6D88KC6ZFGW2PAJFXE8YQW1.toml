congress_website_title = "AN ACT REPEALING REPUBLIC ACT NO. 8794 OR `AN ACT IMPOSING A MOTOR VEHICLE USERS' CHARGE ON OWNERS OF ALL TYPES OF MOTOR VEHICLES AND FOR OTHER PURPOSES'"
congress_website_abstract = "Rationale: The RUT, at this time, is untimely. What it can only do is fuel protests and inflame passions, all for the P1 billion it can raise in a year. Because RUT comes on the heels of the rise in oil prices and toll fees, and worsening traffic,it is akin to pouring gasoline on an already combustible mixture. In short, it is a Trojan Horse, with the WB loan concelaed in its compartment. RUT is not a mere revenue-raising measure that will pester the present generation. It is a loan-releaseexpediter that will hound future Filipinos who will amortize the loan."
