congress_website_title = "AN ACT DISAUTHORIZING THE DETAIL OF LABOR ARBITERS AS REVIEWERS OF COMMISSIONERS IN THE NATIONAL LABOR RELATIONS COMMISSION, AMENDING FOR THIS PURPOSE ARTICLE 217 OF PRESIDENTIAL DECREE NO. 442, AS AMENDED"
congress_website_abstract = "Recognizes the important role of the labor arbiters in the disposition of compulsory arbitration of cases, and therefore mandates that labor arbiters SHALL NOT BE DESIGNATED AS REVIEWERS in the National Labor Relations Commission or to any other agency performing quasi-judicial functions."

