congress_website_title = "AN ACT PROVIDING FOR A CHAMBER OF COMMERCE AND INDUSTRY SYSTEM, PROMOTING ORDER, EFFICIENCY AND EFFECTIVE DELIVERY OF SERVICES BETWEEN AND AMONG CHAMBERS OF COMMERCE AND INDUSTRY, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Chambers of Commerce and Industry Act of 1999\". The bill seeks to promote the growth of chambers of commerce and industry (CCIs) nationwide. Presently, there is no chmaber of commerce and industry system for all business and economic sectors. chambers have thus uncontrollably mushroomed across the country with overlapping and duplication of functions and services resulting in inefficiency, and inability to provide value added services for its members, among others. For purposes of enhancing the support of functions of CCIs in national economic growth, there is felt a need to establish a set of standards for greater efficiencies and effectiveness of Philippine CCIs."
