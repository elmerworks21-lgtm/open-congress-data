congress_website_abstract = "This explanatory note shall serve for all the bills listed below. The MAIN PURPOSE of this set of bills is to remove any vestige of a one-person rule or authoritarian government in statues book of our country. Each bill, therefore, aims to properlylabel every Presidential Decree (PD), Executive Order (EO) and all other acts of the Executive Department that have the force and effect of laws, as a REPUBLIC ACT duly enacted by this Congress."
