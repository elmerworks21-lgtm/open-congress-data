congress_website_abstract = "\"The Shipbreaking Industry Incentives Act of 1998\". Declares it the policy of the government to promote, encourage and accelerate the development and growth of the shipbreaking industry to (1) provide an alternate and economical source of iron and steel for the construction industries; (2) to create more job opportunities for Filipino workers; (3) to save and generate foreign exchange earningsp; (4) to augment and support the material requirements of the shipping indsutry; and (5) to encouragethe replacement of unseaworthy vessels in the interisland fleet."
