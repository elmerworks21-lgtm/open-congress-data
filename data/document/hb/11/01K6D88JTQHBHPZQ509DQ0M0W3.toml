congress_website_title = "AN ACT AMENDING ARTICLE 176 OF EXECUTIVE ORDER 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES (RE: SURNAME OF ILLEGITIMATE CHILDREN)"
congress_website_abstract = "ILLEGITIMATE CHILDREN MAY USE THE SURNAME OF THEIR FATHER IF THEIR FILIATION HAS BEEN EXPRESSLY RECOGNIZED BY THE FATHER THROUGH THE RECORD OF BIRTH APPEARING IN THE CIVIL REGISTER; OR AN ADMISSION IN A PUBLIC DOCUMENT or a PRIVATE HANDWRITTEN INSTRUMENT and SIGNED BY THE PUTATIVE FATHER, UNLESS DNA TEST RESULTS DISPROVES SUCH FILIATION."
