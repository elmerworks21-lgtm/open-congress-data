congress_website_title = "AN ACT DECLARING AS HEINOUS CRIME PUNISHABLE BY DEATH THE ACT OF AUTHORIZING VESSELS TO SAIL DESPITE SEVERE WEATHER DISTURBANCES RESULTING TO THE DEATH AND INJURIES TO THE PASSENGERS"
congress_website_abstract = "Rationale: Disasters at sea may be attributed sometimes to the ship captain or to the ship owner or his agent who authorizes the deaprture or to the government official who gives clearance for the ship to sail despite severe weather disturbances. They usually escape responsibility for such disasters or blaming them to accidents or act of God."
