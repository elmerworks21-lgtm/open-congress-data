congress_website_title = "AN ACT AMENDING SECTIONS 20 AND 31, TITLE IV OF PRESIDENTIAL DECREE NO. 957 REGULATING THE SALE OF SUBDIVISION LOTS, CONDOMINIUMS, PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "This bill seeks to ensure compliance by owners and developers of subdivision and condominium projects with their approved subdivision and/or condominium plans as well as the required facilities, infrastructures , improvements and other forms of development indicated in their brochures, prospectus and advertisements. It has been the practice of owner-developer s not to realize the development requirements indicated in the approved plans after they have disposed of all the lots and units in the subdivision and condominium projects. To protect the buyers, it is sought by this bill to PROHIBIT the disposition of any subdivision lots and the issuance of a building permit for the construction of the units in the subdivision or condominium projecct until all the necessary improvements and infrastructurea have been completed."
