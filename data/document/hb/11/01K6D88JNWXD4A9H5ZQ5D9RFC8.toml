congress_website_title = "AN ACT INCREASING THE PENALTY FOR BANK ROBBERY AND AMENDING FOR THE PURPOSE ARTICLE 294 OF ACT NO. 3815 OTHERWISE KNOWN AS THE REVISED PENAL CODE, AS AMENDED BY REPUBLIC ACT NO. 7659"
congress_website_abstract = "A BANK ROBBERY COMMITTED BY BANK OFFICIALS OR EMPLOYERS OR WITH THEIR KNOWLEDGE OR IN CONNIVANCE WITH OTHER PERSONS OR BY FORMER OR ACTIVE MILITARY PERSONNEL OR BY FORMER OR ACTIVE POLICE PERSONNEL SHALL BE PUNISHABLE WITH RECLUSION PERPETUA TO DEATH. A BANK ROBBERY COMMITTED BY ANY OTHER PERSON SHALL BE PUNISHABLE WITH RECLUSION TEMPORAL TO RECLUSION PERPETUA."
