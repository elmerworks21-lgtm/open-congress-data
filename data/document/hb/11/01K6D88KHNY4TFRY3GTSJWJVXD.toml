congress_website_title = "AN ACT PROHIBITING HUMAN CLONING IN THE PHILIPPINES AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "\"Cloning Prohibition Act of 2001\". This bill declares the policy of the State to value the dignity of every human person and guarantee full respect for human rights. The State recognizes the sanctity of family life, and is committed to protect andstrenthen the family as a basic autonomous social institution. Towards this end, the government must and shall ban the conduct of human cloning since every human being has intrinsic dignity and worth which must be preserved, respected and safeguarded."

