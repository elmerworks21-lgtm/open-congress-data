congress_website_title = "AN ACT PROVIDING FOR THE PROCLAMATION OF ELECTED CANDIDATES WHEN NINETY PERCENT (90%) OF THE VOTES IN ANY PROVINCE, CITY OR MUNICIPALITY HAVE ALREADY BEEN CAST, AMENDING FOR THE PURPOSE SECTION 6 OF BATAS PAMBANSA BILANG 881, OTHERWISE KNOWN AS THEOMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "Mandates that when at least NINETY PRCENT (90%) of the votes in any provinces, city or municipality shall have already been cast, special elections shall NO longer be called, and the canvass of returns and the proclamation of the results of the election may proceed."

