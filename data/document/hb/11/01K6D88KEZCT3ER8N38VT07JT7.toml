congress_website_title = "AN ACT REQUIRING THE REGISTRATION OF THE SALE OF PREPAID SUBSCRIBER IDENTITY MODULE (SIM) PACKS FOR CELLULAR TELEPHONES AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "All corporations, partnerships and single proprietorships engaged in the business of selling prepaid subscriber identity module (SIM) packs for cellular telephones are hereby required to cause the registration of the following information in an official record/document establiwshed for the purpose: (a) Full name and address of the buyer - To this end, the buyer shall be required to present any acceptable proof of identification; (b) Issue/telephone number of the SIM packs; and (c) Value/amountof the SIM packs. The corporations, partnerships and single proprietorships shall also issue proper receipts to the buyers of SIM packs."
