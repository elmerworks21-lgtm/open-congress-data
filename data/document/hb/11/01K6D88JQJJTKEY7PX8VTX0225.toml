congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1638, AS AMENDED BY PRESIDENTIAL DECREE NO. 1650, ENTITLED 'ESTABLISHING A NEW SYSTEM OF RETIREMENT AND SEPARATION FOR MILITARY PERSONNEL OF THE ARMED FORCES OF THE PHILIPPINES AND FOR OTHER PURPOSES'"
congress_website_abstract = "Rationale: The AFP is burdened by an \"age-based\" rather than \"performance-or iented\" retirement system. This system results in a longer length of service of those commissioned in the service at a young age against those commissioned at a later age.This bill proposes a NEW retirement system to correct this situational inconsistency."
