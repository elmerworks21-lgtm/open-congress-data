congress_website_title = "AN ACT PROVIDING FOR THE MODERNIZATION OF FIRE PROTECTION, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Fire Protection Modernization Act of 1998\" Considers the acquisition of modern equipment as the main thrust of the Fire Protection Modernization Program. Establishes Fire Protection Service (FPS) in the 1,053 local government units with no existingprotection services; upgrades existing fire protection services; establishes specialized fire protection and related services. Establishes training facilities, including the hiring of internationally accredited training consultants and adviser toward this end."

