congress_website_title = "AN ACT TO PENALIZE RACKETEERS AND CRIMINAL ENTERPRISES, PROHIBITING SUCH CRIMINAL ENTERPRISES AND RACKETEERS INFLUENCED AND CORRUPT ORGANIZATIONS FROM INFILTRATING, CONTROLLING OR OTHERWISE INFLUENCING PHILIPPINE COMMERCE (rico)"
congress_website_abstract = "\"Racketeer Influenced and Corrupt Organization Act of 1998\". Defines the scope of the terms \"racketeer\" and \"organized crime syndicate\"; imposes stiffer penalties on those engaged in criminal activities and organizations; and provides for the forfeiture of properties obtained from racketeering."
