congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED SEVEN THOUSAND ONE HUNDRED AND SIXTY, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES(RE: ADJUSTMENT IN THE POLICIES THAT THE LOCAL GOVERNMENT CODE PROVIDES; OMNIBUS AMENDMENTS TO THE CODE)"
congress_website_abstract = "Aside from yielding gains and good results, however, the seven years of Code implementation have also brought to light some gaps, inconsistencies , rigidities, weaknesses, or simple oversights in the Code itself. The past seven years have also occasioned changes in LGU conditions that call for adjustment in the policies that the Local Government Code provides. All these require looking again at the Code and proposing amendments where necessary."
