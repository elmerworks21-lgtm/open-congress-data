congress_website_title = "AN ACT PROHIBITING GOVERNMENT OFFICIALS AND EMPLOYEES INCLUDING OFFICERS AND EMPLOYEES OF GOVERNMENT-OWNE D OR -CONTROLLED CORPORATIONS OR AGENCIES FROM UNDERTAKING BUSINESS OR GAINFUL ACTIVITIES WHICH WOULD HAVE ANY BEARING, WHETHER DIRECTLY OR INDIRECTLY, WITH THE FUNCTIONS OF THE OFFICES OR AGENCIES TO WHICH THEY ARE ASSIGNED OR ARE EMPLOYED"
congress_website_abstract = "\"Anti-Conflict of Interest Act of 1999\". Rationale: It is the policy of the State to eradicate graft and corruption in the public service. Among the root causes of this recurrent malady is the unmitigated exertion of influence by unscrupulous government officials and employees in the awards, servicing or implementation of contracts affecting or administered by the offices where such officials and employees are employed or connected with."

