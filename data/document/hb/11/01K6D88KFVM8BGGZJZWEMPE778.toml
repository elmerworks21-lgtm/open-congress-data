congress_website_title = "AN ACT INSTITUTING REFORMS IN THE PART-LIST SYSTEM, AND AMENDING THE PARTY-LIST SYSTEM ACT (R.A. NO. 7941) FOR THIS PURPOSE"
congress_website_abstract = "This bill contains the following features: (1) mandatory filling up of the 20% party-list seat allocation in the House of Representatives ; (2) assured allocation of two (2) seats each for the 12 marginalized and underrepresemte d sectors; (3) assured allocation of one seat each for regions where there are registered regional parties, organizations and coalitions, regardless of the 2% minimum vote requirement; (4) limitation of the 2% minimum vote requirement to national parties organizations and coalitions which may, however, still get a maximum of three seats subject to the assured allocation of sectoral and regional seats, etc."

