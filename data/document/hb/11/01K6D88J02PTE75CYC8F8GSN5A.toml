congress_website_title = "AN ACT ALLOWING GRADUATES OF CRIMINOLOGY FROM ANY ACCREDITED PHILIPPINE SCHOOL OF CRIMINOLOGY TO BE ENLISTED AND APPOINTED AS MEMBERS OF THE PHILIPPINE NATIONAL POLICE WITHOUT NEED OF TAKING THE QUALIFYING ENTRANCE EXAMINATION AS REQUIRED FOR BY SECTION 32 OF REPUBLIC ACT NO. 6975, OTHERWISE KNOWN AS THE DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990"
congress_website_abstract = "Provides a scheme to tap the rich source of future policemen and also guarnatee that those appointed the position of police officers have at least four (4) years of criminology and security training. Exempts them from taking the qualifying entranceor enlistment examinations, but not for promotions within the system."
