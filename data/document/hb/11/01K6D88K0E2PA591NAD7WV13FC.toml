congress_website_title = "AN ACT TO ESTABLISH AND MAINTAIN LACTATION STATIONS IN WORKPLACES FOR WORKING MOTHERS BREAST-FEEDING THEIR INFANTS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Workplace Lactation Act of 2000\". It is hereby mandated that employers whether government agencies, including its subdivisions, instrumentaliti es and government-owne d and-controlled corporations, or private enterprises with women employees shallmaintain lactation stations in the workplaces to promote breast-feeding of new-born infants until the age of two years. Such lactations stations shall consist of (a) lavatory for hand-washing; (b) hot plate and casserole for sterilizing individually-ow ned manual breast pumps; and (c) refrigerator for storing pumped breast milk."
