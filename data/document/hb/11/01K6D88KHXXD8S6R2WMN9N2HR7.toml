congress_website_title = "AN ACT PROVIDING FOR THE PHASE-OUT OF PLASTIC BAGS AS PACKING MATERIALS OF GOODS SOLD OR DISPOSED BY SARI-SARI STORES, MARKET VENDORS, DEPARTMENT STORES AND SIMILAR ESTABLISHMENTS, PRESCRIBING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The use of plastic bags as packing materials of goods sold by sari-sari stores, market vendors, department stores and similar establishments is hereby prohibited after the phase out period as determined by this Act. The use of plastic bags shall bephased out within a period of three from the effectivity of this Act."

