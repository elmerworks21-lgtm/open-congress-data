congress_website_title = "AN ACT STRENGTHENING THE MERIT AND FITNESS SYSTEM BY REQUIRING PROMOTIONS TO BE BASED PRIMARILY ON SATISFACTORY JOB PERFORMANCE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Whenever a position in the career service becomes vacant, the employee who is next-in-rank and who has obtained at least a satisfactory performance rating for the previous two (2) appraisal periods shall be promoted to the higher position. Provided,that such employee is qualified and possesses an appropriate civil service eligibility."
