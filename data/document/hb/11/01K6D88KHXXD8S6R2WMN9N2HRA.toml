congress_website_title = "AN ACT PROVIDING FOR A NATIONAL ECOTOURISM POLICY, ESTABLISHING A FRAMEWORK FOR ITS INSTITUTIONALIZ ATION AND CREATING AN INSTITUTIONAL MECHANISM FOR ITS IMPLEMENTATION AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Ecotourism Policy Act of 1991.\" This bill proposes an ecotourism policy that would lay down a tourism framework based on a well-crafted balance between economic growth and environmental protection. It creates a National Ecotourism Commission which shall formulate and implement an Ecotourism Masterplan with the assistance of the Department of Tourism and the Department of Environment and Natural Resources. There shall also be created in the bill a network of ecotourism sites which would include but not limited to the Integrated Protected Areas System under R.A. No. 7586."
