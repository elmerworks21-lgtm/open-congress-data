congress_website_title = "AN ACT FIXING THE TERM OF OFFICE OF THE PRESIDENT OF THE SENATE AND THE SPEAKER OF THE HOUSE OF REPRESENTATIVES , AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: \"The history of the Senate and the House of Representatives is replete with coup d'etat which does not speak well of the stability of Congress.\" Fixes the term of office of the President of the Senate and the Speaker of the House of Representatives to be co-terminous with the Congress to which they have been elected."

