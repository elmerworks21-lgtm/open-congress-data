congress_website_title = "AN ACT CHANGING THE TITLE OF ALL LEGISLATIVE BODIES IN THE PROVINCIAL, CITY, MUNICIPAL AND BARANGAY LEVEL FROM SANGGUNIANG PANLALAWIGAN, SANGGUNIANG PANLUNGSOD, SANGGUNIANG PAMBAYAN AND SANGGUNIANG BARANGAY TO BATASAN PANLALAWIGAN, BATASAN PANLUNGSOD, BATASAN BAYAN AND BATASAN BARANGAY, RESPECTIVELY, AMENDING FOR THE PURPOSE SECTIONS 467, 468, 457, 458, 446, 447, 390, 391, 392, 393 OF THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "The SANGGUNIAN, as a Filipino word is a misnomer in local governance as it means \"consultant, counselor or adviser\" and therefore illogical as the former never functions as a consultant but as a legislative body. The term \"Batasan\" is the most appropriate title in order to impart the true meaning of the council as the body which enacts local laws and resolutions, and definitely, not merely a consultant or adviser to the chief executives."
