congress_website_title = "AN ACT AMENDING SECTION FIVE PARAGRAPH (a) OF REPUBLIC ACT NO. 6713 AND ADDING THERETO SUBPARAGRAPHS (aa),(ab),(ac) AND (ad)(ACTIONS ON LETTERS AND REQUESTS SENT BY THE PUBLIC)"
congress_website_abstract = "This bill proposes to amend RA 6713 (Code of Conduct and Ethical Standards for Public Officials and Employees) as follows: ACT PROMPTLY ON LETTERS AND REQUESTS - All public officials and employees shall, within TEN (10) WORKING DAYS from receipt thereof, respond to letters, telegrams or other means of communications sent by the public. ANY WRITTEN REQUEST FOR ACTION SHALL BE DEEMED APPROVED IF THE SAME IS NOT ACTED UPON BY THE OFFICER OR EMPLOYEE TO WHOM THE REQUEST APPERTAINS WITHIN A PERIODOF TEN (10) WORKING DAYS FROM RECEIPT THEREOF."
