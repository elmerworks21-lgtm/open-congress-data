congress_website_title = "AN ACT STRENGTHENING THE CIVIL SERVICE COMMISSION, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE `ADMINISTRATIVE CODE OF 1987', AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill declares that the CIVIL SERVICE COMMISSION is the SOLE agency tasked to prescribe policies and regulations on the formulation of COMPENSATION and CLASSIFICATION. The CSC shall be the CENTRAL agency to rationalize allocation of scholarshipgrants. The CSC is, likewise, tasked to FORMULATE a Comprehensive Human Resource Development Program which shall be standard for the executive, legislative and judicial branches of government."
