congress_website_title = "AN ACT ACCORDING EQUAL RIGHTS TO WIVES AND HUSBANDS IN THE PHILIPPINES BY AMENDING ARTICLES 333, 334 AND 344 OF ACT NUMBERED THREE THOUSAND EIGHT HUNDRED AND FIFTEEN, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE"
congress_website_abstract = "Proposes these significant amendments to Articles 333, 334 and 344 of the Revised Penal Code: (1) Replaces the crime of \"adulterty\" with \"SEXUAL INFIDELITY\"; (2) changes \"concubinage\" to \"MAINTENANCE OF A PARAMOUR\"; and (3) proposes additional grounds for extinguishing criminal liability with respect to \"sexual infidelity\" and \"maintenance of a paramour.\""

