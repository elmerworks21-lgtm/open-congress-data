congress_website_title = "AN ACT CREATING THE COMMISSION ON PRE-SCHOOL EDUCATION, DEFINING ITS POWERS AND FUNCTIONS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"The Commission on Pre-School Education Act of 1998\". Seeks to promote and work for the development of preparatory school education in the country by way of prescribing and monitoring the curriculum on a periodic basis and constantly reviewing the instructional materials used to teach pre-school pupils. Defines \"pre-school education\" as a preparatory course requirement for pupils before enrolling in a formal elementary education such as, but not limited to, nursery or kindergarten."
