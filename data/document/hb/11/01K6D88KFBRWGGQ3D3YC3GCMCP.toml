congress_website_title = "AN ACT PROMOTING THE ROLE, DIRECT PARTICIPATION AND ACTIVE INVOLVEMENT OF THE COMMON PEOPLE THROUGH COOPERATIVES IN GOVERNMENT INFRASTRUCTURE CONTRACTS AND PROJECTS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"People's Role in Government Infrastructure Contracts and Projects Act of 2000.\" Rationale: Specifically, this bill endeavors to grant qualified cooperatives the chance to engage and/or participate in government infrastructure contracts and projectsas a contractor. The author firmly believes that this will lead to a more equitable distribution of the fruits of development and further strengthen the democratic gains of our people."
