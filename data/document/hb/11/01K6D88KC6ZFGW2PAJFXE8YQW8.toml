congress_website_title = "AN ACT BANNING THE ENTRY, SALE, PROCESSING, FIELD TESTING AND RELEASE OF PRODUCTS CONSISTING OF, CONTAINING OR DERIVED FROM GENETICALLY MODIFIED ORGANISMS (GMOS) INTO AND WITHIN THE COUNTRY AND IMPOSING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "\"GMO Prohibition Act of 2000.\" The entry, sale, processing, field testing, release and similar acts, of products consisting of, containing or derived from genetically modified organisms (GMOs) into and within the country shall be banned in the Philippines for at least five (5) years after which the National Committee on Biosafety of the Philippines (NCBP), shall establish an efficient administrative procedure for granting permits and monitoring any direct, indirect, immediate or delayed effectsof GMOs on human health and the environment."

