congress_website_title = "AN ACT PROVIDING FOR THE VALIDITY OF DIPLOMATIC PASSPORT ISSUED TO THE PRESIDENT, VICE PRESIDENT, SENATE PRESIDENT, SPEAKER OF THE HOUSE OF REPRESENTATIVES , CHIEF JUSTICE, CABINET SECRETARY AND MEMBERS OF CONGRESS FOR THE DURATION OF THEIR TERM OFOFFICE, AMENDING FOR THE PURPOSE THE PHILIPPINE PASSPORT ACT OF 1996"
