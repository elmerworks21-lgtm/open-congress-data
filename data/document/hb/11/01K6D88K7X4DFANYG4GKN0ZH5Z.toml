congress_website_title = "AN ACT CREATING THE NATIONAL GAMBLING IMPACT STUDY AND POLICY COMMISSION TO REVIEW, STUDY AND ASSESS THE IMPACT OF GAMBLING AND OTHER SIMILAR FORMS OF GAMES AND AMUSEMENTS, AND RECOMMEND POLICY, INSTITUTIONAL AND SIMILAR MEASURES, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Gambling Impact Study and Policy Commission Act of 2000\". Rationale: Gambling, as many people would say, brings more harm than good. As a matter of facy many families have been broken due to gambling. On the other hand, it also helps build roads and bridges, schools, water system, and other forms of infrastructure projects from its proceeds. Its many advantages and disadvantages are still up for debate until this time because nobody knows exactly in factual terms if gambling indeed brings more harm than good."

