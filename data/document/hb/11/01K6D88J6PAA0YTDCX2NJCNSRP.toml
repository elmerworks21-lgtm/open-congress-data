congress_website_title = "AN ACT TO AMEND REPUBLIC ACT NO. 6425, KNOWN AS THE DANGEROUS DRUG ACT OF 1972, AS AMENDED BY REPUBLIC ACT NO. 7659, BY ELIMINATING THE QUANTITY OF THE DANGEROUS DRUGS INVOLVED AS BASIS FOR IMPOSING THE PENALTY FOR VIOLATION THEREOF"
congress_website_abstract = "Rationale: The amendments introduced to RA 7659, the Dangerous Drugs Act, were inutile in solving the problem. Instead of increasing the penalty for violations, in reality the penalty was decreased. As a result, big time pushers and traffickers when arrested usually invoked their right to bail."
