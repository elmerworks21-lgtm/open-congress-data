congress_website_title = "AN ACT RESTORING THE ALLOCATION OF TWENTY PERCENT (20%) OF THE INCREMENTAL REVENUES FROM THE INCREASE OF DOCUMENTARY STAMP TAXES TO THE TWENTY (20) DEPRESSED PROVINCES, AMENDING FOR THE PURPOSE, REPUBLIC ACT NUMBERED SEVENTY-SIX HUNDRED SIXTY, ENTITLED, 'AN ACT RATIONALIZING FURTHER THE STRUCTURE AND ADMINISTRATION OF THE DOCUMENTARY STAMP TAX, AMENDING FOR THE PURPOSE CERTAIN PROVISIONS OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, ALLOCATING FUNDS FOR SPECIFIC PROGRAMS AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to allocate the 20% of the incremental revenue from the increase of the documentary stamp tax for the depressed areas. DEPRESSED PROVINCES are areas which generally exhibit characteristics of poverty associated with low incomes, lackof access to basic services and presence of armed conflict."
