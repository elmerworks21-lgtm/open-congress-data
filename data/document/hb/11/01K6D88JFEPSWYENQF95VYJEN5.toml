congress_website_title = "AN ACT AMENDING SECTION 42 OF BATAS PAMBANSA BLG. 129, OTHERWISE KNOWN AS THE JUDICIARY REORGANIZATION ACT OF 1981, EXCEPTING FROM THE PROVISIONS THEREOF ALL MEMBERS OF THE JUDICIARY AS MAY HEREIN BE QUALIFIED WHOSE COURTESY RESIGNATIONS WERE ACCEPTED DURING THE 1987 JUDICIARY REORGANIZATION AND WHO WERE SUBSEQUENTLY RE-APPOINTED, AND FOR OTHER PURPOSES"
congress_website_abstract = "All justices and judges whose courtesy resignations were accepted in the implementation of the 1987 Judiciary Reorganization, but who were subsequently REINSTATED as members of the Bench shall be exempted from the \"continuity of service\" requirementunder Section 42, BP Blg. 129, for purposes of their longevity pay rating."
