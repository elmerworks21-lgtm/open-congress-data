congress_website_title = "AN ACT PROVIDING FOR PREVENTIVE MEASURE TO PASSANGER SHIPS, BY REQUIRING THEM TO PUT UP BILLBOARDS CONTAINING THE LOAD AND WEIGHT CAPACITY OF THE SHIP AT CONSPICUOUS PLACES AND INSIDE THE SHIP AND DECLARING OVERLOADING, NEGLIGENCE OF THE CREW AND LACK OF SAFETY EQUIPMENT IN SEA CRAFTS AS HEINOUS CRIME AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Recommends that the ship company officials, crew, officers and men of the Philippine Coast Guard and other government agencies involved in authorizing the overloading of a vessel be meted the penalty imposed to heinous crimes."
