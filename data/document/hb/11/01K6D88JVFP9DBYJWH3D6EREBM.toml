congress_website_abstract = "\"Revised forestry Profession Law\". Rationale: The approval of the proposed revision is urgent and highly desirable in order to enable the professional Filipino Foresters to effectively address the various demands of their clientele and accordingly react to social and political issues and critical environmental concerns besetting the country today. The Filipino Forester's role in sustainable development will be enhanced and the mechanism for the growth of the profession will be institutionaliz ed in this proposed Act."
