congress_website_title = "AN ACT RATIONALIZING THE EDUCATIONAL ASSISTANCE PROGRAMS FOR INDIGENOUS CULTURAL COMMUNITIES AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares that the DECS is vested with the AUTHORITY to systematize, administer and implement the following programs: (1) National Integration Scholarship Grant Program (NISGP); (2) Selected Ethnic Group Essential Assistance Program (SEGEAP); and other study grants for deserving members of the indigenous cultural communities. Prescribes the power and function of the DES and other offices towards this end."
