congress_website_title = "AN ACT PENALIZING GOVERNMENT OFFICIALS AND EMPLOYEES FOR FAILURE TO IMMEDIATELY FACILITATE DOCUMENTS, CAR PLATES AND STICKERS, APPOINTMENT PAPERS IN THE GOVERNMENT SERVICE, AND THE LIKE WHETHER FOR SIGNATURE, RELEASE, OR APPROVAL AND FOR OTHER PURPOSES"
congress_website_abstract = "It shall be unlawful for any government employee for failure to immediately facilitate any document, car plates and stickers, appointment papers in the government service, and the likes submitted, applied or requested by any individual whether for signature, processing of appointment, approval or release. It shall likewise be unlawful for any head of agency, division chief, unit supervisor, or any official or employee for failure to immediately act on documents presented to him for signature within the period prescribed under this Act."
