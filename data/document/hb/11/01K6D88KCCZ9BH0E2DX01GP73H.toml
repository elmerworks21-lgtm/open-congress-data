congress_website_title = "AN ACT SEEKING TO IMPROVE CHILD PROTECTION AGAINST ABUSE, EXPLOITATION AND DISCRIMINATION, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7610, AS AMENDED BY REPUBLIC ACT NO. 7658, OTHERWISE KNOWN AS THE `SPECIAL PROTECTION OF CHILDREN AGAINST CHILD ABUSE, EXPLOITATION AND DISCRIMINATION ACT', APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks the more active involvement of government agencies like the Departments of Justice, Labor and Employment, Health and Tourism in child protection. Considering the government's thrust of decentralizatio n, this bill also provides for the greater participation of local social workers and law enforcers. CHILD PORNOGRAPHY is punshiable under this bill and mandates the creation of a central data bank to manitor the progress of child abuse cases."

