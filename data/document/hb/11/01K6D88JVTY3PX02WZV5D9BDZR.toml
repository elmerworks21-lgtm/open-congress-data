congress_website_title = "AN ACT UPGRADING THE JOSE R. REYES MEMORIAL MEDICAL CENTER (JRRMMC) INTO A DEPARTMENT OF HEALTH (DOH) NATIONAL CENTER FOR TRAUMA, CANCER AND DERMATOLOGY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The Jose R. Reyes Memorial Meducal Center (JRRMMC) is the flagship hospital of the Department of Health (DOH). It treats cancer-causing diseases and dermatology related problems. These diseases have increased over the years since the establishment of JRRMMC more than 30 years ago. To date, the daily admission of JRRMMC for emergency consultation and treatmment of cancer causing diseases and dermatology related problems has gone out of proportion as the center also caters to patients from outside Metro Manila. As always, the JRRMMC has efficiently responded to this call despite of its limited resources. However, the JRRMMC will soon be rendered inefficient due to the mismatch between the growing number of patients every singleyear the center caters as against the decreasing resources the center has now had. Understandably, the center's efficiency will be put to question in the not too distant future."
