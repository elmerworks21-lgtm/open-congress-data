congress_website_title = "AN ACT ABOLISHING DEATH PENALTY IN THE PHILIPPINES"
congress_website_abstract = "Rationale: The death penalty (1) precludes reparation for a wrongful conviction; (2) hampers preventive and remedial action; (3) dares, rather than deters, hardened criminals; (4) glamorizes crime for the mentally unstable; and (5) breeds callous judges and counsels. More importantly, capital punishment is incompatible with the self-respect of a civilized nation."
