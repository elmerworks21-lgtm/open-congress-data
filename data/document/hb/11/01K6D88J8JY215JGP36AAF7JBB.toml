congress_website_title = "AN ACT AMENDING SECTION 285 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, PROVIDING FOR THE REDUCTION OF THE INTERNAL REVENUE ALLOCATION (IRAs) OF HIGH-INCOME LOCAL GOVERNMENT UNITS (LGUs) BY EIGHT PERCENT (8%) FORTHE BENEFIT OF LOW INCOME LGUs"
