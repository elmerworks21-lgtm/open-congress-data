congress_website_title = "AN ACT PENALIZING BANKS FOR FAILURE OF THE DEPOSITORS TO MAKE WITHDRAWALS FROM THEIR AUTOMATED TELLER MACHINES FOR WHATEVER CAUSE, EXCEPT WHERE NO FUNDS REMAIN IN THE DEPOSITOR'S ACCOUNT"
congress_website_abstract = "It shall be the policy of the State to protect its citizens from all forms of arbitrariness. In line with this policy, the Government shall adopt and implement measures necessary to carry out such policy for the protection of the citizenry particularly bank depositors from unreasonable failure to withdraw their money which under the law, are loaned only to the banks."

