congress_website_title = "AN ACT LOWERING THE RETIREMENT AGE FOR PUBLIC SCHOOL TEACHERS FROM SIXTY (60) TO FIFTY-FIVE (55) YEARS OLD FOR OTHER PURPOSES"
congress_website_abstract = "Any public school teacher, upon reaching the age of fifty (50) years or more, but not beyond sixty (60) years, which is hereby declared the compulsory retirement age for public school teachers, and who has served at least twenty (20) years as public school teachers may retire and shall be entitled to all the retirement benefits provided under the existing laws."
