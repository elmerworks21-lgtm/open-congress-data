congress_website_title = "AN ACT MANDATING ALL LOCAL CIVIL REGISTRARS WITHIN THE COUNTRY TO CAUSE AMENDMENT OF CERTAIN PORTION IN THEIR RESPECTIVE PRESCRIBED FORMS OF MARRIAGE LICENSE APPLICATIONS BY PROVIDING FOR THE INSERTION OF PRECAUTIONARY LANGUAGE FOR THE PERUSAL AND GUIDANCE OF APPLICANTS THEREOF"
congress_website_abstract = "The application for a marriage license shall contain the following statement: \"THE LAWS OF THE PHILIPPINES AFFIRM YOUR RIGHT TO ENTER INTO THIS MARRIAGE AND AT THE SAME TIME TO LIVE WITHIN THE MARRIAGE FREE FROM VIOLENCE AND ABUSE. NEITHER OF YOU ISTHE PROPERTY OF THE OTHER. PHYSICAL ABUSE, SEXUAL ABUSE, AND ASSAULT OR ANY FORM OF VIOLENCE OF A SPOUSE OR OTHER FAMILY MEMBER, AS WELL AS OTHER PROVISIONS OF THE CRIMINAL LAWS OF THE PHILIPPINES, ARE APPLICABLE TO SPOUSES AND OTHER FAMILY MEMBERSAND VIOLATIONS THEREOF ARE PUNISHABLE BY LAW.\""
