congress_website_title = "AN ACT DECLARING AS ILLEGAL THE MANUFACTURE, PRODUCTION, MAKING, IMPORTATION AND SALE OF SIREN AND/OR BLINKER DEVICES AS WELL AS TO PURCHASE THE SAME WITHOUT A PERMIT THEREFOR AND THE INSTALLATION AND/OR USE THEREOF IN UNAUTHORIZED VEHICLES, CREATION OF EMERGENCY VEHICLE LANES IN MAJOR THOROUGHFARES, PROVIDING PENALTIES FOR A VIOLATION THEREOF AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"The Emergency Vehicle Law of 1999.\" Rationale: Drivers of a lot of vehicles are using siren and/or blinker devices or otherwise using hazard and headlights to indicate an emergency situation when in fact there is none. Obviously, the resort to anduse of these devices and practices must be reserved for genuine emegency cases only. The illegal and unauthorized use of said devices must now be stopped."
