congress_website_title = "AN ACT INCREASING THE COMPULSORY MOTOR VEHICLES LIABILITY INSURANCE FEE FROM FIVE THOUSAND PESOS (P5,000.00) TO THIRTY THOUSAND PESOS (P30,000.00) FOR DEATH CLAIM AND NOT EXCEEDING TEN THOUSAND PESOS (P10,000.00) FOR PHYSICAL INJURY CLAIM, TO INDEMNIFY THE DEATH OR BODILY INJURY OF A PASSENGER OR THIRD PARTY, AMENDING FOR THIS PURPOSE SECTION 378, CHAPTER VI OF PRESIDENTIAL DECREE NO. 1460, OTHERWISE KNOWN AS THE INSURANCE CODE OF 1978"
congress_website_abstract = "Ratinale: In 1998, the peso's purchasing power has gone down to P0.34. Conversely, the real value of P5,000 ia only P1,700. The decline was further aggravated following the recent spate of price increases in oil, transport fare, electricity, tuitionfee, prime commodities, and the skyrocketeing increase in toll rates. > It is in this context that this bill is filed to increase the said amount from P5,000.00 to P30,000.00 for death claim and not exceeding P10,000.00 for physical injury claim."

