congress_website_title = "AN ACT ALLOCATING THE COLLECTION FROM CAPITAL GAINS TAX AND VALUE-ADDED TAX ON THE SALE OF REAL PROPERTY TO THE AFP MODERNIZATION ACT TRUST FUND, AMENDING FOR THE PURPOSE CHAPTER II, TITLE XI OF THE NATIONAL INTERNAL REVENUE CODE OF 1997, AS AMENDED"
congress_website_abstract = "Rationale: To provide additional funding for the AFP Modernization Program, this bill seeks to allocate collections made by the Bureau of Internal Revenue from capital gains tax and value-added tax on the sale of real properties to the AFP Modernization Act Trust Fund. The proceeds from such taxes will go a long way in realizing the thrust of the AFP Modernization Program in terms of weapons systems, technology and bases development."
