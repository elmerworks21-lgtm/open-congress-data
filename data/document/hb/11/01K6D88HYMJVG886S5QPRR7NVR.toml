congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 7202, OTHERWISE KNOWN AS THE SUGAR RESTITUTION LAW, AND FOR OTHER PURPOSES(SUGAR PLANTERS AND MILLERS)"
congress_website_abstract = "Provides that whatever amount or PROPERTIES recovered by the government through the Presidential Commission on Good Government (PCGG) or any other agency TRANSFERRED AND CEDED TO THE GOVERMENT UNDER THE COMPROMISE AGREEMENTS ENTERED INTO BY THE PCGGAND ROBERTO S. BENEDICTO shall be used to compensate all sugar PLANTERS AND MILLERS from Crop Year 1974-1975 up to and including Crop Year 1984-1985 on a pro rata basis. Directs the PCGG to turn over to the Sugar Regulatory Administration (SRA) allfunds and assets already recovered which in turn shall be distributed as soon as possible to the sugar planters and millers on a pro rata basis and to the sugar producers, ten (10%) percent of which shall be allocated to labor."
