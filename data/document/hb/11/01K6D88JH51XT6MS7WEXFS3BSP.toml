congress_website_title = "AN ACT REGULATING THE EDUCATION AND LICENSURE OF PHYSICIANS AND THEIR PRACTICE OF MEDICINE IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Physician's Act of 1999\". This Act provides for: (1) the standardization , upgrading, and regulation of the operation of medicine-proper courses including internship training; (2) the examination for registration and licensure; (3) the supervision,control and regulation of the practice of medicine; (4) the integration of the profession; and (5) the development of the competence, moral values, and professional attitude of physicians through Continuing Professional Education (CPE)."
