congress_website_title = "AN ACT ESTABLISHING A NATIONAL POLYTECHNIC SYSTEM, AMENDING FOR THIS PURPOSE CERTAIN PROVISIONS OF REPUBLIC ACT NO. 7796, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The existence of a strong polytechnic system is a common denominator among industrialized economies and technologically advanced countries. At the outset polytechnic have been recongized as institutions that will best develop the technical staff up to the level of scientists for the hard, applied sciences. In a highly advanced countries such as South Korea, Singapore and Japan, the polytechnics have flourished and they have contributed singificantly to the advancement of applied sciences and technology thereby propelling these countries to economic prosperity."

