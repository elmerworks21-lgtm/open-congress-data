congress_website_title = "AN ACT ESTABLISHING A PROGRAM FOR THE CONSTRUCTION AND MAINTENANCE OF SCHOOL BUILDINGS IN THE PUBLIC ELEMENTARY AND SECONDARY SCHOOLS NATIONWIDE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Schoolbuilding Act\". Directs the DECS in coordination with the DPWH and other appropriate agencies to formulate a comprehensive and continuing schoolbuilding program which will address the problem of classroom shortage and provide not only the construction of adequate schoolbuilding facilities but also for the integration of all the necessary information for the effective monitoring and maintenance of existing schoolbuildings ."

