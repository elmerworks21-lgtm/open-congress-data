congress_website_title = "AN ACT INSTITUTING A PHILIPPINE MARITIME AND OCEANS POLICY AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Oceans Act of 2000\". This bill seeks to institute a maritime and oceans policy that includes a 5-year ocean development agenda. Under this program, an information system is to be created to (1) collect, process and manage the use of information related to the oceans, ocean process, marine resources, marine ecosystems as necessary inputs to policy-making and the planning and implementation of projects and programs; (2) develop the human material resources and capabilities necessaryto support the information system and (3) ensure the wide dissemination of such information to the concerned sectors and the general public in order to encourage participation in oceans' management."

