congress_website_title = "AN ACT STRENGTHENING THE POWERS, FUNCTIONS AND RESPONSIBILITIE S OF THE COOPERATIVE DEVELOPMENT AUTHORITY (CDA), AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6939, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bills eeks to (1) strengthen the developmental and regulatory powers of the Cooperative Development Authority (CDA); (2) grant quasi-judicial power to the Authority; (3) provide a system of consultation between the cooperative sector and the government, as well as a system of arbitration."
