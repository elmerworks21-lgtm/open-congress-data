congress_website_title = "AN ACT CREATING THE NATIONAL CENTER FOR EXCELLENCE IN SPORTS (NCES) UNDER THE PHILIPPINE SPORTS COMMISSION, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The dismal failure of our national athletes to improve their medal standing in the recently concluded South East Asian Games signals the need to refocus the thrust in our sports programs and policies. The proposed creation of the NCES aims to centralize all training programs undertaken by various government agencies and sports organizations under one umbrella. It shall seek to provide wolrd calss training facilities for our atheltes. Furthermore, the athletes shall be provided withthe proper training and enticing incentives."
