congress_website_title = "AN ACT INSTITUTING THE NATIONAL POLICY ON SPORTS TO ACHIEVE HUMAN DEVELOPMENT AND SOCIAL PROGRESS, CREATING FOR THIS PURPOSE A SOLE GOVERNMENT BODY THAT SHALL PROMOTE AND REGULATE PHILIPPINE SPORTS, DEFINING ITS STRUCTURE, POWERS, RESPONSIBILITIE SAND FUNCTIONS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Sports Authority Act\". Lends substance to the policy of the State to create and establish a sole government sports body with a nationwide network for the advancement and regulation of amateur and professional sports, as well as the delivery of sports education and training services."

