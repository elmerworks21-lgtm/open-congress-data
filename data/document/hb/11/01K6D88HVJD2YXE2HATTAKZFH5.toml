congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED SEVENTY-SIX HUNDRED AND FIFTY-THREE ENTITLED 'THE NEW CENTRAL BANK ACT' AND FOR OTHER PURPOSE"
congress_website_abstract = "Fixes the TERM of a NEW member in the Monetary Board (due to a vacancy created by the death, resignation or removal of a member) act at THREE (3) YEARS, or equivalent to the unexpired term of the member concerned. Sets prohibitions on who can be amember of the Board and ensures high standard of the compensation and wage structure of the Bangko Sentral's officials and employees."
