congress_website_title = "AN ACT INSTITUTIONALIZ ING THE BARANGAY INTEGRATED DEVELOPMENT APPROACH FOR NUTRITION IMPROVEMENT (BIDANI) OF THE RURAL POOR AS A NETWORK PROGRAM OF PARTICIPATING STATE COLLEGES AND UNIVERSITIES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "'BIDANI Act of 1998\". Rationale: Statistics disclosed that nearly 72% of Filipino household are not meeting their daily energy requirements simply because they are poor and can not afford nutritious food. Seeks to (1) encourage cooperation and participation of academic institutions and local government in promoting the nutritional well-being of the country; (2) evolve an effective action-research network program to improve the nutrition and general well-being of the poor."
