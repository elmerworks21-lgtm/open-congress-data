congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8749, OTHERWISE KNOWN AS `AN ACT PROVIDING FOR A COMPREHENSIVE AIR POLLUTION CONTROL POLICY AND FOR OTHER PURPOSES' BY DELETING SECTION 5 LETTER (t) AND SECTION 20 OF SAID ACT"
congress_website_abstract = "Chapter One, Article Two, Section 5, letter (t) entitled \"Poisonous and Toxic Fumes\" and Chapter Two, Article Three, Section 20 entitled \"Ban on Incineration\" are hereby DELETED and all remaining sub-sections and sections are RENUMBERED accordingly.The use of safer technologies like the waste-to-energy INCINERATORS that can burn garbage without causing much damage to the ozone layer is the call of the time, hence the prayer for the immediate approval of this bill."
