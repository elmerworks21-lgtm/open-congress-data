congress_website_title = "AN ACT PROVIDING FOR AGRICULTURAL DEVELOPMENT CREDIT AND FINANCING TO STIMULATE AND INTENSIFY AGRICULTURAL PRODUCTIVITY AMONG FARMERS, LAND REFORM BENEFICIARIES AND FARMERS' COOPERATIVES IN THE RURAL AREAS, CREATING FOR THE PURPOSE THE AGRICULTURALDEVELOPMENT FINANCING COUNCIL (ADFC)"
congress_website_abstract = "The Agriculture Development Financing shall include: loans for working capital; production loans and other types of loans for the acquisition of farm machinery and equipment; seeds; fertilizer; poultry; livestock; work animals; breeders for food production; feeds; feed production equipment; artifical-envir onment housing machinery and equipment for specialty crops and for poultry and livestock; feed ingredients; the acquisition of lands authorized under the Comprehensive Land Reform Law and other existing agrarian reform laws."

