congress_website_title = "AN ACT AUTHORIZING THE TRANSFER OF OFFENDERS TO OR FROM FOREIGN COUNTRIES"
congress_website_abstract = "\"Transfer of Prisoners Act of 1999\". This is the purpose of the attached bill. It seeks to authorize the Secretary of Justice to receive the custody of a Filipino ofender or cause the transfer of an alien serving sentence in Philippine penitentiaries in accordance with the provisions of a prisoner transfer treaty between the {hilippines and another country. It provides for a procedure in securing the offender's consent to his transfer and the verification of such consent. It provides for thesource of administrative costs attendant to the transfer of sentenced Filipino prisoners."
