congress_website_title = "AN ACT GRANTING CERTAIN BENEFITS AND INCENTIVES TO SCIENCE AND MATHEMATICS TEACHERS"
congress_website_abstract = "\"Developing Globally Competitive Science and Mathematics Teachers Act.\" The attached bill proposes to provide measures that will attract bright students in mathematics and science to pursue a career in science teaching, to enable them to advance intheir specialization, sustain their interest in this field, and encourage them to stay in science teaching. It also provides measures that will continually upgrade the competence of those who are already in science teaching."
