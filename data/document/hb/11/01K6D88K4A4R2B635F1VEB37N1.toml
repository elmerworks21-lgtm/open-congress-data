congress_website_title = "AN ACT REGULATING THE PRACTICE OF INSTRUMENTATION AND CONTROL ENGINEERING IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Insturmentation and Control Engineering Law of 2000\". Rationale: The accelerated growth in the instrumentation and control technology for the past twenty years introduced new and better instruments, fast and efficient monitoring and control systems, and intelligemt data acquisition systems capable of integrating and controlling various loops in a complex petrochemical refinery. This brings industries automation in compact sized reducing spaces and minimizing manual labor force. A new breed of highly skilled technologies known as Instrument and Control Engineers and Technicians emerged. The implementation of ISO 2000 Standards and the appoval of the GATT propelled the different industries to \"shape up or perish\" in their bid too be competitive not only in this country but internationally . In their bid to modernize, the need for Instrumentation and Control Engineers and Technicians becomes more imperative."

