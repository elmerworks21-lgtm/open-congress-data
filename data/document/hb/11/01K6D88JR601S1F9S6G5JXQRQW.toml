congress_website_title = "AN ACT RATIONALIZING FURTHER THE POWER OF ASSUMPTION OR CERTIFICATION OF LABOR DISPUTES BY THE SECRETARY OF LABOR AND EMPLOYMENT BY LIMITING THE EXERCISE THEREOF TO INDUSTRIES FULFILLING ESSENTIAL SERVICES, AMENDING FOR THE PURPOSE ARTICLE 263(g) OFTHE LABOR CODE OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill provides that when a labor dispute is causing or likely to cause a strike or lockout in an indsutry FULFILLING ESSENTIAL SERVICES, the DOLE Secretary may assume jurisdiction over the dispute and decide THE SAME WITHIN THIRTY (30) DAYS AFTER SUCH ASSUMPTION. The Secretary's decision shall be FINAL AND EXECUTORY."
