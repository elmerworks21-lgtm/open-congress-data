congress_website_title = "AN ACT PROHIBITING BANKS FROM IMPOSING FEES OR CHARGES ON SAVING OR CURRENT ACCOUNTS FALLING BELOW THE REQUIRED MINIMUM MAINTAINING BALANCE AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Declares it UNLAWFUL for any bank to impose fees or charges on depositors who cannot comply with the required minimum maintaining balance in savings or current accounts by deducting certain amounts from the depositor's remaining balance of his deposit. Penalizes violation of this Act."

