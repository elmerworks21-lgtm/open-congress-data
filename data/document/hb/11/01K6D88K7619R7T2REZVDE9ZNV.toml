congress_website_title = "AN ACT PROVIDING FOR THE MODERNIZATION OF THE PHILIPPINE ATMOSPHERIC, GEOPHYSICAL AND ASTRONOMICAL SERVICES ADMINISTRATION AND PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"PAGASA Modernization Act\". The modernization program under this Act shall principally be a re-tooling of the PAGASA with modern equipment and facilities, including but not limited to, advanced observational and surveillance system for meteorological and hydrological elements, satellite based communication network, supercomputers for data processing analyses and forecasting, and computer based workstations for generating increased volume for detailed information. It shall also establish an efficient human resources development program that emphasizes on professional education, training and research."

