congress_website_title = "AN ACT INCREASING THE MONTHLY GRATUITY TO AN AWARDEE OF THE MEDAL OF VALOR, AMENDING FOR THE PURPOSE SECTION 1 OF PRESIDENTIAL DECREE NO. 1687, AND FOR OTHER PURPOSES"
congress_website_abstract = "The Medal of Valor (MOV) is the highest award that may be given to a Filipino soldier. This is accorded to selected members of the armed forces for their supreme self-sacrifice and unparalleled act of gallantry, to a point of risking their lives above and beyond the call of duty."
