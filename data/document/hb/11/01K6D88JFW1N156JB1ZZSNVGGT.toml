congress_website_title = "AN ACT PROVIDING FOR A UNIFORM GOVERNANCE OF THE PSHS SYSTEM, AMENDING FOR THE PURPOSE SECTIONS 6 AND 7 OF REPUBLIC ACT NO. 8496 AND SECTIONS 3 AND 5 OF REPUBLIC ACT NO. 8619"
congress_website_abstract = "Rationale: The PSHS System provides the kind of training that would produce citizens with competence and skills that can measure up to global competition. To effectively implement RA 8496, the PSHS System Law, a UNIFORM GOVERNANCE of all PSHS carpases is imperative."
