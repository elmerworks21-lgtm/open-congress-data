congress_website_title = "AN ACT AMENDING SECTION THREE HUNDRED SIXTY-NINE OF THE LOCAL GOVERNMENT CODE OF 1991(RE: PROCUREMENT OF SUPPLIES OF LGUS ESPECIALLY REPEAT ORDER)"
congress_website_abstract = "This bill proposes to give greater leeway to our local government units in procuring necessary supplies by way of the less tedious process of negotiated purchases. This bill proposes that a REPEAT ORDER for regular supplies may be made within [three(3) months] SIX (6) MONTHS from the procurement of the same items."

