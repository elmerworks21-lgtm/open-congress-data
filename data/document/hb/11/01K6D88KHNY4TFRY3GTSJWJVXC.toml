congress_website_title = "AN ACT PROVIDING FOR POLICY REFORMS TO ENSURE THE ECONOMIC VIABILITY OF SUGAR PLANTERS IN AREAS WHERE THERE IS A SUGAR MILLING MONOPOLY"
congress_website_abstract = "\"Sugar Planters Policy Reforms Act\". This bill provides policy reforms, such as: (a) A milling contract between sugar central and sugar planter(s) shall be mandatory before each planting season; (b) Government and government-owne d or-controlled financial isntitutions shall provide adequate financing to sugar planters while strenthening the integrity of the quedan system; and (c) Sugar planters assosicaiton dues collected through sugar centrals shall not be withheld by the latter as loan guarantees."
