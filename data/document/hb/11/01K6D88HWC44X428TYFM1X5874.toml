congress_website_title = "AN ACT PROVIDING THAT ANY ELECTIVE OFFICIAL RUNNING FOR ANY OFFICE OTHER THAN THE ONE WHICH HE IS HOLDING IN A PERMANENT CAPACITY, WITHOUT EXCEPTION, SHALL BE CONSIDERED IPSO FACTO RESIGNED FROM HIS OFFICE UPON THE FILING OF HIS CERTIFICATE OF CANDIDACY, AMENDING FOR THE PURPOSE THE OMNIBUS ELECTION CODE"
congress_website_abstract = "Considers ALL elective officials ipso facto RESIGNED from their respective offices, including the President and the Vice-President of the Republic, whether national or local, if they run for any office other than the ones they are holding in a permanent capacity, upon filing of their certificates of candidacy."
