congress_website_title = "AN ACT PENALIZING ACTIVITIES INIMICAL TO THE USE OF CYBERSPACE, DESTRUCTION OF INFORMATION TECHNOLOGY INFRASTRUCTURE AND RELATED OFFENSES"
congress_website_abstract = "It is the policy of the State to protect society against computer fraudm destruction of electronic systems and properties and proliferation of cyber-crime brought about by the continuing globalication of computer networks. It is imperative that theconfidentiality , integrity, reliability and availability of computer systems, networks and computer data are maintained in the furtherance of our national interest and security. It is in this context that the State recognize its duty to safeguardits interest against the menance of electronic fraud and other instruments of high technology that tend to disrupt peace and order in cyberspace."

