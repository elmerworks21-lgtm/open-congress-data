congress_website_title = "AN ACT REQUIRING THE MANDATORY TEACHING OF INTERNATIONAL HUMANITARIAN LAW IN ALL HIGH SCHOOLS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Mandatory Teaching of International Humanitarian Law in All High Schools.\" All high schools are obliged to incorporate in their fourth year curriculum a subject dealing on the basic principles, rules and regulations of International Humanitarian Law. No student should be allowed to graduate from high school without having passed this particular subject."
