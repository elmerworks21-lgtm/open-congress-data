congress_website_title = "AN ACT GRANTING THE NATIONAL COMMISSION ON INDIGENOUS PEOPLES (NCIP) AN ADDITIONAL THREE (3) YEARS WITHIN WHICH TO TAKE APPROPRIATE LEGAL ACTION FOR THE CANCELLATION OF OFFICIALLY DOCUMENTED TITLES WHICH WERE ACQUIRED ILLEGALLY, AS PROVIDED UNDER SECTION 64 OF REPUBLIC ACT NUMBER 8371 OTHERWISE KNOWN AS `AN ACT TO RECOGNIZE, PROTECT AND PROMOTE THE RIGHTS OF INDIGENOUS CULTURAL COMMUNITIES /INDIGENOUS PEOPLES, CREATING THE NATIONAL COMMISSION ON INDIGENOUS PEOPLES, ESTABLISHING IMPLEMENTING MECHANISMS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES'"
congress_website_abstract = "Rationale: The Constitution of the National Commission on Indigenous Peoples (NCIP) and its proposed plantilla positions as an organization was delayed for about two (2) years. Considering the delay, the Commission needs more time to review cases ofillegally acquired titles. Thus this bill."
