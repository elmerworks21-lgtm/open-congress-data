congress_website_title = "AN ACT REQUIRING EMPLOYERS TO ORIENT THEIR WORKERS ON OCCUPATIONAL HEALTH AND SAFETY CONDITIONS IN THEIR WORKPLACES, AND PROVIDING PENALTIES FOR VIOLATION THEREOF, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED FOUR HUNDRED AND FORTY-TWO, OTHERWISE KNOWN AS THE `LABOR CODE OF THE PHILIPPINES,' AS AMENDED"
congress_website_abstract = "Rationale: It is not enough that the DOLE merely enforce health and safety standards in the workplace. Public health demands that employers should orient their employees with occupational hazards and safety standards in the workplace. Penalizes violation of this Act."

