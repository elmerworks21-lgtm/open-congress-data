congress_website_title = "AN ACT PROVIDING AUTHORITY TO THE CIVIL REGISTRY TO CORRECT CLERICAL ERRORS ENTERED ON ITS RECORDS OF BIRTH, MARRIAGE AND DEATH WITHOUT NEED OF A JUDICIAL ORDER, HEREBY AMENDING ARTICLE 412 OF THE CIVIL CODE OF THE PHILIPPINES"
