congress_website_title = "AN ACT PROVIDING FOR A NATIONAL ECOTOURISM POLICY, ESTABLISHING A STRATEGIC FRAMEWORK FOR ITS DEVELOPMENT AND MANAGEMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Ecotourism Act of 1998\". \"ECO-TOURISM\" is a low-impact, environmentally sound and community-parti cipatory tourism activity in a given natural environment that enhances the conservation of bio-physical and cultural diversity, promotes environmental understanding and education, and yield socio-economic benefits to the concerned community."
