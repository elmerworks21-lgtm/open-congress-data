congress_website_title = "AN ACT PROVIDING GREATER PROTECTION TO LOCAL INDUSTRIES THROUGH THE IMPOSITION OF ANTI-DUMPING DUTY, AMENDING FOR THE PURPOSE SECTION 301, PART 2, TITLE II, BOOK 1 OF THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES, AS AMENDED BY REPUBLIC ACT NO. 8752"
congress_website_abstract = "FIFTY PERCENT OF THE DUMPING DUTIES COLLECTED ARISING FROM A PARTICULAR DUMPING PROTEST SHALL BE RETURNED TO THE PETITIONING COMPANY(IES) THROUGH ITS (THEIR) INDUSTRY ASSOCIATION AS MAY BE ACCREDITED BY THE DEPARTMENT OF TRADE AND INDUSTRY OR THE DEAPRTMENT OF AGRICULTURE, AS THE CASE MAY BE. THE BALANCE OF FIFTY PERCENT SHALL BE EARMARKED FOR THE STRENGTHENING OF THE CAPABILITIES OF THE AGENCIES TASKED TO UNDERTAKE THEIR RESPONSIBILITIE S UNDER THIS ACT."
