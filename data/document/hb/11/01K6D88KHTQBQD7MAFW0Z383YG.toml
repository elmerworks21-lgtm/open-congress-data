congress_website_title = "AN ACT EXPANDING THE COVERAGE OF THE EMPLOYEES COMPENSATION AND STATE INSURANCE FUND TO INCLUDE RETIRED EMPLOYEES AGED SEVENTY (70) AND BELOW WHO SUBSEQUENTLY REACQUIRED EMPLOYMENT, AMENDING FOR THE PURPOSE THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "This bill seeks to AMEND Art.168 of PD 442, As Amended, to read as follows: \"Art. 168. Compulsory Coverage - Coverage in the State Insurance Fund shall be compulsory upon all employers and their employees not over [sixty (60)] SEVENTY (70) years ofage; Provided, that an employee who is over sixty (60) years of age and paying contributions to qualify for the retirement or life insurance benefits administered by the system shall be subject to compulsory coverage.\""

