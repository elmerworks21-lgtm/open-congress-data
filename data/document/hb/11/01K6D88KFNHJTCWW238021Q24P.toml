congress_website_title = "AN ACT STRENGTHENING THE VOLUNTEER AND DEMOCRATIC CHARACTER OF THE BOY SCOUT OF THE PHILIPPINES, FURTHER AMENDING COMMONWEALTH ACT NO. 111 FOR THIS PURPOSE"
congress_website_abstract = "This bill proposes certain amendments to Commonwealth Act No. 111, such as: ELECTIVE OFFICERS AND MEMBERS OF THE NATIONAL EXECUTIVE BOARD MAY BE RE-ELECTED, EXCEPT FOR THE NATIONAL PRESIDENT WHO SHALL BE ELIGIBLE FOR NOT MORE THAN ONE RE-ELECTION ORA MAXIMUM OF FOUR (4) YEARS; PROVIDED THAT THE INCUMBENT ELECTIVE OFFICERS WHOSE TERMS HAVE NOT YET EXPIRED AT THE EFFECTIVITY OF THIS ACT SHALL BE ALLOWED TO SERVE THE UNEXPIRED PORTION OF THEIR TERMS. Other refinements being proposed by this billinclude the strengthening of the environmnetal protection awareness component of scouting in the country, as well as imposing stiffer penalties for violations of scounting principles and provisions as espoused by the charter of the Boy Scouts of thePhilippines as amended."
