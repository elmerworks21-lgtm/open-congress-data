congress_website_title = "AN ACT TO PRESCRIBE THE ESTABLISHMENT OF PILOT TRIBAL COMMUNITIES AND/OR HOUSING PROJECTS IN EACH AND EVERY REGION IN THE PHILIPPINES, INCLUDING METRO MANILA, WHICH SHALL SERVE AS MODEL HUMAN SETTLEMENTS THAT WILL ADHERE, TO THE EXTENT PRACTICABLE,TO THE CULTURE AND TRADITIONS OF THE NATIONAL TRIBAL COMMUNITIES, WHILE PROVIDING THE BASIC CONVENIENCES OF MODERN LIVING, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES 1"
congress_website_abstract = "The bill prescribes the establishment of pilot tribal communities and/or housing projects in each and every region in the Philippines. Declares that the policy of the State is to establish, maintain and ensure adequate shelter, education, health, employment, welfare and other social services to national tribal communities."

