congress_website_title = "AN ACT GRANTING HONORARIA AND OTHER BENEFITS TO ALL ACCREDITED BARANGAY HEALTH WORKERS, AMENDING FOR THE PURPOSE REPULIC ACT NO. 7883, OTHERWISE KNOWN AS THE 'BARANGAY HEALTH WORKERS INCENTIVES AND BENEFITS ACT'"
congress_website_abstract = "This bill provides for the following: (1) ALL ACCREDITED BARANGAY HEALTH WORKERS SHALL BE ENTITLED TO A MONTHLY HONORARIA OF TWO THOUSAND PESOS (P2,000.00); (2) INSURANCE COVERAGE - ALL BARANGAY HEALTH WORKERS ARE GRANTED INSURANCE COVERAGE BY THE GOVERNMENT SERVICE INSURANCE SYSTEM OR ANY ACCREDITED INSURANCE COMPANY IN AN AMOUNT NOT LESS THAN TEN THOUSAND PESOS (P10,000.00)."

