congress_website_title = "AN ACT INCREASING THE ALLOWABLE PERSONAL AND ADDITIONAL EXEMPTIONS OF INDIVIDUAL TAXPAYERS, AMENDING FOR THE PURPOSE SECTION 35 (A) AND 35 (B) OF REPUBLIC ACT 8424, OTHERWISE KNOWN AS THE TAX REFORM ACT OF 1997"
congress_website_abstract = "This bill proposes allowable personnel and additional exemptions for individual taxpayers as follows: (1) For single individuals or married individuals judicially decreed as legally separated with no dependents [P20,000.00] P48,000.00; (2) For headof the family [P25,000.00] P54,000.00; (3) For each married individual [P32,000.00] P64,000.00. There shall be allowed an additional exemption of [Eight Thousand Pesos (P8,000.00)] SIXTEEN THOUSAND PESOS (P16,000.00) for each dependent not exceedingfour (4)."
