congress_website_title = "AN ACT REQUIRING TO USE THE ENGLISH LANGUAGE AS THE MEDIUM OF COMMUNICATION IN ALL GOVERNMENT-SPON SORED EXAMINATIONS"
congress_website_abstract = "Rationale: The government-spon sored examinations, such as the National Elementary Aptitude Test for the elementary pupils; the National Secondary Aptitude Test for the high school students; the Civil Service examination for the government-woul d-beemployees and the licensure examinations for teachers, have questions in the Tagalog dialect. > Understandably, the students and examinees who study in the non-Tagalog speaking provinces, are placed in a disadvantageous position because of their deficiency in the Tagalog dialect. Thus, as to level the playing field , it is heeby proposed that all government-spon sored examinations should use the English language as the medium of communication."
