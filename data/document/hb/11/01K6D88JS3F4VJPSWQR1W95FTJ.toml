congress_website_title = "AN ACT PROVIDING FOR THE INCLUSION IN THE CURRICULUM OF ALL SECONDARY SCHOOLS THE HISTORY OF THE PROVINCE AND/OR CITY OR MUNICIPALITY WHERE THE SCHOOL IS LOCATED AND THE LIVES OF LOCAL HEROES THEREIN"
congress_website_abstract = "Rationale: It is happening in every nook and cranny in the Philippines where the people are more familiar with another country's history. To arrest this negative trend and to pre-empt a future where a Filipino virtually knows nothing about the historical exploits of his forebears and the annals of his own town, city or province, this bill seeks to remedy this situation."
