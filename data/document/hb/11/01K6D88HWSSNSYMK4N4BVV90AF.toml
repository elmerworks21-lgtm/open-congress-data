congress_website_title = "AN ACT REQUIRING THE FORTIFICATION OF PROCESSED FOODS WITH ESSENTIAL MICRONUTRIENTS AND FOR OTHER PURPOSES"
congress_website_abstract = "FORTIFICATION is essential in compensating the loss of nutrients in the processing of foods and storage of foods. Provides for the MANDATORY fortification of (1) rice with iron; (2) wheat flour with Vit. A; (3) sugar with Vit. A; and (4) cooking oil with Vit. A."
