congress_website_title = "AN ACT GRANTING FINANCIAL ASSISTANCE TO RESIGNING EMPLOYEES IN THE PRIVATE SECTOR"
congress_website_abstract = "This bill covers all classes of workers in the private sector regardless of status. This bill entitles the worker-employee to a financial assistance equivalent to seven (7) working days for every year of service, not exceeding fifteen (15) years. Thereafter, the worker/employee shall be entitled to ten (10) days working pay but not exceeding twenty-four (24) years."

