congress_website_title = "AN ACT CREATING SPECIAL CRIMINAL TAX COURTS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The proposed CRIMINAL TAX COURTS shall have the same level as the Sandiganbayan and possessing all the inherent powers of a court of justice. The Court shall have original and exclusive jurisdiction over (1) all crimes arising from the violations of the National Internal Revenue Code; and (2) all crimes arising from violation of the Tariff and Customs Code."
