congress_website_title = "AN ACT REGULATING THE ESTABLISHMENT AND OPERATIONS OF HEALTH MAINTENANCE ORGANIZATIONS (HMOs), PROVIDING THEM INCENTIVES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Health Maintenance Organizations Act of 2000.\" It is the policy of the State to protect and promote the right to health of the people and instill health consciousness among them. Pursuant to this policy, the govenrment shall encourage the establishment and favorable operation of Health Maintenance Organization (HMOs) by granting reasonable incentives to enhance accesability to quality health care services through affordable health insurance policies."

