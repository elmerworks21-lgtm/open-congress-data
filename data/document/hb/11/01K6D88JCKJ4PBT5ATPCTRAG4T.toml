congress_website_title = "AN ACT REGULATING THE POWERS TO CREATE APPROPRIATION RESERVES AND SUSPEND EXPENDITURE OF APPROPRIATIONS, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS \"THE ADMINISTRATIVE CODE OF 1987\""
congress_website_abstract = "Proposes the regulated exercise of the executive powers on creating appropriation reserves and suspendingexpen diture of appropriations. This proposal seeks to strike a balance between there two (2) legitimate concerns --- Left unchecked, these powers may cause delays in project implementation or allow the executive to alter established national priorities and reorganize programs approved by the legislature."

