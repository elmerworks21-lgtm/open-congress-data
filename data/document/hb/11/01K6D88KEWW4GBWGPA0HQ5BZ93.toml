congress_website_title = "AN ACT PROVIDING FOR COMPENSATION TO VICTIMS OF HUMAN RIGHTS VIOLATIONS UNDER MARTIAL LAW FROM THE FORFEITED ILL-GOTTEN WEALTH OF FORMER PRESIDENT FERDINAND MARCOS"
congress_website_abstract = "\"Martial Law Victims Corporation Act of 2000.\" Rationale: Government has the moral obligation to give human rights victims the indemnification due them. Delaying it would further the sufferings of thos who were tortured, illegally detained and whoserelatives disappeared or were killed. Furthermore, human rights victims have every right to seek redress independent of the court cases against the Marcoses. > This measure proposes to indemnify these victims with the establishment of the Martial Law Victims Compensation Fund, consisting of one-third (1/3) of the ill-gotten Swiss bank assets to be forfeited from the estate of Ferdinand and Imelda Marcos, now being held in escrow by the Philippine National Bank. (PNB)."

