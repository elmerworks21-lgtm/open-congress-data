congress_website_title = "AN ACT DISQUALIFYING OFFICIALS AND EMPLOYEES OF THE OFFICE OF THE CITY OR MUNICIPAL MAYOR AND THE PROVINCIAL OR REGIONAL GOVERNOR, FROM BEING DEPUTIZED BY THE COMMISSION ON ELECTIONS AS MEMBERS OF THE ENCODING, TABULATING OR CANVASSING UNIT OR TO PERFORM ANY OTHER ELECTION FUNCTION OF ANY UNIT OF THE BOARD OF CANVASSERS OF THE MUNICIPALITY, CITY, PROVINCE OR REGION"
congress_website_abstract = "Seeks to ensure neutrality and impartiality in the conduct of elections, and thus protect the right and integrity of the electorate of their choices of candidates. Institues electoral reforms to correct the electoral system which has been marred byelectoral frauds and partiality to certain candidates, especially the incumbent officials."

