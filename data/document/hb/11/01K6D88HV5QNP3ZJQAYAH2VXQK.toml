congress_website_title = "AN ACT CREATING THE WATER AND SEWERAGE REGULATORY BOARD, DEFINING ITS COMPOSITION, POWERS AND FUNCTIONS, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Water Sewerage and Regulation Act\". Mandates the Water and Sewerage Regulatory Baord to regulate water and sewerage services in the east and west concession zones by ensuring their compliance with international service quality standards and with the existing norms and the provisions of the concession contracts, thus protecting the interest of the consumers."

