congress_website_title = "AN ACT PROVIDING FOR THE INCLUSION OF LAW ENFORCEMENT AND COMMUNITY SERVICE COURSES IN THE CURRICULA OF ALL COLLEGES AND UNIVERSITIES, CONVERTING THE EXISTING COMPULSORY MILITARY TRAINING REQUIREMENTS AS OPTIONAL SUBJECTS ONLY, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Citizens Police Training and Community Service Act of 1998\" All colleges and universities in the country, had to spend one afternoon a week marching around the school campus. The millions of Filipinos who have gone through this waste of time have yet to receive some plausible evidence for the dubious theory that training in close-order drill turns people into citizens - soldiers with the skills needed to fight the country's enemies. This is not to argue that all military training is useless.It is to declare, rather, that the kind of military training that has been given since World War II has been more suited for producing people who can march smartly in parades than infantry men who shoot straigth. When both trainors and trainees are eextremely skeptical about the usefulness of the program, there's little guilt about subverting the program."

