congress_website_title = "AN ACT PROMOTING AND REGULATING THE OPERATION OF COMMUNITY ANTENNAE TELEVISION (CATV) SYSTEMS IN THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Enjoying brisk business and widespread acceptance, CATV stations benefit the population in terms of guaranteeing subscribers unrestricted access to the kind of information required to enhance development and even political maturity. Butthe absence of adequate regulation in this industry has given rise to well-founded fears about the quality of information that is being made available , particularly to young and impressionable minds. > this bill, therefore, seeks to establish policies that will encourage self-regulation in the CATV industry, promote professionalism and healthy competition."
