congress_website_title = "AN ACT TO ENFORCE WARRANTIES ON THE SALE OF MOTOR VEHICLES, IMPOSING PENALTIES FOR THE VIOLATION THEREOF"
congress_website_abstract = "This bill proposes the \"18-month parameter\" to define the ACCEPTANCE/REJE CTION period for lemon cars, during which time the seller is allowed a specific number of repairs before the customer can rescind the sale or demand a replacement. Further, incase a safety or life-threatenin g defect recurs after one attempt to fix it, this bill provides that the vehicle must be replaced."

