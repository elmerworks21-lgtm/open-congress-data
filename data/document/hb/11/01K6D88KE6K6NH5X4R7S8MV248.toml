congress_website_title = "AN ACT ALLOWING TAX INCENTIVES TO PRIVATE EDUCATION INSTITUTIONS FOR NON-IMPOSITION OF INCREASES IN SCHOOL FEES"
congress_website_abstract = "As a general rule, any instition of learning duly recongized by the appropriate education agency and which did not avail of any tuition fee rate increase or adjustment for a particular school year to support its operation shall be EXEMPT from the payment of taxes of income from all sources, including interest from deposits and yield from substitutes or trust funds, for the applicable school or fiscal year only."
