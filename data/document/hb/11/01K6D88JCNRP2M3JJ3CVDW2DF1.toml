congress_website_title = "AN ACT EXTENDING THE CORPORATE LIFE OF THE HOME INSURANCE AND GUARANTY CORPORATION AND INCREASING ITS AUTHORIZED CAPITAL STOCK, AMENDING FOR THE PURPOSE CERTAIN LAWS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The HOME INSURANCE AND GUARANTY CORPORATION (HIGC) serves as the link between the government and the private sector in financing the production of low-cost and middle-income housing. This bill extends HIGC's corporate life to another fifty (50) years."
