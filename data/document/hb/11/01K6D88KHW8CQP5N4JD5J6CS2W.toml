congress_website_title = "AN ACT PROVIDING FOR THE PROTECTION AND CONSERVATION OF ALL OBJECTS OF UNDERWATER CULTURAL HERITAGE IN PHILIPPINE WATERS"
congress_website_abstract = "\"Protection of Underwater Cultural Heritage Act.\" This bill aims to protect and preserve our underwater cultural heritage by providing for general requirements for underwater archaeology, exploration, and excavation, the description of the items tobe protected, prohibition of certain activities in the vicinity of a protected item and site, the establishment of a reward system for verified reports, and the imposition of sanction penalties for violations."
