congress_website_title = "AN ACT INCREASING THE DAILY SUBSISTENCE ALLOWANCE OF OFFICERS AND ENLISTED PERSONNEL OF THE ARMED FORCES OF THE PHILIPPINES INCLUDING DRAFTEES, TRAINEES AND PROBATIONARY SECOND LIEUTENANT/ENSI GNS UNDERGOING MILITARY TRAINING, CMT CADETS ON SUMMER CAMP TRAINING AND RESERVE OFFICERS AND ENLISTED RESERVIST UNDERGOING TRAINING OR ASSEMBLY/MOBILI ZATION TEST, MEMBERS OF THE CITIZEN ARMED FORCES GEOGRAPHICAL UNITS ACTIVE AUXILIARIES (CAFGUAA) AND CADETS OF THE PHILIPPINE MILITARY ACADEMY AND PHILIPPINE AIR FORCE FLYING SCHOOL AND FOR OTHER PURPOSES"
congress_website_abstract = "INCREASES the daily subsistence allowance of AFP officers and enlisted personnel from the current [P60.00] to ONE HUNDRED TWENTY PESOS (P120.00). An additional P20.00 shall be given to those engaged in combat operations, aboardship and undergoing training, effective January 1, 1999."
