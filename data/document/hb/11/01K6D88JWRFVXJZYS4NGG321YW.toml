congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 6938, ENTITLED `AN ACT TO ORDAIN A COOPERATIVES CODE OF THE PHILIPPINES,' WHICH IS KNOWN AS THE `COOPERATIVES CODE OF THE PHILIPPINES,' PROVIDING THE MECHANISM FOR THEIR IMPLEMENTATION, AND FOROTHER PURPOSES"
congress_website_abstract = "This bill seeks to encourage the formation of more prinary cooepratives, especially among our countryside farmers and small fishermen, by reducing the initial organizational membership requirement to a minimum of only seven (7) well-acquainted organizers for the first two (2) years and affording the organizers enough experience and time to select additional cooperators to complete the minimum required number of fifteen (15) members by the 1st Quarter of the 3rd Year from the date of registration of the cooperative."
