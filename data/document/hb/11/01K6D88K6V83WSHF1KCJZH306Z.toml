congress_website_title = "AN ACT EXEMPTING COCONUT TREES FROM REAL PROPERTY TAXATION"
congress_website_abstract = "Rationale: Under the Local Government Code (RA 7160), every full-grown tree is subject to TAX as an improvement over and above the tax imposed on the land. Three million hectares of our agricultural lands are planted with coconut rtrees. The imposition of tax HINDERS and DISCOURAGES farmers and landowners from planting fruit-bearing trees like the coconut. Many coconut trees are 65 years old and are therefore no longer productive. Thus, this bill."

