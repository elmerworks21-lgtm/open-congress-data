congress_website_title = "AN ACT DECLARING UNFAIR TRADE PRACTICES AS ACTS OF ECONOMIC SABOTAGE"
congress_website_abstract = "\"Economic Sabotage Act of 2000.\" It is the policy of the State to protect local manufacturing industries fron unfair foreign competition and trade practices. Towards this end, this Act seeks to curb the proliferation of unfair trade competition andpractices by imposing penalties befitting the seriousness of these acts that have seriously affected the local manufacturing sector in particular and the economy, in general."

