congress_website_title = "AN ACT INTEGRATING ALL NATIONAL PRISONS AND PROVINCIAL, SUBPROVINCIAL, DISTRICT CITY AND MUNICIPAL JAILS, CREATING FOR THE PURPOSE THE BUREAU OF CORRECTIONAL SERVICES UNDER THE DEPARTMENT OF JUSTICE, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Jail Integration Act of 1996\". The proposed Bureau shall be responsible for the safe and efficient custody and effective rehabilitation of all prisoners. The Bureau shall absorb the functions of the Bureau of Corrections, Bureau of Jail Managementand Penalogy, and the provincial and sub-provincial jails."

