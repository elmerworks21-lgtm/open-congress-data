congress_website_title = "AN ACT PROVIDING FOR THE CONVERSION OF ELECTRIC COOPERATIVES INTO STOCK COOPERATIVES, AMENDING REPUBLIC ACT NO. 6938 (COOPERATIVE CODE OF THE PHILIPPINES), REPUBLIC ACT NO. 6939 AND PRESIDENTIAL DECREE NO. 269, AS AMENDED"
congress_website_abstract = "Converting electric cooperatives (ECs) into stock cooperatives has these advantages: (1) more active involvement of member-consumer s; (2) mobilization of members' savings and increase of the internal capital of ECs; (3) decrease in line losses; and(4) increased collection efficiency."

