congress_website_title = "AN ACT REQUIRING CERTAIN PERSON WHO MAY REGISTER AS A VOTER TO PRESENT ANY PROOF OF LEGAL RESIDENCE AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8189 OTHERWISE KNOWN AS THE VOTERS REGISTRATION ACT OF 1996 AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "IN NO CASE SHALL ANY PERSON RESIDING IN A PROPERTY BELONGING TO ANOTHER, BE ALLOWED TO REGISTER WITHOUT PRESENTING ANY PROOF OF LEGAL RESIDENCE ATTESTED BY THE PUNONG BARANGAY OF THE PLACE WHEREIN HE PROPOSES TO VOTE. PROVIDED, FURTHER, THAT THE PUNONG BARANGAY SHALL VERIFY AND KEEP THE RECORD OF THE ACTUAL NUMBER OF RESIDENTS IN A PARTICULAR PROPERTY OR DWELLING UNIT."

