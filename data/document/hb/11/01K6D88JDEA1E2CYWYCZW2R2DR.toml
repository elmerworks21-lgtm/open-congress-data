congress_website_abstract = "There shall be a fie-year moratorium ending December 31, 2003 on the foreclosure of all mortgages with banks and financial institutions, whether public or private. Rationale: The regional financial crisis which started in Thailand in July 1997 has spread worldwide ... The Philippines was not spared from these tragic events --- the currency meltdown, the drought and the resulting havoc on agriculture."
