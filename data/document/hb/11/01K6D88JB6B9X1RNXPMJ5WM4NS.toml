congress_website_title = "AN ACT PROVIDING FOR A MORE RESPONSIVE NURSING PROFESSION TO THE CHANGING CONTEXT OF HEALTH CARE NEEDS, AMENDING FOR THE PURPOSE THE PHILIPPINE NURSING ACT OF 1991"
congress_website_abstract = "Aims to make the nursing profession more responsive to the changing context of health care. Proposes amendments to the Philippine Nursing Act, such as on: (1) strengthening the Board of Nursing; (2) improvement of the licensure examiantion; (3) making nursing education and practice more relevant, etc."
