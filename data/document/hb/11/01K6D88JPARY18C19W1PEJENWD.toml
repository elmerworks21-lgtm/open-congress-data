congress_website_title = "AN ACT CREATING THE FIELD OF LAND TITLE INSURANCE, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 612 OTHERWISE KNOWN AS THE INSURANCE CODE OF 1978, AS AMENDED BY PRESIDENTIAL DECREES NUMBERED 1455 AND 1460 AND BATAS PAMBANSA BILANG 874"
congress_website_abstract = "Rationale: TITLE INSURANCE policies insure title to real estate. The policy protects the insured against title defects, liens and encumbrances not specifically exempted from its coverage. Title insurance will give financial confidence to financial institutions and individual persons to proceed and deal with real property."

