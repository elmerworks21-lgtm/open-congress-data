congress_website_title = "AN ACT PENALIZING OFFICERS AND PERSONNEL OF PUBLIC TELECOMMUNICATI ONS ENTITIES THAT REFUSE OR FAIL TO INTERCONNECT THEIR FACILITIES TO THOSE OF OTHER TELECOMMUNICATI ONS OPERATORS"
congress_website_abstract = "This bill aims to ensure that the necessary interconnection shall be complied with by all the industry players. The penalty of fine shall not be less than P100,000.00 nor more than P5 Million, depending on the number of subscribers and the amount ofinvestment involved."
