congress_website_title = "AN ACT TO AMEND REPUBLIC ACT NO. 8239, OTHERWISE KNOWN AS THE PHILIPPINE PASSPORT ACT OF 1996"
congress_website_abstract = "Proposes amendments to the Philippine Passport Law, such as on: (1) the requirements for issuance of passports; (2) additional grounds for denial, cancellation or restriction of a passport; (3) criteria for filing of a passport application on behalfof certain applicants. Prescribes penalties for selling passport applications, government forms and lost or stolen travel documents."
