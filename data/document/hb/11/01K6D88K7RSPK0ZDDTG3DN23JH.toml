congress_website_title = "AN ACT ESTABLISHING A COMPREHENSIVE JUVENILE JUSTICE SYSTEM AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Juvenile offenders have varying special needs, thus their treatment at all stages of legal proceedings --- apprehension, investigation, prosecution , adjudication and follow-up care --- should be humane, effective and fair. They should be treated differently from the way adult offenders are handled. Emphasis should be on the PROMOTION of their WELL-BEING and their REHABILITATION , rather than on exacting RETRIBUTION."

