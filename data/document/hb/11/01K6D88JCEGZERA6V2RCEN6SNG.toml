congress_website_title = "AN ACT PROMOTING LOCAL FISCAL AUTONOMY BY ALLOWING LOCAL GOVERNMENT UNITS TO CHOOSE THEIR DEPOSITORY BANKS IN CERTAIN CASES, AMENDING FOR THE PURPOSE SECTION 311 OF REPUBLIC ACT NO. 7160"
