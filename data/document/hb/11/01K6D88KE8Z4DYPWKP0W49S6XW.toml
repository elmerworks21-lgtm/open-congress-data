congress_website_title = "AN ACT MANDATING THAT ALL REMITTANCES MADE ANNUALLY BY PHILIPPINE NATIONAL OIL COMPANY (PNOC) TO THE NATIONAL GOVERNMENT UNDER REPUBLIC ACT NO. 7656, FOR THE FOUR (4) YEARS IMMEDIATELY FOLLOWING THE APPROVAL OF THIS ACT, BE COMMITTED EXCLUSIVELY TOTHE RURAL ELECTRIFICATION PROGRAM AND DISBURSED IN ACCORDANCE WITH THE PRIORITIES SET BY THE DEPARTMENT OF ENERGY (DOE) AND THE NATIONAL ELECTRIFICATION ADMINISTRATION (NEA)"
congress_website_abstract = "The bill seeks to assure that all the dividends remitted by the Philippine National Oil Company (PNOC) to the National Government are applied exclusively to the furtherance of the Rural Electrification Program (REP) over the next four (4) years in order to ultimately stimulate, promote and sustain much needed economic growth in the Philippine countryside."

