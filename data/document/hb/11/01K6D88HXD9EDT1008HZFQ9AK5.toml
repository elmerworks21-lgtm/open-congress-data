congress_website_title = "AN ACT PROVIDING FOR THE CONSTRUCTION OF WATER WELLS, RAINWATER COLLECTORS, DEVELOPMENT OF SPRINGS AND REHABILITATION OF EXISTING WATER WELLS IN ALL BARANGAYS IN THE PHILIPPINES"
congress_website_abstract = "Directs the Department of Public Works and Highways (DPWH) to undertake, within thirty (30) days after the approval of this Act, the construction of water wells, rainwater collectors, development of spings and rehabilitation of existing water wellsin barangays in the country. Organizes the Barangay Waterworks and Sanitation Association (BWSA) for the purpose of maintaining the water facilities."

