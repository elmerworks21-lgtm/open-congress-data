congress_website_title = "AN ACT ESTABLISHING A NATIONAL CELLULAR AND WIRELESS TELEPHONE PROGRAM"
congress_website_abstract = "\"National Cellular and Wireless Telephone Act of 1998\". Requires the Department of Transportation and Communications (DOTC) to implement a five -year National Cellular and Wireless Telephone Program using a combination of government and private investments in an environment of free competition and mandatory interconnection . Directs that all landline programs of the government be accordingly revised and its appropriations, as well as contracts under negotiations be reprogrammed and redirectedtowards the enforcement of this Act."
