congress_website_title = "AN ACT EXPANDING THE ADDITIONAL EXEMPTIONS FOR DEPENDENTS OF INDIVIDUAL TAXPAYERS, AMENDING FOR THE PURPOSE SECTION 35, SUBSECTION (B) OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE TAX REFORM ACT OF 1997"
congress_website_abstract = "ADDITIONAL EXEMPTION FOR DEPENDENTS. THERE SHALL BE ALLOWED AN ADDITIONAL EXEMPTION OF EIGHT THOUSAND PESOS (P8,000.00) FOR EACH DEPENDENT. [NOT EXCEEDING FOUR (4).] > IN CASE OF LEGALLY SEPARATED SPOUSES, ADDITIONAL EXEMPTIONS MAY BE CLAIMED ONLY BY THE SPOUSE WHO HAS CUSTODY OF THE CHILD OR CHIDLREN: PROVIDED, THAT THE TOTAL AMOUNT OF ADDITIONAL EXEMPTIONS THAT MAY BE CLAIMED BY BOTH SHALL NOT EXCEED THE MAXIMUM ADDITIONAL EXEMPTION HEREIN ALLOWED."
