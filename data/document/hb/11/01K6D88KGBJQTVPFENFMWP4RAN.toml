congress_website_abstract = "The proposed measure aims to address the following concerns: (1) The bill seeks to maintain the current tariff rates on certain articles that are being manufactured by the local industries up to year 2002; and (2) It aims to reduce to zero rate alltariffs currently at three percent (3%) which are imposed on local industries' raw materials and inputs not locally manufactured."
