congress_website_title = "AN ACT TO EMPOWER LOCAL GOVERNMENT UNITS FOR THE MAINTENANCE OF PEACE AND ORDER IN THEIR RESPECTIVE TERRITORIES WHILE SUSTAINING THE PROFESSIONALIZA TION OF THE PHILIPPINE NATIONAL POLICE, AND OTHER PURPOSES, AMENDING CERTAIN PROVISIONS OF REPUBLICACT NO. 6975, ENTITLED `AN ACT ESTABLISHING THE PHILIPPINE NATIONAL POLICE UNDER A REORGANIZED DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT,' AS AMENDED BY REPUBLIC ACT NO. 8551, ENTITLED `AN ACT PROVIDING FOR THE REFORM AND REORGANIZATION OF THEPHILIPPINE NATIONAL POLICE AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to improve law enforceent in the country by empowering local government units (LGUs) to effectively and efficiently maintain peace and order in their territories as a result of decentralizatio n of some administrative and oeprational aspects of the National POlice Commission (NAPOLCOM) and the Philippine National Police (PNP), such as expanding the deputation powers of the city and municipal mayors."
