congress_website_title = "AN ACT RATIONALIZING THE RETENTION LIMITS IN THE DISTRIBUTION OF AGRICULTURAL LANDS, AMENDING FOR THE PURPOSE THE COMPREHENSIVE AGRARIAN REFORM LAW OF 1988"
congress_website_abstract = "No person may own or retain, directly or indirectly, any public or private agricultural land, the size of which shall NOT exceed five (5) hectares PROVIDED, THAT SHOULD THE AREA RETAINED BY THE LANDOWNER AWARDED TO EACH CHILD IS TENANTED, THE SAME SHALL BE COVERED BY A LEASEHOLD CONTRACT."

