congress_website_title = "AN ACT PRESCRIBING THE PROTECTION OF LAYOUT-DESIGNS (TOPOGRAPHIES) OF INTEGRATED CIRCUITS"
congress_website_abstract = "\"Lay-out-Design s of Integrated Circuits Protection Act\". Rationale: The reasons for assuring protection of layout-designs of integrated circuits encompases not only a just reward for the creator, but also the function of providing an incentive forcreation, which in turn may be expected to encourage an adequate level of investment for the benefit of the consuming public and the advancement of technological programs."
