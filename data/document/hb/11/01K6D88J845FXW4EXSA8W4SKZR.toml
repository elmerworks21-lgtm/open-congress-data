congress_website_title = "AN ACT PROVIDING FOR THE ALLOCATION OF LOCAL GOVERNMENT UNIT FUNDS IN THE CONDUCT OF A CONTINUING NUTRITION PROGRAM IN THEIR LOCALITIES"
congress_website_abstract = "\"LGU Nutirition Program Act of 1988\". Requires all provincial, city and municipal governments to establish continuing programs to benefit the malnourished in their areas. The funds for the Program shall be taken from the allocation of 10% of the LGU's development fund."

