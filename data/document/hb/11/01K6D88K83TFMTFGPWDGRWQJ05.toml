congress_website_title = "AN ACT REORGANIZING THE DEPARTMENT OF EDUCATION, CULTURE AND SPORTS, THEREBY RENAMING IT INTO DEPARTMENT OF EDUCATION ESTABLISHING STANDARDS IN THE GOVERNANCE OF BASIC EDUCATION, PROVIDING FOR THE SCHOOL IMPROVEMENT FUND, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Basic Education Governance Act of 2000\". Rationale: This bill endeavors to reorganize the present Deprtment of Education, Culture and Sports (DECS) in order to usher in a more organized and systematic machinery in the administration, implementationand delivery of carefully planned programs and projects of basic education. With the reorganization of the DECS, the Department is envisioned to be a more efficient and effective organization in ensuring a quality and responsive basic education andproduce upright and more productive individuals in the new millennium."
