congress_website_title = "AN ACT PROVIDING FOR THE IMPROVEMENT AND STRENGTHENING OF THE NATIONAL HISTORICAL INSTITUTE 1"
congress_website_abstract = "The National Historical Institute (NHI) shall be responsible for promoting and preserving the Philippine cultural heritage by undertaking, among others, studies on Philippine historyand Filipino heroes; encouraging historical educational activities,including the widening of local historical committee network; and managing and safeguarding the improvement and restoration of national shrines, monuments, historical sites, buildings and landmarks."

