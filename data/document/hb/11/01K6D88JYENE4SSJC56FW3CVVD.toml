congress_website_title = "AN ACT LIMITING THE HOURS OF OPERATION OF NIGHTCLUBS, COCKTAIL LOUNGES, BARS AND SIMILAR ESTABLISHMENTS, AND PENALIZING THE VIOLATION THEREOF"
congress_website_abstract = "The bill proposes to limit the hours of operation of nightclubs, cocktail lounges, bars and similar establishments serving liquor, wine or intoxicating drinks from 5:00 p.m. to 1:00 a.m. It also prohibits patrons of such establishments from carrying firearms insie, consequently, depositing the same with the management or opertor, and enjoins the owner, oeprators or manager not to allow persons with criminal record or of questionable character from entering such establishments. For such purposethey should secure a list of such citizens from the NBI or the police agencies."

