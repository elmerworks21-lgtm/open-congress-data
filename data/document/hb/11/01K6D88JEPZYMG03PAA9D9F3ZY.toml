congress_website_title = "AN ACT AMENDING ARTICLE 280 OF THE LABOR CODE BY LIMITING THE NUMBER OF CASUAL AND CONTRACTUAL EMPLOYEES TO NOT MORE THAN TEN PERCENT (10%) OF THE EXISTING PERMANENT EMPLOYEES"
congress_website_abstract = "Rationale: Sixty percent (60%) of our labor force consists of casial and contractual employees who DO NOT enjoy the security of tenure and are earning incomes that could hardly answer for their daily needs. The policy of multinational and transnational corporations in hiring a substantial percentage of these employees must be rectified."
