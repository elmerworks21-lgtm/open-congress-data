congress_website_title = "AN ACT TO PROVIDE FOR THE AUTOMATIC REVIEW BY THE SECRETARY OF JUSTICE OF THE DECISION OF THE BOARD OF COMMISSIONERS IN DEPORTATION CASES, THEREBY AMENDING SECTION 37 OF COMMONWEALTH ACT NO. 613, OTHERWISE KNOWN AS THE PHILIPPINE IMMIGRATION ACT OF1940"
congress_website_abstract = "Provides that the decision of the Board of Commissioners in any deportation proceeding shall be ELEVATED to the Secretary of Justice for automatic review within ten (10) days from its promulgation and consequently he shall render his decision on thebasis of the records of the case within fifteen (15) days from his receipt thereof which shall be final and executory, unless within such period, the decision is restrained or enjoined by judicial process."

