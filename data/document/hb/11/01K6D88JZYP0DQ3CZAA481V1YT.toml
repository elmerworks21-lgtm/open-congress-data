congress_website_title = "AN ACT PROVIDING FOR A CHAMBER OF COMMERCE AND INDUSTRY SYSTEM, PROMOTING ORDER, EFFICIENCY AND EFFECTIVE DELIVERY OF SERVICES BETWEEN AND AMONG CHAMBERS OF COMMERCE AND INDUSTRY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The bill seeks to promote the growth of chambers of commerce and industry (CCIs) nationwide. Presently, there is no chamber of commerce and industry system for all business and economic sectors. Chambers have thus uncontrollably mushroomed across the country with overlapping and duplication of functions and services resulting in inefficiency and inability to provide value- added services for its members, among others."

