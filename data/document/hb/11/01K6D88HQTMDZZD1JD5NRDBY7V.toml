congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7183, OTHERWISE KNOWN AS 'AN ACT REGULATING THE SALE, MANUFACTURE, DISTRIBUTION, AND USE OF FIRECRACKERS AND OTHER PYROTECHNIC DEVICES', AND FOR OTHER PURPOSES"
congress_website_abstract = "Specifies that only chemical formulation utilizing potassium perchlorate, sulfur and pyroaluminum, consistent with the international standards and criteria, shall be used in the manufacture of firecrackers and pyrotechnic devices. Prohibites any type of firecracker or pyrotechnic device which contains yellow phosphorous or other highly poisonous chemicals."

