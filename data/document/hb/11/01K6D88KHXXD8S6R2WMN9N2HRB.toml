congress_website_title = "AN ACT PROHIBITING THE EXACTION OF FEES AND UNNECESSARY SERVICES FROM JOB APPLICANTS"
congress_website_abstract = "This bill seeks to prohibit employers/recru iters to require from job applicants as requisite to employment, the following: (a) The payment of any fees for whatever purpose or reason except where the exaction of such fee has been authorized by the Secretary of Labor and Employment and/or by law; (b) To render any service unrelated to the position being applied for; and (c) To submit unreasonable requirement. A requirement is unreasonable when it is illegal or immoral, or unrelated to or undeterminative of the acceptance of the application."

