congress_website_title = "AN ACT CREATING THE EL NINO/LA NINA COMMISSION, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"El Nino and La Nina Crisis Act of 1999\". The proposed Commission seeks to undertake a nationawide preparation against the socio-economic and other impact of the El Nino and La Nina by undertaking an in-depth and detailed study of these two (2) climate phenomena. The Commission shall then propose a comprehensive plan for the elimination and reduction of their adverse effects."

