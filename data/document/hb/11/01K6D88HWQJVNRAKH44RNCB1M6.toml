congress_website_abstract = "\"The Revised General Banking Act\". Directs the Bangko Sentral ng Pilipinas to supervise the operations and activities of banks, quasi-banks, trust entities and other financial institutions. One salient feature of this Act is the REDUCTION of minimumownership of Filipino citizens in new banks from [70%] to SIXTY PERCENT (60%) of the total voting stocks."
