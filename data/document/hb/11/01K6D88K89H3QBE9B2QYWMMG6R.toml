congress_website_title = "AN ACT AUTHORIZING THE BARANGAY CHAIRMAN OR PUNONG BARANGAY TO EXECUTE OR TO AID IN THE EXECUTION OF WARRANT OF ARREST AND FOR OTHER PURPOSES"
congress_website_abstract = "Any provision of law to the contrary notwithstanding , any duly elected Barangay Chairman or Punong Barangay is hereby authorized to execute and serve warrants of arrest issued by the Supreme Court, Court of Appeals, Sandiganbayan, Regional Trial courtsm Netropolitan Trial Courts, Municipal Trial Courts and Metropolitan Circuit Trial Courts in the manner provided hereinafter, and within his area of jurisdiction without prejudice to the execution and service of such warrants of arrest by all other law enforcement agencies and officers."

