congress_website_title = "AN ACT AMENDING SECTIONS 61, 62, 63 AND 65 OF REPUBLIC ACT NO. 6975 PLACING FOR THE PURPOSE THE PROVINCIAL JAILS UNDER THE JURISDICTION OF THE BUREAU OF JAIL MANAGEMENT AND PENOLOGY, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
