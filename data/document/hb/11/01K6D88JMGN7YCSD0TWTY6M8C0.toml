congress_website_title = "AN ACT DECLARING SEPTEMBER TWO OF EVERY YEAR A NATIONAL REGULAR HOLIDAY TO COMMEMORATE WORLD WAR II VICTORY IN THE PHILIPPINES"
congress_website_abstract = "\"SECTION 1. September two of every year is hereby declared a national regular holiday to commememorate the victory of Philippine and Allied military forces in World War II when the Commander of the Japanese-contro lled armed forces in the Philippines surrendered to the military forces of the United States Armed Forces in the Philippines-Nor th Luzon and the United States Army on September 2, 1945 in Kiangan, Ifugao.\""
