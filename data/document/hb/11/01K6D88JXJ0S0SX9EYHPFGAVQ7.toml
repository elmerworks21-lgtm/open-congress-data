congress_website_title = "AN ACT REGULATING THE PRACTICE OF INSTRUMENTATION AND CONTROL ENGINEERING IN THE PHILIPPINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Instrumentation and Control Engineering Law of 1999\". Rationale: Today, with the continued innovation in technology and the development of industrial standards of excellence (e.g. ISO ratings), INSTRUMENT AND CONTROL ENGINEERS and TECHNICIANS are called upon to innovate and improve their level of competence and professional integrity. Their stewardship of a crucial cog in the world's industrial process require nothing less. Equally so, the State must now initiate the enactment of alaw that will PROFESSIONALIZE the practice and control of instrumentation and control engineering in the country. This will, part, guarantee the compliance of practitioners in this engineering discipline with the demands of competitive and highly innnovative profession."

