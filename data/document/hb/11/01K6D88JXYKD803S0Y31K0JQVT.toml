congress_website_title = "AN ACT MAKING THE LOCAL GOVERNMENT UNITS AND THEIR OFFICIALS OR EMPLOYEES LIABLE FOR DEATH OF, OR INJURIES TO PERSONS OR DAMAGE TO PROPERTY CAUSED BY THEIR RESPECTIVE OFFICIALS OR EMPLOYEES DUE TO THE NEGLIGENT ACT OR OMISSION TO PERFORM THEIR DUTIES AS MANDATED BY LAW OR ORDINANCES, AMENDING FOR THE PURPOSE ARTICLE 2180 OF THE NEW CIVIL CODE"
congress_website_abstract = "Rationale: The great loss of precious human lives at a recent Cherry Hills subdivision mishap and the past tragic fire that struck Ozone Disco in Quezon City speak of palpable and gross negligence and tortuous performance of official duties of somegovernment officials tasked to regulate housing subdivisions and buildings of business establishments in the country. Precious lives could have been saved from disasters had our government officials and employees been performing their duties conscientiously with due regards to the safety and welfare of the public."
