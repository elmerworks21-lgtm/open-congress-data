congress_website_title = "AN ACT GRANTING ALL GOVERNMENT EMPLOYEES A THREE THOUSAND ACROSS THE BOARD MONTHLY SALARY INCREASE APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Government Employees Salary Insurance for 1999\". Rationale: The mandatory across-the-boar d pay hike is the government's response to uphold the workers basic right to a living wage. Pursuant thereto, it is hereby declared that a mandatory across-the-boar d salary increase in the amount of Three Thousand Pesos (P3,000.00) monthly be granted to workers and employees of all government agencies and instrumentaliti es immediately."

