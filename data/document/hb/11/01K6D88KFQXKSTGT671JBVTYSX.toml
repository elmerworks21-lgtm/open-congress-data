congress_website_title = "AN ACT ESTABLISHING A DRUG REHABILITATION CENTER IN ALL THE REGIONS OF THE PHILIPPINES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Undoubtedly, the drug problem continues to escalate. Figures made available by the Philippine National Police show that 6,020 or 14.5% of the country's 41,855 barangays are drug-affected and there are 49,626 target personalities, 33,473 of whom are users. Even with these data already on hand, government is still remiss in adequately providing the relevant components of an effective drug program. The lack of focus on the reform and recovery aspects is evident in the lack of rehabilitation centers for drug users as compared to the number of existing reform institutions , private rehabilitation centers included, that are not only few and constant, most of which are unaffordable and inaccessible to many,"
