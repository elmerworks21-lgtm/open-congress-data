congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBER 7227, OTHERWISE KNOWN AS THE `BASES CONVERSION AND DEVELOPMENT ACT OF 1992', AS AMENDED BY REPUBLIC ACT NUMBER 7917, EXPANDING THE ALLOCATION OF REVENUES FROM THE SALE, LEASE, JOINT-VENTURE AGREEMENTS AND OTHER TRANSACTIONS INVOLVING MILITARY BASES AND RESERVATIONS, ALLOCATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposes certain amendments to RA 7227, the Bases Conversion and Development Act of 1992, such as: (1) INCREASE in the AFP shares (from 35% to 55%) in the proceeds of converted base lands; (2) INCLUSION of proceeds from the lease, joint ventures and other arrangements as part of the AFP shares; (3) adequate REPRESENTATION of the PNP/AFP in the BCDA Board and in Special Economic Zones created in former base lands, etc."

