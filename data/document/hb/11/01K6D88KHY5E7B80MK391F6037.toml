congress_website_title = "AN ACT ALLOWING MARRIED OR LEGALLY SEPARATED WOMEN TO USE THEIR MAIDEN FIRST NAME AND SURNAME, AMENDING FOR THE PURPOSE ARTICLES THREE HUNDRED SEVENTY AND THREE HUNDRED SEVENTY-TWO OF REPUBLIC ACT NUMBERED THREE HUNDRED EIGHTY-SIX, AS AMENDED, OTHERWISE KNOWN AS THE CIVIL CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: By allowing Filipino women to retain their surnames as part of their individuality, even after marriage or legal separation, this bill seeks to translate into reality the concept of \"fundamental equality\" of men and women before the lawas enshrined in our Constitution."
