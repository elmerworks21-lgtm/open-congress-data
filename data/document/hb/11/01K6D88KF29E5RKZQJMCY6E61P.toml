congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF PRESIDENTIAL DECREE NO. 1185, OTHERWISE KNOWN AS THE `FIRE CODE OF THE PHILIPPINES', AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Amended Fire Code Fees of the Philippines 2000.\" This bill substantiates the policy of the State to ensure collection of all forms of fire taxes, fees and fines by the Local Government Units and proper remittance thereof, promote public safety to effectively respond to the needs of the Bureau and its personnel in the speedy delivery of the basic services to the citizenry."

