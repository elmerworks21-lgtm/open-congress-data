congress_website_title = "AN ACT GRANTING ACCELERATED DEPRECIATION DEDUCTION FOR INCOME TAX PURPOSES, AMENDING FOR THE PURPOSE SECTION 34(F) OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "Provides for ACCELERATED DEPRECIATION for plant, machinery and equipment with the following features: (1) that these are reasonably needed and actually used for production and transport of good and services; (2) the privilege is available only if the asset is depreciated under the straight-line method; and (3) the depreciation is available to all corporate or individual taxpayers as a matter of right."
