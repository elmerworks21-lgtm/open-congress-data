congress_website_title = "AN ACT INSTITUTIONALIZ ING SKILLS TRAINING AND RETRAINING"
congress_website_abstract = "\"Skills Training and Retraining Act\". Formulates the following mechanisms that will affirm labor as the primary social economic force: (1) provide adequate and relevant skills training and retraining programs to suffice the needs of the industry; and (2) update the standard skills and introduce new crafts to prepare workers for their employment and re-employment."

