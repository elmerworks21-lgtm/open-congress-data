congress_website_title = "AN ACT AMENDING SECTION 289, PARAGRAPH 6 OF REPUBLIC ACT NO. 8424(RE: SHARE OF BENEFICIARY PROVINCES ON THE EXCISE TAXES OF LOCALLY MANUFACTURED VIRGINIA-TYPE CIGARETTES)"
congress_website_abstract = "Rationale: Section 289, paragraph 6 of Republic Act No. 8424 needs to be amended for its effective implementation by providing that the share of the beneficiary provinces equal to fifteen percent (15%) of the excise taxes on locally manufactured Virginia-type cigarettes be directly allocated to them. > The beneficiary provinces are in a better position to ensure that the said fund shall be used for priority cooperative projects, livelihood projects, agro-industrial projects such as farm-to-market roads."
