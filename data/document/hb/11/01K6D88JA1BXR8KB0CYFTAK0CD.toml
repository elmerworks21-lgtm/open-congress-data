congress_website_title = "AN ACT FURTHER AMENDING PRESIDENTIAL DECREE NO. 361, AS AMENDED, PROVIDING FOR AN ARMED FORCES RETIREMENT AND SEPARATION BENEFITS SYSTEM AND FOR OTHER PURPOSES (RE: ADMINISTRATION BY BOARD OF TRUSTEES)"
congress_website_abstract = "States that the AFP Retirement and Separation Benefits System (RSBS) shall be administered by a BOARD OF TRUSTEES composed of (1) the RSBS president and general manager; and eight (8) appointees of the President of the Philippines, four (4) of whomshall come from the banking, finance, investment and insurance sectors."

