congress_website_title = "AN ACT INSTITUTIONALIZ ING THE NATIONAL MILK FEEDING PROGRAM AND PROVIDING FOR A MILKFEEDING FUND THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\"MILK FEEDING ACT OF 1999\". Milk feeding, as used in this Act, shall cover distribution of locally produced milk from cows, carabaos and goats for direct intake of children aged 5-10 years old nationwode. The milk shall come from the produce of local dairy producers and processors at a price and quality acceptable to both the local milk suppliers and milk feeding sponsors, private or government. No milk intended for milk feeding shall be used for commercial sale."
