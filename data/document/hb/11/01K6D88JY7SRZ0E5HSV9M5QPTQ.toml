congress_website_title = "AN ACT MANDATING THE BUREAU OF PLANT INDUSTRY OF THE DEPARTMENT OF AGRICULTURE TO CONDUCT BASIC AND APPLIED RESEARCHES ON LOCALLY-ADAPTAB LE SOILLESS FARMING OR HYDROPONICS USING LOCALLY AVAILABLE EQUIPMENT AND MATERIALS AND TO UNDERTAKE THE EFFECTIVE DISSEMINATION OF RESEARCH MATERIALS ON SOILLESS AGRICULTURE FOR THE INFORMATION AND IMPLEMENTATION BY FARMERS AND THE PUBLIC, IN GENERAL, AND BY THE URBAN POPULATIONS, IN PARTICULAR AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Soilless Agricultural Act of 1999\". More than just an innovative vehicle for increased food production, soilless farming or hydroponics holds the promise of increased production, employment and income not only for traditional rural farmers but alsofor the unemployed and under-employed urban dwellers as well-provided, that our farming scientists and researchers are able to adapt soilless farming to local conditions using locally available equipment and materials; and provided, further, that reserachers on soilless farming and its local adaptation are adequately disseminated nationwide, especially to the urban populations, for information, guidance and effective implementation."

