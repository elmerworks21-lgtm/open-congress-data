congress_website_title = "AN ACT REQUIRING THE PAYMENT OF REAL PROPERTY TAXES AS A CONDITION PRIOR TO THE ISSUANCE OF BUILDING PERMIT OR CERTIFICATE OF REGISTRATION OF MACHINERY"
congress_website_abstract = "Any person who shall apply for a permit for the construction, addition, repair, or renovation of a building or permanent improvement on land, or a certificate of registration for any machinery, including machines, mechanical contrivances, and apparatus attached or afixed on land or to another real property shall accompany his application for such building permit or certificate with a certficate from the treasurer concerned to the effect that the real property taxes due on the land whereon the building or permanent improvement will be constructed or the machinery, machines, mechanical contrivances and apparatus will be affixed, and the building or other permanent improvement to which the addition will be constructed or which will be repaireed or renovated, had been fully paid."

