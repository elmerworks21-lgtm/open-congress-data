congress_website_title = "AN ACT PROVIDING FOR A FLEXIBLE SCHOOL CALENDAR IN THE PHILIPPINES"
congress_website_abstract = "This Bill provides for the flexibility in the opening of classes so tht the regions which are not prone to typhoons may continue operating under the old calendar. Only the regions, especially in Luzon and Metro Manila, shall be affected by the proposal herein provided. The school year for public and private schools shall consist of not less than forty (40) weeks for the elementary and secondary levels and thirty-six (36) weeks for the college level or eighteen (18) weeks per semester."
