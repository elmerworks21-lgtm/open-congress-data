congress_website_title = "AN ACT PROHIBITING MONOPOLIES, ATTEMPT TO MONOPOLIZE AN INDUSTRY OR LINE OF COMMERCE, MANIPULATION OF PRICES OF COMMODITIES, ASSET ACQUISITION AND INTERLOCKING MEMBERSHIPS IN THE BOARD OF DIRECTORS OF COMPETING CORPORATE BODIES AND PRICE DISCRIMINATION AMONG CUSTOMERS, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES (anti-trust)"
congress_website_abstract = "\"Philippine Anti-Trust Act of 1999\". Rationale: Through time, the Philippine economy has retained oligopolistic and monopolistic features. Some of these features have remained persistent even today, existent in certain sectors of the economy, the government's liberalization program notwithstanding .> Unfortunately, the persistence of oligopoly and monopoly economically disenfranchise our citizens, both consuderms and producers. Genrally, this economic structure contributes to the shrinkage of the people's purchasing power, due mainly to uncompetitively prices goods and services. > This bill therefore seeks to address this problem by penalizing combinations or conspiracies in restraint of trade and all forms of artificial manipulations thatt inhibit free market competition."
