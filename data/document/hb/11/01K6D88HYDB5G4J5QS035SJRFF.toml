congress_website_title = "AN ACT INCREASING THE PENALTIES FOR ILLEGAL LOGGING AND PENALIZING ILLEGAL POSSESSION OF CHAINSAWS AND OTHER TREE-CUTTING IMPLEMENTS, AMENDING FOR THIS PURPOSE SECTION 68 OF PRESIDENTIAL DECREE NO. 705, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "Authorizes the Department of Environment and Natural Resources (1) TO ISSUE LICENSES TO POSSESS CHAINSAW TO LEGITIMATE LOGGING CONCESSIONAIRES AND WILL BE RENEWABLE EVERY YEAR; (2) REGULATE THE SALE OF CHAINSAWS and (3) issue AUTHORITY OR PERMISSIONTO SELL. Imposes stiffer penalty for cutting, gathering and/or collecting timber, or other forest products without license,a s well as possession of implements."
