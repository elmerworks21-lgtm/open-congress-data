congress_website_title = "AN ACT FURTHER AMENDING REPUBLIC ACT NO. 6975, OTHERWISE KNOWN AS THE 'DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT ACT OF 1990', AS AMENDED BY REPUBLIC ACT NO. 8551, AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to add one (1) Undersecretary and one (1) Assistant Secretary in the Office of the DILG Secretary; increase the Fire District Offices in the National Capital Region (NCR) from four (4) to five (5); set the average manning level of the Fire Bureau to seven (&) firemen for every one (1) firetruck at three (3) shifts per day; and, transfer the supervision and control of provincial jails to the Bureau of Jail Management and Penology (BJMP)."
