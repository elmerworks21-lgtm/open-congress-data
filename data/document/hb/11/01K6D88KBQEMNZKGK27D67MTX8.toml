congress_website_title = "AN ACT ABOLISHING THE PENALTIES CHARGED BY DEPOSITORY BANKS AGAINST DEPOSITS THAT FALL BELOW THE PRESCRIBED AVERAGE DAILY BALANCE"
congress_website_abstract = "Rationale: The Supereme Court, in Tian Tiong Tick vs. American Apothecaries, rules that deposits of money in banks whether fixed, savings and current are really loans to a bank because the bank can use the same for its ordinary transactions and forthe banking business in which it is engaged. In the interest of justice and fair play, it is therefore just and proper to abolish such irrational charges. For, banks are regarded as borrowers under the law because Supreme Court decisions form part of the law of the land."
