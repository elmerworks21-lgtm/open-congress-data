congress_website_title = "AN ACT AUTHORIZING THE DISMISSAL OF GOVERNMENT OFFICIALS AND EMPLOYEES FOR UNOFFICIAL USE OF GOVERNMENT VEHICLES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"UNOFFICIAL USE\" of government vehicles refers to personal or private use by government officials and employees, such as for fetching students to and from school, for out-of-town trips and picnics, for shopping and going to markets and groceries, for going to cockpits, motels, beerhouses, and other recreational places, for attending dates and other family gatherings, and for any purpose other than the official business of the Office for which it is provided."

