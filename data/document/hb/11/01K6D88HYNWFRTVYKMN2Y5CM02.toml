congress_website_title = "AN ACT PROVIDING FOR A MORE RESPONSIVE AND COMPREHENSIVE REGULATION FOR THE PRACTICE OF CHEMICAL ENGINEERING IN THE PHILIPPINES"
congress_website_abstract = "\"Revised Chemical Engineering Law\". Seeks to provide for a more responsive and comprehensive regualtion for the practice of chemical engineering in the Philippines. Provides for the re-examination of failed subjects where an examinee who failed topass but obtained at least 70% in two subjects and the rating in the third subjects is not below 50% may be made to take a removal examination only in the subject where the examinee obtained below 70% within one year from the date of said examination."
