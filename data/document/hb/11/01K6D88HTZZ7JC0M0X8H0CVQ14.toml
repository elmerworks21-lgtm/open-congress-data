congress_website_title = "AN ACT LEGALIZING THE ESTABLISHMENT AND OPERATION OF NUMBERS GAMES UNDER CERTAIN CONDITIONS, AND PROVIDING PENALTIES FOR ANY VIOLATION THEREOF"
congress_website_abstract = "\"Number Games Law of 1998\". Aims to protect the citizenry from the unscrupulous practices of the clandestine number games operations, eliminate graft and corruption identified with the clandestine number games operations and tap the numbers games as a rich source of revenues for both national and local governments."
