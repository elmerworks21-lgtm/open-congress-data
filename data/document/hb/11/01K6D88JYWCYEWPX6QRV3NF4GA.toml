congress_website_title = "AN ACT GRANTING AUTOMATIC CIVIL SERVICE ELIGIBILITY TO ALL ELECTED GOVERNMENT OFFICIALS, IRRESPECTIVE OF BRANCH OF GOVERNMENT, NATIONAL OR LOCAL AND WHETHER THEY POSSESS EARLIER ELIGIBILITY OR NOT"
congress_website_abstract = "The provision of Republic Act No. 6850 and other laws notwithstanding , all persons who were elected to the government service, whether the position be national or local, and irrespective of whether the said elected officials possess earlier eligibility or not, are hereby granted AUTOMATIC CIVIL SERVICE ELIGIBILITY and are hereby accredited in the roster of eligibles."

