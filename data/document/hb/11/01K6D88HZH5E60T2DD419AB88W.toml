congress_website_title = "AN ACT AMENDING ARTICLES 135 AND 137 OF THE LABOR CODE (PD 442, AS AMENDED) SO AS TO EXPAND THE PROHIBITED ACTS OF DISCRIMINATION AGAINST WOMEN ON ACCOUNT OF SEX, AGE, ETHNIC ORIGIN OR BELIEFS"
congress_website_abstract = "Considers it an act of discrimination when the wmployer favors a male employee over a female employee with respect to ASSIGNMENT. Considers it a prohibited act under this proposed measure to deny any woman the benefits of employment by reason of hersex, age, ethnic origin or beliefs or relatives, either by affinity or consanguinity."
