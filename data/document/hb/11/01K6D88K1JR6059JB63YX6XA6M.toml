congress_website_title = "AN ACT DISQUALIFYING FROM FILING A CERTIFICATE OF CANDIDACY FOR ANY POSITION IN ANY NATIONAL OR LOCAL ELECTION PERSONS CHARGED WITH AND DETAINED FOR OR CONVICTED OF NON-BAILABLE OFFENSES"
congress_website_abstract = "Rationale: This bill seeks to disqualify from seeking any elective office all persons charged with and detained for or convicted of offenses which are non-bailable under existing laws.>Constitue ncies have suffered enough from deprivation of representation in government due to the detention of their elective public officials as a consequence of the latter's being charged with and detained for non-bailable offenses. It is submitted that this piece of legislation will prevent the recurrence of similar incidents in the future."

