congress_website_title = "AN ACT RECOGNIZING DUAL CITIZENSHIP OF FOREIGN NATIONALS WHO WERE FILIPINOS OR WHO WERE OF FILIPINO ANCESTRY, UNDER CERTAIN CONDITIONS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 8171 AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill provides that NATURAL-BORN FILIPINOS WHO HAVE LOST THEIR PHILIPPINE CITIZENSHIP, INCLUDING THEIR MINOR CHILDREN, ON ACCOUNT OF POLITICAL OR ECONOMIC NECESSITY, OR WHO HAVE ACQUIRED FOREIGN CITIZENSHIP UNDER THE PRINCIPLE OF JUS SOLI OR BYREASON OF BIRTH AND Filipino women who have lost their Philippine citizenship by marriage to aliens may reacquire Philippine citizenship through repatriation WITHOUT RENOUNCING THEIR FOREIGN CITIZENSHIP."

