congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF PRESIDENTIAL DECREE EIGHTEEN HUNDRED AND SIXTY-NINE, OTHERWISE KNOWN AS PAGCOR CHARTER, ENTITLED 'CONSOLIDATING AND AMENDING PRESIDENTIAL DECREE NOS. 1067-A, 1067-B, 1067-C, 1399 AND 1632, RELATIVE TO THE FRANCHISE AND POWERS OF THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION (PAGCOR)' AND FOR OTHER PURPOSES"
congress_website_abstract = "Allows the PAGCOR to (1) retain up to ten percent (10%) of its earning after deducting the five percent (5%) franchise tax; (2) create its subsidiaries and privatize a portion of these subsidiaries ;retain its tax incentives; and (4) design a createnew games of chance or any other innovations."
