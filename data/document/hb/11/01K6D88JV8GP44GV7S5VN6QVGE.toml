congress_website_title = "AN ACT CHANGING THE SCHOOL OPENING FROM JUNE TO AUGUST OF EACH YEAR, AMENDING FOR THE PURPOSE SECTION 24, CHAPTER 9, TITLE VI, BOOK IV OF EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE ADMINISTRATIVE CODE OF 1987"
congress_website_abstract = "The opening date shall be fixed by the Secretary, but it shall not be earlier than the [first] FIFTEENTH day of [June] AUGUST nor later than the last day of [July} SEPTEMBER of each year unless prevented by fortuitous events[.], PROVIDED THAT ON THEFIRST SCHOOL YEAR FOLLOWING THE APPROVAL OF THIS ACT, CLASSES SHALL OPEN NOT EARLIER THAN THE FIRST DAY OF JULYM AND THE FOLLOWING SCHOOL YEAR, NOT EARLIER THAN THE FIRST DAY OF AUGUST."
