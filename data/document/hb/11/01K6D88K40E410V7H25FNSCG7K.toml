congress_website_title = "AN ACT PROVIDING A MINIMUM FLOOR PRICE AS BASIS FOR THE DISPOSITION OF PROPERTY SUBJECT TO SALE AT THE BUREAU OF CUSTOMS, BY ADDING A NEW SECTION 2601 (a) UNDER PART 5, TITLE VI, BOOK II OF THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "The Bureau of Customs shall determine the MINIMUM FLOOR PRICE of articles for disposal based on the accumulated total of certain factors, such as (1) appraisal, advertisement and sale expenses; (2) government taxes; (3) storage charges; (4) arrastreand private storage charges, etc."
