congress_website_title = "AN ACT TRANSFORMING THE PUBLIC ATTORNEY'S OFFICE (PAO) INTO AN INDEPENDENT AND AUTONOMOUS OFFICE, TRANSFERRING IT FROM THE DEPARTMENT OF JUSTICE TO THE OFFICE OF THE PRESIDENT, AMENDING FOR THE PURPOSE PERTINENT PROVISIONS OF THE ADMINISTRATIVE CODEOF 1987"
congress_website_abstract = "Rationale: With the policy thrusts of the present administration to alleviate the plight of the less fortunate and impoverished, the task of addressing the legal and administrative inadequacies besetting the PAO requires immediate attention. By establishing PAO as an independent, autonomous office attached to the office of the President, it would mean greater flexibility in the performance of its avowed legal mandate: to give life and meaning to the principles of justice, right to due process,and equal protection and access to law."
