congress_website_title = "AN ACT AMENDING ARTICLE 26 OF THE NEW CIVIL CODE TO INCLUDE AS ACTIONABLE WRONG THE DISCLOSING OR CIRCULATING TO THIRD PARTIES A MAILING LIST OF PERSONAL INFORMATION OF PERSON GIVEN IN CONFIDENCE"
congress_website_abstract = "The following act shall produce a cause of action for damages, prevention and other relief: DISCLOSING, DISTRIBUTING, CIRCULATING AND/OR TRANSMITTING, WITH OR WITHOUT CONSIDERATION, TO THIRD PARTIES THROUGH A MAILING LIST USED FOR COMMERCIAL PURPOSES PERSONAL INFORMATION GIVEN BY ANOTHER, INCLUDING, BUT NOT LIMITED TO, THE PERSON'S NAME, RESIDENTIAL/BUS INESS ADDRESS AND CONTRACT INFORMATION, WHICH INFORMATION IS PRESUMED TO HAVE BEEN GIVEN IN CONFIDENCE."

