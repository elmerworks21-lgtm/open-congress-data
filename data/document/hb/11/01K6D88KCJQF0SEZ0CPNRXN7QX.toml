congress_website_title = "AN ACT DECLARING THE EXEMPTION OF THE JUDICIARY AND ITS PERSONNEL FOR THE COVERAGE OF REPUBLIC ACT NO. 6758, OTHERWISE KNOWN AS THE SALARY STANDARDIZATION LAW"
congress_website_abstract = "Rationale: Judges of 2nd level courts receive P41,960.33, while judges of the first level court receive P33,599 monthly salary, that is before taxes. Considering today's high cost of living,their monthly salaries are not enough. Furthermore, corporations are offering new lawyers with a starting salary almost equal to the salary of a judge. A private practitioner can even make in a week what an MTC judge is earning in a month. Thus , it is not surprising that very a few opt for a career in thejudiciary and the difficulty of enticing an established practitioner from leaving his financially rewarding occupation. It is in this trying times that a solution must be formulated."

