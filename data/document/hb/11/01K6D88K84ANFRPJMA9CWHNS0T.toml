congress_website_title = "AN ACT GRANTING SPECIAL BENEFITS TO GOVERNMENT PERSONNEL RETIRED UNDER REPUBLIC ACTS NUMBERED 660 AND 1616 AND PRESIDENTIAL DECREE NO. 1146, WHO ARE 70 YEARS OR OLDER, BY PROVIDING NEW PROCEDURES IN THE COMPUTATION OF MONTHLY PENSIONS AND FOR OTHERPURPOSES"
congress_website_abstract = "\"Special Centennial Retirement Act\". The policy of the State is to promote and provide a rising standard of living, and an improved quality of life for all. In pursuit of such policy, this Act provides for the increase in monthly pensions of retiredgovernment employees who are 70 years or older, in order that such pension would be responsive to their needs."

