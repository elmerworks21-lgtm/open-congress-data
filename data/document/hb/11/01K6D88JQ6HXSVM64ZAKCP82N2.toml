congress_website_title = "AN ACT MAKING APPLICABLE TO LAWYERS IN THE PUBLIC ATTORNEY'S OFFICE OF THE DEPARTMENT OF JUSTICE THE RETIREMENT BENEFITS UNDER REPUBLIC ACT NO. 910, AS AMENDED"
congress_website_abstract = "Rationale: The PUBLIC ATTORNEY takes the cudgels for the indigent and the lowly in all forms of court litigations. As such, he plays a pivotal role in the dispensation of justice. This bill seeks to give the public attorney his reward for his fervidcommitment to help the poor in their quest for justice."

