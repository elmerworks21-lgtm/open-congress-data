congress_website_title = "AN ACT STRENGTHENING THE REGULATORY POWER OF THE STATE AND THE POSITION AND COMPETITIVENESS OF LOCAL DRUG FIRMS IN THE IMPORTATION, MANUFACTURE, PACKAGING, SALE AND DISTRIBUTION OF DRUGS AND PHARMACEUTICALS IN THE PHILIPPINES, AND INSTITUTING FURTHER MEASURES TO LOWER THE COST OF MEDICINES AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Drugs and Pharmaceuticals Act of 2000\". The bill seeks among others, to introduce vital amendments to existing laws concerning drugs and pharmaceuticals not only to pave the way for: (1) a greater state intervention through a more active and efficient regulatory system in the drug industry complemented by a more vigorous and intrusive participation of the DOH in the purchase and distribution of drugs as to effectively influence the previaling price schemes in the market but also (2) in extending the support long clamored by local drug firms."
