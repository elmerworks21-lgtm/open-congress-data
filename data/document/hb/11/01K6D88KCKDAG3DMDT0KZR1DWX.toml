congress_website_title = "AN ACT CONVERTING THE COMPENSATION FOR PUNONG BARANGAY FROM HONORARIUM TO REGULAR SALARY, AMENDING FOR THIS PURPOSE THE LOCAL GOVERNMENT CODE"
congress_website_abstract = "THE PUNONG BARANGAY SHALL RECEIVE A MONTHLY SALARY INTITIALLY SET AT NOT LESS THAN THE HIGHEST MINIMUM WAGE IN THE PRIVATE SECTOR AT THE TIME OF THE ENACTMENT OF THIS LAW. He shall be entitled to mandated salary increases, and shall enjoy all otherexisting benefits under the Local Government Code."

