congress_website_title = "AN ACT LIBERALIZING THE OPERATIONS OF THRIFT BANKS AMENDING FOR THE PURPOSE THE THRIFT BANKS ACT OF 1995 AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposes certain amendments to the Thrift Banks Act of 1995, RA 7906, such as: (1) Allowing FOREIGN MAJORITY OWNERSHIP in thrift banks; (2) Allowing NEW EQUITY INVESTMENTS in non-allied activities; (3) Ownership of 100% of the equity in anallied enteprrise; and (4) No limit to the allowable deduction for interest expense that may be claimed by thrift banks."
