congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED 5173, OTHERWISE KNOWN AS AN ACT CREATING A PHILIPPINE COAST GUARD, PRESCRIBING ITS POWERS AND FUNCTIONS, APPROPRIATING THE NECESSARY FUNDS THEREFORE AND FOR OTHER PURPOSES BY ESTABLISHING A SEPARATE AND DISTINCTPHILIPPINE COAST GUARD SERVICE ATTACHED TO THE DEPARTMENT OF TRANSPORTATION AND COMMUNICATIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Coast Guard Act of 1998\". Separates the Philippine Coast Gurad from the Philippine Navy and attaches it to concentrate on its function of maritime safety administration, marine environmental protection, maritime search and rescue, including the enforcement of all applicable laws upon the high seas and waters."
