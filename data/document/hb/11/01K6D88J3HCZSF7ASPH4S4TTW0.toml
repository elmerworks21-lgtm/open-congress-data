congress_website_title = "AN ACT PROVIDING FOR THE PAYMENT OF GOVERNMENT INDEMNITY TO PERSONS WHO ARE ACCIDENTALLY KILLED OR INJURED IN THE COURSE OF MILITARY OR POLICE OPERATIONS OR DUE TO THE NEGLIGENT OR WRONGFUL ACTS OF GOVERNMENT OFFICIALS AND PERSONNEL ESTABLISHING A FUND THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Provides that claims for indemnity shall be investigated and decided by the DOJ and the Commission on Human Rights. These two offices shall recommend to the President the amount to be paid; in case of death; the family will be paid P100,000.00."

