congress_website_title = "AN ACT ESTABLISHING A COMPREHENSIVE JUVENILE JUSTICE SYSTEM AND DELINQUENCY PREVENTION PROGRAM, APPROPRIATING FUNDS THEREFOR AND FOR OTHER RELATED PURPOSES"
congress_website_abstract = "This bill seeks to reform the present justice and establish a comprehensive juvenile justice system. One of the recommendations of the United Nations Convention on the Rights of Children to the Philippine Government is to reform the juvenile systemand adhere to the international standards concerning juvenile justice. > The essence of the proposed bill is that of restorative justice. It seeks to restore the harm done to the victims, thereefore contributing to the peace and safety in the community while at the same time giving the youth offender the chance of rehabilitate prevent delinquency."

