congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1-B DATED NOVEMBER 1, 1972, ENTITLED `AMENDING PART II ON DEPARTMENTAL ORGANIZATION OF THE INTEGRATED REORGANIZATION PLAN, BY ALLOWING MORE THAN ONE UNDERSECRETARY OF A DEPARTMENT UNDER CERTAIN CONDITIONS'"
congress_website_abstract = "Pursuant to the desire of Congress to expunge from the book of statutes any legislative act that was enacted into law not by the legislative department but by and through the extraordinary exercise of the legislative power by the executive department, Presidential Decree No. 1-B is hereby amended for the purpose of properly labeling it as a Republicf Act duly enacted by this Congress. (EXPLANTORY NOTE) This explanatory note shall serve for all the bills listed below. The MAIN PURPOSE of this set of bills is to remove any vestige of a one-person rule or authoritatian government in statutes book of our country Each bill, therefore, aims to properly label every Presidential Decree (PD), Executive Order (EO)and all other acts of the Executivee Department that have the force and effect of laws, as a REPUBLIC ACT duly enacted by this Congress."
