congress_website_title = "AN ACT PROVIDING THE POLICIES AND PROCEDURES FOR COMPLAINT ON BIDDING AND AWARD OF GOVERNMENT INFRASTRUCTURE PROJECT, AMENDING FOR THE PURPOSE, PRESIDENTIAL DECREE NUMBERED FIFTEEN HUNDRED AND NINETY-FOUR ENTITLED \"PRESCRIBING POLICIES, GUIDELINES,RULES AND REGULATIONS FOR GOVERNMENT INFRASTRUCTURE CONTRACTS\""
congress_website_abstract = "Rationale: It has been observed that it is common practice in the bidding and awards of government infrastructure project that certain losing bidder files complaint against the winning bidder and the committee on bids and awards for allegedly illegal, irregular or defective procedures in the bidding thereof. Such practice often causes delays, obstruction or hindrance in the performance, execution or completion of the project which often results in cost increases and losses to the government,aside from undermining social benefits."

