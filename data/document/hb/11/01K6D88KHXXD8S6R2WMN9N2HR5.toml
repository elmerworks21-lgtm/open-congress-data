congress_website_title = "AN ACT INSTITUTING A CHILDREN'S WELFARE FUND FOR THE PROTECTION AND REHABILITATION OF ABANDONED, ABUSED AND SEXUALLY EXPLOITED CHILDREN, AMENDING FOR THIS PURPOSE REPUBLIC ACT NUMBERED 7610, OTHERWISE KNOWN AS `THE SPECIAL PROTECTION OF CHILDREN AGAINST CHILD ABUSE, EXPLOITATION AND DISCRIMINATION ACT'"
congress_website_abstract = "Our Constitution explicitly declares that it is the duty of the State to defend the rights of the children, assist and protect them from all forms of neglect, abuse, cruelty, exploitation and other conditions prejudicial to their development. Pursuant to this constitutional mandate, this measure seeks to establish a fund to be managed by the Department of Social Welfare and Development which shall be used mainly for the protection and rehabilitation of abandoned, abused and sexually exploited children."

