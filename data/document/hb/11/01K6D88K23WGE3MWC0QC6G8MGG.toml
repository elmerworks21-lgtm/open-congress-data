congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF R.A. 8550, OTHERWISE KNOWN AS `THE PHILIPPINE FISHERIES CODE OF 1998'(PREFERENT IAL RIGHTS OF MUNICIPAL FISHERFOLK)"
congress_website_abstract = "This bill, therefore, seeks to amend certain provisions of the Fisheries Code in order to strengthen the preferential rights of municipal fisherfolk over the use of municipal waters, put more substance in fisherfolk participation by giving them better representation in the national and local FARMCs, ban destructive fishing gears and methods, as well as facilitate the immediate establishments of fisherfolk settlement areas in coastal communities."

