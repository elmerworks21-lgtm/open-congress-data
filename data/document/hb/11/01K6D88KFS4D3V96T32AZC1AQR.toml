congress_website_title = "AN ACT DEFINING AND PENALIZING TORTURE AS A HIGH CRIME, AND AMENDING THE REVISED PENAL CODE (ACT NO. 3851, AS AMENDED) FOR THIS PURPOSE"
congress_website_abstract = "This bill proposes a NEW Article to be added to the Revised Penal Code and which reads as follows: TORTURE means any act by which severe pain or suffering, whether physical or mental, is intentionally inflicted on a person for such purposes as obtaining from him or a third person information or a confession, punishing him for an act he or a third person has committed, or intimidating or coercing him or a third person, or for any reason based on discrimination of any kind. It does not include pain or suffering arising only from, inherent in or incidental to lawful sanctions. When the torture is inflicted by or at the instigation of or with the consent or acquiescence of a public official or other person acting in an official capacity, all tthose responsible shall be guilty of the high crime of torture and shall suffer the penalty of reclusion temporal to reclusion perpetua. When there is no such role of a public official or other person acting in an official capacity, the penalty shall"
