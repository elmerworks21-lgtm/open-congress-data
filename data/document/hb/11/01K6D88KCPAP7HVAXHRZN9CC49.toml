congress_website_title = "AN ACT GRANTING SPECIAL HAZARD ALLOWANCE OF ONE THOUSAND PESOS (P1,000.00) EVERY MONTH TO THE PUBLIC SCHOOL TEACHERS ASSIGNED IN THE AUTONOMOUS REGION FOR MUSLIM MINDANAO AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Ratinale: The situation in the region poses grave threats to the life and limb of the inhabitants. Frequently, the public school teachers are the victims. They are too exposed and therefore attract the bad elements of society. Despite of these hazards, teachers courageously and nobly practice their profession in imparting knowledge to the young."

