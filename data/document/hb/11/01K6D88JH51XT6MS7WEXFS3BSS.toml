congress_website_title = "AN ACT PROVIDING FOR THE STRENGTHENING OF THE PROTECTIONS ACCORDED TO SENIOR CITIZENS, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SEVENTY-FOUR THIRTY-TWO"
congress_website_abstract = "This bill seeks to (1) expand the definition of \"SENIOR CITIZEN\" to include also those whose income is not more than [P60,000.00] P100,000.00 per annum; (2) grant a 20% discount on FUNARAL SERVICES; and (3) establish an Office for Senior Citizens Affair in the Office of the Governor and City Mayor."

