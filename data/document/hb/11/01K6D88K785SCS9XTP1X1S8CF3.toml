congress_website_title = "AN ACT PROHIBITING AND PENALIZING THE BURNING AND DESECRATION OF FOREIGN NATIONAL FLAGS WITHIN THE PHILIPPINES"
congress_website_abstract = "\"Protection of Foreign National Flags Act of 2000\". It shall be unlawful for any person, whether a citizen of the Philippines or a foreigner, to knowingly mutilate, deface, defile, burn or cast contempt or commit any act or omission casting dishonoror ridicule upon the national flag of any foreign government with which the Philippines is in good international relations. No diplomatic protest or any other act on the part of the offended nation or foreign government shall be necessary. No acton the part of our Department of Foreign Affairs shall be necessary to institute a complaint."
