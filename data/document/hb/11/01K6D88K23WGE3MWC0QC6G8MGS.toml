congress_website_title = "AN ACT GRANTING ADDITIONAL RETIREMENT BENEFITS TO MEMBERS OF THE JUDICIARY, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 910, AS AMENDED AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It is of common knowledge that the remuneration accorded to the Justices of the Supreme Court and Court of Appeals and other members of the Judiciary is indecently low. In response to the call of duty in the administration of justice, most of them have had to forego lucrative opportunities elsewhere, yet after having made a noble sacrifice ahd having devoted the best years of their lives to public service, they are not afforded appreciable security after retirement."
