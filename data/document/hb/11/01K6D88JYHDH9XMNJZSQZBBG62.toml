congress_website_title = "AN ACT EXPANDING PATERNITY LEAVE BENEFITS, AMENDING FOR THE PURPOSE SECTION 2 OF REPUBLIC ACT NO. 8187, OTHERWISE KNOWN AS THE PATERNITY LEAVE ACT ON 1996"
congress_website_abstract = "NOTWITHSTANDING ANY LAW, RULES AND REGULATIONS TO THE CONTRARY, EVERY MARRIED MALE EMPLOYEE IN THE PRIVATE AND PUBLIC SECTORS SHALL BE ENTITLED TO A PATERNITY LEAVE OF THIRTY (30) DAYS WITH FULL PAY FOR [THE FIRST FOUR (4) EACH LIVE BIRTH, OR SEVEN(7) DAYS WITH FULL PAY FOR ANY MISCARRIAGE, OF THE LEGITIMATE SPOUSE WITH WHOM HE IS COHABATING. THE MALE EMPLOYEE APPLYING FOR PATERNITY LEAVE SHALL NOTIFY HIS EMPLOYER OF THE PREGNANCY OF HIS LEGITIMATE SPOUSE AND THE EXPECTED DATE OF DELIVERY AT LEAST NINETY (90) DAYS BEFORE THE SAID EXPECTED DATE."
