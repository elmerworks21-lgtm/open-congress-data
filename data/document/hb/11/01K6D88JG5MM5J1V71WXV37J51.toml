congress_website_title = "AN ACT INSTITUTIONALIZ ING AT LEAST ONE (1) SPECIAL SCHOOL FOR CHILDREN WITH DISABILITIES IN EVERY PROVINCE OR CITY, APPROPRIATING FUNDS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Special School Act of 1998\". This proposed Special School shall cater to elmentary and high school students with disabilities. The School shall be equipped with a complete, adequate and integrated system of special education for the visually impaired, hearing impaired, mentally retarded persons and other types of exceptional children."
