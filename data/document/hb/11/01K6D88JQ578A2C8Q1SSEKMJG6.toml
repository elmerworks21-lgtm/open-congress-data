congress_website_title = "AN ACT IMPROVING PHILIPPINE COMMITMENT TO HUMAN RIGHTS PROMOTION AND PROTECTION BY AMENDING BATAS PAMBANSA BILANG 22, ENTITLED 'AN ACT PENALIZING THE MAKING OR DRAWING AND ISSUANCE OF A CHECK WITHOUT SUFFICIENT FUNDS OR CREDIT AND FOR OTHER PURPOSES'"
congress_website_abstract = "This bill proposes to add this NEW provision to BP Blg. 22, which reads as follows: SECTION 1-A. EXCEPTION - WHERE THE CHECK IS ISSUED AS PART OF AN ARRANGEMENT TO GUARANTEE OR SECURE THE PAYMENT OF AN OBLIGATION, WHETHER PRE-EXISTING OR NOT, THEDRAWER SHALL NOT BE CRIMINALLY LIABLE UNDER THIS ACT OR UNDER ARTICLE 315 (2D) OF REPUBLIC ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE."
