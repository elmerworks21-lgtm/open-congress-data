congress_website_title = "AN ACT AMENDING EXECUTIVE ORDER NO. 1061, AS AMENDED BY EXECUTIVE ORDER NO. 60, RENAMING THE PHILIPPINE RICE RESEARCH INSTITUTE (PRRI) TO THE `PHILIPPINE RICE AND CEREALS RESEARCH INSTITUTE, TO BE KNOWN AS `PHILRICE' OR PRCRI, AMENDING ITS PURPOSESAND OBJECTIVES, EXPANDING ITS POWERS AND FUNCTIONS, PROVIDING IT WITH ORGANIZATIONAL AND FISCAL FLEXIBILITY, APPROPRIATING REGULAR FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Philippine rice and Cereals Research Act of 1999\". Pursuant to Republic Act No. 8435, otherwise known as \"The Agriculture and Fisheries Modernization Act (AFMA) of 1997\", PhilRICE shall develop and implement a national research, development, and extension program for rice, corn, wheat, sorghum, millet, and other cereals. The program shall be consistent with the principles of poverty alleviation and social equity, food security, rational use of resources, global competitiveness , sustainable devleopment, people empowerment, and proteection from unfair competition, as embodied in the AFMA."
