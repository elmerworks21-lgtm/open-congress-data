congress_website_title = "AN ACT REVISING THE SCHOOL CALENDAR, AMENDING FOR THE PURPOSE SECTION 24, CHAPTER 9, TITLE VI BOOK IV OF EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE `ADMINISTRATIVE CODE OF 1987'"
congress_website_abstract = "\"Roces School Calendar Act of 1999\". This bill provides that the school calendar of elementary and secondary levels shall start not earlier that the first day of [June] SEPTEMBER, not later than the last day of [July] OCTOBER of each year. For higher education or post-secondary level, the calendar shall start on the first week of September and shall continue for 36 weeks or 18 weeks a semester."
