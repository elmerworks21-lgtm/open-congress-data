congress_website_title = "AN ACT PROVIDING FOR A COMPREHENSIVE SOLID WASTE MANAGEMENT AND DISPOSAL POLICY AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Solid Waste Disposal Act of 1999\". Rationale: The passage of bills such as the Clean Air and other laws respecting public health and the environment have likewise created greater amounts of solid waste (in the form of sludge and other pollution treatment residues). Similarly, inadequate and environmentally unsound practices or use of solid waste have created greater amounts of air and water pollution and other problems for the environment and for health. supplies in substantial risks, and pollutes the air and the land.> The placement of inadequate controls on hazardous waste management will likewise result in substantial risks to human health and the environment."
