congress_website_title = "AN ACT RESTRUCTURING THE OIL INDUSTRY BY ESTABLISHING A NATIONAL OIL EXCHANGE, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"NATIONAL OIL EXCHANGE ACT OF 2000.\" This bill declares the policy of the State to fast-track the development of a truly competitive market under a regime of fair price, adequate and continuous supply of environmentally clean and high quality refined petroleum products."
