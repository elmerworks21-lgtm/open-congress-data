congress_website_title = "AN ACT TO GUARANTEE THE FREEDOM OF ACCESS TO INFORMATION FOR ALL JOURNALISTS, MEDIA PRACTITIONERS, AND CITIZENS OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"The Freedom of Information Act of 1999\". This bill shall cover only agencies within the executive branch of government and constitutional bodies, EXCLUDING any office within the judicial and legilsative branches of government. Rationale: Gaining access to government-held information has been a problem for journalists and citizens alike. Journalists and the general public can do little when requests for information is denied. Many government officials are reluctant in providing easy access bynews reporters and the general public to the vast amounts of information held by agencies within the government. and yet, access to these information is necessary for the efficient operation of our democracy."

