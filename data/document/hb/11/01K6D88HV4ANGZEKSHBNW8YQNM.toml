congress_website_title = "AN ACT ESTABLISHING THE PHILIPPINE NATIONAL QUALITY EXCELLENCE AWARD (PNQEA) IN ORDER TO ENCOURAGE PHILIPPINE BUSINESS AND OTHER ORGANIZATIONS TO ACHIEVE EXCELLENCE IN QUALITY IN THE PROVISION OF THEIR GOODS AND SERVICES"
congress_website_abstract = "\"Philippine National Quality Excellence Award Act of 1998\". Aims to: (1) stimulate companies and organizations to attain excellence for the pride of achievement; (2) recognize outstanding companies and organization for others to emulate; (3) establish guidelines which business, governmental and other organizations can use to evaluate and improve their own quality efforts and (4) provide information to companies and organizations on how to manage for superior quality goods and services."
