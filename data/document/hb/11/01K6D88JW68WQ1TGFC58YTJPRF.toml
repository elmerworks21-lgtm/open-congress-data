congress_website_title = "AN ACT STRENGTHENING THE FIRE-FIGHTING CAPABILITIES OF LOCAL GOVERNMENT UNITS (LGUS) BY ALLOWING LGUS TO RETAIN HALF OR FIFTY PERCENT OF ALL TAXES, FEES AND FINES COLLECTED UNDER PRESIDENTIAL DECREES NO. ELEVEN EIGHTY-FIVE (PD 1185), OTHERWISE KNOWNAS THE FIRE CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: Local governments are aware and recognize that a number of functions under the Fire code are best left under a national authority since these functions are very specialized and would require economies of scale to be cost-effective and cost-efficient. These services and functions obviously require reosurces as well. However, this should never be at the expense of preparedness and responsiveness. We should never scrimp or penny-pinch when it comes to the lives of people and our constituents."

