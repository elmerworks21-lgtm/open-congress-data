congress_website_title = "AN ACT TO REQUIRE ALL VOTERS TO FILE AN INCOME TAX RETURN, MAKING THE FILING THEREOF AS A PRECONDITION FOR VOTING"
congress_website_abstract = "\"The Tax Filer - Voter Act of 2000.\" Rationale: In order to strengthen the existing electoral system and to further equip our elected officials with the capacity to effectively discharge the affairs of state, there is need to introduce electoral reforms. One such reform is the granting of the privilege to vote only to individuals who are bona-fide filers of income tax returns - in addition to the current requirements of qualified voters. This, of course, doe not mean that only taxpayers shallbe allowed to vote. Even thos who need not pay taxes may vote so long as they have filed the appropriate income tax returns."
