congress_website_title = "AN ACT GRANTING A TAX AMNESTY ON UNTAXED INCOME AND/OR WEALTH EARNED OR ACQUIRED PRIOR TO DECEMBER 31, 1997 AND REQUIRING THE FILING OF THE STATEMENT OF ASSETS, LIABILITIES AND NET WORTH AS OF DECEMBER 31, 1997"
congress_website_abstract = "Envisions an honest to goodness tax amnesty whereby all persons concerned shall be afforded a last opportunity to come up with a clean slate by making a true and faithful return of their declared income and/or wealth and the filing of a Statement ofAssets and Liabilities as of December 31, 1997, and paying the prescribed amnesty tax in order to be accorded the full benefits of the amnesty law."
