congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF THE PHILIPPINE NATURAL RESOURCE AND GLOBAL CHANGE CENTER AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Like never before in histroy, mankind is threatened with environmental disasters of global proportions. The environmental cost of the world's economic boom and industrializati on, pursued at a dizzying pace in the last 100 years, is now felt everywhere. Ironically, the current rate of environmental degradation and ecological support systems threatened to totally undo whatever man has gained.< This situation has given to rise to a new field of study called GLOBAL CHANGE, which focusesany changes in the global environment that may alter the capacity of the Earth to sustain life. Four major issues are currently being addressed in global change."
