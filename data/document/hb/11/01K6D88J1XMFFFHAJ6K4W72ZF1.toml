congress_website_title = "AN ACT REDUCING THE RETIREMENT AGE OF GOVERNMENT EMPLOYEES, AMENDING FOR THE PURPOSE THE REVISED GOVERNMENT SERVICE INSURANCE ACT, AND FOR OTHER PURPOSES"
congress_website_abstract = "REDUCES the optional retirement for government employees from fifteen (15) years to at least TWELVE (12) YEARS of service, provided that the employee is at least FIFTY-FIVE years of age; the compulsory retirement age to SIXTY (60) years with at least TWELVE (12) years of service."
