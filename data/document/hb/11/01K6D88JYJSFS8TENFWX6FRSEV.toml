congress_website_title = "AN ACT TO ESTABLISH A COMFORTABLE HOME-STAY FOR THE POOR LITIGANTS OF A CASE ON APPEAL TO THE SUPREME COURT INCLUDING THOSE CONDUCTED IN ALL OTHER INFERIOR COURTS AND JUDICIAL BODIES IN MANILA, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: This bill seeks to provide our poor people especially those from the province the equal opportunity to fight and look for justice in a legal battle in courts and other judicial bodies in Manila. Oftentimes, it is noted that a poor litigant is always at a loss and on a great disadvantage compared to wealthy litigant in terms of finances, legal assistance, and all others that are necessary to ensure the favorable consideration of his case."
