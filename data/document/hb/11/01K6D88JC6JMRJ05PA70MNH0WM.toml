congress_website_title = "AN ACT PROVIDING CERTAIN REQUIREMENTS TO ENSURE CLEAN AND HONEST ELECTIONS OF MEMBERS OF THE BOARD OF DIRECTORS OF ELECTRIC COOPERATIVES, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREES NO. 269 AND 1645"
congress_website_abstract = "Rationale: Electric cooperatives (ECs) play a vital role in rural electrification and rural development, thus the government must continuously strive to improve the transparency of the ECs. This is especially important given the repeated reports ofover-staying directors and officers of ECs and allegation of dubious transactions and practices of some ECs."
