congress_website_title = "AN ACT AMENDING SECOND PARAGRAPH OF ARTICLE 318 OF THE REVISED PENAL CODE AND PROVIDING STIFFER PENALTIES FOR VIOLATION THEREOF(RE: SEEKS TO IMPOSE STIFFER PENALTIES ON ANY OTHER FORMS OF DECEIT(FORTUNE TELLING, FORECASTS, ETC...)"
congress_website_abstract = "Paragraph 2, Article 318 of the Revised Penal Code is amended to read as follows: \"Any person who, for profit or gain, shall interpret dreams, make forecasts, or any other game, device, sleigh-of-hand, pretensions to fortunetelling, feng sui, or other means whatever by the use of cards or other implement or implements or take advantage of the credulity of the public in any other similar manner fraudulently obtains from another person, money or property of any description, shall suffer the penalty of ARRESTO MAYOR or a fine not exceeding Five Hundred pesos.\""
