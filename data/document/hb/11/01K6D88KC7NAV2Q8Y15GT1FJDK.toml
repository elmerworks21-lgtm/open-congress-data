congress_website_title = "AN ACT REQUIRING OIL COMPANIES TO INSTALL OIL SPILLAGE PREVENTIVE AND CONTROL MECHANISM IN THEIR TANKERS AND TO UNDERTAKE IMMEDIATE CLEANING OPERATIONS IN THE EVENT OF OIL SPILL WITHIN THE COUNTRY'S TERRITORIAL WATERS, AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Rationale: This bill seeks to require oil companies to install oil spill preventive and control facilities in their tankers and to undertake immediate and mandatory cleaning operations in the event of another oil spill within the country's territorial waters. Because of the oil spill whether caused by accident or otherwise, the use of beaches, harbors and marinas is seriously curtailed and temporarily halted until an effective clean up operation is compelted. The consequences of spilled oil from tankers plying the territorial waters of the Philippines vary from minimal damage to extensive deleterious effects on the marine ecosystem and the people living in the coastal areas."

