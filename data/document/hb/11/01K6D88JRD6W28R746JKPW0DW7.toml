congress_website_abstract = "\"Road Transportation Safety Act of 1999\". This bill aims to promote safety on the road by (1) banning road unworthy vehicles from plying the streets; (2) requiring drivers to undergo neuro-psychiatr ic and drug tests; (3) employing the utilizationof RANDOM BREATH TESTING (RBT); and (4) providing stiffer penalties for guilty parties."

