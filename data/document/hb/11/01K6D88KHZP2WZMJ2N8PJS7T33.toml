congress_website_title = "AN ACT PROVIDING THE GRANTING OF REWARDS AND PROTECTION TO THOSE WHO WILL REPORT MALFEASANCE IN GOVERNMENT OFFICES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Any government employee who will report any act of malfeasance committed by his superior or any of his co-employees shall be granted a reward or incentive in terms of cash, bonus or promotion in rank, if qualified and shall be provided protection against any retaliation from erring officials oremployees."

