congress_website_title = "AN ACT PROVIDING ADDITIONAL SAFEGUARDS TO THE INTER-COUNTRY ADOPTION OF FILIPINO CHILDREN, AMENDING FOR THE PURPOSE THE INTER-COUNTRY ADOPTION ACT OF 1995"
congress_website_abstract = "One of the safeguards proposed in this bill is the REDUCTION of the term of inter-country adoption board members from [six (6)] years to TWO (2) years. It, likewise, provides for the insulation of board members from the influence exerted by agencies, institutions they are presently OR were formerly associated with."
