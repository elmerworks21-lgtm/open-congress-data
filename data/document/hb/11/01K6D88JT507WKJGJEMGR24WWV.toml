congress_website_title = "AN ACT PROHIBITING CERTAIN LOCAL OFFICIALS TO FILL THE VACANCY IN THE OFFICES OF THE GOVERNOR OR MAYOR AND VICE GOVERNOR OR VICE-MAYOR, AMENDING FOR THE PURPOSE SECTION 44 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Provides a mandate on succession to avert the possible scenario wherein the governor or mayor, after completing three (3) consecutive terms, will support a next of kin or a protege and settle for the second top post in the hope of regaining his oldseat by circumventing the Constitutional mandate on term limits."
