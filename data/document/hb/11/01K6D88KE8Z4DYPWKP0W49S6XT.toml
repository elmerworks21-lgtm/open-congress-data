congress_website_title = "AN ACT REQUIRING THE INTELLECTUAL PROPERTY OFFICE (IPO) TO REMIT ITS EARNINGS OR REVENUES ANNUALLY TO THE NATIONAL GOVERNMENT, AMENDING FOR THIS PURPOSE SECTION 14 OF REPUBLIC ACT NO. 8293"
congress_website_abstract = "It is the policy of the State that in order for the National Government to realize additional revenues and, as a result, free more resources for priority development programs and projects, revenue-earning government agencies, without impairing theirability to pursue the goals for which they have been established, shall share a substantial amount of their net earnings with the National Government."

