congress_website_title = "AN ACT PROVIDING THAT RESTRAINING ORDERS ISSUED BY THE SUPREME COURT SHALL BE EFFECTIVE FOR A PERIOD OF SIXTY (60) DAYS FROM THE DATE OF ISSUANCE, AND RESTRAINING ORDERS ISSUED BY QUASI-JUDICIAL AND ADMINISTRATIVE BODIES SHALL BE EFFECTIVE FOR THIRTY (30) DAYS FROM THE DATE OF ISSUANCE, AMENDING FOR THE PURPOSE SECTION FIVE OF RULE FIFTY-EIGHT OF THE RULES OF COURT, AS AMENDED"
congress_website_abstract = "Rationale: Under the existing rule, a TRO issued by the Supreme Court shall be effective UNTIL FURTHER ORDERS. It has NO specific period as to when it is to be lifted."
