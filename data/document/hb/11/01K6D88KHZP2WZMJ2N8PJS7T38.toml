congress_website_title = "AN ACT DECLARING FAILURE OF ELECTIONS DUE TO LARGE SCALE VOTE BUYING AND VOTE SELLING"
congress_website_abstract = "\"Electoral Reform Act of 2001.\" It is therefore imperative that the election process be reinvented to make vote-buying/sel ling at least a very risky practice for the candidate. A candidate who is losing or who has lost because of vote-buying/sel ling must be given the right to call for a suspension of proclamation prior to the proclamation of the winning candidate upon submission of evidence. This will effectively discourage would-be candidate-offen ders, who would not be given the satisfaction of being proclaimed winners as what happens in the present system. In essence, this Act will effectively discourage candidates from buying their mandate from the people. A candidate will not run the high risk of losing his millions if it would bevery easy to effct a failure of elections by another candidate before the former's proclamation."

