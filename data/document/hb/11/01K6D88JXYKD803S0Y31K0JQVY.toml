congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF COMPENSATION TO BUILDERS AND CONTRACTORS OF BUILD-OPERATE-T RANSFER (BOT) PROJECTS, WHICH ENHANCE THE VALUE OF LANDS OR PROPERTY"
congress_website_abstract = "The State shall formulate and implement policies and programs to provide a system of compensation to BOT investors whose projects resulted the increase in the value of land. These investors shall be compensated by the property owner, or in case ofpublic lands, by the local government unit or the national government, through an equitable reimbursement based on a percentage of the realized gain or increase in value attributable to said development."

