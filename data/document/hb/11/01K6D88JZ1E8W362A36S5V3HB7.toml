congress_website_title = "AN ACT AMENDING PARAGRAPH TWO, SECTION 24 (A) (1) AND REPEALING SECTION 35 OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE TAX REFORM ACT OF 1997(RE: ZERO(0)-RATED INCOME TAXES)"
congress_website_abstract = "This bill seeks to provide for ZERO (0)-RATED INCOMES TAXES in lieu of the current system of personal exemptions. It will make our tax law more in consonance with the Constitutional mandate of progressivity. It will impose tax where tax is due. Itwill provide for much needed relief to low-wage earners. It offers a system administrativel y more feasible than the present one, with negligible reduction, if any, in revenues from income taxes."
