congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF CONSULTATION MECHANISMS TO EFFECTIVELY HARNESS THE ACTIVE PARTICIPATION OF NONGOVERNMENTAL ORGANIZATIONS AND COMMUNITY-BASED ORGANIZATIONS IN GOVERNMENT POLICY FORMULATION, PROGRAM DEVELOPMENT AND PROJECT IMPLEMENTATION"
congress_website_abstract = "\"People's Consultation and Participation Act of the Year 2000\". National and local government agencies with programs and projects for the poor and the under-privilege d must view their constituencies as active partners. To ensure meaningful and effective people's participation, this bill mandates the ESTABLISHMENT of CONSULTATION MECHANISMS at the national, regional, and local levels of governance."

