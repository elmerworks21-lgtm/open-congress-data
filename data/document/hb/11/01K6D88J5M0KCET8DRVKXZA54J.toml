congress_website_title = "AN ACT PROVIDING FOR THE COMPLETION OF THE DEVELOPMENT OF ABANDONED SUBDIVISION AND CONDOMINIUM PROJECTS, THEREBY AMENDING FURTHER PRESIDENTIAL DECREE NO. 957, ENTITLED \"REGULATING THE SALE OF SUBDIVISION LOTS AND CONDOMINIUMS, PROVIDING PENALTIES FOR VIOLATIONS THEREOF\""
congress_website_abstract = "The bill further strengthens the authority of the HLURB to regulate activities of subdivision developers by prohibiting the selling of lots or condominium units unless THIRTY PERCENT (30%) of the project has been completed. Mandates, likewise, a 50%performance bond as another regulatory measure."
