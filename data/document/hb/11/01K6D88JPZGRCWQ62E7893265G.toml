congress_website_title = "AN ACT PROVIDING AN ALTERNATIVE MODE OF TAX PAYMENT BY CORPORATIONS, AMENDING FOR SUCH PURPOSE SECTION 56 (A) OF THE NATIONAL INTERNAL REVENUE CODE OF 1997"
congress_website_abstract = "This bill is a creative and optional measure which seeks to provide corporations with an alternative mode of payment of 20% of their yearly corporate income tax payable by undertaking, completing and trasferring to the national government and/or LGUs infrastructure and other development projects, as well as donating equipment or giving grants."

