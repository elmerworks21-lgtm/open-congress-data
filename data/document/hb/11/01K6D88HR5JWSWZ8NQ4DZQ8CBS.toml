congress_website_title = "AN ACT BANNING CIGAR AND CIGARETTE SMOKING IN PUBLIC PLACES, AND IMPOSING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "PROHIBITS SMOKING in hospitals, moviehouses, assembly halls, enclosed and airconditioned public establishments, public conveyances, government buildings and school rooms, except in designated smoking areas to be identified by the administrator, owner, operator or manager of said establishment. Imposes penalty for the violation of this Act."
