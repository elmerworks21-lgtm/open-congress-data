congress_website_title = "AN ACT PROVIDING FOR THE REGULARIZATION OF EMPLOYEES, PROHIBITING CONTRACTUAL OR LABOR-ONLY CONTRACTING FOR REGULAR POSITIONS, PROVIDING PENALTIES FOR VIOLATION THEREOF, AMENDING FOR THE PURPOSE ARTICLES 280 AND 281 OF THE LABOR CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "AN EMPLOYMENT SHALL BE DEEMED REGULAR IF ONE IS ENGAGED IN AN ACTIVITY THAT IS USUALLY NECESSARY OR DESIRABLE IN THE USUAL BUSINESS OR TRADE OF THE EMPLOYER REGARDLESS OF THE PERIOD OF EMPLOYMENT: PROVIDED, THAT, AN EMPLOYMENT LESS THAN THREE (3) MONTHS CANNOT BE DEEMED A REGULAR EMPLOYMENT. EMPLOYMENT THAT IS SEASONAL OR FOR A SPECIFIC PROJECT SHALL BE DEEMED REGULAR EMPLOYMENT FOR THE DURATION OF THE SEASON OR THE SPECIFIC PROJECT ENGAGED IN IF THE SAME IS USUALLY NECESSARY OR DESIRABLE IN THE USUAL BUSINESS OR TRADE OF THE EMPLOYER."

