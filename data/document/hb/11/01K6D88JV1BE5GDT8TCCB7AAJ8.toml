congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 8292, OTHERWISE KNOWN AS THE HIGHER EDUCATION MODERNIZATION ACT OF 1997 AND FOR OTHER PURPOSES(RE: GOVERNING BOARDS COMPOSITION AND REPRESENTATION OF STATE COLLEGES AND UNIVERSITIES)"
congress_website_abstract = "The composition of the governing boards is one determining factor of the SUC's(State Universities and Colleges) success or failure, especially if those sitting in the board are restricted and prevented to effectively carry out his or her duties because of vague and inappropriate provisions presently being provided by R.A. 8292. Most common problem related to the SUC Board is its composition and representation. The student representation in the Board is one perennial issue where questions and opposiations are raised. Another issue is the term of office of the SUC president and the provisions concerning his or her re-appointment."

