congress_website_title = "AN ACT AUTHORIZING THE BUREAU OF INTERNAL REVENUE AND THE DEPARTMENT OF FINANCE TO FORMULATE AN INCENTIVE PROGRAM TO ENCOURAGE TAXPAYERS TO VOLUNTARILY PARTICIPATE IN THE REVENUE ENHANCEMENT PROGRAM OF THE GOVERNMENT INCLUDING THE GRANTING OF IMMUNITY FROM AUDIT AND INVESTIGATION OF INCOME TAX, VAT AND PERCENTAGE TAX FOR TAXABLE YEAR 1998 UNDER CERTAIN CONDITIONS"
congress_website_abstract = "Rationale: The BIR came up with REVENUE REGULATIONS NO. 2-99 dated February 7, 1999 to encourage taxpayers to voluntary cooeprate in the Economic Recovery Assistance Payment (ERAP) Program of the government. The Program, however, was criticized by certain House Members for being UNCONSTITUTIONA L. They claim that the Revenue Regulations is a tax amnesty, and that ONLY Congress can grant the amnesty."

