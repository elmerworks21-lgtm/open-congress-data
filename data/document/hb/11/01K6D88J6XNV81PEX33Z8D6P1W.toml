congress_website_title = "AN ACT ALLOWING THE CREATION OF MULTI-DISCIPLIN ARY TECHNOLOGICAL INFRASTRUCTURE PARTNERSHIPS AND CORPORATIONS WHICH MAY BE USED BY REGISTERED TECHNOLOGICAL INFRASTRUCTURE PROFESSIONALS AS A VEHICLE FOR THE PRACTICE OF THEIR PROFESSIONS, AMENDING FOR THE PURPOSE CERTAIN LAWS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Technological Infrastructure Partnerships and Corporations Law\". Allows the following professions to form or practice through multidiscimplin ary partnerships: (1) architecture; (2) civil engineering; (3) electrical engineering; (4) electronics and communications engineering; (5) environmental planning; (6) interior design; (7) mechanical engineering; and (8) sanitary engineering."

