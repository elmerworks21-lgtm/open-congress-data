congress_website_title = "AN ACT TO PROMOTE THE DEVELOPMENT OF THE FOOTWEAR MANUFACTURING INDUSTRY, PROVIDING INCENTIVES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Recognizing that the footwear industry has the potential for more employment generation, to increase linkages with allied industries and other sectors of the economy, and to increase foreign exhange earnings through exports and import substitutes, it is hereby declared to be the policy of the State to support, promote and encourage the growth and devleopment of the predominantly small and medium-scale footwear manufacturers."

