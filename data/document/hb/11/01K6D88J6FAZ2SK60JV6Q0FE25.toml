congress_website_title = "AN ACT GRANTING FIRST PREFERENCE TO THE CLAIMS FOR DAMAGES OF VICTIMS OF HUMAN RIGHTS VIOLATIONS IN THE DISPOSITION OF THE ESTATE OR PROPERTY OF THE OFFENDER"
congress_website_abstract = "Seeks to grant first preference to claims for damages of human rights victims, which are adjudicated in favor of the victims or their heirs by proper courts within and/or without the country, over all other claims in the disposition of the violator's estate or property, real or personal."
