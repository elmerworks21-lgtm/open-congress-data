congress_website_title = "AN ACT EXEMPTING ANY PERSON/BUSINESS ENTITY FROM PAYING CAPITAL GAINS TAX ON THE SALE OR DISPOSITION OF REAL PROPERTY PROVIDED PROCEEDS THEREOF IS UTILIZED TO RELOCATE THEIR BUSINESS FROM URBAN TO PROVINCIAL AREAS, AMENDING FOR THE PURPOSE SECTION 24(D)(2) OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE TAX REFORM ACT OF 1997"
congress_website_abstract = "Rationale: If we encourage owners of business establishments to relocate their businesses to the countryside, the migration of people would be minimized. We can achieve this by granting tax incentives in the form of an exemption in paying the capital gains tax."
