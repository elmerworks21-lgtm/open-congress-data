congress_website_title = "AN ACT PROVIDING FOR A UNIFORM REWARD SYSTEM IN THE CAMPAIGN AGAINST CRIMES AND LAWLESSNESS"
congress_website_abstract = "Rationale: In the newspapers, on television and radio, our people read, watch and hear the ccontinuing appeals of our policy agencies to their sense of partriotism and civic pride to report crimes and criminals. In this country of relative mass unemployment and soaring prices, our people have long ago discovered that patriotism and civic pride alone cannot keep body and soul together. this bill provides the remedy - a monetary incentive, a reward, a just and reasonable compensation."

