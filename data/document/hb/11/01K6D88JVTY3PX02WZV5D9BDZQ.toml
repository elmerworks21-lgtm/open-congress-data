congress_website_title = "AN ACT REVISING THE SCHOOL CALENDAR BY CHANGING ITS OPENING DATE FROM JUNE TO SEPTEMBER, AMENDING FOR THIS PURPOSE SECTION 24, CHAPTER 9, TITLE VI, BOOK IV OF EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE `ADMINISTRATIVE CODE OF 1987'"
