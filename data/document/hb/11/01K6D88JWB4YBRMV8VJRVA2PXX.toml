congress_website_title = "AN ACT INCREASING THE AMOUNT OF DAMAGES FOR DEATH CAUSED BY A CRIME FROM THREE THOUSAND PESOS (P3,000.00) TO ONE HUNDRED THOUSAND PESOS (P100,000.00) OR SUCH HIGHER AMOUNT AS MAY BE AWARDED BY THE COURT IN THE EXERCISE OF ITS SOUND DISCRETION, AMENDING FOR THIS PURPOSE ARTICLE 2206, CHAPTER 2, OF REPUBLIC ACT NUMBERED THREE HUNDRED AND EIGHTY-SIX, OTHERWISE KNOWN AS THE CIVIL CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: Today's P3,000.00 is good only for a month's fee for a not so decent room or a bachelor's pad. You can just imagine how an amount enough to buy a house and lot then just turned to date into a month's rent for a single room. It is in thiscontext that this bill is being filed to INCREASE the amount of damages for death from [P3,000.00] to P100,000.00. This is more viable in proportion to our economy."
