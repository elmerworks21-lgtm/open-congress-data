congress_website_title = "AN ACT DECLARING CONTRIBUTIONS AND DONATIONS TO THE PHILIPPINE NATIONAL RED CROSS DEDUCTIBLE FROM INCOME TAX THEREBY AMENDING FOR THE PURPOSE SECTION FOUR OF REPUBLIC ACT NUMBER NINETY FIVE"
congress_website_abstract = "Regular membership in the Philippine National Red Cross shall be open to all the adult population in the Philippines. Any contribution to the Philippine National Red Cross Annual Fund Campaign shall entitle an individual to membership for one year.ANY PERSON WHETHER JURIDICAL OR NATURAL, WHO DONATES ANY SUM OF MONEY TO THE PHILIPPINE NATIONAL RED CROSS SHALL BE ALLOWED TO DEDUCT SAID DONATION FROM HIS INCOME TAX RETURN IN FULL."

