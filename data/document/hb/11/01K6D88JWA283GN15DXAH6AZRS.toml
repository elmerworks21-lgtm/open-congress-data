congress_website_abstract = "Rationale: Drug abuse is one of the pressing health concerns today. Drug-testing programs are a fairly recent attempt to solve the problem of widespread substance abuse and its consequences. Thus, this bill requiring a mandatory drug testing among high school and college students as a CONDITION PRECEDENT for admission in schools."
