congress_website_title = "AN ACT AMENDING SECTIONS IN REPUBLIC ACT 545, OTHERWISE KNOWN AS AN ACT TO REGULATE THE PRACTICE OF ARCHITECTURE IN THE PHILIPPINES"
congress_website_abstract = "Rationale: At present, there is confusion and conflict as to the proper delineation of the practice of architecture and civil engineering which have resulted in the the rampant illegal practice of architecture by nonarchitects. These malpractices have wrought havoc on the acrhitectural profession. This bill seeks to raise the standards of the practice of architecture."
