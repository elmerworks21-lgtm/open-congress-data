congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF DISPOSITION OF SEIZED/ CONFISCATED ILLEGALLY CUT, GATHERED, REMOVED AND POSSESSED LOGS, LUMBER, FLITCHES, AND OTHER FOREST PRODUCTS AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: This bill seeks to curb this anomalous situation by PROHIBITING the DENR or the Natural Resources Development Corporation (NRDC) from conducting a public auction on al seized/confisca ted illegally cut, gathered removed and possessed logs, lumber, flitches and other forest products. Instead, these should be donated to the local government units having jurisdiction over the area of origin to benefit their respective communities. These forest products will be distributed according to priority, thus enhancing delivery of education, housing or infrastructure in the territorial jurisdiction of the LGUs concerned."
