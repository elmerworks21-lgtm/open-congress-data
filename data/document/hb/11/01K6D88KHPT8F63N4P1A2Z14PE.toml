congress_website_title = "AN ACT PROVIDING FOR AMENDMENTS TO ARTICLE VII, SECTION OF THE 1987 CONSTITUTION, AUTHORIZING THE CONDUCT OF A PLEBISCITE IN ACCORDANCE WITH ARTICLE XVII, SECTION 4 OF THE 1987 CONSTITUTION, AND PROVIDING FUNDS THEREFOR"
congress_website_abstract = "This bill provides for the following amendment to Article VII, Section 2 of the 1987 Constitution: Section 2. No person may be lected President unless he is a natural-born citizen of the Philippines, a registered voter, able to read and write, A DEGREE HOLDER FROM AN ACCREDITED INSTITUTION, at least forty years of age on the day of the election, and a resident of the Philippines for at least ten years immediately preceding such election. AT THE TIME OF THE FILING OF THE CERTIFICATE OF CANDIDACY, THE CANDIDATE FOR THE POSITION OF PRESIDENT MUST BE OF GOOD MORAL CHARACTER, MUST NOT HAVE BEEN CONVINCED OF ANY CRIME INVOLVING MORAL TURPITUDE, AND MUST HAVE OCCUPIED THE POSITION OF RESPONSIBILITY AND LEADERSHIP IN ANY GOVERNMENT POSITION OR RECCOGNIZED PRIVATE ORGANIZATION.\""
