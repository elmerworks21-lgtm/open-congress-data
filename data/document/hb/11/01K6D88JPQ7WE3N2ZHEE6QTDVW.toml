congress_website_title = "AN ACT ESTABLISHING THE ARTISTS CAREER SERVICE, RECOGNIZING THE SPECIAL QUALIFICATIONS OF ARTISTS IN GOVERNMENT, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "The bill seeks to structure the career path of artists in government by creating and establishing an Artists Career Service which shall administer their recruitment, appointment, promotion, and other aspects of personnel movement. It also aims to provide the best artists of the land with career progression by conferring on them a legislated eligibility to affirm the government's recognition of their talents and accomplishments ."
