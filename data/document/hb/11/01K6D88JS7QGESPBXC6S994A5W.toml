congress_website_title = "AN ACT RECOGNIZING THE POTENTIALS OF THE FILIPINO YOUTH TOWARD NATION-BUILDING , PRESCRIBING THE FREE EXERCISE OF CERTAIN RIGHTS AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Magna Carta for Youth\". The State recognizes the vital role of the Filipino youth in nation-building . Through this bill, the youth shall be encouraged to be actively involved in public and civic affairs, in the promotion and protection of their whole well-being and in the enhancement of a harmonious and orderly society."
