congress_website_title = "AN ACT REPEALING THE PROVISION ON RELOCATION AND FINANCIAL ASSISTANCE IN THE EVICTION OF SQUATTER AND DEMOLITION OF THEIR DWELLINGS AND TO PENALIZE SQUATTING WITHOUT DISTINCTION, AMENDING FOR THE PURPOSE THE `URBAN DEVELOPMENT AND HOUSING ACT OF 1992'"
congress_website_abstract = "Rationale: By its policy, the government encourages, rather than discourage, squatting. By merely squatting on somebody else's property, the squatters become the virtual owner of the lot without process. He cannot be ejected without due process, he is given a choice of relocation sites and paid for leaving the property he does not own. This policy must change."

