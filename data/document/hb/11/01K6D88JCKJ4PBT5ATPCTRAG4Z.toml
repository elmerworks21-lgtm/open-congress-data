congress_website_title = "AN ACT REQUIRING MOVIE, TELEVISION AND RADIO PRODUCERS, INCLUDING PROMOTIONS AND ADVERTISING AGENCIES, AND OTHER SIMILAR ENTITIES THAT EMPLOY UNEMANCIPATED MINORS, TO DEPOSIT THEIR TALENT FEES OR INCOME IN A TRUST FUND, PROVIDING PENALTIES FOR VIOLATIONS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "Movie, TV, radio producers, advertising agencies and talent promoters who hire the services of an unemancipated minor below 18 years of age are required to DEPOSIT in the NAME of the said MINOR at least FIFTY PERCENT (50%) of the minor's income/talent fee at a duly licensed bank in the form of a TRUST FUND."

