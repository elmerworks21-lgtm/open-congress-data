congress_website_title = "AN ACT GRANTING PREFERENTIAL PROTECTION TO INVENTORS APPLYING FOR PATENTS ON INVENTIONS WHICH AFFECT NATIONAL INTEREST, ESTABLISHING A FUND THEREFOR, AND PRESCRIBING PENALTIES FOR VIOLATION OF THE CONFIDENTIALITY OF SUCH APPLICATIONS DURING THE PERIOD OF APPLICATION, AMENDING FOR THE PURPOSE THE INTELLECTUAL PROPERTY CODE"
congress_website_abstract = "The Philippines is blessed with creative minds. Although largely unrecognized , it is nevertheless true that many Filipinos have created inventions which could have brought not only honors to our country but socio-economic benefits as well. Unfortunately, two serious problems face our inventors, the first is lack of support, financial or otherwise, from the government, and second is intense and often-malicious objection and opposition from sectors which stand to lose were such inventions everto see the light of day."
