congress_website_title = "AN ACT REDEFINING THE TERM \"VETERAN\" THEREBY AMENDING FURTHER REPUBLIC ACT NO. 6948, AS AMENDED"
congress_website_abstract = "This bill defines the term \"VETERAN\" as follows: Any person who rendered military service in the land, sea or air forces of the Philippines during the revolution against Spain, the Philippine-amer ican War, World War II, including Filipino citizenswho served in Allied Forces in the Philippine territory and foreign nationals who served in Philippine forces, the Korean Campaign, the Vietnam Campaign, or other wars and military campaigns; [or who rendered military service in] OF the Armed Forcesof the Philippines OR ITS CONTINGENTS IN PHILIPPINE OR FOREIGN TERRITORY and has been honorably discharged [ or separated after at least six (6) years total cumulative active service, or sooner separated due to death or disability arising from a woulld or injury received or sickness or disease incurred in line of duty while in the active service]."
