congress_website_title = "AN ACT PENALIZING LABOR-ONLY CONTRACTING AND RATIONALIZING THE SCOPE OF JOB-CONTRACTING , AMENDING FOR THE PURPOSE, ARTICLES 106, 280 AND 281 OF PRESIDENTIAL DECREE NO. 442, OTHERWISE KNOWN AS THE LABOR CODE OF THE PHILIPPINES, AS AMENDED AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Attaining the status of regular employee has been artificially made very difficult for a majority of the workforce. The right to SECURITY OF TENURE remains illusory to most of our workers. This bill, therefore, seeks to concretize the right of workers to security of tenure."

