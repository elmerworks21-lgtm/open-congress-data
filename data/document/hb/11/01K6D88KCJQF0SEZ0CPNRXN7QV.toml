congress_website_title = "AN ACT CONVERTING THE MUNICIPALITY OF TUBOD, PROVINCE OF LANAO DEL NORTE INTO A COMPONENT CITY TO BE KNOWN AS THE CITY OF TUBOD"
congress_website_abstract = "The Department of Justice (DOJ) through the Office of the Chief State Prosecutor shall have the authority to bring together the parties before them and settle their cases provided that the subject criminal offenses are minor in character as hereinafter defined. Minor criminal offenses shall mean those offenses punishable by imprisonment not exceeding one (1) year and/or a fine not exceeding fifty thousand pesos (P50,000.00)."

