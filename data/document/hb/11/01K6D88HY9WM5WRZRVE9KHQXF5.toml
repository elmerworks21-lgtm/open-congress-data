congress_website_title = "AN ACT AUTHORIZING THE PRESIDENT OF THE PHILIPPINES, WITH THE HELP OF A COMMISSION ON REORGANIZATION, TO REORGANIZE THE DIFFERENT DEPARTMENTS, BUREAUS, OFFICES, AGENCIES, AND OTHER INSTRUMENTALITI ES OF THE EXECUTIVE BRANCH OF THE GOVERNMENT, INCLUDING GOVERNMENT-OWNE D OR -CONTROLLED CORPORATIONS AND FINANCIAL INSTITUTIONS, STATE COLLEGES AND UNIVERSITIES, AND FOR OTHER PURPOSES (re-engineering )"
congress_website_abstract = "\"Government Reorganization Act of 1998\". Decalres it a policy of the State to develop and maintain a government bureaucracy whose scope, level and focus of functions, programs and activities support the national development goals and efforts; and whose size, organizational structure and operating systems promote economy, efficiency, innovation and productivity. Prescribes the scope, principles and standards or reorganization; provides safety nets for those who may be separated as a result of this reorganization. Creates the COMMISSION OF REORGANIZATION primary responsible for the drafting of an Integrated Reorganization Plan."
