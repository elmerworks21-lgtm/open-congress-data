congress_website_title = "AN ACT TO PROVIDE PROTECTION TO NEW PLA NT VARIETIES, ESTABLISHING A NATIONAL PLANT VARIETIES PROTECTION BOARD AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Philippine Plant Variety Protection Act of 1998\". Declares that the State shall have the sovereign rights over all the biological and genetic resources including the genetic information embodied in varieties and be responsible for the conservationof biological diversity, the sustainable use of its components and the fair and equitable sharing of the benefits arising from the use of genetic resources."
