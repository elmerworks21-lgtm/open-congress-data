congress_website_title = "AN ACT ESTABLISHING THE COASTAL ENVIRONMENT PROGRAM, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Coastal Environment Program Act of 1998\". Defines \"coastal environs\" as land and sea-based natural resources, one linear kilometer from the highest tide point landward and 100 fathom isobath or 15 kilometers seaward where rehabilitation of mangroves, seagrass and coral reefs is needed, including the propagation of endangered species and the regulation of industries involved in its pollution under the supervision of the Department of Environment and Natural Resources."
