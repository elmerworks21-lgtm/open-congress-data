congress_website_title = "AN ACT AMENDING SECTIONS 17(B), 102(B) AND 105 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AND APPROPRIATING FUNDS FOR THAT PURPOSE"
congress_website_abstract = "The author explains that the sacrifice of the delivery of health services in the name od devolution is one negative effect under the Local Government Code. The quantity and quality of the services of our municipal, city and provincial health offices have deteriorated. This bill proposes that delivery of health services should be the responsiblity of national government authorities."

