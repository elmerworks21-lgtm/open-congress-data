congress_website_title = "AN ACT AMENDING TITLE II, ENTITLED `COASTWISE TRADE OF THE TARIFF & CUSTOMS CODE OF THE PHILIPPINES AND FOR OTHER PURPOSES' (\"PHILIPPINE EXPORT AND IMPORT FREIGHT SHIPPING ASSISTANCE ACT OF 2000\"/CABOTAGE)"
congress_website_abstract = "\"Philippine Export and Import Freight Shipping Assistance Act of 2000.\" This bill provides a stronger and clearer basis for foreign vessels to provide the transhipment services needed by our local exports and importers. Thus, a foreign vessel whichtransports foreign goods from a local port of transshipment to a local port of destination shall NOT be construed as engaging in coastwise trade."
