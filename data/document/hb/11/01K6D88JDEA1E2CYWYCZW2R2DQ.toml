congress_website_title = "AN ACT PROVIDING FOR THE EMPOWERMENT OF LOCAL GOVERNMENT UNITS FOR THE MAINTENANCE OF PEACE AND ORDER IN THEIR RESPECTIVE TERRITORIES WHILE SUSTAINING THE PROFESSIONALIZA TION OF THE PHILIPPINE NATIONAL POLICE AND FOR OTHER PURPOSES, AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NO. 6975, ENTITLED \"AN ACT ESTABLISHING THE PHILIPPINE NATIONAL POLICE UNDER A REORGANIZED DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT,\" AS AMENDED BY REPUBLIC ACT NO. 8551, ENTITLED \"AN ACT PROVIDING FOR THE REFORM AND REORGANIZATION OF THE PHILIPPINE NATIONAL POLICE AND FOR OTHER PURPOSES"
congress_website_abstract = "RESTRUCTURES the PNP into two (2) major branches --- (1) the national branch and the (2) local branch. This bill, therefore, provides for the (1) decentralizatio n of some administrative and operational aspects of the NAPOLCOM and the PNP; (2) retention of the national scope of the PNP, while strengthening its civilian character and professionalizi ng the police force."
