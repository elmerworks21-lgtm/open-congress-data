congress_website_title = "AN ACT PROHIBITING THE DETENTION OF LIVING AND DECEASED PATIENTS IN HOSPITALS AND OTHER MEDICAL INSTITUTIONS FOR NONPAYMENT OF HOSPITAL BILLS OR OTHER MEDICAL EXPENSES, PROVIDING PENALTIES THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares it unlawful for hospitals or any medical institution to DETAIN or cause, directly or indurectly, the detention of living patients who have fully recovered or those who have died while in confinement for NONPAYMENT, in part or in full, of hospital bills."
