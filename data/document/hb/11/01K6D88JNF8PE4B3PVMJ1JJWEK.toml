congress_website_title = "AN ACT DECLARING FISHING WITH THE USE OF EXPLOSIVES AND/OR OBNOXIOUS OR POISONOUS SUBSTANCE AS HEINOUS CRIME AND IMPOSING THE PENALTY OF DEATH THEREFOR"
congress_website_abstract = "Rationale: The use of explosives and poisonous substances hasten the destruction not only of marine and aquatic life, but also of corals and other fish habitats. The present penalties and fine are not adequate deterrents to the use of these substances. Harsher penalties are in order."

