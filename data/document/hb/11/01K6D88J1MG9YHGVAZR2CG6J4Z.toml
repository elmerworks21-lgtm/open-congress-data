congress_website_title = "AN ACT ABOLISHING THE THREE HUNDRED AND ONE (301) DAYS CRIMINAL PROHIBITION TO REMARRY AND ALLOWING THE REMARRIAGE OF A WIDOW OR A SEPARATED WOMAN FORTY DAYS AFTER THE DEATH OF HER HUSBAND OR THE ANNULMENT OR DISSOLUTION OF HER PREVIOUS MARRIAGE, AMENDING FOR THE PURPOSE ARTICLE 351 OF ACT NO. 3815, AS AMENDED, OTHERWISE KNOWN AS THE \"REVISED PENAL CODE\""
congress_website_abstract = "Seeks to REMOVE the vestige of discrimination against women from the Revised Penal Code (Article 351) by REPEALING the 301 days penal prohibition to remarry and REDUCE the same to FORTY (40) DAYS."

