congress_website_title = "AN ACT ALLOWING LOCAL SANGGUNIANS IN CITIES, MUNICIPALITIES AND PROVINCES TO PROVIDE FOR THE ELECTION OF SECTORAL REPRESENTATIVES PENDING A CONGRESSIONAL ENABLING ACT, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Pending the passage of a congressional enabling act providing for the manner and date of eleciton of sectoral representatives to the local sanggunians, all existing local sanggunians in cities, municipalities and provinces may provide by ORDINANCE for the election of the three sectoral representatives to sit therein, guided by the relevant provisions of this Code and by special implementing rules and regulations to be issued for this purpose."

