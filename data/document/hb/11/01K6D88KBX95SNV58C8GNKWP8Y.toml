congress_website_title = "AN ACT REPEALING SECTIONS 29 AND 30 OF REPUBLIC ACT NO. 8042 ENTITLED `AN ACT TO INSTITUTE THE POLICIES OF OVERSEAS EMPLOYMENT AND ESTABLISH A HIGHER STANDARD OF PROTECTION AND PROMOTION OF THE WELFARE OF MIGRANT WORKERS, THEIR FAMILIES AND OVERSEASFILIPINOS IN DISTRESS AND FOR OTHER PURPOSES', ALSO KNOWN AS THE `MIGRANT WORKERS ACT OF 1995'"
congress_website_abstract = "This bill refers to the (1) Comprehensive Deregulation Plan on Recruitment Activities, and (2) Gradual Phase-out of POEA Functions. Rationale: Deregulation is not the answer and solution to the problem of corruption and bureaucratic red tape; illegal recruitment still continues, as well as incidents of on-site violation of the rights of overseas Filipino workers."

