congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1638, ENTITLED `ESTABLISHING A NEW SYSTEM OF RETIREMENT AND SEPARATION FOR MILITARY PERSONNEL OF THE ARMED FORCES OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Provides for the compulsory retirement for the military personnel who attained sixty (60) years of age or upon accumulation of thirty-five (35) years of satisfactory active service. Provides, further that the compulsory retirement of an officer serving in a statutory position shall be deferred until completion of the tour of duty prescribed gy las and that the active service of military personnel may be extended by the President of the Republic."
