congress_website_title = "AN ACT PENALIZING THE EMPLOYMENT OF CHILDREN IN ANY PUBLIC OR PRIVATE UNDERTAKING OR OCCUPATION WHICH IS CONSIDERED HAZARDOUS TO HIS/HER LIFE, SAFETY, HEALTH AND MORALS, OR WHICH UNDULY INTERFERES WITH HIS/HER NORMAL DEVELOPMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines the term \"child\" for the purpose of this measure as any person below eighteen (18) years of age, or those over such age, but unable to fully take care of themselves and protect themselves from abuse, neglect, cruelty, exploitation or discrimination becuase of a physical or mental disability or condition. Identifies the various occupations considered hazardous to children."
