congress_website_title = "AN ACT REQUIRING THE MANDATORY LABELING OF FOOD AND FOOD PRODUCTS CONTAINING GENETICALLY-MOD IFIED ORGANISMS AND FOOD PRODUCED BY GENETIC ENGINEERING TECHNOLOGIES, AMENDING FOR THAT PURPOSE REPUBLIC ACT NUMBERED THREE THOUSAND SEVEN HUNDRED AND TWENTY, OTHERWISE KNOWN AS THE FOOD, DRUGS AND DRUG DEVICES AND COSMETICS ACT AND REPUBLIC ACT NUMBERED SEVEN THOUSAND THREE HUNDRED AND NINETY-FOUR, OTHERWISE KNOWN AS THE CONSUMERS' ACT OF THE PHILIPPINES, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Genetically Engineered Food Right to Known Act.\" All food and food products domestically sold, whether manufactured locally or imported, and which contain genetically modified organisms, including those produced by genetic engineering technologies,shall be properly identified in their respective labels of packaging with the following: (1) A notice as follows: \"GENETICALLY ENGINEERED\"; (2) A notice as follows: \"GOVERNMENT NOTICE: THIS PRODUCT CONTAINS A GENETICALLY ENGINEERED MATERIAL, OR WASPRODUCED WITH A GENETICALLY ENGINEERED MATERIAL\"."

