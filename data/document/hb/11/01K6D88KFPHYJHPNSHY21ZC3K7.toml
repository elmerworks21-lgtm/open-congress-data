congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF TECHNICAL AND INFORMATION TECHNOLOGY SCHOOLS IN ALL THE REGIONS OF THE PHILIPPINES, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "There shall be established in all the regions of the Philippines technical and information technology schools under the supervision of the Department of Science and Technology in coordination with the Deaprtment of Education, Culture and Sports, which shall offer free courses to high school graduates. Graduates of public secondary schools in the respective region shall be given priority admission."

