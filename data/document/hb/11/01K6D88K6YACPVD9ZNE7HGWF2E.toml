congress_website_title = "AN ACT GRANTING A MONTHLY PENSION OF ONE THOUSAND PESOS TO SENIOR CITIZENS, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SEVENTY-FOUR HUNDRED AND THIRTY-TWO, ENTITLED `AN ACT TO MAXIMIZE CONTRIBUTION OF SENIOR CITIZENS TO NATION BUILDING, GRANT BENEFITS AND SPECIAL PRIVILEGES AND FOR OTHER PURPOSES'"
congress_website_abstract = "Rationale: After having served the country in the most productive years of their lives, it is unfortunate that senior citizens who have retired from private or public service and are neither gainfully employed not have any other source of income other than their retirement benefits, are suffering. Factors such as the sharp devaluation of the peso, the rise in the prices of fuel, transportation, basic goods, medicines, services, etc., aggravate the situation, and finding ways to supplement their income is hardly possible for the senior citizens who are old and weak to find a new job."
