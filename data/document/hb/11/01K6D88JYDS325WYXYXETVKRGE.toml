congress_website_title = "AN ACT PROHIBITING THE ENTRY OF FOREIGN TOBACCO, CIGAR AND CIGARETTE MANUFACTURERS, DISTRIBUTORS, DEALERS AND/OR EXPORTERS INTO THE PHILIPPINES AND PHASING OUT OF THE EXISTING DOMESTIC TOBACCO INDUSTRY WITHIN A PERIOD OF TEN (10) YEARS, PROVIDING PENALTIES FOR VIOLATIONS HEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Tobacco Abolition Law of 1999\". The local toabacco industry shall be phased out within a period of ten (10) years from effectivity of this Act after which any activity involving the plantation and/or cultivation of tobacco and the production, manufacture, distribution and/or sale of any and all tobacco products shall be prohibited within the Philippine territory. During this period, the National Toabacco Adminsitration (NTA), in coordination with other government agencies formulate and establish programs and projects that will assist the persons engaged in and involved with the tobacco industry to have other livelihood opportunities and sources of income."
