congress_website_abstract = "To the extent allowed by law, international ait transportation industry shall be liberalized and deregulated: (1) Sets the minimum number of operators in each international route/link; (2) provides for entry into and exit from the industry; (3) provides, likewise, for liberalization of tariffs and taxes."

