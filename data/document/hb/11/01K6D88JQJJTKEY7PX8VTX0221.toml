congress_website_title = "AN ACT INCREASING THE MONTHLY GRATUITY AND GRANTING ADDITIONAL PRIVILEGES TO AN AWARDEE OF THE MEDAL OF VALOR, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 1687, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill proposes to INCREASE the present monthly gratuity of Medal of Valor awardees from [P200.00] to TEN THOUSAND PESOS (P10,000.00). In addition, it seeks to grant various discount privileges, free medical and dental services and consultation in government or private hospitals."
