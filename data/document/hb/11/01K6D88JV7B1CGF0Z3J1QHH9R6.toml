congress_website_title = "AN ACT REGULATING THE USE OF FUEL WOOD IN THE FLUE-CURING OF VIRGINIA TOBACCO AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "Rationale: Admittedly, the Virginia tobacco industry has its share in the unabated denudation of our forests and destruction of our trees. This is because said industry depends on trees and forest resources for the fuel inputs of flue-curing barns for Virginia tobacco leaves. >On the other hand, the Virginia tobacco industry is so vital to be cursed and phased out as millions of people depend on it for livelihood and constitute a major source of government revenues. > This bill therefore seeksto offer a compromise solution to the problem."
