congress_website_title = "AN ACT CREATING THE PHILIPPINE OIL CORPORATION, DEFINING ITS POWERS AND FUNCTIONS, PROVIDING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Charter of the Philippine Oil Corporation\". This bill seeks to create a government-owne d and controlled oil corporation which shall be primarily responsible to monitor and control the adequate and continuous supply of the country's oil and petroleum requirements. This will lower the prices of oil products and eventually halt the series of oil price hikes which is detrimental to the welfare of the Filipino people."

