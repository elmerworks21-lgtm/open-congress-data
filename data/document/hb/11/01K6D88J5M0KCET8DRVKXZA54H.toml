congress_website_title = "AN ACT CREATING THE \"PHILIPPINE CATASTROPHE INSURANCE AND REINSURANCE CORPORATION,\" PRESCRIBING ITS POWERS AND RESPONSIBILITIE S, PROVIDING FOR ITS CAPITALIZATION AND THE REQUIRED GOVERNMENT PREMIUM SUBSIDY, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Charter of the Philippine Catastrophe Insurance and Reinsurance Corporation\". The proposed Corporation shall provide protection to participating persons, whether natural or juridical, against loss of lives and properties due to natural disasters. Provides for the creation of a STATE CATASTROPHE INSURANCE TRSUT FUND in the amount of P500 Million for this purpose."

