congress_website_title = "AN ACT AMENDING CERTAIN PROVISIONS OF EXECUTIVE ORDER NO. 18, CREATING THE SUGAR REGULATORY ADMINISTRATION AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The unabated importation of cheap, dumped and subsidized sugar into the country two years ago has exacted great financial strain to the sugar industry. Continuation of this situation will inevitably wipe out the sugar industry. > This bill empowers the Sugar Regulatory Administration (SRA) to declare as RESERVE any EXCESS importation of sugar."
