congress_website_title = "AN ACT AMENDING SECTIONS 66 AND 67, BATAS PAMBANSA BILANG 881, AS AMENDED, OTHERWISE KNOWN AS THE `OMNIBUS ELECTION CODE,' BY CORRECTING THE INJUSTICE SUFFERED BY CERTAIN PUBLIC OFFICIALS DUE TO THEIR COMMON MANDATE OF CONSIDERING THEM IPSO FACTO RESIGNED FROM THEIR PRESENT OFFICE UPON THE FILING OF THEIR CERTIFICATES OF CANDIDACY FOR ANOTHER ELECTIVE OFFICE"
congress_website_abstract = "This bill provides that any person holding a public apointive office or position shall be considered ipso facto ON FORCED LEAVE OF ABSENCE FROM OFFICE upon the filing of his certificate of candidacy. If such candidate loses in the election, he shall be considered ipso facto resigned from his office."
