congress_website_title = "AN ACT REQUIRING MANDATORY LABELLING OF GENETICALLY ENGINEERED FOOD PRODUCTS AND PROVIDING PENALTIES FOR VIOLATION THEREOF"
congress_website_abstract = "GENETIC ENGINEERING has been advertised and promoted as a way of providing consumers with a greater choice of food, as well as a possible way to solve global p[roblems of food shortages. However, there are dangers and concerns that must be taken into consideration. To ensure public safety in the consumption of genetically engineered food products and to protect the health of the people, this bill becomes imperative."
