congress_website_title = "AN ACT RESTORING THE TAX EXEMPTION PRIVILEGES OF LOCAL WATER DISTRICTS UNDER SECTION 46 OF PRESIDENTIAL DECREE NO. 198, AS AMENDED AND FOR OTHER PURPOSES"
congress_website_abstract = "Section 46 of P.D. 198, as amended, granting tax exemption privileges to local waster districts is hereby restored and shall be effective for a period of ten (10) years from approval of this Act. Water districts shall likewise be exmepted from the provision of R.A. 7656 requiring government-owne d and-controlled corporations (GOCCs) to remit 50% of their annual net oincome to the National Government, Provided, that the amount supposed to be remitted, is utilized by the water district concerned, for the continuing expansion and improvement of its system."

