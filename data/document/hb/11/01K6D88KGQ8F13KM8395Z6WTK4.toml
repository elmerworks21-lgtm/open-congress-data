congress_website_title = "AN ACT IMPOSING TAXES ON IDLE AGRICULTURAL, RESIDENTlAL AND INDUSTRIAL LANDS, PROVIDING PENALTIES FOR VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill aims to curb the unjust and unproductive practice of monied individuals, partnerships and corporations of acquiring agricultural, residential and industrial lands for the sole purpose of speculating for profit motives on the future increase in the market value of such lands. > Said practice has resulted in the situation wherein vast tracts of land remain unutilized in the hands of a select few. Being a limited natural resource, these lands must be devoted to useful ends and with the broader objective of equitably distributing land to those who need it most."

