congress_website_title = "AN ACT AUTHORIZING THE APPROPRIATION OF THE AMOUNT OF THREE BILLION EIGHT HUNDRED FIFTY MILLION PESOS (P3,850,000,000 .00) TO SUPPORT THE ADJUSTMENTS OF THE PENSION RATES OF WIDOWS, RETIRED OFFICERS AND MEMBERS OF THE ARMED FORCES OF THE PHILIPPINES(AFP) EFFECTIVE DECEMBER 1, 1987 BASED ON THE NEW RATES OF PAY FOR MILITARY PERSONNEL, AS PROVIDED FOR IN PRESIDENTIAL DECREES NUMBERED 1638 AND 1909 AND REPUBLIC ACT NO. 6638"
congress_website_abstract = "\"AFP Supplementary Act of 2000\". Rationale: The budgetary allocation for the Armed Forces of the Philippines (AFP) as stipulated in the General Appropriations Act (GAA) for the Fiscal Years 1987 to 1992 fails to include as part of expenditure the adjustment of pension rates of retired AFP military personnel. Republic Act 6638 mandates that the pension rates of retired AFP military personnel should be based on the prevailing rates of compensation for military personnel who are in active service.Given the aforementioned, widespread demoralization and frstration haunts AFP retirees and their beneficiaries. Deprivation of what is due after risking life and limb, and after sacrificing time, sweat and blood, clearly degrades not only integritybut also life's meaning itself."
