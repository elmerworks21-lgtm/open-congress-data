congress_website_title = "AN ACT GRANTING THE DEPARTMENT OF JUSTICE THE AUTHORITY TO SETTLE MINOR CRIMINAL OFFENSES"
congress_website_abstract = "the Deaprtment of Justice (DOJ) through the Office of the Chief State Prosecutor shall have the authority to bring together the parties before them and settle their cases, provided that the subject criminal offenses are minor in character as hereinafter defined. \"Minor criminal offenses\" shall mean those offenses punishable by imprisonment not exceeding one (1) year and or a fine not exceeding five thousand pesos (P5,000)."
