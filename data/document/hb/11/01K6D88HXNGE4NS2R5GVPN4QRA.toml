congress_website_title = "AN ACT EXEMPTING THE PERSONNEL OF GOVERNMENT-OWNE D OR -CONTROLLED CORPORATIONS (GOCCs) AND GOVERNMENT FINANCIAL INSTITUTIONS (GFIs) FROM THE COVERAGE OF REPUBLIC ACT NO. SIXTY-SEVEN FIFTY-EIGHT, OTHERWISE KNOWN AS THE `COMPENSATION AND POSITION CLASSIFICATION ACT OF 1987'"
congress_website_abstract = "RA 6758 standardized the salaries and benefits of GOCC/GFI employees, REGARDLESS of employment status, and WITHOUT distinction whether these employees are self-sustaining or performing proprietary functions. This bill seeks to EXEMPT such employeesfrom coverage of RA 6758, and allowing them instead to establish and maintain a position classification and compensation system of their own."

