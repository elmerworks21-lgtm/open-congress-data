congress_website_title = "AN ACT AMENDING ARTICLES 135 AND 137 OF THE LABOR CODE (PRESIDENTIAL DECREE NO. 442, AS AMENDED) SO AS TO EXPAND THE PROHIBITED ACTS OF DISCRIMINATION AGAINST WOMEN ON ACCOUNT OF SEX, AGE, ETHNIC ORIGIN, OR BELIEFS"
congress_website_abstract = "Considers as ACTS OF DISCRIMINATION AGAINST WOMEN the following: (1) favoring a male applicant (1) when the job can equally be handled by a woman; and (2) in cases of dismissal or other retrenchment polices."
