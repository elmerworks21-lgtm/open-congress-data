congress_website_title = "AN ACT LIBERALIZING BUSINESS IN THE RETAIL TRADE SECTOR OF THE PHILIPPINES, THEREBY REPEALING REPUBLIC ACT NO. 1180 AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Retail Trade Act of 1999\". Ensures a reasonable measure of protection for small retail businesses by providing that retail business with paid-up capital of less than P5 Million Pesos shall be one hundred (100%) Filipino-owned and allowing only up to forty-nine (49%) percent foreign equity participation in enterprises with apaid-up capital of at least P5 Million but not more than P10 Million."
