congress_website_title = "AN ACT PRESCRIBING INSTITUTIONAL RESPONSIBILITY ON MEMBERS OF LAW ENFORCEMENT AGENCIES AND OTHER GOVERNMENT OFFICIALS AND EMPLOYEES IN GIVING TESTIMONY IN DANGEROUS DRUGS CASES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6425, AS AMENDED, OTHERWISE KNOWN AS THE DRUGS ACT OF 1972, PROVIDING PENALTIES FOR VIOLATIONS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill imposes stiff penalties on law enforcers and government employees who, either by intent or negligence, fail to testify in cort as prosecution witnesses in cases filed against drug offenders. It also penalizes the immediate superiors of said personnel, for not exerting reasonable effort to present the latter to the appropriate court."
