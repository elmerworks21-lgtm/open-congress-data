congress_website_title = "AN ACT APPROPRIATING THE SUM OF TEN BILLION NINE HUNDRED MILLION PESOS (P10,900,000,00 0.00) AS SUPPLEMENTAL APPROPRIATION FOR FY 2001 AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: In view of the delay in the approval of the FY 2001 General Appropriations Bill, it is necessary to enact legislation to meet urgent budgetary requirements which cannot be postponed without causing detriment to government operations. Onesuch requirement is the passage of a supplemental budget for the national government which will be needed foremost to provide authority for expenditures that are not in the reenacted budget but are either mandatory by virtue of law or necessary for the welfare of our public servants. It will also augment priority expenditures that cannot be sufficiently covered by the reenacted budget."
