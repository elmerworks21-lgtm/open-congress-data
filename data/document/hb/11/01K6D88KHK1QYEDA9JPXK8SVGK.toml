congress_website_title = "AN ACT PRESCRIBING THE MANNER OF ELECTION OF THE MEMBERS OF THE BOARD OF DIRECTORS OF THE PHILIPPINE VETERANS BANK AND AMENDING CERTAIN PROVISIONS OF REPUBLIC ACT NUMBERED THIRTY-FIVE HUNDRED AND EIGHTEEN AND REPUBLIC ACT NUMBERED SEVENTY-ONE HUNDRED AND SIXTY-NINE"
congress_website_abstract = "The issue concerns the ELECTION of the members of the board of Directors of the Bank. The veterans and their kins call for a wider REPRESENTATION of the veterans, themselves, in the board. They urge that their voices should be genuinely heard in theannual stockholders meeting. They are critical of the system of disseminating the notice of the stockholders meeting that, in effect, does not enable all stockholders to be present and vote during the meeting. A remedy has to be prescribed with regard to the impossibility of notifying and gathering in one single place the 510,000 stockholders for the purpose of electing the Board members, the tremendous expenses involved, aside from the problems it will create before, during and after the meetting and elections."

