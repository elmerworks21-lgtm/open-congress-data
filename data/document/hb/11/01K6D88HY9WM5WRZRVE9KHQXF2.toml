congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF ABSENTEE VOTING BY QUALIFIED FILIPINOS ABROAD"
congress_website_abstract = "\"Absentee Voting Law of 1998\". Defines \"absentte voting\" as the process by which a registered voter who is not in his place of registration on election day, either because of election duty or by residence or employment abroad, may vote in national elections."
