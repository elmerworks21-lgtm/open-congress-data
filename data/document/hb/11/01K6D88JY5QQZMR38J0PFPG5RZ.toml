congress_website_title = "AN ACT PROHIBITING AND PENALIZING THE SALE AND SERVING BY ANY ESTABLISHMENT FOR PROFIT OF ANY SUGAR SUBSITITUTE USING SACCHARINE AS ONE OF ITS INGREDIENTS"
congress_website_abstract = "The bill is imperative in the light of medical findings that saccharine is a carcinogenic substance which can cause cancer, and therefore, a health hazard to an individual. The markets, hotels, restaurants and coffe shops are openly selling and utilizing sugar substitutes such as \"Sweet 'N Low\", among others, with saccharine as an ingredient thereby endangering the lives of those who are using this kind of sugar substitute."
