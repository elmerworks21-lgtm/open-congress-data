congress_website_title = "AN ACT PROVIDING FOR THE MODERNIZATION OF THE SCHOOL HEALTH AND NUTRITION PROGRAM (SHNP) OF THE DEPARTMENT OF EDUCATION, CULTURE AND SPORTS, AUTHORIZING THE APPROPRIATION OF FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"School Health and Nutrition Modernization Act.\" This bill seeks to pursue the State's school health and nutrition modernization program through: (a) the development of an efficient and effective health care dilivery system in the schools; (b) thedevelopment, evaluation and application of appopriate methods and procedures in preventive health care; (c) the development of reforms in the management of human and material resources; and (d) the acquisition and upgrading of apporpriate equipment and technology."

