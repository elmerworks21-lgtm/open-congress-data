congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 8042 ENTITLED `AN ACT TO INSTITUTE THE POLICIES OF OVERSEAS EMPLOYMENT AND ESTABLISH A HIGHER STANDARD OF PROTECTION AND PROMOTION OF THE WELFARE OF MIGRANT WORKERS, THEIR FAMILIES AND OVERSEAS FILIPINOS IN DISTRESS,AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Omnibus Amendments to RA 8142, the Migrant Worker and Overseas Filipinos Act of 1995\". Rationale: The implementation of RA 8042 for the past five years saw the urgent need for the government to review and assess the long-term implications of certain provisions of the law. In fact, the law is now the subject of several amendatory bills pending in this August Chamber. Moreover, the series of consultations with the various sectors concerned has revealed other needed amendments that are not covered by these bills. This bill seeks to consolidate the concerns of such pending bills."

