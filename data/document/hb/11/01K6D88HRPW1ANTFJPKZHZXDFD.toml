congress_website_title = "AN ACT ESTABLISHING A CRITICAL NATIONAL RICE RESERVE FOR FOOD SECURITY, PROVIDING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Critical National Rice Reserve Act of 1998\". Ensures an adequate supply of rice at reasonable and affordable prices for the people at all times especially in times, of calamities. Defines \"critical national rice reserve\" as the inventory of rice and/or palay by the National Food Authority (NHA), equivalent to ninety (90) days average national daily rice consumption to be maintained as a matter of national policy."

