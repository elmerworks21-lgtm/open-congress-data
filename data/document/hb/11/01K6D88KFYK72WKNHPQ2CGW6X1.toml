congress_website_title = "AN ACT EXEMPTING THE COMMISSION ON ELECTIONS AND ITS PERSONNEL FROM THE COVERAGE OF REPUBLIC ACT NO. 6758 OTHERWISE KNOWN AS THE SALARY STANDARDIZATION LAW"
congress_website_abstract = "Rationale: with the extensive and delicate function it has to accomplish and the danger it has to face in performing such functions, the COMELEC must be accorded a different treatment in prescribing compensation and position classification system.We believe that the COMELEC itself is in better position in managing its own affairs as well as governming its internal affairs than any other department of the government."

