congress_website_title = "AN ACT ESTABLISHING A SENIOR CITIZEN LODGING HOUSE IN ALL CAPITAL TOWNS AND MAJOR CITIES IN THE COUNTRY AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Establishes a lodging house with adequate facilites and amenities designed to cater to the needs and welfare of senior citizens while they are traveling within the country and thus promote local tourism. Exempts such Houses from the payment of custom duties, taxes and tariff on the importation of equipment and supplies used by and donated thereto."

