congress_website_title = "AN ACT AUTHORIZING THE COMMISSION ON HUMAN RIGHTS TO DOCUMENT REPORTS OF PERSONAL INJURY, DETENTION, DEATH, TORTURE, SUFFERING, CAPTIVITY, IMPRISONMENT, RAPE, OTHER ATROCITIES AND HUMAN RIGHTS VIOLATIONS COMMITTED BY THE JAPANESE MILITARY FORCES AGAINST THE FILIPINOS DURING THE WORLD WAR II FROM DECEMBER 7, 1941 TO SEPTEMBER 1945"
congress_website_abstract = "Rationale: Under the War Claims Act of 1948, the reparations settlement granted to our government covered damages to real and personal property only. Claims for death, injuries, tortures, imprisonment, rape and other war claims committed by the Japanese against Filipinos were all neglected and forgotten up to this day. Thus, this bill."

