congress_website_title = "AN ACT EXEMPTING ALL COOPERATIVES FROM ALL TAXES, LEVIES, DUTIES, FEES AND OTHER CHARGES AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-NINE HUNDRED AND THIRTY-EIGHT, OTHERWISE KNOWN AS THE COOPERATIVE CODE OF THE PHILIPPINES"
congress_website_abstract = "Provides that in order for the cooperatives to avail of such tax and related exemption privileges, they shall be required to secure certificate from the Bureau of Internal Revenue or from the Department of Finance. Provides further that such tax andrelated exemption privileges may be withdrawn for cause and after due hearing by the Cooperative Development Authority."
