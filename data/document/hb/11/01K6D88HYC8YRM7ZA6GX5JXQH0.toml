congress_website_title = "AN ACT CREATING THE COOPERATIVE HUMAN RESOURCE DEVELOPMENT TRUST FUND UNDER THE COOPERATIVE DEVELOPMENT AUTHORITY"
congress_website_abstract = "Creates a COOPERATIVE HUMAN RESOURCE DEVELOPMENT TRUST FUND which shall be sourced from imposition of additional but minimal taxes on certain commodities and business establishments. The Fund shall be invested in all cooperative banks throughout thecountry and shall be utilized to fund the human resource development program of the cooperatives."
