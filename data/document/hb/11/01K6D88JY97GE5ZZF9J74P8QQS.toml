congress_website_title = "AN ACT CREATING THE DEPARTMENT OF YOUTH AND CHILD RATIONALIZING THE ORGANIZATION AND FUNCTIONS OF GOVERNMENT AGENCIES RELATED TO THE DEVELOPMENT AND PROTECTION OF THE YOUTH AND CHILD, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Youth and Child Act of 1999\". Rationale: In the Philippines, the youth comprises about 75% of the national population. Often, we hear sad stories of how some of them become preys to evil desires. We have also seen a number of youth of potential gone to waste because of lack of opportunities from them. Indeed, an otherwise promising future waylaid. > This particular legislation also seeks to correct this malady through instituting an integrated agenda for the youth and child and ensuring theprotection of thier rights. In the end, this only aims to produce and rear healthy, upright, intelligent, and productive citizens of the country."

