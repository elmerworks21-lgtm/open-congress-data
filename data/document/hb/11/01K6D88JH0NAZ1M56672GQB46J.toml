congress_website_title = "AN ACT AMENDING ARTICLE SIXTY-SIX OF THE CIVIL CODE OF THE PHILIPPINES IN ORDER TO PRESCRIBE ADDITIONAL REQUIREMENTS FOR MALE CITIZENS AND SUBJECTS OF A FOREIGN COUNTRY DESIRING TO MARRY A FILIPINO WOMAN"
congress_website_abstract = "The foreign subject or citizen wishing to marry a female citizen of the Philippine is required to submit a CERTIFICATE that he HAS A GAINFUL TRADE, BUSINESS or EMPLOYMENT, to be issued by his diplomatic or consular official, BEFORE A MARRIAGE LICENSE can be obtained."

