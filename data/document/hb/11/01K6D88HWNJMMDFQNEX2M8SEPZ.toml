congress_website_title = "AN ACT AUTHORIZING AN INCREASE IN THE COMPENSATION OF BARANGAY OFFICIALS"
congress_website_abstract = "Proposes to compensate barangay officials in the form of an honorarium as follows: (1) punong barangay - P1,000.00 to P10,863.00 per month; (2) sangguniang barangay members, secretary and treasurer - P6,000.00 to P8,605.00; (3) barangay tanod and members of the lupong tagapamayapa - P4,400.00."
