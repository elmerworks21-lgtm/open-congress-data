congress_website_title = "AN ACT AMENDING THE QUALIFICATIONS OF MEMBERS OF THE PROSECUTION STAFF UNDER THE CHIEF STATE PROSECUTOR AND ASSISTANT CHIEF STATE PROSECUTORS"
congress_website_abstract = "THE ACTUAL REQUIREMENT TO BE A MEMBER OF THE PROSECUTION STAFF OF THE CHIEF STATE PROSECUTOR AND THE ASSISTANT CHIEF STATE PROSECUTORS, ASIDE FROM BEING A LAWYER OF PROVEN INTEGRITY AND COMPETENCE, IS ONLY THREE (3) YEARS IN THE ACTUAL PRACTICE OF THE LEGAL PROFESSION PRIOR TO THEIR APPOINTMENT OR HAS HELD DURING LIKE PERIOD ANY POSITION REQUIRING THE QUALIFICATIONS OF A LAWYER."

