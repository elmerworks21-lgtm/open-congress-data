congress_website_title = "AN ACT STRENGTHENING THE SUGAR INDUSTRY BY PROHIBITING CERTAIN ACTS, PROVIDING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to provide remedies for certain practices which are detrimental to the welfare of sugar traders and farmers, but also to all consumers and the entire nation. These practices include: (1) issuance of sugarless quedans; (2) illegal coastwise domestic transportation of sugar and molasses; and (3) its smuggling into or out of the country."

