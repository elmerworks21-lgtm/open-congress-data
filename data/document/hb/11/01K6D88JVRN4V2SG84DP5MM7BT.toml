congress_website_title = "AN ACT AMENDING SECTION 23, PARAGRAPH (b.1), TITLE VII, SECTION 29 AND SECTION 30 OF REPUBLIC ACT NO. 8042, OTHERWISE KNOWN AS THE MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF 1995(RE: FIVE-YEAR COMPREHENSIVE DEREGULATION PLAN ON RECRUITMENT ACTIVITIES...)"
congress_website_abstract = "Under this bill, the Dept. of Labor and Employment (DOLE) is mandated to formulate a [three-year] FIVE-YEAR Comprehensive Deregulation Plan on recruitment activities taking into account labor market trends, economic conditions of the country and emerging circumstances which may affect the welfare of migrant workers. Within a period of [five (5)] THREE (3) years from effectivity of this Act, the DOLE shall [phase out] STREAMLINE POEA regulatory functions."
