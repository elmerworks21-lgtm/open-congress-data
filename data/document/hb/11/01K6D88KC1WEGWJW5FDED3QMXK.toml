congress_website_title = "AN ACT TO AMEND SECTION TWENTY OF REPUBLIC ACT NUMBERED SEVEN THOUSAND ONE HUNDRED AND SIXTY, OTHERWISE KNOWN AS THE `LOCAL GOVERNMENT CODE OF 1991,' AND FOR OTHER PURPOSES (RE: AGRICULTURAL LAND CONVERSION)"
congress_website_abstract = "This bill provides that ONLY AGRICULTURAL LANDS DISTRIBUTED PURSUANT TO THE R.A. 6657, WHICH HAVE BEEN FULLY PAID FOR AND ACTUALLY CULTIVATED BY THE AGRARIAN REFORM BENEFICIARIES THEMSELVES OR THEIR IMMEDIATE DEPENDENTS, SHALL NOT BE AFFECTED BY THESAID RECLASSIFICATIO N AND THE CONVERSION OF SUCH LANDS INTO OTHER PURPOSES SHALL BE GOVERNMENT BY SECTION 65 OF SAID ACT; (e) ANY PROVISIONS OF R.A. NO. 6657, WHICH ARE INCONSISTENT WITH THIS SECTION, SHALL BE CONSTRUED AS HAVING BEEN MODIFIED, AMENDED OR REPEALED HEREBY."
