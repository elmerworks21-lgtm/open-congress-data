congress_website_title = "AN ACT GRANTING ADDITIONAL INSURANCE BENEFITS TO BARANGAY CAPTAINS, PROVIDING FUNDS FOR THE PAYMENT OF ITS PREMIUMS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Additional Barangay Captains' Insurance Act of 2000.\" This bill seeks to provide additional insurance benefits to barangay captians, over and above the benefits given by the GSIS. The total annual premiums based on the acturial study of the GSIS shall be included in the General Appropriations Act."

