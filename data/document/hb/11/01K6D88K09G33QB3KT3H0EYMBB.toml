congress_website_title = "AN ACT AMENDING SECTION 67 OF BP NO. 881, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE OF THE PHILIPPINES(RE: EXEMPTS PRESIDENT AND VICE PRESIDENT IN THE DEFINITION OF ELECTIVE OFFICIALS)"
congress_website_abstract = "This bill proposes this amendment to the Omnibus Election Code: \"Any elective official, whether national or local, running for any office other than the one which he is holding in a permanent capacity, (EXCEPT FOR PRESIDENT AND VICE-PRESIDENT) , shall be considered ipso facto resigned from his office upon the filing of his certificate of candidacy.\""

