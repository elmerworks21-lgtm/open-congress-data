congress_website_title = "AN ACT REQUIRING LOCAL GOVERNMENT UNITS (LGUs) OF MUNICIPALITIES, CITIES, PROVINCES TO EARMARK A PART OF THEIR INTERNAL REVENUE ALLOTMENT (IRA) FOR THE ESTABLISHMENT AND MAINTENANCE OF FOREST PARKS IN THEIR CITIES AND MUNICIPALITIES"
congress_website_abstract = "The Local Government Units (LGUs) of cities, provinces and municipalities shall earmark two percent (2%) of the Internal Revenue Allotment (IRA), except in areas considered by the Department of Environment and Natural Resources (DENR) to be critically denuded, in which case the LGUs in said areas, shall set aside three percent (3%) of their respective IRA, for the establishment and maintenance of forest parks to be sited in the denuded mountain or areas located in their respective areas."
