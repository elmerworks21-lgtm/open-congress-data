congress_website_title = "AN ACT PROVIDING FOR A CHAMBER OF COMMERCE AND INDUSTRY SYSTEM, PROMOTING ORDER, EFFICIENCY AND EFFECTIVE DELIVERY OF SERVICES BETWEEN AND AMONG CHAMBERS OF COMMERCE AND INDUSTRY, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Chambers of Commerce and Industry Act of 1999\". Rationale: The bill seeks to promote the growth of chambers of commerce and industry (CCIs) nationwide. Presently, there is not chamber of commerce and industry system for all business and economic sectors. Chambers have thus uncontrollably mushroomed across the country with overlapping and duplication of functions and services resulting in inefficiency, and inability6 to provide value added services for its members, among others. For purposes ofenhancing the support of functions of CCI's in national economic growth, there is felt a need to establish a set of standards for greater efficiencies and effectiveness of Philippine CCI's."

