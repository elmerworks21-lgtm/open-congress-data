congress_website_title = "AN ACT AMENDING SECTION 401 OF THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES, AS AMENDED(RE: PROTECTS LOCAL PRODUCERS WITH REGARDS TO REDUCTION OF CERTAIN TARIFF LEVELS)"
congress_website_abstract = "Rationale: While it is incumbent upon the Tariff Commission to recommend to the President the reduction of certain tariff levels, it should be done WITHOUT BIAS to our local producers. The Commission should see to it that the affected local producers are informed of any public hearing which conerns them and that they are heard and given sufficient time to present their side. Industries located far from Metro Manila, ofter complain of not being able to present their case against their foreign competitors, may be given special treatment insofar as notice of public hearings and submission of evidence is concerned. To provide addition protection to local manufacturers, this bill proposed the submission to Congress of the result of all investiigations conducted by the Tariff Commission, including findings and/or recommendations ."
