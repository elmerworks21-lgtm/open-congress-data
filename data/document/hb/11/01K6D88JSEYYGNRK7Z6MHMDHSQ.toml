congress_website_title = "AN ACT CONVERTING THE DEPARTMENT OF AGRICULTURE INTO THE DEPARTMENT OF AGRICULTURE, FISHERIES AND FOOD"
congress_website_abstract = "The DEPARTMENT (Ministry) OF AGRICULTURE (And Food) is hereby CONVERTED (renamed) as DEPARTMENT (Ministry) OF AGRICULTURE, FISHERIES AND FOOD, hereinafter referred to as DEPARTMENT (Ministry) and SHALL HAVE THE SAME SET-UP OF THE PRESENT DEPARTMENTOF AGRICULTURE STRUCTURALLY AND FUNCTIONALLY (hereby reorganized, structurally and functionally) AS PROVIDED FOR UNDER EXECUTIVE ORDER NUMBERED ONE HUNDRED AND SIXTEEN."
