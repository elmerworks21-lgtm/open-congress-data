congress_website_title = "AN ACT RATIONALIZING FURTHER THE IMPOSITION OF PENAL SANCTIONS UNDER THE DANGEROUS DRUGS LAW OF 1972 BY PROVIDING PENALTIES SEPARATE AND DISTINCT FROM THOSE PROVIDED IN THE REVISED PENAL CODE (ACT NO. 3315, AS AMENDED) THEREBY PRECLUDING THE APPLICABILITY OF THE PROVISIONS OF THE LATTER IN DRUG OFFENSES, AMENDING FOR THIS PURPOSE, REPUBLIC ACT NO. 6425, AS AMENDED BY REPUBLIC ACT NO. 7659"
congress_website_abstract = "Seeks to RESTORE the range of penalties provided under the Dangerous Drugs Act of 1972 and REIMPOSE the death penalty as a mandatory or discretionary sentence WITHOUT being encumbered by the technical nomenclature in the Revised Penal Code."
