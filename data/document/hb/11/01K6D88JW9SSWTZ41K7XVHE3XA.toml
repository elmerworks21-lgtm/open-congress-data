congress_website_title = "AN ACT PROVIDING FOR THE PRESERVATION AND PROTECTION OF NATIONAL AND LOCAL HISTORICAL SITES AND PROPERTIES"
congress_website_abstract = "\"Philippines Historical Preservation and Protection Act of 1999.\" Rationale: The policy of the State to preserve and protect the historical sites and properties of the country as they are irreplaceable treasures and are indispensable in our proper understanding of our history and culture. In the pursuance of this policy, the State recognizes the vital role local government units play in the preservation and protection of these sites and properties."
