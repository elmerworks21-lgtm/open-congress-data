congress_website_title = "AN ACT ALLOWING THE USE OF ELECTION PROPAGANDA THROUGH MASS MEDIA AND THE POSTING OF CAMPAIGN MATERIALS DURING ELECTIONS UNDER CERTAIN CONDITIONS, AMENDING FOR THE PURPOSE SECTIONS EIGHTY-FIVE AND EIGHTY-SIX OF BATAS PAMBANSA BILANG 881 AND SECTIONSTEN AND ELEVEN OF REPUBLIC ACT NUMBERED SIX THOUSAND SIX HUNDRED FORTY-SIX"
congress_website_abstract = "Allows the candidates for public office to advertise in any newspaper, magazine, periodical or any form of publication and to purchase air time for radio and television broadcast for partisan political purposes during the campaign period in order toinform the electorate of the candidates' platform and their respective qualifications for the office they are aspiring for."
