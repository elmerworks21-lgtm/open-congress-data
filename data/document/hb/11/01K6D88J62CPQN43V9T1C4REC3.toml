congress_website_title = "AN ACT TO AMEND ARTICLE ONE THOUSAND SEVEN HUNDRED AND TWENTY-THREE OF REPUBLIC ACT NUMBERED THREE HUNDRED AND EIGHTY-SIX, OTHERWISE KNOWN AS THE CIVIL CODE OF THE PHILIPPINES, AND FOR OTHER PURPOSES(RE: ACCOUNTABILITY OF THE ENGINEER, ARCHITECT, CONTRACTORS AND SUB-CONTRACTORS IF A BUILDING COLLAPSED)"
