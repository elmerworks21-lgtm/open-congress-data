congress_website_title = "AN ACT ENSURING HIGHEST BUDGETARY PRIORITY TO EDUCATION, AMENDING FOR THE PURPOSE EXECUTIVE ORDER NO. 292, OTHERWISE KNOWN AS THE `ADMINISTRATIVE CODE OF 1987'"
congress_website_abstract = "Rationale; The globalization of the economy demands highly-skilled and well-trained manpower that can compete with workers and professionals of other countries. Concomitantly, education has to be sufficiently funded. This will give the necessary impetus not only to meet the requirements of a globalized economy. It will likewise enable the country to effectively harness its human resources for genuine national development."
