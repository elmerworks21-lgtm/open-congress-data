congress_website_title = "AN ACT ESTABLISHING MICRO AND SMALL ENTERPRISES PROGRAM, PROVIDING FOR MICRO AND SMALL ENTERPRISES FUND, CONSOLIDATING ALL EXISTING LIVELIHOOD FUND AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Million Enterprises Act of 1998\". All existing livelihood, except the People's Development Trust Fund (RA 8425), shall form part of a MICRO AND SMALL ENTERPRISES FUND for purposes of micro-financing . Cooperatives, NGOs, foundations, people's organizations (POs) shall have access to the Fund through a 50-50 matching system at lower interest rates."

