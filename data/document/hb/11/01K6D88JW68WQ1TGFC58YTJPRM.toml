congress_website_title = "AN ACT ESTABLISHING THE SMALL AND MEDIUM ENTERPRISES SECURITIES EXCHANGE AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It is the declared policy of the State to recognize the indispensable role of the private sector, encourage private enterprises, and provide incentives to needed investments. The State shall encourage the establishment of small and mediumenterprises; provide for increased access to financing for small and enterprises in order to facilitate funds necesary for thier expansion, and stimulate investors and private firms, both local and foreign, to invest in small and medium enterprises."
