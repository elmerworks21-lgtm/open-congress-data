congress_website_title = "AN ACT AMENDING SECTION 25 (d) OF PRESIDENTIAL DECREE NUMBERED SIXTEEN HUNDRED THIRTY-EIGHT, OTHERWISE KNOWN AS THE AFP MILITARY AND SEPARATION DECREE OF 1979, AND FOR OTHER PURPOSES"
congress_website_abstract = "States that Armed Forces of the Philippines (AFP) retirees who have served a fraction of at least six (6) months or more should be counted as a year of service, thus, an AFP retiree with a total length of service of 33 years, 10 months and 4 days should have a monthly retirement pension computed, based on 34 years of service and not 33 years as presently provided."

