congress_website_title = "AN ACT EXPANDING MATERNITY LEAVE BENEFITS, AMENDING FOR THE PURPOSE SECTION 14-A OF REPUBLIC ACT NO. 1161, AS AMENDED BY REPUBLIC ACT NO. 8282, OTHERWISE KNOWN AS THE SOCIAL SECURITY LAW OF 1997"
congress_website_abstract = "Rationale : Maternity benefits provided for bye Social Securrity Law of 1997 are accorded to mothers covered by social security only for the first four deliveries or miscarriages. > The present law limiting maternity aid to a mother, only for the first four child births or miscarriages is a betrayal of this declared trust."

