congress_website_title = "AN ACT DECLARING AS UNLAWFUL THE CUTTING, DESTRUCTION, SALE OR DISPOSITION OF STALACTITES AND STALAGMITES, AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "Rationale: Stalagmites and Stalactites, and other display of dripstones, which have made a number of large caves famous as tourist attractions, have not been spared from man-induced stresses. The rate of the unabated exploitation of our natural resources has reached alarming proportions. Immediate action must now be taken."

