congress_website_title = "AN ACT REGULATING THE ADVERTISING AND PROMOTION OF CIGARETTES AND OTHER TOBACCO PRODUCTS, PROVIDING PENALTIES FOR VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "DIRECT advertising of cigarettes and other tobacco products using electronic media such as radio, television and cinema shall be PROHIBITED. INDIRECT advertising may be allowed provided that only the brand name shall be mentioned and no tobacco or cigarettes should be shown in the advertisement, nor the words tobacco, cigarettes, smoking and other similar words shall be mentioned."
