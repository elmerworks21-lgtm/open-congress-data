congress_website_title = "AN ACT ALLOWING GOVERNMENT LAWYERS TO RENDER FREE LEGAL SERVICE TO INDIGENTS CHARGED WITH A CRIME/CRIMES"
congress_website_abstract = "\"Government Free Legal Service Act\". Defines \"legal service\" as legal representation for and in behalf of an indigent charged with a crime in one compalaint or information from the time of the preliminary examination or preliminary investigation before anh authorized public official or agency, or arraignment of the accused up to the termination of the case."

