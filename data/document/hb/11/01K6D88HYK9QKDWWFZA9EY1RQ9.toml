congress_website_title = "AN ACT VESTING THE NATIONAL AND REGIONAL COMPETITIVE SPORTS UNDER THE JURISDICTION OF THE PHILIPPINE SPORTS COMMISSION"
congress_website_abstract = "Transfers the function of national and regional competitive sports and athletics from the Department of Education, Culture and Sports (DECS) to the Philippine Sports Commission (PSC) so that the DECS can confine itself only to co-curricular school sports and athletics at the intramural and district levels."

