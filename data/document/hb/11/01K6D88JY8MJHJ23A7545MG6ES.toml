congress_website_title = "AN ACT PROVIDING FOR THE IMPLEMENTATION OF THE PROVISIONS OF THE 1992 INTERNATIONAL CONVENTION ON CIVIL LIABILITY FOR OIL POLLUTION DAMAGE AND THE 1992 INTERNATIONAL CONVENTION ON THE ESTABLISHMENT OF AN INTERNATIONAL FUND FOR COMPENSATION FOR OIL POLLUTION DAMAGE"
congress_website_abstract = "Rationale: With the growing global awareness on the dangers of pollution poased by the worldwide maritime carriage of oil bulk, the \"1992 Civil Liability Convention\" (CLC) and the \"1992 Fund Convention\" (Fund) were adopted in London on November 27,1992. The two (2) conventions provide a regime for compensation for pollution damage and for the cost of recovery measures, whenever taken, to prevent or minimize such damage. This bill seeks to implement full compliance with our nation's obligations to the conventions and to benefit thereform."
