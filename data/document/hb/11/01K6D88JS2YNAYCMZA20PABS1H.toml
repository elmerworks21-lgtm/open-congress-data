congress_website_title = "AN ACT BANNING FISH CULTURE PENS IN LAKES THROUGHOUT THE COUNTRY"
congress_website_abstract = "Rationale: A phenomenon known as \"LAKE OVERTURN\" has been identified as the primary cause of massive fish deaths in lakes due to concentrations of toxic compound products by toxic wastes in lakebeds. The fish kills in lakes are thus a result of thefish culture pens introduced and maintained thereon."

