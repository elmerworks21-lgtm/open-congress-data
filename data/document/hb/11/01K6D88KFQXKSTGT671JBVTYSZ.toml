congress_website_title = "AN ACT AMENDING SECTION 450 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, BY INCREASING THE AVERAGE ANNUAL INCOME REQUIREMENT FOR A MUNICIPALITY OR CLUSTER OF BARANGAYS TO BE CONVERTED INTO A COMPONENT CITY"
congress_website_abstract = "Section 450. Requisites for Creation. (a) A municipality or a cluster of barangays may be converted in to a component city if it has [an] A LOCALLY GENERATED average annual income, as certified by the Department of Finance, of at least [Twenty Million Pesos (P20,000,000.00 )] ONE HUNDRED MILLION PESOS (P100,000,000.0 0) for the last two (2) consecutive years based on [1991] 2000 constant prices, etc."
