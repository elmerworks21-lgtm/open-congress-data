congress_website_title = "AN ACT AMENDING SECTION 26, CHAPTER 4 OF THE ADMINISTRATIVE CODE OF 1987(RE: AUTOMATIC APPROPRIATIONS; REGULAR BUDGETARY ALLOTMENTS"
congress_website_abstract = "Amends Section 26, Chapter 4 of the Administrative Code to read as follows: \"Sec. 26. Automatic Appropriations. - All expenditures for Personnel Retirement Premiums, Government Service Insurance, and other similar Fixed Expenditures are automatically appropriated. Provided, That no Obligations shall be incurred or interests made from funds thus automatically appropriated except as issued in form of Regular Budgetary Allotments.\""
