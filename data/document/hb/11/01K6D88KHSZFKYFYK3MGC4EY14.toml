congress_website_title = "AN ACT EXTENDING COLLEGE SCHOLARSHIP ASSISTANCE TO THE DEPENDENTS OF THE ACTIVE MEMBERS OF THE POLICE, MILITARY, FIRE AND JAIL BUREAU"
congress_website_abstract = "It is herein provided a college scholarship assistance to the dependents of the active uniformed personnel of the police, military, fire and jail bureau, under the following conditions: (a) That college scholarship assistance shall be limited only to a maximum of three (3) dependents per active member; (b) That dependents shall be given full scholarship in any state tertiary educational instituion: Provided, that they meet the qualifications set forth by the institution; (c) That at least five(5) slots in the CHED Scholarship Program for each congressional district shall be alloted for these dependents; Provided, that in cases where there are more than five (5) dependents; and (d) That in circumstances where dependents are unable to availl of the privileges stipulated in the last two preceding paragraphs in this same section, they shall be entitled to a scholarship grant in a private but non-exclusive college or tertiary educational institution, subject to the evaluation and requirem"
