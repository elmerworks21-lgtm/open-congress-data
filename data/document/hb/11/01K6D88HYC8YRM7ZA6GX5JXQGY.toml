congress_website_title = "AN ACT INCREASING THE MONTHLY HONORARIA AND ALLOWANCES OF THE PUNONG BARANGAY, SANGGUNIANG BARANGAY MEMBERS, BARANGAY TREASURER, BARANGAY SECRETARY AND SANGGUNIANG KABATAAN CHAIRMAN, AMENDING FOR THIS PURPOSE SECTION 393 OF REPUBLIC ACT NO. 7160, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Recognizes the vital role of the barangay officials in nation building and development and their strengthened dedication and faithful discharge of duties and functions by increasing their monthly honoraria and allowances as follows: (1) Punong barangay - P3,000.00; (2) Sangguniang Barangay members, treasurer, secretary and Sangguniang Kabataan Chairman - P2,000.00. Entitles all to a Christmas bonus."
