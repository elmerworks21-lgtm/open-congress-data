congress_website_title = "AN ACT PROVIDING FOR THE ADJUSTMENT/INCR EASE OF RETIREMENT BENEFITS OF RETIREES IN THE PRIVATE SECTOR AND LOWERING THE COMPULSORY AND OPTIONAL RETIREMENT AGE OF PRIVATE SECTOR EMPLOYEES TO FIFTY-FIVE (55) AND FIFTY (50) YEARS, RESPECTIVELY, AMENDING FOR THE PURPOSE THE SOCIAL SECURITY ACT, AS AMENDED"
congress_website_abstract = "This bill seeks to lower the age for compulsory and optional retirement of private sector employees from sixty- five (65) to fifty-five (55) and from sixty (60) to fifty (50) years, respectively. It also seeks to change the name of Social Security System (SSS) into the Social Security Insurance System (SSIS). Said measure likewise aims to expand the benefits given to private sector employees, which shall include life insurance benefits, in the event of their retirement thus further amending forthe purpose Republic Act No. 8282, otherwise known as the Social Security Act of 1997."
