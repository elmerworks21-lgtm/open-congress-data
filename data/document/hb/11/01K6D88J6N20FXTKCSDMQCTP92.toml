congress_website_title = "AN ACT MANDATING EACH CITY AND MUNICIPALITY TO CREATE A RIVER DEVELOPMENT AUTHORITY FOR THE PRESERVATION, PROTECTION, AND DEVELOPMENT OF ALL RIVERS, RIVER SYSTEMS, AND NATURAL WATERWAYS WITHIN ITS RESPECTIVE JURISDICTION, DEFINING ITS POWERS AND FUNCTIONS, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "The author explains that a great number of our rivers, 421 principal rivers and 384 river systems, are gradully vanishing, many are dying and the rest are suffering from physical damages. An efficient institutional machinery to implement our laws on the preservation and development of rivers must be created."
