congress_website_title = "AN ACT REQUIRING CABINET SECRETARIES, UNDERSECRETARIE S OR ANY APPOINTIVE OFFICIAL WITH EQUIVALENT RANK OR EMOLUMENT, IN ORDER TO BE ELIGIBLE TO RUN FOR ANY ELECTIVE OFFICE, TO RESIGN FROM OFFICE ONE YEAR PRIOR TO FILING OF THEIR CERTIFICATE OF CANDIDACY OR TO WAIT FOR A PRESCRIBED PERIOD OF ONE (1) YEAR FROM THE DATE OF RESIGNATION, REMOVAL OR COMPLETION OF TERM OF OFFICE, AMENDING FOR THE PURPOSE THE OMNIBUS ELECTION CODE OF THE PHILIPPINES"
congress_website_abstract = "Rationale: This bill is designed primarily to remove any possibility of an appointive official having to face a conflict of interest between his Cabinet position and his own political agenda. Withi this bill, the appointed official can focus on implementing programs under his department or office without regard for his own political plans or agenda, thereby removing any speculation that the appointive official is using his office to support his own election campaign."

