congress_website_title = "AN ACT CREATING THE PHILIPPINE COORDINATING OFFICE FOR BRUNEI-INDONESI A-MALAYSIA-PHIL IPPINES EAST ASEAN GROWTH AREA (BIMP-EAGA) AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: Creation of the BRUNEI-INDONESI A-MALAYSIA-PHIL IPPINES East ASEAN Growth Area (BIMP-EAGA) has provided a framework for promoting cooperation and complementation among the four (4) participating countries in the areas of (1) trade and investments; (2) tourism development; (3) transport and shipping services; (4) fisheries, etc. The proposed Office will oversee the Philippine efforts toward this end."
