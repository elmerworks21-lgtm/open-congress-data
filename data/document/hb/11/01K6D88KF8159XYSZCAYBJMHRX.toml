congress_website_title = "AN ACT REDUCING BY TWENTY PERCENTUM (20%) THE DUTIES AND TAXES ON CRUDE OIL, DIESEL OIL, GASOLINE AND/OR PETROLEUM PRODUCTS TO ENSURE THE REDUCTION OF OIL PRICES CORRESPONDINGLY BY TWENTY PERCENTUM (20%) ALSO OF THE DUTIES AND TAXES THEREON PAYABLETO THE GOVERNMENT, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Oil Duties and Taxes Reduction Act of the Year 2000.\" The duties and taxes on crude oil, diesel oil, gasoline and/or petroleum products are hereby reduced by twenty percentum. Correspondingly , the oil importers, refinery companies, distributors and gasoline station oeprators shall reduce their prices equivalent to the twenty percentum (20%) deducted from the duties and taxes they shall pay to the government."
