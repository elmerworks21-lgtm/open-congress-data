congress_website_title = "AN ACT PROMOTING AND REGULATING THE OPERATION OF THE USED/WASTE OIL RECYCLING INDUSTRY"
congress_website_abstract = "\"Oil Recycling Act of 1999\". USED/WASTE OIL refers to lubricating oils that have gone through their intended use cycle. This measure proposes that the government take an active role in all facets of used/waste oil recycling, whether as a large-scaleindustry or an ordinary community activity by formulating specific guidelines, providing support services and granting tax incentives."

