congress_website_title = "AN ACT AWARDING TO VICTIMS OF CRIMES DEPICTED IN A MOVIE, BOOK, NEWSPAPER, MAGAZINE, RADIO OR TELEVISION PRODUCTION, OR LIVE ENTERTAINMENT, OF ANY KIND, OR ANY OTHER FORM OF COMMERCIAL EXHIBITION, PART OF THE PROCEEDS DUE TO THE CRIMINAL WHOSE STORYOF THE COMMISSION OF A CRIME OR CRIMES IS DEPICTED IN SAID EXHIBITION"
congress_website_abstract = "Seventy percent (70%) of the proceeds from any contract relating to the depiction of a crime in a movie, book, radio, TV, etc. shall be awarded and released to the VICTIM of the crime, his or her heirs or successors in interest. The rest shall be awarded to the immediate family of the criminal portrayed in the depiction."

