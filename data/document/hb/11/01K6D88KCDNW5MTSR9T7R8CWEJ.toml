congress_website_title = "AN ACT GRANTING FRANKING PRIVILEGE TO FILIPINO CITIZENS TO ENHANCE THEIR PARTICIPATION IN THE TASK OF GOVERNANCE"
congress_website_abstract = "\"Franking Privilege Act of 2000.\" All Filipino citizens of legal age are hereby grnated franking privilege when addressing correspondence to any government agency or government-owne d or controlled corporations or their officials. the head of any such government agency or government-owne d or controlled corporation shall ensure that such correspondence shall be answered in writing within fifteen (15) days, stating therein any action taken for the information of its sender. If within 30 days, noanswer has been received, the sender may send a follow-up letter requesting for such an answer. If no answer is received within ninety (90) days from receipt of its follow-up letter, the responsible official shall be liable for vioaltion of Code ofConduct and Ethical Standards for Public Officials and Employees if the sender decides to file a formal complaint against him."
