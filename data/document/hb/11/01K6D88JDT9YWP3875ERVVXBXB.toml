congress_website_title = "AN ACT MANDATING THE DEPARTMENT OF FINANCE TO PRESCRIBE A MINIMUM OCCUPANCY RATE AND DAILY ROOM RATE OF MOTELS AND INNS FOR TAX PURPOSES"
congress_website_abstract = "Customers of motels and inns have no desire to claim their official receipts as proof of payment. Therefore, taxes or gross due from these establishments easily escape the tax net. With this bill, the Government can collect the much needed revenuesif properly collected."
