congress_website_title = "AN ACT ESTABLISHING A PHILIPPINE AGRICULTURAL MODERNIZATION PROGRAM, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Philippine Agricultural Modernization Program (PAMP) Act\". States the following as the objectives of the Program: (1) to improve the agricultural infrastructures and facilities; (2) to initiate, consolidate and institute proper coordination and implementation of all irrigation, agricultural mechanization and other agricultural engineering programs and projects; (3) to promote and accelerate rural and agri-industrial ization; (4) to hasten the generation, development extension of appropriate technologies for the countrysides, etc."

