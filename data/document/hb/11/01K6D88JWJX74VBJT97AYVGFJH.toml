congress_website_title = "AN ACT ALLOWING INCUMBENT JUNIOR GEODETIC ENGINEERS TO CONTINUE THE PRACTICE OF THEIR PROFESSION, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED EIGHTY-FIVE HUNDRED AND SIXTY (R.A. NO. 8560), OTHERWISE KNOWN AS THE PHILIPPINE GEODETIC ENGINEERING ACT OF 1998"
congress_website_abstract = "Rationale: Times and experience have proven the competence and capability of the Junior Geodetic Engineers in performing their tasks. They are of great help to the geodetic engineer profession, to the government and to the public because of their quality performance. However, when R.A. 8560 (The new Philippine Geodetic engineering Act of 1998) was enacted, instead of giving due recognition to their profession under the law, they were decommissioned and scrapped out as a profession. Thus, this bill."
