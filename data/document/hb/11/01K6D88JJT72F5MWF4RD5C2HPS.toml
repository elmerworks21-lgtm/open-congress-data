congress_website_title = "AN ACT PROHIBITING POLICE PERSONNEL OR ANY MEMBER OF THE PHILIPPINE NATIONAL POLICE FROM DIRECTLY OR INDIRECTLY ARRANGING, INITIATING OR INSTIGATING ANY FINANCIAL SETTLEMENT BETWEEN THE VICTIM AND THE ACCUSED IN CASES INVOLVING SEXUAL ABUSES/OFFENSES AND AMENDING REPUBLIC ACT NO. 8551 ENTITLED `AN ACT PROVIDING FOR THE REFORM AND REORGANIZATION OF THE PHILIPPINE NATIONAL POLICE'"
congress_website_abstract = "Rationale: The cause of Filipino women and children deserve no less than our impassioned advocacy, and all efforts should be exerted to deter the commission of sexual abuses against women and children. This bill, likewise, strengthens the role played by Women's Desks in all police stations nationwide."
