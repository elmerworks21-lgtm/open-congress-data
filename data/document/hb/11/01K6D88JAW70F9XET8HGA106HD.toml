congress_website_title = "AN ACT AMENDING SECTION 31 OF PRESIDENTIAL DECREE NO. 1177, AS AMENDED, IN ORDER TO INSTITUTIONALIZ E THE AUTOMATIC APPROPRIATION OF THE FUNDS REQUIRED TO COVER THE YEARLY SHORTAGES OF TEACHERS AND CLASSROOMS"
congress_website_abstract = "States that expenditures for teachers and classroom requirements are automatically appropriated. The shortage of teachers and classrooms at the time of approval of this amendment shall be spread out over the next three (3) years as follows: (1) Year 1 --- 40% of shortage to be filled in; (2) Year 2 --- 60% of shortage to be filled in; and (3) Year 3 --- 80% of shortage to be filled in."
