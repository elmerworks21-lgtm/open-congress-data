congress_website_title = "AN ACT TO AMEND THE NATIONAL BUILDING CODE OF THE PHILIPPINES AND TO INCORPORATE IN CHAPTER 3 THEREIN PROVISION ON THE STANDARD MINIMUM REQUIREMENT FOR TERMITE PROOFING IN ALL PRIVATE AND PUBLIC BUILDING IN THE PHILIPPINES AND TO INSTITUTE THE OPERATING GUIDELINES FOR ITS IMPLEMENTATION AND FOR OTHER PURPOSES"
congress_website_abstract = "The exigencies of ensuring the longevity of our dwellings and buildings require the builtin mandate for incorporation in the existing National Building Code. In order to streamline its implementation, the operating guidelines to the Minimum StandardRequirements are herein instituted to form part of this proposal."

