congress_website_title = "AN ACT GRANTING PACKAGE OF ADDITIONAL BENEFITS AND INCENTIVES TO PUBLIC SCHOOL TEACHERS AND PERSONNEL, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Public School Teachers and Personnel Package of Additional Benefits and Incentives Act of 2000.\" Rationale: This bill, guided by the above constitutional provsions, aims to improve the plight of public schoolteachers and personnel by improving thebenefits afforded to them in order to encourage the best minds to join and remain in the teaching profession. It seeks to provide additional package of benefits and incen tives to public schoolteachers and personnel, over and above the present benefits to which they are entitled."
