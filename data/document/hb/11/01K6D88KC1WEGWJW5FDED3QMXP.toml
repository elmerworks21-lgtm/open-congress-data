congress_website_title = "AN ACT PROVIDING PROTECTION AND SUPPORT TO STUDENT COUNCILS IN SCHOOL CAMPUSES"
congress_website_abstract = "\"Student Council Act of 2000.\" Rationale: Indeed, the existence of student councils in the country today is a tribute to the hundred of student leaders who braved the odds to realize their vision of forming an organization that would protect their rights and welfare. Without ample support or assistance from the State, these student activists took it upon themselves to claim what is justily due them. This piece of legislation, therefore, seeks to correct this decades-long injustice done to students and, at the same time, and lay the legal framework for the institutionaliz ation of autonomous, representative and democratic student councils in school campuses."

