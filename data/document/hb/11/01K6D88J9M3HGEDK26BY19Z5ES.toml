congress_website_title = "AN ACT REQUIRING THE MANDATORY COMPLIANCE BY MOTORISTS OF PRIVATE AND PUBLIC VEHICLES TO USE SEAT BELT DEVICES, AND REQUIRING VEHICLE MANUFACTURERS TO INSTALL SEAT BELT DEVICES IN ALL THEIR MANUFACTURED VEHICLES"
congress_website_abstract = "\"Seat Belts Use Act of 1998\". For their own safety, the driver and front seat passengers of a public or private motor vehicle are required to wear or use their seat belt devices at all times, while driving or riding a vehicle. Car manufacturers, assemblers and distributors are likewise required to ensure that seat belt devices are installed in vehicles."
