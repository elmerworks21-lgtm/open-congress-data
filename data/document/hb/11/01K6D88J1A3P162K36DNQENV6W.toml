congress_website_title = "AN ACT GRANTING AMNESTY ON UNTAXED INCOME AND/OR WEALTH EARNED OR ACQUIRED PRIOR TO DECEMBER 31, 1997 AND REQUIRING THE FILING OF A STATEMENT OF ASSETS, LIABILITIES AND NETWORTH AS OF DECEMBER 31, 1997 (tax)"
