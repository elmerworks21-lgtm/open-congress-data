congress_website_title = "AN ACT AMENDING SECTION 13 OR REPUBLIC ACT NO. 3019 OTHERWISE KNOWN AS THE `ANTI-GRAFT AND CORRUPT PRACTICES ACT'(RE: PREVENTIVE SUSPENSION OF INCUMBENT PUBLIC OFFICER...)"
congress_website_abstract = "Regarding the SUSPENSION of an incumbent public officer, this bill states that THE PREVENTIVE SUSPENSION OF SUCH INCUMBENT PUBLIC OFFICER FOR ANY SINGLE CASE SHALL NOT EXTEND BEYOND A PERIOD OF SIXTY (60) DAYS. PROVIDED FURTHER THAT IN CASE THE INCUMBENT PUBLIC OFFICER HAS BEEN CHARGED FOR MORE THAN ONE VIOLATION, HE CANNOT BE PREVENTIVELY SUSPENDED FOR MORE THAN NINETY (90) DAYS WITHIN A SINGLE YEAR ON THE SAME GROUND OR GROUNDS EXISTING AT THE TIME OF THE FIRST SUSPENSION."

