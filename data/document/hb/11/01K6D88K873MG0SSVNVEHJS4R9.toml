congress_website_title = "AN ACT EXPANDING THE COVERAGE OF THE GOVERNMENT SERVICE INSURANCE SYSTEM AND INCREASING THE BENEFITS ACCRUING TO GOVERNMENT EMPLOYEES, AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NO. 1146, AS AMENDED"
congress_website_abstract = "This bill seeks to lower the age for compulsory and optional retirement of government employees from sixty-five (65) to fifty-five (55) and from sixty (60) to fifty (50) years, respectively. It likewise seeks to expand the benefits given to government employees in the event of their retirement, amending for the purpose Presidential Decree No. 1146, as amended by Republic Act No. 8291, otherwise known as \"An Act Expanding And Lowering the Coverage And Benefits Of The Government Service Insurance System.\""

