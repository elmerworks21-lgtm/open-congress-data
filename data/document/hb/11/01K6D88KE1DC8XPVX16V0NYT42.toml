congress_website_title = "AN ACT PROVIDING FOR THE MECHANISM TO DESIGNATE NATIONAL PERFORMING ARTS COMPANIES IN CLASSICAL AND CONTEMPORARY BALLET; ORCHESTRAL MUSIC; CHORAL MUSIC AND THEATRE; RESPECTIVELY, DEFINING THEIR RESPECTIVE FUNCTIONS AND RESPONSIBILITIE S, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "It is the policy of the State to appropriately recognize, designate, and support non-government organizations that have demonstrated pioneering, long, consistent, and unassailable competence; effectiveness; and success in researching; documenting; and mounting productions in Philippine art and culture, and transforming these into art forms that have won and continue to win national as well as international acclaim, recognition, and renown."

