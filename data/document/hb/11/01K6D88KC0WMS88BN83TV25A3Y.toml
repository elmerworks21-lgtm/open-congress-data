congress_website_title = "AN ACT RELATING TO MAIL THEFT AND DESTRUCTION, AMENDING FOR THE PURPOSE THE REVISED PENAL CODE, AS AMENDED AND OTHER SPECIAL PENAL LAWS ADDING A NEW CHAPTER TO TITLE 10 OF RPC AND PRESCRIBING PENALTIES THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Mail Pilferage Act 2000,\" Rationale: Our main concern to is protect victims and deter mail thieves. the best way to do that is to have a specific statute making it a felony to steal another persons' mail, or be in possession of stolen mail, destruction thereof and other similar activities. With this, we can ensure that each case recives the level of attention it deserves."

