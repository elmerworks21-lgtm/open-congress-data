congress_website_title = "AN ACT ADJUSTING PENSIONS UNDER THE GOVERNMENT SERVICE INSURANCE SYSTEM TO A MINIMUM LEVEL OF EIGHT THOUSAND PESOS (P8,000.00) UNDER AN ECONOMIC ADJUSTMENT PENSION PROGRAM"
congress_website_abstract = "Any law to the contrary notwithstanding , the minimum monthly pension under the Government Service Insurance System shall be four thousand pesos (P4,000.00). Provided, that in the succeeding years starting January 2000, the monthly pension shall beincreased annually, for five years, by not less than eight hundred pesos (P800.00)."

