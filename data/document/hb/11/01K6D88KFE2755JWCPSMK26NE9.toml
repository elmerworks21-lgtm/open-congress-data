congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 205, OTHERWISE KNOWN AS THE ORIGINAL CHARTER OF THE DEVELOPMENT ACADEMY OF THE PHILIPPINES (DAP)"
congress_website_abstract = "Rationale: Over the years. the Academy's concerns have expanded. In its desire to continuously support the thrusts and initiatives of the nation to provide development services, it has aligned its programs and projects by working as partner not only with government but the private sector and civil society as well. The Academy, as a \"think tank\" and capability builder of government, needs to be competitive in the market by making its compensation plan attractive and enticing to personnel. Thisis in the hope that the Academy will constantly and continuously contribute to the enhancement and development of the country."
