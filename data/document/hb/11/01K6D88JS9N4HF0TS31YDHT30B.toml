congress_website_title = "AN ACT PROVIDING FOR A SPECIAL PERSONNEL BENEFITS FUND IN THE PHILIPPINE NATIONAL POLICE(PNP)"
congress_website_abstract = "\"PNP Special Personnel Welfare Act of 1999\". This bill provides for the appropriation of P50 Million, replenishable every year in the general Appropriation Act, to constitute the proposed Fund. Ths Fund shall be used for (1) death benefits; (2) hospital expenses; and (3) college education expenses for PNP personnel and their beneficiaries."

