congress_website_title = "AN ACT AMENDING PRESIDENTIAL DECREE NO. 1986 CREATING THE MOVIE AND TELEVISION REVIEW AND CLASSIFICATION BOARD(RE:SELF-R EGULATION;AUDIE NCE CATEGORY;REVIEW AND DECISION MAKING SYSTEM)"
congress_website_abstract = "Recommends amendatory provisions to PD 1986, such as: (1) the eventual self-regulation of the industry by mandating that at least fifteen (15) members of the Board shall come from the movie and TV industry; (2) definitions of the audience category;and (3) a new system for review and decision-making of the Board."
