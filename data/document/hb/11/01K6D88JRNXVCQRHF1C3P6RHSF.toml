congress_website_title = "AN ACT AMENDING ARTICLE 2206 OF THE NEW CIVIL CODE, INCREASING THE AMOUNT OF MINIMUM CIVIL INDEMNITY FOR DEATHS ARISING FROM DELICT, QUASI-DELICT OR BREACH OF CONTRACT OF CARRIAGE"
congress_website_abstract = "The amount of damages for death caused by a crime or quasi-delict OR BREACH OF CONTRACT OF CARRIAGE shall be at least TWO HUNDREED THOUSAND PESOS (P200,000.00) even though there may have been mitigating circumstances. The claimant for damages may further recover punitive damages."
