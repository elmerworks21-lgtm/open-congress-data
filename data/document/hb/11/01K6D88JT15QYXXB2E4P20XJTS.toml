congress_website_title = "AN ACT ALLOWING CHILDREN BORN TO PARENTS BELOW 18 YEARS OF AGE TO AVAIL OF THE REMEDY OF LEGITIMIZATION, AMENDING FOR THE PURPOSE ARTICLE 177 OF EXECUTIVE ORDER NO. 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "Article 177 of Executive Order No. 209, otherwise known as the \"Family Code of the Philippines\", as amended, is hereby further ameded as follows: Only children conceived and born outside of wedlock of parents who, at the time of the conception of the former, were not disqualified by any impediment to marry each other, may be legitimated 'PROVIDED, THAT LEGITIMIZATION SHALL ATTACH TO CHILDREN WHOSE PARENTS WERE BELOW 18 UEARS OF AGE AT THE TIME OF THEIR CONCEPTION OR BIRTH, SHOULD SAID PARENTS SUBSEQUENTLY MARRY EACH OTHER AFTER THE ATTAINMENT OF THE AGE OF MAJORITY.'"
