congress_website_title = "AN ACT PENALIZING THE PILFERAGE OF WATER, PROVIDING PENALTIES THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Anti-Water Pilferage Act 2000.\" Rationale: Current reports indicate that at least 32% of most residents remain waterless or lack water. It further shows that, more than 50% of water distributed not only in the metropolis are still lost through leaks,illegal connection and wrong metering. One-half of non-revenue rates was attributed to leaks while the other half was caused by pilferage and wrong metering."
