congress_website_title = "AN ACT REQUIRING ANY PERSON, ASSOCIATION, CORPORATION OR ENTITY TO SECURE THE NECESSARY CLEARANCE OR PERMIT FROM THE NATIONAL HISTORICAL INSTITUTE (NHI) BEFORE COMMENCING ANY CONSTRUCTION OF REAL ESTATE DEVELOPMENT PROJECTS IN AREAS IDENTIFIED, DESIGNATED AND APPROPRIATELY MARKED AS HISTORICAL PLACES OR IN AREAS PROXIMATE THERETO, PROVIDING PENALTIES FOR VIOLATION THEREO, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Historical Places Protection Act of 1998\". Noncompliance with the required clearance or permit shall be penalized with imprisonment ranging from six (6) months to two (2) years, or a fine of P50,000.00 up to P100,000.00."
