congress_website_title = "AN ACT UPGRADING THE BENEFITS AND INCENTIVES OF BARANGAY TANOD MEMBERS WHO HAVE RENDERED AT LEAST ONE (1) YEAR OF SERVICE IN THEIR COMMUNITY"
congress_website_abstract = "Entitles the barangay tanod to benefits and incentives, such as: (1) Christmas bonus; (2) insurance coverage; (3) free legal services; (4) tuition fee discounts for one's children; (5) preference in availing of livelihood projects."
