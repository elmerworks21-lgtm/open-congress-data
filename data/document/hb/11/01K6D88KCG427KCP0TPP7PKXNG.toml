congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF NEW PUBLIC MUNICIPAL CEMETERIES AND REPLACEMENT OF OLD SITES DUE TO LACK OF SPACE AND THE INCREASING NUMBER OF DEAD BODIES AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: If thousands of people around the country who cannot afford to buy lots in expensive memorial parks die everyday, the existing public municipal cemeteries are certainly incapable of serving them. While our population has dramatically increased, the area of the public burial sites which were established century ago, has remained the same and does not have space anymore for burial."

