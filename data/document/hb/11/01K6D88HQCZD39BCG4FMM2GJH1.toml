congress_website_title = "AN ACT PROVIDING FOR A SYSTEM OF ABSENTEE VOTING FOR QUALIFIED FILIPINOS ABROAD, AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "\"Absentee Voting Act of 1998\". Recommends that proper access to the right to vote by qualified Filipinos abroad be institutionaliz ed. Defines \"absentee voting\" as the process by which qualified Filipinos abroad who are not in their voting residenceon election day, may vote in the Philippine elections."
