congress_website_title = "AN ACT MANDATING PROMPT OBSERVANCE OF TIME SCHEDULES"
congress_website_abstract = "\"Filipino Time Act of 1998\". Envisions to erase the concept of \"Filipino time\" and its common connotation of delay, lateness and laggardness and to adopt in their stead, a meaning that connotes PROMPTNESS in the observance of time schedules . Mandates the provision of sanctions to be imposed in case of failire to comply with the agreed deadlines and schedules."

