congress_website_title = "AN ACT TO REGULATE THE SHOWING OF VIOLENT SCENES AND EVENTS OVER THE TELEVISION AND THEREAFTERS, PROVIDING FOR PENALTIES REGARDING VIOLATION THEREOF, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines \"violent scenes\" as referring to those situations being shown over the television and theaters which involve the use of knives, guns and other weapons of destruction, those which portray the actual termination of human life and damage to property; glorify criminals or condone crimes; serve no other purpose but the market for violence; and tend to abet the traffic and use of prohibited drugs."
