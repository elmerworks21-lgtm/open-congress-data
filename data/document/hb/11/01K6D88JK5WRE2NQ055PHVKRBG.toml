congress_website_title = "AN ACT PROMOTING THE ROLE OF THE COOPERATIVE MOVEMENT IN COOPERATIVE DEVELOPMENT AND STRENGTHENING THE ADJUDICATIVE FUNCTION OF THE COOPERATIVE DEVELOPMENT AUTHORITY (CDA), RENAMING IT AS THE COOPERATIVE REGULATORY AUTHORITY (CRA) AND FOR OTHER PURPOSES, AMENDING THEREFOR REPUBLIC ACT NO. 6939"
congress_website_abstract = "The proposed bill seeks to: (1) provide venue for and ultimately institutionaliz e the cooperatives sector's participation in the promotion and development of cooperatives; (2) give real meaning to democratic participation of the cooperative sectorin CDA affairs; and (3) strengthen the system of adjudication for conflict resolution among the various actors within the cooperative sector."
