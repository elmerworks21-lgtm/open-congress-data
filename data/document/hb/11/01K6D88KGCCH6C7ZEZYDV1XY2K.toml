congress_website_title = "AN ACT PROVIDING FOR THE ESTABLISHMENT OF A PHILIPPINE HALAL CERTIFICATION BOARD, AND FOR OTHER PURPOSES"
congress_website_abstract = "For our Muslim brothers, \"HALAL\" is a term that is based on the holy Quran which means \"proper\" and permitted. Hence, in this context, halal food is permitted by Allah (God) for Muslim consumption. This proposed bill, therefore, generally aims to establish a progressive and credible halal industry in the Philippines by providing the mechanism that will make Philippine products competitive and accepted by the Islamic market not only in the country but throughout the world."

