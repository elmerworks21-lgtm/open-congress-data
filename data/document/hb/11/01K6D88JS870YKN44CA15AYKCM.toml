congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF EXECUTIVE ORDER NO. 561 DATED SEPTEMBER 21, 1979 CREATING THE COMMISSION ON THE SETTLEMENT OF LAND PROBLEMS (COSLAP) BY ENLARGING ITS COMPOSITION, SUPPORT STAFF, EXPANDING AND STRENGTHENING ITS FUNCTIONS, POWERS AND JURISDICTION AND FOR SUCH OTHER PURPOSES"
congress_website_abstract = "Rationale: The Commission on the Settlement of Land Problems (COSLAP) was created primarily to extend assistance to small farmers, tillers, settlers, indigenous cultural minorities and the underprivileged in settling their land problems in the mostexpeditious and inexpensive way. In the process, it also relieves the courts of the clogging of land problems cases. In order to effectively implement and execute its decisions and render justice without unnecessary delay, there is a need for COSLAPto be granted the necessary powers vested in courts, such as the contempt power."

