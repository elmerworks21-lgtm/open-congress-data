congress_website_title = "AN ACT REPEALING ARTICLES 333 AND 334 AND AMENDING ARTICLE 344 OF ACT 3815, AS AMENDED, OTHERWISE KNOWN AS THE REVISED PENAL CODE, AND DEFINING THE CRIME OF MARITAL INFIDELITY"
congress_website_abstract = "Defines \"marital infidelity\" as an act committed by any person who has carnal knowledge with a person other than this wife or her husband, or who shall keep a mistress or a lover in a conjugal dwelling, or cohabits in any other place with another, comporting themselves as spouses when in thruth they are not. Explains, further, that marital infidelity is likewise committed by a person who cohabits with a married man or woman knowing him or her to be married."

