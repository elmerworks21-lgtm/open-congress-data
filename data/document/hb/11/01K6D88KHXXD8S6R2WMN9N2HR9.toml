congress_website_title = "AN ACT PROVIDING FOR ACCOUNTABILITY AND TRANSPARENCY IN THE FOREIGN TRAVEL OF PUBLIC OFFICERS AND EMPLOYEES PROVIDING PENALTIES FOR VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: It is hoped tht through this bill all official foreign travels should henceforthm be measured strictly in terms of the larger national interest -conservation of scarce foreign exchange and national resources for the basic needs of our struggling masses. The government expenditure for official travels should thus be cut to the bone. limited to those involving real national interest and verboten for expenditures that are more for personall aggrandizement and gratification than the good of the public."
