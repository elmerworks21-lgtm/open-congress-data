congress_website_title = "AN ACT LOWERING THE COSTS OF MEDICINES AND HEALTH CARE IN THE PHILIPPINES BY EXEMPTING THE SALE, IMPORTATION, PROCESSING, REPACKING OR MANUFACTURING OF: MEDICINES, PHARMACEUTICAL PRODUCTS, MEDICAL, DENTAL AND HOSPITAL EQUIPMENT, AND RAW MATERIALS TOBE USED IN THE MANUFACTURE THEREOF FROM ALL DUTIES AND TAXES"
