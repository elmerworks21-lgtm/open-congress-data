congress_website_title = "AN ACT ESTABLISHING THE OPEN UNIVERSITY SYSTEM, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Open University Act of 1998\". This bill aims to establish an open university which would enable our youth in far-flung areas, as well as those who do not have time to study, to pursue an education. The proposed University shall prescribe the modesand procedure for open and distance learning whereby courses reach the students in their own homes or workplaces."
