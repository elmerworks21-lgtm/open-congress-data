congress_website_title = "AN ACT TO INCLUDE ECSTASY OR MDMA AND KETAMINE HYDROCHLORIDE AS PROHIBITED DRUGS AND TO PROVIDE PENALTIES, THEREFOR, AMENDING FOR THE PURPOSE THE DANGEROUS DRUGS ACT OF 1972, AS AMENDED"
congress_website_abstract = "It is now time to update our 28-year old Dangerous Drugs Act since many advanced drugs have already come out. Ecstacy and Ketamine hyrochloride should be included as prohibited drugs because these are considered 'hard drugs' and are just as fatal as cocaine and shabu, which are in the coverage of our existing law."
