congress_website_title = "AN ACT REQUIRING DOMESTIC CARRIERS TO INSURE THEIR PASSENGERS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Passenger Protection Act of 1998\". Seeks to alleviate the suffering of injured passengers and help them to start anew by providing immediate and automatic indemnity to passengers or their heirs. Declares it a State policy to secure all passengersof domestic commercial airlines, ships and public utility vehicles with automatic and non-contestable insurance policies ."

