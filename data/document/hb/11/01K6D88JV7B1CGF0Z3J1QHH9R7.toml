congress_website_title = "AN ACT INSTITUTIONALIZ ING FREE SPECIAL EDUCATION FOR THE DIFFERENTLY-ABL ED, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "For purposes of this Act, DIFFERENTLY-ABL ED INDIVIDUALS shall refer to a person with mental or physical disability, i.e. disability or incapacity caused by physical defect or infirmity, or bodily imperfection, which includes, but is not limited to,the blind, deaf, mute, amputees, paraplegics. The State shall also promote non-formal indigenous and out-of-school study programs, particularly those that respond to community needs, and to the needs of the marginalized sectors like the differently-abl ed women and children."
