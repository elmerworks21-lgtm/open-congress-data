congress_website_title = "AN ACT GRANTING CERTAIN INCENTIVES TO RESIDENT FILIPINOS WHO WILL TRAVEL TO DOMESTIC TOURIST DESTINATIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Local Tourist Travel Incentives Act\". Grants a full discount of twenty-five (25%) percent to students, senior citizens, disabled and unemployed Filipinos who wisj to travel around the Philippine Islands to appreciate the beauty of the country, deductible from the total bill representing their transportation and accommodation expenses and twenty (20%) percent for employees with a net income of not exceeding Three Hundred Thousand (P300,000.00) Pesos per annum considering their ability to pay."

