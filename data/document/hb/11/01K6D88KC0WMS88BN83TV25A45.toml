congress_website_title = "AN ACT PROHIBITING THE CONFISCATION OF DRIVERS LICENSES AND CAR PLATES BY POLICE OR TRAFFIC OFFICERS AND PROVIDING PENALTIES FOR VIOLATIONS THEREOF"
congress_website_abstract = "Except only in cases of fake licenses and stolen car plates, it is hereby prohibited for any police or traffic officer or any person clothed with authority to direct or control traffic in public streets, alleys or similar public places, to confiscate from erring drivers their driver's license and/or the car plates of the car, trucks, motorized tricycle or similar motor vehicles driven by them as a result of or in connection with traffic violation."

