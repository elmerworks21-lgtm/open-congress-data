congress_website_title = "AN ACT GRANTING REPRESENTATION OF CONSUMER GROUP IN THE BOARD OF DIRECTORS OF THE MANILA ELECTRIC COMPANY, THE NATIONAL POWER CORPORATION, THE METROPOLITAN WATER SEWERAGE AUTHORITY, THE PHILIPPINE LONG DISTANCE TELEPHONE COMPANY, AND ANY OTHER CORPORATION, GOVERNMENT OR PRIVATE, DISPENSING PUBLIC SERVICES, GIVING THEM ONE (1) SEAT IN THE BOARD OF DIRECTORS, AND FOR OTHER PURPOSES"
congress_website_abstract = "The author reasons that the increased costs to the abovementioned corporations should normally be a bruden of the investors. However, this burden has been passed down to the consumers, thus the consumers should be reprsented in the boards of these corporations."

