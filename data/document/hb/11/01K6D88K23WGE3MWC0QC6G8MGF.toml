congress_website_title = "AN ACT DECLARING THE POSITION OF PROVINCIAL, CITY AND MUNICIPAL ADMINSTRATOR AS A PRIMARILY CONFIDENTIAL POSITION, AMENDING FOR THE PURPOSE SECTION 480 (a), ARTICLE TEN, TITLE FIVE, BOOK III OF THE LOCAL GOVERNMENT CODE OF 1991, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: The municipal, city and provincial adminsitrators must work closely with their chief executives in plotting strategies, plans and programs for the development of their respective units. The administrator's performance is reflective of the mayor's/governo r's accomplishments . As such, the administrator must enjoy the fullest trust and confidence of his superior to ensure an effective and smooth flow of vital infrastructure, cultural and socio-economic programs and projects."
