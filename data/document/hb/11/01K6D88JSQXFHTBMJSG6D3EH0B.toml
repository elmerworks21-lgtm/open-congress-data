congress_website_title = "AN ACT PROHIBITING CERTAIN PUBLIC OFFICIALS FROM STANDING AS SPONSOR IN WEDDINGS, BAPTISMS, CONFIRMATIONS AND SIMILAR RELIGIOUS RITES AND PROVIDING PENALTIES THEREFOR"
congress_website_abstract = "\"The Padrino System Abolition Act of 1999'. This bill seeks to prohibit certain public officials from standing as sponsor in wedding, baptism, confirmation and similar religious rites. It seeks to put and end to this padrino system to prevent theseofficials from exerting undue influence to favour their godsons or inaanaks and their compadre to the detriment of the government and the Filipino people."
