congress_website_title = "AN ACT GRANTING ADDITIONAL PRIVILEGES AND INCENTIVES TO DISABLED PERSONS SIMILAR TO THOSE ENJOYED BY SENIOR CITIZENS, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7277, OTHERWISE KNOWN AS THE MAGNA CARTA FOR DISABLED PERSONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to grantdisabled persons a 20% discount from all establishments, 10% discount in the purchase of medicines, exemption from the payment of individual income taxes, and full medicla and dental services in government establishments, among others. This bill also provides incentives to individual taxpayers taking care of persons with disability."

