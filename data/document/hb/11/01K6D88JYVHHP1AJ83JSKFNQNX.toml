congress_website_title = "AN ACT INSTITUTING A MANDATORY ANNUAL CALL FOR A VOTE OF CONFIDENCE IN THE PRESIDENT AND VICE PRESIDENT OF ALL SANGGUNIANG KABATAAN PEDERASYON, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE"
congress_website_abstract = "This bill mandates that THERE SHALL BE AN ANNUAL CALL FOR A VOTE OF CONFIDENCE IN THE PRESIDENT AND VICE-PRESIDENT, FAILING WHICH AN ELECTION FOR A NEW PRESIDENT AND VICE-PRESIDENT SHALL BE CALLED IN ACCORDANCE WITH THE PROVISIONS OF THE CONSTITUTION AND BY-LAWS OF THE PEDERASYON AND WITH THE PERTINENT PROVISIONS OF THIS CODE."

