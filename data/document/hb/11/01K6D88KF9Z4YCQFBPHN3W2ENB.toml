congress_website_title = "AN ACT GRANTING AN ACROSS-THE-BOAR D INCREASE IN DAILY WAGES TO ALL PRIVATE SECTOR WORKERS NATIONWIDE TAKING INTO CONSIDERATION NATIONAL CONSUMER PRICE INDEX (CPI) AND GROSS DOMESTIC PRODUCT (GDP) INCREASES, WITH THE YEAR 1991 AS THE BASE YEAR"
congress_website_abstract = "The daily wages of all private sector workers under existing laws shall be increased across-the-boar d by the sum of the Wage Recovery and Fair Share where Wage Recovery and Fair Share are computed as follws: (1) Wage Recovery = regional wage in 1991 x national CPI increase - current regional minimum wage; and (2) Fair Share = regional minimum wage in 1991 x average annual national GDP growth x 9 years. Hence. New Minimum Wage = Current Regional Minimum Wage + Wage Recovery + Fair Share: Provided, That the measure of the CPI shall consider the projected rise in prices until the end of the year 2000."

