congress_website_title = "AN ACT TO PROVIDE FOR A COMPREHENSIVE NATIONAL HEALTH FACILITIES ENHANCEMENT PROGRAM, ESTABLISHING THE MECHANISMS AND APPROPRIATING FUNDS FOR ITS IMPLEMENTATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"National Health Facilities Enhancement Act of 2000.\" Rationale: Most stakeholders in the national health services observed that Philippine health service has suffered tremendous damage after the devolution of health services to the Local GovernmentUnits (LGUs) and which to them is the most destructive event to basic health services in recent times. Naturally, the already inadequate health services deteriorated even further when national government funds and personnel were withdrawn resultingin a fragmented delivery of health services, with a dangerous gap between hospital care and preventive public health services; weak preventive medicine; and the removal of effective referral services and networking among health facilities. Today, itappears that the bulk of the burden of shouldering the high cost of health care remained at the hands of the individual families who can't afford the prohibitive cost of preserving their health."

