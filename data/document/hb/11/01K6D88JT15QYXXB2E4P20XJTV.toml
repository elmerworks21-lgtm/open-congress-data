congress_website_title = "AN ACT GRANTING PERMANENT RESIDENCE STATUS TO THE REMAINING VIETNAMESE NATIONALS THROUGH A SOCIAL INTEGRATION PROGRAM IN THE PHILIPPINES UNDER CERTAIN CONDITIONS"
congress_website_abstract = "This bill seeks to remedy this injustice by granting permanent residence status to qualified refugees and asylum seekers after thorough evaluation. They will then be able to work and move around like free, self-reliant citizens until they decide toreturn to their homeland, in keeping with the Filipino spirit of hospitality and compassion and in deference to internationally recognized human rights."
