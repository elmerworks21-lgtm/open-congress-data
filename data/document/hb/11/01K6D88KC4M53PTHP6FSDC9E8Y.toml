congress_website_title = "AN ACT TO FURTHER AMEND SECTION THREE-A OF REPUBLIC ACT NUMBERED NINE HUNDRED AND TEN, AS AMENDED, AND TO APPROPRIATE FUNDS TO IMPLEMENT ITS PROVISIONS(RE: RETIREMENT BENEFITS OF THE JUDGES OF THE LOWER COURTS)"
congress_website_abstract = "This bill seeks to extend to the judges of the lower courts the same retirement benefits accorded to the retired justices of the supreme Court, the Court of appeals and the Sandigan Bayan, by Republic Act No. 1797. At present, the monthly pension which the retired lower court judges receive, remain pegged to the highest salary they were receiving at the time of their retirement, while the justices of the higher courts receive monthly pension equal to the monthly stipends of the incumbent justices."

