congress_website_title = "AN ACT SIMPLIFYING EXPORT PROCEDURES AND DOCUMENTATION, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Simplification of Export Procedure and Documentation of 1999\". Rationale: The State recognizes that there is a need to promote exports and facilitate the process of exportation through the adoption of simplified export procedures and standardized export documents. In order to achieve a truly meaningful reformation of existing export procedures, it is necessary that all concerned agencies and office of the government contribute to this effort by a constant review of their procedures and documentation activities for possible further simplification."
