congress_website_title = "AN ACT AMENDING ARTICLE 177 OF EXECUTIVE ORDER 209, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES (RE: LEGITIMATION OF CHILDREN BORN TO UNDERAGE COUPLES)"
congress_website_abstract = "Refers to the LEGITIMATION of children born to UNDERAGE couples. States that those conceived and born to parents under the age of majority (below 18 years of age) may be eligible for legitimation by the SUBSEQUENT MARRIAGE of the parents to each other."
