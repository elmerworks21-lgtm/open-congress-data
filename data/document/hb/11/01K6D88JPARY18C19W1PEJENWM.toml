congress_website_title = "AN ACT LEGALIZING ABSOLUTE DIVORCE, AMENDING FOR THE PURPOSE TITLE II AND ARTICLES 55 TO 67 THEREUNDER OF EXECUTIVE ORDER NO. 209, AS AMENDED BY EXECUTIVE ORDER NO. 227, OTHERWISE KNOWN AS THE FAMILY CODE OF THE PHILIPPINES"
congress_website_abstract = "This bill provides for the filing of a petition for (legal separation) DIVORCE; states the GROUNDS for the filing or denial of said petition. The bill, likewise, states the subsequent EFFECTS of the decree on the spouses' children and conjugal partnership, and entitles the divorced spouses to REMARRY."
