congress_website_title = "AN ACT MANDATING THE APPOINTMENT OF A HUMAN RESOURCE MANAGEMENT OFFICER (HRMO) IN EVERY MUNICIPALITY, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991 AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "Rationale: The need for a HUMAN RESOURCE MANAGEMENT OFFICER in the municipality is imperative. He will be in charge of manpower training for the development of skills. He will coordinate with governmental agencies and non-governmenta l organizationsfor the development of a pool of skilled manpower. He can also initiate incentives to spur further development of skills and the continuous monitoring and training of skilled personnel in the municipalities that can be tapped by industries thus generating employment and stimulating economic growth for the municipality concerned and the country."

