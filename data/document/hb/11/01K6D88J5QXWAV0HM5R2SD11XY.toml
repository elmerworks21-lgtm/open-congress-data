congress_website_title = "AN ACT PRESCRIBING THE SALARIES OF BARANGAY OFFICIALS AND EMPLOYEES, AMENDING FOR THE PURPOSE SECTION 393 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "\"Barangay Officials Remuneration Act of 1998\". Prescribes the following monthly salaries for the officials: (1) P5,000.00 - punong barangya; (2) P4,000.00 - Sangguniang Barangay members; (3) P3,000.00 - treasurer, secretary and KB Chairman; and (4)P2,000.00 - tanod and lupong tagapamayapa."
