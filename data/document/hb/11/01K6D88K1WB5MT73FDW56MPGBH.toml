congress_website_title = "AN ACT VESTING IN THE VICE GOVERNORS, CITY AND MUNICIPAL VICE MAYORS, IN THEIR CAPACITY AS PRESIDING OFFICER OF THE SANGGUNIAN, THE POWER TO ISSUE SUBPOENAS, AMENDING FOR THE PURPOSE SEC. 49 OF RA 7160 OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE"
congress_website_abstract = "Rationale: How can we expect the Saggunian to produce quality legislation if they do not have the power to require persons to testify before the Council or require the production of documents. This bill, therefore, seeks to remedy this defect in theLocal Government Code."
