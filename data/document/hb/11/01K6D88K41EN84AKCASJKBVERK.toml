congress_website_title = "AN ACT TO AMEND ARTICLE 202, CHAPTER TWO, TITLE SIX OF THE REVISED PENAL CODE(VAGRANCY)"
congress_website_abstract = "RationaleL: This bill seeks to AMEND the vagrancy provision of the Revised Penal Code. Under this law, a person found loitering in any places without justifiable purpose or wandering around the streets without visible means of support is said to bea vagrant. This law is unconstitutiona l and anti-poor. It is very susceptible to human rights abuses like any bad cop could make money out of this law or use it as a ploy to harass suspected prostitutes. It also violates the fundamental freedom ofmovement of citizens."

