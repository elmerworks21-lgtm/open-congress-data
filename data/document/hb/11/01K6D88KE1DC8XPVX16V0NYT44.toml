congress_website_title = "AN ACT PROVIDING FOR A MAGNA CARTA FOR THE PHILIPPINE NATIONAL POLICE"
congress_website_abstract = "The provisions provided in this proposed legislation are focused on the basic rights, privileges as well as other benefits of the general membership of the PNP which they rightfully are entitled to enjoy. Also inclided are programs for continuous education and training and adequate salary and benefits. This proposed Magna Carta for the Philippine National Police attempts to properly address the existing loopholes and inadequacies of the present system and laws governing the PNP structure, organization and oepration. In another context, this bill serves as a framework for the professionaliza tion of the PNP."

