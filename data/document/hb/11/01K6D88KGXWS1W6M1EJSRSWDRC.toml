congress_website_abstract = "\"Diplomatic Relations Act of 2001\". Rationale: Opening up diplomatic relations with many other countries will provide us the opportunity to explore possible economic ties with these foreisn governments and possibly enrich our culture as a nation. Moreover, with the global trend of liberalization and global openness, it would be opportune for us to lead this part of the world in preaching the gospel of borderless world."

