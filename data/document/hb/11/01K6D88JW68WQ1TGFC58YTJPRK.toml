congress_website_title = "AN ACT TO PROMOTE, DEVELOP AND ASSIST MICRO AND COTTAGE INDUSTRIES BY PROVIDING AN EFFECTIVE AND RATIONAL SYSTEM TO ADDRESS THEIR PRODUCTION AND TECHNOLOGY NEEDS"
congress_website_abstract = "\"Micro and Cottage Industries Development Act of 1999.\" Rationale: Recognizing that the envisioned alleviation of poverty and the problem of massive unemployment particularly in the countryside cannot be alleivated without strong economic activitiesat the grassroots level and that micro and cottage industries, being highly labor-intensive and a primary user of indigenous raw materials, have the highest potential for employment, self-employment and livelihood opportunities, it is hereby declared the policy of the State to give preferential attention to the promotion and development of micro and cottage industries, including livelihood and self-employed activities."
