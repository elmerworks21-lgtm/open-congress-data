congress_website_title = "AN ACT ENHANCING FURTHER THE AUTONOMY OF LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Empowers LGUs to (1) approve franchises or permits for legalized gambling activities. The Sangguniang Bayan may prescribe reasonable guidelines to regulate such activities; (2) adopt measures to enhance the national agrarian reform program; and (3)regulate jeepney and bus operations within the municipality."

