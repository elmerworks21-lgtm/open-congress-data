congress_website_title = "AN ACT GRANTING DULY ELECTED BARANGAY CHAIRMEN A MINIMUM MONTHLY COMPENSATION CORRESPONDING TO SALARY GRADE TEN (10) AS PRESCRIBED UNDER REPUBLIC ACT NO. 6758, OTHERWISE KNOWN AS THE SALARY STANDARDIZATION LAW"
congress_website_abstract = "\"Barangay Chairmen Compensation Act of 2000.\" It is the policy of the State to promote and protect the welfare and interest of duly elected barangay chairmen as heads of the county's basic political units. As the local chief executives of barangays, they carry with them the responsibility of maintaining the smooth, effective and efficient operation of their respective political units. Their roles are crucial as they act as heads of the primary planning and implementing agencies of government programs, projects and activities."

