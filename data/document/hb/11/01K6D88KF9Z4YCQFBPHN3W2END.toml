congress_website_title = "AN ACT PRESCRIBING A RATIONALIZED STAFFING PATTERN FOR THE SUPPORT STAFF OF PROVINCIAL/CITY PROSECUTORS OFFICE"
congress_website_abstract = "Rationale: The support staff is necessary and indispensable component of the offices of the provincial and city prosecutors, which are national offices. To once and for all adopt a single standard of compensation for the support staff, this bill seeks to rationalize the staffing pattern and compensation of the support staff and thereby reflect a true and effective nationalization of the salaries of the support staff of all provincial/city prosecutors' offices all over the country."
