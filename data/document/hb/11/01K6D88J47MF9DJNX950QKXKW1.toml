congress_website_title = "AN ACT MAKING HAZING OR ANY FORM OF INITIATION RITES IN FRATERNITIES, SORORITIES AND ORGANIZATIONS A CRIMINAL ACT IF DONE WITHOUT NOTICE TO SCHOOL, ORGANIZATIONAL AND BARANGAY OFFICIALS AND PROVIDING FOR PENALTIES FOR VIOLATION THEREFOR, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 8049, (AN ACT REGULATING HAZING AND OTHER FORMS OF INITIATION RITES IN FRATERNITIES, SORORITIES, AND ORGANIZATIONS AND PROVIDING PENALTIES THEREFOR)"
congress_website_abstract = "The author explains that \"the deterrent effect of RA 8049 must be more evident and exacting.\" This proposed measure REMOVES the benefit of the indeterminate sentence law, Probation Law from the person charged, and instead applies the penalties to their fullest extent."

