congress_website_title = "AN ACT PROVIDING FOR THE MAINTENANCE AND SUPPORT OF ELDERLY MEMBERS OF THE FAMILY, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Maintenance of Parents Act of 1999\" Children shall maintain and support their father or mother and other direct ascendants who are in need. Where an elderly member appears to be in need, he may by himself or through a representative of the Department of Social Welfare and Development (DSWD), file a petition in court for his maintenance and support from any or all of his children. Upon trial, elderly member shall be represented by a lawyer from the public attorney's office and shall be exempt from all charges and fees."
