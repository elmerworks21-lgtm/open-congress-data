congress_website_title = "AN ACT PROVIDING FOR THE PHILIPPINE 20/20 INITIATIVE FOR POVERTY ALLEVIATION"
congress_website_abstract = "In 1995, during the UN World Summit on social Development (WSSD), leaders of the world, in their determination to eradicate poverty, forged a consensus to earmark at least 20 percent of their national budgets and 20 percent of official development assistance (ODA) funds for human development needs. This consensus is now known globally as the 20/20 Initiative. > The adoption of the 20/20 Initiative calls for the mobilization of public resources and the re-structuring of budgets for basic socialservices as a major framework towards poverty eradication. At its core, the 20/20 Initiative aims to achieve universal access to basic social services, particularly basic education, primary and reproductive health, safe water and sanitation, and nuttrition."

