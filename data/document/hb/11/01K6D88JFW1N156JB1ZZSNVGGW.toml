congress_website_title = "AN ACT PRESCRIBING THE PROCEDURE FOR THE EXPEDITIOUS HOLDING OF SPECIAL ELECTION IN CASE OF VACANCY IN THE CONGRESS OF THE PHILIPPINES, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-SIX HUNDRED AND FORTY-FIVE, ENTITLED `AN ACT PRESCRIBING THEMANNER OF FILLING A VACANCY IN THE CONGRESS OF THE PHILIPPINES'"
congress_website_abstract = "This bill prescribes the procedure for the expeditions holding of special election, through a certification by the Speaker on the existence of vacancy and calling for a special election to fill the vacancy in a particular legislative district."
