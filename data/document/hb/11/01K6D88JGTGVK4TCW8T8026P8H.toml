congress_website_title = "AN ACT GRANTING TAX EXEMPTION FOR RURAL ELECTRIC COOPERATIVES REGISTERED UNDER PRESIDENTIAL DECREE NUMBERED SEVEN HUNDRED AND SIXTY-NINE, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Rural electric cooperatives are in a more urgent need for financial assistance. Electric power is a very vital and basic necessity. Exempting these cooperatives from taxation will uplift the economic condition of our people and improve the quality of life for all."

