congress_website_title = "AN ACT ESTABLISHING THE PRE-NEED PLAN CODE OF THE PHILIPPINES"
congress_website_abstract = "This bill seeks to create a PRE-NEED PLAN COMMISSION which will attend solely to the needs of duly authorized cooperatives engaged in the pre-need plan business. This bill , likewise, mandates the establishment of a TRUST FUND to guarantee the delivery of monetary values and/or maturing benefits to the planholder."
