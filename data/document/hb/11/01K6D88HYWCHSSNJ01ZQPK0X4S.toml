congress_website_title = "AN ACT AMENDING SECTION ONE OF REPUBLIC ACT NUMBERED FIVE HUNDRED TWENTY-NINE, OTHERWISE KNOWN AS THE UNIFORM CURRENCY ACT, AS AMENDED(RE: RATE OF EXCHANGE IN PAYMENT OF DOMESTIC OBLIGATION)"
congress_website_abstract = "Declares that in cases of payment of a domestic obligation, the rate of exchange SHALL BE THAT WHICH IS HIGHER BETWEEN THE RATE OF EXCHANGE PREVAILING AT THE TIME THE OBLBIGATION WAS INCURRED AND THE RATE OF EXCHNAGE REVAILING AT THE TIME OF THE STIPULATED DATE OF PAYMENT."

