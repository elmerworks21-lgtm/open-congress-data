congress_website_title = "AN ACT REQUIRING THE MANDATORY LABELLING OF FOOD AND FOOD PRODUCTS CONTAINING GENETICALLY-MOD IFIED ORGANISMS AND THOSE PRODUCED BY GENETIC ENGINEERING TECHNOLOGIES, AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 7394, OTHERWISE KNOWN AS THE CONSUMER ACTOF THE PHILIPPINES, AND REPBULIC ACT NO. 3720, OTHERWISE KNOWN AS THE FOOD, DRUG AND COSMETIC ACT, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: Concerns about the effects of genetically-mod ifies organisms (GMOs) or those produced through genetic engineering on the environment and the health of the people have been raised lately. With these diverse concerns, it is important consumers be made aware of the issues relevant to the use GMOs, and be given the choice, especially for food products. This measure, therefore, requires the mandatory labelling of food and food products containing GMOS and those produced by genetic engineering technologies. This will, in the process, amend certain existing laws, including the Consumer Act of the Philippines and the Food, Drug and Cosmetic Act."
