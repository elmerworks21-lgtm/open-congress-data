congress_website_title = "AN ACT AMENDING SECTION TWO HUNDRED AND EIGHTY-SIX OF REPUBLIC ACT NUMBERED SEVENTY-ONE HUNDRED AND SIXTY, OTHERWISE KNOWN AS THE `LOCAL GOVERNMENT CODE OF 1991'(RE: REMITTANCE OF LGU SHARE)"
congress_website_abstract = "The share of each local government unit shall be released [without need of any further action,] AND REMITTED directly BY THE PERSONS, NATURAL OR JURIDICAL, ENGAGED IN THE UTILIZATION AND DEVELOPMENT OF THE NATIONAL WEALTH, to the provincial, city, municipal or barangay treasurer, as the case may be, on a quarterly basis within five (5) days after the end of each quarter, and which shall not be subject to any lien or holdback that may be imposed by the national government for whatever purpose."

