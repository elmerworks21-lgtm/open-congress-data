congress_website_title = "AN ACT AMENDING THE MANNER OF CHANGING THE COMPOSITION, DISTRIBUTION OR ASSIGNMENT OF FIELD OFFICES OF THE COMMISSION ON ELECTIONS AS PROVIDED IN SECTION 56 OF BATAS PAMBANSA BILANG 881 AND THEREBY REPEALING SECTION 44 OF REPUBLIC ACT NO. 8189"
congress_website_abstract = "States that ANY ELECTION OFFICER WITH A PENDING ADMINISTRATIVE OR CRIMINAL CASE AGAINST HIM IN CONNECTION WITH THE PERFORMANCE OF HIS OFFICIAL OR ELECTION DUTIES UDNER THIS ACT SHALL, IF THE EVIDENCE OF GUILT IS STRONG , BE AUTOMATICALLY REASSIGNEDBY THE COMMISSION TO A NEW STATION OUTSIDE THE ORIGINAL CONGRESSIONAL DISTRICT FURING THE PENDENCY OF THE CASE."

