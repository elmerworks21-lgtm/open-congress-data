congress_website_title = "AN ACT IMPOSING STIFFER PENALTIES TO PERSONS CAUGHT DRIVING MOTOR VEHICLES WHILE UNDER THE INFLUENCE OF ALCOHOL OR PROHIBITED DRUGS"
congress_website_abstract = "\"Deadly Driver Reduction Act of 2000.\" This bill seeks to put into place a piece of legislation that will provide stiffer penalties to a person caught driving a motor vehicle under the influence of alcohol or prohibited drugs. The intention of thisproposal is to cast the iron hand of the law towards the would-be potential murderers, who, while under the spell of their vices, loiter along the busy thoroughfares of the metropolis thus endangering countless innocent lives."

