congress_website_title = "AN ACT AMENDING ARTICLE 202 OF THE REVISED PENAL CODE, SO AS TO INCLUDE MALES IN THE DEFINITION OF PROSTITUTION"
congress_website_abstract = "States that under Article 202 of the Revised Penal Code, only WOMEN who habitually INDULGE in sexual intercourse or lascivious conduct are deemed PROSTITUTES. However, MALES are also capable of engaging in prostitution, thus it proposes to redefineprostitute as \"[women] persons who, for money or profit, habitually indulge in sexual intercourse or lascivious conduct.\""
