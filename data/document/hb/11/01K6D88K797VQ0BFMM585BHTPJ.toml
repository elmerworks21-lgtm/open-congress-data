congress_website_title = "AN ACT PROHIBITING THE COURTS FROM ISSUING RESTRAINING ORDERS OR PRELIMINARY INJUCTIONS IN CASES INVOLVING GOVERNMENT INFRASTRUCTURE PROJECTS AND FOR OTHER PURPOSES"
congress_website_abstract = "No court in the Philippines, other than the Supreme Court, shall have the jurisdiction to issue restraining orders or writs of preliminary injunction, prohibitive or mandatory, in any case, dispute, or controversy involving the continuance of a public infrastructure project, whether in the bidding phase, expropriation phase or construction phase. Any restraining order, preliminary injunction or preliminary mandatory injunction issued in violation hereof is declared invalid, ineffective and of no force and effect."

