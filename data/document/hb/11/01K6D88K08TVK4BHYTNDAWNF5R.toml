congress_website_title = "AN ACT AMENDING SECTIONS 51 AND 52, BOOK V OF EXECUTIVE ORDER NUMBER 292 OTHERWISE KNOWN AS THE ADMINISTRATIVE CODE OF 1987(RE: SCOPE OF PREVENTIVE SUSPENSION)"
congress_website_abstract = "To prevent the scenario of a government official who is unable to fulfill his duties for long and almost undefinite periods of time, it is hereby proposed that Section 51 and 52, Book V of the Administrative Code of 1987 be amended to LIMIT the scope of preventive suspension to a maximum and unqualified period of sxity days upon the issuance of such suspension by the disciplining authority."
