congress_website_title = "AN ACT INCREASING THE MAXIMUM AMOUNT OF INSURED DEPOSITS, AMENDING FOR THE PURPOSE CERTAIN SECTIONS OF REPUBLIC ACT NUMBERED THREE THOUSAND FIVE HUNDRED NINETY-ONE, AS AMENDED, OTHERWISE KNOWN AS THE CHARTER OF THE PHILIPPINE DEPOSIT INSURANCE CORPORATION (PDIC)"
congress_website_abstract = "This bill proposes to INCREASE the maximum amount of insured deposits from [P100,000.00] to FIVE HUNDRED THOUSAND PESOS (P500,000.00). Proposes, likewise, to establish a deposit insurance coverage plan for deposits in excess of P500,000.00 for depositors to take at their own option."
