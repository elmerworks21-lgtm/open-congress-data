congress_website_title = "AN ACT INCREASING THE NUMBER OF QUOTA IMMIGRANTS AND SETTING THE QUALIFICATIONS OF APPLICANTS THEREOF, AMENDING FOR THE PURPOSE THE PHILIPPINE IMMIGRATION ACT OF 1940"
congress_website_abstract = "Under this Act, there may be admitted into the Philippines, immigrants, termed \"quota immigrants,\" not in excess of [Fifty (50)] TWO HUNDRED FIFTY (250) of any one nationality or without nationality, IN THE LATER CASE DECLARED AS REFUGEE BY THE UNITED NATIONS OR ANY AGENCY THEREOF, for any one calendar year, except that the following immigrants, termed 'non-quota immigrants,' may be admitted without regard to such numerical limitations."
