congress_website_title = "AN ACT SETTING ASIDE TWENTY-FIVE PERCENT (25%) OF LOCAL GOVERNMENT UNITS CALAMITY FUNDS FOR PREPARATORY ACTIVITIES, AMENDING FOR THE PURPOSE THE LOCAL GOVERNMENT CODE OF 1991, AS AMENDED"
congress_website_abstract = "This bill provides that TWENTY -FIVE PERCENT (25%) OF THE CALAMITY FUNDS SHALL BE SET ASIDE AND EXCLUSIVELY EXPENDED FOR PREPARATORY ACTIVITIES FOR CALAMITIES OR DISASTERS THAT MAY OCCUR DURING THE BUDGET YEAR WHICH ACTIVITIES SHALL INCLUDE, BUT NOTLIMITED TO DISSEMINATION OF INFORMATION ON WHAT TO DO BEFORE, DURING AND AFTER THE CALAMITY AND FOR LGU'S TO PINPOINT, REINFORCE AND STRENGTHEN RELOCATION CENTERS, PROCUREMENT OF MEDICINES, BLANKETS, FOOD AND OTHER BASIC NECESSITIES AND FOR STEPS TOBE TAKEN TO MINIMIZE, IF NOT PREVENT, LOSS OF LIVES AND DAMAGE TO PROPERTIES."
