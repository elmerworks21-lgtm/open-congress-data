congress_website_title = "AN ACT AUTHORIZING THE BANGKO SENTRAL NG PILIPINAS (BSP), PHILIPPINES DEPOSIT INSURANCE COMPANY (PDIC) AND BUREAU OF INTERNAL REVENUE (BIR) TO LOOK INTO DEPOSITS OF ANY BANKING INSTITUTION, THEREBY AMENDING REPUBLIC ACT NO. 1405, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to amend Republic Act 1405 or the bank secrecy law. It allows eaminers only from the BSP, PDIC and the BIR to look into records of desposits and transactions of banks not only to ensure that these banks are in healthy condition, butalso ensure that they are remitting the correct taxes to the government."
