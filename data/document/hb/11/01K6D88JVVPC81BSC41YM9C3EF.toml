congress_website_title = "AN ACT AMENDING REPUBLIC ACT NUMBERED EIGHTY-FOUR HUNDRED AND SEVENTY-NINE, OTHERWISE KNOWN AS THE `DOWNSTREAM OIL INDUSTRY DEREGULATION ACT OF 1998' BY PROVIDING FOR PARTIAL DEREGULATION OF THE DOWNSTREAM OIL INDUSTRY"
congress_website_abstract = "Rationale: To enhance the free market competition in the oil industry by encouraging entry of new investors, the downstream oil industry shall be partially deregulated in that the State shall exercise control over the pricing of oil products, a hearing should first be conducted before any increase or decrease in prices."

