congress_website_title = "AN ACT PENALIZING MEMBERS OF THE PHILIPPINE NATIONAL POLICE (PNP) ANTI-RIOT OR ANTI-DISPERSAL TEAM AND ITS COMMANDING OFFICERS FOR EXCESSIVE USE OF FORCE IN THE DISPERSAL OF RALLIES, PROTESTERS, STRIKES OR MASS ACTIONS AND FOR OTHER PURPOSES"
congress_website_abstract = "It shall be UNLAWFUL for any member of the PNP anti-riot or anti-dispersal team to use excessive force while dispersing rallyists, protesters, striking workers, or stundets in mass actions. It shall likewise, be unlawful for the field commanders orcommanding officers to order or let their men resort to violent approach in the dispersal of assemblies."

