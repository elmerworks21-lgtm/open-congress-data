congress_website_title = "AN ACT STRENGTHENING FURTHER THE SPECIAL PROGRAM FOR EMPLOYMENT OF STUDENTS UNDER REPUBLIC ACT NO. 7323 BY INCREASING THE INCOME REQUIREMENT FOR COVERAGE THEREIN, PROVIDING A NON-DIMINUTION AND AUTOMATIC INCREASE CLAUSES FOR ITS BUDGETARY ALLOCATION, PENALIZING THOSE WHO DISHONOR THE EDUCATION VOUCHERS, LESSENING THE COVERAGE OF EMPLOYMENT SIZE OF ESTABLISHMENT, AND MAKING IT A YEAR-ROUND ACTIVITY, AMENDING FOR THESE PURPOSES REPUBLIC ACT NO. 7323 ENTITLED `AN ACT TO HELP POOR BUT DESERVING STUDENTS PURSUE THEIR EDUCATION BY ENCOURAGING THEIR EMPLOYMENT DURING SUMMER AND/OR CHRISTMAS VACATIONS, THROUGH INCENTIVES GRANTED TO EMPLOYERS, ALLOWING THEM TO PAY ONLY SIXTY PER CENTUM OF THEIR SALARIES OR WAGES AND THE FORTY PER CENTUM THROUGH EDUCATION VOUCHERS TO BE PAID BY THE GOVERNMENT, PROHIBITING AND PENALIZING THE FILING OF FRAUDULENT AND FICTITIOUS CLAIMS, AND FOR OTHER PURPOSES"
congress_website_abstract = "With a budget of Php 60 Million when it was first introduced in 1993, the program benefited 48,121 students nationwide. Because of its inspiring success and innovative approach - private employers sharing in the cost of financing education, the SPEShas become a continuing program of the government for poor but deserving students."
