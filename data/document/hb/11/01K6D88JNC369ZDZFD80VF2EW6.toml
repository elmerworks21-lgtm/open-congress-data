congress_website_title = "AN ACT DECLARING CERTAIN ELECTION OFFENSES AS HEINOUS CRIMES, AMENDING FOR THE PURPOSE ARTICLE TWENTY-THREE OF BATAS PAMBANSA BILANG WALONG DAAN AT WALUMPO'T ISA, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE, AS AMENDED"
congress_website_abstract = "Considers the following as HEINUOUS ELECTORAL OFFENCES: (1) ballot snatching and substitution; (2) misreading of names during counting; (3) threats, intimidation, terrorism, use of fraudulent device or other forms of coercion; (4) \"dagdag-bawas\" scheme; (5) bribery; and (6) tampering of ballot election returns, minutes of voting, certificate of canvasses or any election records."

