congress_website_title = "AN ACT PROMOTING THE EXPLORATION, DEVELOPMENT AND PRODUCTION OF GEOTHERMAL RESOURCES"
congress_website_abstract = "\"Geothermal Resources Act of 1998\". Rationale: Geothermal power is a proven reliable source of energy. Because of its high reliability and large-scale power, it is used as a baseload unit in power generation. Compared with other energy resources, geothermal resources are not affected by oil price increases, drought or siltation. It is the least-cost option."

