congress_website_title = "AN ACT AMENDING SECTION 13-A OF REPUBLIC ACT NO. 8291 (GSIS ACT OF 1997) BY PRESCRIBING OTHER CONDITIONS FOR ENTITLEMENT TO THE RETIREMENT BENEFITS, UNDER SECTION 13 OF THE SAME ACT, FOR GOVERNMENT EMPLOYEE OR OFFICIAL WHO RETIRES OR HAS PREVIOUSLYRETIRED AS A RESULT OF BEING PHASED OUT AND/OR NOT RETAINED BY HIS OFFICE/BUREAU/ CORPORATION/PRI VATIZING/ABOLIS HING HIS OFFICE"
congress_website_abstract = "This bill proposes to add the following conditions for entitlement to retirement: (1) HE RETIRES OR HAS PREVIOUSLY RETIRED WITH TWENTY (20) YEARS OF SERVICE, REGARDLESS OF AGE, AS A RESULT OF THE ENACTMENT OF A SPECIAL LAW WHICH REORGANIEDd/INC ORPORATED/PRIVA TIZED/ABOLISHED HIS OFFICE AND BROUGHT ABOUT HIS EARLY RETIREMENT; AND THUS, HE IS ENTITLED TO THE OLD AGE PENSION BENEFIT/BASIC MONTHLY PENSION AFTER THE LAPSE OF FIVE (5) YEARS FROM THE DATE OF HIS RETIREMENT; AND (2) THE TOTAL REGULARRETIREMENT GRATUITY HE HAS PREVIOUSLY RECEIVED EXCLUSING ANY ADDITIONAL BENEFIT/GRATUIT Y GIVEN BY SPECIAL LAW, SHALL BE CONSIDERED AS HIS LUMP SUM BENEFIT PAYMENT."

