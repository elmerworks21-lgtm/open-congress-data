congress_website_title = "AN ACT AUTHORIZING THE DEPARTMENT OF AGRICULTURE TO ENTER INTO SHORT-TERM CONTRACTS WITH PRIVATE AGRICULTURAL EXTENSION PRACTITIONERS BASED ON QUANTIFIED TARGET ACCOMPLISHMENTS OVER SPECIFIED TIME PERIODS, COVERING SPECIFICALLY DEFINED AGRICULTURALAREAS, AND FOR DEFINITE AMOUNTS IN CONSIDERATION"
congress_website_abstract = "\"Agricultural Extension Act of 1999\". This Act shall generate direct private-sector participation in government agricultural programs by allowing the Department of Agriculture to enter into short-term contracts with single proprietorships , partnerships, corporations and/or cooperatives engaged in the practice of agricultural extension work and staffed with qualified agricultural extension personnel whenever the Secretary of Agriculture determines that there is need to supplement the existing agricultural extension personnel attached to the LGU's with agricultural extension eprsonnel belonging to contracted Private Agricultural Extension Practitioners for the purpose of expediting the implementation and monitoring of specific agriculturalproduction programs in specifically defines areas covered by said programs."
