congress_website_title = "AN ACT CREATING ADDITIONAL POSITIONS OF PROSECUTORS AND PROSECUTION ATTORNEYS THEREBY ENSURING THE ASSIGNMENT OF A PROSECUTOR OR PROSECUTION ATTORNEY IN ALL REGIONAL TRIAL COURTS, METROPOLITAN TRIAL COURTS, MUNICIPAL TRIAL COURTS IN CITIES, MUNICIPAL TRIAL COURTS AND MUNICIPAL CIRCUIT TRIAL COURTS AND APPROPRIATING FUNDS THEREFOR"
congress_website_abstract = "This bill seeks to achieve the ratio of two (2) prosecutors for every Regional Trial Court, and one (1) prosecutor for every Metropolitan Trial Court/Municipal Trial Court provided that the number of Prosecution Attorneys shall be limited to 200 positions, 100 of which shall be given salary grade 22, while 100 positions shall be given salary grade 24."
