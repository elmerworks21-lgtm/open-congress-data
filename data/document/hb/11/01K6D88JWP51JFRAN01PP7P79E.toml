congress_website_title = "AN ACT AUTHORIZING ALL LOCAL GOVERNMENT UNITS TO IMPORT AND RETAIL GASOLINE AND OTHER PETROLEUM PRODUCTS TO THEIR CONSTITUENTS AT REASONABLE PRICES"
congress_website_abstract = "All provinces, cities and municipalities will be authorized to put up gas stations to serve the needs of their respective constitutents. They will be granted the right to import gasoline and other oil products, and sell the same at the least profit,which will give them an advantage to be competitive and force the oil companies to reduce fuel prices at a reasonable level. Since they are responsive to the fuel needs of their constituent, gas stations will be established in areas not reached bythe oil companies."
