congress_website_title = "AN ACT PROVIDING FOR BENEFITS AND PRIVILEGES TO SOLO PARENTS AND THEIR CHILDREN AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Solo Parents Welfare Act.\" This Act aims to promote the family as the foundation of the nation, strengthen its solidarity and ensure its total development. Towards this end, it shall develop a comprehensive program of services for solo parents andtheir children to be carried out by the Department of Social Selfare and Development (DSWD), the Department of Health (DOH) and other related government and non-government agencies."

