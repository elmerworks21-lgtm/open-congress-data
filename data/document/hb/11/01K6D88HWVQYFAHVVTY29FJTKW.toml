congress_website_title = "AN ACT REGULATING THE LABELLING, SALE AND ADVERTISING OF CIGARETTES (AND OTHER TOBACCO PRODUCTS), PROHIBITING SMOKING IN PUBLIC CONVEYANCES AND IN ENCLOSED PUBLIC PLACES, PROVIDING PENALTIES FOR VIOLATIONS THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Comprehensive Toabacco Regulation Act of 1998\". Contains provisions on the (1) inclusion of a prominent WARNING on each package/contain er of cigarettes or tobacco products; (2) prohibition of cigarettes and toabacco sales to persons under 18 years of age; (3) ban on cigarette smoking in elementary and secondary schools; etc."
