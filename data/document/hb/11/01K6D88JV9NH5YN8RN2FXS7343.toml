congress_website_title = "AN ACT AMENDING SECTIONS 3 AND 18 OF REPUBLIC ACT NO. 7925 ENTITLED: `AN ACT TO PROMOTE AND GOVERN THE DEVELOPMENT OF PHILIPPINE TELECOMMUNICATI ONS AND THE DELIVERY OF PUBLIC TELECOMMUNICATI ONS SERVICES' BY AUTHORIZING THE NATIONAL TELECOMMUNICATIONS COMMISSION TO IMPOSE DEFAULT PROXY CEILINGS IN SETTING ACCESS FEES BETWEEN AND AMONG TELECOMMUNICATI ONS CARRIERS"
congress_website_abstract = "\"DEFAULT PROXY CEILINGS\" refer to the required rates that would apply in case of failure to agree on charges between and among local telecommunicati on carriers within the period prescribed by the National Telecommunicati ons Commission. PROVIDED THAT DEFAULT PROXY CEILINGS SHALL BE AUTOMATICALLY EFECTIVE IN THE EVENT THAT THE LOCAL EXCHANGE CARRIERS OR TELEPHONE PROVIDERS ARE UNABLE TO AGREE ON EQUITABLE INTERCONNECTION CHARGES, WITHIN THE PERIOD SPECIIFIED BY THE COMMISSION. PROVIDED FURTHERTHAT THE EFFECTIVITY OF THE DPC SHALL IMMEDIATELY CEASE ONCE THE INTERCONNECTING CARRIERS HAVE REACHED AN AGREEMENT ON THE ACCESS CHARGE OR RATE."
