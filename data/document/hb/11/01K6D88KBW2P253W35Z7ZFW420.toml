congress_website_title = "AN ACT DECLARING A NATIONAL PEACE POLICY AND FOR RELATED PURPOSES"
congress_website_abstract = "\"National Peace Policy.\" Rationale: The curret Mindanao crisis which exploded in the Summer of Year 2000 shows up the lack, among others, of a clear, comprehensive and long-term peace policy to guide the Republic and especially the President in handling, if not avoiding, such crisis of internal armed conflict which threatens the national life. A national peace policy is necessary to establish peace aas an instrument of national policy, and to establish the supremacy of peace processes as a function of civilian supremacy."
