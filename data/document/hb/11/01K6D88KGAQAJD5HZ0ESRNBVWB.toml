congress_website_title = "AN ACT ELIMINATING THE IMPOSITION OF DOCUMENTARY STAMP TAX ON SECONDARY TRADING OF FINANCIAL INSTRUMENTS, AMENDING FOR THE PURPOSE SECTION 198 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED"
congress_website_abstract = "Rationale: DST is basically a transaction cost which is ultimately borne by the users of funds. It merely adds to the cost structure that exacerbates the uncompetitivene ss of the Philippines versus its Asian neighbors. Eliminating DST on secondarytrading will greatly encourage the development of a secondary market and eventually increase tax revenues as more capital market isntruments are issued and transactions flourish."
