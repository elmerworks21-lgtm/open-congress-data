congress_website_title = "AN ACT INCLUDING MUNICIPAL WATERS IN DETERMINING INTERNAL REVENUE ALLOTMENTS (IRA) OF LOCAL GOVERNMENT UNITS, AMENDING FOR THE PURPOSE SECTION 285 OF REPUBLIC ACT NUMBERED SEVEN THOUSAND ONE HUNDRED SIXTY, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "This bill proposes to include municipal waters overs which municipalities and cities have political jurisdiction and control in the determination of the LGU share of the internal revenue allotment, amending for this purposes section 285 of RepublicAct 7160 or the Local Government Code of 1991. > The rationale for this approach is the fact that LGUs are responsible for the maintenance and sueprvision of their respective municipal waters and thereby incur costs, particularly in the protection ofthat marine environment."

