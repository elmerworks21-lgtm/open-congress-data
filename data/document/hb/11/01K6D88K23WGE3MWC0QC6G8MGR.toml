congress_website_title = "AN ACT INCREASING THE ALLOWANCE OF PERSONAL EXEMPTION FOR INDIVIDUAL TAXPAYERS AND THEIR DEPENDENTS AMENDING FOR THE PURPOSE OF SECTION 35 (A) AND (B) OF REPUBLIC ACT NO. 8424, OTHERWISE KNOWN AS THE TAX REFORM ACT OF 1997"
congress_website_abstract = "This bill provides for a basic personal exemption as follows:(1) For single individual or married individual judicially decreed as legally separated with no qualified dependents P30,000.OO;(2) For head of family P35,000.00; and (3) For each marriedindividual P42,000.00. Provides , likewise, for an ADDITIONAL exemption for DEPENDENTS in the amount of TWELVE THOUSAND PESOS (P12,000.00) for each dependent not exceeding four (4)."
