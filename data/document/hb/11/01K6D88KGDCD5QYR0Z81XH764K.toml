congress_website_title = "AN ACT APPROPRIATING SEVENTY FIVE MILLION PESOS (P75,000,000.00 ) ANNUALLY FOR THE CONGRESSIONAL MIGRANT WORKERS' SCHOLARSHIP FUND, AMENDING FOR THE PURPOSE `THE MIGRANT WORKERS AND OVERSEAS FILIPINOS ACT OF NINETEEN HUNDRED AND NINETY-FIVE'"
congress_website_abstract = "Rationale: At present, the migrant workers and/or their immediate descendants below twenty-one (21) years of age who intend to pursue courses or training primarily in the field of science and technology, are entitled to SCHOLARSHIP under the Congressional Migrant Worker's Scholarship Fund. This Fund operates mainly on the initial seed fund of Two Hundred Million Pesos (P200,000,000.0 0) sourced from the Countrywide Development fund for 1995 in equal sharing by all Members of Congress and fromthe proceeds of Lotto draws. No other fund is appropriated annually for this purpose."
