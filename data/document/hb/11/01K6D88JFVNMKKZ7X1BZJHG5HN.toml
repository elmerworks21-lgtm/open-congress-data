congress_website_title = "AN ACT AMENDING SECTION 272, CHAPTER 7, BOOK II OF THE REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE, TO INCLUDE AUGUMENTATION OF TEACHERS SALARIES AND ALLOWANCES IN THE APPLICATION OF PROCEEDS OF THE ADDITIONAL ONE PERCENT (1%) SPECIAL EDUCATION FUND (SEF) TAX"
congress_website_abstract = "The proceeds from the additional one percent (1%) tax on real property accruing to the Special Education Fund (SEF) shall be automatically released to the local school boards for the operation of and maintenance of public schools, ORGANIZATION OF EXTENSION CLASSES, and the AUGMENTATION OF TEACHERS SALARIES/ALLOWA NCES."
