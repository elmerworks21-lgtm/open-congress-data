congress_website_title = "AN ACT TO DECLARE FEBRUARY 25 OF EACH YEAR AS A NATIONAL HOLIDAY TO BE KNOWN AS THE `PEOPLE POWER DAY'"
congress_website_abstract = "Rationale: For the pst 12 years, the Philippines has been celebrating this hisatoric event on the 25th of February and it is only this year that we celebrated it on the 22nd of February. This bill intends to put this issue to rest by seeking to declare February 25 as \"People Power Day.\""

