congress_website_title = "AN ACT PROVIDING FOR THE COMPLETION OF THE DEVELOPMENT OF ABANDONED SUBDIVISION AND CONDOMINIUM PROJECTS, FURTHER AMENDING FOR THE PURPOSE PRESIDENTIAL DECREE NUMBERED NINE HUNDRED AND FIFTY SEVEN, AS AMENDED, ENTITLED \"REGULATING THE SALE OF SUBDIVISION LOTS AND CONDOMINIUMS, PROVIDING PENALTIES FOR VIOLATIONS THEREOF\", AND FOR OTHER PURPOSES"
congress_website_abstract = "Seeks to increase the performance bond filed by the developer with the Housing Land Use Development Board (HLUDB) to FIFTY PERCENT (50%) of the cost of the unfinished portion of the approved subdivision plan. Increases, likewise, the penalties for abandoning a subdivision project."
