congress_website_title = "THE OMNIBUS INVESTMENT ACT OF 1999"
congress_website_abstract = "\"THE OMNIBUS INVESTMENTS ACT OF 1999\". Rationale: This proposed legislation on the rationalization of investment incentives will pave the way for an incentive system that is consolidated and highly focused, cost-effective in promoting investments, time-bound and simple to administer. This rationalization is necessary in order to meet, among others, the following objectives: to address the intense competition for foreign direct investment in the Asian region; to bring the country's incentive schemes in line with those in the ASEAN; and to achieve harmony with the WTO agreements, particularly on subsidies and countervailing measures."
