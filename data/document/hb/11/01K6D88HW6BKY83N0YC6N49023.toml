congress_website_title = "AN ACT PROVIDING OMNIBUS AMENDMENTS TO PRESIDENTIAL DECREE NO. 857, OTHERWISE KNOWN AS THE REVISED CHARTER OF THE PHILIPPINE PORTS AUTHORITY (PPA), AS AMENDED, TO STRENGTHEN AND STREAMLINE THE AUTHORITY, AND FOR OTHER PURPOSES"
congress_website_abstract = "Aims to address the urgent need to introduce a more effective and supportive privatization, deregulation, liberalization and devolution of power by the Philippine Ports Authority and for it to be able to participate ably in international competitionor globalization of services. Provides protection to the employees of the Authority and the private ports operators who will be affected adversely by the reeingineering process."
