congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 6971, OTHERWISE KNOWN AS THE PRODUCTIVITY INCENTIVES ACT OF 1990(RE: PRODUCTIVITY AND PERFORMANCE INCENTIVES AND GAINSHARING ACT OF 1998)"
congress_website_abstract = "\"Productivity AND PERFORMANCE Incentives and GAINSHARING Act of [1990] 1998\". Seeks to strengthen further the cooperation between labor and capital by ensuring workers of a just SHARE in the fruits of their labor in relation to the profit yielded to the employer. The GAINSHARING SYSTEM may be in the form of (1) productivity bonus; (2) performance bonus; (3) production bonus; (4) employee stock option plan."
