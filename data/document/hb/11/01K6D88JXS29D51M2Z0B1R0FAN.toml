congress_website_title = "AN ACT RESTORING THE TAX EXEMPTION PRIVILEGES OF LOCAL WATER DISTRICTS UNDER SECTION 46 OF PRESIDENTIAL DECREE NO. 198 AS AMENDED AND FOR OTHER PURPOSES"
congress_website_abstract = "Water is basic to man's needs. The government should continually support the water industry, which requires MASSIVE INVESTMENT OUTLAY WITH LONG GESTATION PERIOD OF RECOVERY - 50 YEARS OR MORE, BEFORE THE INIITIAL INVESTMENT IS RECOVERED. To incorporate the taxes waived in the oeprating cost will place the water district in bad light and with their services at stake. For the good of society, our people should have continuous and convenient acess to water facilities."
