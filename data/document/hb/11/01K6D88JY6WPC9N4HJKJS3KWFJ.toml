congress_website_title = "AN ACT PROVIDING FOR THE STRENGTHENING OF NONFORMAL EDUCATION BY CREATING ITEMS FOR DISTRICT NONFORMAL EDUCATION COORDINATORS AND TEACHERS AND FOR OTHER PURPOSES"
congress_website_abstract = "The position of district non-formal education coordinator is hereby created in every school district in the Philippines. Elementary grade teachers who are actually designated and performing the duties and functions of a district non-formal educationcoordinator shall have the rank and privileges of an elementary school principal subject to adjustments approved by the Department of Budget and Management (DBM). >There shall also be created items for at least two teachers for non-formal educationin each school district under the Bureau of NON-formal Education, Department of Education, culture and Sports (DECS). Each NFE teacher shall have the rank and privileges of a regular teacher under the DECS."
