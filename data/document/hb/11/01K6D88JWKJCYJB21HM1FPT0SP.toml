congress_website_title = "AN ACT GRANTING ALL EMPLOYEES OF THE GOVERNMENT AND ITS INSTRUMENTALITI ES A MILLENNIAL BONUS EQUIVALENT TO UP TO TWO (2) MONTHS OF THEIR PRESENT SALARY NOT LATER THAN THE SECOND WEEK OF DECEMBER 1999"
congress_website_abstract = "\"Millennial Bonus Act of 1999\". The millennial bonus herein proposed shall be given in recognition of the collective contribution of the civil service in effective governance, national development, and the strengthening of our country's democraticfoundations. Likewise, the bonus is hereby proposed as an added incentive for those in the civil service to further enhance their commitment to the growth and development of the bureaucracy as a major pillar of national development."

