congress_website_title = "AN ACT ADJUSTING THE RATE OF SUBSIDIARY IMPRISONMENT FROM ONE DAY FOR EACH EIGHT PESOS (P8.00) TO ONE DAY FOR AN AMOUNT EQUIVALENT TO THE MINIMUM WAGE OF A LABORER IN THE NATIONAL CAPITAL REGION, AMENDING FOR THE PURPOSE ARTICLE 39 OF ACT NO. 3815,OTHERWISE KNOWN AS THE REVISED PENAL CODE, AS AMENDED BY REPUBLIC ACT NO. 5465"
congress_website_abstract = "Rationale: The reason for the adjustment is necessitated by the fact that the current rate of \"one day for each P8.00\" subsidiary imprisonment is no longer realistic vis-a-vis the prevailing minimum wage rate."
