congress_website_abstract = "This provides that a Bereavement Leave of Five Working Days with Pay be offered as a benefit to all memners of the Government Service Insurance System (GSIS) and Social Security System (SSS). In so doing the employee is asured of adequate time considertation to take care of the needs attendant to the death of his loved one while providing him an opportunity to commiserate with his other relatives."
