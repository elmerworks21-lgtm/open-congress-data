congress_website_abstract = "Reasons that the tamaraw can only be found in the Philippines, unlike carabaos which are also found in several Asean countries. Therefore, if there should be a national symbol which would represent a country's distinct characteristics , it would beprudent to choose an icon that is naturally occurring in that country."

