congress_website_title = "AN ACT EXEMPTING THE MEMBERS OF THE NATIONAL PROSECUTION SERVICE FROM THE COVERAGE OF REPUBLIC ACT NO. 6758, OTHERWISE KNOWN AS THE SALARY STANDARDIZATION LAW"
congress_website_abstract = "This proposed bill seeks to exempt from the coverage of the Salary Standardization Law the members of the National Prosecution Service. This is to give due recognition to their contribution in the fight against crime and at the same time to provideadequate incentive for them to stay in the government service, to attract more qualified men and women in the Service which at present suffers from a vacancy of more than 300 positions and to hasten the investigative process and quality of prosecution service in the country."
