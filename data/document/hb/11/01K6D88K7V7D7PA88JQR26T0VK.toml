congress_website_title = "AN ACT TO REGULATE THE CARRYING OF FIREARMS, PROVIDE PENALTIES FOR ITS VIOLATION AND FOR OTHER PURPOSES"
congress_website_abstract = "\"Gun-bearing Act of 2000\". Rationale: It is very important that the government regulate the use and carrying of firearms especially in public places to promote peace and security. This bill, therefore, advocates a clearer and more systematic processof regulating gun ownership and movement. It pushes for the CONFISCATION of illegal firearms to help prevent the commission of crimes. It also seeks to LIMIT the public carrying of firearms to agents of the Government who are responsible for maintaining peace and order. On the other hand, it will not impair the privilege of citizens to keep licensed firearms at home for protection or at gun clubs for sports purposes."
