congress_website_title = "AN ACT DECLARING THE ABACA AS THE PHILIPPINE NATIONAL FIBER"
congress_website_abstract = "Rationale: Philippine abaca is part of our history and cultural heritage. It has sustained the domestic economy durng the struggle years of our country and eventually has helped make the Philippines known in the international market. It spotentialcontribution in the conservation of the forest resources cannot be underestimated. There is not other natural fiber in the world today that could come close to the superior and versatile qualities of the abaca, and it is with pride that we should recognize and uphold the importance of thus truly Filipino fiber. It is, therefore, most fitting and appropriate to declare the abaca as the Philippine National Fiber."
