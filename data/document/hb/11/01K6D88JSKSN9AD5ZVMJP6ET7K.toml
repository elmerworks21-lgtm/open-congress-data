congress_website_title = "AN ACT WITHDRAWING THE AUTHORITY OF THE DEPARTMENT OF EDUCATION, CULTURE AND SPORTS TO ESTABLISH, RENAME, CONVERT, INTEGRATE AND SEPARATE PUBLIC SECONDARY SCHOOLS, AMENDING FOR THE PURPOSE, THE \"FREE PUBLIC SECONDARY EDUCATION ACT OF 1988"
congress_website_abstract = "RA No. 6655 vested in the DECS the authority to establish, rename, convert, integrate and separate public secondary schools in order to facilitate the process of creating new public high schools. However, on April 28, 1999, DECS MEMORANDUM ORDER NO. 42 declared a moratorium on the establishment of new high schools, opening of extension classes, separation and conversion of school. This bill is intended to CORRECT the tendencies of some agencies to implement rules over and above the prerogative of Congress to enact laws."

