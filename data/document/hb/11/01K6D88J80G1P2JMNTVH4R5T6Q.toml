congress_website_title = "AN ACT PROVIDING FOR CERTAIN CRITERIA TO BE CONSIDERED AND COMPLIED WITHIN THE PRIVATIZATION OF GOVERNMENT-OWNE D AND/OR -CONTROLLED CORPORATIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationale: In the haste to raise money by selling government-owne d assets, some problems may have been overlooked: (1) Privatization may cause economic dislocation; (2) Privatization could exacerbate market imperfections, etc. Government should therefore provide firmer criteria for privatization."

