congress_website_title = "AN ACT FURTHER INCREASING THE INSURANCE BENEFITS OF LOCAL GOVERNMENT OFFICIALS, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIXTY-NINE FORTY-TWO ENTITLED \"AN ACT INCREASING THE INSURANCE BENEFITS OF LOCAL GOVERNMENT OFFICIALS AND PROVIDING FUNDSTHEREFOR"
congress_website_abstract = "This bill seeks to grant death and burial benefits to the beneficiaries of LGU officials as follows: (1) P40,000.00 - Punong barangay, member of the sangguniang panlalawigan, panlungsod or bayan; (2) P20,000.00 - sangguniang barangay members, secretary, treasurer, and Kabataang Barangay chairman. An additional P6,000.00 burial benefit shall likewise be paid to the beneficiaries. Other insurance benefits are, likewise, proposed to be granted."

