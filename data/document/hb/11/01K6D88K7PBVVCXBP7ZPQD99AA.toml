congress_website_title = "AN ACT TO PROHIBIT AND PENALIZE THE USE OF CERTAIN PORTABLE ELECTRONIC DEVICES ON BOARD PHILIPPINE AIR CARRIERS WHETHER COMMERCIALLY OR PRIVATELY-OWNED AND/OR OPERATED FLYING OVER PHILIPPINE AIRSPACE"
congress_website_abstract = "It shall be unlawful for any person to oeprate at all times any protable electronic devices which tansmits radio signals while in the aircraft. These include, but are not limited, to amateur radio transceivers, citizens band radios, pagers, cellularphones, text messaging devices, remote control devices, other electronic devices and all other types of portable radio transceivers, whose operation in flight, the carrier or commercial operator herafter determines may likewise endanger the safety of flight. An aircarft is in flight from the moment all its external doors are closed following embarkation until any of such doors are opened for disembarkation."
