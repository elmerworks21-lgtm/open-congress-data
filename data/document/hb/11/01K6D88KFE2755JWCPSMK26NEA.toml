congress_website_title = "AN ACT REVISING THE EXCISE TAX SYSTEM ON FERMENTED LIQUORS, CIGARS AND CIGARETTES, AMENDING FOR THE PURPOSE SECTIONS 143 AND 145 OF THE NATIONAL INTERNAL REVENUE CODE, AS AMENDED, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to revise the excise taxation imposed on fermented liquor, cigar and cigarettes from specific to ad valorem tax system. It proposes the following rate of tax based on the constructive brewer's/manufa cturer's or importer's wholesaleprice or the actual brewer's/manufa cturer's or importer's wholesale price, whichever is higher: on fermented liquors: a three-tiered rate of 40%, 45% and 50%, on cigars, a rate of 10%, on cigarettes packed by hand, a rate of 15% and on cigarettes packed by machine, a three-tiered rate of 40%, 60% and 70%."

