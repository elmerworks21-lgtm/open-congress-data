congress_website_title = "AN ACT TO IMPOSE CRIMINAL LIABILITY UPON PUBLIC OFFICERS WHO MALICIOUSLY OR NEGLIGENTLY FAIL TO TESTIFY IN COURT, AMENDING FOR THE PURPOSE ARTICLE 208 OF THE REVISED PENAL CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "THE PENALTY OF PRISON CORRECCIONAL IN ITS MAXIMUM PERIOD AND PERPETUAL OR TEMPORARY SPECIAL DISQUALIFICATIO N TO HOLD PUBLIC OFFICE SHALL BE IMPOSED UPON ANY PUBLIC OFFICER OR OFFICER OF THE LAW, WHO, IN DERELICTION OF THE DUTIES OF HIS OFFICE, SHALL MALICIOUSLY OR NEGLIGENTLY FAIL TO TESTIFY IN COURT, AFTER HAVING BEEN DULY SERVED WITH A SUBPOENA, THEREBY RESULTING TO THE DISMISSAL OF THE CASE."
