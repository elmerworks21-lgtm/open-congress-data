congress_website_title = "AN ACT GRANTING DIFFICULTY DIFFERENTIAL TO GOVERNMENT EMPLOYEES, AND FOR OTHER PURPOSES"
congress_website_abstract = "Grants a monthly DIFFICULTY DIFFERENTIAL amounting to ten (10%) percent of a government employee's basic salary for each of the following factors: (1) mode of access and distance ; (2) absence of electricity; (3) absence of running water/waterworks system; (4) absence of primary health care facility, except that which the employee is supposed to man, in the case of health workers; and (5) absence of school, except that which the employee is supposed to man, in the case of teachers."

