congress_website_title = "AN ACT REQUIRING MEDICAL, DENTAL AND VETERINARY PRACTITIONERS TO WRITE PRESCRIPTIONS USING ONLY THE GENERIC NAME THEREBY AMENDING SECTIONS SIX (B) AND TWELVE (A) OF ACT NUMBERED SIX THOUSAND SIX HUNDRED SEVENTY-FIVE, OTHERWISE KNOWN AS THE GENERIC LAW"
congress_website_abstract = "NO BRAND NAME SHALL BE ADDED TO THE PRESCRIPTION. THE PRACTITIONER OR HIS EMPLOYEE, REPRESENTATIVE OR AGENT SHALL NOT MAKE ANY STATEMENT, MARK, OR CODE IN THE PRESCRIPTION OR CAUSE ANY ACUTATION THAT WILL INDUCE, INFLUENCE OR MOTIVATE THE PATIENT INTO BUYING EQUIVALENT BRANDED MEDICINE OR DRUG, OR THAT WILL INDUCE, INFLUENCE, MOTIVATE OR SIGNAL A MEDICINE OR DRUG DISPENSER TO SELL BRANDED MEDICINE OR DRUG TO THE PATIENT OR HIS REPRESENTATIVE. THE DISPENSER SHALL NOT IN ANY WAY INDUCE, INFLUENCEOR MOTIVATE THE PATIENT OR HIS REPRESENTATIVE TO PURCHASE BRANDED MEDICINE OR DRUG OVER THE GENERIC EQUIVALENT."

