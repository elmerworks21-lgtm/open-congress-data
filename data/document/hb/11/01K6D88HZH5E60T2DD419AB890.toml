congress_website_title = "AN ACT AUTHORIZING THE ADMINISTRATOR OF THE NATIONAL STATISTICS OFFICE TO CORRECT CLERICAL OR TYPOGRAPHICAL ERROR TO THE CIVIL REGISTRY BOOKS WITHOUT NEED FOR JUDICIAL ACTION, AMENDING FOR THE PURPOSE ARTICLE 412 OF THE CIVIL CODE OF THE PHILIPPINES, AS AMENDED"
