congress_website_title = "AN ACT ABOLISHING THE PRESIDENTIAL COMMISSION ON GOOD GOVERNMENT (PCGG) AND TRANSFERRING ITS POWERS AND FUNCTIONS TO A SPECIAL COMMITTEE UNDER THE OFFICE OF THE PRESIDENT"
congress_website_abstract = "Creates the SPECIAL COMMITTEE FPR SEQUESTERED ASSETS AND PROPERTIES under the Office of the President where all the powers and functions of the PCGG will be transferred therein. Mandates the imemdiate physical inventory and complete accounting of all the sequestered and frozen properties and assets by the Special Committee in coordination with the Commission on Audit."
