congress_website_title = "AN ACT AMENDING SECTION 12 OF PRESIDENTIAL DECREE EIGHTEEN HUNDRED AND SIXTY-NINE (P.D. 1869), OTHERWISE KNOWN AS PAGCOR CHARTER AND FOR OTHER PURPOSES(RE: ADDITIONAL FUNDING FOR EDUCATION AND ANTI-POVERTY PROGRAMS)"
congress_website_abstract = "THE PHILIPPINE AMUSEMENT AND GAMING CORPORATION (PAGCOR) IS ALSO MANDATED TO SET ASIDE FIFTY PERCENT (50%) OF ALL INCREMENT FROM ITS 1999 ANNUAL GROSS EARNINGS AS ADDITIONAL FUNDING TO THE DEPARTMENT OF EDUCATION CULTURE AND SPORTS (DECS) TO BE USEDEXCLUSIVELY IN THE CONSTRUCTION OF ADDITIONAL SCHOOLBUILDINGS , TEXTBOOKS, DESKS AND TRAINING OF TEACHERS. PROVIDED, HOWEVER, THT THE BALANCE OF FITY EPRCENT (50%) FROM ALL INCREMENT FROM ITS 1999 GROSS EARNING SHALLS ERVE AS AN ADDITIONAL FUNDING TO THE ANTI-POVERTY PROGRAM OF THE GOVERNMENT."

