congress_website_title = "AN ACT PROVIDING FOR THE HEALTH SERVICE DELIVERY ENHANCEMENT PROGRAM, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"health Service Delivery Enhancement Act of 2000.\" Rationale: Recently, the Department of Helath (DOH) has launched a health sector reform agenda that aims to reform the health sector to be incentive-motiv ated and performance-dri ven. This will package the country's health resources in a way that ensures that each and every Filipino will have access to safe, quality and affordable health care products, facilities and services. > However, the Health Sector Reform Agenda needs support from thelegislature. We must help invest money on developing an incentive-motiv ated and performance-dri ven health care system that will produce maximum efficiency in the provision of quality health services. We must appropriate money that ensures maximum rreturn for our spending in terms of health benefits. when enacted, this bill will breathe life to this proposal."

