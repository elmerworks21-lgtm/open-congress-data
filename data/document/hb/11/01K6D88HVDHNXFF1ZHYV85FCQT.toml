congress_website_title = "AN ACT LIMITING THE USE OF DULY REGISTERED AND MARKED BOTTLES AS CONTAINERS OF 'SISI', 'BAGOONG', 'PATIS' AND SIMILAR NATIVE PRODUCTS TO SMALL SCALE PRODUCERS, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBERED SIX HUNDRED AND TWENTY-THREE, AS AMENDED,ENTITLED 'AN ACT TO REGULATE THE USE OF DULY STAMPED OR MARKED BOTTLES, BOXES, CASKS, KEGS, BARELLS AND OTHER SIMILAR CONTAINERS'"
congress_website_abstract = "Declares that PRODUCERS OF SMALL-SCALE PRODUCTS MANUFACTURED MAINLY BY THE MEMBERS OF THE FAMILY IN THE HOME OF THE PRODUCER, AND USING NOT MORE THAN P30,000.00 CAPITAL may use said marked bottles as containers for their products."

