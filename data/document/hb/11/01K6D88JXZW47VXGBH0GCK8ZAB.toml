congress_website_title = "AN ACT ESTABLISHING A UNIFORM SYSTEM OF RETIREMENT AND SEPARATION BENEFIT FOR THE UNIFORMED PERSONNEL OF THE DEPARTMENT OF THE INTERIOR AND LOCAL GOVERNMENT, AMENDING SECTION 34 OF REPUBLIC ACT NO. 8551, AND FOR OTHER PURPOSES"
congress_website_abstract = "\"DILG Uniformed Ppersonnel Retirement and Separation Benefit System of 1999\". The proposed bill is a consolidation of various existing laws pertaining to the retirement and separation benefits previously received, extended, ganted and entitled to receive by former members of the defunct PC and INP before the creation of PNP, BFP and BJMP. There is a perceived need to clarify, restore and to provide some of the uniformed personnel of the DILG, since the merger of the defunct PC and INP under RA6975 has brought to for some problems pertaining to retirement which is imperative to be addressed through an appropriate legislation."

