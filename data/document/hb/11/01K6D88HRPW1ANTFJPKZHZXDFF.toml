congress_website_title = "AN ACT PROVIDING FOR THE AUTOMATIC HOLDING OF SPECIAL ELECTIONS WHENEVER A VACANCY OCCURS IN THE HOUSE OF REPRESENTATIVES , AMENDING FOR THE PURPOSE REPUBLIC ACT NO. 6645, OTHERWISE KNOWN AS 'AN ACT PRESCRIBING THE MANNER OF FILLING A VACANCY IN THECONGRESS OF THE PHILIPPINES,' AS AMENDED BY REPUBLIC ACT NO. 7166"
congress_website_abstract = "Amends RA 6645 to eliminate the need for a resolution from the House of Representatives so that the Commission on Elections (COMELEC) can immediately hold special elections whenever a vacancy occurs in the House of Representatives upon receipt of anofficial communication from the Speaker of the House of Representatives certifying to the existence of such vacancy and calling for such special election."
