congress_website_title = "AN ACT RATIONALIZING THE PARTY-LIST SYSTEM OF REPRESENTATION IN THE HOUSE OF REPRESENTATIVES , AMENDING FOR THE PURPOSE SECTION 5 AND SECTION 10 OF REPUBLIC ACT NO. 7941, OTHERWISE KNOWN AS THE \"PARTY-LIST SYSTEM ACT\""
congress_website_abstract = "Prescribes the conditions for a political party or sectoral party to be registered --- (1) That the party's constituency is spread over the geographical terriroty of at least a majority of the regions; (2) That the sectoral party can show proof thatit represents the interest and concerns of at least 300,000 Filipino citizens belonging to the sector it seeks to represent. Every voter shall be entitled to THRITEEN (13) VOTES. A voter shall vote for only ONE (1) candidate for each sector he wantsto be represented in the House of Representatives ."
