congress_website_title = "AN ACT STRENGTHENING THE MECHANISMS FOR THE IMPOSITION OF COUNTERVAILING DUTIES ON IMPORTED SUBSIDIZED PRODUCTS, COMMODITIES OR ARTICLES OF COMMERCE IN ORDER TO PROTECT DOMESTIC INDUSTRIES FROM UNFAIR COMPETITION AND TO CONFORM WITH THE PROVISIONS OF THE GATT URUGUAY ROUND FINAL ACT, AMENDING FOR THE PURPOSE SECTION 302, PART 2, TITLE II, BOOK I OF PRESIDENTIAL DECREE 1464, OTHERWISE KNOWN AS THE TARIFF AND CUSTOMS CODE OF THE PHILIPPINES, AS AMENDED"
congress_website_abstract = "Provides the policies governing the levy of a COUNTERVAILING DUTY, such as that said duty SHALL BE EQUAL THE ASCERTAINED AMOUNT OF SUBSIDY."
