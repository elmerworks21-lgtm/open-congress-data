congress_website_title = "AN ACT AMENDING CERTAIN SECTIONS OF REPUBLIC ACT NUMBER SIX THOUSAND SIX HUNDRED SEVENTY-FIVE, OTHERWISE KNOWN AS THE GENERICS ACTS OF 1988, AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill seeks to amend Republic Act 6675 which is aimed at ensuring stronger deterrence against dubious profit-oriented pharmaceutical companies and distributors which, like leeches, will continuously suck blood from many of the poor Filipinos. To protect the public from these elements in the pharmaceutical industry, this proposed legislation attempts to add the following provisions: (1) definition and requirements for quality control standards; and (2) stiffer provision on quality, manufacturer's identity and responsibility."

