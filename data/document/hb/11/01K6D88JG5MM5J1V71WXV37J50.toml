congress_website_title = "AN ACT EXTENDING THE DUTY-FREE SHOPPING PRIVILEGE OF THE BALIKBAYAN FROM FORTY-EIGHT HOURS TO THIRTY DAYS FROM ARRIVAL DURING THE CHRISTMAS SEASON, AMENDING FOR THE PURPOSE SECTION 4(b) OF REPUBLIC ACT NO. 6768"
congress_website_abstract = "Purchases shall be made within forty-eight (48) hours from date of arrival EXCEPT DURING THE CHISTMAS SEASON, RECKONED FROM NOVEMBER 15 TO JANUARY 15 OF EACH YEAR, WHEN THE TAX-FREE PRIVILEGE IS EXTENDED TO THIRTY (30) DAYS FROM DATE OF ARRIVAL."
