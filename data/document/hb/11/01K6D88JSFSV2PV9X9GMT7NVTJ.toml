congress_website_title = "AN ACT AMENDING SECTIONS 99 AND 262 OF BATAS PAMBANSA BLG. 881, AS AMENDED, OTHERWISE KNOWN AS THE OMNIBUS ELECTION CODE, AND FOR OTHER PURPOSES(RE: CONTRIBUTION TO ANY CANDIDATE FOR CAMPAIGN PURPOSES...)"
congress_website_abstract = "ANY CONTRIBUTION IN CASH OR IN KIND TO ANY CANDIDATE OR POLITICAL PARTY OR COALITION OF PARTIES FOR CAMPAIGN PURPOSES DULY REPORTED TO THE COMMISSION IN ACCORDANCE WITH SECTION 98 AND 99 HEREOF SHALL NOT BE SYBJECT TO THE PAYMENT OF ANY GIFT TAX: PROVIDED, THAT ANY PERSON WHO FAILS TO COMPLY WITH SAID SECTIONS SHALL BE SUBJECT TO SUCH ADMINISTRATIVE SANCTIONS AS THE COMMISSION MAY IMPOSE INCLUDING ADMINISTRATIVE FINE RANGING FROM ONE THOUSAND PESOS (P1,000.00) TO THIRTY THOUSANS PESOS (P30,000.00) FOR THE FIRST VIOLATION AND TWO THOUSAND PESOS (P2,000.00) TO SIXTY THOUSAND PESOS (P60,000.00) FOR SUBSEQUENT VIOLATIONS."
