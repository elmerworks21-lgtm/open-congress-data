congress_website_title = "AN ACT RESTORING THE TAX EXEMPTION PRIVILEGES OF LOCAL WATER DISTRICTS UNDER SECTION 46 OF PRESIDENTIAL DECREE NO. 198, AS AMENDED AND FOR OTHER PURPOSES"
congress_website_abstract = "Section 46 of Presidential Decree Number 198, as amended, granting TAX EXEMPTION PRIVILEGES to local water districts is hereby RESTORED and shall be effective for a period of ten (10) years from approval of this Act. Water districts shall likewise be exempted from the provision of Republic Act Number 7656 requiring government-owne d and controlled corporations (GOCCs) to remit fifty percent (50%) of their annual net income to the National Government, provided that, the amount supposed to be remitted is utilized by the water district concerned for the continuing and improvement of its system."
