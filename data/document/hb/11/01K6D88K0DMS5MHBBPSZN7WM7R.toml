congress_website_title = "MAGNA CARTA FOR CUSTOMS BROKER PROFESSION"
congress_website_abstract = "\"Customs Brokers Act of the Philippines.\" A CUSTOMS BROKER is an expert in customs laws, tariff laws, and other related laws, customs procedures, and import and export matters. This bill provides for (1) the qualifications of applicants for a customs broker's certificate, and (2) the practice and regulation of the profession."

