congress_website_title = "AN ACT REQUIRING THE PUBLICATION IN THREE (3) NEWSPAPERS OF NATIONAL AND GENERAL CIRCULATION THE LIST OF RECOMMENDEES FOR EXECUTIVE CLEMENCY, PENALIZING THE FAILURE THEREOF, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
congress_website_abstract = "The Board of Pardons and Parole shall publish in at least three (3) newspapers of national and general circulation the names of convicts recommended for executive clemency, with their corresponding offenses and the places where committed. The publication of the names of the recommendees for executive clemency shall be made at least thirty (30) days prior to the submittal by the Chairman of the Board of Pardons and Parole to the President of the Philippines of the list of recommendees for executive clemency."
