congress_website_title = "AN ACT AMENDING SECTION 26 OF REPUBLIC ACT NO. 7166, FURTHER AMENDING THE OMNIBUS ELECTION CODE"
congress_website_abstract = "This bill provides THAT THE WATCHERS FROM THE MAJORITY PARTY AND FROM THE DOMINANT OPPOSITION PARTY SHALL BE PAID AN AMOUNT BY THE GOVERNMENT THROUGH THE COMMISISON ON ELECTIONS IN THE FORM OF AN HONORARIUM. Official watchers are the ones exposed tothe long hours of election process where vigilance is the rule and where no sleep, and if possible, no eat is a must. It is but fitting that the government give due recognition to their heroic service by giving them honorarium."
