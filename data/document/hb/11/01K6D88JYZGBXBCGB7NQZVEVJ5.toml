congress_website_title = "AN ACT AMENDING THE PROVISION OF EXECUTIVE ORDER NO. 259, `AN ACT TO RATIONALIZE THE SOAP AND DETERGENT SURFACTANT INDUSTRY AND THEREBY, PROMOTE AND EXPAND THE UTILIZATION OF CHEMICALS DERIVED FROM COCONUT OIL AND FOR OTHER PURPOSES (NATURAL OLEOCHEMICAL CONTENT)"
congress_website_abstract = "The soap and detergent surfactant industry shall be subject to a rationalization program requiring NATURAL OLEOCHEMICAL CONTENT [increasing local content] in the usage of its raw materials [which do not endanger the environment] to a minimum of [20%in the first uear, 40% the second year, up to a minimum of] 60% [for the third year and thereafter] UPON THE EFFECTIVITY OF THE ACT."
