congress_website_title = "AN ACT REQUIRING THIRD PARTY LIABILITY INSURANCE COVERAGE AGAINST DAMAGE TO PROPERTY FOR ALL MOTOR VEHICLES"
congress_website_abstract = "All motor vehicles shall be covered with third party liability insurance against damage to property for a minimum amount of Twenty Thousand Pesos (P20,000.00) as a condition for original registration or every renewal thereof. This shall be in addition to the present party liability insurance against personal injuries required by the Land Transportation Office (LTO) upon registration of motor vehicles."
