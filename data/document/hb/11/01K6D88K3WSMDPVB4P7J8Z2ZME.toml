congress_website_title = "AN ACT REGULATING THE OPERATION OF TAXI UNITS AND CONSOLIDATION OF ALL EXISTING RULES AND REGULATIONS GOVERNING THE SAME"
congress_website_abstract = "\"Taxi Regulation Act of 2000\". Rationale: The Land Transportation Franchising and Regulatory Board (LTFRB) has always been the recepient of mounting complaints for various abuses committed by taxi drivers for contracting with passengers instead of using their taximeters, choosing or refusing to convey passengers especially upon learning of their short destinations, arrogance, discourtesy, installing fast meters, and other similar acts. For these reasons, the proposed measure has been prepared to put together existing relevant regulations and combine them with new regulations for the operation of taxi units."
