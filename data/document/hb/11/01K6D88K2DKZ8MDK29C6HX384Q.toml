congress_website_title = "AN ACT ENSURING SECURITY OF TENURE FOR AGRARIAN REFORM BENEFICIARIES OVER LANDS AWARDED TO THEM UNDER THE COMPREHENSIVE AGRARIAN REFORM PROGRAM, PROVIDING GUIDELINES FOR THE CANCELLATION OF EMANCIPATION PATENTS AND CERTIFICATES OF LAND OWNERSHIP AWARDS, PENALTIES FOR VIOLATION THEREOF AND FOR OTHER PURPOSES"
congress_website_abstract = "This bill affirms the INDEFEASIBILITY of emancipation patents (EPs) or certificates of land ownership awards (CLOAs). As such EPs and CLOAs shall enjoy the same SECURITY afforded to all titles registered under the Torrens system of registration."
