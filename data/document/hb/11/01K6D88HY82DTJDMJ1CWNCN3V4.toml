congress_website_title = "AN ACT INCREASING THE AMOUNT TO BE DEDUCTED FROM THE GROSS INCOME EARNED BY ALL BUSINESSES AND ENTERPRISES WITHIN ECOZONES, FIXING THE SHARE OF LOCAL GOVERNMENT UNITS AT FIVE PERCENT (5%) THEREOF, AND PROVIDING FOR THE REMITTANCE OF SUCH SHARES DIRECTLY TO THE LOCAL GOVERNMENT UNITS CONCERNED, AMENDING FOR THE PURPOSE THE SPECIAL ECONOMIC ZONE ACT OF 1995"
congress_website_abstract = "Increased the taxes imposed on all businesses and enterprises operating within the ECOZONES to EIGHT PERCENT (8%) of their gross income earned for remittance to the national government to be alloted as: (1) three percent (3%) to the national government; (2) four percent (4%) to the local government units affected by the declaration of the ECOZONES; and (3) one percent (1%) for the establishment of a development fund to be utilized for the development of municipalities outside and contiguous toeach ECOZONE."
