congress_website_title = "AN ACT PROHIBITING THE PRACTICE OF OFFERING, GIVING OR ATTEMPTING TO GIVE OF OFFER, OR ACCEPTING A KICKBACK IN ANY KIND OF COMMERCIAL TRANSACTIONS, AND FOR OTHER PURPOSES"
congress_website_abstract = "Defines \"KICKBACK\" as money, fee, comission, credit, gift, gratuity, thing of value or compensation of any kind given directly or indirectly by a contractor, employee representative or agent, seller, lessor, lessee, owner or buyer in exchange for favorable treatment in a transaction. Declares the practice punishable by imprisonment from five (5) to 20 years, a fine of P5,000.00 or three (3) times the amount of the value involved."
