congress_website_title = "AN ACT STRENGTHENING EMPLOYEES' SECURITY OF TENURE, AMENDING FOR THIS PURPOSE ARTICLES 106 AND 280 OF PRESIDENTIAL DECREE NUMBER 442, OR THE LABOR CODE OF THE PHILIPPINES BY ADDING ARTICLES 106-A ON EXAMPLES OF LABOR-ONLY CONTRACTING PRACTICES; ARTICLE 106-B ON THE EFFECT OF THE COMMISSION OF LABOR-ONLY CONTRACTING; ADDING A LAST SENTENCE TO ARTICLE 280 ON EMPLOYMENT DURING EXTRAORDINARY BUT TEMPORARY SURGE IN DEMAND FOR PRODUCTS; NEW PARAGRAPH 2 FOR ARTICLE 280 ON REGULAR EMPLOYMENT FOR EMPLOYEES OF LABOR-ONLY CONTRACTING SCHEMES; NEW PARAGRAPH 3 ARTICLE 280 ON SEASONAL EMPLOYEES ACQUIRING REGULAR EMPLOYMENT STATUS IN CERTAIN CONDITIONS; NEW ARTICLE 280-A ON EMPLOYEES ATTAINING REGULAR EMPLOYMENT STATUS AS A RESULT OF REPEATED REHIRING BY THE SAME EMPLOYER; NEW ARTICLE 280-B FOR ON-THE-JOB TRAINEES AND LEARNERS; AND DELETING THE LAST SENTENCE OF THE 2ND PARAGRAPH OF ARTICLE 280 ON A CASUAL EMPLOYMENT BECOMING REGULAR WITH RESPECT TO THE ACTIVITY IN WHICH HE IS EMPLOYED WHICH SHALL CONTINUE WHILE SUCH ACTIVITY EXISTS, AND PROVIDING PENALTIES FOR THEIR VIOLATIONS"
