congress_website_title = "AN ACT AMENDING SECTION 91 OF REPUBLIC ACT 8424, OTHERWISE KNOWN AS THE TAX REFORM ACT OF 1997 (NATIONAL INTERNAL REVENUE CODE)"
congress_website_abstract = "Gives the heirs of the decedent the opportunity to pay the gross estate tax on the properties included in the estate, per property, meaning, the heirs can pay first the estate tax on one property, to be able to cause the transfer of the said property to the heirs or one of the heirs, of for the latter to be able to sell the same and the proceeds to be used as payment for the other estate tax, and so forth."
