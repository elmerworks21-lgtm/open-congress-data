congress_website_title = "AN ACT EXPANDING THE SCOPE OF ACTS CONSTITUTING SEXUAL HARASSMENT, AMENDING FOR THE PURPOSE REPUBLIC ACT NUMBER 7877, OTHERWISE KNOWN AS THE 'SEXUAL HARASSMENT ACT OF 1995'"
congress_website_abstract = "Includes in the definition of term “sexual harassment” the following: 1) acts that are not only physical or verbal in nature, but also those committed using electronic devices or any available technology or means; 2) acts that have been committed either within or outside the place of employment, training or education; and 3) offensive remarks about a person´s sexual orientation."
