congress_website_title = "AN ACT AMENDING SECTION 53 OF REPUBLIC ACT NO. 9184, OTHERWISE KNOWN AS THE `GOVERNMENT PROCUREMENT REFORM ACT´, AND FOR OTHER PURPOSES"
congress_website_abstract = "Allows negotiated procurement of major defense equipment or materiel, in cases wherein domestic vendors are not available, in view of certain defense considerations, as deemed appropriate by the Secretary of National Defense, and; provides for a formal institutional check and balance in the discretion from public bidding by securing prior consent and approval of the President, with the concurrence of both chairmen of the defense committees of both of Congress."
