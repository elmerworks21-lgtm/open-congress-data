congress_website_title = "AN ACT AMENDING REPUBLIC ACT NO. 7586, OTHERWISE KNOWN AS AN ACT PROVIDING FOR THE ESTABLISHMENT AND MANAGEMENT OF NATIONAL INTEGRATED PROTECTED AREAS SYSTEM, DEFINING ITS SCOPE AND COVERAGE, AND FOR OTHER PURPOSES"
congress_website_abstract = "Creates the position of Protected Area Superintendent in each of the protected area under the National Protected Areas System (NIPAS) who shall be responsible enforce the rules and regulations to protect the area from trespassing, damage, vandalism and illegal occupancy and to develop a management information system to ensure that relevant and updated information are available for planning, monitoring and decision-making."
