congress_website_title = "AN ACT PROVIDING FOR THE DIRECT REMITTANCE TO THE HOST LOCAL GOVERNMENT OF ITS FORTY PERCENT SHARE (40%) OF THE PROCEEDS DERIVED FROM THE UTILIZATION AND DEVELOPMENT OF NATIONAL WEALTH, AMENDING FOR THE PURPOSE SECTION 293 OF REPUBLIC ACT NO. 7160 AS AMENDED OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
congress_website_abstract = "Mandates that any person, natural or juridical engaged in the utilization and development of the national wealth should remit forty percent (40%) of the gross collection derived by the national government from the national wealth taxes directly to the host local units and the remaining sixty percent (60%) to the national government."
