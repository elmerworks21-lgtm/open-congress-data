congress_website_abstract = "Provides that comprehensive motor vehicle insurance shall cover all fortuitous events such as floods, landslides, typhoon, volcanic eruptions, earthquakes and other related natural calamities provided that accident, loss, damage or liability is directly or indirectly, proximately or remotely occasioned by, contributed to or traceable to, arising out of, or in connection with the aforementioned natural events."
