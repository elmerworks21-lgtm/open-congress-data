congress_website_title = "AN ACT INSTITUTIONALIZING REFORMS AND CORRECTIVE MEASURES IN THE COLLECTION AND REMITTANCE OF CONTRIBUTIONS OF GSIS PREMIUMS, AMENDING FOR THIS PURPOSE REPUBLIC ACT NO. 8291, OTHERWISE KNOWN AS THE \\\"GOVERNMENT SERVICE INSURANCE SYSTEM ACT OF 1997\\\""
congress_website_abstract = "Seeks to address the issue of non-remittance of premium contributions by prohibiting the deduction of such premium contributions which were not remitted to the GSIS from the social security benefits and other social security benefits of GSIS members and to prohibit the deduction of the GSIS members´ creditable service records the period for which his premium contributions were not remitted to the GSIS."
