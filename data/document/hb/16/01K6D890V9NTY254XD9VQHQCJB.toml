congress_website_title = "AN ACT RATIONALIZING THE CHANGE OF STATUS OF A MEMBER OF THE GOVERNMENT SERVICE INSURANCE SYSTEM FROM ACTIVE TO SPECIAL, AMENDING FOR THE PURPOSE SECTIONS 2 AND 55 OF REPUBLIC ACT NO. 8291, OTHERWISE KNOWN AS THE GOVERNMENT SERVICE INSURANCE SYSTEM ACT OF 1997, AND FOR OTHER PURPOSES"
congress_website_abstract = "Rationalizes the change of status of a member of the GSIS from active to special in order to safeguard, protect, secure, and guarantee the retirement benefits due to the said member thus eliminating any attempt to reduce, diminish, and/or lessen, if not destroy, the retirement benefits due to the special member under the law."
