congress_website_title = "AN ACT TO STRENGTHEN THE RIGHT OF CITIZENS TO INFORMATION HELD BY THE GOVERNMENT"
congress_website_abstract = "Declares it a State policy to recognize the right of the people to information on matters of public concern, and adopts and implements a policy of full disclosure of all its transactions involving public interest, subject to the procedure of this Act, and this right is indispensable to the exercise of the right of the people and their organizations to effective and reasonable participation at all levels of social, political and economic decision-making."
