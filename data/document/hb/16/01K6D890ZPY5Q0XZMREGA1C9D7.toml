congress_website_title = "AN ACT REPEALING ARTICLE 891 OR THE RESERVA TRONCAL OF REPUBLIC ACT NO. 386, OTHERWISE KNOWN AS THE CIVIL CODE OF THE PHILIPPINES"
congress_website_abstract = "Repeals the law on reserva troncal whereby the ascendant who inherits from his descendant any property which the latter may have acquired by gratuitous title from another ascendant, or a sibling, is obliged to reserve such property as he may have acquired by operation of law for the benefit of relatives who are within the third degree and who belong to the line from which said property came."
