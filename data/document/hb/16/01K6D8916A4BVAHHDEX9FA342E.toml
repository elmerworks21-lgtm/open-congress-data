congress_website_title = "AN ACT AMENDING SECTION 46 (C) AND (D) OF THE LOCAL GOVERNMENT CODE"
congress_website_abstract = "Extends the allowable number of days that a local chief executive may leave from his territorial jurisdiction from three (3) to five (5) days in order to adjust the day when the vice governor, the city or municipal vice mayor, or the highest ranking sangguniang barangay member, as the case may be, to have the right to assume the powers, duties, and functions of the local chief executive from the 4th day to the 6th day of his absence and refusal to issue an authorization."
