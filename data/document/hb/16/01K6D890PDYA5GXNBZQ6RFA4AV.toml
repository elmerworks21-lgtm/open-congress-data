congress_website_title = "AN ACT AMENDING SECTIONS 91 AND 97 OF REPUBLIC ACT NO. 8550, OTHERWISE KNOWN AS THE PHILIPPINE FISHERIES CODE OF 1998 AND PROVIDING STIFFER PENALTIES THEREFORE"
congress_website_abstract = "Imposes stiffer penalties by increasing the fines and imprisonment to persons who violate or practice illegal trade of the country´s marine resources, more importantly those that are listed as rare, threatened or endangered under the Convention on International Trade of Endangered Species of Flora and Fauna (CITES), the International Union for Conservation of Nature and Natural Resources (IUCN) and those species mentioned under Republic Act No. 9147, or the Wildlife Resources Conservation and Protection Act."
