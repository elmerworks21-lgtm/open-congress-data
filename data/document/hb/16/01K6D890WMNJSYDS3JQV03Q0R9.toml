congress_website_title = "AN ACT AMENDING SECTION 21 OF REPUBLIC ACT 10121, OTHERWISE KNOWN AS THE PHILIPPINE DISASTER RISK REDUCTION AND MANAGEMENT ACT OF 2010"
congress_website_abstract = "Seeks to expand the permissible use of the Local Disaster Risk Reduction and Management Fund by allowing the agencies concerned to utilize it in paying for the: a) construction of infrastructure projects certified by the national disaster risk reduction management council as necessary in reducing the effects of disasters, and; b) payment for whatever obligations the local government unit incurred in the reconstruction, repair, and rehabilitation of major infrastructure damaged by the disaster."
