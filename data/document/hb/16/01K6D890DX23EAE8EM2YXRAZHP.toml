congress_website_title = "AN ACT TO EXPAND ACCESS TO EDUCATION THROUGH OPEN LEARNING AND DISTANCE EDUCATION IN POST-SECONDARY AND TERTIARY LEVELS OF EDUCATION, APPROPRIATING FUNDS THEREFOR AND FOR OTHER PURPOSES"
congress_website_abstract = "Declares it a policy of the State to expand and further democratize access to quality education at the post-secondary and tertiary levels through the promotion and application of open learning as a philosophy of access to education services, and the appropriate, efficient and effective implementation of distance education as a system of delivering quality post-secondary and tertiary educational services in the country."
