congress_website_title = "AN ACT AMENDING SECTION 2 OF THE REVISED PENAL CODE (ACT NO. 3815 AS AMENDED) EXPANDING THE CRIMINAL JURISDICTION OF THE PHILIPPINE COURTS TO OFFENSES COMMITTED AGAINST OVERSEAS FILIPINO WORKERS (OFW)"
congress_website_abstract = "Provides additional protection to overseas Filipino workers in such a way that if a foreign national commits an act against him, which act constitutes an offense under the Revised Penal Code or any other criminal statutes of the country, the offender may be prosecuted in the Philippine Courts and arrested when present in Philippine territory and his assets which are located in the Philippines may also be reached to satisfy any judgement."
