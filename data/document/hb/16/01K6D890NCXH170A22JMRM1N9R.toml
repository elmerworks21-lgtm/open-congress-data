congress_website_abstract = "Reverts the control of all regional and provincial hospitals to national supervision; grants local government units (LGUs) the authority to take over the utilization of reserved areas or areas of public domain for projects for fisherfolks and farmers organized into cooperatives, and; grants a share of the Internal Revenue Allotment (IRA) from first class cities and municipalities to third class and below municipalities and cities."
