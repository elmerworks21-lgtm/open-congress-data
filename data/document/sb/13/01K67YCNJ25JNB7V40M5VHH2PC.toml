title = "REALTY INSTALLMENT BUYERS PROTECTION ACT"
date_filed = "2004-06-30"
long_title = "AN ACT TO PROVIDE ADDITIONAL PROTECTIONS TO BUYERS OF REAL ESTATE ON INSTALLMENT PAYMENTS BY REQUIRING SUBDIVISION OR REAL ESTATE OWNERS TO HAVE AN INDIVIDUAL TITLE ON EVERY LOT AVAILABLE FIRST BEFORE OFFERING THE SAME FOR SALE, PROHIBITING ANY MORTGAGE, LIEN OR ENCUMBRANCE ON THE SAME, MAKING THE ANNOTATION ON THE TITLE OF THE CONTRACT TO SELL OR OF SALE MANDATORY, MAKING IT COMPULSORY FOR THE EXECUTION OF A DEED OF ABSOLUTE SALE AND THE DELIVERY OF THE TITLE TO THE BUYER UPON COMPLETION OF INSTALLMENT PAYMENTS, AND PROVIDING OTHER PROTECTIVE MEASURES, INCLUDING THE IMPOSITION OF PENALTY FOR VIOLATION THEREOF"
scope = "National"
subjects = [ "Real Estate Buyers Protection (RA 6552)", "Realty Installment Buyers Protection", "Housing (Misrepresentation)",]
authors_raw = "Osmena III, Sergio R."

