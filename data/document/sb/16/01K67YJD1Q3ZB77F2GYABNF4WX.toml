title = "INCOME REQUIREMENT FOR CONVERSION OF A MUNICIPALITY INTO A CITY"
date_filed = "2013-07-30"
long_title = "AN ACT AMENDING SECTION 450 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AS AMENDED, ALLOWING THE CONVERSION OF A MUNICIPALITY WHICH HAS A LAND AREA OF AT LEAST FIFTY (50) SQUARE KILOMETERS OR INHABITANTS OF AT LEAST TWENTY-FIVE THOUSAND (25,000) INTO A COMPONENT CITY IF IT HAS AN ANNUAL AVERAGE LOCALLY GENERATED INCOME OF AT LEAST TWO HUNDRED TWENTY MILLION PESOS (P220,000,000.00) FOR THE LAST TWO CONSECUTIVE YEARS BASED ON 2012 CONSTANT PRICES"
