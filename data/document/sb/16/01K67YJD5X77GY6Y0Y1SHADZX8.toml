title = "ANNUAL INCOME REQUIREMENT FOR COVERSION OF A MUNICIPALITY INTO A CITY"
date_filed = "2013-08-28"
long_title = "AN ACT AMENDING SECTION 450 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AS AMENDED, BY ALLOWING THE CONVERSION OF A MUNICIPALITY WHICH HAS A LAND AREA OF AT LEAST FIFTY (50) SQUARE KILOMETERS OR INHABITANTS OF AT LEAST TWENTY FIVE THOUSAND (25,000) INTO A COMPONENT CITY IF IT HAS A LOCALLY GENERATED AVERAGE ANNUAL INCOME OF AT LEAST TWO HUNDRED TWENTY MILLION PESOS (P220,000,000.00) FOR THE LAST TWO CONSECUTIVE YEARS BASED ON THE YEAR 2010 CONSTANT PRICES"
