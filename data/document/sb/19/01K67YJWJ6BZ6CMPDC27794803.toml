title = "BATANG MAGALING ACT"
date_filed = "2023-07-26"
long_title = "AN ACT ENSURING THAT SENIOR HIGH SCHOOL GRADUATES UNDER THE K TO 12 PROGRAM ARE EQUIPPED WITH THE KNOWLEDGE, TRAINING AND SKILLS DEMANDED IN THE LABOR MARKET, ENHANCING THEIR EMPLOYABILITY AND COMPETITIVENESS, CREATING THE BATANG MAGALING COUNCILS TO STRENGTHEN MULTI-STAKEHOLDER COLLABORATION AND SUPPORT FOR THEIR EMPLOYMENT, ALLOWING DEDUCTION OF TRAINING EXPENSES INCURRED FOR THEIR SKILLS DEVELOPMENT, APPROPRIATING FUNDS THEREFOR, AND FOR OTHER PURPOSES"
