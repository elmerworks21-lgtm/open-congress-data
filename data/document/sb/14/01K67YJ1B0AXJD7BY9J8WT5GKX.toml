title = "STUDENT EMPLOYMENT PROGRAM EXPANDED COVERAGE"
date_filed = "2007-07-04"
long_title = "AN ACT MAKING R. A. NO. 7323 MORE EFFECTIVE AND RELEVANT TO PRESENT AND FUTURE CONDITIONS BY EXPANDING ITS COVERAGE IN TERMS OF EMPLOYER PARTICIPATION, ADJUSTING THE INCOME CLASSIFICATION REQUIREMENT THEREIN PROVIDING AUTOMATIC AND NON-DIMINUTION CLAUSES ON ITS BUDGETARY ALLOCATION AND PROVIDING PENALTIES FOR THOSE WHO DISHONOR THE EDUCATION VOUCHERS, AMENDING FOR THESE PURPOSES R. A. NO. 7323 ENTITLED AN ACT TO HELP POOR BUT DESERVING STUDENTS PURSUE THEIR EDUCATION BY ENCOURAGING THEIR EMPLOYMENT DURING SUMMER AND/OR CHRISTMAS VACATIONS, THROUGH INCENTIVES GRANTED TO EMPLOYERS, ALLOWING THEM TO PAY ONLY SIXTY PER CENTUM OF THEIR SALARIES OR WAGES AND THE FORTY PER CENTUM THROUGH EDUCATION VOUCHERS TO BE PAID BY THE GOVERNMENT, PROHIBITING AND PENALIZING THE FILING OF FRAUDULENT OR FICTITIOUS CLAIMS, AND FOR OTHER PURPOSES"
scope = "National"
