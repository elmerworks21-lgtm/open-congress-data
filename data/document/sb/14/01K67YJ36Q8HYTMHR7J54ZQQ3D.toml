title = "VEHICLE TELEVISION BROADCAST OR VIDEO SIGNAL DISPLAYS ACT"
date_filed = "2009-06-10"
long_title = "AN ACT MAKING IT UNLAWFUL FOR A PERSON TO DRIVE A MOTOR VEHICLE IF A TELEVISION RECEIVER, A VIDEO MONITOR, OR A TELEVISION OR VIDEO SCREEN, OR ANY OTHER SIMILAR MEANS OF VISUALLY DISPLAYING A TELEVISION BROADCAST OR VIDEO SIGNAL THAT PRODUCES ENTERTAINMENT OR BUSINESS APPLICATIONS, IS OPERATING AND IS LOCATED IN THE MOTOR VEHICLE AT ANY POINT FORWARD OF THE BACK OF THE DRIVER’S SEAT, OR IS OPERATING AND VISIBLE TO THE DRIVER WHILE HE OR SHE IS DRIVING THE MOTOR VEHICLE"
