title = "REQUIREMENTS OF CONVERSION OF A MUNICIPALITY INTO A COMPONENT CITY"
date_filed = "2016-07-20"
long_title = "AN ACT AMENDING SECTION 450 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991, AS AMENDED BY REPUBLIC ACT NO. 9009, ALLOWING THE CONVERSION OF A MUNICIPALITY WHICH HAS A LAND AREA OF AT LEAST FIFTY (50) SQUARE KILOMETERS OR INHABITANTS OF AT LEAST TWENTY FIVE THOUSAND (25,000) INTO A COMPONENT CITY IF IT HAS AN ANNUAL AVERAGE LOCALLY GENERATED INCOME OF AT LEAST TWO HUNDRED FIFTY MILLION PESOS (250,000,000.00) FOR THE LAST TWO CONSECUTIVE YEARS BASED ON 2012 CONSTANT PRICES"
