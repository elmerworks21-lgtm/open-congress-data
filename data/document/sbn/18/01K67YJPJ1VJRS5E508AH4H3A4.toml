long_title = "AN ACT EXEMPTING FROM THE POPULATION AND LAND AREA REQUIREMENTS THE CONVERSION OF A MUNICIPALITY INTO A COMPONENT CITY IF IT HAS A LOCALLY GENERATED AVERAGE ANNUAL INCOME OF AT LEAST TWO HUNDRED FIFTY MILLION PESOS (P250,000,000.00) AND ADOPTING IRA PORTABILITY FOR EVERY SUBSEQUENT CONVERSION OF A MUNICIPALITY INTO A CITY, AMENDING FOR SUCH PURPOSE SECTION 450 OF REPUBLIC ACT NO. 7160, OTHERWISE KNOWN AS THE LOCAL GOVERNMENT CODE OF 1991"
